<script id="LD" type="application/json">{"meta":{"title":"Luật 25/2008/QH12 — Luật Bảo hiểm y tế","shortCode":"Luật 25/2008","subtitle":"Bảo hiểm y tế","slug":"luat-25","effectiveDate":"01/07/2009","scope":"1. Luật này quy định về chế độ, chính sách bảo hiểm y tế, bao gồm đối tượng, mức đóng, trách nhiệm và phương thức đóng bảo hiểm y tế; thẻ bảo hiểm y tế; phạm vi được hưởng bảo hiểm y tế; tổ chức khám bệnh, chữa bệnh cho người tham gia bảo hiểm y tế; thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế; quỹ bảo hiểm y tế; quyền và trách nhiệm của các bên liên quan đến bảo hiểm y tế. 2. Luật này áp","description":"Bảo hiểm y tế","related":[]},"outline":[{"id":"luat-25_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh và đối tượng áp dụng","shortTitle":"Phạm vi điều chỉnh và đối tượng áp dụng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này quy định về chế độ, chính sách bảo hiểm y tế, bao gồm đối tượng, mức đóng, trách nhiệm và phương thức đóng bảo hiểm y tế; thẻ bảo hiểm y tế; phạm vi được hưởng bảo hiểm y tế; tổ chức khám bệnh, chữa bệnh cho người tham gia bảo hiểm y tế; thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế; quỹ bảo hiểm y tế; quyền và trách nhiệm của các bên liên quan đến bảo hiểm y tế."},{"k":"p","t":"2. Luật này áp dụng đối với tổ chức, cá nhân trong nước và tổ chức, cá nhân nước ngoài tại Việt Nam có liên quan đến bảo hiểm y tế."},{"k":"p","t":"3. Luật này không áp dụng đối với bảo hiểm y tế mang tính kinh doanh."}]},{"id":"luat-25_2","no":2,"code":"Điều 2","title":"Điều 2. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Bảo hiểm y tế là hình thức bảo hiểm được áp dụng trong lĩnh vực chăm sóc sức khỏe, không vì mục đích lợi nhuận, do Nhà nước tổ chức thực hiện và các đối tượng có trách nhiệm tham gia theo quy định của Luật này."},{"k":"p","t":"2. Bảo hiểm y tế toàn dân là việc các đối tượng quy định trong Luật này đều tham gia bảo hiểm y tế."},{"k":"p","t":"3. Quỹ bảo hiểm y tế là quỹ tài chính được hình thành từ nguồn đóng bảo hiểm y tế và các nguồn thu hợp pháp khác, được sử dụng để chi trả chi phí khám bệnh, chữa bệnh cho người tham gia bảo hiểm y tế, chi phí quản lý bộ máy của tổ chức bảo hiểm y tế và những khoản chi phí hợp pháp khác liên quan đến bảo hiểm y tế."},{"k":"p","t":"4. Người sử dụng lao động bao gồm cơ quan nhà nước, đơn vị sự nghiệp công lập, đơn vị vũ trang nhân dân, tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp, doanh nghiệp, hợp tác xã, hộ kinh doanh cá thể và tổ chức khác; tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam có trách nhiệm đóng bảo hiểm y tế."},{"k":"p","t":"5. Cơ sở khám bệnh, chữa bệnh bảo hiểm y tế ban đầu là cơ sở khám bệnh, chữa bệnh đầu tiên theo đăng ký của người tham gia bảo hiểm y tế và được ghi trong thẻ bảo hiểm y tế."},{"k":"p","t":"6. Giám định bảo hiểm y tế là hoạt động chuyên môn do tổ chức bảo hiểm y tế tiến hành nhằm đánh giá sự hợp lý của việc cung cấp dịch vụ y tế cho người tham gia bảo hiểm y tế, làm cơ sở để thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế."}]},{"id":"luat-25_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc bảo hiểm y tế","shortTitle":"Nguyên tắc bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bảo đảm chia sẻ rủi ro giữa những người tham gia bảo hiểm y tế."},{"k":"p","t":"2. Mức đóng bảo hiểm y tế được xác định theo tỷ lệ phần trăm của tiền lương, tiền công, tiền lương hưu, tiền trợ cấp hoặc mức lương tối thiểu của khu vực hành chính (sau đây gọi chung là mức lương tối thiểu)."},{"k":"p","t":"3. Mức hưởng bảo hiểm y tế theo mức độ bệnh tật, nhóm đối tượng trong phạm vi quyền lợi của người tham gia bảo hiểm y tế."},{"k":"p","t":"4. Chi phí khám bệnh, chữa bệnh bảo hiểm y tế do quỹ bảo hiểm y tế và người tham gia bảo hiểm y tế cùng chi trả."},{"k":"p","t":"5. Quỹ bảo hiểm y tế được quản lý tập trung, thống nhất, công khai, minh bạch, bảo đảm cân đối thu, chi và được Nhà nước bảo hộ."}]},{"id":"luat-25_4","no":4,"code":"Điều 4","title":"Điều 4. Chính sách của Nhà nước về bảo hiểm y tế","shortTitle":"Chính sách của Nhà nước về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nhà nước đóng hoặc hỗ trợ tiền đóng bảo hiểm y tế cho người có công với cách mạng và một số nhóm đối tượng xã hội."},{"k":"p","t":"2. Nhà nước có chính sách ưu đãi đối với hoạt động đầu tư từ quỹ bảo hiểm y tế để bảo toàn và tăng trưởng quỹ. Nguồn thu của quỹ và số tiền sinh lời từ hoạt động đầu tư từ quỹ bảo hiểm y tế được miễn thuế."},{"k":"p","t":"3. Nhà nước tạo điều kiện để tổ chức, cá nhân tham gia bảo hiểm y tế hoặc đóng bảo hiểm y tế cho các nhóm đối tượng."},{"k":"p","t":"4. Nhà nước khuyến khích đầu tư phát triển công nghệ và phương tiện kỹ thuật tiên tiến trong quản lý bảo hiểm y tế."}]},{"id":"luat-25_5","no":5,"code":"Điều 5","title":"Điều 5. Cơ quan quản lý nhà nước về bảo hiểm y tế","shortTitle":"Cơ quan quản lý nhà nước về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ thống nhất quản lý nhà nước về bảo hiểm y tế."},{"k":"p","t":"2. Bộ Y tế chịu trách nhiệm trước Chính phủ thực hiện quản lý nhà nước về bảo hiểm y tế."},{"k":"p","t":"3. Bộ, cơ quan ngang bộ trong phạm vi nhiệm vụ, quyền hạn của mình phối hợp với Bộ Y tế thực hiện quản lý nhà nước về bảo hiểm y tế."},{"k":"p","t":"4. Uỷ ban nhân dân các cấp trong phạm vi nhiệm vụ, quyền hạn của mình thực hiện quản lý nhà nước về bảo hiểm y tế tại địa phương."}]},{"id":"luat-25_6","no":6,"code":"Điều 6","title":"Điều 6. Trách nhiệm của Bộ Y tế về bảo hiểm y tế","shortTitle":"Trách nhiệm của Bộ Y tế về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Chủ trì, phối hợp với các bộ, cơ quan ngang bộ, cơ quan, tổ chức có liên quan thực hiện nhiệm vụ sau đây:"},{"k":"p","t":"1. Xây dựng chính sách, pháp luật về bảo hiểm y tế, tổ chức hệ thống y tế, tuyến chuyên môn kỹ thuật y tế, nguồn tài chính phục vụ công tác bảo vệ, chăm sóc và nâng cao sức khỏe nhân dân dựa trên bảo hiểm y tế toàn dân;"},{"k":"p","t":"2. Xây dựng chiến lược, quy hoạch, kế hoạch tổng thể phát triển bảo hiểm y tế;"},{"k":"p","t":"3. Ban hành danh mục thuốc, vật tư y tế, dịch vụ kỹ thuật thuộc phạm vi được hưởng của người tham gia bảo hiểm y tế và các quy định chuyên môn kỹ thuật liên quan đến khám bệnh, chữa bệnh bảo hiểm y tế;"},{"k":"p","t":"4. Xây dựng và trình Chính phủ các giải pháp nhằm bảo đảm cân đối quỹ bảo hiểm y tế;"},{"k":"p","t":"5. Tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm y tế;"},{"k":"p","t":"6. Chỉ đạo, hướng dẫn tổ chức triển khai thực hiện chế độ bảo hiểm y tế;"},{"k":"p","t":"7. Thanh tra, kiểm tra, xử lý vi phạm và giải quyết khiếu nại, tố cáo về bảo hiểm y tế;"},{"k":"p","t":"8. Theo dõi, đánh giá, tổng kết các hoạt động trong lĩnh vực bảo hiểm y tế;"},{"k":"p","t":"9. Tổ chức nghiên cứu khoa học và hợp tác quốc tế về bảo hiểm y tế."}]},{"id":"luat-25_7","no":7,"code":"Điều 7","title":"Điều 7. Trách nhiệm của Bộ Tài chính về bảo hiểm y tế","shortTitle":"Trách nhiệm của Bộ Tài chính về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Phối hợp với Bộ Y tế, cơ quan, tổ chức có liên quan xây dựng chính sách, pháp luật về tài chính liên quan đến bảo hiểm y tế."},{"k":"p","t":"2. Thanh tra, kiểm tra việc thực hiện các quy định của pháp luật về chế độ tài chính đối với bảo hiểm y tế, quỹ bảo hiểm y tế."}]},{"id":"luat-25_8","no":8,"code":"Điều 8","title":"Điều 8. Trách nhiệm của Uỷ ban nhân dân các cấp về bảo hiểm y tế","shortTitle":"Trách nhiệm của Uỷ ban nhân dân các cấp về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trong phạm vi nhiệm vụ, quyền hạn của mình, Uỷ ban nhân dân các cấp có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo tổ chức triển khai thực hiện chính sách, pháp luật về bảo hiểm y tế;"},{"k":"p","t":"b) Bảo đảm kinh phí đóng bảo hiểm y tế cho các đối tượng được ngân sách nhà nước đóng hoặc hỗ trợ theo quy định của Luật này;"},{"k":"p","t":"c) Tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm y tế;"},{"k":"p","t":"d) Thanh tra, kiểm tra, xử lý vi phạm và giải quyết khiếu nại, tố cáo về bảo hiểm y tế."},{"k":"p","t":"2. Ngoài việc thực hiện trách nhiệm quy định tại khoản 1 Điều này, Uỷ ban nhân dân tỉnh, thành phố trực thuộc trung ương còn có trách nhiệm quản lý, sử dụng nguồn kinh phí theo quy định tại khoản 2 Điều 35 của Luật này."}]},{"id":"luat-25_9","no":9,"code":"Điều 9","title":"Điều 9. Tổ chức bảo hiểm y tế","shortTitle":"Tổ chức bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức bảo hiểm y tế có chức năng thực hiện chế độ, chính sách, pháp luật về bảo hiểm y tế, quản lý và sử dụng quỹ bảo hiểm y tế."},{"k":"p","t":"2. Chính phủ quy định cụ thể về tổ chức, chức năng, nhiệm vụ và quyền hạn của tổ chức bảo hiểm y tế."}]},{"id":"luat-25_10","no":10,"code":"Điều 10","title":"Điều 10. Kiểm toán quỹ bảo hiểm y tế","shortTitle":"Kiểm toán quỹ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Định kỳ 3 năm, Kiểm toán nhà nước thực hiện kiểm toán quỹ bảo hiểm y tế và báo cáo kết quả với Quốc hội."},{"k":"p","t":"Trường hợp Quốc hội, Uỷ ban thường vụ Quốc hội hoặc Chính phủ yêu cầu, Kiểm toán nhà nước thực hiện kiểm toán đột xuất quỹ bảo hiểm y tế."}]},{"id":"luat-25_11","no":11,"code":"Điều 11","title":"Điều 11. Các hành vi bị nghiêm cấm","shortTitle":"Các hành vi bị nghiêm cấm","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Không đóng hoặc đóng bảo hiểm y tế không đầy đủ theo quy định của Luật này."},{"k":"p","t":"2. Gian lận, giả mạo hồ sơ, thẻ bảo hiểm y tế."},{"k":"p","t":"3. Sử dụng tiền đóng bảo hiểm y tế, quỹ bảo hiểm y tế sai mục đích."},{"k":"p","t":"4. Cản trở, gây khó khăn hoặc làm thiệt hại đến quyền, lợi ích hợp pháp của người tham gia bảo hiểm y tế và của các bên liên quan đến bảo hiểm y tế."},{"k":"p","t":"5. Cố ý báo cáo sai sự thật, cung cấp sai lệch thông tin, số liệu về bảo hiểm y tế."},{"k":"p","t":"6. Lợi dụng chức vụ, quyền hạn, chuyên môn, nghiệp vụ để làm trái với quy định của pháp luật về bảo hiểm y tế."},{"k":"p","t":"CHƯƠNG II"},{"k":"p","t":"ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM"},{"k":"p","t":"VÀ PHƯƠNG THỨC ĐÓNG BẢO HIỂM Y TẾ"}]},{"id":"luat-25_12","no":12,"code":"Điều 12","title":"Điều 12. Đối tượng tham gia bảo hiểm y tế","shortTitle":"Đối tượng tham gia bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động làm việc theo hợp đồng lao động không xác định thời hạn, hợp đồng lao động có thời hạn từ đủ 3 tháng trở lên theo quy định của pháp luật về lao động; người lao động là người quản lý doanh nghiệp hưởng tiền lương, tiền công theo quy định của pháp luật về tiền lương, tiền công; cán bộ, công chức, viên chức theo quy định của pháp luật (sau đây gọi chung là người lao động)."},{"k":"p","t":"2. Sĩ quan, hạ sĩ quan nghiệp vụ và sĩ quan, hạ sĩ quan chuyên môn, kỹ thuật đang công tác trong lực lượng Công an nhân dân."},{"k":"p","t":"3. Người hưởng lương hưu, trợ cấp mất sức lao động hằng tháng."},{"k":"p","t":"4. Người đang hưởng trợ cấp bảo hiểm xã hội hằng tháng do bị tai nạn lao động, bệnh nghề nghiệp."},{"k":"p","t":"5. Người đã thôi hưởng trợ cấp mất sức lao động đang hưởng trợ cấp hằng tháng từ ngân sách nhà nước."},{"k":"p","t":"6. Cán bộ xã, phường, thị trấn đã nghỉ việc đang hưởng trợ cấp bảo hiểm xã hội hằng tháng."},{"k":"p","t":"7. Cán bộ xã, phường, thị trấn đã nghỉ việc đang hưởng trợ cấp từ ngân sách nhà nước hằng tháng."},{"k":"p","t":"8. Người đang hưởng trợ cấp thất nghiệp."},{"k":"p","t":"9. Người có công với cách mạng."},{"k":"p","t":"10. Cựu chiến binh theo quy định của pháp luật về cựu chiến binh."},{"k":"p","t":"11. Người trực tiếp tham gia kháng chiến chống Mỹ cứu nước theo quy định của Chính phủ."},{"k":"p","t":"12. Đại biểu Quốc hội, đại biểu Hội đồng nhân dân các cấp đương nhiệm."},{"k":"p","t":"13. Người thuộc diện hưởng trợ cấp bảo trợ xã hội hằng tháng theo quy định của pháp luật."},{"k":"p","t":"14. Người thuộc hộ gia đình nghèo; người dân tộc thiểu số đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn, đặc biệt khó khăn."},{"k":"p","t":"15. Thân nhân của người có công với cách mạng theo quy định của pháp luật về ưu đãi người có công với cách mạng."},{"k":"p","t":"16. Thân nhân của các đối tượng sau đây theo quy định của pháp luật về sĩ quan Quân đội nhân dân, nghĩa vụ quân sự, Công an nhân dân và cơ yếu:"},{"k":"p","t":"a) Sĩ quan, quân nhân chuyên nghiệp thuộc Quân đội nhân dân đang tại ngũ; hạ sĩ quan, binh sĩ đang phục vụ trong Quân đội nhân dân;"},{"k":"p","t":"b) Sĩ quan, hạ sĩ quan nghiệp vụ và sĩ quan, hạ sĩ quan chuyên môn, kỹ thuật đang công tác trong lực lượng Công an nhân dân; hạ sĩ quan, chiến sĩ Công an nhân dân phục vụ có thời hạn;"},{"k":"p","t":"c) Sĩ quan, quân nhân chuyên nghiệp đang làm công tác cơ yếu tại Ban Cơ yếu Chính phủ và người đang làm công tác cơ yếu hưởng lương theo bảng lương cấp bậc quân hàm sĩ quan Quân đội nhân dân và bảng lương quân nhân chuyên nghiệp thuộc Quân đội nhân dân nhưng không phải là quân nhân, công an nhân dân."},{"k":"p","t":"17. Trẻ em dưới 6 tuổi."},{"k":"p","t":"18. Người đã hiến bộ phận cơ thể người theo quy định của pháp luật về hiến, lấy, ghép mô, bộ phận cơ thể người và hiến, lấy xác."},{"k":"p","t":"19. Người nước ngoài đang học tập tại Việt Nam được cấp học bổng từ ngân sách của Nhà nước Việt Nam."},{"k":"p","t":"20. Người thuộc hộ gia đình cận nghèo."},{"k":"p","t":"21. Học sinh, sinh viên."},{"k":"p","t":"22. Người thuộc hộ gia đình làm nông nghiệp, lâm nghiệp, ngư nghiệp và diêm nghiệp."},{"k":"p","t":"23. Thân nhân của người lao động quy định tại khoản 1 Điều này mà người lao động có trách nhiệm nuôi dưỡng và sống trong cùng hộ gia đình."},{"k":"p","t":"24. Xã viên hợp tác xã, hộ kinh doanh cá thể."},{"k":"p","t":"25. Các đối tượng khác theo quy định của Chính phủ."}]},{"id":"luat-25_13","no":13,"code":"Điều 13","title":"Điều 13. Mức đóng và trách nhiệm đóng bảo hiểm y tế","shortTitle":"Mức đóng và trách nhiệm đóng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Mức đóng và trách nhiệm đóng bảo hiểm y tế được quy định như sau:"},{"k":"p","t":"a) Mức đóng hằng tháng của đối tượng quy định tại khoản 1 và khoản 2 Điều 12 của Luật này tối đa bằng 6% mức tiền lương, tiền công tháng của người lao động, trong đó người sử dụng lao động đóng 2/3 và người lao động đóng 1/3. Trong thời gian người lao động nghỉ việc hưởng chế độ thai sản khi sinh con hoặc nuôi con nuôi dưới 4 tháng tuổi theo quy định của pháp luật về bảo hiểm xã hội thì người lao động và người sử dụng lao động không phải đóng bảo hiểm y tế nhưng vẫn được tính vào thời gian tham gia bảo hiểm y tế liên tục để hưởng chế độ bảo hiểm y tế;"},{"k":"p","t":"b) Mức đóng hằng tháng của đối tượng quy định tại khoản 3 Điều 12 của Luật này tối đa bằng 6% mức lương hưu, trợ cấp mất sức lao động và do tổ chức bảo hiểm xã hội đóng;"},{"k":"p","t":"c) Mức đóng hằng tháng của đối tượng quy định tại các khoản 4, 5 và 6 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu và do tổ chức bảo hiểm xã hội đóng;"},{"k":"p","t":"d) Mức đóng hằng tháng của đối tượng quy định tại khoản 8 Điều 12 của Luật này tối đa bằng 6% mức trợ cấp thất nghiệp và do tổ chức bảo hiểm xã hội đóng;"},{"k":"p","t":"đ) Mức đóng hằng tháng của đối tượng quy định tại các khoản 7, 9, 10, 11, 12, 13, 14, 15, 16, 17 và 18 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu và do ngân sách nhà nước đóng;"},{"k":"p","t":"e) Mức đóng hằng tháng của đối tượng quy định tại khoản 19 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu và do cơ quan, tổ chức, đơn vị cấp học bổng đóng;"},{"k":"p","t":"g) Mức đóng hằng tháng của đối tượng quy định tại các khoản 20, 21 và 22 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu và do đối tượng đóng;"},{"k":"p","t":"Ngân sách nhà nước hỗ trợ một phần mức đóng bảo hiểm y tế cho đối tượng quy định tại khoản 20 và khoản 21 Điều 12  của Luật này và đối tượng quy định tại khoản 22 Điều 12 của Luật này mà có mức sống trung bình;"},{"k":"p","t":"h) Mức đóng hằng tháng của đối tượng quy định tại khoản 23 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu và do người lao động đóng;"},{"k":"p","t":"i) Mức đóng hằng tháng của đối tượng quy định tại khoản 24 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu và do đối tượng đóng;"},{"k":"p","t":"k) Mức đóng hằng tháng của đối tượng quy định tại khoản 25 Điều 12 của Luật này tối đa bằng 6% mức lương tối thiểu."},{"k":"p","t":"2. Trường hợp một người đồng thời thuộc nhiều đối tượng tham gia bảo hiểm y tế khác nhau quy định tại Điều 12 của Luật này thì đóng bảo hiểm y tế theo đối tượng đầu tiên mà người đó được xác định theo thứ tự của các đối tượng quy định tại Điều 12 của Luật này."},{"k":"p","t":"Trường hợp đối tượng quy định tại khoản 1 Điều 12 của Luật này có thêm một hoặc nhiều hợp đồng lao động không xác định thời hạn hoặc có thời hạn từ đủ 3 tháng trở lên thì đóng bảo hiểm y tế theo hợp đồng lao động có mức tiền lương, tiền công cao nhất."},{"k":"p","t":"3. Chính phủ quy định cụ thể mức đóng, mức hỗ trợ quy định tại khoản 1 Điều này."}]},{"id":"luat-25_14","no":14,"code":"Điều 14","title":"Điều 14. Tiền lương, tiền công, tiền trợ cấp làm căn cứ đóng bảo hiểm y tế","shortTitle":"Tiền lương, tiền công, tiền trợ cấp làm căn cứ đóng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định thì căn cứ để đóng bảo hiểm y tế là tiền lương tháng theo ngạch bậc, cấp quân hàm và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung, phụ cấp thâm niên nghề (nếu có)."},{"k":"p","t":"2. Đối với người lao động hưởng tiền lương, tiền công theo quy định của người sử dụng lao động thì căn cứ để đóng bảo hiểm y tế là tiền lương, tiền công tháng được ghi trong hợp đồng lao động."},{"k":"p","t":"3. Đối với người hưởng lương hưu, trợ cấp mất sức lao động, trợ cấp thất nghiệp hằng tháng thì căn cứ để đóng bảo hiểm y tế là tiền lương hưu, trợ cấp mất sức lao động, trợ cấp thất nghiệp hằng tháng."},{"k":"p","t":"4. Đối với các đối tượng khác thì căn cứ để đóng bảo hiểm y tế là mức lương tối thiểu."},{"k":"p","t":"5. Mức tiền công, tiền lương tối đa để tính mức đóng bảo hiểm y tế là 20 lần mức lương tối thiểu."}]},{"id":"luat-25_15","no":15,"code":"Điều 15","title":"Điều 15. Phương thức đóng bảo hiểm y tế","shortTitle":"Phương thức đóng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hằng tháng, người sử dụng lao động đóng bảo hiểm y tế cho người lao động và trích tiền đóng bảo hiểm y tế từ tiền lương, tiền công của người lao động để nộp cùng một lúc vào quỹ bảo hiểm y tế."},{"k":"p","t":"2. Đối với các doanh nghiệp nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp không trả lương theo tháng thì 3 tháng hoặc 6 tháng một lần, người sử dụng lao động đóng bảo hiểm y tế cho người lao động và trích tiền đóng bảo hiểm y tế từ tiền lương, tiền công của người lao động để nộp cùng một lúc vào quỹ bảo hiểm y tế."},{"k":"p","t":"3. Hằng tháng, tổ chức bảo hiểm xã hội đóng bảo hiểm y tế cho các đối tượng quy định tại các khoản 3, 4, 5, 6 và 8 Điều 12 của Luật này vào quỹ bảo hiểm y tế."},{"k":"p","t":"4. Hằng năm, cơ quan, tổ chức quản lý đối tượng quy định tại các khoản 7, 9, 10, 11, 12, 13, 14, 17 và 18 Điều 12 của Luật này đóng bảo hiểm y tế cho các đối tượng này vào quỹ bảo hiểm y tế."},{"k":"p","t":"5. Hằng năm, cơ quan, tổ chức quản lý người có công với cách mạng và các đối tượng quy định tại các điểm a, b và c khoản 16 Điều 12 của Luật này đóng bảo hiểm y tế cho thân nhân của họ vào quỹ bảo hiểm y tế."},{"k":"p","t":"6. Hằng tháng, cơ quan, tổ chức, đơn vị cấp học bổng đóng bảo hiểm y tế cho đối tượng quy định tại khoản 19 Điều 12 của Luật này vào quỹ bảo hiểm y tế."},{"k":"p","t":"7. Chính phủ quy định cụ thể phương thức đóng bảo hiểm y tế của đối tượng quy định tại các khoản 20, 21, 22, 23, 24 và 25 Điều 12 của Luật này."},{"k":"p","t":"CHƯƠNG III"},{"k":"p","t":"THẺ BẢO HIỂM Y TẾ"}]},{"id":"luat-25_16","no":16,"code":"Điều 16","title":"Điều 16. Thẻ bảo hiểm y tế","shortTitle":"Thẻ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thẻ bảo hiểm y tế được cấp cho người tham gia bảo hiểm y tế và làm căn cứ để được hưởng các quyền lợi về bảo hiểm y tế theo quy định của Luật này."},{"k":"p","t":"2. Mỗi người chỉ được cấp một thẻ bảo hiểm y tế."},{"k":"p","t":"3. Thời điểm thẻ bảo hiểm y tế có giá trị sử dụng được quy định như sau:"},{"k":"p","t":"a) Đối với người tham gia bảo hiểm y tế theo quy định tại khoản 3 Điều 50 của Luật này đóng bảo hiểm y tế liên tục kể từ lần thứ hai trở đi hoặc người tham gia bảo hiểm y tế quy định tại khoản 2 Điều 51 của Luật này thì thẻ bảo hiểm y tế có giá trị sử dụng kể từ ngày đóng bảo hiểm y tế;"},{"k":"p","t":"b) Đối với người tham gia bảo hiểm y tế theo quy định tại khoản 3 Điều 50 của Luật này đóng bảo hiểm y tế lần đầu hoặc đóng bảo hiểm y tế không liên tục thì thẻ bảo hiểm y tế có giá trị sử dụng sau 30 ngày, kể từ ngày đóng bảo hiểm y tế; riêng đối với quyền lợi về dịch vụ kỹ thuật cao thì thẻ bảo hiểm y tế có giá trị sử dụng sau 180 ngày, kể từ ngày đóng bảo hiểm y tế;"},{"k":"p","t":"c) Đối với trẻ em dưới 6 tuổi thì thẻ bảo hiểm y tế có giá trị sử dụng đến ngày trẻ đủ 72 tháng tuổi."},{"k":"p","t":"4. Thẻ bảo hiểm y tế không có giá trị sử dụng trong các trường hợp sau đây:"},{"k":"p","t":"a) Thẻ đã hết thời hạn sử dụng;"},{"k":"p","t":"b) Thẻ bị sửa chữa, tẩy xoá;"},{"k":"p","t":"c) Người có tên trong thẻ không tiếp tục tham gia bảo hiểm y tế."},{"k":"p","t":"5. Tổ chức bảo hiểm y tế quy định mẫu thẻ bảo hiểm y tế, quản lý thẻ bảo hiểm y tế thống nhất trong cả nước và chậm nhất đến ngày 01 tháng 01 năm 2014 phải tổ chức thực hiện việc phát hành thẻ bảo hiểm y tế có ảnh của người tham gia bảo hiểm y tế."}]},{"id":"luat-25_17","no":17,"code":"Điều 17","title":"Điều 17. Cấp thẻ bảo hiểm y tế","shortTitle":"Cấp thẻ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ cấp thẻ bảo hiểm y tế bao gồm:"},{"k":"p","t":"a) Văn bản đăng ký tham gia bảo hiểm y tế của cơ quan, tổ chức có trách nhiệm đóng bảo hiểm y tế quy định tại khoản 1 Điều 13 của Luật này;"},{"k":"p","t":"b) Danh sách người tham gia bảo hiểm y tế do cơ quan, tổ chức có trách nhiệm đóng bảo hiểm y tế quy định tại khoản 1 Điều 13 của Luật này hoặc người đại diện của người tự nguyện tham gia bảo hiểm y tế lập;"},{"k":"p","t":"c) Tờ khai của cá nhân, hộ gia đình tham gia bảo hiểm y tế."},{"k":"p","t":"2. Hồ sơ cấp thẻ bảo hiểm y tế đối với trẻ em dưới 6 tuổi bao gồm:"},{"k":"p","t":"a) Bản sao giấy chứng sinh hoặc bản sao giấy khai sinh. Trường hợp trẻ em chưa có bản sao giấy chứng sinh hoặc bản sao giấy khai sinh thì phải có giấy xác nhận của Uỷ ban nhân dân xã, phường, thị trấn nơi cư trú của cha, mẹ hoặc người giám hộ;"},{"k":"p","t":"b) Danh sách hoặc giấy đề nghị cấp thẻ bảo hiểm y tế của Uỷ ban nhân dân xã, phường, thị trấn nơi trẻ em cư trú."},{"k":"p","t":"3. Trong thời hạn 10 ngày làm việc, kể từ ngày nhận đủ hồ sơ quy định tại khoản 1 và khoản 2 Điều này, tổ chức bảo hiểm y tế phải cấp thẻ bảo hiểm y tế cho người tham gia bảo hiểm y tế."}]},{"id":"luat-25_18","no":18,"code":"Điều 18","title":"Điều 18. Cấp lại thẻ bảo hiểm y tế","shortTitle":"Cấp lại thẻ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thẻ bảo hiểm y tế được cấp lại trong trường hợp bị mất."},{"k":"p","t":"2. Người bị mất thẻ bảo hiểm y tế phải có đơn đề nghị cấp lại thẻ."},{"k":"p","t":"3. Trong thời hạn 7 ngày làm việc, kể từ ngày nhận được đơn đề nghị cấp lại thẻ, tổ chức bảo hiểm y tế phải cấp lại thẻ cho người tham gia bảo hiểm y tế. Trong thời gian chờ cấp lại thẻ, người có thẻ vẫn được hưởng quyền lợi của người tham gia bảo hiểm y tế."},{"k":"p","t":"4. Người được cấp lại thẻ bảo hiểm y tế phải nộp phí. Bộ trưởng Bộ Tài chính quy định mức phí cấp lại thẻ bảo hiểm y tế."}]},{"id":"luat-25_19","no":19,"code":"Điều 19","title":"Điều 19. Đổi thẻ bảo hiểm y tế","shortTitle":"Đổi thẻ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thẻ bảo hiểm y tế được đổi trong trường hợp sau đây:"},{"k":"p","t":"a) Rách, nát hoặc hỏng;"},{"k":"p","t":"b) Thay đổi nơi đăng ký khám bệnh, chữa bệnh ban đầu;"},{"k":"p","t":"c) Thông tin ghi trong thẻ không đúng."},{"k":"p","t":"2. Hồ sơ đổi thẻ bảo hiểm y tế bao gồm:"},{"k":"p","t":"a) Đơn đề nghị đổi thẻ của người tham gia bảo hiểm y tế;"},{"k":"p","t":"b) Thẻ bảo hiểm y tế."},{"k":"p","t":"3. Trong thời hạn 7 ngày làm việc, kể từ ngày nhận đủ hồ sơ quy định tại khoản 2 Điều này, tổ chức bảo hiểm y tế phải đổi thẻ cho người tham gia bảo hiểm y tế. Trong thời gian chờ đổi thẻ, người có thẻ vẫn được hưởng quyền lợi của người tham gia bảo hiểm y tế."},{"k":"p","t":"4. Người được đổi thẻ bảo hiểm y tế do thẻ bị rách, nát hoặc hỏng phải nộp phí. Bộ  trưởng Bộ Tài chính quy định mức phí đổi thẻ bảo hiểm y tế."}]},{"id":"luat-25_20","no":20,"code":"Điều 20","title":"Điều 20. Thu hồi, tạm giữ thẻ bảo hiểm y tế","shortTitle":"Thu hồi, tạm giữ thẻ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thẻ bảo hiểm y tế bị thu hồi trong trường hợp sau đây:"},{"k":"p","t":"a) Gian lận trong việc cấp thẻ bảo hiểm y tế;"},{"k":"p","t":"b) Người có tên trong thẻ bảo hiểm y tế không tiếp tục tham gia bảo hiểm y tế."},{"k":"p","t":"2. Thẻ bảo hiểm y tế bị tạm giữ trong trường hợp người đi khám bệnh, chữa bệnh sử dụng thẻ bảo hiểm y tế của người khác. Người có thẻ bảo hiểm y tế bị tạm giữ có trách nhiệm đến nhận lại thẻ và nộp phạt theo quy định của pháp luật."},{"k":"p","t":"CHƯƠNG IV"},{"k":"p","t":"PHẠM VI ĐƯỢC HƯỞNG BẢO HIỂM Y TẾ"}]},{"id":"luat-25_21","no":21,"code":"Điều 21","title":"Điều 21. Phạm vi được hưởng của người tham gia bảo hiểm y tế","shortTitle":"Phạm vi được hưởng của người tham gia bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm y tế được quỹ bảo hiểm y tế chi trả các chi phí sau đây:"},{"k":"p","t":"a) Khám bệnh, chữa bệnh, phục hồi chức năng, khám thai định kỳ, sinh con;"},{"k":"p","t":"b) Khám bệnh để sàng lọc, chẩn đoán sớm một số bệnh;"},{"k":"p","t":"c) Vận chuyển người bệnh từ tuyến huyện lên tuyến trên đối với đối tượng quy định tại các khoản 9, 13, 14, 17 và 20 Điều 12 của Luật này trong trường hợp cấp cứu hoặc khi đang điều trị nội trú phải chuyển tuyến chuyên môn kỹ thuật."},{"k":"p","t":"2. Bộ trưởng Bộ Y tế quy định cụ thể điểm b khoản 1 Điều này; chủ trì, phối hợp với cơ quan liên quan ban hành danh mục thuốc, hóa chất, vật tư, thiết bị y tế, dịch vụ kỹ thuật y tế thuộc phạm vi được hưởng của người tham gia bảo hiểm y tế."}]},{"id":"luat-25_22","no":22,"code":"Điều 22","title":"Điều 22. Mức hưởng bảo hiểm y tế","shortTitle":"Mức hưởng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm y tế khi đi khám bệnh, chữa bệnh theo quy định tại các điều 26, 27 và 28 của Luật này thì được quỹ bảo hiểm y tế thanh toán chi phí khám bệnh, chữa bệnh trong phạm vi được hưởng như sau:"},{"k":"p","t":"a) 100% chi phí khám bệnh, chữa bệnh đối với đối tượng quy định tại các khoản 2, 9 và 17 Điều 12 của Luật này;"},{"k":"p","t":"b) 100% chi phí khám bệnh, chữa bệnh đối với trường hợp chi phí cho một lần khám bệnh, chữa bệnh thấp hơn mức do Chính phủ quy định và khám bệnh, chữa bệnh tại tuyến xã;"},{"k":"p","t":"c) 95% chi phí khám bệnh, chữa bệnh đối với đối tượng quy định tại các khoản 3, 13 và 14 Điều 12 của Luật này;"},{"k":"p","t":"d) 80% chi phí khám bệnh, chữa bệnh đối với các đối tượng khác."},{"k":"p","t":"2. Trường hợp một người thuộc nhiều đối tượng tham gia bảo hiểm y tế thì được hưởng quyền lợi bảo hiểm y tế theo đối tượng có quyền lợi cao nhất."},{"k":"p","t":"3. Chính phủ quy định mức thanh toán chi phí khám bệnh, chữa bệnh đối với các trường hợp vượt tuyến chuyên môn kỹ thuật, khám bệnh, chữa bệnh theo yêu cầu, sử dụng dịch vụ kỹ thuật cao chi phí lớn và các trường hợp khác không thuộc quy định tại khoản 1 Điều này."}]},{"id":"luat-25_23","no":23,"code":"Điều 23","title":"Điều 23. Các trường hợp không được hưởng bảo hiểm y tế","shortTitle":"Các trường hợp không được hưởng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Chi phí trong trường hợp quy định tại khoản 1 Điều 21 đã được ngân sách nhà nước chi trả."},{"k":"p","t":"2. Điều dưỡng, an dưỡng tại cơ sở điều dưỡng, an dưỡng."},{"k":"p","t":"3. Khám sức khỏe."},{"k":"p","t":"4. Xét nghiệm, chẩn đoán thai không nhằm mục đích điều trị."},{"k":"p","t":"5. Sử dụng kỹ thuật hỗ trợ sinh sản, dịch vụ kế hoạch hóa gia đình, nạo hút thai, phá thai, trừ trường hợp phải đình chỉ thai nghén do nguyên nhân bệnh lý của thai nhi hay của sản phụ."},{"k":"p","t":"6. Sử dụng dịch vụ thẩm mỹ."},{"k":"p","t":"7. Điều trị lác, cận thị và tật khúc xạ của mắt."},{"k":"p","t":"8. Sử dụng vật tư y tế thay thế bao gồm chân tay giả, mắt giả, răng giả, kính mắt, máy trợ thính, phương tiện trợ giúp vận động trong khám bệnh, chữa bệnh và phục hồi chức năng."},{"k":"p","t":"9. Khám bệnh, chữa bệnh, phục hồi chức năng đối với bệnh nghề nghiệp, tai nạn lao động, thảm họa."},{"k":"p","t":"10. Khám bệnh, chữa bệnh trong trường hợp tự tử, tự gây thương tích."},{"k":"p","t":"11. Khám bệnh, chữa bệnh nghiện ma túy, nghiện rượu hoặc chất gây nghiện khác."},{"k":"p","t":"12. Khám bệnh, chữa bệnh tổn thương về thể chất, tinh thần do hành vi vi phạm pháp luật của người đó gây ra."},{"k":"p","t":"13. Giám định y khoa, giám định pháp y, giám định pháp y tâm thần."},{"k":"p","t":"14. Tham gia thử nghiệm lâm sàng, nghiên cứu khoa học."},{"k":"p","t":"CHƯƠNG V"},{"k":"p","t":"TỔ CHỨC KHÁM BỆNH, CHỮA BỆNH"},{"k":"p","t":"CHO NGƯỜI THAM GIA BẢO HIỂM Y TẾ"}]},{"id":"luat-25_24","no":24,"code":"Điều 24","title":"Điều 24. Cơ sở khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Cơ sở khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ sở khám bệnh, chữa bệnh bảo hiểm y tế là cơ sở y tế có ký hợp đồng khám bệnh, chữa bệnh với tổ chức bảo hiểm y tế."},{"k":"p","t":"2. Cơ sở khám bệnh, chữa bệnh bảo hiểm y tế bao gồm:"},{"k":"p","t":"a)  Trạm y tế xã và tương đương, nhà hộ sinh;"},{"k":"p","t":"b) Phòng khám đa khoa, chuyên khoa;"},{"k":"p","t":"c) Bệnh viện đa khoa, chuyên khoa."}]},{"id":"luat-25_25","no":25,"code":"Điều 25","title":"Điều 25. Hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế là văn bản thoả thuận giữa tổ chức bảo hiểm y tế với cơ sở khám bệnh, chữa bệnh về việc cung ứng dịch vụ và thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế."},{"k":"p","t":"2. Hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Đối tượng phục vụ và yêu cầu về chất lượng cung ứng dịch vụ;"},{"k":"p","t":"b) Phương thức thanh toán chi phí khám bệnh, chữa bệnh;"},{"k":"p","t":"c) Quyền và trách nhiệm của các bên;"},{"k":"p","t":"d) Thời hạn hợp đồng;"},{"k":"p","t":"đ) Trách nhiệm do vi phạm hợp đồng;"},{"k":"p","t":"e) Điều kiện thay đổi, thanh lý, chấm dứt hợp đồng."},{"k":"p","t":"3. Việc thỏa thuận về điều kiện thay đổi, thanh lý, chấm dứt hợp đồng quy định tại điểm e khoản 2 Điều này phải bảo đảm không làm gián đoạn việc khám bệnh, chữa bệnh của người tham gia bảo hiểm y tế."},{"k":"p","t":"4. Bộ trưởng Bộ Y tế quy định mẫu hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế."}]},{"id":"luat-25_26","no":26,"code":"Điều 26","title":"Điều 26. Đăng ký khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Đăng ký khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm y tế có quyền đăng ký khám bệnh, chữa bệnh bảo hiểm y tế ban đầu tại cơ sở khám bệnh, chữa bệnh tuyến xã, tuyến huyện hoặc tương đương; trừ trường hợp được đăng ký tại cơ sở khám bệnh, chữa bệnh tuyến tỉnh hoặc tuyến  trung ương theo quy định của Bộ trưởng Bộ Y tế."},{"k":"p","t":"Trường hợp người tham gia bảo hiểm y tế phải làm việc lưu động hoặc đến tạm trú tại địa phương khác thì được khám bệnh, chữa bệnh ban đầu tại cơ sở khám bệnh, chữa bệnh phù hợp với tuyến chuyên môn kỹ thuật và nơi người đó đang làm việc lưu động, tạm trú theo quy định của Bộ trưởng Bộ Y tế."},{"k":"p","t":"2. Người tham gia bảo hiểm y tế được thay đổi cơ sở đăng ký khám bệnh, chữa bệnh ban đầu vào đầu mỗi quý."},{"k":"p","t":"3. Tên cơ sở khám bệnh, chữa bệnh bảo hiểm y tế ban đầu được ghi trong thẻ bảo hiểm y tế."}]},{"id":"luat-25_27","no":27,"code":"Điều 27","title":"Điều 27. Chuyển tuyến điều trị","shortTitle":"Chuyển tuyến điều trị","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp vượt quá khả năng chuyên môn kỹ thuật thì cơ sở khám bệnh, chữa bệnh bảo hiểm y tế có trách nhiệm chuyển người bệnh kịp thời đến cơ sở khám bệnh, chữa bệnh bảo hiểm y tế khác theo quy định về chuyển tuyến chuyên môn kỹ thuật."}]},{"id":"luat-25_28","no":28,"code":"Điều 28","title":"Điều 28. Thủ tục khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Thủ tục khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm y tế khi đến khám bệnh, chữa bệnh phải xuất trình thẻ bảo hiểm y tế có ảnh; trường hợp thẻ bảo hiểm y tế chưa có ảnh thì phải xuất trình thẻ bảo hiểm y tế cùng với giấy tờ chứng minh về nhân thân của người đó; đối với trẻ em dưới 6 tuổi chỉ phải xuất trình thẻ bảo hiểm y tế."},{"k":"p","t":"2. Trường hợp cấp cứu, người tham gia bảo hiểm y tế được khám bệnh, chữa bệnh tại bất kỳ cơ sở khám bệnh, chữa bệnh nào và phải xuất trình thẻ bảo hiểm y tế cùng với giấy tờ quy định tại khoản 1 Điều này trước khi ra viện."},{"k":"p","t":"3. Trường hợp chuyển tuyến điều trị, người tham gia bảo hiểm y tế phải có hồ sơ chuyển viện của cơ sở khám bệnh, chữa bệnh."},{"k":"p","t":"4. Trường hợp khám lại theo yêu cầu điều trị, người tham gia bảo hiểm y tế phải có giấy hẹn khám lại của cơ sở khám bệnh, chữa bệnh."}]},{"id":"luat-25_29","no":29,"code":"Điều 29","title":"Điều 29. Giám định bảo hiểm y tế","shortTitle":"Giám định bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung giám định bảo hiểm y tế bao gồm:"},{"k":"p","t":"a) Kiểm tra thủ tục khám bệnh, chữa bệnh bảo hiểm y tế;"},{"k":"p","t":"b) Kiểm tra, đánh giá việc chỉ định điều trị, sử dụng thuốc, hóa chất, vật tư, thiết bị y tế, dịch vụ kỹ thuật y tế cho người bệnh;"},{"k":"p","t":"c) Kiểm tra, xác định chi phí khám bệnh, chữa bệnh bảo hiểm y tế."},{"k":"p","t":"2. Việc giám định bảo hiểm y tế phải bảo đảm chính xác, công khai, minh bạch."},{"k":"p","t":"3. Tổ chức bảo hiểm y tế thực hiện việc giám định bảo hiểm y tế và chịu trách nhiệm trước pháp luật về kết quả giám định."},{"k":"p","t":"CHƯƠNG VI"},{"k":"p","t":"THANH TOÁN CHI PHÍ KHÁM BỆNH, CHỮA BỆNH"},{"k":"p","t":"BẢO HIỂM Y TẾ"}]},{"id":"luat-25_30","no":30,"code":"Điều 30","title":"Điều 30. Phương thức thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Phương thức thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Việc thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế được thực hiện theo các phương thức sau đây:"},{"k":"p","t":"a) Thanh toán theo định suất là thanh toán theo định mức chi phí khám bệnh, chữa bệnh và mức đóng tính trên mỗi thẻ bảo hiểm y tế được đăng ký tại cơ sở khám bệnh, chữa bệnh bảo hiểm y tế trong một khoảng thời gian nhất định;"},{"k":"p","t":"b) Thanh toán theo giá dịch vụ là thanh toán dựa trên chi phí của thuốc, hóa chất, vật tư, thiết bị y tế, dịch vụ kỹ thuật y tế được sử dụng cho người bệnh;"},{"k":"p","t":"c) Thanh toán theo trường hợp bệnh là thanh toán theo chi phí khám bệnh, chữa bệnh được xác định trước cho từng trường hợp theo chẩn đoán."},{"k":"p","t":"2. Chính phủ quy định cụ thể việc áp dụng phương thức thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế quy định tại khoản 1 Điều này ."}]},{"id":"luat-25_31","no":31,"code":"Điều 31","title":"Điều 31. Thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức bảo hiểm y tế thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế với cơ sở khám bệnh, chữa bệnh theo hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế."},{"k":"p","t":"2. Tổ chức bảo hiểm y tế thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế trực tiếp cho người có thẻ bảo hiểm y tế đi khám bệnh, chữa bệnh trong các trường hợp sau đây:"},{"k":"p","t":"a) Tại cơ sở khám bệnh, chữa bệnh không có hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế;"},{"k":"p","t":"b) Trường hợp khám bệnh, chữa bệnh không đúng quy định tại các điều 26, 27 và 28 của Luật này;"},{"k":"p","t":"c) Tại nước ngoài;"},{"k":"p","t":"d) Một số trường hợp đặc biệt khác do Bộ trưởng Bộ Y tế quy định."},{"k":"p","t":"3. Bộ Y tế chủ trì, phối hợp với Bộ Tài chính quy định thủ tục, mức thanh toán đối với các trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"4. Tổ chức bảo hiểm y tế thanh toán chi phí khám bệnh, chữa bệnh trên cơ sở viện phí theo quy định của Chính phủ."}]},{"id":"luat-25_32","no":32,"code":"Điều 32","title":"Điều 32. Tạm ứng, thanh toán, quyết toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Tạm ứng, thanh toán, quyết toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức bảo hiểm y tế có trách nhiệm tạm ứng kinh phí hàng quý cho cơ sở khám bệnh, chữa bệnh bảo hiểm y tế tối thiểu bằng 80% chi phí khám bệnh, chữa bệnh bảo hiểm y tế thực tế của quý trước đã được quyết toán. Đối với cơ sở khám bệnh, chữa bệnh lần đầu ký hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế thì mức tạm ứng lần đầu tối thiểu bằng 80% mức kinh phí khám bệnh, chữa bệnh bảo hiểm y tế của một quý theo hợp đồng đã ký."},{"k":"p","t":"2. Việc thanh toán, quyết toán giữa cơ sở khám bệnh, chữa bệnh và tổ chức bảo hiểm y tế được thực hiện hằng quý như sau:"},{"k":"p","t":"a) Trong tháng đầu của mỗi quý, cơ sở khám bệnh, chữa bệnh bảo hiểm y tế có trách nhiệm gửi báo cáo quyết toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế của quý trước cho tổ chức bảo hiểm y tế;"},{"k":"p","t":"b) Trong thời hạn 30 ngày, kể từ ngày nhận được báo cáo quyết toán của cơ sở khám bệnh, chữa bệnh bảo hiểm y tế, tổ chức bảo hiểm y tế có trách nhiệm xem xét và thông báo kết quả quyết toán chi phí. Trong thời hạn 15 ngày, kể từ ngày thông báo kết quả quyết toán, tổ chức bảo hiểm y tế phải hoàn thành việc thanh toán với cơ sở khám bệnh, chữa bệnh."},{"k":"p","t":"3. Trong thời hạn 40 ngày, kể từ ngày nhận đủ hồ sơ đề nghị thanh toán của người tham gia bảo hiểm y tế khám bệnh, chữa bệnh theo quy định tại điểm a và điểm b khoản 2 Điều 31 của Luật này; trong thời hạn 60 ngày, kể từ ngày nhận đủ hồ sơ đề nghị thanh toán của người tham gia bảo hiểm y tế khám bệnh, chữa bệnh theo quy định tại điểm c và điểm d khoản 2 Điều 31 của Luật này, tổ chức bảo hiểm y tế phải thanh toán chi phí khám bệnh, chữa bệnh trực tiếp cho các đối tượng này."},{"k":"p","t":"CHƯƠNG VII"},{"k":"p","t":"QUỸ BẢO HIỂM Y TẾ"}]},{"id":"luat-25_33","no":33,"code":"Điều 33","title":"Điều 33. Nguồn hình thành quỹ bảo hiểm y tế","shortTitle":"Nguồn hình thành quỹ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tiền đóng bảo hiểm y tế theo quy định của Luật này."},{"k":"p","t":"2. Tiền sinh lời từ hoạt động đầu tư của quỹ bảo hiểm y tế."},{"k":"p","t":"3. Tài trợ, viện trợ của các tổ chức, cá nhân trong nước và nước ngoài."},{"k":"p","t":"4. Các nguồn thu hợp pháp khác."}]},{"id":"luat-25_34","no":34,"code":"Điều 34","title":"Điều 34. Quản lý quỹ bảo hiểm y tế","shortTitle":"Quản lý quỹ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm y tế được quản lý tập trung, thống nhất, công khai, minh bạch và có sự phân cấp quản lý trong hệ thống tổ chức bảo hiểm y tế."},{"k":"p","t":"2. Chính phủ quy định cụ thể việc quản lý quỹ bảo hiểm y tế; quyết định nguồn tài chính để bảo đảm việc khám bệnh, chữa bệnh bảo hiểm y tế trong trường hợp mất cân đối thu, chi quỹ bảo hiểm y tế."}]},{"id":"luat-25_35","no":35,"code":"Điều 35","title":"Điều 35. Sử dụng quỹ bảo hiểm y tế","shortTitle":"Sử dụng quỹ bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm y tế được sử dụng cho các mục đích sau đây:"},{"k":"p","t":"a) Thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế;"},{"k":"p","t":"b) Chi phí quản lý bộ máy tổ chức bảo hiểm y tế theo định mức chi hành chính của cơ quan nhà nước;"},{"k":"p","t":"c) Đầu tư để bảo toàn và tăng trưởng quỹ bảo hiểm y tế theo nguyên tắc an toàn, hiệu quả;"},{"k":"p","t":"d) Lập quỹ dự phòng khám bệnh, chữa bệnh bảo hiểm y tế. Quỹ dự phòng tối thiểu bằng tổng chi khám bệnh, chữa bệnh bảo hiểm y tế của hai quý trước liền kề và tối đa không quá tổng chi khám bệnh, chữa bệnh bảo hiểm y tế của hai năm trước liền kề."},{"k":"p","t":"2. Trường hợp các tỉnh, thành phố trực thuộc trung ương có số thu bảo hiểm y tế lớn hơn số chi khám bệnh, chữa bệnh bảo hiểm y tế thì được sử dụng một phần kết dư để phục vụ khám bệnh, chữa bệnh bảo hiểm y tế tại địa phương."},{"k":"p","t":"3. Chính phủ quy định cụ thể Điều này."},{"k":"p","t":"CHƯƠNG VIII"},{"k":"p","t":"QUYỀN VÀ TRÁCH NHIỆM CỦA CÁC BÊN"},{"k":"p","t":"LIÊN QUAN ĐẾN BẢO HIỂM Y TẾ"}]},{"id":"luat-25_36","no":36,"code":"Điều 36","title":"Điều 36. Quyền của người tham gia bảo hiểm y tế","shortTitle":"Quyền của người tham gia bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Được cấp thẻ bảo hiểm y tế khi đóng bảo hiểm y tế."},{"k":"p","t":"2. Lựa chọn cơ sở khám bệnh, chữa bệnh bảo hiểm y tế ban đầu theo quy định tại khoản 1 Điều 26 của Luật này."},{"k":"p","t":"3. Được khám bệnh, chữa bệnh."},{"k":"p","t":"4. Được tổ chức bảo hiểm y tế thanh toán chi phí khám bệnh, chữa bệnh theo chế độ bảo hiểm y tế."},{"k":"p","t":"5. Yêu cầu tổ chức bảo hiểm y tế, cơ sở khám bệnh, chữa bệnh bảo hiểm y tế và cơ quan liên quan giải thích, cung cấp thông tin về chế độ bảo hiểm y tế."},{"k":"p","t":"6. Khiếu nại, tố cáo hành vi vi phạm pháp luật về bảo hiểm y tế."}]},{"id":"luat-25_37","no":37,"code":"Điều 37","title":"Điều 37. Nghĩa vụ của người tham gia bảo hiểm y tế","shortTitle":"Nghĩa vụ của người tham gia bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đóng bảo hiểm y tế đầy đủ, đúng thời hạn."},{"k":"p","t":"2. Sử dụng thẻ bảo hiểm y tế đúng mục đích, không cho người khác mượn thẻ bảo hiểm y tế."},{"k":"p","t":"3. Thực hiện các quy định tại Điều 28 của Luật này khi đến khám bệnh, chữa bệnh."},{"k":"p","t":"4. Chấp hành các quy định và hướng dẫn của tổ chức bảo hiểm y tế, cơ sở khám bệnh, chữa bệnh khi đến khám bệnh, chữa bệnh."},{"k":"p","t":"5. Thanh toán chi phí khám bệnh, chữa bệnh cho cơ sở khám bệnh, chữa bệnh ngoài phần chi phí do quỹ bảo hiểm y tế chi trả."}]},{"id":"luat-25_38","no":38,"code":"Điều 38","title":"Điều 38. Quyền của tổ chức, cá nhân đóng bảo hiểm y tế","shortTitle":"Quyền của tổ chức, cá nhân đóng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Yêu cầu tổ chức bảo hiểm y tế, cơ quan nhà nước có thẩm quyền giải thích, cung cấp thông tin về chế độ bảo hiểm y tế."},{"k":"p","t":"2. Khiếu nại, tố cáo hành vi vi phạm pháp luật về bảo hiểm y tế."}]},{"id":"luat-25_39","no":39,"code":"Điều 39","title":"Điều 39. Trách nhiệm của tổ chức, cá nhân đóng bảo hiểm y tế","shortTitle":"Trách nhiệm của tổ chức, cá nhân đóng bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Lập hồ sơ đề nghị cấp thẻ bảo hiểm y tế."},{"k":"p","t":"2. Đóng bảo hiểm y tế đầy đủ, đúng thời hạn."},{"k":"p","t":"3. Giao thẻ bảo hiểm y tế cho người tham gia bảo hiểm y tế."},{"k":"p","t":"4. Cung cấp đầy đủ, chính xác thông tin, tài liệu có liên quan đến trách nhiệm thực hiện bảo hiểm y tế của người sử dụng lao động, của đại diện cho người tham gia bảo hiểm y tế khi có yêu cầu của tổ chức bảo hiểm y tế, người lao động hoặc đại diện của người lao động."},{"k":"p","t":"5. Chấp hành việc thanh tra, kiểm tra về việc thực hiện các quy định của pháp luật về bảo hiểm y tế."}]},{"id":"luat-25_40","no":40,"code":"Điều 40","title":"Điều 40. Quyền của tổ chức bảo hiểm y tế","shortTitle":"Quyền của tổ chức bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Yêu cầu người sử dụng lao động, đại diện của người tham gia bảo hiểm y tế và người tham gia bảo hiểm y tế cung cấp đầy đủ, chính xác thông tin, tài liệu có liên quan đến trách nhiệm của họ về việc thực hiện bảo hiểm y tế."},{"k":"p","t":"2. Kiểm tra, giám định việc thực hiện khám bệnh, chữa bệnh bảo hiểm y tế; thu hồi, tạm giữ thẻ bảo hiểm y tế đối với các trường hợp quy định tại Điều 20 của Luật này."},{"k":"p","t":"3. Yêu cầu cơ sở khám bệnh, chữa bệnh bảo hiểm y tế cung cấp hồ sơ, bệnh án, tài liệu về khám bệnh, chữa bệnh để phục vụ công tác giám định bảo hiểm y tế."},{"k":"p","t":"4. Từ chối thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế không đúng quy định của Luật này hoặc không đúng với nội dung hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế."},{"k":"p","t":"5. Yêu cầu người có trách nhiệm bồi thường thiệt hại cho người tham gia bảo hiểm y tế hoàn trả chi phí khám bệnh, chữa bệnh mà tổ chức bảo hiểm y tế đã chi trả."},{"k":"p","t":"6. Kiến nghị với cơ quan nhà nước có thẩm quyền sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm y tế và xử lý tổ chức, cá nhân vi phạm pháp luật về bảo hiểm y tế."}]},{"id":"luat-25_41","no":41,"code":"Điều 41","title":"Điều 41. Trách nhiệm của tổ chức bảo hiểm y tế","shortTitle":"Trách nhiệm của tổ chức bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm y tế."},{"k":"p","t":"2. Hướng dẫn hồ sơ, thủ tục, tổ chức thực hiện chế độ bảo hiểm y tế bảo đảm nhanh chóng, đơn giản và thuận tiện cho người tham gia bảo hiểm y tế."},{"k":"p","t":"3. Thu tiền đóng bảo hiểm y tế và cấp thẻ bảo hiểm y tế."},{"k":"p","t":"4. Quản lý, sử dụng quỹ bảo hiểm y tế."},{"k":"p","t":"5. Ký hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế với cơ sở khám bệnh, chữa bệnh."},{"k":"p","t":"6. Thanh toán chi phí khám bệnh, chữa bệnh bảo hiểm y tế."},{"k":"p","t":"7. Cung cấp thông tin về các cơ sở khám bệnh, chữa bệnh bảo hiểm y tế và hướng dẫn người tham gia bảo hiểm y tế lựa chọn cơ sở khám bệnh, chữa bệnh ban đầu."},{"k":"p","t":"8. Kiểm tra chất lượng khám bệnh, chữa bệnh; giám định bảo hiểm y tế."},{"k":"p","t":"9. Bảo vệ quyền lợi của người tham gia bảo hiểm y tế; giải quyết theo thẩm quyền các kiến nghị, khiếu nại, tố cáo về chế độ bảo hiểm y tế."},{"k":"p","t":"10. Lưu trữ hồ sơ, số liệu về bảo hiểm y tế theo quy định của pháp luật; ứng dụng công nghệ thông tin trong quản lý bảo hiểm y tế, xây dựng hệ cơ sở dữ liệu quốc gia về bảo hiểm y tế."},{"k":"p","t":"11. Tổ chức thực hiện công tác thống kê, báo cáo, hướng dẫn nghiệp vụ về bảo hiểm y tế; báo cáo định kỳ hoặc đột xuất khi có yêu cầu về quản lý, sử dụng quỹ bảo hiểm y tế."},{"k":"p","t":"12. Tổ chức đào tạo, bồi dưỡng nghiệp vụ, nghiên cứu khoa học và hợp tác quốc tế về bảo hiểm y tế."}]},{"id":"luat-25_42","no":42,"code":"Điều 42","title":"Điều 42. Quyền của cơ sở khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Quyền của cơ sở khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Yêu cầu tổ chức bảo hiểm y tế cung cấp đầy đủ, chính xác các thông tin có liên quan đến người tham gia bảo hiểm y tế, kinh phí khám bệnh, chữa bệnh cho người tham gia bảo hiểm y tế tại cơ sở khám bệnh, chữa bệnh."},{"k":"p","t":"2. Được tổ chức bảo hiểm y tế tạm ứng kinh phí và thanh toán chi phí khám bệnh, chữa bệnh theo hợp đồng khám bệnh, chữa bệnh đã ký."},{"k":"p","t":"3. Kiến nghị với cơ quan nhà nước có thẩm quyền xử lý tổ chức, cá nhân vi phạm pháp luật về bảo hiểm y tế."}]},{"id":"luat-25_43","no":43,"code":"Điều 43","title":"Điều 43. Trách nhiệm của cơ sở khám bệnh, chữa bệnh bảo hiểm y tế","shortTitle":"Trách nhiệm của cơ sở khám bệnh, chữa bệnh bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức khám bệnh, chữa bệnh bảo đảm chất lượng với thủ tục đơn giản, thuận tiện cho người tham gia bảo hiểm y tế."},{"k":"p","t":"2. Cung cấp hồ sơ bệnh án, tài liệu liên quan đến khám bệnh, chữa bệnh và thanh toán chi phí khám bệnh, chữa bệnh của người tham gia bảo hiểm y tế theo yêu cầu của tổ chức bảo hiểm y tế và cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"3. Bảo đảm điều kiện cần thiết cho tổ chức bảo hiểm y tế thực hiện công tác giám định; phối hợp với tổ chức bảo hiểm y tế trong việc tuyên truyền, giải thích về chế độ bảo hiểm y tế cho người tham gia bảo hiểm y tế."},{"k":"p","t":"4. Kiểm tra, phát hiện và thông báo cho tổ chức bảo hiểm y tế những trường hợp vi phạm về sử dụng thẻ bảo hiểm y tế; phối hợp với tổ chức bảo hiểm y tế thu hồi, tạm giữ thẻ bảo hiểm y tế đối với các trường hợp quy định tại Điều 20 của Luật này."},{"k":"p","t":"5. Quản lý và sử dụng kinh phí từ quỹ bảo hiểm y tế theo đúng quy định của pháp luật."},{"k":"p","t":"6. Tổ chức thực hiện công tác thống kê, báo cáo về bảo hiểm y tế theo quy định của pháp luật."}]},{"id":"luat-25_44","no":44,"code":"Điều 44","title":"Điều 44. Quyền của tổ chức đại diện người lao động và tổ chức đại diện người sử dụng lao động","shortTitle":"Quyền của tổ chức đại diện người lao động và tổ chức đại diện người sử dụng lao động","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Yêu cầu tổ chức bảo hiểm y tế, cơ sở khám bệnh, chữa bệnh và người sử dụng lao động cung cấp đầy đủ, chính xác thông tin liên quan đến chế độ bảo hiểm y tế của người lao động."},{"k":"p","t":"2. Kiến nghị với cơ quan nhà nước có thẩm quyền xử lý hành vi vi phạm pháp luật về bảo hiểm y tế làm ảnh hưởng đến quyền và lợi ích hợp pháp của người lao động, người sử dụng lao động."}]},{"id":"luat-25_45","no":45,"code":"Điều 45","title":"Điều 45. Trách nhiệm của tổ chức đại diện người lao động và tổ chức đại diện người sử dụng lao động","shortTitle":"Trách nhiệm của tổ chức đại diện người lao động và tổ chức đại diện người sử dụng lao động","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm y tế đối với người lao động, người sử dụng lao động."},{"k":"p","t":"2. Tham gia xây dựng, kiến nghị sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm y tế."},{"k":"p","t":"3. Tham gia giám sát việc thi hành pháp luật về bảo hiểm y tế."},{"k":"p","t":"CHƯƠNG IX"},{"k":"p","t":"THANH TRA, KHIẾU NẠI, TỐ CÁO, GIẢI QUYẾT TRANH CHẤP"},{"k":"p","t":"VÀ XỬ LÝ VI PHẠM VỀ BẢO HIỂM Y TẾ"}]},{"id":"luat-25_46","no":46,"code":"Điều 46","title":"Điều 46. Thanh tra bảo hiểm y tế","shortTitle":"Thanh tra bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thanh tra y tế thực hiện chức năng thanh tra chuyên ngành về bảo hiểm y tế."}]},{"id":"luat-25_47","no":47,"code":"Điều 47","title":"Điều 47. Khiếu nại, tố cáo về bảo hiểm y tế","shortTitle":"Khiếu nại, tố cáo về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Việc khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm y tế, việc tố cáo và giải quyết tố cáo vi phạm pháp luật về bảo hiểm y tế được thực hiện theo quy định của pháp luật về khiếu nại, tố cáo."}]},{"id":"luat-25_48","no":48,"code":"Điều 48","title":"Điều 48. Tranh chấp về bảo hiểm y tế","shortTitle":"Tranh chấp về bảo hiểm y tế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tranh chấp về bảo hiểm y tế là tranh chấp liên quan đến quyền, nghĩa vụ và trách nhiệm bảo hiểm y tế giữa các đối tượng sau đây:"},{"k":"p","t":"a) Người tham gia bảo hiểm y tế theo quy định tại Điều 12 của Luật này, người đại diện của người tham gia bảo hiểm y tế;"},{"k":"p","t":"b) Tổ chức, cá nhân đóng bảo hiểm y tế theo quy định tại khoản 1 Điều 13 của Luật này;"},{"k":"p","t":"c) Tổ chức bảo hiểm y tế;"},{"k":"p","t":"d) Cơ sở khám bệnh, chữa bệnh bảo hiểm y tế."},{"k":"p","t":"2. Tranh chấp về bảo hiểm y tế được giải quyết như sau:"},{"k":"p","t":"a) Các bên tranh chấp có trách nhiệm tự hòa giải về nội dung tranh chấp;"},{"k":"p","t":"b) Trường hợp hòa giải không thành thì các bên tranh chấp có quyền khởi kiện tại Tòa án theo quy định của pháp luật."}]},{"id":"luat-25_49","no":49,"code":"Điều 49","title":"Điều 49. Xử lý vi phạm","shortTitle":"Xử lý vi phạm","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nào có hành vi vi phạm các quy định của Luật này và các quy định khác của pháp luật có liên quan đến bảo hiểm y tế thì tùy theo tính chất, mức độ vi phạm mà bị xử lý kỷ luật, xử phạt vi phạm hành chính hoặc bị truy cứu trách nhiệm hình sự, nếu gây thiệt hại thì phải bồi thường theo quy định của pháp luật."},{"k":"p","t":"2. Cơ quan, tổ chức, người sử dụng lao động có trách nhiệm đóng bảo hiểm y tế mà không đóng hoặc đóng không đầy đủ theo quy định của pháp luật thì cùng với việc phải đóng đủ số tiền chưa đóng, còn phải nộp số tiền lãi trong thời gian chậm đóng theo mức lãi suất cơ bản do Ngân hàng nhà nước công bố; nếu không thực hiện thì theo yêu cầu của người có thẩm quyền xử lý vi phạm hành chính, ngân hàng, tổ chức tín dụng khác, kho bạc nhà nước có trách nhiệm trích tiền từ tài khoản tiền gửi của người có trách nhiệm đóng bảo hiểm y tế để nộp số tiền chưa đóng, chậm đóng và lãi của số tiền này vào tài khoản của quỹ  bảo hiểm y tế."},{"k":"p","t":"CHƯƠNG X"},{"k":"p","t":"ĐIỀU KHOẢN THI HÀNH"}]},{"id":"luat-25_50","no":50,"code":"Điều 50","title":"Điều 50. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thẻ bảo hiểm y tế và thẻ khám bệnh, chữa bệnh miễn phí cho trẻ em dưới 6 tuổi đã được cấp trước ngày Luật này có hiệu lực có giá trị sử dụng như sau:"},{"k":"p","t":"a) Theo thời hạn ghi trên thẻ trong trường hợp thẻ ghi giá trị sử dụng đến ngày 31 tháng 12 năm 2009;"},{"k":"p","t":"b) Đến hết ngày 31 tháng 12 năm 2009 trong trường hợp thẻ ghi giá trị sử dụng sau ngày 31 tháng 12 năm 2009."},{"k":"p","t":"2. Phạm vi quyền lợi của người được cấp thẻ bảo hiểm y tế trước khi Luật này có hiệu lực được thực hiện theo quy định hiện hành của pháp luật về bảo hiểm y tế cho đến hết ngày 31 tháng 12 năm 2009."},{"k":"p","t":"3. Đối tượng quy định tại các khoản 21, 22, 23, 24 và 25 Điều 12 của Luật này khi chưa thực hiện quy định tại các điểm b, c, d và đ khoản 2 Điều 51 của Luật này thì có quyền tự nguyện tham gia bảo hiểm y tế theo quy định của Chính phủ."}]},{"id":"luat-25_51","no":51,"code":"Điều 51","title":"Điều 51. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2009."},{"k":"p","t":"2. Lộ trình thực hiện bảo hiểm y tế toàn dân được quy định như sau:"},{"k":"p","t":"a) Đối tượng quy định từ khoản 1 đến khoản 20 Điều 12 của Luật này thực hiện bảo hiểm y tế từ ngày Luật này có hiệu lực thi hành;"},{"k":"p","t":"b) Đối tượng quy định tại khoản 21 Điều 12 của Luật này thực hiện bảo hiểm y tế từ ngày 01 tháng 01 năm 2010;"},{"k":"p","t":"c) Đối tượng quy định tại khoản 22 Điều 12 của Luật này thực hiện bảo hiểm y tế từ ngày 01 tháng 01 năm 2012;"},{"k":"p","t":"d) Đối tượng quy định tại khoản 23 và khoản 24 Điều 12 của Luật này thực hiện bảo hiểm y tế từ ngày 01 tháng 01 năm 2014;"},{"k":"p","t":"đ) Đối tượng quy định tại khoản 25 Điều 12 của Luật này thực hiện bảo hiểm y tế theo quy định của Chính phủ chậm nhất là ngày 01 tháng 01 năm 2014."}]},{"id":"luat-25_52","no":52,"code":"Điều 52","title":"Điều 52. Quy định chi tiết và hướng dẫn thi hành","shortTitle":"Quy định chi tiết và hướng dẫn thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Chính phủ quy định chi tiết và hướng dẫn thi hành các điều, khoản được giao trong Luật; hướng dẫn những nội dung cần thiết khác của Luật này để đáp ứng yêu cầu của quản lý nhà nước."},{"k":"p","t":"Luật này đã được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XII, kỳ họp thứ 4 thông qua ngày 14 tháng 11 năm 2008."},{"k":"p","t":"CHỦ TỊCH QUỐC HỘI"},{"k":"p","t":"Nguyễn Phú Trọng"},{"k":"p","t":"PAGE  2"}]}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
