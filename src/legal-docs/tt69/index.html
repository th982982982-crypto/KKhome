ng tư này bao gồm:"},{"k":"p","t":"1. Người nộp thuế quy định tại Điều 3 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"2. Cơ quan quản lý thuế theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"3. Các tổ chức, cá nhân khác có liên quan."}]},{"id":"tt69_3","no":3,"code":"Điều 3","title":"Điều 3. Hồ sơ, thủ tục xác định đối tượng không chịu thuế giá trị gia tăng quy định tại Điều 5 Luật Thuế giá trị gia tăng","shortTitle":"Hồ sơ, thủ tục xác định đối tượng không chịu thuế giá trị gia tăng quy định tại Điều 5 Luật Thuế giá trị gia tăng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế căn cứ hàng hóa, dịch vụ quy định tại Điều 5 Luật Thuế giá trị gia tăng và Điều 4 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng để xác định đối tượng không chịu thuế giá trị gia tăng."},{"k":"p","t":"2. Một số trường hợp ngoài việc thực hiện theo quy định tại khoản 1 Điều này, khi cơ quan quản lý nhà nước yêu cầu thì người nộp thuế phải xuất trình hồ sơ, thủ tục sau:"},{"k":"p","t":"a) Đối với sản phẩm giống vật nuôi quy định tại khoản 2 Điều 5 Luật Thuế giá trị gia tăng, người nộp thuế phải có bản công bố tiêu chuẩn áp dụng của cơ sở sản xuất và hồ sơ giống theo quy định của pháp luật về chăn nuôi. Trường hợp nhập khẩu sản phẩm giống vật nuôi, người nộp thuế phải có văn bản xác nhận về nguồn gốc, xuất xứ, chất lượng giống, mục đích sử dụng để nhân giống, tạo giống của cơ quan có thẩm quyền hoặc tổ chức được cơ quan có thẩm quyền của nước xuất khẩu ủy quyền theo quy định của pháp luật về chăn nuôi."},{"k":"p","t":"b) Đối với nhập khẩu báo, tạp chí, bản tin, đặc san, sách chính trị, sách giáo khoa, giáo trình, sách văn bản pháp luật, sách khoa học - kỹ thuật, sách phục vụ thông tin đối ngoại, sách in bằng chữ dân tộc thiểu số và tranh, ảnh, áp phích tuyên truyền cổ động, kể cả dưới dạng băng hoặc đĩa ghi tiếng, ghi hình, dữ liệu điện tử quy định tại khoản 15 Điều 5 Luật Thuế giá trị gia tăng, người nộp thuế phải có Giấy xác nhận nhập khẩu xuất bản phẩm để kinh doanh của cơ quan có thẩm quyền theo quy định của pháp luật về xuất bản."},{"k":"p","t":"c) Đối với hàng hóa, dịch vụ bán cho tổ chức, cá nhân nước ngoài, tổ chức quốc tế để viện trợ nhân đạo, viện trợ không hoàn lại cho Việt Nam quy định tại khoản 19 Điều 5 Luật Thuế giá trị gia tăng, người nộp thuế phải có văn bản của tổ chức, cá nhân nước ngoài, tổ chức quốc tế theo quy định tại điểm b khoản 11 Điều 4 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"d) Đối với chuyển nhượng quyền sở hữu công nghiệp đối với sáng chế, kiểu dáng công nghiệp, thiết kế bố trí, nhãn hiệu là chuyển nhượng quyền sở hữu trí tuệ quy định tại khoản 21 Điều 5 Luật Thuế giá trị gia tăng, người nộp thuế phải có quyết định cấp văn bằng bảo hộ của cơ quan nhà nước có thẩm quyền theo quy định của pháp luật về sở hữu trí tuệ hoặc công nhận đăng ký quốc tế theo điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên và hợp đồng chuyển nhượng quyền sở hữu công nghiệp theo quy định của pháp luật."},{"k":"p","t":"đ) Đối với chuyển nhượng quyền đối với giống cây trồng là chuyển nhượng quyền sở hữu trí tuệ quy định tại khoản 21 Điều 5 Luật Thuế giá trị gia tăng, người nộp thuế phải có quyết định cấp Bằng bảo hộ giống cây trồng của cơ quan nhà nước có thẩm quyền theo quy định của pháp luật về sở hữu trí tuệ và hợp đồng chuyển nhượng quyền đối với giống cây trồng theo quy định của pháp luật."},{"k":"p","t":"e) Đối với hàng hóa nhập khẩu ủng hộ, tài trợ cho phòng, chống, khắc phục hậu quả thảm họa, thiên tai, dịch bệnh, chiến tranh quy định tại điểm d khoản 26 Điều 5 Luật Thuế giá trị gia tăng, người nộp thuế phải có văn bản phê duyệt tiếp nhận hàng hóa ủng hộ, tài trợ của các cơ quan, tổ chức tiếp nhận."}]},{"id":"tt69_4","no":4,"code":"Điều 4","title":"Điều 4. Hồ sơ, thủ tục áp dụng thuế suất thuế giá trị gia tăng 0% đối với hàng hóa, dịch vụ quy định tại khoản 1 Điều 9 Luật Thuế giá trị gia tăng","shortTitle":"Hồ sơ, thủ tục áp dụng thuế suất thuế giá trị gia tăng 0% đối với hàng hóa, dịch vụ quy định tại khoản 1 Điều 9 Luật Thuế giá trị gia tăng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế căn cứ hàng hóa, dịch vụ quy định tại khoản 1 Điều 9 Luật Thuế giá trị gia tăng và Điều 17 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng để xác định đối tượng áp dụng thuế suất thuế giá trị gia tăng 0%."},{"k":"p","t":"2. Khi cơ quan quản lý nhà nước yêu cầu thì người nộp thuế phải xuất trình hồ sơ, thủ tục đảm bảo đáp ứng quy định về điều kiện áp dụng thuế suất 0% quy định tại Điều 18 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"Đối với trường hợp xuất khẩu hàng hóa qua sàn thương mại điện tử ở nước ngoài và một số trường hợp đặc thù khác, khi cơ quan quản lý nhà nước yêu cầu thì người nộp thuế phải xuất trình hồ sơ, thủ tục đảm bảo đáp ứng quy định về điều kiện khấu trừ thuế giá trị gia tăng đầu vào quy định tại Điều 27, Điều 28 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."}]},{"id":"tt69_5","no":5,"code":"Điều 5","title":"Điều 5. Nhóm hàng hóa, dịch vụ thuộc đối tượng áp dụng theo tỷ lệ % để tính thuế giá trị gia tăng quy định tại điểm b khoản 2 Điều 12 Luật Thuế giá trị gia tăng","shortTitle":"Nhóm hàng hóa, dịch vụ thuộc đối tượng áp dụng theo tỷ lệ % để tính thuế giá trị gia tăng quy định tại điểm b khoản 2 Điều 12 Luật Thuế giá trị gia tăng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nhóm hàng hóa, dịch vụ thuộc đối tượng áp dụng theo tỷ lệ % để tính thuế giá trị gia tăng quy định tại điểm b khoản 2 Điều 12 Luật Thuế giá trị gia tăng được quy định tại Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"2. Cơ sở kinh doanh nhiều loại hàng hóa, dịch vụ thuộc đối tượng áp dụng theo các mức tỷ lệ % khác nhau phải khai thuế giá trị gia tăng theo từng mức tỷ lệ % quy định đối với từng loại hàng hóa, dịch vụ; trường hợp cơ sở kinh doanh không xác định doanh thu tính thuế giá trị gia tăng theo từng mức tỷ lệ % tương ứng thì phải áp dụng theo mức tỷ lệ % cao nhất của hàng hóa, dịch vụ mà cơ sở sản xuất, kinh doanh trên toàn bộ doanh thu tính thuế của kỳ tính thuế đó."}]},{"id":"tt69_6","no":6,"code":"Điều 6","title":"Điều 6. Chứng từ nộp thuế giá trị gia tăng thay cho phía nước ngoài quy định tại điểm a khoản 2 Điều 14 Luật Thuế giá trị gia tăng","shortTitle":"Chứng từ nộp thuế giá trị gia tăng thay cho phía nước ngoài quy định tại điểm a khoản 2 Điều 14 Luật Thuế giá trị gia tăng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Tổ chức tại Việt Nam nộp thay nghĩa vụ thuế phải nộp của tổ chức nước ngoài không có cơ sở thường trú tại Việt Nam, cá nhân ở nước ngoài là đối tượng không cư trú tại Việt Nam, nhà cung cấp nước ngoài không có cơ sở thường trú tại Việt Nam phải có chứng từ nộp thuế giá trị gia tăng thay cho phía nước ngoài để khấu trừ thuế giá trị gia tăng đầu vào. Chứng từ nộp thuế giá trị gia tăng thay cho phía nước ngoài là chứng từ nộp ngân sách nhà nước theo quy định của pháp luật."}]},{"id":"tt69_7","no":7,"code":"Điều 7","title":"Điều 7. Cách xác định số thuế giá trị gia tăng được hoàn đối với hàng hóa, dịch vụ xuất khẩu quy định tại khoản 2 Điều 29 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng","shortTitle":"Cách xác định số thuế giá trị gia tăng được hoàn đối với hàng hóa, dịch vụ xuất khẩu quy định tại khoản 2 Điều 29 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Cách xác định số thuế giá trị gia tăng được hoàn đối với hàng hóa, dịch vụ xuất khẩu thực hiện theo quy định tại Phụ lục II ban hành kèm theo Thông tư này."}]},{"id":"tt69_8","no":8,"code":"Điều 8","title":"Điều 8. Cách xác định số thuế giá trị gia tăng được hoàn đối với hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% quy định tại Điều 31 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng","shortTitle":"Cách xác định số thuế giá trị gia tăng được hoàn đối với hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% quy định tại Điều 31 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Cách xác định số thuế giá trị gia tăng được hoàn đối với hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% thực hiện theo quy định tại Phụ lục III ban hành kèm theo Thông tư này."}]},{"id":"tt69_9","no":9,"code":"Điều 9","title":"Điều 9. Thuế giá trị gia tăng áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam","shortTitle":"Thuế giá trị gia tăng áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế giá trị gia tăng áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam quy định tại Điều này áp dụng đối với:"},{"k":"p","t":"a) Tổ chức nước ngoài kinh doanh có cơ sở thường trú tại Việt Nam hoặc không có cơ sở thường trú tại Việt Nam; cá nhân nước ngoài kinh doanh là đối tượng cư trú tại Việt Nam hoặc không là đối tượng cư trú tại Việt Nam (sau đây gọi chung là Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài) kinh doanh tại Việt Nam."},{"k":"p","t":"b) Tổ chức, cá nhân nước ngoài thực hiện một phần hoặc toàn bộ hoạt động kinh doanh phân phối hàng hóa, cung cấp dịch vụ tại Việt Nam trong đó tổ chức, cá nhân nước ngoài vẫn là chủ sở hữu đối với hàng hóa giao cho tổ chức, cá nhân Việt Nam hoặc chịu trách nhiệm về chi phí phân phối, quảng cáo, tiếp thị, chất lượng dịch vụ, chất lượng hàng hóa giao cho tổ chức, cá nhân Việt Nam hoặc ấn định giá bán hàng hóa hoặc giá cung ứng dịch vụ; bao gồm cả trường hợp ủy quyền hoặc thuê tổ chức, cá nhân Việt Nam thực hiện một phần dịch vụ phân phối, dịch vụ khác liên quan đến việc bán hàng hóa tại Việt Nam."},{"k":"p","t":"c) Tổ chức, cá nhân nước ngoài thông qua tổ chức, cá nhân Việt Nam để thực hiện việc đàm phán, ký kết các hợp đồng đứng tên tổ chức, cá nhân nước ngoài."},{"k":"p","t":"d) Tổ chức, cá nhân nước ngoài thực hiện quyền xuất khẩu, quyền nhập khẩu, phân phối tại thị trường Việt Nam, mua hàng hóa để xuất khẩu, bán hàng hóa cho thương nhân Việt Nam theo pháp luật về thương mại."},{"k":"p","t":"2. Thuế giá trị gia tăng áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam quy định tại Điều này không áp dụng đối với:"},{"k":"p","t":"a) Tổ chức được thành lập theo quy định của pháp luật Việt Nam."},{"k":"p","t":"b) Tổ chức, cá nhân nước ngoài thực hiện cung cấp hàng hóa cho tổ chức, cá nhân Việt Nam không kèm theo các dịch vụ được thực hiện tại Việt Nam dưới hình thức giao hàng tại cửa khẩu nước ngoài: người bán chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc xuất khẩu hàng và giao hàng tại cửa khẩu nước ngoài; người mua chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu nước ngoài về đến Việt Nam (kể cả trường hợp giao hàng tại cửa khẩu nước ngoài có kèm điều khoản bảo hành là trách nhiệm và nghĩa vụ của người bán)."},{"k":"p","t":"c) Tổ chức, cá nhân nước ngoài thực hiện cung cấp hàng hóa cho tổ chức, cá nhân Việt Nam không kèm theo các dịch vụ được thực hiện tại Việt Nam dưới hình thức giao hàng tại cửa khẩu Việt Nam: người bán chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến hàng hóa cho đến điểm giao hàng tại cửa khẩu Việt Nam; người mua chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu Việt Nam (kể cả trường hợp giao hàng tại cửa khẩu Việt Nam có kèm điều khoản bảo hành là trách nhiệm và nghĩa vụ của người bán)."},{"k":"p","t":"d) Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ sửa chữa (có bao gồm hoặc không bao gồm vật tư, thiết bị thay thế kèm theo) phương tiện vận tải, máy móc, thiết bị (kể cả đường cáp biển, thiết bị truyền dẫn) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài."},{"k":"p","t":"đ) Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ quảng cáo, tiếp thị (trừ quảng cáo, tiếp thị trên internet) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài."},{"k":"p","t":"e) Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ xúc tiến đầu tư và thương mại cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài."},{"k":"p","t":"g) Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ môi giới bán hàng hóa, môi giới cung cấp dịch vụ ra nước ngoài cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài."},{"k":"p","t":"h) Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ đào tạo (trừ đào tạo trực tuyến) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài."},{"k":"p","t":"i) Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ chia cước (cước thanh toán) dịch vụ, viễn thông quốc tế giữa Việt Nam với nước ngoài; dịch vụ thuê đường truyền dẫn và băng tần vệ tinh của nước ngoài theo quy định của Luật Viễn thông; dịch vụ chia cước (cước thanh toán) dịch vụ bưu chính quốc tế giữa Việt Nam với nước ngoài theo quy định của Luật Bưu chính, các điều ước quốc tế về Bưu chính mà nước Cộng hòa xã hội chủ nghĩa Việt Nam tham gia ký kết cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài."},{"k":"p","t":"k)Tổ chức, cá nhân nước ngoài sử dụng kho ngoại quan, cảng nội địa (ICD) làm kho hàng hóa để phụ trợ cho hoạt động vận tải quốc tế, quá cảnh, chuyển khẩu, lưu trữ hàng hoặc để cho doanh nghiệp khác gia công."},{"k":"p","t":"l) Tổ chức, cá nhân nước ngoài thực hiện cung cấp hàng hóa, dịch vụ khác cho tổ chức, cá nhân Việt Nam mà việc cung cấp các hàng hóa, dịch vụ này được thực hiện ở nước ngoài và không tiêu dùng tại Việt Nam."},{"k":"p","t":"3. Hàng hóa, dịch vụ chịu thuế giá trị gia tăng áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam:"},{"k":"p","t":"a) Dịch vụ hoặc dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế giá trị gia tăng do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp trên cơ sở hợp đồng nhà thầu, hợp đồng nhà thầu phụ sử dụng cho sản xuất, kinh doanh và tiêu dùng tại Việt Nam (trừ các trường hợp quy định tại khoản 2 Điều này) mà các dịch vụ này được cung cấp tại Việt Nam và tiêu dùng tại Việt Nam."},{"k":"p","t":"b) Dịch vụ hoặc dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế giá trị gia tăng do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp trên cơ sở hợp đồng nhà thầu, hợp đồng nhà thầu phụ sử dụng cho sản xuất, kinh doanh và tiêu dùng tại Việt Nam (trừ các trường hợp quy định tại khoản 2 Điều này) mà các dịch vụ này được cung cấp ngoài Việt Nam và tiêu dùng tại Việt Nam."},{"k":"p","t":"c) Trường hợp hàng hóa được cung cấp theo hợp đồng dưới hình thức: điểm giao nhận hàng hóa nằm trong lãnh thổ Việt Nam (trừ trường hợp quy định tại điểm k khoản 2 Điều này) hoặc việc cung cấp hàng hóa có kèm theo dịch vụ tiến hành tại Việt Nam như lắp đặt, chạy thử, bảo hành, bảo dưỡng, thay thế, các dịch vụ khác đi kèm với việc cung cấp hàng hóa (bao gồm cả trường hợp dịch vụ kèm theo miễn phí), kể cả trường hợp việc cung cấp các dịch vụ nêu trên có hoặc không nằm trong giá trị của hợp đồng cung cấp hàng hóa thì giá trị hàng hóa chỉ phải chịu thuế giá trị gia tăng khâu nhập khẩu theo quy định, phân giá trị dịch vụ thuộc đối tượng chịu thuế giá trị gia tăng theo quy định tại Thông tư này. Trường hợp hợp đồng không tách riêng được giá trị hàng hóa và giá trị dịch vụ đi kèm (bao gồm cả trường hợp dịch vụ kèm theo miễn phí) thì thuế giá trị gia tăng được tính chung cho cả hợp đồng."},{"k":"p","t":"4. Cách xác định số thuế giá trị gia tăng phải nộp:"},{"k":"p","t":"a) Số thuế giá trị gia tăng phải nộp theo phương pháp tính trực tiếp theo doanh thu được xác định căn cứ theo giá tính thuế và tỷ lệ %. Trong đó, giá tính thuế giá trị gia tăng là toàn bộ doanh thu do cung cấp dịch vụ, dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế giá trị gia tăng mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được, chưa trừ các khoản thuế phải nộp, kể cả các khoản chi phí do Bên Việt Nam trả thay Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài (nếu có) theo quy định tại Điều 13 Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"b) Số thuế giá trị gia tăng phải nộp theo phương pháp tính trực tiếp theo doanh thu bằng doanh thu tính thuế giá trị gia tăng nhân với tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu."},{"k":"p","t":"c) Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thuộc đối tượng nộp thuế giá trị gia tăng theo phương pháp tính trực tiếp không được khấu trừ thuế giá trị gia tăng đối với hàng hóa, dịch vụ mua vào để thực hiện hợp đồng nhà thầu, hợp đồng nhà thầu phụ."},{"k":"p","t":"5. Doanh thu tính thuế giá trị gia tăng đối với một số trường hợp cụ thể được xác định như sau:"},{"k":"p","t":"a) Trường hợp theo thỏa thuận tại hợp đồng nhà thầu, hợp đồng nhà thầu phụ, doanh thu Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được không bao gồm thuế giá trị gia tăng phải nộp thì doanh thu tính thuế giá trị gia tăng phải được quy đổi thành doanh thu có thuế giá trị gia tăng và được xác định theo công thức sau:"},{"k":"tbl","rows":[["Doanh thu tính thuế giá trị gia tăng","=","Doanh thu chưa bao gồm thuế giá trị gia tăng"],["","","1 - Tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu"]]},{"k":"p","t":"b) Trường hợp Nhà thầu nước ngoài ký hợp đồng với Nhà thầu phụ Việt Nam hoặc Nhà thầu phụ nước ngoài thực hiện nộp thuế theo phương pháp khấu trừ thuế để giao bớt một phần giá trị công việc hoặc hạng mục cho Nhà thầu phụ được quy định tại hợp đồng nhà thầu ký với Bên Việt Nam và danh sách các Nhà thầu phụ Việt Nam, Nhà thầu phụ nước ngoài thực hiện phân công việc hoặc hạng mục tương ứng được liệt kê kèm theo hợp đồng nhà thầu thì doanh thu tính thuế giá trị gia tăng của Nhà thầu nước ngoài không bao gồm giá trị công việc do Nhà thầu phụ Việt Nam hoặc Nhà thầu phụ nước ngoài thực hiện."},{"k":"p","t":"Trường hợp Nhà thầu nước ngoài ký hợp đồng với các nhà cung cấp tại Việt Nam để mua nguyên vật liệu, máy móc, thiết bị để thực hiện hợp đồng nhà thầu và hàng hóa, dịch vụ để phục vụ cho tiêu dùng nội bộ, tiêu dùng các khoản không thuộc hạng mục, công việc mà Nhà thầu nước ngoài thực hiện theo hợp đồng nhà thầu thì giá trị hàng hóa, dịch vụ này không được trừ khi xác định doanh thu tính thuế giá trị gia tăng của Nhà thầu nước ngoài."},{"k":"p","t":"c) Trường hợp Nhà thầu nước ngoài ký hợp đồng với Nhà thầu phụ nước ngoài thực hiện nộp thuế theo phương pháp tính trực tiếp thì Bên Việt Nam khai nộp thuế giá trị gia tăng thay cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài theo tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu tương ứng với ngành kinh doanh mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài đó thực hiện theo hợp đồng nhà thầu, hợp đồng nhà thầu phụ. Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài không phải khai nộp thuế giá trị gia tăng trên phần giá trị công việc mà Bên Việt Nam đã khai nộp thay."},{"k":"p","t":"d) Doanh thu tính thuế giá trị gia tăng đối với trường hợp cho thuê máy móc, thiết bị, phương tiện vận tải là toàn bộ tiền cho thuê. Trường hợp doanh thu cho thuê máy móc, thiết bị, phương tiện vận tải bao gồm các chi phí do bên cho thuê trực tiếp chi trả như bảo hiểm phương tiện, bảo dưỡng, chứng nhận đăng kiểm, người điều khiển phương tiện, máy móc và chi phí vận chuyển máy móc, thiết bị từ nước ngoài đến Việt Nam thì doanh thu tính thuế giá trị gia tăng không bao gồm các khoản chi phí này nếu có chứng từ thực tế chứng minh."},{"k":"p","t":"đ) Đối với dịch vụ giao nhận, kho vận quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế giá trị gia tăng là toàn bộ doanh thu Nhà thầu nước ngoài nhận được không bao gồm cước vận chuyển quốc tế phải trả cho hãng vận chuyển (hàng không, đường biển)."},{"k":"p","t":"e) Đối với dịch vụ chuyển phát quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế giá trị gia tăng là toàn bộ doanh thu Nhà thầu nước ngoài nhận được."},{"k":"p","t":"6. Tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu:"},{"k":"p","t":"a) Tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam (trừ dịch vụ cung cấp qua kênh thương mại điện tử và các nền tảng số) thực hiện theo quy định tại điểm b khoản 2 Điều 12 Luật Thuế giá trị gia tăng và Điều 5 Thông tư này."},{"k":"p","t":"b) Đối với các hợp đồng nhà thầu, hợp đồng nhà thầu phụ bao gồm nhiều hoạt động kinh doanh khác nhau hoặc một phần giá trị hợp đồng không thuộc diện chịu thuế giá trị gia tăng, việc áp dụng tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu khi xác định số thuế giá trị gia tăng phải nộp căn cứ vào doanh thu tính thuế giá trị gia tăng đối với từng hoạt động kinh doanh do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thực hiện theo quy định tại hợp đồng nhà thầu, hợp đồng nhà thầu phụ. Trường hợp không tách riêng được giá trị từng hoạt động kinh doanh thì áp dụng tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu cao nhất đối với ngành nghề kinh doanh cho toàn bộ giá trị hợp đồng."},{"k":"p","t":"Riêng đối với hoạt động xây dựng, lắp đặt có bao thầu nguyên vật liệu hoặc máy móc, thiết bị đi kèm công trình xây dựng: Trường hợp hợp đồng nhà thầu tách riêng được giá trị từng hoạt động kinh doanh thì Nhà thầu nước ngoài không phải nộp thuế giá trị gia tăng trên giá trị nguyên vật liệu hoặc máy móc, thiết bị đã nộp thuế giá trị gia tăng ở khâu nhập khẩu hoặc thuộc diện không chịu thuế giá trị gia tăng; đối với từng phần giá trị công việc còn lại theo hợp đồng thì áp dụng tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu tương ứng với hoạt động kinh doanh đó. Trường hợp hợp đồng nhà thầu không tách riêng được giá trị từng hoạt động kinh doanh thì áp dụng tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu là 3% tính trên toàn bộ giá trị hợp đồng (bao gồm cả giá trị nguyên vật liệu hoặc máy móc, thiết bị nhập khẩu). Trường hợp Nhà thầu nước ngoài ký hợp đồng với các Nhà thầu phụ để giao lại toàn bộ các phần giá trị công việc hoặc hạng mục có bao thầu nguyên vật liệu hoặc máy móc, thiết bị, Nhà thầu nước ngoài chỉ thực hiện phần giá trị dịch vụ còn lại theo hợp đồng nhà thầu thì tỷ lệ % để tính thuế giá trị gia tăng được áp dụng đối với ngành nghề dịch vụ (5%)."},{"k":"p","t":"c) Đối với hợp đồng cung cấp máy móc, thiết bị có kèm theo các dịch vụ thực hiện tại Việt Nam, nếu tách riêng được giá trị máy móc, thiết bị và giá trị các dịch vụ khi xác định số thuế giá trị gia tăng phải nộp thì áp dụng tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu của từng phần giá trị hợp đồng. Trường hợp trong hợp đồng không tách riêng được giá trị máy móc, thiết bị và giá trị các dịch vụ thì áp dụng tỷ lệ % để tính thuế giá trị gia tăng trên doanh thu tính thuế là 3%."},{"k":"p","t":"7. Thuế giá trị gia tăng đối với Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm, thăm dò, phát triển và khai thác mỏ dầu, khí đốt:"},{"k":"p","t":"a) Trường hợp Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm, thăm dò, phát triển và khai thác mỏ dầu, khí đốt nếu không đáp ứng được điều kiện áp dụng phương pháp khấu trừ thuế thì Bên Việt Nam có trách nhiệm khấu trừ, nộp thay thuế giá trị gia tăng trước khi thanh toán. Số thuế nộp thay tính bằng tổng số tiền thanh toán chưa bao gồm thuế giá trị gia tăng nhân (x) với mức thuế suất thuế giá trị gia tăng quy định đối với hàng hóa, dịch vụ do Nhà thầu nước ngoài cung cấp."},{"k":"p","t":"b) Trường hợp Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm, thăm dò, phát triển và khai thác mỏ dầu, khí đốt đáp ứng được điều kiện áp dụng phương pháp khấu trừ thuế hoặc đáp ứng điều kiện có cơ sở thường trú tại Việt Nam, hoặc là đối tượng cư trú tại Việt Nam, có thời hạn kinh doanh tại Việt Nam theo hợp đồng nhà thầu, hợp đồng nhà thầu phụ từ 183 ngày trở lên kể từ ngày hợp đồng nhà thầu, hợp đồng nhà thầu phụ có hiệu lực và tổ chức hạch toán kế toán theo quy định của pháp luật về kế toán và hướng dẫn của Bộ Tài chính thì thực hiện như sau:"},{"k":"p","t":"Trong thời gian Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài chưa được cơ quan thuế cấp giấy chứng nhận đăng ký thuế để khai, nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế, nếu Bên Việt Nam thanh toán tiền cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thì Bên Việt Nam có trách nhiệm khấu trừ nộp thay thuế giá trị gia tăng trước khi thanh toán theo quy định tại điểm a khoản này. Khi Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài được cơ quan thuế cấp giấy chứng nhận đăng ký thuế thì Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài chuyển hóa đơn, chứng từ phát sinh trong kỳ khai thuế giá trị gia tăng cho Bên Việt Nam để Bên Việt Nam khai khấu trừ, nộp thay thuế giá trị gia tăng cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài."},{"k":"p","t":"Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài không được khấu trừ thuế giá trị gia tăng đầu vào phát sinh trước khi được cấp giấy chứng nhận đăng ký thuế."},{"k":"p","t":"8. “Hợp đồng nhà thầu” quy định tại Thông tư này là hợp đồng, thỏa thuận hoặc cam kết giữa Nhà thầu nước ngoài và Bên Việt Nam. “Hợp đồng nhà thầu phụ” quy định tại Thông tư này là hợp đồng, thỏa thuận hoặc cam kết giữa Nhà thầu phụ và Nhà thầu nước ngoài, trong đó, Nhà thầu phụ gồm Nhà thầu phụ nước ngoài và Nhà thầu phụ Việt Nam."},{"k":"p","t":"9. Quy định về cơ sở thường trú và đối tượng cư trú tại Thông tư này thực hiện theo quy định của pháp luật về thuế thu nhập doanh nghiệp và pháp luật về thuế thu nhập cá nhân."}]},{"id":"tt69_10","no":10,"code":"Điều 10","title":"Điều 10. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025."},{"k":"p","t":"2. Thông tư này thay thế:"},{"k":"p","t":"a) Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Luật Thuế giá trị gia tăng và Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều Luật Thuế giá trị gia tăng."},{"k":"p","t":"b) Thông tư số 193/2015/TT-BTC ngày 24 tháng 11 năm 2015 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung Thông tư số 219/2013/TT-BTC ngày 31"},{"k":"p","t":"tháng 12 năm 2013 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Luật Thuế giá trị gia tăng và Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều Luật Thuế giá trị gia tăng."},{"k":"p","t":"c) Thông tư số 173/2016/TT-BTC ngày 28 tháng 10 năm 2016 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung khổ thứ nhất khoản 3 Điều 15 Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013 của Bộ trưởng Bộ Tài chính (đã được sửa đổi, bổ sung theo Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014, Thông tư số 151/2014/TT-BTC ngày 10 tháng 10 năm 2014, Thông tư số 26/2015/TT-BTC ngày 27 tháng 02 năm 2015 của Bộ trưởng Bộ Tài chính)."},{"k":"p","t":"d) Thông tư số 82/2018/TT-BTC ngày 30 tháng 8 năm 2018 của Bộ trưởng Bộ Tài chính bãi bỏ nội dung ví dụ 37 quy định tại điểm a.4 khoản 10 Điều 7 Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Luật Thuế giá trị gia tăng và Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"đ) Thông tư số 43/2021/TT-BTC ngày 11 tháng 6 năm 2021 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung khoản 11 Điều 10 Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Luật Thuế giá trị gia tăng và Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều Luật Thuế giá trị gia tăng (đã được sửa đổi, bổ sung tại Thông tư số 26/2015/TT-BTC ngày 27 tháng 02 năm 2015 của Bộ trưởng Bộ Tài chính)."},{"k":"p","t":"e) Thông tư số 13/2023/TT-BTC ngày 28 tháng 02 năm 2023 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Nghị định số 49/2022/NĐ-CP ngày 29 tháng 7 năm 2022 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Thuế giá trị gia tăng đã được sửa đổi, bổ sung một số điều theo Nghị định số 12/2015/NĐ-CP, Nghị định số 100/2016/NĐ-CP và Nghị định số 146/2017/NĐ-CP và sửa đổi bổ sung Thông tư số 80/2021/TT-BTC ngày 29 tháng 9 năm 2021 của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Bãi bỏ quy định tại:"},{"k":"p","t":"a) Chương 2 Thông tư số 09/2011/TT-BTC ngày 21 tháng 01 năm 2011 của Bộ trưởng Bộ Tài chính hướng dẫn về thuế giá trị gia tăng, thuế thu nhập doanh nghiệp đối với lĩnh vực kinh doanh bảo hiểm."},{"k":"p","t":"b) Điều 3 Thông tư số 128/2011/TT-BTC ngày 12 tháng 9 năm 2011 của Bộ trưởng Bộ Tài chính hướng dẫn về thuế giá trị gia tăng và thuế thu nhập doanh nghiệp đối với cơ sở y tế công lập."},{"k":"p","t":"c) Điều 6, Điều 9, Điều 12 và Điều 15 Thông tư số 103/2014/TT-BTC ngày 06 tháng 8 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện nghĩa vụ thuế áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam hoặc có thu nhập phát sinh tại Việt Nam."},{"k":"p","t":"d) Điều 3 Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 156/2013/TT-BTC ngày 06 tháng 11 năm 2013, Thông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013, Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013, Thông tư số 08/2013/TT-BTC ngày 10 tháng 01 năm 2013, Thông tư số 85/2011/TT-BTC ngày 17 tháng 6 năm 2011, Thông tư số 39/2014/TT-BTC ngày 31 tháng 3 năm 2014 và Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ trưởng Bộ Tài chính để cải cách, đơn giản các thủ tục hành chính về thuế."},{"k":"p","t":"đ) Chương II Thông tư số 151/2014/TT-BTC ngày 10 tháng 10 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Nghị định số 91/2014/NĐ-CP ngày 01 tháng 10 năm 2014 của Chính phủ về việc sửa đổi, bổ sung một số điều tại các Nghị định quy định về thuế."},{"k":"p","t":"e) Điều 1 Thông tư số 26/2015/TT-BTC ngày 27 tháng 02 năm 2015 của Bộ trưởng Bộ Tài chính hướng dẫn về thuế giá trị gia tăng và quản lý thuế tại Nghị định số 12/2015/NĐ-CP ngày 12 tháng 2 năm 2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật về thuế và sửa đổi, bổ sung một số điều của các Nghị định về thuế và sửa đổi, bổ sung một số điều của Thông tư số 39/2014/TT-BTC ngày 31 tháng 3 năm 2014 của Bộ trưởng Bộ Tài chính về hóa đơn bán hàng hóa, cung ứng dịch vụ."},{"k":"p","t":"g) Điều 1 Thông tư số 130/2016/TT-BTC ngày 12 tháng 8 năm 2016 của Bộ trưởng Bộ Tài chính hướng dẫn Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của Luật Thuế giá trị gia tăng, Luật Thuế tiêu thụ đặc biệt và Luật Quản lý thuế và sửa đổi một số điều tại các Thông tư về thuế."},{"k":"p","t":"h) Điều 1 Thông tư số 93/2017/TT-BTC ngày 19 tháng 9 năm 2017 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung khoản 3, khoản 4 Điều 12 Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013 (đã được sửa đổi, bổ sung tại Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014) và bãi bỏ khoản 7 Điều 11 Thông tư số 156/2013/TT-BTC ngày 06 tháng 11 năm 2013 của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"i) Điều 1, Điều 2 Thông tư số 25/2018/TT-BTC ngày 16 tháng 3 năm 2018 của Bộ trưởng Bộ Tài chính hướng dẫn Nghị định số 146/2017/NĐ-CP ngày 15 tháng 12 năm 2017 của Chính phủ và sửa đổi, bổ sung một số điều của Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ trưởng Bộ Tài chính, Thông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013 của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"4. Trong quá trình thực hiện, nếu có khó khăn, vướng mắc, đề nghị các đơn vị, cơ sở kinh doanh phản ánh kịp thời về Bộ Tài chính để được giải quyết./."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Văn phòng Trung ương Đảng và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Quốc hội;\n- Văn phòng Chính phủ;\n- Hội đồng Dân tộc;\n- Ủy ban Kinh tế và Tài chính;\n- Văn phòng Chủ tịch nước;\n- Viện kiểm sát nhân dân tối cao;\n- Tòa án nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Cơ quan Trung ương của các đoàn thể;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc trung ương;\n- Chi cục Hải quan, Kho bạc Nhà nước khu vực;\n- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính,\nBộ Tư pháp;\n- Công báo, Cổng Thông tin điện tử của Chính phủ;\n- Cổng Thông tin điện tử Bộ Tài chính;\n- Các đơn vị thuộc Bộ Tài chính;\n- Lưu: VT, CST (170b).","KT. BỘ TRƯỞNG\nTHỨ TRƯỞNGCao Anh Tuấn"]]},{"k":"p","t":"Phụ lục I"},{"k":"p","t":"NHÓM HÀNG HÓA, DỊCH VỤ THUỘC ĐỐI TƯỢNG ÁP DỤNGTHEO TỶ LỆ % ĐỂ TÍNH THUẾ GIÁ TRỊ GIA TĂNG"},{"k":"p","t":"(Kèm theo Thông tư số 69/2025/TT-BTC ngày 01 tháng 7 năm 2025 của Bộtrưởng Bộ Tài chính)"},{"k":"p","t":"______________"},{"k":"tbl","rows":[["Stt","Danh mục nhóm hàng hóa, dịch vụ","Tỷ lệ % tính thuế GTGT"],["1","Phân phối, cung cấp hàng hóa theo quy định tại điểm b1 khoản 2 Điều 12 Luật Thuế giá trị gia tăng\na) Hoạt động bán buôn, bán lẻ các loại hàng hóa (trừ giá trị hàng hóa đại lý bán đúng giá hưởng hoa hồng).\nb) Khoản thưởng, hỗ trợ đạt doanh số, khuyến mại, chiết khấu thương mại, chiết khấu thanh toán, chi hỗ trợ bằng tiền hoặc không bằng tiền cho hộ khoán.","1 %"],["2","Dịch vụ, xây dựng không bao thầu nguyên vật liệu theo quy định tại điểm b2 khoản 2 Điều 12 Luật Thuế giá trị gia tăng\na) Dịch vụ lưu trú gồm: Hoạt động cung cấp cơ sở lưu trú ngắn hạn cho khách du lịch, khách vãng lai khác; hoạt động cung cấp cơ sở lưu trú dài hạn không phải là căn hộ cho sinh viên, công nhân và những đối tượng tương tự; hoạt động cung cấp cơ sở lưu trú cùng dịch vụ ăn uống hoặc các phương tiện giải trí.\nb) Dịch vụ bốc xếp hàng hóa và hoạt động dịch vụ hỗ trợ khác liên quan đến vận tải như kinh doanh bến bãi, bán vé, trông giữ phương tiện.\nc) Dịch vụ bưu chính, chuyển phát thư tín và bưu kiện.\nd) Dịch vụ môi giới, đấu giá và hoa hồng đại lý.\nđ) Dịch vụ tư vấn pháp luật, tư vấn tài chính, kế toán, kiểm toán; dịch vụ làm thủ tục hành chính thuế, hải quan.\ne) Dịch vụ xử lý dữ liệu, cho thuê cổng thông tin, thiết bị công nghệ thông tin, viễn thông; quảng cáo trên sản phẩm, dịch vụ nội dung thông tin số.\ng) Dịch vụ hỗ trợ văn phòng và các dịch vụ hỗ trợ kinh doanh khác.\nh) Dịch vụ tắm hơi, massage, karaoke, vũ trường, bi-a, internet, game.\ni) Dịch vụ may đo, giặt là; cắt tóc, làm đầu, gội đầu.\nk) Dịch vụ sửa chữa khác bao gồm: sửa chữa máy vi tính và các đồ dùng gia đình.\nl) Dịch vụ tư vấn, thiết kế, giám sát thi công xây dựng cơ bản.\nm) Các dịch vụ khác thuộc đối tượng tính thuế giá trị gia tăng theo phương pháp khấu trừ thuế với mức thuế suất thuế giá trị gia tăng 10%.\nn) Xây dựng, lắp đặt không bao thầu nguyên vật liệu (bao gồm cả lắp đặt máy móc, thiết bị công nghiệp).\no) Cho thuê tài sản gồm:\n- Cho thuê nhà, đất, cửa hàng, nhà xưởng, kho bãi trừ dịch vụ lưu trú.\n- Cho thuê phương tiện vận tải, máy móc thiết bị không kèm theo người điều khiển.\n- Cho thuê tài sản khác không kèm theo dịch vụ.","5%"],["3","Sản xuất, vận tải, dịch vụ có gắn với hàng hóa, xây dựng có bao thầu nguyên vật liệu theo quy định tại điểm b3 khoản 2 Điều 12 Luật Thuế giá trị gia tăng\na) Sản xuất, gia công, chế biến sản phẩm hàng hóa.\nb) Khai thác, chế biến khoáng sản.\nc) Vận tải hàng hóa, vận tải hành khách.\nd) Dịch vụ kèm theo bán hàng hóa như dịch vụ đào tạo, bảo dưỡng, chuyển giao công nghệ kèm theo bán sản phẩm.\nđ) Dịch vụ ăn uống.\ne) Dịch vụ sửa chữa và bảo dưỡng máy móc thiết bị, phương tiện vận tải, ô tô, mô tô, xe máy và xe có động cơ khác.\ng) Xây dựng, lắp đặt có bao thầu nguyên vật liệu (bao gồm cả lắp đặt máy móc, thiết bị công nghiệp).\nh) Hoạt động khác thuộc đối tượng tính thuế giá trị gia tăng theo phương pháp khấu trừ thuế với mức thuế suất thuế giá trị gia tăng 10%.","3 %"],["4","Hoạt động kinh doanh khác theo quy định tại điểm b4 khoản 2 Điều 12 Luật Thuế giá trị gia tăng\na) Hoạt động sản xuất các sản phẩm thuộc đối tượng tính thuế giá trị gia tăng theo phương pháp khấu trừ thuế với mức thuế\nsuất thuế giá trị gia tăng 5%.\nb) Hoạt động cung cấp các dịch vụ thuộc đối tượng tính thuế giá trị gia tăng theo phương pháp khấu trừ thuế với mức thuế suất thuế giá trị gia tăng 5%.\nc) Hoạt động khác chưa được liệt kê ở các nhóm 1, 2, 3 nêu trên và điểm a, điểm b khoản này.","2%"]]},{"k":"p","t":"Phụ lục II"},{"k":"p","t":"CÁCH XÁC ĐỊNH SỐ THUẾ ĐƯỢC HOÀN ĐỐI VỚI HÀNG HÓA, DỊCH VỤ XUẤT KHẨU"},{"k":"p","t":"(Kèm theo Thông tư số 69/2025/TT-BTC ngày 01 tháng 7 năm 2025 của Bộ trưởng Bộ Tài chính)"},{"k":"p","t":"______________"},{"k":"p","t":"Cách xác định số thuế giá trị gia tăng được hoàn đối với hàng hóa, dịch vụxuất khẩu đối với trường hợp cơ sở kinh doanh trong tháng, quý vừa có hànghóa, dịch vụ xuất khẩu, vừa có hàng hóa, dịch vụ tiêu thụ nội địa như sau:"},{"k":"tbl","rows":[["Số thuế giá trịgia tăng đầu vào được khấu trừ sử dụng cho sản xuất, kinhdoanh hànghóa, dịch vụxuất khẩu củakỳ hoàn thuế(1)","=","Số thuế giá trịgia tăng đầu vào được khấu trừ sử dụng cho sản xuất, ( kinh doanh hàng hóa, dịch vụ xuất khẩu hạch toán riêng được của kỳ hoàn thuế (2)","+ (","Số thuế giá trịgia tăng đầu vàođược khấu trừsử dụng đồngthời cho hoạtđộng sản xuất,kinh doanh hànghóa, dịch vụxuất khẩu vàtiêu thụ nội địakhông hạch toánriêng được củakỳ hoàn thuế (3)","x","Doanh thu củahàng hóa, dịchvụ xuất khẩu(trừ doanh thucủa hàng hoánhập khẩu sauđó xuất khẩusang nướckhác) của kỳhoàn thuế",")"],["","","","","","","Tổng doanhthu hàng hóa,dịch vụ chịuthuế của kỳhoàn thuế",""]]},{"k":"tbl","rows":[["Số thuế giá trịgia tăng đầuvào được khấu trừ sử dụng cho sản xuất, kinhdoanh hànghóa, dịch vụ xuất khẩu hạch toán riêng được của kỳ hoàn thuế (2)","=","Số thuế giá trịgia tăng đầuvào chưa khấu trừ hết sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụxuất khẩu hạch toán riêng được kỳ trước chuyển sang tại kỳtính thuế đầutiên thuộc kỳhoàn thuế","+","Số thuế giátrị gia tăngđầu vào được khấutrừ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu hạch toán riêng được phátsinh trong các kỳ tính thuế thuộckỳ hoàn thuế","+","Chênh lệchđiều chỉnhtăng, giảm sốthuế giá trị gia tăng đầu vào được khấu trừ sử dụng chosản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế (4)"]]},{"k":"tbl","rows":[["Số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng đồng thời cho hoạtđộng sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu và tiêu thụ nội địa không hạch toán riêng được của kỳ hoàn thuế (3)","=","Số thuế giá trị gia tăng đầu vào chưa khấu trừ hết sử dụng đồng thời cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụxuất khẩu và tiêu thụ nội địa khônghạch toán riêng được kỳ trước chuyển sang tạikỳ tính thuế đầu tiên thuộc kỳhoàn thuế","+","Số thuế giá trị gia tăng đầu vàođược khấu trừ sử dụng đồng thờicho hoạt động sảnxuất, kinh doanh hàng hóa, dịch vụxuất khẩu và tiêu thụ nội địa khônghạch toán riêng được phát sinhtrong các kỳ tính thuế thuộc kỳhoàn thuế","+","Chênh lệch điều chỉnh tăng, giảm số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng đồng thời cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu và tiêu thụ nội địa không hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế (5)"]]},{"k":"p","t":"Trong đó:"},{"k":"p","t":"Chênh lệch điều chỉnh tăng, giảm số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế (4) = Điều chỉnh tăng số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế trừ (-) Điều chỉnh giảm số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế."},{"k":"p","t":"Chênh lệch điều chỉnh tăng, giảm số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng đồng thời cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu và tiêu thụ nội địa không hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế (5) = Điều chỉnh tăng số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng đồng thời cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu và tiêu thụ nội địa không hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế trừ (-) Điều chỉnh giảm số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng đồng thời cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu và tiêu thụ nội địa không hạch toán riêng được của các kỳ tính thuế trước kỳ hoàn thuế."},{"k":"p","t":"Nếu số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu của kỳ hoàn thuế (1) nêu trên sau khi bù trừ với số thuế giá trị gia tăng phải nộp của hàng hóa, dịch vụ tiêu thụ nội địa còn lại từ 300 triệu đồng trở lên thì cơ sở kinh doanh được hoàn thuế cho hàng hóa, dịch vụ xuất khẩu. Số thuế giá trị gia tăng được hoàn của hàng hóa, dịch vụ xuất khẩu không vượt quá 10% doanh thu của hàng hóa, dịch vụ xuất khẩu (trừ doanh thu của hàng hoá nhập khẩu sau đó xuất khẩu sang nước khác) của kỳ hoàn thuế."},{"k":"p","t":"Phụ lục III"},{"k":"p","t":"CÁCH XÁC ĐỊNH SỐ THUẾ ĐƯỢC HOÀN ĐỐI VỚI HOẠT ĐỘNG SẢNXUẤT HÀNG HÓA, CUNG CẤP DỊCH VỤ CHỊU THUẾ SUẤT THUẾGIÁ TRỊ GIA TĂNG 5%"},{"k":"p","t":"(Kèm theo Thông tư số 69/2025/TT-BTC ngày 01 tháng 7 năm 2025 của Bộtrưởng Bộ Tài chính)"},{"k":"p","t":"_____________"},{"k":"p","t":"Cách xác định số thuế giá trị gia tăng được hoàn đối với hoạt động sảnxuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% như sau:"},{"k":"tbl","rows":[["Số thuế giá trịgia tăng đầuvào được khấu trừ sử dụng cho sản xuất, kinhdoanh hànghóa, dịch vụxuất khẩu củakỳ hoàn thuế(1)","=","Số thuế giá trị\ngia tăng đầu vào được khấu trừ sử dụng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% hạch toán riêng được của kỳ hoàn  thuế (2)","+ (","Số thuế giá trị gia tăng đầu vào được khấu trừ sử dụng đồng thời cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% và sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ chịu nhiều mức thuế suất khác (bao gồm hàng hóa, dịch vụ chịu thuế suất thuế giá trị gia tăng 5% hoạt động kinh doanh thương mại) không hạch toán riêng được của kỳ hoàn thuế (3)","x","Doanh thu của hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% của kỳ hoàn thuế",")"],["","","","","","","Tổng doanhthu hàng hóa,dịch vụ chịuthuế của kỳhoàn thuế",""]]},{"k":"tbl","rows":[["Số var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function summaryHtml(s){
  if(!s||(!s.tldr&&!(s.points&&s.points.length)))return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
  var h='';
  if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
  if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
  return h;
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
