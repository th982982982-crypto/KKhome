huật, nhân sự, bảo đảm an toàn thông tin, bảo mật dữ liệu của tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử."},{"k":"p","t":"2. Quy định chi tiết khoản 1, khoản 3, khoản 5, khoản 7 Điều 4, điểm a.2.5, điểm b.1.5, điểm d khoản 2 Điều 6, khoản 8 Điều 8, điểm a, điểm q khoản 4 Điều 9, khoản 7, khoản 8 Điều 10, điểm a.2, a.3, a.4 khoản 2 Điều 12, điểm a.1, điểm a.2 khoản 3 Điều 16, khoản 2 Điều 22, điểm b khoản 3 Điều 29, khoản 4 Điều 37, khoản 5 Điều 41, Điều 44 Nghị định số 254/2026/NĐ-CP của Chính phủ, bao gồm:"},{"k":"p","t":"a) Trình tự, thủ tục cấp hóa đơn điện tử theo từng lần phát sinh;"},{"k":"p","t":"b) Nội dung hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế;"},{"k":"p","t":"c) Các trường hợp chuyển dữ liệu hóa đơn điện tử, chứng từ điện tử, cơ sở dữ liệu thông tin chi tiết giao dịch phát sinh theo mẫu quy định bao gồm: hoạt động kinh doanh casino và trò chơi điện tử có thưởng; chuyển dữ liệu hóa đơn điện tử theo bảng tổng hợp dữ liệu hóa đơn điện tử; bảng tổng hợp dữ liệu biên lai điện tử; chuyển cơ sở dữ liệu thông tin chi tiết giao dịch theo bảng thông tin chi tiết giao dịch;"},{"k":"p","t":"d) Cung cấp, tra cứu thông tin hóa đơn điện tử; đăng ký mới, bổ sung thông tin đăng ký, thu hồi tài khoản truy cập Hệ thống thông tin quản lý thuế; chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử;"},{"k":"p","t":"đ) Mức khen thưởng, hình thức, trình tự, thủ tục khen thưởng, quản lý, sử dụng kinh phí khen thưởng người tiêu dùng tố giác người bán không lập và giao hóa đơn điện tử;"},{"k":"p","t":"e) Trình tự, thủ tục tiêu huỷ hóa đơn đặt in của cơ quan thuế, biên lai giấy, hóa đơn bán hàng dự trữ quốc gia (hóa đơn bằng giấy)."}]},{"id":"tt91_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng áp dụng quy định tại Thông tư này là tổ chức, cá nhân quy định tại Điều 2 Nghị định số 254/2026/NĐ-CP."}]},{"id":"tt91_3","no":3,"code":"Điều 3","title":"Điều 3. Định dạng hóa đơn điện tử","shortTitle":"Định dạng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Định dạng hóa đơn điện tử là tiêu chuẩn kỹ thuật quy định kiểu dữ liệu, chiều dài dữ liệu của các trường thông tin phục vụ truyền nhận, lưu trữ và hiển thị hóa đơn điện tử. Định dạng hóa đơn điện tử sử dụng ngôn ngữ định dạng văn bản XML (XML là chữ viết tắt của cụm từ tiếng Anh “eXtensible Markup Language” được tạo ra với mục đích chia sẻ dữ liệu điện tử giữa các hệ thống công nghệ thông tin)."},{"k":"p","t":"2. Định dạng hóa đơn điện tử gồm hai thành phần: thành phần chứa dữ liệu nghiệp vụ hóa đơn điện tử và thành phần chứa dữ liệu chữ ký số. Đối với hóa đơn điện tử có mã của cơ quan thuế thì có thêm thành phần chứa dữ liệu liên quan đến mã cơ quan thuế."},{"k":"p","t":"3. Cục Thuế xây dựng thành phần chứa dữ liệu nghiệp vụ hóa đơn điện tử và phương thức truyền nhận với cơ quan thuế. Riêng với hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế, Cục Thuế chủ trì, Cục Hải quan phối hợp xây dựng thành phần chứa dữ liệu nghiệp vụ đối với các nội dung trên hóa đơn dành cho cơ quan hải quan và ngân hàng thương mại là đại lý hoàn thuế. Cục Thuế công bố thành phần chứa dữ liệu nghiệp vụ hóa đơn điện tử và phương thức truyền nhận với cơ quan quản lý thuế để áp dụng thống nhất; cung cấp công cụ hiển thị các nội dung của hóa đơn điện tử theo quy định tại Thông tư này. Thành phần chứa dữ liệu chữ ký số thực hiện theo quy định của pháp luật giao dịch điện tử."},{"k":"p","t":"4. Tổ chức kinh tế theo quy định tại điểm b.1 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP khi chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế bằng hình thức gửi trực tiếp phải đáp ứng yêu cầu sau:"},{"k":"p","t":"a) Kết nối với Cục Thuế thông qua kênh thuê riêng hoặc kênh MPLS VPN Layer 3, gồm 1 kênh truyền chính và 1 kênh truyền dự phòng. Mỗi kênh truyền có băng thông tối thiểu 5 Mbps;"},{"k":"p","t":"b) Sử dụng dịch vụ Web (Web Service) hoặc Message Queue (MQ) có mã hóa làm phương thức để kết nối;"},{"k":"p","t":"c) Sử dụng giao thức SOAP để đóng gói và truyền nhận dữ liệu."},{"k":"p","t":"5. Hóa đơn điện tử phải được hiển thị đầy đủ, chính xác các nội dung của hóa đơn đảm bảo không dẫn tới cách hiểu sai lệch, để người mua có thể đọc được bằng phương tiện điện tử."}]},{"id":"tt91_4","no":4,"code":"Điều 4","title":"Điều 4. Ký hiệu mẫu, ký hiệu và mẫu hóa đơn điện tử tham khảo","shortTitle":"Ký hiệu mẫu, ký hiệu và mẫu hóa đơn điện tử tham khảo","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Ký hiệu mẫu hóa đơn điện tử là ký tự có một chữ số tự nhiên là các số 1, 2, 3, 4, 5, 6, 7, 8, 9 để phản ánh loại hóa đơn điện tử."},{"k":"p","t":"2. Ký hiệu hóa đơn điện tử là nhóm sáu ký tự gồm cả chữ viết và chữ số thể hiện ký hiệu hóa đơn điện tử để phản ánh các thông tin về loại hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử không có mã của cơ quan thuế, năm lập hóa đơn, loại hóa đơn điện tử được sử dụng."},{"k":"p","t":"3. Tên, địa chỉ, mã số thuế của bên nhận ủy nhiệm đối với hóa đơn điện tử ủy nhiệm."},{"k":"p","t":"4. Quy định chi tiết về ký hiệu mẫu, ký hiệu hóa đơn tại Phụ lục I kèm theo Thông tư này."},{"k":"p","t":"5. Mẫu hiển thị các loại hóa đơn điện tử quy định tại Phụ lục V kèm theo Thông tư này để các đối tượng tại Điều 2 Thông tư này tham khảo trong quá trình thực hiện."},{"k":"p","t":"6. Các trường hợp chuyển dữ liệu hóa đơn điện tử, chứng từ điện tử:"},{"k":"p","t":"a) Người nộp thuế theo quy định tại điểm q khoản 4 Điều 9 Nghị định số 254/2026/NĐ-CP thực hiện chuyển dữ liệu theo Bảng tổng hợp doanh thu theo Mẫu số 01/TH-DT Phụ lục III kèm theo Thông tư này;"},{"k":"p","t":"b) Người nộp thuế theo quy định tại điểm a.1 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP thực hiện chuyển dữ liệu hóa đơn điện tử theo Bảng tổng hợp dữ liệu hóa đơn điện tử gửi cơ quan thuế theo Mẫu số 01/TH-HĐĐT Phụ lục III kèm theo Thông tư này;"},{"k":"p","t":"c) Người nộp thuế theo quy định tại điểm a.2 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP thực hiện chuyển cơ sở dữ liệu thông tin chi tiết giao dịch phát sinh theo Bảng thông tin chi tiết giao dịch theo Mẫu số 01/TTGD Phụ lục III kèm theo Thông tư này;"},{"k":"p","t":"d) Tổ chức thu thuế, phí, lệ phí điện tử, tổ chức nhận ủy nhiệm lập biên lai theo quy định tại điểm b khoản 3 Điều 29 Nghị định số 254/2026/NĐ-CP thực hiện chuyển dữ liệu biên lai điện tử theo Bảng tổng hợp dữ liệu biên lai điện tử gửi cơ quan thuế theo Mẫu số 01/TH-BLĐT Phụ lục III kèm theo Thông tư này."}]},{"id":"tt91_5","no":5,"code":"Điều 5","title":"Điều 5. Nội dung hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế","shortTitle":"Nội dung hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung hóa đơn"},{"k":"p","t":"a) Phần A dành cho doanh nghiệp bán hàng hoàn thuế lập khi bán hàng hóa, gồm các nội dung sau:"},{"k":"p","t":"a.1) Tên hóa đơn: HÓA ĐƠN GIÁ TRỊ GIA TĂNG KIÊM TỜ KHAI HOÀN THUẾ;"},{"k":"p","t":"a.2) Ký hiệu hóa đơn, ký hiệu mẫu số hóa đơn;"},{"k":"p","t":"a.3) Thông tin về doanh nghiệp bán hàng gồm: Tên, địa chỉ, mã số thuế;"},{"k":"p","t":"a.4) Thông tin về khách hàng gồm: Họ tên, quốc tịch, thông tin về số hộ chiếu, ngày cấp hộ chiếu, ngày hết hạn hộ chiếu hoặc giấy tờ nhập xuất cảnh;"},{"k":"p","t":"a.5) Thông tin về hàng hóa gồm: Tên hàng hóa, đơn vị tính, số lượng, đơn giá hàng hóa; thành tiền chưa có thuế giá trị gia tăng, thuế suất thuế giá trị gia tăng, tổng số tiền thuế giá trị gia tăng theo từng loại thuế suất, tổng cộng tiền thuế giá trị gia tăng, tổng tiền thanh toán đã có thuế giá trị gia tăng."},{"k":"p","t":"Tên hàng hóa ghi rõ: nhãn hiệu, ký hiệu hàng hóa (số seri, model (nếu có), xuất xứ hàng hóa áp dụng đối với hàng hóa có nguồn gốc nhập khẩu, số máy áp dụng đối với mặt hàng cơ khí điện tử);"},{"k":"p","t":"a. 6) Chữ ký số người bán, chữ ký của người mua trên bản hiển thị của hóa đơn điện tử."},{"k":"p","t":"b) Phần B dành cho cơ quan hải quan lập để ghi kết quả kiểm tra hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế, hàng hóa, tính số thuế giá trị gia tăng người nước ngoài được hoàn, gồm các nội dung sau:"},{"k":"p","t":"b.1) Số thứ tự hàng hóa;"},{"k":"p","t":"b.2) Tên hàng hóa;"},{"k":"p","t":"b.3) Số lượng;"},{"k":"p","t":"b.4) Số tiền thuế giá trị gia tăng ghi trên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế;"},{"k":"p","t":"b.5) Số tiền thuế giá trị gia tăng được hoàn theo quy định;"},{"k":"p","t":"b.6) Thời điểm công chức hải quan kiểm tra: ghi rõ ngày, tháng, năm;"},{"k":"p","t":"b.7) Tên, chữ ký, đóng dấu của công chức hải quan kiểm tra."},{"k":"p","t":"c) Phần C dành cho Ngân hàng thương mại là đại lý hoàn thuế lập, gồm các nội dung:"},{"k":"p","t":"c.1) Số hiệu, ngày tháng chuyến bay/chuyến tàu của người nước ngoài xuất cảnh;"},{"k":"p","t":"c.2) Số tiền thuế hoàn cho người nước ngoài xuất cảnh;"},{"k":"p","t":"c.3) Hình thức thanh toán: ghi rõ số tiền thanh toán theo từng hình thức thanh toán: bằng tiền mặt hoặc thẻ quốc tế (ghi rõ tên thẻ, số thẻ);"},{"k":"p","t":"c.4) Thời điểm thanh toán: ghi rõ ngày, tháng, năm."},{"k":"p","t":"2. Chữ viết hiển thị trên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế là tiếng Việt và tiếng Anh được đặt bên phải trong ngoặc đơn () hoặc ngay dưới dòng tiếng Việt và có cờ chữ bằng hoặc nhỏ hơn chữ tiếng Việt."},{"k":"p","t":"3. Các nội dung khoản 1 Điều này thực hiện theo quy định tại Điều 10 Nghị định số 254/2026/NĐ-CP. Riêng nội dung về ký hiệu mẫu, ký hiệu hóa đơn thực hiện theo quy định tại Phụ lục I kèm theo Thông tư này."},{"k":"p","t":"4. Mẫu hiển thị hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế được quy định tại Mẫu số 01/GTGT-TKHT Phụ lục V kèm theo Thông tư này."}]},{"id":"tt91_6","no":6,"code":"Điều 6","title":"Điều 6. Đăng ký, thay đổi nội dung đăng ký sử dụng hóa đơn điện tử","shortTitle":"Đăng ký, thay đổi nội dung đăng ký sử dụng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh không thuộc trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử theo quy định tại Điều 8 Thông tư này đăng ký, thay đổi nội dung đăng ký sử dụng hóa đơn điện tử (bao gồm cả đăng ký hóa đơn điện tử bán tài sản công, hóa đơn điện tử bán hàng dự trữ quốc gia) thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử."},{"k":"p","t":"Trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế được miễn phí dịch vụ, cơ quan thuế hoặc cơ quan được giao nhiệm vụ tổ chức, xử lý tài sản công theo quy định pháp luật về quản lý, sử dụng tài sản công có thể đăng ký sử dụng hóa đơn điện tử thông qua Hệ thống thông tin quản lý thuế hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử được Cục Thuế ủy thác cung cấp dịch vụ hóa đơn điện tử có mã của cơ quan thuế được miễn phí dịch vụ."},{"k":"p","t":"Trường hợp doanh nghiệp là tổ chức kết nối chuyển dữ liệu hóa đơn điện tử theo hình thức gửi trực tiếp đến cơ quan thuế thì đăng ký sử dụng hóa đơn điện tử thông qua Hệ thống thông tin quản lý thuế hoặc cổng Dịch vụ công Quốc gia."},{"k":"p","t":"Trường hợp tổ chức nước ngoài có hoạt động kinh doanh, cung cấp dịch vụ thông qua nền tảng thương mại điện tử, nền tảng số khác đăng ký tự nguyện sử dụng hóa đơn điện tử theo quy định tại Thông tư này thì đăng ký sử dụng hóa đơn điện tử thông qua Hệ thống thông tin quản lý thuế."},{"k":"p","t":"Nội dung thông tin đăng ký theo Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này."},{"k":"p","t":"Hệ thống thông tin quản lý thuế gửi thông báo điện tử theo Mẫu số 01/TB-TNĐT Phụ lục IV kèm theo Thông tư này về việc tiếp nhận/không tiếp nhận <tờ khai đăng ký/thay đổi thông tin sử dụng hóa đơn điện tử/chứng từ điện tử> qua địa chỉ thư điện tử đã đăng ký với cơ quan thuế, qua tổ chức cung cấp dịch vụ hóa đơn điện tử đối với trường hợp tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh đăng ký sử dụng hóa đơn điện tử thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử hoặc Cổng Dịch vụ công Quốc gia."},{"k":"p","t":"2. Trường hợp tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh đăng ký sử dụng hóa đơn điện tử:"},{"k":"p","t":"a) Trong thời gian 01 ngày làm việc kể từ ngày tiếp nhận đăng ký, Hệ thống thông tin quản lý thuế tự động đối chiếu thông tin (bao gồm thông tin sinh trắc học theo quy định về định danh và xác thực điện tử của Chính phủ) của người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh, chủ doanh nghiệp tư nhân đăng ký sử dụng hóa đơn giữa dữ liệu về đăng ký doanh nghiệp, đăng ký thuế với dữ liệu tại Hệ thống Cơ sở dữ liệu quốc gia về dân cư hoặc theo dữ liệu tại Hệ thống định danh và xác thực điện tử. Trường hợp thông tin không khớp đúng, Hệ thống thông tin quản lý thuế tự động gửi Thông báo không chấp nhận đăng ký hóa đơn điện tử và cung cấp các trường thông tin không khớp đúng cho người nộp thuế ngay trong ngày làm việc hoặc chậm nhất ngày làm việc tiếp theo để người nộp thuế điều chỉnh thông tin đã kê khai. Trường hợp thông tin khớp đúng, Hệ thống thông tin quản lý thuế tự động gửi yêu cầu đề nghị người nộp thuế xác nhận qua địa chỉ thư điện tử, số điện thoại của người đại diện pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân theo thông tin trong hồ sơ đăng ký thuế, đăng ký doanh nghiệp. Người nộp thuế có trách nhiệm trả lời xác nhận ngay trong ngày làm việc hoặc chậm nhất ngày làm việc tiếp theo; trường hợp quá thời hạn mà người nộp thuế chưa xác nhận hoặc xác nhận không thành công, Hệ thống thông tin quản lý thuế tự động gửi Thông báo về việc không chấp nhận đăng ký sử dụng hóa đơn điện tử theo Mẫu số 01/TB-ĐKĐT Phụ lục IV kèm theo Thông tư này ngay trong ngày làm việc hoặc chậm nhất ngày làm việc tiếp theo. Cơ quan thuế áp dụng công nghệ sinh trắc học trong việc đăng ký sử dụng hóa đơn điện tử phù hợp quy định pháp luật;"},{"k":"p","t":"b) Trường hợp người nộp thuế đã xác nhận đúng thời hạn trên Hệ thống thông tin quản lý thuế và người nộp thuế không thuộc trường hợp: người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh, chủ doanh nghiệp tư nhân đang là người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân khác mà người nộp thuế đó có trạng thái mã số thuế không hoạt động tại địa chỉ đăng ký kinh doanh, người nộp thuế ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế, người nộp thuế tạm ngừng hoạt động nhưng chưa hoàn thành nghĩa vụ thuế; người nộp thuế có hành vi vi phạm về thuế, hóa đơn, chứng từ, người nộp thuế có rủi ro cao trong đăng ký sử dụng hóa đơn điện tử theo quy định tại Điều 7 Thông tư này thì chậm nhất ngày làm việc tiếp theo, cơ quan thuế ban hành Thông báo chấp nhận đăng ký sử dụng hóa đơn điện tử theo quy định tại khoản 3 Điều này;"},{"k":"p","t":"c) Trường hợp kết quả đối chiếu thông tin khớp đúng, người nộp thuế xác nhận trên Hệ thống thông tin quản lý thuế đúng thời hạn nhưng người nộp thuế thuộc trường hợp: người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân đang là người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân khác mà người nộp thuế đó có trạng thái mã số thuế; người nộp thuế ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế, người nộp thuế tạm ngừng hoạt động nhưng chưa hoàn thành nghĩa vụ thuế; người nộp thuế có hành vi vi phạm về thuế, hóa đơn, chứng từ; người nộp thuế có rủi ro cao trong đăng ký sử dụng hóa đơn điện tử theo quy định tại Điều 7 Thông tư này thì trong thời hạn 01 ngày làm việc kể từ ngày tiếp nhận đăng ký sử dụng hóa đơn điện tử của người nộp thuế, cơ quan thuế ban hành Thông báo về việc giải trình, bổ sung thông tin, tài liệu theo Mẫu số 01/TB-BSTT-NNT Phụ lục IV kèm theo Thông tư này gửi cho người nộp thuế hoặc cơ quan thuế quản lý trực tiếp thực hiện xác minh hoạt động thực tế tại địa chỉ đã đăng ký của người nộp thuế theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Người nộp thuế thực hiện giải trình, bổ sung thông tin, tài liệu trong thời hạn 03 ngày làm việc kể từ ngày nhận được Thông báo về việc giải trình, bổ sung thông tin, tài liệu của cơ quan thuế;"},{"k":"p","t":"d) Trường hợp cơ quan thuế chấp nhận thông tin giải trình, bổ sung thông tin, tài liệu của người nộp thuế hoặc trường hợp kết quả xác minh người nộp thuế có hoạt động tại địa chỉ đăng ký thì cơ quan thuế quản lý trực tiếp ban hành Thông báo chấp nhận đăng ký sử dụng hóa đơn điện tử của người nộp thuế. Trường hợp người nộp thuế không giải trình hoặc quá thời hạn quy định mà không giải trình được thông tin hoặc kết quả xác minh người nộp thuế không hoạt động tại địa chỉ đăng ký thì chậm nhất ngày làm việc tiếp theo cơ quan thuế ban hành Thông báo về việc không chấp nhận đăng ký sử dụng hóa đơn điện tử của người nộp thuế và ghi rõ lý do theo quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Cơ quan thuế có trách nhiệm gửi thông báo điện tử theo Mẫu số 01/TB-ĐKĐT Phụ lục IV kèm theo Thông tư này qua tổ chức cung cấp dịch vụ hóa đơn điện tử hoặc gửi thông báo trực tiếp đến tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh về việc chấp nhận hoặc không chấp nhận đăng ký sử dụng hóa đơn điện tử."},{"k":"p","t":"Đối với trường hợp tổ chức kinh tế đăng ký chuyển dữ liệu hóa đơn điện tử theo hình thức gửi trực tiếp đến cơ quan thuế theo quy định tại điểm b.1 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP được cơ quan thuế ra Thông báo về việc chấp nhận đăng ký sử dụng hóa đơn điện tử theo Mẫu số 01/TB-ĐKĐT Phụ lục IV kèm theo Thông tư này nhưng chưa phối hợp với Cục Thuế về cấu hình hạ tầng kỹ thuật, kiểm thử kết nối, truyền nhận dữ liệu thì chậm nhất trong thời gian 05 ngày làm việc kể từ ngày cơ quan thuế gửi thông báo theo Mẫu số 01/TB-ĐKĐT Phụ lục IV kèm theo Thông tư này, tổ chức cần chuẩn bị đủ điều kiện về hạ tầng kỹ thuật và thông báo cho Cục Thuế để phối hợp kết nối. Thời gian thực hiện kiểm thử kết nối trong 10 ngày làm việc kể từ ngày Cục Thuế nhận được đề nghị của tổ chức kinh tế. Trường hợp kết quả kiểm thử kết nối, truyền nhận dữ liệu thành công thì tổ chức kinh tế thực hiện gửi dữ liệu hóa đơn điện tử theo hình thức gửi trực tiếp đến cơ quan thuế theo quy định tại điểm b.1 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP. Trường hợp sau 05 ngày làm việc kể từ ngày cơ quan thuế gửi thông báo theo Mẫu số 01/TB-ĐKĐT Phụ lục IV kèm theo Thông tư này, tổ chức kinh tế không thông báo cho Cục Thuế để phối hợp kết nối hoặc kết quả kiểm thử kết nối, truyền nhận dữ liệu không thành công, tổ chức kinh tế thay đổi đăng ký sử dụng hóa đơn điện tử theo Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này và thực hiện chuyển dữ liệu qua tổ chức kết nối, nhận, truyền lưu trữ dữ liệu hóa đơn điện tử với cơ quan thuế."},{"k":"p","t":"4. Trường hợp có thay đổi thông tin đã đăng ký sử dụng hóa đơn điện tử, trừ trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử theo quy định tại Điều 8 Thông tư này, thực hiện như sau:"},{"k":"p","t":"a) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thực hiện thay đổi thông tin theo Mẫu số 01/ĐKTD-HĐĐT Phụ lục III kèm theo Thông tư này qua Hệ thống thông tin quản lý thuế hoặc qua tổ chức cung cấp dịch vụ hóa đơn điện tử. Trình tự thủ tục thực hiện theo quy định tại điểm a khoản 2 Điều này;"},{"k":"p","t":"b) Trường hợp công ty mẹ cần khai thác dữ liệu của các chi nhánh, đơn vị phụ thuộc thì thông báo tới cơ quan thuế quản lý trực tiếp công ty mẹ theo Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này."},{"k":"p","t":"5. Định kỳ hàng tháng, cơ quan thuế quản lý trực tiếp tiến hành rà soát người nộp thuế sử dụng hóa đơn điện tử có mã của cơ quan thuế được miễn phí dịch vụ và gửi thông báo theo Mẫu số 01/TB-KTT Phụ lục IV kèm theo Thông tư này cho người nộp thuế để thông báo về việc chuyển sang sử dụng hóa đơn điện tử có mã của cơ quan thuế thông qua tổ chức cung cấp dịch vụ về hóa đơn điện tử và thực hiện thay đổi thông tin sử dụng hóa đơn điện tử có mã của cơ quan thuế theo quy định tại khoản 4 Điều này."},{"k":"p","t":"6. Đối với các trường hợp áp dụng hóa đơn điện tử không có mã của cơ quan thuế, định kỳ cơ quan thuế quản lý trực tiếp tiến hành rà soát để thông báo theo Mẫu số 01/TB-KTT Phụ lục IV kèm theo Thông tư này nếu thuộc đối tượng chuyển sang sử dụng hóa đơn điện tử có mã của cơ quan thuế để đăng ký sử dụng hóa đơn điện tử có mã của cơ quan thuế theo quy định tại Điều này."}]},{"id":"tt91_7","no":7,"code":"Điều 7","title":"Điều 7. Tiêu chí xác định người nộp thuế có rủi ro cao trong đăng ký sử dụng hóa đơn điện tử","shortTitle":"Tiêu chí xác định người nộp thuế có rủi ro cao trong đăng ký sử dụng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp kết quả đối chiếu thông tin tại điểm a khoản 2 Điều 6 Thông tư này khớp đúng, người nộp thuế xác nhận trên Hệ thống thông tin quản lý thuế đúng thời hạn nhưng người nộp thuế có một trong những dấu hiệu sau thì thực hiện theo quy định tại điểm c khoản 2 Điều 6 Thông tư này:"},{"k":"p","t":"1. Người nộp thuế có chủ sở hữu hoặc người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân đồng thời là chủ sở hữu hoặc người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân có kết luận của cơ quan quản lý nhà nước có thẩm quyền có hành vi gian lận, mua bán hóa đơn trên cơ sở dữ liệu của cơ quan thuế."},{"k":"p","t":"2. Người nộp thuế có chủ sở hữu hoặc người đại diện theo pháp luật, đại diện hộ kinh doanh, cá nhân kinh doanh hoặc chủ doanh nghiệp tư nhân thuộc danh sách có giao dịch đáng ngờ theo quy định của Luật Phòng, chống rửa tiền."},{"k":"p","t":"3. Người nộp thuế đăng ký địa chỉ trụ sở chính không có địa chỉ cụ thể theo địa giới hành chính hoặc tại căn hộ chung cư (không bao gồm căn hộ hoặc phần diện tích của nhà chung cư được phép sử dụng cho mục đích kinh doanh theo quy định của pháp luật), trừ trường hợp cá nhân kinh doanh."},{"k":"p","t":"4. Người nộp thuế có người đại diện theo pháp luật hoặc chủ sở hữu đồng thời là người đại diện theo pháp luật hoặc chủ sở hữu của người nộp thuế ở trạng thái mã số thuế người nộp thuế ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế hoặc ở trạng thái người nộp thuế không hoạt động tại địa chỉ đã đăng ký, người nộp thuế có hành vi vi phạm về thuế, hóa đơn, chứng từ theo quy định tại Thông tư số 94/2026/TT-BTC của Bộ trưởng Bộ Tài chính quy định về quản lý tuân thủ, quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"5. Người nộp thuế có dấu hiệu rủi ro khác do cơ quan thuế xác định theo quy định Thông tư số 94/2026/TT-BTC và có thông báo cho người nộp thuế được biết và giải trình."}]},{"id":"tt91_8","no":8,"code":"Điều 8","title":"Điều 8. Các trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử","shortTitle":"Các trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thuộc các trường hợp sau thì ngừng, tạm ngừng sử dụng hóa đơn điện tử có mã của cơ quan thuế; ngừng, tạm ngừng sử dụng hóa đơn điện tử không có mã của cơ quan thuế; ngừng, tạm ngừng sử dụng hóa đơn điện tử khởi tạo từ máy tính tiền:"},{"k":"p","t":"a) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"b) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thuộc trường hợp cơ quan thuế xác minh và thông báo không hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"c) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh tạm ngừng kinh doanh;"},{"k":"p","t":"d) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh có quyết định của cơ quan thuế về việc ngừng sử dụng hóa đơn điện tử để thực hiện cưỡng chế nợ thuế bằng biện pháp ngừng sử dụng hóa đơn điện tử;"},{"k":"p","t":"đ) Trường hợp có hành vi sử dụng hóa đơn điện tử để bán hàng nhập lậu, hàng cấm, hàng giả, hàng hóa giả mạo về sở hữu trí tuệ, bị cơ quan có thẩm quyền phát hiện và thông báo cho cơ quan thuế;"},{"k":"p","t":"e) Trường hợp có hành vi lập hóa đơn điện tử phục vụ mục đích bán khống hàng hóa, cung cấp dịch vụ để chiếm đoạt tiền của tổ chức, cá nhân bị cơ quan có thẩm quyền phát hiện, khởi tố và thông báo cho cơ quan thuế; cơ quan công an, viện kiểm sát, tòa án có văn bản đề nghị cơ quan thuế ngừng sử dụng hóa đơn điện tử của tổ chức, cá nhân nêu trên;"},{"k":"p","t":"g) Trường hợp cơ quan đăng ký kinh doanh, cơ quan nhà nước có thẩm quyền yêu cầu doanh nghiệp tạm ngừng kinh doanh ngành, nghề kinh doanh có điều kiện khi phát hiện doanh nghiệp không có đủ điều kiện kinh doanh theo quy định của pháp luật hoặc trường hợp cơ quan có thẩm quyền phát hiện và thông báo cho cơ quan thuế người nộp thuế có hành vi vi phạm pháp luật về thuế và hóa đơn;"},{"k":"p","t":"h) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh đang áp dụng hóa đơn điện tử khởi tạo từ máy tính tiền có thay đổi ngành nghề kinh doanh dẫn đến không đáp ứng điều kiện sử dụng hóa đơn điện tử khởi tạo từ máy tính tiền theo quy định tại điểm c khoản 1 Điều 6 Nghị định số 254/2026/NĐ-CP thì cơ quan thuế ra thông báo người nộp thuế ngừng sử dụng hóa đơn điện tử khởi tạo từ máy tính tiền; tạm ngừng sử dụng hóa đơn điện tử theo văn bản gửi cơ quan thuế theo Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này;"},{"k":"p","t":"i) Trường hợp hộ kinh doanh, cá nhân kinh doanh đã được cấp mã số thuế trước ngày 01 tháng 7 năm 2025 nhưng thông tin đăng ký thuế của hộ kinh doanh, cá nhân kinh doanh không khớp đúng với thông tin của cá nhân được lưu trữ trong cơ sở dữ liệu quốc gia về dân cư hoặc không đầy đủ thì cơ quan thuế yêu cầu hộ kinh doanh, cá nhân kinh doanh bổ sung thông tin trong thời hạn 10 ngày làm việc. Sau thời hạn này, trường hợp hộ kinh doanh, cá nhân kinh doanh chưa thực hiện, cơ quan thuế thực hiện tạm ngừng sử dụng hóa đơn điện tử của hộ kinh doanh, cá nhân kinh doanh;"},{"k":"p","t":"k) Trong quá trình kiểm tra, nếu cơ quan thuế xác định người nộp thuế có hành vi trốn thuế, người nộp thuế được thành lập để thực hiện mua bán, sử dụng hóa đơn điện tử không hợp pháp hoặc sử dụng không hợp pháp hóa đơn điện tử để trốn thuế theo quy định thì cơ quan thuế ban hành thông báo ngừng sử dụng hóa đơn điện tử; người nộp thuế bị xử lý theo quy định của pháp luật theo trình tự quy định tại điểm c khoản 2 Điều này;"},{"k":"p","t":"l) Trường hợp người nộp thuế thuộc diện rủi ro cao về thuế và hóa đơn theo quy định tại Thông tư số 94/2026/TT-BTC, cơ quan thuế thực hiện biện pháp ngừng sử dụng hóa đơn điện tử theo quy định tại điểm d khoản 2 Điều này."},{"k":"p","t":"2. Trình tự thực hiện ngừng sử dụng hóa đơn điện tử:"},{"k":"p","t":"a) Hệ thống thông tin quản lý thuế ngừng tiếp nhận hóa đơn điện tử và không gửi thông báo ngừng sử dụng hóa đơn điện tử đối với người nộp thuế thuộc trường hợp quy định tại điểm a, điểm b, điểm c, điểm d và điểm i khoản 1 Điều này kể từ ngày tổ chức, cá nhân chấm dứt hiệu lực mã số thuế hoặc tạm ngừng kinh doanh hoặc kể từ ngày cơ quan thuế ban hành thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký hoặc quyết định cưỡng chế nợ thuế hoặc kể từ ngày hết thời hạn hộ kinh doanh, cá nhân kinh doanh bổ sung thông tin theo yêu cầu của cơ quan thuế;"},{"k":"p","t":"b) Hệ thống thông tin quản lý thuế gửi thông báo điện tử về việc ngừng sử dụng hóa đơn điện tử, ngừng sử dụng hóa đơn điện tử khởi tạo từ máy tính tiền theo Mẫu số 01/TB-NSD Phụ lục IV kèm theo Thông tư này và ngừng tiếp nhận hóa đơn điện tử, ngừng tiếp nhận hóa đơn điện tử khởi tạo từ máy tính tiền đối với người nộp thuế thuộc trường hợp quy định tại điểm h khoản 1 Điều này khi nhận được thông báo của cơ quan nhà nước có thẩm quyền về việc tạm ngừng kinh doanh hoặc văn bản của người nộp thuế về việc tạm ngừng sử dụng hóa đơn;"},{"k":"p","t":"c) Thủ trưởng cơ quan thuế quản lý trực tiếp ban hành thông báo điện tử về việc ngừng sử dụng hóa đơn điện tử theo Mẫu số 01/TB-NSD Phụ lục IV kèm theo Thông tư này đến người nộp thuế thuộc trường hợp quy định tại điểm e khoản 1 Điều này kể từ ngày cơ quan thuế nhận được thông báo của cơ quan có thẩm quyền; người nộp thuế thuộc trường hợp quy định tại điểm k khoản 1 Điều này."},{"k":"p","t":"d) Thủ trưởng cơ quan thuế quản lý trực tiếp gửi thông báo điện tử đến người nộp thuế thuộc trường hợp quy định tại điểm đ, điểm g khoản 1 Điều này trong thời gian 01 ngày làm việc sau khi nhận được thông báo của cơ quan có thẩm quyền gửi cơ quan thuế hoặc ngay sau khi xác định người nộp thuế thuộc diện rủi ro cao theo quy định tại điểm 1 khoản 1 Điều này hoặc các trường hợp giải trình, bổ sung thông tin, tài liệu theo quy định tại điểm c khoản 2 Điều 6 Thông tư này để yêu cầu người nộp thuế giải trình hoặc bổ sung thông tin, tài liệu liên quan đến việc sử dụng hóa đơn điện tử. Trong thời gian giải trình, bổ sung thông tin tài liệu, người nộp thuế thực hiện sử dụng hóa đơn theo từng lần phát sinh theo quy định tại khoản 2 Điều 6 Nghị định số 254/2026/NĐ-CP:"},{"k":"p","t":"d.1) Người nộp thuế giải trình hoặc bổ sung thông tin, tài liệu trong thời hạn 03 ngày làm việc kể từ ngày cơ quan thuế gửi thông báo điện tử."},{"k":"p","t":"Người nộp thuế có thể đến cơ quan thuế giải trình trực tiếp hoặc giải trình, bổ sung thông tin, tài liệu bằng văn bản hoặc bằng phương thức điện tử."},{"k":"p","t":"d.2) Người nộp thuế tiếp tục sử dụng hóa đơn điện tử hoặc giải trình bổ sung, cụ thể:"},{"k":"p","t":"d.2.1) Trường hợp người nộp thuế đã giải trình hoặc bổ sung thông tin, tài liệu đầy đủ và chứng minh được việc sử dụng hóa đơn điện tử theo đúng quy định pháp luật thì người nộp thuế tiếp tục sử dụng hóa đơn điện tử;"},{"k":"p","t":"d.2.2) Trường hợp người nộp thuế đã giải trình hoặc bổ sung thông tin, tài liệu mà không chứng minh được việc sử dụng hóa đơn điện tử theo đúng quy định pháp luật thì ngay trong ngày làm việc, cơ quan thuế tiếp tục gửi thông báo lần 2 yêu cầu người nộp thuế giải trình, bổ sung thông tin, tài liệu. Người nộp thuế thực hiện giải trình hoặc giải trình, bổ sung thông tin, tài liệu trong thời hạn 03 ngày làm việc kể từ ngày cơ quan thuế gửi thông báo điện tử lần 2;"},{"k":"p","t":"d.2.3) Trường hợp người nộp thuế đã giải trình hoặc bổ sung thông tin tài liệu theo thông báo lần 2 mà không chứng minh được việc sử dụng hóa đơn điện tử theo đúng quy định pháp luật thì cơ quan thuế ban hành Thông báo về việc ngừng sử dụng hóa đơn theo Mẫu số 01/TB-NSD Phụ lục IV kèm theo Thông tư này và xử lý theo quy định."},{"k":"p","t":"d.3) Hết thời hạn theo thông báo mà người nộp thuế không giải trình, bổ sung thông tin, tài liệu thì cơ quan thuế ban hành thông báo ngừng sử dụng hóa đơn điện tử có mã của cơ quan thuế hoặc ngừng sử dụng hóa đơn điện tử không có mã của cơ quan thuế theo Mẫu số 01/TB-NSĐ Phụ lục IV kèm theo Thông tư này và xử lý theo quy định;"},{"k":"p","t":"đ) Trường hợp người nộp thuế thuộc trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử theo quy định tại khoản 1 Điều này ủy nhiệm lập hóa đơn điện tử thì cơ quan thuế gửi thông báo ngừng, tạm ngừng sử dụng hóa đơn điện tử cho người nộp thuế và bên nhận ủy nhiệm lập hóa đơn điện tử."},{"k":"p","t":"3. Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh tại khoản 1 Điều này được tiếp tục sử dụng hóa đơn điện tử sau khi thông báo với cơ quan thuế về việc tiếp tục kinh doanh hoặc được cơ quan thuế khôi phục mã số thuế hoặc cơ quan thuế ban hành quyết định về việc chấm dứt hiệu lực quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế bằng biện pháp ngừng sử dụng hóa đơn hoặc qua kiểm tra cơ quan thuế xác định người nộp thuế không còn thuộc diện rủi ro cao hoặc khi có thông báo của cơ quan chức năng."}]},{"id":"tt91_9","no":9,"code":"Điều 9","title":"Điều 9. Ủy nhiệm lập hóa đơn điện tử","shortTitle":"Ủy nhiệm lập hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc ủy nhiệm lập hóa đơn:"},{"k":"p","t":"a) Người bán hàng hóa, cung cấp dịch vụ được ủy nhiệm cho bên thứ ba là đối tượng đủ điều kiện sử dụng hóa đơn điện tử để lập hóa đơn điện tử cho hoạt động bán hàng hóa, cung cấp dịch vụ. Người bán và bên nhận ủy nhiệm không thuộc trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử theo quy định tại Điều 8 Thông tư này để lập hóa đơn điện tử cho hoạt động bán hàng hóa, cung cấp dịch vụ;"},{"k":"p","t":"b) Việc ủy nhiệm phải được lập bằng văn bản (hợp đồng hoặc thỏa thuận) giữa bên ủy nhiệm và bên nhận ủy nhiệm, trừ trường hợp bán tài sản thi hành án của cơ quan thi hành án;"},{"k":"p","t":"c) Việc ủy nhiệm phải thông báo cho cơ quan thuế khi đăng ký sử dụng hóa đơn điện tử;"},{"k":"p","t":"d) Hóa đơn điện tử do bên nhận ủy nhiệm lập là hóa đơn điện tử có mã hoặc không có mã của cơ quan thuế (bao gồm hóa đơn điện tử khởi tạo từ máy tính tiền) và phải thể hiện tên, địa chỉ, mã số thuế của bên ủy nhiệm và tên, địa chỉ, mã số thuế của bên nhận ủy nhiệm;"},{"k":"p","t":"đ) Bên ủy nhiệm và bên nhận ủy nhiệm có trách nhiệm niêm yết trên website của đơn vị mình hoặc trên giao diện gian hàng hoặc hệ thống của nền tảng hoặc thông báo công khai trên phương tiện thông tin đại chúng để người mua hàng hóa, dịch vụ được biết về việc ủy nhiệm lập hóa đơn. Khi hết thời hạn ủy nhiệm hoặc chấm dứt trước thời hạn ủy nhiệm lập hóa đơn điện tử theo thỏa thuận giữa các bên thì bên ủy nhiệm, bên nhận ủy nhiệm hủy các niêm yết, thông báo trên website của đơn vị mình hoặc thông báo công khai trên phương tiện thông tin đại chúng về việc hết thời hạn hoặc chấm dứt trước thời hạn ủy nhiệm lập hóa đơn;"},{"k":"p","t":"e) Trường hợp hóa đơn ủy nhiệm là hóa đơn điện tử không có mã của cơ quan thuế thì bên ủy nhiệm và bên nhận ủy nhiệm thỏa thuận về chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế quản lý trực tiếp hoặc thông qua tổ chức cung cấp dịch vụ để chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế quản lý trực tiếp;"},{"k":"p","t":"g) Bên nhận ủy nhiệm có trách nhiệm lập hóa đơn điện tử ủy nhiệm theo đúng thực tế phát sinh, theo thỏa thuận với bên ủy nhiệm và tuân thủ nguyên tắc tại khoản 1 Điều này;"},{"k":"p","t":"h) Hóa đơn điện tử do bên nhận ủy nhiệm lập phải phù hợp với phương pháp tính thuế giá trị gia tăng của bên ủy nhiệm."},{"k":"p","t":"2. Hợp đồng ủy nhiệm hoặc thỏa thuận ủy nhiệm:"},{"k":"p","t":"a) Hợp đồng ủy nhiệm hoặc thỏa thuận ủy nhiệm phải thể hiện đầy đủ các thông tin về bên ủy nhiệm và bên nhận ủy nhiệm (tên, địa chỉ, mã số thuế hoặc số định danh cá nhân, chứng thư số); thông tin về hóa đơn điện tử ủy nhiệm (loại hóa đơn, ký hiệu hóa đơn, ký hiệu mẫu số hóa đơn); mục đích ủy nhiệm; thời hạn ủy nhiệm; phương thức thanh toán hóa đơn ủy nhiệm (ghi rõ trách nhiệm thanh toán tiền hàng hóa, dịch vụ trên hóa đơn ủy nhiệm);"},{"k":"p","t":"b) Bên ủy nhiệm và bên nhận ủy nhiệm có trách nhiệm lưu giữ văn bản ủy nhiệm và xuất trình khi cơ quan có thẩm quyền yêu cầu."},{"k":"p","t":"3. Thông báo với cơ quan thuế về việc ủy nhiệm lập hóa đơn điện tử:"},{"k":"p","t":"a) Việc ủy nhiệm được xác định là thay đổi thông tin đăng ký sử dụng hóa đơn điện tử theo quy định tại Điều 6 Thông tư này. Bên ủy nhiệm và bên nhận ủy nhiệm sử dụng Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này để thông báo với cơ quan thuế về việc ủy nhiệm lập hóa đơn điện tử, bao gồm cả trường hợp chấm dứt trước thời hạn ủy nhiệm lập hóa đơn điện tử theo thỏa thuận giữa các bên;"},{"k":"p","t":"b) Bên ủy nhiệm điền thông tin của bên nhận ủy nhiệm, trừ trường hợp bán tài sản thi hành án của cơ quan thi hành án và điểm c khoản này, bên nhận ủy nhiệm điền thông tin của bên ủy nhiệm tại Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này như sau:"},{"k":"p","t":"b.1) Đối với bên ủy nhiệm và bên nhận ủy nhiệm tại Phần 5 “Danh sách chứng thư số sử dụng\", điền thông tin đầy đủ chứng thư số sử dụng của cả hai bên;"},{"k":"p","t":"b.2) Đối với bên nhận ủy nhiệm tại cột 5 Phần 6 “Đăng ký ủy nhiệm lập hóa đơn\", điền thông tin tên tổ chức ủy nhiệm và mã số thuế hoặc số định danh cá nhân của bên ủy nhiệm;"},{"k":"p","t":"c) Trường hợp người bán hàng hóa, cung cấp dịch vụ là hộ kinh doanh, cá nhân kinh doanh ủy nhiệm cho bên thứ ba là tổ chức kinh tế lập hóa đơn điện tử cho hoạt động bán hàng hóa, cung cấp dịch vụ thì hộ kinh doanh, cá nhân kinh doanh có trách nhiệm cung cấp thông tin cho bên nhận ủy nhiệm, bao gồm: tên, địa chỉ, mã số thuế và thuộc đối tượng áp dụng hóa đơn điện tử theo quy định tại Điều 6 Nghị định số 254/2026/NĐ-CP. Tổ chức kinh tế thực hiện thông báo danh sách hộ kinh doanh, cá nhân kinh doanh ủy nhiệm với cơ quan thuế theo Mẫu số 01/ĐKTĐ-HĐĐT Phụ lục III kèm theo Thông tư này."}]},{"id":"tt91_10","no":10,"code":"Điều 10","title":"Điều 10. Xử lý hóa đơn điện tử đã lập","shortTitle":"Xử lý hóa đơn điện tử đã lập","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp phát hiện hóa đơn điện tử đã lập sai (bao gồm hóa đơn điện tử đã được cấp mã của cơ quan thuế, hóa đơn điện tử không có mã của cơ quan thuế đã gửi dữ liệu đến cơ quan thuế) thì người bán thực hiện xử lý như sau:"},{"k":"p","t":"a) Trường hợp sai về các nội dung trên hóa đơn như tên, địa chỉ, số tiền bằng chữ hoặc các nội dung khác nhưng không sai về: mã số thuế, số tiền ghi trên hóa đơn, thuế suất, tiền thuế hoặc hàng hóa ghi trên hóa đơn thì người bán thông báo cho người mua về việc hóa đơn đã lập sai và không phải lập lại hóa đơn. Người bán thực hiện thông báo với cơ quan thuế về hóa đơn điện tử đã lập sai theo Mẫu số 04/SS-HĐĐT Phụ lục III kèm theo Thông tư này;"},{"k":"p","t":"b) Trường hợp hóa đơn điện tử đã lập sai các nội dung về: mã số thuế; tên hàng hóa, hàng hóa ghi trên hóa đơn không đúng quy cách, chất lượng; số tiền ghi trên hóa đơn; thuế suất; tiền thuế hoặc các nội dung bắt buộc khác (trừ trường hợp quy định tại điểm a khoản này) thì người bán có thể lựa chọn điều chỉnh hoặc thay thế hóa đơn điện tử như sau:"},{"k":"p","t":"b.1) Người bán lập hóa đơn điện tử điều chỉnh hóa đơn đã lập sai:"},{"k":"p","t":"Hóa đơn điện tử điều chỉnh hóa đơn điện tử đã lập sai phải có dòng chữ “Điều chỉnh cho hóa đơn Mẫu số... ký hiệu... số... ngày... tháng... năm”;"},{"k":"p","t":"b.2) Người bán lập hóa đơn điện tử mới thay thế cho hóa đơn điện tử lập sai:"},{"k":"p","t":"Hóa đơn điện tử mới thay thế hóa đơn điện tử đã lập sai phải có dòng chữ “Thay thế cho hóa đơn Mẫu số... ký hiệu... số... ngày... tháng... năm”."},{"k":"p","t":"Người bán ký số trên hóa đơn điện tử mới điều chỉnh hoặc thay thế cho hóa đơn điện tử đã lập sai sau đó người bán gửi cho người mua (đối với trường hợp sử dụng hóa đơn điện tử không có mã của cơ quan thuế) hoặc gửi cơ quan thuế để cơ quan thuế cấp mã cho hóa đơn điện tử mới để gửi cho người mua (đối với trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế)."},{"k":"p","t":"Trường hợp trong tháng người bán đã lập sai cùng thông tin về người mua, tên hàng, đơn giá, số lượng, thuế suất trên nhiều hóa đơn của cùng một người mua trong cùng tháng, thì người bán được lập một hóa đơn điều chỉnh hoặc thay thế cho nhiều hóa đơn điện tử đã lập sai trong cùng tháng và đính kèm bảng kê các hóa đơn điện tử đã lập sai theo Mẫu số 01/BK-ĐCTT Phụ lục III kèm theo Thông tư này."},{"k":"p","t":"Trước khi điều chỉnh, thay thế hóa đơn điện tử đã lập sai theo quy định tại điểm b khoản 1 Điều này: Trường hợp người mua là tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thì người bán và người mua phải lập văn bản thỏa thuận ghi rõ nội dung sai; trường hợp người mua là cá nhân thì người bán phải thông báo cho người mua hoặc thông báo trên website của người bán (nếu có). Người bán thực hiện lưu giữ văn bản thỏa thuận tại đơn vị và xuất trình khi cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền yêu cầu."},{"k":"p","t":"Người bán không bắt buộc phải lập văn bản thỏa thuận trong các trường hợp sau: chuyển dữ liệu hóa đơn điện tử theo Bảng tổng hợp dữ liệu hóa đơn điện tử theo quy định điểm a.1 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP; chuyển cơ sở dữ liệu thông tin chi tiết giao dịch phát sinh theo Bảng thông tin chi tiết giao dịch theo quy định tại điểm a.2 khoản 3 Điều 16 Nghị định số 254/2026/NĐ-CP; hoạt động mua bán hàng hóa trên nền tảng thương mại điện tử, nền tảng số khác;"},{"k":"p","t":"c) Trường hợp hóa đơn điện tử đã lập sai là hóa đơn điện tử từ máy tính tiền hoặc hóa đơn điện tử bán hàng hóa là tài sản thuộc diện phải đăng ký quyền sở hữu, sử dụng tài sản thì người bán lập hóa đơn thay thế cho hóa đơn đã lập sai, trừ trường hợp quy định tại điểm c.2 khoản 5 Điều này;"},{"k":"p","t":"d) Đối với ngành hàng không thì hóa đơn đổi, hoàn chứng từ vận chuyển hàng không được coi là hóa đơn điều chỉnh mà không cần có thông tin “Điều chỉnh tăng/giảm cho hóa đơn Mẫu số... ký hiệu... ngày... tháng... năm”. Doanh nghiệp vận chuyển hàng không được phép xuất hóa đơn của mình cho các trường hợp hoàn, đổi chứng từ vận chuyển do đại lý xuất;"},{"k":"p","t":"đ) Đối với hóa đơn điện tử đã lập sai và người bán đã gửi Bảng tổng hợp dữ liệu hóa đơn điện tử thì người bán gửi thông tin điều chỉnh, thay thế trực tiếp trên Bảng tổng hợp dữ liệu hóa đơn điện tử của các kỳ tiếp theo mà không gửi thông báo hóa đơn điện tử đã lập sai theo Mẫu số 04/SS-HĐĐT Phụ lục III kèm theo Thông tư này đến cơ quan thuế;"},{"k":"p","t":"e) Trường hợp dữ liệu hóa đơn điện tử tại Bảng tổng hợp dữ liệu hóa đơn điện tử đã gửi cơ quan thuế thiếu hoặc sai thì người bán gửi Bảng tổng hợp dữ liệu hóa đơn điện tử bổ sung. Việc điều chỉnh dữ liệu hóa đơn trên Bảng tổng hợp dữ liệu hóa đơn điện tử phải điền đủ các thông tin: ký hiệu mẫu số hóa đơn, ký hiệu hóa đơn đối với trường hợp điều chỉnh dữ liệu hóa đơn trên Bảng tổng hợp dữ liệu hóa đơn điện tử, số hóa đơn vào cột 18 “thông tin hóa đơn liên quan” tại Mẫu số 01/TH-HĐĐT Phụ lục III kèm theo Thông tư này (trừ trường hợp hóa đơn điện tử không nhất thiết phải có đầy đủ các thông tin ký hiệu mẫu số hóa đơn, ký hiệu hóa đơn, số hóa đơn theo quy định tại điểm 9 Phụ lục kèm theo Nghị định số 254/2026/NĐ-CP và hóa đơn điều chỉnh hoặc thay thế thuộc trường hợp lập bảng kê các hóa đơn điện tử đã lập sai theo Mẫu số 01/BK-ĐCTT tại Phụ lục III kèm theo Thông tư này)."},{"k":"p","t":"2. Trường hợp cơ sở dữ liệu thông tin chi tiết giao dịch phát sinh gửi theo Bảng thông tin chi tiết giao dịch đã gửi cơ quan thuế bị thiếu hoặc sai thì người bán gửi Bảng thông tin chi tiết giao dịch bổ sung."},{"k":"p","t":"3. Trường hợp cơ quan thuế phát hiện hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử không có mã của cơ quan thuế đã lập sai thì cơ quan thuế thông báo cho người bán theo Mẫu số 01/TB-RSĐT Phụ lục IV kèm theo Thông tư này để người bán kiểm tra nội dung sai."},{"k":"p","t":"Người bán có trách nhiệm rà soát theo thông báo của cơ quan thuế và thực hiện điều chỉnh, thay thế hóa đơn theo quy định tại khoản 1 Điều này."},{"k":"p","t":"4. Trường hợp người bán thực hiện theo quy định tại điểm a khoản 1 Điều này thì Hệ thống thông tin quản lý thuế tự động thông báo về việc tiếp nhận theo Mẫu số 01/TB-SSĐT Phụ lục IV kèm theo Thông tư này."},{"k":"p","t":"5. Xử lý hóa đơn điện tử đã lập trong một số trường hợp như sau:"},{"k":"p","t":"a) Đối với các hóa đơn điện tử đã lập khi bán hàng hóa, cung cấp dịch vụ không bị sai nhưng khi thanh toán thực tế hoặc khi quyết toán có sự thay đổi về giá trị, khối lượng trên cơ sở kết luận của cơ quan nhà nước có thẩm quyền theo quy định của pháp luật có liên quan thì người bán thực hiện lập hóa đơn điện tử mới đối với số chênh lệch qua quyết toán phản ánh theo đúng nghiệp vụ kinh tế phát sinh (phát sinh giảm ghi số âm hoặc phát sinh tăng ghi số dương phù hợp với thực tế), cụ thể đối với các trường hợp sau:"},{"k":"p","t":"a.1) Điều chỉnh giá trị quyết toán dự án đầu tư khi có sự thay đổi về đơn giá, khối lượng; điều chỉnh giá bán theo quy định của pháp luật chuyên ngành;"},{"k":"p","t":"a.2) Điều chỉnh giá trị, khối lượng trên cơ sở kết luận của cơ quan nhà nước có thẩm quyền theo quy định của pháp luật có liên quan;"},{"k":"p","t":"a.3) Điều chỉnh giá bán buôn điện giữa Tập đoàn Điện lực Việt Nam với các Tổng công ty Điện lực và giữa các Tổng công ty Điện lực với các Công ty Điện lực."},{"k":"p","t":"b) Trường hợp việc chiết khấu thương mại căn cứ vào số lượng, doanh số hàng hóa, dịch vụ thì số tiền chiết khấu của hàng hóa, dịch vụ đã bán được tính điều chỉnh trên hóa đơn bán hàng hóa, cung cấp dịch vụ của lần mua cuối cùng hoặc kỳ tiếp sau đảm bảo số tiền chiết khấu không vượt quá giá trị hàng hóa, dịch vụ ghi trên hóa đơn của lần mua cuối cùng hoặc kỳ tiếp sau hoặc được lập hóa đơn điều chỉnh kèm theo bảng kê các số hóa đơn cần điều chỉnh, số tiền, tiền thuế điều chỉnh. Bảng kê được lưu tại đơn vị và xuất trình khi cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền yêu cầu;"},{"k":"p","t":"c) Xử lý hóa đơn điện tử trong trường hợp trả lại hàng hóa, dịch vụ:"},{"k":"p","t":"c.1) Trường hợp trả lại hàng hóa: Trường hợp người mua trả lại toàn bộ hoặc một phần hàng hóa (bao gồm cả trường hợp đổi hàng làm thay đổi giá trị của hàng hóa đã mua) thì người bán lập hóa đơn điều chỉnh, trừ trường hợp các bên có thỏa thuận về việc người mua lập hóa đơn khi trả lại hàng hóa thì người mua lập hóa đơn điện tử giao cho người bán; người bán, người mua thực hiện nghĩa vụ thuế theo quy định khi bán hàng hóa;"},{"k":"p","t":"c.2) Trường hợp hàng hóa là tài sản thuộc diện phải đăng ký quyền sử dụng, quyền sở hữu theo quy định của pháp luật và tài sản đã được đăng ký theo tên người mua thì khi trả lại hàng hóa đảm bảo phù hợp với pháp luật liên quan, nếu người mua là đối tượng sử dụng hóa đơn điện tử thì người mua thực hiện lập hóa đơn trả lại hàng cho người bán;"},{"k":"p","t":"c.3) Đối với trường hợp hoàn phí, giảm phí, giảm hoa hồng môi giới bảo hiểm và các khoản chi để giảm thu khác theo quy định của pháp luật kinh doanh bảo hiểm: Căn cứ vào hóa đơn đã lập, người bán lập hóa đơn điều chỉnh giao cho khách hàng tham gia bảo hiểm, không phân biệt đã chi tiền hay chưa chi tiền. Trên hóa đơn ghi rõ số tiền phí bảo hiểm hoàn, giảm, lý do hoàn, giảm. Trường hợp người bán và người mua có thỏa thuận về việc lập văn bản thỏa thuận trước khi lập hóa đơn điều chỉnh thì biên bản hoặc thỏa thuận bằng văn bản được lưu giữ cùng với hóa đơn thu phí bảo hiểm tại doanh nghiệp và xuất trình khi cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền yêu cầu."},{"k":"p","t":"Đối với trường hợp phí bảo hiểm chưa thu được tiền mà doanh nghiệp bảo hiểm đã thực hiện lập hóa đơn theo quy định, doanh nghiệp bảo hiểm căn cứ vào dữ liệu phí bảo hiểm chưa thu được tiền để lập hóa đơn điều chỉnh tổng hợp cho các khoản phí chưa thu được tiền của tháng trước, kèm theo bảng kê các số hóa đơn, số tiền và tiền thuế điều chỉnh."},{"k":"p","t":"Đối với các trường hợp quy định tại điểm c.1, điểm c.2, điểm c.3 khoản 5 Điều này, người bán, người mua phải có đầy đủ hồ sơ, chứng từ liên quan đến việc trả lại hàng hóa, dịch vụ và phải xuất trình khi cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền yêu cầu;"},{"k":"p","t":"c.4) Trường hợp người bán đã lập hóa đơn khi thu tiền trước khi cung cấp dịch vụ hoặc lập hóa đơn thu tiền đối với hoạt động kinh doanh bất động sản, xây dựng cơ sở hạ tầng, xây dựng nhà để bán, nhà chuyển nhượng sau đó phát sinh việc huỷ hoặc chấm dứt giao dịch và huỷ một phần việc cung cấp dịch vụ thì người bán thực hiện điều chỉnh hóa đơn điện tử đã lập theo quy định tại điểm c.1 khoản 5 Điều này."},{"k":"p","t":"d) Trường hợp tổ chức tín dụng, tổ chức cung ứng dịch vụ thanh toán không dùng tiền mặt (sau đây gọi là tổ chức cung ứng dịch vụ thanh toán) thực hiện hoạt động ngân hàng, cung ứng dịch vụ thanh toán không dùng tiền mặt đã lập hóa đơn thu phí dịch vụ sau đó phát sinh giao dịch hoàn phí dịch vụ cho khách hàng thì tổ chức cung ứng dịch vụ thanh toán thực hiện lập hóa đơn để điều chỉnh, trên hóa đơn không cần có thông tin “Điều chỉnh cho hóa đơn số.... Mẫu số... ký hiệu... ngày...tháng...năm” Trường hợp người bán và người mua có thỏa thuận về việc lập văn bản thỏa thuận trước khi lập hóa đơn điều chỉnh thì biên bản hoặc thỏa thuận bằng văn bản được lưu giữ cùng với hóa đơn thu dịch vụ tại doanh nghiệp và xuất trình khi có yêu cầu;"},{"k":"p","t":"đ) Đối với trường hợp khách hàng sử dụng thẻ trả trước dịch vụ viễn thông di động để thanh toán cho các dịch vụ được chấp nhận thanh toán bằng thẻ trả trước dịch vụ viễn thông di động theo quy định của pháp luật và khi bán thẻ, hoàn thành cung cấp dịch vụ doanh nghiệp viễn thông đã thực hiện lập hóa đơn giá trị gia tăng theo quy định, doanh nghiệp viễn thông căn cứ vào dữ liệu trên bảng kê (gồm các thông tin: số thuê bao di động sử dụng thẻ để thanh toán dịch vụ, giá trị thẻ trước thuế giá trị gia tăng được sử dụng để thanh toán và thuế giá trị gia tăng tương ứng) để thực hiện lập hóa đơn điều chỉnh;"},{"k":"p","t":"e) Trường hợp bán khí thiên nhiên tại thị trường Việt Nam được xác định giá ghi trên hợp đồng mua bán khí bằng đồng tiền ngoại tệ tự do chuyển đổi phù hợp với pháp luật liên quan và hợp đồng dầu khí, thanh toán và lập hóa đơn bằng đồng Việt Nam, khi bán khí đã lập hóa đơn điện tử không có sai sót nhưng khi thanh toán thực tế có sự thay đổi về giá trị do phải quy đổi ra Việt Nam đồng thì người bán thực hiện lập hóa đơn điều chỉnh đối với phần chênh lệch nêu trên."},{"k":"p","t":"6. Áp dụng hóa đơn điều chỉnh, thay thế"},{"k":"p","t":"a) Trường hợp hóa đơn điện tử đã lập sai và người bán đã xử lý theo hình thức điều chỉnh hoặc thay thế theo quy định tại Điều này, sau đó lại phát hiện hóa đơn sai thì các lần xử lý tiếp theo người bán sẽ thực hiện theo hình thức đã áp dụng khi xử lý lần đầu;"},{"k":"p","t":"b) Trường hợp theo quy định hóa đơn điện tử được lập không có ký hiệu mẫu số hóa đơn, ký hiệu hóa đơn, số hóa đơn đã lập sai thì người bán chỉ thực hiện lập hóa đơn điều chỉnh;"},{"k":"p","t":"c) Đối với nội dung về giá trị trên hóa đơn điều chỉnh thì bắt buộc điều chỉnh tăng (ghi số dương), điều chỉnh giảm (ghi số âm) đúng với thực tế điều chỉnh;"},{"k":"p","t":"d) Hóa đơn điều chỉnh đối với trường hợp quy định tại khoản 5 Điều này thì người bán kê khai vào kỳ phát sinh hóa đơn điều chỉnh, người mua kê khai vào kỳ nhận được hóa đơn điều chỉnh."},{"k":"p","t":"7. Trường hợp hóa đơn điện tử theo từng lần phát sinh cần phải lập hóa đơn điều chỉnh hoặc thay thế, tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh gửi đơn đề nghị cấp hóa đơn điện tử có mã của cơ quan thuế theo Mẫu số 06/ĐN-PSĐT Phụ lục III kèm theo Thông tư này đến cơ quan thuế để được cấp hóa đơn điện tử điều chỉnh hoặc thay thế cho hóa đơn đã lập. Việc lập hóa đơn điều chỉnh hoặc thay thế thực hiện theo quy định tại Điều 10 Thông tư này và việc nộp thuế, các khoản thu khác thuộc ngân sách nhà nước tính trên doanh thu chênh lệch tăng trên hóa đơn thực hiện theo quy định của pháp luật quản lý thuế."}]},{"id":"tt91_11","no":11,"code":"Điều 11","title":"Điều 11. Chuyển đổi áp dụng hóa đơn điện tử","shortTitle":"Chuyển đổi áp dụng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đang sử dụng hóa đơn điện tử không có mã của cơ quan thuế nếu có nhu cầu chuyển đổi áp dụng hóa đơn điện tử có mã của cơ quan thuế thì thực hiện thay đổi thông tin sử dụng hóa đơn điện tử theo quy định tại Điều 6 Thông tư này."},{"k":"p","t":"2. Người nộp thuế thuộc đối tượng sử dụng hóa đơn điện tử không có mã của cơ quan thuế theo quy định tại điểm b khoản 1 Điều 6 Nghị định số 254/2026/NĐ-CP nếu thuộc trường hợp được xác định rủi ro cao về thuế theo quy định tại Thông tư số 94/2026/TT-BTC và được cơ quan thuế thông báo theo Mẫu số 01/TB-KTT Phụ lục IV kèm theo Thông tư này về việc chuyển đổi áp dụng hóa đơn điện tử có mã của cơ quan thuế thì phải chuyển đổi sang áp dụng hóa đơn điện tử có mã của cơ quan thuế. Trong thời gian 10 ngày làm việc kể từ ngày cơ quan thuế thông báo, người nộp thuế phải thay đổi thông tin sử dụng hóa đơn điện tử (chuyển từ sử dụng hóa đơn điện tử không có mã của cơ quan thuế sang hóa đơn điện tử có mã của cơ quan thuế) theo quy định tại Điều 6 Thông tư này. Sau 12 tháng kể từ thời điểm chuyển sang sử dụng hóa đơn điện tử có mã của cơ quan thuế, người nộp thuế có nhu cầu sử dụng hóa đơn điện tử không có mã thì người nộp thuế thay đổi thông tin sử dụng hóa đơn điện tử theo quy định tại Điều 6 Thông tư này, cơ quan thuế căn cứ quy định tại Điều 6 Nghị định số 254/2026/NĐ-CP và quy định tại Thông tư số 94/2026/TT-BTC để xem xét, chấp nhận hoặc không chấp nhận."}]},{"id":"tt91_12","no":12,"code":"Điều 12","title":"Điều 12. Điều kiện kỹ thuật, nhân sự, bảo đảm an toàn thông tin, bảo mật dữ liệu của tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử","shortTitle":"Điều kiện kỹ thuật, nhân sự, bảo đảm an toàn thông tin, bảo mật dữ liệu của tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tiêu chí đối với tổ chức cung cấp giải pháp hóa đơn điện tử, chứng từ điện tử cho người bán và người mua."},{"k":"p","t":"a) Về chủ thể:"},{"k":"p","t":"a.1) Là tổ chức hoạt động trong lĩnh vực công nghệ thông tin được thành lập theo pháp luật Việt Nam;"},{"k":"p","t":"a.2) Thông tin về dịch vụ hóa đơn điện tử được công khai trên trang thông tin điện tử của tổ chức."},{"k":"p","t":"b) Về nhân sự: có tối thiểu 05 nhân sự trình độ đại học chuyên ngành về công nghệ thông tin;"},{"k":"p","t":"c) Về kỹ thuật: Có hạ tầng kỹ thuật, thiết bị công nghệ thông tin, hệ thống phần mềm đáp ứng yêu cầu:"},{"k":"p","t":"c.1) Cung cấp giải pháp khởi tạo, xử lý, lưu trữ dữ liệu hóa đơn điện tử cho người bán và người mua, chứng từ điện tử theo quy định của pháp luật về hóa đơn, chứng từ và pháp luật khác có liên quan;"},{"k":"p","t":"c.2) Có giải pháp nhận, truyền dữ liệu hóa đơn điện tử, chứng từ điện tử với người sử dụng dịch vụ; giải pháp truyền, nhận dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế thông qua tổ chức nhận, truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử. Thông tin quá trình nhận, truyền dữ liệu phải được ghi nhật ký để phục vụ công tác đối soát;"},{"k":"p","t":"c.3) Có giải pháp sao lưu, khôi phục, bảo mật dữ liệu hóa đơn điện tử, chứng từ điện tử;"},{"k":"p","t":"c.4) Có tài liệu kết quả kiểm thử kỹ thuật thành công về giải pháp truyền nhận dữ liệu hóa đơn điện tử, chứng từ điện tử với tổ chức cung cấp dịch vụ nhận, truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử."},{"k":"p","t":"2. Tiêu chí đối với tổ chức cung cấp dịch vụ nhận, truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử:"},{"k":"p","t":"a) Về chủ thể:"},{"k":"p","t":"a.1) Là tổ chức được thành lập theo pháp luật Việt Nam, có tối thiểu 05 năm hoạt động trong lĩnh vực công nghệ thông tin;"},{"k":"p","t":"a.2) Thông tin về dịch vụ hóa đơn điện tử, chứng từ điện tử được công khai trên trang thông tin điện tử của tổ chức."},{"k":"p","t":"b) Về tài chính: Có ký quỹ tại một ngân hàng hoạt động hợp pháp tại Việt Nam hoặc có giấy bảo lãnh của một ngân hàng hoạt động hợp pháp tại Việt Nam với giá trị không dưới 05 tỷ đồng để giải quyết các rủi ro và bồi thường thiệt hại có thể xảy ra trong quá trình cung cấp dịch vụ;"},{"k":"p","t":"c) Về nhân sự: Có tối thiểu 20 nhân sự trình độ đại học chuyên ngành về công nghệ thông tin;"},{"k":"p","t":"d) Về kỹ thuật: Có hạ tầng kỹ thuật, thiết bị công nghệ thông tin, hệ thống phần mềm đáp ứng yêu cầu:"},{"k":"p","t":"d.1) Cung cấp giải pháp khởi tạo, xử lý, lưu trữ dữ liệu hóa đơn điện tử có mã của cơ quan thuế, hóa đơn điện tử khởi tạo từ máy tính tiền, hóa đơn điện tử không có mã của cơ quan thuế cho người bán, người mua và chứng từ điện tử theo quy định của pháp luật về hóa đơn, chứng từ và pháp luật khác có liên quan;"},{"k":"p","t":"d.2) Có giải pháp kết nối, nhận, truyền, lưu trữ dữ liệu hóa đơn điện tử với tổ chức cung cấp dịch vụ hóa đơn điện tử cho người bán và người mua, chứng từ điện tử; giải pháp kết nối nhận, truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế. Thông tin quá trình nhận, truyền dữ liệu phải được ghi nhật ký để phục vụ công tác đối soát;"},{"k":"p","t":"d.3) Hệ thống hạ tầng kỹ thuật cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử được vận hành trên môi trường trung tâm dữ liệu chính và trung tâm dữ liệu dự phòng. Trung tâm dự phòng cách xa trung tâm dữ liệu chính tối thiểu 20 km và sẵn sàng hoạt động khi hệ thống chính gặp sự cố;"},{"k":"p","t":"d.4) Hệ thống có khả năng phát hiện, cảnh báo, ngăn chặn các truy cập không hợp pháp, các hình thức tấn công trên môi trường mạng để bảo đảm tính bảo mật, toàn vẹn của dữ liệu trao đổi giữa các bên tham gia;"},{"k":"p","t":"d.5) Có hệ thống sao lưu, khôi phục dữ liệu;"},{"k":"p","t":"d.6) Kết nối với Cục Thuế thông qua kênh thuê riêng hoặc kênh MPLS VPN Layer 3 hoặc tương đương, gồm 1 kênh truyền chính và 2 kênh truyền dự phòng. Mỗi kênh truyền có băng thông tối thiểu 20 Mbps; sử dụng dịch vụ Web (Web Service) hoặc hàng đợi (Queue) có mã hóa làm phương thức để kết nối; sử dụng giao thức SOAP/TCP để đóng gói và truyền nhận dữ liệu."},{"k":"p","t":"3. Cục Thuế đăng tải thông tin của tổ chức cung cấp giải pháp hóa đơn điện tử và tổ chức cung cấp dịch vụ nhận, truyền, lưu trữ dữ liệu hóa đơn với cơ quan thuế:"},{"k":"p","t":"a) Đăng tải công khai thông tin của tổ chức cung cấp giải pháp hóa đơn điện tử lên Trang thông tin điện tử của Cục Thuế: Tổ chức cung cấp giải pháp hóa đơn điện tử gửi hồ sơ chứng minh đáp ứng các tiêu chí tại khoản 1 Điều này, tài liệu mô tả dịch vụ và cam kết thực hiện đến Cục Thuế. Trong vòng 10 ngày kể từ ngày nhận được hồ sơ, Cục Thuế đăng công khai tài liệu mô tả dịch vụ và cam kết của tổ chức lên Trang thông tin điện tử của Cục Thuế. Các tổ chức phải chịu trách nhiệm về hồ sơ văn bản cung cấp. Trong quá trình hoạt động, trường hợp phát hiện tổ chức cung cấp dịch vụ không đúng quy định, Cục Thuế thông báo và hủy thông tin công khai của tổ chức trên Trang thông tin điện tử của Cục Thuế;"},{"k":"p","t":"b) Đăng tải thông tin của tổ chức cung cấp dịch vụ nhận, truyền, lưu trữ dữ liệu hóa đơn với cơ quan thuế:"},{"k":"p","t":"Tổ chức phải đáp ứng các tiêu chí quy định tại khoản 2 Điều này đến Cục Thuế và thực hiện kết nối để chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế theo quy định tại khoản 3 Điều 6 Thông tư này, Cục Thuế đăng công khai danh sách các tổ chức đáp ứng đầy đủ các quy định nêu trên lên Trang thông tin điện tử của Cục Thuế."}]},{"id":"tt91_13","no":13,"code":"Điều 13","title":"Điều 13. Biện pháp khuyến khích người mua lấy hóa đơn khi mua hàng hóa, dịch vụ","shortTitle":"Biện pháp khuyến khích người mua lấy hóa đơn khi mua hàng hóa, dịch vụ","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Người bán hàng hóa, cung cấp dịch vụ, tổ chức cung cấp dịch vụ hóa đơn điện tử, cơ quan thuế sử dụng cơ sở dữ liệu về hóa đơn điện tử để thực hiện các biện pháp khuyến khích người mua lấy hóa đơn khi mua hàng hóa, dịch vụ."},{"k":"p","t":"2. Cơ quan thuế thực hiện các biện pháp khuyến khích người mua lấy hóa đơn khi mua hàng hóa, dịch vụ để đảm bảo thu hút, lan tỏa, xây dựng thói quen lấy hóa đơn khi tiêu dùng, bao gồm:"},{"k":"p","t":"a) Tổ chức chương trình hóa đơn may mắn hàng tháng và cuối năm đối với những hóa đơn điện tử có người mua là người tiêu dùng để trao thưởng bằng tiền;"},{"k":"p","t":"b) Các biện pháp khuyến khích khác."},{"k":"p","t":"3. Mức kinh phí thực hiện các biện pháp khuyến khích quy định tại khoản 2 Điều này không quá 150 tỷ đồng/năm."},{"k":"p","t":"4. Cục trưởng Cục Thuế xây dựng phương án tổ chức, giá trị giải thưởng chương trình hóa đơn may mắn trên cơ sở dữ liệu về hóa đơn điện tử và các biện pháp khuyến khích khác."},{"k":"p","t":"5. Ngân sách nhà nước hằng năm bảo đảm ưu tiên bố trí kinh phí triển khai các biện pháp khuyến khích người mua lấy hóa đơn khi mua hàng hóa, dịch vụ từ nguồn dự toán chi quản lý hành chính không giao thực hiện chế độ tự chủ của cơ quan thuế theo quy định."},{"k":"p","t":"6. Việc lập, chấp hành dự toán, quản lý, sử dụng, kế toán, quyết toán, chuyển nguồn kinh phí thực hiện theo quy định của pháp luật về tài chính, ngân sách nhà nước và các văn bản quy định, hướng dẫn liên quan."}]},{"id":"tt91_14","no":14,"code":"Điều 14","title":"Điều 14. Mức khen thưởng, hình thức, trình tự, thủ tục, quản lý, sử dụng kinh phí khen thưởng người tiêu dùng tố giác người bán không lập và giao hóa đơn","shortTitle":"Mức khen thưởng, hình thức, trình tự, thủ tục, quản lý, sử dụng kinh phí khen thưởng người tiêu dùng tố giác người bán không lập và giao hóa đơn","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Trình tự, thủ tục và thẩm quyền xem xét khen thưởng:"},{"k":"p","t":"a) Cơ quan thuế tiếp nhận thông tin tố giác do người tiêu dùng cung cấp, phân loại để kiểm tra, xác minh;"},{"k":"p","t":"b) Hồ sơ làm căn cứ khen thưởng bao gồm: Tài liệu, chứng cứ về hành vi vi phạm theo quy định tại Điều 41 Nghị định số 254/2026/NĐ-CP; Kết luận kiểm tra hoặc quyết định xử lý vi phạm hành chính về hóa đơn của cơ quan có thẩm quyền; Thông tin về cá nhân được đề nghị khen thưởng; Tài liệu khác có liên quan (nếu có);"},{"k":"p","t":"c) Trên cơ sở hồ sơ tại điểm b khoản này, cơ quan thuế ban hành quyết định khen thưởng đối với cá nhân cung cấp thông tin đáp ứng các điều kiện quy định tại khoản 1 Điều 41 Nghị định số 254/2026/NĐ-CP."},{"k":"p","t":"2. Cơ quan thuế các cấp có trách nhiệm xem xét, lập hồ sơ đề nghị khen thưởng đối với các trường hợp thuộc phạm vi quản lý và quyết định khen thưởng trên cơ sở kết luận kiểm tra hoặc quyết định xử lý vi phạm hành chính về hóa đơn đã được ban hành."},{"k":"p","t":"3. Cục trưởng Cục Thuế có trách nhiệm hướng dẫn việc tổ chức tiếp nhận, xử lý thông tin do cá nhân cung cấp; xem xét, lập hồ sơ đề nghị khen thưởng theo quy định; mức khen thưởng, quản lý, sử dụng kinh phí đúng mục đích, đúng chế độ, định mức; bảo đảm công khai, minh bạch trong việc chi khen thưởng."}]},{"id":"tt91_15","no":15,"code":"Điều 15","title":"Điều 15. Trình tự, thủ tục cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh","shortTitle":"Trình tự, thủ tục cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thuộc trường hợp được cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh thực hiện như sau:"},{"k":"p","t":"a) Gửi đơn đề nghị cấp hóa đơn điện tử có mã của cơ quan thuế theo Mẫu số 06/ĐN-PSDT Phụ lục III kèm theo Thông tư này và truy cập vào Hệ thống thông tin quản lý thuế để lập hóa đơn điện tử;"},{"k":"p","t":"b) Trường hợp người nộp thuế thuộc trường hợp được cấp hóa đơn bán hàng theo từng lần phát sinh tại điểm a khoản 2 Điều 6 Nghị định số 254/2026/NĐ-CP thì phải nộp đầy đủ số thuế phát sinh trên hóa đơn đề nghị cấp theo quy định của pháp luật thuế giá trị gia tăng, thu nhập cá nhân, thu nhập doanh nghiệp hoặc số phát sinh phải nộp theo pháp luật quản lý thuế và các loại thuế, phí khác (nếu có);"},{"k":"p","t":"c) Trường hợp người nộp thuế thuộc trường hợp được cấp hóa đơn giá trị gia tăng theo từng lần phát sinh tại điểm b khoản 2 Điều 6 Nghị định số 254/2026/NĐ-CP thì phải nộp số thuế giá trị gia tăng trên hóa đơn giá trị gia tăng theo từng lần phát sinh hoặc số phát sinh phải nộp theo pháp luật quản lý thuế;"},{"k":"p","t":"d) Người nộp thuế thuộc trường hợp được cấp hóa đơn bán tài sản công có mã của cơ quan thuế theo quy định tại điểm c khoản 2 Điều 6 Nghị định số 254/2026/NĐ-CP thì không phải khai và nộp số thuế phát sinh trên hóa đơn đề nghị cấp;"},{"k":"p","t":"đ) Sau khi tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh đã nộp đủ thuế hoặc số phát sinh phải nộp (nếu có) thì chậm nhất là ngày làm việc tiếp theo, cơ quan thuế cấp mã của cơ quan thuế trên hóa đơn điện tử."},{"k":"p","t":"Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh tự chịu trách nhiệm về tính chính xác của các thông tin trên hóa đơn điện tử theo từng lần phát sinh được cơ quan thuế cấp mã;"},{"k":"p","t":"e) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh khai hồ sơ khai thuế theo quy định pháp luật về quản lý thuế."},{"k":"p","t":"2. Xác định cơ quan thuế cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh:"},{"k":"p","t":"a) Đối với tổ chức, doanh nghiệp: Cơ quan thuế quản lý trực tiếp hoặc cơ quan thuế nơi phát sinh hoạt động bán hàng hóa, cung cấp dịch vụ;"},{"k":"p","t":"b) Đối với hộ kinh doanh, cá nhân kinh doanh:"},{"k":"p","t":"b.1) Đối với hộ kinh doanh, cá nhân kinh doanh có địa điểm kinh doanh cố định bao gồm cả kinh doanh thương mại điện tử có nhiều địa điểm kinh doanh (cửa hàng) hoạt động trên cùng địa bàn một tỉnh, thành phố hoặc khác tỉnh, thành phố nộp hồ sơ đề nghị cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh tại cơ quan thuế quản lý trực tiếp trụ sở của hộ kinh doanh, cá nhân kinh doanh được xác định là địa điểm ghi trên giấy chứng nhận đăng ký kinh doanh đối với hộ kinh doanh hoặc trên tờ khai đăng ký thuế đối với cá nhân kinh doanh;"},{"k":"p","t":"b.2) Đối với hộ kinh doanh, cá nhân kinh doanh không có địa điểm kinh doanh cố định: Hộ kinh doanh, cá nhân kinh doanh nộp hồ sơ đề nghị cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh tại cơ quan thuế quản lý địa bàn nơi hộ kinh doanh, cá nhân kinh doanh cư trú: nơi ở hiện tại; nơi tạm trú hoặc nơi thường trú."}]},{"id":"tt91_16","no":16,"code":"Điều 16","title":"Điều 16. Trình tự, thủ tục tiêu hủy hóa đơn đặt in của cơ quan thuế, biên lai giấy, hóa đơn bán hàng dự trữ quốc gia (hóa đơn bằng giấy)","shortTitle":"Trình tự, thủ tục tiêu hủy hóa đơn đặt in của cơ quan thuế, biên lai giấy, hóa đơn bán hàng dự trữ quốc gia (hóa đơn bằng giấy)","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan thuế thực hiện tiêu hủy biên lai, hóa đơn do cơ quan thuế đặt in đã thông báo phát hành chưa bán nhưng không tiếp tục sử dụng. Cục Thuế có trách nhiệm hướng dẫn quy trình tiêu hủy biên lai do cơ quan thuế đặt in. Trường hợp tổ chức, đơn vị sử dụng hóa đơn giấy bán hàng dự trữ quốc gia, tổ chức thu phí, lệ phí thực hiện tiêu hủy hóa đơn giấy, biên lai giấy thì gửi Thông báo kết quả tiêu hủy hóa đơn, biên lai theo Mẫu số 02/HUY-HĐBLG Phụ lục III kèm theo Thông tư này đến cơ quan thuế quản lý trực tiếp chậm nhất không quá 05 ngày làm việc kể từ ngày thực hiện tiêu hủy hóa đơn giấy (bao gồm hóa đơn giấy bán hàng dự trữ quốc gia), biên lai giấy, đồng thời lưu trữ tại đơn vị."}]},{"id":"tt91_17","no":17,"code":"Điều 17","title":"Điều 17. Đăng ký sử dụng chứng từ điện tử","shortTitle":"Đăng ký sử dụng chứng từ điện tử","chuong":"Chương III — QUY ĐỊNH VỀ CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân khấu trừ thuế thu nhập cá nhân, tổ chức thu các khoản thuế, phí, lệ phí trước khi sử dụng chứng từ điện tử theo khoản 1 Điều 22 Nghị định số 254/2026/NĐ-CP thì thực hiện đăng ký sử dụng qua Hệ thống thông tin quản lý thuế, Trang thông tin điện tử của Cục Hải quan hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử. Đối với các khoản thuế, phí, lệ phí hàng hóa xuất khẩu, nhập khẩu thực hiện đăng ký sử dụng qua Trang thông tin điện tử của Cục Hải quan."},{"k":"p","t":"Trường hợp tổ chức, cá nhân trả thu nhập thuộc trường hợp được miễn phí dịch vụ theo quy định tại Điều 28 Nghị định số 254/2026/NĐ-CP thì được lựa chọn đăng ký sử dụng chứng từ điện tử thông qua Hệ thống thông tin quản lý thuế hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử được Cục Thuế ủy thác cung cấp dịch vụ."},{"k":"p","t":"Nội dung thông tin đăng ký theo Mẫu số 01/ĐKTĐ-CTĐT Phụ lục III kèm theo Thông tư này."},{"k":"p","t":"Hệ thống thông tin quản lý thuế, Trang thông tin điện tử của Cục Hải quan gửi thông báo theo Mẫu số 01/TB-TNĐT Phụ lục IV kèm theo Thông tư này về việc tiếp nhận đăng ký sử dụng chứng từ điện tử qua địa chỉ thư điện tử đã đăng ký với cơ quan quản lý thuế, qua tổ chức cung cấp dịch vụ hóa đơn điện tử đối với trường hợp đăng ký sử dụng chứng từ điện tử thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử."},{"k":"p","t":"2. Trong thời gian 01 ngày làm việc kể từ ngày nhận được đăng ký sử dụng chứng từ điện tử, cơ quan quản lý thuế có trách nhiệm gửi thông báo điện tử theo Mẫu số 01/TB-ĐKĐT Phụ lục IV kèm theo Thông tư này qua tổ chức cung cấp dịch vụ hóa đơn điện tử và gửi thông báo điện tử trực tiếp đến tổ chức, cá nhân khấu trừ thuế; tổ chức thu các khoản phí, lệ phí về việc chấp nhận hoặc không chấp nhận đăng ký sử dụng chứng từ điện tử."},{"k":"p","t":"3. Trường hợp có thay đổi thông tin đã đăng ký sử dụng chứng từ điện tử, tổ chức, cá nhân tại khoản 1 Điều này thực hiện thay đổi thông tin và gửi lại cơ quan quản lý thuế theo Mẫu số 01/ĐKTĐ-CTĐT Phụ lục III kèm theo Thông tư này qua Hệ thống thông tin quản lý thuế, Trang thông tin điện tử của Cục Hải quan hoặc qua tổ chức cung cấp dịch vụ hóa đơn điện tử. Hệ thống thông tin quản lý thuế, Trang thông tin điện tử của Cục Hải quan tiếp nhận mẫu đăng ký thay đổi thông tin và cơ quan quản lý thuế thực hiện theo quy định tại khoản 2 Điều này."}]},{"id":"tt91_18","no":18,"code":"Điều 18","title":"Điều 18. Định dạng chứng từ điện tử","shortTitle":"Định dạng chứng từ điện tử","chuong":"Chương III — QUY ĐỊNH VỀ CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Các loại chứng từ quy định tại Điều 22 Nghị định số 254/2026/NĐ-CP phải thực hiện theo định dạng sau:"},{"k":"p","t":"a) Định dạng chứng từ điện tử sử dụng ngôn ngữ định dạng văn bản XML (XML là chữ viết tắt của cụm từ tiếng Anh “eXtensible Markup Language\" được tạo ra với mục đích chia sẻ dữ liệu điện tử giữa các hệ thống công nghệ thông tin);"},{"k":"p","t":"b) Định dạng chứng từ điện tử gồm hai thành phần: thành phần chứa dữ liệu nghiệp vụ chứng từ điện tử và thành phần chứa dữ liệu chữ ký số;"},{"k":"p","t":"c) Cục Thuế, Cục Hải quan xây dựng và công bố thành phần chứa dữ liệu nghiệp vụ chứng từ điện tử và cung cấp công cụ hiển thị các nội dung của chứng từ điện tử theo quy định tại Thông tư này. Thành phần chứa dữ liệu chữ ký số thực hiện theo quy định của pháp luật giao dịch điện tử."},{"k":"p","t":"2. Chứng từ điện tử phải được hiển thị đầy đủ, chính xác các nội dung của chứng từ đảm bảo không dẫn tới cách hiểu sai lệch, để người sử dụng có thể đọc được bằng phương tiện điện tử."}]},{"id":"tt91_19","no":19,"code":"Điều 19","title":"Điều 19. Ký hiệu mẫu, ký hiệu chứng từ điện tử","shortTitle":"Ký hiệu mẫu, ký hiệu chứng từ điện tử","chuong":"Chương III — QUY ĐỊNH VỀ CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ trong lĩnh vực quản lý thuế, phí, lệ phí của cơ quan quản lý thuế bao gồm: Chứng từ khấu trừ thuế, biên lai."},{"k":"p","t":"2. Quy định chi tiết về ký hiệu mẫu, ký hiệu chứng từ điện tử thực hiện theo quy định tại Phụ lục II kèm theo Thông tư này."},{"k":"p","t":"3. Thuế tỉnh, thành phố khởi tạo biên lai thuế điện tử Mẫu CTT50 Phụ lục V kèm theo Thông tư này để sử dụng thu thuế sử dụng đất nông nghiệp, thuế sử dụng đất phi nông nghiệp đối với hộ gia đình, cá nhân."}]},{"id":"tt91_20","no":20,"code":"Điều 20","title":"Điều 20. Xử lý chứng từ điện tử đã lập","shortTitle":"Xử lý chứng từ điện tử đã lập","chuong":"Chương III — QUY ĐỊNH VỀ CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp sai về các nội dung trên chứng từ như tên, địa chỉ, số tiền bằng chữ hoặc các nội dung khác nhưng không sai về mã số thuế, số tiền ghi trên chứng từ thì tổ chức lập chứng từ điện tử thông báo cho bên nhận chứng từ điện tử về việc chứng từ đã lập sai và không phải lập lại chứng từ. Tổ chức lập chứng từ điện tử thông báo với cơ quan thuế về chứng từ đã lập sai theo Mẫu số 04/SS-CTĐT Phụ lục III kèm theo Thông tư này."},{"k":"p","t":"2. Các trường hợp chứng từ điện tử đã lập sai ngoài các trường hợp quy định tại khoản 1 Điều này thì tổ chức lập chứng từ điện tử thay thế cho chứng từ điện tử đã lập sai."}]},{"id":"tt91_21","no":21,"code":"Điều 21","title":"Điều 21. Cung cấp, tra cứu thông tin hóa đơn điện tử","shortTitle":"Cung cấp, tra cứu thông tin hóa đơn điện tử","chuong":"Chương IV — TRA CỨU, CUNG CẤP, SỬ DỤNG THÔNG TIN HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung thông tin hóa đơn điện tử được cung cấp là các nội dung của hóa đơn điện tử theo quy định tại Điều 10 Nghị định số 254/2026/NĐ-CP và tình trạng hóa đơn điện tử."},{"k":"p","t":"2. Thông tin hóa đơn điện tử được cơ quan thuế cung cấp dưới dạng văn bản hoặc dữ liệu điện tử."}]},{"id":"tt91_22","no":22,"code":"Điều 22","title":"Điều 22. Đăng ký mới, bổ sung thông tin đăng ký, thu hồi tài khoản truy cập Hệ thống thông tin quản lý thuế để khai thác sử dụng thông tin hóa đơn điện tử","shortTitle":"Đăng ký mới, bổ sung thông tin đăng ký, thu hồi tài khoản truy cập Hệ thống thông tin quản lý thuế để khai thác sử dụng thông tin hóa đơn điện tử","chuong":"Chương IV — TRA CỨU, CUNG CẤP, SỬ DỤNG THÔNG TIN HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Đầu mối đăng ký của bên sử dụng thông tin gửi 01 văn bản đến Cục Thuế hoặc Thuế tỉnh, thành phố để đề nghị đăng ký mới hoặc bổ sung thông tin hoặc thu hồi tài khoản theo Mẫu số 01/CCTT-ĐK Phụ lục III kèm theo Thông tư này."},{"k":"p","t":"2. Trong thời hạn không quá 02 ngày làm việc kể từ khi nhận được văn bản đề nghị, Cục Thuế hoặc Thuế tỉnh, thành phố thực hiện việc cấp tài khoản mới hoặc bổ sung thông tin của tài khoản hoặc thu hồi tài khoản và thông báo cho bên sử dụng thông tin bằng văn bản. Trường hợp không chấp nhận đăng ký tài khoản hoặc không bổ sung thời hạn sử dụng của tài khoản phải nêu rõ lý do."},{"k":"p","t":"Các tài khoản đăng ký mới cấp cho từng cá nhân được thông báo bằng hình thức gửi thư điện tử."},{"k":"p","t":"3. Thời hạn sử dụng tài khoản truy cập Hệ thống thông tin quản lý thuế đối với trường hợp đăng ký mới và bổ sung thông tin là 12 tháng hoặc do bên sử dụng thông tin đề nghị nhưng không quá 12 tháng tính từ ngày Cục Thuế hoặc Thuế tỉnh, thành phố gửi văn bản thông báo kết quả đăng ký của bên sử dụng thông tin. Trước khi hết thời hạn sử dụng tài khoản 30 ngày, Hệ thống thông tin quản lý thuế tự động gửi thông báo cảnh báo hết hạn cho bên sử dụng thông tin. Trường hợp bên sử dụng thông tin không thay đổi thông tin, không vi phạm quy định kết nối và có nhu cầu tiếp tục khai thác, việc gia hạn được thực hiện tự động thông qua phương thức điện tử xác thực bằng chữ ký số của bên sử dụng thông tin trên Hệ thống. Thời gian gia hạn mỗi lần không quá 12 tháng."}]},{"id":"tt91_23","no":23,"code":"Điều 23","title":"Điều 23. Chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử","shortTitle":"Chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử","chuong":"Chương IV — TRA CỨU, CUNG CẤP, SỬ DỤNG THÔNG TIN HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Cục Thuế, Thuế tỉnh, thành phố thực hiện việc thu hồi tài khoản truy cập Hệ thống thông tin quản lý thuế trong các trường hợp sau:"},{"k":"p","t":"a) Khi có đề nghị từ đầu mối đăng ký của bên sử dụng thông tin;"},{"k":"p","t":"b) Thời hạn sử dụng đã hết;"},{"k":"p","t":"c) Tài khoản truy cập Hệ thống thông tin quản lý thuế không thực hiện việc tra cứu thông tin trong thời gian 06 tháng liên tục;"},{"k":"p","t":"d) Phát hiện trường hợp sử dụng thông tin hóa đơn điện tử không đúng mục đích, phục vụ cho hoạt động nghiệp vụ theo chức năng, nhiệm vụ của bên sử dụng thông tin, không đúng quy định của pháp luật về bảo vệ bí mật nhà nước."},{"k":"p","t":"2. Chậm nhất là 05 ngày làm việc trước thời điểm chính thức chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử của bên sử dụng thông tin (trừ trường hợp đầu mối đăng ký của bên sử dụng thông tin có đề nghị bằng văn bản), Cục Thuế, Thuế tỉnh, thành phố thông báo bằng hình thức điện tử cho bên sử dụng thông tin về việc chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử, chứng từ điện tử."}]},{"id":"tt91_24","no":24,"code":"Điều 24","title":"Điều 24. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp tổ chức cung cấp dịch vụ về hóa đơn điện tử đã ký hợp đồng cung cấp nhận, truyền, lưu trữ dữ liệu hóa đơn với Cục Thuế (trước ngày 01 tháng 3 năm 2025 là Tổng cục Thuế) trước ngày Thông tư này có hiệu lực thi hành thì tiếp tục thực hiện theo hợp đồng đã ký."},{"k":"p","t":"2. Kể từ thời điểm tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử theo quy định tại Nghị định số 254/2026/NĐ-CP và quy định tại Thông tư này, nếu phát hiện hóa đơn đã lập theo quy định tại Nghị định số 51/2010/NĐ-CP, Nghị định số 04/2014/NĐ-CP và các văn bản hướng dẫn của Bộ Tài chính mà hóa đơn đã lập sai thì người bán và người mua phải lập văn bản thỏa thuận ghi rõ nội dung sai và lập hóa đơn điện tử mới (hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử không có mã) thay thế cho hóa đơn đã lập sai và cập nhật đầy đủ thông tin hóa đơn bị thay thế. Hóa đơn điện tử thay thế hóa đơn đã lập sai phải có dòng chữ “Thay thế cho hóa đơn Mẫu số... ký hiệu... số... ngày... tháng... năm\". Người bán ký số trên hóa đơn điện tử mới thay thế hóa đơn đã lập sai (hóa đơn lập theo Nghị định số 51/2010/NĐ-CP, Nghị định số 04/2014/NĐ-CP và các văn bản hướng dẫn của Bộ Tài chính) để gửi cho người mua (đối với trường hợp sử dụng hóa đơn điện tử không có mã của cơ quan thuế) hoặc người bán gửi cơ quan thuế để được cấp mã cho hóa đơn điện tử thay thế hóa đơn đã lập (đối với trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế). Đối với hóa đơn đã lập theo Nghị định số 123/2020/NĐ-CP, Nghị định số 70/2025/NĐ-CP và Thông tư số 32/2025/TT-BTC thì thực hiện điều chỉnh hoặc thay thế theo quy định."}]},{"id":"tt91_25","no":25,"code":"Điều 25","title":"Điều 25. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01 tháng 7 năm 2026."},{"k":"p","t":"2. Kể từ ngày Thông tư này có hiệu lực thi hành, Thông tư số 32/2025/TT-BTC ngày 31 tháng 5 năm 2025 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện một số điều của Luật Quản lý thuế ngày 13 tháng 6 năm 2019, Nghị định số 123/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định về hóa đơn, chứng từ, Nghị định số 70/2025/NĐ-CP ngày 20 tháng 3 năm 2025 sửa đổi, bổ sung một số điều của Nghị định số 123/2020/NĐ-CP hết hiệu lực thi hành."},{"k":"p","t":"3. Thông tư này gồm 05 Phụ lục, các phụ lục từ Phụ lục I đến Phụ lục IV có tính bắt buộc, Phụ lục V có tính chất tham khảo (không bắt buộc)."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để nghiên cứu giải quyết."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Văn phòng Trung ương Đảng và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Quốc hội;\n- Văn phòng Chủ tịch nước;\n- Văn phòng Chính phủ;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Viện kiểm sát nhân dân tối cao;\n- Tòa án nhân dân tối cao;\n- Kiểm toán Nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan Trung ương của các đoàn thể;\n- Các bộ, cơ quan ngang bộ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Sở Tài chính, Thuế các tỉnh, TP trực thuộc trung ương;\n- Chi cục Hải quan, Kho bạc Nhà nước khu vực;\n- Cục kiểm tra văn bản và Tổ chức thi hành pháp luật, Bộ Tư pháp;\n- Cơ sở dữ liệu quốc gia về pháp luật;\n- Cổng pháp luật quốc gia;\n- Công báo;\n- Cổng th
