<script id="LD" type="application/json">{"meta":{"title":"Nghị định 293/2025/NĐ-CP — Mức lương tối thiểu đối với người lao động","shortCode":"NĐ 293/2025","subtitle":"Lương tối thiểu vùng","slug":"nd293","effectiveDate":"01/01/2026","scope":"Nghị định này quy định mức lương tối thiểu tháng và mức lương tối thiểu giờ áp dụng đối với người lao động làm việc theo hợp đồng lao động.","description":"Lương tối thiểu vùng","related":[]},"outline":[{"id":"nd293_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Nghị định này quy định mức lương tối thiểu tháng và mức lương tối thiểu giờ áp dụng đối với người lao động làm việc theo hợp đồng lao động."}]},{"id":"nd293_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động làm việc theo hợp đồng lao động theo quy định của Bộ luật Lao động."},{"k":"p","t":"2. Người sử dụng lao động theo quy định của Bộ luật Lao động, bao gồm:"},{"k":"p","t":"a) Doanh nghiệp theo quy định của Luật Doanh nghiệp."},{"k":"p","t":"b) Cơ quan, tổ chức, hợp tác xã, hộ gia đình, cá nhân có thuê mướn, sử dụng người lao động làm việc cho mình theo thỏa thuận."},{"k":"p","t":"3. Các cơ quan, tổ chức, cá nhân khác có liên quan đến việc thực hiện mức lương tối thiểu quy định tại Nghị định này."}]},{"id":"nd293_3","no":3,"code":"Điều 3","title":"Điều 3. Mức lương tối thiểu","shortTitle":"Mức lương tối thiểu","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Quy định mức lương tối thiểu tháng và mức lương tối thiểu giờ đối với người lao động làm việc cho người sử dụng lao động theo vùng như sau:"},{"k":"tbl","rows":[["Vùng","Mức lương tối thiểu tháng\n(Đơn vị: đồng/tháng)","Mức lương tối thiểu giờ\n(Đơn vị: đồng/giờ)"],["Vùng I","5.310.000","25.500"],["Vùng II","4.730.000","22.700"],["Vùng III","4.140.000","20.000"],["Vùng IV","3.700.000","17.800"]]},{"k":"p","t":"2. Danh mục địa bàn vùng I, vùng II, vùng III, vùng IV được quy định tại Phụ lục ban hành kèm theo Nghị định này."},{"k":"p","t":"3. Việc áp dụng địa bàn vùng được xác định theo nơi hoạt động của người sử dụng lao động như sau:"},{"k":"p","t":"a) Người sử dụng lao động hoạt động trên địa bàn thuộc vùng nào thì áp dụng mức lương tối thiểu quy định đối với địa bàn đó."},{"k":"p","t":"b) Người sử dụng lao động có đơn vị, chi nhánh hoạt động trên các địa bàn có mức lương tối thiểu khác nhau thì đơn vị, chi nhánh hoạt động ở địa bàn nào, áp dụng mức lương tối thiểu quy định đối với địa bàn đó."},{"k":"p","t":"c) Người sử dụng lao động hoạt động trong khu công nghiệp, khu chế xuất, khu công nghệ cao, khu công nghệ số tập trung nằm trên các địa bàn có mức lương tối thiểu khác nhau thì áp dụng theo địa bàn có mức lương tối thiểu cao nhất."},{"k":"p","t":"d) Người sử dụng lao động hoạt động trên địa bàn có sự thay đổi tên hoặc chia thì tạm thời áp dụng mức lương tối thiểu quy định đối với địa bàn trước khi thay đổi tên hoặc chia cho đến khi Chính phủ có quy định mới."},{"k":"p","t":"đ) Người sử dụng lao động hoạt động trên địa bàn được thành lập mới từ một địa bàn hoặc nhiều địa bàn có mức lương tối thiểu khác nhau thì áp dụng mức lương tối thiểu theo địa bàn có mức lương tối thiểu cao nhất cho đến khi Chính phủ có quy định mới."}]},{"id":"nd293_4","no":4,"code":"Điều 4","title":"Điều 4. Áp dụng mức lương tối thiểu","shortTitle":"Áp dụng mức lương tối thiểu","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Mức lương tối thiểu tháng là mức lương thấp nhất làm cơ sở để thỏa thuận và trả lương đối với người lao động áp dụng hình thức trả lương theo tháng, bảo đảm mức lương theo công việc hoặc chức danh của người lao động làm việc đủ thời giờ làm việc bình thường trong tháng và hoàn thành định mức lao động hoặc công việc đã thỏa thuận không được thấp hơn mức lương tối thiểu tháng."},{"k":"p","t":"2. Mức lương tối thiểu giờ là mức lương thấp nhất làm cơ sở để thỏa thuận và trả lương đối với người lao động áp dụng hình thức trả lương theo giờ, bảo đảm mức lương theo công việc hoặc chức danh của người lao động làm việc trong một giờ và hoàn thành định mức lao động hoặc công việc đã thỏa thuận không được thấp hơn mức lương tối thiểu giờ."},{"k":"p","t":"3. Đối với người lao động áp dụng hình thức trả lương theo tuần hoặc theo ngày hoặc theo sản phẩm hoặc lương khoán thì mức lương của các hình thức trả lương này nếu quy đổi theo tháng hoặc theo giờ không được thấp hơn mức lương tối thiểu tháng hoặc mức lương tối thiểu giờ. Mức lương quy đổi theo tháng hoặc theo giờ trên cơ sở thời giờ làm việc bình thường do người sử dụng lao động lựa chọn theo quy định của pháp luật lao động như sau:"},{"k":"p","t":"a) Mức lương quy đổi theo tháng bằng mức lương theo tuần nhân với 52 tuần chia cho 12 tháng; hoặc mức lương theo ngày nhân với số ngày làm việc bình thường trong tháng; hoặc mức lương theo sản phẩm, lương khoán thực hiện trong thời giờ làm việc bình thường trong tháng."},{"k":"p","t":"b) Mức lương quy đổi theo giờ bằng mức lương theo tuần, theo ngày chia cho số giờ làm việc bình thường trong tuần, trong ngày; hoặc mức lương theo sản phẩm, lương khoán chia cho số giờ làm việc trong thời giờ làm việc bình thường để sản xuất sản phẩm, thực hiện nhiệm vụ khoán."}]},{"id":"nd293_5","no":5,"code":"Điều 5","title":"Điều 5. Hiệu lực và trách nhiệm thi hành","shortTitle":"Hiệu lực và trách nhiệm thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"2. Nghị định số 74/2024/NĐ-CP ngày 30 tháng 6 năm 2024 của Chính phủ quy định mức lương tối thiểu đối với người lao động làm việc theo hợp đồng lao động hết hiệu lực kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"3. Bãi bỏ khoản 7 Điều 15 và Phụ lục I kèm theo của Nghị định số 128/2025/NĐ-CP ngày 11 tháng 6 năm 2025 của Chính phủ quy định về phân quyền, phân cấp trong quản lý nhà nước lĩnh vực nội vụ."},{"k":"p","t":"4. Người sử dụng lao động có trách nhiệm tổ chức rà soát lại các thỏa thuận trong hợp đồng lao động, thoả ước lao động tập thể và các quy chế, quy định của người sử dụng lao động để điều chỉnh, bổ sung cho phù hợp; không được xoá bỏ hoặc cắt giảm các chế độ tiền lương khi người lao động làm thêm giờ, làm việc vào ban đêm, chế độ bồi dưỡng bằng hiện vật và các chế độ khác theo quy định của pháp luật lao động. Đối với các nội dung đã thỏa thuận, cam kết trong hợp đồng lao động, thoả ước lao động tập thể hoặc các thỏa thuận hợp pháp khác có lợi hơn cho người lao động (như chế độ trả lương cho người lao động làm công việc hoặc chức danh đòi hỏi qua học tập, đào tạo nghề cao hơn ít nhất 7% so với mức lương tối thiểu và chế độ trả lương cho người lao động làm công việc hoặc chức danh có điều kiện lao động nặng nhọc, độc hại, nguy hiểm cao hơn ít nhất 5%; công việc hoặc chức danh có điều kiện lao động đặc biệt nặng nhọc, độc hại, nguy hiểm cao hơn ít nhất 7% so với mức lương của công việc hoặc chức danh có độ phức tạp tương đương, làm việc trong điều kiện lao động bình thường) so với quy định tại Nghị định này, thì tiếp tục được thực hiện, trừ trường hợp các bên có thỏa thuận khác."},{"k":"p","t":"5. Đối với trường hợp do điều chỉnh địa bàn áp dụng mà mức lương tối thiểu gắn với địa bàn tại Phụ lục kèm theo Nghị định này thấp hơn mức lương tối thiểu do Chính phủ quy định tại thời điểm ngày 31 tháng 12 năm 2025 thì người sử dụng lao động phải tiếp tục thực hiện mức lương tối thiểu tại thời điểm ngày 31 tháng 12 năm 2025 đối với những người lao động được tuyển dụng từ ngày 31 tháng 12 năm 2025 trở về trước cho đến khi Chính phủ có quy định mới."},{"k":"p","t":"Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và người sử dụng lao động chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các đoàn thể;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT,\ncác Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2)","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\nHồ Đức Phớc"]]},{"k":"p","t":"Phụ lục"},{"k":"p","t":"DANH MỤC ĐỊA BÀN ÁP DỤNG MỨC LƯƠNG TỐI THIỂU TỪ NGÀY 01 THÁNG 01 NĂM 2026"},{"k":"p","t":"(Kèm theo Nghị định số 293/2025/NĐ-CP ngày 10 tháng 11 năm 2025 của Chính phủ)"},{"k":"p","t":"1. Thành phố Hà Nội"},{"k":"p","t":"- Vùng I, gồm các phường Hoàn Kiếm, Cửa Nam, Ba Đình, Ngọc Hà, Giảng Võ, Hai Bà Trưng, Vĩnh Tuy, Bạch Mai, Đống Đa, Kim Liên, Văn Miếu - Quốc Tử Giám, Láng, Ô Chợ Dừa, Hồng Hà, Lĩnh Nam, Hoàng Mai, Vĩnh Hưng, Tương Mai, Định Công, Hoàng Liệt, Yên Sở, Thanh Xuân, Khương Đình, Phương Liệt, Cầu Giấy, Nghĩa Đô, Yên Hoà, Tây Hồ, Phú Thượng, Tây Tựu, Phú Diễn, Xuân Đỉnh, Đông Ngạc, Thượng Cát, Từ Liêm, Xuân Phương, Tây Mỗ, Đại Mỗ, Long Biên, Bồ Đề, Việt Hưng, Phúc Lợi, Hà Đông, Dương Nội, Yên Nghĩa, Phú Lương, Kiến Hưng, Thanh Liệt, Chương Mỹ, Sơn Tây, Tùng Thiện và các xã Thanh Trì, Đại Thanh, Nam Phù, Ngọc Hồi, Thượng Phúc, Thường Tín, Chương Dương, Hồng Vân, Phú Xuyên, Thanh Oai, Bình Minh, Tam Hưng, Dân Hòa, Phú Nghĩa, Xuân Mai, Trần Phú, Hoà Phú, Quảng Bị, Yên Bài, Đoài Phương, Thạch Thất, Hạ Bằng, Tây Phương, Hoà Lạc, Yên Xuân, Quốc Oai, Hưng Đạo, Kiều Phú, Phú Cát, Hoài Đức, Dương Hoà, Sơn Đồng, An Khánh, Gia Lâm, Thuận An, Bát Tràng, Phù Đổng, Thư Lâm, Đông Anh, Phúc Thịnh, Thiên Lộc, Vĩnh Thanh, Mê Linh, Yên Lãng, Tiến Thắng, ức khác nhau thì áp dụng theo địa bàn có mức lương tối thiểu cao nhất.","Địa bàn thay đổi tên hoặc chia thì tạm áp dụng mức trước khi thay đổi; địa bàn thành lập mới từ nhiều địa bàn có mức khác nhau thì áp dụng theo mức cao nhất, đến khi Chính phủ có quy định mới."]},"nd293_4":{"tldr":"Mức lương tối thiểu tháng và giờ là mức thấp nhất làm cơ sở thỏa thuận và trả lương; lương theo tuần, ngày, sản phẩm, khoán khi quy đổi không được thấp hơn mức lương tối thiểu tháng hoặc giờ.","points":["Mức lương tối thiểu tháng là mức thấp nhất với người trả lương theo tháng làm đủ thời giờ làm việc bình thường trong tháng và hoàn thành định mức/công việc đã thỏa thuận.","Mức lương tối thiểu giờ là mức thấp nhất với người trả lương theo giờ làm việc trong một giờ và hoàn thành định mức/công việc đã thỏa thuận.","Lương theo tuần, ngày, sản phẩm hoặc khoán khi quy đổi theo tháng hoặc giờ không được thấp hơn mức lương tối thiểu tháng hoặc giờ.","Quy đổi theo tháng: lương tuần nhân 52 tuần chia 12 tháng; hoặc lương ngày nhân số ngày làm việc bình thường trong tháng; hoặc lương sản phẩm, khoán thực hiện trong thời giờ làm việc bình thường trong tháng.","Quy đổi theo giờ: lương tuần, ngày chia số giờ làm việc bình thường trong tuần, trong ngày; hoặc lương sản phẩm, khoán chia số giờ làm việc trong thời giờ làm việc bình thường."]},"nd293_5":{"tldr":"Nghị định có hiệu lực từ ngày 01/01/2026, thay thế Nghị định 74/2024/NĐ-CP; người sử dụng lao động phải rà soát hợp đồng, thỏa ước để điều chỉnh phù hợp và không cắt giảm các chế độ tiền lương hiện có.","points":["Có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026.","Nghị định số 74/2024/NĐ-CP ngày 30/6/2024 hết hiệu lực kể từ ngày Nghị định này có hiệu lực; bãi bỏ khoản 7 Điều 15 và Phụ lục I của Nghị định số 128/2025/NĐ-CP ngày 11/6/2025.","Người sử dụng lao động rà soát hợp đồng, thỏa ước, quy chế để điều chỉnh; không xóa bỏ hoặc cắt giảm chế độ làm thêm giờ, làm ban đêm, bồi dưỡng bằng hiện vật và các chế độ khác.","Nội dung đã thỏa thuận có lợi hơn được tiếp tục thực hiện, ví dụ cao hơn ít nhất 7% so với mức lương tối thiểu với công việc qua học tập, đào tạo nghề; cao hơn ít nhất 5% với điều kiện nặng nhọc, độc hại, nguy hiểm; cao hơn ít nhất 7% với điều kiện đặc biệt nặng nhọc, độc hại, nguy hiểm.","Trường hợp điều chỉnh địa bàn làm mức lương tối thiểu thấp hơn mức tại thời điểm 31/12/2025 thì tiếp tục thực hiện mức tại 31/12/2025 với người được tuyển dụng từ 31/12/2025 trở về trước, đến khi Chính phủ có quy định mới."]}}}</script>

function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
