<script id="LD" type="application/json">{"meta":{"title":"Nghị định 273/2026/NĐ-CP — Kinh doanh hàng miễn thuế","shortCode":"NĐ 273/2026","subtitle":"Kinh doanh hàng miễn thuế (thay NĐ100/2020)","slug":"nd273","effectiveDate":"21/08/2026","scope":"Nghị định này quy định về quản lý hải quan, thủ tục hải quan, kiểm tra, giám sát hải quan đối với hoạt động kinh doanh hàng miễn thuế.","description":"Kinh doanh hàng miễn thuế (thay NĐ100/2020)","related":[]},"outline":[{"id":"nd273_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Nghị định này quy định về quản lý hải quan, thủ tục hải quan, kiểm tra, giám sát hải quan đối với hoạt động kinh doanh hàng miễn thuế."}]},{"id":"nd273_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người xuất cảnh, quá cảnh, nhập cảnh."},{"k":"p","t":"2. Đối tượng được hưởng quyền ưu đãi, miễn trừ tại Việt Nam."},{"k":"p","t":"3. Thuyền viên làm việc trên tàu biển chạy tuyến quốc tế."},{"k":"p","t":"4. Hành khách trên các chuyến bay quốc tế đi và đến Việt Nam."},{"k":"p","t":"5. Doanh nghiệp đủ điều kiện kinh doanh hàng miễn thuế theo quy định của pháp luật."},{"k":"p","t":"6. Cơ quan hải quan, công chức hải quan."},{"k":"p","t":"7. Đơn vị kinh doanh cảng biển, cảng hàng không dân dụng quốc tế, ga đường sắt liên vận quốc tế."},{"k":"p","t":"8. Ban quản lý khu kinh tế cửa khẩu đường bộ quốc tế, đơn vị được giao quản lý cửa khẩu đường bộ quốc tế."},{"k":"p","t":"9. Tổ chức có quyền và nghĩa vụ liên quan đến hoạt động kinh doanh bán hàng miễn thuế."},{"k":"p","t":"10. Các cơ quan khác của Nhà nước trong việc phối hợp quản lý nhà nước đối với hoạt động kinh doanh hàng miễn thuế."}]},{"id":"nd273_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc quản lý đối với hàng miễn thuế","shortTitle":"Nguyên tắc quản lý đối với hàng miễn thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chính sách thuế đối với hàng hóa đưa vào bán tại cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện theo quy định của pháp luật về thuế, quản lý thuế có liên quan."},{"k":"p","t":"2. Chính sách quản lý chuyên ngành đối với hàng hóa đưa vào bán tại cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện theo quy định của pháp luật về quản lý chuyên ngành có liên quan."},{"k":"p","t":"3. Hàng hóa đưa vào bán tại cửa hàng miễn thuế bao gồm: Hàng hóa tạm nhập khẩu từ nước ngoài, khu phi thuế quan, kho ngoại quan; hàng hóa từ nội địa được phép lưu thông theo quy định của pháp luật Việt Nam."},{"k":"p","t":"Hàng hóa tạm nhập khẩu từ nước ngoài, khu phi thuế quan, kho ngoại quan đưa vào bán tại cửa hàng miễn thuế là mặt hàng không thuộc danh mục hàng cấm nhập khẩu, tạm ngừng nhập khẩu theo quy định của pháp luật về quản lý ngoại thương và quản lý hải quan theo loại hình tạm nhập, tái xuất."},{"k":"p","t":"Hàng hóa từ nội địa được phép lưu thông theo quy định của pháp luật đưa vào bán tại cửa hàng miễn thuế là mặt hàng không thuộc danh mục hàng cấm xuất khẩu, tạm ngừng xuất khẩu. Trường hợp hàng hóa thuộc mặt hàng xuất khẩu có điều kiện thì phải đáp ứng các điều kiện theo quy định của pháp luật."},{"k":"p","t":"4. Hàng hóa từ nội địa được phép lưu thông theo quy định của pháp luật Việt Nam đưa vào bán tại cửa hàng miễn thuế được cơ quan hải quan quản lý, giám sát trên cơ sở thông báo danh sách hàng hóa đưa vào cửa hàng miễn thuế, kho chứa hàng miễn thuế của doanh nghiệp kinh doanh hàng miễn thuế."},{"k":"p","t":"5. Hàng hóa bán tại cửa hàng miễn thuế phải được lưu giữ tại cửa hàng miễn thuế, kho chứa hàng miễn thuế của doanh nghiệp kinh doanh hàng miễn thuế."},{"k":"p","t":"6. Thời gian lưu giữ hàng hóa tại cửa hàng miễn thuế theo quy định tại điểm a khoản 2 Điều 47 Luật Hải quan số 54/2014/QH13 ngày 23 tháng 6 năm 2014."},{"k":"p","t":"7. Các mặt hàng thuốc lá, xì gà, rượu, bia, bán tại cửa hàng miễn thuế phải dán tem “VIET NAM DUTY NOT PAID” do Bộ Tài chính phát hành. Vị trí dán tem “VIET NAM DUTY NOT PAID” thực hiện theo Phụ lục I ban hành kèm theo Nghị định này. Tem phải được dán trước khi bày bán tại cửa hàng miễn thuế hoặc trước khi giao cho đối tượng mua hàng trong trường hợp hàng được xuất thẳng từ kho chứa hàng miễn thuế đến đối tượng mua hàng."},{"k":"p","t":"8. Hàng hóa bị đổ vỡ, hư hỏng, mất phẩm chất, kém chất lượng, hết hạn sử dụng, không được bán phục vụ tiêu dùng: Doanh nghiệp lập biên bản về tình trạng hàng hóa để tiêu hủy (có xác nhận của Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế) và tổ chức tiêu hủy theo quy định. Trước khi thực hiện tiêu hủy, doanh nghiệp phải có văn bản thông báo cụ thể về kế hoạch tiêu hủy cho Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế để tổ chức giám sát việc tiêu hủy theo quy định."},{"k":"p","t":"9. Hàng hóa là hàng mẫu, hàng dùng thử đưa vào cửa hàng miễn thuế cho khách mua hàng dùng thử (giấy thử mùi nước hoa, rượu, mỹ phẩm, nước hoa,...), túi, bao bì nhập khẩu để đựng hàng miễn thuế cho khách mua hàng, doanh nghiệp thực hiện quản lý riêng hàng hóa này, đảm bảo sử dụng đúng mục đích và phải báo cáo quyết toán với cơ quan hải quan theo quy định tại Điều 19 Nghị định này."}]},{"id":"nd273_4","no":4,"code":"Điều 4","title":"Điều 4. Đồng tiền dùng trong giao dịch bán hàng miễn thuế","shortTitle":"Đồng tiền dùng trong giao dịch bán hàng miễn thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đồng Việt Nam."},{"k":"p","t":"2. Đồng ngoại tệ đô la Mỹ (USD), euro (EUR)."},{"k":"p","t":"3. Đồng tiền của nước có chung biên giới đất liền với địa điểm đặt cửa hàng miễn thuế tại khu vực biên giới."},{"k":"p","t":"4. Đồng tiền của quốc gia nơi các chuyến bay quốc tế của các hãng hàng không được thành lập và hoạt động theo pháp luật Việt Nam thực hiện nhập cảnh, quá cảnh tại quốc gia đó."}]},{"id":"nd273_5","no":5,"code":"Điều 5","title":"Điều 5. Đối tượng và điều kiện mua hàng miễn thuế","shortTitle":"Đối tượng và điều kiện mua hàng miễn thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người xuất cảnh, quá cảnh sau khi hoàn thành thủ tục xuất cảnh, quá cảnh hoặc người chờ xuất cảnh được mua hàng miễn thuế."},{"k":"p","t":"a) Người xuất cảnh, quá cảnh qua các cửa khẩu đường bộ quốc tế, ga đường sắt liên vận quốc tế, cảng biển, cảng hàng không dân dụng quốc tế được mua hàng miễn thuế tại cửa hàng miễn thuế nằm trong khu vực cách ly;"},{"k":"p","t":"b) Người chờ xuất cảnh được mua hàng miễn thuế tại cửa hàng miễn thuế trong nội địa và nhận tại quầy nhận hàng trong khu cách ly tại cửa khẩu quốc tế nơi hành khách xuất cảnh;"},{"k":"p","t":"c) Ngoài địa điểm nhận hàng quy định tại khoản này, khách mua hàng quy định tại điểm a, điểm b khoản này được nhận hàng ở nước ngoài."},{"k":"p","t":"2. Hành khách trên các chuyến bay quốc tế xuất cảnh từ Việt Nam được mua hàng miễn thuế trên tàu bay xuất cảnh. Hành khách trên các chuyến bay quốc tế đến Việt Nam được mua hàng miễn thuế trên tàu bay đang thực hiện chuyến bay quốc tế đến Việt Nam."},{"k":"p","t":"3. Người nhập cảnh được mua hàng miễn thuế tại cửa hàng miễn thuế đặt tại khu vực hạn chế của cảng hàng không dân dụng quốc tế ngay sau khi hoàn thành thủ tục nhập cảnh, không được mua hàng miễn thuế sau khi đã ra khỏi khu vực hạn chế tại cảng hàng không dân dụng quốc tế."},{"k":"p","t":"4. Đối tượng được hưởng quyền ưu đãi, miễn trừ tại Việt Nam được mua hàng miễn thuế tại cửa hàng miễn thuế trong nội địa. Khi mua hàng miễn thuế cho tổ chức phải xuất trình sổ định mức hàng miễn thuế. Khi mua hàng miễn thuế cho cá nhân phải xuất trình sổ định mức hàng miễn thuế kèm chứng minh thư do Bộ Ngoại giao cấp."},{"k":"p","t":"5. Đối tượng mua hàng là thuyền viên làm việc trên tàu biển chạy tuyến quốc tế (bao gồm tàu biển có quốc tịch nước ngoài và tàu biển có quốc tịch Việt Nam chạy tuyến quốc tế) được mua hàng miễn thuế tại cảng biển, cửa hàng miễn thuế trong nội địa phục vụ cho nhu cầu cá nhân, nhu cầu sinh hoạt chung của thuyền viên để sử dụng trên tàu trong thời gian tàu neo đậu tại cảng biển Việt Nam và để sử dụng trên tàu ngoài lãnh hải Việt Nam sau khi tàu xuất cảnh."},{"k":"p","t":"a) Trường hợp mua hàng miễn thuế phục vụ nhu cầu cá nhân thuyền viên phải xuất trình hộ chiếu hoặc thẻ đi bờ của thuyền viên;"},{"k":"p","t":"b) Trường hợp mua hàng miễn thuế phục vụ nhu cầu sinh hoạt chung của thuyền viên trong thời gian tàu neo đậu tại cảng biển Việt Nam, người mua hàng phải cung cấp thông tin số hiệu tàu, ngày tàu nhập cảnh, số hộ chiếu của từng thuyền viên;"},{"k":"p","t":"c) Trường hợp hàng miễn thuế phục vụ nhu cầu của thuyền viên cho hành trình tiếp theo ngoài lãnh hải Việt Nam, người mua hàng phải cung cấp thông tin về số hiệu tàu, ngày tàu nhập cảnh, số hộ chiếu của từng thuyền viên. Hàng hóa phải được đưa vào kho chứa của tàu để cơ quan hải quan nơi tàu xuất cảnh niêm phong, xác nhận, giám sát cho đến khi tàu xuất cảnh."},{"k":"p","t":"6. Trong quá trình thực hiện, trường hợp thông tin cá nhân của người mua hàng miễn thuế có thể khai thác được từ Cơ sở dữ liệu quốc gia về dân cư, Cơ sở dữ liệu quốc gia khác hoặc Cơ sở dữ liệu chuyên ngành thì không yêu cầu người mua hàng miễn thuế xuất trình bản giấy các loại giấy tờ cung cấp thông tin này."}]},{"id":"nd273_6","no":6,"code":"Điều 6","title":"Điều 6. Định lượng mua hàng miễn thuế","shortTitle":"Định lượng mua hàng miễn thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người xuất cảnh, quá cảnh, người chờ xuất cảnh quy định tại khoản 1 Điều 5 Nghị định này hoặc hành khách trên các chuyến bay quốc tế xuất cảnh từ Việt Nam quy định tại khoản 2 Điều 5 Nghị định này được mua hàng miễn thuế không hạn chế số lượng và trị giá nhưng phải tự chịu trách nhiệm về thủ tục và định lượng để nhập khẩu vào nước nhập cảnh."},{"k":"p","t":"2. Hành khách trên các chuyến bay quốc tế đến Việt Nam, người nhập cảnh quy định tại khoản 2, khoản 3 Điều 5 Nghị định này được mua hàng miễn thuế theo định mức quy định tại khoản 1, khoản 2 Điều 6 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"3. Đối tượng quy định tại khoản 4 Điều 5 Nghị định này được mua hàng miễn thuế theo định lượng quy định tại Điều 5 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu. Trường hợp mua hàng tại cửa hàng miễn thuế trong cửa khẩu đường bộ quốc tế, ga đường sắt liên vận quốc tế, cảng biển, cảng hàng không dân dụng quốc tế thì áp dụng định mức như đối với người xuất cảnh, nhập cảnh."},{"k":"p","t":"4. Đối tượng quy định tại điểm a, điểm b khoản 5 Điều 5 Nghị định này được mua hàng miễn thuế phục vụ cho nhu cầu cá nhân, nhu cầu sinh hoạt chung của thuyền viên trên tàu biển chạy tuyến quốc tế trong thời gian tàu biển neo đậu tại cảng biển Việt Nam, định mức mỗi thuyền viên trong một lần tàu neo đậu tại cảng biển Việt Nam như sau:"},{"k":"p","t":"a) Rượu từ 20 độ trở lên: 1,5 lít hoặc rượu dưới 20 độ: 2,0 lít hoặc đồ uống có cồn, bia: 3,0 lít."},{"k":"p","t":"Đối với rượu nguyên chai, bình, lọ, can (sau đây viết tắt là chai) có dung tích lớn hơn dung tích quy định định mức tại điểm a khoản 4 Điều này nhưng không vượt quá 01 lít thì được miễn thuế cả chai. Trường hợp vượt quá 01 lít thì phần vượt định mức phải nộp thuế theo quy định của pháp luật;"},{"k":"p","t":"b) Thuốc lá điếu: 200 điếu hoặc thuốc lá sợi: 250 gam hoặc xì gà: 20 điếu."},{"k":"p","t":"5. Đối tượng quy định tại điểm c khoản 5 Điều 5 Nghị định này được mua hàng miễn thuế không hạn chế về số lượng và trị giá để sử dụng trên tàu ngoài lãnh hải Việt Nam sau khi tàu xuất cảnh."}]},{"id":"nd273_7","no":7,"code":"Điều 7","title":"Điều 7. Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa đưa vào bán tại cửa hàng miễn thuế","shortTitle":"Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa đưa vào bán tại cửa hàng miễn thuế","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với hàng hóa tạm nhập khẩu từ nước ngoài, khu phi thuế quan và kho ngoại quan: Doanh nghiệp thực hiện thủ tục tạm nhập khẩu theo quy định tại Nghị định số 08/2015/NĐ-CP ngày 21 tháng 01 năm 2015 của Chính phủ quy định chi tiết và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan và Nghị định số 167/2025/NĐ-CP ngày 30 tháng 6 năm 2025 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 08/2015/NĐ-CP."},{"k":"p","t":"2. Đối với hàng hóa từ nội địa đưa vào cửa hàng miễn thuế, kho hàng miễn thuế: Doanh nghiệp gửi danh sách hàng hóa đưa vào/đưa ra cửa hàng miễn thuế, kho chứa hàng miễn thuế theo các chỉ tiêu thông tin tại Mẫu số 08a, Mẫu số 08b, Mẫu số 08c Phụ lục II Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan. Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện phê duyệt hoặc không phê duyệt kèm lý do không phê duyệt cho doanh nghiệp thông qua hệ thống xử lý dữ liệu điện tử hải quan trong vòng 02 giờ làm việc kể từ khi hệ thống tiếp nhận thông tin. Sau khi nhận được phản hồi của hệ thống xử lý dữ liệu điện tử hải quan, doanh nghiệp được đưa hàng hóa vào cửa hàng miễn thuế, kho chứa hàng miễn thuế. Khi doanh nghiệp đưa hàng hóa vào cửa hàng miễn thuế, kho chứa hàng miễn thuế, Hải quan kiểm tra đối chiếu thực tế hàng hóa với danh sách hàng hóa của doanh nghiệp thông qua hệ thống xử lý dữ liệu điện tử hải quan để xác nhận thực tế hàng hóa đưa vào cửa hàng miễn thuế, kho chứa hàng miễn thuế."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp thông báo bằng văn bản về việc đưa hàng hóa vào kho chứa hàng miễn thuế, cửa hàng miễn thuế theo Mẫu số 08/DSHH Phụ lục III ban hành kèm theo Nghị định này và gửi dữ liệu lên hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"Trường hợp có nghi ngờ về danh sách hàng hóa, trong vòng 02 giờ làm việc kể từ khi hệ thống xử lý dữ liệu điện tử hải quan phản hồi, Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện kiểm tra, đối chiếu thông tin trên hệ thống xử lý dữ liệu điện tử hải quan với thực tế hàng hóa đưa vào cửa hàng miễn thuế, kho chứa hàng miễn thuế của doanh nghiệp. Trường hợp có dấu hiệu vi phạm, Chi cục trưởng Chi cục Hải quan ban hành Quyết định kiểm tra thực tế lượng hàng tồn của cửa hàng miễn thuế, kho chứa hàng miễn thuế. Việc tổ chức thực hiện kiểm tra chậm nhất trong vòng 10 ngày làm việc kể từ ngày ký quyết định."},{"k":"p","t":"Trường hợp phức tạp, Chi cục trưởng Chi cục Hải quan ban hành quyết định gia hạn thời hạn kiểm tra nhưng không quá 05 ngày làm việc kể từ ngày kết thúc kiểm tra ghi trên quyết định kiểm tra."},{"k":"p","t":"Nội dung kiểm tra và kết quả kiểm tra được ghi nhận bằng biên bản kiểm tra theo Mẫu số 11/BBKT Phụ lục III ban hành kèm theo Nghị định này."},{"k":"p","t":"Cơ quan hải quan thực hiện xác nhận thực tế hàng hóa đưa vào cửa hàng miễn thuế, kho chứa hàng miễn thuế theo kết quả kiểm tra thực tế thông qua hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"nd273_8","no":8,"code":"Điều 8","title":"Điều 8. Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa luân chuyển giữa kho chứa hàng miễn thuế, cửa hàng miễn thuế","shortTitle":"Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa luân chuyển giữa kho chứa hàng miễn thuế, cửa hàng miễn thuế","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp luân chuyển hàng hóa giữa các kho chứa hàng miễn thuế, giữa các cửa hàng miễn thuế, giữa kho chứa hàng miễn thuế và cửa hàng miễn thuế đặt liền kề, doanh nghiệp kinh doanh hàng miễn thuế tự chịu trách nhiệm theo dõi, quản lý."},{"k":"p","t":"2. Trường hợp luân chuyển hàng hóa giữa các kho chứa hàng miễn thuế, giữa các cửa hàng miễn thuế, giữa kho chứa hàng miễn thuế và cửa hàng miễn thuế đặt tại vị trí khác nhau nhưng cùng nằm trong khu vực cách ly, khu vực hạn chế"},{"k":"p","t":"a) Doanh nghiệp có trách nhiệm gửi danh sách hàng hóa luân chuyển giữa kho chứa hàng miễn thuế, cửa hàng miễn thuế theo Mẫu số 11 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan trước khi vận chuyển hàng hóa."},{"k":"p","t":"Trong trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp thông báo bằng văn bản về việc vận chuyển hàng hóa với cơ quan hải quan và gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục;"},{"k":"p","t":"b) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện phê duyệt hoặc không phê duyệt kèm lý do không phê duyệt thông tin luân chuyển hàng hóa cho doanh nghiệp thông qua hệ thống xử lý dữ liệu điện tử hải quan trong vòng 02 giờ làm việc kể từ khi hệ thống tiếp nhận thông tin."},{"k":"p","t":"Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế có trách nhiệm kiểm tra thực tế hàng hóa được vận chuyển trên cơ sở áp dụng quản lý rủi ro hoặc có dấu hiệu vi phạm pháp luật và phê duyệt văn bản thông báo của doanh nghiệp về việc vận chuyển trong trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố;"},{"k":"p","t":"c) Ngay sau khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế có trách nhiệm thông báo (bằng văn bản, email, điện thoại, fax,...) với doanh nghiệp kinh doanh hàng miễn thuế biết."},{"k":"p","t":"3. Trường hợp luân chuyển hàng hóa giữa các kho chứa hàng miễn thuế, giữa các cửa hàng miễn thuế, giữa kho chứa hàng miễn thuế và cửa hàng miễn thuế đặt tại vị trí khác nhau và nằm ngoài khu vực cách ly, khu vực hạn chế chịu sự quản lý của cùng một đơn vị hải quan"},{"k":"p","t":"a) Doanh nghiệp có trách nhiệm gửi danh sách hàng hóa luân chuyển giữa kho chứa hàng miễn thuế, cửa hàng miễn thuế theo Mẫu số 11 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan trước khi vận chuyển hàng hóa. Trong trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp thực hiện thông báo bằng văn bản về việc vận chuyển và chỉ được vận chuyển hàng hóa sau khi được cơ quan hải quan phê duyệt. Trong vòng 24 giờ kể từ khi sự cố được khắc phục doanh nghiệp phải gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan. Doanh nghiệp chịu trách nhiệm vận chuyển hàng hóa đến đúng địa điểm đăng ký vận chuyển đến;"},{"k":"p","t":"b) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế có trách nhiệm giám sát hàng hóa xếp lên phương tiện để vận chuyển giữa kho chứa hàng miễn thuế, cửa hàng miễn thuế; thực hiện phê duyệt vận chuyển hàng hóa trên hệ thống xử lý dữ liệu điện tử hải quan hoặc văn bản do doanh nghiệp xuất trình ngay sau khi niêm phong hàng hóa. Niêm phong hàng hóa trước khi vận chuyển, ghi rõ số niêm phong hải quan trên bản giấy của doanh nghiệp. Khi hàng hóa vận chuyển đến địa điểm, Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế kiểm tra niêm phong, xác nhận trên hệ thống xử lý dữ liệu điện tử hải quan hoặc văn bản do doanh nghiệp xuất trình, thực hiện giám sát hàng hóa nhập vào kho chứa hàng miễn thuế hoặc cửa hàng miễn thuế;"},{"k":"p","t":"c) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện các công việc quy định tại điểm c khoản 2 Điều này."},{"k":"p","t":"4. Trường hợp luân chuyển hàng hóa giữa các kho chứa hàng miễn thuế, giữa các cửa hàng miễn thuế, giữa kho chứa hàng miễn thuế và cửa hàng miễn thuế của một doanh nghiệp có nhiều cửa hàng miễn thuế, kho chứa hàng miễn thuế tại nhiều địa điểm khác nhau chịu sự quản lý của các đơn vị hải quan khác nhau"},{"k":"p","t":"a) Doanh nghiệp có trách nhiệm gửi danh sách hàng hóa luân chuyển giữa kho chứa hàng miễn thuế, cửa hàng miễn thuế theo Mẫu số 11 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan trước khi vận chuyển hàng hóa đến cửa hàng miễn thuế, kho chứa hàng miễn thuế thuộc quản lý của đơn vị Hải quan khác."},{"k":"p","t":"Trong trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp gửi văn bản về việc vận chuyển tới cơ quan hải quan và chỉ được vận chuyển hàng hóa sau khi được cơ quan hải quan phê duyệt. Trong vòng 24 giờ kể từ khi sự cố được khắc phục doanh nghiệp phải gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Doanh nghiệp chịu trách nhiệm vận chuyển nguyên trạng hàng hóa đến các địa điểm đặt cửa hàng miễn thuế, kho chứa hàng miễn thuế theo đúng thông tin đã gửi tới hệ thống xử lý dữ liệu điện tử hải quan hoặc văn bản về việc vận chuyển."},{"k":"p","t":"b) Hải quan nơi hàng hóa chuyển đi thực hiện:"},{"k":"p","t":"Giám sát hàng hóa xếp lên phương tiện vận chuyển, niêm phong hải quan;"},{"k":"p","t":"Căn cứ thông tin doanh nghiệp đã gửi tới hệ thống xử lý dữ liệu điện tử hải quan, thực hiện lập biên bản bàn giao hàng hóa miễn thuế vận chuyển chịu sự giám sát hải quan thông qua hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 04 Phụ lục II ban hành kèm theo Nghị định này. Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, Hải quan nơi hàng hóa chuyển đi căn cứ văn bản về việc vận chuyển (bản giấy) doanh nghiệp xuất trình, thực hiện lập biên bản bàn giao hàng hóa miễn thuế vận chuyển chịu sự giám sát hải quan theo Mẫu số 04/BBBG Phụ lục III ban hành kèm theo Nghị định này, giao cho doanh nghiệp để chuyển đến Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế nơi hàng hóa được vận chuyển đến;"},{"k":"p","t":"Theo dõi thông tin về hàng hóa được vận chuyển đi, chủ trì truy tìm trong trường hợp quá thời hạn vận chuyển nhưng hàng hóa chưa đến địa điểm được vận chuyển đến;"},{"k":"p","t":"Theo dõi việc luân chuyển hàng hóa giữa các cửa hàng miễn thuế, kho chứa hàng miễn thuế trên hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"c) Hải quan nơi hàng hóa chuyển đến thực hiện:"},{"k":"p","t":"Căn cứ biên bản bàn giao do Hải quan nơi hàng hóa chuyển đi lập, thực hiện giám sát hàng hóa đưa từ phương tiện vận chuyển vào kho chứa hàng miễn thuế, cửa hàng miễn thuế;"},{"k":"p","t":"Xác nhận trên Hệ thống biên bản bàn giao hoặc xác nhận trên bản giấy của doanh nghiệp xuất trình và giao cho doanh nghiệp lưu trong trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố;"},{"k":"p","t":"Theo dõi thông tin về hàng hóa vận chuyển, phối hợp với Hải quan nơi hàng hóa được vận chuyển đi để truy tìm trong trường hợp quá thời hạn vận chuyển nhưng hàng chưa đến địa điểm được vận chuyển đến;"},{"k":"p","t":"Theo dõi việc luân chuyển hàng hóa giữa các cửa hàng miễn thuế, kho chứa hàng miễn thuế trên hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"nd273_9","no":9,"code":"Điều 9","title":"Điều 9. Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa luân chuyển giữa kho chứa hàng miễn thuế với tàu bay để bán hàng miễn thuế trên các chuyến bay quốc tế đi và đến Việt Nam","shortTitle":"Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa luân chuyển giữa kho chứa hàng miễn thuế với tàu bay để bán hàng miễn thuế trên các chuyến bay quốc tế đi và đến Việt Nam","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của doanh nghiệp kinh doanh hàng miễn thuế"},{"k":"p","t":"a) Trường hợp kho chứa hàng miễn thuế nằm trong khu cách ly"},{"k":"p","t":"Doanh nghiệp gửi thông tin về phiếu giao nhận hàng hóa theo Mẫu số 06a, Mẫu số 06b và bảng kê lượng tiền mặt theo Mẫu số 07 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan trước khi vận chuyển hàng hóa từ kho chứa hàng miễn thuế lên tàu bay và trong vòng 24 giờ sau khi hàng hóa được vận chuyển từ tàu bay về kho chứa hàng miễn thuế."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp gửi phiếu giao nhận hàng hóa theo Mẫu số 06/PGHKVTB và bảng kê lượng tiền mặt theo Mẫu số 07/BKTMKVTB Phụ lục III ban hành kèm theo Nghị định này tới cơ quan hải quan và gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"b) Trường hợp kho chứa hàng miễn thuế không nằm trong khu cách ly"},{"k":"p","t":"Khi đưa tiền mặt, hàng hóa từ kho chứa hàng miễn thuế lên tàu bay: Doanh nghiệp có trách nhiệm gửi thông tin về phiếu giao nhận hàng hóa theo Mẫu số 06a và bảng kê lượng tiền mặt theo Mẫu số 07 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan. Doanh nghiệp chỉ được vận chuyển hàng hóa sau khi được cơ quan hải quan phê duyệt trên hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp gửi phiếu giao nhận hàng hóa theo Mẫu số 06/PGHKVTB và bảng kê lượng tiền mặt theo Mẫu số 07/BKTMKVTB Phụ lục III ban hành kèm theo Nghị định này đến cơ quan hải quan và gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục. Doanh nghiệp chỉ được vận chuyển hàng hóa sau khi được cơ quan hải quan phê duyệt Mẫu số 06/PGHKVTB, Mẫu số 07/BKTMKVTB do doanh nghiệp xuất trình."},{"k":"p","t":"Đối với hàng hóa bán không hết thu hồi từ các chuyến bay quốc tế: Doanh nghiệp kinh doanh hàng miễn thuế thực hiện niêm phong phương tiện vận chuyển hàng miễn thuế trước khi đưa phương tiện chứa hàng miễn thuế ra khỏi tàu bay. Doanh nghiệp chịu trách nhiệm vận chuyển hàng miễn thuế từ tàu bay về kho hàng miễn thuế. Trong vòng 24 giờ kể từ khi tàu bay đỗ tại vị trí chỉ định theo quy định, doanh nghiệp kinh doanh hàng miễn thuế thực hiện gửi thông tin về hàng hóa bán không hết thu hồi từ các chuyến bay quốc tế theo Mẫu số 06b và bảng kê lượng tiền mặt theo Mẫu số 07 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp gửi phiếu giao nhận hàng hóa theo Mẫu số 06/PGHKVTB và bảng kê lượng tiền mặt theo Mẫu số 07/BKTMKVTB Phụ lục III ban hành kèm theo Nghị định này đến cơ quan hải quan và gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"2. Trách nhiệm của Hải quan quản lý kho chứa hàng miễn thuế"},{"k":"p","t":"a) Trường hợp kho chứa hàng miễn thuế nằm trong khu cách ly"},{"k":"p","t":"Hải quan quản lý kho chứa hàng miễn thuế có trách nhiệm kiểm tra thực tế hàng hóa được vận chuyển trên cơ sở áp dụng quản lý rủi ro hoặc có dấu hiệu vi phạm pháp luật."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, Hải quan quản lý kho chứa hàng miễn thuế, thực hiện phê duyệt Mẫu số 06/PGHKVTB và Mẫu số 07/BKTMKVTB Phụ lục III ban hành kèm theo Nghị định này trong vòng 02 giờ làm việc kể từ khi nhận được văn bản của doanh nghiệp. Ngay sau khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, Hải quan quản lý kho chứa hàng miễn thuế có trách nhiệm thông báo (bằng văn bản, email, điện thoại, fax, ...) với doanh nghiệp kinh doanh hàng miễn thuế về việc hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"b) Trường hợp kho chứa hàng miễn thuế không nằm trong khu cách ly"},{"k":"p","t":"Khi đưa tiền mặt, hàng hóa từ kho chứa hàng miễn thuế lên tàu bay: Hải quan quản lý kho chứa hàng miễn thuế thực hiện giám sát hàng hóa xếp lên phương tiện chứa hàng miễn thuế, niêm phong hải quan và phê duyệt Mẫu số 06a, Mẫu số 07 Phụ lục II ban hành kèm theo Nghị định này trên hệ thống xử lý dữ liệu điện tử hải quan ngay sau khi doanh nghiệp gửi đến hoặc Mẫu số 06/PGHKVTB và Mẫu số 07/BKTMKVTB Phụ lục III ban hành kèm theo Nghị định này ngay sau khi doanh nghiệp xuất trình."},{"k":"p","t":"Đối với hàng hóa bán không hết thu hồi từ các chuyến bay quốc tế: Hải quan quản lý kho chứa hàng miễn thuế thực hiện giám sát phương tiện chứa hàng miễn thuế không hết thu hồi từ các chuyến bay quốc tế được chuyển vào kho, kiểm tra niêm phong trên các phương tiện chứa hàng miễn thuế. Xác nhận Mẫu số 06b, Mẫu số 07 Phụ lục II ban hành kèm theo Nghị định này trên hệ thống xử lý dữ liệu điện tử hải quan hoặc Mẫu số 06/PGHKVTB, Mẫu số 07/BKTMKVTB Phụ lục III ban hành kèm theo Nghị định này do doanh nghiệp xuất trình."},{"k":"p","t":"Đội trưởng Hải quan quản lý kho chứa hàng miễn thuế quyết định kiểm tra thực tế hàng hóa được vận chuyển từ kho hàng miễn thuế đến khu cách ly trên cơ sở áp dụng quản lý rủi ro hoặc có dấu hiệu vi phạm pháp luật."},{"k":"p","t":"3. Trách nhiệm của Hải quan cửa khẩu sân bay quốc tế nơi tàu bay xuất cảnh trong trường hợp kho chứa hàng miễn thuế không nằm trong khu cách ly"},{"k":"p","t":"a) Thực hiện đối chiếu niêm phong hải quan khi phương tiện chứa hàng miễn thuế đưa vào khu cách ly."},{"k":"p","t":"b) Kiểm tra thực tế hàng hóa được vận chuyển trong khu cách ly trên cơ sở áp dụng quản lý rủi ro hoặc có dấu hiệu vi phạm pháp luật."}]},{"id":"nd273_10","no":10,"code":"Điều 10","title":"Điều 10. Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa luân chuyển giữa các kho chứa hàng miễn thuế của một doanh nghiệp kinh doanh hàng miễn thuế với tàu bay để bán hàng trên các chuyến bay quốc tế đi và đến Việt Nam trong trường hợp tàu bay nhập cảnh tại sân bay quốc tế khác với sân bay quốc tế tàu bay xuất cảnh","shortTitle":"Thủ tục hải quan, kiểm tra, giám sát hải quan đối với hàng hóa luân chuyển giữa các kho chứa hàng miễn thuế của một doanh nghiệp kinh doanh hàng miễn thuế với tàu bay để bán hàng trên các chuyến bay quốc tế đi và đến Việt Nam trong trường hợp tàu bay nhập cảnh tại sân bay quốc tế khác với sân bay quốc tế tàu bay xuất cảnh","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của doanh nghiệp kinh doanh hàng miễn thuế"},{"k":"p","t":"Thực hiện trách nhiệm quy định tại khoản 1 Điều 9 Nghị định này và thực hiện thêm các công việc sau:"},{"k":"p","t":"a) Gửi thông tin về phiếu giao nhận hàng hóa theo Mẫu số 06b Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan ngay sau khi hàng hóa được nhập vào kho chứa hàng miễn thuế tại sân bay quốc tế nơi tàu bay nhập cảnh hoặc hàng hóa được đưa thẳng từ tàu bay nhập cảnh đến kho chứa hàng miễn thuế nơi tàu bay xuất cảnh."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp gửi phiếu giao nhận hàng hóa theo Mẫu số 06/PGHKVTB Phụ lục III ban hành kèm theo Nghị định này đến cơ quan hải quan và gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"b) Thực hiện lưu giữ phương tiện chứa hàng miễn thuế trong kho chứa hàng miễn thuế của doanh nghiệp tại khu vực riêng ở sân bay nhập cảnh có ca-mê-ra giám sát, đảm bảo phân biệt được với hàng hóa, phương tiện chứa hàng miễn thuế khác trong kho chứa hàng miễn thuế đối với trường hợp hàng hóa được đưa vào kho chứa hàng miễn thuế của doanh nghiệp tại sân bay quốc tế nơi tàu bay nhập cảnh;"},{"k":"p","t":"c) Thực hiện vận chuyển hàng hóa từ tàu bay nhập cảnh đến kho chứa hàng miễn thuế tại sân bay nơi tàu bay xuất cảnh theo đúng thời gian ghi trên biên bản bàn giao quy định tại điểm c khoản 3 Điều này."},{"k":"p","t":"2. Trách nhiệm của Hải quan cửa khẩu sân bay quốc tế nơi tàu bay xuất cảnh"},{"k":"p","t":"a) Thực hiện quy định tại khoản 2, khoản 3 Điều 9 Nghị định này khi phương tiện chứa hàng miễn thuế được vận chuyển từ kho chứa hàng miễn thuế lên tàu bay."},{"k":"p","t":"b) Căn cứ biên bản bàn giao quy định tại điểm c khoản 3 Điều này, thực hiện giám sát phương tiện chứa hàng miễn thuế đưa từ phương tiện vận chuyển vào kho chứa hàng miễn thuế tại sân bay xuất cảnh; xác nhận trên Mẫu số 04 Phụ lục II ban hành kèm theo Nghị định này trên hệ thống xử lý dữ liệu điện tử hải quan hoặc ký tên, đóng dấu công chức hải quan, ghi rõ ngày, tháng, năm xác nhận trên biên bản bàn giao do doanh nghiệp xuất trình và trả lại doanh nghiệp; cập nhật thông tin hàng hóa vận chuyển đến trên hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"c) Theo dõi thông tin về quá trình vận chuyển của phương tiện chứa hàng miễn thuế, phối hợp với Hải quan cửa khẩu sân bay quốc tế nơi tàu bay nhập cảnh để xác minh trong trường hợp quá thời gian ghi trên biên bản bàn giao quy định tại điểm c khoản 3 Điều này nhưng phương tiện chứa hàng miễn thuế chưa được vận chuyển đến sân bay quốc tế nơi tàu bay xuất cảnh."},{"k":"p","t":"3. Trách nhiệm của Hải quan cửa khẩu sân bay quốc tế nơi tàu bay nhập cảnh"},{"k":"p","t":"a) Căn cứ thông tin về phiếu giao nhận hàng hóa theo Mẫu số 06b Phụ lục II ban hành kèm theo Nghị định này do doanh nghiệp gửi trên hệ thống xử lý dữ liệu điện tử hải quan quy định tại điểm a khoản 1 Điều này để thực hiện giám sát phương tiện chứa hàng miễn thuế từ tàu bay nhập cảnh đến kho chứa hàng miễn thuế tại sân bay nhập cảnh đối với trường hợp hàng hóa được đưa vào kho chứa hàng miễn thuế tại sân bay quốc tế nơi tàu bay nhập cảnh;"},{"k":"p","t":"b) Thực hiện xác nhận lượng tiền mặt mang xuống tàu bay trên hệ thống xử lý dữ liệu điện tử hải quan ngay sau khi doanh nghiệp gửi đến;"},{"k":"p","t":"c) Căn cứ thông tin về phiếu giao nhận hàng hóa quy định tại điểm a khoản 1 Điều này thực hiện niêm phong phương tiện chứa hàng miễn thuế, lập biên bản bàn giao phương tiện chứa hàng miễn thuế thông qua hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 04 Phụ lục II ban hành kèm theo Nghị định này, cập nhật số niêm phong vào biên bản bàn giao."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, lập biên bản bàn giao phương tiện chứa hàng miễn thuế theo Mẫu số 04/BBBG Phụ lục III ban hành kèm theo Nghị định này, giao 01 bản biên bản bàn giao cho doanh nghiệp để chuyển phương tiện chứa hàng miễn thuế đến Hải quan cửa khẩu sân bay quốc tế nơi tàu bay xuất cảnh;"},{"k":"p","t":"d) Theo dõi thông tin về quá trình vận chuyển của phương tiện chứa hàng miễn thuế, chủ trì xác minh trong trường hợp quá thời gian ghi trên biên bản bàn giao nhưng chưa nhận được xác nhận của Hải quan cửa khẩu sân bay quốc tế nơi tàu bay xuất cảnh theo quy định tại điểm b khoản 2 Điều này."}]},{"id":"nd273_11","no":11,"code":"Điều 11","title":"Điều 11. Thủ tục bán hàng miễn thuế cho đối tượng mua là người chờ xuất cảnh mua hàng tại cửa hàng miễn thuế trong nội địa, người xuất cảnh, quá cảnh, hành khách trên tàu bay xuất cảnh, hành khách đang thực hiện chuyến bay quốc tế đến Việt Nam, người nhập cảnh tại cửa khẩu sân bay quốc tế, thuyền viên mua hàng miễn thuế phục vụ nhu cầu cá nhân trong thời gian tàu neo đậu tại cảng biển Việt Nam","shortTitle":"Thủ tục bán hàng miễn thuế cho đối tượng mua là người chờ xuất cảnh mua hàng tại cửa hàng miễn thuế trong nội địa, người xuất cảnh, quá cảnh, hành khách trên tàu bay xuất cảnh, hành khách đang thực hiện chuyến bay quốc tế đến Việt Nam, người nhập cảnh tại cửa khẩu sân bay quốc tế, thuyền viên mua hàng miễn thuế phục vụ nhu cầu cá nhân trong thời gian tàu neo đậu tại cảng biển Việt Nam","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của doanh nghiệp kinh doanh hàng miễn thuế, nhân viên bán hàng"},{"k":"p","t":"a) Yêu cầu người mua hàng xuất trình hộ chiếu hoặc các loại giấy tờ đi lại sau: Giấy thông hành trong trường hợp đối tượng mua là người chờ xuất cảnh mua hàng tại cửa hàng miễn thuế trong nội địa hoặc khách xuất cảnh, quá cảnh tại khu cách ly hoặc người nhập cảnh tại cửa khẩu sân bay quốc tế; Giấy phép đi bờ của thuyền viên trong trường hợp đối tượng mua là thuyền viên phục vụ nhu cầu cá nhân trong thời gian tàu neo đậu tại cảng biển Việt Nam."},{"k":"p","t":"Trường hợp đối tượng mua là hành khách đang thực hiện chuyến bay quốc tế đến Việt Nam, nhân viên bán hàng yêu cầu người mua hàng xuất trình hộ chiếu và thẻ lên tàu bay."},{"k":"p","t":"b) Kiểm tra định mức mua hàng miễn thuế"},{"k":"p","t":"Nhân viên bán hàng kiểm tra thông tin trên hệ thống xử lý dữ liệu điện tử hải quan về định mức mua hàng miễn thuế đối với đối tượng mua là người nhập cảnh tại cửa khẩu sân bay quốc tế, hành khách đang thực hiện chuyến bay quốc tế đến Việt Nam theo quy định tại khoản 2 Điều 6 Nghị định này, thuyền viên phục vụ nhu cầu cá nhân trong thời gian tàu neo đậu tại cảng biển Việt Nam theo quy định tại khoản 4 Điều 6 Nghị định này."},{"k":"p","t":"c) Nhân viên bán hàng ghi nhận đầy đủ các thông tin về người mua hàng, thông tin chuyến bay hoặc phương tiện di chuyển, thông tin về hàng hóa theo các chỉ tiêu thông tin tại Mẫu số 12 Phụ lục II ban hành kèm theo Nghị định này."},{"k":"p","t":"d) Gửi thông tin quy định tại điểm c khoản này đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp bán hàng miễn thuế cho đối tượng mua là người xuất cảnh, quá cảnh, người nhập cảnh tại cửa khẩu sân bay quốc tế, thuyền viên làm việc trên tàu biển chạy tuyến quốc tế: doanh nghiệp kinh doanh hàng miễn thuế phải gửi đến hệ thống xử lý dữ liệu điện tử hải quan thông tin quy định tại điểm c khoản này ngay sau khi bán hàng miễn thuế."},{"k":"p","t":"Trường hợp bán hàng miễn thuế trên máy bay: trong vòng 24 giờ kể từ khi tàu bay đỗ tại vị trí chỉ định theo quy định (khi tàu bay thực hiện chuyến bay về Việt Nam), doanh nghiệp kinh doanh hàng miễn thuế phải kê khai trên phần mềm của doanh nghiệp và gửi đến hệ thống xử lý dữ liệu điện tử hải quan thông tin quy định tại điểm c khoản này."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, doanh nghiệp thực hiện gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"đ) Xuất hóa đơn bán hàng (bao gồm cả hàng tặng kèm sản phẩm, nếu có) và lưu trữ hóa đơn bán hàng theo quy định của pháp luật hiện hành về hóa đơn."},{"k":"p","t":"e) Trường hợp đối tượng mua là người chờ xuất cảnh mua hàng tại cửa hàng miễn thuế trong nội địa:"},{"k":"p","t":"Gửi Phiếu giao hàng theo Mẫu số 02 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan (trừ trường hợp giao hàng ở nước ngoài theo yêu cầu của khách). Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố thì lập 02 liên Phiếu giao hàng theo Mẫu số 02/PGH Phụ lục III ban hành kèm theo Nghị định này và gửi dữ liệu lên hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"Chịu trách nhiệm vận chuyển và xuất trình hàng hóa với hải quan cửa khẩu nơi người mua hàng xuất cảnh để bàn giao hàng hóa cho người mua hàng tại quầy nhận hàng trong khu cách ly cửa khẩu xuất cảnh. Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp xuất trình hàng hóa và 02 liên Phiếu giao hàng theo Mẫu số 02/PGH Phụ lục III ban hành kèm theo Nghị định này với hải quan cửa khẩu nơi người mua hàng xuất cảnh."},{"k":"p","t":"Trường hợp Phiếu giao hàng không có xác nhận của hải quan cửa khẩu khi Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế kiểm tra thì doanh nghiệp kinh doanh hàng miễn thuế có trách nhiệm nộp đủ thuế và các khoản thu khác thuộc ngân sách nhà nước (nếu có) theo quy định như đối với hàng hóa nhập khẩu theo quy định hiện hành đối với số hàng đã bán."},{"k":"p","t":"Trường hợp người mua hàng không đến nhận hàng tại quầy nhận hàng, doanh nghiệp thực hiện gửi thông tin hủy Phiếu giao hàng theo Mẫu số 13 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan. Trong trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp thông báo bằng văn bản về việc hủy Phiếu giao hàng với cơ quan hải quan và gửi dữ liệu đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi sự cố hệ thống xử lý dữ liệu điện tử hải quan được khắc phục. Sau khi được cơ quan hải quan phê duyệt, doanh nghiệp chịu trách nhiệm vận chuyển hàng hóa về cửa hàng miễn thuế, kho hàng miễn thuế nơi hàng hóa đã xuất đi."},{"k":"p","t":"Trường hợp doanh nghiệp kinh doanh hàng miễn thuế có nhiều cửa hàng miễn thuế, kho chứa hàng miễn thuế tại nhiều địa điểm khác nhau, khi thực hiện bán hàng cho khách chờ xuất cảnh tại cửa hàng miễn thuế trong nội địa, doanh nghiệp được xuất hàng hóa cho khách từ cửa hàng miễn thuế, kho chứa hàng miễn thuế của doanh nghiệp thuộc quản lý của Hải quan cửa khẩu nơi người mua hàng xuất cảnh."},{"k":"p","t":"g) Trường hợp đối tượng mua là người nhập cảnh tại sân bay quốc tế và hành khách đang thực hiện chuyến bay quốc tế đến Việt Nam mua hàng miễn thuế vượt định mức miễn thuế theo quy định"},{"k":"p","t":"Doanh nghiệp kinh doanh hàng miễn thuế gửi thông tin theo Mẫu số 01 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan. Trong trường hợp hệ thống gặp sự cố, doanh nghiệp kinh doanh hàng miễn thuế gửi 02 Phiếu thông báo theo Mẫu số 01/PTBHVĐM Phụ lục III ban hành kèm Nghị định này cho cơ quan hải quan tại cửa khẩu nhập. Nhận lại và lưu 01 Phiếu thông báo đã ký tên, đóng dấu công chức của công chức hải quan tại cửa khẩu nhập."},{"k":"p","t":"Riêng mặt hàng thuốc lá không được bán vượt định mức miễn thuế."},{"k":"p","t":"2. Trách nhiệm của Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế"},{"k":"p","t":"a) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện quy định tại điểm c khoản 2 Điều 8 Nghị định này;"},{"k":"p","t":"b) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện kiểm tra việc bán hàng miễn thuế thông qua hệ thống xử lý dữ liệu điện tử hải quan, ca-mê-ra giám sát hoặc kiểm tra trực tiếp tại cửa hàng miễn thuế, kho chứa hàng miễn thuế trên cơ sở áp dụng quản lý rủi ro hoặc trường hợp phát hiện dấu hiệu vi phạm pháp luật;"},{"k":"p","t":"c) Theo dõi phản hồi về Phiếu giao hàng đã được cơ quan hải quan xác nhận quy định tại khoản 3 Điều này;"},{"k":"p","t":"d) Thu thuế và các khoản thu khác thuộc ngân sách nhà nước (nếu có) theo quy định, lưu bản chụp các chứng từ quy định tại khoản 2 Điều 20 đối với các trường hợp quy định tại điểm h khoản 1 Điều này;"},{"k":"p","t":"đ) Trong trường hợp doanh nghiệp hủy Phiếu giao hàng quy định tại điểm g khoản 1 Điều này, Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế có trách nhiệm kiểm tra niêm phong quy định tại điểm c khoản 3 Điều này, thực hiện giám sát hàng hóa nhập vào kho chứa hàng miễn thuế hoặc cửa hàng miễn thuế."},{"k":"p","t":"3. Trách nhiệm của Hải quan cửa khẩu xuất nơi người mua hàng xuất cảnh trong trường hợp mua hàng tại cửa hàng miễn thuế trong nội địa"},{"k":"p","t":"a) Kiểm tra đối chiếu thực tế hàng hóa với nội dung kê khai trên Phiếu giao hàng;"},{"k":"p","t":"b) Xác nhận Mẫu số 02 Phụ lục II ban hành kèm theo Nghị định này trên hệ thống xử lý dữ liệu điện tử hải quan do doanh nghiệp gửi;"},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, xác nhận, ký tên và đóng dấu công chức trên 02 Phiếu giao hàng theo Mẫu số 02/PGH Phụ lục III ban hành kèm theo Nghị định này do doanh nghiệp xuất trình, giao 01 liên Phiếu giao hàng cho doanh nghiệp kinh doanh hàng miễn thuế lưu và lưu 01 liên. Sau khi doanh nghiệp truyền dữ liệu về số phiếu giao hàng đã được xác nhận trên bản giấy, thực hiện xác nhận trên hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Niêm phong hàng hóa trước khi vận chuyển. Thực hiện cập nhật số niêm phong và phê duyệt thông tin hủy theo Mẫu số 13 Phụ lục II ban hành kèm theo Nghị định này trên hệ thống xử lý dữ liệu điện tử hải quan ngay sau khi niêm phong hàng hóa hoặc ghi rõ số niêm phong và phê duyệt văn bản do doanh nghiệp xuất trình."}]},{"id":"nd273_12","no":12,"code":"Điều 12","title":"Điều 12. Thủ tục bán hàng miễn thuế cho tổ chức, cá nhân được hưởng quyền ưu đãi miễn trừ mua hàng tại cửa hàng miễn thuế trong nội địa","shortTitle":"Thủ tục bán hàng miễn thuế cho tổ chức, cá nhân được hưởng quyền ưu đãi miễn trừ mua hàng tại cửa hàng miễn thuế trong nội địa","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của nhân viên bán hàng"},{"k":"p","t":"a) Yêu cầu người mua hàng xuất trình sổ định mức miễn thuế của tổ chức hoặc Sổ định mức miễn thuế của cá nhân kèm chứng minh thư do Bộ Ngoại giao cấp khi mua hàng miễn thuế trong nội địa trừ trường hợp sổ định mức miễn thuế đã được cơ quan có thẩm quyền cấp cập nhật thông tin vào cổng thông tin một cửa quốc gia;"},{"k":"p","t":"b) Nhập thông tin về định lượng hàng hóa tại số định mức miễn thuế do người mua hàng xuất trình hoặc dữ liệu về số định mức từ cổng thông tin một cửa quốc gia đã được cơ quan có thẩm quyền cập nhật (đối với trường hợp sử dụng Sổ lần đầu) theo Mẫu số 14 Phụ lục II ban hành kèm theo Nghị định này và gửi đến hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Xuất trình bản chính số định mức mua hàng miễn thuế cho cơ quan hải quan để xác nhận định mức mua hàng miễn thuế trên hệ thống xử lý dữ liệu điện tử hải quan đối với trường hợp xuất trình sổ quy định tại điểm a khoản này;"},{"k":"p","t":"d) Gửi thông tin bán hàng theo Mẫu số 12 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, doanh nghiệp thực hiện gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"đ) Xuất hóa đơn bán hàng (bao gồm cả hàng tặng kèm sản phẩm, nếu có) theo quy định;"},{"k":"p","t":"e) Cắt ô tem tương ứng mặt hàng đã bán trên sổ định mức hàng miễn thuế và lưu ô tem tương ứng theo từng hóa đơn bán hàng;"},{"k":"p","t":"g) Lưu hóa đơn bán hàng theo quy định hiện hành về hóa đơn."},{"k":"p","t":"2. Trách nhiệm của Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế"},{"k":"p","t":"a) Đối với người mua hàng lần đầu tiên mua hàng miễn thuế theo số định mức mua hàng miễn thuế, cơ quan hải quan kiểm tra bản chính số định mức mua hàng miễn thuế hoặc kiểm tra trên cổng thông tin một cửa quốc gia về định lượng mua hàng miễn thuế, xác nhận trên hệ thống xử lý dữ liệu điện tử hải quan lượng hàng miễn thuế được phép mua của người mua hàng để hệ thống xử lý dữ liệu điện tử hải quan trừ lùi định mức mua hàng miễn thuế;"},{"k":"p","t":"b) Trên cơ sở quản lý rủi ro và dấu hiệu vi phạm pháp luật, Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện kiểm tra việc bán hàng miễn thuế thông qua hệ thống phần mềm của doanh nghiệp, hệ thống xử lý dữ liệu điện tử hải quan, camera giám sát hoặc kiểm tra trực tiếp hàng hóa tại cửa hàng miễn thuế, kho chứa hàng miễn thuế;"},{"k":"p","t":"c) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện quy định tại điểm c khoản 2 Điều 8 Nghị định này."}]},{"id":"nd273_13","no":13,"code":"Điều 13","title":"Điều 13. Thủ tục bán hàng miễn thuế cho đối tượng mua là thuyền viên làm việc trên tàu biển chạy tuyến quốc tế","shortTitle":"Thủ tục bán hàng miễn thuế cho đối tượng mua là thuyền viên làm việc trên tàu biển chạy tuyến quốc tế","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp mua hàng miễn thuế phục vụ cho nhu cầu sinh hoạt chung của thuyền viên làm việc trên tàu biển chạy tuyến quốc tế trong thời gian tàu neo đậu tại cảng biển Việt Nam để chờ xuất cảnh. Nhân viên bán hàng có trách nhiệm:"},{"k":"p","t":"a) Yêu cầu người mua hàng xuất trình hộ chiếu;"},{"k":"p","t":"b) Kiểm tra thông tin trên hệ thống xử lý dữ liệu điện tử hải quan để bán hàng trong định lượng quy định tại khoản 4 Điều 6 Nghị định này;"},{"k":"p","t":"c) Gửi thông tin bán hàng theo Mẫu số 12 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, doanh nghiệp thực hiện gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"d) Thực hiện xuất hóa đơn bán hàng (bao gồm cả hàng tặng kèm sản phẩm, nếu có), trên hóa đơn đầy đủ các thông tin họ tên, số hộ chiếu, quốc tịch của thuyền trưởng/người đại diện tàu, số hiệu tàu, ngày tàu nhập cảnh;"},{"k":"p","t":"đ) Lưu hóa đơn bán hàng theo quy định hiện hành về hóa đơn."},{"k":"p","t":"2. Trường hợp mua hàng miễn thuế phục vụ nhu cầu của thuyền viên làm việc trên tàu biển chạy tuyến quốc tế phục vụ cho hành trình tiếp theo ngoài lãnh hải Việt Nam. Trách nhiệm của nhân viên bán hàng:"},{"k":"p","t":"a) Yêu cầu người mua hàng xuất trình hộ chiếu;"},{"k":"p","t":"b) Gửi thông tin bán hàng theo Mẫu số 12 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, doanh nghiệp thực hiện gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Thực hiện xuất hóa đơn bán hàng theo quy định;"},{"k":"p","t":"d) Chịu trách nhiệm vận chuyển hàng hóa vào kho của tàu;"},{"k":"p","t":"đ) Lưu hóa đơn bán hàng có chữ ký của người mua hàng hoặc thuyền trưởng hoặc người đại diện tàu và xác nhận của công chức hải quan nơi thực hiện thủ tục xuất cảnh tàu, đơn đặt hàng và danh sách thuyền viên."},{"k":"p","t":"3. Trách nhiệm của Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế"},{"k":"p","t":"a) Giám sát hàng hóa từ cửa hàng miễn thuế đến khi hàng hóa chịu sự giám sát của cơ quan hải quan nơi tàu xuất cảnh;"},{"k":"p","t":"b) Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thực hiện quy định tại điểm c khoản 2 Điều 8 Nghị định này."},{"k":"p","t":"4. Trách nhiệm của Hải quan nơi thực hiện thủ tục xuất cảnh tàu: Thực hiện niêm phong kho của tàu chứa hàng miễn thuế, xác nhận hàng qua khu vực giám sát (ký tên, đóng dấu công chức hải quan trên hóa đơn bán hàng) và giám sát cho đến khi tàu xuất cảnh."}]},{"id":"nd273_14","no":14,"code":"Điều 14","title":"Điều 14. Thủ tục bán hàng miễn thuế trực tuyến","shortTitle":"Thủ tục bán hàng miễn thuế trực tuyến","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của doanh nghiệp kinh doanh hàng miễn thuế"},{"k":"p","t":"Ngoài các trách nhiệm khi bán hàng cho từng đối tượng quy định tại Điều 11, Điều 12, Điều 13 Nghị định này, doanh nghiệp thực hiện:"},{"k":"p","t":"a) Gửi thông tin bán hàng theo Mẫu số 12 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan ngay sau khi chấp nhận đơn hàng và hoàn tất thủ tục thanh toán."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, doanh nghiệp thực hiện gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"b) Khi giao hàng cho khách mua hàng, kiểm tra đối chiếu thông tin mà khách đã kê khai khi mua hàng trực tuyến với thông tin trên các giấy tờ liên quan đến khách mua hàng theo quy định đối với từng đối tượng."},{"k":"p","t":"2. Trách nhiệm của Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế và Hải quan cửa khẩu nơi người mua hàng xuất cảnh, nhập cảnh: Thực hiện theo quy định tại Điều 11, Điều 12, Điều 13 Nghị định này tương ứng với từng đối tượng mua hàng miễn thuế."}]},{"id":"nd273_15","no":15,"code":"Điều 15","title":"Điều 15. Thủ tục hải quan đối với hàng hóa đã bán cho khách xuất cảnh nhưng giao ở nước ngoài theo yêu cầu của khách","shortTitle":"Thủ tục hải quan đối với hàng hóa đã bán cho khách xuất cảnh nhưng giao ở nước ngoài theo yêu cầu của khách","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Địa điểm làm thủ tục hải quan: Hải quan quản lý cửa hàng miễn thuế, kho hàng miễn thuế sau khi khách mua hàng đã thực xuất cảnh."},{"k":"p","t":"2. Thủ tục hải quan: Thực hiện thủ tục xuất khẩu (tái xuất đối với hàng hóa do doanh nghiệp kinh doanh hàng miễn thuế tạm nhập từ nước ngoài, xuất khẩu đối với hàng hóa do doanh nghiệp kinh doanh hàng miễn thuế mua từ nội địa để đưa vào bán tại cửa hàng miễn thuế) theo quy định tại Nghị định số 08/2015/NĐ-CP ngày 21 tháng 01 năm 2015 của Chính phủ quy định chi tiết và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan và Nghị định số 167/2025/NĐ-CP ngày 30 tháng 6 năm 2025 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 08/2015/NĐ-CP. Khi làm thủ tục xuất khẩu, ngoài hồ sơ hải quan theo quy định, doanh nghiệp phải gửi bảng kê hàng hóa đã bán cho khách xuất cảnh theo Mẫu số 09 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan hoặc Mẫu số 09/BKHH Phụ lục III ban hành kèm theo Nghị định này trong trường hợp hệ thống gặp sự cố và 01 bản chụp hộ chiếu hoặc giấy thông hành (trang đầu và trang có đóng dấu xuất cảnh của cơ quan xuất nhập cảnh)."},{"k":"p","t":"3. Trường hợp cơ quan hải quan có đủ cơ sở xác định khách mua hàng miễn thuế không thực xuất cảnh, doanh nghiệp bị xử lý vi phạm theo quy định của pháp luật."}]},{"id":"nd273_16","no":16,"code":"Điều 16","title":"Điều 16. Thủ tục đối với hàng hóa đưa vào bán tại cửa hàng miễn thuế thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa, tái xuất","shortTitle":"Thủ tục đối với hàng hóa đưa vào bán tại cửa hàng miễn thuế thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa, tái xuất","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thủ tục thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa, tái xuất: thực hiện thủ tục theo quy định tại Nghị định số 08/2015/NĐ-CP ngày 21 tháng 01 năm 2015 của Chính phủ quy định chi tiết và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan, Nghị định số 167/2025/NĐ-CP ngày 30 tháng 6 năm 2025 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 08/2015/NĐ-CP và hướng dẫn của Bộ Tài chính."},{"k":"p","t":"Chính sách quản lý hàng hóa, chính sách thuế đối với hàng hóa thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa thực hiện tại thời điểm đăng ký tờ khai hải quan thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa."},{"k":"p","t":"Riêng mặt hàng thuốc lá không được phép thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa, chỉ được tái xuất qua cửa khẩu đường biên, cửa khẩu cảng hàng không dân dụng quốc tế."},{"k":"p","t":"Trước khi đưa hàng hóa ra khỏi cửa hàng miễn thuế, doanh nghiệp thực hiện hủy tem “VIET NAM DUTY NOT PAID” đã dán lên từng mặt hàng dưới sự giám sát của cơ quan hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế và lập biên bản về số tem “VIET NAM DUTY NOT PAID” đã hủy."},{"k":"p","t":"2. Trường hợp hàng hóa nội địa được phép lưu thông theo quy định của pháp luật Việt Nam đưa vào bán tại cửa hàng miễn thuế sau đó đưa trở lại nội địa, doanh nghiệp kinh doanh cửa hàng miễn thuế, kho hàng miễn thuế gửi thông báo theo Mẫu số 08c Phụ lục II ban hành kèm Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp xuất trình Mẫu số 08/DSHH Phụ lục III ban hành kèm Nghị định này cho Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế và gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục."},{"k":"p","t":"Trước khi đưa hàng hóa ra khỏi cửa hàng miễn thuế, doanh nghiệp thực hiện hủy tem “VIET NAM DUTY NOT PAID” đã dán lên từng mặt hàng dưới sự giám sát của cơ quan hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế và lập biên bản về số tem “VIET NAM DUTY NOT PAID” đã hủy."}]},{"id":"nd273_17","no":17,"code":"Điều 17","title":"Điều 17. Thủ tục đối với hàng hóa tiêu hủy, hàng mẫu, hàng thử, túi, bao bì nhập khẩu để đựng hàng miễn thuế","shortTitle":"Thủ tục đối với hàng hóa tiêu hủy, hàng mẫu, hàng thử, túi, bao bì nhập khẩu để đựng hàng miễn thuế","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa bị đổ vỡ, hư hỏng, mất phẩm chất, kém chất lượng, hết hạn sử dụng thực hiện theo quy định tại khoản 8 Điều 3 Nghị định này và:"},{"k":"p","t":"a) Khi lập biên bản về tình trạng hàng hóa đổ vỡ, hư hỏng, mất phẩm chất, kém chất lượng, doanh nghiệp phải nêu rõ lý do và các thông tin về hàng hóa: Tên hàng, mã số hàng, số lượng, trị giá. Trên cơ sở nội dung biên bản và thực tế kiểm tra hàng hóa, công chức hải quan quản lý cửa hàng miễn thuế ký tên, đóng dấu công chức xác nhận đối với hàng hóa đổ vỡ, hư hỏng, mất phẩm chất, kém chất lượng;"},{"k":"p","t":"b) Doanh nghiệp chịu trách nhiệm thực hiện tiêu hủy hàng hóa theo quy định của pháp luật hiện hành và chịu sự giám sát của cơ quan hải quan."},{"k":"p","t":"2. Đối với hàng mẫu, hàng dùng thử, túi, bao bì nhập khẩu để đựng hàng miễn thuế (không bao gồm hàng tặng kèm sản phẩm) thực hiện như sau:"},{"k":"p","t":"a) Khi xuất hàng mẫu, hàng thử, túi, bao bì nhập khẩu lên cửa hàng miễn thuế, doanh nghiệp lập bảng kê theo Mẫu số 10 Phụ lục II ban hành kèm theo Nghị định này gửi đến hệ thống xử lý dữ liệu điện tử hải quan và nhận phản hồi từ hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp xuất trình bảng kê theo Mẫu số 10/BKHMT Phụ lục III ban hành kèm theo Nghị định này cho Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế và gửi thông tin đến hệ thống xử lý dữ liệu điện tử hải quan trong vòng 24 giờ kể từ khi hệ thống xử lý dữ liệu điện tử hải quan được khắc phục;"},{"k":"p","t":"b) Định kỳ hàng tháng (trong 07 ngày làm việc đầu tiên của tháng), tổng hợp số liệu hàng mẫu, hàng thử, túi, bao bì nhập khẩu đã sử dụng, còn tồn của tháng trước theo Mẫu số 15 Phụ lục II ban hành kèm theo Nghị định này gửi đến hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp số liệu báo cáo của doanh nghiệp không có nghi ngờ, trong vòng 03 ngày làm việc kể từ khi nhận được báo cáo, cơ quan hải quan xác nhận trên hệ thống xử lý dữ liệu điện tử hải quan về số liệu báo cáo."},{"k":"p","t":"Trường hợp cơ quan hải quan nghi ngờ về số liệu doanh nghiệp báo cáo, trong vòng 07 ngày làm việc kể từ khi nhận được báo cáo, cơ quan hải quan thực hiện kiểm tra các hồ sơ liên quan. Trong trường hợp cần thiết, cơ quan hải quan kiểm tra thực tế lượng hàng tồn của cửa hàng miễn thuế, kho chứa hàng miễn thuế theo quyết định của Chi cục trưởng Chi cục Hải quan. Chi cục trưởng Chi cục Hải quan giao Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế tổ chức thực hiện kiểm tra chậm nhất trong vòng 10 ngày làm việc kể từ ngày ký quyết định."},{"k":"p","t":"Đối với trường hợp phức tạp, Chi cục trưởng Chi cục Hải quan ban hành quyết định gia hạn thời hạn kiểm tra nhưng không quá 05 ngày làm việc kể từ ngày kết thúc kiểm tra ghi trên quyết định kiểm tra."},{"k":"p","t":"Nội dung kiểm tra và kết quả kiểm tra được ghi nhận bằng biên bản kiểm tra theo Mẫu số 11/BBKT Phụ lục III ban hành kèm theo Nghị định này. Cơ quan hải quan thực hiện xác nhận trên hệ thống xử lý dữ liệu điện tử hải quan về số liệu của doanh nghiệp theo kết luận kiểm tra."}]},{"id":"nd273_18","no":18,"code":"Điều 18","title":"Điều 18. Thủ tục đối với tiền mặt của doanh nghiệp kinh doanh hàng miễn thuế đưa vào, đưa ra khu cách ly, khu vực hạn chế","shortTitle":"Thủ tục đối với tiền mặt của doanh nghiệp kinh doanh hàng miễn thuế đưa vào, đưa ra khu cách ly, khu vực hạn chế","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của doanh nghiệp kinh doanh hàng miễn thuế"},{"k":"p","t":"a) Gửi dữ liệu theo Mẫu số 03 Phụ lục II ban hành kèm theo Nghị định này đến hệ thống xử lý dữ liệu điện tử hải quan trước khi đưa tiền vào, tiền ra khỏi khu cách ly, khu hạn chế;"},{"k":"p","t":"b) Thực hiện các yêu cầu của cơ quan hải quan qua phản hồi của hệ thống xử lý dữ liệu điện tử hải quan. Xuất trình tiền mặt trong trường hợp cơ quan hải quan yêu cầu."},{"k":"p","t":"2. Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"a) Khi nhận được thông tin khai báo của doanh nghiệp, công chức hải quan kiểm tra các nội dung khai báo trên hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"b) Giám sát tiền mặt đưa vào, ra khu cách ly, khu hạn chế;"},{"k":"p","t":"c) Kiểm tra thực tế tiền mặt đưa vào, đưa ra khu cách ly, khu hạn chế trên cơ sở áp dụng quản lý rủi ro hoặc có dấu hiệu vi phạm pháp luật;"},{"k":"p","t":"d) Công chức hải quan thực hiện xác nhận tiền qua khu vực giám sát trên hệ thống xử lý dữ liệu điện tử hải quan đối với tiền mặt đưa vào, đưa ra khu cách ly, khu hạn chế."},{"k":"p","t":"3. Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố"},{"k":"p","t":"a) Doanh nghiệp có trách nhiệm kê khai trên 02 Bảng kê lượng tiền mang vào/ra khu cách ly, khu hạn chế theo Mẫu số 03/BKTMVR Phụ lục III ban hành kèm theo Nghị định này cho công chức hải quan kiểm tra, xác nhận. Xuất trình tiền mặt trong trường hợp cơ quan hải quan yêu cầu. Đối với trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, trong thời hạn 24 giờ kể từ khi sự cố của hệ thống xử lý dữ liệu điện tử hải quan được khắc phục, doanh nghiệp gửi các thông tin trên bảng kê đến hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"b) Cơ quan hải quan có trách nhiệm giám sát việc đưa tiền mặt vào, ra khỏi khu cách ly, khu hạn chế. Kiểm tra thực tế tiền mặt trên cơ sở áp dụng quản lý rủi ro hoặc có dấu hiệu vi phạm pháp luật. Ngay sau khi hoàn thành việc kiểm tra tiền mặt (đối với trường hợp phải kiểm tra thực tế) hoặc tiền mặt qua khu vực giám sát, cơ quan hải quan thực hiện xác nhận trên 02 Bảng kê lượng tiền mang vào/ra khu cách ly, khu hạn chế doanh nghiệp xuất trình, lưu 01 bản, trả lại doanh nghiệp 01 bản."}]},{"id":"nd273_19","no":19,"code":"Điều 19","title":"Điều 19. Báo cáo quyết toán đối với hàng hóa đưa vào để bán tại cửa hàng miễn thuế","shortTitle":"Báo cáo quyết toán đối với hàng hóa đưa vào để bán tại cửa hàng miễn thuế","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp báo cáo quyết toán đối với hàng hóa đưa vào để bán tại cửa hàng miễn thuế"},{"k":"p","t":"a) Định kỳ hàng năm, chậm nhất là ngày thứ 90 kể từ ngày kết thúc năm tài chính, doanh nghiệp kinh doanh hàng miễn thuế nộp báo cáo quyết toán tình hình bán hàng miễn thuế trong năm tài chính cho cơ quan hải quan;"},{"k":"p","t":"b) Doanh nghiệp kinh doanh hàng miễn thuế sau khi nộp báo cáo quyết toán được phép sửa đổi, bổ sung nội dung báo cáo trong thời gian trước khi hết thời hạn nộp báo cáo quyết toán và trước thời điểm cơ quan hải quan có thông báo về việc thực hiện kiểm tra hay không kiểm tra đối với báo cáo quyết toán."},{"k":"p","t":"2. Địa điểm nộp báo cáo quyết toán"},{"k":"p","t":"Tại Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế."},{"k":"p","t":"3. Trách nhiệm của doanh nghiệp kinh doanh hàng miễn thuế"},{"k":"p","t":"a) Nộp báo cáo quyết toán đối với hàng hóa đưa vào để bán tại cửa hàng miễn thuế: nộp báo cáo quyết toán theo nguyên tắc nhập - xuất - tồn kho theo Mẫu số 05 Phụ lục II ban hành kèm theo Nghị định này thông qua hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, doanh nghiệp xuất trình báo cáo quyết toán theo Mẫu số 05/BCQT Phụ lục III ban hành kèm theo Nghị định này cho cơ quan hải quan."},{"k":"p","t":"Báo cáo quyết toán phải phù hợp với chứng từ hạch toán kế toán của doanh nghiệp kinh doanh hàng miễn thuế;"},{"k":"p","t":"b) Cung cấp hồ sơ hải quan, chứng từ kế toán, sổ kế toán, chứng từ bán hàng, các giấy tờ khác (nếu có) để phục vụ công tác kiểm tra báo cáo quyết toán khi được cơ quan hải quan yêu cầu theo quy định."},{"k":"p","t":"4. Trách nhiệm của Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế: Tiếp nhận báo cáo quyết toán tình hình kinh doanh hàng miễn thuế do doanh nghiệp kinh doanh hàng miễn thuế nộp, kiểm tra báo cáo quyết toán theo quy định tại Điều này và thực hiện:"},{"k":"p","t":"a) Đối với báo cáo quyết toán phải thực hiện kiểm tra, cơ quan hải quan phải thông báo cho doanh nghiệp kinh doanh hàng miễn thuế trong vòng 20 ngày kể từ ngày nhận được báo cáo quyết toán;"},{"k":"p","t":"b) Đối với báo cáo quyết toán không thuộc trường hợp phải kiểm tra, trong thời hạn 20 ngày làm việc kể từ ngày nhận được báo cáo quyết toán của doanh nghiệp, cơ quan hải quan phản hồi qua hệ thống xử lý dữ liệu điện tử hải quan đến doanh nghiệp về báo cáo quyết toán được chấp nhận, không thực hiện kiểm tra. Đồng thời xác nhận trên hệ thống xử lý dữ liệu điện tử hải quan việc doanh nghiệp hoàn thành báo cáo quyết toán."},{"k":"p","t":"5. Các trường hợp kiểm tra báo cáo quyết toán"},{"k":"p","t":"a) Báo cáo quyết toán của doanh nghiệp kinh doanh hàng miễn thuế nộp lần đầu;"},{"k":"p","t":"b) Báo cáo quyết toán có sự chênh lệch bất thường về số liệu so với hệ thống xử lý dữ liệu điện tử hải quan của cơ quan hải quan đã được doanh nghiệp giải trình nhưng không được cơ quan hải quan chấp nhận;"},{"k":"p","t":"c) Kiểm tra báo cáo quyết toán trên cơ sở áp dụng quản lý rủi ro, đánh giá tuân thủ pháp luật của doanh nghiệp kinh doanh hàng miễn thuế."},{"k":"p","t":"6. Nội dung kiểm tra báo cáo quyết toán: Kiểm tra hồ sơ hải quan, chứng từ kế toán, lượng hàng tồn tại cửa hàng miễn thuế, kho chứa hàng miễn thuế. Cơ quan hải quan chỉ yêu cầu doanh nghiệp xuất trình hồ sơ hải quan, chứng từ kế toán đối với các chứng từ thể hiện số liệu không được lưu trữ trên hệ thống xử lý dữ liệu điện tử hải quan hoặc có sự sai khác giữa hệ thống xử lý dữ liệu điện tử hải quan với số liệu doanh nghiệp báo cáo."},{"k":"p","t":"7. Thẩm quyền quyết định kiểm tra báo cáo quyết toán: Đội trưởng Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế quyết định kiểm tra và tổ chức thực hiện việc kiểm tra đối với các trường hợp quy định tại khoản 5 Điều này."},{"k":"p","t":"8. Trình tự, thủ tục kiểm tra báo cáo quyết toán"},{"k":"p","t":"a) Kiểm tra báo cáo quyết toán thực hiện theo Quyết định của Đội trưởng Hải quan ban hành và gửi cho doanh nghiệp kinh doanh hàng miễn thuế biết trong thời hạn 03 ngày làm việc kể từ ngày ký và chậm nhất là 05 ngày làm việc trước ngày tiến hành kiểm tra."},{"k":"p","t":"Quyết định kiểm tra phải có các thông tin: Người kiểm tra, người bị kiểm tra, nội dung kiểm tra, thời gian bắt đầu kiểm tra, thời gian kết thúc kiểm tra, địa điểm thực hiện việc kiểm tra;"},{"k":"p","t":"b) Thời hạn cơ quan hải quan thực hiện kiểm tra không quá 05 ngày làm việc kể từ ngày bắt đầu kiểm tra tại trụ sở của doanh nghiệp kinh doanh hàng miễn thuế. Trường hợp phức tạp, Đội trưởng Hải quan ban hành quyết định gia hạn thời hạn kiểm tra nhưng không quá 05 ngày làm việc kể từ ngày kết thúc kiểm tra ghi trên quyết định kiểm tra."},{"k":"p","t":"Các nội dung kiểm tra được ghi nhận bằng các biên bản kiểm tra giữa đại diện có thẩm quyền của doanh nghiệp kinh doanh hàng miễn thuế và đoàn kiểm tra."},{"k":"p","t":"9. Xử lý kết quả kiểm tra: Trong thời gian 05 ngày làm việc kể từ ngày kết thúc kiểm tra tại trụ sở của doanh nghiệp kinh doanh hàng miễn thuế, cơ quan hải quan phải có thông báo kết quả kiểm tra với doanh nghiệp được kiểm tra về sự phù hợp, nội dung không phù hợp của báo cáo quyết toán (nếu có) để doanh nghiệp giải trình."},{"k":"p","t":"a) Trường hợp kiểm tra xác định báo cáo quyết toán phù hợp với chứng từ kế toán, sổ kế toán, phù hợp với hồ sơ hàng hóa thực hiện kinh doanh hàng miễn thuế, cơ quan hải quan ban hành kết luận kiểm tra và xác nhận kết quả kiểm tra trên báo cáo quyết toán. Cập nhật kết quả kiểm tra vào hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"b) Trường hợp không phù hợp với chứng từ kế toán, sổ kế toán, không phù hợp với hồ sơ hàng hóa kinh doanh hàng miễn thuế thì yêu cầu doanh nghiệp giải trình trong vòng 05 ngày làm việc kể từ ngày thông báo kết quả kiểm tra. Trường hợp cơ quan hải quan chấp nhận nội dung giải trình của doanh nghiệp, trong thời gian 05 ngày làm việc cơ quan hải quan ban hành kết luận kiểm tra, xác nhận vào báo cáo quyết toán và cập nhật kết quả vào hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Trường hợp cơ quan hải quan không chấp nhận nội dung giải trình của doanh nghiệp hoặc doanh nghiệp không giải trình thì cơ quan hải quan căn cứ quy định pháp luật về thuế, pháp luật về hải quan và hồ sơ hiện có để quyết định xử lý về thuế và xử lý vi phạm hành chính theo thẩm quyền hoặc kiến nghị người có thẩm quyền quyết định xử lý theo quy định pháp luật;"},{"k":"p","t":"d) Bản kết luận kiểm tra phải có các nội dung: Quyết định kiểm tra, phạm vi kiểm tra, nội dung kiểm tra, ý kiến của người được kiểm tra, kết luận về từng nội dung được kiểm tra, mức độ vi phạm (nếu có), biện pháp xử lý, kiến nghị đề xuất của đoàn kiểm tra về biện pháp xử lý."}]},{"id":"nd273_20","no":20,"code":"Điều 20","title":"Điều 20. Trách nhiệm của đối tượng mua hàng miễn thuế quy định tại Điều 5 Nghị định này","shortTitle":"Trách nhiệm của đối tượng mua hàng miễn thuế quy định tại Điều 5 Nghị định này","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người mua hàng miễn thuế khi mua hàng miễn thuế phải xuất trình, cung cấp những thông tin cần thiết khi mua hàng miễn thuế được quy định tại Nghị định này, không được cho người khác sử dụng hộ chiếu, giấy thông hành, tiêu chuẩn miễn thuế của mình."},{"k":"p","t":"2. Thực hiện các nghĩa vụ về thuế, chính sách mặt hàng nhập khẩu trong trường hợp mua hàng vượt tiêu chuẩn định lượng miễn thuế: kê khai, nộp thuế và các khoản thu khác thuộc ngân sách nhà nước (nếu có) theo quy định và thực hiện các quy định pháp luật liên quan đến hàng hóa nhập khẩu."}]},{"id":"nd273_21","no":21,"code":"Điều 21","title":"Điều 21. Công tác phối hợp của đơn vị kinh doanh cảng biển, cảng hàng không dân dụng quốc tế, ga đường sắt liên vận quốc tế, Ban Quản lý khu kinh tế cửa khẩu đường bộ quốc tế, đơn vị được giao quản lý cửa khẩu đường bộ quốc tế, doanh nghiệp kinh doanh hàng miễn thuế và cơ quan hải quan","shortTitle":"Công tác phối hợp của đơn vị kinh doanh cảng biển, cảng hàng không dân dụng quốc tế, ga đường sắt liên vận quốc tế, Ban Quản lý khu kinh tế cửa khẩu đường bộ quốc tế, đơn vị được giao quản lý cửa khẩu đường bộ quốc tế, doanh nghiệp kinh doanh hàng miễn thuế và cơ quan hải quan","chuong":"Chương II — THỦ TỤC HẢI QUAN, KIỂM TRA, GIÁM SÁT HẢI QUAN ĐỐI VỚI HOẠT ĐỘNG KINH DOANH HÀNG MIỄN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế thống nhất với đơn vị kinh doanh cảng biển, cảng hàng không dân dụng quốc tế, ga đường sắt liên vận quốc tế, Ban Quản lý khu kinh tế cửa khẩu đường bộ quốc tế, đơn vị được giao quản lý cửa khẩu đường bộ quốc tế về địa điểm cơ quan hải quan thực hiện giám sát hàng hóa, tiền mặt đưa vào, đưa ra khu vực cách ly, khu vực hạn chế."},{"k":"p","t":"2. Doanh nghiệp kinh doanh hàng miễn thuế thông báo cho Hải quan quản lý cửa hàng miễn thuế, kho chứa hàng miễn thuế danh sách những người có nhiệm vụ đưa hàng hóa, tiền mặt ra, vào khu cách ly, khu vực hạn chế và nhân viên bán hàng để đảm bảo các yêu cầu giám sát của cơ quan hải quan."}]},{"id":"nd273_22","no":22,"code":"Điều 22","title":"Điều 22. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành kể từ ngày 21 tháng 8 năm 2026."},{"k":"p","t":"2. Nghị định số 100/2020/NĐ-CP ngày 28 tháng 8 năm 2020 của Chính phủ về kinh doanh hàng miễn thuế hết hiệu lực thi hành kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"3. Thay thế biểu mẫu tại Phụ lục III Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng bằng biểu Mẫu số 09/BKHH Phụ lục III Nghị định này."}]},{"id":"nd273_23","no":23,"code":"Điều 23","title":"Điều 23. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Giao Bộ Tài chính có trách nhiệm:"},{"k":"p","t":"a) Xây dựng, duy trì, vận hành hệ thống xử lý dữ liệu điện tử hải quan để tiếp nhận, xử lý, theo dõi, quản lý hàng hóa đưa vào, đưa ra, bán tại cửa hàng miễn thuế và hướng dẫn các vướng mắc phát sinh đối với hoạt động kinh doanh hàng miễn thuế."},{"k":"p","t":"b) Cung cấp, chia sẻ dữ liệu về hoạt động kinh doanh hàng miễn thuế theo quy định của pháp luật về giao dịch điện tử và pháp luật có liên quan khác."},{"k":"p","t":"2. Doanh nghiệp kinh doanh hàng miễn thuế chịu trách nhiệm quản lý hàng hóa để kinh doanh hàng miễn thuế, bán hàng miễn thuế đúng đối tượng, thực hiện các thủ tục hải quan liên quan đến kinh doanh hàng miễn thuế theo đúng quy định tại Nghị định này."},{"k":"p","t":"3. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán Nhà nước;\n- Ủy ban Trung ương Mặt trận tổ quốc Việt Nam;\n- Cơ quan trung ương của các tổ chức chính trị - xã hội;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2b)","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNGNguyễn Văn Thắng"]]}]}],"forms":[{"code":"01-PTBHVDM","title":"PHIẾU THÔNG BÁO","pl":"","note":""},{"code":"02-PGH","title":"PHIẾU GIAO HÀNG","pl":"","note":""},{"code":"03-BKTMVR","title":"BẢNG KÊ LƯỢNG TIỀN MANG VÀO/RA","pl":"","note":""},{"code":"04-BBBG","title":"BIÊN BẢN","pl":"","note":""},{"code":"05-BCQT","title":"BÁO CÁO QUYẾT TOÁN KINH DOANH HÀNG MIỄN THUẾ","pl":"","note":""},{"code":"06-PGHKVTB","title":"PHIẾU GIAO NHẬN HÀNG HÓA ĐỐI VỚI HÀNG HÓA","pl":"","note":""},{"code":"07-BKTMKVTB","title":"BẢNG KÊ LƯỢNG TIỀN MẶT LUÂN CHUYỂN","pl":"","note":""},{"code":"08-DSHH","title":"DANH SÁCH HÀNG HÓA ĐƯA VÀO/ĐƯA RA CỬA HÀNG MIỄN THUẾ, KHO CHỨA HÀNG MIỄN THUẾ","pl":"","note":""},{"code":"09-BKHH","title":"BẢNG KÊ HÀNG HÓA BÁN CHO KHÁCH XUẤT CẢNH","pl":"","note":""},{"code":"10-BKHMT","title":"BẢNG KÊ HÀNG MẪU, HÀNG THỬ, TÚI, BAO BÌ NHẬP KHẨU","pl":"","note":""},{"code":"11-BBKT","title":"BIÊN BẢN KIỂM TRA","pl":"","note":""}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
