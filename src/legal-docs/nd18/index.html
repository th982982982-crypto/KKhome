<script id="LD" type="application/json">{"meta":{"title":"Nghị định 18/2021/NĐ-CP — Sửa đổi, bổ sung một số điều của NĐ 134/2016","shortCode":"NĐ 18/2021","subtitle":"Sửa đổi, bổ sung NĐ 134/2016 (Thuế XNK)","slug":"nd18","effectiveDate":"25/04/2021","scope":"","description":"Sửa đổi, bổ sung NĐ 134/2016 (Thuế XNK)","related":[]},"outline":[{"id":"nd18_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu","shortTitle":"Sửa đổi, bổ sung một số điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung khoản 1, bổ sung khoản 3 Điều 3 như sau:"},{"k":"p","t":"“Điều 3. Áp dụng thuế suất đối với hàng hóa xuất khẩu, nhập khẩu"},{"k":"p","t":"1. Thuế suất đối với hàng hóa xuất khẩu, nhập khẩu qua cửa khẩu, biên giới Việt Nam, hàng hóa xuất khẩu tại chỗ, nhập khẩu tại chỗ thực hiện theo quy định tại Điều 5, Điều 6 và Điều 7 Luật Thuế xuất khẩu, thuế nhập khẩu. Việc áp dụng thuế suất đối với hàng hóa xuất khẩu tại chỗ, nhập khẩu tại chỗ thực hiện theo quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Áp dụng thuế suất đối với hàng hoá xuất khẩu tại chỗ, nhập khẩu tại chỗ"},{"k":"p","t":"a)Hàng hoá xuất khẩu tại chỗ áp dụng mức thuế suất thuế xuất khẩu quy định tại Nghị định số 122/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ về Biểu thuế xuất khẩu, Biểu thuế nhập khẩu ưu đãi, Danh mục hàng hoá và mức thuế tuyệt đối, thuế hỗn hợp, thuế nhập khẩu ngoài hạn ngạch thuế quan (sau đây gọi là Nghị định số 122/2016/NĐ-CP), Nghị định số 57/2020/NĐ-CP ngày 25 tháng 5 năm 2020 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 122/2016/NĐ-CP và Nghị định số 125/2017/NĐ-CP ngày 16 tháng 11 năm 2017 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 122/2016/NĐ-CP (sau đây gọi là Nghị định số 57/2020/NĐ-CP) và văn bản sửa đổi, bổ sung, thay thế (nếu có)."},{"k":"p","t":"b)Hàng hoá nhập khẩu tại chỗ (trừ hàng hoá nhập khẩu tại chỗ từ khu phi thuế quan quy định tại điểm c khoản này) áp dụng mức thuế suất thuế nhập khẩu ưu đãi quy định tại Nghị định số 125/2017/NĐ-CP, Nghị định số 57/2020/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có)."},{"k":"p","t":"c)Hàng hóa đáp ứng điều kiện xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ thực hiện đối xử tối huệ quốc trong quan hệ thương mại với Việt Nam nhập khẩu tại chỗ từ khu phi thuế quan vào thị trường trong nước; hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan không đáp ứng các điều kiện để hưởng thuế suất thuế nhập khẩu ưu đãi đặc biệt nhập khẩu tại chỗ từ khu phi thuế quan vào thị trường trong nước, áp dụng mức thuế suất thuế nhập khẩu ưu đãi quy định tại Nghị định số 125/2017/NĐ-CP, Nghị định số 57/2020/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có)."},{"k":"p","t":"Hàng hóa đáp ứng điều kiện xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ có thoả thuận ưu đãi đặc biệt về thuế nhập khẩu trong quan hệ thương mại với Việt Nam nhập khẩu tại chỗ từ khu phi thuế quan vào thị trường trong nước và đáp ứng các điều kiện khác để hưởng thuế suất thuế nhập khẩu ưu đãi đặc biệt; hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan đáp ứng các điều kiện để hưởng thuế suất thuế nhập khẩu ưu đãi đặc biệt nhập khẩu tại chỗ từ khu phi thuế quan vào thị trường trong nước, áp dụng mức thuế suất thuế nhập khẩu ưu đãi đặc biệt quy định tại các Nghị định của Chính phủ về Biểu thuế nhập khẩu ưu đãi đặc biệt để thực hiện điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"Hàng hóa nhập khẩu không đáp ứng điều kiện xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ thực hiện đối xử tối huệ quốc và không đáp ứng các điều kiện để được hưởng mức thuế suất thuế nhập khẩu ưu đãi đặc biệt nhập khẩu tại chỗ từ khu phi thuế quan vào thị trường trong nước áp dụng mức thuế suất thuế nhập khẩu thông thường theo quy định tại điểm c khoản 3 Điều 5 Luật Thuế xuất khẩu, thuế nhập khẩu số 107/2016/QH13 và các Quyết định của Thủ tướng Chính phủ quy định việc áp dụng thuế suất thông thường đối với hàng hóa nhập khẩu."},{"k":"p","t":"d)Hàng hoá nhập khẩu tại chỗ thuộc Danh mục hàng hoá áp dụng hạn ngạch thuế quan thực hiện theo quy định về Danh mục hàng hoá và mức thuế suất thuế nhập khẩu đối với các mặt hàng áp dụng hạn ngạch thuế quan quy định tại Nghị định số 125/2017/NĐ-CP, Nghị định số 57/2020/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có).”"},{"k":"p","t":"2.Khoản 3, khoản 6, khoản 7, khoản 8 Điều 5 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 5. Miễn thuế đối với hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ"},{"k":"p","t":"3.Ngoài các mặt hàng quy định tại Phụ lục I, Phụ lục II, Phụ lục III ban hành kèm theo Nghị định này, đối tượng quy định tại điểm a, b khoản 1 Điều này được nhập khẩu miễn thuế các hàng hóa cần thiết khác để phục vụ cho nhu cầu công tác. Chủng loại và định lượng hàng hóa nhập khẩu miễn thuế thực hiện theo xác nhận của Bộ Ngoại giao."},{"k":"p","t":"6.Hồ sơ miễn thuế"},{"k":"p","t":"a)Hồ sơ hải quan theo quy định của pháp luật hải quan, trừ trường hợp mua hàng miễn thuế tại cửa hàng miễn thuế;"},{"k":"p","t":"b)Sổ định mức miễn thuế theo quy định tại khoản 8 Điều này: 01 bản chụp, trừ trường hợp Sổ định mức miễn thuế đã được cập nhật vào cổng thông tin một cửa quốc gia;"},{"k":"p","t":"c)Giấy tờ chứng minh đã hoàn thành việc tái xuất hoặc tiêu hủy hoặc chuyển nhượng đối với các trường hợp quy định tại khoản 5 Điều này: 01 bản chụp;"},{"k":"p","t":"d)Văn bản xác nhận của Bộ Ngoại giao đối với trường hợp nhập khẩu hàng hóa quy định tại khoản 2, khoản 3 Điều này: 01 bản chụp;"},{"k":"p","t":"đ) Quyết định miễn thuế của Thủ tướng Chính phủ đối với trường hợp nhập khẩu hàng hóa quy định tại khoản 4 Điều này: 01 bản chụp."},{"k":"p","t":"7.Thủ tục miễn thuế: Thực hiện theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"a)Đối với trường hợp quy định tại khoản 2 Điều này: Tổ chức nước ngoài có văn bản đề nghị gửi Bộ Ngoại giao theo Mẫu số 02a Phụ lục VII ban hành kèm theo Nghị định này. Trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản đề nghị, Bộ Ngoại giao có văn bản xác nhận theo Mẫu số 02b Phụ lục VII ban hành kèm theo Nghị định này hoặc có văn bản từ chối (nêu rõ lý do từ chối). Cơ quan hải quan căn cứ hồ sơ theo quy định tại khoản 6 Điều này để thực hiện miễn thuế."},{"k":"p","t":"b) Đối với trường hợp quy định tại khoản 3 Điều này: Tổ chức, cá nhân nước ngoài có văn bản theo Mẫu số 02c Phụ lục VII ban hành kèm theo Nghị định này gửi Bộ Ngoại giao đề nghị xác nhận chủng loại và định lượng hàng hoá nhập khẩu được miễn thuế. Trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản đề nghị, Bộ Ngoại giao có văn bản xác nhận theo Mẫu số 02d Phụ lục VII ban hành kèm theo Nghị định này hoặc có văn bản từ chối (nêu rõ lý do từ chối). Cơ quan hải quan căn cứ hồ sơ theo quy định tại khoản 6 Điều này để thực hiện miễn thuế."},{"k":"p","t":"c)Đối với trường hợp quy định tại khoản 4 Điều này"},{"k":"p","t":"Tổ chức, cá nhân nước ngoài có văn bản theo Mẫu số 02e Phụ lục VII ban hành kèm theo Nghị định này gửi Bộ Tài chính. Trong thời hạn 10 ngày kể từ ngày nhận được văn bản đề nghị, Bộ Tài chính thống nhất với Bộ Ngoại giao về chủng loại và định lượng hàng hóa miễn thuế nhập khẩu theo điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài."},{"k":"p","t":"Trong thời hạn 10 ngày kể từ ngày nhận được văn bản của Bộ Ngoại giao, Bộ Tài chính báo cáo Thủ tướng Chính phủ quyết định chủng loại và định lượng hàng hóa miễn thuế. Thủ tướng Chính phủ xem xét và có Quyết định miễn thuế nhập khẩu theo Mẫu số 02g Phụ lục VII ban hành kèm theo Nghị định này cho tổ chức, cá nhân nước ngoài. Cơ quan Hải quan căn cứ hồ sơ theo quy định tại khoản 6 Điều này để thực hiện miễn thuế."},{"k":"p","t":"Cơ quan Hải quan nơi làm thủ tục hải quan thực hiện theo dõi việc xuất khẩu, nhập khẩu sử dụng định mức miễn thuế bằng phương thức điện tử. Trường hợp chưa thực hiện theo dõi định mức miễn thuế bằng phương thức điện tử, người nộp thuế có trách nhiệm nộp 01 bản chụp, xuất trình bản chính Sổ định mức miễn thuế để đối chiếu, trừ lùi."},{"k":"p","t":"8.Thủ tục cấp Sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào Sổ định mức miễn thuế"},{"k":"p","t":"a)Hồ sơ đề nghị đối với cơ quan, tổ chức:"},{"k":"p","t":"Văn bản đề nghị cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào sổ định mức miễn thuế theo Mẫu số 01 hoặc Mẫu số 01a Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"Văn bản thông báo về việc thành lập cơ quan đại diện tại Việt Nam khi cấp Sổ định mức miễn thuế lần đầu: 01 bản chụp;"},{"k":"p","t":"Giấy tờ chứng minh đã hoàn thành việc tái xuất khẩu hoặc tiêu hủy hoặc chuyển nhượng trong trường hợp đối tượng quy định tại điểm a, điểm b khoản 1 Điều này đề nghị cấp bổ sung định lượng xe ô tô, xe gắn máy vào sổ định mức miễn thuế: 01 bản chụp;"},{"k":"p","t":"Điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài có quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế: 01 bản chụp;"},{"k":"p","t":"Quyết định miễn thuế của Thủ tướng Chính phủ trong trường hợp Điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài không quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều này): 01 bản chụp."},{"k":"p","t":"b)Hồ sơ đề nghị đối với cá nhân:"},{"k":"p","t":"Văn bản đề nghị cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào sổ định mức miễn thuế theo Mẫu số 02 hoặc Mẫu số 02i Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"Chứng minh thư do Bộ Ngoại giao cấp đối với đối tượng quy định tại điểm a, điểm b khoản 1 Điều này: 01 bản chụp;"},{"k":"p","t":"Giấy tờ chứng minh đã hoàn thành việc tái xuất khẩu hoặc tiêu hủy hoặc chuyển nhượng trong trường hợp đối tượng quy định tại điểm a, điểm b khoản 1 Điều này đề nghị cấp bổ sung định lượng xe ô tô, xe gắn máy vào Sổ định mức miễn thuế: 01 bản chụp."},{"k":"p","t":"Giấy phép lao động hoặc văn bản có giá trị pháp lý tương đương do cơ quan có thẩm quyền cấp đối với thành viên của tổ chức quốc tế, tổ chức phi chính phủ (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều này): 01 bản chụp;"},{"k":"p","t":"Điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài có quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế: 01 bản chụp;"},{"k":"p","t":"Quyết định miễn thuế của Thủ tướng Chính phủ trong trường hợp điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài không quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều này): 01 bản chụp."},{"k":"p","t":"c)Thẩm quyền cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào sổ định mức miễn thuế"},{"k":"p","t":"Cục Lễ tân Nhà nước thuộc Bộ Ngoại giao hoặc cơ quan được Bộ Ngoại giao uỷ quyền thực hiện cấp sổ định mức miễn thuế theo Mẫu số 02h1 hoặc Mẫu số 02h2 hoặc Mẫu số 02h3 Phụ lục VII ban hành kèm theo Nghị định này cho các tổ chức, cá nhân quy định tại điểm a, điểm b khoản 1 Điều này trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ."},{"k":"p","t":"Cục Hải quan tỉnh, liên tỉnh, thành phố trực thuộc trung ương (sau đây gọi là Cục Hải quan tỉnh, thành phố) nơi đóng trụ sở của cơ quan, tổ chức quy định tại điểm c, điểm d khoản 1 Điều này thực hiện cấp Sổ định mức miễn thuế theo Mẫu số 02h4 hoặc Mẫu số 02h5 Phụ lục VII ban hành kèm theo Nghị định này cho các tổ chức, cá nhân quy định tại điểm c, điểm d khoản 1 Điều này trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ."},{"k":"p","t":"Bộ Ngoại giao tiếp tục theo dõi và cấp sổ định mức miễn thuế đối với các đối tượng ưu đãi miễn trừ quy định tại điểm c khoản 1 Điều này đã được Bộ Ngoại giao cấp sổ định mức miễn thuế trước thời điểm Nghị định này có hiệu lực."},{"k":"p","t":"Sau khi cấp Sổ định mức miễn thuế, cơ quan cấp Sổ định mức quy định tại điểm này cập nhật thông tin của sổ định mức miễn thuế cho Tổng cục Hải quan thông qua cổng thông tin một cửa quốc gia.”"},{"k":"p","t":"3.Điểm b khoản 2 Điều 8 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 8. Miễn thuế đối với quà biếu, quà tặng"},{"k":"p","t":"2. Định mức miễn thuế"},{"k":"p","t":"b)Đối với quà biếu, quà tặng của tổ chức, cá nhân nước ngoài cho cơ quan, tổ chức Việt Nam được ngân sách nhà nước bảo đảm kinh phí hoạt động theo pháp luật về ngân sách và được cơ quan có thẩm quyền cho phép tiếp nhận hoặc quà biếu, quà tặng vì mục đích nhân đạo, từ thiện là toàn bộ trị giá của quà biếu, quà tặng và không quá 04 lần/năm.”"},{"k":"p","t":"4.Điểm g khoản 1, khoản 2, khoản 4, khoản 5 Điều 10 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 10. Miễn thuế đối với hàng hóa nhập khẩu để gia công, sản phẩm gia công xuất khẩu"},{"k":"p","t":"1.Hàng hóa nhập khẩu để gia công, sản phẩm gia công xuất khẩu theo hợp đồng gia công được miễn thuế xuất khẩu, thuế nhập khẩu theo quy định tại khoản 6 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu gồm:"},{"k":"p","t":"g) Sản phẩm gia công xuất khẩu ra nước ngoài hoặc xuất khẩu vào khu phi thuế quan, xuất khẩu tại chỗ cho tổ chức, cá nhân tại Việt Nam theo chỉ định của bên đặt gia công."},{"k":"p","t":"Sản phẩm gia công xuất khẩu được miễn thuế xuất khẩu theo quy định tại điểm này nếu sản phẩm được gia công từ toàn bộ hàng hóa nhập khẩu. Trường hợp sản phẩm gia công xuất khẩu được sản xuất từ nguyên liệu, vật tư trong nước có thuế xuất khẩu thì khi xuất khẩu phải nộp thuế đối với phần trị giá nguyên liệu, vật tư trong nước cấu thành trong sản phẩm xuất khẩu theo mức thuế suất của nguyên liệu, vật tư."},{"k":"p","t":"2. Cơ sở xác định hàng hóa được miễn thuế:"},{"k":"p","t":"a)Người nộp thuế có hợp đồng gia công theo quy định tại Nghị định số 69/2018/NĐ-CP ngày 15 tháng 5 năm 2018 của Chính phủ quy định chi tiết một số điều của Luật Quản lý ngoại thương. Người nộp thuế kê khai số tiếp nhận hợp đồng gia công, phụ lục hợp đồng gia công trên tờ khai hải quan."},{"k":"p","t":"b)Người nộp thuế hoặc tổ chức, cá nhân nhận gia công lại cho người nộp thuế có quyền sở hữu hoặc quyền sử dụng cơ sở gia công hàng hóa xuất khẩu và máy móc, thiết bị tại cơ sở gia công trên lãnh thổ Việt Nam và phải thực hiện thông báo cơ sở gia công, gia công lại; hợp đồng gia công, hợp đồng gia công lại, phụ lục hợp đồng gia công, phụ lục hợp đồng gia công lại cho cơ quan hải quan theo quy định của pháp luật hải quan. Trường hợp người nộp thuế thông báo cơ sở gia công lại, hợp đồng gia công lại không đúng thời hạn theo quy định của pháp luật hải quan thì chỉ bị xử phạt vi phạm hành chính trong lĩnh vực hải quan theo quy định."},{"k":"p","t":"c)Trường hợp người nộp thuế (có hợp đồng gia công) giao một phần hoặc toàn bộ hàng hóa nhập khẩu hoặc bán thành phẩm được gia công từ hàng hóa nhập khẩu theo quy định tại khoản 1 Điều này thuê tổ chức, cá nhân khác nhận gia công lại đáp ứng quy định tại điểm b khoản này để gia công một số công đoạn hoặc toàn bộ công đoạn của sản phẩm sau đó nhận lại bán thành phẩm để tiếp tục gia công hoặc nhận lại thành phẩm để xuất khẩu thì người nộp thuế được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu giao gia công lại."},{"k":"p","t":"Người nộp thuế (có hợp đồng gia công) giao một phần hoặc toàn bộ hàng hóa nhập khẩu hoặc bán thành phẩm được gia công từ toàn bộ hàng hóa nhập khẩu để thuê tổ chức, cá nhân khác nhận gia công lại tại khu phi thuế quan hoặc tại nước ngoài thì hàng hóa nhập khẩu, bán thành phẩm giao gia công lại được miễn thuế xuất khẩu. Sản phẩm thuê gia công ở nước ngoài nhập khẩu trở lại Việt Nam phải nộp thuế nhập khẩu theo quy định tại điểm d khoản 1 Điều 11 Nghị định này. Sản phẩm thuê gia công tại khu phi thuế quan nhập khẩu vào nội địa Việt Nam phải nộp thuế nhập khẩu theo quy định tại khoản 2 Điều 22 Nghị định này."},{"k":"p","t":"d) Người nộp thuế (có hợp đồng gia công) chịu trách nhiệm thực hiện quyết toán tình hình sử dụng hàng hóa nhập khẩu được miễn thuế theo quy định của pháp luật hải quan."},{"k":"p","t":"đ) Lượng hàng hóa nhập khẩu được sử dụng để gia công sản phẩm đã xuất khẩu ra nước ngoài, xuất khẩu vào khu phi thuế quan được miễn thuế nhập khẩu là lượng hàng hóa nhập khẩu thực tế được sử dụng để gia công sản phẩm đã xuất khẩu."},{"k":"p","t":"Hàng hóa nhập khẩu được sử dụng để gia công sản phẩm đã xuất khẩu tại chỗ cho tổ chức, cá nhân trong nội địa (không nằm trong khu phi thuế quan), sản phẩm gia công nhập khẩu tại chỗ thực hiện theo quy định tại điểm g, h khoản này."},{"k":"p","t":"e) Hàng hóa nhập khẩu để gia công, phế liệu, phế phẩm tạo thành trong quá trình gia công xuất khẩu trả cho bên nước ngoài đặt gia công được miễn thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"Hàng hóa nhập khẩu để gia công, sản phẩm gia công, phế liệu, phế phẩm tạo thành trong quá trình gia công được phép tiêu hủy và thực tế đã tiêu hủy theo quy định của pháp luật hải quan được miễn thuế nhập khẩu."},{"k":"p","t":"Đối với hàng hóa nhập khẩu để gia công xuất khẩu nhưng sản phẩm không được xuất khẩu hoặc hàng hóa nhập khẩu dư thừa không xuất khẩu, người nộp thuế phải đăng ký tờ khai hải quan mới, kê khai nộp thuế với cơ quan hải quan theo mức thuế suất và trị giá tính thuế của hàng hóa nhập khẩu tại thời điểm đăng ký tờ khai hải quan mới, trừ trường hợp làm quà biếu, quà tặng theo quy định tại Điều 8 Nghị định này."},{"k":"p","t":"g)Hàng hóa nhập khẩu được sử dụng để gia công sản phẩm xuất khẩu tại chỗ được miễn thuế nhập khẩu là hàng hóa thực tế được sử dụng để gia công sản phẩm đã xuất khẩu tại chỗ nếu người xuất khẩu tại chỗ thông báo cho cơ quan hải quan thông tin về tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục nhập khẩu trong thời hạn 15 ngày, kể từ ngày thông quan sản phẩm xuất khẩu tại chỗ theo Mẫu số 22 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"Quá thời hạn nêu trên, nếu người xuất khẩu tại chỗ không thông báo cho cơ quan hải quan thông tin về tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục nhập khẩu thì người xuất khẩu tại chỗ phải đăng ký tờ khai hải quan mới, kê khai, nộp thuế đối với hàng hóa nhập khẩu đã sử dụng để gia công sản phẩm xuất khẩu tại chỗ theo mức thuế suất và trị giá tính thuế của hàng hóa nhập khẩu quy định tại thời điểm đăng ký tờ khai hải quan mới."},{"k":"p","t":"Sau khi nộp thuế, người xuất khẩu tại chỗ thực hiện thông báo cho cơ quan hải quan thông tin về tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục nhập khẩu thì được xử lý số tiền thuế đã nộp theo quy định của pháp luật quản lý thuế về xử lý tiền thuế nộp thừa."},{"k":"p","t":"h)Sản phẩm nhập khẩu tại chỗ đăng ký tờ khai hải quan theo loại hình nhập gia công được miễn thuế nhập khẩu nếu người nhập khẩu tại chỗ đáp ứng quy định tại điểm a, điểm b khoản này. Sản phẩm nhập khẩu tại chỗ đăng ký theo loại hình khác thì người nhập khẩu tại chỗ kê khai nộp thuế theo mức thuế suất và trị giá tính thuế của sản phẩm nhập khẩu tại chỗ tại thời điểm đăng ký tờ khai hải quan nhập khẩu tại chỗ."},{"k":"p","t":"Trường hợp người nhập khẩu tại chỗ đã nộp thuế nhập khẩu hàng hóa để sản xuất, kinh doanh và đưa sản phẩm nhập khẩu tại chỗ vào sản xuất hàng hóa xuất khẩu và thực tế đã xuất khẩu sản phẩm ra nước ngoài hoặc vào khu phi thuế quan thì được hoàn thuế nhập khẩu đã nộp theo quy định tại Điều 36 Nghị định này."},{"k":"p","t":"4. Phế liệu, phế phẩm tạo thành trong quá trình gia công khi chuyển tiêu thụ nội địa được miễn thuế nhập khẩu, người nộp thuế không phải làm thủ tục hải quan nhưng phải kê khai, nộp thuế giá trị gia tăng, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường (nếu có) cho cơ quan thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"5.Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"Khi làm thủ tục xuất khẩu tại chỗ đối với hàng hóa quy định tại Điều này, ngoài hồ sơ miễn thuế theo quy định tại Điều 31 Nghị định này, người xuất khẩu tại chỗ phải nộp thêm văn bản chỉ định giao hàng hoá tại Việt Nam của tổ chức, cá nhân nước ngoài: 01 bản chụp.”"},{"k":"p","t":"5.Điểm a khoản 1 Điều 11 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 11. Miễn thuế đối với hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu"},{"k":"p","t":"1.Hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu theo hợp đồng gia công được miễn thuế xuất khẩu, thuế nhập khẩu theo quy định tại khoản 6 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu, gồm:"},{"k":"p","t":"a)Nguyên liệu, vật tư, linh kiện xuất khẩu."},{"k":"p","t":"Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện đã xuất khẩu tương ứng với sản phẩm gia công không nhập khẩu trở lại phải chịu thuế xuất khẩu theo mức thuế suất của nguyên liệu, vật tư, linh kiện xuất khẩu."},{"k":"p","t":"Hàng hóa xuất khẩu là tài nguyên khoáng sản, sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên và hàng hóa (trừ phế liệu tạo thành trong quá trình sản xuất, gia công xuất khẩu từ hàng hóa nhập khẩu) xuất khẩu để gia công thuộc đối tượng chịu thuế xuất khẩu, thì không được miễn thuế xuất khẩu."},{"k":"p","t":"Việc xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên thực hiện theo quy định tại Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật sửa đổi, bổ sung một số điều của Luật Thuế giá trị gia tăng, Luật Thuế tiêu thụ đặc biệt và Luật Quản lý thuế và Nghị định số 146/2017/NĐ-CP ngày 15 tháng 12 năm 2017 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 100/2016/NĐ-CP.”"},{"k":"p","t":"6.Điều 12 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 12. Miễn thuế đối với hàng hóa nhập khẩu để sản xuất hàng hóa xuất khẩu"},{"k":"p","t":"1.Hàng hoá nhập khẩu để sản xuất hàng hoá xuất khẩu được miễn thuế nhập khẩu theo quy định tại khoản 7 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a)Nguyên liệu, vật tư (bao gồm cả vật tư làm bao bì hoặc bao bì để đóng gói sản phẩm xuất khẩu), linh kiện, bán thành phẩm nhập khẩu trực tiếp cấu thành sản phẩm xuất khẩu hoặc tham gia trực tiếp vào quá trình sản xuất hàng hóa xuất khẩu nhưng không trực tiếp chuyển hóa thành hàng hóa;"},{"k":"p","t":"b)Sản phẩm hoàn chỉnh nhập khẩu để đóng gói, dán nhãn hoặc gắn, lắp ráp vào sản phẩm xuất khẩu hoặc đóng chung thành mặt hàng đồng bộ với sản phẩm xuất khẩu;"},{"k":"p","t":"c)Linh kiện, phụ tùng nhập khẩu để bảo hành cho sản phẩm xuất khẩu;"},{"k":"p","t":"d)Hàng hóa nhập khẩu không sử dụng để mua bán, trao đổi hoặc tiêu dùng mà chỉ dùng làm hàng mẫu;"},{"k":"p","t":"đ) Hàng hóa nhập khẩu để sản xuất xuất khẩu được phép tiêu hủy tại Việt Nam và thực tế đã tiêu huỷ."},{"k":"p","t":"2.Cơ sở để xác định hàng hóa được miễn thuế:"},{"k":"p","t":"a)Người nộp thuế có quyền sở hữu hoặc quyền sử dụng cơ sở sản xuất hàng hóa xuất khẩu, máy móc, thiết bị tại cơ sở sản xuất trên lãnh thổ Việt Nam. Người nộp thuế thực hiện thông báo về cơ sở sản xuất, máy móc, thiết bị tại cơ sở sản xuất của người nộp thuế; thông báo cơ sở sản xuất, gia công của người nhận sản xuất, gia công lại, hợp đồng sản xuất, gia công lại cho cơ quan hải quan theo quy định của pháp luật hải quan. Trường hợp người nộp thuế thông báo cơ sở sản xuất, gia công lại, hợp đồng sản xuất, gia công lại không đúng thời hạn theo quy định của pháp luật hải quan thì chỉ bị xử phạt vi phạm hành chính trong lĩnh vực hải quan theo quy định."},{"k":"p","t":"Người nộp thuế giao hàng hóa nhập khẩu theo quy định tại khoản 1 Điều này để thuê tổ chức, cá nhân khác có quyền sở hữu hoặc quyền sử dụng cơ sở sản xuất, máy móc, thiết bị tại cơ sở sản xuất để sản xuất, gia công lại theo các trường hợp sau:"},{"k":"p","t":"a1) Người nộp thuế giao một phần hoặc toàn bộ hàng hóa nhập khẩu để thuê tổ chức, cá nhân khác trên lãnh thổ Việt Nam sản xuất, gia công lại một hoặc một số công đoạn của sản phẩm, sau đó nhận lại bán thành phẩm để tiếp tục sản xuất sản phẩm xuất khẩu được miễn thuế nhập khẩu đối với hàng hóa đã nhập khẩu giao sản xuất, gia công lại."},{"k":"p","t":"a2) Người nộp thuế giao một phần hoặc toàn bộ bán thành phẩm do người nộp thuế sản xuất từ hàng hóa nhập khẩu để thuê tổ chức, cá nhân khác trên lãnh thổ Việt Nam sản xuất, gia công lại một hoặc một số công đoạn của sản phẩm, sau đó nhận lại bán thành phẩm để tiếp tục sản xuất sản phẩm xuất khẩu hoặc nhận lại thành phẩm để xuất khẩu được miễn thuế nhập khẩu đối với hàng hóa đã nhập khẩu để sản xuất bán thành phẩm giao sản xuất, gia công lại."},{"k":"p","t":"a3) Người nộp thuế giao một phần hàng hóa nhập khẩu để thuê tổ chức, cá nhân khác trên lãnh thổ Việt Nam sản xuất, gia công lại toàn bộ các công đoạn của sản phẩm, sau đó nhận lại thành phẩm để xuất khẩu được miễn thuế nhập khẩu đối với hàng hóa đã nhập khẩu giao sản xuất, gia công lại."},{"k":"p","t":"a4) Người nộp thuế giao hàng hóa nhập khẩu, bán thành phẩm được sản xuất từ toàn bộ hàng hóa nhập khẩu để thuê tổ chức, cá nhân khác sản xuất, gia công lại tại khu phi thuế quan hoặc nước ngoài theo một trong các trường hợp quy định tại điểm a.1, a.2, a.3 khoản này được miễn thuế xuất khẩu đối với hàng hóa nhập khẩu, bán thành phẩm được sản xuất từ toàn bộ hàng hóa nhập khẩu giao sản xuất, gia công lại. Sản phẩm thuê sản xuất, gia công tại nước ngoài nhập khẩu trở lại Việt Nam phải nộp thuế nhập khẩu theo quy định tại điểm d khoản 1 Điều 11 Nghị định này. Sản phẩm thuê sản xuất, gia công tại khu phi thuế quan nhập khẩu vào nội địa Việt Nam phải nộp thuế nhập khẩu theo quy định tại khoản 2 Điều 22 Nghị định này."},{"k":"p","t":"b)Người nộp thuế nhập khẩu hàng hóa theo quy định tại khoản 1 Điều này giao toàn bộ hàng hóa đã nhập khẩu cho tổ chức thuộc sở hữu trên 50% vốn điều lệ hoặc tổng số cổ phần phổ thông của người nộp thuế sản xuất, gia công sản phẩm sau đó nhận lại sản phẩm để xuất khẩu thì được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu giao sản xuất, gia công (bao gồm cả trường hợp tổ chức nhận sản xuất thuê đơn vị khác sản xuất, gia công lại một hoặc một số công đoạn của sản phẩm xuất khẩu). Tổ chức nhận sản xuất gia công sản phẩm phải có quyền sở hữu hoặc quyền sử dụng cơ sở sản xuất, gia công, máy móc, thiết bị tại cơ sở sản xuất trên lãnh thổ Việt Nam. Người nộp thuế phải thực hiện thông báo cơ sở sản xuất, gia công của tổ chức nhận sản xuất, gia công, cơ sở sản xuất, gia công lại của đơn vị nhận sản xuất, gia công lại, hợp đồng sản xuất, gia công lại cho cơ quan hải quan theo quy định của pháp luật hải quan.Trường hợp người nộp thuế thông báo cơ sở sản xuất, gia công lại của đơn vị nhận sản xuất, gia công lại, hợp đồng sản xuất, gia công lại không đúng thời hạn theo quy định của pháp luật hải quan thì chỉ bị xử phạt vi phạm hành chính trong lĩnh vực hải quan theo quy định."},{"k":"p","t":"Người nộp thuế phải nộp thêm các chứng từ sau cho cơ quan hải quan tại thời điểm thông báo cơ sở sản xuất của tổ chức nhận sản xuất, gia công lại:"},{"k":"p","t":"Giấy chứng nhận đăng ký doanh nghiệp hoặc Báo cáo tài chính đã được kiểm toán tại thời điểm gần nhất của tổ chức nhận sản xuất và của người nộp thuế: 01 bản sao có chứng thực;"},{"k":"p","t":"Điều lệ về tổ chức hoạt động của tổ chức nhận sản xuất và của người nộp thuế: 01 bản sao có chứng thực;"},{"k":"p","t":"Sổ cổ đông của doanh nghiệp đối với công ty cổ phần hoặc sổ đăng ký thành viên đối với Công ty trách nhiệm hữu hạn hai thành viên trở lên của tổ chức nhận sản xuất và của người nộp thuế: 01 bản sao có chứng thực."},{"k":"p","t":"Người nộp thuế giao toàn bộ hàng hóa đã nhập khẩu để thuê tổ chức nhận sản xuất, gia công lại tại khu phi thuế quan hoặc tại nước ngoài được miễn thuế xuất khẩu đối với hàng hóa nhập khẩu giao sản xuất, gia công lại. Sản phẩm thuê sản xuất, gia công tại nước ngoài nhập khẩu trở lại Việt Nam phải nộp thuế nhập khẩu theo quy định tại điểm d khoản 1 Điều 11 Nghị định này. Sản phẩm thuê sản xuất, gia công tại khu phi thuế quan nhập khẩu vào nội địa Việt Nam phải nộp thuế nhập khẩu theo quy định tại khoản 2 Điều 22 Nghị định này."},{"k":"p","t":"c)Người nộp thuế có trách nhiệm thực hiện quyết toán tình hình sử dụng hàng hóa được miễn thuế theo quy định của pháp luật hải quan."},{"k":"p","t":"d)Lượng hàng hóa nhập khẩu được sử dụng để sản xuất sản phẩm xuất khẩu ra nước ngoài, xuất khẩu vào khu phi thuế quan được miễn thuế là lượng hàng hóa nhập khẩu thực tế được sử dụng để sản xuất sản phẩm đã xuất khẩu."},{"k":"p","t":"Hàng hóa nhập khẩu được sử dụng để sản xuất sản phẩm đã xuất khẩu tại chỗ cho tổ chức, cá nhân trong nội địa (không nằm trong khu phi thuế quan) và sản phẩm xuất khẩu tại chỗ, sản phẩm nhập khẩu tại chỗ thực hiện theo quy định tại điểm e, g, h khoản này."},{"k":"p","t":"đ) Hàng hóa nhập khẩu để sản xuất, sản phẩm sản xuất, phế liệu, phế phẩm tạo thành trong quá trình sản xuất được phép tiêu hủy và thực tế đã tiêu hủy theo quy định pháp luật hải quan được miễn thuế nhập khẩu."},{"k":"p","t":"Hàng hóa nhập khẩu để sản xuất xuất khẩu nhưng không sử dụng hoặc hàng hóa nhập khẩu đã sử dụng để sản xuất nhưng không xuất khẩu sản phẩm thì không được miễn thuế nhập khẩu, người nộp thuế phải đăng ký tờ khai hải quan mới và kê khai, nộp thuế với cơ quan hải quan theo mức thuế suất và trị giá tính thuế của hàng hóa nhập khẩu tại thời điểm đăng ký tờ khai hải quan mới, trừ trường hợp làm quà biếu, quà tặng theo quy định tại Điều 8 Nghị định này."},{"k":"p","t":"e)Lượng hàng hóa nhập khẩu được sử dụng để sản xuất sản phẩm xuất khẩu tại chỗ được miễn thuế nhập khẩu là lượng hàng hóa thực tế được sử dụng để sản xuất sản phẩm đã xuất khẩu tại chỗ, nếu người xuất khẩu tại chỗ thực hiện thông báo cho cơ quan hải quan thông tin về tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục nhập khẩu trong thời hạn 15 ngày, kể từ ngày thông quan sản phẩm xuất khẩu tại chỗ theo Mẫu số 22 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"Quá thời hạn nêu trên, người xuất khẩu tại chỗ không thông báo cho cơ quan hải quan thông tin tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục nhập khẩu, người xuất khẩu tại chỗ phải đăng ký tờ khai hải quan mới và kê khai, nộp thuế đối với hàng hóa nhập khẩu đã sử dụng để sản xuất sản phẩm xuất khẩu tại chỗ theo mức thuế suất và trị giá tính thuế của hàng hóa nhập khẩu quy định tại thời điểm đăng ký tờ khai hải quan mới."},{"k":"p","t":"Sau khi nộp thuế, người xuất khẩu tại chỗ thực hiện thông báo cho cơ quan hải quan thông tin về tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục nhập khẩu thì được xử lý số tiền thuế đã nộp theo quy định của pháp luật quản lý thuế về xử lý tiền thuế nộp thừa."},{"k":"p","t":"g)Sản phẩm xuất khẩu tại chỗ không được miễn thuế xuất khẩu. Người xuất khẩu tại chỗ đăng ký tờ khai hải quan xuất khẩu tại chỗ và kê khai nộp thuế xuất khẩu theo mức thuế suất và trị giá của sản phẩm xuất khẩu tại chỗ theo quy định tại thời điểm đăng ký tờ khai hải quan xuất khẩu tại chỗ."},{"k":"p","t":"h)Sản phẩm nhập khẩu tại chỗ đăng ký tờ khai hải quan theo loại hình nhập gia công được miễn thuế nhập khẩu nếu người nhập khẩu tại chỗ đáp ứng quy định tại điểm a, b khoản 2 Điều 10 Nghị định này. Sản phẩm nhập khẩu tại chỗ đăng ký tờ khai hải quan theo loại hình khác thì người nhập khẩu tại chỗ kê khai, nộp thuế theo mức thuế suất và trị giá tính thuế của sản phẩm nhập khẩu tại thời điểm đăng ký tờ khai."},{"k":"p","t":"Trường hợp người nhập khẩu tại chỗ đã nộp thuế nhập khẩu hàng hóa để sản xuất, kinh doanh, đã đưa sản phẩm nhập khẩu tại chỗ vào sản xuất hàng hóa xuất khẩu và thực tế đã xuất khẩu sản phẩm ra nước ngoài hoặc vào khu phi thuế quan thì được hoàn thuế nhập khẩu đã nộp theo quy định tại Điều 36 Nghị định này."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"Khi làm thủ tục xuất khẩu tại chỗ đối với hàng hóa quy định tại Điều này, ngoài hồ sơ miễn thuế theo quy định tại Điều 31 Nghị định này, người xuất khẩu tại chỗ phải nộp thêm văn bản chỉ định giao hàng hoá tại Việt Nam của tổ chức, cá nhân nước ngoài: 01 bản chụp."},{"k":"p","t":"4. Phế liệu, phế phẩm tạo thành trong quá trình sản xuất xuất khẩu khi chuyển tiêu thụ nội địa được miễn thuế nhập khẩu, người nộp thuế không phải làm thủ tục hải quan nhưng phải kê khai, nộp thuế giá trị gia tăng, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường (nếu có) cho cơ quan thuế theo quy định của pháp luật thuế.”"},{"k":"p","t":"7.Sửa đổi, bổ sung khoản 4 và bổ sung khoản 6 Điều 14 như sau:"},{"k":"p","t":"“Điều 14. Miễn thuế hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư"},{"k":"p","t":"4. Căn cứ để xác định vật tư xây dựng trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"Căn cứ để xác định phương tiện vận tải chuyên dùng trong dây chuyền công nghệ sử dụng trực tiếp cho hoạt động sản xuất của dự án đầu tư thực hiện theo Danh mục hoặc tiêu chí để xác định hàng hoá nhập khẩu miễn thuế của Bộ Khoa học và Công nghệ hoặc theo văn bản xác nhận của Bộ Khoa học và Công nghệ đối với phương tiện vận tải chuyên dùng nhập khẩu trong dây chuyền công nghệ sử dụng trực tiếp cho hoạt động sản xuất của dự án đầu tư."},{"k":"p","t":"6.Cơ sở để xác định đối tượng được miễn thuế"},{"k":"p","t":"a)Dự án đầu tư thuộc ngành, nghề ưu đãi đầu tư hoặc ngành, nghề đặc biệt ưu đãi đầu tư; dự án đầu tư tại địa bàn có điều kiện kinh tế-xã hội khó khăn hoặc địa bàn kinh tế - xã hội đặc biệt khó khăn: Thực hiện theo quy định tại Phụ lục I, Phụ lục II ban hành kèm theo Nghị định số 118/2015/NĐ-CP ngày 12 tháng 11 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Đầu tư (sau đây gọi là Nghị định số 118/2015/NĐ-CP) và văn bản sửa đổi, bổ sung, thay thế (nếu có)."},{"k":"p","t":"b)Dự án đầu tư có quy mô vốn đầu tư từ 6.000 tỷ đồng trở lên, thực hiện giải ngân tối thiểu 6.000 tỷ đồng trong thời hạn 03 năm kể từ ngày được cấp Giấy chứng nhận đăng ký đầu tư hoặc chấp thuận chủ trương đầu tư, đồng thời có một trong các tiêu chí sau: có tổng doanh thu tối thiểu đạt 10.000 tỷ đồng mỗi năm trong thời gian chậm nhất sau 03 năm kể từ năm có doanh thu hoặc sử dụng trên 3.000 lao động quy định tại điểm c khoản 2 Điều 15 Luật Đầu tư số 61/2020/QH14 được miễn thuế nhập khẩu theo quy định tại khoản 1 Điều này trên cơ sở kê khai của chủ dự án đầu tư."},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế có trách nhiệm thực hiện kiểm tra việc giải ngân vốn đầu tư, các tiêu chí về tổng doanh thu và tiêu chí về sử dụng lao động tại trụ sở của chủ dự án theo trình tự, thủ tục kiểm tra sau thông quan. Trường hợp dự án đầu tư chưa thực hiện giải ngân tối thiểu 6.000 tỷ đồng trong thời hạn 03 năm kể từ ngày được cấp Giấy chứng nhận đăng ký đầu tư hoặc chấp thuận chủ trương đầu tư hoặc dự án đầu tư đã thực hiện giải ngân tối thiểu 6.000 tỷ đồng trong thời hạn 03 năm kể từ ngày được cấp Giấy chứng nhận đăng ký đầu tư hoặc chấp thuận chủ trương đầu tư nhưng không đáp ứng tiêu chí về tổng doanh thu hoặc tiêu chí về sử dụng lao động theo quy định pháp luật đầu tư thì người nộp thuế không được hưởng ưu đãi thuế nhập khẩu theo quy định tại khoản 1 Điều này và phải kê khai, nộp đủ số tiền thuế đã được miễn, tiền chậm nộp theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"c)Dự án đầu tư tại vùng nông thôn sử dụng từ 500 lao động trở lên (không bao gồm lao động làm việc không trọn thời gian và lao động có hợp đồng lao động dưới 12 tháng): Thời điểm xác định số lao động của dự án đầu tư được tính sau 12 tháng kể từ ngày dự án chính thức hoạt động. Chủ dự án tự kê khai, tự chịu trách nhiệm và thực hiện thông báo với cơ quan hải quan về ngày dự án đầu tư chính thức hoạt động theo Mẫu số 21 Phụ lục VII ban hành kèm theo Nghị định này và phải bảo đảm đáp ứng tiêu chí sử dụng từ 500 lao động trở lên trong suốt thời gian hoạt động của dự án. Sau khi dự án chính thức hoạt động, cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế có trách nhiệm kiểm tra số lao động của dự án đầu tư."},{"k":"p","t":"Tại thời điểm xác định tiêu chí về số lao động của dự án đầu tư, dự án chưa sử dụng từ 500 lao động trở lên thì không được hưởng ưu đãi thuế nhập khẩu theo quy định tại khoản 1 Điều này. Người nộp thuế phải kê khai, nộp đủ số tiền thuế đã được miễn, tiền chậm nộp theo quy định của pháp luật quản lý thuế."},{"k":"p","t":"Dự án đầu tư có sử dụng từ 500 lao động trở lên đầu tư tại địa bàn vừa là vùng nông thôn, vừa không phải vùng nông thôn thì căn cứ theo số lao động làm việc trong công trình, hạng mục tại vùng nông thôn để xác định, không tính số lao động làm việc trong công trình, hạng mục không phải vùng nông thôn."},{"k":"p","t":"d) Doanh nghiệp công nghệ cao, doanh nghiệp khoa học và công nghệ, tổ chức khoa học và công nghệ thực hiện theo quy định của pháp luật về công nghệ cao và pháp luật về khoa học và công nghệ."},{"k":"p","t":"đ) Cơ sở để xác định miễn thuế của các đối tượng ưu đãi đầu tư khác quy định tại Luật Đầu tư số 61/2020/QH14 thực hiện theo quy định của pháp luật đầu tư và pháp luật chuyên ngành có liên quan."},{"k":"p","t":"e) Ưu đãi thuế nhập khẩu quy định tại khoản 1 Điều này không áp dụng đối với các dự án đầu tư theo quy định tại khoản 5 Điều 15 Luật Đầu tư số 61/2020/QH14.”"},{"k":"p","t":"8.Khoản 1 Điều 15 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 15. Miễn thuế nhập khẩu đối với nguyên liệu, vật tư, linh kiện trong thời hạn 05 năm"},{"k":"p","t":"1.Nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được nhập khẩu để sản xuất của dự án đầu tư quy định tại điểm a, b, c khoản này được miễn thuế nhập khẩu trong thời hạn 05 năm kể từ ngày bắt đầu sản xuất theo quy định tại khoản 13 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"a)Dự án đầu tư thuộc Danh mục ngành, nghề đặc biệt ưu đãi đầu tư quy định tại Phụ lục I Nghị định số 118/2015/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có)."},{"k":"p","t":"b)Dự án đầu tư thuộc Danh mục địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn quy định tại Phụ lục II Nghị định số 118/2015/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có) hoặc dự án đầu tư quy định tại điểm a, c khoản 2 Điều 16 Nghị định số 118/2015/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có)."},{"k":"p","t":"c)Dự án đầu tư của doanh nghiệp công nghệ cao, doanh nghiệp khoa học và công nghệ, tổ chức khoa học và công nghệ theo quy định của pháp luật về công nghệ cao và pháp luật về khoa học công nghệ."},{"k":"p","t":"Thời gian bắt đầu sản xuất là thời gian sản xuất chính thức, không bao gồm thời gian sản xuất thử. Người nộp thuế tự kê khai, tự chịu trách nhiệm về ngày thực tế sản xuất và thông báo trước khi làm thủ tục hải quan cho cơ quan hải quan nơi tiếp nhận hồ sơ thông báo Danh mục miễn thuế."},{"k":"p","t":"Hết thời hạn miễn thuế 05 năm, người nộp thuế phải kê khai, nộp đủ thuế theo quy định đối với lượng nguyên liệu, vật tư, linh kiện nhập khẩu đã được miễn thuế nhưng không sử dụng hết.”"},{"k":"p","t":"9.Sửa đổi, bổ sung khoản 1, khoản 5 và bổ sung khoản 7, khoản 8, khoản 9 Điều 28 như sau:"},{"k":"p","t":"“Điều 28. Miễn thuế đối với hàng hoá xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác"},{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác được miễn thuế xuất khẩu, thuế nhập khẩu theo quy định tại khoản 23 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a)Hàng hóa trong nước chưa sản xuất được cần thiết nhập khẩu để sử dụng trực tiếp cho dự án thuộc chương trình phục vụ đảm bảo an sinh xã hội của Chính phủ được miễn thuế nhập khẩu;"},{"k":"p","t":"b)Hàng hóa trong nước chưa sản xuất được nhập khẩu để khắc phục hậu quả thiên tai, thảm họa, dịch bệnh được miễn thuế nhập khẩu;"},{"k":"p","t":"c)Mặt hàng trầm hương được sản xuất từ cây Dó bầu trồng và mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản được miễn thuế xuất khẩu;"},{"k":"p","t":"d)Sản phẩm nông sản chưa qua chế biến thuộc Danh mục quy định tại Phụ lục VIII ban hành kèm theo Nghị định này do các doanh nghiệp, hộ gia đình, hộ kinh doanh, cá nhân Việt Nam hỗ trợ đầu tư, trồng tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam, nhập khẩu qua các cửa khẩu thuộc địa bàn hoạt động hải quan để làm nguyên liệu sản xuất hàng hoá tại Việt Nam được miễn thuế nhập khẩu."},{"k":"p","t":"Các trường hợp chỉ mua lại sản phẩm hoặc đầu tư tại các tỉnh của Campuchia không tiếp giáp biên giới với Việt Nam không được miễn thuế nhập khẩu theo quy định tại điểm này;"},{"k":"p","t":"đ) Hàng hoá xuất khẩu, nhập khẩu trong các trường hợp đặc biệt khác được Thủ tướng Chính phủ quyết định miễn thuế xuất khẩu, thuế nhập khẩu từng trường hợp cụ thể trên cơ sở đề nghị của Bộ Tài chính."},{"k":"p","t":"5. Hồ sơ đề nghị miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu trong các trường hợp đặc biệt khác, gồm:"},{"k":"p","t":"a) Công văn đề nghị miễn thuế xuất khẩu, thuế nhập khẩu của bộ, cơ quan ngang bộ, Ủy ban nhân dân cấp tỉnh, thành phố hoặc tổ chức, cá nhân, trong đó nêu rõ lý do, số lượng, chủng loại và trị giá hàng hoá, số tiền thuế đề nghị được miễn thuế: 01 bản chính;"},{"k":"p","t":"b)Danh mục hàng hóa xuất khẩu, nhập khẩu đề nghị được miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 04 Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính."},{"k":"p","t":"7. Thủ tục miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác:"},{"k":"p","t":"Người nộp thuế nộp hồ sơ đề nghị miễn thuế theo quy định tại khoản 3, khoản 4, khoản 5 Điều này cho Bộ Tài chính. Trong thời hạn 30 ngày kể từ ngày nhận đủ hồ sơ đề nghị miễn thuế, Bộ Tài chính thẩm định hồ sơ đề nghị miễn thuế và báo cáo Thủ tướng Chính phủ xem xét quyết định kèm theo Danh mục hàng hóa đề nghị miễn thuế. Đối với trường hợp đặc biệt khác cần xin ý kiến các bộ, ngành liên quan, thời hạn thẩm định hồ sơ có thể kéo dài nhưng không quá 40 ngày kể từ ngày nhận đủ hồ sơ đề nghị miễn thuế. Trong thời hạn 15 ngày kể từ ngày nhận được văn bản thẩm định của Bộ Tài chính, Thủ tướng Chính phủ có quyết định miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 23 Phụ lục VII ban hành kèm theo Nghị định này hoặc có văn bản không đồng ý miễn thuế gửi cơ quan, tổ chức, cá nhân đề nghị miễn thuế."},{"k":"p","t":"Căn cứ Quyết định miễn thuế của Thủ tướng Chính phủ, cơ quan hải quan nơi làm thủ tục xuất khẩu, nhập khẩu hàng hóa thực hiện miễn thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"8. Hồ sơ, thủ tục miễn thuế xuất khẩu đối với mặt hàng trầm hương được sản xuất từ cây Dó bầu trồng và mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản:"},{"k":"p","t":"Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này. Đối với mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản, người nộp thuế nộp thêm các chứng từ sau:"},{"k":"p","t":"a)Giấy chứng nhận đăng ký trại nuôi sinh sản động vật hoang dã do cơ quan Kiểm lâm địa phương hoặc cơ quan do Bộ Nông nghiệp và Phát triển nông thôn chỉ định cấp: 01 bản chụp, xuất trình bản chính trong lần xuất khẩu đầu tiên để đối chiếu;"},{"k":"p","t":"b)Giấy xác nhận số lượng trăn được giết mổ có nguồn gốc từ gây nuôi sinh sản do cơ quan Kiểm lâm địa phương xác nhận mỗi lần làm thủ tục xuất khẩu: 01 bản chụp, xuất trình bản chính để đối chiếu."},{"k":"p","t":"9.Thủ tục miễn thuế đối với sản phẩm nông sản chưa qua chế biến do phía Việt Nam hỗ trợ đầu tư, trồng tại Campuchia nhập khẩu về nước:"},{"k":"p","t":"a)Hàng năm, người nộp thuế thông báo Danh mục hàng hoá nhập khẩu miễn thuế thông qua Hệ thống xử lý dữ liệu điện tử cho Cục Hải quan tỉnh tiếp giáp biên giới Campuchia. Trường hợp thông báo Danh mục miễn thuế bằng giấy, người nộp thuế thông báo cho Cục Hải quan tỉnh tiếp giáp biên giới Campuchia theo quy định tại Điều 30 Nghị định này."},{"k":"p","t":"Ngoài hồ sơ thông báo Danh mục hàng hoá nhập khẩu miễn thuế theo quy định tại khoản 3 Điều 30 Nghị định này, người nộp thuế là doanh nghiệp nộp thêm các chứng từ sau:"},{"k":"p","t":"Văn bản xác nhận cho phép đầu tư của cơ quan có thẩm quyền tại Campuchia nơi doanh nghiệp Việt Nam đầu tư: 01 bản chụp kèm 01 bản dịch tiếng Việt có đóng dấu xác nhận của doanh nghiệp;"},{"k":"p","t":"Hợp đồng hoặc Thoả thuận ký kết với phía Campuchia về việc hỗ trợ đầu tư, trồng và nhận lại nông sản, trong đó ghi rõ số tiền, hàng đầu tư vào từng lĩnh vực và tương ứng là số lượng, chủng loại, trị giá từng loại nông sản sẽ thu hoạch được: 01 bản chụp và xuất trình bản chính để đối chiếu;"},{"k":"p","t":"Chứng từ liên quan đến việc hỗ trợ đầu tư, trồng nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam (nếu có): 01 bản chụp và xuất trình bản chính trong lần nhập khẩu đầu tiên để đối chiếu."},{"k":"p","t":"b)Trên cơ sở Danh mục hàng hoá nhập khẩu miễn thuế đã thông báo cho cơ quan hải quan, người nộp thuế thực hiện thủ tục miễn thuế đối với hàng hoá nhập khẩu theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"Cơ quan hải quan căn cứ hồ sơ thông báo Danh mục miễn thuế, danh sách hộ gia đình, hộ kinh doanh, cá nhân hỗ trợ đầu tư, trồng sản phẩm nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam do Ủy ban nhân dân cấp tỉnh nơi hộ gia đình, hộ kinh doanh, cá nhân cư trú công bố hàng năm, kiểm tra, đối chiếu với hàng hoá thực tế nhập khẩu để xử lý miễn thuế nhập khẩu cho từng lô hàng nhập khẩu."},{"k":"p","t":"Ủy ban nhân dân các tỉnh tiếp giáp biên giới Việt Nam - Campuchia công bố danh sách hộ gia đình, hộ kinh doanh, cá nhân cư trú tại tỉnh có hoạt động đầu tư, trồng sản phẩm nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam hàng năm theo Mẫu số 11 Phụ lục VII ban hành kèm theo Nghị định này trên trang thông tin điện tử của Ủy ban nhân dân tỉnh; đồng thời gửi Cục Hải quan tỉnh và các Chi cục Hải quan quản lý cửa khẩu thuộc các tỉnh tiếp giáp biên giới Campuchia. Trường hợp có sự thay đổi các tiêu chí trong văn bản đã công bố phải ban hành văn bản điều chỉnh cho phù hợp.”"},{"k":"p","t":"10.Bổ sung Điều 28a như sau:"},{"k":"p","t":"“Điều 28a. Điều kiện kiểm tra, giám sát hải quan và áp dụng chính sách thuế đối với doanh nghiệp chế xuất là khu phi thuế quan"},{"k":"p","t":"1.Điều kiện kiểm tra, giám sát hải quan đối với doanh nghiệp chế xuất là khu phi thuế quan phải đáp ứng đủ các điều kiện sau:"},{"k":"p","t":"a)Có hàng rào cứng ngăn cách với khu vực bên ngoài; có cổng/cửa ra, vào đảm bảo việc đưa hàng hóa ra, vào doanh nghiệp chế xuất chỉ qua cổng/cửa."},{"k":"p","t":"b)Có hệ thống ca-mê-ra quan sát được các vị trí tại cổng/cửa ra, vào và các vị trí lưu giữ hàng hóa ở tất cả các thời điểm trong ngày (24/24 giờ, bao gồm cả ngày nghỉ, ngày lễ); dữ liệu hình ảnh ca-mê-ra được kết nối trực tuyến với cơ quan hải quan quản lý doanh nghiệp và được lưu giữ tại doanh nghiệp chế xuất tối thiểu 12 tháng."},{"k":"p","t":"Tổng cục trưởng Tổng cục Hải quan có trách nhiệm ban hành định dạng thông điệp dữ liệu trao đổi giữa cơ quan hải quan và doanh nghiệp về hệ thống ca-mê-ra giám sát để thực hiện theo quy định tại điểm b khoản này."},{"k":"p","t":"c)Có phần mềm quản lý hàng hóa nhập khẩu thuộc đối tượng không chịu thuế của doanh nghiệp chế xuất để báo cáo quyết toán nhập- xuất- tồn về tình hình sử dụng hàng hóa nhập khẩu theo quy định pháp luật về hải quan."},{"k":"p","t":"2. Thủ tục kiểm tra, xác nhận khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan đối với doanh nghiệp chế xuất, nhà đầu tư thực hiện dự án đầu tư đăng ký doanh nghiệp chế xuất:"},{"k":"p","t":"a)Trường hợp nhà đầu tư đề nghị cấp Giấy chứng nhận đăng ký đầu tư dự án đầu tư mới hoặc xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư:"},{"k":"p","t":"Nhà đầu tư nộp 01 bản cam kết về khả năng đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này theo Mẫu số 24 Phụ lục VII ban hành kèm theo Nghị định này cho cơ quan đăng ký đầu tư kèm hồ sơ đề nghị cấp Giấy chứng nhận đăng ký đầu tư hoặc hồ sơ đề nghị xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư."},{"k":"p","t":"Cơ quan đăng ký đầu tư có văn bản lấy ý kiến của cơ quan hải quan có thẩm quyền về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều 30 Nghị định số 82/2018/NĐ-CP ngày 22 tháng 5 năm 2018 của Chính phủ quy định về quản lý khu công nghiệp và khu kinh tế (sau đây gọi là Nghị định số 82/2018/NĐ-CP) và văn bản sửa đổi, bổ sung, thay thế (nếu có) và quy định tại Nghị định này kèm theo hồ sơ đề nghị cấp Giấy chứng nhận đăng ký đầu tư hoặc hồ sơ đề nghị xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư (bản chụp) và văn bản cam kết của doanh nghiệp (01 bản chính)."},{"k":"p","t":"Trong thời hạn 03 ngày làm việc kể từ ngày nhận được văn bản của cơ quan đăng ký đầu tư, căn cứ hồ sơ đề nghị cấp Giấy chứng nhận đăng ký đầu tư hoặc hồ sơ đề nghị xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư và văn bản cam kết của doanh nghiệp, cơ quan hải quan xác nhận về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan theo cam kết của doanh nghiệp trên Mẫu số 24 Phụ lục VII ban hành kèm theo Nghị định này gửi cho cơ quan đăng ký đầu tư."},{"k":"p","t":"b)Trường hợp nhà đầu tư đề nghị cấp, điều chỉnh Giấy chứng nhận đăng ký đầu tư (nếu có) hoặc xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư để thực hiện dự án đầu tư mở rộng:"},{"k":"p","t":"Nhà đầu tư nộp 01 bản cam kết về khả năng đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này theo Mẫu số 24 Phụ lục VII ban hành kèm theo Nghị định này đối với phần dự án đầu tư mở rộng cho cơ quan đăng ký đầu tư kèm hồ sơ đề nghị cấp, điều chỉnh Giấy chứng nhận đăng ký đầu tư (nếu có) hoặc hồ sơ đề nghị xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư."},{"k":"p","t":"Cơ quan đăng ký đầu tư có văn bản lấy ý kiến của cơ quan hải quan có thẩm quyền về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều 30 Nghị định số 82/2018/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có) và quy định tại Nghị định này đối với phần dự án đầu tư mở rộng kèm theo hồ sơ đề nghị cấp Giấy chứng nhận đăng ký đầu tư hoặc hồ sơ đề nghị xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư (bản chụp) và văn bản cam kết của doanh nghiệp (01 bản chính)."},{"k":"p","t":"Trong thời hạn 03 ngày làm việc kể từ ngày nhận được văn bản của cơ quan đăng ký đầu tư, căn cứ hồ sơ đề nghị cấp Giấy chứng nhận đăng ký đầu tư hoặc hồ sơ đề nghị xác nhận bằng văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư và văn bản cam kết của doanh nghiệp, cơ quan hải quan xác nhận về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan theo cam kết của doanh nghiệp trên Mẫu số 24 Phụ lục VII ban hành kèm theo Nghị định này gửi cho cơ quan đăng ký đầu tư."},{"k":"p","t":"c)Trường hợp đăng ký chuyển đổi từ doanh nghiệp không phải là doanh nghiệp chế xuất sang doanh nghiệp chế xuất:"},{"k":"p","t":"Căn cứ đề nghị của nhà đầu tư, cơ quan đăng ký đầu tư có văn bản lấy ý kiến của cơ quan hải quan có thẩm quyền về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều 30 Nghị định số 82/2018/NĐ-CP và văn bản sửa đổi, bổ sung, thay thế (nếu có) và quy định tại Nghị định này."},{"k":"p","t":"Trong thời hạn tối đa 10 ngày làm việc kể từ ngày nhận được văn bản của cơ quan đăng ký đầu tư, cơ quan hải quan có trách nhiệm kiểm tra thực tế điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này và có văn bản gửi cho cơ quan đăng ký đầu tư về việc đáp ứng hoặc không đáp ứng điều kiện kiểm tra, giám sát hải quan theo Mẫu số 26 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"3. Nhà đầu tư thực hiện dự án đầu tư (bao gồm cả dự án đầu tư mới và dự án đầu tư mở rộng) được áp dụng chính sách thuế đối với khu phi thuế quan theo quy định của Luật Thuế xuất khẩu, thuế nhập khẩu kể từ thời điểm là doanh nghiệp chế xuất nêu tại Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư."},{"k":"p","t":"Việc kiểm tra thực tế điều kiện kiểm tra, giám sát hải quan để áp dụng chính sách thuế đối với khu phi thuế quan thực hiện theo quy định tại khoản 4, khoản 5, khoản 6 Điều này."},{"k":"p","t":"4. Kiểm tra thực tế điều kiện kiểm tra, giám sát hải quan đối với doanh nghiệp chế xuất (bao gồm doanh nghiệp có dự án đầu tư mới và dự án đầu tư mở rộng):"},{"k":"p","t":"a) Chậm nhất 30 ngày trước thời điểm doanh nghiệp chế xuất chính thức đi vào hoạt động nêu trong Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh (nếu có) hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư hoặc văn bản xác nhận của cơ quan đăng ký đầu tư về việc thời điểm doanh nghiệp chế xuất chính thức đi vào hoạt động chậm tiến độ so với thời điểm nêu tại các văn bản kể trên, doanh nghiệp chế xuất gửi thông báo đã đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này theo Mẫu số 25 Phụ lục VII ban hành kèm theo Nghị định này cho Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất."},{"k":"p","t":"Trường hợp Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư, không nêu thời điểm doanh nghiệp chế xuất chính thức đi vào hoạt động thì thời điểm doanh nghiệp chế xuất chính thức đi vào hoạt động là thời điểm doanh nghiệp bắt đầu sản xuất chính thức theo thông báo của doanh nghiệp với cơ quan hải quan."},{"k":"p","t":"b)Trong thời hạn tối đa 10 ngày làm việc kể từ ngày nhận được thông báo của doanh nghiệp chế xuất, Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất hoàn thành kiểm tra việc đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này và gửi văn bản xác nhận cho doanh nghiệp chế xuất theo Mẫu số 26 Phụ lục VII ban hành kèm theo Nghị định này về việc đáp ứng hoặc không đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này. Trường hợp doanh nghiệp chế xuất nhận được văn bản xác nhận không đáp ứng các điều kiện kiểm tra, giám sát hải quan, doanh nghiệp tiếp tục hoàn chỉnh các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này nhưng không quá 01 năm kể từ ngày Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất cấp văn bản xác nhận lần đầu."},{"k":"p","t":"c)Khi doanh nghiệp chế xuất đã hoàn chỉnh điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này, doanh nghiệp tiếp tục có văn bản gửi Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất theo Mẫu số 25 Phụ lục VII ban hành kèm theo Nghị định này và đề nghị Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất kiểm tra lại các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này. Trong thời hạn tối đa 10 ngày làm việc kể từ ngày nhận được văn bản đề nghị của doanh nghiệp chế xuất, Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất có trách nhiệm hoàn thành kiểm tra lại việc đáp ứng các điều kiện kiểm tra, giám sát hải quan và có văn bản gửi doanh nghiệp chế xuất theo Mẫu số 26 Phụ lục VII ban hành kèm theo Nghị định này về việc đáp ứng hoặc không đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này."},{"k":"p","t":"Doanh nghiệp chế xuất được hoàn chỉnh các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này nhiều lần nhưng không quá thời hạn 01 năm kể từ ngày Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất cấp văn bản xác nhận lần đầu."},{"k":"p","t":"d)Quá thời hạn 01 năm kể từ ngày cấp văn bản xác nhận lần đầu của Chi cục Hải quan, doanh nghiệp chế xuất không thực hiện việc thông báo cho Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất hoặc không đáp ứng các điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này thì không được áp dụng chính sách thuế đối với khu phi thuế quan. Doanh nghiệp phải nộp đủ các loại thuế, tiền chậm nộp, tiền phạt vi phạm đối với hàng hóa nhập khẩu đã được áp dụng chính sách thuế đối với khu phi thuế quan kể từ ngày cấp Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đầu tư điều chỉnh hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư tương ứng với dự án đầu tư mới hoặc phần dự án đầu tư mở rộng không đáp ứng các điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này."},{"k":"p","t":"Trường hợp doanh nghiệp sau đó đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này và có văn bản thông báo cho Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất để thực hiện kiểm tra và xác nhận theo quy định tại điểm c khoản này thì được áp dụng chính sách thuế đối với khu phi thuế quan kể từ ngày Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất có văn bản xác nhận đã đáp ứng điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này."},{"k":"p","t":"5.Kiểm tra thực tế điều kiện kiểm tra, giám sát hải quan đối với doanh nghiệp chế xuất đã được cấp Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh (nếu có) hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư trước ngày Nghị định này có hiệu lực thi hành và đang trong quá trình hoạt động, bao gồm cả các doanh nghiệp chế xuất đã được cơ quan hải quan xác nhận về điều kiện kiểm tra, giám sát hải quan trước ngày Nghị định này có hiệu lực thi hành:"},{"k":"p","t":"a)Trong thời hạn tối đa không quá 01 năm kể từ ngày Nghị định này có hiệu lực thi hành, doanh nghiệp chế xuất phải hoàn thiện các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này. Khi doanh nghiệp chế xuất đã hoàn chỉnh các điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này, doanh nghiệp chế xuất có thông báo gửi Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất theo Mẫu số 25 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"b)Trong thời hạn tối đa 10 ngày làm việc kể từ ngày nhận được thông báo của doanh nghiệp chế xuất, Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất hoàn thành kiểm tra việc đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này và gửi văn bản xác nhận cho doanh nghiệp chế xuất theo Mẫu số 26 Phụ lục VII ban hành kèm theo Nghị định này về việc đáp ứng hoặc không đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này. Trường hợp doanh nghiệp chế xuất nhận được văn bản xác nhận không đáp ứng các điều kiện kiểm tra, giám sát hải quan, doanh nghiệp tiếp tục hoàn chỉnh các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này nhưng không quá 01 năm kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"c)Khi doanh nghiệp chế xuất đã hoàn chỉnh các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này, doanh nghiệp tiếp tục có văn bản gửi Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất theo Mẫu số 25 Phụ lục VII ban hành kèm theo Nghị định này và đề nghị Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất kiểm tra lại các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này. Trong thời hạn tối đa 10 ngày làm việc kể từ ngày nhận được văn bản đề nghị của doanh nghiệp chế xuất, Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất có trách nhiệm hoàn thành kiểm tra lại việc đáp ứng các điều kiện kiểm tra, giám sát hải quan và có văn bản gửi doanh nghiệp chế xuất theo Mẫu số 26 Phụ lục VII ban hành kèm theo Nghị định này về việc đáp ứng hoặc không đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này."},{"k":"p","t":"Doanh nghiệp chế xuất được hoàn chỉnh các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này nhiều lần nhưng không quá thời hạn 01 năm kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"d)Quá thời hạn 01 năm kể từ ngày Nghị định này có hiệu lực thi hành, doanh nghiệp chế xuất quy định tại khoản này không thực hiện thông báo theo Mẫu số 25 Phụ lục VII ban hành kèm theo Nghị định này hoặc không đáp ứng các điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này thì không được áp dụng chính sách thuế đối với khu phi thuế quan kể từ ngày quá thời hạn 01 năm nêu trên."},{"k":"p","t":"Trường hợp doanh nghiệp sau đó đáp ứng các điều kiện kiểm tra, giám sát hải quan quy định tại khoản 1 Điều này và có văn bản thông báo cho Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất để thực hiện kiểm tra và xác nhận theo quy định tại điểm c khoản này thì được áp dụng chính sách thuế đối với khu phi thuế quan kể từ ngày Chi cục Hải quan nơi quản lý doanh nghiệp chế xuất có văn bản xác nhận đã đáp ứng các điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này."},{"k":"p","t":"6.Doanh nghiệp chế xuất đã được cấp Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh (nếu có) hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư trước ngày Nghị định này có hiệu lực thi hành và đang trong quá trình xây dựng, bao gồm cả các doanh nghiệp chế xuất đã được cơ quan hải quan xác nhận về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan trước ngày Nghị định này có hiệu lực thi hành (nếu có) thực hiện kiểm tra thực tế điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 4 Điều này."},{"k":"p","t":"7.Các trường hợp nêu tại khoản 5, khoản 6 Điều này chưa được áp dụng chính sách thuế đối với khu phi thuế quan kể từ thời điểm cấp Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh (nếu có) hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư đến trước thời điểm được cơ quan hải quan có văn bản xác nhận về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều 30 Nghị định số 82/2018/NĐ-CP và quy định tại Nghị định này, sau khi doanh nghiệp đáp ứng các điều kiện kiểm tra, giám sát hải quan theo quy định tại khoản 1 Điều này, doanh nghiệp được xử lý số tiền thuế đã nộp theo quy định về xử lý tiền thuế nộp thừa của pháp luật về quản lý thuế.”"},{"k":"p","t":"11. Khoản 2, khoản 3, khoản 4 Điều 29 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 29. Miễn thuế đối với hàng hóa có trị giá tối thiểu, hàng hóa gửi qua dịch vụ bưu chính, chuyển phát nhanh"},{"k":"p","t":"2. Hàng hóa nhập khẩu gửi qua dịch vụ bưu chính, chuyển phát nhanh có trị giá hải quan từ 1.000.000 đồng Việt Nam trở xuống hoặc có số tiền thuế phải nộp từ 100.000 đồng Việt Nam trở xuống được miễn thuế nhập khẩu."},{"k":"p","t":"Trường hợp hàng hóa có trị giá hải quan vượt quá 1.000.000 đồng Việt Nam hoặc có tổng số tiền thuế phải nộp trên 100.000 đồng Việt Nam thì phải nộp thuế nhập khẩu đối với toàn bộ lô hàng."},{"k":"p","t":"3. Hàng hóa có tổng trị giá hải quan từ 500.000 đồng Việt Nam trở xuống hoặc có tổng số tiền thuế xuất khẩu, nhập khẩu phải nộp từ 50.000 đồng Việt Nam trở xuống cho một lần xuất khẩu, nhập khẩu được miễn thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"Quy định tại khoản này không áp dụng đối với hàng hóa là quà biếu, quà tặng, hàng hóa mua bán trao đổi của cư dân biên giới và hàng hóa gửi qua dịch vụ bưu chính, chuyển phát nhanh."},{"k":"p","t":"4. Hồ sơ miễn thuế: Hồ sơ hải quan thực hiện theo quy định của pháp luật về hải quan.”"},{"k":"p","t":"12. Bổ sung Điều 29a như sau:"},{"k":"p","t":"“Điều 29a. Miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế"},{"k":"p","t":"1.Hàng hóa xuất khẩu, nhập khẩu được miễn thuế xuất khẩu, thuế nhập khẩu theo điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"2. Cơ sở để xác định hàng hóa được miễn thuế xuất khẩu, thuế nhập khẩu"},{"k":"p","t":"a) Chủng loại, định lượng hàng hóa được quy định tại điều ước quốc tế;"},{"k":"p","t":"b)Văn bản xác nhận của cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế, cơ quan quản lý chuyên ngành trong trường hợp điều ước quốc tế không quy định chủng loại, định lượng miễn thuế."},{"k":"p","t":"Trường hợp cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế không phải là cơ quan quản lý chuyên ngành thì căn cứ theo văn bản xác nhận của cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế."},{"k":"p","t":"3.Thủ tục xác nhận trong trường hợp điều ước quốc tế không quy định chủng loại, định lượng hàng hóa miễn thuế"},{"k":"p","t":"a)Tổ chức, cá nhân sử dụng hàng hóa miễn thuế có công văn đề nghị cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế, cơ quan quản lý chuyên ngành xác nhận chủng loại, định lượng hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 13 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"b)Trong thời hạn 15 ngày kể từ ngày nhận được công văn đề nghị, cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế, cơ quan quản lý chuyên ngành có văn bản xác nhận chủng loại, định lượng hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 14 Phụ lục VII ban hành kèm theo Nghị định này gửi tổ chức, cá nhân hoặc có văn bản từ chối trong trường hợp hàng hóa đề nghị miễn thuế không phù hợp với điều ước quốc tế."},{"k":"p","t":"4. Thông báo Danh mục miễn thuế"},{"k":"p","t":"Trước khi đăng ký tờ khai hải quan hàng hóa xuất khẩu, nhập khẩu miễn thuế đầu tiên, tổ chức, cá nhân thực hiện thông báo Danh mục hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu cho cơ quan hải quan (gọi tắt là Danh mục miễn thuế)."},{"k":"p","t":"a) Hồ sơ thông báo Danh mục miễn thuế"},{"k":"p","t":"- Công văn thông báo Danh mục miễn thuế theo Mẫu số 05 Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"-Danh mục miễn thuế gửi qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan. Trường hợp hệ thống gặp sự cố, tổ chức, cá nhân nộp 02 bản chính Danh mục miễn thuế bản giấy theo Mẫu số 06 và 01 bản chính Phiếu theo dõi trừ lùi theo Mẫu số 07 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"Trường hợp máy móc, thiết bị phải xuất khẩu, nhập khẩu làm nhiều chuyến, không trừ lùi được số lượng tại thời điểm xuất khẩu, nhập khẩu (sau đây gọi là tổ hợp, dây chuyền), tổ chức, cá nhân nộp 02 bản chính Danh mục miễn thuế (bản giấy) theo Mẫu số 06 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"Danh mục miễn thuế được xây dựng thống nhất với điều ước quốc tế hoặc văn bản xác nhận chủng loại, định lượng miễn thuế của cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế, cơ quan quản lý chuyên ngành;"},{"k":"p","t":"-Điều ước quốc tế đối với trường hợp điều ước quốc tế quy định chủng loại, định lượng hàng hóa miễn thuế: 01 bản chụp;"},{"k":"p","t":"-Văn bản xác nhận chủng loại, định lượng hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu quy định tại điểm b khoản 3 Điều này: 01 bản chụp, xuất trình bản chính để đối chiếu."},{"k":"p","t":"b)Địa điểm thông báo, sửa đổi Danh mục miễn thuế; trách nhiệm của cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế; trách nhiệm của tổ chức, cá nhân thông báo Danh mục miễn thuế thực hiện theo quy định tại khoản 4, khoản 5, khoản 6 và khoản 7 Điều 30 Nghị định này."},{"k":"p","t":"c)Trường hợp tổ chức, cá nhân không trực tiếp xuất khẩu, nhập khẩu hàng hóa miễn thuế mà nhà thầu chính hoặc nhà thầu phụ hoặc công ty cho thuê tài chính xuất khẩu, nhập khẩu hàng hóa thì nhà thầu, công ty cho thuê tài chính được sử dụng Danh mục miễn thuế do tổ chức, cá nhân đã thông báo với cơ quan hải quan."},{"k":"p","t":"5.Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này.”"},{"k":"p","t":"13. Điểm b, điểm k khoản 3, điểm đ khoản 7 Điều 30 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 30. Thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu đối với các trường hợp thông báo Danh mục miễn thuế"},{"k":"p","t":"3. Hồ sơ thông báo Danh mục miễn thuế"},{"k":"p","t":"b) Danh mục miễn thuế gửi qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan. Trường hợp hệ thống gặp sự cố, chủ dự án nộp 02 bản chính Danh mục miễn thuế bản giấy theo Mẫu số 06 và 01 bản chính Phiếu theo dõi trừ lùi theo Mẫu số 07 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"Trường hợp máy móc, thiết bị phải nhập khẩu làm nhiều chuyến, không trừ lùi được số lượng tại thời điểm nhập khẩu (sau đây gọi là tổ hợp, dây chuyền), chủ dự án nộp 02 bản chính Danh mục miễn thuế (bản giấy) theo Mẫu số 06 Phụ lục VII ban hành kèm theo Nghị định này;"},{"k":"p","t":"k) Hợp đồng thuê chế tạo máy móc, thiết bị hoặc chế tạo linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị đối với hàng hoá quy định tại điểm a khoản 11, điểm b khoản 15, điểm a khoản 16 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu: 01 bản chụp."},{"k":"p","t":"Trường hợp các chứng từ quy định tại khoản này được cơ quan quản lý nhà nước chuyên ngành gửi dưới dạng điện tử thông qua cổng thông tin một cửa quốc gia thì chủ dự án không phải nộp khi thông báo Danh mục miễn thuế cho cơ quan hải quan."},{"k":"p","t":"7. Trách nhiệm của chủ dự án:"},{"k":"p","t":"đ) Thông báo tình hình sử dụng hàng hóa nhập khẩu miễn thuế theo quy định tại Điều 31a Nghị định này.”"},{"k":"p","t":"14. Sửa đổi điểm e, bổ sung điểm h khoản 2, điểm c khoản 3 và bổ sung khoản 5 Điều 31 như sau:"},{"k":"p","t":"“Điều 31. Hồ sơ, thủ tục miễn thuế khi làm thủ tục hải quan"},{"k":"p","t":"2.Ngoài hồ sơ quy định tại khoản 1 Điều này, tùy từng trường hợp, người nộp thuế nộp thêm một trong các chứng từ sau:"},{"k":"p","t":"e)Văn bản xác nhận của Bộ Khoa học và Công nghệ đối với phương tiện vận tải quy định tại khoản 11, khoản 15, khoản 16 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu: 01 bản chính;"},{"k":"p","t":"h) Quyết định miễn thuế của Thủ tướng Chính phủ đối với trường hợp quy định tại điểm a, b, đ khoản 1 Điều 28 Nghị định này: 01 bản chụp, xuất trình bản chính để đối chiếu."},{"k":"p","t":"3. Thủ tục miễn thuế:"},{"k":"p","t":"c)Hệ thống xử lý dữ liệu điện tử tự động trừ lùi số lượng hàng hóa xuất khẩu, nhập khẩu tương ứng với số lượng hàng hóa trong Danh mục miễn thuế."},{"k":"p","t":"Trường hợp thông báo Danh mục miễn thuế bản giấy, cơ quan hải quan thực hiện cập nhật và trừ lùi số lượng hàng hóa đã xuất khẩu, nhập khẩu tương ứng với số lượng hàng hóa trong Danh mục miễn thuế."},{"k":"p","t":"Trường hợp nhập khẩu hàng hóa miễn thuế theo tổ hợp, dây chuyền, người nộp thuế phải làm thủ tục hải quan tại cơ quan hải quan nơi lắp đặt máy móc, thiết bị. Tại thời điểm đăng ký tờ khai hải quan, người nộp thuế kê khai chi tiết hàng hóa trên tờ khai hải quan. Trường hợp không kê khai chi tiết được trên tờ khai hải quan, người nộp thuế lập bảng kê chi tiết về hàng hóa nhập khẩu theo các chỉ tiêu thông tin quy định tại Mẫu số 04 Phụ lục VIIa ban hành kèm theo Nghị định này thông qua Hệ thống xử lý dữ liệu điện tử hoặc theo Mẫu số 15 Phụ lục VII ban hành kèm theo Nghị định này và đính kèm tờ khai hải quan. Trong thời hạn 15 ngày kể từ ngày kết thúc việc nhập khẩu lô hàng cuối cùng của mỗi tổ hợp, dây chuyền, người nộp thuế có trách nhiệm thông báo cho cơ quan hải quan nơi thông báo Danh mục miễn thuế theo các chỉ tiêu thông tin quy định tại Mẫu số 05 Phụ lục VIIa ban hành kèm theo Nghị định này thông qua Hệ thống xử lý dữ liệu điện tử hoặc theo Mẫu số 16 Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"5.Thủ tục miễn thuế nhập khẩu đối với các trường hợp đặc thù"},{"k":"p","t":"a)Người nộp thuế được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu để tạo tài sản cố định cho dự án theo quy định tại Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu nhưng không nhập khẩu hàng hóa mà được phép tiếp nhận hàng hóa đã được miễn thuế nhập khẩu từ tổ chức, cá nhân khác chuyển nhượng tại Việt Nam thì người nộp thuế thực hiện đăng ký tờ khai hải quan mới đối với hàng hóa nhận chuyển nhượng và được miễn thuế nhập khẩu với điều kiện giá chuyển nhượng không bao gồm thuế nhập khẩu. Tổ chức, cá nhân chuyển nhượng hàng hoá không phải nộp lại số thuế nhập khẩu đã được miễn."},{"k":"p","t":"b)Tổ chức, cá nhân nhập khẩu ủy thác hoặc trúng thầu nhập khẩu hàng hóa để cung cấp cho đối tượng quy định tại Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu ủy thác, trúng thầu với điều kiện giá cung cấp hàng hóa theo hợp đồng ủy thác hoặc giá trúng thầu theo quyết định trúng thầu không bao gồm thuế nhập khẩu."},{"k":"p","t":"c)Công ty cho thuê tài chính nhập khẩu hàng hóa để cung cấp cho đối tượng quy định tại Điều 14, Điều 16, Điều 17, Điều 19, Điều 25 Nghị định này thuê tài chính được miễn thuế nhập khẩu với điều kiện giá cho thuê không bao gồm thuế nhập khẩu. Trường hợp hàng hoá nhập khẩu cho thuê tài chính không sử dụng đúng mục đích miễn thuế thì công ty cho thuê tài chính phải đăng ký tờ khai hải quan mới, nộp thuế tại thời điểm đăng ký tờ khai mới. Trường hợp không đăng ký tờ khai hải quan mới, cơ quan hải quan thực hiện ấn định thuế theo quy định."},{"k":"p","t":"d)Trường hợp chuyển nhượng toàn bộ hoặc một phần dự án thuộc đối tượng ưu đãi đầu tư cho tổ chức, cá nhân khác, chủ dự án thông báo các chỉ tiêu thông tin quy định tại Mẫu số 06 Phụ lục VIIa ban hành kèm theo Nghị định này thông qua Hệ thống xử lý dữ liệu điện tử hoặc theo Mẫu số 17 Phụ lục VII ban hành kèm theo Nghị định này cho cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế trước khi chuyển nhượng dự án và không phải nộp lại số tiền thuế nhập khẩu đã được miễn đối với hàng hóa chuyển nhượng theo dự án. Tổ chức, cá nhân nhận chuyển nhượng dự án phải đăng ký tờ khai hải quan mới đối với hàng hóa nhận chuyển nhượng và được miễn thuế nhập khẩu nếu đáp ứng đủ các điều kiện sau: Tại thời điểm chuyển nhượng, dự án đầu tư vẫn thuộc đối tượng được hưởng ưu đãi đầu tư; giá chuyển nhượng hàng hóa không bao gồm thuế nhập khẩu; tổ chức, cá nhân nhận chuyển nhượng là chủ đầu tư của dự án chuyển nhượng được ghi tại Giấy chứng nhận đầu tư điều chỉnh hoặc văn bản có giá trị tương đương."},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế của chủ dự án chuyển nhượng dừng sử dụng Danh mục miễn thuế trên Hệ thống hoặc thu hồi Danh mục miễn thuế bản giấy và Phiếu theo dõi trừ lùi của chủ dự án chuyển nhượng; tiếp nhận Danh mục miễn thuế đối với số lượng hàng hóa chủ dự án chuyển nhượng chưa nhập khẩu hết."},{"k":"p","t":"Trường hợp chuyển nhượng toàn bộ dự án nhưng chủ dự án chưa nhập khẩu hết hàng hóa theo Danh mục miễn thuế hoặc chuyển nhượng một phần dự án nhưng chủ dự án chưa nhập khẩu hết hàng hóa theo Danh mục miễn thuế thuộc phần dự án chuyển nhượng, tổ chức, cá nhân nhận chuyển nhượng thông báo Danh mục miễn thuế đối với hàng hóa chưa nhập khẩu hết thuộc dự án hoặc phần dự án chuyển nhượng."},{"k":"p","t":"Trường hợp chuyển nhượng một phần dự án mà chủ dự án chưa nhập khẩu hết hàng hóa theo Danh mục miễn thuế thuộc phần dự án tiếp tục thực hiện, chủ dự án chuyển nhượng thực hiện thông báo Danh mục miễn thuế đối với số lượng hàng hóa chưa nhập khẩu hết thuộc phần dự án tiếp tục thực hiện."},{"k":"p","t":"đ) Hàng hóa nhập khẩu đã được miễn thuế nhập khẩu để tạo tài sản cố định của dự án ưu đãi đầu tư được sử dụng cho dự án ưu đãi đầu tư khác của cùng chủ dự án thì chủ đầu tư đăng ký tờ khai hải quan mới đối với số hàng hóa điều chuyển và được miễn thuế nhập khẩu nếu đáp ứng các điều kiện sau: Giá của hàng hóa nhập khẩu được điều chuyển không bao gồm thuế nhập khẩu; phù hợp với lĩnh vực, quy mô của dự án ưu đãi đầu tư tiếp nhận; đáp ứng quy định về tài sản cố định; có tên trong Danh mục miễn thuế của dự án tiếp nhận đã thông báo cho cơ quan hải quan."},{"k":"p","t":"Hàng hóa tiếp nhận được trừ lùi trên Danh mục miễn thuế của dự án tiếp nhận đã thông báo với cơ quan hải quan. Chủ dự án điều chuyển được nhập khẩu bổ sung số lượng hàng hóa thay thế hàng hóa đã điều chuyển. Chủ dự án điều chuyển thực hiện thông báo bổ sung Danh mục miễn thuế theo quy định tại khoản 5 Điều 30 Nghị định này."},{"k":"p","t":"e) Hàng hoá nhập khẩu thuộc các trường hợp quy định tại Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu (trừ trường hợp quy định tại khoản 6, khoản 7 Điều 16) buộc phải tiêu hủy và thực tế đã tiêu huỷ theo quy định của pháp luật được miễn thuế nhập khẩu. Việc tiêu hủy phải tuân thủ theo các quy định của pháp luật có liên quan và có sự giám sát trực tiếp của công chức hải quan. Trước khi tiêu hủy, người nộp thuế phải có văn bản thông báo cho cơ quan hải quan nêu rõ lý do tiêu hủy, tên gọi hàng hóa tiêu hủy, thời gian và địa điểm tiêu hủy (01 bản chính); văn bản cho phép tiêu hủy của cơ quan quản lý chuyên ngành hoặc Sở Tài nguyên và Môi trường (01 bản chụp và xuất trình bản chính để đối chiếu)."},{"k":"p","t":"Trong thời hạn 30 ngày kể từ ngày tiêu hủy, người nộp thuế phải nộp cho cơ quan hải quan nơi đăng ký tờ khai nhập khẩu: Biên bản xác nhận kết quả tiêu hủy phải có họ tên, chữ ký, dấu của giám đốc doanh nghiệp có hàng hóa tiêu hủy; họ tên, chữ ký của công chức hải quan giám sát việc tiêu hủy, những người được giám đốc doanh nghiệp giao thực hiện và giám sát việc tiêu hủy; chữ ký của đại diện của cơ quan nhà nước liên quan (nếu có) (01 bản chụp và xuất trình bản chính để đối chiếu).”"},{"k":"p","t":"15. Bổ sung Điều 31a như sau:"},{"k":"p","t":"“Điều 31a. Thông báo, kiểm tra việc sử dụng hàng hóa miễn thuế nhập khẩu"},{"k":"p","t":"1. Thông báo việc sử dụng hàng hóa miễn thuế nhập khẩu"},{"k":"p","t":"a)Đối tượng thông báo:"},{"k":"p","t":"Chủ dự án có trách nhiệm thông báo tình hình sử dụng hàng hóa miễn thuế theo các chỉ tiêu thông tin quy định tại Mẫu số 07 Phụ lục VIIa ban hành kèm theo Nghị định này thông qua Hệ thống xử lý dữ liệu điện tử hoặc theo Mẫu số 18 Phụ lục VII ban hành kèm theo Nghị định này cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế đối với các trường hợp phải thông báo Danh mục miễn thuế với cơ quan hải quan."},{"k":"p","t":"b)Thời điểm và thời hạn thông báo:"},{"k":"p","t":"Định kỳ hàng năm, trong thời hạn 90 ngày kể từ ngày kết thúc năm tài chính, tổ chức, cá nhân thông báo tình hình sử dụng hàng hóa miễn thuế trong năm tài chính cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế cho đến khi toàn bộ dự án chấm dứt hoạt động hoặc hàng hóa đã tái xuất khẩu ra khỏi Việt Nam hoặc khi hàng hóa thay đổi mục đích sử dụng miễn thuế, chuyển tiêu thụ nội địa, đã được tiêu hủy."},{"k":"p","t":"Đối với các trường hợp miễn thuế nhập khẩu quy định tại Điều 15, Điều 23 Nghị định này, việc thông báo tình hình sử dụng hàng hóa miễn thuế phải được thực hiện hàng năm trong thời hạn 05 năm kể từ ngày dự án chính thức hoạt động. Trong thời hạn 30 ngày kể từ ngày kết thúc thời hạn 05 năm, chủ dự án thực hiện đăng ký tờ khai hải quan mới và kê khai, nộp thuế đối với nguyên liệu, vật tư, linh kiện nhập khẩu đã miễn thuế chưa sử dụng hết trong thời hạn 05 năm."},{"k":"p","t":"2. Trường hợp nhập khẩu nguyên liệu, vật tư dùng để chế tạo quy định tại điểm a khoản 11, điểm b khoản 15, điểm a khoản 16 Điều 16 Luật Thuế xuất khẩ
