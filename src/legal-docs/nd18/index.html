u, thuế nhập khẩu, chủ dự án thực hiện như sau:"},{"k":"p","t":"a)Trong thời hạn 30 ngày kể từ ngày hoàn thiện việc chế tạo máy móc, thiết bị hoặc linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị, chủ dự án thông báo cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế về việc hoàn thành chế tạo theo các chỉ tiêu thông tin quy định tại Mẫu số 08 Phụ lục VIIa ban hành kèm theo Nghị định này thông qua Hệ thống xử lý dữ liệu điện tử hoặc theo Mẫu số 19 Phụ lục VII ban hành kèm theo Nghị định này. Trường hợp không sử dụng hết, trong thời hạn 30 ngày kể từ ngày hoàn thiện việc chế tạo, chủ dự án phải đăng ký tờ khai hải quan mới và kê khai nộp thuế tại thời điểm đăng ký tờ khai hải quan mới."},{"k":"p","t":"b)Trong thời hạn 60 ngày kể từ ngày nhận được thông báo của chủ dự án nêu tại điểm a khoản này, cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế thực hiện kiểm tra tại trụ sở của chủ dự án để xác định lượng hàng hóa nhập khẩu miễn thuế đã sử dụng đúng mục đích chế tạo máy móc, thiết bị hoặc linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị. Trường hợp cơ quan hải quan phát hiện chủ dự án không sử dụng hết hoặc thay đổi mục đích sử dụng hàng hóa miễn thuế nhưng không đăng ký tờ khai hải quan mới thì thực hiện ấn định thuế theo quy định."},{"k":"p","t":"c)Chủ dự án thực hiện thông báo tình hình sử dụng hàng hóa nhập khẩu để chế tạo theo quy định tại khoản 1 Điều này. Kể từ năm hoàn thiện việc chế tạo, chủ dự án thực hiện thông báo việc sử dụng đối với sản phẩm sau chế tạo."},{"k":"p","t":"3.Trường hợp nhập khẩu miễn thuế theo tổ hợp, dây chuyền phải nhập khẩu làm nhiều chuyến, không trừ lùi theo số lượng hàng hóa tại thời điểm đăng ký tờ khai hải quan, ngoài quy định tại khoản 1 Điều này, chủ dự án thực hiện như sau:"},{"k":"p","t":"a)Trong thời hạn 30 ngày kể từ ngày hoàn thiện việc lắp đặt tổ hợp, dây chuyền, chủ dự án có thông báo với cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế về việc hoàn thiện lắp đặt tổ hợp, dây chuyền theo các chỉ tiêu thông tin quy định tại Mẫu số 09 Phụ lục VIIa ban hành kèm theo Nghị định này thông qua Hệ thống xử lý dữ liệu điện tử hoặc theo Mẫu số 20 Phụ lục VII ban hành kèm theo Nghị định này. Trường hợp không sử dụng hết, trong thời hạn 30 ngày kể từ ngày hoàn thiện việc lắp đặt tổ hợp, dây chuyền, chủ dự án phải đăng ký tờ khai hải quan mới và kê khai nộp thuế tại thời điểm đăng ký tờ khai hải quan mới."},{"k":"p","t":"b)Trong thời hạn 60 ngày kể từ ngày nhận được thông báo hoàn thiện việc lắp đặt tổ hợp, dây chuyền của chủ dự án, cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế thực hiện kiểm tra tại trụ sở của chủ dự án để xác định hàng hóa nhập khẩu miễn thuế đã sử dụng đúng mục đích lắp đặt vào tổ hợp, dây chuyền được miễn thuế. Trường hợp cơ quan hải quan phát hiện chủ dự án không sử dụng hết hoặc thay đổi mục đích sử dụng hàng hóa miễn thuế theo tổ hợp, dây chuyền nhưng không đăng ký tờ khai hải quan mới, cơ quan hải quan thực hiện ấn định thuế theo quy định."},{"k":"p","t":"c)Chủ dự án thực hiện thông báo tình hình sử dụng hàng hóa nhập khẩu để hoàn thiện lắp đặt tổ hợp, dây chuyền theo quy định tại khoản 1 Điều này. Kể từ năm hoàn thiện lắp đặt tổ hợp, dây chuyền, chủ dự án thực hiện thông báo tình hình sử dụng đối với sản phẩm sau hoàn thiện lắp đặt."},{"k":"p","t":"4. Kiểm tra việc sử dụng hàng hóa miễn thuế"},{"k":"p","t":"a)Cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế thực hiện kiểm tra việc sử dụng hàng hóa miễn thuế tại trụ sở của chủ dự án theo nguyên tắc quản lý rủi ro."},{"k":"p","t":"b)Việc kiểm tra được thực hiện theo trình tự, thủ tục về kiểm tra sau thông quan.”"},{"k":"p","t":"16. Khoản 2, điểm c khoản 3 Điều 32 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 32. Giảm thuế xuất khẩu, thuế nhập khẩu"},{"k":"p","t":"2.Hồ sơ đề nghị giảm thuế, gồm:"},{"k":"p","t":"a)Công văn đề nghị giảm thuế của người nộp thuế gửi qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan theo các tiêu chí thông tin tại Mẫu số 3 Phụ lục VIIa hoặc công văn đề nghị giảm thuế theo Mẫu số 08 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b)Hợp đồng bảo hiểm, thông báo trả tiền bồi thường của tổ chức nhận bảo hiểm (nếu có), trường hợp hợp đồng bảo hiểm không bao gồm nội dung bồi thường về thuế phải có xác nhận của tổ chức bảo hiểm; hợp đồng hoặc biên bản thỏa thuận đền bù của hãng vận tải đối với trường hợp tổn thất do hãng vận tải gây ra (nếu có): 01 bản chụp;"},{"k":"p","t":"c)Biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại (biên bản xác nhận vụ cháy của cơ quan cảnh sát phòng cháy chữa cháy của địa phương nơi xảy ra vụ cháy; văn bản xác nhận của một trong các cơ quan, tổ chức có liên quan sau: Cơ quan Công an xã, phường, thị trấn; Ủy ban nhân dân xã, phường, thị trấn; Ban quản lý khu công nghiệp; Ban quản lý khu chế xuất; Ban quản lý khu kinh tế; Ban quản lý cửa khẩu; Cảng vụ hàng hải; Cảng vụ hàng không nơi xảy ra sự kiện bất khả kháng về thiên tai, thảm họa, dịch bệnh, tai nạn bất ngờ gây thiệt hại cho nguyên liệu, máy móc, thiết bị nhập khẩu); 01 bản chính."},{"k":"p","t":"d)Giấy chứng nhận giám định của thương nhân kinh doanh dịch vụ giám định về số lượng hàng hóa bị mất mát hoặc tỷ lệ tổn thất thực tế của hàng hóa: 01 bản chính."},{"k":"p","t":"3. Thủ tục, thẩm quyền giảm thuế:"},{"k":"p","t":"c) Trường hợp người nộp thuế nộp hồ sơ sau thời điểm làm thủ tục hải quan:"},{"k":"p","t":"Trong thời hạn 30 ngày kể từ ngày tiếp nhận đầy đủ hồ sơ, Cục Hải quan tỉnh, thành phố có trách nhiệm lập hồ sơ, kiểm tra thông tin, thẩm định tính chính xác, đầy đủ của hồ sơ và quyết định giảm thuế theo Mẫu số 12 Phụ lục VII ban hành kèm theo Nghị định này hoặc thông báo cho người nộp thuế biết lý do không thuộc đối tượng giảm thuế, số tiền thuế phải nộp. Trường hợp hồ sơ chưa đầy đủ, cơ quan hải quan thông báo cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ."},{"k":"p","t":"Trường hợp cần kiểm tra thực tế đối với hàng hóa đã qua khu vực giám sát hải quan để có đủ căn cứ giải quyết giảm thuế thì ban hành quyết định kiểm tra sau thông quan tại trụ sở người nộp thuế và thực hiện các công việc quy định tại điểm này trong thời hạn tối đa là 40 ngày kể từ ngày nhận đủ hồ sơ.”"},{"k":"p","t":"17. Điểm a khoản 1, điểm b khoản 2 Điều 34 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“Điều 34. Hoàn thuế đối với hàng hóa nhập khẩu phải tái xuất"},{"k":"p","t":"1.Hàng hóa nhập khẩu đã nộp thuế nhập khẩu nhưng phải tái xuất được hoàn thuế nhập khẩu và không phải nộp thuế xuất khẩu, gồm:"},{"k":"p","t":"a)Hàng hóa nhập khẩu nhưng phải tái xuất ra nước ngoài bao gồm xuất khẩu trả lại chủ hàng, xuất khẩu hàng hóa đã nhập khẩu ra nước ngoài hoặc xuất khẩu vào khu phi thuế quan để sử dụng trong khu phi thuế quan."},{"k":"p","t":"Việc tái xuất hàng hóa phải được thực hiện bởi người nhập khẩu ban đầu hoặc người được người nhập khẩu ban đầu ủy quyền, ủy thác xuất khẩu;"},{"k":"p","t":"2. Hồ sơ hoàn thuế gồm:"},{"k":"p","t":"b)Hóa đơn giá trị gia tăng hoặc hóa đơn bán hàng theo quy định của pháp luật về hóa đơn hoặc hoá đơn thương mại: 01 bản chụp.”"},{"k":"p","t":"18. Điểm a khoản 2 Điều 33, điểm a khoản 2 Điều 34, điểm a khoản 2 Điều 35, điểm a khoản 5 Điều 36, khoản 3 Điều 37 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“a) Công văn yêu cầu hoàn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu hoặc nhập khẩu gửi qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan theo các tiêu chí thông tin tại Mẫu số 01 Phụ lục VIIa hoặc công văn yêu cầu hoàn thuế xuất khẩu, nhập khẩu theo Mẫu số 09 Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính.”"},{"k":"p","t":"19. Bổ sung Điều 37a như sau:"},{"k":"p","t":"“Điều 37a. Không thu thuế xuất khẩu, thuế nhập khẩu"},{"k":"p","t":"1. Các trường hợp không thu thuế"},{"k":"p","t":"a)Không thu thuế đối với hàng hóa thuộc đối tượng hoàn thuế nhưng chưa nộp thuế theo quy định tại Điều 33, Điều 34, Điều 35, Điều 36, Điều 37 Nghị định này."},{"k":"p","t":"b)Không thu thuế đối với hàng hóa không phải nộp thuế nhập khẩu, thuế xuất khẩu quy định tại Điều 33, Điều 34 Nghị định này."},{"k":"p","t":"2. Hồ sơ không thu thuế"},{"k":"p","t":"Công văn yêu cầu không thu thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu, nhập khẩu gửi qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan theo các tiêu chí thông tin tại Mẫu số 02 Phụ lục VIIa hoặc công văn yêu cầu không thu thuế xuất khẩu, nhập khẩu theo Mẫu số 09a Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính. Đối với trường hợp quy định tại điểm a khoản 1 Điều này, ngoài công văn yêu cầu không thu thuế, người nộp thuế nộp hồ sơ tương tự như hồ sơ hoàn thuế."},{"k":"p","t":"3. Thời điểm nộp hồ sơ không thu thuế: Người nộp thuế nộp hồ sơ không thu thuế cho cơ quan hải quan nơi làm thủ tục xuất khẩu, nhập khẩu hàng hóa tại thời điểm làm thủ tục hải quan hoặc sau khi hàng hóa đã thông quan."},{"k":"p","t":"4. Thủ tục nộp, tiếp nhận, xử lý hồ sơ không thu thuế:"},{"k":"p","t":"a)Đối với trường hợp nêu tại điểm a khoản 1 Điều này, thủ tục nộp, tiếp nhận, xử lý hồ sơ không thu thuế thực hiện như thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế."},{"k":"p","t":"b) Đối với trường hợp nêu tại điểm b khoản 1 Điều này:"},{"k":"p","t":"Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng không phát sinh số tiền thuế đề nghị hoàn và người nộp thuế nộp hồ sơ không thu thuế tại thời điểm làm thủ tục hải quan, cơ quan hải quan ra quyết định không thu thuế nhập khẩu đối với hàng hóa tái nhập, không thu thuế xuất khẩu đối với hàng hóa tái xuất trong thời hạn làm thủ tục hải quan nếu có đủ cơ sở xác định hàng hóa nhập khẩu là hàng hóa đã xuất khẩu trước đây, hàng hóa xuất khẩu là hàng hóa đã nhập khẩu trước đây."},{"k":"p","t":"Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng có phát sinh số tiền thuế đề nghị hoàn hoặc tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng không phát sinh số tiền thuế đề nghị hoàn nhưng người nộp thuế nộp hồ sơ đề nghị không thu thuế sau khi hàng hoá đã thông quan: Thủ tục nộp, tiếp nhận, xử lý hồ sơ không thu thuế thực hiện như thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế. Cơ quan hải quan ban hành quyết định không thu thuế lô hàng tái xuất hoặc tái nhập cùng với quyết định hoàn thuế lô hàng nhập khẩu, xuất khẩu lần đầu. Số tiền thuế đã nộp của lô hàng tái xuất hoặc tái nhập được hoàn trả cho người nộp thuế theo quy định của pháp luật về quản lý thuế.”"},{"k":"p","t":"20. Sửa các cụm từ sau:"},{"k":"p","t":"a)Sửa từ “hoặc” tại điểm d khoản 3 Điều 8 thành “và”;"},{"k":"p","t":"b)Sửa cụm từ “được xác định khi quyết toán việc quản lý, sử dụng nguyên liệu, vật tư, linh kiện nhập khẩu để gia công sản phẩm xuất khẩu” tại điểm b khoản 2 Điều 11 thành “được xác định khi quyết toán việc quản lý, sử dụng nguyên liệu, vật tư, linh kiện xuất khẩu để gia công sản phẩm nhập khẩu”;"},{"k":"p","t":"c)Sửa cụm từ “khoản 2” tại điểm a khoản 4, điểm a khoản 6 Điều 30 thành “khoản 3”;"},{"k":"p","t":"d)Sửa cụm từ “01 bản chụp có đóng dấu sao y bản chính của cơ quan” tại các khoản 3 Điều 7, khoản 3 Điều 8, khoản 4 Điều 19, khoản 3 Điều 20, khoản 3 Điều 26, khoản 3 Điều 28, khoản 3 Điều 30, khoản 2 Điều 31, khoản 2 Điều 32, khoản 2 Điều 33, khoản 2 Điều 34, khoản 2 Điều 35, khoản 5 Điều 36 thành “01 bản chụp”;"},{"k":"p","t":"đ) Sửa cụm từ “để phát triển” tại điểm b khoản 4 Điều 19 và cụm từ “để phục vụ” tại điểm c khoản 4 Điều 19 thành cụm từ “để sử dụng trực tiếp cho”;"},{"k":"p","t":"e)Sửa cụm từ “Quyết định số 219/2009/QĐ-TTg” tại khoản 2 Điều 38 thành “Quyết định số 119/2009/QĐ-TTg.”"},{"k":"p","t":"21. Sửa đổi, bổ sung khoản 2, khoản 5 Điều 40 như sau:"},{"k":"p","t":"“Điều 40. Trách nhiệm thi hành"},{"k":"p","t":"2. Bộ Khoa học và Công nghệ ban hành Danh mục hoặc tiêu chí để xác định hàng hoá nhập khẩu miễn thuế hoặc thực hiện xác nhận miễn thuế theo quyết định của Thủ tướng Chính phủ đối với phương tiện vận tải chuyên dùng nhập khẩu quy định tại các khoản 11, khoản 15, khoản 16 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu và hàng hóa nhập khẩu quy định tại khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu trừ khoản 1 Điều này."},{"k":"p","t":"5. Bộ Thông tin và Truyền thông quy định việc xác định nguyên liệu, vật tư, linh kiện nhập khẩu được miễn thuế nhập khẩu phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm.”"}]},{"id":"nd18_2","no":2,"code":"Điều 2","title":"Điều 2. Tổ chức thực hiện","shortTitle":"Tổ chức thực hiện","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 25 tháng 4 năm 2021."},{"k":"p","t":"2.Nghị định này bãi bỏ, bổ sung, thay thế:"},{"k":"p","t":"a)Bãi bỏ một số nội dung tại Nghị định số 134/2016/NĐ-CP gồm:"},{"k":"p","t":"Điểm c khoản 3 Điều 8, điểm b khoản 4 Điều 20, khoản 1 Điều 29 Nghị định số 134/2016/NĐ-CP;"},{"k":"p","t":"Các cụm từ sau: Cụm từ “(đối với trường hợp miễn thuế trước khi làm thủ tục hải quan) hoặc Mẫu số 03b tại Phụ lục VII ban hành kèm theo Nghị định này (đối với trường hợp đề nghị miễn thuế sau khi làm thủ tục hải quan)” tại điểm a khoản 3 Điều 20; cụm từ “Trường hợp đề nghị miễn thuế trước khi làm thủ tục hải quan” tại điểm a khoản 4 Điều 20; cụm từ “khoản 2 Điều 8” tại khoản 4 Điều 31; cụm từ “Trường hợp hàng hóa thuộc diện được hoàn thuế nhưng chưa nộp thuế hoặc không phải nộp thuế theo quy định tại Điều 19 Luật Thuế xuất khẩu, thuế nhập khẩu, hồ sơ, thủ tục thực hiện như hồ sơ, thủ tục hoàn thuế” tại khoản 3 Điều 33, khoản 3 Điều 34, khoản 3 Điều 35, khoản 6 Điều 36, khoản 4 Điều 37."},{"k":"p","t":"b)Bãi bỏ các Thông tư:"},{"k":"p","t":"Thông tư số 90/2011/TT-BTC ngày 20 tháng 6 năm 2011 của Bộ Tài chính quy định miễn thuế xuất khẩu đối với mặt hàng trầm hương được sản xuất, tạo ra từ cây Dó bầu trồng; Thông tư số 201/2012/TT-BTC ngày 16 tháng 11 năm 2012 của Bộ Tài chính quy định miễn thuế nhập khẩu đối với hàng hoá là nông sản chưa qua chế biến do phía Việt Nam hỗ trợ đầu tư, trồng tại Campuchia nhập khẩu về nước; Thông tư số 81/2013/TT-BTC ngày 19 tháng 6 năm 2013 sửa đổi, bổ sung Thông tư số 201/2012/TT-BTC ngày 16 tháng 11 năm 2012; Thông tư số 116/2013/TT-BTC ngày 20 tháng 8 năm 2013 của Bộ Tài chính quy định miễn thuế xuất khẩu đối với mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản."},{"k":"p","t":"c)Bãi bỏ Điều 5 Thông tư số 83/2016/TT-BTC ngày 17 tháng 6 năm 2016 của Bộ Tài chính về việc hướng dẫn thực hiện ưu đãi đầu tư quy định tại Luật Đầu tư số 67/2014/QH13 và Nghị định số 118/2015/NĐ-CP ngày 12 tháng 11 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Đầu tư."},{"k":"p","t":"d) Thay thế Phụ lục VII ban hành kèm theo Nghị định số 134/2016/NĐ-CP bằng Phụ lục VII ban hành kèm theo Nghị định này."},{"k":"p","t":"đ) Bổ sung Phụ lục VIIa và Phụ lục VIII ban hành kèm theo Nghị định này."},{"k":"p","t":"3. Quy định về chuyển tiếp ưu đãi thuế nhập khẩu cho đối tượng được miễn thuế nhập khẩu quy định tại khoản 9 Điều 1 Nghị định này:"},{"k":"p","t":"Đối với các dự án đầu tư, trồng sản phẩm nông sản thuộc Danh mục quy định tại Phụ lục VIII ban hành kèm theo Nghị định này đang được hưởng chính sách ưu đãi thuế theo quy định của pháp luật thuế xuất khẩu, nhập khẩu trước ngày Nghị định này có hiệu lực thi hành thì tiếp tục được hưởng chính sách miễn thuế nhập khẩu theo quy định tại khoản 9 Điều 1 Nghị định này trong thời gian còn lại của Giấy chứng nhận đầu tư ra nước ngoài đã được cơ quan nhà nước có thẩm quyền cấp."},{"k":"p","t":"Trường hợp Campuchia điều chỉnh địa giới hành chính dẫn đến tên tỉnh Campuchia nêu tại Giấy chứng nhận đầu tư ra nước ngoài của doanh nghiệp đang được hưởng chính sách ưu đãi miễn thuế theo quy định tại khoản 9 Điều 1 Nghị định này không còn là tỉnh tiếp giáp biên giới Việt Nam thì doanh nghiệp tiếp tục được hưởng chính sách ưu đãi miễn thuế nhập khẩu theo quy định tại khoản 9 Điều 1 Nghị định này trong thời gian còn lại của Giấy chứng nhận đầu tư ra nước ngoài đã được cơ quan nhà nước có thẩm quyền cấp."},{"k":"p","t":"4. Quy định chuyển tiếp đối với hàng hóa xuất khẩu tại chỗ, nhập khẩu tại chỗ:"},{"k":"p","t":"Việc áp dụng thuế suất đối với hàng hoá xuất khẩu tại chỗ, nhập khẩu tại chỗ theo quy định tại khoản 1 Điều 1 Nghị định này được áp dụng kể từ ngày Luật Thuế xuất khẩu, thuế nhập khẩu số 107/2016/QH13 có hiệu lực thi hành."},{"k":"p","t":"5. Quy định chuyển tiếp về thủ tục miễn thuế:"},{"k":"p","t":"a)Trường hợp danh mục hàng hoá miễn thuế đã được Thủ tướng Chính phủ phê duyệt theo quy định tại Điều 29 Nghị định số 134/2016/NĐ-CP trước ngày Nghị định này có hiệu lực thi hành thì người nộp thuế được tiếp tục sử dụng danh mục miễn thuế này cho đến khi nhập khẩu hết số lượng hàng hoá ghi trong danh mục miễn thuế đã được phê duyệt;"},{"k":"p","t":"b)Sổ định mức miễn thuế đã được cơ quan có thẩm quyền cấp trước ngày Nghị định này có hiệu lực thi hành và còn thời hạn sử dụng thì tiếp tục được sử dụng sổ cho đến khi hết thời hạn ghi trên sổ hoặc khi có tăng, giảm biên chế (đối với tổ chức, cơ quan)."},{"k":"p","t":"6.Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Giám sát tài chính Quốc gia;\n-Ngân hàng Chính sách xã hội;\n-Ngân hàng Phát triển Việt Nam;\n- Ủy ban trung ương Mặt trận Tổ quốc Việt Nam;\n-Cơ quan trung ương của các đoàn thể;\n-VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nTHỦ TƯỚNG\nNguyễn Xuân Phúc"]]},{"k":"p","t":"Phụ lục VII"},{"k":"p","t":"BIỂU MẪU MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ, KHÔNG THU THUẾ"},{"k":"p","t":"(Kèm theo Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ)"},{"k":"p","t":"_________"},{"k":"tbl","rows":[["Mẫu số 01","Công văn đề nghị cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa miễn thuế của cơ quan đại diện ngoại giao, cơ quan lãnh sự/cơ quan đại diện tổ chức quốc tế thuộc hệ thống Liên hợp quốc"],["Mẫu số 01a","Công văn đề nghị cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa miễn thuế của cơ quan đại diện tổ chức quốc tế ngoài hệ thống Liên hợp quốc/cơ quan đại diện của tổ chức phi chính phủ"],["Mẫu số 02","Công văn đề nghị cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa miễn thuế của cá nhân thuộc cơ quan đại diện ngoại giao, cơ quan lãnh sự/cơ quan đại diện tổ chức quốc tế thuộc hệ thống Liên hợp quốc"],["Mẫu số 02a","Văn bản đề nghị Bộ Ngoại giao xác nhận miễn thuế rượu, bia, thuốc lá nhập khẩu vượt định lượng"],["Mẫu số 02b","Văn bản xác nhận của Bộ Ngoại giao về danh mục rượu, bia, thuốc lá nhập khẩu vượt định lượng được miễn thuế"],["Mẫu số 02c","Văn bản đề nghị Bộ Ngoại giao xác nhận chủng loại và định lượng hàng hóa nhập khẩu phục vụ nhu cầu công tác được miễn thuế"],["Mẫu số 02d","Văn bản xác nhận của Bộ Ngoại giao về chủng loại và định lượng hàng hoá cần thiết nhập khẩu để phục vụ nhu cầu công tác được miễn thuế"],["Mẫu số 02e","Văn bản đề nghị Bộ Tài chính xác nhận chủng loại và định lượng hàng hóa miễn thuế nhập khẩu theo Điều ước quốc tế/Thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài"],["Mẫu số 02g","Quyết định của Thủ tướng Chính phủ phê duyệt chủng loại và định lượng hàng hóa nhập khẩu miễn thuế theo Điều ước quốc tế/Thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài"],["Mẫu số 02h1","Sổ định mức miễn thuế của tổ chức ngoại giao (do Bộ Ngoại giao cấp)"],["Mẫu số 02h2","Sổ định mức miễn thuế của viên chức ngoại giao (do Bộ Ngoại giao cấp)"],["Mẫu số 02h3","Sổ định mức miễn thuế của nhân viên ngoại giao (do Bộ Ngoại giao cấp)"],["Mẫu số 02h4","Sổ định mức miễn thuế của cơ quan đại diện tổ chức quốc tế ngoài hệ thống Liên hợp quốc/cơ quan đại diện của tổ chức phi chính phủ (do cơ quan hải quan cấp)"],["Mẫu số 02h5","Sổ định mức miễn thuế của cá nhân thuộc cơ quan đại diện tổ chức quốc tế ngoài hệ thống Liên hợp quốc/cơ quan đại diện của tổ chức phi chính phủ (do cơ quan hải quan cấp)"],["Mẫu số 02i","Công văn đề nghị cấp sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa miễn thuế của thành viên cơ quan đại diện tổ chức quốc tế ngoài hệ thống Liên hợp quốc/cơ quan đại diện của tổ chức phi chính phủ"],["Mẫu số 03a","Công văn đề nghị miễn thuế hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng"],["Mẫu số 04","Danh mục hàng hóa xuất khẩu, nhập khẩu đề nghị miễn thuế để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác"],["Mẫu số 05","Thông báo Danh mục hàng hóa miễn thuế dự kiến xuất khẩu, nhập khẩu"],["Mẫu số 06","Danh mục hàng hóa miễn thuế dự kiến xuất khẩu, nhập khẩu"],["Mẫu số 07","Phiếu theo dõi trừ lùi hàng hóa miễn thuế xuất khẩu, nhập khẩu"],["Mẫu số 08","Công văn đề nghị giảm thuế xuất khẩu, nhập khẩu"],["Mẫu số 09","Công văn đề nghị hoàn thuế"],["Mẫu số 09a","Công văn đề nghị không thu thuế"],["Mẫu số 10","Báo cáo tính thuế nguyên liệu, vật tư đề nghị hoàn thuế nhập khẩu"],["Mẫu số 11","Danh sách cá nhân/hộ gia đình/hộ kinh doanh đầu tư, trồng nông sản tại tỉnhcủa Campuchia giáp tỉnh.... của Việt Nam năm...."],["Mẫu số 12","Quyết định của Cục trưởng Cục Hải quan về việc giảm thuế đối với hàng hóa xuất khẩu/nhập khẩu"],["Mẫu số 13","Công văn đề nghị xác nhận chủng loại, định lượng hàng hóa miễn thuế theo điều ước quốc tế"],["Mẫu số 14","Văn bản xác nhận chủng loại, định lượng hàng hóa Nhà nước - Bộ Ngoại giao cấp."},{"k":"p","t":"c)Công hàm đề nghị mua hàng."},{"k":"p","t":"4. Khi mất Sổ, cơ quan được cấp sổ cần thông báo ngay cho Cục Lễ tân Nhà nước - Bộ Ngoại giao."},{"k":"p","t":"5. Khi thay sổ mới, cơ quan được cấp sổ phải gửi trả sổ định mức miễn thuế này về Cục Lễ tân Nhà nước - Bộ Ngoại giao."},{"k":"p","t":"6. Sổ này gồm 11 trang được đánh số từ trang 1 đến trang 11 (trừ trang bìa), được in trên khổ A5, trang bìa có màu đỏ."},{"k":"p","t":"7. Sổ này kèm phụ lục tem rượu, bia, thuốc lá."},{"k":"p","t":"8. Bộ Tài chính in, phát hành, quản lý, sử dụng sổ định mức miễn thuế."},{"k":"p","t":"INSTRUCTION"},{"k":"p","t":"1. The quota book is used to purchase commodities at Duty Free Shops in Vietnam within 03 years."},{"k":"p","t":"2. The quota book is also used when the user of the quota book (the person to whom the quota book is issued) imports commodities by himself/herself or authorizes the other import commodities into Vietnam."},{"k":"p","t":"3. To purchase commodities at Duty Free Shops in Vietnam, the followings are presented:"},{"k":"p","t":"a. The quota book."},{"k":"p","t":"b. Passport or I.D Card which is granted by the Directorate of State Protocol Ministry of Foreign Affairs."},{"k":"p","t":"c. Letter of recommendation."},{"k":"p","t":"4. If the book is lost, the user is requested to inform immediately to the Directorate of State Protocol - Ministry of Foreign Affairs."},{"k":"p","t":"5. If change the book, the user should return the quota book to the Directorate of State Protocol - Ministry of Foreign Affairs."},{"k":"p","t":"6. This book includes 11 pages, numbered from 1 to 11 (except for the cover page) and printed on A5 size; the cover page is red."},{"k":"p","t":"7. This book is attached with stamps of alcohol, beer and cigarettes."},{"k":"p","t":"8. The Ministry of Finance prints, issues, manages and uses the quota book."},{"k":"p","t":"Xác nhận của cơ quan sở hữu sổ định mức miễn thuế:"},{"k":"p","t":"Cơ quan/Mission:"},{"k rs, 6 liters, 18 liters, numbered from 1 to the maximum number as quarterly allowed."},{"k":"p","t":"b) Đối với mặt hàng bia gồm các loại tem: 8 lít, 12 lít, 16 lít được đánh số thứ tự từ 1 đến hết số lượng tem theo từng quý/Stamps for beer: includes types of 8 liters, 12 liters, 16 liters, numbered from 1 to the maximum number as quarterly allowed."},{"k":"p","t":"c)Đối với mặt hàng thuốc lá gồm loại tem: 1 tút được đánh số thứ tự từ 1 đến hết số lượng tem theo từng quý/Stamps for cigarette: includes types of 1 carton, numbered from 1 to the maximum number as quarterly allowed."},{"k":"p","t":"5. Tem ở quý nào chỉ có giá trị sử dụng ở quý đó/Stamp in each quarter is only valid for use in that quarter."},{"k":"p","t":"6. Tem này chỉ có giá trị khi xuất trình cùng với sổ định mức miễn thuế/This stamp is only valid when presented with the Quota book."},{"k":"p","t":"Mẫu số 02h2"},{"k":"p","t":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"},{"k":"p","t":"ĐỘC LẬP - TỰ DO - HẠNH PHÚC"},{"k":"p","t":"SOCIALIST REPUBLIC OF VIETNAM"},{"k":"p","t":"INDEPENDENCE - FREEDOM- HAPPINESS"},{"k":"p","t":"BỘ NGOẠI GIAO"},{"k":"p","t":"MINISTRY OF FOREIGN AFFAIRS"},{"k":"p","t":"SỔ ĐỊNH MỨC MIỄN THUẾ"},{"k":"p","t":"QUOTA BOOK FOR DUTY FREE GOODS"},{"k":"p","t":"Số sổ: ............VC/............"},{"k":"p","t":"Số quản lý:...................."},{"k":"p","t":"Sổ viên chức ngoại giao"},{"k":"p","t":"(Personal book)"},{"k":"p","t":"HƯỚNG DẪN"},{"k":"p","t":"1. Sổ định mức miễn thuế được sử dụng để mua hàng miễn thuế tại các cửa hàng miễn thuế ở Việt Nam theo nhiệm kỳ công tác."},{"k":"p","t":"2. Sổ định mức miễn thuế được sử dụng khi người được cấp sổ tự nhập khẩu, tạm nhập khẩu hay ủy quyền nhập khẩu, tạm nhập khẩu các hàng hóa vào Việt Nam."},{"k":"p","t":"3. Khi mua hàng tại cửa hàng miễn thuế ở Việt Nam, người được cấp sổ xuất trình:"},{"k":"p","t":"a)Sổ định mức miễn thuế."},{"k":"p","t":"b)Hộ chiếu hoặc chứng minh thư do Cục Lễ tân Nhà nước - Bộ Ngoại giao cấp."},{"k":"p","t":"4. Khi mất Sổ, người được cấp sổ cần thông báo ngay cho Cục Lễ tân Nhà nước - Bộ Ngoại giao."},{"k":"p","t":"5. Khi kết thúc nhiệm kỳ công tác, sổ định mức miễn thuế này phải được gửi trả về Cục Lễ tân Nhà nước - Bộ Ngoại giao."},{"k":"p","t":"6. Sổ này gồm 6 trang được đánh số từ trang 1 đến trang 6 (trừ trang bìa), được in trên khổ A5, trang bìa có màu xanh lá cây."},{"k":"p","t":"7. Sổ này kèm phụ lục tem rượu, bia, thuốc lá."},{"k":"p","t":"8. Bộ Tài chính in, phát hành, quản lý, sử dụng sổ định mức miễn thuế."},{"k":"p","t":"INSTRUCTION"},{"k":"p","t":"1. The Quota book is used to purchase commodities at Duty Free Shops in Viet Nam within mission term."},{"k":"p","t":"2. The quota book is also used when the user of the quota book (the person to whom the quota book is issued) imports commodities by himself/herself or authorises the other to import commodities into Viet Nam."},{"k":"p","t":"3. To purchase commodities at Duty Free Shops in Viet Nam, the followings are presented:"},{"k":"p","t":"a.The quota book."},{"k":"p","t":"b.Passport or I.D Card which is granted by the Directorate of State Protocol Ministry of Foreign Affairs."},{"k":"p","t":"4. If the book is lost, the user is requested to inform immediately to the Directorate of State Protocol - Ministry of Foreign Affairs."},{"k":"p","t":"5. When completing the mission term, the user should return the quota book to the Directorate of State Protocol - Ministry of Foreign Affairs."},{"k":"p","t":"6. This book includes 6 pages, is numbered from 1 to 6 (except for the cover page) and printed on A5 size; the cover page is green."},{"k":"p","t":"7. This book is attached with stamps of alcohol, beer and cigarettes."},{"k":"p","t":"8. The Ministry of Finance prints, issues, manages and uses the quota book."},{"k":"p","t":"XÁC NHẬN CỦA CỤC LỄ TÂN NHÀ NƯỚC BỘ NGOẠI GIAO"},{"k":"p","t":"VỀ THÂN PHẬN VÀ TIÊU CHUẨN MUA HÀNG MIỄN THUẾ"},{"k":"p","t":"Certification of the Directorate of State Protocol"},{"k":"p","t":"Ông/bà:"},{"k": d for use in that quarter."},{"k":"p","t":"6. Tem này chỉ có giá trị khi xuất trình cùng với sổ định mức miễn thuế/This stamp is only valid when presented with the Quota book."},{"k":"p","t":"Mẫu số 02h3"},{"k":"p","t":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"},{"k":"p","t":"ĐỘC LẬP - TỰ DO - HẠNH PHÚC"},{"k":"p","t":"SOCIALIST REPUBLIC OF VIETNAM"},{"k":"p","t":"INDEPENDENCE - FREEDOM- HAPPINESS"},{"k":"p","t":"BỘ NGOẠI GIAO"},{"k":"p","t":"MINISTRY OF FOREIGN AFFAIRS"},{"k":"p","t":"SỔ ĐỊNH MỨC MIỄN THUẾ"},{"k":"p","t":"QUOTA BOOK FOR DUTY FREE GOODS"},{"k":"p","t":"Số sổ:.....NV/............."},{"k":"p","t":"Số quản lý:.................."},{"k":"p","t":"Sổ nhân viên"},{"k":"p","t":"(Executive staff book)"},{"k":"p","t":"HƯỚNG DẪN"},{"k":"p","t":"1. Sổ định mức miễn thuế được sử dụng để mua hàng miễn thuế tại các cửa hàng miễn thuế ở Việt Nam theo nhiệm kỳ công tác."},{"k":"p","t":"2. Sổ định mức miễn thuế được sử dụng khi người được cấp sổ tự nhập khẩu, tạm nhập khẩu hay ủy quyền nhập khẩu, tạm nhập khẩu các hàng hóa vào Việt Nam."},{"k":"p","t":"3. Khi mua hàng tại cửa hàng miễn thuế ở Việt Nam, người được cấp sổ xuất trình:"},{"k":"p","t":"a) Sổ định mức miễn thuế."},{"k":"p","t":"b) Hộ chiếu hoặc chứng minh thư do Cục Lễ tân Nhà nước - Bộ Ngoại giao cấp."},{"k":"p","t":"4. Khi mất Sổ, người được cấp sổ cần thông báo ngay cho Cục Lễ tân Nhà nước - Bộ Ngoại giao."},{"k":"p","t":"5. Khi kết thúc nhiệm kỳ công tác, sổ định mức miễn thuế này phải được gửi trả về Cục Lễ tân Nhà nước - Bộ Ngoại giao."},{"k":"p","t":"6. Sổ này gồm 6 trang được đánh số từ trang 1 đến trang 6 (trừ trang bìa), được in trên khổ A5, trang bìa có xanh da trời."},{"k":"p","t":"7. Sổ này kèm phụ lục tem rượu, bia, thuốc lá."},{"k":"p","t":"8. Bộ Tài chính in, phát hành, quản lý, sử dụng sổ định mức miễn thuế."},{"k":"p","t":"INSTRUCTION"},{"k":"p","t":"1. The Quota book is used to purchase commodities at Duty Free Shops in Viet Nam within mission term."},{"k":"p","t":"2. The quota book is also used when the user of the quota book (the person to whom the quota book is issued) imports commodities by himself/herself or authorises the other to import commodities into Viet Nam."},{"k":"p","t":"3. To purchase commodities at Duty Free Shops in Viet Nam, the followings are presented:"},{"k":"p","t":"a. The quota book."},{"k":"p","t":"b. I.D Card which is granted by the Directorate of State Protocol Ministry of Foreign Affairs."},{"k":"p","t":"4. If the book is lost, the user is requested to inform immediately to the Directorate of State Protocol - Ministry of Foreign Affairs."},{"k":"p","t":"5. When completing the mission term, the user should return the quota book to the Directorate of State Protocol - Ministry of Foreign Affairs."},{"k":"p","t":"6. This book includes 6 pages, is numbered from 1 to 6 (except for the cover page) and printed on A5 size; the cover page is blue."},{"k":"p","t":"7. This book is attached with stamps of alcohol, beer and cigarettes."},{"k":"p","t":"8. The Ministry of Finance prints, issues, manages and uses the quota book."},{"k":"p","t":"XÁC NHẬN CỦA CỤC LỄ TÂN NHÀ NƯỚC BỘ NGOẠI GIAO"},{"k":"p","t":"VỀ THÂN PHẬN VÀ TIÊU CHUẨN MUA HÀNG MIỄN THUẾ"},{"k":"p","t":"Certification of the Directorate of State Protocol"},{"k":"p","t":"Ông/bà:"},{"k":"p","t":"Mr/Mrs ."},{"k":"p","t":"Chức vụ:"},{"k":"p","t":"Position:"},{"k":"p","t":"Cơ quan:"},{"k":"p","t":"Mission:"},{"k":"p","t":"Chứng minh thư số:"},{"k":"p","t":"ID card:"},{"k":"p","t":"Được hưởng ưu đãi miễn trừ theo Nghị định số 73/CP ngày 30-07-1994 của Chính phủ."},{"k":"p","t":"Enjoys the privileges and immunities under the Decree No. 73/CP dated 30 July 1994."},{"k":"p","t":"Từ ngày/from:"},{"k":"p","t":"Đến ngày/to:"},{"k":"p","t":"Danh mục và định lượng được nhập khẩu, tạm nhập khẩu, mua hàng miễn thuế theo quy định tại Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ được sửa đổi, bổ sung tại Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ gồm:"},{ ệu lực kể từ ngày ký.","shortTitle":"Quyết định này có hiệu lực kể từ ngày ký.","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Bộ trưởng Bộ Tài chính, Tổng cục trưởng Tổng cục Hải quan, ... và cơ quan/tổ chức/cá nhân... chịu trách nhiệm thi hành Quyết định này./."},{"k":"tbl","rows":[["Nơi nhận:\n- Như Điều 3;\n- ....;\n- Lưu: VT,...","THỦ TƯỚNG"]]},{"k":"p","t":"Mẫu số 24"},{"k":"tbl","rows":[["TÊN NHÀ ĐẦU TƯ\n_________","CỘNG HOÀ XÃ HỘI CHỦ NGHĨA VIỆT NAM\nĐộc lập - Tự do - Hạnh phúc\n_________________________\n..., ngày... tháng ... năm ..."]]},{"k":"p","t":"BẢN CAM KẾT"},{"k":"p","t":"Về khả năng đáp ứng điều kiện kiểm tra, giám sát hải quan đối với khu phi thuế quan là doanh nghiệp chế xuất"},{"k":"p","t":"_____________"},{"k":"p","t":"I. Thông tin về nhà đầu tư thực hiện dự án đầu tư đăng ký là doanh nghiệp chế xuất"},{"k":"p","t":"1. Tên nhà đầu tư: ..."},{"k":"p","t":"2. Địa chỉ: ..."},{"k":"p","t":"3. Thời điểm dự án dự kiến đi vào hoạt động:..."},{"k":"p","t":"II. Nội dung cam kết"},{"k":"p","t":"Chúng tôi xin cam kết về khả năng đáp ứng đủ các điều kiện kiểm tra, giám sát của cơ quan hải quan đối với doanh nghiệp chế xuất chậm nhất 30 ngày trước thời điểm doanh nghiệp chính thức đi vào hoạt động, cụ thể như sau:"},{"k":"p","t":"1. Có hàng rào cứng ngăn cách với khu vực bên ngoài; có cổng/cửa ra, vào đảm bảo việc đưa hàng hóa ra, vào doanh nghiệp chế xuất chỉ qua cổng/cửa."},{"k":"p","t":"2. Có hệ thống ca-mê-ra quan sát được các vị trí tại cổng/cửa ra, vào và các vị trí lưu giữ hàng hóa ở tất cả các thời điểm trong ngày (24/24 giờ, bao gồm cả ngày nghỉ, ngày lễ); dữ liệu hình ảnh ca-mê-ra được kết nối trực tuyến với cơ quan hải quan quản lý doanh nghiệp và được lưu giữ tại doanh nghiệp chế xuất tối thiểu 12 tháng."},{"k":"p","t":"3. Có phần mềm quản lý hàng hóa nhập khẩu thuộc đối tượng không chịu thuế của doanh nghiệp chế xuất để báo cáo quyết toán nhập - xuất - tồn về tình hình sử dụng hàng hóa nhập khẩu theo quy định pháp luật về hải quan."},{"k":"p","t":"Chúng tôi xin cam đoan và chịu trách nhiệm trước pháp luật về nội dung nêu trên./."},{"k":"tbl","rows":[["XÁC NHẬN CỦA CƠ QUAN HẢI QUAN\n...........................\n...........................","ĐẠI DIỆN THEO PHÁP LUẬT CỦA NHÀ ĐẦU TƯ\n(Ký, ghi rõ họ tên, đóng dấu)"],["THỦ TRƯỞNG CƠ QUAN HẢI QUAN\n(Ký, ghi rõ họ tên, đóng dấu)",""]]},{"k":"p","t":"Mẫu số 25"},{"k":"tbl","rows":[["TÊN DOANH NGHIỆP...\n_________\nSố:...","CỘNG HOÀ XÃ HỘI CHỦ NGHĨA VIỆT NAM\nĐộc lập - Tự do - Hạnh phúc\n_________________________\n..., ngày... tháng ... năm ..."]]},{"k":"p","t":"THÔNG BÁO"},{"k":"p","t":"Về việc đã hoàn thành xây dựng, lắp đặt thiết bị đáp ứng điều kiện kiểm tra, giám sát hải quan đối với khu phi thuế quan là doanh nghiệp chế xuất"},{"k":"p","t":"_______________"},{"k":"p","t":"I. Thông tin về doanh nghiệp"},{"k":"p","t":"1. Tên doanh nghiệp: ..."},{"k":"p","t":"2. Giấy chứng nhận đăng ký đầu tư số:... ngày... tháng... năm... Nơi cấp:..."},{"k":"p","t":"Điều chỉnh lần thứ ... ngày .... tháng ... năm ... (nếu có)."},{"k":"p","t":"3. Địa chỉ:..."},{"k":"p","t":"4. Mã số thuế: ..."},{"k":"p","t":"5. Số điện thoại:... số Fax:..."},{"k":"p","t":"6. Hàng hóa nhập khẩu được đăng ký tờ khai tại Chi cục Hải quan:..."},{"k":"p","t":"7. Thời gian hoàn thành việc xây dựng:..."},{"k":"p","t":"8. Thời gian chính thức đi vào hoạt động: …(2)"},{"k":"p","t":"II. Nội dung thông báo"},{"k":"p","t":"Doanh nghiệpxin trân trọng thông báo cho Chi cục Hải quan... về việc đã đáp ứng đầy đủ các quy định về điều kiện kiểm tra, giám sát của cơ quan hải quan đối với khu phi thuế quan là doanh nghiệp chế xuất kể từ ngày ..., bao gồm:"},{"k":"tbl","rows":[["TT","CHỈ TIÊU"],["1","Hàng rào cứng ngăn cách với khu vực bên ngoài."],["","Cổng/cửa ra, vào đảm bảo đưa hàng hóa ra, vào doanh nghiệp chế xuất chỉ qua cổng/cửa."],["2","Hệ thống ca-mê-ra quan sát được các vị trí tại cổng/cửa ra, vào và các vị trí lưu giữ hàng hóa ở tất cả các thời điểm trong ngày (24/24 giờ, bao gồm cả ngày nghỉ, ngày lễ); dữ liệu hình ảnh ca-mê-ra được kết nối trực tuyến với cơ quan hải quan quản lý doanh nghiệp."],["","Dữ liệu về hình ảnh ca-mê-ra được lưu giữ tại doanh nghiệp chế xuất tối thiểu 12 tháng."],["3","Phần mềm quản lý hàng hóa nhập khẩu thuộc đối tượng không chịu thuế của doanh nghiệp chế xuất để báo cáo quyết toán nhập - xuất - tồn về tình hình sử dụng hàng hóa nhập khẩu theo quy định pháp luật về hải quan."]]},{"k":"p","t":"Doanh nghiệp... xin cam đoan và chịu trách nhiệm trước pháp luật về nội dung thông báo nêu trên. Đề nghị cơ quan hải quan kiểm tra và có xác nhận điều kiện kiểm tra, giám sát hải quan đối với doanh nghiệp... ./."},{"k":"tbl","rows":[["Nơi nhận:\n-Chi cục Hải quan...\n-Lưu: VT","..., ngày... tháng... năm ...\nĐẠI DIỆN THEO PHÁP LUẬT CỦA DOANH NGHIỆP\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"Ghi chú:"},{"k":"p","t":"(1) Ghi theo thời điểm nêu trong Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đăng ký đầu tư điều chỉnh (nếu có) hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư hoặc văn bản xác nhận của cơ quan đăng ký đầu tư. Trường hợp Giấy chứng nhận đăng ký đầu tư, Giấy chứng nhận đầu tư điều chỉnh hoặc văn bản của cơ quan đăng ký đầu tư có thẩm quyền trong trường hợp không phải thực hiện cấp Giấy chứng nhận đăng ký đầu tư, không nêu thời điểm doanh nghiệp chế xuất chính thức đi vào hoạt động thì thời điểm doanh nghiệp chế xuất chính thức đi vào hoạt động là thời điểm doanh nghiệp bắt đầu sản xuất chính thức theo thông báo của doanh nghiệp với cơ quan hải quan."},{"k":"p","t":"Mẫu số 26"},{"k":"tbl","rows":[["TÊN CƠ QUAN HẢI QUAN...\n_________\nSố:...","CỘNG HOÀ XÃ HỘI CHỦ NGHĨA VIỆT NAM\nĐộc lập - Tự do - Hạnh phúc\n_________________________\n..., ngày... tháng ... năm ..."]]},{"k":"p","t":"GIẤY XÁC NHẬN"},{"k":"p","t":"về việc đáp ứng/không đáp ứng điều kiện kiểm tra, giám sát của cơ quan hải quan đối với khu phi thuế quan là doanh nghiệp chế xuất"},{"k":  Danh mục miễn thuế","Nhập số Danh mục hàng hóa miễn thuế",""],["9.18","Số lượng hàng hóa nhập khẩu dùng để lắp đặt tổ hợp dây chuyền","Nhập số lượng hàng hóa dùng để lắp đặt tổ hợp dây chuyên theo tờ khai hải quan",""],["9.19","Số lượng hàng hóa đã sử dụng để lắp đặt tổ hợp dây chuyền","Nhập số lượng hàng hóa đã sử dụng để lắp đặt tổ hợp dây chuyền",""],["9.20","Số lượng hàng hóa dư thừa sau lắp đặt tổ hợp dây chuyền","Nhập số lượng hàng hóa dư thừa sau lắp đặt tổ hợp dây chuyền",""],["9.21","Tên hàng hóa sau lắp đặt","Nhập tên tổ hợp, dây chuyền sau lắp đặt",""],["9.22","Đơn vị tính hàng hóa sau lắp đặt","Nhập đơn vị tính của hàng hóa sau lắp đặt",""],["9.23","Số lượng hàng hóa sau lắp đặt","Nhập số lượng của hàng hóa sau lắp đặt",""],["9.24","Ghi chú","Nhập thông tin cần ghi chú",""]]},{"k":"p","t":"Phụ lục VIII"}]}],"refs":{"nd18_1":[{"kind":"related","targetSlug":"nd134","targetAnchor":"nd134_1","label":"NĐ 134/2016 — Văn bản gốc (Thuế XNK)"}]},"details":{"nd18_1":[{"match":"Sửa đổi, bổ sung khoản 1, bổ sung khoản 3","title":"NĐ 18/2021 — Sửa đổi, bổ sung NĐ 134/2016","summary":"NĐ 18/2021 sửa đổi, bổ sung nhiều điều của NĐ 134/2016 về miễn thuế, hoàn thuế XNK (hàng SX-XK, gia công, chế xuất...). Đọc kèm văn bản gốc NĐ 134.","links":[{"targetSlug":"nd134","targetAnchor":"nd134_1","label":"NĐ 134/2016 — Văn bản gốc (Thuế XNK)"}]}]},"summaries":{"nd18_1":{"tldr":"Điều 1 sửa đổi, bổ sung nhiều điều của Nghị định số 134/2016/NĐ-CP về thuế xuất khẩu, nhập khẩu, gồm 21 khoản: từ áp dụng thuế suất hàng hóa xuất khẩu/nhập khẩu tại chỗ, miễn thuế hàng gia công - sản xuất xuất khẩu, ưu đãi đầu tư, đến điều kiện kiểm tra, giám sát hải quan của doanh nghiệp chế xuất, miễn thuế theo điều ước quốc tế, hoàn thuế và không thu thuế.","points":["Sửa đổi Điều 3: áp dụng thuế suất với hàng xuất khẩu tại chỗ, nhập khẩu tại chỗ theo các Nghị định số 122/2016/NĐ-CP, 125/2017/NĐ-CP, 57/2020/NĐ-CP; hàng nhập khẩu tại chỗ từ khu phi thuế quan tùy điều kiện xuất xứ áp thuế suất ưu đãi, ưu đãi đặc biệt hoặc thông thường.","Sửa đổi Điều 5, Điều 8, Điều 10, Điều 11, Điều 12: hồ sơ, thủ tục miễn thuế cho cơ quan ngoại giao; quà biếu, quà tặng cho cơ quan, tổ chức Việt Nam được ngân sách bảo đảm hoặc vì mục đích nhân đạo, từ thiện là toàn bộ trị giá và không quá 04 lần/năm; miễn thuế hàng nhập khẩu để gia công, sản xuất hàng xuất khẩu; thông báo tờ khai nhập khẩu tại chỗ trong 15 ngày kể từ ngày thông quan sản phẩm xuất khẩu tại chỗ.","Sửa đổi Điều 14, Điều 15: miễn thuế nhập khẩu tạo tài sản cố định cho dự án ưu đãi đầu tư; dự án quy mô từ 6.000 tỷ đồng trở lên, giải ngân tối thiểu 6.000 tỷ đồng trong 03 năm và đạt doanh thu tối thiểu 10.000 tỷ đồng/năm hoặc trên 3.000 lao động, hoặc dự án vùng nông thôn từ 500 lao động trở lên; miễn thuế nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được trong thời hạn 05 năm kể từ ngày bắt đầu sản xuất.","Sửa đổi Điều 28, bổ sung Điều 28a: miễn thuế hàng phục vụ an sinh xã hội, khắc phục thiên tai, thảm họa, dịch bệnh và trường hợp đặc biệt; quy định điều kiện kiểm tra, giám sát hải quan đối với doanh nghiệp chế xuất là khu phi thuế quan (hàng rào cứng, hệ thống ca-mê-ra 24/24 giờ lưu giữ tối thiểu 12 tháng, phần mềm quản lý) và thời hạn hoàn thiện không quá 01 năm.","Sửa đổi Điều 29, bổ sung Điều 29a: miễn thuế nhập khẩu hàng gửi qua bưu chính, chuyển phát nhanh có trị giá hải quan từ 1.000.000 đồng trở xuống hoặc tiền thuế từ 100.000 đồng trở xuống; miễn thuế hàng có trị giá hải quan từ 500.000 đồng trở xuống hoặc tiền thuế từ 50.000 đồng trở xuống mỗi lần; miễn thuế hàng theo điều ước quốc tế mà Việt Nam là thành viên.","Sửa đổi Điều 30, 31, 32, 33-37 và bổ sung Điều 31a, Điều 37a: thông báo, kiểm tra việc sử dụng hàng miễn thuế (thông báo trong 90 ngày kể từ ngày kết thúc năm tài chính); giảm thuế, hoàn thuế hàng nhập khẩu phải tái xuất, và bổ sung quy định không thu thuế xuất khẩu, thuế nhập khẩu."]},"nd18_2":{"tldr":"Điều 2 quy định tổ chức thực hiện: Nghị định có hiệu lực thi hành từ ngày 25 tháng 4 năm 2021; bãi bỏ, bổ sung, thay thế một số nội dung của Nghị định số 134/2016/NĐ-CP và các Thông tư liên quan; và quy định chuyển tiếp.","points":["Nghị định có hiệu lực thi hành từ ngày 25 tháng 4 năm 2021.","Bãi bỏ điểm c khoản 3 Điều 8, điểm b khoản 4 Điều 20, khoản 1 Điều 29 Nghị định số 134/2016/NĐ-CP và một số cụm từ; bãi bỏ các Thông tư số 90/2011/TT-BTC, 201/2012/TT-BTC, 81/2013/TT-BTC, 116/2013/TT-BTC và Điều 5 Thông tư số 83/2016/TT-BTC.","Thay thế Phụ lục VII của Nghị định số 134/2016/NĐ-CP bằng Phụ lục VII kèm theo Nghị định này; bổ sung Phụ lục VIIa và Phụ lục VIII.","Chuyển tiếp ưu đãi thuế nhập khẩu cho dự án đầu tư, trồng nông sản tại Campuchia (Phụ lục VIII): tiếp tục được miễn thuế theo khoản 9 Điều 1 trong thời gian còn lại của Giấy chứng nhận đầu tư ra nước ngoài đã được cấp.","Chuyển tiếp hàng xuất khẩu, nhập khẩu tại chỗ: áp dụng thuế suất theo khoản 1 Điều 1 kể từ ngày Luật Thuế xuất khẩu, thuế nhập khẩu số 107/2016/QH13 có hiệu lực.","Chuyển tiếp thủ tục miễn thuế: danh mục hàng miễn thuế đã được Thủ tướng Chính phủ phê duyệt được tiếp tục sử dụng đến khi nhập hết; sổ định mức miễn thuế đã cấp và còn thời hạn được dùng đến khi hết hạn hoặc khi có tăng, giảm biên chế."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
