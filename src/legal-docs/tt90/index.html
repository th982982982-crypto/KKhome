 thuộc diện đăng ký kinh doanh khi tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động sau tạm ngừng hoạt động, kinh doanh trở lại trước thời hạn gửi thông báo mẫu số 23/ĐKT ban hành kèm theo Thông tư này đến cơ quan thuế quản lý trực tiếp theo thời hạn quy định tại điểm g.2 hoặc g.4 khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh tạm ngừng hoạt động hoặc tiếp tục hoạt động của địa điểm kinh doanh thì thực hiện thông báo đến cơ quan thuế quản lý trực tiếp trụ sở của hộ kinh doanh, cá nhân kinh doanh theo quy định tại điểm đ khoản 4 Điều 8 Nghị định số 68/2026/NĐ-CP và khoản 1 Điều 3 Thông tư số 18/2026/TT-BTC."},{"k":"p","t":"2. Sau khi cơ quan thuế đã ban hành thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký, hộ kinh doanh phải thực hiện thủ tục khôi phục mã số thuế theo quy định tại khoản 3 Điều 31 và khoản 2 Điều 32 Thông tư này trước khi đăng ký tạm ngừng hoạt động, kinh doanh với cơ quan đăng ký kinh doanh."}]},{"id":"tt90_26","no":26,"code":"Điều 26","title":"Điều 26. Xử lý thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn","shortTitle":"Xử lý thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Đối với thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn của hộ gia đình, cá nhân kinh doanh theo quy định tại khoản 1 Điều 25 Thông tư này:"},{"k":"p","t":"Cơ quan thuế thực hiện xử lý hồ sơ và ban hành Thông báo chấp thuận hoặc không chấp thuận tạm ngừng hoạt động, kinh doanh mẫu số 27/TB-ĐKT ban hành kèm theo Thông tư này gửi người nộp thuế trong thời hạn 02 (hai) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế theo quy định."},{"k":"p","t":"2. Trường hợp hộ kinh doanh đăng ký thuế cùng với đăng ký kinh doanh, cơ quan thuế cập nhật thông tin tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn của hộ kinh doanh vào Hệ thống ứng dụng đăng ký thuế khi nhận được giao dịch trao đổi thông tin về tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn của cơ quan đăng ký kinh doanh, trừ trường hợp hộ kinh doanh đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký."},{"k":"p","t":"Mục 4CHẤM DỨT HIỆU LỰC MÃ SỐ THUẾ"}]},{"id":"tt90_27","no":27,"code":"Điều 27","title":"Điều 27. Các trường hợp và hồ sơ chấm dứt hiệu lực mã số thuế","shortTitle":"Các trường hợp và hồ sơ chấm dứt hiệu lực mã số thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Mã số thuế của hộ kinh doanh, hộ gia đình, cá nhân kinh doanh bị chấm dứt hiệu lực sử dụng đối với hoạt động kinh doanh trong các trường hợp sau:"},{"k":"p","t":"a) Hộ kinh doanh, hộ gia đình, cá nhân kinh doanh chấm dứt hoạt động kinh doanh;"},{"k":"p","t":"b) Hộ kinh doanh bị thu hồi Giấy chứng nhận đăng ký hộ kinh doanh;"},{"k":"p","t":"c) Hộ kinh doanh chuyển đổi lên doanh nghiệp;"},{"k":"p","t":"d) Hộ kinh doanh, cá nhân kinh doanh bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký kinh doanh."},{"k":"p","t":"2. Mã số thuế của cá nhân bị chấm dứt hiệu lực trong các trường hợp sau:"},{"k":"p","t":"a) Cá nhân chết, mất tích, mất năng lực hành vi dân sự theo quy định của pháp luật;"},{"k":"p","t":"b) Số định danh cá nhân bị hủy theo quy định của pháp luật về căn cước;"},{"k":"p","t":"c) Mã số thuế cá nhân do cơ quan thuế đã cấp có thông tin quốc tịch là người Việt Nam nhưng thông tin xác định danh tính của cá nhân (gồm: họ và tên, số giấy tờ, ngày tháng năm sinh) không khớp đúng hoặc không đủ thông tin để xác thực với Cơ sở dữ liệu quốc gia về dân cư và không còn nghĩa vụ nộp thuế chưa hoàn thành theo dữ liệu quản lý của cơ quan thuế."},{"k":"p","t":"3. Hộ kinh doanh thực hiện đăng ký chấm dứt hoạt động tại cơ quan đăng ký kinh doanh theo quy định của pháp luật về đăng ký kinh doanh. Cơ quan đăng ký kinh doanh gửi thông tin cho cơ quan thuế để thực hiện thủ tục chấm dứt hiệu lực mã số thuế, bao gồm:"},{"k":"p","t":"a) Thông tin về việc chấm dứt hoạt động hộ kinh doanh;"},{"k":"p","t":"b) Thông tin về quyết định thu hồi giấy chứng nhận đăng ký hộ kinh doanh;"},{"k":"p","t":"c) Thông tin hộ kinh doanh chuyển đổi lên doanh nghiệp."},{"k":"p","t":"4. Trước khi nộp hồ sơ để chấm dứt hoạt động tại cơ quan đăng ký kinh doanh, hộ kinh doanh thuộc trường hợp quy định tại điểm a, b, d khoản 1 Điều này phải nộp hồ sơ đến cơ quan thuế quản lý trực tiếp để thực hiện các thủ tục về thuế, hoàn thành nghĩa vụ thuế theo quy định tại Nghị định số 168/2025/NĐ-CP và pháp luật quản lý thuế. Hồ sơ là văn bản đề nghị chấm dứt hiệu lực mã số thuế mẫu số 24/ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"5. Hồ sơ chấm dứt hiệu lực mã số thuế của hộ gia đình, cá nhân kinh doanh thuộc các trường hợp quy định tại điểm a, d khoản 1 Điều này là Văn bản đề nghị chấm dứt hiệu lực mã số thuế mẫu số 24/ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"6. Hồ sơ chấm dứt hiệu lực mã số thuế trong trường hợp quy định tại điểm a khoản 2 Điều này trong trường hợp cá nhân chết, mất tích, mất năng lực hành vi dân sự là các giấy tờ liên quan của cơ quan có thẩm quyền xác nhận cá nhân đã chết, mất tích hoặc mất năng lực hành vi dân sự (giấy chứng tử hoặc giấy báo tử hoặc các giấy tờ thay cho giấy báo tử theo quy định của pháp luật về hộ tịch, hoặc quyết định của tòa án tuyên bố một người là đã chết, mất tích, mất năng lực hành vi dân sự); hoặc thông tin trong Cơ sở dữ liệu quốc gia về dân cư xác định cá nhân đã chết, mất tích."},{"k":"p","t":"7. Hồ sơ chấm dứt hiệu lực mã số thuế trong trường hợp quy định tại điểm b khoản 2 Điều này là Tờ khai đăng ký thuế mẫu số 03-ĐKT hoặc mẫu số 05-ĐKT có thông tin “Số định danh cá nhân đã cấp trước đó (trong trường hợp cá nhân được xác lập lại số định danh cá nhân)”, hoặc thông tin trong Cơ sở dữ liệu quốc gia về dân cư xác định số định danh cá nhân bị hủy."},{"k":"p","t":"8. Chấm dứt hoạt động của địa điểm kinh doanh của hộ kinh doanh, cá nhân kinh doanh"},{"k":"p","t":"a) Trường hợp hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động của địa điểm kinh doanh thì thực hiện thông báo đến cơ quan thuế quản lý trực tiếp trụ sở của hộ kinh doanh, cá nhân kinh doanh theo quy định tại điểm đ khoản 4 Điều 8 Nghị định số 68/2026/NĐ-CP và khoản 1 Điều 3 Thông tư số 18/2026/TT-BTC;"},{"k":"p","t":"b) Khi hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động kinh doanh thì phải chấm dứt hoạt động tại trụ sở và tất cả các địa điểm kinh doanh. Trường hợp hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động tại địa chỉ trụ sở nhưng vẫn tiếp tục hoạt động tại các địa điểm kinh doanh khác thì thực hiện thủ tục thay đổi địa chỉ trụ sở theo quy định tại khoản 1, khoản 2 Điều 23 Thông tư này."}]},{"id":"tt90_28","no":28,"code":"Điều 28","title":"Điều 28. Các nghĩa vụ phải hoàn thành trước khi chấm dứt hiệu lực mã số thuế","shortTitle":"Các nghĩa vụ phải hoàn thành trước khi chấm dứt hiệu lực mã số thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, hộ gia đình, cá nhân kinh doanh thuộc trường hợp quy định tại điểm a, b, d khoản 1 Điều 27 Thông tư này phải hoàn thành các nghĩa vụ phát sinh từ hoạt động kinh doanh trước khi chấm dứt hiệu lực mã số thuế do chấm dứt hoạt động kinh doanh như sau:"},{"k":"p","t":"- Hoàn thành nghĩa vụ về hóa đơn theo quy định của pháp luật về hóa đơn nếu có sử dụng hóa đơn;"},{"k":"p","t":"- Hoàn thành nghĩa vụ nộp hồ sơ khai thuế, nộp thuế và xử lý số tiền thuế nộp thừa theo quy định tại điểm d.1 khoản 1 Điều 7 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"2. Đối với hộ kinh doanh chuyển lên doanh nghiệp nhỏ và vừa theo quy định tại Luật hỗ trợ doanh nghiệp nhỏ và vừa thì hộ kinh doanh phải hoàn thành nghĩa vụ thuế với cơ quan thuế quản lý trực tiếp hoặc có văn bản gửi cơ quan thuế cam kết doanh nghiệp nhỏ và vừa chuyển đổi từ hộ kinh doanh kế thừa toàn bộ nghĩa vụ thuế của hộ kinh doanh theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa."},{"k":"p","t":"3. Đối với trường hợp quy định tại điểm a khoản 2 Điều 27 Thông tư này, cơ quan thuế chấm dứt hiệu lực mã số thuế sau khi các nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế, xử lý số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa của cá nhân được người thừa kế hoặc người được giao quản lý di sản hoặc người quản lý tài sản hoàn thành theo quy định tại điểm a khoản 3 Điều 27 Nghị định số 252/2026/NĐ-CP, hoặc được xóa nợ theo quy định tại điểm a khoản 1 Điều 21 Luật số 108/2025/QH15."},{"k":"p","t":"4. Khi mã số thuế của hộ kinh doanh, hộ gia đình, cá nhân kinh doanh bị chấm dứt hiệu lực sử dụng đối với hoạt động kinh doanh thì mã số thuế của chủ hộ kinh doanh, chủ hộ gia đình, cá nhân không bị chấm dứt hiệu lực và tiếp tục được sử dụng để thực hiện các nghĩa vụ thuế khác của cá nhân đó."},{"k":"p","t":"5. Hộ kinh doanh, cá nhân kinh doanh chịu trách nhiệm hoàn thành đầy đủ các nghĩa vụ thuế liên quan đến địa điểm kinh doanh khi chấm dứt hoạt động của địa điểm kinh doanh."}]},{"id":"tt90_29","no":29,"code":"Điều 29","title":"Điều 29. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế và trả kết quả","shortTitle":"Xử lý hồ sơ chấm dứt hiệu lực mã số thuế và trả kết quả","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế của người nộp thuế theo quy định tại khoản 4, khoản 5 Điều 27 Thông tư này"},{"k":"p","t":"a) Cơ quan thuế quản lý trực tiếp thực hiện như sau:"},{"k":"p","t":"a.1) Ban hành Thông báo về việc người nộp thuế ngừng hoạt động và đang làm thủ tục chấm dứt hiệu lực mã số thuế mẫu số 17/TB-ĐKT ban hành kèm theo Thông tư này gửi cho người nộp thuế trong thời hạn 02 (hai) ngày làm việc kể từ ngày cơ quan thuế nhận đủ hồ sơ chấm dứt hiệu lực mã số thuế theo quy định hoặc thông tin của cơ quan đăng ký kinh doanh, đồng thời cập nhật thông tin và chuyển trạng thái mã số thuế của người nộp thuế thành “NNT ngừng hoạt động và chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” vào Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày ban hành thông báo;"},{"k":"p","t":"a.2) Phối hợp với cơ quan thuế quản lý khoản thu nơi có địa điểm kinh doanh để xử lý nghĩa vụ của người nộp thuế tại cơ quan thuế quản lý địa điểm kinh doanh (nộp đầy đủ hồ sơ khai thuế, hoàn thành nghĩa vụ nộp thuế, hóa đơn và xử lý số tiền thuế nộp thừa (nếu có)), xử lý bù trừ nghĩa vụ thuế hoặc hoàn trả theo quy định của pháp luật;"},{"k":"p","t":"a.3) Thực hiện thủ tục bù trừ hoặc hoàn trả kiêm bù trừ đối với các nghĩa vụ của người nộp thuế khác theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"a.4) Đề nghị cơ quan Hải quan thực hiện xác nhận việc hộ kinh doanh, hộ gia đình, cá nhân kinh doanh đã hoàn thành nghĩa vụ nộp thuế và các khoản thu khác thuộc ngân sách nhà nước đối với hoạt động xuất nhập khẩu theo quy định tại Điều 140 Thông tư số 38/2015/TT-BTC (được sửa đổi, bổ sung tại khoản 61 Điều 1 Thông tư số 121/2025/TT-BTC) trong thời hạn 03 (ba) ngày làm việc kể từ ngày ban hành Thông báo về việc người nộp thuế ngừng hoạt động và đang làm thủ tục chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"a.5) Ban hành Thông báo về việc người nộp thuế chấm dứt hiệu lực mã số thuế mẫu số 18/TB-ĐKT ban hành kèm theo Thông tư này trong thời hạn 03 (ba) ngày làm việc kể từ ngày người nộp thuế đã hoàn thành nghĩa vụ thuế đối với hoạt động kinh doanh theo quy định của Luật số 108/2025/QH15 và khoản 1, khoản 2 Điều 28 Thông tư này; cập nhật thông tin và chuyển trạng thái mã số thuế của người nộp thuế thành “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày ban hành Thông báo."},{"k":"p","t":"Đối với người nộp thuế là hộ kinh doanh, cơ quan thuế quản lý trực tiếp ban hành Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể/chấm dứt hoạt động đến cơ quan đăng ký kinh doanh mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này và cập nhật lý do “Chờ xác nhận chấm dứt của cơ quan đăng ký kinh doanh”. Khi nhận được giao dịch trao đổi thông tin xác nhận chấm dứt hoạt động hộ kinh doanh do cơ quan đăng ký kinh doanh gửi cho cơ quan thuế qua hệ thống thông tin về đăng ký kinh doanh, Hệ thống đăng ký thuế tự động cập nhật trạng thái mã số thuế của người nộp thuế sang “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực MST”;"},{"k":"p","t":"a.6) Trường hợp hộ kinh doanh đã được cơ quan thuế ban hành Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể/ chấm dứt hoạt động đến cơ quan đăng ký kinh doanh theo mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này, nhưng quá 180 ngày kể từ ngày cơ quan thuế nhận được hồ sơ chấm dứt hiệu lực mã số thuế của hộ kinh doanh mà cơ quan thuế chưa nhận được giao dịch chấm dứt hoạt động từ cơ quan đăng ký kinh doanh thì cơ quan thuế ban hành văn bản gửi cơ quan đăng ký kinh doanh đề nghị cập nhật tình trạng pháp lý của hộ kinh doanh sang “đã chấm dứt hoạt động” theo quy định của pháp luật về đăng ký doanh nghiệp làm cơ sở để cơ quan thuế thực hiện việc chấm dứt hiệu lực mã số thuế của người nộp thuế trên Hệ thống ứng dụng đăng ký thuế theo quy định;"},{"k":"p","t":"b) Cơ quan thuế quản lý khoản thu nơi có địa điểm kinh doanh của hộ kinh doanh, cá nhân kinh doanh bị chấm dứt hoạt động thực hiện như sau:"},{"k":"p","t":"b.1) Thực hiện các công việc quy định tại điểm a.2, a.3 khoản này đối với các nghĩa vụ thuế phát sinh tại nơi có địa điểm kinh doanh;"},{"k":"p","t":"b.2) Cập nhật thông tin người nộp thuế đã hoàn thành nghĩa vụ thuế vào Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày người nộp thuế hoàn thành nghĩa vụ nộp thuế tại cơ quan thuế quản lý khoản thu."},{"k":"p","t":"2. Xử lý chấm dứt hiệu lực mã số thuế đối với trường hợp quy định tại điểm c khoản 1 Điều 27 Thông tư này"},{"k":"p","t":"a) Hệ thống ứng dụng đăng ký thuế tự động cập nhật trạng thái mã số thuế của hộ kinh doanh sang trạng thái “NNT ngừng hoạt động và chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay khi nhận được giao dịch xác nhận cấp Giấy chứng nhận đăng ký doanh nghiệp trên cơ sở chuyển đổi từ hộ kinh doanh từ cơ quan đăng ký kinh doanh truyền sang;"},{"k":"p","t":"b) Cơ quan thuế quản lý trực tiếp thực hiện như quy định tại điểm a khoản 1 Điều này; cơ quan thuế quản lý khoản thu thực hiện như quy định tại điểm b khoản 1 Điều này;"},{"k":"p","t":"c) Sau khi cơ quan thuế quản lý trực tiếp cập nhật thông tin về việc người nộp thuế đã hoàn thành nghĩa vụ thuế trên Hệ thống ứng dụng đăng ký thuế, Hệ thống tự động truyền thông tin sang hệ thống thông tin về đăng ký kinh doanh để cơ quan đăng ký kinh doanh thực hiện chấm dứt hoạt động của hộ kinh doanh theo quy định;"},{"k":"p","t":"d) Hệ thống ứng dụng đăng ký thuế tự động cập nhật mã số thuế của người nộp thuế về trạng thái “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay trong ngày nhận được giao dịch xác nhận chấm dứt hoạt động hộ kinh doanh của cơ quan đăng ký kinh doanh."},{"k":"p","t":"3. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế theo quy định tại điểm a khoản 2 Điều 27 Thông tư này"},{"k":"p","t":"Cơ quan thuế quản lý trực tiếp thực hiện cập nhật thông tin và chuyển trạng thái mã số thuế của người nộp thuế thành “NNT ngừng hoạt động và chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” vào Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày tiếp nhận giấy tờ của cơ quan có thẩm quyền xác nhận cá nhân đã chết, mất tích hoặc mất năng lực hành vi dân sự, hoặc thông tin trong Cơ sở dữ liệu quốc gia về dân cư xác định cá nhân đã chết, mất tích."},{"k":"p","t":"Trường hợp các nghĩa vụ nộp thuế theo quy định của Luật số 108/2025/QH15 và khoản 1, 2, 3 Điều 28 Thông tư này (trong trường hợp cá nhân đồng thời là đại diện hộ kinh doanh, hộ gia đình, cá nhân kinh doanh), hoặc khoản 3 Điều 28 Thông tư này (trong trường hợp cá nhân không là đại diện hộ kinh doanh, hộ gia đình, cá nhân kinh doanh) đã được hoàn thành, cơ quan thuế thực hiện chấm dứt hiệu lực mã số thuế của người nộp thuế theo quy định."},{"k":"p","t":"4. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế theo quy định tại điểm b khoản 2 Điều 27 Thông tư này"},{"k":"p","t":"Khi nhận được Tờ khai đăng ký thuế mẫu số 03-ĐKT hoặc mẫu số 05-ĐKT có thông tin “Số định danh cá nhân đã cấp trước đó (trong trường hợp cá nhân được xác lập lại số định danh cá nhân)” hoặc thông tin trong Cơ sở dữ liệu quốc gia về dân cư về số định danh cá nhân mới và số định danh cá nhân bị hủy, cơ quan thuế cập nhật số định danh cá nhân mới làm mã số thuế cho người nộp thuế."},{"k":"p","t":"Đối với mã số thuế bị hủy cơ quan thuế cập nhật trạng thái “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế”. Trường hợp người nộp thuế chưa hoàn thành nghĩa vụ thuế, cơ quan thuế chuyển nghĩa vụ của người nộp thuế từ mã số thuế cũ sang mã số thuế mới và ban hành Thông báo về việc chuyển nghĩa vụ thuế của người nộp thuế mẫu số 39/TB-ĐKT ban hành kèm theo Thông tư này gửi cho người nộp thuế."},{"k":"p","t":"5. Xử lý chấm dứt hiệu lực mã số thuế đối với trường hợp quy định tại điểm c khoản 2 Điều 27 Thông tư này, cơ quan thuế thực hiện chấm dứt hiệu lực mã số thuế trên Hệ thống thông tin quản lý thuế. Trường hợp cá nhân phát sinh nghĩa vụ thuế, cá nhân thực hiện thủ tục đăng ký thuế theo quy định tại Điều 21 Thông tư này."},{"k":"p","t":"6. Trường hợp hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động đối với địa điểm kinh doanh, cơ quan thuế thực hiện cập nhật trạng thái chấm dứt hoạt động của địa điểm kinh doanh trên Hệ thống ứng dụng đăng ký thuế khi nhận được hồ sơ của hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"tt90_30","no":30,"code":"Điều 30","title":"Điều 30. Chấm dứt hiệu lực mã số thuế đối với hộ kinh doanh, cá nhân kinh doanh trong trường hợp cơ quan thuế ban hành thông báo không hoạt động tại địa chỉ đã đăng ký","shortTitle":"Chấm dứt hiệu lực mã số thuế đối với hộ kinh doanh, cá nhân kinh doanh trong trường hợp cơ quan thuế ban hành thông báo không hoạt động tại địa chỉ đã đăng ký","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế thực hiện theo trình tự, thủ tục quy định tại khoản 1, 2 Điều 16 Thông tư này khi ban hành thông báo hộ kinh doanh, cá nhân kinh doanh không hoạt động tại địa chỉ đã đăng ký, đồng thời yêu cầu chủ hộ kinh doanh, cá nhân kinh doanh chịu trách nhiệm hoàn thành nghĩa vụ thuế, hóa đơn với cơ quan thuế quản lý theo quy định."},{"k":"p","t":"2. Sau khi ban hành thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký, cơ quan thuế thực hiện:"},{"k":"p","t":"a) Cập nhật trạng thái cho hộ kinh doanh, cá nhân kinh doanh trên Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày ban hành thông báo, đồng thời truyền thông tin cho hệ thống thông tin về đăng ký kinh doanh ngay trong ngày cập nhật trạng thái “NNT không hoạt động tại địa chỉ đã đăng ký” vào Hệ thống ứng dụng đăng ký thuế;"},{"k":"p","t":"b) Phối hợp khi cơ quan đăng ký kinh doanh xử lý vi phạm hoặc thu hồi Giấy chứng nhận đăng ký hộ kinh doanh theo quy định của Chính phủ về hộ kinh doanh. Khi cơ quan thuế nhận được thông tin thu hồi Giấy chứng nhận đăng ký hộ kinh doanh, cơ quan thuế cập nhật trạng thái mã số thuế của hộ kinh doanh sang trạng thái 06 lý do 13 “NNT không hoạt động tại địa chỉ đã đăng ký và bị thu hồi giấy phép hoạt động” trên Hệ thống ứng dụng đăng ký thuế;"},{"k":"p","t":"c) Trước khi thực hiện thủ tục chấm dứt hoạt động (bao gồm cả chấm dứt tự nguyện và bắt buộc), hộ kinh doanh, cá nhân kinh doanh phải nộp hồ sơ đề nghị chấm dứt hiệu lực mã số thuế theo quy định tại khoản 4 hoặc khoản 5 Điều 27 Thông tư này."},{"k":"p","t":"Trong thời hạn 01 (một) ngày làm việc kể từ ngày cơ quan thuế quản lý trực tiếp tiếp nhận đầy đủ hồ sơ đề nghị chấm dứt hiệu lực mã số thuế, cơ quan thuế thực hiện chuyển trạng thái mã số thuế của người nộp thuế về trạng thái 06 lý do 03 “NNT không hoạt động tại địa chỉ đã đăng ký và có hồ sơ chấm dứt hiệu lực mã số thuế” trên Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"Cơ quan thuế lập danh sách các hồ sơ khai thuế còn thiếu, tình hình sử dụng hoá đơn, số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ và thực hiện xử phạt đối với các hành vi vi phạm pháp luật về thuế, hoá đơn tính đến thời điểm người nộp thuế nộp hồ sơ đề nghị chấm dứt hiệu lực mã số thuế theo quy định, không bắt buộc cơ quan thuế xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký trong trường hợp này."},{"k":"p","t":"Người nộp thuế có trách nhiệm hoàn thành nghĩa vụ thuế theo quy định tại Điều 28 Thông tư này trước khi chấm dứt hiệu lực mã số thuế. Cơ quan thuế quản lý trực tiếp thực hiện tương tự quy định tại điểm a.2, a.3, a.4, a.5 khoản 1 Điều 29 Thông tư này, cơ quan thuế quản lý khoản thu thực hiện tương tự quy định tại điểm b khoản 1 Điều 29 Thông tư này để chấm dứt hiệu lực mã số thuế của người nộp thuế."},{"k":"p","t":"Mục 5KHÔI PHỤC MÃ SỐ THUẾ"}]},{"id":"tt90_31","no":31,"code":"Điều 31","title":"Điều 31. Các trường hợp khôi phục mã số thuế và Hồ sơ đề nghị khôi phục mã số thuế","shortTitle":"Các trường hợp khôi phục mã số thuế và Hồ sơ đề nghị khôi phục mã số thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Các trường hợp khôi phục mã số thuế bao gồm:"},{"k":"p","t":"a) Hộ kinh doanh nếu được khôi phục tình trạng pháp lý theo quy định của pháp luật về đăng ký kinh doanh thì đồng thời được khôi phục mã số thuế sử dụng đối với hoạt động kinh doanh;"},{"k":"p","t":"b) Hộ kinh doanh có nhu cầu tiếp tục hoạt động kinh doanh sau khi cơ quan thuế có thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký nhưng chưa bị thu hồi Giấy chứng nhận đăng ký hộ kinh doanh và chưa bị chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"c) Mã số thuế cá nhân đã bị cơ quan thuế chấm dứt hiệu lực mã số thuế theo quy định tại điểm a khoản 2 Điều 27 Thông tư này, sau đó cơ quan thuế nhận được quyết định của Tòa án hủy bỏ quyết định tuyên bố cá nhân đã chết, mất tích hoặc mất năng lực hành vi dân sự."},{"k":"p","t":"2. Hồ sơ khôi phục mã số thuế đối với trường hợp quy định tại điểm a khoản 1 Điều này là thông tin khôi phục tình trạng pháp lý của hộ kinh doanh do cơ quan đăng ký kinh doanh gửi cho cơ quan thuế qua hệ thống thông tin về đăng ký kinh doanh."},{"k":"p","t":"Trường hợp hộ kinh doanh đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký thì sau khi được cơ quan đăng ký kinh doanh khôi phục tình trạng pháp lý theo quy định, hộ kinh doanh phải nộp hồ sơ khôi phục mã số thuế đến cơ quan thuế quản lý trực tiếp theo quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Hồ sơ khôi phục mã số thuế đối với trường hợp quy định tại điểm b khoản 1 Điều này là văn bản đề nghị khôi phục mã số thuế mẫu số 25/ĐKT ban hành kèm theo Thông tư này gửi đến cơ quan thuế quản lý trực tiếp trước ngày cơ quan thuế ban hành Thông báo về việc chấm dứt hiệu lực mã số thuế theo quy định."},{"k":"p","t":"4. Hồ sơ khôi phục mã số thuế đối với trường hợp quy định tại điểm c khoản 1 Điều này là quyết định của Tòa án hủy bỏ quyết định tuyên bố cá nhân đã chết, mất tích hoặc mất năng lực hành vi dân sự."}]},{"id":"tt90_32","no":32,"code":"Điều 32","title":"Điều 32. Xử lý hồ sơ khôi phục mã số thuế và trả kết quả","shortTitle":"Xử lý hồ sơ khôi phục mã số thuế và trả kết quả","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Xử lý hồ sơ khôi phục mã số thuế theo quy định tại khoản 2 Điều 31 Thông tư này"},{"k":"p","t":"Khi cơ quan thuế nhận được giao dịch khôi phục tình trạng pháp lý đối với hộ kinh doanh theo quy định của pháp luật về đăng ký doanh nghiệp gửi qua hệ thống thông tin về đăng ký kinh doanh, cơ quan thuế thực hiện khôi phục mã số thuế cho người nộp thuế ngay trong ngày nhận được thông tin trên Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"Trường hợp hộ kinh doanh đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký, cơ quan thuế cập nhật lại lý do của trạng thái 06.  Sau khi nhận được hồ sơ đề nghị khôi phục mã số thuế của hộ kinh doanh gửi đến cơ quan thuế theo quy định tại khoản 3 Điều 31 Thông tư này, cơ quan thuế xử lý theo quy định tại điểm b, d khoản 1 Điều 18 Thông tư này."},{"k":"p","t":"2. Xử lý hồ sơ khôi phục mã số thuế theo quy định tại khoản 3 Điều 31 Thông tư này, cơ quan thuế thực hiện tương tự như điểm b, d khoản 1 Điều 18 Thông tư này."},{"k":"p","t":"3. Xử lý hồ sơ khôi phục mã số thuế theo quy định tại khoản 4 Điều 31 Thông tư này"},{"k":"p","t":"Khi cơ quan thuế nhận được quyết định của Tòa án hủy bỏ quyết định tuyên bố cá nhân đã chết, mất tích hoặc mất năng lực hành vi dân sự, cơ quan thuế thực hiện khôi phục mã số thuế cho cá nhân trên Hệ thống ứng dụng đăng ký thuế trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận được quyết định của Tòa án."},{"k":"p","t":"Chương IVTỔ CHỨC THỰC HIỆN"}]},{"id":"tt90_33","no":33,"code":"Điều 33","title":"Điều 33. Công khai thông tin đăng ký thuế của người nộp thuế","shortTitle":"Công khai thông tin đăng ký thuế của người nộp thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Người nộp thuế và tổ chức, cá nhân có liên quan được tra cứu thông tin về mã số thuế trên Hệ thống thông tin quản lý thuế để phục vụ việc sử dụng mã số thuế theo quy định tại khoản 5 Điều 11 Luật số 108/2025/QH15 và Điều 8 Nghị định số 252/2026/NĐ-CP. Thông tin tra cứu bao gồm: Mã số thuế, tên người nộp thuế, địa chỉ trụ sở, trạng thái mã số thuế, tên cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"2. Cơ quan thuế thực hiện công khai thông tin đăng ký thuế của người nộp thuế theo quy định tại Điều 7 Luật số 108/2025/QH15 và Điều 4 Nghị định số 252/2026/NĐ-CP trên Hệ thống thông tin quản lý thuế đối với các trường hợp sau:"},{"k":"p","t":"a) Người nộp thuế ngừng hoạt động, chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế (trạng thái 03);"},{"k":"p","t":"b) Người nộp thuế không hoạt động tại địa chỉ đã đăng ký (trạng thái 06)."},{"k":"p","t":"3. Nội dung công khai thông tin quy định tại khoản 2 Điều này bao gồm các thông tin theo quy định tại điểm a khoản 2 Điều 4 Nghị định số 252/2026/NĐ-CP. Trường hợp cơ quan thuế ban hành văn bản để công khai thông tin đăng ký thuế thì cần công khai số hiệu văn bản, ngày văn bản và tên cơ quan thuế ban hành."},{"k":"p","t":"Khi người nộp thuế hoàn thành thủ tục chấm dứt hiệu lực mã số thuế hoặc được khôi phục mã số thuế, Hệ thống thông tin quản lý thuế tự động cập nhật tình trạng “Đã chấm dứt hiệu lực mã số thuế”, hoặc “Đã khôi phục mã số thuế về trạng thái hoạt động”, ngày chấm dứt hoặc ngày khôi phục mã số thuế."},{"k":"p","t":"4. Hình thức, thẩm quyền công khai thông tin quy định tại khoản 2 Điều này thực hiện theo quy định tại điểm b khoản 2 và khoản 3 Điều 4 Nghị định số 252/2026/NĐ-CP."}]},{"id":"tt90_34","no":34,"code":"Điều 34","title":"Điều 34. Ứng dụng Cơ sở dữ liệu quốc gia về dân cư, định danh và xác thực điện tử, cơ sở dữ liệu chuyên ngành trong thực hiện thủ tục đăng ký thuế","shortTitle":"Ứng dụng Cơ sở dữ liệu quốc gia về dân cư, định danh và xác thực điện tử, cơ sở dữ liệu chuyên ngành trong thực hiện thủ tục đăng ký thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế thực hiện khai thác thông tin của người nộp thuế trong Cơ sở dữ liệu quốc gia về dân cư và các cơ sở dữ liệu chuyên ngành phù hợp với lộ trình triển khai kết nối, chia sẻ thông tin giữa Cơ sở dữ liệu quốc gia về dân cư, cơ sở dữ liệu chuyên ngành và cơ sở dữ liệu thuế để giải quyết thủ tục đăng ký thuế cho người nộp thuế theo quy định tại Thông tư này và phải lưu trữ, bảo quản thông tin, dữ liệu bảo đảm an toàn, bảo mật theo quy định của pháp luật. Trường hợp các thông tin đã có trong Cơ sở dữ liệu quốc gia về dân cư, cơ sở dữ liệu chuyên ngành và đã được kết nối, chia sẻ với cơ sở dữ liệu thuế thì không yêu cầu người nộp thuế khai báo lại hoặc cung cấp lại giấy tờ đã có với cơ quan thuế."},{"k":"p","t":"2. Tổ chức, cá nhân sử dụng tài khoản định danh điện tử do hệ thống định danh và xác thực điện tử tạo lập để thực hiện thủ tục đăng ký thuế theo quy định tại Thông tư này trên môi trường điện tử theo quy định tại Nghị định số 69/2024/NĐ-CP quy định về định danh và xác thực điện tử."},{"k":"p","t":"Trường hợp cá nhân đã đăng ký và kích hoạt tài khoản định danh điện tử mức độ 2 theo quy định tại khoản 2 Điều 10, khoản 2 Điều 11 và Điều 14 Nghị định số 69/2024/NĐ-CP để thực hiện thủ tục đăng ký thuế với cơ quan thuế thì không phải nộp bản sao điện tử hộ chiếu trong hồ sơ đăng ký thuế theo quy định tại khoản 1 Điều 21, khoản 1 Điều 23 Thông tư này nếu hộ chiếu đã được tích hợp vào tài khoản định danh điện tử."},{"k":"p","t":"3. Trường hợp Cơ sở dữ liệu quốc gia về dân cư đã kết nối, chia sẻ dữ liệu với cơ sở dữ liệu thuế và tự động đồng bộ khi cấp mới, thay đổi thông tin số định danh cá nhân thì cá nhân không phải đăng ký thuế theo quy định tại điểm b.2, b.3 khoản 1 Điều 21 Thông tư này."}]},{"id":"tt90_35","no":35,"code":"Điều 35","title":"Điều 35. Giải quyết thủ tục cho người nộp thuế theo quy trình dự phòng","shortTitle":"Giải quyết thủ tục cho người nộp thuế theo quy trình dự phòng","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế giải quyết thủ tục đăng ký thuế cho người nộp thuế quy định tại Thông tư này theo quy trình dự phòng trong các trường hợp sau:"},{"k":"p","t":"a) Hệ thống ứng dụng đăng ký thuế, hoặc hệ thống thông tin về đăng ký kinh doanh, hoặc hệ thống Cơ sở dữ liệu quốc gia về dân cư gặp sự cố kỹ thuật."},{"k":"p","t":"b) Các trường hợp bất khả kháng."},{"k":"p","t":"2. Căn cứ vào thời gian dự kiến khắc phục sự cố Hệ thống ứng dụng đăng ký thuế, hệ thống thông tin về đăng ký kinh doanh, hoặc hệ thống Cơ sở dữ liệu quốc gia về dân cư, Cục Thuế thông báo trước về thời gian dự kiến để cơ quan thuế giải quyết thủ tục cho người nộp thuế theo quy trình dự phòng, trừ trường hợp bất khả kháng."},{"k":"p","t":"3. Việc giải quyết thủ tục cho người nộp thuế theo quy trình dự phòng thực hiện theo quy trình xử lý hồ sơ bằng bản giấy. Cơ quan thuế trả kết quả cho người nộp thuế theo thời hạn quy định qua dịch vụ bưu chính trong trường hợp không gửi được bằng phương thức điện tử, đồng thời sau khi hệ thống được khắc phục, cơ quan thuế thực hiện gửi kết quả điện tử qua Cổng Dịch vụ công quốc gia hoặc Hệ thống thông tin quản lý thuế."},{"k":"p","t":"4. Trong thời hạn 30 ngày kể từ ngày nhận được thông báo của Cục Thuế về việc Hệ thống ứng dụng đăng ký thuế hoàn thành việc khắc phục sự cố, cơ quan thuế phải cập nhật, bổ sung dữ liệu, thông tin đã giải quyết cho người nộp thuế theo quy trình dự phòng vào Hệ thống ứng dụng đăng ký thuế."}]},{"id":"tt90_36","no":36,"code":"Điều 36","title":"Điều 36. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01 tháng 7 năm 2026, thay thế Thông tư số 86/2024/TT-BTC ngày 23 tháng 12 năm 2024 của Bộ trưởng Bộ Tài chính quy định về đăng ký thuế."},{"k":"p","t":"2. Việc áp dụng toàn bộ các hình thức giao dịch điện tử trong phạm vi đăng ký thuế được thực hiện theo lộ trình của cơ quan thuế quy định tại khoản 4 Điều 52 Luật số 108/2025/QH15."},{"k":"p","t":"3. Thông tư này bãi bỏ nội dung tại Điều 10 Thông tư số 40/2025/TT-BTC ngày 13 tháng 6 năm 2025 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số điều của các Thông tư thuộc lĩnh vực quản lý thuế để phân định thẩm quyền của chính quyền địa phương theo mô hình tổ chức chính quyền địa phương 02 cấp."},{"k":"p","t":"4. Trường hợp các văn bản quy phạm pháp luật viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản mới được sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"tt90_37","no":37,"code":"Điều 37","title":"Điều 37. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Các hồ sơ đăng ký thuế, thông báo thay đổi thông tin đăng ký thuế, thông báo tạm ngừng hoạt động kinh doanh, chấm dứt hiệu lực mã số thuế, khôi phục mã số thuế đã nộp đến cơ quan thuế trước ngày Thông tư này có hiệu lực thi hành thì cơ quan thuế tiếp tục xử lý theo quy định của pháp luật về quản lý thuế tại thời điểm nộp hồ sơ."},{"k":"p","t":"2. Người nộp thuế đã được cấp mã số thuế trước ngày Thông tư này có hiệu lực thi hành thì tiếp tục sử dụng mã số thuế đã được cấp, riêng trường hợp cá nhân, hộ gia đình, hộ kinh doanh, cá nhân kinh doanh quy định tại khoản 1 Điều 11 Luật số 108/2025/QH15 thì sử dụng số định danh cá nhân làm mã số thuế."},{"k":"p","t":"3. Trường hợp cá nhân, hộ gia đình, hộ kinh doanh, cá nhân kinh doanh quy định tại khoản 1 Điều 11 Luật số 108/2025/QH15 đã được cấp mã số thuế trước ngày 01/7/2025 nhưng thông tin đăng ký thuế của cá nhân, chủ hộ gia đình, chủ hộ kinh doanh, cá nhân kinh doanh không khớp đúng với thông tin của cá nhân được lưu trữ trong Cơ sở dữ liệu quốc gia về dân cư hoặc không đầy đủ (được cơ quan thuế cập nhật mã số thuế sang trạng thái 10 “Mã số thuế chờ cập nhật thông tin số định danh cá nhân”), người nộp thuế phải thực hiện thủ tục thay đổi thông tin đăng ký thuế với cơ quan thuế theo quy định tại khoản 1, khoản 4 Điều 23 Thông tư này để đảm bảo thông tin khớp đúng với Cơ sở dữ liệu quốc gia về dân cư trước khi sử dụng số định danh cá nhân làm mã số thuế."},{"k":"p","t":"4. Trường hợp cá nhân đã được cấp nhiều hơn 01 (một) mã số thuế, người nộp thuế phải cập nhật thông tin số định danh cá nhân cho các mã số thuế đã được cấp để cơ quan thuế tích hợp các mã số thuế vào số định danh cá nhân, hợp nhất dữ liệu thuế của người nộp thuế theo số định danh cá nhân."},{"k":"p","t":"Khi mã số thuế đã được tích hợp vào số định danh cá nhân thì các hóa đơn, chứng từ, hồ sơ thuế, giấy tờ có giá trị pháp lý khác đã lập có sử dụng thông tin mã số thuế của cá nhân tiếp tục được sử dụng để thực hiện các thủ tục hành chính về thuế, chứng minh việc thực hiện nghĩa vụ thuế mà không phải điều chỉnh thông tin mã số thuế trên hóa đơn, chứng từ, hồ sơ thuế sang số định danh cá nhân."},{"k":"p","t":"5. Cá nhân, hộ gia đình, hộ kinh doanh, cá nhân kinh doanh thực hiện tra cứu thông tin đăng ký thuế đã được cơ quan thuế đối chiếu khớp đúng hoặc không khớp đúng với Cơ sở dữ liệu quốc gia về dân cư trên Cổng Dịch vụ công quốc gia hoặc Hệ thống thông tin quản lý thuế hoặc trên tài khoản giao dịch điện tử. Trường hợp thông tin có sai sót, người nộp thuế liên hệ với cơ quan thuế quản lý trực tiếp hoặc Thuế cơ sở nơi cá nhân cư trú để cập nhật thông tin chính xác vào Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"6. Trường hợp doanh nghiệp, hợp tác xã, hộ kinh doanh đã được cấp giấy chứng nhận đăng ký kinh doanh nhưng chưa được cấp mã số thuế thì cơ quan thuế hướng dẫn người nộp thuế nộp hồ sơ đăng ký thuế theo quy định tại Điều 7, Điều 21 Thông tư này để được cấp mã số thuế và thực hiện thủ tục liên thông theo quy định sau khi được cấp mã số thuế. Việc xử lý vi phạm đối với người nộp thuế thực hiện theo quy định tại Nghị định số 125/2020/NĐ-CP quy định xử phạt vi phạm hành chính về thuế, hóa đơn được sửa đổi, bổ sung bởi Nghị định số 310/2025/NĐ-CP."},{"k":"p","t":"Trường hợp thuộc diện thu hồi giấy chứng nhận đăng ký kinh doanh theo quy định của Luật Doanh nghiệp, Luật Hợp tác xã, cơ quan thuế gửi văn bản đề nghị cơ quan đăng ký kinh doanh thực hiện thu hồi giấy chứng nhận theo quy định của pháp luật."}]},{"id":"tt90_38","no":38,"code":"Điều 38","title":"Điều 38. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Cục Thuế chịu trách nhiệm tổ chức thực hiện hướng dẫn cơ quan thuế các cấp trong việc đăng ký thuế, cấp mã số thuế, cấp Giấy chứng nhận đăng ký thuế, cấp Thông báo mã số thuế và quản lý sử dụng mã số thuế; xây dựng cơ sở dữ liệu về hộ kinh doanh, cá nhân kinh doanh để phục vụ công tác quản lý thuế; đồng thời cung cấp đầy đủ thông tin cho người nộp thuế thực hiện nghĩa vụ thuế theo quy định của pháp luật thuế; ban hành quy định nội bộ về phân công cơ quan thuế quản lý đối với người nộp thuế để thực hiện đồng thời với việc giải quyết thủ tục đăng ký thuế."},{"k":"p","t":"2. Cơ quan thuế các cấp có trách nhiệm phổ biến, hướng dẫn người nộp thuế, tổ chức, cá nhân có liên quan thực hiện theo nội dung quy định tại Thông tư này."},{"k":"p","t":"3. Cơ quan thuế có trách nhiệm xử lý khôi phục mã số thuế của người nộp thuế để khắc phục sai sót của cơ quan thuế trong trường hợp đã chấm dứt hiệu lực mã số thuế của người nộp thuế không đúng trường hợp chấm dứt hiệu lực mã số thuế theo quy định của pháp luật quản lý thuế; hoặc đã xử lý chấm dứt hiệu lực mã số thuế của người nộp thuế không đầy đủ trình tự, thủ tục theo quy định; hoặc khôi phục mã số thuế của người nộp thuế để phục vụ xử lý các nghiệp vụ yêu cầu phải sử dụng mã số thuế trong trường hợp người nộp thuế phát sinh thêm các nghĩa vụ với ngân sách nhà nước theo kết quả xử lý của cơ quan thuế, cơ quan có thẩm quyền sau khi đã bị cơ quan thuế chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"4. Người nộp thuế, tổ chức, cá nhân có liên quan thuộc đối tượng áp dụng của Thông tư này thực hiện đầy đủ các hướng dẫn tại Thông tư này."},{"k":"p","t":"Trường hợp cá nhân là công dân Việt Nam chưa được cấp số định danh cá nhân thì cá nhân phải liên hệ với cơ quan Công an cấp xã để thu thập thông tin vào Cơ sở dữ liệu quốc gia về dân cư và cấp số định danh cá nhân trước khi thực hiện thủ tục đăng ký thuế theo quy định tại Thông tư này."},{"k":"p","t":"Trong quá trình triển khai thực hiện nếu có vướng mắc, đề nghị tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để nghiên cứu giải quyết./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Văn phòng Trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chính phủ;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Chủ tịch nước;- Cơ sở dữ liệu quốc gia về pháp luật;- Viện kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- Cơ quan Trung ương của các đoàn thể;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc trung ương;- Chi cục Hải quan, Kho bạc Nhà nước khu vực;- Cục Kiểm tra văn bản và Tổ chức thi hành pháp luật, Bộ Tư pháp;- Công báo, Cổng Thông tin điện tử của Chính phủ;- Cổng Thông tin điện tử Bộ Tài chính;- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, CT.","KT. BỘ TRƯỞNGTHỨ TRƯỞNG\nCao Anh Tuấn"]]}]}],"refs":{},"details":{},"summaries":{}}</script>

var D=JSON.parse(document.getElementById('LD').textContent);

function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
