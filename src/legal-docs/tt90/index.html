<script id="LD" type="application/json">{"meta":{"title":"Thông tư 90/2026/TT-BTC — Quy định về đăng ký thuế","shortCode":"TT 90/2026","subtitle":"Đăng ký thuế (thay TT86/2024)","slug":"tt90","effectiveDate":"01/07/2026","scope":"Thông tư này quy định các nội dung sau: 1. Quy định chi tiết các điều, khoản được giao tại Luật số 108/2025/QH15 gồm: a) Khoản 1 Điều 10 về phạm vi đăng ký thuế và khoản 3 Điều 10 về các trường hợp thực hiện đăng ký thuế trực tiếp với cơ quan thuế; b) Khoản 1, 2, 3 và 4 Điều 11 về mã số thuế. 2. Quy định chi tiết các nội dung được giao tại Nghị định số 252/2026/NĐ-CP gồm: a) Điểm b khoản 1 Điều 40","description":"Đăng ký thuế (thay TT86/2024)","related":[]},"outline":[{"id":"tt90_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này quy định các nội dung sau:"},{"k":"p","t":"1. Quy định chi tiết các điều, khoản được giao tại Luật số 108/2025/QH15 gồm:"},{"k":"p","t":"a) Khoản 1 Điều 10 về phạm vi đăng ký thuế và khoản 3 Điều 10 về các trường hợp thực hiện đăng ký thuế trực tiếp với cơ quan thuế;"},{"k":"p","t":"b) Khoản 1, 2, 3 và 4 Điều 11 về mã số thuế."},{"k":"p","t":"2. Quy định chi tiết các nội dung được giao tại Nghị định số 252/2026/NĐ-CP gồm:"},{"k":"p","t":"a) Điểm b khoản 1 Điều 40 Nghị định số 252/2026/NĐ-CP về thực hiện thay đổi thông tin đăng ký thuế của nhà cung cấp nước ngoài;"},{"k":"p","t":"b) Điểm a khoản 1 Điều 45 Nghị định số 252/2026/NĐ-CP về thực hiện đăng ký thuế và cấp mã số thuế riêng cho việc khai và nộp thay số thuế đã khấu trừ của chủ quản nền tảng thương mại điện tử ở trong nước, tổ chức tại Việt Nam có hoạt động kinh tế số khác."}]},{"id":"tt90_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng áp dụng quy định tại Thông tư này bao gồm: người nộp thuế; cơ quan quản lý thuế; công chức quản lý thuế; cơ quan nhà nước, tổ chức, cá nhân khác có liên quan đến quản lý thuế đối với đăng ký thuế."}]},{"id":"tt90_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Trong Thông tư này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. “Đơn vị độc lập” là tổ chức có tư cách pháp nhân hoặc tổ chức không có tư cách pháp nhân nhưng tự chịu trách nhiệm trước pháp luật về toàn bộ nghĩa vụ thuế và các khoản thu khác với ngân sách nhà nước theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"2. “Đơn vị chủ quản” là người nộp thuế có đơn vị phụ thuộc. Đơn vị chủ quản chịu trách nhiệm trước pháp luật về toàn bộ nghĩa vụ thuế bao gồm cả nghĩa vụ thuế do đơn vị phụ thuộc thực hiện theo quy định."},{"k":"p","t":"3. “Đơn vị phụ thuộc” không hoạt động độc lập mà phụ thuộc vào sự tồn tại, hoạt động của đơn vị chủ quản. Việc đăng ký thuế, kê khai, nộp thuế của đơn vị phụ thuộc được thực hiện theo quy định của pháp luật về quản lý thuế và theo phân cấp của đơn vị chủ quản. Trong đó:"},{"k":"p","t":"a) “Đơn vị phụ thuộc” của doanh nghiệp, hợp tác xã là chi nhánh, văn phòng đại diện của doanh nghiệp, hợp tác xã theo quy định của pháp luật về đăng ký doanh nghiệp, đăng ký hợp tác xã;"},{"k":"p","t":"b) “Đơn vị phụ thuộc” của tổ chức kinh tế, tổ chức khác là chi nhánh, văn phòng đại diện, nơi cụ thể khác tiến hành hoạt động, kinh doanh của tổ chức."},{"k":"p","t":"4. “Địa điểm kinh doanh của doanh nghiệp, hợp tác xã” được thực hiện theo quy định của pháp luật về đăng ký doanh nghiệp, đăng ký hợp tác xã."},{"k":"p","t":"5. “Địa điểm kinh doanh của hộ kinh doanh, cá nhân kinh doanh” là cửa hàng, cửa hiệu hoặc nơi cụ thể khác để tiến hành hoạt động, kinh doanh của hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"6. “Cơ quan chi trả thu nhập” là tổ chức, cá nhân chi trả thu nhập từ tiền lương, tiền công và các khoản thu nhập chịu thuế thu nhập cá nhân khác cho người nộp thuế là cá nhân theo quy định của pháp luật thuế và pháp luật về quản lý thuế."},{"k":"p","t":"7. “Hệ thống ứng dụng đăng ký thuế” là một cấu phần của Hệ thống thông tin quản lý thuế do Cục Thuế xây dựng, quản lý, sử dụng thống nhất trong toàn ngành thuế để thực hiện công tác quản lý thuế về đăng ký thuế."},{"k":"p","t":"8. Hợp tác xã, liên hiệp hợp tác xã gọi chung là “hợp tác xã”."},{"k":"p","t":"9. Hợp đồng dầu khí theo quy định của Luật Dầu khí, hiệp định ký kết theo quy định của Luật Điều ước quốc tế để tiến hành hoạt động dầu khí tại Việt Nam gọi chung là “hợp đồng dầu khí”."},{"k":"p","t":"10. Hệ thống thông tin quốc gia về đăng ký doanh nghiệp, Hệ thống thông tin về đăng ký hợp tác xã, Hệ thống thông tin về đăng ký hộ kinh doanh gọi chung là “hệ thống thông tin về đăng ký kinh doanh”."},{"k":"p","t":"11. Giấy chứng nhận đăng ký doanh nghiệp, Giấy chứng nhận đăng ký hợp tác xã, Giấy chứng nhận đăng ký hộ kinh doanh và các giấy tờ tương đương do cơ quan đăng ký kinh doanh cấp cho doanh nghiệp, hợp tác xã, tổ hợp tác, tổ chức khác, hộ kinh doanh gọi chung là “giấy chứng nhận đăng ký kinh doanh”."}]},{"id":"tt90_4","no":4,"code":"Điều 4","title":"Điều 4. Đối tượng đăng ký thuế","shortTitle":"Đối tượng đăng ký thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng đăng ký thuế bao gồm:"},{"k":"p","t":"a) Người nộp thuế thuộc đối tượng thực hiện đăng ký thuế theo cơ chế một cửa liên thông theo quy định tại khoản 2 Điều 10 Luật số 108/2025/QH15;"},{"k":"p","t":"b) Người nộp thuế thuộc đối tượng thực hiện đăng ký thuế trực tiếp với cơ quan thuế theo quy định tại khoản 3 Điều 10 Luật số 108/2025/QH15."},{"k":"p","t":"2. Người nộp thuế thuộc đối tượng thực hiện đăng ký thuế trực tiếp với cơ quan thuế, bao gồm:"},{"k":"p","t":"a) Doanh nghiệp hoạt động trong các lĩnh vực chuyên ngành không phải đăng ký doanh nghiệp qua cơ quan đăng ký kinh doanh theo quy định của pháp luật chuyên ngành (sau đây gọi là Tổ chức kinh tế);"},{"k":"p","t":"b) Đơn vị sự nghiệp, tổ chức kinh tế của lực lượng vũ trang, tổ chức kinh tế của các tổ chức chính trị, chính trị - xã hội, xã hội, xã hội - nghề nghiệp hoạt động kinh doanh theo quy định của pháp luật nhưng không phải đăng ký doanh nghiệp qua cơ quan đăng ký kinh doanh; tổ chức của các nước có chung đường biên giới đất liền với Việt Nam thực hiện hoạt động mua, bán, trao đổi hàng hóa tại chợ biên giới, chợ cửa khẩu, chợ trong khu kinh tế cửa khẩu; văn phòng đại diện của tổ chức nước ngoài tại Việt Nam; tổ hợp tác được thành lập và tổ chức hoạt động theo quy định tại Nghị định số 77/2019/NĐ-CP về tổ hợp tác nhưng không thuộc trường hợp đăng ký kinh doanh qua cơ quan đăng ký kinh doanh theo quy định tại khoản 2 Điều 107 Luật Hợp tác xã số 17/2023/QH15 (sau đây gọi là Tổ chức kinh tế);"},{"k":"p","t":"c) Tổ chức được thành lập bởi cơ quan có thẩm quyền không có hoạt động sản xuất, kinh doanh nhưng phát sinh nghĩa vụ với ngân sách nhà nước (sau đây gọi là Tổ chức khác);"},{"k":"p","t":"d) Người nộp thuế được hoàn thuế giá trị gia tăng theo quy định của pháp luật về thuế giá trị gia tăng trong các trường hợp (sau đây gọi là Tổ chức khác), bao gồm:"},{"k":"p","t":"d.1) Tổ chức ở Việt Nam sử dụng tiền viện trợ không hoàn lại, tiền viện trợ nhân đạo của tổ chức, cá nhân nước ngoài để mua hàng hóa, dịch vụ phục vụ cho chương trình, dự án viện trợ không hoàn lại, viện trợ nhân đạo tại Việt Nam; Chủ chương trình, dự án, phi dự án hoặc nhà thầu chính (bao gồm cả Văn phòng điều hành của nhà thầu chính tại Việt Nam), tổ chức do phía nhà tài trợ nước ngoài chỉ định việc quản lý chương trình, dự án sử dụng vốn ODA (bao gồm cả Văn phòng đại diện của nhà tài trợ hoặc tổ chức quản lý, thực hiện chương trình, dự án do nhà tài trợ chỉ định);"},{"k":"p","t":"d.2) Đối tượng được hưởng quyền ưu đãi miễn trừ ngoại giao theo quy định của pháp luật về ngoại giao mua hàng hóa, dịch vụ tại Việt Nam để sử dụng;"},{"k":"p","t":"đ) Tổ chức nước ngoài có phát sinh doanh thu tại Việt Nam thông qua hoạt động kinh doanh trên nền tảng thương mại điện tử theo quy định tại khoản 1 Điều 40 Nghị định số 252/2026/NĐ-CP (sau đây gọi là nhà cung cấp nước ngoài)."},{"k":"p","t":"Nhà cung cấp nước ngoài không phải thực hiện thủ tục đăng ký thuế trong trường hợp toàn bộ doanh thu phát sinh tại Việt Nam đã được khấu trừ, nộp thay thuế;"},{"k":"p","t":"e) Cá nhân không cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử không có chức năng đặt hàng trực tuyến và chức năng thanh toán theo quy định tại Điều 42 Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"g) Tổ chức nước ngoài không có tư cách pháp nhân tại Việt Nam (trừ nhà cung cấp nước ngoài quy định tại điểm đ khoản này), cá nhân nước ngoài hành nghề độc lập kinh doanh tại Việt Nam (trừ cá nhân không cư trú quy định tại điểm e khoản này) phù hợp với pháp luật Việt Nam có thu nhập phát sinh tại Việt Nam hoặc có phát sinh nghĩa vụ thuế tại Việt Nam (sau đây gọi là nhà thầu nước ngoài, nhà thầu phụ nước ngoài);"},{"k":"p","t":"h) Doanh nghiệp, tổ chức, cá nhân có trách nhiệm khấu trừ và nộp thay số thuế đã khấu trừ của người nộp thuế khác (sau đây gọi là tổ chức, cá nhân khấu trừ nộp thay) trong các trường hợp sau:"},{"k":"p","t":"h.1) Doanh nghiệp, tổ chức, cá nhân khấu trừ và nộp thay thuế cho nhà thầu nước ngoài, nhà thầu phụ nước ngoài;"},{"k":"p","t":"h.2) Tổ chức kinh doanh tại Việt Nam áp dụng phương pháp tính thuế giá trị gia tăng là phương pháp khấu trừ thuế thực hiện khấu trừ và nộp thay thuế cho nhà cung cấp nước ngoài;"},{"k":"p","t":"h.3) Chủ quản nền tảng thương mại điện tử, nền tảng số khác ở trong nước có chức năng đặt hàng trực tuyến và chức năng thanh toán theo quy định tại Điều 43 Nghị định số 252/2026/NĐ-CP khấu trừ và nộp thay thuế cho nhà cung cấp nước ngoài, hộ kinh doanh, cá nhân kinh doanh (bao gồm cá nhân cư trú và cá nhân không cư trú);"},{"k":"p","t":"h.4) Doanh nghiệp, tổ chức, cá nhân khấu trừ và nộp thay thuế cho cá nhân có hợp đồng hoặc văn bản hợp tác kinh doanh;"},{"k":"p","t":"Riêng tổ chức chi trả thu nhập khi khấu trừ, nộp thay thuế thu nhập cá nhân sử dụng mã số thuế đã cấp của tổ chức chi trả thu nhập để khai, nộp thuế thu nhập cá nhân khấu trừ, nộp thay;"},{"k":"p","t":"i) Công ty điều hành chung, văn phòng điều hành, tổ chức được người điều hành phân công, ủy quyền điều hành dự án dầu khí theo quy định của pháp luật dầu khí (gọi chung là người điều hành); doanh nghiệp liên doanh; tổ chức được Chính phủ Việt Nam giao nhiệm vụ tiếp nhận phần được chia của Việt Nam thuộc các mỏ dầu khí tại vùng chồng lấn; nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí; công ty mẹ - Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam đại diện nước chủ nhà nhận phần lãi được chia từ các hợp đồng dầu khí;"},{"k":"p","t":"k) Hộ gia đình, cá nhân có hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng không phải đăng ký hộ kinh doanh theo quy định của pháp luật về đăng ký doanh nghiệp; cá nhân kinh doanh của các nước có chung đường biên giới đất liền với Việt Nam thực hiện hoạt động mua, bán, trao đổi hàng hóa tại chợ biên giới, chợ cửa khẩu, chợ trong khu kinh tế cửa khẩu;"},{"k":"p","t":"l) Cá nhân có thu nhập thuộc diện chịu thuế thu nhập cá nhân (trừ cá nhân kinh doanh);"},{"k":"p","t":"m) Cá nhân là người phụ thuộc theo quy định của pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"n) Tổ chức, cá nhân được cơ quan thuế ủy nhiệm thu;"},{"k":"p","t":"o) Tổ chức kê khai và nộp thuế thu nhập doanh nghiệp bổ sung theo quy định về thuế tối thiểu toàn cầu;"},{"k":"p","t":"p) Tổ chức, hộ gia đình và cá nhân khác có nghĩa vụ với ngân sách nhà nước."}]},{"id":"tt90_5","no":5,"code":"Điều 5","title":"Điều 5. Cấu trúc mã số thuế","shortTitle":"Cấu trúc mã số thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Mã số thuế thực hiện theo quy định tại khoản 1, 2, 3 và 4 Điều 11 Luật số 108/2025/QH15. Trường hợp mã số thuế do cơ quan thuế cấp, cấu trúc mã số thuế như sau:"},{"k":"p","t":"N1N2N3N4N5N6N7N8N9N10 - N11N12N13"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- Hai chữ số đầu N1N2 là số phân khoảng của mã số thuế;"},{"k":"p","t":"- Bảy chữ số N3N4N5N6N7N8N9 được quy định theo một cấu trúc xác định, tăng dần trong khoảng từ 0000001 đến 9999999;"},{"k":"p","t":"- Chữ số N10 là chữ số kiểm tra;"},{"k":"p","t":"- Ba chữ số N11N12N13 là các số thứ tự từ 001 đến 999;"},{"k":"p","t":"- Dấu gạch ngang (-) là ký tự để phân tách nhóm 10 chữ số đầu và nhóm 3 chữ số cuối."},{"k":"p","t":"2. Phân loại cấu trúc mã số thuế do cơ quan thuế cấp"},{"k":"p","t":"a) Mã số thuế 10 chữ số được sử dụng cho tổ chức là đơn vị độc lập; cá nhân là người có quốc tịch nước ngoài hoặc là người có quốc tịch Việt Nam sinh sống tại nước ngoài không có số định danh cá nhân được xác lập từ Cơ sở dữ liệu quốc gia về dân cư;"},{"k":"p","t":"b) Mã số thuế 13 chữ số và dấu gạch ngang (-) dùng để phân tách giữa 10 số đầu và 3 số cuối được sử dụng cho đơn vị phụ thuộc và các đối tượng khác quy định tại điểm e, g của khoản này;"},{"k":"p","t":"c) Trường hợp người nộp thuế có hệ thống đơn vị phụ thuộc nhiều cấp từ tỉnh đến xã với số lượng đơn vị phụ thuộc lớn hơn 1.000, đã được áp dụng cấu trúc mã số thuế 10 chữ số cho các đơn vị phụ thuộc tại địa bàn cấp tỉnh và mã số thuế 13 chữ số cho các đơn vị phụ thuộc dưới địa bàn cấp tỉnh theo quy định tại các Thông tư của Bộ Tài chính đã ban hành trước đây, sau khi tổ chức lại các đơn vị phụ thuộc trong phạm vi hệ thống thì tiếp tục được thực hiện theo cấu trúc mã số thuế đang áp dụng;"},{"k":"p","t":"d) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài theo quy định tại điểm g khoản 2 Điều 4 Thông tư này đăng ký nộp thuế nhà thầu trực tiếp với cơ quan thuế thì được cấp mã số thuế 10 chữ số theo từng hợp đồng. Trường hợp có nhiều nhà thầu nước ngoài thuộc diện nộp thuế trực tiếp với cơ quan thuế trên cùng một hợp đồng nhà thầu ký với bên Việt Nam và các nhà thầu có nhu cầu kê khai, nộp thuế riêng thì mỗi nhà thầu nước ngoài được cấp riêng một mã số thuế 10 chữ số."},{"k":"p","t":"Trường hợp nhà thầu nước ngoài liên danh với các tổ chức kinh tế Việt Nam để tiến hành kinh doanh tại Việt Nam trên cơ sở hợp đồng thầu và các bên tham gia liên danh thành lập ra Ban điều hành liên danh, Ban điều hành liên danh thực hiện hạch toán kế toán, có tài khoản tại ngân hàng, chịu trách nhiệm phát hành hóa đơn; hoặc tổ chức kinh tế tại Việt Nam tham gia liên danh chịu trách nhiệm hạch toán chung và chia lợi nhuận cho các bên tham gia liên danh thì được cấp mã số thuế 10 chữ số để kê khai, nộp thuế cho hợp đồng thầu."},{"k":"p","t":"Trường hợp nhà thầu nước ngoài, nhà thầu phụ nước ngoài có văn phòng tại Việt Nam đã được bên Việt Nam kê khai, khấu trừ nộp thay thuế nhà thầu thì nhà thầu nước ngoài, nhà thầu phụ nước ngoài được cấp một mã số thuế 10 chữ số để kê khai tất cả các nghĩa vụ thuế khác (trừ thuế nhà thầu) tại Việt Nam và cung cấp mã số thuế cho bên Việt Nam;"},{"k":"p","t":"đ) Nhà cung cấp nước ngoài theo quy định tại điểm đ khoản 2 Điều 4 Thông tư này chưa có mã số thuế tại Việt Nam thực hiện thủ tục đăng ký thuế trực tiếp với cơ quan thuế được cấp mã số thuế 10 chữ số. Nhà cung cấp nước ngoài sử dụng mã số thuế được cấp để trực tiếp khai, nộp thuế đối với nghĩa vụ thuế của nhà cung cấp nước ngoài hoặc cung cấp mã số thuế cho tổ chức kinh doanh tại Việt Nam áp dụng phương pháp tính thuế giá trị gia tăng là phương pháp khấu trừ thuế, chủ quản nền tảng thương mại điện tử để thực hiện khấu trừ, nộp thay thuế theo quy định tại Điều 43 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"Nhà cung cấp nước ngoài là chủ quản nền tảng thương mại điện tử, nền tảng số khác có chức năng đặt hàng trực tuyến và chức năng thanh toán sử dụng mã số thuế được cấp để khấu trừ, nộp thay thuế của tổ chức ở nước ngoài, hộ kinh doanh, cá nhân kinh doanh (bao gồm cá nhân cư trú và cá nhân không cư trú) có hoạt động kinh doanh trên nền tảng thương mại điện tử hoặc cung cấp mã số thuế cho tổ chức, cá nhân tại Việt Nam được nhà cung cấp nước ngoài ủy quyền để kê khai thuế, nộp thay thuế;"},{"k":"p","t":"e) Tổ chức, cá nhân khấu trừ, nộp thay thuế theo quy định tại điểm h khoản 2 Điều 4 Thông tư này được cấp mã số thuế 10 chữ số (sau đây gọi là mã số thuế nộp thay) để kê khai, nộp thay thuế cho mỗi nhóm đối tượng được khấu trừ, nộp thay."},{"k":"p","t":"Mỗi nhà thầu nước ngoài, nhà thầu phụ nước ngoài theo quy định tại điểm g khoản 2 Điều 4 Thông tư này được bên Việt Nam kê khai, nộp thay thuế nhà thầu thì được cấp mã số thuế 13 chữ số theo mã số thuế nộp thay của bên Việt Nam để thực hiện xác nhận hoàn thành nghĩa vụ thuế nhà thầu tại Việt Nam nếu có nhu cầu cấp mã số thuế riêng cho từng nhà thầu. Trường hợp đã được cấp mã số thuế kê khai, nộp thay thuế nhà thầu trước đó mà phát sinh thêm hợp đồng nhà thầu nước ngoài khác thì thực hiện kê khai bổ sung thông tin hợp đồng nhà thầu tại Bảng kê các hợp đồng nhà thầu nước ngoài, nhà thầu phụ nước ngoài nộp thuế thông qua bên Việt Nam mẫu số 04.1-ĐKT-BK ban hành kèm theo Thông tư này."},{"k":"p","t":"Khi người nộp thuế thông báo thay đổi thông tin đăng ký thuế, tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn, chấm dứt hiệu lực mã số thuế và khôi phục mã số thuế theo quy định đối với mã số thuế của người nộp thuế thì mã số thuế nộp thay và các mã số thuế 13 chữ số theo mã số thuế nộp thay được cơ quan thuế cập nhật tương ứng theo thông tin, trạng thái mã số thuế của người nộp thuế. Người nộp thuế không phải nộp hồ sơ theo quy định tại Chương II, Chương III Thông tư này đối với mã số thuế nộp thay;"},{"k":"p","t":"g) Người điều hành, doanh nghiệp liên doanh, tổ chức được Chính phủ Việt Nam giao nhiệm vụ tiếp nhận phần được chia của Việt Nam thuộc các mỏ dầu khí tại vùng chồng lấn theo quy định tại điểm i khoản 2 Điều 4 Thông tư này được cấp mã số thuế 10 chữ số theo từng hợp đồng dầu khí hoặc văn bản thỏa thuận hoặc giấy tờ tương đương khác. Nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí được cấp mã số thuế 13 chữ số theo mã số thuế 10 chữ số của từng hợp đồng dầu khí để thực hiện nghĩa vụ thuế riêng theo hợp đồng dầu khí (bao gồm cả thuế thu nhập doanh nghiệp đối với thu nhập từ chuyển nhượng quyền lợi tham gia hợp đồng dầu khí). Công ty mẹ - Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam đại diện nước chủ nhà nhận phần lãi được chia từ các hợp đồng dầu khí được cấp mã số thuế 13 chữ số theo mã số thuế 10 chữ số của từng hợp đồng dầu khí để kê khai, nộp thuế đối với phần lãi được chia theo từng hợp đồng dầu khí;"},{"k":"p","t":"h) Tổ chức, cá nhân theo quy định tại điểm n khoản 2 Điều 4 Thông tư này có một hoặc nhiều hợp đồng ủy nhiệm thu với một cơ quan thuế thì được cấp một mã số thuế nộp thay để nộp khoản tiền đã thu của người nộp thuế vào ngân sách nhà nước;"},{"k":"p","t":"i) Tổ chức theo quy định tại điểm o khoản 2 Điều 4 Thông tư này được cấp mã số thuế 10 chữ số để trực tiếp kê khai và nộp thuế thu nhập doanh nghiệp bổ sung theo quy định về thuế tối thiểu toàn cầu. Nội dung đăng ký thuế thực hiện theo quy định tại Điều 15 Nghị định số 236/2025/NĐ-CP quy định chi tiết một số điều của Nghị quyết số 107/2023/QH15 về việc áp dụng thuế thu nhập doanh nghiệp bổ sung theo quy định chống xói mòn cơ sở thuế toàn cầu và Thông tư này."},{"k":"p","t":"3. Việc cấp mã số thuế được quy định như sau:"},{"k":"p","t":"a) Tổ chức được cấp 01 mã số thuế duy nhất để sử dụng trong suốt quá trình hoạt động từ khi đăng ký thuế cho đến khi chấm dứt hiệu lực mã số thuế (trừ trường hợp được cấp mã số thuế nộp thay theo quy định tại điểm e khoản 2 Điều này);"},{"k":"p","t":"b) Cá nhân được cấp 01 mã số thuế duy nhất để sử dụng trong suốt cuộc đời của cá nhân đó (trừ trường hợp được cấp mã số thuế nộp thay theo quy định tại điểm e khoản 2 Điều này)."},{"k":"p","t":"Người phụ thuộc của cá nhân được cấp mã số thuế để giảm trừ gia cảnh cho người nộp thuế thu nhập cá nhân. Mã số thuế cấp cho người phụ thuộc đồng thời là mã số thuế của cá nhân khi người phụ thuộc phát sinh nghĩa vụ với ngân sách nhà nước;"},{"k":"p","t":"c) Mã số thuế đã cấp không được sử dụng lại để cấp cho người nộp thuế khác;"},{"k":"p","t":"d) Mã số thuế của doanh nghiệp, tổ chức kinh tế, tổ chức khác sau khi chuyển đổi loại hình, bán, tặng, cho, thừa kế được giữ nguyên."}]},{"id":"tt90_6","no":6,"code":"Điều 6","title":"Điều 6. Tiếp nhận hồ sơ đăng ký thuế","shortTitle":"Tiếp nhận hồ sơ đăng ký thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ đăng ký thuế và hình thức nộp"},{"k":"p","t":"a) Hồ sơ đăng ký thuế bao gồm: hồ sơ đăng ký thuế lần đầu; hồ sơ thông báo thay đổi thông tin đăng ký thuế; hồ sơ thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động sau tạm ngừng hoạt động, kinh doanh trước thời hạn; hồ sơ chấm dứt hiệu lực mã số thuế; hồ sơ khôi phục mã số thuế;"},{"k":"p","t":"b) Các hình thức nộp hồ sơ"},{"k":"p","t":"b.1) Người nộp thuế quy định tại khoản 2 Điều 10 Luật số 108/2025/QH15 nộp hồ sơ qua cơ quan đăng ký kinh doanh theo quy định của pháp luật về đăng ký doanh nghiệp, hợp tác xã, hộ kinh doanh (sau đây gọi là pháp luật về đăng ký kinh doanh);"},{"k":"p","t":"b.2) Người nộp thuế quy định tại khoản 3 Điều 10 Luật số 108/2025/QH15 nộp hồ sơ đến cơ quan thuế bằng phương thức điện tử thông qua Cổng Dịch vụ công quốc gia, Ứng dụng định danh quốc gia hoặc Hệ thống thông tin quản lý thuế, trừ một số trường hợp đặc biệt quy định tại khoản 1 Điều 50 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế nộp hồ sơ đăng ký thuế bằng giấy thì người nộp thuế nộp hồ sơ trực tiếp tại bộ phận một cửa hoặc qua đường bưu chính công ích theo quy định của pháp luật về thực hiện thủ tục hành chính theo cơ chế một cửa, một cửa liên thông tại bộ phận một cửa và Cổng Dịch vụ công quốc gia."},{"k":"p","t":"2. Tiếp nhận hồ sơ đăng ký thuế của người nộp thuế"},{"k":"p","t":"a) Đối với hồ sơ nộp qua cơ quan đăng ký kinh doanh theo quy định tại điểm b.1 khoản 1 Điều này"},{"k":"p","t":"a.1) Người nộp thuế nộp hồ sơ đăng ký doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc, tổ chức khác, hộ kinh doanh theo quy định tại Luật Doanh nghiệp, Luật Hợp tác xã và các văn bản hướng dẫn thi hành;"},{"k":"p","t":"a.2) Cơ quan đăng ký kinh doanh sau khi tiếp nhận, kiểm tra hồ sơ, cập nhật thông tin vào hệ thống thông tin về đăng ký kinh doanh nếu hồ sơ hợp lệ và truyền cho cơ quan thuế qua Hệ thống ứng dụng đăng ký thuế;"},{"k":"p","t":"a.3) Xử lý tại cơ quan thuế"},{"k":"p","t":"- Đối với hồ sơ đăng ký thành lập doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc, tổ chức khác, hộ kinh doanh: Hệ thống ứng dụng đăng ký thuế tự động kiểm tra điều kiện cấp mã số thuế và gửi kết quả cấp mã số thuế hoặc không cấp mã số thuế kèm theo lý do cho hệ thống thông tin về đăng ký kinh doanh;"},{"k":"p","t":"- Đối với các hồ sơ đăng ký thông báo thay đổi trụ sở dẫn đến thay đổi cơ quan thuế quản lý; giải thể doanh nghiệp, hợp tác xã; chấm dứt hoạt động đơn vị phụ thuộc; chấm dứt hoạt động tổ hợp tác, hộ kinh doanh; chấm dứt tồn tại doanh nghiệp, hợp tác xã bị chia, bị sáp nhập, bị hợp nhất: cơ quan thuế xử lý, cập nhật thông tin về việc hoàn thành thủ tục, nghĩa vụ thuế của người nộp thuế vào Hệ thống ứng dụng đăng ký thuế tương ứng với từng trường hợp theo thời hạn quy định tại Điều 10, Điều 15, Điều 16, Điều 24, Điều 29, Điều 30 Thông tư này. Hệ thống ứng dụng đăng ký thuế tự động kiểm tra và gửi kết quả sang hệ thống thông tin về đăng ký kinh doanh trên cơ sở thông tin đã được cập nhật vào hệ thống;"},{"k":"p","t":"- Đối với các hồ sơ, thông báo khác: Hệ thống ứng dụng đăng ký thuế tự động kiểm tra, cập nhật thông tin của người nộp thuế vào Hệ thống dựa trên thông tin do hệ thống thông tin về đăng ký kinh doanh gửi đến. Trường hợp người nộp thuế có tài khoản giao dịch thuế điện tử thì kết quả được gửi đồng thời đến tài khoản và địa chỉ thư điện tử của người nộp thuế;"},{"k":"p","t":"a.4) Cơ quan đăng ký kinh doanh trả kết quả cho người nộp thuế theo quy định tại Luật Doanh nghiệp, Luật Hợp tác xã và các văn bản hướng dẫn thi hành;"},{"k":"p","t":"b) Đối với hồ sơ nộp bằng phương thức điện tử theo quy định tại điểm b.2 khoản 1 Điều này"},{"k":"p","t":"b.1) Người nộp thuế truy cập Cổng Dịch vụ công quốc gia, Ứng dụng định danh quốc gia hoặc Hệ thống thông tin quản lý thuế; thực hiện lập hồ sơ đăng ký thuế trực tuyến, xác thực điện tử của người nộp thuế là cá nhân, người đại diện theo pháp luật của người nộp thuế là tổ chức (bao gồm thông tin sinh trắc học theo quy định về định danh và xác thực điện tử của Chính phủ và lộ trình của cơ quan thuế) và gửi cho cơ quan thuế;"},{"k":"p","t":"b.2) Cổng Dịch vụ công quốc gia, Ứng dụng định danh quốc gia hoặc Hệ thống thông tin quản lý thuế tiếp nhận, đối chiếu thông tin và gửi Thông báo tiếp nhận hồ sơ đăng ký thuế điện tử theo mẫu số 01/TB-TĐT ban hành kèm theo Thông tư số 89/2026/TT-BTC quy định chi tiết một số điều của Luật Quản lý thuế và Nghị định số 252/2026/NĐ-CP ngày 30 tháng 6 năm 2026 của Chính phủ quy định chi tiết một số điều và biện pháp để tổ chức, hướng dẫn thi hành Luật Quản lý thuế cho người nộp thuế chậm nhất 15 phút kể từ khi nhận được hồ sơ đăng ký thuế của người nộp thuế vào địa chỉ thư điện tử hoặc tài khoản giao dịch điện tử của người nộp thuế đã đăng ký với cơ quan thuế, thông báo nêu rõ thời gian, địa điểm trả kết quả."},{"k":"p","t":"- Trường hợp hồ sơ đăng ký thuế đầy đủ theo quy định, cơ quan thuế giải quyết hồ sơ đăng ký thuế theo quy định tại Thông tư này tương ứng với từng trường hợp;"},{"k":"p","t":"- Trường hợp hồ sơ đăng ký thuế không đầy đủ theo quy định, trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ ghi trên Thông báo tiếp nhận hồ sơ đăng ký thuế điện tử, cơ quan thuế gửi Thông báo không tiếp nhận hồ sơ đăng ký thuế theo mẫu số 01/TB-TĐT ban hành kèm theo Thông tư số 89/2026/TT-BTC cho người nộp thuế qua Cổng Dịch vụ công quốc gia, Ứng dụng định danh quốc gia hoặc Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"Người nộp thuế gửi lại hồ sơ đăng ký thuế qua Cổng Dịch vụ công quốc gia, Ứng dụng định danh quốc gia hoặc Hệ thống thông tin quản lý thuế để thay thế cho hồ sơ không được chấp nhận;"},{"k":"p","t":"c) Đối với hồ sơ nộp bằng giấy theo quy định tại điểm b.2 khoản 1 Điều này"},{"k":"p","t":"Trường hợp hồ sơ đăng ký thuế nộp trực tiếp thì công chức được giao tiếp nhận kiểm tra hồ sơ đăng ký thuế. Trường hợp hồ sơ đầy đủ theo quy định, công chức tiếp nhận và đóng dấu tiếp nhận vào hồ sơ đăng ký thuế, ghi rõ ngày nhận hồ sơ, số lượng tài liệu theo bảng kê danh mục hồ sơ; lập phiếu tiếp nhận và hẹn trả kết quả vào địa chỉ thư điện tử do người nộp thuế đăng ký đối với hồ sơ thuộc diện cơ quan thuế phải trả kết quả cho người nộp thuế, thời hạn xử lý hồ sơ đối với từng loại hồ sơ đã tiếp nhận. Trường hợp hồ sơ không đầy đủ theo quy định, công chức thuế không tiếp nhận và trực tiếp hướng dẫn người nộp thuế hoàn thiện hồ sơ."},{"k":"p","t":"Trường hợp hồ sơ đăng ký thuế gửi bằng đường bưu chính, công chức thuế được giao tiếp nhận đóng dấu tiếp nhận, ghi ngày nhận hồ sơ vào hồ sơ và ghi sổ văn thư của cơ quan thuế. Trường hợp hồ sơ không đầy đủ cần phải giải trình, bổ sung thông tin, tài liệu, cơ quan thuế thông báo cho người nộp thuế theo mẫu số 01/TB-BSTT-NNT ban hành kèm theo Thông tư số 89/2026/TT-BTC trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ."},{"k":"p","t":"3. Tiếp nhận quyết định, văn bản hoặc giấy tờ khác liên quan đến đăng ký thuế của người nộp thuế từ cơ quan nhà nước có thẩm quyền"},{"k":"p","t":"a) Đối với quyết định, văn bản hoặc giấy tờ khác bằng giấy"},{"k":"p","t":"Công chức thuế tiếp nhận và đóng dấu tiếp nhận vào quyết định, văn bản hoặc giấy tờ khác của cơ quan nhà nước có thẩm quyền, ghi ngày nhận vào quyết định, văn bản hoặc giấy tờ khác đã tiếp nhận."},{"k":"p","t":"Trường hợp quyết định, văn bản hoặc giấy tờ khác gửi bằng đường bưu chính, công chức thuế đóng dấu tiếp nhận, ghi ngày nhận vào quyết định, văn bản hoặc giấy tờ khác đã tiếp nhận và ghi sổ văn thư của cơ quan thuế;"},{"k":"p","t":"b) Đối với quyết định, văn bản hoặc giấy tờ khác bằng điện tử"},{"k":"p","t":"Việc tiếp nhận quyết định, văn bản hoặc giấy tờ khác của cơ quan nhà nước có thẩm quyền bằng phương thức điện tử được thực hiện theo quy định về giao dịch điện tử trong lĩnh vực thuế tại Nghị định số 252/2026/NĐ-CP và Thông tư số 89/2026/TT-BTC."},{"k":"p","t":"Chương IITHỦ TỤC VỀ ĐĂNG KÝ THUẾ ĐỐI VỚI NGƯỜI NỘP THUẾ LÀ TỔ CHỨC"},{"k":"p","t":"Mục 1ĐĂNG KÝ THUẾ LẦN ĐẦU"}]},{"id":"tt90_7","no":7,"code":"Điều 7","title":"Điều 7. Địa điểm nộp và hồ sơ đăng ký thuế lần đầu","shortTitle":"Địa điểm nộp và hồ sơ đăng ký thuế lần đầu","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với trường hợp thực hiện đăng ký thuế theo cơ chế một cửa liên thông"},{"k":"p","t":"Địa điểm nộp và hồ sơ đăng ký thuế lần đầu đối với doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc, tổ chức khác đăng ký thuế cùng với đăng ký kinh doanh theo cơ chế một cửa liên thông là địa điểm nộp và hồ sơ đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký tổ hợp tác theo quy định của pháp luật về đăng ký kinh doanh."},{"k":"p","t":"2. Đối với người nộp thuế là tổ chức quy định tại điểm a, b, c, p khoản 2 Điều 4 Thông tư này đăng ký thuế trực tiếp với cơ quan thuế"},{"k":"p","t":"a) Tổ chức kinh tế và các đơn vị phụ thuộc (trừ tổ hợp tác) quy định tại điểm a, b khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế lần đầu đến Thuế tỉnh, thành phố nơi đặt trụ sở tổ chức kinh tế và các đơn vị phụ thuộc."},{"k":"p","t":"a.1) Hồ sơ đăng ký thuế của tổ chức là đơn vị độc lập, đơn vị chủ quản, gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 01-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê các công ty con, công ty thành viên mẫu số BK01-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các đơn vị phụ thuộc mẫu số BK02-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê địa điểm kinh doanh mẫu số BK03-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các nhà thầu nước ngoài, nhà thầu phụ nước ngoài mẫu số BK04-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các nhà thầu, nhà đầu tư dầu khí mẫu số BK05-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê góp vốn của tổ chức, cá nhân mẫu số BK06-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê chủ sở hữu pháp lý, chủ sở hữu hưởng lợi của công ty nước ngoài có chi nhánh, văn phòng đại diện tại Việt Nam mẫu số BK07-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bản sao điện tử giấy phép thành lập và hoạt động hoặc quyết định thành lập, hoặc văn bản tương đương do cơ quan có thẩm quyền cấp hoặc giấy chứng nhận đăng ký kinh doanh theo quy định của pháp luật của nước có chung biên giới (đối với tổ chức của nước có chung biên giới đất liền với Việt Nam thực hiện hoạt động mua, bán, trao đổi hàng hóa tại chợ biên giới, chợ cửa khẩu, chợ trong khu kinh tế cửa khẩu của Việt Nam);"},{"k":"p","t":"a.2) Hồ sơ đăng ký thuế của đơn vị phụ thuộc, gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 02-ĐKT ban hành kèm theo Thông tư này; trường hợp đơn vị phụ thuộc được cấp mã số thuế 10 chữ số theo quy định tại điểm c khoản 2 Điều 5 Thông tư này là Tờ khai đăng ký thuế mẫu số 01-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê địa điểm kinh doanh mẫu số BK03-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các nhà thầu nước ngoài, nhà thầu phụ nước ngoài mẫu số BK04-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các nhà thầu, nhà đầu tư dầu khí mẫu số BK05-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bản sao điện tử giấy chứng nhận đăng ký hoạt động đơn vị phụ thuộc, hoặc quyết định thành lập, hoặc văn bản tương đương do cơ quan có thẩm quyền cấp, hoặc giấy chứng nhận đăng ký kinh doanh theo quy định của pháp luật nước có chung biên giới (đối với tổ chức của nước có chung biên giới đất liền với Việt Nam thực hiện hoạt động mua, bán, trao đổi hàng hóa tại chợ biên giới, chợ cửa khẩu, chợ trong khu kinh tế cửa khẩu của Việt Nam);"},{"k":"p","t":"b) Tổ hợp tác, tổ chức khác và các đơn vị phụ thuộc quy định tại điểm b, c, p khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế lần đầu tại Thuế tỉnh, thành phố nơi tổ chức đóng trụ sở đối với tổ chức do cơ quan trung ương và cơ quan cấp tỉnh ra quyết định thành lập (trừ đơn vị theo hệ thống ngành dọc hoạt động tại cấp xã); tại Thuế cơ sở nơi tổ chức đóng trụ sở đối với tổ chức không do cơ quan trung ương và cơ quan cấp tỉnh ra quyết định thành lập, đơn vị theo hệ thống ngành dọc hoạt động tại cấp xã do cơ quan trung ương và cơ quan cấp tỉnh ra quyết định thành lập và nơi tổ hợp tác đóng trụ sở."},{"k":"p","t":"b.1) Hồ sơ đăng ký thuế của tổ chức là đơn vị độc lập, đơn vị chủ quản gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 01-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê các công ty con, công ty thành viên mẫu số BK01-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các đơn vị phụ thuộc mẫu số BK02-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê địa điểm kinh doanh mẫu số BK03-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các nhà thầu nước ngoài, nhà thầu phụ nước ngoài mẫu số BK04-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bản sao điện tử quyết định thành lập hoặc văn bản tương đương do cơ quan có thẩm quyền cấp;"},{"k":"p","t":"b.2) Hồ sơ đăng ký thuế của đơn vị phụ thuộc gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 02-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê địa điểm kinh doanh mẫu số BK03-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bảng kê các nhà thầu nước ngoài, nhà thầu phụ nước ngoài mẫu số BK04-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bản sao điện tử quyết định thành lập hoặc văn bản tương đương do cơ quan có thẩm quyền cấp."},{"k":"p","t":"c) Trường hợp quyết định thành lập quy định tại khoản này thuộc danh mục bí mật nhà nước theo quy định của pháp luật thì người nộp thuế không phải nộp bản sao điện tử quyết định thành lập khi đăng ký thuế nhưng phải có văn bản cung cấp thông tin về việc tài liệu thuộc danh mục bí mật nhà nước và chịu trách nhiệm về tính chính xác của thông tin kê khai trên hồ sơ đăng ký thuế."},{"k":"p","t":"3. Đối với người nộp thuế quy định tại điểm d.1 khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế lần đầu tại Thuế tỉnh, thành phố nơi tổ chức đóng trụ sở. Hồ sơ đăng ký thuế là Tờ khai đăng ký thuế mẫu số 01-ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"4. Đối với người nộp thuế quy định tại điểm d.2 khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế lần đầu tại Thuế tỉnh, thành phố nơi tổ chức đóng trụ sở. Hồ sơ đăng ký thuế gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 06-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử văn bản xác nhận của Cục Lễ tân Nhà nước và Phiên dịch đối ngoại - Bộ Ngoại giao, trong đó có thông tin về tên, địa chỉ của cơ quan ngoại giao, cơ quan lãnh sự, cơ quan đại diện tổ chức quốc tế."},{"k":"p","t":"5. Đối với người nộp thuế là nhà thầu nước ngoài, nhà thầu phụ nước ngoài quy định tại điểm g khoản 2 Điều 4 Thông tư này trực tiếp kê khai, nộp thuế nhà thầu hoặc các nghĩa vụ thuế khác trừ thuế nhà thầu do bên Việt Nam khấu trừ, nộp thay theo quy định của pháp luật về quản lý thuế nộp hồ sơ đăng ký thuế lần đầu tại Thuế tỉnh, thành phố nơi đặt trụ sở. Hồ sơ đăng ký thuế gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 04-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê các nhà thầu nước ngoài, nhà thầu phụ nước ngoài mẫu số BK04-ĐKT ban hành kèm theo Thông tư này (nếu có);"},{"k":"p","t":"- Bản sao điện tử giấy xác nhận đăng ký văn phòng điều hành hoặc văn bản tương đương do cơ quan có thẩm quyền cấp (nếu có)."},{"k":"p","t":"6. Đối với người nộp thuế có trách nhiệm khấu trừ, nộp thay thuế và người nộp thuế được cơ quan thuế ủy nhiệm thu quy định tại điểm h, n khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế đến cơ quan thuế để được cấp mã số thuế nộp thay như sau:"},{"k":"p","t":"a) Tổ chức khấu trừ, nộp thay cho nhà thầu nước ngoài, nhà thầu phụ nước ngoài quy định tại điểm h.1 khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế đến cơ quan thuế quản lý trực tiếp. Hồ sơ đăng ký thuế gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 04.1-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê các hợp đồng nhà thầu nước ngoài, nhà thầu phụ nước ngoài nộp thuế thông qua bên Việt Nam mẫu số 04.1-ĐKT-BK ban hành kèm theo Thông tư này;"},{"k":"p","t":"b) Tổ chức kinh doanh tại Việt Nam áp dụng phương pháp tính thuế giá trị gia tăng là phương pháp khấu trừ thuế thực hiện khấu trừ, nộp thay cho nhà cung cấp nước ngoài quy định tại điểm h.2 khoản 2 Điều 4 Thông tư này thì nộp hồ sơ đăng ký thuế đến cơ quan thuế quản lý trực tiếp. Hồ sơ đăng ký thuế là Tờ khai đăng ký thuế mẫu số 04.1-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"c) Chủ quản nền tảng thương mại điện tử khấu trừ, nộp thay cho nhà cung cấp nước ngoài, hộ kinh doanh, cá nhân kinh doanh quy định tại điểm h.3 khoản 2 Điều 4 Thông tư này thì nộp hồ sơ đăng ký thuế đến cơ quan thuế quản lý trực tiếp. Hồ sơ đăng ký thuế là Tờ khai đăng ký thuế mẫu số 04.1-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"d) Tổ chức hợp tác kinh doanh với cá nhân quy định tại điểm h.4 khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế đến cơ quan thuế quản lý trực tiếp. Hồ sơ đăng ký thuế gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 04.1-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử hợp đồng hoặc văn bản hợp tác kinh doanh;"},{"k":"p","t":"đ) Tổ chức được cơ quan thuế ủy nhiệm thu quy định tại điểm n khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế đến cơ quan thuế ký hợp đồng ủy nhiệm thu. Hồ sơ đăng ký thuế là Tờ khai đăng ký thuế mẫu số 04.4-ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"7. Đối với người nộp thuế quy định tại điểm i khoản 2 Điều 4 Thông tư này nộp hồ sơ đăng ký thuế lần đầu tại Thuế tỉnh, thành phố nơi người nộp thuế đặt trụ sở; trường hợp người nộp thuế được phân công cho Chi cục Thuế doanh nghiệp lớn quản lý thì nộp hồ sơ tại Chi cục Thuế doanh nghiệp lớn."},{"k":"p","t":"a) Hồ sơ đăng ký thuế của người điều hành, doanh nghiệp liên doanh, tổ chức được Chính phủ Việt Nam giao nhiệm vụ tiếp nhận phần được chia của Việt Nam thuộc các mỏ dầu khí tại vùng chồng lấn, gồm:"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 01-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bảng kê nhà thầu, nhà đầu tư dầu khí mẫu số BK05-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử Giấy chứng nhận đăng ký đầu tư, giấy phép đầu tư hoặc giấy tờ khác có giá trị tương đương; bản sao điện tử văn bản giao nhiệm vụ điều hành, văn bản chấp thuận của cơ quan quản lý có thẩm quyền (nếu có), quyết định thành lập hoặc giấy chứng nhận đăng ký kinh doanh hoặc văn bản tương đương của đơn vị được giao nhiệm vụ điều hành;"},{"k":"p","t":"b) Hồ sơ đăng ký thuế của nhà thầu, nhà đầu tư dầu khí (bao gồm cả nhà thầu nhận phần lãi được chia) là Tờ khai đăng ký thuế mẫu số 02-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"c) Hồ sơ đăng ký thuế đối với Công ty mẹ - Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam đại diện nước chủ nhà nhận phần lãi được chia từ các hợp đồng dầu khí là Tờ khai đăng ký thuế mẫu số 02-ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"8. Đối với người nộp thuế là nhà cung cấp nước ngoài quy định tại điểm đ khoản 2 Điều 4 Thông tư này thực hiện nộp hồ sơ đăng ký thuế thông qua Hệ thống thông tin quản lý thuế. Hồ sơ đăng ký thuế của nhà cung cấp nước ngoài là Tờ khai đăng ký thuế dành cho nhà cung cấp nước ngoài theo mẫu số 01/NCCNN ban hành kèm theo Thông tư này."},{"k":"p","t":"9. Tổ chức quy định tại điểm o khoản 2 Điều 4 Thông tư này thực hiện theo quy định tại khoản 5 và khoản 9 Điều 15 Nghị định số 236/2025/NĐ-CP."}]},{"id":"tt90_8","no":8,"code":"Điều 8","title":"Điều 8. Cấp Giấy chứng nhận đăng ký thuế và Thông báo mã số thuế","shortTitle":"Cấp Giấy chứng nhận đăng ký thuế và Thông báo mã số thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Giấy chứng nhận đăng ký thuế và Thông báo mã số thuế được cấp cho tổ chức đăng ký thuế trực tiếp với cơ quan thuế như sau:"},{"k":"p","t":"1. Cơ quan thuế cấp “Giấy chứng nhận đăng ký thuế” mẫu số 10-MST ban hành kèm theo Thông tư này cho tổ chức không thuộc trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Cơ quan thuế cấp “Thông báo mã số thuế nộp thay” mẫu số 11-MST ban hành kèm theo Thông tư này cho tổ chức nộp hồ sơ đăng ký thuế để khấu trừ và nộp thay thuế theo quy định tại khoản 6 Điều 7 Thông tư này."},{"k":"p","t":"3. Cơ quan thuế thực hiện xử lý hồ sơ đăng ký thuế lần đầu và trả kết quả là Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế bản điện tử cho người nộp thuế qua Cổng Dịch vụ công quốc gia, Ứng dụng định danh quốc gia hoặc Hệ thống thông tin quản lý thuế trong thời hạn 03 (ba) ngày làm việc kể từ ngày cơ quan thuế nhận đủ hồ sơ của người nộp thuế; đồng thời gửi qua địa chỉ thư điện tử của người đại diện theo pháp luật của người nộp thuế theo thông tin người nộp thuế đã đăng ký. Giấy chứng nhận đăng ký thuế, Thông báo mã số thuế bản điện tử được ký số bởi người có thẩm quyền hoặc ký số của cơ quan thuế theo quy định của pháp luật có giá trị pháp lý như văn bản giấy."},{"k":"p","t":"Mục 2THAY ĐỔI THÔNG TIN ĐĂNG KÝ THUẾ"}]},{"id":"tt90_9","no":9,"code":"Điều 9","title":"Điều 9. Địa điểm nộp và hồ sơ thông báo thay đổi thông tin đăng ký thuế","shortTitle":"Địa điểm nộp và hồ sơ thông báo thay đổi thông tin đăng ký thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thay đổi thông tin đăng ký thuế nhưng không làm thay đổi cơ quan thuế quản lý trực tiếp"},{"k":"p","t":"a) Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh khi có thay đổi thông tin đăng ký thuế thì thực hiện thông báo thay đổi thông tin đăng ký thuế cùng với việc thay đổi nội dung đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh;"},{"k":"p","t":"b) Người nộp thuế quy định tại điểm a, b, c, d, đ, g, i, p khoản 2 Điều 4 Thông tư này nộp hồ sơ đến cơ quan thuế quản lý trực tiếp như sau:"},{"k":"p","t":"b.1) Hồ sơ thông báo thay đổi thông tin đăng ký thuế của người nộp thuế theo quy định tại điểm a, b, c, g, i, p khoản 2 Điều 4 Thông tư này, gồm:"},{"k":"p","t":"- Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử giấy phép thành lập và hoạt động, hoặc giấy chứng nhận đăng ký hoạt động đơn vị phụ thuộc, hoặc quyết định thành lập, hoặc giấy phép tương đương do cơ quan có thẩm quyền cấp nếu thông tin trên các giấy tờ này có thay đổi;"},{"k":"p","t":"b.2) Hồ sơ thông báo thay đổi thông tin đăng ký thuế của người nộp thuế theo quy định tại điểm d khoản 2 Điều 4 Thông tư này là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"b.3) Hồ sơ thông báo thay đổi thông tin đăng ký thuế của nhà cung cấp nước ngoài quy định tại điểm đ khoản 2 Điều 4 Thông tư này là Tờ khai điều chỉnh thông tin đăng ký thuế dành cho nhà cung cấp nước ngoài theo mẫu số 01-1/NCCNN ban hành kèm theo Thông tư này. Người nộp thuế thực hiện nộp hồ sơ thông qua Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"c) Người nộp thuế là nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí quy định tại điểm i khoản 2 Điều 4 Thông tư này khi chuyển nhượng phần vốn góp trong tổ chức kinh tế hoặc chuyển nhượng một phần quyền lợi tham gia hợp đồng dầu khí, nộp hồ sơ thông báo thay đổi thông tin đăng ký thuế tại Thuế tỉnh, thành phố nơi người điều hành của hợp đồng dầu khí có hoạt động chuyển nhượng đặt trụ sở; trường hợp người điều hành được phân công cho Chi cục Thuế doanh nghiệp lớn quản lý thì nộp hồ sơ tại Chi cục Thuế doanh nghiệp lớn."},{"k":"p","t":"Hồ sơ thông báo thay đổi thông tin đăng ký thuế là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này."},{"k":"p","t":"2. Thay đổi thông tin đăng ký thuế làm thay đổi cơ quan thuế quản lý trực tiếp (trừ trường hợp thay đổi thông tin địa chỉ trụ sở do thay đổi địa giới hành chính nhà nước theo quyết định của cơ quan nhà nước có thẩm quyền hoặc cơ quan thuế phân công lại cơ quan thuế quản lý trực tiếp)"},{"k":"p","t":"a) Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh khi có thay đổi địa chỉ trụ sở làm thay đổi cơ quan thuế quản lý trực tiếp:"},{"k":"p","t":"a.1) Người nộp thuế nộp hồ sơ thay đổi cho cơ quan thuế quản lý trực tiếp (cơ quan thuế nơi chuyển đi) để thực hiện thủ tục chuyển cơ quan thuế quản lý theo quy định tại điểm a khoản 2 Điều 10 Thông tư này trước khi đăng ký thay đổi địa chỉ trụ sở đến cơ quan đăng ký kinh doanh."},{"k":"p","t":"Hồ sơ nộp đến cơ quan thuế nơi chuyển đi là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"a.2) Sau khi nhận được Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này của cơ quan thuế nơi chuyển đi, người nộp thuế thực hiện đăng ký thay đổi địa chỉ trụ sở với cơ quan đăng ký kinh doanh theo quy định của pháp luật về đăng ký kinh doanh."},{"k":"p","t":"b) Người nộp thuế thuộc diện đăng ký thuế trực tiếp với cơ quan thuế theo quy định tại điểm a, b, c, d, g, i, p khoản 2 Điều 4 Thông tư này khi có thay đổi địa chỉ trụ sở làm thay đổi cơ quan thuế quản lý trực tiếp thực hiện như sau:"},{"k":"p","t":"b.1) Tại cơ quan thuế nơi chuyển đi"},{"k":"p","t":"Người nộp thuế nộp hồ sơ thông báo thay đổi thông tin đăng ký thuế cho cơ quan thuế quản lý trực tiếp (cơ quan thuế nơi chuyển đi). Hồ sơ thông báo thay đổi thông tin đăng ký thuế cụ thể như sau:"},{"k":"p","t":"- Đối với người nộp thuế theo quy định tại điểm a, b, c, g, i, p khoản 2 Điều 4 Thông tư này, hồ sơ gồm:"},{"k":"p","t":"+ Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"+ Bản sao điện tử giấy phép thành lập và hoạt động, hoặc văn bản tương đương do cơ quan có thẩm quyền cấp trong trường hợp địa chỉ trên các giấy tờ này có thay đổi;"},{"k":"p","t":"- Đối với người nộp thuế theo quy định tại điểm d khoản 2 Điều 4 Thông tư này, hồ sơ là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"b.2) Tại cơ quan thuế nơi chuyển đến"},{"k":"p","t":"b.2.1) Người nộp thuế nộp hồ sơ thông báo thay đổi thông tin đăng ký thuế đến cơ quan thuế nơi chuyển đến trong thời hạn 10 (mười) ngày làm việc kể từ ngày cơ quan thuế nơi chuyển đi ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này. Cụ thể:"},{"k":"p","t":"- Người nộp thuế theo quy định tại điểm a, b, d, g, i khoản 2 Điều 4 Thông tư này (trừ tổ hợp tác) nộp hồ sơ tại Thuế tỉnh, thành phố nơi đặt trụ sở mới;"},{"k":"p","t":"- Người nộp thuế là tổ hợp tác theo quy định tại điểm b khoản 2 Điều 4 Thông tư này nộp hồ sơ tại Thuế cơ sở nơi đặt trụ sở mới;"},{"k":"p","t":"- Người nộp thuế theo quy định tại điểm c, p khoản 2 Điều 4 Thông tư này nộp hồ sơ tại Thuế tỉnh, thành phố nơi tổ chức đóng trụ sở đối với tổ chức do cơ quan trung ương và cơ quan cấp tỉnh ra quyết định thành lập (trừ đơn vị theo hệ thống ngành dọc hoạt động tại cấp xã); tại Thuế cơ sở nơi tổ chức đóng trụ sở đối với tổ chức không do cơ quan trung ương và cơ quan cấp tỉnh ra quyết định thành lập, đơn vị theo hệ thống ngành dọc hoạt động tại cấp xã do cơ quan trung ương và cơ quan cấp tỉnh ra quyết định thành lập;"},{"k":"p","t":"b.2.2) Hồ sơ thông báo thay đổi thông tin đăng ký thuế là Văn bản đăng ký chuyển địa điểm tại cơ quan thuế nơi người nộp thuế chuyển đến mẫu số 30/ĐKT ban hành kèm theo Thông tư này."}]},{"id":"tt90_10","no":10,"code":"Điều 10","title":"Điều 10. Xử lý hồ sơ thông báo thay đổi thông tin đăng ký thuế và trả kết quả","shortTitle":"Xử lý hồ sơ thông báo thay đổi thông tin đăng ký thuế và trả kết quả","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thay đổi các thông tin đăng ký thuế theo quy định tại khoản 1 Điều 9 Thông tư này"},{"k":"p","t":"a) Trường hợp thay đổi thông tin không có trên Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế"},{"k":"p","t":"Trong thời hạn 02 (hai) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế, cơ quan thuế quản lý trực tiếp người nộp thuế có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống ứng dụng đăng ký thuế;"},{"k":"p","t":"b) Trường hợp thay đổi thông tin trên Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế"},{"k":"p","t":"Trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế, cơ quan thuế quản lý trực tiếp có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống ứng dụng đăng ký thuế; đồng thời, ban hành Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế bản điện tử đã cập nhật thông tin thay đổi."},{"k":"p","t":"2. Người nộp thuế thay đổi thông tin đăng ký thuế theo quy định tại khoản 2 Điều 9 Thông tư này"},{"k":"p","t":"a) Tại cơ quan thuế nơi chuyển đi"},{"k":"p","t":"a.1) Trường hợp người nộp thuế thuộc diện phải kiểm tra tại trụ sở người nộp thuế trước khi chuyển địa điểm"},{"k":"p","t":"Trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ của người nộp thuế, cơ quan thuế thông báo cho người nộp thuế về việc hồ sơ thuộc diện phải kiểm tra tại trụ sở của người nộp thuế theo mẫu số 42/TB- ĐKT ban hành kèm theo Thông tư này, trong đó dự kiến thời gian thực hiện kiểm tra."},{"k":"p","t":"Trong thời hạn 05 (năm) ngày làm việc kể từ ngày ký quyết định xử phạt vi phạm hành chính về thuế (nếu có) hoặc kết luận kiểm tra, cơ quan thuế ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này gửi cho người nộp thuế và cơ quan thuế nơi người nộp thuế chuyển đến."},{"k":"p","t":"Việc xác định người nộp thuế rủi ro cao thuộc diện phải kiểm tra tại trụ sở của người nộp thuế thực hiện theo quy định tại điểm a khoản 3 Điều 22 Luật số 108/2025/QH15 và quy định về áp dụng quản lý rủi ro, quản lý tuân thủ trong quản lý thuế;"},{"k":"p","t":"a.2) Trường hợp người nộp thuế không thuộc diện phải kiểm tra tại trụ sở người nộp thuế trước khi chuyển địa điểm"},{"k":"p","t":"Trong thời hạn 07 (bảy) ngày làm việc kể từ ngày tiếp nhận hồ sơ của người nộp thuế, cơ quan thuế ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này gửi cho người nộp thuế và cơ quan thuế nơi người nộp thuế chuyển đến;"},{"k":"p","t":"a.3) Người nộp thuế chuyển địa điểm hoạt động kinh doanh tại trụ sở chính, nếu tiếp tục có hoạt động kinh doanh khác địa bàn cấp tỉnh với địa bàn nơi đóng trụ sở chính và có nghĩa vụ khai thuế, nộp thuế với cơ quan thuế quản lý trên địa bàn cấp tỉnh đó theo quy định của pháp luật quản lý thuế (cơ quan thuế quản lý khoản thu) thì không phải tổng hợp nghĩa vụ thuế phát sinh tại cơ quan thuế quản lý khoản thu trên thông báo mẫu số 09-MST quy định tại điểm này;"},{"k":"p","t":"b) Tại cơ quan thuế nơi chuyển đến"},{"k":"p","t":"Trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế, cơ quan thuế tiếp nhận hồ sơ có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống ứng dụng đăng ký thuế, ban hành Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế bản điện tử đã cập nhật thông tin thay đổi gửi cho người nộp thuế."},{"k":"p","t":"3. Xử lý đối với người nộp thuế đã hoàn thành chuyển địa điểm tại cơ quan thuế nơi chuyển đi nhưng không nộp hồ sơ thay đổi địa chỉ trụ sở tại cơ quan đăng ký kinh doanh (đối với người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh) hoặc tại cơ quan thuế nơi chuyển đến (đối với người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế)"},{"k":"p","t":"a) Trong thời hạn 10 (mười) ngày làm việc kể từ ngày cơ quan thuế nơi chuyển đi ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này, nếu người nộp thuế không thực hiện chuyển địa điểm thì phải có văn bản đăng ký hủy chuyển địa điểm mẫu số 31/ĐKT ban hành kèm theo Thông tư này gửi cơ quan thuế nơi chuyển đi. Cơ quan thuế nơi chuyển đi ban hành Thông báo về việc xác nhận người nộp thuế hủy chuyển địa điểm mẫu số 36/TB-ĐKT ban hành kèm theo Thông tư này, gửi người nộp thuế trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận được văn bản đề nghị của người nộp thuế;"},{"k":"p","t":"b) Kết thúc thời hạn 10 (mười) ngày làm việc kể từ ngày cơ quan thuế nơi chuyển đi ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này, nếu người nộp thuế không nộp hồ sơ cho cơ quan đăng ký kinh doanh, hoặc đã nộp hồ sơ cho cơ quan đăng ký kinh doanh nhưng hồ sơ không được chấp thuận, hoặc không nộp hồ sơ cho cơ quan thuế nơi chuyển đến và người nộp thuế không có văn bản đề nghị hủy chuyển địa điểm theo quy định tại điểm a khoản này gửi cơ quan thuế nơi chuyển đi thì cơ quan thuế nơi chuyển đến ban hành Thông báo giải trình, bổ sung thông tin, tài liệu mẫu số 01/TB-BSTT-NNT ban hành kèm theo Thông tư số 89/2026/TT-BTC gửi người nộp thuế, đồng thời gửi thông báo qua địa chỉ thư điện tử, số điện thoại của người đại diện theo pháp luật của người nộp thuế theo thông tin người nộp thuế đã đăng ký;"},{"k":"p","t":"c) Kết thúc thời hạn 10 (mười) ngày làm việc kể từ ngày cơ quan thuế nơi chuyển đến ban hành Thông báo theo quy định tại điểm b khoản này gửi người nộp thuế mà người nộp thuế không nộp Văn bản đăng ký hủy chuyển địa điểm mẫu số 31/ĐKT ban hành kèm theo Thông tư này hoặc không nộp hồ sơ thay đổi địa chỉ trụ sở, không giải trình hoặc giải trình nhưng không được cơ quan thuế chấp thuận, cơ quan thuế nơi chuyển đến thực hiện xác minh thực tế hoạt động của người nộp thuế tại địa chỉ đã đăng ký chuyển đến."},{"k":"p","t":"c.1) Trường hợp kết quả xác minh người nộp thuế có hoạt động tại địa chỉ đã đăng ký chuyển đến, cơ quan thuế nơi chuyển đến yêu cầu người nộp thuế phải ký xác nhận vào biên bản xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký mẫu số 15/BB-XMHĐ ban hành kèm theo Thông tư này, đồng thời yêu cầu người nộp thuế nộp hồ sơ thay đổi địa chỉ trụ sở với cơ quan đăng ký kinh doanh hoặc cơ quan thuế nơi chuyển đến theo quy định;"},{"k":"p","t":"c.2) Trường hợp kết quả xác minh người nộp thuế không hoạt động tại địa chỉ đã đăng ký chuyển đến, cơ quan thuế nơi chuyển đến phối hợp với chính quyền địa phương (Ủy ban nhân dân cấp xã hoặc cơ quan công an quản lý địa bàn) lập biên bản xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký mẫu số 15/BB-XMHĐ ban hành kèm theo Thông tư này, gửi biên bản xác minh cho cơ quan thuế nơi chuyển đi ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo kể từ ngày ký biên bản. Cơ quan thuế nơi chuyển đi căn cứ biên bản xác minh của cơ quan thuế nơi chuyển đến thực hiện ban hành Thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký mẫu số 16/TB-ĐKT ban hành kèm theo Thông tư này, cập nhật trạng thái mã số thuế và công khai thông tin theo quy định tại điểm b khoản 2 Điều 16 Thông tư này."},{"k":"p","t":"Mục 3TẠM NGỪNG HOẠT ĐỘNG, KINH DOANH"}]},{"id":"tt90_11","no":11,"code":"Điều 11","title":"Điều 11. Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn","shortTitle":"Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Khi tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn, người nộp thuế có trách nhiệm thực hiện đầy đủ quy định tại điểm c khoản 1 Điều 7 Nghị định số 252/2026/NĐ-CP và các quy định sau đây:"},{"k":"p","t":"1. Tổ chức không thuộc diện đăng ký kinh doanh thực hiện gửi Thông báo mẫu số 23/ĐKT ban hành kèm theo Thông tư này đến cơ quan thuế quản lý trực tiếp theo thời hạn quy định tại điểm g.2 hoặc g.4 khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"2. Sau khi cơ quan thuế đã ban hành thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký, doanh nghiệp, hợp tác xã, tổ hợp tác phải thực hiện thủ tục khôi phục mã số thuế theo quy định tại điểm b khoản 4 Điều 17 và điểm b khoản 1 Điều 18 Thông tư này trước khi đăng ký tạm ngừng hoạt động kinh doanh với cơ quan đăng ký kinh doanh."}]},{"id":"tt90_12","no":12,"code":"Điều 12","title":"Điều 12. Xử lý Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn","shortTitle":"Xử lý Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn của người nộp thuế quy định tại khoản 1 Điều 11 Thông tư này"},{"k":"p","t":"Cơ quan thuế thực hiện xử lý hồ sơ và ban hành Thông báo chấp thuận/ hoặc không chấp thuận tạm ngừng hoạt động, kinh doanh mẫu số 27/TB-ĐKT, Thông báo về việc tạm ngừng hoạt động, kinh doanh theo đơn vị chủ quản mẫu số 33/TB-ĐKT (nếu có), Thông báo về việc tiếp tục hoạt động, kinh doanh trước thời hạn theo đơn vị chủ quản mẫu số 34/TB-ĐKT (nếu có) ban hành kèm theo Thông tư này gửi người nộp thuế trong thời hạn 02 (hai) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế theo quy định."},{"k":"p","t":"2. Đối với văn bản chấp thuận tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn của cơ quan nhà nước có thẩm quyền"},{"k":"p","t":"Cơ quan thuế cập nhật thông tin tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn của người nộp thuế vào Hệ thống ứng dụng đăng ký thuế, trừ trường hợp người nộp thuế đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký."},{"k":"p","t":"3. Đối với doanh nghiệp, hợp tác xã, tổ hợp tác có đăng ký kinh doanh thực hiện thủ tục tạm ngừng hoạt động, kinh doanh có thời hạn hoặc tiếp tục hoạt động, kinh doanh trở lại trước thời hạn với cơ quan đăng ký kinh doanh: Cơ quan thuế cập nhật thông tin vào Hệ thống ứng dụng đăng ký thuế khi nhận được thông tin từ cơ quan đăng ký kinh doanh chuyển sang, trừ trường hợp người nộp thuế đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký."},{"k":"p","t":"Mục 4CHẤM DỨT HIỆU LỰC MÃ SỐ THUẾ"}]},{"id":"tt90_13","no":13,"code":"Điều 13","title":"Điều 13. Các trường hợp và hồ sơ chấm dứt hiệu lực mã số thuế","shortTitle":"Các trường hợp và hồ sơ chấm dứt hiệu lực mã số thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì thực hiện chấm dứt hiệu lực mã số thuế khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Chấm dứt hoạt động kinh doanh hoặc giải thể, phá sản;"},{"k":"p","t":"b) Bị thu hồi giấy chứng nhận đăng ký kinh doanh;"},{"k":"p","t":"c) Bị chia, bị sáp nhập, bị hợp nhất;"},{"k":"p","t":"d) Bị cơ quan thuế ra thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký sau khi xác minh thực tế người nộp thuế không còn hoạt động tại địa chỉ đã đăng ký trụ sở chính hoặc chi nhánh hoặc văn phòng đại diện."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế thì thực hiện chấm dứt hiệu lực mã số thuế khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Chấm dứt hoạt động kinh doanh hoặc giải thể, phá sản; không còn phát sinh nghĩa vụ thuế đối với tổ chức không kinh doanh;"},{"k":"p","t":"b) Bị thu hồi giấy phép thành lập và hoạt động, quyết định thành lập hoặc giấy phép tương đương;"},{"k":"p","t":"c) Bị chia, bị sáp nhập, bị hợp nhất; đơn vị phụ thuộc chuyển thành đơn vị độc lập hoặc ngược lại, hoặc chuyển từ đơn vị phụ thuộc của đơn vị chủ quản này sang thành đơn vị phụ thuộc của một đơn vị chủ quản khác;"},{"k":"p","t":"d) Bị cơ quan thuế ra thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký sau khi xác minh thực tế người nộp thuế không còn hoạt động tại địa chỉ đã đăng ký trụ sở chính hoặc chi nhánh hoặc văn phòng đại diện;"},{"k":"p","t":"đ) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài khi kết thúc hợp đồng;"},{"k":"p","t":"e) Người điều hành, doanh nghiệp liên doanh, tổ chức được Chính phủ Việt Nam giao nhiệm vụ tiếp nhận phần được chia của Việt Nam thuộc các mỏ dầu khí tại vùng chồng lấn, nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí, công ty mẹ - Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam đại diện nước chủ nhà nhận phần lãi được chia từ các hợp đồng dầu khí khi kết thúc hợp đồng; nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí khi chuyển nhượng toàn bộ quyền lợi tham gia hợp đồng dầu khí."},{"k":"p","t":"g) Tổ chức là chủ quản nền tảng thương mại điện tử, nền tảng số khác thuộc đối tượng khấu trừ, nộp thay thuế quy định tại điểm h.3 khoản 2 Điều 4 Thông tư này khi không còn chức năng đặt hàng trực tuyến và chức năng thanh toán;"},{"k":"p","t":"h) Nhà cung cấp nước ngoài theo quy định tại điểm đ khoản 2 Điều 4 Thông tư này khi chấm dứt hoạt động kinh doanh tại Việt Nam."},{"k":"p","t":"3. Nguyên tắc chấm dứt hiệu lực mã số thuế"},{"k":"p","t":"a) Mã số thuế không được sử dụng trong các giao dịch kinh tế kể từ ngày cơ quan thuế thông báo chấm dứt hiệu lực;"},{"k":"p","t":"b) Mã số thuế của tổ chức khi đã chấm dứt hiệu lực không được sử dụng lại, trừ trường hợp được khôi phục mã số thuế;"},{"k":"p","t":"c) Khi doanh nghiệp, tổ chức kinh tế, tổ chức khác và cá nhân chấm dứt hiệu lực mã số thuế thì đồng thời phải thực hiện chấm dứt hiệu lực đối với mã số thuế nộp thay;"},{"k":"p","t":"d) Người nộp thuế là đơn vị chủ quản chấm dứt hiệu lực mã số thuế thì các đơn vị phụ thuộc phải bị chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"4. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thực hiện đăng ký giải thể hoặc chấm dứt hoạt động tại cơ quan đăng ký kinh doanh theo quy định của pháp luật về đăng ký kinh doanh. Cơ quan đăng ký kinh doanh gửi thông tin cho cơ quan thuế để thực hiện thủ tục chấm dứt hiệu lực mã số thuế, bao gồm:"},{"k":"p","t":"a) Thông tin về quyết định giải thể doanh nghiệp, hợp tác xã; thông báo tổ hợp tác đang làm thủ tục chấm dứt hoạt động;"},{"k":"p","t":"b) Thông tin giải thể doanh nghiệp, hợp tác xã; chấm dứt tồn tại của doanh nghiệp, hợp tác xã do chia, hợp nhất, sáp nhập; chấm dứt hoạt động chi nhánh, văn phòng đại diện của doanh nghiệp, hợp tác xã; chấm dứt hoạt động tổ hợp tác."},{"k":"p","t":"5. Đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã trước khi nộp hồ sơ để chấm dứt hoạt động tại cơ quan đăng ký kinh doanh phải nộp hồ sơ đến cơ quan thuế quản lý trực tiếp để thực hiện các thủ tục về thuế, hoàn thành nghĩa vụ thuế theo thời hạn quy định tại Luật Doanh nghiệp (đối với doanh nghiệp), Luật Hợp tác xã (đối với hợp tác xã) và các pháp luật khác có liên quan. Trường hợp Luật Doanh nghiệp, Luật Hợp tác xã và pháp luật khác có liên quan không quy định thời hạn người nộp thuế phải nộp hồ sơ đến cơ quan thuế thì người nộp thuế nộp hồ sơ đến cơ quan thuế quản lý trực tiếp trong thời hạn 10 (mười) ngày làm việc kể từ ngày có quyết định hoặc thông báo của doanh nghiệp, hợp tác xã về chấm dứt hoạt động chi nhánh, văn phòng đại diện, hoặc quyết định thu hồi giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện. Hồ sơ gồm văn bản đề nghị chấm dứt hiệu lực mã số thuế mẫu số 24/ĐKT ban hành kèm theo Thông tư này và các giấy tờ sau: bản sao điện tử quyết định hoặc thông báo của doanh nghiệp, hợp tác xã về chấm dứt hoạt động chi nhánh, văn phòng đại diện; bản sao điện tử quyết định thu hồi giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"6. Doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký, trước khi nộp hồ sơ giải thể doanh nghiệp, hợp tác xã (bao gồm cả trường hợp giải thể tự nguyện và giải thể bắt buộc), hoặc chấm dứt hoạt động tổ hợp tác, đơn vị phụ thuộc tại cơ quan đăng ký kinh doanh phải đến cơ quan thuế quản lý trực tiếp để nộp hồ sơ và thực hiện các thủ tục về thuế, hoàn thành nghĩa vụ thuế theo quy định. Hồ sơ gồm văn bản đề nghị chấm dứt hiệu lực mã số thuế mẫu số 24/ĐKT ban hành kèm theo Thông tư này và các giấy tờ khác như sau:"},{"k":"p","t":"a) Hồ sơ chấm dứt hiệu lực mã số thuế của doanh nghiệp, hợp tác xã giải thể là bản sao điện tử của một trong các giấy tờ: nghị quyết hoặc quyết định giải thể doanh nghiệp, nghị quyết giải thể hợp tác xã, quyết định thu hồi giấy chứng nhận đăng ký kinh doanh của cơ quan đăng ký kinh doanh;"},{"k":"p","t":"b) Hồ sơ chấm dứt hiệu lực mã số thuế của đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã là bản sao điện tử của một trong các giấy tờ: quyết định hoặc thông báo của doanh nghiệp, hợp tác xã về chấm dứt hoạt động chi nhánh, văn phòng đại diện; quyết định thu hồi giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện của cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"c) Hồ sơ chấm dứt hiệu lực mã số thuế của tổ hợp tác là bản sao điện tử của một trong các giấy tờ: biên bản họp thành viên tổ hợp tác về việc chấm dứt hoạt động của tổ hợp tác, quyết định thu hồi giấy chứng nhận đăng ký tổ hợp tác của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"7. Hồ sơ chấm dứt hiệu lực mã số thuế đối với tổ chức đăng ký thuế trực tiếp với cơ quan thuế gồm văn bản đề nghị chấm dứt hiệu lực mã số thuế mẫu số 24/ĐKT ban hành kèm theo Thông tư này và các giấy tờ khác theo từng trường hợp như sau:"},{"k":"p","t":"a) Đối với tổ chức kinh tế, tổ chức khác theo quy định tại điểm a, b, c, d, p khoản 2 Điều 4 Thông tư này"},{"k":"p","t":"a.1) Đối với đơn vị chủ quản, hồ sơ là bản sao điện tử của một trong các giấy tờ sau: quyết định giải thể, quyết định chia, hợp đồng hợp nhất, hợp đồng sáp nhập, quyết định thu hồi giấy chứng nhận đăng ký hoạt động của cơ quan có thẩm quyền, thông báo chấm dứt hoạt động, quyết định chuyển đổi."},{"k":"p","t":"Trường hợp đơn vị chủ quản có các đơn vị phụ thuộc đã được cấp mã số thuế thì đơn vị chủ quản phải có văn bản thông báo chấm dứt hoạt động gửi cho các đơn vị phụ thuộc để yêu cầu đơn vị phụ thuộc thực hiện thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế quản lý đơn vị phụ thuộc trước khi chấm dứt hiệu lực mã số thuế của đơn vị chủ quản."},{"k":"p","t":"Trường hợp đơn vị phụ thuộc chấm dứt hiệu lực mã số thuế nhưng không có khả năng hoàn thành nghĩa vụ thuế với ngân sách nhà nước theo quy định của pháp luật về quản lý thuế thì đơn vị chủ quản có văn bản điện tử cam kết chịu trách nhiệm kế thừa toàn bộ khoản nghĩa vụ thuế của đơn vị phụ thuộc gửi cơ quan thuế quản lý đơn vị phụ thuộc và tiếp tục thực hiện nghĩa vụ thuế của đơn vị phụ thuộc với cơ quan thuế quản lý đơn vị phụ thuộc sau khi mã số thuế của đơn vị phụ thuộc đã chấm dứt hiệu lực;"},{"k":"p","t":"a.2) Đối với đơn vị phụ thuộc, hồ sơ là bản sao điện tử của một trong các giấy tờ sau: quyết định hoặc thông báo chấm dứt hoạt động đơn vị phụ thuộc, quyết định thu hồi giấy chứng nhận đăng ký hoạt động đối với đơn vị phụ thuộc của cơ quan có thẩm quyền;"},{"k":"p","t":"b) Đối với nhà thầu nước ngoài, nhà thầu phụ nước ngoài, người điều hành, doanh nghiệp liên doanh, tổ chức được Chính phủ Việt Nam giao nhiệm vụ tiếp nhận phần được chia của Việt Nam thuộc các mỏ dầu khí tại vùng chồng lấn, nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí, công ty mẹ - Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam đại diện nước chủ nhà nhận phần lãi được chia từ các hợp đồng dầu khí theo quy định tại điểm g, i khoản 2 Điều 4 Thông tư này (trừ nhà thầu nước ngoài, nhà thầu phụ nước ngoài được cấp mã số thuế theo quy định tại điểm e khoản 2 Điều 5 Thông tư này), hồ sơ là: bản sao điện tử bản thanh lý hợp đồng, hoặc bản sao điện tử văn bản xác nhận việc chấm dứt hiệu lực của hợp đồng dầu khí, hoặc bản sao điện tử văn bản về việc chuyển nhượng toàn bộ phần vốn góp tham gia hợp đồng dầu khí đối với nhà đầu tư tham gia hợp đồng dầu khí, tài liệu chứng minh đã hoàn thành nghĩa vụ thuế tại Việt Nam."},{"k":"p","t":"8. Hồ sơ chấm dứt hiệu lực mã số thuế theo quyết định, thông báo, giấy tờ khác của cơ quan nhà nước có thẩm quyền đối với từng trường hợp cụ thể như sau:"},{"k":"p","t":"a) Quyết định thu hồi giấy chứng nhận đăng ký kinh doanh; quyết định tuyên bố phá sản doanh nghiệp, hợp tác xã do cơ quan đăng ký kinh doanh gửi cho cơ quan thuế qua hệ thống thông tin về đăng ký kinh doanh;"},{"k":"p","t":"b) Quyết định, thông báo thu hồi giấy phép thành lập và hoạt động hoặc văn bản tương đương của cơ quan cấp phép gửi cho cơ quan thuế;"},{"k":"p","t":"c) Quyết định tuyên bố phá sản của Tòa án gửi cho cơ quan thuế;"},{"k":"p","t":"d) Thông báo của cơ quan thuế về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký theo quy định tại khoản 3 Điều 10, Điều 16 Thông tư này."}]},{"id":"tt90_14","no":14,"code":"Điều 14","title":"Điều 14. Các nghĩa vụ người nộp thuế phải hoàn thành trước khi chấm dứt hiệu lực mã số thuế","shortTitle":"Các nghĩa vụ người nộp thuế phải hoàn thành trước khi chấm dứt hiệu lực mã số thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế hoàn thành nghĩa vụ về hóa đơn theo quy định của pháp luật về hóa đơn."},{"k":"p","t":"2. Hoàn thành nghĩa vụ nộp hồ sơ khai thuế, nộp thuế và xử lý số tiền thuế nộp thừa, số thuế giá trị gia tăng chưa được khấu trừ (nếu có) theo quy định tại điểm d.1 khoản 1 Điều 7 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"3. Trường hợp đơn vị chủ quản có các đơn vị phụ thuộc thì toàn bộ các đơn vị phụ thuộc phải hoàn thành thủ tục chấm dứt hiệu lực mã số thuế trước khi chấm dứt hiệu lực mã số thuế của đơn vị chủ quản."}]},{"id":"tt90_15","no":15,"code":"Điều 15","title":"Điều 15. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế và trả kết quả","shortTitle":"Xử lý hồ sơ chấm dứt hiệu lực mã số thuế và trả kết quả","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế của người nộp thuế quy định tại điểm a, b khoản 7 Điều 13 Thông tư này"},{"k":"p","t":"a) Cơ quan thuế quản lý trực tiếp thực hiện như sau:"},{"k":"p","t":"a.1) Ban hành Thông báo về việc người nộp thuế ngừng hoạt động và đang làm thủ tục chấm dứt hiệu lực mã số thuế mẫu số 17/TB-ĐKT ban hành kèm theo Thông tư này gửi cho người nộp thuế (trừ nhà cung cấp nước ngoài theo quy định tại điểm đ khoản 2 Điều 4 Thông tư này) trong thời hạn 02 (hai) ngày làm việc kể từ ngày cơ quan thuế nhận đủ hồ sơ chấm dứt hiệu lực mã số thuế theo quy định. Trong thông báo xác định hồ sơ thuộc diện hoặc không thuộc diện phải kiểm tra tại trụ sở của người nộp thuế, dự kiến thời gian thực hiện kiểm tra nếu thuộc diện kiểm tra."},{"k":"p","t":"Ban hành Thông báo về việc chấm dứt hiệu lực mã số thuế theo đơn vị chủ quản gửi cho đơn vị chủ quản, đơn vị phụ thuộc theo mẫu số 35/TB-ĐKT ban hành kèm theo Thông tư này trong trường hợp cơ quan thuế nhận được hồ sơ chấm dứt hiệu lực mã số thuế của đơn vị chủ quản nhưng các đơn vị phụ thuộc chưa thực hiện thủ tục chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"a.2) Phối hợp với cơ quan thuế quản lý khoản thu nơi người nộp thuế có phát sinh nghĩa vụ với ngân sách nhà nước để quyết toán nghĩa vụ của người nộp thuế tại cơ quan thuế quản lý khoản thu (nộp đầy đủ hồ sơ khai thuế, hoàn thành nghĩa vụ nộp thuế, nghĩa vụ về hóa đơn và xử lý số tiền thuế nộp thừa, số thuế giá trị gia tăng chưa được khấu trừ (nếu có)), xử lý bù trừ nghĩa vụ thuế hoặc hoàn trả theo quy định của pháp luật;"},{"k":"p","t":"a.3) Thực hiện thủ tục bù trừ hoặc hoàn trả kiêm bù trừ đối với các nghĩa vụ của người nộp thuế khác theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp đơn vị phụ thuộc chấm dứt hiệu lực mã số thuế nhưng không có khả năng hoàn thành nghĩa vụ còn phải nộp hoặc còn nợ, hoặc vẫn còn số nộp thừa, số thuế giá trị gia tăng chưa khấu trừ hết sau khi đã thực hiện bù trừ hoặc hoàn trả kiêm bù trừ theo quy định của pháp luật về quản lý thuế, đơn vị chủ quản đã có văn bản cam kết chịu trách nhiệm kế thừa toàn bộ khoản nghĩa vụ thuế của đơn vị phụ thuộc thì cơ quan hải quan, cơ quan thuế quản lý trực tiếp đơn vị phụ thuộc thực hiện chuyển nghĩa vụ của đơn vị phụ thuộc cho đơn vị chủ quản và ban hành Thông báo về việc chuyển nghĩa vụ thuế của người nộp thuế mẫu số 39/TB-ĐKT ban hành kèm theo Thông tư này gửi cho người nộp thuế là đơn vị chủ quản, đơn vị phụ thuộc, cơ quan thuế quản lý trực tiếp đơn vị chủ quản."},{"k":"p","t":"Trường hợp đơn vị bị chia, bị sáp nhập, bị hợp nhất chấm dứt hiệu lực mã số thuế nhưng không có khả năng hoàn thành nghĩa vụ còn phải nộp hoặc còn nợ, hoặc vẫn còn số nộp thừa, số thuế giá trị gia tăng chưa khấu trừ hết sau khi đã thực hiện bù trừ hoặc hoàn trả kiêm bù trừ theo quy định của pháp luật về quản lý thuế, các đơn vị mới thành lập từ đơn vị bị chia, bị sáp nhập, bị hợp nhất đã có thỏa thuận về việc kế thừa toàn bộ khoản nghĩa vụ thuế của đơn vị bị chia, bị sáp nhập, bị hợp nhất thì cơ quan hải quan, cơ quan thuế quản lý trực tiếp đơn vị bị chia, bị sáp nhập, bị hợp nhất thực hiện chuyển nghĩa vụ cho đơn vị mới và ban hành Thông báo về việc chuyển nghĩa vụ thuế của người nộp thuế mẫu số 39/TB-ĐKT ban hành kèm theo Thông tư này gửi người nộp thuế là đơn vị bị chia, bị sáp nhập, bị hợp nhất, các đơn vị mới, cơ quan thuế quản lý trực tiếp các đơn vị mới;"},{"k":"p","t":"a.4) Đề nghị cơ quan Hải quan thực hiện xác nhận việc người nộp thuế đã hoàn thành nghĩa vụ nộp thuế và các khoản thu khác thuộc ngân sách nhà nước đối với hoạt động xuất nhập khẩu theo quy định tại Điều 140 Thông tư số 38/2015/TT-BTC quy định về thủ tục hải quan; kiểm tra, giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu (được sửa đổi, bổ sung tại khoản 61 Điều 1 Thông tư số 121/2025/TT-BTC) trong thời hạn 03 (ba) ngày làm việc kể từ ngày ban hành Thông báo về việc người nộp thuế ngừng hoạt động và đang làm thủ tục chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"a.5) Ban hành Thông báo về việc người nộp thuế chấm dứt hiệu lực mã số thuế mẫu số 18/TB-ĐKT ban hành kèm theo Thông tư này trong thời hạn 03 (ba) ngày làm việc kể từ ngày người nộp thuế đã hoàn thành nghĩa vụ nộp thuế với cơ quan quản lý thuế hoặc cơ quan thuế hoàn thành việc chuyển toàn bộ nghĩa vụ thuế và các khoản thu khác thuộc ngân sách nhà nước của đơn vị phụ thuộc sang đơn vị chủ quản, của đơn vị bị chia, bị sáp nhập, bị hợp nhất sang đơn vị mới theo quy định tại điểm a.3 khoản này;"},{"k":"p","t":"b) Cơ quan thuế quản lý khoản thu thực hiện như sau:"},{"k":"p","t":"b.1) Thực hiện các công việc quy định tại điểm a.2, a.3 khoản này đối với các khoản thu phát sinh trên địa bàn;"},{"k":"p","t":"b.2) Cập nhật thông tin người nộp thuế đã hoàn thành nghĩa vụ thuế đối với khoản thu thuộc cơ quan thuế quản lý vào Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày người nộp thuế hoàn thành nghĩa vụ nộp thuế tại cơ quan thuế quản lý khoản thu."},{"k":"p","t":"2. Xử lý hồ sơ chấm dứt hiệu lực mã số thuế của người nộp thuế quy định tại khoản 5 Điều 13 Thông tư này"},{"k":"p","t":"a) Cơ quan thuế quản lý trực tiếp thực hiện như quy định tại điểm a khoản 1 Điều này. Riêng quy định về ban hành Thông báo về việc người nộp thuế chấm dứt hiệu lực mã số thuế mẫu số 18/TB-ĐKT ban hành kèm theo Thông tư này được thay bằng Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể/chấm dứt hoạt động đến cơ quan đăng ký kinh doanh mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"b) Cơ quan thuế quản lý khoản thu thực hiện như quy định tại điểm b khoản 1 Điều này."},{"k":"p","t":"3. Xử lý chấm dứt hiệu lực mã số thuế của người nộp thuế theo thông tin cơ quan đăng ký kinh doanh gửi cho cơ quan thuế quy định tại khoản 4 Điều 13 Thông tư này"},{"k":"p","t":"a) Đối với giao dịch trao đổi thông tin về quyết định giải thể doanh nghiệp, hợp tác xã, thông báo tổ hợp tác đang làm thủ tục chấm dứt hoạt động do cơ quan đăng ký kinh doanh chuyển đến theo quy định tại điểm a khoản 4 Điều 13 Thông tư này"},{"k":"p","t":"a.1) Cơ quan thuế quản lý trực tiếp thực hiện như quy định tại điểm a khoản 1 Điều này. Riêng quy định về ban hành Thông báo về việc người nộp thuế chấm dứt hiệu lực mã số thuế mẫu số 18/TB-ĐKT ban hành kèm theo Thông tư này được thay bằng Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể/chấm dứt hoạt động đến cơ quan đăng ký kinh doanh mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"a.2) Cơ quan thuế quản lý khoản thu thực hiện như quy định tại điểm b khoản 1 Điều này;"},{"k":"p","t":"b) Đối với giao dịch trao đổi thông tin giải thể doanh nghiệp, hợp tác xã; chấm dứt hoạt động tổ hợp tác do cơ quan đăng ký kinh doanh chuyển đến theo quy định tại điểm b khoản 4 Điều 13 Thông tư này"},{"k":"p","t":"Hệ thống ứng dụng đăng ký thuế tự động trả kết quả về việc người nộp thuế đã hoàn thành hoặc chưa hoàn thành nghĩa vụ thuế trên cơ sở thông tin xử lý chấm dứt hiệu lực mã số thuế do cơ quan thuế cập nhật trên Hệ thống; tự động cập nhật mã số thuế của người nộp thuế về trạng thái “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay trong ngày nhận được giao dịch xác nhận giải thể doanh nghiệp, hợp tác xã, chấm dứt hoạt động tổ hợp tác của cơ quan đăng ký kinh doanh nếu người nộp thuế đã hoàn thành nghĩa vụ thuế;"},{"k":"p","t":"c) Đối với giao dịch trao đổi thông tin chấm dứt tồn tại của doanh nghiệp, hợp tác xã bị chia, bị hợp nhất, bị sáp nhập do cơ quan đăng ký kinh doanh chuyển đến theo quy định tại điểm b khoản 4 Điều 13 Thông tư này"},{"k":"p","t":"c.1) Cơ quan thuế quản lý trực tiếp thực hiện như quy định tại điểm a khoản 1 Điều này. Riêng quy định về ban hành Thông báo về việc người nộp thuế chấm dứt hiệu lực mã số thuế mẫu số 18/TB-ĐKT ban hành kèm theo Thông tư này được thay bằng Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể/chấm dứt hoạt động đến cơ quan đăng ký kinh doanh mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"c.2) Cơ quan thuế quản lý khoản thu thực hiện như quy định tại điểm b khoản 1 Điều này;"},{"k":"p","t":"c.3) Sau khi cơ quan thuế quản lý trực tiếp cập nhật thông tin về việc người nộp thuế đã hoàn thành nghĩa vụ thuế trên Hệ thống ứng dụng đăng ký thuế, Hệ thống tự động truyền thông tin sang hệ thống thông tin về đăng ký kinh doanh để cơ quan đăng ký kinh doanh thực hiện chấm dứt tồn tại của doanh nghiệp, hợp tác xã bị chia, bị hợp nhất, bị sáp nhập theo quy định;"},{"k":"p","t":"c.4) Hệ thống ứng dụng đăng ký thuế tự động cập nhật mã số thuế của người nộp thuế về trạng thái “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay trong ngày nhận được giao dịch xác nhận chấm dứt tồn tại doanh nghiệp, hợp tác xã bị chia, bị hợp nhất, bị sáp nhập của cơ quan đăng ký kinh doanh;"},{"k":"p","t":"d) Đối với giao dịch trao đổi thông tin chấm dứt hoạt động của chi nhánh, văn phòng đại diện của doanh nghiệp, hợp tác xã do cơ quan đăng ký kinh doanh chuyển đến theo quy định tại điểm b khoản 4 Điều 13 Thông tư này"},{"k":"p","t":"d.1) Hệ thống ứng dụng đăng ký thuế tự động trả kết quả về việc người nộp thuế đã hoàn thành hoặc chưa hoàn thành nghĩa vụ thuế trên cơ sở thông tin xử lý chấm dứt hiệu lực mã số thuế do cơ quan thuế cập nhật trên Hệ thống; tự động cập nhật mã số thuế của người nộp thuế về trạng thái “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay trong ngày nhận được giao dịch xác nhận chấm dứt hoạt động đối với chi nhánh, văn phòng đại diện của cơ quan đăng ký kinh doanh nếu người nộp thuế đã hoàn thành nghĩa vụ thuế;"},{"k":"p","t":"d.2) Trường hợp người nộp thuế chưa nộp hồ sơ chấm dứt hiệu lực mã số thuế đến
