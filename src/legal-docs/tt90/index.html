cơ quan thuế quản lý trực tiếp theo quy định tại khoản 5 Điều 13 Thông tư này, cơ quan thuế thực hiện như sau:"},{"k":"p","t":"d.2.1) Cơ quan thuế quản lý trực tiếp thực hiện:"},{"k":"p","t":"- Ban hành Thông báo về việc người nộp thuế ngừng hoạt động và đang làm thủ tục chấm dứt hiệu lực mã số thuế mẫu số 17/TB-ĐKT ban hành kèm theo Thông tư này, gửi cho người nộp thuế trong thời hạn 02 (hai) ngày làm việc kể từ ngày cơ quan thuế nhận được thông tin của cơ quan đăng ký kinh doanh;"},{"k":"p","t":"- Ban hành Thông báo về việc yêu cầu người nộp thuế nộp hồ sơ chấm dứt hiệu lực mã số thuế mẫu số 29/TB-ĐKT ban hành kèm theo Thông tư này gửi cho người nộp thuế để thực hiện các thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế theo quy định tại khoản 5 Điều 13 Thông tư này;"},{"k":"p","t":"d.2.2) Cơ quan thuế quản lý khoản thu chưa thực hiện các quy định để chấm dứt theo dõi nghĩa vụ đối với khoản thu phát sinh trên địa bàn mà sẽ thực hiện khi người nộp thuế nộp hồ sơ chấm dứt hiệu lực mã số thuế đến cơ quan thuế quản lý trực tiếp theo quy định tại khoản 5 Điều 13 Thông tư này theo thông báo của cơ quan thuế quản lý trực tiếp;"},{"k":"p","t":"đ) Đối với giao dịch trao đổi thông tin về việc chấm dứt hoạt động địa điểm kinh doanh được hệ thống thông tin về đăng ký kinh doanh truyền sang Hệ thống ứng dụng đăng ký thuế: Hệ thống ứng dụng đăng ký thuế thực hiện cập nhật thông tin chấm dứt hoạt động của địa điểm kinh doanh theo mã số địa điểm kinh doanh và mã số thuế đơn vị chủ quản địa điểm kinh doanh vào cơ sở dữ liệu quản lý thuế;"},{"k":"p","t":"e) Trường hợp doanh nghiệp, hợp tác xã đã được cơ quan thuế ban hành Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể, chấm dứt hoạt động đến cơ quan đăng ký kinh doanh (mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này), nhưng quá 180 ngày kể từ ngày cơ quan thuế nhận được giao dịch trao đổi thông tin về quyết định giải thể mà cơ quan thuế chưa nhận được giao dịch giải thể, chấm dứt hoạt động từ cơ quan đăng ký kinh doanh, cơ quan thuế ban hành văn bản gửi cơ quan đăng ký kinh doanh đề nghị cập nhật tình trạng pháp lý của doanh nghiệp, hợp tác xã sang “đã giải thể” theo quy định của pháp luật về đăng ký kinh doanh làm cơ sở để cơ quan thuế thực hiện việc chấm dứt hiệu lực mã số thuế của người nộp thuế trên Hệ thống ứng dụng đăng ký thuế theo quy định."},{"k":"p","t":"4. Xử lý chấm dứt hiệu lực mã số thuế theo quyết định, thông báo thu hồi giấy phép của cơ quan nhà nước có thẩm quyền gửi đến cơ quan thuế theo quy định tại điểm a, điểm b khoản 8 Điều 13 Thông tư này"},{"k":"p","t":"a) Trường hợp thu hồi để cưỡng chế thi hành quyết định hành chính về quản lý thuế"},{"k":"p","t":"Khi cơ quan thuế quản lý trực tiếp nhận được quyết định, thông báo thu hồi giấy phép của cơ quan đăng ký kinh doanh, cơ quan nhà nước có thẩm quyền, cơ quan thuế cập nhật thông tin mã số thuế của người nộp thuế về trạng thái “Người nộp thuế ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế”;"},{"k":"p","t":"b) Trường hợp thu hồi do vi phạm pháp luật"},{"k":"p","t":"b.1) Cơ quan thuế quản lý trực tiếp thực hiện:"},{"k":"p","t":"- Cập nhật thông tin và trạng thái mã số thuế của người nộp thuế, mã số thuế nộp thay (nếu có) về trạng thái “Người nộp thuế ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” và ban hành Thông báo về việc mã số thuế chấm dứt hiệu lực theo đơn vị chủ quản mẫu số 35/TB-ĐKT ban hành kèm theo Thông tư này (nếu có) gửi cho người nộp thuế sau khi nhận được quyết định, thông báo thu hồi giấy phép của cơ quan đăng ký kinh doanh hoặc cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"- Cập nhật thông tin thu hồi giấy phép của địa điểm kinh doanh theo mã số địa điểm kinh doanh và mã số thuế đơn vị chủ quản địa điểm kinh doanh vào cơ sở dữ liệu quản lý thuế trong trường hợp địa điểm kinh doanh bị thu hồi giấy phép;"},{"k":"p","t":"- Ban hành Thông báo về việc yêu cầu người nộp thuế nộp hồ sơ chấm dứt hiệu lực mã số thuế mẫu số 29/TB-ĐKT gửi cho người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế, đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã để thực hiện các thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế theo quy định tại khoản 5, khoản 7 Điều 13 Thông tư này (trừ trường hợp người nộp thuế đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký);"},{"k":"p","t":"b.2) Sau khi nhận được quyết định, thông báo giải thể doanh nghiệp, hợp tác xã và chấm dứt hoạt động của đơn vị phụ thuộc do cơ quan đăng ký kinh doanh chuyển đến hoặc hồ sơ chấm dứt hiệu lực mã số thuế của người nộp thuế do thu hồi giấy phép theo quy định tại Điều 13 Thông tư này, cơ quan thuế quản lý trực tiếp và cơ quan thuế quản lý khoản thu xử lý chấm dứt hiệu lực mã số thuế đối với từng trường hợp tương ứng theo quy định tại Điều này."},{"k":"p","t":"5. Xử lý chấm dứt hiệu lực mã số thuế đối với doanh nghiệp, hợp tác xã phá sản"},{"k":"p","t":"a) Khi nhận được quyết định mở thủ tục phá sản của Tòa án đối với doanh nghiệp, hợp tác xã hoặc thông tin của cơ quan đăng ký kinh doanh gửi qua hệ thống thông tin về đăng ký kinh doanh, cơ quan thuế quản lý trực tiếp cập nhật thông tin người nộp thuế về trạng thái “NNT chờ làm thủ tục phá sản” ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày nhận được quyết định mở thủ tục phá sản của Tòa án hoặc thông tin trên Hệ thống ứng dụng đăng ký thuế. Cơ quan thuế quản lý trực tiếp phối hợp với cơ quan thuế quản lý khoản thu xác định nghĩa vụ thuế của người nộp thuế để gửi Tòa án thu hồi nợ thuế theo quy định của Luật Phá sản;"},{"k":"p","t":"b) Khi nhận được quyết định tuyên bố phá sản doanh nghiệp, hợp tác xã của Tòa án theo quy định tại điểm c khoản 8 Điều 13 Thông tư này"},{"k":"p","t":"b.1) Cơ quan thuế quản lý trực tiếp thực hiện:"},{"k":"p","t":"- Cập nhật thông tin người nộp thuế về trạng thái “NNT ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày nhận được quyết định tuyên bố phá sản của Tòa án;"},{"k":"p","t":"- Ban hành Thông báo gửi cho đơn vị chủ quản, đơn vị phụ thuộc theo mẫu số 35/TB-ĐKT ban hành kèm theo Thông tư này trong trường hợp cơ quan thuế nhận được quyết định tuyên bố phá sản của Tòa án đối với đơn vị chủ quản nhưng các đơn vị phụ thuộc chưa thực hiện thủ tục chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"- Thực hiện các công việc quy định tại điểm a.2, a.3, a.4, a.5 khoản 1 Điều này;"},{"k":"p","t":"b.2) Cơ quan thuế quản lý khoản thu thực hiện như quy định tại điểm b khoản 1 Điều này."},{"k":"p","t":"6. Khi mã số thuế của người nộp thuế là tổ chức bị chấm dứt hiệu lực thì Giấy chứng nhận đăng ký thuế, Thông báo mã số thuế hết hiệu lực."},{"k":"p","t":"7. Cơ quan thuế quản lý trực tiếp cập nhật thông tin và chuyển trạng thái mã số thuế của người nộp thuế về trạng thái 03 “NNT ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” lý do tương ứng ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày ban hành Thông báo về việc người nộp thuế ngừng hoạt động và đang làm thủ tục chấm dứt hiệu lực mã số thuế mẫu số 17/TB-ĐKT, Thông báo về việc người nộp thuế hoàn thành nghĩa vụ thuế để nộp hồ sơ giải thể/chấm dứt hoạt động đến cơ quan đăng ký kinh doanh mẫu số 28/TB-ĐKT ban hành kèm theo Thông tư này; cập nhật trạng thái 01 “NNT ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực MST” lý do tương ứng ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày ban hành Thông báo về việc người nộp thuế chấm dứt hiệu lực mã số thuế mẫu số 18/TB-ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"8. Trường hợp người nộp thuế đã có hồ sơ chấm dứt hiệu lực mã số thuế nhưng không hoàn thành nghĩa vụ thuế, sau đó nếu cơ quan thuế thực hiện xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký theo quy định tại khoản 2 Điều 16 Thông tư này và có kết quả là người nộp thuế không còn hoạt động tại địa chỉ đã đăng ký, cơ quan thuế cập nhật trạng thái mã số thuế là 06, lý do tương ứng với hồ sơ chấm dứt hiệu lực mã số thuế của người nộp thuế."},{"k":"p","t":"9. Đối với cơ quan, tổ chức đã chấm dứt tồn tại do sắp xếp tổ chức bộ máy nhà nước nhưng không thực hiện thủ tục chấm dứt hiệu lực mã số thuế thì cơ quan thuế cập nhật trạng thái “Người nộp thuế ngừng hoạt động nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” trên cơ sở quyết định của cấp có thẩm quyền về việc sắp xếp tổ chức bộ máy và cập nhật trạng thái “Người nộp thuế ngừng hoạt động và đã hoàn thành thủ tục chấm dứt hiệu lực mã số thuế” nếu người nộp thuế đã hoàn thành nghĩa vụ thuế."}]},{"id":"tt90_16","no":16,"code":"Điều 16","title":"Điều 16. Chấm dứt hiệu lực mã số thuế đối với người nộp thuế trong trường hợp cơ quan thuế ban hành Thông báo không hoạt động tại địa chỉ đã đăng ký","shortTitle":"Chấm dứt hiệu lực mã số thuế đối với người nộp thuế trong trường hợp cơ quan thuế ban hành Thông báo không hoạt động tại địa chỉ đã đăng ký","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 01 ngày làm việc kể từ ngày cơ quan thuế ban hành hoặc tiếp nhận văn bản (quyết định, văn bản, thông báo) hoặc hồ sơ của người nộp thuế thuộc một trong các trường hợp dưới đây, cơ quan thuế thực hiện cập nhật thông tin vào Hệ thống ứng dụng đăng ký thuế và chuyển trạng thái của người nộp thuế đang hoạt động sang trạng thái 09 “Người nộp thuế chờ xác minh tình trạng hoạt động tại địa chỉ đã đăng ký”, bao gồm:"},{"k":"p","t":"a) Cơ quan thuế ban hành thông báo yêu cầu nộp hồ sơ khai thuế lần 2, người nộp thuế vẫn chưa nộp hồ sơ khai thuế;"},{"k":"p","t":"b) Cơ quan thuế nhận lại văn bản của cơ quan thuế đã gửi cho người nộp thuế qua đường bưu chính nhưng bưu điện trả lại do không có người nhận hoặc do địa chỉ không tồn tại;"},{"k":"p","t":"c) Cơ quan thuế nhận được thông tin do các tổ chức, cá nhân cung cấp có chứng cứ kèm theo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"d) Cơ quan thuế nhận được văn bản của cơ quan quản lý nhà nước có thẩm quyền thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"đ) Cơ quan thuế tiếp nhận hồ sơ đăng ký sử dụng hóa đơn điện tử hoặc hồ sơ thay đổi thông tin đăng ký sử dụng hóa đơn điện tử mà người nộp thuế được phân loại rủi ro thuộc diện phải xác minh tình trạng hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"e) Cơ quan thuế nhận được thông tin về việc cấp giấy chứng nhận đăng ký kinh doanh do hệ thống thông tin về đăng ký kinh doanh truyền sang Hệ thống ứng dụng đăng ký thuế mà người nộp thuế được phân loại rủi ro thuộc diện phải xác minh tình trạng hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"g) Cơ quan thuế cấp Giấy chứng nhận đăng ký thuế lần đầu hoặc khi thay đổi thông tin đăng ký thuế mà người nộp thuế được phân loại rủi ro thuộc diện phải xác minh tình trạng hoạt động tại địa chỉ đã đăng ký."},{"k":"p","t":"Đồng thời, cơ quan thuế gửi thông tin về việc người nộp thuế thuộc trường hợp chờ xác minh tình trạng hoạt động tại địa chỉ đã đăng ký đến tài khoản giao dịch thuế điện tử của người nộp thuế; địa chỉ thư điện tử, số điện thoại của người đại diện theo pháp luật của người nộp thuế đã đăng ký với cơ quan thuế hoặc qua ứng dụng EtaxMobile, VneID của người đại diện theo pháp luật của người nộp thuế. Người nộp thuế có thể đến cơ quan thuế giải trình trực tiếp hoặc bổ sung thông tin, tài liệu bằng văn bản để chứng minh tình trạng đang hoạt động tại địa chỉ đã đăng ký."},{"k":"p","t":"Trường hợp người nộp thuế nộp hồ sơ khai thuế hoặc giải trình trước khi cơ quan thuế thực hiện xác minh theo quy định tại khoản 2 Điều này và được cơ quan thuế chấp thuận giải trình thì cơ quan thuế cập nhật lại trạng thái mã số thuế của người nộp thuế trên Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày tiếp nhận hồ sơ khai thuế hoặc chấp thuận giải trình của người nộp thuế."},{"k":"p","t":"2. Trong thời hạn 05 (năm) ngày làm việc kể từ ngày cơ quan thuế chuyển trạng thái mã số thuế của người nộp thuế sang trạng thái 09 “Người nộp thuế chờ xác minh tình trạng hoạt động tại địa chỉ đã đăng ký” theo quy định tại khoản 1 Điều này, người nộp thuế vẫn chưa nộp hồ sơ khai thuế, hoặc người nộp thuế không giải trình, hoặc giải trình nhưng không được cơ quan thuế chấp thuận, cơ quan thuế thực hiện xác minh thực tế hoạt động của người nộp thuế tại địa chỉ đã đăng ký."},{"k":"p","t":"a) Trường hợp kết quả xác minh người nộp thuế còn hoạt động tại địa chỉ đã đăng ký thì người nộp thuế phải thực hiện đầy đủ các nghĩa vụ thuế, yêu cầu của cơ quan thuế theo quy định của pháp luật và ký xác nhận vào biên bản xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký mẫu số 15/BB-XMHĐ ban hành kèm theo Thông tư này. Cơ quan thuế thực hiện cập nhật trở lại trạng thái hoạt động của người nộp thuế trên Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày người nộp thuế hoàn thành các nội dung nêu trên;"},{"k":"p","t":"b) Trường hợp kết quả xác minh người nộp thuế không hoạt động tại địa chỉ đã đăng ký thì cơ quan thuế phối hợp với chính quyền địa phương (Ủy ban nhân dân cấp xã hoặc cơ quan công an quản lý địa bàn) lập biên bản xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký mẫu số 15/BB-XMHĐ ban hành kèm theo Thông tư này. Cơ quan thuế ban hành Thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký mẫu số 16/TB-ĐKT ban hành kèm theo Thông tư này trong thời hạn 03 (ba) ngày làm việc kể từ ngày ghi trên biên bản, đồng thời cập nhật thông tin mã số thuế của người nộp thuế về trạng thái 06 “NNT không hoạt động tại địa chỉ đã đăng ký” với lý do số 09 “Cơ quan thuế ban hành Thông báo không hoạt động tại địa chỉ kinh doanh đã đăng ký” vào Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo ngày ban hành thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký; đồng thời truyền thông tin cho hệ thống thông tin về đăng ký kinh doanh ngay trong ngày cập nhật trạng thái “NNT không hoạt động tại địa chỉ đã đăng ký” vào Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"Cơ quan thuế thực hiện công khai trạng thái mã số thuế của người nộp thuế trên Hệ thống thông tin quản lý thuế theo quy định tại Điều 33 Thông tư này. Cơ quan quản lý nhà nước trên địa bàn (gồm: cơ quan Hải quan, cơ quan đăng ký kinh doanh (trừ trường hợp đã thực hiện liên thông đăng ký kinh doanh và đăng ký thuế), Viện Kiểm sát, cơ quan công an, cơ quan quản lý thị trường, cơ quan cấp giấy phép thành lập và hoạt động) và tổ chức, cá nhân khác có trách nhiệm tra cứu thông tin và trạng thái mã số thuế của người nộp thuế đã được cơ quan thuế công khai để thực hiện nhiệm vụ quản lý nhà nước và các nội dung khác theo quy định của pháp luật."},{"k":"p","t":"3. Trường hợp đơn vị chủ quản thuộc một trong các trường hợp quy định tại khoản 1, khoản 2 Điều này có đơn vị phụ thuộc"},{"k":"p","t":"a) Cơ quan thuế quản lý đơn vị chủ quản đồng thời phải thông báo cho đơn vị phụ thuộc về việc đơn vị chủ quản được nhận diện không hoạt động tại địa chỉ đã đăng ký theo mẫu số 26/TB-ĐKT ban hành kèm theo Thông tư này trong thời hạn 02 (hai) ngày làm việc kể từ ngày cập nhật trạng thái 09 “Người nộp thuế chờ xác minh tình trạng hoạt động tại địa chỉ đã đăng ký” quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Cơ quan thuế quản lý đơn vị chủ quản khi ban hành thông báo về việc đơn vị chủ quản không hoạt động tại địa chỉ đã đăng ký theo quy định tại khoản 2 Điều này đồng thời cập nhật tình trạng không hoạt động tại địa chỉ đã đăng ký của đơn vị phụ thuộc theo đơn vị chủ quản vào Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất vào đầu giờ ngày làm việc tiếp theo kể từ ngày ban hành thông báo."},{"k":"p","t":"4. Sau khi ban hành thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký đối với doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã, cơ quan thuế phối hợp khi cơ quan đăng ký kinh doanh xử lý vi phạm hoặc thu hồi giấy chứng nhận đăng ký kinh doanh theo quy định của Luật Doanh nghiệp, Luật Hợp tác xã. Sau khi nhận được thông tin thu hồi Giấy chứng nhận từ cơ quan đăng ký kinh doanh, cơ quan thuế thực hiện theo quy định tại khoản 5 Điều này."},{"k":"p","t":"5. Sau khi cơ quan thuế ban hành thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký"},{"k":"p","t":"a) Trường hợp cơ quan thuế nhận được thông tin thu hồi giấy phép của người nộp thuế do cơ quan có thẩm quyền gửi đến, cơ quan thuế thực hiện cập nhật thông tin và chuyển trạng thái mã số thuế của người nộp thuế, mã số thuế nộp thay (nếu có) sang trạng thái 06 lý do 13 “Người nộp thuế không hoạt động tại địa chỉ đã đăng ký và bị thu hồi giấy phép hoạt động”;"},{"k":"p","t":"b) Trường hợp cơ quan thuế nhận được quyết định mở thủ tục phá sản, quyết định tuyên bố phá sản của Tòa án đối với người nộp thuế, cơ quan thuế thực hiện cập nhật thông tin và chuyển trạng thái mã số thuế của người nộp thuế sang trạng thái 06 lý do 07 hoặc lý do 12. Cơ quan thuế quản lý trực tiếp phối hợp với cơ quan thuế quản lý khoản thu xác định nghĩa vụ thuế của người nộp thuế để gửi Tòa án thu hồi nợ thuế theo quy định của Luật Phá sản;"},{"k":"p","t":"c) Trước khi thực hiện thủ tục giải thể, chấm dứt hoạt động (bao gồm cả giải thể tự nguyện và giải thể bắt buộc), người nộp thuế phải nộp hồ sơ đề nghị chấm dứt hiệu lực mã số thuế theo quy định tại khoản 6 Điều 13 Thông tư này (đối với người nộp thuế đăng ký thuế theo cơ chế một cửa liên thông), hoặc khoản 7 Điều 13 Thông tư này (đối với người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế). Trường hợp có sự thay đổi về địa chỉ trụ sở hoặc các thông tin đăng ký thuế khác mà đã được cơ quan nhà nước có thẩm quyền chấp thuận, người nộp thuế phải nộp kèm theo hồ sơ thay đổi thông tin theo quy định tại Điều 9 Thông tư này."},{"k":"p","t":"Trong thời hạn 01 (một) ngày làm việc kể từ ngày cơ quan thuế quản lý trực tiếp tiếp nhận đầy đủ hồ sơ đề nghị chấm dứt hiệu lực mã số thuế, cơ quan thuế thực hiện chuyển trạng thái mã số thuế của người nộp thuế và các đơn vị phụ thuộc của người nộp thuế về trạng thái 06 lý do 03 “Người nộp thuế không hoạt động tại địa chỉ đã đăng ký và có hồ sơ chấm dứt hiệu lực mã số thuế” trên Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"Cơ quan thuế lập danh sách các hồ sơ khai thuế còn thiếu, tình hình sử dụng hoá đơn, số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ và thực hiện xử phạt đối với các hành vi vi phạm pháp luật về thuế, hoá đơn tính đến thời điểm người nộp thuế nộp hồ sơ đề nghị chấm dứt hiệu lực mã số thuế theo quy định, không bắt buộc cơ quan thuế xác minh tình trạng hoạt động của người nộp thuế tại địa chỉ đã đăng ký trong trường hợp này."},{"k":"p","t":"Người nộp thuế có trách nhiệm hoàn thành nghĩa vụ thuế theo quy định tại Điều 14 Thông tư này trước khi chấm dứt hiệu lực mã số thuế. Cơ quan thuế quản lý trực tiếp thực hiện tương tự quy định tại điểm a.2, a.3, a.4, a.5 khoản 1 Điều 15 Thông tư này, cơ quan thuế quản lý khoản thu thực hiện tương tự quy định tại điểm b khoản 1 Điều 15 Thông tư này để chấm dứt hiệu lực mã số thuế của người nộp thuế."},{"k":"p","t":"6. Cơ quan thuế thực hiện chấm dứt hiệu lực mã số thuế của người nộp thuế sau khi ban hành thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký (trừ trường hợp quy định tại điểm c khoản 5 Điều này) như sau:"},{"k":"p","t":"a) Đối với người nộp thuế quy định tại khoản 2 Điều 4 Thông tư này đã hoàn thành nghĩa vụ thuế, hóa đơn theo quy định của Luật số 108/2025/QH15 và  Điều 14 Thông tư này hoặc không phát sinh nghĩa vụ thuế, hóa đơn;"},{"k":"p","t":"b) Đối với người nộp thuế đã được xóa các khoản nợ tiền thuế, tiền chậm nộp, tiền phạt theo quy định tại điểm c khoản 1 Điều 21 Luật số 108/2025/QH15, không hoàn trả các khoản nộp thừa theo quy định tại điểm b khoản 4 Điều 15 Luật số 108/2025/QH15 (người nộp thuế đã hoàn thành nghĩa vụ thuế) và hoàn thành thủ tục hóa đơn theo quy định của pháp luật về hóa đơn."},{"k":"p","t":"Trường hợp người nộp thuế là doanh nghiệp, hợp tác xã, tổ hợp tác chưa bị cập nhật tình trạng đã giải thể trong hệ thống thông tin về đăng ký kinh doanh thì cơ quan thuế gửi danh sách các doanh nghiệp, hợp tác xã, tổ hợp tác đã bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký và chấm dứt hiệu lực mã số thuế cho cơ quan đăng ký kinh doanh để xử lý, cập nhật tình trạng pháp lý của doanh nghiệp, hợp tác xã, tổ hợp tác theo quy định của pháp luật về đăng ký kinh doanh."},{"k":"p","t":"Mục 5KHÔI PHỤC MÃ SỐ THUẾ"}]},{"id":"tt90_17","no":17,"code":"Điều 17","title":"Điều 17. Các trường hợp khôi phục mã số thuế và Hồ sơ đề nghị khôi phục mã số thuế","shortTitle":"Các trường hợp khôi phục mã số thuế và Hồ sơ đề nghị khôi phục mã số thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh được khôi phục mã số thuế trong các trường hợp sau đây:"},{"k":"p","t":"a) Được khôi phục tình trạng pháp lý theo quy định của pháp luật về đăng ký kinh doanh thì đồng thời được khôi phục mã số thuế;"},{"k":"p","t":"b) Có hồ sơ đề nghị khôi phục mã số thuế sau khi cơ quan thuế có thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký nhưng chưa bị thu hồi giấy phép và chưa bị chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"c) Đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã có nhu cầu tiếp tục hoạt động kinh doanh sau khi đã có hồ sơ chấm dứt hiệu lực mã số thuế theo quy định tại khoản 5 Điều 13 Thông tư này gửi đến cơ quan thuế nhưng chưa nộp hồ sơ chấm dứt hoạt động đến cơ quan đăng ký kinh doanh."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế nộp hồ sơ đề nghị khôi phục mã số thuế đến cơ quan thuế quản lý trực tiếp trong các trường hợp sau đây:"},{"k":"p","t":"a) Được cơ quan có thẩm quyền có văn bản hủy bỏ văn bản thu hồi giấy phép thành lập và hoạt động, quyết định thành lập hoặc giấy phép tương đương;"},{"k":"p","t":"b) Khi cơ quan thuế có thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký nhưng chưa bị thu hồi giấy phép và chưa bị chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"c) Khi có nhu cầu tiếp tục hoạt động kinh doanh sau khi đã có hồ sơ chấm dứt hiệu lực mã số thuế theo quy định tại khoản 7 Điều 13 Thông tư này gửi đến cơ quan thuế nhưng cơ quan thuế chưa ban hành thông báo chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"3. Mã số thuế được tiếp tục sử dụng trong các giao dịch kinh tế kể từ ngày quyết định khôi phục tình trạng pháp lý của cơ quan đăng ký kinh doanh có hiệu lực hoặc ngày cơ quan thuế thông báo khôi phục mã số thuế."},{"k":"p","t":"4. Hồ sơ đề nghị khôi phục mã số thuế của người nộp thuế"},{"k":"p","t":"a) Người nộp thuế quy định tại khoản 2 Điều 4 Thông tư này bị cơ quan có thẩm quyền thu hồi giấy phép thành lập và hoạt động hoặc giấy phép tương đương, cơ quan thuế đã chấm dứt hiệu lực mã số thuế theo quy định, nhưng sau đó cơ quan có thẩm quyền có văn bản hủy bỏ văn bản thu hồi thì người nộp thuế nộp hồ sơ đề nghị khôi phục mã số thuế đến cơ quan thuế quản lý trực tiếp chậm nhất là 10 (mười) ngày làm việc kể từ ngày cơ quan có thẩm quyền ban hành văn bản hủy bỏ văn bản thu hồi."},{"k":"p","t":"Hồ sơ gồm:"},{"k":"p","t":"- Văn bản đề nghị khôi phục mã số thuế mẫu số 25/ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử văn bản hủy bỏ văn bản thu hồi giấy phép thành lập và hoạt động hoặc giấy phép tương đương của cơ quan có thẩm quyền;"},{"k":"p","t":"b) Sau khi cơ quan thuế có thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký theo quy định tại khoản 3 Điều 10 hoặc Điều 16 Thông tư này nhưng chưa bị thu hồi giấy chứng nhận đăng ký kinh doanh, giấy phép thành lập và hoạt động hoặc giấy phép tương đương và chưa bị chấm dứt hiệu lực mã số thuế thì người nộp thuế nộp văn bản đề nghị khôi phục mã số thuế mẫu số 25/ĐKT ban hành kèm theo Thông tư này đến cơ quan thuế quản lý trực tiếp trước ngày cơ quan thuế ban hành thông báo về việc chấm dứt hiệu lực mã số thuế theo quy định."},{"k":"p","t":"Trường hợp người nộp thuế đã thay đổi địa chỉ trụ sở nhưng không đăng ký thay đổi thông tin với cơ quan thuế hoặc cơ quan đăng ký kinh doanh, người nộp thuế phải ghi địa chỉ trụ sở hiện tại và giải trình lý do trong văn bản đề nghị khôi phục mã số thuế, đồng thời nộp kèm hồ sơ thông báo thay đổi thông tin đăng ký thuế theo quy định tại Điều 9 Thông tư này."},{"k":"p","t":"c) Người nộp thuế quy định tại khoản 2 Điều 4 Thông tư này khi có nhu cầu tiếp tục hoạt động kinh doanh sau khi đã nộp hồ sơ chấm dứt hiệu lực mã số thuế gửi đến cơ quan thuế theo quy định tại khoản 7 Điều 13 Thông tư này nhưng cơ quan thuế chưa ban hành Thông báo về việc chấm dứt hiệu lực mã số thuế theo quy định tại Điều 15 Thông tư này thì người nộp thuế nộp văn bản đề nghị khôi phục mã số thuế mẫu số 25/ĐKT ban hành kèm theo Thông tư này đến cơ quan thuế quản lý trực tiếp trước ngày cơ quan thuế ban hành Thông báo về việc chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"d) Đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã đã nộp hồ sơ chấm dứt hiệu lực mã số thuế đến cơ quan thuế theo quy định tại khoản 5 Điều 13 Thông tư này, sau đó có văn bản hủy quyết định chấm dứt hoạt động đơn vị phụ thuộc và người nộp thuế chưa nộp hồ sơ chấm dứt hoạt động đến cơ quan đăng ký kinh doanh thì người nộp thuế nộp hồ sơ đề nghị khôi phục mã số thuế đến cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"Hồ sơ gồm:"},{"k":"p","t":"- Văn bản đề nghị khôi phục mã số thuế mẫu số 25/ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử văn bản hủy quyết định chấm dứt hoạt động đơn vị phụ thuộc."},{"k":"p","t":"Người nộp thuế đề nghị khôi phục mã số thuế theo quy định tại điểm b, c, d khoản này phải hoàn thành đầy đủ nghĩa vụ về thuế theo quy định tại điểm đ khoản 1 Điều 7 Nghị định số 252/2026/NĐ-CP trước khi được khôi phục mã số thuế."},{"k":"p","t":"5. Hồ sơ khôi phục mã số thuế  đối với doanh nghiệp, hợp tác xã, tổ hợp tác được khôi phục tình trạng pháp lý theo quy định của pháp luật về đăng ký kinh doanh là thông tin khôi phục tình trạng pháp lý của doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã do cơ quan đăng ký kinh doanh gửi cho cơ quan thuế qua hệ thống thông tin về đăng ký kinh doanh sang Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"Trường hợp doanh nghiệp, hợp tác xã, tổ hợp tác đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký thì sau khi được cơ quan đăng ký kinh doanh khôi phục tình trạng pháp lý theo quy định của pháp luật về đăng ký kinh doanh, người nộp thuế phải nộp hồ sơ khôi phục mã số thuế đến cơ quan thuế quản lý trực tiếp theo quy định tại điểm b khoản 4 Điều này."},{"k":"p","t":"Đối với trường hợp khôi phục mã số thuế của doanh nghiệp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp theo đề nghị thu hồi của cơ quan thuế gửi đến cơ quan đăng ký kinh doanh cấp tỉnh, cơ quan thuế quản lý trực tiếp phải có văn bản đề nghị khôi phục tình trạng pháp lý của doanh nghiệp gửi đến cơ quan đăng ký kinh doanh cấp tỉnh sau khi doanh nghiệp nộp đủ tiền thuế, tiền phạt vào ngân sách nhà nước."}]},{"id":"tt90_18","no":18,"code":"Điều 18","title":"Điều 18. Xử lý hồ sơ khôi phục mã số thuế và trả kết quả","shortTitle":"Xử lý hồ sơ khôi phục mã số thuế và trả kết quả","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với hồ sơ của người nộp thuế: Cơ quan thuế tiếp nhận, xử lý hồ sơ khôi phục mã số thuế và trả kết quả cho người nộp thuế như sau:"},{"k":"p","t":"a) Xử lý hồ sơ khôi phục mã số thuế của người nộp thuế theo quy định tại điểm a khoản 4 Điều 17 Thông tư này"},{"k":"p","t":"Trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận đủ hồ sơ đề nghị khôi phục mã số thuế của người nộp thuế theo quy định, cơ quan thuế thực hiện:"},{"k":"p","t":"- Lập Thông báo về việc khôi phục mã số thuế mẫu số 19/TB-ĐKT, Thông báo về việc mã số thuế được khôi phục theo đơn vị chủ quản mẫu số 37/TB-ĐKT (nếu có) ban hành kèm theo Thông tư này gửi cho người nộp thuế, đơn vị phụ thuộc (nếu mã số thuế được khôi phục là đơn vị chủ quản);"},{"k":"p","t":"- Cập nhật trạng thái mã số thuế cho người nộp thuế trên Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày ban hành thông báo về việc khôi phục mã số thuế."},{"k":"p","t":"Trường hợp mã số thuế của người nộp thuế đã bị cơ quan thuế cập nhật sang trạng thái 06 thì cơ quan thuế phải thực hiện thực hiện xác minh thực tế tại địa chỉ trụ sở của người nộp thuế trong thời hạn 10 (mười) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế tương tự như quy định tại điểm b khoản này trước khi khôi phục mã số thuế;"},{"k":"p","t":"b) Xử lý hồ sơ khôi phục mã số thuế của người nộp thuế theo quy định tại điểm b khoản 4 Điều 17 Thông tư này"},{"k":"p","t":"b.1) Trong thời hạn 10 (mười) ngày làm việc kể từ ngày nhận đủ hồ sơ đề nghị khôi phục mã số thuế của người nộp thuế theo quy định, cơ quan thuế lập danh sách các hồ sơ khai thuế còn thiếu, tình hình sử dụng hoá đơn, số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ theo mẫu số 19.1/TB-ĐKT (Thông báo về việc các nghĩa vụ thuế phải hoàn thành trước khi khôi phục mã số thuế) và thực hiện xử phạt đối với các hành vi vi phạm pháp luật về thuế, hoá đơn tính đến thời điểm người nộp thuế nộp hồ sơ đề nghị khôi phục mã số thuế theo quy định, đồng thời thực hiện xác minh thực tế tại địa chỉ trụ sở kinh doanh của người nộp thuế và lập biên bản xác minh tình trạng hoạt động tại địa chỉ trụ sở kinh doanh của người nộp thuế mẫu số 15/BB-XMHĐ ban hành kèm theo Thông tư này theo hồ sơ đề nghị khôi phục mã số thuế của người nộp thuế (người nộp thuế phải ký xác nhận vào Biên bản)."},{"k":"p","t":"Trường hợp người nộp thuế có đơn vị phụ thuộc, cơ quan thuế quản lý đơn vị chủ quản thông báo cho cơ quan thuế quản lý đơn vị phụ thuộc để yêu cầu đơn vị phụ thuộc hoàn thành nghĩa vụ thuế trước khi khôi phục mã số thuế. Trường hợp đơn vị phụ thuộc không có khả năng hoàn thành nghĩa vụ thuế thì đơn vị chủ quản có trách nhiệm hoàn thành nghĩa vụ thuế của đơn vị phụ thuộc trước khi khôi phục mã số thuế;"},{"k":"p","t":"b.2) Trường hợp người nộp thuế đã thay đổi địa chỉ trụ sở nhưng không đăng ký thay đổi thông tin với cơ quan thuế hoặc cơ quan đăng ký kinh doanh, nếu người nộp thuế nộp kèm theo hồ sơ chứng minh đã thay đổi địa chỉ trụ sở đầy đủ, đúng quy định, cơ quan thuế thực hiện xác minh thực tế tại địa chỉ trụ sở đang hoạt động của người nộp thuế như sau:"},{"k":"p","t":"- Trường hợp địa chỉ trụ sở đang hoạt động của người nộp thuế thuộc địa bàn cơ quan thuế quản lý: cơ quan thuế thực hiện tương tự như điểm b.1 khoản này;"},{"k":"p","t":"- Trường hợp địa chỉ trụ sở đang hoạt động của người nộp thuế không thuộc địa bàn cơ quan thuế quản lý: Cơ quan thuế nơi người nộp thuế chuyển đi gửi văn bản đề nghị cơ quan thuế nơi người nộp thuế chuyển đến phối hợp với chính quyền địa phương thực hiện xác minh, lập biên bản và gửi kết quả cho cơ quan thuế nơi chuyển đi trong thời hạn 10 (mười) ngày làm việc kể từ ngày nhận được văn bản đề nghị;"},{"k":"p","t":"- Trường hợp doanh nghiệp, hợp tác xã, tổ hợp tác thuộc diện đăng ký thuế theo cơ chế một cửa liên thông với đăng ký kinh doanh đã thay đổi địa chỉ trụ sở nhưng không đăng ký thay đổi với cơ quan đăng ký kinh doanh, cơ quan thuế thực hiện đánh giá rủi ro để quyết định việc xác minh tại địa chỉ trụ sở mới hoặc thông báo không khôi phục mã số thuế theo quy định tại điểm d khoản này;"},{"k":"p","t":"b.3) Trong thời hạn 03 (ba) ngày làm việc kể từ ngày người nộp thuế chấp hành đầy đủ các hành vi vi phạm hành chính về thuế và hóa đơn, nộp đầy đủ số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ, bao gồm cả nghĩa vụ thuế của đơn vị phụ thuộc (nếu có), cơ quan thuế thực hiện:"},{"k":"p","t":"- Lập Thông báo về việc khôi phục mã số thuế cho người nộp thuế mẫu số 19/TB-ĐKT, Thông báo về việc mã số thuế được khôi phục theo đơn vị chủ quản mẫu số 37/TB-ĐKT (nếu có) ban hành kèm theo Thông tư này, gửi người nộp thuế, đơn vị phụ thuộc (nếu mã số thuế được khôi phục là đơn vị chủ quản);"},{"k":"p","t":"- Cập nhật trạng thái mã số thuế của người nộp thuế trên Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày ban hành thông báo về việc khôi phục mã số thuế. Trường hợp doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc của doanh nghiệp, hợp tác xã được khôi phục mã số thuế theo quy định tại điểm này, cơ quan thuế cập nhật về trạng thái mã số thuế tương ứng với tình trạng pháp lý tại hệ thống thông tin về đăng ký kinh doanh sau khi kết thúc tình trạng pháp lý “Không hoạt động tại địa chỉ đã đăng ký”."},{"k":"p","t":"Cơ quan thuế thực hiện công khai Thông báo về việc khôi phục mã số thuế trên Hệ thống thông tin quản lý thuế theo quy định tại Điều 33 Thông tư này. Cơ quan quản lý nhà nước trên địa bàn (gồm: cơ quan Hải quan, cơ quan đăng ký kinh doanh (trừ trường hợp đã thực hiện liên thông đăng ký kinh doanh và đăng ký thuế), Viện Kiểm sát, cơ quan công an, cơ quan quản lý thị trường, cơ quan cấp giấy phép thành lập và hoạt động) và tổ chức, cá nhân khác có trách nhiệm tra cứu thông tin và trạng thái mã số thuế của người nộp thuế đã được cơ quan thuế công khai để thực hiện nhiệm vụ quản lý nhà nước và các nội dung khác;"},{"k":"p","t":"c) Xử lý hồ sơ khôi phục mã số thuế của người nộp thuế theo quy định tại điểm c, d khoản 4 Điều 17 Thông tư này"},{"k":"p","t":"Trong thời hạn 10 (mười) ngày làm việc kể từ ngày nhận đủ hồ sơ đề nghị khôi phục mã số thuế của người nộp thuế theo quy định, cơ quan thuế lập danh sách các hồ sơ khai thuế còn thiếu, tình hình sử dụng hoá đơn, số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ và thực hiện xử phạt đối với các hành vi vi phạm pháp luật về thuế, hoá đơn tính đến thời điểm người nộp thuế nộp hồ sơ đề nghị khôi phục mã số thuế theo quy định."},{"k":"p","t":"Trong thời hạn 03 (ba) ngày làm việc kể từ ngày người nộp thuế chấp hành đầy đủ các hành vi vi phạm hành chính về thuế và hóa đơn, nộp đủ số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ, cơ quan thuế thực hiện:"},{"k":"p","t":"- Lập Thông báo về việc khôi phục mã số thuế cho người nộp thuế mẫu số 19/TB-ĐKT, Thông báo về việc mã số thuế được khôi phục theo đơn vị chủ quản mẫu số 37/TB-ĐKT (nếu có) ban hành kèm theo Thông tư này, gửi người nộp thuế, đơn vị phụ thuộc (nếu mã số thuế được khôi phục là đơn vị chủ quản);"},{"k":"p","t":"- Cập nhật trạng thái mã số thuế cho người nộp thuế trên Hệ thống ứng dụng đăng ký thuế ngay trong ngày làm việc hoặc chậm nhất là đầu giờ ngày làm việc tiếp theo kể từ ngày ban hành thông báo về việc khôi phục mã số thuế."},{"k":"p","t":"Trường hợp mã số thuế của người nộp thuế đã bị cơ quan thuế cập nhật sang trạng thái 06 thì cơ quan thuế phải thực hiện xác minh thực tế tại địa chỉ trụ sở của người nộp thuế trong thời hạn 10 (mười) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế tương tự như quy định tại điểm b khoản này trước khi khôi phục mã số thuế;"},{"k":"p","t":"d) Cơ quan thuế ban hành Thông báo về việc mã số thuế không được khôi phục mẫu số 38/TB-ĐKT ban hành kèm theo Thông tư này gửi cho người nộp thuế trong các trường hợp sau đây:"},{"k":"p","t":"d.1) Người nộp thuế nộp hồ sơ đề nghị khôi phục mã số thuế không đầy đủ hoặc không thuộc trường hợp được khôi phục mã số thuế theo quy định tại khoản 4 Điều 17 Thông tư này;"},{"k":"p","t":"d.2) Người nộp thuế không hoàn thành nghĩa vụ về thuế, hóa đơn với cơ quan thuế trong thời hạn 30 ngày kể từ ngày cơ quan thuế thông báo cho người nộp thuế danh sách các hồ sơ khai thuế còn thiếu, tình hình sử dụng hoá đơn, số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước phải nộp hoặc còn nợ và thực hiện xử phạt đối với các hành vi vi phạm pháp luật về thuế, hoá đơn theo quy định tại điểm b, c khoản này mà người nộp thuế không giải trình được lý do;"},{"k":"p","t":"d.3) Người nộp thuế thuộc trường hợp phải xác minh tình trạng hoạt động tại địa chỉ trụ sở trước khi khôi phục mã số thuế theo quy định tại điểm a, b, c khoản này nhưng kết quả xác minh người nộp thuế không hoạt động tại địa chỉ trụ sở đã đăng ký hoặc địa chỉ đăng ký thay đổi với cơ quan thuế; hoặc doanh nghiệp, hợp tác xã, tổ hợp tác đã thay đổi địa chỉ trụ sở nhưng cơ quan thuế đã đánh giá rủi ro và quyết định không khôi phục tại địa chỉ mới."},{"k":"p","t":"2. Xử lý hồ sơ khôi phục mã số thuế của người nộp thuế theo quy định tại khoản 5 Điều 17 Thông tư này"},{"k":"p","t":"Khi cơ quan thuế nhận được thông tin khôi phục tình trạng pháp lý đối với doanh nghiệp, hợp tác xã, tổ hợp tác, đơn vị phụ thuộc của doanh nghiệp, đơn vị phụ thuộc của hợp tác xã của cơ quan đăng ký kinh doanh gửi qua hệ thống thông tin về đăng ký kinh doanh, cơ quan thuế thực hiện khôi phục mã số thuế cho người nộp thuế ngay trong ngày nhận được thông tin trên Hệ thống ứng dụng đăng ký thuế."},{"k":"p","t":"Trường hợp người nộp thuế đang bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký, cơ quan thuế cập nhật lại lý do của trạng thái 06.  Sau khi nhận được hồ sơ đề nghị khôi phục mã số thuế của người nộp thuế gửi đến cơ quan thuế theo quy định tại điểm b khoản 4 Điều 17 Thông tư này, cơ quan thuế thực hiện xử lý theo quy định tại điểm b khoản 1 Điều này."},{"k":"p","t":"ĐĂNG KÝ THUẾ ĐỐI VỚI TRƯỜNG HỢP TỔ CHỨC LẠI TỔ CHỨC"}]},{"id":"tt90_19","no":19,"code":"Điều 19","title":"Điều 19. Đăng ký thuế trong trường hợp tổ chức lại","shortTitle":"Đăng ký thuế trong trường hợp tổ chức lại","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Chia tổ chức"},{"k":"p","t":"a) Đối với tổ chức bị chia"},{"k":"p","t":"Tổ chức bị chia phải làm thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế quản lý trực tiếp theo quy định tại Điều 13 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ chấm dứt hiệu lực mã số thuế của tổ chức bị chia, cơ quan thuế thực hiện các thủ tục và trình tự để chấm dứt hiệu lực mã số thuế của tổ chức bị chia theo quy định tại Điều 13, Điều 14 và Điều 15 Thông tư này;"},{"k":"p","t":"b) Đối với tổ chức mới được chia"},{"k":"p","t":"Các tổ chức mới thành lập từ tổ chức bị chia phải thực hiện thủ tục đăng ký thuế với cơ quan thuế theo quy định tại điểm a khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP và Điều 7 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ đăng ký thuế của tổ chức mới thành lập từ tổ chức bị chia, cơ quan thuế thực hiện các thủ tục và trình tự để cấp mã số thuế cho người nộp thuế theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"2. Tách tổ chức"},{"k":"p","t":"a) Đối với tổ chức bị tách"},{"k":"p","t":"Trường hợp sau khi tách, tổ chức bị tách có phát sinh thay đổi thông tin đăng ký thuế, tổ chức phải thực hiện thủ tục thông báo thay đổi thông tin đăng ký thuế với cơ quan thuế quản lý trực tiếp trong thời hạn là 10 (mười) ngày làm việc kể từ ngày được cấp giấy phép thành lập và hoạt động, quyết định thành lập hoặc Văn bản tương đương khác của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"Hồ sơ gồm:"},{"k":"p","t":"- Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử quyết định tách tổ chức hoặc văn bản tương đương;"},{"k":"p","t":"- Bản sao điện tử giấy phép thành lập và hoạt động, quyết định thành lập hoặc văn bản tương đương khác."},{"k":"p","t":"Cơ quan thuế thực hiện thủ tục thay đổi thông tin đăng ký thuế của tổ chức bị tách theo quy định tại Điều 9 và Điều 10 Thông tư này. Tổ chức bị tách vẫn sử dụng mã số thuế đã được cấp trước đây để tiếp tục thực hiện nghĩa vụ về thuế;"},{"k":"p","t":"b) Đối với tổ chức được tách"},{"k":"p","t":"Tổ chức được tách phải thực hiện thủ tục đăng ký thuế với cơ quan thuế theo quy định tại điểm a khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP và Điều 7 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ đăng ký thuế của tổ chức được tách, cơ quan thuế thực hiện các thủ tục và trình tự để cấp mã số thuế cho người nộp thuế theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"3. Sáp nhập tổ chức"},{"k":"p","t":"Tổ chức nhận sáp nhập được giữ nguyên mã số thuế. Các tổ chức bị sáp nhập bị chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"a) Đối với tổ chức bị sáp nhập"},{"k":"p","t":"Tổ chức bị sáp nhập phải thực hiện thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế quản lý trực tiếp theo quy định tại Điều 13 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ chấm dứt hiệu lực mã số thuế của tổ chức bị sáp nhập, cơ quan thuế thực hiện thủ tục và trình tự để chấm dứt hiệu lực mã số thuế của tổ chức bị sáp nhập theo quy định tại Điều 13, Điều 14 và Điều 15 Thông tư này;"},{"k":"p","t":"b) Đối với tổ chức nhận sáp nhập"},{"k":"p","t":"Trường hợp sáp nhập làm phát sinh thay đổi thông tin đăng ký thuế, trong thời hạn 10 (mười) làm việc ngày kể từ ngày được cấp giấy phép thành lập và hoạt động, quyết định thành lập hoặc giấy tờ tương đương khác, tổ chức nhận sáp nhập phải thực hiện thủ tục thông báo thay đổi thông tin đăng ký thuế với cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"Hồ sơ gồm:"},{"k":"p","t":"- Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử hợp đồng sáp nhập hoặc văn bản tương đương;"},{"k":"p","t":"- Bản sao điện tử giấy phép thành lập và hoạt động, quyết định thành lập hoặc văn bản tương đương khác."},{"k":"p","t":"Cơ quan thuế thực hiện thủ tục thay đổi thông tin đăng ký thuế của tổ chức nhận sáp nhập theo quy định tại Điều 9 và Điều 10 Thông tư này."},{"k":"p","t":"4. Hợp nhất tổ chức"},{"k":"p","t":"a) Đối với tổ chức bị hợp nhất"},{"k":"p","t":"Các tổ chức bị hợp nhất phải thực hiện thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế quản lý trực tiếp theo quy định tại Điều 13 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ chấm dứt hiệu lực mã số thuế của các tổ chức bị hợp nhất, cơ quan thuế thực hiện thủ tục và trình tự để chấm dứt hiệu lực mã số thuế của tổ chức bị hợp nhất theo quy định tại Điều 13, Điều 14 và Điều 15 Thông tư này;"},{"k":"p","t":"b) Đối với tổ chức hợp nhất"},{"k":"p","t":"Tổ chức hợp nhất phải thực hiện thủ tục đăng ký thuế với cơ quan thuế theo quy định tại điểm a khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP và Điều 7 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ đăng ký thuế của tổ chức hợp nhất, cơ quan thuế thực hiện các thủ tục và trình tự để cấp mã số thuế cho người nộp thuế theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"5. Chuyển đổi loại hình tổ chức"},{"k":"p","t":"a) Mã số thuế của tổ chức sau khi chuyển đổi loại hình được giữ nguyên theo quy định;"},{"k":"p","t":"b) Tổ chức sau chuyển đổi phải thực hiện thủ tục thông báo thay đổi thông tin đăng ký thuế với cơ quan thuế quản lý trực tiếp trong thời hạn là 10 (mười) ngày làm việc kể từ ngày được cấp giấy phép thành lập và hoạt động, quyết định thành lập hoặc văn bản tương đương khác của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"Hồ sơ gồm:"},{"k":"p","t":"- Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử quyết định chuyển đổi loại hình của tổ chức hoặc văn bản tương đương;"},{"k":"p","t":"- Bản sao điện tử giấy phép thành lập và hoạt động, quyết định thành lập hoặc văn bản tương đương khác."},{"k":"p","t":"Cơ quan thuế thực hiện thủ tục thay đổi thông tin đăng ký thuế của tổ chức sau khi chuyển đổi theo quy định tại Điều 9 và Điều 10 Thông tư này. Tổ chức sau khi chuyển đổi vẫn sử dụng mã số thuế đã được cấp trước đây để tiếp tục thực hiện nghĩa vụ về thuế;"},{"k":"p","t":"c) Trường hợp chuyển đổi giữa các loại hình doanh nghiệp hoạt động theo Luật doanh nghiệp, chuyển đổi từ tổ hợp tác thành hợp tác xã theo Luật Hợp tác xã, cơ quan thuế cập nhật thông tin thay đổi khi nhận được giao dịch đăng ký doanh nghiệp, đăng ký hợp tác xã từ cơ quan đăng ký kinh doanh truyền sang."}]},{"id":"tt90_20","no":20,"code":"Điều 20","title":"Điều 20. Đăng ký thuế trong trường hợp chuyển đổi mô hình hoạt động","shortTitle":"Đăng ký thuế trong trường hợp chuyển đổi mô hình hoạt động","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Chuyển đơn vị phụ thuộc thành đơn vị độc lập hoặc ngược lại"},{"k":"p","t":"Đơn vị phụ thuộc có quyết định chuyển thành đơn vị độc lập hoặc ngược lại thì đơn vị độc lập, đơn vị phụ thuộc sau chuyển đổi phải thực hiện đăng ký thuế để được cấp mã số thuế mới theo quy định tại điểm a khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP và Điều 7 Thông tư này. Đơn vị độc lập, đơn vị phụ thuộc trước chuyển đổi phải làm thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế quản lý trực tiếp theo quy định tại  Điều 13 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ đăng ký thuế của đơn vị độc lập, đơn vị phụ thuộc sau chuyển đổi, cơ quan thuế thực hiện các thủ tục và trình tự để cấp mã số thuế cho người nộp thuế theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ chấm dứt hiệu lực mã số thuế của đơn vị độc lập, đơn vị phụ thuộc trước chuyển đổi, cơ quan thuế thực hiện thủ tục và trình tự để chấm dứt hiệu lực mã số thuế theo quy định tại Điều 13, Điều 14 và Điều 15 Thông tư này."},{"k":"p","t":"2. Chuyển đơn vị độc lập thành đơn vị phụ thuộc của một đơn vị chủ quản khác"},{"k":"p","t":"Một đơn vị độc lập chuyển thành đơn vị phụ thuộc của một đơn vị chủ quản khác thì được cấp mã số thuế 13 chữ số theo mã số thuế của đơn vị chủ quản mới. Đơn vị độc lập phải làm thủ tục chấm dứt hiệu lực mã số thuế với cơ quan thuế theo quy định tại Điều 13 Thông tư này. Đơn vị phụ thuộc thực hiện đăng ký thuế theo quy định tại điểm a khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP và Điều 7 Thông tư này. Đơn vị chủ quản phải kê khai bổ sung đơn vị phụ thuộc mới thành lập vào bảng kê các đơn vị phụ thuộc mẫu số BK02-ĐKT ban hành kèm theo Thông tư này khi thực hiện thay đổi thông tin đăng ký thuế theo quy định tại Điều 9 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ đăng ký thuế của đơn vị phụ thuộc, cơ quan thuế thực hiện các thủ tục và trình tự để cấp mã số thuế cho người nộp thuế theo quy định tại  Điều 8 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ chấm dứt hiệu lực mã số thuế của đơn vị độc lập, cơ quan thuế thực hiện thủ tục và trình tự để chấm dứt hiệu lực mã số thuế theo quy định tại Điều 13, Điều 14 và Điều 15 Thông tư này."},{"k":"p","t":"3. Chuyển đơn vị phụ thuộc của một đơn vị chủ quản thành đơn vị phụ thuộc của một đơn vị chủ quản khác"},{"k":"p","t":"Một đơn vị phụ thuộc của một đơn vị chủ quản (sau đây gọi là đơn vị phụ thuộc cũ) chuyển thành đơn vị phụ thuộc của một đơn vị chủ quản khác (sau đây gọi là đơn vị phụ thuộc mới) phải thực hiện thủ tục chấm dứt hiệu lực mã số thuế của đơn vị phụ thuộc cũ với cơ quan thuế quản lý trực tiếp theo quy định tại Điều 13 Thông tư này. Đơn vị phụ thuộc mới thực hiện đăng ký thuế với cơ quan thuế theo quy định tại điểm a khoản 3 Điều 6 Nghị định số 252/2026/NĐ-CP và Điều 7 Thông tư này. Đơn vị chủ quản phải kê khai bổ sung đơn vị phụ thuộc mới thành lập vào bảng kê các đơn vị phụ thuộc mẫu số BK02-ĐKT ban hành kèm theo Thông tư này khi thực hiện thay đổi thông tin đăng ký thuế theo quy định tại Điều 9 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ đăng ký thuế của đơn vị phụ thuộc mới, cơ quan thuế thực hiện các thủ tục và trình tự để cấp mã số thuế cho người nộp thuế theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"Căn cứ hồ sơ chấm dứt hiệu lực mã số thuế của đơn vị phụ thuộc cũ, cơ quan thuế thực hiện thủ tục và trình tự để chấm dứt hiệu lực mã số thuế theo quy định tại Điều 13, Điều 14 và Điều 15 Thông tư này."},{"k":"p","t":"Chương IIITHỦ TỤC VỀ ĐĂNG KÝ THUẾ ĐỐI VỚI NGƯỜI NỘP THUẾLÀ HỘ KINH DOANH, HỘ GIA ĐÌNH, CÁ NHÂN"},{"k":"p","t":"Mục 1ĐĂNG KÝ THUẾ LẦN ĐẦU"}]},{"id":"tt90_21","no":21,"code":"Điều 21","title":"Điều 21. Địa điểm nộp và hồ sơ đăng ký thuế lần đầu","shortTitle":"Địa điểm nộp và hồ sơ đăng ký thuế lần đầu","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Đối với hộ kinh doanh đăng ký thuế cùng với đăng ký kinh doanh theo cơ chế một cửa liên thông và hộ gia đình, cá nhân quy định tại điểm k, l, m, p  khoản 2 Điều 4 Thông tư này"},{"k":"p","t":"a) Địa điểm nộp và hồ sơ đăng ký thuế lần đầu đối với hộ kinh doanh đăng ký thuế cùng với đăng ký kinh doanh theo cơ chế một cửa liên thông là địa điểm nộp và hồ sơ đăng ký hộ kinh doanh theo quy định tại Nghị định số 168/2025/NĐ-CP về đăng ký doanh nghiệp;"},{"k":"p","t":"b) Địa điểm nộp và hồ sơ đăng ký thuế lần đầu đối với hộ gia đình, cá nhân quy định tại điểm k, l, m, p khoản 2 Điều 4 Thông tư này và thuộc trường hợp được cấp số định danh cá nhân theo quy định của pháp luật về căn cước thực hiện như sau:"},{"k":"p","t":"b.1) Trường hợp hộ gia đình, cá nhân kinh doanh quy định tại điểm k khoản 2 Điều 4 Thông tư này"},{"k":"p","t":"b.1.1) Địa điểm nộp hồ sơ:"},{"k":"p","t":"- Tại Thuế cơ sở nơi đặt trụ sở chính;"},{"k":"p","t":"- Tại Thuế cơ sở nơi cư trú của hộ gia đình, cá nhân kinh doanh trong trường hợp không có địa điểm kinh doanh cố định;"},{"k":"p","t":"- Tại Thuế cơ sở nơi cá nhân có bất động sản cho thuê, trường hợp có nhiều bất động sản cho thuê ở các địa điểm khác nhau thì lựa chọn một trong các Thuế cơ sở nơi cá nhân có bất động sản cho thuê;"},{"k":"p","t":"b.1.2) Hồ sơ đăng ký thuế: Tờ khai đăng ký thuế mẫu số 03-ĐKT ban hành kèm theo Thông tư này; hoặc hồ sơ khai thuế có tích hợp thông tin đăng ký thuế theo quy định của pháp luật về quản lý thuế. Đối với hộ kinh doanh thuộc trường hợp quy định tại khoản 6 Điều 37 Thông tư này thì nộp kèm theo bản sao điện tử Giấy chứng nhận đăng ký hộ kinh doanh còn hiệu lực;"},{"k":"p","t":"b.2) Trường hợp cá nhân quy định tại điểm l, p khoản 2 Điều 4 Thông tư này uỷ quyền cho cơ quan chi trả thu nhập đăng ký thuế cho cá nhân hoặc người phụ thuộc"},{"k":"p","t":"b.2.1) Địa điểm nộp hồ sơ: tại cơ quan chi trả thu nhập. Trường hợp cá nhân phát sinh thu nhập tại nhiều cơ quan chi trả, cá nhân chỉ uỷ quyền đăng ký thuế tại một cơ quan chi trả thu nhập và thông báo số định danh cá nhân của cá nhân với các cơ quan chi trả thu nhập khác để sử dụng vào việc khấu trừ, kê khai, nộp thuế;"},{"k":"p","t":"b.2.2) Hồ sơ đăng ký thuế của cá nhân hoặc người phụ thuộc gồm: Văn bản ủy quyền đăng ký thuế mẫu số 41/UQ-ĐKT, phụ lục Bảng kê khai về người phải trực tiếp nuôi dưỡng mẫu số 07/XN-NPT-TNCN (đối với trường hợp người phụ thuộc quy định tại điểm đ khoản 2 Điều 47 Nghị định số 253/2026/NĐ-CP quy định chi tiết một số điều và biện pháp để tổ chức, hướng dẫn thi hành Luật Thuế thu nhập cá nhân) ban hành kèm theo Thông tư này và các giấy tờ khác chứng minh người phụ thuộc theo quy định pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"b.2.3) Cơ quan chi trả thu nhập có trách nhiệm tổng hợp thông tin đăng ký thuế của cá nhân vào Tờ khai đăng ký thuế mẫu số 05-ĐKT-TH ban hành kèm theo Thông tư này, tổng hợp thông tin đăng ký thuế của người phụ thuộc vào Tờ khai đăng ký thuế mẫu số 20-ĐKT-TH ban hành kèm theo Thông tư này, gửi cơ quan thuế quản lý trực tiếp cơ quan chi trả thu nhập và có trách nhiệm lưu giữ hồ sơ đăng ký thuế (theo hình thức văn bản giấy hoặc điện tử), cung cấp khi cơ quan thuế kiểm tra thuế."},{"k":"p","t":"Cơ quan chi trả thu nhập sử dụng số định danh cá nhân của cá nhân, người phụ thuộc vào việc khấu trừ, kê khai, nộp thuế theo quy định của pháp luật;"},{"k":"p","t":"b.3) Trường hợp cá nhân quy định tại điểm l, p khoản 2 Điều 4 Thông tư này không ủy quyền cho cơ quan chi trả thu nhập đăng ký thuế"},{"k":"p","t":"b.3.1) Địa điểm nộp hồ sơ:"},{"k":"p","t":"- Tại Thuế tỉnh, thành phố nơi cá nhân làm việc đối với cá nhân cư trú có thu nhập từ tiền lương, tiền công do các tổ chức Quốc tế, Đại sứ quán, Lãnh sự quán tại Việt Nam chi trả nhưng tổ chức này chưa thực hiện khấu trừ thuế;"},{"k":"p","t":"- Tại Thuế tỉnh, thành phố nơi phát sinh công việc tại Việt Nam đối với cá nhân có thu nhập từ tiền lương, tiền công do các tổ chức, cá nhân trả từ nước ngoài;"},{"k":"p","t":"- Tại Thuế cơ sở nơi cá nhân cư trú đối với những trường hợp khác;"},{"k":"p","t":"b.3.2) Hồ sơ đăng ký thuế:"},{"k":"p","t":"- Đối với cá nhân: Tờ khai đăng ký thuế mẫu số 05-ĐKT ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Đối với người phụ thuộc: Tờ khai đăng ký thuế mẫu số 20-ĐKT, phụ lục Bảng kê khai về người phải trực tiếp nuôi dưỡng mẫu số 07/XN-NPT-TNCN (đối với trường hợp người phụ thuộc quy định tại điểm đ khoản 2 Điều 47 Nghị định số 253/2026/NĐ-CP) ban hành kèm theo Thông tư này và các giấy tờ khác chứng minh người phụ thuộc theo quy định pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"b.4) Trường hợp hộ gia đình, cá nhân (trừ các trường hợp đăng ký thuế quy định tại điểm b.1, b.2, b.3 khoản này) đăng ký thuế thông qua hồ sơ khai thuế có tích hợp thông tin đăng ký thuế"},{"k":"p","t":"b.4.1) Địa điểm nộp hồ sơ: tại Thuế cơ sở nơi hộ gia đình, cá nhân có phát sinh nghĩa vụ với ngân sách nhà nước."},{"k":"p","t":"b.4.2) Hồ sơ đăng ký thuế: hồ sơ khai thuế có tích hợp thông tin đăng ký thuế theo quy định của pháp luật về quản lý thuế. Trường hợp cơ quan thuế và cơ quan quản lý nhà nước đã thực hiện liên thông thì cơ quan thuế căn cứ vào phiếu chuyển thông tin của cơ quan có thẩm quyền gửi đến nếu không có hồ sơ khai thuế;"},{"k":"p","t":"c) Đối với cá nhân quy định tại điểm k, l, m, p khoản 2 Điều 4 Thông tư này thuộc trường hợp cơ quan thuế cấp mã số thuế theo quy định tại điểm a khoản 2 Điều 5 Thông tư này"},{"k":"p","t":"c.1) Trường hợp cá nhân kinh doanh quy định tại điểm k khoản 2 Điều 4 Thông tư này"},{"k":"p","t":"c.1.1) Địa điểm nộp hồ sơ"},{"k":"p","t":"- Tại Thuế cơ sở nơi đặt trụ sở chính;"},{"k":"p","t":"- Tại Thuế cơ sở nơi cư trú của cá nhân kinh doanh trong trường hợp cá nhân kinh doanh không có địa điểm kinh doanh cố định;"},{"k":"p","t":"- Tại Thuế cơ sở nơi cá nhân có bất động sản cho thuê, trường hợp có nhiều bất động sản cho thuê ở các địa điểm khác nhau thì lựa chọn một trong các Thuế cơ sở nơi cá nhân có bất động sản cho thuê;"},{"k":"p","t":"c.1.2) Hồ sơ đăng ký thuế"},{"k":"p","t":"- Tờ khai đăng ký thuế mẫu số 03-ĐKT ban hành kèm theo Thông tư này hoặc hồ sơ khai thuế có tích hợp thông tin đăng ký thuế theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"- Bản sao điện tử hộ chiếu còn hiệu lực của cá nhân; hoặc bản sao điện tử giấy tờ có giá trị sử dụng đối với cá nhân kinh doanh thực hiện hoạt động mua bán, trao đổi hàng hoá tại chợ biên giới theo quy định tại Điều 16 Nghị định số 14/2018/NĐ-CP quy định chi tiết về hoạt động thương mại biên giới (được sửa đổi, bổ sung tại khoản 4 Điều 1 Nghị định số 122/2024/NĐ-CP);"},{"k":"p","t":"c.2) Trường hợp cá nhân quy định tại điểm l, p khoản 2 Điều 4 Thông tư này ủy quyền cho cơ quan chi trả thu nhập đăng ký thuế cho cá nhân hoặc người phụ thuộc"},{"k":"p","t":"c.2.1) Địa điểm nộp hồ sơ: tại cơ quan chi trả thu nhập. Trường hợp cá nhân phát sinh thu nhập tại nhiều cơ quan chi trả thu nhập, cá nhân chỉ ủy quyền đăng ký thuế tại một cơ quan chi trả thu nhập để được cơ quan thuế cấp mã số thuế. Cá nhân thông báo mã số thuế của cá nhân với các cơ quan chi trả thu nhập khác để sử dụng vào việc khấu trừ, kê khai, nộp thuế;"},{"k":"p","t":"c.2.2) Hồ sơ đăng ký thuế của cá nhân hoặc người phụ thuộc gồm:"},{"k":"p","t":"- Văn bản ủy quyền đăng ký thuế mẫu số 41/UQ-ĐKT, phụ lục Bảng kê khai về người phải trực tiếp nuôi dưỡng mẫu số 07/XN-NPT-TNCN (đối với trường hợp người phụ thuộc quy định tại điểm đ khoản 2 Điều 47 Nghị định số 253/2026/NĐ-CP) ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử hộ chiếu còn hiệu lực của cá nhân hoặc người phụ thuộc hoặc bản sao điện tử giấy tờ chứng thực cá nhân hợp pháp khác còn hiệu lực (nếu không có hộ chiếu);"},{"k":"p","t":"- Bản sao điện tử các giấy tờ khác chứng minh người phụ thuộc theo quy định pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"c.2.3) Cơ quan chi trả thu nhập có trách nhiệm tổng hợp thông tin đăng ký thuế của cá nhân vào tờ khai đăng ký thuế mẫu số 05-ĐKT-TH ban hành kèm theo Thông tư này, tổng hợp thông tin đăng ký thuế của người phụ thuộc vào tờ khai đăng ký thuế mẫu số 20-ĐKT-TH ban hành kèm theo Thông tư này, gửi cơ quan thuế quản lý trực tiếp cơ quan chi trả thu nhập và có trách nhiệm lưu giữ hồ sơ đăng ký thuế (theo hình thức văn bản giấy hoặc điện tử), cung cấp khi cơ quan thuế kiểm tra thuế."},{"k":"p","t":"Cơ quan chi trả thu nhập sử dụng mã số thuế do cơ quan thuế cấp cho cá nhân, người phụ thuộc vào việc khấu trừ, kê khai, nộp thuế theo quy định của pháp luật;"},{"k":"p","t":"c.3) Trường hợp cá nhân quy định tại điểm l, p khoản 2 Điều 4 Thông tư này không ủy quyền cho cơ quan chi trả thu nhập đăng ký thuế"},{"k":"p","t":"c.3.1) Địa điểm nộp hồ sơ"},{"k":"p","t":"- Tại Thuế tỉnh, thành phố nơi cá nhân làm việc đối với cá nhân cư trú có thu nhập từ tiền lương, tiền công do các tổ chức Quốc tế, Đại sứ quán, Lãnh sự quán tại Việt Nam chi trả nhưng tổ chức này chưa thực hiện khấu trừ thuế;"},{"k":"p","t":"- Tại Thuế tỉnh, thành phố nơi phát sinh công việc tại Việt Nam đối với cá nhân có thu nhập từ tiền lương, tiền công do các tổ chức, cá nhân trả từ nước ngoài;"},{"k":"p","t":"c.3.2) Hồ sơ đăng ký thuế"},{"k":"p","t":"- Đối với cá nhân:"},{"k":"p","t":"+ Tờ khai đăng ký thuế mẫu số 05-ĐKT ban hành kèm theo Thông tư này và bản sao điện tử hộ chiếu còn hiệu lực của cá nhân;"},{"k":"p","t":"+ Bản sao điện tử văn bản bổ nhiệm của tổ chức sử dụng lao động trong trường hợp cá nhân người nước ngoài không cư trú tại Việt Nam theo quy định của pháp luật về thuế thu nhập cá nhân được cử sang Việt Nam làm việc nhưng nhận thu nhập tại nước ngoài."},{"k":"p","t":"- Đối với người phụ thuộc:"},{"k":"p","t":"+ Tờ khai đăng ký thuế mẫu số 20-ĐKT, phụ lục Bảng kê khai về người phải trực tiếp nuôi dưỡng mẫu số 07/XN-NPT-TNCN (đối với trường hợp người phụ thuộc quy định tại điểm đ khoản 2 Điều 47 Nghị định số 253/2026/NĐ-CP) ban hành kèm theo Thông tư này;"},{"k":"p","t":"+ Bản sao điện tử hộ chiếu còn hiệu lực của người phụ thuộc hoặc bản sao điện tử giấy tờ chứng thực cá nhân hợp pháp khác còn hiệu lực (nếu không có hộ chiếu);"},{"k":"p","t":"+ Bản sao điện tử các giấy tờ chứng minh người phụ thuộc theo quy định pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"c.4) Trường hợp cá nhân (trừ các trường hợp quy định tại điểm b.1, b.2, b.3 khoản này) đăng ký thuế thông qua hồ sơ khai thuế, khoản thu khác"},{"k":"p","t":"c.4.1) Địa điểm nộp hồ sơ: tại Thuế cơ sở nơi cá nhân có phát sinh nghĩa vụ với ngân sách nhà nước."},{"k":"p","t":"c.4.2) Hồ sơ đăng ký thuế"},{"k":"p","t":"- Hồ sơ khai thuế có tích hợp thông tin đăng ký thuế theo quy định của pháp luật về quản lý thuế. Trường hợp cơ quan thuế và cơ quan quản lý nhà nước đã thực hiện liên thông thì cơ quan thuế căn cứ vào phiếu chuyển thông tin của cơ quan quản lý nhà nước gửi đến nếu không có hồ sơ khai thuế;"},{"k":"p","t":"- Bản sao điện tử hộ chiếu còn hiệu lực của cá nhân hoặc bản sao điện tử giấy tờ chứng thực cá nhân hợp pháp khác còn hiệu lực (nếu không có hộ chiếu);"},{"k":"p","t":"d) Sau khi đăng ký thuế lần đầu, nếu hộ kinh doanh, cá nhân kinh doanh thành lập thêm địa điểm kinh doanh ngoài trụ sở chính thì thực hiện thông báo địa điểm kinh doanh với cơ quan thuế quản lý trực tiếp trụ sở chính của hộ kinh doanh, cá nhân kinh doanh theo quy định tại điểm đ khoản 4 Điều 8 Nghị định số 68/2026/NĐ-CP quy định về chính sách thuế và quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh và khoản 1 Điều 3 Thông tư số 18/2026/TT-BTC quy định về hồ sơ, thủ tục quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"2. Đối với cá nhân khấu trừ và nộp thay thuế cho người nộp thuế khác, cá nhân được cơ quan thuế ủy nhiệm thu quy định tại điểm h, n khoản 2 Điều 4 Thông tư này"},{"k":"p","t":"a) Địa điểm nộp hồ sơ: thực hiện như quy định tại điểm a, d, đ khoản 6 Điều 7 Thông tư này;"},{"k":"p","t":"b) Hồ sơ đăng ký thuế: thực hiện như quy định tại điểm a, d, đ khoản 6 Điều 7 Thông tư này."},{"k":"p","t":"3. Đối với người nộp thuế là cá nhân không cư trú quy định tại điểm e khoản 2 Điều 4 Thông tư này trực tiếp đăng ký thuế thì thực hiện theo quy định tại điểm a khoản 1 Điều 42 Nghị định số 252/2026/NĐ-CP."}]},{"id":"tt90_22","no":22,"code":"Điều 22","title":"Điều 22. Xử lý hồ sơ đăng ký thuế lần đầu và cấp giấy chứng nhận đăng ký thuế, thông báo mã số thuế","shortTitle":"Xử lý hồ sơ đăng ký thuế lần đầu và cấp giấy chứng nhận đăng ký thuế, thông báo mã số thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Đối với hồ sơ đăng ký thuế của người nộp thuế theo quy định tại điểm b khoản 1 Điều 21 Thông tư này"},{"k":"p","t":"a) Trường hợp hồ sơ đầy đủ và thông tin của cá nhân khớp đúng với thông tin trong Cơ sở dữ liệu quốc gia về dân cư"},{"k":"p","t":"a.1) Cơ quan thuế cập nhật các thông tin trên hồ sơ đăng ký thuế vào Hệ thống ứng dụng đăng ký thuế trong thời hạn 03 (ba) ngày làm việc kể từ ngày cơ quan thuế nhận đủ hồ sơ của người nộp thuế và thông báo kết quả khớp đúng cho người nộp thuế đến địa chỉ thư điện tử hoặc số điện thoại đã đăng ký của cá nhân;"},{"k":"p","t":"a.2) Trường hợp hồ sơ đăng ký thuế của hộ gia đình, cá nhân kinh doanh theo quy định tại điểm b.1 khoản 1 Điều 21 Thông tư này, cơ quan thuế cấp “Giấy chứng nhận đăng ký thuế” mẫu số 10-MST ban hành kèm theo Thông tư này cho hộ gia đình, cá nhân kinh doanh trong thời hạn 03 (ba) ngày làm việc kể từ ngày cơ quan thuế nhận đủ hồ sơ của người nộp thuế;"},{"k":"p","t":"b) Trường hợp hồ sơ không đầy đủ hoặc thông tin của cá nhân không khớp đúng với thông tin trong Cơ sở dữ liệu quốc gia về dân cư:"},{"k":"p","t":"b.1) Cơ quan thuế gửi Thông báo về việc không tiếp nhận hồ sơ theo mẫu số 01/TB-TĐT ban hành kèm theo Thông tư số 89/2026/TT-BTC (đối với hồ sơ điện tử) hoặc Thông báo về việc giải trình, bổ sung thông tin, tài liệu mẫu số 01/TB-BSTT-NNT ban hành kèm theo Thông tư số 89/2026/TT-BTC (đối với hồ sơ giấy) cho người nộp thuế trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ để người nộp thuế điều chỉnh thông tin hoặc nộp lại hồ sơ đăng ký thuế khác;"},{"k":"p","t":"b.2) Trường hợp cá nhân đăng ký thuế qua cơ quan chi trả thu nhập, cơ quan thuế thông báo cho cơ quan chi trả thu nhập danh sách cá nhân có thông tin không khớp đúng với thông tin trong Cơ sở dữ liệu quốc gia về dân cư theo mẫu số 40/TB-ĐKT ban hành kèm theo Thông tư này trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ. Cơ quan chi trả thu nhập có trách nhiệm thông báo kết quả cho từng cá nhân và nộp lại hồ sơ đăng ký thuế sau khi cá nhân điều chỉnh thông tin;"},{"k":"p","t":"c) Trường hợp việc kết nối giữa Hệ thống thông tin quản lý thuế với hệ thống Cơ sở dữ liệu quốc gia về dân cư bị gián đoạn trong quá trình xác thực thông tin, cá nhân phải kê khai đầy đủ, chính xác các thông tin trong hồ sơ đăng ký thuế và gửi kèm bản sao điện tử Căn cước hoặc Căn cước công dân còn hiệu lực. Cơ quan thuế tiếp nhận, xử lý hồ sơ và trả kết quả cho cá nhân theo thời gian quy định tại điểm a, b khoản này."},{"k":"p","t":"Sau khi việc kết nối được khôi phục, cơ quan thuế thực hiện truy vấn thông tin của cá nhân trong Cơ sở dữ liệu quốc gia về dân cư. Trường hợp không có thông tin hoặc thông tin không khớp đúng, cơ quan thuế thông báo cho cơ quan chi trả thu nhập hoặc cá nhân để thực hiện điều chỉnh thông tin đăng ký thuế theo quy định. Quá thời hạn 10 (mười) ngày làm việc kể từ ngày cơ quan thuế ban hành thông báo mà cơ quan chi trả thu nhập hoặc cá nhân không thực hiện điều chỉnh thông tin đăng ký thuế, cơ quan thuế cập nhật trạng thái mã số thuế của cá nhân sang trạng thái “Mã số thuế chờ cập nhật thông tin số định danh cá nhân”."},{"k":"p","t":"2. Đối với hồ sơ đăng ký thuế của người nộp thuế theo quy định tại điểm c khoản 1, khoản 2 Điều 21 Thông tư này"},{"k":"p","t":"a) Trường hợp hồ sơ đăng ký thuế đủ điều kiện cấp mã số thuế, cơ quan thuế cấp Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế cho người nộp thuế như sau:"},{"k":"p","t":"a.1) “Giấy chứng nhận đăng ký thuế” mẫu số 10-MST ban hành kèm theo Thông tư này được cơ quan thuế cấp cho cá nhân kinh doanh nộp hồ sơ đăng ký thuế theo quy định tại điểm c.1 khoản 1 Điều 21 Thông tư này;"},{"k":"p","t":"a.2) “Thông báo mã số thuế cá nhân” mẫu số 14-MST ban hành kèm theo Thông tư này được cơ quan thuế thông báo cho cá nhân hoặc cơ quan chi trả thu nhập thực hiện đăng ký thuế theo quy định tại điểm c.2, c.3, c.4 khoản 1 Điều 21 Thông tư này."},{"k":"p","t":"Trường hợp cá nhân đăng ký thuế qua cơ quan chi trả thu nhập, cơ quan chi trả thu nhập có trách nhiệm thông báo mã số thuế cho cá từng cá nhân biết để sử dụng vào việc khấu trừ, kê khai, nộp thuế theo quy định của pháp luật."},{"k":"p","t":"Trường hợp cá nhân thực hiện đăng ký thuế qua hồ sơ khai thuế, khoản thu khác theo quy định tại điểm c.4 khoản 1 Điều 21 Thông tư này và thuộc trường hợp do cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo thuế, khoản thu khác theo quy định của pháp luật thì mã số thuế được cấp ghi trên Thông báo nộp tiền;"},{"k":"p","t":"a.3) “Thông báo mã số thuế nộp thay” mẫu số 11-MST ban hành kèm theo Thông tư này được cơ quan thuế cấp cho cá nhân đăng ký thuế để khấu trừ thuế và nộp thay thuế theo quy định tại khoản 2 Điều 21 Thông tư này;"},{"k":"p","t":"a.4) Cơ quan thuế thực hiện xử lý hồ sơ và trả kết quả là “Giấy chứng nhận đăng ký thuế”, “Thông báo mã số thuế cá nhân”, “Thông báo mã số thuế nộp thay” cho người nộp thuế qua Cổng Dịch vụ công quốc gia hoặc Hệ thống thông tin quản lý thuế trong thời hạn 03 (ba) ngày làm việc kể từ ngày cơ quan thuế nhận đủ hồ sơ của người nộp thuế theo quy định tại điểm c khoản 1, khoản 2 Điều 21 Thông tư này;"},{"k":"p","t":"b) Trường hợp hồ sơ đăng ký thuế không đủ điều kiện cấp mã số thuế, cơ quan thuế gửi Thông báo về việc không tiếp nhận hồ sơ theo mẫu số 01/TB-TĐT ban hành kèm theo Thông tư số 89/2026/TT-BTC (đối với hồ sơ điện tử) hoặc Thông báo về việc giải trình, bổ sung thông tin, tài liệu mẫu số 01/TB-BSTT-NNT ban hành kèm theo Thông tư số 89/2026/TT-BTC (đối với hồ sơ giấy) cho người nộp thuế trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ để người nộp thuế điều chỉnh thông tin hoặc nộp lại hồ sơ đăng ký thuế khác."},{"k":"p","t":"Trường hợp cá nhân đăng ký thuế qua cơ quan chi trả thu nhập, cơ quan thuế thông báo cho cơ quan chi trả thu nhập danh sách cá nhân không đủ điều kiện cấp mã số thuế theo mẫu số 40/TB-ĐKT ban hành kèm theo Thông tư này trong thời hạn 02 (hai) ngày làm việc kể từ ngày tiếp nhận hồ sơ, trong đó nêu rõ lý do từ chối và yêu cầu đối với người nộp thuế. Cơ quan chi trả thu nhập có trách nhiệm thông báo lý do chưa được cấp mã số thuế cho từng cá nhân để điều chỉnh, bổ sung thông tin của cá nhân. Cơ quan chi trả thu nhập nộp lại hồ sơ đăng ký thuế cho cơ quan thuế sau khi được điều chỉnh, bổ sung để được cấp mã số thuế cho cá nhân theo quy định."},{"k":"p","t":"3. Đối với hồ sơ đăng ký thuế của người nộp thuế theo quy định tại khoản 3 Điều 21 Thông tư này thực hiện theo quy định tại điểm a khoản 1 Điều 42 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"Mục 2THAY ĐỔI THÔNG TIN ĐĂNG KÝ THUẾ"}]},{"id":"tt90_23","no":23,"code":"Điều 23","title":"Điều 23. Địa điểm nộp và hồ sơ thông báo thay đổi thông tin đăng ký thuế","shortTitle":"Địa điểm nộp và hồ sơ thông báo thay đổi thông tin đăng ký thuế","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, hộ gia đình, cá nhân kinh doanh thay đổi thông tin đăng ký thuế nhưng không làm thay đổi cơ quan thuế quản lý trực tiếp"},{"k":"p","t":"a) Hộ kinh doanh đăng ký thuế theo cơ chế một cửa liên thông khi có thay đổi thông tin đăng ký thuế thì thực hiện thông báo thay đổi thông tin đăng ký thuế cùng với việc thay đổi nội dung đăng ký hộ kinh doanh với cơ quan đăng ký kinh doanh;"},{"k":"p","t":"b) Hộ gia đình, cá nhân kinh doanh quy định tại điểm k khoản 2 Điều 4 Thông tư này thực hiện nộp hồ sơ thay đổi thông tin đến cơ quan thuế quản lý trực tiếp trụ sở chính, hồ sơ gồm:"},{"k":"p","t":"- Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Bản sao điện tử hộ chiếu còn hiệu lực của cá nhân nếu thông tin trên giấy tờ này có thay đổi đối với cá nhân kinh doanh thuộc trường hợp cơ quan thuế cấp mã số thuế theo quy định tại điểm a khoản 2 Điều 5 Thông tư này;"},{"k":"p","t":"c) Trường hợp hộ kinh doanh, cá nhân kinh doanh thay đổi địa chỉ của địa điểm kinh doanh thì thực hiện theo quy định tại điểm đ khoản 4 Điều 8 Nghị định số 68/2026/NĐ-CP và khoản 1 Điều 3 Thông tư số 18/2026/TT-BTC."},{"k":"p","t":"2. Hộ kinh doanh đăng ký thuế theo cơ chế một cửa liên thông khi thay đổi địa chỉ trụ sở làm thay đổi cơ quan thuế quản lý trực tiếp (trừ trường hợp thay đổi thông tin địa chỉ trụ sở do thay đổi địa giới hành chính nhà nước theo quyết định của cơ quan nhà nước có thẩm quyền hoặc cơ quan thuế phân công lại cơ quan thuế quản lý trực tiếp) thì thực hiện như sau:"},{"k":"p","t":"a) Tại nơi chuyển đi"},{"k":"p","t":"Hộ kinh doanh nộp hồ sơ thay đổi cho cơ quan thuế quản lý trực tiếp (cơ quan thuế nơi chuyển đi) để thực hiện thủ tục chuyển cơ quan thuế quản lý theo quy định tại điểm a khoản 2 Điều 24 Thông tư này trước khi đăng ký thay đổi địa chỉ trụ sở đến cơ quan đăng ký kinh doanh."},{"k":"p","t":"Hồ sơ nộp đến cơ quan thuế nơi chuyển đi là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"b) Sau khi nhận được Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này của cơ quan thuế nơi chuyển đi, hộ kinh doanh thực hiện đăng ký thay đổi địa chỉ trụ sở với cơ quan đăng ký kinh doanh theo quy định của pháp luật về đăng ký hộ kinh doanh."},{"k":"p","t":"3. Hộ gia đình, cá nhân kinh doanh quy định tại điểm k khoản 2 Điều 4 Thông tư này khi thay đổi địa chỉ trụ sở làm thay đổi cơ quan thuế quản lý trực tiếp (trừ trường hợp thay đổi thông tin địa chỉ trụ sở do thay đổi địa giới hành chính nhà nước theo quyết định của cơ quan nhà nước có thẩm quyền hoặc cơ quan thuế phân công lại cơ quan thuế quản lý trực tiếp) thì thực hiện như sau:"},{"k":"p","t":"a) Tại nơi chuyển đi"},{"k":"p","t":"Hộ gia đình, cá nhân kinh doanh thực hiện nộp hồ sơ thông báo thay đổi thông tin đăng ký thuế cho cơ quan thuế quản lý trực tiếp (cơ quan thuế nơi chuyển đi). Hồ sơ nộp đến cơ quan thuế nơi chuyển đi là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST ban hành kèm theo Thông tư này;"},{"k":"p","t":"b) Tại nơi chuyển đến"},{"k":"p","t":"Hộ gia đình, cá nhân kinh doanh thực hiện nộp hồ sơ thông báo thay đổi thông tin đăng ký thuế tại Thuế cơ sở nơi chuyển đến trong thời hạn 10 (mười) ngày làm việc kể từ ngày cơ quan thuế nơi chuyển đi ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này. Hồ sơ thông báo thay đổi thông tin đăng ký thuế là văn bản đăng ký chuyển địa điểm tại cơ quan thuế nơi người nộp thuế chuyển đến mẫu số 30/ĐKT ban hành kèm theo Thông tư này."},{"k":"p","t":"4. Đối với cá nhân quy định tại điểm l, m, p khoản 2 Điều 4 Thông tư này khi có thay đổi thông tin đăng ký thuế của bản thân và người phụ thuộc (bao gồm cả trường hợp thay đổi cơ quan thuế quản lý trực tiếp) nộp hồ sơ cho cơ quan chi trả thu nhập hoặc Thuế cơ sở nơi cá nhân đăng ký thường trú hoặc tạm trú (trường hợp cá nhân không ủy quyền cho cơ quan chi trả thu nhập) như sau:"},{"k":"p","t":"a) Hồ sơ thông báo thay đổi thông tin đăng ký thuế đối với trường hợp cá nhân ủy quyền cho cơ quan chi trả thu nhập là văn bản ủy quyền đăng ký thuế mẫu số 41/UQ-ĐKT ban hành kèm theo Thông tư này. Trường hợp cá nhân hoặc người phụ thuộc thuộc trường hợp cơ quan thuế cấp mã số thuế theo quy định tại điểm a khoản 2 Điều 5 Thông tư này thì nộp kèm theo bản sao điện tử hộ chiếu có thay đổi thông tin liên quan đến đăng ký thuế của cá nhân hoặc người phụ thuộc."},{"k":"p","t":"Cơ quan chi trả thu nhập có trách nhiệm tổng hợp thông tin thay đổi của cá nhân vào Tờ khai đăng ký thuế mẫu số 05-ĐKT-TH, thông tin thay đổi của người phụ thuộc vào Tờ khai đăng ký thuế mẫu số 20-ĐKT-TH ban hành kèm theo Thông tư này gửi cơ quan thuế quản lý trực tiếp cơ quan chi trả thu nhập;"},{"k":"p","t":"b) Hồ sơ thông báo thay đổi thông tin đăng ký thuế đối với trường hợp cá nhân không ủy quyền cho cơ quan chi trả thu nhập là Tờ khai điều chỉnh, bổ sung thông tin đăng ký thuế mẫu số 08-MST hoặc mẫu số 20-ĐKT ban hành kèm theo Thông tư này. Trường hợp cá nhân hoặc người phụ thuộc thuộc trường hợp cơ quan thuế cấp mã số thuế theo quy định tại điểm a khoản 2 Điều 5 Thông tư này thì nộp kèm theo bản sao điện tử hộ chiếu còn hiệu lực của cá nhân hoặc người phụ thuộc trong trường hợp thông tin đăng ký thuế trên giấy tờ này có thay đổi;"},{"k":"p","t":"c) Trường hợp đăng ký tăng người phụ thuộc: Nếu người phụ thuộc chưa có mã số thuế thì thực hiện theo quy định tại điểm b.2, b.3, c.2, c.3 khoản 1 Điều 21 Thông tư này. Nếu người phụ thuộc đã có mã số thuế thì người nộp thuế thực hiện nộp hồ sơ thông báo thay đổi thông tin đăng ký thuế theo điểm a và điểm b khoản này và kèm theo hồ sơ chứng minh người phụ thuộc theo quy định của pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"d) Trường hợp đăng ký giảm người phụ thuộc thì người nộp thuế kê khai thông tin kết thúc giảm trừ gia cảnh cho người phụ thuộc tại hồ sơ thông báo thay đổi thông tin đăng ký thuế theo quy định tại điểm a và điểm b khoản này;"},{"k":"p","t":"đ) Người nộp thuế chỉ phải đăng ký và nộp hồ sơ chứng minh cho mỗi người phụ thuộc một lần trong suốt thời gian được tính giảm trừ gia cảnh. Trường hợp người nộp thuế thay đổi nơi làm việc thì người nộp thuế có trách nhiệm cung cấp hồ sơ chứng minh người phụ thuộc theo quy định của pháp luật thuế thu nhập cá nhân cho cơ quan chi trả thu nhập mới để được giảm trừ gia cảnh theo quy định."},{"k":"p","t":"5. Đối với người nộp thuế là cá nhân nước ngoài không cư trú tại Việt Nam quy định tại điểm e khoản 2 Điều 4 Thông tư này thực hiện theo quy định tại điểm b khoản 1 Điều 42 Nghị định số 252/2026/NĐ-CP."}]},{"id":"tt90_24","no":24,"code":"Điều 24","title":"Điều 24. Xử lý hồ sơ thông báo thay đổi thông tin đăng ký thuế và trả kết quả","shortTitle":"Xử lý hồ sơ thông báo thay đổi thông tin đăng ký thuế và trả kết quả","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Hộ gia đình, cá nhân thay đổi các thông tin đăng ký thuế theo quy định tại khoản 1, khoản 4 Điều 23 Thông tư này."},{"k":"p","t":"a) Trường hợp thay đổi thông tin không có trên Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế"},{"k":"p","t":"Trong thời hạn 02 (hai) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế, cơ quan thuế quản lý trực tiếp người nộp thuế có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống ứng dụng đăng ký thuế;"},{"k":"p","t":"b) Trường hợp thay đổi thông tin trên Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế"},{"k":"p","t":"Trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế, cơ quan thuế quản lý trực tiếp có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống ứng dụng đăng ký thuế; đồng thời, ban hành Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế bản điện tử đã cập nhật thông tin thay đổi;"},{"k":"p","t":"c) Trường hợp việc kết nối giữa Hệ thống thông tin quản lý thuế với hệ thống Cơ sở dữ liệu quốc gia về dân cư bị gián đoạn trong quá trình xác thực thông tin thay đổi, cá nhân thực hiện theo quy định tại điểm c khoản 1 Điều 22 Thông tư này."},{"k":"p","t":"2. Hộ kinh doanh, hộ gia đình, cá nhân kinh doanh thay đổi thông tin đăng ký thuế theo quy định tại khoản 2, khoản 3 Điều 23 Thông tư này."},{"k":"p","t":"a) Tại cơ quan thuế nơi chuyển đi"},{"k":"p","t":"a.1) Trường hợp người nộp thuế thuộc diện phải kiểm tra tại trụ sở người nộp thuế trước khi chuyển địa điểm"},{"k":"p","t":"Trong thời hạn 02 ngày làm việc kể từ ngày tiếp nhận hồ sơ của người nộp thuế, cơ quan thuế thông báo cho người nộp thuế về việc hồ sơ thuộc diện phải kiểm tra tại trụ sở của người nộp thuế theo mẫu số 42/TB- ĐKT ban hành kèm theo Thông tư này, trong đó nêu dự kiến thời gian thực hiện kiểm tra."},{"k":"p","t":"Trong thời hạn 05 (năm) ngày làm việc kể từ ngày ký quyết định xử phạt vi phạm hành chính về thuế (nếu có) hoặc kết luận kiểm tra, cơ quan thuế ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này gửi cho người nộp thuế và cơ quan thuế nơi người nộp thuế chuyển đến."},{"k":"p","t":"Việc xác định người nộp thuế rủi ro cao thuộc diện phải kiểm tra tại trụ sở của người nộp thuế thực hiện theo quy định tại điểm a khoản 3 Điều 22 Luật số 108/2025/QH15 và quy định về áp dụng quản lý rủi ro, quản lý tuân thủ trong quản lý thuế;"},{"k":"p","t":"a.2) Trường hợp người nộp thuế không thuộc diện phải kiểm tra tại trụ sở người nộp thuế trước khi chuyển địa điểm"},{"k":"p","t":"Trong thời hạn 07 (bảy) ngày làm việc kể từ ngày tiếp nhận hồ sơ của người nộp thuế, cơ quan thuế ban hành Thông báo về việc người nộp thuế chuyển địa điểm mẫu số 09-MST ban hành kèm theo Thông tư này gửi cho người nộp thuế và cơ quan thuế nơi người nộp thuế chuyển đến;"},{"k":"p","t":"b) Tại cơ quan thuế nơi chuyển đến:"},{"k":"p","t":"Trong thời hạn 03 (ba) ngày làm việc kể từ ngày nhận đủ hồ sơ của người nộp thuế, cơ quan thuế tiếp nhận hồ sơ có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống ứng dụng đăng ký thuế, ban hành Giấy chứng nhận đăng ký thuế hoặc Thông báo mã số thuế bản điện tử đã cập nhật thông tin thay đổi gửi cho người nộp thuế."},{"k":"p","t":"3. Trường hợp hộ kinh doanh, cá nhân kinh doanh thay đổi thông tin đăng ký thuế theo quy định tại khoản 2, khoản 3 Điều 23 Thông tư này đã hoàn thành thủ tục tại cơ quan thuế nơi chuyển đi nhưng không nộp hồ sơ thay đổi địa chỉ trụ sở tại cơ quan đăng ký kinh doanh (đối với hộ kinh doanh đăng ký thuế theo cơ chế một cửa liên thông) hoặc tại cơ quan thuế nơi chuyển đến (đối với cá nhân kinh doanh quy định tại k khoản 2 Điều 4 Thông tư này), cơ quan thuế thực hiện tương tự như khoản 3 Điều 10 Thông tư này."},{"k":"p","t":"4. Khi nhận được giao dịch thay đổi chủ hộ kinh doanh của hệ thống thông tin về đăng ký kinh doanh truyền sang, Hệ thống ứng dụng đăng ký thuế tự động kiểm tra, truyền thông tin số định danh cá nhân theo chủ hộ mới cho hệ thống thông tin về đăng ký kinh doanh."},{"k":"p","t":"Sau khi cập nhật mã số thuế của hộ kinh doanh theo thông tin chủ hộ kinh doanh mới, Hệ thống ứng dụng đăng ký thuế tự động cập nhật trạng thái chấm dứt hiệu lực mã số thuế của hộ kinh doanh theo thông tin chủ hộ kinh doanh cũ. Việc cập nhật trạng thái này không làm chấm dứt hoạt động của hộ kinh doanh."},{"k":"p","t":"Trường hợp chủ hộ cũ của hộ kinh doanh chưa hoàn thành nghĩa vụ thuế của hoạt động kinh doanh thì chủ hộ mới kế thừa nghĩa vụ thuế của chủ hộ cũ. Chủ hộ mới của hộ kinh doanh được thực hiện bù trừ giữa các khoản phải nộp, nộp thừa hiện có với các khoản nghĩa vụ thuế được chuyển từ chủ hộ cũ hoặc được hoàn trả đối với khoản nộp thừa được chuyển từ chủ hộ cũ theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"5. Đối với hồ sơ thay đổi thông tin đăng ký thuế của người nộp thuế theo quy định tại khoản 5 Điều 23 Thông tư này thực hiện theo quy định tại điểm b khoản 1 Điều 42 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"Mục 3TẠM NGỪNG HOẠT ĐỘNG, KINH DOANH"}]},{"id":"tt90_25","no":25,"code":"Điều 25","title":"Điều 25. Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động sau tạm ngừng hoạt động, kinh doanh trước thời hạn","shortTitle":"Thông báo tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động sau tạm ngừng hoạt động, kinh doanh trước thời hạn","chuong":"","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Hộ gia đình, cá nhân kinh doanh quy định tại điểm k khoản 2 Điều 4 Thông tư này không
