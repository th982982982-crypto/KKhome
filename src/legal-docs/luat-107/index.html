<script id="LD" type="application/json">{"meta":{"title":"Luật 107/2016/QH13 — Luật Thuế xuất khẩu, thuế nhập khẩu","shortCode":"Luật 107/2016","subtitle":"Thuế xuất khẩu, nhập khẩu","slug":"luat-107","effectiveDate":"01/09/2016","scope":"Luật này quy định về đối tượng chịu thuế, người nộp thuế, căn cứ tính thuế, thời điểm tính thuế, biểu thuế, thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ áp dụng đối với hàng hóa xuất khẩu, nhập khẩu; miễn thuế, giảm thuế, hoàn thuế xuất khẩu, thuế nhập khẩu.","description":"Thuế xuất khẩu, nhập khẩu","related":[]},"outline":[{"id":"luat-107_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định về đối tượng chịu thuế, người nộp thuế, căn cứ tính thuế, thời điểm tính thuế, biểu thuế, thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ áp dụng đối với hàng hóa xuất khẩu, nhập khẩu; miễn thuế, giảm thuế, hoàn thuế xuất khẩu, thuế nhập khẩu."}]},{"id":"luat-107_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng chịu thuế","shortTitle":"Đối tượng chịu thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu qua cửa khẩu, biên giới Việt Nam."},{"k":"p","t":"2. Hàng hóa xuất khẩu từ thị trường trong nước vào khu phi thuế quan, hàng hóa nhập khẩu từ khu phi thuế quan vào thị trường trong nước."},{"k":"p","t":"3. Hàng hóa xuất khẩu, nhập khẩu tại chỗ và hàng hóa xuất khẩu, nhập khẩu của doanh nghiệp thực hiện quyền xuất khẩu, quyền nhập khẩu, quyền phân phối."},{"k":"p","t":"4. Đối tượng chịu thuế xuất khẩu, thuế nhập khẩu không áp dụng đối với các trường hợp sau:"},{"k":"p","t":"a) Hàng hóa quá cảnh, chuyển khẩu, trung chuyển;"},{"k":"p","t":"b) Hàng hóa viện trợ nhân đạo, hàng hóa viện trợ không hoàn lại;"},{"k":"p","t":"c) Hàng hóa xuất khẩu từ khu phi thuế quan ra nước ngoài; hàng hóa nhập khẩu từ nước ngoài vào khu phi thuế quan và chỉ sử dụng trong khu phi thuế quan; hàng hóa chuyển từ khu phi thuế quan này sang khu phi thuế quan khác;"},{"k":"p","t":"d) Phần dầu khí được dùng để trả thuế tài nguyên cho Nhà nước khi xuất khẩu."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-107_3","no":3,"code":"Điều 3","title":"Điều 3. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"2. Tổ chức nhận ủy thác xuất khẩu, nhập khẩu."},{"k":"p","t":"3. Người xuất cảnh, nhập cảnh có hàng hóa xuất khẩu, nhập khẩu, gửi hoặc nhận hàng hóa qua cửa khẩu, biên giới Việt Nam."},{"k":"p","t":"4. Người được ủy quyền, bảo lãnh và nộp thuế thay cho người nộp thuế, bao gồm:"},{"k":"p","t":"a) Đại lý làm thủ tục hải quan trong trường hợp được người nộp thuế ủy quyền nộp thuế xuất khẩu, thuế nhập khẩu;"},{"k":"p","t":"b) Doanh nghiệp cung cấp dịch vụ bưu chính, dịch vụ chuyển phát nhanh quốc tế trong trường hợp nộp thuế thay cho người nộp thuế;"},{"k":"p","t":"c) Tổ chức tín dụng hoặc tổ chức khác hoạt động theo quy định của Luật các tổ chức tín dụng trong trường hợp bảo lãnh, nộp thuế thay cho người nộp thuế;"},{"k":"p","t":"d) Người được chủ hàng hóa ủy quyền trong trường hợp hàng hóa là quà biếu, quà tặng của cá nhân; hành lý gửi trước, gửi sau chuyến đi của người xuất cảnh, nhập cảnh;"},{"k":"p","t":"đ) Chi nhánh của doanh nghiệp được ủy quyền nộp thuế thay cho doanh nghiệp;"},{"k":"p","t":"e) Người khác được ủy quyền nộp thuế thay cho người nộp thuế theo quy định của pháp luật."},{"k":"p","t":"5. Người thu mua, vận chuyển hàng hóa trong định mức miễn thuế của cư dân biên giới nhưng không sử dụng cho sản xuất, tiêu dùng mà đem bán tại thị trường trong nước và thương nhân nước ngoài được phép kinh doanh hàng hóa xuất khẩu, nhập khẩu ở chợ biên giới theo quy định của pháp luật."},{"k":"p","t":"6. Người có hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng không chịu thuế, miễn thuế nhưng sau đó có sự thay đổi và chuyển sang đối tượng chịu thuế theo quy định của pháp luật."},{"k":"p","t":"7. Trường hợp khác theo quy định của pháp luật."}]},{"id":"luat-107_4","no":4,"code":"Điều 4","title":"Điều 4. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Khu phi thuế quan là khu vực kinh tế nằm trong lãnh thổ Việt Nam, được thành lập theo quy định của pháp luật, có ranh giới địa lý xác định, ngăn cách với khu vực bên ngoài bằng hàng rào cứng, bảo đảm điều kiện cho hoạt động kiểm tra, giám sát, kiểm soát hải quan của cơ quan hải quan và các cơ quan có liên quan đối với hàng hóa xuất khẩu, nhập khẩu và phương tiện, hành khách xuất cảnh, nhập cảnh; quan hệ mua bán, trao đổi hàng hóa giữa khu phi thuế quan với bên ngoài là quan hệ xuất khẩu, nhập khẩu."},{"k":"p","t":"2. Phương pháp tính thuế hỗn hợp là việc áp dụng đồng thời phương pháp tính thuế theo tỷ lệ phần trăm và phương pháp tính thuế tuyệt đối."},{"k":"p","t":"3. Phương pháp tính thuế theo tỷ lệ phần trăm là việc xác định thuế theo phần trăm (%) của trị giá tính thuế hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"4. Phương pháp tính thuế tuyệt đối là việc ấn định số tiền thuế nhất định trên một đơn vị hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"5. Thuế chống bán phá giá là thuế nhập khẩu bổ sung được áp dụng trong trường hợp hàng hóa bán phá giá nhập khẩu vào Việt Nam gây ra hoặc đe dọa gây ra thiệt hại đáng kể cho ngành sản xuất trong nước hoặc ngăn cản sự hình thành của ngành sản xuất trong nước."},{"k":"p","t":"6. Thuế chống trợ cấp là thuế nhập khẩu bổ sung được áp dụng trong trường hợp hàng hóa được trợ cấp nhập khẩu vào Việt Nam gây ra hoặc đe dọa gây ra thiệt hại đáng kể cho ngành sản xuất trong nước hoặc ngăn cản sự hình thành của ngành sản xuất trong nước."},{"k":"p","t":"7. Thuế tự vệ là thuế nhập khẩu bổ sung được áp dụng trong trường hợp nhập khẩu hàng hóa quá mức vào Việt Nam gây thiệt hại nghiêm trọng hoặc đe dọa gây ra thiệt hại nghiêm trọng cho ngành sản xuất trong nước hoặc ngăn cản sự hình thành của ngành sản xuất trong nước."}]},{"id":"luat-107_5","no":5,"code":"Điều 5","title":"Điều 5. Căn cứ tính thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa áp dụng phương pháp tính thuế theo tỷ lệ phần trăm","shortTitle":"Căn cứ tính thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa áp dụng phương pháp tính thuế theo tỷ lệ phần trăm","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Số tiền thuế xuất khẩu, thuế nhập khẩu được xác định căn cứ vào trị giá tính thuế và thuế suất theo tỷ lệ phần trăm (%) của từng mặt hàng tại thời điểm tính thuế."},{"k":"p","t":"2. Thuế suất đối với hàng hóa xuất khẩu được quy định cụ thể cho từng mặt hàng tại biểu thuế xuất khẩu."},{"k":"p","t":"Trường hợp hàng hóa xuất khẩu sang nước, nhóm nước hoặc vùng lãnh thổ có thỏa thuận ưu đãi về thuế xuất khẩu trong quan hệ thương mại với Việt Nam thì thực hiện theo các thỏa thuận này."},{"k":"p","t":"3. Thuế suất đối với hàng hóa nhập khẩu gồm thuế suất ưu đãi, thuế suất ưu đãi đặc biệt, thuế suất thông thường và được áp dụng như sau:"},{"k":"p","t":"a) Thuế suất ưu đãi áp dụng đối với hàng hóa nhập khẩu có xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ thực hiện đối xử tối huệ quốc trong quan hệ thương mại với Việt Nam; hàng hóa từ khu phi thuế quan nhập khẩu vào thị trường trong nước đáp ứng điều kiện xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ thực hiện đối xử tối huệ quốc trong quan hệ thương mại với Việt Nam;"},{"k":"p","t":"b) Thuế suất ưu đãi đặc biệt áp dụng đối với hàng hóa nhập khẩu có xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ có thỏa thuận ưu đãi đặc biệt về thuế nhập khẩu trong quan hệ thương mại với Việt Nam; hàng hóa từ khu phi thuế quan nhập khẩu vào thị trường trong nước đáp ứng điều kiện xuất xứ từ nước, nhóm nước hoặc vùng lãnh thổ có thỏa thuận ưu đãi đặc biệt về thuế nhập khẩu trong quan hệ thương mại với Việt Nam;"},{"k":"p","t":"c) Thuế suất thông thường áp dụng đối với hàng hóa nhập khẩu không thuộc các trường hợp quy định tại điểm a và điểm b khoản này. Thuế suất thông thường được quy định bằng 150% thuế suất ưu đãi của từng mặt hàng tương ứng. Trường hợp mức thuế suất ưu đãi bằng 0%, Thủ tướng Chính phủ căn cứ quy định tại Điều 10 của Luật này để quyết định việc áp dụng mức thuế suất thông thường."}]},{"id":"luat-107_6","no":6,"code":"Điều 6","title":"Điều 6. Căn cứ tính thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa áp dụng phương pháp tính thuế tuyệt đối, phương pháp tính thuế hỗn hợp","shortTitle":"Căn cứ tính thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa áp dụng phương pháp tính thuế tuyệt đối, phương pháp tính thuế hỗn hợp","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Số tiền thuế áp dụng phương pháp tính thuế tuyệt đối đối với hàng hóa xuất khẩu, nhập khẩu được xác định căn cứ vào lượng hàng hóa thực tế xuất khẩu, nhập khẩu và mức thuế tuyệt đối quy định trên một đơn vị hàng hóa tại thời điểm tính thuế."},{"k":"p","t":"2. Số tiền thuế áp dụng phương pháp tính thuế hỗn hợp đối với hàng hóa xuất khẩu, nhập khẩu được xác định là tổng số tiền thuế theo tỷ lệ phần trăm và số tiền thuế tuyệt đối theo quy định tại khoản 1 Điều 5 và khoản 1 Điều 6 của Luật này."}]},{"id":"luat-107_7","no":7,"code":"Điều 7","title":"Điều 7. Thuế đối với hàng hóa nhập khẩu áp dụng hạn ngạch thuế quan","shortTitle":"Thuế đối với hàng hóa nhập khẩu áp dụng hạn ngạch thuế quan","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu trong hạn ngạch thuế quan áp dụng thuế suất, mức thuế tuyệt đối theo quy định tại khoản 3 Điều 5 và Điều 6 của Luật này."},{"k":"p","t":"2. Hàng hóa nhập khẩu ngoài hạn ngạch thuế quan áp dụng thuế suất, mức thuế tuyệt đối ngoài hạn ngạch do cơ quan có thẩm quyền tại khoản 1 Điều 11 của Luật này quy định."}]},{"id":"luat-107_8","no":8,"code":"Điều 8","title":"Điều 8. Trị giá tính thuế, thời điểm tính thuế","shortTitle":"Trị giá tính thuế, thời điểm tính thuế","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trị giá tính thuế xuất khẩu, thuế nhập khẩu là trị giá hải quan theo quy định của Luật hải quan."},{"k":"p","t":"2. Thời điểm tính thuế xuất khẩu, thuế nhập khẩu là thời điểm đăng ký tờ khai hải quan."},{"k":"p","t":"Đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng không chịu thuế, miễn thuế xuất khẩu, thuế nhập khẩu hoặc áp dụng thuế suất, mức thuế tuyệt đối trong hạn ngạch thuế quan nhưng được thay đổi về đối tượng không chịu thuế, miễn thuế, áp dụng thuế suất, mức thuế tuyệt đối trong hạn ngạch thuế quan theo quy định của pháp luật thì thời điểm tính thuế là thời điểm đăng ký tờ khai hải quan mới."},{"k":"p","t":"Thời điểm đăng ký tờ khai hải quan thực hiện theo quy định của pháp luật về hải quan."}]},{"id":"luat-107_9","no":9,"code":"Điều 9","title":"Điều 9. Thời hạn nộp thuế","shortTitle":"Thời hạn nộp thuế","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế phải nộp thuế trước khi thông quan hoặc giải phóng hàng hóa theo quy định của Luật hải quan, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"Trường hợp được tổ chức tín dụng bảo lãnh số thuế phải nộp thì được thông quan hoặc giải phóng hàng hóa nhưng phải nộp tiền chậm nộp theo quy định của Luật quản lý thuế kể từ ngày được thông quan hoặc giải phóng hàng hóa đến ngày nộp thuế. Thời hạn bảo lãnh tối đa là 30 ngày, kể từ ngày đăng ký tờ khai hải quan."},{"k":"p","t":"Trường hợp đã được tổ chức tín dụng bảo lãnh nhưng hết thời hạn bảo lãnh mà người nộp thuế chưa nộp thuế và tiền chậm nộp thì tổ chức bảo lãnh có trách nhiệm nộp đủ thuế và tiền chậm nộp thay cho người nộp thuế."},{"k":"p","t":"2. Người nộp thuế được áp dụng chế độ ưu tiên theo quy định của Luật hải quan được thực hiện nộp thuế cho các tờ khai hải quan đã thông quan hoặc giải phóng hàng hóa trong tháng chậm nhất vào ngày thứ mười của tháng kế tiếp. Quá thời hạn này mà người nộp thuế chưa nộp thuế thì phải nộp đủ số tiền nợ thuế và tiền chậm nộp theo quy định của Luật quản lý thuế."}]},{"id":"luat-107_10","no":10,"code":"Điều 10","title":"Điều 10. Nguyên tắc ban hành biểu thuế, thuế suất","shortTitle":"Nguyên tắc ban hành biểu thuế, thuế suất","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Khuyến khích nhập khẩu nguyên liệu, vật liệu, ưu tiên loại trong nước chưa đáp ứng nhu cầu; chú trọng phát triển lĩnh vực công nghệ cao, công nghệ nguồn, tiết kiệm năng lượng, bảo vệ môi trường."},{"k":"p","t":"2. Phù hợp với định hướng phát triển kinh tế - xã hội của Nhà nước và các cam kết về thuế xuất khẩu, thuế nhập khẩu trong các điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"3. Góp phần bình ổn thị trường và nguồn thu ngân sách nhà nước."},{"k":"p","t":"4. Đơn giản, minh bạch, tạo thuận lợi cho người nộp thuế và thực hiện cải cách thủ tục hành chính về thuế."},{"k":"p","t":"5. Áp dụng thống nhất mức thuế suất đối với hàng hóa có cùng bản chất, cấu tạo, công dụng, có tính năng kỹ thuật tương tự; thuế suất thuế nhập khẩu giảm dần từ thành phẩm đến nguyên liệu thô; thuế suất thuế xuất khẩu tăng dần từ thành phẩm đến nguyên liệu thô."}]},{"id":"luat-107_11","no":11,"code":"Điều 11","title":"Điều 11. Thẩm quyền ban hành biểu thuế, thuế suất","shortTitle":"Thẩm quyền ban hành biểu thuế, thuế suất","chuong":"Chương II — CĂN CỨ TÍNH THUẾ, THỜI ĐIỂM TÍNH THUẾ VÀ BIỂU THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ căn cứ quy định tại Điều 10 của Luật này, Biểu thuế xuất khẩu theo Danh mục nhóm hàng chịu thuế và khung thuế suất thuế xuất khẩu đối với từng nhóm hàng chịu thuế ban hành kèm theo Luật này, Biểu thuế ưu đãi cam kết tại Nghị định thư gia nhập Tổ chức thương mại thế giới (WTO) đã được Quốc hội phê chuẩn và các điều ước quốc tế khác mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên để ban hành:"},{"k":"p","t":"a) Biểu thuế xuất khẩu; Biểu thuế xuất khẩu ưu đãi;"},{"k":"p","t":"b) Biểu thuế nhập khẩu ưu đãi; Biểu thuế nhập khẩu ưu đãi đặc biệt;"},{"k":"p","t":"c) Danh mục hàng hóa và mức thuế tuyệt đối, thuế hỗn hợp, thuế nhập khẩu ngoài hạn ngạch thuế quan."},{"k":"p","t":"2. Trong trường hợp cần thiết, Chính phủ trình Ủy ban thường vụ Quốc hội sửa đổi, bổ sung Biểu thuế xuất khẩu theo Danh mục nhóm hàng chịu thuế và khung thuế suất thuế xuất khẩu đối với từng nhóm hàng chịu thuế ban hành kèm theo Luật này."},{"k":"p","t":"3. Thẩm quyền áp dụng thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ thực hiện theo quy định tại Chương III của Luật này."}]},{"id":"luat-107_12","no":12,"code":"Điều 12","title":"Điều 12. Thuế chống bán phá giá","shortTitle":"Thuế chống bán phá giá","chuong":"Chương III — THUẾ CHỐNG BÁN PHÁ GIÁ, THUẾ CHỐNG TRỢ CẤP, THUẾ TỰ VỆ","muc":"","level":1,"content":[{"k":"p","t":"1. Điều kiện áp dụng thuế chống bán phá giá:"},{"k":"p","t":"a) Hàng hóa nhập khẩu bán phá giá tại Việt Nam và biên độ bán phá giá phải được xác định cụ thể;"},{"k":"p","t":"b) Việc bán phá giá hàng hóa là nguyên nhân gây ra hoặc đe dọa gây ra thiệt hại đáng kể cho ngành sản xuất trong nước hoặc ngăn cản sự hình thành của ngành sản xuất trong nước."},{"k":"p","t":"2. Nguyên tắc áp dụng thuế chống bán phá giá:"},{"k":"p","t":"a) Thuế chống bán phá giá chỉ được áp dụng ở mức độ cần thiết, hợp lý nhằm ngăn ngừa hoặc hạn chế thiệt hại đáng kể cho ngành sản xuất trong nước;"},{"k":"p","t":"b) Việc áp dụng thuế chống bán phá giá được thực hiện khi đã tiến hành điều tra và phải căn cứ vào kết luận điều tra theo quy định của pháp luật;"},{"k":"p","t":"c) Thuế chống bán phá giá được áp dụng đối với hàng hóa bán phá giá vào Việt Nam;"},{"k":"p","t":"d) Việc áp dụng thuế chống bán phá giá không được gây thiệt hại đến lợi ích kinh tế - xã hội trong nước."},{"k":"p","t":"3. Thời hạn áp dụng thuế chống bán phá giá không quá 05 năm, kể từ ngày quyết định áp dụng có hiệu lực. Trường hợp cần thiết, quyết định áp dụng thuế chống bán phá giá có thể được gia hạn."}]},{"id":"luat-107_13","no":13,"code":"Điều 13","title":"Điều 13. Thuế chống trợ cấp","shortTitle":"Thuế chống trợ cấp","chuong":"Chương III — THUẾ CHỐNG BÁN PHÁ GIÁ, THUẾ CHỐNG TRỢ CẤP, THUẾ TỰ VỆ","muc":"","level":1,"content":[{"k":"p","t":"1. Điều kiện áp dụng thuế chống trợ cấp:"},{"k":"p","t":"a) Hàng hóa nhập khẩu được xác định có trợ cấp theo quy định pháp luật;"},{"k":"p","t":"b) Hàng hóa nhập khẩu là nguyên nhân gây ra hoặc đe dọa gây ra thiệt hại đáng kể cho ngành sản xuất trong nước hoặc ngăn cản sự hình thành của ngành sản xuất trong nước."},{"k":"p","t":"2. Nguyên tắc áp dụng thuế chống trợ cấp:"},{"k":"p","t":"a) Thuế chống trợ cấp chỉ được áp dụng ở mức độ cần thiết, hợp lý nhằm ngăn ngừa hoặc hạn chế thiệt hại đáng kể cho ngành sản xuất trong nước;"},{"k":"p","t":"b) Việc áp dụng thuế chống trợ cấp được thực hiện khi đã tiến hành điều tra và phải căn cứ vào kết luận điều tra theo quy định của pháp luật;"},{"k":"p","t":"c) Thuế chống trợ cấp được áp dụng đối với hàng hóa được trợ cấp nhập khẩu vào Việt Nam;"},{"k":"p","t":"d) Việc áp dụng thuế chống trợ cấp không được gây thiệt hại đến lợi ích kinh tế - xã hội trong nước."},{"k":"p","t":"3. Thời hạn áp dụng thuế chống trợ cấp không quá 05 năm, kể từ ngày quyết định áp dụng có hiệu lực. Trường hợp cần thiết, quyết định áp dụng thuế chống trợ cấp có thể được gia hạn."}]},{"id":"luat-107_14","no":14,"code":"Điều 14","title":"Điều 14. Thuế tự vệ","shortTitle":"Thuế tự vệ","chuong":"Chương III — THUẾ CHỐNG BÁN PHÁ GIÁ, THUẾ CHỐNG TRỢ CẤP, THUẾ TỰ VỆ","muc":"","level":1,"content":[{"k":"p","t":"1. Điều kiện áp dụng thuế tự vệ:"},{"k":"p","t":"a) Khối lượng, số lượng hoặc trị giá hàng hóa nhập khẩu gia tăng đột biến một cách tuyệt đối hoặc tương đối so với khối lượng, số lượng hoặc trị giá của hàng hóa tương tự hoặc hàng hóa cạnh tranh trực tiếp được sản xuất trong nước;"},{"k":"p","t":"b) Việc gia tăng khối lượng, số lượng hoặc trị giá hàng hóa nhập khẩu quy định tại điểm a khoản này gây ra hoặc đe doạ gây ra thiệt hại nghiêm trọng cho ngành sản xuất hàng hóa tương tự hoặc hàng hóa cạnh tranh trực tiếp trong nước hoặc ngăn cản sự hình thành của ngành sản xuất trong nước."},{"k":"p","t":"2. Nguyên tắc áp dụng thuế tự vệ:"},{"k":"p","t":"a) Thuế tự vệ được áp dụng trong phạm vi và mức độ cần thiết nhằm ngăn ngừa hoặc hạn chế thiệt hại nghiêm trọng cho ngành sản xuất trong nước và tạo điều kiện để ngành sản xuất đó nâng cao khả năng cạnh tranh;"},{"k":"p","t":"b) Việc áp dụng thuế tự vệ phải căn cứ vào kết luận điều tra, trừ trường hợp áp dụng thuế tự vệ tạm thời;"},{"k":"p","t":"c) Thuế tự vệ được áp dụng trên cơ sở không phân biệt đối xử và không phụ thuộc vào xuất xứ hàng hóa."},{"k":"p","t":"3. Thời hạn áp dụng thuế tự vệ không quá 04 năm, bao gồm cả thời gian áp dụng thuế tự vệ tạm thời. Thời hạn áp dụng thuế tự vệ có thể được gia hạn không quá 06 năm tiếp theo, với điều kiện vẫn còn thiệt hại nghiêm trọng hoặc nguy cơ gây ra thiệt hại nghiêm trọng cho ngành sản xuất trong nước và có bằng chứng chứng minh rằng ngành sản xuất đó đang điều chỉnh để nâng cao khả năng cạnh tranh."}]},{"id":"luat-107_15","no":15,"code":"Điều 15","title":"Điều 15. Áp dụng thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ","shortTitle":"Áp dụng thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ","chuong":"Chương III — THUẾ CHỐNG BÁN PHÁ GIÁ, THUẾ CHỐNG TRỢ CẤP, THUẾ TỰ VỆ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc áp dụng, thay đổi, bãi bỏ thuế chống bán phá giá, thuế chống trợ cấp và thuế tự vệ được thực hiện theo quy định của Luật này và pháp luật về chống bán phá giá, pháp luật về chống trợ cấp, pháp luật về tự vệ."},{"k":"p","t":"2. Căn cứ mức thuế, số lượng hoặc trị giá hàng hóa thuộc đối tượng chịu thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ, người khai hải quan có trách nhiệm kê khai và nộp thuế theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"3. Bộ Công thương quyết định việc áp dụng thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ."},{"k":"p","t":"4. Bộ Tài chính quy định việc kê khai, thu, nộp, hoàn trả thuế chống bán phá giá, thuế chống trợ cấp, thuế tự vệ."},{"k":"p","t":"5. Trường hợp lợi ích của Cộng hòa xã hội chủ nghĩa Việt Nam bị xâm hại hay vi phạm, căn cứ vào các điều ước quốc tế, Chính phủ báo cáo Quốc hội quyết định áp dụng biện pháp thuế phòng vệ khác phù hợp."}]},{"id":"luat-107_16","no":16,"code":"Điều 16","title":"Điều 16. Miễn thuế","shortTitle":"Miễn thuế","chuong":"Chương IV — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ tại Việt Nam trong định mức phù hợp với điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên; hàng hóa trong tiêu chuẩn hành lý miễn thuế của người xuất cảnh, nhập cảnh; hàng hóa nhập khẩu để bán tại cửa hàng miễn thuế."},{"k":"p","t":"2. Tài sản di chuyển, quà biếu, quà tặng trong định mức của tổ chức, cá nhân nước ngoài cho tổ chức, cá nhân Việt Nam hoặc ngược lại."},{"k":"p","t":"Tài sản di chuyển, quà biếu, quà tặng có số lượng hoặc trị giá vượt quá định mức miễn thuế phải nộp thuế đối với phần vượt, trừ trường hợp đơn vị nhận là cơ quan, tổ chức được ngân sách nhà nước bảo đảm kinh phí hoạt động và được cơ quan có thẩm quyền cho phép tiếp nhận hoặc trường hợp vì mục đích nhân đạo, từ thiện."},{"k":"p","t":"3. Hàng hóa mua bán, trao đổi qua biên giới của cư dân biên giới thuộc Danh mục hàng hóa và trong định mức để phục vụ cho sản xuất, tiêu dùng của cư dân biên giới."},{"k":"p","t":"Trường hợp thu mua, vận chuyển hàng hóa trong định mức nhưng không sử dụng cho sản xuất, tiêu dùng của cư dân biên giới và hàng hóa xuất khẩu, nhập khẩu của thương nhân nước ngoài được phép kinh doanh ở chợ biên giới thì phải nộp thuế."},{"k":"p","t":"4. Hàng hóa được miễn thuế xuất khẩu, thuế nhập khẩu theo điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"5. Hàng hóa có trị giá hoặc có số tiền thuế phải nộp dưới mức tối thiểu."},{"k":"p","t":"6. Nguyên liệu, vật tư, linh kiện nhập khẩu để gia công sản phẩm xuất khẩu; sản phẩm hoàn chỉnh nhập khẩu để gắn vào sản phẩm gia công; sản phẩm gia công xuất khẩu."},{"k":"p","t":"Sản phẩm gia công xuất khẩu được sản xuất từ nguyên liệu, vật tư trong nước có thuế xuất khẩu thì không được miễn thuế đối với phần trị giá nguyên liệu, vật tư trong nước tương ứng cấu thành trong sản phẩm xuất khẩu."},{"k":"p","t":"Hàng hóa xuất khẩu để gia công sau đó nhập khẩu được miễn thuế xuất khẩu và thuế nhập khẩu tính trên phần trị giá của nguyên vật liệu xuất khẩu cấu thành sản phẩm gia công. Đối với hàng hóa xuất khẩu để gia công sau đó nhập khẩu là tài nguyên, khoáng sản, sản phẩm có tổng trị giá tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên thì không được miễn thuế."},{"k":"p","t":"7. Nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất hàng hóa xuất khẩu."},{"k":"p","t":"8. Hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan không sử dụng nguyên liệu, linh kiện nhập khẩu từ nước ngoài khi nhập khẩu vào thị trường trong nước."},{"k":"p","t":"9. Hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định, bao gồm:"},{"k":"p","t":"a) Hàng hóa tạm nhập, tái xuất, tạm xuất, tái nhập để tổ chức hoặc tham dự hội chợ, triển lãm, giới thiệu sản phẩm, sự kiện thể thao, văn hóa, nghệ thuật hoặc các sự kiện khác; máy móc, thiết bị tạm nhập, tái xuất để thử nghiệm, nghiên cứu phát triển sản phẩm; máy móc, thiết bị, dụng cụ nghề nghiệp tạm nhập, tái xuất, tạm xuất, tái nhập để phục vụ công việc trong thời hạn nhất định hoặc phục vụ gia công cho thương nhân nước ngoài, trừ trường hợp máy móc, thiết bị, dụng cụ, phương tiện vận chuyển của các tổ chức, cá nhân được phép tạm nhập, tái xuất để thực hiện các dự án đầu tư, thi công xây dựng, lắp đặt công trình, phục vụ sản xuất;"},{"k":"p","t":"b) Máy móc, thiết bị, linh kiện, phụ tùng tạm nhập để thay thế, sửa chữa tàu biển, tàu bay nước ngoài hoặc tạm xuất để thay thế, sửa chữa tàu biển, tàu bay Việt Nam ở nước ngoài; hàng hóa tạm nhập, tái xuất để cung ứng cho tàu biển, tàu bay nước ngoài neo đậu tại cảng Việt Nam;"},{"k":"p","t":"c) Hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập để bảo hành, sửa chữa, thay thế;"},{"k":"p","t":"d) Phương tiện quay vòng theo phương thức tạm nhập, tái xuất hoặc tạm xuất, tái nhập để chứa hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"đ) Hàng hóa kinh doanh tạm nhập, tái xuất trong thời hạn tạm nhập, tái xuất (bao gồm cả thời gian gia hạn) được tổ chức tín dụng bảo lãnh hoặc đã đặt cọc một khoản tiền tương đương số tiền thuế nhập khẩu của hàng hóa tạm nhập, tái xuất."},{"k":"p","t":"10. Hàng hóa không nhằm mục đích thương mại trong các trường hợp sau: hàng mẫu; ảnh, phim, mô hình thay thế cho hàng mẫu; ấn phẩm quảng cáo số lượng nhỏ."},{"k":"p","t":"11. Hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư theo quy định của pháp luật về đầu tư, bao gồm:"},{"k":"p","t":"a) Máy móc, thiết bị; linh kiện, chi tiết, bộ phận rời, phụ tùng để lắp ráp đồng bộ hoặc sử dụng đồng bộ với máy móc, thiết bị; nguyên liệu, vật tư dùng để chế tạo máy móc, thiết bị hoặc để chế tạo linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị;"},{"k":"p","t":"b) Phương tiện vận tải chuyên dùng trong dây chuyền công nghệ sử dụng trực tiếp cho hoạt động sản xuất của dự án;"},{"k":"p","t":"c) Vật tư xây dựng trong nước chưa sản xuất được."},{"k":"p","t":"Việc miễn thuế nhập khẩu đối với hàng hóa nhập khẩu quy định tại khoản này được áp dụng cho cả dự án đầu tư mới và dự án đầu tư mở rộng."},{"k":"p","t":"12. Giống cây trồng; giống vật nuôi; phân bón, thuốc bảo vệ thực vật trong nước chưa sản xuất được, cần thiết nhập khẩu theo quy định của cơ quan quản lý nhà nước có thẩm quyền."},{"k":"p","t":"13. Nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được nhập khẩu để sản xuất của dự án đầu tư thuộc danh mục ngành, nghề đặc biệt ưu đãi đầu tư hoặc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định của pháp luật về đầu tư, doanh nghiệp công nghệ cao, doanh nghiệp khoa học và công nghệ, tổ chức khoa học và công nghệ được miễn thuế nhập khẩu trong thời hạn 05 năm, kể từ khi bắt đầu sản xuất."},{"k":"p","t":"Việc miễn thuế nhập khẩu quy định tại khoản này không áp dụng đối với dự án đầu tư khai thác khoáng sản; dự án sản xuất sản phẩm có tổng trị giá tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên; dự án sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng chịu thuế tiêu thụ đặc biệt."},{"k":"p","t":"14. Nguyên liệu, vật tư, linh kiện nhập khẩu trong nước chưa sản xuất được của dự án đầu tư để sản xuất, lắp ráp trang thiết bị y tế được ưu tiên nghiên cứu, chế tạo được miễn thuế nhập khẩu trong thời hạn 05 năm, kể từ khi bắt đầu sản xuất."},{"k":"p","t":"15. Hàng hóa nhập khẩu để phục vụ hoạt động dầu khí, bao gồm:"},{"k":"p","t":"a) Máy móc, thiết bị, phụ tùng thay thế, phương tiện vận tải chuyên dùng cần thiết cho hoạt động dầu khí, bao gồm cả trường hợp tạm nhập, tái xuất;"},{"k":"p","t":"b) Linh kiện, chi tiết, bộ phận rời, phụ tùng để lắp ráp đồng bộ hoặc sử dụng đồng bộ với máy móc, thiết bị; nguyên liệu, vật tư dùng để chế tạo máy móc, thiết bị hoặc để chế tạo linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị cần thiết cho hoạt động dầu khí;"},{"k":"p","t":"c) Vật tư cần thiết cho hoạt động dầu khí trong nước chưa sản xuất được."},{"k":"p","t":"16. Dự án, cơ sở đóng tàu thuộc danh mục ngành, nghề ưu đãi theo quy định của pháp luật về đầu tư được miễn thuế đối với:"},{"k":"p","t":"a) Hàng hóa nhập khẩu để tạo tài sản cố định của cơ sở đóng tàu, bao gồm: máy móc, thiết bị; linh kiện, chi tiết, bộ phận rời, phụ tùng để lắp ráp đồng bộ hoặc sử dụng đồng bộ với máy móc, thiết bị; nguyên liệu, vật tư dùng để chế tạo máy móc, thiết bị hoặc để chế tạo linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị; phương tiện vận tải trong dây chuyền công nghệ phục vụ trực tiếp cho hoạt động đóng tàu; vật tư xây dựng trong nước chưa sản xuất được;"},{"k":"p","t":"b) Hàng hóa nhập khẩu là máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bán thành phẩm trong nước chưa sản xuất được phục vụ cho việc đóng tàu;"},{"k":"p","t":"c) Tàu biển xuất khẩu."},{"k":"p","t":"17. Máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng nhập khẩu phục vụ hoạt động in, đúc tiền."},{"k":"p","t":"18. Hàng hóa nhập khẩu là nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm."},{"k":"p","t":"19. Hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường, bao gồm:"},{"k":"p","t":"a) Máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng nhập khẩu trong nước chưa sản xuất được để thu gom, vận chuyển, xử lý, chế biến nước thải, rác thải, khí thải, quan trắc và phân tích môi trường, sản xuất năng lượng tái tạo; xử lý ô nhiễm môi trường, ứng phó, xử lý sự cố môi trường;"},{"k":"p","t":"b) Sản phẩm xuất khẩu được sản xuất từ hoạt động tái chế, xử lý chất thải."},{"k":"p","t":"20. Hàng hóa nhập khẩu chuyên dùng trong nước chưa sản xuất được phục vụ trực tiếp cho giáo dục."},{"k":"p","t":"21. Hàng hóa nhập khẩu là máy móc, thiết bị, phụ tùng, vật tư chuyên dùng trong nước chưa sản xuất được, tài liệu, sách báo khoa học chuyên dùng sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, phát triển hoạt động ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học và công nghệ, đổi mới công nghệ."},{"k":"p","t":"22. Hàng hóa nhập khẩu chuyên dùng phục vụ trực tiếp cho an ninh, quốc phòng, trong đó phương tiện vận tải chuyên dùng phải là loại trong nước chưa sản xuất được."},{"k":"p","t":"23. Hàng hóa xuất khẩu, nhập khẩu để phục vụ bảo đảm an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác."},{"k":"p","t":"24. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-107_17","no":17,"code":"Điều 17","title":"Điều 17. Thủ tục miễn thuế","shortTitle":"Thủ tục miễn thuế","chuong":"Chương IV — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp quy định tại các khoản 11, 12, 13, 14, 15, 16 và 18 Điều 16 của Luật này, người nộp thuế thực hiện thông báo hàng hóa miễn thuế dự kiến nhập khẩu với cơ quan hải quan."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo quy định của pháp luật về quản lý thuế."}]},{"id":"luat-107_18","no":18,"code":"Điều 18","title":"Điều 18. Giảm thuế","shortTitle":"Giảm thuế","chuong":"Chương IV — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu đang trong quá trình giám sát của cơ quan hải quan nếu bị hư hỏng, mất mát được cơ quan, tổ chức có thẩm quyền giám định chứng nhận thì được giảm thuế."},{"k":"p","t":"Mức giảm thuế tương ứng với tỷ lệ tổn thất thực tế của hàng hóa. Trường hợp hàng hóa xuất khẩu, nhập khẩu bị hư hỏng, mất mát toàn bộ thì không phải nộp thuế."},{"k":"p","t":"2. Thủ tục giảm thuế thực hiện theo quy định của pháp luật về quản lý thuế."}]},{"id":"luat-107_19","no":19,"code":"Điều 19","title":"Điều 19. Hoàn thuế","shortTitle":"Hoàn thuế","chuong":"Chương IV — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp hoàn thuế:"},{"k":"p","t":"a) Người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu nhưng không có hàng hóa nhập khẩu, xuất khẩu hoặc nhập khẩu, xuất khẩu ít hơn so với hàng hóa nhập khẩu, xuất khẩu đã nộp thuế;"},{"k":"p","t":"b) Người nộp thuế đã nộp thuế xuất khẩu nhưng hàng hóa xuất khẩu phải tái nhập được hoàn thuế xuất khẩu và không phải nộp thuế nhập khẩu;"},{"k":"p","t":"c) Người nộp thuế đã nộp thuế nhập khẩu nhưng hàng hóa nhập khẩu phải tái xuất được hoàn thuế nhập khẩu và không phải nộp thuế xuất khẩu;"},{"k":"p","t":"d) Người nộp thuế đã nộp thuế đối với hàng hóa nhập khẩu để sản xuất, kinh doanh nhưng đã đưa vào sản xuất hàng hóa xuất khẩu và đã xuất khẩu sản phẩm;"},{"k":"p","t":"đ) Người nộp thuế đã nộp thuế đối với máy móc, thiết bị, dụng cụ, phương tiện vận chuyển của các tổ chức, cá nhân được phép tạm nhập, tái xuất, trừ trường hợp đi thuê để thực hiện các dự án đầu tư, thi công xây dựng, lắp đặt công trình, phục vụ sản xuất, khi tái xuất ra nước ngoài hoặc xuất vào khu phi thuế quan."},{"k":"p","t":"Số tiền thuế nhập khẩu được hoàn lại xác định trên cơ sở trị giá sử dụng còn lại của hàng hóa khi tái xuất khẩu tính theo thời gian sử dụng, lưu lại tại Việt Nam. Trường hợp hàng hóa đã hết trị giá sử dụng thì không được hoàn lại thuế nhập khẩu đã nộp."},{"k":"p","t":"Không hoàn thuế đối với số tiền thuế được hoàn dưới mức tối thiểu theo quy định của Chính phủ."},{"k":"p","t":"2. Hàng hóa quy định tại các điểm a, b và c khoản 1 Điều này được hoàn thuế khi chưa qua sử dụng, gia công, chế biến."},{"k":"p","t":"3. Thủ tục hoàn thuế thực hiện theo quy định của pháp luật về quản lý thuế."}]},{"id":"luat-107_20","no":20,"code":"Điều 20","title":"Điều 20. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 9 năm 2016."},{"k":"p","t":"2. Luật thuế xuất khẩu, thuế nhập khẩu số 45/2005/QH11 hết hiệu lực kể từ ngày Luật này có hiệu lực thi hành."}]},{"id":"luat-107_21","no":21,"code":"Điều 21","title":"Điều 21. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Dự án đang được hưởng ưu đãi về thuế xuất khẩu, thuế nhập khẩu có mức ưu đãi cao hơn mức ưu đãi quy định tại Luật này thì tiếp tục thực hiện theo mức ưu đãi đó cho thời gian hưởng ưu đãi còn lại của dự án; trường hợp mức ưu đãi về thuế xuất khẩu, thuế nhập khẩu thấp hơn mức ưu đãi hoặc chưa được hưởng ưu đãi về thuế xuất khẩu, thuế nhập khẩu quy định tại Luật này thì được hưởng mức ưu đãi theo quy định của Luật này cho thời gian hưởng ưu đãi còn lại của dự án."},{"k":"p","t":"2. Nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất hàng hóa xuất khẩu nhưng chưa xuất khẩu sản phẩm; hàng hóa kinh doanh tạm nhập, tái xuất nhưng chưa tái xuất thuộc các tờ khai đăng ký với cơ quan hải quan trước ngày Luật này có hiệu lực thi hành, chưa nộp thuế thì được áp dụng theo quy định của Luật này."}]},{"id":"luat-107_22","no":22,"code":"Điều 22","title":"Điều 22. Quy định chi tiết","shortTitle":"Quy định chi tiết","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Chính phủ quy định chi tiết các điều, khoản được giao trong Luật."},{"k":"p","t":"Luật này đã được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XIII, kỳ họp thứ 11 thông qua ngày 06 tháng 4 năm 2016."},{"k":"p","t":"CHỦ TỊCH QUỐC HỘINguyễn Thị Kim Ngân"}]}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
