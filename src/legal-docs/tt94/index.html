<script id="LD" type="application/json">{"meta":{"title":"Thông tư 94/2026/TT-BTC — Quy định về quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","shortCode":"TT 94/2026","subtitle":"Quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","slug":"tt94","effectiveDate":"01/07/2026","scope":"Thông tư này quy định về: 1. Thu thập, xử lý, quản lý, sử dụng thông tin liên quan đến người nộp thuế phục vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế. 2. Tiêu chí đánh giá, phân loại mức độ rủi ro và việc áp dụng quản lý rủi ro trong hoạt động nghiệp vụ quản lý thuế quy định tại khoản 5 Điều 33 của Luật Quản lý thuế số 108/2025/QH15. 3. Tiêu chí đánh giá việc tuân thủ pháp luật của ngư","description":"Quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","related":[]},"outline":[{"id":"tt94_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này quy định về:"},{"k":"p","t":"1. Thu thập, xử lý, quản lý, sử dụng thông tin liên quan đến người nộp thuế phục vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"2. Tiêu chí đánh giá, phân loại mức độ rủi ro và việc áp dụng quản lý rủi ro trong hoạt động nghiệp vụ quản lý thuế quy định tại khoản 5 Điều 33 của Luật Quản lý thuế số 108/2025/QH15."},{"k":"p","t":"3. Tiêu chí đánh giá việc tuân thủ pháp luật của người nộp thuế và các hoạt động quản lý tuân thủ trong quản lý thuế quy định tại khoản 3 Điều 34 của Luật Quản lý thuế số 108/2025/QH15."}]},{"id":"tt94_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế."},{"k":"p","t":"2. Cơ quan thuế."},{"k":"p","t":"3. Công chức thuế."},{"k":"p","t":"4. Cơ quan Nhà nước, tổ chức, cá nhân khác có liên quan đến hoạt động quản lý thuế."}]},{"id":"tt94_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Thông tư này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Thông tin quản lý tuân thủ, quản lý rủi ro trong quản lý thuế là thông tin về thuế, thông tin liên quan đến thuế, thông tin liên quan đến người nộp thuế được cơ quan thuế thu thập, xử lý phục vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"2. Mức độ tuân thủ pháp luật thuế là kết quả đánh giá, phân loại của cơ quan thuế về việc thực hiện đầy đủ, đúng hạn và đúng quy định các nghĩa vụ theo pháp luật thuế của người nộp thuế trong suốt quá trình đăng ký, kê khai, nộp thuế, báo cáo thuế và cung cấp thông tin cho cơ quan thuế."},{"k":"p","t":"3. Tiêu chí đánh giá, phân loại mức độ tuân thủ pháp luật thuế là hệ thống các tiêu chuẩn, chỉ tiêu để đánh giá và phân loại mức độ tuân thủ pháp luật thuế của người nộp thuế."},{"k":"p","t":"4. Chỉ số tiêu chí đánh giá, phân loại mức độ tuân thủ pháp luật thuế là các chỉ tiêu thông tin mang giá trị cụ thể của tiêu chí đánh giá, phân loại tuân thủ pháp luật thuế của người nộp thuế."},{"k":"p","t":"5. Đánh giá và phân loại mức độ tuân thủ pháp luật thuế là việc phân tích thông tin, dữ liệu để xác định mức độ chấp hành pháp luật thuế của người nộp thuế và sắp xếp người nộp thuế vào các nhóm tuân thủ khác nhau."},{"k":"p","t":"6. Mức độ rủi ro là thước đo phản ánh khả năng xảy ra và mức độ ảnh hưởng của hành vi không tuân thủ pháp luật thuế của người nộp thuế đối với việc thực hiện nghĩa vụ thuế và công tác quản lý thuế của cơ quan thuế."},{"k":"p","t":"7. Tiêu chí đánh giá, phân loại mức độ rủi ro là hệ thống các tiêu chuẩn, chỉ tiêu để đánh giá, phân loại người nộp thuế theo mức độ rủi ro vi phạm pháp luật thuế."},{"k":"p","t":"8. Chỉ số tiêu chí đánh giá, phân loại mức độ rủi ro là các chỉ tiêu thông tin mang giá trị cụ thể của tiêu chí đánh giá, phân loại mức độ rủi ro."},{"k":"p","t":"9. Đánh giá, phân loại mức độ rủi ro của người nộp thuế là việc phân tích, đo lường và xác định mức độ tiềm ẩn của hành vi không tuân thủ pháp luật thuế và sắp xếp người nộp thuế vào các nhóm rủi ro khác nhau."},{"k":"p","t":"10. Dấu hiệu rủi ro là yếu tố mang giá trị thông tin phản ánh sự tiềm ẩn của hành vi vi phạm pháp luật."},{"k":"p","t":"11. Dấu hiệu vi phạm pháp luật thuế là yếu tố mang giá trị thông tin, làm cơ sở nhận diện hành vi vi phạm pháp luật thuế."},{"k":"p","t":"12. Giám sát trọng điểm là việc cơ quan thuế áp dụng các biện pháp nghiệp vụ quản lý thuế để theo dõi, kiểm soát chặt chẽ hoạt động của người nộp thuế có dấu hiệu rủi ro cao hoặc có dấu hiệu vi phạm pháp luật thuế trong một khoảng thời gian nhất định."},{"k":"p","t":"13. Phân hệ quản lý tuân thủ và rủi ro thuế là lớp chức năng chuyên ngành thuộc Hệ thống quản trị thuế của ngành Thuế, được xây dựng để phục vụ việc thu thập, xử lý, phân tích thông tin; đánh giá, phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế; hỗ trợ đề xuất, điều phối, giám sát, truy vết và phản hồi kết quả áp dụng các biện pháp quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"Phân hệ quản lý tuân thủ và rủi ro thuế bao gồm các chức năng, dữ liệu, hồ sơ điện tử, hồ sơ, vụ việc tuân thủ, sổ đăng ký rủi ro, bộ tiêu chí, chỉ số, quy tắc nghiệp vụ, mô hình phân tích, công cụ cảnh báo, dự báo và công cụ hỗ trợ ra quyết định; được quản lý, vận hành tập trung và phân quyền khai thác, sử dụng theo chức năng, nhiệm vụ, thẩm quyền của cơ quan thuế các cấp."},{"k":"p","t":"Phân hệ quản lý tuân thủ và rủi ro thuế không thay thế trách nhiệm quyết định của cơ quan thuế, công chức thuế có thẩm quyền; việc khai thác, sử dụng kết quả phân tích, cảnh báo, đề xuất của phân hệ phải bảo đảm khách quan, minh bạch, có khả năng truy vết, giải trình, bảo mật thông tin người nộp thuế, bảo vệ dữ liệu cá nhân, an toàn hệ thống thông tin và tuân thủ quy định của pháp luật có liên quan."},{"k":"p","t":"14. Phân loại theo phương pháp học máy (machine learning) là thực hiện các thuật toán tính toán, thống kê trên máy tính để xác định các mô hình, hàm số, chỉ số giúp phân loại, dự báo mức độ rủi ro."},{"k":"p","t":"15. Phương pháp xếp hạng theo danh mục là phương pháp đánh giá người nộp thuế qua đối chiếu với các tiêu chí, chỉ số về quá trình hoạt động và chấp hành pháp luật thuế, được sắp xếp theo các nhóm tương ứng với mỗi mức xếp hạng. Người nộp thuế đạt một mức xếp hạng cụ thể nếu được đánh giá thỏa mãn tiêu chí, chỉ số trong nhóm tiêu chí, chỉ số tương ứng với mức xếp hạng đó."},{"k":"p","t":"16. Phương pháp chấm điểm và phân loại theo điểm là phương pháp đánh giá người nộp thuế trên cơ sở điểm số của các tiêu chí, chỉ số về quá trình hoạt động và chấp hành pháp luật thuế."},{"k":"p","t":"17. Sổ đăng ký rủi ro là cơ sở dữ liệu lưu trữ thông tin về các rủi ro trên Phân hệ quản lý tuân thủ và rủi ro thuế, cho phép tra cứu định nghĩa, mức độ hậu quả, số lượng và loại hình người nộp thuế liên quan đến rủi ro đó; báo cáo đánh giá, tiêu chí và quy tắc chấm điểm, cùng kế hoạch và biện pháp xử lý phù hợp với quy mô và mức xếp hạng rủi ro của mỗi rủi ro sau khi phân tích."}]},{"id":"tt94_4","no":4,"code":"Điều 4","title":"Điều 4. Nguyên tắc quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","shortTitle":"Nguyên tắc quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Việc áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế phải bảo đảm tính khách quan, minh bạch, đúng quy định của pháp luật, không phân biệt đối xử; được thực hiện nhằm nâng cao hiệu lực, hiệu quả quản lý thuế, khuyến khích và tạo điều kiện để người nộp thuế tự nguyện tuân thủ tốt pháp luật thuế, đồng thời phòng ngừa, phát hiện và xử lý kịp thời các hành vi vi phạm pháp luật thuế."},{"k":"p","t":"2. Quản lý tuân thủ, quản lý rủi ro trong quản lý thuế phải được thực hiện trên cơ sở phân tích dữ liệu khách quan, toàn diện, thường xuyên được cập nhật; áp dụng các biện pháp quản lý phù hợp với đặc thù, mức độ tuân thủ pháp luật thuế và mức độ rủi ro của từng nhóm, từng người nộp thuế; ưu tiên ứng dụng công nghệ thông tin hiện đại và tự động hóa trong thu thập, xử lý dữ liệu, đánh giá và phân loại."},{"k":"p","t":"3. Thông tin phục vụ quản lý tuân thủ, quản lý rủi ro được thu thập từ các nguồn thông tin trong và ngoài cơ quan thuế, bao gồm cả thông tin từ nước ngoài theo quy định của pháp luật và quy định tại Điều 6 Thông tư này; được quản lý thông qua hệ thống quản trị thuế của ngành thuế, đồng thời được xử lý, chia sẻ và cung cấp cho cơ quan thuế các cấp và các cơ quan nhà nước có liên quan để phục vụ công tác quản lý nhà nước theo quy định."},{"k":"p","t":"4. Việc đánh giá, phân loại mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế được thực hiện tự động, định kỳ, theo một hoặc kết hợp các phương pháp được quy định tại Thông tư này trên cơ sở quy trình, biện pháp nghiệp vụ quản lý thuế, hệ thống tiêu chí và cơ sở dữ liệu về người nộp thuế."},{"k":"p","t":"5. Trường hợp Phân hệ quản lý tuân thủ và rủi ro thuế gặp sự cố hoặc chưa đáp ứng yêu cầu áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế, việc thực hiện được tiến hành thủ công trên cơ sở phê duyệt bằng văn bản của người có thẩm quyền theo quy định của Luật Quản lý thuế số 108/2025/QH15 và các văn bản hướng dẫn thi hành."},{"k":"p","t":"6. Trường hợp có thay đổi thông tin làm thay đổi kết quả đánh giá, phân loại mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế mà hệ thống ứng dụng chưa tự động cập nhật, việc điều chỉnh được thực hiện thủ công bởi công chức thuế sau khi được người có thẩm quyền phê duyệt."},{"k":"p","t":"7. Căn cứ kết quả đánh giá, phân loại mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế, cơ quan thuế thực hiện:"},{"k":"p","t":"a) Quyết định việc kiểm tra, giám sát và áp dụng các biện pháp nghiệp vụ quản lý thuế phù hợp;"},{"k":"p","t":"b) Xây dựng kế hoạch và biện pháp nâng cao mức độ tuân thủ tổng thể, phù hợp với nguồn lực, trên cơ sở phân tích hành vi, nguyên nhân và quy mô của từng mức độ tuân thủ và mức độ rủi ro."},{"k":"p","t":"8. Kết quả áp dụng các biện pháp nghiệp vụ tương ứng với từng mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế phải được cập nhật đầy đủ, chính xác vào các ứng dụng hỗ trợ quản lý thuế hoặc Phân hệ quản lý tuân thủ và rủi ro thuế của cơ quan thuế đối với từng trường hợp cụ thể, làm cơ sở cho việc hoàn thiện cơ chế và đánh giá, phân loại mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế trong các kỳ tiếp theo."},{"k":"p","t":"9. Công chức thuế không phải chịu trách nhiệm cá nhân đối với các hành vi đã thực hiện đúng quy định tại Thông tư này và các hướng dẫn về quản lý tuân thủ, quản lý rủi ro khi thi hành nhiệm vụ."}]},{"id":"tt94_5","no":5,"code":"Điều 5","title":"Điều 5. Phương pháp đánh giá","shortTitle":"Phương pháp đánh giá","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế được xác định theo một hoặc kết hợp các phương pháp dưới đây:"},{"k":"p","t":"1. Phương pháp chấm điểm và phân loại theo điểm."},{"k":"p","t":"2. Phương pháp học máy."},{"k":"p","t":"3. Phương pháp xếp hạng theo danh mục."}]},{"id":"tt94_6","no":6,"code":"Điều 6","title":"Điều 6. Thu thập, xử lý thông tin quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","shortTitle":"Thu thập, xử lý thông tin quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tin quản lý tuân thủ, quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"Thông tin phục vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế bao gồm:"},{"k":"p","t":"a) Thông tin bên trong cơ quan thuế:"},{"k":"p","t":"a.1) Thông tin về đăng ký thuế; chủ sở hữu của người nộp thuế; đăng ký và sử dụng lao động; thông tin về trạng thái người nộp thuế; số lần thay đổi các thông tin đăng ký kinh doanh, đăng ký thuế; tình hình góp vốn của các thành viên; quan hệ góp vốn; quan hệ liên kết; ngành nghề kinh doanh chính;"},{"k":"p","t":"a.2) Thông tin về các hồ sơ khai thuế; nộp thuế; nợ thuế; ưu đãi, miễn, giảm thuế; gia hạn nộp thuế; nộp dần tiền thuế; hoàn thuế; đăng ký, quản lý, sử dụng hóa đơn, chứng từ; thông tin khiếu nại, tố cáo; thông tin về kết quả thanh tra, kiểm tra, kiểm toán, điều tra và xử lý sau thanh tra, kiểm tra, kiểm toán, điều tra; thông tin về giao dịch liên kết;"},{"k":"p","t":"a.3) Các thông tin khác."},{"k":"p","t":"b) Thông tin thu thập từ cơ quan nhà nước, tổ chức, cá nhân liên quan có trách nhiệm cung cấp:"},{"k":"p","t":"b.1) Thông tin về người nộp thuế thu thập từ cơ quan nhà nước, tổ chức, cá nhân liên quan theo quy định tại Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"b.2) Thông tin từ nước ngoài, tổ chức quốc tế cung cấp theo nghĩa vụ tại các điều ước quốc tế có liên quan đến thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"c) Thông tin khác có liên quan đến người nộp thuế."},{"k":"p","t":"2. Thu thập, xử lý thông tin quản lý tuân thủ, quản lý rủi ro."},{"k":"p","t":"a) Nguồn thu thập thông tin:"},{"k":"p","t":"a.1) Từ hệ thống thông tin bên trong cơ quan thuế;"},{"k":"p","t":"a.2) Từ phối hợp trao đổi thông tin với các cơ quan, đơn vị thuộc Bộ Tài chính và các cơ quan, đơn vị thuộc các Bộ, ngành, cơ quan liên quan;"},{"k":"p","t":"a.3) Từ phối hợp trao đổi thông tin với cơ quan thuế, cơ quan có thẩm quyền ở nước ngoài theo quy định của pháp luật;"},{"k":"p","t":"a.4) Tiếp nhận thông tin của các cơ quan nhà nước, tổ chức, cá nhân cung cấp theo quy định của pháp luật;"},{"k":"p","t":"a.5) Thông tin liên quan đến hoạt động của người nộp thuế thu thập được trong quá trình quản lý thuế;"},{"k":"p","t":"a.6) Thông tin từ kết quả khảo sát, đánh giá, điều tra dư luận xã hội của các tổ chức chính trị, tổ chức chính trị - xã hội hoặc các tổ chức có uy tín trong nước và quốc tế;"},{"k":"p","t":"a.7) Mua thông tin theo quy định tại Luật Quản lý thuế số 108/2025/QH15 và các văn bản hướng dẫn thi hành;"},{"k":"p","t":"a.8) Tiếp nhận thông tin liên quan đến thuế từ nước ngoài, tổ chức quốc tế cung cấp theo nghĩa vụ tại các điều ước quốc tế mà Việt Nam là thành viên;"},{"k":"p","t":"a.9) Từ các nguồn thông tin có liên quan khác theo quy định của pháp luật."},{"k":"p","t":"b) Hình thức thu thập thông tin:"},{"k":"p","t":"b.1) Cung cấp, trao đổi dưới dạng dữ liệu điện tử, chứng từ điện tử, thư điện tử (e-mail), trao đổi qua cổng thông tin điện tử Cục Thuế, cổng dịch vụ công quốc gia; tin nhắn và cuộc gọi đến số điện thoại được cơ quan thuế công bố chính thức;"},{"k":"p","t":"b.2) Cung cấp, trao đổi bằng văn bản, điện tín, điện báo, fax, tài liệu giấy;"},{"k":"p","t":"b.3) Trao đổi trực tiếp trên cơ sở biên bản ghi nhận, có xác nhận của các bên liên quan; cử đại diện làm việc, xác minh, thu thập thông tin, tài liệu; tổ chức hội nghị và các hình thức khác."},{"k":"p","t":"c) Xử lý thông tin thu thập:"},{"k":"p","t":"c.1) Đánh giá mức độ liên quan của thông tin với nhu cầu, mục đích sử dụng thông tin; xem xét độ tin cậy, tính chính xác của thông tin;"},{"k":"p","t":"c.2) Phân loại, sắp xếp, lưu trữ thông tin từ các nguồn theo từng nhóm thông tin phục vụ khai thác, phân tích thông tin;"},{"k":"p","t":"c.3) Phân tích thông tin, xem xét, phát hiện các yếu tố cấu thành nội dung thông tin phục vụ quản lý tuân thủ, quản lý rủi ro;"},{"k":"p","t":"c.4) Tổng hợp, liên kết các yếu tố có liên quan được phát hiện qua phân tích để làm rõ nội dung, giá trị của thông tin được thu thập phục vụ phân tích, đánh giá và phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế."}]},{"id":"tt94_7","no":7,"code":"Điều 7","title":"Điều 7. Vận hành Phân hệ quản lý tuân thủ và rủi ro thuế","shortTitle":"Vận hành Phân hệ quản lý tuân thủ và rủi ro thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Phân hệ quản lý tuân thủ và rủi ro thuế được quản lý, vận hành tập trung trong Hệ thống quản trị thuế của ngành Thuế; Cục Thuế là đầu mối chủ trì tổ chức vận hành, phân quyền khai thác, sử dụng cho cơ quan thuế các cấp theo chức năng, nhiệm vụ, thẩm quyền."},{"k":"p","t":"Phân hệ quản lý tuân thủ và rủi ro thuế được kết nối, tích hợp và chia sẻ dữ liệu với các lớp chức năng, phân hệ, cơ sở dữ liệu và ứng dụng nghiệp vụ khác của ngành Thuế theo kiến trúc, tiêu chuẩn kỹ thuật, quy chế quản lý, vận hành và quy định của pháp luật."},{"k":"p","t":"2. Phân hệ quản lý tuân thủ và rủi ro thuế hoạt động trên nền tảng dữ liệu số ngành Thuế, hồ sơ điện tử của người nộp thuế, hồ sơ/vụ việc tuân thủ, sổ đăng ký rủi ro, bộ tiêu chí, chỉ số, quy tắc nghiệp vụ, mô hình phân tích và các nguồn dữ liệu hợp pháp có liên quan."},{"k":"p","t":"Việc tiếp nhận, cập nhật, xử lý và khai thác dữ liệu trên Phân hệ quản lý tuân thủ và rủi ro thuế được thực hiện theo thời gian thực, gần thời gian thực hoặc theo kỳ/cơ chế kết nối phù hợp với tính chất từng nguồn dữ liệu, điều kiện kỹ thuật, yêu cầu quản lý thuế và quy định của pháp luật."},{"k":"p","t":"3. Phân hệ quản lý tuân thủ và rủi ro thuế thực hiện tự động hoặc bán tự động các chức năng phục vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế, bao gồm:"},{"k":"p","t":"a) Tiếp nhận, thu thập, kiểm tra, chuẩn hóa, đối soát, hợp nhất, lưu trữ và khai thác thông tin, dữ liệu phục vụ quản lý tuân thủ, quản lý rủi ro;"},{"k":"p","t":"b) Ghi nhận, cập nhật và theo dõi các sự kiện phát sinh trong quá trình quản lý thuế có liên quan đến mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế;"},{"k":"p","t":"c) Tạo lập, cập nhật, quản lý và theo dõi vòng đời hồ sơ điện tử, hồ sơ/vụ việc tuân thủ, hồ sơ rủi ro của người nộp thuế;"},{"k":"p","t":"d) Nhận diện, phân tích, đánh giá, chấm điểm, phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế theo tiêu chí, chỉ số, phương pháp và quy tắc nghiệp vụ được cấp có thẩm quyền ban hành;"},{"k":"p","t":"đ) Phát hiện, cảnh báo dấu hiệu rủi ro, dấu hiệu vi phạm pháp luật thuế; phân tích xu hướng, hành vi, mối quan hệ, mạng lưới và mô hình rủi ro tiềm ẩn;"},{"k":"p","t":"e) Đề xuất chiến lược xử lý, biện pháp nghiệp vụ quản lý thuế, kế hoạch can thiệp, giám sát hoặc kiểm tra phù hợp với mức độ tuân thủ pháp luật thuế, mức độ rủi ro và đặc điểm của từng nhóm, từng người nộp thuế;"},{"k":"p","t":"g) Theo dõi, giám sát, truy vết, tổng hợp, đánh giá và phản hồi kết quả áp dụng các biện pháp quản lý thuế để phục vụ cập nhật tiêu chí, chỉ số, mô hình phân tích và nâng cao hiệu quả quản lý tuân thủ, quản lý rủi ro trong các kỳ tiếp theo."},{"k":"p","t":"4. Phân hệ quản lý tuân thủ và rủi ro thuế được ứng dụng công nghệ phân tích dữ liệu, dữ liệu lớn, học máy, trí tuệ nhân tạo và các công nghệ phù hợp khác để hỗ trợ xử lý, phân tích, cảnh báo, dự báo và đề xuất biện pháp nghiệp vụ."},{"k":"p","t":"Kết quả phân tích, cảnh báo, dự báo, chấm điểm, phân loại hoặc đề xuất của Phân hệ quản lý tuân thủ và rủi ro thuế là căn cứ hỗ trợ cơ quan thuế, công chức thuế có thẩm quyền trong quá trình xem xét, lựa chọn, quyết định và tổ chức thực hiện biện pháp quản lý thuế theo quy định của pháp luật; không thay thế trách nhiệm của cơ quan thuế, công chức thuế có thẩm quyền trong việc ban hành quyết định hành chính thuế hoặc thực hiện biện pháp nghiệp vụ quản lý thuế."},{"k":"p","t":"Việc ứng dụng học máy, trí tuệ nhân tạo và các mô hình phân tích trên Phân hệ quản lý tuân thủ và rủi ro thuế phải bảo đảm nguyên tắc khách quan, minh bạch, có khả năng kiểm soát, truy vết, giải trình; được kiểm thử, đánh giá, giám sát, cập nhật phù hợp với yêu cầu quản lý và quy định của pháp luật."},{"k":"p","t":"5. Kết quả xử lý, phân tích, đánh giá, phân loại và cảnh báo của Phân hệ quản lý tuân thủ và rủi ro thuế được khai thác, sử dụng như sau:"},{"k":"p","t":"a) Đối với người nộp thuế: hỗ trợ cung cấp dịch vụ thuế điện tử, cảnh báo sớm rủi ro, khuyến nghị tuân thủ, hỗ trợ rà soát, khắc phục sai sót và nâng cao mức độ tự nguyện tuân thủ pháp luật thuế;"},{"k":"p","t":"b) Đối với cơ quan thuế, công chức thuế: cung cấp thông tin, dữ liệu, hồ sơ, cảnh báo, kết quả phân tích, kết quả phân loại và đề xuất biện pháp nghiệp vụ phục vụ quản lý tuân thủ, quản lý rủi ro, lập kế hoạch kiểm tra, giám sát trọng điểm, quản lý nợ thuế, quản lý hóa đơn, chứng từ, hoàn thuế và các hoạt động nghiệp vụ quản lý thuế khác theo quy định của pháp luật;"},{"k":"p","t":"c) Đối với cơ quan nhà nước, tổ chức, cá nhân có liên quan: việc cung cấp, trao đổi, chia sẻ thông tin, dữ liệu, cảnh báo rủi ro hoặc dấu hiệu vi phạm pháp luật thuế được thực hiện theo phân cấp, thẩm quyền, mục đích sử dụng, yêu cầu bảo mật và quy định của pháp luật có liên quan."},{"k":"p","t":"6. Cục Thuế có trách nhiệm ban hành quy chế, quy trình, tiêu chuẩn, hướng dẫn về quản lý, vận hành, khai thác Phân hệ quản lý tuân thủ và rủi ro thuế; quản lý dữ liệu, hồ sơ điện tử, hồ sơ, vụ việc tuân thủ, sổ đăng ký rủi ro, bộ tiêu chí, chỉ số, quy tắc nghiệp vụ, mô hình phân tích; phân quyền truy cập, khai thác, sử dụng và cập nhật thông tin trên Phân hệ quản lý tuân thủ và rủi ro thuế."},{"k":"p","t":"Việc quản lý, vận hành, khai thác Phân hệ quản lý tuân thủ và rủi ro thuế phải bảo đảm an toàn hệ thống thông tin, an ninh mạng, bảo mật thông tin người nộp thuế, bảo vệ dữ liệu cá nhân, quản lý nhật ký truy cập, truy vết xử lý, lưu trữ hồ sơ, phân định trách nhiệm và tuân thủ quy định của pháp luật có liên quan."},{"k":"p","t":"Trường hợp Phân hệ quản lý tuân thủ và rủi ro thuế gặp sự cố, chưa đáp ứng yêu cầu nghiệp vụ hoặc chưa tích hợp được với nguồn dữ liệu cần thiết, Cục Thuế tổ chức thực hiện các biện pháp xử lý tạm thời, bao gồm sử dụng biểu mẫu/hồ sơ tạm thời, ghi nhận đầy đủ căn cứ, nội dung, thời điểm và người xử lý; việc quyết định áp dụng biện pháp xử lý tạm thời do người có thẩm quyền phê duyệt; sau khi Phân hệ quản lý tuân thủ và rủi ro thuế hoạt động trở lại, các thông tin, dữ liệu và kết quả xử lý tạm thời phải được cập nhật, đối soát, đồng bộ đầy đủ vào Phân hệ quản lý tuân thủ và rủi ro thuế theo quy định."}]},{"id":"tt94_8","no":8,"code":"Điều 8","title":"Điều 8. Áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","shortTitle":"Áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế căn cứ vào kết quả đánh giá, phân loại mức độ tuân thủ pháp luật thuế tại Điều 10, kết quả đánh giá, phân loại mức độ rủi ro của người nộp thuế tại Điều 13 Thông tư này và các thông tin nghiệp vụ tại thời điểm ra quyết định để áp dụng các biện pháp quản lý trong thực hiện:"},{"k":"p","t":"a) Quản lý tuân thủ trong quản lý thuế;"},{"k":"p","t":"b) Quản lý rủi ro về đăng ký thuế;"},{"k":"p","t":"c) Quản lý rủi ro trong kiểm tra hồ sơ khai thuế, khoản thu khác tại trụ sở của cơ quan thuế;"},{"k":"p","t":"d) Quản lý rủi ro trong quản lý hoàn thuế, khoản thu khác;"},{"k":"p","t":"đ) Quản lý rủi ro trong kiểm tra tại trụ sở của người nộp thuế;"},{"k":"p","t":"e) Quản lý rủi ro trong quản lý nợ thuế, khoản thu khác và cưỡng chế thi hành quyết định hành chính thuế;"},{"k":"p","t":"g) Quản lý rủi ro trong quản lý miễn, giảm thuế;"},{"k":"p","t":"h) Quản lý rủi ro trong quản lý hóa đơn, chứng từ;"},{"k":"p","t":"i) Quản lý rủi ro đối với người nộp thuế thuộc trường hợp kiểm soát, giám sát trọng điểm;"},{"k":"p","t":"k) Áp dụng quản lý rủi ro trong các hoạt động nghiệp vụ khác trong quản lý thuế."},{"k":"p","t":"2. Cục Thuế hướng dẫn chi tiết việc đánh giá, phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế đáp ứng yêu cầu quản lý thuế trong từng thời kỳ."},{"k":"p","t":"3. Kết quả đánh giá, phân loại mức độ tuân thủ, mức độ rủi ro của người nộp thuế được cập nhật trên Phân hệ quản lý tuân thủ và rủi ro thuế. Cơ quan thuế các cấp có trách nhiệm tổng hợp, cập nhật, quản lý thông tin, hồ sơ tuân thủ người nộp thuế, sổ đăng ký rủi ro để phục vụ cho công tác quản lý thuế trong toàn ngành thuế."},{"k":"p","t":"4. Nếu có thông tin nghi ngờ hoặc phát hiện có dấu hiệu vi phạm pháp luật thuế qua công tác thanh tra, kiểm tra, kiểm toán, qua đơn thư tố cáo, qua thông tin từ các cơ quan nhà nước, cơ quan điều tra, thủ trưởng cơ quan thuế quyết định thay đổi hình thức, mức độ kiểm tra, thay đổi biện pháp quản lý thuế khác theo thẩm quyền và chịu trách nhiệm về quyết định của mình."}]},{"id":"tt94_9","no":9,"code":"Điều 9","title":"Điều 9. Kiểm soát, giám sát trọng điểm đối với người nộp thuế có dấu hiệu vi phạm pháp luật thuế","shortTitle":"Kiểm soát, giám sát trọng điểm đối với người nộp thuế có dấu hiệu vi phạm pháp luật thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thuộc trường hợp giám sát trọng điểm về thuế là người nộp thuế có một trong các dấu hiệu sau:"},{"k":"p","t":"a) Người nộp thuế thực hiện các giao dịch qua ngân hàng có dấu hiệu đáng ngờ theo quy định của pháp luật về phòng, chống rửa tiền có liên quan đến trốn thuế, gian lận thuế."},{"k":"p","t":"b) Người nộp thuế hoặc người đại diện hợp pháp của người nộp thuế bị khởi tố về các hành vi vi phạm về thuế, hóa đơn, chứng từ."},{"k":"p","t":"c) Người nộp thuế có dấu hiệu rủi ro cao về thuế thuộc chuyên đề trọng điểm hoặc qua thu thập thông tin từ công tác quản lý của cơ quan thuế cần giám sát quản lý thuế."},{"k":"p","t":"d) Người nộp thuế thuộc mức không tuân thủ pháp luật thuế theo quy định tại Điều 10 Thông tư này; người nộp thuế không giải trình, bổ sung thông tin hoặc có giải trình, bổ sung thông tin nhưng không đầy đủ theo yêu cầu và thời hạn tại thông báo bằng văn bản của cơ quan thuế."},{"k":"p","t":"2. Cơ quan thuế các cấp có trách nhiệm theo dõi, giám sát, áp dụng các biện pháp nghiệp vụ quản lý thuế phù hợp với từng trường hợp tại khoản 1 Điều này."},{"k":"p","t":"3. Cục Thuế hướng dẫn cụ thể việc thu thập, phân tích thông tin, xác định trọng điểm giám sát, biện pháp giám sát, thời hạn giám sát phù hợp với quy định của pháp luật trong từng thời kỳ."}]},{"id":"tt94_10","no":10,"code":"Điều 10","title":"Điều 10. Phân loại mức độ tuân thủ pháp luật thuế của người nộp thuế","shortTitle":"Phân loại mức độ tuân thủ pháp luật thuế của người nộp thuế","chuong":"Chương II — QUẢN LÝ TUÂN THỦ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế được đánh giá, phân loại theo một trong các mức độ tuân thủ pháp luật thuế sau đây:"},{"k":"p","t":"a) Mức 1: Tuân thủ tốt."},{"k":"p","t":"b) Mức 2: Tuân thủ trung bình."},{"k":"p","t":"c) Mức 3: Tuân thủ thấp."},{"k":"p","t":"d) Mức 4: Không tuân thủ."},{"k":"p","t":"2. Mức độ tuân thủ pháp luật thuế của người nộp thuế được phân loại dựa trên các tiêu chí quy định tại Phụ lục I kèm theo Thông tư này."},{"k":"p","t":"3. Kết quả đánh giá, phân loại mức độ tuân thủ pháp luật thuế của người nộp thuế được cơ quan thuế theo dõi, xử lý như sau:"},{"k":"p","t":"a) Đối với người nộp thuế thuộc mức không tuân thủ, cơ quan thuế thực hiện các biện pháp quản lý theo quy định tại Điều 9 và áp dụng các biện pháp nâng cao tuân thủ theo quy định tại Điều 11 Thông tư này;"},{"k":"p","t":"b) Đối với người nộp thuế thuộc các mức tuân thủ tốt, trung bình, thấp, cơ quan thuế áp dụng biện pháp nâng cao tuân thủ theo quy định tại Điều 11 Thông tư này."}]},{"id":"tt94_11","no":11,"code":"Điều 11","title":"Điều 11. Các biện pháp nâng cao tuân thủ pháp luật thuế của người nộp thuế","shortTitle":"Các biện pháp nâng cao tuân thủ pháp luật thuế của người nộp thuế","chuong":"Chương II — QUẢN LÝ TUÂN THỦ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Căn cứ kết quả phân loại mức độ tuân thủ pháp luật thuế của người nộp thuế được quy định tại Điều 10 Thông tư này, cơ quan thuế thực hiện phân tích bản chất hành vi, quy mô của mỗi mức độ tuân thủ pháp luật thuế của người nộp thuế, xây dựng kế hoạch nâng cao tuân thủ pháp luật thuế với các biện pháp xử lý phù hợp với mỗi vấn đề tuân thủ như sau:"},{"k":"p","t":"1. Đối với trường hợp tuân thủ tốt"},{"k":"p","t":"a) Được đưa vào danh sách để xem xét, lựa chọn tuyên dương, khen thưởng theo quy định đối với người nộp thuế chấp hành tốt pháp luật thuế."},{"k":"p","t":"b) Được áp dụng chế độ ưu tiên trong quản lý thuế khi khi đáp ứng đầy đủ các điều kiện theo quy định tại Điều 48 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"2. Đối với các trường hợp cần nâng cao tuân thủ:"},{"k":"p","t":"a) Phối hợp với các cơ quan nhà nước, tổ chức liên quan, các đại lý thuế để triển khai các biện pháp nâng cao tuân thủ, các biện pháp hỗ trợ, hướng dẫn người nộp thuế thực hiện các thủ tục về thuế; tổ chức các chương trình tiếp xúc với người nộp thuế, hội nghị đối thoại, hội thảo giúp người nộp thuế thực hiện đúng, đủ nghĩa vụ thuế;"},{"k":"p","t":"b) Nghiên cứu đề xuất, sửa đổi bổ sung chính sách, đơn giản hóa các thủ tục hành chính, triển khai các biện pháp hỗ trợ, đẩy mạnh ứng dụng công nghệ thông tin, tạo điều kiện thuận lợi cho người nộp thuế trong việc kê khai, nộp thuế tiết kiệm thời gian và chi phí tuân thủ cho người nộp thuế;"},{"k":"p","t":"c) Thực hiện phân loại rủi ro và áp dụng các biện pháp quản lý thuế tương ứng với các mức rủi ro người nộp thuế quy định tại các Điều 13, 14, 15, 16, 17, 18, 19 và 20 Thông tư này."}]},{"id":"tt94_12","no":12,"code":"Điều 12","title":"Điều 12. Giám sát, đánh giá việc thực hiện kế hoạch nâng cao tuân thủ","shortTitle":"Giám sát, đánh giá việc thực hiện kế hoạch nâng cao tuân thủ","chuong":"Chương II — QUẢN LÝ TUÂN THỦ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung giám sát, đánh giá:"},{"k":"p","t":"a) Việc tổ chức triển khai thực hiện kế hoạch nâng cao tuân thủ pháp luật thuế;"},{"k":"p","t":"b) Kết quả và hiệu quả thực hiện kế hoạch nâng cao tuân thủ;"},{"k":"p","t":"b.1) Hiệu lực, hiệu quả áp dụng các biện pháp xử lý mà cơ quan thuế các cấp triển khai trên cơ sở phân tích, xác định rủi ro theo từng phân nhóm người nộp thuế;"},{"k":"p","t":"b.2) So sánh, đánh giá kết quả thực tế đạt được với kết quả mong đợi trong việc thực hiện các biện pháp giảm thiểu rủi ro thông qua việc đo lường tuân thủ."},{"k":"p","t":"c) Việc áp dụng quy trình minh bạch trong việc xây dựng và thực hiện kế hoạch nâng cao tuân thủ;"},{"k":"p","t":"d) Việc cải thiện mức độ tuân thủ tổng thể của các nhóm người nộp thuế và từng loại nghĩa vụ thuế khác nhau;"},{"k":"p","t":"đ) Về bộ máy tổ chức và nguồn nhân lực của cơ quan thuế các cấp trong việc triển khai thực hiện kế hoạch đảm bảo hiệu lực, hiệu quả quản lý thuế theo các mục tiêu đề ra."},{"k":"p","t":"2. Biện pháp giám sát, đánh giá"},{"k":"p","t":"a) Tổng hợp, theo dõi và phân tích thông tin, số liệu báo cáo của cơ quan thuế các cấp, các Ban, Chi cục Thuế thuộc Cục Thuế trong quá trình tổ chức thực hiện kế hoạch nâng cao tuân thủ;"},{"k":"p","t":"b) Thu thập, tổng hợp kết quả thực hiện; phân tích tác động của các biện pháp đã triển khai và đề xuất điều chỉnh, bổ sung biện pháp nhằm nâng cao hiệu quả thực hiện kế hoạch; thực hiện rà soát, cập nhật Sổ đăng ký rủi ro, loại bỏ các rủi ro không còn phù hợp."},{"k":"p","t":"c) Tổ chức các đoàn công tác để kiểm tra, đánh giá việc triển khai thực hiện kế hoạch tại cơ quan thuế các cấp."},{"k":"p","t":"3. Trách nhiệm các đơn vị"},{"k":"p","t":"Cục trưởng Cục Thuế phân công cho các đơn vị được giao thực hiện nhiệm vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế giám sát, đánh giá thực hiện kế hoạch nâng cao tuân thủ và báo cáo cho cơ quan cấp trên theo quy định tại khoản 2 Điều này. Việc giám sát, đánh giá được thực hiện thường xuyên, báo cáo giữa kỳ (tháng 6 hàng năm) và cuối kỳ (tháng 12 hàng năm) và báo cáo đột xuất theo yêu cầu về tiến độ triển khai kế hoạch nâng cao tuân thủ."}]},{"id":"tt94_13","no":13,"code":"Điều 13","title":"Điều 13. Phân loại mức độ rủi ro của người nộp thuế","shortTitle":"Phân loại mức độ rủi ro của người nộp thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Mức độ rủi ro đối với người nộp thuế trong các nghiệp vụ quản lý thuế được phân loại theo một trong các mức sau:"},{"k":"p","t":"a) Rủi ro cao."},{"k":"p","t":"b) Rủi ro trung bình."},{"k":"p","t":"c) Rủi ro thấp."},{"k":"p","t":"2. Mức độ rủi ro của người nộp thuế trong từng nghiệp vụ quản lý thuế được phân loại dựa trên cơ sở các chỉ số tiêu chí đánh giá rủi ro phù hợp với đặc thù của từng nghiệp vụ quản lý thuế, được lựa chọn từ hệ thống tiêu chí quy định tại Phụ lục II, III kèm theo Thông tư này và kết hợp với kết quả đánh giá tuân thủ pháp luật thuế tại Điều 10 Thông tư này."},{"k":"p","t":"3. Xử lý kết quả phân loại mức độ rủi ro"},{"k":"p","t":"Kết quả phân loại mức độ rủi ro của người nộp thuế được áp dụng các biện pháp quản lý thuế trong từng nghiệp vụ quản lý thuế quy định tại Điều 14, 15, 16, 17, 18, 19 và 20 Thông tư này."}]},{"id":"tt94_14","no":14,"code":"Điều 14","title":"Điều 14. Áp dụng quản lý rủi ro trong quản lý về đăng ký thuế","shortTitle":"Áp dụng quản lý rủi ro trong quản lý về đăng ký thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Căn cứ danh sách người nộp thuế phân loại theo các mức độ rủi ro trong quản lý về đăng ký thuế tại Điều 13 Thông tư này, cơ quan thuế áp dụng các biện pháp quản lý thuế phù hợp trong giải quyết, xử lý hoặc phối hợp với cơ quan đăng ký kinh doanh giải quyết, xử lý theo quy định của pháp luật đăng ký kinh doanh, đăng ký thuế."},{"k":"p","t":"1. Thay đổi thông tin đăng ký thuế làm thay đổi cơ quan thuế quản lý trực tiếp"},{"k":"p","t":"a) Rủi ro cao: Cơ quan thuế nơi chuyển đi thực hiện kiểm tra tại trụ sở của người nộp thuế theo quy định;"},{"k":"p","t":"b) Rủi ro trung bình: Cơ quan thuế nơi chuyển đến thực hiện đưa vào giám sát, đề nghị người nộp thuế giải trình bổ sung thông tin tài liệu khi có yêu cầu của cơ quan thuế;"},{"k":"p","t":"c) Rủi ro thấp: Chưa thực hiện việc kiểm tra, giám sát; thực hiện đánh giá, phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế cho kỳ đánh giá tiếp theo."},{"k":"p","t":"2. Trường hợp người nộp thuế thông báo tạm ngừng hoạt động, kinh doanh"},{"k":"p","t":"a) Rủi ro cao: Tăng cường thực hiện các biện pháp quản lý thuế theo quy định, phù hợp với tình hình thực hiện nghĩa vụ thuế của người nộp thuế để xử lý kịp thời nợ thuế, hóa đơn, hành vi vi phạm (nếu có);"},{"k":"p","t":"b) Rủi ro trung bình, rủi ro thấp: Thực hiện các biện pháp quản lý thuế theo quy định; thực hiện đánh giá, phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro của người nộp thuế cho kỳ đánh giá tiếp theo."},{"k":"p","t":"3. Trường hợp chấm dứt hiệu lực mã số thuế"},{"k":"p","t":"a) Rủi ro cao: Thực hiện kiểm tra thuế tại trụ sở của người nộp thuế theo quy định."},{"k":"p","t":"b) Rủi ro trung bình, rủi ro thấp: Áp dụng các biện pháp đôn đốc người nộp thuế hoàn thành nghĩa vụ thuế trước khi giải thể, phá sản, ngừng hoạt động theo quy định."},{"k":"p","t":"4. Khôi phục mã số thuế"},{"k":"p","t":"a) Rủi ro cao: Thực hiện rà soát, kiểm tra theo quy định trước khi thực hiện khôi phục mã số thuế cho người nộp thuế."},{"k":"p","t":"b) Rủi ro trung bình, rủi ro thấp: Khôi phục mã số thuế cho người nộp thuế theo quy định."},{"k":"p","t":"5. Đối với trường hợp còn lại: Thường xuyên rà soát các trường hợp có dấu hiệu rủi ro cao để xác định danh sách cần rà soát, xác minh tình trạng hoạt động tại trụ sở của người nộp thuế."}]},{"id":"tt94_15","no":15,"code":"Điều 15","title":"Điều 15. Áp dụng quản lý rủi ro trong kiểm tra hồ sơ khai thuế, khoản thu khác tại trụ sở của cơ quan thuế","shortTitle":"Áp dụng quản lý rủi ro trong kiểm tra hồ sơ khai thuế, khoản thu khác tại trụ sở của cơ quan thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Căn cứ danh sách người nộp thuế phân loại theo các mức độ rủi ro trong kiểm tra hồ sơ khai thuế, khoản thu khác tại trụ sở của cơ quan thuế tại Điều 13 Thông tư này để áp dụng biện pháp phù hợp trong giải quyết, xử lý hồ sơ khai thuế, khoản thu khác."},{"k":"p","t":"1. Rủi ro cao: Thực hiện phân tích hồ sơ, lập danh sách trình thủ trưởng cơ quan thuế kế hoạch kiểm tra tại trụ sở của cơ quan thuế, thực hiện kiểm tra hồ sơ khai thuế, khoản thu khác tại trụ sở của cơ quan thuế theo quy định."},{"k":"p","t":"2. Rủi ro trung bình và rủi ro thấp: Chưa thực hiện kiểm tra hồ sơ khai thuế, khoản thu khác tại trụ sở của cơ quan thuế; thực hiện đánh giá, phân loại mức độ tuân thủ pháp luật thuế, mức độ rủi ro hồ sơ khai thuế, khoản thu khác của người nộp thuế cho kỳ đánh giá tiếp theo."}]},{"id":"tt94_16","no":16,"code":"Điều 16","title":"Điều 16. Áp dụng quản lý rủi ro trong hoàn thuế, khoản thu khác","shortTitle":"Áp dụng quản lý rủi ro trong hoàn thuế, khoản thu khác","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan thuế phân loại người nộp thuế có hồ sơ hoàn thuế theo quy định tại Luật Quản lý thuế số 108/2025/QH15, văn bản hướng dẫn thi hành Luật và các văn bản pháp luật khác có liên quan. Đối với phân loại rủi ro người nộp thuế có hồ sơ hoàn thuế, căn cứ kết quả phân loại tại Điều 13 Thông tư này và các thông tin nghiệp vụ tại thời điểm ban hành Quyết định hoàn thuế, cơ quan thuế áp dụng các biện pháp phù hợp trong giải quyết, xử lý hồ sơ hoàn thuế như sau:"},{"k":"p","t":"1. Đối với người nộp thuế có hồ sơ hoàn thuế giá trị gia tăng."},{"k":"p","t":"a) Rủi ro cao:"},{"k":"p","t":"a.1) Thực hiện kiểm tra trước, hoàn thuế sau (trừ trường hợp quy định tại điểm a.2 Khoản này)."},{"k":"p","t":"a.2) Trường hợp người nộp thuế có hồ sơ đề nghị hoàn được phân loại rủi ro cao bởi cùng một (01) hoặc các dấu hiệu rủi ro tại nhóm tiêu chí không chấm điểm so với hồ sơ hoàn thuế liền kề trước đó, hồ sơ hoàn thuế của người nộp thuế thuộc diện hoàn thuế trước, kiểm tra sau trong trường hợp kết quả kỳ kiểm tra hồ sơ hoàn thuế liền kề trước đó không phát hiện hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được hoàn và không thuộc diện rủi ro cao thuộc nhóm tiêu chí chấm điểm khác."},{"k":"p","t":"b) Rủi ro trung bình và rủi ro thấp:"},{"k":"p","t":"b.1) Thực hiện hoàn thuế trước, kiểm tra sau: Đối với số thuế đề nghị hoàn chưa phát hiện được rủi ro."},{"k":"p","t":"Trên cơ sở các quy định pháp luật thuế, hồ sơ hoàn thuế của người nộp thuế và thông tin do cơ quan thuế quản lý tại Cơ sở dữ liệu, Phân hệ quản lý tuân thủ và rủi ro thuế xác định và đưa ra số thuế chưa phát hiện được rủi ro theo quy định."},{"k":"p","t":"b.2) Đối với số tiền thuế đề nghị hoàn có dấu hiệu rủi ro, cơ quan thuế tạm dừng hoàn thuế để tiến hành thu thập thông tin, rà soát, kiểm tra theo quy định."},{"k":"p","t":"Trong thời hạn 02 năm kể từ ngày ban hành quyết định hoàn thuế, cơ quan thuế thực hiện thu thập thông tin, rà soát kiểm tra số thuế tạm dừng hoàn của người nộp thuế và xử lý số thuế tạm dừng hoàn sau rà soát, kiểm tra theo quy định."},{"k":"p","t":"Căn cứ nội dung, phạm vi theo đề nghị của cơ quan thuế giải quyết hoàn thuế, cơ quan thuế quản lý người nộp thuế phát hành hóa đơn có trách nhiệm phối hợp thực hiện trao đổi thông tin hoặc kiểm tra tại trụ sở cơ quan thuế hoặc kiểm tra tại trụ sở người nộp thuế theo quy định bảo đảm việc trao đổi thông tin kịp thời, đầy đủ và đúng quy định của pháp luật."},{"k":"p","t":"b.3) Cục Thuế hướng dẫn cụ thể về: số thuế không rủi ro, số thuế có rủi ro; việc rà soát, kiểm tra số thuế tạm dừng hoàn và việc xử lý số thuế tạm dừng hoàn sau khi rà soát, kiểm tra."},{"k":"p","t":"2. Đối với người nộp thuế có hồ sơ hoàn thuế khác, khoản thu khác (sau đây gọi là hồ sơ hoàn thuế khác)."},{"k":"p","t":"a) Rủi ro cao: thực hiện kiểm tra trước, hoàn thuế sau."},{"k":"p","t":"b) Rủi ro trung bình, rủi ro thấp: thực hiện hoàn thuế trước, kiểm tra sau."},{"k":"p","t":"3. Trường hợp thay đổi hình thức phân loại hồ sơ hoàn thuế"},{"k":"p","t":"Sau khi ứng dụng phân loại hồ sơ hoàn thuế, trong quá trình giải quyết hồ sơ hoàn thuế, cơ quan thuế xử lý hồ sơ hoàn thuế có thông tin được thu thập và rà soát, kiểm tra xác định được hồ sơ của người nộp thuế có dấu hiệu rủi ro cao thì cơ quan thuế thay đổi hình thức phân loại hồ sơ hoàn thuế của người nộp thuế đang thuộc diện hoàn thuế trước, kiểm tra sau sang diện hồ sơ kiểm tra trước hoàn thuế sau. Việc phê duyệt thay đổi hình thức phân loại phải được cập nhật vào hệ thống thông tin nghiệp vụ."},{"k":"p","t":"4. Kiểm tra sau hoàn thuế"},{"k":"p","t":"a) Trong thời hạn 05 năm kể từ ngày ban hành quyết định hoàn thuế, cơ quan thuế thực hiện kiểm tra sau hoàn thuế trên cơ sở kết quả phân loại mức độ rủi ro từ cao xuống thấp, cụ thể:"},{"k":"p","t":"- Đối với người nộp thuế có hồ sơ hoàn thuế rủi ro cao nhưng không thuộc diện kiểm tra trước hoàn thuế sau quy định tại tiết a.2 điểm a khoản 1 Điều này: Trong thời hạn 01 năm kể từ ngày ban hành quyết định hoàn thuế, cơ quan thuế thực hiện kiểm tra sau hoàn thuế;"},{"k":"p","t":"- Đối với người nộp thuế có hồ sơ hoàn thuế rủi ro trung bình: Trong thời hạn 03 năm kể từ ngày ban hành quyết định hoàn thuế, cơ quan thuế thực hiện kiểm tra sau hoàn thuế;"},{"k":"p","t":"- Đối với người nộp thuế có hồ sơ hoàn thuế rủi ro thấp: Trong thời hạn 05 năm kể từ ngày ban hành quyết định hoàn thuế, cơ quan thuế thực hiện kiểm tra sau hoàn thuế."},{"k":"p","t":"Căn cứ tình hình thực tế, yêu cầu quản lý thuế, cơ quan thuế có thể thực hiện kiểm tra sau hoàn thuế trước thời hạn nêu trên."},{"k":"p","t":"b) Cục Thuế hướng dẫn cụ thể về kiểm tra sau hoàn thuế, kết hợp với kiểm tra chấp hành pháp luật thuế theo quy định."}]},{"id":"tt94_17","no":17,"code":"Điều 17","title":"Điều 17. Áp dụng quản lý rủi ro trong kiểm tra tại trụ sở của người nộp thuế","shortTitle":"Áp dụng quản lý rủi ro trong kiểm tra tại trụ sở của người nộp thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc lựa chọn trường hợp kiểm tra tại trụ sở của người nộp thuế:"},{"k":"p","t":"a) Trường hợp lựa chọn dựa trên kết quả phân tích, đánh giá, phân loại mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế không dưới 90% tổng số trường hợp kiểm tra theo kế hoạch hàng năm;"},{"k":"p","t":"b) Trường hợp được lựa chọn ngẫu nhiên không quá 10% tổng số trường hợp kiểm tra theo kế hoạch hàng năm."},{"k":"p","t":"2. Lựa chọn người nộp thuế để xây dựng kế hoạch kiểm tra tại trụ sở của người nộp thuế."},{"k":"p","t":"Căn cứ danh sách người nộp thuế phân loại theo các mức độ rủi ro tại Điều 13 Thông tư này, cơ quan thuế lựa chọn các trường hợp kiểm tra tại trụ sở của người nộp thuế như sau:"},{"k":"p","t":"a) Lựa chọn người nộp thuế dự kiến đưa vào kế hoạch kiểm tra năm tại trụ sở của người nộp thuế theo kết quả phân loại mức độ rủi ro từ cao xuống thấp."},{"k":"p","t":"b) Việc lựa chọn người nộp thuế có dấu hiệu rủi ro để xây dựng kế hoạch kiểm tra tại trụ sở của người nộp thuế không chồng chéo về nội dung, phạm vi và thời gian với hoạt động kiểm tra thuế khác và các hoạt động thanh tra, kiểm tra khác theo quy định tại Luật Quản lý thuế số 108/2025/QH15, các văn bản hướng dẫn thi hành luật và các văn bản pháp luật khác có liên quan."},{"k":"p","t":"c) Trường hợp cơ quan thuế trong công tác quản lý thuế có thông tin tin cậy làm giảm mức độ rủi ro của người nộp thuế tới mức thấp hoặc có cơ sở cho rằng mức độ rủi ro của người nộp thuế là thấp chưa đưa vào kế hoạch kiểm tra năm thì cơ quan thuế quyết định không lựa chọn người nộp thuế đó vào kế hoạch kiểm tra và lựa chọn người nộp thuế khác theo quy định để đưa vào kế hoạch kiểm tra năm. Trường hợp trong công tác quản lý thuế có thông tin được thu thập và xác minh được người nộp thuế có dấu hiệu rủi ro cao thì cơ quan thuế lựa chọn bổ sung vào kế hoạch kiểm tra năm. Cơ quan thuế chịu trách nhiệm về các quyết định thay đổi của mình."},{"k":"p","t":"d) Việc xây dựng và thẩm quyền phê duyệt kế hoạch kiểm tra tại trụ sở của người nộp thuế; danh sách bổ sung, điều chỉnh kế hoạch kiểm tra tại trụ sở của người nộp thuế tại Điều này được thực hiện theo quy định tại Luật Quản lý thuế số 108/2025/QH15, các văn bản hướng dẫn thi hành luật và các văn bản pháp luật khác có liên quan."},{"k":"p","t":"3. Cơ quan thuế căn cứ kết quả phân tích rủi ro bằng ứng dụng công nghệ thông tin hoặc rủi ro từ phân tích nghiệp vụ, thông tin từ thực tế công tác quản lý thuế để xác định trường hợp kiểm tra, nội dung, phạm vi và thời gian kiểm tra thuế."}]},{"id":"tt94_18","no":18,"code":"Điều 18","title":"Điều 18. Áp dụng quản lý rủi ro trong quản lý nợ thuế, khoản thu khác và cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Áp dụng quản lý rủi ro trong quản lý nợ thuế, khoản thu khác và cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Căn cứ danh sách người nộp thuế được phân loại theo các mức độ rủi ro trong quản lý nợ thuế, khoản thu khác và cưỡng chế thi hành quyết định hành chính về quản lý thuế quy định tại Điều 13 Thông tư này, cơ quan thuế thực hiện quản lý nợ và cưỡng chế theo quy định của Luật Quản lý thuế số 108/2025/QH15 và các văn bản hướng dẫn thi hành, đồng thời xem xét mức độ rủi ro để ưu tiên xử lý, bố trí nguồn lực và tăng cường đôn đốc thu hồi nợ theo nguyên tắc:"},{"k":"p","t":"1. Đối với người nộp thuế có mức độ rủi ro cao: Thực hiện tăng tần suất theo dõi trong tháng, tăng cường các biện pháp đôn đốc, làm việc trực tiếp nhằm thu hồi kịp thời các khoản nợ vào ngân sách nhà nước, bao gồm áp dụng biện pháp tạm hoãn xuất cảnh; lựa chọn áp dụng một hoặc nhiều biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế phù hợp để bảo đảm thu kịp thời, đầy đủ tiền thuế nợ vào ngân sách nhà nước; công khai thông tin tiền thuế nợ."},{"k":"p","t":"2. Đối với người nộp thuế có mức độ rủi ro trung bình: Theo dõi định kỳ hàng tháng, thực hiện các biện pháp đôn đốc nhắc nhở, tư vấn và hỗ trợ người nộp thuế thực hiện nghĩa vụ nộp thuế, áp dụng tạm hoãn xuất cảnh theo ngưỡng quy định, công khai thông tin nợ thuế theo quy định tại điểm a khoản 3 Điều 7 Luật Quản lý thuế số 108/2025/QH15, áp dụng các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế theo trình tự quy định tại Luật quản lý thuế số 108/2025/QH15 và các văn bản hướng dẫn thi hành."},{"k":"p","t":"3. Đối với người nộp thuế có mức độ rủi ro thấp: Thực hiện đôn đốc, nhắc nhở, tư vấn và hỗ trợ người nộp thuế thực hiện nghĩa vụ nộp thuế, được xem xét chưa áp dụng biện pháp tạm hoãn xuất cảnh, chưa thực hiện biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế theo quy định tại Luật Quản lý thuế số 108/2025/QH15 và các văn bản hướng dẫn thi hành."}]},{"id":"tt94_19","no":19,"code":"Điều 19","title":"Điều 19. Áp dụng quản lý rủi ro trong quản lý miễn, giảm thuế","shortTitle":"Áp dụng quản lý rủi ro trong quản lý miễn, giảm thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan thuế thực hiện quản lý hồ sơ miễn, giảm thuế theo quy định của Luật Quản lý thuế số 108/2025/QH15 và các văn bản hướng dẫn thi hành; đồng thời áp dụng quản lý rủi ro trong quá trình xử lý hồ sơ miễn, giảm thuế. Trên cơ sở kết quả phân loại mức độ rủi ro theo quy định tại Điều 13 Thông tư này, cơ quan thuế áp dụng các biện pháp tương ứng với mức độ rủi ro như sau:"},{"k":"p","t":"1. Rủi ro cao: Thực hiện kiểm tra tại trụ sở người nộp thuế theo quy định."},{"k":"p","t":"2. Rủi ro trung bình và rủi ro thấp: Thực hiện tiếp nhận, giải quyết hồ sơ miễn, giảm thuế theo đúng trình tự, thủ tục quy định; đồng thời thực hiện theo dõi, kiểm tra sau khi giải quyết miễn, giảm thuế theo kế hoạch hoặc khi phát sinh dấu hiệu rủi ro."}]},{"id":"tt94_20","no":20,"code":"Điều 20","title":"Điều 20. Áp dụng quản lý rủi ro trong quản lý hóa đơn, chứng từ và trong các nghiệp vụ khác trong quản lý thuế.","shortTitle":"Áp dụng quản lý rủi ro trong quản lý hóa đơn, chứng từ và trong các nghiệp vụ khác trong quản lý thuế.","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Áp dụng quản lý rủi ro trong quản lý sử dụng hóa đơn, chứng từ."},{"k":"p","t":"Căn cứ kết quả phân tích rủi ro theo từng bộ chỉ số tiêu chí để phân loại mức rủi ro của người nộp thuế trong quản lý sử dụng hóa đơn, chứng từ, cơ quan thuế áp dụng các biện pháp quản lý như sau:"},{"k":"p","t":"a) Rủi ro cao: Cơ quan thuế áp dụng các biện pháp quản lý phù hợp bao gồm: không chấp nhận đăng ký sử dụng hóa đơn điện tử, ngừng sử dụng hóa đơn điện tử hoặc thực hiện các biện pháp quản lý hóa đơn khác theo quy định."},{"k":"p","t":"b) Rủi ro trung bình và rủi ro thấp: Thực hiện lựa chọn mẫu để rà soát, kiểm tra, xử lý theo quy định; tăng cường theo dõi, phân tích dữ liệu hóa đơn, chứng từ nhằm kịp thời phát hiện, ngăn ngừa rủi ro phát sinh; thực hiện hỗ trợ, hướng dẫn người nộp thuế tuân thủ đúng các quy định của pháp luật về hóa đơn, chứng từ."},{"k":"p","t":"Cục Thuế hướng dẫn phương pháp chọn mẫu phù hợp theo yêu cầu quản lý thuế của từng địa phương, trong từng thời kỳ."},{"k":"p","t":"2. Áp dụng quản lý rủi ro trong các nghiệp vụ khác."},{"k":"p","t":"Căn cứ mức độ rủi ro trong hoạt động nghiệp vụ khác và các thông tin nghiệp vụ, cơ quan thuế quyết định áp dụng các biện pháp nghiệp vụ phù hợp theo chức năng, nhiệm vụ."}]},{"id":"tt94_21","no":21,"code":"Điều 21","title":"Điều 21. Kiểm tra, đánh giá việc thực hiện áp dụng quản lý rủi ro trong quản lý thuế","shortTitle":"Kiểm tra, đánh giá việc thực hiện áp dụng quản lý rủi ro trong quản lý thuế","chuong":"Chương III — QUẢN LÝ RỦI RO TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung kiểm tra, đánh giá."},{"k":"p","t":"Việc kiểm tra, đánh giá thực hiện áp dụng quản lý rủi ro trong quản lý thuế tập trung vào các nội dung sau đây:"},{"k":"p","t":"a) Chất lượng tổ chức thực hiện các biện pháp, nghiệp vụ trong quản lý rủi ro;"},{"k":"p","t":"b) Hiệu lực, hiệu quả của việc áp dụng quản lý rủi ro trong các hoạt động nghiệp vụ quản lý thuế;"},{"k":"p","t":"c) Việc tổ chức thực hiện và kết quả thực hiện các quyết định kiểm tra hoặc các biện pháp nghiệp vụ khác được thực hiện trên cơ sở áp dụng quản lý rủi ro;"},{"k":"p","t":"d) Hiệu quả của hệ thống tiêu chí, chỉ số đánh giá, phân loại mức độ tuân thủ pháp luật thuế và mức độ rủi ro của người nộp thuế."},{"k":"p","t":"2. Biện pháp kiểm tra, đánh giá."},{"k":"p","t":"Việc kiểm tra, đánh giá được thực hiện thông qua các biện pháp sau:"},{"k":"p","t":"a) Tổng hợp, phân tích thông tin, số liệu báo cáo của cơ quan thuế các cấp và các đơn vị thuộc Cục Thuế về tình hình thực hiện, áp dụng quản lý rủi ro;"},{"k":"p","t":"b) Thu thập, phân tích, tổng hợp thông tin, dữ liệu về kết quả áp dụng quản lý rủi ro trong các nghiệp vụ quản lý thuế;"},{"k":"p","t":"c) Tổ chức các đoàn công tác để kiểm tra việc thực hiện và áp dụng quản lý rủi ro tại cơ quan thuế các cấp theo quy định."},{"k":"p","t":"3. Trách nhiệm các đơn vị."},{"k":"p","t":"Cục trưởng Cục Thuế phân công cho các đơn vị có liên quan, đơn vị được giao thực hiện nhiệm vụ quản lý tuân thủ, quản lý rủi ro kiểm tra, đánh giá thực hiện áp dụng quản lý rủi ro trong quản lý thuế và báo cáo cho cơ quan cấp trên theo quy định tại khoản 2 Điều này. Việc đánh giá được thực hiện thường xuyên, báo cáo định kỳ (06 tháng và hàng năm) và theo yêu cầu nghiệp vụ phát sinh."}]},{"id":"tt94_22","no":22,"code":"Điều 22","title":"Điều 22. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Cục trưởng Cục Thuế căn cứ vào quy định tại Thông tư này có trách nhiệm ban hành:"},{"k":"p","t":"a) Các bộ chỉ số tiêu chí quy định tại Điều 10, Điều 13 Thông tư này để đáp ứng yêu cầu quản lý thuế trong từng thời kỳ; định kỳ hàng năm hoặc theo yêu cầu của công tác quản lý thuế thực hiện rà soát, sửa đổi, bổ sung chỉ số tiêu chí đảm bảo tính cập nhật, phù hợp thực tế;"},{"k":"p","t":"b) Các hướng dẫn cụ thể về trách nhiệm của cơ quan thuế các cấp, công chức thuế và biện pháp thu thập, xử lý thông tin quản lý tuân thủ, quản lý rủi ro trong quản lý thuế; điểm số, trọng số và biện pháp kỹ thuật nghiệp vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế;"},{"k":"p","t":"c) Các quy trình, quy chế, quy định, hướng dẫn việc thực hiện, áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"2. Đơn vị được giao thực hiện nhiệm vụ quản lý tuân thủ, quản lý rủi ro trong quản lý thuế là đơn vị đầu mối, chủ trì có trách nhiệm:"},{"k":"p","t":"a) Quản lý, phối hợp vận hành Phân hệ quản lý tuân thủ và rủi ro thuế và các hệ thống thông tin, dữ liệu phục vụ quản lý tuân thủ, quản lý rủi ro theo phân công;"},{"k":"p","t":"b) Tổ chức thực hiện và hướng dẫn nghiệp vụ, kiểm tra việc thu thập, xử lý thông tin quản lý tuân thủ, quản lý rủi ro trong quản lý thuế; các biện pháp, kỹ thuật nghiệp vụ và việc áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế trong các hoạt động nghiệp vụ quản lý thuế;"},{"k":"p","t":"c) Quản lý các bộ chỉ số tiêu chí do Cục trưởng Cục Thuế ban hành tại điểm a khoản 1 Điều này trên Phân hệ quản lý tuân thủ và rủi ro thuế và các hệ thống thông tin liên quan; theo dõi, đánh giá, điều chỉnh, bổ sung các chỉ số tiêu chí đáp ứng yêu cầu quản lý trong từng thời kỳ."},{"k":"p","t":"3. Các cơ quan Nhà nước trong việc phối hợp quản lý nhà nước về thuế; người nộp thuế; các tổ chức, cá nhân có liên quan đến hoạt động quản lý thuế; các Thuế tỉnh/thành phố, Thuế cơ sở, các Ban, đơn vị, Chi cục Thuế doanh nghiệp lớn, Chi cục Thuế thương mại điện tử thuộc Cục Thuế, công chức thuế có trách nhiệm thực hiện đúng, đầy đủ các nội dung quy định về thực hiện, áp dụng quản lý tuân thủ, quản lý rủi ro trong quản lý thuế tại Thông tư này và các văn bản quy định khác có liên quan."}]},{"id":"tt94_23","no":23,"code":"Điều 23","title":"Điều 23. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2026."},{"k":"p","t":"2. Thông tư này thay thế Thông tư số 31/2021/TT-BTC ngày 17 tháng 5 năm 2021 của Bộ trưởng Bộ Tài chính quy định về áp dụng quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"3. Trường hợp các văn bản quy phạm pháp luật mới ban hành sửa đổi, bổ sung, thay thế các văn bản được dẫn chiếu tại Thông tư này thì thực hiện theo văn bản mới được ban hành./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư trung ương Đảng;- Thủ tướng; các Phó Thủ tướng Chính phủ;- Văn phòng trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chủ tịch nước;- Văn phòng Chính phủ;- Hội đồng dân tộc và các ủy ban của Quốc hội;- Viện Kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- UBTW Mặt trận Tổ quốc Việt Nam;- Cơ quan trung ương của các đoàn thể;- Các Bộ, cơ quan ngang Bộ;- HĐND, UBND tỉnh, thành phố trực thuộc trung ương;- Sở Tài chính các tỉnh, thành phố trực thuộc trung ương;- Thuế các tỉnh, thành phố trực thuộc trung ương;- Kho bạc nhà nước các khu vực;- Chi cục Hải quan các khu vực;- Liên đoàn Thương mại và Công nghiệp Việt Nam;- Cục Kiểm tra văn bản và Tổ chức thi hành pháp luật - Bộ Tư pháp;- Công báo;- Cơ sở dữ liệu quốc gia về văn bản quy phạm pháp luật;- Cổng pháp luật quốc gia;- Cổng thông tin điện tử Chính phủ;- Cổng thông tin điện tử Bộ Tài chính;- Cổng thông tin điện tử Cục Thuế;- Lưu; VT,CT(10).","KT. BỘ TRƯỞNGTHỨ TRƯỞNGCao Anh Tuấn"]]}]}],"forms":[{"code":"PL1","title":"TIÊU CHÍ PHÂN LOẠI MỨC ĐỘ TUÂN THỦ PHÁP LUẬT THUẾ CỦA NGƯỜI NỘP THUẾ","pl":"Phụ lục I","note":""},{"code":"PL2","title":"TIÊU CHÍ PHÂN LOẠI MỨC ĐỘ RỦI RO ĐỐI VỚI NGƯỜI NỘP THUẾ LÀ TỔ CHỨC, HỘ GIA ĐÌNH,HỘ KINH DOANH, CÁ NHÂN KINH DOANH","pl":"Phụ lục II","note":""},{"code":"PL3","title":"TIÊU CHÍ PHÂN LOẠI MỨC ĐỘ RỦI RO ĐỐI VỚI NGƯỜI NỘP THUẾ LÀ CÁ NHÂN","pl":"Phụ lục III","note":""}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
