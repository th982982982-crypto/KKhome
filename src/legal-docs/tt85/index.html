<script id="LD" type="application/json">{"meta":{"title":"Thông tư 85/2026/TT-BTC — Phân loại hàng hóa, phân tích để phân loại hàng hóa xuất khẩu, nhập khẩu","shortCode":"TT 85/2026","subtitle":"Phân loại hàng hóa XNK (thay TT14/2015, TT17/2021)","slug":"tt85","effectiveDate":"15/09/2026","scope":"1. Thông tư này quy định việc phân loại hàng hóa, phân tích để phân loại hàng hóa xuất khẩu, nhập khẩu, xây dựng và sử dụng cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam. 2. Người khai hải quan, cơ quan hải quan, công chức hải quan và các tổ chức, cá nhân khác khi thực hiện các công việc có liên quan đến phân loại hàng hóa, phân tích để phân loại hàng hóa xuất khẩu, nhập khẩu, x","description":"Phân loại hàng hóa XNK (thay TT14/2015, TT17/2021)","related":[]},"outline":[{"id":"tt85_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh và đối tượng áp dụng","shortTitle":"Phạm vi điều chỉnh và đối tượng áp dụng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này quy định việc phân loại hàng hóa, phân tích để phân loại hàng hóa xuất khẩu, nhập khẩu, xây dựng và sử dụng cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam."},{"k":"p","t":"2. Người khai hải quan, cơ quan hải quan, công chức hải quan và các tổ chức, cá nhân khác khi thực hiện các công việc có liên quan đến phân loại hàng hóa, phân tích để phân loại hàng hóa xuất khẩu, nhập khẩu, xây dựng và sử dụng cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam là đối tượng thực hiện Thông tư này."}]},{"id":"tt85_2","no":2,"code":"Điều 2","title":"Điều 2. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Trong Thông tư này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Công ước Quốc tế về Hệ thống hài hòa mô tả và mã hóa hàng hóa (International Convention on the Harmonized Commodity Description and Coding System) (gọi tắt là Công ước HS) là Công ước do Hội đồng hợp tác Hải quan, nay gọi là Tổ chức Hải quan Thế giới (WCO) thông qua ngày 14 tháng 6 năm 1983 tại Bruxelles, Vương quốc Bỉ về “Hệ thống hài hòa mô tả và mã hóa hàng hóa”."},{"k":"p","t":"2. Hệ thống hài hòa mô tả và mã hóa hàng hóa của Tổ chức Hải quan Thế giới (sau đây gọi tắt là Hệ thống HS), là hệ thống bao gồm danh mục những nhóm hàng, phân nhóm hàng cùng các mã số có liên quan, chú giải pháp lý Phần, Chương, Phân nhóm và các Quy tắc tổng quát."},{"k":"p","t":"3. Danh mục hài hòa mô tả và mã hóa hàng hóa của Tổ chức Hải quan Thế giới (sau đây gọi tắt là Danh mục HS) là danh mục những nhóm hàng (mã 4 chữ số), phân nhóm hàng (mã 6 chữ số), chú giải pháp lý Phần, Chương, Phân nhóm được sắp xếp một cách có hệ thống ứng với tên, mô tả và mã số hàng hóa."},{"k":"p","t":"4. Quy tắc tổng quát là các quy tắc chung để giải thích Hệ thống HS nhằm phân loại hàng hóa vào một nhóm, phân nhóm nhất định."},{"k":"p","t":"5. Chú giải pháp lý là những nội dung giải thích các phần, chương và phân nhóm được gắn kèm ở đầu các Phần, Chương của Danh mục HS."},{"k":"p","t":"6. Danh mục thuế quan hài hòa ASEAN (sau đây gọi tắt là Danh mục AHTN) là danh mục hàng hóa của các nước ASEAN, được xây dựng trên cơ sở Hệ thống HS của Tổ chức Hải quan Thế giới."},{"k":"p","t":"7. Chú giải chi tiết Danh mục HS là những giải thích tổng quát và chi tiết về phạm vi, nội dung của các Phần, Chương, Nhóm, Phân nhóm của Danh mục HS."},{"k":"p","t":"8. Chú giải bổ sung Danh mục AHTN (SEN) là phụ lục của Nghị định thư về việc thực hiện Danh mục AHTN để giải thích phạm vi, nội dung các phân nhóm trong Danh mục do các nước ASEAN xây dựng."},{"k":"p","t":"9. Tuyển tập các ý kiến phân loại của WCO là tài liệu tập hợp các Quyết định phân loại hàng hóa đã được Ủy ban HS của Tổ chức Hải quan thế giới thông qua."},{"k":"p","t":"10. Phân tích hàng hóa là việc cơ quan kiểm định hải quan sử dụng máy móc, thiết bị kỹ thuật để phân tích mẫu hàng hóa xuất khẩu, nhập khẩu:"},{"k":"p","t":"a) Xác định thành phần, cấu tạo, tính chất lý, hóa, công dụng làm cơ sở phân loại hàng hóa theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam;"},{"k":"p","t":"b) Kiểm tra, đánh giá tiêu chí kỹ thuật của hàng hóa, xác định tiêu chuẩn chất lượng hàng hóa theo tiêu chuẩn quốc gia, quy chuẩn kỹ thuật do các cơ quan quản lý nhà nước ban hành hoặc tiêu chuẩn quốc tế để đơn vị yêu cầu phân tích làm cơ sở quyết định thông quan hàng hóa."},{"k":"p","t":"11. Giám định, thử nghiệm hàng hóa là việc cơ quan hải quan trưng cầu giám định, thử nghiệm tại các tổ chức giám định, thử nghiệm theo quy định của pháp luật để xác định cấu tạo, thành phần, tính chất lý, hóa, công dụng của hàng hóa theo yêu cầu của cơ quan hải quan để xác định tên hàng, mã số hàng hóa xuất khẩu, nhập khẩu."}]},{"id":"tt85_3","no":3,"code":"Điều 3","title":"Điều 3. Phân tích để phân loại hàng hóa","shortTitle":"Phân tích để phân loại hàng hóa","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp cơ quan hải quan không đủ cơ sở để xác định tính chính xác việc phân loại hàng hóa của người khai hải quan thì thực hiện phân tích, giám định hàng hóa theo quy định tại khoản 5 Điều 29 Nghị định số 08/2015/NĐ-CP quy định chi tiết và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan được sửa đổi, bổ sung bởi khoản 15 Điều 1 Nghị định số 167/2025/NĐ-CP."},{"k":"p","t":"2. Trường hợp cơ quan kiểm định hải quan chưa đủ điều kiện thực hiện phân tích một số chỉ tiêu kỹ thuật hoặc cần phân tích kiểm chứng thì sử dụng dịch vụ giám định, thử nghiệm của các tổ chức giám định, thử nghiệm theo quy định của pháp luật để làm cơ sở thực hiện."},{"k":"p","t":"3. Để phân loại hàng hóa, người khai hải quan có thể sử dụng các dịch vụ giám định hàng hóa của các tổ chức giám định theo quy định của pháp luật hoặc cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam để xác định các thông tin về thành phần, tính chất lý, hóa, tính năng, công dụng của hàng hóa xuất khẩu, nhập khẩu và chịu trách nhiệm về tính chính xác, hợp pháp của tài liệu cung cấp."}]},{"id":"tt85_4","no":4,"code":"Điều 4","title":"Điều 4. Nguyên tắc phân loại hàng hóa","shortTitle":"Nguyên tắc phân loại hàng hóa","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Một mặt hàng có một mã số duy nhất theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam."},{"k":"p","t":"2. Khi phân loại hàng hóa xuất khẩu, nhập khẩu, phải tuân thủ:"},{"k":"p","t":"a) Điều 26 Luật Hải quan số 54/2014/QH13; Điều 16 Nghị định số 08/2015/NĐ-CP;"},{"k":"p","t":"b) Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam;"},{"k":"p","t":"c) Biểu thuế xuất khẩu, Biểu thuế nhập khẩu;"},{"k":"p","t":"d) 6 (sáu) quy tắc tổng quát giải thích việc phân loại hàng hóa theo Hệ thống hài hoà mô tả và mã hoá hàng hóa;"},{"k":"p","t":"e) Các nội dung hướng dẫn tại Thông tư này."}]},{"id":"tt85_5","no":5,"code":"Điều 5","title":"Điều 5. Sử dụng kết quả phân loại","shortTitle":"Sử dụng kết quả phân loại","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Kết quả phân loại hàng hóa được sử dụng để áp dụng chính sách quản lý hàng hóa trên cơ sở thực hiện quy định về điều kiện, thủ tục, hồ sơ áp dụng tại Danh mục hàng hóa cấm xuất khẩu, tạm ngừng xuất khẩu; Danh mục hàng hóa cấm nhập khẩu, tạm ngừng nhập khẩu; Danh mục hàng hóa xuất khẩu, nhập khẩu theo giấy phép của cơ quan nhà nước có thẩm quyền; Danh mục hàng hóa thuộc đối tượng kiểm tra chuyên ngành có hiệu lực tại thời điểm đăng ký tờ khai."},{"k":"p","t":"2. Kết quả phân loại hàng hóa được sử dụng để áp dụng mức thuế đối với một mặt hàng trên cơ sở thực hiện quy định tại các Biểu thuế áp dụng đối với hàng hóa xuất khẩu, nhập khẩu có hiệu lực tại thời điểm đăng ký tờ khai và điều kiện, thủ tục, hồ sơ để được áp dụng mức thuế quy định tại các văn bản quy phạm pháp luật về thuế đối với hàng hóa xuất khẩu, nhập khẩu."}]},{"id":"tt85_6","no":6,"code":"Điều 6","title":"Điều 6. Phân loại, áp dụng mức thuế đối với một số trường hợp đặc biệt","shortTitle":"Phân loại, áp dụng mức thuế đối với một số trường hợp đặc biệt","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp thực hiện phân loại hàng hóa theo quy định tại Điều 4 Thông tư này nhưng chưa xác định được mã số duy nhất theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam thì sử dụng các tài liệu sau:"},{"k":"p","t":"a) Chú giải chi tiết Danh mục HS;"},{"k":"p","t":"b) Tuyển tập ý kiến phân loại của WCO;"},{"k":"p","t":"c) Chú giải bổ sung Danh mục AHTN;"},{"k":"p","t":"d) Cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam."},{"k":"p","t":"2. Trường hợp có sự khác biệt về mô tả hàng hóa tại Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam và mô tả hàng hóa theo Danh mục HS, Danh mục AHTN thì áp dụng trực tiếp mô tả hàng hóa theo Danh mục HS, Danh mục AHTN để phân loại và hướng dẫn phân loại theo nguyên tắc áp dụng quy định của Điều ước quốc tế mà Việt Nam là thành viên."},{"k":"p","t":"3. Trường hợp thực hiện quy định tại Điều 4 và khoản 1 Điều 6 Thông tư này chưa đủ cơ sở để xác định tên gọi, mô tả hàng hóa theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam thì được sử dụng các tiêu chí, tiêu chuẩn, quy chuẩn do cơ quan, tổ chức, đơn vị có thẩm quyền ban hành theo quy định để làm cơ sở xác định tên gọi, mô tả hàng hóa, mã số theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam."},{"k":"p","t":"4. Trường hợp hàng hóa có mã số tại Danh mục hàng hóa quản lý chuyên ngành khác biệt với mã số xác định theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam thì thực hiện theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam và pháp luật về hải quan."},{"k":"p","t":"5. Trường hợp mặt hàng phức tạp, khó phân loại, Cục trưởng Cục Hải quan trên cơ sở ý kiến của Bộ, cơ quan ngang Bộ quản lý chuyên ngành hoặc Ủy ban HS thuộc Tổ chức Hải quan thế giới hoặc Nhóm kỹ thuật về phân loại hàng hóa của ASEAN ban hành văn bản sửa đổi, hướng dẫn phân loại, làm ảnh hưởng tới quá trình khai báo hải quan về mã số, mức thuế và hiệu quả của hoạt động sản xuất kinh doanh của người khai hải quan, người nộp thuế thì thực hiện phân loại hàng hóa kể từ ngày văn bản sửa đổi, hướng dẫn phân loại được ban hành."}]},{"id":"tt85_7","no":7,"code":"Điều 7","title":"Điều 7. Phân loại máy liên hợp hoặc tổ hợp máy thuộc các Chương 84, Chương 85 và Chương 90","shortTitle":"Phân loại máy liên hợp hoặc tổ hợp máy thuộc các Chương 84, Chương 85 và Chương 90","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Hàng hóa là máy liên hợp (gồm hai hay nhiều máy) hoặc tổ hợp máy thuộc các Chương 84, Chương 85 và Chương 90 của Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam được nhập khẩu từ một nguồn hay nhiều nguồn cung cấp, về nhiều chuyến, làm thủ tục tại một hay nhiều đơn vị hải quan khác nhau thì người khai hải quan được lựa chọn phân loại theo từng máy móc, thiết bị hoặc theo quy định tại Chú giải pháp lý 3, 4, 5 Phần XVI của Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam."},{"k":"p","t":"Trường hợp lựa chọn phân loại theo quy định tại Chú giải pháp lý 3, 4, 5 Phần XVI của Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam thì thực hiện theo hướng dẫn tại Điều 9 dưới đây."}]},{"id":"tt85_8","no":8,"code":"Điều 8","title":"Điều 8. Phân loại máy móc, thiết bị ở dạng chưa lắp ráp hoặc tháo rời","shortTitle":"Phân loại máy móc, thiết bị ở dạng chưa lắp ráp hoặc tháo rời","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Hàng hóa là máy móc, thiết bị ở dạng chưa lắp ráp hoặc tháo rời thường do yêu cầu đóng gói, bảo quản hoặc vận chuyển thực hiện phân loại theo quy tắc 2a của 6 (sáu) quy tắc tổng quát giải thích Hệ thống HS."},{"k":"p","t":"Trường hợp hàng hóa được nhập khẩu từ một nguồn hay nhiều nguồn cung cấp, về nhiều chuyến, làm thủ tục tại một hay nhiều đơn vị hải quan khác nhau thì người khai hải quan, cơ quan hải quan thực hiện theo hướng dẫn tại Điều 9 dưới đây."}]},{"id":"tt85_9","no":9,"code":"Điều 9","title":"Điều 9. Hồ sơ, thủ tục đối với hàng hóa phân loại theo Điều 7, Điều 8","shortTitle":"Hồ sơ, thủ tục đối với hàng hóa phân loại theo Điều 7, Điều 8","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ đăng ký Danh mục:"},{"k":"p","t":"a) Danh mục máy móc, thiết bị; các chi tiết, linh kiện rời của máy móc, thiết bị (theo mẫu số 01/ĐKDMTB/2025 tại Phụ lục V ban hành kèm theo Thông tư số 121/2025/TT-BTC sửa đổi, bổ sung một số điều của các Thông tư quy định về thủ tục hải quan, kiểm tra, giám sát hải quan, thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu);"},{"k":"p","t":"b) Phiếu theo dõi trừ lùi (theo mẫu số 02/PTDTL-DMTB/2025 tại Phụ lục V ban hành kèm theo Thông tư số 121/2025/TT-BTC)."},{"k":"p","t":"2. Thủ tục thực hiện đối với người khai hải quan:"},{"k":"p","t":"a) Người khai hải quan thực hiện khai các chỉ tiêu thông tin thông qua Hệ thống xử lý dữ liệu điện tử hải quan, trường hợp Hệ thống chưa có chức năng tiếp nhận chỉ tiêu thông tin thì nộp bản scan có xác nhận bằng chữ ký số các chứng từ thuộc hồ sơ hoặc gửi hồ sơ trực tiếp đến cơ quan hải quan."},{"k":"p","t":"b) Người khai hải quan nộp hồ sơ đăng ký Danh mục quy định tại khoản 1 Điều này trước thời điểm đăng ký tờ khai hải quan nhập khẩu lô hàng đầu tiên tại cơ quan hải quan nơi thuận tiện nhất."},{"k":"p","t":"c) Trường hợp Danh mục đã đăng ký nhưng người khai hải quan cần sửa đổi, bổ sung thì người khai hải quan nộp Danh mục và Phiếu theo dõi trừ lùi sửa đổi, bổ sung cho cơ quan hải quan nơi người khai hải quan đăng ký Danh mục trước thời điểm đăng ký tờ khai hải quan nhập khẩu lô hàng đầu tiên hoặc trước thời điểm đăng ký tờ khai hải quan nhập khẩu lô hàng tiếp theo có sửa đổi, bổ sung Danh mục."},{"k":"p","t":"d) Trường hợp người khai hải quan mất Danh mục thì có văn bản đề nghị cơ quan hải quan nơi đăng ký Danh mục cấp lại Danh mục."},{"k":"p","t":"Trường hợp mất Phiếu theo dõi trừ lùi thì người khai hải quan lập Phiếu theo dõi trừ lùi mới trong đó tự kê khai và chịu trách nhiệm trước pháp luật về số tờ khai và số lượng máy móc, thiết bị hoặc chi tiết, linh kiện trong Danh mục đã nhập khẩu gửi cơ quan hải quan nơi làm thủ tục nhập khẩu lô hàng tiếp theo."},{"k":"p","t":"3. Thủ tục thực hiện đối với cơ quan hải quan:"},{"k":"p","t":"a) Tiếp nhận hồ sơ đăng ký Danh mục"},{"k":"p","t":"a.1) Cơ quan hải quan thực hiện tiếp nhận và kiểm tra hồ sơ đăng ký Danh mục hoặc Danh mục sửa đổi, bổ sung do người khai hải quan nộp theo khoản 1, khoản 2 Điều này. Trường hợp hồ sơ đăng ký Danh mục hoặc hồ sơ đăng ký sửa đổi, bổ sung Danh mục đúng quy định thì trong thời hạn không quá 03 ngày làm việc, cơ quan hải quan xác nhận Danh mục và Phiếu theo dõi trừ lùi, lưu 01 bản chính Danh mục, giao cho người khai hải quan 01 bản chính Danh mục kèm 01 bản chính Phiếu theo dõi trừ lùi."},{"k":"p","t":"a.2) Trường hợp người khai hải quan mất Danh mục hoặc Phiếu theo dõi trừ lùi."},{"k":"p","t":"Trường hợp mất Danh mục, cơ quan hải quan nơi người khai hải quan đăng ký Danh mục thực hiện kiểm tra và cấp lại Danh mục trong thời hạn không quá 03 ngày làm việc kể từ ngày nhận được văn bản đề nghị theo điểm d khoản 2 Điều này."},{"k":"p","t":"Trường hợp mất Phiếu theo dõi trừ lùi, cơ quan hải quan nơi làm thủ tục nhập khẩu lô hàng tiếp theo tiếp nhận và kiểm tra các nội dung tự kê khai trên Phiếu theo dõi trừ lùi mới do người khai hải quan lập, đối chiếu với các thông tin trên hệ thống của cơ quan hải quan và xác nhận Phiếu theo dõi trừ lùi các máy móc, thiết bị hoặc chi tiết, linh kiện chưa nhập khẩu."},{"k":"p","t":"b) Kiểm tra khi làm thủ tục nhập khẩu"},{"k":"p","t":"b.1) Ngoài thủ tục hải quan theo quy định, cơ quan hải quan nơi làm thủ tục nhập khẩu căn cứ hồ sơ hải quan, kiểm tra, đối chiếu với Danh mục đã đăng ký, Phiếu theo dõi trừ lùi để thực hiện phân loại và trừ lùi những máy móc, thiết bị hoặc chi tiết, linh kiện đã thực tế nhập khẩu và xác nhận số lượng hàng hóa đã trừ lùi, lưu 01 bản chụp Danh mục và 01 bản chụp Phiếu theo dõi trừ lùi đã thực hiện trừ lùi vào hồ sơ hải quan."},{"k":"p","t":"b.2) Trường hợp người khai hải quan làm thủ tục nhập khẩu tại cơ quan hải quan khác với cơ quan hải quan nơi đăng ký Danh mục thì cơ quan hải quan nơi làm thủ tục nhập khẩu tiếp nhận 01 bản chính Danh mục kèm Phiếu theo dõi trừ lùi do người khai hải quan xuất trình, thực hiện theo hướng dẫn tại điểm b.1 khoản 3 Điều này."},{"k":"p","t":"b.3) Hết lượng hàng hóa nhập khẩu, cơ quan hải quan nơi làm thủ tục cho lô hàng cuối cùng xác nhận “đã nhập hết hàng hóa theo danh mục số....” lên Phiếu theo dõi trừ lùi, lưu 01 bản chính, chuyển cho người khai hải quan 01 bản chụp. Trường hợp cơ quan hải quan nơi làm thủ tục cho lô hàng cuối cùng không phải là nơi cấp Phiếu theo dõi trừ lùi thì lưu 01 bản chụp và gửi 01 bản chính đến cơ quan hải quan nơi cấp Phiếu theo dõi trừ lùi."},{"k":"p","t":"Cơ quan hải quan nơi cấp Phiếu theo dõi trừ lùi thực hiện kiểm tra đối với hàng hóa đã thông quan theo nguyên tắc quản lý rủi ro."},{"k":"p","t":"4. Cơ quan hải quan nơi đăng ký Danh mục và cấp Phiếu theo dõi trừ lùi tổ chức phân loại, xác định rủi ro đối với các Danh mục chưa nhập khẩu hết theo thời hạn đã đăng ký để thực hiện kiểm tra việc phân loại hàng hóa đã thông quan theo quy định."},{"k":"p","t":"5. Trường hợp khai bổ sung (nếu có) thực hiện theo quy định của Bộ Tài chính về thủ tục hải quan; kiểm tra, giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu."}]},{"id":"tt85_10","no":10,"code":"Điều 10","title":"Điều 10. Hồ sơ yêu cầu phân tích","shortTitle":"Hồ sơ yêu cầu phân tích","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan hải quan nơi có yêu cầu phân tích hàng hóa có trách nhiệm lập và gửi hồ sơ yêu cầu phân tích đến cơ quan kiểm định hải quan, hồ sơ gồm:"},{"k":"p","t":"1. Hồ sơ yêu cầu phân tích, phân loại hàng hóa:"},{"k":"p","t":"a) Phiếu yêu cầu phân tích hàng hóa xuất khẩu, nhập khẩu kiêm Biên bản lấy mẫu hàng hóa (theo mẫu số 01/PYCPT/2026 Phụ lục ban hành kèm Thông tư này). Mỗi mặt hàng lập 01 Phiếu yêu cầu phân tích hàng hóa xuất khẩu, nhập khẩu kiêm Biên bản lấy mẫu hàng hóa."},{"k":"p","t":"b) Phiếu ghi số, ngày văn bản, chứng từ thuộc hồ sơ hải quan liên quan đến mẫu hàng hóa theo mẫu số 05/PGTL/2026 Phụ lục ban hành kèm theo Thông tư này (trong trường hợp khai tờ khai hải quan giấy)."},{"k":"p","t":"c) Mẫu hàng hóa yêu cầu phân tích."},{"k":"p","t":"d) Tài liệu kỹ thuật của hàng hóa hoặc bản phân tích thành phần sản phẩm (đối với trường hợp không khai thác được trên hệ thống)."},{"k":"p","t":"Trường hợp không có tài liệu kỹ thuật hoặc bản phân tích thành phần sản phẩm thì cơ quan hải quan nơi gửi hồ sơ phải nêu lý do tại mục 12 mẫu số 01/PYCPT/2026."},{"k":"p","t":"2. Hồ sơ yêu cầu kiểm tra, đánh giá tiêu chí kỹ thuật của hàng hóa"},{"k":"p","t":"Thực hiện theo quy định tại điểm a khoản 5 Điều 29 Thông tư số 38/2015/TT-BTC quy định về thủ tục hải quan; kiểm tra, giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu được sửa đổi, bổ sung bởi Thông tư số 39/2018/TT-BTC và Thông tư số 121/2025/TT-BTC."}]},{"id":"tt85_11","no":11,"code":"Điều 11","title":"Điều 11. Mẫu hàng hóa yêu cầu phân tích","shortTitle":"Mẫu hàng hóa yêu cầu phân tích","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người khai hải quan có trách nhiệm xuất trình hàng hóa để cơ quan hải quan lấy mẫu thực hiện phân tích."},{"k":"p","t":"2. Lấy mẫu hàng hóa."},{"k":"p","t":"a) Hàng hóa xuất khẩu, nhập khẩu phải lấy mẫu để phân tích theo quy định tại khoản 5 Điều 29 Nghị định số 08/2015/NĐ-CP được sửa đổi bổ sung bởi Nghị định số 167/2025/NĐ-CP. Khi lấy mẫu phải lập Phiếu yêu cầu phân tích hàng hóa xuất khẩu, nhập khẩu kiêm Biên bản lấy mẫu hàng hóa theo quy định tại Điều 10 nêu trên."},{"k":"p","t":"Mẫu được lấy từ chính lô hàng cần phân tích và mang tính đại diện; phải đủ về số lượng, khối lượng để phục vụ cho việc trưng cầu giám định hoặc giải quyết khiếu nại. Khi lấy mẫu phải có đại diện của người khai hải quan. Mẫu phải được các bên ký xác nhận và niêm phong riêng biệt từng mẫu. Khi bàn giao mẫu phải có biên bản bàn giao và ký xác nhận của các bên."},{"k":"p","t":"Trường hợp lấy mẫu nhưng vắng mặt người khai hải quan, cơ quan hải quan lấy mẫu với sự chứng kiến của đại diện ít nhất một trong các bên sau: Doanh nghiệp kinh doanh cảng, kho, bãi hoặc cơ quan nhà nước tại khu vực cửa khẩu hoặc đại diện doanh nghiệp vận tải và phải có ký xác nhận của các bên chứng kiến."},{"k":"p","t":"b) Số lượng mẫu: 02 mẫu."},{"k":"p","t":"Trường hợp người khai hải quan chỉ nhập khẩu 01 mẫu thì không thực hiện lấy mẫu."},{"k":"p","t":"c) Giao nhận mẫu: Cơ quan hải quan nơi yêu cầu phân tích gửi mẫu trực tiếp hoặc qua đường bưu điện đến cơ quan kiểm định hải quan."},{"k":"p","t":"Mẫu chỉ có giá trị pháp lý khi còn nguyên niêm phong."},{"k":"p","t":"3. Sử dụng mẫu hàng hóa."},{"k":"p","t":"a) Phân tích: Cơ quan kiểm định hải quan tiếp nhận mẫu (theo mẫu số 02/PTNYCPT/2026 Phụ lục ban hành kèm Thông tư này) và thực hiện phân tích;"},{"k":"p","t":"b) Lưu mẫu: Trong thời hạn 120 ngày kể từ ngày ban hành Thông báo kết quả phân tích, phân loại; Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật, trừ những loại hàng hóa đặc biệt như hàng hóa dễ gây nguy hiểm, hàng hóa đã bị biến chất hoặc hàng hóa không thể lưu giữ được trong thời gian trên."},{"k":"p","t":"Trong thời hạn 120 ngày kể từ ngày ban hành Thông báo kết quả phân tích, phân loại, Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật, người khai hải quan không đồng ý với kết quả phân tích và đề nghị giám định tại các tổ chức có chức năng theo quy định của pháp luật hoặc khiếu nại liên quan đến kết quả phân tích, phân loại, cơ quan kiểm định hải quan lưu mẫu cho đến khi có quyết định giải quyết khiếu nại."},{"k":"p","t":"c) Trả lại mẫu hàng hóa."},{"k":"p","t":"Trường hợp người khai hải quan yêu cầu trả lại mẫu thì cơ quan kiểm định hải quan lập biên bản trả mẫu cho người khai hải quan (theo mẫu số 03/BBTLMHH/2026 Phụ lục ban hành kèm Thông tư này) và không chịu trách nhiệm về phẩm chất hàng hóa đối với những mẫu được trả lại do đã chịu tác động của quá trình phân tích mẫu. Trường hợp trả lại mẫu hàng hóa đang trong thời hạn lưu mẫu theo quy định tại điểm b khoản 3 Điều này, người khai hải quan đã công nhận kết quả phân tích thì không được khiếu nại về kết quả phân tích."},{"k":"p","t":"d) Hủy mẫu hàng hóa đã phân tích."},{"k":"p","t":"Cơ quan hải quan hủy mẫu đối với mẫu hết hạn lưu giữ theo quy định, mẫu hàng hóa dễ gây nguy hiểm, mẫu hàng hóa đã bị biến chất hoặc mẫu hàng hóa không còn khả năng lưu giữ. Biên bản hủy mẫu nêu rõ tình trạng của mẫu lưu, lý do hủy mẫu. Quyết định hủy mẫu và biên bản hủy mẫu được lưu theo quy định về lưu giữ hồ sơ."},{"k":"p","t":"4. Cục trưởng Cục Hải quan hướng dẫn cụ thể về quy trình kỹ thuật đối với việc lấy mẫu, hủy mẫu."},{"k":"p","t":"5. Trường hợp cơ quan hải quan gửi mẫu trưng cầu giám định, thử nghiệm tại các tổ chức giám định, thử nghiệm thì lập hồ sơ, thực hiện thủ tục gửi mẫu giám định, thử nghiệm theo quy định của pháp luật."}]},{"id":"tt85_12","no":12,"code":"Điều 12","title":"Điều 12. Thông báo kết quả phân tích, phân loại và Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật","shortTitle":"Thông báo kết quả phân tích, phân loại và Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đội trưởng Đội Kiểm định hải quan ban hành Thông báo kết quả phân tích, phân loại và Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật."},{"k":"p","t":"2. Chi cục trưởng Chi cục Kiểm định hải quan có trách nhiệm tổ chức thực hiện và đảm bảo sự thống nhất trong việc ban hành Thông báo kết quả phân tích, phân loại và Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật."},{"k":"p","t":"3. Trong thời hạn không quá 05 ngày làm việc, trường hợp thời gian phân tích phụ thuộc thời gian do yêu cầu quy trình kỹ thuật phân tích hoặc mẫu hàng hóa phức tạp thì không quá 20 ngày làm việc kể từ ngày tiếp nhận đủ hồ sơ và mẫu phân tích, Đội trưởng Đội Kiểm định hải quan ban hành Thông báo kết quả phân tích, phân loại (theo mẫu số 04/TBKQPTPL/2026 Phụ lục ban hành kèm theo Thông tư này) và Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật (theo mẫu số 43-KQKTĐG/KĐHQ Phụ lục I ban hành kèm theo Thông tư số 121/2025/TT-BTC)."},{"k":"p","t":"Trường hợp mặt hàng phức tạp, khó phân loại, cơ quan hải quan cần xin ý kiến Bộ, cơ quan ngang Bộ quản lý chuyên ngành hoặc Ủy ban HS thuộc Tổ chức Hải quan thế giới hoặc Nhóm kỹ thuật về phân loại hàng hóa của ASEAN hoặc phải thực hiện xác minh tại cơ sở sản xuất theo quy định tại khoản 5a Điều 29 Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 39/2018/TT-BTC và Thông tư số 121/2025/TT-BTC thì không quá 05 ngày làm việc kể từ ngày nhận được văn bản trả lời hoặc kết quả xác minh tại cơ sở sản xuất, cơ quan kiểm định hải quan ban hành Thông báo kết quả phân tích, phân loại."},{"k":"p","t":"4. Trường hợp cơ quan kiểm định hải quan gửi mẫu trưng cầu giám định, thử nghiệm tại các tổ chức giám định, thử nghiệm thì trong thời hạn không quá 05 ngày làm việc, trường hợp mẫu hàng hóa phức tạp cần có thêm thời gian thì không quá 08 ngày làm việc kể từ ngày nhận được kết quả giám định, thử nghiệm hàng hóa, Đội trưởng Đội Kiểm định hải quan ban hành Thông báo kết quả phân tích, phân loại."},{"k":"p","t":"5. Việc ban hành và sử dụng Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật thực hiện theo quy định tại điểm a khoản 5 Điều 29 Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 39/2018/TT-BTC và Thông tư số 121/2025/TT-BTC."},{"k":"p","t":"6. Thông báo kết quả phân tích, phân loại; Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật là cơ sở để xác định mức thuế, thực hiện chính sách quản lý hàng hóa; được cập nhật vào cơ sở dữ liệu của cơ quan hải quan. Thông báo kết quả phân tích, phân loại được công khai trên trang thông tin điện tử của Cục Hải quan (trừ phần phụ lục của Thông báo kết quả phân tích, phân loại)."},{"k":"p","t":"7. Trường hợp người khai hải quan không đồng ý với Thông báo kết quả phân tích, phân loại thì thực hiện khiếu nại theo Luật Khiếu nại số 02/2011/QH13 hoặc trưng cầu giám định theo quy định tại Điều 30 Nghị định số 08/2015/NĐ-CP."}]},{"id":"tt85_13","no":13,"code":"Điều 13","title":"Điều 13. Nguồn thông tin xây dựng Cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Nguồn thông tin xây dựng Cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Công ước HS và các phụ lục kèm theo;"},{"k":"p","t":"2. Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam;"},{"k":"p","t":"3. Danh mục hàng hóa cấm xuất khẩu, cấm nhập khẩu, Danh mục hàng hóa xuất khẩu, nhập khẩu theo giấy phép, theo điều kiện, Danh mục hàng hóa xuất khẩu, nhập khẩu thuộc diện quản lý chuyên ngành theo quy định tại Nghị định số 69/2018/NĐ-CP quy định chi tiết một số Điều của Luật Quản lý ngoại thương;"},{"k":"p","t":"4. Văn bản hướng dẫn về phân loại hàng hóa của Bộ Tài chính, Cục Hải quan;"},{"k":"p","t":"5. Thông báo kết quả xác định trước mã số; Thông báo kết quả phân tích, phân loại hàng hóa; Thông báo kết quả phân tích kèm mã số hàng hóa; Thông báo kết quả kiểm tra, đánh giá tiêu chí kỹ thuật;"},{"k":"p","t":"6. Các văn bản giải quyết khiếu nại về phân loại hàng hóa, áp dụng mức thuế của Bộ Tài chính, Cục Hải quan."}]},{"id":"tt85_14","no":14,"code":"Điều 14","title":"Điều 14. Thẩm quyền thu thập, cập nhật, sửa đổi Cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam","shortTitle":"Thẩm quyền thu thập, cập nhật, sửa đổi Cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Cục Hải quan tổ chức thu thập, cập nhật, sửa đổi cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam theo quy định tại Điều 18 Nghị định số 08/2015/NĐ-CP đảm bảo tính đầy đủ, toàn diện, tập trung, thống nhất và cập nhật kịp thời, đảm bảo an toàn thông tin và có khả năng kết nối, chia sẻ, đồng bộ dữ liệu với các cơ sở dữ liệu Quốc gia theo quy định."},{"k":"p","t":"2. Thông tin trong cơ sở dữ liệu được bổ sung, sửa đổi khi các nguồn thông tin nêu tại Điều 13 Thông tư này thay đổi."},{"k":"p","t":"3. Cục Hải quan công khai các thông tin nêu tại Điều 13 Thông tư này trên trang thông tin điện tử của Cục Hải quan để người khai hải quan, các cơ quan quản lý nhà nước có liên quan, cơ quan hải quan các cấp, công chức hải quan sử dụng và đồng bộ các danh mục nêu tại Điều 13 Thông tư này về danh mục điện tử dùng chung ngành Tài chính để các đơn vị trong ngành Tài chính, người khai hải quan, các cơ quan quản lý nhà nước có liên quan, cơ quan hải quan các cấp, công chức hải quan sử dụng."}]},{"id":"tt85_15","no":15,"code":"Điều 15","title":"Điều 15. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 15 tháng 09 năm 2026."},{"k":"p","t":"Thông tư này thay thế Thông tư số 14/2015/TT-BTC ngày 30 tháng 01 năm 2015 của Bộ Tài chính hướng dẫn về phân loại hàng hóa, phân tích để phân loại hàng hóa; phân tích để kiểm tra chất lượng, kiểm tra an toàn thực phẩm đối với hàng hóa xuất khẩu, nhập khẩu và Thông tư số 17/2021/TT-BTC ngày 26 tháng 02 năm 2021 của Bộ Tài chính sửa đổi, bổ sung một số Điều tại Thông tư số 14/2015/TT-BTC."},{"k":"p","t":"2. Trường hợp các văn bản quy phạm pháp luật viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế bằng văn bản quy phạm pháp luật khác thì áp dụng theo quy định tại văn bản sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"tt85_16","no":16,"code":"Điều 16","title":"Điều 16. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp hàng hóa thuộc tờ khai hải quan đăng ký đã được lấy mẫu hàng hóa để phân tích, giám định, thử nghiệm nhưng đến ngày Thông tư này có hiệu lực thi hành chưa có kết quả thì thực hiện theo quy định của văn bản liên quan có hiệu lực tại thời điểm đăng ký tờ khai."},{"k":"p","t":"Việc thực hiện phân loại hàng hóa, lấy mẫu, gửi mẫu, lưu mẫu phân tích, thực hiện phân tích, phân loại, giám định, thử nghiệm tiếp tục thực hiện theo pháp luật áp dụng tại thời điểm trước khi Thông tư này có hiệu lực."},{"k":"p","t":"2. Trường hợp nhập khẩu máy liên hợp hoặc tổ hợp máy thuộc các Chương 84, Chương 85 và Chương 90 và chi tiết, linh kiện rời theo Danh mục đã đăng ký trước thời điểm có hiệu lực của Thông tư này thì vẫn tiếp tục thực hiện theo quy định tại Thông tư số 14/2015/TT-BTC cho đến khi nhập hết hàng hóa theo Danh mục."}]},{"id":"tt85_17","no":17,"code":"Điều 17","title":"Điều 17. Tổ chức thực hiện","shortTitle":"Tổ chức thực hiện","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Cục trưởng Cục Hải quan căn cứ vào Thông tư này ban hành Quy trình phân loại hàng hóa, áp dụng mức thuế đối với hàng hóa xuất khẩu, nhập khẩu; Quy trình phân tích phân loại và kiểm tra, đánh giá tiêu chí kỹ thuật của hàng hóa xuất khẩu, nhập khẩu; Quy chế xây dựng, thu thập, cập nhật Cơ sở dữ liệu; xây dựng và đảm bảo cơ sở vật chất, thiết bị máy móc, nguồn nhân lực để thực hiện hiệu quả nhiệm vụ phân tích hàng hóa xuất khẩu, nhập khẩu; hướng dẫn các đơn vị hải quan thực hiện thống nhất, bảo đảm tạo điều kiện thuận lợi cho hoạt động xuất khẩu, nhập khẩu, thực hiện tốt công tác quản lý nhà nước về hải quan;"},{"k":"p","t":"2. Cơ quan hải quan, người khai hải quan, người nộp thuế và các tổ chức, cá nhân có liên quan có trách nhiệm thực hiện việc phân loại hàng hóa, phân tích để phân loại hàng hóa, cơ sở dữ liệu về Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam, ứng dụng công nghệ thông tin trong quản lý theo đúng quy định hiện hành và hướng dẫn tại Thông tư này. Quá trình thực hiện có phát sinh vướng mắc, cơ quan hải quan, người khai hải quan, người nộp thuế và các tổ chức, cá nhân có liên quan báo cáo, phản ánh về Bộ Tài chính (Cục Hải quan) để được xem xét, hướng dẫn giải quyết kịp thời."},{"k":"tbl","rows":[["Nơi nhận:- Thủ tướng, các Phó Thủ tướng Chính phủ;- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chủ tịch nước;- Văn phòng Chính phủ;- Tòa án nhân dân tối cao;- Viện Kiểm sát nhân dân tối cao;- Kiểm toán Nhà nước;- Các Bộ, cơ quan ngang Bộ;- Cơ quan Trung ương của các Đoàn thể;- HĐND, UBND các tỉnh, thành phố;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- UBTW Mặt trận Tổ quốc Việt Nam;- Liên đoàn Thương mại và Công nghiệp Việt Nam;- Cục Kiểm tra văn bản và Tổ chức thi hành pháp - Bộ Tư pháp;- Công báo;- Cổng thông tin điện tử của Chính phủ;- Cổng thông tin điện tử của Bộ Tài chính;- Các đơn vị thuộc Bộ Tài chính;- Các đơn vị thuộc Cục Hải quan;- Cổng thông tin điện tử Cục Hải quan;- Lưu: VT, CHQ (60b).","KT. BỘ TRƯỞNGTHỨ TRƯỞNGNguyễn Đức Chi"]]}]}],"forms":[{"code":"01-PYCPT-2026","title":"PHIẾU YÊU CẦU PHÂN TÍCH HÀNG HÓA XUẤT KHẨU, NHẬP KHẨU KIÊM BIÊN BẢN LẤY MẪU","pl":"","note":""},{"code":"02-PTNYCPT-2026","title":"PHIẾU TIẾP NHẬN YÊU CẦU PHÂN TÍCH HÀNG HÓA XUẤT KHẨU, NHẬP KHẨU","pl":"","note":""},{"code":"03-BBTLMHH-2026","title":"BIÊN BẢN TRẢ LẠI MẪU ĐÃ TIẾP NHẬN YÊU CẦU PHÂN TÍCH","pl":"","note":""},{"code":"04-TBKQPTPL-2026","title":"THÔNG BÁO","pl":"","note":""},{"code":"05-PGTL-2026","title":"PHIẾU GHI SỐ, NGÀY VĂN BẢN, CHỨNG TỪ THUỘC HỒ SƠ HẢI QUAN LIÊN QUAN ĐẾN MẪU HÀNG HÓA","pl":"","note":""}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
