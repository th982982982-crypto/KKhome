hành bất kỳ loại chứng khoán nào."}]},{"id":"luat-59_178","no":178,"code":"Điều 178","title":"Điều 178. Thực hiện góp vốn và cấp giấy chứng nhận phần vốn góp","shortTitle":"Thực hiện góp vốn và cấp giấy chứng nhận phần vốn góp","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên hợp danh và thành viên góp vốn phải góp đủ và đúng hạn số vốn đã cam kết."},{"k":"p","t":"2. Thành viên hợp danh không góp đủ và đúng hạn số vốn đã cam kết gây thiệt hại cho công ty phải chịu trách nhiệm bồi thường thiệt hại cho công ty."},{"k":"p","t":"3. Trường hợp có thành viên góp vốn không góp đủ và đúng hạn số vốn đã cam kết thì số vốn chưa góp đủ được coi là khoản nợ của thành viên đó đối với công ty; trong trường hợp này, thành viên góp vốn có liên quan có thể bị khai trừ khỏi công ty theo quyết định của Hội đồng thành viên."},{"k":"p","t":"4. Tại thời điểm góp đủ số vốn đã cam kết, thành viên được cấp giấy chứng nhận phần vốn góp. Giấy chứng nhận phần vốn góp phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Vốn điều lệ của công ty;"},{"k":"p","t":"c) Tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với thành viên là tổ chức; loại thành viên;"},{"k":"p","t":"d) Giá trị phần vốn góp và loại tài sản góp vốn của thành viên;"},{"k":"p","t":"đ) Số và ngày cấp giấy chứng nhận phần vốn góp;"},{"k":"p","t":"e) Quyền và nghĩa vụ của người sở hữu giấy chứng nhận phần vốn góp;"},{"k":"p","t":"g) Họ, tên, chữ ký của người sở hữu giấy chứng nhận phần vốn góp và của các thành viên hợp danh của công ty."},{"k":"p","t":"5. Trường hợp giấy chứng nhận phần vốn góp bị mất, bị hư hỏng hoặc bị hủy hoại dưới hình thức khác, thành viên được công ty cấp lại giấy chứng nhận phần vốn góp."}]},{"id":"luat-59_179","no":179,"code":"Điều 179","title":"Điều 179. Tài sản của công ty hợp danh","shortTitle":"Tài sản của công ty hợp danh","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"Tài sản của công ty hợp danh bao gồm:"},{"k":"p","t":"1. Tài sản góp vốn của các thành viên đã được chuyển quyền sở hữu cho công ty;"},{"k":"p","t":"2. Tài sản tạo lập được mang tên công ty;"},{"k":"p","t":"3. Tài sản thu được từ hoạt động kinh doanh do thành viên hợp danh thực hiện nhân danh công ty và từ hoạt động kinh doanh của công ty do thành viên hợp danh nhân danh cá nhân thực hiện;"},{"k":"p","t":"4. Tài sản khác theo quy định của pháp luật."}]},{"id":"luat-59_180","no":180,"code":"Điều 180","title":"Điều 180. Hạn chế quyền đối với thành viên hợp danh","shortTitle":"Hạn chế quyền đối với thành viên hợp danh","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên hợp danh không được làm chủ doanh nghiệp tư nhân; không được làm thành viên hợp danh của công ty hợp danh khác trừ trường hợp được sự nhất trí của các thành viên hợp danh còn lại."},{"k":"p","t":"2. Thành viên hợp danh không được nhân danh cá nhân hoặc nhân danh người khác kinh doanh cùng ngành, nghề kinh doanh của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác."},{"k":"p","t":"3. Thành viên hợp danh không được chuyển một phần hoặc toàn bộ phần vốn góp của mình tại công ty cho tổ chức, cá nhân khác nếu không được sự chấp thuận của các thành viên hợp danh còn lại."}]},{"id":"luat-59_181","no":181,"code":"Điều 181","title":"Điều 181. Quyền và nghĩa vụ của thành viên hợp danh","shortTitle":"Quyền và nghĩa vụ của thành viên hợp danh","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên hợp danh có quyền sau đây:"},{"k":"p","t":"a) Tham gia họp, thảo luận và biểu quyết về các vấn đề của công ty; mỗi thành viên hợp danh có một phiếu biểu quyết hoặc có số phiếu biểu quyết khác quy định tại Điều lệ công ty;"},{"k":"p","t":"b) Nhân danh công ty kinh doanh các ngành, nghề kinh doanh của công ty; đàm phán và ký kết hợp đồng, giao dịch hoặc giao ước với những điều kiện mà thành viên hợp danh đó cho là có lợi nhất cho công ty;"},{"k":"p","t":"c) Sử dụng tài sản của công ty để kinh doanh các ngành, nghề kinh doanh của công ty; trường hợp ứng trước tiền của mình để kinh doanh cho công ty thì có quyền yêu cầu công ty hoàn trả lại cả số tiền gốc và lãi theo lãi suất thị trường trên số tiền gốc đã ứng trước;"},{"k":"p","t":"d) Yêu cầu công ty bù đắp thiệt hại từ hoạt động kinh doanh trong phạm vi nhiệm vụ được phân công nếu thiệt hại đó xảy ra không phải do sai sót cá nhân của thành viên đó;"},{"k":"p","t":"đ) Yêu cầu công ty, thành viên hợp danh khác cung cấp thông tin về tình hình kinh doanh của công ty; kiểm tra tài sản, sổ kế toán và tài liệu khác của công ty khi thấy cần thiết;"},{"k":"p","t":"e) Được chia lợi nhuận tương ứng với tỷ lệ phần vốn góp hoặc theo thỏa thuận quy định tại Điều lệ công ty;"},{"k":"p","t":"g) Khi công ty giải thể hoặc phá sản, được chia giá trị tài sản còn lại tương ứng theo tỷ lệ phần vốn góp vào công ty nếu Điều lệ công ty không quy định một tỷ lệ khác;"},{"k":"p","t":"h) Trường hợp thành viên hợp danh chết thì người thừa kế của thành viên được hưởng phần giá trị tài sản tại công ty sau khi đã trừ đi phần nợ và nghĩa vụ tài sản khác thuộc trách nhiệm của thành viên đó. Người thừa kế có thể trở thành thành viên hợp danh nếu được Hội đồng thành viên chấp thuận;"},{"k":"p","t":"i) Quyền khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"2. Thành viên hợp danh có nghĩa vụ sau đây:"},{"k":"p","t":"a) Tiến hành quản lý và thực hiện hoạt động kinh doanh một cách trung thực, cẩn trọng và tốt nhất nhằm bảo đảm lợi ích hợp pháp tối đa cho công ty;"},{"k":"p","t":"b) Tiến hành quản lý và thực hiện hoạt động kinh doanh theo đúng quy định của pháp luật, Điều lệ công ty và nghị quyết, quyết định của Hội đồng thành viên; nếu làm trái quy định tại điểm này, gây thiệt hại cho công ty thì phải chịu trách nhiệm bồi thường thiệt hại;"},{"k":"p","t":"c) Không được sử dụng tài sản của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác;"},{"k":"p","t":"d) Hoàn trả cho công ty số tiền, tài sản đã nhận và bồi thường thiệt hại gây ra đối với công ty trong trường hợp nhân danh công ty, nhân danh cá nhân hoặc nhân danh người khác để nhận tiền hoặc tài sản khác từ hoạt động kinh doanh của công ty mà không đem nộp cho công ty;"},{"k":"p","t":"đ) Liên đới chịu trách nhiệm thanh toán hết số nợ còn lại của công ty nếu tài sản của công ty không đủ để trang trải số nợ của công ty;"},{"k":"p","t":"e) Chịu khoản lỗ tương ứng với phần vốn góp vào công ty hoặc theo thỏa thuận quy định tại Điều lệ công ty trong trường hợp công ty kinh doanh bị lỗ;"},{"k":"p","t":"g) Định kỳ hằng tháng báo cáo trung thực, chính xác bằng văn bản tình hình và kết quả kinh doanh của mình với công ty; cung cấp thông tin về tình hình và kết quả kinh doanh của mình cho thành viên có yêu cầu;"},{"k":"p","t":"h) Nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_182","no":182,"code":"Điều 182","title":"Điều 182. Hội đồng thành viên","shortTitle":"Hội đồng thành viên","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên bao gồm tất cả thành viên. Hội đồng thành viên bầu  một thành viên hợp danh làm Chủ tịch Hội đồng thành viên, đồng thời kiêm Giám đốc hoặc Tổng giám đốc công ty nếu Điều lệ công ty không có quy định khác."},{"k":"p","t":"2. Thành viên hợp danh có quyền yêu cầu triệu tập họp Hội đồng thành viên để thảo luận và quyết định công việc kinh doanh của công ty. Thành viên yêu cầu triệu tập họp phải chuẩn bị nội dung, chương trình và tài liệu họp."},{"k":"p","t":"3. Hội đồng thành viên có quyền quyết định tất cả công việc kinh doanh của công ty. Nếu Điều lệ công ty không quy định thì quyết định các vấn đề sau đây phải được ít nhất ba phần tư tổng số thành viên hợp danh tán thành:"},{"k":"p","t":"a) Định hướng, chiến lược phát triển công ty;"},{"k":"p","t":"b) Sửa đổi, bổ sung Điều lệ công ty;"},{"k":"p","t":"c) Tiếp nhận thêm thành viên mới;"},{"k":"p","t":"d) Chấp thuận thành viên hợp danh rút khỏi công ty hoặc quyết định khai trừ thành viên;"},{"k":"p","t":"đ) Quyết định dự án đầu tư;"},{"k":"p","t":"e) Quyết định việc vay và huy động vốn dưới hình thức khác, cho vay với giá trị từ 50% vốn điều lệ của công ty trở lên, trừ trường hợp Điều lệ công ty quy định một tỷ lệ khác cao hơn;"},{"k":"p","t":"g) Quyết định mua, bán tài sản có giá trị bằng hoặc lớn hơn vốn điều lệ của công ty, trừ trường hợp Điều lệ công ty quy định một tỷ lệ khác cao hơn;"},{"k":"p","t":"h) Thông qua báo cáo tài chính hằng năm, tổng số lợi nhuận được chia và số lợi nhuận chia cho từng thành viên;"},{"k":"p","t":"i) Quyết định giải thể; yêu cầu phá sản công ty."},{"k":"p","t":"4. Quyết định về vấn đề khác không quy định tại khoản 3 Điều này được thông qua nếu được ít nhất hai phần ba tổng số thành viên hợp danh tán thành; tỷ lệ cụ thể do Điều lệ công ty quy định."},{"k":"p","t":"5. Quyền tham gia biểu quyết của thành viên góp vốn được thực hiện theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_183","no":183,"code":"Điều 183","title":"Điều 183. Triệu tập họp Hội đồng thành viên","shortTitle":"Triệu tập họp Hội đồng thành viên","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch Hội đồng thành viên có thể triệu tập họp Hội đồng thành viên khi xét thấy cần thiết hoặc theo yêu cầu của thành viên hợp danh. Trường hợp Chủ tịch Hội đồng thành viên không triệu tập họp theo yêu cầu của thành viên hợp danh thì thành viên đó triệu tập họp Hội đồng thành viên."},{"k":"p","t":"2. Thông báo mời họp Hội đồng thành viên có thể gửi bằng giấy mời, điện thoại, fax, phương tiện điện tử hoặc phương thức khác do Điều lệ công ty quy định. Thông báo mời họp phải nêu rõ mục đích, yêu cầu và nội dung họp, chương trình và địa điểm họp, tên thành viên yêu cầu triệu tập họp."},{"k":"p","t":"Các tài liệu thảo luận được sử dụng để quyết định các vấn đề quy định tại khoản 3 Điều 182 của Luật này phải được gửi trước đến tất cả thành viên; thời hạn gửi trước do Điều lệ công ty quy định."},{"k":"p","t":"3. Chủ tịch Hội đồng thành viên hoặc thành viên yêu cầu triệu tập họp chủ tọa cuộc họp. Cuộc họp Hội đồng thành viên phải được ghi biên bản, bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính;"},{"k":"p","t":"b) Thời gian, địa điểm họp;"},{"k":"p","t":"c) Mục đích, chương trình và nội dung họp;"},{"k":"p","t":"d) Họ, tên chủ tọa, thành viên dự họp;"},{"k":"p","t":"đ) Ý kiến của thành viên dự họp;"},{"k":"p","t":"e) Nghị quyết, quyết định được thông qua, số thành viên tán thành, không tán thành, không có ý kiến và nội dung cơ bản của nghị quyết, quyết định đó;"},{"k":"p","t":"g) Họ, tên, chữ ký của các thành viên dự họp."}]},{"id":"luat-59_184","no":184,"code":"Điều 184","title":"Điều 184. Điều hành kinh doanh của công ty hợp danh","shortTitle":"Điều hành kinh doanh của công ty hợp danh","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Các thành viên hợp danh là người đại diện theo pháp luật của công ty và tổ chức điều hành hoạt động kinh doanh hằng ngày của công ty. Mọi hạn chế đối với thành viên hợp danh trong thực hiện công việc kinh doanh hằng ngày của công ty chỉ có hiệu lực đối với bên thứ ba khi người đó được biết về hạn chế đó."},{"k":"p","t":"2. Trong điều hành hoạt động kinh doanh của công ty, thành viên hợp danh phân công nhau đảm nhiệm các chức danh quản lý và kiểm soát công ty."},{"k":"p","t":"Khi một số hoặc tất cả thành viên hợp danh cùng thực hiện một số công việc kinh doanh thì quyết định được thông qua theo nguyên tắc đa số chấp thuận."},{"k":"p","t":"Hoạt động do thành viên hợp danh thực hiện ngoài phạm vi hoạt động kinh doanh của công ty đều không thuộc trách nhiệm của công ty, trừ trường hợp hoạt động đó đã được các thành viên còn lại chấp thuận."},{"k":"p","t":"3. Công ty có thể mở một hoặc một số tài khoản tại ngân hàng. Hội đồng thành viên chỉ định thành viên được ủy quyền gửi và rút tiền từ các tài khoản đó."},{"k":"p","t":"4. Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc có các nghĩa vụ sau đây:"},{"k":"p","t":"a) Quản lý và điều hành công việc kinh doanh hằng ngày của công ty với tư cách là thành viên hợp danh;"},{"k":"p","t":"b) Triệu tập và tổ chức họp Hội đồng thành viên; ký nghị quyết, quyết định của Hội đồng thành viên;"},{"k":"p","t":"c) Phân công, phối hợp công việc kinh doanh giữa các thành viên hợp danh;"},{"k":"p","t":"d) Tổ chức sắp xếp, lưu giữ đầy đủ và trung thực sổ kế toán, hóa đơn, chứng từ và các tài liệu khác của công ty theo quy định của pháp luật;"},{"k":"p","t":"đ) Đại diện cho công ty với tư cách người yêu cầu giải quyết việc dân sự, nguyên đơn, bị đơn, người có quyền lợi, nghĩa vụ liên quan trước Trọng tài, Tòa án; đại diện cho công ty thực hiện quyền, nghĩa vụ khác theo quy định của pháp luật;"},{"k":"p","t":"e) Nghĩa vụ khác do Điều lệ công ty quy định."}]},{"id":"luat-59_185","no":185,"code":"Điều 185","title":"Điều 185. Chấm dứt tư cách thành viên hợp danh","shortTitle":"Chấm dứt tư cách thành viên hợp danh","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên hợp danh bị chấm dứt tư cách trong trường hợp sau đây:"},{"k":"p","t":"a) Tự nguyện rút vốn khỏi công ty;"},{"k":"p","t":"b) Chết, mất tích, bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi;"},{"k":"p","t":"c) Bị khai trừ khỏi công ty;"},{"k":"p","t":"d) Chấp hành hình phạt tù hoặc bị Tòa án cấm hành nghề hoặc làm công việc nhất định theo quy định của pháp luật;"},{"k":"p","t":"đ) Trường hợp khác do Điều lệ công ty quy định."},{"k":"p","t":"2. Thành viên hợp danh có quyền rút vốn khỏi công ty nếu được Hội đồng thành viên chấp thuận. Trường hợp này, thành viên muốn rút vốn khỏi công ty phải thông báo bằng văn bản yêu cầu rút vốn chậm nhất là 06 tháng trước ngày rút vốn; chỉ được rút vốn vào thời điểm kết thúc năm tài chính và báo cáo tài chính của năm tài chính đó đã được thông qua."},{"k":"p","t":"3. Thành viên hợp danh bị khai trừ khỏi công ty trong trường hợp sau đây:"},{"k":"p","t":"a) Không có khả năng góp vốn hoặc không góp vốn như đã cam kết sau khi công ty đã có yêu cầu lần thứ hai;"},{"k":"p","t":"b) Vi phạm quy định tại Điều 180 của Luật này;"},{"k":"p","t":"c) Tiến hành công việc kinh doanh không trung thực, không cẩn trọng hoặc có hành vi không thích hợp khác gây thiệt hại nghiêm trọng đến lợi ích của công ty và thành viên khác;"},{"k":"p","t":"d) Không thực hiện đúng nghĩa vụ của thành viên hợp danh."},{"k":"p","t":"4. Trường hợp chấm dứt tư cách thành viên của thành viên bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi thì phần vốn góp của thành viên đó được hoàn trả công bằng và thỏa đáng."},{"k":"p","t":"5. Trong thời hạn 02 năm kể từ ngày chấm dứt tư cách thành viên hợp danh theo quy định tại các điểm a, c, d và đ khoản 1 Điều này thì người đó vẫn phải liên đới chịu trách nhiệm bằng toàn bộ tài sản của mình đối với các khoản nợ của công ty đã phát sinh trước ngày chấm dứt tư cách thành viên."},{"k":"p","t":"6. Sau khi chấm dứt tư cách thành viên hợp danh, nếu tên của thành viên đó đã được sử dụng thành một phần hoặc toàn bộ tên công ty thì người đó hoặc người thừa kế, người đại diện theo pháp luật của họ có quyền yêu cầu công ty chấm dứt việc sử dụng tên đó."}]},{"id":"luat-59_186","no":186,"code":"Điều 186","title":"Điều 186. Tiếp nhận thành viên mới","shortTitle":"Tiếp nhận thành viên mới","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty có thể tiếp nhận thêm thành viên hợp danh hoặc thành viên góp vốn; việc tiếp nhận thành viên mới của công ty phải được Hội đồng thành viên chấp thuận."},{"k":"p","t":"2. Thành viên hợp danh hoặc thành viên góp vốn phải nộp đủ số vốn cam kết góp vào công ty trong thời hạn 15 ngày kể từ ngày được chấp thuận, trừ trường hợp Hội đồng thành viên quyết định thời hạn khác."},{"k":"p","t":"3. Thành viên hợp danh mới phải cùng liên đới chịu trách nhiệm bằng toàn bộ tài sản của mình đối với các khoản nợ và nghĩa vụ tài sản khác của công ty, trừ trường hợp thành viên đó và các thành viên còn lại có thỏa thuận khác."}]},{"id":"luat-59_187","no":187,"code":"Điều 187","title":"Điều 187. Quyền và nghĩa vụ của thành viên góp vốn","shortTitle":"Quyền và nghĩa vụ của thành viên góp vốn","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên góp vốn có quyền sau đây:"},{"k":"p","t":"a) Tham gia họp, thảo luận và biểu quyết tại Hội đồng thành viên về việc sửa đổi, bổ sung Điều lệ công ty, sửa đổi, bổ sung các quyền và nghĩa vụ của thành viên góp vốn, về tổ chức lại, giải thể công ty và nội dung khác của Điều lệ công ty có liên quan trực tiếp đến quyền và nghĩa vụ của họ;"},{"k":"p","t":"b) Được chia lợi nhuận hằng năm tương ứng với tỷ lệ phần vốn góp trong vốn điều lệ của công ty;"},{"k":"p","t":"c) Được cung cấp báo cáo tài chính hằng năm của công ty; có quyền yêu cầu Chủ tịch Hội đồng thành viên, thành viên hợp danh cung cấp đầy đủ và trung thực thông tin về tình hình và kết quả kinh doanh của công ty; xem xét sổ kế toán, biên bản, hợp đồng, giao dịch, hồ sơ và tài liệu khác của công ty;"},{"k":"p","t":"d) Chuyển nhượng phần vốn góp của mình tại công ty cho người khác;"},{"k":"p","t":"đ) Nhân danh cá nhân hoặc nhân danh người khác tiến hành kinh doanh ngành, nghề kinh doanh của công ty;"},{"k":"p","t":"e) Định đoạt phần vốn góp của mình bằng cách để thừa kế, tặng cho, thế chấp, cầm cố và các hình thức khác theo quy định của pháp luật và Điều lệ công ty; trường hợp chết thì người thừa kế thay thế thành viên đã chết trở thành thành viên góp vốn của công ty;"},{"k":"p","t":"g) Được chia một phần giá trị tài sản còn lại của công ty tương ứng với tỷ lệ phần vốn góp trong vốn điều lệ công ty khi công ty giải thể hoặc phá sản;"},{"k":"p","t":"h) Quyền khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"2. Thành viên góp vốn có nghĩa vụ sau đây:"},{"k":"p","t":"a) Chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi số vốn đã cam kết góp;"},{"k":"p","t":"b) Không được tham gia quản lý công ty, không được tiến hành công việc kinh doanh nhân danh công ty;"},{"k":"p","t":"c) Tuân thủ Điều lệ công ty, nghị quyết và quyết định của Hội đồng thành viên;"},{"k":"p","t":"d) Nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_188","no":188,"code":"Điều 188","title":"Điều 188. Doanh nghiệp tư nhân","shortTitle":"Doanh nghiệp tư nhân","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp tư nhân là doanh nghiệp do một cá nhân làm chủ và tự chịu trách nhiệm bằng toàn bộ tài sản của mình về mọi hoạt động của doanh nghiệp."},{"k":"p","t":"2. Doanh nghiệp tư nhân không được phát hành bất kỳ loại chứng khoán nào."},{"k":"p","t":"3. Mỗi cá nhân chỉ được quyền thành lập một doanh nghiệp tư nhân. Chủ doanh nghiệp tư nhân không được đồng thời là chủ hộ kinh doanh, thành viên hợp danh của công ty hợp danh."},{"k":"p","t":"4. Doanh nghiệp tư nhân không được quyền góp vốn thành lập hoặc mua cổ phần, phần vốn góp trong công ty hợp danh, công ty trách nhiệm hữu hạn hoặc công ty cổ phần."}]},{"id":"luat-59_189","no":189,"code":"Điều 189","title":"Điều 189. Vốn đầu tư của chủ doanh nghiệp tư nhân","shortTitle":"Vốn đầu tư của chủ doanh nghiệp tư nhân","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Vốn đầu tư của chủ doanh nghiệp tư nhân do chủ doanh nghiệp tự đăng ký. Chủ doanh nghiệp tư nhân có nghĩa vụ đăng ký chính xác tổng số vốn đầu tư, trong đó nêu rõ số vốn bằng Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng và tài sản khác; đối với vốn bằng tài sản khác còn phải ghi rõ loại tài sản, số lượng và giá trị còn lại của mỗi loại tài sản."},{"k":"p","t":"2. Toàn bộ vốn và tài sản kể cả vốn vay và tài sản thuê được sử dụng vào hoạt động kinh doanh của doanh nghiệp phải được ghi chép đầy đủ vào sổ kế toán và báo cáo tài chính của doanh nghiệp theo quy định của pháp luật."},{"k":"p","t":"3. Trong quá trình hoạt động, chủ doanh nghiệp tư nhân có quyền tăng hoặc giảm vốn đầu tư của mình vào hoạt động kinh doanh của doanh nghiệp. Việc tăng hoặc giảm vốn đầu tư của chủ doanh nghiệp tư nhân phải được ghi chép đầy đủ vào sổ kế toán. Trường hợp giảm vốn đầu tư xuống thấp hơn vốn đầu tư đã đăng ký thì chủ doanh nghiệp tư nhân chỉ được giảm vốn sau khi đã đăng ký với Cơ quan đăng ký kinh doanh."}]},{"id":"luat-59_190","no":190,"code":"Điều 190","title":"Điều 190. Quản lý doanh nghiệp tư nhân","shortTitle":"Quản lý doanh nghiệp tư nhân","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ doanh nghiệp tư nhân có toàn quyền quyết định đối với tất cả hoạt động kinh doanh của doanh nghiệp tư nhân, việc sử dụng lợi nhuận sau khi đã nộp thuế và thực hiện nghĩa vụ tài chính khác theo quy định của pháp luật."},{"k":"p","t":"2. Chủ doanh nghiệp tư nhân có thể trực tiếp hoặc thuê người khác làm Giám đốc hoặc Tổng giám đốc để quản lý, điều hành hoạt động kinh doanh; trường hợp này, chủ doanh nghiệp tư nhân vẫn phải chịu trách nhiệm về mọi hoạt động kinh doanh của doanh nghiệp tư nhân."},{"k":"p","t":"3. Chủ doanh nghiệp tư nhân là người đại diện theo pháp luật, đại diện cho doanh nghiệp tư nhân với tư cách người yêu cầu giải quyết việc dân sự, nguyên đơn, bị đơn, người có quyền lợi, nghĩa vụ liên quan trước Trọng tài, Tòa án, đại diện cho doanh nghiệp tư nhân thực hiện quyền và nghĩa vụ khác theo quy định của pháp luật."}]},{"id":"luat-59_191","no":191,"code":"Điều 191","title":"Điều 191. Cho thuê doanh nghiệp tư nhân","shortTitle":"Cho thuê doanh nghiệp tư nhân","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Chủ doanh nghiệp tư nhân có quyền cho thuê toàn bộ doanh nghiệp tư nhân của mình nhưng phải thông báo bằng văn bản kèm theo bản sao hợp đồng cho thuê có công chứng đến Cơ quan đăng ký kinh doanh, cơ quan thuế trong thời hạn 03 ngày làm việc kể từ ngày hợp đồng cho thuê có hiệu lực. Trong thời hạn cho thuê, chủ doanh nghiệp tư nhân vẫn phải chịu trách nhiệm trước pháp luật với tư cách là chủ sở hữu doanh nghiệp tư nhân. Quyền, nghĩa vụ và trách nhiệm của chủ sở hữu và người thuê đối với hoạt động kinh doanh của doanh nghiệp tư nhân được quy định trong hợp đồng cho thuê."}]},{"id":"luat-59_192","no":192,"code":"Điều 192","title":"Điều 192. Bán doanh nghiệp tư nhân","shortTitle":"Bán doanh nghiệp tư nhân","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ doanh nghiệp tư nhân có quyền bán doanh nghiệp tư nhân của mình cho cá nhân, tổ chức khác."},{"k":"p","t":"2. Sau khi bán doanh nghiệp tư nhân, chủ doanh nghiệp tư nhân vẫn phải chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của doanh nghiệp tư nhân phát sinh trong thời gian trước ngày chuyển giao doanh nghiệp, trừ trường hợp chủ doanh nghiệp tư nhân, người mua và chủ nợ của doanh nghiệp tư nhân có thỏa thuận khác."},{"k":"p","t":"3. Chủ doanh nghiệp tư nhân, người mua doanh nghiệp tư nhân phải tuân thủ quy định của pháp luật về lao động."},{"k":"p","t":"4. Người mua doanh nghiệp tư nhân phải đăng ký thay đổi chủ doanh nghiệp tư nhân theo quy định của Luật này."}]},{"id":"luat-59_193","no":193,"code":"Điều 193","title":"Điều 193. Thực hiện quyền của chủ doanh nghiệp tư nhân trong một số trường hợp đặc biệt","shortTitle":"Thực hiện quyền của chủ doanh nghiệp tư nhân trong một số trường hợp đặc biệt","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp chủ doanh nghiệp tư nhân bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc thì ủy quyền cho người khác thực hiện quyền và nghĩa vụ của mình."},{"k":"p","t":"2. Trường hợp chủ doanh nghiệp tư nhân chết thì người thừa kế hoặc một trong những người thừa kế theo di chúc hoặc theo pháp luật là chủ doanh nghiệp tư nhân theo thỏa thuận giữa những người thừa kế. Trường hợp những người thừa kế không thỏa thuận được thì đăng ký chuyển đổi thành công ty hoặc giải thể doanh nghiệp tư nhân đó."},{"k":"p","t":"3. Trường hợp chủ doanh nghiệp tư nhân chết mà không có người thừa kế, người thừa kế từ chối nhận thừa kế hoặc bị truất quyền thừa kế thì tài sản của chủ doanh nghiệp tư nhân được xử lý theo quy định của pháp luật về dân sự."},{"k":"p","t":"4. Trường hợp chủ doanh nghiệp tư nhân bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi thì quyền và nghĩa vụ của chủ doanh nghiệp tư nhân được thực hiện thông qua người đại diện."},{"k":"p","t":"5. Trường hợp chủ doanh nghiệp tư nhân bị Tòa án cấm hành nghề hoặc làm công việc nhất định thuộc phạm vi ngành, nghề kinh doanh của doanh nghiệp thì chủ doanh nghiệp tư nhân tạm ngừng, chấm dứt kinh doanh ngành, nghề có liên quan theo quyết định của Tòa án hoặc chuyển nhượng doanh nghiệp tư nhân cho cá nhân, tổ chức khác."},{"k":"p","t":"Chương VIIINHÓM CÔNG TY"}]},{"id":"luat-59_194","no":194,"code":"Điều 194","title":"Điều 194. Tập đoàn kinh tế, tổng công ty","shortTitle":"Tập đoàn kinh tế, tổng công ty","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Tập đoàn kinh tế, tổng công ty thuộc các thành phần kinh tế là nhóm công ty có mối quan hệ với nhau thông qua sở hữu cổ phần, phần vốn góp hoặc liên kết khác. Tập đoàn kinh tế, tổng công ty không phải là một loại hình doanh nghiệp, không có tư cách pháp nhân, không phải đăng ký thành lập theo quy định của Luật này."},{"k":"p","t":"2. Tập đoàn kinh tế, tổng công ty có công ty mẹ, công ty con và các công ty thành viên khác. Công ty mẹ, công ty con và mỗi công ty thành viên trong tập đoàn kinh tế, tổng công ty có quyền và nghĩa vụ của doanh nghiệp độc lập theo quy định của pháp luật."}]},{"id":"luat-59_195","no":195,"code":"Điều 195","title":"Điều 195. Công ty mẹ, công ty con","shortTitle":"Công ty mẹ, công ty con","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Một công ty được coi là công ty mẹ của công ty khác nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Sở hữu trên 50% vốn điều lệ hoặc tổng số cổ phần phổ thông của công ty đó;"},{"k":"p","t":"b) Có quyền trực tiếp hoặc gián tiếp quyết định bổ nhiệm đa số hoặc tất cả thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc của công ty đó;"},{"k":"p","t":"c) Có quyền quyết định việc sửa đổi, bổ sung Điều lệ của công ty đó."},{"k":"p","t":"2. Công ty con không được đầu tư mua cổ phần, góp vốn vào công ty mẹ. Các công ty con của cùng một công ty mẹ không được đồng thời cùng góp vốn, mua cổ phần để sở hữu chéo lẫn nhau."},{"k":"p","t":"3. Các công ty con có cùng một công ty mẹ là doanh nghiệp có sở hữu ít nhất 65% vốn nhà nước không được cùng nhau góp vốn, mua cổ phần của doanh nghiệp khác hoặc để thành lập doanh nghiệp mới theo quy định của Luật này."},{"k":"p","t":"4. Chính phủ quy định chi tiết khoản 2 và khoản 3 Điều này."}]},{"id":"luat-59_196","no":196,"code":"Điều 196","title":"Điều 196. Quyền, nghĩa vụ và trách nhiệm của công ty mẹ đối với công ty con","shortTitle":"Quyền, nghĩa vụ và trách nhiệm của công ty mẹ đối với công ty con","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Tùy thuộc vào loại hình pháp lý của công ty con, công ty mẹ thực hiện quyền và nghĩa vụ của mình với tư cách là thành viên, chủ sở hữu hoặc cổ đông trong quan hệ với công ty con theo quy định tương ứng của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Hợp đồng, giao dịch và quan hệ khác giữa công ty mẹ và công ty con đều phải được thiết lập và thực hiện độc lập, bình đẳng theo điều kiện áp dụng đối với chủ thể pháp lý độc lập."},{"k":"p","t":"3. Trường hợp công ty mẹ can thiệp ngoài thẩm quyền của chủ sở hữu, thành viên hoặc cổ đông và buộc công ty con phải thực hiện hoạt động kinh doanh trái với thông lệ kinh doanh bình thường hoặc thực hiện hoạt động không sinh lợi mà không đền bù hợp lý trong năm tài chính có liên quan, gây thiệt hại cho công ty con thì công ty mẹ phải chịu trách nhiệm về thiệt hại đó."},{"k":"p","t":"4. Người quản lý công ty mẹ chịu trách nhiệm về việc can thiệp buộc công ty con thực hiện hoạt động kinh doanh theo quy định tại khoản 3 Điều này phải liên đới cùng công ty mẹ chịu trách nhiệm về thiệt hại đó."},{"k":"p","t":"5. Trường hợp công ty mẹ không đền bù cho công ty con theo quy định tại khoản 3 Điều này thì chủ nợ hoặc thành viên, cổ đông có sở hữu ít nhất 01% vốn điều lệ của công ty con có quyền nhân danh chính mình hoặc nhân danh công ty con yêu cầu công ty mẹ đền bù thiệt hại cho công ty con."},{"k":"p","t":"6. Trường hợp hoạt động kinh doanh theo quy định tại khoản 3 Điều này do công ty con thực hiện đem lại lợi ích cho công ty con khác của cùng một công ty mẹ thì công ty con được hưởng lợi phải liên đới cùng công ty mẹ hoàn trả khoản lợi được hưởng cho công ty con bị thiệt hại."}]},{"id":"luat-59_197","no":197,"code":"Điều 197","title":"Điều 197. Báo cáo tài chính của công ty mẹ, công ty con","shortTitle":"Báo cáo tài chính của công ty mẹ, công ty con","chuong":"Chương VII — DOANH NGHIỆP TƯ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Vào thời điểm kết thúc năm tài chính, ngoài báo cáo và tài liệu theo quy định của pháp luật, công ty mẹ còn phải lập các báo cáo sau đây:"},{"k":"p","t":"a) Báo cáo tài chính hợp nhất của công ty mẹ theo quy định của pháp luật về kế toán;"},{"k":"p","t":"b) Báo cáo tổng hợp kết quả kinh doanh hằng năm của công ty mẹ và công ty con;"},{"k":"p","t":"c) Báo cáo tổng hợp công tác quản lý, điều hành của công ty mẹ và công ty con."},{"k":"p","t":"2. Khi có yêu cầu của người đại diện theo pháp luật của công ty mẹ, người đại diện theo pháp luật của công ty con phải cung cấp báo cáo, tài liệu và thông tin cần thiết theo quy định để lập báo cáo tài chính hợp nhất và báo cáo tổng hợp của công ty mẹ và công ty con."},{"k":"p","t":"3. Người chịu trách nhiệm lập báo cáo của công ty mẹ sử dụng báo cáo quy định tại khoản 2 Điều này để lập báo cáo tài chính hợp nhất và báo cáo tổng hợp của công ty mẹ và công ty con nếu không có nghi ngờ về việc báo cáo do công ty con lập và đệ trình có thông tin sai lệch, không chính xác hoặc giả mạo."},{"k":"p","t":"4. Người chịu trách nhiệm lập báo cáo quy định tại khoản 1 Điều này chưa được lập và đệ trình các báo cáo đó nếu chưa nhận được đầy đủ báo cáo tài chính của công ty con. Trong trường hợp người quản lý công ty mẹ đã áp dụng các biện pháp cần thiết trong phạm vi thẩm quyền mà vẫn không nhận được báo cáo, tài liệu và thông tin cần thiết theo quy định từ công ty con thì người quản lý công ty mẹ vẫn lập và trình báo cáo tài chính hợp nhất, báo cáo tổng hợp của công ty mẹ và công ty con. Báo cáo có thể gồm hoặc không gồm thông tin từ công ty con đó, nhưng phải có giải trình cần thiết để tránh hiểu nhầm hoặc hiểu sai lệch."},{"k":"p","t":"5. Báo cáo, tài liệu quyết toán tài chính hằng năm, báo cáo tài chính hợp nhất, báo cáo tổng hợp của công ty mẹ, công ty con phải được lưu giữ tại trụ sở chính của công ty mẹ. Bản sao của báo cáo, tài liệu quy định tại khoản này phải được lưu giữ tại chi nhánh của công ty mẹ tại Việt Nam."},{"k":"p","t":"6. Ngoài báo cáo, tài liệu theo quy định của pháp luật, công ty con còn phải lập báo cáo tổng hợp về mua, bán và giao dịch khác với công ty mẹ."}]},{"id":"luat-59_198","no":198,"code":"Điều 198","title":"Điều 198. Chia công ty","shortTitle":"Chia công ty","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn, công ty cổ phần có thể chia các tài sản, quyền và nghĩa vụ, thành viên, cổ đông của công ty hiện có (sau đây gọi là công ty bị chia) để thành lập hai hoặc nhiều công ty mới."},{"k":"p","t":"2. Thủ tục chia công ty trách nhiệm hữu hạn, công ty cổ phần được quy định như sau:"},{"k":"p","t":"a) Hội đồng thành viên, chủ sở hữu công ty hoặc Đại hội đồng cổ đông của công ty bị chia thông qua nghị quyết, quyết định chia công ty theo quy định của Luật này và Điều lệ công ty. Nghị quyết, quyết định chia công ty phải gồm các nội dung chủ yếu sau: tên, địa chỉ trụ sở chính của công ty bị chia, tên các công ty sẽ thành lập; nguyên tắc, cách thức và thủ tục chia tài sản công ty; phương án sử dụng lao động; cách thức phân chia, thời hạn và thủ tục chuyển đổi phần vốn góp, cổ phần, trái phiếu của công ty bị chia sang các công ty mới thành lập; nguyên tắc giải quyết nghĩa vụ của công ty bị chia; thời hạn thực hiện chia công ty. Nghị quyết, quyết định chia công ty phải được gửi đến tất cả chủ nợ và thông báo cho người lao động biết trong thời hạn 15 ngày kể từ ngày ra quyết định hoặc thông qua nghị quyết;"},{"k":"p","t":"b) Thành viên, chủ sở hữu công ty hoặc cổ đông của công ty mới được thành lập thông qua Điều lệ, bầu hoặc bổ nhiệm Chủ tịch Hội đồng thành viên, Chủ tịch công ty, Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và tiến hành đăng ký doanh nghiệp theo quy định của Luật này. Trong trường hợp này, hồ sơ đăng ký doanh nghiệp đối với công ty mới phải kèm theo nghị quyết, quyết định chia công ty quy định tại điểm a khoản này."},{"k":"p","t":"3. Số lượng thành viên, cổ đông và số lượng, tỷ lệ sở hữu cổ phần, phần vốn góp của thành viên, cổ đông và vốn điều lệ của các công ty mới sẽ được ghi tương ứng với cách thức phân chia, chuyển đổi phần vốn góp, cổ phần của công ty bị chia sang các công ty mới theo nghị quyết, quyết định chia công ty."},{"k":"p","t":"4. Công ty bị chia chấm dứt tồn tại sau khi các công ty mới được cấp Giấy chứng nhận đăng ký doanh nghiệp. Các công ty mới phải cùng liên đới chịu trách nhiệm về nghĩa vụ, các khoản nợ chưa thanh toán, hợp đồng lao động và nghĩa vụ tài sản khác của công ty bị chia hoặc thỏa thuận với chủ nợ, khách hàng và người lao động để một trong số các công ty đó thực hiện nghĩa vụ này. Các công ty mới đương nhiên kế thừa toàn bộ quyền, nghĩa vụ và lợi ích hợp pháp được phân chia theo nghị quyết, quyết định chia công ty."},{"k":"p","t":"5. Cơ quan đăng ký kinh doanh cập nhật tình trạng pháp lý của công ty bị chia trong Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp khi cấp Giấy chứng nhận đăng ký doanh nghiệp cho các công ty mới. Trường hợp công ty mới có địa chỉ trụ sở chính ngoài tỉnh, thành phố trực thuộc trung ương nơi công ty bị chia có trụ sở chính thì Cơ quan đăng ký kinh doanh nơi đặt trụ sở chính của công ty mới phải thông báo việc đăng ký doanh nghiệp đối với công ty mới cho Cơ quan đăng ký kinh doanh nơi công ty bị chia đặt trụ sở chính để cập nhật tình trạng pháp lý của công ty bị chia trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."}]},{"id":"luat-59_199","no":199,"code":"Điều 199","title":"Điều 199. Tách công ty","shortTitle":"Tách công ty","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn, công ty cổ phần có thể tách bằng cách chuyển một phần tài sản, quyền, nghĩa vụ, thành viên, cổ đông của công ty hiện có (sau đây gọi là công ty bị tách) để thành lập một hoặc một số công ty trách nhiệm hữu hạn, công ty cổ phần mới (sau đây gọi là công ty được tách) mà không chấm dứt tồn tại của công ty bị tách."},{"k":"p","t":"2. Công ty bị tách phải đăng ký thay đổi vốn điều lệ, số lượng thành viên, cổ đông tương ứng với phần vốn góp, cổ phần và số lượng thành viên, cổ đông giảm xuống (nếu có); đồng thời đăng ký doanh nghiệp đối với các công ty được tách."},{"k":"p","t":"3. Thủ tục tách công ty trách nhiệm hữu hạn và công ty cổ phần được quy định như sau:"},{"k":"p","t":"a) Hội đồng thành viên, chủ sở hữu công ty hoặc Đại hội đồng cổ đông của công ty bị tách thông qua nghị quyết, quyết định tách công ty theo quy định của Luật này và Điều lệ công ty. Nghị quyết, quyết định tách công ty phải gồm các nội dung chủ yếu sau: tên, địa chỉ trụ sở chính của công ty bị tách; tên công ty được tách sẽ thành lập; phương án sử dụng lao động; cách thức tách công ty; giá trị tài sản, quyền và nghĩa vụ được chuyển từ công ty bị tách sang công ty được tách; thời hạn thực hiện tách công ty. Nghị quyết, quyết định tách công ty phải được gửi đến tất cả chủ nợ và thông báo cho người lao động biết trong thời hạn 15 ngày kể từ ngày ra quyết định hoặc thông qua nghị quyết;"},{"k":"p","t":"b) Các thành viên, chủ sở hữu công ty hoặc cổ đông của công ty được tách thông qua Điều lệ, bầu hoặc bổ nhiệm Chủ tịch Hội đồng thành viên, Chủ tịch công ty, Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và tiến hành đăng ký doanh nghiệp theo quy định của Luật này."},{"k":"p","t":"4. Sau khi đăng ký doanh nghiệp, công ty bị tách và công ty được tách phải cùng liên đới chịu trách nhiệm về các nghĩa vụ, các khoản nợ chưa thanh toán, hợp đồng lao động và nghĩa vụ tài sản khác của công ty bị tách, trừ trường hợp công ty bị tách, công ty được tách, chủ nợ, khách hàng và người lao động của công ty bị tách có thỏa thuận khác. Các công ty được tách đương nhiên kế thừa toàn bộ quyền, nghĩa vụ và lợi ích hợp pháp được phân chia theo nghị quyết, quyết định tách công ty."}]},{"id":"luat-59_200","no":200,"code":"Điều 200","title":"Điều 200. Hợp nhất công ty","shortTitle":"Hợp nhất công ty","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Hai hoặc một số công ty (sau đây gọi là công ty bị hợp nhất) có thể hợp nhất thành một công ty mới (sau đây gọi là công ty hợp nhất), đồng thời chấm dứt tồn tại của các công ty bị hợp nhất."},{"k":"p","t":"2. Thủ tục hợp nhất công ty được quy định như sau:"},{"k":"p","t":"a) Công ty bị hợp nhất chuẩn bị hợp đồng hợp nhất, dự thảo Điều lệ công ty hợp nhất. Hợp đồng hợp nhất phải gồm các nội dung chủ yếu sau: tên, địa chỉ trụ sở chính của công ty bị hợp nhất; tên, địa chỉ trụ sở chính của công ty hợp nhất; thủ tục và điều kiện hợp nhất; phương án sử dụng lao động; thời hạn, thủ tục và điều kiện chuyển đổi tài sản, chuyển đổi phần vốn góp, cổ phần, trái phiếu của công ty bị hợp nhất thành phần vốn góp, cổ phần, trái phiếu của công ty hợp nhất; thời hạn thực hiện hợp nhất;"},{"k":"p","t":"b) Các thành viên, chủ sở hữu công ty hoặc cổ đông của công ty bị hợp nhất thông qua hợp đồng hợp nhất, Điều lệ công ty hợp nhất, bầu hoặc bổ nhiệm Chủ tịch Hội đồng thành viên, Chủ tịch công ty, Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc công ty hợp nhất và tiến hành đăng ký doanh nghiệp đối với công ty hợp nhất theo quy định của Luật này. Hợp đồng hợp nhất phải được gửi đến các chủ nợ và thông báo cho người lao động biết trong thời hạn 15 ngày kể từ ngày thông qua."},{"k":"p","t":"3. Công ty bị hợp nhất phải bảo đảm tuân thủ quy định của Luật Cạnh tranh về hợp nhất công ty."},{"k":"p","t":"4. Sau khi công ty hợp nhất đăng ký doanh nghiệp, công ty bị hợp nhất chấm dứt tồn tại; công ty hợp nhất được hưởng quyền và lợi ích hợp pháp, chịu trách nhiệm về các nghĩa vụ, các khoản nợ chưa thanh toán, hợp đồng lao động và các nghĩa vụ tài sản khác của các công ty bị hợp nhất. Công ty hợp nhất đương nhiên kế thừa toàn bộ quyền, nghĩa vụ và lợi ích hợp pháp của các công ty bị hợp nhất theo hợp đồng hợp nhất công ty."},{"k":"p","t":"5. Cơ quan đăng ký kinh doanh cập nhật tình trạng pháp lý của công ty bị hợp nhất trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp khi cấp Giấy chứng nhận đăng ký doanh nghiệp cho công ty hợp nhất. Trường hợp công ty bị hợp nhất có địa chỉ trụ sở chính ngoài tỉnh, thành phố trực thuộc trung ương nơi công ty hợp nhất đặt trụ sở chính thì Cơ quan đăng ký kinh doanh nơi công ty hợp nhất đặt trụ sở chính phải thông báo việc đăng ký doanh nghiệp cho Cơ quan đăng ký kinh doanh nơi công ty bị hợp nhất đặt trụ sở chính để cập nhật tình trạng pháp lý của công ty bị hợp nhất trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."}]},{"id":"luat-59_201","no":201,"code":"Điều 201","title":"Điều 201. Sáp nhập công ty","shortTitle":"Sáp nhập công ty","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Một hoặc một số công ty (sau đây gọi là công ty bị sáp nhập) có thể sáp nhập vào một công ty khác (sau đây gọi là công ty nhận sáp nhập) bằng cách chuyển toàn bộ tài sản, quyền, nghĩa vụ và lợi ích hợp pháp sang công ty nhận sáp nhập, đồng thời chấm dứt sự tồn tại của công ty bị sáp nhập."},{"k":"p","t":"2. Thủ tục sáp nhập công ty được quy định như sau:"},{"k":"p","t":"a) Các công ty liên quan chuẩn bị hợp đồng sáp nhập và dự thảo Điều lệ công ty nhận sáp nhập. Hợp đồng sáp nhập phải gồm các nội dung chủ yếu sau: tên, địa chỉ trụ sở chính của công ty nhận sáp nhập; tên, địa chỉ trụ sở chính của công ty bị sáp nhập; thủ tục và điều kiện sáp nhập; phương án sử dụng lao động; cách thức, thủ tục, thời hạn và điều kiện chuyển đổi tài sản, chuyển đổi phần vốn góp, cổ phần, trái phiếu của công ty bị sáp nhập thành phần vốn góp, cổ phần, trái phiếu của công ty nhận sáp nhập; thời hạn thực hiện sáp nhập;"},{"k":"p","t":"b) Các thành viên, chủ sở hữu công ty hoặc các cổ đông của các công ty liên quan thông qua hợp đồng sáp nhập, Điều lệ công ty nhận sáp nhập và tiến hành đăng ký doanh nghiệp công ty nhận sáp nhập theo quy định của Luật này. Hợp đồng sáp nhập phải được gửi đến tất cả chủ nợ và thông báo cho người lao động biết trong thời hạn 15 ngày kể từ ngày thông qua;"},{"k":"p","t":"c) Sau khi công ty nhận sáp nhập đăng ký doanh nghiệp, công ty bị sáp nhập chấm dứt tồn tại; công ty nhận sáp nhập được hưởng các quyền và lợi ích hợp pháp, chịu trách nhiệm về các nghĩa vụ, các khoản nợ chưa thanh toán, hợp đồng lao động và nghĩa vụ tài sản khác của công ty bị sáp nhập. Các công ty nhận sáp nhập đương nhiên kế thừa toàn bộ quyền, nghĩa vụ, và lợi ích hợp pháp của các công ty bị sáp nhập theo hợp đồng sáp nhập."},{"k":"p","t":"3. Các công ty thực hiện việc sáp nhập phải bảo đảm tuân thủ quy định của Luật Cạnh tranh về sáp nhập công ty."},{"k":"p","t":"4. Cơ quan đăng ký kinh doanh tiến hành cập nhật tình trạng pháp lý của công ty bị sáp nhập trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp và thực hiện thay đổi nội dung đăng ký doanh nghiệp cho công ty nhận sáp nhập. Trường hợp công ty bị sáp nhập có địa chỉ trụ sở chính ngoài tỉnh, thành phố trực thuộc trung ương nơi công ty nhận sáp nhập đặt trụ sở chính thì Cơ quan đăng ký kinh doanh nơi công ty nhận sáp nhập đặt trụ sở chính thông báo việc đăng ký doanh nghiệp cho Cơ quan đăng ký kinh doanh nơi công ty bị sáp nhập đặt trụ sở chính để cập nhật tình trạng pháp lý của công ty bị sáp nhập trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."}]},{"id":"luat-59_202","no":202,"code":"Điều 202","title":"Điều 202. Chuyển đổi công ty trách nhiệm hữu hạn thành công ty cổ phần","shortTitle":"Chuyển đổi công ty trách nhiệm hữu hạn thành công ty cổ phần","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp nhà nước chuyển đổi thành công ty cổ phần thực hiện theo quy định của pháp luật có liên quan."},{"k":"p","t":"2. Công ty trách nhiệm hữu hạn có thể chuyển đổi thành công ty cổ phần theo phương thức sau đây:"},{"k":"p","t":"a) Chuyển đổi thành công ty cổ phần mà không huy động thêm tổ chức, cá nhân khác cùng góp vốn, không bán phần vốn góp cho tổ chức, cá nhân khác;"},{"k":"p","t":"b) Chuyển đổi thành công ty cổ phần bằng cách huy động thêm tổ chức, cá nhân khác góp vốn;"},{"k":"p","t":"c) Chuyển đổi thành công ty cổ phần bằng cách bán toàn bộ hoặc một phần phần vốn góp cho một hoặc một số tổ chức, cá nhân khác;"},{"k":"p","t":"d) Kết hợp phương thức quy định tại các điểm a, b và c khoản này và các phương thức khác."},{"k":"p","t":"3. Công ty phải đăng ký chuyển đổi công ty với Cơ quan đăng ký kinh doanh trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển đổi. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ chuyển đổi, Cơ quan đăng ký kinh doanh cấp lại Giấy chứng nhận đăng ký doanh nghiệp và cập nhật tình trạng pháp lý của công ty trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."},{"k":"p","t":"4. Công ty chuyển đổi đương nhiên kế thừa toàn bộ quyền và lợi ích hợp pháp, chịu trách nhiệm về các khoản nợ, gồm cả nợ thuế, hợp đồng lao động và nghĩa vụ khác của công ty được chuyển đổi."}]},{"id":"luat-59_203","no":203,"code":"Điều 203","title":"Điều 203. Chuyển đổi công ty cổ phần thành công ty trách nhiệm hữu hạn một thành viên","shortTitle":"Chuyển đổi công ty cổ phần thành công ty trách nhiệm hữu hạn một thành viên","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần có thể chuyển đổi thành công ty trách nhiệm hữu hạn một thành viên theo phương thức sau đây:"},{"k":"p","t":"a) Một cổ đông nhận chuyển nhượng toàn bộ cổ phần tương ứng của tất cả cổ đông còn lại;"},{"k":"p","t":"b) Một tổ chức hoặc cá nhân không phải là cổ đông nhận chuyển nhượng toàn bộ số cổ phần của tất cả cổ đông của công ty;"},{"k":"p","t":"c) Công ty chỉ còn lại 01 cổ đông."},{"k":"p","t":"2. Việc chuyển nhượng hoặc nhận góp vốn đầu tư quy định tại khoản 1 Điều này phải thực hiện theo giá thị trường, giá được định theo phương pháp tài sản, phương pháp dòng tiền chiết khấu hoặc phương pháp khác."},{"k":"p","t":"3. Trong thời hạn 15 ngày kể từ ngày công ty chỉ còn lại một cổ đông hoặc hoàn thành việc chuyển nhượng cổ phần theo quy định tại điểm a và điểm b khoản 1 Điều này, công ty gửi hồ sơ chuyển đổi đến Cơ quan đăng ký kinh doanh nơi doanh nghiệp đã đăng ký. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ chuyển đổi, Cơ quan đăng ký kinh doanh cấp Giấy chứng nhận đăng ký doanh nghiệp và cập nhật tình trạng pháp lý của công ty trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."},{"k":"p","t":"4. Công ty chuyển đổi đương nhiên kế thừa toàn bộ quyền và lợi ích hợp pháp, chịu trách nhiệm về các khoản nợ, gồm cả nợ thuế, hợp đồng lao động và nghĩa vụ khác của công ty được chuyển đổi."}]},{"id":"luat-59_204","no":204,"code":"Điều 204","title":"Điều 204. Chuyển đổi công ty cổ phần thành công ty trách nhiệm hữu hạn hai thành viên trở lên","shortTitle":"Chuyển đổi công ty cổ phần thành công ty trách nhiệm hữu hạn hai thành viên trở lên","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần có thể chuyển đổi thành công ty trách nhiệm hữu hạn hai thành viên trở lên theo phương thức sau đây:"},{"k":"p","t":"a) Chuyển đổi thành công ty trách nhiệm hữu hạn hai thành viên trở lên mà không huy động thêm hoặc chuyển nhượng cổ phần cho tổ chức, cá nhân khác;"},{"k":"p","t":"b) Chuyển đổi thành công ty trách nhiệm hữu hạn hai thành viên trở lên đồng thời huy động thêm tổ chức, cá nhân khác góp vốn;"},{"k":"p","t":"c) Chuyển đổi thành công ty trách nhiệm hữu hạn hai thành viên trở lên đồng thời chuyển nhượng toàn bộ hoặc một phần cổ phần cho tổ chức, cá nhân khác góp vốn;"},{"k":"p","t":"d) Công ty chỉ còn lại 02 cổ đông;"},{"k":"p","t":"đ) Kết hợp phương thức quy định tại các điểm a, b và c khoản này và các phương thức khác."},{"k":"p","t":"2. Công ty phải đăng ký chuyển đổi công ty với Cơ quan đăng ký kinh doanh trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển đổi. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ chuyển đổi, Cơ quan đăng ký kinh doanh cấp Giấy chứng nhận đăng ký doanh nghiệp và cập nhật tình trạng pháp lý của công ty trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."},{"k":"p","t":"3. Công ty chuyển đổi đương nhiên kế thừa toàn bộ quyền và lợi ích hợp pháp, chịu trách nhiệm về các khoản nợ, gồm cả nợ thuế, hợp đồng lao động và nghĩa vụ khác của công ty được chuyển đổi."}]},{"id":"luat-59_205","no":205,"code":"Điều 205","title":"Điều 205. Chuyển đổi doanh nghiệp tư nhân thành công ty trách nhiệm hữu hạn, công ty cổ phần, công ty hợp danh","shortTitle":"Chuyển đổi doanh nghiệp tư nhân thành công ty trách nhiệm hữu hạn, công ty cổ phần, công ty hợp danh","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp tư nhân có thể chuyển đổi thành công ty trách nhiệm hữu hạn, công ty cổ phần hoặc công ty hợp danh theo quyết định của chủ doanh nghiệp tư nhân nếu đáp ứng đủ các điều kiện sau đây:"},{"k":"p","t":"a) Doanh nghiệp được chuyển đổi phải có đủ các điều kiện theo quy định tại khoản 1 Điều 27 của Luật này;"},{"k":"p","t":"b) Chủ doanh nghiệp tư nhân cam kết bằng văn bản chịu trách nhiệm cá nhân bằng toàn bộ tài sản của mình đối với tất cả khoản nợ chưa thanh toán và cam kết thanh toán đủ số nợ khi đến hạn;"},{"k":"p","t":"c) Chủ doanh nghiệp tư nhân có thỏa thuận bằng văn bản với các bên của hợp đồng chưa thanh lý về việc công ty được chuyển đổi tiếp nhận và tiếp tục thực hiện các hợp đồng đó;"},{"k":"p","t":"d) Chủ doanh nghiệp tư nhân cam kết bằng văn bản hoặc có thỏa thuận bằng văn bản với các thành viên góp vốn khác về việc tiếp nhận và sử dụng lao động hiện có của doanh nghiệp tư nhân."},{"k":"p","t":"2. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ, Cơ quan đăng ký kinh doanh xem xét và cấp Giấy chứng nhận đăng ký doanh nghiệp nếu có đủ điều kiện quy định tại khoản 1 Điều này và cập nhật tình trạng pháp lý của doanh nghiệp trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp."},{"k":"p","t":"3. Công ty được chuyển đổi đương nhiên kế thừa quyền, nghĩa vụ của doanh nghiệp tư nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp. Chủ doanh nghiệp tư nhân chịu trách nhiệm cá nhân bằng toàn bộ tài sản của mình đối với tất cả khoản nợ phát sinh trước ngày công ty được chuyển đổi được cấp Giấy chứng nhận đăng ký doanh nghiệp."}]},{"id":"luat-59_206","no":206,"code":"Điều 206","title":"Điều 206. Tạm ngừng, đình chỉ hoạt động, chấm dứt kinh doanh","shortTitle":"Tạm ngừng, đình chỉ hoạt động, chấm dứt kinh doanh","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp phải thông báo bằng văn bản cho Cơ quan đăng ký kinh doanh chậm nhất là 03 ngày làm việc trước ngày tạm ngừng kinh doanh hoặc tiếp tục kinh doanh trước thời hạn đã thông báo."},{"k":"p","t":"2. Cơ quan đăng ký kinh doanh, cơ quan nhà nước có thẩm quyền yêu cầu doanh nghiệp tạm ngừng, đình chỉ hoạt động, chấm dứt kinh doanh trong trường hợp sau đây:"},{"k":"p","t":"a) Tạm ngừng hoặc chấm dứt kinh doanh ngành, nghề kinh doanh có điều kiện, ngành, nghề tiếp cận thị trường có điều kiện đối với nhà đầu tư nước ngoài khi phát hiện doanh nghiệp không có đủ điều kiện tương ứng theo quy định của pháp luật;"},{"k":"p","t":"b) Tạm ngừng kinh doanh theo yêu cầu của cơ quan có liên quan theo quy định của pháp luật về quản lý thuế, môi trường và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"c) Đình chỉ hoạt động, chấm dứt kinh doanh một, một số ngành, nghề kinh doanh hoặc trong một số lĩnh vực theo quyết định của Tòa án."},{"k":"p","t":"3. Trong thời gian tạm ngừng kinh doanh, doanh nghiệp phải nộp đủ số thuế, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp còn nợ; tiếp tục thanh toán các khoản nợ, hoàn thành việc thực hiện hợp đồng đã ký với khách hàng và người lao động, trừ trường hợp doanh nghiệp, chủ nợ, khách hàng và người lao động có thỏa thuận khác."},{"k":"p","t":"4. Chính phủ quy định chi tiết trình tự, thủ tục phối hợp giữa Cơ quan đăng ký kinh doanh và cơ quan nhà nước có thẩm quyền trong trường hợp quy định tại khoản 2 Điều này."}]},{"id":"luat-59_207","no":207,"code":"Điều 207","title":"Điều 207. Các trường hợp và điều kiện giải thể doanh nghiệp","shortTitle":"Các trường hợp và điều kiện giải thể doanh nghiệp","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp bị giải thể trong trường hợp sau đây:"},{"k":"p","t":"a) Kết thúc thời hạn hoạt động đã ghi trong Điều lệ công ty mà không có quyết định gia hạn;"},{"k":"p","t":"b) Theo nghị quyết, quyết định của chủ doanh nghiệp đối với doanh nghiệp tư nhân, của Hội đồng thành viên đối với công ty hợp danh, của Hội đồng thành viên, chủ sở hữu công ty đối với công ty trách nhiệm hữu hạn, của Đại hội đồng cổ đông đối với công ty cổ phần;"},{"k":"p","t":"c) Công ty không còn đủ số lượng thành viên tối thiểu theo quy định của Luật này trong thời hạn 06 tháng liên tục mà không làm thủ tục chuyển đổi loại hình doanh nghiệp;"},{"k":"p","t":"d) Bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp, trừ trường hợp Luật Quản lý thuế có quy định khác."},{"k":"p","t":"2. Doanh nghiệp chỉ được giải thể khi bảo đảm thanh toán hết các khoản nợ, nghĩa vụ tài sản khác và không trong quá trình giải quyết tranh chấp tại Tòa án hoặc Trọng tài. Người quản lý có liên quan và doanh nghiệp quy định tại điểm d khoản 1 Điều này cùng liên đới chịu trách nhiệm về các khoản nợ của doanh nghiệp."}]},{"id":"luat-59_208","no":208,"code":"Điều 208","title":"Điều 208. Trình tự, thủ tục giải thể doanh nghiệp","shortTitle":"Trình tự, thủ tục giải thể doanh nghiệp","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Việc giải thể doanh nghiệp trong trường hợp quy định tại các điểm a, b và c khoản 1 Điều 207 của Luật này được thực hiện theo quy định sau đây:"},{"k":"p","t":"1. Thông qua nghị quyết, quyết định giải thể doanh nghiệp. Nghị quyết, quyết định giải thể doanh nghiệp phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính của doanh nghiệp;"},{"k":"p","t":"b) Lý do giải thể;"},{"k":"p","t":"c) Thời hạn, thủ tục thanh lý hợp đồng và thanh toán các khoản nợ của doanh nghiệp;"},{"k":"p","t":"d) Phương án xử lý các nghĩa vụ phát sinh từ hợp đồng lao động;"},{"k":"p","t":"đ) Họ, tên, chữ ký của chủ doanh nghiệp tư nhân, chủ sở hữu công ty, Chủ tịch Hội đồng thành viên, Chủ tịch Hội đồng quản trị;"},{"k":"p","t":"2. Chủ doanh nghiệp tư nhân, Hội đồng thành viên hoặc chủ sở hữu công ty, Hội đồng quản trị trực tiếp tổ chức thanh lý tài sản doanh nghiệp, trừ trường hợp Điều lệ công ty quy định thành lập tổ chức thanh lý riêng;"},{"k":"p","t":"3. Trong thời hạn 07 ngày làm việc kể từ ngày thông qua, nghị quyết, quyết định giải thể và biên bản họp phải được gửi đến Cơ quan đăng ký kinh doanh, cơ quan thuế, người lao động trong doanh nghiệp. Nghị quyết, quyết định giải thể phải được đăng trên Cổng thông tin quốc gia về đăng ký doanh nghiệp và được niêm yết công khai tại trụ sở chính, chi nhánh, văn phòng đại diện của doanh nghiệp."},{"k":"p","t":"Trường hợp doanh nghiệp còn nghĩa vụ tài chính chưa thanh toán thì phải gửi kèm theo nghị quyết, quyết định giải thể và phương án giải quyết nợ đến các chủ nợ, người có quyền, nghĩa vụ và lợi ích có liên quan. Phương án giải quyết nợ phải có tên, địa chỉ của chủ nợ; số nợ, thời hạn, địa điểm và phương thức thanh toán số nợ đó; cách thức và thời hạn giải quyết khiếu nại của chủ nợ;"},{"k":"p","t":"4. Cơ quan đăng ký kinh doanh phải thông báo tình trạng doanh nghiệp đang làm thủ tục giải thể trên Cổng thông tin quốc gia về đăng ký doanh nghiệp ngay sau khi nhận được nghị quyết, quyết định giải thể của doanh nghiệp. Kèm theo thông báo phải đăng tải nghị quyết, quyết định giải thể và phương án giải quyết nợ (nếu có);"},{"k":"p","t":"5. Các khoản nợ của doanh nghiệp được thanh toán theo thứ tự ưu tiên sau đây:"},{"k":"p","t":"a) Các khoản nợ lương, trợ cấp thôi việc, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp theo quy định của pháp luật và các quyền lợi khác của người lao động theo thỏa ước lao động tập thể và hợp đồng lao động đã ký kết;"},{"k":"p","t":"b) Nợ thuế;"},{"k":"p","t":"c) Các khoản nợ khác;"},{"k":"p","t":"6. Sau khi đã thanh toán chi phí giải thể doanh nghiệp và các khoản nợ, phần còn lại chia cho chủ doanh nghiệp tư nhân, các thành viên, cổ đông hoặc chủ sở hữu công ty theo tỷ lệ sở hữu phần vốn góp, cổ phần;"},{"k":"p","t":"7. Người đại diện theo pháp luật của doanh nghiệp gửi hồ sơ giải thể doanh nghiệp cho Cơ quan đăng ký kinh doanh trong thời hạn 05 ngày làm việc kể từ ngày thanh toán hết các khoản nợ của doanh nghiệp;"},{"k":"p","t":"8. Sau thời hạn 180 ngày kể từ ngày nhận được nghị quyết, quyết định giải thể theo quy định tại khoản 3 Điều này mà không nhận được ý kiến về việc giải thể từ doanh nghiệp hoặc phản đối của bên có liên quan bằng văn bản hoặc trong 05 ngày làm việc kể từ ngày nhận hồ sơ giải thể, Cơ quan đăng ký kinh doanh cập nhật tình trạng pháp lý của doanh nghiệp trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp;"},{"k":"p","t":"9. Chính phủ quy định chi tiết về trình tự, thủ tục giải thể doanh nghiệp."}]},{"id":"luat-59_209","no":209,"code":"Điều 209","title":"Điều 209. Giải thể doanh nghiệp trong trường hợp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc theo quyết định của Tòa án","shortTitle":"Giải thể doanh nghiệp trong trường hợp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc theo quyết định của Tòa án","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Việc giải thể doanh nghiệp trong trường hợp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc theo quyết định của Tòa án được thực hiện theo trình tự, thủ tục sau đây:"},{"k":"p","t":"1. Cơ quan đăng ký kinh doanh phải thông báo tình trạng doanh nghiệp đang làm thủ tục giải thể trên Cổng thông tin quốc gia về đăng ký doanh nghiệp đồng thời với việc ra quyết định thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc ngay sau khi nhận được quyết định giải thể của Tòa án đã có hiệu lực pháp luật. Kèm theo thông báo phải đăng tải quyết định thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc quyết định của Tòa án đã có hiệu lực pháp luật;"},{"k":"p","t":"2. Trong thời hạn 10 ngày kể từ ngày nhận được quyết định thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc quyết định của Tòa án có hiệu lực pháp luật, doanh nghiệp phải triệu tập họp để quyết định giải thể. Nghị quyết, quyết định giải thể và bản sao quyết định thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc quyết định của Tòa án có hiệu lực pháp luật phải được gửi đến Cơ quan đăng ký kinh doanh, cơ quan thuế, người lao động trong doanh nghiệp và phải được niêm yết công khai tại trụ sở chính, chi nhánh, văn phòng đại diện của doanh nghiệp. Đối với trường hợp pháp luật yêu cầu phải đăng báo thì nghị quyết, quyết định giải thể doanh nghiệp phải được đăng ít nhất trên 01 tờ báo in hoặc báo điện tử trong 03 số liên tiếp."},{"k":"p","t":"Trường hợp doanh nghiệp còn nghĩa vụ tài chính chưa thanh toán thì phải đồng thời gửi kèm theo nghị quyết, quyết định giải thể của doanh nghiệp, phương án giải quyết nợ đến các chủ nợ, người có quyền lợi và nghĩa vụ có liên quan. Thông báo phải có tên, địa chỉ của chủ nợ; số nợ, thời hạn, địa điểm và phương thức thanh toán số nợ đó; cách thức và thời hạn giải quyết khiếu nại của chủ nợ;"},{"k":"p","t":"3. Việc thanh toán các khoản nợ của doanh nghiệp được thực hiện theo quy định tại khoản 5 Điều 208 của Luật này;"},{"k":"p","t":"4. Người đại diện theo pháp luật của doanh nghiệp gửi hồ sơ giải thể doanh nghiệp cho Cơ quan đăng ký kinh doanh trong thời hạn 05 ngày làm việc kể từ ngày thanh toán hết các khoản nợ của doanh nghiệp;"},{"k":"p","t":"5. Sau thời hạn 180 ngày kể từ ngày thông báo tình trạng đang làm thủ tục giải thể doanh nghiệp theo quy định tại khoản 1 Điều này mà không nhận được phản đối của bên có liên quan bằng văn bản hoặc trong 05 ngày làm việc kể từ ngày nhận hồ sơ giải thể, Cơ quan đăng ký kinh doanh cập nhật tình trạng pháp lý của doanh nghiệp trên Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp;"},{"k":"p","t":"6. Người quản lý công ty có liên quan phải chịu trách nhiệm cá nhân về thiệt hại do việc không thực hiện hoặc không thực hiện đúng quy định tại Điều này."}]},{"id":"luat-59_210","no":210,"code":"Điều 210","title":"Điều 210. Hồ sơ giải thể doanh nghiệp","shortTitle":"Hồ sơ giải thể doanh nghiệp","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ giải thể doanh nghiệp bao gồm giấy tờ sau đây:"},{"k":"p","t":"a) Thông báo về giải thể doanh nghiệp;"},{"k":"p","t":"b) Báo cáo thanh lý tài sản doanh nghiệp; danh sách chủ nợ và số nợ đã thanh toán, gồm cả thanh toán hết các khoản nợ về thuế và nợ tiền đóng bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp cho người lao động sau khi quyết định giải thể doanh nghiệp (nếu có)."},{"k":"p","t":"2. Thành viên Hội đồng quản trị công ty cổ phần, thành viên Hội đồng thành viên công ty trách nhiệm hữu hạn, chủ sở hữu công ty, chủ doanh nghiệp tư nhân, Giám đốc hoặc Tổng giám đốc, thành viên hợp danh, người đại diện theo pháp luật của doanh nghiệp chịu trách nhiệm về tính trung thực, chính xác của hồ sơ giải thể doanh nghiệp."},{"k":"p","t":"3. Trường hợp hồ sơ giải thể không chính xác, giả mạo, những người quy định tại khoản 2 Điều này phải liên đới chịu trách nhiệm thanh toán quyền lợi của người lao động chưa được giải quyết, số thuế chưa nộp, số nợ khác chưa thanh toán và chịu trách nhiệm cá nhân trước pháp luật về những hệ quả phát sinh trong thời hạn 05 năm kể từ ngày nộp hồ sơ giải thể doanh nghiệp đến Cơ quan đăng ký kinh doanh."}]},{"id":"luat-59_211","no":211,"code":"Điều 211","title":"Điều 211. Các hoạt động bị cấm kể từ khi có quyết định giải thể","shortTitle":"Các hoạt động bị cấm kể từ khi có quyết định giải thể","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Kể từ khi có quyết định giải thể doanh nghiệp, doanh nghiệp, người quản lý doanh nghiệp bị nghiêm cấm thực hiện các hoạt động sau đây:"},{"k":"p","t":"a) Cất giấu, tẩu tán tài sản;"},{"k":"p","t":"b) Từ bỏ hoặc giảm bớt quyền đòi nợ;"},{"k":"p","t":"c) Chuyển các khoản nợ không có bảo đảm thành các khoản nợ có bảo đảm bằng tài sản của doanh nghiệp;"},{"k":"p","t":"d) Ký kết hợp đồng mới, trừ trường hợp để thực hiện giải thể doanh nghiệp;"},{"k":"p","t":"đ) Cầm cố, thế chấp, tặng cho, cho thuê tài sản;"},{"k":"p","t":"e) Chấm dứt thực hiện hợp đồng đã có hiệu lực;"},{"k":"p","t":"g) Huy động vốn dưới mọi hình thức."},{"k":"p","t":"2. Tùy theo tính chất và mức độ vi phạm, cá nhân có hành vi vi phạm quy định tại khoản 1 Điều này có thể bị xử phạt vi phạm hành chính hoặc bị truy cứu trách nhiệm hình sự; nếu gây thiệt hại thì phải bồi thường."}]},{"id":"luat-59_212","no":212,"code":"Điều 212","title":"Điều 212. Thu hồi Giấy chứng nhận đăng ký doanh nghiệp","shortTitle":"Thu hồi Giấy chứng nhận đăng ký doanh nghiệp","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp trong trường hợp sau đây:"},{"k":"p","t":"a) Nội dung kê khai trong hồ sơ đăng ký doanh nghiệp là giả mạo;"},{"k":"p","t":"b) Doanh nghiệp do những người bị cấm thành lập doanh nghiệp theo quy định tại khoản 2 Điều 17 của Luật này thành lập;"},{"k":"p","t":"c) Doanh nghiệp ngừng hoạt động kinh doanh 01 năm mà không thông báo với Cơ quan đăng ký kinh doanh và cơ quan thuế;"},{"k":"p","t":"d) Doanh nghiệp không gửi báo cáo theo quy định tại điểm c khoản 1 Điều 216 của Luật này đến Cơ quan đăng ký kinh doanh trong thời hạn 06 tháng kể từ ngày hết hạn gửi báo cáo hoặc có yêu cầu bằng văn bản;"},{"k":"p","t":"đ) Trường hợp khác theo quyết định của Tòa án, đề nghị của cơ quan có thẩm quyền theo quy định của luật."},{"k":"p","t":"2. Chính phủ quy định trình tự, thủ tục thu hồi Giấy chứng nhận đăng ký doanh nghiệp."}]},{"id":"luat-59_213","no":213,"code":"Điều 213","title":"Điều 213. Chấm dứt hoạt động chi nhánh, văn phòng đại diện, địa điểm kinh doanh","shortTitle":"Chấm dứt hoạt động chi nhánh, văn phòng đại diện, địa điểm kinh doanh","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Chi nhánh, văn phòng đại diện, địa điểm kinh doanh của doanh nghiệp được chấm dứt hoạt động theo quyết định của chính doanh nghiệp đó hoặc theo quyết định thu hồi Giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Người đại diện theo pháp luật của doanh nghiệp và người đứng đầu chi nhánh, văn phòng đại diện bị chấm dứt hoạt động liên đới chịu trách nhiệm về tính trung thực và chính xác của hồ sơ chấm dứt hoạt động chi nhánh, văn phòng đại diện, địa điểm kinh doanh."},{"k":"p","t":"3. Doanh nghiệp có chi nhánh đã chấm dứt hoạt động chịu trách nhiệm thực hiện các hợp đồng, thanh toán các khoản nợ, gồm cả nợ thuế của chi nhánh và tiếp tục sử dụng lao động hoặc giải quyết đủ quyền lợi hợp pháp cho người lao động đã làm việc tại chi nhánh theo quy định của pháp luật."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_214","no":214,"code":"Điều 214","title":"Điều 214. Phá sản doanh nghiệp","shortTitle":"Phá sản doanh nghiệp","chuong":"Chương IX — TỔ CHỨC LẠI, GIẢI THỂ VÀ PHÁ SẢN DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Việc phá sản doanh nghiệp được thực hiện theo quy định của pháp luật về phá sản."}]},{"id":"luat-59_215","no":215,"code":"Điều 215","title":"Điều 215. Trách nhiệm các cơ quan quản lý nhà nước","shortTitle":"Trách nhiệm các cơ quan quản lý nhà nước","chuong":"Chương X — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ thống nhất quản lý nhà nước đối với doanh nghiệp."},{"k":"p","t":"2. Bộ, cơ quan ngang Bộ chịu trách nhiệm trước Chính phủ về việc thực hiện nhiệm vụ được phân công trong quản lý nhà nước đối với doanh nghiệp."},{"k":"p","t":"3. Ủy ban nhân dân cấp tỉnh thực hiện quản lý nhà nước đối với doanh nghiệp trong phạm vi địa phương."},{"k":"p","t":"4. Bộ, cơ quan ngang Bộ và cơ quan có liên quan, Ủy ban nhân dân cấp tỉnh, trong phạm vi nhiệm vụ, quyền hạn được phân công, chịu trách nhiệm thiết lập kết nối, liên thông và chia sẻ thông tin với Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp các thông tin sau đây:"},{"k":"p","t":"a) Thông tin về giấy phép kinh doanh, giấy chứng nhận đủ điều kiện kinh doanh, chứng chỉ hành nghề, giấy chứng nhận hoặc văn bản chấp thuận về điều kiện kinh doanh đã cấp cho doanh nghiệp và quyết định xử phạt đối với hành vi vi phạm hành chính của doanh nghiệp;"},{"k":"p","t":"b) Thông tin về tình hình hoạt động và nộp thuế của doanh nghiệp từ báo cáo thuế; báo cáo tài chính của doanh nghiệp;"},{"k":"p","t":"c) Phối hợp, chia sẻ thông tin về tình hình hoạt động doanh nghiệp để nâng cao hiệu lực quản lý nhà nước."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_216","no":216,"code":"Điều 216","title":"Điều 216. Cơ quan đăng ký kinh doanh","shortTitle":"Cơ quan đăng ký kinh doanh","chuong":"Chương X — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan đăng ký kinh doanh có nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Giải quyết việc đăng ký doanh nghiệp và cấp Giấy chứng nhận đăng ký doanh nghiệp theo quy định của pháp luật;"},{"k":"p","t":"b) Phối hợp xây dựng, quản lý Hệ thống thông tin quốc gia về đăng ký doanh nghiệp; công khai, cung cấp thông tin cho cơ quan nhà nước, tổ chức và cá nhân có yêu cầu theo quy định của pháp luật;"},{"k":"p","t":"c) Yêu cầu doanh nghiệp báo cáo về việc tuân thủ quy định của Luật này khi xét thấy cần thiết; đôn đốc việc thực hiện nghĩa vụ báo cáo của doanh nghiệp;"},{"k":"p","t":"d) Trực tiếp hoặc đề nghị cơ quan nhà nước có thẩm quyền kiểm tra, giám sát doanh nghiệp theo nội dung trong hồ sơ đăng ký doanh nghiệp;"},{"k":"p","t":"đ) Chịu trách nhiệm về tính hợp lệ của hồ sơ đăng ký doanh nghiệp, không chịu trách nhiệm về những vi phạm của doanh nghiệp xảy ra trước và sau khi đăng ký doanh nghiệp;"},{"k":"p","t":"e) Xử lý vi phạm quy định của pháp luật về đăng ký doanh nghiệp; thu hồi Giấy chứng nhận đăng ký doanh nghiệp và yêu cầu doanh nghiệp làm thủ tục giải thể theo quy định của Luật này;"},{"k":"p","t":"g) Nhiệm vụ, quyền hạn khác theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Chính phủ quy định hệ thống tổ chức Cơ quan đăng ký kinh doanh."}]},{"id":"luat-59_217","no":217,"code":"Điều 217","title":"Điều 217. Điều khoản thi hành","shortTitle":"Điều khoản thi hành","chuong":"Chương X — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2021."},{"k":"p","t":"2. Luật Doanh nghiệp số 68/2014/QH13 hết hiệu lực kể từ ngày Luật này có hiệu lực thi hành."},{"k":"p","t":"3. Thay thế cụm từ “doanh nghiệp nhà nước” bằng cụm từ “doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ” quy định tại điểm m khoản 1 Điều 35 và điểm k khoản 1 Điều 37 của Luật Ngân sách nhà nước số 83/2015/QH13; điểm a khoản 3 Điều 23 của Luật Thủy lợi số 08/2017/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 35/2018/QH14; điểm b khoản 2 Điều 74 của Bộ luật Tố tụng dân sự số 92/2015/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 45/2019/QH14; điểm a khoản 2 Điều 43 của Luật Quản lý, sử dụng vũ khí, vật liệu nổ và công cụ hỗ trợ số 14/2017/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 50/2019/QH14; Điều 19 của Luật Tố cáo số 25/2018/QH14; các điều 3, 20, 30, 34, 39 và 61 của Luật Phòng, chống tham nhũng số 36/2018/QH14."},{"k":"p","t":"4. Chính phủ quy định việc đăng ký và hoạt động của hộ kinh doanh."},{"k":"p","t":"5. Căn cứ vào quy định của Luật này, Chính phủ quy định chi tiết việc tổ chức quản lý và hoạt động của doanh nghiệp nhà nước trực tiếp phục vụ quốc phòng, an ninh hoặc kết hợp kinh tế với quốc phòng, an ninh."}]},{"id":"luat-59_218","no":218,"code":"Điều 218","title":"Điều 218. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"Chương X — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Các công ty không có cổ phần hoặc phần vốn góp do Nhà nước nắm giữ thực hiện góp vốn, mua cổ phần trước ngày 01 tháng 7 năm 2015 không phải thực hiện theo quy định tại khoản 2 Điều 195 của Luật này nhưng không được tăng tỷ lệ sở hữu chéo."},{"k":"p","t":"2. Đối tượng là người quản lý doanh nghiệp, Kiểm soát viên và người đại diện theo ủy quyền mà không đáp ứng đủ tiêu chuẩn, điều kiện quy định tại điểm b khoản 5 Điều 14, khoản 3 Điều 64, khoản 3 Điều 93, khoản 3 Điều 101, các điểm a, b và c khoản 3 Điều 103, điểm d khoản 1 Điều 155, điểm b khoản 5 Điều 162 và khoản 2 Điều 169 của Luật này được tiếp tục thực hiện nhiệm vụ đến hết thời gian còn lại của nhiệm kỳ."},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XIV, kỳ họp thứ 9 thông qua ngày 17 tháng 6 năm 2020."},{"k":"p","t":"CHỦ TỊCH QUỐC HỘIĐã ký: Nguyễn Thị Kim Ngân"}]}],"refs":{"luat-59_1":[{"kind":"related","targetSlug":"nd132","targetAnchor":"nd132_1","label":"NĐ 132/2020 — Quản lý thuế DN có giao dịch liên kết"}]},"details":{},"summaries":{"luat-59_1":{"tldr":"Luật Doanh nghiệp quy định về việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động có liên quan của doanh nghiệp, đồng thời quy định về nhóm công ty.","points":["Áp dụng cho công ty trách nhiệm hữu hạn, công ty cổ phần, công ty hợp danh và doanh nghiệp tư nhân.","Bao gồm cả quy định về nhóm công ty."]},"luat-59_2":{"tldr":"Luật áp dụng đối với doanh nghiệp và các cơ quan, tổ chức, cá nhân có liên quan đến việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động của doanh nghiệp.","points":["Đối tượng áp dụng thứ nhất là doanh nghiệp.","Đối tượng áp dụng thứ hai là cơ quan, tổ chức, cá nhân có liên quan đến việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động của doanh nghiệp."]},"luat-59_3":{"tldr":"Trường hợp luật khác có quy định đặc thù về thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động liên quan của doanh nghiệp thì áp dụng quy định của luật đó thay vì Luật Doanh nghiệp.","points":["Quy định đặc thù của luật chuyên ngành khác được ưu tiên áp dụng thay cho Luật Doanh nghiệp trong phạm vi vấn đề mà luật đó điều chỉnh."]},"luat-59_4":{"tldr":"Điều này giải thích 34 thuật ngữ được sử dụng trong Luật Doanh nghiệp, từ các khái niệm cơ bản như doanh nghiệp, cổ đông, vốn điều lệ đến các khái niệm phức tạp như người có liên quan, người quản lý doanh nghiệp.","points":["Doanh nghiệp là tổ chức có tên riêng, có tài sản, có trụ sở giao dịch, được thành lập hoặc đăng ký thành lập theo quy định của pháp luật nhằm mục đích kinh doanh.","Doanh nghiệp nhà nước là doanh nghiệp do Nhà nước nắm giữ trên 50% vốn điều lệ hoặc tổng số cổ phần có quyền biểu quyết.","Người có liên quan là cá nhân, tổ chức có quan hệ trực tiếp hoặc gián tiếp với doanh nghiệp, bao gồm công ty mẹ, công ty con, người quản lý và người có quan hệ gia đình với người quản lý, cùng các trường hợp có khả năng chi phối quyết định của doanh nghiệp.","Vốn điều lệ là tổng giá trị tài sản do thành viên, chủ sở hữu công ty đã góp hoặc cam kết góp, hoặc là tổng mệnh giá cổ phần đã bán hoặc được đăng ký mua khi thành lập công ty cổ phần.","Người quản lý doanh nghiệp bao gồm chủ doanh nghiệp tư nhân, thành viên hợp danh, Chủ tịch Hội đồng thành viên hoặc Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và các chức danh quản lý khác theo Điều lệ công ty."]},"luat-59_5":{"tldr":"Nhà nước công nhận sự tồn tại lâu dài, bảo đảm bình đẳng trước pháp luật của các loại hình doanh nghiệp và bảo hộ quyền sở hữu tài sản, vốn đầu tư, thu nhập hợp pháp của doanh nghiệp và chủ sở hữu doanh nghiệp.","points":["Bảo đảm bình đẳng trước pháp luật giữa các doanh nghiệp không phân biệt hình thức sở hữu và thành phần kinh tế, công nhận tính sinh lợi hợp pháp của hoạt động kinh doanh.","Tài sản, vốn đầu tư hợp pháp của doanh nghiệp và chủ sở hữu doanh nghiệp không bị quốc hữu hóa, không bị tịch thu bằng biện pháp hành chính.","Trường hợp thật cần thiết Nhà nước trưng mua hoặc trưng dụng tài sản thì phải thanh toán, bồi thường theo pháp luật, bảo đảm lợi ích và không phân biệt đối xử giữa các loại hình doanh nghiệp."]},"luat-59_6":{"tldr":"Tổ chức chính trị, tổ chức chính trị - xã hội và tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp hoạt động theo Hiến pháp, pháp luật và điều lệ tổ chức; doanh nghiệp có nghĩa vụ tôn trọng, không được cản trở việc thành lập và hoạt động của các tổ chức này.","points":["Doanh nghiệp không được cản trở, gây khó khăn cho việc thành lập các tổ chức này trong doanh nghiệp.","Doanh nghiệp không được cản trở, gây khó khăn cho người lao động tham gia hoạt động trong các tổ chức này."]},"luat-59_7":{"tldr":"Doanh nghiệp có các quyền tự do kinh doanh ngành, nghề mà luật không cấm, tự chủ trong tổ chức kinh doanh, huy động vốn, tìm kiếm thị trường và các quyền khác theo quy định pháp luật.","points":["Tự do kinh doanh ngành, nghề mà luật không cấm; tự chủ lựa chọn hình thức, chủ động điều chỉnh quy mô, ngành nghề, địa bàn kinh doanh.","Tự do lựa chọn hình thức huy động, phân bổ, sử dụng vốn; tự do tìm kiếm thị trường, khách hàng, ký kết hợp đồng; kinh doanh xuất khẩu, nhập khẩu.","Được tuyển dụng, thuê và sử dụng lao động; chủ động ứng dụng khoa học công nghệ và được bảo hộ quyền sở hữu trí tuệ.","Có quyền chiếm hữu, sử dụng, định đoạt tài sản của doanh nghiệp; từ chối yêu cầu cung cấp nguồn lực không đúng quy định; khiếu nại, tham gia tố tụng theo quy định."]},"luat-59_8":{"tldr":"Doanh nghiệp có nghĩa vụ đáp ứng điều kiện kinh doanh, thực hiện đăng ký và công khai thông tin, chịu trách nhiệm về tính trung thực của hồ sơ, thực hiện nghĩa vụ tài chính và bảo đảm quyền lợi người lao động.","points":["Đáp ứng đủ điều kiện đầu tư kinh doanh đối với ngành, nghề kinh doanh có điều kiện và bảo đảm duy trì đủ điều kiện đó trong suốt quá trình hoạt động.","Thực hiện đầy đủ, kịp thời nghĩa vụ đăng ký doanh nghiệp, đăng ký thay đổi nội dung đăng ký, công khai thông tin và báo cáo theo quy định của Luật.","Chịu trách nhiệm về tính trung thực, chính xác của thông tin kê khai; phải kịp thời sửa đổi, bổ sung nếu phát hiện thông tin thiếu chính xác, chưa đầy đủ.","Tổ chức công tác kế toán, nộp thuế và thực hiện các nghĩa vụ tài chính khác theo quy định.","Bảo đảm quyền, lợi ích hợp pháp của người lao động; không phân biệt đối xử, không ngược đãi hoặc cưỡng bức lao động; thực hiện các chế độ bảo hiểm xã hội, thất nghiệp, y tế cho người lao động."]},"luat-59_9":{"tldr":"Ngoài quyền, nghĩa vụ chung theo Điều 7 và Điều 8, doanh nghiệp cung ứng sản phẩm, dịch vụ công ích được hạch toán bù đắp chi phí, bảo đảm thời hạn thu hồi vốn hợp lý, đồng thời phải cung ứng đủ số lượng, đúng chất lượng, thời hạn cam kết và chịu trách nhiệm trước pháp luật, khách hàng.","points":["Được hạch toán, bù đắp chi phí theo giá do pháp luật về đấu thầu quy định hoặc thu phí sử dụng dịch vụ theo quy định của cơ quan nhà nước có thẩm quyền.","Được bảo đảm thời hạn cung ứng sản phẩm, dịch vụ thích hợp để thu hồi vốn đầu tư và có lãi hợp lý.","Phải cung ứng đủ số lượng, đúng chất lượng và thời hạn đã cam kết; bảo đảm các điều kiện công bằng, thuận lợi cho khách hàng.","Chịu trách nhiệm trước pháp luật và khách hàng về số lượng, chất lượng, điều kiện cung ứng và giá, phí sản phẩm, dịch vụ."]},"luat-59_10":{"tldr":"Doanh nghiệp xã hội phải đăng ký thành lập theo Luật này, hoạt động vì mục tiêu giải quyết vấn đề xã hội, môi trường và sử dụng ít nhất 51% tổng lợi nhuận sau thuế hằng năm để tái đầu tư; đồng thời có các quyền, nghĩa vụ riêng liên quan đến huy động tài trợ, báo cáo và duy trì mục tiêu hoạt động.","points":["Phải sử dụng ít nhất 51% tổng lợi nhuận sau thuế hằng năm để tái đầu tư nhằm thực hiện mục tiêu xã hội, môi trường đã đăng ký.","Được huy động, nhận tài trợ từ cá nhân, doanh nghiệp, tổ chức trong và ngoài nước để bù đắp chi phí quản lý, hoạt động, nhưng không được dùng khoản tài trợ này cho mục đích khác.","Nếu được nhận ưu đãi, hỗ trợ thì phải định kỳ hằng năm báo cáo cơ quan có thẩm quyền về tình hình hoạt động.","Phải thông báo với cơ quan có thẩm quyền khi chấm dứt mục tiêu xã hội, môi trường hoặc không dùng lợi nhuận để tái đầu tư như đã cam kết."]},"luat-59_11":{"tldr":"Doanh nghiệp phải lưu giữ các tài liệu quan trọng như Điều lệ, sổ đăng ký thành viên hoặc cổ đông, giấy chứng nhận, biên bản họp và sổ sách kế toán tại trụ sở chính hoặc địa điểm khác theo Điều lệ, trong thời hạn theo quy định pháp luật.","points":["Phải lưu giữ Điều lệ công ty, quy chế quản lý nội bộ, sổ đăng ký thành viên hoặc sổ đăng ký cổ đông, cùng các văn bằng bảo hộ, giấy phép, giấy chứng nhận liên quan.","Phải lưu giữ tài liệu xác nhận quyền sở hữu tài sản, phiếu biểu quyết, biên bản họp và quyết định của doanh nghiệp, bản cáo bạch, báo cáo kiểm soát, kiểm toán và sổ kế toán, báo cáo tài chính hằng năm.","Tài liệu được lưu giữ tại trụ sở chính hoặc địa điểm khác quy định trong Điều lệ công ty; thời hạn lưu giữ thực hiện theo quy định của pháp luật."]},"luat-59_12":{"tldr":"Người đại diện theo pháp luật là cá nhân đại diện cho doanh nghiệp thực hiện quyền, nghĩa vụ trong giao dịch và tố tụng; công ty trách nhiệm hữu hạn, công ty cổ phần có thể có một hoặc nhiều người đại diện theo pháp luật, và doanh nghiệp phải luôn có ít nhất một người đại diện cư trú tại Việt Nam.","points":["Công ty TNHH và công ty cổ phần có thể có nhiều người đại diện theo pháp luật; nếu Điều lệ chưa phân chia rõ quyền, nghĩa vụ thì mỗi người đều là đại diện đủ thẩm quyền và cùng chịu trách nhiệm liên đới về thiệt hại.","Doanh nghiệp phải luôn có ít nhất một người đại diện theo pháp luật cư trú tại Việt Nam; khi người này xuất cảnh phải ủy quyền bằng văn bản cho người khác cư trú tại Việt Nam.","Đối với doanh nghiệp chỉ còn một người đại diện, nếu người này vắng mặt tại Việt Nam quá 30 ngày mà không ủy quyền, hoặc chết, mất tích, bị truy cứu trách nhiệm hình sự và các trường hợp tương tự, thì chủ sở hữu, Hội đồng thành viên hoặc Hội đồng quản trị cử người khác thay thế.","Đối với công ty TNHH hai thành viên, nếu thành viên là người đại diện theo pháp luật rơi vào các trường hợp nêu trê
