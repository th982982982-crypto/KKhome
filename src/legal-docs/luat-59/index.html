ưu đãi hoàn lại khi giải thể hoặc phá sản.","Không có quyền biểu quyết, dự họp Đại hội đồng cổ đông, đề cử người vào Hội đồng quản trị và Ban kiểm soát, trừ trường hợp quy định tại khoản 6 Điều 148."]},"luat-59_118":{"tldr":"Cổ phần ưu đãi hoàn lại là cổ phần được công ty hoàn lại vốn góp theo yêu cầu của người sở hữu hoặc theo điều kiện ghi tại cổ phiếu và Điều lệ; cổ đông sở hữu có quyền như cổ đông phổ thông nhưng không có quyền biểu quyết, trừ ngoại lệ.","points":["Việc hoàn lại vốn thực hiện theo yêu cầu của người sở hữu hoặc theo các điều kiện được ghi tại cổ phiếu của cổ phần ưu đãi hoàn lại và Điều lệ công ty.","Không có quyền biểu quyết, dự họp Đại hội đồng cổ đông, đề cử người vào Hội đồng quản trị và Ban kiểm soát, trừ trường hợp quy định tại khoản 5 Điều 114 và khoản 6 Điều 148."]},"luat-59_119":{"tldr":"Cổ đông có nghĩa vụ thanh toán đủ, đúng hạn số cổ phần đã cam kết mua, không được rút vốn góp trái quy định, tuân thủ Điều lệ và nghị quyết của công ty, và bảo mật thông tin công ty cung cấp.","points":["Không được rút vốn đã góp bằng cổ phần phổ thông ra khỏi công ty dưới mọi hình thức, trừ khi được công ty hoặc người khác mua lại cổ phần; nếu vi phạm, cổ đông và người có lợi ích liên quan phải liên đới chịu trách nhiệm trong phạm vi giá trị cổ phần đã rút và thiệt hại xảy ra.","Phải bảo mật thông tin được công ty cung cấp, chỉ sử dụng để bảo vệ quyền và lợi ích hợp pháp của mình, nghiêm cấm phát tán hoặc sao, gửi thông tin cho tổ chức, cá nhân khác."]},"luat-59_120":{"tldr":"Công ty cổ phần mới thành lập phải có ít nhất 03 cổ đông sáng lập, cùng đăng ký mua ít nhất 20% tổng số cổ phần phổ thông được quyền chào bán ban đầu, và cổ phần của họ bị hạn chế chuyển nhượng trong 03 năm đầu.","points":["Công ty chuyển đổi từ doanh nghiệp nhà nước, công ty TNHH, hoặc được chia, tách, hợp nhất, sáp nhập từ công ty cổ phần khác không nhất thiết phải có cổ đông sáng lập.","Cổ đông sáng lập phải cùng nhau đăng ký mua ít nhất 20% tổng số cổ phần phổ thông được quyền chào bán khi đăng ký thành lập doanh nghiệp.","Trong 03 năm kể từ ngày cấp Giấy chứng nhận đăng ký doanh nghiệp, cổ phần phổ thông của cổ đông sáng lập chỉ được tự do chuyển nhượng cho cổ đông sáng lập khác; chuyển nhượng cho người ngoài phải được Đại hội đồng cổ đông chấp thuận.","Hạn chế này không áp dụng với cổ phần cổ đông sáng lập có thêm sau khi đăng ký thành lập hoặc cổ phần đã được chuyển nhượng cho người không phải cổ đông sáng lập."]},"luat-59_121":{"tldr":"Cổ phiếu là chứng chỉ do công ty cổ phần phát hành xác nhận quyền sở hữu cổ phần, phải có các nội dung chủ yếu theo luật định, và được cấp lại cho cổ đông nếu bị mất, hư hỏng hoặc hủy hoại.","points":["Cổ phiếu phải ghi rõ tên/mã số doanh nghiệp, số lượng và loại cổ phần, mệnh giá, thông tin cổ đông, chữ ký người đại diện theo pháp luật, số đăng ký và ngày phát hành.","Nếu cổ phiếu có sai sót về nội dung, hình thức thì quyền và lợi ích của người sở hữu không bị ảnh hưởng; người đại diện theo pháp luật của công ty chịu trách nhiệm về thiệt hại do sai sót gây ra.","Cổ đông được công ty cấp lại cổ phiếu nếu bị mất, hư hỏng hoặc hủy hoại, kèm đề nghị nêu rõ thông tin cổ phiếu bị mất/hư hỏng và cam kết chịu trách nhiệm về tranh chấp phát sinh từ việc cấp lại."]},"luat-59_122":{"tldr":"Công ty cổ phần phải lập và lưu giữ sổ đăng ký cổ đông từ khi được cấp Giấy chứng nhận đăng ký doanh nghiệp, ghi nhận đầy đủ thông tin về cổ phần và cổ đông của công ty.","points":["Sổ đăng ký cổ đông có thể là văn bản giấy hoặc tập dữ liệu điện tử, được lưu giữ tại trụ sở chính hoặc tổ chức khác có chức năng lưu giữ.","Sổ phải ghi tổng số cổ phần được quyền chào bán, đã bán của từng loại, giá trị vốn cổ phần đã góp và thông tin từng cổ đông.","Cổ đông có quyền kiểm tra, tra cứu, trích lục, sao chép tên và địa chỉ liên lạc của cổ đông công ty trong sổ đăng ký cổ đông.","Công ty phải cập nhật kịp thời thay đổi cổ đông trong sổ đăng ký cổ đông theo yêu cầu của cổ đông có liên quan."]},"luat-59_123":{"tldr":"Chào bán cổ phần là việc công ty tăng thêm số lượng, loại cổ phần được quyền chào bán để tăng vốn điều lệ, thực hiện theo ba hình thức: cho cổ đông hiện hữu, riêng lẻ, hoặc ra công chúng.","points":["Ba hình thức chào bán: cho cổ đông hiện hữu, riêng lẻ, ra công chúng.","Chào bán ra công chúng và chào bán của công ty đại chúng thực hiện theo quy định của pháp luật về chứng khoán.","Công ty phải đăng ký thay đổi vốn điều lệ trong thời hạn 10 ngày kể từ ngày hoàn thành đợt bán cổ phần."]},"luat-59_124":{"tldr":"Chào bán cổ phần cho cổ đông hiện hữu là việc công ty bán toàn bộ số cổ phần tăng thêm cho tất cả cổ đông theo tỷ lệ sở hữu hiện có; công ty không phải đại chúng phải thông báo bằng văn bản trước ít nhất 15 ngày và tuân thủ trình tự cụ thể.","points":["Thông báo phải được gửi đến cổ đông chậm nhất 15 ngày trước ngày kết thúc thời hạn đăng ký mua cổ phần; cổ đông có quyền chuyển quyền ưu tiên mua cho người khác.","Nếu số cổ phần dự kiến chào bán không được đăng ký mua hết, Hội đồng quản trị được bán số còn lại cho cổ đông khác hoặc người khác với điều kiện không thuận lợi hơn.","Cổ phần được coi là đã bán khi thanh toán đủ và thông tin người mua được ghi đầy đủ vào sổ đăng ký cổ đông; từ thời điểm đó người mua trở thành cổ đông của công ty."]},"luat-59_125":{"tldr":"Chào bán cổ phần riêng lẻ của công ty không phải đại chúng là bán không qua phương tiện thông tin đại chúng, cho dưới 100 nhà đầu tư (không kể nhà đầu tư chứng khoán chuyên nghiệp) hoặc chỉ cho nhà đầu tư chuyên nghiệp.","points":["Cổ đông hiện hữu vẫn được thực hiện quyền ưu tiên mua cổ phần như quy định về chào bán cho cổ đông hiện hữu, trừ trường hợp sáp nhập, hợp nhất công ty.","Nếu cổ đông và người nhận chuyển quyền ưu tiên mua không mua hết, số cổ phần còn lại được bán cho người khác với điều kiện không thuận lợi hơn, trừ khi Đại hội đồng cổ đông chấp thuận khác.","Nhà đầu tư nước ngoài mua cổ phần chào bán phải làm thủ tục về mua cổ phần theo quy định của Luật Đầu tư."]},"luat-59_126":{"tldr":"Hội đồng quản trị quyết định thời điểm, phương thức và giá bán cổ phần; giá bán không được thấp hơn giá thị trường hoặc giá trị ghi trong sổ sách tại thời điểm gần nhất, trừ một số trường hợp ngoại lệ.","points":["Ngoại lệ về giá gồm: cổ phần bán lần đầu cho người không phải cổ đông sáng lập; cổ phần bán cho tất cả cổ đông theo tỷ lệ sở hữu hiện có; cổ phần bán cho người môi giới hoặc bảo lãnh (số/tỷ lệ chiết khấu phải được Đại hội đồng cổ đông chấp thuận, trừ khi Điều lệ quy định khác).","Trường hợp khác và mức chiết khấu áp dụng do Điều lệ công ty hoặc nghị quyết Đại hội đồng cổ đông quy định."]},"luat-59_127":{"tldr":"Cổ phần được tự do chuyển nhượng trừ trường hợp bị hạn chế theo khoản 3 Điều 120 hoặc Điều lệ công ty; việc chuyển nhượng thực hiện bằng hợp đồng hoặc giao dịch trên thị trường chứng khoán, kèm quy định về thừa kế, tặng cho, trả nợ bằng cổ phần.","points":["Hạn chế chuyển nhượng theo Điều lệ công ty chỉ có hiệu lực khi được nêu rõ trong cổ phiếu của cổ phần tương ứng.","Cổ đông là cá nhân chết: người thừa kế theo di chúc hoặc theo pháp luật trở thành cổ đông; nếu không có người thừa kế, người thừa kế từ chối hoặc bị truất quyền thừa kế thì xử lý theo pháp luật dân sự.","Cổ đông có quyền tặng cho một phần hoặc toàn bộ cổ phần hoặc dùng cổ phần để trả nợ; người nhận trở thành cổ đông từ khi thông tin được ghi đầy đủ vào sổ đăng ký cổ đông.","Công ty phải đăng ký thay đổi cổ đông trong sổ đăng ký cổ đông trong thời hạn 24 giờ kể từ khi nhận được yêu cầu."]},"luat-59_128":{"tldr":"Công ty cổ phần không phải đại chúng được chào bán trái phiếu riêng lẻ không qua phương tiện thông tin đại chúng, cho dưới 100 nhà đầu tư (không kể nhà đầu tư chứng khoán chuyên nghiệp), với điều kiện về đối tượng mua tùy theo loại trái phiếu.","points":["Trái phiếu chuyển đổi riêng lẻ và trái phiếu kèm theo chứng quyền riêng lẻ chỉ được bán cho nhà đầu tư chiến lược hoặc nhà đầu tư chứng khoán chuyên nghiệp.","Điều kiện chào bán gồm: đã thanh toán đủ gốc và lãi trái phiếu đã chào bán đến hạn hoặc thanh toán đủ nợ đến hạn trong 03 năm liên tiếp trước đợt chào bán (trừ bán cho tổ chức tài chính được lựa chọn); có báo cáo tài chính năm liền kề được kiểm toán; bảo đảm tỷ lệ an toàn tài chính theo quy định pháp luật."]},"luat-59_129":{"tldr":"Công ty quyết định phương án chào bán trái phiếu riêng lẻ, phải công bố thông tin và thông báo cho sở giao dịch chứng khoán trước và sau mỗi đợt chào bán theo thời hạn luật định.","points":["Công ty phải thông báo đợt chào bán cho sở giao dịch chứng khoán ít nhất 01 ngày làm việc trước ngày dự kiến tổ chức đợt chào bán.","Công ty công bố thông tin về kết quả đợt chào bán và thông báo cho sở giao dịch chứng khoán trong thời hạn 10 ngày kể từ ngày kết thúc đợt chào bán.","Trái phiếu phát hành riêng lẻ chỉ được chuyển nhượng giữa các nhà đầu tư đáp ứng điều kiện về đối tượng mua tại khoản 2 Điều 128, trừ trường hợp theo bản án, quyết định của Tòa án, phán quyết của Trọng tài có hiệu lực hoặc thừa kế."]},"luat-59_130":{"tldr":"Đại hội đồng cổ đông quyết định loại, tổng giá trị và thời điểm chào bán đối với trái phiếu chuyển đổi và trái phiếu kèm chứng quyền; các trường hợp khác do Hội đồng quản trị quyết định nhưng phải báo cáo Đại hội đồng cổ đông.","points":["Nếu Điều lệ công ty không quy định khác, Hội đồng quản trị có quyền quyết định loại trái phiếu, tổng giá trị và thời điểm chào bán (trừ trái phiếu chuyển đổi/kèm chứng quyền), nhưng phải báo cáo Đại hội đồng cổ đông tại cuộc họp gần nhất kèm tài liệu, hồ sơ về chào bán.","Công ty phải đăng ký thay đổi vốn điều lệ trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển đổi trái phiếu thành cổ phần."]},"luat-59_131":{"tldr":"Cổ phần, trái phiếu của công ty cổ phần có thể được mua bằng Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng, quyền sử dụng đất, quyền sở hữu trí tuệ, công nghệ, bí quyết kỹ thuật hoặc tài sản khác theo Điều lệ công ty, và phải được thanh toán đủ một lần.","points":["Tài sản dùng để mua cổ phần, trái phiếu phải được thanh toán đủ một lần."]},"luat-59_132":{"tldr":"Cổ đông đã biểu quyết không thông qua nghị quyết về tổ chức lại công ty hoặc thay đổi quyền, nghĩa vụ của cổ đông có quyền yêu cầu công ty mua lại cổ phần của mình bằng văn bản trong 10 ngày, và công ty phải mua lại trong 90 ngày kể từ ngày nhận yêu cầu.","points":["Yêu cầu mua lại phải bằng văn bản, nêu rõ tên, địa chỉ cổ đông, số lượng cổ phần từng loại, giá dự định bán, lý do yêu cầu, gửi trong thời hạn 10 ngày kể từ ngày Đại hội đồng cổ đông thông qua nghị quyết liên quan.","Công ty phải mua lại cổ phần theo giá thị trường hoặc giá tính theo nguyên tắc tại Điều lệ trong thời hạn 90 ngày kể từ ngày nhận yêu cầu; nếu không thỏa thuận được giá, các bên có thể yêu cầu tổ chức thẩm định giá, công ty giới thiệu ít nhất 03 tổ chức thẩm định giá để cổ đông lựa chọn."]},"luat-59_133":{"tldr":"Công ty có quyền mua lại không quá 30% tổng số cổ phần phổ thông đã bán và một phần hoặc toàn bộ cổ phần ưu đãi cổ tức đã bán, theo thẩm quyền và trình tự thủ tục luật định.","points":["Hội đồng quản trị được quyết định mua lại không quá 10% tổng số cổ phần của từng loại đã bán trong thời hạn 12 tháng; trường hợp khác do Đại hội đồng cổ đông quyết định.","Đối với cổ phần phổ thông, giá mua lại không được cao hơn giá thị trường tại thời điểm mua lại (trừ ngoại lệ); đối với cổ phần loại khác, giá mua lại không được thấp hơn giá thị trường nếu không có quy định hoặc thỏa thuận khác.","Nếu mua lại theo tỷ lệ sở hữu của từng cổ đông: thông báo phải gửi đến tất cả cổ đông trong thời hạn 30 ngày kể từ ngày quyết định được thông qua; cổ đông đồng ý bán phải gửi văn bản đồng ý trong thời hạn 30 ngày kể từ ngày thông báo."]},"luat-59_134":{"tldr":"Công ty chỉ được thanh toán cổ phần mua lại nếu ngay sau khi thanh toán vẫn bảo đảm thanh toán đủ nợ và nghĩa vụ tài sản khác; cổ phần mua lại được coi là cổ phần chưa bán và cổ phiếu tương ứng phải bị tiêu hủy ngay sau khi thanh toán.","points":["Cổ phần mua lại theo Điều 132, 133 được coi là cổ phần chưa bán; công ty phải đăng ký giảm vốn điều lệ tương ứng trong thời hạn 10 ngày kể từ ngày hoàn thành việc thanh toán mua lại cổ phần.","Cổ phiếu xác nhận cổ phần đã mua lại phải bị tiêu hủy ngay sau khi thanh toán đủ; Chủ tịch Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc phải liên đới chịu trách nhiệm về thiệt hại do không tiêu hủy hoặc chậm tiêu hủy.","Nếu tổng giá trị tài sản ghi trong sổ kế toán giảm hơn 10% sau khi thanh toán hết số cổ phần mua lại, công ty phải thông báo cho tất cả chủ nợ trong thời hạn 15 ngày kể từ ngày thanh toán hết."]},"luat-59_135":{"tldr":"Công ty chỉ được trả cổ tức cho cổ phần phổ thông khi đáp ứng đủ điều kiện về hoàn thành nghĩa vụ tài chính, trích lập quỹ, bù lỗ và bảo đảm thanh toán đủ nợ sau khi trả cổ tức; việc trả cổ tức phải theo thời hạn và thủ tục thông báo cụ thể.","points":["Điều kiện trả cổ tức cổ phần phổ thông: đã hoàn thành nghĩa vụ thuế và nghĩa vụ tài chính khác; đã trích lập các quỹ và bù đắp lỗ theo quy định; ngay sau khi trả hết cổ tức vẫn bảo đảm thanh toán đủ các khoản nợ, nghĩa vụ tài sản khác đến hạn.","Cổ tức có thể được chi trả bằng tiền mặt (Đồng Việt Nam), bằng cổ phần của công ty hoặc bằng tài sản khác theo Điều lệ công ty.","Cổ tức phải được thanh toán đầy đủ trong thời hạn 06 tháng kể từ ngày kết thúc họp Đại hội đồng cổ đông thường niên; thông báo trả cổ tức phải gửi đến cổ đông chậm nhất 15 ngày trước khi thực hiện trả.","Trường hợp chi trả cổ tức bằng cổ phần, công ty không phải làm thủ tục chào bán cổ phần nhưng phải đăng ký tăng vốn điều lệ trong thời hạn 10 ngày kể từ ngày hoàn thành việc thanh toán cổ tức."]},"luat-59_136":{"tldr":"Nếu việc thanh toán cổ phần mua lại hoặc trả cổ tức trái với quy định của Luật này, cổ đông phải hoàn trả cho công ty số tiền, tài sản đã nhận; nếu cổ đông không hoàn trả được, tất cả thành viên Hội đồng quản trị phải liên đới chịu trách nhiệm.","points":["Thành viên Hội đồng quản trị liên đới chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi giá trị số tiền, tài sản đã trả cho cổ đông mà chưa được hoàn lại."]},"luat-59_137":{"tldr":"Công ty cổ phần được lựa chọn một trong hai mô hình tổ chức quản lý: có Ban kiểm soát, hoặc không có Ban kiểm soát nhưng phải có tỷ lệ thành viên Hội đồng quản trị độc lập và Ủy ban kiểm toán, tùy điều kiện cụ thể.","points":["Mô hình 1: Đại hội đồng cổ đông, Hội đồng quản trị, Ban kiểm soát và Giám đốc/Tổng giám đốc; không bắt buộc có Ban kiểm soát nếu công ty có dưới 11 cổ đông và các cổ đông là tổ chức sở hữu dưới 50% tổng số cổ phần.","Mô hình 2: Đại hội đồng cổ đông, Hội đồng quản trị và Giám đốc/Tổng giám đốc; ít nhất 20% số thành viên Hội đồng quản trị phải là thành viên độc lập và phải có Ủy ban kiểm toán trực thuộc Hội đồng quản trị.","Nếu công ty chỉ có một người đại diện theo pháp luật thì đó là Chủ tịch Hội đồng quản trị hoặc Giám đốc/Tổng giám đốc (mặc định là Chủ tịch nếu Điều lệ chưa quy định); nếu có hơn một người đại diện thì cả Chủ tịch Hội đồng quản trị và Giám đốc/Tổng giám đốc đương nhiên là người đại diện theo pháp luật."]},"luat-59_138":{"tldr":"Đại hội đồng cổ đông gồm tất cả cổ đông có quyền biểu quyết, là cơ quan quyết định cao nhất của công ty cổ phần, có thẩm quyền quyết định các vấn đề quan trọng như định hướng phát triển, cổ phần, nhân sự chủ chốt, tài sản lớn, sửa đổi Điều lệ, tổ chức lại/giải thể công ty.","points":["Quyết định đầu tư hoặc bán tài sản có giá trị từ 35% tổng giá trị tài sản trở lên (theo báo cáo tài chính gần nhất), trừ khi Điều lệ quy định một tỷ lệ hoặc giá trị khác.","Bầu, miễn nhiệm, bãi nhiệm thành viên Hội đồng quản trị, Kiểm soát viên; quyết định mua lại trên 10% tổng số cổ phần đã bán của mỗi loại.","Quyết định sửa đổi, bổ sung Điều lệ công ty; thông qua báo cáo tài chính hằng năm; quyết định tổ chức lại, giải thể công ty."]},"luat-59_139":{"tldr":"Đại hội đồng cổ đông họp thường niên mỗi năm một lần trong thời hạn 04 tháng kể từ ngày kết thúc năm tài chính (có thể gia hạn nhưng không quá 06 tháng), và thảo luận, thông qua các vấn đề quan trọng như kế hoạch kinh doanh, báo cáo tài chính, mức cổ tức.","points":["Địa điểm họp Đại hội đồng cổ đông được xác định là nơi chủ tọa tham dự họp và phải ở trên lãnh thổ Việt Nam.","Trừ khi Điều lệ công ty có quy định khác, Hội đồng quản trị quyết định gia hạn họp thường niên trong trường hợp cần thiết nhưng không quá 06 tháng kể từ ngày kết thúc năm tài chính.","Đại hội đồng cổ đông thường niên thảo luận, thông qua: kế hoạch kinh doanh hằng năm, báo cáo tài chính hằng năm, báo cáo của Hội đồng quản trị và Ban kiểm soát, mức cổ tức đối với mỗi cổ phần từng loại."]},"luat-59_140":{"tldr":"Hội đồng quản trị triệu tập họp Đại hội đồng cổ đông thường niên và bất thường trong các trường hợp luật định; nếu Hội đồng quản trị không triệu tập, lần lượt Ban kiểm soát rồi cổ đông/nhóm cổ đông đủ điều kiện có quyền thay thế triệu tập.","points":["Hội đồng quản trị phải triệu tập họp bất thường trong 30 ngày kể từ khi số thành viên Hội đồng quản trị/Ban kiểm soát còn lại thiếu hụt, hoặc khi nhận được yêu cầu triệu tập từ cổ đông/nhóm cổ đông theo khoản 2 Điều 115 hoặc từ Ban kiểm soát.","Nếu Hội đồng quản trị không triệu tập đúng hạn, trong 30 ngày tiếp theo Ban kiểm soát phải thay thế triệu tập; nếu Ban kiểm soát cũng không triệu tập, cổ đông hoặc nhóm cổ đông theo khoản 2 Điều 115 có quyền đại diện công ty triệu tập.","Người triệu tập họp phải lập danh sách cổ đông có quyền dự họp, chuẩn bị chương trình, nội dung, tài liệu cuộc họp, dự thảo nghị quyết và gửi thông báo mời họp đến từng cổ đông.","Chi phí triệu tập và tiến hành họp trong các trường hợp thay thế Hội đồng quản trị sẽ được công ty hoàn lại."]},"luat-59_141":{"tldr":"Danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông được lập dựa trên sổ đăng ký cổ đông, không quá 10 ngày trước ngày gửi giấy mời họp (trừ khi Điều lệ quy định ngắn hơn), và cổ đông có quyền kiểm tra, yêu cầu sửa đổi thông tin của mình.","points":["Danh sách phải có họ tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cổ đông cá nhân hoặc tên, mã số doanh nghiệp của cổ đông tổ chức, cùng số lượng cổ phần từng loại, số và ngày đăng ký cổ đông.","Người quản lý công ty phải cung cấp kịp thời thông tin trong sổ đăng ký cổ đông, sửa đổi, bổ sung thông tin sai lệch theo yêu cầu của cổ đông và chịu trách nhiệm bồi thường thiệt hại nếu không cung cấp kịp thời, chính xác."]},"luat-59_142":{"tldr":"Người triệu tập họp Đại hội đồng cổ đông phải chuẩn bị chương trình, nội dung cuộc họp; cổ đông hoặc nhóm cổ đông đủ điều kiện theo khoản 2 Điều 115 có quyền kiến nghị vấn đề đưa vào chương trình, và người triệu tập chỉ được từ chối kiến nghị trong các trường hợp luật định.","points":["Kiến nghị phải bằng văn bản, gửi chậm nhất 03 ngày làm việc trước ngày khai mạc (trừ khi Điều lệ quy định thời hạn khác), ghi rõ tên cổ đông, số lượng cổ phần và vấn đề kiến nghị.","Người triệu tập chỉ được từ chối kiến nghị nếu: kiến nghị gửi không đúng quy định; vấn đề không thuộc thẩm quyền quyết định của Đại hội đồng cổ đông; hoặc trường hợp khác theo Điều lệ; nếu từ chối phải trả lời bằng văn bản nêu rõ lý do chậm nhất 02 ngày làm việc trước ngày khai mạc."]},"luat-59_143":{"tldr":"Người triệu tập họp Đại hội đồng cổ đông phải gửi thông báo mời họp cho tất cả cổ đông có quyền dự họp và đăng công khai trên trang thông tin điện tử của công ty, kèm theo tài liệu họp.","points":["Thông báo mời họp phải gửi chậm nhất 21 ngày trước ngày khai mạc, trừ khi Điều lệ công ty quy định thời hạn dài hơn.","Thông báo phải gửi bằng phương thức bảo đảm đến địa chỉ liên lạc cổ đông và đăng trên trang thông tin điện tử công ty; có thể đăng báo trung ương/địa phương nếu cần thiết.","Kèm theo thông báo phải có chương trình họp, tài liệu sử dụng trong cuộc họp, dự thảo nghị quyết và phiếu biểu quyết.","Nếu công ty có trang thông tin điện tử, việc gửi tài liệu họp có thể thay bằng đăng tải lên trang đó, nhưng phải ghi rõ nơi và cách thức tải tài liệu."]},"luat-59_144":{"tldr":"Cổ đông có thể trực tiếp dự họp Đại hội đồng cổ đông, ủy quyền cho cá nhân/tổ chức khác dự họp, hoặc tham dự và biểu quyết theo các hình thức khác do luật quy định.","points":["Việc ủy quyền dự họp phải lập thành văn bản, nêu rõ tên người được ủy quyền và số cổ phần được ủy quyền; phải xuất trình văn bản ủy quyền khi đăng ký dự họp.","Cổ đông được coi là tham dự và biểu quyết khi: dự họp trực tiếp; ủy quyền người khác dự họp; dự họp qua hội nghị trực tuyến, bỏ phiếu điện tử; gửi phiếu biểu quyết qua thư, fax, thư điện tử; hoặc phương tiện khác theo Điều lệ công ty."]},"luat-59_145":{"tldr":"Cuộc họp Đại hội đồng cổ đông chỉ được tiến hành khi đạt tỷ lệ cổ đông dự họp tối thiểu, với điều kiện giảm dần qua các lần triệu tập họp thứ nhất, thứ hai và thứ ba.","points":["Lần thứ nhất: cần số cổ đông dự họp đại diện trên 50% tổng số phiếu biểu quyết.","Lần thứ hai (thông báo mời họp gửi trong 30 ngày kể từ ngày dự định họp lần một nếu Điều lệ không quy định khác): cần từ 33% tổng số phiếu biểu quyết trở lên.","Lần thứ ba (thông báo gửi trong 20 ngày kể từ ngày dự định họp lần hai): được tiến hành không phụ thuộc tổng số phiếu biểu quyết của cổ đông dự họp.","Chỉ Đại hội đồng cổ đông mới có quyền quyết định thay đổi chương trình họp đã gửi kèm thông báo mời họp."]},"luat-59_146":{"tldr":"Khi Điều lệ công ty không quy định khác, luật quy định thể thức mặc định để tiến hành họp và biểu quyết tại Đại hội đồng cổ đông, từ đăng ký, bầu chủ tọa đến quyền hoãn họp.","points":["Trước khai mạc phải đăng ký cổ đông dự họp; Chủ tịch Hội đồng quản trị thường làm chủ tọa hoặc ủy quyền, có quy trình bầu thay thế nếu vắng mặt hoặc không bầu được chủ tọa.","Đại hội đồng cổ đông thông qua chương trình họp tại phiên khai mạc và biểu quyết theo từng vấn đề bằng tán thành, không tán thành hoặc không có ý kiến.","Cổ đông đến sau khi khai mạc vẫn được đăng ký và biểu quyết cho các nội dung sau khi đăng ký, không làm thay đổi hiệu lực nội dung đã biểu quyết trước đó.","Chủ tọa có quyền hoãn cuộc họp tối đa không quá 3 ngày làm việc trong trường hợp: thiếu chỗ ngồi, phương tiện thông tin không bảo đảm, hoặc có người gây rối trật tự.","Nếu chủ tọa hoãn hoặc tạm dừng họp trái quy định, Đại hội đồng cổ đông bầu người khác thay thế điều hành và các nghị quyết được thông qua vẫn có hiệu lực."]},"luat-59_147":{"tldr":"Nghị quyết Đại hội đồng cổ đông được thông qua bằng hình thức biểu quyết tại cuộc họp hoặc lấy ý kiến bằng văn bản, trong đó một số nội dung quan trọng bắt buộc phải biểu quyết tại cuộc họp.","points":["Trừ khi Điều lệ quy định khác, phải biểu quyết tại cuộc họp đối với: sửa đổi bổ sung Điều lệ, định hướng phát triển công ty, loại và tổng số cổ phần từng loại, bầu/miễn nhiệm/bãi nhiệm thành viên Hội đồng quản trị và Ban kiểm soát.","Cũng bắt buộc biểu quyết tại cuộc họp đối với: quyết định đầu tư hoặc bán tài sản có giá trị từ 35% tổng giá trị tài sản trở lên, thông qua báo cáo tài chính hằng năm, và tổ chức lại, giải thể công ty."]},"luat-59_148":{"tldr":"Luật quy định các mức tỷ lệ phiếu biểu quyết tán thành cần thiết để nghị quyết Đại hội đồng cổ đông được thông qua, tùy theo loại nội dung và hình thức thông qua nghị quyết.","points":["Cần từ 65% tổng số phiếu biểu quyết trở lên tán thành đối với các nội dung như loại và tổng số cổ phần từng loại, thay đổi ngành nghề kinh doanh, thay đổi cơ cấu tổ chức quản lý, đầu tư/bán tài sản từ 35% tổng giá trị tài sản trở lên, tổ chức lại hoặc giải thể công ty.","Các nghị quyết khác được thông qua khi có trên 50% tổng số phiếu biểu quyết của cổ đông dự họp tán thành.","Việc bầu thành viên Hội đồng quản trị và Ban kiểm soát phải thực hiện theo phương thức bầu dồn phiếu, trừ khi Điều lệ công ty quy định khác.","Trường hợp lấy ý kiến bằng văn bản, nghị quyết được thông qua khi trên 50% tổng số phiếu biểu quyết của cổ đông có quyền biểu quyết tán thành, và phải thông báo đến cổ đông trong 15 ngày kể từ ngày thông qua.","Nghị quyết làm thay đổi bất lợi quyền, nghĩa vụ của cổ đông sở hữu cổ phần ưu đãi chỉ được thông qua khi có từ 75% tổng số cổ phần ưu đãi cùng loại trở lên tán thành."]},"luat-59_149":{"tldr":"Khi Điều lệ công ty không quy định khác, Hội đồng quản trị có quyền lấy ý kiến cổ đông bằng văn bản để thông qua nghị quyết Đại hội đồng cổ đông, theo trình tự chuẩn bị phiếu, gửi, kiểm phiếu và lưu giữ tài liệu do luật quy định.","points":["Hội đồng quản trị có quyền lấy ý kiến bằng văn bản khi cần thiết vì lợi ích công ty (trừ các vấn đề bắt buộc biểu quyết tại cuộc họp theo khoản 2 Điều 147); phiếu lấy ý kiến phải gửi chậm nhất 10 ngày trước hạn gửi lại.","Phiếu lấy ý kiến phải có các nội dung chủ yếu như thông tin công ty, mục đích lấy ý kiến, thông tin cổ đông, vấn đề cần lấy ý kiến, phương án biểu quyết và thời hạn gửi về.","Cổ đông gửi phiếu qua thư, fax hoặc thư điện tử theo cách thức bảo đảm hợp lệ và bí mật đến thời điểm kiểm phiếu; phiếu gửi muộn hoặc bị lộ trước kiểm phiếu là không hợp lệ.","Hội đồng quản trị tổ chức kiểm phiếu, lập biên bản kiểm phiếu dưới sự chứng kiến, giám sát của Ban kiểm soát hoặc cổ đông không giữ chức vụ quản lý công ty.","Biên bản kiểm phiếu và nghị quyết phải gửi đến cổ đông trong 15 ngày kể từ ngày kết thúc kiểm phiếu; nghị quyết thông qua theo hình thức này có giá trị như nghị quyết thông qua tại cuộc họp."]},"luat-59_150":{"tldr":"Cuộc họp Đại hội đồng cổ đông phải được ghi biên bản bằng tiếng Việt với các nội dung chủ yếu theo quy định, hoàn thành và thông qua trước khi kết thúc cuộc họp.","points":["Biên bản phải gồm các nội dung như thời gian, địa điểm, chương trình họp, tóm tắt diễn biến, kết quả biểu quyết từng vấn đề và tỷ lệ thông qua tương ứng.","Biên bản phải làm xong và thông qua trước khi kết thúc cuộc họp; chủ tọa và thư ký liên đới chịu trách nhiệm về tính trung thực, chính xác của nội dung.","Nếu có bản tiếng nước ngoài, khi có sự khác nhau về nội dung thì bản tiếng Việt được áp dụng.","Biên bản họp phải được gửi đến tất cả cổ đông trong thời hạn 15 ngày kể từ ngày kết thúc cuộc họp."]},"luat-59_151":{"tldr":"Cổ đông hoặc nhóm cổ đông có quyền yêu cầu Tòa án hoặc Trọng tài xem xét, hủy bỏ nghị quyết Đại hội đồng cổ đông trong thời hạn 90 ngày nếu trình tự triệu tập, ra quyết định hoặc nội dung nghị quyết vi phạm pháp luật hoặc Điều lệ công ty.","points":["Thời hạn yêu cầu là 90 ngày kể từ ngày nhận được nghị quyết, biên bản họp hoặc biên bản kết quả kiểm phiếu lấy ý kiến.","Căn cứ hủy bỏ gồm: vi phạm nghiêm trọng trình tự, thủ tục triệu tập họp và ra quyết định (trừ trường hợp quy định tại khoản 2 Điều 152); hoặc nội dung nghị quyết vi phạm pháp luật hay Điều lệ công ty."]},"luat-59_152":{"tldr":"Nghị quyết Đại hội đồng cổ đông có hiệu lực từ ngày được thông qua hoặc từ thời điểm ghi trong nghị quyết, và vẫn có hiệu lực thi hành trong khi chờ Tòa án hoặc Trọng tài xem xét yêu cầu hủy bỏ.","points":["Nghị quyết được thông qua bằng 100% tổng số cổ phần có quyền biểu quyết là hợp pháp và có hiệu lực dù trình tự, thủ tục triệu tập, thông qua vi phạm quy định.","Khi có yêu cầu hủy bỏ nghị quyết theo Điều 151, nghị quyết vẫn có hiệu lực thi hành cho đến khi quyết định hủy bỏ của Tòa án, Trọng tài có hiệu lực, trừ trường hợp áp dụng biện pháp khẩn cấp tạm thời."]},"luat-59_153":{"tldr":"Hội đồng quản trị là cơ quan quản lý công ty, có toàn quyền nhân danh công ty quyết định các vấn đề không thuộc thẩm quyền của Đại hội đồng cổ đông, với danh mục quyền và nghĩa vụ cụ thể do luật quy định.","points":["Quyền, nghĩa vụ gồm: quyết định chiến lược, kế hoạch kinh doanh; kiến nghị loại và số cổ phần chào bán; quyết định giá bán cổ phần, trái phiếu; bổ nhiệm, miễn nhiệm Giám đốc hoặc Tổng giám đốc.","Thông qua hợp đồng, giao dịch có giá trị từ 35% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất, trừ trường hợp thuộc thẩm quyền Đại hội đồng cổ đông hoặc Điều lệ quy định khác.","Hội đồng quản trị thông qua nghị quyết bằng biểu quyết tại cuộc họp, lấy ý kiến văn bản hoặc hình thức khác; mỗi thành viên có một phiếu biểu quyết.","Thành viên tán thành nghị quyết trái pháp luật gây thiệt hại phải liên đới chịu trách nhiệm và đền bù thiệt hại; thành viên phản đối được miễn trừ trách nhiệm."]},"luat-59_154":{"tldr":"Hội đồng quản trị có từ 03 đến 11 thành viên với nhiệm kỳ không quá 05 năm, có thể được bầu lại với số nhiệm kỳ không hạn chế, riêng thành viên độc lập bị giới hạn số nhiệm kỳ liên tục.","points":["Số lượng thành viên cụ thể trong khoảng 3-11 người do Điều lệ công ty quy định.","Một cá nhân chỉ được bầu làm thành viên độc lập Hội đồng quản trị của một công ty không quá 02 nhiệm kỳ liên tục.","Khi tất cả thành viên cùng kết thúc nhiệm kỳ, các thành viên đó tiếp tục làm việc cho đến khi có thành viên mới được bầu thay thế, trừ khi Điều lệ quy định khác."]},"luat-59_155":{"tldr":"Điều luật quy định các tiêu chuẩn, điều kiện chung để làm thành viên Hội đồng quản trị và tiêu chuẩn riêng, chặt chẽ hơn đối với thành viên độc lập Hội đồng quản trị.","points":["Thành viên Hội đồng quản trị không thuộc đối tượng cấm quản lý doanh nghiệp, phải có trình độ chuyên môn, kinh nghiệm quản trị kinh doanh và không nhất thiết phải là cổ đông.","Thành viên độc lập phải không làm việc hoặc từng làm việc cho công ty, công ty mẹ, công ty con ít nhất 3 năm liền trước, không hưởng lương từ công ty, không có quan hệ gia đình với cổ đông lớn, không sở hữu từ 1% cổ phần biểu quyết trở lên.","Thành viên độc lập phải thông báo khi không còn đáp ứng tiêu chuẩn và đương nhiên mất tư cách; Hội đồng quản trị phải triệu tập họp Đại hội đồng cổ đông bầu bổ sung, thay thế trong 06 tháng kể từ ngày nhận thông báo."]},"luat-59_156":{"tldr":"Chủ tịch Hội đồng quản trị do Hội đồng quản trị bầu trong số thành viên, có các quyền điều hành hoạt động Hội đồng quản trị và không được kiêm Giám đốc, Tổng giám đốc đối với công ty đại chúng và một số doanh nghiệp nhà nước.","points":["Chủ tịch Hội đồng quản trị của công ty đại chúng và công ty cổ phần theo điểm b khoản 1 Điều 88 không được kiêm Giám đốc hoặc Tổng giám đốc.","Quyền, nghĩa vụ gồm lập chương trình hoạt động Hội đồng quản trị, triệu tập và chủ trì họp Hội đồng quản trị, chủ tọa họp Đại hội đồng cổ đông.","Khi vắng mặt phải ủy quyền bằng văn bản cho thành viên khác; nếu không có người ủy quyền hoặc Chủ tịch mất năng lực (chết, mất tích, bị tạm giam...), các thành viên còn lại bầu người thay thế theo nguyên tắc đa số.","Hội đồng quản trị có thể bổ nhiệm thư ký công ty để hỗ trợ tổ chức triệu tập họp, ghi biên bản và hỗ trợ quan hệ cổ đông."]},"luat-59_157":{"tldr":"Điều luật quy định chi tiết việc triệu tập, tiến hành và biểu quyết tại cuộc họp Hội đồng quản trị, gồm định kỳ họp, điều kiện tiến hành và các hình thức tham dự, biểu quyết.","points":["Chủ tịch Hội đồng quản trị được bầu trong cuộc họp đầu tiên trong thời hạn 07 ngày làm việc kể từ ngày kết thúc bầu cử Hội đồng quản trị; Hội đồng quản trị họp ít nhất mỗi quý một lần.","Chủ tịch phải triệu tập họp trong 07 ngày làm việc kể từ khi nhận đề nghị hợp lệ (từ Ban kiểm soát, thành viên độc lập, Giám đốc/Tổng giám đốc hoặc ít nhất 02 thành viên Hội đồng quản trị).","Thông báo mời họp phải gửi chậm nhất 03 ngày làm việc trước ngày họp, trừ khi Điều lệ công ty quy định khác.","Cuộc họp được tiến hành khi có từ 3/4 tổng số thành viên trở lên dự họp; nếu không đủ, họp lần hai trong 07 ngày cần hơn một nửa số thành viên dự họp.","Nghị quyết, quyết định được thông qua nếu được đa số thành viên dự họp tán thành, trừ khi Điều lệ quy định tỷ lệ cao hơn; nếu số phiếu ngang nhau thì quyết định thuộc về phía có ý kiến của Chủ tịch."]},"luat-59_158":{"tldr":"Các cuộc họp Hội đồng quản trị phải được ghi biên bản bằng tiếng Việt với các nội dung chủ yếu theo quy định, lưu giữ tại trụ sở chính của công ty.","points":["Biên bản gồm thời gian, địa điểm, nội dung họp, thành viên dự họp, ý kiến thảo luận, kết quả biểu quyết và tỷ lệ thông qua.","Nếu chủ tọa hoặc người ghi biên bản từ chối ký, biên bản vẫn có hiệu lực nếu được tất cả thành viên khác dự họp ký và đủ nội dung theo quy định.","Nếu có bản tiếng nước ngoài, khi có sự khác nhau về nội dung thì bản tiếng Việt được áp dụng."]},"luat-59_159":{"tldr":"Thành viên Hội đồng quản trị có quyền yêu cầu người quản lý công ty cung cấp thông tin, tài liệu về tình hình tài chính, hoạt động kinh doanh của công ty và của đơn vị trong công ty.","points":["Người quản lý được yêu cầu phải cung cấp kịp thời, đầy đủ và chính xác thông tin, tài liệu theo yêu cầu.","Trình tự, thủ tục yêu cầu và cung cấp thông tin do Điều lệ công ty quy định."]},"luat-59_160":{"tldr":"Đại hội đồng cổ đông có quyền miễn nhiệm, bãi nhiệm hoặc thay thế thành viên Hội đồng quản trị theo các trường hợp cụ thể, và Hội đồng quản trị phải triệu tập họp bầu bổ sung khi số thành viên giảm quá mức quy định.","points":["Miễn nhiệm khi: không đủ tiêu chuẩn theo Điều 155; có đơn từ chức được chấp thuận; trường hợp khác do Điều lệ quy định.","Bãi nhiệm khi: không tham gia hoạt động Hội đồng quản trị trong 06 tháng liên tục (trừ bất khả kháng); trường hợp khác do Điều lệ quy định.","Hội đồng quản trị phải triệu tập họp Đại hội đồng cổ đông bầu bổ sung trong 60 ngày khi số thành viên giảm quá một phần ba so với quy định tại Điều lệ, hoặc khi số thành viên độc lập không đủ tỷ lệ theo Điều 137."]},"luat-59_161":{"tldr":"Ủy ban kiểm toán là cơ quan chuyên môn thuộc Hội đồng quản trị có từ 02 thành viên trở lên, do Chủ tịch là thành viên độc lập Hội đồng quản trị đứng đầu, với các quyền và nghĩa vụ giám sát tài chính, kiểm soát nội bộ và kiểm toán.","points":["Chủ tịch Ủy ban kiểm toán phải là thành viên độc lập Hội đồng quản trị; các thành viên khác phải là thành viên Hội đồng quản trị không điều hành.","Quyết định được thông qua nếu được đa số thành viên dự họp tán thành, trừ khi Điều lệ hoặc quy chế quy định tỷ lệ cao hơn; nếu số phiếu ngang nhau thì theo ý kiến của Chủ tịch.","Quyền, nghĩa vụ gồm giám sát tính trung thực của báo cáo tài chính, rà soát hệ thống kiểm soát nội bộ và quản lý rủi ro, rà soát giao dịch với người có liên quan, giám sát kiểm toán nội bộ và kiến nghị công ty kiểm toán độc lập."]},"luat-59_162":{"tldr":"Giám đốc hoặc Tổng giám đốc do Hội đồng quản trị bổ nhiệm hoặc thuê, là người điều hành công việc kinh doanh hằng ngày và chịu sự giám sát của Hội đồng quản trị, với nhiệm kỳ không quá 5 năm.","points":["Nhiệm kỳ không quá 05 năm, có thể được bổ nhiệm lại với số nhiệm kỳ không hạn chế.","Quyền, nghĩa vụ gồm quyết định vấn đề kinh doanh hằng ngày ngoài thẩm quyền Hội đồng quản trị, tổ chức thực hiện nghị quyết Hội đồng quản trị, bổ nhiệm/miễn nhiệm chức danh quản lý (trừ thuộc thẩm quyền Hội đồng quản trị), tuyển dụng lao động.","Nếu điều hành trái quy định gây thiệt hại cho công ty thì phải chịu trách nhiệm trước pháp luật và bồi thường thiệt hại.","Đối với công ty đại chúng và một số doanh nghiệp nhà nước, phải đáp ứng thêm tiêu chuẩn: không thuộc đối tượng cấm quản lý doanh nghiệp, không có quan hệ gia đình với người quản lý/Kiểm soát viên/người đại diện vốn liên quan, có trình độ chuyên môn phù hợp."]},"luat-59_163":{"tldr":"Công ty có quyền trả thù lao, lương, thưởng cho thành viên Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc theo kết quả kinh doanh, với cách tính và thẩm quyền quyết định cụ thể khi Điều lệ không quy định khác.","points":["Thành viên Hội đồng quản trị hưởng thù lao công việc (tính theo số ngày công cần thiết và mức thù lao mỗi ngày) và thưởng; tổng mức thù lao, thưởng do Đại hội đồng cổ đông quyết định tại cuộc họp thường niên.","Thành viên Hội đồng quản trị được thanh toán chi phí ăn, ở, đi lại và chi phí hợp lý khác khi thực hiện nhiệm vụ.","Giám đốc hoặc Tổng giám đốc được trả lương và thưởng do Hội đồng quản trị quyết định.","Các khoản này tính vào chi phí kinh doanh, thể hiện thành mục riêng trong báo cáo tài chính hằng năm và phải báo cáo Đại hội đồng cổ đông tại cuộc họp thường niên."]},"luat-59_164":{"tldr":"Công ty phải lập, cập nhật danh sách người có liên quan, và người quản lý công ty phải kê khai các lợi ích liên quan của mình để công khai theo quy định khi Điều lệ không có quy định chặt chẽ hơn.","points":["Thành viên Hội đồng quản trị, Kiểm soát viên, Giám đốc/Tổng giám đốc và người quản lý khác phải kê khai doanh nghiệp mà họ hoặc người có liên quan của họ làm chủ, sở hữu vốn góp, cổ phần (từ trên 10% vốn điều lệ đối với người liên quan).","Việc kê khai hoặc sửa đổi, bổ sung phải thực hiện trong thời hạn 07 ngày làm việc kể từ ngày phát sinh hoặc có thay đổi.","Danh sách người có liên quan và lợi ích liên quan được thông báo cho Đại hội đồng cổ đông tại họp thường niên, lưu giữ tại trụ sở chính; cổ đông và người quản lý có quyền xem xét, trích lục, sao chép.","Người quản lý thực hiện công việc kinh doanh nhân danh cá nhân hoặc người khác trong phạm vi công việc công ty phải giải trình và chỉ được thực hiện khi đa số thành viên còn lại của Hội đồng quản trị chấp thuận; nếu không khai báo hoặc không được chấp thuận thì thu nhập từ đó thuộc về công ty."]},"luat-59_165":{"tldr":"Thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và người quản lý khác phải thực hiện quyền, nghĩa vụ một cách trung thực, cẩn trọng vì lợi ích công ty; nếu vi phạm phải chịu trách nhiệm bồi thường.","points":["Trách nhiệm gồm: thực hiện đúng quy định pháp luật, Điều lệ, nghị quyết Đại hội đồng cổ đông; trung thành với lợi ích công ty và cổ đông, không lạm dụng địa vị để tư lợi; thông báo kịp thời về lợi ích liên quan theo khoản 2 Điều 164.","Người vi phạm chịu trách nhiệm cá nhân hoặc liên đới đền bù lợi ích bị mất, trả lại lợi ích đã nhận và bồi thường toàn bộ thiệt hại cho công ty và bên thứ ba."]},"luat-59_166":{"tldr":"Cổ đông hoặc nhóm cổ đông sở hữu ít nhất 1% tổng số cổ phần phổ thông có quyền khởi kiện thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc để yêu cầu hoàn trả lợi ích hoặc bồi thường thiệt hại trong các trường hợp vi phạm cụ thể.","points":["Điều kiện khởi kiện là sở hữu ít nhất 1% tổng số cổ phần phổ thông, có thể tự mình hoặc nhân danh công ty khởi kiện.","Căn cứ khởi kiện gồm: vi phạm trách nhiệm người quản lý công ty theo Điều 165, thực hiện không đầy đủ hoặc trái quy định pháp luật, Điều lệ, nghị quyết Hội đồng quản trị, hoặc lạm dụng địa vị để tư lợi.","Chi phí khởi kiện trong trường hợp khởi kiện nhân danh công ty được tính vào chi phí công ty, trừ trường hợp bị bác yêu cầu khởi kiện."]},"luat-59_167":{"tldr":"Hợp đồng, giao dịch giữa công ty với người có liên quan (cổ đông lớn, thành viên quản lý...) phải được Đại hội đồng cổ đông hoặc Hội đồng quản trị chấp thuận tùy theo giá trị và loại giao dịch.","points":["Đối tượng người có liên quan cần chấp thuận gồm: cổ đông/đại diện sở hữu trên 10% cổ phần phổ thông và người liên quan của họ; thành viên Hội đồng quản trị, Giám đốc/Tổng giám đốc và người liên quan của họ; doanh nghiệp phải kê khai theo khoản 2 Điều 164.","Hội đồng quản trị chấp thuận giao dịch có giá trị nhỏ hơn 35% tổng giá trị tài sản (trừ khi Điều lệ quy định khác), quyết định trong 15 ngày kể từ khi nhận thông báo; thành viên có lợi ích liên quan không được biểu quyết.","Đại hội đồng cổ đông chấp thuận các giao dịch còn lại và giao dịch vay, cho vay, bán tài sản có giá trị lớn hơn 10% tổng giá trị tài sản giữa công ty với cổ đông sở hữu từ 51% cổ phần biểu quyết trở lên hoặc người có liên quan của cổ đông đó.","Hợp đồng, giao dịch ký kết không đúng quy định bị vô hiệu theo quyết định của Tòa án; người liên quan phải liên đới bồi thường thiệt hại và hoàn trả lợi ích thu được."]},"luat-59_168":{"tldr":"Ban kiểm soát có từ 03 đến 05 Kiểm soát viên với nhiệm kỳ không quá 05 năm, do Trưởng Ban kiểm soát đứng đầu, được bầu trong số Kiểm soát viên theo nguyên tắc đa số.","points":["Nhiệm kỳ Kiểm soát viên không quá 05 năm, có thể được bầu lại với số nhiệm kỳ không hạn chế.","Ban kiểm soát phải có hơn một nửa số Kiểm soát viên thường trú tại Việt Nam; Trưởng Ban kiểm soát phải có bằng đại học trở lên thuộc chuyên ngành kinh tế, tài chính, kế toán, kiểm toán, luật, quản trị kinh doanh hoặc liên quan.","Khi Kiểm soát viên hết nhiệm kỳ mà chưa bầu được người mới, Kiểm soát viên cũ vẫn tiếp tục thực hiện quyền, nghĩa vụ cho đến khi có người mới được bầu và nhận nhiệm vụ."]},"luat-59_169":{"tldr":"Kiểm soát viên phải đáp ứng các tiêu chuẩn về chuyên môn và tính độc lập với người quản lý công ty; Kiểm soát viên của công ty đại chúng và một số doanh nghiệp nhà nước còn phải đáp ứng thêm điều kiện chặt chẽ hơn.","points":["Tiêu chuẩn chung: không thuộc đối tượng cấm quản lý doanh nghiệp, được đào tạo chuyên ngành kinh tế/tài chính/kế toán/kiểm toán/luật/quản trị kinh doanh phù hợp, không có quan hệ gia đình với thành viên Hội đồng quản trị hoặc Giám đốc/Tổng giám đốc, không phải là người quản lý công ty.","Không nhất thiết phải là cổ đông hoặc người lao động của công ty, trừ khi Điều lệ quy định khác.","Kiểm soát viên của công ty đại chúng, doanh nghiệp nhà nước theo điểm b khoản 1 Điều 88 không được có quan hệ gia đình với người quản lý doanh nghiệp của công ty và công ty mẹ, hoặc người đại diện phần vốn liên quan."]},"luat-59_170":{"tldr":"Ban kiểm soát thực hiện giám sát Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc trong quản lý, điều hành công ty, với các quyền kiểm tra, thẩm định báo cáo và kiến nghị cụ thể.","points":["Kiểm tra tính hợp lý, hợp pháp, trung thực trong quản lý điều hành và tính hệ thống, nhất quán của công tác kế toán, thống kê, báo cáo tài chính.","Thẩm định báo cáo tình hình kinh doanh, báo cáo tài chính hằng năm và 06 tháng, trình báo cáo thẩm định tại cuộc họp Đại hội đồng cổ đông thường niên.","Khi có yêu cầu của cổ đông hoặc nhóm cổ đông theo khoản 2 Điều 115, phải kiểm tra trong 07 ngày làm việc kể từ khi nhận yêu cầu và báo cáo kết quả trong 15 ngày kể từ khi kết thúc kiểm tra.","Khi phát hiện thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc vi phạm Điều 165 phải thông báo ngay bằng văn bản cho Hội đồng quản trị, yêu cầu chấm dứt vi phạm và khắc phục hậu quả."]},"luat-59_171":{"tldr":"Kiểm soát viên có quyền được cung cấp thông tin, tài liệu như thành viên Hội đồng quản trị và được tiếp cận hồ sơ công ty; tiền lương, thù lao, thưởng của Kiểm soát viên do Đại hội đồng cổ đông quyết định.","points":["Tài liệu, thông tin (thông báo mời họp, nghị quyết, biên bản họp, báo cáo của Giám đốc/Tổng giám đốc...) phải được gửi đến Kiểm soát viên cùng thời điểm và phương thức như đối với thành viên Hội đồng quản trị.","Kiểm soát viên có quyền tiếp cận hồ sơ, tài liệu công ty tại trụ sở chính, chi nhánh và có quyền đến địa điểm làm việc của người quản lý, nhân viên trong giờ làm việc.","Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc, người quản lý khác phải cung cấp đầy đủ, chính xác, kịp thời thông tin theo yêu cầu của Kiểm soát viên hoặc Ban kiểm soát.","Kiểm soát viên được trả lương, thù lao, thưởng và lợi ích khác theo quyết định của Đại hội đồng cổ đông, được thanh toán chi phí ăn, ở, đi lại và chi phí tư vấn độc lập trong giới hạn ngân sách hoạt động hằng năm đã được Đại hội đồng cổ đông chấp thuận.","Các khoản chi này tính vào chi phí kinh doanh của công ty và phải được thể hiện thành mục riêng trong báo cáo tài chính hằng năm."]},"luat-59_173":{"tldr":"Kiểm soát viên phải thực hiện quyền, nghĩa vụ một cách trung thực, cẩn trọng, tuân thủ pháp luật và trung thành với lợi ích công ty; vi phạm gây thiệt hại phải bồi thường.","points":["Phải tuân thủ pháp luật, Điều lệ, nghị quyết Đại hội đồng cổ đông và đạo đức nghề nghiệp; không lạm dụng địa vị, chức vụ và sử dụng thông tin, tài sản công ty để tư lợi hoặc phục vụ lợi ích tổ chức, cá nhân khác.","Vi phạm gây thiệt hại cho công ty hoặc người khác phải chịu trách nhiệm cá nhân hoặc liên đới bồi thường, hoàn trả thu nhập và lợi ích có được do vi phạm.","Khi phát hiện Kiểm soát viên vi phạm phải thông báo bằng văn bản đến Ban kiểm soát, yêu cầu người vi phạm chấm dứt hành vi và khắc phục hậu quả."]},"luat-59_174":{"tldr":"Đại hội đồng cổ đông có quyền miễn nhiệm hoặc bãi nhiệm Kiểm soát viên trong các trường hợp cụ thể liên quan đến tiêu chuẩn, hiệu quả và mức độ vi phạm nghĩa vụ.","points":["Miễn nhiệm khi: không còn đủ tiêu chuẩn theo Điều 169; có đơn từ chức được chấp thuận; trường hợp khác do Điều lệ công ty quy định.","Bãi nhiệm khi: không hoàn thành nhiệm vụ được phân công; không thực hiện quyền, nghĩa vụ trong 06 tháng liên tục (trừ bất khả kháng); vi phạm nhiều lần hoặc nghiêm trọng nghĩa vụ; trường hợp khác theo nghị quyết Đại hội đồng cổ đông."]},"luat-59_175":{"tldr":"Kết thúc năm tài chính, Hội đồng quản trị phải trình Đại hội đồng cổ đông các báo cáo về kết quả kinh doanh, tài chính và công tác quản lý, kèm theo báo cáo thẩm định của Ban kiểm soát.","points":["Báo cáo gồm: kết quả kinh doanh, báo cáo tài chính, báo cáo đánh giá công tác quản lý điều hành công ty, báo cáo thẩm định của Ban kiểm soát.","Công ty cổ phần thuộc diện pháp luật yêu cầu kiểm toán phải kiểm toán báo cáo tài chính hằng năm trước khi trình Đại hội đồng cổ đông xem xét, thông qua.","Các báo cáo về kết quả kinh doanh, tài chính và đánh giá quản lý phải gửi Ban kiểm soát thẩm định chậm nhất 30 ngày trước ngày khai mạc họp Đại hội đồng cổ đông thường niên.","Báo cáo và báo cáo thẩm định phải lưu giữ tại trụ sở chính chậm nhất 10 ngày trước ngày khai mạc họp; cổ đông sở hữu cổ phần liên tục ít nhất 01 năm có quyền tự mình hoặc cùng chuyên gia trực tiếp xem xét báo cáo."]},"luat-59_176":{"tldr":"Công ty cổ phần phải gửi báo cáo tài chính hằng năm cho cơ quan nhà nước có thẩm quyền và công bố một số thông tin nhất định trên trang thông tin điện tử của công ty.","points":["Phải công bố trên trang thông tin điện tử: Điều lệ công ty; sơ yếu lý lịch, trình độ, kinh nghiệm của thành viên Hội đồng quản trị, Kiểm soát viên, Giám đốc hoặc Tổng giám đốc; báo cáo tài chính hằng năm đã được Đại hội đồng cổ đông thông qua; báo cáo đánh giá kết quả hoạt động hằng năm của Hội đồng quản trị và Ban kiểm soát.","Công ty cổ phần không phải là công ty niêm yết phải thông báo cho Cơ quan đăng ký kinh doanh chậm nhất 03 ngày làm việc sau khi có thông tin hoặc có thay đổi thông tin về cổ đông là cá nhân, tổ chức nước ngoài.","Công ty đại chúng công bố, công khai thông tin theo quy định của pháp luật về chứng khoán; công ty cổ phần theo điểm b khoản 1 Điều 88 công bố theo quy định riêng tại Điều 109, 110 của Luật này."]},"luat-59_177":{"tldr":"Công ty hợp danh là doanh nghiệp có ít nhất 02 thành viên hợp danh là cá nhân, chịu trách nhiệm bằng toàn bộ tài sản, cùng kinh doanh dưới một tên chung, có thể có thêm thành viên góp vốn chỉ chịu trách nhiệm trong phạm vi vốn cam kết; công ty có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp.","points":["Phải có ít nhất 02 thành viên hợp danh là cá nhân, chịu trách nhiệm bằng toàn bộ tài sản của mình về các nghĩa vụ của công ty.","Thành viên góp vốn là tổ chức, cá nhân chỉ chịu trách nhiệm về các khoản nợ của công ty trong phạm vi số vốn đã cam kết góp.","Công ty hợp danh có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp.","Công ty hợp danh không được phát hành bất kỳ loại chứng khoán nào."]},"luat-59_178":{"tldr":"Thành viên hợp danh và thành viên góp vốn phải góp đủ, đúng hạn số vốn đã cam kết; khi góp đủ vốn, thành viên được cấp giấy chứng nhận phần vốn góp ghi nhận các nội dung chủ yếu về công ty và thành viên.","points":["Thành viên hợp danh không góp đủ, đúng hạn vốn cam kết gây thiệt hại cho công ty phải chịu trách nhiệm bồi thường thiệt hại.","Thành viên góp vốn không góp đủ, đúng hạn thì phần vốn chưa góp được coi là khoản nợ đối với công ty và có thể bị khai trừ theo quyết định của Hội đồng thành viên.","Giấy chứng nhận phần vốn góp được cấp khi thành viên góp đủ vốn cam kết, gồm các nội dung như tên, mã số doanh nghiệp, vốn điều lệ, thông tin thành viên, giá trị phần vốn góp, quyền và nghĩa vụ của người sở hữu.","Trường hợp giấy chứng nhận phần vốn góp bị mất, hư hỏng hoặc hủy hoại dưới hình thức khác thì thành viên được công ty cấp lại."]},"luat-59_179":{"tldr":"Tài sản của công ty hợp danh bao gồm tài sản góp vốn của thành viên đã chuyển quyền sở hữu cho công ty, tài sản tạo lập mang tên công ty, tài sản thu được từ hoạt động kinh doanh nhân danh công ty và tài sản khác theo quy định pháp luật.","points":["Tài sản góp vốn của các thành viên đã được chuyển quyền sở hữu cho công ty và tài sản tạo lập được mang tên công ty.","Tài sản thu được từ hoạt động kinh doanh do thành viên hợp danh thực hiện nhân danh công ty và từ hoạt động kinh doanh của công ty do thành viên hợp danh nhân danh cá nhân thực hiện.","Tài sản khác theo quy định của pháp luật."]},"luat-59_180":{"tldr":"Thành viên hợp danh bị hạn chế một số quyền nhằm tránh xung đột lợi ích: không được làm chủ doanh nghiệp tư nhân hay thành viên hợp danh của công ty hợp danh khác, không được kinh doanh cùng ngành nghề để tư lợi, không được tự ý chuyển nhượng phần vốn góp.","points":["Không được làm chủ doanh nghiệp tư nhân; không được làm thành viên hợp danh của công ty hợp danh khác trừ khi được sự nhất trí của các thành viên hợp danh còn lại.","Không được nhân danh cá nhân hoặc nhân danh người khác kinh doanh cùng ngành, nghề của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác.","Không được chuyển một phần hoặc toàn bộ phần vốn góp của mình cho tổ chức, cá nhân khác nếu không được sự chấp thuận của các thành viên hợp danh còn lại."]},"luat-59_181":{"tldr":"Thành viên hợp danh có các quyền như tham gia quản lý, biểu quyết, nhân danh công ty kinh doanh, chia lợi nhuận, và các nghĩa vụ như quản lý trung thực, liên đới chịu trách nhiệm về nợ của công ty, chịu lỗ và báo cáo định kỳ tình hình kinh doanh của mình.","points":["Có quyền tham gia họp, biểu quyết (mỗi thành viên một phiếu trừ Điều lệ quy định khác), nhân danh công ty kinh doanh, đàm phán ký kết hợp đồng có lợi nhất cho công ty.","Được chia lợi nhuận tương ứng tỷ lệ phần vốn góp hoặc theo thỏa thuận trong Điều lệ; khi công ty giải thể hoặc phá sản được chia giá trị tài sản còn lại tương ứng tỷ lệ vốn góp nếu Điều lệ không quy định khác.","Nếu thành viên hợp danh chết, người thừa kế được hưởng phần giá trị tài sản tại công ty sau khi trừ nợ và nghĩa vụ tài sản khác, và có thể trở thành thành viên hợp danh nếu được Hội đồng thành viên chấp thuận.","Có nghĩa vụ liên đới chịu trách nhiệm thanh toán hết số nợ còn lại của công ty nếu tài sản công ty không đủ trang trải, và chịu khoản lỗ tương ứng phần vốn góp khi công ty kinh doanh bị lỗ.","Định kỳ hằng tháng phải báo cáo trung thực, chính xác bằng văn bản tình hình và kết quả kinh doanh của mình với công ty."]},"luat-59_182":{"tldr":"Hội đồng thành viên gồm tất cả thành viên, bầu một thành viên hợp danh làm Chủ tịch kiêm Giám đốc hoặc Tổng giám đốc, có quyền quyết định mọi công việc kinh doanh của công ty; các vấn đề quan trọng phải được ít nhất ba phần tư tổng số thành viên hợp danh tán thành nếu Điều lệ không quy định khác.","points":["Hội đồng thành viên bầu một thành viên hợp danh làm Chủ tịch, đồng thời kiêm Giám đốc hoặc Tổng giám đốc nếu Điều lệ công ty không có quy định khác.","Các vấn đề như định hướng phát triển, sửa đổi Điều lệ, tiếp nhận/khai trừ thành viên, dự án đầu tư, vay và huy động vốn hoặc cho vay từ 50% vốn điều lệ trở lên, mua bán tài sản có giá trị bằng hoặc lớn hơn vốn điều lệ, giải thể, phá sản... phải được ít nhất 3/4 tổng số thành viên hợp danh tán thành nếu Điều lệ không quy định khác.","Vấn đề khác không thuộc khoản 3 được thông qua nếu được ít nhất 2/3 tổng số thành viên hợp danh tán thành, tỷ lệ cụ thể do Điều lệ quy định.","Quyền tham gia biểu quyết của thành viên góp vốn được thực hiện theo quy định của Luật này và Điều lệ công ty."]},"luat-59_183":{"tldr":"Chủ tịch Hội đồng thành viên triệu tập họp khi cần thiết hoặc theo yêu cầu của thành viên hợp danh; nếu Chủ tịch không triệu tập thì thành viên yêu cầu tự triệu tập; thông báo mời họp và biên bản họp phải bảo đảm các nội dung theo quy định.","points":["Nếu Chủ tịch Hội đồng thành viên không triệu tập họp theo yêu cầu của thành viên hợp danh thì thành viên đó có quyền tự triệu tập họp.","Thông báo mời họp có thể gửi bằng giấy mời, điện thoại, fax, phương tiện điện tử hoặc phương thức khác do Điều lệ quy định, phải nêu rõ mục đích, yêu cầu, nội dung, chương trình và địa điểm họp.","Tài liệu thảo luận dùng để quyết định các vấn đề quan trọng tại khoản 3 Điều 182 phải gửi trước đến tất cả thành viên, thời hạn gửi trước do Điều lệ công ty quy định.","Cuộc họp Hội đồng thành viên phải được ghi biên bản với các nội dung như thời gian, địa điểm, ý kiến thành viên dự họp, kết quả biểu quyết và chữ ký của các thành viên dự họp."]},"luat-59_184":{"tldr":"Các thành viên hợp danh là người đại diện theo pháp luật của công ty, tổ chức điều hành hoạt động kinh doanh hằng ngày; khi cùng thực hiện một công việc thì quyết định theo nguyên tắc đa số; Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc có các nghĩa vụ quản lý, triệu tập họp và đại diện công ty theo quy định.","points":["Mọi hạn chế đối với thành viên hợp danh trong công việc kinh doanh hằng ngày chỉ có hiệu lực đối với bên thứ ba khi người đó được biết về hạn chế đó.","Khi một số hoặc tất cả thành viên hợp danh cùng thực hiện một số công việc kinh doanh thì quyết định được thông qua theo nguyên tắc đa số chấp thuận.","Hoạt động do thành viên hợp danh thực hiện ngoài phạm vi kinh doanh của công ty không thuộc trách nhiệm của công ty, trừ khi được các thành viên còn lại chấp thuận.","Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc có nghĩa vụ quản lý điều hành kinh doanh hằng ngày, triệu tập và tổ chức họp Hội đồng thành viên, đại diện công ty trước Trọng tài, Tòa án và các nghĩa vụ khác theo Điều lệ."]},"luat-59_185":{"tldr":"Thành viên hợp danh bị chấm dứt tư cách trong các trường hợp như tự nguyện rút vốn, chết/mất tích/mất năng lực hành vi dân sự, bị khai trừ, hoặc chấp hành hình phạt tù; sau khi chấm dứt tư cách, thành viên vẫn phải liên đới chịu trách nhiệm về các khoản nợ phát sinh trước đó trong một thời hạn nhất định.","points":["Các trường hợp chấm dứt tư cách gồm: tự nguyện rút vốn; chết, mất tích, hạn chế hoặc mất năng lực hành vi dân sự; bị khai trừ; chấp hành hình phạt tù hoặc bị cấm hành nghề; trường hợp khác do Điều lệ quy định.","Muốn rút vốn phải được Hội đồng thành viên chấp thuận, thông báo bằng văn bản chậm nhất 06 tháng trước ngày rút vốn, chỉ được rút vào thời điểm kết thúc năm tài chính khi báo cáo tài chính năm đó đã được thông qua.","Bị khai trừ trong các trường hợp: không góp vốn như cam kết sau khi công ty đã yêu cầu lần thứ hai; vi phạm Điều 180; kinh doanh không trung thực, không cẩn trọng gây thiệt hại nghiêm trọng; không thực hiện đúng nghĩa vụ thành viên hợp danh.","Trong thời hạn 02 năm kể từ ngày chấm dứt tư cách (theo các trường hợp rút vốn, khai trừ, chấp hành hình phạt tù và trường hợp khác), thành viên vẫn phải liên đới chịu trách nhiệm bằng toàn bộ tài sản đối với các khoản nợ phát sinh trước ngày chấm dứt.","Nếu tên thành viên đã chấm dứt tư cách được dùng làm một phần hoặc toàn bộ tên công ty, người đó hoặc người thừa kế có quyền yêu cầu công ty chấm dứt sử dụng tên đó."]},"luat-59_186":{"tldr":"Công ty có thể tiếp nhận thêm thành viên hợp danh hoặc thành viên góp vốn khi được Hội đồng thành viên chấp thuận; thành viên mới phải nộp đủ vốn cam kết trong 15 ngày kể từ ngày được chấp thuận và thành viên hợp danh mới phải liên đới chịu trách nhiệm bằng toàn bộ tài sản đối với nợ của công ty.","points":["Việc tiếp nhận thành viên mới của công ty phải được Hội đồng thành viên chấp thuận.","Thành viên mới phải nộp đủ số vốn cam kết góp trong thời hạn 15 ngày kể từ ngày được chấp thuận, trừ trường hợp Hội đồng thành viên quyết định thời hạn khác.","Thành viên hợp danh mới phải cùng liên đới chịu trách nhiệm bằng toàn bộ tài sản của mình đối với các khoản nợ và nghĩa vụ tài sản khác của công ty, trừ trường hợp có thỏa thuận khác với các thành viên còn lại."]},"luat-59_187":{"tldr":"Thành viên góp vốn có quyền tham gia biểu quyết về các vấn đề liên quan trực tiếp đến quyền lợi của mình, được chia lợi nhuận và tài sản còn lại tương ứng tỷ lệ vốn góp, được chuyển nhượng phần vốn góp, nhưng không được tham gia quản lý hay kinh doanh nhân danh công ty và chỉ chịu trách nhiệm về nợ trong phạm vi vốn đã cam kết góp.","points":["Được tham gia họp, biểu quyết tại Hội đồng thành viên về sửa đổi Điều lệ, tổ chức lại, giải thể công ty và các nội dung khác liên quan trực tiếp đến quyền, nghĩa vụ của mình.","Được chia lợi nhuận hằng năm tương ứng với tỷ lệ phần vốn góp trong vốn điều lệ; được chia một phần giá trị tài sản còn lại tương ứng tỷ lệ vốn góp khi công ty giải thể hoặc phá sản.","Được chuyển nhượng phần vốn góp của mình cho người khác; được định đoạt phần vốn góp bằng thừa kế, tặng cho, thế chấp, cầm cố...; nếu chết thì người thừa kế thay thế trở thành thành viên góp vốn.","Chỉ chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi số vốn đã cam kết góp.","Không được tham gia quản lý công ty, không được tiến hành công việc kinh doanh nhân danh công ty."]},"luat-59_188":{"tldr":"Doanh nghiệp tư nhân do một cá nhân làm chủ và tự chịu trách nhiệm bằng toàn bộ tài sản của mình, không được phát hành chứng khoán và bị giới hạn trong việc thành lập, góp vốn vào doanh nghiệp khác.","points":["Chủ doanh nghiệp tư nhân tự chịu trách nhiệm bằng toàn bộ tài sản của mình về mọi hoạt động của doanh nghiệp.","Doanh nghiệp tư nhân không được phát hành bất kỳ loại chứng khoán nào.","Mỗi cá nhân chỉ được thành lập một doanh nghiệp tư nhân và không được đồng thời là chủ hộ kinh doanh, thành viên hợp danh của công ty hợp danh.","Doanh nghiệp tư nhân không được góp vốn thành lập hoặc mua cổ phần, phần vốn góp trong công ty hợp danh, công ty trách nhiệm hữu hạn hoặc công ty cổ phần."]},"luat-59_189":{"tldr":"Chủ doanh nghiệp tư nhân tự đăng ký vốn đầu tư và có quyền tăng, giảm vốn trong quá trình hoạt động, với nghĩa vụ ghi chép đầy đủ vào sổ kế toán.","points":["Chủ doanh nghiệp tự đăng ký chính xác tổng vốn đầu tư, ghi rõ vốn bằng Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng và tài sản khác (loại tài sản, số lượng, giá trị còn lại).","Toàn bộ vốn và tài sản, kể cả vốn vay và tài sản thuê dùng cho kinh doanh, phải được ghi chép đầy đủ vào sổ kế toán và báo cáo tài chính.","Chủ doanh nghiệp có quyền tăng hoặc giảm vốn đầu tư, việc thay đổi phải được ghi chép đầy đủ vào sổ kế toán.","Nếu giảm vốn xuống thấp hơn vốn đã đăng ký, chủ doanh nghiệp chỉ được giảm vốn sau khi đã đăng ký với Cơ quan đăng ký kinh doanh."]},"luat-59_190":{"tldr":"Chủ doanh nghiệp tư nhân có toàn quyền quyết định hoạt động kinh doanh, có thể tự quản lý hoặc thuê Giám đốc, Tổng giám đốc, và là người đại diện theo pháp luật của doanh nghiệp.","points":["Chủ doanh nghiệp toàn quyền quyết định đối với mọi hoạt động kinh doanh và việc sử dụng lợi nhuận sau khi nộp thuế và thực hiện nghĩa vụ tài chính khác.","Có thể trực tiếp quản lý hoặc thuê người khác làm Giám đốc, Tổng giám đốc, nhưng vẫn phải chịu trách nhiệm về mọi hoạt động kinh doanh của doanh nghiệp.","Chủ doanh nghiệp là người đại diện theo pháp luật, đại diện cho doanh nghiệp trước Trọng tài, Tòa án và thực hiện các quyền, nghĩa vụ khác theo pháp luật."]},"luat-59_191":{"tldr":"Chủ doanh nghiệp tư nhân được quyền cho thuê toàn bộ doanh nghiệp nhưng phải thông báo cho Cơ quan đăng ký kinh doanh và cơ quan thuế, đồng thời vẫn chịu trách nhiệm pháp lý với tư cách chủ sở hữu trong thời gian cho thuê.","points":["Phải thông báo bằng văn bản kèm bản sao hợp đồng cho thuê có công chứng đến Cơ quan đăng ký kinh doanh, cơ quan thuế trong thời hạn 03 ngày làm việc kể từ ngày hợp đồng cho thuê có hiệu lực.","Trong thời hạn cho thuê, chủ doanh nghiệp tư nhân vẫn phải chịu trách nhiệm trước pháp luật với tư cách là chủ sở hữu doanh nghiệp.","Quyền, nghĩa vụ và trách nhiệm của chủ sở hữu và người thuê đối với hoạt động kinh doanh do hợp đồng cho thuê quy định."]},"luat-59_192":{"tldr":"Chủ doanh nghiệp tư nhân có quyền bán doanh nghiệp cho cá nhân, tổ chức khác nhưng vẫn phải chịu trách nhiệm về các khoản nợ phát sinh trước ngày chuyển giao, trừ khi có thỏa thuận khác.","points":["Chủ doanh nghiệp tư nhân có quyền bán doanh nghiệp của mình cho cá nhân, tổ chức khác.","Sau khi bán, chủ doanh nghiệp vẫn chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác phát sinh trước ngày chuyển giao, trừ trường hợp có thỏa thuận khác giữa chủ doanh nghiệp, người mua và chủ nợ.","Chủ doanh nghiệp và người mua doanh nghiệp phải tuân thủ quy định của pháp luật về lao động.","Người mua doanh nghiệp tư nhân phải đăng ký thay đổi chủ doanh nghiệp theo quy định của Luật này."]},"luat-59_193":{"tldr":"Luật quy định cách thực hiện quyền, nghĩa vụ của chủ doanh nghiệp tư nhân trong các trường hợp đặc biệt như bị tạm giam, chết, mất năng lực hành vi dân sự hoặc bị Tòa án cấm hành nghề.","points":["Nếu chủ doanh nghiệp bị tạm giam, đang chấp hành hình phạt tù hoặc biện pháp xử lý hành chính tại cơ sở cai nghiện, giáo dục bắt buộc thì phải ủy quyền cho người khác thực hiện quyền, nghĩa vụ của mình.","Nếu chủ doanh nghiệp chết, người thừa kế theo di chúc hoặc pháp luật trở thành chủ doanh nghiệp theo thỏa thuận giữa những người thừa kế; nếu không thỏa thuận được thì đăng ký chuyển đổi thành công ty hoặc giải thể doanh nghiệp.","Nếu chủ doanh nghiệp chết mà không có người thừa kế, người thừa kế từ chối nhận hoặc bị truất quyền thừa kế thì tài sản được xử lý theo quy định của pháp luật về dân sự.","Nếu chủ doanh nghiệp bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi thì quyền và nghĩa vụ được thực hiện thông qua người đại diện.","Nếu bị Tòa án cấm hành nghề hoặc làm công việc thuộc ngành, nghề kinh doanh của doanh nghiệp thì phải tạm ngừng, chấm dứt kinh doanh ngành, nghề liên quan hoặc chuyển nhượng doanh nghiệp cho cá nhân, tổ chức khác."]},"luat-59_194":{"tldr":"Tập đoàn kinh tế, tổng công ty là nhóm công ty liên kết với nhau qua sở hữu cổ phần, phần vốn góp hoặc hình thức khác, không phải là một loại hình doanh nghiệp và không có tư cách pháp nhân.","points":["Tập đoàn kinh tế, tổng công ty không phải là một loại hình doanh nghiệp, không có tư cách pháp nhân, không phải đăng ký thành lập theo quy định của Luật này.","Gồm công ty mẹ, công ty con và các công ty thành viên khác; mỗi công ty trong tập đoàn có quyền và nghĩa vụ của doanh nghiệp độc lập theo quy định của pháp luật."]},"luat-59_195":{"tldr":"Luật quy định các tiêu chí xác định quan hệ công ty mẹ - công ty con và các giới hạn về việc góp vốn, sở hữu chéo giữa công ty mẹ và công ty con.","points":["Một công ty là công ty mẹ của công ty khác nếu sở hữu trên 50% vốn điều lệ hoặc tổng số cổ phần phổ thông, có quyền quyết định bổ nhiệm đa số hoặc tất cả thành viên Hội đồng quản trị, Giám đốc, Tổng giám đốc, hoặc có quyền quyết định sửa đổi, bổ sung Điều lệ của công ty đó.","Công ty con không được đầu tư mua cổ phần, góp vốn vào công ty mẹ; các công ty con của cùng một công ty mẹ không được đồng thời cùng góp vốn, mua cổ phần để sở hữu chéo lẫn nhau.","Các công ty con có cùng một công ty mẹ là doanh nghiệp sở hữu ít nhất 65% vốn nhà nước không được cùng nhau góp vốn, mua cổ phần của doanh nghiệp khác hoặc thành lập doanh nghiệp mới.","Chính phủ quy định chi tiết về các giới hạn góp vốn, sở hữu chéo nêu trên."]},"luat-59_196":{"tldr":"Công ty mẹ thực hiện quyền, nghĩa vụ với công ty con theo tư cách thành viên, chủ sở hữu hoặc cổ đông, các giao dịch giữa hai bên phải độc lập, bình đẳng; công ty mẹ phải chịu trách nhiệm nếu can thiệp trái thẩm quyền gây thiệt hại cho công ty con.","points":["Công ty mẹ thực hiện quyền, nghĩa vụ với công ty con theo tư cách thành viên, chủ sở hữu hoặc cổ đông tùy thuộc loại hình pháp lý của công ty con.","Hợp đồng, giao dịch và quan hệ khác giữa công ty mẹ và công ty con phải được thiết lập, thực hiện độc lập, bình đẳng như giữa các chủ thể pháp lý độc lập.","Nếu công ty mẹ can thiệp ngoài thẩm quyền, buộc công ty con kinh doanh trái thông lệ hoặc không sinh lợi mà không đền bù hợp lý, gây thiệt hại cho công ty con thì công ty mẹ phải chịu trách nhiệm về thiệt hại đó; người quản lý công ty mẹ liên đới chịu trách nhiệm.","Nếu công ty mẹ không đền bù, chủ nợ hoặc thành viên, cổ đông sở hữu ít nhất 01% vốn điều lệ của công ty con có quyền yêu cầu công ty mẹ đền bù thiệt hại cho công ty con.","Nếu hoạt động gây thiệt hại đó đem lại lợi ích cho công ty con khác cùng công ty mẹ thì công ty con được hưởng lợi phải liên đới cùng công ty mẹ hoàn trả khoản lợi cho công ty con bị thiệt hại."]},"luat-59_197":{"tldr":"Vào cuối năm tài chính, công ty mẹ phải lập báo cáo tài chính hợp nhất và các báo cáo tổng hợp về công ty mẹ, công ty con, dựa trên báo cáo, tài liệu do công ty con cung cấp.","points":["Cuối năm tài chính, công ty mẹ phải lập báo cáo tài chính hợp nhất, báo cáo tổng hợp kết quả kinh doanh hằng năm và báo cáo tổng hợp công tác quản lý, điều hành của công ty mẹ và công ty con.","Người đại diện theo pháp luật của công ty con phải cung cấp báo cáo, tài liệu và thông tin cần thiết khi công ty mẹ yêu cầu để lập báo cáo tài chính hợp nhất và báo cáo tổng hợp.","Nếu chưa nhận đủ báo cáo tài chính từ công ty con dù đã áp dụng các biện pháp cần thiết, người quản lý công ty mẹ vẫn phải lập và trình báo cáo, có thể không gồm thông tin công ty con đó nhưng phải có giải trình để tránh hiểu nhầm.","Báo cáo, tài liệu quyết toán tài chính hằng năm, báo cáo tài chính hợp nhất, báo cáo tổng hợp phải được lưu giữ tại trụ sở chính công ty mẹ, bản sao lưu tại chi nhánh của công ty mẹ tại Việt Nam.","Ngoài báo cáo, tài liệu theo quy định của pháp luật, công ty con còn phải lập báo cáo tổng hợp về mua, bán và giao dịch khác với công ty mẹ."]},"luat-59_198":{"tldr":"Công ty trách nhiệm hữu hạn, công ty cổ phần có thể chia tài sản, quyền, nghĩa vụ, thành viên, cổ đông của công ty bị chia để thành lập hai hoặc nhiều công ty mới, làm chấm dứt sự tồn tại của công ty bị chia.","points":["Nghị quyết, quyết định chia công ty phải được gửi đến tất cả chủ nợ và thông báo cho người lao động trong thời hạn 15 ngày kể từ ngày ra quyết định hoặc thông qua nghị quyết.","Công ty bị chia chấm dứt tồn tại sau khi các công ty mới được cấp Giấy chứng nhận đăng ký doanh nghiệp.","Các công ty mới cùng liên đới chịu trách nhiệm về nghĩa vụ, nợ chưa thanh toán, hợp đồng lao động của công ty bị chia, hoặc thỏa thuận để một trong số các công ty đó thực hiện nghĩa vụ này.","Số lượng thành viên, cổ đông, tỷ lệ sở hữu và vốn điều lệ của các công ty mới được ghi tương ứng với cách thức phân chia theo nghị quyết, quyết định chia công ty."]},"luat-59_199":{"tldr":"Công ty trách nhiệm hữu hạn, công ty cổ phần có thể tách bằng cách chuyển một phần tài sản, quyền, nghĩa vụ, thành viên, cổ đông sang thành lập công ty mới (công ty được tách) mà công ty bị tách không chấm dứt tồn tại.","points":["Công ty bị tách phải đăng ký thay đổi vốn điều lệ, số lượng thành viên, cổ đông giảm xuống, đồng thời đăng ký doanh nghiệp cho các công ty được tách.","Nghị quyết, quyết định tách công ty phải được gửi đến tất cả chủ nợ và thông báo cho người lao động trong thời hạn 15 ngày kể từ ngày ra quyết định hoặc thông qua nghị quyết.","Sau khi đăng ký doanh nghiệp, công ty bị tách và công ty được tách cùng liên đới chịu trách nhiệm về nghĩa vụ, nợ chưa thanh toán, hợp đồng lao động, trừ khi có thỏa thuận khác."]},"luat-59_200":{"tldr":"Hai hoặc một số công ty (công ty bị hợp nhất) có thể hợp nhất thành một công ty mới (công ty hợp nhất), đồng thời chấm dứt tồn tại của các công ty bị hợp nhất.","points":["Hợp đồng hợp nhất và dự thảo Điều lệ công ty hợp nhất phải được gửi đến các chủ nợ, thông báo cho người lao động trong thời hạn 15 ngày kể từ ngày thông qua.","Việc hợp nhất công ty phải bảo đảm tuân thủ quy định của Luật Cạnh tranh về hợp nhất công ty.","Sau khi đăng ký doanh nghiệp, công ty bị hợp nhất chấm dứt tồn tại; công ty hợp nhất đương nhiên kế thừa toàn bộ quyền, nghĩa vụ, lợi ích hợp pháp và các khoản nợ chưa thanh toán của các công ty bị hợp nhất."]},"luat-59_201":{"tldr":"Một hoặc một số công ty (công ty bị sáp nhập) có thể sáp nhập vào một công ty khác (công ty nhận sáp nhập) bằng cách chuyển toàn bộ tài sản, quyền, nghĩa vụ, đồng thời chấm dứt sự tồn tại của công ty bị sáp nhập.","points":["Hợp đồng sáp nhập phải được gửi đến tất cả chủ nợ và thông báo cho người lao động trong thời hạn 15 ngày kể từ ngày thông qua.","Sau khi đăng ký doanh nghiệp, công ty bị sáp nhập chấm dứt tồn tại; công ty nhận sáp nhập đương nhiên kế thừa toàn bộ quyền, nghĩa vụ, lợi ích hợp pháp và các khoản nợ chưa thanh toán của công ty bị sáp nhập.","Các công ty thực hiện sáp nhập phải bảo đảm tuân thủ quy định của Luật Cạnh tranh về sáp nhập công ty."]},"luat-59_202":{"tldr":"Công ty trách nhiệm hữu hạn có thể chuyển đổi thành công ty cổ phần theo một hoặc kết hợp nhiều phương thức huy động vốn, và phải đăng ký việc chuyển đổi với Cơ quan đăng ký kinh doanh.","points":["Ba phương thức chính: chuyển đổi không huy động thêm vốn từ tổ chức, cá nhân khác; chuyển đổi bằng huy động thêm góp vốn; chuyển đổi bằng bán toàn bộ hoặc một phần phần vốn góp cho tổ chức, cá nhân khác (có thể kết hợp các phương thức).","Công ty phải đăng ký chuyển đổi trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển đổi; Cơ quan đăng ký kinh doanh cấp lại Giấy chứng nhận đăng ký doanh nghiệp trong 03 ngày làm việc kể từ ngày nhận hồ sơ.","Công ty chuyển đổi đương nhiên kế thừa toàn bộ quyền, lợi ích hợp pháp và chịu trách nhiệm về các khoản nợ, kể cả nợ thuế, hợp đồng lao động và nghĩa vụ khác của công ty được chuyển đổi."]},"luat-59_203":{"tldr":"Công ty cổ phần có thể chuyển đổi thành công ty trách nhiệm hữu hạn một thành viên khi một cổ đông hoặc một tổ chức, cá nhân nhận chuyển nhượng toàn bộ cổ phần còn lại, hoặc khi công ty chỉ còn lại 01 cổ đông.","points":["Việc chuyển nhượng hoặc nhận góp vốn đầu tư phải thực hiện theo giá thị trường, định theo phương pháp tài sản, phương pháp dòng tiền chiết khấu hoặc phương pháp khác.","Trong thời hạn 15 ngày kể từ khi công ty chỉ còn 1 cổ đông hoặc hoàn thành chuyển nhượng cổ phần, công ty gửi hồ sơ chuyển đổi; Cơ quan đăng ký kinh doanh cấp Giấy chứng nhận trong 03 ngày làm việc kể từ ngày nhận hồ sơ.","Công ty chuyển đổi đương nhiên kế thừa toàn bộ quyền, lợi ích hợp pháp và chịu trách nhiệm về các khoản nợ, kể cả nợ thuế, hợp đồng lao động và nghĩa vụ khác của công ty được chuyển đổi."]},"luat-59_204":{"tldr":"Công ty cổ phần có thể chuyển đổi thành công ty trách nhiệm hữu hạn hai thành viên trở lên theo một hoặc kết hợp nhiều phương thức, kể cả trường hợp công ty chỉ còn lại 02 cổ đông.","points":["Các phương thức gồm: không huy động/chuyển nhượng thêm cổ phần; huy động thêm góp vốn; chuyển nhượng toàn bộ hoặc một phần cổ phần cho tổ chức, cá nhân khác góp vốn; hoặc công ty chỉ còn lại 02 cổ đông.","Công ty phải đăng ký chuyển đổi trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển đổi; Cơ quan đăng ký kinh doanh cấp Giấy chứng nhận trong 03 ngày làm việc kể từ ngày nhận hồ sơ.","Công ty chuyển đổi đương nhiên kế thừa toàn bộ quyền, lợi ích hợp pháp và chịu trách nhiệm về các khoản nợ, kể cả nợ thuế, hợp đồng lao động và nghĩa vụ khác của công ty được chuyển đổi."]},"luat-59_205":{"tldr":"Doanh nghiệp tư nhân có thể chuyển đổi thành công ty trách nhiệm hữu hạn, công ty cổ phần hoặc công ty hợp danh theo quyết định của chủ doanh nghiệp nếu đáp ứng đủ các điều kiện luật định.","points":["Điều kiện gồm: có đủ điều kiện theo khoản 1 Điều 27 của Luật; chủ doanh nghiệp tư nhân cam kết bằng văn bản chịu trách nhiệm cá nhân bằng toàn bộ tài sản với các khoản nợ chưa thanh toán và cam kết thanh toán khi đến hạn; có thỏa thuận bằng văn bản về việc tiếp nhận hợp đồng chưa thanh lý; cam kết tiếp nhận và sử dụng lao động hiện có.","Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ, Cơ quan đăng ký kinh doanh cấp Giấy chứng nhận đăng ký doanh nghiệp nếu đủ điều kiện.","Công ty được chuyển đổi đương nhiên kế thừa quyền, nghĩa vụ của doanh nghiệp tư nhân kể từ ngày cấp Giấy chứng nhận; chủ doanh nghiệp tư nhân vẫn chịu trách nhiệm cá nhân bằng toàn bộ tài sản với các khoản nợ phát sinh trước ngày chuyển đổi."]},"luat-59_206":{"tldr":"Doanh nghiệp phải thông báo bằng văn bản cho Cơ quan đăng ký kinh doanh trước khi tạm ngừng hoặc tiếp tục kinh doanh trước hạn; cơ quan nhà nước có thẩm quyền có thể yêu cầu doanh nghiệp tạm ngừng, đình chỉ hoặc chấm dứt kinh doanh trong một số trường hợp.","points":["Doanh nghiệp phải thông báo chậm nhất 03 ngày làm việc trước ngày tạm ngừng kinh doanh hoặc tiếp tục kinh doanh trước thời hạn đã thông báo.","Cơ quan có thẩm quyền yêu cầu tạm ngừng, đình chỉ, chấm dứt kinh doanh khi: doanh nghiệp không đủ điều kiện với ngành nghề kinh doanh có điều kiện; theo yêu cầu quản lý thuế, môi trường; hoặc theo quyết định của Tòa án.","Trong thời gian tạm ngừng kinh doanh, doanh nghiệp vẫn phải nộp đủ thuế, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp còn nợ và tiếp tục thanh toán nợ, thực hiện hợp đồng đã ký, trừ khi có thỏa thuận khác."]},"luat-59_207":{"tldr":"Doanh nghiệp bị giải thể trong bốn trường hợp luật định và chỉ được giải thể khi bảo đảm thanh toán hết nợ, nghĩa vụ tài sản khác và không đang trong quá trình giải quyết tranh chấp tại Tòa án hoặc Trọng tài.","points":["Bốn trường hợp giải thể: hết thời hạn hoạt động ghi trong Điều lệ mà không gia hạn; theo nghị quyết, quyết định của chủ sở hữu/Hội đồng thành viên/Đại hội đồng cổ đông tùy loại hình; không còn đủ số thành viên tối thiểu trong 06 tháng liên tục mà không chuyển đổi loại hình; bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp.","Doanh nghiệp chỉ được giải thể khi đã thanh toán hết các khoản nợ, nghĩa vụ tài sản khác và không đang trong quá trình giải quyết tranh chấp tại Tòa án hoặc Trọng tài.","Trường hợp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp, người quản lý có liên quan và doanh nghiệp cùng liên đới chịu trách nhiệm về các khoản nợ của doanh nghiệp."]},"luat-59_208":{"tldr":"Điều luật quy định trình tự, thủ tục giải thể doanh nghiệp trong các trường hợp hết hạn hoạt động, theo quyết định chủ sở hữu hoặc thiếu thành viên tối thiểu, từ thông qua quyết định giải thể đến thanh lý tài sản, thanh toán nợ và cập nhật tình trạng pháp lý.","points":["Nghị quyết, quyết định giải thể và biên bản họp phải gửi đến Cơ quan đăng ký kinh doanh, cơ quan thuế, người lao động trong 07 ngày làm việc kể từ ngày thông qua, đồng thời đăng công khai trên Cổng thông tin quốc gia và niêm yết tại trụ sở.","Các khoản nợ được thanh toán theo thứ tự ưu tiên: nợ lương, trợ cấp thôi việc, bảo hiểm và quyền lợi khác của người lao động; nợ thuế; các khoản nợ khác.","Người đại diện theo pháp luật gửi hồ sơ giải thể cho Cơ quan đăng ký kinh doanh trong 05 ngày làm việc kể từ ngày thanh toán hết các khoản nợ.","Sau 180 ngày kể từ ngày nhận nghị quyết, quyết định giải thể mà không có ý kiến hoặc phản đối bằng văn bản, hoặc trong 05 ngày làm việc kể từ ngày nhận hồ sơ giải thể, Cơ quan đăng ký kinh doanh cập nhật tình trạng pháp lý của doanh nghiệp."]},"luat-59_209":{"tldr":"Điều luật quy định trình tự, thủ tục giải thể doanh nghiệp khi bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc theo quyết định của Tòa án đã có hiệu lực pháp luật.","points":["Trong thời hạn 10 ngày kể từ ngày nhận quyết định thu hồi Giấy chứng nhận hoặc quyết định của Tòa án có hiệu lực, doanh nghiệp phải triệu tập họp để quyết định giải thể.","Nếu pháp luật yêu cầu đăng báo, nghị quyết, quyết định giải thể phải đăng ít nhất trên 01 tờ báo in hoặc báo điện tử trong 03 số liên tiếp.","Sau 180 ngày kể từ ngày thông báo tình trạng giải thể mà không nhận được phản đối bằng văn bản, hoặc trong 05 ngày làm việc kể từ ngày nhận hồ sơ giải thể, Cơ quan đăng ký kinh doanh cập nhật tình trạng pháp lý của doanh nghiệp.","Người quản lý công ty có liên quan phải chịu trách nhiệm cá nhân về thiệt hại do không thực hiện hoặc thực hiện không đúng quy định tại Điều này."]},"luat-59_210":{"tldr":"Hồ sơ giải thể doanh nghiệp gồm thông báo giải thể và báo cáo thanh lý tài sản, danh sách chủ nợ; người quản lý, người đại diện theo pháp luật chịu trách nhiệm về tính trung thực, chính xác của hồ sơ.","points":["Hồ sơ gồm thông báo về giải thể doanh nghiệp và báo cáo thanh lý tài sản, danh sách chủ nợ, số nợ đã thanh toán (kể cả nợ thuế, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp).","Nếu hồ sơ giải thể không chính xác hoặc giả mạo, những người chịu trách nhiệm phải liên đới thanh toán quyền lợi người lao động, thuế, nợ khác chưa thanh toán và chịu trách nhiệm cá nhân trong thời hạn 05 năm kể từ ngày nộp hồ sơ giải thể."]},"luat-59_211":{"tldr":"Kể từ khi có quyết định giải thể, doanh nghiệp và người quản lý bị nghiêm cấm thực hiện một số hoạt động nhằm bảo vệ quyền lợi chủ nợ và người liên quan; vi phạm có thể bị xử phạt hành chính, truy cứu trách nhiệm hình sự hoặc bồi thường thiệt hại.","points":["Các hành vi bị cấm gồm: cất giấu, tẩu tán tài sản; từ bỏ hoặc giảm bớt quyền đòi nợ; chuyển nợ không bảo đảm thành nợ có bảo đảm bằng tài sản doanh nghiệp; ký hợp đồng mới (trừ để giải thể); cầm cố, thế chấp, tặng cho, cho thuê tài sản; chấm dứt hợp đồng đang có hiệu lực; huy động vốn dưới mọi hình thức.","Tùy tính chất và mức độ vi phạm, cá nhân vi phạm có thể bị xử phạt vi phạm hành chính hoặc bị truy cứu trách nhiệm hình sự; nếu gây thiệt hại thì phải bồi thường."]},"luat-59_212":{"tldr":"Doanh nghiệp bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp trong các trường hợp luật định như hồ sơ giả mạo, do người bị cấm thành lập doanh nghiệp lập ra, ngừng hoạt động kéo dài không thông báo, hoặc không nộp báo cáo theo quy định.","points":["Các trường hợp thu hồi: hồ sơ đăng ký giả mạo; do người bị cấm thành lập doanh nghiệp theo khoản 2 Điều 17 thành lập; ngừng kinh doanh 01 năm mà không thông báo với Cơ quan đăng ký kinh doanh và cơ quan thuế; không gửi báo cáo theo điểm c khoản 1 Điều 216 trong 06 tháng kể từ hạn gửi hoặc có yêu cầu bằng văn bản; trường hợp khác theo quyết định Tòa án hoặc đề nghị cơ quan có thẩm quyền.","Chính phủ quy định trình tự, thủ tục thu hồi Giấy chứng nhận đăng ký doanh nghiệp."]},"luat-59_213":{"tldr":"Chi nhánh, văn phòng đại diện, địa điểm kinh doanh chấm dứt hoạt động theo quyết định của doanh nghiệp hoặc theo quyết định thu hồi Giấy chứng nhận đăng ký hoạt động của cơ quan nhà nước có thẩm quyền.","points":["Người đại diện theo pháp luật của doanh nghiệp và người đứng đầu chi nhánh, văn phòng đại diện bị chấm dứt hoạt động liên đới chịu trách nhiệm về tính trung thực, chính xác của hồ sơ chấm dứt hoạt động.","Doanh nghiệp có chi nhánh đã chấm dứt hoạt động vẫn chịu trách nhiệm thực hiện hợp đồng, thanh toán các khoản nợ (kể cả nợ thuế) và giải quyết quyền lợi hợp pháp cho người lao động đã làm việc tại chi nhánh."]},"luat-59_214":{"tldr":"Việc phá sản doanh nghiệp không do Luật Doanh nghiệp điều chỉnh mà được thực hiện theo quy định của pháp luật về phá sản.","points":["Luật Doanh nghiệp dẫn chiếu áp dụng pháp luật về phá sản đối với việc phá sản doanh nghiệp."]},"luat-59_215":{"tldr":"Quy định trách nhiệm quản lý nhà nước đối với doanh nghiệp được phân công cho Chính phủ, các Bộ/cơ quan ngang Bộ và Ủy ban nhân dân cấp tỉnh, cùng nghĩa vụ kết nối, chia sẻ thông tin với Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp.","points":["Chính phủ thống nhất quản lý nhà nước đối với doanh nghiệp; Bộ, cơ quan ngang Bộ chịu trách nhiệm trước Chính phủ về nhiệm vụ được phân công; Ủy ban nhân dân cấp tỉnh quản lý trong phạm vi địa phương.","Bộ, cơ quan ngang Bộ, cơ quan liên quan và Ủy ban nhân dân cấp tỉnh phải thiết lập kết nối, liên thông và chia sẻ với Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp thông tin về giấy phép kinh doanh, chứng chỉ hành nghề và quyết định xử phạt vi phạm hành chính của doanh nghiệp.","Cũng phải chia sẻ thông tin về tình hình hoạt động, nộp thuế và báo cáo tài chính của doanh nghiệp, đồng thời phối hợp chia sẻ thông tin để nâng cao hiệu lực quản lý nhà nước.","Chính phủ quy định chi tiết Điều này."]},"luat-59_216":{"tldr":"Quy định nhiệm vụ, quyền hạn của Cơ quan đăng ký kinh doanh trong việc đăng ký, quản lý thông tin, giám sát và xử lý vi phạm của doanh nghiệp; Chính phủ quy định hệ thống tổ chức của cơ quan này.","points":["Giải quyết đăng ký doanh nghiệp, cấp Giấy chứng nhận đă
