<script id="LD" type="application/json">{"meta":{"title":"Luật 59/2020/QH14 — Luật Doanh nghiệp","shortCode":"Luật 59/2020","subtitle":"Luật Doanh nghiệp","slug":"luat-59","effectiveDate":"01/01/2021","scope":"Luật này quy định về việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động có liên quan của doanh nghiệp, bao gồm công ty trách nhiệm hữu hạn, công ty cổ phần, công ty hợp danh và doanh nghiệp tư nhân; quy định về nhóm công ty.","description":"Luật Doanh nghiệp","related":[]},"outline":[{"id":"luat-59_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định về việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động có liên quan của doanh nghiệp, bao gồm công ty trách nhiệm hữu hạn, công ty cổ phần, công ty hợp danh và doanh nghiệp tư nhân; quy định về nhóm công ty."}]},{"id":"luat-59_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp."},{"k":"p","t":"2. Cơ quan, tổ chức, cá nhân có liên quan đến việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động có liên quan của doanh nghiệp."}]},{"id":"luat-59_3","no":3,"code":"Điều 3","title":"Điều 3. Áp dụng Luật Doanh nghiệp và luật khác","shortTitle":"Áp dụng Luật Doanh nghiệp và luật khác","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp luật khác có quy định đặc thù về việc thành lập, tổ chức quản lý, tổ chức lại, giải thể và hoạt động có liên quan của doanh nghiệp thì áp dụng quy định của luật đó."}]},{"id":"luat-59_4","no":4,"code":"Điều 4","title":"Điều 4. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Bản sao là giấy tờ được sao từ sổ gốc hoặc được chứng thực từ bản chính bởi cơ quan, tổ chức có thẩm quyền hoặc đã được đối chiếu với bản chính."},{"k":"p","t":"2. Cá nhân nước ngoài là người mang giấy tờ xác định quốc tịch nước ngoài."},{"k":"p","t":"3. Cổ đông là cá nhân, tổ chức sở hữu ít nhất một cổ phần của công ty cổ phần."},{"k":"p","t":"4. Cổ đông sáng lập là cổ đông sở hữu ít nhất một cổ phần phổ thông và ký tên trong danh sách cổ đông sáng lập công ty cổ phần."},{"k":"p","t":"5. Cổ tức là khoản lợi nhuận ròng được trả cho mỗi cổ phần bằng tiền mặt hoặc bằng tài sản khác."},{"k":"p","t":"6. Công ty bao gồm công ty trách nhiệm hữu hạn, công ty cổ phần và công ty hợp danh."},{"k":"p","t":"7. Công ty trách nhiệm hữu hạn bao gồm công ty trách nhiệm hữu hạn một thành viên và công ty trách nhiệm hữu hạn hai thành viên trở lên."},{"k":"p","t":"8. Cổng thông tin quốc gia về đăng ký doanh nghiệp là cổng thông tin điện tử được sử dụng để đăng ký doanh nghiệp qua mạng thông tin điện tử, công bố thông tin về đăng ký doanh nghiệp và truy cập thông tin về đăng ký doanh nghiệp."},{"k":"p","t":"9. Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp là tập hợp dữ liệu về đăng ký doanh nghiệp trên phạm vi toàn quốc."},{"k":"p","t":"10. Doanh nghiệp là tổ chức có tên riêng, có tài sản, có trụ sở giao dịch, được thành lập hoặc đăng ký thành lập theo quy định của pháp luật nhằm mục đích kinh doanh."},{"k":"p","t":"11. Doanh nghiệp nhà nước bao gồm các doanh nghiệp do Nhà nước nắm giữ trên 50% vốn điều lệ, tổng số cổ phần có quyền biểu quyết theo quy định tại Điều 88 của Luật này."},{"k":"p","t":"12. Doanh nghiệp Việt Nam là doanh nghiệp được thành lập hoặc đăng ký thành lập theo quy định của pháp luật Việt Nam và có trụ sở chính tại Việt Nam."},{"k":"p","t":"13. Địa chỉ liên lạc là địa chỉ đăng ký trụ sở chính đối với tổ chức; địa chỉ thường trú hoặc nơi làm việc hoặc địa chỉ khác của cá nhân mà người đó đăng ký với doanh nghiệp để làm địa chỉ liên lạc."},{"k":"p","t":"14. Giá thị trường của phần vốn góp hoặc cổ phần là giá giao dịch trên thị trường tại thời điểm liền kề trước đó, giá thỏa thuận giữa người bán và người mua hoặc giá do một tổ chức thẩm định giá xác định."},{"k":"p","t":"15. Giấy chứng nhận đăng ký doanh nghiệp là văn bản bằng bản giấy hoặc bản điện tử ghi lại những thông tin về đăng ký doanh nghiệp mà Cơ quan đăng ký kinh doanh cấp cho doanh nghiệp."},{"k":"p","t":"16. Giấy tờ pháp lý của cá nhân là một trong các loại giấy tờ sau đây: thẻ Căn cước công dân, Giấy chứng minh nhân dân, Hộ chiếu, giấy tờ chứng thực cá nhân hợp pháp khác."},{"k":"p","t":"17. Giấy tờ pháp lý của tổ chức là một trong các loại giấy tờ sau đây: Quyết định thành lập, Giấy chứng nhận đăng ký doanh nghiệp, tài liệu tương đương khác."},{"k":"p","t":"18. Góp vốn là việc góp tài sản để tạo thành vốn điều lệ của công ty, bao gồm góp vốn để thành lập công ty hoặc góp thêm vốn điều lệ của công ty đã được thành lập."},{"k":"p","t":"19. Hệ thống thông tin quốc gia về đăng ký doanh nghiệp bao gồm Cổng thông tin quốc gia về đăng ký doanh nghiệp, Cơ sở dữ liệu quốc gia về đăng ký doanh nghiệp, cơ sở dữ liệu liên quan và hạ tầng kỹ thuật hệ thống."},{"k":"p","t":"20. Hồ sơ hợp lệ là hồ sơ có đầy đủ giấy tờ theo quy định của Luật này và nội dung các giấy tờ đó được kê khai đầy đủ theo quy định của pháp luật."},{"k":"p","t":"21. Kinh doanh là việc thực hiện liên tục một, một số hoặc tất cả công đoạn của quá trình từ đầu tư, sản xuất đến tiêu thụ sản phẩm hoặc cung ứng dịch vụ trên thị trường nhằm mục đích tìm kiếm lợi nhuận."},{"k":"p","t":"22. Người có quan hệ gia đình bao gồm: vợ, chồng, bố đẻ, mẹ đẻ, bố nuôi, mẹ nuôi, bố chồng, mẹ chồng, bố vợ, mẹ vợ, con đẻ, con nuôi, con rể, con dâu, anh ruột, chị ruột, em ruột, anh rể, em rể, chị dâu, em dâu, anh ruột của vợ, anh ruột của chồng, chị ruột của vợ, chị ruột của chồng, em ruột của vợ, em ruột của chồng."},{"k":"p","t":"23. Người có liên quan là cá nhân, tổ chức có quan hệ trực tiếp hoặc gián tiếp với doanh nghiệp trong các trường hợp sau đây:"},{"k":"p","t":"a) Công ty mẹ, người quản lý và người đại diện theo pháp luật của công ty mẹ và người có thẩm quyền bổ nhiệm người quản lý của công ty mẹ;"},{"k":"p","t":"b) Công ty con, người quản lý và người đại diện theo pháp luật của công ty con;"},{"k":"p","t":"c) Cá nhân, tổ chức hoặc nhóm cá nhân, tổ chức có khả năng chi phối hoạt động của doanh nghiệp đó thông qua sở hữu, thâu tóm cổ phần, phần vốn góp hoặc thông qua việc ra quyết định của công ty;"},{"k":"p","t":"d) Người quản lý doanh nghiệp, người đại diện theo pháp luật, Kiểm soát viên;"},{"k":"p","t":"đ) Vợ, chồng, bố đẻ, mẹ đẻ, bố nuôi, mẹ nuôi, bố chồng, mẹ chồng, bố vợ, mẹ vợ, con đẻ, con nuôi, con rể, con dâu, anh ruột, chị ruột, em ruột, anh rể, em rể, chị dâu, em dâu của người quản lý công ty, người đại diện theo pháp luật, Kiểm soát viên, thành viên và cổ đông sở hữu phần vốn góp hay cổ phần chi phối;"},{"k":"p","t":"e) Cá nhân là người đại diện theo ủy quyền của công ty, tổ chức quy định tại các điểm a, b và c khoản này;"},{"k":"p","t":"g) Doanh nghiệp trong đó cá nhân, công ty, tổ chức quy định tại các điểm a, b, c, d, đ và e khoản này có sở hữu đến mức chi phối việc ra quyết định của công ty."},{"k":"p","t":"24. Người quản lý doanh nghiệp là người quản lý doanh nghiệp tư nhân và người quản lý công ty, bao gồm chủ doanh nghiệp tư nhân, thành viên hợp danh, Chủ tịch Hội đồng thành viên, thành viên Hội đồng thành viên, Chủ tịch công ty, Chủ tịch Hội đồng quản trị, thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và cá nhân giữ chức danh quản lý khác theo quy định tại Điều lệ công ty."},{"k":"p","t":"25. Người thành lập doanh nghiệp là cá nhân, tổ chức thành lập hoặc góp vốn để thành lập doanh nghiệp."},{"k":"p","t":"26. Nhà đầu tư nước ngoài là cá nhân, tổ chức theo quy định của Luật Đầu tư."},{"k":"p","t":"27. Phần vốn góp là tổng giá trị tài sản của một thành viên đã góp hoặc cam kết góp vào công ty trách nhiệm hữu hạn, công ty hợp danh. Tỷ lệ phần vốn góp là tỷ lệ giữa phần vốn góp của một thành viên và vốn điều lệ của công ty trách nhiệm hữu hạn, công ty hợp danh."},{"k":"p","t":"28. Sản phẩm, dịch vụ công ích là sản phẩm, dịch vụ thiết yếu đối với đời sống kinh tế - xã hội của đất nước, địa phương hoặc cộng đồng dân cư mà Nhà nước cần bảo đảm vì lợi ích chung hoặc bảo đảm quốc phòng, an ninh và việc sản xuất, cung ứng sản phẩm, dịch vụ này theo cơ chế thị trường khó có khả năng bù đắp chi phí."},{"k":"p","t":"29. Thành viên công ty là cá nhân, tổ chức sở hữu một phần hoặc toàn bộ vốn điều lệ của công ty trách nhiệm hữu hạn hoặc công ty hợp danh."},{"k":"p","t":"30. Thành viên công ty hợp danh bao gồm thành viên hợp danh và thành viên góp vốn."},{"k":"p","t":"31. Tổ chức lại doanh nghiệp là việc chia, tách, hợp nhất, sáp nhập hoặc chuyển đổi loại hình doanh nghiệp."},{"k":"p","t":"32. Tổ chức nước ngoài là tổ chức được thành lập ở nước ngoài theo pháp luật nước ngoài."},{"k":"p","t":"33. Vốn có quyền biểu quyết là phần vốn góp hoặc cổ phần, theo đó người sở hữu có quyền biểu quyết về những vấn đề thuộc thẩm quyền quyết định của Hội đồng thành viên hoặc Đại hội đồng cổ đông."},{"k":"p","t":"34. Vốn điều lệ là tổng giá trị tài sản do các thành viên công ty, chủ sở hữu công ty đã góp hoặc cam kết góp khi thành lập công ty trách nhiệm hữu hạn, công ty hợp danh; là tổng mệnh giá cổ phần đã bán hoặc được đăng ký mua khi thành lập công ty cổ phần."}]},{"id":"luat-59_5","no":5,"code":"Điều 5","title":"Điều 5. Bảo đảm của Nhà nước đối với doanh nghiệp và chủ sở hữu doanh nghiệp","shortTitle":"Bảo đảm của Nhà nước đối với doanh nghiệp và chủ sở hữu doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Nhà nước công nhận sự tồn tại lâu dài và phát triển của các loại hình doanh nghiệp được quy định tại Luật này; bảo đảm bình đẳng trước pháp luật của các doanh nghiệp không phân biệt hình thức sở hữu và thành phần kinh tế; công nhận tính sinh lợi hợp pháp của hoạt động kinh doanh."},{"k":"p","t":"2. Nhà nước công nhận và bảo hộ quyền sở hữu tài sản, vốn đầu tư, thu nhập, quyền và lợi ích hợp pháp khác của doanh nghiệp và chủ sở hữu doanh nghiệp."},{"k":"p","t":"3. Tài sản và vốn đầu tư hợp pháp của doanh nghiệp và chủ sở hữu doanh nghiệp không bị quốc hữu hóa, không bị tịch thu bằng biện pháp hành chính. Trường hợp thật cần thiết, Nhà nước trưng mua hoặc trưng dụng tài sản của doanh nghiệp thì được thanh toán, bồi thường theo quy định của pháp luật về trưng mua, trưng dụng tài sản. Việc thanh toán, bồi thường phải bảo đảm lợi ích của doanh nghiệp và không phân biệt đối xử giữa các loại hình doanh nghiệp."}]},{"id":"luat-59_6","no":6,"code":"Điều 6","title":"Điều 6. Tổ chức chính trị, tổ chức chính trị - xã hội và tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp","shortTitle":"Tổ chức chính trị, tổ chức chính trị - xã hội và tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức chính trị, tổ chức chính trị-xã hội và tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp hoạt động theo quy định của Hiến pháp, pháp luật và điều lệ của tổ chức."},{"k":"p","t":"2. Doanh nghiệp có nghĩa vụ tôn trọng và không được cản trở, gây khó khăn cho việc thành lập tổ chức chính trị, tổ chức chính trị - xã hội và tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp; không được cản trở, gây khó khăn cho người lao động tham gia hoạt động trong các tổ chức này."}]},{"id":"luat-59_7","no":7,"code":"Điều 7","title":"Điều 7. Quyền của doanh nghiệp","shortTitle":"Quyền của doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Tự do kinh doanh ngành, nghề mà luật không cấm."},{"k":"p","t":"2. Tự chủ kinh doanh và lựa chọn hình thức tổ chức kinh doanh; chủ động lựa chọn ngành, nghề, địa bàn, hình thức kinh doanh; chủ động điều chỉnh quy mô và ngành, nghề kinh doanh."},{"k":"p","t":"3. Lựa chọn hình thức, phương thức huy động, phân bổ và sử dụng vốn."},{"k":"p","t":"4. Tự do tìm kiếm thị trường, khách hàng và ký kết hợp đồng."},{"k":"p","t":"5. Kinh doanh xuất khẩu, nhập khẩu."},{"k":"p","t":"6. Tuyển dụng, thuê và sử dụng lao động theo quy định của pháp luật về lao động."},{"k":"p","t":"7. Chủ động ứng dụng khoa học và công nghệ để nâng cao hiệu quả kinh doanh và khả năng cạnh tranh; được bảo hộ quyền sở hữu trí tuệ theo quy định của pháp luật về sở hữu trí tuệ."},{"k":"p","t":"8. Chiếm hữu, sử dụng, định đoạt tài sản của doanh nghiệp."},{"k":"p","t":"9. Từ chối yêu cầu của cơ quan, tổ chức, cá nhân về cung cấp nguồn lực không theo quy định của pháp luật."},{"k":"p","t":"10. Khiếu nại, tham gia tố tụng theo quy định của pháp luật."},{"k":"p","t":"11. Quyền khác theo quy định của pháp luật."}]},{"id":"luat-59_8","no":8,"code":"Điều 8","title":"Điều 8. Nghĩa vụ của doanh nghiệp","shortTitle":"Nghĩa vụ của doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đáp ứng đủ điều kiện đầu tư kinh doanh khi kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện; ngành, nghề tiếp cận thị trường có điều kiện đối với nhà đầu tư nước ngoài theo quy định của pháp luật và bảo đảm duy trì đủ điều kiện đó trong suốt quá trình hoạt động kinh doanh."},{"k":"p","t":"2. Thực hiện đầy đủ, kịp thời nghĩa vụ về đăng ký doanh nghiệp, đăng ký thay đổi nội dung đăng ký doanh nghiệp, công khai thông tin về thành lập và hoạt động của doanh nghiệp, báo cáo và nghĩa vụ khác theo quy định của Luật này."},{"k":"p","t":"3. Chịu trách nhiệm về tính trung thực, chính xác của thông tin kê khai trong hồ sơ đăng ký doanh nghiệp và các báo cáo; trường hợp phát hiện thông tin đã kê khai hoặc báo cáo thiếu chính xác, chưa đầy đủ thì phải kịp thời sửa đổi, bổ sung các thông tin đó."},{"k":"p","t":"4. Tổ chức công tác kế toán, nộp thuế và thực hiện các nghĩa vụ tài chính khác theo quy định của pháp luật."},{"k":"p","t":"5. Bảo đảm quyền, lợi ích hợp pháp, chính đáng của người lao động theo quy định của pháp luật; không phân biệt đối xử, xúc phạm danh dự, nhân phẩm của người lao động trong doanh nghiệp; không ngược đãi lao động, cưỡng bức lao động hoặc sử dụng lao động chưa thành niên trái pháp luật; hỗ trợ và tạo điều kiện thuận lợi cho người lao động tham gia đào tạo nâng cao trình độ, kỹ năng nghề; thực hiện các chính sách, chế độ bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế và bảo hiểm khác cho người lao động theo quy định của pháp luật."},{"k":"p","t":"6. Nghĩa vụ khác theo quy định của pháp luật."}]},{"id":"luat-59_9","no":9,"code":"Điều 9","title":"Điều 9. Quyền và nghĩa vụ của doanh nghiệp cung ứng sản phẩm, dịch vụ công ích","shortTitle":"Quyền và nghĩa vụ của doanh nghiệp cung ứng sản phẩm, dịch vụ công ích","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Quyền và nghĩa vụ của doanh nghiệp quy định tại Điều 7, Điều 8 và quy định khác có liên quan của Luật này."},{"k":"p","t":"2. Được hạch toán và bù đắp chi phí theo giá do pháp luật về đấu thầu quy định hoặc thu phí sử dụng dịch vụ theo quy định của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"3. Được bảo đảm thời hạn cung ứng sản phẩm, dịch vụ thích hợp để thu hồi vốn đầu tư và có lãi hợp lý."},{"k":"p","t":"4. Cung ứng sản phẩm, dịch vụ đủ số lượng, đúng chất lượng và thời hạn đã cam kết theo giá hoặc phí do cơ quan nhà nước có thẩm quyền quy định."},{"k":"p","t":"5. Bảo đảm các điều kiện công bằng và thuận lợi cho khách hàng."},{"k":"p","t":"6. Chịu trách nhiệm trước pháp luật và khách hàng về số lượng, chất lượng, điều kiện cung ứng và giá, phí sản phẩm, dịch vụ cung ứng."}]},{"id":"luat-59_10","no":10,"code":"Điều 10","title":"Điều 10. Tiêu chí, quyền và nghĩa vụ của doanh nghiệp xã hội","shortTitle":"Tiêu chí, quyền và nghĩa vụ của doanh nghiệp xã hội","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp xã hội phải đáp ứng các tiêu chí sau đây:"},{"k":"p","t":"a) Là doanh nghiệp được đăng ký thành lập theo quy định của Luật này;"},{"k":"p","t":"b) Mục tiêu hoạt động nhằm giải quyết vấn đề xã hội, môi trường vì lợi ích cộng đồng;"},{"k":"p","t":"c) Sử dụng ít nhất 51% tổng lợi nhuận sau thuế hằng năm của doanh nghiệp để tái đầu tư nhằm thực hiện mục tiêu đã đăng ký."},{"k":"p","t":"2. Ngoài quyền và nghĩa vụ của doanh nghiệp theo quy định của Luật này, doanh nghiệp xã hội có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Chủ sở hữu, người quản lý doanh nghiệp xã hội được xem xét, tạo thuận lợi và hỗ trợ trong việc cấp giấy phép, chứng chỉ và giấy chứng nhận có liên quan theo quy định của pháp luật;"},{"k":"p","t":"b) Được huy động, nhận tài trợ từ cá nhân, doanh nghiệp, tổ chức phi chính phủ và tổ chức khác của Việt Nam, nước ngoài để bù đắp chi phí quản lý, chi phí hoạt động của doanh nghiệp;"},{"k":"p","t":"c) Duy trì mục tiêu hoạt động và điều kiện quy định tại điểm b và điểm c khoản 1 Điều này trong suốt quá trình hoạt động;"},{"k":"p","t":"d) Không được sử dụng các khoản tài trợ huy động được cho mục đích khác ngoài bù đắp chi phí quản lý và chi phí hoạt động để giải quyết vấn đề xã hội, môi trường mà doanh nghiệp đã đăng ký;"},{"k":"p","t":"đ) Trường hợp được nhận các ưu đãi, hỗ trợ, doanh nghiệp xã hội phải định kỳ hằng năm báo cáo cơ quan có thẩm quyền về tình hình hoạt động của doanh nghiệp."},{"k":"p","t":"3. Doanh nghiệp xã hội phải thông báo với cơ quan có thẩm quyền khi chấm dứt thực hiện mục tiêu xã hội, môi trường hoặc không sử dụng lợi nhuận để tái đầu tư theo quy định tại điểm b và điểm c khoản 1 Điều này."},{"k":"p","t":"4. Nhà nước có chính sách khuyến khích, hỗ trợ và thúc đẩy phát triển doanh nghiệp xã hội."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_11","no":11,"code":"Điều 11","title":"Điều 11. Chế độ lưu giữ tài liệu của doanh nghiệp","shortTitle":"Chế độ lưu giữ tài liệu của doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Tùy theo loại hình, doanh nghiệp phải lưu giữ các tài liệu sau đây:"},{"k":"p","t":"a) Điều lệ công ty; quy chế quản lý nội bộ của công ty; sổ đăng ký thành viên hoặc sổ đăng ký cổ đông;"},{"k":"p","t":"b) Văn bằng bảo hộ quyền sở hữu công nghiệp; giấy chứng nhận đăng ký chất lượng sản phẩm, hàng hóa, dịch vụ; giấy phép và giấy chứng nhận khác;"},{"k":"p","t":"c) Tài liệu, giấy tờ xác nhận quyền sở hữu tài sản của công ty;"},{"k":"p","t":"d) Phiếu biểu quyết, biên bản kiểm phiếu, biên bản họp Hội đồng thành viên, Đại hội đồng cổ đông, Hội đồng quản trị; các quyết định của doanh nghiệp;"},{"k":"p","t":"đ) Bản cáo bạch để chào bán hoặc niêm yết chứng khoán;"},{"k":"p","t":"e) Báo cáo của Ban kiểm soát, kết luận của cơ quan thanh tra, kết luận của tổ chức kiểm toán;"},{"k":"p","t":"g) Sổ kế toán, chứng từ kế toán, báo cáo tài chính hằng năm."},{"k":"p","t":"2. Doanh nghiệp phải lưu giữ các tài liệu quy định tại khoản 1 Điều này tại trụ sở chính hoặc địa điểm khác được quy định trong Điều lệ công ty; thời hạn lưu giữ thực hiện theo quy định của pháp luật."}]},{"id":"luat-59_12","no":12,"code":"Điều 12","title":"Điều 12. Người đại diện theo pháp luật của doanh nghiệp","shortTitle":"Người đại diện theo pháp luật của doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người đại diện theo pháp luật của doanh nghiệp là cá nhân đại diện cho doanh nghiệp thực hiện các quyền và nghĩa vụ phát sinh từ giao dịch của doanh nghiệp, đại diện cho doanh nghiệp với tư cách người yêu cầu giải quyết việc dân sự, nguyên đơn, bị đơn, người có quyền lợi, nghĩa vụ liên quan trước Trọng tài, Tòa án và các quyền, nghĩa vụ khác theo quy định của pháp luật."},{"k":"p","t":"2. Công ty trách nhiệm hữu hạn và công ty cổ phần có thể có một hoặc nhiều người đại diện theo pháp luật. Điều lệ công ty quy định cụ thể số lượng, chức danh quản lý và quyền, nghĩa vụ của người đại diện theo pháp luật của doanh nghiệp. Nếu công ty có nhiều hơn một người đại diện theo pháp luật thì Điều lệ công ty quy định cụ thể quyền, nghĩa vụ của từng người đại diện theo pháp luật. Trường hợp việc phân chia quyền, nghĩa vụ của từng người đại diện theo pháp luật chưa được quy định rõ trong Điều lệ công ty thì mỗi người đại diện theo pháp luật của công ty đều là đại diện đủ thẩm quyền của doanh nghiệp trước bên thứ ba; tất cả người đại diện theo pháp luật phải chịu trách nhiệm liên đới đối với thiệt hại gây ra cho doanh nghiệp theo quy định của pháp luật về dân sự và quy định khác của pháp luật có liên quan."},{"k":"p","t":"3. Doanh nghiệp phải bảo đảm luôn có ít nhất một người đại diện theo pháp luật cư trú tại Việt Nam. Khi chỉ còn lại một người đại diện theo pháp luật cư trú tại Việt Nam thì người này khi xuất cảnh khỏi Việt Nam phải ủy quyền bằng văn bản cho cá nhân khác cư trú tại Việt Nam thực hiện quyền và nghĩa vụ của người đại diện theo pháp luật. Trường hợp này, người đại diện theo pháp luật vẫn phải chịu trách nhiệm về việc thực hiện quyền và nghĩa vụ đã ủy quyền."},{"k":"p","t":"4. Trường hợp hết thời hạn ủy quyền theo quy định tại khoản 3 Điều này mà người đại diện theo pháp luật của doanh nghiệp chưa trở lại Việt Nam và không có ủy quyền khác thì thực hiện theo quy định sau đây:"},{"k":"p","t":"a) Người được ủy quyền tiếp tục thực hiện các quyền và nghĩa vụ của người đại diện theo pháp luật của doanh nghiệp tư nhân cho đến khi người đại diện theo pháp luật của doanh nghiệp trở lại làm việc tại doanh nghiệp;"},{"k":"p","t":"b) Người được ủy quyền tiếp tục thực hiện các quyền và nghĩa vụ của người đại diện theo pháp luật của công ty trách nhiệm hữu hạn, công ty cổ phần, công ty hợp danh cho đến khi người đại diện theo pháp luật của công ty trở lại làm việc tại công ty hoặc cho đến khi chủ sở hữu công ty, Hội đồng thành viên, Hội đồng quản trị quyết định cử người khác làm người đại diện theo pháp luật của doanh nghiệp."},{"k":"p","t":"5. Trừ trường hợp quy định tại khoản 6 Điều này, đối với doanh nghiệp chỉ còn một người đại diện theo pháp luật và người này vắng mặt tại Việt Nam quá 30 ngày mà không ủy quyền cho người khác thực hiện các quyền và nghĩa vụ của người đại diện theo pháp luật của doanh nghiệp hoặc chết, mất tích, đang bị truy cứu trách nhiệm hình sự, bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc, bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi, bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định thì chủ sở hữu công ty, Hội đồng thành viên, Hội đồng quản trị cử người khác làm người đại diện theo pháp luật của công ty."},{"k":"p","t":"6. Đối với công ty trách nhiệm hữu hạn có hai thành viên, nếu có thành viên là cá nhân làm người đại diện theo pháp luật của công ty chết, mất tích, đang bị truy cứu trách nhiệm hình sự, bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc, trốn khỏi nơi cư trú, bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi, bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định thì thành viên còn lại đương nhiên làm người đại diện theo pháp luật của công ty cho đến khi có quyết định mới của Hội đồng thành viên về người đại diện theo pháp luật của công ty."},{"k":"p","t":"7. Tòa án, cơ quan có thẩm quyền tiến hành tố tụng khác có quyền chỉ định người đại diện theo pháp luật tham gia tố tụng theo quy định của pháp luật."}]},{"id":"luat-59_13","no":13,"code":"Điều 13","title":"Điều 13. Trách nhiệm của người đại diện theo pháp luật của doanh nghiệp","shortTitle":"Trách nhiệm của người đại diện theo pháp luật của doanh nghiệp","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người đại diện theo pháp luật của doanh nghiệp có trách nhiệm sau đây:"},{"k":"p","t":"a) Thực hiện quyền và nghĩa vụ được giao một cách trung thực, cẩn trọng, tốt nhất nhằm bảo đảm lợi ích hợp pháp của doanh nghiệp;"},{"k":"p","t":"b) Trung thành với lợi ích của doanh nghiệp; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của doanh nghiệp để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác;"},{"k":"p","t":"c) Thông báo kịp thời, đầy đủ, chính xác cho doanh nghiệp về doanh nghiệp mà mình, người có liên quan của mình làm chủ hoặc có cổ phần, phần vốn góp theo quy định của Luật này."},{"k":"p","t":"2. Người đại diện theo pháp luật của doanh nghiệp chịu trách nhiệm cá nhân đối với thiệt hại cho doanh nghiệp do vi phạm trách nhiệm quy định tại khoản 1 Điều này."}]},{"id":"luat-59_14","no":14,"code":"Điều 14","title":"Điều 14. Người đại diện theo ủy quyền của chủ sở hữu, thành viên, cổ đông công ty là tổ chức","shortTitle":"Người đại diện theo ủy quyền của chủ sở hữu, thành viên, cổ đông công ty là tổ chức","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người đại diện theo ủy quyền của chủ sở hữu, thành viên, cổ đông công ty là tổ chức phải là cá nhân được ủy quyền bằng văn bản nhân danh chủ sở hữu, thành viên, cổ đông đó thực hiện quyền và nghĩa vụ theo quy định của Luật này."},{"k":"p","t":"2. Trường hợp Điều lệ công ty không có quy định khác thì việc cử người đại diện theo ủy quyền thực hiện theo quy định sau đây:"},{"k":"p","t":"a) Tổ chức là thành viên công ty trách nhiệm hữu hạn hai thành viên trở lên có sở hữu ít nhất 35% vốn điều lệ có thể ủy quyền tối đa 03 người đại diện theo ủy quyền;"},{"k":"p","t":"b) Tổ chức là cổ đông công ty cổ phần có sở hữu ít nhất 10% tổng số cổ phần phổ thông có thể ủy quyền tối đa 03 người đại diện theo ủy quyền."},{"k":"p","t":"3. Trường hợp chủ sở hữu, thành viên, cổ đông công ty là tổ chức cử nhiều người đại diện theo ủy quyền thì phải xác định cụ thể phần vốn góp, số cổ phần cho mỗi người đại diện theo ủy quyền. Trường hợp chủ sở hữu, thành viên, cổ đông công ty không xác định phần vốn góp, số cổ phần tương ứng cho mỗi người đại diện theo ủy quyền thì phần vốn góp, số cổ phần sẽ được chia đều cho tất cả người đại diện theo ủy quyền."},{"k":"p","t":"4. Văn bản cử người đại diện theo ủy quyền phải được thông báo cho công ty và chỉ có hiệu lực đối với công ty kể từ ngày công ty nhận được văn bản. Văn bản cử người đại diện theo ủy quyền phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của chủ sở hữu, thành viên, cổ đông;"},{"k":"p","t":"b) Số lượng người đại diện theo ủy quyền và tỷ lệ sở hữu cổ phần, phần vốn góp tương ứng của mỗi người đại diện theo ủy quyền;"},{"k":"p","t":"c) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân từng người đại diện theo ủy quyền;"},{"k":"p","t":"d) Thời hạn ủy quyền tương ứng của từng người đại diện theo ủy quyền; trong đó ghi rõ ngày bắt đầu được đại diện;"},{"k":"p","t":"đ) Họ, tên, chữ ký của người đại diện theo pháp luật của chủ sở hữu, thành viên, cổ đông và của người đại diện theo ủy quyền."},{"k":"p","t":"5. Người đại diện theo ủy quyền phải có các tiêu chuẩn và điều kiện sau đây:"},{"k":"p","t":"a) Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này;"},{"k":"p","t":"b) Thành viên, cổ đông là doanh nghiệp nhà nước theo quy định tại điểm b khoản 1 Điều 88 của Luật này không được cử người có quan hệ gia đình của người quản lý công ty và của người có thẩm quyền bổ nhiệm người quản lý công ty làm người đại diện tại công ty khác;"},{"k":"p","t":"c) Tiêu chuẩn và điều kiện khác do Điều lệ công ty quy định."}]},{"id":"luat-59_15","no":15,"code":"Điều 15","title":"Điều 15. Trách nhiệm của người đại diện theo ủy quyền của chủ sở hữu, thành viên, cổ đông công ty là tổ chức","shortTitle":"Trách nhiệm của người đại diện theo ủy quyền của chủ sở hữu, thành viên, cổ đông công ty là tổ chức","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người đại diện theo ủy quyền nhân danh chủ sở hữu, thành viên, cổ đông công ty thực hiện quyền và nghĩa vụ của chủ sở hữu, thành viên, cổ đông tại Hội đồng thành viên, Đại hội đồng cổ đông theo quy định của Luật này. Mọi hạn chế của chủ sở hữu, thành viên, cổ đông đối với người đại diện theo ủy quyền trong việc thực hiện quyền, nghĩa vụ của chủ sở hữu, thành viên, cổ đông công ty tương ứng tại Hội đồng thành viên, Đại hội đồng cổ đông đều không có hiệu lực đối với bên thứ ba."},{"k":"p","t":"2. Người đại diện theo ủy quyền có trách nhiệm tham dự đầy đủ cuộc họp Hội đồng thành viên, Đại hội đồng cổ đông; thực hiện quyền và nghĩa vụ được ủy quyền một cách trung thực, cẩn trọng, tốt nhất, bảo vệ lợi ích hợp pháp của chủ sở hữu, thành viên, cổ đông cử đại diện."},{"k":"p","t":"3. Người đại diện theo ủy quyền chịu trách nhiệm trước chủ sở hữu, thành viên, cổ đông cử đại diện do vi phạm trách nhiệm quy định tại Điều này. Chủ sở hữu, thành viên, cổ đông cử đại diện chịu trách nhiệm trước bên thứ ba đối với trách nhiệm phát sinh liên quan đến quyền và nghĩa vụ được thực hiện thông qua người đại diện theo ủy quyền."}]},{"id":"luat-59_16","no":16,"code":"Điều 16","title":"Điều 16. Các hành vi bị nghiêm cấm","shortTitle":"Các hành vi bị nghiêm cấm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cấp hoặc từ chối cấp Giấy chứng nhận đăng ký doanh nghiệp, yêu cầu người thành lập doanh nghiệp nộp thêm giấy tờ khác trái với quy định của Luật này; gây chậm trễ, phiền hà, cản trở, sách nhiễu người thành lập doanh nghiệp và hoạt động kinh doanh của doanh nghiệp."},{"k":"p","t":"2. Ngăn cản chủ sở hữu, thành viên, cổ đông của doanh nghiệp thực hiện quyền, nghĩa vụ theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"3. Hoạt động kinh doanh dưới hình thức doanh nghiệp mà không đăng ký hoặc tiếp tục kinh doanh khi đã bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc doanh nghiệp đang bị tạm dừng hoạt động kinh doanh."},{"k":"p","t":"4. Kê khai không trung thực, không chính xác nội dung hồ sơ đăng ký doanh nghiệp và nội dung hồ sơ đăng ký thay đổi nội dung đăng ký doanh nghiệp."},{"k":"p","t":"5. Kê khai khống vốn điều lệ, không góp đủ số vốn điều lệ như đã đăng ký; cố ý định giá tài sản góp vốn không đúng giá trị."},{"k":"p","t":"6. Kinh doanh các ngành, nghề cấm đầu tư kinh doanh; kinh doanh ngành, nghề chưa được tiếp cận thị trường đối với nhà đầu tư nước ngoài; kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện khi chưa đủ điều kiện kinh doanh theo quy định của pháp luật hoặc không bảo đảm duy trì đủ điều kiện đầu tư kinh doanh trong quá trình hoạt động."},{"k":"p","t":"7. Lừa đảo, rửa tiền, tài trợ khủng bố."}]},{"id":"luat-59_17","no":17,"code":"Điều 17","title":"Điều 17. Quyền thành lập, góp vốn, mua cổ phần, mua phần vốn góp và quản lý doanh nghiệp","shortTitle":"Quyền thành lập, góp vốn, mua cổ phần, mua phần vốn góp và quản lý doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân có quyền thành lập và quản lý doanh nghiệp tại Việt Nam theo quy định của Luật này, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Tổ chức, cá nhân sau đây không có quyền thành lập và quản lý doanh nghiệp tại Việt Nam:"},{"k":"p","t":"a) Cơ quan nhà nước, đơn vị lực lượng vũ trang nhân dân sử dụng tài sản nhà nước để thành lập doanh nghiệp kinh doanh thu lợi riêng cho cơ quan, đơn vị mình;"},{"k":"p","t":"b) Cán bộ, công chức, viên chức theo quy định của Luật Cán bộ, công chức và Luật Viên chức;"},{"k":"p","t":"c) Sĩ quan, hạ sĩ quan, quân nhân chuyên nghiệp, công nhân, viên chức quốc phòng trong các cơ quan, đơn vị thuộc Quân đội nhân dân Việt Nam; sĩ quan, hạ sĩ quan chuyên nghiệp, công nhân công an trong các cơ quan, đơn vị thuộc Công an nhân dân Việt Nam, trừ người được cử làm đại diện theo ủy quyền để quản lý phần vốn góp của Nhà nước tại doanh nghiệp hoặc quản lý tại doanh nghiệp nhà nước;"},{"k":"p","t":"d) Cán bộ lãnh đạo, quản lý nghiệp vụ trong doanh nghiệp nhà nước theo quy định tại điểm a khoản 1 Điều 88 của Luật này, trừ người được cử làm đại diện theo ủy quyền để quản lý phần vốn góp của Nhà nước tại doanh nghiệp khác;"},{"k":"p","t":"đ) Người chưa thành niên; người bị hạn chế năng lực hành vi dân sự; người bị mất năng lực hành vi dân sự; người có khó khăn trong nhận thức, làm chủ hành vi; tổ chức không có tư cách pháp nhân;"},{"k":"p","t":"e) Người đang bị truy cứu trách nhiệm hình sự, bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc hoặc đang bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định; các trường hợp khác theo quy định của Luật Phá sản, Luật Phòng, chống tham nhũng."},{"k":"p","t":"Trường hợp Cơ quan đăng ký kinh doanh có yêu cầu, người đăng ký thành lập doanh nghiệp phải nộp Phiếu lý lịch tư pháp cho Cơ quan đăng ký kinh doanh;"},{"k":"p","t":"g) Tổ chức là pháp nhân thương mại bị cấm kinh doanh, cấm hoạt động trong một số lĩnh vực nhất định theo quy định của Bộ luật Hình sự."},{"k":"p","t":"3. Tổ chức, cá nhân có quyền góp vốn, mua cổ phần, mua phần vốn góp vào công ty cổ phần, công ty trách nhiệm hữu hạn, công ty hợp danh theo quy định của Luật này, trừ trường hợp sau đây:"},{"k":"p","t":"a) Cơ quan nhà nước, đơn vị lực lượng vũ trang nhân dân sử dụng tài sản nhà nước góp vốn vào doanh nghiệp để thu lợi riêng cho cơ quan, đơn vị mình;"},{"k":"p","t":"b) Đối tượng không được góp vốn vào doanh nghiệp theo quy định của Luật Cán bộ, công chức, Luật Viên chức, Luật Phòng, chống tham nhũng."},{"k":"p","t":"4. Thu lợi riêng cho cơ quan, đơn vị mình quy định tại điểm a khoản 2 và điểm a khoản 3 Điều này là việc sử dụng thu nhập dưới mọi hình thức có được từ hoạt động kinh doanh, từ góp vốn, mua cổ phần, mua phần vốn góp vào một trong các mục đích sau đây:"},{"k":"p","t":"a) Chia dưới mọi hình thức cho một số hoặc tất cả những người quy định tại điểm b và điểm c khoản 2 Điều này;"},{"k":"p","t":"b) Bổ sung vào ngân sách hoạt động của cơ quan, đơn vị trái với quy định của pháp luật về ngân sách nhà nước;"},{"k":"p","t":"c) Lập quỹ hoặc bổ sung vào quỹ phục vụ lợi ích riêng của cơ quan, đơn vị."}]},{"id":"luat-59_18","no":18,"code":"Điều 18","title":"Điều 18. Hợp đồng trước đăng ký doanh nghiệp","shortTitle":"Hợp đồng trước đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Người thành lập doanh nghiệp được ký hợp đồng phục vụ cho việc thành lập và hoạt động của doanh nghiệp trước và trong quá trình đăng ký doanh nghiệp."},{"k":"p","t":"2. Trường hợp được cấp Giấy chứng nhận đăng ký doanh nghiệp, doanh nghiệp phải tiếp tục thực hiện quyền và nghĩa vụ phát sinh từ hợp đồng đã ký kết quy định tại khoản 1 Điều này và các bên phải thực hiện việc chuyển giao quyền, nghĩa vụ theo hợp đồng theo quy định của Bộ luật Dân sự, trừ trường hợp trong hợp đồng có thỏa thuận khác."},{"k":"p","t":"3. Trường hợp doanh nghiệp không được cấp Giấy chứng nhận đăng ký doanh nghiệp, người ký kết hợp đồng theo quy định tại khoản 1 Điều này chịu trách nhiệm thực hiện hợp đồng; trường hợp có người khác tham gia thành lập doanh nghiệp thì cùng liên đới chịu trách nhiệm thực hiện hợp đồng đó."}]},{"id":"luat-59_19","no":19,"code":"Điều 19","title":"Điều 19. Hồ sơ đăng ký doanh nghiệp tư nhân","shortTitle":"Hồ sơ đăng ký doanh nghiệp tư nhân","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Giấy đề nghị đăng ký doanh nghiệp."},{"k":"p","t":"2. Bản sao giấy tờ pháp lý của cá nhân đối với chủ doanh nghiệp tư nhân."}]},{"id":"luat-59_20","no":20,"code":"Điều 20","title":"Điều 20. Hồ sơ đăng ký công ty hợp danh","shortTitle":"Hồ sơ đăng ký công ty hợp danh","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Giấy đề nghị đăng ký doanh nghiệp."},{"k":"p","t":"2. Điều lệ công ty."},{"k":"p","t":"3. Danh sách thành viên."},{"k":"p","t":"4. Bản sao giấy tờ pháp lý của cá nhân đối với thành viên."},{"k":"p","t":"5. Bản sao Giấy chứng nhận đăng ký đầu tư đối với nhà đầu tư nước ngoài theo quy định của Luật Đầu tư."}]},{"id":"luat-59_21","no":21,"code":"Điều 21","title":"Điều 21. Hồ sơ đăng ký công ty trách nhiệm hữu hạn","shortTitle":"Hồ sơ đăng ký công ty trách nhiệm hữu hạn","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Giấy đề nghị đăng ký doanh nghiệp."},{"k":"p","t":"2. Điều lệ công ty."},{"k":"p","t":"3. Danh sách thành viên."},{"k":"p","t":"4. Bản sao các giấy tờ sau đây:"},{"k":"p","t":"a) Giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân, người đại diện theo pháp luật;"},{"k":"p","t":"b) Giấy tờ pháp lý của tổ chức đối với thành viên là tổ chức và văn bản cử người đại diện theo ủy quyền; giấy tờ pháp lý của cá nhân đối với người đại diện theo ủy quyền của thành viên là tổ chức."},{"k":"p","t":"Đối với thành viên là tổ chức nước ngoài thì bản sao giấy tờ pháp lý của tổ chức phải được hợp pháp hóa lãnh sự;"},{"k":"p","t":"c) Giấy chứng nhận đăng ký đầu tư đối với nhà đầu tư nước ngoài theo quy định của Luật Đầu tư."}]},{"id":"luat-59_22","no":22,"code":"Điều 22","title":"Điều 22. Hồ sơ đăng ký công ty cổ phần","shortTitle":"Hồ sơ đăng ký công ty cổ phần","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Giấy đề nghị đăng ký doanh nghiệp."},{"k":"p","t":"2. Điều lệ công ty."},{"k":"p","t":"3. Danh sách cổ đông sáng lập; danh sách cổ đông là nhà đầu tư nước ngoài."},{"k":"p","t":"4. Bản sao các giấy tờ sau đây:"},{"k":"p","t":"a) Giấy tờ pháp lý của cá nhân đối với cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài là cá nhân, người đại diện theo pháp luật;"},{"k":"p","t":"b) Giấy tờ pháp lý của tổ chức đối với cổ đông là tổ chức và văn bản cử người đại diện theo ủy quyền; giấy tờ pháp lý của cá nhân đối với người đại diện theo ủy quyền của cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài là tổ chức."},{"k":"p","t":"Đối với cổ đông là tổ chức nước ngoài thì bản sao giấy tờ pháp lý của tổ chức phải được hợp pháp hóa lãnh sự;"},{"k":"p","t":"c) Giấy chứng nhận đăng ký đầu tư đối với nhà đầu tư nước ngoài theo quy định của Luật Đầu tư."}]},{"id":"luat-59_23","no":23,"code":"Điều 23","title":"Điều 23. Nội dung giấy đề nghị đăng ký doanh nghiệp","shortTitle":"Nội dung giấy đề nghị đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Giấy đề nghị đăng ký doanh nghiệp bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"1. Tên doanh nghiệp;"},{"k":"p","t":"2. Địa chỉ trụ sở chính của doanh nghiệp, số điện thoại; số fax, thư điện tử (nếu có);"},{"k":"p","t":"3. Ngành, nghề kinh doanh;"},{"k":"p","t":"4. Vốn điều lệ; vốn đầu tư của chủ doanh nghiệp tư nhân;"},{"k":"p","t":"5. Các loại cổ phần, mệnh giá mỗi loại cổ phần và tổng số cổ phần được quyền chào bán của từng loại cổ phần đối với công ty cổ phần;"},{"k":"p","t":"6. Thông tin đăng ký thuế;"},{"k":"p","t":"7. Số lượng lao động dự kiến;"},{"k":"p","t":"8. Họ, tên, chữ ký, địa chỉ liên lạc, quốc tịch, thông tin giấy tờ pháp lý của cá nhân đối với chủ doanh nghiệp tư nhân và thành viên hợp danh của công ty hợp danh;"},{"k":"p","t":"9. Họ, tên, chữ ký, địa chỉ liên lạc, quốc tịch, thông tin giấy tờ pháp lý của cá nhân đối với người đại diện theo pháp luật của công ty trách nhiệm hữu hạn, công ty cổ phần."}]},{"id":"luat-59_24","no":24,"code":"Điều 24","title":"Điều 24. Điều lệ công ty","shortTitle":"Điều lệ công ty","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Điều lệ công ty bao gồm Điều lệ khi đăng ký doanh nghiệp và Điều lệ được sửa đổi, bổ sung trong quá trình hoạt động."},{"k":"p","t":"2. Điều lệ công ty bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính của công ty; tên, địa chỉ chi nhánh và văn phòng đại diện (nếu có);"},{"k":"p","t":"b) Ngành, nghề kinh doanh;"},{"k":"p","t":"c) Vốn điều lệ; tổng số cổ phần, loại cổ phần và mệnh giá từng loại cổ phần đối với công ty cổ phần;"},{"k":"p","t":"d) Họ, tên, địa chỉ liên lạc, quốc tịch của thành viên hợp danh đối với công ty hợp danh; của chủ sở hữu công ty, thành viên đối với công ty trách nhiệm hữu hạn; của cổ đông sáng lập đối với công ty cổ phần. Phần vốn góp và giá trị vốn góp của mỗi thành viên đối với công ty trách nhiệm hữu hạn và công ty hợp danh. Số cổ phần, loại cổ phần, mệnh giá từng loại cổ phần của cổ đông sáng lập đối với công ty cổ phần;"},{"k":"p","t":"đ) Quyền và nghĩa vụ của thành viên đối với công ty trách nhiệm hữu hạn, công ty hợp danh; của cổ đông đối với công ty cổ phần;"},{"k":"p","t":"e) Cơ cấu tổ chức quản lý;"},{"k":"p","t":"g) Số lượng, chức danh quản lý và quyền, nghĩa vụ của người đại diện theo pháp luật của doanh nghiệp; phân chia quyền và nghĩa vụ của người đại diện theo pháp luật trong trường hợp công ty có nhiều hơn một người đại diện theo pháp luật;"},{"k":"p","t":"h) Thể thức thông qua quyết định của công ty; nguyên tắc giải quyết tranh chấp nội bộ;"},{"k":"p","t":"i) Căn cứ và phương pháp xác định tiền lương, thù lao, thưởng của người quản lý và Kiểm soát viên;"},{"k":"p","t":"k) Trường hợp thành viên, cổ đông có quyền yêu cầu công ty mua lại phần vốn góp đối với công ty trách nhiệm hữu hạn hoặc cổ phần đối với công ty cổ phần;"},{"k":"p","t":"l) Nguyên tắc phân chia lợi nhuận sau thuế và xử lý lỗ trong kinh doanh;"},{"k":"p","t":"m) Trường hợp giải thể, trình tự giải thể và thủ tục thanh lý tài sản công ty;"},{"k":"p","t":"n) Thể thức sửa đổi, bổ sung Điều lệ công ty."},{"k":"p","t":"3. Điều lệ công ty khi đăng ký doanh nghiệp phải bao gồm họ, tên và chữ ký của những người sau đây:"},{"k":"p","t":"a) Thành viên hợp danh đối với công ty hợp danh;"},{"k":"p","t":"b) Chủ sở hữu công ty là cá nhân hoặc người đại diện theo pháp luật của chủ sở hữu công ty là tổ chức đối với công ty trách nhiệm hữu hạn một thành viên;"},{"k":"p","t":"c) Thành viên là cá nhân và người đại diện theo pháp luật hoặc người đại diện theo ủy quyền của thành viên là tổ chức đối với công ty trách nhiệm hữu hạn hai thành viên trở lên;"},{"k":"p","t":"d) Cổ đông sáng lập là cá nhân và người đại diện theo pháp luật hoặc người đại diện theo ủy quyền của cổ đông sáng lập là tổ chức đối với công ty cổ phần."},{"k":"p","t":"4. Điều lệ công ty được sửa đổi, bổ sung phải bao gồm họ, tên và chữ ký của những người sau đây:"},{"k":"p","t":"a) Chủ tịch Hội đồng thành viên đối với công ty hợp danh;"},{"k":"p","t":"b) Chủ sở hữu, người đại diện theo pháp luật của chủ sở hữu hoặc người đại diện theo pháp luật đối với công ty trách nhiệm hữu hạn một thành viên;"},{"k":"p","t":"c) Người đại diện theo pháp luật đối với công ty trách nhiệm hữu hạn hai thành viên trở lên và công ty cổ phần."}]},{"id":"luat-59_25","no":25,"code":"Điều 25","title":"Điều 25. Danh sách thành viên công ty trách nhiệm hữu hạn, công ty hợp danh, danh sách cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài đối với công ty cổ phần","shortTitle":"Danh sách thành viên công ty trách nhiệm hữu hạn, công ty hợp danh, danh sách cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài đối với công ty cổ phần","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Danh sách thành viên công ty trách nhiệm hữu hạn, công ty hợp danh, danh sách cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài đối với công ty cổ phần phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"1. Họ, tên, chữ ký, quốc tịch, địa chỉ liên lạc của thành viên là cá nhân đối với công ty trách nhiệm hữu hạn và công ty hợp danh; của cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài là cá nhân đối với công ty cổ phần;"},{"k":"p","t":"2. Tên, mã số doanh nghiệp và địa chỉ trụ sở chính của thành viên là tổ chức đối với công ty trách nhiệm hữu hạn và công ty hợp danh; của cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài là tổ chức đối với công ty cổ phần;"},{"k":"p","t":"3. Họ, tên, chữ ký, quốc tịch, địa chỉ liên lạc của người đại diện theo pháp luật hoặc người đại diện theo ủy quyền của thành viên là tổ chức đối với công ty trách nhiệm hữu hạn; của cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài là tổ chức đối với công ty cổ phần;"},{"k":"p","t":"4. Phần vốn góp, giá trị vốn góp, tỷ lệ sở hữu phần vốn góp, loại tài sản, số lượng tài sản, giá trị của từng loại tài sản góp vốn, thời hạn góp vốn của từng thành viên đối với công ty trách nhiệm hữu hạn, công ty hợp danh; số lượng cổ phần, loại cổ phần, tỷ lệ sở hữu cổ phần, loại tài sản, số lượng tài sản, giá trị của từng loại tài sản góp vốn, thời hạn góp vốn của từng cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài đối với công ty cổ phần."}]},{"id":"luat-59_26","no":26,"code":"Điều 26","title":"Điều 26. Trình tự, thủ tục đăng ký doanh nghiệp","shortTitle":"Trình tự, thủ tục đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Người thành lập doanh nghiệp hoặc người được ủy quyền thực hiện đăng ký doanh nghiệp với Cơ quan đăng ký kinh doanh theo phương thức sau đây:"},{"k":"p","t":"a) Đăng ký doanh nghiệp trực tiếp tại Cơ quan đăng ký kinh doanh;"},{"k":"p","t":"b) Đăng ký doanh nghiệp qua dịch vụ bưu chính;"},{"k":"p","t":"c) Đăng ký doanh nghiệp qua mạng thông tin điện tử."},{"k":"p","t":"2. Đăng ký doanh nghiệp qua mạng thông tin điện tử là việc người thành lập doanh nghiệp nộp hồ sơ đăng ký doanh nghiệp qua mạng thông tin điện tử tại Cổng thông tin quốc gia về đăng ký doanh nghiệp. Hồ sơ đăng ký doanh nghiệp qua mạng thông tin điện tử bao gồm các dữ liệu theo quy định của Luật này và được thể hiện dưới dạng văn bản điện tử. Hồ sơ đăng ký doanh nghiệp qua mạng thông tin điện tử có giá trị pháp lý tương đương hồ sơ đăng ký doanh nghiệp bằng bản giấy."},{"k":"p","t":"3. Tổ chức, cá nhân có quyền lựa chọn sử dụng chữ ký số theo quy định của pháp luật về giao dịch điện tử hoặc sử dụng tài khoản đăng ký kinh doanh để đăng ký doanh nghiệp qua mạng thông tin điện tử."},{"k":"p","t":"4. Tài khoản đăng ký kinh doanh là tài khoản được tạo bởi Hệ thống thông tin quốc gia về đăng ký doanh nghiệp, cấp cho cá nhân để thực hiện đăng ký doanh nghiệp qua mạng thông tin điện tử. Cá nhân được cấp tài khoản đăng ký kinh doanh chịu trách nhiệm trước pháp luật về việc đăng ký để được cấp và việc sử dụng tài khoản đăng ký kinh doanh để đăng ký doanh nghiệp qua mạng thông tin điện tử."},{"k":"p","t":"5. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ, Cơ quan đăng ký kinh doanh có trách nhiệm xem xét tính hợp lệ của hồ sơ đăng ký doanh nghiệp và cấp đăng ký doanh nghiệp; trường hợp hồ sơ chưa hợp lệ, Cơ quan đăng ký kinh doanh phải thông báo bằng văn bản nội dung cần sửa đổi, bổ sung cho người thành lập doanh nghiệp. Trường hợp từ chối đăng ký doanh nghiệp thì phải thông báo bằng văn bản cho người thành lập doanh nghiệp và nêu rõ lý do."},{"k":"p","t":"6. Chính phủ quy định về hồ sơ, trình tự, thủ tục, liên thông trong đăng ký doanh nghiệp."}]},{"id":"luat-59_27","no":27,"code":"Điều 27","title":"Điều 27. Cấp Giấy chứng nhận đăng ký doanh nghiệp","shortTitle":"Cấp Giấy chứng nhận đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp được cấp Giấy chứng nhận đăng ký doanh nghiệp khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Ngành, nghề đăng ký kinh doanh không bị cấm đầu tư kinh doanh;"},{"k":"p","t":"b) Tên của doanh nghiệp được đặt theo đúng quy định tại các điều 37, 38, 39 và 41 của Luật này;"},{"k":"p","t":"c) Có hồ sơ đăng ký doanh nghiệp hợp lệ;"},{"k":"p","t":"d) Nộp đủ lệ phí đăng ký doanh nghiệp theo quy định của pháp luật về phí và lệ phí."},{"k":"p","t":"2. Trường hợp Giấy chứng nhận đăng ký doanh nghiệp bị mất, bị hư hỏng hoặc bị hủy hoại dưới hình thức khác, doanh nghiệp được cấp lại Giấy chứng nhận đăng ký doanh nghiệp và phải nộp lệ phí theo quy định của pháp luật."}]},{"id":"luat-59_28","no":28,"code":"Điều 28","title":"Điều 28. Nội dung Giấy chứng nhận đăng ký doanh nghiệp","shortTitle":"Nội dung Giấy chứng nhận đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Giấy chứng nhận đăng ký doanh nghiệp bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"1. Tên doanh nghiệp và mã số doanh nghiệp;"},{"k":"p","t":"2. Địa chỉ trụ sở chính của doanh nghiệp;"},{"k":"p","t":"3. Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với người đại diện theo pháp luật của công ty trách nhiệm hữu hạn và công ty cổ phần; đối với thành viên hợp danh của công ty hợp danh; đối với chủ doanh nghiệp của doanh nghiệp tư nhân. Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân; tên, mã số doanh nghiệp và địa chỉ trụ sở chính của thành viên là tổ chức đối với công ty trách nhiệm hữu hạn;"},{"k":"p","t":"4. Vốn điều lệ đối với công ty, vốn đầu tư đối với doanh nghiệp tư nhân."}]},{"id":"luat-59_29","no":29,"code":"Điều 29","title":"Điều 29. Mã số doanh nghiệp","shortTitle":"Mã số doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Mã số doanh nghiệp là dãy số được tạo bởi Hệ thống thông tin quốc gia về đăng ký doanh nghiệp, được cấp cho doanh nghiệp khi thành lập và được ghi trên Giấy chứng nhận đăng ký doanh nghiệp. Mỗi doanh nghiệp có một mã số duy nhất và không được sử dụng lại để cấp cho doanh nghiệp khác."},{"k":"p","t":"2. Mã số doanh nghiệp được dùng để thực hiện nghĩa vụ về thuế, thủ tục hành chính và quyền, nghĩa vụ khác."}]},{"id":"luat-59_30","no":30,"code":"Điều 30","title":"Điều 30. Đăng ký thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp","shortTitle":"Đăng ký thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp phải đăng ký với Cơ quan đăng ký kinh doanh khi thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp quy định tại Điều 28 của Luật này."},{"k":"p","t":"2. Doanh nghiệp chịu trách nhiệm đăng ký thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp trong thời hạn 10 ngày kể từ ngày có thay đổi."},{"k":"p","t":"3. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ, Cơ quan đăng ký kinh doanh có trách nhiệm xem xét tính hợp lệ của hồ sơ và cấp Giấy chứng nhận đăng ký doanh nghiệp mới; trường hợp hồ sơ chưa hợp lệ, Cơ quan đăng ký kinh doanh phải thông báo bằng văn bản nội dung cần sửa đổi, bổ sung cho doanh nghiệp. Trường hợp từ chối cấp Giấy chứng nhận đăng ký doanh nghiệp mới thì phải thông báo bằng văn bản cho doanh nghiệp và nêu rõ lý do."},{"k":"p","t":"4. Đăng ký thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp theo quyết định của Tòa án hoặc Trọng tài thực hiện theo trình tự, thủ tục sau đây:"},{"k":"p","t":"a) Người đề nghị đăng ký thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp gửi đề nghị đăng ký thay đổi đến Cơ quan đăng ký kinh doanh có thẩm quyền trong thời hạn 15 ngày kể từ ngày bản án, quyết định của Tòa án có hiệu lực pháp luật hoặc phán quyết của Trọng tài có hiệu lực. Kèm theo hồ sơ đăng ký phải gồm bản sao bản án, quyết định của Tòa án đã có hiệu lực pháp luật hoặc phán quyết của Trọng tài có hiệu lực;"},{"k":"p","t":"b) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được đề nghị đăng ký quy định tại điểm a khoản này, Cơ quan đăng ký kinh doanh có trách nhiệm xem xét và cấp Giấy chứng nhận đăng ký doanh nghiệp mới theo nội dung bản án, quyết định của Tòa án đã có hiệu lực pháp luật hoặc phán quyết của Trọng tài có hiệu lực; trường hợp hồ sơ chưa hợp lệ, Cơ quan đăng ký kinh doanh phải thông báo bằng văn bản nội dung cần sửa đổi, bổ sung cho người đề nghị đăng ký thay đổi. Trường hợp từ chối cấp Giấy chứng nhận đăng ký doanh nghiệp mới thì phải thông báo bằng văn bản cho người đề nghị đăng ký thay đổi và nêu rõ lý do."},{"k":"p","t":"5. Chính phủ quy định về hồ sơ, trình tự, thủ tục đăng ký thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp."}]},{"id":"luat-59_31","no":31,"code":"Điều 31","title":"Điều 31. Thông báo thay đổi nội dung đăng ký doanh nghiệp","shortTitle":"Thông báo thay đổi nội dung đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp phải thông báo với Cơ quan đăng ký kinh doanh khi thay đổi một trong những nội dung sau đây:"},{"k":"p","t":"a) Ngành, nghề kinh doanh;"},{"k":"p","t":"b) Cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài đối với công ty cổ phần, trừ trường hợp đối với công ty niêm yết;"},{"k":"p","t":"c) Nội dung khác trong hồ sơ đăng ký doanh nghiệp."},{"k":"p","t":"2. Doanh nghiệp chịu trách nhiệm thông báo thay đổi nội dung đăng ký doanh nghiệp trong thời hạn 10 ngày kể từ ngày có thay đổi."},{"k":"p","t":"3. Công ty cổ phần phải thông báo bằng văn bản đến Cơ quan đăng ký kinh doanh nơi công ty đặt trụ sở chính trong thời hạn 10 ngày kể từ ngày có thay đổi đối với cổ đông là nhà đầu tư nước ngoài được đăng ký trong sổ đăng ký cổ đông của công ty. Thông báo phải bao gồm các nội dung sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính;"},{"k":"p","t":"b) Đối với cổ đông là nhà đầu tư nước ngoài chuyển nhượng cổ phần: tên, địa chỉ trụ sở chính của cổ đông là tổ chức; họ, tên, quốc tịch, địa chỉ liên lạc của cổ đông là cá nhân; số cổ phần, loại cổ phần và tỷ lệ sở hữu cổ phần hiện có của họ trong công ty; số cổ phần và loại cổ phần chuyển nhượng;"},{"k":"p","t":"c) Đối với cổ đông là nhà đầu tư nước ngoài nhận chuyển nhượng cổ phần: tên, địa chỉ trụ sở chính của cổ đông là tổ chức; họ, tên, quốc tịch, địa chỉ liên lạc của cổ đông là cá nhân; số cổ phần và loại cổ phần nhận chuyển nhượng; số cổ phần, loại cổ phần và tỷ lệ sở hữu cổ phần tương ứng của họ trong công ty;"},{"k":"p","t":"d) Họ, tên, chữ ký của người đại diện theo pháp luật của công ty."},{"k":"p","t":"4. Trong thời hạn 03 ngày làm việc kể từ ngày nhận được thông báo, Cơ quan đăng ký kinh doanh có trách nhiệm xem xét tính hợp lệ và thực hiện thay đổi nội dung đăng ký doanh nghiệp; trường hợp hồ sơ chưa hợp lệ, Cơ quan đăng ký kinh doanh phải thông báo bằng văn bản nội dung cần sửa đổi, bổ sung cho doanh nghiệp. Trường hợp từ chối sửa đổi, bổ sung thông tin theo nội dung thông báo thay đổi đăng ký doanh nghiệp thì phải thông báo bằng văn bản cho doanh nghiệp và nêu rõ lý do."},{"k":"p","t":"5. Thông báo thay đổi nội dung đăng ký doanh nghiệp theo quyết định của Tòa án hoặc Trọng tài thực hiện theo trình tự, thủ tục sau đây:"},{"k":"p","t":"a) Tổ chức, cá nhân đề nghị thay đổi nội dung đăng ký doanh nghiệp gửi thông báo thay đổi nội dung đăng ký đến Cơ quan đăng ký kinh doanh có thẩm quyền trong thời hạn 10 ngày kể từ ngày bản án, quyết định của Tòa án có hiệu lực pháp luật hoặc phán quyết của Trọng tài có hiệu lực. Kèm theo thông báo phải gồm bản sao bản án, quyết định của Tòa án có hiệu lực pháp luật hoặc phán quyết của Trọng tài có hiệu lực;"},{"k":"p","t":"b) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được thông báo, Cơ quan đăng ký kinh doanh có trách nhiệm xem xét và thực hiện thay đổi nội dung đăng ký doanh nghiệp theo nội dung bản án, quyết định của Tòa án có hiệu lực pháp luật hoặc phán quyết của Trọng tài có hiệu lực; trường hợp hồ sơ chưa hợp lệ, Cơ quan đăng ký kinh doanh phải thông báo bằng văn bản nội dung cần sửa đổi, bổ sung cho người đề nghị đăng ký thay đổi. Trường hợp từ chối sửa đổi, bổ sung thông tin theo nội dung thông báo thay đổi đăng ký doanh nghiệp thì phải thông báo bằng văn bản cho người đề nghị đăng ký thay đổi và nêu rõ lý do."}]},{"id":"luat-59_32","no":32,"code":"Điều 32","title":"Điều 32. Công bố nội dung đăng ký doanh nghiệp","shortTitle":"Công bố nội dung đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp sau khi được cấp Giấy chứng nhận đăng ký doanh nghiệp phải thông báo công khai trên Cổng thông tin quốc gia về đăng ký doanh nghiệp và phải nộp phí theo quy định của pháp luật. Nội dung công bố bao gồm các nội dung Giấy chứng nhận đăng ký doanh nghiệp và các thông tin sau đây:"},{"k":"p","t":"a) Ngành, nghề kinh doanh;"},{"k":"p","t":"b) Danh sách cổ đông sáng lập; danh sách cổ đông là nhà đầu tư nước ngoài đối với công ty cổ phần (nếu có)."},{"k":"p","t":"2. Trường hợp thay đổi nội dung đăng ký doanh nghiệp, những thay đổi tương ứng phải được thông báo công khai trên Cổng thông tin quốc gia về đăng ký doanh nghiệp."},{"k":"p","t":"3. Thời hạn thông báo công khai thông tin về doanh nghiệp quy định tại khoản 1 và khoản 2 Điều này là 30 ngày kể từ ngày được công khai."}]},{"id":"luat-59_33","no":33,"code":"Điều 33","title":"Điều 33. Cung cấp thông tin về nội dung đăng ký doanh nghiệp","shortTitle":"Cung cấp thông tin về nội dung đăng ký doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân có quyền đề nghị Cơ quan quản lý nhà nước về đăng ký kinh doanh và Cơ quan đăng ký kinh doanh cung cấp thông tin được lưu giữ trên Hệ thống thông tin quốc gia về đăng ký doanh nghiệp và phải nộp phí theo quy định của pháp luật."},{"k":"p","t":"2. Cơ quan quản lý nhà nước về đăng ký kinh doanh và Cơ quan đăng ký kinh doanh có nghĩa vụ cung cấp đầy đủ và kịp thời thông tin theo quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_34","no":34,"code":"Điều 34","title":"Điều 34. Tài sản góp vốn","shortTitle":"Tài sản góp vốn","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tài sản góp vốn là Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng, quyền sử dụng đất, quyền sở hữu trí tuệ, công nghệ, bí quyết kỹ thuật, tài sản khác có thể định giá được bằng Đồng Việt Nam."},{"k":"p","t":"2. Chỉ cá nhân, tổ chức là chủ sở hữu hợp pháp hoặc có quyền sử dụng hợp pháp đối với tài sản quy định tại khoản 1 Điều này mới có quyền sử dụng tài sản đó để góp vốn theo quy định của pháp luật."}]},{"id":"luat-59_35","no":35,"code":"Điều 35","title":"Điều 35. Chuyển quyền sở hữu tài sản góp vốn","shortTitle":"Chuyển quyền sở hữu tài sản góp vốn","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên công ty trách nhiệm hữu hạn, công ty hợp danh và cổ đông công ty cổ phần phải chuyển quyền sở hữu tài sản góp vốn cho công ty theo quy định sau đây:"},{"k":"p","t":"a) Đối với tài sản có đăng ký quyền sở hữu hoặc quyền sử dụng đất thì người góp vốn phải làm thủ tục chuyển quyền sở hữu tài sản đó hoặc quyền sử dụng đất cho công ty theo quy định của pháp luật. Việc chuyển quyền sở hữu, chuyển quyền sử dụng đất đối với tài sản góp vốn không phải chịu lệ phí trước bạ;"},{"k":"p","t":"b) Đối với tài sản không đăng ký quyền sở hữu, việc góp vốn phải được thực hiện bằng việc giao nhận tài sản góp vốn có xác nhận bằng biên bản, trừ trường hợp được thực hiện thông qua tài khoản."},{"k":"p","t":"2. Biên bản giao nhận tài sản góp vốn phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Họ, tên, địa chỉ liên lạc, số giấy tờ pháp lý của cá nhân, số giấy tờ pháp lý của tổ chức của người góp vốn;"},{"k":"p","t":"c) Loại tài sản và số đơn vị tài sản góp vốn; tổng giá trị tài sản góp vốn và tỷ lệ của tổng giá trị tài sản đó trong vốn điều lệ của công ty;"},{"k":"p","t":"d) Ngày giao nhận; chữ ký của người góp vốn hoặc người đại diện theo ủy quyền của người góp vốn và người đại diện theo pháp luật của công ty."},{"k":"p","t":"3. Việc góp vốn chỉ được coi là thanh toán xong khi quyền sở hữu hợp pháp đối với tài sản góp vốn đã chuyển sang công ty."},{"k":"p","t":"4. Tài sản được sử dụng vào hoạt động kinh doanh của chủ doanh nghiệp tư nhân không phải làm thủ tục chuyển quyền sở hữu cho doanh nghiệp."},{"k":"p","t":"5. Việc thanh toán đối với mọi hoạt động mua, bán, chuyển nhượng cổ phần và phần vốn góp, nhận cổ tức và chuyển lợi nhuận ra nước ngoài của nhà đầu tư nước ngoài đều phải được thực hiện thông qua tài khoản theo quy định của pháp luật về quản lý ngoại hối, trừ trường hợp thanh toán bằng tài sản và hình thức khác không bằng tiền mặt."}]},{"id":"luat-59_36","no":36,"code":"Điều 36","title":"Điều 36. Định giá tài sản góp vốn","shortTitle":"Định giá tài sản góp vốn","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tài sản góp vốn không phải là Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng phải được các thành viên, cổ đông sáng lập hoặc tổ chức thẩm định giá định giá và được thể hiện thành Đồng Việt Nam."},{"k":"p","t":"2. Tài sản góp vốn khi thành lập doanh nghiệp phải được các thành viên, cổ đông sáng lập định giá theo nguyên tắc đồng thuận hoặc do một tổ chức thẩm định giá định giá. Trường hợp tổ chức thẩm định giá định giá thì giá trị tài sản góp vốn phải được trên 50% số thành viên, cổ đông sáng lập chấp thuận."},{"k":"p","t":"Trường hợp tài sản góp vốn được định giá cao hơn so với giá trị thực tế của tài sản đó tại thời điểm góp vốn thì các thành viên, cổ đông sáng lập cùng liên đới góp thêm bằng số chênh lệch giữa giá trị được định giá và giá trị thực tế của tài sản góp vốn tại thời điểm kết thúc định giá; đồng thời liên đới chịu trách nhiệm đối với thiệt hại do cố ý định giá tài sản góp vốn cao hơn giá trị thực tế."},{"k":"p","t":"3. Tài sản góp vốn trong quá trình hoạt động do chủ sở hữu, Hội đồng thành viên đối với công ty trách nhiệm hữu hạn và công ty hợp danh, Hội đồng quản trị đối với công ty cổ phần và người góp vốn thỏa thuận định giá hoặc do một tổ chức thẩm định giá định giá. Trường hợp tổ chức thẩm định giá định giá thì giá trị tài sản góp vốn phải được người góp vốn và chủ sở hữu, Hội đồng thành viên hoặc Hội đồng quản trị chấp thuận."},{"k":"p","t":"Trường hợp tài sản góp vốn được định giá cao hơn giá trị thực tế của tài sản đó tại thời điểm góp vốn thì người góp vốn, chủ sở hữu, thành viên Hội đồng thành viên đối với công ty trách nhiệm hữu hạn và công ty hợp danh, thành viên Hội đồng quản trị đối với công ty cổ phần cùng liên đới góp thêm bằng số chênh lệch giữa giá trị được định giá và giá trị thực tế của tài sản góp vốn tại thời điểm kết thúc định giá; đồng thời liên đới chịu trách nhiệm đối với thiệt hại do việc cố ý định giá tài sản góp vốn cao hơn giá trị thực tế."}]},{"id":"luat-59_37","no":37,"code":"Điều 37","title":"Điều 37. Tên doanh nghiệp","shortTitle":"Tên doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tên tiếng Việt của doanh nghiệp bao gồm hai thành tố theo thứ tự sau đây:"},{"k":"p","t":"a) Loại hình doanh nghiệp;"},{"k":"p","t":"b) Tên riêng."},{"k":"p","t":"2. Loại hình doanh nghiệp được viết là “công ty trách nhiệm hữu hạn” hoặc “công ty TNHH” đối với công ty trách nhiệm hữu hạn; được viết là “công ty cổ phần” hoặc “công ty CP” đối với công ty cổ phần; được viết là “công ty hợp danh” hoặc “công ty HD” đối với công ty hợp danh; được viết là “doanh nghiệp tư nhân”, “DNTN” hoặc “doanh nghiệp TN” đối với doanh nghiệp tư nhân."},{"k":"p","t":"3. Tên riêng được viết bằng các chữ cái trong bảng chữ cái tiếng Việt, các chữ F, J, Z, W, chữ số và ký hiệu."},{"k":"p","t":"4. Tên doanh nghiệp phải được gắn tại trụ sở chính, chi nhánh, văn phòng đại diện, địa điểm kinh doanh của doanh nghiệp. Tên doanh nghiệp phải được in hoặc viết trên các giấy tờ giao dịch, hồ sơ tài liệu và ấn phẩm do doanh nghiệp phát hành."},{"k":"p","t":"5. Căn cứ vào quy định tại Điều này và các điều 38, 39 và 41 của Luật này, Cơ quan đăng ký kinh doanh có quyền từ chối chấp thuận tên dự kiến đăng ký của doanh nghiệp."}]},{"id":"luat-59_38","no":38,"code":"Điều 38","title":"Điều 38. Những điều cấm trong đặt tên doanh nghiệp","shortTitle":"Những điều cấm trong đặt tên doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Đặt tên trùng hoặc tên gây nhầm lẫn với tên của doanh nghiệp đã đăng ký được quy định tại Điều 41 của Luật này."},{"k":"p","t":"2. Sử dụng tên cơ quan nhà nước, đơn vị lực lượng vũ trang nhân dân, tên của tổ chức chính trị, tổ chức chính trị-xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp để làm toàn bộ hoặc một phần tên riêng của doanh nghiệp, trừ trường hợp có sự chấp thuận của cơ quan, đơn vị hoặc tổ chức đó."},{"k":"p","t":"3. Sử dụng từ ngữ, ký hiệu vi phạm truyền thống lịch sử, văn hóa, đạo đức và thuần phong mỹ tục của dân tộc."}]},{"id":"luat-59_39","no":39,"code":"Điều 39","title":"Điều 39. Tên doanh nghiệp bằng tiếng nước ngoài và tên viết tắt của doanh nghiệp","shortTitle":"Tên doanh nghiệp bằng tiếng nước ngoài và tên viết tắt của doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tên doanh nghiệp bằng tiếng nước ngoài là tên được dịch từ tên tiếng Việt sang một trong những tiếng nước ngoài hệ chữ La-tinh. Khi dịch sang tiếng nước ngoài, tên riêng của doanh nghiệp có thể giữ nguyên hoặc dịch theo nghĩa tương ứng sang tiếng nước ngoài."},{"k":"p","t":"2. Trường hợp doanh nghiệp có tên bằng tiếng nước ngoài, tên bằng tiếng nước ngoài của doanh nghiệp được in hoặc viết với khổ chữ nhỏ hơn tên tiếng Việt của doanh nghiệp tại trụ sở chính, chi nhánh, văn phòng đại diện, địa điểm kinh doanh của doanh nghiệp hoặc trên các giấy tờ giao dịch, hồ sơ tài liệu và ấn phẩm do doanh nghiệp phát hành."},{"k":"p","t":"3. Tên viết tắt của doanh nghiệp được viết tắt từ tên tiếng Việt hoặc tên bằng tiếng nước ngoài."}]},{"id":"luat-59_40","no":40,"code":"Điều 40","title":"Điều 40. Tên chi nhánh, văn phòng đại diện và địa điểm kinh doanh","shortTitle":"Tên chi nhánh, văn phòng đại diện và địa điểm kinh doanh","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tên chi nhánh, văn phòng đại diện, địa điểm kinh doanh phải được viết bằng các chữ cái trong bảng chữ cái tiếng Việt, các chữ cái F, J, Z, W, chữ số và các ký hiệu."},{"k":"p","t":"2. Tên chi nhánh, văn phòng đại diện, địa điểm kinh doanh phải bao gồm tên doanh nghiệp kèm theo cụm từ “Chi nhánh” đối với chi nhánh, cụm từ “Văn phòng đại diện” đối với văn phòng đại diện, cụm từ “Địa điểm kinh doanh” đối với địa điểm kinh doanh."},{"k":"p","t":"3. Tên chi nhánh, văn phòng đại diện, địa điểm kinh doanh phải được viết hoặc gắn tại trụ sở chi nhánh, văn phòng đại diện và địa điểm kinh doanh. Tên chi nhánh, văn phòng đại diện được in hoặc viết với khổ chữ nhỏ hơn tên tiếng Việt của doanh nghiệp trên các giấy tờ giao dịch, hồ sơ tài liệu và ấn phẩm do chi nhánh, văn phòng đại diện phát hành."}]},{"id":"luat-59_41","no":41,"code":"Điều 41","title":"Điều 41. Tên trùng và tên gây nhầm lẫn","shortTitle":"Tên trùng và tên gây nhầm lẫn","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tên trùng là tên tiếng Việt của doanh nghiệp đề nghị đăng ký được viết hoàn toàn giống với tên tiếng Việt của doanh nghiệp đã đăng ký."},{"k":"p","t":"2. Các trường hợp được coi là tên gây nhầm lẫn với tên của doanh nghiệp đã đăng ký bao gồm:"},{"k":"p","t":"a) Tên tiếng Việt của doanh nghiệp đề nghị đăng ký được đọc giống tên doanh nghiệp đã đăng ký;"},{"k":"p","t":"b) Tên viết tắt của doanh nghiệp đề nghị đăng ký trùng với tên viết tắt của doanh nghiệp đã đăng ký;"},{"k":"p","t":"c) Tên bằng tiếng nước ngoài của doanh nghiệp đề nghị đăng ký trùng với tên bằng tiếng nước ngoài của doanh nghiệp đã đăng ký;"},{"k":"p","t":"d) Tên riêng của doanh nghiệp đề nghị đăng ký chỉ khác với tên riêng của doanh nghiệp cùng loại đã đăng ký bởi một số tự nhiên, một số thứ tự hoặc một chữ cái trong bảng chữ cái tiếng Việt, chữ F, J, Z, W được viết liền hoặc cách ngay sau tên riêng của doanh nghiệp đó;"},{"k":"p","t":"đ) Tên riêng của doanh nghiệp đề nghị đăng ký chỉ khác với tên riêng của doanh nghiệp cùng loại đã đăng ký bởi một ký hiệu “&” hoặc “và”, “.”, “,”, “+”, “-”, “_”;"},{"k":"p","t":"e) Tên riêng của doanh nghiệp đề nghị đăng ký chỉ khác với tên riêng của doanh nghiệp cùng loại đã đăng ký bởi từ “tân” ngay trước hoặc từ “mới” được viết liền hoặc cách ngay sau hoặc trước tên riêng của doanh nghiệp đã đăng ký;"},{"k":"p","t":"g) Tên riêng của doanh nghiệp đề nghị đăng ký chỉ khác với tên riêng của doanh nghiệp cùng loại đã đăng ký bởi một cụm từ “miền Bắc”, “miền Nam”, “miền Trung”, “miền Tây”, “miền Đông”;"},{"k":"p","t":"h) Tên riêng của doanh nghiệp trùng với tên riêng của doanh nghiệp đã đăng ký."},{"k":"p","t":"3. Các trường hợp quy định tại các điểm d, đ, e, g và h khoản 2 Điều này không áp dụng đối với công ty con của công ty đã đăng ký."}]},{"id":"luat-59_42","no":42,"code":"Điều 42","title":"Điều 42. Trụ sở chính của doanh nghiệp","shortTitle":"Trụ sở chính của doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Trụ sở chính của doanh nghiệp đặt trên lãnh thổ Việt Nam, là địa chỉ liên lạc của doanh nghiệp và được xác định theo địa giới đơn vị hành chính; có số điện thoại, số fax và thư điện tử (nếu có)."}]},{"id":"luat-59_43","no":43,"code":"Điều 43","title":"Điều 43. Dấu của doanh nghiệp","shortTitle":"Dấu của doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Dấu bao gồm dấu được làm tại cơ sở khắc dấu hoặc dấu dưới hình thức chữ ký số theo quy định của pháp luật về giao dịch điện tử."},{"k":"p","t":"2. Doanh nghiệp quyết định loại dấu, số lượng, hình thức và nội dung dấu của doanh nghiệp, chi nhánh, văn phòng đại diện và đơn vị khác của doanh nghiệp."},{"k":"p","t":"3. Việc quản lý và lưu giữ dấu thực hiện theo quy định của Điều lệ công ty hoặc quy chế do doanh nghiệp, chi nhánh, văn phòng đại diện hoặc đơn vị khác của doanh nghiệp có dấu ban hành. Doanh nghiệp sử dụng dấu trong các giao dịch theo quy định của pháp luật."}]},{"id":"luat-59_44","no":44,"code":"Điều 44","title":"Điều 44. Chi nhánh, văn phòng đại diện và địa điểm kinh doanh của doanh nghiệp","shortTitle":"Chi nhánh, văn phòng đại diện và địa điểm kinh doanh của doanh nghiệp","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Chi nhánh là đơn vị phụ thuộc của doanh nghiệp, có nhiệm vụ thực hiện toàn bộ hoặc một phần chức năng của doanh nghiệp, bao gồm cả chức năng đại diện theo ủy quyền. Ngành, nghề kinh doanh của chi nhánh phải đúng với ngành, nghề kinh doanh của doanh nghiệp."},{"k":"p","t":"2. Văn phòng đại diện là đơn vị phụ thuộc của doanh nghiệp, có nhiệm vụ đại diện theo ủy quyền cho lợi ích của doanh nghiệp và bảo vệ các lợi ích đó. Văn phòng đại diện không thực hiện chức năng kinh doanh của doanh nghiệp."},{"k":"p","t":"3. Địa điểm kinh doanh là nơi doanh nghiệp tiến hành hoạt động kinh doanh cụ thể."}]},{"id":"luat-59_45","no":45,"code":"Điều 45","title":"Điều 45. Đăng ký hoạt động chi nhánh, văn phòng đại diện của doanh nghiệp; thông báo địa điểm kinh doanh","shortTitle":"Đăng ký hoạt động chi nhánh, văn phòng đại diện của doanh nghiệp; thông báo địa điểm kinh doanh","chuong":"Chương II — THÀNH LẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có quyền thành lập chi nhánh, văn phòng đại diện ở trong nước và nước ngoài. Doanh nghiệp có thể đặt một hoặc nhiều chi nhánh, văn phòng đại diện tại một địa phương theo địa giới đơn vị hành chính."},{"k":"p","t":"2. Trường hợp thành lập chi nhánh, văn phòng đại diện trong nước, doanh nghiệp gửi hồ sơ đăng ký hoạt động của chi nhánh, văn phòng đại diện đến Cơ quan đăng ký kinh doanh nơi doanh nghiệp đặt chi nhánh, văn phòng đại diện. Hồ sơ bao gồm:"},{"k":"p","t":"a) Thông báo thành lập chi nhánh, văn phòng đại diện;"},{"k":"p","t":"b) Bản sao quyết định thành lập và bản sao biên bản họp về việc thành lập chi nhánh, văn phòng đại diện của doanh nghiệp; bản sao giấy tờ pháp lý của cá nhân đối với người đứng đầu chi nhánh, văn phòng đại diện."},{"k":"p","t":"3. Trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ, Cơ quan đăng ký kinh doanh có trách nhiệm xem xét tính hợp lệ của hồ sơ và cấp Giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện; trường hợp hồ sơ chưa hợp lệ, Cơ quan đăng ký kinh doanh phải thông báo bằng văn bản nội dung cần sửa đổi, bổ sung cho doanh nghiệp. Trường hợp từ chối cấp Giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện thì phải thông báo bằng văn bản cho doanh nghiệp và nêu rõ lý do."},{"k":"p","t":"4. Doanh nghiệp chịu trách nhiệm đăng ký thay đổi nội dung Giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện trong thời hạn 10 ngày kể từ ngày có thay đổi."},{"k":"p","t":"5. Trong thời hạn 10 ngày kể từ ngày quyết định địa điểm kinh doanh, doanh nghiệp thông báo địa điểm kinh doanh đến Cơ quan đăng ký kinh doanh."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"CÔNG TY TRÁCH NHIỆM HỮU HẠN HAI THÀNH VIÊN TRỞ LÊN"}]},{"id":"luat-59_46","no":46,"code":"Điều 46","title":"Điều 46. Công ty trách nhiệm hữu hạn hai thành viên trở lên","shortTitle":"Công ty trách nhiệm hữu hạn hai thành viên trở lên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn hai thành viên trở lên là doanh nghiệp có từ 02 đến 50 thành viên là tổ chức, cá nhân. Thành viên chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của doanh nghiệp trong phạm vi số vốn đã góp vào doanh nghiệp, trừ trường hợp quy định tại khoản 4 Điều 47 của Luật này. Phần vốn góp của thành viên chỉ được chuyển nhượng theo quy định tại các điều 51, 52 và 53 của Luật này."},{"k":"p","t":"2. Công ty trách nhiệm hữu hạn hai thành viên trở lên có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp."},{"k":"p","t":"3. Công ty trách nhiệm hữu hạn hai thành viên trở lên không được phát hành cổ phần, trừ trường hợp để chuyển đổi thành công ty cổ phần."},{"k":"p","t":"4. Công ty trách nhiệm hữu hạn hai thành viên trở lên được phát hành trái phiếu theo quy định của Luật này và quy định khác của pháp luật có liên quan; việc phát hành trái phiếu riêng lẻ phải tuân thủ quy định tại Điều 128 và Điều 129 của Luật này."}]},{"id":"luat-59_47","no":47,"code":"Điều 47","title":"Điều 47. Góp vốn thành lập công ty và cấp giấy chứng nhận phần vốn góp","shortTitle":"Góp vốn thành lập công ty và cấp giấy chứng nhận phần vốn góp","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Vốn điều lệ của công ty trách nhiệm hữu hạn hai thành viên trở lên khi đăng ký thành lập doanh nghiệp là tổng giá trị phần vốn góp của các thành viên cam kết góp và ghi trong Điều lệ công ty."},{"k":"p","t":"2. Thành viên phải góp vốn cho công ty đủ và đúng loại tài sản đã cam kết khi đăng ký thành lập doanh nghiệp trong thời hạn 90 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp, không kể thời gian vận chuyển, nhập khẩu tài sản góp vốn, thực hiện thủ tục hành chính để chuyển quyền sở hữu tài sản. Trong thời hạn này, thành viên có các quyền và nghĩa vụ tương ứng với tỷ lệ phần vốn góp đã cam kết. Thành viên công ty chỉ được góp vốn cho công ty bằng loại tài sản khác với tài sản đã cam kết nếu được sự tán thành của trên 50% số thành viên còn lại."},{"k":"p","t":"3. Sau thời hạn quy định tại khoản 2 Điều này mà vẫn có thành viên chưa góp vốn hoặc chưa góp đủ phần vốn góp đã cam kết thì được xử lý như sau:"},{"k":"p","t":"a) Thành viên chưa góp vốn theo cam kết đương nhiên không còn là thành viên của công ty;"},{"k":"p","t":"b) Thành viên chưa góp đủ phần vốn góp đã cam kết có các quyền tương ứng với phần vốn góp đã góp;"},{"k":"p","t":"c) Phần vốn góp chưa góp của các thành viên được chào bán theo nghị quyết, quyết định của Hội đồng thành viên."},{"k":"p","t":"4. Trường hợp có thành viên chưa góp vốn hoặc chưa góp đủ số vốn đã cam kết, công ty phải đăng ký thay đổi vốn điều lệ, tỷ lệ phần vốn góp của các thành viên bằng số vốn đã góp trong thời hạn 30 ngày kể từ ngày cuối cùng phải góp đủ phần vốn góp theo quy định tại khoản 2 Điều này. Các thành viên chưa góp vốn hoặc chưa góp đủ số vốn đã cam kết phải chịu trách nhiệm tương ứng với tỷ lệ phần vốn góp đã cam kết đối với các nghĩa vụ tài chính của công ty phát sinh trong thời gian trước ngày công ty đăng ký thay đổi vốn điều lệ và tỷ lệ phần vốn góp của thành viên."},{"k":"p","t":"5. Trừ trường hợp quy định tại khoản 2 Điều này, người góp vốn trở thành thành viên của công ty kể từ thời điểm đã thanh toán phần vốn góp và những thông tin về người góp vốn quy định tại các điểm b, c và đ khoản 2 Điều 48 của Luật này được ghi đầy đủ vào sổ đăng ký thành viên. Tại thời điểm góp đủ phần vốn góp, công ty phải cấp giấy chứng nhận phần vốn góp cho thành viên tương ứng với giá trị phần vốn đã góp."},{"k":"p","t":"6. Giấy chứng nhận phần vốn góp phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Vốn điều lệ của công ty;"},{"k":"p","t":"c) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với thành viên là tổ chức;"},{"k":"p","t":"d) Phần vốn góp, tỷ lệ phần vốn góp của thành viên;"},{"k":"p","t":"đ) Số và ngày cấp giấy chứng nhận phần vốn góp;"},{"k":"p","t":"e) Họ, tên, chữ ký của người đại diện theo pháp luật của công ty."},{"k":"p","t":"7. Trường hợp giấy chứng nhận phần vốn góp bị mất, bị hư hỏng hoặc bị hủy hoại dưới hình thức khác, thành viên được công ty cấp lại giấy chứng nhận phần vốn góp theo trình tự, thủ tục quy định tại Điều lệ công ty."}]},{"id":"luat-59_48","no":48,"code":"Điều 48","title":"Điều 48. Sổ đăng ký thành viên","shortTitle":"Sổ đăng ký thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Công ty phải lập sổ đăng ký thành viên ngay sau khi được cấp Giấy chứng nhận đăng ký doanh nghiệp. Sổ đăng ký thành viên có thể là văn bản giấy, tập hợp dữ liệu điện tử ghi nhận thông tin sở hữu phần vốn góp của các thành viên công ty."},{"k":"p","t":"2. Sổ đăng ký thành viên phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với thành viên là tổ chức;"},{"k":"p","t":"c) Phần vốn góp, tỷ lệ phần vốn góp đã góp, thời điểm góp vốn, loại tài sản góp vốn, số lượng, giá trị của từng loại tài sản góp vốn của từng thành viên;"},{"k":"p","t":"d) Chữ ký của thành viên là cá nhân, người đại diện theo pháp luật của thành viên là tổ chức;"},{"k":"p","t":"đ) Số và ngày cấp giấy chứng nhận phần vốn góp của từng thành viên."},{"k":"p","t":"3. Công ty phải cập nhật kịp thời thay đổi thành viên trong sổ đăng ký thành viên theo yêu cầu của thành viên có liên quan theo quy định tại Điều lệ công ty."},{"k":"p","t":"4. Sổ đăng ký thành viên được lưu giữ tại trụ sở chính của công ty."}]},{"id":"luat-59_49","no":49,"code":"Điều 49","title":"Điều 49. Quyền của thành viên Hội đồng thành viên","shortTitle":"Quyền của thành viên Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thành viên Hội đồng thành viên có các quyền sau đây:"},{"k":"p","t":"a) Tham dự họp Hội đồng thành viên, thảo luận, kiến nghị, biểu quyết các vấn đề thuộc thẩm quyền của Hội đồng thành viên;"},{"k":"p","t":"b) Có số phiếu biểu quyết tương ứng với phần vốn góp, trừ trường hợp quy định tại khoản 2 Điều 47 của Luật này;"},{"k":"p","t":"c) Được chia lợi nhuận tương ứng với phần vốn góp sau khi công ty đã nộp đủ thuế và hoàn thành các nghĩa vụ tài chính khác theo quy định của pháp luật;"},{"k":"p","t":"d) Được chia giá trị tài sản còn lại của công ty tương ứng với phần vốn góp khi cô
