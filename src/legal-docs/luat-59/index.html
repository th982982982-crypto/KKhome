ng ty giải thể hoặc phá sản;"},{"k":"p","t":"đ) Được ưu tiên góp thêm vốn vào công ty khi công ty tăng vốn điều lệ;"},{"k":"p","t":"e) Định đoạt phần vốn góp của mình bằng cách chuyển nhượng một phần hoặc toàn bộ, tặng cho và hình thức khác theo quy định của pháp luật và Điều lệ công ty;"},{"k":"p","t":"g) Tự mình hoặc nhân danh công ty khởi kiện trách nhiệm dân sự đối với Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc, người đại diện theo pháp luật và người quản lý khác theo quy định tại Điều 72 của Luật này;"},{"k":"p","t":"h) Quyền khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"2. Ngoài các quyền quy định tại khoản 1 Điều này, thành viên, nhóm thành viên sở hữu từ 10% số vốn điều lệ trở lên hoặc một tỷ lệ khác nhỏ hơn do Điều lệ công ty quy định hoặc thuộc trường hợp quy định tại khoản 3 Điều này có các quyền sau đây:"},{"k":"p","t":"a) Yêu cầu triệu tập họp Hội đồng thành viên để giải quyết những vấn đề thuộc thẩm quyền;"},{"k":"p","t":"b) Kiểm tra, xem xét, tra cứu sổ ghi chép và theo dõi các giao dịch, sổ kế toán, báo cáo tài chính hằng năm;"},{"k":"p","t":"c) Kiểm tra, xem xét, tra cứu và sao chụp sổ đăng ký thành viên, biên bản họp, nghị quyết, quyết định của Hội đồng thành viên và tài liệu khác của công ty;"},{"k":"p","t":"d) Yêu cầu Tòa án hủy bỏ nghị quyết, quyết định của Hội đồng thành viên trong thời hạn 90 ngày kể từ ngày kết thúc họp Hội đồng thành viên, nếu trình tự, thủ tục, điều kiện cuộc họp hoặc nội dung nghị quyết, quyết định đó không thực hiện đúng hoặc không phù hợp với quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"3. Trường hợp công ty có một thành viên sở hữu trên 90% vốn điều lệ và Điều lệ công ty không quy định một tỷ lệ khác nhỏ hơn theo quy định tại khoản 2 Điều này thì nhóm thành viên còn lại đương nhiên có quyền theo quy định tại khoản 2 Điều này."}]},{"id":"luat-59_50","no":50,"code":"Điều 50","title":"Điều 50. Nghĩa vụ của thành viên Hội đồng thành viên","shortTitle":"Nghĩa vụ của thành viên Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Góp đủ, đúng hạn số vốn đã cam kết, chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi số vốn đã góp vào công ty, trừ trường hợp quy định tại khoản 2 và khoản 4 Điều 47 của Luật này."},{"k":"p","t":"2. Không được rút vốn đã góp ra khỏi công ty dưới mọi hình thức, trừ trường hợp quy định tại các điều 51, 52, 53 và 68 của Luật này."},{"k":"p","t":"3. Tuân thủ Điều lệ công ty."},{"k":"p","t":"4. Chấp hành nghị quyết, quyết định của Hội đồng thành viên."},{"k":"p","t":"5. Chịu trách nhiệm cá nhân khi nhân danh công ty để thực hiện các hành vi sau đây:"},{"k":"p","t":"a) Vi phạm pháp luật;"},{"k":"p","t":"b) Tiến hành kinh doanh hoặc giao dịch khác không nhằm phục vụ lợi ích của công ty và gây thiệt hại cho người khác;"},{"k":"p","t":"c) Thanh toán khoản nợ chưa đến hạn trước nguy cơ tài chính có thể xảy ra đối với công ty."},{"k":"p","t":"6. Nghĩa vụ khác theo quy định của Luật này."}]},{"id":"luat-59_51","no":51,"code":"Điều 51","title":"Điều 51. Mua lại phần vốn góp","shortTitle":"Mua lại phần vốn góp","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thành viên có quyền yêu cầu công ty mua lại phần vốn góp của mình nếu thành viên đó đã bỏ phiếu không tán thành đối với nghị quyết, quyết định của Hội đồng thành viên về vấn đề sau đây:"},{"k":"p","t":"a) Sửa đổi, bổ sung các nội dung trong Điều lệ công ty liên quan đến quyền và nghĩa vụ của thành viên, Hội đồng thành viên;"},{"k":"p","t":"b) Tổ chức lại công ty;"},{"k":"p","t":"c) Trường hợp khác theo quy định tại Điều lệ công ty."},{"k":"p","t":"2. Yêu cầu mua lại phần vốn góp phải bằng văn bản và được gửi đến công ty trong thời hạn 15 ngày kể từ ngày thông qua nghị quyết, quyết định quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Trong thời hạn 15 ngày kể từ ngày nhận được yêu cầu của thành viên quy định tại khoản 1 Điều này thì công ty phải mua lại phần vốn góp của thành viên đó theo giá thị trường hoặc giá được xác định theo nguyên tắc quy định tại Điều lệ công ty, trừ trường hợp hai bên thỏa thuận được về giá. Việc thanh toán chỉ được thực hiện nếu sau khi thanh toán đủ phần vốn góp được mua lại, công ty vẫn thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác."},{"k":"p","t":"4. Trường hợp công ty không thanh toán được phần vốn góp được yêu cầu mua lại theo quy định tại khoản 3 Điều này thì thành viên đó có quyền tự do chuyển nhượng phần vốn góp của mình cho thành viên khác hoặc người không phải là thành viên công ty."}]},{"id":"luat-59_52","no":52,"code":"Điều 52","title":"Điều 52. Chuyển nhượng phần vốn góp","shortTitle":"Chuyển nhượng phần vốn góp","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trừ trường hợp quy định tại khoản 4 Điều 51, khoản 6 và khoản 7 Điều 53 của Luật này, thành viên công ty trách nhiệm hữu hạn hai thành viên trở lên có quyền chuyển nhượng một phần hoặc toàn bộ phần vốn góp của mình cho người khác theo quy định sau đây:"},{"k":"p","t":"a) Chào bán phần vốn góp đó cho các thành viên còn lại theo tỷ lệ tương ứng với phần vốn góp của họ trong công ty với cùng điều kiện chào bán;"},{"k":"p","t":"b) Chuyển nhượng với cùng điều kiện chào bán đối với các thành viên còn lại quy định tại điểm a khoản này cho người không phải là thành viên nếu các thành viên còn lại của công ty không mua hoặc không mua hết trong thời hạn 30 ngày kể từ ngày chào bán."},{"k":"p","t":"2. Thành viên chuyển nhượng vẫn có các quyền và nghĩa vụ đối với công ty tương ứng với phần vốn góp có liên quan cho đến khi thông tin về người mua quy định tại các điểm b, c và đ khoản 2 Điều 48 của Luật này được ghi đầy đủ vào sổ đăng ký thành viên."},{"k":"p","t":"3. Trường hợp chuyển nhượng hoặc thay đổi phần vốn góp của các thành viên dẫn đến chỉ còn một thành viên công ty thì công ty phải tổ chức quản lý theo loại hình công ty trách nhiệm hữu hạn một thành viên và thực hiện đăng ký thay đổi nội dung đăng ký doanh nghiệp trong thời hạn 15 ngày kể từ ngày hoàn thành việc chuyển nhượng."}]},{"id":"luat-59_53","no":53,"code":"Điều 53","title":"Điều 53. Xử lý phần vốn góp trong một số trường hợp đặc biệt","shortTitle":"Xử lý phần vốn góp trong một số trường hợp đặc biệt","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trường hợp thành viên công ty là cá nhân chết thì người thừa kế theo di chúc hoặc theo pháp luật của thành viên đó là thành viên công ty."},{"k":"p","t":"2. Trường hợp thành viên là cá nhân bị Tòa án tuyên bố mất tích thì quyền và nghĩa vụ của thành viên được thực hiện thông qua người quản lý tài sản của thành viên đó theo quy định của pháp luật về dân sự."},{"k":"p","t":"3. Trường hợp thành viên bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi thì quyền và nghĩa vụ của thành viên đó trong công ty được thực hiện thông qua người đại diện."},{"k":"p","t":"4. Phần vốn góp của thành viên được công ty mua lại hoặc chuyển nhượng theo quy định tại Điều 51 và Điều 52 của Luật này trong các trường hợp sau đây:"},{"k":"p","t":"a) Người thừa kế không muốn trở thành thành viên;"},{"k":"p","t":"b) Người được tặng cho theo quy định tại khoản 6 Điều này không được Hội đồng thành viên chấp thuận làm thành viên;"},{"k":"p","t":"c) Thành viên công ty là tổ chức giải thể hoặc phá sản."},{"k":"p","t":"5. Trường hợp phần vốn góp của thành viên công ty là cá nhân chết mà không có người thừa kế, người thừa kế từ chối nhận thừa kế hoặc bị truất quyền thừa kế thì phần vốn góp đó được giải quyết theo quy định của pháp luật về dân sự."},{"k":"p","t":"6. Trường hợp thành viên tặng cho một phần hoặc toàn bộ phần vốn góp của mình tại công ty cho người khác thì người được tặng cho trở thành thành viên công ty theo quy định sau đây:"},{"k":"p","t":"a) Người được tặng cho thuộc đối tượng thừa kế theo pháp luật theo quy định của Bộ luật Dân sự thì người này đương nhiên là thành viên công ty;"},{"k":"p","t":"b) Người được tặng cho không thuộc đối tượng quy định tại điểm a khoản này thì người này chỉ trở thành thành viên công ty khi được Hội đồng thành viên chấp thuận."},{"k":"p","t":"7. Trường hợp thành viên sử dụng phần vốn góp để trả nợ thì người nhận thanh toán có quyền sử dụng phần vốn góp đó theo một trong hai hình thức sau đây:"},{"k":"p","t":"a) Trở thành thành viên công ty nếu được Hội đồng thành viên chấp thuận;"},{"k":"p","t":"b) Chào bán và chuyển nhượng phần vốn góp đó theo quy định tại Điều 52 của Luật này."},{"k":"p","t":"8. Trường hợp thành viên công ty là cá nhân bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc thì thành viên đó ủy quyền cho người khác thực hiện một số hoặc tất cả quyền và nghĩa vụ của mình tại công ty."},{"k":"p","t":"9. Trường hợp thành viên công ty là cá nhân bị Tòa án cấm hành nghề, làm công việc nhất định hoặc thành viên công ty là pháp nhân thương mại bị Tòa án cấm kinh doanh, cấm hoạt động trong một số lĩnh vực nhất định thuộc phạm vi ngành, nghề kinh doanh của công ty thì thành viên đó không được hành nghề, làm công việc đã bị cấm tại công ty đó hoặc công ty tạm ngừng, chấm dứt kinh doanh ngành, nghề có liên quan theo quyết định của Tòa án."}]},{"id":"luat-59_54","no":54,"code":"Điều 54","title":"Điều 54. Cơ cấu tổ chức quản lý công ty","shortTitle":"Cơ cấu tổ chức quản lý công ty","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn hai thành viên trở lên có Hội đồng thành viên, Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"2. Công ty trách nhiệm hữu hạn hai thành viên trở lên là doanh nghiệp nhà nước theo quy định tại điểm b khoản 1 Điều 88 của Luật này và công ty con của doanh nghiệp nhà nước theo quy định tại khoản 1 Điều 88 của Luật này phải thành lập Ban kiểm soát; các trường hợp khác do công ty quyết định."},{"k":"p","t":"3. Công ty phải có ít nhất một người đại diện theo pháp luật là người giữ một trong các chức danh là Chủ tịch Hội đồng thành viên hoặc Giám đốc hoặc Tổng giám đốc. Trường hợp Điều lệ công ty không quy định thì Chủ tịch Hội đồng thành viên là người đại diện theo pháp luật của công ty."}]},{"id":"luat-59_55","no":55,"code":"Điều 55","title":"Điều 55. Hội đồng thành viên","shortTitle":"Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên là cơ quan quyết định cao nhất của công ty, bao gồm tất cả thành viên công ty là cá nhân và người đại diện theo ủy quyền của thành viên công ty là tổ chức. Điều lệ công ty quy định kỳ họp Hội đồng thành viên, nhưng ít nhất mỗi năm phải họp một lần."},{"k":"p","t":"2. Hội đồng thành viên có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Quyết định chiến lược phát triển và kế hoạch kinh doanh hằng năm của công ty;"},{"k":"p","t":"b) Quyết định tăng hoặc giảm vốn điều lệ, quyết định thời điểm và phương thức huy động thêm vốn; quyết định phát hành trái phiếu;"},{"k":"p","t":"c) Quyết định dự án đầu tư phát triển của công ty; giải pháp phát triển thị trường, tiếp thị và chuyển giao công nghệ;"},{"k":"p","t":"d) Thông qua hợp đồng vay, cho vay, bán tài sản và hợp đồng khác do Điều lệ công ty quy định có giá trị từ 50% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính tại thời điểm công bố gần nhất của công ty hoặc một tỷ lệ hoặc giá trị khác nhỏ hơn quy định tại Điều lệ công ty;"},{"k":"p","t":"đ) Bầu, miễn nhiệm, bãi nhiệm Chủ tịch Hội đồng thành viên; quyết định bổ nhiệm, miễn nhiệm, bãi nhiệm, ký và chấm dứt hợp đồng đối với Giám đốc hoặc Tổng giám đốc, Kế toán trưởng, Kiểm soát viên và người quản lý khác quy định tại Điều lệ công ty;"},{"k":"p","t":"e) Quyết định mức lương, thù lao, thưởng và lợi ích khác đối với Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc, Kế toán trưởng và người quản lý khác quy định tại Điều lệ công ty;"},{"k":"p","t":"g) Thông qua báo cáo tài chính hằng năm, phương án sử dụng và phân chia lợi nhuận hoặc phương án xử lý lỗ của công ty;"},{"k":"p","t":"h) Quyết định cơ cấu tổ chức quản lý công ty;"},{"k":"p","t":"i) Quyết định thành lập công ty con, chi nhánh, văn phòng đại diện;"},{"k":"p","t":"k) Sửa đổi, bổ sung Điều lệ công ty;"},{"k":"p","t":"l) Quyết định tổ chức lại công ty;"},{"k":"p","t":"m) Quyết định giải thể hoặc yêu cầu phá sản công ty;"},{"k":"p","t":"n) Quyền và nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_56","no":56,"code":"Điều 56","title":"Điều 56. Chủ tịch Hội đồng thành viên","shortTitle":"Chủ tịch Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên bầu một thành viên làm Chủ tịch. Chủ tịch Hội đồng thành viên có thể kiêm Giám đốc hoặc Tổng giám đốc công ty."},{"k":"p","t":"2. Chủ tịch Hội đồng thành viên có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Chuẩn bị chương trình, kế hoạch hoạt động của Hội đồng thành viên;"},{"k":"p","t":"b) Chuẩn bị chương trình, nội dung, tài liệu họp Hội đồng thành viên hoặc để lấy ý kiến các thành viên;"},{"k":"p","t":"c) Triệu tập, chủ trì và làm chủ tọa cuộc họp Hội đồng thành viên hoặc tổ chức việc lấy ý kiến các thành viên;"},{"k":"p","t":"d) Giám sát hoặc tổ chức giám sát việc thực hiện nghị quyết, quyết định của Hội đồng thành viên;"},{"k":"p","t":"đ) Thay mặt Hội đồng thành viên ký nghị quyết, quyết định của Hội đồng thành viên;"},{"k":"p","t":"e) Quyền và nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"3. Nhiệm kỳ của Chủ tịch Hội đồng thành viên do Điều lệ công ty quy định nhưng không quá 05 năm và có thể được bầu lại với số nhiệm kỳ không hạn chế."},{"k":"p","t":"4. Trường hợp Chủ tịch Hội đồng thành viên vắng mặt hoặc không thể thực hiện các quyền và nghĩa vụ của mình thì phải ủy quyền bằng văn bản cho một thành viên thực hiện các quyền và nghĩa vụ của Chủ tịch Hội đồng thành viên theo nguyên tắc quy định tại Điều lệ công ty. Trường hợp không có thành viên được ủy quyền hoặc Chủ tịch Hội đồng thành viên chết, mất tích, bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc, trốn khỏi nơi cư trú, bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi, bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định thì một trong số các thành viên Hội đồng thành viên triệu tập họp các thành viên còn lại bầu một người trong số các thành viên tạm thời làm Chủ tịch Hội đồng thành viên theo nguyên tắc đa số thành viên còn lại tán thành cho đến khi có quyết định mới của Hội đồng thành viên."}]},{"id":"luat-59_57","no":57,"code":"Điều 57","title":"Điều 57. Triệu tập họp Hội đồng thành viên","shortTitle":"Triệu tập họp Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên được triệu tập họp theo yêu cầu của Chủ tịch Hội đồng thành viên hoặc theo yêu cầu của thành viên hoặc nhóm thành viên quy định tại khoản 2 và khoản 3 Điều 49 của Luật này. Trường hợp Chủ tịch Hội đồng thành viên không triệu tập họp Hội đồng thành viên theo yêu cầu của thành viên, nhóm thành viên trong thời hạn 15 ngày kể từ ngày nhận được yêu cầu thì thành viên, nhóm thành viên đó triệu tập họp Hội đồng thành viên. Chi phí hợp lý cho việc triệu tập và tiến hành họp Hội đồng thành viên sẽ được công ty hoàn lại."},{"k":"p","t":"2. Chủ tịch Hội đồng thành viên hoặc người triệu tập họp chuẩn bị chương trình, nội dung tài liệu họp, triệu tập, chủ trì và làm chủ tọa cuộc họp Hội đồng thành viên. Thành viên có quyền kiến nghị bổ sung nội dung chương trình họp bằng văn bản. Kiến nghị phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với thành viên là tổ chức; họ, tên, chữ ký của thành viên kiến nghị hoặc người đại diện theo ủy quyền của họ;"},{"k":"p","t":"b) Tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp;"},{"k":"p","t":"c) Nội dung kiến nghị đưa vào chương trình họp;"},{"k":"p","t":"d) Lý do kiến nghị."},{"k":"p","t":"3. Chủ tịch Hội đồng thành viên hoặc người triệu tập họp phải chấp thuận kiến nghị và bổ sung chương trình họp Hội đồng thành viên nếu kiến nghị có đủ nội dung theo quy định tại khoản 2 Điều này và được gửi đến trụ sở chính của công ty chậm nhất là 01 ngày làm việc trước ngày họp Hội đồng thành viên; trường hợp kiến nghị được trình ngay trước khi bắt đầu họp thì kiến nghị được chấp thuận nếu đa số các thành viên dự họp tán thành."},{"k":"p","t":"4. Thông báo mời họp Hội đồng thành viên có thể gửi bằng giấy mời, điện thoại, fax, phương tiện điện tử hoặc phương thức khác do Điều lệ công ty quy định và được gửi trực tiếp đến từng thành viên Hội đồng thành viên. Nội dung thông báo mời họp phải xác định rõ thời gian, địa điểm và chương trình họp."},{"k":"p","t":"5. Chương trình và tài liệu họp phải được gửi cho thành viên công ty trước khi họp. Tài liệu sử dụng trong cuộc họp liên quan đến quyết định về sửa đổi, bổ sung Điều lệ công ty, thông qua chiến lược phát triển công ty, thông qua báo cáo tài chính hằng năm, tổ chức lại hoặc giải thể công ty phải được gửi đến các thành viên chậm nhất là 07 ngày làm việc trước ngày họp. Thời hạn gửi các tài liệu khác do Điều lệ công ty quy định."},{"k":"p","t":"6. Trường hợp Điều lệ công ty không quy định thì yêu cầu triệu tập họp Hội đồng thành viên theo quy định tại khoản 1 Điều này phải bằng văn bản và bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với thành viên là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với thành viên là tổ chức; tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của từng thành viên yêu cầu;"},{"k":"p","t":"b) Lý do yêu cầu triệu tập họp Hội đồng thành viên và vấn đề cần giải quyết;"},{"k":"p","t":"c) Dự kiến chương trình họp;"},{"k":"p","t":"d) Họ, tên, chữ ký của từng thành viên yêu cầu hoặc người đại diện theo ủy quyền của họ."},{"k":"p","t":"7. Trường hợp yêu cầu triệu tập họp Hội đồng thành viên không có đủ nội dung theo quy định tại khoản 6 Điều này thì Chủ tịch Hội đồng thành viên phải thông báo bằng văn bản về việc không triệu tập họp Hội đồng thành viên cho thành viên, nhóm thành viên có liên quan biết trong thời hạn 07 ngày làm việc kể từ ngày nhận được yêu cầu. Trong các trường hợp khác, Chủ tịch Hội đồng thành viên phải triệu tập họp Hội đồng thành viên trong thời hạn 15 ngày kể từ ngày nhận được yêu cầu."},{"k":"p","t":"8. Trường hợp Chủ tịch Hội đồng thành viên không triệu tập họp Hội đồng thành viên theo quy định tại khoản 7 Điều này thì phải chịu trách nhiệm cá nhân về thiệt hại xảy ra đối với công ty và thành viên công ty có liên quan."}]},{"id":"luat-59_58","no":58,"code":"Điều 58","title":"Điều 58. Điều kiện và thể thức tiến hành họp Hội đồng thành viên","shortTitle":"Điều kiện và thể thức tiến hành họp Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Cuộc họp Hội đồng thành viên được tiến hành khi có số thành viên dự họp sở hữu từ 65% vốn điều lệ trở lên; tỷ lệ cụ thể do Điều lệ công ty quy định."},{"k":"p","t":"2. Trường hợp cuộc họp Hội đồng thành viên lần thứ nhất không đủ điều kiện tiến hành theo quy định tại khoản 1 Điều này và Điều lệ công ty không có quy định khác thì việc triệu tập họp Hội đồng thành viên được thực hiện như sau:"},{"k":"p","t":"a) Thông báo mời họp lần thứ hai phải được gửi trong thời hạn 15 ngày kể từ ngày dự định họp lần thứ nhất. Cuộc họp Hội đồng thành viên lần thứ hai được tiến hành khi có số thành viên dự họp sở hữu từ 50% vốn điều lệ trở lên;"},{"k":"p","t":"b) Trường hợp cuộc họp Hội đồng thành viên lần thứ hai không đủ điều kiện tiến hành theo quy định tại điểm a khoản này, thông báo mời họp lần thứ ba phải được gửi trong thời hạn 10 ngày kể từ ngày dự định họp lần thứ hai. Cuộc họp Hội đồng thành viên lần thứ ba được tiến hành không phụ thuộc số thành viên dự họp và số vốn điều lệ được đại diện bởi số thành viên dự họp."},{"k":"p","t":"3. Thành viên, người đại diện theo ủy quyền của thành viên phải tham dự và biểu quyết tại cuộc họp Hội đồng thành viên. Thể thức tiến hành họp Hội đồng thành viên, hình thức biểu quyết do Điều lệ công ty quy định."},{"k":"p","t":"4. Trường hợp cuộc họp đủ điều kiện quy định tại Điều này không hoàn thành chương trình họp trong thời hạn dự kiến thì có thể kéo dài nhưng không được quá 30 ngày kể từ ngày khai mạc cuộc họp đó."}]},{"id":"luat-59_59","no":59,"code":"Điều 59","title":"Điều 59. Nghị quyết, quyết định của Hội đồng thành viên","shortTitle":"Nghị quyết, quyết định của Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên thông qua nghị quyết, quyết định thuộc thẩm quyền bằng biểu quyết tại cuộc họp, lấy ý kiến bằng văn bản hoặc hình thức khác do Điều lệ công ty quy định."},{"k":"p","t":"2. Trường hợp Điều lệ công ty không có quy định khác thì nghị quyết, quyết định về các vấn đề sau đây phải được thông qua bằng biểu quyết tại cuộc họp Hội đồng thành viên:"},{"k":"p","t":"a) Sửa đổi, bổ sung nội dung Điều lệ công ty;"},{"k":"p","t":"b) Quyết định phương hướng phát triển công ty;"},{"k":"p","t":"c) Bầu, miễn nhiệm, bãi nhiệm Chủ tịch Hội đồng thành viên; bổ nhiệm, miễn nhiệm, bãi nhiệm Giám đốc hoặc Tổng giám đốc;"},{"k":"p","t":"d) Thông qua báo cáo tài chính hằng năm;"},{"k":"p","t":"đ) Tổ chức lại, giải thể công ty."},{"k":"p","t":"3. Trường hợp Điều lệ công ty không có quy định một tỷ lệ khác, nghị quyết, quyết định của Hội đồng thành viên được thông qua tại cuộc họp trong trường hợp sau đây:"},{"k":"p","t":"a) Được các thành viên dự họp sở hữu từ 65% tổng số vốn góp của tất cả thành viên dự họp trở lên tán thành, trừ trường hợp quy định tại điểm b khoản này;"},{"k":"p","t":"b) Được các thành viên dự họp sở hữu từ 75% tổng số vốn góp của tất cả thành viên dự họp trở lên tán thành đối với nghị quyết, quyết định bán tài sản có giá trị từ 50% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty hoặc một tỷ lệ hoặc giá trị khác nhỏ hơn quy định tại Điều lệ công ty; sửa đổi, bổ sung Điều lệ công ty; tổ chức lại, giải thể công ty."},{"k":"p","t":"4. Thành viên được coi là tham dự và biểu quyết tại cuộc họp Hội đồng thành viên trong trường hợp sau đây:"},{"k":"p","t":"a) Tham dự và biểu quyết trực tiếp tại cuộc họp;"},{"k":"p","t":"b) Ủy quyền cho người khác tham dự và biểu quyết tại cuộc họp;"},{"k":"p","t":"c) Tham dự và biểu quyết thông qua cuộc họp trực tuyến, bỏ phiếu điện tử hoặc hình thức điện tử khác;"},{"k":"p","t":"d) Gửi phiếu biểu quyết đến cuộc họp thông qua thư, fax, thư điện tử."},{"k":"p","t":"5. Nghị quyết, quyết định của Hội đồng thành viên được thông qua dưới hình thức lấy ý kiến bằng văn bản khi được số thành viên sở hữu từ 65% vốn điều lệ trở lên tán thành; tỷ lệ cụ thể do Điều lệ công ty quy định."}]},{"id":"luat-59_60","no":60,"code":"Điều 60","title":"Điều 60. Biên bản họp Hội đồng thành viên","shortTitle":"Biên bản họp Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Cuộc họp Hội đồng thành viên phải được ghi biên bản và có thể ghi âm hoặc ghi và lưu giữ dưới hình thức điện tử khác."},{"k":"p","t":"2. Biên bản họp Hội đồng thành viên phải thông qua ngay trước khi kết thúc cuộc họp. Biên bản phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Thời gian và địa điểm họp; mục đích, chương trình họp;"},{"k":"p","t":"b) Họ, tên, tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của thành viên, người đại diện theo ủy quyền dự họp; họ, tên, tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của thành viên, người đại diện theo ủy quyền của thành viên không dự họp;"},{"k":"p","t":"c) Vấn đề được thảo luận và biểu quyết; tóm tắt ý kiến phát biểu của thành viên về từng vấn đề thảo luận;"},{"k":"p","t":"d) Tổng số phiếu biểu quyết hợp lệ, không hợp lệ; tán thành, không tán thành, không có ý kiến đối với từng vấn đề biểu quyết;"},{"k":"p","t":"đ) Các quyết định được thông qua và tỷ lệ phiếu biểu quyết tương ứng;"},{"k":"p","t":"e) Họ, tên, chữ ký và nội dung ý kiến của người dự họp không đồng ý thông qua biên bản họp (nếu có);"},{"k":"p","t":"g) Họ, tên, chữ ký của người ghi biên bản và chủ tọa cuộc họp, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Trường hợp chủ tọa, người ghi biên bản từ chối ký biên bản họp thì biên bản này có hiệu lực nếu được tất cả thành viên khác của Hội đồng thành viên tham dự họp ký và có đầy đủ nội dung theo quy định tại các điểm a, b, c, d, đ và e khoản 2 Điều này. Biên bản họp ghi rõ việc chủ tọa, người ghi biên bản từ chối ký biên bản họp. Người ký biên bản họp chịu trách nhiệm liên đới về tính chính xác và trung thực của nội dung biên bản họp Hội đồng thành viên."}]},{"id":"luat-59_61","no":61,"code":"Điều 61","title":"Điều 61. Thủ tục thông qua nghị quyết, quyết định của Hội đồng thành viên theo hình thức lấy ý kiến bằng văn bản","shortTitle":"Thủ tục thông qua nghị quyết, quyết định của Hội đồng thành viên theo hình thức lấy ý kiến bằng văn bản","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Trường hợp Điều lệ công ty không có quy định khác thì thẩm quyền và thể thức lấy ý kiến thành viên bằng văn bản để thông qua nghị quyết, quyết định được thực hiện theo quy định sau đây:"},{"k":"p","t":"1. Chủ tịch Hội đồng thành viên quyết định việc lấy ý kiến thành viên Hội đồng thành viên bằng văn bản để thông qua nghị quyết, quyết định các vấn đề thuộc thẩm quyền;"},{"k":"p","t":"2. Chủ tịch Hội đồng thành viên có trách nhiệm tổ chức việc soạn thảo, gửi các báo cáo, tờ trình về nội dung cần quyết định, dự thảo nghị quyết, quyết định và phiếu lấy ý kiến đến các thành viên Hội đồng thành viên;"},{"k":"p","t":"3. Phiếu lấy ý kiến phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính;"},{"k":"p","t":"b) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân, tỷ lệ phần vốn góp của thành viên Hội đồng thành viên;"},{"k":"p","t":"c) Vấn đề cần lấy ý kiến và ý kiến trả lời tương ứng theo thứ tự tán thành, không tán thành và không có ý kiến;"},{"k":"p","t":"d) Thời hạn cuối cùng phải gửi phiếu lấy ý kiến về công ty;"},{"k":"p","t":"đ) Họ, tên, chữ ký của Chủ tịch Hội đồng thành viên;"},{"k":"p","t":"4. Phiếu lấy ý kiến có nội dung đầy đủ, có chữ ký của thành viên Hội đồng thành viên và được gửi về công ty trong thời hạn quy định được coi là hợp lệ. Chủ tịch Hội đồng thành viên tổ chức việc kiểm phiếu, lập báo cáo và thông báo kết quả kiểm phiếu, nghị quyết, quyết định được thông qua đến các thành viên trong thời hạn 07 ngày làm việc kể từ ngày kết thúc thời hạn mà thành viên phải gửi ý kiến về công ty. Báo cáo kết quả kiểm phiếu có giá trị tương đương biên bản họp Hội đồng thành viên và phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Mục đích, nội dung lấy ý kiến;"},{"k":"p","t":"b) Họ, tên, tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của thành viên đã gửi lại phiếu lấy ý kiến hợp lệ; họ, tên, tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của thành viên mà công ty không nhận lại được phiếu lấy ý kiến hoặc gửi lại phiếu lấy ý kiến nhưng không hợp lệ;"},{"k":"p","t":"c) Vấn đề được lấy ý kiến và biểu quyết; tóm tắt ý kiến của thành viên về từng vấn đề lấy ý kiến (nếu có);"},{"k":"p","t":"d) Tổng số phiếu lấy ý kiến hợp lệ, không hợp lệ, không nhận được; tổng số phiếu lấy ý kiến hợp lệ tán thành, không tán thành, không có ý kiến đối với từng vấn đề biểu quyết;"},{"k":"p","t":"đ) Nghị quyết, quyết định được thông qua và tỷ lệ phiếu biểu quyết tương ứng;"},{"k":"p","t":"e) Họ, tên, chữ ký của người kiểm phiếu và Chủ tịch Hội đồng thành viên. Người kiểm phiếu và Chủ tịch Hội đồng thành viên chịu trách nhiệm liên đới về tính đầy đủ, chính xác, trung thực của nội dung báo cáo kết quả kiểm phiếu."}]},{"id":"luat-59_62","no":62,"code":"Điều 62","title":"Điều 62. Hiệu lực nghị quyết, quyết định của Hội đồng thành viên","shortTitle":"Hiệu lực nghị quyết, quyết định của Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trường hợp Điều lệ công ty không có quy định khác, nghị quyết, quyết định của Hội đồng thành viên có hiệu lực thi hành kể từ ngày được thông qua hoặc từ ngày có hiệu lực được ghi tại nghị quyết, quyết định đó."},{"k":"p","t":"2. Nghị quyết, quyết định của Hội đồng thành viên được thông qua bằng 100% tổng số vốn điều lệ là hợp pháp và có hiệu lực ngay cả trong trường hợp trình tự và thủ tục thông qua nghị quyết, quyết định đó không được thực hiện đúng quy định."},{"k":"p","t":"3. Trường hợp thành viên, nhóm thành viên yêu cầu Tòa án hoặc Trọng tài hủy bỏ nghị quyết, quyết định đã được thông qua thì nghị quyết, quyết định đó vẫn có hiệu lực thi hành theo quy định tại khoản 1 Điều này cho đến khi có quyết định hủy bỏ của Tòa án hoặc Trọng tài có hiệu lực pháp luật, trừ trường hợp áp dụng biện pháp khẩn cấp tạm thời theo quyết định của cơ quan có thẩm quyền."}]},{"id":"luat-59_63","no":63,"code":"Điều 63","title":"Điều 63. Giám đốc, Tổng giám đốc","shortTitle":"Giám đốc, Tổng giám đốc","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Giám đốc hoặc Tổng giám đốc là người điều hành hoạt động kinh doanh hằng ngày của công ty, chịu trách nhiệm trước Hội đồng thành viên về việc thực hiện quyền và nghĩa vụ của mình."},{"k":"p","t":"2. Giám đốc hoặc Tổng giám đốc có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Tổ chức thực hiện nghị quyết, quyết định của Hội đồng thành viên;"},{"k":"p","t":"b) Quyết định các vấn đề liên quan đến hoạt động kinh doanh hằng ngày của công ty;"},{"k":"p","t":"c) Tổ chức thực hiện kế hoạch kinh doanh và phương án đầu tư của công ty;"},{"k":"p","t":"d) Ban hành quy chế quản lý nội bộ của công ty, trừ trường hợp Điều lệ công ty có quy định khác;"},{"k":"p","t":"đ) Bổ nhiệm, miễn nhiệm, bãi nhiệm người quản lý trong công ty, trừ chức danh thuộc thẩm quyền của Hội đồng thành viên;"},{"k":"p","t":"e) Ký kết hợp đồng nhân danh công ty, trừ trường hợp thuộc thẩm quyền của Chủ tịch Hội đồng thành viên;"},{"k":"p","t":"g) Kiến nghị phương án cơ cấu tổ chức công ty;"},{"k":"p","t":"h) Trình báo cáo tài chính hằng năm lên Hội đồng thành viên;"},{"k":"p","t":"i) Kiến nghị phương án sử dụng và phân chia lợi nhuận hoặc xử lý lỗ trong kinh doanh;"},{"k":"p","t":"k) Tuyển dụng lao động;"},{"k":"p","t":"l) Quyền và nghĩa vụ khác được quy định tại Điều lệ công ty, nghị quyết, quyết định của Hội đồng thành viên, hợp đồng lao động."}]},{"id":"luat-59_64","no":64,"code":"Điều 64","title":"Điều 64. Tiêu chuẩn và điều kiện làm Giám đốc, Tổng giám đốc","shortTitle":"Tiêu chuẩn và điều kiện làm Giám đốc, Tổng giám đốc","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này."},{"k":"p","t":"2. Có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh của công ty và điều kiện khác do Điều lệ công ty quy định."},{"k":"p","t":"3. Đối với doanh nghiệp nhà nước theo quy định tại điểm b khoản 1 Điều 88 của Luật này và công ty con của doanh nghiệp nhà nước theo quy định tại khoản 1 Điều 88 của Luật này, Giám đốc hoặc Tổng giám đốc phải đáp ứng tiêu chuẩn, điều kiện quy định tại khoản 1, khoản 2 Điều này và không được là người có quan hệ gia đình của người quản lý công ty, Kiểm soát viên của công ty và của công ty mẹ; người đại diện phần vốn của doanh nghiệp, người đại diện phần vốn nhà nước tại công ty và công ty mẹ."}]},{"id":"luat-59_65","no":65,"code":"Điều 65","title":"Điều 65. Ban kiểm soát, Kiểm soát viên","shortTitle":"Ban kiểm soát, Kiểm soát viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Ban kiểm soát có từ 01 đến 05 Kiểm soát viên. Nhiệm kỳ Kiểm soát viên không quá 05 năm và có thể được bổ nhiệm lại với số nhiệm kỳ không hạn chế. Trường hợp Ban kiểm soát chỉ có 01 Kiểm soát viên thì Kiểm soát viên đó đồng thời là Trưởng Ban kiểm soát và phải đáp ứng tiêu chuẩn của Trưởng Ban kiểm soát."},{"k":"p","t":"2. Trưởng Ban kiểm soát, Kiểm soát viên phải đáp ứng các tiêu chuẩn và điều kiện tương ứng quy định tại khoản 2 Điều 168 và Điều 169 của Luật này."},{"k":"p","t":"3. Quyền, nghĩa vụ, trách nhiệm, việc miễn nhiệm, bãi nhiệm và chế độ làm việc của Ban kiểm soát, Kiểm soát viên được thực hiện tương ứng theo quy định tại các điều 106, 170, 171, 172, 173 và 174 của Luật này."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_66","no":66,"code":"Điều 66","title":"Điều 66. Tiền lương, thù lao, thưởng và lợi ích khác của Chủ tịch Hội đồng thành viên, Giám đốc, Tổng giám đốc và người quản lý khác","shortTitle":"Tiền lương, thù lao, thưởng và lợi ích khác của Chủ tịch Hội đồng thành viên, Giám đốc, Tổng giám đốc và người quản lý khác","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Công ty trả tiền lương, thù lao, thưởng và lợi ích khác cho Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc và người quản lý khác theo kết quả và hiệu quả kinh doanh."},{"k":"p","t":"2. Tiền lương, thù lao, thưởng và lợi ích khác của Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc và người quản lý khác được tính vào chi phí kinh doanh theo quy định của pháp luật về thuế thu nhập doanh nghiệp, pháp luật có liên quan và phải được thể hiện thành mục riêng trong báo cáo tài chính hằng năm của công ty."}]},{"id":"luat-59_67","no":67,"code":"Điều 67","title":"Điều 67. Hợp đồng, giao dịch phải được Hội đồng thành viên chấp thuận","shortTitle":"Hợp đồng, giao dịch phải được Hội đồng thành viên chấp thuận","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hợp đồng, giao dịch giữa công ty với đối tượng sau đây phải được Hội đồng thành viên chấp thuận:"},{"k":"p","t":"a) Thành viên, người đại diện theo ủy quyền của thành viên, Giám đốc hoặc Tổng giám đốc, người đại diện theo pháp luật của công ty;"},{"k":"p","t":"b) Người có liên quan của người quy định tại điểm a khoản này;"},{"k":"p","t":"c) Người quản lý công ty mẹ, người có thẩm quyền bổ nhiệm người quản lý công ty mẹ;"},{"k":"p","t":"d) Người có liên quan của người quy định tại điểm c khoản này."},{"k":"p","t":"2. Người nhân danh công ty ký kết hợp đồng, giao dịch phải thông báo cho các thành viên Hội đồng thành viên, Kiểm soát viên về các đối tượng có liên quan và lợi ích có liên quan đối với hợp đồng, giao dịch đó; kèm theo dự thảo hợp đồng hoặc nội dung chủ yếu của giao dịch dự định tiến hành. Trường hợp Điều lệ công ty không quy định khác thì Hội đồng thành viên phải quyết định chấp thuận hoặc không chấp thuận hợp đồng, giao dịch trong thời hạn 15 ngày kể từ ngày nhận được thông báo và thực hiện theo quy định tại khoản 3 Điều 59 của Luật này. Thành viên Hội đồng thành viên có liên quan đến các bên trong hợp đồng, giao dịch không được tính vào việc biểu quyết."},{"k":"p","t":"3. Hợp đồng, giao dịch bị vô hiệu theo quyết định của Tòa án và xử lý theo quy định của pháp luật khi được ký kết không đúng quy định tại khoản 1 và khoản 2 Điều này. Người ký kết hợp đồng, giao dịch, thành viên có liên quan và người có liên quan của thành viên đó tham gia hợp đồng, giao dịch phải bồi thường thiệt hại phát sinh, hoàn trả cho công ty các khoản lợi thu được từ việc thực hiện hợp đồng, giao dịch đó."}]},{"id":"luat-59_68","no":68,"code":"Điều 68","title":"Điều 68. Tăng, giảm vốn điều lệ","shortTitle":"Tăng, giảm vốn điều lệ","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Công ty có thể tăng vốn điều lệ trong trường hợp sau đây:"},{"k":"p","t":"a) Tăng vốn góp của thành viên;"},{"k":"p","t":"b) Tiếp nhận thêm vốn góp của thành viên mới."},{"k":"p","t":"2. Trường hợp tăng vốn góp của thành viên thì vốn góp thêm được chia cho các thành viên theo tỷ lệ tương ứng với phần vốn góp của họ trong vốn điều lệ công ty. Thành viên có thể chuyển nhượng quyền góp vốn của mình cho người khác theo quy định tại Điều 52 của Luật này. Trường hợp có thành viên không góp hoặc chỉ góp một phần phần vốn góp thêm thì số vốn còn lại của phần vốn góp thêm của thành viên đó được chia cho các thành viên khác theo tỷ lệ tương ứng với phần vốn góp của họ trong vốn điều lệ công ty nếu các thành viên không có thỏa thuận khác."},{"k":"p","t":"3. Công ty có thể giảm vốn điều lệ trong trường hợp sau đây:"},{"k":"p","t":"a) Hoàn trả một phần vốn góp cho thành viên theo tỷ lệ phần vốn góp của họ trong vốn điều lệ của công ty nếu đã hoạt động kinh doanh liên tục từ 02 năm trở lên kể từ ngày đăng ký thành lập doanh nghiệp và bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác sau khi đã hoàn trả cho thành viên;"},{"k":"p","t":"b) Công ty mua lại phần vốn góp của thành viên theo quy định tại Điều 51 của Luật này;"},{"k":"p","t":"c) Vốn điều lệ không được các thành viên thanh toán đầy đủ và đúng hạn theo quy định tại Điều 47 của Luật này."},{"k":"p","t":"4. Trừ trường hợp quy định tại điểm c khoản 3 Điều này, trong thời hạn 10 ngày kể từ ngày việc tăng hoặc giảm vốn điều lệ đã được thanh toán xong, công ty phải thông báo bằng văn bản về tăng, giảm vốn điều lệ đến Cơ quan đăng ký kinh doanh. Thông báo phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính, mã số doanh nghiệp;"},{"k":"p","t":"b) Vốn điều lệ, số vốn đã tăng hoặc giảm;"},{"k":"p","t":"c) Thời điểm và hình thức tăng hoặc giảm vốn;"},{"k":"p","t":"d) Họ, tên, chữ ký của người đại diện theo pháp luật của doanh nghiệp."},{"k":"p","t":"5. Kèm theo thông báo quy định tại khoản 4 Điều này phải gồm nghị quyết, quyết định và biên bản họp của Hội đồng thành viên; trường hợp giảm vốn điều lệ theo quy định tại điểm a và điểm b khoản 3 Điều này, phải có thêm báo cáo tài chính gần nhất."},{"k":"p","t":"6. Cơ quan đăng ký kinh doanh cập nhật thông tin về việc tăng hoặc giảm vốn điều lệ trong thời hạn 03 ngày làm việc kể từ ngày nhận được thông báo."}]},{"id":"luat-59_69","no":69,"code":"Điều 69","title":"Điều 69. Điều kiện để chia lợi nhuận","shortTitle":"Điều kiện để chia lợi nhuận","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Công ty chỉ được chia lợi nhuận cho các thành viên sau khi đã hoàn thành nghĩa vụ thuế và các nghĩa vụ tài chính khác theo quy định của pháp luật, bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác đến hạn trả sau khi chia lợi nhuận."}]},{"id":"luat-59_70","no":70,"code":"Điều 70","title":"Điều 70. Thu hồi phần vốn góp đã hoàn trả hoặc lợi nhuận đã chia","shortTitle":"Thu hồi phần vốn góp đã hoàn trả hoặc lợi nhuận đã chia","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Trường hợp hoàn trả một phần vốn góp do giảm vốn điều lệ trái với quy định tại khoản 3 Điều 68 của Luật này hoặc chia lợi nhuận cho thành viên trái với quy định tại Điều 69 của Luật này thì các thành viên công ty phải hoàn trả cho công ty số tiền, tài sản khác đã nhận; phải cùng liên đới chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty tương ứng với số tiền, tài sản chưa hoàn trả đủ cho đến khi hoàn trả đủ số tiền, tài sản khác đã nhận."}]},{"id":"luat-59_71","no":71,"code":"Điều 71","title":"Điều 71. Trách nhiệm của Chủ tịch Hội đồng thành viên, Giám đốc, Tổng giám đốc và người quản lý khác, người đại diện theo pháp luật, Kiểm soát viên","shortTitle":"Trách nhiệm của Chủ tịch Hội đồng thành viên, Giám đốc, Tổng giám đốc và người quản lý khác, người đại diện theo pháp luật, Kiểm soát viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc và người quản lý khác, người đại diện theo pháp luật, Kiểm soát viên của công ty có trách nhiệm sau đây:"},{"k":"p","t":"a) Thực hiện quyền và nghĩa vụ một cách trung thực, cẩn trọng, tốt nhất nhằm bảo đảm lợi ích hợp pháp tối đa của công ty;"},{"k":"p","t":"b) Trung thành với lợi ích của công ty; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác;"},{"k":"p","t":"c) Thông báo kịp thời, đầy đủ, chính xác cho công ty về doanh nghiệp mà mình làm chủ hoặc có cổ phần, phần vốn góp và doanh nghiệp mà người có liên quan của mình làm chủ, cùng sở hữu hoặc sở hữu riêng cổ phần, phần vốn góp chi phối;"},{"k":"p","t":"d) Trách nhiệm khác theo quy định của pháp luật và Điều lệ công ty."},{"k":"p","t":"2. Giám đốc hoặc Tổng giám đốc không được tăng tiền lương, trả thưởng khi công ty không có khả năng thanh toán đủ các khoản nợ đến hạn."},{"k":"p","t":"3. Thông báo quy định tại điểm c khoản 1 Điều này phải bằng văn bản và bao gồm các nội dung sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của doanh nghiệp mà họ làm chủ, có sở hữu phần vốn góp hoặc cổ phần; tỷ lệ và thời điểm làm chủ, sở hữu phần vốn góp hoặc cổ phần đó;"},{"k":"p","t":"b) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của doanh nghiệp mà những người có liên quan của họ làm chủ, cùng sở hữu hoặc sở hữu riêng cổ phần, phần vốn góp chi phối."},{"k":"p","t":"4. Thông báo quy định tại khoản 3 Điều này phải được thực hiện trong thời hạn 05 ngày làm việc kể từ ngày phát sinh hoặc có thay đổi liên quan. Công ty phải tập hợp và cập nhật danh sách đối tượng quy định tại khoản 3 Điều này và các hợp đồng, giao dịch của họ với công ty. Danh sách này phải được lưu giữ tại trụ sở chính của công ty. Thành viên, người quản lý, Kiểm soát viên của công ty và người đại diện theo ủy quyền của họ có quyền xem, trích lục và sao một phần hoặc toàn bộ nội dung thông tin quy định tại khoản 3 Điều này trong giờ làm việc theo trình tự, thủ tục quy định tại Điều lệ công ty."}]},{"id":"luat-59_72","no":72,"code":"Điều 72","title":"Điều 72. Khởi kiện người quản lý","shortTitle":"Khởi kiện người quản lý","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thành viên công ty tự mình hoặc nhân danh công ty khởi kiện trách nhiệm dân sự đối với Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc, người đại diện theo pháp luật và người quản lý khác do vi phạm quyền, nghĩa vụ và trách nhiệm của người quản lý trong trường hợp sau đây:"},{"k":"p","t":"a) Vi phạm quy định tại Điều 71 của Luật này;"},{"k":"p","t":"b) Không thực hiện, thực hiện không đầy đủ, thực hiện không kịp thời hoặc thực hiện trái với quy định của pháp luật hoặc Điều lệ công ty, nghị quyết, quyết định của Hội đồng thành viên đối với quyền và nghĩa vụ được giao;"},{"k":"p","t":"c) Trường hợp khác theo quy định của pháp luật và Điều lệ công ty."},{"k":"p","t":"2. Trình tự, thủ tục khởi kiện được thực hiện theo quy định của pháp luật về tố tụng dân sự."},{"k":"p","t":"3. Chi phí khởi kiện trong trường hợp thành viên khởi kiện nhân danh công ty được tính vào chi phí của công ty, trừ trường hợp bị bác yêu cầu khởi kiện."}]},{"id":"luat-59_73","no":73,"code":"Điều 73","title":"Điều 73. Công bố thông tin","shortTitle":"Công bố thông tin","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Công ty trách nhiệm hữu hạn hai thành viên trở lên theo quy định tại điểm b khoản 1 Điều 88 của Luật này thực hiện công bố thông tin theo quy định tại các điểm a, c, đ, g khoản 1 Điều 109 và Điều 110 của Luật này."},{"k":"p","t":"CÔNG TY TRÁCH NHIỆM HỮU HẠN MỘT THÀNH VIÊN"}]},{"id":"luat-59_74","no":74,"code":"Điều 74","title":"Điều 74. Công ty trách nhiệm hữu hạn một thành viên","shortTitle":"Công ty trách nhiệm hữu hạn một thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn một thành viên là doanh nghiệp do một tổ chức hoặc một cá nhân làm chủ sở hữu (sau đây gọi là chủ sở hữu công ty). Chủ sở hữu công ty chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi số vốn điều lệ của công ty."},{"k":"p","t":"2. Công ty trách nhiệm hữu hạn một thành viên có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp."},{"k":"p","t":"3. Công ty trách nhiệm hữu hạn một thành viên không được phát hành cổ phần, trừ trường hợp để chuyển đổi thành công ty cổ phần."},{"k":"p","t":"4. Công ty trách nhiệm hữu hạn một thành viên được phát hành trái phiếu theo quy định của Luật này và quy định khác của pháp luật có liên quan; việc phát hành trái phiếu riêng lẻ theo quy định tại Điều 128 và Điều 129 của Luật này."}]},{"id":"luat-59_75","no":75,"code":"Điều 75","title":"Điều 75. Góp vốn thành lập công ty","shortTitle":"Góp vốn thành lập công ty","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Vốn điều lệ của công ty trách nhiệm hữu hạn một thành viên khi đăng ký thành lập doanh nghiệp là tổng giá trị tài sản do chủ sở hữu công ty cam kết góp và ghi trong Điều lệ công ty."},{"k":"p","t":"2. Chủ sở hữu công ty phải góp vốn cho công ty đủ và đúng loại tài sản đã cam kết khi đăng ký thành lập doanh nghiệp trong thời hạn 90 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp, không kể thời gian vận chuyển, nhập khẩu tài sản góp vốn, thực hiện thủ tục hành chính để chuyển quyền sở hữu tài sản. Trong thời hạn này, chủ sở hữu công ty có các quyền và nghĩa vụ tương ứng với phần vốn góp đã cam kết."},{"k":"p","t":"3. Trường hợp không góp đủ vốn điều lệ trong thời hạn quy định tại khoản 2 Điều này, chủ sở hữu công ty phải đăng ký thay đổi vốn điều lệ bằng giá trị số vốn đã góp trong thời hạn 30 ngày kể từ ngày cuối cùng phải góp đủ vốn điều lệ. Trường hợp này, chủ sở hữu phải chịu trách nhiệm tương ứng với phần vốn góp đã cam kết đối với các nghĩa vụ tài chính của công ty phát sinh trong thời gian trước ngày cuối cùng công ty đăng ký thay đổi vốn điều lệ theo quy định tại khoản này."},{"k":"p","t":"4. Chủ sở hữu công ty chịu trách nhiệm bằng toàn bộ tài sản của mình đối với các nghĩa vụ tài chính của công ty, thiệt hại xảy ra do không góp, không góp đủ, không góp đúng hạn vốn điều lệ theo quy định tại Điều này."}]},{"id":"luat-59_76","no":76,"code":"Điều 76","title":"Điều 76. Quyền của chủ sở hữu công ty","shortTitle":"Quyền của chủ sở hữu công ty","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Chủ sở hữu công ty là tổ chức có quyền sau đây:"},{"k":"p","t":"a) Quyết định nội dung Điều lệ công ty, sửa đổi, bổ sung Điều lệ công ty;"},{"k":"p","t":"b) Quyết định chiến lược phát triển và kế hoạch kinh doanh hằng năm của công ty;"},{"k":"p","t":"c) Quyết định cơ cấu tổ chức quản lý công ty, bổ nhiệm, miễn nhiệm, bãi nhiệm người quản lý, Kiểm soát viên của công ty;"},{"k":"p","t":"d) Quyết định dự án đầu tư phát triển;"},{"k":"p","t":"đ) Quyết định các giải pháp phát triển thị trường, tiếp thị và công nghệ;"},{"k":"p","t":"e) Thông qua hợp đồng vay, cho vay, bán tài sản và các hợp đồng khác do Điều lệ công ty quy định có giá trị từ 50% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty hoặc một tỷ lệ hoặc giá trị khác nhỏ hơn quy định tại Điều lệ công ty;"},{"k":"p","t":"g) Thông qua báo cáo tài chính của công ty;"},{"k":"p","t":"h) Quyết định tăng vốn điều lệ của công ty; chuyển nhượng một phần hoặc toàn bộ vốn điều lệ của công ty cho tổ chức, cá nhân khác; quyết định phát hành trái phiếu;"},{"k":"p","t":"i) Quyết định thành lập công ty con, góp vốn vào công ty khác;"},{"k":"p","t":"k) Tổ chức giám sát và đánh giá hoạt động kinh doanh của công ty;"},{"k":"p","t":"l) Quyết định việc sử dụng lợi nhuận sau khi đã hoàn thành nghĩa vụ thuế và các nghĩa vụ tài chính khác của công ty;"},{"k":"p","t":"m) Quyết định tổ chức lại, giải thể và yêu cầu phá sản công ty;"},{"k":"p","t":"n) Thu hồi toàn bộ giá trị tài sản của công ty sau khi công ty hoàn thành giải thể hoặc phá sản;"},{"k":"p","t":"o) Quyền khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"2. Chủ sở hữu công ty là cá nhân có quyền quy định tại các điểm a, h, l, m, n và o khoản 1 Điều này; quyết định đầu tư, kinh doanh và quản trị nội bộ công ty, trừ trường hợp Điều lệ công ty có quy định khác."}]},{"id":"luat-59_77","no":77,"code":"Điều 77","title":"Điều 77. Nghĩa vụ của chủ sở hữu công ty","shortTitle":"Nghĩa vụ của chủ sở hữu công ty","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Góp đủ và đúng hạn vốn điều lệ công ty."},{"k":"p","t":"2. Tuân thủ Điều lệ công ty."},{"k":"p","t":"3. Phải xác định và tách biệt tài sản của chủ sở hữu công ty với tài sản của công ty. Chủ sở hữu công ty là cá nhân phải tách biệt chi tiêu của cá nhân và gia đình mình với chi tiêu của Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"4. Tuân thủ quy định của pháp luật về hợp đồng và quy định khác của pháp luật có liên quan trong việc mua, bán, vay, cho vay, thuê, cho thuê, hợp đồng, giao dịch khác giữa công ty và chủ sở hữu công ty."},{"k":"p","t":"5. Chủ sở hữu công ty chỉ được quyền rút vốn bằng cách chuyển nhượng một phần hoặc toàn bộ vốn điều lệ cho tổ chức hoặc cá nhân khác; trường hợp rút một phần hoặc toàn bộ vốn điều lệ đã góp ra khỏi công ty dưới hình thức khác thì chủ sở hữu công ty và cá nhân, tổ chức có liên quan phải liên đới chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty."},{"k":"p","t":"6. Chủ sở hữu công ty không được rút lợi nhuận khi công ty không thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác đến hạn."},{"k":"p","t":"7. Nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_78","no":78,"code":"Điều 78","title":"Điều 78. Thực hiện quyền của chủ sở hữu công ty trong một số trường hợp đặc biệt","shortTitle":"Thực hiện quyền của chủ sở hữu công ty trong một số trường hợp đặc biệt","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trường hợp chủ sở hữu công ty chuyển nhượng, tặng cho một phần vốn điều lệ cho một hoặc nhiều tổ chức, cá nhân khác hoặc công ty kết nạp thêm thành viên mới thì công ty phải tổ chức quản lý theo loại hình doanh nghiệp tương ứng và đăng ký thay đổi nội dung đăng ký doanh nghiệp trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển nhượng, tặng cho hoặc kết nạp thành viên mới."},{"k":"p","t":"2. Trường hợp chủ sở hữu công ty là cá nhân bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc thì ủy quyền cho người khác thực hiện một số hoặc tất cả quyền và nghĩa vụ của chủ sở hữu công ty."},{"k":"p","t":"3. Trường hợp chủ sở hữu công ty là cá nhân chết thì người thừa kế theo di chúc hoặc theo pháp luật là chủ sở hữu công ty hoặc thành viên công ty. Công ty phải tổ chức quản lý theo loại hình doanh nghiệp tương ứng và đăng ký thay đổi nội dung đăng ký doanh nghiệp trong thời hạn 10 ngày kể từ ngày kết thúc việc giải quyết thừa kế. Trường hợp chủ sở hữu công ty là cá nhân chết mà không có người thừa kế, người thừa kế từ chối nhận thừa kế hoặc bị truất quyền thừa kế thì phần vốn góp của chủ sở hữu được giải quyết theo quy định của pháp luật về dân sự."},{"k":"p","t":"4. Trường hợp chủ sở hữu công ty là cá nhân mất tích thì phần vốn góp của chủ sở hữu được giải quyết theo quy định của pháp luật về dân sự."},{"k":"p","t":"5. Trường hợp chủ sở hữu công ty là cá nhân mà bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi thì quyền và nghĩa vụ của chủ sở hữu công ty được thực hiện thông qua người đại diện."},{"k":"p","t":"6. Trường hợp chủ sở hữu công ty là tổ chức mà bị giải thể hoặc phá sản thì người nhận chuyển nhượng phần vốn góp của chủ sở hữu trở thành chủ sở hữu hoặc thành viên công ty. Công ty phải tổ chức quản lý theo loại hình doanh nghiệp tương ứng và đăng ký thay đổi nội dung đăng ký doanh nghiệp trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển nhượng."},{"k":"p","t":"7. Trường hợp chủ sở hữu công ty là cá nhân mà bị Tòa án cấm hành nghề, làm công việc nhất định hoặc chủ sở hữu công ty là pháp nhân thương mại bị Tòa án cấm kinh doanh, cấm hoạt động trong một số lĩnh vực nhất định thuộc phạm vi ngành, nghề kinh doanh của doanh nghiệp thì cá nhân đó không được hành nghề, làm công việc nhất định tại công ty đó hoặc công ty tạm ngừng, chấm dứt kinh doanh ngành, nghề có liên quan theo quyết định của Tòa án."}]},{"id":"luat-59_79","no":79,"code":"Điều 79","title":"Điều 79. Cơ cấu tổ chức quản lý của công ty trách nhiệm hữu hạn một thành viên do tổ chức làm chủ sở hữu","shortTitle":"Cơ cấu tổ chức quản lý của công ty trách nhiệm hữu hạn một thành viên do tổ chức làm chủ sở hữu","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn một thành viên do tổ chức làm chủ sở hữu được tổ chức quản lý và hoạt động theo một trong hai mô hình sau đây:"},{"k":"p","t":"a) Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc;"},{"k":"p","t":"b) Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"2. Đối với công ty có chủ sở hữu công ty là doanh nghiệp nhà nước theo quy định tại khoản 1 Điều 88 của Luật này thì phải thành lập Ban kiểm soát; trường hợp khác do công ty quyết định. Cơ cấu tổ chức, chế độ làm việc, tiêu chuẩn, điều kiện, miễn nhiệm, bãi nhiệm, quyền, nghĩa vụ, trách nhiệm của Ban kiểm soát, Kiểm soát viên thực hiện tương ứng theo quy định tại Điều 65 của Luật này."},{"k":"p","t":"3. Công ty phải có ít nhất một người đại diện theo pháp luật là người giữ một trong các chức danh là Chủ tịch Hội đồng thành viên, Chủ tịch công ty hoặc Giám đốc hoặc Tổng giám đốc. Trường hợp Điều lệ công ty không quy định thì Chủ tịch Hội đồng thành viên hoặc Chủ tịch công ty là người đại diện theo pháp luật của công ty."},{"k":"p","t":"4. Trường hợp Điều lệ công ty không quy định khác thì cơ cấu tổ chức, hoạt động, chức năng, quyền và nghĩa vụ của Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc thực hiện theo quy định của Luật này."}]},{"id":"luat-59_80","no":80,"code":"Điều 80","title":"Điều 80. Hội đồng thành viên","shortTitle":"Hội đồng thành viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên có từ 03 đến 07 thành viên. Thành viên Hội đồng thành viên do chủ sở hữu công ty bổ nhiệm, miễn nhiệm với nhiệm kỳ không quá 05 năm. Hội đồng thành viên nhân danh chủ sở hữu công ty thực hiện các quyền và nghĩa vụ của chủ sở hữu công ty; nhân danh công ty thực hiện các quyền và nghĩa vụ của công ty, trừ quyền và nghĩa vụ của Giám đốc hoặc Tổng giám đốc; chịu trách nhiệm trước pháp luật và chủ sở hữu công ty về việc thực hiện các quyền và nghĩa vụ được giao theo quy định của Điều lệ công ty, Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Quyền, nghĩa vụ và chế độ làm việc của Hội đồng thành viên được thực hiện theo quy định tại Điều lệ công ty, Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"3. Chủ tịch Hội đồng thành viên do chủ sở hữu công ty bổ nhiệm hoặc do các thành viên Hội đồng thành viên bầu theo nguyên tắc đa số theo trình tự, thủ tục quy định tại Điều lệ công ty. Trường hợp Điều lệ công ty không có quy định khác, nhiệm kỳ, quyền và nghĩa vụ của Chủ tịch Hội đồng thành viên áp dụng theo quy định tại Điều 56 và quy định khác có liên quan của Luật này."},{"k":"p","t":"4. Thẩm quyền, cách thức triệu tập họp Hội đồng thành viên áp dụng theo quy định tại Điều 57 của Luật này."},{"k":"p","t":"5. Cuộc họp Hội đồng thành viên được tiến hành khi có ít nhất hai phần ba tổng số thành viên Hội đồng thành viên dự họp. Trường hợp Điều lệ công ty không có quy định khác thì mỗi thành viên Hội đồng thành viên có một phiếu biểu quyết có giá trị như nhau. Hội đồng thành viên có thể thông qua nghị quyết, quyết định theo hình thức lấy ý kiến bằng văn bản."},{"k":"p","t":"6. Nghị quyết, quyết định của Hội đồng thành viên được thông qua khi có trên 50% số thành viên dự họp tán thành hoặc số thành viên dự họp sở hữu trên 50% tổng số phiếu biểu quyết tán thành. Việc sửa đổi, bổ sung Điều lệ công ty, tổ chức lại công ty, chuyển nhượng một phần hoặc toàn bộ vốn điều lệ của công ty phải được ít nhất 75% số thành viên dự họp tán thành hoặc số thành viên dự họp sở hữu từ 75% tổng số phiếu biểu quyết trở lên tán thành. Nghị quyết, quyết định của Hội đồng thành viên có hiệu lực kể từ ngày được thông qua hoặc từ ngày ghi tại nghị quyết, quyết định đó, trừ trường hợp Điều lệ công ty có quy định khác."},{"k":"p","t":"7. Cuộc họp Hội đồng thành viên phải được ghi biên bản, có thể được ghi âm hoặc ghi và lưu giữ dưới hình thức điện tử khác. Biên bản họp Hội đồng thành viên áp dụng theo quy định tại khoản 2 Điều 60 của Luật này."}]},{"id":"luat-59_81","no":81,"code":"Điều 81","title":"Điều 81. Chủ tịch công ty","shortTitle":"Chủ tịch công ty","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Chủ tịch công ty do chủ sở hữu công ty bổ nhiệm. Chủ tịch công ty nhân danh chủ sở hữu công ty thực hiện quyền và nghĩa vụ của chủ sở hữu công ty; nhân danh công ty thực hiện quyền và nghĩa vụ của công ty, trừ quyền và nghĩa vụ của Giám đốc hoặc Tổng giám đốc; chịu trách nhiệm trước pháp luật và chủ sở hữu công ty về việc thực hiện quyền và nghĩa vụ được giao theo quy định của Điều lệ công ty, Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Quyền, nghĩa vụ và chế độ làm việc của Chủ tịch công ty được thực hiện theo quy định tại Điều lệ công ty, Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"3. Quyết định của Chủ tịch công ty về thực hiện quyền và nghĩa vụ của chủ sở hữu công ty có hiệu lực kể từ ngày được chủ sở hữu công ty phê duyệt, trừ trường hợp Điều lệ công ty có quy định khác."}]},{"id":"luat-59_82","no":82,"code":"Điều 82","title":"Điều 82. Giám đốc, Tổng giám đốc","shortTitle":"Giám đốc, Tổng giám đốc","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên hoặc Chủ tịch công ty bổ nhiệm hoặc thuê Giám đốc hoặc Tổng giám đốc với nhiệm kỳ không quá 05 năm để điều hành hoạt động kinh doanh hằng ngày của công ty. Giám đốc hoặc Tổng giám đốc chịu trách nhiệm trước pháp luật và Hội đồng thành viên hoặc Chủ tịch công ty về việc thực hiện quyền và nghĩa vụ của mình. Chủ tịch Hội đồng thành viên, thành viên khác của Hội đồng thành viên hoặc Chủ tịch công ty có thể kiêm Giám đốc hoặc Tổng giám đốc, trừ trường hợp pháp luật, Điều lệ công ty có quy định khác."},{"k":"p","t":"2. Giám đốc hoặc Tổng giám đốc có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Tổ chức thực hiện nghị quyết, quyết định của Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"b) Quyết định các vấn đề liên quan đến hoạt động kinh doanh hằng ngày của công ty;"},{"k":"p","t":"c) Tổ chức thực hiện kế hoạch kinh doanh và phương án đầu tư của công ty;"},{"k":"p","t":"d) Ban hành quy chế quản lý nội bộ của công ty;"},{"k":"p","t":"đ) Bổ nhiệm, miễn nhiệm, bãi nhiệm người quản lý công ty, trừ các chức danh thuộc thẩm quyền của Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"e) Ký hợp đồng nhân danh công ty, trừ trường hợp thuộc thẩm quyền của Chủ tịch Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"g) Kiến nghị phương án cơ cấu tổ chức công ty;"},{"k":"p","t":"h) Trình báo cáo tài chính hằng năm lên Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"i) Kiến nghị phương án sử dụng lợi nhuận hoặc xử lý lỗ trong kinh doanh;"},{"k":"p","t":"k) Tuyển dụng lao động;"},{"k":"p","t":"l) Quyền và nghĩa vụ khác được quy định tại Điều lệ công ty và hợp đồng lao động."},{"k":"p","t":"3. Giám đốc hoặc Tổng giám đốc phải có tiêu chuẩn và điều kiện sau đây:"},{"k":"p","t":"a) Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này;"},{"k":"p","t":"b) Có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh của công ty và điều kiện khác do Điều lệ công ty quy định."}]},{"id":"luat-59_83","no":83,"code":"Điều 83","title":"Điều 83. Trách nhiệm của thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc, Tổng giám đốc và người quản lý khác, Kiểm soát viên","shortTitle":"Trách nhiệm của thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc, Tổng giám đốc và người quản lý khác, Kiểm soát viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tuân thủ pháp luật, Điều lệ công ty, quyết định của chủ sở hữu công ty trong việc thực hiện quyền và nghĩa vụ được giao."},{"k":"p","t":"2. Thực hiện quyền và nghĩa vụ được giao một cách trung thực, cẩn trọng, tốt nhất nhằm bảo đảm lợi ích hợp pháp tối đa của công ty và chủ sở hữu công ty."},{"k":"p","t":"3. Trung thành với lợi ích của công ty và chủ sở hữu công ty; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác."},{"k":"p","t":"4. Thông báo kịp thời, đầy đủ, chính xác cho chủ sở hữu công ty về doanh nghiệp mà mình làm chủ hoặc có cổ phần, phần vốn góp chi phối và doanh nghiệp mà người có liên quan của mình làm chủ, cùng sở hữu hoặc sở hữu riêng cổ phần, phần vốn góp chi phối. Thông báo phải được lưu giữ tại trụ sở chính của công ty."},{"k":"p","t":"5. Trách nhiệm khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_84","no":84,"code":"Điều 84","title":"Điều 84. Tiền lương, thù lao, thưởng và lợi ích khác của người quản lý công ty và Kiểm soát viên","shortTitle":"Tiền lương, thù lao, thưởng và lợi ích khác của người quản lý công ty và Kiểm soát viên","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người quản lý công ty và Kiểm soát viên được hưởng tiền lương, thù lao, thưởng và lợi ích khác theo kết quả và hiệu quả kinh doanh của công ty."},{"k":"p","t":"2. Chủ sở hữu công ty quyết định mức tiền lương, thù lao, thưởng và lợi ích khác của thành viên Hội đồng thành viên, Chủ tịch công ty và Kiểm soát viên. Tiền lương, thù lao, thưởng và lợi ích khác của người quản lý công ty và Kiểm soát viên được tính vào chi phí kinh doanh theo quy định của pháp luật về thuế thu nhập doanh nghiệp, pháp luật có liên quan và phải được thể hiện thành mục riêng trong báo cáo tài chính hằng năm của công ty."},{"k":"p","t":"3. Tiền lương, thù lao, thưởng và lợi ích khác của Kiểm soát viên có thể do chủ sở hữu công ty chi trả trực tiếp theo quy định tại Điều lệ công ty."}]},{"id":"luat-59_85","no":85,"code":"Điều 85","title":"Điều 85. Cơ cấu tổ chức quản lý công ty trách nhiệm hữu hạn một thành viên do cá nhân làm chủ sở hữu","shortTitle":"Cơ cấu tổ chức quản lý công ty trách nhiệm hữu hạn một thành viên do cá nhân làm chủ sở hữu","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn một thành viên do cá nhân làm chủ sở hữu có Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"2. Chủ sở hữu công ty là Chủ tịch công ty và có thể kiêm hoặc thuê người khác làm Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"3. Quyền, nghĩa vụ của Giám đốc hoặc Tổng giám đốc được quy định tại Điều lệ công ty và hợp đồng lao động."}]},{"id":"luat-59_86","no":86,"code":"Điều 86","title":"Điều 86. Hợp đồng, giao dịch của công ty với những người có liên quan","shortTitle":"Hợp đồng, giao dịch của công ty với những người có liên quan","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trừ trường hợp Điều lệ công ty có quy định khác, hợp đồng, giao dịch giữa công ty trách nhiệm hữu hạn một thành viên do tổ chức làm chủ sở hữu với những người sau đây phải được Hội đồng thành viên hoặc Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc và Kiểm soát viên chấp thuận:"},{"k":"p","t":"a) Chủ sở hữu công ty và người có liên quan của chủ sở hữu công ty;"},{"k":"p","t":"b) Thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc và Kiểm soát viên;"},{"k":"p","t":"c) Người có liên quan của người quy định tại điểm b khoản này;"},{"k":"p","t":"d) Người quản lý của chủ sở hữu công ty, người có thẩm quyền bổ nhiệm người quản lý đó;"},{"k":"p","t":"đ) Người có liên quan của những người quy định tại điểm d khoản này."},{"k":"p","t":"2. Người nhân danh công ty ký kết hợp đồng, giao dịch phải thông báo cho Hội đồng thành viên hoặc Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc và Kiểm soát viên về các đối tượng có liên quan và lợi ích có liên quan đối với hợp đồng, giao dịch đó; kèm theo dự thảo hợp đồng hoặc nội dung chủ yếu của giao dịch đó."},{"k":"p","t":"3. Trừ trường hợp Điều lệ công ty có quy định khác, thành viên Hội đồng thành viên hoặc Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc và Kiểm soát viên phải quyết định việc chấp thuận hợp đồng, giao dịch trong thời hạn 10 ngày kể từ ngày nhận được thông báo theo nguyên tắc đa số, mỗi người có một phiếu biểu quyết; người có liên quan đến các bên không có quyền biểu quyết."},{"k":"p","t":"4. Hợp đồng, giao dịch quy định tại khoản 1 Điều này chỉ được chấp thuận khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Các bên ký kết hợp đồng hoặc thực hiện giao dịch là những chủ thể pháp lý độc lập, có quyền, nghĩa vụ, tài sản và lợi ích riêng biệt;"},{"k":"p","t":"b) Giá sử dụng trong hợp đồng hoặc giao dịch là giá thị trường tại thời điểm hợp đồng được ký kết hoặc giao dịch được thực hiện;"},{"k":"p","t":"c) Chủ sở hữu công ty tuân thủ đúng nghĩa vụ quy định tại khoản 4 Điều 77 của Luật này."},{"k":"p","t":"5. Hợp đồng, giao dịch bị vô hiệu theo quyết định của Tòa án và xử lý theo quy định của pháp luật nếu được ký kết không đúng quy định tại các khoản 1,2, 3 và 4 Điều này. Người ký kết hợp đồng, giao dịch và người có liên quan là các bên của hợp đồng, giao dịch liên đới chịu trách nhiệm về thiệt hại phát sinh và hoàn trả cho công ty các khoản lợi thu được từ việc thực hiện hợp đồng, giao dịch đó."},{"k":"p","t":"6. Hợp đồng, giao dịch giữa công ty trách nhiệm hữu hạn một thành viên do cá nhân làm chủ sở hữu với chủ sở hữu công ty hoặc người có liên quan của chủ sở hữu công ty phải được ghi chép lại và lưu giữ thành hồ sơ riêng của công ty."}]},{"id":"luat-59_87","no":87,"code":"Điều 87","title":"Điều 87. Tăng, giảm vốn điều lệ","shortTitle":"Tăng, giảm vốn điều lệ","chuong":"Chương III — CÔNG TY TRÁCH NHIỆM HỮU HẠN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Công ty trách nhiệm hữu hạn một thành viên tăng vốn điều lệ thông qua việc chủ sở hữu công ty góp thêm vốn hoặc huy động thêm vốn góp của người khác. Chủ sở hữu công ty quyết định hình thức tăng và mức tăng vốn điều lệ."},{"k":"p","t":"2. Trường hợp tăng vốn điều lệ bằng việc huy động thêm phần vốn góp của người khác, công ty phải tổ chức quản lý theo loại hình công ty trách nhiệm hữu hạn hai thành viên trở lên hoặc công ty cổ phần. Việc tổ chức quản lý công ty được thực hiện như sau:"},{"k":"p","t":"a) Trường hợp tổ chức quản lý theo loại hình công ty trách nhiệm hữu hạn hai thành viên trở lên thì công ty phải thông báo thay đổi nội dung đăng ký doanh nghiệp trong thời hạn 10 ngày kể từ ngày hoàn thành việc thay đổi vốn điều lệ;"},{"k":"p","t":"b) Trường hợp chuyển đổi thành công ty cổ phần thì công ty thực hiện theo quy định tại Điều 202 của Luật này."},{"k":"p","t":"3. Công ty trách nhiệm hữu hạn một thành viên giảm vốn điều lệ trong trường hợp sau đây:"},{"k":"p","t":"a) Hoàn trả một phần vốn góp cho chủ sở hữu công ty nếu công ty đã hoạt động kinh doanh liên tục từ 02 năm trở lên kể từ ngày đăng ký thành lập doanh nghiệp và bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác sau khi đã hoàn trả phần vốn góp cho chủ sở hữu công ty;"},{"k":"p","t":"b) Vốn điều lệ không được chủ sở hữu công ty thanh toán đầy đủ và đúng hạn theo quy định tại Điều 75 của Luật này."}]},{"id":"luat-59_88","no":88,"code":"Điều 88","title":"Điều 88. Doanh nghiệp nhà nước","shortTitle":"Doanh nghiệp nhà nước","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp nhà nước được tổ chức quản lý dưới hình thức công ty trách nhiệm hữu hạn, công ty cổ phần, bao gồm:"},{"k":"p","t":"a) Doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ;"},{"k":"p","t":"b) Doanh nghiệp do Nhà nước nắm giữ trên 50% vốn điều lệ hoặc tổng số cổ phần có quyền biểu quyết, trừ doanh nghiệp quy định tại điểm a khoản 1 Điều này."},{"k":"p","t":"2. Doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ theo quy định tại điểm a khoản 1 Điều này bao gồm:"},{"k":"p","t":"a) Công ty trách nhiệm hữu hạn một thành viên do Nhà nước nắm giữ 100% vốn điều lệ là công ty mẹ của tập đoàn kinh tế nhà nước, công ty mẹ của tổng công ty nhà nước, công ty mẹ trong nhóm công ty mẹ - công ty con;"},{"k":"p","t":"b) Công ty trách nhiệm hữu hạn một thành viên là công ty độc lập do Nhà nước nắm giữ 100% vốn điều lệ."},{"k":"p","t":"3. Doanh nghiệp do Nhà nước nắm giữ trên 50% vốn điều lệ hoặc tổng số cổ phần có quyền biểu quyết theo quy định tại điểm b khoản 1 Điều này bao gồm:"},{"k":"p","t":"a) Công ty trách nhiệm hữu hạn hai thành viên trở lên, công ty cổ phần do Nhà nước nắm giữ trên 50% vốn điều lệ, tổng số cổ phần có quyền biểu quyết là công ty mẹ của tập đoàn kinh tế, công ty mẹ của tổng công ty nhà nước, công ty mẹ trong nhóm công ty mẹ - công ty con;"},{"k":"p","t":"b) Công ty trách nhiệm hữu hạn hai thành viên trở lên, công ty cổ phần là công ty độc lập do Nhà nước nắm giữ trên 50% vốn điều lệ, tổng số cổ phần có quyền biểu quyết."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_89","no":89,"code":"Điều 89","title":"Điều 89. Áp dụng quy định đối với doanh nghiệp nhà nước","shortTitle":"Áp dụng quy định đối với doanh nghiệp nhà nước","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ theo quy định tại điểm a khoản 1 Điều 88 của Luật này được tổ chức quản lý dưới hình thức công ty trách nhiệm hữu hạn một thành viên theo quy định tại Chương này và các quy định khác có liên quan của Luật này; trường hợp có sự khác nhau giữa các quy định của Luật này thì áp dụng quy định tại Chương này."},{"k":"p","t":"2. Doanh nghiệp do Nhà nước nắm giữ trên 50% vốn điều lệ theo quy định tại điểm b khoản 1 Điều 88 của Luật này được tổ chức quản lý dưới hình thức công ty trách nhiệm hữu hạn hai thành viên trở lên theo các quy định tại Mục 1 Chương III hoặc công ty cổ phần theo các quy định tại Chương V của Luật này."}]},{"id":"luat-59_90","no":90,"code":"Điều 90","title":"Điều 90. Cơ cấu tổ chức quản lý","shortTitle":"Cơ cấu tổ chức quản lý","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan đại diện chủ sở hữu quyết định tổ chức quản lý doanh nghiệp nhà nước dưới hình thức công ty trách nhiệm hữu hạn một thành viên theo một trong hai mô hình sau đây:"},{"k":"p","t":"1. Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc, Ban kiểm soát;"},{"k":"p","t":"2. Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc, Ban kiểm soát."}]},{"id":"luat-59_91","no":91,"code":"Điều 91","title":"Điều 91. Hội đồng thành viên","shortTitle":"Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên nhân danh công ty thực hiện quyền và nghĩa vụ của công ty theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Hội đồng thành viên bao gồm Chủ tịch và các thành viên khác, số lượng không quá 07 người. Thành viên Hội đồng thành viên do cơ quan đại diện chủ sở hữu bổ nhiệm, miễn nhiệm, cách chức, khen thưởng, kỷ luật."},{"k":"p","t":"3. Nhiệm kỳ của Chủ tịch và thành viên khác của Hội đồng thành viên không quá 05 năm. Thành viên Hội đồng thành viên có thể được bổ nhiệm lại. Một cá nhân được bổ nhiệm làm thành viên Hội đồng thành viên không quá 02 nhiệm kỳ tại một công ty, trừ trường hợp đã có trên 15 năm làm việc liên tục tại công ty đó trước khi được bổ nhiệm lần đầu."}]},{"id":"luat-59_92","no":92,"code":"Điều 92","title":"Điều 92. Quyền và nghĩa vụ của Hội đồng thành viên","shortTitle":"Quyền và nghĩa vụ của Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên nhân danh công ty thực hiện quyền, nghĩa vụ của chủ sở hữu, cổ đông, thành viên đối với công ty do công ty làm chủ sở hữu hoặc sở hữu cổ phần, phần vốn góp."},{"k":"p","t":"2. Hội đồng thành viên có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Quyết định các nội dung theo quy định tại Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp;"},{"k":"p","t":"b) Quyết định thành lập, tổ chức lại, giải thể chi nhánh, văn phòng đại diện và các đơn vị hạch toán phụ thuộc;"},{"k":"p","t":"c) Quyết định kế hoạch sản xuất, kinh doanh hằng năm, chủ trương phát triển thị trường, tiếp thị và công nghệ của công ty;"},{"k":"p","t":"d) Tổ chức hoạt động kiểm toán nội bộ và quyết định thành lập đơn vị kiểm toán nội bộ của công ty;"},{"k":"p","t":"đ) Quyền và nghĩa vụ khác theo quy định của Điều lệ công ty, Luật này và quy định khác của pháp luật có liên quan."}]},{"id":"luat-59_93","no":93,"code":"Điều 93","title":"Điều 93. Tiêu chuẩn và điều kiện của thành viên Hội đồng thành viên","shortTitle":"Tiêu chuẩn và điều kiện của thành viên Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này."},{"k":"p","t":"2. Có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh hoặc trong lĩnh vực, ngành, nghề hoạt động của doanh nghiệp."},{"k":"p","t":"3. Không phải là người có quan hệ gia đình của người đứng đầu, cấp phó của người đứng đầu cơ quan đại diện chủ sở hữu; thành viên Hội đồng thành viên; Giám đốc, Phó giám đốc hoặc Tổng giám đốc, Phó Tổng giám đốc và Kế toán trưởng của công ty; Kiểm soát viên công ty."},{"k":"p","t":"4. Không phải là người quản lý doanh nghiệp thành viên."},{"k":"p","t":"5. Trừ Chủ tịch Hội đồng thành viên, thành viên khác của Hội đồng thành viên có thể kiêm Giám đốc, Tổng giám đốc công ty đó hoặc công ty khác không phải là doanh nghiệp thành viên theo quyết định của cơ quan đại diện chủ sở hữu."},{"k":"p","t":"6. Chưa từng bị cách chức Chủ tịch Hội đồng thành viên, thành viên Hội đồng thành viên hoặc Chủ tịch công ty, Giám đốc, Phó giám đốc hoặc Tổng giám đốc, Phó Tổng giám đốc của doanh nghiệp nhà nước."},{"k":"p","t":"7. Tiêu chuẩn và điều kiện khác quy định tại Điều lệ công ty."}]},{"id":"luat-59_94","no":94,"code":"Điều 94","title":"Điều 94. Miễn nhiệm, cách chức thành viên Hội đồng thành viên","shortTitle":"Miễn nhiệm, cách chức thành viên Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch và thành viên khác của Hội đồng thành viên bị miễn nhiệm trong trường hợp sau đây:"},{"k":"p","t":"a) Không còn đủ tiêu chuẩn và điều kiện quy định tại Điều 93 của Luật này;"},{"k":"p","t":"b) Có đơn xin từ chức và được cơ quan đại diện chủ sở hữu chấp thuận bằng văn bản;"},{"k":"p","t":"c) Có quyết định điều chuyển, bố trí công việc khác hoặc nghỉ hưu;"},{"k":"p","t":"d) Không đủ năng lực, trình độ đảm nhận công việc được giao;"},{"k":"p","t":"đ) Không đủ sức khỏe hoặc không còn uy tín để giữ chức vụ thành viên Hội đồng thành viên."},{"k":"p","t":"2. Chủ tịch và thành viên khác của Hội đồng thành viên bị cách chức trong trường hợp sau đây:"},{"k":"p","t":"a) Công ty không hoàn thành các mục tiêu, chỉ tiêu kế hoạch hằng năm, không bảo toàn và phát triển vốn đầu tư theo yêu cầu của cơ quan đại diện chủ sở hữu mà không giải trình được nguyên nhân khách quan hoặc giải trình nguyên nhân nhưng không được cơ quan đại diện chủ sở hữu chấp thuận;"},{"k":"p","t":"b) Bị Tòa án kết án và bản án, quyết định của Tòa án đã có hiệu lực pháp luật;"},{"k":"p","t":"c) Không trung thực trong thực thi quyền, nghĩa vụ hoặc lạm dụng địa vị, chức vụ, sử dụng tài sản của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác; báo cáo không trung thực tình hình tài chính và kết quả sản xuất, kinh doanh của công ty."},{"k":"p","t":"3. Trong thời hạn 60 ngày kể từ ngày có quyết định miễn nhiệm hoặc cách chức Chủ tịch và thành viên khác của Hội đồng thành viên, cơ quan đại diện chủ sở hữu xem xét, quyết định tuyển chọn, bổ nhiệm người khác thay thế."}]},{"id":"luat-59_95","no":95,"code":"Điều 95","title":"Điều 95. Chủ tịch Hội đồng thành viên","shortTitle":"Chủ tịch Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch Hội đồng thành viên do cơ quan đại diện chủ sở hữu bổ nhiệm theo quy định của pháp luật. Chủ tịch Hội đồng thành viên không được kiêm Giám đốc hoặc Tổng giám đốc của công ty và doanh nghiệp khác."},{"k":"p","t":"2. Chủ tịch Hội đồng thành viên có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Xây dựng kế hoạch hoạt động hằng quý và hằng năm của Hội đồng thành viên;"},{"k":"p","t":"b) Chuẩn bị chương trình, nội dung, tài liệu cuộc họp Hội đồng thành viên hoặc lấy ý kiến các thành viên Hội đồng thành viên;"},{"k":"p","t":"c) Triệu tập, chủ trì và làm chủ tọa cuộc họp Hội đồng thành viên hoặc tổ chức việc lấy ý kiến các thành viên Hội đồng thành viên;"},{"k":"p","t":"d) Tổ chức thực hiện quyết định của cơ quan đại diện chủ sở hữu và nghị quyết Hội đồng thành viên;"},{"k":"p","t":"đ) Tổ chức giám sát, trực tiếp giám sát và đánh giá kết quả thực hiện mục tiêu chiến lược, kết quả hoạt động của công ty, kết quả quản lý, điều hành của Giám đốc hoặc Tổng giám đốc công ty;"},{"k":"p","t":"e) Tổ chức công bố, công khai thông tin về công ty theo quy định của pháp luật; chịu trách nhiệm về tính đầy đủ, kịp thời, chính xác, trung thực và tính hệ thống của thông tin được công bố."},{"k":"p","t":"3. Ngoài trường hợp quy định tại Điều 94 của Luật này, Chủ tịch Hội đồng thành viên có thể bị miễn nhiệm, cách chức nếu không thực hiện quyền và nghĩa vụ quy định tại khoản 2 Điều này."}]},{"id":"luat-59_96","no":96,"code":"Điều 96","title":"Điều 96. Quyền và nghĩa vụ của thành viên Hội đồng thành viên","shortTitle":"Quyền và nghĩa vụ của thành viên Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Tham dự cuộc họp Hội đồng thành viên, thảo luận, kiến nghị, biểu quyết các vấn đề thuộc thẩm quyền của Hội đồng thành viên."},{"k":"p","t":"2. Kiểm tra, xem xét, tra cứu, sao chép, trích lục sổ ghi chép và theo dõi hợp đồng, giao dịch, sổ kế toán, báo cáo tài chính, sổ biên bản họp Hội đồng thành viên, các giấy tờ và tài liệu khác của công ty."},{"k":"p","t":"3. Quyền và nghĩa vụ khác theo quy định của Điều lệ công ty, Luật này và quy định khác của pháp luật có liên quan."}]},{"id":"luat-59_97","no":97,"code":"Điều 97","title":"Điều 97. Trách nhiệm của Chủ tịch và thành viên khác của Hội đồng thành viên","shortTitle":"Trách nhiệm của Chủ tịch và thành viên khác của Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Tuân thủ Điều lệ công ty, quyết định của chủ sở hữu công ty và quy định của pháp luật."}
