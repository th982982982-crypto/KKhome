n thì thành viên còn lại đương nhiên làm người đại diện cho đến khi có quyết định mới của Hội đồng thành viên."]},"luat-59_13":{"tldr":"Người đại diện theo pháp luật của doanh nghiệp phải thực hiện quyền, nghĩa vụ trung thực, cẩn trọng, trung thành với lợi ích doanh nghiệp, không lạm dụng chức vụ để tư lợi, và chịu trách nhiệm cá nhân về thiệt hại gây ra do vi phạm.","points":["Phải thực hiện quyền, nghĩa vụ được giao trung thực, cẩn trọng, tốt nhất nhằm bảo đảm lợi ích hợp pháp của doanh nghiệp; không lạm dụng địa vị, chức vụ để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác.","Phải thông báo kịp thời, đầy đủ, chính xác cho doanh nghiệp về doanh nghiệp mà mình hoặc người có liên quan làm chủ hoặc có cổ phần, phần vốn góp.","Chịu trách nhiệm cá nhân đối với thiệt hại cho doanh nghiệp do vi phạm các trách nhiệm nêu trên."]},"luat-59_14":{"tldr":"Người đại diện theo ủy quyền của chủ sở hữu, thành viên, cổ đông là tổ chức phải là cá nhân được ủy quyền bằng văn bản; số lượng người đại diện được cử tùy theo tỷ lệ sở hữu vốn hoặc cổ phần, và văn bản cử đại diện phải có đầy đủ nội dung, người đại diện phải đáp ứng tiêu chuẩn theo quy định.","points":["Tổ chức là thành viên công ty TNHH hai thành viên trở lên sở hữu ít nhất 35% vốn điều lệ có thể ủy quyền tối đa 03 người đại diện theo ủy quyền.","Tổ chức là cổ đông công ty cổ phần sở hữu ít nhất 10% tổng số cổ phần phổ thông có thể ủy quyền tối đa 03 người đại diện theo ủy quyền.","Nếu cử nhiều người đại diện mà không xác định rõ phần vốn góp hoặc số cổ phần cho từng người thì phần vốn góp, số cổ phần được chia đều cho tất cả người đại diện.","Văn bản cử người đại diện chỉ có hiệu lực với công ty kể từ ngày công ty nhận được văn bản, và phải nêu rõ thông tin chủ sở hữu, số lượng đại diện, tỷ lệ sở hữu, thông tin cá nhân và thời hạn ủy quyền của từng người."]},"luat-59_15":{"tldr":"Người đại diện theo ủy quyền nhân danh chủ sở hữu, thành viên, cổ đông thực hiện quyền, nghĩa vụ tại Hội đồng thành viên, Đại hội đồng cổ đông; phải tham dự đầy đủ cuộc họp, thực hiện trung thực, cẩn trọng và chịu trách nhiệm trước người cử đại diện nếu vi phạm.","points":["Mọi hạn chế của chủ sở hữu, thành viên, cổ đông đối với người đại diện theo ủy quyền đều không có hiệu lực đối với bên thứ ba.","Phải tham dự đầy đủ cuộc họp Hội đồng thành viên, Đại hội đồng cổ đông; thực hiện quyền, nghĩa vụ được ủy quyền trung thực, cẩn trọng, bảo vệ lợi ích hợp pháp của người cử đại diện.","Người đại diện chịu trách nhiệm trước người cử đại diện nếu vi phạm trách nhiệm; người cử đại diện chịu trách nhiệm trước bên thứ ba đối với quyền, nghĩa vụ được thực hiện thông qua người đại diện."]},"luat-59_16":{"tldr":"Luật nghiêm cấm các hành vi gây khó khăn, cản trở việc đăng ký và hoạt động của doanh nghiệp, kê khai không trung thực, kinh doanh không đăng ký hoặc trái điều kiện pháp luật, cùng các hành vi lừa đảo, rửa tiền, tài trợ khủng bố.","points":["Cấm gây chậm trễ, phiền hà, cản trở, sách nhiễu người thành lập doanh nghiệp hoặc yêu cầu nộp thêm giấy tờ trái quy định khi cấp Giấy chứng nhận đăng ký doanh nghiệp.","Cấm ngăn cản chủ sở hữu, thành viên, cổ đông của doanh nghiệp thực hiện quyền, nghĩa vụ theo Luật và Điều lệ công ty.","Cấm kinh doanh dưới hình thức doanh nghiệp mà không đăng ký, hoặc tiếp tục kinh doanh khi đã bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp hoặc đang bị tạm dừng hoạt động.","Cấm kê khai không trung thực hồ sơ đăng ký doanh nghiệp, kê khai khống vốn điều lệ, không góp đủ vốn điều lệ đã đăng ký hoặc cố ý định giá sai tài sản góp vốn.","Cấm kinh doanh ngành, nghề cấm đầu tư kinh doanh, ngành nghề chưa được tiếp cận thị trường đối với nhà đầu tư nước ngoài, hoặc kinh doanh có điều kiện khi chưa đủ điều kiện; cấm lừa đảo, rửa tiền, tài trợ khủng bố."]},"luat-59_17":{"tldr":"Tổ chức, cá nhân có quyền thành lập, quản lý doanh nghiệp và góp vốn, mua cổ phần, mua phần vốn góp tại Việt Nam, trừ những trường hợp bị Luật này cấm.","points":["Cơ quan nhà nước, đơn vị lực lượng vũ trang dùng tài sản nhà nước lập doanh nghiệp thu lợi riêng; cán bộ, công chức, viên chức; sĩ quan, quân nhân chuyên nghiệp (trừ người được cử làm đại diện quản lý vốn nhà nước) không có quyền thành lập, quản lý doanh nghiệp.","Người chưa thành niên, người bị hạn chế/mất năng lực hành vi dân sự, tổ chức không có tư cách pháp nhân, người đang bị truy cứu trách nhiệm hình sự, tạm giam, chấp hành hình phạt tù cũng không có quyền này.","Tổ chức, cá nhân thuộc đối tượng bị cấm theo Luật Cán bộ, công chức, Luật Viên chức, Luật Phòng, chống tham nhũng không được góp vốn, mua cổ phần, mua phần vốn góp.","\"Thu lợi riêng cho cơ quan, đơn vị\" là việc dùng thu nhập từ kinh doanh, góp vốn để chia cho cá nhân, bổ sung ngân sách trái quy định hoặc lập quỹ phục vụ lợi ích riêng của cơ quan, đơn vị."]},"luat-59_18":{"tldr":"Người thành lập doanh nghiệp được ký hợp đồng phục vụ việc thành lập và hoạt động của doanh nghiệp trước và trong quá trình đăng ký; trách nhiệm thực hiện hợp đồng phụ thuộc vào việc doanh nghiệp có được cấp Giấy chứng nhận đăng ký doanh nghiệp hay không.","points":["Nếu doanh nghiệp được cấp Giấy chứng nhận đăng ký doanh nghiệp, doanh nghiệp phải tiếp tục thực hiện quyền, nghĩa vụ từ hợp đồng đã ký, các bên chuyển giao quyền, nghĩa vụ theo Bộ luật Dân sự trừ khi hợp đồng có thỏa thuận khác.","Nếu doanh nghiệp không được cấp Giấy chứng nhận đăng ký doanh nghiệp, người ký hợp đồng chịu trách nhiệm thực hiện hợp đồng; nếu có người khác cùng tham gia thành lập thì liên đới chịu trách nhiệm."]},"luat-59_19":{"tldr":"Hồ sơ đăng ký doanh nghiệp tư nhân chỉ gồm Giấy đề nghị đăng ký doanh nghiệp và bản sao giấy tờ pháp lý cá nhân của chủ doanh nghiệp tư nhân.","points":["Giấy đề nghị đăng ký doanh nghiệp.","Bản sao giấy tờ pháp lý của cá nhân đối với chủ doanh nghiệp tư nhân."]},"luat-59_20":{"tldr":"Hồ sơ đăng ký công ty hợp danh gồm giấy đề nghị đăng ký, Điều lệ công ty, danh sách thành viên và các giấy tờ pháp lý liên quan.","points":["Giấy đề nghị đăng ký doanh nghiệp, Điều lệ công ty, danh sách thành viên.","Bản sao giấy tờ pháp lý của cá nhân đối với thành viên.","Bản sao Giấy chứng nhận đăng ký đầu tư đối với nhà đầu tư nước ngoài theo quy định của Luật Đầu tư."]},"luat-59_21":{"tldr":"Hồ sơ đăng ký công ty trách nhiệm hữu hạn gồm giấy đề nghị đăng ký, Điều lệ công ty, danh sách thành viên và các giấy tờ pháp lý của thành viên, người đại diện.","points":["Giấy đề nghị đăng ký doanh nghiệp, Điều lệ công ty, danh sách thành viên.","Bản sao giấy tờ pháp lý cá nhân đối với thành viên là cá nhân và người đại diện theo pháp luật.","Đối với thành viên là tổ chức: giấy tờ pháp lý của tổ chức và văn bản cử người đại diện theo ủy quyền; nếu là tổ chức nước ngoài, bản sao giấy tờ pháp lý phải được hợp pháp hóa lãnh sự.","Bản sao Giấy chứng nhận đăng ký đầu tư đối với nhà đầu tư nước ngoài theo quy định của Luật Đầu tư."]},"luat-59_22":{"tldr":"Hồ sơ đăng ký công ty cổ phần gồm giấy đề nghị đăng ký, Điều lệ công ty, danh sách cổ đông sáng lập và cổ đông nước ngoài cùng các giấy tờ pháp lý liên quan.","points":["Giấy đề nghị đăng ký doanh nghiệp, Điều lệ công ty, danh sách cổ đông sáng lập và danh sách cổ đông là nhà đầu tư nước ngoài.","Bản sao giấy tờ pháp lý cá nhân đối với cổ đông sáng lập, cổ đông nước ngoài là cá nhân và người đại diện theo pháp luật.","Đối với cổ đông là tổ chức: giấy tờ pháp lý của tổ chức và văn bản cử người đại diện theo ủy quyền; nếu là tổ chức nước ngoài phải hợp pháp hóa lãnh sự.","Bản sao Giấy chứng nhận đăng ký đầu tư đối với nhà đầu tư nước ngoài theo quy định của Luật Đầu tư."]},"luat-59_23":{"tldr":"Giấy đề nghị đăng ký doanh nghiệp phải nêu các nội dung chủ yếu về tên, địa chỉ, ngành nghề, vốn và thông tin nhân thân của người liên quan tùy loại hình doanh nghiệp.","points":["Tên doanh nghiệp, địa chỉ trụ sở chính, số điện thoại, số fax, thư điện tử (nếu có); ngành, nghề kinh doanh.","Vốn điều lệ, vốn đầu tư của chủ doanh nghiệp tư nhân; đối với công ty cổ phần còn có loại cổ phần, mệnh giá và tổng số cổ phần được quyền chào bán của từng loại.","Thông tin đăng ký thuế và số lượng lao động dự kiến.","Họ, tên, chữ ký, địa chỉ liên lạc, quốc tịch, thông tin giấy tờ pháp lý của chủ doanh nghiệp tư nhân, thành viên hợp danh, hoặc người đại diện theo pháp luật tùy theo loại hình doanh nghiệp."]},"luat-59_24":{"tldr":"Điều lệ công ty gồm Điều lệ khi đăng ký và Điều lệ sửa đổi, bổ sung, phải nêu các nội dung chủ yếu về tổ chức, vốn và quyền nghĩa vụ, đồng thời phải có chữ ký của những người theo quy định tùy từng thời điểm và loại hình doanh nghiệp.","points":["Điều lệ phải nêu các nội dung chủ yếu như tên, ngành nghề, vốn điều lệ, thông tin thành viên/cổ đông sáng lập, quyền và nghĩa vụ, cơ cấu tổ chức quản lý, người đại diện theo pháp luật, thể thức thông qua quyết định, nguyên tắc phân chia lợi nhuận và giải thể.","Điều lệ khi đăng ký doanh nghiệp phải có họ, tên và chữ ký của thành viên hợp danh, chủ sở hữu/người đại diện theo pháp luật, thành viên, hoặc cổ đông sáng lập tùy loại hình doanh nghiệp.","Điều lệ sửa đổi, bổ sung phải có họ, tên và chữ ký của Chủ tịch Hội đồng thành viên (công ty hợp danh) hoặc người đại diện theo pháp luật (công ty TNHH, công ty cổ phần)."]},"luat-59_25":{"tldr":"Danh sách thành viên công ty TNHH, công ty hợp danh và danh sách cổ đông sáng lập, cổ đông nhà đầu tư nước ngoài của công ty cổ phần phải nêu thông tin nhân thân, phần vốn góp/cổ phần và thời hạn góp vốn.","points":["Họ, tên, chữ ký, quốc tịch, địa chỉ liên lạc đối với thành viên/cổ đông là cá nhân; tên, mã số doanh nghiệp, địa chỉ trụ sở chính đối với thành viên/cổ đông là tổ chức.","Thông tin người đại diện theo pháp luật hoặc theo ủy quyền của thành viên, cổ đông là tổ chức.","Phần vốn góp, giá trị vốn góp, tỷ lệ sở hữu, loại và giá trị tài sản góp vốn, thời hạn góp vốn của từng thành viên (công ty TNHH, hợp danh) hoặc số lượng, loại cổ phần và tỷ lệ sở hữu của từng cổ đông sáng lập, cổ đông nước ngoài (công ty cổ phần)."]},"luat-59_26":{"tldr":"Người thành lập doanh nghiệp có thể đăng ký doanh nghiệp trực tiếp, qua bưu chính hoặc qua mạng thông tin điện tử; Cơ quan đăng ký kinh doanh phải xem xét và cấp đăng ký trong thời hạn 03 ngày làm việc kể từ ngày nhận hồ sơ.","points":["Ba phương thức đăng ký: trực tiếp tại Cơ quan đăng ký kinh doanh, qua dịch vụ bưu chính, hoặc qua mạng thông tin điện tử tại Cổng thông tin quốc gia về đăng ký doanh nghiệp; hồ sơ điện tử có giá trị pháp lý tương đương hồ sơ giấy.","Khi đăng ký qua mạng, có thể dùng chữ ký số hoặc tài khoản đăng ký kinh doanh do Hệ thống thông tin quốc gia về đăng ký doanh nghiệp cấp cho cá nhân.","Trong 03 ngày làm việc kể từ ngày nhận hồ sơ, Cơ quan đăng ký kinh doanh phải xem xét tính hợp lệ và cấp đăng ký, hoặc thông báo bằng văn bản nội dung cần sửa đổi, bổ sung hoặc lý do từ chối."]},"luat-59_27":{"tldr":"Doanh nghiệp được cấp Giấy chứng nhận đăng ký doanh nghiệp khi đáp ứng đủ 4 điều kiện về ngành nghề, tên gọi, hồ sơ hợp lệ và nộp đủ lệ phí; được cấp lại nếu giấy chứng nhận bị mất, hư hỏng.","points":["Ngành, nghề đăng ký kinh doanh không bị cấm đầu tư kinh doanh; tên doanh nghiệp đặt đúng quy định tại các điều 37, 38, 39 và 41.","Có hồ sơ đăng ký doanh nghiệp hợp lệ và nộp đủ lệ phí đăng ký doanh nghiệp theo quy định.","Trường hợp Giấy chứng nhận đăng ký doanh nghiệp bị mất, hư hỏng hoặc bị hủy hoại dưới hình thức khác, doanh nghiệp được cấp lại và phải nộp lệ phí."]},"luat-59_28":{"tldr":"Giấy chứng nhận đăng ký doanh nghiệp phải nêu các nội dung chủ yếu về tên, mã số doanh nghiệp, địa chỉ trụ sở, thông tin người đại diện/thành viên và vốn.","points":["Tên doanh nghiệp, mã số doanh nghiệp và địa chỉ trụ sở chính.","Thông tin cá nhân (họ tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý) của người đại diện theo pháp luật, thành viên hợp danh hoặc chủ doanh nghiệp tư nhân tùy loại hình; riêng công ty TNHH còn có thông tin thành viên là cá nhân hoặc tổ chức.","Vốn điều lệ đối với công ty, vốn đầu tư đối với doanh nghiệp tư nhân."]},"luat-59_29":{"tldr":"Mã số doanh nghiệp là dãy số do Hệ thống thông tin quốc gia về đăng ký doanh nghiệp tạo ra, cấp riêng và duy nhất cho từng doanh nghiệp, dùng để thực hiện nghĩa vụ thuế và các thủ tục khác.","points":["Mỗi doanh nghiệp có một mã số duy nhất, không được sử dụng lại để cấp cho doanh nghiệp khác, được ghi trên Giấy chứng nhận đăng ký doanh nghiệp.","Mã số doanh nghiệp dùng để thực hiện nghĩa vụ về thuế, thủ tục hành chính và các quyền, nghĩa vụ khác."]},"luat-59_30":{"tldr":"Doanh nghiệp phải đăng ký với Cơ quan đăng ký kinh doanh trong thời hạn 10 ngày kể từ khi có thay đổi nội dung Giấy chứng nhận đăng ký doanh nghiệp; cơ quan có trách nhiệm xem xét và cấp giấy chứng nhận mới trong 03 ngày làm việc.","points":["Doanh nghiệp chịu trách nhiệm đăng ký thay đổi trong thời hạn 10 ngày kể từ ngày có thay đổi.","Cơ quan đăng ký kinh doanh xem xét tính hợp lệ và cấp Giấy chứng nhận đăng ký doanh nghiệp mới trong 03 ngày làm việc kể từ ngày nhận hồ sơ, hoặc thông báo bằng văn bản nếu hồ sơ chưa hợp lệ hay bị từ chối.","Trường hợp thay đổi theo quyết định của Tòa án hoặc Trọng tài, người đề nghị phải gửi đăng ký trong 15 ngày kể từ ngày bản án, quyết định hoặc phán quyết có hiệu lực, kèm bản sao bản án, quyết định hoặc phán quyết đó."]},"luat-59_31":{"tldr":"Doanh nghiệp phải thông báo với Cơ quan đăng ký kinh doanh trong thời hạn 10 ngày kể từ khi thay đổi ngành nghề kinh doanh, cổ đông sáng lập/cổ đông nước ngoài hoặc nội dung khác trong hồ sơ đăng ký.","points":["Phải thông báo khi thay đổi: ngành, nghề kinh doanh; cổ đông sáng lập và cổ đông là nhà đầu tư nước ngoài (trừ công ty niêm yết); nội dung khác trong hồ sơ đăng ký doanh nghiệp.","Công ty cổ phần phải thông báo bằng văn bản trong 10 ngày về thay đổi cổ đông nước ngoài trong sổ đăng ký cổ đông, nêu rõ tên, mã số doanh nghiệp, thông tin cổ đông chuyển nhượng/nhận chuyển nhượng, số và loại cổ phần.","Cơ quan đăng ký kinh doanh xem xét tính hợp lệ và thực hiện thay đổi trong 03 ngày làm việc kể từ ngày nhận thông báo, hoặc thông báo bằng văn bản nếu hồ sơ chưa hợp lệ hay bị từ chối.","Trường hợp theo quyết định của Tòa án hoặc Trọng tài, tổ chức, cá nhân đề nghị phải gửi thông báo trong 10 ngày kể từ ngày bản án, quyết định hoặc phán quyết có hiệu lực."]},"luat-59_32":{"tldr":"Doanh nghiệp phải công bố công khai nội dung đăng ký doanh nghiệp trên Cổng thông tin quốc gia về đăng ký doanh nghiệp sau khi được cấp Giấy chứng nhận và mỗi khi có thay đổi.","points":["Nội dung công bố gồm nội dung Giấy chứng nhận đăng ký doanh nghiệp, ngành, nghề kinh doanh và danh sách cổ đông sáng lập/cổ đông là nhà đầu tư nước ngoài (nếu có).","Khi thay đổi nội dung đăng ký doanh nghiệp, những thay đổi tương ứng cũng phải được công bố công khai.","Doanh nghiệp phải nộp phí công bố; thời hạn thông báo công khai là 30 ngày kể từ ngày được công khai."]},"luat-59_33":{"tldr":"Tổ chức, cá nhân có quyền đề nghị cơ quan quản lý cung cấp thông tin đăng ký doanh nghiệp lưu giữ trên Hệ thống thông tin quốc gia và phải nộp phí; cơ quan quản lý có nghĩa vụ cung cấp đầy đủ, kịp thời.","points":["Tổ chức, cá nhân được quyền đề nghị cung cấp thông tin và phải nộp phí theo quy định của pháp luật.","Cơ quan quản lý nhà nước về đăng ký kinh doanh và Cơ quan đăng ký kinh doanh có nghĩa vụ cung cấp đầy đủ và kịp thời thông tin theo yêu cầu."]},"luat-59_34":{"tldr":"Tài sản góp vốn có thể là Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng, quyền sử dụng đất, quyền sở hữu trí tuệ, công nghệ, bí quyết kỹ thuật hoặc tài sản khác định giá được bằng Đồng Việt Nam; chỉ chủ sở hữu hoặc người có quyền sử dụng hợp pháp mới được dùng tài sản đó góp vốn.","points":["Liệt kê các loại tài sản được coi là tài sản góp vốn hợp lệ.","Chỉ cá nhân, tổ chức là chủ sở hữu hợp pháp hoặc có quyền sử dụng hợp pháp đối với tài sản mới có quyền dùng tài sản đó để góp vốn."]},"luat-59_35":{"tldr":"Thành viên, cổ đông phải chuyển quyền sở hữu tài sản góp vốn cho công ty theo thủ tục tương ứng với từng loại tài sản; việc góp vốn chỉ được coi là thanh toán xong khi quyền sở hữu đã chuyển sang công ty.","points":["Tài sản có đăng ký quyền sở hữu hoặc quyền sử dụng đất phải làm thủ tục chuyển quyền cho công ty và không phải chịu lệ phí trước bạ; tài sản không đăng ký quyền sở hữu thì góp vốn bằng giao nhận có biên bản, trừ trường hợp qua tài khoản.","Biên bản giao nhận tài sản góp vốn phải nêu tên, địa chỉ công ty, thông tin người góp vốn, loại và giá trị tài sản, tỷ lệ trong vốn điều lệ, ngày giao nhận và chữ ký các bên.","Tài sản dùng cho hoạt động kinh doanh của chủ doanh nghiệp tư nhân không phải làm thủ tục chuyển quyền sở hữu cho doanh nghiệp.","Việc thanh toán mua, bán, chuyển nhượng cổ phần, phần vốn góp, nhận cổ tức và chuyển lợi nhuận ra nước ngoài của nhà đầu tư nước ngoài phải thực hiện qua tài khoản theo pháp luật về quản lý ngoại hối, trừ thanh toán bằng tài sản và hình thức phi tiền mặt khác."]},"luat-59_36":{"tldr":"Tài sản góp vốn không phải là Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng phải được định giá bằng Đồng Việt Nam theo nguyên tắc đồng thuận hoặc do tổ chức thẩm định giá thực hiện; nếu định giá cao hơn giá trị thực tế thì người liên quan phải liên đới góp thêm phần chênh lệch.","points":["Khi thành lập doanh nghiệp, tài sản góp vốn do thành viên, cổ đông sáng lập định giá theo nguyên tắc đồng thuận hoặc do tổ chức thẩm định giá định giá; nếu do tổ chức thẩm định giá thực hiện, giá trị phải được trên 50% số thành viên, cổ đông sáng lập chấp thuận.","Nếu định giá cao hơn giá trị thực tế tại thời điểm góp vốn, các thành viên, cổ đông sáng lập cùng liên đới góp thêm bằng số chênh lệch và liên đới chịu trách nhiệm về thiệt hại do cố ý định giá cao hơn thực tế.","Trong quá trình hoạt động, việc định giá do chủ sở hữu, Hội đồng thành viên/Hội đồng quản trị và người góp vốn thỏa thuận hoặc do tổ chức thẩm định giá thực hiện, áp dụng nguyên tắc liên đới góp thêm chênh lệch tương tự nếu định giá cao hơn thực tế."]},"luat-59_37":{"tldr":"Tên tiếng Việt của doanh nghiệp gồm hai thành tố là loại hình doanh nghiệp và tên riêng, phải được gắn tại trụ sở và thể hiện trên giấy tờ giao dịch, hồ sơ, ấn phẩm của doanh nghiệp.","points":["Loại hình doanh nghiệp viết theo quy định, ví dụ \"công ty trách nhiệm hữu hạn\"/\"công ty TNHH\", \"công ty cổ phần\"/\"công ty CP\", \"công ty hợp danh\"/\"công ty HD\", \"doanh nghiệp tư nhân\"/\"DNTN\".","Tên riêng viết bằng chữ cái trong bảng chữ cái tiếng Việt, các chữ F, J, Z, W, chữ số và ký hiệu.","Tên doanh nghiệp phải được gắn tại trụ sở chính, chi nhánh, văn phòng đại diện, địa điểm kinh doanh và in hoặc viết trên giấy tờ giao dịch, hồ sơ tài liệu, ấn phẩm do doanh nghiệp phát hành.","Cơ quan đăng ký kinh doanh có quyền từ chối chấp thuận tên dự kiến đăng ký nếu không đúng quy định tại Điều 37, 38, 39 và 41."]},"luat-59_38":{"tldr":"Luật cấm đặt tên doanh nghiệp trùng hoặc gây nhầm lẫn với doanh nghiệp đã đăng ký, cấm dùng tên cơ quan nhà nước, tổ chức chính trị - xã hội khi chưa được chấp thuận, và cấm dùng từ ngữ, ký hiệu vi phạm truyền thống văn hóa, đạo đức, thuần phong mỹ tục.","points":["Cấm đặt tên trùng hoặc tên gây nhầm lẫn với tên doanh nghiệp đã đăng ký theo quy định tại Điều 41.","Cấm dùng tên cơ quan nhà nước, đơn vị lực lượng vũ trang nhân dân, tổ chức chính trị, tổ chức chính trị - xã hội... làm toàn bộ hoặc một phần tên riêng, trừ khi được cơ quan, đơn vị hoặc tổ chức đó chấp thuận.","Cấm sử dụng từ ngữ, ký hiệu vi phạm truyền thống lịch sử, văn hóa, đạo đức và thuần phong mỹ tục của dân tộc."]},"luat-59_39":{"tldr":"Tên doanh nghiệp bằng tiếng nước ngoài là tên dịch từ tên tiếng Việt sang tiếng hệ chữ La-tinh, phải in với khổ chữ nhỏ hơn tên tiếng Việt; tên viết tắt được viết tắt từ tên tiếng Việt hoặc tên nước ngoài.","points":["Khi dịch sang tiếng nước ngoài, tên riêng của doanh nghiệp có thể giữ nguyên hoặc dịch theo nghĩa tương ứng.","Tên bằng tiếng nước ngoài phải in hoặc viết với khổ chữ nhỏ hơn tên tiếng Việt tại trụ sở, chi nhánh, văn phòng đại diện, địa điểm kinh doanh và trên giấy tờ giao dịch, hồ sơ, ấn phẩm.","Tên viết tắt của doanh nghiệp được viết tắt từ tên tiếng Việt hoặc tên bằng tiếng nước ngoài."]},"luat-59_40":{"tldr":"Tên chi nhánh, văn phòng đại diện, địa điểm kinh doanh phải bao gồm tên doanh nghiệp kèm theo cụm từ tương ứng và tuân theo quy định về chữ viết, cách gắn tại trụ sở.","points":["Viết bằng chữ cái trong bảng chữ cái tiếng Việt, các chữ F, J, Z, W, chữ số và ký hiệu.","Phải bao gồm tên doanh nghiệp kèm theo cụm từ \"Chi nhánh\", \"Văn phòng đại diện\" hoặc \"Địa điểm kinh doanh\" tương ứng.","Phải được viết hoặc gắn tại trụ sở chi nhánh, văn phòng đại diện, địa điểm kinh doanh; tên chi nhánh, văn phòng đại diện in hoặc viết khổ chữ nhỏ hơn tên tiếng Việt của doanh nghiệp trên giấy tờ giao dịch, hồ sơ, ấn phẩm."]},"luat-59_41":{"tldr":"Tên trùng là tên tiếng Việt viết hoàn toàn giống tên doanh nghiệp đã đăng ký; Luật liệt kê các trường hợp cụ thể được coi là tên gây nhầm lẫn, không áp dụng một số trường hợp đối với công ty con.","points":["Tên gây nhầm lẫn gồm: đọc giống tên đã đăng ký, tên viết tắt trùng, tên bằng tiếng nước ngoài trùng, hoặc tên riêng trùng hoàn toàn với doanh nghiệp cùng loại đã đăng ký.","Cũng bị coi là gây nhầm lẫn nếu tên riêng chỉ khác bởi một số tự nhiên/số thứ tự/chữ cái (kể cả F, J, Z, W) viết liền hoặc cách sau tên riêng, bởi ký hiệu như \"&\", \".\", \",\", \"+\", \"-\", \"_\", bởi từ \"tân\"/\"mới\", hoặc bởi cụm từ chỉ miền (Bắc, Nam, Trung, Tây, Đông).","Các trường hợp khác biệt bởi số/chữ cái/ký hiệu nêu trên, từ \"tân\"/\"mới\", cụm từ chỉ miền, hoặc trùng tên riêng không áp dụng đối với công ty con của công ty đã đăng ký."]},"luat-59_42":{"tldr":"Trụ sở chính của doanh nghiệp phải đặt trên lãnh thổ Việt Nam, là địa chỉ liên lạc và được xác định theo địa giới đơn vị hành chính, kèm số điện thoại, fax, thư điện tử nếu có.","points":["Trụ sở chính đặt trên lãnh thổ Việt Nam và được xác định theo địa giới đơn vị hành chính.","Là địa chỉ liên lạc của doanh nghiệp, có số điện thoại, số fax và thư điện tử (nếu có)."]},"luat-59_43":{"tldr":"Dấu của doanh nghiệp gồm dấu khắc hoặc chữ ký số; doanh nghiệp tự quyết định loại, số lượng, hình thức, nội dung dấu và tự quản lý, lưu giữ dấu theo Điều lệ hoặc quy chế nội bộ.","points":["Dấu bao gồm dấu làm tại cơ sở khắc dấu hoặc dấu dưới hình thức chữ ký số theo pháp luật về giao dịch điện tử.","Doanh nghiệp quyết định loại dấu, số lượng, hình thức và nội dung dấu của doanh nghiệp, chi nhánh, văn phòng đại diện và đơn vị khác.","Việc quản lý, lưu giữ dấu thực hiện theo Điều lệ công ty hoặc quy chế do doanh nghiệp, chi nhánh, văn phòng đại diện hoặc đơn vị có dấu ban hành."]},"luat-59_44":{"tldr":"Chi nhánh, văn phòng đại diện là các đơn vị phụ thuộc của doanh nghiệp với chức năng khác nhau, còn địa điểm kinh doanh là nơi doanh nghiệp trực tiếp tiến hành hoạt động kinh doanh cụ thể.","points":["Chi nhánh thực hiện toàn bộ hoặc một phần chức năng của doanh nghiệp, kể cả chức năng đại diện theo ủy quyền; ngành, nghề kinh doanh của chi nhánh phải đúng với ngành, nghề kinh doanh của doanh nghiệp.","Văn phòng đại diện chỉ thực hiện nhiệm vụ đại diện theo ủy quyền cho lợi ích của doanh nghiệp và bảo vệ các lợi ích đó, không thực hiện chức năng kinh doanh.","Địa điểm kinh doanh là nơi doanh nghiệp tiến hành hoạt động kinh doanh cụ thể."]},"luat-59_45":{"tldr":"Doanh nghiệp có quyền thành lập chi nhánh, văn phòng đại diện ở trong nước và nước ngoài; phải đăng ký hoạt động chi nhánh, văn phòng đại diện với Cơ quan đăng ký kinh doanh và thông báo địa điểm kinh doanh trong các thời hạn quy định.","points":["Doanh nghiệp có thể đặt một hoặc nhiều chi nhánh, văn phòng đại diện tại một địa phương theo địa giới đơn vị hành chính.","Hồ sơ đăng ký hoạt động chi nhánh, văn phòng đại diện trong nước gồm thông báo thành lập, bản sao quyết định và biên bản họp thành lập, bản sao giấy tờ pháp lý của người đứng đầu.","Cơ quan đăng ký kinh doanh xem xét tính hợp lệ và cấp Giấy chứng nhận đăng ký hoạt động trong 03 ngày làm việc kể từ ngày nhận hồ sơ.","Doanh nghiệp phải đăng ký thay đổi nội dung đăng ký hoạt động chi nhánh, văn phòng đại diện trong 10 ngày kể từ ngày có thay đổi, và thông báo địa điểm kinh doanh trong 10 ngày kể từ ngày quyết định địa điểm kinh doanh."]},"luat-59_46":{"tldr":"Công ty trách nhiệm hữu hạn hai thành viên trở lên là doanh nghiệp có từ 02 đến 50 thành viên, có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp, thành viên chịu trách nhiệm hữu hạn trong phạm vi vốn đã góp.","points":["Có từ 02 đến 50 thành viên là tổ chức, cá nhân; thành viên chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác trong phạm vi số vốn đã góp, trừ trường hợp quy định tại khoản 4 Điều 47.","Phần vốn góp của thành viên chỉ được chuyển nhượng theo quy định tại các Điều 51, 52 và 53.","Có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp.","Không được phát hành cổ phần, trừ trường hợp chuyển đổi thành công ty cổ phần; được phát hành trái phiếu theo quy định của Luật này và pháp luật liên quan."]},"luat-59_47":{"tldr":"Thành viên phải góp đủ, đúng loại tài sản đã cam kết trong thời hạn 90 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp; nếu chưa góp đủ thì bị xử lý theo quy định và công ty phải đăng ký thay đổi vốn điều lệ.","points":["Vốn điều lệ là tổng giá trị phần vốn góp các thành viên cam kết, ghi trong Điều lệ công ty; thời hạn góp vốn là 90 ngày kể từ ngày cấp Giấy chứng nhận đăng ký doanh nghiệp.","Chỉ được góp vốn bằng tài sản khác với tài sản đã cam kết nếu được trên 50% số thành viên còn lại tán thành.","Sau thời hạn góp vốn: thành viên chưa góp vốn đương nhiên không còn là thành viên; thành viên góp thiếu chỉ có quyền tương ứng phần đã góp; phần chưa góp được chào bán theo nghị quyết của Hội đồng thành viên.","Công ty phải đăng ký thay đổi vốn điều lệ, tỷ lệ phần vốn góp trong thời hạn 30 ngày kể từ ngày cuối cùng phải góp đủ vốn.","Khi góp đủ phần vốn góp, công ty phải cấp giấy chứng nhận phần vốn góp cho thành viên tương ứng giá trị đã góp."]},"luat-59_48":{"tldr":"Công ty phải lập sổ đăng ký thành viên ngay sau khi được cấp Giấy chứng nhận đăng ký doanh nghiệp để ghi nhận thông tin sở hữu phần vốn góp của các thành viên và lưu giữ tại trụ sở chính.","points":["Sổ đăng ký thành viên có thể là văn bản giấy hoặc tập hợp dữ liệu điện tử.","Phải bao gồm thông tin về công ty, thành viên, phần vốn góp, thời điểm và loại tài sản góp vốn, chữ ký, số và ngày cấp giấy chứng nhận phần vốn góp.","Công ty phải cập nhật kịp thời thay đổi thành viên; sổ đăng ký thành viên được lưu giữ tại trụ sở chính của công ty."]},"luat-59_49":{"tldr":"Thành viên Hội đồng thành viên có các quyền cơ bản như tham dự họp, biểu quyết, chia lợi nhuận, định đoạt phần vốn góp; thành viên hoặc nhóm thành viên sở hữu từ 10% vốn điều lệ trở lên có thêm quyền kiểm tra, triệu tập họp và khởi kiện.","points":["Quyền cơ bản gồm: tham dự họp và biểu quyết theo tỷ lệ vốn góp, chia lợi nhuận và tài sản còn lại tương ứng phần vốn góp, ưu tiên góp thêm vốn, chuyển nhượng/tặng cho vốn góp, khởi kiện người quản lý theo Điều 72.","Thành viên/nhóm thành viên sở hữu từ 10% vốn điều lệ trở lên (hoặc tỷ lệ khác theo Điều lệ) có quyền yêu cầu triệu tập họp, kiểm tra sổ sách, và yêu cầu Tòa án hủy nghị quyết trong thời hạn 90 ngày kể từ ngày kết thúc họp nếu có vi phạm.","Trường hợp một thành viên sở hữu trên 90% vốn điều lệ và Điều lệ không quy định tỷ lệ khác, nhóm thành viên còn lại đương nhiên có các quyền như nhóm sở hữu từ 10%."]},"luat-59_50":{"tldr":"Thành viên phải góp đủ, đúng hạn vốn cam kết, không được tùy tiện rút vốn, tuân thủ Điều lệ và chấp hành nghị quyết của Hội đồng thành viên, đồng thời chịu trách nhiệm cá nhân khi nhân danh công ty thực hiện hành vi vi phạm.","points":["Góp đủ, đúng hạn số vốn đã cam kết và chịu trách nhiệm về nợ, nghĩa vụ tài sản trong phạm vi vốn đã góp.","Không được rút vốn đã góp dưới mọi hình thức, trừ trường hợp quy định tại các Điều 51, 52, 53 và 68.","Chịu trách nhiệm cá nhân khi nhân danh công ty vi phạm pháp luật, kinh doanh không vì lợi ích công ty gây thiệt hại cho người khác, hoặc thanh toán nợ chưa đến hạn trước nguy cơ tài chính."]},"luat-59_51":{"tldr":"Thành viên bỏ phiếu không tán thành một số nghị quyết quan trọng có quyền yêu cầu công ty mua lại phần vốn góp của mình theo giá thị trường hoặc theo nguyên tắc quy định tại Điều lệ.","points":["Áp dụng khi không tán thành nghị quyết sửa đổi Điều lệ liên quan quyền/nghĩa vụ thành viên, tổ chức lại công ty, hoặc trường hợp khác theo Điều lệ.","Yêu cầu phải bằng văn bản, gửi đến công ty trong thời hạn 15 ngày kể từ ngày thông qua nghị quyết.","Công ty phải mua lại trong thời hạn 15 ngày kể từ ngày nhận yêu cầu, chỉ thanh toán nếu sau khi thanh toán vẫn đủ khả năng thanh toán các khoản nợ và nghĩa vụ tài sản khác.","Nếu công ty không thanh toán được, thành viên đó có quyền tự do chuyển nhượng phần vốn góp của mình cho thành viên khác hoặc người không phải là thành viên."]},"luat-59_52":{"tldr":"Thành viên có quyền chuyển nhượng phần vốn góp nhưng phải ưu tiên chào bán cho các thành viên còn lại trước khi chuyển nhượng cho người ngoài công ty.","points":["Phải chào bán phần vốn góp cho các thành viên còn lại theo tỷ lệ vốn góp của họ với cùng điều kiện chào bán.","Chỉ được chuyển nhượng cho người không phải thành viên với cùng điều kiện đó nếu các thành viên còn lại không mua hoặc không mua hết trong thời hạn 30 ngày kể từ ngày chào bán.","Thành viên chuyển nhượng vẫn giữ quyền, nghĩa vụ cho đến khi thông tin về người mua được ghi đầy đủ vào sổ đăng ký thành viên.","Nếu việc chuyển nhượng dẫn đến chỉ còn một thành viên, công ty phải chuyển sang loại hình TNHH một thành viên và đăng ký thay đổi trong 15 ngày kể từ ngày hoàn thành chuyển nhượng."]},"luat-59_53":{"tldr":"Điều luật quy định cách xử lý phần vốn góp của thành viên trong các tình huống đặc biệt như chết, mất tích, hạn chế năng lực hành vi dân sự, tổ chức giải thể/phá sản, tặng cho, dùng vốn góp trả nợ, hoặc bị hạn chế quyền theo quyết định của Tòa án.","points":["Thành viên cá nhân chết: người thừa kế theo di chúc hoặc pháp luật trở thành thành viên công ty; nếu không có/từ chối/bị truất quyền thừa kế thì giải quyết theo pháp luật dân sự. Thành viên mất tích hoặc bị hạn chế/mất năng lực hành vi dân sự: quyền và nghĩa vụ được thực hiện thông qua người quản lý tài sản hoặc người đại diện.","Phần vốn góp được công ty mua lại hoặc chuyển nhượng theo Điều 51, 52 khi người thừa kế không muốn làm thành viên, người được tặng cho không được Hội đồng thành viên chấp thuận, hoặc thành viên là tổ chức giải thể/phá sản.","Tặng cho vốn góp: người thuộc diện thừa kế theo pháp luật đương nhiên là thành viên; người khác chỉ trở thành thành viên khi được Hội đồng thành viên chấp thuận.","Dùng vốn góp trả nợ: người nhận thanh toán có thể trở thành thành viên (nếu được chấp thuận) hoặc chào bán, chuyển nhượng phần vốn góp theo Điều 52.","Thành viên cá nhân bị tạm giam, chấp hành hình phạt tù hoặc biện pháp xử lý hành chính bắt buộc phải ủy quyền cho người khác thực hiện quyền, nghĩa vụ tại công ty."]},"luat-59_54":{"tldr":"Công ty TNHH hai thành viên trở lên có Hội đồng thành viên, Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc; một số trường hợp phải thành lập Ban kiểm soát và phải có ít nhất một người đại diện theo pháp luật.","points":["Cơ cấu tổ chức gồm Hội đồng thành viên, Chủ tịch Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc.","Doanh nghiệp nhà nước theo điểm b khoản 1 Điều 88 và công ty con của doanh nghiệp nhà nước phải thành lập Ban kiểm soát; trường hợp khác do công ty quyết định.","Công ty phải có ít nhất một người đại diện theo pháp luật; nếu Điều lệ không quy định thì Chủ tịch Hội đồng thành viên là người đại diện theo pháp luật của công ty."]},"luat-59_55":{"tldr":"Hội đồng thành viên là cơ quan quyết định cao nhất của công ty, gồm tất cả thành viên, họp ít nhất mỗi năm một lần và có thẩm quyền quyết định các vấn đề quan trọng của công ty.","points":["Bao gồm tất cả thành viên cá nhân và người đại diện theo ủy quyền của thành viên tổ chức; kỳ họp do Điều lệ quy định nhưng ít nhất mỗi năm phải họp một lần.","Quyết định chiến lược phát triển, kế hoạch kinh doanh hằng năm, tăng/giảm vốn điều lệ, phát hành trái phiếu, dự án đầu tư phát triển.","Thông qua hợp đồng vay, cho vay, bán tài sản và hợp đồng khác có giá trị từ 50% tổng giá trị tài sản trở lên (theo báo cáo tài chính gần nhất) hoặc tỷ lệ/giá trị khác theo Điều lệ.","Bầu, miễn nhiệm, bãi nhiệm Chủ tịch Hội đồng thành viên; quyết định bổ nhiệm Giám đốc/Tổng giám đốc và các chức danh quản lý khác; quyết định tổ chức lại, giải thể hoặc yêu cầu phá sản công ty."]},"luat-59_56":{"tldr":"Chủ tịch Hội đồng thành viên do Hội đồng thành viên bầu, có nhiệm kỳ tối đa 05 năm, chịu trách nhiệm chuẩn bị, triệu tập, chủ trì họp và giám sát việc thực hiện nghị quyết.","points":["Chủ tịch Hội đồng thành viên có thể kiêm Giám đốc hoặc Tổng giám đốc công ty.","Nhiệm kỳ do Điều lệ công ty quy định nhưng không quá 05 năm, có thể được bầu lại với số nhiệm kỳ không hạn chế.","Khi vắng mặt hoặc không thể thực hiện quyền, nghĩa vụ, phải ủy quyền bằng văn bản cho một thành viên; nếu không có người được ủy quyền hoặc Chủ tịch chết, mất tích, bị tạm giam, bị Tòa án cấm đảm nhiệm chức vụ... thì các thành viên còn lại bầu người tạm thời làm Chủ tịch theo nguyên tắc đa số tán thành."]},"luat-59_57":{"tldr":"Hội đồng thành viên được triệu tập theo yêu cầu của Chủ tịch hoặc thành viên/nhóm thành viên đủ điều kiện, với các quy định cụ thể về nội dung kiến nghị, thông báo mời họp, thời hạn gửi tài liệu và trách nhiệm nếu không triệu tập họp.","points":["Nếu Chủ tịch không triệu tập họp trong 15 ngày kể từ ngày nhận yêu cầu của thành viên/nhóm thành viên, thành viên/nhóm thành viên đó được tự triệu tập; chi phí hợp lý được công ty hoàn lại.","Tài liệu họp liên quan đến sửa đổi Điều lệ, chiến lược phát triển, báo cáo tài chính hằng năm, tổ chức lại hoặc giải thể công ty phải gửi cho thành viên chậm nhất 07 ngày làm việc trước ngày họp.","Yêu cầu triệu tập họp không đủ nội dung theo quy định thì Chủ tịch phải thông báo từ chối bằng văn bản trong 07 ngày làm việc; trường hợp khác phải triệu tập họp trong 15 ngày kể từ ngày nhận yêu cầu.","Chủ tịch Hội đồng thành viên không triệu tập họp theo đúng quy định phải chịu trách nhiệm cá nhân về thiệt hại xảy ra đối với công ty và thành viên liên quan."]},"luat-59_58":{"tldr":"Cuộc họp Hội đồng thành viên hợp lệ khi có số thành viên dự họp sở hữu từ 65% vốn điều lệ trở lên; nếu không đủ điều kiện thì có quy định triệu tập họp lần hai, lần ba với tỷ lệ giảm dần.","points":["Họp lần thứ nhất cần số thành viên dự họp sở hữu từ 65% vốn điều lệ trở lên (trừ Điều lệ quy định khác).","Họp lần thứ hai (thông báo mời họp trong 15 ngày kể từ ngày dự định họp lần một) cần số thành viên dự họp sở hữu từ 50% vốn điều lệ trở lên.","Họp lần thứ ba (thông báo mời họp trong 10 ngày kể từ ngày dự định họp lần hai) được tiến hành không phụ thuộc số thành viên và vốn điều lệ dự họp.","Cuộc họp có thể kéo dài nếu chưa hoàn thành chương trình, nhưng không quá 30 ngày kể từ ngày khai mạc."]},"luat-59_59":{"tldr":"Nghị quyết, quyết định của Hội đồng thành viên được thông qua bằng biểu quyết tại cuộc họp hoặc lấy ý kiến bằng văn bản, với tỷ lệ tán thành tối thiểu 65% hoặc 75% tùy nội dung vấn đề.","points":["Một số vấn đề quan trọng (sửa Điều lệ, phương hướng phát triển, bầu/miễn nhiệm chức danh, thông qua báo cáo tài chính, tổ chức lại/giải thể) phải thông qua bằng biểu quyết tại cuộc họp nếu Điều lệ không quy định khác.","Thông qua tại cuộc họp cần từ 65% tổng vốn góp của thành viên dự họp tán thành; riêng nghị quyết bán tài sản lớn, sửa Điều lệ, tổ chức lại/giải thể cần từ 75% tán thành.","Thành viên được coi là tham dự và biểu quyết qua nhiều hình thức: trực tiếp, ủy quyền, họp trực tuyến/bỏ phiếu điện tử, hoặc gửi phiếu qua thư/fax/email.","Hình thức lấy ý kiến bằng văn bản được thông qua khi có từ 65% vốn điều lệ trở lên tán thành."]},"luat-59_60":{"tldr":"Cuộc họp Hội đồng thành viên phải được ghi biên bản với các nội dung chủ yếu theo quy định và phải được thông qua ngay trước khi kết thúc cuộc họp.","points":["Biên bản phải gồm: thời gian, địa điểm, mục đích, chương trình họp; thông tin thành viên dự và không dự họp; nội dung thảo luận, biểu quyết và kết quả biểu quyết; chữ ký người ghi biên bản và chủ tọa.","Nếu chủ tọa hoặc người ghi biên bản từ chối ký, biên bản vẫn có hiệu lực nếu được tất cả thành viên khác tham dự họp ký và có đủ nội dung theo quy định."]},"luat-59_61":{"tldr":"Điều luật quy định trình tự lấy ý kiến thành viên bằng văn bản để thông qua nghị quyết, quyết định của Hội đồng thành viên khi Điều lệ công ty không có quy định khác.","points":["Chủ tịch Hội đồng thành viên quyết định việc lấy ý kiến và tổ chức soạn thảo, gửi báo cáo, tờ trình, phiếu lấy ý kiến đến các thành viên.","Phiếu lấy ý kiến phải có đầy đủ thông tin về công ty, thành viên, vấn đề cần lấy ý kiến và thời hạn cuối cùng gửi lại phiếu.","Chủ tịch tổ chức kiểm phiếu và thông báo kết quả trong 07 ngày làm việc kể từ ngày kết thúc thời hạn gửi ý kiến; báo cáo kết quả kiểm phiếu có giá trị tương đương biên bản họp."]},"luat-59_62":{"tldr":"Nghị quyết, quyết định của Hội đồng thành viên có hiệu lực kể từ ngày thông qua hoặc ngày ghi trong văn bản, và vẫn có hiệu lực thi hành cho đến khi bị Tòa án hoặc Trọng tài hủy bỏ.","points":["Nghị quyết, quyết định được thông qua bằng 100% tổng số vốn điều lệ vẫn hợp pháp và có hiệu lực dù trình tự, thủ tục thông qua không đúng quy định.","Khi có yêu cầu hủy bỏ tại Tòa án hoặc Trọng tài, nghị quyết vẫn có hiệu lực thi hành cho đến khi có quyết định hủy bỏ có hiệu lực pháp luật, trừ trường hợp áp dụng biện pháp khẩn cấp tạm thời."]},"luat-59_63":{"tldr":"Giám đốc hoặc Tổng giám đốc là người điều hành hoạt động kinh doanh hằng ngày của công ty, chịu trách nhiệm trước Hội đồng thành viên, với các quyền và nghĩa vụ cụ thể được liệt kê.","points":["Tổ chức thực hiện nghị quyết, quyết định của Hội đồng thành viên; quyết định vấn đề kinh doanh hằng ngày; ban hành quy chế quản lý nội bộ (trừ Điều lệ quy định khác).","Bổ nhiệm, miễn nhiệm người quản lý (trừ chức danh thuộc thẩm quyền Hội đồng thành viên); ký kết hợp đồng nhân danh công ty; tuyển dụng lao động.","Trình báo cáo tài chính hằng năm và kiến nghị phương án sử dụng, phân chia lợi nhuận hoặc xử lý lỗ lên Hội đồng thành viên."]},"luat-59_64":{"tldr":"Giám đốc, Tổng giám đốc phải không thuộc đối tượng bị cấm quản lý doanh nghiệp và có trình độ chuyên môn, kinh nghiệm quản trị phù hợp; đối với doanh nghiệp nhà nước có thêm điều kiện về quan hệ gia đình.","points":["Không thuộc đối tượng cấm quản lý doanh nghiệp quy định tại khoản 2 Điều 17.","Có trình độ chuyên môn, kinh nghiệm quản trị kinh doanh của công ty và điều kiện khác theo Điều lệ công ty.","Với doanh nghiệp nhà nước theo điểm b khoản 1 Điều 88 và công ty con của doanh nghiệp nhà nước, Giám đốc/Tổng giám đốc không được có quan hệ gia đình với người quản lý, Kiểm soát viên của công ty/công ty mẹ, hoặc người đại diện phần vốn nhà nước."]},"luat-59_65":{"tldr":"Ban kiểm soát có từ 01 đến 05 Kiểm soát viên với nhiệm kỳ tối đa 05 năm; tiêu chuẩn, quyền và nghĩa vụ được áp dụng tương ứng theo các điều khác của Luật.","points":["Ban kiểm soát có từ 01 đến 05 Kiểm soát viên, nhiệm kỳ không quá 05 năm, có thể được bổ nhiệm lại không hạn chế số nhiệm kỳ; nếu chỉ có 01 Kiểm soát viên thì đồng thời là Trưởng Ban kiểm soát.","Tiêu chuẩn, điều kiện áp dụng theo khoản 2 Điều 168 và Điều 169; quyền, nghĩa vụ, trách nhiệm, miễn nhiệm/bãi nhiệm áp dụng theo các Điều 106, 170, 171, 172, 173 và 174.","Chính phủ quy định chi tiết Điều này."]},"luat-59_66":{"tldr":"Công ty trả lương, thù lao, thưởng cho Chủ tịch Hội đồng thành viên, Giám đốc/Tổng giám đốc và người quản lý khác theo kết quả kinh doanh, khoản này được tính vào chi phí kinh doanh và phải thể hiện thành mục riêng trong báo cáo tài chính.","points":["Trả theo kết quả và hiệu quả kinh doanh của công ty.","Được tính vào chi phí kinh doanh theo quy định của pháp luật về thuế thu nhập doanh nghiệp và phải thể hiện thành mục riêng trong báo cáo tài chính hằng năm."]},"luat-59_67":{"tldr":"Hợp đồng, giao dịch giữa công ty với thành viên, người quản lý và người có liên quan phải được Hội đồng thành viên chấp thuận; nếu ký kết không đúng quy định có thể bị Tòa án tuyên vô hiệu.","points":["Áp dụng với thành viên, người đại diện theo ủy quyền của thành viên, Giám đốc/Tổng giám đốc, người đại diện pháp luật, người có liên quan của họ, người quản lý công ty mẹ và người liên quan của người quản lý công ty mẹ.","Người ký kết phải thông báo cho Hội đồng thành viên, Kiểm soát viên; Hội đồng thành viên phải quyết định chấp thuận hoặc không trong 15 ngày kể từ ngày nhận thông báo (trừ Điều lệ quy định khác); thành viên có liên quan không được biểu quyết.","Hợp đồng, giao dịch ký kết không đúng quy định bị vô hiệu theo quyết định của Tòa án; người liên quan phải bồi thường thiệt hại và hoàn trả cho công ty các khoản lợi thu được."]},"luat-59_68":{"tldr":"Công ty có thể tăng vốn điều lệ qua tăng vốn góp thành viên hoặc tiếp nhận thành viên mới, và giảm vốn điều lệ trong các trường hợp hoàn trả vốn góp, mua lại phần vốn góp hoặc do góp vốn không đủ.","points":["Tăng vốn điều lệ bằng cách tăng vốn góp của thành viên hiện hữu (chia theo tỷ lệ vốn góp) hoặc tiếp nhận thêm vốn góp của thành viên mới.","Giảm vốn điều lệ khi: hoàn trả một phần vốn góp nếu công ty đã hoạt động liên tục từ 02 năm trở lên và bảo đảm thanh toán đủ nợ; công ty mua lại phần vốn góp theo Điều 51; hoặc vốn điều lệ không được thanh toán đầy đủ, đúng hạn theo Điều 47.","Trừ trường hợp giảm vốn do góp thiếu, công ty phải thông báo bằng văn bản về việc tăng/giảm vốn điều lệ đến Cơ quan đăng ký kinh doanh trong 10 ngày kể từ ngày thanh toán xong.","Cơ quan đăng ký kinh doanh cập nhật thông tin trong thời hạn 03 ngày làm việc kể từ ngày nhận được thông báo."]},"luat-59_69":{"tldr":"Công ty chỉ được chia lợi nhuận cho thành viên sau khi đã hoàn thành nghĩa vụ thuế, các nghĩa vụ tài chính khác và bảo đảm thanh toán đủ nợ đến hạn sau khi chia.","points":["Phải hoàn thành nghĩa vụ thuế và các nghĩa vụ tài chính khác theo quy định pháp luật trước khi chia lợi nhuận.","Phải bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác đến hạn trả sau khi chia lợi nhuận."]},"luat-59_70":{"tldr":"Nếu hoàn trả vốn góp hoặc chia lợi nhuận trái quy định, các thành viên phải hoàn trả lại cho công ty và cùng liên đới chịu trách nhiệm về nợ của công ty tương ứng với phần chưa hoàn trả.","points":["Áp dụng khi hoàn trả một phần vốn góp trái quy định tại khoản 3 Điều 68 hoặc chia lợi nhuận trái quy định tại Điều 69.","Thành viên phải hoàn trả cho công ty số tiền, tài sản đã nhận và liên đới chịu trách nhiệm về các khoản nợ, nghĩa vụ tài sản khác tương ứng phần chưa hoàn trả đủ cho đến khi hoàn trả đủ."]},"luat-59_71":{"tldr":"Người quản lý công ty (Chủ tịch Hội đồng thành viên, Giám đốc/Tổng giám đốc, người đại diện pháp luật, Kiểm soát viên) phải thực hiện quyền, nghĩa vụ trung thực, cẩn trọng vì lợi ích công ty, không lạm dụng chức vụ để tư lợi, và phải thông báo về doanh nghiệp mà mình hoặc người liên quan làm chủ/sở hữu.","points":["Trách nhiệm gồm: thực hiện quyền, nghĩa vụ trung thực, cẩn trọng, tốt nhất vì lợi ích hợp pháp tối đa của công ty; trung thành, không lạm dụng địa vị, chức vụ để tư lợi hoặc phục vụ lợi ích tổ chức, cá nhân khác.","Giám đốc hoặc Tổng giám đốc không được tăng tiền lương, trả thưởng khi công ty không có khả năng thanh toán đủ các khoản nợ đến hạn.","Phải thông báo bằng văn bản về doanh nghiệp liên quan trong thời hạn 05 ngày làm việc kể từ ngày phát sinh hoặc có thay đổi; danh sách được lưu tại trụ sở chính, thành viên/người quản lý/Kiểm soát viên có quyền xem, trích lục, sao chụp."]},"luat-59_72":{"tldr":"Thành viên công ty có quyền tự mình hoặc nhân danh công ty khởi kiện trách nhiệm dân sự đối với người quản lý vi phạm quyền, nghĩa vụ và trách nhiệm theo quy định.","points":["Áp dụng khi người quản lý vi phạm quy định tại Điều 71, không thực hiện/thực hiện không đầy đủ, không kịp thời hoặc trái quy định pháp luật, Điều lệ, nghị quyết Hội đồng thành viên, hoặc trường hợp khác theo pháp luật/Điều lệ.","Trình tự, thủ tục khởi kiện thực hiện theo quy định của pháp luật về tố tụng dân sự.","Chi phí khởi kiện khi thành viên khởi kiện nhân danh công ty được tính vào chi phí của công ty, trừ trường hợp bị bác yêu cầu khởi kiện."]},"luat-59_73":{"tldr":"Công ty TNHH hai thành viên trở lên thuộc diện doanh nghiệp nhà nước theo điểm b khoản 1 Điều 88 phải thực hiện công bố thông tin theo các quy định dẫn chiếu tại Điều 109 và Điều 110.","points":["Áp dụng với công ty TNHH hai thành viên trở lên thuộc diện doanh nghiệp nhà nước theo điểm b khoản 1 Điều 88.","Thực hiện công bố thông tin theo các điểm a, c, đ, g khoản 1 Điều 109 và Điều 110 của Luật."]},"luat-59_74":{"tldr":"Công ty trách nhiệm hữu hạn một thành viên do một tổ chức hoặc một cá nhân làm chủ sở hữu, có tư cách pháp nhân kể từ ngày cấp Giấy chứng nhận đăng ký doanh nghiệp, chủ sở hữu chịu trách nhiệm hữu hạn trong phạm vi vốn điều lệ.","points":["Do một tổ chức hoặc một cá nhân làm chủ sở hữu; chủ sở hữu chịu trách nhiệm về các khoản nợ, nghĩa vụ tài sản khác trong phạm vi số vốn điều lệ của công ty.","Có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp.","Không được phát hành cổ phần, trừ trường hợp chuyển đổi thành công ty cổ phần; được phát hành trái phiếu theo quy định pháp luật."]},"luat-59_75":{"tldr":"Chủ sở hữu công ty TNHH một thành viên phải góp đủ, đúng loại tài sản cam kết trong 90 ngày kể từ ngày cấp Giấy chứng nhận đăng ký doanh nghiệp; nếu không góp đủ phải đăng ký thay đổi vốn điều lệ và chịu trách nhiệm bằng toàn bộ tài sản của mình.","points":["Vốn điều lệ là tổng giá trị tài sản do chủ sở hữu cam kết góp, ghi trong Điều lệ công ty.","Thời hạn góp vốn: 90 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp.","Nếu không góp đủ vốn điều lệ trong thời hạn, chủ sở hữu phải đăng ký thay đổi vốn điều lệ bằng giá trị vốn đã góp trong 30 ngày kể từ ngày cuối cùng phải góp đủ.","Chủ sở hữu chịu trách nhiệm bằng toàn bộ tài sản của mình đối với nghĩa vụ tài chính và thiệt hại do không góp, không góp đủ, không góp đúng hạn vốn điều lệ."]},"luat-59_76":{"tldr":"Chủ sở hữu công ty TNHH một thành viên là tổ chức có đầy đủ quyền quyết định các vấn đề quan trọng của công ty; chủ sở hữu là cá nhân chỉ có một số quyền nhất định cùng quyền quyết định đầu tư, kinh doanh, quản trị nội bộ.","points":["Chủ sở hữu là tổ chức: quyết định Điều lệ, chiến lược, cơ cấu tổ chức, bổ nhiệm/miễn nhiệm/bãi nhiệm người quản lý, Kiểm soát viên, dự án đầu tư, tăng vốn điều lệ, chuyển nhượng vốn, tổ chức lại/giải thể/phá sản công ty.","Thông qua hợp đồng vay, cho vay, bán tài sản và hợp đồng khác có giá trị từ 50% tổng giá trị tài sản trở lên (theo báo cáo tài chính gần nhất) hoặc tỷ lệ/giá trị khác theo Điều lệ, cùng báo cáo tài chính công ty.","Chủ sở hữu là cá nhân chỉ có quyền tại các điểm a, h, l, m, n, o khoản 1 (Điều lệ, tăng vốn/chuyển nhượng vốn, sử dụng lợi nhuận, tổ chức lại/giải thể/phá sản, thu hồi tài sản, quyền khác) và quyết định đầu tư, kinh doanh, quản trị nội bộ công ty."]},"luat-59_77":{"tldr":"Chủ sở hữu công ty TNHH một thành viên phải góp đủ, đúng hạn vốn điều lệ, tách biệt tài sản cá nhân với tài sản công ty, và chỉ được rút vốn bằng cách chuyển nhượng vốn điều lệ.","points":["Góp đủ và đúng hạn vốn điều lệ công ty; tuân thủ Điều lệ công ty.","Phải tách biệt tài sản của chủ sở hữu với tài sản công ty; nếu là cá nhân phải tách biệt chi tiêu cá nhân/gia đình với chi tiêu của Chủ tịch công ty, Giám đốc/Tổng giám đốc.","Chỉ được rút vốn bằng cách chuyển nhượng một phần/toàn bộ vốn điều lệ; nếu rút vốn dưới hình thức khác thì phải liên đới chịu trách nhiệm về các khoản nợ, nghĩa vụ tài sản của công ty.","Không được rút lợi nhuận khi công ty không thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác đến hạn."]},"luat-59_78":{"tldr":"Điều luật quy định cách thực hiện quyền chủ sở hữu công ty TNHH một thành viên trong các tình huống đặc biệt như chuyển nhượng/tặng cho vốn, chủ sở hữu chết/mất tích/hạn chế năng lực hành vi, tổ chức giải thể/phá sản, hoặc bị Tòa án hạn chế quyền.","points":["Khi chuyển nhượng, tặng cho một phần vốn điều lệ hoặc kết nạp thành viên mới, công ty phải chuyển đổi loại hình doanh nghiệp tương ứng và đăng ký thay đổi trong 10 ngày kể từ ngày hoàn thành việc chuyển nhượng, tặng cho hoặc kết nạp.","Chủ sở hữu cá nhân bị tạm giam, chấp hành hình phạt tù hoặc biện pháp xử lý hành chính bắt buộc thì ủy quyền cho người khác thực hiện quyền, nghĩa vụ của chủ sở hữu.","Chủ sở hữu cá nhân chết: người thừa kế theo di chúc/pháp luật là chủ sở hữu hoặc thành viên công ty, công ty đăng ký thay đổi trong 10 ngày kể từ ngày kết thúc giải quyết thừa kế; nếu không có/từ chối/bị truất quyền thừa kế thì giải quyết theo pháp luật dân sự.","Chủ sở hữu là tổ chức bị giải thể hoặc phá sản: người nhận chuyển nhượng phần vốn góp trở thành chủ sở hữu hoặc thành viên công ty, công ty đăng ký thay đổi trong 10 ngày kể từ ngày hoàn thành chuyển nhượng."]},"luat-59_79":{"tldr":"Công ty TNHH một thành viên do tổ chức làm chủ sở hữu được tổ chức theo mô hình Chủ tịch công ty hoặc Hội đồng thành viên cùng Giám đốc/Tổng giám đốc; một số trường hợp phải thành lập Ban kiểm soát.","points":["Có hai mô hình tổ chức: (a) Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc; hoặc (b) Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc.","Công ty có chủ sở hữu là doanh nghiệp nhà nước theo khoản 1 Điều 88 phải thành lập Ban kiểm soát; trường hợp khác do công ty quyết định.","Công ty phải có ít nhất một người đại diện theo pháp luật là Chủ tịch Hội đồng thành viên, Chủ tịch công ty hoặc Giám đốc/Tổng giám đốc."]},"luat-59_80":{"tldr":"Hội đồng thành viên của công ty TNHH một thành viên do tổ chức làm chủ sở hữu có từ 03 đến 07 thành viên do chủ sở hữu bổ nhiệm, nhân danh chủ sở hữu và công ty thực hiện các quyền, nghĩa vụ được giao.","points":["Có từ 03 đến 07 thành viên, nhiệm kỳ không quá 05 năm, do chủ sở hữu công ty bổ nhiệm, miễn nhiệm.","Cuộc họp hợp lệ khi có ít nhất hai phần ba tổng số thành viên dự họp; mỗi thành viên có một phiếu biểu quyết giá trị như nhau (trừ Điều lệ quy định khác).","Nghị quyết, quyết định được thông qua khi trên 50% số thành viên dự họp tán thành (hoặc sở hữu trên 50% tổng số phiếu biểu quyết); riêng sửa Điều lệ, tổ chức lại công ty, chuyển nhượng vốn điều lệ cần ít nhất 75% tán thành.","Chủ tịch Hội đồng thành viên do chủ sở hữu bổ nhiệm hoặc do các thành viên Hội đồng thành viên bầu theo nguyên tắc đa số."]},"luat-59_81":{"tldr":"Chủ tịch công ty do chủ sở hữu bổ nhiệm, nhân danh chủ sở hữu và công ty thực hiện quyền, nghĩa vụ được giao, chịu trách nhiệm trước pháp luật và chủ sở hữu công ty.","points":["Nhân danh chủ sở hữu và công ty thực hiện quyền, nghĩa vụ của chủ sở hữu và của công ty, trừ quyền, nghĩa vụ của Giám đốc/Tổng giám đốc.","Quyết định của Chủ tịch công ty về thực hiện quyền, nghĩa vụ của chủ sở hữu có hiệu lực kể từ ngày được chủ sở hữu phê duyệt, trừ trường hợp Điều lệ quy định khác."]},"luat-59_82":{"tldr":"Giám đốc hoặc Tổng giám đốc công ty TNHH một thành viên do tổ chức làm chủ sở hữu được bổ nhiệm hoặc thuê với nhiệm kỳ không quá 05 năm để điều hành hoạt động kinh doanh hằng ngày, phải đáp ứng tiêu chuẩn nhất định.","points":["Do Hội đồng thành viên hoặc Chủ tịch công ty bổ nhiệm hoặc thuê, với nhiệm kỳ không quá 05 năm.","Có quyền tổ chức thực hiện nghị quyết, quyết định các vấn đề kinh doanh hằng ngày, ban hành quy chế quản lý nội bộ, bổ nhiệm người quản lý, ký hợp đồng nhân danh công ty, tuyển dụng lao động.","Tiêu chuẩn: không thuộc đối tượng quy định tại khoản 2 Điều 17; có trình độ chuyên môn, kinh nghiệm quản trị kinh doanh của công ty và điều kiện khác theo Điều lệ."]},"luat-59_83":{"tldr":"Người quản lý và Kiểm soát viên công ty TNHH một thành viên phải tuân thủ pháp luật, thực hiện quyền, nghĩa vụ trung thực, cẩn trọng vì lợi ích công ty và chủ sở hữu, không lạm dụng chức vụ để tư lợi, và thông báo về doanh nghiệp liên quan.","points":["Tuân thủ pháp luật, Điều lệ công ty, quyết định của chủ sở hữu trong việc thực hiện quyền và nghĩa vụ được giao.","Trung thành với lợi ích của công ty và chủ sở hữu công ty; không lạm dụng địa vị, chức vụ và sử dụng thông tin, tài sản của công ty để tư lợi.","Thông báo kịp thời, đầy đủ, chính xác cho chủ sở hữu công ty về doanh nghiệp mà mình hoặc người liên quan làm chủ, có cổ phần/phần vốn góp chi phối; thông báo được lưu giữ tại trụ sở chính."]},"luat-59_84":{"tldr":"Người quản lý công ty và Kiểm soát viên được hưởng lương, thù lao, thưởng theo kết quả kinh doanh; chủ sở hữu công ty quyết định mức và khoản này được tính vào chi phí kinh doanh, thể hiện thành mục riêng trong báo cáo tài chính.","points":["Chủ sở hữu công ty quyết định mức tiền lương, thù lao, thưởng và lợi ích khác của thành viên Hội đồng thành viên, Chủ tịch công ty và Kiểm soát viên.","Khoản này được tính vào chi phí kinh doanh theo pháp luật về thuế thu nhập doanh nghiệp và phải thể hiện thành mục riêng trong báo cáo tài chính hằng năm.","Tiền lương, thù lao, thưởng của Kiểm soát viên có thể do chủ sở hữu công ty chi trả trực tiếp theo quy định tại Điều lệ."]},"luat-59_85":{"tldr":"Công ty TNHH một thành viên do cá nhân làm chủ sở hữu có Chủ tịch công ty, Giám đốc/Tổng giám đốc; chủ sở hữu đồng thời là Chủ tịch công ty và có thể kiêm hoặc thuê người khác làm Giám đốc/Tổng giám đốc.","points":["Cơ cấu tổ chức gồm Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc.","Chủ sở hữu công ty là Chủ tịch công ty, có thể kiêm hoặc thuê người khác làm Giám đốc hoặc Tổng giám đốc.","Quyền, nghĩa vụ của Giám đốc hoặc Tổng giám đốc được quy định tại Điều lệ công ty và hợp đồng lao động."]},"luat-59_86":{"tldr":"Hợp đồng, giao dịch giữa công ty TNHH một thành viên với chủ sở hữu, người quản lý và người có liên quan phải được cơ quan có thẩm quyền chấp thuận và đáp ứng các điều kiện về tính độc lập, giá thị trường; vi phạm có thể bị tuyên vô hiệu.","points":["Áp dụng với chủ sở hữu và người liên quan; thành viên Hội đồng thành viên/Chủ tịch công ty/Giám đốc-Tổng giám đốc/Kiểm soát viên và người liên quan của họ; người quản lý của chủ sở hữu công ty và người liên quan.","Phải được Hội đồng thành viên hoặc Chủ tịch công ty, Giám đốc/Tổng giám đốc và Kiểm soát viên quyết định chấp thuận trong 10 ngày kể từ ngày nhận thông báo, theo nguyên tắc đa số; người liên quan không được biểu quyết.","Điều kiện chấp thuận: các bên là chủ thể pháp lý độc lập; giá sử dụng là giá thị trường; chủ sở hữu tuân thủ nghĩa vụ tách biệt tài sản theo khoản 4 Điều 77.","Hợp đồng, giao dịch ký kết không đúng quy định bị vô hiệu theo quyết định của Tòa án; người liên quan liên đới chịu trách nhiệm bồi thường thiệt hại và hoàn trả lợi ích thu được.","Với công ty do cá nhân làm chủ sở hữu, hợp đồng, giao dịch với chủ sở hữu hoặc người liên quan phải được ghi chép và lưu giữ thành hồ sơ riêng của công ty."]},"luat-59_87":{"tldr":"Công ty TNHH một thành viên tăng vốn điều lệ qua việc chủ sở hữu góp thêm vốn hoặc huy động vốn góp của người khác (phải chuyển đổi loại hình), và giảm vốn điều lệ trong trường hợp hoàn trả vốn góp hoặc do không được thanh toán đầy đủ, đúng hạn.","points":["Tăng vốn điều lệ bằng cách chủ sở hữu góp thêm vốn hoặc huy động thêm vốn góp của người khác; chủ sở hữu quyết định hình thức và mức tăng vốn.","Nếu huy động thêm vốn góp của người khác, công ty phải chuyển đổi thành công ty TNHH hai thành viên trở lên (thông báo thay đổi đăng ký doanh nghiệp trong 10 ngày kể từ ngày hoàn thành thay đổi vốn điều lệ) hoặc công ty cổ phần theo Điều 202.","Giảm vốn điều lệ khi hoàn trả một phần vốn góp cho chủ sở hữu (nếu công ty đã hoạt động liên tục từ 02 năm trở lên và bảo đảm thanh toán đủ nợ) hoặc do vốn điều lệ không được chủ sở hữu thanh toán đầy đủ, đúng hạn theo Điều 75."]},"luat-59_88":{"tldr":"Doanh nghiệp nhà nước được tổ chức dưới hình thức công ty TNHH hoặc công ty cổ phần, gồm hai nhóm: doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ và doanh nghiệp do Nhà nước nắm giữ trên 50% vốn điều lệ hoặc tổng số cổ phần có quyền biểu quyết.","points":["Doanh nghiệp Nhà nước nắm 100% vốn điều lệ gồm công ty TNHH một thành viên là công ty mẹ của tập đoàn/tổng công ty nhà nước hoặc trong nhóm công ty mẹ - công ty con, hoặc công ty TNHH một thành viên độc lập.","Doanh nghiệp Nhà nước nắm trên 50% vốn điều lệ hoặc tổng số cổ phần có quyền biểu quyết gồm công ty TNHH hai thành viên trở lên hoặc công ty cổ phần, là công ty mẹ hoặc công ty độc lập.","Chính phủ quy định chi tiết Điều này."]},"luat-59_89":{"tldr":"Doanh nghiệp do Nhà nước nắm 100% vốn điều lệ tổ chức dưới hình thức công ty TNHH một thành viên, áp dụng theo Chương IV và ưu tiên Chương IV nếu có khác biệt; doanh nghiệp do Nhà nước nắm trên 50% vốn điều lệ tổ chức theo quy định về công ty TNHH hai thành viên trở lên hoặc công ty cổ phần.","points":["Doanh nghiệp 100% vốn nhà nước áp dụng quy định tại Chương IV và các quy định liên quan khác của Luật; nếu có khác biệt giữa các quy định thì áp dụng theo Chương IV.","Doanh nghiệp Nhà nước nắm trên 50% vốn điều lệ tổ chức quản lý theo quy định về công ty TNHH hai thành viên trở lên (Mục 1 Chương III) hoặc công ty cổ phần (Chương V)."]},"luat-59_90":{"tldr":"Cơ quan đại diện chủ sở hữu quyết định tổ chức quản lý doanh nghiệp nhà nước (công ty TNHH một thành viên) theo một trong hai mô hình: Chủ tịch công ty hoặc Hội đồng thành viên, cùng với Giám đốc/Tổng giám đốc và Ban kiểm soát.","points":["Mô hình 1: Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc, Ban kiểm soát.","Mô hình 2: Hội đồng thành viên, Giám đốc hoặc Tổng giám đốc, Ban kiểm soát."]},"luat-59_91":{"tldr":"Hội đồng thành viên nhân danh công ty thực hiện quyền, nghĩa vụ của công ty, gồm Chủ tịch và các thành viên khác do cơ quan đại diện chủ sở hữu bổ nhiệm, số lượng không quá 07 người.","points":["Hội đồng thành viên bao gồm Chủ tịch và các thành viên khác, số lượng không quá 07 người; thành viên do cơ quan đại diện chủ sở hữu bổ nhiệm, miễn nhiệm, cách chức, khen thưởng, kỷ luật.","Nhiệm kỳ của Chủ tịch và thành viên khác không quá 05 năm; có thể được bổ nhiệm lại nhưng không quá 02 nhiệm kỳ tại một công ty, trừ người đã có trên 15 năm làm việc liên tục tại công ty đó trước khi được bổ nhiệm lần đầu."]},"luat-59_92":{"tldr":"Hội đồng thành viên nhân danh công ty thực hiện quyền, nghĩa vụ của chủ sở hữu, cổ đông, thành viên, có quyền quyết định các nội dung quan trọng liên quan đến vốn nhà nước, tổ chức bộ máy, kế hoạch kinh doanh và kiểm toán nội bộ.","points":["Quyết định các nội dung theo quy định tại Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp.","Quyết định thành lập, tổ chức lại, giải thể chi nhánh, văn phòng đại diện và các đơn vị hạch toán phụ thuộc.","Quyết định kế hoạch sản xuất, kinh doanh hằng năm, chủ trương phát triển thị trường, tiếp thị và công nghệ của công ty.","Tổ chức hoạt động kiểm toán nội bộ và quyết định thành lập đơn vị kiểm toán nội bộ của công ty."]},"luat-59_93":{"tldr":"Thành viên Hội đồng thành viên doanh nghiệp nhà nước phải đáp ứng các tiêu chuẩn về chuyên môn, không thuộc đối tượng cấm quản lý doanh nghiệp, không có quan hệ gia đình với các chức danh liên quan và chưa từng bị cách chức tại doanh nghiệp nhà nước.","points":["Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này; có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh hoặc lĩnh vực hoạt động của doanh nghiệp.","Không có quan hệ gia đình với người đứng đầu, cấp phó người đứng đầu cơ quan đại diện chủ sở hữu và các chức danh quản lý, kiểm soát chủ chốt của công ty; không phải là người quản lý doanh nghiệp thành viên.","Trừ Chủ tịch Hội đồng thành viên, thành viên khác có thể kiêm Giám đốc, Tổng giám đốc công ty đó hoặc công ty khác không phải doanh nghiệp thành viên theo quyết định của cơ quan đại diện chủ sở hữu.","Chưa từng bị cách chức các chức danh quản lý chủ chốt tại doanh nghiệp nhà nước."]},"luat-59_94":{"tldr":"Chủ tịch và thành viên khác của Hội đồng thành viên bị miễn nhiệm trong các trường hợp như không đủ tiêu chuẩn, xin từ chức, điều chuyển hoặc nghỉ hưu, không đủ năng lực hoặc sức khỏe; bị cách chức khi công ty không hoàn thành mục tiêu kế hoạch, bị kết án hoặc không trung thực, lạm dụng chức vụ.","points":["Miễn nhiệm khi: không còn đủ tiêu chuẩn theo Điều 93; có đơn từ chức được chấp thuận bằng văn bản; có quyết định điều chuyển, bố trí công việc khác hoặc nghỉ hưu; không đủ năng lực, trình độ, sức khỏe hoặc uy tín.","Cách chức khi: công ty không hoàn thành mục tiêu, chỉ tiêu kế hoạch hằng năm, không bảo toàn và phát triển vốn mà không giải trình được hoặc giải trình không được chấp thuận; bị Tòa án kết án có hiệu lực pháp luật; không trung thực, lạm dụng địa vị, chức vụ để tư lợi hoặc báo cáo không trung thực tình hình tài chính.","Trong thời hạn 60 ngày kể từ ngày có quyết định miễn nhiệm hoặc cách chức, cơ quan đại diện chủ sở hữu xem xét, quyết định tuyển chọn, bổ nhiệm người khác thay thế."]},"luat-59_95":{"tldr":"Chủ tịch Hội đồng thành viên do cơ quan đại diện chủ sở hữu bổ nhiệm, không được kiêm Giám đốc/Tổng giám đốc của công ty và doanh nghiệp khác, có trách nhiệm xây dựng kế hoạch, tổ chức họp và giám sát hoạt động của công ty.","points":["Không được kiêm Giám đốc hoặc Tổng giám đốc của công ty và doanh nghiệp khác.","Xây dựng kế hoạch hoạt động hằng quý, hằng năm; chuẩn bị, triệu tập và chủ trì họp Hội đồng thành viên; tổ chức thực hiện quyết định của cơ quan đại diện chủ sở hữu và nghị quyết Hội đồng thành viên.","Tổ chức giám sát, đánh giá kết quả thực hiện mục tiêu chiến lược, kết quả hoạt động của công ty và kết quả quản lý, điều hành của Giám đốc hoặc Tổng giám đốc; chịu trách nhiệm về việc công bố, công khai thông tin công ty.","Ngoài các trường hợp tại Điều 94, có thể bị miễn nhiệm, cách chức nếu không thực hiện quyền và nghĩa vụ được giao."]},"luat-59_96":{"tldr":"Thành viên Hội đồng thành viên có quyền tham dự họp, thảo luận, biểu quyết các vấn đề thuộc thẩm quyền, cũng như kiểm tra, tra cứu sổ sách, tài liệu của công ty.","points":["Tham dự cuộc họp Hội đồng thành viên, thảo luận, kiến nghị, biểu quyết các vấn đề thuộc thẩm quyền của Hội đồng thành viên.","Kiểm tra, xem xét, tra cứu, sao chép, trích lục sổ sách, hợp đồng, giao dịch, báo cáo tài chính và tài liệu khác của công ty."]},"luat-59_97":{"tldr":"Chủ tịch và thành viên khác của Hội đồng thành viên phải tuân thủ Điều lệ, pháp luật, thực hiện quyền nghĩa vụ trung thực, cẩn trọng vì lợi ích công ty và Nhà nước, đồng thời chịu trách nhiệm cá nhân khi có hành vi vi phạm gây thiệt hại.","points":["Trung thành với lợi ích của công ty và Nhà nước; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản công ty để tư lợi.","Phải thông báo kịp thời, đầy đủ, chính xác về doanh nghiệp mình hoặc người có liên quan làm chủ, sở hữu chi phối.","Chịu trách nhiệm cá nhân nếu lợi dụng danh nghĩa công ty vi phạm pháp luật, kinh doanh/giao dịch gây thiệt hại cho tổ chức, cá nhân khác, hoặc thanh toán nợ chưa đến hạn khi có nguy cơ rủi ro tài chính.","Nếu phát hiện thành viên Hội đồng thành viên khác vi phạm, phải báo cáo bằng văn bản với cơ quan đại diện chủ sở hữu và yêu cầu chấm dứt vi phạm, khắc phục hậu quả."]},"luat-59_98":{"tldr":"Hội đồng thành viên làm việc theo chế độ tập thể, họp định kỳ ít nhất mỗi quý một lần (có thể họp bất thường hoặc lấy ý kiến bằng văn bản), với quy định cụ thể về triệu tập, điều kiện hợp lệ, biểu quyết và biên bản họp.","points":["Họp ít nhất 01 lần/quý; tài liệu họp thường gửi trước ít nhất 03 ngày làm việc, riêng nội dung quan trọng (sửa Điều lệ, báo cáo tài chính hằng năm, tổ chức lại/giải thể công ty) phải gửi trước ít nhất 05 ngày làm việc.","Cuộc họp hợp lệ khi có ít nhất hai phần ba tổng số thành viên tham dự; nghị quyết được thông qua khi hơn một nửa số thành viên tham dự biểu quyết tán thành, trường hợp ngang phiếu thì theo phiếu của Chủ tịch hoặc người được ủy quyền chủ trì.","Trường hợp lấy ý kiến bằng văn bản, nghị quyết được thông qua khi có hơn một nửa tổng số thành viên Hội đồng thành viên tán thành.","Thành viên có quyền yêu cầu Giám đốc, Tổng giám đốc, Kế toán trưởng và người quản lý liên quan cung cấp thông tin, tài liệu về tình hình tài chính, hoạt động của doanh nghiệp.","Nghị quyết Hội đồng thành viên có hiệu lực kể từ ngày được thông qua hoặc từ ngày có hiệu lực ghi trong nghị quyết, trừ trường hợp phải được cơ quan đại diện chủ sở hữu chấp thuận."]},"luat-59_99":{"tldr":"Chủ tịch công ty do cơ quan đại diện chủ sở hữu bổ nhiệm, nhiệm kỳ không quá 05 năm, thực hiện quyền và nghĩa vụ của người đại diện chủ sở hữu trực tiếp tại công ty.","points":["Nhiệm kỳ không quá 05 năm, có thể bổ nhiệm lại nhưng không quá 02 nhiệm kỳ, trừ người đã có trên 15 năm làm việc liên tục tại công ty trước khi bổ nhiệm lần đầu; tiêu chuẩn, điều kiện, miễn nhiệm, cách chức áp dụng theo Điều 93 và Điều 94.","Thực hiện quyền, nghĩa vụ của người đại diện chủ sở hữu trực tiếp theo Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh, cùng quyền, nghĩa vụ theo Điều 92 và Điều 97.","Quyết định thuộc thẩm quyền phải lập thành văn bản, ký tên với chức danh Chủ tịch công ty; có hiệu lực từ ngày ký hoặc ngày ghi trong quyết định, trừ trường hợp phải được cơ quan đại diện chủ sở hữu chấp thuận.","Nếu xuất cảnh khỏi Việt Nam trên 30 ngày phải ủy quyền bằng văn bản cho người khác thực hiện một số quyền, nghĩa vụ và thông báo kịp thời cho cơ quan đại diện chủ sở hữu."]},"luat-59_100":{"tldr":"Giám đốc hoặc Tổng giám đốc do Hội đồng thành viên hoặc Chủ tịch công ty bổ nhiệm hoặc thuê, điều hành hoạt động hằng ngày của công ty với các quyền, nghĩa vụ cụ thể; công ty có thể có một hoặc một số Phó giám đốc, Phó Tổng giám đốc.","points":["Được bổ nhiệm hoặc thuê theo phương án nhân sự đã được cơ quan đại diện chủ sở hữu chấp thuận.","Điều hành hoạt động hằng ngày: tổ chức thực hiện kế hoạch kinh doanh, đầu tư và nghị quyết của Hội đồng thành viên/Chủ tịch công ty; ban hành quy chế quản lý nội bộ; ký kết hợp đồng, giao dịch; tuyển dụng lao động; lập báo cáo định kỳ hằng quý, hằng năm.","Số lượng, thẩm quyền bổ nhiệm và quyền, nghĩa vụ của Phó giám đốc hoặc Phó Tổng giám đốc do Điều lệ công ty, hợp đồng lao động quy định."]},"luat-59_101":{"tldr":"Giám đốc, Tổng giám đốc phải có trình độ chuyên môn phù hợp, không thuộc đối tượng cấm quản lý doanh nghiệp, không có quan hệ gia đình với các chức danh liên quan, chưa từng bị cách chức tại doanh nghiệp nhà nước và không được kiêm nhiệm chức vụ tương tự ở doanh nghiệp khác.","points":["Không thuộc đối tượng quy định tại khoản 2 Điều 17; có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh hoặc lĩnh vực, ngành nghề kinh doanh của công ty.","Không có quan hệ gia đình với người đứng đầu, cấp phó người đứng đầu cơ quan đại diện chủ sở hữu và các chức danh quản lý, kiểm soát chủ chốt của công ty.","Chưa từng bị cách chức các chức danh quản lý chủ chốt tại công ty hoặc doanh nghiệp nhà nước khác; không được kiêm Giám đốc hoặc Tổng giám đốc của doanh nghiệp khác."]},"luat-59_102":{"tldr":"Giám đốc, Tổng giám đốc bị miễn nhiệm khi không còn đủ tiêu chuẩn hoặc xin nghỉ việc; bị xem xét cách chức khi doanh nghiệp không bảo toàn vốn, không hoàn thành kế hoạch, vi phạm pháp luật hoặc không đủ năng lực.","points":["Miễn nhiệm khi không còn đủ tiêu chuẩn theo Điều 101 hoặc có đơn xin nghỉ việc.","Cách chức khi doanh nghiệp không bảo toàn được vốn, không hoàn thành mục tiêu kế hoạch kinh doanh hằng năm, vi phạm pháp luật, không đủ trình độ, năng lực hoặc vi phạm quyền, nghĩa vụ theo Điều 97 và Điều 100.","Trong thời hạn 60 ngày kể từ ngày có quyết định miễn nhiệm, cách chức, Hội đồng thành viên hoặc Chủ tịch công ty xem xét, quyết định tuyển chọn, bổ nhiệm người khác thay thế.","Việc miễn nhiệm, cách chức Phó Tổng giám đốc, Phó giám đốc, người quản lý khác của công ty và Kế toán trưởng do Điều lệ công ty quy định."]},"luat-59_103":{"tldr":"Cơ quan đại diện chủ sở hữu quyết định thành lập Ban kiểm soát có từ 01 đến 05 Kiểm soát viên tùy quy mô công ty, nhiệm kỳ không quá 05 năm; Trưởng Ban kiểm soát và Kiểm soát viên phải đáp ứng các tiêu chuẩn về bằng cấp, kinh nghiệm và tính độc lập.","points":["Ban kiểm soát có từ 01 đến 05 Kiểm soát viên; nhiệm kỳ không quá 05 năm và có thể bổ nhiệm lại nhưng không quá 02 nhiệm kỳ liên tục tại một công ty; một cá nhân được làm Trưởng Ban kiểm soát, Kiểm soát viên của không quá 04 doanh nghiệp nhà nước.","Yêu cầu có bằng đại học trở lên thuộc chuyên ngành phù hợp và ít nhất 03 năm kinh nghiệm làm việc; riêng Trưởng Ban kiểm soát phải có ít nhất 05 năm kinh nghiệm.","Không được là người quản lý công ty hoặc doanh nghiệp khác, không là Kiểm soát viên của doanh nghiệp không phải doanh nghiệp nhà nước, không là người lao động của công ty, không có quan hệ gia đình với các chức danh chủ chốt liên quan.","Chính phủ quy định chi tiết Điều này."]},"luat-59_104":{"tldr":"Ban kiểm soát có nghĩa vụ giám sát toàn diện hoạt động kinh doanh, tài chính và việc thực hiện quyền, nghĩa vụ của Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc, đồng thời báo cáo đánh giá cho cơ quan đại diện chủ sở hữu.","points":["Giám sát việc tổ chức thực hiện chiến lược phát triển, kế hoạch kinh doanh, thực trạng tài chính và việc thực hiện quyền, nghĩa vụ của thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc.","Giám sát tính hợp pháp, hệ thống, trung thực trong công tác kế toán, báo cáo tài chính, hợp đồng với bên liên quan, dự án đầu tư lớn và giao dịch kinh doanh bất thường.","Lập và gửi báo cáo đánh giá, kiến nghị cho cơ quan đại diện chủ sở hữu và Hội đồng thành viên.","Tiền lương, thù lao, thưởng và lợi ích khác của Kiểm soát viên do cơ quan đại diện chủ sở hữu quyết định và chi trả."]},"luat-59_105":{"tldr":"Ban kiểm soát có quyền tham gia các cuộc họp liên quan, xem xét sổ sách, tài liệu, yêu cầu người quản lý báo cáo, cung cấp thông tin và đề nghị thành lập đơn vị kiểm toán hỗ trợ.","points":["Tham gia họp Hội đồng thành viên, các cuộc tham vấn với cơ quan đại diện chủ sở hữu; chất vấn về kế hoạch, dự án, chương trình đầu tư và các quyết định quản lý, điều hành.","Xem xét sổ sách kế toán, báo cáo, hợp đồng, giao dịch; kiểm tra công việc quản lý, điều hành khi xét thấy cần thiết hoặc theo yêu cầu của cơ quan đại diện chủ sở hữu.","Yêu cầu người quản lý công ty và công ty con báo cáo, cung cấp thông tin về tình hình tài chính, hoạt động.","Đề nghị cơ quan đại diện chủ sở hữu thành lập đơn vị thực hiện nhiệm vụ kiểm toán để hỗ trợ Ban kiểm soát."]},"luat-59_106":{"tldr":"Ban kiểm soát làm việc theo kế hoạch do Trưởng Ban kiểm soát xây dựng, họp ít nhất mỗi tháng một lần, quyết định được thông qua khi có đa số thành viên dự họp tán thành.","points":["Trưởng Ban kiểm soát xây dựng kế hoạch công tác hằng tháng, hằng quý, hằng năm và phân công nhiệm vụ cho từng Kiểm soát viên.","Kiểm soát viên chủ động, độc lập thực hiện nhiệm vụ được phân công.","Ban kiểm soát họp ít nhất mỗi tháng một lần để rà soát, đánh giá, thông qua báo cáo kết quả kiểm soát trình cơ quan đại diện chủ sở hữu.","Quyết định được thông qua khi có đa số thành viên dự họp tán thành; các ý kiến khác phải được ghi chép đầy đủ và báo cáo cơ quan đại diện chủ sở hữu."]},"luat-59_107":{"tldr":"Kiểm soát viên phải tuân thủ pháp luật, Điều lệ công ty, thực hiện nhiệm vụ trung thực vì lợi ích Nhà nước và công ty; nếu vi phạm gây thiệt hại phải chịu trách nhiệm bồi thường và có nghĩa vụ báo cáo kịp thời các vi phạm phát hiện được.","points":["Trung thành với lợi ích của Nhà nước và công ty; không lạm dụng địa vị, chức vụ, thông tin, bí quyết, cơ hội kinh doanh, tài sản công ty để tư lợi.","Nếu vi phạm trách nhiệm gây thiệt hại cho công ty phải chịu trách nhiệm cá nhân hoặc liên đới bồi thường, có thể bị xử lý kỷ luật, xử phạt hành chính hoặc truy cứu trách nhiệm hình sự, đồng thời hoàn trả thu nhập, lợi ích có được do vi phạm.","Phải báo cáo kịp thời cho cơ quan đại diện chủ sở hữu khi phát hiện Kiểm soát viên khác hoặc thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc/Tổng giám đốc và người quản lý khác vi phạm quyền, nghĩa vụ hoặc pháp luật."]},"luat-59_108":{"tldr":"Trưởng Ban kiểm soát, Kiểm soát viên bị miễn nhiệm khi không còn đủ tiêu chuẩn, xin từ chức được chấp thuận hoặc được điều động công tác khác; bị cách chức khi không thực hiện hoặc không hoàn thành nhiệm vụ, vi phạm nghiêm trọng quyền, nghĩa vụ.","points":["Miễn nhiệm khi: không còn đủ tiêu chuẩn theo Điều 103; có đơn từ chức được chấp thuận; được điều động, phân công thực hiện nhiệm vụ khác.","Cách chức khi: không thực hiện nhiệm vụ được phân công trong 03 tháng liên tục (trừ trường hợp bất khả kháng); không hoàn thành nhiệm vụ trong 01 năm; vi phạm nhiều lần hoặc vi phạm nghiêm trọng quyền, nghĩa vụ, trách nhiệm."]},"luat-59_109":{"tldr":"Công ty phải công bố định kỳ trên trang thông tin điện tử các thông tin cơ bản, kế hoạch kinh doanh, báo cáo tài chính đã kiểm toán và báo cáo về thực trạng quản trị, cơ cấu tổ chức công ty.","points":["Công bố báo cáo tài chính năm đã được kiểm toán trong thời hạn 150 ngày kể từ ngày kết thúc năm tài chính, và báo cáo tài chính giữa năm trước ngày 31 tháng 7 hằng năm.","Công bố thông tin cơ bản, Điều lệ công ty, mục tiêu và chỉ tiêu kế hoạch kinh doanh hằng năm, báo cáo đánh giá kết quả thực hiện kế hoạch và nhiệm vụ công ích.","Báo cáo thực trạng quản trị công ty bao gồm thông tin về cơ quan đại diện chủ sở hữu, người quản lý công ty, Ban kiểm soát và người có liên quan.","Người đại diện theo pháp luật hoặc người được ủy quyền chịu trách nhiệm về tính đầy đủ, kịp thời, trung thực, chính xác của thông tin được công bố."]},"luat-59_110":{"tldr":"Công ty phải công bố thông tin bất thường trong thời hạn 36 giờ kể từ khi xảy ra các sự kiện quan trọng như phong tỏa tài khoản, tạm ngừng kinh doanh, thay đổi giấy phép, thay đổi nhân sự quản lý chủ chốt hoặc vi phạm pháp luật.","points":["Thời hạn công bố là 36 giờ kể từ khi xảy ra sự kiện, trên trang thông tin điện tử, ấn phẩm (nếu có) và niêm yết công khai tại trụ sở, địa điểm kinh doanh.","Sự kiện phải công bố gồm: tài khoản bị phong tỏa/hoạt động trở lại; tạm ngừng kinh doanh hoặc bị thu hồi, sửa đổi giấy phép; thay đổi thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc, Kế toán trưởng, Trưởng Ban kiểm soát hoặc Kiểm soát viên.","Các sự kiện khác gồm: quyết định kỷ luật, khởi tố, bản án đối với người quản lý; kết luận vi phạm của cơ quan thanh tra/thuế; thay đổi tổ chức kiểm toán độc lập hoặc bị từ chối kiểm toán; quyết định thành lập, giải thể, sáp nhập công ty con hoặc đầu tư, thoái vốn.","Chính phủ quy định chi tiết Điều này."]},"luat-59_111":{"tldr":"Công ty cổ phần là doanh nghiệp có vốn điều lệ chia thành cổ phần, cổ đông chịu trách nhiệm hữu hạn trong phạm vi vốn góp và công ty có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp.","points":["Số lượng cổ đông tối thiểu là 03 và không hạn chế số lượng tối đa; cổ đông có thể là tổ chức hoặc cá nhân.","Cổ đông chỉ chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi số vốn đã góp.","Cổ đông có quyền tự do chuyển nhượng cổ phần, trừ trường hợp quy định tại khoản 3 Điều 120 và khoản 1 Điều 127.","Công ty có quyền phát hành cổ phần, trái phiếu và các loại chứng khoán khác."]},"luat-59_112":{"tldr":"Vốn điều lệ của công ty cổ phần là tổng mệnh giá cổ phần các loại đã bán; luật định nghĩa rõ cổ phần đã bán, cổ phần được quyền chào bán, cổ phần chưa bán và các trường hợp công ty được giảm vốn điều lệ.","points":["Cổ phần đã bán là cổ phần được quyền chào bán đã được cổ đông thanh toán đủ cho công ty.","Cổ phần được quyền chào bán do Đại hội đồng cổ đông quyết định để huy động vốn.","Công ty được giảm vốn điều lệ khi: hoàn trả vốn góp cho cổ đông theo tỷ lệ sở hữu nếu đã hoạt động kinh doanh liên tục từ 02 năm trở lên và bảo đảm thanh toán đủ nợ sau khi hoàn trả; mua lại cổ phần đã bán theo Điều 132, 133; hoặc vốn không được cổ đông thanh toán đầy đủ, đúng hạn theo Điều 113."]},"luat-59_113":{"tldr":"Cổ đông phải thanh toán đủ số cổ phần đã đăng ký mua trong 90 ngày kể từ ngày công ty được cấp Giấy chứng nhận đăng ký doanh nghiệp; nếu không thanh toán đủ, cổ đông mất một phần hoặc toàn bộ tư cách cổ đông và công ty phải điều chỉnh vốn điều lệ.","points":["Thời hạn thanh toán là 90 ngày, trừ khi Điều lệ công ty hoặc hợp đồng đăng ký mua cổ phần quy định thời hạn ngắn hơn; thời gian nhập khẩu, làm thủ tục chuyển quyền sở hữu tài sản góp vốn không tính vào thời hạn này.","Cổ đông chưa thanh toán số cổ phần đã đăng ký mua đương nhiên không còn là cổ đông; cổ đông chỉ thanh toán một phần chỉ có quyền tương ứng với phần đã thanh toán.","Trong 30 ngày kể từ ngày kết thúc thời hạn thanh toán, công ty phải đăng ký điều chỉnh vốn điều lệ theo số cổ phần đã thanh toán đủ và đăng ký thay đổi cổ đông sáng lập.","Cổ đông chưa thanh toán hoặc chưa thanh toán đủ vẫn phải chịu trách nhiệm tương ứng tổng mệnh giá cổ phần đã đăng ký mua đối với nghĩa vụ tài chính của công ty phát sinh trước ngày công ty đăng ký điều chỉnh vốn điều lệ."]},"luat-59_114":{"tldr":"Công ty cổ phần bắt buộc phải có cổ phần phổ thông, có thể có thêm các loại cổ phần ưu đãi; mỗi cổ phần cùng một loại tạo cho người sở hữu quyền, nghĩa vụ và lợi ích ngang nhau.","points":["Cổ phần ưu đãi gồm: cổ phần ưu đãi cổ tức, cổ phần ưu đãi hoàn lại, cổ phần ưu đãi biểu quyết và cổ phần ưu đãi khác theo Điều lệ công ty và pháp luật về chứng khoán.","Cổ phần phổ thông không thể chuyển đổi thành cổ phần ưu đãi; cổ phần ưu đãi có thể chuyển đổi thành cổ phần phổ thông theo nghị quyết của Đại hội đồng cổ đông.","Cổ phần phổ thông có thể dùng làm tài sản cơ sở để phát hành chứng chỉ lưu ký không có quyền biểu quyết, gọi là cổ phần phổ thông cơ sở."]},"luat-59_115":{"tldr":"Cổ đông phổ thông có các quyền cơ bản như dự họp, biểu quyết, nhận cổ tức, chuyển nhượng cổ phần; cổ đông hoặc nhóm cổ đông sở hữu tỷ lệ cổ phần lớn hơn (từ 05%, từ 10%) có thêm các quyền đặc biệt như tra cứu tài liệu, yêu cầu triệu tập họp, đề cử nhân sự.","points":["Mỗi cổ phần phổ thông có một phiếu biểu quyết; cổ đông được ưu tiên mua cổ phần mới tương ứng tỷ lệ sở hữu.","Cổ đông hoặc nhóm cổ đông sở hữu từ 05% tổng số cổ phần phổ thông trở lên (hoặc tỷ lệ khác nhỏ hơn theo Điều lệ) có quyền tra cứu tài liệu nội bộ, yêu cầu triệu tập họp Đại hội đồng cổ đông, yêu cầu Ban kiểm soát kiểm tra vấn đề cụ thể.","Quyền yêu cầu triệu tập họp phát sinh khi Hội đồng quản trị vi phạm nghiêm trọng quyền của cổ đông, nghĩa vụ người quản lý hoặc ra quyết định vượt thẩm quyền.","Cổ đông hoặc nhóm cổ đông sở hữu từ 10% tổng số cổ phần phổ thông trở lên (hoặc tỷ lệ khác nhỏ hơn theo Điều lệ) có quyền đề cử người vào Hội đồng quản trị, Ban kiểm soát.","Khi công ty giải thể hoặc phá sản, cổ đông được nhận một phần tài sản còn lại tương ứng tỷ lệ sở hữu cổ phần."]},"luat-59_116":{"tldr":"Cổ phần ưu đãi biểu quyết là cổ phần phổ thông có nhiều phiếu biểu quyết hơn, chỉ tổ chức được Chính phủ ủy quyền và cổ đông sáng lập được nắm giữ, và ưu đãi của cổ đông sáng lập chỉ có hiệu lực trong 03 năm rồi chuyển thành cổ phần phổ thông.","points":["Ưu đãi biểu quyết của cổ đông sáng lập có hiệu lực 03 năm kể từ ngày công ty được cấp Giấy chứng nhận đăng ký doanh nghiệp, sau đó cổ phần chuyển đổi thành cổ phần phổ thông.","Cổ đông sở hữu cổ phần ưu đãi biểu quyết không được chuyển nhượng cổ phần đó cho người khác, trừ trường hợp theo bản án, quyết định của Tòa án đã có hiệu lực pháp luật hoặc thừa kế."]},"luat-59_117":{"tldr":"Cổ phần ưu đãi cổ tức được trả cổ tức cao hơn hoặc ổn định hơn cổ phần phổ thông, gồm cổ tức cố định và cổ tức thưởng, nhưng cổ đông sở hữu loại cổ phần này không có quyền biểu quyết, dự họp hay đề cử nhân sự (trừ ngoại lệ).","points":["Cổ tức cố định không phụ thuộc vào kết quả kinh doanh của công ty; mức cụ thể và cách xác định cổ tức thưởng được ghi rõ trong cổ phiếu.","Cổ đông được nhận phần tài sản còn lại tương ứng tỷ lệ sở hữu sau khi công ty thanh toán hết nợ và cổ phần
