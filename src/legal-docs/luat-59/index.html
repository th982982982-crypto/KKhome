 đồng quản trị và các thành viên Hội đồng quản trị phải bồi thường thiệt hại phát sinh cho công ty."},{"k":"p","t":"3. Trường hợp Hội đồng quản trị không triệu tập họp Đại hội đồng cổ đông theo quy định tại khoản 2 Điều này thì trong thời hạn 30 ngày tiếp theo, Ban kiểm soát thay thế Hội đồng quản trị triệu tập họp Đại hội đồng cổ đông theo quy định của Luật này. Trường hợp Ban kiểm soát không triệu tập họp Đại hội đồng cổ đông theo quy định thì Ban kiểm soát phải bồi thường thiệt hại phát sinh cho công ty."},{"k":"p","t":"4. Trường hợp Ban kiểm soát không triệu tập họp Đại hội đồng cổ đông theo quy định tại khoản 3 Điều này thì cổ đông hoặc nhóm cổ đông theo quy định tại khoản 2 Điều 115 của Luật này có quyền đại diện công ty triệu tập họp Đại hội đồng cổ đông theo quy định của Luật này."},{"k":"p","t":"5. Người triệu tập họp Đại hội đồng cổ đông phải thực hiện các công việc sau đây:"},{"k":"p","t":"a) Lập danh sách cổ đông có quyền dự họp;"},{"k":"p","t":"b) Cung cấp thông tin và giải quyết khiếu nại liên quan đến danh sách cổ đông;"},{"k":"p","t":"c) Lập chương trình và nội dung cuộc họp;"},{"k":"p","t":"d) Chuẩn bị tài liệu cho cuộc họp;"},{"k":"p","t":"đ) Dự thảo nghị quyết Đại hội đồng cổ đông theo nội dung dự kiến của cuộc họp; danh sách và thông tin chi tiết của các ứng cử viên trong trường hợp bầu thành viên Hội đồng quản trị, Kiểm soát viên;"},{"k":"p","t":"e) Xác định thời gian và địa điểm họp;"},{"k":"p","t":"g) Gửi thông báo mời họp đến từng cổ đông có quyền dự họp theo quy định của Luật này;"},{"k":"p","t":"h) Công việc khác phục vụ cuộc họp."},{"k":"p","t":"6. Chi phí triệu tập và tiến hành họp Đại hội đồng cổ đông theo quy định tại các khoản 2,3 và 4 Điều này sẽ được công ty hoàn lại."}]},{"id":"luat-59_141","no":141,"code":"Điều 141","title":"Điều 141. Danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông","shortTitle":"Danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông được lập dựa trên sổ đăng ký cổ đông của công ty. Danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông được lập không quá 10 ngày trước ngày gửi giấy mời họp Đại hội đồng cổ đông nếu Điều lệ công ty không quy định thời hạn ngắn hơn."},{"k":"p","t":"2. Danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông phải có họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức; số lượng cổ phần từng loại, số và ngày đăng ký cổ đông của từng cổ đông."},{"k":"p","t":"3. Cổ đông có quyền kiểm tra, tra cứu, trích lục, sao chép tên và địa chỉ liên lạc của cổ đông trong danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông; yêu cầu sửa đổi thông tin sai lệch hoặc bổ sung thông tin cần thiết về mình trong danh sách cổ đông có quyền dự họp Đại hội đồng cổ đông. Người quản lý công ty phải cung cấp kịp thời thông tin trong sổ đăng ký cổ đông, sửa đổi, bổ sung thông tin sai lệch theo yêu cầu của cổ đông; chịu trách nhiệm bồi thường thiệt hại phát sinh do không cung cấp hoặc cung cấp không kịp thời, không chính xác thông tin sổ đăng ký cổ đông theo yêu cầu. Trình tự, thủ tục yêu cầu cung cấp thông tin trong sổ đăng ký cổ đông thực hiện theo quy định tại Điều lệ công ty."}]},{"id":"luat-59_142","no":142,"code":"Điều 142","title":"Điều 142. Chương trình và nội dung họp Đại hội đồng cổ đông","shortTitle":"Chương trình và nội dung họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Người triệu tập họp Đại hội đồng cổ đông phải chuẩn bị chương trình, nội dung cuộc họp."},{"k":"p","t":"2. Cổ đông hoặc nhóm cổ đông quy định tại khoản 2 Điều 115 của Luật này có quyền kiến nghị vấn đề đưa vào chương trình họp Đại hội đồng cổ đông. Kiến nghị phải bằng văn bản và được gửi đến công ty chậm nhất là 03 ngày làm việc trước ngày khai mạc, trừ trường hợp Điều lệ công ty có quy định thời hạn khác. Kiến nghị phải ghi rõ tên cổ đông, số lượng từng loại cổ phần của cổ đông, vấn đề kiến nghị đưa vào chương trình họp."},{"k":"p","t":"3. Trường hợp người triệu tập họp Đại hội đồng cổ đông từ chối kiến nghị quy định tại khoản 2 Điều này thì chậm nhất là 02 ngày làm việc trước ngày khai mạc cuộc họp Đại hội đồng cổ đông phải trả lời bằng văn bản và nêu rõ lý do. Người triệu tập họp Đại hội đồng cổ đông chỉ được từ chối kiến nghị nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Kiến nghị được gửi đến không đúng quy định tại khoản 2 Điều này;"},{"k":"p","t":"b) Vấn đề kiến nghị không thuộc thẩm quyền quyết định của Đại hội đồng cổ đông;"},{"k":"p","t":"c) Trường hợp khác theo quy định tại Điều lệ công ty."},{"k":"p","t":"4. Người triệu tập họp Đại hội đồng cổ đông phải chấp nhận và đưa kiến nghị quy định tại khoản 2 Điều này vào dự kiến chương trình và nội dung cuộc họp, trừ trường hợp quy định tại khoản 3 Điều này; kiến nghị được chính thức bổ sung vào chương trình và nội dung cuộc họp nếu được Đại hội đồng cổ đông chấp thuận."}]},{"id":"luat-59_143","no":143,"code":"Điều 143","title":"Điều 143. Mời họp Đại hội đồng cổ đông","shortTitle":"Mời họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Người triệu tập họp Đại hội đồng cổ đông phải gửi thông báo mời họp đến tất cả cổ đông trong danh sách cổ đông có quyền dự họp chậm nhất là 21 ngày trước ngày khai mạc nếu Điều lệ công ty không quy định thời hạn dài hơn. Thông báo mời họp phải có tên, địa chỉ trụ sở chính, mã số doanh nghiệp; tên, địa chỉ liên lạc của cổ đông, thời gian, địa điểm họp và những yêu cầu khác đối với người dự họp."},{"k":"p","t":"2. Thông báo mời họp được gửi bằng phương thức để bảo đảm đến được địa chỉ liên lạc của cổ đông và đăng trên trang thông tin điện tử của công ty; trường hợp công ty xét thấy cần thiết thì đăng báo hằng ngày của trung ương hoặc địa phương theo quy định của Điều lệ công ty."},{"k":"p","t":"3. Thông báo mời họp phải được gửi kèm theo các tài liệu sau đây:"},{"k":"p","t":"a) Chương trình họp, các tài liệu sử dụng trong cuộc họp và dự thảo nghị quyết đối với từng vấn đề trong chương trình họp;"},{"k":"p","t":"b) Phiếu biểu quyết."},{"k":"p","t":"4. Trường hợp công ty có trang thông tin điện tử, việc gửi tài liệu họp kèm theo thông báo mời họp quy định tại khoản 3 Điều này có thể thay thế bằng việc đăng tải lên trang thông tin điện tử của công ty. Trường hợp này, thông báo mời họp phải ghi rõ nơi, cách thức tải tài liệu."}]},{"id":"luat-59_144","no":144,"code":"Điều 144","title":"Điều 144. Thực hiện quyền dự họp Đại hội đồng cổ đông","shortTitle":"Thực hiện quyền dự họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ đông, người đại diện theo ủy quyền của cổ đông là tổ chức có thể trực tiếp tham dự họp, ủy quyền bằng văn bản cho một hoặc một số cá nhân, tổ chức khác dự họp hoặc dự họp thông qua một trong các hình thức quy định tại khoản 3 Điều này."},{"k":"p","t":"2. Việc ủy quyền cho cá nhân, tổ chức đại diện dự họp Đại hội đồng cổ đông phải lập thành văn bản. Văn bản ủy quyền được lập theo quy định của pháp luật về dân sự và phải nêu rõ tên cá nhân, tổ chức được ủy quyền và số lượng cổ phần được ủy quyền. Cá nhân, tổ chức được ủy quyền dự họp Đại hội đồng cổ đông phải xuất trình văn bản ủy quyền khi đăng ký dự họp trước khi vào phòng họp."},{"k":"p","t":"3. Cổ đông được coi là tham dự và biểu quyết tại cuộc họp Đại hội đồng cổ đông trong trường hợp sau đây:"},{"k":"p","t":"a) Tham dự và biểu quyết trực tiếp tại cuộc họp;"},{"k":"p","t":"b) Ủy quyền cho cá nhân, tổ chức khác tham dự và biểu quyết tại cuộc họp;"},{"k":"p","t":"c) Tham dự và biểu quyết thông qua hội nghị trực tuyến, bỏ phiếu điện tử hoặc hình thức điện tử khác;"},{"k":"p","t":"d) Gửi phiếu biểu quyết đến cuộc họp thông qua gửi thư, fax, thư điện tử;"},{"k":"p","t":"đ) Gửi phiếu biểu quyết bằng phương tiện khác theo quy định trong Điều lệ công ty."}]},{"id":"luat-59_145","no":145,"code":"Điều 145","title":"Điều 145. Điều kiện tiến hành họp Đại hội đồng cổ đông","shortTitle":"Điều kiện tiến hành họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cuộc họp Đại hội đồng cổ đông được tiến hành khi có số cổ đông dự họp đại diện trên 50% tổng số phiếu biểu quyết; tỷ lệ cụ thể do Điều lệ công ty quy định."},{"k":"p","t":"2. Trường hợp cuộc họp lần thứ nhất không đủ điều kiện tiến hành theo quy định tại khoản 1 Điều này thì thông báo mời họp lần thứ hai phải được gửi trong thời hạn 30 ngày kể từ ngày dự định họp lần thứ nhất, nếu Điều lệ công ty không quy định khác. Cuộc họp Đại hội đồng cổ đông lần thứ hai được tiến hành khi có số cổ đông dự họp đại diện từ 33% tổng số phiếu biểu quyết trở lên; tỷ lệ cụ thể do Điều lệ công ty quy định."},{"k":"p","t":"3. Trường hợp cuộc họp lần thứ hai không đủ điều kiện tiến hành theo quy định tại khoản 2 Điều này thì thông báo mời họp lần thứ ba phải được gửi trong thời hạn 20 ngày kể từ ngày dự định họp lần thứ hai, nếu Điều lệ công ty không quy định khác. Cuộc họp Đại hội đồng cổ đông lần thứ ba được tiến hành không phụ thuộc vào tổng số phiếu biểu quyết của các cổ đông dự họp."},{"k":"p","t":"4. Chỉ có Đại hội đồng cổ đông mới có quyền quyết định thay đổi chương trình họp đã được gửi kèm theo thông báo mời họp theo quy định tại Điều 142 của Luật này."}]},{"id":"luat-59_146","no":146,"code":"Điều 146","title":"Điều 146. Thể thức tiến hành họp và biểu quyết tại cuộc họp Đại hội đồng cổ đông","shortTitle":"Thể thức tiến hành họp và biểu quyết tại cuộc họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Trong trường hợp Điều lệ công ty không có quy định khác thì thể thức họp và biểu quyết tại cuộc họp Đại hội đồng cổ đông được tiến hành như sau:"},{"k":"p","t":"1. Trước khi khai mạc cuộc họp, phải tiến hành đăng ký cổ đông dự họp Đại hội đồng cổ đông;"},{"k":"p","t":"2. Việc bầu chủ tọa, thư ký và ban kiểm phiếu được quy định như sau:"},{"k":"p","t":"a) Chủ tịch Hội đồng quản trị làm chủ tọa hoặc ủy quyền cho thành viên Hội đồng quản trị khác làm chủ tọa cuộc họp Đại hội đồng cổ đông do Hội đồng quản trị triệu tập; trường hợp Chủ tịch vắng mặt hoặc tạm thời mất khả năng làm việc thì các thành viên Hội đồng quản trị còn lại bầu một người trong số họ làm chủ tọa cuộc họp theo nguyên tắc đa số; trường hợp không bầu được người làm chủ tọa thì Trưởng Ban kiểm soát điều hành để Đại hội đồng cổ đông bầu chủ tọa cuộc họp và người có số phiếu bầu cao nhất làm chủ tọa cuộc họp;"},{"k":"p","t":"b) Trừ trường hợp quy định tại điểm a khoản này, người ký tên triệu tập họp Đại hội đồng cổ đông điều hành để Đại hội đồng cổ đông bầu chủ tọa cuộc họp và người có số phiếu bầu cao nhất làm chủ tọa cuộc họp;"},{"k":"p","t":"c) Chủ tọa cử một hoặc một số người làm thư ký cuộc họp;"},{"k":"p","t":"d) Đại hội đồng cổ đông bầu một hoặc một số người vào ban kiểm phiếu theo đề nghị của chủ tọa cuộc họp;"},{"k":"p","t":"3. Chương trình và nội dung họp phải được Đại hội đồng cổ đông thông qua trong phiên khai mạc. Chương trình phải xác định thời gian đối với từng vấn đề trong nội dung chương trình họp;"},{"k":"p","t":"4. Chủ tọa có quyền thực hiện các biện pháp cần thiết và hợp lý để điều hành cuộc họp một cách có trật tự, đúng theo chương trình đã được thông qua và phản ánh được mong muốn của đa số người dự họp;"},{"k":"p","t":"5. Đại hội đồng cổ đông thảo luận và biểu quyết theo từng vấn đề trong nội dung chương trình. Việc biểu quyết được tiến hành bằng biểu quyết tán thành, không tán thành và không có ý kiến. Kết quả kiểm phiếu được chủ tọa công bố ngay trước khi bế mạc cuộc họp, trừ trường hợp Điều lệ công ty có quy định khác;"},{"k":"p","t":"6. Cổ đông hoặc người được ủy quyền dự họp đến sau khi cuộc họp đã khai mạc vẫn được đăng ký và có quyền tham gia biểu quyết ngay sau khi đăng ký; trong trường hợp này, hiệu lực của những nội dung đã được biểu quyết trước đó không thay đổi;"},{"k":"p","t":"7. Người triệu tập họp hoặc chủ tọa cuộc họp Đại hội đồng cổ đông có quyền sau đây:"},{"k":"p","t":"a) Yêu cầu tất cả người dự họp chịu sự kiểm tra hoặc các biện pháp an ninh hợp pháp, hợp lý khác;"},{"k":"p","t":"b) Yêu cầu cơ quan có thẩm quyền duy trì trật tự cuộc họp; trục xuất những người không tuân thủ quyền điều hành của chủ tọa, cố ý gây rối trật tự, ngăn cản tiến triển bình thường của cuộc họp hoặc không tuân thủ các yêu cầu về kiểm tra an ninh ra khỏi cuộc họp Đại hội đồng cổ đông;"},{"k":"p","t":"8. Chủ tọa có quyền hoãn cuộc họp Đại hội đồng cổ đông đã có đủ số người đăng ký dự họp tối đa không quá 03 ngày làm việc kể từ ngày cuộc họp dự định khai mạc và chỉ được hoãn cuộc họp hoặc thay đổi địa điểm họp trong trường hợp sau đây:"},{"k":"p","t":"a) Địa điểm họp không có đủ chỗ ngồi thuận tiện cho tất cả người dự họp;"},{"k":"p","t":"b) Phương tiện thông tin tại địa điểm họp không bảo đảm cho cổ đông dự họp tham gia, thảo luận và biểu quyết;"},{"k":"p","t":"c) Có người dự họp cản trở, gây rối trật tự, có nguy cơ làm cho cuộc họp không được tiến hành một cách công bằng và hợp pháp;"},{"k":"p","t":"9. Trường hợp chủ tọa hoãn hoặc tạm dừng họp Đại hội đồng cổ đông trái với quy định tại khoản 8 Điều này, Đại hội đồng cổ đông bầu một người khác trong số những người dự họp để thay thế chủ tọa điều hành cuộc họp cho đến lúc kết thúc; tất cả nghị quyết được thông qua tại cuộc họp đó đều có hiệu lực thi hành."}]},{"id":"luat-59_147","no":147,"code":"Điều 147","title":"Điều 147. Hình thức thông qua nghị quyết Đại hội đồng cổ đông","shortTitle":"Hình thức thông qua nghị quyết Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Đại hội đồng cổ đông thông qua nghị quyết thuộc thẩm quyền bằng hình thức biểu quyết tại cuộc họp hoặc lấy ý kiến bằng văn bản."},{"k":"p","t":"2. Trường hợp Điều lệ công ty không có quy định khác thì nghị quyết Đại hội đồng cổ đông về các vấn đề sau đây phải được thông qua bằng hình thức biểu quyết tại cuộc họp Đại hội đồng cổ đông:"},{"k":"p","t":"a) Sửa đổi, bổ sung nội dung của Điều lệ công ty;"},{"k":"p","t":"b) Định hướng phát triển công ty;"},{"k":"p","t":"c) Loại cổ phần và tổng số cổ phần của từng loại;"},{"k":"p","t":"d) Bầu, miễn nhiệm, bãi nhiệm thành viên Hội đồng quản trị và Ban kiểm soát;"},{"k":"p","t":"đ) Quyết định đầu tư hoặc bán số tài sản có giá trị từ 35% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty, trừ trường hợp Điều lệ công ty quy định tỷ lệ hoặc giá trị khác;"},{"k":"p","t":"e) Thông qua báo cáo tài chính hằng năm;"},{"k":"p","t":"g) Tổ chức lại, giải thể công ty."}]},{"id":"luat-59_148","no":148,"code":"Điều 148","title":"Điều 148. Điều kiện để nghị quyết Đại hội đồng cổ đông được thông qua","shortTitle":"Điều kiện để nghị quyết Đại hội đồng cổ đông được thông qua","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị quyết về nội dung sau đây được thông qua nếu được số cổ đông đại diện từ 65% tổng số phiếu biểu quyết trở lên của tất cả cổ đông dự họp tán thành, trừ trường hợp quy định tại các khoản 3, 4 và 6 Điều này; tỷ lệ cụ thể do Điều lệ công ty quy định:"},{"k":"p","t":"a) Loại cổ phần và tổng số cổ phần của từng loại;"},{"k":"p","t":"b) Thay đổi ngành, nghề và lĩnh vực kinh doanh;"},{"k":"p","t":"c) Thay đổi cơ cấu tổ chức quản lý công ty;"},{"k":"p","t":"d) Dự án đầu tư hoặc bán tài sản có giá trị từ 35% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty, trừ trường hợp Điều lệ công ty quy định tỷ lệ hoặc giá trị khác;"},{"k":"p","t":"đ) Tổ chức lại, giải thể công ty;"},{"k":"p","t":"e) Vấn đề khác do Điều lệ công ty quy định."},{"k":"p","t":"2. Các nghị quyết được thông qua khi được số cổ đông sở hữu trên 50% tổng số phiếu biểu quyết của tất cả cổ đông dự họp tán thành, trừ trường hợp quy định tại các khoản 1, 3, 4 và 6 Điều này; tỷ lệ cụ thể do Điều lệ công ty quy định."},{"k":"p","t":"3. Trừ trường hợp Điều lệ công ty có quy định khác, việc biểu quyết bầu thành viên Hội đồng quản trị và Ban kiểm soát phải thực hiện theo phương thức bầu dồn phiếu, theo đó mỗi cổ đông có tổng số phiếu biểu quyết tương ứng với tổng số cổ phần sở hữu nhân với số thành viên được bầu của Hội đồng quản trị hoặc Ban kiểm soát và cổ đông có quyền dồn hết hoặc một phần tổng số phiếu bầu của mình cho một hoặc một số ứng cử viên. Người trúng cử thành viên Hội đồng quản trị hoặc Kiểm soát viên được xác định theo số phiếu bầu tính từ cao xuống thấp, bắt đầu từ ứng cử viên có số phiếu bầu cao nhất cho đến khi đủ số thành viên quy định tại Điều lệ công ty. Trường hợp có từ 02 ứng cử viên trở lên đạt cùng số phiếu bầu như nhau cho thành viên cuối cùng của Hội đồng quản trị hoặc Ban kiểm soát thì sẽ tiến hành bầu lại trong số các ứng cử viên có số phiếu bầu ngang nhau hoặc lựa chọn theo tiêu chí quy định tại quy chế bầu cử hoặc Điều lệ công ty."},{"k":"p","t":"4. Trường hợp thông qua nghị quyết dưới hình thức lấy ý kiến bằng văn bản thì nghị quyết Đại hội đồng cổ đông được thông qua nếu được số cổ đông sở hữu trên 50% tổng số phiếu biểu quyết của tất cả cổ đông có quyền biểu quyết tán thành; tỷ lệ cụ thể do Điều lệ công ty quy định."},{"k":"p","t":"5. Nghị quyết Đại hội đồng cổ đông phải được thông báo đến cổ đông có quyền dự họp Đại hội đồng cổ đông trong thời hạn 15 ngày kể từ ngày thông qua; trường hợp công ty có trang thông tin điện tử, việc gửi nghị quyết có thể thay thế bằng việc đăng tải lên trang thông tin điện tử của công ty."},{"k":"p","t":"6. Nghị quyết Đại hội đồng cổ đông về nội dung làm thay đổi bất lợi quyền và nghĩa vụ của cổ đông sở hữu cổ phần ưu đãi chỉ được thông qua nếu được số cổ đông ưu đãi cùng loại dự họp sở hữu từ 75% tổng số cổ phần ưu đãi loại đó trở lên tán thành hoặc được các cổ đông ưu đãi cùng loại sở hữu từ 75% tổng số cổ phần ưu đãi loại đó trở lên tán thành trong trường hợp thông qua nghị quyết dưới hình thức lấy ý kiến bằng văn bản."}]},{"id":"luat-59_149","no":149,"code":"Điều 149","title":"Điều 149. Thẩm quyền và thể thức lấy ý kiến cổ đông bằng văn bản để thông qua nghị quyết Đại hội đồng cổ đông","shortTitle":"Thẩm quyền và thể thức lấy ý kiến cổ đông bằng văn bản để thông qua nghị quyết Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp Điều lệ công ty không có quy định khác thì thẩm quyền và thể thức lấy ý kiến cổ đông bằng văn bản để thông qua nghị quyết Đại hội đồng cổ đông được thực hiện theo quy định sau đây:"},{"k":"p","t":"1. Hội đồng quản trị có quyền lấy ý kiến cổ đông bằng văn bản để thông qua nghị quyết Đại hội đồng cổ đông khi xét thấy cần thiết vì lợi ích của công ty, trừ trường hợp quy định tại khoản 2 Điều 147 của Luật này;"},{"k":"p","t":"2. Hội đồng quản trị chuẩn bị phiếu lấy ý kiến, dự thảo nghị quyết Đại hội đồng cổ đông, các tài liệu giải trình dự thảo nghị quyết và gửi đến tất cả cổ đông có quyền biểu quyết chậm nhất là 10 ngày trước thời hạn phải gửi lại phiếu lấy ý kiến, nếu Điều lệ công ty không quy định thời hạn khác dài hơn. Việc lập danh sách cổ đông gửi phiếu lấy ý kiến thực hiện theo quy định tại khoản 1 và khoản 2 Điều 141 của Luật này. Yêu cầu và cách thức gửi phiếu lấy ý kiến và tài liệu kèm theo thực hiện theo quy định tại Điều 143 của Luật này;"},{"k":"p","t":"3. Phiếu lấy ý kiến phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính, mã số doanh nghiệp;"},{"k":"p","t":"b) Mục đích lấy ý kiến;"},{"k":"p","t":"c) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức hoặc họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với đại diện của cổ đông là tổ chức; số lượng cổ phần của từng loại và số phiếu biểu quyết của cổ đông;"},{"k":"p","t":"d) Vấn đề cần lấy ý kiến để thông qua;"},{"k":"p","t":"đ) Phương án biểu quyết bao gồm tán thành, không tán thành và không có ý kiến;"},{"k":"p","t":"e) Thời hạn phải gửi về công ty phiếu lấy ý kiến đã được trả lời;"},{"k":"p","t":"g) Họ, tên, chữ ký của Chủ tịch Hội đồng quản trị;"},{"k":"p","t":"4. Cổ đông có thể gửi phiếu lấy ý kiến đã trả lời đến công ty bằng hình thức gửi thư, fax hoặc thư điện tử theo quy định sau đây:"},{"k":"p","t":"a) Trường hợp gửi thư, phiếu lấy ý kiến đã được trả lời phải có chữ ký của cổ đông là cá nhân, của người đại diện theo ủy quyền hoặc người đại diện theo pháp luật của cổ đông là tổ chức. Phiếu lấy ý kiến gửi về công ty phải được đựng trong phong bì dán kín và không ai được quyền mở trước khi kiểm phiếu;"},{"k":"p","t":"b) Trường hợp gửi fax hoặc thư điện tử, phiếu lấy ý kiến gửi về công ty phải được giữ bí mật đến thời điểm kiểm phiếu;"},{"k":"p","t":"c) Các phiếu lấy ý kiến gửi về công ty sau thời hạn đã xác định tại nội dung phiếu lấy ý kiến hoặc đã bị mở trong trường hợp gửi thư và bị tiết lộ trong trường hợp gửi fax, thư điện tử là không hợp lệ. Phiếu lấy ý kiến không được gửi về được coi là phiếu không tham gia biểu quyết;"},{"k":"p","t":"5. Hội đồng quản trị tổ chức kiểm phiếu và lập biên bản kiểm phiếu dưới sự chứng kiến, giám sát của Ban kiểm soát hoặc của cổ đông không nắm giữ chức vụ quản lý công ty. Biên bản kiểm phiếu phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính, mã số doanh nghiệp;"},{"k":"p","t":"b) Mục đích và các vấn đề cần lấy ý kiến để thông qua nghị quyết;"},{"k":"p","t":"c) Số cổ đông với tổng số phiếu biểu quyết đã tham gia biểu quyết, trong đó phân biệt số phiếu biểu quyết hợp lệ và số phiếu biểu quyết không hợp lệ và phương thức gửi phiếu biểu quyết, kèm theo phụ lục danh sách cổ đông tham gia biểu quyết;"},{"k":"p","t":"d) Tổng số phiếu tán thành, không tán thành và không có ý kiến đối với từng vấn đề;"},{"k":"p","t":"đ) Vấn đề đã được thông qua và tỷ lệ biểu quyết thông qua tương ứng;"},{"k":"p","t":"e) Họ, tên, chữ ký của Chủ tịch Hội đồng quản trị, người giám sát kiểm phiếu và người kiểm phiếu."},{"k":"p","t":"Các thành viên Hội đồng quản trị, người kiểm phiếu và người giám sát kiểm phiếu phải liên đới chịu trách nhiệm về tính trung thực, chính xác của biên bản kiểm phiếu; liên đới chịu trách nhiệm về các thiệt hại phát sinh từ các quyết định được thông qua do kiểm phiếu không trung thực, không chính xác;"},{"k":"p","t":"6. Biên bản kiểm phiếu và nghị quyết phải được gửi đến các cổ đông trong thời hạn 15 ngày kể từ ngày kết thúc kiểm phiếu. Trường hợp công ty có trang thông tin điện tử, việc gửi biên bản kiểm phiếu và nghị quyết có thể thay thế bằng việc đăng tải lên trang thông tin điện tử của công ty;"},{"k":"p","t":"7. Phiếu lấy ý kiến đã được trả lời, biên bản kiểm phiếu, nghị quyết đã được thông qua và tài liệu có liên quan gửi kèm theo phiếu lấy ý kiến được lưu giữ tại trụ sở chính của công ty;"},{"k":"p","t":"8. Nghị quyết được thông qua theo hình thức lấy ý kiến cổ đông bằng văn bản có giá trị như nghị quyết được thông qua tại cuộc họp Đại hội đồng cổ đông."}]},{"id":"luat-59_150","no":150,"code":"Điều 150","title":"Điều 150. Biên bản họp Đại hội đồng cổ đông","shortTitle":"Biên bản họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cuộc họp Đại hội đồng cổ đông phải được ghi biên bản và có thể ghi âm hoặc ghi và lưu giữ dưới hình thức điện tử khác. Biên bản phải lập bằng tiếng Việt, có thể lập thêm bằng tiếng nước ngoài và phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính, mã số doanh nghiệp;"},{"k":"p","t":"b) Thời gian và địa điểm họp Đại hội đồng cổ đông;"},{"k":"p","t":"c) Chương trình và nội dung cuộc họp;"},{"k":"p","t":"d) Họ, tên chủ tọa và thư ký;"},{"k":"p","t":"đ) Tóm tắt diễn biến cuộc họp và các ý kiến phát biểu tại Đại hội đồng cổ đông về từng vấn đề trong nội dung chương trình họp;"},{"k":"p","t":"e) Số cổ đông và tổng số phiếu biểu quyết của các cổ đông dự họp, phụ lục danh sách đăng ký cổ đông, đại diện cổ đông dự họp với số cổ phần và số phiếu bầu tương ứng;"},{"k":"p","t":"g) Tổng số phiếu biểu quyết đối với từng vấn đề biểu quyết, trong đó ghi rõ phương thức biểu quyết, tổng số phiếu hợp lệ, không hợp lệ, tán thành, không tán thành và không có ý kiến; tỷ lệ tương ứng trên tổng số phiếu biểu quyết của cổ đông dự họp;"},{"k":"p","t":"h) Các vấn đề đã được thông qua và tỷ lệ phiếu biểu quyết thông qua tương ứng;"},{"k":"p","t":"i) Họ, tên, chữ ký của chủ tọa và thư ký."},{"k":"p","t":"Trường hợp chủ tọa, thư ký từ chối ký biên bản họp thì biên bản này có hiệu lực nếu được tất cả thành viên khác của Hội đồng quản trị tham dự họp ký và có đầy đủ nội dung theo quy định tại khoản này. Biên bản họp ghi rõ việc chủ tọa, thư ký từ chối ký biên bản họp."},{"k":"p","t":"2. Biên bản họp Đại hội đồng cổ đông phải làm xong và thông qua trước khi kết thúc cuộc họp."},{"k":"p","t":"3. Chủ tọa và thư ký cuộc họp hoặc người khác ký tên trong biên bản họp phải liên đới chịu trách nhiệm về tính trung thực, chính xác của nội dung biên bản."},{"k":"p","t":"4. Biên bản lập bằng tiếng Việt và tiếng nước ngoài có hiệu lực pháp lý như nhau. Trường hợp có sự khác nhau về nội dung giữa biên bản bằng tiếng Việt và bằng tiếng nước ngoài thì nội dung trong biên bản bằng tiếng Việt được áp dụng."},{"k":"p","t":"5. Biên bản họp Đại hội đồng cổ đông phải được gửi đến tất cả cổ đông trong thời hạn 15 ngày kể từ ngày kết thúc cuộc họp; việc gửi biên bản kiểm phiếu có thể thay thế bằng việc đăng tải lên trang thông tin điện tử của công ty."},{"k":"p","t":"6. Biên bản họp Đại hội đồng cổ đông, phụ lục danh sách cổ đông đăng ký dự họp, nghị quyết đã được thông qua và tài liệu có liên quan gửi kèm theo thông báo mời họp phải được lưu giữ tại trụ sở chính của công ty."}]},{"id":"luat-59_151","no":151,"code":"Điều 151","title":"Điều 151. Yêu cầu hủy bỏ nghị quyết Đại hội đồng cổ đông","shortTitle":"Yêu cầu hủy bỏ nghị quyết Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Trong thời hạn 90 ngày kể từ ngày nhận được nghị quyết hoặc biên bản họp Đại hội đồng cổ đông hoặc biên bản kết quả kiểm phiếu lấy ý kiến Đại hội đồng cổ đông, cổ đông, nhóm cổ đông quy định tại khoản 2 Điều 115 của Luật này có quyền yêu cầu Tòa án hoặc Trọng tài xem xét, hủy bỏ nghị quyết hoặc một phần nội dung nghị quyết Đại hội đồng cổ đông trong các trường hợp sau đây:"},{"k":"p","t":"1. Trình tự, thủ tục triệu tập họp và ra quyết định của Đại hội đồng cổ đông vi phạm nghiêm trọng quy định của Luật này và Điều lệ công ty, trừ trường hợp quy định tại khoản 2 Điều 152 của Luật này;"},{"k":"p","t":"2. Nội dung nghị quyết vi phạm pháp luật hoặc Điều lệ công ty."}]},{"id":"luat-59_152","no":152,"code":"Điều 152","title":"Điều 152. Hiệu lực của nghị quyết Đại hội đồng cổ đông","shortTitle":"Hiệu lực của nghị quyết Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị quyết Đại hội đồng cổ đông có hiệu lực kể từ ngày được thông qua hoặc từ thời điểm có hiệu lực ghi tại nghị quyết đó."},{"k":"p","t":"2. Nghị quyết Đại hội đồng cổ đông được thông qua bằng 100% tổng số cổ phần có quyền biểu quyết là hợp pháp và có hiệu lực ngay cả khi trình tự, thủ tục triệu tập họp và thông qua nghị quyết đó vi phạm quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"3. Trường hợp có cổ đông, nhóm cổ đông yêu cầu Tòa án hoặc Trọng tài hủy bỏ nghị quyết Đại hội đồng cổ đông theo quy định tại Điều 151 của Luật này, nghị quyết đó vẫn có hiệu lực thi hành cho đến khi quyết định hủy bỏ nghị quyết đó của Tòa án, Trọng tài có hiệu lực, trừ trường hợp áp dụng biện pháp khẩn cấp tạm thời theo quyết định của cơ quan có thẩm quyền."}]},{"id":"luat-59_153","no":153,"code":"Điều 153","title":"Điều 153. Hội đồng quản trị","shortTitle":"Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng quản trị là cơ quan quản lý công ty, có toàn quyền nhân danh công ty để quyết định, thực hiện quyền và nghĩa vụ của công ty, trừ các quyền và nghĩa vụ thuộc thẩm quyền của Đại hội đồng cổ đông."},{"k":"p","t":"2. Hội đồng quản trị có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Quyết định chiến lược, kế hoạch phát triển trung hạn và kế hoạch kinh doanh hằng năm của công ty;"},{"k":"p","t":"b) Kiến nghị loại cổ phần và tổng số cổ phần được quyền chào bán của từng loại;"},{"k":"p","t":"c) Quyết định bán cổ phần chưa bán trong phạm vi số cổ phần được quyền chào bán của từng loại; quyết định huy động thêm vốn theo hình thức khác;"},{"k":"p","t":"d) Quyết định giá bán cổ phần và trái phiếu của công ty;"},{"k":"p","t":"đ) Quyết định mua lại cổ phần theo quy định tại khoản 1 và khoản 2 Điều 133 của Luật này;"},{"k":"p","t":"e) Quyết định phương án đầu tư và dự án đầu tư trong thẩm quyền và giới hạn theo quy định của pháp luật;"},{"k":"p","t":"g) Quyết định giải pháp phát triển thị trường, tiếp thị và công nghệ;"},{"k":"p","t":"h) Thông qua hợp đồng mua, bán, vay, cho vay và hợp đồng, giao dịch khác có giá trị từ 3 5% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty, trừ trường hợp Điều lệ công ty có quy định tỷ lệ hoặc giá trị khác và hợp đồng, giao dịch thuộc thẩm quyền quyết định của Đại hội đồng cổ đông theo quy định tại điểm d khoản 2 Điều 138, khoản 1 và khoản 3 Điều 167 của Luật này;"},{"k":"p","t":"i) Bầu, miễn nhiệm, bãi nhiệm Chủ tịch Hội đồng quản trị; bổ nhiệm, miễn nhiệm, ký kết hợp đồng, chấm dứt hợp đồng đối với Giám đốc hoặc Tổng giám đốc và người quản lý quan trọng khác do Điều lệ công ty quy định; quyết định tiền lương, thù lao, thưởng và lợi ích khác của những người quản lý đó; cử người đại diện theo ủy quyền tham gia Hội đồng thành viên hoặc Đại hội đồng cổ đông ở công ty khác, quyết định mức thù lao và quyền lợi khác của những người đó;"},{"k":"p","t":"k) Giám sát, chỉ đạo Giám đốc hoặc Tổng giám đốc và người quản lý khác trong điều hành công việc kinh doanh hằng ngày của công ty;"},{"k":"p","t":"l) Quyết định cơ cấu tổ chức, quy chế quản lý nội bộ của công ty, quyết định thành lập công ty con, chi nhánh, văn phòng đại diện và việc góp vốn, mua cổ phần của doanh nghiệp khác;"},{"k":"p","t":"m) Duyệt chương trình, nội dung tài liệu phục vụ họp Đại hội đồng cổ đông, triệu tập họp Đại hội đồng cổ đông hoặc lấy ý kiến để Đại hội đồng cổ đông thông qua nghị quyết;"},{"k":"p","t":"n) Trình báo cáo tài chính hằng năm lên Đại hội đồng cổ đông;"},{"k":"p","t":"o) Kiến nghị mức cổ tức được trả; quyết định thời hạn và thủ tục trả cổ tức hoặc xử lý lỗ phát sinh trong quá trình kinh doanh;"},{"k":"p","t":"p) Kiến nghị việc tổ chức lại, giải thể công ty; yêu cầu phá sản công ty;"},{"k":"p","t":"q) Quyền và nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"3. Hội đồng quản trị thông qua nghị quyết, quyết định bằng biểu quyết tại cuộc họp, lấy ý kiến bằng văn bản hoặc hình thức khác do Điều lệ công ty quy định. Mỗi thành viên Hội đồng quản trị có một phiếu biểu quyết."},{"k":"p","t":"4. Trường hợp nghị quyết, quyết định do Hội đồng quản trị thông qua trái với quy định của pháp luật, nghị quyết Đại hội đồng cổ đông, Điều lệ công ty gây thiệt hại cho công ty thì các thành viên tán thành thông qua nghị quyết, quyết định đó phải cùng liên đới chịu trách nhiệm cá nhân về nghị quyết, quyết định đó và phải đền bù thiệt hại cho công ty; thành viên phản đối thông qua nghị quyết, quyết định nói trên được miễn trừ trách nhiệm. Trường hợp này, cổ đông của công ty có quyền yêu cầu Tòa án đình chỉ thực hiện hoặc hủy bỏ nghị quyết, quyết định nói trên."}]},{"id":"luat-59_154","no":154,"code":"Điều 154","title":"Điều 154. Nhiệm kỳ và số lượng thành viên Hội đồng quản trị","shortTitle":"Nhiệm kỳ và số lượng thành viên Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng quản trị có từ 03 đến 11 thành viên. Điều lệ công ty quy định cụ thể số lượng thành viên Hội đồng quản trị."},{"k":"p","t":"2. Nhiệm kỳ của thành viên Hội đồng quản trị không quá 05 năm và có thể được bầu lại với số nhiệm kỳ không hạn chế. Một cá nhân chỉ được bầu làm thành viên độc lập Hội đồng quản trị của một công ty không quá 02 nhiệm kỳ liên tục."},{"k":"p","t":"3. Trường hợp tất cả thành viên Hội đồng quản trị cùng kết thúc nhiệm kỳ thì các thành viên đó tiếp tục là thành viên Hội đồng quản trị cho đến khi có thành viên mới được bầu thay thế và tiếp quản công việc, trừ trường hợp Điều lệ công ty có quy định khác."},{"k":"p","t":"4. Điều lệ công ty quy định cụ thể số lượng, quyền, nghĩa vụ, cách thức tổ chức và phối hợp hoạt động của các thành viên độc lập Hội đồng quản trị."}]},{"id":"luat-59_155","no":155,"code":"Điều 155","title":"Điều 155. Cơ cấu tổ chức, tiêu chuẩn và điều kiện làm thành viên Hội đồng quản trị","shortTitle":"Cơ cấu tổ chức, tiêu chuẩn và điều kiện làm thành viên Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên Hội đồng quản trị phải có các tiêu chuẩn và điều kiện sau đây:"},{"k":"p","t":"a) Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này;"},{"k":"p","t":"b) Có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh hoặc trong lĩnh vực, ngành, nghề kinh doanh của công ty và không nhất thiết phải là cổ đông của công ty, trừ trường hợp Điều lệ công ty có quy định khác;"},{"k":"p","t":"c) Thành viên Hội đồng quản trị công ty có thể đồng thời là thành viên Hội đồng quản trị của công ty khác;"},{"k":"p","t":"d) Đối với doanh nghiệp nhà nước theo quy định tại điểm b khoản 1 Điều 88 của Luật này và công ty con của doanh nghiệp nhà nước theo quy định tại khoản 1 Điều 88 của Luật này thì thành viên Hội đồng quản trị không được là người có quan hệ gia đình của Giám đốc, Tổng giám đốc và người quản lý khác của công ty; của người quản lý, người có thẩm quyền bổ nhiệm người quản lý công ty mẹ."},{"k":"p","t":"2. Trừ trường hợp pháp luật về chứng khoán có quy định khác, thành viên độc lập Hội đồng quản trị theo quy định tại điểm b khoản 1 Điều 137 của Luật này phải có các tiêu chuẩn và điều kiện sau đây:"},{"k":"p","t":"a) Không phải là người đang làm việc cho công ty, công ty mẹ hoặc công ty con của công ty; không phải là người đã từng làm việc cho công ty, công ty mẹ hoặc công ty con của công ty ít nhất trong 03 năm liền trước đó;"},{"k":"p","t":"b) Không phải là người đang hưởng lương, thù lao từ công ty, trừ các khoản phụ cấp mà thành viên Hội đồng quản trị được hưởng theo quy định;"},{"k":"p","t":"c) Không phải là người có vợ hoặc chồng, bố đẻ, bố nuôi, mẹ đẻ, mẹ nuôi, con đẻ, con nuôi, anh ruột, chị ruột, em ruột là cổ đông lớn của công ty; là người quản lý của công ty hoặc công ty con của công ty;"},{"k":"p","t":"d) Không phải là người trực tiếp hoặc gián tiếp sở hữu ít nhất 01% tổng số cổ phần có quyền biểu quyết của công ty;"},{"k":"p","t":"đ) Không phải là người đã từng làm thành viên Hội đồng quản trị, Ban kiểm soát của công ty ít nhất trong 05 năm liền trước đó, trừ trường hợp được bổ nhiệm liên tục 02 nhiệm kỳ."},{"k":"p","t":"3. Thành viên độc lập Hội đồng quản trị phải thông báo với Hội đồng quản trị về việc không còn đáp ứng đủ các tiêu chuẩn và điều kiện quy định tại khoản 2 Điều này và đương nhiên không còn là thành viên độc lập Hội đồng quản trị kể từ ngày không đáp ứng đủ các tiêu chuẩn và điều kiện. Hội đồng quản trị phải thông báo trường hợp thành viên độc lập Hội đồng quản trị không còn đáp ứng đủ các tiêu chuẩn và điều kiện tại cuộc họp Đại hội đồng cổ đông gần nhất hoặc triệu tập họp Đại hội đồng cổ đông để bầu bổ sung hoặc thay thế thành viên độc lập Hội đồng quản trị trong thời hạn 06 tháng kể từ ngày nhận được thông báo của thành viên độc lập Hội đồng quản trị có liên quan."}]},{"id":"luat-59_156","no":156,"code":"Điều 156","title":"Điều 156. Chủ tịch Hội đồng quản trị","shortTitle":"Chủ tịch Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch Hội đồng quản trị do Hội đồng quản trị bầu, miễn nhiệm, bãi nhiệm trong số các thành viên Hội đồng quản trị."},{"k":"p","t":"2. Chủ tịch Hội đồng quản trị công ty đại chúng và công ty cổ phần quy định tại điểm b khoản 1 Điều 88 của Luật này không được kiêm Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"3. Chủ tịch Hội đồng quản trị có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Lập chương trình, kế hoạch hoạt động của Hội đồng quản trị;"},{"k":"p","t":"b) Chuẩn bị chương trình, nội dung, tài liệu phục vụ cuộc họp; triệu tập, chủ trì và làm chủ tọa cuộc họp Hội đồng quản trị;"},{"k":"p","t":"c) Tổ chức việc thông qua nghị quyết, quyết định của Hội đồng quản trị;"},{"k":"p","t":"d) Giám sát quá trình tổ chức thực hiện các nghị quyết, quyết định của Hội đồng quản trị;"},{"k":"p","t":"đ) Chủ tọa cuộc họp Đại hội đồng cổ đông;"},{"k":"p","t":"e) Quyền và nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"4. Trường hợp Chủ tịch Hội đồng quản trị vắng mặt hoặc không thể thực hiện được nhiệm vụ của mình thì phải ủy quyền bằng văn bản cho một thành viên khác thực hiện quyền và nghĩa vụ của Chủ tịch Hội đồng quản trị theo nguyên tắc quy định tại Điều lệ công ty. Trường hợp không có người được ủy quyền hoặc Chủ tịch Hội đồng quản trị chết, mất tích, bị tạm giam, đang chấp hành hình phạt tù, đang chấp hành biện pháp xử lý hành chính tại cơ sở cai nghiện bắt buộc, cơ sở giáo dục bắt buộc, trốn khỏi nơi cư trú, bị hạn chế hoặc mất năng lực hành vi dân sự, có khó khăn trong nhận thức, làm chủ hành vi, bị Tòa án cấm đảm nhiệm chức vụ, cấm hành nghề hoặc làm công việc nhất định thì các thành viên còn lại bầu một người trong số các thành viên giữ chức Chủ tịch Hội đồng quản trị theo nguyên tắc đa số thành viên còn lại tán thành cho đến khi có quyết định mới của Hội đồng quản trị."},{"k":"p","t":"5. Khi xét thấy cần thiết, Hội đồng quản trị quyết định bổ nhiệm thư ký công ty. Thư ký công ty có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Hỗ trợ tổ chức triệu tập họp Đại hội đồng cổ đông, Hội đồng quản trị; ghi chép các biên bản họp;"},{"k":"p","t":"b) Hỗ trợ thành viên Hội đồng quản trị trong việc thực hiện quyền và nghĩa vụ được giao;"},{"k":"p","t":"c) Hỗ trợ Hội đồng quản trị trong áp dụng và thực hiện nguyên tắc quản trị công ty;"},{"k":"p","t":"d) Hỗ trợ công ty trong xây dựng quan hệ cổ đông và bảo vệ quyền, lợi ích hợp pháp của cổ đông; việc tuân thủ nghĩa vụ cung cấp thông tin, công khai hóa thông tin và thủ tục hành chính;"},{"k":"p","t":"đ) Quyền và nghĩa vụ khác theo quy định tại Điều lệ công ty."}]},{"id":"luat-59_157","no":157,"code":"Điều 157","title":"Điều 157. Cuộc họp Hội đồng quản trị","shortTitle":"Cuộc họp Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch Hội đồng quản trị được bầu trong cuộc họp đầu tiên của Hội đồng quản trị trong thời hạn 07 ngày làm việc kể từ ngày kết thúc bầu cử Hội đồng quản trị đó. Cuộc họp này do thành viên có số phiếu bầu cao nhất hoặc tỷ lệ phiếu bầu cao nhất triệu tập và chủ trì. Trường hợp có nhiều hơn một thành viên có số phiếu bầu hoặc tỷ lệ phiếu bầu cao nhất và ngang nhau thì các thành viên bầu theo nguyên tắc đa số để chọn 01 người trong số họ triệu tập họp Hội đồng quản trị."},{"k":"p","t":"2. Hội đồng quản trị họp ít nhất mỗi quý một lần và có thể họp bất thường."},{"k":"p","t":"3. Chủ tịch Hội đồng quản trị triệu tập họp Hội đồng quản trị trong trường hợp sau đây:"},{"k":"p","t":"a) Có đề nghị của Ban kiểm soát hoặc thành viên độc lập Hội đồng quản trị;"},{"k":"p","t":"b) Có đề nghị của Giám đốc hoặc Tổng giám đốc hoặc ít nhất 05 người quản lý khác;"},{"k":"p","t":"c) Có đề nghị của ít nhất 02 thành viên Hội đồng quản trị;"},{"k":"p","t":"d) Trường hợp khác do Điều lệ công ty quy định."},{"k":"p","t":"4. Đề nghị quy định tại khoản 3 Điều này phải được lập thành văn bản, trong đó nêu rõ mục đích, vấn đề cần thảo luận và quyết định thuộc thẩm quyền của Hội đồng quản trị."},{"k":"p","t":"5. Chủ tịch Hội đồng quản trị phải triệu tập họp Hội đồng quản trị trong thời hạn 07 ngày làm việc kể từ ngày nhận được đề nghị quy định tại khoản 3 Điều này. Trường hợp không triệu tập họp Hội đồng quản trị theo đề nghị thì Chủ tịch Hội đồng quản trị phải chịu trách nhiệm về những thiệt hại xảy ra đối với công ty; người đề nghị có quyền thay thế Chủ tịch Hội đồng quản trị triệu tập họp Hội đồng quản trị."},{"k":"p","t":"6. Chủ tịch Hội đồng quản trị hoặc người triệu tập họp Hội đồng quản trị phải gửi thông báo mời họp chậm nhất là 03 ngày làm việc trước ngày họp nếu Điều lệ công ty không có quy định khác. Thông báo mời họp phải xác định cụ thể thời gian và địa điểm họp, chương trình, các vấn đề thảo luận và quyết định. Kèm theo thông báo mời họp phải có tài liệu sử dụng tại cuộc họp và phiếu biểu quyết của thành viên."},{"k":"p","t":"Thông báo mời họp Hội đồng quản trị có thể gửi bằng giấy mời, điện thoại, fax, phương tiện điện tử hoặc phương thức khác do Điều lệ công ty quy định và bảo đảm đến được địa chỉ liên lạc của từng thành viên Hội đồng quản trị được đăng ký tại công ty."},{"k":"p","t":"7. Chủ tịch Hội đồng quản trị hoặc người triệu tập gửi thông báo mời họp và các tài liệu kèm theo đến các Kiểm soát viên như đối với các thành viên Hội đồng quản trị."},{"k":"p","t":"Kiểm soát viên có quyền dự các cuộc họp Hội đồng quản trị; có quyền thảo luận nhưng không được biểu quyết."},{"k":"p","t":"8. Cuộc họp Hội đồng quản trị được tiến hành khi có từ ba phần tư tổng số thành viên trở lên dự họp. Trường hợp cuộc họp được triệu tập theo quy định tại khoản này không đủ số thành viên dự họp theo quy định thì được triệu tập lần thứ hai trong thời hạn 07 ngày kể từ ngày dự định họp lần thứ nhất, trừ trường hợp Điều lệ công ty quy định thời hạn khác ngắn hơn. Trường hợp này, cuộc họp được tiến hành nếu có hơn một nửa số thành viên Hội đồng quản trị dự họp."},{"k":"p","t":"9. Thành viên Hội đồng quản trị được coi là tham dự và biểu quyết tại cuộc họp trong trường hợp sau đây:"},{"k":"p","t":"a) Tham dự và biểu quyết trực tiếp tại cuộc họp;"},{"k":"p","t":"b) Ủy quyền cho người khác đến dự họp và biểu quyết theo quy định tại khoản 11 Điều này;"},{"k":"p","t":"c) Tham dự và biểu quyết thông qua hội nghị trực tuyến, bỏ phiếu điện tử hoặc hình thức điện tử khác;"},{"k":"p","t":"d) Gửi phiếu biểu quyết đến cuộc họp thông qua thư, fax, thư điện tử;"},{"k":"p","t":"đ) Gửi phiếu biểu quyết bằng phương tiện khác theo quy định trong Điều lệ công ty."},{"k":"p","t":"10. Trường hợp gửi phiếu biểu quyết đến cuộc họp thông qua thư, phiếu biểu quyết phải đựng trong phong bì dán kín và phải được chuyển đến Chủ tịch Hội đồng quản trị chậm nhất là 01 giờ trước khi khai mạc. Phiếu biểu quyết chỉ được mở trước sự chứng kiến của tất cả những người dự họp."},{"k":"p","t":"11. Thành viên phải tham dự đầy đủ các cuộc họp Hội đồng quản trị. Thành viên được ủy quyền cho người khác dự họp và biểu quyết nếu được đa số thành viên Hội đồng quản trị chấp thuận."},{"k":"p","t":"12. Trừ trường hợp Điều lệ công ty có quy định tỷ lệ khác cao hơn, nghị quyết, quyết định của Hội đồng quản trị được thông qua nếu được đa số thành viên dự họp tán thành; trường hợp số phiếu ngang nhau thì quyết định cuối cùng thuộc về phía có ý kiến của Chủ tịch Hội đồng quản trị."}]},{"id":"luat-59_158","no":158,"code":"Điều 158","title":"Điều 158. Biên bản họp Hội đồng quản trị","shortTitle":"Biên bản họp Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Các cuộc họp Hội đồng quản trị phải được ghi biên bản và có thể ghi âm, ghi và lưu giữ dưới hình thức điện tử khác. Biên bản phải lập bằng tiếng Việt và có thể lập thêm bằng tiếng nước ngoài, bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính, mã số doanh nghiệp;"},{"k":"p","t":"b) Thời gian, địa điểm họp;"},{"k":"p","t":"c) Mục đích, chương trình và nội dung họp;"},{"k":"p","t":"d) Họ, tên từng thành viên dự họp hoặc người được ủy quyền dự họp và cách thức dự họp; họ, tên các thành viên không dự họp và lý do;"},{"k":"p","t":"đ) Vấn đề được thảo luận và biểu quyết tại cuộc họp;"},{"k":"p","t":"e) Tóm tắt phát biểu ý kiến của từng thành viên dự họp theo trình tự diễn biến của cuộc họp;"},{"k":"p","t":"g) Kết quả biểu quyết trong đó ghi rõ những thành viên tán thành, không tán thành và không có ý kiến;"},{"k":"p","t":"h) Vấn đề đã được thông qua và tỷ lệ biểu quyết thông qua tương ứng;"},{"k":"p","t":"i) Họ, tên, chữ ký chủ tọa và người ghi biên bản, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Trường hợp chủ tọa, người ghi biên bản từ chối ký biên bản họp nhưng nếu được tất cả thành viên khác của Hội đồng quản trị tham dự họp ký và có đầy đủ nội dung theo quy định tại các điểm a, b, c, d, đ, e, g và h khoản 1 Điều này thì biên bản này có hiệu lực."},{"k":"p","t":"3. Chủ tọa, người ghi biên bản và những người ký tên trong biên bản phải chịu trách nhiệm về tính trung thực và chính xác của nội dung biên bản họp Hội đồng quản trị."},{"k":"p","t":"4. Biên bản họp Hội đồng quản trị và tài liệu sử dụng trong cuộc họp phải được lưu giữ tại trụ sở chính của công ty."},{"k":"p","t":"5. Biên bản lập bằng tiếng Việt và bằng tiếng nước ngoài có hiệu lực pháp lý như nhau. Trường hợp có sự khác nhau về nội dung giữa biên bản bằng tiếng Việt và bằng tiếng nước ngoài thì nội dung trong biên bản bằng tiếng Việt được áp dụng."}]},{"id":"luat-59_159","no":159,"code":"Điều 159","title":"Điều 159. Quyền được cung cấp thông tin của thành viên Hội đồng quản trị","shortTitle":"Quyền được cung cấp thông tin của thành viên Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên Hội đồng quản trị có quyền yêu cầu Giám đốc, Phó giám đốc hoặc Tổng giám đốc, Phó Tổng giám đốc, người quản lý khác trong công ty cung cấp thông tin, tài liệu về tình hình tài chính, hoạt động kinh doanh của công ty và của đơn vị trong công ty."},{"k":"p","t":"2. Người quản lý được yêu cầu phải cung cấp kịp thời, đầy đủ và chính xác thông tin, tài liệu theo yêu cầu của thành viên Hội đồng quản trị. Trình tự, thủ tục yêu cầu và cung cấp thông tin do Điều lệ công ty quy định."}]},{"id":"luat-59_160","no":160,"code":"Điều 160","title":"Điều 160. Miễn nhiệm, bãi nhiệm, thay thế và bổ sung thành viên Hội đồng quản trị","shortTitle":"Miễn nhiệm, bãi nhiệm, thay thế và bổ sung thành viên Hội đồng quản trị","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Đại hội đồng cổ đông miễn nhiệm thành viên Hội đồng quản trị trong trường hợp sau đây:"},{"k":"p","t":"a) Không có đủ tiêu chuẩn và điều kiện theo quy định tại Điều 155 của Luật này;"},{"k":"p","t":"b) Có đơn từ chức và được chấp thuận;"},{"k":"p","t":"c) Trường hợp khác quy định tại Điều lệ công ty."},{"k":"p","t":"2. Đại hội đồng cổ đông bãi nhiệm thành viên Hội đồng quản trị trong trường hợp sau đây:"},{"k":"p","t":"a) Không tham gia các hoạt động của Hội đồng quản trị trong 06 tháng liên tục, trừ trường hợp bất khả kháng;"},{"k":"p","t":"b) Trường hợp khác quy định tại Điều lệ công ty."},{"k":"p","t":"3. Khi xét thấy cần thiết, Đại hội đồng cổ đông quyết định thay thế thành viên Hội đồng quản trị; miễn nhiệm, bãi nhiệm thành viên Hội đồng quản trị ngoài trường hợp quy định tại khoản 1 và khoản 2 Điều này."},{"k":"p","t":"4. Hội đồng quản trị phải triệu tập họp Đại hội đồng cổ đông để bầu bổ sung thành viên Hội đồng quản trị trong trường hợp sau đây:"},{"k":"p","t":"a) Số thành viên Hội đồng quản trị bị giảm quá một phần ba so với số quy định tại Điều lệ công ty. Trường hợp này, Hội đồng quản trị phải triệu tập họp Đại hội đồng cổ đông trong thời hạn 60 ngày kể từ ngày số thành viên bị giảm quá một phần ba;"},{"k":"p","t":"b) Số lượng thành viên độc lập Hội đồng quản trị giảm xuống, không bảo đảm tỷ lệ theo quy định tại điểm b khoản 1 Điều 137 của Luật này;"},{"k":"p","t":"c) Trừ trường hợp quy định tại điểm a và điểm b khoản này, Đại hội đồng cổ đông bầu thành viên mới thay thế thành viên Hội đồng quản trị đã bị miễn nhiệm, bãi nhiệm tại cuộc họp gần nhất."}]},{"id":"luat-59_161","no":161,"code":"Điều 161","title":"Điều 161. Ủy ban kiểm toán","shortTitle":"Ủy ban kiểm toán","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Ủy ban kiểm toán là cơ quan chuyên môn thuộc Hội đồng quản trị. Ủy ban kiểm toán có từ 02 thành viên trở lên. Chủ tịch Ủy ban kiểm toán phải là thành viên độc lập Hội đồng quản trị. Các thành viên khác của Ủy ban kiểm toán phải là thành viên Hội đồng quản trị không điều hành."},{"k":"p","t":"2. Ủy ban kiểm toán thông qua quyết định bằng biểu quyết tại cuộc họp, lấy ý kiến bằng văn bản hoặc hình thức khác do Điều lệ công ty hoặc quy chế hoạt động Ủy ban kiểm toán quy định. Mỗi thành viên Ủy ban kiểm toán có một phiếu biểu quyết. Trừ trường hợp Điều lệ công ty hoặc quy chế hoạt động Ủy ban kiểm toán có quy định tỷ lệ khác cao hơn, quyết định của Ủy ban kiểm toán được thông qua nếu được đa số thành viên dự họp tán thành; trường hợp số phiếu ngang nhau thì quyết định cuối cùng thuộc về phía có ý kiến của Chủ tịch Ủy ban kiểm toán."},{"k":"p","t":"3. Ủy ban kiểm toán có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Giám sát tính trung thực của báo cáo tài chính của công ty và công bố chính thức liên quan đến kết quả tài chính của công ty;"},{"k":"p","t":"b) Rà soát hệ thống kiểm soát nội bộ và quản lý rủi ro;"},{"k":"p","t":"c) Rà soát giao dịch với người có liên quan thuộc thẩm quyền phê duyệt của Hội đồng quản trị hoặc Đại hội đồng cổ đông và đưa ra khuyến nghị về những giao dịch cần có phê duyệt của Hội đồng quản trị hoặc Đại hội đồng cổ đông;"},{"k":"p","t":"d) Giám sát bộ phận kiểm toán nội bộ của công ty;"},{"k":"p","t":"đ) Kiến nghị công ty kiểm toán độc lập, mức thù lao và điều khoản liên quan trong hợp đồng với công ty kiểm toán để Hội đồng quản trị thông qua trước khi trình lên Đại hội đồng cổ đông thường niên phê duyệt;"},{"k":"p","t":"e) Theo dõi và đánh giá sự độc lập, khách quan của công ty kiểm toán và hiệu quả của quá trình kiểm toán, đặc biệt trong trường hợp công ty có sử dụng các dịch vụ phi kiểm toán của bên kiểm toán;"},{"k":"p","t":"g) Giám sát nhằm bảo đảm công ty tuân thủ quy định của pháp luật, yêu cầu của cơ quan quản lý và quy định nội bộ khác của công ty."}]},{"id":"luat-59_162","no":162,"code":"Điều 162","title":"Điều 162. Giám đốc, Tổng giám đốc công ty","shortTitle":"Giám đốc, Tổng giám đốc công ty","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng quản trị bổ nhiệm một thành viên Hội đồng quản trị hoặc thuê người khác làm Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"2. Giám đốc hoặc Tổng giám đốc là người điều hành công việc kinh doanh hằng ngày của công ty; chịu sự giám sát của Hội đồng quản trị; chịu trách nhiệm trước Hội đồng quản trị và trước pháp luật về việc thực hiện quyền, nghĩa vụ được giao."},{"k":"p","t":"Nhiệm kỳ của Giám đốc hoặc Tổng giám đốc không quá 05 năm và có thể được bổ nhiệm lại với số nhiệm kỳ không hạn chế."},{"k":"p","t":"3. Giám đốc hoặc Tổng giám đốc có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Quyết định các vấn đề liên quan đến công việc kinh doanh hằng ngày của công ty mà không thuộc thẩm quyền của Hội đồng quản trị;"},{"k":"p","t":"b) Tổ chức thực hiện các nghị quyết, quyết định của Hội đồng quản trị;"},{"k":"p","t":"c) Tổ chức thực hiện kế hoạch kinh doanh và phương án đầu tư của công ty;"},{"k":"p","t":"d) Kiến nghị phương án cơ cấu tổ chức, quy chế quản lý nội bộ của công ty;"},{"k":"p","t":"đ) Bổ nhiệm, miễn nhiệm, bãi nhiệm các chức danh quản lý trong công ty, trừ các chức danh thuộc thẩm quyền của Hội đồng quản trị;"},{"k":"p","t":"e) Quyết định tiền lương và lợi ích khác đối với người lao động trong công ty, kể cả người quản lý thuộc thẩm quyền bổ nhiệm của Giám đốc hoặc Tổng giám đốc;"},{"k":"p","t":"g) Tuyển dụng lao động;"},{"k":"p","t":"h) Kiến nghị phương án trả cổ tức hoặc xử lý lỗ trong kinh doanh;"},{"k":"p","t":"i) Quyền và nghĩa vụ khác theo quy định của pháp luật, Điều lệ công ty và nghị quyết, quyết định của Hội đồng quản trị."},{"k":"p","t":"4. Giám đốc hoặc Tổng giám đốc phải điều hành công việc kinh doanh hằng ngày của công ty theo đúng quy định của pháp luật, Điều lệ công ty, hợp đồng lao động ký với công ty và nghị quyết, quyết định của Hội đồng quản trị. Trường hợp điều hành trái với quy định tại khoản này mà gây thiệt hại cho công ty thì Giám đốc hoặc Tổng giám đốc phải chịu trách nhiệm trước pháp luật và phải bồi thường thiệt hại cho công ty."},{"k":"p","t":"5. Đối với công ty đại chúng, doanh nghiệp nhà nước theo quy định tại điểm b khoản 1 Điều 88 của Luật này và công ty con của doanh nghiệp nhà nước theo quy định tại khoản 1 Điều 88 của Luật này thì Giám đốc hoặc Tổng giám đốc phải đáp ứng các tiêu chuẩn, điều kiện sau đây:"},{"k":"p","t":"a) Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này;"},{"k":"p","t":"b) Không được là người có quan hệ gia đình của người quản lý doanh nghiệp, Kiểm soát viên của công ty và công ty mẹ; người đại diện phần vốn nhà nước, người đại diện phần vốn của doanh nghiệp tại công ty và công ty mẹ;"},{"k":"p","t":"c) Có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh của công ty."}]},{"id":"luat-59_163","no":163,"code":"Điều 163","title":"Điều 163. Tiền lương, thù lao, thưởng và lợi ích khác của thành viên Hội đồng quản trị, Giám đốc, Tổng Giám đốc","shortTitle":"Tiền lương, thù lao, thưởng và lợi ích khác của thành viên Hội đồng quản trị, Giám đốc, Tổng Giám đốc","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty có quyền trả thù lao, thưởng cho thành viên Hội đồng quản trị, trả lương, thưởng cho Giám đốc hoặc Tổng giám đốc và người quản lý khác theo kết quả và hiệu quả kinh doanh."},{"k":"p","t":"2. Trường hợp Điều lệ công ty không có quy định khác thì tiền lương, thù lao, thưởng và lợi ích khác của thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc được trả theo quy định sau đây:"},{"k":"p","t":"a) Thành viên Hội đồng quản trị được hưởng thù lao công việc và thưởng."},{"k":"p","t":"Thù lao công việc được tính theo số ngày công cần thiết hoàn thành nhiệm vụ của thành viên Hội đồng quản trị và mức thù lao mỗi ngày. Hội đồng quản trị dự tính mức thù lao cho từng thành viên theo nguyên tắc nhất trí. Tổng mức thù lao và thưởng của Hội đồng quản trị do Đại hội đồng cổ đông quyết định tại cuộc họp thường niên;"},{"k":"p","t":"b) Thành viên Hội đồng quản trị được thanh toán chi phí ăn, ở, đi lại và chi phí hợp lý khác khi thực hiện nhiệm vụ được giao;"},{"k":"p","t":"c) Giám đốc hoặc Tổng giám đốc được trả lương và thưởng. Tiền lương và thưởng của Giám đốc hoặc Tổng giám đốc do Hội đồng quản trị quyết định."},{"k":"p","t":"3. Thù lao của từng thành viên Hội đồng quản trị, tiền lương của Giám đốc hoặc Tổng giám đốc và người quản lý khác được tính vào chi phí kinh doanh của công ty theo quy định của pháp luật về thuế thu nhập doanh nghiệp, được thể hiện thành mục riêng trong báo cáo tài chính hằng năm của công ty và phải báo cáo Đại hội đồng cổ đông tại cuộc họp thường niên."}]},{"id":"luat-59_164","no":164,"code":"Điều 164","title":"Điều 164. Công khai các lợi ích liên quan","shortTitle":"Công khai các lợi ích liên quan","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp Điều lệ công ty không có quy định khác chặt chẽ hơn, việc công khai lợi ích và người có liên quan của công ty thực hiện theo quy định sau đây:"},{"k":"p","t":"1. Công ty phải tập hợp và cập nhật danh sách những người có liên quan của công ty theo quy định tại khoản 23 Điều 4 của Luật này và các hợp đồng, giao dịch tương ứng của họ với công ty;"},{"k":"p","t":"2. Thành viên Hội đồng quản trị, Kiểm soát viên, Giám đốc hoặc Tổng giám đốc và người quản lý khác của công ty phải kê khai cho công ty về các lợi ích liên quan của mình, bao gồm:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính, ngành, nghề kinh doanh của doanh nghiệp mà họ làm chủ hoặc sở hữu phần vốn góp hoặc cổ phần; tỷ lệ và thời điểm làm chủ, sở hữu phần vốn góp hoặc cổ phần đó;"},{"k":"p","t":"b) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính, ngành, nghề kinh doanh của doanh nghiệp mà những người có liên quan của họ làm chủ, cùng sở hữu hoặc sở hữu riêng phần vốn góp hoặc cổ phần trên 10% vốn điều lệ;"},{"k":"p","t":"3. Việc kê khai quy định tại khoản 2 Điều này phải được thực hiện trong thời hạn 07 ngày làm việc kể từ ngày phát sinh lợi ích liên quan; việc sửa đổi, bổ sung phải được thông báo với công ty trong thời hạn 07 ngày làm việc kể từ ngày có sửa đổi, bổ sung tương ứng;"},{"k":"p","t":"4. Việc lưu giữ, công khai, xem xét, trích lục, sao chép danh sách người có liên quan và lợi ích có liên quan được kê khai quy định tại khoản 1 và khoản 2 Điều này được thực hiện như sau:"},{"k":"p","t":"a) Công ty phải thông báo danh sách người có liên quan và lợi ích có liên quan cho Đại hội đồng cổ đông tại cuộc họp thường niên;"},{"k":"p","t":"b) Danh sách người có liên quan và lợi ích có liên quan được lưu giữ tại trụ sở chính của doanh nghiệp; trường hợp cần thiết có thể lưu giữ một phần hoặc toàn bộ nội dung danh sách nói trên tại các chi nhánh của công ty;"},{"k":"p","t":"c) Cổ đông, đại diện theo ủy quyền của cổ đông, thành viên Hội đồng quản trị, Ban kiểm soát, Giám đốc hoặc Tổng giám đốc và người quản lý khác có quyền xem xét, trích lục và sao chép một phần hoặc toàn bộ nội dung kê khai;"},{"k":"p","t":"d) Công ty phải tạo điều kiện để những người quy định tại điểm c khoản này tiếp cận, xem xét, trích lục, sao chép danh sách người có liên quan và lợi ích có liên quan một cách nhanh nhất, thuận lợi nhất; không được ngăn cản, gây khó khăn đối với họ trong thực hiện quyền này. Trình tự, thủ tục xem xét, trích lục, sao chép nội dung kê khai người có liên quan và lợi ích có liên quan được thực hiện theo quy định tại Điều lệ công ty;"},{"k":"p","t":"5. Thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc nhân danh cá nhân hoặc nhân danh người khác để thực hiện công việc dưới mọi hình thức trong phạm vi công việc kinh doanh của công ty đều phải giải trình bản chất, nội dung của công việc đó trước Hội đồng quản trị, Ban kiểm soát và chỉ được thực hiện khi được đa số thành viên còn lại của Hội đồng quản trị chấp thuận; nếu thực hiện mà không khai báo hoặc không được sự chấp thuận của Hội đồng quản trị thì tất cả thu nhập có được từ hoạt động đó thuộc về công ty."}]},{"id":"luat-59_165","no":165,"code":"Điều 165","title":"Điều 165. Trách nhiệm của người quản lý công ty","shortTitle":"Trách nhiệm của người quản lý công ty","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và người quản lý khác có trách nhiệm sau đây:"},{"k":"p","t":"a) Thực hiện quyền và nghĩa vụ được giao theo quy định của Luật này, quy định khác của pháp luật có liên quan, Điều lệ công ty, nghị quyết Đại hội đồng cổ đông;"},{"k":"p","t":"b) Thực hiện quyền và nghĩa vụ được giao một cách trung thực, cẩn trọng, tốt nhất nhằm bảo đảm lợi ích hợp pháp tối đa của công ty;"},{"k":"p","t":"c) Trung thành với lợi ích của công ty và cổ đông; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác;"},{"k":"p","t":"d) Thông báo kịp thời, đầy đủ, chính xác cho công ty về nội dung quy định tại khoản 2 Điều 164 của Luật này;"},{"k":"p","t":"đ) Trách nhiệm khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"2. Thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và người quản lý khác vi phạm quy định tại khoản 1 Điều này chịu trách nhiệm cá nhân hoặc liên đới đền bù lợi ích bị mất, trả lại lợi ích đã nhận và bồi thường toàn bộ thiệt hại cho công ty và bên thứ ba."}]},{"id":"luat-59_166","no":166,"code":"Điều 166","title":"Điều 166. Quyền khởi kiện đối với thành viên Hội đồng quản trị, Giám đốc, Tổng giám đốc","shortTitle":"Quyền khởi kiện đối với thành viên Hội đồng quản trị, Giám đốc, Tổng giám đốc","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ đông, nhóm cổ đông sở hữu ít nhất 01% tổng số cổ phần phổ thông có quyền tự mình hoặc nhân danh công ty khởi kiện trách nhiệm cá nhân, trách nhiệm liên đới đối với các thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc để yêu cầu hoàn trả lợi ích hoặc bồi thường thiệt hại cho công ty hoặc người khác trong trường hợp sau đây:"},{"k":"p","t":"a) Vi phạm trách nhiệm của người quản lý công ty theo quy định tại Điều 165 của Luật này;"},{"k":"p","t":"b) Không thực hiện, thực hiện không đầy đủ, thực hiện không kịp thời hoặc thực hiện trái với quy định của pháp luật hoặc Điều lệ công ty, nghị quyết, quyết định của Hội đồng quản trị đối với quyền và nghĩa vụ được giao;"},{"k":"p","t":"c) Lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác;"},{"k":"p","t":"d) Trường hợp khác theo quy định của pháp luật và Điều lệ công ty."},{"k":"p","t":"2. Trình tự, thủ tục khởi kiện thực hiện theo quy định của pháp luật về tố tụng dân sự. Chi phí khởi kiện trong trường hợp cổ đông, nhóm cổ đông khởi kiện nhân danh công ty được tính vào chi phí của công ty, trừ trường hợp bị bác yêu cầu khởi kiện."},{"k":"p","t":"3. Cổ đông, nhóm cổ đông theo quy định tại Điều này có quyền xem xét, tra cứu, trích lục thông tin cần thiết theo quyết định của Tòa án, Trọng tài trước hoặc trong quá trình khởi kiện."}]},{"id":"luat-59_167","no":167,"code":"Điều 167","title":"Điều 167. Chấp thuận hợp đồng, giao dịch giữa công ty với người có liên quan","shortTitle":"Chấp thuận hợp đồng, giao dịch giữa công ty với người có liên quan","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Đại hội đồng cổ đông hoặc Hội đồng quản trị chấp thuận hợp đồng, giao dịch giữa công ty với người có liên quan sau đây:"},{"k":"p","t":"a) Cổ đông, người đại diện theo ủy quyền của cổ đông là tổ chức sở hữu trên 10% tổng số cổ phần phổ thông của công ty và người có liên quan của họ;"},{"k":"p","t":"b) Thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và người có liên quan của họ;"},{"k":"p","t":"c) Doanh nghiệp mà thành viên Hội đồng quản trị, Kiểm soát viên, Giám đốc hoặc Tổng giám đốc và người quản lý khác của công ty phải kê khai theo quy định tại khoản 2 Điều 164 của Luật này."},{"k":"p","t":"2. Hội đồng quản trị chấp thuận các hợp đồng, giao dịch theo quy định khoản 1 Điều này và có giá trị nhỏ hơn 35% tổng giá trị tài sản của doanh nghiệp ghi trong báo cáo tài chính gần nhất hoặc một tỷ lệ hoặc giá trị khác nhỏ hơn theo quy định tại Điều lệ công ty. Trường hợp này, người đại diện công ty ký hợp đồng, giao dịch phải thông báo cho thành viên Hội đồng quản trị, Kiểm soát viên về các đối tượng có liên quan đối với hợp đồng, giao dịch đó và gửi kèm theo dự thảo hợp đồng hoặc nội dung chủ yếu của giao dịch. Hội đồng quản trị quyết định việc chấp thuận hợp đồng, giao dịch trong thời hạn 15 ngày kể từ ngày nhận được thông báo, trừ trường hợp Điều lệ công ty quy định một thời hạn khác; thành viên Hội đồng quản trị có lợi ích liên quan đến các bên trong hợp đồng, giao dịch không có quyền biểu quyết."},{"k":"p","t":"3. Đại hội đồng cổ đông chấp thuận hợp đồng, giao dịch sau đây:"},{"k":"p","t":"a) Hợp đồng, giao dịch khác ngoài hợp đồng, giao dịch quy định tại khoản 2 Điều này;"},{"k":"p","t":"b) Hợp đồng, giao dịch vay, cho vay, bán tài sản có giá trị lớn hơn 10% tổng giá trị tài sản của doanh nghiệp ghi trong báo cáo tài chính gần nhất giữa công ty và cổ đông sở hữu từ 51% tổng số cổ phần có quyền biểu quyết trở lên hoặc người có liên quan của cổ đông đó."},{"k":"p","t":"4. Trường hợp chấp thuận hợp đồng, giao dịch theo quy định tại khoản 3 Điều này, người đại diện công ty ký hợp đồng, giao dịch phải thông báo cho Hội đồng quản trị và Kiểm soát viên về đối tượng có liên quan đối với hợp đồng, giao dịch đó và gửi kèm theo dự thảo hợp đồng hoặc thông báo nội dung chủ yếu của giao dịch. Hội đồng quản trị trình dự thảo hợp đồng, giao dịch hoặc giải trình về nội dung chủ yếu của hợp đồng, giao dịch tại cuộc họp Đại hội đồng cổ đông hoặc lấy ý kiến cổ đông bằng văn bản. Trường hợp này, cổ đông có lợi ích liên quan đến các bên trong hợp đồng, giao dịch không có quyền biểu quyết; hợp đồng, giao dịch được chấp thuận theo quy định tại khoản 1 và khoản 4 Điều 148 của Luật này, trừ trường hợp Điều lệ công ty có quy định khác."},{"k":"p","t":"5. Hợp đồng, giao dịch bị vô hiệu theo quyết định của Tòa án và xử lý theo quy định của pháp luật khi được ký kết không đúng với quy định tại Điều này; người ký kết hợp đồng, giao dịch, cổ đông, thành viên Hội đồng quản trị hoặc Giám đốc hoặc Tổng giám đốc có liên quan phải liên đới bồi thường thiệt hại phát sinh, hoàn trả cho công ty khoản lợi thu được từ việc thực hiện hợp đồng, giao dịch đó."},{"k":"p","t":"6. Công ty phải công khai hợp đồng, giao dịch có liên quan theo quy định của pháp luật có liên quan."}]},{"id":"luat-59_168","no":168,"code":"Điều 168","title":"Điều 168. Ban kiểm soát","shortTitle":"Ban kiểm soát","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Ban kiểm soát có từ 03 đến 05 Kiểm soát viên. Nhiệm kỳ của Kiểm soát viên không quá 05 năm và có thể được bầu lại với số nhiệm kỳ không hạn chế."},{"k":"p","t":"2. Trưởng Ban kiểm soát do Ban kiểm soát bầu trong số các Kiểm soát viên; việc bầu, miễn nhiệm, bãi nhiệm theo nguyên tắc đa số. Quyền và nghĩa vụ của Trưởng Ban kiểm soát do Điều lệ công ty quy định. Ban kiểm soát phải có hơn một nửa số Kiểm soát viên thường trú tại Việt Nam. Trưởng Ban kiểm soát phải có bằng tốt nghiệp đại học trở lên thuộc một trong các chuyên ngành kinh tế, tài chính, kế toán, kiểm toán, luật, quản trị kinh doanh hoặc chuyên ngành có liên quan đến hoạt động kinh doanh của doanh nghiệp, trừ trường hợp Điều lệ công ty có quy định tiêu chuẩn khác cao hơn."},{"k":"p","t":"3. Trường hợp Kiểm soát viên có cùng thời điểm kết thúc nhiệm kỳ mà Kiểm soát viên nhiệm kỳ mới chưa được bầu thì Kiểm soát viên đã hết nhiệm kỳ vẫn tiếp tục thực hiện quyền và nghĩa vụ cho đến khi Kiểm soát viên nhiệm kỳ mới được bầu và nhận nhiệm vụ."}]},{"id":"luat-59_169","no":169,"code":"Điều 169","title":"Điều 169. Tiêu chuẩn và điều kiện của Kiểm soát viên","shortTitle":"Tiêu chuẩn và điều kiện của Kiểm soát viên","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Kiểm soát viên phải có các tiêu chuẩn và điều kiện sau đây:"},{"k":"p","t":"a) Không thuộc đối tượng theo quy định tại khoản 2 Điều 17 của Luật này;"},{"k":"p","t":"b) Được đào tạo một trong các chuyên ngành về kinh tế, tài chính, kế toán, kiểm toán, luật, quản trị kinh doanh hoặc chuyên ngành phù hợp với hoạt động kinh doanh của doanh nghiệp;"},{"k":"p","t":"c) Không phải là người có quan hệ gia đình của thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc và người quản lý khác;"},{"k":"p","t":"d) Không phải là người quản lý công ty; không nhất thiết phải là cổ đông hoặc người lao động của công ty, trừ trường hợp Điều lệ công ty có quy định khác;"},{"k":"p","t":"đ) Tiêu chuẩn và điều kiện khác theo quy định khác của pháp luật có liên quan và Điều lệ công ty."},{"k":"p","t":"2. Ngoài các tiêu chuẩn, điều kiện quy định tại khoản 1 Điều này, Kiểm soát viên công ty đại chúng, doanh nghiệp nhà nước theo quy định tại điểm b khoản 1 Điều 88 của Luật này không được là người có quan hệ gia đình của người quản lý doanh nghiệp của công ty và công ty mẹ; người đại diện phần vốn của doanh nghiệp, người đại diện phần vốn nhà nước tại công ty mẹ và tại công ty."}]},{"id":"luat-59_170","no":170,"code":"Điều 170","title":"Điều 170. Quyền và nghĩa vụ của Ban kiểm soát","shortTitle":"Quyền và nghĩa vụ của Ban kiểm soát","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Ban kiểm soát thực hiện giám sát Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc trong việc quản lý và điều hành công ty."},{"k":"p","t":"2. Kiểm tra tính hợp lý, hợp pháp, tính trung thực và mức độ cẩn trọng trong quản lý, điều hành hoạt động kinh doanh; tính hệ thống, nhất quán và phù hợp của công tác kế toán, thống kê và lập báo cáo tài chính."},{"k":"p","t":"3. Thẩm định tính đầy đủ, hợp pháp và trung thực của báo cáo tình hình kinh doanh, báo cáo tài chính hằng năm và 06 tháng của công ty, báo cáo đánh giá công tác quản lý của Hội đồng quản trị và trình báo cáo thẩm định tại cuộc họp Đại hội đồng cổ đông thường niên. Rà soát hợp đồng, giao dịch với người có liên quan thuộc thẩm quyền phê duyệt của Hội đồng quản trị hoặc Đại hội đồng cổ đông và đưa ra khuyến nghị về hợp đồng, giao dịch cần có phê duyệt của Hội đồng quản trị hoặc Đại hội đồng cổ đông."},{"k":"p","t":"4. Rà soát, kiểm tra và đánh giá hiệu lực và hiệu quả của hệ thống kiểm soát nội bộ, kiểm toán nội bộ, quản lý rủi ro và cảnh báo sớm của công ty."},{"k":"p","t":"5. Xem xét sổ kế toán, ghi chép kế toán và tài liệu khác của công ty, công việc quản lý, điều hành hoạt động của công ty khi xét thấy cần thiết hoặc theo nghị quyết Đại hội đồng cổ đông hoặc theo yêu cầu của cổ đông hoặc nhóm cổ đông quy định tại khoản 2 Điều 115 của Luật này."},{"k":"p","t":"6. Khi có yêu cầu của cổ đông hoặc nhóm cổ đông quy định tại khoản 2 Điều 115 của Luật này, Ban kiểm soát thực hiện kiểm tra trong thời hạn 07 ngày làm việc kể từ ngày nhận được yêu cầu. Trong thời hạn 15 ngày kể từ ngày kết thúc kiểm tra, Ban kiểm soát phải báo cáo về những vấn đề được yêu cầu kiểm tra đến Hội đồng quản trị và cổ đông hoặc nhóm cổ đông có yêu cầu. Việc kiểm tra của Ban kiểm soát quy định tại khoản này không được cản trở hoạt động bình thường của Hội đồng quản trị, không gây gián đoạn điều hành hoạt động kinh doanh của công ty."},{"k":"p","t":"7. Kiến nghị Hội đồng quản trị hoặc Đại hội đồng cổ đông biện pháp sửa đổi, bổ sung, cải tiến cơ cấu tổ chức quản lý, giám sát và điều hành hoạt động kinh doanh của công ty."},{"k":"p","t":"8. Khi phát hiện có thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc vi phạm quy định tại Điều 165 của Luật này phải thông báo ngay bằng văn bản cho Hội đồng quản trị, yêu cầu người có hành vi vi phạm chấm dứt hành vi vi phạm và có giải pháp khắc phục hậu quả."},{"k":"p","t":"9. Tham dự và tham gia thảo luận tại các cuộc họp Đại hội đồng cổ đông, Hội đồng quản trị và các cuộc họp khác của công ty."},{"k":"p","t":"10. Sử dụng tư vấn độc lập, bộ phận kiểm toán nội bộ của công ty để thực hiện nhiệm vụ được giao."},{"k":"p","t":"11. Ban kiểm soát có thể tham khảo ý kiến của Hội đồng quản trị trước khi trình báo cáo, kết luận và kiến nghị lên Đại hội đồng cổ đông."},{"k":"p","t":"12. Quyền và nghĩa vụ khác theo quy định của Luật này, Điều lệ công ty và nghị quyết Đại hội đồng cổ đông."}]},{"id":"luat-59_171","no":171,"code":"Điều 171","title":"Điều 171. Quyền được cung cấp thông tin của Ban kiểm soát","shortTitle":"Quyền được cung cấp thông tin của Ban kiểm soát","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Tài liệu và thông tin phải được gửi đến Kiểm soát viên cùng thời điểm và theo phương thức như đối với thành viên Hội đồng quản trị, bao gồm:"},{"k":"p","t":"a) Thông báo mời họp, phiếu lấy ý kiến thành viên Hội đồng quản trị và tài liệu kèm theo;"},{"k":"p","t":"b) Nghị quyết, quyết định và biên bản họp của Đại hội đồng cổ đông, Hội đồng quản trị;"},{"k":"p","t":"c) Báo cáo của Giám đốc hoặc Tổng giám đốc trình Hội đồng quản trị hoặc tài liệu khác do công ty phát hành."},{"k":"p","t":"2. Kiểm soát viên có quyền tiếp cận hồ sơ, tài liệu của công ty lưu giữ tại trụ sở chính, chi nhánh và địa điểm khác; có quyền đến địa điểm làm việc của người quản lý và nhân viên của công ty trong giờ làm việc."},{"k":"p","t":"3. Hội đồng quản trị, thành viên Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc, người quản lý khác phải cung cấp đầy đủ, chính xác, kịp thời thông tin, tài liệu về công tác quản lý, điều hành và hoạt động kinh doanh của công ty theo yêu cầu của Kiểm soát viên hoặc Ban kiểm soát."},{"k":"p","t":"Điều 172. Tiền lương, thù lao, thưởng và lợi ích khác của Kiểm soát viên"},{"k":"p","t":"Trường hợp Điều lệ công ty không có quy định khác thì tiền lương, thù lao, thưởng và lợi ích khác của Kiểm soát viên được thực hiện theo quy định sau đây:"},{"k":"p","t":"1. Kiểm soát viên được trả tiền lương, thù lao, thưởng và lợi ích khác theo quyết định của Đại hội đồng cổ đông. Đại hội đồng cổ đông quyết định tổng mức tiền lương, thù lao, thưởng, lợi ích khác và ngân sách hoạt động hằng năm của Ban kiểm soát;"},{"k":"p","t":"2. Kiểm soát viên được thanh toán chi phí ăn, ở, đi lại, chi phí sử dụng dịch vụ tư vấn độc lập với mức hợp lý. Tổng mức thù lao và chi phí này không vượt quá tổng ngân sách hoạt động hằng năm của Ban kiểm soát đã được Đại hội đồng cổ đông chấp thuận, trừ trường hợp Đại hội đồng cổ đông có quyết định khác;"},{"k":"p","t":"3. Tiền lương và chi phí hoạt động của Ban kiểm soát được tính vào chi phí kinh doanh của công ty theo quy định của pháp luật về thuế thu nhập doanh nghiệp, quy định khác của pháp luật có liên quan và phải được lập thành mục riêng trong báo cáo tài chính hằng năm của công ty."}]},{"id":"luat-59_173","no":173,"code":"Điều 173","title":"Điều 173. Trách nhiệm của Kiểm soát viên","shortTitle":"Trách nhiệm của Kiểm soát viên","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Tuân thủ đúng pháp luật, Điều lệ công ty, nghị quyết Đại hội đồng cổ đông và đạo đức nghề nghiệp trong thực hiện quyền và nghĩa vụ được giao."},{"k":"p","t":"2. Thực hiện quyền và nghĩa vụ được giao một cách trung thực, cẩn trọng, tốt nhất nhằm bảo đảm lợi ích hợp pháp tối đa của công ty."},{"k":"p","t":"3. Trung thành với lợi ích của công ty và cổ đông; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác."},{"k":"p","t":"4. Nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"5. Trường hợp vi phạm quy định tại các khoản 1, 2, 3 và 4 Điều này mà gây thiệt hại cho công ty hoặc người khác thì Kiểm soát viên phải chịu trách nhiệm cá nhân hoặc liên đới bồi thường thiệt hại đó. Thu nhập và lợi ích khác mà Kiểm soát viên có được do vi phạm phải hoàn trả cho công ty."},{"k":"p","t":"6. Trường hợp phát hiện có Kiểm soát viên vi phạm trong thực hiện quyền và nghĩa vụ được giao thì phải thông báo bằng văn bản đến Ban kiểm soát; yêu cầu người có hành vi vi phạm chấm dứt hành vi vi phạm và khắc phục hậu quả."}]},{"id":"luat-59_174","no":174,"code":"Điều 174","title":"Điều 174. Miễn nhiệm, bãi nhiệm Kiểm soát viên","shortTitle":"Miễn nhiệm, bãi nhiệm Kiểm soát viên","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Đại hội đồng cổ đông miễn nhiệm Kiểm soát viên trong trường hợp sau đây:"},{"k":"p","t":"a) Không còn đủ tiêu chuẩn và điều kiện làm Kiểm soát viên theo quy định tại Điều 169 của Luật này;"},{"k":"p","t":"b) Có đơn từ chức và được chấp thuận;"},{"k":"p","t":"c) Trường hợp khác do Điều lệ công ty quy định."},{"k":"p","t":"2. Đại hội đồng cổ đông bãi nhiệm Kiểm soát viên trong trường hợp sau đây:"},{"k":"p","t":"a) Không hoàn thành nhiệm vụ, công việc được phân công;"},{"k":"p","t":"b) Không thực hiện quyền và nghĩa vụ của mình trong 06 tháng liên tục, trừ trường hợp bất khả kháng;"},{"k":"p","t":"c) Vi phạm nhiều lần, vi phạm nghiêm trọng nghĩa vụ của Kiểm soát viên theo quy định của Luật này và Điều lệ công ty;"},{"k":"p","t":"d) Trường hợp khác theo nghị quyết Đại hội đồng cổ đông."}]},{"id":"luat-59_175","no":175,"code":"Điều 175","title":"Điều 175. Trình báo cáo hằng năm","shortTitle":"Trình báo cáo hằng năm","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Kết thúc năm tài chính, Hội đồng quản trị phải trình Đại hội đồng cổ đông báo cáo sau đây:"},{"k":"p","t":"a) Báo cáo kết quả kinh doanh của công ty;"},{"k":"p","t":"b) Báo cáo tài chính;"},{"k":"p","t":"c) Báo cáo đánh giá công tác quản lý, điều hành công ty;"},{"k":"p","t":"d) Báo cáo thẩm định của Ban kiểm soát."},{"k":"p","t":"2. Đối với công ty cổ phần mà pháp luật yêu cầu phải kiểm toán thì báo cáo tài chính hằng năm của công ty cổ phần phải được kiểm toán trước khi trình Đại hội đồng cổ đông xem xét, thông qua."},{"k":"p","t":"3. Báo cáo quy định tại các điểm a, b và c khoản 1 Điều này phải được gửi đến Ban kiểm soát để thẩm định chậm nhất là 30 ngày trước ngày khai mạc cuộc họp Đại hội đồng cổ đông thường niên nếu Điều lệ công ty không có quy định khác."},{"k":"p","t":"4. Báo cáo quy định tại các khoản 1, 2 và 3 Điều này, báo cáo thẩm định của Ban kiểm soát và báo cáo kiểm toán phải được lưu giữ tại trụ sở chính của công ty chậm nhất là 10 ngày trước ngày khai mạc cuộc họp Đại hội đồng cổ đông thường niên nếu Điều lệ công ty không quy định thời hạn khác dài hơn. Cổ đông sở hữu cổ phần của công ty liên tục ít nhất 01 năm có quyền tự mình hoặc cùng với luật sư, kế toán viên, kiểm toán viên có chứng chỉ hành nghề trực tiếp xem xét báo cáo quy định tại Điều này."}]},{"id":"luat-59_176","no":176,"code":"Điều 176","title":"Điều 176. Công khai thông tin","shortTitle":"Công khai thông tin","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần phải gửi báo cáo tài chính hằng năm đã được Đại hội đồng cổ đông thông qua đến cơ quan nhà nước có thẩm quyền theo quy định của pháp luật về kế toán và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Công ty cổ phần công bố trên trang thông tin điện tử của mình thông tin sau đây:"},{"k":"p","t":"a) Điều lệ công ty;"},{"k":"p","t":"b) Sơ yếu lý lịch, trình độ học vấn và kinh nghiệm nghề nghiệp của các thành viên Hội đồng quản trị, Kiểm soát viên, Giám đốc hoặc Tổng giám đốc công ty;"},{"k":"p","t":"c) Báo cáo tài chính hằng năm đã được Đại hội đồng cổ đông thông qua;"},{"k":"p","t":"d) Báo cáo đánh giá kết quả hoạt động hằng năm của Hội đồng quản trị và Ban kiểm soát."},{"k":"p","t":"3. Công ty cổ phần không phải là công ty niêm yết phải thông báo cho Cơ quan đăng ký kinh doanh nơi công ty có trụ sở chính chậm nhất là 03 ngày làm việc sau khi có thông tin hoặc có thay đổi các thông tin về họ, tên, quốc tịch, số Hộ chiếu, địa chỉ liên lạc, số cổ phần và loại cổ phần của cổ đông là cá nhân nước ngoài; tên, mã số doanh nghiệp, địa chỉ trụ sở chính, số cổ phần và loại cổ phần của cổ đông là tổ chức nước ngoài và họ, tên, quốc tịch, số Hộ chiếu, địa chỉ liên lạc người đại diện theo ủy quyền của cổ đông là tổ chức nước ngoài."},{"k":"p","t":"4. Công ty đại chúng thực hiện công bố, công khai thông tin theo quy định của pháp luật về chứng khoán. Công ty cổ phần theo quy định tại điểm b khoản 1 Điều 88 công bố, công khai thông tin theo quy định tại các điểm a, c, đ và g khoản 1 Điều 109 và Điều 110 của Luật này."}]},{"id":"luat-59_177","no":177,"code":"Điều 177","title":"Điều 177. Công ty hợp danh","shortTitle":"Công ty hợp danh","chuong":"Chương VI — CÔNG TY HỢP DANH","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty hợp danh là doanh nghiệp, trong đó:"},{"k":"p","t":"a) Phải có ít nhất 02 thành viên là chủ sở hữu chung của công ty, cùng nhau kinh doanh dưới một tên chung (sau đây gọi là thành viên hợp danh). Ngoài các thành viên hợp danh, công ty có thể có thêm thành viên góp vốn;"},{"k":"p","t":"b) Thành viên hợp danh phải là cá nhân, chịu trách nhiệm bằng toàn bộ tài sản của mình về các nghĩa vụ của công ty;"},{"k":"p","t":"c) Thành viên góp vốn là tổ chức, cá nhân và chỉ chịu trách nhiệm về các khoản nợ của công ty trong phạm vi số vốn đã cam kết góp vào công ty."},{"k":"p","t":"2. Công ty hợp danh có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp."},{"k":"p","t":"3. Công ty hợp danh không được phát
