,{"k":"p","t":"2. Thực hiện quyền và nghĩa vụ một cách trung thực, cẩn trọng, tốt nhất nhằm bảo đảm tối đa lợi ích hợp pháp của công ty và Nhà nước."},{"k":"p","t":"3. Trung thành với lợi ích của công ty và Nhà nước; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác."},{"k":"p","t":"4. Thông báo kịp thời, đầy đủ, chính xác cho doanh nghiệp về doanh nghiệp mà mình làm chủ hoặc có cổ phần, phần vốn góp chi phối và doanh nghiệp mà người có liên quan của mình làm chủ, cùng sở hữu hoặc sở hữu riêng cổ phần, phần vốn góp chi phối. Thông báo này được tập hợp và lưu giữ tại trụ sở chính của công ty."},{"k":"p","t":"5. Chấp hành nghị quyết Hội đồng thành viên."},{"k":"p","t":"6. Chịu trách nhiệm cá nhân khi thực hiện các hành vi sau đây:"},{"k":"p","t":"a) Lợi dụng danh nghĩa công ty thực hiện hành vi vi phạm pháp luật;"},{"k":"p","t":"b) Tiến hành kinh doanh hoặc giao dịch khác không nhằm phục vụ lợi ích của công ty và gây thiệt hại cho tổ chức, cá nhân khác;"},{"k":"p","t":"c) Thanh toán các khoản nợ chưa đến hạn khi nguy cơ rủi ro tài chính có thể xảy ra đối với công ty."},{"k":"p","t":"7. Trường hợp thành viên Hội đồng thành viên phát hiện có thành viên Hội đồng thành viên khác có hành vi vi phạm trong thực hiện quyền và nghĩa vụ được giao thì có trách nhiệm báo cáo bằng văn bản với cơ quan đại diện chủ sở hữu; yêu cầu thành viên vi phạm chấm dứt hành vi vi phạm và khắc phục hậu quả."}]},{"id":"luat-59_98","no":98,"code":"Điều 98","title":"Điều 98. Chế độ làm việc, điều kiện và thể thức tiến hành họp Hội đồng thành viên","shortTitle":"Chế độ làm việc, điều kiện và thể thức tiến hành họp Hội đồng thành viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng thành viên làm việc theo chế độ tập thể; họp ít nhất một lần trong một quý để xem xét, quyết định những vấn đề thuộc quyền, nghĩa vụ của mình. Đối với những vấn đề không yêu cầu thảo luận thì Hội đồng thành viên có thể lấy ý kiến các thành viên bằng văn bản theo quy định tại Điều lệ công ty. Hội đồng thành viên có thể họp bất thường để giải quyết những vấn đề cấp bách theo yêu cầu của cơ quan đại diện chủ sở hữu công ty, theo đề nghị của Chủ tịch Hội đồng thành viên hoặc trên 50% tổng số thành viên Hội đồng thành viên hoặc Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"2. Chủ tịch Hội đồng thành viên hoặc thành viên được Chủ tịch Hội đồng thành viên ủy quyền có trách nhiệm chuẩn bị chương trình, nội dung tài liệu, triệu tập, chủ trì và làm chủ tọa cuộc họp Hội đồng thành viên. Các thành viên Hội đồng thành viên có quyền kiến nghị bằng văn bản về chương trình họp. Nội dung và các tài liệu cuộc họp phải gửi đến các thành viên Hội đồng thành viên và người được mời dự họp chậm nhất là 03 ngày làm việc trước ngày họp. Tài liệu sử dụng trong cuộc họp liên quan đến việc kiến nghị cơ quan đại diện chủ sở hữu công ty sửa đổi, bổ sung Điều lệ công ty, thông qua phương hướng phát triển công ty, thông qua báo cáo tài chính hằng năm, tổ chức lại hoặc giải thể công ty phải được gửi đến các thành viên chậm nhất là 05 ngày làm việc trước ngày họp."},{"k":"p","t":"3. Thông báo mời họp Hội đồng thành viên có thể gửi bằng giấy mời, điện thoại, fax, phương tiện điện tử hoặc phương thức khác do Điều lệ công ty quy định và được gửi trực tiếp đến từng thành viên Hội đồng thành viên và người được mời dự họp. Nội dung thông báo mời họp phải xác định rõ thời gian, địa điểm và chương trình họp. Hình thức họp trực tuyến có thể được áp dụng khi cần thiết."},{"k":"p","t":"4. Cuộc họp Hội đồng thành viên hợp lệ khi có ít nhất hai phần ba tổng số thành viên Hội đồng thành viên tham dự. Nghị quyết Hội đồng thành viên được thông qua khi có hơn một nửa tổng số thành viên tham dự biểu quyết tán thành; trường hợp có số phiếu ngang nhau thì nội dung có phiếu tán thành của Chủ tịch Hội đồng thành viên hoặc người được Chủ tịch Hội đồng thành viên ủy quyền chủ trì cuộc họp là nội dung được thông qua. Thành viên Hội đồng thành viên có quyền bảo lưu ý kiến của mình và kiến nghị lên cơ quan đại diện chủ sở hữu công ty."},{"k":"p","t":"5. Trường hợp lấy ý kiến các thành viên Hội đồng thành viên bằng văn bản thì nghị quyết Hội đồng thành viên được thông qua khi có hơn một nửa tổng số thành viên Hội đồng thành viên tán thành. Nghị quyết có thể được thông qua bằng cách sử dụng nhiều bản sao của cùng một văn bản nếu mỗi bản sao đó có ít nhất một chữ ký của thành viên Hội đồng thành viên."},{"k":"p","t":"6. Căn cứ vào nội dung và chương trình cuộc họp, khi xét thấy cần thiết, Hội đồng thành viên mời đại diện có thẩm quyền của cơ quan, tổ chức có liên quan tham dự và thảo luận các vấn đề cụ thể trong chương trình cuộc họp. Đại diện cơ quan, tổ chức được mời dự họp có quyền phát biểu ý kiến nhưng không tham gia biểu quyết. Các ý kiến phát biểu của đại diện được mời dự họp được ghi đầy đủ vào biên bản của cuộc họp."},{"k":"p","t":"7. Nội dung các vấn đề thảo luận, các ý kiến phát biểu, kết quả biểu quyết, các nghị quyết được Hội đồng thành viên thông qua và kết luận của các cuộc họp Hội đồng thành viên phải được ghi biên bản. Chủ tọa và thư ký cuộc họp phải liên đới chịu trách nhiệm về tính chính xác và tính trung thực của biên bản họp Hội đồng thành viên. Biên bản họp Hội đồng thành viên phải được thông qua trước khi kết thúc cuộc họp. Biên bản phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Thời gian, địa điểm, mục đích, chương trình họp; danh sách thành viên dự họp; vấn đề được thảo luận và biểu quyết; tóm tắt ý kiến phát biểu của thành viên, đại diện được mời dự họp về từng vấn đề thảo luận;"},{"k":"p","t":"b) Số phiếu biểu quyết tán thành và không tán thành đối với trường hợp không áp dụng phương thức bỏ phiếu trắng; số phiếu biểu quyết tán thành, không tán thành và không có ý kiến đối với trường hợp áp dụng phương thức bỏ phiếu trắng;"},{"k":"p","t":"c) Các quyết định được thông qua;"},{"k":"p","t":"d) Họ, tên, chữ ký của thành viên dự họp."},{"k":"p","t":"8. Thành viên Hội đồng thành viên có quyền yêu cầu Giám đốc, Phó giám đốc hoặc Tổng giám đốc, Phó Tổng giám đốc, Kế toán trưởng và người quản lý công ty, công ty con do công ty nắm giữ 100% vốn điều lệ, người đại diện phần vốn góp của công ty tại doanh nghiệp khác cung cấp các thông tin, tài liệu về tình hình tài chính, hoạt động của doanh nghiệp theo quy chế thông tin do Hội đồng thành viên quy định hoặc theo nghị quyết Hội đồng thành viên. Người được yêu cầu cung cấp thông tin phải cung cấp kịp thời, đầy đủ và chính xác thông tin, tài liệu theo yêu cầu của thành viên Hội đồng thành viên, trừ trường hợp Hội đồng thành viên có quyết định khác."},{"k":"p","t":"9. Hội đồng thành viên sử dụng bộ máy quản lý, điều hành, bộ phận giúp việc của công ty để thực hiện nhiệm vụ của mình."},{"k":"p","t":"10. Chi phí hoạt động của Hội đồng thành viên, tiền lương, phụ cấp và thù lao được tính vào chi phí quản lý công ty."},{"k":"p","t":"11. Trường hợp cần thiết, Hội đồng thành viên tổ chức việc lấy ý kiến chuyên gia tư vấn trong nước và nước ngoài trước khi quyết định vấn đề quan trọng thuộc thẩm quyền của Hội đồng thành viên. Chi phí lấy ý kiến chuyên gia tư vấn được quy định tại quy chế quản lý tài chính của công ty."},{"k":"p","t":"12. Nghị quyết Hội đồng thành viên có hiệu lực kể từ ngày được thông qua hoặc từ ngày có hiệu lực ghi trong nghị quyết, trừ trường hợp phải được cơ quan đại diện chủ sở hữu chấp thuận."}]},{"id":"luat-59_99","no":99,"code":"Điều 99","title":"Điều 99. Chủ tịch công ty","shortTitle":"Chủ tịch công ty","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch công ty do cơ quan đại diện chủ sở hữu bổ nhiệm theo quy định của pháp luật. Chủ tịch công ty có nhiệm kỳ không quá 05 năm và có thể được bổ nhiệm lại. Một cá nhân được bổ nhiệm không quá hai nhiệm kỳ, trừ trường hợp người được bổ nhiệm đã có trên 15 năm làm việc liên tục tại công ty đó trước khi được bổ nhiệm lần đầu. Tiêu chuẩn, điều kiện và các trường hợp miễn nhiệm, cách chức Chủ tịch công ty được thực hiện theo quy định tại Điều 93 và Điều 94 của Luật này."},{"k":"p","t":"2. Chủ tịch công ty thực hiện quyền, nghĩa vụ của người đại diện chủ sở hữu trực tiếp tại công ty theo quy định của Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp; quyền, nghĩa vụ và trách nhiệm khác theo quy định tại Điều 92 và Điều 97 của Luật này."},{"k":"p","t":"3. Tiền lương, phụ cấp, thù lao của Chủ tịch công ty được tính vào chi phí quản lý công ty."},{"k":"p","t":"4. Chủ tịch công ty sử dụng bộ máy quản lý, điều hành, bộ phận giúp việc của công ty để thực hiện quyền và nghĩa vụ của mình. Trường hợp cần thiết, Chủ tịch công ty tổ chức lấy ý kiến chuyên gia tư vấn trong nước và nước ngoài trước khi quyết định vấn đề quan trọng thuộc thẩm quyền của Chủ tịch công ty. Chi phí lấy ý kiến chuyên gia tư vấn được quy định tại quy chế quản lý tài chính của công ty."},{"k":"p","t":"5. Quyết định thuộc thẩm quyền quy định tại khoản 2 Điều này phải được lập thành văn bản, ký tên với chức danh Chủ tịch công ty bao gồm cả trường hợp Chủ tịch công ty kiêm Giám đốc hoặc Tổng giám đốc."},{"k":"p","t":"6. Quyết định của Chủ tịch công ty có hiệu lực kể từ ngày ký hoặc từ ngày có hiệu lực ghi trong quyết định, trừ trường hợp phải được cơ quan đại diện chủ sở hữu chấp thuận."},{"k":"p","t":"7. Trường hợp Chủ tịch công ty xuất cảnh khỏi Việt Nam trên 30 ngày thì phải ủy quyền bằng văn bản cho người khác thực hiện một số quyền, nghĩa vụ của Chủ tịch công ty; việc ủy quyền phải được thông báo kịp thời bằng văn bản đến cơ quan đại diện chủ sở hữu. Trường hợp ủy quyền khác thực hiện theo quy định tại quy chế quản lý nội bộ của công ty."}]},{"id":"luat-59_100","no":100,"code":"Điều 100","title":"Điều 100. Giám đốc, Tổng giám đốc và Phó giám đốc, Phó Tổng giám đốc","shortTitle":"Giám đốc, Tổng giám đốc và Phó giám đốc, Phó Tổng giám đốc","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Giám đốc hoặc Tổng giám đốc do Hội đồng thành viên hoặc Chủ tịch công ty bổ nhiệm hoặc thuê theo phương án nhân sự đã được cơ quan đại diện chủ sở hữu chấp thuận."},{"k":"p","t":"2. Giám đốc hoặc Tổng giám đốc có nhiệm vụ điều hành các hoạt động hằng ngày của công ty và có quyền, nghĩa vụ sau đây:"},{"k":"p","t":"a) Tổ chức thực hiện và đánh giá kết quả thực hiện kế hoạch, phương án kinh doanh, kế hoạch đầu tư của công ty;"},{"k":"p","t":"b) Tổ chức thực hiện và đánh giá kết quả thực hiện nghị quyết, quyết định của Hội đồng thành viên, Chủ tịch công ty và của cơ quan đại diện chủ sở hữu công ty;"},{"k":"p","t":"c) Quyết định các công việc hằng ngày của công ty;"},{"k":"p","t":"d) Ban hành quy chế quản lý nội bộ của công ty đã được Hội đồng thành viên hoặc Chủ tịch công ty chấp thuận;"},{"k":"p","t":"đ) Bổ nhiệm, thuê, miễn nhiệm, cách chức, chấm dứt hợp đồng lao động đối với người quản lý công ty, trừ chức danh thuộc thẩm quyền của Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"e) Ký kết hợp đồng, giao dịch nhân danh công ty, trừ trường hợp thuộc thẩm quyền của Chủ tịch Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"g) Lập và trình Hội đồng thành viên hoặc Chủ tịch công ty báo cáo định kỳ hằng quý, hằng năm về kết quả thực hiện mục tiêu kế hoạch kinh doanh; báo cáo tài chính;"},{"k":"p","t":"h) Kiến nghị phân bổ và sử dụng lợi nhuận sau thuế và các nghĩa vụ tài chính khác của công ty;"},{"k":"p","t":"i) Tuyển dụng lao động;"},{"k":"p","t":"k) Kiến nghị phương án tổ chức lại công ty;"},{"k":"p","t":"l) Quyền và nghĩa vụ khác theo quy định của pháp luật và Điều lệ công ty."},{"k":"p","t":"3. Công ty có một hoặc một số Phó giám đốc hoặc Phó Tổng giám đốc. Số lượng, thẩm quyền bổ nhiệm Phó giám đốc hoặc Phó Tổng giám đốc quy định tại Điều lệ công ty. Quyền và nghĩa vụ của Phó giám đốc hoặc Phó Tổng giám đốc quy định tại Điều lệ công ty, hợp đồng lao động."}]},{"id":"luat-59_101","no":101,"code":"Điều 101","title":"Điều 101. Tiêu chuẩn, điều kiện của Giám đốc, Tổng giám đốc","shortTitle":"Tiêu chuẩn, điều kiện của Giám đốc, Tổng giám đốc","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Không thuộc đối tượng quy định tại khoản 2 Điều 17 của Luật này."},{"k":"p","t":"2. Có trình độ chuyên môn, kinh nghiệm trong quản trị kinh doanh hoặc trong lĩnh vực, ngành, nghề kinh doanh của công ty."},{"k":"p","t":"3. Không phải là người có quan hệ gia đình của người đứng đầu, cấp phó của người đứng đầu cơ quan đại diện chủ sở hữu; thành viên Hội đồng thành viên, Chủ tịch công ty; Phó Tổng giám đốc, Phó giám đốc và Kế toán trưởng của công ty; Kiểm soát viên công ty."},{"k":"p","t":"4. Chưa từng bị cách chức Chủ tịch Hội đồng thành viên, thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc, Phó giám đốc hoặc Phó Tổng giám đốc tại công ty hoặc ở doanh nghiệp nhà nước khác."},{"k":"p","t":"5. Không được kiêm Giám đốc hoặc Tổng giám đốc của doanh nghiệp khác."},{"k":"p","t":"6. Tiêu chuẩn, điều kiện khác quy định tại Điều lệ công ty."}]},{"id":"luat-59_102","no":102,"code":"Điều 102","title":"Điều 102. Miễn nhiệm, cách chức đối với Giám đốc, Tổng giám đốc và người quản lý khác của công ty, Kế toán trưởng","shortTitle":"Miễn nhiệm, cách chức đối với Giám đốc, Tổng giám đốc và người quản lý khác của công ty, Kế toán trưởng","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Giám đốc hoặc Tổng giám đốc bị miễn nhiệm trong trường hợp sau đây:"},{"k":"p","t":"a) Không còn đủ tiêu chuẩn và điều kiện quy định tại Điều 101 của Luật này;"},{"k":"p","t":"b) Có đơn xin nghỉ việc."},{"k":"p","t":"2. Giám đốc hoặc Tổng giám đốc bị xem xét cách chức trong trường hợp sau đây:"},{"k":"p","t":"a) Doanh nghiệp không bảo toàn được vốn theo quy định của pháp luật;"},{"k":"p","t":"b) Doanh nghiệp không hoàn thành các mục tiêu kế hoạch kinh doanh hằng năm;"},{"k":"p","t":"c) Doanh nghiệp vi phạm pháp luật;"},{"k":"p","t":"d) Không có đủ trình độ và năng lực đáp ứng yêu cầu của chiến lược phát triển và kế hoạch kinh doanh mới của doanh nghiệp;"},{"k":"p","t":"đ) Vi phạm một trong số các quyền, nghĩa vụ và trách nhiệm của người quản lý quy định tại Điều 97 và Điều 100 của Luật này;"},{"k":"p","t":"e) Trường hợp khác quy định tại Điều lệ công ty."},{"k":"p","t":"3. Trong thời hạn 60 ngày kể từ ngày có quyết định miễn nhiệm, cách chức, Hội đồng thành viên hoặc Chủ tịch công ty xem xét, quyết định tuyển chọn, bổ nhiệm người khác thay thế."},{"k":"p","t":"4. Trường hợp miễn nhiệm, cách chức đối với Phó Tổng giám đốc, Phó giám đốc, người quản lý khác của công ty, Kế toán trưởng do Điều lệ công ty quy định."}]},{"id":"luat-59_103","no":103,"code":"Điều 103","title":"Điều 103. Ban kiểm soát, Kiểm soát viên","shortTitle":"Ban kiểm soát, Kiểm soát viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Căn cứ quy mô của công ty, cơ quan đại diện chủ sở hữu quyết định thành lập Ban kiểm soát có từ 01 đến 05 Kiểm soát viên, trong đó có Trưởng Ban kiểm soát. Nhiệm kỳ Kiểm soát viên không quá 05 năm và có thể được bổ nhiệm lại nhưng không quá 02 nhiệm kỳ liên tục tại công ty đó. Trường hợp Ban kiểm soát chỉ có 01 Kiểm soát viên thì Kiểm soát viên đó đồng thời là Trưởng Ban kiểm soát và phải đáp ứng tiêu chuẩn của Trưởng Ban kiểm soát."},{"k":"p","t":"2. Một cá nhân có thể đồng thời được bổ nhiệm làm Trưởng Ban kiểm soát, Kiểm soát viên của không quá 04 doanh nghiệp nhà nước."},{"k":"p","t":"3. Trưởng Ban kiểm soát, Kiểm soát viên phải có tiêu chuẩn và điều kiện sau đây:"},{"k":"p","t":"a) Có bằng tốt nghiệp đại học trở lên thuộc một trong các chuyên ngành về kinh tế, tài chính, kế toán, kiểm toán, luật, quản trị kinh doanh hoặc chuyên ngành phù hợp với hoạt động kinh doanh của doanh nghiệp và có ít nhất 03 năm kinh nghiệm làm việc; Trưởng Ban kiểm soát phải có ít nhất 05 năm kinh nghiệm làm việc;"},{"k":"p","t":"b) Không được là người quản lý công ty và người quản lý tại doanh nghiệp khác; không được là Kiểm soát viên của doanh nghiệp không phải là doanh nghiệp nhà nước; không phải là người lao động của công ty;"},{"k":"p","t":"c) Không phải là người có quan hệ gia đình của người đứng đầu, cấp phó của người đứng đầu cơ quan đại diện chủ sở hữu của công ty; thành viên Hội đồng thành viên của công ty; Chủ tịch công ty; Giám đốc hoặc Tổng giám đốc; Phó giám đốc hoặc Phó Tổng giám đốc, Kế toán trưởng; Kiểm soát viên khác của công ty;"},{"k":"p","t":"d) Tiêu chuẩn và điều kiện khác quy định tại Điều lệ công ty."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_104","no":104,"code":"Điều 104","title":"Điều 104. Nghĩa vụ của Ban kiểm soát","shortTitle":"Nghĩa vụ của Ban kiểm soát","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Ban kiểm soát có nghĩa vụ sau đây:"},{"k":"p","t":"a) Giám sát việc tổ chức thực hiện chiến lược phát triển, kế hoạch kinh doanh;"},{"k":"p","t":"b) Giám sát, đánh giá thực trạng hoạt động kinh doanh, thực trạng tài chính của công ty;"},{"k":"p","t":"c) Giám sát và đánh giá việc thực hiện quyền, nghĩa vụ của thành viên Hội đồng thành viên và Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc công ty;"},{"k":"p","t":"d) Giám sát, đánh giá hiệu lực và mức độ tuân thủ quy chế kiểm toán nội bộ, quy chế quản lý và phòng ngừa rủi ro, quy chế báo cáo, quy chế quản trị nội bộ khác của công ty;"},{"k":"p","t":"đ) Giám sát tính hợp pháp, tính hệ thống và trung thực trong công tác kế toán, sổ sách kế toán, trong nội dung báo cáo tài chính, các phụ lục và tài liệu liên quan;"},{"k":"p","t":"e) Giám sát hợp đồng, giao dịch của công ty với các bên có liên quan;"},{"k":"p","t":"g) Giám sát thực hiện dự án đầu tư lớn; hợp đồng, giao dịch mua, bán; hợp đồng, giao dịch kinh doanh khác có quy mô lớn; hợp đồng, giao dịch kinh doanh bất thường của công ty;"},{"k":"p","t":"h) Lập và gửi báo cáo đánh giá, kiến nghị về nội dung quy định tại các điểm a, b, c, d, đ, e và g khoản này cho cơ quan đại diện chủ sở hữu và Hội đồng thành viên;"},{"k":"p","t":"i) Thực hiện nghĩa vụ khác theo yêu cầu của cơ quan đại diện chủ sở hữu, quy định tại Điều lệ công ty."},{"k":"p","t":"2. Tiền lương, thù lao, thưởng và lợi ích khác của Kiểm soát viên do cơ quan đại diện chủ sở hữu quyết định và chi trả."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_105","no":105,"code":"Điều 105","title":"Điều 105. Quyền của Ban kiểm soát","shortTitle":"Quyền của Ban kiểm soát","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Tham gia các cuộc họp Hội đồng thành viên, các cuộc tham vấn, trao đổi chính thức và không chính thức của cơ quan đại diện chủ sở hữu với Hội đồng thành viên; chất vấn Hội đồng thành viên, thành viên Hội đồng thành viên, Chủ tịch công ty và Giám đốc hoặc Tổng giám đốc về kế hoạch, dự án, chương trình đầu tư phát triển và các quyết định khác trong quản lý, điều hành công ty."},{"k":"p","t":"2. Xem xét sổ sách kế toán, báo cáo, hợp đồng, giao dịch và tài liệu khác của công ty; kiểm tra công việc quản lý, điều hành của Hội đồng thành viên, thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc khi xét thấy cần thiết hoặc theo yêu cầu của cơ quan đại diện chủ sở hữu."},{"k":"p","t":"3. Yêu cầu Hội đồng thành viên, thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc, Phó giám đốc hoặc Tổng giám đốc, Phó Tổng giám đốc, Kế toán trưởng và người quản lý khác báo cáo, cung cấp thông tin trong phạm vi quản lý và hoạt động đầu tư, kinh doanh của công ty."},{"k":"p","t":"4. Yêu cầu người quản lý công ty báo cáo về thực trạng tài chính và kết quả kinh doanh của công ty con khi xét thấy cần thiết để thực hiện các nhiệm vụ theo quy định của pháp luật và Điều lệ công ty."},{"k":"p","t":"5. Đề nghị cơ quan đại diện chủ sở hữu thành lập đơn vị thực hiện nhiệm vụ kiểm toán để tham mưu và trực tiếp hỗ trợ Ban kiểm soát thực hiện quyền và nghĩa vụ được giao."},{"k":"p","t":"6. Quyền khác quy định tại Điều lệ công ty."}]},{"id":"luat-59_106","no":106,"code":"Điều 106","title":"Điều 106. Chế độ làm việc của Ban kiểm soát","shortTitle":"Chế độ làm việc của Ban kiểm soát","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Trưởng Ban kiểm soát xây dựng kế hoạch công tác hằng tháng, hằng quý và hằng năm của Ban kiểm soát; phân công nhiệm vụ và công việc cụ thể cho từng Kiểm soát viên."},{"k":"p","t":"2. Kiểm soát viên chủ động và độc lập thực hiện nhiệm vụ và công việc được phân công; đề xuất, kiến nghị thực hiện nhiệm vụ, công việc kiểm soát khác ngoài kế hoạch, ngoài phạm vi được phân công khi xét thấy cần thiết."},{"k":"p","t":"3. Ban kiểm soát họp ít nhất mỗi tháng một lần để rà soát, đánh giá, thông qua báo cáo kết quả kiểm soát trong tháng trình cơ quan đại diện chủ sở hữu; thảo luận và thông qua kế hoạch hoạt động tiếp theo của Ban kiểm soát."},{"k":"p","t":"4. Quyết định của Ban kiểm soát được thông qua khi có đa số thành viên dự họp tán thành. Các ý kiến khác với nội dung quyết định đã được thông qua phải được ghi chép đầy đủ, chính xác và báo cáo cơ quan đại diện chủ sở hữu."}]},{"id":"luat-59_107","no":107,"code":"Điều 107","title":"Điều 107. Trách nhiệm của Kiểm soát viên","shortTitle":"Trách nhiệm của Kiểm soát viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Tuân thủ pháp luật, Điều lệ công ty, quyết định của cơ quan đại diện chủ sở hữu và đạo đức nghề nghiệp trong thực hiện quyền và nghĩa vụ của Kiểm soát viên."},{"k":"p","t":"2. Thực hiện quyền và nghĩa vụ được giao một cách trung thực, cẩn trọng, tốt nhất để bảo vệ lợi ích của Nhà nước, công ty và lợi ích hợp pháp của các bên tại công ty."},{"k":"p","t":"3. Trung thành với lợi ích của Nhà nước và công ty; không lạm dụng địa vị, chức vụ và sử dụng thông tin, bí quyết, cơ hội kinh doanh, tài sản khác của công ty để tư lợi hoặc phục vụ lợi ích của tổ chức, cá nhân khác."},{"k":"p","t":"4. Trường hợp vi phạm trách nhiệm quy định tại Điều này mà gây thiệt hại cho công ty thì Kiểm soát viên phải chịu trách nhiệm cá nhân hoặc liên đới bồi thường thiệt hại đó; tùy theo tính chất, mức độ vi phạm và thiệt hại còn có thể bị xử lý kỷ luật, xử phạt vi phạm hành chính hoặc bị truy cứu trách nhiệm hình sự theo quy định của pháp luật; hoàn trả lại cho công ty mọi thu nhập và lợi ích có được do vi phạm trách nhiệm quy định tại Điều này."},{"k":"p","t":"5. Báo cáo kịp thời cho cơ quan đại diện chủ sở hữu, đồng thời yêu cầu Kiểm soát viên chấm dứt hành vi vi phạm và khắc phục hậu quả trong trường hợp phát hiện Kiểm soát viên đó vi phạm quyền, nghĩa vụ và trách nhiệm được giao."},{"k":"p","t":"6. Báo cáo kịp thời cho cơ quan đại diện chủ sở hữu công ty, Kiểm soát viên khác và cá nhân có liên quan, đồng thời yêu cầu cá nhân đó chấm dứt hành vi vi phạm và khắc phục hậu quả trong trường hợp sau đây:"},{"k":"p","t":"a) Phát hiện có thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc hoặc Tổng giám đốc và người quản lý khác làm trái quy định về quyền, nghĩa vụ và trách nhiệm của họ hoặc có nguy cơ làm trái quy định đó;"},{"k":"p","t":"b) Phát hiện hành vi vi phạm pháp luật, trái quy định Điều lệ công ty hoặc quy chế quản trị nội bộ công ty."},{"k":"p","t":"7. Trách nhiệm khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_108","no":108,"code":"Điều 108","title":"Điều 108. Miễn nhiệm, cách chức Trưởng Ban kiểm soát, Kiểm soát viên","shortTitle":"Miễn nhiệm, cách chức Trưởng Ban kiểm soát, Kiểm soát viên","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Trưởng Ban kiểm soát, Kiểm soát viên bị miễn nhiệm trong trường hợp sau đây:"},{"k":"p","t":"a) Không còn đủ tiêu chuẩn và điều kiện theo quy định tại Điều 103 của Luật này;"},{"k":"p","t":"b) Có đơn xin từ chức và được cơ quan đại diện chủ sở hữu chấp thuận;"},{"k":"p","t":"c) Được cơ quan đại diện chủ sở hữu hoặc cơ quan có thẩm quyền khác điều động, phân công thực hiện nhiệm vụ khác;"},{"k":"p","t":"d) Trường hợp khác theo quy định tại Điều lệ công ty."},{"k":"p","t":"2. Trưởng Ban kiểm soát, Kiểm soát viên bị cách chức trong trường hợp sau đây:"},{"k":"p","t":"a) Không thực hiện nghĩa vụ, nhiệm vụ, công việc được phân công trong 03 tháng liên tục, trừ trường hợp bất khả kháng;"},{"k":"p","t":"b) Không hoàn thành nghĩa vụ, nhiệm vụ, công việc được phân công trong 01 năm;"},{"k":"p","t":"c) Vi phạm nhiều lần, vi phạm nghiêm trọng quyền, nghĩa vụ và trách nhiệm của Trưởng Ban kiểm soát, Kiểm soát viên quy định tại Luật này và Điều lệ công ty;"},{"k":"p","t":"d) Trường hợp khác theo quy định tại Điều lệ công ty."}]},{"id":"luat-59_109","no":109,"code":"Điều 109","title":"Điều 109. Công bố thông tin định kỳ","shortTitle":"Công bố thông tin định kỳ","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty phải công bố định kỳ trên trang thông tin điện tử của công ty và của cơ quan đại diện chủ sở hữu những thông tin sau đây:"},{"k":"p","t":"a) Thông tin cơ bản về công ty và Điều lệ công ty;"},{"k":"p","t":"b) Mục tiêu tổng quát; mục tiêu, chỉ tiêu cụ thể của kế hoạch kinh doanh hằng năm;"},{"k":"p","t":"c) Báo cáo và tóm tắt báo cáo tài chính hằng năm đã được kiểm toán bởi tổ chức kiểm toán độc lập trong thời hạn 150 ngày kể từ ngày kết thúc năm tài chính; bao gồm cả báo cáo tài chính của công ty mẹ và báo cáo tài chính hợp nhất (nếu có);"},{"k":"p","t":"d) Báo cáo và tóm tắt báo cáo tài chính giữa năm đã được kiểm toán bởi tổ chức kiểm toán độc lập; thời hạn công bố phải trước ngày 31 tháng 7 hằng năm; bao gồm cả báo cáo tài chính của công ty mẹ và báo cáo tài chính hợp nhất (nếu có);"},{"k":"p","t":"đ) Báo cáo đánh giá về kết quả thực hiện kế hoạch sản xuất, kinh doanh hằng năm;"},{"k":"p","t":"e) Báo cáo kết quả thực hiện các nhiệm vụ công ích được giao theo kế hoạch hoặc đấu thầu (nếu có) và trách nhiệm xã hội khác;"},{"k":"p","t":"g) Báo cáo về thực trạng quản trị, cơ cấu tổ chức công ty."},{"k":"p","t":"2. Báo cáo thực trạng quản trị công ty bao gồm các thông tin sau đây:"},{"k":"p","t":"a) Thông tin về cơ quan đại diện chủ sở hữu, người đứng đầu và cấp phó của người đứng đầu cơ quan đại diện chủ sở hữu;"},{"k":"p","t":"b) Thông tin về người quản lý công ty, bao gồm trình độ chuyên môn, kinh nghiệm nghề nghiệp, các vị trí quản lý đã nắm giữ, cách thức được bổ nhiệm, công việc quản lý được giao; mức và cách thức chi trả tiền lương, thù lao, thưởng và lợi ích khác; người có liên quan và lợi ích có liên quan của người quản lý công ty;"},{"k":"p","t":"c) Quyết định có liên quan của cơ quan đại diện chủ sở hữu; các nghị quyết, quyết định của Hội đồng thành viên hoặc Chủ tịch công ty;"},{"k":"p","t":"d) Thông tin về Ban kiểm soát, Kiểm soát viên và hoạt động của họ;"},{"k":"p","t":"đ) Báo cáo kết luận của cơ quan thanh tra (nếu có) và báo cáo của Ban kiểm soát, Kiểm soát viên;"},{"k":"p","t":"e) Thông tin về người có liên quan của công ty, hợp đồng, giao dịch của công ty với người có liên quan;"},{"k":"p","t":"g) Thông tin khác theo quy định của Điều lệ công ty."},{"k":"p","t":"3. Thông tin được công bố phải đầy đủ, chính xác và kịp thời theo quy định của pháp luật."},{"k":"p","t":"4. Người đại diện theo pháp luật hoặc người được ủy quyền công bố thông tin thực hiện công bố thông tin. Người đại diện theo pháp luật phải chịu trách nhiệm về tính đầy đủ, kịp thời, trung thực và chính xác của thông tin được công bố."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_110","no":110,"code":"Điều 110","title":"Điều 110. Công bố thông tin bất thường","shortTitle":"Công bố thông tin bất thường","chuong":"Chương IV — DOANH NGHIỆP NHÀ NƯỚC","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty phải công bố trên trang thông tin điện tử, ấn phẩm (nếu có) và niêm yết công khai tại trụ sở chính, địa điểm kinh doanh của công ty về các thông tin bất thường trong thời hạn 36 giờ kể từ khi xảy ra một trong các sự kiện sau đây:"},{"k":"p","t":"a) Tài khoản của công ty bị phong tỏa hoặc được phép hoạt động trở lại sau khi bị phong tỏa;"},{"k":"p","t":"b) Tạm ngừng một phần hoặc toàn bộ hoạt động kinh doanh; bị thu hồi Giấy chứng nhận đăng ký doanh nghiệp, giấy phép thành lập, giấy phép thành lập và hoạt động, giấy phép hoạt động hoặc giấy phép khác liên quan đến hoạt động của công ty;"},{"k":"p","t":"c) Sửa đổi, bổ sung nội dung Giấy chứng nhận đăng ký doanh nghiệp, giấy phép thành lập, giấy phép thành lập và hoạt động, giấy phép hoạt động hoặc giấy phép khác liên quan đến hoạt động của công ty;"},{"k":"p","t":"d) Thay đổi thành viên Hội đồng thành viên, Chủ tịch công ty, Giám đốc, Phó giám đốc hoặc Tổng giám đốc, Phó Tổng giám đốc, Kế toán trưởng, Trưởng phòng tài chính kế toán, Trưởng Ban kiểm soát hoặc Kiểm soát viên;"},{"k":"p","t":"đ) Có quyết định kỷ luật, khởi tố, có bản án, quyết định của Tòa án đối với người quản lý doanh nghiệp;"},{"k":"p","t":"e) Có kết luận của cơ quan thanh tra hoặc của cơ quan quản lý thuế về việc vi phạm pháp luật của doanh nghiệp;"},{"k":"p","t":"g) Có quyết định thay đổi tổ chức kiểm toán độc lập hoặc bị từ chối kiểm toán báo cáo tài chính;"},{"k":"p","t":"h) Có quyết định thành lập, giải thể, hợp nhất, sáp nhập, chuyển đổi công ty con, chi nhánh, văn phòng đại diện; quyết định đầu tư, giảm vốn hoặc thoái vốn đầu tư tại các công ty khác."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_111","no":111,"code":"Điều 111","title":"Điều 111. Công ty cổ phần","shortTitle":"Công ty cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần là doanh nghiệp, trong đó:"},{"k":"p","t":"a) Vốn điều lệ được chia thành nhiều phần bằng nhau gọi là cổ phần;"},{"k":"p","t":"b) Cổ đông có thể là tổ chức, cá nhân; số lượng cổ đông tối thiểu là 03 và không hạn chế số lượng tối đa;"},{"k":"p","t":"c) Cổ đông chỉ chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của doanh nghiệp trong phạm vi số vốn đã góp vào doanh nghiệp;"},{"k":"p","t":"d) Cổ đông có quyền tự do chuyển nhượng cổ phần của mình cho người khác, trừ trường hợp quy định tại khoản 3 Điều 120 và khoản 1 Điều 127 của Luật này."},{"k":"p","t":"2. Công ty cổ phần có tư cách pháp nhân kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp."},{"k":"p","t":"3. Công ty cổ phần có quyền phát hành cổ phần, trái phiếu và các loại chứng khoán khác của công ty."}]},{"id":"luat-59_112","no":112,"code":"Điều 112","title":"Điều 112. Vốn của công ty cổ phần","shortTitle":"Vốn của công ty cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Vốn điều lệ của công ty cổ phần là tổng mệnh giá cổ phần các loại đã bán. Vốn điều lệ của công ty cổ phần khi đăng ký thành lập doanh nghiệp là tổng mệnh giá cổ phần các loại đã được đăng ký mua và được ghi trong Điều lệ công ty."},{"k":"p","t":"2. Cổ phần đã bán là cổ phần được quyền chào bán đã được các cổ đông thanh toán đủ cho công ty. Khi đăng ký thành lập doanh nghiệp, cổ phần đã bán là tổng số cổ phần các loại đã được đăng ký mua."},{"k":"p","t":"3. Cổ phần được quyền chào bán của công ty cổ phần là tổng số cổ phần các loại mà Đại hội đồng cổ đông quyết định sẽ chào bán để huy động vốn. Số cổ phần được quyền chào bán của công ty cổ phần khi đăng ký thành lập doanh nghiệp là tổng số cổ phần các loại mà công ty sẽ chào bán để huy động vốn, bao gồm cổ phần đã được đăng ký mua và cổ phần chưa được đăng ký mua."},{"k":"p","t":"4. Cổ phần chưa bán là cổ phần được quyền chào bán và chưa được thanh toán cho công ty. Khi đăng ký thành lập doanh nghiệp, cổ phần chưa bán là tổng số cổ phần các loại chưa được đăng ký mua."},{"k":"p","t":"5. Công ty có thể giảm vốn điều lệ trong trường hợp sau đây:"},{"k":"p","t":"a) Theo quyết định của Đại hội đồng cổ đông, công ty hoàn trả một phần vốn góp cho cổ đông theo tỷ lệ sở hữu cổ phần của họ trong công ty nếu công ty đã hoạt động kinh doanh liên tục từ 02 năm trở lên kể từ ngày đăng ký thành lập doanh nghiệp và bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác sau khi đã hoàn trả cho cổ đông;"},{"k":"p","t":"b) Công ty mua lại cổ phần đã bán theo quy định tại Điều 132 và Điều 133 của Luật này;"},{"k":"p","t":"c) Vốn điều lệ không được các cổ đông thanh toán đầy đủ và đúng hạn theo quy định tại Điều 113 của Luật này."}]},{"id":"luat-59_113","no":113,"code":"Điều 113","title":"Điều 113. Thanh toán cổ phần đã đăng ký mua khi đăng ký thành lập doanh nghiệp","shortTitle":"Thanh toán cổ phần đã đăng ký mua khi đăng ký thành lập doanh nghiệp","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Các cổ đông phải thanh toán đủ số cổ phần đã đăng ký mua trong thời hạn 90 ngày kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp, trừ trường hợp Điều lệ công ty hoặc hợp đồng đăng ký mua cổ phần quy định một thời hạn khác ngắn hơn. Trường hợp cổ đông góp vốn bằng tài sản thì thời gian vận chuyển nhập khẩu, thực hiện thủ tục hành chính để chuyển quyền sở hữu tài sản đó không tính vào thời hạn góp vốn này. Hội đồng quản trị chịu trách nhiệm giám sát, đôn đốc cổ đông thanh toán đủ và đúng hạn các cổ phần đã đăng ký mua."},{"k":"p","t":"2. Trong thời hạn từ ngày công ty được cấp Giấy chứng nhận đăng ký doanh nghiệp đến ngày cuối cùng phải thanh toán đủ số cổ phần đã đăng ký mua quy định tại khoản 1 Điều này, số phiếu biểu quyết của các cổ đông được tính theo số cổ phần phổ thông đã được đăng ký mua, trừ trường hợp Điều lệ công ty có quy định khác."},{"k":"p","t":"3. Trường hợp sau thời hạn quy định tại khoản 1 Điều này, cổ đông chưa thanh toán hoặc chỉ thanh toán được một phần số cổ phần đã đăng ký mua thì thực hiện theo quy định sau đây:"},{"k":"p","t":"a) Cổ đông chưa thanh toán số cổ phần đã đăng ký mua đương nhiên không còn là cổ đông của công ty và không được chuyển nhượng quyền mua cổ phần đó cho người khác;"},{"k":"p","t":"b) Cổ đông chỉ thanh toán một phần số cổ phần đã đăng ký mua có quyền biểu quyết, nhận lợi tức và các quyền khác tương ứng với số cổ phần đã thanh toán; không được chuyển nhượng quyền mua số cổ phần chưa thanh toán cho người khác;"},{"k":"p","t":"c) Cổ phần chưa thanh toán được coi là cổ phần chưa bán và Hội đồng quản trị được quyền bán;"},{"k":"p","t":"d) Trong thời hạn 30 ngày kể từ ngày kết thúc thời hạn phải thanh toán đủ số cổ phần đã đăng ký mua theo quy định tại khoản 1 Điều này, công ty phải đăng ký điều chỉnh vốn điều lệ bằng mệnh giá số cổ phần đã được thanh toán đủ, trừ trường hợp số cổ phần chưa thanh toán đã được bán hết trong thời hạn này; đăng ký thay đổi cổ đông sáng lập."},{"k":"p","t":"4. Cổ đông chưa thanh toán hoặc chưa thanh toán đủ số cổ phần đã đăng ký mua phải chịu trách nhiệm tương ứng với tổng mệnh giá cổ phần đã đăng ký mua đối với các nghĩa vụ tài chính của công ty phát sinh trong thời hạn trước ngày công ty đăng ký điều chỉnh vốn điều lệ theo quy định tại điểm d khoản 3 Điều này. Thành viên Hội đồng quản trị, người đại diện theo pháp luật phải chịu trách nhiệm liên đới về các thiệt hại phát sinh do không thực hiện hoặc không thực hiện đúng quy định tại khoản 1 và điểm d khoản 3 Điều này."},{"k":"p","t":"5. Trừ trường hợp quy định tại khoản 2 Điều này, người góp vốn trở thành cổ đông của công ty kể từ thời điểm đã thanh toán việc mua cổ phần và những thông tin về cổ đông quy định tại các điểm b, c, d và đ khoản 2 Điều 122 của Luật này được ghi vào sổ đăng ký cổ đông."}]},{"id":"luat-59_114","no":114,"code":"Điều 114","title":"Điều 114. Các loại cổ phần","shortTitle":"Các loại cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần phải có cổ phần phổ thông. Người sở hữu cổ phần phổ thông là cổ đông phổ thông."},{"k":"p","t":"2. Ngoài cổ phần phổ thông, công ty cổ phần có thể có cổ phần ưu đãi. Người sở hữu cổ phần ưu đãi gọi là cổ đông ưu đãi. Cổ phần ưu đãi gồm các loại sau đây:"},{"k":"p","t":"a) Cổ phần ưu đãi cổ tức;"},{"k":"p","t":"b) Cổ phần ưu đãi hoàn lại;"},{"k":"p","t":"c) Cổ phần ưu đãi biểu quyết;"},{"k":"p","t":"d) Cổ phần ưu đãi khác theo quy định tại Điều lệ công ty và pháp luật về chứng khoán."},{"k":"p","t":"3. Người được quyền mua cổ phần ưu đãi cổ tức, cổ phần ưu đãi hoàn lại và cổ phần ưu đãi khác do Điều lệ công ty quy định hoặc do Đại hội đồng cổ đông quyết định."},{"k":"p","t":"4. Mỗi cổ phần của cùng một loại đều tạo cho người sở hữu cổ phần đó các quyền, nghĩa vụ và lợi ích ngang nhau."},{"k":"p","t":"5. Cổ phần phổ thông không thể chuyển đổi thành cổ phần ưu đãi. Cổ phần ưu đãi có thể chuyển đổi thành cổ phần phổ thông theo nghị quyết của Đại hội đồng cổ đông."},{"k":"p","t":"6. Cổ phần phổ thông được dùng làm tài sản cơ sở để phát hành chứng chỉ lưu ký không có quyền biểu quyết được gọi là cổ phần phổ thông cơ sở. Chứng chỉ lưu ký không có quyền biểu quyết có lợi ích kinh tế và nghĩa vụ tương ứng với cổ phần phổ thông cơ sở, trừ quyền biểu quyết."},{"k":"p","t":"7. Chính phủ quy định về chứng chỉ lưu ký không có quyền biểu quyết."}]},{"id":"luat-59_115","no":115,"code":"Điều 115","title":"Điều 115. Quyền của cổ đông phổ thông","shortTitle":"Quyền của cổ đông phổ thông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ đông phổ thông có quyền sau đây:"},{"k":"p","t":"a) Tham dự, phát biểu trong cuộc họp Đại hội đồng cổ đông và thực hiện quyền biểu quyết trực tiếp hoặc thông qua người đại diện theo ủy quyền hoặc hình thức khác do Điều lệ công ty, pháp luật quy định. Mỗi cổ phần phổ thông có một phiếu biểu quyết;"},{"k":"p","t":"b) Nhận cổ tức với mức theo quyết định của Đại hội đồng cổ đông;"},{"k":"p","t":"c) Ưu tiên mua cổ phần mới tương ứng với tỷ lệ sở hữu cổ phần phổ thông của từng cổ đông trong công ty;"},{"k":"p","t":"d) Tự do chuyển nhượng cổ phần của mình cho người khác, trừ trường hợp quy định tại khoản 3 Điều 120, khoản 1 Điều 127 của Luật này và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"đ) Xem xét, tra cứu và trích lục thông tin về tên và địa chỉ liên lạc trong danh sách cổ đông có quyền biểu quyết; yêu cầu sửa đổi thông tin không chính xác của mình;"},{"k":"p","t":"e) Xem xét, tra cứu, trích lục hoặc sao chụp Điều lệ công ty, biên bản họp Đại hội đồng cổ đông và nghị quyết Đại hội đồng cổ đông;"},{"k":"p","t":"g) Khi công ty giải thể hoặc phá sản, được nhận một phần tài sản còn lại tương ứng với tỷ lệ sở hữu cổ phần tại công ty."},{"k":"p","t":"2. Cổ đông hoặc nhóm cổ đông sở hữu từ 05% tổng số cổ phần phổ thông trở lên hoặc một tỷ lệ khác nhỏ hơn theo quy định tại Điều lệ công ty có quyền sau đây:"},{"k":"p","t":"a) Xem xét, tra cứu, trích lục sổ biên bản và nghị quyết, quyết định của Hội đồng quản trị, báo cáo tài chính giữa năm và hằng năm, báo cáo của Ban kiểm soát, hợp đồng, giao dịch phải thông qua Hội đồng quản trị và tài liệu khác, trừ tài liệu liên quan đến bí mật thương mại, bí mật kinh doanh của công ty;"},{"k":"p","t":"b) Yêu cầu triệu tập họp Đại hội đồng cổ đông trong trường hợp quy định tại khoản 3 Điều này;"},{"k":"p","t":"c) Yêu cầu Ban kiểm soát kiểm tra từng vấn đề cụ thể liên quan đến quản lý, điều hành hoạt động của công ty khi xét thấy cần thiết. Yêu cầu phải bằng văn bản và phải bao gồm các nội dung sau đây: họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức; số lượng cổ phần và thời điểm đăng ký cổ phần của từng cổ đông, tổng số cổ phần của cả nhóm cổ đông và tỷ lệ sở hữu trong tổng số cổ phần của công ty; vấn đề cần kiểm tra, mục đích kiểm tra;"},{"k":"p","t":"d) Quyền khác theo quy định của Luật này và Điều lệ công ty."},{"k":"p","t":"3. Cổ đông hoặc nhóm cổ đông quy định tại khoản 2 Điều này có quyền yêu cầu triệu tập họp Đại hội đồng cổ đông trong trường hợp sau đây:"},{"k":"p","t":"a) Hội đồng quản trị vi phạm nghiêm trọng quyền của cổ đông, nghĩa vụ của người quản lý hoặc ra quyết định vượt quá thẩm quyền được giao;"},{"k":"p","t":"b) Trường hợp khác theo quy định tại Điều lệ công ty."},{"k":"p","t":"4. Yêu cầu triệu tập họp Đại hội đồng cổ đông quy định tại khoản 3 Điều này phải bằng văn bản và phải bao gồm các nội dung sau đây: họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức; số lượng cổ phần và thời điểm đăng ký cổ phần của từng cổ đông, tổng số cổ phần của cả nhóm cổ đông và tỷ lệ sở hữu trong tổng số cổ phần của công ty, căn cứ và lý do yêu cầu triệu tập họp Đại hội đồng cổ đông. Kèm theo yêu cầu triệu tập họp phải có các tài liệu, chứng cứ về các vi phạm của Hội đồng quản trị, mức độ vi phạm hoặc về quyết định vượt quá thẩm quyền."},{"k":"p","t":"5. Cổ đông hoặc nhóm cổ đông sở hữu từ 10% tổng số cổ phần phổ thông trở lên hoặc một tỷ lệ khác nhỏ hơn theo quy định tại Điều lệ công ty có quyền đề cử người vào Hội đồng quản trị, Ban kiểm soát. Trường hợp Điều lệ công ty không có quy định khác thì việc đề cử người vào Hội đồng quản trị và Ban kiểm soát thực hiện như sau:"},{"k":"p","t":"a) Các cổ đông phổ thông hợp thành nhóm để đề cử người vào Hội đồng quản trị và Ban kiểm soát phải thông báo về việc họp nhóm cho các cổ đông dự họp biết trước khi khai mạc Đại hội đồng cổ đông;"},{"k":"p","t":"b) Căn cứ số lượng thành viên Hội đồng quản trị và Ban kiểm soát, cổ đông hoặc nhóm cổ đông quy định tại khoản này được quyền đề cử một hoặc một số người theo quyết định của Đại hội đồng cổ đông làm ứng cử viên Hội đồng quản trị và Ban kiểm soát. Trường hợp số ứng cử viên được cổ đông hoặc nhóm cổ đông đề cử thấp hơn số ứng cử viên mà họ được quyền đề cử theo quyết định của Đại hội đồng cổ đông thì số ứng cử viên còn lại do Hội đồng quản trị, Ban kiểm soát và các cổ đông khác đề cử."},{"k":"p","t":"6. Quyền khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_116","no":116,"code":"Điều 116","title":"Điều 116. Cổ phần ưu đãi biểu quyết và quyền của cổ đông sở hữu cổ phần ưu đãi biểu quyết","shortTitle":"Cổ phần ưu đãi biểu quyết và quyền của cổ đông sở hữu cổ phần ưu đãi biểu quyết","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ phần ưu đãi biểu quyết là cổ phần phổ thông có nhiều hơn phiếu biểu quyết so với cổ phần phổ thông khác; số phiếu biểu quyết của một cổ phần ưu đãi biểu quyết do Điều lệ công ty quy định. Chỉ có tổ chức được Chính phủ ủy quyền và cổ đông sáng lập được quyền nắm giữ cổ phần ưu đãi biểu quyết. Ưu đãi biểu quyết của cổ đông sáng lập có hiệu lực trong 03 năm kể từ ngày công ty được cấp Giấy chứng nhận đăng ký doanh nghiệp. Quyền biểu quyết và thời hạn ưu đãi biểu quyết đối với cổ phần ưu đãi biểu quyết do tổ chức được Chính phủ ủy quyền nắm giữ được quy định tại Điều lệ công ty. Sau thời hạn ưu đãi biểu quyết, cổ phần ưu đãi biểu quyết chuyển đổi thành cổ phần phổ thông."},{"k":"p","t":"2. Cổ đông sở hữu cổ phần ưu đãi biểu quyết có quyền sau đây:"},{"k":"p","t":"a) Biểu quyết về các vấn đề thuộc thẩm quyền của Đại hội đồng cổ đông với số phiếu biểu quyết theo quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Quyền khác như cổ đông phổ thông, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Cổ đông sở hữu cổ phần ưu đãi biểu quyết không được chuyển nhượng cổ phần đó cho người khác, trừ trường hợp chuyển nhượng theo bản án, quyết định của Tòa án đã có hiệu lực pháp luật hoặc thừa kế."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-59_117","no":117,"code":"Điều 117","title":"Điều 117. Cổ phần ưu đãi cổ tức và quyền của cổ đông sở hữu cổ phần ưu đãi cổ tức","shortTitle":"Cổ phần ưu đãi cổ tức và quyền của cổ đông sở hữu cổ phần ưu đãi cổ tức","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ phần ưu đãi cổ tức là cổ phần được trả cổ tức với mức cao hơn so với mức cổ tức của cổ phần phổ thông hoặc mức ổn định hằng năm. Cổ tức được chia hằng năm gồm cổ tức cố định và cổ tức thưởng. Cổ tức cố định không phụ thuộc vào kết quả kinh doanh của công ty. Mức cổ tức cố định cụ thể và phương thức xác định cổ tức thưởng được ghi rõ trong cổ phiếu của cổ phần ưu đãi cổ tức."},{"k":"p","t":"2. Cổ đông sở hữu cổ phần ưu đãi cổ tức có quyền sau đây:"},{"k":"p","t":"a) Nhận cổ tức theo quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Nhận phần tài sản còn lại tương ứng với tỷ lệ sở hữu cổ phần tại công ty sau khi công ty đã thanh toán hết các khoản nợ, cổ phần ưu đãi hoàn lại khi công ty giải thể hoặc phá sản;"},{"k":"p","t":"c) Quyền khác như cổ đông phổ thông, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Cổ đông sở hữu cổ phần ưu đãi cổ tức không có quyền biểu quyết, dự họp Đại hội đồng cổ đông, đề cử người vào Hội đồng quản trị và Ban kiểm soát, trừ trường hợp quy định tại khoản 6 Điều 148 của Luật này."}]},{"id":"luat-59_118","no":118,"code":"Điều 118","title":"Điều 118. Cổ phần ưu đãi hoàn lại và quyền của cổ đông sở hữu cổ phần ưu đãi hoàn lại","shortTitle":"Cổ phần ưu đãi hoàn lại và quyền của cổ đông sở hữu cổ phần ưu đãi hoàn lại","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ phần ưu đãi hoàn lại là cổ phần được công ty hoàn lại vốn góp theo yêu cầu của người sở hữu hoặc theo các điều kiện được ghi tại cổ phiếu của cổ phần ưu đãi hoàn lại và Điều lệ công ty."},{"k":"p","t":"2. Cổ đông sở hữu cổ phần ưu đãi hoàn lại có quyền như cổ đông phổ thông, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Cổ đông sở hữu cổ phần ưu đãi hoàn lại không có quyền biểu quyết, dự họp Đại hội đồng cổ đông, đề cử người vào Hội đồng quản trị và Ban kiểm soát, trừ trường hợp quy định tại khoản 5 Điều 114 và khoản 6 Điều 148 của Luật này."}]},{"id":"luat-59_119","no":119,"code":"Điều 119","title":"Điều 119. Nghĩa vụ của cổ đông","shortTitle":"Nghĩa vụ của cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Thanh toán đủ và đúng thời hạn số cổ phần cam kết mua."},{"k":"p","t":"2. Không được rút vốn đã góp bằng cổ phần phổ thông ra khỏi công ty dưới mọi hình thức, trừ trường hợp được công ty hoặc người khác mua lại cổ phần. Trường hợp có cổ đông rút một phần hoặc toàn bộ vốn cổ phần đã góp trái với quy định tại khoản này thì cổ đông đó và người có lợi ích liên quan trong công ty phải cùng liên đới chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi giá trị cổ phần đã bị rút và các thiệt hại xảy ra."},{"k":"p","t":"3. Tuân thủ Điều lệ công ty và quy chế quản lý nội bộ của công ty."},{"k":"p","t":"4. Chấp hành nghị quyết, quyết định của Đại hội đồng cổ đông, Hội đồng quản trị."},{"k":"p","t":"5. Bảo mật các thông tin được công ty cung cấp theo quy định tại Điều lệ công ty và pháp luật; chỉ sử dụng thông tin được cung cấp để thực hiện và bảo vệ quyền và lợi ích hợp pháp của mình; nghiêm cấm phát tán hoặc sao, gửi thông tin được công ty cung cấp cho tổ chức, cá nhân khác."},{"k":"p","t":"6. Nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_120","no":120,"code":"Điều 120","title":"Điều 120. Cổ phần phổ thông của cổ đông sáng lập","shortTitle":"Cổ phần phổ thông của cổ đông sáng lập","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần mới thành lập phải có ít nhất 03 cổ đông sáng lập. Công ty cổ phần được chuyển đổi từ doanh nghiệp nhà nước hoặc từ công ty trách nhiệm hữu hạn hoặc được chia, tách, hợp nhất, sáp nhập từ công ty cổ phần khác không nhất thiết phải có cổ đông sáng lập; trường hợp này, Điều lệ công ty trong hồ sơ đăng ký doanh nghiệp phải có chữ ký của người đại diện theo pháp luật hoặc các cổ đông phổ thông của công ty đó."},{"k":"p","t":"2. Các cổ đông sáng lập phải cùng nhau đăng ký mua ít nhất 20% tổng số cổ phần phổ thông được quyền chào bán khi đăng ký thành lập doanh nghiệp."},{"k":"p","t":"3. Trong thời hạn 03 năm kể từ ngày công ty được cấp Giấy chứng nhận đăng ký doanh nghiệp, cổ phần phổ thông của cổ đông sáng lập được tự do chuyển nhượng cho cổ đông sáng lập khác và chỉ được chuyển nhượng cho người không phải là cổ đông sáng lập nếu được sự chấp thuận của Đại hội đồng cổ đông. Trường hợp này, cổ đông sáng lập dự định chuyển nhượng cổ phần phổ thông thì không có quyền biểu quyết về việc chuyển nhượng cổ phần đó."},{"k":"p","t":"4. Các hạn chế quy định tại khoản 3 Điều này không áp dụng đối với cổ phần phổ thông sau đây:"},{"k":"p","t":"a) Cổ phần mà cổ đông sáng lập có thêm sau khi đăng ký thành lập doanh nghiệp;"},{"k":"p","t":"b) Cổ phần đã được chuyển nhượng cho người khác không phải là cổ đông sáng lập."}]},{"id":"luat-59_121","no":121,"code":"Điều 121","title":"Điều 121. Cổ phiếu","shortTitle":"Cổ phiếu","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ phiếu là chứng chỉ do công ty cổ phần phát hành, bút toán ghi sổ hoặc dữ liệu điện tử xác nhận quyền sở hữu một hoặc một số cổ phần của công ty đó. Cổ phiếu phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, mã số doanh nghiệp, địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Số lượng cổ phần và loại cổ phần;"},{"k":"p","t":"c) Mệnh giá mỗi cổ phần và tổng mệnh giá số cổ phần ghi trên cổ phiếu;"},{"k":"p","t":"d) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức;"},{"k":"p","t":"đ) Chữ ký của người đại diện theo pháp luật của công ty;"},{"k":"p","t":"e) Số đăng ký tại sổ đăng ký cổ đông của công ty và ngày phát hành cổ phiếu;"},{"k":"p","t":"g) Nội dung khác theo quy định tại các điều 116, 117 và 118 của Luật này đối với cổ phiếu của cổ phần ưu đãi."},{"k":"p","t":"2. Trường hợp có sai sót trong nội dung và hình thức cổ phiếu do công ty phát hành thì quyền và lợi ích của người sở hữu cổ phiếu đó không bị ảnh hưởng. Người đại diện theo pháp luật của công ty chịu trách nhiệm về thiệt hại do những sai sót đó gây ra."},{"k":"p","t":"3. Trường hợp cổ phiếu bị mất, bị hư hỏng hoặc bị hủy hoại dưới hình thức khác thì cổ đông được công ty cấp lại cổ phiếu theo đề nghị của cổ đông đó. Đề nghị của cổ đông phải bao gồm các nội dung sau đây:"},{"k":"p","t":"a) Thông tin về cổ phiếu đã bị mất, bị hư hỏng hoặc bị hủy hoại dưới hình thức khác;"},{"k":"p","t":"b) Cam kết chịu trách nhiệm về những tranh chấp phát sinh từ việc cấp lại cổ phiếu mới."}]},{"id":"luat-59_122","no":122,"code":"Điều 122","title":"Điều 122. Sổ đăng ký cổ đông","shortTitle":"Sổ đăng ký cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần phải lập và lưu giữ sổ đăng ký cổ đông từ khi được cấp Giấy chứng nhận đăng ký doanh nghiệp. Sổ đăng ký cổ đông có thể là văn bản giấy, tập dữ liệu điện tử ghi nhận thông tin về sở hữu cổ phần của các cổ đông công ty."},{"k":"p","t":"2. Sổ đăng ký cổ đông phải bao gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Tổng số cổ phần được quyền chào bán, loại cổ phần được quyền chào bán và số cổ phần được quyền chào bán của từng loại;"},{"k":"p","t":"c) Tổng số cổ phần đã bán của từng loại và giá trị vốn cổ phần đã góp;"},{"k":"p","t":"d) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức;"},{"k":"p","t":"đ) Số lượng cổ phần từng loại của mỗi cổ đông, ngày đăng ký cổ phần."},{"k":"p","t":"3. Sổ đăng ký cổ đông được lưu giữ tại trụ sở chính của công ty hoặc các tổ chức khác có chức năng lưu giữ sổ đăng ký cổ đông. Cổ đông có quyền kiểm tra, tra cứu, trích lục, sao chép tên và địa chỉ liên lạc của cổ đông công ty trong sổ đăng ký cổ đông."},{"k":"p","t":"4. Trường hợp cổ đông thay đổi địa chỉ liên lạc thì phải thông báo kịp thời với công ty để cập nhật vào sổ đăng ký cổ đông. Công ty không chịu trách nhiệm về việc không liên lạc được với cổ đông do không được thông báo thay đổi địa chỉ liên lạc của cổ đông."},{"k":"p","t":"5. Công ty phải cập nhật kịp thời thay đổi cổ đông trong sổ đăng ký cổ đông theo yêu cầu của cổ đông có liên quan theo quy định tại Điều lệ công ty."}]},{"id":"luat-59_123","no":123,"code":"Điều 123","title":"Điều 123. Chào bán cổ phần","shortTitle":"Chào bán cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Chào bán cổ phần là việc công ty tăng thêm số lượng cổ phần, loại cổ phần được quyền chào bán để tăng vốn điều lệ."},{"k":"p","t":"2. Chào bán cổ phần có thể thực hiện theo các hình thức sau đây:"},{"k":"p","t":"a) Chào bán cổ phần cho cổ đông hiện hữu;"},{"k":"p","t":"b) Chào bán cổ phần riêng lẻ;"},{"k":"p","t":"c) Chào bán cổ phần ra công chúng."},{"k":"p","t":"3. Chào bán cổ phần ra công chúng, chào bán cổ phần của công ty đại chúng và tổ chức khác thực hiện theo quy định của pháp luật về chứng khoán."},{"k":"p","t":"4. Công ty thực hiện đăng ký thay đổi vốn điều lệ trong thời hạn 10 ngày kể từ ngày hoàn thành đợt bán cổ phần."}]},{"id":"luat-59_124","no":124,"code":"Điều 124","title":"Điều 124. Chào bán cổ phần cho cổ đông hiện hữu","shortTitle":"Chào bán cổ phần cho cổ đông hiện hữu","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Chào bán cổ phần cho cổ đông hiện hữu là trường hợp công ty tăng thêm số lượng cổ phần, loại cổ phần được quyền chào bán và bán toàn bộ số cổ phần đó cho tất cả cổ đông theo tỷ lệ sở hữu cổ phần hiện có của họ tại công ty."},{"k":"p","t":"2. Chào bán cổ phần cho cổ đông hiện hữu của công ty cổ phần không phải là công ty đại chúng được thực hiện như sau:"},{"k":"p","t":"a) Công ty phải thông báo bằng văn bản đến cổ đông theo phương thức để bảo đảm đến được địa chỉ liên lạc của họ trong sổ đăng ký cổ đông chậm nhất là 15 ngày trước ngày kết thúc thời hạn đăng ký mua cổ phần;"},{"k":"p","t":"b) Thông báo phải gồm họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức; số cổ phần và tỷ lệ sở hữu cổ phần hiện có của cổ đông tại công ty; tổng số cổ phần dự kiến chào bán và số cổ phần cổ đông được quyền mua; giá chào bán cổ phần; thời hạn đăng ký mua; họ, tên, chữ ký của người đại diện theo pháp luật của công ty. Kèm theo thông báo phải có mẫu phiếu đăng ký mua cổ phần do công ty phát hành. Trường hợp phiếu đăng ký mua cổ phần không được gửi về công ty đúng hạn theo thông báo thì cổ đông đó coi như đã không nhận quyền ưu tiên mua;"},{"k":"p","t":"c) Cổ đông có quyền chuyển quyền ưu tiên mua cổ phần của mình cho người khác."},{"k":"p","t":"3. Trường hợp số lượng cổ phần dự kiến chào bán không được cổ đông và người nhận chuyển quyền ưu tiên mua đăng ký mua hết thì Hội đồng quản trị có quyền bán số cổ phần được quyền chào bán còn lại cho cổ đông của công ty và người khác với điều kiện không thuận lợi hơn so với những điều kiện đã chào bán cho các cổ đông, trừ trường hợp Đại hội đồng cổ đông có chấp thuận khác hoặc pháp luật về chứng khoán có quy định khác."},{"k":"p","t":"4. Cổ phần được coi là đã bán khi được thanh toán đủ và những thông tin về người mua quy định tại khoản 2 Điều 122 của Luật này được ghi đầy đủ vào sổ đăng ký cổ đông; kể từ thời điểm đó, người mua cổ phần trở thành cổ đông của công ty."},{"k":"p","t":"5. Sau khi cổ phần được thanh toán đầy đủ, công ty phát hành và giao cổ phiếu cho người mua; trường hợp không giao cổ phiếu, các thông tin về cổ đông quy định tại khoản 2 Điều 122 của Luật này được ghi vào sổ đăng ký cổ đông để chứng thực quyền sở hữu cổ phần của cổ đông đó trong công ty."}]},{"id":"luat-59_125","no":125,"code":"Điều 125","title":"Điều 125. Chào bán cổ phần riêng lẻ","shortTitle":"Chào bán cổ phần riêng lẻ","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Chào bán cổ phần riêng lẻ của công ty cổ phần không phải là công ty đại chúng phải đáp ứng các điều kiện sau đây:"},{"k":"p","t":"a) Không chào bán thông qua phương tiện thông tin đại chúng;"},{"k":"p","t":"b) Chào bán cho dưới 100 nhà đầu tư, không kể nhà đầu tư chứng khoán chuyên nghiệp hoặc chỉ chào bán cho nhà đầu tư chứng khoán chuyên nghiệp."},{"k":"p","t":"2. Công ty cổ phần không phải là công ty đại chúng thực hiện chào bán cổ phần riêng lẻ theo quy định sau đây:"},{"k":"p","t":"a) Công ty quyết định phương án chào bán cổ phần riêng lẻ theo quy định của Luật này;"},{"k":"p","t":"b) Cổ đông của công ty thực hiện quyền ưu tiên mua cổ phần theo quy định tại khoản 2 Điều 124 của Luật này, trừ trường hợp sáp nhập, hợp nhất công ty;"},{"k":"p","t":"c) Trường hợp cổ đông và người nhận chuyển quyền ưu tiên mua không mua hết thì số cổ phần còn lại được bán cho người khác theo phương án chào bán cổ phần riêng lẻ với điều kiện không thuận lợi hơn so với điều kiện chào bán cho các cổ đông, trừ trường hợp Đại hội đồng cổ đông có chấp thuận khác."},{"k":"p","t":"3. Nhà đầu tư nước ngoài mua cổ phần chào bán theo quy định tại Điều này phải làm thủ tục về mua cổ phần theo quy định của Luật Đầu tư."}]},{"id":"luat-59_126","no":126,"code":"Điều 126","title":"Điều 126. Bán cổ phần","shortTitle":"Bán cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Hội đồng quản trị quyết định thời điểm, phương thức và giá bán cổ phần. Giá bán cổ phần không được thấp hơn giá thị trường tại thời điểm bán hoặc giá trị được ghi trong sổ sách của cổ phần tại thời điểm gần nhất, trừ trường hợp sau đây:"},{"k":"p","t":"1. Cổ phần bán lần đầu tiên cho những người không phải là cổ đông sáng lập;"},{"k":"p","t":"2. Cổ phần bán cho tất cả cổ đông theo tỷ lệ sở hữu cổ phần hiện có của họ ở công ty;"},{"k":"p","t":"3. Cổ phần bán cho người môi giới hoặc người bảo lãnh; trường hợp này, số chiết khấu hoặc tỷ lệ chiết khấu cụ thể phải được sự chấp thuận của Đại hội đồng cổ đông, trừ trường hợp Điều lệ công ty quy định khác;"},{"k":"p","t":"4. Trường hợp khác và mức chiết khấu trong các trường hợp đó do Điều lệ công ty hoặc nghị quyết Đại hội đồng cổ đông quy định."}]},{"id":"luat-59_127","no":127,"code":"Điều 127","title":"Điều 127. Chuyển nhượng cổ phần","shortTitle":"Chuyển nhượng cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ phần được tự do chuyển nhượng, trừ trường hợp quy định tại khoản 3 Điều 120 của Luật này và Điều lệ công ty có quy định hạn chế chuyển nhượng cổ phần. Trường hợp Điều lệ công ty có quy định hạn chế về chuyển nhượng cổ phần thì các quy định này chỉ có hiệu lực khi được nêu rõ trong cổ phiếu của cổ phần tương ứng."},{"k":"p","t":"2. Việc chuyển nhượng được thực hiện bằng hợp đồng hoặc giao dịch trên thị trường chứng khoán. Trường hợp chuyển nhượng bằng hợp đồng thì giấy tờ chuyển nhượng phải được bên chuyển nhượng và bên nhận chuyển nhượng hoặc người đại diện theo ủy quyền của họ ký. Trường hợp giao dịch trên thị trường chứng khoán thì trình tự, thủ tục chuyển nhượng được thực hiện theo quy định của pháp luật về chứng khoán."},{"k":"p","t":"3. Trường hợp cổ đông là cá nhân chết thì người thừa kế theo di chúc hoặc theo pháp luật của cổ đông đó trở thành cổ đông của công ty."},{"k":"p","t":"4. Trường hợp cổ đông là cá nhân chết mà không có người thừa kế, người thừa kế từ chối nhận thừa kế hoặc bị truất quyền thừa kế thì số cổ phần của cổ đông đó được giải quyết theo quy định của pháp luật về dân sự."},{"k":"p","t":"5. Cổ đông có quyền tặng cho một phần hoặc toàn bộ cổ phần của mình tại công ty cho cá nhân, tổ chức khác; sử dụng cổ phần để trả nợ. Cá nhân, tổ chức được tặng cho hoặc nhận trả nợ bằng cổ phần sẽ trở thành cổ đông của công ty."},{"k":"p","t":"6. Cá nhân, tổ chức nhận cổ phần trong các trường hợp quy định tại Điều này chỉ trở thành cổ đông công ty từ thời điểm các thông tin của họ quy định tại khoản 2 Điều 122 của Luật này được ghi đầy đủ vào sổ đăng ký cổ đông."},{"k":"p","t":"7. Công ty phải đăng ký thay đổi cổ đông trong sổ đăng ký cổ đông theo yêu cầu của cổ đông có liên quan trong thời hạn 24 giờ kể từ khi nhận được yêu cầu theo quy định tại Điều lệ công ty."}]},{"id":"luat-59_128","no":128,"code":"Điều 128","title":"Điều 128. Chào bán trái phiếu riêng lẻ","shortTitle":"Chào bán trái phiếu riêng lẻ","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty cổ phần không phải là công ty đại chúng chào bán trái phiếu riêng lẻ theo quy định của Luật này và quy định khác của pháp luật có liên quan. Chào bán trái phiếu riêng lẻ của công ty đại chúng, các tổ chức khác và chào bán trái phiếu ra công chúng thực hiện theo quy định của pháp luật về chứng khoán."},{"k":"p","t":"2. Chào bán trái phiếu riêng lẻ của công ty cổ phần không phải là công ty đại chúng là chào bán không thông qua phương tiện thông tin đại chúng cho dưới 100 nhà đầu tư, không kể nhà đầu tư chứng khoán chuyên nghiệp và đáp ứng điều kiện về đối tượng mua trái phiếu riêng lẻ như sau:"},{"k":"p","t":"a) Nhà đầu tư chiến lược đối với trái phiếu chuyển đổi riêng lẻ và trái phiếu kèm theo chứng quyền riêng lẻ;"},{"k":"p","t":"b) Nhà đầu tư chứng khoán chuyên nghiệp đối với trái phiếu chuyển đổi riêng lẻ, trái phiếu kèm theo chứng quyền riêng lẻ và loại trái phiếu riêng lẻ khác."},{"k":"p","t":"3. Công ty cổ phần không phải là công ty đại chúng chào bán trái phiếu riêng lẻ phải đáp ứng các điều kiện sau đây:"},{"k":"p","t":"a) Công ty đã thanh toán đủ cả gốc và lãi của trái phiếu đã chào bán và đã đến hạn thanh toán hoặc thanh toán đủ các khoản nợ đến hạn trong 03 năm liên tiếp trước đợt chào bán trái phiếu (nếu có), trừ trường hợp chào bán trái phiếu cho các chủ nợ là tổ chức tài chính được lựa chọn;"},{"k":"p","t":"b) Có báo cáo tài chính của năm trước liền kề năm phát hành được kiểm toán;"},{"k":"p","t":"c) Bảo đảm điều kiện về tỷ lệ an toàn tài chính, tỷ lệ bảo đảm an toàn trong hoạt động theo quy định pháp luật;"},{"k":"p","t":"d) Điều kiện khác theo quy định của pháp luật có liên quan."}]},{"id":"luat-59_129","no":129,"code":"Điều 129","title":"Điều 129. Trình tự, thủ tục chào bán và chuyển nhượng trái phiếu riêng lẻ","shortTitle":"Trình tự, thủ tục chào bán và chuyển nhượng trái phiếu riêng lẻ","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty quyết định phương án chào bán trái phiếu riêng lẻ theo quy định của Luật này."},{"k":"p","t":"2. Công ty công bố thông tin trước mỗi đợt chào bán cho nhà đầu tư đăng ký mua trái phiếu và thông báo đợt chào bán cho sở giao dịch chứng khoán ít nhất 01 ngày làm việc trước ngày dự kiến tổ chức đợt chào bán trái phiếu."},{"k":"p","t":"3. Công ty công bố thông tin về kết quả của đợt chào bán cho các nhà đầu tư đã mua trái phiếu và thông báo kết quả đợt chào bán đến sở giao dịch chứng khoán trong thời hạn 10 ngày kể từ ngày kết thúc đợt chào bán trái phiếu."},{"k":"p","t":"4. Trái phiếu phát hành riêng lẻ được chuyển nhượng giữa các nhà đầu tư đáp ứng điều kiện về đối tượng mua trái phiếu riêng lẻ quy định tại khoản 2 Điều 128 của Luật này, trừ trường hợp thực hiện theo bản án, quyết định của Tòa án đã có hiệu lực pháp luật, phán quyết của Trọng tài có hiệu lực hoặc thừa kế theo quy định pháp luật."},{"k":"p","t":"5. Căn cứ quy định của Luật này và Luật Chứng khoán, Chính phủ quy định chi tiết về loại trái phiếu, hồ sơ, trình tự, thủ tục phát hành và giao dịch trái phiếu riêng lẻ; công bố thông tin; phát hành trái phiếu ra thị trường quốc tế."}]},{"id":"luat-59_130","no":130,"code":"Điều 130","title":"Điều 130. Quyết định chào bán trái phiếu riêng lẻ","shortTitle":"Quyết định chào bán trái phiếu riêng lẻ","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty quyết định chào bán trái phiếu riêng lẻ theo quy định sau đây:"},{"k":"p","t":"a) Đại hội đồng cổ đông quyết định về loại, tổng giá trị trái phiếu và thời điểm chào bán đối với trái phiếu chuyển đổi và trái phiếu kèm theo chứng quyền. Việc biểu quyết thông qua nghị quyết về chào bán trái phiếu riêng lẻ của công ty được thực hiện theo quy định tại Điều 148 của Luật này;"},{"k":"p","t":"b) Trường hợp Điều lệ công ty không quy định khác và trừ trường hợp quy định tại điểm a khoản này, Hội đồng quản trị có quyền quyết định loại trái phiếu, tổng giá trị trái phiếu và thời điểm chào bán, nhưng phải báo cáo Đại hội đồng cổ đông tại cuộc họp gần nhất. Báo cáo phải kèm theo tài liệu và hồ sơ về chào bán trái phiếu."},{"k":"p","t":"2. Công ty thực hiện đăng ký thay đổi vốn điều lệ trong thời hạn 10 ngày kể từ ngày hoàn thành việc chuyển đổi trái phiếu thành cổ phần."}]},{"id":"luat-59_131","no":131,"code":"Điều 131","title":"Điều 131. Mua cổ phần, trái phiếu","shortTitle":"Mua cổ phần, trái phiếu","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Cổ phần, trái phiếu của công ty cổ phần có thể được mua bằng Đồng Việt Nam, ngoại tệ tự do chuyển đổi, vàng, quyền sử dụng đất, quyền sở hữu trí tuệ, công nghệ, bí quyết kỹ thuật, tài sản khác quy định tại Điều lệ công ty và phải được thanh toán đủ một lần."}]},{"id":"luat-59_132","no":132,"code":"Điều 132","title":"Điều 132. Mua lại cổ phần theo yêu cầu của cổ đông","shortTitle":"Mua lại cổ phần theo yêu cầu của cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ đông đã biểu quyết không thông qua nghị quyết về việc tổ chức lại công ty hoặc thay đổi quyền, nghĩa vụ của cổ đông quy định tại Điều lệ công ty có quyền yêu cầu công ty mua lại cổ phần của mình. Yêu cầu phải bằng văn bản, trong đó nêu rõ tên, địa chỉ của cổ đông, số lượng cổ phần từng loại, giá dự định bán, lý do yêu cầu công ty mua lại. Yêu cầu phải được gửi đến công ty trong thời hạn 10 ngày kể từ ngày Đại hội đồng cổ đông thông qua nghị quyết về các vấn đề quy định tại khoản này."},{"k":"p","t":"2. Công ty phải mua lại cổ phần theo yêu cầu của cổ đông quy định tại khoản 1 Điều này với giá thị trường hoặc giá được tính theo nguyên tắc quy định tại Điều lệ công ty trong thời hạn 90 ngày kể từ ngày nhận được yêu cầu. Trường hợp không thỏa thuận được về giá thì các bên có thể yêu cầu một tổ chức thẩm định giá định giá. Công ty giới thiệu ít nhất 03 tổ chức thẩm định giá để cổ đông lựa chọn và lựa chọn đó là quyết định cuối cùng."}]},{"id":"luat-59_133","no":133,"code":"Điều 133","title":"Điều 133. Mua lại cổ phần theo quyết định của công ty","shortTitle":"Mua lại cổ phần theo quyết định của công ty","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Công ty có quyền mua lại không quá 30% tổng số cổ phần phổ thông đã bán, một phần hoặc toàn bộ cổ phần ưu đãi cổ tức đã bán theo quy định sau đây:"},{"k":"p","t":"1. Hội đồng quản trị có quyền quyết định mua lại không quá 10% tổng số cổ phần của từng loại đã bán trong thời hạn 12 tháng. Trường hợp khác, việc mua lại cổ phần do Đại hội đồng cổ đông quyết định;"},{"k":"p","t":"2. Hội đồng quản trị quyết định giá mua lại cổ phần. Đối với cổ phần phổ thông, giá mua lại không được cao hơn giá thị trường tại thời điểm mua lại, trừ trường hợp quy định tại khoản 3 Điều này. Đối với cổ phần loại khác, nếu Điều lệ công ty không quy định hoặc công ty và cổ đông có liên quan không có thỏa thuận khác thì giá mua lại không được thấp hơn giá thị trường;"},{"k":"p","t":"3. Công ty có thể mua lại cổ phần của từng cổ đông tương ứng với tỷ lệ sở hữu cổ phần của họ trong công ty theo trình tự, thủ tục sau đây:"},{"k":"p","t":"a) Quyết định mua lại cổ phần của công ty phải được thông báo bằng phương thức để bảo đảm đến được tất cả cổ đông trong thời hạn 30 ngày kể từ ngày quyết định đó được thông qua. Thông báo phải gồm tên, địa chỉ trụ sở chính của công ty, tổng số cổ phần và loại cổ phần được mua lại, giá mua lại hoặc nguyên tắc định giá mua lại, thủ tục và thời hạn thanh toán, thủ tục và thời hạn để cổ đông bán cổ phần của họ cho công ty;"},{"k":"p","t":"b) Cổ đông đồng ý bán lại cổ phần phải gửi văn bản đồng ý bán cổ phần của mình bằng phương thức để bảo đảm đến được công ty trong thời hạn 30 ngày kể từ ngày thông báo. Văn bản đồng ý bán cổ phần phải có họ, tên, địa chỉ liên lạc, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân; tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức; số cổ phần sở hữu và số cổ phần đồng ý bán; phương thức thanh toán; chữ ký của cổ đông hoặc người đại diện theo pháp luật của cổ đông. Công ty chỉ mua lại cổ phần trong thời hạn nêu trên."}]},{"id":"luat-59_134","no":134,"code":"Điều 134","title":"Điều 134. Điều kiện thanh toán và xử lý các cổ phần được mua lại","shortTitle":"Điều kiện thanh toán và xử lý các cổ phần được mua lại","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Công ty chỉ được thanh toán cổ phần được mua lại cho cổ đông theo quy định tại Điều 132 và Điều 133 của Luật này nếu ngay sau khi thanh toán hết số cổ phần được mua lại, công ty vẫn bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác."},{"k":"p","t":"2. Cổ phần được mua lại theo quy định tại Điều 132 và Điều 133 của Luật này được coi là cổ phần chưa bán theo quy định tại khoản 4 Điều 112 của Luật này. Công ty phải đăng ký giảm vốn điều lệ tương ứng với tổng mệnh giá các cổ phần được công ty mua lại trong thời hạn 10 ngày kể từ ngày hoàn thành việc thanh toán mua lại cổ phần, trừ trường hợp pháp luật về chứng khoán có quy định khác."},{"k":"p","t":"3. Cổ phiếu xác nhận quyền sở hữu cổ phần đã được mua lại phải được tiêu hủy ngay sau khi cổ phần tương ứng đã được thanh toán đủ. Chủ tịch Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc phải liên đới chịu trách nhiệm về thiệt hại do không tiêu hủy hoặc chậm tiêu hủy cổ phiếu."},{"k":"p","t":"4. Sau khi thanh toán hết số cổ phần được mua lại, nếu tổng giá trị tài sản được ghi trong sổ kế toán của công ty giảm hơn 10% thì công ty phải thông báo cho tất cả chủ nợ biết trong thời hạn 15 ngày kể từ ngày thanh toán hết số cổ phần được mua lại."}]},{"id":"luat-59_135","no":135,"code":"Điều 135","title":"Điều 135. Trả cổ tức","shortTitle":"Trả cổ tức","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Cổ tức trả cho cổ phần ưu đãi được thực hiện theo điều kiện áp dụng riêng cho mỗi loại cổ phần ưu đãi."},{"k":"p","t":"2. Cổ tức trả cho cổ phần phổ thông được xác định căn cứ vào số lợi nhuận ròng đã thực hiện và khoản chi trả cổ tức được trích từ nguồn lợi nhuận giữ lại của công ty. Công ty cổ phần chỉ được trả cổ tức của cổ phần phổ thông khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Công ty đã hoàn thành nghĩa vụ thuế và các nghĩa vụ tài chính khác theo quy định của pháp luật;"},{"k":"p","t":"b) Đã trích lập các quỹ công ty và bù đắp lỗ trước đó theo quy định của pháp luật và Điều lệ công ty;"},{"k":"p","t":"c) Ngay sau khi trả hết số cổ tức, công ty vẫn bảo đảm thanh toán đủ các khoản nợ và nghĩa vụ tài sản khác đến hạn."},{"k":"p","t":"3. Cổ tức có thể được chi trả bằng tiền mặt, bằng cổ phần của công ty hoặc bằng tài sản khác quy định tại Điều lệ công ty. Nếu chi trả bằng tiền mặt thì phải được thực hiện bằng Đồng Việt Nam và theo các phương thức thanh toán theo quy định của pháp luật."},{"k":"p","t":"4. Cổ tức phải được thanh toán đầy đủ trong thời hạn 06 tháng kể từ ngày kết thúc họp Đại hội đồng cổ đông thường niên. Hội đồng quản trị lập danh sách cổ đông được nhận cổ tức, xác định mức cổ tức được trả đối với từng cổ phần, thời hạn và hình thức trả chậm nhất là 30 ngày trước mỗi lần trả cổ tức. Thông báo về trả cổ tức được gửi bằng phương thức để bảo đảm đến cổ đông theo địa chỉ đăng ký trong sổ đăng ký cổ đông chậm nhất là 15 ngày trước khi thực hiện trả cổ tức. Thông báo phải bao gồm các nội dung sau đây:"},{"k":"p","t":"a) Tên công ty và địa chỉ trụ sở chính của công ty;"},{"k":"p","t":"b) Họ, tên, địa chỉ liên lạc, quốc tịch, số giấy tờ pháp lý của cá nhân đối với cổ đông là cá nhân;"},{"k":"p","t":"c) Tên, mã số doanh nghiệp hoặc số giấy tờ pháp lý của tổ chức, địa chỉ trụ sở chính đối với cổ đông là tổ chức;"},{"k":"p","t":"d) Số lượng cổ phần từng loại của cổ đông; mức cổ tức đối với từng cổ phần và tổng số cổ tức mà cổ đông đó được nhận;"},{"k":"p","t":"đ) Thời điểm và phương thức trả cổ tức;"},{"k":"p","t":"e) Họ, tên, chữ ký của Chủ tịch Hội đồng quản trị và người đại diện theo pháp luật của công ty."},{"k":"p","t":"5. Trường hợp cổ đông chuyển nhượng cổ phần của mình trong thời gian giữa thời điểm kết thúc lập danh sách cổ đông và thời điểm trả cổ tức thì người chuyển nhượng là người nhận cổ tức từ công ty."},{"k":"p","t":"6. Trường hợp chi trả cổ tức bằng cổ phần, công ty không phải làm thủ tục chào bán cổ phần theo quy định tại các điều 123, 124 và 125 của Luật này. Công ty phải đăng ký tăng vốn điều lệ tương ứng với tổng mệnh giá các cổ phần dùng để chi trả cổ tức trong thời hạn 10 ngày kể từ ngày hoàn thành việc thanh toán cổ tức."}]},{"id":"luat-59_136","no":136,"code":"Điều 136","title":"Điều 136. Thu hồi tiền thanh toán cổ phần được mua lại hoặc cổ tức","shortTitle":"Thu hồi tiền thanh toán cổ phần được mua lại hoặc cổ tức","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp việc thanh toán cổ phần được mua lại trái với quy định tại khoản 1 Điều 134 của Luật này hoặc trả cổ tức trái với quy định tại Điều 135 của Luật này, cổ đông phải hoàn trả cho công ty số tiền, tài sản khác đã nhận; trường hợp cổ đông không hoàn trả được cho công ty thì tất cả thành viên Hội đồng quản trị phải cùng liên đới chịu trách nhiệm về các khoản nợ và nghĩa vụ tài sản khác của công ty trong phạm vi giá trị số tiền, tài sản đã trả cho cổ đông mà chưa được hoàn lại."}]},{"id":"luat-59_137","no":137,"code":"Điều 137","title":"Điều 137. Cơ cấu tổ chức quản lý công ty cổ phần","shortTitle":"Cơ cấu tổ chức quản lý công ty cổ phần","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Trừ trường hợp pháp luật về chứng khoán có quy định khác, công ty cổ phần có quyền lựa chọn tổ chức quản lý và hoạt động theo một trong hai mô hình sau đây:"},{"k":"p","t":"a) Đại hội đồng cổ đông, Hội đồng quản trị, Ban kiểm soát và Giám đốc hoặc Tổng giám đốc. Trường hợp công ty cổ phần có dưới 11 cổ đông và các cổ đông là tổ chức sở hữu dưới 50% tổng số cổ phần của công ty thì không bắt buộc phải có Ban kiểm soát;"},{"k":"p","t":"b) Đại hội đồng cổ đông, Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc. Trường hợp này ít nhất 20% số thành viên Hội đồng quản trị phải là thành viên độc lập và có Ủy ban kiểm toán trực thuộc Hội đồng quản trị. Cơ cấu tổ chức, chức năng, nhiệm vụ của Ủy ban kiểm toán quy định tại Điều lệ công ty hoặc quy chế hoạt động của Ủy ban kiểm toán do Hội đồng quản trị ban hành."},{"k":"p","t":"2. Trường hợp công ty chỉ có một người đại diện theo pháp luật thì Chủ tịch Hội đồng quản trị hoặc Giám đốc hoặc Tổng giám đốc là người đại diện theo pháp luật của công ty. Trường hợp Điều lệ chưa có quy định thì Chủ tịch Hội đồng quản trị là người đại diện theo pháp luật của công ty. Trường hợp công ty có hơn một người đại diện theo pháp luật thì Chủ tịch Hội đồng quản trị và Giám đốc hoặc Tổng giám đốc đương nhiên là người đại diện theo pháp luật của công ty."}]},{"id":"luat-59_138","no":138,"code":"Điều 138","title":"Điều 138. Quyền và nghĩa vụ của Đại hội đồng cổ đông","shortTitle":"Quyền và nghĩa vụ của Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Đại hội đồng cổ đông gồm tất cả cổ đông có quyền biểu quyết, là cơ quan quyết định cao nhất của công ty cổ phần."},{"k":"p","t":"2. Đại hội đồng cổ đông có quyền và nghĩa vụ sau đây:"},{"k":"p","t":"a) Thông qua định hướng phát triển của công ty;"},{"k":"p","t":"b) Quyết định loại cổ phần và tổng số cổ phần của từng loại được quyền chào bán; quyết định mức cổ tức hằng năm của từng loại cổ phần;"},{"k":"p","t":"c) Bầu, miễn nhiệm, bãi nhiệm thành viên Hội đồng quản trị, Kiểm soát viên;"},{"k":"p","t":"d) Quyết định đầu tư hoặc bán số tài sản có giá trị từ 35% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty, trừ trường hợp Điều lệ công ty quy định một tỷ lệ hoặc một giá trị khác;"},{"k":"p","t":"đ) Quyết định sửa đổi, bổ sung Điều lệ công ty;"},{"k":"p","t":"e) Thông qua báo cáo tài chính hằng năm;"},{"k":"p","t":"g) Quyết định mua lại trên 10% tổng số cổ phần đã bán của mỗi loại;"},{"k":"p","t":"h) Xem xét, xử lý vi phạm của thành viên Hội đồng quản trị, Kiểm soát viên gây thiệt hại cho công ty và cổ đông công ty;"},{"k":"p","t":"i) Quyết định tổ chức lại, giải thể công ty;"},{"k":"p","t":"k) Quyết định ngân sách hoặc tổng mức thù lao, thưởng và lợi ích khác cho Hội đồng quản trị, Ban kiểm soát;"},{"k":"p","t":"l) Phê duyệt quy chế quản trị nội bộ; quy chế hoạt động Hội đồng quản trị, Ban kiểm soát;"},{"k":"p","t":"m) Phê duyệt danh sách công ty kiểm toán độc lập; quyết định công ty kiểm toán độc lập thực hiện kiểm tra hoạt động của công ty, bãi miễn kiểm toán viên độc lập khi xét thấy cần thiết;"},{"k":"p","t":"n) Quyền và nghĩa vụ khác theo quy định của Luật này và Điều lệ công ty."}]},{"id":"luat-59_139","no":139,"code":"Điều 139","title":"Điều 139. Cuộc họp Đại hội đồng cổ đông","shortTitle":"Cuộc họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Đại hội đồng cổ đông họp thường niên mỗi năm một lần. Ngoài cuộc họp thường niên, Đại hội đồng cổ đông có thể họp bất thường. Địa điểm họp Đại hội đồng cổ đông được xác định là nơi chủ tọa tham dự họp và phải ở trên lãnh thổ Việt Nam."},{"k":"p","t":"2. Đại hội đồng cổ đông phải họp thường niên trong thời hạn 04 tháng kể từ ngày kết thúc năm tài chính. Trừ trường hợp Điều lệ công ty có quy định khác, Hội đồng quản trị quyết định gia hạn họp Đại hội đồng cổ đông thường niên trong trường hợp cần thiết, nhưng không quá 06 tháng kể từ ngày kết thúc năm tài chính."},{"k":"p","t":"3. Đại hội đồng cổ đông thường niên thảo luận và thông qua các vấn đề sau đây:"},{"k":"p","t":"a) Kế hoạch kinh doanh hằng năm của công ty;"},{"k":"p","t":"b) Báo cáo tài chính hằng năm;"},{"k":"p","t":"c) Báo cáo của Hội đồng quản trị về quản trị và kết quả hoạt động của Hội đồng quản trị và từng thành viên Hội đồng quản trị;"},{"k":"p","t":"d) Báo cáo của Ban kiểm soát về kết quả kinh doanh của công ty, kết quả hoạt động của Hội đồng quản trị, Giám đốc hoặc Tổng giám đốc;"},{"k":"p","t":"đ) Báo cáo tự đánh giá kết quả hoạt động của Ban kiểm soát và Kiểm soát viên;"},{"k":"p","t":"e) Mức cổ tức đối với mỗi cổ phần của từng loại;"},{"k":"p","t":"g) Vấn đề khác thuộc thẩm quyền."}]},{"id":"luat-59_140","no":140,"code":"Điều 140","title":"Điều 140. Triệu tập họp Đại hội đồng cổ đông","shortTitle":"Triệu tập họp Đại hội đồng cổ đông","chuong":"Chương V — CÔNG TY CỔ PHẦN","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng quản trị triệu tập họp Đại hội đồng cổ đông thường niên và bất thường. Hội đồng quản trị triệu tập họp bất thường Đại hội đồng cổ đông trong trường hợp sau đây:"},{"k":"p","t":"a) Hội đồng quản trị xét thấy cần thiết vì lợi ích của công ty;"},{"k":"p","t":"b) Số lượng thành viên Hội đồng quản trị, Ban kiểm soát còn lại ít hơn số lượng thành viên tối thiểu theo quy định của pháp luật;"},{"k":"p","t":"c) Theo yêu cầu của cổ đông hoặc nhóm cổ đông quy định tại khoản 2 Điều 115 của Luật này;"},{"k":"p","t":"d) Theo yêu cầu của Ban kiểm soát;"},{"k":"p","t":"đ) Trường hợp khác theo quy định của pháp luật và Điều lệ công ty."},{"k":"p","t":"2. Trừ trường hợp Điều lệ công ty có quy định khác, Hội đồng quản trị phải triệu tập họp Đại hội đồng cổ đông trong thời hạn 30 ngày kể từ ngày xảy ra trường hợp quy định tại điểm b khoản 1 Điều này hoặc nhận được yêu cầu triệu tập họp quy định tại điểm c và điểm d khoản 1 Điều này. Trường hợp Hội đồng quản trị không triệu tập họp Đại hội đồng cổ đông theo quy định thì Chủ tịch Hội
