<script id="LD" type="application/json">{"meta":{"title":"Thông tư 103/2014/TT-BTC — Hướng dẫn thực hiện nghĩa vụ thuế áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam hoặc có thu nhập tại Việt Nam","shortCode":"TT 103/2014","subtitle":"Thuế nhà thầu nước ngoài (FCT)","slug":"tt103","effectiveDate":"01/10/2014","scope":"","description":"Thuế nhà thầu nước ngoài (FCT)","related":[]},"outline":[{"id":"tt103_1","no":1,"code":"Điều 1","title":"Điều 1. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Hướng dẫn tại Thông tư này áp dụng đối với các đối tượng sau (trừ trường hợp nêu tại Điều 2 Chương I):"},{"k":"p","t":"1. Tổ chức nước ngoài kinh doanh có cơ sở thường trú tại Việt Nam hoặc không có cơ sở thường trú tại Việt Nam; cá nhân nước ngoài kinh doanh là đối tượng cư trú tại Việt Nam hoặc không là đối tượng cư trú tại Việt Nam (sau đây gọi chung là Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài) kinh doanh tại Việt Nam hoặc có thu nhập phát sinh tại Việt Nam trên cơ sở hợp đồng, thỏa thuận, hoặc cam kết giữa Nhà thầu nước ngoài với tổ chức, cá nhân Việt Nam hoặc giữa Nhà thầu nước ngoài với Nhà thầu phụ nước ngoài để thực hiện một phần công việc của Hợp đồng nhà thầu."},{"k":"p","t":"2. Tổ chức, cá nhân nước ngoài cung cấp hàng hóa tại Việt Nam theo hình thức xuất nhập khẩu tại chỗ và có phát sinh thu nhập tại Việt Nam trên cơ sở Hợp đồng ký giữa tổ chức, cá nhân nước ngoài với các doanh nghiệp tại Việt Nam (trừ trường hợp gia công và xuất trả hàng hóa cho tổ chức, cá nhân nước ngoài) hoặc thực hiện phân phối hàng hóa tại Việt Nam hoặc cung cấp hàng hóa theo điều kiện giao hàng của các điều khoản thương mại quốc tế - Incoterms mà người bán chịu rủi ro liên quan đến hàng hóa vào đến lãnh thổ Việt Nam."},{"k":"p","t":"Ví dụ 1:"},{"k":"p","t":"- Trường hợp 1: doanh nghiệp X ở nước ngoài ký hợp đồng mua vải của doanh nghiệp Việt Nam A, đồng thời chỉ định doanh nghiệp A giao hàng cho doanh nghiệp Việt Nam B (theo hình thức xuất nhập khẩu tại chỗ theo quy định của pháp luật). Doanh nghiệp X có thu nhập phát sinh tại Việt Nam trên cơ sở hợp đồng ký giữa doanh nghiệp X với doanh nghiệp B (doanh nghiệp X bán vải cho doanh nghiệp B)."},{"k":"p","t":"Trong trường hợp này, doanh nghiệp X là đối tượng áp dụng theo quy định tại Thông tư này và doanh nghiệp B có trách nhiệm khai, khấu trừ và nộp thuế thay cho doanh nghiệp X theo quy định tại Thông tư này."},{"k":"p","t":"- Trường hợp 2: doanh nghiệp Y ở nước ngoài ký hợp đồng gia công vải với doanh nghiệp Việt Nam C, đồng thời chỉ định doanh nghiệp C giao hàng cho doanh nghiệp Việt Nam D để tiếp tục sản xuất (theo hình thức xuất nhập khẩu tại chỗ theo quy định của pháp luật). Doanh nghiệp Y có thu nhập phát sinh tại Việt Nam trên cơ sở hợp đồng ký giữa doanh nghiệp Y với doanh nghiệp D (doanh nghiệp Y bán hàng cho doanh nghiệp D)."},{"k":"p","t":"Trong trường hợp này, doanh nghiệp Y là đối tượng áp dụng theo quy định tại Thông tư này và doanh nghiệp D có trách nhiệm khai, khấu trừ và nộp thuế thay cho doanh nghiệp Y theo quy định tại Thông tư này."},{"k":"p","t":"- Trường hợp 3: doanh nghiệp Z ở nước ngoài ký hợp đồng gia công hoặc mua vải với doanh nghiệp Việt Nam E (doanh nghiệp Z cung cấp nguyên vật liệu cho doanh nghiệp E để gia công) và chỉ định doanh nghiệp E giao hàng cho doanh nghiệp Việt Nam G để tiếp tục gia công (theo hình thức gia công xuất nhập khẩu tại chỗ theo quy định của pháp luật). Sau khi gia công xong, Doanh nghiệp G xuất trả lại hàng cho Doanh nghiệp Z và Doanh nghiệp Z phải thanh toán tiền gia công cho doanh nghiệp G theo hợp đồng gia công."},{"k":"p","t":"Trong trường hợp này, doanh nghiệp Z không thuộc đối tượng áp dụng theo quy định tại Thông tư này."},{"k":"p","t":"3. Tổ chức, cá nhân nước ngoài thực hiện một phần hoặc toàn bộ hoạt động kinh doanh phân phối hàng hóa, cung cấp dịch vụ tại Việt Nam trong đó tổ chức, cá nhân nước ngoài vẫn là chủ sở hữu đối với hàng hóa giao cho tổ chức Việt Nam hoặc chịu trách nhiệm về chi phí phân phối, quảng cáo, tiếp thị, chất lượng dịch vụ, chất lượng hàng hóa giao cho tổ chức Việt Nam hoặc ấn định giá bán hàng hóa hoặc giá cung ứng dịch vụ; bao gồm cả trường hợp uỷ quyền hoặc thuê một số tổ chức Việt Nam thực hiện một phần dịch vụ phân phối, dịch vụ khác liên quan đến việc bán hàng hóa tại Việt Nam."},{"k":"p","t":"Ví dụ 2:"},{"k":"p","t":"Doanh nghiệp A ở nước ngoài giao hàng hóa hoặc uỷ quyền thực hiện một số dịch vụ liên quan (như vận chuyển, phân phối, tiếp thị, quảng cáo...) cho Doanh nghiệp Việt Nam B trong đó Doanh nghiệp A là chủ sở hữu đối với hàng hóa giao cho Doanh nghiệp B hoặc Doanh nghiệp A chịu trách nhiệm về chi phí, chất lượng dịch vụ, chất lượng hàng hóa giao cho Doanh nghiệp B hoặc Doanh nghiệp A ấn định giá bán hàng hóa hoặc giá cung ứng dịch vụ thì Doanh nghiệp A là đối tượng áp dụng theo quy định tại Thông tư này."},{"k":"p","t":"4. Tổ chức, cá nhân nước ngoài thông qua tổ chức, cá nhân Việt Nam để thực hiện việc đàm phán, ký kết các hợp đồng đứng tên tổ chức, cá nhân nước ngoài."},{"k":"p","t":"5. Tổ chức, cá nhân nước ngoài thực hiện quyền xuất khẩu, quyền nhập khẩu, phân phối tại thị trường Việt Nam, mua hàng hóa để xuất khẩu, bán hàng hóa cho thương nhân Việt Nam theo pháp luật về thương mại."}]},{"id":"tt103_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng không áp dụng","shortTitle":"Đối tượng không áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Hướng dẫn tại Thông tư này không áp dụng đối với:"},{"k":"p","t":"1. Tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam theo quy định của Luật Đầu tư, Luật Dầu khí, Luật các Tổ chức tín dụng."},{"k":"p","t":"2. Tổ chức, cá nhân nước ngoài thực hiện cung cấp hàng hóa cho tổ chức, cá nhân Việt Nam không kèm theo các dịch vụ được thực hiện tại Việt Nam dưới các hình thức:"},{"k":"p","t":"- Giao hàng tại cửa khẩu nước ngoài: người bán chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc xuất khẩu hàng và giao hàng tại cửa khẩu nước ngoài; người mua chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu nước ngoài về đến Việt Nam (kể cả trường hợp giao hàng tại cửa khẩu nước ngoài có kèm điều khoản bảo hành là trách nhiệm và nghĩa vụ của người bán)."},{"k":"p","t":"- Giao hàng tại cửa khẩu Việt Nam: người bán chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến hàng hóa cho đến điểm giao hàng tại cửa khẩu Việt Nam; người mua chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu Việt Nam (kể cả trường hợp giao hàng tại cửa khẩu Việt Nam có kèm điều khoản bảo hành là trách nhiệm và nghĩa vụ của người bán)."},{"k":"p","t":"Ví dụ 3:"},{"k":"p","t":"Công ty C ở Việt Nam ký hợp đồng nhập khẩu lô hàng máy xúc, máy ủi với Công ty D ở nước ngoài, việc giao hàng được thực hiện tại cửa khẩu Việt Nam. Công ty D chịu mọi trách nhiệm, chi phí liên quan đến lô hàng cho đến điểm giao hàng tại cửa khẩu Việt Nam; Công ty C chịu trách nhiệm, chi phí liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu Việt Nam. Hợp đồng có thỏa thuận lô hàng trên được Công ty D bảo hành trong 1 năm, ngoài ra Công ty D không thực hiện bất kỳ dịch vụ nào khác tại Việt Nam liên quan đến lô hàng trên. Trường hợp này, hoạt động cung cấp hàng hóa của Công ty D thuộc đối tượng không áp dụng của Thông tư."},{"k":"p","t":"3. Tổ chức, cá nhân nước ngoài có thu nhập từ dịch vụ được cung cấp và tiêu dùng ngoài Việt Nam."},{"k":"p","t":"Ví dụ 4:"},{"k":"p","t":"Công ty H của Hongkong cung cấp dịch vụ thu xếp hàng hóa tại cảng ở Hongkong cho đội tàu vận tải quốc tế của Công ty A ở Việt Nam. Công ty A phải trả cho Công ty H phí dịch vụ thu xếp hàng hóa tại cảng ở Hongkong."},{"k":"p","t":"Trong trường hợp này, dịch vụ thu xếp hàng hóa tại cảng Hongkong là dịch vụ được cung cấp và tiêu dùng tại Hongkong nên không thuộc đối tượng chịu thuế tại Việt Nam."},{"k":"p","t":"Ví dụ 5:"},{"k":"p","t":"Tổ chức nước ngoài cung cấp các dịch vụ chuyên môn, quản lý và phát hành trái phiếu, tư vấn pháp lý, đại lý lưu ký, tổ chức roadshow (một hoạt động thuộc mảng kích hoạt thương hiệu) cho Công ty A ở Việt Nam tại các nước mà Công ty A phát hành chứng chỉ GDR (Global Depositary Receipt - chứng chỉ lưu ký toàn cầu) và trái phiếu quốc tế thì các dịch vụ này do tổ chức nước ngoài thực hiện không thuộc đối tượng áp dụng của Thông tư."},{"k":"p","t":"4. Tổ chức, cá nhân nước ngoài thực hiện cung cấp dịch vụ dưới đây cho tổ chức, cá nhân Việt Nam mà các dịch vụ được thực hiện ở nước ngoài:"},{"k":"p","t":"- Sửa chữa phương tiện vận tải (tàu bay, động cơ tàu bay, phụ tùng tàu bay, tàu biển), máy móc, thiết bị (kể cả đường cáp biển, thiết bị truyền dẫn), có bao gồm hoặc không bao gồm vật tư, thiết bị thay thế kèm theo;"},{"k":"p","t":"- Quảng cáo, tiếp thị (trừ quảng cáo, tiếp thị trên internet);"},{"k":"p","t":"Ví dụ 6:"},{"k":"p","t":"Doanh nghiệp Việt Nam ký hợp đồng với tổ chức ở Singapore để thực hiện dịch vụ quảng cáo sản phẩm tại thị trường Singapore thì dịch vụ quảng cáo này của tổ chức Singapore không thuộc đối tượng áp dụng của Thông tư. Trường hợp tổ chức ở Singapore thực hiện quảng cáo sản phẩm để tiêu thụ tại thị trường Việt Nam trên internet thì thu nhập từ dịch vụ quảng cáo này thuộc đối tượng áp dụng của Thông tư."},{"k":"p","t":"- Xúc tiến đầu tư và thương mại;"},{"k":"p","t":"- Môi giới: bán hàng hóa, cung cấp dịch vụ ra nước ngoài;"},{"k":"p","t":"Ví dụ 7:"},{"k":"p","t":"Doanh nghiệp Việt Nam ký hợp đồng thuê doanh nghiệp ở Thái Lan thực hiện dịch vụ môi giới để bán sản phẩm của doanh nghiệp Việt Nam tại thị trường Thái Lan hoặc thị trường thế giới thì dịch vụ môi giới này của doanh nghiệp Thái Lan không thuộc đối tượng áp dụng của Thông tư; trường hợp doanh nghiệp Việt Nam ký hợp đồng thuê doanh nghiệp ở Thái Lan thực hiện dịch vụ môi giới để chuyển nhượng bất động sản của doanh nghiệp Việt Nam tại Việt Nam thì dịch vụ môi giới này thuộc đối tượng áp dụng của Thông tư."},{"k":"p","t":"- Đào tạo (trừ đào tạo trực tuyến);"},{"k":"p","t":"Ví dụ 8:"},{"k":"p","t":"Công ty A ở Việt Nam ký hợp đồng với Trường Đại học B của Singapore để nhân viên Việt Nam sang Singapore học tại Trường Đại học B của Singapore thì dịch vụ đào tạo của Trường Đại học B không thuộc đối tượng áp dụng của Thông tư; trường hợp Công ty A ở Việt Nam ký hợp đồng với Trường Đại học B của Singapore để trường Đại học B dạy học cho nhân viên Việt Nam tại Việt Nam theo hình thức học trực tuyến thì dịch vụ đào tạo trực tuyến của trường Đại học B thuộc đối tượng áp dụng của Thông tư."},{"k":"p","t":"- Chia cước (cước thanh toán) dịch vụ, viễn thông quốc tế giữa Việt Nam với nước ngoài mà các dịch vụ này được thực hiện ở ngoài Việt Nam, dịch vụ thuê đường truyền dẫn và băng tần vệ tinh của nước ngoài theo quy định của Luật Viễn thông; Chia cước (cước thanh toán) dịch vụ bưu chính quốc tế giữa Việt Nam với nước ngoài theo quy định của Luật Bưu chính, các điều ước quốc tế về Bưu chính mà nước Cộng hòa xã hội chủ nghĩa Việt Nam tham gia ký kết mà các dịch vụ này được thực hiện ở ngoài Việt Nam."},{"k":"p","t":"5. Tổ chức, cá nhân nước ngoài sử dụng kho ngoại quan, cảng nội địa (ICD) làm kho hàng hóa để phụ trợ cho hoạt động vận tải quốc tế, quá cảnh, chuyển khẩu, lưu trữ hàng hoặc để cho doanh nghiệp khác gia công."}]},{"id":"tt103_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Thông tư này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. \"Hợp đồng nhà thầu\" là hợp đồng, thỏa thuận hoặc cam kết giữa Nhà thầu nước ngoài và Bên Việt Nam."},{"k":"p","t":"2. \"Hợp đồng nhà thầu phụ\" là hợp đồng, thỏa thuận hoặc cam kết giữa Nhà thầu phụ và Nhà thầu nước ngoài."},{"k":"p","t":"Nhà thầu phụ gồm Nhà thầu phụ nước ngoài và Nhà thầu phụ Việt Nam."},{"k":"p","t":"3. Lãnh thổ Việt Nam bao gồm lãnh thổ đất liền, các hải đảo, nội thủy, lãnh hải và vùng trời phía trên đó, vùng biển ngoài lãnh hải, bao gồm cả đáy biển và lòng đất dưới đáy biển mà Việt Nam thực hiện chủ quyền, quyền chủ quyền và quyền tài phán phù hợp với pháp luật Việt Nam và luật pháp quốc tế."}]},{"id":"tt103_4","no":4,"code":"Điều 4","title":"Điều 4. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài đảm bảo các điều kiện quy định tại Điều 8 Mục 2 Chương II hoặc Điều 14 Mục 4 Chương II, kinh doanh tại Việt Nam hoặc có thu nhập tại Việt Nam. Việc kinh doanh được tiến hành trên cơ sở hợp đồng nhà thầu với tổ chức, cá nhân Việt Nam hoặc với tổ chức, cá nhân nước ngoài khác đang hoạt động kinh doanh tại Việt Nam trên cơ sở hợp đồng nhà thầu phụ."},{"k":"p","t":"Việc xác định Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài có cơ sở thường trú tại Việt Nam, hoặc là đối tượng cư trú tại Việt Nam thực hiện theo quy định của Luật Thuế thu nhập doanh nghiệp, Luật Thuế thu nhập cá nhân và các văn bản hướng dẫn thi hành."},{"k":"p","t":"Trong trường hợp Hiệp định tránh đánh thuế hai lần mà nước Cộng hòa Xã hội Chủ nghĩa Việt Nam ký kết có quy định khác về cơ sở thường trú, đối tượng cư trú thì thực hiện theo quy định của Hiệp định đó."},{"k":"p","t":"2. Tổ chức được thành lập và hoạt động theo pháp luật Việt Nam, tổ chức đăng ký hoạt động theo pháp luật Việt Nam, tổ chức khác và cá nhân sản xuất kinh doanh: mua dịch vụ, dịch vụ gắn với hàng hóa hoặc trả thu nhập phát sinh tại Việt Nam trên cơ sở hợp đồng nhà thầu hoặc hợp đồng nhà thầu phụ; mua hàng hóa theo hình thức xuất nhập khẩu tại chỗ hoặc theo các điều khoản thương mại quốc tế (Incoterms); thực hiện phân phối hàng hóa, cung cấp dịch vụ thay cho tổ chức, cá nhân nước ngoài tại Việt Nam (sau đây gọi chung là Bên Việt Nam) bao gồm:"},{"k":"p","t":"- Các tổ chức kinh doanh được thành lập theo Luật Doanh nghiệp, Luật Đầu tư và Luật Hợp tác xã;"},{"k":"p","t":"- Các tổ chức kinh tế của các tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức xã hội, tổ chức xã hội - nghề nghiệp, đơn vị vũ trang, tổ chức sự nghiệp và các tổ chức khác;"},{"k":"p","t":"- Nhà thầu dầu khí hoạt động theo Luật Dầu khí;"},{"k":"p","t":"- Chi nhánh của Công ty nước ngoài được phép hoạt động tại Việt Nam;"},{"k":"p","t":"- Tổ chức nước ngoài hoặc đại diện của tổ chức nước ngoài được phép hoạt động tại Việt Nam;"},{"k":"p","t":"- Văn phòng bán vé, đại lý tại Việt Nam của Hãng hàng không nước ngoài có quyền vận chuyển đi, đến Việt Nam, trực tiếp vận chuyển hoặc liên danh;"},{"k":"p","t":"- Tổ chức, cá nhân kinh doanh dịch vụ vận tải biển của hãng vận tải biển nước ngoài; đại lý tại Việt Nam của Hãng giao nhận kho vận, hãng chuyển phát nước ngoài;"},{"k":"p","t":"- Công ty chứng khoán, tổ chức phát hành chứng khoán, công ty quản lý quỹ, ngân hàng thương mại nơi quỹ đầu tư chứng khoán hoặc tổ chức nước ngoài mở tài khoản đầu tư chứng khoán;"},{"k":"p","t":"- Các tổ chức khác ở Việt Nam;"},{"k":"p","t":"- Các cá nhân sản xuất kinh doanh tại Việt Nam."},{"k":"p","t":"Người nộp thuế theo hướng dẫn tại khoản 2 Điều 4 Chương I có trách nhiệm khấu trừ số thuế giá trị gia tăng, thuế thu nhập doanh nghiệp hướng dẫn tại Mục 3 Chương II trước khi thanh toán cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài."}]},{"id":"tt103_5","no":5,"code":"Điều 5","title":"Điều 5. Các loại thuế áp dụng","shortTitle":"Các loại thuế áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài là tổ chức kinh doanh thực hiện nghĩa vụ thuế giá trị gia tăng (GTGT), thuế thu nhập doanh nghiệp (TNDN) theo hướng dẫn tại Thông tư này."},{"k":"p","t":"2. Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài là cá nhân nước ngoài kinh doanh thực hiện nghĩa vụ thuế GTGT theo hướng dẫn tại Thông tư này, thuế thu nhập cá nhân (TNCN) theo pháp luật về thuế TNCN."},{"k":"p","t":"3. Đối với các loại thuế, phí và lệ phí khác, Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thực hiện theo các văn bản pháp luật về thuế, phí và lệ phí khác hiện hành."}]},{"id":"tt103_6","no":6,"code":"Điều 6","title":"Điều 6. Đối tượng chịu thuế GTGT","shortTitle":"Đối tượng chịu thuế GTGT","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1. ĐỐI TƯỢNG CHỊU THUẾ GTGT VÀ THU NHẬP CHỊU THUẾ TNDN","level":1,"content":[{"k":"p","t":"1. Dịch vụ hoặc dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế GTGT do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp trên cơ sở hợp đồng nhà thầu, hợp đồng nhà thầu phụ sử dụng cho sản xuất, kinh doanh và tiêu dùng tại Việt Nam (trừ trường hợp quy định tại Điều 2 Chương I), bao gồm:"},{"k":"p","t":"- Dịch vụ hoặc dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế GTGT do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp tại Việt Nam và tiêu dùng tại Việt Nam;"},{"k":"p","t":"- Dịch vụ hoặc dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế GTGT do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp ngoài Việt Nam và tiêu dùng tại Việt Nam."},{"k":"p","t":"2. Trường hợp hàng hóa được cung cấp theo hợp đồng dưới hình thức: điểm giao nhận hàng hóa nằm trong lãnh thổ Việt Nam (trừ trường hợp quy định tại khoản 5 Điều 2 Chương I); hoặc việc cung cấp hàng hóa có kèm theo dịch vụ tiến hành tại Việt Nam như lắp đặt, chạy thử, bảo hành, bảo dưỡng, thay thế, các dịch vụ khác đi kèm với việc cung cấp hàng hóa (bao gồm cả trường hợp dịch vụ kèm theo miễn phí), kể cả trường hợp việc cung cấp các dịch vụ nêu trên có hoặc không nằm trong giá trị của hợp đồng cung cấp hàng hóa thì giá trị hàng hóa chỉ phải chịu thuế GTGT khâu nhập khẩu theo quy định, phần giá trị dịch vụ thuộc đối tượng chịu thuế GTGT theo hướng dẫn tại Thông tư này. Trường hợp hợp đồng không tách riêng được giá trị hàng hóa và giá trị dịch vụ đi kèm (bao gồm cả trường hợp dịch vụ kèm theo miễn phí) thì thuế GTGT được tính chung cho cả hợp đồng."},{"k":"p","t":"Ví dụ 9:"},{"k":"p","t":"Doanh nghiệp A ở Việt Nam ký hợp đồng mua dây chuyền máy móc thiết bị cho Dự án Nhà máy xi măng với Doanh nghiệp B ở nước ngoài. Tổng giá trị Hợp đồng là 100 triệu USD, bao gồm giá trị máy móc thiết bị là 80 triệu USD (trong đó có thiết bị thuộc diện chịu thuế GTGT với thuế suất 10%), giá trị dịch vụ hướng dẫn lắp đặt, giám sát lắp đặt, bảo hành, bảo dưỡng là 20 triệu USD."},{"k":"p","t":"Việc xác định nghĩa vụ thuế GTGT của Công ty B đối với giá trị hợp đồng ký với doanh nghiệp A như sau:"},{"k":"p","t":"- Thuế GTGT được tính trên giá trị dịch vụ (20 triệu USD), không tính trên giá trị dây chuyền máy móc thiết bị nhập khẩu."},{"k":"p","t":"- Trường hợp Hợp đồng không tách riêng được giá trị dây chuyền máy móc thiết bị và giá trị dịch vụ thì thuế GTGT được tính trên toàn bộ giá trị hợp đồng (100 triệu USD)."}]},{"id":"tt103_7","no":7,"code":"Điều 7","title":"Điều 7. Thu nhập chịu thuế TNDN","shortTitle":"Thu nhập chịu thuế TNDN","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1. ĐỐI TƯỢNG CHỊU THUẾ GTGT VÀ THU NHẬP CHỊU THUẾ TNDN","level":1,"content":[{"k":"p","t":"1. Thu nhập chịu thuế TNDN của Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài là thu nhập phát sinh từ hoạt động cung cấp, phân phối hàng hóa; cung cấp dịch vụ, dịch vụ gắn với hàng hóa tại Việt Nam trên cơ sở hợp đồng nhà thầu, hợp đồng nhà thầu phụ (trừ trường hợp quy định tại Điều 2 Chương I)."},{"k":"p","t":"2. Trường hợp hàng hóa được cung cấp dưới hình thức: điểm giao nhận hàng hóa nằm trong lãnh thổ Việt Nam (trừ trường hợp quy định tại khoản 5 Điều 2 Chương I); hoặc việc cung cấp hàng hóa có kèm theo một số dịch vụ tiến hành tại Việt Nam như dịch vụ quảng cáo tiếp thị (marketing), hoạt động xúc tiến thương mại, dịch vụ sau bán hàng, dịch vụ lắp đặt, chạy thử, bảo hành, bảo dưỡng, thay thế và các dịch vụ khác đi kèm với việc cung cấp hàng hóa (bao gồm cả trường hợp dịch vụ kèm theo miễn phí), kể cả trường hợp việc cung cấp các dịch vụ nêu trên có hoặc không nằm trong giá trị của hợp đồng cung cấp hàng hóa thì thu nhập chịu thuế TNDN của Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài là toàn bộ giá trị hàng hóa, dịch vụ."},{"k":"p","t":"Ví dụ 10:"},{"k":"p","t":"Công ty A ở Việt Nam ký hợp đồng mua dây chuyền máy móc thiết bị cho Dự án Nhà máy xi măng với Công ty B ở nước ngoài. Tổng giá trị Hợp đồng là 100 triệu USD (không bao gồm thuế GTGT), bao gồm giá trị máy móc thiết bị là 80 triệu USD, giá trị dịch vụ hướng dẫn lắp đặt, giám sát lắp đặt, bảo hành, bảo dưỡng là 20 triệu USD."},{"k":"p","t":"Nghĩa vụ thuế TNDN của Công ty B đối với Giá trị hợp đồng được xác định như sau:"},{"k":"p","t":"- Thuế TNDN được tính riêng đối với giá trị dây chuyền máy móc thiết bị nhập khẩu (80 triệu USD) và tính riêng đối với giá trị dịch vụ (20 triệu USD) theo từng tỷ lệ thuế TNDN theo quy định."},{"k":"p","t":"- Trường hợp Hợp đồng không xác định cụ thể giá trị dây chuyền máy móc thiết bị và giá trị dịch vụ thì tính thuế TNDN trên tổng giá trị hợp đồng (100 triệu USD) với tỷ lệ thuế TNDN theo quy định."},{"k":"p","t":"3. Thu nhập phát sinh tại Việt Nam của Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài là các khoản thu nhập nhận được dưới bất kỳ hình thức nào trên cơ sở hợp đồng nhà thầu, hợp đồng nhà thầu phụ (trừ trường hợp quy định tại Điều 2 Chương I), không phụ thuộc vào địa điểm tiến hành hoạt động kinh doanh của Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài. Thu nhập chịu thuế của Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài trong một số trường hợp cụ thể như sau:"},{"k":"p","t":"- Thu nhập từ chuyển quyền sở hữu, quyền sử dụng tài sản; chuyển nhượng quyền tham gia hợp đồng kinh tế/dự án tại Việt Nam, chuyển nhượng quyền tài sản tại Việt Nam."},{"k":"p","t":"- Thu nhập từ tiền bản quyền là khoản thu nhập dưới bất kỳ hình thức nào được trả cho quyền sử dụng, chuyển quyền sở hữu trí tuệ và chuyển giao công nghệ, bản quyền phần mềm (bao gồm: các khoản tiền trả cho quyền sử dụng, chuyển giao quyền tác giả và quyền chủ sở hữu tác phẩm; chuyển giao quyền sở hữu công nghiệp; chuyển giao công nghệ, bản quyền phần mềm)."},{"k":"p","t":"“Quyền tác giả, quyền chủ sở hữu tác phẩm”, “Quyền sở hữu công nghiệp”, \"Chuyển giao công nghệ\" quy định tại Bộ Luật Dân sự, Luật Sở hữu trí tuệ, Luật Chuyển giao công nghệ và các văn bản hướng dẫn thi hành."},{"k":"p","t":"- Thu nhập từ chuyển nhượng, thanh lý tài sản."},{"k":"p","t":"- Thu nhập từ Lãi tiền vay: là thu nhập của Bên cho vay từ các khoản cho vay dưới bất kỳ dạng nào mà khoản vay đó có hay không được đảm bảo bằng thế chấp, người cho vay đó có hay không được hưởng lợi tức của người đi vay; thu nhập từ lãi tiền gửi (trừ lãi tiền gửi của các cá nhân người nước ngoài và lãi tiền gửi phát sinh từ tài khoản tiền gửi để duy trì hoạt động tại Việt Nam của cơ quan đại diện ngoại giao, cơ quan đại diện của tổ chức quốc tế, tổ chức phi chính phủ tại Việt Nam), kể cả các khoản thưởng đi kèm lãi tiền gửi (nếu có); thu nhập từ lãi trả chậm theo quy định của các hợp đồng; thu nhập từ lãi trái phiếu, chiết khấu giá trái phiếu (trừ trái phiếu thuộc diện miễn thuế), tín phiếu kho bạc; thu nhập từ lãi chứng chỉ tiền gửi."},{"k":"p","t":"Lãi tiền vay bao gồm cả các khoản phí mà Bên Việt Nam phải trả theo quy định của hợp đồng."},{"k":"p","t":"- Thu nhập từ chuyển nhượng chứng khoán."},{"k":"p","t":"- Tiền phạt, tiền bồi thường thu được từ bên đối tác vi phạm hợp đồng."},{"k":"p","t":"- Các khoản thu nhập khác theo quy định của pháp luật."},{"k":"p","t":"(sau đây gọi tắt là phương pháp kê khai)"}]},{"id":"tt103_8","no":8,"code":"Điều 8","title":"Điều 8. Đối tượng và điều kiện áp dụng","shortTitle":"Đối tượng và điều kiện áp dụng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2. NỘP THUẾ GTGT THEO PHƯƠNG PHÁP KHẤU TRỪ, NỘP THUẾ TNDN TRÊN CƠ SỞ KÊ KHAI DOANH THU, CHI PHÍ ĐỂ XÁC ĐỊNH THU NHẬP CHỊU THUẾ","level":1,"content":[{"k":"p","t":"Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nộp thuế theo hướng dẫn tại Mục 2 Chương II nếu đáp ứng đủ các điều kiện sau:"},{"k":"p","t":"1. Có cơ sở thường trú tại Việt Nam, hoặc là đối tượng cư trú tại Việt Nam;"},{"k":"p","t":"2. Thời hạn kinh doanh tại Việt Nam theo hợp đồng nhà thầu, hợp đồng nhà thầu phụ từ 183 ngày trở lên kể từ ngày hợp đồng nhà thầu, hợp đồng nhà thầu phụ có hiệu lực;"},{"k":"p","t":"3. Áp dụng chế độ kế toán Việt Nam và thực hiện đăng ký thuế, được cơ quan thuế cấp mã số thuế."}]},{"id":"tt103_9","no":9,"code":"Điều 9","title":"Điều 9. Thuế giá trị gia tăng","shortTitle":"Thuế giá trị gia tăng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2. NỘP THUẾ GTGT THEO PHƯƠNG PHÁP KHẤU TRỪ, NỘP THUẾ TNDN TRÊN CƠ SỞ KÊ KHAI DOANH THU, CHI PHÍ ĐỂ XÁC ĐỊNH THU NHẬP CHỊU THUẾ","level":1,"content":[{"k":"p","t":"Thực hiện theo quy định của Luật Thuế GTGT và các văn bản hướng dẫn thi hành."}]},{"id":"tt103_10","no":10,"code":"Điều 10","title":"Điều 10. Thuế thu nhập doanh nghiệp","shortTitle":"Thuế thu nhập doanh nghiệp","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2. NỘP THUẾ GTGT THEO PHƯƠNG PHÁP KHẤU TRỪ, NỘP THUẾ TNDN TRÊN CƠ SỞ KÊ KHAI DOANH THU, CHI PHÍ ĐỂ XÁC ĐỊNH THU NHẬP CHỊU THUẾ","level":1,"content":[{"k":"p","t":"Thực hiện theo quy định của Luật Thuế TNDN và các văn bản hướng dẫn thi hành."},{"k":"p","t":"(sau đây gọi tắt là phương pháp trực tiếp)"}]},{"id":"tt103_11","no":11,"code":"Điều 11","title":"Điều 11. Đối tượng và điều kiện áp dụng","shortTitle":"Đối tượng và điều kiện áp dụng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3. NỘP THUẾ GTGT, NỘP THUẾ TNDN THEO PHƯƠNG PHÁP TỶ LỆ TÍNH TRÊN DOANH THU","level":1,"content":[{"k":"p","t":"Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài không đáp ứng được một trong các điều kiện nêu tại Điều 8 Mục 2 Chương II thì Bên Việt Nam nộp thay thuế cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài theo hướng dẫn tại Điều 12, Điều 13 Mục 3 Chương II."}]},{"id":"tt103_12","no":12,"code":"Điều 12","title":"Điều 12. Thuế giá trị gia tăng","shortTitle":"Thuế giá trị gia tăng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3. NỘP THUẾ GTGT, NỘP THUẾ TNDN THEO PHƯƠNG PHÁP TỶ LỆ TÍNH TRÊN DOANH THU","level":1,"content":[{"k":"p","t":"Căn cứ tính thuế là doanh thu tính thuế giá trị gia tăng và tỷ lệ % để tính thuế GTGT trên doanh thu."},{"k":"p","t":"Số thuế GTGT phải nộp"},{"k":"p","t":"="},{"k":"p","t":"Doanh thu tính thuế Giá trị gia tăng"},{"k":"p","t":"x"},{"k":"p","t":"Tỷ lệ % để tính thuế GTGT trên doanh thu"},{"k":"p","t":"Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thuộc đối tượng nộp thuế GTGT theo phương pháp tính trực tiếp trên GTGT không được khấu trừ thuế GTGT đối với hàng hóa, dịch vụ mua vào để thực hiện hợp đồng nhà thầu, hợp đồng nhà thầu phụ."},{"k":"p","t":"1. Doanh thu tính thuế GTGT"},{"k":"p","t":"a) Doanh thu tính thuế GTGT:"},{"k":"p","t":"Doanh thu tính thuế GTGT là toàn bộ doanh thu do cung cấp dịch vụ, dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế GTGT mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được, chưa trừ các khoản thuế phải nộp, kể cả các khoản chi phí do Bên Việt Nam trả thay Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài (nếu có)."},{"k":"p","t":"b) Xác định doanh thu tính thuế GTGT đối với một số trường hợp cụ thể:"},{"k":"p","t":"b.1) Trường hợp theo thỏa thuận tại hợp đồng nhà thầu, hợp đồng nhà thầu phụ, doanh thu Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được không bao gồm thuế GTGT phải nộp thì doanh thu tính thuế GTGT phải được quy đổi thành doanh thu có thuế GTGT và được xác định theo công thức sau:"},{"k":"p","t":"Doanh thu tính thuế GTGT"},{"k":"p","t":"="},{"k":"p","t":"Doanh thu chưa bao gồm thuế GTGT"},{"k":"p","t":"1 - Tỷ lệ % để tính thuế GTGT trên doanh thu"},{"k":"p","t":"Ví dụ 11:"},{"k":"p","t":"Nhà thầu nước ngoài A cung cấp cho Bên Việt Nam dịch vụ giám sát khối lượng xây dựng nhà máy xi măng Z, giá hợp đồng chưa bao gồm thuế GTGT (nhưng đã bao gồm thuế TNDN) là 300.000 USD. Ngoài ra, Bên Việt Nam thu xếp chỗ ở và làm việc cho nhân viên quản lý của Nhà thầu nước ngoài A với giá trị chưa bao gồm thuế GTGT là 40.000 USD. Theo Hợp đồng, Bên Việt Nam chịu trách nhiệm trả thuế GTGT thay cho Nhà thầu nước ngoài. Việc xác định doanh thu tính thuế GTGT của Nhà thầu nước ngoài A như sau:"},{"k":"p","t":"Xác định doanh thu tính thuế:"},{"k":"p","t":"Doanh thu tính thuế GTGT"},{"k":"p","t":"="},{"k":"p","t":"300.000 + 40.000"},{"k":"p","t":"="},{"k":"p","t":"357.894,73 USD"},{"k":"p","t":"(1- 5%)"},{"k":"p","t":"b.2) Trường hợp Nhà thầu nước ngoài ký hợp đồng với Nhà thầu phụ Việt Nam hoặc Nhà thầu phụ nước ngoài thực hiện nộp thuế theo phương pháp kê khai hoặc Nhà thầu phụ nước ngoài nộp thuế theo phương pháp hỗn hợp để giao bớt một phần giá trị công việc hoặc hạng mục cho nhà thầu phụ được quy định tại Hợp đồng nhà thầu ký với Bên Việt Nam và danh sách các Nhà thầu phụ Việt Nam, Nhà thầu phụ nước ngoài thực hiện phần công việc hoặc hạng mục tương ứng được liệt kê kèm theo Hợp đồng nhà thầu thì doanh thu tính thuế GTGT của Nhà thầu nước ngoài không bao gồm giá trị công việc do Nhà thầu phụ Việt Nam hoặc Nhà thầu phụ nước ngoài thực hiện."},{"k":"p","t":"Trường hợp Nhà thầu nước ngoài ký hợp đồng với các nhà cung cấp tại Việt Nam để mua vật tư nguyên vật liệu, máy móc thiết bị để thực hiện hợp đồng nhà thầu và hàng hóa, dịch vụ để phục vụ cho tiêu dùng nội bộ, tiêu dùng các khoản không thuộc hạng mục, công việc mà Nhà thầu nước ngoài thực hiện theo hợp đồng nhà thầu thì giá trị hàng hóa, dịch vụ này không được trừ khi xác định doanh thu tính thuế GTGT của Nhà thầu nước ngoài."},{"k":"p","t":"Ví dụ 12:"},{"k":"p","t":"Nhà thầu nước ngoài A ký hợp đồng xây dựng nhà máy xi măng Z với Bên Việt Nam với tổng giá trị hợp đồng là 10 triệu USD (giá đã bao gồm thuế GTGT). Theo Hợp đồng nhà thầu, Nhà thầu nước ngoài A sẽ giao bớt phần giá trị xây lắp (được quy định tại Hợp đồng nhà thầu ký với Bên Việt Nam) cho Nhà thầu phụ Việt Nam B với giá trị là 01 triệu USD (giá chưa bao gồm thuế GTGT); ngoài ra, trong quá trình xây dựng Nhà máy xi măng Z để thực hiện hợp đồng nhà thầu, Nhà thầu nước ngoài A mua vật tư nguyên vật liệu (gạch, xi măng, cát…) thực hiện xây lắp và mua các loại hàng hóa, dịch vụ như thuê xe, khách sạn cho chuyên gia, mua văn phòng phẩm... phục vụ cho việc thực hiện hợp đồng."},{"k":"p","t":"Doanh thu tính thuế GTGT của Nhà thầu nước ngoài A trong trường hợp này được xác định như sau:"},{"k":"p","t":"Doanh thu tính thuế GTGT = 10 triệu USD - 1 triệu USD = 9 triệu USD"},{"k":"p","t":"Doanh thu tính thuế GTGT của Nhà thầu nước ngoài A không được trừ các khoản vật tư nguyên vật liệu, hàng hóa, dịch vụ như thuê xe, thuê khách sạn cho chuyên gia, mua văn phòng phẩm..."},{"k":"p","t":"b.3) Trường hợp Nhà thầu nước ngoài ký hợp đồng với Nhà thầu phụ nước ngoài thực hiện nộp thuế theo phương pháp trực tiếp thì Bên Việt Nam khai nộp thuế GTGT thay cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài theo tỷ lệ % để tính thuế GTGT trên doanh thu tương ứng với ngành kinh doanh mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài đó thực hiện theo hợp đồng thầu, hợp đồng thầu phụ. Nhà thầu phụ nước ngoài không phải khai nộp thuế GTGT trên phần giá trị công việc Nhà thầu phụ nước ngoài thực hiện theo quy định tại Hợp đồng nhà thầu phụ ký với Nhà thầu nước ngoài mà Bên Việt Nam đã khai nộp thay."},{"k":"p","t":"b.4) Doanh thu tính thuế GTGT đối với trường hợp cho thuê máy móc, thiết bị, phương tiện vận tải là toàn bộ tiền cho thuê. Trường hợp doanh thu cho thuê máy móc, thiết bị, phương tiện vận tải bao gồm các chi phí do bên cho thuê trực tiếp chi trả như bảo hiểm phương tiện, bảo dưỡng, chứng nhận đăng kiểm, người điều khiển phương tiện, máy móc và chi phí vận chuyển máy móc thiết bị từ nước ngoài đến Việt Nam thì doanh thu tính thuế GTGT không bao gồm các khoản chi phí này nếu có chứng từ thực tế chứng minh."},{"k":"p","t":"b.5) Đối với dịch vụ giao nhận, kho vận quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế GTGT là toàn bộ doanh thu Nhà thầu nước ngoài nhận được không bao gồm cước vận chuyển quốc tế phải trả cho hãng vận chuyển (hàng không, đường biển)."},{"k":"p","t":"b.6) Đối với dịch vụ chuyển phát quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế GTGT là toàn bộ doanh thu Nhà thầu nước ngoài nhận được."},{"k":"p","t":"Ví dụ 13:"},{"k":"p","t":"Công ty A ở nước ngoài cung cấp dịch vụ chuyển phát bưu phẩm từ nước ngoài về Việt Nam và ngược lại. Doanh thu tính thuế GTGT của Công ty A được xác định như sau:"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ nước ngoài về Việt Nam (không phân biệt người gửi ở nước ngoài hay người nhận tại Việt Nam trả tiền dịch vụ) không thuộc diện chịu thuế GTGT;"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ Việt Nam ra nước ngoài (không phân biệt người gửi tại Việt Nam hay người nhận ở nước ngoài trả tiền dịch vụ), doanh thu tính thuế GTGT là toàn bộ doanh thu Công ty A nhận được."},{"k":"p","t":"Ví dụ 14:"},{"k":"p","t":"Công ty B (Công ty Việt Nam) cung cấp dịch vụ chuyển phát bưu phẩm từ nước ngoài về Việt Nam và ngược lại. Để thực hiện dịch vụ này, Công ty B thanh toán (chia cước) cho Công ty C ở nước ngoài một khoản tiền là x USD. Thuế GTGT của Công ty C được xác định như sau:"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ nước ngoài về Việt Nam (không phân biệt người gửi ở nước ngoài hay người nhận tại Việt Nam trả tiền dịch vụ), khoản tiền x USD Công ty C nhận được không thuộc doanh thu tính thuế GTGT;"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ Việt Nam ra nước ngoài (không phân biệt người gửi tại Việt Nam hay người nhận ở nước ngoài trả tiền dịch vụ), khoản tiền x USD Công ty C nhận được thuộc doanh thu tính thuế GTGT; Công ty B có trách nhiệm khai, khấu trừ, nộp thay thuế GTGT trên số tiền x thanh toán cho Công ty C."},{"k":"p","t":"2. Tỷ lệ % để tính thuế GTGT trên doanh thu:"},{"k":"p","t":"a) Tỷ lệ % để tính thuế GTGT trên doanh thu đối với ngành kinh doanh:"},{"k":"p","t":"STT"},{"k":"p","t":"Ngành kinh doanh"},{"k":"p","t":"Tỷ lệ % để tính thuế GTGT"},{"k":"p","t":"1"},{"k":"p","t":"Dịch vụ, cho thuê máy móc thiết bị, bảo hiểm; xây dựng, lắp đặt không bao thầu nguyên vật liệu, máy móc, thiết bị"},{"k":"p","t":"5"},{"k":"p","t":"2"},{"k":"p","t":"Sản xuất, vận tải, dịch vụ có gắn với hàng hóa; xây dựng, lắp đặt có bao thầu nguyên vật liệu, máy móc, thiết bị"},{"k":"p","t":"3"},{"k":"p","t":"3"},{"k":"p","t":"Hoạt động kinh doanh khác"},{"k":"p","t":"2"},{"k":"p","t":"b) Xác định tỷ lệ % để tính thuế GTGT trên doanh thu đối với một số trường hợp cụ thể:"},{"k":"p","t":"b.1) Đối với các hợp đồng nhà thầu, hợp đồng nhà thầu phụ bao gồm nhiều hoạt động kinh doanh khác nhau hoặc một phần giá trị hợp đồng không thuộc diện chịu thuế GTGT, việc áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu khi xác định số thuế GTGT phải nộp căn cứ vào doanh thu tính thuế GTGT đối với từng hoạt động kinh doanh do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thực hiện theo quy định tại hợp đồng nhà thầu, hợp đồng nhà thầu phụ. Trường hợp không tách riêng được giá trị từng hoạt động kinh doanh thì áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu cao nhất đối với ngành nghề kinh doanh cho toàn bộ giá trị hợp đồng."},{"k":"p","t":"Riêng đối với hoạt động xây dựng, lắp đặt có bao thầu nguyên vật liệu hoặc máy móc, thiết bị đi kèm công trình xây dựng: Trường hợp hợp đồng nhà thầu tách riêng được giá trị từng hoạt động kinh doanh thì Nhà thầu nước ngoài không phải nộp thuế GTGT trên giá trị nguyên vật liệu hoặc máy móc, thiết bị đã nộp thuế GTGT ở khâu nhập khẩu hoặc thuộc diện không chịu thuế GTGT; đối với từng phần giá trị công việc còn lại theo hợp đồng thì áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu tương ứng với hoạt động kinh doanh đó. Trường hợp hợp đồng nhà thầu không tách riêng được giá trị từng hoạt động kinh doanh thì áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu là 3% tính trên toàn bộ giá trị hợp đồng (bao gồm cả giá trị nguyên vật liệu hoặc máy móc, thiết bị nhập khẩu). Trường hợp Nhà thầu nước ngoài ký hợp đồng với các Nhà thầu phụ để giao lại toàn bộ các phần giá trị công việc hoặc hạng mục có bao thầu nguyên vật liệu hoặc máy móc, thiết bị, Nhà thầu nước ngoài chỉ thực hiện phần giá trị dịch vụ còn lại theo hợp đồng nhà thầu thì tỷ lệ % để tính thuế GTGT được áp dụng đối với ngành nghề dịch vụ (5%)."},{"k":"p","t":"Ví dụ 15:"},{"k":"p","t":"Nhà thầu nước ngoài A ký hợp đồng với Bên Việt Nam để xây dựng một nhà máy điện X với giá trị là 75 triệu USD (giá đã bao gồm thuế GTGT)."},{"k":"p","t":"Trường hợp 1: Hợp đồng nhà thầu tách riêng giá trị từng hoạt động kinh doanh như sau:"},{"k":"p","t":"+ Giá trị máy móc, thiết bị cung cấp cho công trình: 50 triệu USD."},{"k":"p","t":"Trong đó: Giá trị máy móc, thiết bị thuộc diện chịu thuế GTGT: 30 triệu USD."},{"k":"p","t":"Giá trị máy móc, thiết bị không thuộc diện chịu thuế GTGT: 15 triệu USD."},{"k":"p","t":"Giá trị dịch vụ bảo hành đi kèm máy móc, thiết bị: 5 triệu USD"},{"k":"p","t":"+ Giá trị dịch vụ thiết kế dây chuyền công nghệ, thiết kế khác: 5 triệu USD."},{"k":"p","t":"+ Giá trị nhà xưởng, hệ thống phụ trợ khác, xây dựng, lắp đặt: 15 triệu USD."},{"k":"p","t":"+ Giá trị dịch vụ giám sát, hướng dẫn lắp đặt: 3 triệu USD."},{"k":"p","t":"+ Giá trị dịch vụ đào tạo kỹ thuật, vận hành thử: 2 triệu USD."},{"k":"p","t":"Khi nhập khẩu, giá trị máy móc thiết bị đã được nộp thuế GTGT khâu nhập khẩu 30 triệu USD; Giá trị máy móc, thiết bị không thuộc diện chịu thuế GTGT 15 triệu USD."},{"k":"p","t":"Nghĩa vụ thuế GTGT của Nhà thầu nước ngoài A đối với giá trị hợp đồng ký với Bên Việt Nam chỉ tính trên giá trị dịch vụ và giá trị xây dựng lắp đặt. Trong đó: giá trị dịch vụ (dịch vụ bảo hành, dịch vụ thiết kế, dịch vụ giám sát, hướng dẫn lắp đặt, dịch vụ đào tạo kỹ thuật, vận hành thử) là 15 triệu USD và áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu đối với ngành dịch vụ là 5%; giá trị xây dựng, lắp đặt là 15 triệu USD và áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu đối với hoạt động xây dựng, lắp đặt là 3% (không tính thuế GTGT trên giá trị máy móc, thiết bị nhập khẩu)."},{"k":"p","t":"Trường hợp 2: Hợp đồng nhà thầu không tách riêng giá trị từng hoạt động kinh doanh, chỉ quy định giá trị Hợp đồng bao gồm máy móc, thiết bị, dịch vụ thiết kế, dịch vụ giám sát, hướng dẫn lắp đặt, dịch vụ đào tạo kỹ thuật, vận hành thử; nếu không có đủ chứng từ để chứng minh giá trị máy móc, thiết bị cung cấp cho công trình đã nộp thuế GTGT ở khâu nhập khẩu thì nghĩa vụ thuế GTGT của Nhà thầu nước ngoài A đối với giá trị hợp đồng ký với Bên Việt Nam được tính trên toàn bộ giá trị Hợp đồng nhà thầu là 75 triệu USD và áp dụng tỷ lệ % để tính thuế GTGT là 3%."},{"k":"p","t":"Trường hợp 3: Nhà thầu nước ngoài A ký hợp đồng với các Nhà thầu phụ để giao lại các phần công việc có bao thầu nguyên vật liệu, Nhà thầu nước ngoài A chỉ thực hiện phần giá trị dịch vụ (ví dụ như giá trị dịch vụ giám sát, hướng dẫn lắp đặt) thì phần giá trị dịch vụ này áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu là 5%."},{"k":"p","t":"b.2) Đối với hợp đồng cung cấp máy móc thiết bị có kèm theo các dịch vụ thực hiện tại Việt Nam, nếu tách riêng được giá trị máy móc thiết bị và giá trị các dịch vụ khi xác định số thuế GTGT phải nộp thì áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu của từng phần giá trị hợp đồng. Trường hợp trong hợp đồng không tách riêng được giá trị máy móc thiết bị và giá trị các dịch vụ thì áp dụng tỷ lệ % để tính thuế GTGT trên doanh thu tính thuế là 3%."},{"k":"p","t":"Ví dụ 16:"},{"k":"p","t":"Nhà thầu nước ngoài H của Hàn Quốc không thực hiện chế độ kế toán Việt Nam thực hiện hợp đồng ký với doanh nghiệp B ở Việt Nam về việc cung cấp dây chuyền máy móc, thiết bị kèm theo dịch vụ lắp đặt, vận hành, chạy thử với giá trị là 10.000.000 USD. Tại hợp đồng không tách riêng được phần giá trị máy móc thiết bị và giá trị dịch vụ lắp đặt, vận hành chạy thử thì tỷ lệ % để tính thuế GTGT áp dụng là 3%."},{"k":"p","t":"3. Thuế GTGT đối với Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm, thăm dò, phát triển và khai thác mỏ dầu, khí đốt"},{"k":"p","t":"a. Trường hợp Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm, thăm dò, phát triển và khai thác mỏ dầu, khí đốt nếu không đáp ứng được một trong các điều kiện nêu tại Điều 8 Mục 2 Chương II thì Bên Việt Nam có trách nhiệm khấu trừ, nộp thay thuế GTGT trước khi thanh toán. Số thuế nộp thay tính bằng tổng số tiền thanh toán chưa bao gồm thuế GTGT nhân (x) với mức thuế suất thuế GTGT quy định đối với hàng hóa, dịch vụ do nhà thầu nước ngoài cung cấp."},{"k":"p","t":"b. Trường hợp Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm, thăm dò, phát triển và khai thác mỏ dầu, khí đốt đáp ứng được ba điều kiện nêu tại Điều 8 Mục 2 Chương II hoặc đáp ứng hai điều kiện nêu tại khoản 1, khoản 2 Điều 8 Mục 2 Chương II và tổ chức hạch toán kế toán theo quy định của pháp luật về kế toán và hướng dẫn của Bộ Tài chính:"},{"k":"p","t":"- Trong thời gian Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài chưa được cơ quan thuế cấp giấy chứng nhận đăng ký thuế để khai, nộp thuế GTGT theo phương pháp khấu trừ, nếu Bên Việt Nam thanh toán tiền cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thì Bên Việt Nam có trách nhiệm khấu trừ nộp thay thuế GTGT trước khi thanh toán. Số thuế nộp thay tính bằng tổng số tiền thanh toán chưa bao gồm thuế giá trị gia tăng nhân (x) với mức thuế suất thuế giá trị gia tăng quy định đối với hàng hóa, dịch vụ do nhà thầu nước ngoài cung cấp."},{"k":"p","t":"- Khi Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài được cơ quan thuế cấp giấy chứng nhận đăng ký thuế thì Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài chuyển hóa đơn, chứng từ phát sinh trong kỳ khai thuế GTGT cho Bên Việt Nam để Bên Việt Nam khai khấu trừ, nộp thay thuế GTGT cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài."},{"k":"p","t":"Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài không được khấu trừ thuế GTGT đầu vào phát sinh trước khi được cấp giấy chứng nhận đăng ký thuế."},{"k":"p","t":"Ví dụ 17:"},{"k":"p","t":"Tháng 1/2015, Nhà thầu nước ngoài A ký hợp đồng với bên Việt Nam về việc cung cấp dịch vụ dầu khí với giá trị hợp đồng là 1 triệu USD. Trong thời gian Nhà thầu nước ngoài A chưa được cơ quan thuế cấp giấy chứng nhận đăng ký thuế, Nhà thầu nước ngoài A phát sinh số thuế GTGT đầu vào đối với hàng hóa, dịch vụ mua vào để thực hiện hợp đồng thầu là 5.000 USD. Ngày 15/3/2015, Bên Việt Nam thanh toán tiền cho Nhà thầu nước ngoài A với giá trị là 100.000 USD (chưa bao gồm thuế GTGT và đã bao gồm thuế TNDN) thì Bên Việt Nam có trách nhiệm khai nộp thuế GTGT thay cho Nhà thầu nước ngoài A với số thuế GTGT được xác định bằng 100.000 USD x 10% = 10.000 USD."},{"k":"p","t":"Đến ngày 01/5/2015, Nhà thầu nước ngoài A đăng ký và được cơ quan thuế cấp giấy chứng nhận đăng ký thuế. Trong tháng 5/2015, Bên Việt Nam thanh toán cho Nhà thầu nước ngoài A với giá trị là 200.000 USD (chưa bao gồm thuế GTGT và đã bao gồm thuế TNDN). Như vậy, thuế GTGT đầu ra của Nhà thầu nước ngoài A phát sinh trong tháng 5 là 20.000 USD (=200.000USD x 10%)."},{"k":"p","t":"Thuế GTGT đầu vào của Nhà thầu nước ngoài A phát sinh từ 01/5/2015 đến 30/5/2015 là 2.000 USD (thuế GTGT phát sinh vào khoảng thời gian Nhà thầu nước ngoài A đã có mã số thuế). Nhà thầu nước ngoài A chuyển toàn bộ hóa đơn, chứng từ phát sinh trong tháng 5/2015 cho Bên Việt Nam để Bên Việt Nam khai, nộp thay số thuế GTGT của Nhà thầu nước ngoài A."},{"k":"p","t":"Số thuế GTGT Nhà thầu nước ngoài A phải nộp của kỳ khai thuế GTGT tháng 5/2015 là 18.000 USD (= 20.000 USD - 2000 USD)."},{"k":"p","t":"Nhà thầu nước ngoài A không được khấu trừ 5.000 USD thuế GTGT đầu vào phát sinh trước thời điểm 01/5/2015."}]},{"id":"tt103_13","no":13,"code":"Điều 13","title":"Điều 13. Thuế thu nhập doanh nghiệp","shortTitle":"Thuế thu nhập doanh nghiệp","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3. NỘP THUẾ GTGT, NỘP THUẾ TNDN THEO PHƯƠNG PHÁP TỶ LỆ TÍNH TRÊN DOANH THU","level":1,"content":[{"k":"p","t":"Căn cứ tính thuế là doanh thu tính thuế TNDN và tỷ lệ (%) thuế TNDN tính trên doanh thu tính thuế."},{"k":"p","t":"Số thuế TNDN phải nộp"},{"k":"p","t":"="},{"k":"p","t":"Doanh thu tính thuế TNDN"},{"k":"p","t":"x"},{"k":"p","t":"Tỷ lệ thuế TNDN tính trên doanh thu tính thuế"},{"k":"p","t":"1. Doanh thu tính thuế TNDN"},{"k":"p","t":"a) Doanh thu tính thuế TNDN"},{"k":"p","t":"Doanh thu tính thuế TNDN là toàn bộ doanh thu không bao gồm thuế GTGT mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được, chưa trừ các khoản thuế phải nộp. Doanh thu tính thuế TNDN được tính bao gồm cả các khoản chi phí do Bên Việt Nam trả thay Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài (nếu có)."},{"k":"p","t":"b) Xác định doanh thu tính thuế TNDN đối với một số trường hợp cụ thể:"},{"k":"p","t":"b.1) Trường hợp, theo thỏa thuận tại hợp đồng nhà thầu, hợp đồng nhà thầu phụ, doanh thu Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được không bao gồm thuế TNDN phải nộp thì doanh thu tính thuế TNDN được xác định theo công thức sau:"},{"k":"p","t":"Doanh thu tính thuế TNDN"},{"k":"p","t":"="},{"k":"p","t":"Doanh thu không bao gồm thuế TNDN"},{"k":"p","t":"1 - Tỷ lệ thuế TNDN tính trên doanh thu tính thuế"},{"k":"p","t":"Ví dụ 18:"},{"k":"p","t":"Nhà thầu nước ngoài A cung cấp cho Bên Việt Nam dịch vụ giám sát khối lượng xây dựng nhà máy xi măng Z, giá hợp đồng chưa bao gồm thuế GTGT, thuế TNDN là 285.000 USD. Ngoài ra, Bên Việt Nam thu xếp chỗ ở và làm việc cho nhân viên quản lý của Nhà thầu nước ngoài với giá trị là 38.000 USD (chưa bao gồm thuế GTGT, TNDN). Theo Hợp đồng, Bên Việt Nam chịu trách nhiệm trả thuế TNDN, thuế GTGT thay cho nhà thầu nước ngoài. Việc xác định số thuế TNDN nhà thầu nước ngoài phải nộp như sau:"},{"k":"p","t":"Xác định doanh thu tính thuế:"},{"k":"p","t":"Doanh thu tính thuế TNDN"},{"k":"p","t":"="},{"k":"p","t":"285.000 + 38.000"},{"k":"p","t":"="},{"k":"p","t":"340.000 USD"},{"k":"p","t":"(1- 5%)"},{"k":"p","t":"b.2) Trường hợp Nhà thầu nước ngoài ký hợp đồng với Nhà thầu phụ Việt Nam hoặc Nhà thầu phụ nước ngoài thực hiện nộp thuế theo phương pháp kê khai hoặc Nhà thầu phụ nước ngoài nộp thuế theo phương pháp hỗn hợp để giao bớt một phần giá trị công việc hoặc hạng mục được quy định tại Hợp đồng nhà thầu ký với Bên Việt Nam và danh sách các Nhà thầu phụ Việt Nam, Nhà thầu phụ nước ngoài thực hiện phần công việc hoặc hạng mục tương ứng được liệt kê kèm theo Hợp đồng nhà thầu thì doanh thu tính thuế TNDN của Nhà thầu nước ngoài không bao gồm giá trị công việc do Nhà thầu phụ Việt Nam hoặc Nhà thầu phụ nước ngoài thực hiện."},{"k":"p","t":"Trường hợp Nhà thầu nước ngoài ký hợp đồng với các nhà cung cấp tại Việt Nam để mua vật tư nguyên vật liệu, máy móc thiết bị để thực hiện hợp đồng nhà thầu và hàng hóa, dịch vụ để phục vụ cho tiêu dùng nội bộ, tiêu dùng các khoản không thuộc hạng mục, công việc mà Nhà thầu nước ngoài thực hiện theo hợp đồng nhà thầu thì giá trị hàng hóa, dịch vụ này không được trừ khi xác định doanh thu tính thuế TNDN của Nhà thầu nước ngoài."},{"k":"p","t":"Ví dụ 19:"},{"k":"p","t":"Nhà thầu nước ngoài A ký hợp đồng xây dựng nhà máy xi măng Z với Bên Việt Nam với tổng giá trị hợp đồng là 9 triệu USD (giá chưa bao gồm thuế GTGT). Theo Hợp đồng nhà thầu, Nhà thầu nước ngoài A sẽ giao bớt phần giá trị xây lắp (được quy định tại Hợp đồng nhà thầu ký với Bên Việt Nam) cho Nhà thầu phụ Việt Nam B với giá trị là 01 triệu USD (giá chưa bao gồm thuế GTGT); ngoài ra, trong quá trình xây dựng Nhà máy xi măng Z để thực hiện hợp đồng nhà thầu, Nhà thầu nước ngoài A mua vật tư nguyên vật liệu (gạch, xi măng, cát…) thực hiện xây lắp và mua các loại hàng hóa, dịch vụ như thuê xe, khách sạn cho chuyên gia, mua văn phòng phẩm... phục vụ cho việc thực hiện hợp đồng."},{"k":"p","t":"Doanh thu tính thuế TNDN của Nhà thầu nước ngoài A trong trường hợp này được xác định như sau:"},{"k":"p","t":"Doanh thu tính thuế TNDN = 9 triệu USD - 1 triệu USD = 8 triệu USD"},{"k":"p","t":"Doanh thu tính thuế TNDN của Nhà thầu nước ngoài A không được trừ các khoản vật tư nguyên vật liệu, hàng hóa, dịch vụ như thuê xe, thuê khách sạn cho chuyên gia, mua văn phòng phẩm..."},{"k":"p","t":"b.3) Trường hợp Nhà thầu nước ngoài ký hợp đồng với Nhà thầu phụ nước ngoài thực hiện nộp thuế theo phương pháp trực tiếp thì Bên Việt Nam khai nộp thuế TNDN thay cho Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài theo tỷ lệ (%) thuế TNDN tính trên doanh thu tính thuế tương ứng với ngành kinh doanh mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài đó thực hiện theo hợp đồng nhà thầu, hợp đồng nhà thầu phụ. Nhà thầu phụ nước ngoài không phải khai nộp thuế TNDN trên phần giá trị công việc Nhà thầu phụ nước ngoài thực hiện theo quy định tại hợp đồng nhà thầu phụ ký với Nhà thầu nước ngoài mà Bên Việt Nam đã khai nộp thay."},{"k":"p","t":"b.4) Doanh thu tính thuế TNDN đối với trường hợp cho thuê máy móc, thiết bị, phương tiện vận tải là toàn bộ tiền cho thuê. Trường hợp doanh thu cho thuê máy móc, thiết bị, phương tiện vận tải bao gồm các chi phí do bên cho thuê trực tiếp chi trả như bảo hiểm phương tiện, bảo dưỡng, chứng nhận đăng kiểm, người điều khiển phương tiện, máy móc và chi phí vận chuyển máy móc thiết bị từ nước ngoài đến Việt Nam thì doanh thu tính thuế TNDN không bao gồm các khoản chi phí này nếu có chứng từ thực tế chứng minh."},{"k":"p","t":"b.5) Doanh thu tính thuế TNDN của hãng hàng không nước ngoài là doanh thu bán vé hành khách, vận đơn hàng không và các khoản thu khác (trừ những khoản thu hộ Nhà nước hoặc tổ chức theo quy định của pháp luật) tại Việt Nam cho việc vận chuyển hành khách, hàng hóa và đối tượng vận chuyển khác được thực hiện trên các chuyến bay của chính hãng hàng không hoặc liên danh."},{"k":"p","t":"Ví dụ 20:"},{"k":"p","t":"Hãng hàng không nước ngoài A trong quý I năm 2013 phát sinh doanh số là 100.000 USD, trong đó doanh số bán vé hành khách là 85.000 USD, doanh số bán vận đơn hàng hóa là 10.000 USD và doanh số bán MCO (chứng từ có giá) là 5.000 USD; đồng thời phát sinh khoản thu hộ Nhà nước (lệ phí sân bay) 1.000 USD, chi hoàn do khách trả lại vé 2.000 USD."},{"k":"p","t":"Doanh thu tính thuế TNDN quý I năm 2013 của Hãng hàng không nước ngoài A được xác định như sau:"},{"k":"p","t":"Doanh thu tính thuế TNDN = 100.000 – (1.000 + 2.000) = 97.000 USD"},{"k":"p","t":"b.6) Doanh thu tính thuế TNDN của hãng vận tải biển nước ngoài là toàn bộ tiền cước thu được từ hoạt động vận chuyển hành khách, vận chuyển hàng hóa và các khoản phụ thu khác mà hãng vận tải biển được hưởng từ cảng xếp hàng của Việt Nam đến cảng cuối cùng bốc dỡ hàng hóa đó (bao gồm cả tiền cước của các lô hàng phải chuyển tải qua các cảng trung gian) và/hoặc tiền cước thu được do vận chuyển hàng hóa giữa các cảng Việt Nam."},{"k":"p","t":"Tiền cước vận chuyển làm căn cứ tính thuế TNDN không bao gồm tiền cước đã tính thuế TNDN tại cảng Việt Nam đối với chủ tàu nước ngoài và tiền cước trả cho doanh nghiệp vận tải Việt Nam do đã tham gia vận chuyển hàng từ cảng Việt Nam đến một cảng trung gian."},{"k":"p","t":"Ví dụ 21:"},{"k":"p","t":"Công ty A thực hiện làm đại lý cho Hãng vận tải biển X của nước ngoài. Theo hợp đồng đại lý vận tải, Công ty A thay mặt Hãng X nhận hàng vận chuyển ra nước ngoài, phát hành vận đơn, thu tiền cước vận chuyển..."},{"k":"p","t":"Doanh nghiệp B của Việt Nam thuê Hãng X (qua Công ty A) vận chuyển hàng từ Việt Nam sang Mỹ với số tiền vận chuyển là 100.000 USD."},{"k":"p","t":"Công ty A đã thuê tàu biển của doanh nghiệp Việt Nam hoặc tàu biển nước ngoài chở hàng từ Việt Nam sang Singapore với tiền cước vận chuyển là 20.000 USD và từ Singapore hàng sẽ được vận chuyển tiếp sang Mỹ bằng tàu của Hãng X."},{"k":"p","t":"Doanh thu chịu thuế TNDN của Hãng vận tải biển X của nước ngoài được xác định như sau:"},{"k":"p","t":"Doanh thu chịu thuế TNDN = 100.000 – 20.000 = 80.000 USD"},{"k":"p","t":"b.7) Đối với dịch vụ giao nhận, kho vận quốc tế từ Việt Nam đi nước ngoài, (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế TNDN là toàn bộ doanh thu Nhà thầu nước ngoài nhận được không bao gồm cước vận chuyển quốc tế phải trả cho hãng vận chuyển (hàng không, đường biển)."},{"k":"p","t":"b.8) Đối với dịch vụ chuyển phát quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế TNDN là toàn bộ doanh thu Nhà thầu nước ngoài nhận được."},{"k":"p","t":"Ví dụ 22:"},{"k":"p","t":"Công ty A ở nước ngoài cung cấp dịch vụ chuyển phát bưu phẩm từ nước ngoài về Việt Nam và ngược lại. Doanh thu tính thuế TNDN của Công ty A được xác định như sau:"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ nước ngoài về Việt Nam (không phân biệt người gửi ở nước ngoài hay người nhận tại Việt Nam trả tiền dịch vụ) không thuộc thu nhập chịu thuế TNDN;"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ Việt Nam ra nước ngoài (không phân biệt người gửi tại Việt Nam hay người nhận ở nước ngoài trả tiền dịch vụ), doanh thu tính thuế TNDN là toàn bộ doanh thu Công ty A nhận được."},{"k":"p","t":"Ví dụ 23:"},{"k":"p","t":"Công ty B (Công ty Việt Nam) cung cấp dịch vụ chuyển phát bưu phẩm từ nước ngoài về Việt Nam và ngược lại. Để thực hiện dịch vụ này, Công ty B thanh toán (chia cước) cho Công ty C ở nước ngoài một khoản tiền là x USD. Thuế TNDN của Công ty C được xác định như sau:"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ nước ngoài về Việt Nam (không phân biệt người gửi ở nước ngoài hay người nhận tại Việt Nam trả tiền dịch vụ), khoản tiền x USD Công ty C nhận được không thuộc thu nhập chịu thuế TNDN;"},{"k":"p","t":"+ Đối với dịch vụ chuyển phát từ Việt Nam ra nước ngoài (không phân biệt người gửi tại Việt Nam hay người nhận ở nước ngoài trả tiền dịch vụ), khoản tiền x USD Công ty C nhận được thuộc thu nhập chịu thuế TNDN; Công ty B có trách nhiệm khai, khấu trừ, nộp thay thuế TNDN trên số tiền x thanh toán cho Công ty C."},{"k":"p","t":"b.9) Đối với tái bảo hiểm, doanh thu tính thuế TNDN xác định như sau:"},{"k":"p","t":"- Đối với hoạt động nhượng tái bảo hiểm ra nước ngoài, doanh thu tính thuế TNDN là số tiền phí nhượng tái bảo hiểm ra nước ngoài mà Nhà thầu nước ngoài nhận được (bao gồm hoa hồng tái bảo hiểm và chi phí bồi hoàn cho khách hàng theo thỏa thuận)."},{"k":"p","t":"- Đối với hoạt động nhận tái bảo hiểm từ nước ngoài, doanh thu tính thuế TNDN là khoản hoa hồng nhượng tái bảo hiểm mà Nhà thầu nước ngoài nhận được."},{"k":"p","t":"b.10) Đối với chuyển nhượng chứng khoán, doanh thu tính thuế TNDN được xác định như sau:"},{"k":"p","t":"Đối với chuyển nhượng chứng khoán, chứng chỉ tiền gửi, doanh thu tính thuế thu nhập doanh nghiệp là tổng doanh thu bán chứng khoán, chứng chỉ tiền gửi tại thời điểm chuyển nhượng."},{"k":"p","t":"b.11) Doanh thu tính thuế TNDN đối với giao dịch hoán đổi lãi suất là phần chênh lệch giữa lãi phải thu và lãi phải trả mà Nhà thầu nước ngoài nhận được trong 1 năm dương lịch. Việc xác định kỳ tính thuế theo năm dương lịch được thực hiện theo quy định tại Luật thuế TNDN, Luật Quản lý thuế và các văn bản hướng dẫn."},{"k":"p","t":"Ví dụ 24:"},{"k":"p","t":"Ngân hàng A (A) có một khoản cho vay trị giá 10 triệu USD với lãi suất cố định là 5,2% tháng. Thời gian thực hiện hợp đồng là 3 năm từ 1/2/2012 đến 1/2/2015, kỳ hạn thanh toán 6 tháng 1 lần và thanh toán vào đầu kỳ."},{"k":"p","t":"Trên cơ sở hợp đồng cho vay của A, A đàm phán với 1 ngân hàng B (B) ở nước ngoài để thực hiện hợp đồng hoán đổi lãi suất, cụ thể:"},{"k":"p","t":"- Thời hạn thực hiện hợp đồng là 3 năm từ 1/2/2012 đến 1/2/2015, kỳ hạn thanh toán 6 tháng 1 lần và thanh toán vào đầu kỳ."},{"k":"p","t":"- Lãi suất thả nổi A phải trả cho B là libor + 0,25% và B phải trả cho A lãi suất cố định là 5,2%. Điều này có nghĩa nếu lãi suất libor + 0,25% cao hơn lãi suất cố định theo hợp đồng hoán đổi thì B nhận được chênh lệch lãi suất từ A tính bằng: (libor + 0,25%) - lãi phải trả tính theo lãi suất 5,2%. Ngược lại nếu lãi suất libor + 0,25% thấp hơn lãi suất cố định theo hợp đồng hoán đổi thì A nhận được chênh lệch lãi suất từ B tính bằng: 5,2% - lãi A nhận được tính theo lãi suất libor + 0,25%."},{"k":"p","t":"Thời điểm thanh toán"},{"k":"p","t":"Lãi suất libor(%)"},{"k":"p","t":"A phải trả cho B(%)"},{"k":"p","t":"B phải trả cho A(%)"},{"k":"p","t":"Sau khi bù trừ lãi A hoặc B nhận được (%)"},{"k":"p","t":"Số tiền chênh lệch A hoặc B nhận được từng kỳ (1.000USD)"},{"k":"p","t":"A"},{"k":"p","t":"B"},{"k":"p","t":"A"},{"k":"p","t":"B"},{"k":"p","t":"1/2/2012- 31/7/2012"},{"k":"p","t":"4,80"},{"k":"p","t":"5,05"},{"k":"p","t":"5,20"},{"k":"p","t":"0,15"},{"k":"p","t":"-"},{"k":"p","t":"15"},{"k":"p","t":"1/8/2012 - 31/1/2013"},{"k":"p","t":"5,00"},{"k":"p","t":"5,25"},{"k":"p","t":"5,20"},{"k":"p","t":"0,05"},{"k":"p","t":"5"},{"k":"p","t":"1/2/2013- 31/7/2013"},{"k":"p","t":"4,90"},{"k":"p","t":"5,15"},{"k":"p","t":"5,20"},{"k":"p","t":"0,05"},{"k":"p","t":"-"},{"k":"p","t":"5"},{"k":"p","t":"1/8/2013 - 31/1/2014"},{"k":"p","t":"4,95"},{"k":"p","t":"5,20"},{"k":"p","t":"5,20"},{"k":"p","t":"0,00"},{"k":"p","t":"-"},{"k":"p","t":"-"},{"k":"p","t":"1/2/2014 - 31/7/2014"},{"k":"p","t":"4,90"},{"k":"p","t":"5,15"},{"k":"p","t":"5,20"},{"k":"p","t":"0,05"},{"k":"p","t":"5"},{"k":"p","t":"1/8/2014- 30/1/2015"},{"k":"p","t":"5,05"},{"k":"p","t":"5,30"},{"k":"p","t":"5,20"},{"k":"p","t":"0,10"},{"k":"p","t":"10"},{"k":"p","t":"Việc xác định doanh thu tính thuế TNDN đối với B như sau:"},{"k":"p","t":"- Năm 2012 (từ 01/01/2012 - 31/12/2012): Tổng số tiền B nhận được từ A là: (15.000 - 5.000) = 10.000 USD;"},{"k":"p","t":"- Năm 2013 (từ 01/01/2013 - 31/12/2013): Tổng số tiền B nhận được từ A là: (5.000 - 0) = 5.000 USD;"},{"k":"p","t":"- Năm 2014 (từ 01/01/2014 - 31/12/2014: B Không nhận được tiền mà phải thanh toán cho A là 5.000 USD (Doanh thu tính thuế = 0);"},{"k":"p","t":"- Năm 2015: Do hợp đồng thỏa thuận thanh toán vào đầu kỳ nên không phát sinh việc thanh toán bù trừ giữa A và B."},{"k":"p","t":"b.12) Đối với tín phiếu kho bạc:"},{"k":"p","t":"Việc xác định doanh thu tính thuế TNDN đối với tín phiếu kho bạc được áp dụng đối với từng loại tín phiếu kho bạc do nhà đầu tư nắm giữ tại thời điểm tín phiếu đáo hạn."},{"k":"p","t":"Doanh thu tính thuế TNDN đối với tín phiếu kho bạc được xác định như sau:"},{"k":"p","t":"Doanh thu tính thuế TNDN"},{"k":"p","t":"="},{"k":"p","t":"("},{"k":"p","t":"Mệnh giá tín phiếu kho bạc"},{"k":"p","t":"-"},{"k":"p","t":"Bình quân gia quyền giá mua số tín phiếu kho bạc mà nhà đầu tư nắm giữ vào ngày đáo hạn"},{"k":"p","t":")"},{"k":"p","t":"x"},{"k":"p","t":"Số lượng tín phiếu kho bạc mà nhà đầu tư nắm giữ vào ngày đáo hạn"},{"k":"p","t":"Việc tính giá mua bình quân gia quyền của số tín phiếu kho bạc mà nhà đầu tư nắm giữ tại thời điểm đáo hạn được thực hiện theo 3 bước:"},{"k":"p","t":"Bước 1: Xác định số lượng tín phiếu nắm giữ tại thời điểm đáo hạn."},{"k":"p","t":"Bước 2: Xác định số lượng, thời điểm mua và giá mua tương ứng của các tín phiếu nắm giữ tại thời điểm đáo hạn (xác định ở bước 1) theo nguyên tắc tín phiếu nào mua trước thì được bán trước (nguyên tắc FIFO)."},{"k":"p","t":"Bước 3: Tính giá mua bình quân gia quyền theo công thức:"},{"k":"p","t":"=∑( số lượng tín phiếu nắm giữ tại thời điểm đáo hạn tại các thời điểm mua x giá mua tương ứng tại các thời điểm mua vào) ÷ Số lượng tín phiếu nắm giữ tại thời điểm đáo hạn."},{"k":"p","t":"Ví dụ 25: Ngày 1/1/2015, Tín phiếu kho bạc X mệnh giá phát hành 100.000 đồng, kỳ hạn 06 tháng được phát hành với giá 89.000 đồng/ tín phiếu. Ngay sau khi phát hành, Tín phiếu được niêm yết và giao dịch trên HNX. Nhà đầu tư A thực hiện một số giao dịch sau từ ngày 2/1 đến ngày 1/7/2015 (ngày đáo hạn):"},{"k":"p","t":"Ngày giao dịch"},{"k":"p","t":"Mua/ Bán"},{"k":"p","t":"Khối lượng"},{"k":"p","t":"Giá"},{"k":"p","t":"2/1/2015"},{"k":"p","t":"Mua"},{"k":"p","t":"100"},{"k":"p","t":"90.000"},{"k":"p","t":"1/2/2015"},{"k":"p","t":"Mua"},{"k":"p","t":"100"},{"k":"p","t":"92.000"},{"k":"p","t":"1/3/2015"},{"k":"p","t":"Bán"},{"k":"p","t":"70"},{"k":"p","t":"93.000"},{"k":"p","t":"1/4/2015"},{"k":"p","t":"Mua"},{"k":"p","t":"40"},{"k":"p","t":"94.000"},{"k":"p","t":"1/5/2015"},{"k":"p","t":"Bán"},{"k":"p","t":"20"},{"k":"p","t":"95.000"},{"k":"p","t":"Bước 1: Xác định số lượng tín phiếu nắm giữ tại thời điểm đáo hạn: (100 + 100 + 40) – (70 +20) = 150 tín phiếu"},{"k":"p","t":"Bước 2: Xác định số lượng, thời điểm mua và giá mua tương ứng của các tín phiếu nắm giữ tại thời điểm đáo hạn sau khi trừ đi số lượng tín phiếu tại các đợt bán tín phiếu theo nguyên tắc tín phiếu nào mua trước thì được bán trước (nguyên tắc FIFO): 150 tín phiếu nắm giữ tại thời điểm đáo hạn bao gồm:"},{"k":"p","t":"+ 10 tín phiếu tại mức giá 90.000 mua vào ngày 2/1/2015."},{"k":"p","t":"+ 100 tín phiếu tại mức giá 92.000 mua vào ngày 1/2/2015."},{"k":"p","t":"+ 40 tín phiếu tại mức giá 94.000 mua vào ngày 1/4/2015."},{"k":"p","t":"Bước 3: Tính giá mua bình quân gia quyền theo công thức:"},{"k":"p","t":"Bình quân gia quyền giá mua tín phiếu: [(40 x 94.000 + 100 x 92.000 + 10 x 90.000)/ 150] = 92.400 (đồng)"},{"k":"p","t":"Doanh thu tính thuế TNDN đối với số tín phiếu mà nhà đầu tư nhận được vào thời điểm đáo hạn: (100.000 – 92.400) x 150 = 1.140.000 (đồng)."},{"k":"p","t":"2. Tỷ lệ (%) thuế TNDN tính trên doanh thu tính thuế"},{"k":"p","t":"a) Tỷ lệ (%) thuế TNDN tính trên doanh thu tính thuế đối với ngành kinh doanh:"},{"k":"p","t":"STT"},{"k":"p","t":"Ngành kinh doanh"},{"k":"p","t":"Tỷ lệ (%) thuế TNDN tính trên doanh thu tính thuế"},{"k":"p","t":"1"},{"k":"p","t":"Thương mại: phân phối, cung cấp hàng hóa, nguyên liệu, vật tư, máy móc, thiết bị; phân phối, cung cấp hàng hóa, nguyên liệu, vật tư, máy móc, thiết bị gắn với dịch vụ tại Việt Nam {bao gồm cả cung cấp hàng hóa theo hình thức xuất nhập khẩu tại chỗ (trừ trường hợp gia công hàng hóa cho tổ chức, cá nhân nước ngoài); cung cấp hàng hóa theo điều kiện giao hàng của Các điều khoản thương mại quốc tế - Incoterms}"},{"k":"p","t":"1"},{"k":"p","t":"2"},{"k":"p","t":"Dịch vụ, cho thuê máy móc thiết bị, bảo hiểm, thuê giàn khoan"},{"k":"p","t":"5"},{"k":"p","t":"Riêng:"},{"k":"p","t":"- Dịch vụ quản lý nhà hàng, khách sạn, casino;"},{"k":"p","t":"10"},{"k":"p","t":"- Dịch vụ tài chính phái sinh"},{"k":"p","t":"2"},{"k":"p","t":"3"},{"k":"p","t":"Cho thuê tàu bay, động cơ tàu bay, phụ tùng tàu bay, tàu biển"},{"k":"p","t":"2"},{"k":"p","t":"4"},{"k":"p","t":"Xây dựng, lắp đặt có bao thầu hoặc không bao thầu nguyên vật liệu, máy móc, thiết bị"},{"k":"p","t":"2"},{"k":"p","t":"5"},{"k":"p","t":"Hoạt động sản xuất, kinh doanh khác, vận chuyển (bao gồm vận chuyển đường biển, vận chuyển hàng không)"},{"k":"p","t":"2"},{"k":"p","t":"6"},{"k":"p","t":"Chuyển nhượng chứng khoán, chứng chỉ tiền gửi, tái bảo hiểm ra nước ngoài, hoa hồng nhượng tái bảo hiểm"},{"k":"p","t":"0,1"},{"k":"p","t":"7"},{"k":"p","t":"Lãi tiền vay"},{"k":"p","t":"5"},{"k":"p","t":"8"},{"k":"p","t":"Thu nhập bản quyền"},{"k":"p","t":"10"},{"k":"p","t":"b) Tỷ lệ (%) thuế TNDN tính trên doanh thu tính thuế đối với một số trường hợp cụ thể:"},{"k":"p","t":"b.1) Đối với các hợp đồng nhà thầu, hợp đồng nhà thầu phụ bao gồm nhiều hoạt động kinh doanh khác nhau, việc áp dụng tỷ lệ thuế TNDN tính trên doanh thu tính thuế khi xác định số thuế TNDN phải nộp căn cứ vào doanh thu chịu thuế TNDN đối với từng hoạt động kinh doanh do Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài thực hiện theo quy định tại hợp đồng. Trường hợp không tách riêng được giá trị từng hoạt động kinh doanh thì áp dụng tỷ lệ thuế TNDN đối với ngành nghề kinh doanh có tỷ lệ thuế TNDN cao nhất cho toàn bộ giá trị hợp đồng."},{"k":"p","t":"Riêng đối với hoạt động xây dựng, lắp đặt có bao thầu nguyên vật liệu hoặc máy móc, thiết bị đi kèm công trình xây dựng: Trường hợp hợp đồng nhà thầu tách riêng giá trị từng hoạt động kinh doanh thì từng phần giá trị công việc theo hợp đồng được áp dụng tỷ lệ % thuế TNDN trên doanh thu tương ứng với hoạt động kinh doanh đó. Trường hợp hợp đồng nhà thầu không tách riêng giá trị từng hoạt động kinh doanh thì thì tỷ lệ % thuế TNDN tính trên doanh thu tính thuế là 2% trên toàn bộ giá trị hợp đồng. Trường hợp Nhà thầu nước ngoài ký hợp đồng với các Nhà thầu phụ để giao lại toàn bộ các phần giá trị công việc hoặc hạng mục có bao thầu nguyên vật liệu hoặc máy móc, thiết bị, Nhà thầu nước ngoài chỉ thực hiện phần giá trị dịch vụ còn lại theo hợp đồng nhà thầu thì tỷ lệ % thuế TNDN tính trên doanh thu tính thuế TNDN được áp dụng đối với ngành nghề dịch vụ (5%)."},{"k":"p","t":"Ví dụ 26:"},{"k":"p","t":"Nhà thầu nước ngoài A ký hợp đồng với Bên Việt Nam để xây dựng một nhà máy điện X với giá trị là 75 triệu USD (giá chưa bao gồm thuế GTGT, nhưng đã bao gồm thuế TNDN)."},{"k":"p","t":"Trường hợp 1: Hợp đồng nhà thầu tách riêng từng hoạt động kinh doanh như sau:"},{"k":"p","t":"+ Giá trị máy móc, thiết bị cung cấp cho công trình: 50 triệu USD."},{"k":"p","t":"Trong đó:"},{"k":"p","t":"Giá trị máy móc, thiết bị: 45 triệu USD"},{"k":"p","t":"Giá trị dịch vụ bảo hành đi kèm máy móc, thiết bị: 5 triệu USD"},{"k":"p","t":"+ Giá trị dịch vụ thiết kế dây chuyền công nghệ, thiết kế khác: 5 triệu USD."},{"k":"p","t":"+ Giá trị nhà xưởng, hệ thống phụ trợ khác, hoạt động xây dựng lắp đặt: 15 triệu USD."},{"k":"p","t":"+ Giá trị dịch vụ giám sát, hướng dẫn lắp đặt: 3 triệu USD."},{"k":"p","t":"+ Giá trị dịch vụ đào tạo kỹ thuật, vận hành thử: 2 triệu USD."},{"k":"p","t":"Tỷ lệ % thuế TNDN được áp dụng như sau: đối với giá trị máy móc thiết bị 45 triệu USD: 1%; đối với giá trị hoạt động xây dựng, lắp đặt 15 triệu USD: 2%; đối với giá trị các dịch vụ còn lại (dịch vụ bảo hành, thiết kế, dịch vụ giám sát, hướng dẫn lắp đặt, dịch vụ đào tạo kỹ thuật, vận hành thử) 15 triệu USD: 5%."},{"k":"p","t":"Trường hợp 2: Hợp đồng nhà thầu không tách riêng từng hoạt động kinh doanh thì tỷ lệ % thuế TNDN đối với toàn bộ giá trị hợp đồng 75 triệu áp dụng là 2%."},{"k":"p","t":"Trường hợp 3: Nhà thầu nước ngoài A ký hợp đồng với các Nhà thầu phụ để giao lại các phần công việc có bao thầu nguyên vật liệu, Nhà thầu nước ngoài A chỉ thực hiện phần giá trị dịch vụ (ví dụ như giá trị dịch vụ giám sát, hướng dẫn lắp đặt) thì phần giá trị dịch vụ này áp dụng tỷ lệ % thuế TNDN là 5%."},{"k":"p","t":"b.2) Đối với hợp đồng cung cấp máy móc thiết bị có kèm theo các dịch vụ thực hiện tại Việt Nam, nếu tách riêng được giá trị máy móc thiết bị và giá trị các dịch vụ thì tính thuế theo tỷ lệ thuế riêng của từng phần giá trị hợp đồng. Trường hợp trong hợp đồng không tách riêng được giá trị máy móc thiết bị và giá trị các dịch vụ thì áp dụng tỷ lệ thuế TNDN trên doanh thu tính thuế là 2%."},{"k":"p","t":"Ví dụ 27:"},{"k":"p","t":"Nhà thầu nước ngoài A ký hợp đồng với Bên Việt Nam để cung cấp 1 dây chuyền máy móc, thiết bị với giá trị là 70 triệu USD. Giá trị hợp đồng bao gồm:"},{"k":"p","t":"+ Giá trị máy móc, thiết bị cung cấp cho công trình: 60 triệu USD"},{"k":"p","t":"+ Giá trị thiết kế dây chuyền công nghệ, thiết kế khác: 5 triệu USD"},{"k":"p","t":"+ Giá trị dịch vụ giám sát, hướng dẫn lắp đặt: 3 triệu USD"},{"k":"p","t":"+ Giá trị dịch vụ đào tạo kỹ thuật, vận hành thử: 2 triệu USD."},{"k":"p","t":"Trong trường hợp tách riêng được phần giá trị máy móc thiết bị và giá trị dịch vụ này việc áp dụng tỷ lệ thuế TNDN như sau: đối với giá trị máy móc, thiết bị áp dụng tỷ lệ đối với ngành thương mại; đối với giá trị dịch vụ thiết kế, giám sát lắp đặt, đào tạo, vận hành thử áp dụng tỷ lệ đối với ngành dịch vụ."},{"k":"p","t":"Trường hợp không tách riêng được thì áp dụng tỷ lệ thuế TNDN là 2% trên toàn bộ giá trị hợp đồng (70 triệu USD)."},{"k":"p","t":"3. Thuế TNDN đối với khoản tiền bồi thường thu được từ bên đối tác vi phạm hợp đồng đối với trường hợp khoản thu bồi thường lớn hơn giá trị thiệt hại, có thu nhập chịu thuế:"},{"k":"p","t":"Đối với khoản thu nhập từ tiền bồi thường thiệt hại thu được, nhà thầu nước ngoài được lựa chọn khai nộp thuế TNDN theo tỷ lệ thuế TNDN tính trên doanh thu tính thuế hoặc trên cơ sở kê khai doanh thu, chi phí với thuế suất là thuế suất phổ thông."},{"k":"p","t":"(sau đây gọi tắt là phương pháp hỗn hợp)"}]},{"id":"tt103_14","no":14,"code":"Điều 14","title":"Điều 14. Đối tượng và điều kiện áp dụng","shortTitle":"Đối tượng và điều kiện áp dụng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 4. NỘP THUẾ GTGT THEO PHƯƠNG PHÁP KHẤU TRỪ, NỘP THUẾ TNDN THEO TỶ LỆ % TÍNH TRÊN DOANH THU","level":1,"content":[{"k":"p","t":"Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nếu đáp ứng đủ hai điều kiện nêu tại khoản 1 và khoản 2 Điều 8 Mục 2 Chương II và tổ chức hạch toán kế toán theo quy định của pháp luật về kế toán và hướng dẫn của Bộ Tài chính thì đăng ký với cơ quan thuế để thực hiện nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN theo tỷ lệ % tính trên doanh thu tính thuế."}]},{"id":"tt103_15","no":15,"code":"Điều 15","title":"Điều 15. Thuế giá trị gia tăng","shortTitle":"Thuế giá trị gia tăng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 4. NỘP THUẾ GTGT THEO PHƯƠNG PHÁP KHẤU TRỪ, NỘP THUẾ TNDN THEO TỶ LỆ % TÍNH TRÊN DOANH THU","level":1,"content":[{"k":"p","t":"Thực hiện theo hướng dẫn tại Điều 9 Mục 2 Chương II."}]},{"id":"tt103_16","no":16,"code":"Điều 16","title":"Điều 16. Thuế thu nhập doanh nghiệp","shortTitle":"Thuế thu nhập doanh nghiệp","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 4. NỘP THUẾ GTGT THEO PHƯƠNG PHÁP KHẤU TRỪ, NỘP THUẾ TNDN THEO TỶ LỆ % TÍNH TRÊN DOANH THU","level":1,"content":[{"k":"p","t":"Thực hiện theo hướng dẫn tại Điều 13 Mục 3 Chương II."}]},{"id":"tt103_17","no":17,"code":"Điều 17","title":"Điều 17. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/10/2014, thay thế Thông tư số 60/2012/TT-BTC ngày 12/4/2012 của Bộ Tài chính hướng dẫn thực hiện nghĩa vụ thuế áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam hoặc có thu nhập tại Việt Nam."},{"k":"p","t":"2. Trường hợp các Hợp đồng, Hợp đồng thầu phụ được ký kết trước ngày Thông tư này có hiệu lực thì việc xác định nghĩa vụ thuế GTGT, thuế TNDN tiếp tục thực hiện như hướng dẫn tại các văn bản quy phạm pháp luật tương ứng tại thời điểm ký kết hợp đồng."},{"k":"p","t":"3. Trường hợp tại Điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam ký kết hoặc tham gia có quy định về việc nộp thuế của Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài khác với các nội dung hướng dẫn tại Thông tư này thì thực hiện theo các quy định của Điều ước quốc tế đó."},{"k":"p","t":"Trong quá trình thực hiện nếu có vướng mắc, đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để nghiên cứu giải quyết./."},{"k":"p","t":"Nơi nhận:- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Quốc hội;- Văn phòng Chủ tịch nước;- Văn phòng Tổng Bí thư;- Viện Kiểm sát nhân dân tối cao;- Văn phòng BCĐ phòng chống tham nhũng trung ương;- Toà án nhân dân tối cao;- Kiểm toán nhà nước;- Các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ,- Cơ quan Trung ương của các đoàn thể;- Hội đồng nhân dân, Uỷ ban nhân dân, Sở Tài chính, Cục Thuế, Kho bạc nhà nước các tỉnh, thành phố trực thuộc Trung ương;- Công báo;- Cục Kiểm tra văn bản (Bộ Tư pháp);- Website Chính phủ;- Website Bộ Tài chính; Website Tổng cục Thuế;- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, TCT (VT, CS).Ngoc"},{"k":"p","t":"KT. BỘ TRƯỞNGTHỨ TRƯỞNGĐỗ Hoàng Anh Tuấn"},{"k":"p","t":"FILE ĐÍNH KÈM VĂN BẢN"},{"k":"p","t":"EMBED Word.Document.8 \\s"}]}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
