g; số, ngày văn bản đã thông báo cho cơ quan hải quan về sản phẩm xuất khẩu có tổng trị giá tài nguyên, khoáng sản cộng với chi phí năng lượng dưới 51% giá thành sản phẩm."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."}]},{"id":"tt86_19","no":19,"code":"Điều 19","title":"Điều 19. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."},{"k":"p","t":"2. Đối với hàng hóa kinh doanh tạm nhập tái xuất"},{"k":"p","t":"a) Việc bảo lãnh hoặc đặt cọc tiền thuế nhập khẩu thực hiện theo quy định tại Điều 4 Nghị định số 134/2016/NĐ-CP. Người nộp thuế phải có bảo lãnh của tổ chức tín dụng hoặc thực hiện đặt cọc vào tài khoản tiền gửi của cơ quan hải quan tại Kho bạc Nhà nước;"},{"k":"p","t":"b) Trường hợp chứng từ bảo lãnh hoặc chứng từ nộp tiền đặt cọc được lập dưới dạng điện tử, người nộp thuế khai thông tin về chứng từ bảo lãnh hoặc số chứng từ giấy nộp tiền trên tờ khai hải quan để cơ quan hải quan kiểm tra, đối chiếu. Trường hợp dưới dạng bản giấy, người nộp thuế gửi bản chụp kèm hồ sơ hải quan qua Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_20","no":20,"code":"Điều 20","title":"Điều 20. Hồ sơ, thủ tục miễn thuế nhập khẩu đối với hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng","shortTitle":"Hồ sơ, thủ tục miễn thuế nhập khẩu đối với hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Miễn thuế trước khi làm thủ tục hải quan"},{"k":"p","t":"a) Hồ sơ đề nghị miễn thuế"},{"k":"p","t":"a.1) Công văn đề nghị của Bộ Công an, Bộ Quốc phòng hoặc đơn vị được Bộ Công an, Bộ Quốc phòng ủy quyền, phân cấp theo Mẫu số 24 tại Phụ lục I Thông tư này: 01 bản chính;"},{"k":"p","t":"a.2) Giấy phép nhập khẩu hàng hóa của Bộ Công an, Bộ Quốc phòng hoặc đơn vị được Bộ Công an, Bộ Quốc phòng ủy quyền, phân cấp: 01 bản chính;"},{"k":"p","t":"a.3) Hợp đồng mua bán hàng hóa;"},{"k":"p","t":"a.4) Hợp đồng ủy thác nhập khẩu hoặc hợp đồng cung cấp hàng hóa theo văn bản trúng thầu hoặc văn bản chỉ định thầu, trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu đối với trường hợp nhập khẩu ủy thác, đấu thầu."},{"k":"p","t":"b) Thủ tục miễn thuế"},{"k":"p","t":"Bộ Công an, Bộ Quốc phòng hoặc đơn vị được Bộ Công an, Bộ Quốc phòng ủy quyền, phân cấp nộp hồ sơ đề nghị miễn thuế đến Cục Hải quan trước khi đăng ký tờ khai hải quan."},{"k":"p","t":"Trong thời hạn tối đa 03 ngày làm việc, kể từ ngày tiếp nhận đủ hồ sơ, Cục Hải quan có văn bản thông báo hàng hóa được miễn thuế hoặc không thuộc trường hợp miễn thuế hoặc yêu cầu bổ sung hồ sơ."},{"k":"p","t":"Trường hợp Thông báo miễn thuế của Cục Hải quan đã ban hành có nội dung cần điều chỉnh hoặc điều chỉnh theo đề nghị của Bộ Công an, Bộ Quốc phòng hoặc đơn vị được Bộ Công an, Bộ Quốc phòng ủy quyền, phân cấp, căn cứ vào văn bản đề nghị điều chỉnh (01 bản chính) và hồ sơ điều chỉnh kèm theo, Cục Hải quan thực hiện điều chỉnh Thông báo miễn thuế phù hợp với nội dung cần điều chỉnh, phù hợp với nội dung đề nghị điều chỉnh để làm cơ sở miễn thuế nhập khẩu theo quy định."},{"k":"p","t":"Trường hợp điều chỉnh thời hạn nhập khẩu trên Giấy phép nhập khẩu, Cục Hải quan không thông báo điều chỉnh thời hạn, cơ quan hải quan nơi doanh nghiệp đăng ký tờ khai nhập khẩu thực hiện theo văn bản điều chỉnh thời hạn của Bộ Công an, Bộ Quốc phòng hoặc đơn vị được Bộ Công an, Bộ Quốc phòng ủy quyền, phân cấp. Các nội dung khác thực hiện theo Thông báo miễn thuế."},{"k":"p","t":"Trường hợp việc tiếp nhận, xử lý hồ sơ miễn thuế của Cục Hải quan được thực hiện trên Hệ thống xử lý dữ liệu điện tử hải quan, người nộp thuế không phải nộp bản giấy các chứng từ trong hồ sơ đề nghị miễn thuế theo quy định."},{"k":"p","t":"2. Miễn thuế khi làm thủ tục hải quan"},{"k":"p","t":"a) Hồ sơ miễn thuế"},{"k":"p","t":"a.1) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"a.2) Thông báo miễn thuế; Thông báo điều chỉnh Thông báo miễn thuế (nếu có); Phiếu theo dõi trừ lùi để cơ quan hải quan thực hiện trừ lùi trong trường hợp nhập khẩu nhiều lần, nhiều chuyến."},{"k":"p","t":"b) Thủ tục miễn thuế"},{"k":"p","t":"Cơ quan hải quan nơi làm thủ tục căn cứ vào Thông báo miễn thuế, Thông báo điều chỉnh Thông báo miễn thuế (nếu có) của Cục Hải quan để thực hiện miễn thuế theo quy định."},{"k":"p","t":"Trường hợp Thông báo miễn thuế của Cục Hải quan được thực hiện trên Hệ thống xử lý dữ liệu điện tử hải quan, người nộp thuế không phải nộp Thông báo miễn thuế, cơ quan hải quan sử dụng Thông báo miễn thuế trên Hệ thống để thực hiện miễn thuế theo quy định."}]},{"id":"tt86_21","no":21,"code":"Điều 21","title":"Điều 21. Hồ sơ, thủ tục miễn thuế nhập khẩu hàng hóa nhập khẩu để phát triển khoa học, công nghệ, đổi mới sáng tạo, công nghiệp công nghệ số","shortTitle":"Hồ sơ, thủ tục miễn thuế nhập khẩu hàng hóa nhập khẩu để phát triển khoa học, công nghệ, đổi mới sáng tạo, công nghiệp công nghệ số","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."},{"k":"p","t":"Đối với hàng hóa nhập khẩu quy định tại điểm a khoản 21 Điều 16 Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi Luật số 90/2025/QH15 thực hiện theo quy định tại Điều 28 Thông tư này và tài liệu khác có liên quan đến hàng hóa nhập khẩu được miễn thuế theo quy định tại khoản 2 Điều 24 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 182/2025/NĐ-CP (nếu có)."}]},{"id":"tt86_22","no":22,"code":"Điều 22","title":"Điều 22. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hàng hóa xuất khẩu"},{"k":"p","t":"a.1) Bảng kê khai thông tin, nội dung miễn thuế xuất khẩu đối với sản phẩm được sản xuất từ hoạt động tái chế, xử lý chất thải theo Phụ lục XXXIa ban hành kèm theo Nghị định số 08/2022/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 05/2025/NĐ-CP quy định chi tiết một số điều của Luật Bảo vệ môi trường;"},{"k":"p","t":"a.2) Giấy phép môi trường hoặc Giấy phép môi trường thành phần;"},{"k":"p","t":"a.3) Hợp đồng hoặc tài liệu chứng minh điều kiện bảo đảm chất lượng hàng hóa xuất khẩu theo quy định của pháp luật về chất lượng sản phẩm, hàng hóa;"},{"k":"p","t":"a.4) Giấy chứng nhận đăng ký đầu tư hoặc văn bản chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc văn bản cho phép đầu tư theo quy định của pháp luật chuyên ngành, trừ trường hợp miễn thuế quy định tại khoản 15 Điều 16 Luật số 107/2016/QH13."},{"k":"p","t":"Đối với các dự án đầu tư không thuộc diện phải cấp Giấy chứng nhận đăng ký đầu tư, chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc cho phép đầu tư theo quy định của pháp luật chuyên ngành thì việc xác định dự án đầu tư mới căn cứ vào Báo cáo của nhà đầu tư theo quy định của pháp luật về đầu tư gửi cơ quan đăng ký đầu tư theo quy định của pháp luật về đầu tư."},{"k":"p","t":"b) Hàng hóa nhập khẩu"},{"k":"p","t":"b.1) Bảng kê khai thông tin, nội dung miễn thuế nhập khẩu đối với máy móc, thiết bị phương tiện, dụng cụ, vật tư chuyên dùng để sử dụng trong công trình xử lý chất thải, bảo vệ môi trường theo Phụ lục XXXIb ban hành kèm theo Nghị định số 08/2022/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 05/2025/NĐ-CP;"},{"k":"p","t":"b.2) Giấy chứng nhận đăng ký đầu tư hoặc văn bản chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc văn bản cho phép đầu tư theo quy định của pháp luật chuyên ngành, trừ trường hợp miễn thuế quy định tại khoản 15 Điều 16 Luật số 107/2016/QH13."},{"k":"p","t":"Đối với các dự án đầu tư không thuộc diện phải cấp Giấy chứng nhận đăng ký đầu tư, chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc cho phép đầu tư theo quy định của pháp luật chuyên ngành thì việc xác định dự án đầu tư mới căn cứ vào Báo cáo của nhà đầu tư theo quy định của pháp luật về đầu tư gửi cơ quan đăng ký đầu tư theo quy định của pháp luật về đầu tư."},{"k":"p","t":"b.3) Báo cáo nghiên cứu khả thi hoặc tài liệu tương đương với báo cáo nghiên cứu khả thi của dự án đầu tư theo quy định của pháp luật về đầu tư, đầu tư công, đầu tư theo phương thức đối tác công tư, xây dựng (trong đó, có danh mục máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng để sử dụng trong công trình xử lý chất thải, bảo vệ môi trường) đã được cấp có thẩm quyền phê duyệt theo quy định của pháp luật;"},{"k":"p","t":"b.4) Giấy phép môi trường hoặc Giấy phép môi trường thành phần hoặc Quyết định phê duyệt kết quả thẩm định báo cáo đánh giá tác động môi trường trong trường hợp dự án, cơ sở chưa có Giấy phép môi trường, giấy phép môi trường thành phần;"},{"k":"p","t":"b.5) Hợp đồng hoặc chứng từ mua bán hàng hóa (trong đó có danh mục máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng để sử dụng trong công trình xử lý chất thải, bảo vệ môi trường) phục vụ triển khai dự án, cơ sở thực hiện dịch vụ thu gom, vận chuyển, xử lý chất thải rắn sinh hoạt tập trung và dịch vụ xử lý nước thải sinh hoạt tập trung;"},{"k":"p","t":"b.6) Thông tin, số liệu về máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng đề nghị miễn thuế nhập khẩu không thuộc Danh mục máy móc, thiết bị, phụ tùng thay thế, phương tiện vận tải chuyên dùng, nguyên liệu, vật tư, bán thành phẩm trong nước đã sản xuất được do Bộ Tài chính ban hành."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."}]},{"id":"tt86_23","no":23,"code":"Điều 23","title":"Điều 23. Hồ sơ, thủ tục miễn thuế nhập khẩu hàng hóa phục vụ hoạt động in, đúc tiền","shortTitle":"Hồ sơ, thủ tục miễn thuế nhập khẩu hàng hóa phục vụ hoạt động in, đúc tiền","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật về hải quan;"},{"k":"p","t":"b) Văn bản của Ngân hàng Nhà nước cho phép tổ chức được phép nhập khẩu máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng phục vụ hoạt động in, đúc tiền."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."}]},{"id":"tt86_24","no":24,"code":"Điều 24","title":"Điều 24. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hồ sơ đề nghị miễn thuế trước khi làm thủ tục hải quan đối với hàng hóa nhập khẩu để khắc phục hậu quả thiên tai, thảm họa, dịch bệnh, gồm:"},{"k":"p","t":"a.1) Công văn đề nghị miễn thuế của Ủy ban nhân dân cấp tỉnh, thành phố hoặc Bộ hoặc cấp tương đương trong đó nêu rõ tình hình thiệt hại do thiên tai, thảm họa, dịch bệnh gây ra trên địa bàn: 01 bản chính;"},{"k":"p","t":"a.2) Danh mục hàng hóa nhập khẩu trực tiếp phục vụ khắc phục hậu quả thiên tai, thảm họa, dịch bệnh theo Mẫu số 25 tại Phụ lục I Thông tư này."},{"k":"p","t":"b) Hồ sơ đề nghị miễn thuế trước khi làm thủ tục hải quan đối với hàng hóa nhập khẩu phục vụ trực tiếp đảm bảo an sinh xã hội, gồm:"},{"k":"p","t":"b.1) Công văn đề nghị miễn thuế của Ủy ban nhân dân cấp tỉnh, thành phố hoặc Bộ hoặc cấp tương đương: 01 bản chính;"},{"k":"p","t":"b.2) Danh mục hàng hóa nhập khẩu trực tiếp phục vụ đảm bảo an sinh xã hội theo Mẫu số 25 tại Phụ lục I Thông tư này: 01 bản chính."},{"k":"p","t":"c) Hồ sơ đề nghị miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu trong các trường hợp đặc biệt khác, gồm:"},{"k":"p","t":"c.1) Công văn đề nghị miễn thuế xuất khẩu, thuế nhập khẩu của Bộ, cơ quan ngang Bộ, Ủy ban nhân dân cấp tỉnh, thành phố hoặc tổ chức, cá nhân, trong đó nêu rõ lý do, số lượng, chủng loại và trị giá hàng hóa, số tiền thuế đề nghị được miễn thuế: 01 bản chính;"},{"k":"p","t":"c.2) Danh mục hàng hóa xuất khẩu, nhập khẩu đề nghị được miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 25 tại Phụ lục I Thông tư này: 01 bản chính."},{"k":"p","t":"d) Hồ sơ đề nghị miễn thuế đối với hàng hóa nhập khẩu để trực tiếp phục vụ yêu cầu cứu trợ khẩn cấp khi xảy ra thiên tai, thảm họa, dịch bệnh, gồm:"},{"k":"p","t":"d.1) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"d.2) Văn bản xác nhận của Ủy ban nhân dân cấp tỉnh, thành phố hoặc Bộ hoặc cấp tương đương về việc nhập khẩu hàng hóa phục vụ yêu cầu cứu trợ khẩn cấp, trong đó nêu rõ tình hình thiệt hại do thiên tai, thảm họa, dịch bệnh gây ra trên địa bàn: 01 bản chính;"},{"k":"p","t":"d.3) Danh mục hàng hóa nhập khẩu trực tiếp phục vụ cứu trợ khẩn cấp: 01 bản chính."},{"k":"p","t":"2. Thủ tục miễn thuế"},{"k":"p","t":"a) Người nộp thuế nộp hồ sơ đề nghị miễn thuế theo quy định tại các điểm a, điểm b và điểm c khoản 1 Điều này gửi Bộ Tài chính. Trong thời hạn 30 ngày kể từ ngày nhận đủ hồ sơ đề nghị miễn thuế, Bộ Tài chính thẩm định hồ sơ đề nghị miễn thuế, báo cáo Thủ tướng Chính phủ kèm dự thảo quyết định miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 26 tại Phụ lục I Thông tư này và Danh mục hàng hóa đề nghị miễn thuế (nếu có). Đối với trường hợp đặc biệt khác cần xin ý kiến các Bộ, ngành liên quan, thời hạn thẩm định hồ sơ có thể kéo dài nhưng không quá 40 ngày kể từ ngày nhận đủ hồ sơ đề nghị miễn thuế."},{"k":"p","t":"Căn cứ Quyết định miễn thuế của Thủ tướng Chính phủ, hồ sơ hải quan theo quy định của pháp luật về hải quan, cơ quan hải quan nơi làm thủ tục xuất khẩu, nhập khẩu hàng hóa thực hiện miễn thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"b) Đối với hàng hóa nhập khẩu để trực tiếp phục vụ yêu cầu cứu trợ khẩn cấp khi xảy ra thiên tai, thảm họa, dịch bệnh, trên cơ sở hồ sơ đề nghị miễn thuế quy định tại điểm d khoản 1 Điều này, cơ quan hải quan nơi làm thủ tục hải quan giải quyết miễn thuế khi làm thủ tục hải quan."}]},{"id":"tt86_25","no":25,"code":"Điều 25","title":"Điều 25. Hồ sơ, thủ tục miễn thuế xuất khẩu đối với mặt hàng trầm hương được sản xuất từ cây Dó bầu trồng và mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu đối với mặt hàng trầm hương được sản xuất từ cây Dó bầu trồng và mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này. Đối với mặt hàng da trăn có nguồn gốc từ gây nuôi sinh sản, người nộp thuế nộp thêm các chứng từ sau:"},{"k":"p","t":"a) Giấy chứng nhận đăng ký trại nuôi sinh sản động vật hoang dã do cơ quan Kiểm lâm địa phương hoặc cơ quan do Bộ Nông nghiệp và Môi trường chỉ định cấp;"},{"k":"p","t":"b) Giấy xác nhận số lượng trăn được giết mổ có nguồn gốc từ gây nuôi sinh sản do cơ quan Kiểm lâm địa phương xác nhận mỗi lần làm thủ tục xuất khẩu."}]},{"id":"tt86_26","no":26,"code":"Điều 26","title":"Điều 26. Hồ sơ, thủ tục miễn thuế nhập khẩu đối với sản phẩm nông sản chưa qua chế biến do phía Việt Nam hỗ trợ đầu tư, trồng tại Campuchia nhập khẩu về nước","shortTitle":"Hồ sơ, thủ tục miễn thuế nhập khẩu đối với sản phẩm nông sản chưa qua chế biến do phía Việt Nam hỗ trợ đầu tư, trồng tại Campuchia nhập khẩu về nước","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng năm, người nộp thuế thông báo Danh mục miễn thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan gửi Chi cục Hải quan khu vực tiếp giáp biên giới Campuchia. Trường hợp thông báo Danh mục miễn thuế bằng giấy, người nộp thuế thông báo cho Chi cục Hải quan khu vực tiếp giáp biên giới Campuchia theo quy định tại Điều 13 Thông tư này."},{"k":"p","t":"Ngoài hồ sơ thông báo Danh mục miễn thuế theo quy định tại khoản 3 Điều 13 Thông tư này, người nộp thuế là doanh nghiệp nộp thêm các chứng từ sau:"},{"k":"p","t":"a) Văn bản xác nhận cho phép đầu tư của cơ quan có thẩm quyền tại Campuchia nơi doanh nghiệp Việt Nam đầu tư: 01 bản chụp kèm 01 bản dịch tiếng Việt;"},{"k":"p","t":"b) Hợp đồng hoặc Thỏa thuận ký kết với phía Campuchia về việc hỗ trợ đầu tư, trồng và nhận lại nông sản, trong đó ghi rõ số tiền, hàng đầu tư vào từng lĩnh vực và tương ứng là số lượng, chủng loại, trị giá từng loại nông sản sẽ thu hoạch được: 01 bản chụp kèm 01 bản dịch tiếng Việt;"},{"k":"p","t":"c) Chứng từ liên quan đến việc hỗ trợ đầu tư, trồng nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam (nếu có)."},{"k":"p","t":"2. Trên cơ sở Danh mục miễn thuế đã thông báo cho cơ quan hải quan, người nộp thuế thực hiện thủ tục miễn thuế đối với hàng hóa nhập khẩu theo quy định tại Điều 28 Thông tư này."},{"k":"p","t":"Cơ quan hải quan căn cứ hồ sơ thông báo Danh mục miễn thuế, danh sách hộ gia đình, hộ kinh doanh, cá nhân hỗ trợ đầu tư, trồng sản phẩm nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam do Ủy ban nhân dân cấp tỉnh nơi hộ gia đình, hộ kinh doanh, cá nhân cư trú công bố hàng năm, kiểm tra, đối chiếu với hàng hóa thực tế nhập khẩu để xử lý miễn thuế nhập khẩu cho từng lô hàng nhập khẩu."},{"k":"p","t":"Ủy ban nhân dân tỉnh, thành phố tiếp giáp biên giới Việt Nam - Campuchia công bố danh sách hộ gia đình, hộ kinh doanh, cá nhân cư trú tại tỉnh có hoạt động đầu tư, trồng sản phẩm nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam hàng năm theo Mẫu số 27 tại Phụ lục I Thông tư này trên trang thông tin điện tử của Ủy ban nhân dân tỉnh; đồng thời gửi Chi cục Hải quan khu vực và các Hải quan cửa khẩu/ngoài cửa khẩu thuộc các tỉnh tiếp giáp biên giới Campuchia. Trường hợp có sự thay đổi các tiêu chí trong văn bản đã công bố phải ban hành văn bản điều chỉnh cho phù hợp."}]},{"id":"tt86_27","no":27,"code":"Điều 27","title":"Điều 27. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Thủ tục xác nhận trong trường hợp điều ước quốc tế không quy định chủng loại, định lượng hàng hóa miễn thuế"},{"k":"p","t":"a) Tổ chức, cá nhân sử dụng hàng hóa miễn thuế có công văn đề nghị cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế hoặc cơ quan quản lý chuyên ngành xác nhận chủng loại, định lượng hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 28 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Trong thời hạn 15 ngày kể từ ngày nhận được công văn đề nghị, cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế, cơ quan quản lý chuyên ngành có văn bản xác nhận chủng loại, định lượng hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu theo Mẫu số 29 tại Phụ lục I Thông tư này gửi tổ chức, cá nhân hoặc có văn bản từ chối trong trường hợp hàng hóa đề nghị miễn thuế không phù hợp với điều ước quốc tế."},{"k":"p","t":"2. Thông báo danh sách hàng hóa xuất khẩu, nhập khẩu miễn thuế"},{"k":"p","t":"a) Trước khi đăng ký tờ khai hải quan hàng hóa xuất khẩu, nhập khẩu miễn thuế đầu tiên, tổ chức, cá nhân thực hiện thông báo danh sách hàng hóa xuất khẩu, nhập khẩu miễn thuế (sau đây gọi chung là danh sách hàng hóa miễn thuế);"},{"k":"p","t":"b) Địa điểm tiếp nhận thông báo danh sách hàng hóa miễn thuế"},{"k":"p","t":"Tổ chức, cá nhân sử dụng hàng hóa xuất khẩu, nhập khẩu miễn thuế gửi thông báo danh sách hàng hóa miễn thuế đến Chi cục Hải quan khu vực nơi thực hiện dự án hoặc nơi sử dụng hàng hóa xuất khẩu, nhập khẩu miễn thuế hoặc nơi quản lý tập trung đối với trường hợp hàng hóa xuất khẩu, nhập khẩu miễn thuế được sử dụng ở nhiều tỉnh, thành phố."},{"k":"p","t":"c) Hồ sơ thông báo danh sách hàng hóa miễn thuế"},{"k":"p","t":"c.1) Công văn thông báo danh sách hàng hóa miễn thuế theo Mẫu số 17 tại Phụ lục I Thông tư này;"},{"k":"p","t":"c.2) Danh sách hàng hóa miễn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 7a tại Phụ lục II Thông tư này. Trường hợp hệ thống gặp sự cố, tổ chức, cá nhân nộp 02 bản chính theo Mẫu số 18 tại Phụ lục I Thông tư này và 01 bản chính Phiếu theo dõi trừ lùi theo Mẫu số 19 tại Phụ lục I Thông tư này."},{"k":"p","t":"Trường hợp máy móc thiết bị phải xuất khẩu, nhập khẩu làm nhiều chuyến, không trừ lùi được số lượng tại thời điểm xuất khẩu, nhập khẩu, tổ chức, cá nhân nộp 02 bản chính danh sách hàng hóa miễn thuế (bản giấy) theo Mẫu số 18 tại Phụ lục I Thông tư này."},{"k":"p","t":"Danh sách hàng hóa miễn thuế được xây dựng thống nhất với điều ước quốc tế hoặc văn bản xác nhận chủng loại, định lượng miễn thuế của cơ quan đề xuất ký kết hoặc gia nhập điều ước quốc tế, cơ quan quản lý chuyên ngành."},{"k":"p","t":"c.3) Điều ước quốc tế đối với trường hợp điều ước quốc tế quy định chủng loại, định lượng hàng hóa miễn thuế;"},{"k":"p","t":"c.4) Văn bản xác nhận chủng loại, định lượng hàng hóa miễn thuế xuất khẩu, thuế nhập khẩu trong trường hợp điều ước quốc tế không quy định chủng loại, định lượng hàng hóa miễn thuế theo Mẫu số 29 tại Phụ lục I Thông tư này."},{"k":"p","t":"Trường hợp các chứng từ quy định tại khoản này được cơ quan quản lý nhà nước chuyên ngành gửi dưới dạng điện tử thông qua Cổng thông tin một cửa quốc gia, cơ sở dữ liệu quốc gia thì tổ chức, cá nhân không phải nộp khi thông báo danh sách hàng hóa miễn thuế cho cơ quan hải quan."},{"k":"p","t":"d) Trường hợp tổ chức, cá nhân không trực tiếp xuất khẩu, nhập khẩu hàng hóa miễn thuế mà nhà thầu chính hoặc nhà thầu phụ hoặc công ty cho thuê tài chính xuất khẩu, nhập khẩu hàng hóa thì nhà thầu, công ty cho thuê tài chính được sử dụng danh sách hàng hóa miễn thuế do tổ chức, cá nhân đã thông báo với cơ quan hải quan;"},{"k":"p","t":"đ) Trình tự, thủ tục thông báo danh sách hàng hóa miễn thuế thực hiện như đối với thông báo Danh mục miễn thuế quy định tại Điều 13 Thông tư này;"},{"k":"p","t":"e) Việc sửa đổi, điều chỉnh danh sách hàng hóa miễn thuế; trách nhiệm của cơ quan hải quan nơi tiếp nhận danh sách hàng hóa miễn thuế; trách nhiệm của tổ chức, cá nhân thông báo danh sách hàng hóa miễn thuế thực hiện theo quy định tại khoản 5, 6 và 7 Điều 13 Thông tư này."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."}]},{"id":"tt86_28","no":28,"code":"Điều 28","title":"Điều 28. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu khi làm thủ tục hải quan","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu khi làm thủ tục hải quan","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế là hồ sơ hải quan theo quy định tại Luật số 54/2015/QH13 và các văn bản hướng dẫn thi hành."},{"k":"p","t":"2. Tùy từng trường hợp, người nộp thuế nộp thêm một trong các chứng từ sau:"},{"k":"p","t":"a) Hợp đồng ủy thác trong trường hợp ủy thác xuất khẩu, nhập khẩu hàng hóa;"},{"k":"p","t":"b) Hợp đồng cung cấp hàng hóa theo văn bản trúng thầu hoặc văn bản chỉ định thầu trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu;"},{"k":"p","t":"c) Hợp đồng cung cấp hàng hóa cho tổ chức, cá nhân tiến hành hoạt động dầu khí trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu trong trường hợp tổ chức, cá nhân nhập khẩu hàng hóa cho hoạt động dầu khí;"},{"k":"p","t":"d) Hợp đồng cho thuê tài chính trong trường hợp Công ty cho thuê tài chính nhập khẩu hàng hóa cung cấp cho đối tượng được hưởng ưu đãi miễn thuế, trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu;"},{"k":"p","t":"đ) Chứng từ chuyển nhượng hàng hóa thuộc đối tượng miễn thuế đối với trường hợp hàng hóa thuộc đối tượng miễn thuế chuyển nhượng cho đối tượng miễn thuế khác, trong đó ghi rõ giá chuyển nhượng hàng hóa không bao gồm thuế nhập khẩu;"},{"k":"p","t":"e) Danh mục miễn thuế đã được cơ quan hải quan tiếp nhận đối với trường hợp thông báo Danh mục miễn thuế bằng giấy kèm Phiếu theo dõi trừ lùi đã được cơ quan hải quan tiếp nhận."},{"k":"p","t":"Trường hợp thông báo Danh mục miễn thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan, người nộp thuế không phải nộp Danh mục miễn thuế, cơ quan hải quan sử dụng Danh mục miễn thuế trên Hệ thống xử lý dữ liệu điện tử hải quan để thực hiện miễn thuế theo quy định."},{"k":"p","t":"g) Quyết định miễn thuế của Thủ tướng Chính phủ đối với trường hợp quy định tại các điểm a, điểm b và điểm đ khoản 1 Điều 28 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP;"},{"k":"p","t":"h) Người nộp thuế tự kê khai và chịu trách nhiệm đối với hàng hóa nhập khẩu miễn thuế là phương tiện vận tải chuyên dùng quy định tại điểm b khoản 11, điểm a khoản 15 và điểm a khoản 16 Điều 16 Luật số 107/2016/QH13."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hành lý của người xuất cảnh, nhập cảnh; hàng hóa có trị giá tối thiểu, hàng hóa gửi qua dịch vụ bưu chính, chuyển phát nhanh thực hiện theo quy định tại khoản 1, khoản 7 Điều này."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế nhập khẩu đối với hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư; nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được nhập khẩu để sản xuất trong thời hạn 05 năm; hàng hóa nhập khẩu phục vụ hoạt động dầu khí; hàng hóa nhập khẩu phục vụ hoạt động đóng tàu, tàu biển xuất khẩu; hàng hóa nhập khẩu giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật; nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất, lắp ráp trang thiết bị y tế thực hiện theo quy định tại Điều 13; khoản 1, 2 và 7 Điều này."},{"k":"p","t":"5. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa nhập khẩu để gia công, sản phẩm gia công xuất khẩu; hàng hóa nhập khẩu để sản xuất hàng hóa xuất khẩu; hàng hóa phục vụ trực tiếp cho giáo dục; hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan; hàng hóa nhập khẩu không nhằm mục đích thương mại thực hiện theo quy định tại khoản 1, 2 và 7 Điều này."},{"k":"p","t":"6. Khi làm thủ tục xuất khẩu tại chỗ đối với sản phẩm gia công, sản phẩm sản xuất xuất khẩu được gia công, sản xuất từ hàng hóa nhập khẩu miễn thuế theo quy định tại điểm g khoản 2 Điều 10, điểm e khoản 2 Điều 12 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP, ngoài hồ sơ miễn thuế theo quy định tại khoản 1 Điều này, người xuất khẩu tại chỗ phải nộp thêm văn bản chỉ định giao hàng hóa tại Việt Nam của tổ chức, cá nhân nước ngoài."},{"k":"p","t":"Người xuất khẩu tại chỗ thông báo thông tin về tờ khai hải quan của sản phẩm nhập khẩu tại chỗ tương ứng đã hoàn thành thủ tục hải quan cho cơ quan hải quan nơi làm thủ tục xuất khẩu theo quy định tại Điều 86 Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 121/2025/TT-BTC thông qua Hệ thống xử lý dữ liệu điện tử hải quan, trường hợp chưa thông báo được qua Hệ thống người nộp thuế thông báo theo Mẫu số 30 Phụ lục I Thông tư này."},{"k":"p","t":"7. Thủ tục miễn thuế"},{"k":"p","t":"a) Người nộp thuế tự xác định, khai hàng hóa và số tiền thuế được miễn thuế (trừ việc kê khai số tiền thuế phải nộp đối với hàng hóa xuất khẩu, nhập khẩu để gia công do bên thuê gia công cung cấp) trên tờ khai hải quan khi làm thủ tục hải quan, chịu trách nhiệm trước pháp luật về nội dung khai báo;"},{"k":"p","t":"b) Cơ quan hải quan nơi làm thủ tục hải quan căn cứ hồ sơ miễn thuế, đối chiếu với các quy định hiện hành để thực hiện miễn thuế theo quy định."},{"k":"p","t":"Trường hợp cơ quan hải quan xác định hàng hóa nhập khẩu không thuộc đối tượng miễn thuế như khai báo thì thu thuế và xử phạt vi phạm (nếu có) theo quy định."},{"k":"p","t":"c) Hệ thống xử lý dữ liệu điện tử hải quan tự động trừ lùi số lượng hàng hóa xuất khẩu, nhập khẩu tương ứng với số lượng hàng hóa trong Danh mục miễn thuế."},{"k":"p","t":"Trường hợp thông báo Danh mục miễn thuế bản giấy, cơ quan hải quan thực hiện cập nhật và trừ lùi số lượng hàng hóa đã xuất khẩu, nhập khẩu tương ứng với số lượng hàng hóa trong Danh mục miễn thuế."},{"k":"p","t":"Trường hợp nhập khẩu hàng hóa miễn thuế theo tổ hợp, dây chuyền, người nộp thuế phải làm thủ tục hải quan tại cơ quan hải quan nơi lắp đặt máy móc, thiết bị. Tại thời điểm đăng ký tờ khai hải quan, người nộp thuế kê khai chi tiết hàng hóa trên tờ khai hải quan. Trường hợp không kê khai chi tiết được trên tờ khai hải quan, người nộp thuế lập bảng kê chi tiết về hàng hóa nhập khẩu theo Mẫu số 8 tại Phụ lục II Thông tư này thông qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc theo Mẫu số 31 tại Phụ lục I Thông tư này và đính kèm tờ khai hải quan."},{"k":"p","t":"8. Thủ tục miễn thuế đối với hàng hóa vượt định mức miễn thuế của tổ chức theo quy định tại khoản 2 Điều 7 Nghị định số 134/2016/NĐ-CP"},{"k":"p","t":"a) Hồ sơ đề nghị miễn thuế được gửi đến Cục Hải quan chậm nhất 15 ngày làm việc trước khi làm thủ tục hải quan;"},{"k":"p","t":"b) Trường hợp hồ sơ đề nghị miễn thuế chưa đầy đủ, trong thời hạn tối đa 05 ngày làm việc, kể từ ngày tiếp nhận hồ sơ, Cục Hải quan phải thông báo cho tổ chức, cá nhân để hoàn chỉnh hồ sơ;"},{"k":"p","t":"c) Trong thời hạn chậm nhất 15 ngày làm việc, kể từ ngày tiếp nhận đủ hồ sơ, Bộ Tài chính ban hành quyết định miễn thuế hoặc thông báo không miễn thuế trên cơ sở đề xuất của Cục Hải quan;"},{"k":"p","t":"d) Căn cứ hồ sơ hải quan và quyết định miễn thuế của Bộ Tài chính, cơ quan hải quan nơi làm thủ tục hải quan thực hiện thủ tục miễn thuế khi làm thủ tục hải quan theo quy định tại khoản 3 Điều này."},{"k":"p","t":"9. Thủ tục miễn thuế nhập khẩu đối với các trường hợp đặc thù"},{"k":"p","t":"a) Người nộp thuế được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu để tạo tài sản cố định cho dự án theo quy định tại Điều 16 Luật số 107/2016/QH13 nhưng không nhập khẩu hàng hóa mà được phép tiếp nhận hàng hóa đã được miễn thuế nhập khẩu từ tổ chức, cá nhân khác chuyển nhượng tại Việt Nam thì người nộp thuế thực hiện đăng ký tờ khai hải quan mới đối với hàng hóa nhận chuyển nhượng và được miễn thuế nhập khẩu với điều kiện giá chuyển nhượng không bao gồm thuế nhập khẩu. Tổ chức, cá nhân chuyển nhượng hàng hóa không phải nộp lại số thuế nhập khẩu đã được miễn;"},{"k":"p","t":"b) Tổ chức, cá nhân nhập khẩu ủy thác hoặc trúng thầu nhập khẩu hàng hóa để cung cấp cho đối tượng quy định tại Điều 16 Luật số 107/2016/QH13 được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu ủy thác, trúng thầu với điều kiện giá cung cấp hàng hóa theo hợp đồng ủy thác hoặc giá trúng thầu theo quyết định trúng thầu không bao gồm thuế nhập khẩu;"},{"k":"p","t":"c) Công ty cho thuê tài chính nhập khẩu hàng hóa để cung cấp cho đối tượng quy định tại Điều 14, Điều 16, Điều 17, Điều 25 Nghị định số 134/2016/NĐ-CP và điểm a khoản 21 Điều 16 Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi Luật số 90/2025/QH15 thuê tài chính được miễn thuế nhập khẩu với điều kiện giá cho thuê không bao gồm thuế nhập khẩu. Trường hợp hàng hóa nhập khẩu cho thuê tài chính không sử dụng đúng mục đích miễn thuế thì công ty cho thuê tài chính phải đăng ký tờ khai hải quan mới, nộp thuế tại thời điểm đăng ký tờ khai mới. Trường hợp không đăng ký tờ khai hải quan mới, cơ quan hải quan thực hiện ấn định thuế theo quy định;"},{"k":"p","t":"d) Trường hợp chuyển nhượng toàn bộ hoặc một phần dự án thuộc đối tượng ưu đãi đầu tư cho tổ chức, cá nhân khác, chủ dự án thông báo các chỉ tiêu thông tin quy định tại Mẫu số 9 tại Phụ lục II Thông tư này thông qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc theo Mẫu số 32 tại Phụ lục I Thông tư này cho cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế trước khi chuyển nhượng dự án và không phải nộp lại số tiền thuế nhập khẩu đã được miễn đối với hàng hóa chuyển nhượng theo dự án."},{"k":"p","t":"Tổ chức, cá nhân nhận chuyển nhượng dự án phải đăng ký tờ khai hải quan mới đối với hàng hóa nhận chuyển nhượng và được miễn thuế nhập khẩu nếu tại thời điểm chuyển nhượng dự án đầu tư vẫn thuộc đối tượng ưu đãi đầu tư theo quy định của pháp luật đầu tư. Thời hạn thực hiện đăng ký tờ khai hải quan mới chậm nhất là 60 ngày kể từ ngày được cấp Giấy chứng nhận đầu tư điều chỉnh hoặc Quyết định chấp thuận điều chỉnh chủ trương đầu tư hoặc chậm nhất là 60 ngày kể từ ngày ký hợp đồng chuyển nhượng, văn bản thỏa thuận chuyển nhượng toàn bộ hoặc một phần dự án đối với trường hợp dự án không thuộc diện chấp thuận chủ trương đầu tư, cấp Giấy chứng nhận đăng ký đầu tư."},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế của chủ dự án chuyển nhượng dừng sử dụng Danh mục miễn thuế trên Hệ thống hoặc thu hồi Danh mục miễn thuế bản giấy và Phiếu theo dõi trừ lùi của chủ dự án chuyển nhượng; tiếp nhận Danh mục miễn thuế đối với số lượng hàng hóa chủ dự án chuyển nhượng chưa nhập khẩu hết."},{"k":"p","t":"Trường hợp chuyển nhượng toàn bộ dự án nhưng chủ dự án chưa nhập khẩu hết hàng hóa theo Danh mục miễn thuế hoặc chuyển nhượng một phần dự án nhưng chủ dự án chưa nhập khẩu hết hàng hóa theo Danh mục miễn thuế thuộc phần dự án chuyển nhượng, tổ chức, cá nhân nhận chuyển nhượng thông báo Danh mục miễn thuế đối với hàng hóa chưa nhập khẩu hết thuộc dự án hoặc phần dự án chuyển nhượng."},{"k":"p","t":"Trường hợp chuyển nhượng một phần dự án mà chủ dự án chưa nhập khẩu hết hàng hóa theo Danh mục miễn thuế thuộc phần dự án tiếp tục thực hiện, chủ dự án chuyển nhượng thực hiện thông báo Danh mục miễn thuế đối với số lượng hàng hóa chưa nhập khẩu hết thuộc phần dự án tiếp tục thực hiện."},{"k":"p","t":"đ) Hàng hóa nhập khẩu đã được miễn thuế nhập khẩu để tạo tài sản cố định của dự án ưu đãi đầu tư được sử dụng cho dự án ưu đãi đầu tư khác của cùng chủ dự án thì chủ đầu tư đăng ký tờ khai hải quan mới đối với số hàng hóa điều chuyển và được miễn thuế nhập khẩu nếu đáp ứng các điều kiện sau: Giá của hàng hóa nhập khẩu được điều chuyển không bao gồm thuế nhập khẩu; phù hợp với lĩnh vực, quy mô của dự án ưu đãi đầu tư tiếp nhận; đáp ứng quy định về tài sản cố định; có tên trong Danh mục miễn thuế của dự án tiếp nhận đã thông báo cho cơ quan hải quan."},{"k":"p","t":"Hàng hóa tiếp nhận được trừ lùi trên Danh mục miễn thuế của dự án tiếp nhận đã thông báo với cơ quan hải quan. Chủ dự án điều chuyển được nhập khẩu bổ sung số lượng hàng hóa thay thế hàng hóa đã điều chuyển. Chủ dự án điều chuyển thực hiện thông báo bổ sung Danh mục miễn thuế theo quy định tại khoản 5 Điều 13 Thông tư này."},{"k":"p","t":"e) Hàng hóa nhập khẩu thuộc các trường hợp quy định tại Điều 16 (trừ trường hợp quy định tại khoản 6, khoản 7 Điều 16) Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi Luật số 90/2025/QH15 và Luật số 133/2025/QH15 buộc phải tiêu hủy và thực tế đã tiêu hủy theo quy định của pháp luật được miễn thuế nhập khẩu. Việc tiêu hủy phải tuân thủ theo các quy định của pháp luật có liên quan và có sự giám sát trực tiếp của công chức hải quan. Trước khi tiêu hủy, người nộp thuế phải có văn bản thông báo cho cơ quan hải quan nơi đăng ký tờ khai hải quan nhập khẩu nêu rõ lý do tiêu hủy, tên gọi hàng hóa tiêu hủy, thời gian và địa điểm tiêu hủy; văn bản cho phép tiêu hủy của cơ quan quản lý chuyên ngành hoặc Sở Nông nghiệp và Môi trường."},{"k":"p","t":"Trong thời hạn 30 ngày kể từ ngày tiêu hủy, người nộp thuế phải nộp cho cơ quan hải quan nơi đăng ký tờ khai nhập khẩu: Biên bản xác nhận kết quả tiêu hủy phải có họ tên, chữ ký, dấu của giám đốc doanh nghiệp có hàng hóa tiêu hủy; họ tên, chữ ký của công chức hải quan giám sát việc tiêu hủy, những người được giám đốc doanh nghiệp giao thực hiện và giám sát việc tiêu hủy; chữ ký của đại diện của cơ quan Nhà nước liên quan (nếu có)."},{"k":"p","t":"10. Thu hồi tiền miễn thuế"},{"k":"p","t":"Cơ quan hải quan thực hiện ấn định thuế theo quy định của pháp luật về quản lý thuế đã thu hồi số tiền thuế đã miễn trong các trường hợp sau:"},{"k":"p","t":"a) Trường hợp cơ quan hải quan phát hiện người nộp thuế thay đổi mục đích sử dụng, chuyển tiêu thụ nội địa đối với hàng hóa đã được miễn thuế nhưng không tự giác kê khai, nộp thuế với cơ quan hải quan;"},{"k":"p","t":"b) Trường hợp theo kiến nghị của cơ quan thanh tra, kiểm tra, kiểm toán, cơ quan chức năng khác."}]},{"id":"tt86_29","no":29,"code":"Điều 29","title":"Điều 29. Thông báo, kiểm tra việc sử dụng hàng hóa miễn thuế","shortTitle":"Thông báo, kiểm tra việc sử dụng hàng hóa miễn thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Thông báo việc sử dụng hàng hóa miễn thuế nhập khẩu"},{"k":"p","t":"a) Đối tượng thông báo"},{"k":"p","t":"Chủ dự án có trách nhiệm thông báo tình hình sử dụng hàng hóa miễn thuế theo các chỉ tiêu thông tin quy định tại Mẫu số 10 tại Phụ lục II Thông tư này thông qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc theo Mẫu số 33 tại Phụ lục I Thông tư này cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế đối với các trường hợp phải thông báo Danh mục miễn thuế với cơ quan hải quan."},{"k":"p","t":"b) Thời điểm và thời hạn thông báo"},{"k":"p","t":"b.1) Định kỳ hàng năm, trong thời hạn 90 ngày kể từ ngày kết thúc năm tài chính, tổ chức, cá nhân thông báo tình hình sử dụng hàng hóa miễn thuế trong năm tài chính cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế cho đến khi nhập khẩu hết hàng hóa theo Danh mục miễn thuế đã thông báo với cơ quan hải quan hoặc Danh mục miễn thuế đã hết hiệu lực;"},{"k":"p","t":"b.2) Định kỳ 03 năm kể từ năm kết thúc nhập khẩu hàng hóa theo Danh mục miễn thuế hoặc năm hết hiệu lực của Danh mục miễn thuế, tổ chức, cá nhân thông báo tình hình sử dụng hàng hóa miễn thuế cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế trong thời hạn 90 ngày kể từ ngày kết thúc năm tài chính cho đến khi dự án chấm dứt hoạt động hoặc toàn bộ hàng hóa miễn thuế đã tái xuất khẩu ra khỏi Việt Nam, thay đổi mục đích được miễn thuế, chuyển tiêu thụ nội địa, tiêu hủy theo đúng quy định pháp luật. Trường hợp có dấu hiệu nghi vấn, cơ quan hải quan yêu cầu tổ chức, cá nhân thông báo tình hình sử dụng hàng hóa miễn thuế;"},{"k":"p","t":"b.3) Trường hợp tổ chức, cá nhân có phát sinh thay đổi mục đích được miễn thuế, chuyển tiêu thụ nội địa thì người nộp thuế thực hiện đăng ký tờ khai hải quan mới theo quy định tại Điều 25 Nghị định số 08/2015/NĐ-CP được sửa đổi, bổ sung bởi khoản 12 Điều 1 Nghị định số 167/2025/NĐ-CP;"},{"k":"p","t":"b.4) Trường hợp chuyển nhượng toàn bộ hoặc một phần dự án thuộc đối tượng ưu đãi đầu tư cho tổ chức, cá nhân khác theo quy định tại điểm d khoản 9 Điều 28 Thông tư này, tổ chức, cá nhân nhận chuyển nhượng có trách nhiệm thực hiện thông báo tình hình sử dụng hàng hóa miễn thuế nhập khẩu theo quy định tại điểm b.1, b.2 và b.3 khoản này;"},{"k":"p","t":"b.5) Đối với các trường hợp miễn thuế nhập khẩu quy định tại Điều 15, Điều 23 Nghị định số 134/2016/NĐ-CP, việc thông báo tình hình sử dụng hàng hóa miễn thuế phải được thực hiện hàng năm trong thời hạn 05 năm kể từ ngày dự án chính thức hoạt động."},{"k":"p","t":"Đối với các trường hợp miễn thuế nhập khẩu quy định tại điểm c khoản 21 Điều 16 Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi khoản 3 Điều 5 Luật số 90/2025/QH15 và khoản 6 Điều 25 Luật số 133/2025/QH15, việc thông báo tình hình sử dụng hàng hóa miễn thuế phải được thực hiện hàng năm trong thời hạn 05 năm kể từ khi bắt đầu nghiên cứu, sản xuất."},{"k":"p","t":"Trong thời hạn 30 ngày kể từ ngày kết thúc thời hạn 05 năm, chủ dự án thực hiện đăng ký tờ khai hải quan mới và kê khai, nộp thuế đối với nguyên liệu, vật tư, linh kiện nhập khẩu đã miễn thuế chưa sử dụng hết trong thời hạn 05 năm."},{"k":"p","t":"2. Trường hợp nhập khẩu nguyên liệu, vật tư dùng để chế tạo quy định tại điểm b khoản 21 Điều 16 Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi Luật số 90/2025/QH15, điểm a khoản 11, điểm b khoản 15, điểm a khoản 16 Điều 16 Luật số 107/2016/QH13, chủ dự án thực hiện như sau:"},{"k":"p","t":"a) Trong thời hạn 30 ngày kể từ ngày hoàn thiện việc chế tạo máy móc, thiết bị hoặc linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị, chủ dự án thông báo cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế về việc hoàn thành chế tạo theo các chỉ tiêu thông tin quy định tại Mẫu số 11 tại Phụ lục II Thông tư này thông qua Hệ thống xử lý dữ liệu điện tư hải quan hoặc theo Mẫu số 34 tại Phụ lục I Thông tư này. Trường hợp không sử dụng hết, trong thời hạn 30 ngày kể từ ngày hoàn thiện việc chế tạo, chủ dự án phải đăng ký tờ khai hải quan mới và kê khai nộp thuế tại thời điểm đăng ký tờ khai hải quan mới;"},{"k":"p","t":"b) Trong thời hạn 60 ngày kể từ ngày nhận được thông báo của chủ dự án nêu tại điểm a khoản này, cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế thực hiện kiểm tra tại trụ sở của chủ dự án để xác định lượng hàng hóa nhập khẩu miễn thuế đã sử dụng đúng mục đích chế tạo máy móc, thiết bị hoặc linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị. Trường hợp cơ quan hải quan phát hiện chủ dự án không sử dụng hết hoặc thay đổi mục đích sử dụng hàng hóa miễn thuế nhưng không đăng ký tờ khai hải quan mới thì thực hiện ấn định thuế theo quy định;"},{"k":"p","t":"c) Chủ dự án thực hiện thông báo tình hình sử dụng hàng hóa nhập khẩu để chế tạo theo quy định tại khoản 1 Điều này. Kể từ năm hoàn thiện việc chế tạo, chủ dự án thực hiện thông báo việc sử dụng đối với sản phẩm sau chế tạo."},{"k":"p","t":"3. Trường hợp nhập khẩu miễn thuế theo tổ hợp, dây chuyền phải nhập khẩu làm nhiều chuyến, không trừ lùi theo số lượng hàng hóa tại thời điểm đăng ký tờ khai hải quan, ngoài quy định tại khoản 1 Điều này, chủ dự án thực hiện như sau:"},{"k":"p","t":"a) Trong thời hạn 30 ngày kể từ ngày hoàn thiện việc lắp đặt tổ hợp, dây chuyền, chủ dự án thông báo với cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế về việc hoàn thiện lắp đặt tổ hợp, dây chuyền theo các chỉ tiêu thông tin quy định tại Mẫu số 12 tại Phụ lục II Thông tư này thông qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc theo Mẫu số 35 tại Phụ lục I Thông tư này. Trường hợp không sử dụng hết, trong thời hạn 30 ngày kể từ ngày hoàn thiện việc lắp đặt tổ hợp, dây chuyền, chủ dự án phải đăng ký tờ khai hải quan mới và kê khai nộp thuế tại thời điểm đăng ký tờ khai hải quan mới;"},{"k":"p","t":"b) Trong thời hạn 60 ngày kể từ ngày nhận được thông báo hoàn thiện việc lắp đặt tổ hợp, dây chuyền của chủ dự án, cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế thực hiện kiểm tra tại trụ sở của chủ dự án để xác định hàng hóa nhập khẩu miễn thuế đã sử dụng đúng mục đích lắp đặt vào tổ hợp, dây chuyền được miễn thuế. Trường hợp cơ quan hải quan phát hiện chủ dự án không sử dụng hết hoặc thay đổi mục đích sử dụng hàng hóa miễn thuế theo tổ hợp, dây chuyền nhưng không đăng ký tờ khai hải quan mới, cơ quan hải quan thực hiện ấn định thuế theo quy định;"},{"k":"p","t":"c) Chủ dự án thực hiện thông báo tình hình sử dụng hàng hóa nhập khẩu để hoàn thiện lắp đặt tổ hợp, dây chuyền theo quy định tại khoản 1 Điều này. Kể từ năm hoàn thiện lắp đặt tổ hợp, dây chuyền, chủ dự án thực hiện thông báo tình hình sử dụng đối với sản phẩm sau hoàn thiện lắp đặt."},{"k":"p","t":"4. Kiểm tra việc sử dụng hàng hóa miễn thuế"},{"k":"p","t":"a) Cơ quan hải quan nơi tiếp nhận thông báo Danh mục miễn thuế thực hiện kiểm tra việc sử dụng hàng hóa miễn thuế tại trụ sở của chủ dự án trên cơ sở áp dụng quản lý rủi ro;"},{"k":"p","t":"b) Việc kiểm tra được thực hiện theo trình tự thủ tục kiểm tra thuế tại trụ sở người nộp thuế theo quy định tại Điều 39 Thông tư này."},{"k":"p","t":"5. Xử lý kết quả kiểm tra"},{"k":"p","t":"a) Trường hợp kết quả kiểm tra xác định đủ điều kiện miễn thuế, cơ quan hải quan chấp nhận nội dung khai báo của chủ dự án hoặc của người nộp thuế;"},{"k":"p","t":"b) Trường hợp kết quả kiểm tra xác định không đủ điều kiện miễn thuế, cơ quan hải quan thực hiện ấn định thuế theo quy định của pháp luật về quản lý thuế."}]},{"id":"tt86_30","no":30,"code":"Điều 30","title":"Điều 30. Hồ sơ, thẩm quyền, trình tự, thủ tục giải quyết giảm thuế; thu hồi tiền giảm thuế","shortTitle":"Hồ sơ, thẩm quyền, trình tự, thủ tục giải quyết giảm thuế; thu hồi tiền giảm thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ giảm thuế"},{"k":"p","t":"Hồ sơ giảm thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng giảm thuế quy định tại Điều 18 Luật số 107/2016/QH13, bao gồm:"},{"k":"p","t":"a) Công văn đề nghị giảm thuế theo Mẫu số 13 tại Phụ lục II Thông tư này, trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố thực hiện theo Mẫu số 36 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Hợp đồng bảo hiểm, thông báo trả tiền bồi thường của tổ chức nhận bảo hiểm (nếu có), trường hợp hợp đồng bảo hiểm không bao gồm nội dung bồi thường về thuế phải có xác nhận của tổ chức bảo hiểm; hợp đồng hoặc biên bản thỏa thuận đền bù của hãng vận tải đối với trường hợp tổn thất do hãng vận tải gây ra (nếu có);"},{"k":"p","t":"c) Văn bản, biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại"},{"k":"p","t":"c.1) Văn bản xác nhận của một trong các cơ quan, tổ chức sau: Ủy ban dân cấp xã, Ban quản lý Khu công nghiệp, Khu chế xuất, Khu kinh tế, Ban quản lý cửa khẩu, Cảng vụ hàng không, Cảng vụ hàng hải nơi xảy ra sự kiện bất khả kháng về việc thiên tai, thảm họa, dịch bệnh, tai nạn bất ngờ gây thiệt hại vật chất, ảnh hưởng trực tiếp đến sản xuất, kinh doanh (01 bản chính);"},{"k":"p","t":"c.2) Biên bản xác nhận vụ cháy của cơ quan công an có thẩm quyền (01 bản chính)."},{"k":"p","t":"d) Giấy chứng nhận giám định của thương nhân kinh doanh dịch vụ giám định về số lượng hàng hóa bị mất mát hoặc tỷ lệ tổn thất thực tế của hàng hóa (01 bản chính)."},{"k":"p","t":"2. Thủ tục, thẩm quyền giảm thuế"},{"k":"p","t":"a) Người nộp thuế nộp hồ sơ cho cơ quan hải quan nơi làm thủ tục hải quan tại thời điểm làm thủ tục hải quan hoặc chậm nhất là 30 ngày kể từ ngày có tài liệu, chứng từ quy định tại điểm c và d khoản 1 Điều này;"},{"k":"p","t":"b) Trường hợp tại thời điểm làm thủ tục hải quan, người nộp thuế nộp đủ hồ sơ theo quy định, cơ quan hải quan thực hiện kiểm tra hồ sơ, kiểm tra thực tế hàng hóa, kiểm tra điều kiện giảm thuế và thực hiện giảm thuế trong thời hạn làm thủ tục hải quan theo quy định tại Điều 23 Luật số 54/2014/QH13;"},{"k":"p","t":"c) Trường hợp người nộp thuế nộp hồ sơ sau thời điểm làm thủ tục hải quan."},{"k":"p","t":"Trong thời hạn 30 ngày kể từ ngày tiếp nhận đầy đủ hồ sơ, Chi cục Hải quan khu vực có trách nhiệm lập hồ sơ, kiểm tra thông tin, thẩm định tính chính xác, đầy đủ của hồ sơ và quyết định giảm thuế theo Mẫu số 37 tại Phụ lục I Thông tư này hoặc thông báo cho người nộp thuế biết lý do không thuộc đối tượng giảm thuế, số tiền thuế phải nộp. Trường hợp hồ sơ chưa đầy đủ, cơ quan hải quan thông báo cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ."},{"k":"p","t":"Người nộp thuế giải trình, bổ sung thông tin, tài liệu trong thời hạn 05 ngày làm việc kể từ ngày nhận được thông báo của cơ quan hải quan. Thời hạn giải quyết hồ sơ giảm thuế không bao gồm thời gian người nộp thuế giải trình, bổ sung thông tin, tài liệu theo thông báo của cơ quan hải quan khi giải quyết hồ sơ."},{"k":"p","t":"Trường hợp cần kiểm tra thực tế đối với hàng hóa đã qua khu vực giám sát hải quan để có đủ căn cứ giải quyết giảm thuế thì cơ quan hải quan ban hành quyết định kiểm tra thuế tại trụ sở người nộp thuế và thực hiện các công việc quy định tại điểm này trong thời hạn tối đa là 40 ngày kể từ ngày nhận đủ hồ sơ. Việc kiểm tra thực tế đối với hàng hóa bị thiệt hại thực hiện trong trường hợp cần thiết và còn điều kiện để kiểm tra, trừ trường hợp hàng hóa bị thiệt hại không thể kiểm tra được như xăng dầu, chất lỏng, chất cháy; hàng hóa bị thiệt hại toàn bộ do thiên tai, hỏa hoạn."},{"k":"p","t":"Việc kiểm tra thực tế đối với hàng hóa bị thiệt hại thực hiện theo trình tự, thủ tục kiểm tra thuế tại trụ sở người nộp thuế quy định tại Điều 39 Thông tư này."},{"k":"p","t":"Cơ quan hải quan tiếp nhận hồ sơ giảm thuế, phản hồi về việc tiếp nhận hồ sơ giảm thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp Hệ thống gặp sự cố, cơ quan hải quan xử lý hồ sơ giấy."},{"k":"p","t":"3. Thu hồi tiền giảm thuế"},{"k":"p","t":"Trường hợp hàng hóa nhập khẩu bị thiệt hại không thuộc đối tượng giảm thuế, cơ quan hải quan thực hiện ấn định thuế để thu hồi tiền thuế đã giảm theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"4. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, ký số thông báo hoặc quyết định giảm thuế thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_31","no":31,"code":"Điều 31","title":"Điều 31. Không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại Điều 37a Nghị định số 134/2016/NĐ-CP được bổ sung bởi khoản 19 Điều 1 Nghị định số 18/2021/NĐ-CP."},{"k":"p","t":"2. Hồ sơ không thu thuế"},{"k":"p","t":"a) Không thu thuế đối với hàng hóa thuộc đối tượng hoàn thuế nhưng chưa nộp thuế theo quy định tại Điều 33, Điều 34, Điều 35, Điều 36, Điều 37 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP."},{"k":"p","t":"Ngoài công văn đề nghị không thu thuế theo Mẫu số 38 tại Phụ lục I Thông tư này, người nộp thuế nộp hồ sơ tương tự như hồ sơ hoàn thuế theo quy định tại khoản 1 Điều 11 Thông tư này."},{"k":"p","t":"b) Không thu thuế đối với hàng hóa không phải nộp thuế nhập khẩu, thuế xuất khẩu quy định tại Điều 33, Điều 34 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP."},{"k":"p","t":"b.1) Trường hợp không thu thuế nhập khẩu đối với hàng hóa xuất khẩu phải tái nhập theo quy định tại Điều 33 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP"},{"k":"p","t":"b.1.1) Công văn đề nghị không thu thuế theo Mẫu số 14 tại Phụ lục II Thông tư này qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc bản giấy theo Mẫu số 38 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.1.2) Chứng từ thanh toán hàng hóa xuất khẩu đối với trường hợp đã thanh toán;"},{"k":"p","t":"b.1.3) Hợp đồng xuất khẩu, hợp đồng ủy thác xuất khẩu nếu là hình thức xuất khẩu ủy thác (nếu có);"},{"k":"p","t":"b.1.4) Hóa đơn thương mại theo hợp đồng xuất khẩu đối với trường hợp hàng hóa xuất khẩu sau đó phải tái nhập (trừ xuất khẩu vào khu phi thuế quan thì thực hiện theo quy định tại điểm b.1.5 khoản này);"},{"k":"p","t":"b.1.5) Hóa đơn của người xuất khẩu theo quy định của pháp luật về hóa đơn đối với trường hợp hàng hóa xuất khẩu vào khu phi thuế quan phải tái nhập;"},{"k":"p","t":"b.1.6) Thông báo của khách hàng nước ngoài hoặc văn bản thỏa thuận với khách hàng nước ngoài về việc nhận lại hàng hóa hoặc văn bản thông báo của hãng vận tải về việc không có người nhận hàng nêu rõ lý do, số lượng, chủng loại hàng hóa trả lại trong trường hợp hàng hóa phải nhập khẩu trở lại do khách hàng nước ngoài từ chối nhận hàng hoặc không có người nhận hàng theo thông báo của hãng vận tải."},{"k":"p","t":"Trường hợp vì lý do bất khả kháng hoặc người nộp thuế tự phát hiện hàng hóa có sai, sót phải nhập khẩu trở lại thì không phải có văn bản này nhưng phải nêu rõ lý do nhập khẩu hàng hóa trả lại trong công văn đề nghị không thu thuế."},{"k":"p","t":"b.1.7) Văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận trong trường hợp hàng hóa xuất khẩu do tổ chức, cá nhân ở Việt Nam gửi tổ chức, cá nhân ở nước ngoài thông qua dịch vụ bưu chính và chuyển phát nhanh quốc tế nhưng không giao được cho người nhận hàng hóa phải tái nhập."},{"k":"p","t":"b.2) Trường hợp không thu thuế xuất khẩu đối với hàng hóa nhập khẩu phải tái xuất quy định tại Điều 34 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP"},{"k":"p","t":"b.2.1) Công văn đề nghị không thu thuế theo Mẫu số 14 tại Phụ lục II Thông tư này qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc bản giấy theo Mẫu số 38 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.2.2) Hóa đơn của người xuất khẩu theo quy định của pháp luật về hóa đơn đối với trường hợp hàng hóa nhập khẩu sau đó xuất khẩu vào khu phi thuế quan;"},{"k":"p","t":"b.2.3) Hóa đơn thương mại theo hợp đồng xuất khẩu đối với trường hợp hàng hóa nhập khẩu sau đó xuất khẩu ra nước ngoài (trừ xuất khẩu vào khu phi thuế quan thực hiện theo quy định tại điểm b.2.2 khoản này);"},{"k":"p","t":"b.2.4) Hóa đơn thương mại theo hợp đồng nhập khẩu đối với trường hợp hàng hóa nhập khẩu phải tái xuất trả lại chủ hàng nước ngoài kèm văn bản thỏa thuận trả lại hàng hóa cho phía nước ngoài;"},{"k":"p","t":"b.2.5) Hợp đồng xuất khẩu đối với trường hợp hàng hóa nhập khẩu được bán ra nước ngoài hoặc bán vào khu phi thuế quan; hợp đồng ủy thác xuất khẩu nếu là hình thức xuất khẩu ủy thác;"},{"k":"p","t":"b.2.6) Hợp đồng nhập khẩu đối với trường hợp nhập khẩu hàng hóa; hợp đồng ủy thác nhập khẩu nếu là hình thức nhập khẩu ủy thác; chứng từ thanh toán hàng hóa nhập khẩu đối với trường hợp đã thanh toán;"},{"k":"p","t":"b.2.7) Văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận;"},{"k":"p","t":"b.2.8) Văn bản xác nhận của doanh nghiệp cung ứng tàu biển về số lượng, trị giá hàng hóa mua của doanh nghiệp đầu mối nhập khẩu đã thực cung ứng cho tàu biển nước ngoài kèm bảng kê chứng từ thanh toán của các hãng tàu biển nước ngoài."},{"k":"p","t":"3. Trách nhiệm của người nộp thuế"},{"k":"p","t":"Người nộp thuế khai chỉ tiêu thông tin công văn đề nghị không thu thuế và chứng từ, tài liệu có liên quan tại Phụ lục II Thông tư này, gửi đến Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp chưa khai báo được chỉ tiêu quy định tại điểm này, người nộp thuế nộp bản chụp được ký số các chứng từ, tài liệu liên quan đến chỉ tiêu chưa khai báo được gửi cơ quan hải quan qua Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, người nộp thuế nộp 01 bản chính công văn đề nghị không thu thuế xuất khẩu hoặc thuế nhập khẩu theo Mẫu số 38 tại Phụ lục I Thông tư này; bản giấy các chứng từ, tài liệu theo quy định khoản 2 Điều này đến cơ quan hải quan."},{"k":"p","t":"4. Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"a) Cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế thực hiện tiếp nhận và xử lý hồ sơ thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp Hệ thống gặp sự cố, cơ quan hải quan tiếp nhận xử lý hồ sơ giấy;"},{"k":"p","t":"b) Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ đề nghị không thu thuế, cơ quan hải quan phản hồi cho người nộp thuế về việc chấp nhận hồ sơ đề nghị không thu thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 3 tại Phụ lục II Thông tư này. Trường hợp hồ sơ giấy, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 05 tại Phụ lục I Thông tư này."},{"k":"p","t":"Trường hợp cần giải trình, bổ sung, cơ quan hải quan phản hồi cho người nộp thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 7 tại Phụ lục II Thông tư này. Trường hợp hồ sơ giấy, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 06 tại Phụ lục I Thông tư này."},{"k":"p","t":"Thời hạn bổ sung, giải trình hồ sơ 05 ngày làm việc kể từ ngày nhận được thông báo của cơ quan hải quan. Quá thời hạn người nộp thuế không thực hiện bổ sung, giải trình hồ sơ, cơ quan hải quan phản hồi về việc hồ sơ không đủ cơ sở xem xét, xử lý cho người nộp thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp hồ sơ giấy, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 02 tại Phụ lục I Thông tư này."},{"k":"p","t":"Thời gian người nộp thuế bổ sung, giải trình thông tin, tài liệu theo thông báo của cơ quan hải quan khi giải quyết hồ sơ không tính vào thời hạn xử lý không thu thuế."},{"k":"p","t":"5. Phân loại hồ sơ"},{"k":"p","t":"a) Hồ sơ không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng hoàn thuế nhưng chưa nộp thuế theo quy định tại điểm a khoản 1 Điều 37a Nghị định số 134/2016/NĐ-CP được bổ sung bởi khoản 19 Điều 1 Nghị định số 18/2021/NĐ-CP được phân loại theo hồ sơ hoàn thuế quy định tại khoản 2 Điều 30 Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"b) Hồ sơ không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu không phải nộp thuế quy định tại điểm b khoản 1 Điều 37a Nghị định số 134/2016/NĐ-CP được bổ sung bởi khoản 19 Điều 1 Nghị định số 18/2021/NĐ-CP thì không phải thực hiện phân loại hồ sơ."},{"k":"p","t":"6. Trình tự, thủ tục không thu thuế"},{"k":"p","t":"a) Trường hợp không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng hoàn thuế nhưng chưa nộp thuế theo quy định tại điểm a khoản 1 Điều 37a Nghị định số 134/2016/NĐ-CP được bổ sung bởi khoản 19 Điều 1 Nghị định số 18/2021/NĐ-CP thủ tục nộp, tiếp nhận, xử lý hồ sơ không thu thuế thực hiện như thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế theo quy định tại Điều 11 Thông tư này;"},{"k":"p","t":"b) Trường hợp không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu không phải nộp thuế quy định tại điểm b khoản 1 Điều 37a Nghị định số 134/2016/NĐ-CP được bổ sung bởi khoản 19 Điều 1 Nghị định số 18/2021/NĐ-CP."},{"k":"p","t":"b.1) Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng tái nhập, tái xuất không phát sinh số tiền thuế đề nghị hoàn và người nộp thuế nộp hồ sơ không thu thuế tại thời điểm làm thủ tục hải quan."},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế thực hiện kiểm tra hồ sơ, kiểm tra thực tế hàng hóa (trừ doanh nghiệp ưu tiên). Trường hợp có đủ cơ sở xác định hàng hóa tái nhập là hàng hóa đã xuất khẩu trước đây, hàng hóa tái xuất là hàng hóa đã nhập khẩu trước đây thì cơ quan hải quan ban hành quyết định không thu thuế nhập khẩu đối với hàng hóa tái nhập, không thu thuế xuất khẩu đối với hàng hóa tái xuất trong thời hạn làm thủ tục hải quan thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp xử lý hồ sơ giấy hoặc Hệ thống xử lý dữ liệu điện tử hải quan chưa có chức năng ký số, cơ quan hải quan ban hành quyết định và gửi người nộp thuế, các cơ quan có liên quan (nếu có) theo Mẫu số 16 tại Phụ lục I Thông tư này."},{"k":"p","t":"Thời hạn làm thủ tục hải quan thực hiện theo quy định tại Điều 23 Luật số 54/2014/QH13."},{"k":"p","t":"b.2) Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng tái nhập, tái xuất có phát sinh số tiền thuế đề nghị hoàn."},{"k":"p","t":"b.2.1) Trường hợp hàng hóa tái nhập, tái xuất không cùng một địa điểm làm thủ tục hải quan với hàng hóa khi xuất khẩu, nhập khẩu lần đầu."},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế đối với hàng hóa tái nhập, tái xuất ban hành quyết định không thu thuế lô hàng tái nhập, tái xuất sau khi cơ quan hải quan nơi phát sinh số tiền thuế xuất khẩu, nhập khẩu mà người nộp thuế đề nghị hoàn đã xác định đủ điều kiện hoàn thuế đối với hàng hóa xuất khẩu hoặc nhập khẩu lần đầu thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp xử lý hồ sơ giấy hoặc Hệ thống xử lý dữ liệu điện tử hải quan chưa có chức năng ký số, cơ quan hải quan ban hành quyết định không thu thuế gửi người nộp thuế, cơ quan có liên quan (nếu có) theo Mẫu số 16 tại Phụ lục I Thông tư này."},{"k":"p","t":"Số tiền thuế đã nộp của hàng hóa tái nhập hoặc tái xuất được xử lý tiền thuế nộp thừa theo quy định tại Điều 7 Thông tư này."},{"k":"p","t":"b.2.2) Trường hợp hàng hóa tái nhập, tái xuất làm thủ tục hải quan tại cùng một địa điểm với hàng hóa khi xuất khẩu, nhập khẩu lần đầu."},{"k":"p","t":"Trường hợp cơ quan hải quan chưa xác định được hàng tái nhập, tái xuất là hàng đã xuất, đã nhập trước đây tại thời điểm thông quan, cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế đối với hàng hóa tái nhập, tái xuất tiếp nhận, làm thủ tục không thu thuế sau khi hoàn thành thủ tục hoàn thuế hàng hóa xuất khẩu, nhập khẩu lần đầu."},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế đối với hàng hóa tái nhập, tái xuất ban hành quyết định không thu thuế nhập khẩu đối với hàng hóa tái nhập, không thu thuế xuất khẩu đối với hàng hóa tái xuất thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp xử lý hồ sơ giấy hoặc Hệ thống xử lý dữ liệu điện tử hải quan chưa có chức năng ký số, cơ quan hải quan ban hành quyết định và gửi người nộp thuế, cơ quan có liên quan (nếu có) theo Mẫu số 16 tại Phụ lục I Thông tư này."},{"k":"p","t":"b.3) Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu không phát sinh số tiền thuế đề nghị hoàn nhưng người nộp thuế đã nộp thuế đối với tờ khai tái nhập, tái xuất và nộp hồ sơ đề nghị không thu thuế sau khi hàng hóa tái nhập, tái xuất đã được thông quan"},{"k":"p","t":"Cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế đối với hàng hóa tái nhập, tái xuất thực hiện kiểm tra hồ sơ hải quan nếu có đủ cơ sở xác định hàng hóa tái nhập là hàng hóa đã xuất khẩu trước đây, hàng hóa tái xuất là hàng hóa đã nhập khẩu trước đây thì ban hành quyết định không thu thuế nhập khẩu đối với hàng hóa tái nhập, không thu thuế xuất khẩu đối với hàng hóa tái xuất thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp xử lý hồ sơ giấy hoặc Hệ thống xử lý dữ liệu điện tử hải quan chưa có chức năng ký số, cơ quan hải quan ban hành quyết định và gửi người nộp thuế, cơ quan có liên quan (nếu có) theo Mẫu số 16 tại Phụ lục I Thông tư này."},{"k":"p","t":"Cơ quan hải quan ban hành quyết định không thu thuế trong thời hạn 05 ngày làm việc kể từ ngày có thông báo tiếp nhận hồ sơ. Số tiền thuế đã nộp của hàng hóa tái nhập hoặc tái xuất được xử lý tiền thuế nộp thừa theo quy định tại Điều 7 Thông tư này."},{"k":"p","t":"Đối với các trường hợp nêu tại điểm b.1, b.2 và b.3 khoản 6 Điều này, cơ quan hải thực hiện kiểm tra hồ sơ, kiểm tra thực tế hàng hóa xác định hàng hóa không đủ cơ sở không thu thuế thì cơ quan hải quan thông báo người nộp thuế về việc hồ sơ không đủ điều kiện không thu thuế. Trường hợp hồ sơ giấy hoặc Hệ thống xử lý dữ liệu điện tử hải quan chưa có chức năng ký số, cơ quan hải quan thông báo gửi người nộp thuế theo Mẫu số 02 tại Phụ lục I Thông tư này."},{"k":"p","t":"7. Thẩm quyền ban hành quyết định không thu thuế"},{"k":"p","t":"Thủ trưởng cơ quan hải quan nơi tiếp nhận hồ sơ đề nghị không thu thuế đối với hàng hóa tái nhập, tái xuất có thẩm quyền ban hành quyết định không thu thuế."}]},{"id":"tt86_32","no":32,"code":"Điều 32","title":"Điều 32. Hồ sơ không chịu thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Hồ sơ không chịu thuế đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng không chịu thuế thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Hồ sơ không chịu thuế xuất khẩu, thuế nhập khẩu"},{"k":"p","t":"Trường hợp hàng hóa thuộc đối tượng không chịu thuế xuất khẩu, thuế nhập khẩu, ngoài các chứng từ thuộc hồ sơ hải quan theo quy định tại Luật số 54/2014/QH13 được sửa đổi, bổ sung bởi Luật số 90/2025/QH15 và các văn bản hướng dẫn thi hành, người nộp thuế nộp, xuất trình thêm các chứng từ sau:"},{"k":"p","t":"a) Hàng hóa nhập khẩu là hàng viện trợ"},{"k":"p","t":"a.1) Hàng hóa nhập khẩu là hàng hóa viện trợ không hoàn lại không thuộc hỗ trợ phát triển chính thức (ODA) của các cơ quan, tổ chức, cá nhân nước ngoài dành cho Việt Nam: Quyết định phê duyệt dự án, phi dự án hoặc Quyết định đầu tư kèm theo Văn kiện dự án, phi dự án theo quy định tại khoản 1 Điều 24 Nghị định số 313/2025/NĐ-CP của Chính phủ về quản lý và sử dụng viện trợ không hoàn lại không thuộc hỗ trợ phát triển chính thức của cơ quan, tổ chức, cá nhân nước ngoài dành cho Việt Nam và các văn bản quy phạm pháp luật điều chỉnh/thay thế (nếu có);"},{"k":"p","t":"a.2) Hàng hóa nhập khẩu sử dụng nguồn vốn hỗ trợ phát triển chính thức (ODA)"},{"k":"p","t":"Hồ sơ bao gồm các chứng từ quy định tại khoản 1 Điều 90 Nghị định số 242/2025/NĐ-CP của Chính phủ quy định về quản lý và sử dụng vốn hỗ trợ phát triển chính thức (ODA) và vốn vay ưu đãi nước ngoài được sửa đổi, bổ sung bởi Nghị định số 119/2026/NĐ-CP và các văn bản quy phạm pháp luật điều chỉnh/thay thế (nếu có)."},{"k":"p","t":"a.2.1) Điều ước quốc tế cụ thể hoặc thỏa thuận cụ thể về vốn ODA không hoàn lại hoặc văn bản trao đổi về việc cam kết và tiếp nhận vốn ODA không hoàn lại;"},{"k":"p","t":"a.2.2) Quyết định phê duyệt văn kiện dự án, phi dự án hoặc Quyết định đầu tư chương trình/dự án hoặc Báo cáo nghiên cứu khả thi được phê duyệt."},{"k":"p","t":"a.3) Hàng hóa nhập khẩu là hàng viện trợ quốc tế khẩn cấp để cứu trợ, hỗ trợ và khắc phục hậu quả thiên tai"},{"k":"p","t":"a.3.1) Hàng hóa nhập khẩu là hàng viện trợ quốc tế khẩn cấp để cứu trợ và khắc phục hậu quả thiên tai theo quy định tại Nghị định số 50/2020/NĐ-CP của Chính phủ về quy định tiếp nhận, quản lý và sử dụng viện trợ quốc tế khẩn cấp để cứu trợ và khắc phục hậu quả thiên tai; Nghị định 53/2026/NĐ-CP của Chính phủ sửa đổi, bổ sung một số điều của các Nghị định trong lĩnh vực đê điều và phòng chống thiên tai."},{"k":"p","t":"Hồ sơ bao gồm chứng từ quy định tại điểm đ khoản 2 Điều 13 Nghị định số 50/2020/NĐ-CP và Điều 62 Nghị định 53/2026/NĐ-CP:"},{"k":"p","t":"- Văn kiện hoặc điều chỉnh văn kiện viện trợ quốc tế khẩn cấp để khắc phục hậu quả thiên tai của cơ quan có thẩm quyền."},{"k":"p","t":"- Văn kiện viện trợ quốc tế."},{"k":"p","t":"a.3.2) Hàng hóa nhập khẩu là hàng viện trợ quốc tế khẩn cấp để cứu trợ, hỗ trợ theo Quyết định số 27/2026/QĐ-TTg của Thủ tướng Chính phủ quy định việc tiếp nhận, điều phối nguồn lực cứu trợ, hỗ trợ từ nước ngoài và việc đưa lực lượng, phương tiện của Việt Nam ra nước ngoài tham gia hoạt động ứng phó, khắc phục hậu quả, hỗ trợ nhân đạo, cứu trợ thảm họa"},{"k":"p","t":"Hồ sơ bao gồm chứng từ sau:"},{"k":"p","t":"- Văn bản quyết định của cơ quan có thẩm quyền về việc tiếp nhập các khoản viện trợ quốc tế để cứu trợ, hỗ trợ khắc phục hậu quả trong tình trạng khẩn cấp."},{"k":"p","t":"- Điều ước quốc tế giữa phía Việt Nam với các đối tác viện trợ nước ngoài để tiếp nhận khoản viện trợ hoặc Thỏa thuận quốc tế giữa phía Việt Nam với các đối tác viện trợ nước ngoài để tiếp nhận khoản viện trợ."},{"k":"p","t":"b) Hàng hóa nhập khẩu của tổ chức, cá nhân Việt Nam để thực hiện dự án viện trợ không hoàn lại của Việt Nam cho nước ngoài"},{"k":"p","t":"b.1) Quyết định phê duyệt dự án (đối với các dự án được thực hiện theo các điều ước quốc tế song phương) hoặc quyết định viện trợ (đối với các dự án thực hiện theo Nghị định số 305/2025/NĐ-CP của Chính phủ về viện trợ của Việt Nam cho nước ngoài) của cấp có thẩm quyền trong đó ghi rõ hình thức cung cấp là viện trợ không hoàn lại của Việt Nam;"},{"k":"p","t":"b.2) Danh mục chi tiết hàng hóa viện trợ cho nước ngoài do đơn vị thực hiện dự án lập;"},{"k":"p","t":"b.3) Hợp đồng cung cấp hàng hóa đối với trường hợp tổ chức, cá nhân trúng thầu nhập khẩu hoặc hợp đồng ủy thác nhập khẩu hàng hóa đối với trường hợp nhập khẩu ủy thác."},{"k":"p","t":"c) Hàng hóa xuất khẩu để thực hiện dự án viện trợ không hoàn lại của Việt Nam cho nước ngoài"},{"k":"p","t":"c1) Quyết định viện trợ của cấp có thẩm quyền theo quy định tại Nghị định số 305/2025/NĐ-CP và các văn bản quy phạm pháp luật điều chỉnh/thay thế (nếu có) hoặc Quyết định phê duyệt dự án (đối với các dự án thực hiện theo điều ước quốc tế song phương);"},{"k":"p","t":"c.2) Danh mục chi tiết hàng hóa viện trợ cho nước ngoài do đơn vị thực hiện dự án lập;"},{"k":"p","t":"c.3) Hợp đồng cung cấp hàng hóa cho dự án (trường hợp đơn vị thực hiện dự án không trực tiếp xuất khẩu)."},{"k":"p","t":"d) Hợp đồng cho thuê tài chính đối với trường hợp Công ty cho thuê chính nhập khẩu hàng hóa từ nước ngoài, đưa trực tiếp vào khu phi thuế quan để cho doanh nghiệp trong khu phi thuế quan thuê tài chính, trong đó giá cho thuê tài chính không bao gồm thuế nhập khẩu."},{"k":"p","t":"3. Hồ sơ không chịu thuế giá trị gia tăng đối với hàng hóa nhập khẩu"},{"k":"p","t":"Trường hợp hàng hóa nhập khẩu thuộc đối tượng không chịu thuế giá trị gia tăng, ngoài các chứng từ thuộc hồ sơ hải quan theo quy định tại Luật số 54/2014/QH13 dược sửa đổi, bổ sung bởi Luật số 90/2025/QH15 và các văn bản hướng dẫn thi hành, tùy từng trường hợp người nộp thuế phải nộp, xuất trình thêm một trong các chứng từ sau:"},{"k":"p","t":"a) Hàng hóa nhập khẩu là máy móc, thiết bị, phụ tùng, vật tư thuộc loại trong nước chưa sản xuất được cần nhập khẩu để sử dụng trực tiếp cho hoạt động nghiên cứu khoa học, phát triển công nghệ; máy móc, thiết bị, phụ tùng thay thế, phương tiện vận tải chuyên dùng và vật tư thuộc loại trong nước chưa sản xuất được, cần nhập khẩu để tiến hành hoạt động tìm kiếm thăm dò, phát triển mỏ dầu khí; máy bay, trực thăng, tàu lượn, giàn khoan, tàu thuyền thuộc loại trong nước chưa sản xuất được, cần nhập khẩu để tạo tài sản cố định của doanh nghiệp hoặc đi thuê của nước ngoài để sử dụng cho sản xuất, kinh doanh, cho thuê."},{"k":"p","t":"a.1) Hợp đồng bán hàng theo kết quả đấu thầu hoặc hợp đồng cung cấp hàng hóa hoặc hợp đồng cung cấp dịch vụ do cơ sở trúng thầu hoặc được chỉ định thầu hoặc đơn vị cung cấp dịch vụ ghi rõ không bao gồm thuế giá trị gia tăng;"},{"k":"p","t":"a.2) Hợp đồng ủy thác nhập khẩu đối với trường hợp nhập khẩu ủy thác ghi rõ không bao gồm thuế giá trị gia tăng;"},{"k":"p","t":"a.3) Văn bản của cơ quan nhà nước có thẩm quyền theo quy định của Luật Khoa học, công nghệ và đổi mới sáng tạo số 93/2025/QH15 giao nhiệm vụ cho các tổ chức thực hiện chương trình, dự án, đề tài nghiên cứu khoa học và phát triển công nghệ hoặc hợp đồng khoa học và công nghệ giữa bên đặt hàng với bên nhận đặt hàng thực hiện hợp đồng khoa học và công nghệ đối với máy móc, thiết bị, vật tư thuộc loại trong nước chưa sản xuất được, cần nhập khẩu để sử dụng trực tiếp cho hoạt động nghiên cứu khoa học, phát triển công nghệ;"},{"k":"p","t":"a.4) Hợp đồng ký với bên nước ngoài đối với trường hợp thuê máy bay, trực thăng, tàu lượn, giàn khoan, tàu thuyền thuộc loại trong nước chưa sản xuất được dùng cho sản xuất, kinh doanh, cho thuê."},{"k":"p","t":"b) Giấy xác nhận hàng hóa nhập khẩu phục vụ trực tiếp cho quốc phòng của Bộ Quốc phòng hoặc phục vụ trực tiếp cho an ninh của Bộ Công an đối với hàng hóa nhập khẩu là sản phẩm quốc phòng, an ninh thuộc đối tượng không chịu thuế giá trị gia tăng;"},{"k":"p","t":"c) Hợp đồng cho thuê tài chính đối với trường hợp Công ty cho thuê chính nhập khẩu hàng hóa từ nước ngoài, đưa trực tiếp vào khu phi thuế quan để cho doanh nghiệp trong khu phi thuế quan thuê tài chính, trong đó giá cho thuê tài chính không bao gồm thuế giá trị gia tăng;"},{"k":"p","t":"d) Hợp đồng bán hàng vào doanh nghiệp chế xuất, khu phi thuế quan theo kết quả đấu thầu hoặc chỉ định thầu trong đó, quy định giá trúng thầu không bao gồm thuế nhập khẩu đối với hàng hóa của các nhà thầu nhập khẩu từ nước ngoài đưa trực tiếp vào doanh nghiệp chế xuất, khu phi thuế quan để xây dựng nhà xưởng, văn phòng, lắp đặt thiết bị theo kết quả đấu thầu;"},{"k":"p","t":"đ) Giấy xác nhận nhập khẩu xuất bản phẩm để kinh doanh của cơ quan có thẩm quyền theo quy định của pháp luật về xuất bản đối với hàng hóa là báo, tạp chí, bản tin, đặc san, sách chính trị, sách giáo khoa, giáo trình, sách văn bản pháp luật, sách khoa học - kỹ thuật, sách phục vụ thông tin đối ngoại, sách in bằng chữ dân tộc thiểu số và tranh, ảnh, áp phích tuyên truyền cổ động, kể cả dưới dạng băng hoặc đĩa ghi tiếng, ghi hình, dữ liệu điện tử nhập khẩu thuộc đối tượng không chịu thuế giá trị gia tăng;"},{"k":"p","t":"e) Văn bản phê duyệt tiếp nhận hàng hóa ủng hộ, tài trợ của các cơ quan, tổ chức tiếp nhận đối với hàng hóa nhập khẩu ủng hộ, tài trợ cho phòng, chống, khắc phục hậu quả thảm họa, thiên tai, dịch bệnh, chiến tranh thuộc đối tượng không chịu thuế giá trị gia tăng."},{"k":"p","t":"4. Hồ sơ đối với hàng hóa nhập khẩu thuộc đối tượng không chịu thuế tiêu thụ đặc biệt thực hiện theo quy định của pháp luật thuế tiêu thụ đặc biệt."}]},{"id":"tt86_33","no":33,"code":"Điều 33","title":"Điều 33. Trình tự ấn định thuế","shortTitle":"Trình tự ấn định thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan hải quan xác định hàng hóa thuộc đối tượng ấn định thuế theo quy định tại khoản 1, khoản 2 Điều 39 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"2. Tính toán số tiền thuế ấn định"},{"k":"p","t":"a) Số tiền thuế ấn định được xác định căn cứ vào tên hàng, số lượng, chủng loại, mã số, xuất xứ, trị giá, mức thuế, tỷ giá tính thuế và phương pháp tính thuế theo quy định;"},{"k":"p","t":"b) Trường hợp ấn định thuế một phần trong tổng số hàng hóa cùng chủng loại thuộc nhiều tờ khai hải quan khác nhau và trên các tờ khai xuất khẩu, nhập khẩu lần đầu đã xác định được số tiền thuế, số tiền thuế ấn định được xác định theo số tiền thuế trung bình của hàng hóa cùng chủng loại theo công thức sau đây:"},{"k":"tbl","rows":[["Số tiền thuế ấn định","=","Tổng số tiền thuế của hàng hóa cùng chủng loại tại các tờ khai hải quan","x","Số lượng hàng hóa ấn định thuế"],["","","Tổng số hàng hóa cùng chủng loại tại các tờ khai hải quan","",""]]},{"k":"p","t":"c) Trường hợp tờ khai hải quan nhập khẩu lần đầu là hàng hóa không thuộc đối tượng chịu thuế hoặc không có số liệu về số tiền thuế hoặc tờ khai hải quan đã bị hủy theo quy định của pháp luật về hải quan hoặc không có tờ khai hải quan, cơ quan hải quan căn cứ vào tên hàng, chủng loại, trị giá, mã số, xuất xứ, mức thuế, phương pháp tính thuế của hàng hóa giống hệt hoặc hàng hóa tương tự đang được lưu trữ tại cơ sở dữ liệu của cơ quan hải quan để thực hiện ấn định thuế. Tỷ giá tính thuế áp dụng tỷ giá tại thời điểm ban hành quyết định ấn định thuế."},{"k":"p","t":"3. Cơ quan hải quan xác định số tiền thuế chênh lệch giữa số tiền thuế phải nộp với số tiền thuế do người nộp thuế đã khai."},{"k":"p","t":"4. Thời hạn nộp số tiền thuế ấn định thực hiện theo quy định tại khoản 5 Điều 4 Thông tư này."},{"k":"p","t":"5. Cơ quan hải quan lập biên bản làm việc để làm cơ sở ấn định thuế trong trường hợp cần làm rõ thêm với người nộp thuế về những nội dung liên quan làm cơ sở ấn định thuế (nếu có); không phải lập biên bản trong các trường hợp sau:"},{"k":"p","t":"a) Người khai thuế không tự tính được số tiền thuế phải nộp;"},{"k":"p","t":"b) Cơ quan hải quan thực hiện ấn định thuế theo kết luận của cơ quan thanh tra, kiểm tra, kiểm toán hoặc cơ quan khác có thẩm quyền sau khi thanh tra, kiểm tra, kiểm toán tại trụ sở người khai thuế hoặc trong bản kết luận đã dự kiến số tiền thuế phải ấn định;"},{"k":"p","t":"c) Hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế là tài sản bảo đảm các khoản vay theo quy định tại Điều 39 Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"d) Hàng hóa nhập khẩu chưa hoàn thành thủ tục hải quan bị kê biên để bán đấu giá theo quyết định của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thuộc đối tượng phải nộp thuế theo quy định tại Điều 39 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"6. Cơ quan hải quan ban hành quyết định ấn định thuế theo Mẫu số 39 tại Phụ lục I Thông tư này, gửi người nộp thuế theo quy định tại khoản 9 Điều này. Quyết định ấn định thuế ghi rõ lý do, căn cứ pháp lý, số tiền thuế ấn định, thời hạn nộp tiền thuế, thời hạn tính tiền chậm nộp."},{"k":"p","t":"7. Trường hợp ban hành quyết định ấn định thuế chưa đầy đủ, chưa chính xác, thủ trưởng cơ quan hải quan ban hành quyết định ấn định thuế sửa đổi, bổ sung theo Mẫu số 39 tại Phụ lục I Thông tư này hoặc ban hành quyết định hủy quyết định ấn định thuế theo Mẫu số 40 tại Phụ lục I Thông tư này."},{"k":"p","t":"8. Số tiền thuế, tiền chậm nộp, tiền phạt người nộp thuế đã nộp theo quyết định ấn định thuế nhưng quyết định ấn định thuế được sửa đổi, bổ sung làm giảm số tiền thuế phải nộp, hủy hoặc số tiền thuế, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, tiền chậm nộp, tiền phạt phải nộp, cơ quan hải quan xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa cho người nộp thuế số tiền chênh lệch theo quy định Điều 15 Thông tư này."},{"k":"p","t":"9. Quyết định ấn định thuế, quyết định ấn định thuế sửa đổi, bổ sung, quyết định hủy quyết định ấn định thuế phải gửi người nộp thuế, người được người nộp thuế ủy quyền, người bảo lãnh, người nộp thuế thay người nộp thuế trong thời hạn 08 giờ làm việc kể từ khi ký."},{"k":"p","t":"10. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, lập biên bản, ban hành quyết định ấn định thuế, quyết định ấn định thuế sửa đổi bổ sung, quyết định hủy quyết định ấn định thuế thì cơ quan hải quan xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_34","no":34,"code":"Điều 34","title":"Điều 34. Thủ tục, hồ sơ khoanh tiền thuế nợ","shortTitle":"Thủ tục, hồ sơ khoanh tiền thuế nợ","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp khoanh tiền thuế nợ thực hiện theo quy định tại khoản 1 Điều 20 Luật số 108/2025/QH15 và khoản 1 Điều 34 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"2. Hồ sơ khoanh tiền thuế nợ"},{"k":"p","t":"a) Đối với người nộp thuế quy định tại điểm a khoản 1 Điều 20 Luật số 108/2025/QH15: Giấy chứng tử hoặc giấy báo tử hoặc các giấy tờ thay cho giấy báo tử theo quy định của pháp luật về hộ tịch hoặc quyết định của tòa án tuyên bố một người là đã chết, mất năng lực hành vi dân sự;"},{"k":"p","t":"b) Đối với người nộp thuế quy định tại điểm b khoản 1 Điều 20 Luật số 108/2025/QH15: Quyết định giải thể của người nộp thuế hoặc thông tin thông báo về người nộp thuế đang làm thủ tục giải thể trên hệ thống thông tin quốc gia về đăng ký kinh doanh;"},{"k":"p","t":"c) Đối với người nộp thuế quy định tại điểm c khoản 1 Điều 20 Luật số 108/2025/QH15: Thông báo của Tòa án có thẩm quyền về việc thụ lý đơn yêu cầu mở thủ tục phá sản hoặc được khoanh tiền thuế nợ theo văn bản đề nghị của Tòa án theo quy định của pháp luật về phục hồi, phá sản;"},{"k":"p","t":"d) Đối với người nộp thuế quy định tại điểm đ khoản 1 Điều 20 Luật số 108/2025/QH15: Văn bản xác nhận của Ủy ban nhân dân cấp xã về việc người nộp thuế không còn hoạt động tại địa chỉ đã đăng ký kinh doanh với cơ quan đăng ký kinh doanh, cơ quan quản lý thuế;"},{"k":"p","t":"đ) Đối với người nộp thuế quy định tại điểm đ khoản 1 Điều 20 Luật số 108/2025/QH15: Văn bản của cơ quan có thẩm quyền thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc giấy phép hoạt động kinh doanh nền tảng thương mại điện tử."},{"k":"p","t":"3. Trình tự, thủ tục khoanh tiền thuế nợ"},{"k":"p","t":"a) Đối với các trường hợp được khoanh tiền thuế nợ theo quy định tại khoản 1 Điều này, khi có đầy đủ hồ sơ quy định tại khoản 2 Điều này, cơ quan hải quan ban hành quyết định khoanh tiền thuế nợ theo Mẫu số 41 tại Phụ lục I Thông tư này đối với số tiền thuế nợ, thời gian khoanh tiền thuế nợ thực hiện theo quy định tại khoản 3 Điều 34 Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"b) Trường hợp người nộp thuế đã được cơ quan hải quan ban hành quyết định khoanh tiền thuế nợ mà Tòa án hủy quyết định tuyên bố một người là đã chết, mất năng lực hành vi dân sự hoặc người nộp thuế tiếp tục hoạt độ
