ng kinh doanh thì cơ quan hải quan ban hành quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo Mẫu số 42 tại Phụ lục I Thông tư này. Tiền chậm nộp được tính kể từ ngày hết thời hạn nộp tiền thuế, khoản thu khác đến thời điểm nộp tiền thuế, khoản thu khác vào ngân sách;"},{"k":"p","t":"c) Trường hợp người nộp thuế đã được cơ quan hải quan ban hành quyết định khoanh tiền thuế nợ, khi thuộc trường hợp xóa nợ theo quy định tại Điều 21 Luật số 108/2025/QH15, cơ quan hải quan ban hành quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo Mẫu số 42 tại Phụ lục I Thông tư này và thực hiện xóa nợ theo quy định."},{"k":"p","t":"4. Trình tự, thủ tục chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ, quyết định điều chỉnh số tiền thuế nợ được khoanh"},{"k":"p","t":"a) Các trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"b) Hồ sơ chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ."},{"k":"p","t":"b.1) Đối với trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại điểm a khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"b.1.1) Quyết định khoanh tiền thuế nợ đã ban hành;"},{"k":"p","t":"b.1.2) Thông tin về việc người nộp thuế đã được khoanh tiền thuế nợ quay lại sản xuất kinh doanh do cơ quan thuế cập nhật và chuyển thông tin cho cơ quan hải quan hoặc văn bản xác nhận của Ủy ban nhân dân cấp xã về việc người nộp thuế quay lại sản xuất kinh doanh."},{"k":"p","t":"b.2) Đối với trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại điểm b khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"b.2.1) Quyết định khoanh tiền thuế nợ đã ban hành;"},{"k":"p","t":"b.2.2) Thông tin về việc thành lập cơ sở sản xuất, kinh doanh hoặc doanh nghiệp khác của cá nhân, cá nhân kinh doanh, chủ hộ kinh doanh, chủ doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên đã được khoanh nợ do cơ quan thuế cập nhật và chuyển thông tin cho cơ quan hải quan."},{"k":"p","t":"b.3) Đối với trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại điểm c khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"b.3.1) Quyết định khoanh tiền thuế nợ đã ban hành;"},{"k":"p","t":"b.3.2) Quyết định của Tòa án hủy quyết định tuyên bố một người là đã chết, mất tích hoặc mất năng lực hành vi dân sự theo quy định."},{"k":"p","t":"b.4) Đối với trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại điểm d khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"b.4.1) Quyết định khoanh tiền thuế nợ đã ban hành;"},{"k":"p","t":"b.4.2) Hồ sơ tài liệu chứng minh người nộp thuế đủ điều kiện để được xóa nợ theo quy định tại Điều 21 Luật số 108/2025/QH15."},{"k":"p","t":"b.5) Đối với trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại điểm đ khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"b.5.1) Quyết định khoanh tiền thuế nợ đã ban hành;"},{"k":"p","t":"b.5.2) Quyết định của nhưng Tòa án quyết định không mở thủ tục phá sản hoặc đình chỉ thủ tục phá sản; Tòa án công nhận phương án phục hồi hoạt động kinh doanh hoặc đình chỉ thủ tục phục hồi hoạt động kinh doanh theo quy định tại điểm a, b, c và d khoản 1 Điều 37 Luật Phục hồi, phá sản số 142/2025/QH15."},{"k":"p","t":"b.6) Đối với trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo quy định tại điểm e khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"b.6.1) Quyết định khoanh tiền thuế nợ đã ban hành;"},{"k":"p","t":"b.6.2) Chứng từ nộp ngân sách nhà nước, lệnh thu ngân sách nhà nước, các hồ sơ, tài liệu khác chứng minh người nộp thuế không còn nợ số tiền thuế nợ đã được khoanh."},{"k":"p","t":"c) Cơ quan hải quan thực hiện tính tiền chậm nộp đầy đủ đối với số tiền thuế nợ đã khoanh kể từ thời điểm hết hạn nộp thuế theo quy định;"},{"k":"p","t":"d) Trình tự, thủ tục, chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ"},{"k":"p","t":"d.1) Trường hợp người nộp thuế đã được cơ quan hải quan ban hành quyết định khoanh tiền thuế nợ nhưng thuộc các trường hợp quy định tại các điểm a, b, c, d và đ khoản 6 Điều 34 Nghị định số 252/2026/NĐ-CP thì cơ quan hải quan căn cứ hồ sơ ban hành quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo Mẫu số 42 tại Phụ lục I Thông tư này;"},{"k":"p","t":"d.2) Trường hợp người nộp thuế đã được khoanh nợ nhưng người nộp thuế không còn nợ số tiền thuế nợ đã được khoanh theo quy định tại điểm e khoản 6 Điều 34 Nghị định số 252/2026/QH15 thì cơ quan hải quan căn cứ hồ sơ ban hành quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ theo Mẫu số 42 tại Phụ lục I Thông tư này."},{"k":"p","t":"5. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, ban hành quyết định khoanh tiền thuế nợ, quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_35","no":35,"code":"Điều 35","title":"Điều 35. Hồ sơ, trình tự, thủ tục xóa tiền thuế nợ","shortTitle":"Hồ sơ, trình tự, thủ tục xóa tiền thuế nợ","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ xóa tiền thuế nợ đối với trường hợp quy định tại điểm a, b và c khoản 1 Điều 21 Luật số 108/2025/QH15"},{"k":"p","t":"a) Công văn đề nghị xóa nợ của cơ quan hải quan nơi phát sinh khoản nợ theo Mẫu số 15 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 43 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Tương ứng với các trường hợp được xóa tiền thuế nợ quy định tại khoản 1 Điều 21 Luật số 108/2025/QH15, chứng từ gồm:"},{"k":"p","t":"b.1) Giấy chứng tử, giấy báo tử; Quyết định tuyên bố một người là đã chết, mất tích hoặc mất năng lực hành vi dân sự của Tòa án hoặc các văn bản của cơ quan nhà nước có thẩm quyền chứng minh một người là đã chết, mất năng lực hành vi dân sự đối với trường hợp quy định tại điểm a khoản 1 Điều 21 Luật số 108/2025/QH15;"},{"k":"p","t":"b.2) Quyết định của cơ quan nhà nước có thẩm quyền về tuyên bố phá sản doanh nghiệp đối với trường hợp quy định tại điểm b khoản 1 Điều 21 Luật số 108/2025/QH15;"},{"k":"p","t":"b.3) Quyết định của cơ quan có thẩm quyền về việc thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc giấy phép hoạt động kinh doanh nền tảng thương mại điện tử đối với trường hợp quy định tại điểm c khoản 1 Điều 21 Luật số 108/2025/QH15;"},{"k":"p","t":"b.4) Các quyết định cưỡng chế hoặc hồ sơ thực hiện biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế đối với người nộp thuế (nếu có)."},{"k":"p","t":"2. Hồ sơ xóa nợ đối với trường hợp quy định tại điểm d khoản 1 Điều 21 Luật số 108/2025/QH15, khoản 2 Điều 35 Nghị định số 252/2026/NĐ-CP"},{"k":"p","t":"a) Người nộp thuế có văn bản đề nghị gửi cơ quan hải quan theo Mẫu số 15 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 43 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Văn bản của cơ quan nhà nước có thẩm quyền xác nhận cho các trường hợp bị ảnh hưởng do thiên tai, thảm họa, dịch bệnh có phạm vi rộng;"},{"k":"p","t":"c) Quyết định miễn tiền chậm nộp theo quy định tại Điều 10 Thông tư này (nếu có);"},{"k":"p","t":"d) Quyết định gia hạn nộp thuế theo quy định tại Điều 6 Thông tư này (nếu có);"},{"k":"p","t":"đ) Chứng từ, tài liệu có liên quan để chứng minh người nộp thuế không có khả năng phục hồi sản xuất, kinh doanh và không có khả năng nộp tiền thuế nợ."},{"k":"p","t":"3. Trình tự, thủ tục xóa tiền thuế nợ"},{"k":"p","t":"a) Trường hợp thẩm quyền xóa nợ của Chi cục Hải quan khu vực theo quy định tại điểm b khoản 4 Điều 35 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"Cơ quan hải quan nơi theo dõi khoản nợ lập hồ sơ gửi Chi cục Hải quan khu vực quản lý trực tiếp xem xét, quyết định xóa nợ đối với người nộp thuế có số nợ thuộc phạm vi quản lý dưới 5.000.000.000 đồng theo quy định tại điểm b khoản 4 Điều 35 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"a.1) Trường hợp không thuộc đối tượng được xóa tiền thuế nợ thì Chi cục Hải quan khu vực thông báo cho cơ quan hải quan nơi gửi hồ sơ xóa nợ theo Mẫu số 02 tại Phụ lục I Thông tư này để tiếp tục theo dõi và đôn đốc thu hồi nợ thuế theo quy định;"},{"k":"p","t":"a.2) Trường hợp thuộc đối tượng xóa tiền thuế nợ nhưng hồ sơ chưa đầy đủ thì Chi cục Hải quan khu vực thông báo cho cơ quan hải quan nơi gửi hồ sơ xóa nợ bổ sung hồ sơ theo Mẫu số 06 tại Phụ lục I Thông tư này;"},{"k":"p","t":"a.3) Trường hợp thuộc đối tượng được xóa tiền thuế nợ và hồ sơ đầy đủ thì Chi cục trưởng Chi cục Hải quan khu vực ban hành quyết định xóa nợ theo Mẫu số 44 tại Phụ lục I Thông tư này."},{"k":"p","t":"b) Trường hợp thuộc thẩm quyền xóa tiền thuế nợ quy định tại điểm b khoản 4 Điều 35 Nghị định số 252/2026/NĐ-CP và hồ sơ đầy đủ, Chi cục Điều tra chống buôn lậu, Chi cục Kiểm tra sau thông quan rà soát, đối chiếu tiền thuế nợ thuộc phạm vi theo dõi để Chi cục trưởng Chi cục Điều tra chống buôn lậu, Chi cục trưởng Chi cục Kiểm tra sau thông quan ban hành Quyết định xóa nợ theo Mẫu số 44 tại Phụ lục I Thông tư này;"},{"k":"p","t":"c) Trường hợp thuộc thẩm quyền xóa tiền thuế nợ của Cục trưởng Cục Hải quan, Bộ trưởng Bộ Tài chính theo quy định tại điểm c, điểm d khoản 4 Điều 35 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"c.1) Chi cục Hải quan khu vực/Chi cục Điều tra chống buôn lậu/Chi cục Kiểm tra sau thông quan tổng hợp các khoản nợ tại các đơn vị thuộc và trực thuộc, lập hồ sơ gửi Cục Hải quan xem xét, quyết định xóa nợ."},{"k":"p","t":"c.1.1) Trường hợp thuộc đối tượng xóa tiền thuế nợ nhưng hồ sơ chưa đầy đủ thì Cục Hải quan thông báo cho cơ quan hải quan nơi gửi hồ sơ xóa nợ bổ sung hồ sơ theo Mẫu số 06 tại Phụ lục I Thông tư này;"},{"k":"p","t":"c.1.2) Trường hợp không thuộc đối tượng được xóa tiền thuế nợ thì Cục Hải quan thông báo cho cơ quan hải quan nơi gửi hồ sơ xóa nợ theo Mẫu số 02 tại Phụ lục I Thông tư này để tiếp tục theo dõi và đôn đốc thu hồi nợ thuế theo quy định;"},{"k":"p","t":"c.1.3) Trường hợp thuộc đối tượng được xóa tiền thuế nợ thuộc thẩm quyền của Cục trưởng Cục Hải quan theo quy định tại điểm c khoản 4 Điều 35 Nghị định số 252/2026/NĐ-CP và hồ sơ đầy đủ, Cục trưởng Cục Hải quan ban hành Quyết định xóa tiền thuế nợ theo Mẫu số 44 tại Phụ lục I Thông tư này."},{"k":"p","t":"c.2) Trường hợp thuộc đối tượng được xóa tiền thuế nợ thuộc thẩm quyền của Bộ trưởng Bộ Tài chính theo quy định tại điểm d khoản 4 Điều 35 Nghị định số 252/2026/NĐ-CP và hồ sơ đầy đủ, Cục Hải quan báo cáo báo cáo Bộ trưởng Bộ Tài chính ban hành Quyết định xóa tiền thuế nợ theo Mẫu số 44 tại Phụ lục I Thông tư này."},{"k":"p","t":"d) Trường hợp người nộp thuế bị ảnh hưởng do thiên tai, thảm họa, dịch bệnh có phạm vi rộng theo quy định tại điểm d khoản 1 Điều 21 Luật số 108/2025/QH15, khoản 2 Điều 35 Nghị định số 252/2026/NĐ-CP thì gửi hồ sơ đề nghị xóa tiền thuế nợ đến cơ quan hải quan nơi quản lý khoản tiền thuế nợ để được xem xét, xóa nợ theo quy định."},{"k":"p","t":"d.1) Trường hợp không thuộc đối tượng được xóa tiền thuế nợ thì cơ quan hải quan nơi tiếp nhận hồ sơ xóa nợ thông báo cho người nộp thuế theo Mẫu số 02 tại Phụ lục I Thông tư này;"},{"k":"p","t":"d.2) Trường hợp thuộc đối tượng xóa tiền thuế nợ nhưng hồ sơ chưa đầy đủ thì cơ quan hải quan nơi tiếp nhận hồ sơ xóa nợ thông báo cho người nộp thuế theo Mẫu số 06 tại Phụ lục I Thông tư này;"},{"k":"p","t":"d.3) Trường hợp thuộc đối tượng được xóa tiền thuế nợ và hồ sơ đầy đủ, cơ quan hải quan nơi tiếp nhận hồ sơ xóa nợ rà soát, gửi hồ sơ đề nghị xóa nợ theo thẩm quyền, trình tự quy định tại điểm a, điểm b, điểm c khoản 3 Điều này."},{"k":"p","t":"4. Trình tự, thủ tục, hồ sơ phục hồi tiền thuế nợ đã được xóa"},{"k":"p","t":"Người nộp thuế đã được xóa tiền thuế nợ nhưng thuộc trường hợp quy định tại khoản 2 Điều 21 Luật số 108/2025/QH15 thì thực hiện hồ sơ, trình tự, thủ tục phục hồi tiền thuế nợ đã xóa như sau:"},{"k":"p","t":"a) Hồ sơ phục hồi tiền thuế nợ đã được xóa"},{"k":"p","t":"Công văn đề nghị phục hồi tiền thuế nợ đã được xóa của cơ quan hải quan nơi theo dõi khoản nợ theo Mẫu số 16 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 45 tại Phụ lục I Thông tư này."},{"k":"p","t":"a.1) Quyết định xóa tiền thuế nợ đã ban hành;"},{"k":"p","t":"a.2) Thông tin về việc người nộp thuế là cá nhân, cá nhân kinh doanh, chủ hộ"},{"k":"p","t":"b) Trình tự, thủ tục phục hồi tiền thuế nợ đã xóa"},{"k":"p","t":"b.1) Đối với hồ sơ phục hồi tiền thuế nợ đã xóa do cơ quan hải quan nơi theo dõi khoản nợ lập hồ sơ gửi Chi cục Hải quan khu vực quản lý trực tiếp xem xét, quyết định xóa nợ"},{"k":"p","t":"b.1.1) Trường hợp không thuộc đối tượng phục hồi tiền thuế nợ đã xóa thì Chi cục Hải quan khu vực thông báo cho cơ quan hải quan nơi gửi hồ sơ theo Mẫu số 02 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.1.2) Trường hợp thuộc đối tượng phục hồi tiền thuế nợ đã xóa nhưng hồ sơ chưa đầy đủ thì Chi cục Hải quan khu vực thông báo cho cơ quan hải quan nơi gửi hồ sơ bổ sung theo Mẫu số 06 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.1.3) Trường hợp thuộc đối tượng được phục hồi tiền thuế nợ đã xóa và hồ sơ đầy đủ, Quyết định xóa nợ do Chi cục trưởng Chi cục Hải quan khu vực ban hành thì Chi cục trưởng Chi cục Hải quan khu vực ban hành Quyết định phục hồi tiền thuế nợ đã xóa theo Mẫu số 46 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.1.4) Trường hợp thuộc đối tượng được phục hồi tiền thuế nợ đã xóa và hồ sơ đầy đủ, Quyết định xóa nợ do Cục trưởng Cục Hải quan ban hành thì Chi cục Hải quan khu vực gửi hồ sơ đến Cục Hải quan để Cục trưởng Cục Hải quan ban hành Quyết định phục hồi tiền thuế nợ đã xóa theo Mẫu số 46 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.1.5) Trường hợp thuộc đối tượng được phục hồi tiền thuế nợ đã xóa và hồ sơ đầy đủ, Quyết định xóa nợ do Bộ trưởng Bộ Tài chính ban hành thì Chi cục Hải quan khu vực gửi hồ sơ đến Cục Hải quan để báo cáo Bộ trưởng Bộ Tài chính ban hành Quyết định phục hồi tiền thuế nợ đã xóa theo Mẫu số 46 tại Phụ lục I Thông tư này."},{"k":"p","t":"b.2) Đối với hồ sơ phục hồi tiền thuế nợ đã xóa do Chi cục Điều tra chống buôn lậu, Chi cục Kiểm tra sau thông quan quyết định xóa nợ thì Chi cục Điều tra chống buôn lậu, Chi cục Kiểm tra sau thông quan để lập hồ sơ và ban hành quyết định phục hồi số tiền thuế nợ đã được xóa."},{"k":"p","t":"5. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, thông báo hoặc quyết định xóa nợ, quyết định phục hồi tiền thuế nợ đã được xóa thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_36","no":36,"code":"Điều 36","title":"Điều 36. Nộp dần tiền thuế nợ","shortTitle":"Nộp dần tiền thuế nợ","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế nợ tiền thuế thuộc trường hợp được nộp dần tiền thuế nợ theo quy định tại điểm b khoản 2 Điều 65 Nghị định số 252/2026/NĐ-CP thì được nộp dần tiền thuế nợ theo quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Người nộp thuế được đăng ký và cam kết nộp dần tiền thuế nợ theo các mức sau:"},{"k":"p","t":"a) Tiền thuế nợ từ 500.000.000 đồng đến dưới 1.000.000.000 đồng, thời gian nộp dần tiền thuế tối đa không quá 3 tháng;"},{"k":"p","t":"b) Tiền thuế nợ từ 1.000.000.000 đồng đến dưới 2.000.000.000 đồng, thời gian nộp dần tiền thuế tối đa không quá 6 tháng;"},{"k":"p","t":"c) Tiền thuế nợ từ 2.000.000.000 đồng trở lên, thời gian nộp dần tiền thuế tối đa không quá 12 tháng."},{"k":"p","t":"Thời hạn quy định tại các điểm a, điểm b và điểm c khoản này được tính từ ngày cơ quan có thẩm quyền ban hành văn bản chấp thuận nộp dần tiền thuế nợ và trong thời hạn thư bảo lãnh có hiệu lực;"},{"k":"p","t":"d) Trường hợp hết thời hạn nộp dần tiền thuế nợ nhưng người nộp thuế chưa nộp đủ số tiền thuế nợ, tiền chậm nộp (nếu có) thì tổ chức tín dụng nhận bảo lãnh có trách nhiệm nộp thay người nộp thuế tiền thuế nợ, tiền chậm nộp theo quy định tại điểm b khoản 2 Điều 65 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"3. Hồ sơ đề nghị nộp dần tiền thuế nợ"},{"k":"p","t":"a) Công văn đề nghị nộp dần tiền thuế nợ của người nộp thuế theo Mẫu số 17 tại Phụ lục II Thông tư này hoặc theo Mẫu số 47 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Thư bảo lãnh của tổ chức tín dụng về số tiền thuế nợ nộp dần tiền thuế nợ thực hiện theo quy định tại Điều 43 Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi khoản 24 Điều 1 Thông tư số 39/2018/TT-BTC đối với trường hợp thư bảo lãnh bản giấy. Trường hợp bảo lãnh điện tử thì người nộp thuế không phải nộp chứng từ này."},{"k":"p","t":"4. Tiếp nhận, giải quyết hồ sơ nộp dần tiền thuế nợ"},{"k":"p","t":"a) Tiếp nhận hồ sơ"},{"k":"p","t":"a.1) Đội Phúc tập và kiểm tra sau thông quan, Đội Thông quan, Hải quan cửa khẩu/ngoài cửa khẩu và cơ quan hải quan thuộc Chi cục Hải quan khu vực tiếp nhận hồ sơ đối với trường hợp tiền thuế nợ đề nghị nộp dần phát sinh tại đơn vị;"},{"k":"p","t":"a.2) Chi cục Hải quan khu vực tiếp nhận hồ sơ đối với trường hợp tiền thuế nợ đề nghị nộp dần phát sinh tại nhiều đơn vị thuộc Chi cục Hải quan khu vực;"},{"k":"p","t":"a.3) Chi cục Điều tra chống buôn lậu, Chi cục Kiểm tra sau thông quan và cơ quan hải quan thuộc Cục Hải quan tiếp nhận hồ sơ đối với trường hợp tiền thuế nợ đề nghị nộp dần phát sinh tại đơn vị;"},{"k":"p","t":"a.4) Cục Hải quan tiếp nhận hồ sơ đối với trường hợp tiền thuế nợ đề nghị nộp dần phát sinh tại nhiều Chi cục Hải quan khu vực."},{"k":"p","t":"b) Thời hạn giải quyết"},{"k":"p","t":"b.1) Trường hợp thuộc thẩm quyền giải quyết quy định tại điểm a.1 khoản này, trong thời hạn 01 ngày làm việc kể từ ngày nhận đủ hồ sơ thì cơ quan hải quan thông báo đến người nộp thuế;"},{"k":"p","t":"b.2) Trường hợp thuộc thẩm quyền quy định tại điểm a.2 và a3 khoản này, trong thời hạn 02 ngày làm việc kể từ ngày nhận đủ hồ sơ thì Chi cục trưởng Chi cục Hải quan có văn bản thông báo đến người nộp thuế;"},{"k":"p","t":"b.3) Trường hợp thuộc thẩm quyền quy định tại điểm a.4 khoản này, trong thời hạn 03 ngày làm việc kể từ ngày nhận đủ hồ sơ thì Cục trưởng Cục Hải quan có văn bản thông báo đến người nộp thuế."},{"k":"p","t":"c) Cơ quan hải quan kiểm tra hồ sơ, đối chiếu dữ liệu trên Hệ thống xử lý dữ liệu điện tử hải quan, thông báo chấp thuận hoặc không chấp thuận nộp dần tiền thuế nợ hoặc đề nghị bổ sung hồ sơ gửi người nộp thuế thực hiện theo Mẫu số 48 tại Phụ lục I Thông tư này."},{"k":"p","t":"5. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, thông báo chấp thuận hoặc không chấp thuận nộp dần tiền thuế nợ hoặc đề nghị bổ sung hồ sơ thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_37","no":37,"code":"Điều 37","title":"Điều 37. Các trường hợp kiểm tra thuế, thẩm quyền kiểm tra thuế","shortTitle":"Các trường hợp kiểm tra thuế, thẩm quyền kiểm tra thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan hải quan thực hiện kiểm tra thuế trong các trường hợp quy định tại khoản 2, điểm a, điểm b khoản 3 Điều 22 Luật số 108/2025/QH15. Trường hợp kiểm tra sau thông quan thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"2. Thẩm quyền quyết định kiểm tra thuế"},{"k":"p","t":"Cục trưởng Cục Hải quan, Chi cục trưởng Chi cục Hải quan khu vực, Đội trưởng Hải quan cửa khẩu/ngoài cửa khẩu, Đội trưởng Đội Thông quan, Đội trưởng Đội phúc tập và kiểm tra sau thông quan và thủ trưởng cơ quan hải quan khác được giao thực hiện chức năng kiểm tra thuế."}]},{"id":"tt86_38","no":38,"code":"Điều 38","title":"Điều 38. Kiểm tra thuế tại trụ sở cơ quan hải quan","shortTitle":"Kiểm tra thuế tại trụ sở cơ quan hải quan","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc kiểm tra thuế tại trụ sở của cơ quan hải quan được thực hiện theo quy định tại điểm a, điểm b khoản 2 Điều 22 Luật số 108/2025/QH15."},{"k":"p","t":"2. Việc xử lý kết quả kiểm tra thuế tại trụ sở của cơ quan hải quan được quy định như sau:"},{"k":"p","t":"a) Trường hợp kiểm tra trong quá trình làm thủ tục hải quan mà phát hiện vi phạm dẫn đến thiếu thuế, trốn thuế thi người nộp thuế phải nộp đủ thuế, bị xử lý theo quy định của pháp luật về quản lý thuế và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Trường hợp hồ sơ thuế có nội dung cần làm rõ liên quan đến số tiền thuế phải nộp, số tiền thuế được miễn, số tiền thuế được giảm, số tiền thuế được hoàn, số tiền thuế không thu, số thuế không chịu thì cơ quan hải quan thông báo yêu cầu người nộp thuế giải trình hoặc bổ sung thông tin, tài liệu."},{"k":"p","t":"Trường hợp người nộp thuế đã giải trình và bổ sung thông tin, tài liệu chứng minh số tiền thuế đã khai là đúng thì hồ sơ thuế được chấp nhận."},{"k":"p","t":"Trường hợp không đủ căn cứ chứng minh số tiền thuế đã khai là đúng thì cơ quan hải quan yêu cầu người nộp thuế khai bổ sung."},{"k":"p","t":"Trường hợp hết thời hạn theo thông báo của cơ quan hải quan mà người nộp thuế không giải trình, bổ sung thông tin, tài liệu hoặc không khai bổ sung hồ sơ thuế hoặc giải trình, khai bổ sung hồ sơ thuế không đúng thì Thủ trưởng cơ quan hải quan quyết định ấn định số tiền thuế phải nộp theo quy định tại Điều 39 Nghị định số 252/2026/NĐ-CP hoặc ban hành quyết định kiểm tra thuế tại trụ sở của người nộp thuế theo quy định tại Điều 39 Thông tư này hoặc làm căn cứ để xây dựng kế hoạch kiểm tra theo nguyên tắc quản lý rủi ro trong quản lý thuế."}]},{"id":"tt86_39","no":39,"code":"Điều 39","title":"Điều 39. Kiểm tra thuế tại trụ sở người nộp thuế","shortTitle":"Kiểm tra thuế tại trụ sở người nộp thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp kiểm tra thuế tại trụ sở người nộp thuế thực hiện theo quy định điểm a, điểm b khoản 3 Điều 22 Luật số 108/2025/QH15."},{"k":"p","t":"2. Lập kế hoạch, phê duyệt và điều chỉnh kế hoạch kiểm tra hàng năm"},{"k":"p","t":"a) Lựa chọn đối tượng kiểm tra (hàng hóa, tờ khai hải quan, người nộp thuế, hồ sơ thuế) để lập kế hoạch kiểm tra thuế tại trụ sở người nộp thuế theo nguyên tắc quản lý rủi ro;"},{"k":"p","t":"b) Trên cơ sở danh sách đối tượng kiểm tra đã được lựa chọn (sau khi loại trừ các đối tượng thuộc danh sách kế hoạch điều tra chống buôn lậu, kiểm tra sau thông quan, kiểm tra chuyên ngành của cơ quan hải quan; kế hoạch kiểm tra của cơ quan thuế hoặc Kiểm toán nhà nước; kế hoạch thanh tra của cơ quan thanh tra; công tác điều tra của cơ quan công an), bộ phận kiểm tra lập kế hoạch kiểm tra thuế tại trụ sở người nộp thuế phù hợp với yêu cầu thực tế quản lý thuế;"},{"k":"p","t":"c) Danh sách đối tượng kiểm tra tại trụ sở người nộp thuế phải được Thủ trưởng cơ quan hải quan phê duyệt trước khi thực hiện kiểm tra;"},{"k":"p","t":"d) Khi cần thiết, Thủ trưởng cơ quan hải quan thực hiện điều chỉnh kế hoạch kiểm tra trong trường hợp sau:"},{"k":"p","t":"d1) Theo yêu cầu của Bộ trưởng Bộ Tài chính hoặc Thủ trưởng cơ quan hải quan cấp trên;"},{"k":"p","t":"d2) Theo đề xuất của bộ phận lập kế hoạch kiểm tra;"},{"k":"p","t":"d3) Trùng lặp trong hoạt động kiểm tra."},{"k":"p","t":"3. Ban hành quyết định kiểm tra"},{"k":"p","t":"a) Thủ trưởng cơ quan hải quan ban hành Quyết định kiểm tra thuế tại trụ sở người nộp thuế theo Mẫu số 49 tại Phụ lục I Thông tư này đối với các trường hợp quy định tại điểm a, điểm b khoản 3 Điều 22 Luật số 108/2025/QH15. Quyết định kiểm tra thuế được gửi người nộp thuế chậm nhất trong thời hạn 03 ngày làm việc kể từ ngày ký và trước thời điểm công bố quyết định kiểm tra 05 ngày làm việc trừ trường hợp kiểm tra theo dấu hiệu vi phạm. Trường hợp cần thiết, trước khi công bố quyết định kiểm tra, cơ quan hải quan có văn bản thông báo cho người nộp thuế theo Mẫu số 50 tại Phụ lục I Thông tư này để thông báo các nội dung cần chuẩn bị, chứng từ, hồ sơ, tài liệu có liên quan và cử người đại diện có thẩm quyền làm việc với Đoàn kiểm tra;"},{"k":"p","t":"b) Thành phần Đoàn kiểm tra gồm: Trưởng đoàn kiểm tra, Phó Trưởng đoàn kiểm tra (nếu có) và các thành viên Đoàn kiểm tra."},{"k":"p","t":"Nhiệm vụ, quyền hạn của trưởng đoàn kiểm tra, các thành viên đoàn kiểm tra thực hiện theo quy định tại điểm b, điểm c khoản 5 Điều 22 Luật số 108/2025/QH15."},{"k":"p","t":"c) Đoàn kiểm tra thu thập thông tin, tài liệu, xác minh thông tin, tài liệu liên quan đến nội dung kiểm tra và lập kế hoạch tiến hành kiểm tra, báo cáo người ban hành quyết định kiểm tra phê duyệt trước khi tiến hành kiểm tra."},{"k":"p","t":"4. Quyết định kiểm tra được bãi bỏ, điều chỉnh trong các trường hợp"},{"k":"p","t":"Quyết định kiểm tra thuế tại trụ sở người nộp thuế được người ban hành quyết định kiểm tra bãi bỏ trong trường hợp người nộp thuế đã bỏ trốn, giải thể, phá sản, mất tích, ngừng hoạt động và các trường hợp khác dẫn đến cơ quan hải quan không thực hiện được quyết định kiểm tra. Quyết định bãi bỏ quyết định kiểm tra thuế tại trụ sở người nộp thuế phải nêu rõ lý do bãi bỏ. Trường hợp cần điều chỉnh quyết định kiểm tra, người có thẩm quyền ban hành quyết định điều chỉnh."},{"k":"p","t":"5. Thời hạn kiểm tra"},{"k":"p","t":"a) Thời hạn kiểm tra tại trụ sở người nộp thuế thực hiện theo quy định tại điểm d khoản 3 Điều 22 Luật số 108/2025/QH15, không quá 20 ngày kể từ ngày công bố Quyết định kiểm tra. Trường hợp cần thiết, người có thẩm quyền ban hành Quyết định kiểm tra được gia hạn thời hạn kiểm tra một lần; thời gian gia hạn không quá 20 ngày. Trong trường hợp gia hạn, trưởng đoàn kiểm tra báo cáo người có thẩm quyền ban hành Quyết định gia hạn theo Mẫu số 51 tại Phụ lục I Thông tư này và thông báo cho người nộp thuế biết trước khi hết thời hạn kiểm tra;"},{"k":"p","t":"b) Thời gian tạm dừng kiểm tra theo quy định tại khoản 6 Điều này không tính vào thời hạn kiểm tra."},{"k":"p","t":"6. Tạm dừng kiểm tra"},{"k":"p","t":"a) Tạm dừng kiểm tra trước khi công bố Quyết định kiểm tra"},{"k":"p","t":"Cơ quan hải quan có văn bản thông báo cho người nộp thuế về việc tạm dừng kiểm tra trước khi công bố Quyết định kiểm tra theo Mẫu số 52 tại Phụ lục I Thông tư này trong các trường hợp sau:"},{"k":"p","t":"a.1) Người nộp thuế có lý do bất khả kháng không thể thực hiện kiểm tra hoặc đang chịu sự kiểm tra, thanh tra, điều tra của cơ quan hải quan, cơ quan thuế, cơ quan thanh tra, Kiểm toán nhà nước, cơ quan công an và có văn bản đề nghị tạm dừng kiểm tra gửi Đoàn kiểm tra;"},{"k":"p","t":"a.2) Cơ quan hải quan có lý do bất khả kháng hoặc có căn cứ khách quan khác làm ảnh hưởng đến việc thực hiện kiểm tra."},{"k":"p","t":"b) Tạm dừng kiểm tra trong quá trình kiểm tra"},{"k":"p","t":"b.1) Các trường hợp tạm dừng kiểm tra"},{"k":"p","t":"b.1.1) Cần xác minh tại cơ quan, tổ chức, cá nhân có liên quan;"},{"k":"p","t":"b.1.2) Có sự kiện bất khả kháng làm ảnh hưởng đến thời gian tiến hành kiểm tra;"},{"k":"p","t":"b.1.3) Cần chuyển hồ sơ vụ việc sang cơ quan thanh tra, cơ quan điều tra hoặc cơ quan có thẩm quyền khác theo quy định của pháp luật;"},{"k":"p","t":"b.1.4) Người nộp thuế đề nghị tạm dừng kiểm tra do cần thời gian xử lý, khắc phục sự cố phát sinh bởi sự kiện bất khả kháng hoặc lý do khách quan khác làm ảnh hưởng đến việc thực hiện kiểm tra. Văn bản đề nghị tạm dừng kiểm tra nêu rõ lý do tạm dừng và thời gian tạm dừng."},{"k":"p","t":"b.2) Cơ quan hải quan thông báo tạm dừng kiểm tra cho người nộp thuế theo Mẫu số 52 tại Phụ lục I Thông tư này trong các trường hợp quy định từ điểm b.1.1 đến b.1.3 khoản này."},{"k":"p","t":"Đối với trường hợp tạm dừng kiểm tra theo đề nghị của người nộp thuế, cơ quan hải quan xem xét thông báo chấp nhận hoặc không chấp nhận đề nghị của người nộp thuế. Trường hợp không chấp nhận đề nghị thì nêu rõ lý do."},{"k":"p","t":"b.3) Đoàn kiểm tra tiếp tục kiểm tra khi lý do tạm dừng không còn hoặc hết thời hạn tạm dừng kiểm tra."},{"k":"p","t":"7. Trường hợp người nộp thuế không chấp hành Quyết định kiểm tra, Đoàn kiểm tra lập biên bản để làm căn cứ xử lý vi phạm hành chính theo quy định của pháp luật. Trường hợp người nộp thuế chấp hành Quyết định kiểm tra, Đoàn kiểm tra tiến hành kiểm tra theo quy định tại khoản 9 Điều này."},{"k":"p","t":"9. Tiến hành kiểm tra"},{"k":"p","t":"a) Công bố quyết định kiểm tra"},{"k":"p","t":"Việc công bố Quyết định kiểm tra phải được thực hiện chậm nhất trong thời hạn 10 ngày làm việc kể từ ngày ban hành Quyết định kiểm tra, trừ trường hợp tạm dừng kiểm tra theo quy định tại khoản 6 Điều này."},{"k":"p","t":"Khi tiến hành kiểm tra, Trưởng đoàn kiểm tra tổ chức công bố Quyết định kiểm tra và lập Biên bản công bố Quyết định kiểm tra theo Mẫu số 53 tại Phụ lục I Thông tư này với đại diện có thẩm quyền của người nộp thuế."},{"k":"p","t":"b) Thực hiện kiểm tra"},{"k":"p","t":"Đoàn kiểm tra thực hiện kiểm tra theo nội dung, phạm vi của quyết định kiểm tra, nguyên tắc kiểm tra thuế theo quy định tại khoản 1 Điều 22 Luật số 108/2025/QH15."},{"k":"p","t":"Trưởng đoàn kiểm tra, thành viên Đoàn kiểm tra yêu cầu người nộp thuế cung cấp thông tin, hồ sơ, tài liệu phục vụ công tác kiểm tra."},{"k":"p","t":"Đoàn kiểm tra thực hiện kiểm tra hồ sơ hải quan, đối chiếu nội dung khai báo với sổ kế toán, chứng từ kế toán, các chứng từ khác, tài liệu, dữ liệu có liên quan đến hàng hóa xuất khẩu, nhập khẩu, kiểm tra thực tế hàng hóa xuất khẩu, nhập khẩu trong trường hợp cần thiết và còn điều kiện, đánh giá việc chấp hành chính sách, pháp luật liên quan đến hàng hóa xuất khẩu, nhập khẩu của người nộp thuế."},{"k":"p","t":"Trong quá trình kiểm tra, Đoàn kiểm tra ghi nhận kết quả kiểm tra khi kết thúc kiểm tra đối với từng nội dung bằng biên bản kiểm tra theo Mẫu số 54 tại Phụ lục I Thông tư này. Biên bản kiểm tra phải ghi nhận đầy đủ nội dung đã kiểm tra, kết quả kiểm tra, giải trình của người nộp thuế nếu có, hồ sơ, chứng từ, tài liệu do người nộp thuế cung cấp, tài liệu xác minh và các căn cứ làm cơ sở xem xét, kết luận kiểm tra."},{"k":"p","t":"Kết thúc kiểm tra, Đoàn kiểm tra lập Biên bản kiểm tra theo Mẫu số 54 tại Phụ lục I Thông tư này ghi nhận toàn bộ kết quả kiểm tra và thời gian kết thúc quá trình kiểm tra."},{"k":"p","t":"Trường hợp người nộp thuế không ký Biên bản kiểm tra thì Trưởng đoàn kiểm tra đề nghị người làm chứng ký xác nhận tại biên bản kiểm tra về việc người nộp thuế không ký biên bản và báo cáo người ban hành Quyết định kiểm tra để xử lý theo quy định."},{"k":"p","t":"10. Ban hành kết luận kiểm tra"},{"k":"p","t":"Chậm nhất trong thời hạn 15 ngày kể từ ngày kết thúc thời hạn kiểm tra, người ban hành Quyết định kiểm tra ký ban hành kết luận kiểm tra theo Mẫu số 55 tại Phụ lục I Thông tư này, trừ trường hợp quy định tại điểm b, điểm c khoản này."},{"k":"p","t":"a) Trường hợp có đủ cơ sở kết luận, Trưởng đoàn kiểm tra báo cáo người ban hành Quyết định kiểm tra ký ban hành kết luận kiểm tra và các quyết định hành chính (nếu có) trên cơ sở hồ sơ, tài liệu, dữ liệu của Đoàn kiểm tra;"},{"k":"p","t":"b) Trường hợp có nội dung đã đủ cơ sở kết luận và có nội dung cần ý kiến chuyên môn của cơ quan có thẩm quyền thì cơ quan hải quan ban hành Kết luận kiểm tra đối với nội dung đã đủ cơ sở kết luận. Đối với nội dung cần ý kiến chuyên môn, việc ban hành kết luận kiểm tra bổ sung được thực hiện theo điểm c khoản này;"},{"k":"p","t":"c) Trường hợp chưa đủ cơ sở kết luận và cần ý kiến chuyên môn của cơ quan có thẩm quyền thì thời hạn ban hành kết luận kiểm tra là 10 ngày làm việc kể từ ngày nhận được văn bản trả lời của cơ quan chuyên môn có thẩm quyền."},{"k":"p","t":"Trường hợp quá 20 ngày kể từ ngày cơ quan hải quan gửi văn bản lấy ý kiến mà không nhận được ý kiến bằng văn bản của cơ quan chuyên môn có thẩm quyền thi cơ quan hải quan ban hành Kết luận kiểm tra trên cơ sở hồ sơ, tài liệu, dữ liệu hiện có và kết quả kiểm tra."},{"k":"p","t":"Trường hợp ngày cuối cùng của thời hạn ban hành kết luận kiểm tra là ngày nghỉ, ngày lễ, Tết thì thời hạn ban hành Kết luận kiểm tra là ngày làm việc tiếp theo."},{"k":"p","t":"11. Xử lý kết quả kiểm tra"},{"k":"p","t":"Căn cứ kết luận kiểm tra, kết luận kiểm tra bổ sung, người ban hành Quyết định kiểm tra tổ chức thực hiện hoặc phân công người có thẩm quyền cấp dưới thực hiện các nội dung sau:"},{"k":"p","t":"a) Ban hành các quyết định hành chính về quản lý thuế, quản lý hải quan theo quy định của pháp luật (nếu có);"},{"k":"p","t":"b) Chuyển hồ sơ để xử lý theo quy định của pháp luật về hình sự hoặc pháp luật về xử phạt vi phạm hành chính (nếu có);"},{"k":"p","t":"c) Đôn đốc người nộp thuế thực hiện nộp tiền thuế, tiền chậm nộp, tiền phạt vi phạm hành chính và các khoản phải nộp khác (nếu có);"},{"k":"p","t":"d) Ban hành quyết định hoặc tổ chức thực hiện cưỡng chế thi hành quyết định hành chính về quản lý thuế theo quy định của pháp luật (nếu có);"},{"k":"p","t":"đ) Cập nhật thông tin trên hệ thống cơ sở dữ liệu của cơ quan hải quan theo quy định nếu có;"},{"k":"p","t":"e) Kiến nghị cơ quan có thẩm quyền sửa đổi, bổ sung, hoàn thiện cơ chế, chính sách pháp luật (nếu có);"},{"k":"p","t":"g) Xử lý trách nhiệm đối với tổ chức, cá nhân có liên quan theo quy định của pháp luật (nếu có)."}]},{"id":"tt86_40","no":40,"code":"Điều 40","title":"Điều 40. Kiểm tra lại trong hoạt động kiểm tra thuế","shortTitle":"Kiểm tra lại trong hoạt động kiểm tra thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan hải quan thực hiện kiểm tra lại đối với các trường hợp có dấu hiệu vi phạm pháp luật về thuế của người nộp thuế thuộc phạm vi quyết định kiểm tra thuế nhưng chưa được kiểm tra, phát hiện, chưa được kết luận hoặc đã kết luận nhưng chưa đầy đủ, chính xác từ các nguồn thông tin sau:"},{"k":"p","t":"a) Cơ quan có thẩm quyền về thanh tra, kiểm toán, điều tra phát hiện và kiến nghị cơ quan hải quan tiến hành kiểm tra lại;"},{"k":"p","t":"b) Thông tin thu thập được qua công tác nghiệp vụ của cơ quan hải quan, kiểm tra nội bộ, giải quyết đơn tố cáo, phản ánh của cơ quan hải quan, cơ quan quản lý nhà nước;"},{"k":"p","t":"c) Thông tin từ phía doanh nghiệp, thông tin của tổ chức, cá nhân có liên quan và các nguồn thông tin khác (nếu có)."},{"k":"p","t":"2. Thẩm quyền kiểm tra lại thực hiện theo quy định tại điểm b khoản 6 Điều 22 Luật số 108/2025/QH15 và được xác định như sau:"},{"k":"p","t":"a) Cục trưởng Cục Hải quan quyết định kiểm tra lại vụ việc đã được kiểm tra thuế theo Quyết định của Chi cục trưởng Chi cục Hải quan khu vực, Chi cục trưởng Chi cục kiểm tra sau thông quan, Thủ trưởng cơ quan hải quan được giao nhiệm vụ kiểm tra thuế;"},{"k":"p","t":"b) Chi cục trưởng Chi cục Hải quan khu vực quyết định kiểm tra lại vụ việc đã được kiểm tra thuế theo Quyết định của Đội trưởng Hải quan cửa khẩu/ngoài cửa khẩu, Đội trưởng Đội Thông quan, Thủ trưởng cơ quan hải quan thuộc Chi cục Hải quan khu vực được giao nhiệm vụ kiểm tra thuế;"},{"k":"p","t":"c) Thủ trưởng cơ quan hải quan khác được giao nhiệm vụ kiểm tra lại theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"3. Thời hạn, thời hiệu kiểm tra lại thực hiện theo quy định tại điểm d khoản 3, điểm d khoản 6 Điều 22 Luật số 108/2025/QH15."},{"k":"p","t":"4. Khi tiến hành kiểm tra lại, người ban hành quyết định kiểm tra, Trưởng đoàn kiểm tra, thành viên Đoàn kiểm tra thực hiện nhiệm vụ, quyền hạn được quy định tại khoản 5 Điều 22 của Luật số 108/2025/QH15."},{"k":"p","t":"5. Trình tự, thủ tục, nội dung kiểm tra lại thực hiện theo quy định tại Điều 39 Thông tư này."}]},{"id":"tt86_41","no":41,"code":"Điều 41","title":"Điều 41. Xác nhận hoàn thành nghĩa vụ nộp thuế","shortTitle":"Xác nhận hoàn thành nghĩa vụ nộp thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Khi có nhu cầu xác nhận việc hoàn thành nghĩa vụ nộp thuế (bao gồm xác nhận số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt và/hoặc số tiền đã nộp ngân sách nhà nước), người nộp thuế hoặc cơ quan quản lý nhà nước có thẩm quyền có văn bản đề nghị xác nhận hoàn thành nghĩa vụ nộp thuế theo tiêu chí quy định tại Mẫu số 17a Phụ lục II Thông tư này gửi đến cơ quan hải quan thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp nộp hồ sơ giấy, người nộp thuế hoặc cơ quan quản lý nhà nước có thẩm quyền gửi văn bản đề nghị xác nhận hoàn thành nghĩa vụ nộp thuế theo Mẫu số 56 tại Phụ lục I Thông tư này đến Chi cục Hải quan khu vực hoặc đơn vị hải quan (địa bàn mà Chi cục Hải quan khu vực không đóng trụ sở) nơi tổ chức, cá nhân có trụ sở chính hoặc trụ sở chi nhánh hoặc cơ sở sản xuất gần nhất."},{"k":"p","t":"2. Trong thời hạn 03 ngày làm việc kể từ ngày nhận được công văn đề nghị xác nhận nợ thuế, cơ quan hải quan có trách nhiệm kiểm tra, xác nhận việc thực hiện nghĩa vụ nộp thuế và thông báo cho người nộp thuế hoặc cơ quan quản lý nhà nước có thẩm quyền kết quả xử lý như sau:"},{"k":"p","t":"a) Xác nhận hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"b) Xác nhận chưa hoàn thành nghĩa vụ nộp thuế nêu rõ tờ khai chưa hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"c) Hoàn thiện bổ sung hồ sơ để cơ quan hải quan có cơ sở xác nhận hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"3. Trường hợp người nộp thuế có yêu cầu xác nhận hoàn thành nghĩa vụ nộp thuế để giải thể, chấm dứt hoạt động, đóng mã số thuế, thì kể từ ngày cơ quan hải quan phát hành văn bản xác nhận không còn nợ thuế, người nộp thuế sẽ không được đăng ký tờ khai hải quan."},{"k":"p","t":"Trường hợp sau khi xác nhận hoàn thành nghĩa vụ nộp thuế nhưng người nộp thuế chưa hoàn thành xong thủ tục giải thể, chấm dứt hoạt động, đóng mã số thuế mà người nộp thuế muốn tiếp tục đăng ký tờ khai hải quan thì người nộp thuế hoặc cơ quan có đề nghị đơn vị đã xác nhận hoàn thành nghĩa vụ nộp thuế xác nhận để người nộp thuế được tiếp tục thực hiện hoạt động xuất nhập khẩu."}]},{"id":"tt86_42","no":42,"code":"Điều 42","title":"Điều 42. Mẫu biểu","shortTitle":"Mẫu biểu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Các mẫu thông báo về tạm hoãn xuất cảnh; các mẫu quyết định và văn bản liên quan về cưỡng chế thi hành quyết định hành chính về quản lý thuế; mẫu thông báo về nộp thuế và khoản thu khác đối với hàng hóa xuất khẩu, nhập khẩu được thực hiện theo quy định tại Phụ lục I Thông tư này."}]},{"id":"tt86_43","no":43,"code":"Điều 43","title":"Điều 43. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực kể từ ngày 01 tháng 7 năm 2026."},{"k":"p","t":"2. Thông tư số 06/2021/TT-BTC ngày 22 tháng 01 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành một số điều của Luật Quản lý thuế ngày 13 tháng 06 năm 2019 về quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu hết hiệu lực thi hành kể từ ngày Thông tư này có hiệu lực."},{"k":"p","t":"3. Bãi bỏ một phần các văn bản sau:"},{"k":"p","t":"a) Điều 104, Điều 105, Điều 131, Điều 132, Điều 134, Điều 135, Điều 140 Thông tư số 38/2015/TT-BTC;"},{"k":"p","t":"b) Khoản 64, khoản 65, khoản 67, khoản 68, khoản 71 Điều 1 Thông tư số 39/2018/TT-BTC;"},{"k":"p","t":"c) Khoản 58, khoản 60, khoản 61 Điều 1 Thông tư số 121/2025/TT-BTC."},{"k":"p","t":"4. Trường hợp các văn bản quy phạm pháp luật viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"tt86_44","no":44,"code":"Điều 44","title":"Điều 44. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp hồ sơ miễn thuế, giảm thuế, hoàn thuế, không thu thuế, không chịu thuế, xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa, gia hạn nộp thuế, miễn tiền chậm nộp, nộp dần tiền thuế nợ, xác nhận hoàn thành nghĩa vụ nộp thuế, khoanh tiền thuế nợ, xóa tiền thuế nợ, người nộp thuế đã nộp trước ngày Thông tư này có hiệu lực thì tiếp tục thực hiện theo quy định tại văn bản quy phạm pháp luật có hiệu lực tại thời điểm nộp hồ sơ."},{"k":"p","t":"2. Trường hợp kiểm tra đã có kế hoạch kiểm tra nhưng chưa thực hiện kiểm tra thì thực hiện kiểm tra thuế theo quy định tại Thông tư này. Đối với trường hợp đang thực hiện kiểm tra thì tiếp tục thực hiện theo quy định tại văn bản quy phạm pháp luật có hiệu lực tại thời điểm ban hành quyết định kiểm tra."},{"k":"p","t":"3. Trường hợp tổ chức, cá nhân nhận chuyển nhượng dự án trước ngày Thông tư này có hiệu lực nhưng chưa thực hiện đăng ký tờ khai hải quan mới theo quy định tại điểm d khoản 9 Điều 28 Thông tư này thì phải hoàn thành việc đăng ký tờ khai hải quan mới trước ngày 31/12/2026."},{"k":"p","t":"Quá thời hạn quy định tại khoản này, tổ chức cá nhân nhận chuyển nhượng không thực hiện đăng ký tờ khai hải quan mới thì cơ quan hải quan tiến hành xử phạt theo quy định."},{"k":"p","t":"4. Trường hợp dự án đã kết thúc nhập khẩu hàng hóa theo Danh mục miễn thuế hoặc Danh mục miễn thuế hết hiệu lực, tổ chức, cá nhân thực hiện thông báo tình hình sử dụng hàng hóa miễn thuế gửi cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế theo quy định tại điểm b.2 khoản 1 Điều 29 Thông tư này, thời điểm thực hiện thông báo tình hình sử dụng hàng hóa miễn thuế cho cơ quan hải quan tính từ năm tài chính Thông tư này có hiệu lực."}]},{"id":"tt86_45","no":45,"code":"Điều 45","title":"Điều 45. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan hải quan có trách nhiệm phổ biến, hướng dẫn các tổ chức, cá nhân, người nộp thuế thực hiện Thông tư này."},{"k":"p","t":"2. Tổ chức, cá nhân, người nộp thuế thuộc đối tượng áp dụng của Thông tư này thực hiện đầy đủ các hướng dẫn tại Thông tư này."},{"k":"p","t":"Trong quá trình thực hiện, trường hợp phát sinh khó khăn, vướng mắc, đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để xem xét giải quyết theo quy định./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng Chính phủ, các Phó TTCP;- Văn phòng TW Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chủ tịch nước;- Viện Kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- Các Bộ, cơ quan ngang Bộ;- Hội đồng dân tộc;- Các Ủy ban của Quốc hội;- HĐND, UBND tỉnh, thành phố trực thuộc TW;- Liên đoàn Thương mại và Công nghiệp Việt Nam;- Cục Kiểm tra văn bản và Tổ chức thi hành pháp luật(Bộ Tư pháp);- Các Chi cục Hải quan khu vực;- Thuế các tỉnh, thành phố trực thuộc trung ương;Kho bạc Nhà nước khu vực;- Công báo;- Cổng Thông tin điện tử của Chính phủ;- Cổng Thông tin điện tử Bộ Tài chính;- Cổng Thông tin điện tử của Cục Hải quan;- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, CHQ (70).","KT. BỘ TRƯỞNG THỨ TRƯỞNGNguyễn Đức Chi"]]}]}],"forms":[{"code":"01","title":"01","pl":"","note":""},{"code":"02","title":"THÔNG BÁO","pl":"","note":""},{"code":"03","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"04","title":"CÔNG VĂN ĐỀ NGHỊ HOÀN TIỀN THUẾ, KHOẢN THU KHÁC TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA","pl":"","note":""},{"code":"05","title":"THÔNG BÁO","pl":"","note":""},{"code":"06","title":"THÔNG BÁO","pl":"","note":""},{"code":"07","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"08","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"09","title":"THÔNG BÁO","pl":"","note":""},{"code":"10","title":"THÔNG BÁO","pl":"","note":""},{"code":"11","title":"THÔNG BÁO","pl":"","note":""},{"code":"12","title":"12","pl":"","note":""},{"code":"13","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"14","title":"14","pl":"","note":""},{"code":"15","title":"BÁO CÁO TÍNH THUẾ NGUYÊN LIỆU, VẬT TƯ, LINH KIỆN ĐỀ NGHỊ HOÀN THUẾ NHẬP KHẨU","pl":"","note":""},{"code":"16","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"17","title":"17","pl":"","note":""},{"code":"18","title":"DANH MỤC","pl":"","note":""},{"code":"19","title":"PHIẾU THEO DÕI,","pl":"","note":""},{"code":"20","title":"20","pl":"","note":""},{"code":"21","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"22a","title":"22a","pl":"","note":""},{"code":"22b","title":"22b","pl":"","note":""},{"code":"23a","title":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM ĐỘC LẬP - TỰ DO - HẠNH PHÚC","pl":"","note":""},{"code":"23b","title":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM ĐỘC LẬP - TỰ DO - HẠNH PHÚC","pl":"","note":""},{"code":"24","title":"24","pl":"","note":""},{"code":"25","title":"25","pl":"","note":""},{"code":"26","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"27","title":"27","pl":"","note":""},{"code":"28","title":"28","pl":"","note":""},{"code":"29","title":"29","pl":"","note":""},{"code":"30","title":"THÔNG BÁO","pl":"","note":""},{"code":"31","title":"BẢNG KÊ CHI TIẾT HÀNG HÓA NHẬP KHẨU MIỄN THUẾ THEO TỔ HỢP, DÂY CHUYỀN","pl":"","note":""},{"code":"32","title":"32","pl":"","note":""},{"code":"33","title":"THÔNG BÁO TÌNH HÌNH SỬ DỤNG HÀNG HÓA NHẬP KHẨU MIỄN THUẾ","pl":"","note":""},{"code":"34","title":"34","pl":"","note":""},{"code":"35","title":"35","pl":"","note":""},{"code":"36","title":"36","pl":"","note":""},{"code":"37","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"38","title":"38","pl":"","note":""},{"code":"39","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"40","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"41","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"42","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"43","title":"43","pl":"","note":""},{"code":"44","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"45","title":"45","pl":"","note":""},{"code":"46","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"47","title":"47","pl":"","note":""},{"code":"48","title":"THÔNG BÁO","pl":"","note":""},{"code":"49","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"50","title":"THÔNG BÁO","pl":"","note":""},{"code":"51","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"52","title":"THÔNG BÁO","pl":"","note":""},{"code":"53","title":"BIÊN BẢN CÔNG BỐ QUYẾT ĐỊNH KIỂM TRA","pl":"","note":""},{"code":"54","title":"BIÊN BẢN KIỂM TRA","pl":"","note":""},{"code":"55","title":"KẾT LUẬN KIỂM TRA","pl":"","note":""},{"code":"56","title":"56","pl":"","note":""},{"code":"57","title":"THÔNG BÁO","pl":"","note":""},{"code":"58","title":"THÔNG BÁO","pl":"","note":""},{"code":"59","title":"THÔNG BÁO","pl":"","note":""},{"code":"60","title":"THÔNG BÁO","pl":"","note":""},{"code":"61","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"62","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"63","title":"63","pl":"","note":""},{"code":"64","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"65","title":"65","pl":"","note":""},{"code":"66","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"67","title":"67","pl":"","note":""},{"code":"68","title":"QUYẾT ĐỊNH","pl":"","note":""},{"code":"69","title":"69","pl":"","note":""},{"code":"70","title":"70","pl":"","note":""},{"code":"71","title":"BIÊN BẢN","pl":"","note":""},{"code":"72","title":"72","pl":"","note":""},{"code":"73","title":"73","pl":"","note":""},{"code":"74","title":"74","pl":"","note":""}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
