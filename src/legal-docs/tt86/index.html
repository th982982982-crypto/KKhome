xuất khẩu, thuế nhập khẩu số 107/2016/QH13;"},{"k":"p","t":"2. Cơ quan hải quan bao gồm Cục Hải quan, Chi cục Kiểm tra sau thông quan, Chi cục Điều tra chống buôn lậu và cơ quan hải quan khác thuộc Cục Hải quan được giao chức năng quản lý thuế; Chi cục Hải quan khu vực, Đội phúc tập và Kiểm tra sau thông quan, Đội Thông quan, Đội Kiểm soát hải quan, Hải quan cửa khẩu/ngoài cửa khẩu và cơ quan hải quan khác thuộc Chi cục Hải quan khu vực được giao chức năng quản lý thuế;"},{"k":"p","t":"3. Công chức hải quan;"},{"k":"p","t":"4. Cơ quan nhà nước, tổ chức, cá nhân khác có liên quan đến quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu."}]},{"id":"tt86_3","no":3,"code":"Điều 3","title":"Điều 3. Khai thuế, hồ sơ khai thuế, hình thức nộp hồ sơ khai thuế, tiếp nhận, xử lý hồ sơ khai thuế","shortTitle":"Khai thuế, hồ sơ khai thuế, hình thức nộp hồ sơ khai thuế, tiếp nhận, xử lý hồ sơ khai thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Khai thuế đối với hàng hóa xuất khẩu, nhập khẩu theo từng lần phát sinh bao gồm khai thuế xuất khẩu, thuế nhập khẩu, thuế tự vệ, thuế chống bán phá giá, thuế chống trợ cấp, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường, thuế giá trị gia tăng."},{"k":"p","t":"Việc khai thuế, khai bổ sung, thời hạn nộp hồ sơ khai thuế, các chỉ tiêu thông tin trong hồ sơ khai thuế, tỷ giá tính thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"2. Không phải khai thuế theo từng lần phát sinh đối với hàng hóa xuất khẩu, nhập khẩu trong các trường hợp sau:"},{"k":"p","t":"a) Mặt hàng điện năng xuất khẩu, nhập khẩu, hàng hóa bán trong khu vực cách ly tại các sân bay quốc tế (trừ hàng hóa đưa vào bán tại cửa hàng miễn thuế thực hiện theo quy định tại Nghị định số 100/2020/NĐ-CP của Chính phủ về kinh doanh hàng miễn thuế), hàng hóa cung cấp cho hành khách trên các chuyến bay tuyến quốc tế, xăng, dầu cung ứng cho tàu bay xuất cảnh theo quy định tại khoản 1 Điều 93 Thông tư số 38/2015/TT-BTC của Bộ trưởng Bộ Tài chính quy định về thủ tục hải quan, kiểm tra giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"b) Các trường hợp mua, bán, gia công, thuê, mượn, giao nhận hàng hóa giữa doanh nghiệp ưu tiên và đối tác theo quy định tại điểm c khoản 3 Điều 75 Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi khoản 46 Điều 1 Thông tư số 121/2025/TT-BTC và khoản 6 Điều 86 Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi khoản 53 Điều 1 Thông tư số 121/2025/TT-BTC;"},{"k":"p","t":"c) Các trường hợp khác theo quy định của pháp luật về hải quan."},{"k":"p","t":"3. Hồ sơ khai thuế đối với hàng hóa xuất khẩu, nhập khẩu là hồ sơ hải quan theo quy định của Luật Hải quan số 54/2014/QH13 và các văn bản hướng dẫn Luật Hải quan số 54/2014/QH13, được nộp cho cơ quan hải quan nơi đăng ký tờ khai hải quan."},{"k":"p","t":"4. Hình thức nộp hồ sơ khai thuế"},{"k":"p","t":"a) Nộp hồ sơ điện tử"},{"k":"p","t":"Người nộp thuế khai đầy đủ, chính xác các thông tin trên tờ khai hải quan và các chứng từ, tài liệu có liên quan làm căn cứ để xác định nghĩa vụ thuế của người nộp thuế với ngân sách nhà nước theo các chỉ tiêu thông tin quy định tại Phụ lục II Thông tư này thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp chưa khai báo được chỉ tiêu thông tin quy định tại Phụ lục II Thông tư này trên Hệ thống xử lý dữ liệu điện tử hải quan, người nộp thuế nộp bản chụp được ký số các chứng từ, tài liệu thuộc hồ sơ khai thuế cho cơ quan hải quan thông qua Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"b) Nộp hồ sơ giấy theo quy định của pháp luật về hải quan"},{"k":"p","t":"Trường hợp nộp hồ sơ giấy, đối với chứng từ phải nộp bản chính theo quy định tại Thông tư này thì người nộp thuế nộp trực tiếp hoặc gửi qua đường bưu chính cho cơ quan hải quan. Trường hợp Thông tư này không quy định bản chính thì người nộp thuế được nộp bản chụp cho cơ quan hải quan."},{"k":"p","t":"5. Trách nhiệm của người nộp thuế"},{"k":"p","t":"a) Khai chính xác, trung thực, đầy đủ các nội dung trong hồ sơ khai thuế;"},{"k":"p","t":"b) Chịu trách nhiệm trước pháp luật về tính chính xác, trung thực và hợp pháp của nội dung đã khai và các chứng từ, hồ sơ, tài liệu, dữ liệu, thông tin đã nộp, cung cấp, xuất trình cho cơ quan hải quan hoặc thông qua Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Đảm bảo tính thống nhất nội dung thông tin, dữ liệu, tài liệu, chứng từ giữa hồ sơ lưu tại doanh nghiệp với hồ sơ gửi cơ quan hải quan."},{"k":"p","t":"6. Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"Cơ quan hải quan tiếp nhận, xử lý hồ sơ khai thuế, khoản thu khác qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc hồ sơ giấy theo quy định của pháp luật về hải quan."},{"k":"p","t":"Khi kiểm tra hồ sơ, cơ quan hải quan căn cứ vào các thông tin trên tờ khai hải quan và các chứng từ, tài liệu có liên quan để xác định nghĩa vụ thuế của người nộp thuế với ngân sách nhà nước. Cơ quan hải quan sử dụng thông tin, chứng từ, tài liệu được gửi thông qua Hệ thống xử lý dữ liệu điện tử hải quan, Cổng thông tin một cửa quốc gia, Cổng dịch vụ công trực tuyến, Cổng thông tin một cửa ASEAN, Cổng thông tin trao đổi với các nước khác theo quy định của Điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc hệ thống thông tin giải quyết thủ tục hành chính, cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành được chia sẻ, kết nối với cơ quan hải quan để kiểm tra, đối chiếu và lưu trữ."},{"k":"p","t":"7. Khai thuế, nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu qua nền tảng thương mại điện tử, nền tảng số khác thực hiện theo quy định về khai thuế, nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu tại Điều 5 Nghị định số 08/2015/NĐ-CP của Chính phủ quy định chi tiết và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan được sửa đổi, bổ sung bởi khoản 2 Điều 1 Nghị định số 167/2025/NĐ-CP; Thông tư số 38/2015/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 39/2018/TT-BTC và Thông tư số 121/2025/TT-BTC."},{"k":"p","t":"8. Trường hợp các chứng từ trong hồ sơ miễn thuế; giảm thuế; hoàn thuế; không thu thuế; không chịu thuế; xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa; gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt; miễn tiền chậm nộp; thông báo Danh mục miễn thuế; khoanh tiền thuế nợ; xóa tiền thuế nợ; nộp dần tiền thuế nợ đã có trên Cổng thông tin một cửa quốc gia, Cổng dịch vụ công quốc gia hoặc hệ thống thông tin giải quyết thủ tục hành chính, cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành được chia sẻ, kết nối với cơ quan hải quan thì người nộp thuế không phải nộp cho cơ quan hải quan. Người nộp thuế cung cấp thông tin liên quan đến chứng từ để cơ quan hải quan khai thác."}]},{"id":"tt86_4","no":4,"code":"Điều 4","title":"Điều 4. Thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu phát sinh số tiền thuế phải nộp sau khi thông quan hoặc giải phóng hàng hóa","shortTitle":"Thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu phát sinh số tiền thuế phải nộp sau khi thông quan hoặc giải phóng hàng hóa","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp thuế khai bổ sung được xác định theo thời hạn nộp thuế của tờ khai hải quan ban đầu trừ các trường hợp quy định tại khoản 2, khoản 3, khoản 4 Điều này."},{"k":"p","t":"2. Thời hạn nộp thuế đối với hàng hóa phải phân tích, phân loại hoặc giám định theo quy định của pháp luật về hải quan để xác định chính xác số tiền thuế phải nộp được thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế phải tạm nộp thuế theo mã số, thuế suất khai báo trước khi giải phóng hàng hóa. Thời hạn nộp thuế thực hiện theo quy định tại Điều 9 Luật số 107/2016/QH13;"},{"k":"p","t":"b) Trường hợp người nộp thuế khai bổ sung số tiền thuế phải nộp tăng thêm theo kết quả phân tích, phân loại hoặc giám định thì thời hạn nộp thuế là 05 ngày làm việc kể từ ngày cơ quan hải quan yêu cầu người nộp thuế khai bổ sung qua Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp kết quả phân tích, phân loại hoặc giám định hàng hóa khác so với nội dung khai của người nộp thuế dẫn đến giảm số tiền thuế phải nộp, cơ quan hải quan thông báo qua Hệ thống xử lý dữ liệu điện tử hải quan cho người nộp thuế thực hiện khai bổ sung theo quy định của pháp luật về hải quan và xử lý số tiền thuế nộp thừa theo quy định tại Điều 7 Thông tư này."},{"k":"p","t":"3. Thời hạn nộp thuế đối với trường hợp chưa có giá chính thức tại thời điểm đăng ký tờ khai hải quan thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế phải tạm nộp thuế theo giá tạm tính trước khi thông quan hoặc giải phóng hàng hóa. Thời hạn nộp thuế thực hiện theo quy định tại Điều 9 Luật số 107/2016/QH13;"},{"k":"p","t":"b) Trường hợp có giá chính thức, người nộp thuế phải khai bổ sung và nộp số tiền thuế chênh lệch tăng thêm thì thời hạn nộp thuế là 05 ngày làm việc kể từ thời điểm có giá chính thức. Thời điểm có giá chính thức là ngày bên bán phát hành hóa đơn theo giá chính thức hoặc các chứng từ tương đương với hóa đơn phù hợp với các chứng từ, tài liệu khác có liên quan."},{"k":"p","t":"Trường hợp có giá chính thức dẫn đến giảm số tiền thuế phải nộp, cơ quan hải quan xử lý số tiền thuế nộp thừa theo quy định tại Điều 7 Thông tư này."},{"k":"p","t":"Giá tạm tính, giá chính thức thực hiện theo quy định tại Điều 17 Thông tư số 39/2015/TT-BTC của Bộ trưởng Bộ Tài chính quy định về trị giá hải quan đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"4. Thời hạn nộp thuế đối với hàng hóa có khoản phí bản quyền, phí giấy phép và các khoản tiền do người nộp thuế phải trả từ số tiền thu được sau khi bán lại, định đoạt, sử dụng hàng nhập khẩu là các khoản điều chỉnh cộng vào trị giá hải quan chưa xác định được tại thời điểm đăng ký tờ khai hải quan theo quy định về trị giá hải quan, thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế phải nộp thuế theo giá khai báo trước khi thông quan hoặc giải phóng hàng hóa. Thời hạn nộp thuế thực hiện theo quy định tại Điều 9 Luật số 107/2016/QH13;"},{"k":"p","t":"b) Trường hợp có các khoản điều chỉnh cộng vào trị giá hải quan thì thời hạn nộp thuế là 05 ngày làm việc kể từ ngày người nộp thuế xác định được các khoản này được thể hiện trên chứng từ thanh toán và các chứng từ, tài liệu khác có liên quan."},{"k":"p","t":"Các khoản điều chỉnh cộng vào trị giá hải quan thực hiện theo quy định tại Thông tư số 39/2015/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 60/2019/TT-BTC."},{"k":"p","t":"5. Thời hạn nộp thuế đối với trường hợp cơ quan hải quan ấn định thuế"},{"k":"p","t":"a) Thời hạn nộp số tiền thuế ấn định được áp dụng theo thời hạn nộp thuế của tờ khai hải quan ban đầu trừ các trường hợp quy định tại điểm b, điểm c, điểm d khoản này;"},{"k":"p","t":"b) Thời hạn nộp thuế là ngày ban hành quyết định ấn định thuế đối với các trường hợp sau:"},{"k":"p","t":"b.1) Hàng hóa xuất khẩu, nhập khẩu bị ấn định thuế nhưng người nộp thuế không kê khai trên tờ khai hải quan hoặc có kê khai trên tờ khai hải quan nhưng tờ khai hải quan bị hủy theo quy định của pháp luật về hải quan;"},{"k":"p","t":"b.2) Hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế được cầm cố, thế chấp làm tài sản bảo đảm các khoản vay do người nộp thuế không có khả năng trả nợ bị tổ chức tín dụng xử lý theo quy định của pháp luật, hàng hóa nhập khẩu bị kê biên để bán đấu giá theo quyết định của cơ quan có thẩm quyền, bản án, quyết định của Tòa án thuộc các trường hợp phải nộp thuế."},{"k":"p","t":"c) Trường hợp ấn định thuế đối với hàng hóa nhập khẩu để gia công, sản xuất xuất khẩu, hàng hóa nhập khẩu không thuộc đối tượng chịu thuế hoặc hàng hóa khác thuộc nhiều tờ khai hải quan khác nhau cơ quan hải quan không xác định được chính xác số lượng hàng hóa theo từng tờ khai nhập khẩu thì tờ khai để áp dụng thời hạn nộp tiền thuế ấn định là tờ khai nhập khẩu cuối cùng có mặt hàng bị ấn định thuế trong thời kỳ thanh tra, kiểm tra, kiểm toán. Trường hợp mặt hàng bị ấn định thuế của tờ khai nhập khẩu cuối cùng có số lượng hàng hóa nhỏ hơn số lượng hàng hóa bị ấn định thuế thì số lượng hàng hóa bị ấn định thuế chênh lệch được tính theo thời hạn nộp thuế của tờ khai liền kề trước đó theo cùng loại hình nhập khẩu có cùng mặt hàng bị ấn định thuế;"},{"k":"p","t":"d) Thời hạn nộp tiền thuế ấn định đối với các trường hợp khác như sau:"},{"k":"p","t":"d.1) Trường hợp hàng hóa phải phân tích, phân loại hoặc giám định để xác định chính xác số tiền thuế phải nộp nhưng người nộp thuế không khai bổ sung, không nộp số tiền thuế chênh lệch tăng thêm trong thời hạn quy định tại điểm b khoản 2 Điều này thì thời hạn nộp tiền thuế ấn định là ngày cơ quan hải quan yêu cầu người nộp thuế khai bổ sung trên Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"d.2) Trường hợp hàng hóa xuất khẩu, nhập khẩu có giá chính thức nhưng người nộp thuế không khai bổ sung, không nộp số tiền thuế chênh lệch tăng thêm trong thời hạn quy định tại điểm b khoản 3 Điều này thì thời hạn nộp tiền thuế ấn định là thời điểm có giá chính thức;"},{"k":"p","t":"d.3) Trường hợp xác định được các khoản phí bản quyền, phí giấy phép và các khoản tiền phải trả từ số tiền thu được sau khi bán lại, định đoạt, sử dụng hàng nhập khẩu là các khoản điều chỉnh cộng vào trị giá hải quan nhưng người nộp thuế không khai bổ sung, không nộp số tiền thuế chênh lệch tăng thêm trong thời hạn quy định tại điểm b khoản 4 Điều này thì thời hạn nộp tiền thuế ấn định là ngày người nộp thuế xác định được các khoản này được thể hiện trên chứng từ thanh toán và các chứng từ, tài liệu khác có liên quan."}]},{"id":"tt86_5","no":5,"code":"Điều 5","title":"Điều 5. Ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt","shortTitle":"Ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo phương thức điện tử là ngày thực hiện giao dịch trích tiền từ tài khoản của người nộp thuế hoặc người nộp thay tại tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác để nộp tiền và được tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác xác nhận giao dịch nộp tiền thành công."},{"k":"p","t":"2. Ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trực tiếp tại tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác có kết nối trực tiếp hoặc gián tiếp với Hệ thống xử lý dữ liệu điện tử hải quan hoặc tổ chức được cơ quan hải quan ủy nhiệm thu thuế thì ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là ngày tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, cơ quan hải quan, tổ chức được cơ quan hải quan ủy nhiệm thu cấp chứng từ nộp tiền."}]},{"id":"tt86_6","no":6,"code":"Điều 6","title":"Điều 6. Gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt","shortTitle":"Gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo quy định tại khoản 7 Điều 14 Luật số 108/2025/QH15."},{"k":"p","t":"Người nộp thuế được gia hạn theo quy định tại khoản này không phải nộp tiền chậm nộp tính trên số tiền thuế nợ được gia hạn trong thời gian gia hạn."},{"k":"p","t":"2. Hồ sơ gia hạn nộp thuế bao gồm:"},{"k":"p","t":"a) Công văn đề nghị gia hạn nộp thuế, trong đó nêu rõ lý do, số tiền thuế, thời hạn nộp theo Mẫu số 1 tại Phụ lục II Thông tư này qua Hệ thống xử lý dữ liệu điện tử hoặc bản giấy theo Mẫu số 01 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Tài liệu gửi kèm công văn đề nghị gia hạn nộp tiền thuế đối với trường hợp quy định tại điểm a khoản 7 Điều 14 Luật số 108/2025/QH15"},{"k":"p","t":"b.1) Văn bản, biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại"},{"k":"p","t":"b.1.1) Văn bản xác nhận của một trong các cơ quan, tổ chức sau: Ủy ban nhân dân xã, phường, đặc khu (sau đây gọi là Ủy ban nhân dân cấp xã), Ban quản lý Khu công nghiệp, Khu chế xuất, Khu kinh tế, Ban quản lý cửa khẩu, Cảng vụ hàng không, Cảng vụ hàng hải nơi xảy ra sự kiện bất khả kháng về việc thiên tai, thảm họa, dịch bệnh, tai nạn bất ngờ gây thiệt hại vật chất, ảnh hưởng trực tiếp đến sản xuất, kinh doanh: 01 bản chính;"},{"k":"p","t":"b.1.2) Biên bản xác nhận vụ cháy của cơ quan công an có thẩm quyền: 01 bản chính."},{"k":"p","t":"b.2) Hợp đồng bảo hiểm, thông báo trả tiền bồi thường của tổ chức nhận bảo hiểm (nếu có), trường hợp hợp đồng bảo hiểm không bao gồm nội dung bồi thường về thuế phải có xác nhận của tổ chức bảo hiểm; hợp đồng hoặc biên bản thỏa thuận đền bù của hãng vận tải đối với trường hợp tổn thất do hãng vận tải gây ra (nếu có)."},{"k":"p","t":"c) Tài liệu gửi kèm công văn đề nghị gia hạn nộp tiền thuế đối với trường hợp quy định tại điểm b khoản 7 Điều 14 Luật số 108/2025/QH15"},{"k":"p","t":"c.1) Quyết định thu hồi địa điểm sản xuất, kinh doanh của cơ quan nhà nước có thẩm quyền đối với địa điểm sản xuất cũ của doanh nghiệp (trừ trường hợp di dời địa điểm sản xuất kinh doanh theo mục đích yêu cầu của doanh nghiệp);"},{"k":"p","t":"c.2) Văn bản xác nhận của chính quyền địa phương về việc doanh nghiệp phải ngừng sản xuất kinh doanh do di chuyển địa điểm (01 bản chính);"},{"k":"p","t":"c.3) Tài liệu chứng minh mức độ thiệt hại do phải di chuyển địa điểm sản xuất, kinh doanh bao gồm hồ sơ, chứng từ chứng minh giá trị còn lại của tài sản bị thiệt hại, chi phí phát sinh do việc di dời và các tài liệu khác có liên quan theo quy định của pháp luật. Người nộp thuế chịu trách nhiệm trước pháp luật về tính chính xác của hồ sơ, chứng từ cung cấp."},{"k":"p","t":"3. Trình tự, thủ tục xử lý hồ sơ gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt"},{"k":"p","t":"a) Tiếp nhận hồ sơ"},{"k":"p","t":"a.1) Người nộp thuế gửi công văn đề nghị gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo Mẫu số 1 tại Phụ lục II Thông tư này qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc bản giấy theo Mẫu số 01 tại Phụ lục I Thông tư này và hồ sơ có liên quan đến cơ quan hải quan;"},{"k":"p","t":"a.2) Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ, cơ quan hải quan phản hồi cho người nộp thuế về việc giải trình, bổ sung hồ sơ đối với trường hợp hồ sơ chưa đầy đủ theo quy định hoặc phát hiện có dấu hiệu sai phạm về giá trị vật chất bị thiệt hại trong hồ sơ do người nộp thuế tự xác định hoặc sai, sót khác."},{"k":"p","t":"Trong thời hạn 05 ngày làm việc kể từ ngày người nộp thuế nhận được thông báo của cơ quan hải quan mà người nộp thuế không giải trình, bổ sung hồ sơ gia hạn thì cơ quan hải quan thông báo cho người nộp thuế về việc chưa đủ cơ sở xem xét, xử lý hồ sơ đề nghị gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt. Thời hạn người nộp thuế bổ sung, giải trình hồ sơ không tính vào thời hạn xử lý hồ sơ."},{"k":"p","t":"b) Trong thời hạn 05 ngày làm việc kể từ ngày tiếp nhận đủ hồ sơ, cơ quan hải quan kiểm tra hồ sơ, thông báo cho người nộp thuế về việc không chấp thuận gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt đối với trường hợp hồ sơ không thuộc đối tượng được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo Mẫu số 02 tại Phụ lục I Thông tư này hoặc ban hành quyết định gia hạn nộp thuế đối với trường hợp hồ sơ thuộc đối tượng được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo Mẫu số 03 tại Phụ lục I Thông tư này."},{"k":"p","t":"4. Thẩm quyền ban hành quyết định gia hạn"},{"k":"p","t":"a) Đội trưởng Hải quan cửa khẩu/ngoài cửa khẩu, Đội trưởng Đội thông quan, Đội trưởng Đội phúc tập và Kiểm tra sau thông quan, Chi cục trưởng Chi cục Điều tra chống buôn lậu, Chi cục Kiểm tra sau thông quan giải quyết gia hạn đối với trường hợp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt của người nộp thuế chi phát sinh tại 01 cơ quan hải quan;"},{"k":"p","t":"b) Chi cục trưởng Chi cục Hải quan khu vực giải quyết gia hạn đối với trường hợp tiền thuế, tiền chậm nộp, tiền phạt, khoản thu khác của người nộp thuế phát sinh từ 02 cơ quan hải quan trở lên thuộc Chi cục Hải quan khu vực;"},{"k":"p","t":"c) Cục trưởng Cục Hải quan giải quyết đối với trường hợp tiền thuế, tiền chậm nộp, tiền phạt, khoản thu khác của người nộp thuế phát sinh tại nhiều Chi cục Hải quan khu vực."},{"k":"p","t":"5. Xác định số tiền được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt"},{"k":"p","t":"a) Đối với người nộp thuế gặp thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ quy định tại khoản 21 Điều 4 Luật số 108/2025/QH15, khoản 1 Điều 3 Nghị định số 252/2026/NĐ-CP, số tiền được gia hạn là số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộp tính đến thời điểm người nộp thuế gặp thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ hoặc trường hợp bất khả kháng khác nhưng không vượt quá giá trị vật chất bị thiệt hại sau khi trừ các khoản được bồi thường, bảo hiểm theo quy định (nếu có);"},{"k":"p","t":"b) Đối với trường hợp di dời cơ sở sản xuất, kinh doanh theo quy định tại điểm b khoản 7 Điều 14 Luật số 108/2025/QH15, số tiền được gia hạn là số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộp tính đến thời điểm người nộp thuế bắt đầu ngừng hoạt động sản xuất, kinh doanh để di dời cơ sở sản xuất nhưng không vượt quá giá trị thiệt hại thực tế do phải ngừng hoạt động để thực hiện việc di dời và các chi phí phát sinh do việc di dời, thiết lập cơ sở sản xuất, kinh doanh mới sau khi trừ đi các khoản được hỗ trợ, đền bù thiệt hại theo quy định. Giá trị thiệt hại và các chi phí thực tế phát sinh được xác định trên cơ sở hồ sơ, chứng từ hợp pháp do người nộp thuế cung cấp cho cơ quan có thẩm quyền."},{"k":"p","t":"Trường hợp cơ quan có thẩm quyền phát hiện người nộp thuế không thực hiện di dời thì người nộp thuế phải nộp số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đã được gia hạn và tiền chậm nộp tính trên số tiền được gia hạn theo quy định của pháp luật."},{"k":"p","t":"6. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, thông báo cho người nộp thuế về việc không chấp thuận gia hạn hoặc quyết định gia hạn thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_7","no":7,"code":"Điều 7","title":"Điều 7. Xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa","shortTitle":"Xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại Điều 15 Luật số 108/2025/QH15. Trong một số trường hợp, việc xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa được thực hiện như sau:"},{"k":"p","t":"a) Thuế xuất khẩu, thuế nhập khẩu, thuế tự vệ, thuế chống bán phá giá, thuế chống trợ cấp, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường, thuế giá trị gia tăng, khoản thu khác, tiền chậm nộp, tiền phạt nộp nhầm, nộp thừa, cơ quan hải quan hoàn trả cho người nộp thuế theo quy định tại Điều này;"},{"k":"p","t":"b) Hàng hóa kinh doanh tạm nhập, tái xuất quy định tại điểm đ khoản 9 Điều 16 Luật số 107/2016/QH13, người nộp thuế đã nộp tiền đặt cọc cho cơ quan hải quan một khoản tiền tương đương tiền thuế nhập khẩu, sau khi hàng hóa tái xuất, số tiền đặt cọc được cơ quan hải quan xử lý tiền thuế nộp thừa theo quy định tại Điều này;"},{"k":"p","t":"c) Trường hợp số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt được xác định theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền, quyết định ấn định thuế hoặc quyết định xử phạt của cơ quan hải quan, bản án, quyết định của Tòa án có hiệu lực thì số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa được xử lý theo quy định tại Điều này."},{"k":"p","t":"2. Xử lý tiền thuế giá trị gia tăng nộp thừa đối với hàng hóa nhập khẩu"},{"k":"p","t":"a) Trường hợp người nộp thuế có số tiền thuế giá trị gia tăng nộp thừa khi nhập khẩu hàng hóa và đã thực hiện kê khai khấu trừ số tiền thuế nộp thừa với cơ quan thuế, người nộp thuế có trách nhiệm kê khai điều chỉnh số tiền thuế giá trị gia tăng đã được cơ quan hải quan hoàn với cơ quan thuế nơi quản lý người nộp thuế;"},{"k":"p","t":"b) Cơ quan hải quan ban hành quyết định hoàn thuế giá trị gia tăng nộp thừa đối với trường hợp quy định tại điểm a, điểm c khoản 1 và điểm a khoản 2 Điều này, gửi quyết định hoàn thuế cho cơ quan thuế quản lý người nộp thuế để cơ quan thuế làm cơ sở đối chiếu và thu hồi số thuế giá trị gia tăng đã khấu trừ hoặc đã hoàn thuế (nếu có)."},{"k":"p","t":"3. Hồ sơ, thủ tục xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa"},{"k":"p","t":"a) Hồ sơ xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa"},{"k":"p","t":"Hồ sơ đề nghị xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa bao gồm công văn đề nghị hoàn trả tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa theo Mẫu số 2 tại Phụ lục II Thông tư này và các chứng từ, tài liệu có liên quan theo quy định."},{"k":"p","t":"Trường hợp Hệ thống gặp sự cố, người nộp thuế nộp công văn đề nghị hoàn trả tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa theo Mẫu số 04 tại Phụ lục I Thông tư này và chứng từ, tài liệu có liên quan."},{"k":"p","t":"b) Trách nhiệm của người nộp thuế"},{"k":"p","t":"Người nộp thuế khai chỉ tiêu thông tin hồ sơ đề nghị xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa theo quy định tại điểm a khoản này gửi đến Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp chưa khai báo được chỉ tiêu quy định tại điểm này, người nộp thuế nộp bản chụp được ký số các chứng từ, tài liệu liên quan đến chỉ tiêu chưa khai báo được cho cơ quan hải quan qua Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, người nộp thuế gửi hồ sơ giấy đến cơ quan hải quan."},{"k":"p","t":"c) Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"c.1) Cơ quan hải quan nơi phát sinh tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa tiếp nhận và xử lý hồ sơ thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố thì cơ quan hải quan tiếp nhận hồ sơ giấy;"},{"k":"p","t":"c.2) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được hồ sơ của người nộp thuế, cơ quan hải quan phản hồi cho người nộp thuế về việc không tiếp nhận hồ sơ đối với trường hợp hồ sơ không đúng đối tượng theo Mẫu số 3 tại Phụ lục II Thông tư này hoặc thông báo về việc bổ sung hồ sơ theo Mẫu số 7 tại Phụ lục II Thông tư này. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 05 hoặc Mẫu số 06 tại Phụ lục I Thông tư này."},{"k":"p","t":"Trong thời hạn 05 ngày làm việc kể từ ngày người nộp thuế nhận được thông báo của cơ quan hải quan, người nộp thuế không giải trình, bổ sung hồ sơ thì cơ quan hải quan thông báo cho người nộp thuế về việc chưa đủ cơ sở xem xét, xử lý hồ sơ theo Mẫu số 02 Phụ lục I hoặc Mẫu số 4 tại Phụ lục II Thông tư này."},{"k":"p","t":"d) Trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan hải quan kiểm tra hồ sơ"},{"k":"p","t":"d.1) Trường hợp hồ sơ đủ điều kiện, Thủ trưởng cơ quan hải quan nơi phát sinh số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa ban hành quyết định hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa qua Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"d.2) Trường hợp hồ sơ chưa đủ điều kiện hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 4 tại Phụ lục II Thông tư này gửi qua Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Trường hợp hồ sơ giấy hoặc Hệ thống xử lý dữ liệu điện tử hải quan chưa có chức năng ký số, cơ quan hải quan ban hành quyết định hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa theo Mẫu số 07 tại Phụ lục I Thông tư này hoặc thông báo hồ sơ chưa đủ điều kiện hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa theo Mẫu số 02 tại Phụ lục I Thông tư này gửi người nộp thuế."},{"k":"p","t":"Thời hạn giải quyết hồ sơ xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa không bao gồm thời gian người nộp thuế giải trình, bổ sung thông tin, tài liệu theo thông báo của cơ quan hải quan."},{"k":"p","t":"4. Thẩm quyền ban hành quyết định hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa"},{"k":"p","t":"Thủ trưởng cơ quan hải quan nơi phát sinh số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa ban hành quyết định hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa."},{"k":"p","t":"5. Trình tự xử lý tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt được hoàn, bù trừ thực hiện theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"6. Trình tự thủ tục xử lý thu hồi hoàn"},{"k":"p","t":"a) Trường hợp cơ quan hải quan, cơ quan nhà nước có thẩm quyền qua thanh tra, kiểm tra phát hiện hoặc kiến nghị liên quan đến người nộp thuế đã được hoàn không đúng quy định thì người nộp thuế phải nộp số tiền đã được hoàn thừa và tiền chậm nộp theo quy định tại Điều 16 Luật số 108/2025/QH15, Điều 26 Nghị định số 252/2026/NĐ-CP vào ngân sách nhà nước theo quyết định về việc thu hồi hoàn theo Mẫu số 08 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Trường hợp người nộp thuế tự phát hiện đã được hoàn không đúng quy định thì thông báo cho cơ quan hải quan để thực hiện thu hồi hoàn theo điểm a khoản này."}]},{"id":"tt86_8","no":8,"code":"Điều 8","title":"Điều 8. Xử lý số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt được hoàn, bù trừ nghĩa vụ phải nộp","shortTitle":"Xử lý số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt được hoàn, bù trừ nghĩa vụ phải nộp","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Trên cơ sở đề nghị của người nộp thuế, cơ quan hải quan thực hiện kiểm tra, đối chiếu trên Hệ thống kế toán và xử lý việc hoàn trả tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt từ ngân sách nhà nước, như sau:"},{"k":"p","t":"1. Người nộp thuế không còn nợ tiền thuế, tiền chậm nộp, tiền phạt, các khoản thu khác (bao gồm cả tiền phí hải quan, lệ phí hàng hóa phương tiện quá cảnh còn nợ trừ trường hợp tiền phí, lệ phí phát sinh của các tờ khai trong tháng đến ngày 10 của tháng tiếp theo)."},{"k":"p","t":"a) Trường hợp người nộp thuế yêu cầu hoàn trả, cơ quan hải quan căn cứ quyết định hoàn tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt, lập lệnh hoàn trả theo mẫu quy định tại Thông tư số 77/2017/TT-BTC của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán ngân sách nhà nước và hoạt động nghiệp vụ kho bạc nhà nước được sửa đổi, bổ sung bởi Thông tư số 19/2020/TT-BTC gửi Kho bạc Nhà nước để thực hiện hoàn trả cho người nộp thuế;"},{"k":"p","t":"b) Trường hợp người nộp thuế có văn bản yêu cầu bù trừ vào số tiền thuế phải nộp của các tờ khai tiếp theo, cơ quan hải quan căn cứ quyết định hoàn và văn bản đề nghị của người nộp thuế lập Lệnh hoàn trả kiêm bù trừ theo mẫu quy định tại Thông tư số 77/2017/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 19/2020/TT-BTC gửi Kho bạc Nhà nước để thực hiện hoàn trả kiêm bù trừ với khoản phải nộp, trường hợp còn phải hoàn thực hiện theo quy định tại điểm a khoản này."},{"k":"p","t":"2. Người nộp thuế còn nợ tiền thuế, tiền chậm nộp, tiền phạt, các khoản thu khác (bao gồm cả tiền phí hải quan, lệ phí hàng hóa phương tiện quá cảnh còn nợ, trừ trường hợp tiền phí, lệ phí phát sinh của các tờ khai trong tháng đến ngày 10 của tháng tiếp theo)."},{"k":"p","t":"a) Trường hợp người nộp thuế đề nghị bù trừ, cơ quan hải quan lập Lệnh hoàn trả kiêm bù trừ theo mẫu quy định tại Thông tư số 77/2017/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 19/2020/TT-BTC gửi Kho bạc Nhà nước để nộp ngân sách nhà nước thay cho người nộp thuế;"},{"k":"p","t":"b) Trường hợp người nộp thuế không yêu cầu bù trừ nhưng cơ quan hải quan phát hiện người nộp thuế còn nghĩa vụ phải nộp các khoản tiền thuế, tiền chậm nộp, tiền phạt, các khoản thu khác (bao gồm cả tiền phí, lệ phí còn nợ), cơ quan hải quan thực hiện xử lý theo quy định tại điểm a khoản này và thông báo cho người nộp thuế theo Mẫu số 09 tại Phụ lục I Thông tư này;"},{"k":"p","t":"c) Trường hợp sau khi bù trừ nếu còn tiền thừa thì thực hiện hoàn trả cho người nộp thuế theo quy định tại điểm a khoản này."},{"k":"p","t":"3. Trường hợp nộp thừa trong năm ngân sách, nếu người nộp thuế còn nợ tiền thuế, tiền chậm nộp, tiền phạt, các khoản thu khác và đề nghị nộp cho số tiền còn nợ thì thực hiện điều chỉnh theo Mẫu C1-07 tại Thông tư số 77/2017/TT-BTC được sửa đổi, bổ sung bởi Thông tư số 19/2020/TT-BTC."},{"k":"p","t":"4. Trường hợp người nộp thuế không hoạt động tại địa chỉ đăng ký kinh doanh có tiền thuế, tiền chậm nộp, tiền phạt, các khoản thu khác nộp thừa và tiền thuế, tiền chậm nộp, tiền phạt, các khoản thu khác còn nợ thì cơ quan hải quan thực hiện bù trừ số tiền nộp thừa với số tiền còn nợ."}]},{"id":"tt86_9","no":9,"code":"Điều 9","title":"Điều 9. Xử lý đối với việc chậm nộp tiền thuế, khoản thu khác","shortTitle":"Xử lý đối với việc chậm nộp tiền thuế, khoản thu khác","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp phải nộp tiền chậm nộp"},{"k":"p","t":"a) Các trường hợp phải nộp tiền chậm nộp thực hiện theo quy định tại khoản 1 Điều 16 Luật số 108/2025/QH15;"},{"k":"p","t":"b) Hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế được tổ chức tín dụng bảo lãnh số thuế nhưng người nộp thuế chưa nộp hoặc nộp thiếu thì tổ chức tín dụng phải nộp số tiền chưa nộp hoặc nộp thiếu và tiền chậm nộp theo quy định tại khoản 1 Điều 16 Luật số 108/2025/QH15;"},{"k":"p","t":"c) Cơ quan, tổ chức được cơ quan hải quan ủy nhiệm thu thuế, khoản thu khác chậm nộp tiền thuế, khoản thu khác vào ngân sách nhà nước thì phải nộp tiền chậm nộp theo quy định tại điểm g khoản 1 Điều 16 Luật số 108/2025/QH15."},{"k":"p","t":"2. Xử lý đối với việc chậm nộp tiền thuế, khoản thu khác"},{"k":"p","t":"a) Trường hợp sau 30 ngày kể từ ngày người nộp thuế nộp tiền thuế, khoản thu khác, tiền phạt nhưng người nộp thuế chưa xác định số tiền chậm nộp thì cơ quan hải quan xác định số tiền chậm nộp và thông báo cho người nộp thuế biết số tiền chậm nộp theo Mẫu số 10 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Trường hợp sau 30 ngày kể từ ngày hết thời hạn nộp thuế, khoản thu khác, người nộp thuế chưa nộp tiền thuế nợ thì cơ quan hải quan thông báo cho người nộp thuế biết số tiền thuế nợ và số ngày chậm nộp theo Mẫu số 11 tại Phụ lục I Thông tư này."},{"k":"p","t":"3. Không tính tiền chậm nộp"},{"k":"p","t":"a) Các trường hợp không tính tiền chậm nộp thực hiện theo quy định tại Điều 26 Nghị định số 252/2026/NĐ-CP;"},{"k":"p","t":"b) Cơ quan hải quan nơi phát sinh khoản nợ không tính tiền chậm nộp trên cơ sở thông tin, chứng từ, tài liệu thuộc hồ sơ hải quan và trường hợp quy định tại điểm a khoản này và phản hồi cho người nộp thuế qua Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Trường hợp người nộp thuế đề nghị bù trừ tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa với số tiền thuế, tiền chậm nộp, tiền phạt còn nợ thì không tính tiền chậm nộp tương ứng với khoản tiền bù trừ trong khoản thời gian từ ngày phát sinh khoản nộp thừa đến ngày cơ quan quản lý thuế thực hiện bù trừ."}]},{"id":"tt86_10","no":10,"code":"Điều 10","title":"Điều 10. Miễn tiền chậm nộp","shortTitle":"Miễn tiền chậm nộp","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với trường hợp gặp thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ quy định tại khoản 21 Điều 4 Luật số 108/2025/QH15, số tiền chậm nộp được miễn là số tiền chậm nộp còn nợ tại thời điểm xảy ra thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ và không vượt quá giá trị vật chất bị thiệt hại sau khi trừ các khoản được bồi thường, bảo hiểm theo quy định (nếu có). Trường hợp bất khả kháng khác theo quy định tại khoản 1 Điều 3 Nghị định số 252/2026/NĐ-CP là số tiền chậm nộp còn nợ tại thời điểm xảy ra tình trạng bất khả kháng khác và không vượt quá giá trị vật chất bị thiệt hại sau khi trừ các khoản được bồi thường, bảo hiểm theo quy định (nếu có)."},{"k":"p","t":"2. Hồ sơ miễn tiền chậm nộp"},{"k":"p","t":"a) Hồ sơ miễn tiền chậm nộp đối với trường hợp do thiên tai, thảm họa, dịch bệnh, hoả hoạn, tai nạn bất ngờ gồm:"},{"k":"p","t":"a.1) Văn bản đề nghị của người nộp thuế theo Mẫu số 5 tại Phụ lục II Thông tư này gửi qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc bản giấy theo Mẫu số 12 tại Phụ lục I Thông tư này;"},{"k":"p","t":"a.2) Biên bản hoặc văn bản xác nhận nguyên nhân thiệt hại của một trong các cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại: cơ quan công an có thẩm quyền; Ủy ban nhân dân cấp xã; Ban quản lý khu công nghiệp; Ban quản lý khu chế xuất; Ban quản lý khu kinh tế; Ban quản lý cửa khẩu; Cảng vụ hàng hải; Cảng vụ hàng không nơi xảy ra sự kiện bất khả kháng về thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ gây thiệt hại cho hàng hóa nhập khẩu: 01 bản chính;"},{"k":"p","t":"a.3) Các chứng từ liên quan đến việc bồi thường, bảo hiểm (nếu có)."},{"k":"p","t":"b) Hồ sơ miễn tiền chậm nộp đối với trường hợp bất khả kháng khác theo quy định tại khoản 1 Điều 3 Nghị định số 252/2026/NĐ-CP gồm:"},{"k":"p","t":"b.1) Văn bản đề nghị của người nộp thuế theo Mẫu số 5 tại Phụ lục II Thông tư này gửi qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc bản giấy theo Mẫu số 12 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.2) Văn bản xác định giá trị thiệt hại vật chất của cơ quan tài chính hoặc cơ quan giám định độc lập xác định mức độ, giá trị thiệt hại đối với trường hợp do chiến tranh, bạo loạn, đình công mà người nộp thuế phải ngừng, nghỉ sản xuất, kinh doanh: 01 bản chính;"},{"k":"p","t":"b.3) Tài liệu chứng minh người nộp thuế không có khả năng nộp ngân sách nhà nước đối với trường hợp người nộp thuế gặp rủi ro không thuộc nguyên nhân, trách nhiệm chủ quan của người nộp thuế: 01 bản chính;"},{"k":"p","t":"b.4) Các chứng từ liên quan đến việc bồi thường, bảo hiểm (nếu có)."},{"k":"p","t":"c) Tiếp nhận hồ sơ"},{"k":"p","t":"Người nộp thuế khai chỉ tiêu thông tin đề nghị miễn tiền chậm nộp theo Mẫu số 5 tại Phụ lục II Thông tư này kèm theo bản chụp các chứng từ, tài liệu liên quan được ký số cho cơ quan hải quan nơi phát sinh khoản phải nộp ngân sách nhà nước."},{"k":"p","t":"Trường hợp Hệ thống gặp sự cố người nộp thuế gửi 01 bản chính công văn đề nghị miễn tiền chậm nộp đối với các trường hợp miễn tiền chậm nộp theo Mẫu số 12 tại Phụ lục I Thông tư này và bản giấy các chứng từ, tài liệu có liên quan đến cơ quan hải quan nơi phát sinh khoản phải nộp ngân sách nhà nước."},{"k":"p","t":"d) Xử lý hồ sơ"},{"k":"p","t":"d.1) Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ, cơ quan hải quan phản hồi cho người nộp thuế về việc giải trình, bổ sung hồ sơ theo Mẫu số 7 tại Phụ lục II Thông tư này qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc bản giấy theo Mẫu số 06 tại Phụ lục I Thông tư này đối với trường hợp hồ sơ chưa đầy đủ theo quy định;"},{"k":"p","t":"d.2) Trong thời hạn 05 ngày làm việc kể từ ngày người nộp thuế nhận được thông báo của cơ quan hải quan mà người nộp thuế không giải trình, bổ sung hồ sơ miễn tiền chậm nộp thì cơ quan hải quan thông báo cho người nộp thuế về việc chưa đủ cơ sở xem xét, xử lý hồ sơ miễn tiền chậm nộp. Thời hạn người nộp thuế bổ sung, giải trình hồ sơ không tính vào thời hạn xử lý hồ sơ;"},{"k":"p","t":"d.3) Trong thời hạn 07 ngày làm việc kể từ ngày tiếp nhận đầy đủ hồ sơ, cơ quan hải quan kiểm tra hồ sơ"},{"k":"p","t":"Trường hợp thuộc đối tượng miễn tiền chậm nộp, cơ quan hải quan ban hành quyết định miễn tiền chậm nộp theo Mẫu số 13 tại Phụ lục I Thông tư này."},{"k":"p","t":"Trường hợp không thuộc đối tượng miễn tiền chậm nộp, cơ quan hải quan thông báo cho người nộp thuế biết lý do không miễn tiền chậm nộp theo Mẫu số 02 tại Phụ lục I Thông tư này."},{"k":"p","t":"3. Thẩm quyền ban hành quyết định miễn tiền chậm nộp"},{"k":"p","t":"Thủ trưởng cơ quan hải quan nơi tiếp nhận hồ sơ miễn tiền chậm nộp ban hành Quyết định miễn tiền chậm nộp theo Mẫu số 13 tại Phụ lục I Thông tư này."},{"k":"p","t":"4. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, thông báo hoặc quyết định miễn tiền chậm nộp thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_11","no":11,"code":"Điều 11","title":"Điều 11. Hồ sơ, trình tự, thủ tục hoàn thuế","shortTitle":"Hồ sơ, trình tự, thủ tục hoàn thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ hoàn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu, nhập khẩu"},{"k":"p","t":"a) Hàng hóa xuất khẩu đã nộp thuế xuất khẩu nhưng phải tái nhập được hoàn thuế xuất khẩu và không phải nộp thuế nhập khẩu"},{"k":"p","t":"a.1) Công văn đề nghị hoàn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 6 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 14 tại Phụ lục I Thông tư này;"},{"k":"p","t":"a.2) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán;"},{"k":"p","t":"a.3) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác (nếu có);"},{"k":"p","t":"a.4) Đối với hàng hóa phải nhập khẩu trở lại do khách hàng nước ngoài từ chối nhận hàng hoặc không có người nhận hàng theo thông báo của hãng vận tải, phải có thêm thông báo của khách hàng nước ngoài hoặc văn bản thỏa thuận với khách hàng nước ngoài về việc nhận lại hàng hóa hoặc văn bản thông báo của hãng vận tải về việc không có người nhận hàng có nêu rõ lý do, số lượng, chủng loại hàng hóa trả lại đối với trường hợp hàng hóa do khách hàng trả lại."},{"k":"p","t":"Trường hợp vì lý do bất khả kháng hoặc người nộp thuế tự phát hiện hàng hóa có sai, sót, nhập khẩu trở lại thì không phải có văn bản này nhưng phải nêu rõ lý do nhập khẩu hàng hóa trả lại trong công văn đề nghị hoàn thuế."},{"k":"p","t":"a.5) Đối với hàng hóa nêu tại điểm b khoản 1 Điều 33 Nghị định số 134/2016/NĐ-CP của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu phải nộp thêm văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận."},{"k":"p","t":"b) Hàng hóa nhập khẩu đã nộp thuế nhập khẩu nhưng phải tái xuất được hoàn thuế nhập khẩu và không phải nộp thuế xuất khẩu"},{"k":"p","t":"b.1) Công văn đề nghị hoàn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 6 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 14 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b.2) Hóa đơn giá trị gia tăng hoặc hóa đơn bán hàng theo quy định của pháp luật về hóa đơn hoặc hóa đơn thương mại;"},{"k":"p","t":"b.3) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán;"},{"k":"p","t":"b.4) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác (nếu có);"},{"k":"p","t":"b.5) Văn bản thỏa thuận trả lại hàng hóa cho phía nước ngoài trong trường hợp xuất trả chủ hàng nước ngoài ban đầu đối với hàng hóa nhập khẩu quy định tại điểm a khoản 1 Điều 34 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP;"},{"k":"p","t":"b.6) Văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận đối với hàng hóa nhập khẩu quy định tại điểm b khoản 1 Điều 34 Nghị định số 134/2016/NĐ-CP;"},{"k":"p","t":"b.7) Văn bản xác nhận của doanh nghiệp cung ứng tàu biển về số lượng, trị giá hàng hóa mua của doanh nghiệp đầu mối nhập khẩu đã thực cung ứng cho tàu biển nước ngoài kèm bảng kê chứng từ thanh toán của các hãng tàu biển nước ngoài đối với hàng hóa nhập khẩu quy định tại điểm c khoản 1 Điều 34 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"c) Hoàn thuế đối với máy móc, thiết bị, dụng cụ, phương tiện vận chuyển của các tổ chức, cá nhân được phép tạm nhập, tái xuất"},{"k":"p","t":"c.1) Công văn đề nghị hoàn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 6 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 14 tại Phụ lục I Thông tư này;"},{"k":"p","t":"c.2) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán;"},{"k":"p","t":"c.3) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác."},{"k":"p","t":"d) Hoàn thuế đối với hàng hóa nhập khẩu để sản xuất, kinh doanh nhưng đã xuất khẩu sản phẩm"},{"k":"p","t":"d.1) Công văn đề nghị hoàn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 6 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 14 tại Phụ lục I Thông tư này;"},{"k":"p","t":"d.2) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán;"},{"k":"p","t":"d.3) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa;"},{"k":"p","t":"d.4) Hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác."},{"k":"p","t":"Người nộp thuế kê khai trên tờ khai hải quan hàng xuất khẩu các thông tin về số, ngày hợp đồng, tên đối tác mua hàng hóa."},{"k":"p","t":"d.5) Báo cáo tính thuế nguyên liệu, vật tư, linh kiện nhập khẩu theo Mẫu số 15 tại Phụ lục I Thông tư này."},{"k":"p","t":"Số tiền thuế nhập khẩu của nguyên liệu, vật tư, linh kiện được hoàn thuế phải tương ứng với lượng, chủng loại nguyên liệu, vật tư, linh kiện nhập khẩu thực tế được sử dụng để sản xuất sản phẩm thực tế đã xuất khẩu."},{"k":"p","t":"d.6) Hợp đồng gia công ký với khách hàng nước ngoài (đối với trường hợp nhập khẩu nguyên liệu, vật tư, linh kiện để sản xuất sản phẩm, sau đó sử dụng sản phẩm này để gia công hàng hóa xuất khẩu theo hợp đồng gia công với nước ngoài);"},{"k":"p","t":"d.7) Tài liệu chứng minh có cơ sở sản xuất trên lãnh thổ Việt Nam; có quyền sở hữu hoặc quyền sử dụng đối với máy móc, thiết bị tại cơ sở sản xuất phù hợp với nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất hàng hóa."},{"k":"p","t":"đ) Hoàn thuế đối với trường hợp người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu nhưng không có hàng hóa nhập khẩu, xuất khẩu hoặc nhập khẩu, xuất khẩu ít hơn so với hàng hóa nhập khẩu, xuất khẩu đã nộp thuế"},{"k":"p","t":"Công văn đề nghị hoàn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 6 tại Phụ lục II Thông tư này hoặc bản giấy theo Mẫu số 14 tại Phụ lục I Thông tư này."},{"k":"p","t":"2. Trách nhiệm của người nộp thuế"},{"k":"p","t":"a) Người nộp thuế khai chỉ tiêu thông tin hồ sơ đề nghị hoàn thuế và chứng từ, tài liệu có liên quan tại Phụ lục II Thông tư này, gửi đến Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"b) Trường hợp chưa khai báo được các chỉ tiêu quy định tại điểm a khoản này, người nộp thuế nộp bản chụp được ký số các chứng từ, tài liệu liên quan đến chỉ tiêu chưa khai báo được cho cơ quan hải quan qua Hệ thống xử lý dữ liệu điện tử hải quan;"},{"k":"p","t":"c) Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, người nộp thuế nộp 01 bản chính công văn đề nghị hoàn thuế xuất khẩu hoặc thuế nhập khẩu theo Mẫu số 14 tại Phụ lục I Thông tư này; 01 bản chính Báo cáo tính thuế nguyên liệu, vật tư, linh kiện nhập khẩu theo Mẫu số 15 tại Phụ lục I Thông tư này đối với trường hợp hoàn thuế hàng hóa nhập khẩu để sản xuất, kinh doanh nhưng đã xuất khẩu sản phẩm; bản giấy các chứng từ, tài liệu theo quy định khoản 1 Điều này đến cơ quan hải quan."},{"k":"p","t":"3. Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"a) Cơ quan hải quan nơi phát sinh số tiền thuế được hoàn hoặc cơ quan hải quan nơi được giao chức năng xử lý hoàn thuế thực hiện tiếp nhận hồ sơ đề nghị hoàn thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan hoặc tiếp nhận hồ sơ giấy trong trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố;"},{"k":"p","t":"b) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được hồ sơ của người nộp thuế, cơ quan hải quan phản hồi cho người nộp thuế về việc tiếp nhận, phân loại hồ sơ hoặc không tiếp nhận hồ sơ hoàn thuế đối với trường hợp không thuộc các trường hợp hoàn thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 3 tại Phụ lục II Thông tư này. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 05 tại Phụ lục I Thông tư này."},{"k":"p","t":"4. Phân loại hồ sơ hoàn thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại khoản 2, khoản 3 Điều 30 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"5. Thời hạn giải quyết hồ sơ hoàn thuế thực hiện theo quy định tại khoản 3 Điều 31 Nghị định số 252/2026/NĐ-CP."},{"k":"p","t":"6. Trình tự, thủ tục hoàn thuế"},{"k":"p","t":"a) Thủ tục hoàn thuế đối với hồ sơ hoàn thuế trước"},{"k":"p","t":"Cơ quan hải quan căn cứ hồ sơ đề nghị hoàn thuế của người nộp thuế, thực hiện kiểm tra, rà soát, đối chiếu thông tin khai báo trên hồ sơ đề nghị hoàn thuế với thông tin quản lý tại cơ sở dữ liệu của cơ quan hải quan để xác định điều kiện hoàn thuế, số tiền thuế phải hoàn."},{"k":"p","t":"a.1) Trường hợp thông tin khai trên hồ sơ hoàn thuế không thống nhất với thông tin quản lý của cơ quan hải quan hoặc cơ quan hải quan cần làm rõ thông tin, hồ sơ thì cơ quan hải quan thông báo cho người nộp thuế thông qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 7 tại Phụ lục II Thông tư này. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, cơ quan hải quan thông báo cho người nộp thuế theo Mẫu số 06 tại Phụ lục I Thông tư này để người nộp thuế giải trình, bổ sung thông tin."},{"k":"p","t":"Trong thời hạn 05 ngày làm việc kể từ ngày người nộp thuế nhận được thông báo của cơ quan hải quan mà người nộp thuế không giải trình, bổ sung hồ sơ hoàn thuế thì cơ quan hải quan thông báo cho người nộp thuế về việc chưa đủ cơ sở xem xét, xử lý hồ sơ hoàn thuế theo quy định tại điểm a.3 khoản này."},{"k":"p","t":"a.2) Trường hợp xác định hồ sơ đủ điều kiện hoàn thuế thì cơ quan hải quan ban hành Quyết định hoàn thuế theo quy định tại điểm c.2.1 khoản này;"},{"k":"p","t":"a.3) Trường hợp hồ sơ chưa đủ điều kiện hoàn thuế, cơ quan hải quan thông báo qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu số 4 tại Phụ lục II Thông tư này. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, cơ quan hải quan thông báo và gửi người nộp thuế theo Mẫu số 02 tại Phụ lục I Thông tư này."},{"k":"p","t":"b) Thủ tục hoàn thuế đối với hồ sơ kiểm tra trước hoàn thuế"},{"k":"p","t":"Trong thời hạn 03 ngày làm việc kể từ ngày thông báo cho người nộp thuế về việc chấp nhận hồ sơ thuộc diện kiểm tra trước hoàn thuế, cơ quan hải quan ban hành quyết định kiểm tra tại trụ sở người nộp thuế."},{"k":"p","t":"b.1) Thẩm quyền ban hành quyết định kiểm tra tại trụ sở người nộp thuế"},{"k":"p","t":"Thủ trưởng cơ quan hải quan nơi phát sinh số tiền thuế đề nghị hoàn hoặc Thủ trưởng cơ quan hải quan được giao chức năng xử lý hoàn thuế ban hành quyết định kiểm tra tại trụ sở người nộp thuế đối với hồ sơ kiểm tra trước hoàn thuế."},{"k":"p","t":"b.2) Nội dung, phương pháp kiểm tra"},{"k":"p","t":"Cơ quan hải quan thực hiện kiểm tra theo nội dung, phạm vi của quyết định kiểm tra, theo nguyên tắc kiểm tra thuế theo quy định tại khoản 1 Điều 22 Luật số 108/2025/QH15."},{"k":"p","t":"b.2.1) Kiểm tra hồ sơ hải quan, hồ sơ hoàn thuế, chứng từ, sổ sách kế toán, chứng từ thanh toán, phiếu xuất kho, nhập kho hoặc chứng từ thể hiện việc xuất, nhập kho hàng hóa; đối chiếu số tiền thuế đề nghị hoàn với số tiền thuế đã nộp trên Hệ thống kế toán tập trung của cơ quan hải quan, thông tin trong hồ sơ hoàn thuế với các thông tin trên Hệ thống liên quan đến tờ khai xuất khẩu, nhập khẩu có số tiền thuế người nộp thuế đề nghị hoàn;"},{"k":"p","t":"b.2.2) Trường hợp hoàn thuế theo quy định tại Điều 35 Nghị định số 134/2016/NĐ-CP thì cơ quan hải quan thực hiện kiểm tra nội dung kê khai của người nộp thuế về tỷ lệ khấu hao, phương pháp tính khấu hao;"},{"k":"p","t":"b.2.3) Trường hợp hoàn thuế theo quy định tại Điều 36 Nghị định số 134/2016/NĐ-CP, cơ quan hải quan thực hiện kiểm tra sự phù hợp giữa định mức người nộp thuế phản ánh trong Báo cáo tính thuế nguyên liệu, vật tư, linh kiện đề nghị hoàn thuế nhập khẩu theo Mẫu số 15 tại Phụ lục I Thông tư này với định mức thực tế sản xuất, sổ sách, chứng từ kế toán, tài liệu kỹ thuật trong quá trình sản xuất có liên quan đến nguyên liệu, vật tư, linh kiện nhập khẩu đề nghị hoàn thuế."},{"k":"p","t":"Trường hợp chưa có thông tin hoặc dữ liệu cần xác minh về kiểm tra cơ sở sản xuất, cơ quan hải quan kiểm tra cơ sở sản xuất, quyền sử dụng đối với máy móc, thiết bị tại cơ sở sản xuất."},{"k":"p","t":"b.2.4) Kiểm tra các chứng từ, tài liệu, dữ liệu khác có liên quan đến hàng hóa xuất khẩu, nhập khẩu theo quy định tại Điều 16a Thông tư 38/2015/TT-BTC được sửa đổi, bổ sung bởi khoản 6 Điều 1 Thông tư số 39/2018/TT-BTC, khoản 5 Điều 1 Thông tư số 121/2025/TT-BTC;"},{"k":"p","t":"b.2.5) Kết thúc việc kiểm tra, cơ quan hải quan phải xác định số tiền thuế được hoàn theo từng loại thuế, số tiền thuế không đủ điều kiện hoàn, lý do không đủ điều kiện hoàn."},{"k":"p","t":"Trường hợp hàng hóa nhập khẩu thuộc đối tượng hoàn thuế theo Điều 33, Điều 34, Điều 35, Điều 36 Nghị định số 134/2016/NĐ-CP, người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu theo tờ khai hải quan đồng thời đã nộp thuế nhập khẩu, thuế xuất khẩu theo quyết định ấn định thuế của cơ quan hải quan, cơ quan hải quan phải xác định số tiền thuế nhập khẩu, thuế xuất khẩu được hoàn theo tờ khai hải quan và số tiền thuế nhập khẩu, thuế xuất khẩu được hoàn theo quyết định ấn định thuế."},{"k":"p","t":"b.3) Trình tự, thủ tục kiểm tra tại trụ sở người nộp thuế"},{"k":"p","t":"Thực hiện theo quy định tại Điều 39 Thông tư này."},{"k":"p","t":"c) Xử lý kết quả kiểm tra"},{"k":"p","t":"c.1) Trường hợp hồ sơ chưa đủ điều kiện hoàn thuế, cơ quan hải quan thông báo theo Mẫu số 4 tại Phụ lục II Thông tư này qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, cơ quan hải quan thông báo theo Mẫu số 02 tại Phụ lục I Thông tư này và gửi người nộp thuế;"},{"k":"p","t":"c.2) Trường hợp kết luận kiểm tra xác định hồ sơ đủ điều kiện hoàn thuế, cơ quan hải quan ban hành quyết định hoàn thuế"},{"k":"p","t":"c.2.1) Thủ trưởng cơ quan hải quan nơi phát sinh số tiền thuế được hoàn hoặc Thủ trưởng cơ quan hải quan nơi được giao nhiệm vụ xử lý hoàn thuế ban hành quyết định hoàn thông qua Hệ thống xử lý dữ liệu điện tử hải quan. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan gặp sự cố, cơ quan hải quan ban hành quyết định hoàn thuế theo Mẫu số 16 tại Phụ lục I Thông tư này và gửi người nộp thuế, các cơ quan có liên quan (nếu có);"},{"k":"p","t":"c.2.2) Trường hợp hàng hóa nhập khẩu thuộc đối tượng hoàn thuế theo Điều 33, Điều 34, Điều 35, Điều 36 Nghị định số 134/2016/NĐ-CP, người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu theo tờ khai hải quan đồng thời đã nộp thuế nhập khẩu, thuế xuất khẩu theo quyết định ấn định thuế của cơ quan hải quan, số tiền thuế được hoàn bao gồm số tiền thuế đã nộp theo tờ khai hải quan và số tiền thuế đã nộp theo quyết định ấn định thuế, việc ban hành quyết định hoàn thuế được thực hiện như sau:"},{"k":"p","t":"Thủ trưởng cơ quan hải quan nơi phát sinh số tiền thuế đề nghị hoàn hoặc Thủ trưởng cơ quan hải quan nơi được giao nhiệm vụ xử lý hoàn thuế ban hành quyết định hoàn thuế đối với số tiền thuế người nộp thuế đã nộp theo tờ khai hải quan."},{"k":"p","t":"Thủ trưởng cơ quan hải quan đã ban hành quyết định ấn định thuế thực hiện ban hành quyết định hoàn thuế đối với số tiền thuế người nộp thuế đã nộp theo Quyết định ấn định thuế."},{"k":"p","t":"7. Trình tự xử lý số tiền thuế được hoàn, bù trừ thực hiện theo quy định tại Điều 8 Thông tư này."},{"k":"p","t":"8. Trình tự, thủ tục xử lý thu hồi hoàn thuế thực hiện theo quy định tại khoản 6 Điều 7 Thông tư này."},{"k":"p","t":"9. Trường hợp Hệ thống xử lý dữ liệu điện tử hải quan có chức năng xử lý, tiếp nhận, phản hồi, ký số ban thông báo hồ sơ chưa đủ điều kiện hoàn thuế hoặc quyết định hoàn thuế thì cơ quan hải quan thực hiện xử lý trên Hệ thống xử lý dữ liệu điện tử hải quan."}]},{"id":"tt86_12","no":12,"code":"Điều 12","title":"Điều 12. Kiểm tra sau hoàn thuế","shortTitle":"Kiểm tra sau hoàn thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Thẩm quyền kiểm tra sau hoàn thuế đối với hồ sơ thuộc diện hoàn thuế trước"},{"k":"p","t":"a) Chi cục trưởng Chi cục Hải quan khu vực nơi phát sinh số tiền thuế đề nghị hoàn;"},{"k":"p","t":"b) Thủ trưởng cơ quan hải quan khác được giao nhiệm vụ xử lý hoàn thuế theo quy định pháp luật."},{"k":"p","t":"2. Trình tự thực hiện kiểm tra sau hoàn thuế"},{"k":"p","t":"Thực hiện theo quy định tại Điều 39 Thông tư này."},{"k":"p","t":"3. Xử lý kết quả kiểm tra"},{"k":"p","t":"a) Trường hợp kết luận kiểm tra xác định người nộp thuế đủ điều kiện hoàn thuế, cơ quan hải quan đã ban hành quyết định hoàn thuế lưu kết luận kiểm tra vào hồ sơ hoàn thuế, cập nhật kết quả kiểm tra vào Hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"b) Trường hợp kết luận kiểm tra xác định số tiền thuế đã hoàn lớn hơn số tiền thuế được hoàn hoặc xác định không đủ điều kiện hoàn, cơ quan hải quan ban hành quyết định thu hồi hoàn theo quy định."},{"k":"p","t":"Trường hợp cơ quan kiểm tra không phải là cơ quan hải quan ban hành quyết định hoàn thuế thì kiến nghị cơ quan hải quan ban hành quyết định hoàn thuế để thu hồi hoàn theo quy định và xử lý nghĩa vụ tài chính phát sinh theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Cơ quan hải quan có trách nhiệm thông báo với các cơ quan có liên quan về việc thu hồi hoàn để xử lý các thủ tục có liên quan."},{"k":"p","t":"c) Trường hợp kết luận kiểm tra xác định số tiền thuế đã hoàn ít hơn số tiền thuế được hoàn, người nộp thuế có đề nghị thực hiện hoàn số tiền thuế còn lại thì cơ quan hải quan ban hành quyết định hoàn thuế theo quy định."}]},{"id":"tt86_13","no":13,"code":"Điều 13","title":"Điều 13. Thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu đối với các trường hợp thông báo Danh mục miễn thuế","shortTitle":"Thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu đối với các trường hợp thông báo Danh mục miễn thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu"},{"k":"p","t":"Trường hợp quy định tại điểm b, c và d khoản 21 Điều 16 Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi khoản 3 Điều 5 Luật số 90/2025/QH15 và khoản 6 Điều 25 Luật số 133/2025/QH15; Điều 14; Điều 15; Điều 16; Điều 17; Điều 18; Điều 23, khoản 9 Điều 28 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP, người nộp thuế thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu."},{"k":"p","t":"2. Nguyên tắc xây dựng Danh mục hàng hóa miễn thuế dự kiến nhập khẩu (sau đây gọi chung là Danh mục miễn thuế)"},{"k":"p","t":"a) Tổ chức, cá nhân sử dụng hàng hóa (chủ dự án; nhà đầu tư; chủ cơ sở sản xuất, kinh doanh; chủ cơ sở đóng tàu; tổ chức, cá nhân tiến hành hoạt động dầu khí) sau đây gọi chung là chủ dự án là người thông báo Danh mục miễn thuế. Trường hợp chủ dự án không trực tiếp nhập khẩu hàng hóa miễn thuế mà nhà thầu chính hoặc nhà thầu phụ hoặc công ty cho thuê tài chính nhập khẩu hàng hóa thì nhà thầu, công ty cho thuê tài chính sử dụng danh mục miễn thuế do chủ dự án đã thông báo với cơ quan hải quan;"},{"k":"p","t":"b) Hàng hóa phải thuộc đối tượng được miễn thuế theo quy định tại một trong các trường hợp quy định tại khoản 11, khoản 12, khoản 13, khoản 14, khoản 15, khoản 16, điểm b, c và d khoản 21 Điều 16 Luật số 107/2016/QH13 được sửa đổi, bổ sung bởi khoản 3 Điều 5 Luật số 90/2025/QH15 và khoản 6 Điều 25 Luật số 133/2025/QH15; phù hợp với ngành nghề, lĩnh vực đầu tư, mục tiêu, quy mô, công suất của dự án, cơ sở sản xuất, hoạt động sử dụng hàng hóa miễn thuế;"},{"k":"p","t":"c) Danh mục miễn thuế được xây dựng một lần cho dự án, cơ sở sản xuất, hoạt động sử dụng hàng hóa miễn thuế, hoặc xây dựng theo từng giai đoạn, từng hạng mục, từng tổ hợp, dây chuyền phù hợp với thực tế và hồ sơ tài liệu thực hiện dự án, cơ sở sản xuất, hoạt động sử dụng hàng hóa miễn thuế, sau đây gọi chung là dự án."},{"k":"p","t":"3. Hồ sơ thông báo Danh mục miễn thuế"},{"k":"p","t":"a) Công văn Thông báo Danh mục miễn thuế theo Mẫu số 17 tại Phụ lục I Thông tư này;"},{"k":"p","t":"b) Danh mục miễn thuế gửi qua Hệ thống xử lý dữ liệu điện tử hải quan theo Mẫu 7a tại Phụ lục II Thông tư này. Trường hợp hệ thống gặp sự cố, chủ dự án nộp 02 bản chính Danh mục miễn thuế bản giấy theo Mẫu số 18 và 01 bản chính Phiếu theo dõi trừ lùi theo Mẫu số 19 tại Phụ lục I Thông tư này."},{"k":"p","t":"Trường hợp máy móc, thiết bị phải nhập khẩu làm nhiều chuyến, không trừ lùi được số lượng tại thời điểm nhập khẩu (sau đây gọi là tổ hợp, dây chuyền), chủ dự án nộp 02 bản chính Danh mục miễn thuế bản giấy theo Mẫu số 18 tại Phụ lục I Thông tư này."},{"k":"p","t":"c) Giấy chứng nhận đăng ký đầu tư hoặc văn bản chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc văn bản cho phép đầu tư theo quy định của pháp luật chuyên ngành, trừ trường hợp miễn thuế quy định tại khoản 15 Điều 16 Luật số 107/2016/QH13."},{"k":"p","t":"Đối với các dự án đầu tư không thuộc diện phải cấp Giấy chứng nhận đăng ký đầu tư, chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc cho phép đầu tư theo quy định của pháp luật chuyên ngành thì việc xác định dự án đầu tư mới căn cứ vào Báo cáo của nhà đầu tư theo quy định của pháp luật về đầu tư gửi cơ quan đăng ký đầu tư theo quy định của pháp luật về đầu tư."},{"k":"p","t":"d) Báo cáo nghiên cứu khả thi hoặc Báo cáo kinh tế - kỹ thuật hoặc Đề xuất dự án đầu tư;"},{"k":"p","t":"đ) Giấy chứng nhận hoặc công nhận của cơ quan nhà nước có thẩm quyền đối với tổ chức khoa học và công nghệ, doanh nghiệp công nghệ chiến lược, doanh nghiệp công nghệ cao, doanh nghiệp sản xuất sản phẩm công nghệ cao theo quy định của pháp luật về công nghệ cao; doanh nghiệp khoa học và công nghệ, trung tâm đổi mới sáng tạo, trung tâm nghiên cứu và phát triển;"},{"k":"p","t":"e) Giấy chứng nhận đủ điều kiện sản xuất thiết bị y tế hoặc giấy tờ có giá trị tương đương theo quy định của pháp luật về quản lý thiết bị y tế đối với trường hợp miễn thuế quy định tại khoản 14 Điều 16 Luật số 107/2016/QH13;"},{"k":"p","t":"g) Hợp đồng dầu khí, quyết định giao nhiệm vụ thực hiện hoạt động dầu khí, văn bản của cơ quan có thẩm quyền phê duyệt chương trình công tác năm và ngân sách hàng năm đối với trường hợp miễn thuế quy định tại khoản 15 Điều 16 Luật số 107/2016/QH13;"},{"k":"p","t":"h) Hợp đồng đóng tàu, hợp đồng xuất khẩu tàu biển đối với trường hợp miễn thuế quy định tại điểm b, điểm c khoản 16 Điều 16 Luật số 107/2016/QH13;"},{"k":"p","t":"i) Bản thuyết minh dự án sản xuất sản phẩm công nghệ số quy định tại điểm d khoản 21 Điều 16 Luật số 107/2016/QH13 đã được sửa đổi, bổ sung bởi khoản 3 Điều 5 Luật số 90/2025/QH15;"},{"k":"p","t":"k) Hợp đồng thuê chế tạo máy móc, thiết bị hoặc chế tạo linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị đối với hàng hóa quy định tại điểm a khoản 11, điểm b khoản 15, điểm a khoản 16 Điều 16 Luật số 107/2016/QH13;"},{"k":"p","t":"l) Đối với sản phẩm nông sản chưa qua chế biến do phía Việt Nam hỗ trợ đầu tư, trồng tại Campuchia nhập khẩu về nước, ngoài hồ sơ thông báo Danh mục hàng hóa nhập khẩu miễn thuế theo quy định nêu trên, người nộp thuế là doanh nghiệp nộp thêm các chứng từ sau:"},{"k":"p","t":"l.1) Văn bản xác nhận cho phép đầu tư của cơ quan có thẩm quyền tại Campuchia nơi doanh nghiệp Việt Nam đầu tư (bản dịch tiếng Việt);"},{"k":"p","t":"l.2) Hợp đồng hoặc Thỏa thuận ký kết với phía Campuchia về việc hỗ trợ đầu tư, trồng và nhận lại nông sản; trong đó ghi rõ số tiền, hàng đầu tư vào từng lĩnh vực và tương ứng là số lượng, chủng loại, trị giá từng loại nông sản sẽ thu hoạch được;"},{"k":"p","t":"l.3) Chứng từ liên quan đến việc hỗ trợ đầu tư, trồng nông sản tại các tỉnh của Campuchia tiếp giáp biên giới Việt Nam (nếu có)."},{"k":"p","t":"4. Thời gian, địa điểm thông báo Danh mục miễn thuế"},{"k":"p","t":"a) Chủ dự án có trách nhiệm gửi hồ sơ thông báo Danh mục miễn thuế theo quy định tại khoản 3 Điều này trước khi đăng ký tờ khai hàng hóa nhập khẩu miễn thuế đầu tiên;"},{"k":"p","t":"b) Nơi tiếp nhận thông báo Danh mục miễn thuế là Chi cục Hải quan khu vực nơi thực hiện dự án, Chi cục Hải quan khu vực nơi đóng trụ sở chính hoặc nơi quản lý tập trung của dự án đối với dự án được thực hiện ở nhiều tỉnh, thành phố; Chi cục Hải quan khu vực nơi lắp đặt tổ hợp, dây chuyền đối với danh mục hàng hóa miễn thuế dự kiến nhập khẩu theo tổ hợp, dây chuyền."},{"k":"p","t":"5. Sửa đổi, điều chỉnh Danh mục miễn thuế"},{"k":"p","t":"a) Các trường hợp được sửa đổi, điều chỉnh Danh mục miễn thuế"},{"k":"p","t":"a.1) Chủ dự án đã thông báo Danh mục miễn thuế với cơ quan hải quan nhưng việc kê khai trên Danh mục miễn thuế có sai, sót hoặc cần sửa đổi;"},{"k":"p","t":"a.2) Cơ quan hải quan nơi đã tiếp nhận Danh mục miễn thuế phát hiện Danh mục miễn thuế có sai, sót hoặc cần sửa đổi thì yêu cầu chủ dự án thực hiện sửa đổi, điều chỉnh Danh mục miễn thuế."},{"k":"p","t":"b) Chủ dự án thông báo Danh mục miễn thuế sửa đổi trước thời điểm đăng ký tờ khai nhập khẩu hàng hóa kèm theo các tài liệu liên quan để chứng minh việc bổ sung, điều chỉnh là phù hợp với nhu cầu của dự án."},{"k":"p","t":"6. Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"a) Trong thời hạn tối đa 03 ngày làm việc, kể từ ngày tiếp nhận hồ sơ, cơ quan hải quan thông báo cho chủ dự án về việc đã tiếp nhận Danh mục miễn thuế; hoặc đề nghị bổ sung, giải trình hồ sơ hoặc thông báo hàng hóa không thuộc đối tượng miễn thuế;"},{"k":"p","t":"b) Trường hợp sửa đổi Danh mục miễn thuế làm thay đổi số tiền thuế đã được miễn, cơ quan hải quan nơi tiếp nhận hồ sơ thông báo Danh mục miễn thuế có trách nhiệm thông báo cho cơ quan hải quan nơi làm thủ tục nhập khẩu để thu hồi số tiền thuế đã được miễn không đúng quy định, tiền chậm nộp, tiền phạt vi phạm hành chính (nếu có);"},{"k":"p","t":"c) Kiểm tra việc sử dụng hàng hóa miễn thuế trên cơ sở áp dụng quản lý rủi ro theo quy định của pháp luật về quản lý thuế, pháp luật hải quan;"},{"k":"p","t":"d) Cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế dừng việc sử dụng Danh mục miễn thuế đối với Danh mục miễn thuế chưa nhập khẩu hết hàng hóa và vẫn còn trong thời hạn nhập khẩu trong các trường hợp sau:"},{"k":"p","t":"d.1) Dự án đầu tư chấm dứt hoạt động theo quy định của pháp luật về đầu tư;"},{"k":"p","t":"d.2) Dự án ưu đãi đầu tư chuyển nhượng một phần hoặc toàn bộ dự án thuộc đối tượng ưu đãi đầu tư cho tổ chức, cá nhân khác theo quy định tại điểm d khoản 5 Điều 31 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi khoản 14 Điều 1 Nghị định số 18/2021/NĐ-CP;"},{"k":"p","t":"d.3) Chủ dự án có văn bản thông báo không còn nhu cầu nhập khẩu hàng hóa theo Danh mục miễn thuế."},{"k":"p","t":"đ) Cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế thông báo cho cơ quan hải quan trên toàn quốc về việc dừng làm thủ tục miễn thuế đối với các Danh mục miễn thuế thuộc trường hợp quy định tại điểm d khoản này."},{"k":"p","t":"Cơ quan hải quan nơi thực hiện miễn thuế cho dự án theo Danh mục miễn thuế đã bị dừng việc sử dụng thực hiện xử lý thuế đối với hàng hóa đã miễn thuế theo quy định (nếu có)."},{"k":"p","t":"e) Trường hợp Danh mục miễn thuế bản giấy, hết lượng hàng hóa nhập khẩu ghi trong phiếu theo dõi trừ lùi, cơ quan hải quan nơi làm thủ tục cuối cùng xác nhận lên bản chính phiếu theo dõi trừ lùi của người nộp thuế, lưu 01 bản chụp, cấp cho người nộp thuế 01 bản chụp và gửi bản chính đến cơ quan hải quan nơi cấp phiếu theo dõi trừ lùi."},{"k":"p","t":"7. Trách nhiệm của chủ dự án"},{"k":"p","t":"a) Lập Danh mục miễn thuế theo quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Thông báo Danh mục miễn thuế, sửa đổi Danh mục miễn thuế và nhận thông tin phản hồi của cơ quan hải quan thông qua Hệ thống xử lý dữ liệu điện tử hải quan (trừ trường hợp chưa thực hiện được bằng phương thức điện tử);"},{"k":"p","t":"c) Kê khai chính xác, trung thực, đầy đủ và gửi hồ sơ thông báo Danh mục miễn thuế đúng thời hạn; chịu trách nhiệm trước pháp luật về tính chính xác, trung thực, đầy đủ của hồ sơ thông báo Danh mục miễn thuế, sử dụng đúng mục đích miễn thuế đối với số hàng hóa này;"},{"k":"p","t":"d) Lưu giữ các chứng từ liên quan đến cơ sở xác định hàng hóa nhập khẩu miễn thuế và xuất trình cho cơ quan hải quan, cơ quan có thẩm quyền khi thực hiện thanh tra, kiểm tra theo quy định;"},{"k":"p","t":"đ) Thông báo tình hình sử dụng hàng hóa nhập khẩu miễn thuế theo quy định tại Điều 29 Thông tư này;"},{"k":"p","t":"e) Kê khai, nộp thuế (nếu có) theo quy định của pháp luật về thuế đối với hàng hóa nhập khẩu đã bị cơ quan hải quan dừng việc sử dụng Danh mục miễn thuế theo quy định tại điểm đ khoản 6 Điều này."}]},{"id":"tt86_14","no":14,"code":"Điều 14","title":"Điều 14. Hồ sơ, thủ tục miễn thuế nhập khẩu đối với hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ (trừ trường hợp mua hàng miễn thuế tại cửa hàng miễn thuế)","shortTitle":"Hồ sơ, thủ tục miễn thuế nhập khẩu đối với hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ (trừ trường hợp mua hàng miễn thuế tại cửa hàng miễn thuế)","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan, trừ trường hợp mua hàng miễn thuế tại cửa hàng miễn thuế;"},{"k":"p","t":"b) Sổ định mức miễn thuế;"},{"k":"p","t":"c) Giấy tờ chứng minh đã hoàn thành việc tái xuất khẩu hoặc tiêu hủy hoặc chuyển nhượng đối với các trường hợp quy định tại khoản 5 Điều 5 Nghị định số 134/2016/NĐ-CP;"},{"k":"p","t":"d) Văn bản xác nhận của Bộ Ngoại giao đối với trường hợp nhập khẩu hàng hóa quy định tại khoản 2, khoản 3 Điều 5 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP;"},{"k":"p","t":"đ) Quyết định miễn thuế của Thủ tướng Chính phủ đối với trường hợp nhập khẩu hàng hóa quy định tại khoản 4 Điều 5 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."},{"k":"p","t":"3. Đối với trường hợp quy định tại khoản 4 Điều 5 Nghị định số 134/2016/NĐ-CP được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP, tổ chức, cá nhân nước ngoài có văn bản theo Mẫu số 20 tại Phụ lục I Thông tư này gửi Bộ Tài chính. Trong thời hạn 10 ngày kể từ ngày nhận được văn bản đề nghị, Bộ Tài chính thống nhất với Bộ Ngoại giao về chủng loại và định lượng hàng hóa miễn thuế nhập khẩu theo điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài."},{"k":"p","t":"Trong thời hạn 10 ngày kể từ ngày nhận được văn bản của Bộ Ngoại giao, Bộ Tài chính có văn bản báo cáo Thủ tướng Chính phủ kèm dự thảo Quyết định miễn thuế nhập khẩu theo Mẫu số 21 tại Phụ lục I Thông tư này để Thủ tướng Chính phủ quyết định chủng loại và định lượng hàng hóa miễn thuế. Cơ quan hải quan căn cứ hồ sơ theo quy định tại khoản 1 Điều này để thực hiện miễn thuế."},{"k":"p","t":"Cơ quan hải quan nơi làm thủ tục hải quan thực hiện theo dõi việc xuất khẩu, nhập khẩu sử dụng định mức miễn thuế bằng phương thức điện tử. Trường hợp chưa thực hiện theo dõi định mức miễn thuế bằng phương thức điện tử, người nộp thuế có trách nhiệm nộp 01 bản chụp, xuất trình bản chính Sổ định mức miễn thuế để đối chiếu, trừ lùi."},{"k":"p","t":"Đối với trường hợp quy định tại khoản 2, khoản 3 Điều 5 Nghị định số 134/2016/NĐ-CP được sửa đổi bổ sung bởi Nghị định số 18/2021/NĐ-CP, thủ tục miễn thuế thực hiện quy định tại điểm a, điểm b khoản 7 Điều 5 Nghị định số 134/2016/NĐ-CP được sửa đổi bổ sung bởi Nghị định số 18/2021/NĐ-CP."},{"k":"p","t":"4. Thủ tục cấp Sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào Sổ định mức miễn thuế"},{"k":"p","t":"a) Hồ sơ đề nghị đối với cơ quan, tổ chức"},{"k":"p","t":"a1) Văn bản đề nghị cấp Sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào Sổ định mức miễn thuế theo Mẫu số 22a tại Phụ lục I Thông tư này: 01 bản chính;"},{"k":"p","t":"a2) Văn bản thông báo về việc thành lập cơ quan đại diện tại Việt Nam khi cấp Sổ định mức miễn thuế lần đầu;"},{"k":"p","t":"a3) Điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài có quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế;"},{"k":"p","t":"a4) Quyết định miễn thuế của Thủ tướng Chính phủ trong trường hợp Điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài không quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều 5 Nghị định số 134/2016/NĐ-CP)."},{"k":"p","t":"b) Hồ sơ đề nghị đối với cá nhân"},{"k":"p","t":"b1) Văn bản đề nghị cấp Sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào Sổ định mức miễn thuế theo Mẫu số 22b tại Phụ lục I Thông tư này: 01 bản chính;"},{"k":"p","t":"b2) Giấy phép lao động hoặc văn bản có giá trị pháp lý tương đương do cơ quan có thẩm quyền cấp đối với thành viên của tổ chức quốc tế, tổ chức phi chính phủ (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều 5 Nghị định số 134/2016/NĐ-CP);"},{"k":"p","t":"b3) Điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài có quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế;"},{"k":"p","t":"b4) Quyết định miễn thuế của Thủ tướng Chính phủ trong trường hợp điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài không quy định cụ thể chủng loại và định lượng hàng hóa miễn thuế (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều 5 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"c) Thẩm quyền cấp Sổ định mức miễn thuế hoặc bổ sung định lượng hàng hóa vào Sổ định mức miễn thuế"},{"k":"p","t":"Chi cục Hải quan khu vực nơi đóng trụ sở của cơ quan, tổ chức quy định tại điểm c, điểm đ khoản 1 Điều 5 Nghị định số 134/2016/NĐ-CP thực hiện cấp Sổ định mức miễn thuế theo Mẫu số 23a hoặc Mẫu số 23b tại Phụ lục I Thông tư này cho các tổ chức, cá nhân quy định tại điểm c, điểm d khoản 1 Điều 5 Nghị định số 134/2016/NĐ-CP trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ."}]},{"id":"tt86_15","no":15,"code":"Điều 15","title":"Điều 15. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với tài sản di chuyển","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với tài sản di chuyển","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"b) Giấy phép lao động hoặc văn bản có giá trị tương đương do cơ quan có thẩm quyền cấp đối với người nước ngoài, người Việt Nam định cư ở nước ngoài đến công tác, làm việc tại Việt Nam từ 12 tháng trở lên;"},{"k":"p","t":"c) Văn bản chứng minh việc chấm dứt hoạt động hoặc chấm dứt thời hạn lao động ở nước ngoài đối với tổ chức, công dân Việt Nam có hoạt động ở nước ngoài từ 12 tháng trở lên sau khi kết thúc hoạt động trở về nước;"},{"k":"p","t":"d) Hộ chiếu (có đóng dấu kiểm chứng nhập cảnh của cơ quan quản lý xuất nhập cảnh tại cửa khẩu hoặc đóng dấu kiểm chứng nhập cảnh của cơ quan quản lý xuất nhập cảnh tại cửa khẩu trên thị thực rời đối với trường hợp hộ chiếu được cấp thị thực rời) hoặc giấy tờ thay hộ chiếu còn giá trị (có đóng dấu kiểm chứng nhập cảnh của cơ quan quản lý xuất nhập cảnh tại cửa khẩu) đối với người Việt Nam định cư ở nước ngoài đã đăng ký thường trú tại Việt Nam;"},{"k":"p","t":"đ) Quyết định của Bộ trưởng Bộ Tài chính về việc miễn thuế đối với tài sản di chuyển vượt định mức miễn thuế: 01 bản chính;"},{"k":"p","t":"e) Thông tin về số định danh cá nhân."},{"k":"p","t":"Trường hợp cơ quan hải quan không khai thác được thông tin của người nộp thuế theo các phương thức quy định tại khoản 2 Điều 14 Nghị định số 104/2022/NĐ-CP, người nộp thuế xuất trình một trong các giấy tờ sau: Thẻ căn cước công dân, Giấy xác nhận thông tin về cư trú, Giấy thông báo số định danh cá nhân và thông tin công dân trong Cơ sở dữ liệu quốc gia về dân cư."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo Điều 28 Thông tư này."}]},{"id":"tt86_16","no":16,"code":"Điều 16","title":"Điều 16. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với quà biếu, quà tặng","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với quà biếu, quà tặng","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"b) Văn bản thỏa thuận biếu tặng trong trường hợp người nhận quà tặng là tổ chức."},{"k":"p","t":"Người nhận quà tặng là cá nhân có trách nhiệm kê khai chính xác, trung thực trên tờ khai hải quan về hàng hóa xuất khẩu, nhập khẩu là quà biếu, tặng; các thông tin về tên, địa chỉ người tặng, người nhận quà biếu, tặng ở nước ngoài và chịu trách nhiệm trước pháp luật về việc kê khai."},{"k":"p","t":"c) Văn bản của cơ quan chủ quản cấp trên về việc cho phép tiếp nhận để sử dụng hàng hóa miễn thuế và văn bản chứng minh tổ chức được ngân sách nhà nước đảm bảo kinh phí hoạt động đối với quà biếu, quà tặng cho cơ quan, tổ chức được Nhà nước đảm bảo kinh phí hoạt động: 01 bản chính;"},{"k":"p","t":"d) Văn bản xác nhận của Chủ tịch Ủy ban nhân dân tỉnh, thành phố hoặc bộ, ngành chủ quản đối với quà biếu, quà tặng vì mục đích nhân đạo, từ thiện: 01 bản chính."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo Điều 28 Thông tư này."}]},{"id":"tt86_17","no":17,"code":"Điều 17","title":"Điều 17. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa mua bán, trao đổi của cư dân biên giới","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa mua bán, trao đổi của cư dân biên giới","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật về hải quan;"},{"k":"p","t":"b) Thông tin về số định danh cá nhân hoặc xuất trình Giấy thông hành biên giới."},{"k":"p","t":"Trường hợp cơ quan hải quan không khai thác được thông tin của người nộp thuế theo các phương thức quy định tại khoản 2 Điều 14 Nghị định số 104/2022/NĐ-CP, người nộp thuế xuất trình một trong các giấy tờ sau: Thẻ căn cước công dân, Giấy xác nhận thông tin về cư trú, Giấy thông báo số định danh cá nhân và thông tin công dân trong Cơ sở dữ liệu quốc gia về dân cư."},{"k":"p","t":"2. Thủ tục miễn thuế thực hiện theo Điều 28 Thông tư này."}]},{"id":"tt86_18","no":18,"code":"Điều 18","title":"Điều 18. Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu","shortTitle":"Hồ sơ, thủ tục miễn thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế thực hiện theo quy định tại Điều 28 Thông tư này."},{"k":"p","t":"Người nộp thuế kê khai trên tờ khai hải quan các thông tin về số, ngày hợp đồng gia côn
