phôi thẻ BHYT theo đúng quy định đã được Tổng Giám đốc phê duyệt."},{"k":"p","t":"- Chủ trì, phối hợp Ban Sổ - Thẻ đôn đốc, kiểm tra tiến độ thực hiện, chất lượng phôi bìa sổ BHXH, phôi thẻ BHYT theo hợp đồng."},{"k":"p","t":"- Theo dõi, đôn đốc nhà in chuyển phôi bìa sổ BHXH, phôi thẻ BHYT cho BHXH các tỉnh đảm bảo đúng thời gian, số lượng."},{"k":"p","t":"- Chuyển một bản sao vận đơn gửi bìa sổ BHXH, thẻ BHYT cho Ban Sổ - Thẻ để theo dõi tiến độ thực hiện."},{"k":"p","t":"3.3. BHXH tỉnh/huyện"},{"k":"p","t":"a) Văn phòng/Phòng/Tổ KH-TC"},{"k":"p","t":"- Tiếp nhận phôi bìa sổ BHXH, phôi thẻ BHYT, trường hợp phát hiện phôi sổ BHXH, phôi thẻ BHYT không đảm bảo số lượng, số seri, chất lượng lập biên bản báo cáo về BHXH Việt Nam (Ban Sổ - Thẻ)."},{"k":"p","t":"- Căn cứ kế hoạch cấp phôi bìa sổ BHXH, phôi thẻ BHYT được lãnh đạo phê duyệt thực hiện việc xuất kho theo quy định."},{"k":"p","t":"- Chủ trì trong việc tổ chức tiếp nhận, quản lý phôi sổ BHXH, phôi thẻ BHYT đã nhận; lưu giữ sổ BHXH, thẻ BHYT hỏng do Phòng Cấp sổ, thẻ/ BHXH cấp huyện chuyển về đúng quy định."},{"k":"p","t":"b) Phòng/Tổ Cấp sổ, thẻ"},{"k":"p","t":"- Tổng hợp số lượng, theo dõi, điều tiết việc sử dụng phôi bìa sổ BHXH, phôi thẻ BHYT."},{"k":"p","t":"- Cấp phát phôi bìa sổ BHXH, phôi thẻ BHYT cho từng cán bộ làm công tác in sổ BHXH, thẻ BHYT để sử dụng. Khi cấp cho cán bộ sử dụng phải viết phiếu giao nhận phôi bìa sổ BHXH, phôi thẻ BHYT (Mẫu C08-TS)."},{"k":"p","t":"- Cán bộ trực tiếp in sổ BHXH, thẻ BHYT có trách nhiệm bảo quản phôi bìa sổ BHXH, phôi thẻ BHYT được cấp (kể cả số phôi bìa sổ BHXH, phôi thẻ BHYT bị hư hỏng trong quá trình tác nghiệp, trường hợp in hỏng phải được cắt góc)."},{"k":"p","t":"- Trước ngày 01/02 hàng năm, Phòng Cấp sổ, thẻ/BHXH huyện lập danh mục sổ BHXH, thẻ BHYT hỏng năm trước (do in, do bảo quản) để bàn giao cho BHXH tỉnh."}]},{"id":"qd595_45","no":45,"code":"Điều 45","title":"Điều 45. Kiểm kê, hủy phôi bìa sổ BHXH, thẻ BHYT","shortTitle":"Kiểm kê, hủy phôi bìa sổ BHXH, thẻ BHYT","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 3. CẤP PHÔI SỔ BHXH, PHÔI THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Kiểm kê phôi bìa sổ BHXH, thẻ BHYT"},{"k":"p","t":"a) Định kỳ cuối mỗi quý và cuối năm BHXH tỉnh/huyện kiểm kê phôi bìa sổ BHXH, thẻ BHYT nhằm xác nhận số lượng của phôi sổ BHXH, phôi thẻ BHYT, số sêri thẻ BHYT còn tồn kho thực tế và chênh lệch thừa thiếu so với sổ sách kế toán."},{"k":"p","t":"b) Tổ kiểm kê BHXH tỉnh, huyện gồm đại diện: lãnh đạo BHXH tỉnh, huyện; các Phòng/Tổ Cấp sổ, thẻ; Phòng/Tổ KH-TC; Văn phòng. Việc kiểm kê phải lập Biên bản (Mẫu C63-HD ban hành kèm theo Thông tư số 178/2012/TT-BTC); trong đó nêu rõ lý do thừa, thiếu và xác định trách nhiệm của tập thể, cá nhân cùng kiến nghị việc giải quyết."},{"k":"p","t":"2. Hủy sổ BHXH, thẻ BHYT hỏng"},{"k":"p","t":"a) Thành lập Hội đồng hủy sổ BHXH, thẻ BHYT do Lãnh đạo BHXH tỉnh làm Chủ tịch, đại diện lãnh đạo các Phòng: KH-TC; Cấp sổ, thẻ; Thanh tra - Kiểm tra, Văn phòng và cán bộ Ban Sổ - Thẻ làm ủy viên."},{"k":"p","t":"b) Định kỳ trước 15/3 hàng năm tổ chức hủy sổ BHXH, thẻ BHYT hỏng đã có thời gian lưu giữ trên 01 năm tại kho của Văn phòng; đồng thời lập biên bản hủy sổ BHXH, thẻ BHYT (Mẫu C10-TS)."}]},{"id":"qd595_46","no":46,"code":"Điều 46","title":"Điều 46. Cấp và quản lý sổ BHXH","shortTitle":"Cấp và quản lý sổ BHXH","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 4. CẤP VÀ QUẢN LÝ SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Cấp sổ BHXH lần đầu: Người tham gia BHXH, BHTN, BHTNLĐ, BNN được cơ quan BHXH cấp sổ BHXH."},{"k":"p","t":"2. Cấp lại sổ BHXH"},{"k":"p","t":"2.1. Cấp lại sổ BHXH (bìa và tờ rời) các trường hợp: mất, hỏng; gộp; thay đổi số sổ; họ, tên, chữ đệm; ngày, tháng, năm sinh; người đã hưởng BHXH một lần còn thời gian đóng BHTN chưa hưởng."},{"k":"p","t":"2.2. Cấp lại bìa sổ BHXH các trường hợp: sai giới tính, quốc tịch."},{"k":"p","t":"2.3. Cấp lại tờ rời sổ BHXH các trường hợp: mất, hỏng."},{"k":"p","t":"3. Ghi, xác nhận thời gian đóng BHXH, BHTN, BHTNLĐ, BNN trong sổ BHXH"},{"k":"p","t":"3.1. Nội dung ghi trong sổ BHXH phải đầy đủ theo từng giai đoạn tương ứng với mức đóng và điều kiện làm việc của người tham gia BHXH, BHTN, BHTNLĐ, BNN (kể cả thời gian người lao động không làm việc và không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng như nghỉ việc hưởng chế độ ốm đau, thai sản; nghỉ việc không hưởng tiền lương; tạm hoãn HĐLĐ)."},{"k":"p","t":"3.2. Đối với đơn vị nợ tiền đóng BHXH, BHTN, BHTNLĐ, BNN, nếu người lao động đủ điều kiện hưởng BHXH hoặc chấm dứt hợp đồng lao động, hợp đồng làm việc thì đơn vị có trách nhiệm đóng đủ BHXH, BHTN, BHTNLĐ, BNN, bao gồm cả tiền lãi chậm đóng theo quy định, cơ quan BHXH xác nhận sổ BHXH để kịp thời giải quyết chế độ BHXH, BHTN cho người lao động."},{"k":"p","t":"Trường hợp đơn vị chưa đóng đủ thì xác nhận sổ BHXH đến thời điểm đã đóng BHXH, BHTN, BHTNLĐ, BNN. Sau khi thu hồi được số tiền đơn vị còn nợ thì xác nhận bổ sung trên sổ BHXH."},{"k":"p","t":"3.3. Khi điều chỉnh giảm thời gian đóng hoặc giảm mức đóng BHXH, BHTN, BHTNLĐ, BNN đã ghi trong sổ BHXH, phải ghi cụ thể nội dung điều chỉnh, xác nhận luỹ kế hoặc tổng thời gian đã đóng BHXH, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"4. Một người có từ 2 sổ BHXH trở lên ghi thời gian đóng BHXH không trùng nhau thì cơ quan BHXH thu hồi tất cả các sổ BHXH, hoàn chỉnh lại cơ sở dữ liệu, in thời gian đóng, hưởng BHXH, BHTN của các sổ BHXH vào sổ mới."},{"k":"p","t":"5. Người lao động có thời gian công tác trước năm 1995 được tính là thời gian công tác liên tục (chưa được giải quyết trợ cấp thôi việc hoặc trợ cấp một lần, BHXH một lần) chưa được cấp sổ BHXH, khi cấp sổ BHXH nộp hồ sơ quy định tại Mục 1, 2 Phụ lục 01 kèm theo Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"6. Người lao động bảo lưu quá trình đóng BHXH trước ngày 01/01/2008 sau đó đăng ký tham gia tiếp, phải cung cấp thêm sổ BHXH."},{"k":"p","t":"7. Trường hợp đơn vị di chuyển trong địa bàn tỉnh, đơn vị thay đổi tên không thực hiện xác nhận sổ BHXH."},{"k":"p","t":"8. Thẩm quyền ký trên sổ BHXH"},{"k":"p","t":"8.1. Giám đốc BHXH tỉnh, huyện quét chữ ký trong phần mềm để in trên bìa và tờ rời sổ BHXH."},{"k":"p","t":"8.2. Giám đốc BHXH tỉnh, huyện chịu trách nhiệm về việc quản lý con dấu theo quy định hiện hành của BHXH Việt Nam."}]},{"id":"qd595_47","no":47,"code":"Điều 47","title":"Điều 47. Quản lý dữ liệu, giá trị sử dụng thẻ BHYT","shortTitle":"Quản lý dữ liệu, giá trị sử dụng thẻ BHYT","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 4. CẤP VÀ QUẢN LÝ SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Dữ liệu thẻ BHYT được quản lý tập trung và liên thông với dữ liệu thu. Các cơ sở KCB khi tiếp nhận thẻ BHYT của bệnh nhân đến khám bệnh thực hiện tra cứu thông tin về dữ liệu thẻ BHYT trên cổng tiếp nhận dữ liệu hệ thống thông tin giám định BHYT để xác định giá trị sử dụng của thẻ BHYT. Trên cơ sở kết quả tra cứu, cơ sở KCB BHYT thực hiện:"},{"k":"p","t":"- Thanh toán chi phí KCB BHYT đối với các trường hợp người tham gia BHYT đang đóng BHYT và thẻ BHYT còn giá trị sử dụng."},{"k":"p","t":"- Không thanh toán chi phí KCB BHYT đối với các trường hợp người tham gia đã báo giảm đóng BHYT nhưng tại thời điểm KCB thẻ BHYT vẫn còn giá trị sử dụng."},{"k":"p","t":"2. Thẻ BHYT có giá trị sử dụng tương ứng số tiền đóng BHYT, thời điểm thẻ BHYT có giá trị sử dụng như sau:"},{"k":"p","t":"2.1. Đối tượng quy định tại Khoản 1, 2 và 3 Điều 17: thẻ BHYT có giá trị kể từ ngày đóng BHYT, trừ một số đối tượng thẻ BHYT có giá trị sử dụng như sau:"},{"k":"p","t":"a) Đối với người hưởng trợ cấp thất nghiệp, thẻ BHYT có giá trị sử dụng kể từ ngày hưởng trợ cấp thất nghiệp ghi trong quyết định của cơ quan nhà nước cấp có thẩm quyền."},{"k":"p","t":"b) Đối với người dân tộc thiểu số đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn; người đang sinh sống tại vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn; người đang sinh sống tại xã đảo, huyện đảo: Thẻ BHYT giá trị sử dụng từ ngày 01/01 đến ngày 31/12 của năm đó."},{"k":"p","t":"c) Đối với người thuộc hộ gia đình nghèo, người thuộc hộ gia đình cận nghèo được ngân sách nhà nước hỗ trợ 100% mức đóng: Thẻ BHYT có giá trị sử dụng từ ngày 01/01 đến ngày 31/12 của năm đó. Trường hợp cơ quan Bảo hiểm xã hội nhận được danh sách đối tượng tham gia BHYT kèm theo Quyết định phê duyệt danh sách người thuộc hộ gia đình nghèo, người thuộc hộ gia đình cận nghèo của cơ quan nhà nước có thẩm quyền sau ngày 01/01 thì thời hạn sử dụng ghi trên thẻ BHYT từ ngày Quyết định này có hiệu lực."},{"k":"p","t":"2.2. Đối tượng quy định tại Khoản 4 và 5 Điều 17 có thời gian tham gia BHYT liên tục, thẻ BHYT có giá trị sử dụng từ ngày đóng BHYT. Trường hợp tham gia BHYT lần đầu hoặc tham gia không liên tục từ 3 tháng trở lên trong năm tài chính thì thẻ BHYT có giá trị sử dụng sau 30 ngày kể từ ngày người tham gia nộp tiền đóng BHYT."},{"k":"p","t":"2.3. Đối tượng quy định tại Khoản 1 Điều 17 chậm đóng BHYT từ 30 ngày trở lên, thẻ BHYT hết giá trị sử dụng. Khi người lao động phát sinh chi phí KCB trong thời hạn thẻ BHYT hết giá trị sử dụng, cơ quan BHXH thực hiện thanh toán trực tiếp chi phí khám chữa bệnh theo quy định sau khi đơn vị đã đóng đủ số tiền chậm đóng BHYT."},{"k":"p","t":"3. Người tham gia BHYT được thay đổi cơ sở đăng ký khám chữa bệnh ban đầu vào tháng đầu quý."},{"k":"p","t":"4. Người lao động hưởng chế độ ốm đau, thai sản tiếp tục sử dụng thẻ BHYT đã cấp, không thực hiện đổi thẻ BHYT. Đối với người lao động nghỉ không lương mà trong thời gian đó đơn vị lập hồ sơ nghỉ hưởng chế độ thai sản thì ghi giá trị sử dụng từ tháng nghỉ thai sản đến hết giá trị sử dụng của thẻ BHYT đã cấp."},{"k":"p","t":"Ví dụ 18: Bà Nguyễn Thị A làm việc và đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN tại Công ty M từ tháng 7/2016. Tháng 02/2017, Bà A xin nghỉ không lương từ tháng 3/2017, được đơn vị đồng ý và lập hồ sơ báo giảm Bà A nghỉ không lương với cơ quan BHXH từ tháng 3/2017, cơ quan BHXH giảm giá trị sử dụng của thẻ BHYT từ ngày 01/3/2017. Tháng 5/2017, đơn vị lập hồ sơ báo giảm Bà A nghỉ việc hưởng chế độ thai sản từ tháng ngày 01/5/2017, cơ quan BHXH ghi giá sử dụng từ ngày 01/5/2017 đến hết thời hạn của thẻ BHYT đã cấp."},{"k":"p","t":"5. Người lao động nghỉ ốm đau dài ngày hoặc nghỉ hưởng chế độ hưu trí, thẻ BHYT đã cấp tiếp tục được sử dụng đến hết tháng đơn vị có báo giảm. Cơ quan BHXH căn cứ danh sách báo giảm để lập Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) theo đối tượng ốm đau dài ngày hoặc đối tượng hưởng lương hưu, trợ cấp BHXH hàng tháng. Thẻ BHYT mới có giá trị sử dụng từ ngày đầu của tháng kế tiếp của tháng báo giảm."}]},{"id":"qd595_48","no":48,"code":"Điều 48","title":"Điều 48. Hệ thống chứng từ, sổ, mẫu biểu","shortTitle":"Hệ thống chứng từ, sổ, mẫu biểu","chuong":"Chương VII — HỆ THỐNG CHỨNG TỪ, MẪU BIỂU VÀ CHẾ ĐỘ THÔNG TIN, BÁO CÁO","muc":"","level":1,"content":[{"k":"p","t":"Hệ thống chứng từ, sổ, mẫu biểu theo Phụ lục đính kèm."}]},{"id":"qd595_49","no":49,"code":"Điều 49","title":"Điều 49. Chế độ thông tin báo cáo","shortTitle":"Chế độ thông tin báo cáo","chuong":"Chương VII — HỆ THỐNG CHỨNG TỪ, MẪU BIỂU VÀ CHẾ ĐỘ THÔNG TIN, BÁO CÁO","muc":"","level":1,"content":[{"k":"p","t":"1. BHXH tỉnh, huyện: Mở sổ theo dõi và lập báo cáo về thu cấp sổ BHXH, thẻ BHYT theo Mẫu quy định tại Văn bản này."},{"k":"p","t":"2. Thời hạn lập và gửi báo cáo"},{"k":"p","t":"1.1. BHXH huyện gửi BHXH tỉnh"},{"k":"p","t":"- Báo cáo tháng: trước ngày 03 của tháng sau."},{"k":"p","t":"- Báo cáo quý: trước ngày 10 tháng đầu quý sau."},{"k":"p","t":"- Báo cáo năm: trước ngày 10/01 năm sau."},{"k":"p","t":"1.2. BHXH tỉnh gửi BHXH Việt Nam"},{"k":"p","t":"- Báo cáo tháng: trước ngày 05 tháng sau."},{"k":"p","t":"- Báo cáo quý: trước ngày 25 tháng đầu quý sau."},{"k":"p","t":"- Báo cáo năm: trước ngày 25/01 năm sau."}]},{"id":"qd595_50","no":50,"code":"Điều 50","title":"Điều 50. Trách nhiệm của người tham gia, đơn vị, Đại lý thu","shortTitle":"Trách nhiệm của người tham gia, đơn vị, Đại lý thu","chuong":"Chương VIII — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của người tham gia"},{"k":"p","t":"1.1. Lập, kê khai đầy đủ, chính xác các thông tin tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN, nộp đầy đủ hồ sơ và thực hiện đúng hướng dẫn tại Văn bản này."},{"k":"p","t":"1.2. Chịu trách nhiệm trước pháp luật về nội dung kê khai trong hồ sơ tham gia BHXH, BHYT, BHTN; các hồ sơ, tài liệu cung cấp cho đơn vị và cơ quan BHXH."},{"k":"p","t":"1.3. Tự bảo quản sổ BHXH, thẻ BHYT."},{"k":"p","t":"2. Trách nhiệm của đơn vị, Đại lý thu"},{"k":"p","t":"2.1. Đơn vị"},{"k":"p","t":"a) Thực hiện lập, nộp hồ sơ; trích nộp tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN theo đúng quy trình, quy định tại Văn bản này và quy định của pháp luật về BHXH, BHYT, BHTN, BHTNLĐ, BNN. Trường hợp đơn vị lập danh sách báo giảm chậm, đơn vị phải đóng số tiền BHYT của các tháng báo giảm chậm và thẻ BHYT có giá trị sử dụng đến hết các tháng đó."},{"k":"p","t":"b) Chịu trách nhiệm trước pháp luật về việc lập hồ sơ; lưu trữ hồ sơ của người tham gia và đơn vị."},{"k":"p","t":"c) Cung cấp đầy đủ, kịp thời thông tin, hồ sơ, tài liệu, dữ liệu liên quan đến việc đóng, hưởng BHXH, BHYT, BHTN, BHTNLĐ, BNN khi có thay đổi hoặc theo yêu cầu của cơ quan quản lý có thẩm quyền, cơ quan BHXH."},{"k":"p","t":"d) Phổ biến pháp luật về BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động trong đơn vị."},{"k":"p","t":"đ) Phối hợp với cơ quan BHXH thực hiện các quy định về pháp luật BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"2.2. Đại lý thu/nhà trường"},{"k":"p","t":"a) Thực hiện đúng hướng dẫn tại Văn bản này; bảo quản, sử dụng biên lai thu tiền do cơ quan BHXH cấp, đối chiếu biên lai thu tiền và số tiền đã thu theo quy định."},{"k":"p","t":"b) Thực hiện tuyên truyền, vận động, hướng dẫn người tham gia về mức đóng, phương thức đóng, địa điểm đóng, quyền lợi về BHXH, BHYT theo quy định."},{"k":"p","t":"c) Chịu trách nhiệm trước pháp luật về lập hồ sơ, thời hạn nộp hồ sơ và số tiền đã thu của người tham gia theo quy định."}]},{"id":"qd595_51","no":51,"code":"Điều 51","title":"Điều 51. Trách nhiệm của cơ quan BHXH","shortTitle":"Trách nhiệm của cơ quan BHXH","chuong":"Chương VIII — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1.BHXH huyện"},{"k":"p","t":"1.1. Tổ chức thực hiện thu, cấp sổ BHXH, thẻ BHYT đối với các đối tượng được phân cấp và hướng dẫn tại Văn bản này."},{"k":"p","t":"1.2. Tổ chức thực hiện kiểm tra các nội dung do người tham gia, đơn vị đã kê khai, kiến nghị xử lý theo quy định của pháp luật đối với các trường hợp kê khai không đúng."},{"k":"p","t":"1.3. Tổng hợp, báo cáo thu BHXH, BHYT, BHTN, BHTNLĐ, BNN và tiền lãi chậm đóng; cấp sổ BHXH, thẻ BHYT hằng quý, năm theo quy định."},{"k":"p","t":"1.4. Lưu trữ hồ sơ tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN; hồ sơ truy thu BHXH, BHYT, BHTN, BHTNLĐ, BNN theo hướng dẫn tại Văn bản này và quy định của pháp luật."},{"k":"p","t":"1.5. Cung cấp chính xác, đầy đủ, kịp thời thông tin, tài liệu liên quan đến việc đóng, hưởng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo yêu cầu của cơ quan quản lý có thẩm quyền."},{"k":"p","t":"1.6. Phân công, giao nhiệm vụ cho cán bộ , công chức, viên chức và người lao động theo từng lĩnh vực trong Tổ nghiệp vụ để thực hiện đúng các nội dung của Tổ nghiệp vụ quy định tại Văn bản này để thực hiện quy trình thu; cấp sổ BHXH, thẻ BHYT. Cán bộ, công chức, viên chức và người lao động chịu trách nhiệm trước Giám đốc, trước pháp luật về những nội dung được giao kể cả khi nghỉ chế độ hoặc chuyển công tác."},{"k":"p","t":"1.7. Hướng dẫn các cơ sở KCB BHYT thực hiện việc tra cứu thông tin về thẻ BHYT trên Cổng tiếp nhận dữ liệu Hệ thống thông tin Giám định BHYT."},{"k":"p","t":"2. BHXH tỉnh"},{"k":"p","t":"2.1. Tổ chức thực hiện thu; cấp sổ BHXH, thẻ BHYT đối với các đối tượng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN do BHXH tỉnh trực tiếp thu theo quy định."},{"k":"p","t":"2.2. Phân công, phân cấp theo hướng dẫn tại Văn bản này đối với các phòng thuộc BHXH tỉnh, tổ thuộc BHXH huyện."},{"k":"p","t":"2.3. Tổng hợp, báo cáo thu BHXH, BHYT, BHTN, BHTNLĐ, BNN và tiền lãi chậm đóng; cấp sổ BHXH, thẻ BHYT hằng quý, năm theo quy định."},{"k":"p","t":"2.4. Hướng dẫn, kiểm tra và đôn đốc công tác thu; cấp sổ BHXH, thẻ BHYT đối với BHXH huyện."},{"k":"p","t":"2.5. Thẩm định số liệu thu BHXH, BHYT, BHTN, BHTNLĐ, BNN đối với BHXH huyện theo định kỳ quý, năm, lập Biên bản (Mẫu C03-TS)."},{"k":"p","t":"2.6. Quản lý chặt chẽ việc tiếp nhận và sử dụng phôi bìa sổ BHXH và thẻ BHYT theo quy định tại Văn bản này."},{"k":"p","t":"2.7. Các Phòng: KH-TC, Chế độ BHXH, Giám định BHYT, Tiếp nhận và Trả kết quả thủ tục hành chính, CNTT, Tổ chức cán bộ và Văn phòng phối hợp với phòng Quản lý thu, phòng Cấp sổ, thẻ lập kế hoạch thu; cấp sổ BHXH, thẻ BHYT; quản lý phần mềm; xử lý các nghiệp vụ liên quan và quản lý hồ sơ."},{"k":"p","t":"2.8. Thực hiện quy trình khai thác, sử dụng cơ sở dữ liệu đúng chức năng, nhiệm vụ và quy trình thu; cấp sổ BHXH, thẻ BHYT đối với BHXH tỉnh, BHXH huyện theo quy định."},{"k":"p","t":"2.9. Cung cấp chính xác, đầy đủ, kịp thời thông tin, tài liệu liên quan đến việc đóng, hưởng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo yêu cầu của cơ quan quản lý có thẩm quyền."},{"k":"p","t":"2.10. Phân công nhiệm vụ, quy định mối quan hệ phối hợp của các Phòng nghiệp vụ và cán bộ, công chức, viên chức và người lao động để thực hiện quy trình thu; cấp sổ BHXH, thẻ BHYT. Không được phân công, phân cấp trái với hướng dẫn này. Cán bộ, công chức, viên chức và người lao động chịu trách nhiệm trước Giám đốc, trước pháp luật về những nội dung được giao kể cả khi nghỉ chế độ hoặc chuyển công tác."},{"k":"p","t":"2.11. Hướng dẫn các cơ sở KCB BHYT thực hiện việc tra cứu thông tin về thẻ BHYT trên Cổng tiếp nhận dữ liệu Hệ thống thông tin Giám định BHYT."},{"k":"p","t":"3. BHXH Việt Nam"},{"k":"p","t":"3.1. Ban Thu, Ban Sổ - Thẻ"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn, kiểm tra giám sát, đôn đốc BHXH tỉnh thực hiện thu; cấp sổ BHXH, thẻ BHYT theo hướng dẫn tại Văn bản này; kịp thời tháo gỡ khó khăn; vướng mắc trong quá trình thực hiện."},{"k":"p","t":"b) Xây dựng kế hoạch kiểm tra về việc chấp hành quy định tại Văn bản này và tổ chức thực hiện sau khi được phê duyệt."},{"k":"p","t":"c) Tổ chức thẩm định số liệu thu BHXH, BHYT, BHTN, BHTNLĐ, BNN; tình hình quản lý, sử dụng phôi sổ BHXH, phôi thẻ BHYT đối với BHXH tỉnh theo quy định."},{"k":"p","t":"d) Kiểm tra, khảo sát, đánh giá tình hình thực hiện quy trình thu; cấp sổ BHXH, thẻ BHYT của BHXH tỉnh."},{"k":"p","t":"3.2. Trung tâm CNTT"},{"k":"p","t":"a) Xây dựng phần mềm quản lý đáp ứng đầy đủ các quy định tại Văn bản này; hướng dẫn, triển khai và kịp thời giải quyết vướng mắc trong quá trình sử dụng phần mềm."},{"k":"p","t":"b) Bảo mật, phân cấp, phân quyền nhằm quản lý chặt chẽ dữ liệu trong phần mềm. Theo quy định cán bộ nghiệp vụ đã ghi dữ liệu thì không tự ý sửa dữ liệu, trường hợp có sửa dữ liệu chỉ phân quyền cho Trưởng phòng nghiệp vụ thực hiện sau khi có ý kiến của Giám đốc BHXH bằng văn bản nhưng chỉ thực hiện trong năm tài chính."},{"k":"p","t":"c) Tổ chức quản lý, vận hành phần mềm, cơ sở hạ tầng CNTT đảm bảo kết nối, chia sẻ thông tin, tiếp nhận dữ liệu liên quan đến đơn vị, doanh nghiệp và người dân."},{"k":"p","t":"3.3. Vụ Thanh tra - Kiểm tra: Phối hợp các đơn vị tổ chức triển khai đầy đủ các quy định tại Văn bản này."},{"k":"p","t":"3.4. Các Ban, Vụ: Tài chính - Kế toán, Kế hoạch và Đầu tư, Thực hiện chính sách BHXH, Thực hiện chính sách BHYT, Pháp chế, Văn phòng và Trung tâm CNTT phối hợp với Ban Thu, Ban Sổ - Thẻ:"},{"k":"p","t":"a) Lập kế hoạch thu; cấp sổ BHXH, thẻ BHYT; quản lý phần mềm và xử lý các nghiệp vụ liên quan."},{"k":"p","t":"b) Hướng dẫn nghiệp vụ thu; cấp sổ BHXH, thẻ BHYT; xây dựng, điều chỉnh kế hoạch thu; chế độ thông tin, báo cáo đối với BHXH Bộ Quốc phòng, BHXH Công an nhân dân đảm bảo đồng bộ với Văn bản này."},{"k":"p","t":"3.5. Trong thời hạn 15 ngày đầu của tháng 01 hằng năm, Vụ Quản lý đầu tư quỹ có trách nhiệm thông báo mức lãi suất bình quân theo tháng trên cơ sở mức lãi suất bình quân quy định tại Khoản 5 Điều 37 gửi BHXH tỉnh, BHXH Bộ Quốc phòng, BHXH Công an nhân dân để thống nhất thực hiện."},{"k":"p","t":"Trong quá trình tổ chức thực hiện nếu có vướng mắc, BHXH tỉnh báo cáo BHXH Việt Nam xem xét, giải quyết./."}]}],"refs":{},"details":{},"summaries":{"qd595_3":{"tldr":"Trưởng Ban Thu, Trưởng Ban Sổ - Thẻ, Chánh Văn phòng, Thủ trưởng các đơn vị trực thuộc BHXH Việt Nam và Giám đốc BHXH các tỉnh, thành phố trực thuộc Trung ương chịu trách nhiệm thi hành Quyết định này.","points":["Quy trình kèm theo ban hành theo Quyết định số 595/QĐ-BHXH ngày 14/4/2017 của Tổng Giám đốc BHXH Việt Nam.","Người ký: Tổng Giám đốc Nguyễn Thị Minh."]},"qd595_1-1":{"tldr":"Văn bản hướng dẫn về hồ sơ, quy trình nghiệp vụ, quyền và trách nhiệm của cá nhân, cơ quan, đơn vị và cơ quan BHXH trong thực hiện thu BHXH, BHYT, BHTN, BHTNLĐ-BNN; cấp, ghi, quản lý và sử dụng sổ BHXH, thẻ BHYT.","points":["Việc quản lý thu và cấp sổ BHXH, thẻ BHYT trong lực lượng vũ trang do Bộ Quốc phòng, Bộ Công an hướng dẫn, phù hợp đặc thù từng Bộ và đồng bộ với Văn bản này để thực hiện thống nhất trong toàn quốc."]},"qd595_2-1":{"tldr":"Giải thích các từ viết tắt và từ ngữ sử dụng trong Văn bản.","points":["Truy thu: thu khoản phải đóng của trường hợp trốn đóng, đóng không đủ số người thuộc diện bắt buộc, đóng không đủ số tiền, chiếm dụng tiền đóng, hưởng BHXH, BHYT, BHTN, BHTNLĐ-BNN.","Hoàn trả: chuyển trả lại số tiền được xác định không phải tiền đóng hoặc đóng thừa khi ngừng giao dịch; đóng trùng cho cơ quan, đơn vị, cá nhân đã nộp.","Nợ BHXH, BHYT, BHTN, BHTNLĐ-BNN: tiền phải đóng nhưng đơn vị chưa đóng, bao gồm cả tiền lãi chậm đóng.","Mã số BHXH: số định danh cá nhân duy nhất của người tham gia do cơ quan BHXH cấp để ghi trên sổ BHXH, thẻ BHYT.","Khi nộp \"bản sao\" phải kèm bản chính để cơ quan BHXH kiểm tra, đối chiếu và trả lại."]},"qd595_3-1":{"tldr":"Phân cấp quản lý giữa BHXH huyện, BHXH tỉnh và BHXH Việt Nam đối với việc thu; cấp, ghi, xác nhận sổ BHXH; cấp thẻ BHYT.","points":["BHXH huyện thu tiền đóng của đơn vị đóng trụ sở trên địa bàn huyện theo phân cấp của BHXH tỉnh; thu BHXH tự nguyện, BHYT của người cư trú trên địa bàn huyện.","BHXH tỉnh thu tiền đóng của các đơn vị chưa phân cấp cho BHXH huyện.","BHXH Việt Nam thu tiền ngân sách trung ương đóng, hỗ trợ mức đóng BHYT, hỗ trợ quỹ BHTN và tiền ngân sách trung ương đóng BHXH cho người có thời gian công tác trước năm 1995.","BHXH huyện cấp mới, cấp lại, đổi thẻ BHYT cho người do BHXH huyện thu; BHXH tỉnh cấp cho người do tỉnh trực tiếp thu và người hưởng trợ cấp thất nghiệp trong tỉnh.","Từ năm 2019 trở đi BHXH tỉnh phân cấp thu cho BHXH huyện tối thiểu 90% tổng số đơn vị quản lý."]},"qd595_4":{"tldr":"Đối tượng tham gia BHXH bắt buộc theo Điều 2 Luật BHXH, gồm người lao động là công dân Việt Nam, người lao động nước ngoài, người sử dụng lao động, và các trường hợp không thuộc diện bắt buộc.","points":["Người làm việc theo HĐLĐ không xác định thời hạn, xác định thời hạn, theo mùa vụ hoặc công việc nhất định có thời hạn từ đủ 03 tháng đến dưới 12 tháng.","Người làm việc theo HĐLĐ có thời hạn từ đủ 01 tháng đến dưới 03 tháng (thực hiện từ ngày 01/01/2018).","Cán bộ, công chức, viên chức; người quản lý doanh nghiệp, người quản lý điều hành hợp tác xã có hưởng tiền lương; người hoạt động không chuyên trách ở xã, phường, thị trấn.","Người lao động là công dân nước ngoài có giấy phép lao động/chứng chỉ hành nghề/giấy phép hành nghề (thực hiện từ ngày 01/01/2018).","Người giúp việc gia đình và người đang hưởng lương hưu hằng tháng, trợ cấp BHXH hằng tháng, trợ cấp mất sức lao động hằng tháng thì không thuộc đối tượng tham gia BHXH bắt buộc."]},"qd595_5":{"tldr":"Mức đóng và trách nhiệm đóng BHXH bắt buộc theo Điều 85, Điều 86 Luật BHXH của người lao động và đơn vị.","points":["Người lao động hằng tháng đóng 8% mức tiền lương tháng vào quỹ hưu trí và tử tuất.","Người hoạt động không chuyên trách ở xã, phường, thị trấn đóng 8% mức lương cơ sở vào quỹ hưu trí và tử tuất.","Người đi làm việc ở nước ngoài đóng 22% mức tiền lương tháng đóng BHXH trước khi đi (nếu đã có quá trình tham gia), hoặc 22% của 02 lần mức lương cơ sở (nếu chưa tham gia hoặc đã hưởng BHXH một lần).","Đơn vị hằng tháng đóng 3% vào quỹ ốm đau và thai sản, 14% vào quỹ hưu trí và tử tuất trên quỹ tiền lương đóng BHXH.","Đơn vị đóng 14% mức lương cơ sở vào quỹ hưu trí và tử tuất cho người hoạt động không chuyên trách ở xã, phường, thị trấn."]},"qd595_6":{"tldr":"Tiền lương tháng đóng BHXH bắt buộc theo Điều 89 Luật BHXH, gồm tiền lương do Nhà nước quy định và tiền lương do đơn vị quyết định.","points":["Tiền lương do Nhà nước quy định: tiền lương theo ngạch, bậc, cấp bậc quân hàm và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung, phụ cấp thâm niên nghề (nếu có), tính trên mức lương cơ sở.","Từ 01/01/2016 đến 31/12/2017: tiền lương đóng là mức lương và phụ cấp lương theo Thông tư 47/2015/TT-BLĐTBXH; từ 01/01/2018 trở đi cộng thêm các khoản bổ sung khác.","Tiền lương đóng BHXH bắt buộc không bao gồm tiền thưởng, tiền ăn giữa ca, hỗ trợ xăng xe, điện thoại, đi lại, tiền nhà ở, giữ trẻ, nuôi con nhỏ và các khoản hỗ trợ, trợ cấp khác ghi thành mục riêng trong HĐLĐ.","Mức tiền lương đóng không thấp hơn mức lương tối thiểu vùng; cao hơn ít nhất 7% với công việc qua đào tạo, học nghề; cao hơn ít nhất 5% với công việc nặng nhọc, độc hại, nguy hiểm và 7% với đặc biệt nặng nhọc, độc hại, nguy hiểm.","Mức tiền lương tháng đóng BHXH bắt buộc cao hơn 20 tháng lương cơ sở thì bằng 20 tháng lương cơ sở."]},"qd595_7":{"tldr":"Phương thức đóng BHXH bắt buộc theo Điều 85, Điều 86 Luật BHXH: đóng hằng tháng, đóng 03 hoặc 06 tháng một lần, đóng theo địa bàn và các trường hợp đặc thù.","points":["Đóng hằng tháng: chậm nhất đến ngày cuối cùng của tháng, đơn vị trích tiền đóng chuyển vào tài khoản chuyên thu của cơ quan BHXH.","Đơn vị trong lĩnh vực nông, lâm, ngư, diêm nghiệp trả lương theo sản phẩm, theo khoán được đóng hằng tháng hoặc 03 tháng, 06 tháng một lần; chậm nhất đến ngày cuối cùng của phương thức đóng phải chuyển đủ tiền.","Đơn vị đóng trụ sở chính ở tỉnh nào thì đăng ký đóng BHXH tại tỉnh đó; chi nhánh hoạt động tại địa bàn nào thì đóng tại địa bàn đó.","Người đi làm việc ở nước ngoài đóng 03 tháng, 06 tháng, 12 tháng một lần hoặc đóng trước một lần theo thời hạn hợp đồng.","Trường hợp đóng cho thời gian còn thiếu không quá 06 tháng: người lao động đóng một lần thông qua đơn vị trước khi nghỉ việc; người đang bảo lưu hoặc thân nhân đóng một lần tại BHXH huyện nơi cư trú."]},"qd595_8":{"tldr":"Đối tượng tham gia BHXH tự nguyện là công dân Việt Nam từ đủ 15 tuổi trở lên và không thuộc đối tượng tham gia BHXH bắt buộc.","points":["Người làm việc theo HĐLĐ có thời hạn dưới 03 tháng trước 01/01/2018; dưới 01 tháng từ 01/01/2018 trở đi.","Người hoạt động không chuyên trách ở thôn, ấp, bản, sóc, làng, tổ dân phố, khu, khu phố; người giúp việc gia đình.","Người tham gia hoạt động sản xuất, kinh doanh, dịch vụ không hưởng tiền lương; xã viên không hưởng tiền lương, tiền công trong hợp tác xã, liên hiệp hợp tác xã.","Người nông dân, người lao động tự tạo việc làm; người đã đủ tuổi đời nhưng chưa đủ thời gian đóng để hưởng lương hưu; người tham gia khác."]},"qd595_9":{"tldr":"Phương thức đóng BHXH tự nguyện theo Điều 87 Luật BHXH: người tham gia được chọn đóng hằng tháng, 03/06/12 tháng một lần, một lần cho nhiều năm về sau hoặc một lần cho những năm còn thiếu.","points":["Đóng một lần cho nhiều năm về sau nhưng không quá 5 năm một lần.","Đóng một lần cho những năm còn thiếu với người đã đủ tuổi hưởng lương hưu nhưng thời gian đóng còn thiếu không quá 10 năm (120 tháng) thì được đóng cho đủ 20 năm để hưởng lương hưu.","Người đã đủ tuổi nghỉ hưu mà thời gian đóng còn thiếu trên 10 năm thì tiếp tục đóng theo các phương thức khác đến khi còn thiếu không quá 10 năm thì được đóng một lần cho những năm còn thiếu.","Người đang tham gia được thay đổi phương thức đóng khi thực hiện xong phương thức đã chọn trước đó.","Người đã đủ điều kiện đóng một lần cho những năm còn thiếu (nam đủ 60 tuổi, nữ đủ 55 tuổi và thời gian đóng còn thiếu tối đa 10 năm) được đóng ngay mà không phải chờ thực hiện xong phương thức đã chọn."]},"qd595_10":{"tldr":"Mức đóng BHXH tự nguyện theo Điều 87 Luật BHXH bằng 22% mức thu nhập tháng do người tham gia lựa chọn (Mdt = 22% x Mtnt).","points":["Mức thu nhập tháng lựa chọn thấp nhất bằng mức chuẩn hộ nghèo khu vực nông thôn, cao nhất bằng 20 lần mức lương cơ sở (Mtnt = CN + m x 50.000 đồng/tháng).","Mức đóng 03/06/12 tháng một lần bằng mức đóng hằng tháng nhân với 3, 6 hoặc 12.","Mức đóng một lần cho nhiều năm về sau (số năm từ 2 đến 5) được chiết khấu theo lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề.","Mức đóng một lần cho những năm còn thiếu (số tháng từ 1 đến 120) áp dụng lãi gộp bằng lãi suất đầu tư quỹ BHXH bình quân tháng.","Trường hợp dừng BHXH tự nguyện chuyển sang bắt buộc, hưởng BHXH một lần, hoặc bị chết/Tòa án tuyên bố đã chết thì được hoàn trả một phần số tiền đã đóng, không bao gồm tiền hỗ trợ đóng của Nhà nước.","Người đang tham gia được thay đổi mức thu nhập tháng làm căn cứ đóng khi thực hiện xong phương thức đóng đã chọn trước đó."]},"qd595_11":{"tldr":"Thời điểm đóng BHXH tự nguyện theo Điều 87 Luật BHXH tương ứng với từng phương thức đóng; quá thời điểm mà không đóng thì coi là tạm dừng đóng.","points":["Trong tháng với phương thức đóng hằng tháng; trong 03 tháng với 03 tháng một lần; trong 04 tháng đầu với 06 tháng một lần; trong 07 tháng đầu với 12 tháng một lần.","Đóng một lần cho nhiều năm về sau hoặc cho những năm còn thiếu được thực hiện tại thời điểm đăng ký phương thức đóng và mức thu nhập tháng làm căn cứ đóng.","Quá thời điểm đóng mà không đóng thì coi là tạm dừng đóng BHXH tự nguyện; nếu tiếp tục đóng phải đăng ký lại phương thức và mức thu nhập.","Trường hợp đóng bù cho số tháng chậm đóng thì áp dụng lãi gộp bằng lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề (T3 = Mđ x (1+r)^t)."]},"qd595_12":{"tldr":"Hỗ trợ tiền đóng BHXH tự nguyện theo Điều 87 Luật BHXH: Nhà nước hỗ trợ theo tỷ lệ phần trăm trên mức đóng hằng tháng theo mức chuẩn hộ nghèo khu vực nông thôn.","points":["Hỗ trợ 30% với người thuộc hộ nghèo, 25% với hộ cận nghèo, 10% với các đối tượng khác (Mht = k x 22% x CN).","Thời gian hỗ trợ không quá 10 năm (120 tháng).","Định kỳ 03/06/12 tháng cơ quan BHXH tổng hợp gửi cơ quan tài chính; cơ quan tài chính chuyển kinh phí vào quỹ BHXH mỗi quý một lần, chậm nhất đến ngày 31/12 hằng năm phải xong việc chuyển kinh phí của năm đó.","Người hưởng BHXH một lần và người tham gia được hoàn trả một phần phải hoàn trả lại số tiền Nhà nước đã hỗ trợ cho ngân sách (trừ người mắc bệnh nguy hiểm đến tính mạng theo quy định).","Việc hỗ trợ tiền đóng được thực hiện từ ngày 01/01/2018; không hỗ trợ đối với thời gian đóng trước ngày 01/01/2018, trừ trường hợp đóng một lần cho những năm còn thiếu."]},"qd595_13":{"tldr":"Đối tượng tham gia BHTN theo Điều 43 Luật Việc làm gồm người lao động làm việc theo HĐLĐ hoặc HĐLV và đơn vị tham gia BHTN.","points":["Người lao động tham gia BHTN khi làm việc theo HĐLĐ/HĐLV không xác định thời hạn, xác định thời hạn, hoặc theo mùa vụ/công việc nhất định có thời hạn từ đủ 3 tháng đến dưới 12 tháng.","Người đang hưởng lương hưu, trợ cấp mất sức lao động hằng tháng; người giúp việc gia đình không thuộc đối tượng tham gia BHTN.","Đơn vị tham gia BHTN là những đơn vị quy định tại Khoản 3 Điều 4."]},"qd595_15":{"tldr":"Tiền lương tháng đóng BHTN theo Điều 58 Luật Việc làm căn cứ theo tiền lương đóng BHXH bắt buộc.","points":["Người lao động theo chế độ tiền lương do Nhà nước quy định: tiền lương đóng BHTN là tiền lương làm căn cứ đóng BHXH bắt buộc tại Khoản 1 và Khoản 3 Điều 6.","Người lao động theo chế độ tiền lương do đơn vị quyết định: nếu tiền lương cao hơn 20 tháng lương tối thiểu vùng thì mức đóng BHTN bằng 20 tháng lương tối thiểu vùng."]},"qd595_17":{"tldr":"Đối tượng tham gia BHYT theo Điều 12 Luật BHYT được chia thành 5 nhóm theo trách nhiệm đóng: do người lao động và đơn vị đóng; do tổ chức BHXH đóng; do ngân sách nhà nước đóng; được ngân sách hỗ trợ mức đóng; tham gia theo hộ gia đình.","points":["Nhóm do người lao động và đơn vị đóng: người làm việc theo HĐLĐ không xác định thời hạn hoặc từ đủ 3 tháng trở lên, cán bộ, công chức, viên chức, người hoạt động không chuyên trách ở xã, phường, thị trấn.","Nhóm do tổ chức BHXH đóng: người hưởng lương hưu, trợ cấp mất sức lao động hằng tháng, người hưởng trợ cấp thất nghiệp, người nghỉ việc hưởng chế độ thai sản, người từ đủ 80 tuổi hưởng trợ cấp tuất hằng tháng.","Nhóm do ngân sách nhà nước đóng: người có công với cách mạng, cựu chiến binh, trẻ em dưới 6 tuổi, người thuộc hộ nghèo, người dân tộc thiểu số vùng khó khăn, thân nhân người có công và nhiều đối tượng khác.","Nhóm được ngân sách hỗ trợ mức đóng: người thuộc hộ cận nghèo; học sinh, sinh viên; người thuộc hộ làm nông, lâm, ngư, diêm nghiệp có mức sống trung bình.","Nhóm tham gia theo hộ gia đình: toàn bộ người có tên trong sổ hộ khẩu hoặc sổ tạm trú, trừ các đối tượng đã thuộc nhóm khác và người khai báo tạm vắng.","Người đồng thời thuộc nhiều đối tượng thì đóng theo đối tượng đầu tiên được xác định theo thứ tự quy định tại Điều này."]},"qd595_18":{"tldr":"Mức đóng, trách nhiệm đóng BHYT theo Điều 13 Luật BHYT; mức đóng hằng tháng cơ bản bằng 4,5% căn cứ theo từng nhóm đối tượng.","points":["Nhóm do người lao động và đơn vị đóng: 4,5% mức tiền lương tháng, trong đó người sử dụng lao động đóng 3%, người lao động đóng 1,5%.","Người hoạt động không chuyên trách ở xã, phường, thị trấn: 4,5% mức lương cơ sở, UBND xã đóng 3%, người lao động đóng 1,5%.","Người hưởng lương hưu, trợ cấp mất sức lao động: 4,5% tiền lương hưu, trợ cấp mất sức lao động do cơ quan BHXH đóng; người hưởng trợ cấp thất nghiệp: 4,5% tiền trợ cấp thất nghiệp do cơ quan BHXH đóng.","Nhóm do ngân sách nhà nước đóng: 4,5% mức lương cơ sở do ngân sách nhà nước đóng.","Nhóm hộ cận nghèo, hộ làm nông/lâm/ngư/diêm nghiệp có mức sống trung bình: 4,5% mức lương cơ sở do đối tượng tự đóng và được ngân sách hỗ trợ tối thiểu 70% (hộ cận nghèo tại Điểm 4.1) hoặc tối thiểu 30%.","Nhóm hộ gia đình: 4,5% mức lương cơ sở; người thứ hai, thứ ba, thứ tư đóng lần lượt 70%, 60%, 50% và từ người thứ năm trở đi đóng 40% mức đóng của người thứ nhất."]},"qd595_19":{"tldr":"Phương thức đóng BHYT theo Điều 15 Luật BHYT, quy định cụ thể cho từng nhóm đối tượng và cách xác định số tiền khi Nhà nước điều chỉnh mức đóng, mức lương cơ sở.","points":["Nhóm do người lao động và đơn vị đóng thực hiện như quy định tại Khoản 1, 2 và 3 Điều 7.","Nhóm do tổ chức BHXH đóng: hằng tháng cơ quan BHXH chuyển tiền đóng BHYT từ quỹ BHXH, quỹ BHTN sang quỹ BHYT.","Nhóm do ngân sách nhà nước đóng: hằng quý cơ quan tài chính, cơ quan quản lý đối tượng chuyển tiền đóng vào quỹ BHYT; chậm nhất đến ngày 31/12 hằng năm phải xong việc chuyển kinh phí của năm đó.","Đối tượng hộ gia đình và được hỗ trợ một phần mức đóng: định kỳ 03/06/12 tháng đóng phần thuộc trách nhiệm cho Đại lý thu hoặc tại cơ quan BHXH.","Đối tượng tại Khoản 4, Khoản 5 Điều 17 đã đóng một lần cho 03/06/12 tháng mà Nhà nước điều chỉnh mức lương cơ sở thì không phải đóng bổ sung phần chênh lệch."]},"qd595_20":{"tldr":"Hoàn trả tiền đóng BHYT cho người tham gia theo đối tượng tại Khoản 4, 5 Điều 17 trong một số trường hợp, tính theo mức đóng và thời gian đã đóng nhưng chưa sử dụng thẻ.","points":["Các trường hợp được hoàn trả: được cấp thẻ theo nhóm đối tượng mới và báo giảm thẻ đã cấp trước đó; được ngân sách điều chỉnh tăng hỗ trợ mức đóng; bị chết trước khi thẻ BHYT có giá trị sử dụng.","Số tiền hoàn trả tính theo mức đóng BHYT và thời gian đã đóng tiền nhưng chưa sử dụng thẻ.","Thời gian chưa sử dụng thẻ được tính từ thời điểm thẻ theo nhóm mới có giá trị sử dụng, hoặc từ thời điểm quyết định của cơ quan có thẩm quyền có hiệu lực, hoặc từ thời điểm thẻ có giá trị sử dụng (trường hợp chết)."]},"qd595_21":{"tldr":"Đối tượng tham gia BHTNLĐ-BNN bắt buộc theo Điều 43 Luật An toàn, Vệ sinh lao động gồm cán bộ, công chức, viên chức và người lao động Việt Nam làm việc theo HĐLĐ.","points":["Bao gồm cán bộ, công chức, viên chức; người làm việc theo HĐLĐ không xác định thời hạn và HĐLĐ từ đủ 03 tháng trở lên, và từ đủ 01 tháng đến dưới 03 tháng (thực hiện từ 01/01/2018); không bao gồm người giúp việc gia đình.","Người quản lý doanh nghiệp, người quản lý điều hành hợp tác xã có hưởng tiền lương.","Trường hợp giao kết HĐLĐ với nhiều người sử dụng lao động thì người sử dụng lao động phải đóng theo từng HĐLĐ nếu người lao động thuộc đối tượng phải tham gia BHXH bắt buộc."]},"qd595_22":{"tldr":"Mức đóng và phương thức đóng BHTNLĐ-BNN theo Điều 44 Luật An toàn, Vệ sinh lao động.","points":["Từ ngày 01/6/2017, người sử dụng lao động hằng tháng đóng bằng 0,5% trên quỹ tiền lương đóng BHXH của người lao động.","Đơn vị trong lĩnh vực nông, lâm, ngư, diêm nghiệp trả lương theo sản phẩm hoặc khoán được đóng theo phương thức hằng tháng, 03 tháng hoặc 06 tháng một lần."]},"qd595_23":{"tldr":"Hồ sơ đăng ký, điều chỉnh đóng BHXH, BHYT, BHTN, BHTNLĐ-BNN; cấp sổ BHXH, thẻ BHYT, gồm thành phần hồ sơ của người lao động và đơn vị; số lượng hồ sơ 01 bộ.","points":["Người lao động đang làm việc: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS); bổ sung giấy tờ chứng minh nếu được hưởng quyền lợi BHYT cao hơn.","Người đi làm việc ở nước ngoài: Mẫu TK1-TS kèm HĐLĐ có thời hạn ở nước ngoài hoặc HĐLĐ được gia hạn/ký mới.","Đơn vị: Tờ khai đơn vị (Mẫu TK3-TS), Danh sách lao động (Mẫu D02-TS), Bảng kê thông tin (Mẫu D01-TS).","Số lượng hồ sơ: 01 bộ."]},"qd595_24":{"tldr":"Hồ sơ đăng ký, đăng ký lại, điều chỉnh đóng BHXH tự nguyện; cấp sổ BHXH; số lượng hồ sơ 01 bộ.","points":["Người tham gia: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS).","Đại lý thu/Cơ quan BHXH: Danh sách người tham gia BHXH tự nguyện (Mẫu D05-TS).","Số lượng hồ sơ: 01 bộ."]},"qd595_25":{"tldr":"Hồ sơ đăng ký đóng, cấp thẻ BHYT đối với người chỉ tham gia BHYT; số lượng hồ sơ 01 bộ.","points":["Người tham gia: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS); người đã hiến bộ phận cơ thể: Giấy ra viện có ghi rõ \"đã hiến bộ phận cơ thể\".","UBND xã, cơ sở trợ giúp xã hội, cơ sở nuôi dưỡng/điều dưỡng, cơ sở giáo dục nghề nghiệp, Đại lý thu/Nhà trường, Cơ quan BHXH: Danh sách người chỉ tham gia BHYT (Mẫu D03-TS).","Số lượng hồ sơ: 01 bộ."]},"qd595_26":{"tldr":"Hồ sơ hoàn trả tiền đã đóng đối với người tham gia BHXH tự nguyện, người có từ 2 sổ BHXH trở lên có thời gian đóng trùng, người tham gia BHYT theo hộ gia đình và người được ngân sách hỗ trợ một phần mức đóng BHYT; số lượng hồ sơ 01 bộ.","points":["Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS).","Sổ BHXH (nộp tất cả các sổ đối với người có thời gian đóng trùng nhau).","Văn bản chứng thực hoặc bản kèm bản chính Giấy chứng tử đối với trường hợp chết.","Số lượng hồ sơ: 01 bộ."]},"qd595_27":{"tldr":"Hồ sơ cấp lại, đổi, điều chỉnh nội dung trên sổ BHXH, thẻ BHYT cho các trường hợp mất/hỏng, thay đổi thông tin, ghi xác nhận cộng nối thời gian; mỗi loại số lượng hồ sơ 01 bộ.","points":["Cấp lại sổ BHXH do mất, hỏng: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS).","Cấp lại sổ BHXH do thay đổi họ, tên, chữ đệm; ngày, tháng, năm sinh; giới tính, dân tộc; quốc tịch: Mẫu TK1-TS, hồ sơ kèm theo (Mục 3, 4 Phụ lục 01); đơn vị lập Bảng kê thông tin (Mẫu D01-TS).","Ghi xác nhận thời gian được cộng nối nhưng không phải đóng BHXH và điều chỉnh nghề nặng nhọc, độc hại, nguy hiểm trước năm 1995: Mẫu TK1-TS, hồ sơ kèm theo (Mục 1, 2 Phụ lục 01).","Cấp lại, đổi thẻ BHYT: Mẫu TK1-TS; bổ sung giấy tờ chứng minh nếu được hưởng quyền lợi BHYT cao hơn; đơn vị lập Mẫu D01-TS."]},"qd595_28":{"tldr":"Thời hạn giải quyết thu BHXH, BHYT, BHTN, BHTNLĐ-BNN gồm tạm dừng đóng, truy thu và hoàn trả, tính theo số ngày kể từ ngày nhận đủ hồ sơ.","points":["Tạm dừng đóng vào quỹ hưu trí, tử tuất: không quá 05 ngày.","Truy thu do vi phạm pháp luật về đóng: không quá 10 ngày; truy thu do điều chỉnh tăng tiền lương đã đóng: không quá 03 ngày.","Hoàn trả đối với BHXH tự nguyện, BHYT hộ gia đình và người được hỗ trợ một phần mức đóng BHYT: không quá 05 ngày; đối tượng cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ-BNN: không quá 10 ngày."]},"qd595_29":{"tldr":"Thời hạn cấp sổ BHXH cho các trường hợp cấp mới, cấp lại, điều chỉnh, xác nhận, tính theo số ngày kể từ ngày nhận đủ hồ sơ.","points":["Cấp mới: không quá 05 ngày.","Cấp lại sổ BHXH (thay đổi thông tin, mất, hỏng, cộng nối thời gian, gộp sổ): không quá 10 ngày; trường hợp cần xác minh quá trình đóng ở tỉnh khác hoặc nhiều đơn vị thì không quá 45 ngày nhưng phải có văn bản thông báo cho người lao động.","Điều chỉnh nội dung đã ghi trên sổ BHXH: không quá 05 ngày.","Xác nhận sổ BHXH: không quá 05 ngày."]},"qd595_30":{"tldr":"Thời hạn cấp thẻ BHYT cho các trường hợp cấp mới, cấp lại, đổi thẻ, tính theo số ngày kể từ ngày nhận đủ hồ sơ.","points":["Cấp mới: không quá 05 ngày; riêng người hưởng trợ cấp thất nghiệp: không quá 02 ngày.","Cấp lại, đổi thẻ không thay đổi thông tin: không quá 02 ngày; từ ngày 01/01/2019 trở đi: trong ngày khi nhận đủ hồ sơ.","Cấp lại, đổi thẻ có thay đổi thông tin: không quá 03 ngày.","Người đang điều trị tại cơ sở KCB: thực hiện trong ngày khi nhận đủ hồ sơ."]},"qd595_31":{"tldr":"Trách nhiệm của người tham gia trong việc kê khai, nộp hồ sơ, đóng tiền và nhận kết quả đối với BHXH bắt buộc, BHXH tự nguyện và người chỉ tham gia BHYT.","points":["Người tham gia BHXH bắt buộc kê khai hồ sơ theo Điều 23 và nộp cho đơn vị nơi đang làm việc; người đi làm việc ở nước ngoài nộp cho đơn vị hoặc cho cơ quan BHXH.","Đóng tiền BHXH bắt buộc qua đơn vị trích từ tiền lương để chuyển vào tài khoản chuyên thu của cơ quan BHXH.","Người có thời gian đóng BHXH chưa đủ 15 năm, còn thiếu tối đa 06 tháng mà bị chết, nếu có thân nhân đủ điều kiện hưởng tuất hằng tháng thì thân nhân đóng vào quỹ hưu trí và tử tuất tại BHXH huyện nơi cư trú với mức 22% mức tiền lương tháng đóng BHXH trước khi chết cho số tháng còn thiếu.","Người tham gia BHXH tự nguyện kê khai theo Điều 24, 26, 27 nộp cho Đại lý thu hoặc cơ quan BHXH và đóng tiền theo phương thức đăng ký.","Người chỉ tham gia BHYT nộp hồ sơ và đóng tiền cho UBND xã, Đại lý thu, nhà trường hoặc cơ quan BHXH tùy theo nhóm đối tượng."]},"qd595_32":{"tldr":"Trách nhiệm của đơn vị sử dụng lao động, UBND xã, Đại lý thu/nhà trường, các cơ sở và cơ quan quản lý đối tượng trong việc nhận hồ sơ, kê khai, nộp hồ sơ, đóng tiền và nhận kết quả.","points":["Đơn vị sử dụng lao động nhận hồ sơ của người lao động theo Điều 23, 27; kê khai, ghi mã số BHXH, nộp hồ sơ qua bưu điện và nộp tiền theo Điều 7, 16, 19, 22.","Đơn vị nhận Thông báo kết quả đóng (Mẫu C12-TS) hằng tháng để kiểm tra, đối chiếu và Thông báo đóng của người lao động (Mẫu C13-TS) để niêm yết công khai tại đơn vị.","Đại lý thu/nhà trường nhận hồ sơ, kê khai theo Điều 24, 25, 27; thu tiền của người tham gia, cấp biên lai và nộp cho cơ quan BHXH, đối chiếu theo Mẫu C17-TS.","UBND xã nhận hồ sơ và danh sách người có công, thân nhân người có công; kê khai theo Điều 25, Khoản 4 Điều 27; xác định, rà soát tăng, giảm đối tượng tham gia BHYT trên địa bàn.","Trường hợp giao dịch bằng hồ sơ điện tử thì thực hiện theo quy định về giao dịch điện tử."]},"qd595_33":{"tldr":"Quy trình nội bộ của cơ quan BHXH tỉnh/huyện với trách nhiệm cụ thể của từng Phòng/Tổ: Tiếp nhận & Quản lý hồ sơ, Quản lý thu, Cấp sổ thẻ, KH-TC, Chế độ BHXH, Giám định BHYT và CNTT.","points":["Phòng/Tổ Tiếp nhận & Quản lý hồ sơ nhận, kiểm tra, đối chiếu hồ sơ; lập Phiếu trả hồ sơ (Mẫu C02-TS) nếu chưa khớp đúng hoặc viết giấy hẹn nếu khớp đúng; chuyển hồ sơ cho các Phòng/Tổ liên quan.","Phòng/Tổ Quản lý thu cập nhật dữ liệu, ghi quá trình đóng vào từng quỹ; hằng tháng in Thông báo kết quả đóng (Mẫu C12-TS), Tổng hợp số phải thu (Mẫu C69-HD), Báo cáo chi tiết đơn vị nợ (Mẫu B03-TS).","Phòng/Tổ Cấp sổ, thẻ in sổ BHXH, thẻ BHYT, danh sách cấp sổ (Mẫu D09a-TS), danh sách cấp thẻ (Mẫu D10a-TS) và tờ rời sổ BHXH; lập phiếu sử dụng phôi và mở sổ theo dõi.","Phòng/Tổ KH-TC nhận chứng từ chuyển tiền, cập nhật số tiền đã thu, ghi thu tiền đóng BHYT do ngân sách trung ương và quỹ BHXH, BHTN đảm bảo.","Trường hợp giao dịch bằng hồ sơ điện tử thì thực hiện theo quy định về giao dịch điện tử."]},"qd595_34":{"tldr":"Quy trình khai thác, phát triển đối tượng cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ-BNN ở cấp BHXH Việt Nam và BHXH tỉnh/huyện, dựa trên dữ liệu do cơ quan Thuế cung cấp.","points":["Trung tâm CNTT (BHXH Việt Nam) căn cứ dữ liệu Tổng cục Thuế cung cấp để rà soát, phân loại dữ liệu theo các mẫu D04a-TS, D04b-TS, D04c-TS, D04d-TS.","Phòng/Tổ Khai thác và thu nợ gửi Thông báo (Mẫu D04e-TS) và đôn đốc đơn vị đăng ký tham gia đầy đủ cho người lao động, 15 ngày một lần.","Sau 15 ngày kể từ thông báo lần thứ hai mà đơn vị không đăng ký, phối hợp Phòng/Tổ Quản lý thu đến đơn vị đôn đốc, lập Biên bản (Mẫu D04h-TS); sau 15 ngày nữa vẫn chưa đóng thì chuyển hồ sơ cho Phòng/Tổ kiểm tra.","Sau 03 tháng kể từ Thông báo (Mẫu D04e-TS) lần đầu mà đơn vị vẫn không đóng thì lập Mẫu D04m-TS để ra quyết định thanh tra chuyên ngành hoặc phối hợp thành lập đoàn thanh tra liên ngành.","Trường hợp đơn vị có dấu hiệu phạm tội trốn đóng thì tham mưu chuyển hồ sơ sang cơ quan công an đề nghị điều tra theo pháp luật hình sự."]},"qd595_35":{"tldr":"Quy trình khai thác, phát triển đối tượng tham gia BHXH tự nguyện, BHYT được ngân sách hỗ trợ một phần mức đóng và BHYT theo hộ gia đình.","points":["Phòng/Tổ Khai thác và thu nợ xây dựng, giao chỉ tiêu phát triển người tham gia BHXH tự nguyện, BHYT cho BHXH huyện/đại lý thu.","Hướng dẫn, kiểm tra, đôn đốc đại lý thu đến địa bàn dân cư tuyên truyền, vận động; thường xuyên tổ chức đào tạo, bồi dưỡng cho đại lý thu.","Hằng tháng phối hợp với Phòng/Tổ Quản lý thu rà soát số người đã và chưa tham gia BHYT để xây dựng kế hoạch tháng tiếp theo.","Cung cấp danh sách hộ nghèo, hộ cận nghèo đã được phê duyệt cho Đại lý thu để xác định đối tượng được ngân sách hỗ trợ tiền đóng BHXH tự nguyện."]},"qd595_36":{"tldr":"Quy trình quản lý nợ, đôn đốc thu nợ BHXH, BHYT, BHTN, BHTNLĐ-BNN, gồm phân loại nợ, hồ sơ xác định nợ, tổ chức thu nợ và đánh giá, báo cáo.","points":["Phân loại nợ: nợ phát sinh (dưới 1 tháng); nợ chậm đóng (từ 1 đến dưới 3 tháng); nợ kéo dài (từ 3 tháng trở lên); nợ khó thu (đơn vị mất tích, giải thể, phá sản, tạm dừng đóng quỹ hưu trí và tử tuất).","Hồ sơ xác định nợ gồm Thông báo kết quả đóng (Mẫu C12-TS), Biên bản làm việc (Mẫu D04h-TS) và các văn bản xác nhận của cơ quan có thẩm quyền đối với nợ khó thu.","Đơn vị nợ quá 02 tháng (phương thức hằng tháng), 04 tháng (03 tháng một lần), 07 tháng (06 tháng một lần): cán bộ thu đến đơn vị đôn đốc, lập Mẫu D04h-TS, gửi văn bản đôn đốc 15 ngày một lần.","Sau 03 tháng kể từ lập Biên bản (Mẫu D04h-TS) mà đơn vị vẫn không đóng thì lập Mẫu D04m-TS để tổ chức thanh tra chuyên ngành hoặc phối hợp thanh tra liên ngành.","Hằng quý Phòng/Tổ Khai thác và thu nợ lập, gửi báo cáo đánh giá tình hình thu nợ (Mẫu B03a-TS) kèm dữ liệu (Mẫu B03-TS) gửi BHXH cấp trên."]},"qd595_37":{"tldr":"Cách tính lãi chậm đóng BHXH bắt buộc, BHYT, BHTN, BHTNLĐ-BNN khi đơn vị chậm đóng từ 30 ngày trở lên, theo công thức Lcđi = Pcđi x k.","points":["Đơn vị chậm đóng từ 30 ngày trở lên phải đóng tiền lãi tính trên số tiền chưa đóng; phương thức tính lãi vào ngày đầu hằng tháng.","Đối với BHXH bắt buộc, BHTN, BHTNLĐ-BNN: k bằng 02 lần mức lãi suất đầu tư quỹ BHXH bình quân năm trước liền kề theo tháng do BHXH Việt Nam công bố.","Đối với BHYT: k bằng 02 lần mức lãi suất thị trường liên ngân hàng kỳ hạn 9 tháng tính theo tháng do Ngân hàng Nhà nước công bố của năm trước liền kề.","Số tiền lãi phải thu trong tháng gồm lãi lũy kế đến cuối tháng trước liền kề chuyển sang và lãi tính trên số tiền chậm đóng phát sinh trong tháng.","Hằng năm, trong thời hạn 15 ngày đầu của tháng 01, BHXH Việt Nam thông báo mức lãi suất bình quân theo tháng để thống nhất thực hiện."]},"qd595_38":{"tldr":"Quy trình truy thu BHXH bắt buộc, BHYT, BHTN, BHTNLĐ-BNN gồm các trường hợp truy thu, điều kiện truy thu, tiền lương và tỷ lệ truy thu, số tiền truy thu (gồm tiền phải đóng và tiền lãi).","points":["Truy thu do trốn đóng (do cơ quan BHXH hoặc thanh tra nhà nước kết luận từ ngày 01/01/2016): ngoài số tiền phải đóng còn phải truy thu tiền lãi; thời gian trốn đóng trước 01/01/2016 tính theo lãi suất chậm đóng năm 2016, từ 01/01/2016 trở đi tính theo lãi suất từng năm tại thời điểm phát hiện.","Truy thu với người lao động về nước sau 06 tháng kể từ ngày chấm dứt HĐLĐ mới truy đóng BHXH: số tiền truy thu gồm số phải đóng và tiền lãi.","Truy thu do điều chỉnh tăng tiền lương sau 06 tháng kể từ ngày ký quyết định/HĐLĐ nâng lương: số tiền truy thu gồm số phải đóng và tiền lãi.","Điều kiện truy thu: cơ quan có thẩm quyền hoặc cơ quan BHXH thanh tra buộc truy thu; đơn vị đề nghị; hồ sơ đúng đủ theo Phụ lục 02.","Tổng số tiền truy thu bằng tổng số tiền phải đóng và tiền lãi; tiền lương làm căn cứ truy thu được ghi trong sổ BHXH của người lao động."]},"qd595_39":{"tldr":"Hằng năm cán bộ chuyên quản thu, cấp sổ - thẻ xây dựng kế hoạch và kiểm tra hồ sơ đóng BHXH, BHYT, BHTN, BHTNLĐ-BNN; cấp sổ BHXH, thẻ BHYT tại đơn vị sử dụng lao động ít nhất đạt 50% số đơn vị trên địa bàn.","points":["Kiểm tra, đối chiếu hồ sơ đơn vị với nội dung kê khai: Tờ khai (Mẫu TK01-TS), Quyết định/HĐLĐ/HĐLV, Bảng thanh toán tiền lương, tiền công, Bảng chấm công, chứng từ chuyển tiền đóng.","Lập biên bản kiểm tra và hướng dẫn đơn vị khắc phục sai sót (nếu có).","Trường hợp phát hiện dấu hiệu hoặc cố tình vi phạm (trốn đóng, đóng không đúng tiền lương, thu của người lao động nhưng không đóng, khai man, giả mạo hồ sơ) thì báo đề xuất lãnh đạo Phòng tổ chức thanh tra chuyên ngành và xử lý theo pháp luật."]},"qd595_40":{"tldr":"Quy trình xây dựng, điều chỉnh và giao kế hoạch thu hằng năm ở BHXH huyện, BHXH tỉnh và BHXH Việt Nam.","points":["BHXH huyện lập 02 bản kế hoạch thu (Mẫu K01-TS) gửi 01 bản đến BHXH tỉnh; lập 02 bản kế hoạch ngân sách địa phương đóng, hỗ trợ mức đóng BHYT.","BHXH tỉnh lập kế hoạch điều chỉnh thu và kinh phí hỗ trợ với đơn vị do tỉnh trực tiếp thu; tổng hợp toàn tỉnh lập 02 bản gửi BHXH Việt Nam.","BHXH tỉnh giao kế hoạch thu, phân bổ kinh phí hỗ trợ công tác thu, hoa hồng đại lý cho BHXH tỉnh và BHXH huyện trên cơ sở kế hoạch được BHXH Việt Nam giao.","BHXH Việt Nam tổng hợp, xây dựng và điều chỉnh kế hoạch, giao kế hoạch; thời gian theo hướng dẫn của BHXH Việt Nam."]},"qd595_41":{"tldr":"Quy trình lập kế hoạch sử dụng phôi sổ BHXH, thẻ BHYT năm sau ở BHXH huyện và BHXH tỉnh theo các mốc thời gian quy định.","points":["BHXH huyện lập kế hoạch sử dụng phôi (Mẫu K02-TS) gửi Phòng Cấp sổ, thẻ trước ngày 15/6 hằng năm.","BHXH tỉnh (Phòng Cấp sổ, thẻ) lập kế hoạch sử dụng phôi (Mẫu K02-TS) gửi BHXH Việt Nam (Ban Sổ - Thẻ) trước ngày 01/7 hằng năm.","Điều chỉnh kế hoạch: BHXH tỉnh, huyện lập điều chỉnh (Mẫu K02-TS) gửi về BHXH Việt Nam (Ban Sổ - Thẻ) trước ngày 01/7 của năm thực hiện."]},"qd595_42":{"tldr":"Quản lý đối tượng trong các trường hợp đặc thù: nhiều HĐLĐ, làm việc trong cơ quan nhà nước, tạm dừng đóng, nghỉ việc, nghỉ ốm đau, thai sản, tạm giam, ngừng việc.","points":["Người có từ 02 HĐLĐ trở lên với nhiều đơn vị: đóng BHXH, BHTN theo HĐLĐ giao kết đầu tiên, đóng BHYT theo HĐLĐ có mức tiền lương cao nhất, đóng BHTNLĐ-BNN theo từng HĐLĐ.","Người không làm việc và không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng thì không đóng BHXH tháng đó và thời gian này không được tính để hưởng BHXH.","Người nghỉ hưởng chế độ thai sản từ 14 ngày làm việc trở lên trong tháng thì không phải đóng BHXH, BHTN, BHTNLĐ-BNN; thời gian này được tính là thời gian đóng BHXH, không tính là thời gian đóng BHTN, và được cơ quan BHXH đóng BHYT.","Người bị tạm giam, tạm giữ hoặc tạm đình chỉ công tác được tạm dừng đóng BHXH, BHTN, BHTNLĐ-BNN nhưng vẫn phải đóng BHYT bằng 4,5% của 50% mức tiền lương tháng; nếu được xác định bị oan, sai thì đóng bù không tính lãi.","Người ngừng việc theo pháp luật về lao động mà vẫn được hưởng tiền lương thì người lao động và đơn vị đóng theo mức tiền lương được hưởng trong thời gian ngừng việc."]},"qd595_43":{"tldr":"Quản lý tiền thu gồm hình thức đóng tiền, thứ tự hạch toán thu và các trường hợp hoàn trả tiền đóng.","points":["Hình thức đóng tiền: chuyển khoản vào tài khoản chuyên thu, hoặc tiền mặt nộp trực tiếp tại ngân hàng/Kho bạc; nếu nộp cho cơ quan BHXH thì trước 16 giờ trong ngày cơ quan BHXH phải nộp toàn bộ tiền mặt vào tài khoản chuyên thu.","Khi nhận tiền, cơ quan BHXH ưu tiên thu cho người lao động đủ điều kiện hưởng BHXH hoặc chấm dứt HĐLĐ/HĐLV để kịp giải quyết chế độ (kể cả tiền lãi chậm đóng).","Số tiền còn lại hạch toán theo thứ tự: quỹ BHYT, quỹ BHTN, quỹ BHTNLĐ-BNN, rồi đến quỹ BHXH (mỗi quỹ gồm cả tiền lãi phạt chậm đóng, trốn đóng nếu có).","Các trường hợp hoàn trả gồm: đơn vị giải thể/phá sản/chấm dứt hoạt động/di chuyển đã đóng thừa, chuyển tiền không thuộc trách nhiệm quản lý, hạch toán nhầm, có từ 02 sổ BHXH trùng thời gian đóng, đóng cho người không thuộc đối tượng bắt buộc.","Giám đốc BHXH ra quyết định hoàn trả (Mẫu C16-TS) gửi Phòng/Tổ KH-TC làm thủ tục chuyển tiền và Phòng/Tổ Quản lý thu."]},"qd595_44":{"tldr":"Quản lý phôi bìa sổ BHXH và phôi thẻ BHYT do BHXH Việt Nam tổ chức in, cấp phát cho BHXH các tỉnh, BHXH Bộ Quốc phòng và BHXH Công an nhân dân.","points":["Việc tổ chức in, nhập kho, xuất kho, kiểm kê, hủy bỏ và quyết toán phôi sổ BHXH, thẻ BHYT thực hiện theo quy định hiện hành.","Ban Sổ - Thẻ tổng hợp nhu cầu sử dụng phôi trên toàn quốc trình Tổng Giám đốc; theo dõi, điều tiết việc cấp phát, sử dụng phôi.","BHXH tỉnh/huyện tiếp nhận, quản lý phôi; Phòng/Tổ Cấp sổ, thẻ cấp phát phôi cho cán bộ in (kèm Mẫu C08-TS) và cán bộ trực tiếp in chịu trách nhiệm bảo quản, trường hợp in hỏng phải được cắt góc.","Trước ngày 01/02 hàng năm, Phòng Cấp sổ, thẻ/BHXH huyện lập danh mục sổ BHXH, thẻ BHYT hỏng năm trước để bàn giao cho BHXH tỉnh."]},"qd595_45":{"tldr":"Quy trình kiểm kê và hủy phôi bìa sổ BHXH, thẻ BHYT hỏng định kỳ.","points":["Định kỳ cuối mỗi quý và cuối năm, BHXH tỉnh/huyện kiểm kê phôi để xác nhận số lượng còn tồn kho thực tế và chênh lệch thừa thiếu so với sổ sách kế toán; việc kiểm kê phải lập Biên bản (Mẫu C63-HD).","Thành lập Hội đồng hủy sổ BHXH, thẻ BHYT do Lãnh đạo BHXH tỉnh làm Chủ tịch.","Định kỳ trước 15/3 hàng năm tổ chức hủy sổ BHXH, thẻ BHYT hỏng đã lưu giữ trên 01 năm tại kho của Văn phòng, đồng thời lập biên bản hủy (Mẫu C10-TS)."]},"qd595_46":{"tldr":"Cấp và quản lý sổ BHXH gồm cấp lần đầu, cấp lại; ghi, xác nhận thời gian đóng; xử lý trường hợp nhiều sổ và thẩm quyền ký.","points":["Cấp lại sổ BHXH (bìa và tờ rời) các trường hợp mất, hỏng, gộp, thay đổi số sổ, họ tên, chữ đệm, ngày tháng năm sinh, người đã hưởng BHXH một lần còn thời gian đóng BHTN chưa hưởng.","Đối với đơn vị nợ tiền đóng, nếu người lao động đủ điều kiện hưởng BHXH hoặc chấm dứt HĐLĐ/HĐLV thì đơn vị phải đóng đủ (gồm cả tiền lãi chậm đóng) để cơ quan BHXH xác nhận sổ; nếu chưa đóng đủ thì chỉ xác nhận đến thời điểm đã đóng.","Một người có từ 2 sổ BHXH trở lên ghi thời gian đóng không trùng nhau thì cơ quan BHXH thu hồi tất cả các sổ, hoàn chỉnh cơ sở dữ liệu và in vào sổ mới.","Trường hợp đơn vị di chuyển trong địa bàn tỉnh hoặc thay đổi tên thì không thực hiện xác nhận sổ BHXH.","Giám đốc BHXH tỉnh, huyện quét chữ ký trong phần mềm để in trên bìa và tờ rời sổ BHXH và chịu trách nhiệm quản lý con dấu."]},"qd595_47":{"tldr":"Quản lý dữ liệu và giá trị sử dụng thẻ BHYT; dữ liệu thẻ được quản lý tập trung và liên thông với dữ liệu thu, làm căn cứ thanh toán chi phí KCB BHYT.","points":["Cơ sở KCB tra cứu thông tin thẻ BHYT trên cổng hệ thống thông tin giám định BHYT; chỉ thanh toán khi người tham gia đang đóng BHYT và thẻ còn giá trị sử dụng.","Đối tượng tại Khoản 1, 2, 3 Điều 17: thẻ có giá trị kể từ ngày đóng BHYT, trừ một số đối tượng có thời điểm riêng (người hưởng trợ cấp thất nghiệp, người dân tộc thiểu số vùng khó khăn, hộ nghèo/cận nghèo được hỗ trợ 100%).","Đối tượng tại Khoản 4, 5 Điều 17 tham gia liên tục: thẻ có giá trị từ ngày đóng; tham gia lần đầu hoặc không liên tục từ 3 tháng trở lên trong năm tài chính thì thẻ có giá trị sau 30 ngày kể từ ngày nộp tiền.","Đối tượng tại Khoản 1 Điều 17 chậm đóng BHYT từ 30 ngày trở lên thì thẻ hết giá trị sử dụng.","Người tham gia được thay đổi cơ sở đăng ký KCB ban đầu vào tháng đầu quý."]},"qd595_49":{"tldr":"Chế độ thông tin báo cáo về thu, cấp sổ BHXH, thẻ BHYT với thời hạn lập và gửi báo cáo theo tháng, quý, năm.","points":["BHXH huyện gửi BHXH tỉnh: báo cáo tháng trước ngày 03 của tháng sau; báo cáo quý trước ngày 10 tháng đầu quý sau; báo cáo năm trước ngày 10/01 năm sau.","BHXH tỉnh gửi BHXH Việt Nam: báo cáo tháng trước ngày 05 tháng sau; báo cáo quý trước ngày 25 tháng đầu quý sau; báo cáo năm trước ngày 25/01 năm sau."]},"qd595_50":{"tldr":"Trách nhiệm của người tham gia, đơn vị và Đại lý thu trong việc kê khai, nộp hồ sơ, trích nộp tiền và bảo quản hồ sơ, sổ BHXH, thẻ BHYT.","points":["Người tham gia lập, kê khai đầy đủ, chính xác thông tin; chịu trách nhiệm trước pháp luật về nội dung kê khai; tự bảo quản sổ BHXH, thẻ BHYT.","Đơn vị lập, nộp hồ sơ; trích nộp tiền theo quy định; trường hợp báo giảm chậm phải đóng số tiền BHYT của các tháng báo giảm chậm và thẻ BHYT có giá trị sử dụng đến hết các tháng đó.","Đơn vị chịu trách nhiệm trước pháp luật về việc lập, lưu trữ hồ sơ; cung cấp đầy đủ, kịp thời thông tin, hồ sơ khi có thay đổi hoặc theo yêu cầu.","Đại lý thu/nhà trường bảo quản, sử dụng biên lai thu tiền; tuyên truyền, vận động, hướng dẫn người tham gia; chịu trách nhiệm trước pháp luật về lập hồ sơ, thời hạn nộp hồ sơ và số tiền đã thu."]},"qd595_51":{"tldr":"Trách nhiệm của cơ quan BHXH (BHXH huyện, BHXH tỉnh, BHXH Việt Nam) trong tổ chức thực hiện thu, cấp sổ BHXH, thẻ BHYT; kiểm tra, báo cáo, lưu trữ hồ sơ và quản lý dữ liệu, phôi.","points":["BHXH huyện tổ chức thực hiện thu, cấp sổ BHXH, thẻ BHYT đối với đối tượng được phân cấp; kiểm tra nội dung kê khai; tổng hợp, báo cáo hằng quý, năm; lưu trữ hồ sơ.","BHXH tỉnh tổ chức thu, cấp sổ thẻ với đối tượng do tỉnh trực tiếp thu; phân công, phân cấp; hướng dẫn, kiểm tra, đôn đốc BHXH huyện; thẩm định số liệu thu của BHXH huyện theo quý, năm (Mẫu C03-TS); không được phân công, phân cấp trái hướng dẫn.","Ban Thu, Ban Sổ - Thẻ chỉ đạo, hướng dẫn, kiểm tra, giám sát, đôn đốc BHXH tỉnh; xây dựng kế hoạch kiểm tra; tổ chức thẩm định số liệu thu và tình hình quản lý, sử dụng phôi.","Trung tâm CNTT xây dựng phần mềm quản lý, bảo mật, phân cấp, phân quyền; cán bộ đã ghi dữ liệu không tự ý sửa, trường hợp sửa chỉ phân quyền cho Trưởng phòng nghiệp vụ sau khi có ý kiến của Giám đốc bằng văn bản và chỉ thực hiện trong năm tài chính.","Trong thời hạn 15 ngày đầu của tháng 01 hằng năm, Vụ Quản lý đầu tư quỹ thông báo mức lãi suất bình quân theo tháng gửi BHXH tỉnh, BHXH Bộ Quốc phòng, BHXH Công an nhân dân để thống nhất thực hiện."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
