ng các đơn vị trực thuộc Bảo hiểm xã hội Việt Nam; Giám đốc bảo hiểm xã hội các tỉnh, thành phố trực thuộc Trung ương chịu trách nhiệm thi hành Quyết định này./.","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Nơi nhận:- Như Điều 3;- VPCP (để b/c TTg CP, các Phó TTg);- Các Bộ: LĐTB&XH, TC, YT, NV, TP, QP, CA;- UBND tỉnh, TP trực thuộc TƯ;- HĐQL - BHXHVN;- TGĐ, các phó TGĐ;- Các đơn vị trực thuộc BHXH VN;- BHXH Bộ QP,CA;- Lưu: VT, ST, BT(20b)."},{"k":"p","t":"TỔNG GIÁM ĐỐCNguyễn Thị Minh"},{"k":"p","t":"QUY TRÌNH"},{"k":"p","t":"THU BẢO HIỂM XÃ HỘI, BẢO HIỂM Y TẾ, BẢO HIỂM THẤT NGHIỆP, BẢO HIỂM TAI NẠN LAO ĐỘNG, BỆNH NGHỀ NGHIỆP; QUẢN LÝ SỔ BẢO HIỂM XÃ HỘI, THẺ BẢO HIỂM Y TẾ(Ban hành kèm theo Quyết định số 595/QĐ-BHXH ngày 14 tháng 4 năm 2017 của Tổng Giám đốc Bảo hiểm xã hội Việt Nam)"}]},{"id":"qd595_1-1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi áp dụng","shortTitle":"Phạm vi áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Văn bản này hướng dẫn về hồ sơ, quy trình nghiệp vụ, quyền và trách nhiệm của cá nhân, cơ quan, đơn vị và cơ quan bảo hiểm xã hội trong thực hiện thu bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, bệnh nghề nghiệp; cấp, ghi, quản lý và sử dụng sổ bảo hiểm xã hội, thẻ bảo hiểm y tế."},{"k":"p","t":"2. Việc quản lý thu bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, bệnh nghề nghiệp; cấp, ghi, quản lý và sử dụng sổ bảo hiểm xã hội, thẻ bảo hiểm y tế trong lực lượng vũ trang do Bộ Quốc phòng, Bộ Công an hướng dẫn, phù hợp với đặc thù của từng Bộ và đồng bộ với các hướng dẫn tại Văn bản này để thực hiện chính sách, chế độ bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, bệnh nghề nghiệp thống nhất trong toàn quốc."}]},{"id":"qd595_2-1","no":2,"code":"Điều 2","title":"Điều 2. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Các từ viết tắt"},{"k":"p","t":"1.1. BHXH: là chữ viết tắt của cụm từ \"bảo hiểm xã hội\"."},{"k":"p","t":"1.2. BHTN: là chữ viết tắt của cụm từ \"bảo hiểm thất nghiệp\"."},{"k":"p","t":"1.3. BHYT: là chữ viết tắt của cụm từ \"bảo hiểm y tế\"."},{"k":"p","t":"1.4. BHTNLĐ, BNN: là viết tắt của cụm từ \"bảo hiểm tai nạn lao động, bệnh nghề nghiệp\"."},{"k":"p","t":"1.5. UBND: là chữ viết tắt của cụm từ \"Ủy ban nhân dân\"."},{"k":"p","t":"1.6. Đại lý thu: là chữ viết tắt của từ \"Đại lý thu BHXH, BHYT\"."},{"k":"p","t":"1.7. KH-TC: là chữ viết tắt của từ \"Kế hoạch - Tài chính\"."},{"k":"p","t":"1.8. BHXH tỉnh: là tên chung cho Bảo hiểm xã hội tỉnh, thành phố trực thuộc Trung ương."},{"k":"p","t":"1.9. BHXH huyện: là tên chung cho Bảo hiểm xã hội quận, huyện, thị xã, thành phố thuộc tỉnh."},{"k":"p","t":"1.10. HĐLĐ: là chữ viết tắt của \"hợp đồng lao động\"."},{"k":"p","t":"1.11. HĐLV: là chữ viết tắt của \"hợp đồng làm việc\"."},{"k":"p","t":"1.12. CNTT: là chữ viết tắt của \"công nghệ thông tin\"."},{"k":"p","t":"1.13. KCB: là chữ viết tắt của \"khám bệnh, chữa bệnh\"."},{"k":"p","t":"2. Giải thích từ ngữ"},{"k":"p","t":"Trong Văn bản này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"2.1. Đơn vị: gọi chung cho cơ quan, đơn vị, doanh nghiệp, tổ chức, cá nhân sử dụng lao động thuộc đối tượng tham gia BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"2.2. Người tham gia: gọi chung cho người lao động tham gia BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN; người tham gia BHXH tự nguyện, người tham gia BHYT; trừ trường hợp nêu cụ thể."},{"k":"p","t":"2.3. Cơ quan quản lý đối tượng: là cơ quan có thẩm quyền xác định và phê duyệt sách người tham gia như người thuộc hộ gia đình nghèo, người có công với cách mạng, thân nhân người có công với cách mạng, người thuộc diện hưởng bảo trợ xã hội hằng tháng, cựu chiến binh, trẻ em ... trên cơ sở phân cấp của UBND cấp tỉnh."},{"k":"p","t":"2.4. Truy thu: là việc cơ quan BHXH thu khoản tiền phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN của trường hợp trốn đóng, đóng không đủ số người thuộc diện bắt buộc tham gia, đóng không đủ số tiền phải đóng theo quy định, chiếm dụng tiền đóng, hưởng BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"2.5. Hoàn trả: là việc cơ quan BHXH chuyển trả lại số tiền được xác định không phải tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN hoặc đóng thừa khi ngừng giao dịch với cơ quan BHXH; đóng trùng cho cơ quan, đơn vị, cá nhân đã nộp cho cơ quan BHXH."},{"k":"p","t":"2.6. Phòng/Tổ Tiếp nhận & Quản lý hồ sơ: là tên gọi chung cho Phòng/Tổ Tiếp nhận & Quản lý hồ sơ của BHXH huyện hoặc Phòng/Tổ Tiếp nhận & Quản lý hồ sơ thuộc Phòng Tiếp nhận và Trả kết quả thủ tục hành chính của BHXH tỉnh."},{"k":"p","t":"2.7. Bản sao: là bản chụp từ bản chính hoặc bản đánh máy có nội dung đầy đủ, chính xác như nội dung ghi trong sổ gốc."},{"k":"p","t":"Đơn vị, người tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN khi nộp \"bản sao\" theo hướng dẫn tại Văn bản này phải kèm theo bản chính để cơ quan BHXH kiểm tra, đối chiếu và trả lại cho đơn vị, người tham gia."},{"k":"p","t":"2.8. Bản chính: là những giấy tờ, văn bản do cơ quan, tổ chức có thẩm quyền cấp lần đầu, cấp lại, cấp khi đăng ký lại; những giấy tờ, văn bản do cá nhân tự lập có xác nhận và đóng dấu của cơ quan, tổ chức có thẩm quyền."},{"k":"p","t":"2.9. Văn bản chứng thực: là giấy tờ, văn bản, hợp đồng, giao dịch đã được chứng thực theo quy định của pháp luật."},{"k":"p","t":"2.10. Thành phần hồ sơ quy định tại văn bản này nếu không quy định là bản chính thì có thể nộp bản chính hoặc bản sao kèm bản chính để đối chiếu, bản sao được chứng thực hoặc bản sao được cấp từ sổ gốc."},{"k":"p","t":"2.11. Nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN: là tiền phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN đối với người lao động theo quy định của pháp luật nhưng đơn vị chưa đóng cho cơ quan BHXH. Tiền nợ bao gồm cả tiền lãi chậm đóng theo quy định của pháp luật nhưng đơn vị chưa đóng."},{"k":"p","t":"2.12. Xác nhận sổ BHXH: là ghi thời gian đã đóng BHXH, BHTN, BHTNLĐ, BNN của người tham gia."},{"k":"p","t":"2.13. Mã số BHXH: là số định danh cá nhân duy nhất của người tham gia do cơ quan BHXH cấp để ghi trên sổ BHXH, thẻ BHYT."},{"k":"p","t":"2.14. Tên Tổ nghiệp vụ của BHXH huyện tại Văn bản này là Tên nghiệp vụ theo quy định của BHXH Việt Nam (bao gồm cả các Tổ nghiệp vụ gộp nhiều chức năng, nhiệm vụ)."},{"k":"p","t":"2.15. Các Chương, Mục, Điều, Khoản, Điểm, Tiết và Mẫu biểu dẫn chiếu trong Văn bản này mà không ghi rõ nguồn thì được hiểu là của Văn bản này."}]},{"id":"qd595_3-1","no":3,"code":"Điều 3","title":"Điều 3. Phân cấp quản lý","shortTitle":"Phân cấp quản lý","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thu BHXH, BHYT, BHTN, BHTNLĐ, BNN"},{"k":"p","t":"1.1. BHXH huyện"},{"k":"p","t":"a) Thu tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN của đơn vị đóng trụ sở trên địa bàn huyện theo phân cấp của BHXH tỉnh."},{"k":"p","t":"b) Giải quyết các trường hợp truy thu, hoàn trả tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; tạm dừng đóng vào quỹ hưu trí và tử tuất đối với đơn vị, người tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN do BHXH huyện trực tiếp thu."},{"k":"p","t":"c) Thu tiền hỗ trợ mức đóng BHYT, hỗ trợ mức đóng BHXH tự nguyện của ngân sách nhà nước theo phân cấp quản lý ngân sách nhà nước."},{"k":"p","t":"d) Thu tiền đóng BHXH tự nguyện; thu tiền đóng BHYT của người tham gia BHYT cư trú trên địa bàn huyện."},{"k":"p","t":"đ) Thu tiền đóng BHYT của đối tượng do ngân sách nhà nước đóng; ghi thu tiền đóng BHYT của đối tượng do quỹ BHXH, quỹ BHTN đảm bảo, ngân sách trung ương hỗ trợ học sinh, sinh viên đang theo học tại cơ sở giáo dục do Bộ, cơ quan Trung ương quản lý theo phân cấp của BHXH tỉnh."},{"k":"p","t":"1.2. BHXH tỉnh"},{"k":"p","t":"a) Thu tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN của các đơn vị chưa phân cấp cho BHXH huyện."},{"k":"p","t":"b) Giải quyết các trường hợp truy thu, hoàn trả tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; tạm dừng đóng vào quỹ hưu trí và tử tuất đối với đơn vị, người tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN do BHXH tỉnh trực tiếp thu."},{"k":"p","t":"c) Thu tiền hỗ trợ mức đóng BHYT, hỗ trợ mức đóng BHXH tự nguyện của ngân sách nhà nước."},{"k":"p","t":"d) Thu tiền đóng BHYT của đối tượng do ngân sách nhà nước đóng; ghi thu tiền đóng BHYT của đối tượng do quỹ BHXH, quỹ BHTN đảm bảo, ngân sách trung ương hỗ trợ học sinh, sinh viên đang theo học tại cơ sở giáo dục do Bộ, cơ quan Trung ương quản lý."},{"k":"p","t":"1.3. BHXH Việt Nam"},{"k":"p","t":"a) Thu tiền của ngân sách trung ương đóng, hỗ trợ mức đóng BHYT, tiền hỗ trợ quỹ BHTN."},{"k":"p","t":"b) Thu tiền của ngân sách trung ương đóng BHXH cho người có thời gian công tác trước năm 1995."},{"k":"p","t":"2. Cấp, ghi và xác nhận trên sổ BHXH"},{"k":"p","t":"2.1. BHXH huyện"},{"k":"p","t":"a) Cấp mới, cấp lại, điều chỉnh, xác nhận sổ BHXH và ghi thời gian đóng BHTN chưa hưởng trợ cấp thất nghiệp, ghi thời gian đóng BHXH, BHTN, BHTNLĐ, BNN cho người tham gia tại đơn vị do BHXH huyện trực tiếp thu, người đang bảo lưu thời gian đóng BHXH, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"b) Giải quyết các trường hợp hồ sơ đề nghị cộng nối thời gian không phải đóng BHXH và điều chỉnh làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thời gian trước ngày 01/01/1995 do BHXH tỉnh phân cấp."},{"k":"p","t":"2.2. BHXH tỉnh"},{"k":"p","t":"a) Cấp mới, cấp lại, điều chỉnh, xác nhận sổ BHXH và ghi thời gian đóng BHTN chưa hưởng trợ cấp thất nghiệp, ghi thời gian đóng BHXH, BHTN, BHTNLĐ, BNN cho người tham gia tại đơn vị do BHXH tỉnh trực tiếp thu, người đã hưởng BHXH hoặc đang bảo lưu thời gian đóng BHXH, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"b) Giải quyết các trường hợp hồ sơ đề nghị cộng nối thời gian không phải đóng BHXH và điều chỉnh làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thời gian trước ngày 01/01/1995."},{"k":"p","t":"3. Cấp thẻ BHYT"},{"k":"p","t":"3.1. BHXH huyện: Cấp mới, cấp lại, đổi thẻ BHYT cho người tham gia BHYT do BHXH huyện thu."},{"k":"p","t":"3.2. BHXH tỉnh: Cấp mới, cấp lại, đổi thẻ BHYT cho người tham gia BHYT tại các đơn vị do BHXH tỉnh trực tiếp thu và người hưởng trợ cấp thất nghiệp trong tỉnh."},{"k":"p","t":"4. BHXH tỉnh căn cứ điều kiện cụ thể của địa phương để phân cấp thu cho BHXH huyện, từ năm 2019 trở đi phân cấp tối thiểu 90% tổng số đơn vị quản lý."}]},{"id":"qd595_4","no":4,"code":"Điều 4","title":"Điều 4. Đối tượng tham gia theo quy định tại Điều 2 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Đối tượng tham gia theo quy định tại Điều 2 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 1. BẢO HIỂM XÃ HỘI BẮT BUỘC","level":1,"content":[{"k":"p","t":"1. Người lao động là công dân Việt Nam thuộc đối tượng tham gia BHXH bắt buộc, bao gồm:"},{"k":"p","t":"1.1. Người làm việc theo HĐLĐ không xác định thời hạn, HĐLĐ xác định thời hạn, HĐLĐ theo mùa vụ hoặc theo một công việc nhất định có thời hạn từ đủ 03 tháng đến dưới 12 tháng, kể cả HĐLĐ được ký kết giữa đơn vị với người đại diện theo pháp luật của người dưới 15 tuổi theo quy định của pháp luật về lao động;"},{"k":"p","t":"1.2. Người làm việc theo HĐLĐ có thời hạn từ đủ 01 tháng đến dưới 03 tháng (thực hiện từ ngày 01/01/2018);"},{"k":"p","t":"1.3. Cán bộ, công chức, viên chức theo quy định của pháp luật về cán bộ, công chức và viên chức;"},{"k":"p","t":"1.4. Công nhân quốc phòng, công nhân công an, người làm công tác khác trong tổ chức cơ yếu đối với trường hợp BHXH Bộ Quốc phòng, BHXH Công an nhân dân bàn giao cho BHXH tỉnh;"},{"k":"p","t":"1.5. Người quản lý doanh nghiệp, người quản lý điều hành hợp tác xã có hưởng tiền lương;"},{"k":"p","t":"1.6. Người hoạt động không chuyên trách ở xã, phường, thị trấn;"},{"k":"p","t":"1.7. Người đi làm việc ở nước ngoài theo hợp đồng quy định tại Luật Người lao động Việt Nam đi làm việc ở nước ngoài theo hợp đồng tham gia bảo hiểm xã hội bắt buộc theo quy định tại Nghị định số 115/2015/NĐ-CP ngày 11/11/2015 của Chính phủ quy định chi tiết một số điều của Luật BHXH về BHXH bắt buộc được áp dụng đối với các hợp đồng sau:"},{"k":"p","t":"a) Hợp đồng đưa người lao động đi làm việc ở nước ngoài với doanh nghiệp hoạt động dịch vụ đưa người lao động đi làm việc ở nước ngoài, tổ chức sự nghiệp được phép đưa người lao động đi làm việc ở nước ngoài;"},{"k":"p","t":"b) Hợp đồng đưa người lao động đi làm việc ở nước ngoài với doanh nghiệp trúng thầu, nhận thầu hoặc tổ chức, cá nhân đầu tư ra nước ngoài có đưa người lao động đi làm việc ở nước ngoài;"},{"k":"p","t":"c) Hợp đồng đưa người lao động đi làm việc ở nước ngoài theo hình thức thực tập nâng cao tay nghề với doanh nghiệp đưa người lao động đi làm việc theo hình thức thực tập nâng cao tay nghề;"},{"k":"p","t":"d) Hợp đồng cá nhân."},{"k":"p","t":"1.8. Người hưởng chế độ phu nhân hoặc phu quân tại cơ quan đại diện Việt Nam ở nước ngoài quy định tại Khoản 4 Điều 123 Luật BHXH;"},{"k":"p","t":"1.9. Người lao động quy định tại các Điểm 1.1, 1.2, 1.3, 1.4, 1.5 và 1.6 Khoản này được cử đi học, thực tập, công tác trong và ngoài nước mà vẫn hưởng tiền lương ở trong nước thuộc diện tham gia BHXH bắt buộc;"},{"k":"p","t":"2. Người lao động là công dân nước ngoài vào làm việc tại Việt Nam có giấy phép lao động hoặc chứng chỉ hành nghề hoặc giấy phép hành nghề do cơ quan có thẩm quyền của Việt Nam cấp (thực hiện từ ngày 01/01/2018 theo quy định của Chính phủ)."},{"k":"p","t":"3. Người sử dụng lao động tham gia BHXH bắt buộc bao gồm: cơ quan nhà nước, đơn vị sự nghiệp, đơn vị vũ trang nhân dân; tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội - nghề nghiệp, tổ chức xã hội khác; cơ quan, tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam; doanh nghiệp, hợp tác xã, hộ kinh doanh cá thể, tổ hợp tác, tổ chức khác và cá nhân có thuê mướn, sử dụng lao động theo HĐLĐ."},{"k":"p","t":"4. Người lao động quy định tại các Điểm 1.1 và 1.2 Khoản 1 Điều này là người giúp việc gia đình và người lao động quy định tại Khoản 1 Điều này mà đang hưởng lương hưu, trợ cấp BHXH hằng tháng và trợ cấp hằng tháng dưới đây thì không thuộc đối tượng tham gia BHXH bắt buộc:"},{"k":"p","t":"a) Người đang hưởng lương hưu hằng tháng;"},{"k":"p","t":"b) Người đang hưởng trợ cấp hằng tháng theo quy định tại Nghị định số 09/1998/NĐ-CP ngày 23/01/1998 của Chính phủ sửa đổi, bổ sung Nghị định số 50/CP ngày 26/7/1995 của Chính phủ về chế độ sinh hoạt phí đối với cán bộ xã, phường, thị trấn;"},{"k":"p","t":"c) Người đang hưởng trợ cấp mất sức lao động hằng tháng;"},{"k":"p","t":"d) Người đang hưởng trợ cấp hằng tháng theo quy định tại Quyết định số 91/2000/QĐ-TTg ngày 04/8/2000 của Thủ tướng Chính phủ về việc trợ cấp cho những người đã hết tuổi lao động tại thời điểm ngừng hưởng trợ cấp mất sức lao động hàng tháng; Quyết định số 613/QĐ-TTg ngày 06/5/2010 của Thủ tướng Chính phủ về việc trợ cấp hàng tháng cho những người có từ đủ 15 năm đến dưới 20 năm công tác thực tế đã hết thời hạn hưởng trợ cấp mất sức lao động;"},{"k":"p","t":"đ) Quân nhân, Công an nhân dân, người làm công tác cơ yếu đang hưởng chế độ trợ cấp hằng tháng theo quy định tại các Quyết định của Thủ tướng Chính phủ: Quyết định số 142/2008/QĐ-TTg ngày 27/10/2008 về thực hiện chế độ đối với quân nhân tham gia kháng chiến chống Mỹ cứu nước có dưới 20 năm công tác trong quân đội đã phục viên, xuất ngũ về địa phương; Quyết định số 38/2010/QĐ-TTg ngày 06/5/2010 về việc sửa đổi, bổ sung Quyết định số 142/2008/QĐ-TTg ngày 27/10/2008; Quyết định số 53/2010/QĐ-TTg ngày 20/8/2010 quy định về chế độ đối với cán bộ, chiến sĩ Công an nhân dân tham gia kháng chiến chống Mỹ có dưới 20 năm công tác trong Công an nhân dân đã thôi việc, xuất ngũ về địa phương; Quyết định số 62/2011/QĐ-TTg ngày 09/11/2011 về chế độ, chính sách đối với đối tượng tham gia chiến tranh bảo vệ Tổ quốc, làm nhiệm vụ quốc tế ở Căm-pu-chia, giúp bạn Lào sau ngày 30/4/1975 đã phục viên, xuất ngũ, thôi việc."}]},{"id":"qd595_5","no":5,"code":"Điều 5","title":"Điều 5. Mức đóng và trách nhiệm đóng theo quy định tại Điều 85, Điều 86 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Mức đóng và trách nhiệm đóng theo quy định tại Điều 85, Điều 86 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 1. BẢO HIỂM XÃ HỘI BẮT BUỘC","level":1,"content":[{"k":"p","t":"1. Mức đóng và trách nhiệm đóng của người lao động"},{"k":"p","t":"1.1. Người lao động quy định tại Điểm 1.1, 1.2, 1.3, 1.4, 1.5, và Tiết b Điểm 1.7 Khoản 1 Điều 4, hằng tháng đóng bằng 8% mức tiền lương tháng vào quỹ hưu trí và tử tuất."},{"k":"p","t":"1.2. Người lao động quy định tại Điểm 1.6 Khoản 1 Điều 4, hằng tháng đóng bằng 8% mức lương cơ sở vào quỹ hưu trí và tử tuất."},{"k":"p","t":"1.3. Người lao động quy định tại Tiết a, c và Tiết d Điểm 1.7 Khoản 1 Điều 4: mức đóng hằng tháng vào quỹ hưu trí và tử tuất bằng 22% mức tiền lương tháng đóng BHXH của người lao động trước khi đi làm việc ở nước ngoài, đối với người lao động đã có quá trình tham gia BHXH bắt buộc; bằng 22% của 02 lần mức lương cơ sở đối với người lao động chưa tham gia BHXH bắt buộc hoặc đã tham gia BHXH bắt buộc nhưng đã hưởng BHXH một lần."},{"k":"p","t":"1.4. Người lao động quy định tại Điểm 1.8 Khoản 1 Điều 4: Mức đóng hằng tháng vào quỹ hưu trí và tử tuất bằng 22% mức tiền lương tháng đóng BHXH của người lao động trước đó đối với người lao động đã có quá trình tham gia BHXH bắt buộc; bằng 22% của 02 lần mức lương cơ sở đối với người lao động chưa tham gia BHXH bắt buộc hoặc đã tham gia BHXH bắt buộc nhưng đã hưởng BHXH một lần."},{"k":"p","t":"1.5. Người lao động quy định tại Khoản 2 Điều 4, thực hiện theo quy định của Chính phủ và hướng dẫn của BHXH Việt Nam."},{"k":"p","t":"1.6. Người lao động quy định tại Khoản 1 Điều 4 và người đang bảo lưu thời gian đóng BHXH bắt buộc còn thiếu tối đa 06 tháng để đủ điều kiện hưởng lương hưu hoặc trợ cấp tuất hằng tháng: mức đóng bằng 22% mức tiền lương tháng đóng BHXH bắt buộc của người lao động trước khi nghỉ việc hoặc chết vào quỹ hưu trí và tử tuất."},{"k":"p","t":"2. Mức đóng và trách nhiệm đóng của đơn vị tại Khoản 3 Điều 4"},{"k":"p","t":"2.1. Đơn vị hằng tháng đóng trên quỹ tiền lương đóng BHXH của người lao động quy định tại các Điểm 1.1, 1.2, 1.3, 1.4, 1.5 và Tiết b Điểm 1.7 Khoản 1 Điều 4 như sau:"},{"k":"p","t":"a) 3% vào quỹ ốm đau và thai sản;"},{"k":"p","t":"b) 14% vào quỹ hưu trí và tử tuất."},{"k":"p","t":"2.2. Đơn vị hằng tháng đóng 14% mức lương cơ sở vào quỹ hưu trí và tử tuất cho người lao động quy định tại điểm 1.6 Khoản 1 Điều 4."}]},{"id":"qd595_6","no":6,"code":"Điều 6","title":"Điều 6. Tiền lương tháng đóng BHXH bắt buộc theo quy định tại Điều 89 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Tiền lương tháng đóng BHXH bắt buộc theo quy định tại Điều 89 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 1. BẢO HIỂM XÃ HỘI BẮT BUỘC","level":1,"content":[{"k":"p","t":"1. Tiền lương do Nhà nước quy định"},{"k":"p","t":"1.1. Người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định thì tiền lương tháng đóng BHXH bắt buộc là tiền lương theo ngạch, bậc, cấp bậc quân hàm và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung, phụ cấp thâm niên nghề (nếu có). Tiền lương này tính trên mức lương cơ sở."},{"k":"p","t":"Tiền lương tháng đóng BHXH bắt buộc quy định tại điểm này bao gồm cả hệ số chênh lệch bảo lưu theo quy định của pháp luật về tiền lương."},{"k":"p","t":"1.2. Người lao động quy định tại Điểm 1.6 Khoản 1 Điều 4 thì tiền lương tháng đóng BHXH là mức lương cơ sở."},{"k":"p","t":"2. Tiền lương do đơn vị quyết định"},{"k":"p","t":"2.1. Từ ngày 01/01/2016 đến ngày 31/12/2017, tiền lương tháng đóng BHXH bắt buộc là mức lương và phụ cấp lương theo quy định tại Khoản 1 và Điểm a Khoản 2 Điều 4 của Thông tư số 47/2015/TT-BLĐTBXH ngày 16/11/2015 của Bộ Lao động - Thương binh và Xã hội hướng dẫn thực hiện một số điều về HĐLĐ, kỷ luật lao động, trách nhiệm vật chất của Nghị định số 05/2015/NĐ-CP ngày 12/01/2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số nội dung của Bộ luật lao động."},{"k":"p","t":"Phụ cấp lương theo quy định tại Điểm a Khoản 2 Điều 4 của Thông tư số 47/2015/TT-BLĐTBXH là các khoản phụ cấp lương để bù đắp yếu tố về điều kiện lao động, tính chất phức tạp công việc, điều kiện sinh hoạt, mức độ thu hút lao động mà mức lương thỏa thuận trong HĐLĐ chưa được tính đến hoặc tính chưa đầy đủ như phụ cấp chức vụ, chức danh; phụ cấp trách nhiệm; phụ cấp nặng nhọc, độc hại, nguy hiểm; phụ cấp thâm niên; phụ cấp khu vực; phụ cấp lưu động; phụ cấp thu hút và các phụ cấp có tính chất tương tự."},{"k":"p","t":"2.2. Từ ngày 01/01/2018 trở đi, tiền lương tháng đóng BHXH bắt buộc là mức lương, phụ cấp lương theo quy định tại Điểm 2.1 Khoản này và các khoản bổ sung khác theo quy định tại Điểm a Khoản 3 Điều 4 của Thông tư số 47/2015/TT-BLĐTBXH."},{"k":"p","t":"2.3. Tiền lương tháng đóng BHXH bắt buộc không bao gồm các khoản chế độ và phúc lợi khác, như tiền thưởng theo quy định tại Điều 103 của Bộ luật lao động, tiền thưởng sáng kiến; tiền ăn giữa ca; các khoản hỗ trợ xăng xe, điện thoại, đi lại, tiền nhà ở, tiền giữ trẻ, nuôi con nhỏ; hỗ trợ khi người lao động có thân nhân bị chết, người lao động có người thân kết hôn, sinh nhật của người lao động, trợ cấp cho người lao động gặp hoàn cảnh khó khăn khi bị tai nạn lao động, bệnh nghề nghiệp và các khoản hỗ trợ, trợ cấp khác ghi thành mục riêng trong HĐLĐ theo Khoản 11 Điều 4 của Nghị định số 05/2015/NĐ-CP."},{"k":"p","t":"2.4. Tiền lương tháng đóng BHXH bắt buộc đối với người quản lý doanh nghiệp có hưởng tiền lương quy định tại Điểm đ Khoản 1 Điều 2 của Nghị định số 115/2015/NĐ-CP là tiền lương do doanh nghiệp quyết định, trừ viên chức quản lý chuyên trách trong công ty trách nhiệm hữu hạn một thành viên do nhà nước làm chủ sở hữu."},{"k":"p","t":"Tiền lương tháng đóng BHXH bắt buộc đối với người quản lý điều hành hợp tác xã có hưởng tiền lương quy định tại Điểm đ Khoản 1 Điều 2 Nghị định số 115/2015/NĐ-CP là tiền lương do đại hội thành viên quyết định."},{"k":"p","t":"2.5. Tiền lương tháng đóng BHXH bắt buộc đối với người đại diện phần vốn nhà nước không chuyên trách tại các tập đoàn kinh tế, tổng công ty, công ty nhà nước sau cổ phần hóa; công ty trách nhiệm hữu hạn hai thành viên trở lên là tiền lương theo chế độ tiền lương của cơ quan, tổ chức đang công tác trước khi được cử làm đại diện phần vốn nhà nước."},{"k":"p","t":"Tiền lương tháng đóng BHXH bắt buộc đối với người đại diện phần vốn nhà nước chuyên trách tại các tập đoàn, tổng công ty, công ty là tiền lương theo chế độ tiền lương do tập đoàn, tổng công ty, công ty quyết định."},{"k":"p","t":"2.6. Mức tiền lương tháng đóng BHXH bắt buộc quy định tại Khoản này không thấp hơn mức lương tối thiểu vùng tại thời điểm đóng đối với người lao động làm công việc hoặc chức danh giản đơn nhất trong điều kiện lao động bình thường."},{"k":"p","t":"a) Người lao động làm công việc hoặc chức danh đòi hỏi lao động qua đào tạo, học nghề (kể cả lao động do doanh nghiệp tự dạy nghề) phải cao hơn ít nhất 7% so với mức lương tối thiểu vùng;"},{"k":"p","t":"b) Người lao động làm công việc hoặc chức danh có điều kiện lao động nặng nhọc, độc hại, nguy hiểm phải cao hơn ít nhất 5%; công việc hoặc chức danh có điều kiện lao động đặc biệt nặng nhọc, độc hại, nguy hiểm phải cao hơn ít nhất 7% so với mức lương của công việc hoặc chức danh có độ phức tạp tương đương, làm việc trong điều kiện lao động bình thường."},{"k":"p","t":"3. Mức tiền lương tháng đóng BHXH bắt buộc quy định tại Điều này cao hơn 20 tháng lương cơ sở thì mức tiền lương tháng đóng BHXH bắt buộc bằng 20 tháng lương cơ sở."}]},{"id":"qd595_7","no":7,"code":"Điều 7","title":"Điều 7. Phương thức đóng theo quy định tại Điều 85, Điều 86 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Phương thức đóng theo quy định tại Điều 85, Điều 86 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 1. BẢO HIỂM XÃ HỘI BẮT BUỘC","level":1,"content":[{"k":"p","t":"1. Đóng hằng tháng"},{"k":"p","t":"Hằng tháng, chậm nhất đến ngày cuối cùng của tháng, đơn vị trích tiền đóng BHXH bắt buộc trên quỹ tiền lương tháng của những người lao động tham gia BHXH bắt buộc, đồng thời trích từ tiền lương tháng đóng BHXH bắt buộc của từng người lao động theo mức quy định, chuyển cùng một lúc vào tài khoản chuyên thu của cơ quan BHXH mở tại ngân hàng hoặc Kho bạc Nhà nước."},{"k":"p","t":"2. Đóng 03 tháng hoặc 06 tháng một lần"},{"k":"p","t":"Đơn vị là doanh nghiệp, hợp tác xã, hộ kinh doanh cá thể, tổ hợp tác hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả lương theo sản phẩm, theo khoán thì đóng theo phương thức hằng tháng hoặc 03 tháng, 06 tháng một lần. Chậm nhất đến ngày cuối cùng của phương thức đóng, đơn vị phải chuyển đủ tiền vào quỹ BHXH."},{"k":"p","t":"3. Đóng theo địa bàn"},{"k":"p","t":"3.1. Đơn vị đóng trụ sở chính ở địa bàn tỉnh nào thì đăng ký tham gia đóng BHXH tại địa bàn tỉnh đó theo phân cấp của BHXH tỉnh."},{"k":"p","t":"3.2. Chi nhánh của doanh nghiệp hoạt động tại địa bàn nào thì đóng BHXH tại địa bàn đó."},{"k":"p","t":"4. Đối với người lao động quy định tại Tiết a, c và d Điểm 1.7 Khoản 1 Điều 4, phương thức đóng là 03 tháng, 06 tháng, 12 tháng một lần hoặc đóng trước một lần theo thời hạn ghi trong hợp đồng đưa người lao động đi làm việc ở nước ngoài. Người lao động đóng trực tiếp cho cơ quan BHXH trước khi đi làm việc ở nước ngoài hoặc đóng qua đơn vị, tổ chức sự nghiệp đưa người lao động đi làm việc ở nước ngoài."},{"k":"p","t":"4.1. Trường hợp đóng qua đơn vị, tổ chức sự nghiệp đưa người lao động đi làm việc ở nước ngoài thì đơn vị, tổ chức sự nghiệp thu, nộp BHXH cho người lao động và đăng ký phương thức đóng cho cơ quan BHXH."},{"k":"p","t":"4.2. Trường hợp người lao động được gia hạn hợp đồng hoặc ký HĐLĐ mới ngay tại nước tiếp nhận lao động thì thực hiện đóng BHXH theo phương thức quy định tại Điều này hoặc truy nộp cho cơ quan BHXH sau khi về nước."},{"k":"p","t":"5. Đối với người lao động quy định tại Điểm 1.8 Khoản 1 Điều 4 thực hiện đóng hằng tháng, 03 tháng hoặc 06 tháng một lần thông qua đơn vị quản lý cán bộ, công chức có phu nhân hoặc phu quân để đóng vào quỹ hưu trí và tử tuất."},{"k":"p","t":"6. Đối với trường hợp đóng cho thời gian còn thiếu không quá 06 tháng quy định tại Điểm 1.6 Khoản 1 Điều 5"},{"k":"p","t":"6.1. Người lao động đóng một lần cho số tháng còn thiếu thông qua đơn vị trước khi nghỉ việc."},{"k":"p","t":"6.2. Người đang bảo lưu thời gian đóng BHXH bắt buộc hoặc thân nhân của người lao động chết đóng một lần cho số tháng còn thiếu tại cơ quan BHXH huyện nơi cư trú."}]},{"id":"qd595_8","no":8,"code":"Điều 8","title":"Điều 8. Đối tượng tham gia theo quy định tại Điều 2 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Đối tượng tham gia theo quy định tại Điều 2 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 2. BẢO HIỂM XÃ HỘI TỰ NGUYỆN","level":1,"content":[{"k":"p","t":"1. Người tham gia BHXH tự nguyện là công dân Việt Nam từ đủ 15 tuổi trở lên và không thuộc đối tượng tham gia BHXH bắt buộc theo quy định của pháp luật về BHXH, bao gồm:"},{"k":"p","t":"1.1. Người lao động làm việc theo HĐLĐ có thời hạn dưới 03 tháng trước ngày 01/01/2018; người lao động làm việc theo HĐLĐ có thời hạn dưới 01 tháng từ ngày 01/01/2018 trở đi;"},{"k":"p","t":"1.2. Người hoạt động không chuyên trách ở thôn, ấp, bản, sóc, làng, tổ dân phố, khu, khu phố;"},{"k":"p","t":"1.3. Người lao động giúp việc gia đình;"},{"k":"p","t":"1.4. Người tham gia các hoạt động sản xuất, kinh doanh, dịch vụ không hưởng tiền lương;"},{"k":"p","t":"1.5. Xã viên không hưởng tiền lương, tiền công làm việc trong hợp tác xã, liên hiệp hợp tác xã;"},{"k":"p","t":"1.6. Người nông dân, người lao động tự tạo việc làm bao gồm những người tự tổ chức hoạt động lao động để có thu nhập cho bản thân và gia đình;"},{"k":"p","t":"1.7. Người lao động đã đủ điều kiện về tuổi đời nhưng chưa đủ điều kiện về thời gian đóng để hưởng lương hưu theo quy định của pháp luật về BHXH;"},{"k":"p","t":"1.8. Người tham gia khác."},{"k":"p","t":"2. Cơ quan, tổ chức và cá nhân có liên quan đến BHXH tự nguyện."}]},{"id":"qd595_9","no":9,"code":"Điều 9","title":"Điều 9. Phương thức đóng theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Phương thức đóng theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 2. BẢO HIỂM XÃ HỘI TỰ NGUYỆN","level":1,"content":[{"k":"p","t":"1. Người tham gia BHXH tự nguyện được chọn một trong các phương thức đóng sau đây để đóng vào quỹ hưu trí và tử tuất:"},{"k":"p","t":"1.1. Đóng hằng tháng;"},{"k":"p","t":"1.2. Đóng 03 tháng một lần;"},{"k":"p","t":"1.3. Đóng 06 tháng một lần;"},{"k":"p","t":"1.4. Đóng 12 tháng một lần;"},{"k":"p","t":"1.5. Đóng một lần cho nhiều năm về sau nhưng không quá 5 năm một lần;"},{"k":"p","t":"1.6. Đóng một lần cho những năm còn thiếu đối với người tham gia BHXH đã đủ điều kiện về tuổi để hưởng lương hưu theo quy định nhưng thời gian đóng BHXH còn thiếu không quá 10 năm (120 tháng) thì được đóng cho đủ 20 năm để hưởng lương hưu."},{"k":"p","t":"Ví dụ 1: Bà A tính đến tháng 3/2017 đủ 55 tuổi và có 15 năm 9 tháng đóng BHXH. Bà A có nguyện vọng tiếp tục tham gia BHXH tự nguyện để đủ điều kiện hưởng lương hưu hằng tháng và lựa chọn phương thức đóng hằng tháng. Đến tháng 4/2017 bà A 55 tuổi 1 tháng và có 15 năm 10 tháng đóng BHXH. Tháng 5/2017 bà A lựa chọn phương thức đóng một lần cho 4 năm 2 tháng còn thiếu và đóng ngay trong tháng này. Như vậy, tính đến hết tháng 5/2017, bà A 55 tuổi 2 tháng và có 20 năm đóng BHXH, đủ điều kiện hưởng lương hưu theo quy định. Thời điểm tính hưởng lương hưu của bà A kể từ tháng 6/2017."},{"k":"p","t":"2. Trường hợp người tham gia BHXH đã đủ tuổi nghỉ hưu theo quy định mà thời gian đã đóng BHXH còn thiếu trên 10 năm nếu có nguyện vọng thì tiếp tục đóng BHXH tự nguyện theo một trong các phương thức quy định tại các Điểm 1.1, 1.2, 1.3, 1.4 và 1.5 Khoản 1 Điều này cho đến khi thời gian đóng BHXH còn thiếu không quá 10 năm thì được đóng một lần cho những năm còn thiếu để hưởng lương hưu theo quy định tại Điểm 1.6. Khoản 1 Điều này."},{"k":"p","t":"Ví dụ 2: Ông B tính đến tháng 8/2016 đủ 60 tuổi và có 8 năm đóng BHXH. Ông B có nguyện vọng tiếp tục tham gia BHXH tự nguyện để đủ điều kiện hưởng lương hưu hằng tháng và lựa chọn phương thức đóng 2 năm một lần cho giai đoạn từ tháng 9/2016 đến tháng 8/2018. Tháng 9/2018 ông B có đủ 10 năm đóng BHXH và đóng một lần cho 10 năm còn thiếu. Như vậy, tính đến hết tháng 9/2018, ông B có 20 năm đóng BHXH, đủ điều kiện hưởng lương hưu theo quy định. Thời điểm tính hưởng lương hưu của ông B kể từ tháng 10/2018."},{"k":"p","t":"3. Thay đổi phương thức đóng BHXH tự nguyện"},{"k":"p","t":"3.1. Người đang tham gia BHXH tự nguyện được thay đổi phương thức đóng khi thực hiện xong phương thức đóng đã chọn trước đó."},{"k":"p","t":"3.2. Trường hợp người tham gia BHXH tự nguyện đã lựa chọn một trong các phương thức đóng quy định tại Khoản 1 Điều này mà đủ điều kiện đóng một lần cho những năm còn thiếu (nam đủ 60 tuổi, nữ đủ 55 tuổi và thời gian đóng BHXH còn thiếu tối đa 10 năm) thì được lựa chọn đóng một lần cho những năm còn thiếu để hưởng lương hưu ngay khi đủ điều kiện mà không phải chờ thực hiện xong phương thức đóng đã chọn trước đó."},{"k":"p","t":"Ví dụ 3: Ông C tham gia BHXH tự nguyện từ tháng 8/2016 và đăng ký với cơ quan BHXH theo phương thức đóng 03 tháng một lần. Sau đó ông C có nguyện vọng được chuyển phương thức đóng sang 6 tháng một lần. Thì việc thay đổi trên được thực hiện sớm nhất là từ tháng 11/2016. Tuy nhiên, tháng 01/2017 ông C đủ 60 tuổi và đã có thời gian đóng BHXH là 10 năm thì ông C được lựa chọn đóng một lần cho những năm còn thiếu tại tháng 01/2017 để hưởng lương hưu."}]},{"id":"qd595_10","no":10,"code":"Điều 10","title":"Điều 10. Mức đóng theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Mức đóng theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 2. BẢO HIỂM XÃ HỘI TỰ NGUYỆN","level":1,"content":[{"k":"p","t":"1. Mức đóng hằng tháng của người tham gia BHXH tự nguyện như sau:"},{"k":"p","t":"Mdt = 22% x Mtnt"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- Mdt: Mức đóng BHXH tự nguyện hằng tháng."},{"k":"p","t":"- Mtnt: mức thu nhập tháng do người tham gia BHXH tự nguyện lựa chọn."},{"k":"p","t":"Mtnt = CN + m x 50.000 (đồng/tháng)"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- CN: Mức chuẩn hộ nghèo của khu vực nông thôn tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"- m: Tham số tự nhiên có giá trị từ 0 đến n."},{"k":"p","t":"Mức thu nhập tháng người tham gia BHXH tự nguyện lựa chọn thấp nhất bằng mức chuẩn hộ nghèo của khu vực nông thôn, cao nhất bằng 20 lần mức lương cơ sở."},{"k":"p","t":"Ví dụ 4: Bà A nêu ở ví dụ 1 đăng ký tham gia BHXH tự nguyện với mức thu nhập tháng lựa chọn là 4.000.000 đồng/tháng. Mức đóng BHXH tự nguyện tháng 4/2017 của bà A sẽ là 880.000 đồng (22% x 4.000.000 đồng)."},{"k":"p","t":"2. Mức đóng 03 tháng hoặc 06 tháng hoặc 12 tháng một lần được xác định bằng mức đóng hằng tháng theo quy định tại Khoản 1 Điều này nhân với 3 đối với phương thức đóng 03 tháng; nhân với 6 đối với phương thức đóng 06 tháng; nhân với 12 đối với phương thức đóng 12 tháng một lần."},{"k":"p","t":"Ví dụ 5: Bà A nêu ở ví dụ 1, đến tháng 4/2017 bà A đăng ký tham gia BHXH tự nguyện vẫn với mức thu nhập tháng lựa chọn là 4.000.000 đồng/tháng nhưng theo phương thức đóng 06 tháng một lần. Mức đóng BHXH tự nguyện 6 tháng của bà A sẽ là 5.280.000 đồng (6 tháng x 880.000 đồng/tháng)."},{"k":"p","t":"3. Mức đóng một lần cho nhiều năm về sau theo quy định tại điểm 1.5 Khoản 1 Điều 9 Quyết định này được tính bằng tổng mức đóng của các tháng đóng trước, chiết khấu theo lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng. Được xác định theo công thức sau:"},{"k":"p","t":"EMBED Equation.3"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- T1: Mức đóng một lần cho n năm về sau (đồng)."},{"k":"p","t":"- Mi: Mức thu nhập tháng do người tham gia BHXH tự nguyện chọn tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"- r: Lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng (%/tháng)."},{"k":"p","t":"- n: Số năm đóng trước do người tham gia BHXH chọn, nhận một trong các giá trị từ 2 đến 5."},{"k":"p","t":"- i: Tham số tự nhiên có giá trị từ 1 đến (n x 12)."},{"k":"p","t":"Ví dụ 6: Ông B nêu ở ví dụ 2 đăng ký tham gia BHXH tự nguyện từ tháng 9/2016 với mức thu nhập tháng lựa chọn là 3.000.000 đồng/tháng, phương thức đóng một lần cho 2 năm về sau. Giả định lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm 2015 là 0,628%/tháng. Mức đóng BHXH tự nguyện cho 2 năm (từ tháng 9/2016 đến tháng 8/2018) của ông B sẽ là:"},{"k":"p","t":"EMBED Equation.3  đồng"},{"k":"p","t":"4. Mức đóng một lần cho những năm còn thiếu theo quy định tại điểm 1.6 Khoản 1 Điều 9 Quyết định này được tính bằng tổng mức đóng của các tháng còn thiếu, áp dụng lãi gộp bằng lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng. Được xác định theo công thức sau:"},{"k":"p","t":"EMBED Equation.3"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- T2: Mức đóng một lần cho những năm còn thiếu (đồng)."},{"k":"p","t":"- Mi: Mức thu nhập tháng do người tham gia BHXH tự nguyện chọn tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"- r: Lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng (%/tháng)."},{"k":"p","t":"- t: Số tháng còn thiếu, nhận một trong các giá trị từ 1 đến 120."},{"k":"p","t":"- i: Tham số tự nhiên có giá trị từ 1 đến t."},{"k":"p","t":"Ví dụ 7: Ông B ở ví dụ 2, tháng 9/2018 lựa chọn phương thức đóng một lần cho 10 năm còn thiếu với mức thu nhập tháng lựa chọn là 3.000.000 đồng/tháng. Giả định lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm 2017 là 0,826%/tháng và mức thu nhập tháng ông B lựa chọn cao hơn mức chuẩn hộ nghèo khu vực nông thôn do Thủ tướng Chính phủ quy định tại thời điểm tháng 9/2018. Mức đóng BHXH tự nguyện cho 10 năm (120 tháng) còn thiếu của ông B sẽ là:"},{"k":"p","t":"EMBED Equation.3  đồng"},{"k":"p","t":"5. Trường hợp người tham gia BHXH tự nguyện đã đóng theo phương thức đóng 03 tháng hoặc 06 tháng hoặc 12 tháng một lần hoặc đóng một lần cho nhiều năm về sau theo quy định tại Khoản 2 và 3 Điều này mà trong thời gian đó Thủ tướng Chính phủ điều chỉnh mức chuẩn hộ nghèo của khu vực nông thôn thì không phải điều chỉnh mức chênh lệch số tiền đã đóng."},{"k":"p","t":"6. Trường hợp người tham gia BHXH tự nguyện đã đóng theo phương thức đóng 03 tháng hoặc 06 tháng hoặc 12 tháng một lần hoặc đóng một lần cho nhiều năm về sau theo quy định tại các Điểm 1.2, 1.3, 1.4 và 1.5 Khoản 1 Điều 9 Quyết định này mà trong thời gian đó thuộc một trong các trường hợp sau đây sẽ được hoàn trả một phần số tiền đã đóng trước đó:"},{"k":"p","t":"6.1. Dừng tham gia BHXH tự nguyện và chuyển sang tham gia BHXH bắt buộc;"},{"k":"p","t":"6.2. Hưởng BHXH một lần theo quy định tại Điều 7 Nghị định 134/2015/NĐ-CP;"},{"k":"p","t":"6.3. Bị chết hoặc Tòa án tuyên bố là đã chết."},{"k":"p","t":"Số tiền hoàn trả cho người tham gia BHXH tự nguyện trong trường hợp quy định tại Điểm 6.1, 6.2 Khoản này hoặc hoàn trả cho thân nhân người lao động trong trường hợp quy định tại Điểm 6.3 Khoản này được tính bằng số tiền đã đóng tương ứng với thời gian còn lại so với thời gian đóng theo phương thức đóng nêu trên và không bao gồm tiền hỗ trợ đóng của Nhà nước (nếu có). Được xác định theo công thức sau:"},{"k":"p","t":"EMBED Equation.3"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- HT: Số tiền hoàn trả (đồng)."},{"k":"p","t":"- Mi: Mức thu nhập tháng do người tham gia BHXH tự nguyện chọn tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"- T: Số tiền hỗ trợ đóng của Nhà nước (nếu có)."},{"k":"p","t":"- r: Lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng (%)."},{"k":"p","t":"- n: Số năm đã đóng trước do người tham gia BHXH chọn, nhận một trong các giá trị từ 2 đến 5."},{"k":"p","t":"- t: Số tháng còn lại của phương thức đóng mà người tham gia BHXH tự nguyện đã đóng."},{"k":"p","t":"- i: Tham số tự nhiên có giá trị từ (nx12-t+1) đến (nx12)."},{"k":"p","t":"Ví dụ 8: Ông B ở ví dụ 6, tại thời điểm tháng 9/2016 đóng BHXH tự nguyện cho 2 năm về sau (từ tháng 9/2016 đến tháng 8/2018). Tuy nhiên, từ tháng 01/2018, ông B tham gia BHXH bắt buộc, số tiền hoàn trả cho ông B được xác định bằng tổng số tiền đã đóng cho các tháng từ tháng 01/2018 đến tháng 8/2018 và trừ đi số tiền hỗ trợ đóng của Nhà nước (giả định là 123.200 đồng) là:"},{"k":"p","t":"EMBED Equation.3  đồng"},{"k":"p","t":"7. Thay đổi mức thu nhập tháng làm căn cứ đóng BHXH tự nguyện"},{"k":"p","t":"7.1. Người đang tham gia BHXH tự nguyện được thay đổi mức thu nhập tháng làm căn cứ đóng khi thực hiện xong phương thức đóng của mức thu nhập tháng đóng BHXH tự nguyện đã chọn trước đó."},{"k":"p","t":"7.2. Trường hợp người tham gia BHXH tự nguyện đã lựa chọn mức thu nhập tháng làm căn cứ đóng BHXH tự nguyện mà đủ điều kiện đóng một lần cho những năm còn thiếu (nam đủ 60 tuổi, nữ đủ 55 tuổi và thời gian đóng BHXH còn thiếu không quá 10 năm) thì được lựa chọn mức thu nhập tháng làm căn cứ đóng BHXH tự nguyện cho những năm còn thiếu để hưởng lương hưu ngay khi đủ điều kiện mà không phải chờ thực hiện xong mức thu nhập tháng đóng BHXH tự nguyện đã chọn trước đó."},{"k":"p","t":"Ví dụ 9: Ông C nêu ở ví dụ 3 tham gia BHXH tự nguyện từ tháng 8/2016 và đăng ký với cơ quan BHXH theo phương thức đóng 03 tháng một lần, mức thu nhập tháng lựa chọn là 4.500.000 đồng/tháng. Sau đó ông C có nguyện vọng được chuyển phương thức đóng sang 6 tháng một lần và thay đổi mức thu nhập tháng làm căn cứ đóng BHXH tự nguyện là 5.000.000 đồng/tháng. Thì việc thay đổi trên được thực hiện sớm nhất là từ tháng 11/2016. Tuy nhiên, tháng 01/2017 ông C đủ 60 tuổi và đã có thời gian đóng BHXH là 10 năm thì ông C được lựa chọn đóng một lần cho những năm còn thiếu và thay đổi mức thu nhập tháng làm căn cứ đóng BHXH tự nguyện tại tháng 01/2017 để hưởng lương hưu."}]},{"id":"qd595_11","no":11,"code":"Điều 11","title":"Điều 11. Thời điểm đóng theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Thời điểm đóng theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 2. BẢO HIỂM XÃ HỘI TỰ NGUYỆN","level":1,"content":[{"k":"p","t":"1. Thời điểm đóng BHXH đối với phương thức đóng quy định tại các điểm 1.1, 1.2, 1.3 và 1.4 Khoản 1 Điều 9 Quyết định này được thực hiện như sau:"},{"k":"p","t":"1.1. Trong tháng đối với phương thức đóng hằng tháng;"},{"k":"p","t":"1.2. Trong 03 tháng đối với phương thức đóng 03 tháng một lần;"},{"k":"p","t":"1.3. Trong 04 tháng đầu đối với phương thức đóng 06 tháng một lần;"},{"k":"p","t":"1.4. Trong 07 tháng đầu đối với phương thức đóng 12 tháng một lần."},{"k":"p","t":"2. Thời điểm đóng BHXH đối với trường hợp đóng một lần cho nhiều năm về sau hoặc đóng một lần cho những năm còn thiếu quy định tại Điểm 1.5 và 1.6 Khoản 1 Điều 9 Quyết định này được thực hiện tại thời điểm đăng ký phương thức đóng và mức thu nhập tháng làm căn cứ đóng."},{"k":"p","t":"3. Quá thời điểm đóng BHXH theo quy định tại Khoản 1 Điều này mà người tham gia BHXH tự nguyện không đóng BHXH thì được coi là tạm dừng đóng BHXH tự nguyện. Người đang tạm dừng đóng BHXH tự nguyện, nếu tiếp tục đóng thì phải đăng ký lại phương thức đóng và mức thu nhập tháng làm căn cứ đóng BHXH với cơ quan BHXH. Trường hợp có nguyện vọng đóng bù cho số tháng chậm đóng trước đó thì số tiền đóng bù được tính bằng tổng mức đóng của các tháng chậm đóng, áp dụng lãi gộp bằng lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng, mức đóng bù cho số tháng chậm đóng được xác định theo công thức sau:"},{"k":"p","t":"T3 = Mđ x (1+r)t"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- T3: Mức đóng bù cho số tháng chậm đóng;"},{"k":"p","t":"- Mđ: Mức đóng hằng tháng; mức đóng 03 tháng, 06 tháng hoặc 12 tháng một lần theo quy định tại Khoản 1 và Khoản 2 Điều 10 Quyết định này."},{"k":"p","t":"- t: Số tháng chậm đóng;"},{"k":"p","t":"- r: Lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng (%/tháng);"},{"k":"p","t":"Ví dụ 10: Ông C ở ví dụ 9 thay đổi phương thức đóng BHXH tự nguyện theo phương thức 06 tháng một lần với mức thu nhập tháng làm căn cứ đóng là 5.000.000 đồng/tháng, số tiền phải đóng là: 6.600.000 đồng (5.000.000 đồng/tháng x 22% x 6 tháng)."},{"k":"p","t":"Tuy nhiên, ông C không thực hiện đóng trong khoảng thời gian từ tháng 11/2016 đến tháng 02/2017. Đến tháng 6/2017, ông C tới cơ quan BHXH đề nghị đóng bù cho 06 tháng chưa đóng (từ tháng 11/2016 đến tháng 4/2017). Số tháng chậm đóng từ tháng 03/2017 đến tháng 6/2017 là 4 tháng. Giả định lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm 2016 là 0,826%. Mức đóng bù của ông C là: 6.820.781 đồng [6.600.000 đồng x (1 + 0,00826)4 = 6.820.781 đồng]."},{"k":"p","t":"Trường hợp, đến tháng 3/2017 ông C đến cơ quan BHXH đề nghị đóng bù cho phương thức 06 tháng chưa đóng. Số tháng chậm đóng từ tháng 3/2017 đến tháng 3/2017 là 1 tháng. Giả định lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm 2016 là 0,826%. Mức đóng bù của ông C là: 6.654.516 đồng [6.600.000 đồng x (1 + 0,00826) = 6.654.516 đồng]."}]},{"id":"qd595_12","no":12,"code":"Điều 12","title":"Điều 12. Hỗ trợ tiền đóng BHXH cho người tham gia BHXH tự nguyện theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Hỗ trợ tiền đóng BHXH cho người tham gia BHXH tự nguyện theo quy định tại Điều 87 Luật BHXH và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 2. BẢO HIỂM XÃ HỘI TỰ NGUYỆN","level":1,"content":[{"k":"p","t":"1. Mức hỗ trợ và đối tượng hỗ trợ:"},{"k":"p","t":"1.1. Đối tượng hỗ trợ và tỷ lệ hỗ trợ đóng BHXH của Nhà nước"},{"k":"p","t":"Người tham gia BHXH tự nguyện được Nhà nước hỗ trợ tiền đóng theo tỷ lệ phần trăm (%) trên mức đóng BHXH hằng tháng theo mức chuẩn hộ nghèo của khu vực nông thôn, cụ thể:"},{"k":"p","t":"a) Bằng 30% đối với người tham gia BHXH tự nguyện thuộc hộ nghèo;"},{"k":"p","t":"b) Bằng 25% đối với người tham gia BHXH tự nguyện thuộc hộ cận nghèo;"},{"k":"p","t":"c) Bằng 10% đối với các đối tượng khác."},{"k":"p","t":"1.2. Mức hỗ trợ:"},{"k":"p","t":"a) Mức hỗ trợ tiền đóng hằng tháng được tính bằng công thức sau:"},{"k":"p","t":"Mht = k x 22% x CN"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- k: là tỷ lệ phần trăm hỗ trợ của Nhà nước (%), cụ thể: k = 30% với người tham gia thuộc hộ nghèo; k = 25% với người tham gia thuộc hộ cận nghèo; và k = 10% với các đối tượng khác."},{"k":"p","t":"- CN: Mức chuẩn hộ nghèo của khu vực nông thôn làm căn cứ xác định mức hỗ trợ là mức chuẩn hộ nghèo do Thủ tướng Chính phủ quy định tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"b) Mức hỗ trợ tiền đóng đối với người tham gia BHXH đóng theo phương thức 3 tháng một lần, 06 tháng một lần, 12 tháng một lần hoặc một lần cho nhiều năm về sau được tính bằng công thức sau:"},{"k":"p","t":"Mht = n x k x 22% x CN"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- n: Số tháng được hỗ trợ tương ứng với các phương thức đóng 3 tháng một lần, 06 tháng một lần, 12 tháng một lần hoặc một lần cho nhiều năm về sau."},{"k":"p","t":"- k: Tỷ lệ phần trăm hỗ trợ của Nhà nước (%), cụ thể: k= 30% với người tham gia thuộc hộ nghèo; k= 25% với người tham gia thuộc hộ cận nghèo; và k= 10% với các đối tượng khác."},{"k":"p","t":"- CN: Mức chuẩn hộ nghèo của khu vực nông thôn làm căn cứ xác định mức hỗ trợ là mức chuẩn hộ nghèo do Thủ tướng Chính phủ quy định tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"c) Mức hỗ trợ tiền đóng đối với người tham gia BHXH đóng theo phương thức một lần cho những năm còn thiếu được tính bằng công thức sau:"},{"k":"p","t":"EMBED Equation.3"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"- k: Tỷ lệ phần trăm hỗ trợ của Nhà nước (%);"},{"k":"p","t":"- CN: Mức chuẩn hộ nghèo của khu vực nông thôn làm căn cứ xác định mức hỗ trợ là mức chuẩn hộ nghèo do Thủ tướng Chính phủ quy định tại thời điểm đóng (đồng/tháng)."},{"k":"p","t":"- r: Lãi suất đầu tư quỹ BHXH bình quân tháng do BHXH Việt Nam công bố của năm trước liền kề với năm đóng (%/tháng)."},{"k":"p","t":"- t: Số tháng còn thiếu, nhận một trong các giá trị từ 1 đến 120."},{"k":"p","t":"- i: Tham số tự nhiên có giá trị từ 1 đến t."},{"k":"p","t":"Số tiền hỗ trợ đối với người tham gia BHXH tự nguyện đóng theo phương thức một lần cho những năm còn thiếu được Nhà nước chuyển toàn bộ một lần vào quỹ hưu trí và tử tuất trong cùng năm đóng."},{"k":"p","t":"Ví dụ 11: Bà H thuộc hộ gia đình cận nghèo tham gia BHXH tự nguyện từ tháng 6/2018 với mức thu nhập tháng lựa chọn là 800.000 đồng/tháng, phương thức đóng 12 tháng một lần. Giả định mức chuẩn hộ nghèo của khu vực nông thôn tại thời điểm tháng 6/2018 là 700.000 đồng/tháng. Số tiền đóng BHXH tự nguyện của bà H cho thời gian từ tháng 6/2018 đến tháng 5/2019 sẽ là: 1.650.000 đồng [(22% x 800.000 đồng/tháng - 25% x 22% x 700.000 đồng/tháng) x 12 tháng]."},{"k":"p","t":"- Từ tháng 01/2019 bà H không còn thuộc hộ nghèo và hộ cận nghèo, tuy nhiên do đã đóng đến hết tháng 5/2019 nên không điều chỉnh mức chênh lệch số tiền đã đóng."},{"k":"p","t":"- Từ tháng 6/2019, bà H chuyển sang phương thức đóng hằng tháng vẫn với mức thu nhập tháng lựa chọn là 800.000 đồng/tháng (giả định mức chuẩn hộ nghèo của khu vực nông thôn tại thời điểm tháng 6/2019 vẫn là 700.000 đồng/tháng). Số tiền đóng BHXH tự nguyện hằng tháng của bà H từ tháng 6/2019 sẽ là: 160.600 đồng/tháng (22% x 800.000 đồng/tháng - 10% x 22% x 700.000 đồng/tháng)."},{"k":"p","t":"- Trường hợp bà H tham gia BHXH tự nguyện liên tục từ tháng 6/2018 đến hết tháng 5/2028 thì thời gian dừng hỗ trợ tiền đóng đối với bà H từ tháng 6/2028."},{"k":"p","t":"2. Thời gian hỗ trợ tùy thuộc vào thời gian tham gia BHXH tự nguyện thực tế của mỗi người nhưng không quá 10 năm (120 tháng)."},{"k":"p","t":"3. Phương thức hỗ trợ"},{"k":"p","t":"3.1. Người tham gia BHXH tự nguyện thuộc đối tượng được hỗ trợ nộp số tiền đóng BHXH phần thuộc trách nhiệm đóng của mình cho cơ quan BHXH hoặc đại lý thu;"},{"k":"p","t":"3.2. Định kỳ 03 tháng, 06 tháng hoặc 12 tháng, cơ quan BHXH tổng hợp số đối tượng được hỗ trợ, số tiền thu của đối tượng và số tiền ngân sách nhà nước hỗ trợ (mẫu D06-TS), gửi cơ quan tài chính để chuyển kinh phí vào quỹ BHXH;"},{"k":"p","t":"3.3. Cơ quan tài chính căn cứ quy định về phân cấp quản lý ngân sách của địa phương và bảng tổng hợp đối tượng tham gia BHXH tự nguyện, kinh phí ngân sách nhà nước hỗ trợ do cơ quan BHXH chuyển đến, có trách nhiệm chuyển kinh phí vào quỹ BHXH mỗi quý một lần; chậm nhất đến ngày 31/12 hằng năm phải thực hiện xong việc chuyển kinh phí hỗ trợ vào quỹ BHXH của năm đó."},{"k":"p","t":"4. Hoàn trả tiền hỗ trợ đóng BHXH của Nhà nước"},{"k":"p","t":"4.1. Số tiền Nhà nước đã hỗ trợ tiền đóng đối với người hưởng BHXH một lần (trừ người đang bị mắc một trong những bệnh nguy hiểm đến tính mạng như ung thư, bại liệt, xơ gan cổ chướng, phong, lao nặng, nhiễm HIV đã chuyển sang giai đoạn AIDS và những bệnh khác theo quy định của Bộ Y tế) và người tham gia BHXH tự nguyện được hoàn trả một phần số tiền đã đóng, được hoàn trả cho ngân sách nước."},{"k":"p","t":"4.2. Số tiền hoàn trả bằng số tiền Nhà nước đã hỗ trợ tiền đóng BHXH đối với người tham gia BHXH tự nguyện."},{"k":"p","t":"5. Việc hỗ trợ tiền đóng BHXH của Nhà nước đối với người tham gia BHXH tự nguyện được thực hiện từ ngày 01/01/2018. Không hỗ trợ tiền đóng đối với thời gian đóng BHXH tự nguyện trước ngày 01/01/2018, trừ trường hợp đóng một lần cho những năm còn thiếu."},{"k":"p","t":"Trường hợp người tham gia BHXH tự nguyện đã đóng theo các phương thức đóng 03 tháng hoặc 06 tháng hoặc 12 tháng một lần hoặc đóng một lần cho nhiều năm về sau mà trong đó có thời gian sau thời điểm thực hiện chính sách hỗ trợ tiền đóng thì không áp dụng hỗ trợ tiền đóng đối với thời gian đã đóng BHXH tự nguyện."}]},{"id":"qd595_13","no":13,"code":"Điều 13","title":"Điều 13. Đối tượng tham gia theo quy định tại Điều 43 Luật Việc làm và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Đối tượng tham gia theo quy định tại Điều 43 Luật Việc làm và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 3. BẢO HIỂM THẤT NGHIỆP","level":1,"content":[{"k":"p","t":"1. Người lao động"},{"k":"p","t":"1.1. Người lao động tham gia BHTN khi làm việc theo HĐLĐ hoặc HĐLV như sau:"},{"k":"p","t":"a) HĐLĐ hoặc HĐLV không xác định thời hạn;"},{"k":"p","t":"b) HĐLĐ hoặc HĐLV xác định thời hạn;"},{"k":"p","t":"c) HĐLĐ theo mùa vụ hoặc theo một công việc nhất định có thời hạn từ đủ 3 tháng đến dưới 12 tháng."},{"k":"p","t":"1.2. Người đang hưởng lương hưu, trợ cấp mất sức lao động hằng tháng; người giúp việc gia đình có giao kết HĐLĐ với đơn vị quy định tại Khoản 2 Điều này không thuộc đối tượng tham gia BHTN."},{"k":"p","t":"2. Đơn vị tham gia BHTN"},{"k":"p","t":"Đơn vị tham gia BHTN là những đơn vị quy định tại Khoản 3 Điều 4."}]},{"id":"qd595_14","no":14,"code":"Điều 14","title":"Điều 14. Mức đóng và trách nhiệm đóng theo quy định tại Điều 57 Luật Việc làm và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Mức đóng và trách nhiệm đóng theo quy định tại Điều 57 Luật Việc làm và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 3. BẢO HIỂM THẤT NGHIỆP","level":1,"content":[{"k":"p","t":"1. Người lao động đóng bằng 1% tiền lương tháng;"},{"k":"p","t":"2. Đơn vị đóng bằng 1% quỹ tiền lương tháng của những người lao động đang tham gia BHTN."}]},{"id":"qd595_15","no":15,"code":"Điều 15","title":"Điều 15. Tiền lương tháng đóng BHTN theo quy định tại Điều 58 Luật Việc làm và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Tiền lương tháng đóng BHTN theo quy định tại Điều 58 Luật Việc làm và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 3. BẢO HIỂM THẤT NGHIỆP","level":1,"content":[{"k":"p","t":"1. Người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định thì tiền lương tháng đóng BHTN là tiền lương làm căn cứ đóng BHXH bắt buộc quy định tại Khoản 1 và Khoản 3 Điều 6."},{"k":"p","t":"2. Người lao động đóng BHTN theo chế độ tiền lương do đơn vị quyết định thì tiền lương tháng đóng BHTN là tiền lương làm căn cứ đóng BHXH bắt buộc quy định tại Khoản 2 Điều 6. Trường hợp mức tiền lương tháng của người lao động cao hơn 20 tháng lương tối thiểu vùng thì mức tiền lương tháng đóng BHTN bằng 20 tháng lương tối thiểu vùng."}]},{"id":"qd595_16","no":16,"code":"Điều 16","title":"Điều 16. Phương thức đóng","shortTitle":"Phương thức đóng","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 3. BẢO HIỂM THẤT NGHIỆP","level":1,"content":[{"k":"p","t":"Phương thức đóng BHTN đối với đơn vị và người lao động như quy định tại Khoản 1, 2 và 3 Điều 7."}]},{"id":"qd595_17","no":17,"code":"Điều 17","title":"Điều 17. Đối tượng tham gia BHYT theo quy định tại Điều 12 Luật BHYT và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Đối tượng tham gia BHYT theo quy định tại Điều 12 Luật BHYT và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 4. BẢO HIỂM Y TẾ","level":1,"content":[{"k":"p","t":"1. Nhóm do người lao động và đơn vị đóng, bao gồm:"},{"k":"p","t":"1.1. Người lao động làm việc theo HĐLĐ không xác định thời hạn, HĐLĐ có thời hạn từ đủ 3 tháng trở lên, người lao động là người quản lý doanh nghiệp, quản lý điều hành Hợp tác xã hưởng tiền lương, làm việc tại các cơ quan, đơn vị, tổ chức quy định tại Khoản 3 Điều 4."},{"k":"p","t":"1.2. Cán bộ, công chức, viên chức theo quy định của pháp luật về cán bộ, công chức, viên chức."},{"k":"p","t":"1.3. Người hoạt động không chuyên trách ở xã, phường, thị trấn theo quy định của pháp luật về cán bộ, công chức."},{"k":"p","t":"1.4. Đối tượng do người lao động, Công an đơn vị, địa phương đóng BHYT:"},{"k":"p","t":"a) Công dân được tạm tuyển trước khi chính thức được tuyển chọn vào Công an nhân dân."},{"k":"p","t":"b) Công nhân Công an."},{"k":"p","t":"c) Người lao động làm việc theo hợp đồng không xác định thời hạn, hợp đồng có thời hạn từ đủ 3 tháng trở lên."},{"k":"p","t":"2. Nhóm do tổ chức BHXH đóng, bao gồm:"},{"k":"p","t":"2.1. Người hưởng lương hưu, trợ cấp mất sức lao động hằng tháng;"},{"k":"p","t":"2.2. Người đang hưởng trợ cấp BHXH hằng tháng do bị tai nạn lao động - bệnh nghề nghiệp không làm việc và hưởng lương tại đơn vị;"},{"k":"p","t":"2.3. Người lao động nghỉ việc đang hưởng chế độ ốm đau theo quy định của pháp luật về BHXH do mắc bệnh thuộc danh mục bệnh cần chữa trị dài ngày theo quy định của Bộ trưởng Bộ Y tế; Công nhân cao su đang hưởng trợ cấp hằng tháng theo Quyết định số 206/CP ngày 30/5/1979 của Hội đồng Chính phủ (nay là Chính phủ) về chính sách đối với công nhân mới giải phóng làm nghề nặng nhọc, có hại sức khỏe nay già yếu phải thôi việc;"},{"k":"p","t":"2.4. Người từ đủ 80 tuổi trở lên đang hưởng trợ cấp tuất hằng tháng;"},{"k":"p","t":"2.5. Cán bộ xã, phường, thị trấn đã nghỉ việc đang hưởng trợ cấp BHXH hằng tháng;"},{"k":"p","t":"2.6. Người đang hưởng trợ cấp thất nghiệp;"},{"k":"p","t":"2.7. Người lao động nghỉ việc hưởng chế độ thai sản theo quy định của pháp luật về BHXH."},{"k":"p","t":"3. Nhóm do ngân sách nhà nước đóng, bao gồm:"},{"k":"p","t":"3.1. Cán bộ xã, phường, thị trấn đã nghỉ việc đang hưởng trợ cấp từ ngân sách nhà nước hằng tháng bao gồm các đối tượng theo quy định tại Quyết định số 130/CP ngày 20/6/1975 của Hội đồng Chính phủ (nay là Chính phủ) bổ sung chính sách, chế độ đối với cán bộ xã và Quyết định số 111/HĐBT ngày 13/10/1981 của Hội đồng Bộ trưởng (nay là Chính phủ) về việc sửa đổi, bổ sung một số chính sách, chế độ đối với cán bộ xã, phường;"},{"k":"p","t":"3.2. Người đã thôi hưởng trợ cấp mất sức lao động đang hưởng trợ cấp hằng tháng từ ngân sách nhà nước theo Quyết định số 613/QĐ-TTg ngày 01/6/2010 của Thủ tướng Chính phủ; Quyết định số 91/2000/QĐ-TTg ngày 04/7/2000 của Thủ tướng Chính phủ;"},{"k":"p","t":"3.3. Người có công với cách mạng, cựu chiến binh, bao gồm:"},{"k":"p","t":"a) Người có công với cách mạng theo quy định tại Pháp lệnh Ưu đãi người có công với cách mạng;"},{"k":"p","t":"b) Cựu chiến binh, bao gồm:"},{"k":"p","t":"- Cựu chiến binh tham gia kháng chiến từ ngày 30/4/1975 trở về trước hoặc tham gia chiến tranh bảo vệ Tổ quốc, làm nhiệm vụ quốc tế ở Campuchia, giúp bạn Lào sau ngày 30/4/1975 theo quy định tại Khoản 2 Điều 1 Nghị định số 157/2016/NĐ-CP ngày 24/11/2016 của Chính phủ sửa đổi, bổ sung Nghị định số 150/2006/NĐ-CP ngày 12/12/2006 quy định chi tiết và hướng dẫn thi hành một số điều pháp lệnh cựu chiến binh;"},{"k":"p","t":"- Người được hưởng chính sách theo Quyết định số 290/2005/QĐ-TTg ngày 08/11/2005 của Thủ tướng Chính phủ về chế độ, chính sách đối với một số đối tượng trực tiếp tham gia kháng chiến chống Mỹ cứu nước nhưng chưa được hưởng chính sách của Đảng và Nhà nước và Quyết định số 188/2007/QĐ-TTg ngày 06/12/2007 của Thủ tướng Chính phủ về việc sửa đổi, bổ sung Quyết định số 290/2005/QĐ-TTg;"},{"k":"p","t":"- Cán bộ, chiến sĩ Công an nhân dân được hưởng chế độ theo Quyết định số 53/2010/QĐ-TTg ngày 20/8/2010 của Thủ tướng Chính phủ;"},{"k":"p","t":"- Quân nhân được hưởng chế độ theo Quyết định số 142/2008/QĐ-TTg ngày 27/10/2008 của Thủ tướng Chính phủ và Quyết định số 38/2010/QĐ-TTg ngày 06/5/2010 của Thủ tướng Chính phủ về việc sửa đổi, bổ sung Quyết định số 142/2008/QĐ-TTg;"},{"k":"p","t":"- Người được hưởng chế độ chính sách theo Quyết định số 62/2011/QĐ-TTg ngày 09/11/2011 của Thủ tướng Chính phủ về chế độ, chính sách đối với đối tượng tham gia chiến tranh bảo vệ Tổ quốc, làm nhiệm vụ quốc tế ở Căm-pu-chia, giúp bạn Lào sau ngày 30/4/1975 đã phục viên, xuất ngũ, thôi việc;"},{"k":"p","t":"c) Thanh niên xung phong được hưởng chế độ theo Quyết định số 170/2008/QĐ-TTg ngày 18/12/2008 của Thủ tướng Chính phủ về chế độ BHYT và trợ cấp mai táng phí đối với thanh niên xung phong thời kỳ kháng chiến chống Pháp và Quyết định số 40/2011/QĐ-TTg ngày 27/7/2011 của Thủ tướng Chính phủ quy định về chế độ đối với thanh niên xung phong đã hoàn thành nhiệm vụ trong kháng chiến;"},{"k":"p","t":"d) Dân công hỏa tuyến tham gia kháng chiến chống Pháp, chống Mỹ, chiến tranh bảo vệ Tổ quốc và làm nhiệm vụ quốc tế theo quy định tại Quyết định số 49/2015/QĐ-TTg ngày 14/10/2015 của Thủ tướng Chính phủ về một số chế độ, chính sách đối với dân công hỏa tuyến tham gia kháng chiến chống Pháp, chống Mỹ và làm nhiệm vụ quốc tế."},{"k":"p","t":"3.4. Đại biểu được bầu cử giữ chức vụ theo nhiệm kỳ Quốc hội, đại biểu Hội đồng nhân dân các cấp đương nhiệm;"},{"k":"p","t":"3.5. Trẻ em dưới 6 tuổi (bao gồm toàn bộ trẻ em cư trú trên địa bàn, kể cả trẻ em là thân nhân của người trong lực lượng vũ trang theo quy định, không phân biệt hộ khẩu thường trú);"},{"k":"p","t":"3.6. Người thuộc diện hưởng trợ cấp bảo trợ xã hội hằng tháng quy định tại Nghị định số 136/2013/NĐ-CP ngày 21/10/2013 của Chính phủ quy định chính sách trợ giúp xã hội đối với đối tượng bảo trợ xã hội, Nghị định số 06/2011/NĐ-CP ngày 14/01/2011 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật người cao tuổi và Nghị định số 28/2012/NĐ-CP ngày 10/4/2012 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật người khuyết tật;"},{"k":"p","t":"3.7. Người thuộc hộ gia đình nghèo; người dân tộc thiểu số đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn; người đang sinh sống tại vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn; người đang sinh sống tại xã đảo, huyện đảo theo Nghị quyết của Chính phủ, Quyết định của Thủ tướng Chính phủ và Quyết định của Bộ trưởng, Chủ nhiệm Ủy ban Dân tộc;"},{"k":"p","t":"3.8. Thân nhân của người có công với cách mạng là cha đẻ, mẹ đẻ, vợ hoặc chồng, con của liệt sỹ; người có công nuôi dưỡng liệt sỹ;"},{"k":"p","t":"3.9. Thân nhân của người có công với cách mạng, trừ các đối tượng quy định tại Điểm 3.8 Khoản này, bao gồm:"},{"k":"p","t":"a) Cha đẻ, mẹ đẻ, vợ hoặc chồng, con từ trên 6 tuổi đến dưới 18 tuổi hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi học hoặc bị khuyết tật nặng, khuyết tật đặc biệt nặng của các đối tượng: người hoạt động cách mạng trước ngày 01/01/1945; người hoạt động cách mạng từ ngày 01/01/1945 đến ngày khởi nghĩa tháng Tám năm 1945; Anh hùng Lực lượng vũ trang nhân dân, Anh hùng Lao động trong thời kỳ kháng chiến; thương binh, bệnh binh suy giảm khả năng lao động từ 61% trở lên; người hoạt động kháng chiến bị nhiễm chất độc hóa học suy giảm khả năng lao động từ 61% trở lên;"},{"k":"p","t":"b) Con đẻ từ trên 6 tuổi của người hoạt động kháng chiến bị nhiễm chất độc hóa học bị dị dạng, dị tật do hậu quả của chất độc hóa học không tự lực được trong sinh hoạt hoặc suy giảm khả năng tự lực trong sinh hoạt."},{"k":"p","t":"3.10. Người đã hiến bộ phận cơ thể người theo quy định của pháp luật về hiến, lấy, ghép mô, bộ phận cơ thể người và hiến, lấy xác;"},{"k":"p","t":"3.11. Người nước ngoài đang học tập tại Việt Nam, sinh viên là người nước ngoài đang học tập tại trường Công an nhân dân được cấp học bổng từ ngân sách của Nhà nước Việt Nam; học sinh trường văn hóa Công an nhân dân;"},{"k":"p","t":"3.12. Người phục vụ người có công với cách mạng, bao gồm:"},{"k":"p","t":"a) Người phục vụ Bà mẹ Việt Nam anh hùng sống ở gia đình;"},{"k":"p","t":"b) Người phục vụ thương binh, bệnh binh suy giảm khả năng lao động từ 81% trở lên sống ở gia đình;"},{"k":"p","t":"c) Người phục vụ người hoạt động kháng chiến bị nhiễm chất độc hóa học suy giảm khả năng lao động từ 81% trở lên sống ở gia đình."},{"k":"p","t":"3.13. Nghệ nhân nhân dân, nghệ nhân ưu tú được nhà nước phong tặng thuộc hộ gia đình có thu nhập bình quân đầu người hằng tháng thấp hơn mức lương cơ sở do Chính phủ quy định, gồm:"},{"k":"p","t":"a) Người đủ 55 tuổi trở lên đối với nữ và đủ 60 tuổi trở lên đối với nam không có người có nghĩa vụ và quyền phụng dưỡng;"},{"k":"p","t":"b) Người khuyết tật nặng hoặc đặc biệt nặng;"},{"k":"p","t":"c) Người mắc một trong các bệnh cần chữa trị dài ngày theo danh mục do Bộ Y tế quy định;"},{"k":"p","t":"d) Các đối tượng còn lại không thuộc đối tượng quy định tại các Điểm a, b và c nêu trên."},{"k":"p","t":"3.14. Người làm công tác cơ yếu hưởng lương như đối với quân nhân đang công tác tại tổ chức cơ yếu thuộc các Bộ (trừ Bộ Quốc phòng), ngành, địa phương;"},{"k":"p","t":"3.15. Thân nhân sĩ quan, hạ sĩ quan đang công tác, hạ sĩ quan, chiến sĩ nghĩa vụ, học viên Công an nhân dân đang học tập tại các trường trong và ngoài Công an nhân dân hưởng sinh hoạt phí từ ngân sách nhà nước; thân nhân của người làm công tác cơ yếu hưởng lương như đối với quân nhân đang công tác tại các Bộ (không bao gồm đối tượng do BHXH Bộ Quốc phòng cấp thẻ BHYT), ngành, địa phương, gồm:"},{"k":"p","t":"a) Bố đẻ, mẹ đẻ của cán bộ, chiến sĩ; bố đẻ, mẹ đẻ của vợ hoặc chồng cán bộ, chiến sĩ; người nuôi dưỡng hợp pháp của cán bộ, chiến sĩ, của vợ hoặc chồng cán bộ, chiến sĩ;"},{"k":"p","t":"b) Vợ hoặc chồng cán bộ, chiến sĩ;"},{"k":"p","t":"c) Con đẻ, con nuôi hợp pháp của cán bộ, chiến sĩ chưa đủ 18 tuổi; con đẻ, con nuôi hợp pháp của cán bộ, chiến sĩ từ đủ 18 tuổi trở lên nhưng bị tàn tật, mất khả năng lao động theo quy định của pháp luật;"},{"k":"p","t":"d) Thành viên khác trong gia đình mà cán bộ, chiến sĩ hoặc người làm công tác cơ yếu có trách nhiệm nuôi dưỡng theo quy định của pháp luật hôn nhân và gia đình chưa đủ 18 tuổi hoặc từ đủ 18 tuổi trở lên nhưng bị tàn tật, mất khả năng lao động theo quy định của pháp luật."},{"k":"p","t":"4. Nhóm được ngân sách nhà nước hỗ trợ mức đóng, bao gồm:"},{"k":"p","t":"4.1. Người thuộc hộ gia đình cận nghèo;"},{"k":"p","t":"4.2. Học sinh, sinh viên đang theo học tại các cơ sở giáo dục thuộc hệ thống giáo dục quốc dân, kể cả sinh viên hệ dân sự đang học tập tại các trường Công an nhân dân;"},{"k":"p","t":"4.3. Người thuộc hộ gia đình làm nông nghiệp, lâm nghiệp, ngư nghiệp và diêm nghiệp có mức sống trung bình."},{"k":"p","t":"5. Nhóm tham gia BHYT theo hộ gia đình, bao gồm:"},{"k":"p","t":"5.1. Toàn bộ người có tên trong sổ hộ khẩu, trừ đối tượng quy định tại các Khoản 1, 2, 3 và 4 Điều này và người đã khai báo tạm vắng;"},{"k":"p","t":"5.2. Toàn bộ những người có tên trong sổ tạm trú, trừ đối tượng quy định tại các Khoản 1, 2, 3 và 4 Điều này."},{"k":"p","t":"6. Các đối tượng được bổ sung theo quy định của cơ quan có thẩm quyền."},{"k":"p","t":"7. Trường hợp một người đồng thời thuộc nhiều đối tượng tham gia BHYT khác nhau quy định tại Điều này thì đóng BHYT theo đối tượng đầu tiên mà người đó được xác định theo thứ tự của các đối tượng quy định tại Điều này."},{"k":"p","t":"7.1. Trẻ em dưới 6 tuổi là con đẻ, con nuôi của người trong lực lượng vũ trang tham gia theo đối tượng trẻ em dưới 6 tuổi quy định tại Điểm 3.5 Khoản 3 Điều này do UBND xã nơi cư trú lập danh sách tham gia BHYT, ngân sách địa phương đảm bảo nguồn đóng BHYT;"},{"k":"p","t":"7.2. Người hoạt động không chuyên trách ở xã, phường, thị trấn quy định tại Điểm 1.3 Khoản 1 Điều này đồng thời thuộc nhiều đối tượng tham gia BHYT khác nhau thì đóng theo thứ tự như sau: do tổ chức BHXH đóng, do ngân sách nhà nước đóng, do đối tượng và UBND cấp xã đóng."}]},{"id":"qd595_18","no":18,"code":"Điều 18","title":"Điều 18. Mức đóng, trách nhiệm đóng BHYT của các đối tượng theo quy định tại Điều 13 Luật BHYT và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Mức đóng, trách nhiệm đóng BHYT của các đối tượng theo quy định tại Điều 13 Luật BHYT và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 4. BẢO HIỂM Y TẾ","level":1,"content":[{"k":"p","t":"1. Đối tượng tại Điểm 1.1, 1.2, Khoản 1 Điều 17: mức đóng hằng tháng bằng 4,5% mức tiền lương tháng, trong đó người sử dụng lao động đóng 3%; người lao động đóng 1,5%. Tiền lương tháng đóng BHYT là tiền lương tháng đóng BHXH bắt buộc quy định tại Điều 6."},{"k":"p","t":"Đối với đối tượng quy định tại Điểm 1.4 Khoản 1 Điều 17: Mức đóng hằng tháng bằng 4,5% tiền lương tháng theo ngạch bậc và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung (đối với người lao động thực hiện chế độ tiền lương do Nhà nước quy định) hoặc 4,5% tiền lương tháng ghi trong HĐLĐ (đối với người lao động hưởng tiền lương, tiền công theo quy định của người sử dụng lao động); trong đó, Công an đơn vị, địa phương đóng 3%, người lao động đóng 1,5%."},{"k":"p","t":"2. Đối tượng tại Điểm 1.3 Khoản 1 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở, trong đó UBND xã đóng 3%; người lao động đóng 1,5%."},{"k":"p","t":"3. Đối tượng tại Điểm 2.1 Khoản 2 Điều 17: mức đóng hằng tháng bằng 4,5% tiền lương hưu, trợ cấp mất sức lao động, do cơ quan BHXH đóng."},{"k":"p","t":"4. Đối tượng tại Điểm 2.2, 2.3, 2.4, 2.5 Khoản 2 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở, do cơ quan BHXH đóng."},{"k":"p","t":"5. Đối tượng tại Điểm 2.6 Khoản 2 Điều 17: mức đóng hằng tháng bằng 4,5% tiền trợ cấp thất nghiệp, do cơ quan BHXH đóng."},{"k":"p","t":"6. Đối tượng tại Điểm 2.7 Khoản 2 Điều 17: mức đóng hằng tháng bằng 4,5% tiền lương tháng trước khi nghỉ thai sản, do cơ quan BHXH đóng."},{"k":"p","t":"7. Đối tượng tại Điểm 3.1, 3.3, 3.4, 3.5, 3.6, 3.7, 3.8, 3.9, 3.10, 3.12, 3.13, 3.15 Khoản 3 Điều 17 và đối tượng người thuộc hộ gia đình cận nghèo được ngân sách nhà nước hỗ trợ 100% mức đóng tại Điểm 4.1 Khoản 4 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do ngân sách nhà nước đóng."},{"k":"p","t":"8. Đối tượng tại Điểm 3.11 Khoản 3 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do cơ quan, tổ chức, đơn vị cấp học bổng đóng."},{"k":"p","t":"Đối tượng quy định tại Điểm 3.14 Khoản 3 Điều 17: Mức đóng hằng tháng bằng 4,5% tiền lương tháng theo ngạch bậc và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung, phụ cấp thâm niên nghề (nếu có)."},{"k":"p","t":"9. Đối tượng tại Điểm 3.2 Khoản 3 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do cơ quan BHXH đóng từ nguồn kinh phí chi lương hưu, trợ cấp BHXH hằng tháng do ngân sách nhà nước đảm bảo."},{"k":"p","t":"10. Đối tượng tại Điểm 4.1 Khoản 4 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do đối tượng tự đóng và được ngân sách nhà nước hỗ trợ tối thiểu 70% mức đóng."},{"k":"p","t":"11. Đối tượng tại Điểm 4.2 Khoản 4 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do đối tượng tự đóng và được ngân sách nhà nước hỗ trợ tối thiểu 30% mức đóng."},{"k":"p","t":"12. Đối tượng tại Điểm 4.3 Khoản 4 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do đối tượng tự đóng và được ngân sách nhà nước hỗ trợ tối thiểu 30% mức đóng."},{"k":"p","t":"13. Đối tượng tại Khoản 5 Điều 17: Mức đóng hằng tháng bằng 4,5% mức lương cơ sở do đối tượng tự đóng và được giảm mức đóng như sau:"},{"k":"p","t":"a) Người thứ nhất đóng bằng mức quy định."},{"k":"p","t":"b) Người thứ hai, thứ ba, thứ tư đóng lần lượt bằng 70%, 60%, 50% mức đóng của người thứ nhất."},{"k":"p","t":"c) Từ người thứ năm trở đi đóng bằng 40% mức đóng của người thứ nhất."}]},{"id":"qd595_19","no":19,"code":"Điều 19","title":"Điều 19. Phương thức đóng BHYT theo quy định tại Điều 15 Luật BHYT và các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Phương thức đóng BHYT theo quy định tại Điều 15 Luật BHYT và các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 4. BẢO HIỂM Y TẾ","level":1,"content":[{"k":"p","t":"1. Đối tượng tại Khoản 1 Điều 17: như quy định tại Khoản 1, 2 và 3 Điều 7."},{"k":"p","t":"2. Đối tượng tại Khoản 2 và Điểm 3.2 Khoản 3 Điều 17: hằng tháng, cơ quan BHXH chuyển tiền đóng BHYT từ quỹ BHXH, quỹ BHTN sang quỹ BHYT."},{"k":"p","t":"3. Đối tượng tại Điểm 3.1, 3.3, 3.4, 3.5, 3.6, 3.7, 3.8, 3.9, 3.10, 3.12, 3.13, 3.15 Khoản 3 Điều 17 và đối tượng được ngân sách nhà nước hỗ trợ 100% mức đóng tại Điểm 4.1 Khoản 4 Điều 17: hằng quý, cơ quan tài chính, cơ quan quản lý đối tượng chuyển tiền đóng BHYT vào quỹ BHYT; chậm nhất đến ngày 31/12 hằng năm phải thực hiện xong việc chuyển kinh phí vào quỹ BHYT của năm đó."},{"k":"p","t":"Đối tượng quy định tại Điểm 3.14 Khoản 3 Điều 17: hằng tháng, chậm nhất đến ngày cuối cùng của tháng, đơn vị đóng BHYT theo quy định tại Khoản 1 Điều 18 vào quỹ BHYT."},{"k":"p","t":"Trường hợp người thuộc hộ gia đình nghèo tại Điểm 3.7 Khoản 3 Điều 17 và người thuộc hộ gia đình cận nghèo được ngân sách nhà nước hỗ trợ 100% mức đóng tại Điểm 4.1 Khoản 4 Điều 17 mà cơ quan BHXH nhận được danh sách đối tượng tham gia BHYT kèm theo Quyết định phê duyệt danh sách người thuộc hộ gia đình nghèo, người thuộc hộ gia đình cận nghèo của cơ quan nhà nước có thẩm quyền sau ngày 01/01 thì thực hiện thu và cấp thẻ BHYT từ ngày Quyết định có hiệu lực. Trường hợp có hướng dẫn khác của cơ quan có thẩm quyền thì thực hiện theo hướng dẫn."},{"k":"p","t":"4. Đối tượng tại Điểm 3.11 Khoản 3 Điều 17: Cơ quan, đơn vị cấp học bổng chuyển tiền đóng BHYT vào quỹ BHYT hằng tháng."},{"k":"p","t":"5. Đối tượng tại Điểm 4.1, 4.3 Khoản 4 Điều 17: định kỳ 03 tháng, 06 tháng hoặc 12 tháng, đại diện hộ gia đình, cá nhân đóng phần thuộc trách nhiệm phải đóng cho Đại lý thu hoặc đóng tại cơ quan BHXH. Trường hợp không tham gia đúng thời hạn được hưởng chính sách theo quyết định phê duyệt của cấp có thẩm quyền, khi tham gia thì phải tham gia hết thời hạn còn lại theo quyết định được hưởng chính sách. Trường hợp tham gia vào các ngày trong tháng thì số tiền đóng BHYT được xác định theo tháng kể từ ngày đóng tiền BHYT."},{"k":"p","t":"6. Đối tượng tại Điểm 4.2 Khoản 4 Điều 17: định kỳ 03 tháng, 06 tháng hoặc 12 tháng học sinh, sinh viên đóng phần thuộc trách nhiệm phải đóng cho nhà trường đang học."},{"k":"p","t":"7. Đối tượng tại Khoản 5 Điều 17: định kỳ 03 tháng, 06 tháng hoặc 12 tháng, người đại diện hộ gia đình trực tiếp nộp tiền đóng BHYT cho cơ quan BHXH hoặc đại lý thu BHYT tại cấp xã."},{"k":"p","t":"8. Xác định số tiền đóng, hỗ trợ đóng đối với một số đối tượng khi Nhà nước điều chỉnh mức đóng BHYT, mức lương cơ sở"},{"k":"p","t":"8.1. Đối với nhóm đối tượng quy định tại Khoản 3 Điều 17 và đối tượng người thuộc hộ gia đình cận nghèo quy định tại Điểm 4.1 Khoản 4 Điều 17 được ngân sách nhà nước hỗ trợ 100% mức đóng:"},{"k":"p","t":"Số tiền ngân sách nhà nước đóng, hỗ trợ 100% mức đóng được xác định theo mức đóng BHYT và mức lương cơ sở tương ứng với thời hạn sử dụng ghi trên thẻ BHYT. Khi Nhà nước điều chỉnh mức đóng BHYT, điều chỉnh mức lương cơ sở thì số tiền ngân sách nhà nước đóng, hỗ trợ được điều chỉnh kể từ ngày áp dụng mức đóng BHYT mới, mức lương cơ sở mới."},{"k":"p","t":"8.2. Trường hợp đối tượng tại Khoản 4, Khoản 5 Điều 17 đã đóng BHYT một lần cho 03 tháng, 06 tháng hoặc 12 tháng mà trong thời gian này Nhà nước điều chỉnh mức lương cơ sở thì không phải đóng bổ sung phần chênh lệch theo mức lương cơ sở mới."}]},{"id":"qd595_20","no":20,"code":"Điều 20","title":"Điều 20. Hoàn trả tiền đóng BHYT","shortTitle":"Hoàn trả tiền đóng BHYT","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 4. BẢO HIỂM Y TẾ","level":1,"content":[{"k":"p","t":"1. Người đang tham gia BHYT theo đối tượng tại Khoản 4, 5 Điều 17 được hoàn trả tiền đóng BHYT trong các trường hợp sau:"},{"k":"p","t":"1.1. Người tham gia được cấp thẻ BHYT theo nhóm đối tượng mới, nay báo giảm giá trị sử dụng thẻ đã cấp trước đó (có thứ tự đóng xếp sau đối tượng mới theo quy định tại Điều 12 Luật BHYT);"},{"k":"p","t":"1.2. Được ngân sách nhà nước điều chỉnh tăng hỗ trợ mức đóng BHYT;"},{"k":"p","t":"1.3. Bị chết trước khi thẻ BHYT có giá trị sử dụng."},{"k":"p","t":"2. Số tiền hoàn trả"},{"k":"p","t":"Số tiền hoàn trả tính theo mức đóng BHYT và thời gian đã đóng tiền nhưng chưa sử dụng thẻ. Thời gian đã đóng tiền nhưng chưa sử dụng thẻ được tính từ thời điểm sau đây:"},{"k":"p","t":"2.1. Từ thời điểm thẻ BHYT được cấp theo nhóm mới bắt đầu có giá trị sử dụng đối với đối tượng tại Điểm 1.1 Khoản 1 Điều này."},{"k":"p","t":"2.2. Từ thời điểm quyết định của cơ quan có thẩm quyền có hiệu lực đối với đối tượng tại Điểm 1.2 Khoản 1 Điều này."},{"k":"p","t":"2.3. Từ thời điểm thẻ có giá trị sử dụng đối với đối tượng tại Điểm 1.3 Khoản 1 Điều này."}]},{"id":"qd595_21","no":21,"code":"Điều 21","title":"Điều 21. Đối tượng tham gia theo quy định tại Điều 43 Luật An toàn, Vệ sinh lao động các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Đối tượng tham gia theo quy định tại Điều 43 Luật An toàn, Vệ sinh lao động các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 5. BẢO HIỂM TAI NẠN LAO ĐỘNG, BỆNH NGHỀ NGHIỆP","level":1,"content":[{"k":"p","t":"1. Cán bộ, công chức, viên chức và người lao động Việt Nam làm việc theo HĐLĐ thuộc đối tượng tham gia BHTNLĐ, BNN bắt buộc, bao gồm:"},{"k":"p","t":"1.1. Cán bộ, công chức, viên chức theo quy định của pháp luật về cán bộ, công chức và viên chức;"},{"k":"p","t":"1.2. Người làm việc theo HĐLĐ không xác định thời hạn và HĐLĐ có thời hạn từ đủ 03 tháng trở lên và người làm việc theo HĐLĐ có thời hạn từ đủ 01 tháng đến dưới 03 tháng (thực hiện từ ngày 01/01/2018). Không bao gồm người lao động là người giúp việc gia đình;"},{"k":"p","t":"1.3. Người quản lý doanh nghiệp, người quản lý Điều hành hợp tác xã có hưởng tiền lương;"},{"k":"p","t":"1.4. Trường hợp người lao động giao kết HĐLĐ với nhiều người sử dụng lao động thì người sử dụng lao động phải đóng BHTNLĐ, BNN theo từng HĐLĐ đã giao kết nếu người lao động thuộc đối tượng phải tham gia BHXH bắt buộc."},{"k":"p","t":"2. Người sử dụng lao động theo quy định tại Khoản 3 Điều 4."},{"k":"p","t":"3. Cơ quan, tổ chức, cá nhân có liên quan đến bảo hiểm tai nạn lao động, bệnh nghề nghiệp."}]},{"id":"qd595_22","no":22,"code":"Điều 22","title":"Điều 22. Mức đóng và phương thức đóng theo quy định tại Điều 44 Luật An toàn, Vệ sinh lao động các văn bản hướng dẫn thi hành, cụ thể như sau:","shortTitle":"Mức đóng và phương thức đóng theo quy định tại Điều 44 Luật An toàn, Vệ sinh lao động các văn bản hướng dẫn thi hành, cụ thể như sau:","chuong":"Chương II — ĐỐI TƯỢNG, MỨC ĐÓNG VÀ PHƯƠNG THỨC ĐÓNG","muc":"Mục 5. BẢO HIỂM TAI NẠN LAO ĐỘNG, BỆNH NGHỀ NGHIỆP","level":1,"content":[{"k":"p","t":"1. Từ ngày 01/6/2017, người sử dụng lao động hằng tháng đóng bằng 0,5% trên quỹ tiền lương đóng BHXH của người lao động quy định tại Khoản 1 Điều 21."},{"k":"p","t":"2. Trường hợp người sử dụng lao động là doanh nghiệp, hợp tác xã, hộ kinh doanh cá thể, tổ hợp tác hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả lương theo sản phẩm hoặc khoán được thực hiện theo phương thức hằng tháng, 03 tháng hoặc 06 tháng một lần."}]},{"id":"qd595_23","no":23,"code":"Điều 23","title":"Điều 23. Đăng ký, điều chỉnh đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; cấp sổ BHXH, thẻ BHYT","shortTitle":"Đăng ký, điều chỉnh đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; cấp sổ BHXH, thẻ BHYT","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 1. HỒ SƠ THAM GIA, ĐÓNG BHXH, BHYT, BHTN, BHTNLĐ, BNN; CẤP SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Thành phần hồ sơ"},{"k":"p","t":"1.1. Người lao động"},{"k":"p","t":"a) Đối với người lao động đang làm việc tại đơn vị:"},{"k":"p","t":"- Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"- Trường hợp người lao động được hưởng quyền lợi BHYT cao hơn: bổ sung Giấy tờ chứng minh (nếu có) theo Phụ lục 03."},{"k":"p","t":"b) Đối với người lao động đi làm việc ở nước ngoài theo hợp đồng tại Tiết a, c và d Điểm 1.7 Khoản 1 Điều 4:"},{"k":"p","t":"- Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"- Hợp đồng lao động có thời hạn ở nước ngoài hoặc HĐLĐ được gia hạn kèm theo văn bản gia hạn HĐLĐ hoặc HĐLĐ được ký mới tại nước tiếp nhận lao động theo hợp đồng."},{"k":"p","t":"1.2. Đơn vị:"},{"k":"p","t":"a) Tờ khai đơn vị tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK3-TS)."},{"k":"p","t":"b) Danh sách lao động tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu D02-TS)."},{"k":"p","t":"c) Bảng kê thông tin (Mẫu D01-TS)."},{"k":"p","t":"2. Số lượng hồ sơ: 01 bộ."}]},{"id":"qd595_24","no":24,"code":"Điều 24","title":"Điều 24. Đăng ký, đăng ký lại, điều chỉnh đóng BHXH tự nguyện; cấp sổ BHXH","shortTitle":"Đăng ký, đăng ký lại, điều chỉnh đóng BHXH tự nguyện; cấp sổ BHXH","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 1. HỒ SƠ THAM GIA, ĐÓNG BHXH, BHYT, BHTN, BHTNLĐ, BNN; CẤP SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Thành phần hồ sơ:"},{"k":"p","t":"1.1. Người tham gia: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"1.2. Đại lý thu/Cơ quan BHXH (đối với trường hợp người tham gia đăng ký trực tiếp tại cơ quan BHXH): Danh sách người tham gia BHXH tự nguyện (Mẫu D05-TS)."},{"k":"p","t":"2. Số lượng hồ sơ: 01 bộ."}]},{"id":"qd595_25","no":25,"code":"Điều 25","title":"Điều 25. Đăng ký đóng, cấ
