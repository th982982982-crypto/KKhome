p thẻ BHYT đối với người chỉ tham gia BHYT","shortTitle":"Đăng ký đóng, cấp thẻ BHYT đối với người chỉ tham gia BHYT","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 1. HỒ SƠ THAM GIA, ĐÓNG BHXH, BHYT, BHTN, BHTNLĐ, BNN; CẤP SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Thành phần hồ sơ"},{"k":"p","t":"1.1. Người tham gia"},{"k":"p","t":"a) Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"b) Đối với người đã hiến bộ phận cơ thể người theo quy định của pháp luật: Giấy ra viện có ghi rõ \"đã hiến bộ phận cơ thể\"."},{"k":"p","t":"c) Trường hợp người tham gia được hưởng quyền lợi BHYT cao hơn: bổ sung Giấy tờ chứng minh (nếu có) theo Phụ lục 03."},{"k":"p","t":"1.2. UBND xã; Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội; Đại lý thu/Nhà trường; Cơ quan BHXH: Danh sách người chỉ tham gia BHYT (Mẫu D03-TS)."},{"k":"p","t":"2. Số lượng hồ sơ: 01 bộ."}]},{"id":"qd595_26","no":26,"code":"Điều 26","title":"Điều 26. Hoàn trả tiền đã đóng đối với người tham gia BHXH tự nguyện, người có từ 2 sổ BHXH trở lên có thời gian đóng BHXH, BHTN trùng nhau, người tham gia BHYT theo hộ gia đình, người tham gia BHYT được ngân sách nhà nước hỗ trợ một phần mức đóng","shortTitle":"Hoàn trả tiền đã đóng đối với người tham gia BHXH tự nguyện, người có từ 2 sổ BHXH trở lên có thời gian đóng BHXH, BHTN trùng nhau, người tham gia BHYT theo hộ gia đình, người tham gia BHYT được ngân sách nhà nước hỗ trợ một phần mức đóng","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 1. HỒ SƠ THAM GIA, ĐÓNG BHXH, BHYT, BHTN, BHTNLĐ, BNN; CẤP SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Thành phần hồ sơ"},{"k":"p","t":"1.1. Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"1.2. Sổ BHXH đối với người tham gia BHXH tự nguyện, người có thời gian đóng BHXH, BHTN trùng nhau nộp tất cả các sổ BHXH."},{"k":"p","t":"1.3. Văn bản chứng thực hoặc bản kèm theo bản chính Giấy chứng tử đối với trường hợp chết."},{"k":"p","t":"2. Số lượng hồ sơ: 01 bộ."}]},{"id":"qd595_27","no":27,"code":"Điều 27","title":"Điều 27. Cấp lại, đổi, điều chỉnh nội dung trên sổ BHXH, thẻ BHYT","shortTitle":"Cấp lại, đổi, điều chỉnh nội dung trên sổ BHXH, thẻ BHYT","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 2. HỒ SƠ CẤP LẠI SỔ BHXH, THẺ BHYT VÀ ĐIỀU CHỈNH NỘI DUNG ĐÃ GHI TRÊN SỔ BHXH, THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Cấp lại sổ BHXH do mất, hỏng"},{"k":"p","t":"1.1. Thành phần hồ sơ: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"1.2. Số lượng hồ sơ: 01 bộ."},{"k":"p","t":"2. Cấp lại sổ BHXH do thay đổi họ, tên, chữ đệm; ngày, tháng, năm sinh; giới tính, dân tộc; quốc tịch; điều chỉnh nội dung đã ghi trên sổ BHXH"},{"k":"p","t":"2.1. Thành phần hồ sơ"},{"k":"p","t":"a) Người tham gia"},{"k":"p","t":"- Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"- Hồ sơ kèm theo (Mục 3,4 Phụ lục 01)."},{"k":"p","t":"b) Đơn vị: Bảng kê thông tin (Mẫu D01-TS)."},{"k":"p","t":"2.2. Số lượng hồ sơ: 01 bộ."},{"k":"p","t":"3. Ghi xác nhận thời gian đóng BHXH cho người tham gia được cộng nối thời gian nhưng không phải đóng BHXH và điều chỉnh làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm trước năm 1995"},{"k":"p","t":"3.1. Thành phần hồ sơ"},{"k":"p","t":"a) Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1 -TS)."},{"k":"p","t":"b) Hồ sơ kèm theo (Mục 1, 2 Phụ lục 01)."},{"k":"p","t":"3.2. Số lượng hồ sơ: 01 bộ."},{"k":"p","t":"4. Cấp lại, đổi thẻ BHYT"},{"k":"p","t":"4.1. Thành phần hồ sơ"},{"k":"p","t":"a) Người tham gia"},{"k":"p","t":"- Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"- Trường hợp người lao động được hưởng quyền lợi BHYT cao hơn: bổ sung Giấy tờ chứng minh (nếu có) theo Phụ lục 03."},{"k":"p","t":"b) Đơn vị: Bảng kê thông tin (Mẫu D01-TS)."},{"k":"p","t":"4.2. Số lượng hồ sơ: 01 bộ."}]},{"id":"qd595_28","no":28,"code":"Điều 28","title":"Điều 28. Thu BHXH, BHYT, BHTN, BHTNLĐ, BNN","shortTitle":"Thu BHXH, BHYT, BHTN, BHTNLĐ, BNN","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 3. THỜI HẠN GIẢI QUYẾT HỒ SƠ","level":1,"content":[{"k":"p","t":"1. Trường hợp tạm dừng đóng vào quỹ hưu trí, tử tuất: không quá 05 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"2. Truy thu"},{"k":"p","t":"2.1. Đối với trường hợp vi phạm quy định của pháp luật về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN: không quá 10 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"2.2. Đối với trường hợp điều chỉnh tăng tiền lương đã đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN: không quá 03 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"3. Hoàn trả"},{"k":"p","t":"3.1. Đối tượng tham gia BHXH tự nguyện, người tham gia BHYT theo hộ gia đình và người được ngân sách nhà nước hỗ trợ một phần mức đóng BHYT: không quá 05 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"3.2. Đối tượng cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN: không quá 10 ngày kể từ ngày nhận đủ hồ sơ theo quy định."}]},{"id":"qd595_29","no":29,"code":"Điều 29","title":"Điều 29. Cấp sổ BHXH","shortTitle":"Cấp sổ BHXH","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 3. THỜI HẠN GIẢI QUYẾT HỒ SƠ","level":1,"content":[{"k":"p","t":"1. Cấp mới: Đối với người tham gia BHXH bắt buộc, BHXH tự nguyện: không quá 05 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"2. Cấp lại sổ BHXH do thay đổi họ, tên, chữ đệm; ngày, tháng, năm sinh; giới tính, dân tộc; quốc tịch; sổ BHXH do mất, hỏng; cộng nối thời gian nhưng không phải đóng BHXH hoặc gộp sổ BHXH: không quá 10 ngày kể từ ngày nhận đủ hồ sơ theo quy định. Trường hợp cần phải xác minh quá trình đóng BHXH ở tỉnh khác hoặc nhiều đơn vị nơi người lao động có thời gian làm việc thì không quá 45 ngày nhưng phải có văn bản thông báo cho người lao động biết."},{"k":"p","t":"3. Điều chỉnh nội dung đã ghi trên sổ BHXH: không quá 05 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"4. Xác nhận sổ BHXH: không quá 05 ngày kể từ ngày nhận đủ hồ sơ theo quy định."}]},{"id":"qd595_30","no":30,"code":"Điều 30","title":"Điều 30. Cấp thẻ BHYT","shortTitle":"Cấp thẻ BHYT","chuong":"Chương III — HỒ SƠ VÀ THỜI HẠN GIẢI QUYẾT","muc":"Mục 3. THỜI HẠN GIẢI QUYẾT HỒ SƠ","level":1,"content":[{"k":"p","t":"1. Cấp mới: không quá 05 ngày kể từ ngày nhận đủ hồ sơ theo quy định. Riêng đối với người hưởng trợ cấp thất nghiệp: không quá 02 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"2. Cấp lại, đổi thẻ BHYT"},{"k":"p","t":"2.1. Trường hợp không thay đổi thông tin: không quá 02 ngày kể từ ngày nhận đủ hồ sơ theo quy định. Từ ngày 01/01/2019 trở đi: trong ngày khi nhận đủ hồ sơ theo quy định."},{"k":"p","t":"2.2. Trường hợp thay đổi thông tin: không quá 03 ngày kể từ ngày nhận đủ hồ sơ theo quy định."},{"k":"p","t":"2.3. Trường hợp người tham gia đang điều trị tại các cơ sở KCB, thực hiện trong ngày khi nhận đủ hồ sơ theo quy định."}]},{"id":"qd595_31","no":31,"code":"Điều 31","title":"Điều 31. Người tham gia","shortTitle":"Người tham gia","chuong":"Chương IV — QUY TRÌNH THU; CẤP SỔ BHXH, THẺ BHYT","muc":"","level":1,"content":[{"k":"p","t":"1. Người tham gia BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN"},{"k":"p","t":"1.1. Kê khai và nộp hồ sơ"},{"k":"p","t":"a) Người tham gia BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN kê khai hồ sơ theo quy định tại Điều 23 và nộp hồ sơ cho đơn vị nơi đang làm việc."},{"k":"p","t":"b) Người đi lao động ở nước ngoài theo hợp đồng tại Tiết a, c và d Điểm 1.7 Khoản 1 Điều 4 kê khai hồ sơ và nộp như sau:"},{"k":"p","t":"- Trường hợp đóng qua đơn vị đưa người lao động đi làm việc ở nước ngoài: Kê khai hồ sơ theo quy định tại Tiết b Điểm 1.1 Khoản 1 Điều 23 nộp cho đơn vị."},{"k":"p","t":"- Trường hợp đóng trực tiếp cho cơ quan BHXH nơi cư trú của người lao động trước khi đi làm việc ở nước ngoài: Kê khai hồ sơ theo quy định tại Tiết b Điểm 1.1 Khoản 1 Điều 23 nộp cho cơ quan BHXH."},{"k":"p","t":"- Trường hợp người lao động được gia hạn hợp đồng hoặc ký HĐLĐ mới ngay tại nước tiếp nhận lao động truy nộp sau khi về nước: Kê khai hồ sơ theo quy định tại Tiết b Điểm 1.1 Khoản 1 Điều 23 nộp cho đơn vị hoặc nộp cho cơ quan BHXH."},{"k":"p","t":"c) Các trường hợp cấp lại, đổi, điều chỉnh nội dung đã ghi trên sổ BHXH, thẻ BHYT; cộng nối thời gian nhưng không phải đóng BHXH: kê khai hồ sơ theo quy định tại Điều 27 và nộp hồ sơ như sau:"},{"k":"p","t":"- Người đang làm việc nộp cho đơn vị nơi đang làm việc hoặc nộp cho cơ quan BHXH."},{"k":"p","t":"- Người đang bảo lưu thời gian đóng BHXH, người đã được giải quyết hưởng lương hưu, trợ cấp BHXH đề nghị cấp lại, điều chỉnh nội dung trên sổ BHXH: nộp cho cơ quan BHXH."},{"k":"p","t":"1.2. Đóng tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN"},{"k":"p","t":"a) Hằng tháng hoặc 03 tháng, 06 tháng theo phương thức đóng của đơn vị, đơn vị trích từ tiền lương của người lao động theo mức quy định để chuyển đóng vào tài khoản chuyên thu của cơ quan BHXH."},{"k":"p","t":"b) Người đi lao động ở nước ngoài theo hợp đồng đóng thông qua đơn vị, kể cả người lao động được gia hạn hợp đồng hoặc ký HĐLĐ mới ngay tại nước tiếp nhận lao động truy đóng sau khi về nước: nộp tiền cho cơ quan BHXH hoặc đơn vị nơi nhận hồ sơ truy nộp."},{"k":"p","t":"c) Người lao động có thời gian đóng BHXH chưa đủ 15 năm (kể cả người lao động đang bảo lưu thời gian đóng BHXH), nếu còn thiếu tối đa 06 tháng mà bị chết, nếu có thân nhân đủ điều kiện hưởng chế độ tuất hằng tháng theo quy định tại Khoản 2 Điều 25 Thông tư số 59/2015/TT-BLĐTBXH ngày 29/12/2015 của Bộ Lao động - Thương binh và Xã hội quy định chi tiết và hướng dẫn thi hành một số điều của Luật BHXH về BHXH bắt buộc thì thân nhân người lao động lập Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS), kèm theo sổ BHXH của người lao động, để đóng tiền vào quỹ hưu trí và tử tuất tại BHXH huyện nơi cư trú với mức đóng hằng tháng bằng 22% mức tiền lương tháng đóng BHXH trước khi chết cho số tháng còn thiếu để được hưởng trợ cấp tuất hằng tháng."},{"k":"p","t":"1.3. Nhận kết quả:"},{"k":"p","t":"a) Thông báo mã số BHXH."},{"k":"p","t":"b) Sổ BHXH, thẻ BHYT."},{"k":"p","t":"c) Tờ rời sổ BHXH (hằng năm)."},{"k":"p","t":"2. Người tham gia BHXH tự nguyện"},{"k":"p","t":"2.1. Kê khai và nộp hồ sơ: Kê khai hồ sơ theo quy định tại Điều 24, Điều 26 và Điều 27 nộp hồ sơ cho Đại lý thu hoặc cho cơ quan BHXH."},{"k":"p","t":"2.2. Đóng tiền: Đóng tiền cho Đại lý thu hoặc cơ quan BHXH theo phương thức đăng ký."},{"k":"p","t":"2.3. Nhận kết quả:"},{"k":"p","t":"a) Thông báo mã số BHXH."},{"k":"p","t":"b) Sổ BHXH."},{"k":"p","t":"c) Tờ rời sổ BHXH."},{"k":"p","t":"3. Người chỉ tham gia BHYT"},{"k":"p","t":"3.1. Kê khai hồ sơ: kê khai hồ sơ theo quy định tại Điều 25, Điều 26, Khoản 4 Điều 27 và nộp hồ sơ như sau:"},{"k":"p","t":"a) Người tham gia do tổ chức BHXH đóng BHYT: nộp hồ sơ cho UBND xã hoặc cho cơ quan BHXH. Đối với người đang hưởng trợ cấp thất nghiệp khi cấp lại, đổi thẻ BHYT: nộp hồ sơ cho cơ quan BHXH."},{"k":"p","t":"b) Người tham gia do ngân sách nhà nước đóng BHYT: nộp hồ sơ cho UBND xã."},{"k":"p","t":"Trường hợp điều chỉnh thông tin nộp hồ sơ cho UBND xã hoặc cho cơ quan BHXH."},{"k":"p","t":"Người đã hiến bộ phận cơ thể: nộp Giấy ra viện cho cơ quan BHXH."},{"k":"p","t":"c) Người được ngân sách nhà nước hỗ trợ một phần mức đóng BHYT: nộp hồ sơ cho Đại lý thu hoặc cho cơ quan BHXH. Đối với học sinh, sinh viên đóng BHYT theo nhà trường thì nộp hồ sơ cho nhà trường."},{"k":"p","t":"d) Người tham gia BHYT theo hộ gia đình: nộp hồ sơ cho Đại lý thu hoặc cho cơ quan BHXH."},{"k":"p","t":"3.2. Đóng tiền:"},{"k":"p","t":"- Người tham gia BHYT theo hộ gia đình, người được ngân sách hỗ trợ một phần mức đóng BHYT: nộp tiền cho Đại lý thu hoặc nộp trực tiếp cho cơ quan BHXH huyện."},{"k":"p","t":"- Học sinh, sinh viên: nộp tiền cho nhà trường."},{"k":"p","t":"3.3. Nhận kết quả:"},{"k":"p","t":"a) Thông báo mã số BHXH."},{"k":"p","t":"b) Thẻ BHYT."}]},{"id":"qd595_32","no":32,"code":"Điều 32","title":"Điều 32. Đơn vị sử dụng lao động, UBND xã, Đại lý thu/nhà trường, Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội và cơ quan quản lý đối tượng","shortTitle":"Đơn vị sử dụng lao động, UBND xã, Đại lý thu/nhà trường, Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội và cơ quan quản lý đối tượng","chuong":"Chương IV — QUY TRÌNH THU; CẤP SỔ BHXH, THẺ BHYT","muc":"","level":1,"content":[{"k":"p","t":"1. Đơn vị sử dụng lao động"},{"k":"p","t":"1.1. Nhận hồ sơ của người lao động theo quy định tại Điều 23, Điều 27."},{"k":"p","t":"1.2. Kê khai hồ sơ"},{"k":"p","t":"a) Đăng ký, điều chỉnh đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; cấp sổ BHXH, thẻ BHYT hằng tháng: theo quy định tại Điều 23."},{"k":"p","t":"b) Cấp lại, đổi, điều chỉnh nội dung đã ghi trên sổ BHXH, thẻ BHYT: theo quy định tại Điều 27."},{"k":"p","t":"- Đối với người lao động nộp hồ sơ thông qua đơn vị: Lập Bảng kê thông tin (Mẫu D01-TS)."},{"k":"p","t":"- Đối với người lao động nộp hồ sơ cho cơ quan BHXH: xác nhận Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS) đối với người điều chỉnh họ, tên, chữ đệm; ngày, tháng, năm sinh, giới tính đã ghi trên sổ BHXH."},{"k":"p","t":"c) Ghi mã số BHXH"},{"k":"p","t":"- Đối với người tham gia đã được cấp mã số BHXH: ghi mã số BHXH vào các mẫu biểu tương ứng."},{"k":"p","t":"- Đối với người tham gia chưa được cấp được mã số BHXH (kể cả người tham gia không nhớ mã số BHXH): phối hợp cơ quan BHXH hoặc Bưu điện Văn hóa xã để cấp mã số BHXH."},{"k":"p","t":"Lưu ý: Đơn vị có thể tra cứu mã số BHXH, mã hộ gia đình của người tham gia tại địa chỉ: http://baohiemxahoi.gov.vn."},{"k":"p","t":"1.3. Nộp hồ sơ: nộp hồ sơ cho cơ quan BHXH thông qua bưu điện."},{"k":"p","t":"1.4. Đóng tiền: Nộp tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo quy định tại Điều 7, Điều 16, Điều 19, Điều 22."},{"k":"p","t":"1.5. Nhận kết quả:"},{"k":"p","t":"a) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C12-TS) hằng tháng để kiểm tra, đối chiếu, nếu có sai lệch, phối hợp với cơ quan BHXH để giải quyết."},{"k":"p","t":"b) Thông báo đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN của người lao động (Mẫu C13-TS) để niêm yết công khai tại đơn vị."},{"k":"p","t":"c) Phối hợp với cơ quan BHXH/Bưu điện trả Sổ BHXH, Thẻ BHYT và Thông báo mã số BHXH cho người lao động."},{"k":"p","t":"2. Đại lý thu/nhà trường"},{"k":"p","t":"2.1. Nhận hồ sơ của người tham gia theo quy định."},{"k":"p","t":"2.2. Kê khai hồ sơ"},{"k":"p","t":"a) Kê khai hồ sơ theo quy định tại Điều 24, Điều 25, Điều 27."},{"k":"p","t":"b) Ghi mã số BHXH: Tương tự như Tiết c Điểm 1.2 Khoản 1 Điều này."},{"k":"p","t":"2.3. Nộp hồ sơ: nộp hồ sơ cho cơ quan BHXH hoặc thông qua bưu điện."},{"k":"p","t":"2.4. Đóng tiền:"},{"k":"p","t":"a) Thu tiền đóng BHXH của người tham gia BHXH tự nguyện; tiền đóng BHYT phần thuộc trách nhiệm đóng của người tham gia BHYT; cấp biên lai thu tiền cho người tham gia theo quy định."},{"k":"p","t":"b) Nộp số tiền đã thu của người tham gia cho cơ quan BHXH theo quy định."},{"k":"p","t":"c) Đối chiếu biên lai thu tiền và số tiền đã thu theo Mẫu C17-TS."},{"k":"p","t":"2.5. Nhận kết quả:"},{"k":"p","t":"a) Sổ BHXH, Thẻ BHYT và Thông báo mã số BHXH để trả cho người tham gia."},{"k":"p","t":"b) Danh sách người tham gia đến hạn phải đóng BHXH tự nguyện, BHYT (Mẫu D08a-TS) để thông báo và vận động đối tượng tiếp tục tham gia theo quy định."},{"k":"p","t":"3. UBND xã"},{"k":"p","t":"3.1. Nhận hồ sơ"},{"k":"p","t":"- Hồ sơ của người tham gia theo quy định."},{"k":"p","t":"- Danh sách người có công với cách mạng, thân nhân người có công cách mạng do Phòng Lao động - Thương binh và Xã hội cấp huyện chuyển đến."},{"k":"p","t":"3.2. Kê khai hồ sơ"},{"k":"p","t":"a) Kê khai hồ sơ: theo quy định tại Điều 25, Khoản 4 Điều 27."},{"k":"p","t":"b) Ghi mã số BHXH: Tương tự như Tiết c Điểm 1.2 Khoản 1 Điều này."},{"k":"p","t":"3.3. Nộp hồ sơ: Nộp hồ sơ cho cơ quan BHXH hoặc thông qua bưu điện."},{"k":"p","t":"3.4. Nhận kết quả"},{"k":"p","t":"a) Thẻ BHYT và Thông báo mã số BHXH để trả cho người tham gia."},{"k":"p","t":"b) Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) do tổ chức BHXH đóng và người đã hiến bộ phận cơ thể người để xác nhận gửi lại cơ quan BHXH."},{"k":"p","t":"3.5. Xác định, rà soát tăng, giảm đối tượng tham gia BHYT trên địa bàn theo quy định."},{"k":"p","t":"4. Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội"},{"k":"p","t":"4.1. Nhận hồ sơ của người tham gia theo quy định."},{"k":"p","t":"4.2. Kê khai hồ sơ"},{"k":"p","t":"a) Kê khai hồ sơ: theo quy định tại Điều 25, Khoản 4 Điều 27."},{"k":"p","t":"b) Ghi mã số BHXH: Tương tự như Tiết c Điểm 1.2 Khoản 1 Điều này."},{"k":"p","t":"4.3. Nộp hồ sơ: Nộp hồ sơ cho cơ quan BHXH hoặc thông qua bưu điện."},{"k":"p","t":"4.4. Đóng tiền: Tổng hợp, chuyển kinh phí hoặc đề nghị cơ quan tài chính chuyển kinh phí vào quỹ BHYT theo quy định."},{"k":"p","t":"4.5. Nhận kết quả: Thẻ BHYT và Thông báo mã số BHXH để trả cho người tham gia."},{"k":"p","t":"5. Cơ quan quản lý đối tượng"},{"k":"p","t":"5.1. Nhận và rà soát hồ sơ"},{"k":"p","t":"a) Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) do UBND xã gửi đến."},{"k":"p","t":"b) Chủ trì, phối hợp với cơ quan BHXH cấp huyện rà soát, đối chiếu Danh sách người chỉ tham gia BHYT (Mẫu D03-TS)."},{"k":"p","t":"5.2. Đóng tiền: Tổng hợp, đối chiếu, chuyển kinh phí hoặc đề nghị cơ quan tài chính chuyển kinh phí vào quỹ BHYT theo quy định."},{"k":"p","t":"5.3. Chuyển Danh sách người có công với cách mạng, thân nhân người có công cách mạng cho UBND xã để làm căn cứ lập danh sách tham gia BHYT."},{"k":"p","t":"6. Trường hợp giao dịch bằng hồ sơ điện tử thì thực hiện quy trình thu; cấp sổ BHXH, thẻ BHYT theo quy định về giao dịch điện tử trong việc thực hiện thủ tục tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN; cấp sổ BHXH, thẻ BHYT."}]},{"id":"qd595_33","no":33,"code":"Điều 33","title":"Điều 33. Cơ quan BHXH tỉnh/huyện","shortTitle":"Cơ quan BHXH tỉnh/huyện","chuong":"Chương IV — QUY TRÌNH THU; CẤP SỔ BHXH, THẺ BHYT","muc":"","level":1,"content":[{"k":"p","t":"1. Phòng/Tổ Tiếp nhận & Quản lý hồ sơ"},{"k":"p","t":"1.1. Nhận hồ sơ và dữ liệu (nếu có) do người tham gia; đơn vị, UBND xã, Đại lý thu/nhà trường, Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội, cơ quan quản lý đối tượng và Bưu điện chuyển đến; kiểm tra, đối chiếu các chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu quản lý"},{"k":"p","t":"a) Trường hợp dữ liệu quản lý và hồ sơ chưa khớp đúng: Lập Phiếu trả hồ sơ (Mẫu C02-TS)."},{"k":"p","t":"b) Trường hợp dữ liệu quản lý và hồ sơ khớp đúng: Viết giấy hẹn."},{"k":"p","t":"c) Đối với người tham gia nộp hồ sơ tại cơ quan BHXH:"},{"k":"p","t":"- Hướng dẫn người tham gia lập hồ sơ quy định tại Điều 23, 24, 25, 26, 27. Đối với các trường hợp có hồ sơ kèm theo thì sao và xác nhận, trả bản chính."},{"k":"p","t":"- Ghi mã số BHXH: Tương tự như Tiết c Điểm 1.2 Khoản 1 Điều 32."},{"k":"p","t":"- Hướng dẫn người tham gia nộp tiền theo quy định."},{"k":"p","t":"- Viết giấy hẹn."},{"k":"p","t":"1.2. Chuyển hồ sơ"},{"k":"p","t":"a) Phòng/Tổ Quản lý thu: Hồ sơ theo quy định tại Điều 23, 24, 25, 26 và Khoản 2, 4 Điều 27."},{"k":"p","t":"b) Phòng/Tổ Cấp sổ, thẻ"},{"k":"p","t":"- Hồ sơ theo quy định tại Khoản 1, 3 Điều 27."},{"k":"p","t":"- Hồ sơ cộng nối thời gian không phải đóng BHXH; Hồ sơ điều chỉnh làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thời gian trước ngày 01/01/1995."},{"k":"p","t":"1.3. Nhận lại hồ sơ"},{"k":"p","t":"a) Từ Phòng/Tổ Quản lý thu"},{"k":"p","t":"- Hồ sơ các trường hợp không đúng, đủ để trả lại nơi nộp hồ sơ."},{"k":"p","t":"- Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C12-TS)."},{"k":"p","t":"b) Từ Phòng/Tổ Cấp sổ, thẻ"},{"k":"p","t":"- Thông báo Mã số BHXH, Sổ BHXH, thẻ BHYT."},{"k":"p","t":"- Thông báo đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN của người lao động (Mẫu C13-TS)."},{"k":"p","t":"- Tờ rời sổ BHXH (hằng năm)."},{"k":"p","t":"- Hồ sơ các trường hợp không đúng, đủ để trả lại nơi nộp hồ sơ."},{"k":"p","t":"1.4. Lưu hồ sơ còn lại."},{"k":"p","t":"2. Phòng/Tổ Quản lý thu"},{"k":"p","t":"2.1. Nhận hồ sơ và dữ liệu (nếu có) do Phòng/Tổ Tiếp nhận & Quản lý hồ sơ; Phòng/Tổ Cấp sổ, thẻ; Phòng/Tổ Chế độ BHXH chuyển đến; kiểm tra, đối chiếu các chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu quản lý:"},{"k":"p","t":"a) Trường hợp dữ liệu quản lý và hồ sơ chưa khớp đúng: Lập Phiếu trả hồ sơ (Mẫu C02-TS)."},{"k":"p","t":"b) Đối với hồ sơ đề nghị điều chỉnh thông tin theo quy định tại Khoản 2, Khoản 4, Điều 27: trình Lãnh đạo phê duyệt trước khi điều chỉnh dữ liệu."},{"k":"p","t":"c) Trường hợp dữ liệu quản lý và hồ sơ khớp đúng:"},{"k":"p","t":"- Cập nhật dữ liệu vào chương trình quản lý, ghi quá trình đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN vào từng quỹ tương ứng để tính thời gian tham gia BHXH, BHYT, BHTN của từng người tham gia."},{"k":"p","t":"- Thực hiện ghi dữ liệu vào chương trình quản lý, in:"},{"k":"p","t":"+ Các bản Tổng hợp danh sách lao động tham gia BHXH, BHYT đối với mỗi đơn vị tham gia BHXH, BHYT (Mẫu D02a-TS, D03a-TS, D05a-TS)."},{"k":"p","t":"+ Tổng hợp danh sách lao động tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu D02a-TS) đối với người lao động giảm, đồng thời nộp hồ sơ hưởng chế độ hưu trí hoặc nghỉ việc hưởng chế độ ốm đau dài ngày."},{"k":"p","t":"2.2. Hằng tháng, sau khi chốt dữ liệu vào chương trình quản lý, in:"},{"k":"p","t":"a) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C12-TS)."},{"k":"p","t":"b) Tổng hợp số phải thu (Mẫu C69-HD ban hành kèm theo Thông tư số 178/2012/TT-BTC ngày 23/10/2012 của Bộ Tài chính hướng dẫn kế toán áp dụng cho BHXH Việt Nam)."},{"k":"p","t":"c) Báo cáo chi tiết đơn vị nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu B03-TS)."},{"k":"p","t":"d) Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) do tổ chức BHXH đóng; người đã hiến bộ phận cơ thể người gửi UBND xã xác nhận."},{"k":"p","t":"e) Danh sách đối tượng tham gia BHXH tự nguyện, BHYT trước 30 ngày đến hạn phải đóng (Mẫu D08a-TS) để gửi đại lý thu/nhà trường."},{"k":"p","t":"g) Báo cáo nghiệp vụ (Mẫu B01-TS, Mẫu B06-TS)."},{"k":"p","t":"h) Đối chiếu biên lai thu tiền và số tiền đã thu theo Mẫu C17-TS với Phòng/Tổ KH-TC và Đại lý thu/nhà trường."},{"k":"p","t":"2.3. Hằng quý, in:"},{"k":"p","t":"a) Tổng hợp số thẻ và số phải thu theo nơi đăng ký khám chữa bệnh ban đầu (Mẫu B05-TS)."},{"k":"p","t":"b) Báo cáo nghiệp vụ (Mẫu B02a-TS, Mẫu B02a-TS lũy kế từ đầu năm; Mẫu B02b-TS, Mẫu B02b-TS lũy kế từ đầu năm; Mẫu B04a-TS, Mẫu B04b-TS)."},{"k":"p","t":"2.4. Phối hợp với cơ quan quản lý đối tượng rà soát, đối chiếu Danh sách người chỉ tham gia BHYT (Mẫu D03-TS)."},{"k":"p","t":"2.5. Hướng dẫn, đôn đốc hoặc thực hiện việc nhập thông tin trên Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS) đối với trường hợp người tham gia chưa được cấp mã số BHXH của Bưu điện/đơn vị được giao nhiệm vụ, đảm bảo không quá 01 ngày."},{"k":"p","t":"2.6. Phối hợp với Phòng/Tổ Cấp sổ, thẻ điều chỉnh thông tin tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"2.7. Phối hợp với các Phòng/Tổ Cấp sổ, thẻ, Phòng/Tổ KH-TC lập hồ sơ các trường hợp hoàn trả, trình Giám đốc BHXH phê duyệt."},{"k":"p","t":"2.8. Trường hợp chưa cấp sổ BHXH, thẻ BHYT, điều chỉnh dữ liệu chưa khớp đúng do Phòng/Tổ Cấp sổ, thẻ, Phòng/Tổ Chế độ BHXH chuyển đến."},{"k":"p","t":"2.9. Chuyển"},{"k":"p","t":"a) Phòng/Tổ Cấp sổ, thẻ: Hồ sơ, dữ liệu và Mẫu D02a-TS, D03a-TS, D05a-TS."},{"k":"p","t":"b) Phòng/Tổ Chế độ BHXH: Mẫu D02a-TS đối với người lao động giảm hưởng chế độ hưu trí hoặc nghỉ việc hưởng chế độ ốm đau dài ngày."},{"k":"p","t":"3. Phòng/Tổ Cấp sổ, thẻ"},{"k":"p","t":"3.1. Nhận hồ sơ và dữ liệu (nếu có) do Phòng/Tổ Tiếp nhận & Quản lý hồ sơ, Phòng/Tổ Quản lý thu, Phòng/Tổ chế độ BHXH chuyển đến; kiểm tra, đối chiếu các chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu quản lý."},{"k":"p","t":"a) Trường hợp dữ liệu chương trình và hồ sơ chưa khớp đúng:"},{"k":"p","t":"- Lập Phiếu trả hồ sơ (Mẫu C02-TS)."},{"k":"p","t":"- Phối hợp với Phòng/Tổ Quản lý thu kiểm tra, giải quyết hồ sơ các trường hợp nêu tại Điểm 2.6 Khoản 2 Điều này."},{"k":"p","t":"b) Đối với hồ sơ đề nghị điều chỉnh thông tin theo quy định tại Khoản 3 Điều 27: trình Lãnh đạo phê duyệt trước khi chuyển Phòng/Tổ quản lý thu điều chỉnh dữ liệu."},{"k":"p","t":"c) Trường hợp dữ liệu chương trình và hồ sơ khớp đúng, thực hiện in:"},{"k":"p","t":"- Sổ BHXH, thẻ BHYT; danh sách cấp sổ BHXH (Mẫu D09a-TS), danh sách cấp thẻ BHYT (Mẫu D10a-TS)."},{"k":"p","t":"- Tờ rời sổ BHXH khi phát sinh trường hợp:"},{"k":"p","t":"+ Xác nhận sổ BHXH cho người lao động khi dừng đóng BHXH, giải quyết chế độ BHXH."},{"k":"p","t":"+ Xác nhận quá trình đóng BHTNLĐ, BNN đến thời điểm người tham gia bị TNLĐ, BNN."},{"k":"p","t":"+ Xác nhận, xác nhận lại quá trình đóng BHTN cho người tham gia khi còn thời gian chưa hưởng."},{"k":"p","t":"+ Xác nhận quá trình đóng BHXH, BHTN khi có đề nghị của đơn vị hoặc cơ quan thanh tra, kiểm tra."},{"k":"p","t":"+ Điều chỉnh thông tin tham gia BHXH, BHTN (kể cả các trường hợp đã giải quyết chế độ BHXH)."},{"k":"p","t":"- Bìa sổ BHXH và tờ rời sổ BHXH đối với trường hợp người tham gia giải quyết BHXH một lần còn thời gian đóng BHTN."},{"k":"p","t":"3.2. Hằng tháng, in Báo cáo chỉ tiêu quản lý thu; cấp sổ BHXH, thẻ BHYT (Mẫu B01-TS)."},{"k":"p","t":"3.3. Hằng quý, in Báo cáo tổng hợp danh sách cộng nối thời gian tham gia BHXH (Mẫu B04c-TS)."},{"k":"p","t":"3.4. Hằng năm, in:"},{"k":"p","t":"- Tờ rời sổ BHXH."},{"k":"p","t":"- Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C13-TS)."},{"k":"p","t":"3.5. Lập Phiếu sử dụng phôi bìa sổ BHXH (Mẫu C06-TS), Phiếu sử dụng phôi thẻ BHYT (C07-TS) và Mở sổ theo dõi tình hình cấp sổ BHXH, thời hạn sử dụng thẻ BHYT; tình hình sử dụng phôi sổ BHXH, phôi thẻ BHYT (Mẫu S04-TS, S05-TS, S06-TS, S07-TS). Các loại Phiếu sử dụng và Sổ theo dõi được quản lý trong cơ sở dữ liệu, chỉ thực hiện in khi có yêu cầu của Lãnh đạo, đoàn kiểm tra hoặc cơ quan có thẩm quyền."},{"k":"p","t":"3.6. Chuyển"},{"k":"p","t":"a) Phòng/Tổ Quản lý thu: Hồ sơ cộng nối thời gian không phải đóng BHXH; Hồ sơ điều chỉnh làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thời gian trước ngày 01/01/1995."},{"k":"p","t":"b) Phòng/Tổ Chế độ BHXH: Hồ sơ giải quyết, điều chỉnh hưởng chế độ BHXH của người lao động."},{"k":"p","t":"c) Phòng/Tổ Tiếp nhận & Quản lý hồ sơ:"},{"k":"p","t":"- Sổ BHXH, thẻ BHYT kèm theo danh sách cấp sổ BHXH (Mẫu D09a-TS), thẻ BHYT (Mẫu D10a-TS) và hồ sơ, giấy tờ bản chính (nếu có) để chuyển trả đơn vị, người tham gia."},{"k":"p","t":"- Tờ rời sổ BHXH (hằng năm)."},{"k":"p","t":"- Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C13-TS)."},{"k":"p","t":"4. Phòng/Tổ KH-TC"},{"k":"p","t":"4.1. Nhận hồ sơ (chứng từ chuyển tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; hồ sơ các trường hợp hoàn trả...), kiểm tra, đối chiếu các chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu quản lý:"},{"k":"p","t":"a) Trường hợp dữ liệu quản lý và hồ sơ chưa khớp đúng: lập Phiếu trả hồ sơ (Mẫu C02-TS)."},{"k":"p","t":"b) Trường hợp dữ liệu quản lý và hồ sơ khớp đúng:"},{"k":"p","t":"- Cập nhật dữ liệu vào chương trình quản lý thu, cấp sổ BHXH, thẻ BHYT: số tiền đã thu BHXH, BHYT, BHTN, BHTNLĐ, BNN của đơn vị, ngân sách nhà nước, Đại lý thu/nhà trường, người tham gia."},{"k":"p","t":"- Ghi thu số tiền đóng BHYT của đối tượng tham gia BHYT do ngân sách Trung ương và quỹ BHXH, BHTN đảm bảo."},{"k":"p","t":"- Thu tiền đóng BHXH tự nguyện, BHYT của người tham gia ký, đóng dấu xác nhận đã thu tiền vào bản Tổng hợp danh sách người chỉ tham gia BHYT (Mẫu D03a-TS), bản Tổng hợp danh sách người tham gia BHXH tự nguyện (Mẫu D05a-TS)."},{"k":"p","t":"4.2. Hằng tháng"},{"k":"p","t":"- Tổng hợp số phải thu hằng tháng (Mẫu C69-HD) đối với mỗi đơn vị tham gia BHXH, BHYT để hạch toán."},{"k":"p","t":"- Tổng hợp số tiền phải đóng và số thẻ đăng ký khám chữa bệnh ban đầu (Mẫu B05-TS)."},{"k":"p","t":"- Đối chiếu biên lai thu tiền và số tiền đã thu (Mẫu C17-TS) với Phòng/Tổ Quản lý thu."},{"k":"p","t":"4.3. Định kỳ 03 tháng, 06 tháng hoặc 12 tháng, phối hợp với Phòng/Tổ Quản lý thu tổng hợp số thẻ BHYT đã phát hành, số tiền thu của đối tượng và số tiền ngân sách nhà nước đóng, hỗ trợ đóng BHYT theo quy định gửi cơ quan quản lý đối tượng, cơ quan tài chính chuyển kinh phí tương ứng vào quỹ BHYT."},{"k":"p","t":"4.4. Trường hợp cập nhật sai số liệu thì lập chứng từ điều chỉnh, trình Giám đốc BHXH ký duyệt, 01 bản lưu tại Phòng/Tổ KH-TC để làm căn cứ điều chỉnh, 01 bản chuyển Phòng/Tổ Quản lý thu để theo dõi và đối chiếu với đơn vị."},{"k":"p","t":"4.5. Chuyển"},{"k":"p","t":"a) Phòng/Tổ Tiếp nhận & Quản lý hồ sơ: Biên lai thu tiền đóng BHXH, BHYT để trả cho người tham gia."},{"k":"p","t":"b) Phòng/Tổ Quản lý thu"},{"k":"p","t":"- Hồ sơ điều chỉnh số thu (nếu có) để theo dõi và đối chiếu với đơn vị."},{"k":"p","t":"- Bản Tổng hợp số thẻ BHYT đã phát hành, số tiền thu của đối tượng và số tiền ngân sách nhà nước đóng, hỗ trợ đóng BHYT theo quy định gửi cơ quan quản lý đối tượng, cơ quan tài chính chuyển kinh phí tương ứng vào quỹ BHYT để phối hợp đôn đốc."},{"k":"p","t":"c) Phòng/Tổ Cấp sổ, thẻ: Mẫu D03-TS, Mẫu D03a-TS và hồ sơ kèm theo (nếu có)."},{"k":"p","t":"4.6. Lưu hồ sơ, chứng từ theo quy định."},{"k":"p","t":"5. Phòng/Tổ Chế độ BHXH"},{"k":"p","t":"5.1. Nhận hồ sơ và dữ liệu (nếu có) do Phòng/Tổ Tiếp nhận & Quản lý hồ sơ, Phòng/Tổ Quản lý thu, Phòng/Tổ Cấp sổ, thẻ chuyển đến; kiểm tra, đối chiếu hồ sơ với dữ liệu về tiền lương, thời gian tham gia BHXH, cấp thẻ BHYT đối với trẻ em dưới 6 tuổi trong dữ liệu thu, sổ BHXH, thẻ BHYT."},{"k":"p","t":"a) Trường hợp dữ liệu quản lý và hồ sơ chưa khớp đúng: Lập Phiếu trả hồ sơ (Mẫu C02-TS)."},{"k":"p","t":"b) Trường hợp dữ liệu quản lý và hồ sơ khớp đúng: Giải quyết chế độ BHXH, BHTN theo quy định."},{"k":"p","t":"5.2. Chuyển"},{"k":"p","t":"a) Phòng/Tổ Quản lý thu"},{"k":"p","t":"- Dữ liệu và Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) đối với người tham gia do tổ chức BHXH đóng; người lao động báo giảm hưởng chế độ hưu trí hoặc nghỉ việc hưởng chế độ ốm đau dài ngày đang trong thời gian chờ quyết định của cơ quan BHXH."},{"k":"p","t":"- Hồ sơ người giải quyết chế độ BHXH một lần đối với trường hợp người tham gia có thời gian đóng BHTN chưa hưởng để cập nhật dữ liệu."},{"k":"p","t":"b) Phòng/Tổ Cấp sổ, thẻ: hồ sơ người tham gia chấm dứt, dừng, hủy hưởng trợ cấp thất nghiệp cho để đối chiếu dữ liệu, xác nhận lại tổng thời gian đóng BHTN chưa hưởng."},{"k":"p","t":"6. Phòng/Tổ Giám định BHYT"},{"k":"p","t":"6.1. Nhận bảng tổng hợp số tiền phải đóng và số thẻ đăng ký khám chữa bệnh ban đầu do Phòng/Tổ Quản lý thu chuyển đến (Mẫu B05-TS)."},{"k":"p","t":"6.2. Chuyển: Danh sách cơ sở khám chữa bệnh có hợp đồng khám chữa bệnh ban đầu cho Phòng/Tổ Quản lý thu và Phòng/Tổ CNTT."},{"k":"p","t":"7. Phòng/Tổ CNTT"},{"k":"p","t":"7.1. Quản lý, liên thông dữ liệu thu, cấp sổ BHXH, thẻ BHYT, giải quyết chính sách BHXH; dữ liệu khám chữa bệnh và thanh toán BHYT."},{"k":"p","t":"7.2. Cập nhật danh sách cơ sở khám chữa bệnh có hợp đồng khám chữa bệnh ban đầu vào chương trình quản lý thu."},{"k":"p","t":"7.3. Trường hợp điều chỉnh dữ liệu phải có phê duyệt của Giám đốc BHXH tỉnh/huyện."},{"k":"p","t":"7.4. Cung cấp, hướng dẫn phần mềm cho các đơn vị /UBND xã/Đại lý thu/nhà trường/Bưu điện/đơn vị được giao nhiệm vụ để tra cứu, cập nhật, xác định mã số BHXH của người tham gia và giao dịch điện tử."},{"k":"p","t":"8. Trường hợp cơ quan BHXH và đơn vị giao dịch bằng hồ sơ điện tử thì thực hiện quy trình thu; cấp sổ BHXH, thẻ BHYT theo quy định về giao dịch điện tử trong việc thực hiện thủ tục tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN; cấp sổ BHXH, thẻ BHYT."}]},{"id":"qd595_34","no":34,"code":"Điều 34","title":"Điều 34. Khai thác, phát triển đối tượng cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN","shortTitle":"Khai thác, phát triển đối tượng cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN","chuong":"Chương V — QUY TRÌNH KHAI THÁC, PHÁT TRIỂN ĐỐI TƯỢNG THAM GIA VÀ QUẢN LÝ, ĐÔN ĐỐC THU NỢ BHXH, BHYT, BHTN, BHTNLĐ, BNN","muc":"","level":1,"content":[{"k":"p","t":"1. BHXH Việt Nam"},{"k":"p","t":"1.1. Trung tâm CNTT"},{"k":"p","t":"a) Căn cứ dữ liệu do Tổng cục Thuế cung cấp, rà soát, đối chiếu với dữ liệu đang quản lý, phân loại dữ liệu theo các chỉ tiêu tại mẫu biểu như sau:"},{"k":"p","t":"- Danh sách đơn vị cơ quan Thuế đang quản lý chưa tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu số D04a-TS)."},{"k":"p","t":"- Danh sách đơn vị cơ quan BHXH đang quản lý chưa tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN đầy đủ cho người lao động (Mẫu số D04b-TS)."},{"k":"p","t":"- Danh sách đơn vị giải thể, phá sản, bị thu hồi Giấy chứng nhận đăng ký kinh doanh, ngừng hoạt động, tạm ngừng hoạt động, bỏ địa chỉ kinh doanh (Mẫu số D04c-TS)."},{"k":"p","t":"- Danh sách đơn vị trả thu nhập theo kế hoạch thanh tra của cơ quan thuế (Mẫu số D04d-TS)."},{"k":"p","t":"b) Phân quyền cho Ban Thu và BHXH tỉnh để tổng hợp, phân loại, theo dõi đôn đốc, chỉ đạo và tổ chức triển khai thực hiện."},{"k":"p","t":"1.2. Ban Thu"},{"k":"p","t":"a) Căn cứ vào phân quyền do Trung tâm CNTT cung cấp để rà soát, đối chiếu, phân tích, xử lý dữ liệu và lập Danh sách đơn vị đề nghị thanh tra đột xuất (Mẫu số D04m-TS), gửi Vụ Thanh tra - Kiểm tra và BHXH tỉnh."},{"k":"p","t":"b) Chỉ đạo, đôn đốc, hướng dẫn BHXH tỉnh tổ chức thực hiện khai thác phát triển đối tượng theo quy định."},{"k":"p","t":"c) Cung cấp thông tin các đơn vị chưa tham gia hoặc tham gia chưa đầy đủ về lao động, số tiền đóng đến cơ quan có thẩm quyền, cơ quan truyền thông để tuyên truyền, đôn đốc, kiểm tra, thanh tra và xử lý theo quy định."},{"k":"p","t":"1.3. Vụ Thanh tra - Kiểm tra"},{"k":"p","t":"a) Căn cứ Mẫu số D04m-TS do Ban Thu chuyển đến, rà soát, xây dựng kế hoạch thanh tra thường xuyên, đột xuất của ngành; kế hoạch thanh tra liên ngành."},{"k":"p","t":"b) Phối hợp Thanh tra Thuế thanh tra việc chấp hành pháp luật về thuế, về BHXH, BHYT, BHTN, BHTNLĐ, BNN theo kế hoạch đối với đơn vị."},{"k":"p","t":"c) Tổng hợp, theo dõi, đôn đốc việc thanh tra, kiểm tra; đôn đốc việc chấp hành kết luận thanh tra, kiểm tra theo quy định."},{"k":"p","t":"2. BHXH tỉnh/huyện"},{"k":"p","t":"2.1. Phòng/Tổ CNTT"},{"k":"p","t":"a) Căn cứ phân quyền sử dụng dữ liệu của cơ quan thuế cung cấp từ Trung tâm CNTT, dữ liệu từ cơ quan Thuế cùng cấp (nếu có) để rà soát, đối chiếu với cơ sở dữ liệu đang quản lý lập:"},{"k":"p","t":"- Danh sách đơn vị cơ quan Thuế đang quản lý chưa tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu số D04a-TS)."},{"k":"p","t":"- Danh sách đơn vị cơ quan BHXH đang quản lý chưa tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN đầy đủ cho người lao động (Mẫu số D04b-TS)."},{"k":"p","t":"- Danh sách đơn vị giải thể, phá sản, bị thu hồi Giấy chứng nhận đăng ký kinh doanh, ngừng hoạt động, tạm ngừng hoạt động, bỏ địa chỉ kinh doanh (Mẫu số D04c-TS)."},{"k":"p","t":"- Danh sách đơn vị trả thu nhập theo kế hoạch thanh tra của cơ quan thuế (Mẫu số D04d-TS)."},{"k":"p","t":"b) Phân quyền cho các Phòng liên quan và BHXH huyện tỉnh để tổng hợp, theo dõi đôn đốc, chỉ đạo và tổ chức triển khai thực hiện."},{"k":"p","t":"2.2. Phòng/Tổ Khai thác và thu nợ:"},{"k":"p","t":"a) Căn cứ Mẫu số D04a-TS, Mẫu số D04b-TS, xây dựng kế hoạch và tổ chức thực hiện khai thác, phát triển đối tượng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN:"},{"k":"p","t":"- Gửi Thông báo về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu D04e-TS) và đôn đốc đơn vị đăng ký tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN đầy đủ cho người lao động, 15 ngày một lần."},{"k":"p","t":"- Sau 15 ngày kể từ ngày gửi thông báo lần thứ hai mà đơn vị không đăng ký tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động thì thực hiện như sau:"},{"k":"p","t":"Phối hợp với Phòng/Tổ Quản lý thu trực tiếp đến đơn vị đôn đốc, hướng dẫn đơn vị đăng ký tham gia và đóng đủ BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động theo quy định của pháp luật, lập Biên bản làm việc về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu số D04h-TS). Sau 15 ngày kể từ ngày lập Mẫu số D04h-TS, đơn vị vẫn chưa đóng cho người lao động, chuyển hồ sơ (gồm 02 mẫu D04e-TS và Mẫu số D04h-TS) cho Phòng Thanh tra - Kiểm tra/Tổ kiểm tra."},{"k":"p","t":"Sau thời gian 03 tháng kể từ ngày gửi Thông báo về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu số D04e-TS) lần đầu, đơn vị vẫn không đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN thì phối hợp Phòng Thanh tra - Kiểm tra/Tổ kiểm tra lập Mẫu số D04m-TS để ra quyết định thành lập thanh tra chuyên ngành đóng BHXH, BHYT, BHTN theo quy định hoặc phối hợp với cơ quan quản lý lao động, cơ quan Thuế thành lập đoàn thanh tra liên ngành."},{"k":"p","t":"b) Hằng tháng"},{"k":"p","t":"- Phối hợp với Phòng/Tổ Quản lý thu, Phòng Thanh tra - Kiểm tra/Tổ kiểm tra theo dõi, đôn đốc đơn vị đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động. Thông tin trên các phương tiện thông tin đại chúng (báo, đài phát thanh, truyền hình) doanh nghiệp chưa đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động."},{"k":"p","t":"- Nhận từ Phòng Thanh tra - Kiểm tra/Tổ kiểm tra: Hồ sơ thanh tra để theo dõi, đôn đốc đơn vị thực hiện."},{"k":"p","t":"c) Hằng quý"},{"k":"p","t":"- Phối hợp với Phòng/Tổ Quản lý thu, Phòng Thanh tra - Kiểm tra/Tổ kiểm tra tham mưu với Giám đốc báo cáo UBND các cấp tình hình chấp hành pháp luật về BHXH, BHYT, BHTN, BHTNLĐ, BNN tình hình thu, cấp thẻ BHYT cho người lao động của các đơn vị trên địa bàn."},{"k":"p","t":"- Kiến nghị, đề xuất xử lý theo quy định các trường hợp đơn vị vi phạm pháp luật về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN: không đăng ký tham gia hoặc đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN không đủ số lao động, không đúng thời hạn theo quy định."},{"k":"p","t":"d) Hằng năm: Báo cáo tình hình khai thác, phát triển đối tượng của các đơn vị cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu số D04k-TS)."},{"k":"p","t":"2.3. Phòng/Tổ Quản lý thu:"},{"k":"p","t":"a) Phối hợp với Phòng/Tổ Khai thác và thu nợ, Phòng Thanh tra - Kiểm tra/Tổ kiểm tra để đôn đốc, hướng dẫn, kiểm tra, thanh tra các đơn vị không đăng ký tham gia hoặc đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN không đủ số lao động, không đúng thời hạn theo quy định."},{"k":"p","t":"b) Kiểm tra, rà soát, xác định tình trạng đơn vị giải thể, phá sản, bị thu hồi Giấy chứng nhận đăng ký kinh doanh, ngừng hoạt động, tạm ngừng hoạt động, bỏ địa chỉ kinh doanh (Mẫu số D04c-TS) để đôn đốc đơn vị đóng tiền, chốt số tiền phải đóng và tiền lãi chậm đóng đến thời điểm đơn vị ngừng hoạt động."},{"k":"p","t":"2.4. Phòng Thanh tra - Kiểm tra/Tổ kiểm tra"},{"k":"p","t":"a) Căn cứ hồ sơ, dữ liệu từ các Phòng/Tổ chuyển đến, rà soát, đối chiếu kế hoạch thanh tra trên địa bàn của cơ quan có thẩm quyền:"},{"k":"p","t":"- Trường hợp đơn vị có trong kế hoạch thanh tra, có văn bản (kèm theo danh sách các đơn vị thanh tra) đề nghị phối hợp thanh tra việc chấp hành pháp luật về BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"- Trường hợp đơn vị không có trong kế hoạch thanh tra và các trường hợp đã đề nghị phối hợp thực hiện thanh tra nhưng không thực hiện được thì lập Mẫu số D04m-TS để tổ chức thanh tra chuyên ngành theo quy định."},{"k":"p","t":"b) Chủ trì, phối hợp với Phòng/Tổ khai thác và thu nợ, Phòng/Tổ quản lý thu:"},{"k":"p","t":"- Xây dựng kế hoạch và tổ chức thanh tra đột xuất chuyên ngành về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"- Tổng hợp hồ sơ, tham mưu với Giám đốc chuyển hồ sơ sang cơ quan công an đề nghị điều tra khi có dấu hiệu phạm tội trốn đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động theo pháp luật hình sự."},{"k":"p","t":"- Chuyển 01 bản kết luận thanh tra cho Phòng/Tổ Khai thác và thu nợ để theo dõi, đôn đốc đơn vị thực hiện."}]},{"id":"qd595_35","no":35,"code":"Điều 35","title":"Điều 35. Khai thác, phát triển đối tượng tham gia BHXH tự nguyện, đối tượng tham gia BHYT được ngân sách nhà nước hỗ trợ một phần mức đóng và đối tượng tham gia BHYT theo hộ gia đình","shortTitle":"Khai thác, phát triển đối tượng tham gia BHXH tự nguyện, đối tượng tham gia BHYT được ngân sách nhà nước hỗ trợ một phần mức đóng và đối tượng tham gia BHYT theo hộ gia đình","chuong":"Chương V — QUY TRÌNH KHAI THÁC, PHÁT TRIỂN ĐỐI TƯỢNG THAM GIA VÀ QUẢN LÝ, ĐÔN ĐỐC THU NỢ BHXH, BHYT, BHTN, BHTNLĐ, BNN","muc":"","level":1,"content":[{"k":"p","t":"1. Phòng/Tổ Khai thác và thu nợ"},{"k":"p","t":"1.1. Căn cứ tình hình phát triển kinh tế - xã hội, dân số, số người đã tham gia BHXH, BHYT, dữ liệu hộ gia đình tham gia BHYT; dữ liệu quản lý từ cơ quan Thuế trên địa bàn:"},{"k":"p","t":"a) Xây dựng, giao chỉ tiêu phát triển người tham gia BHXH tự nguyện, BHYT cho BHXH huyện/đại lý thu."},{"k":"p","t":"b) Hướng dẫn, kiểm tra, đôn đốc đại lý thu, nhân viên đại lý thu đến các địa bàn dân cư để tuyên truyền, vận động người dân tham gia BHXH tự nguyện, BHYT."},{"k":"p","t":"1.2. Thường xuyên tổ chức đào tạo, bồi dưỡng cho đại lý thu kỹ năng khai thác, vận động thu, tuyên truyền, chế độ, chính sách BHXH, BHYT."},{"k":"p","t":"1.3. Hằng tháng phối hợp với Phòng/Tổ quản lý thu rà soát, đối chiếu số người đã tham gia và số người chưa tham gia BHYT để xây dựng kế hoạch và tổ chức thực hiện tháng tiếp theo."},{"k":"p","t":"1.4. Cung cấp danh sách hộ nghèo, hộ cận nghèo đã được phê duyệt kịp thời cho Đại lý thu để có cơ sở xác định đối tượng tham gia BHXH tự nguyện thuộc hộ nghèo, hộ cận nghèo được ngân sách nhà nước hỗ trợ tiền đóng BHXH tự nguyện."},{"k":"p","t":"2. Phòng/Tổ quản lý thu: Hằng tháng phối hợp với Phòng/Tổ khai thác và thu nợ rà soát, đối chiếu số người đã tham gia và số người chưa tham gia BHYT để xây dựng kế hoạch và tổ chức thực hiện tháng tiếp theo."}]},{"id":"qd595_36","no":36,"code":"Điều 36","title":"Điều 36. Quản lý nợ; đôn đốc thu nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN","shortTitle":"Quản lý nợ; đôn đốc thu nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN","chuong":"Chương V — QUY TRÌNH KHAI THÁC, PHÁT TRIỂN ĐỐI TƯỢNG THAM GIA VÀ QUẢN LÝ, ĐÔN ĐỐC THU NỢ BHXH, BHYT, BHTN, BHTNLĐ, BNN","muc":"","level":1,"content":[{"k":"p","t":"1. Phân loại nợ"},{"k":"p","t":"1.1. Nợ phát sinh: các trường hợp nợ phát sinh có thời gian nợ dưới 1 tháng."},{"k":"p","t":"1.2. Nợ chậm đóng: các trường hợp có thời gian nợ từ 1 tháng đến dưới 3 tháng."},{"k":"p","t":"1.3. Nợ kéo dài: thời gian nợ từ 3 tháng trở lên và không bao gồm các trường hợp tại Điểm 1.4 Khoản này."},{"k":"p","t":"1.4. Nợ khó thu, gồm các trường hợp"},{"k":"p","t":"a) Đơn vị không còn tại địa điểm đăng ký kinh doanh (đơn vị mất tích)."},{"k":"p","t":"b) Đơn vị đang trong thời gian làm thủ tục giải thể, phá sản; đơn vị có chủ là người nước ngoài bỏ trốn khỏi Việt Nam; đơn vị không hoạt động, không có người quản lý, điều hành."},{"k":"p","t":"c) Đơn vị chấm dứt hoạt động, giải thể, phá sản theo quy định của pháp luật;"},{"k":"p","t":"d) Nợ khác: đơn vị nợ đang trong thời gian được tạm dừng đóng vào quỹ hưu trí và từ tuất."},{"k":"p","t":"2. Hồ sơ xác định nợ"},{"k":"p","t":"2.1. Đối với nợ chậm đóng, nợ đọng, nợ kéo dài quy định tại Điểm 1.1, 1.2, 1.3 Khoản 1 Điều này:"},{"k":"p","t":"a) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C12-TS);"},{"k":"p","t":"b) Biên bản làm việc về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu D04h-TS) nếu có."},{"k":"p","t":"2.2. Đối với các trường hợp nợ khó thu quy định tại Điểm 1.4 Khoản 1 Điều này:"},{"k":"p","t":"a) Đơn vị tại Tiết a: Văn bản xác nhận của Ủy ban nhân dân cấp xã hoặc cơ quan Thuế."},{"k":"p","t":"b) Đơn vị tại Tiết b: Văn bản của cơ quan có thẩm quyền xác nhận tình trạng doanh nghiệp hoặc cơ quan thuế."},{"k":"p","t":"c) Đơn vị tại Tiết c: Văn bản của cơ quan có thẩm quyền về việc chấm dứt hoạt động, giải thể doanh nghiệp; quyết định tuyên bố phá sản của Tòa án hoặc cơ quan thuế."},{"k":"p","t":"d) Đơn vị tại Tiết d: Quyết định cho phép tạm dừng đóng của cơ quan có thẩm quyền;"},{"k":"p","t":"3. Tổ chức thu và thu nợ tại BHXH huyện, BHXH tỉnh"},{"k":"p","t":"3.1. Phòng/Tổ Quản lý thu:"},{"k":"p","t":"a) Hằng tháng, cán bộ thu thực hiện đôn đốc đơn vị nộp tiền theo quy định."},{"k":"p","t":"b) Trường hợp đơn vị nợ quá 02 tháng tiền đóng, đối với phương thức đóng hằng tháng; 04 tháng, đối với phương thức đóng 03 tháng một lần; 07 tháng, đối với phương thức đóng 06 tháng một lần:"},{"k":"p","t":"- Cán bộ thu trực tiếp đến đơn vị để đôn đốc, lập Biên bản làm việc về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu D04h-TS);"},{"k":"p","t":"- Gửi văn bản đôn đốc 15 ngày một lần."},{"k":"p","t":"- Sau 02 lần gửi văn bản mà đơn vị không nộp tiền, chuyển hồ sơ (Mẫu D04h-TS; văn bản đôn đốc đơn vị nộp tiền) đến Phòng/Tổ Khai thác và thu nợ tiếp tục xử lý."},{"k":"p","t":"c) Hằng tháng chuyển báo cáo chi tiết đơn vị nợ (Mẫu B03-TS) kèm theo dữ liệu cho Phòng/Tổ Khai thác và thu nợ để quản lý, đôn đốc thu nợ và đối chiếu."},{"k":"p","t":"3.2. Phòng/Tổ Khai thác và thu nợ"},{"k":"p","t":"a) Tiếp nhận hồ sơ đôn đốc thu hồi nợ từ Phòng/Tổ Quản lý thu."},{"k":"p","t":"b) Căn cứ hồ sơ do Phòng/Tổ Quản lý thu bàn giao, xây dựng kế hoạch và tổ chức thực hiện đôn đốc đơn vị thực hiện đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động."},{"k":"p","t":"c) Sau thời gian 03 tháng kể từ lập Biên bản làm việc về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu D04h-TS) và thực hiện các biện pháp đôn đốc mà đơn vị vẫn không đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN, phối hợp với Phòng Thanh tra - Kiểm tra/Tổ kiểm tra lập Danh sách đơn vị đề nghị thành lập đoàn thanh tra đột xuất (Mẫu số D04m-TS) để tổ chức thanh tra chuyên ngành theo quy định hoặc phối hợp với cơ quan quản lý lao động, cơ quan Thuế thành lập đoàn thanh tra liên ngành."},{"k":"p","t":"d) Đối với chủ đơn vị có dấu hiệu bỏ trốn khỏi Việt Nam thì phối hợp với cơ quan công an để có biện pháp ngăn chặn kịp thời."},{"k":"p","t":"đ) Nhận kết luận thanh tra, kiểm tra từ Phòng Thanh tra - Kiểm tra/Tổ kiểm tra theo dõi, đôn đốc đơn vị thực hiện."},{"k":"p","t":"3.3. Phòng Thanh tra - Kiểm tra/Tổ kiểm tra"},{"k":"p","t":"a) Nhận hồ sơ từ Phòng/Tổ Khai thác và thu nợ chuyển đến, thực hiện thanh tra chuyên ngành về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN và xử phạt vi phạm hành chính theo quy định."},{"k":"p","t":"b) Chuyển 01 bản kết luận thanh tra cho Phòng/Tổ Khai thác và thu nợ để theo dõi, đôn đốc đơn vị thực hiện."},{"k":"p","t":"c) Trường hợp đơn vị có dấu hiệu phạm tội trốn đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động, phối hợp chuyển hồ sơ sang cơ quan có thẩm quyền đề nghị điều tra, xử lý theo quy định của pháp luật hình sự."},{"k":"p","t":"4. Đánh giá, báo cáo tình hình nợ, thu nợ"},{"k":"p","t":"4.1. Hằng tháng: Phòng/Tổ Khai thác và thu nợ thông báo danh sách đơn vị cố tình không đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN trên các phương tiện thông tin đại chúng."},{"k":"p","t":"4.2. Hằng quý, Phòng/Tổ Khai thác và thu nợ lập, gửi báo cáo đánh giá tình hình thu nợ (Mẫu B03a-TS) kèm theo dữ liệu điện tử chi tiết đơn vị nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu B03-TS) của tháng cuối quý gửi BHXH cấp trên."}]},{"id":"qd595_37","no":37,"code":"Điều 37","title":"Điều 37. Tính lãi chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN","shortTitle":"Tính lãi chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN","chuong":"Chương V — QUY TRÌNH KHAI THÁC, PHÁT TRIỂN ĐỐI TƯỢNG THAM GIA VÀ QUẢN LÝ, ĐÔN ĐỐC THU NỢ BHXH, BHYT, BHTN, BHTNLĐ, BNN","muc":"","level":1,"content":[{"k":"p","t":"1. Đơn vị chậm đóng BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN từ 30 ngày trở lên thì phải đóng số tiền lãi tính trên số tiền BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN chưa đóng."},{"k":"p","t":"2. Phương thức tính lãi: ngày đầu hằng tháng."},{"k":"p","t":"3. Công thức tính lãi chậm đóng BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN:"},{"k":"p","t":"Lcđi = Pcđi x k (đồng)            (1)"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"* Lcđi: tiền lãi chậm đóng BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN tính tại tháng i (đồng)."},{"k":"p","t":"* Pcđi: số tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN chậm đóng quá thời hạn phải tính lãi tại tháng i (đồng), được xác định như sau:"},{"k":"p","t":"Pcđi = Plki - Spsi (đồng)              (2)"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"Plki: tổng số tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN phải đóng lũy kế đến hết tháng trước liền kề tháng tính lãi i (không bao gồm số tiền lãi chậm đóng, lãi truy thu các kỳ trước còn nợ nếu có)."},{"k":"p","t":"Spsi: số tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN phải đóng phát sinh chưa quá hạn phải nộp, xác định như sau:"},{"k":"p","t":"+ Trường hợp đơn vị đóng theo phương thức hằng tháng: số tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN phải đóng phát sinh bằng số tiền phát sinh của tháng trước liền kề tháng tính lãi;"},{"k":"p","t":"+ Trường hợp đơn vị đóng theo phương thức 03 tháng, 06 tháng một lần: số tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN phải đóng phát sinh bằng tổng số tiền phải đóng phát sinh của các tháng trước liền kề tháng tính lãi chưa đến hạn phải đóng."},{"k":"p","t":"* k: lãi suất tính lãi chậm đóng tại thời điểm tính lãi (%), xác định như sau:"},{"k":"p","t":"- Đối với BHXH bắt buộc, BHTN, BHTNLĐ, BNN, k tính bằng 02 lần mức lãi suất đầu tư quỹ BHXH bình quân năm trước liền kề theo tháng do BHXH Việt Nam công bố."},{"k":"p","t":"- Đối với BHYT, k tính bằng 02 lần mức lãi suất thị trường liên ngân hàng kỳ hạn 9 tháng tính theo tháng do Ngân hàng Nhà nước Việt Nam công bố trên Cổng Thông tin điện tử của Ngân hàng nhà nước Việt Nam của năm trước liền kề. Trường hợp lãi suất liên ngân hàng năm trước liền kề không có kỳ hạn 9 tháng thì áp dụng theo mức lãi suất của kỳ hạn liền trước kỳ hạn 9 tháng."},{"k":"p","t":"Ví dụ 12: Tính lãi chậm đóng đối với đơn vị đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo phương thức đóng hàng tháng:"},{"k":"p","t":"Doanh nghiệp B đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo phương thức đóng hàng tháng. Tính đến hết tháng 02/2016 Doanh nghiệp nợ tiền đóng BHXH, BHTN, BHTNLĐ, BNN là 200.000.000 đồng, nợ tiền đóng BHYT là 35.000.000 đồng; trong đó: số tiền phải đóng BHXH, BHTN, BHTNLĐ, BNN phát sinh của tháng 2/2016 là 100.000.000 đồng, số tiền phải đóng BHYT phát sinh của tháng 2/2016 là 20.000.000 đồng. Giả sử mức lãi suất đầu tư quỹ BHXH, BHTN, BHTNLĐ, BNN bình quân năm 2016 là 6,39%/năm; mức lãi suất liên ngân hàng kỳ hạn 9 tháng do Ngân hàng Nhà nước Việt Nam công bố là 6,5%/năm, thì lãi suất tính lãi chậm đóng BHXH, BHTN, BHYT, BHTNLĐ, BNN như sau:"},{"k":"p","t":"Lãi suất chậm đóng BHXH, BHTN, BHTNLĐ, BNN: kbhxh = 2 x 6,39%/12= 1,0650%"},{"k":"p","t":"Lãi suất tính lãi chậm đóng BHYT: kbhyt = 2 x 6,5%/12 = 1,0833%"},{"k":"p","t":"Áp dụng công thức trên để tính lãi chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN đối với Doanh nghiệp B tại thời điểm ngày 01/3/2016 như sau:"},{"k":"p","t":"Tiền lãi chậm đóng BHXH, BHTN, BHTNLĐ, BNN là 1.065.000 đồng [(200.000.000 đồng - 100.000.000 đồng) x 1,0650%]."},{"k":"p","t":"Tiền lãi chậm đóng BHYT là 162.495 đồng [(35.000.000 đồng - 20.000.000 đồng) x 1,0833]."},{"k":"p","t":"Tổng số tiền lãi chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN phải thu đối với doanh nghiệp M tại thời điểm tháng 3/2016 là 1.227.495 đồng (1.065.000 đồng + 162.495 đồng)."},{"k":"p","t":"Ví dụ 13: Tính lãi chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN đối với đơn vị đóng theo phương thức đóng 03 tháng, hoặc 06 tháng một lần một lần (để đơn giản, dưới đây nêu ví dụ tính lãi chậm đóng BHXH, BHTN, BHTNLĐ, BNN. Việc tính lãi chậm đóng BHYT thực hiện tương tự)."},{"k":"p","t":"Doanh nghiệp C đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo phương thức đóng 03 tháng một lần (tháng đầu tiên theo phương thức đóng từ tháng 01/2016). Tính đến hết tháng 5/2016 Doanh nghiệp C còn nợ tiền đóng BHXH, BHTN là 350.000.000 đồng, trong đó, số tiền phải đóng BHXH, BHTN, BHTNLĐ, BNN phát sinh của tháng 4/2016 là 100.000.000 đồng, số tiền phải đóng BHXH, BHTN, BHTNLĐ, BNN phát sinh của tháng 5/2016 là 110.000.000 đồng."},{"k":"p","t":"Tại thời điểm tháng 5/2016 và tháng 6/2016 tính lãi chậm đóng BHXH, BHTN, BHTNLĐ, BNN đối với Doanh nghiệp C như sau:"},{"k":"p","t":"Theo công thức (2), số tiền chậm đóng BHXH, BHTN, BHTNLĐ, BNN phải tính lãi (Pcđ6) mỗi tháng (tháng 5/2016 và tháng 6/2016) là: 140.000.000 đồng (350.000.000 đồng - 100.000.000 đồng - 110.000.000 đồng);"},{"k":"p","t":"Giả sử lãi suất tính lãi BHXH tính theo Ví dụ 1 là 1,0650%, theo công thức (1) tiền lãi chậm đóng BHXH, BHTN, BHTNLĐ, BNN tại tháng 5/2016 và tháng 6/2016 (Lcđ6) mỗi tháng là 1.491.000 đồng (140.000.000 đồng x 1,0650%)."},{"k":"p","t":"4. Số tiền lãi chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN phải thu trong tháng, gồm: số tiền lãi chậm đóng lũy kế đến cuối tháng trước liền kề chuyển sang và số tiền lãi chậm đóng tính trên số tiền chậm đóng phát sinh trong tháng được xác định theo quy định tại Khoản 3 Điều này."},{"k":"p","t":"Ví dụ 14. Cũng Doanh nghiệp B nêu tại Ví dụ 12 trên, giả sử đến hết tháng 3/2016 vẫn không nộp BHXH, BHYT, BHTN, BHTNLĐ, BNN (số tiền chuyển đóng là 0 đồng) thì sang tháng 4/2016, ngoài việc phải nộp tổng số tiền phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN đến hết tháng 02/2016 nêu trên là 235.000.000 đồng, tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN phát sinh của tháng 3/2016 và tháng 4/2016 là 240.000.000 đồng, tiền lãi chậm đóng tính tại tháng 3/2016 là 1.227.495 đồng, Doanh nghiệp B còn phải nộp tiền lãi chậm đóng tính trên số tiền nợ lũy kế đến hết tháng 02/2016 là:"},{"k":"p","t":"Tiền lãi chậm đóng BHXH, BHTN, BHTNLĐ, BNN là 2.130.000 đồng (200.000.000 đồng x 1,0650%);"},{"k":"p","t":"Tiền lãi chậm đóng BHYT là 379.155 đồng (35.000.000 đồng x 1,0833%);"},{"k":"p","t":"Tổng tiền lãi chậm đóng là 2.509.155 đồng (2.130.000 đồng + 379.155 đồng);"},{"k":"p","t":"Tổng số tiền phải nộp trong tháng 04/2016 (tiền nợ và tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN phát sinh, tiền lãi chậm đóng còn nợ và tiền lãi phát sinh) là 478.736.650 đồng (475.000.000 đồng + 1.227.495 đồng + 2.509.155 đồng)."},{"k":"p","t":"Trường hợp đơn vị không còn tại địa điểm đăng ký kinh doanh (đơn vị mất tích) đã được cơ quan BHXH chốt số tiền phải đóng và tiền lãi chậm đóng đến thời điểm đơn vị không còn tại địa điểm đăng ký kinh doanh, khi đơn vị đề nghị giao dịch lại, ngoài số tiền nợ phải đóng và tiền lãi, còn phải đóng tiền lãi phát sinh của số tiền nợ phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN từ thời điểm đơn vị ngừng giao dịch theo mức lãi suất từng thời kỳ."},{"k":"p","t":"Ví dụ 15:"},{"k":"p","t":"Đơn vị A không còn tại điểm đăng ký kinh doanh, cơ quan BHXH chốt số tiền nợ phải đóng là 50.000.000 đồng, nợ tiền lãi là 7.000.000 đồng từ tháng 01/2016. Tháng 07/2017 đơn vị tiếp tục tham gia, giả sử mức lãi suất BHXH, BHYT, BHTN năm 2016 là 1%/tháng; mức lãi suất BHXH, BHYT, BHTN năm 2017 là 1,2%/tháng, ngoài số tiền nợ phải đóng là 50.000.000 đồng và nợ tiền lãi là 7.000.000 đồng còn phải đóng số tiền lãi từ tháng 01/2016 đến 30/6/2017 là 9.600.000 đồng (=50.000.000 đồng x 1% x 12 tháng + 50.000.000 đồng x 1,2% x 6 tháng)."},{"k":"p","t":"5. Hằng năm, trong thời hạn 15 ngày đầu của tháng 01, BHXH Việt Nam thông báo mức lãi suất bình quân theo tháng trên cơ sở mức lãi suất bình quân quy định tại Điểm a và b Khoản 3 Điều 6 Quyết định số 60/2015/QĐ-TTg ngày 27/11/2015 của Thủ tướng Chính phủ quyết định cơ chế quản lý tài chính về BHXH, BHYT, BHTN và chi phí quản lý BHXH, BHYT, BHTN cho BHXH tỉnh, thành phố trực thuộc Trung ương, BHXH Bộ Quốc phòng, BHXH Bộ Công an để thống nhất thực hiện."}]},{"id":"qd595_38","no":38,"code":"Điều 38","title":"Điều 38. Truy thu BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN","shortTitle":"Truy thu BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN","chuong":"Chương V — QUY TRÌNH KHAI THÁC, PHÁT TRIỂN ĐỐI TƯỢNG THAM GIA VÀ QUẢN LÝ, ĐÔN ĐỐC THU NỢ BHXH, BHYT, BHTN, BHTNLĐ, BNN","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp truy thu"},{"k":"p","t":"1.1. Truy thu do trốn đóng: Trường hợp đơn vị trốn đóng, đóng không đủ số người thuộc diện bắt buộc tham gia, đóng không đủ số tiền phải đóng theo quy định, chiếm dụng tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (sau đây gọi là trốn đóng) do cơ quan BHXH kết luận thanh tra chuyên ngành đóng BHXH, BHYT, BHTN, cơ quan thanh tra nhà nước có thẩm quyền kết luận từ ngày 01/01/2016 thì ngoài việc truy thu số tiền phải đóng theo quy định, còn phải truy thu số tiền lãi tính trên số tiền, thời gian trốn đóng và mức lãi suất chậm đóng như sau:"},{"k":"p","t":"a) Toàn bộ thời gian trốn đóng trước ngày 01/01/2016, được tính theo mức lãi suất chậm đóng áp dụng đối với năm 2016;"},{"k":"p","t":"b) Đối với thời gian trốn đóng từ ngày 01/01/2016 trở đi, được tính theo mức lãi suất chậm đóng áp dụng đối với từng năm áp dụng tại thời điểm phát hiện trốn đóng."},{"k":"p","t":"1.2. Truy thu đối với người lao động sau khi chấm dứt HĐLĐ về nước truy đóng BHXH cho thời gian đi làm việc ở nước ngoài theo HĐLĐ chưa đóng: trường hợp sau 06 tháng kể từ ngày chấm dứt HĐLĐ về nước mới thực hiện truy đóng BHXH thì số tiền truy thu BHXH được tính bao gồm: số tiền phải đóng BHXH theo quy định và tiền lãi truy thu tính trên số tiền phải đóng."},{"k":"p","t":"1.3. Truy thu do điều chỉnh tăng tiền lương đã đóng BHXH, BHTN, BHTNLĐ, BNN cho người lao động: trường hợp sau 06 tháng kể từ ngày người có thẩm ký quyết định hoặc HĐLĐ (phụ lục HĐLĐ) nâng bậc lương, nâng ngạch lương, điều chỉnh tăng tiền lương, phụ cấp tháng đóng BHXH, BHTN, BHTNLĐ, BNN cho người lao động mới thực hiện truy đóng BHXH, BHTN, BHTNLĐ, BNN thì số tiền truy thu BHXH, BHTN, BHTNLĐ, BNN được tính bao gồm: số tiền phải đóng BHXH, BHTN, BHTNLĐ, BNN theo quy định và tiền lãi truy thu tính trên số tiền phải đóng."},{"k":"p","t":"1.4. Các trường hợp khác theo quy định của cơ quan có thẩm quyền."},{"k":"p","t":"2. Điều kiện truy thu"},{"k":"p","t":"2.1. Cơ quan có thẩm quyền hoặc cơ quan BHXH thanh tra buộc truy thu."},{"k":"p","t":"2.2. Đơn vị đề nghị truy thu đối với người lao động."},{"k":"p","t":"2.3. Hồ sơ đúng đủ theo quy định tại Phụ lục 02."},{"k":"p","t":"Trường hợp đơn vị đề nghị truy thu cộng nối thời gian dưới 6 tháng kèm theo Mẫu D04h-TS hoặc kết luận kiểm tra, từ 06 tháng trở lên kèm kết luận thanh tra của cơ quan BHXH hoặc cơ quan thanh tra hoặc Quyết định xử lý vi phạm hành chính của cơ quan có thẩm quyền."},{"k":"p","t":"3. Tiền lương làm căn cứ truy thu, tỷ lệ truy thu"},{"k":"p","t":"3.1. Tiền lương làm căn cứ truy thu là tiền lương tháng đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN đối với người lao động theo quy định của pháp luật tương ứng thời gian truy thu, tiền lương này được ghi trong sổ BHXH của người lao động."},{"k":"p","t":"3.2. Tỷ lệ truy thu: tính bằng tỷ lệ (%) tiền lương tháng làm căn cứ đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN từng thời kỳ do Nhà nước quy định."},{"k":"p","t":"4. Số tiền truy thu"},{"k":"p","t":"4.1. Tổng số tiền truy thu bằng tổng số tiền phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN và tiền lãi."},{"k":"p","t":"4.2. Số tiền lãi truy thu BHXH, BHYT, BHTN, BHTNLĐ, BNN được tính như sau:"},{"k":"p","t":"EMBED Equation.3           (3)"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"Ltt: tiền lãi truy thu;"},{"k":"p","t":"v: số tháng trốn đóng trong năm j phải truy thu;"},{"k":"p","t":"y: số năm phải truy thu;"},{"k":"p","t":"Pttij: Số tiền phải truy thu BHXH, BHYT, BHTN, BHTNLĐ, BNN của tháng i trong năm j;"},{"k":"p","t":"Nij: thời gian trốn đóng tính bằng số tháng kể từ tháng trốn đóng i của năm j đến tháng trước liền kề tháng thực hiện truy thu, theo công thức sau:"},{"k":"p","t":"Nij = (T0 - Tij) - 1                    (4)"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"T0: tháng tính tiền truy thu (theo dương lịch);"},{"k":"p","t":"Tij: tháng phát sinh số tiền phải đóng Pttij (tính theo dương lịch);"},{"k":"p","t":"kj: lãi suất tính lãi chậm đóng (%)."},{"k":"p","t":"Trường hợp truy thu thời gian trốn đóng trước ngày 01/01/2016, k tính bằng mức lãi suất chậm đóng áp dụng đối với các tháng của năm 2016 theo quy định tại Khoản 3 Điều 37;"},{"k":"p","t":"Ví dụ 15: Doanh nghiệp M trốn đóng BHXH đối với người lao động; tháng 5/2016 cơ quan BHXH phát hiện và truy thu BHXH đối với Doanh nghiệp M. Diễn biến số tiền trốn đóng BHXH phải truy thu và số tiền lãi truy thu theo bảng sau:"},{"k":"p","t":"(Đơn vị tính: đồng)"},{"k":"p","t":"Số TT"},{"k":"p","t":"Tháng trốn đóng"},{"k":"p","t":"Số tiền trốn đóng/tháng"},{"k":"p","t":"Thời gian trốn đóng phải tính lãi (tháng)"},{"k":"p","t":"Lãi suất tính lãi (%/tháng)"},{"k":"p","t":"Số tiền lãi"},{"k":"p","t":"1"},{"k":"p","t":"1/2015"},{"k":"p","t":"50.000.000"},{"k":"p","t":"15"},{"k":"p","t":"1,065%"},{"k":"p","t":"7.987.500"},{"k":"p","t":"2"},{"k":"p","t":"2/2015"},{"k":"p","t":"60.000.000"},{"k":"p","t":"14"},{"k":"p","t":"1,065%"},{"k":"p","t":"8.946.000"},{"k":"p","t":"3"},{"k":"p","t":"5/2015"},{"k":"p","t":"65.000.000"},{"k":"p","t":"11"},{"k":"p","t":"1,065%"},{"k":"p","t":"7.614.750"},{"k":"p","t":"4"},{"k":"p","t":"6/2015"},{"k":"p","t":"70.000.000"},{"k":"p","t":"10"},{"k":"p","t":"1,065%"},{"k":"p","t":"7.455.000"},{"k":"p","t":"Cộng"},{"k":"p","t":"245.000.000"},{"k":"p","t":"32.003.250"},{"k":"p","t":"Trường hợp trong tháng 5/2016 Doanh nghiệp M không nộp số tiền truy thu BHXH 245.000.000 đồng và tiền lãi truy thu 32.003.250 đồng thì sang tháng 6/2016, ngoài việc vẫn phải nộp đủ số tiền truy thu BHXH (245.000.000 đồng) và tiền lãi (32.003.250 đồng), tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN phát sinh của tháng 6/2016 và tiền nợ và tiền lãi chậm đóng (nếu có) theo quy định tại Điểm 4.1 Khoản 4, Doanh nghiệp M còn phải nộp thêm tiền lãi chậm đóng tính trên số tiền BHXH truy đóng còn nợ là 2.609.250 đồng (245.000.000 đồng x 1,065%)."}]},{"id":"qd595_39","no":39,"code":"Điều 39","title":"Điều 39. Kiểm tra hồ sơ đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN","shortTitle":"Kiểm tra hồ sơ đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN","chuong":"Chương V — QUY TRÌNH KHAI THÁC, PHÁT TRIỂN ĐỐI TƯỢNG THAM GIA VÀ QUẢN LÝ, ĐÔN ĐỐC THU NỢ BHXH, BHYT, BHTN, BHTNLĐ, BNN","muc":"","level":1,"content":[{"k":"p","t":"Hằng năm, cán bộ chuyên quản thu, cấp sổ - thẻ xây dựng kế hoạch và tổ chức kiểm tra hồ sơ đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; cấp sổ BHXH, thẻ BHYT tại đơn vị sử dụng lao động ít nhất đạt 50% số đơn vị trên địa bàn, cụ thể:"},{"k":"p","t":"1. Kiểm tra, đối chiếu hồ sơ đơn vị quản lý với nội dung kê khai khi tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN, cấp sổ BHXH, thẻ BHYT; điều chỉnh thông tin trên sổ BHXH, thẻ BHYT, nhân thân, làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm truy thu BHXH, BHYT, BHTN, BHTNLĐ, BNN như: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK01-TS), Quyết định/Hợp đồng lao động/Hợp đồng làm việc, Bảng thanh toán tiền lương, tiền công, Bảng chấm công, chứng từ chuyển tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN..."},{"k":"p","t":"2. Lập biên bản kiểm tra theo quy định và hướng dẫn đơn vị khắc phục các sai sót (nếu có) theo đúng quy định."},{"k":"p","t":"3. Trường hợp phát hiện đơn vị có dấu hiệu hoặc cố tình vi phạm như trốn đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; đóng không đúng tiền lương của người lao động, thu tiền của người lao động nhưng không đóng, đóng không kịp thời, đóng không đủ số tiền phải đóng; khai man, giả mạo hồ sơ thì báo đề xuất với lãnh đạo Phòng để tổ chức thanh tra chuyên ngành và xử lý theo quy định của pháp luật."}]},{"id":"qd595_40","no":40,"code":"Điều 40","title":"Điều 40. Xây dựng, điều chỉnh và giao kế hoạch thu hằng năm","shortTitle":"Xây dựng, điều chỉnh và giao kế hoạch thu hằng năm","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 1. KẾ HOẠCH THU, CẤP PHÁT PHÔI SỔ BHXH, PHÔI THẺ BHYT","level":1,"content":[{"k":"p","t":"1. BHXH huyện"},{"k":"p","t":"1.1. Xây dựng, điều chỉnh kế hoạch thu:"},{"k":"p","t":"a) Lập 02 bản kế hoạch thu BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu K01-TS) gửi 01 bản đến BHXH tỉnh theo quy định."},{"k":"p","t":"b) Lập 02 bản kế hoạch ngân sách địa phương đóng, hỗ trợ mức đóng BHYT, 01 bản gửi cơ quan tài chính cùng cấp theo phân cấp ngân sách địa phương để tổng hợp trình UBND huyện quyết định, 01 bản gửi BHXH tỉnh để tổng hợp toàn tỉnh."},{"k":"p","t":"1.2. Xây dựng, điều chỉnh kinh phí hỗ trợ thu, hoa hồng đại lý: trên cơ sở dự kiến kế hoạch, kế hoạch điều chỉnh để xây dựng điều chỉnh kinh phí hỗ trợ thu, hoa hồng đại lý gửi BHXH tỉnh theo quy định."},{"k":"p","t":"1.3. Thời gian: theo hướng dẫn của BHXH Việt Nam."},{"k":"p","t":"2. BHXH tỉnh"},{"k":"p","t":"2.1. Xây dựng, điều chỉnh kế hoạch thu:"},{"k":"p","t":"a) Lập 02 bản kế hoạch điều chỉnh thu BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu K01-TS) và kinh phí hỗ trợ công tác thu đối với đơn vị do tỉnh trực tiếp thu."},{"k":"p","t":"b) Tổng hợp toàn tỉnh, lập 02 bản kế hoạch, điều chỉnh kế hoạch thu BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu K01-TS), gửi BHXH Việt Nam."},{"k":"p","t":"c) Lập 02 bản kế hoạch ngân sách địa phương đóng, hỗ trợ mức đóng BHYT, gửi Sở Tài chính để tổng hợp trình UBND tỉnh quyết định."},{"k":"p","t":"2.2. Giao kế hoạch thu: Trên cơ sở kế hoạch thu, phân bổ kinh phí hỗ trợ công tác thu, hoa hồng đại lý được BHXH Việt Nam giao, tiến hành phân bổ kế hoạch thu BHXH, BHYT, BHTN, BHTNLĐ, BNN; kế hoạch kinh phí hỗ trợ công tác thu, hoa hồng đại lý cho BHXH tỉnh và BHXH huyện."},{"k":"p","t":"2.3. Thời gian: theo hướng dẫn của BHXH Việt Nam."},{"k":"p","t":"3. BHXH Việt Nam: Tổng hợp, xây dựng và điều chỉnh kế hoạch, giao kế hoạch đảm bảo sát tình hình thực tế và khả năng thực hiện."}]},{"id":"qd595_41","no":41,"code":"Điều 41","title":"Điều 41. Kế hoạch sử dụng phôi sổ BHXH, thẻ BHYT","shortTitle":"Kế hoạch sử dụng phôi sổ BHXH, thẻ BHYT","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 1. KẾ HOẠCH THU, CẤP PHÁT PHÔI SỔ BHXH, PHÔI THẺ BHYT","level":1,"content":[{"k":"p","t":"1. BHXH huyện: Căn cứ tình hình sử dụng phôi sổ BHXH, thẻ BHYT và số lượng phôi sổ BHXH, thẻ BHYT còn tồn; dự báo khả năng phát triển đối tượng tham gia BHXH, BHYT của năm sau, lập kế hoạch sử dụng phôi sổ BHXH, thẻ BHYT năm sau (Mẫu K02-TS) gửi Phòng Cấp sổ, thẻ trước ngày 15/6 hằng năm."},{"k":"p","t":"2. BHXH tỉnh: Phòng Cấp sổ, thẻ căn cứ nhu cầu sử dụng sổ BHXH, thẻ BHYT của các đơn vị do tỉnh trực tiếp quản lý; kế hoạch sử dụng sổ BHXH, thẻ BHYT của BHXH huyện; số lượng sổ BHXH, thẻ BHYT còn tồn, lập kế hoạch sử dụng phôi sổ BHXH, thẻ BHYT năm sau (Mẫu K02-TS) gửi BHXH Việt Nam (Ban Sổ - Thẻ) trước ngày 01/7 hằng năm."},{"k":"p","t":"3. Điều chỉnh kế hoạch: BHXH tỉnh, huyện căn cứ nhu cầu thực tế lập điều chỉnh kế hoạch sử dụng phôi sổ BHXH, thẻ BHYT (Mẫu K02-TS) gửi về BHXH Việt Nam (Ban Sổ - Thẻ) trước ngày 01/7 của năm thực hiện."}]},{"id":"qd595_42","no":42,"code":"Điều 42","title":"Điều 42. Quản lý đối tượng","shortTitle":"Quản lý đối tượng","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 2. QUẢN LÝ THU","level":1,"content":[{"k":"p","t":"1. Người lao động đồng thời có từ 02 HĐLĐ trở lên với nhiều đơn vị khác nhau thì đóng BHXH, BHTN theo HĐLĐ giao kết đầu tiên, đóng BHYT theo HĐLĐ có mức tiền lương cao nhất, đóng BHTNLĐ, BNN theo từng HĐLĐ."},{"k":"p","t":"2. Người lao động làm việc theo HĐLĐ (không bao gồm người làm việc theo HĐLĐ không xác định thời hạn theo quy định tại Nghị định số 68/2000/NĐ-CP ngày 17/11/2000 của Chính phủ về chế độ HĐLĐ một số loại công việc sau đây trong cơ quan hành chính nhà nước, đơn vị sự nghiệp) trong cơ quan hành chính, đơn vị sự nghiệp của Nhà nước thì đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN căn cứ tiền lương ghi trong HĐLĐ."},{"k":"p","t":"3. Đơn vị được tạm dừng đóng vào quỹ hưu trí và tử tuất vẫn phải đóng vào quỹ ốm đau và thai sản, quỹ tai nạn lao động, bệnh nghề nghiệp, quỹ BHYT, quỹ BHTN. Hết thời hạn được tạm dừng đóng, đơn vị tiếp tục đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo phương thức đã đăng ký và đóng bù cho thời gian tạm dừng đóng vào quỹ hưu trí và tử tuất. Tiền đóng bù không bị tính lãi chậm đóng."},{"k":"p","t":"Trong thời gian được tạm dừng đóng, nếu có người lao động nghỉ việc, di chuyển hoặc giải quyết chế độ BHXH thì đơn vị đóng đủ tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN và tiền lãi chậm đóng (nếu có) đối với người lao động đó để xác nhận sổ BHXH."},{"k":"p","t":"4. Người lao động không làm việc và không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng thì không đóng BHXH tháng đó. Thời gian này không được tính để hưởng BHXH."},{"k":"p","t":"5. Người lao động nghỉ việc hưởng chế độ ốm đau từ 14 ngày làm việc trở lên trong tháng theo quy định của pháp luật về BHXH thì không phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN nhưng vẫn được hưởng quyền lợi BHYT."},{"k":"p","t":"6. Người lao động nghỉ việc hưởng chế độ thai sản từ 14 ngày làm việc trở lên trong tháng thì đơn vị và người lao động không phải đóng BHXH, BHTN, BHTNLĐ, BNN, thời gian này được tính là thời gian đóng BHXH, không được tính là thời gian đóng BHTN và được cơ quan BHXH đóng BHYT cho người lao động."},{"k":"p","t":"Thời gian nghỉ việc hưởng chế độ thai sản được ghi trên sổ BHXH theo mức tiền lương đóng BHXH của tháng trước khi nghỉ việc hưởng chế độ thai sản. Trường hợp trong thời gian nghỉ việc hưởng chế độ thai sản người lao động được nâng lương thì được ghi theo mức tiền lương mới của người lao động từ thời điểm được nâng lương."},{"k":"p","t":"Người lao động đang làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục do Bộ Lao động - Thương binh và Xã hội, Bộ Y tế ban hành hoặc làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên nghỉ việc hưởng chế độ thai sản thì thời gian nghỉ việc hưởng chế độ thai sản được tính là thời gian làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm hoặc làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên."},{"k":"p","t":"6.1. Trường hợp HĐLĐ hết thời hạn trong thời gian người lao động nghỉ việc hưởng chế độ thai sản thì thời gian hưởng chế độ thai sản từ khi nghỉ việc hưởng chế độ thai sản đến khi HĐLĐ hết thời hạn được tính là thời gian đóng BHXH, thời gian nghỉ việc hưởng chế độ thai sản sau khi HĐLĐ hết thời hạn không được tính là thời gian đóng BHXH."},{"k":"p","t":"6.2. Thời gian hưởng chế độ thai sản của người lao động chấm dứt HĐLĐ, HĐLV hoặc thôi việc trước thời điểm sinh con hoặc nhận con nuôi dưới 06 tháng tuổi không được tính là thời gian đóng BHXH."},{"k":"p","t":"6.3. Trường hợp lao động nữ đi làm trước khi hết thời hạn nghỉ sinh con theo quy định thì thời gian hưởng chế độ thai sản từ khi nghỉ việc đến khi đi làm trước khi hết thời hạn nghỉ sinh được tính là thời gian đóng BHXH, kể từ thời điểm đi làm trước khi hết thời hạn nghỉ sinh con thì lao động nữ và đơn vị phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"6.4. Trường hợp người cha hoặc người trực tiếp nuôi dưỡng, người mẹ nhờ mang thai hộ, người cha nhờ mang thai hộ hoặc người trực tiếp nuôi dưỡng hưởng chế độ thai sản mà không nghỉ việc thì người lao động và đơn vị vẫn phải đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"7. Người lao động mà bị tạm giam, tạm giữ hoặc tạm đình chỉ công tác để điều tra, xem xét kết luận có vi phạm hay không vi phạm pháp luật thì người lao động và đơn vị được tạm dừng đóng BHXH, BHTN, BHTNLĐ, BNN nhưng vẫn phải đóng BHYT hằng tháng bằng 4,5% của 50% mức tiền lương tháng mà người lao động được hưởng theo quy định của pháp luật. Sau thời gian tạm giam, tạm giữ hoặc tạm đình chỉ công tác nếu được cơ quan có thẩm quyền xác định bị oan, sai, không vi phạm pháp luật thì thực hiện việc đóng bù BHXH, BHTN, BHTNLĐ, BNN trên tiền lương tháng đóng BHXH bắt buộc và truy đóng BHYT trên số tiền lương được truy lĩnh, không tính lãi đối với số tiền truy đóng; trường hợp cơ quan có thẩm quyền xác định người lao động là có tội thì không thực hiện việc đóng bù BHXH, BHTN, BHTNLĐ, BNN và không phải truy đóng BHYT cho thời gian bị tạm giam."},{"k":"p","t":"8. Người lao động ngừng việc theo quy định của pháp luật về lao động mà vẫn được hưởng tiền lương thì người lao động và đơn vị thực hiện đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo mức tiền lương người lao động được hưởng trong thời gian ngừng việc."}]},{"id":"qd595_43","no":43,"code":"Điều 43","title":"Điều 43. Quản lý tiền thu","shortTitle":"Quản lý tiền thu","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 2. QUẢN LÝ THU","level":1,"content":[{"k":"p","t":"1. Hình thức đóng tiền"},{"k":"p","t":"1.1. Chuyển khoản: Chuyển tiền đóng vào tài khoản chuyên thu của cơ quan BHXH mở tại ngân hàng hoặc Kho bạc Nhà nước."},{"k":"p","t":"1.2. Tiền mặt:"},{"k":"p","t":"a) Đơn vị, người tham gia nộp trực tiếp tại ngân hàng hoặc Kho bạc Nhà nước."},{"k":"p","t":"b) Trường hợp đơn vị, người tham gia nộp cho cơ quan BHXH thì trước 16 giờ trong ngày cơ quan BHXH phải nộp toàn bộ số tiền mặt đã thu của đơn vị, người tham gia vào tài khoản chuyên thu tại ngân hàng hoặc Kho bạc Nhà nước."},{"k":"p","t":"2. Khi nhận được tiền đóng của đơn vị có trách nhiệm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN, cơ quan BHXH thực hiện như sau:"},{"k":"p","t":"2.1. Thu tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN kể cả tiền lãi chậm đóng đối với người lao động đủ điều kiện hưởng BHXH hoặc chấm dứt HĐLĐ, HĐLV để kịp thời giải quyết chế độ BHXH, BHTN, BHTNLĐ, BNN cho người lao động theo quy định của pháp luật (nếu có);"},{"k":"p","t":"2.2. Số tiền còn lại, hạch toán thu theo thứ tự sau đây:"},{"k":"p","t":"a) Thu đủ số tiền phải đóng vào quỹ BHYT và tiền lãi phạt chậm đóng, trốn đóng BHYT (nếu có);"},{"k":"p","t":"b) Thu đủ số tiền phải đóng vào quỹ BHTN và tiền lãi phạt chậm đóng, trốn đóng BHTN (nếu có);"},{"k":"p","t":"c) Thu đủ số tiền phải đóng vào quỹ BHTNLĐ, BNN và tiền lãi phạt chậm đóng, trốn đóng BHTNLĐ, BNN (nếu có);"},{"k":"p","t":"d) Thu tiền đóng vào quỹ BHXH và tiền lãi phạt chậm đóng, trốn đóng BHXH (nếu có)."},{"k":"p","t":"Ví dụ 17:"},{"k":"p","t":"Doanh nghiệp N đăng ký đóng BHXH, BHYT, BHTN từ tháng 01/2017 cho 10 người lao động với mức tiền lương làm căn cứ đóng là 10.000.000 đồng/người/tháng. Từ tháng 01 đến tháng 5/2017, đơn vị không nộp tiền đóng BHXH, BHYT, BHTN cho cơ quan BHXH; giả sử mức lãi suất tính lãi chậm đóng BHXH, BHYT, BHTN theo cùng một mức với tỷ lệ là 1%/tháng. Tính đến tháng 5/2017, đơn vị nợ BHXH, BHYT, BHTN số tiền là 165.750.000 đồng, trong đó:"},{"k":"p","t":"- Nợ phải đóng vào quỹ BHYT là 22.500.000 đồng; nợ tiền lãi phạt chậm đóng BHYT là 450.000 đồng;"},{"k":"p","t":"- Nợ phải đóng vào quỹ BHTN là 10.000.000 đồng; nợ tiền lãi phạt chậm đóng BHTN là 200.000 đồng;"},{"k":"p","t":"- Nợ phải đóng vào quỹ BHXH là 130.000.000 đồng; nợ tiền lãi phạt chậm đóng BHXH là 2.600.000 đồng;"},{"k":"p","t":"Ngày 01/6/2017, bà A làm việc tại đơn vị nêu trên đủ điều kiện nghỉ hưu và ngày 02/6/2017 đơn vị chuyển tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN vào quỹ là 140.000.000 đồng thì tính thu như sau:"},{"k":"p","t":"- Thu tiền đóng BHXH, BHYT, BHTN và tiền lãi của riêng bà A là 16.575.000 đồng (= 16.250.000 đồng + 325.000 đồng), trong đó:"},{"k":"p","t":"16.250.000 đồng là tiền phải đóng BHXH, BHYT, BHTN (=10.000.000 đồng x 32,5% x 5 tháng);"},{"k":"p","t":"325.000 đồng là tiền lãi tính riêng của số tiền chậm đóng BHXH, BHYT, BHTN đối với bà A từ tháng 01 đến tháng 4/2017."},{"k":"p","t":"Số tiền còn lại là 149.175.000 đồng (= 165.750.000 đồng - 16.575.000 đồng) của bà A được tính thu như sau:"},{"k":"p","t":"- Thu đủ số tiền phải đóng vào quỹ BHYT là 22.500.000 đồng và số tiền nợ lãi phạt chậm đóng BHYT là 450.000 đồng;"},{"k":"p","t":"- Thu đủ số tiền phải đóng vào quỹ BHTN là 10.000.000 đồng và số tiền nợ lãi phạt chậm đóng BHTN là 200.000 đồng;"},{"k":"p","t":"- Thu số tiền còn lại 116.025.000 đồng (= 149.175.000 đồng - 22.500.000 đồng - 450.000 đồng - 10.000.000 đồng - 200.000 đồng) vào quỹ BHXH."},{"k":"p","t":"Như vậy, số tiền còn thiếu đến tháng 5/2017 là 25.750.000 đồng (= 165.750.000 đồng - 140.000.000 đồng) và được tính như sau:"},{"k":"p","t":"- Thiếu tiền lãi phạt chậm đóng BHXH là 2.600.000 đồng."},{"k":"p","t":"- Thiếu tiền phải đóng vào quỹ BHXH là 23.150.000 đồng (= 25.750.000 đồng - 2.600.000 đồng);"},{"k":"p","t":"Trong thông báo kết quả đóng BHXH, BHYT, BHTN tháng 6/2017 của Doanh nghiệp N ghi như sau:"},{"k":"p","t":"- Kết quả đơn vị đã đóng BHXH cho 09 lao động đến hết tháng 4/2017;"},{"k":"p","t":"- Kết quả đơn vị đã đóng BHTN cho 09 lao động đến hết tháng 5/2017."},{"k":"p","t":"3. Hoàn trả"},{"k":"p","t":"3.1. Các trường hợp hoàn trả"},{"k":"p","t":"a) Đơn vị giải thể, phá sản, chấm dứt hoạt động theo quy định của pháp luật hoặc di chuyển nơi đăng ký tham gia đã đóng thừa tiền BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"b) Các trường hợp hoàn trả BHXH tự nguyện, BHYT."},{"k":"p","t":"c) Đơn vị chuyển tiền vào tài khoản chuyên thu không thuộc trách nhiệm quản lý thu của cơ quan BHXH tỉnh, huyện theo phân cấp."},{"k":"p","t":"d) Số tiền đơn vị, cá nhân đã chuyển vào tài khoản chuyên thu không phải là tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"đ) Kho bạc hoặc ngân hàng hạch toán nhầm vào tài khoản chuyên thu."},{"k":"p","t":"e) Trường hợp một người có từ 02 sổ BHXH trở lên có thời gian đóng BHXH, BHTN trùng nhau thì cơ quan BHXH thực hiện hoàn trả cho người lao động số tiền đơn vị và người lao động đã đóng vào quỹ hưu trí, tử tuất và số tiền đã đóng vào quỹ BHTN (bao gồm cả số tiền thuộc trách nhiệm đóng BHXH, BHTN của người sử dụng lao động), không bao gồm tiền lãi."},{"k":"p","t":"g) Trường hợp đóng BHXH cho người lao động không thuộc đối tượng tham gia BHXH bắt buộc."},{"k":"p","t":"3.2. Phân cấp thực hiện"},{"k":"p","t":"Cơ quan BHXH quản lý đơn vị, người tham gia thực hiện hoàn trả tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN từ tài khoản chuyên thu của cơ quan BHXH."},{"k":"p","t":"3.3. Trình tự hoàn trả"},{"k":"p","t":"a) Hồ sơ đề nghị hoàn trả"},{"k":"p","t":"- Trường hợp quy định tại Tiết a Điểm 2.1 Khoản này: đơn vị lập hồ sơ theo quy định tại Điều 23."},{"k":"p","t":"- Trường hợp quy định tại Tiết b, Tiết e Điểm 2.1 Khoản này: cá nhân lập hồ sơ theo quy định tại Điều 26. Đối với trường hợp hoàn trả tiền đóng BHYT cho nhiều người trong cùng đối tượng, UBND xã, đại lý thu/nhà trường lập danh sách đề nghị hoàn trả theo Mẫu D03-TS gửi cơ quan BHXH."},{"k":"p","t":"- Các trường hợp còn lại: đơn vị hoặc ngân hàng, kho bạc có văn bản đề nghị."},{"k":"p","t":"b) Phòng/Tổ Quản lý thu phối hợp với Phòng/Tổ KH-TC xác định nguyên nhân, số tiền đã đóng thừa, số tiền chuyển nhầm, hạch toán nhầm vào tài khoản chuyên thu trình Giám đốc BHXH."},{"k":"p","t":"c) Giám đốc BHXH ra quyết định hoàn trả (Mẫu C16-TS), gửi 01 bản cho Phòng/Tổ KH-TC lưu và làm thủ tục chuyển tiền, gửi Phòng/Tổ Quản lý thu 01 bản. Trường hợp ngân hàng hoặc Kho bạc Nhà nước hạch toán nhầm thì gửi 01 bản cho ngân hàng hoặc Kho bạc Nhà nước đó để kiểm soát."}]},{"id":"qd595_44","no":44,"code":"Điều 44","title":"Điều 44. Quản lý phôi bìa sổ BHXH và phôi thẻ BHYT","shortTitle":"Quản lý phôi bìa sổ BHXH và phôi thẻ BHYT","chuong":"Chương VI — QUẢN LÝ THU; CẤP SỔ BHXH, THẺ BHYT","muc":"Mục 3. CẤP PHÔI SỔ BHXH, PHÔI THẺ BHYT","level":1,"content":[{"k":"p","t":"1. Phôi bìa sổ BHXH, thẻ BHYT do BHXH Việt Nam tổ chức in để cấp phát cho BHXH các tỉnh, BHXH Bộ Quốc phòng và BHXH Công an nhân dân."},{"k":"p","t":"2. Việc tổ chức in, nhập, kho, xuất kho, kiểm kê, hủy bỏ và quyết toán phôi sổ BHXH, thẻ BHYT thực hiện theo quy định hiện hành."},{"k":"p","t":"3. Trách nhiệm quản lý phôi bìa sổ BHXH, phôi thẻ BHYT"},{"k":"p","t":"3.1. Ban Sổ - Thẻ"},{"k":"p","t":"- Tổng hợp nhu cầu sử dụng phôi bìa sổ BHXH, phôi thẻ BHYT trên toàn quốc trình Tổng Giám đốc kế hoạch sử dụng."},{"k":"p","t":"- Phối hợp đôn đốc, kiểm tra chất lượng và tiến độ in phôi bìa sổ BHXH, phôi thẻ BHYT đảm bảo đúng quy định."},{"k":"p","t":"- Theo dõi, điều tiết việc cấp phát, sử dụng phôi sổ BHXH, thẻ BHYT."},{"k":"p","t":"3.2. Đơn vị được giao tổ chức in phôi bìa sổ BHXH, phôi thẻ BHYT"},{"k":"p","t":"- Tổ chức thực hiện kế hoạch in phôi bìa sổ BHXH,
