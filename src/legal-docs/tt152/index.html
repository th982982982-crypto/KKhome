<script id="LD" type="application/json">{"meta":{"title":"Thông tư 152/2025/TT-BTC — Kế toán Hộ Kinh doanh","shortCode":"TT 152/2025","subtitle":"Kế toán hộ kinh doanh, cá nhân kinh doanh","slug":"tt152","number":"152/2025/TT-BTC","effectiveDate":"01/01/2026","scope":"Hướng dẫn chứng từ kế toán, ghi sổ kế toán của hộ kinh doanh, cá nhân kinh doanh. Hiệu lực 01/01/2026, thay thế TT88/2021.","description":"TT 152/2025 phân loại 3 trường hợp rõ ràng theo nghĩa vụ thuế: (1) Không GTGT/TNCN — chỉ cần S1-HKD; (2) Nộp GTGT+TNCN kê khai — S2a/b/c/d/e-HKD; (3) Cho thuê tài sản — bổ sung S-TTS-HKD. Hỗ trợ hóa đơn điện tử.","tkNote":"Hộ kinh doanh và cá nhân kinh doanh không áp dụng hệ thống tài khoản kế toán đôi. Ghi chép kế toán theo sổ đơn giản — xem tab Biểu mẫu.","related":["TT 58/2026 — Kế toán DN siêu nhỏ","Luật 67/2025/QH15 — Điều 2, 11 (HKD nộp thuế)","Luật Thuế TNCN 109/2025/QH15","Luật Thuế GTGT 48/2024/QH15"]},"outline":[{"id":"tt152_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh và đối tượng áp dụng","shortTitle":"Phạm vi điều chỉnh và đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này hướng dẫn việc ghi sổ kế toán của các hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"2. Đối tượng áp dụng Thông tư này là hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"tt152_2","no":2,"code":"Điều 2","title":"Điều 2. Tổ chức công tác kế toán","shortTitle":"Tổ chức công tác kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Người đại diện hộ kinh doanh, cá nhân kinh doanh tự ghi chép sổ sách kế toán hoặc bố trí người làm kế toán hoặc thuê dịch vụ làm kế toán cho hộ kinh doanh, cá nhân kinh doanh theo quy định của pháp luật. Người đại diện hộ kinh doanh, cá nhân kinh doanh có thể bố trí cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, vợ, chồng, con đẻ, con nuôi, anh, chị, em ruột của mình làm kế toán cho hộ kinh doanh, cá nhân kinh doanh hoặc bố trí người làm quản lý, điều hành, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản kiêm nhiệm làm kế toán cho hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"tt152_3","no":3,"code":"Điều 3","title":"Điều 3. Về sổ kế toán và lưu trữ tài liệu kế toán","shortTitle":"Về sổ kế toán và lưu trữ tài liệu kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh được lựa chọn lưu trữ các tài liệu kế toán (hóa đơn, chứng từ kế toán, sổ kế toán,...) trên phương tiện điện tử hoặc bằng bản giấy."},{"k":"p","t":"2. Thời hạn lưu trữ tài liệu kế toán của hộ kinh doanh, cá nhân kinh doanh tối thiểu là 05 năm, đối với thời hạn lưu trữ hóa đơn thì thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"3. Ngoài các sổ kế toán hướng dẫn tại Thông tư này, hộ kinh doanh, cá nhân kinh doanh có thể bổ sung thêm các sổ kế toán hoặc sửa đổi lại biểu mẫu các sổ kế toán cho phù hợp với nhu cầu của đơn vị. Sổ kế toán được mở thêm hoặc sửa đổi lại biểu mẫu vẫn phải ghi rõ tên sổ; ngày, tháng, năm lập sổ; họ tên và chữ ký, đóng dấu (nếu có) của người đại diện hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"4. Trường hợp hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử mà được hệ thống thông tin quản lý thuế của cơ quan thuế hỗ trợ xác định số thuế giá trị gia tăng (GTGT), thuế thu nhập cá nhân (TNCN), các loại thuế khác phải nộp (nếu có) và thông báo cho người nộp thuế thì hộ kinh doanh, cá nhân kinh doanh sử dụng các mẫu sổ kế toán hướng dẫn tại Thông tư này để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."}]},{"id":"tt152_4","no":4,"code":"Điều 4","title":"Điều 4. Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 1: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG KHÔNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, \nKHÔNG PHẢI NỘP THUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân thì sử dụng Sổ doanh thu bán hàng hóa, dịch vụ (mẫu số S1a-HKD) sau đây để ghi chép doanh thu bán hàng hóa, dịch vụ, cụ thể:"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:..........................."},{"k":"p","t":"Kỳ kê khai:.................................."},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"2. Phương pháp ghi sổ"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ làm căn cứ kê khai, xác định hộ kinh doanh, cá nhân kinh doanh có thuộc đối tượng chịu thuế GTGT, nộp thuế TNCN theo quy định của pháp luật về thuế hay không. Trường hợp hộ kinh doanh, cá nhân kinh doanh thực hiện kê khai doanh thu theo quy định của pháp luật về thuế thì hộ kinh doanh, cá nhân kinh doanh có thể dùng sổ này để theo dõi, đối chiếu số liệu với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"}]},{"id":"tt152_5","no":5,"code":"Điều 5","title":"Điều 5. Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ phần trăm (%) trên doanh thu","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ phần trăm (%) trên doanh thu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 2: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, PHẢI NỘP \nTHUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán sử dụng là Hóa đơn và các chứng từ khác làm căn cứ để xác định và kê khai doanh thu theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-HKD)"},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh sử dụng sổ doanh thu bán hàng hóa, dịch vụ theo mẫu sau đây để ghi chép doanh thu bán hàng hóa, dịch vụ:"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:........................."},{"k":"p","t":"Kỳ kê khai:..............................."},{"k":"p","t":"Đơn vị tính:"}]},{"id":"tt152_6","no":6,"code":"Điều 6","title":"Điều 6. Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 2: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, PHẢI NỘP \nTHUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Hóa đơn, Bảng kê mua hàng hóa, dịch vụ (đối với trường hợp hộ kinh doanh, cá nhân kinh doanh mua hàng hóa, dịch vụ của người bán hàng không có hóa đơn GTGT hoặc hóa đơn bán hàng) và các chứng từ kế toán khác làm căn cứ để xác định doanh thu, thu nhập tính thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Hộ kinh doanh, cá nhân kinh doanh sử dụng các sổ kế toán theo danh mục sau đây"},{"k":"p","t":"2.2. Biểu mẫu và phương pháp ghi sổ kế toán"},{"k":"p","t":"2.2.1. Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2b-HKD)"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:........................."}]},{"id":"tt152_7","no":7,"code":"Điều 7","title":"Điều 7. Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 3: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nCÓ HOẠT ĐỘNG THUỘC DIỆN CHỊU CÁC LOẠI THUẾ KHÁC","level":1,"content":[{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác (thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường, thuế sử dụng đất) thì sử dụng thêm sổ theo dõi nghĩa vụ thuế khác (Mẫu số S3a-HKD) như sau:"},{"k":"p","t":"SỔ THEO DÕI NGHĨA VỤ THUẾ KHÁC"},{"k":"p","t":"Địa điểm kinh doanh:......................"},{"k":"p","t":"Kỳ kê khai:....................."},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B: Ghi diễn giải nội dung nghiệp vụ phát sinh."}]},{"id":"tt152_8","no":8,"code":"Điều 8","title":"Điều 8. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/01/2026."},{"k":"p","t":"2. Thông tư số 88/2021/TT-BTC ngày 11/10/2021 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho các hộ kinh doanh, cá nhân kinh doanh hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành."},{"k":"p","t":"3. Ủy ban nhân dân, Sở Tài chính, Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các hộ kinh doanh, cá nhân kinh doanh thực hiện Thông tư này."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết./."}]}],"forms":[{"code":"S1-HKD","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Mục 1 — HKD không chịu thuế GTGT/TNCN","note":"Điều 4 — trường hợp đơn giản nhất"},{"code":"S2a-HKD","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5, 6"},{"code":"S2b-HKD","title":"Sổ doanh thu bán hàng hóa, dịch vụ (GTGT theo %)","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 6 — nộp GTGT theo tỷ lệ %"},{"code":"S2c-HKD","title":"Sổ chi tiết doanh thu, chi phí","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5 — nộp GTGT theo phương pháp kê khai"},{"code":"S2d-HKD","title":"Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5"},{"code":"S2e-HKD","title":"Sổ chi tiết tiền","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5"},{"code":"S-TTS-HKD","title":"Sổ theo dõi tài sản cho thuê","pl":"Mục 3 — HKD có hoạt động cho thuê tài sản","note":"Điều 7 — trường hợp cho thuê tài sản"}],"accounts":[]}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:2px 12px;font-size:10.5px;font-style:italic;color:#94a3b8">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px 12px;font-size:12px;color:var(--mu)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span> › </span>'+e(a.muc):'')+'<span> › </span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  var cnt=a.content||[];
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+t+'</p>';}})}
  else{h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>'}
  h+='</div>';
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  // Switch to main tab if not already there
  if(!document.getElementById('s-main').classList.contains('on')){
    tab('main',document.querySelector('.tab'));
  }
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildForms(){
  var h='';
  if(!D.forms||!D.forms.length){
    h='<div class="no-tk"><p>Không có biểu mẫu riêng.<br>Tải tài liệu gốc để xem biểu mẫu trong phụ lục.</p></div>';
    document.getElementById('s-forms').innerHTML=h;return;
  }
  h+='<div style="background:#fffbeb;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#92400e">⚠️ Biểu mẫu đính kèm trong tài liệu gốc. Tải tài liệu đầy đủ để xem mẫu in sẵn.</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<a class="dl-btn" href="/api/legal/doc/'+D.meta.slug+'" download onclick="dlStart(this)">⬇ Tải tài liệu</a>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
function dlStart(btn){
  btn.classList.add('loading');
  var orig=btn.innerHTML;
  btn.innerHTML='<span class="sp"></span>Đang tải...';
  setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},2500);
}
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){
    el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Văn bản này không áp dụng hệ thống tài khoản kế toán.')+'</p></div>';
    return;
  }
  var h='<h2 style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:14px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:14px">'+D.outline.filter(function(a){return a.chuong&&a.chuong.indexOf('TÀI KHOẢN')>=0}).length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều khoản</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td style="font-size:13px">'+e(a.name)+'</td><td>';
    if(a.dieu){h+='<a class="tk-link" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.dieu+'\');return false" href="#">Xem Điều</a>'}
    h+='</td></tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:20px;font-weight:800;color:#1e3a8a;margin-bottom:4px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12px;color:var(--mu);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="sc"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="sc"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 12px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
// Hash navigation — jump to specific article when loaded with #articleId
function initHash(){
  var h=window.location.hash.slice(1);
  if(h&&D.outline.find(function(a){return a.id===h})){show(h)}
  else if(D.outline.length){show(D.outline[0].id)}
}
buildSb();buildForms();buildTK();buildHome();
initHash();
</script>
