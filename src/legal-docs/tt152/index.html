, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản kiêm nhiệm làm kế toán cho hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"tt152_3","no":3,"code":"Điều 3","title":"Điều 3. Về sổ kế toán và lưu trữ tài liệu kế toán","shortTitle":"Về sổ kế toán và lưu trữ tài liệu kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh được lựa chọn lưu trữ các tài liệu kế toán (hóa đơn, chứng từ kế toán, sổ kế toán,...) trên phương tiện điện tử hoặc bằng bản giấy."},{"k":"p","t":"2. Thời hạn lưu trữ tài liệu kế toán của hộ kinh doanh, cá nhân kinh doanh tối thiểu là 05 năm, đối với thời hạn lưu trữ hóa đơn thì thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"3. Ngoài các sổ kế toán hướng dẫn tại Thông tư này, hộ kinh doanh, cá nhân kinh doanh có thể bổ sung thêm các sổ kế toán hoặc sửa đổi lại biểu mẫu các sổ kế toán cho phù hợp với nhu cầu của đơn vị. Sổ kế toán được mở thêm hoặc sửa đổi lại biểu mẫu vẫn phải ghi rõ tên sổ; ngày, tháng, năm lập sổ; họ tên và chữ ký, đóng dấu (nếu có) của người đại diện hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"4. Trường hợp hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử mà được hệ thống thông tin quản lý thuế của cơ quan thuế hỗ trợ xác định số thuế giá trị gia tăng (GTGT), thuế thu nhập cá nhân (TNCN), các loại thuế khác phải nộp (nếu có) và thông báo cho người nộp thuế thì hộ kinh doanh, cá nhân kinh doanh sử dụng các mẫu sổ kế toán hướng dẫn tại Thông tư này để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."}]},{"id":"tt152_4","no":4,"code":"Điều 4","title":"Điều 4. Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 1: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG KHÔNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, \nKHÔNG PHẢI NỘP THUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân thì sử dụng Sổ doanh thu bán hàng hóa, dịch vụ (mẫu số S1a-HKD) sau đây để ghi chép doanh thu bán hàng hóa, dịch vụ, cụ thể:"},{"k":"tbl","rows":[["HỘ, CÁ NHÂN KINH DOANH:........\nĐịa chỉ:.................................\nMã số thuế:..........................","Mẫu số S1a-HKD\n(Kèm theo Thông tư số 152/2025/TT-BTC\nngày 31 tháng 12 năm 2025 của Bộ trưởng\nBộ Tài chính)"]]},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:..........................."},{"k":"p","t":"Kỳ kê khai:.................................."},{"k":"p","t":"Đơn vị tính:"},{"k":"tbl","rows":[["Ngày tháng","Diễn giải","Số tiền"],["A","B","1"],["","",""],["","",""],["","",""],["","",""],["","",""],["","",""],["","Tổng cộng",""]]},{"k":"tbl","rows":[["","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN HỘ KINH DOANH/ \nCÁ NHÂN KINH DOANH\n(Ký, ghi rõ họ tên, đóng dấu (nếu có))"]]},{"k":"p","t":"2. Phương pháp ghi sổ"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ làm căn cứ kê khai, xác định hộ kinh doanh, cá nhân kinh doanh có thuộc đối tượng chịu thuế GTGT, nộp thuế TNCN theo quy định của pháp luật về thuế hay không. Trường hợp hộ kinh doanh, cá nhân kinh doanh thực hiện kê khai doanh thu theo quy định của pháp luật về thuế thì hộ kinh doanh, cá nhân kinh doanh có thể dùng sổ này để theo dõi, đối chiếu số liệu với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B: Ghi diễn giải doanh thu từ việc bán hàng hóa, dịch vụ. Hộ kinh doanh, cá nhân kinh doanh có thể ghi theo từng nghiệp vụ phát sinh hoặc theo định kỳ."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ."}]},{"id":"tt152_5","no":5,"code":"Điều 5","title":"Điều 5. Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ phần trăm (%) trên doanh thu","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ phần trăm (%) trên doanh thu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 2: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, PHẢI NỘP \nTHUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán sử dụng là Hóa đơn và các chứng từ khác làm căn cứ để xác định và kê khai doanh thu theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-HKD)"},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh sử dụng sổ doanh thu bán hàng hóa, dịch vụ theo mẫu sau đây để ghi chép doanh thu bán hàng hóa, dịch vụ:"},{"k":"tbl","rows":[["HỘ, CÁ NHÂN KINH DOANH:........\nĐịa chỉ:.................................\nMã số thuế:..........................","Mẫu số S2a-HKD\n(Kèm theo Thông tư số 152/2025/TT-BTC\nngày 31 tháng 12 năm 2025 của Bộ trưởng\nBộ Tài chính)"]]},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:........................."},{"k":"p","t":"Kỳ kê khai:..............................."},{"k":"p","t":"Đơn vị tính:"},{"k":"tbl","rows":[["Chứng từ","Chứng từ","Diễn giải","Số tiền"],["Số hiệu","Ngày, tháng","Diễn giải","Số tiền"],["A","B","C","1"],["","","1. Ngành nghề ....",""],["","","......",""],["","","Tổng cộng (1)",""],["","","Thuế GTGT",""],["","","Thuế TNCN",""],["","","2. Ngành nghề ....",""],["","",".....",""],["","","Tổng cộng (2)",""],["","","Thuế GTGT",""],["","","Thuế TNCN",""],["","","3. Ngành nghề ....",""],["","",".....",""],["","","Tổng cộng (3)",""],["","","Thuế GTGT",""],["","","Thuế TNCN",""],["","","Tổng số thuế GTGT phải nộp",""],["","","Tổng số thuế TNCN phải nộp",""]]},{"k":"tbl","rows":[["","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN HỘ KINH DOANH/ \nCÁ NHÂN KINH DOANH\n(Ký, ghi rõ họ tên và đóng dấu (nếu có))"]]},{"k":"p","t":"2.2. Phương pháp ghi sổ"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ theo từng nhóm danh mục ngành nghề kinh doanh có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN. Trường hợp hộ kinh doanh, cá nhân kinh doanh có nhiều nhóm ngành nghề khác nhau thì sổ này có thể mở cho từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN. Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế GTGT, thuế TNCN thì hộ kinh doanh, cá nhân kinh doanh sử dụng sổ này để theo dõi, đối chiếu số thuế GTGT, thuế TNCN phải nộp với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ có thể theo từng ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN. Trên cơ sở doanh thu được xác định, hộ kinh doanh, cá nhân kinh doanh tính ra số tiền thuế GTGT, thuế TNCN phải nộp theo từng ngành nghề có cùng tỷ lệ % hoặc cùng mức thuế suất. Dòng cuối cùng ghi tổng số thuế GTGT, thuế TNCN phải nộp."}]},{"id":"tt152_6","no":6,"code":"Điều 6","title":"Điều 6. Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 2: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, PHẢI NỘP \nTHUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p",  GTGT phải nộp",""]]},{"k":"tbl","rows":[["","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN HỘ KINH DOANH/ \nCÁ NHÂN KINH DOANH\n(Ký, ghi rõ họ tên và đóng dấu (nếu có))"]]},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ theo từng nhóm danh mục ngành nghề kinh doanh có cùng tỷ lệ % để tính thuế GTGT. Trường hợp hộ kinh doanh, cá nhân kinh doanh có nhiều nhóm ngành nghề khác nhau thì sổ này có thể mở cho từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT. Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế GTGT thì hộ kinh doanh, cá nhân kinh doanh sử dụng sổ này để theo dõi, đối chiếu số thuế GTGT phải nộp với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ có thể theo từng ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT. Trên cơ sở doanh thu được xác định, hộ kinh doanh, cá nhân kinh doanh tính ra số tiền thuế GTGT phải nộp theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT. Dòng cuối cùng ghi tổng số thuế GTGT phải nộp."},{"k":"p","t":"2.2.2. Sổ chi tiết doanh thu, chi phí (Mẫu số S2c-HKD)"},{"k":"tbl","rows":[["HỘ, CÁ NHÂN KINH DOANH:........\nĐịa chỉ:.................................\nMã số thuế:..........................","Mẫu số S2c-HKD\n(Kèm theo Thông tư số 152/2025/TT-BTC\nngày 31 tháng 12 năm 2025 của Bộ trưởng\nBộ Tài chính)"]]},{"k":"p","t":"SỔ CHI TIẾT DOANH THU, CHI PHÍ"},{"k":"p","t":"Tên địa điểm kinh doanh:..........."},{"k":"p","t":"Kỳ kê khai:................."},{"k":"p","t":"Đơn vị tính:"},{"k":"tbl","rows":[["Chứng từ","Chứng từ","Diễn giải","Số tiền"],["Số hiệu","Ngày, tháng","Diễn giải","Số tiền"],["A","B","C","1"],["","","1. Doanh thu bán hàng hóa, dịch vụ",""],["","","2. Chi phí hợp lý",""],["","","a) Chi phí nguyên liệu, vật liệu, nhiên liệu, năng lượng, hàng hóa sử dụng vào sản xuất, kinh doanh.",""],["","","b) Chi phí tiền lương, tiền công, các khoản phụ cấp, bảo hiểm bắt buộc và các khoản chi trả cho người lao động có đóng bảo hiểm bắt buộc theo quy định; chi phí tiền lương, tiền công, các khoản phụ cấp và các khoản chi trả cho người lao động dưới 01 tháng.",""],["","","c) Chi phí khấu hao tài sản cố định phục vụ cho hoạt động sản xuất, kinh doanh theo chế độ quản lý, sử dụng và trích khấu hao tài sản cố định (nếu có).",""],["","","d) Chi phí dịch vụ mua ngoài như điện, nước, điện thoại, internet, vận chuyển, thuê tài sản, sửa chữa, bảo dưỡng.",""],["","","đ) Chi phí trả lãi tiền vay vốn sản xuất, kinh doanh của tổ chức tín dụng theo lãi suất thực tế. Chi phí trả lãi tiền vay vốn sản xuất, kinh doanh của đối tượng không phải là tổ chức tín dụng không vượt quá mức quy định tại Bộ luật Dân sự.",""],["","","e) Các khoản chi khác phục vụ trực tiếp hoạt động sản xuất, kinh doanh...",""],["","","3. Chênh lệch {(3) = (1) - (2)}",""],["","","4. Tổng số thuế TNCN phải nộp {(4) = (3) x thuế suất}",""]]},{"k":"tbl","rows":[["","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN HỘ KINH DOANH/\nCÁ NHÂN KINH DOANH\n(Ký, ghi rõ họ tên và đóng dấu (nếu có))"]]},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh mở sổ này để xác định nghĩa vụ thuế TNCN theo quy định của pháp luật về thuế. Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế TNCN thì hộ kinh doanh, cá nhân kinh doanh sử dụng sổ này để đối chiếu số thuế TNCN phải nộp với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1: Ghi số tiền phù hợp với từng nội dung nêu tại cột C."},{"k":"p","t":"- Dòng 1: Hộ kinh doanh, cá nhân kinh doanh căn cứ vào chứng từ kế toán để ghi tổng doanh thu bán hàng hóa, dịch vụ hoặc có thể ghi theo từng nghiệp vụ phát sinh tùy theo nhu cầu của hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"- Dòng 2: Ghi tổng chi phí hợp lý trên cơ sở các chi phí thực tế phát sinh tại hộ kinh doanh, cá nhân kinh doanh hoặc có thể ghi theo từng nghiệp vụ phát sinh tùy theo nhu cầu của hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"- Hộ kinh doanh, cá nhân kinh doanh tính chênh lệch giữa tổng doanh thu và tổng chi phí hợp lý để làm căn cứ tính thuế TNCN phải nộp."},{"k":"p","t":"Việc xác định doanh thu, chi phí hợp lý để xác định nghĩa vụ thuế TNCN được thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"2.2.3. Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2d-HKD)"},{"k":"tbl","rows":[["HỘ, CÁ NHÂN KINH DOANH:........\nĐịa chỉ:.................................\nMã số thuế:..........................","Mẫu số S2d-HKD\n(Kèm theo Thông tư số 152/2025/TT-BTC\nngày 31 tháng 12 năm 2025 của Bộ trưởng\nBộ Tài chính)"]]},{"k":"p","t":"SỔ CHI TIẾT VẬT LIỆU, DỤNG CỤ, SẢN PHẨM, HÀNG HÓA"},{"k":"p","t":"Tên vật liệu, dụng cụ, sản phẩm, hàng hóa.................."},{"k":"p","t":"Kỳ kê khai.............................."},{"k":"tbl","rows":[["Chứng từ","Chứng từ","Diễn giải","Đơn \nvị \ntính","Đơn \ngiá","Nhập","Nhập","Xuất","Xuất","Tồn","Tồn","Ghi chú"],["Số \nhiệu","Ngày, \ntháng","Diễn giải","Đơn \nvị \ntính","Đơn \ngiá","Số\nlượng","Thành\ntiền","Số\nlượng","Thành\ntiền","Số \nlượng","Thành \ntiền","Ghi chú"],["A","B","C","D","1","2","3","4","5","6","7","8"],["","","Số dư đầu kỳ","","","","","","","","",""],["","","","","","","","","","","",""],["","","","","","","","","","","",""],["","","","","","","","","","","",""],["","","","","","","","","","","",""],["","","","","","","","","","","",""],["","","","","","","","","","","",""],["","","Cộng phát \nsinh trong kỳ","X","X","","","","","","",""],["","","Số dư cuối kỳ","","","X","X","X","X","","",""]]},{"k":"tbl","rows":[["","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN HỘ KINH DOANH/ \nCÁ NHÂN KINH DOANH\n(Ký, ghi rõ họ tên và đóng dấu (nếu có))"]]},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh mở sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa để theo dõi, quản lý về tình hình nhập, xuất, tồn cho từng vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột D: Đơn vị tính của vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi đơn giá nhập, xuất, tồn của từng vật liệu, dụng cụ, sản phẩm, hàng hóa. Trong đó, đơn giá nhập kho của từng vật liệu, dụng cụ, sản phẩm, hàng hóa căn cứ vào chứng từ mua vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"Đơn giá xuất kho được tính riêng cho từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa theo công thức sau:"},{"k":"tbl","rows":[["","Đơn giá\nxuất kho","=","(Giá trị hàng tồn đầu kỳ + Giá trị hàng nhập trong kỳ)",""],["","Đơn giá\nxuất kho","=","(Số lượng hàng tồn đầu kỳ + số lượng hàng nhập trong kỳ)",""]]},{"k":"p","t":"- Cột 2: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Cột 3: Ghi giá trị (thành tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho (Cột 3 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 4: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho."},{"k":"p","t":"- Cột 5: Ghi giá trị (thành tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (Cột 5 = Cột 1 x Cột 4)."},{"k":"p","t":"- Cột 6: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho."},{"k":"p","t":"- Cột 7: Ghi giá trị (thành tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho (Cột 7 = Cột 1 x Cột 6)."},{"k":"p","t":"2.2.4. Sổ chi tiết tiền (Mẫu số S2e-HKD)"},{"k":"tbl","rows":[["HỘ, CÁ NHÂN KINH DOANH:........\nĐịa chỉ:.................................\nMã số thuế:..........................","Mẫu số S2e-HKD\n(Kèm theo Thông tư số 152/20 "k":"p","t":"- Cột 8: Tính thuế bảo vệ môi trường phải nộp (Cột 8 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 9: Tính thuế tài nguyên phải nộp (Cột 9 = Cột 1 x Cột 3 x Cột 4)."},{"k":"p","t":"- Cột 10: Tính thuế sử dụng đất phải nộp (Cột 10 = Cột 1 x Cột 3 x Cột 4)."}]},{"id":"tt152_8","no":8,"code":"Điều 8","title":"Điều 8. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"Mục 3: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nCÓ HOẠT ĐỘNG THUỘC DIỆN CHỊU CÁC LOẠI THUẾ KHÁC","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/01/2026."},{"k":"p","t":"2. Thông tư số 88/2021/TT-BTC ngày 11/10/2021 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho các hộ kinh doanh, cá nhân kinh doanh hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành."},{"k":"p","t":"3. Ủy ban nhân dân, Sở Tài chính, Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các hộ kinh doanh, cá nhân kinh doanh thực hiện Thông tư này."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết./."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng và các Phó Thủ tướng Chính phủ;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Quốc hội;\n- Hội đồng dân tộc và các Ủy ban của Quốc Hội;\n- Văn phòng Chủ tịch nước;\n- Viện Kiểm sát Nhân dân tối cao;\n- Tòa án Nhân dân tối cao;\n- Kiểm toán Nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Liên đoàn Thương mại và Công nghiệp Việt Nam;\n- Các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc TW;\n- Sở Tài chính các tỉnh, thành phố trực thuộc TW;\n- Thuế các tỉnh, thành phố trực thuộc TW;\n- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính (Bộ Tư pháp);\n- Hiệp hội Kế toán và Kiểm toán Việt Nam;\n- Hội Kiểm toán viên hành nghề Việt Nam;\n- Cơ sở dữ liệu quốc gia về pháp luật;\n- Công báo; cổng thông tin điện tử: Chính phủ, Bộ Tài chính;\n- Các đơn vị thuộc và trực thuộc Bộ Tài chính;\n- Lưu: VT, Cục QLKT (100 bản)","KT. BỘ TRƯỞNG\nTHỨ TRƯỞNG\n\n\n\n\n\n\nNguyễn Đức Tâm"]]}]}],"forms":[{"code":"S1a-HKD","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Mục 1 — HKD không chịu thuế GTGT/TNCN","note":"Điều 4 — trường hợp đơn giản nhất"},{"code":"S2a-HKD","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 6 — nộp GTGT theo tỷ lệ %"},{"code":"S2b-HKD","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5 — nộp GTGT phương pháp kê khai"},{"code":"S2c-HKD","title":"Sổ chi tiết doanh thu, chi phí","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5"},{"code":"S2d-HKD","title":"Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5"},{"code":"S2e-HKD","title":"Sổ chi tiết tiền","pl":"Mục 2 — HKD nộp thuế GTGT và TNCN","note":"Điều 5"},{"code":"S3a-HKD","title":"Sổ theo dõi nghĩa vụ thuế khác","pl":"Mục 3 — HKD chịu các loại thuế khác","note":"Điều 7 — thuế XK/NK/TTĐB/tài nguyên/BVMT/SDĐ"}],"accounts":[],"refs":{"tt152_1":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"taxpayer","label":"Luật 67/2025 — Điều 2: Đối tượng nộp thuế"},{"kind":"related","targetSlug":"tt58","targetAnchor":"tt58_2","label":"TT 58/2026 — DN siêu nhỏ (khi HKD thành lập DN)"}],"tt152_4":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"method","label":"Luật 67/2025 — Điều 11: Phương pháp tính thuế"}],"tt152_6":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"method","label":"Luật 67/2025 — Điều 11: Phương pháp tính thuế"}],"tt152_8":[{"kind":"replaces","targetSlug":null,"label":"Thay thế Thông tư 88/2021/TT-BTC","note":"(chưa nạp)"}]},"details":{"tt152_1":[{"match":"Thông tư này hướng dẫn việc ghi sổ kế toán của các hộ kinh doanh, cá nhân kinh doanh","title":"TT 152 Điều 1 — Phạm vi (hộ, cá nhân kinh doanh)","summary":"TT 152 hướng dẫn ghi sổ kế toán cho hộ/cá nhân kinh doanh. Khi hộ kinh doanh thành lập doanh nghiệp được miễn thuế TNDN 2 năm (Điều 15 Luật 67) và chuyển sang chế độ kế toán DN (TT 58/TT 133).","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-15","label":"Luật 67 Điều 15 — Miễn thuế 2 năm cho DN từ hộ KD"},{"targetSlug":"tt58","targetAnchor":"tt58_1","label":"TT 58 — Kế toán DN siêu nhỏ (sau chuyển đổi)"}]}],"tt152_4":[{"match":"Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng","title":"TT 152 Điều 4 — Hộ kinh doanh nộp thuế","summary":"Hướng dẫn ghi sổ và xác định nghĩa vụ thuế của hộ/cá nhân kinh doanh. Hộ kinh doanh thường nộp thuế theo tỷ lệ % trên doanh thu — đối chiếu phương pháp tính thuế tại Điều 11 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Phương pháp tính thuế (% doanh thu)"}]}],"tt152_6":[{"match":"Hóa đơn, Bảng kê mua hàng hóa, dịch vụ (đối với trường hợp hộ kinh doanh, cá nhân kinh doanh mua hàng hóa","title":"TT 152 Điều 6 — Hộ KD nộp thuế theo % doanh thu","summary":"Trường hợp hộ/cá nhân kinh doanh nộp GTGT theo % doanh thu và TNCN trên thu nhập tính thuế: chứng từ và cách ghi sổ tương ứng. Phương pháp % doanh thu căn cứ Điều 11 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Tính thuế theo % doanh thu"}]}],"tt152_2":[{"match":"Người đại diện hộ kinh doanh, cá nhân kinh doanh tự ghi chép sổ sách kế toán","title":"TT 152 Điều 2 — Tổ chức công tác kế toán (hộ KD)","summary":"Người đại diện hộ/cá nhân kinh doanh tự ghi chép hoặc bố trí người làm kế toán — đơn giản hóa tối đa, không bắt buộc kế toán trưởng.","links":[{"label":"Áp dụng cho hộ, cá nhân kinh doanh","note":""}]}],"tt152_3":[{"match":"Hộ kinh doanh, cá nhân kinh doanh được lựa chọn lưu trữ các tài liệu kế toán","title":"TT 152 Điều 3 — Sổ kế toán và lưu trữ tài liệu","summary":"Hộ/cá nhân kinh doanh được lựa chọn hình thức lưu trữ tài liệu kế toán (giấy hoặc điện tử) và thời hạn lưu trữ theo quy định.","links":[{"label":"Quy định lưu trữ tài liệu kế toán hộ KD","note":""}]}],"tt152_5":[{"match":"Chứng từ kế toán sử dụng là Hóa đơn và các chứng từ khác làm căn cứ để xác định","title":"TT 152 Điều 5 — Nộp thuế theo phương pháp khấu trừ/kê khai","summary":"Trường hợp hộ/cá nhân kinh doanh nộp thuế theo phương pháp kê khai: chứng từ, sổ sách làm căn cứ xác định doanh thu, chi phí và nghĩa vụ thuế. Phương pháp tính thuế đối chiếu Điều 11 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Phương pháp tính thuế"}]}],"tt152_7":[{"match":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác","title":"TT 152 Điều 7 — Hoạt động chịu các loại thuế khác","summary":"Hướng dẫn ghi chép khi hộ/cá nhân kinh doanh có hoạt động chịu các loại thuế khác (tiêu thụ đặc biệt, tài nguyên, bảo vệ môi trường...).","links":[{"label":"Áp dụng khi phát sinh các sắc thuế khác","note":""}]}],"tt152_8":[{"match":"Thông tư này có hiệu lực thi hành kể từ ngày 01/01/2026","title":"TT 152 Điều 8 — Hiệu lực thi hành","summary":"TT 152/2025 có hiệu lực từ 01/01/2026, thay thế TT 88/2021 về kế toán hộ kinh doanh, cá nhân kinh doanh.","links":[{"label":"Hiệu lực 01/01/2026 — thay thế TT 88/2021","note":""}]}]},"summaries":{"tt152_2":{"tldr":"Người đại diện hộ kinh doanh, cá nhân kinh doanh tự ghi chép sổ sách kế toán hoặc bố trí người làm kế toán hoặc thuê dịch vụ làm kế toán theo quy định của pháp luật.","points":["Có thể bố trí cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, vợ, chồng, con đẻ, con nuôi, anh, chị, em ruột của mình làm kế toán.","Có thể bố trí người làm quản lý, điều hành, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản kiêm nhiệm làm kế toán."]},"tt152_3":{"tldr":"Điều quy định về sổ kế toán và lưu trữ tài liệu kế toán của hộ kinh doanh, cá nhân kinh doanh.","points":["Được lựa chọn lưu trữ tài liệu kế toán (hóa đơn, chứng từ, sổ kế toán...) trên phương tiện điện tử hoặc bằng bản giấy.","Thời hạn lưu trữ tài liệu kế toán tối thiểu là 05 năm; thời hạn lưu trữ hóa đơn thực hiện theo pháp luật về thuế.","Có thể bổ sung thêm sổ kế toán hoặc sửa đổi biểu mẫu cho phù hợp, nhưng vẫn phải ghi rõ tên sổ; ngày, tháng, năm lập sổ; họ tên, chữ ký, đóng dấu (nếu có) của người đại diện.","Trường hợp dùng hóa đơn điện tử được hệ thống quản lý thuế hỗ trợ xác định số thuế GTGT, TNCN, các loại thuế khác và thông báo cho người nộp thuế thì dùng các mẫu sổ tại Thông tư để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."]},"tt152_4":{"tldr":"Hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế GTGT, không phải nộp thuế TNCN sử dụng Sổ doanh thu bán hàng hóa, dịch vụ (mẫu số S1a-HKD) để ghi chép doanh thu.","points":["Sổ được mở để ghi doanh thu làm căn cứ kê khai, xác định hộ kinh doanh, cá nhân kinh doanh có thuộc đối tượng chịu thuế GTGT, nộp thuế TNCN hay không.","Trường hợp đã kê khai doanh thu theo pháp luật về thuế thì có thể dùng sổ này để theo dõi, đối chiếu số liệu với cơ quan thuế.","Cột A: ghi ngày, tháng ghi sổ.","Cột B: ghi diễn giải doanh thu từ bán hàng hóa, dịch vụ, có thể ghi theo từng nghiệp vụ phát sinh hoặc theo định kỳ.","Cột 1: ghi số tiền bán hàng hóa, dịch vụ."]},"tt152_5":{"tldr":"Hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ % trên doanh thu sử dụng hóa đơn cùng các chứng từ làm căn cứ xác định doanh thu, và Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-HKD).","points":["Chứng từ kế toán là hóa đơn và các chứng từ khác làm căn cứ xác định và kê khai doanh thu theo pháp luật về thuế.","Sổ S2a-HKD mở để ghi doanh thu theo từng nhóm ngành nghề có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN; nhiều ngành nghề khác nhau có thể mở cho từng ngành.","Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế GTGT, TNCN thì dùng sổ này để theo dõi, đối chiếu số thuế phải nộp với cơ quan thuế.","Cột A, B: ghi số hiệu, ngày, tháng của chứng từ; Cột C: ghi diễn giải doanh thu theo từng ngành nghề có cùng tỷ lệ % hoặc cùng mức thuế suất.","Cột 1: ghi số tiền bán hàng hóa, dịch vụ theo từng ngành nghề; trên cơ sở đó tính số thuế GTGT, TNCN phải nộp, dòng cuối ghi tổng số thuế GTGT, TNCN phải nộp."]},"tt152_6":{"tldr":"Hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế sử dụng hệ thống sổ kế toán gồm S2b-HKD, S2c-HKD, S2d-HKD và S2e-HKD.","points":["Chứng từ kế toán gồm hóa đơn, Bảng kê mua hàng hóa, dịch vụ (khi mua của người bán không có hóa đơn GTGT hoặc hóa đơn bán hàng) và các chứng từ khác làm căn cứ xác định doanh thu, thu nhập tính thuế.","Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2b-HKD): ghi doanh thu theo từng nhóm ngành nghề có cùng tỷ lệ % để tính thuế GTGT; dòng cuối ghi tổng số thuế GTGT phải nộp.","Sổ chi tiết doanh thu, chi phí (Mẫu số S2c-HKD): xác định nghĩa vụ thuế TNCN; Dòng 1 ghi tổng doanh thu, Dòng 2 ghi tổng chi phí hợp lý, tính chênh lệch giữa tổng doanh thu và tổng chi phí hợp lý làm căn cứ tính thuế TNCN.","Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2d-HKD): theo dõi nhập, xuất, tồn; Cột 3 = Cột 1 x Cột 2 (nhập), Cột 5 = Cột 1 x Cột 4 (xuất), Cột 7 = Cột 1 x Cột 6 (tồn).","Sổ chi tiết tiền (Mẫu số S2e-HKD): theo dõi thu, chi tiền mặt hoặc tiền gửi không kỳ hạn tại ngân hàng, tổ chức cung ứng dịch vụ thanh toán; cuối kỳ tính số tiền mặt thu, chi, tồn quỹ và tiền gửi không kỳ hạn gửi vào, rút ra, dư cuối kỳ."]},"tt152_7":{"tldr":"Hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác (thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường, thuế sử dụng đất) sử dụng thêm Sổ theo dõi nghĩa vụ thuế khác (Mẫu số S3a-HKD).","points":["Cột 1: ghi lượng hàng hóa, dịch vụ chịu thuế; Cột 2: mức thuế tuyệt đối; Cột 3: giá tính thuế/01 đơn vị hàng hóa, dịch vụ; Cột 4: mức thuế suất.","Cột 5: thuế xuất khẩu, nhập khẩu, tiêu thụ đặc biệt theo tỷ lệ % (Cột 5 = Cột 1 x Cột 3 x Cột 4); Cột 6: theo phương pháp tuyệt đối (Cột 6 = Cột 1 x Cột 2).","Cột 7: thuế xuất khẩu, nhập khẩu, tiêu thụ đặc biệt phải nộp (Cột 7 = Cột 5 + Cột 6).","Cột 8: thuế bảo vệ môi trường phải nộp (Cột 8 = Cột 1 x Cột 2); Cột 9: thuế tài nguyên phải nộp (Cột 9 = Cột 1 x Cột 3 x Cột 4); Cột 10: thuế sử dụng đất phải nộp (Cột 10 = Cột 1 x Cột 3 x Cột 4)."]},"tt152_8":{"tldr":"Thông tư có hiệu lực thi hành kể từ ngày 01/01/2026; Thông tư số 88/2021/TT-BTC ngày 11/10/2021 hết hiệu lực kể từ ngày Thông tư này có hiệu lực.","points":["Ủy ban nhân dân, Sở Tài chính, Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn hộ kinh doanh, cá nhân kinh doanh thực hiện Thông tư.","Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:2px 12px;font-size:10.5px;font-style:italic;color:#94a3b8">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px 12px;font-size:12px;color:var(--mu)">Không tìm thấy</div>';
  el.innerHTML=h;
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span> › </span>'+e(a.muc):'')+'<span> › </span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  var cnt=a.content||[];
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+applyDetails(id,autolink(t))+'</p>';}else if(c.k==='tbl'&&c.rows){h+='<table class="ct">';c.rows.forEach(function(row,ri){h+='<tr>';row.forEach(function(cell){var tg=ri===0?'th':'td';h+='<'+tg+'>'+e(cell)+'</'+tg+'>'});h+='</tr>'});h+='</table>';}})}
  else{h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>'}
  h+='</div>';
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  // Switch to main tab if not already there
  if(!document.getElementById('s-main').classList.contains('on')){
    tab('main',document.querySelector('.tab'));
  }
}
function search(v){buildSb(v)}
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);if(t==='summary')buildSummary();
}
function buildForms(){
  var h='';
  if(!D.forms||!D.forms.length){
    h='<div class="no-tk"><p>Không có biểu mẫu riêng.</p></div>';
    document.getElementById('s-forms').innerHTML=h;return;
  }
  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#1e40af">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx) để sử dụng.</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a><a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');
  if(!btn||btn.classList.contains('loading'))return;
  ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type');
  var orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span>...';
  try{
    var url='/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type;
    var res=await fetch(url,{credentials:'include'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var blob=await res.blob();
    var ext=type==='excel'?'.xlsx':'.docx';
    var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+ext;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(err){
    alert('Chưa có file biểu mẫu này hoặc lỗi tải. Vui lòng thử lại sau.');
  }finally{
    setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},800);
  }
});
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){
    el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Văn bản này không áp dụng hệ thống tài khoản kế toán.')+'</p></div>';
    return;
  }
  var h='<h2 style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:14px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:14px">'+D.outline.filter(function(a){return a.chuong&&a.chuong.indexOf('TÀI KHOẢN')>=0}).length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều khoản</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td style="font-size:13px">'+e(a.name)+'</td><td>';
    if(a.dieu){h+='<a class="tk-link" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.dieu+'\');return false" href="#">Xem Điều</a>'}
    h+='</td></tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:20px;font-weight:800;color:#1e3a8a;margin-bottom:4px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12px;color:var(--mu);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="sc"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="sc"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 12px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
// Hash navigation — jump to specific article when loaded with #articleId
function initHash(){
  var h=window.location.hash.slice(1);
  if(h&&D.outline.find(function(a){return a.id===h})){show(h)}
  else if(D.outline.length){show(D.outline[0].id)}
}
buildSb();buildForms();buildTK();buildSummary();
/*SUM-DEFAULT*/if(location.hash.slice(1)){initHash();}else if(D.summaries&&Object.keys(D.summaries).length){tab('summary',document.getElementById('tab-summary'));}else{initHash();}
</script>
