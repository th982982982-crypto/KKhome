<script id="LD" type="application/json">{"meta":{"title":"Thông tư 152/2025/TT-BTC — Kế toán Hộ Kinh doanh","shortCode":"TT 152/2025","subtitle":"Kế toán hộ kinh doanh, cá nhân kinh doanh","number":"152/2025/TT-BTC","effectiveDate":"01/01/2026","scope":"Hướng dẫn chứng từ kế toán, ghi sổ kế toán của hộ kinh doanh, cá nhân kinh doanh. Hiệu lực 01/01/2026, thay thế TT88/2021.","description":"TT 152/2025 phân loại 3 trường hợp rõ ràng theo nghĩa vụ thuế: (1) Không GTGT/TNCN — chỉ cần S1-HKD; (2) Nộp GTGT+TNCN kê khai — S2+S3+S-TTS; (3) Cho thuê tài sản — bổ sung S-TTS-HKD. Hỗ trợ hóa đơn điện tử đầy đủ.","related":["TT 58/2026 — Kế toán DN siêu nhỏ (khi HKD thành lập DN)","Luật 67/2025/QH15 — Điều 2, 11 (HKD nộp thuế TNDN theo % DT)","Luật Thuế TNCN 109/2025/QH15","Luật Thuế GTGT 48/2024/QH15"]},"outline":[{"id":"tt152_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh và đối tượng áp dụng","shortTitle":"Phạm vi điều chỉnh và đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này hướng dẫn việc ghi sổ kế toán của các hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"2. Đối tượng áp dụng Thông tư này là hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"tt152_2","no":2,"code":"Điều 2","title":"Điều 2. Tổ chức công tác kế toán","shortTitle":"Tổ chức công tác kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Người đại diện hộ kinh doanh, cá nhân kinh doanh tự ghi chép sổ sách kế toán hoặc bố trí người làm kế toán hoặc thuê dịch vụ làm kế toán cho hộ kinh doanh, cá nhân kinh doanh theo quy định của pháp luật. Người đại diện hộ kinh doanh, cá nhân kinh doanh có thể bố trí cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, vợ, chồng, con đẻ, con nuôi, anh, chị, em ruột của mình làm kế toán cho hộ kinh doanh, cá nhân kinh doanh hoặc bố trí người làm quản lý, điều hành, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản kiêm nhiệm làm kế toán cho hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"tt152_3","no":3,"code":"Điều 3","title":"Điều 3. Về sổ kế toán và lưu trữ tài liệu kế toán","shortTitle":"Về sổ kế toán và lưu trữ tài liệu kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh được lựa chọn lưu trữ các tài liệu kế toán (hóa đơn, chứng từ kế toán, sổ kế toán,...) trên phương tiện điện tử hoặc bằng bản giấy."},{"k":"p","t":"2. Thời hạn lưu trữ tài liệu kế toán của hộ kinh doanh, cá nhân kinh doanh tối thiểu là 05 năm, đối với thời hạn lưu trữ hóa đơn thì thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"3. Ngoài các sổ kế toán hướng dẫn tại Thông tư này, hộ kinh doanh, cá nhân kinh doanh có thể bổ sung thêm các sổ kế toán hoặc sửa đổi lại biểu mẫu các sổ kế toán cho phù hợp với nhu cầu của đơn vị. Sổ kế toán được mở thêm hoặc sửa đổi lại biểu mẫu vẫn phải ghi rõ tên sổ; ngày, tháng, năm lập sổ; họ tên và chữ ký, đóng dấu (nếu có) của người đại diện hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"4. Trường hợp hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử mà được hệ thống thông tin quản lý thuế của cơ quan thuế hỗ trợ xác định số thuế giá trị gia tăng (GTGT), thuế thu nhập cá nhân (TNCN), các loại thuế khác phải nộp (nếu có) và thông báo cho người nộp thuế thì hộ kinh doanh, cá nhân kinh doanh sử dụng các mẫu sổ kế toán hướng dẫn tại Thông tư này để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."}]},{"id":"tt152_4","no":4,"code":"Điều 4","title":"Điều 4. Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 1: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG KHÔNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, \nKHÔNG PHẢI NỘP THUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Trường hợp hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân thì sử dụng Sổ doanh thu bán hàng hóa, dịch vụ (mẫu số S1a-HKD) sau đây để ghi chép doanh thu bán hàng hóa, dịch vụ, cụ thể:"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:..........................."},{"k":"p","t":"Kỳ kê khai:.................................."},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"2. Phương pháp ghi sổ"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ làm căn cứ kê khai, xác định hộ kinh doanh, cá nhân kinh doanh có thuộc đối tượng chịu thuế GTGT, nộp thuế TNCN theo quy định của pháp luật về thuế hay không. Trường hợp hộ kinh doanh, cá nhân kinh doanh thực hiện kê khai doanh thu theo quy định của pháp luật về thuế thì hộ kinh doanh, cá nhân kinh doanh có thể dùng sổ này để theo dõi, đối chiếu số liệu với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B: Ghi diễn giải doanh thu từ việc bán hàng hóa, dịch vụ. Hộ kinh doanh, cá nhân kinh doanh có thể ghi theo từng nghiệp vụ phát sinh hoặc theo định kỳ."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ."}]},{"id":"tt152_5","no":5,"code":"Điều 5","title":"Điều 5. Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ phần trăm (%) trên doanh thu","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT và thuế TNCN theo tỷ lệ phần trăm (%) trên doanh thu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 2: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, PHẢI NỘP \nTHUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán sử dụng là Hóa đơn và các chứng từ khác làm căn cứ để xác định và kê khai doanh thu theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-HKD)"},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh sử dụng sổ doanh thu bán hàng hóa, dịch vụ theo mẫu sau đây để ghi chép doanh thu bán hàng hóa, dịch vụ:"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:........................."},{"k":"p","t":"Kỳ kê khai:..............................."},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"2.2. Phương pháp ghi sổ"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ theo từng nhóm danh mục ngành nghề kinh doanh có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN. Trường hợp hộ kinh doanh, cá nhân kinh doanh có nhiều nhóm ngành nghề khác nhau thì sổ này có thể mở cho từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN. Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế GTGT, thuế TNCN thì hộ kinh doanh, cá nhân kinh doanh sử dụng sổ này để theo dõi, đối chiếu số thuế GTGT, thuế TNCN phải nộp với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ có thể theo từng ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ có cùng tỷ lệ % để tính thuế GTGT hoặc cùng mức thuế suất để tính thuế TNCN. Trên cơ sở doanh thu được xác định, hộ kinh doanh, cá nhân kinh doanh tính ra số tiền thuế GTGT, thuế TNCN phải nộp theo từng ngành nghề có cùng tỷ lệ % hoặc cùng mức thuế suất. Dòng cuối cùng ghi tổng số thuế GTGT, thuế TNCN phải nộp."}]},{"id":"tt152_6","no":6,"code":"Điều 6","title":"Điều 6. Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế GTGT theo tỷ lệ % trên doanh thu và thuế TNCN trên thu nhập tính thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 2: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nTHUỘC ĐỐI TƯỢNG CHỊU THUẾ GIÁ TRỊ GIA TĂNG, PHẢI NỘP \nTHUẾ THU NHẬP CÁ NHÂN","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Hóa đơn, Bảng kê mua hàng hóa, dịch vụ (đối với trường hợp hộ kinh doanh, cá nhân kinh doanh mua hàng hóa, dịch vụ của người bán hàng không có hóa đơn GTGT hoặc hóa đơn bán hàng) và các chứng từ kế toán khác làm căn cứ để xác định doanh thu, thu nhập tính thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Hộ kinh doanh, cá nhân kinh doanh sử dụng các sổ kế toán theo danh mục sau đây"},{"k":"p","t":"2.2. Biểu mẫu và phương pháp ghi sổ kế toán"},{"k":"p","t":"2.2.1. Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2b-HKD)"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Địa điểm kinh doanh:........................."},{"k":"p","t":"Kỳ kê khai:................................"},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Sổ này được mở để ghi doanh thu bán hàng hóa, dịch vụ theo từng nhóm danh mục ngành nghề kinh doanh có cùng tỷ lệ % để tính thuế GTGT. Trường hợp hộ kinh doanh, cá nhân kinh doanh có nhiều nhóm ngành nghề khác nhau thì sổ này có thể mở cho từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT. Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế GTGT thì hộ kinh doanh, cá nhân kinh doanh sử dụng sổ này để theo dõi, đối chiếu số thuế GTGT phải nộp với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ có thể theo từng ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT. Trên cơ sở doanh thu được xác định, hộ kinh doanh, cá nhân kinh doanh tính ra số tiền thuế GTGT phải nộp theo từng ngành nghề có cùng tỷ lệ % để tính thuế GTGT. Dòng cuối cùng ghi tổng số thuế GTGT phải nộp."},{"k":"p","t":"2.2.2. Sổ chi tiết doanh thu, chi phí (Mẫu số S2c-HKD)"},{"k":"p","t":"SỔ CHI TIẾT DOANH THU, CHI PHÍ"},{"k":"p","t":"Tên địa điểm kinh doanh:..........."},{"k":"p","t":"Kỳ kê khai:................."},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh mở sổ này để xác định nghĩa vụ thuế TNCN theo quy định của pháp luật về thuế. Trường hợp cơ quan thuế cung cấp dữ liệu nộp thuế TNCN thì hộ kinh doanh, cá nhân kinh doanh sử dụng sổ này để đối chiếu số thuế TNCN phải nộp với cơ quan thuế."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1: Ghi số tiền phù hợp với từng nội dung nêu tại cột C."},{"k":"p","t":"- Dòng 1: Hộ kinh doanh, cá nhân kinh doanh căn cứ vào chứng từ kế toán để ghi tổng doanh thu bán hàng hóa, dịch vụ hoặc có thể ghi theo từng nghiệp vụ phát sinh tùy theo nhu cầu của hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"- Dòng 2: Ghi tổng chi phí hợp lý trên cơ sở các chi phí thực tế phát sinh tại hộ kinh doanh, cá nhân kinh doanh hoặc có thể ghi theo từng nghiệp vụ phát sinh tùy theo nhu cầu của hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"- Hộ kinh doanh, cá nhân kinh doanh tính chênh lệch giữa tổng doanh thu và tổng chi phí hợp lý để làm căn cứ tính thuế TNCN phải nộp."},{"k":"p","t":"Việc xác định doanh thu, chi phí hợp lý để xác định nghĩa vụ thuế TNCN được thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"2.2.3. Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2d-HKD)"},{"k":"p","t":"SỔ CHI TIẾT VẬT LIỆU, DỤNG CỤ, SẢN PHẨM, HÀNG HÓA"},{"k":"p","t":"Tên vật liệu, dụng cụ, sản phẩm, hàng hóa.................."},{"k":"p","t":"Kỳ kê khai.............................."},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh mở sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa để theo dõi, quản lý về tình hình nhập, xuất, tồn cho từng vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột D: Đơn vị tính của vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi đơn giá nhập, xuất, tồn của từng vật liệu, dụng cụ, sản phẩm, hàng hóa. Trong đó, đơn giá nhập kho của từng vật liệu, dụng cụ, sản phẩm, hàng hóa căn cứ vào chứng từ mua vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"Đơn giá xuất kho được tính riêng cho từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa theo công thức sau:"},{"k":"p","t":"- Cột 2: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Cột 3: Ghi giá trị (thành tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho (Cột 3 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 4: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho."},{"k":"p","t":"- Cột 5: Ghi giá trị (thành tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (Cột 5 = Cột 1 x Cột 4)."},{"k":"p","t":"- Cột 6: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho."},{"k":"p","t":"- Cột 7: Ghi giá trị (thành tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho (Cột 7 = Cột 1 x Cột 6)."},{"k":"p","t":"2.2.4. Sổ chi tiết tiền (Mẫu số S2e-HKD)"},{"k":"p","t":"SỔ CHI TIẾT TIỀN"},{"k":"p","t":"Kỳ kê khai: ............"},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh phải mở sổ chi tiết tiền để theo dõi tình hình thu, chi bằng tiền mặt hoặc tiền gửi không kỳ hạn (tiền gửi để thanh toán) trong tài khoản của hộ kinh doanh, cá nhân kinh doanh tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán theo quy định của pháp luật. Hộ kinh doanh, cá nhân kinh doanh có thể mở sổ này chi tiết theo từng loại tiền (tiền mặt, tiền gửi không kỳ hạn). Đối với tiền gửi không kỳ hạn, hộ kinh doanh, cá nhân kinh doanh có thể theo dõi riêng số tiền gửi tại từng ngân hàng hoặc từng tổ chức cung ứng dịch vụ thanh toán."},{"k":"p","t":"b) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu và ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1, 2: Ghi số tiền thu, chi tiền mặt hoặc số tiền gửi không kỳ hạn gửi vào, rút ra."},{"k":"p","t":"Cuối kỳ, hộ kinh doanh, cá nhân kinh doanh tính ra số tiền mặt thu, chi, tồn quỹ và số tiền gửi không kỳ hạn gửi vào, rút ra, dư cuối kỳ."}]},{"id":"tt152_7","no":7,"code":"Điều 7","title":"Điều 7. Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác","shortTitle":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"Mục 3: KẾ TOÁN TẠI HỘ KINH DOANH, CÁ NHÂN KINH DOANH \nCÓ HOẠT ĐỘNG THUỘC DIỆN CHỊU CÁC LOẠI THUẾ KHÁC","level":1,"content":[{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động thuộc diện chịu các loại thuế khác (thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường, thuế sử dụng đất) thì sử dụng thêm sổ theo dõi nghĩa vụ thuế khác (Mẫu số S3a-HKD) như sau:"},{"k":"p","t":"SỔ THEO DÕI NGHĨA VỤ THUẾ KHÁC"},{"k":"p","t":"Địa điểm kinh doanh:......................"},{"k":"p","t":"Kỳ kê khai:....................."},{"k":"p","t":"Đơn vị tính:"},{"k":"p","t":"Phương pháp ghi sổ:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1: Ghi lượng hàng hóa, dịch vụ chịu thuế."},{"k":"p","t":"- Cột 2: Ghi mức thuế tuyệt đối theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường."},{"k":"p","t":"- Cột 3: Giá tính thuế/01 đơn vị hàng hóa, dịch vụ thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"- Cột 4: Ghi mức thuế suất theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế sử dụng đất."},{"k":"p","t":"- Cột 5: Thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế theo tỷ lệ % (Cột 5 = Cột 1 x Cột 3 x Cột 4)."},{"k":"p","t":"- Cột 6: Tính thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế tuyệt đối (Cột 6 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 7: Tính thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt phải nộp (Cột 7= Cột 5+ Cột 6)."},{"k":"p","t":"- Cột 8: Tính thuế bảo vệ môi trường phải nộp (Cột 8 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 9: Tính thuế tài nguyên phải nộp (Cột 9 = Cột 1 x Cột 3 x Cột 4)."},{"k":"p","t":"- Cột 10: Tính thuế sử dụng đất phải nộp (Cột 10 = Cột 1 x Cột 3 x Cột 4)."}]},{"id":"tt152_8","no":8,"code":"Điều 8","title":"Điều 8. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/01/2026."},{"k":"p","t":"2. Thông tư số 88/2021/TT-BTC ngày 11/10/2021 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho các hộ kinh doanh, cá nhân kinh doanh hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành."},{"k":"p","t":"3. Ủy ban nhân dân, Sở Tài chính, Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các hộ kinh doanh, cá nhân kinh doanh thực hiện Thông tư này."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết./."}]}]}</script>

  var q=document.getElementById('q').value.toLowerCase();
  var cnt=a.content||[];
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span>›</span>'+e(a.muc):'')+'<span>›</span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+t+'</p>';}})}
  else h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết.</p>';
  h+='</div>';
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:21px;font-weight:800;color:#1e3a8a;margin-bottom:5px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:18px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div><div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:10px"><div style="font-weight:700;font-size:12.5px;color:var(--pr);margin-bottom:5px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12.5px;padding:3px 0 3px 14px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
buildSb();buildHome();
if(D.outline.length)show(D.outline[0].id);
</script>
</body>
</html>
