<script id="LD" type="application/json">{"meta":{"title":"Thông tư 20/2026/TT-BTC — Hướng dẫn Luật TNDN & NĐ 320/2025","shortCode":"TT 20/2026","subtitle":"Hướng dẫn chi tiết Luật 67 & NĐ 320/2025","slug":"tt20","number":"20/2026/TT-BTC","effectiveDate":"12/03/2026","scope":"Quy định chi tiết một số điều của Luật Thuế TNDN 67/2025 và NĐ 320/2025. Hiệu lực 12/3/2026, áp dụng từ kỳ tính thuế 2025.","description":"TT 20/2026 hướng dẫn thủ tục/hồ sơ: hồ sơ chi được trừ, hồ sơ ưu đãi thuế, thời điểm xác định doanh thu, DN Việt Nam đầu tư ra nước ngoài, DN nước ngoài tại VN, đăng ký vốn dự án mở rộng, nghĩa vụ thuế TSCĐ từ Quỹ KHCN. Thay thế TT 78/2014, 96/2015.","related":["Luật 67/2025/QH15 — Thuế TNDN","NĐ 320/2025/NĐ-CP — quy định chi tiết","TT 99/2025 — Kế toán DN","Thay thế: TT 78/2014, TT 96/2015"]},"outline":[{"id":"tt20_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này quy định về:"},{"k":"p","t":"1. Hồ sơ của khoản chi được tính vào chi phí được trừ quy định tại điểm b và điểm c khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"2. Hồ sơ hưởng ưu đãi thuế đối với các trường hợp quy định tại các điều 4, 13, 14 và 15 của Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"3. Thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp trong một số trường hợp quy định tại điểm c khoản 2 Điều 8 và khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP ngày 15 tháng 12 năm 2025 của Chính phủ quy định chi tiết một số điều và biện pháp để tổ chức, hướng dẫn thi hành Luật Thuế thu nhập doanh nghiệp (sau đây gọi chung là Nghị định số 320/2025/NĐ-CP)."},{"k":"p","t":"4. Hồ sơ kê khai và nộp thuế của doanh nghiệp Việt Nam đầu tư ra nước ngoài đối với khoản thu nhập từ dự án đầu tư tại nước ngoài quy định tại khoản 2 Điều 12 của Nghị định số 320/2025/NĐ-CP."},{"k":"p","t":"5. Thuế thu nhập doanh nghiệp đối với doanh nghiệp nước ngoài kinh doanh tại Việt Nam quy định tại Điều 2, khoản 4 Điều 3 và khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP."},{"k":"p","t":"6. Việc đăng ký số vốn đầu tư để thực hiện dự án đầu tư mở rộng của doanh nghiệp quy định tại Điều 20 của Nghị định số 320/2025/NĐ-CP."},{"k":"p","t":"7. Nghĩa vụ thuế trong trường hợp tài sản cố định đã được hình thành từ nguồn Quỹ phát triển khoa học và công nghệ của doanh nghiệp để phục vụ cho hoạt động nghiên cứu khoa học và công nghệ chưa hết hao mòn mà được doanh nghiệp chuyển sang phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp và mẫu Báo cáo trích lập, sử dụng Quỹ phát triển khoa học và công nghệ của doanh nghiệp quy định tại khoản 4 Điều 22 của Nghị định số 320/2025/NĐ-CP."}]},{"id":"tt20_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này áp dụng đối với các tổ chức, cá nhân có liên quan đến phạm vi điều chỉnh quy định tại Điều 1 của Thông tư này."}]},{"id":"tt20_3","no":3,"code":"Điều 3","title":"Điều 3. Hồ sơ của khoản chi được tính vào chi phí được trừ quy định tại điểm b và điểm c khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp","shortTitle":"Hồ sơ của khoản chi được tính vào chi phí được trừ quy định tại điểm b và điểm c khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Các khoản chi được tính vào chi phí được trừ quy định tại điểm b và điểm c khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp phải có đủ hóa đơn, chứng từ theo quy định và các thành phần hồ sơ. Thành phần hồ sơ cụ thể như sau:"},{"k":"p","t":"1. Hồ sơ của khoản chi cho thực hiện nhiệm vụ giáo dục quốc phòng và an ninh, huấn luyện, hoạt động của lực lượng dân quân tự vệ và phục vụ các nhiệm vụ quốc phòng, an ninh khác theo quy định của pháp luật quy định tại điểm b1 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Quyết định của người có thẩm quyền tại doanh nghiệp về việc thực hiện nhiệm vụ giáo dục quốc phòng và an ninh, huấn luyện, hoạt động của lực lượng dân quân tự vệ và phục vụ các nhiệm vụ quốc phòng, an ninh khác;"},{"k":"p","t":"b) Văn bản xác nhận của cơ quan có thẩm quyền theo quy định của pháp luật chuyên ngành về việc doanh nghiệp đã thực hiện nhiệm vụ giáo dục quốc phòng và an ninh, huấn luyện, hoạt động của lực lượng dân quân tự vệ và phục vụ các nhiệm vụ quốc phòng, an ninh khác."},{"k":"p","t":"2. Hồ sơ của khoản chi hỗ trợ phục vụ cho hoạt động của tổ chức đảng, tổ chức chính trị - xã hội trong doanh nghiệp quy định tại điểm b2 khoản 1 Điều 9 Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Quyết định thành lập hoặc quy chế làm việc của tổ chức đảng, tổ chức chính trị - xã hội trong doanh nghiệp;"},{"k":"p","t":"b) Văn bản đề nghị hỗ trợ của tổ chức đảng, tổ chức chính trị - xã hội trong doanh nghiệp hoặc kế hoạch sử dụng kinh phí phục vụ cho hoạt động của tổ chức đảng, tổ chức chính trị - xã hội trong doanh nghiệp được phê duyệt (nếu có)."},{"k":"p","t":"3. Hồ sơ của khoản chi cho hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp cho người lao động theo quy định của pháp luật quy định tại điểm b3 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Hợp đồng lao động hoặc thỏa ước lao động tập thể hoặc quy chế tài chính của doanh nghiệp có quy định về chi cho hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp cho người lao động (bao gồm cả trường hợp hợp đồng lao động hoặc thỏa ước lao động tập thể hoặc quy chế tài chính của doanh nghiệp cho phép người lao động được thanh toán khoản chi cho hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp bằng dịch vụ thanh toán không dùng tiền mặt và khoản chi này sau đó được doanh nghiệp thanh toán lại cho người lao động bằng dịch vụ thanh toán không dùng tiền mặt);"},{"k":"p","t":"b) Quyết định của người có thẩm quyền tại doanh nghiệp phê duyệt danh sách cử người lao động tham gia hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp;"},{"k":"p","t":"c) Hồ sơ đăng ký học của người lao động (bản sao);"},{"k":"p","t":"d) Văn bằng, chứng chỉ xác nhận kết quả học tập của người lao động. Trường hợp không có văn bằng, chứng chỉ thì phải có giấy xác nhận của tổ chức giáo dục nghề nghiệp, đào tạo nghề nghiệp cho người lao động hoặc danh sách người lao động đã tham gia hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp."},{"k":"p","t":"4. Hồ sơ của khoản chi thực tế cho hoạt động phòng, chống HIV/AIDS nơi làm việc của doanh nghiệp quy định tại điểm b4 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp là Quy định/Quy chế nội bộ của doanh nghiệp mà trong đó có quy định về khoản chi cho hoạt động phòng, chống HIV/AIDS của doanh nghiệp."},{"k":"p","t":"5. Hồ sơ của khoản tài trợ cho giáo dục, y tế, văn hóa; khoản tài trợ cho phòng, chống, khắc phục hậu quả thiên tai, dịch bệnh, làm nhà đại đoàn kết, nhà tình nghĩa, nhà cho các đối tượng chính sách theo quy định của pháp luật; khoản tài trợ theo quy định của Chính phủ, Thủ tướng Chính phủ dành cho các địa phương thuộc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn; khoản tài trợ cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số quy định tại điểm b5 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"a) Đối với khoản tài trợ cho giáo dục, y tế, văn hóa bằng tiền hoặc hiện vật, hồ sơ gồm: Biên bản xác nhận khoản tài trợ có chữ ký của người đại diện doanh nghiệp là nhà tài trợ và đại diện bên nhận tài trợ (hoặc đại diện cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật), trong đó đối với khoản tài trợ cho người bệnh thì trong biên bản xác nhận khoản tài trợ phải có xác nhận của cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật và chữ ký xác nhận của người bệnh hoặc thân nhân của người bệnh;"},{"k":"p","t":"b) Đối với khoản tài trợ cho việc phòng, chống, khắc phục hậu quả thiên tai, dịch bệnh bằng tiền hoặc hiện vật, hồ sơ gồm: Biên bản xác nhận khoản tài trợ có chữ ký của người đại diện doanh nghiệp là nhà tài trợ và đại diện bên nhận tài trợ là cá nhân, tổ chức được thành lập và hoạt động theo quy định của pháp luật, trong đó đối với khoản tài trợ cho cá nhân thì trong biên bản xác nhận tài trợ cần có xác nhận của cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật và chữ ký xác nhận của cá nhân được tài trợ;"},{"k":"p","t":"c) Đối với khoản tài trợ làm nhà đại đoàn kết, nhà tình nghĩa, nhà cho các đối tượng chính sách bằng tiền hoặc hiện vật, hồ sơ gồm: Biên bản xác nhận khoản tài trợ có chữ ký của người đại diện doanh nghiệp là nhà tài trợ và đại diện bên nhận tài trợ (hoặc đại diện cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật); văn bản xác nhận người thụ hưởng là đối tượng chính sách do cơ quan có thẩm quyền theo quy định của pháp luật chuyên ngành cấp;"},{"k":"p","t":"d) Đối với khoản tài trợ bằng tiền hoặc hiện vật theo quy định của Chính phủ, Thủ tướng Chính phủ dành cho các địa phương thuộc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn, hồ sơ gồm: Biên bản xác nhận khoản tài trợ có chữ ký của người đại diện doanh nghiệp là nhà tài trợ và đại diện bên nhận tài trợ (hoặc đại diện cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật);"},{"k":"p","t":"đ) Đối với khoản tài trợ bằng tiền hoặc hiện vật cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số, hồ sơ thực hiện theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về chuyển đổi số và Nghị định số 320/2025/NĐ-CP;"},{"k":"p","t":"e) Biên bản xác nhận khoản tài trợ nêu tại khoản này theo Mẫu số 01/TNDN ban hành kèm theo Thông tư này."},{"k":"p","t":"6. Hồ sơ của khoản chi cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số quy định tại điểm b6 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp thực hiện theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về chuyển đổi số và Nghị định số 320/2025/NĐ-CP."},{"k":"p","t":"7. Hồ sơ của phần giá trị tổn thất do thiên tai, dịch bệnh và trường hợp bất khả kháng khác không được bồi thường quy định tại điểm b7 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Biên bản kiểm kê giá trị tài sản, hàng hóa bị tổn thất do doanh nghiệp lập, trong đó phải xác định rõ giá trị tài sản, hàng hóa bị tổn thất, nguyên nhân tổn thất, trách nhiệm của tổ chức, cá nhân về những tổn thất, chủng loại, số lượng, đơn giá, giá trị tài sản, hàng hóa có thể thu hồi được (nếu có);"},{"k":"p","t":"b) Bảng kê xuất nhập tồn hàng hóa bị tổn thất do đại diện hợp pháp của doanh nghiệp xác nhận, ký và chịu trách nhiệm trước pháp luật;"},{"k":"p","t":"c) Hồ sơ bồi thường thiệt hại được cơ quan bảo hiểm chấp nhận bồi thường (nếu có);"},{"k":"p","t":"d) Hồ sơ quy định trách nhiệm của tổ chức, cá nhân phải bồi thường (nếu có)."},{"k":"p","t":"8. Hồ sơ của khoản chi thực tế cho người được biệt phái tham gia quản trị, điều hành, kiểm soát tổ chức tín dụng được kiểm soát đặc biệt, ngân hàng thương mại được chuyển giao bắt buộc theo quy định của Luật Các tổ chức tín dụng quy định tại điểm b8 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Quyết định biệt phái của cơ quan có thẩm quyền;"},{"k":"p","t":"b) Văn bản chấp thuận hoặc tiếp nhận biệt phái của tổ chức tín dụng nhận người được biệt phái;"},{"k":"p","t":"c) Hợp đồng, thỏa thuận (nếu có) giữa các bên liên quan."},{"k":"p","t":"9. Hồ sơ của một số khoản chi phục vụ sản xuất, kinh doanh của doanh nghiệp nhưng chưa tương ứng với doanh thu phát sinh trong kỳ quy định tại điểm b9 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp được quy định như sau:"},{"k":"p","t":"a) Đối với chi phí của bên tham gia dự thầu phải bỏ ra cho hoạt động tham gia đấu thầu nhưng không trúng thầu, hồ sơ gồm: Hồ sơ mời thầu của chủ đầu tư, bên mời thầu; hồ sơ dự thầu khi tham gia đấu thầu gửi chủ đầu tư, bên mời thầu; kết quả lựa chọn nhà thầu do chủ đầu tư, bên mời thầu phát hành (nếu có); các hồ sơ khác theo quy định của pháp luật về đấu thầu (nếu có);"},{"k":"p","t":"b) Đối với chi phí nghiên cứu thị trường, nghiên cứu sản phẩm, dịch vụ chuẩn bị cho việc sản xuất sản phẩm, dịch vụ mới, chi phí đầu tư cho dự án phát triển sản phẩm, dịch vụ mới nhưng không thành công hoặc dừng triển khai, hồ sơ gồm: Báo cáo nghiên cứu về phát triển thị trường, phát triển về sản phẩm, dịch vụ mới theo quy định tại điểm i2 khoản 2 Điều 9 Nghị định số 320/2025/NĐ-CP;"},{"k":"p","t":"c) Đối với chi phí tiền thuê đất và chi phí quản lý, duy trì cơ sở hạ tầng trả cho các doanh nghiệp kinh doanh cơ sở hạ tầng trong các khu kinh tế, khu công nghệ cao, khu nông nghiệp ứng dụng công nghệ cao, khu công nghệ số tập trung, khu công nghiệp, cụm công nghiệp, chi phí tiền thuê đất trả cho Nhà nước đối với đất thuê của Nhà nước, trong đó đất và cơ sở hạ tầng này phải là địa điểm, trụ sở sản xuất, kinh doanh của doanh nghiệp trong trường hợp chưa tham gia vào hoạt động sản xuất, kinh doanh của doanh nghiệp, hồ sơ gồm: Quyết định chấp thuận chủ trương đầu tư hoặc quyết định chủ trương đầu tư hoặc giấy chứng nhận đăng ký đầu tư hoặc giấy tờ có giá trị pháp lý tương đương theo quy định của pháp luật về đầu tư (nếu có); văn bản thỏa thuận hoặc hợp đồng thuê đất, cơ sở hạ tầng, trong đó quy định rõ các khoản chi phí doanh nghiệp phải trả cho tiền thuê đất, chi phí quản lý, duy trì cơ sở hạ tầng;"},{"k":"p","t":"d) Đối với chi phí khấu hao hoặc phân bổ dần vào chi phí theo quy định đối với tài sản cho thuê trong thời gian chưa có khách thuê, hồ sơ gồm: Hồ sơ chứng minh quyền sở hữu, quyền sử dụng hợp pháp của doanh nghiệp đối với tài sản; hồ sơ quản lý và theo dõi hạch toán đối với tài sản theo quy định;"},{"k":"p","t":"đ) Đối với chi phí thành lập doanh nghiệp hoặc chi nhánh, đơn vị phụ thuộc, địa điểm kinh doanh của doanh nghiệp; chi phí khôi phục sau khi tạm dừng sản xuất, kinh doanh (không phải là các khoản chi đầu tư xây dựng để hình thành tài sản cố định); chi phí hoàn trả lại hiện trạng theo hợp đồng trước khi giải thể doanh nghiệp hoặc chấm dứt hoạt động chi nhánh, đơn vị phụ thuộc, địa điểm kinh doanh của doanh nghiệp, hồ sơ gồm: Giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hoạt động chi nhánh/văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, giấy xác nhận về việc doanh nghiệp, chi nhánh, địa điểm kinh doanh thông báo tạm ngừng kinh doanh/tiếp tục kinh doanh trước thời hạn đã thông báo hoặc giấy xác nhận về việc văn phòng đại diện tạm ngừng hoạt động/tiếp tục hoạt động trước thời hạn đã thông báo; thông báo về việc doanh nghiệp đã giải thể hoặc thông báo về việc chấm dứt tồn tại chi nhánh/văn phòng đại diện/địa điểm kinh doanh."},{"k":"p","t":"Trường hợp phát sinh chi phí hoàn trả lại hiện trạng trụ sở, địa điểm sản xuất, kinh doanh theo hợp đồng trước khi giải thể doanh nghiệp hoặc chấm dứt hoạt động chi nhánh/văn phòng đại diện/địa điểm kinh doanh của doanh nghiệp, doanh nghiệp bổ sung biên bản bàn giao hiện trạng trụ sở, địa điểm sản xuất, kinh doanh trước khi tạm ngừng sản xuất, kinh doanh và biên bản bàn giao hiện trạng sau khi tiếp tục kinh doanh trước thời hạn đã thông báo hoặc biên bản bàn giao hiện trạng trước và sau khi giải thể doanh nghiệp hoặc chấm dứt hoạt động chi nhánh/văn phòng đại diện/địa điểm kinh doanh của doanh nghiệp;"},{"k":"p","t":"e) Đối với chi phí giới thiệu/marketing sản phẩm, dịch vụ trước khi bán hàng, hồ sơ gồm: Báo cáo về chủ trương đầu tư sản xuất sản phẩm, dịch vụ theo quy định tại điểm i6 khoản 2 Điều 9 Nghị định số 320/2025/NĐ-CP;"},{"k":"p","t":"g) Đối với chi phí hủy hàng tồn kho hư hỏng do thay đổi quá trình sinh hóa tự nhiên, hàng lạc hậu mốt, lạc hậu kỹ thuật, lỗi thời, hàng hết hạn sử dụng, hàng không còn giá trị sử dụng, hàng không đủ điều kiện lưu thông trên thị trường do quy định của các luật chuyên ngành; chi phí hủy nguyên liệu, vật tư, linh kiện không còn nhu cầu sử dụng, hồ sơ gồm: Quyết định của người có thẩm quyền tại doanh nghiệp về việc hủy hàng hóa, nguyên liệu, vật tư, linh kiện; biên bản kiểm kê giá trị hàng hóa, nguyên liệu, vật tư, linh kiện do doanh nghiệp lập, trong đó ghi rõ nguyên nhân, chủng loại, số lượng, giá trị, phương án xử lý đối với hàng hóa, nguyên liệu, vật tư, linh kiện nêu trên do đại diện hợp pháp của doanh nghiệp xác nhận, ký và chịu trách nhiệm; quyết định thành lập Hội đồng xử lý việc tiêu hủy hàng hóa, nguyên liệu, vật tư, linh kiện; quyết định xử lý của Hội đồng xử lý;"},{"k":"p","t":"h) Đối với chi phí hủy tài sản do hư hỏng không còn nhu cầu sử dụng, hồ sơ gồm: Quyết định của người có thẩm quyền tại doanh nghiệp về việc hủy tài sản; biên bản kiểm kê giá trị tài sản do doanh nghiệp lập, trong đó ghi rõ nguyên nhân hư hỏng, chủng loại, số lượng, giá trị, phương án xử lý tài sản do đại diện hợp pháp của doanh nghiệp xác nhận, ký và chịu trách nhiệm; quyết định thành lập Hội đồng xử lý việc hủy tài sản; quyết định xử lý của Hội đồng xử lý;"},{"k":"p","t":"i) Đối với chi phí hủy phế liệu, phế phẩm phát sinh trong quá trình gia công, sản xuất, hồ sơ gồm: Biên bản xác định việc hủy phế liệu, phế phẩm do doanh nghiệp lập và được đại diện hợp pháp của doanh nghiệp xác nhận, ký và chịu trách nhiệm trước pháp luật."},{"k":"p","t":"10. Hồ sơ của khoản chi hỗ trợ xây dựng công trình công cộng, đồng thời phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp quy định tại điểm b10 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Văn bản chấp thuận chủ trương hoặc phê duyệt dự án xây dựng công trình công cộng do đại diện hợp pháp của doanh nghiệp ký và chịu trách nhiệm;"},{"k":"p","t":"b) Quyết định đầu tư hoặc hợp đồng ký kết giữa doanh nghiệp và cơ quan có thẩm quyền."},{"k":"p","t":"11. Hồ sơ của khoản chi phí liên quan đến việc giảm phát thải khí nhà kính nhằm trung hòa các-bon và net zero, giảm ô nhiễm môi trường, đồng thời liên quan đến hoạt động sản xuất, kinh doanh của doanh nghiệp quy định tại điểm b11 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Quyết định của người có thẩm quyền của doanh nghiệp về việc thực hiện giảm phát thải khí nhà kính;"},{"k":"p","t":"b) Hồ sơ dự án hoặc đề án liên quan đến việc giảm phát thải khí nhà kính."},{"k":"p","t":"12. Hồ sơ của khoản đóng góp vào các quỹ được thành lập theo quyết định của Thủ tướng Chính phủ, quy định của Chính phủ mà doanh nghiệp có nghĩa vụ phải nộp quy định tại điểm b12 khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp gồm:"},{"k":"p","t":"a) Quyết định của Thủ tướng Chính phủ hoặc quy định của Chính phủ về việc thành lập quỹ;"},{"k":"p","t":"b) Biên bản xác nhận doanh nghiệp đóng góp vào các quỹ (nếu có)."},{"k":"p","t":"13. Hồ sơ của một số khoản chi theo quy định tại điểm c khoản 1 Điều 9 của Luật Thuế thu nhập doanh nghiệp được quy định như sau:"},{"k":"p","t":"a) Đối với trường hợp mua sản phẩm là nông, lâm, thủy sản của người sản xuất, đánh bắt trực tiếp bán ra; mua sản phẩm thủ công làm bằng đay, cói, tre, nứa, lá, song, mây, rơm, vỏ dừa, sọ dừa hoặc nguyên liệu tận dụng từ sản phẩm nông nghiệp của người sản xuất thủ công trực tiếp bán ra; mua phế liệu của người trực tiếp thu nhặt; mua đồ dùng, tài sản của hộ gia đình, cá nhân trực tiếp bán ra; mua hàng hóa, dịch vụ của cá nhân, hộ kinh doanh (không bao gồm các trường hợp nêu trên) có mức doanh thu dưới ngưỡng doanh thu chịu thuế giá trị gia tăng, hồ sơ gồm: Chứng từ chi trả tiền cho người bán theo quy định của pháp luật về kế toán, hóa đơn, chứng từ (đối với trường hợp giá trị mua hàng hóa, dịch vụ trong ngày của từng hộ, cá nhân từ 05 triệu đồng trở lên phải thanh toán không dùng tiền mặt); bảng kê thu mua hàng hóa, dịch vụ theo Mẫu số 02/TNDN ban hành kèm theo Thông tư này do người đại diện theo pháp luật hoặc người được ủy quyền của doanh nghiệp ký và chịu trách nhiệm;"},{"k":"p","t":"b) Đối với trường hợp doanh nghiệp phát sinh các khoản chi do doanh nghiệp ủy quyền/giao cho người lao động trực tiếp mua hộ hàng hóa, dịch vụ để phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp từ 05 triệu đồng trở lên mà các khoản chi phí này được thanh toán bởi người lao động bằng dịch vụ thanh toán không dùng tiền mặt, hồ sơ gồm: Hóa đơn, chứng từ theo quy định của pháp luật về kế toán, hóa đơn, chứng từ; quy chế tài chính hoặc quy chế nội bộ hoặc quyết định của doanh nghiệp quy định việc ủy quyền hoặc cho phép người lao động được phép thanh toán khoản mua hàng hóa, dịch vụ để phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp; chứng từ thanh toán không dùng tiền mặt của người lao động khi mua hàng hóa, dịch vụ theo ủy quyền của doanh nghiệp; chứng từ thanh toán không dùng tiền mặt của doanh nghiệp thanh toán lại cho người lao động;"},{"k":"p","t":"c) Đối với trường hợp mua hàng hóa, dịch vụ từng lần có giá trị từ 05 triệu đồng trở lên nếu đến thời điểm ghi nhận chi phí mà doanh nghiệp chưa thanh toán thì doanh nghiệp được tính vào chi phí được trừ khi xác định thu nhập chịu thuế trong trường hợp có hợp đồng mua hàng hóa, dịch vụ, biên bản bàn giao hàng hóa, dịch vụ và khi thanh toán doanh nghiệp phải có chứng từ thanh toán không dùng tiền mặt;"},{"k":"p","t":"d) Đối với trường hợp doanh nghiệp thuê tài sản của cá nhân thì hồ sơ để xác định chi phí được trừ là hợp đồng thuê tài sản, chứng từ trả tiền thuê tài sản."},{"k":"p","t":"Trường hợp doanh nghiệp thuê tài sản của cá nhân mà tại hợp đồng thuê tài sản có thỏa thuận tiền thuê tài sản chưa bao gồm thuế (thuế giá trị gia tăng, thuế thu nhập cá nhân) và doanh nghiệp phải nộp thuế thay cho cá nhân theo quy định của pháp luật về quản lý thuế thì doanh nghiệp được tính vào chi phí được trừ cả phần thuế nộp thay cho cá nhân đó nếu có chứng từ nộp thuế."},{"k":"p","t":"14. Hồ sơ của khoản chi được tính vào chi phí được trừ quy định tại Điều này là bản chính hoặc bản sao có chứng thực hoặc bản sao có đóng dấu của doanh nghiệp hoặc chứng từ điện tử theo quy định của pháp luật."},{"k":"p","t":"15. Doanh nghiệp có trách nhiệm lưu giữ, cung cấp đầy đủ hồ sơ liên quan đến các khoản chi phí tại Điều này để phục vụ cho công tác thanh tra, kiểm tra, kiểm toán và các trường hợp khác theo quy định của pháp luật. Trường hợp lưu giữ, cung cấp hồ sơ liên quan đến các nhiệm vụ, công tác quốc phòng, an ninh tại khoản 1 Điều này phải đảm bảo tuân thủ quy định của pháp luật về bảo vệ bí mật nhà nước."}]},{"id":"tt20_4","no":4,"code":"Điều 4","title":"Điều 4. Hồ sơ hưởng ưu đãi thuế quy định tại các điều 4, 13, 14 và 15 của Luật Thuế thu nhập doanh nghiệp","shortTitle":"Hồ sơ hưởng ưu đãi thuế quy định tại các điều 4, 13, 14 và 15 của Luật Thuế thu nhập doanh nghiệp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thủ tục, hồ sơ được hưởng miễn thuế, giảm thuế, thuế suất ưu đãi, thời gian miễn thuế, giảm thuế thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"2. Doanh nghiệp tự xác định các điều kiện miễn thuế, giảm thuế, thuế suất ưu đãi, thời gian miễn thuế, giảm thuế, số lỗ được trừ vào thu nhập chịu thuế để kê khai và quyết toán thuế với cơ quan thuế."},{"k":"p","t":"3. Trường hợp qua thanh tra, kiểm tra phát hiện và kết luận doanh nghiệp không đảm bảo các điều kiện để áp dụng miễn thuế, giảm thuế, ưu đãi thuế, mức thuế suất ưu đãi, thời gian miễn thuế, giảm thuế thì cơ quan có thẩm quyền xử lý truy thu thuế, tính tiền chậm nộp và xử phạt về thuế theo quy định của pháp luật."}]},{"id":"tt20_5","no":5,"code":"Điều 5","title":"Điều 5. Thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp trong một số trường hợp quy định tại điểm c khoản 2 Điều 8 và khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP","shortTitle":"Thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp trong một số trường hợp quy định tại điểm c khoản 2 Điều 8 và khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp trong một số trường hợp đối với doanh nghiệp được thành lập theo quy định của pháp luật Việt Nam như sau:"},{"k":"p","t":"a) Đối với hàng hóa xuất khẩu, thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là ngày chuyển giao quyền sở hữu theo hợp đồng xuất khẩu hàng hóa. Trường hợp không xác định được thời điểm chuyển giao quyền sở hữu thì thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp được căn cứ theo quy định về cơ sở xác định hàng hóa xuất khẩu của pháp luật về hải quan;"},{"k":"p","t":"b) Đối với hoạt động vận tải hàng không, thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là thời điểm hoàn thành việc cung ứng dịch vụ vận chuyển cho người mua;"},{"k":"p","t":"c) Đối với hoạt động xây dựng, lắp đặt (bao gồm cả đóng tàu), thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là thời điểm nghiệm thu công trình, hạng mục công trình, khối lượng xây dựng, lắp đặt, không phân biệt đã thu được tiền hay chưa thu được tiền;"},{"k":"p","t":"d) Đối với hoạt động cung cấp điện, nước, thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là ngày xác nhận chỉ số công tơ điện, nước được ghi trên hóa đơn tính tiền điện, tiền nước."},{"k":"p","t":"2. Thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp trong một số trường hợp đối với doanh nghiệp nước ngoài như sau:"},{"k":"p","t":"a) Đối với hoạt động chuyển nhượng vốn, thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là thời điểm hợp đồng chuyển nhượng vốn ban đầu có hiệu lực theo quy định;"},{"k":"p","t":"b) Đối với chuyển nhượng chứng khoán, chứng chỉ tiền gửi, thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là thời điểm chuyển nhượng;"},{"k":"p","t":"c) Đối với chuyển nhượng chứng khoán phái sinh là hợp đồng tương lai, thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp là thời điểm khớp lệnh mua, bán hợp đồng tương lai của nhà đầu tư trên hệ thống giao dịch của Sở Giao dịch chứng khoán hoặc thời điểm hợp đồng tương lai đáo hạn."}]},{"id":"tt20_6","no":6,"code":"Điều 6","title":"Điều 6. Hồ sơ kê khai và nộp thuế của doanh nghiệp Việt Nam đầu tư ra nước ngoài đối với khoản thu nhập từ dự án đầu tư tại nước ngoài quy định tại khoản 2 Điều 12 của Nghị định số 320/2025/NĐ-CP","shortTitle":"Hồ sơ kê khai và nộp thuế của doanh nghiệp Việt Nam đầu tư ra nước ngoài đối với khoản thu nhập từ dự án đầu tư tại nước ngoài quy định tại khoản 2 Điều 12 của Nghị định số 320/2025/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Hồ sơ kê khai và nộp thuế của doanh nghiệp Việt Nam đầu tư ra nước ngoài đối với khoản thu nhập từ dự án đầu tư tại nước ngoài thực hiện theo quy định tại Thông tư số 80/2021/TT-BTC ngày 29 tháng 9 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành một số điều của Luật Quản lý thuế và Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế và các văn bản sửa đổi, bổ sung (nếu có)."}]},{"id":"tt20_7","no":7,"code":"Điều 7","title":"Điều 7. Thuế thu nhập doanh nghiệp đối với doanh nghiệp nước ngoài kinh doanh tại Việt Nam quy định tại Điều 2, khoản 4 Điều 3 và khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP","shortTitle":"Thuế thu nhập doanh nghiệp đối với doanh nghiệp nước ngoài kinh doanh tại Việt Nam quy định tại Điều 2, khoản 4 Điều 3 và khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Quy định tại Điều này áp dụng đối với doanh nghiệp nước ngoài quy định tại các điểm b2, b3 và b4 khoản 1 Điều 2 của Nghị định số 320/2025/NĐ-CP (trừ các trường hợp quy định tại khoản 2 Điều này) thuộc các trường hợp sau đây:"},{"k":"p","t":"a) Doanh nghiệp nước ngoài có cơ sở thường trú tại Việt Nam hoặc không có cơ sở thường trú tại Việt Nam, bao gồm cả các doanh nghiệp có hoạt động kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số (sau đây gọi chung là nhà thầu nước ngoài, nhà thầu phụ nước ngoài) kinh doanh tại Việt Nam hoặc có thu nhập phát sinh tại Việt Nam trên cơ sở hợp đồng, thỏa thuận hoặc cam kết giữa nhà thầu nước ngoài với tổ chức, cá nhân Việt Nam hoặc giữa nhà thầu nước ngoài với nhà thầu phụ nước ngoài để thực hiện một phần công việc của hợp đồng nhà thầu;"},{"k":"p","t":"b) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài cung cấp dịch vụ, cung cấp dịch vụ gắn với hàng hóa, cung cấp và phân phối hàng hóa (bao gồm cả trường hợp ủy quyền hoặc thuê một số tổ chức, cá nhân Việt Nam thực hiện một phần dịch vụ phân phối, dịch vụ khác liên quan đến việc bán hàng hóa tại Việt Nam) theo hình thức xuất khẩu, nhập khẩu tại chỗ hoặc theo các điều khoản thương mại quốc tế (Incoterms), trừ trường hợp gia công và xuất trả hàng hóa cho doanh nghiệp nước ngoài thuê gia công; cung cấp hàng hóa, dịch vụ tại Việt Nam theo các hình thức kinh doanh thương mại điện tử, kinh doanh trên nền tảng số."},{"k":"p","t":"Đối với trường hợp cung cấp và phân phối hàng hóa tại Việt Nam quy định tại điểm này được áp dụng khi nhà thầu nước ngoài, nhà thầu phụ nước ngoài vẫn là chủ sở hữu đối với hàng hóa giao cho tổ chức, cá nhân Việt Nam hoặc chịu trách nhiệm về chi phí phân phối, quảng cáo, tiếp thị, chất lượng dịch vụ, chất lượng hàng hóa giao cho tổ chức, cá nhân Việt Nam hoặc ấn định giá bán hàng hóa hoặc giá cung ứng dịch vụ;"},{"k":"p","t":"c) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài cung cấp hàng hóa dưới hình thức điểm giao nhận hàng hóa nằm trong lãnh thổ Việt Nam (trừ trường hợp quy định tại khoản 2 Điều này) hoặc việc cung cấp hàng hóa có kèm theo một số dịch vụ tiến hành tại Việt Nam như dịch vụ quảng cáo, tiếp thị/marketing, hoạt động xúc tiến thương mại, dịch vụ sau bán hàng, dịch vụ lắp đặt, chạy thử, bảo hành, bảo dưỡng, thay thế và các dịch vụ khác đi kèm với việc cung cấp hàng hóa (bao gồm cả trường hợp dịch vụ kèm theo miễn phí), kể cả trường hợp việc cung cấp các dịch vụ nêu trên có hoặc không nằm trong giá trị của hợp đồng cung cấp hàng hóa;"},{"k":"p","t":"d) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thông qua tổ chức, cá nhân Việt Nam để thực hiện việc đàm phán, ký kết các hợp đồng đứng tên doanh nghiệp nước ngoài;"},{"k":"p","t":"đ) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện quyền xuất khẩu, quyền nhập khẩu, phân phối tại thị trường Việt Nam, mua hàng hóa để xuất khẩu, bán hàng hóa cho thương nhân Việt Nam theo pháp luật về thương mại và pháp luật về quản lý ngoại thương."},{"k":"p","t":"2. Quy định tại Điều này không áp dụng đối với các trường hợp sau:"},{"k":"p","t":"a) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp hàng hóa cho tổ chức, cá nhân Việt Nam không kèm theo các dịch vụ được thực hiện tại Việt Nam dưới hình thức giao hàng tại cửa khẩu nước ngoài, trong đó người bán chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc xuất khẩu hàng và giao hàng tại cửa khẩu nước ngoài; người mua chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu nước ngoài về đến Việt Nam (kể cả trường hợp giao hàng tại cửa khẩu nước ngoài có kèm điều khoản bảo hành là trách nhiệm và nghĩa vụ của người bán);"},{"k":"p","t":"b) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp hàng hóa cho tổ chức, cá nhân Việt Nam không kèm theo các dịch vụ được thực hiện tại Việt Nam dưới hình thức giao hàng tại cửa khẩu Việt Nam, trong đó người bán chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến hàng hóa cho đến điểm giao hàng tại cửa khẩu Việt Nam; người mua chịu mọi trách nhiệm, chi phí, rủi ro liên quan đến việc nhận hàng, chuyên chở hàng từ cửa khẩu Việt Nam (kể cả trường hợp giao hàng tại cửa khẩu Việt Nam có kèm điều khoản bảo hành là trách nhiệm và nghĩa vụ của người bán);"},{"k":"p","t":"c) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp dịch vụ sửa chữa (có bao gồm hoặc không bao gồm vật tư, thiết bị thay thế kèm theo) phương tiện vận tải, máy móc, thiết bị (kể cả đường cáp biển, thiết bị truyền dẫn) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài;"},{"k":"p","t":"d) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp dịch vụ quảng cáo, tiếp thị (trừ quảng cáo, tiếp thị trên internet) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài;"},{"k":"p","t":"đ) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp dịch vụ xúc tiến đầu tư và thương mại (trừ xúc tiến đầu tư và thương mại trên internet) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài;"},{"k":"p","t":"e) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp dịch vụ môi giới (trừ môi giới trên internet) bán hàng hóa, môi giới cung cấp dịch vụ ra nước ngoài cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài;"},{"k":"p","t":"g) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp dịch vụ đào tạo (trừ đào tạo trực tuyến) cho tổ chức, cá nhân Việt Nam mà các dịch vụ này được thực hiện ở nước ngoài;"},{"k":"p","t":"h) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài được chia cước (cước thanh toán) dịch vụ viễn thông quốc tế giữa Việt Nam với nước ngoài hoặc cho thuê đường truyền dẫn và băng tần vệ tinh của nước ngoài theo quy định của Luật Viễn thông và các văn bản sửa đổi, bổ sung (nếu có), các điều ước quốc tế về viễn thông mà nước Cộng hòa xã hội chủ nghĩa Việt Nam tham gia ký kết và các dịch vụ này được thực hiện ở ngoài Việt Nam;"},{"k":"p","t":"i) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài được chia cước (cước thanh toán) dịch vụ bưu chính quốc tế giữa Việt Nam với nước ngoài theo quy định của Luật Bưu chính và các văn bản sửa đổi, bổ sung (nếu có), các điều ước quốc tế về bưu chính mà nước Cộng hòa xã hội chủ nghĩa Việt Nam tham gia ký kết và các dịch vụ này được thực hiện ở ngoài Việt Nam;"},{"k":"p","t":"k) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài sử dụng kho ngoại quan, cảng nội địa (ICD) làm kho hàng hóa để phụ trợ cho hoạt động vận tải quốc tế, quá cảnh, chuyển khẩu, lưu trữ hàng hoặc để cho doanh nghiệp khác gia công;"},{"k":"p","t":"l) Nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện cung cấp dịch vụ khác với các dịch vụ nêu tại các điểm c, d, đ, e, g, h và i khoản này cho tổ chức, cá nhân Việt Nam mà việc cung cấp các dịch vụ này được thực hiện ở nước ngoài và không tiêu dùng tại Việt Nam;"},{"k":"p","t":"m) Doanh nghiệp nước ngoài chuyển nhượng vốn dưới hình thức giao dịch tái cơ cấu sở hữu của các công ty trong nội bộ tập đoàn không làm thay đổi công ty mẹ tối cao của các bên tham gia có sở hữu trực tiếp, gián tiếp doanh nghiệp tại Việt Nam sau tái cơ cấu và không phát sinh thu nhập, bao gồm các trường hợp: chia, tách công ty; hợp nhất công ty; sáp nhập công ty; hoán đổi cổ phần; góp vốn bằng cổ phần; phân chia lợi nhuận, cổ tức bằng cổ phiếu trong nội bộ tập đoàn và các giao dịch dịch chuyển sở hữu trực tiếp hoặc gián tiếp doanh nghiệp tại Việt Nam."},{"k":"p","t":"Việc chuyển nhượng vốn dưới hình thức giao dịch tái cơ cấu sở hữu của các công ty trong nội bộ tập đoàn không làm thay đổi công ty mẹ tối cao của các bên tham gia có sở hữu trực tiếp, gián tiếp doanh nghiệp tại Việt Nam được coi là không phát sinh thu nhập khi đáp ứng đồng thời các điều kiện sau: Không làm thay đổi chủ sở hữu hưởng lợi cuối cùng; giá trị chuyển nhượng không ghi cao hơn giá trị ghi sổ hoặc giá trị vốn góp ban đầu; giao dịch không tạo chênh lệch giá trị, giá trị được xác định theo hồ sơ tái cơ cấu đã được cấp có thẩm quyền phê duyệt không cao hơn giá trị được ghi nhận tại thời điểm chuyển nhượng vốn; bên nhận chuyển nhượng kế thừa toàn bộ giá trị vốn, nghĩa vụ và quyền lợi liên quan đến khoản đầu tư của bên chuyển nhượng;"},{"k":"p","t":"n) Doanh nghiệp nước ngoài bán hàng hóa là nguyên liệu, vật tư, linh kiện tại kho ngoại quan, khu phi thuế quan để nhập khẩu vào Việt Nam phục vụ sản xuất hàng xuất khẩu, gia công hàng xuất khẩu theo hợp đồng; doanh nghiệp nước ngoài chỉ định doanh nghiệp chế xuất giao hàng hóa là nguyên liệu, vật tư, linh kiện cho doanh nghiệp chế xuất khác để phục vụ sản xuất hàng xuất khẩu, gia công hàng xuất khẩu theo hợp đồng quy định tại điểm b khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP."},{"k":"p","t":"3. Cách xác định số thuế thu nhập doanh nghiệp phải nộp như sau:"},{"k":"p","t":"Số thuế thu nhập doanh nghiệp phải nộp của nhà thầu nước ngoài, nhà thầu phụ nước ngoài được xác định căn cứ theo doanh thu tính thuế và tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp. Cụ thể như sau:"},{"k":"tbl","rows":[["Số thuế thu nhập doanh nghiệp phải nộp","=","Doanh thu tính thuế thu nhập doanh nghiệp","x","Tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp"]]},{"k":"p","t":"Trong đó, doanh thu tính thuế thu nhập doanh nghiệp là toàn bộ doanh thu mà nhà thầu nước ngoài, nhà thầu phụ nước ngoài nhận được, chưa trừ các khoản thuế phải nộp. Doanh thu tính thuế thu nhập doanh nghiệp được tính bao gồm cả các khoản chi phí do bên Việt Nam trả thay nhà thầu nước ngoài, nhà thầu phụ nước ngoài (nếu có)."},{"k":"p","t":"4. Doanh thu tính thuế thu nhập doanh nghiệp đối với một số trường hợp cụ thể được xác định như sau:"},{"k":"p","t":"a) Trường hợp theo thỏa thuận tại hợp đồng nhà thầu, hợp đồng nhà thầu phụ, doanh thu nhà thầu nước ngoài, nhà thầu phụ nước ngoài nhận được không bao gồm thuế thu nhập doanh nghiệp phải nộp thì doanh thu tính thuế thu nhập doanh nghiệp được xác định theo công thức sau:"},{"k":"tbl","rows":[["Doanh thu tính thuế \nthu nhập doanh nghiệp","=","Doanh thu không bao gồm thuế \nthu nhập doanh nghiệp"],["Doanh thu tính thuế \nthu nhập doanh nghiệp","=","1 - Tỷ lệ % trên doanh thu \ntính thuế thu nhập doanh nghiệp"]]},{"k":"p","t":"b) Trường hợp tại hợp đồng, phụ lục hợp đồng nhà thầu nước ngoài giao một phần công việc hoặc một phần hạng mục cho nhà thầu phụ thì doanh thu tính thuế thu nhập doanh nghiệp của nhà thầu nước ngoài không bao gồm giá trị công việc, giá trị hạng mục do nhà thầu phụ thực hiện trên cơ sở hợp đồng thầu phụ đã ký kết giữa nhà thầu nước ngoài với nhà thầu phụ. Nhà thầu phụ quy định tại điểm này được xác định theo danh sách nhà thầu phụ quy định tại hợp đồng, phụ lục hợp đồng được ký giữa nhà thầu nước ngoài với bên Việt Nam trước khi nhà thầu phụ thực hiện một phần công việc hoặc một phần hạng mục công việc được giao."},{"k":"p","t":"Trường hợp nhà thầu nước ngoài ký hợp đồng với các nhà cung cấp tại Việt Nam để mua nguyên vật liệu, máy móc, thiết bị thực hiện hợp đồng nhà thầu và hàng hóa, dịch vụ phục vụ cho tiêu dùng nội bộ, tiêu dùng các khoản không thuộc hạng mục, công việc mà nhà thầu nước ngoài thực hiện theo hợp đồng nhà thầu thì giá trị hàng hóa, dịch vụ này không được trừ khi xác định doanh thu tính thuế thu nhập doanh nghiệp của nhà thầu nước ngoài;"},{"k":"p","t":"c) Trường hợp nhà thầu nước ngoài ký hợp đồng với nhà thầu phụ nước ngoài thì bên Việt Nam khai, nộp thuế thu nhập doanh nghiệp thay cho nhà thầu nước ngoài, nhà thầu phụ nước ngoài theo tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp tương ứng với ngành, nghề kinh doanh mà nhà thầu nước ngoài, nhà thầu phụ nước ngoài đó thực hiện theo hợp đồng nhà thầu, hợp đồng nhà thầu phụ. Nhà thầu phụ nước ngoài không phải khai, nộp thuế thu nhập doanh nghiệp trên phần giá trị công việc nhà thầu phụ nước ngoài thực hiện theo quy định tại hợp đồng nhà thầu phụ ký với nhà thầu nước ngoài mà bên Việt Nam đã khai, nộp thay;"},{"k":"p","t":"d) Đối với dịch vụ cho thuê máy móc, thiết bị, phương tiện vận tải, doanh thu tính thuế thu nhập doanh nghiệp là toàn bộ tiền cho thuê. Trường hợp doanh thu cho thuê máy móc, thiết bị, phương tiện vận tải bao gồm các chi phí do bên cho thuê trực tiếp chi trả như bảo hiểm phương tiện, bảo dưỡng, chứng nhận đăng kiểm, người điều khiển phương tiện, máy móc và chi phí vận chuyển máy móc, thiết bị từ nước ngoài đến Việt Nam thì doanh thu tính thuế thu nhập doanh nghiệp không bao gồm các khoản chi phí này nếu có chứng từ thực tế chứng minh;"},{"k":"p","t":"đ) Đối với dịch vụ vận chuyển của hãng hàng không nước ngoài, doanh thu tính thuế thu nhập doanh nghiệp là doanh thu bán vé hành khách, vận đơn hàng không và các khoản thu khác (trừ những khoản thu hộ Nhà nước hoặc tổ chức theo quy định của pháp luật) tại Việt Nam cho việc vận chuyển hành khách, hàng hóa và đối tượng vận chuyển khác được thực hiện trên các chuyến bay của chính hãng hàng không hoặc liên danh;"},{"k":"p","t":"e) Đối với dịch vụ vận chuyển của hãng vận tải biển nước ngoài, doanh thu tính thuế thu nhập doanh nghiệp là toàn bộ tiền cước thu được từ hoạt động vận chuyển hành khách, vận chuyển hàng hóa và các khoản phụ thu khác mà hãng vận tải biển được hưởng từ cảng xếp hàng của Việt Nam đến cảng cuối cùng bốc dỡ hàng hóa đó (bao gồm cả tiền cước của các lô hàng phải chuyển tải qua các cảng trung gian) và/hoặc tiền cước thu được do vận chuyển hàng hóa giữa các cảng Việt Nam."},{"k":"p","t":"Tiền cước vận chuyển làm căn cứ tính thuế thu nhập doanh nghiệp không bao gồm tiền cước đã tính thuế thu nhập doanh nghiệp tại cảng Việt Nam đối với chủ tàu nước ngoài và tiền cước trả cho doanh nghiệp vận tải Việt Nam do đã tham gia vận chuyển hàng từ cảng Việt Nam đến một cảng trung gian;"},{"k":"p","t":"g) Đối với dịch vụ giao nhận, kho vận quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế thu nhập doanh nghiệp là toàn bộ doanh thu nhà thầu nước ngoài nhận được không bao gồm cước vận chuyển quốc tế phải trả cho hãng vận chuyển (hàng không, đường biển);"},{"k":"p","t":"h) Đối với dịch vụ chuyển phát quốc tế từ Việt Nam đi nước ngoài (không phân biệt người gửi hay người nhận trả tiền dịch vụ), doanh thu tính thuế thu nhập doanh nghiệp là toàn bộ doanh thu nhà thầu nước ngoài nhận được;"},{"k":"p","t":"i) Đối với hoạt động nhượng tái bảo hiểm ra nước ngoài, doanh thu tính thuế thu nhập doanh nghiệp là số tiền phí nhượng tái bảo hiểm ra nước ngoài, hoa hồng nhượng tái bảo hiểm và các khoản thu khác phát sinh từ hoạt động nhượng tái bảo hiểm mà nhà thầu nước ngoài nhận được. Đối với hoạt động nhận tái bảo hiểm từ nước ngoài, doanh thu tính thuế thu nhập doanh nghiệp là khoản phí nhận tái bảo hiểm và các khoản thu khác phát sinh từ hoạt động nhận tái bảo hiểm theo bản thanh toán về tái bảo hiểm được xác nhận mà nhà thầu nước ngoài nhận được;"},{"k":"p","t":"k) Đối với chuyển nhượng chứng khoán, chứng chỉ tiền gửi, doanh thu tính thuế thu nhập doanh nghiệp là tổng doanh thu bán chứng khoán, chứng chỉ tiền gửi. Đối với chuyển nhượng chứng khoán phái sinh là hợp đồng tương lai, doanh thu tính thuế thu nhập doanh nghiệp là giá chuyển nhượng hợp đồng tương lai từng lần. Trong đó, giá chuyển nhượng hợp đồng tương lai từng lần được xác định bằng giá thanh toán của hợp đồng tương lai tại thời điểm xác định doanh thu tính thuế nhân với hệ số nhân hợp đồng nhân với số lượng hợp đồng nhân với tỷ lệ ký quỹ ban đầu chia cho 2 (Tỷ lệ ký quỹ ban đầu do Tổng Công ty Lưu ký và Bù trừ Chứng khoán Việt Nam công bố theo quy định);"},{"k":"p","t":"l) Đối với lãi tiền vay, doanh thu tính thuế thu nhập doanh nghiệp là toàn bộ khoản thu mà bên cho vay nhận được từ các khoản cho vay dưới bất kỳ hình thức nào mà khoản vay đó có hay không được đảm bảo bằng thế chấp, người cho vay đó có hay không được hưởng lợi tức của người đi vay; khoản thu từ lãi tiền gửi (trừ lãi tiền gửi của các cá nhân người nước ngoài và lãi tiền gửi phát sinh từ tài khoản tiền gửi để duy trì hoạt động tại Việt Nam của cơ quan đại diện ngoại giao, cơ quan đại diện của tổ chức quốc tế, tổ chức phi chính phủ tại Việt Nam), kể cả các khoản thưởng đi kèm lãi tiền gửi (nếu có); khoản thu từ lãi trả chậm theo quy định của các hợp đồng; khoản thu từ lãi trái phiếu, chiết khấu giá trái phiếu (trừ trái phiếu thuộc diện miễn thuế), tín phiếu; khoản thu từ lãi chứng chỉ tiền gửi. Lãi tiền vay bao gồm cả các khoản phí mà bên Việt Nam phải trả theo quy định của hợp đồng."},{"k":"p","t":"5. Tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp:"},{"k":"p","t":"a) Tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp áp dụng đối với doanh nghiệp nước ngoài kinh doanh tại Việt Nam thực hiện theo quy định tại khoản 3 Điều 12 của Nghị định số 320/2025/NĐ-CP;"},{"k":"p","t":"b) Trường hợp hợp đồng nhà thầu, hợp đồng nhà thầu phụ bao gồm nhiều hoạt động kinh doanh khác nhau, việc áp dụng tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp khi xác định số thuế thu nhập doanh nghiệp phải nộp căn cứ vào doanh thu tính thuế thu nhập doanh nghiệp đối với từng hoạt động kinh doanh do nhà thầu nước ngoài, nhà thầu phụ nước ngoài thực hiện theo quy định tại hợp đồng. Trường hợp không tách riêng được giá trị từng hoạt động kinh doanh thì áp dụng tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp đối với ngành, nghề kinh doanh có tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp cao nhất cho toàn bộ giá trị hợp đồng."},{"k":"p","t":"Riêng đối với hoạt động xây dựng có bao thầu nguyên vật liệu hoặc máy móc, thiết bị đi kèm công trình xây dựng: Trường hợp hợp đồng nhà thầu tách riêng giá trị từng hoạt động kinh doanh thì từng phần giá trị công việc theo hợp đồng được áp dụng tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp tương ứng với hoạt động kinh doanh đó. Trường hợp hợp đồng nhà thầu không tách riêng giá trị từng hoạt động kinh doanh thì tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp là 2% trên toàn bộ giá trị hợp đồng. Trường hợp nhà thầu nước ngoài ký hợp đồng với nhà thầu phụ để giao lại toàn bộ các phần công việc hoặc hạng mục có bao thầu nguyên vật liệu hoặc máy móc, thiết bị, nhà thầu nước ngoài chỉ thực hiện phần dịch vụ còn lại theo hợp đồng nhà thầu thì tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp được áp dụng đối với ngành, nghề dịch vụ (5%);"},{"k":"p","t":"c) Trường hợp hợp đồng cung cấp máy móc, thiết bị có kèm theo dịch vụ thực hiện tại Việt Nam, nếu tách riêng được giá trị máy móc, thiết bị và giá trị dịch vụ thì tính thuế theo tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp riêng của từng phần giá trị hợp đồng. Trường hợp trong hợp đồng không tách riêng được giá trị máy móc, thiết bị và giá trị dịch vụ thì áp dụng tỷ lệ % trên doanh thu tính thuế thu nhập doanh nghiệp là 2%."}]},{"id":"tt20_8","no":8,"code":"Điều 8","title":"Điều 8. Đăng ký số vốn đầu tư để thực hiện dự án đầu tư mở rộng của doanh nghiệp quy định tại Điều 20 của Nghị định số 320/2025/NĐ-CP","shortTitle":"Đăng ký số vốn đầu tư để thực hiện dự án đầu tư mở rộng của doanh nghiệp quy định tại Điều 20 của Nghị định số 320/2025/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Khi triển khai thực hiện dự án đầu tư mở rộng, doanh nghiệp có văn bản gửi cơ quan thuế quản lý trực tiếp cùng thời điểm nộp Tờ khai quyết toán thuế thu nhập doanh nghiệp chậm nhất vào năm thực hiện dự án đầu tư mở rộng để thông báo về số vốn đăng ký đầu tư của dự án đầu tư mở rộng."},{"k":"p","t":"2. Trong quá trình thực hiện dự án đầu tư mở rộng nếu doanh nghiệp có thay đổi về số vốn đầu tư đã đăng ký thì doanh nghiệp thông báo lại với cơ quan thuế."}]},{"id":"tt20_9","no":9,"code":"Điều 9","title":"Điều 9. Nghĩa vụ thuế trong trường hợp tài sản cố định đã được hình thành từ nguồn Quỹ phát triển khoa học và công nghệ của doanh nghiệp để phục vụ cho hoạt động nghiên cứu khoa học và công nghệ chưa hết hao mòn mà được doanh nghiệp chuyển giao cho hoạt động sản xuất, kinh doanh của doanh nghiệp và mẫu Báo cáo trích lập, sử dụng Quỹ phát triển khoa học và công nghệ của doanh nghiệp quy định tại khoản 4 Điều 22 của Nghị định số 320/2025/NĐ-CP","shortTitle":"Nghĩa vụ thuế trong trường hợp tài sản cố định đã được hình thành từ nguồn Quỹ phát triển khoa học và công nghệ của doanh nghiệp để phục vụ cho hoạt động nghiên cứu khoa học và công nghệ chưa hết hao mòn mà được doanh nghiệp chuyển giao cho hoạt động sản xuất, kinh doanh của doanh nghiệp và mẫu Báo cáo trích lập, sử dụng Quỹ phát triển khoa học và công nghệ của doanh nghiệp quy định tại khoản 4 Điều 22 của Nghị định số 320/2025/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp tài sản cố định đã được hình thành từ nguồn Quỹ phát triển khoa học và công nghệ của doanh nghiệp để phục vụ cho hoạt động nghiên cứu khoa học và công nghệ chưa hết hao mòn mà được chuyển giao cho hoạt động sản xuất, kinh doanh của doanh nghiệp thì phần giá trị còn lại của tài sản cố định tính vào thu nhập khác và phần giá trị còn lại của tài sản cố định đó được trích khấu hao, tính vào chi phí được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp."},{"k":"p","t":"2. Doanh nghiệp lập Báo cáo trích lập, sử dụng Quỹ phát triển khoa học và công nghệ theo Mẫu số 03-6/TNDN Phụ lục II ban hành kèm theo Thông tư số 80/2021/TT-BTC ngày 29 tháng 9 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành một số điều của Luật Quản lý thuế và Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế và các văn bản sửa đổi, bổ sung (nếu có)."}]},{"id":"tt20_10","no":10,"code":"Điều 10","title":"Điều 10. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành từ ngày 12 tháng 3 năm 2026 và áp dụng kể từ kỳ tính thuế năm 2025."},{"k":"p","t":"2. Đối với các khoản chi được trừ khi tính thuế thu nhập doanh nghiệp phát sinh trước ngày Thông tư này có hiệu lực thi hành mà tại Thông tư số 96/2015/TT-BTC ngày 22 tháng 6 năm 2015 của Bộ trưởng Bộ Tài chính hướng dẫn về thuế thu nhập doanh nghiệp tại Nghị định số 12/2015/NĐ-CP ngày 12 tháng 02 năm 2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật về thuế và sửa đổi bổ sung một số điều của các Nghị định về thuế và sửa đổi, bổ sung một số điều của Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014, Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014, Thông tư số 151/2014/TT-BTC ngày 10 tháng 10 năm 2014 của Bộ Tài chính (sau đây gọi chung là Thông tư số 96/2015/TT-BTC) đã quy định cụ thể về điều kiện, hồ sơ thì thực hiện theo quy định tại Thông tư số 96/2015/TT-BTC cho kỳ tính thuế năm 2025."},{"k":"p","t":"Đối với các khoản chi được trừ khi tính thuế thu nhập doanh nghiệp quy định tại Điều 3 Thông tư này mà chưa được quy định cụ thể tại Thông tư số 96/2015/TT-BTC thì thành phần hồ sơ áp dụng cho kỳ tính thuế năm 2025 là hóa đơn, chứng từ theo quy định của pháp luật (trong đó đối với chi phí khấu hao hoặc phân bổ dần vào chi phí đối với tài sản cho thuê trong thời gian chưa có khách thuê thì phải có hồ sơ chứng minh quyền sở hữu, quyền sử dụng hợp pháp của doanh nghiệp đối với tài sản)."},{"k":"p","t":"3. Quy định về chứng từ thanh toán không dùng tiền mặt và quy định về chuyển nhượng vốn tại Thông tư này áp dụng từ ngày Nghị định số 320/2025/NĐ-CP có hiệu lực thi hành."},{"k":"p","t":"4. Trường hợp hợp đồng nhà thầu, hợp đồng nhà thầu phụ đang áp dụng theo phương pháp hỗn hợp quy định tại Thông tư số 103/2014/TT-BTC ngày 06 tháng 8 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện nghĩa vụ thuế áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam hoặc có thu nhập phát sinh tại Việt Nam được ký kết trước ngày Thông tư này có hiệu lực thì việc xác định nghĩa vụ thuế thu nhập doanh nghiệp tiếp tục thực hiện như quy định tại các văn bản quy phạm pháp luật có hiệu lực tại thời điểm ký kết hợp đồng."},{"k":"p","t":"5. Trường hợp các văn bản quy phạm pháp luật viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."},{"k":"p","t":"6. Thông tư này thay thế:"},{"k":"p","t":"a) Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Nghị định số 218/2013/NĐ-CP ngày 26 tháng 12 năm 2013 của Chính phủ quy định và hướng dẫn thi hành Luật Thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b) Thông tư số 96/2015/TT-BTC ngày 22 tháng 6 năm 2015 của Bộ trưởng Bộ Tài chính hướng dẫn về thuế thu nhập doanh nghiệp tại Nghị định số 12/2015/NĐ-CP ngày 12 tháng 02 năm 2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật về thuế và sửa đổi bổ sung một số điều của các Nghị định về thuế và sửa đổi, bổ sung một số điều của Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014, Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014, Thông tư số 151/2014/TT-BTC ngày 10 tháng 10 năm 2014 của Bộ Tài chính."},{"k":"p","t":"7. Thông tư này bãi bỏ các quy định liên quan đến chính sách thuế thu nhập doanh nghiệp tại:"},{"k":"p","t":"a) Điều 1, Điều 2, Điều 7, Điều 10, Điều 13 (trừ điểm b.11 khoản 1 Điều 13) và Điều 16 Thông tư số 103/2014/TT-BTC ngày 06 tháng 8 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện nghĩa vụ thuế áp dụng đối với tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam hoặc có thu nhập phát sinh tại Việt Nam;"},{"k":"p","t":"b) Điều 6 Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 156/2013/TT-BTC ngày 06 tháng 11 năm 2013, Thông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013, Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013, Thông tư số 08/2013/TT-BTC ngày 10 tháng 01 năm 2013, Thông tư số 85/2011/TT-BTC ngày 17 tháng 6 năm 2011, Thông tư số 39/2014/TT-BTC ngày 31 tháng 3 năm 2014 và Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ Tài chính để cải cách, đơn giản các thủ tục hành chính về thuế;"},{"k":"p","t":"c) Chương I Thông tư số 151/2014/TT-BTC ngày 10 tháng 10 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Nghị định số 91/2014/NĐ-CP ngày 01 tháng 10 năm 2014 của Chính phủ về việc sửa đổi, bổ sung một số điều tại các Nghị định quy định về thuế;"},{"k":"p","t":"d) Điều 5 Thông tư số 130/2016/TT-BTC ngày 12 tháng 8 năm 2016 của Bộ trưởng Bộ Tài chính hướng dẫn Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của Luật Thuế giá trị gia tăng, Luật Thuế tiêu thụ đặc biệt và Luật Quản lý thuế và sửa đổi một số điều tại các Thông tư về thuế;"},{"k":"p","t":"đ) Điều 3 Thông tư số 25/2018/TT-BTC ngày 16 tháng 3 năm 2018 của Bộ trưởng Bộ Tài chính hướng dẫn Nghị định số 146/2017/NĐ-CP ngày 15 tháng 12 năm 2017 của Chính phủ và sửa đổi, bổ sung một số điều của Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ trưởng Bộ Tài chính, \nThông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013 của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"e) Điều 2, khoản 5 Điều 3, Điều 4, khoản 3 Điều 5 Thông tư số 67/2022/TT-BTC ngày 07 tháng 11 năm 2022 của Bộ trưởng Bộ Tài chính hướng dẫn về nghĩa vụ thuế khi doanh nghiệp trích lập và sử dụng Quỹ phát triển khoa học và công nghệ của doanh nghiệp;"},{"k":"p","t":"g) Điều 4 Thông tư số 83/2016/TT-BTC ngày 17 tháng 6 năm 2016 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện ưu đãi đầu tư theo quy định của Luật Đầu tư và Nghị định số 118/2015/NĐ-CP ngày 12 tháng 11 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Đầu tư;"},{"k":"p","t":"h) Điều 4 Thông tư số 128/2011/TT-BTC ngày 12 tháng 9 năm 2011 của Bộ Tài chính hướng dẫn về thuế giá trị gia tăng và thuế thu nhập doanh nghiệp đối với cơ sở y tế công lập./."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng; \n- Thủ tướng, các Phó Thủ tướng Chính phủ; \n- Văn phòng Trung ương Đảng và các Ban của Đảng; \n- Văn phòng Tổng Bí thư; \n- Văn phòng Quốc hội; \n- Văn phòng Chính phủ; \n- Văn phòng Chủ tịch nước; \n- Hội đồng dân tộc và các Ủy ban của Quốc hội; \n- Viện kiểm sát nhân dân tối cao; \n- Tòa án nhân dân tối cao; \n- Kiểm toán nhà nước; \n- UBTW Mặt trận Tổ quốc Việt Nam; \n- Cơ quan trung ương của các đoàn thể; \n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ; \n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Sở Tài chính các tỉnh, thành phố trực thuộc trung ương; \n- Thuế các tỉnh, thành phố trực thuộc trung ương; \n- Kho bạc Nhà nước các khu vực; \n- Chi cục Hải quan các khu vực; \n- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính, Bộ Tư pháp; \n- Công báo; \n- Cơ sở dữ liệu quốc gia về văn bản quy phạm pháp luật; \n- Cổng pháp luật quốc gia; \n- Cổng Thông tin điện tử Chính phủ; \n- <script>
var D=JSON.parse(document.getElementById('LD').textContent);var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tkbold(h){return h.replace(/(TK\s*\d[\d\.]*)/g,'<span class="tk">$1</span>').replace(/(Tài khoản\s+\d[\d\.]*)/g,'<span class="tk">$1</span>')}
var isNo=function(t){return /^Nợ\s+(các\s+)?TK\b|^Nợ\s+TK/.test(t)};
var isCo=function(t){return /^Có\s+(các\s+)?TK\b|^Có\s+TK/.test(t)};
function jline(t){var h=tkbold(e(t)).replace(/^(Nợ|Có)\s+/,'');return '<div class="line '+(isNo(t)?'no':'co')+'">'+h+'</div>'}
function rtable(rows){var h='<table class="ct">';rows.forEach(function(r,ri){h+='<tr>';r.forEach(function(c){var tg=ri===0?'th':'td';h+='<'+tg+'>'+e(c)+'</'+tg+'>'});h+='</tr>'});return h+'</table>'}
function hl(s,q){if(!q)return s;var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');return s.replace(rx,function(m){return'<mark>'+m+'</mark>'})}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function renderContent(content,q){
  var h='',i=0,n=content.length;
  while(i<n){
    var c=content[i];
    if(c.k==='tbl'){h+=rtable(c.rows);i++;continue}
    var t=(c.t||'').trim();
    if(!t){i++;continue}
    if(isNo(t)||isCo(t)){var blk='<div class="je">';while(i<n&&content[i].k==='p'&&(isNo((content[i].t||'').trim())||isCo((content[i].t||'').trim()))){blk+=jline((content[i].t||'').trim());i++}h+=blk+'</div>';continue}
    if(/^Bên Nợ\s*:?$/.test(t)){h+='<div class="lbl lbl-no">'+e(t.replace(/:$/,''))+'</div>';i++;continue}
    if(/^Bên Có\s*:?$/.test(t)){h+='<div class="lbl lbl-co">'+e(t.replace(/:$/,''))+'</div>';i++;continue}
    if(/^Số dư bên (Nợ|Có)/.test(t)){h+='<div class="lbl lbl-du">'+tkbold(e(t))+'</div>';i++;continue}
    if(/^\d+\.\s/.test(t)&&t.length<140){h+='<p class="p-num">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^\d+\.\d+\.?\s/.test(t)){h+='<p class="p-sub">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^[a-zđ]\)\s/.test(t)){h+='<p class="p-sub">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^[-+•]\s/.test(t)){h+='<p class="p-dash">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    h+='<p>'+hl(tkbold(e(t)),q)+'</p>';i++;
  }
  return autolink(h||'<p style="color:var(--mut)">(Mục này không có nội dung văn bản.)</p>');
}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:3px 14px;font-size:11px;font-style:italic;color:var(--mut)">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px;font-size:12px;color:var(--mut)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span>›</span>'+e(a.muc):'')+'<span>›</span><b>'+e(a.code)+'</b></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">'+applyDetails(id,renderContent(a.content||[],q))+'</div>'+renderRefs(id);
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  if(!document.getElementById('s-main').classList.contains('on'))tab('main',document.querySelector('.tab'));
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];

  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12.5px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 14px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
