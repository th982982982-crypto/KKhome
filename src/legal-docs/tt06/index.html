p thuế; mẫu biểu thanh tra, kiểm tra thuế, trình tự, thủ tục, hồ sơ kiểm tra thuế; nộp dần tiền thuế nợ; hướng dẫn thi hành khoản 4 Điều 7, khoản 4 Điều 8, Điều 39 Nghị định số 126/2020/NĐ-CP ngày 19/10/2020 của Chính phủ quy định chi tiết thi hành một số điều của Luật Quản lý thuế, bao gồm các nội dung: Mẫu tờ khai khai bổ sung; các trường hợp hàng hóa xuất khẩu, nhập khẩu không phải khai thuế theo từng lần phát sinh; ủy nhiệm thu phí hải quan, lệ phí hàng hóa, phương tiện quá cảnh."}]},{"id":"tt06_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng áp dụng quy định tại Thông tư này bao gồm: Người nộp thuế, cơ quan hải quan, công chức hải quan, cơ quan nhà nước, tổ chức, cá nhân khác có liên quan theo quy định tại Điều 2 Luật Quản lý thuế."}]},{"id":"tt06_3","no":3,"code":"Điều 3","title":"Điều 3. Hướng dẫn khoản 8 Điều 3; khoản 1, khoản 4 Điều 42 Luật Quản lý thuế về tờ khai hải quan, khai thuế, tính thuế; khoản 1, khoản 4 Điều 7, điểm c khoản 4 Điều 8 Nghị định số 126/2020/NĐ-CP về mẫu tờ khai bổ sung, các trường hợp hàng hóa xuất khẩu, nhập khẩu không phải khai thuế theo từng lần phát sinh","shortTitle":"Hướng dẫn khoản 8 Điều 3; khoản 1, khoản 4 Điều 42 Luật Quản lý thuế về tờ khai hải quan, khai thuế, tính thuế; khoản 1, khoản 4 Điều 7, điểm c khoản 4 Điều 8 Nghị định số 126/2020/NĐ-CP về mẫu tờ khai bổ sung, các trường hợp hàng hóa xuất khẩu, nhập khẩu không phải khai thuế theo từng lần phát sinh","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Mẫu tờ khai hải quan, mẫu tờ khai hải quan khai bổ sung đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại khoản 5, khoản 9 Điều 1 Thông tư số 39/2018/TT-BTC ngày 20/4/2018 của Bộ Tài chính sửa đổi, bổ sung một số điều tại Thông tư số 38/2015/TT-BTC ngày 25/3/2015 của Bộ Tài chính quy định về thủ tục hải quan; kiểm tra, giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"2. Người nộp thuế phải khai chính xác, trung thực, đầy đủ các nội dung trong tờ khai hải quan theo quy định tại khoản 5 Điều 1 Thông tư số 39/2018/TT-BTC, nộp đủ các chứng từ, tài liệu quy định trong hồ sơ hải quan cho cơ quan hải quan."},{"k":"p","t":"3. Các trường hợp hàng hóa xuất khẩu, nhập khẩu không phải khai thuế theo từng lần phát sinh quy định tại điểm c khoản 4 Điều 8 Nghị định số 126/2020/NĐ-CP, bao gồm:"},{"k":"p","t":"a) Mặt hàng điện năng xuất khẩu, nhập khẩu theo quy định tại Điều 93 Thông tư số 38/2015/TT-BTC;"},{"k":"p","t":"b) Hàng hóa bán trong khu vực cách ly tại các sân bay quốc tế (trừ hàng bán miễn thuế) theo quy định tại Điều 93 Thông tư số 38/2015/TT-BTC;"},{"k":"p","t":"c) Hàng hóa cung cấp cho hành khách trên các chuyến bay tuyến quốc tế theo quy định tại Điều 93 Thông tư số 38/2015/TT-BTC;"},{"k":"p","t":"d) Xăng, dầu cung ứng cho tàu bay xuất cảnh theo quy định tại Điều 93 Thông tư số 38/2015/TT-BTC;"},{"k":"p","t":"đ) Các trường hợp hàng hóa xuất khẩu, nhập khẩu tại chỗ thực hiện việc giao nhận hàng hóa nhiều lần trong ngày hoặc trong tháng theo quy định tại Điều 86 Thông tư số 38/2015/TT-BTC."},{"k":"p","t":"4. Khai thuế, nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu thông qua hoạt động kinh doanh thương mại điện tử, kinh doanh trên nền tảng số và các dịch vụ khác được thực hiện bởi nhà cung cấp ở nước ngoài không có cơ sở thường trú tại Việt Nam quy định tại khoản 4 Điều 42 Luật Quản lý thuế thực hiện như khai thuế, nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu được quy định tại Điều 5 Nghị định số 08/2015/NĐ-CP ngày 21/01/2015 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát hải quan và kiểm soát hải quan được sửa đổi, bổ sung tại khoản 3 Điều 1 Nghị định số 59/2018/NĐ-CP ngày 20/4/2018 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 08/2015/NĐ-CP ngày 21/01/2015 của Chính phủ quy định chi tiết và biện pháp thi hành Luật Hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan, Thông tư số 38/2015/TT-BTC, Thông tư số 39/2018/TT-BTC."}]},{"id":"tt06_4","no":4,"code":"Điều 4","title":"Điều 4. Hướng dẫn khoản 4 Điều 7 Luật Quản lý thuế quy định về đồng tiền khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi","shortTitle":"Hướng dẫn khoản 4 Điều 7 Luật Quản lý thuế quy định về đồng tiền khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Đồng tiền khai thuế, nộp thuế và các khoản thu khác đối với hàng hóa xuất khẩu, nhập khẩu, quá cảnh, phương tiện vận tải xuất cảnh, nhập cảnh, quá cảnh là đồng Việt Nam."},{"k":"p","t":"2. Khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi quy định tại khoản 4 Điều 7 Luật Quản lý thuế được thực hiện như sau:"},{"k":"p","t":"a) Trường hợp khai thuế, nộp thuế xuất khẩu bằng ngoại tệ tự do chuyển đổi đối với mặt hàng dầu thô, khí thiên nhiên xuất khẩu thực hiện theo quy định tại Thông tư số 36/2016/TT-BTC ngày 26/02/2016 của Bộ Tài chính hướng dẫn thực hiện quy định về thuế đối với các tổ chức, cá nhân tiến hành hoạt động tìm kiếm thăm dò và khai thác dầu khí theo quy định của Luật Dầu khí."},{"k":"p","t":"b) Trường hợp khai phí, nộp tiền phí hải quan bằng ngoại tệ tự do chuyển đổi đối với chuyến bay của nước ngoài đến các Cảng hàng không Việt Nam thực hiện theo quy định tại Thông tư số 194/2016/TT-BTC ngày 08/11/2016 của Bộ Tài chính quy định mức thu, chế độ thu, nộp phí hải quan và lệ phí ra, vào cảng hàng không, sân bay đối với chuyến bay của nước ngoài đến các cảng hàng không Việt Nam."},{"k":"p","t":"3. Trường hợp người nộp thuế có nghĩa vụ khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi nhưng được phép nộp thuế bằng đồng Việt Nam, tỷ giá quy đổi từ ngoại tệ tự do chuyển đổi sang đồng Việt Nam thực hiện theo quy định tại Điều 86 Luật Hải quan ngày 23 tháng 6 năm 2014 (sau đây gọi tắt là Luật Hải quan), khoản 3 Điều 21 Nghị định số 08/2015/NĐ-CP được sửa đổi, bổ sung tại khoản 9 Điều 1 Nghị định số 59/2018/NĐ-CP, Điều 35 Thông tư số 38/2015/TT-BTC."}]},{"id":"tt06_5","no":5,"code":"Điều 5","title":"Điều 5. Hướng dẫn khoản 8 Điều 8 Luật Quản lý thuế quy định hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế","shortTitle":"Hướng dẫn khoản 8 Điều 8 Luật Quản lý thuế quy định hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế áp dụng đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế thực hiện theo quy định tại khoản 5, khoản 7, khoản 8, khoản 9, khoản 10, khoản 11, khoản 14, khoản 15, khoản 16, khoản 17, khoản 18, khoản 19, khoản 20, khoản 21, khoản 22 Điều 1 Thông tư số 39/2018/TT-BTC."},{"k":"p","t":"2. Hồ sơ về giao dịch điện tử trong lĩnh vực thuế áp dụng đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng miễn thuế thực hiện theo quy định tại Điều 14 Thông tư này. Thủ tục miễn thuế thực hiện theo quy định tại khoản 3 Điều 31 Nghị định số 134/2016/NĐ-CP ngày 01/9/2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu. Thủ tục thông báo Danh mục hàng hóa miễn thuế đối với các trường hợp phải thông báo Danh mục hàng hóa miễn thuế thực hiện theo quy định tại khoản 4, khoản 5, khoản 6, khoản 7 Điều 30 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"Thủ tục miễn thuế đối với hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng trong trường hợp người nộp thuế đề nghị miễn thuế trước khi làm thủ tục hải quan thực hiện theo quy định tại điểm a khoản 4 Điều 20 Nghị định số 134/2016/NĐ-CP, trường hợp thông báo miễn thuế của Tổng cục Hải quan thông qua Hệ thống xử lý dữ liệu điện tử hải quan (sau đây gọi tắt là Hệ thống), cơ quan hải quan nơi làm thủ tục nhập khẩu căn cứ thông báo miễn thuế của Tổng cục Hải quan trên Hệ thống để thực hiện thủ tục miễn thuế."},{"k":"p","t":"Thủ tục miễn thuế đối với hàng an ninh, quốc phòng trong trường hợp người nộp thuế đề nghị miễn thuế sau khi làm thủ tục hải quan thực hiện theo quy định tại điểm b khoản 4 Điều 20 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"3. Hồ sơ về giao dịch điện tử trong lĩnh vực thuế áp dụng đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng giảm thuế thực hiện theo quy định tại Điều 15 Thông tư này. Thủ tục giảm thuế thực hiện theo quy định tại khoản 3 Điều 32 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"4. Hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế áp dụng đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng hoàn thuế thực hiện theo quy định tại Điều 12 Thông tư này."},{"k":"p","t":"5. Hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế áp dụng đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng không thu thuế thực hiện theo quy định tại Điều 13 Thông tư này."}]},{"id":"tt06_6","no":6,"code":"Điều 6","title":"Điều 6. Hướng dẫn khoản 6 Điều 9, khoản 4 Điều 96 Luật Quản lý thuế quy định về quản lý rủi ro trong quản lý thuế","shortTitle":"Hướng dẫn khoản 6 Điều 9, khoản 4 Điều 96 Luật Quản lý thuế quy định về quản lý rủi ro trong quản lý thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Quản lý rủi ro trong quản lý thuế, xây dựng, thu thập, xử lý, quản lý hệ thống thông tin người nộp thuế thực hiện theo quy định tại Luật Hải quan, Luật Quản lý thuế, các Nghị định hướng dẫn các Luật này, Thông tư số 81/2019/TT-BTC ngày 15/11/2019 của Bộ Tài chính quy định về quản lý rủi ro trong hoạt động nghiệp vụ hải quan."}]},{"id":"tt06_7","no":7,"code":"Điều 7","title":"Điều 7. Hướng dẫn điểm b khoản 4 Điều 55 Luật Quản lý thuế quy định về thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Hướng dẫn điểm b khoản 4 Điều 55 Luật Quản lý thuế quy định về thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp thuế đối với hàng hóa phải phân tích, giám định để xác định chính xác số tiền thuế phải nộp được thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế phải tạm nộp thuế theo mã số khai báo trước khi giải phóng hàng. Thời hạn nộp thuế thực hiện theo quy định tại Điều 9 Luật Thuế xuất khẩu, thuế nhập khẩu ngày 06 tháng 4 năm 2016 (sau đây gọi tắt là Luật Thuế xuất khẩu, thuế nhập khẩu)."},{"k":"p","t":"b) Trường hợp kết quả phân tích, giám định hàng hóa khác so với nội dung khai của người nộp thuế dẫn đến tăng số tiền thuế phải nộp, thời hạn nộp số tiền thuế thiếu là 05 ngày làm việc kể từ ngày người nộp thuế nhận được yêu cầu khai bổ sung của cơ quan hải quan."},{"k":"p","t":"Trường hợp kết quả phân tích, giám định hàng hóa khác so với nội dung khai của người nộp thuế dẫn đến giảm số tiền thuế phải nộp, cơ quan hải quan thông báo cho người nộp thuế thực hiện khai bổ sung theo quy định của pháp luật về hải quan và xử lý số tiền thuế nộp thừa theo quy định tại Điều 10 Thông tư này."},{"k":"p","t":"2. Thời hạn nộp thuế đối với trường hợp chưa có giá chính thức tại thời điểm đăng ký tờ khai hải quan thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế phải tạm nộp thuế theo giá khai báo trước khi thông quan hoặc giải phóng hàng. Thời hạn nộp thuế thực hiện theo quy định của Điều 9 Luật Thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"b) Trường hợp có giá chính thức người nộp thuế phải khai bổ sung, nộp số tiền thuế chênh lệch tăng thêm trong thời hạn là 05 ngày làm việc kể từ thời điểm có giá chính thức."},{"k":"p","t":"Trường hợp có giá chính thức dẫn đến giảm số tiền thuế phải nộp, cơ quan hải quan xử lý số tiền thuế nộp thừa theo quy định tại Điều 10 Thông tư này."},{"k":"p","t":"Giá chính thức thực hiện theo quy định tại Điều 17 Thông tư số 39/2015/TT-BTC ngày 25/3/2015 của Bộ Tài chính quy định về trị giá hải quan đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"3. Thời hạn nộp tiền thuế đối với trường hợp hàng hóa có khoản thực thanh toán, hàng hóa có các khoản điều chỉnh cộng vào trị giá hải quan chưa xác định được tại thời điểm đăng ký tờ khai hải quan thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế phải tạm nộp thuế theo giá khai báo trước khi thông quan hoặc giải phóng hàng. Thời hạn nộp thuế thực hiện theo quy định của Điều 9 Luật Thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"b) Trường hợp có các khoản thực thanh toán, các khoản điều chỉnh cộng vào trị giá hải quan, thời hạn nộp thuế là 05 ngày làm việc kể từ thời điểm người nhập khẩu xác định được các khoản này."},{"k":"p","t":"Các khoản thực thanh toán, các khoản điều chỉnh cộng vào trị giá hải quan thực hiện theo quy định tại Thông tư số 39/2015/TT-BTC và Thông tư số 60/2019/TT-BTC ngày 30/8/2019 của Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 39/2015/TT-BTC ngày 25/3/2015 của Bộ trưởng Bộ Tài chính quy định về trị giá hải quan đối với hàng hóa xuất khẩu, nhập khẩu."}]},{"id":"tt06_8","no":8,"code":"Điều 8","title":"Điều 8. Hướng dẫn khoản 4 Điều 56 Luật Quản lý thuế quy định về thời hạn chuyển tiền vào ngân sách nhà nước","shortTitle":"Hướng dẫn khoản 4 Điều 56 Luật Quản lý thuế quy định về thời hạn chuyển tiền vào ngân sách nhà nước","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Thời hạn chuyển tiền vào ngân sách nhà nước đối với trường hợp thu thuế bằng tiền mặt tại vùng sâu, vùng xa, hải đảo, vùng đi lại khó khăn quy định tại khoản 4 Điều 56 Luật Quản lý thuế là 03 ngày làm việc theo quy định tại khoản 3 Điều 21 Thông tư số 184/2015/TT-BTC ngày 17/11/2015 của Bộ Tài chính quy định thủ tục về kê khai, bảo lãnh tiền thuế, thu nộp tiền thuế, tiền chậm nộp, tiền phạt, tiền phí, lệ phí, các khoản thu khác, đối với hàng hóa xuất khẩu, nhập khẩu, quá cảnh và phương tiện xuất cảnh, nhập cảnh, quá cảnh."}]},{"id":"tt06_9","no":9,"code":"Điều 9","title":"Điều 9. Hướng dẫn khoản 9 Điều 59 Luật Quản lý thuế quy định về thủ tục xử lý đối với việc chậm nộp tiền thuế","shortTitle":"Hướng dẫn khoản 9 Điều 59 Luật Quản lý thuế quy định về thủ tục xử lý đối với việc chậm nộp tiền thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp phải nộp tiền chậm nộp, mức tính tiền chậm nộp, thời gian tính tiền chậm nộp thực hiện theo quy định tại khoản 1, khoản 2, khoản 4 Điều 59 Luật Quản lý thuế. Cơ quan hải quan không tính tiền chậm nộp theo quy định tại khoản 5 Điều 59, khoản 1 Điều 60, khoản 4 Điều 62 Luật Quản lý thuế."},{"k":"p","t":"2. Thủ tục xử lý đối với việc chậm nộp tiền thuế thực hiện như sau:"},{"k":"p","t":"a) Trách nhiệm của người nộp thuế:"},{"k":"p","t":"Người nộp thuế tự xác định số tiền chậm nộp theo quy định tại khoản 1 Điều này và nộp vào ngân sách nhà nước."},{"k":"p","t":"b) Trách nhiệm của cơ quan hải quan:"},{"k":"p","t":"Cơ quan hải quan kiểm tra, xử lý số tiền chậm nộp như sau:"},{"k":"p","t":"b.1) Trường hợp sau 30 ngày kể từ ngày hết thời hạn nộp thuế, người nộp thuế chưa nộp tiền thuế, tiền chậm nộp, tiền phạt hoặc đã nộp nhưng số tiền tiền thuế, tiền chậm nộp, tiền phạt còn thiếu thì cơ quan hải quan thông báo cho người nộp thuế biết số tiền thuế, tiền phạt còn nợ, số ngày chậm nộp qua Hệ thống theo Mẫu số 1 Phụ lục II hoặc bản giấy theo Mẫu số 01/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"Trường hợp số tiền chậm nộp đã nộp lớn hơn số tiền chậm nộp phải nộp, cơ quan hải quan xử lý số tiền chậm nộp nộp thừa theo quy định tại Điều 10 Thông tư này."},{"k":"p","t":"b.2) Trường hợp người nộp thuế khai bổ sung hồ sơ khai thuế làm giảm số tiền thuế phải nộp hoặc cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền kiểm tra, thanh tra phát hiện số tiền thuế phải nộp giảm, cơ quan hải quan điều chỉnh số tiền chậm nộp đã tính tương ứng với số tiền chênh lệch giảm."}]},{"id":"tt06_10","no":10,"code":"Điều 10","title":"Điều 10. Hướng dẫn khoản 5 Điều 60, khoản 3 Điều 61 Luật Quản lý thuế quy định về thẩm quyền, thủ tục xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa","shortTitle":"Hướng dẫn khoản 5 Điều 60, khoản 3 Điều 61 Luật Quản lý thuế quy định về thẩm quyền, thủ tục xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Tiền thuế, tiền chậm nộp, tiền phạt đối với hàng hóa xuất khẩu, nhập khẩu được xác định là nộp thừa theo quy định tại Điều 60 Luật Quản lý thuế."},{"k":"p","t":"2. Thẩm quyền xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa:"},{"k":"p","t":"a) Tổng cục trưởng Tổng cục Hải quan, Cục trưởng Cục Hải quan tỉnh, thành phố, Cục trưởng Cục Kiểm tra sau thông quan, Cục trưởng Cục Điều tra chống buôn lậu đối với trường hợp ban hành Quyết định ấn định thuế, Quyết định xử phạt."},{"k":"p","t":"b) Chi cục trưởng Chi cục Hải quan, Chi cục trưởng Chi cục Kiểm tra sau thông quan nơi có số tiền thuế, tiền chậm nộp, tiền phạt và các khoản thu ngân sách khác người nộp thuế đã nộp lớn hơn số tiền phải nộp."},{"k":"p","t":"c) Thủ trưởng cơ quan hải quan nơi phát sinh số tiền thuế, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, tiền chậm nộp, tiền phạt được xác định theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền, bản án, quyết định của Tòa án."},{"k":"p","t":"3. Thủ tục xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa thực hiện theo quy định tại khoản 2, khoản 3, khoản 4 Điều 131 quy định tại khoản 64 Điều 1 Thông tư số 39/2018/TT-BTC."}]},{"id":"tt06_11","no":11,"code":"Điều 11","title":"Điều 11. Hướng dẫn khoản 3 Điều 64 Luật Quản lý thuế quy định về hồ sơ gia hạn nộp thuế","shortTitle":"Hướng dẫn khoản 3 Điều 64 Luật Quản lý thuế quy định về hồ sơ gia hạn nộp thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Hồ sơ gia hạn nộp thuế thực hiện theo quy định tại khoản 2 Điều 64 Luật Quản lý thuế, bao gồm:"},{"k":"p","t":"1. Công văn đề nghị gia hạn nộp tiền thuế theo Mẫu số 02/TXNK Phụ lục I ban hành kèm theo Thông tư này: 01 bản chính;"},{"k":"p","t":"2. Tài liệu gửi kèm công văn đề nghị gia hạn nộp tiền thuế đối với trường hợp quy định tại điểm a khoản 1 Điều 62 Luật Quản lý thuế:"},{"k":"p","t":"a) Văn bản, biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại:"},{"k":"p","t":"a.1) Văn bản xác nhận của một trong các cơ quan, tổ chức sau: Cơ quan Công an xã, phường, thị trấn; Ủy ban nhân dân xã, phường, thị trấn; Ban quản lý Khu công nghiệp, Khu chế xuất, Khu kinh tế, Ban quản lý cửa khẩu, Cảng vụ hàng không, Cảng vụ hàng hải nơi xảy ra sự kiện bất khả kháng về việc thiên tai, thảm họa, dịch bệnh, tai nạn bất ngờ gây thiệt hại vật chất, ảnh hưởng trực tiếp đến sản xuất, kinh doanh: 01 bản chính;"},{"k":"p","t":"a.2) Biên bản xác nhận vụ cháy của cơ quan cảnh sát phòng cháy chữa cháy của địa phương nơi xảy ra vụ cháy: 01 bản chính."},{"k":"p","t":"b) Trường hợp gặp khó khăn bất khả kháng do chiến tranh, bạo loạn, đình công phải ngừng, nghỉ sản xuất, kinh doanh hoặc rủi ro không thuộc nguyên nhân, trách nhiệm chủ quan của người nộp thuế quy định tại khoản 1 Điều 3 Nghị định số 126/2020/NĐ-CP, người nộp thuế nộp các chứng từ, tài liệu chứng minh nguyên nhân gặp khó khăn bất khả kháng dẫn đến không có khả năng nộp tiền thuế, tiền chậm nộp, tiền phạt đúng hạn: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị gia hạn nộp thuế;"},{"k":"p","t":"c) Hợp đồng bảo hiểm, thông báo trả tiền bồi thường của tổ chức nhận bảo hiểm (nếu có), trường hợp hợp đồng bảo hiểm không bao gồm nội dung bồi thường về thuế phải có xác nhận của tổ chức bảo hiểm; hợp đồng hoặc biên bản thỏa thuận đền bù của hãng vận tải đối với trường hợp tổn thất do hãng vận tải gây ra (nếu có); 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị gia hạn nộp thuế."},{"k":"p","t":"3. Tài liệu gửi kèm công văn đề nghị gia hạn nộp tiền thuế đối với trường hợp quy định tại điểm b khoản 1 Điều 62 Luật Quản lý thuế:"},{"k":"p","t":"a) Quyết định thu hồi địa điểm sản xuất, kinh doanh của cơ quan nhà nước có thẩm quyền đối với địa điểm sản xuất cũ của doanh nghiệp (trừ trường hợp di dời địa điểm sản xuất kinh doanh theo mục đích yêu cầu của doanh nghiệp): 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị gia hạn nộp thuế;"},{"k":"p","t":"b)  Văn bản xác nhận của chính quyền địa phương về việc doanh nghiệp phải ngừng sản xuất kinh doanh do di chuyển địa điểm: 01 bản chính;"},{"k":"p","t":"c) Tài liệu chứng minh mức độ thiệt hại trực tiếp do phải di chuyển địa điểm kinh doanh. Giá trị thiệt hại được xác định trên giá trị còn lại của hàng hóa bị thiệt hại. Giá trị còn lại của hàng hóa bị thiệt hại được xác định căn cứ vào hồ sơ, chứng từ và các quy định của pháp luật có liên quan trực tiếp để xác định: Nhà xưởng, kho, máy móc, trang thiết bị bị phá dỡ không thu hồi được vốn (nguyên giá sau khi trừ chi phí đã khấu hao), chi phí tháo dỡ trang thiết bị, nhà xưởng ở cơ sở cũ, chi phí vận chuyển lắp đặt ở cơ sở mới (sau khi trừ đi chi phí thu hồi), chi phí trả lương cho người lao động do ngừng làm việc (nếu có). Trường hợp phức tạp liên quan đến chuyên ngành kinh tế kỹ thuật phải có văn bản xác nhận của cơ quan chuyên môn: 01 bản chính."}]},{"id":"tt06_12","no":12,"code":"Điều 12","title":"Điều 12. Hướng dẫn khoản 4 Điều 72, khoản 4 Điều 73, khoản 4 Điều 76 Luật Quản lý thuế quy định về trình tự, thủ tục hoàn thuế","shortTitle":"Hướng dẫn khoản 4 Điều 72, khoản 4 Điều 73, khoản 4 Điều 76 Luật Quản lý thuế quy định về trình tự, thủ tục hoàn thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Tiếp nhận, phản hồi thông tin hồ sơ hoàn thuế"},{"k":"p","t":"a) Người nộp thuế gửi qua Hệ thống công văn đề nghị hoàn thuế theo chỉ tiêu thông tin quy định tại Mẫu số 2 Phụ lục II ban hành kèm theo Thông tư này, các chứng từ, tài liệu có liên quan theo quy định tại Điều 33, Điều 34, Điều 35, Điều 36, Điều 37 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"Trường hợp hồ sơ giấy, người nộp thuế gửi công văn đề nghị hoàn thuế theo Mẫu số 03/TXNK Phụ lục I ban hành kèm theo Thông tư này, các chứng từ, tài liệu có liên quan theo quy định Điều 33, Điều 34, Điều 35, Điều 36, Điều 37 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"b) Cơ quan hải quan nơi đăng ký tờ khai hải quan hàng hóa xuất khẩu, nhập khẩu có phát sinh số tiền thuế đề nghị hoàn, thực hiện tiếp nhận, phản hồi hồ sơ đề nghị hoàn thuế thông qua Hệ thống. Trường hợp nộp hồ sơ bản giấy, cơ quan hải quan đóng dấu tiếp nhận, vào sổ tiếp nhận, xử lý hồ sơ giấy."},{"k":"p","t":"2. Phân loại hồ sơ hoàn thuế"},{"k":"p","t":"a) Hồ sơ thuộc diện kiểm tra trước hoàn thuế thực hiện theo quy định tại Điều 22 Nghị định số 126/2020/NĐ-CP;"},{"k":"p","t":"b) Hồ sơ thuộc diện hoàn thuế trước là hồ sơ của người nộp thuế không thuộc trường hợp quy định tại điểm a khoản này."},{"k":"p","t":"c) Thông báo cho người nộp thuế"},{"k":"p","t":"Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ hoàn thuế, cơ quan hải quan thông báo cho người nộp thuế về việc chấp nhận hồ sơ, phân loại hồ sơ, thời hạn giải quyết hồ sơ hoàn thuế thông qua Hệ thống theo Mẫu số 3 Phụ lục II ban hành kèm theo Thông tư này, trường hợp bản giấy thì thông báo theo Mẫu số 04/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"Trường hợp cần giải trình, bổ sung, cơ quan hải quan thông báo cho người nộp thuế thông qua Hệ thống theo Mẫu số 4 Phụ lục II ban hành kèm theo Thông tư này, trường hợp bản giấy thì thông báo theo Mẫu số 05/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"3. Trình tự, thủ tục hoàn thuế"},{"k":"p","t":"a) Trường hợp hoàn thuế trước:"},{"k":"p","t":"Cơ quan hải quan nơi phát sinh số tiền hoàn thuế thực hiện kiểm tra tại trụ sở cơ quan hải quan theo quy định tại khoản 1 Điều 74 Luật Quản lý thuế, kiểm tra các thông tin trong hồ sơ đề nghị hoàn thuế với thông tin trên Hệ thống để xác định điều kiện hoàn thuế, số tiền thuế phải hoàn."},{"k":"p","t":"a.1) Trường hợp đủ điều kiện hoàn thuế thì ban hành Quyết định hoàn thuế theo quy định tại điểm c khoản này."},{"k":"p","t":"a.2) Trường hợp hồ sơ chưa đầy đủ các thông tin để ban hành Quyết định hoàn thuế, cơ quan hải quan thông báo cho người nộp thuế về việc bổ sung các thông tin cần thiết thông qua Hệ thống theo Mẫu số 4 Phụ lục II ban hành kèm theo Thông tư này, trường hợp hồ sơ giấy thì thông báo theo Mẫu số 05/TXNK Phụ lục I ban hành kèm theo Thông tư này;"},{"k":"p","t":"a.3) Trường hợp không đủ điều kiện hoàn thuế, cơ quan hải quan thông báo lý do không hoàn thuế cho người nộp thuế thông qua Hệ thống theo Mẫu số 5 Phụ lục II ban hành kèm theo Thông tư này, trường hợp hồ sơ giấy thì thông báo theo Mẫu số 06/TXNK Phụ lục I ban hành kèm theo Thông tư này;"},{"k":"p","t":"a.4) Chuyển hồ sơ thuộc diện hoàn thuế trước sang hồ sơ thuộc diện kiểm tra trước hoàn thuế"},{"k":"p","t":"Hồ sơ thuộc diện hoàn thuế trước nhưng hết thời hạn theo thông báo bằng văn bản của cơ quan hải quan mà người nộp thuế không giải trình, bổ sung hồ sơ hoàn thuế hoặc có giải trình, bổ sung hồ sơ hoàn thuế nhưng không chứng minh được số tiền thuế đã khai là đúng, cơ quan hải quan thông báo qua Hệ thống theo Mẫu số 4 Phụ lục II hoặc bản giấy theo Mẫu số 05/TXNK Phụ lục I ban hành kèm theo Thông tư này cho người nộp thuế về việc chuyển hồ sơ thuộc diện hoàn thuế trước sang diện kiểm tra trước tại trụ sở người nộp thuế theo quy định tại điểm đ khoản 2 Điều 73 Luật Quản lý thuế. Trình tự thực hiện kiểm tra thực hiện theo quy định tại điểm b khoản này."},{"k":"p","t":"b) Trường hợp kiểm tra trước hoàn thuế:"},{"k":"p","t":"b.1) Trình tự kiểm tra"},{"k":"p","t":"Trong thời hạn 03 ngày làm việc kể từ ngày ký thông báo cho người nộp thuế về việc chấp nhận hồ sơ thuộc diện kiểm tra trước hoàn thuế, Chi cục trưởng Chi cục Hải quan nơi tiếp nhận hồ sơ đề nghị hoàn thuế phải ban hành Quyết định kiểm tra tại trụ sở người nộp thuế theo Mẫu số 07/TXNK Phụ lục I ban hành kèm theo Thông tư này và gửi cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày ký."},{"k":"p","t":"Trong thời hạn 05 ngày làm việc kể từ ngày ký Quyết định kiểm tra, cơ quan hải quan phải tiến hành kiểm tra tại trụ sở của người nộp thuế. Thời gian kiểm tra không quá 05 ngày làm việc. Trước khi tiến hành kiểm tra, trưởng đoàn kiểm tra phải công bố Quyết định kiểm tra, lập Biên bản công bố Quyết định kiểm tra theo Mẫu số 08/TXNK Phụ lục I ban hành kèm Thông tư này với đại diện có thẩm quyền của người nộp thuế."},{"k":"p","t":"Trường hợp hồ sơ hoàn thuế phức tạp không thể kết thúc kiểm tra trong thời hạn 05 ngày làm việc, đoàn kiểm tra cần gia hạn thời gian để xác minh, thu thập tài liệu, chậm nhất là trước 01 ngày làm việc trước khi kết thúc thời hạn kiểm tra, trưởng đoàn kiểm tra phải báo cáo bằng văn bản với người đã ký Quyết định kiểm tra để ban hành Quyết định gia hạn thời hạn kiểm tra theo Mẫu số 09/TXNK Phụ lục I ban hành kèm theo Thông tư này, thời hạn gia hạn kiểm tra không quá 05 ngày làm việc. Trưởng đoàn kiểm tra thực hiện công bố Quyết định gia hạn thời hạn kiểm tra, lập Biên bản công bố Quyết định gia hạn thời hạn kiểm tra."},{"k":"p","t":"b.2) Nội dung kiểm tra"},{"k":"p","t":"b.2.1) Kiểm tra hồ sơ hải quan, hồ sơ hoàn thuế, chứng từ, sổ sách kế toán, chứng từ thanh toán, phiếu xuất kho, nhập kho; đối chiếu số tiền thuế đề nghị hoàn với số tiền thuế đã thu trên Hệ thống kế toán tập trung của cơ quan hải quan, thông tin trong hồ sơ hoàn thuế với các thông tin trên Hệ thống liên quan đến tờ khai xuất khẩu, nhập khẩu có số tiền thuế người nộp thuế đề nghị hoàn."},{"k":"p","t":"b.2.2) Trường hợp hoàn thuế theo quy định tại Điều 35 Nghị định số 134/2016/NĐ-CP thì cơ quan hải quan thực hiện kiểm tra nội dung kê khai của người nộp thuế về tỷ lệ khấu hao, cách tính tỷ lệ khấu hao."},{"k":"p","t":"b.2.3) Trường hợp hoàn thuế theo quy định tại Điều 36 Nghị định số 134/2016/NĐ-CP, cơ quan hải quan thực hiện kiểm tra sự phù hợp giữa định mức người nộp thuế phản ánh trong báo cáo tính thuế nguyên liệu, vật tư đề nghị hoàn thuế nhập khẩu Mẫu số 10 Phụ lục VII ban hành kèm theo Nghị định số 134/2016/NĐ-CP với định mức thực tế sản xuất, sổ sách, chứng từ kế toán, tài liệu kỹ thuật trong quá trình sản xuất có liên quan đến nguyên liệu, vật tư nhập khẩu đề nghị hoàn thuế."},{"k":"p","t":"Trường hợp kiểm tra lần đầu hoặc chưa có kết luận kiểm tra cơ sở sản xuất, cơ quan hải quan phải kiểm tra cơ sở sản xuất, quyền sử dụng đối với máy móc, thiết bị tại cơ sở sản xuất."},{"k":"p","t":"b.2.4) Kiểm tra các chứng từ, tài liệu, dữ liệu khác có liên quan đến hàng hóa xuất khẩu, nhập khẩu theo quy định tại khoản 6 Điều 1 Thông tư số 39/2018/TT-BTC."},{"k":"p","t":"b.2.5) Kết thúc việc kiểm tra, cơ quan hải quan phải xác định số tiền thuế được hoàn theo từng loại thuế, số tiền thuế không đủ điều kiện hoàn, lý do không đủ điều kiện hoàn."},{"k":"p","t":"Trường hợp hàng hóa nhập khẩu thuộc đối tượng hoàn thuế theo Điều 36 Nghị định số 134/2016/NĐ-CP, người nộp thuế đã nộp thuế nhập khẩu theo tờ khai hải quan đồng thời đã nộp thuế nhập khẩu theo Quyết định ấn định thuế của cơ quan hải quan, cơ quan hải quan phải xác định số tiền thuế nhập khẩu được hoàn theo tờ khai hải quan và số tiền thuế nhập khẩu được hoàn theo Quyết định ấn định thuế."},{"k":"p","t":"b.2.6) Lập biên bản kiểm tra theo Mẫu số 10/TXNK Phụ lục I ban hành kèm Thông tư này trong thời hạn 05 ngày làm việc kể từ ngày kết thúc kiểm tra tại trụ sở người nộp thuế."},{"k":"p","t":"b.2.7) Lập dự thảo kết luận kiểm tra và gửi cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày lập biên bản kiểm tra theo Mẫu số 11/TXNK Phụ lục I ban hành kèm Thông tư này hoặc gửi bằng fax hoặc thư bảo đảm hoặc giao trực tiếp cho người nộp thuế."},{"k":"p","t":"Trường hợp người nộp thuế không thống nhất với dự thảo kết luận kiểm tra của cơ quan hải quan, trong thời hạn 03 ngày làm việc kể từ ngày nhận được dự thảo kết luận kiểm tra, người nộp thuế phải giải trình với cơ quan hải quan thông qua Hệ thống hoặc giải trình bằng văn bản hoặc giải trình trực tiếp với cơ quan hải quan. Trường hợp người nộp thuế giải trình trực tiếp, cơ quan hải quan lập biên bản làm việc theo Mẫu số 12/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"b.2.8) Trong thời hạn 03 ngày làm việc kể từ ngày người nộp thuế hết thời hạn giải trình, thủ trưởng cơ quan hải quan đã ban hành Quyết định kiểm tra thực hiện ban hành kết luận kiểm tra."},{"k":"p","t":"Trường hợp không đủ điều kiện hoàn thuế, cơ quan hải quan thông báo qua Hệ thống theo Mẫu số 5 Phụ lục II ban hành kèm theo Thông tư này hoặc thông báo bằng văn bản cho người nộp thuế về việc không đủ điều kiện hoàn thuế theo Mẫu số 06/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"c) Ban hành Quyết định hoàn thuế"},{"k":"p","t":"c.1) Chi cục trưởng Chi cục Hải quan ban hành Quyết định hoàn thuế theo Mẫu số 13/TXNK Phụ lục I ban hành kèm theo Thông tư này, gửi bản scan Quyết định hoàn thuế cho người nộp thuế, các cơ quan có liên quan (nếu có) thông qua Hệ thống, gửi bản chính Quyết định hoàn thuế cho người nộp thuế, các cơ quan có liên quan (nếu có). Thời hạn ban hành Quyết định hoàn thuế thực hiện theo quy định tại Điều 75 Luật Quản lý thuế."},{"k":"p","t":"c.2) Trường hợp hàng hóa nhập khẩu thuộc đối tượng hoàn thuế theo Điều 36 Nghị định số 134/2016/NĐ-CP, người nộp thuế đã nộp thuế nhập khẩu theo tờ khai hải quan đồng thời đã nộp thuế nhập khẩu theo Quyết định ấn định thuế của cơ quan hải quan, số tiền thuế được hoàn của một tờ khai hải quan bao gồm số tiền thuế đã nộp theo tờ khai hải quan và số tiền thuế đã nộp theo Quyết định ấn định thuế, việc ban hành Quyết định hoàn thuế được thực hiện như sau:"},{"k":"p","t":"c.2.1) Chi cục trưởng Chi cục Hải quan nơi đăng ký tờ khai hải quan ban hành Quyết định hoàn thuế đối với số tiền thuế người nộp thuế đã nộp theo tờ khai hải quan."},{"k":"p","t":"c.2.2) Thủ trưởng cơ quan hải quan đã ban hành Quyết định ấn định thuế theo quy định tại khoản 7 Điều 17 Nghị định số 126/2020/NĐ-CP thực hiện ban hành Quyết định hoàn thuế đối với số tiền thuế người nộp thuế đã nộp theo Quyết định ấn định thuế."},{"k":"p","t":"4. Cục trưởng Cục Hải quan tỉnh, thành phố nơi phát sinh số tiền thuế đề nghị hoàn ban hành Quyết định thanh tra, kiểm tra đối với hồ sơ thuộc diện hoàn thuế trước theo nguyên tắc quản lý rủi ro trong quản lý thuế và trong thời hạn 05 năm kể từ ngày ban hành Quyết định hoàn thuế theo quy định tại khoản 1 Điều 77  Luật Quản lý thuế."}]},{"id":"tt06_13","no":13,"code":"Điều 13","title":"Điều 13. Hướng dẫn khoản 2 Điều 78 Luật Quản lý thuế quy định về thủ tục không thu thuế đối với trường hợp không phải nộp thuế xuất khẩu, thuế nhập khẩu","shortTitle":"Hướng dẫn khoản 2 Điều 78 Luật Quản lý thuế quy định về thủ tục không thu thuế đối với trường hợp không phải nộp thuế xuất khẩu, thuế nhập khẩu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Thủ tục không thu thuế nhập khẩu đối với hàng hóa xuất khẩu phải tái nhập quy định tại Điều 33 Nghị định số 134/2016/NĐ-CP, không thu thuế xuất khẩu đối với hàng hóa nhập khẩu phải tái xuất quy định tại Điều 34 Nghị định số 134/2016/NĐ-CP được thực hiện như sau:"},{"k":"p","t":"1. Trách nhiệm của người nộp thuế"},{"k":"p","t":"a) Kê khai đầy đủ, chính xác, trung thực và chịu trách nhiệm đối với nội dung kê khai trên hồ sơ đề nghị không thu thuế."},{"k":"p","t":"a.1) Trường hợp không thu thuế nhập khẩu đối với hàng hóa xuất khẩu phải tái nhập theo quy định tại Điều 33 Nghị định số 134/2016/NĐ-CP, người nộp thuế gửi công văn đề nghị không thu thuế qua Hệ thống theo Mẫu số 6 Phụ lục II ban hành kèm theo Thông tư này, hoặc bản giấy theo Mẫu số 14/TXNK Phụ lục I ban hành kèm theo Thông tư này: 01 bản chính; các chứng từ quy định tại Điều 33 Nghị định số 134/2016/NĐ-CP bao gồm:"},{"k":"p","t":"a.1.1) Chứng từ thanh toán hàng hóa xuất khẩu đối với trường hợp đã thanh toán: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.1.2) Hợp đồng xuất khẩu, hợp đồng ủy thác xuất khẩu nếu là hình thức xuất khẩu ủy thác (nếu có): 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.1.3) Hóa đơn thương mại theo hợp đồng xuất khẩu đối với trường hợp hàng hóa xuất khẩu sau đó phải tái nhập (trừ xuất khẩu vào khu phi thuế quan thì thực hiện theo quy định tại điểm a.1.4 khoản này): 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.1.4) Hóa đơn của người xuất khẩu theo quy định của pháp luật về hóa đơn đối với trường hợp hàng hóa xuất khẩu vào khu phi thuế quan phải tái nhập: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.1.5) Hàng hóa phải nhập khẩu trở lại do khách hàng nước ngoài từ chối nhận hàng hoặc không có người nhận hàng theo thông báo của hãng vận tải, phải có thêm thông báo của khách hàng nước ngoài hoặc văn bản thỏa thuận với khách hàng nước ngoài về việc nhận lại hàng hóa hoặc văn bản thông báo của hãng vận tải về việc không có người nhận hàng nêu rõ lý do, số lượng, chủng loại hàng hóa trả lại: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế."},{"k":"p","t":"Trường hợp vì lý do bất khả kháng hoặc người nộp thuế tự phát hiện hàng hóa có sai sót phải nhập khẩu trở lại thì không phải có văn bản này nhưng phải nêu rõ lý do nhập khẩu hàng hóa trả lại trong công văn đề nghị không thu thuế;"},{"k":"p","t":"a.1.6) Hàng hóa xuất khẩu do tổ chức, cá nhân ở Việt Nam gửi cho tổ chức, cá nhân ở nước ngoài thông qua dịch vụ bưu chính và chuyển phát nhanh quốc tế nhưng không giao được cho người nhận hàng hóa phải tái nhập phải nộp thêm văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2) Trường hợp không thu thuế xuất khẩu đối với hàng hóa nhập khẩu phải tái xuất quy định tại Điều 34 Nghị định số 134/2016/NĐ-CP, người nộp thuế gửi công văn đề nghị không thu thuế qua Hệ thống theo Mẫu số 6 Phụ lục II ban hành kèm theo Thông tư này, hoặc bản giấy theo Mẫu số 14/TXNK Phụ lục I ban hành kèm theo Thông tư này: 01 bản chính; các chứng từ quy định tại Điều 34 Nghị định số 134/2016/NĐ-CP bao gồm:"},{"k":"p","t":"a.2.1) Hóa đơn của người xuất khẩu theo quy định của pháp luật về hóa đơn đối với trường hợp hàng hóa nhập khẩu sau đó xuất khẩu vào khu phi thuế quan: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2.2) Hóa đơn thương mại theo hợp đồng xuất khẩu đối với trường hợp hàng hóa nhập khẩu sau đó xuất khẩu ra nước ngoài (trừ xuất khẩu vào khu phi thuế quan thực hiện theo quy định tại điểm a.2.1 khoản này): 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2.3) Hóa đơn thương mại theo hợp đồng nhập khẩu đối với trường hợp hàng hóa nhập khẩu phải tái xuất trả lại chủ hàng nước ngoài: 01 bản chụp có đóng dấu sao y bản chính của cơ quan đề nghị không thu thuế; kèm văn bản thỏa thuận trả lại hàng hóa cho phía nước ngoài: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2.4) Hợp đồng xuất khẩu đối với trường hợp hàng hóa nhập khẩu được bán ra nước ngoài hoặc bán vào khu phi thuế quan; hợp đồng ủy thác xuất khẩu nếu là hình thức xuất khẩu ủy thác: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2.5) Hợp đồng nhập khẩu đối với trường hợp nhập khẩu hàng hóa; hợp đồng ủy thác nhập khẩu nếu là hình thức nhập khẩu ủy thác; chứng từ thanh toán hàng hóa nhập khẩu đối với trường hợp đã thanh toán: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2.6) Văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị không thu thuế;"},{"k":"p","t":"a.2.7) Văn bản xác nhận của doanh nghiệp cung ứng tàu biển về số lượng, trị giá hàng hóa mua của doanh nghiệp đầu mối nhập khẩu đã thực cung ứng cho tàu biển nước ngoài kèm bảng kê chứng từ thanh toán của các hãng tàu biển nước ngoài: 01 bản chính;"},{"k":"p","t":"b) Giải trình, bổ sung thông tin đúng hạn cho cơ quan hải quan nơi phát sinh số tiền thuế đề nghị không thu thuế."},{"k":"p","t":"c) Chấp hành các quyết định xử lý về thuế của cơ quan hải quan theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"2. Trách nhiệm của cơ quan hải quan"},{"k":"p","t":"a) Cơ quan hải quan nơi phát sinh số tiền thuế đề nghị không thu thuế thực hiện tiếp nhận và xử lý hồ sơ thông qua Hệ thống. Trường hợp tiếp nhận hồ sơ bản giấy, cơ quan hải quan đóng dấu tiếp nhận, vào sổ theo dõi."},{"k":"p","t":"b) Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ đề nghị không thu thuế, cơ quan hải quan thông báo cho người nộp thuế về việc chấp nhận hồ sơ và thời hạn giải quyết hồ sơ đề nghị không thu thuế thông qua Hệ thống theo Mẫu số 3 Phụ lục II ban hành kèm theo Thông tư này, trường hợp bản giấy thì thông báo theo Mẫu số 04/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"Trường hợp cần giải trình, bổ sung, cơ quan hải quan thông báo cho người nộp thuế thông qua Hệ thống theo Mẫu số 4 Phụ lục II ban hành kèm theo Thông tư này, trường hợp bản giấy thì thông báo theo Mẫu số 05/TXNK Phụ lục I ban hành kèm theo Thông tư này."},{"k":"p","t":"c) Trình tự, thủ tục không thu thuế:"},{"k":"p","t":"c.1) Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng tái nhập, tái xuất không phát sinh số tiền thuế đề nghị hoàn và người nộp thuế nộp hồ sơ không thu thuế tại thời điểm làm thủ tục hải quan:"},{"k":"p","t":"Cơ quan hải quan nơi phát sinh số tiền thuế người nộp thuế đề nghị không thu thuế thực hiện kiểm tra hồ sơ, kiểm tra thực tế hàng hóa (trừ doanh nghiệp ưu tiên) nếu có đủ cơ sở xác định hàng hóa tái nhập là hàng hóa đã xuất khẩu trước đây, hàng hóa tái xuất là hàng hóa đã nhập khẩu trước đây thì ban hành Quyết định không thu thuế nhập khẩu đối với hàng hóa tái nhập, không thu thuế xuất khẩu đối với hàng hóa tái xuất trong thời hạn làm thủ tục hải quan. Thời hạn làm thủ tục hải quan thực hiện theo quy định tại Điều 23 Luật Hải quan."},{"k":"p","t":"c.2) Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu của lô hàng tái nhập, tái xuất có phát sinh số tiền thuế đề nghị hoàn:"},{"k":"p","t":"c.2.1) Trường hợp hàng hóa tái nhập, tái xuất không cùng cửa khẩu với hàng hóa khi xuất khẩu, nhập khẩu lần đầu:"},{"k":"p","t":"Cơ quan hải quan nơi đăng ký tờ khai hải quan hàng hóa tái nhập, tái xuất ban hành Quyết định không thu thuế lô hàng tái nhập hoặc tái xuất sau khi cơ quan hải quan nơi phát sinh số tiền thuế xuất khẩu, nhập khẩu người nộp thuế đề nghị hoàn đã xác định đủ điều kiện hoàn thuế đối với hàng hóa xuất khẩu hoặc nhập khẩu lần đầu. Số tiền thuế đã nộp của hàng hóa tái nhập hoặc tái xuất được xử lý tiền thuế nộp thừa theo quy định tại Điều 10 Thông tư này."},{"k":"p","t":"c.2.2) Trường hợp hàng hóa tái nhập, tái xuất cùng cửa khẩu với hàng hóa khi xuất khẩu, nhập khẩu lần đầu:"},{"k":"p","t":"Cơ quan hải quan nơi hàng hóa tái nhập, tái xuất tiếp nhận, làm thủ tục không thu thuế hàng hóa tái nhập, tái xuất sau khi hoàn thành thủ tục hoàn thuế hàng hóa xuất khẩu, nhập khẩu lần đầu."},{"k":"p","t":"c.3) Trường hợp tờ khai hàng hóa xuất khẩu, nhập khẩu lần đầu không phát sinh số tiền thuế đề nghị hoàn nhưng người nộp thuế đã nộp thuế đối với tờ khai tái nhập, tái xuất và nộp hồ sơ đề nghị không thu thuế sau khi hàng hóa tái nhập, tái xuất đã được thông quan:"},{"k":"p","t":"c.3.1) Người nộp thuế nộp hồ sơ đề nghị không thu thuế theo quy định tại điểm a khoản 1 Điều này."},{"k":"p","t":"c.3.2) Cơ quan hải quan tiếp nhận, xử lý hồ sơ không thu thuế hàng hóa tái nhập, tái xuất theo quy định tại điểm a, điểm b khoản 2 Điều này."},{"k":"p","t":"c.3.3) Số tiền thuế đã nộp của hàng hóa tái nhập hoặc tái xuất được xử lý tiền thuế nộp thừa theo quy định tại Điều 10 Thông tư này."},{"k":"p","t":"d) Thẩm quyền ban hành Quyết định không thu thuế"},{"k":"p","t":"Chi cục trưởng Chi cục Hải quan nơi đăng ký tờ khai hải quan hàng hóa xuất khẩu, nhập khẩu phát sinh số tiền thuế người nộp thuế đề nghị không thu thuế, có thẩm quyền ban hành quyết định không thu thuế."}]},{"id":"tt06_14","no":14,"code":"Điều 14","title":"Điều 14. Hướng dẫn khoản 4 Điều 80 Luật Quản lý thuế quy định về hồ sơ miễn thuế xuất khẩu, nhập khẩu","shortTitle":"Hướng dẫn khoản 4 Điều 80 Luật Quản lý thuế quy định về hồ sơ miễn thuế xuất khẩu, nhập khẩu","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế (trừ hàng hóa nhập khẩu miễn thuế phục vụ trực tiếp cho an ninh, quốc phòng)"},{"k":"p","t":"a) Hồ sơ miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu trong thông quan là hồ sơ hải quan theo quy định của pháp luật về hải quan."},{"k":"p","t":"b) Ngoài hồ sơ quy định tại điểm a khoản này, hồ sơ miễn thuế được thực hiện theo quy định từ Điều 5 đến Điều 19, Điều 21 đến Điều 29, Điều 31 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"c) Hồ sơ miễn thuế quy định tại điểm a, điểm b khoản này, một số trường hợp được quy định cụ thể như sau:"},{"k":"p","t":"c.1) Đối với hàng hóa xuất khẩu, nhập khẩu được miễn thuế xuất khẩu, thuế nhập khẩu theo điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên quy định tại khoản 1 Điều 29 Nghị định số 134/2016/NĐ-CP:"},{"k":"p","t":"c.1.1) Điều ước quốc tế: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế;"},{"k":"p","t":"c.1.2) Danh mục chủng loại, định lượng hàng hóa được miễn thuế đã được Thủ tướng Chính phủ phê duyệt đối với trường hợp điều ước quốc tế không quy định cụ thể định lượng, chủng loại miễn thuế: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế;"},{"k":"p","t":"c.1.3) Hợp đồng ủy thác, hợp đồng cung cấp hàng hóa theo văn bản trúng thầu hoặc văn bản chỉ định thầu ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu đối với trường hợp nhập khẩu ủy thác, đấu thầu: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế;"},{"k":"p","t":"c.2) Đối với hàng hóa xuất khẩu được sản xuất từ hoạt động tái chế, xử lý chất thải được miễn thuế theo quy định tại điểm b khoản 19 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu, khoản 3 Điều 25 Nghị định số 134/2016/NĐ-CP, khoản 23 Điều 1 Nghị định số 40/2019/NĐ-CP ngày 13/5/2019 của Chính phủ sửa đổi, bổ sung một số điều của các Nghị định quy định chi tiết, hướng dẫn thi hành Luật Bảo vệ môi trường:"},{"k":"p","t":"c.2.1) Giấy chứng nhận đăng ký đầu tư của cơ sở xử lý chất thải, trong đó nêu rõ hàng hóa được sản xuất từ hoạt động tái chế, xử lý chất thải: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế;"},{"k":"p","t":"c.2.2) Giấy phép xử lý chất thải nguy hại của Bộ Tài nguyên và Môi trường: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế."},{"k":"p","t":"c.3) Đối với hàng hóa là nguyên liệu, vật tư nhập khẩu được miễn thuế theo quy định tại điểm a khoản 11, điểm b khoản 15, điểm a khoản 16 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu:"},{"k":"p","t":"Hợp đồng chế tạo máy móc, thiết bị hoặc chế tạo linh kiện, chi tiết, bộ phận rời, phụ tùng của máy móc, thiết bị: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế."},{"k":"p","t":"c.4) Đối với hàng hóa mua bán, trao đổi của cư dân biên giới được miễn thuế theo quy định tại khoản 1 Điều 9 Nghị định số 134/2016/NĐ-CP: Người khai hải quan xuất trình bản chính Giấy chứng minh thư biên giới hoặc Giấy thông hành biên giới hoặc thẻ căn cước công dân hoặc giấy tờ có giá trị xuất nhập cảnh khác được cấp theo quy định của pháp luật."},{"k":"p","t":"2. Hồ sơ miễn thuế đối với hàng hóa nhập khẩu miễn thuế phục vụ trực tiếp cho an ninh, quốc phòng được thực hiện như sau:"},{"k":"p","t":"a) Hồ sơ miễn thuế đối với trường hợp đề nghị miễn thuế trước khi làm thủ tục hải quan:"},{"k":"p","t":"a.1) Hồ sơ đề nghị miễn thuế thực hiện theo quy định tại khoản 3 Điều 20 Nghị định số 134/2016/NĐ-CP. Ngoài ra, người nộp thuế nộp bổ sung Giấy phép nhập khẩu của Bộ Công an, Bộ Quốc Phòng theo quy định tại khoản 3 Điều 8 Nghị định số 69/2018/NĐ-CP ngày 15/5/2018 của Chính phủ quy định chi tiết một số điều của Luật Quản lý ngoại thương: 01 bản chính."},{"k":"p","t":"a.2) Hồ sơ miễn thuế trong thông quan:"},{"k":"p","t":"Hồ sơ miễn thuế ngoài các chứng từ quy định tại điểm a khoản 1 Điều này, người nộp thuế nộp Thông báo miễn thuế của Tổng cục Hải quan: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị miễn thuế (xuất trình bản chính để đối chiếu); Phiếu theo dõi trừ lùi để cơ quan hải quan thực hiện trừ lùi: 01 bản chính."},{"k":"p","t":"Trường hợp Thông báo miễn thuế của Tổng cục Hải quan được thực hiện trên Hệ thống, người nộp thuế không phải nộp Thông báo miễn thuế, cơ quan hải quan sử dụng Thông báo miễn thuế trên Hệ thống để thực hiện miễn thuế theo quy định."},{"k":"p","t":"b) Hồ sơ miễn thuế đối với trường hợp đề nghị miễn thuế sau khi làm thủ tục hải quan:"},{"k":"p","t":"Hồ sơ miễn thuế thực hiện theo quy định tại khoản 3 Điều 20 Nghị định số 134/2016/NĐ-CP và các chứng từ thuộc hồ sơ hải quan theo quy định của pháp luật về hải quan."},{"k":"p","t":"3. Các trường hợp người nộp thuế tự xác định số tiền thuế được miễn và các trường hợp cơ quan quản lý thuế xác định số tiền thuế được miễn"},{"k":"p","t":"a) Người nộp thuế tự xác định số tiền thuế được miễn, trừ các trường hợp quy định tại điểm b khoản này."},{"k":"p","t":"Cơ quan hải quan căn cứ tờ khai hàng hóa xuất khẩu, nhập khẩu và các chứng từ kèm theo để xử lý miễn thuế ngay trong thông quan theo nội dung khai báo của người nộp thuế."},{"k":"p","t":"b) Các trường hợp cơ quan hải quan xác định số tiền thuế được miễn:"},{"k":"p","t":"b.1) Tài sản di chuyển vượt định mức miễn thuế do Bộ trưởng Bộ Tài chính quyết định theo quy định tại khoản 2 Điều 7 Nghị định số 134/2016/NĐ-CP;"},{"k":"p","t":"b.2) Quà biếu, quà tặng vượt định mức miễn thuế theo quy định tại khoản 2 Điều 8 Nghị định số 134/2016/NĐ-CP;"},{"k":"p","t":"b.3) Hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng đề nghị miễn thuế sau khi làm thủ tục hải quan theo quy định tại điểm b khoản 4 Điều 20 Nghị định số 134/2016/NĐ-CP;"},{"k":"p","t":"b.4) Hàng hóa trong các trường hợp đặc biệt khác được miễn thuế theo thẩm quyền của Thủ tướng Chính phủ theo quy định tại khoản 1 Điều 28 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"Cơ quan hải quan nơi làm thủ tục hải quan cho hàng hóa xuất khẩu, nhập khẩu căn cứ Quyết định miễn thuế hoặc văn bản chấp thuận miễn thuế của cấp có thẩm quyền và các chứng từ kèm theo để xử lý miễn thuế."}]},{"id":"tt06_15","no":15,"code":"Điều 15","title":"Điều 15. Hướng dẫn khoản 4 Điều 80 Luật Quản lý thuế quy định về hồ sơ giảm thuế","shortTitle":"Hướng dẫn khoản 4 Điều 80 Luật Quản lý thuế quy định về hồ sơ giảm thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ giảm thuế"},{"k":"p","t":"Hồ sơ giảm thuế đối với hàng hóa hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng giảm thuế quy định tại Điều 18 Luật Thuế xuất khẩu, thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a) Công văn đề nghị giảm thuế nêu rõ loại thuế đề nghị giảm, lý do giảm thuế, số tiền thuế đề nghị giảm theo quy định tại điểm a khoản 2 Điều 80 Luật Quản lý thuế gửi qua Hệ thống theo Mẫu số 7 Phụ lục II ban hành kèm theo Thông tư này, trường hợp hồ sơ giấy thực hiện theo Mẫu số 15/TXNK Phụ lục I ban hành kèm theo Thông tư này: 01 bản chính."},{"k":"p","t":"b) Hợp đồng bảo hiểm, thông báo trả tiền bồi thường của tổ chức nhận bảo hiểm (nếu có), trường hợp hợp đồng bảo hiểm không bao gồm nội dung bồi thường về thuế phải có xác nhận của tổ chức bảo hiểm; hợp đồng hoặc biên bản thỏa thuận đền bù của hãng vận tải đối với trường hợp tổn thất do hãng vận tải gây ra (nếu có): 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị giảm thuế."},{"k":"p","t":"c) Văn bản, biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại:"},{"k":"p","t":"c.1) Văn bản xác nhận của một trong các cơ quan, tổ chức sau: Cơ quan Công an xã, phường, thị trấn; Ủy ban nhân dân xã, phường, thị trấn; Ban quản lý Khu công nghiệp, Khu chế xuất, Khu kinh tế, Ban quản lý cửa khẩu, Cảng vụ hàng không, Cảng vụ hàng hải nơi xảy ra sự kiện bất khả kháng về việc thiên tai, thảm họa, dịch bệnh, tai nạn bất ngờ gây thiệt hại cho nguyên liệu, máy móc, thiết bị nhập khẩu: 01 bản chính."},{"k":"p","t":"c.2) Biên bản xác nhận vụ cháy của cơ quan cảnh sát phòng cháy chữa cháy của địa phương nơi xảy ra vụ cháy: 01 bản chính."},{"k":"p","t":"d) Giấy chứng nhận giám định của thương nhân kinh doanh dịch vụ giám định về số lượng hàng hóa bị mất mát hoặc tỷ lệ tổn thất thực tế của hàng hóa: 01 bản chính."},{"k":"p","t":"2. Cơ quan hải quan căn cứ hồ sơ giảm thuế quy định tại khoản 1 Điều này và các quy định có liên quan để ban hành Quyết định giảm thuế."}]},{"id":"tt06_16","no":16,"code":"Điều 16","title":"Điều 16. Hướng dẫn khoản 3 Điều 86 Luật Quản lý thuế quy định về hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","shortTitle":"Hướng dẫn khoản 3 Điều 86 Luật Quản lý thuế quy định về hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt bao gồm:"},{"k":"p","t":"1. Công văn đề nghị xóa nợ tiền thuế, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a) Công văn đề nghị xóa nợ tiền thuế, tiền chậm nộp, tiền phạt của Cục Hải quan nơi người nộp thuế còn nợ tiền thuế, tiền chậm nộp, tiền phạt (đối với trường hợp thẩm quyền xóa nợ của Tổng cục trưởng Tổng cục Hải quan, Bộ trưởng Bộ Tài chính, Thủ tướng Chính phủ) theo Mẫu số 16/TXNK Phụ lục I ban hành kèm theo Thông tư này: 01 bản chính;"},{"k":"p","t":"b) Công văn đề nghị xóa nợ tiền thuế, tiền chậm nộp, tiền phạt của Cục Hải quan hoặc Chi cục Hải quan (tại địa bàn tỉnh mà Cục Hải quan không đóng trụ sở chính) nơi người nộp thuế còn nợ tiền thuế, tiền chậm nộp, tiền phạt (đối với trường hợp thẩm quyền xóa nợ của Chủ tịch Ủy ban nhân dân cấp tỉnh) theo Mẫu số 16/TXNK Phụ lục I ban hành kèm theo Thông tư này: 01 bản chính."},{"k":"p","t":"2. Tương ứng với các trường hợp được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt quy định tại Điều 85 Luật Quản lý thuế, hồ sơ xóa nợ gồm các chứng từ sau:"},{"k":"p","t":"a) Quyết định của cơ quan nhà nước có thẩm quyền về tuyên bố phá sản doanh nghiệp đối với trường hợp quy định tại khoản 1 Điều 85 Luật Quản lý thuế: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị xóa nợ thuế;"},{"k":"p","t":"b) Giấy chứng tử, giấy báo tử hoặc Quyết định tuyên bố mất tích của Tòa án; Quyết định tuyên bố mất năng lực hành vi dân sự của Tòa án hoặc các văn bản của cơ quan nhà nước có thẩm quyền chứng minh một người là đã chết, mất tích, mất năng lực hành vi dân sự đối với trường hợp quy định tại khoản 2 Điều 85 Luật Quản lý thuế: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị xóa nợ thuế;"},{"k":"p","t":"c) Thông báo của cơ quan có thẩm quyền về việc thu hồi Giấy chứng nhận đăng ký doanh nghiệp, Giấy chứng nhận đăng ký kinh doanh, Giấy chứng nhận đăng ký hợp tác xã, Giấy chứng nhận đăng ký hộ kinh doanh, Giấy chứng nhận đăng ký đầu tư, Giấy phép thành lập và hoạt động, Giấy phép hành nghề đối với trường hợp quy định tại khoản 3 Điều 85 Luật Quản lý thuế: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị xóa nợ thuế;"},{"k":"p","t":"d) Các Quyết định cưỡng chế hoặc hồ sơ thực hiện biện pháp cưỡng chế thi hành Quyết định hành chính về quản lý thuế đối với người nộp thuế là doanh nghiệp, tổ chức (nếu có): 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị xóa nợ thuế;"},{"k":"p","t":"đ) Văn bản của cơ quan nhà nước có thẩm quyền xác nhận cho các trường hợp bị ảnh hưởng do thiên tai, thảm họa, dịch bệnh quy định tại khoản 4 Điều 85 Luật Quản lý thuế: 01 bản chụp có đóng dấu xác nhận của cơ quan đề nghị xóa nợ thuế."}]},{"id":"tt06_17","no":17,"code":"Điều 17","title":"Điều 17. Hướng dẫn khoản 2 Điều 107 Luật Quản lý thuế quy định về mẫu biểu thanh tra, kiểm tra thuế, trình tự, thủ tục, hồ sơ kiểm tra thuế","shortTitle":"Hướng dẫn khoản 2 Điều 107 Luật Quản lý thuế quy định về mẫu biểu thanh tra, kiểm tra thuế, trình tự, thủ tục, hồ sơ kiểm tra thuế","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"1. Mẫu biểu thanh tra thuế thực hiện theo hướng dẫn tại Thông tư số 05/2014/TT-TTCP ngày 16/10/2014 của Thanh tra Chính phủ quy định về tổ chức, hoạt động, quan hệ công tác của Đoàn thanh tra và trình tự, thủ tục tiến hành một cuộc thanh tra, Thông tư số 08/2015/TT-TTCP ngày 15/12/2015 của Thanh tra Chính phủ quy định về Sổ nhật ký đoàn thanh tra, Thông tư số 03/2013/TT-TTCP ngày 10/6/2013 của Thanh tra Chính phủ quy định chế độ báo cáo công tác thanh tra, giải quyết khiếu nại, tố cáo và phòng, chống tham nhũng."},{"k":"p","t":"2. Mẫu biểu kiểm tra thuế, hồ sơ, trình tự, thủ tục kiểm tra thuế thực hiện như sau:"},{"k":"p","t":"a) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế trong thông quan đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế:"},{"k":"p","t":"a.1) Mẫu biểu, hồ sơ kiểm tra thuế trong thông quan là mẫu biểu, hồ sơ hải quan theo quy định của pháp luật về hải quan."},{"k":"p","t":"a.2) Thủ tục kiểm tra thuế trong thông quan đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế."},{"k":"p","t":"a.2.1) Trách nhiệm của người nộp thuế:"},{"k":"p","t":"Người nộp thuế tự kê khai, tự tính thuế, tự chịu trách nhiệm trước pháp luật về số tiền thuế phải nộp theo quy định tại khoản 1, khoản 2 Điều 42 Luật Quản lý thuế."},{"k":"p","t":"a.2.2) Trách nhiệm của cơ quan hải quan:"},{"k":"p","t":"Cơ quan hải quan thực hiện kiểm tra; Hồ sơ hải quan, chính sách thuế, tên hàng, mã số, số lượng, trọng lượng, khối lượng, chủng loại, chất lượng, xuất xứ, trị giá hải quan của hàng hóa; kiểm tra việc áp dụng văn bản thông báo kết quả xác định trước, kiểm tra giấy phép xuất khẩu, nhập khẩu, kết quả kiểm tra chuyên ngành (nếu có); kiểm tra thực tế hàng hóa theo quy định của pháp luật về hải quan. Quy định này không áp dụng đối với các trường hợp hàng hóa xuất khẩu, nhập khẩu được miễn kiểm tra hồ sơ hải quan, miễn kiểm tra thực tế hàng hóa theo quy định của pháp luật về hải quan."},{"k":"p","t":"b) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu không thuộc đối tượng chịu thuế:"},{"k":"p","t":"b.1) Mẫu biểu, hồ sơ kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu không thuộc đối tượng chịu thuế thực hiện theo quy định tại Thông tư số 38/2015/TT-BTC, Thông tư số 39/2018/TT-BTC."},{"k":"p","t":"b.2) Thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu không thuộc đối tượng chịu thuế:"},{"k":"p","t":"b.2.1) Trách nhiệm của người nộp thuế:"},{"k":"p","t":"Người nộp thuế tự kê khai, tự xác định hàng hóa không thuộc đối tượng chịu thuế, tự chịu trách nhiệm trước pháp luật về nội dung kê khai theo quy định tại khoản 1, khoản 2 Điều 42 Luật Quản lý thuế."},{"k":"p","t":"b.2.2) Trách nhiệm của cơ quan hải quan:"},{"k":"p","t":"Cơ quan hải quan thực hiện kiểm tra: Hồ sơ hải quan, chính sách thuế, giấy phép xuất khẩu, nhập khẩu (nếu có), kết quả kiểm tra chuyên ngành (nếu có), kiểm tra thực tế hàng hóa theo quy định của pháp luật về hải quan."},{"k":"p","t":"c) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng miễn thuế:"},{"k":"p","t":"c.1) Mẫu biểu, hồ sơ kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng miễn thuế thực hiện theo quy định tại Điều 14 Thông tư này."},{"k":"p","t":"c.2) Thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng miễn thuế thực hiện theo quy định tại khoản 3 Điều 31 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"d) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng giảm thuế:"},{"k":"p","t":"d.1) Mẫu biểu, hồ sơ kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng giảm thuế thực hiện theo quy định tại khoản 1 Điều 15 Thông tư này."},{"k":"p","t":"d.2) Thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng giảm thuế thực hiện theo quy định tại khoản 3 Điều 32 Nghị định số 134/2016/NĐ-CP."},{"k":"p","t":"đ) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng hoàn thuế, không thu thuế:"},{"k":"p","t":"đ.1) Mẫu biểu, hồ sơ kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng hoàn thuế thực hiện theo quy định tại điểm a khoản 1 Điều 12 Thông tư này, hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng không thu thuế thực hiện theo quy định tại điểm a khoản 1 Điều 13 Thông tư này."},{"k":"p","t":"đ.2) Thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng hoàn thuế thực hiện theo quy định tại Điều 12 Thông tư này, hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng không thu thuế thực hiện theo quy định tại Điều 13 Thông tư này."},{"k":"p","t":"e) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế đối với trường hợp xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa:"},{"k":"p","t":"e.1) Mẫu biểu, hồ sơ kiểm tra thuế đối với trường hợp xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa thực hiện theo quy định tại khoản 2 Điều 131 quy định tại khoản 64 Điều 1 Thông tư số 39/2018/TT-BTC."},{"k":"p","t":"e.2) Thủ tục kiểm tra thuế đối với trường hợp xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa thực hiện theo quy định tại khoản 2, khoản 3, khoản 4 Điều 131 quy định tại khoản 64 Điều 1 Thông tư số 39/2018/TT-BTC."},{"k":"p","t":"g) Mẫu biểu, hồ sơ, thủ tục kiểm tra thuế đối với hàng hóa xuất khẩu, nhập khẩu trong hoạt động kiểm tra sau thông quan thực hiện theo quy định tại khoản 73, khoản 74 Điều 1 Thông tư số 39/2018/TT-BTC."}]},{"id":"tt06_18","no":18,"code":"Điều 18","title":"Điều 18. Hướng dẫn khoản 5 Điều 124 Luật Quản lý thuế quy định về nộp dần tiền thuế nợ","shortTitle":"Hướng dẫn khoản 5 Điều 124 Luật Quản lý thuế quy định về nộp dần tiền thuế nợ","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Số lần nộp dần tiền thuế nợ, hồ sơ, thủ tục nộp dần tiền thuế nợ được thực hiện theo quy định tại khoản 67 Điều 1 Thông tư số 39/2018/TT-BTC."}]},{"id":"tt06_19","no":19,"code":"Điều 19","title":"Điều 19. Hướng dẫn khoản 1 Điều 39 Nghị định số 126/2020/NĐ-CP quy định về ủy nhiệm thu phí hải quan, lệ phí hàng hóa phương tiện quá cảnh","shortTitle":"Hướng dẫn khoản 1 Điều 39 Nghị định số 126/2020/NĐ-CP quy định về ủy nhiệm thu phí hải quan, lệ phí hàng hóa phương tiện quá cảnh","chuong":"Chương II — QUY ĐỊNH CỤ THỂ","muc":"","level":1,"content":[{"k":"p","t":"Ủy nhiệm thu phí hải quan, lệ phí hàng hóa phương tiện quá cảnh thực hiện theo quy định tại Thông tư số 274/2016/TT-BTC ngày 14/11/2016 của Bộ Tài chính quy định mức thu, chế độ thu, nộp, quản lý và sử dụng phí hải quan, lệ phí hàng hóa phương tiện quá cảnh."}]},{"id":"tt06_20","no":20,"code":"Điều 20","title":"Điều 20. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 08 tháng 03 năm 2021."},{"k":"p","t":"2. Kể từ ngày Thông tư này có hiệu lực, các quy định dưới đây hết hiệu lực thi hành:"},{"k":"p","t":"a) Khoản 2, khoản 3, khoản 4, khoản 7, khoản 9 Điều 129 được quy định tại khoản 63 Điều 1 Thông tư 39/2018/TT-BTC;"},{"k":"p","t":"b) Khoản 1 Điều 131 được quy định tại khoản 64 Điều 1 Thông tư 39/2018/TT-BTC;"},{"k":"p","t":"c) Điều 133 được quy định tại khoản 66 Điều 1 Thông tư 39/2018/TT-BTC;"},{"k":"p","t":"d) Khoản 2 Điều 135 được quy định tại khoản 68 Điều 1 Thông tư 39/2018/TT-BTC;"},{"k":"p","t":"đ) Khoản 3 Điều 136 được quy định tại khoản 69 Điều 1 Thông tư 39/2018/TT-BTC;"},{"k":"p","t":"e) Các mẫu số 05/CVĐNKTT/TXNK, mẫu số 10/QĐKTT/TXNK, mẫu số 11/TBBSHS/TXNK, mẫu số 12/TBKTT/TXNK, mẫu số 18/BBLV/TXNK, mẫu số 22/QĐKT/TXNK, mẫu số 23/BBCB/TXNK, mẫu số 24/BBKT/TXNK, mẫu số 25/QĐGH/TXNK, mẫu số 26/KLKT/TXNK, mẫu số 29/TBTCNCT/TXNK, mẫu số 32/CVGHNT/TXNK, mẫu số 33/CVXN/TXNK Phụ lục III; mẫu số 1, mẫu số 2 Phụ lục IV ban hành kèm theo Thông tư số 39/2018/TT-BTC."},{"k":"p","t":"3. Trường hợp các văn bản quy phạm pháp luật mới ban hành sửa đổi, bổ sung, thay thế các văn bản được dẫn chiếu tại Thông tư này thì thực hiện theo văn bản mới được được ban hành."}]},{"id":"tt06_21","no":21,"code":"Điều 21","title":"Điều 21. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan hải quan có trách nhiệm phổ biến, hướng dẫn các tổ chức, cá nhân, người nộp thuế thực hiện theo nội dung Thông tư này."},{"k":"p","t":"2. Tổ chức, cá nhân, người nộp thuế thuộc đối tượng điều chỉnh của Thông tư này thực hiện đầy đủ các hướng dẫn tại Thông tư này."},{"k":"p","t":"Trong quá trình thực hiện, nếu có khó khăn, vướng mắc, đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để được giải quyết kịp thời./."},{"k":"p","t":"Nơi nhận: - Thủ tướng Chính phủ, các Phó TTCP;- Văn phòng TW Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chủ tịch nước;- Viện Kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- Các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ;- UBND tỉnh, thành phố trực thuộc TW;- Phòng Thương mại và Công nghiệp Việt Nam;- Cục Kiểm tra văn bản (Bộ Tư pháp);- Các Cục Hải quan tỉnh, thành phố;- Công báo;- Website Chính phủ;- Website Bộ Tài chính;- Website Tổng cục Hải quan;- Lưu: VT, TCHQ (70)."},{"k":"p","t":"KT. BỘ TRƯỞNGTHỨ TRƯỞNGVũ Thị Mai"}]}],"refs":{"tt06_1":[{"kind":"related","targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 (căn cứ)"},{"kind":"related","targetSlug":"nd134","targetAnchor":"nd134_1","label":"NĐ 134/2016 — Thuế XNK"}]},"details":{"tt06_1":[{"match":"Thông tư này hướng dẫn thi hành","title":"TT 06 Điều 1 — Phạm vi (quản lý thuế hàng XNK)","summary":"TT 06/2021 hướng dẫn thi hành một số điều của Luật Quản lý thuế về quản lý thuế đối với hàng hóa XNK (khai, nộp, ấn định, hoàn, miễn, giảm, xử lý nợ thuế).","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","l <script>
var D=JSON.parse(document.getElementById('LD').textContent);

function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');

}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}

var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/

function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}

function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});

function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;

  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');

  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');

  h+='</div>';

  document.getElementById('s-home').innerHTML=h;
}

function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});

initHash();
