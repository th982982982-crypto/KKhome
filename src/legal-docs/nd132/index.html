 theo quy định tại Luật Quản lý thuế số 38/2019/QH14 ngày 13 tháng 6 năm 2019."},{"k":"p","t":"4. Cơ quan thuế có trách nhiệm bảo mật thông tin do người nộp thuế cung cấp liên quan đến việc xác định giá giao dịch liên kết theo quy định tại Nghị định này. Việc cung cấp thông tin cho các cơ quan, tổ chức thực hiện theo quy định tại khoản 5 Điều này."},{"k":"p","t":"5. Trường hợp qua thanh tra, kiểm tra xác định giá giao dịch liên kết có phát sinh vướng mắc về cơ chế, chính sách liên quan đến các ngành, lĩnh vực chuyên ngành, Cơ quan thuế lấy ý kiến các cơ quan, tổ chức, cá nhân liên quan, cụ thể:"},{"k":"p","t":"a) Cơ quan quản lý chuyên ngành, các tổ chức, hiệp hội chuyên ngành;"},{"k":"p","t":"b) Cơ quan thuế có trách nhiệm cung cấp hồ sơ, thông tin, tài liệu liên quan đến xác định giá giao dịch liên kết cho các cơ quan, tổ chức chuyên ngành được lấy ý kiến. Các cơ quan, đơn vị được lấy ý kiến có trách nhiệm bảo mật thông tin theo quy định của pháp luật."},{"k":"p","t":"6. Cơ quan thuế trao đổi thông tin với người nộp thuế và Cơ quan thuế đối tác theo thủ tục tham vấn trước, trong và sau quá trình thanh tra, kiểm tra giá giao dịch liên kết như sau:"},{"k":"p","t":"a) Trường hợp qua việc áp dụng quản lý rủi ro trong quản lý thuế đối với giá giao dịch liên kết, Cơ quan thuế thấy cần thiết trao đổi thông tin trước với người nộp thuế về Phụ lục I ban hành kèm theo Nghị định này và Hồ sơ xác định giá giao dịch liên kết của người nộp thuế, Cơ quan thuế gửi công văn đề nghị tổ chức tham vấn với người nộp thuế để trao đổi, cung cấp trước các thông tin về Hồ sơ xác định giá giao dịch liên kết của người nộp thuế theo quy định tại Nghị định này;"},{"k":"p","t":"b) Trường hợp Cơ quan thuế cần thực hiện việc liên lạc, trao đổi với Cơ quan thuế đối tác về Báo cáo lợi nhuận liên quốc gia và các thông tin liên quan khác thực hiện theo quy định tại điều khoản về Thủ tục thoả thuận song phương và trao đổi thông tin tại Hiệp định thuế có liên quan. Trong trường hợp cần thiết, Cơ quan thuế thông báo bằng văn bản cho người nộp thuế về việc tạm dừng thanh tra, kiểm tra để tiến hành trao đổi thông tin với Cơ quan thuế đối tác theo quy định của pháp luật thuế."},{"k":"p","t":"7. Cơ quan thuế thực hiện cơ chế trao đổi thông tin tự động theo cam kết quốc tế của Việt Nam tại các Điều ước quốc tế về thuế. Định kỳ, hàng năm, Cơ quan thuế thông báo danh sách các Cơ quan thuế nước ngoài thực hiện được trao đổi thông tin tự động đối với Báo cáo lợi nhuận liên quốc gia của người nộp thuế trên Cổng thông tin điện tử của ngành thuế."},{"k":"p","t":"8. Cơ quan thuế thực hiện điều chỉnh việc xác định giá giao dịch liên kết theo thỏa thuận song phương quy định tại các Hiệp định thuế có liên quan."},{"k":"p","t":"9. Trường hợp Cơ quan thuế ký Thỏa thuận trước về phương pháp xác định giá tính thuế với người nộp thuế, Cơ quan thuế có trách nhiệm:"},{"k":"p","t":"a) Thực hiện quản lý, kiểm tra, thanh tra các giao dịch liên kết không thuộc phạm vi áp dụng Thỏa thuận trước về phương pháp xác định giá tính thuế theo nguyên tắc quản lý rủi ro;"},{"k":"p","t":"b) Quản lý, kiểm tra, thanh tra việc tuân thủ Thỏa thuận trước về phương pháp xác định giá tính thuế đã ký kết của người nộp thuế theo quy định."}]},{"id":"nd132_21","no":21,"code":"Điều 21","title":"Điều 21. Trách nhiệm của các bộ, cơ quan ngang bộ và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương","shortTitle":"Trách nhiệm của các bộ, cơ quan ngang bộ và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"a) Chịu trách nhiệm thực hiện quản lý nhà nước về thuế đối với doanh nghiệp có quan hệ liên kết và giao dịch liên kết theo quy định tại Nghị định này;"},{"k":"p","t":"b) Chủ trì, phối hợp với Bộ Thông tin và Truyền thông thực hiện công tác thông tin, tuyên truyền về quản lý nhà nước về thuế đối với doanh nghiệp có giao dịch liên kết;"},{"k":"p","t":"c) Thực hiện kiểm tra, thanh tra việc thực hiện các quy định về thuế đối với doanh nghiệp có giao dịch liên kết theo quy định tại Nghị định này."},{"k":"p","t":"2. Ngân hàng Nhà nước trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp thông tin, số liệu về các khoản vay, trả nợ nước ngoài của từng doanh nghiệp cụ thể có giao dịch liên kết trên cơ sở danh sách do Cơ quan thuế yêu cầu, bao gồm dữ liệu về kim ngạch khoản vay, lãi suất, kỳ trả lãi, trả gốc, thực tế rút vốn, trả nợ (gốc, lãi) và các thông tin liên quan khác (nếu có)."},{"k":"p","t":"3. Bộ Kế hoạch và Đầu tư trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp dữ liệu đăng ký ngành nghề kinh doanh của doanh nghiệp; cơ sở dữ liệu về cơ cấu vốn đầu tư tại thời điểm cấp phép và các thời điểm điều chỉnh, sửa đổi giấy chứng nhận đăng ký đầu tư, giấy chứng nhận đăng ký doanh nghiệp và các thông tin liên quan đối với các dự án đầu tư khi cơ quan thuế thực hiện thanh tra, kiểm tra đối với doanh nghiệp có giao dịch liên kết."},{"k":"p","t":"4. Bộ Khoa học và Công nghệ, Bộ Nông nghiệp và Phát triển nông thôn trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp cơ sở dữ liệu liên quan đến các hợp đồng chuyển giao công nghệ; hợp đồng chuyển giao quyền sở hữu công nghiệp; chuyển giao quyền đối với giống cây trồng; hồ sơ đăng ký quyền sở hữu trí tuệ sau khi được xác lập quyền sở hữu công nghiệp, quyền đối với giống cây trồng và cung cấp thông tin khi được lấy ý kiến cho Cơ quan thuế để thực hiện công tác quản lý thuế đối với doanh nghiệp có giao dịch liên kết."},{"k":"p","t":"5. Bộ Thông tin và Truyền thông trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp cơ sở dữ liệu về các doanh nghiệp được cấp phép kinh doanh trong lĩnh vực thuộc phạm vi quản lý và thông tin về giao dịch liên kết trong lĩnh vực kinh tế số theo đề nghị của Bộ Tài chính."},{"k":"p","t":"6. Bộ Công Thương trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp cơ sở dữ liệu về giá giao dịch của các hàng hóa trên các sở giao dịch hàng hóa trong nước và thông tin theo chức năng nhiệm vụ thuộc phạm vi quản lý của Bộ Công Thương, theo yêu cầu quản lý thuế đối với doanh nghiệp có giao dịch liên kết của Cơ quan thuế."},{"k":"p","t":"7. Ủy ban Quản lý vốn Nhà nước tại doanh nghiệp trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp đôn đốc các tập đoàn, tổng công ty, nhóm doanh nghiệp liên kết thuộc phạm vi quản lý cung cấp thông tin theo quy định của Cơ quan thuế."},{"k":"p","t":"8. Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Chỉ đạo Sở Kế hoạch và Đầu tư, Sở Tài chính và các sở, ban, ngành xây dựng cơ sở dữ liệu thuộc lĩnh vực quản lý chuyên ngành phục vụ công tác quản lý thuế đối với doanh nghiệp có giao dịch liên kết."},{"k":"p","t":"9. Các bộ, ngành trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm phối hợp Bộ Tài chính triển khai thực hiện Nghị định này."}]},{"id":"nd132_22","no":22,"code":"Điều 22","title":"Điều 22. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 20 tháng 12 năm 2020 và áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2020."},{"k":"p","t":"2. Nghị định số 20/2017/NĐ-CP ngày 24 tháng 02 năm 2017 và Nghị định số 68/2020/NĐ-CP ngày 24 tháng 6 năm 2020 của Chính phủ quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết hết hiệu lực kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"3. Kê khai, quyết toán thuế thu nhập doanh nghiệp năm 2017 và năm 2018:"},{"k":"p","t":"a) Người nộp thuế thuộc trường hợp khai bổ sung hồ sơ khai quyết toán thuế thu nhập doanh nghiệp năm 2017, năm 2018 theo quy định tại khoản 2 Điều 2 Nghị định số 68/2020/NĐ-CP ngày 24 tháng 6 năm 2020 của Chính phủ nhưng chưa thực hiện kê khai bổ sung hồ sơ quyết toán thuế thu nhập doanh nghiệp được tiếp tục thực hiện đến trước ngày 01 tháng 01 năm 2021;"},{"k":"p","t":"b) Người nộp thuế đã được cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền thực hiện thanh tra, kiểm tra và đã có kết luận thanh tra, kiểm tra, quyết định xử lý đối với kỳ tính thuế năm 2017, năm 2018 nhưng thuộc trường hợp được xác định lại số thuế phải nộp theo điểm c khoản 2 Điều 2 Nghị định số 68/2020/NĐ-CP ngày 24 tháng 6 năm 2020 nhưng đến thời điểm Nghị định này có hiệu lực thi hành chưa gửi đề nghị cho cơ quan thuế thì người nộp thuế có quyền đề nghị cơ quan thuế quản lý trực tiếp xác định lại số thuế phải nộp;"},{"k":"p","t":"c) Trường hợp người nộp thuế có số tiền thuế thu nhập doanh nghiệp, tiền chậm nộp đã nộp ngân sách nhà nước của năm 2017, năm 2018 lớn hơn số tiền thuế thu nhập doanh nghiệp, tiền chậm nộp đã xác định lại thì phần chênh lệch được bù trừ vào số thuế thu nhập doanh nghiệp từ năm 2020 đến hết năm 2024. Kết thúc thời hạn trên, không xử lý số thuế còn lại chưa bù trừ hết."},{"k":"p","t":"4. Đối với trường hợp được chuyển chi phí lãi vay sang kỳ tính thuế tiếp theo khi quyết toán thuế thu nhập doanh nghiệp năm 2019 theo quy định tại Nghị định số 68/2020/NĐ-CP, thời gian chuyển chi phí lãi vay tính liên tục không quá 05 năm kể từ kỳ tính thuế thu nhập doanh nghiệp năm 2020. Trường hợp sau 05 năm không chuyển hết thì phần chi phí lãi vay còn lại không được chuyển sang các kỳ tính thuế tiếp theo."}]},{"id":"nd132_23","no":23,"code":"Điều 23","title":"Điều 23. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính chủ trì, phối hợp với các bộ, ngành liên quan và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương triển khai thực hiện Nghị định này."},{"k":"p","t":"2. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân liên quan chịu trách nhiệm thi hành Nghị định này/."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán Nhà nước;\n- Ủy ban Giám sát tài chính Quốc gia;\n- Ngân hàng Chính sách xã hội;\n- Ngân hàng Phát triển Việt Nam;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các đoàn thể;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT,\ncác Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nTHỦ TƯỚNG\nNguyễn Xuân Phúc"]]},{"k":"p","t":"Phụ lục I"},{"k":"p","t":"(Kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ)"},{"k":"p","t":"________"},{"k":"p","t":"THÔNG TIN VỀ QUAN HỆ LIÊN KẾT VÀ GIAO DỊCH LIÊN KẾT"},{"k":"p","t":"(Kèm theo Tờ khai quyết toán thuế thu nhập doanh nghiệp)"},{"k":"p","t":"Kỳ tính thuế: Từ ...................... đến ........................"},{"k":"p","t":"[01] Tên người nộp thuế ........................................................................................................................................."},{"k":"tbl","rows":[["[02] Mã số thuế:","","","","","","","","","","","","","",""]]},{"k":"p","t":"[03] Địa chỉ:"},{"k":"p","t":"[04] Quận/huyện: ......................................................... [05] Tỉnh/thành phố: ........................................................................."},{"k":"p","t":"[06] Điện thoại: ..........................................  [07] Fax: ................................ )-(8)]/(11)","","","",""],["13","Chi phí lãi vay của các kỳ trước chuyển sang (13)=(13.1)+(13.2)+(13.3)+(13.4)+(13.5) Trong đó:","","","",""],["13.1","- Phần chi phí lãi vay không được trừ từ năm (n-1) chuyển sang kỳ tính thuế (n)","","","",""],["","- Phần chi phí lãi vay không được trừ từ năm (n-2) chuyển sang kỳ tính thuế (n)","","","",""],["13.3","- Phần chi phí lãi vay không được trừ từ năm (n-3) chuyển sang kỳ tính thuế (n)","","","",""],["13.4","- Phần chi phí lãi vay không được trừ từ năm (n-4) chuyển sang kỳ tính thuế (n)","","","",""],["13.5","- Phần chi phí lãi vay không được trừ từ năm (n-5) chuyển sang kỳ tính thuế (n)","","","",""],["14","Tỷ lệ chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh được trừ trong kỳ cộng chi phí lãi vay của các kỳ trước chuyển sang kỳ tính thuế (n) trên tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay thuần phát sinh trong kỳ cộng chi phí khấu hao phát sinh trong kỳ của người nộp thuế (14) = [(9)-(8)+(13)]/(11)","","","",""],["15","Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết","","","",""],["15.1","Tỷ suất","","","",""],["15.2","Tỷ suất","","","",""],["15.3","….","","","",""]]},{"k":"p","t":"Tôi cam đoan số liệu khai trên là đúng và chịu trách nhiệm trước pháp luật về số liệu đã khai./."},{"k":"tbl","rows":[["NHÂN VIÊN ĐẠI LÝ THUẾ\nHọ và tên: ….\nChứng chỉ hành nghề số: …","…., ngày....tháng.....năm….\nNGƯỜI NỘP THUẾ hoặc ĐẠI DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ\n(Ký, ghi rõ họ tên; chức vụ và đóng dấu (nếu có))"]]},{"k":"p","t":"HƯỚNG DẪN KÊ KHAI MỘT SỐ CHỈ TIÊU"},{"k":"p","t":"A. Kỳ tính thuế: Ghi thông tin tương ứng với kỳ tính thuế của Tờ khai quyết toán thuế thu nhập doanh nghiệp. Kỳ tính thuế xác định theo quy định tại Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"B. Thông tin chung của người nộp thuế: Từ chỉ tiêu [01] đến chỉ tiêu [10] ghi thông tin tương ứng với thông tin đã ghi tại Tờ khai quyết toán thuế thu nhập doanh nghiệp."},{"k":"p","t":"C. Mục I. Thông tin về các bên liên kết:"},{"k":"p","t":"- Cột (2): Ghi đầy đủ tên của từng bên liên kết:"},{"k":"p","t":"+ Trường hợp bên liên kết tại Việt Nam là tổ chức thì ghi theo thông tin tại giấy phép đăng ký doanh nghiệp; là cá nhân thì ghi theo thông tin tại chứng minh nhân dân, thẻ căn cước công dân, hộ chiếu."},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân ngoài Việt Nam thì ghi theo thông tin tại văn bản xác định quan hệ liên kết như giấy phép đăng ký kinh doanh, hợp đồng, thỏa thuận giao dịch của người nộp thuế với bên liên kết."},{"k":"p","t":"- Cột (3): Ghi tên quốc gia, vùng lãnh thổ nơi bên liên kết là đối tượng cư trú."},{"k":"p","t":"- Cột (4): Ghi mã số thuế của các bên liên kết:"},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân tại Việt Nam thì ghi đủ mã số thuế."},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân ngoài Việt Nam thì ghi đủ mã số thuế, mã định danh người nộp thuế, nếu không có thì ghi rõ lý do."},{"k":"p","t":"- Cột (5): Căn cứ quy định tại khoản 2 Điều 5 Nghị định số …/2020/NĐ-CP, người nộp thuế phát sinh giao dịch liên kết kê khai hình thức quan hệ liên kết tương ứng với từng bên liên kết bằng cách đánh dấu “x” vào ô tương ứng. Trường hợp bên liên kết thuộc nhiều hơn một hình thức quan hệ liên kết, người nộp thuế đánh dấu “x” vào các ô tương ứng."},{"k":"p","t":"D. Mục II. Các trường hợp được miễn kê khai, miễn lập hồ sơ xác định giá giao dịch liên kết:"},{"k":"p","t":"Nếu người nộp thuế thuộc trường hợp được miễn kê khai, miễn lập Hồ sơ xác định giá giao dịch liên kết quy định tại Điều 19 Nghị định số .../2020/NĐ-CP tại Cột (2) thì đánh dấu “x” vào ô thuộc diện miễn trừ tương ứng tại Cột (3)."},{"k":"p","t":"Trường hợp người nộp thuế được miễn kê khai, miễn lập hồ sơ xác định giá giao dịch liên kết theo quy định tại khoản 1 Điều 19 Nghị định số .../2020/NĐ-CP, người nộp thuế chỉ đánh dấu vào ô tương ứng tại Cột (3) và không phải kê khai các mục III và IV Phụ lục I kèm theo Nghị định số ... .../2020/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP, người nộp thuế kê khai các mục III và IV theo hướng dẫn tương ứng tại các phần Đ.1 và E."},{"k":"p","t":"Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm b khoản 2 Điều 19 Nghị định số.../2020/NĐ-CP, người nộp thuế kê khai theo hướng dẫn tương ứng tại các phần Đ.2 và E."},{"k":"p","t":"Đ. Mục III. Thông tin xác định giá giao dịch liên kết:"},{"k":"p","t":"Đ.1. Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP và đã kê khai đánh dấu (x) vào cột 3 tại dòng a hoặc dòng c chỉ tiêu miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số…/2020/NĐ-CP thực hiện kê khai mục này như sau:"},{"k":"p","t":"- Cột (3), (7) và (12): Kê khai như hướng dẫn tại phần Đ.2 Phụ lục này."},{"k":"p","t":"- Cột (4), (5), (6), (8), (9), (10) và (11): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Đối với trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP, tổng giá trị tất cả các giao dịch liên kết phát sinh trong kỳ tính thuế làm căn cứ xác định điều kiện được miễn trừ được tính bằng (=) tổng giá trị tại Cột (3) cộng (+) Cột (7) của dòng chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động liên kết”."},{"k":"p","t":"Đ.2. Người nộp thuế không thuộc trường hợp được miễn lập Hồ sơ xác định giá giao dịch liên kết tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số…/2020/NĐ-CP kê khai như sau:"},{"k":"p","t":"- Chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động kinh doanh”:"},{"k":"p","t":"+ Cột (3): Ghi tổng giá trị doanh thu bán ra cho các bên liên kết và các bên độc lập, bao gồm: Doanh thu bán hàng và cung cấp dịch vụ, doanh thu hoạt động tài chính và thu nhập khác (không bao gồm các khoản thu hộ)."},{"k":"p","t":"+ Cột (7): Ghi tổng giá trị chi phí phải trả cho các bên liên kết và các bên độc lập, bao gồm: Chi phí hàng hóa và dịch vụ mua vào, chi phí tài chính, chi phí bán hàng, chi phí quản lý doanh nghiệp và chi phí khác (không bao gồm các khoản chi hộ)."},{"k":"p","t":"+ Cột (4), (5), (6), (8), (9), (10), (11), (12) và (13): Để trống không phải kê khai."},{"k":"p","t":"- Chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động liên kết”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với từng chỉ tiêu Hàng hóa cộng (+) Dịch vụ."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với các chỉ tiêu Hàng hóa hình thành tài sản cố định cộng (+) Hàng hóa không hình thành tài sản cố định."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa hình thành tài sản cố định” và các dòng chi tiết “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị phát sinh từ mua hoặc bán tài sản cố định của người nộp thuế với các bên liên kết theo giá trị tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị phát sinh từ mua hoặc bán tài sản cố định với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và (10)."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa không hình thành tài sản cố định” và các dòng chi tiết “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị phát sinh từ mua hoặc bán hàng hóa không phải là tài sản cố định của người nộp thuế với các bên liên kết theo giá trị tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị phát sinh từ mua hoặc bán hàng hóa không phải là tài sản cố định của người nộp thuế với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và (10)."},{"k":"p","t":"- Chỉ tiêu “Dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với các chỉ tiêu “Nghiên cứu, phát triển” cộng (+) “Quảng cáo, tiếp thị” cộng (+) “Quản lý kinh doanh và tư vấn, đào tạo” cộng (+) “Hoạt động tài chính” cộng (+) “Dịch vụ khác”."},{"k":"p","t":"- Các chỉ tiêu “Nghiên cứu, phát triển”; “Quảng cáo, tiếp thị”; “Quản lý kinh doanh và tư vấn, đào tạo”; “Hoạt động tài chính và Dịch vụ khác”, và chi tiết theo từng “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị từng loại dịch vụ phát sinh từ giao dịch với các bên liên kết được ghi nhận theo giá trị ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị từng loại dịch vụ phát sinh từ giao dịch với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và Cột (10)."},{"k":"p","t":"- Cột (6) và (10): Ghi tương ứng với từng chỉ tiêu theo từng bên liên kết ký hiệu viết tắt tên phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số .../2020/NĐ-CP cấu thành giá trị bán ra cho bên liên kết và giá trị mua vào từ bên liên kết của người nộp thuế xác định theo Hồ sơ xác định giá giao dịch liên kết, cụ thể như sau:"},{"k":"p","t":"+ PP1: Phương pháp so sánh giá giao dịch liên kết với giá giao dịch độc lập (phương pháp so sánh giá giao dịch độc lập)."},{"k":"p","t":"+ PP2: Phương pháp so sánh tỷ suất lợi nhuận của người nộp thuế với tỷ suất lợi nhuận của các đối tượng so sánh độc lập."},{"k":"p","t":"PP2-1: Phương pháp so sánh tỷ suất lợi gộp trên doanh thu (phương pháp giá bán lại)."},{"k":"p","t":"PP2-2: Phương pháp so sánh tỷ suất lợi gộp trên giá vốn (phương pháp giá vốn cộng lãi)."},{"k":"p","t":"PP2-3: Phương pháp so sánh tỷ suất lợi nhuận thuần."},{"k":"p","t":"+ PP3: Phương pháp phân bổ lợi nhuận giữa các bên liên kết."},{"k":"p","t":"Ví dụ:"},{"k":"p","t":"+ Mua máy móc từ bên liên kết A trên cơ sở phương pháp so sánh giá giao dịch độc lập, tại dòng chỉ tiêu Hàng hóa hình thành tài sản cố định từ bên liên kết A Cột (10): Ghi PP1."},{"k":"p","t":"+ Thu phí dịch vụ quản lý cung cấp cho bên liên kết B trên cơ sở phương pháp giá vốn cộng lãi, tại dòng chỉ tiêu Quản lý kinh doanh và tư vấn, đào tạo cho bên liên kết B Cột (6): Ghi PP2-2."},{"k":"p","t":"- Cột (5) và (9): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"- Cột (11): Ghi lợi nhuận tăng do xác định lại theo giá giao dịch độc lập."},{"k":"p","t":"- Cột (12): Ghi lần lượt tổng giá trị thu hộ, tổng giá trị chi hộ, tổng giá trị doanh thu phân bổ cho cơ sở thường trú, tổng giá trị chi phí phân bổ cho cơ sở thường trú phát sinh trong kỳ tính thuế."},{"k":"p","t":"- Cột (13): Ghi theo hướng dẫn tại Phụ lục I ban hành kèm theo Nghị định số ..../2020/NĐ-CPtương ứng với từng giao dịch thuộc phạm vi áp dụng APA và để trống các ô tương ứng với các dòng chỉ tiêu ghi số liệu tổng giá trị."},{"k":"p","t":"E. Mục IV. Kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết:"},{"k":"p","t":"- Chỉ tiêu “Người nộp thuế đã ký thỏa thuận trước về phương pháp xác định giá tính thuế (APA)”:"},{"k":"p","t":"Người nộp thuế đánh dấu “x” vào “Có” nếu đã ký APA đơn phương, song phương hoặc đa phương với Cơ quan thuế Việt Nam. Trường hợp người nộp thuế không ký APA với Cơ quan thuế thì đánh dấu “x” vào “Không” và để trống không kê khai các chỉ tiêu tại Cột (4) bảng kết quả sản xuất kinh doanh tại mục này."},{"k":"p","t":"- Người nộp thuế chỉ phát sinh các khoản thu hoặc doanh thu với các bên độc lập chỉ kê khai tại Cột (6) của bảng kết quả sản xuất kinh doanh phù hợp với từng loại hình doanh nghiệp đối với từng chỉ tiêu tương ứng được hướng dẫn tại Phụ lục này."},{"k":"p","t":"1. Dành cho người nộp thuế thuộc các ngành sản xuất, thương mại, dịch vụ:"},{"k":"p","t":"a) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2a miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số …/2020/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1), (2), (3), (4), (5), (6), (7), (8), (8.1), (9), (9.1), (9.1.a), (9.1.b), (10), (11) và (12):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Các chỉ tiêu tại dòng (13), (14), (15), (15.1), (15.2), (15.3), (15.4), (15.5) và (16) xác định và tính toán theo quy định tại điểm a, điểm b khoản 3 Điều 16 Nghị định số…/2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu tại dòng (17): Người nộp thuế để trống không kê khai."},{"k":"p","t":"b) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2c miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số .../2020/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1), (2), (3), (4), (5), (6), (7), (8), (8.1), (9), (9.1), (9.1.a), (9.1.b), (10), (11) và (12):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Các chỉ tiêu tại dòng (13), (14), (15), (15.1), (15.2), (15.3), (15.4), (15.5) và (16) xác định và tính toán theo quy định tại điểm a, điểm b khoản 3 Điều 16 Nghị định số …/2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần tại các dòng chỉ tiêu (17.1), (17.2), (17.3), (17...) theo quy định tại điểm c khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột 6: Người nộp thuế kê khai giá trị Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với lĩnh vực hoạt động theo quy định tại điểm c khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế thực hiện kinh doanh nhiều hơn một lĩnh vực, theo dõi, hạch toán riêng doanh thu, chi phí của từng lĩnh vực hoặc theo dõi, hạch toán riêng được doanh thu nhưng không theo dõi, hạch toán riêng được chi phí phát sinh của từng lĩnh vực thực hiện kê khai riêng theo từng lĩnh vực."},{"k":"p","t":"Trường hợp người nộp thuế thực hiện kinh doanh nhiều hơn một lĩnh vực không theo dõi, hạch toán riêng được doanh thu và chi phí của từng lĩnh vực thực hiện kê khai theo lĩnh vực có tỷ suất cao nhất."},{"k":"p","t":"c) Trường hợp người nộp thuế không được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP, kê khai như sau:"},{"k":"p","t":"- Chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của các giao dịch cung cấp hàng hóa, dịch vụ cho các bên liên kết xác định giá theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của các giao dịch cung cấp hàng hóa, dịch vụ cho các bên độc lập theo giá trị ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"Các chỉ tiêu “Doanh thu bán hàng hóa, dịch vụ xuất khẩu” và “Các khoản giảm trừ doanh thu”: Người nộp thuế kê khai tương ứng doanh thu bán hàng hóa và cung cấp dịch vụ và ghi theo hướng dẫn tương tự tại chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ”."},{"k":"p","t":"- Chỉ tiêu “Doanh thu thuần về bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Các khoản giảm trừ doanh thu”."},{"k":"p","t":"- Chỉ tiêu “Giá vốn hàng bán”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của giá vốn hàng bán tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên liên kết và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của giá vốn hàng bán tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên độc lập và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6) có giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Doanh thu thuần về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Giá vốn hàng bán”."},{"k":"p","t":"- Các chỉ tiêu “Chi phí bán hàng” và “Chi phí quản lý doanh nghiệp”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của chi phí bán hàng, chi phí quản lý doanh nghiệp tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên liên kết bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của chi phí bán hàng, chi phí quản lý doanh nghiệp tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên độc lập bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong hoạt động sản xuất kinh doanh, người nộp thuế theo dõi hạch toán và ghi giá trị hạch toán, xác định riêng đối với chi phí từ bên liên kết thuộc phạm vi xác định giá theo Hồ sơ xác định giá giao dịch liên kết; theo APA và giao dịch với các bên độc lập tương ứng với cột (3), (4) và (5). Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bố phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Doanh thu hoạt động tài chính”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị doanh thu hoạt động tài chính."},{"k":"p","t":"- Chỉ tiêu “Lãi tiền gửi và lãi cho vay”: Ghi giá trị tiền lãi thu được từ hoạt động cho vay tính vào doanh thu hoạt động tài chính trong kỳ."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị theo xác định tại Hồ sơ xác định giá giao dịch liên kết, theo APA đối với giao dịch phát sinh với các bên liên kết và giá trị ghi tại sổ kế toán đối với giao dịch phát sinh với các bên độc lập."},{"k":"p","t":"- Chỉ tiêu “Chi phí tài chính”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị chi phí hoạt động tài chính."},{"k":"p","t":"- Chỉ tiêu “Chi phí lãi tiền vay dùng cho hoạt động sản xuất, kinh doanh”: Ghi giá trị chi phí lãi vay tính vào chi phí tài chính trong kỳ."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị theo xác định tại Hồ sơ xác định giá giao dịch liên kết, theo APA đối với giao dịch phát sinh với các bên liên kết và giá trị ghi tại sổ kế toán đối với giao dịch phát sinh với các bên độc lập."},{"k":"p","t":"- Chỉ tiêu “Chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị chi phí khấu hao đã tính vào chi phí trong kỳ và được xác định bằng tổng giá trị chi phí khấu hao đã tính vào giá vốn hàng bán, chi phí bán hàng và chi phí quản lý doanh nghiệp."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Chi phí bán hàng” trừ (-) chỉ tiêu “Chi phí quản lý doanh nghiệp” cộng (+) chỉ tiêu “Doanh thu tài chính” trừ (-) chỉ tiêu “Chi phí tài chính”."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Chi phí bán hàng” trừ (-) chỉ tiêu “Chi phí quản lý doanh nghiệp”."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh” cộng (+) chỉ tiêu “Chi phí lãi vay” trừ (-) chỉ tiêu “Lãi tiền gửi và lãi cho vay” cộng (+) chỉ tiêu “Chi phí khấu hao”."},{"k":"p","t":"- Chỉ tiêu “Tỷ lệ chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ trên tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị tỷ lệ phần trăm bằng (=) giá trị [chỉ tiêu “Chi phí lãi tiền vay” trừ (-) chỉ tiêu “Lãi tiền gửi và lãi cho vay”] chia (:) giá trị chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (17.1), (17.2), (17.3),... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số…/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Ví dụ:"},{"k":"p","t":"+ Người nộp thuế sử dụng phương pháp so sánh tỷ suất lợi nhuận thuần và áp dụng Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí để xác định lợi nhuận thuần trong kỳ tính thuế, tại Cột (2) chỉ tiêu (17.1): Ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí và kê khai mức tỷ suất tương ứng theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Người nộp thuế sử dụng phương pháp so sánh tỷ suất lợi nhuận thuần và áp dụng Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí đối với hoạt động sản xuất theo Hồ sơ xác định giá giao dịch liên kết; Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với hoạt động phân phối theo APA, tại Cột (2) chỉ tiêu (17.1) và (17.2): Ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí đối với hoạt động sản xuất tại chỉ tiêu (17.1) và kê khai tỷ suất tương ứng tại Cột (3); ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với hoạt động phân phối tại chỉ tiêu (17.2) và kê khai tỷ suất tương ứng tại Cột (4)."},{"k":"p","t":"- Trường hợp người nộp thuế thực hiện nhiều chức năng sản xuất, kinh doanh và Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết khác nhau thì kê khai Kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết riêng đối với từng chức năng sản xuất, kinh doanh."},{"k":"p","t":"2. Dành cho người nộp thuế thuộc các ngành ngân hàng, tín dụng:"},{"k":"p","t":"- Chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị của thu nhập lãi và các khoản thu nhập tương tự từ các bên liên kết không ký APA xác định theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3), theo APA tại Cột (4) và theo giá trị ghi sổ kế toán phát sinh với bên độc lập tại Cột (5)."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Chi phí lãi và các khoản chi phí tương tự”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị Chi trả lãi và các khoản chi phí tương tự tương ứng với Thu nhập lãi và các khoản thu nhập tương tự thu được từ các bên liên kết và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị Chi trả lãi và các khoản chi phí tương tự tương ứng với Thu nhập lãi và các khoản thu nhập tương tự thu được từ các bên độc lập bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Thu nhập lãi thuần”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu Thu nhập lãi và các khoản thu nhập tương tự trừ (-) chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ hoạt động dịch vụ”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Thu nhập lãi và các khoản thu nhập tương tự."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động dịch vụ”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Lãi/lỗ thuần từ hoạt động dịch vụ”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập từ hoạt động dịch vụ” trừ (-) chỉ tiêu “Chi phí hoạt động dịch vụ”."},{"k":"p","t":"- Các chỉ tiêu “Lãi/lỗ thuần từ hoạt động kinh doanh ngoại hối”, “Lãi/lỗ thuần từ mua bán chứng khoán kinh doanh”, “Lãi/lỗ thuần từ mua bán chứng khoán đầu tư”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ hoạt động khác”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động khác”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập từ hoạt động khác” trừ (-) chỉ tiêu “Chi phí hoạt động khác”."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ góp vốn, mua cổ phần”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Chi trả lãi và các khoản chi phí tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí dự phòng rủi ro tín dụng”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị chi phí dự phòng rủi ro tín dụng tương ứng với thu nhập và các khoản thu có tính chất là doanh thu tại Cột (3), (4) và (5) được trích lập dự phòng."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong hoạt động kinh doanh, người nộp thuế hạch toán, xác định riêng tương ứng với từng khoản thu có tính chất là doanh thu tại các cột (3), (4), (5) và ghi giá trị được hạch toán, xác định riêng. Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận trước thuế”: Phản ánh tổng số lợi nhuận thực hiện trước thuế của tổ chức ngân hàng, tín dụng trong kỳ tính thuế và được xác định như sau:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập lãi thuần” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động dịch vụ” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động kinh doanh ngoại hối” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ mua bán chứng khoán kinh doanh” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ mua bán chứng khoán đầu tư” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác” cộng (+) chỉ tiêu “Thu nhập từ góp vốn, mua cổ phần” trừ (-) chỉ tiêu “Chi phí hoạt động” trừ (-) chỉ tiêu “Chi phí dự phòng rủi ro tín dụng”."},{"k":"p","t":"- Chỉ tiêu: “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Tổng lợi nhuận trước thuế” trừ (-) chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (18.1), (18.2), (18.3) ... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số…/2020/NĐ-CP:"},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận áp dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"3. Dành cho người nộp thuế là các công ty chứng khoán:"},{"k":"p","t":"a) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2a Mục II Phụ lục I kèm theo Nghị định số ..../2020/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1.1.a), (1.1.b), (1.1.c), (1.2), (1.3), (1.4), (1.5), (1.6), (1.7), (1.8), (1.9), (1.10), (1.11), (2.1.a), (2.1.b), (2.1.c), (2.2), (2.3), (2.4), (2.5), (2.6), (2.7), (2.8), (2.9), (2.10), (2.11), (2.12), (3.1), (3.2), (3.3), (3.4), (4.1), (4.2), (4.3), (4.4), (4.5), (5), (6), (7), và (10):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Chỉ tiêu tại dòng (15): Người nộp thuế để trống không kê khai."},{"k":"p","t":"b) Trường hợp người nộp thuế không được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a khoản 2 Điều 19 Nghị định số .../2020/NĐ-CP, kê khai như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1.1.a), (1.1.b), (1.1.c), (1.2), (1.3), (1.4), (1.5), (1.6), (1.7), (1.8), (1.9), (1.10), (1.11), (2.1.a), (2.1.b), (2.1.c), (2.2), (2.3), (2.4), (2.5), (2.6), (2.7), (2.8), (2.9), (2.10), (2.11), (2.12), (3.1), (3.2), (3.3), (3.4), (4.1), (4.2), (4.3), (4.4), (4.5), (5), (6) và (10):"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị của thu nhập lãi và các khoản thu nhập tương tự từ các bên liên kết không ký APA xác định theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3), theo APA tại Cột (4) và theo giá trị ghi sổ kế toán phát sinh với bên độc lập tại Cột (5)."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số ..../2020/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong kỳ, người nộp thuế theo dõi hạch toán và ghi giá trị hạch toán, xác định riêng đối với chi phí từ bên liên kết thuộc phạm vi xác định giá theo Hồ sơ xác định giá giao dịch liên kết; theo APA và giao dịch với các bên độc lập tương ứng với cột (3), (4) và (5). Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh trong kỳ cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ cộng chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị chỉ tiêu “Kết quả hoạt động” cộng (+) chỉ tiêu “Tổng Chi phí lãi vay phát sinh trong kỳ” trừ (-) “Tổng lãi tiền gửi và lãi cho vay phát sinh trong kỳ” cộng (+) chỉ tiêu “Chi phí khấu hao phát sinh trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ lệ chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ trên tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị tỷ lệ phần trăm bằng (=) giá trị [chỉ tiêu “Tổng Chi phí lãi tiền vay” trừ (-) chỉ tiêu “Tổng lãi tiền gửi và lãi cho vay”] chia (:) giá trị chỉ tiêu “Lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay cộng chi phí khấu hao phát sinh trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (15.1), (15.2) (15.3), ... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại khoản 2 và 3 Điều 13, Điều 14, Điều 15 Nghị định số .../2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận áp dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Phụ lục II"},{"k":"p","t":"(Kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ)"},{"k":"p","t":"_______________"},{"k":"p","t":"DANH MỤC CÁC THÔNG TIN, TÀI LIỆU CẦN CUNG CẤP TẠI HỒ SƠ QUỐC GIA(Kèm theo Tờ khai quyết toán thuế thu nhập doanh nghiệp)"},{"k":"p","t":"Kỳ tính thuế: Từ ... đến…."},{"k":"p","t":"[01] Tên người nộp thuế"},{"k":"p","t":"[02] Mã số thuế:"},{"k":"tbl","rows":[["","","","","","","","","","","","","",""]]},{"k":"p","t":"[03] Địa chỉ: ………"},{"k":"p","t":"[04] Quận/huyện: ………………….  [05] Tỉnh/thành phố: ……………………."},{"k":"p","t":"[06] Điện thoại: ………………… [07] Fax: ……………….. [08] Email: …………………"},{"k":"p","t":"[09] Tên đại lý thuế (nếu có):"},{"k":"p","t":"[10] Mã số thuế:"},{"k":"tbl","rows":[["","","","","","","","","","","","","",""]]},{"k":"p","t":"Công ty báo cáo các thông tin, tài liệu đã chuẩn bị và lưu trữ theo quy định tại Phụ lục II, như sau:"},{"k":"tbl","rows":[["STT","Tài liệu","Đã lập và lưu","Ghi chú"],["1","Thông tin về người nộp thuế:","",""],["1.1","Thông tin cơ cấu quản lý và tổ chức, bao gồm sơ đồ tổ chức, danh sách, thông tin tóm lược các chức danh quản lý của tập đoàn mà người nộp thuế phải báo cáo trực tiếp và địa chỉ văn phòng, trụ sở chính của các chức danh này","",""],["1.2","Thông tin chi tiết về hoạt động kinh doanh, chiến lược kinh doanh của người nộp thuế, bao gồm thông tin về việc người nộp thuế có tham gia hoặc chịu tác động vào quá trình, quyết định tái cơ cấu hay chuyển nhượng vốn, chuyển nhượng tài sản của tập đoàn trong năm kê khai","",""],["1.3","Thông tin các doanh nghiệp có các sản phẩm, dịch vụ tương đồng trên thị trường trong nước và quốc tế (các đối thủ cạnh tranh chính)","",""],["2","Các giao dịch liên kết: với mỗi loại/dòng giao dịch liên kết trọng yếu mà người nộp thuế có liên quan, cung cấp các thông tin sau:","",""],["2.1","Mô tả về các giao dịch liên kết trọng yếu (ví dụ cung cấp dịch vụ sản xuất, mua hàng hóa, cung cấp dịch vụ, khoản vay, các bảo lãnh thực hiện và tài chính, nhượng quyền TSVH, v.v...) và bối cảnh mà các giao dịch này được thực hiện","",""],["2.2","Giá trị và hóa đơn các khoản thanh toán và được thanh toán trong nội bộ tập đoàn đối với mỗi loại giao dịch liên quan đến công ty con (ví dụ thanh toán và được trả đối với sản phẩm, dịch vụ, bản quyền, lãi vay, v.v...) bị Cơ quan thuế nước ngoài điều chỉnh","",""],["2.3","Xác định các bên liên kết liên quan đến các giao dịch liên kết và quan hệ giữa các bên liên kết này","",""],["2.4","Bản sao các thoả thuận, hợp đồng giao dịch liên kết","",""],["2.5","Phân tích chức năng và phân tích so sánh chi tiết đối với người nộp thuế và các bên liên kết đối với mỗi loại giao dịch liên kết, bao gồm bất kỳ thay đổi nào so với năm trước đó","",""],["2.6","Thuyết minh phương pháp xác định giá giao dịch liên kết phù hợp nhất liên quan đến các dòng giao dịch liên kết và lý do lựa chọn phương pháp xác định giá giao dịch liên kết đề xuất","",""],["2.7","Xác định bên liên kết được lựa chọn xác định giá giao dịch liên kết, và giải trình lý do lựa chọn","",""],["2.8","Tóm tắt các giả định trọng yếu khi áp dụng phương pháp xác định giá giao dịch liên kết đề xuất","",""],["2.9","Giải trình các lý do thực hiện phân tích dữ liệu nhiều năm (nếu có)","",""],["2.10","Danh mục và mô tả các đối tượng so sánh độc lập (đối tượng nội bộ và đối tượng bên ngoài) và thông tin, chỉ số tài chính cần thiết phục vụ phân tích giá chuyển nhượng, bao gồm mô tả về phương pháp tìm kiếm dữ liệu so sánh và nguồn thông tin tìm kiếm","",""],["2.11","Mô tả các khoản điều chỉnh so sánh đã thực hiện, lý do, tài liệu về kết quả điều chỉnh","",""],["2.12","Mô tả lý do và diễn giải việc áp dụng phương pháp xác định giá giao dịch liên kết đề xuất đã tuân thủ nguyên tắc giao dịch độc lập","",""],["2.13","Tóm tắt thông tin về các chỉ số, chỉ tiêu, tiêu chí tài chính định lượng và lý do, diễn giải về việc các chỉ tiêu này được sử dụng trong quá trình áp dụng phương pháp xác định giá giao dịch liên kết đề xuất","",""],["2.14","Bản sao các Thỏa thuận APA đơn phương và song phương, đa phương và các thỏa thuận khác về thuế liên quan đến các giao dịch liên kết của người nộp thuế mà Cơ quan thuế Việt Nam không phải là một bên tham gia thỏa thuận, ký kết","",""],["3","Thông tin tài chính:","",""],["3.1","Báo cáo tài chính của năm kê khai của người nộp thuế","",""],["3.2","Thông tin và kế hoạch phân bổ và cách thức sử dụng các dữ liệu tài chính khi áp dụng phương pháp xác định giá giao dịch liên kết đề xuất","",""],["3.3","Mô tả tóm tắt về các dữ liệu tài chính có liên quan trong quá trình phân tích so sánh và nguồn dữ liệu","",""],["3.4","Tóm tắt lý do và giải trình nguyên nhân, kế hoạch kinh doanh, đầu tư và chiến lược phát triển đối với các doanh nghiệp có kết quả kinh doanh thua lỗ từ 03 năm trở lên","",""]]},{"k":"p","t":"Công ty xin cam đoan tất cả thông tin đã khai tại mẫu này và các tài liệu gửi kèm là đúng và chịu trách nhiệm trước pháp luật về thông tin đã khai./."},{"k":"tbl","rows":[["NHÂN VIÊN ĐẠI LÝ THUẾ\nHọ và tên:....\nChứng chỉ hành nghề số.....","Ngày....tháng...năm....\nNGƯỜI NỘP THUẾ hoặc ĐẠI DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ(Ký, ghi rõ họ tên; chức vụ và đóng dấu (nếu có))"]]},{"k":"p","t":"Ghi chú: Những cột chỉ tiêu nào không có thông tin thì bỏ trống."},{"k":"p","t":"Phụ lục III"},{"k":"p","t":"(Kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ)"},{"k":"p","t":"______________"},{"k":"p","t":"DANH MỤC CÁC THÔNG TIN, TÀI LIỆU CẦN CUNG CẤP TẠI HỒ SƠ TOÀN CẦU"},{"k":"p","t":"(Kèm theo Tờ khai quyết toán thuế thu nhập doanh nghiệp)"},{"k":"p","t":"Kỳ tính thuế: Từ.... đến..."},{"k":"p","t":"[01] Tên người nộp thuế:"},{"k":"p","t":"[02] Mã số thuế:"},{"k":"tbl","rows":[["","","","","","","","","","","","","",""]]},{"k":"p","t":"[03] Địa chỉ:"},{"k":"p","t":"[04] Quận/huyện:[05]Tỉnh/thành phố:"},{"k":"p","t":"[06] Điện thoại: [07]Fax:[08] Email:"},{"k":"p","t":"[09] Tên đại lý thuế (nếu có):"},{"k":"p","t":"[10] Mã số thuế:"},{"k":"tbl","rows":[["","","","","","","","","","","","","",""]]},{"k":"p","t":"Công ty báo cáo các thông tin, tài liệu đã chuẩn bị và lưu trữ theo quy định tại Phụ lục III, như sau:"},{"k":"tbl","rows":[["STT","Tài liệu","Đã lập và lưu","Ghi chú"],["(1)","(2)","(3)","(4)"],["1","Cơ cấu tổ chức:","",""],["1.1","Sơ đồ minh họa cơ cấu sở hữu; cơ cấu pháp lý của tập đoàn và vị trí địa lý của các công ty con thuộc tập đoàn đang hoạt động.","",""],["2","Thông tin về hoạt động kinh doanh của tập đoàn gồm:","",""],["2.1","Các yếu tố chính và kênh quan trọng tạo lợi nhuận kinh doanh.","",""],["2.2","Mô tả về chuỗi cung ứng của 05 sản phẩm và/hoặc dịch vụ lớn nhất của tập đoàn tính theo doanh thu và bất kỳ hàng hóa và/hoặc dịch vụ nào chiếm hơn 5% doanh thu tập đoàn, bao gồm thông tin về thị trường địa lý chính của các hàng hóa, dịch vụ này. Mô tả có thể dưới hình thức sơ đồ hoặc biểu đồ","",""],["2.3","Danh sách và mô tả ngắn gọn các thỏa thuận dịch vụ trọng yếu giữa các thành viên của tập đoàn, không gồm các dịch vụ nghiên cứu phát triển (R&D), bao gồm mô tả năng lực của các trụ sở chính (cấp toàn cầu và cấp vùng) cung cấp các dịch vụ quan trọng và các chính sách giá chuyển nhượng để phân bổ chi phí dịch vụ và xác định giá phải trả cho các dịch vụ nội bộ tập đoàn. Tóm tắt và giải trình lý do chính trong trường hợp tập đoàn tiến hành hoạt động mua sắm và quảng cáo, tiếp thị thông qua các trung tâm mua sắm và trung tâm tiếp thị tập trung","",""],["2.4","Mô tả các thị trường địa lý chính của các sản phẩm của tập đoàn nêu tại mục 2.2","",""],["2.5","Mô tả bằng văn bản về phân tích chức năng đưa ra các đóng góp của trụ sở chính đối với các giá trị do các cơ sở kinh doanh bản địa trong tập đoàn tạo ra, ví dụ các chức năng trọng yếu được thực hiện, các rủi ro trọng yếu phải gánh chịu và các tài sản trọng yếu được sử dụng","",""],["2.6","Mô tả về các giao dịch tái cơ cấu kinh doanh trọng yếu, các hoạt động mua bán, sáp nhập phát sinh trong năm tài chính","",""],["3","Thông tin về tài sản vô hình (TSVH) của tập đoàn:","",""],["3.1","Mô tả tổng quan về chiến lược chung của MNE với việc phát triển, sở hữu và khai thác TSVH, bao gồm vị trí của các cơ sở nghiên cứu phát triển (R&D) trụ sở chính và vị trí của nơi quản lý R&D","",""],["3.2","Danh mục các TSVH hoặc nhóm các TSVH của tập đoàn có tác động trọng yếu đối với chính sách giá chuyển nhượng và các công ty sở hữu về mặt pháp lý đối với TSVH hoặc nhóm TSVH đó","",""],["3.3","Danh sách các thỏa thuận quan trọng giữa các bên liên kết liên quan đến TSVH, thỏa thuận đóng góp chi phí, thỏa thuận dịch vụ nghiên cứu và các thỏa thuận cấp giấy phép, nhượng quyền","",""],["3.4","Mô tả chung về các chính sách giá chuyển nhượng của tập đoàn đối với các hoạt động R&D và TSVH","",""],["3.5","Mô tả chung về bất kỳ chuyển nhượng lợi ích quan trọng đối với TSVH giữa các bên liên kết trong năm tài chính liên quan, bao gồm thông tin các công ty con, các quốc gia tham gia chuyển nhượng và các khoản thanh toán liên quan","",""],["4","Các hoạt động tài chính nội bộ tập đoàn:","",""],["4.1","Mô tả chung về cơ chế phân bổ tài chính của tập đoàn, bao gồm các thỏa thuận tài chính, thỏa thuận cấp vốn quan trọng với các bên cho vay độc lập","",""],["4.2","Thông tin xác định bất kỳ thành viên nào của tập đoàn cung cấp chức năng tài chính, vốn tập trung cho tập đoàn, bao gồm các quốc gia nơi thành lập công ty con và nơi đặt trụ sở điều hành thực tế của công ty con","",""],["4.3","Mô tả chung về chính sách giá chuyển nhượng của tập đoàn đối với các thỏa thuận tài chính, cấp vốn giữa các bên liên kết","",""],["5","Kết quả kinh doanh và nghĩa vụ thuế của tập đoàn:","",""],["5.1","Báo cáo tài chính hợp nhất năm kê khai của tập đoàn và các báo cáo, cơ chế tài chính, quản lý nội bộ phục vụ mục đích tính thuế của tập đoàn; thuế suất áp dụng xác định nghĩa vụ thuế tương ứng lợi nhuận thu được từ hoạt động sản xuất kinh doanh của các bên liên kết có giao dịch liên kết với người nộp thuế","",""],["5.2","Danh sách mô tả ngắn gọn về các thỏa thuận trước về phương pháp xác định giá tính thuế (APA) đơn phương và các chính sách thuế khác liên quan đến việc phân bổ thu nhập giữa các quốc gia","",""]]},{"k":"p","t":"Công ty xin cam đoan tất cả thông tin đã khai tại mẫu này và các tài liệu gửi kèm là đúng và chịu trách nhiệm trước pháp luật về thông tin đã khai./."},{"k":"tbl","rows":[["NHÂN VIÊN ĐẠI LÝ THUẾ\nHọ và tên: .....\nChứng chỉ hành nghề số .....","Ngày...tháng....năm...\nNGƯỜI NỘP THUẾ hoặc ĐẠI DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ(Ký, ghi rõ họ tên; chức vụ và đóng dấu (nếu có))"]]},{"k":"p","t":"Ghi chú: Những cột chỉ tiêu nào không có thông tin thì bỏ trống."},{"k":"p","t":"Phụ lục IV"},{"k":"p","t":"(Kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ)"},{"k"
