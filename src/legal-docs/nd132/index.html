,"","","","",""],["","3.","","","","","","","","","","","","","",""],["","....","","","","","","","","","","","","","",""],["","","","","","","","","","","","","","","",""]]},{"k":"p","t":"Tôi cam đoan số liệu kê khai trên là đúng và tự chịu trách nhiệm trước pháp luật về số liệu đã khai./."},{"k":"tbl","rows":[["NHÂN VIÊN ĐẠI LÝ THUẾHọ và tên: ....\nChứng chỉ hành nghề số ....","…., ngày...... tháng.....năm…..\nNGƯỜI NỘP THUẾ hoặc ĐẠI DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ\n(Ký tên, đóng dấu (ghi rõ họ tên và chức vụ))"]]},{"k":"p","t":"Ghi chú: Những cột chỉ tiêu nào không có thông tin thì bỏ trống."},{"k":"p","t":"HƯỚNG DẪN KÊ KHAI MỘT SỐ CHỈ TIÊU"},{"k":"p","t":"A. Kỳ tính thuế: Ghi thông tin tương ứng với kỳ tính thuế của Tờ khai quyết toán thuế thu nhập doanh nghiệp. Kỳ tính thuế xác định theo quy định tại Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"B. Thông tin chung của người nộp thuế: Từ chỉ tiêu [01] đến chỉ tiêu [10] ghi thông tin tương ứng với thông tin đã ghi tại Tờ khai quyết toán thuế thu nhập doanh nghiệp."},{"k":"p","t":"C. Mục I. Tổng quan về hoạt động phân bổ thu nhập, thuế và hoạt động kinh doanh theo quốc gia cư trú:"},{"k":"p","t":"Các nội dung kê theo đơn vị tiền tệ được quy đổi đơn vị tính là đồng Việt Nam theo quy định của chế độ kế toán doanh nghiệp. Trường hợp các bên liên kết thuộc tập đoàn có năm tài chính khác nhau thì báo cáo lợi nhuận lập theo số liệu, thông tin tại báo cáo của năm tài chính liền kề trước kỳ tính thuế của người nộp thuế."},{"k":"p","t":"- Chỉ tiêu “Quốc gia”: Ghi tên quốc gia, vùng lãnh thổ nơi các bên liên kết là đối tượng cư trú và nơi đặt cơ sở thường trú, cơ sở sản xuất, kinh doanh mà thông qua cơ sở này các bên liên kết tiến hành một phần hoặc toàn bộ hoạt động sản xuất, kinh doanh của người nộp thuế và các bên liên kết thuộc tập đoàn (bao gồm cả trường hợp các bên liên kết này không xác định được là đối tượng cư trú của quốc gia, vùng lãnh thổ nào)."},{"k":"p","t":"+ Trường hợp công ty mẹ tối cao và bên liên kết cư trú thuế ở nhiều nước thì phải thực hiện xác định nơi cư trú thuế theo hướng dẫn của Hiệp định thuế liên quan."},{"k":"p","t":"+ Trường hợp không có Hiệp định thuế giữa các quốc gia, vùng lãnh thổ liên quan thì ghi nước hoặc vùng lãnh thổ bên liên kết đăng ký kinh doanh hoặc ghi quốc gia hoặc vùng lãnh thổ nơi các bên liên kết có cơ sở sản xuất, kinh doanh mà thông qua cơ sở này các bên liên kết tiến hành một phần hoặc toàn bộ hoạt động sản xuất, kinh doanh tại quốc gia hoặc vùng lãnh thổ đó."},{"k":"p","t":"- Chỉ tiêu “Doanh thu”: Tổng giá trị các khoản thu có tính chất là doanh thu trong kỳ từ các bên liên kết và các bên độc lập, trừ cổ tức và lợi nhuận được chia từ các bên liên kết, gồm:"},{"k":"p","t":"+ Bên độc lập: Ghi tổng các khoản thu của các bên liên kết thuộc tập đoàn tại từng quốc gia, vùng lãnh thổ nơi cư trú thu được từ các bên độc lập."},{"k":"p","t":"+ Bên liên kết: Ghi tổng các khoản thu của các bên liên kết thuộc tập đoàn tại từng quốc gia, vùng lãnh thổ nơi cư trú thu được từ các bên liên kết khác."},{"k":"p","t":"+ Chỉ tiêu tổng doanh thu: Ghi tổng giá trị doanh thu tại cột Bên độc lập cộng (+) giá trị doanh thu tại cột Bên liên kết."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận trước thuế”: Ghi tổng lợi nhuận kế toán trước thuế của các bên liên kết của tập đoàn đa quốc gia tại quốc gia, vùng lãnh thổ nơi cư trú."},{"k":"p","t":"- Chỉ tiêu “Tổng số thuế thu nhập doanh nghiệp phải nộp”: Ghi tổng số thuế thu nhập doanh nghiệp (hoặc loại thuế có tính chất tương tự) mà các bên liên kết của tập đoàn đa quốc gia phải nộp tại quốc gia hoặc vùng lãnh thổ nơi cư trú và số thuế có tính chất tương tự thuế thu nhập doanh nghiệp (như thuế thu nhập doanh nghiệp nhà thầu) phải nộp tại các nước, vùng lãnh thổ khác nơi cư trú."},{"k":"p","t":"Tổng số thuế thu nhập doanh nghiệp phải nộp được xác định căn cứ chế độ kế toán theo cơ sở tiền mặt hoặc cơ sở dồn tích theo quy định tại nơi cư trú của bên liên kết và ghi chú phương pháp áp dụng nếu xác định theo cơ sở tiền mặt."},{"k":"p","t":"- Chỉ tiêu “Thuế thu nhập đã nộp”: Ghi tổng số thuế thu nhập đã nộp của tất cả các bên liên kết thuộc tập đoàn."},{"k":"p","t":"Trường hợp các bên liên kết đã nộp thuế thu nhập doanh nghiệp của nhà thầu nước ngoài (hoặc loại thuế có tính chất tương tự) tại nước, vùng lãnh thổ khác nơi cư trú, số thuế nhà thầu này được tính vào tổng số thuế thu nhập doanh nghiệp đã nộp."},{"k":"p","t":"- Chỉ tiêu “Vốn đăng ký”: Ghi tổng số vốn cam kết đầu tư đã được giải ngân thực tế của các bên liên kết thuộc tập đoàn đa quốc gia tại nơi cư trú."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận lũy kế”: Ghi tổng cộng dồn lợi nhuận sau thuế chưa phân phối của tất cả các bên liên kết thuộc tập đoàn tại quốc gia tại thời điểm cuối kỳ."},{"k":"p","t":"- Chỉ tiêu “Số lượng nhân viên”: Ghi tổng số người lao động bình quân của các bên liên kết sử dụng."},{"k":"p","t":"- Chỉ tiêu “Tài sản hữu hình ngoại trừ tiền và các khoản tương đương tiền mặt”: Ghi tổng giá trị tài sản của các bên liên kết, gồm: Tài sản cố định hữu hình, Tài sản cố định trước tài chính, Bất động sản đầu tư, Tài sản dở dang dài hạn."},{"k":"p","t":"D. Mục II. Danh mục các công ty con của tập đoàn theo nước, vùng lãnh thổ nơi cư trú"},{"k":"p","t":"- Chỉ tiêu “Quốc gia”: Ghi tương tự Chỉ tiêu Quốc gia tại Mục I."},{"k":"p","t":"- Chỉ tiêu “Các Công ty là đối tượng cư trú ở nước sở tại”: Ghi tên pháp nhân của các bên liên kết của công ty mẹ tối cao có nghĩa vụ kê khai thuế thu nhập doanh nghiệp (hoặc loại thuế có tính chất tương tự) theo quy định của pháp luật tại nước, vùng lãnh thổ nơi cư trú."},{"k":"p","t":"+ Trường hợp công ty mẹ tối cao hoặc các bên liên kết có cơ sở thường trú tại bên liên kết khác, ghi cơ sở thường trú tương ứng với dòng kê khai tên quốc gia là nước, vùng lãnh thổ nơi cư trú của bên liên kết."},{"k":"p","t":"- Chỉ tiêu “Quốc gia hoặc vùng lãnh thổ đăng ký kinh doanh nếu khác với quốc gia hoặc vùng lãnh thổ cư trú”: Ghi tên của quốc gia hoặc vùng lãnh thổ mà các công ty con của tập đoàn đăng ký kinh doanh khác với quốc gia hoặc vùng lãnh thổ cư trú."},{"k":"p","t":"- Chỉ tiêu “Các hoạt động kinh doanh”: Công ty mẹ tối cao xác định chức năng hoạt động kinh doanh của các bên liên kết, đánh dấu “x” vào ô tương ứng theo từng chức năng được liệt kê tại chỉ tiêu “Các hoạt động kinh doanh”. Trường hợp bên liên kết thực hiện nhiều hơn một chức năng, Công ty mẹ tối cao đánh dấu “x” vào tất cả các ô tương ứng với từng chức năng."},{"k":"p","t":"Phụ lục V"},{"k":"p","t":"(Kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ)"},{"k":"p","t":"______________"},{"k":"p","t":"CÔNG THỨC TÍNH KHOẢNG GIÁ TRỊ GIAO DỊCH ĐỘC LẬP CHUẨN"},{"k":"p","t":"Công thức tính khoảng giao dịch độc lập chuẩn và giá trị trung vị được xác định theo hàm Percentile trong Microsoft Excel như sau:"},{"k":"p","t":"1. Cách tính"},{"k":"p","t":"- Lập một vùng dữ liệu trong Excel là các ô chứa các giá trị về mức giá hoặc tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận được xác định từ các đối tượng so sánh độc lập (có thể là một cột hoặc một dòng)."},{"k":"p","t":"- Di chuyển con trỏ đến một ô khác ngoài vùng dữ liệu và thực hiện lệnh Percentile để tìm các giá trị bách phân vị tương ứng, cụ thể:"},{"k":"p","t":"Percentile (Vùng dữ liệu, tham số)"},{"k":"p","t":"- Vùng dữ liệu: Là vùng chứa các giá trị về mức giá hoặc tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận."},{"k":"p","t":"- Tham số: Nhận các giá trị tương ứng 0,35 đến 0,75."},{"k":"p","t":"+ Bách phân vị thứ 35 là giá trị của hàm Percentile với tham số bằng 0,35."},{"k":"p","t":"+ Bách phân vị thứ 50 (số trung vị) là giá trị của hàm Percentile với tham số bằng 0,5."},{"k":"p","t":"+ Bách phân vị thứ 75 là giá trị của hàm Percentile với tham số bằng 0,75."},{"k":"p","t":"+ Khoảng giá trị giao dịch độc lập chuẩn là khoảng giá trị từ bách phân vị thứ 35 đến bách phân vị thứ 75."},{"k":"p","t":"2. Ví dụ minh hoạ"},{"k":"p","t":"Trong năm 202x, doanh nghiệp A lựa chọn được các doanh nghiệp độc lập để so sánh có các số liệu về tỷ suất lợi nhuận thuần trên tài sản là: 1,0; 1,25; 1,25; 1,5; 1,5; 1,75; 2,0; 2,0; 2,15; 2,25; 2,5; 2,75; 3,0."},{"k":"p","t":"Xác định các giá trị bách phân vị của Hàm Percentile trong excel như sau:"},{"k":"tbl","rows":[["Giá trị tỷ suất tìm được","Xác định phân vị thứ 35 đến phân vị thứ 75","Giá trị trả về"],["1.00","Bách phân vị thứ 35","\"=Percentile(A5:A17,0.35)\"","1.55"],["1.25","Trung vị","\"=Percentile(A5:A17,0.5)\"","2"],["1.25","Bách phân vị thứ 75","\"=Percentile(A5:A17,0.75)\"","2.25"],["1.50","","",""],["1.50","","",""],["1.75","","",""],["2.00","","",""],["2.00","","",""],["2.15","","",""],["2.25","","",""],["2.50","","",""],["2.75","","",""],["3.00","","",""]]}]}],"forms":[{"code":"PL1","title":"THÔNG TIN VỀ QUAN HỆ LIÊN KẾT VÀ GIAO DỊCH LIÊN KẾT","pl":"Phụ lục I","note":""},{"code":"PL2","title":"DANH MỤC CÁC THÔNG TIN, TÀI LIỆU CẦN CUNG CẤP TẠI HỒ SƠ QUỐC GIA","pl":"Phụ lục II","note":""},{"code":"PL3","title":"DANH MỤC CÁC THÔNG TIN, TÀI LIỆU CẦN CUNG CẤP TẠI HỒ SƠ TOÀN CẦU","pl":"Phụ lục III","note":""},{"code":"PL4","title":"KÊ KHAI THÔNG TIN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","pl":"Phụ lục IV","note":""},{"code":"PL5","title":"CÔNG THỨC TÍNH KHOẢNG GIÁ TRỊ GIAO DỊCH ĐỘC LẬP CHUẨN","pl":"Phụ lục V","note":""}],"refs":{"nd132_1":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"expenses","label":"Luật 67/2025 — Điều 9 Chi phí được trừ (liên quan chi phí lãi vay bên liên kết)"},{"kind":"guidance","targetSlug":"nd320","targetAnchor":"nd320_9","label":"NĐ 320/2025 — Điều 9–10 Chi phí được trừ"},{"kind":"guidance","targetSlug":"nd20","targetAnchor":"nd20_1","label":"NĐ 20/2025 — Sửa đổi, bổ sung NĐ 132"}]},"details":{},"summaries":{"nd132_1":{"tldr":"Nghị định quy định nguyên tắc, phương pháp, trình tự xác định giá giao dịch liên kết, quyền và nghĩa vụ kê khai của người nộp thuế, cùng trách nhiệm của cơ quan nhà nước trong quản lý thuế đối với doanh nghiệp có giao dịch liên kết.","points":["Phạm vi điều chỉnh gồm các giao dịch mua bán, trao đổi, thuê, chuyển giao, chuyển nhượng hàng hóa, dịch vụ; vay, cho vay, dịch vụ tài chính; tài sản hữu hình, vô hình; và thỏa thuận sử dụng chung nguồn lực, chia sẻ chi phí giữa các bên liên kết.","Không áp dụng đối với giao dịch kinh doanh hàng hóa, dịch vụ thuộc phạm vi điều chỉnh giá của Nhà nước theo pháp luật về giá."]},"nd132_2":{"tldr":"Nghị định áp dụng đối với người nộp thuế thu nhập doanh nghiệp có giao dịch với bên liên kết, cơ quan thuế các cấp và các cơ quan, tổ chức, cá nhân khác có liên quan.","points":["Người nộp thuế là tổ chức sản xuất, kinh doanh hàng hóa, dịch vụ nộp thuế thu nhập doanh nghiệp có phát sinh giao dịch với bên liên kết theo Điều 5.","Cơ quan thuế gồm Tổng cục Thuế, Cục Thuế, Chi cục Thuế; ngoài ra còn có cơ quan nhà nước, tổ chức, cá nhân khác liên quan đến việc áp dụng quy định."]},"nd132_3":{"tldr":"Người nộp thuế phải loại trừ các yếu tố do quan hệ liên kết chi phối để kê khai nghĩa vụ thuế tương đương giao dịch độc lập; cơ quan thuế quản lý theo nguyên tắc giao dịch độc lập và bản chất giao dịch quyết định nghĩa vụ thuế.","points":["Người nộp thuế có giao dịch liên kết phải loại trừ các yếu tố làm giảm nghĩa vụ thuế do quan hệ liên kết chi phối, tác động.","Cơ quan thuế không công nhận giao dịch liên kết không theo nguyên tắc giao dịch độc lập làm giảm nghĩa vụ thuế và thực hiện điều chỉnh lại giá giao dịch liên kết để xác định đúng nghĩa vụ thuế."]},"nd132_4":{"tldr":"Điều này giải thích 10 thuật ngữ chuyên môn dùng trong Nghị định như Hiệp định thuế, Đối tượng so sánh độc lập, Khác biệt trọng yếu, Khoảng giá trị giao dịch độc lập và khoảng giá trị giao dịch độc lập chuẩn.","points":["\"Đối tượng so sánh độc lập\" là giao dịch hoặc doanh nghiệp độc lập được lựa chọn để so sánh, xác định mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận nhằm xác định đúng nghĩa vụ thuế.","\"Khác biệt trọng yếu\" là khác biệt về yếu tố hình thành giá có ảnh hưởng quan trọng hoặc đáng kể đến mức giá, tỷ suất lợi nhuận và tỷ lệ phân bổ lợi nhuận.","\"Khoảng giá trị giao dịch độc lập chuẩn\" là tập hợp giá trị từ bách phân vị thứ 35 đến bách phân vị thứ 75, trong đó trung vị là giá trị bách phân vị thứ 50.","\"Tổ chức thay mặt nộp báo cáo\" là tổ chức được Công ty mẹ tối cao của tập đoàn ủy quyền nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế."]},"nd132_5":{"tldr":"Điều này quy định các trường hợp xác định hai bên có quan hệ liên kết, dựa trên việc một bên trực tiếp hoặc gián tiếp tham gia điều hành, kiểm soát, góp vốn hoặc chịu sự điều hành, kiểm soát chung với bên khác.","points":["Một doanh nghiệp nắm giữ trực tiếp hoặc gián tiếp ít nhất 25% vốn góp chủ sở hữu của doanh nghiệp kia, hoặc là cổ đông lớn nhất nắm giữ ít nhất 10% cổ phần của doanh nghiệp kia.","Doanh nghiệp bảo lãnh hoặc cho vay với khoản vốn vay ít nhất bằng 25% vốn góp chủ sở hữu của bên vay và chiếm trên 50% tổng giá trị nợ trung, dài hạn của bên vay.","Doanh nghiệp chỉ định trên 50% thành viên ban lãnh đạo, hoặc một thành viên được chỉ định có quyền quyết định chính sách tài chính, kinh doanh của doanh nghiệp khác.","Hai doanh nghiệp cùng chịu sự điều hành, kiểm soát bởi các cá nhân có quan hệ gia đình (vợ chồng, cha mẹ con, anh chị em...) hoặc cùng chịu sự kiểm soát của một cá nhân.","Giao dịch chuyển nhượng vốn góp ít nhất 25%, hoặc vay/cho vay ít nhất 10% vốn góp chủ sở hữu trong kỳ tính thuế với cá nhân điều hành, kiểm soát doanh nghiệp cũng tạo thành quan hệ liên kết."]},"nd132_6":{"tldr":"Phân tích, so sánh giao dịch liên kết dựa trên nguyên tắc bản chất giao dịch quyết định nghĩa vụ thuế, đối chiếu giữa thỏa thuận pháp lý với thực tiễn thực hiện và đảm bảo tính tương đồng khi so sánh với giao dịch độc lập.","points":["Nếu không có thỏa thuận bằng văn bản hoặc thỏa thuận/thực tế thực hiện không phù hợp nguyên tắc giao dịch độc lập, giao dịch liên kết phải được xác định lại theo đúng bản chất kinh doanh giữa các bên độc lập.","Phân tích, so sánh phải đảm bảo tương đồng, không có yếu tố khác biệt ảnh hưởng trọng yếu đến mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận; nếu có phải điều chỉnh loại trừ khác biệt đó."]},"nd132_7":{"tldr":"Điều này quy định cách lựa chọn đối tượng so sánh độc lập, yêu cầu về độ tin cậy của dữ liệu tài chính và số lượng tối thiểu đối tượng so sánh cần chọn tùy mức độ khác biệt.","points":["Ưu tiên lựa chọn đối tượng so sánh độc lập nội bộ (giao dịch của chính người nộp thuế với bên không liên kết) nếu đảm bảo tương đồng.","Dữ liệu so sánh về tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận phải đảm bảo ít nhất 3 kỳ tính thuế liên tục; các giá trị tỷ suất, tỷ lệ tương đối được làm tròn đến chữ số thứ hai sau dấu thập phân.","Số lượng tối thiểu đối tượng so sánh: 1 đối tượng nếu không có khác biệt; 3 đối tượng nếu có khác biệt nhưng loại trừ được hết khác biệt trọng yếu; 5 đối tượng nếu chỉ loại trừ được hầu hết khác biệt trọng yếu."]},"nd132_8":{"tldr":"Nếu mức giá, tỷ suất lợi nhuận của người nộp thuế nằm trong khoảng giá trị giao dịch độc lập (hoặc khoảng chuẩn) của đối tượng so sánh thì không phải điều chỉnh; nếu nằm ngoài khoảng thì phải điều chỉnh theo giá trị tương đồng cao nhất, không được làm giảm nghĩa vụ thuế.","points":["Trường hợp có đủ dữ liệu loại trừ hết khác biệt trọng yếu: nếu giá trị của người nộp thuế thuộc khoảng giá trị giao dịch độc lập thì không phải điều chỉnh; nếu không thuộc khoảng thì điều chỉnh theo giá trị có mức độ tương đồng cao nhất.","Trường hợp chỉ loại trừ được hầu hết khác biệt trọng yếu: tối thiểu lựa chọn 5 đối tượng so sánh độc lập và áp dụng khoảng giá trị giao dịch độc lập chuẩn theo Phụ lục V.","Khi cơ quan thuế thực hiện điều chỉnh hoặc ấn định, giá trị điều chỉnh hoặc ấn định là giá trị trung vị của khoảng giá trị giao dịch độc lập chuẩn.","Việc điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận không được làm giảm thu nhập chịu thuế, không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước."]},"nd132_9":{"tldr":"Với giao dịch liên kết đặc thù hoặc duy nhất không tìm được đối tượng so sánh trong nước, được mở rộng phạm vi phân tích, so sánh về ngành, thị trường địa lý, thời gian, kể cả sang các nước trong khu vực có điều kiện kinh tế tương đồng.","points":["Ưu tiên lựa chọn đối tượng so sánh theo phân ngành kinh tế tương đồng nhất trong cùng địa bàn, địa phương, trong nước trước khi mở rộng sang các nước trong khu vực.","Thời gian mở rộng thu thập số liệu, dữ liệu của đối tượng so sánh độc lập không quá một năm tài chính so với năm tài chính của người nộp thuế nếu áp dụng phương pháp xác định giá tại Điều 14."]},"nd132_10":{"tldr":"Điều này quy định 4 nhóm tiêu thức dùng để phân tích, so sánh và điều chỉnh khác biệt trọng yếu khi lựa chọn đối tượng so sánh độc lập: đặc tính sản phẩm; chức năng, tài sản, rủi ro; điều kiện hợp đồng; và điều kiện kinh tế của giao dịch.","points":["Đặc tính sản phẩm gồm đặc tính hàng hóa hữu hình, dịch vụ và tài sản vô hình; việc phân tích tài sản vô hình phải xem xét toàn bộ hoạt động kiểm soát rủi ro, không chỉ căn cứ quyền sở hữu pháp lý.","Chức năng hoạt động, tài sản và rủi ro được phân tích qua các chức năng chính (nghiên cứu phát triển, sản xuất, phân phối, dịch vụ hỗ trợ...), các loại tài sản chính (vô hình, hữu hình, tài chính) và các rủi ro chính (chiến lược, tài chính, giao dịch, sản phẩm, kinh doanh).","Điều kiện hợp đồng gồm khối lượng, thời hạn, phương thức thanh toán, bảo hành, đặc quyền kinh doanh; nếu hợp đồng không phản ánh đúng thực tế thì phân tích dựa trên sự kiện thực tế và dữ liệu tài chính.","Điều kiện kinh tế gồm quy mô, vị trí địa lý thị trường, mức độ cạnh tranh, cung cầu và các yếu tố tác động đến chi phí sản xuất kinh doanh tại nơi diễn ra giao dịch.","Các khác biệt trọng yếu (định tính và định lượng) phải được rà soát, điều chỉnh tương ứng khi áp dụng các phương pháp xác định giá giao dịch liên kết quy định tại Điều 13, 14, 15."]},"nd132_11":{"tldr":"Điều này quy định trình tự 3 bước phân tích, so sánh giao dịch liên kết: xác định bản chất giao dịch, tìm kiếm lựa chọn đối tượng so sánh độc lập tương đồng, và xác định mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận làm căn cứ tính thuế.","points":["Bước 1: xác định bản chất của giao dịch liên kết trước khi tiến hành phân tích tính tương đồng với các đối tượng so sánh độc lập.","Bước 2: xác định phạm vi, yếu tố so sánh, ưu tiên rà soát đối tượng so sánh độc lập nội bộ, xây dựng tiêu chí tìm kiếm và phân tích mức độ tương đồng, tin cậy để điều chỉnh khác biệt trọng yếu.","Bước 3: xác định mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận làm căn cứ xác định nghĩa vụ thuế thu nhập doanh nghiệp, áp dụng thống nhất trong toàn bộ chu kỳ, giai đoạn sản xuất kinh doanh."]},"nd132_12":{"tldr":"Phương pháp xác định giá giao dịch liên kết được lựa chọn trong số các phương pháp quy định tại Điều 13, 14, 15, căn cứ vào đặc điểm giao dịch liên kết và dữ liệu sẵn có, áp dụng thống nhất trong toàn bộ chu kỳ sản xuất kinh doanh.","points":["Phương pháp áp dụng phải phù hợp nguyên tắc giao dịch độc lập, bản chất giao dịch và chức năng của người nộp thuế.","Việc lựa chọn căn cứ dữ liệu tài chính của đối tượng so sánh độc lập được lựa chọn theo các nguyên tắc phân tích, so sánh quy định tại Điều 6, 7, 8, 9, 10."]},"nd132_13":{"tldr":"Phương pháp so sánh giá giao dịch độc lập áp dụng cho hàng hóa, dịch vụ có điều kiện giao dịch phổ biến trên thị trường hoặc giá được công bố trên sàn giao dịch, bằng cách điều chỉnh giá giao dịch liên kết theo giá giao dịch độc lập tương đồng, không có khác biệt trọng yếu về đặc tính sản phẩm và điều kiện hợp đồng.","points":["Áp dụng cho hàng hóa, tài sản hữu hình, dịch vụ lưu thông phổ biến; phí bản quyền; lãi vay; hoặc khi người nộp thuế vừa có giao dịch độc lập vừa có giao dịch liên kết với sản phẩm tương đồng.","Giá sản phẩm trong giao dịch liên kết được điều chỉnh theo giá giao dịch độc lập hoặc giá trị thuộc khoảng giá trị giao dịch độc lập chuẩn; nếu có giá công bố trên sàn giao dịch thì lấy theo giá công bố cùng thời điểm và điều kiện tương đồng.","Mua máy móc, thiết bị từ bên liên kết ở nước ngoài phải có chứng từ chứng minh giá mua theo nguyên tắc giao dịch độc lập: máy mới lấy giá hóa đơn bên liên kết mua từ bên độc lập; máy đã qua sử dụng phải có hóa đơn, chứng từ gốc và xác định lại giá trị theo quy định về khấu hao tài sản cố định."]},"nd132_14":{"tldr":"Điều này quy định phương pháp so sánh tỷ suất lợi nhuận gộp hoặc tỷ suất lợi nhuận thuần của người nộp thuế với các đối tượng so sánh độc lập, áp dụng khi không đủ dữ liệu để dùng phương pháp so sánh giá trực tiếp, gồm ba cách: phương pháp giá bán lại, phương pháp giá vốn cộng lãi và phương pháp so sánh tỷ suất lợi nhuận thuần.","points":["Phương pháp giá bán lại áp dụng cho người nộp thuế bán lại sản phẩm mua từ bên liên kết mà không sở hữu tài sản vô hình gắn với sản phẩm; giá mua vào được xác định bằng giá bán ra trừ lợi nhuận gộp trên giá bán ra và một số chi phí khác (thuế nhập khẩu, vận chuyển, bảo hiểm...).","Phương pháp giá vốn cộng lãi áp dụng cho doanh nghiệp không sở hữu tài sản vô hình, gánh chịu ít rủi ro, sản xuất/gia công/cung cấp dịch vụ theo hợp đồng; giá bán ra cho bên liên kết bằng giá vốn cộng lợi nhuận gộp trên giá vốn.","Phương pháp so sánh tỷ suất lợi nhuận thuần áp dụng khi không có đủ thông tin cho hai phương pháp trên; tỷ suất lợi nhuận thuần (chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp) của người nộp thuế được điều chỉnh theo tỷ suất của đối tượng so sánh độc lập được chọn.","Doanh nghiệp có chức năng sản xuất, phân phối đơn giản, giá trị gia tăng thấp, không chịu rủi ro hàng tồn kho hoặc rủi ro thị trường thì không phải gánh chịu khoản lỗ phát sinh từ các rủi ro này."]},"nd132_15":{"tldr":"Phương pháp phân bổ lợi nhuận áp dụng cho giao dịch liên kết đặc thù, tích hợp, sử dụng công nghệ độc quyền hoặc giao dịch kinh tế số không có căn cứ xác định giá riêng, bằng cách phân bổ tổng lợi nhuận thực tế và tiềm năng của chuỗi giao dịch cho người nộp thuế.","points":["Áp dụng cho giao dịch liên kết đặc thù, khép kín trong tập đoàn, sản phẩm mới, công nghệ độc quyền, tài sản vô hình độc quyền, giao dịch tài chính phức tạp đa thị trường, giao dịch kinh tế số, hoặc doanh nghiệp tự chủ toàn bộ sản xuất kinh doanh không thuộc diện áp dụng Điều 13, Điều 14.","Lợi nhuận được điều chỉnh của người nộp thuế gồm lợi nhuận cơ bản (xác định theo phương pháp so sánh tỷ suất lợi nhuận tại Điều 14) cộng lợi nhuận phụ trội (phân bổ theo tỷ lệ doanh thu, chi phí, tài sản hoặc nhân lực của các bên liên kết)."]},"nd132_16":{"tldr":"Chi phí giao dịch liên kết không phù hợp bản chất giao dịch độc lập hoặc không tạo ra doanh thu, thu nhập cho người nộp thuế thì không được tính vào chi phí được trừ; Điều này cũng quy định điều kiện chi phí dịch vụ được trừ và mức khống chế chi phí lãi vay được trừ.","points":["Không được trừ chi phí thanh toán cho bên liên kết không có hoạt động sản xuất kinh doanh thực chất, quy mô tài sản/nhân sự không tương xứng với giá trị giao dịch, hoặc là đối tượng cư trú tại nước/vùng lãnh thổ không thu thuế thu nhập doanh nghiệp.","Chi phí dịch vụ được trừ nếu có giá trị thương mại, kinh tế thực, phục vụ trực tiếp hoạt động kinh doanh, được thanh toán theo nguyên tắc giao dịch độc lập và có đầy đủ hợp đồng, chứng từ, hóa đơn.","Tổng chi phí lãi vay được trừ (sau khi trừ lãi tiền gửi, lãi cho vay) không vượt quá 30% tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay cộng chi phí khấu hao trong kỳ.","Phần chi phí lãi vay không được trừ được chuyển sang kỳ tính thuế tiếp theo, liên tục không quá 5 năm; quy định khống chế không áp dụng với tổ chức tín dụng, kinh doanh bảo hiểm, vốn ODA, vay ưu đãi Chính phủ và một số khoản vay chương trình mục tiêu quốc gia, phúc lợi xã hội."]},"nd132_17":{"tldr":"Điều này quy định các nguồn cơ sở dữ liệu mà người nộp thuế và cơ quan thuế được sử dụng để kê khai, xác định, quản lý giá giao dịch liên kết, cùng thứ tự ưu tiên khi lựa chọn đối tượng so sánh độc lập.","points":["Cơ sở dữ liệu của người nộp thuế gồm cơ sở dữ liệu thương mại, dữ liệu công bố trên thị trường chứng khoán, sàn giao dịch hàng hóa, dịch vụ và thông tin công bố công khai của các bộ, ngành.","Cơ sở dữ liệu của cơ quan thuế còn bao gồm thông tin trao đổi với cơ quan thuế đối tác và cơ sở dữ liệu quản lý rủi ro của ngành thuế.","Thứ tự ưu tiên lựa chọn đối tượng so sánh: đối tượng so sánh nội bộ trước, sau đó đối tượng cùng quốc gia/lãnh thổ, cuối cùng mới đến đối tượng ở nước trong khu vực có điều kiện ngành và trình độ phát triển kinh tế tương đồng."]},"nd132_18":{"tldr":"Người nộp thuế có giao dịch liên kết phải kê khai thông tin quan hệ và giao dịch liên kết theo Phụ lục I cùng tờ khai quyết toán thuế thu nhập doanh nghiệp, đồng thời lưu giữ Hồ sơ xác định giá giao dịch liên kết (Hồ sơ quốc gia, Hồ sơ toàn cầu, Báo cáo lợi nhuận liên quốc gia) để cung cấp khi cơ quan thuế yêu cầu.","points":["Hồ sơ xác định giá giao dịch liên kết gồm 4 phần: thông tin quan hệ/giao dịch liên kết (Phụ lục I), Hồ sơ quốc gia (Phụ lục II), Hồ sơ toàn cầu (Phụ lục III) và Báo cáo lợi nhuận liên quốc gia (Phụ lục IV).","Công ty mẹ tối cao tại Việt Nam có doanh thu hợp nhất toàn cầu trong kỳ tính thuế từ 18.000 tỷ đồng trở lên phải lập Báo cáo lợi nhuận liên quốc gia, nộp chậm nhất 12 tháng sau ngày kết thúc năm tài chính.","Hồ sơ xác định giá giao dịch liên kết phải được lập trước thời điểm kê khai quyết toán thuế thu nhập doanh nghiệp hằng năm và lưu giữ để xuất trình theo yêu cầu của cơ quan thuế.","Thời hạn cung cấp Hồ sơ khi cơ quan thuế yêu cầu tham vấn trước thanh tra, kiểm tra là không quá 30 ngày làm việc kể từ khi nhận yêu cầu, có thể gia hạn 1 lần không quá 15 ngày làm việc nếu có lý do chính đáng."]},"nd132_19":{"tldr":"Điều này quy định các trường hợp người nộp thuế được miễn kê khai hoặc miễn lập Hồ sơ xác định giá giao dịch liên kết, gồm giao dịch chỉ với bên liên kết nộp thuế trong nước cùng mức thuế suất, doanh thu/giá trị giao dịch nhỏ, đã ký APA, hoặc đạt tỷ suất lợi nhuận thuần tối thiểu theo lĩnh vực.","points":["Miễn kê khai và miễn lập Hồ sơ nếu chỉ phát sinh giao dịch với bên liên kết là đối tượng nộp thuế thu nhập doanh nghiệp tại Việt Nam, cùng mức thuế suất và không bên nào được hưởng ưu đãi thuế.","Miễn lập Hồ sơ nếu tổng doanh thu của kỳ tính thuế dưới 50 tỷ đồng và tổng giá trị các giao dịch liên kết phát sinh trong kỳ dưới 30 tỷ đồng.","Miễn lập Hồ sơ nếu đã ký Thỏa thuận trước về phương pháp xác định giá tính thuế (APA) và nộp Báo cáo thường niên theo quy định.","Miễn lập Hồ sơ nếu kinh doanh với chức năng đơn giản, không phát sinh doanh thu/chi phí từ tài sản vô hình, doanh thu dưới 200 tỷ đồng, và đạt tỷ suất lợi nhuận thuần tối thiểu: phân phối từ 5%, sản xuất từ 10%, gia công từ 15% trở lên."]},"nd132_20":{"tldr":"Điều này quy định trách nhiệm, quyền hạn của cơ quan thuế trong áp dụng quản lý rủi ro, ấn định thuế, bảo mật và trao đổi thông tin với người nộp thuế cũng như cơ quan thuế đối tác khi quản lý giá giao dịch liên kết.","points":["Cơ quan thuế được ấn định doanh thu, chi phí hoặc thu nhập chịu thuế nếu người nộp thuế vi phạm pháp luật thuế nhưng vẫn thực hiện đầy đủ chế độ kế toán, hóa đơn, chứng từ.","Cơ quan thuế có quyền ấn định mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận, thu nhập chịu thuế hoặc số thuế phải nộp nếu người nộp thuế không kê khai đầy đủ, không cung cấp Hồ sơ xác định giá giao dịch liên kết hoặc sử dụng thông tin không trung thực.","Cơ quan thuế có trách nhiệm bảo mật thông tin do người nộp thuế cung cấp và thực hiện trao đổi thông tin tự động với cơ quan thuế đối tác theo cam kết quốc tế về thuế.","Trường hợp đã ký Thỏa thuận trước về phương pháp xác định giá tính thuế (APA), cơ quan thuế quản lý phần giao dịch ngoài phạm vi APA theo nguyên tắc quản lý rủi ro và kiểm tra việc tuân thủ APA đã ký."]},"nd132_21":{"tldr":"Điều này phân công trách nhiệm phối hợp cung cấp dữ liệu, thông tin của các bộ, ngành và Ủy ban nhân dân cấp tỉnh cho Bộ Tài chính, cơ quan thuế nhằm phục vụ quản lý thuế đối với doanh nghiệp có giao dịch liên kết.","points":["Bộ Tài chính chủ trì quản lý nhà nước về thuế đối với doanh nghiệp có giao dịch liên kết, tổ chức tuyên truyền và thực hiện kiểm tra, thanh tra.","Ngân hàng Nhà nước cung cấp thông tin về khoản vay, trả nợ nước ngoài; Bộ Kế hoạch và Đầu tư cung cấp dữ liệu đăng ký ngành nghề kinh doanh và cơ cấu vốn đầu tư.","Bộ Khoa học và Công nghệ, Bộ Nông nghiệp và Phát triển nông thôn cung cấp dữ liệu chuyển giao công nghệ, sở hữu trí tuệ; Bộ Thông tin và Truyền thông, Bộ Công Thương cung cấp dữ liệu doanh nghiệp và giá giao dịch hàng hóa.","Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương chỉ đạo các sở, ban, ngành xây dựng cơ sở dữ liệu chuyên ngành phục vụ công tác quản lý thuế."]},"nd132_22":{"tldr":"Nghị định có hiệu lực từ ngày 20/12/2020, áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2020, thay thế Nghị định 20/2017/NĐ-CP và Nghị định 68/2020/NĐ-CP, đồng thời quy định xử lý chuyển tiếp đối với các kỳ tính thuế trước đó.","points":["Có hiệu lực thi hành từ 20/12/2020 và áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2020; đồng thời làm hết hiệu lực Nghị định số 20/2017/NĐ-CP và Nghị định số 68/2020/NĐ-CP.","Số tiền thuế thu nhập doanh nghiệp, tiền chậm nộp năm 2017, 2018 đã nộp lớn hơn số xác định lại được bù trừ vào số thuế thu nhập doanh nghiệp từ năm 2020 đến hết năm 2024; hết thời hạn này không xử lý phần còn lại chưa bù trừ hết.","Chi phí lãi vay được chuyển sang kỳ tính thuế tiếp theo khi quyết toán thuế năm 2019 theo Nghị định số 68/2020/NĐ-CP được tiếp tục chuyển tối đa 5 năm liên tục kể từ kỳ tính thuế năm 2020, hết thời hạn phần còn lại không được chuyển tiếp."]},"nd132_23":{"tldr":"Bộ Tài chính chủ trì, phối hợp với các bộ, ngành liên quan và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương triển khai thực hiện Nghị định; các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Chủ tịch Ủy ban nhân dân cấp tỉnh và tổ chức, cá nhân liên quan chịu trách nhiệm thi hành.","points":["Bộ Tài chính chủ trì, phối hợp với các bộ, ngành liên quan và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương triển khai thực hiện Nghị định.","Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân liên quan chịu trách nhiệm thi hành Nghị định."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
