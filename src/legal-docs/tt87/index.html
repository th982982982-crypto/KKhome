c thu nhập làm căn cứ xác định người phụ thuộc mà người nộp thuế được áp dụng giảm trừ gia cảnh","shortTitle":"Mức thu nhập làm căn cứ xác định người phụ thuộc mà người nộp thuế được áp dụng giảm trừ gia cảnh","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Mức thu nhập bình quân tháng trong năm từ tất cả các nguồn thu nhập của người phụ thuộc quy định tại điểm b khoản 4 Điều 10 của Luật Thuế thu nhập cá nhân và điểm c khoản 2, điểm a và điểm b khoản 3 Điều 47 của Nghị định số 253/2026/NĐ-CP không vượt quá 03 triệu đồng."},{"k":"p","t":"Người nộp thuế chịu trách nhiệm về việc xác định người phụ thuộc không có thu nhập hoặc có thu nhập bình quân tháng trong năm từ tất cả các nguồn thu nhập không vượt quá mức quy định tại khoản 1 Điều này và có trách nhiệm kê khai đúng, trung thực thu nhập của người phụ thuộc. Trường hợp trong quá trình thực hiện, cơ quan thuế phát hiện kê khai không đúng sẽ bị xử lý theo quy định của pháp luật."}]},{"id":"tt87_4","no":4,"code":"Điều 4","title":"Điều 4. Hồ sơ xác định người phụ thuộc được giảm trừ gia cảnh quy định tại khoản 6 Điều 47 của Nghị định số 253/2026/NĐ-CP","shortTitle":"Hồ sơ xác định người phụ thuộc được giảm trừ gia cảnh quy định tại khoản 6 Điều 47 của Nghị định số 253/2026/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Hồ sơ xác định người phụ thuộc là con của người nộp thuế được quy định như sau:"},{"k":"p","t":"a) Đối với con đẻ: bản chụp Giấy khai sinh của con hoặc bản chụp Quyết định việc nhận cha, mẹ, con hoặc văn bản của cơ quan có thẩm quyền xác nhận mối quan hệ cha, mẹ với con và bản chụp thẻ Căn cước của con trong trường hợp đã được cấp Căn cước;"},{"k":"p","t":"b) Đối với con nuôi: bản chụp Giấy khai sinh của con; bản chụp thẻ Căn cước của con trong trường hợp đã được cấp Căn cước và bản chụp Quyết định công nhận/Giấy chứng nhận việc nuôi con nuôi của cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"c) Đối với con riêng của vợ hoặc con riêng của chồng: bản chụp Giấy khai sinh của con; bản chụp thẻ Căn cước của con trong trường hợp đã được cấp Căn cước và bản chụp Giấy chứng nhận kết hôn của người nộp thuế hoặc các giấy tờ khác do cơ quan có thẩm quyền cấp để chứng minh mối quan hệ với con riêng của vợ hoặc con riêng của chồng;"},{"k":"p","t":"d) Đối với con từ đủ 18 tuổi trở lên là người mất năng lực hành vi dân sự, người khuyết tật thì ngoài các hồ sơ chứng minh mối quan hệ là con tương ứng với các trường hợp quy định tại các điểm a, b và c khoản 1 Điều này, hồ sơ xác định người phụ thuộc cần có thêm bản chụp Giấy xác nhận mất năng lực hành vi dân sự theo quy định của pháp luật hoặc bản chụp Giấy xác nhận khuyết tật theo quy định của pháp luật về người khuyết tật;"},{"k":"p","t":"đ) Đối với con đang học đại học, cao đẳng, trung học chuyên nghiệp hoặc..."},{"k":"p","t":"học nghề, kể cả con từ đủ 18 tuổi trở lên đang học bậc học phổ thông (tính cả trong thời gian chờ kết quả thi từ tháng 6 đến tháng 9 năm lớp 12) thì ngoài các hồ sơ chứng minh mối quan hệ là con tương ứng với các trường hợp quy định tại các điểm a, b và c khoản 1 Điều này, hồ sơ xác định người phụ thuộc cần có thêm bản chụp thẻ sinh viên hoặc bản khai có xác nhận của nhà trường hoặc giấy tờ khác chứng minh đang học đại học, cao đẳng, trung học chuyên nghiệp, trung học phổ thông hoặc học nghề."},{"k":"p","t":"Hồ sơ xác định người phụ thuộc là vợ hoặc chồng của người nộp thuế được quy định như sau: bản chụp thẻ Căn cước và bản chụp Giấy chứng nhận kết hôn hoặc giấy tờ khác chứng minh mối quan hệ vợ chồng do cơ quan có thẩm quyền cấp."},{"k":"p","t":"Hồ sơ xác định người phụ thuộc là cha, mẹ của người nộp thuế được quy định như sau:"},{"k":"p","t":"a) Đối với cha đẻ, mẹ đẻ: bản chụp thẻ Căn cước của cha, mẹ và bản chụp Giấy khai sinh của người nộp thuế hoặc bản chụp Quyết định việc nhận cha, mẹ, con hoặc văn bản của cơ quan có thẩm quyền xác định mối quan hệ cha, mẹ với con;"},{"k":"p","t":"b) Đối với cha nuôi, mẹ nuôi: bản chụp thẻ Căn cước của cha, mẹ; bản chụp Quyết định công nhận/Giấy chứng nhận việc nuôi con nuôi của cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"c) Đối với cha vợ, mẹ vợ hoặc cha chồng, mẹ chồng: bản chụp thẻ Căn cước của cha, mẹ; bản chụp Giấy khai sinh của vợ hoặc chồng của người nộp thuế và bản chụp Giấy chứng nhận kết hôn của người nộp thuế hoặc giấy tờ khác chứng minh mối quan hệ vợ chồng do cơ quan có thẩm quyền cấp;"},{"k":"p","t":"d) Đối với cha dượng, mẹ kế: bản chụp thẻ Căn cước; bản chụp Giấy khai sinh của người nộp thuế; bản chụp Giấy chứng nhận kết hôn hoặc giấy tờ khác chứng minh mối quan hệ vợ chồng giữa cha dượng và mẹ đẻ của người nộp thuế hoặc giữa mẹ kế và cha đẻ của người nộp thuế do cơ quan có thẩm quyền cấp."},{"k":"p","t":"Hồ sơ xác định người phụ thuộc là cá nhân khác không nơi nương tựa mà người nộp thuế phải trực tiếp nuôi dưỡng: bản chụp thẻ Căn cước; Bảng kê khai về người phải trực tiếp nuôi dưỡng theo mẫu quy định của pháp luật về quản lý thuế; giấy tờ chứng minh mối quan hệ giữa người nộp thuế và người phụ thuộc và giấy tờ chứng minh người nộp thuế phải có nghĩa vụ nuôi dưỡng người phụ thuộc theo quy định của pháp luật (nếu có)."},{"k":"p","t":"Hồ sơ xác định người phụ thuộc là người không có khả năng lao động thì ngoài các hồ sơ chứng minh mối quan hệ tương ứng với các trường hợp quy định tại các khoản 1, 2, 3 và 4 Điều này, hồ sơ xác định người phụ thuộc cần có thêm giấy tờ chứng minh là người có tỷ lệ suy giảm khả năng lao động từ 81% trở lên xác định theo quy định của pháp luật."},{"k":"p","t":"Người nộp thuế thực hiện việc đăng ký, thay đổi người phụ thuộc theo quy định của pháp luật về quản lý thuế và tự chịu trách nhiệm trước pháp luật về tính chính xác của việc đăng ký, thay đổi người phụ thuộc, việc kê khai thu nhập của người phụ thuộc quy định tại khoản 1 Điều 3 Thông tư này. Trường hợp phát hiện kê khai không đúng sẽ bị xử lý theo quy định của pháp luật về quản lý thuế và pháp luật có liên quan."},{"k":"p","t":"Trường hợp cá nhân cư trú là người nước ngoài không có hồ sơ theo quy định đối với từng trường hợp cụ thể nêu trên thì phải có các tài liệu pháp lý được cơ quan có thẩm quyền cấp, đảm bảo đáp ứng điều kiện là người phụ thuộc và thể hiện mối quan hệ giữa người nộp thuế và người phụ thuộc."},{"k":"p","t":"Tổ chức, cá nhân chi trả thu nhập có trách nhiệm lưu giữ, cung cấp đầy đủ hồ sơ chứng minh người phụ thuộc để phục vụ cho công tác thanh tra, kiểm tra, kiểm toán và các trường hợp khác theo quy định của pháp luật."},{"k":"p","t":"Trên cơ sở thông tin đăng ký thuế, cơ quan thuế khai thác, sử dụng dữ liệu thông tin trong Cổng Dịch vụ công Quốc gia, hệ thống thông tin giải quyết thủ tục hành chính, cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành do cơ quan nhà nước quản lý được chia sẻ, khai thác theo quy định của pháp luật để làm căn cứ xác định người phụ thuộc được giảm trừ gia cảnh."},{"k":"p","t":"Trường hợp cơ quan thuế không thể khai thác, sử dụng được dữ liệu thông tin xác định người phụ thuộc trong Cổng Dịch vụ công Quốc gia, hệ thống thông tin giải quyết thủ tục hành chính, cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành do cơ quan nhà nước quản lý được chia sẻ, khai thác theo quy định của pháp luật thì người nộp thuế cung cấp các giấy tờ liên quan đến việc xác định người phụ thuộc quy định tại Điều này."}]},{"id":"tt87_5","no":5,"code":"Điều 5","title":"Điều 5. Thuế thu nhập cá nhân đối với chuyển nhượng chứng khoán phái sinh quy định tại khoản 5 Điều 54 của Nghị định số 253/2026/NĐ-CP","shortTitle":"Thuế thu nhập cá nhân đối với chuyển nhượng chứng khoán phái sinh quy định tại khoản 5 Điều 54 của Nghị định số 253/2026/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng chứng khoán phái sinh được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 0,1% theo từng lần chuyển nhượng."},{"k":"p","t":"Giá chuyển nhượng được xác định như sau: Đối với chuyển nhượng chứng khoán phái sinh là hợp đồng tương lai, giá chuyển nhượng là giá chuyển nhượng hợp đồng tương lai từng lần. Trong đó, giá chuyển nhượng hợp đồng tương lai từng lần được xác định bằng giá thanh toán của hợp đồng tương lai tại thời điểm xác định thu nhập tính thuế nhân (x) với hệ số nhân hợp đồng nhân (x) với số lượng hợp đồng nhân (x) với tỷ lệ ký quỹ ban đầu chia (:) cho 2. Tỷ lệ ký quỹ ban đầu do Tổng công ty Lưu ký và Bù trừ chứng khoán Việt Nam công bố theo quy định."},{"k":"p","t":"Thời điểm xác định thu nhập tính thuế:"},{"k":"p","t":"Thời điểm xác định thu nhập tính thuế đối với chứng khoán phái sinh là hợp đồng tương lai là thời điểm khớp lệnh mua, bán hợp đồng tương lai của nhà đầu tư trên hệ thống giao dịch của Sở Giao dịch chứng khoán hoặc thời điểm hợp đồng tương lai đáo hạn."}]},{"id":"tt87_6","no":6,"code":"Điều 6","title":"Điều 6. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2026. Các nội dung liên quan đến thu nhập từ kinh doanh, từ tiền lương, tiền công của cá nhân cư trú áp dụng từ kỳ tính thuế năm 2026."},{"k":"p","t":"Thông tư này thay thế Thông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện Luật Thuế thu nhập cá nhân, Luật sửa đổi, bổ sung một số điều của Luật Thuế thu nhập cá nhân và Nghị định số 65/2013/NĐ-CP của Chính phủ quy định chi tiết một số điều của Luật Thuế thu nhập cá nhân và Luật sửa đổi, bổ sung một số điều của Luật Thuế thu nhập cá nhân."},{"k":"p","t":"Bãi bỏ quy định tại:"},{"k":"p","t":"a) Điều 2 của Thông tư số 119/2014/TT-BTC ngày 25 tháng 8 năm 2014 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 156/2013/TT-BTC ngày 06 tháng 11 năm 2013, Thông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013, Thông tư số 219/2013/TT-BTC ngày 31 tháng 12 năm 2013, Thông tư số 08/2013/TT-BTC ngày 10 tháng 01 năm 2013, Thông tư số 85/2011/TT-BTC ngày 17 tháng 6 năm 2011, Thông tư số 39/2014/TT-BTC ngày 31 tháng 3 năm 2014 và Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ Tài chính để cải cách, đơn giản các thủ tục hành chính về thuế;"},{"k":"p","t":"b) Chương III của Thông tư số 151/2014/TT-BTC ngày 10 tháng 10 năm 2014 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành Nghị định số 91/2014/NĐ-CP ngày 01 tháng 10 năm 2014 của Chính phủ về việc sửa đổi, bổ sung một số điều tại các Nghị định quy định về thuế;"},{"k":"p","t":"c) Chương III của Thông tư số 92/2015/TT-BTC ngày 15 tháng 6 năm 2015 của Bộ trưởng Bộ Tài chính hướng dẫn thực hiện thuế giá trị gia tăng và thuế thu nhập cá nhân đối với cá nhân cư trú có hoạt động kinh doanh; hướng dẫn thực hiện một số nội dung sửa đổi, bổ sung về thuế thu nhập cá nhân quy định tại Luật sửa đổi, bổ sung một số điều của các Luật về thuế số 71/2014/QH13 và Nghị định số 12/2015/NĐ-CP ngày 12 tháng 02 năm 2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật về thuế và sửa đổi, bổ sung một số điều của các Nghị định về thuế;"},{"k":"p","t":"d) Điều 4 của Thông tư số 25/2018/TT-BTC ngày 16 tháng 3 năm 2018 của Bộ trưởng Bộ Tài chính hướng dẫn Nghị định số 146/2017/NĐ-CP ngày 15 tháng 12 năm 2017 của Chính phủ và sửa đổi, bổ sung một số điều của Thông tư số 78/2014/TT-BTC ngày 18 tháng 6 năm 2014 của Bộ Tài chính, Thông tư số 111/2013/TT-BTC ngày 15 tháng 8 năm 2013 của Bộ Tài chính;"},{"k":"p","t":"đ) Điều 1 của Thông tư số 79/2022/TT-BTC ngày 30 tháng 12 năm 2022 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số văn bản quy phạm pháp luật do Bộ Tài chính ban hành."},{"k":"p","t":"4. Trường hợp các văn bản quy phạm pháp luật quy định viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."}]}],"refs":{"tt87_1":[{"kind":"related","targetSlug":"nd253","targetAnchor":"nd253_1","label":"NĐ 253/2026 — Hướng dẫn chi tiết Luật Thuế TNCN (căn cứ)"},{"kind":"related","targetSlug":"luat-109","targetAnchor":"luat-109_1","label":"Luật 109/2025 — Luật Thuế TNCN (căn cứ)"}]},"details":{},"summaries":{"tt87_1":{"tldr":"Thông tư quy định 3 nội dung: mức thu nhập làm căn cứ xác định người phụ thuộc để giảm trừ gia cảnh, hồ sơ chứng minh người phụ thuộc, và thuế TNCN đối với chuyển nhượng chứng khoán phái sinh — hướng dẫn chi tiết Luật Thuế TNCN 109/2025 và Nghị định 253/2026.","points":["Mức thu nhập làm căn cứ xác định người phụ thuộc theo điểm b khoản 4 Điều 10 Luật Thuế TNCN 109/2025 và điểm c khoản 2, điểm a, b khoản 3 Điều 47 Nghị định 253/2026.","Hồ sơ xác định người phụ thuộc được giảm trừ gia cảnh theo khoản 6 Điều 47 Nghị định 253/2026.","Thuế TNCN đối với thu nhập từ chuyển nhượng chứng khoán phái sinh theo khoản 5 Điều 54 Nghị định 253/2026."]},"tt87_2":{"tldr":"Thông tư áp dụng đối với các tổ chức, cá nhân có liên quan đến phạm vi điều chỉnh quy định tại Điều 1.","points":[]},"tt87_3":{"tldr":"Người phụ thuộc được tính giảm trừ gia cảnh khi có thu nhập bình quân tháng trong năm từ tất cả các nguồn không vượt quá 3 triệu đồng; người nộp thuế tự chịu trách nhiệm kê khai đúng, trung thực.","points":["Ngưỡng thu nhập bình quân tháng của người phụ thuộc: không quá 3.000.000 đồng/tháng, tính trên tất cả các nguồn thu nhập trong năm.","Người nộp thuế chịu trách nhiệm xác định và kê khai; nếu cơ quan thuế phát hiện kê khai không đúng sẽ bị xử lý theo quy định pháp luật."]},"tt87_4":{"tldr":"Quy định chi tiết hồ sơ chứng minh từng loại người phụ thuộc (con, vợ/chồng, cha mẹ, người khác không nơi nương tựa, người không có khả năng lao động) để được giảm trừ gia cảnh; cơ quan thuế ưu tiên khai thác dữ liệu từ Cổng Dịch vụ công Quốc gia và các cơ sở dữ liệu quốc gia trước khi yêu cầu người nộp thuế nộp giấy tờ.","points":["Con đẻ/con nuôi/con riêng của vợ hoặc chồng: bản chụp giấy khai sinh (hoặc quyết định nhận con nuôi) và thẻ Căn cước nếu đã được cấp; con từ đủ 18 tuổi mất năng lực hành vi dân sự hoặc khuyết tật cần thêm giấy xác nhận tương ứng; con đang học đại học/cao đẳng/trung học/học nghề cần thêm thẻ sinh viên hoặc xác nhận của nhà trường.","Vợ hoặc chồng: bản chụp thẻ Căn cước và giấy chứng nhận kết hôn hoặc giấy tờ khác chứng minh quan hệ vợ chồng.","Cha mẹ đẻ/nuôi/cha mẹ vợ hoặc chồng/cha dượng, mẹ kế: bản chụp thẻ Căn cước và giấy tờ chứng minh quan hệ tương ứng (giấy khai sinh, quyết định nuôi con nuôi, giấy chứng nhận kết hôn...).","Cá nhân khác không nơi nương tựa mà người nộp thuế phải trực tiếp nuôi dưỡng: thẻ Căn cước, bảng kê khai người phải trực tiếp nuôi dưỡng theo mẫu quản lý thuế, và giấy tờ chứng minh quan hệ, nghĩa vụ nuôi dưỡng (nếu có).","Người không có khả năng lao động: cần thêm giấy tờ chứng minh tỷ lệ suy giảm khả năng lao động từ 81% trở lên; người nước ngoài không có hồ sơ theo mẫu Việt Nam thì dùng tài liệu pháp lý tương đương do cơ quan có thẩm quyền cấp.","Cơ quan thuế ưu tiên khai thác dữ liệu từ Cổng Dịch vụ công Quốc gia, hệ thống thông tin giải quyết thủ tục hành chính và cơ sở dữ liệu quốc gia/chuyên ngành; chỉ khi không khai thác được mới yêu cầu người nộp thuế cung cấp giấy tờ."]},"tt87_5":{"tldr":"Thuế TNCN đối với chuyển nhượng chứng khoán phái sinh (hợp đồng tương lai) tính bằng 0,1% trên giá chuyển nhượng từng lần; giá chuyển nhượng xác định theo giá thanh toán, hệ số nhân hợp đồng, số lượng hợp đồng và tỷ lệ ký quỹ ban đầu do VSDC công bố.","points":["Thuế suất: 0,1% trên giá chuyển nhượng từng lần.","Giá chuyển nhượng hợp đồng tương lai = giá thanh toán tại thời điểm xác định thu nhập tính thuế × hệ số nhân hợp đồng × số lượng hợp đồng × tỷ lệ ký quỹ ban đầu ÷ 2.","Thời điểm xác định thu nhập tính thuế: lúc khớp lệnh mua/bán trên hệ thống giao dịch của Sở Giao dịch chứng khoán, hoặc thời điểm hợp đồng tương lai đáo hạn."]},"tt87_6":{"tldr":"Thông tư có hiệu lực từ 01/7/2026 (nội dung về thu nhập từ kinh doanh, tiền lương/tiền công áp dụng từ kỳ tính thuế năm 2026); thay thế Thông tư 111/2013/TT-BTC và bãi bỏ một số điều/chương của các Thông tư hướng dẫn thuế TNCN trước đây.","points":["Hiệu lực thi hành: 01/7/2026; riêng thu nhập từ kinh doanh, tiền lương, tiền công của cá nhân cư trú áp dụng từ kỳ tính thuế năm 2026.","Thay thế Thông tư 111/2013/TT-BTC hướng dẫn Luật Thuế TNCN cũ và Nghị định 65/2013/NĐ-CP.","Bãi bỏ: Điều 2 TT 119/2014/TT-BTC, Chương III TT 151/2014/TT-BTC, Chương III TT 92/2015/TT-BTC, Điều 4 TT 25/2018/TT-BTC, Điều 1 TT 79/2022/TT-BTC.","Văn bản dẫn chiếu trong Thông tư nếu được sửa đổi, bổ sung, thay thế thì áp dụng theo văn bản mới."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
