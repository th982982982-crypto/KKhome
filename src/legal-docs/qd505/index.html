<script id="LD" type="application/json">{"meta":{"title":"Quyết định 505/QĐ-BHXH — Sửa đổi, bổ sung Quy trình thu BHXH, BHYT, BHTN","shortCode":"QĐ 505/BHXH","subtitle":"Sửa đổi Quy trình thu BHXH","slug":"qd505","effectiveDate":"27/03/2020","scope":"","description":"Sửa đổi Quy trình thu BHXH","related":[]},"outline":[{"id":"qd505_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số Điều của Quy trình thu bảo hiểm xã hội (BHXH), bảo hiểm y tế (BHYT), bảo hiểm thất nghiệp (BHTN), bảo hiểm tai nạn lao động, bệnh nghề nghiệp (BHTNLĐ, BNN); quản lý sổ BHXH, thẻ BHYT ban hành kèm theo Quyết định số 595/QĐ-BHXH ngày 14/4/2017 của Tổng Giám đốc Bảo hiểm xã hội Việt Nam như sau:","shortTitle":"Sửa đổi, bổ sung một số Điều của Quy trình thu bảo hiểm xã hội (BHXH), bảo hiểm y tế (BHYT), bảo hiểm thất nghiệp (BHTN), bảo hiểm tai nạn lao động, bệnh nghề nghiệp (BHTNLĐ, BNN); quản lý sổ BHXH, thẻ BHYT ban hành kèm theo Quyết định số 595/QĐ-BHXH ngày 14/4/2017 của Tổng Giám đốc Bảo hiểm xã hội Việt Nam như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung Điểm 2.1 Khoản 2 Điều 2 như sau:"},{"k":"p","t":"“2.1. Đơn vị: gọi chung cho cơ quan, đơn vị, doanh nghiệp, tổ chức sử dụng lao động, quản lý đối tượng tham gia BHXH bắt buộc, BHYT, BHTN, BHTNLĐ, BNN.”"},{"k":"p","t":"2. Sửa đổi, bổ sung Điểm 2.6 Khoản 2 Điều 2 như sau:"},{"k":"p","t":"“Bộ phận tiếp nhận hồ sơ: Là tên gọi chung cho Bộ phận Tiếp nhận và Trả kết quả giải quyết thủ tục hành chính theo cơ chế một cửa, một cửa liên thông của BHXH tỉnh, BHXH huyện.”"},{"k":"p","t":"3. Sửa đổi, bổ sung Điểm 2.11 Khoản 2 Điều 2 như sau:"},{"k":"p","t":"“Nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN: là số tiền chậm đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN của đơn vị, cơ quan lao động - thương binh và xã hội, cơ quan tài chính và người tham gia (bao gồm cả tiền lãi chậm đóng) theo quy định của pháp luật.”"},{"k":"p","t":"4. Sửa đổi, bổ sung Điểm 2.12 Khoản 2 Điều 2 như sau:"},{"k":"p","t":"“2.12. Xác nhận sổ BHXH: là thời gian đã đóng BHXH, BHTN, BHTNLĐ, BNN đã được hạch toán, phân bổ tiền nộp của người tham gia.”"},{"k":"p","t":"5. Bổ sung Tiết đ Điểm 1.2 Khoản 1 Điều 3 như sau:"},{"k":"p","t":"“đ) Thu tiền đóng BHXH tự nguyện; thu tiền đóng BHYT của người tham gia BHYT cư trú trên địa bàn tỉnh.”"},{"k":"p","t":"6. Sửa đổi, bổ sung Tiết a Điểm 2.1 Khoản 2 Điều 3 như sau:"},{"k":"p","t":"“a) Cấp mới, cấp lại, điều chỉnh, xác nhận sổ BHXH và ghi thời gian đóng BHTN chưa hưởng trợ cấp thất nghiệp, ghi thời gian đóng BHXH, BHTN, BHTNLĐ, BNN cho người tham gia tại đơn vị do BHXH huyện trực tiếp thu; người đang bảo lưu thời gian đóng BHXH, BHTN, BHTNLĐ, BNN ở huyện, tỉnh khác.”"},{"k":"p","t":"7. Sửa đổi, bổ sung Tiết a Điểm 2.2 Khoản 2 Điều 3 như sau:"},{"k":"p","t":"“a) Cấp mới, cấp lại, điều chỉnh, xác nhận sổ BHXH và ghi thời gian đóng BHTN chưa hưởng trợ cấp thất nghiệp, ghi thời gian đóng BHXH, BHTN, BHTNLĐ, BNN cho người tham gia tại đơn vị do BHXH tỉnh trực tiếp thu; người đã hưởng BHXH hoặc đang bảo lưu thời gian đóng BHXH, BHTN, BHTNLĐ, BNN ở huyện, tỉnh khác.”"},{"k":"p","t":"8. Sửa đổi, bổ sung Điểm 3.1 Khoản 3 Điều 3 như sau:"},{"k":"p","t":"“3.1. BHXH huyện: Cấp mới, cấp lại, đổi thẻ BHYT cho người tham gia BHYT do BHXH huyện trực tiếp thu.”"},{"k":"p","t":"9. Sửa đổi, bổ sung Khoản 2 Điều 4 như sau:"},{"k":"p","t":"“2. Người lao động là công dân nước ngoài làm việc tại Việt Nam thuộc đối tượng tham gia BHXH bắt buộc khi có giấy phép lao động hoặc chứng chỉ hành nghề hoặc giấy phép hành nghề do cơ quan có thẩm quyền của Việt Nam cấp và có HĐLĐ không xác định thời hạn, HĐLĐ xác định thời hạn từ đủ 01 năm trở lên với người sử dụng lao động tại Việt Nam. Trường hợp người lao động di chuyển trong nội bộ doanh nghiệp theo quy định tại khoản 1 Điều 3 của Nghị định số 11/2016/NĐ-CP ngày 03/02/2016 của Chính phủ quy định chi tiết thi hành một số điều của Bộ luật Lao động về lao động nước ngoài làm việc tại Việt Nam và người lao động đã đủ tuổi nghỉ hưu theo quy định tại khoản 1 Điều 187 của Bộ luật Lao động thì không thuộc đối tượng tham gia BHXH bắt buộc.”"},{"k":"p","t":"10. Sửa đổi, bổ sung Điểm 1.5 Khoản 1 Điều 5 như sau:"},{"k":"p","t":"“1.5. Người lao động quy định tại Khoản 2 Điều 4: Từ ngày 01/01/2022, người lao động hằng tháng đóng bằng 8% mức tiền lương tháng vào quỹ hưu trí và tử tuất.”"},{"k":"p","t":"11. Bổ sung Điểm 2.3 Khoản 2 Điều 5 như sau:"},{"k":"p","t":"“2.3. Đơn vị hằng tháng đóng trên quỹ tiền lương đóng BHXH của người lao động quy định tại Khoản 2 Điều 4 như sau:"},{"k":"p","t":"a) 3% vào quỹ ốm đau và thai sản;"},{"k":"p","t":"b) 14% vào quỹ hưu trí và tử tuất từ ngày 01/01/2022.”"},{"k":"p","t":"12. Sửa đổi, bổ sung Điểm 1.2 Khoản 1 Điều 6 như sau:"},{"k":"p","t":"“1.2. Người lao động quy định tại Điểm 1.6 Khoản 1 Điều 4 thì tiền lương tháng đóng BHXH là mức lương cơ sở (Việt Nam đồng).”"},{"k":"p","t":"13. Sửa đổi bổ sung Khoản 2 Điều 7 như sau:"},{"k":"p","t":"“2. Đơn vị là doanh nghiệp, hợp tác xã, hộ kinh doanh cá thể, tổ hợp tác hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả lương theo sản phẩm, theo khoán thì đăng ký phương thức đóng 03 hoặc 06 tháng một lần với cơ quan BHXH; cơ quan BHXH phối hợp với cơ quan Lao động kiểm tra tại đơn vị trước khi quyết định phương thức đóng của đơn vị. Chậm nhất đến ngày cuối cùng của phương thức đóng, đơn vị phải chuyển đủ tiền vào quỹ BHXH.”"},{"k":"p","t":"14. Sửa đổi, bổ sung điểm 1.6 Khoản 1 điều 9 như sau:"},{"k":"p","t":"“1.6. Đóng một lần cho những năm còn thiếu đối với người tham gia BHXH đã đủ điều kiện về tuổi để hưởng lương hưu theo quy định nhưng thời gian đóng BHXH còn thiếu không quá 10 năm (120 tháng) thì được đóng cho đủ 20 năm để hưởng lương hưu. Trường hợp đang tham gia BHXH bắt buộc thì đóng BHXH tự nguyện một lần cho những năm còn thiếu vào tháng đủ điều kiện về tuổi hưởng lương hưu.”"},{"k":"p","t":"15. Sửa đổi, bổ sung Điểm 3.3 Khoản 3 Điều 17 như sau:"},{"k":"p","t":"“3.3a. Người có công với cách mạng theo quy định tại Pháp lệnh Ưu đãi người có công với cách mạng."},{"k":"p","t":"3.3b. Cựu chiến binh, bao gồm:"},{"k":"p","t":"a) Cựu chiến binh tham gia kháng chiến từ ngày 30 tháng 4 năm 1975 trở về trước theo quy định tại khoản 1, 2, 3 và 4 Điều 2 Nghị định số 150/2006/NĐ-CP ngày 12/12/2006 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Pháp lệnh cựu chiến binh, được sửa đổi, bổ sung tại khoản 1 Điều 1 Nghị định số 157/2016/NĐ-CP ngày 24/11/2016 của Chính phủ sửa đổi, bổ sung Nghị định số 150/2006/NĐ-CP ngày 12/12/2006 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Pháp lệnh cựu chiến binh."},{"k":"p","t":"b) Cựu chiến binh tham gia kháng chiến sau ngày 30/4/1975 quy định tại khoản 5 Điều 2 Nghị định số 150/2006/NĐ-CP ngày 12/12/2006 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Pháp lệnh cựu chiến binh và tại khoản 1 Điều 1 Nghị định số 157/2016/NĐ-CP ngày 24/11/2016 của Chính phủ sửa đổi, bổ sung Nghị định số 150/2006/NĐ-CP của Chính phủ, gồm:"},{"k":"p","t":"- Quân nhân, công nhân viên quốc phòng đã được hưởng trợ cấp theo Quyết định số 62/2011/QĐ-TTg ngày 09/11/2011 của Thủ tướng Chính phủ về chế độ, chính sách đối với đối tượng tham gia chiến tranh bảo vệ Tổ quốc, làm nhiệm vụ quốc tế ở Căm-pu-chi-a, giúp bạn Lào sau ngày 30/4/1975 đã phục viên, xuất ngũ, thôi việc;"},{"k":"p","t":"- Sĩ quan, quân nhân chuyên nghiệp, hạ sĩ quan, chiến sĩ, công nhân viên quốc phòng trực tiếp tham gia chiến tranh bảo vệ Tổ quốc, làm nhiệm vụ quốc tế ở Căm-pu-chia, giúp bạn Lào sau ngày 30/4/1975 chuyên ngành về làm việc tại các cơ quan, tổ chức, doanh nghiệp (không được hưởng trợ cấp theo Quyết định số 62/2011/QĐ-TTg);"},{"k":"p","t":"- Sĩ quan, quân nhân chuyên nghiệp đã hoàn thành nhiệm vụ tại ngũ trong thời kỳ xây dựng và bảo vệ Tổ quốc đã phục viên, nghỉ hưu hoặc chuyển ngành về làm việc tại các cơ quan, tổ chức, doanh nghiệp;"},{"k":"p","t":"- Dân quân, tự vệ đã tham gia chiến đấu, trực tiếp phục vụ chiến đấu sau ngày 30/4/1975 đã được hưởng trợ cấp theo Quyết định số 62/2011/QĐ-TTg."},{"k":"p","t":"3.3c. Người tham gia kháng chiến và bảo vệ Tổ quốc, gồm:"},{"k":"p","t":"a) Người tham gia kháng chiến chống Mỹ cứu nước đã được hưởng trợ cấp theo một trong các văn bản sau:"},{"k":"p","t":"- Quyết định số 290/2005/QĐ-TTg ngày 01/11/2005 của Thủ tướng Chính phủ về chế độ, chính sách đối với một số đối tượng trực tiếp tham gia kháng chiến chống Mỹ chưa được hưởng chính sách của Đảng và Nhà nước;"},{"k":"p","t":"- Quyết định số 188/2007/QĐ-TTg ngày 06/12/2007 của Thủ tướng Chính phủ sửa đổi Quyết định số 290/2005/QĐ-TTg ngày 01/11/2005 của Thủ tướng Chính phủ về chế độ, chính sách đối với một số đối tượng trực tiếp tham gia kháng chiến chống Mỹ chưa được hưởng chính sách của Đảng và Nhà nước;"},{"k":"p","t":"- Quyết định số 142/2008/QĐ-TTg ngày 27/10/2008 của Thủ tướng Chính phủ về thực hiện chế độ đối với quân nhân tham gia kháng chiến chống Mỹ cứu nước có dưới 20 năm công tác trong quân đội đã phục viên, xuất ngũ về địa phương;"},{"k":"p","t":"b) Người đã được hưởng trợ cấp theo Quyết định số 62/2011/QĐ-TTg nhưng không phải là cựu chiến binh tại Điểm 3.3b Khoản 3 Điều này;"},{"k":"p","t":"c) Cán bộ, chiến sĩ Công an nhân dân tham gia kháng chiến chống Mỹ cứu nước có dưới 20 năm công tác trong Công an nhân dân đã thôi việc, xuất ngũ về địa phương đã được hưởng trợ cấp theo Quyết định số 53/2010/QĐ-TTg ngày 20/8/2010 của Thủ tướng Chính phủ về chế độ đối với cán bộ, chiến sĩ Công an nhân dân tham gia kháng chiến chống Mỹ cứu nước có dưới 20 năm công tác trong Công an nhân dân đã thôi việc, xuất ngũ về địa phương;"},{"k":"p","t":"d) Thanh niên xung phong đã được hưởng trợ cấp theo Quyết định số 170/2008/QĐ-TTg ngày 18/12/2008 của Thủ tướng Chính phủ về chế độ bảo hiểm y tế và trợ cấp mai táng phí đối với thanh niên xung phong thời kỳ kháng chiến chống Pháp, Quyết định số 40/2011/QĐ-TTg ngày 27/7/2011 của Thủ tướng Chính phủ quy định về chế độ đối với thanh niên xung phong đã hoàn thành nhiệm vụ trong kháng chiến và Nghị định số 112/2017/NĐ-CP ngày 06/10/2017 của Chính phủ quy định về chế độ, chính sách đối với thanh niên xung phong cơ sở ở miền Nam tham gia kháng chiến giai đoạn 1965 - 1975;"},{"k":"p","t":"đ) Dân công hỏa tuyến tham gia kháng chiến chống Pháp, chống Mỹ, chiến tranh bảo vệ Tổ quốc và làm nhiệm vụ quốc tế đã được hưởng trợ cấp theo Quyết định số 49/2015/QĐ-TTg ngày 14/10/2015 của Thủ tướng Chính phủ về một số chế độ, chính sách đối với dân công hỏa tuyến tham gia kháng chiến chống Pháp, chống Mỹ, chiến tranh bảo vệ Tổ quốc và làm nhiệm vụ quốc tế.”"},{"k":"p","t":"16. Sửa đổi, bổ sung Điểm 3.7 Khoản 3 Điều 17 như sau:"},{"k":"p","t":"“3.7. Người thuộc hộ gia đình nghèo theo tiêu chí về thu nhập, người thuộc hộ nghèo đa chiều có thiếu hụt về bảo hiểm y tế quy định tại Quyết định số 59/2015/QĐ-TTg ngày 19/11/2015 của Thủ tướng Chính phủ ban hành chuẩn nghèo tiếp cận đa chiều áp dụng cho giai đoạn 2016 - 2020 và các quyết định khác của cơ quan có thẩm quyền sửa đổi, bổ sung hoặc thay thế chuẩn nghèo áp dụng cho từng giai đoạn; người dân tộc thiểu số đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn; người đang sinh sống tại vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn; người đang sinh sống tại xã đảo, huyện đảo theo Nghị quyết của Chính phủ, Quyết định của Thủ tướng Chính phủ.”"},{"k":"p","t":"17. Sửa đổi, bổ sung Điểm 3.15 Khoản 3 Điều 17 như sau:"},{"k":"p","t":"“3.15. Thân nhân của sỹ quan, quân nhân chuyên nghiệp, hạ sỹ quan, binh sỹ quân đội đang tại ngũ, sỹ quan, hạ sỹ quan nghiệp vụ và sỹ quan, hạ sỹ quan chuyên môn, kỹ thuật đang công tác trong lực lượng công an nhân dân, học viên công an nhân dân, hạ sỹ quan, người làm công tác cơ yếu hưởng lương như đối với quân nhân, học viên cơ yếu được hưởng chế độ, chính sách theo chế độ, chính sách đối với học viên ở các trường quân đội, công an, gồm:"},{"k":"p","t":"a) Cha đẻ, mẹ đẻ; cha đẻ, mẹ đẻ của vợ hoặc chồng; người nuôi dưỡng hợp pháp của bản thân, của vợ hoặc của chồng;"},{"k":"p","t":"b) Vợ hoặc chồng;"},{"k":"p","t":"c) Con đẻ, con nuôi hợp pháp từ trên 6 tuổi đến dưới 18 tuổi; con đẻ, con nuôi hợp pháp từ đủ 18 tuổi trở lên nếu còn tiếp tục đi học phổ thông.”"},{"k":"p","t":"18. Bổ sung Điểm 3.16 Khoản 3 Điều 17 như sau:"},{"k":"p","t":"“3.16. Người từ đủ 80 tuổi trở lên đang hưởng trợ cấp tuất hằng tháng theo quy định của pháp luật về BHXH.”"},{"k":"p","t":"19. Bổ sung Điểm 4.1a. Khoản 4 Điều 17 như sau:"},{"k":"p","t":"“4.1a. Người thuộc hộ gia đình nghèo đa chiều không thuộc trường hợp quy định tại Điểm 3.7 Khoản 3 Điều này.”"},{"k":"p","t":"20. Bổ sung Điểm 5.3 Khoản 5 Điều 17 như sau:"},{"k":"p","t":"“5.3. Các đối tượng sau đây được tham gia BHYT theo hình thức hộ gia đình:"},{"k":"p","t":"a) Chức sắc, chức việc, nhà tu hành;"},{"k":"p","t":"b) Người sinh sống trong cơ sở bảo trợ xã hội mà không được ngân sách nhà nước hỗ trợ đóng bảo hiểm y tế.”"},{"k":"p","t":"21. Bổ sung Khoản 8 Điều 17 như sau:"},{"k":"p","t":"“8. Nhóm do người sử dụng lao động đóng"},{"k":"p","t":"8.1. Thân nhân của công nhân, viên chức quốc phòng đang phục vụ trong Quân đội."},{"k":"p","t":"8.2. Thân nhân của công nhân công an đang phục vụ trong Công an Nhân dân."},{"k":"p","t":"8.3. Thân nhân của người làm công tác khác trong tổ chức cơ yếu.”"},{"k":"p","t":"22. Sửa đổi, bổ sung Khoản 4, Khoản 7 Điều 18 như sau:"},{"k":"p","t":"“4. Đối tượng tại Điểm 2.2, 2.3, 2.5 Khoản 2 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở, do cơ quan BHXH đóng."},{"k":"p","t":"7. Đối tượng tại Điểm 3.1, 3.3a, 3.3b, 3.3c, 3.4, 3.5, 3.6, 3.7, 3.8, 3.9, 3.10, 3.12, 3.13, 3.15, 3.16 Khoản 3 Điều 17 và đối tượng người thuộc hộ gia đình cận nghèo được ngân sách nhà nước hỗ trợ 100% mức đóng tại Điểm 4.1 Khoản 4 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do ngân sách nhà nước đóng.”"},{"k":"p","t":"23. Sửa đổi, bổ sung Khoản 10 Điều 18 như sau:"},{"k":"p","t":"“10. Đối tượng tại Điểm 4.1, 4.1a Khoản 4 Điều 17: mức đóng hằng tháng bằng 4,5% mức lương cơ sở do đối tượng tự đóng và được ngân sách nhà nước hỗ trợ tối thiểu 70% mức đóng."},{"k":"p","t":"Ngân sách nhà nước hỗ trợ 100% mức đóng BHYT đối với người thuộc hộ gia đình cận nghèo đang sinh sống tại các huyện nghèo theo Nghị quyết số 30a/2008/NQ-CP ngày 27/12/2008 của Chính phủ về chương trình hỗ trợ giảm nghèo nhanh và bền vững và các huyện được áp dụng cơ chế, chính sách theo Nghị quyết số 30a/2008/NQ-CP.”"},{"k":"p","t":"24. Bổ sung Điểm d Khoản 13 Điều 18 như sau:"},{"k":"p","t":"“d) Việc giảm trừ mức đóng BHYT theo quy định tại điểm này được thực hiện khi các thành viên tham gia BHYT theo hộ gia đình cùng tham gia trong năm tài chính.”"},{"k":"p","t":"25. Bổ sung Khoản 14 Điều 18 như sau:"},{"k":"p","t":"“14. Đối tượng tại Khoản 8 Điều 17: Mức đóng hằng tháng bằng 4,5% mức lương cơ sở do người sử dụng lao động đóng BHYT từ các nguồn như sau:"},{"k":"p","t":"a) Đối với đơn vị sử dụng ngân sách nhà nước thì do ngân sách nhà nước đảm bảo;"},{"k":"p","t":"b) Đối với đơn vị sự nghiệp thì sử dụng kinh phí của đơn vị theo quy định của pháp luật về cơ chế tự chủ của đơn vị sự nghiệp công lập;"},{"k":"p","t":"c) Đối với doanh nghiệp thì sử dụng kinh phí của doanh nghiệp."},{"k":"p","t":"d) Trường hợp đối tượng tại khoản này đồng thời thuộc nhiều đối tượng tham gia BHYT khác nhau quy định tại các Khoản 1, 2, 3 và 4 Quyết định này thì đóng BHYT theo thứ tự như sau: Do người lao động và người sử dụng lao động đóng; do cơ quan BHXH đóng; do ngân sách nhà nước đóng; do người sử dụng lao động đóng.”"},{"k":"p","t":"26. Sửa đổi, bổ sung Khoản 3 Điều 19 như sau:"},{"k":"p","t":"“3.3. Đối tượng tại Điểm 3.1, 3.3b, 3.3c, 3.4, 3.5, 3.7, 3.10, 3.13, 3.15, 3.16 Khoản 3 Điều 17 và đối tượng được ngân sách nhà nước hỗ trợ 100% mức đóng tại Điểm 4.1 Khoản 4 Điều 17: hằng quý, cơ quan tài chính chuyển tiền đóng BHYT vào quỹ BHYT; chậm nhất đến ngày 15/12 hằng năm phải thực hiện xong việc chuyển kinh phí vào quỹ BHYT của năm đó."},{"k":"p","t":"Đối tượng tại Điểm 3.3a, 3.6, 3.7, 3.8, 3.9, 3.12 Khoản 3 Điều 17: hằng quý, cơ quan lao động - thương binh và xã hội chuyển tiền đóng BHYT vào quỹ BHYT; chậm nhất đến ngày 15/12 hằng năm phải thực hiện xong việc chuyển kinh phí vào quỹ BHYT của năm đó.”"},{"k":"p","t":"27. Sửa đổi, bổ sung Khoản 5 Điều 19 như sau:"},{"k":"p","t":"“5. Đối tượng tại Điểm 4.1, 4.1a, 4.3 Khoản 4 Điều 17: định kỳ 03 tháng, 06 tháng hoặc 12 tháng, đại diện hộ gia đình, cá nhân đóng phần thuộc trách nhiệm phải đóng cho Đại lý thu hoặc đóng tại cơ quan BHXH. Trường hợp không tham gia đúng thời hạn được hưởng chính sách theo quyết định phê duyệt của cấp có thẩm quyền, khi tham gia thì phải tham gia hết thời hạn còn lại theo quyết định được hưởng chính sách. Trường hợp tham gia vào các ngày trong tháng thì số tiền đóng BHYT được xác định theo tháng kể từ ngày đóng tiền BHYT.”"},{"k":"p","t":"28. Bổ sung Khoản 7a Điều 19 như sau:"},{"k":"p","t":"“7a. Đối tượng tại Khoản 6 Điều 17: hằng tháng người sử dụng lao động đóng BHYT cho đối tượng này cùng với việc đóng BHYT cho người lao động theo quy định.”"},{"k":"p","t":"29. Sửa đổi, bổ sung tên Khoản 1 Điều 21, bổ sung Điểm 1.5 Khoản 1 Điều 21 như sau:"},{"k":"p","t":"“1. Cán bộ, công chức, viên chức và người lao động làm việc theo HĐLĐ thuộc đối tượng tham gia BHTNLĐ, BNN bắt buộc, bao gồm:”"},{"k":"p","t":"“1.5. Người lao động là công dân nước ngoài làm việc tại Việt Nam thuộc đối tượng tham gia BHTNLĐ, BNN khi có giấy phép lao động hoặc chứng chỉ hành nghề hoặc giấy phép hành nghề do cơ quan có thẩm quyền của Việt Nam cấp và có HĐLĐ không xác định thời hạn, HĐLĐ xác định thời hạn từ đủ 01 năm trở lên với người sử dụng lao động tại Việt Nam.”"},{"k":"p","t":"30. Sửa đổi, bổ sung Điểm 1.2 Khoản 1 Điều 25 như sau:"},{"k":"p","t":"“1.2. Đơn vị; UBND xã; Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội; Đại lý thu/Nhà trường; Phòng/Tổ chế độ BHXH: Danh sách người chỉ tham gia BHYT (Mẫu D03-TS); Danh sách đối tượng tham gia BHYT (Mẫu số 2 ban hành kèm theo Nghị định số 146/2018/NĐ-CP ngày 17/10/2018 của Chính phủ) đối với đối tượng do Bộ Lao động - Thương binh và Xã hội quản lý.”"},{"k":"p","t":"31. Sửa đổi, bổ sung Khoản 1 Điều 27 như sau:"},{"k":"p","t":"“1. Cấp lại sổ BHXH do mất, hỏng, gộp sổ BHXH"},{"k":"p","t":"1.1. Thành phần hồ sơ:"},{"k":"p","t":"a) Cấp lại sổ BHXH do mất, hỏng: Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"b) Gộp sổ BHXH:"},{"k":"p","t":"- Tờ khai tham gia, điều chỉnh thông tin BHXH, BHYT (Mẫu TK1-TS)."},{"k":"p","t":"- Các sổ BHXH đề nghị gộp (nếu có)."},{"k":"p","t":"1.2. Số lượng hồ sơ: 01 bộ.”"},{"k":"p","t":"32. Sửa đổi, bổ sung Điểm 2.1 Khoản 2 Điều 30 như sau:"},{"k":"p","t":"“2.1. Trường hợp không thay đổi thông tin: trong ngày khi nhận đủ hồ sơ theo quy định.”"},{"k":"p","t":"33. Sửa đổi, bổ sung tên Tiết c Điểm 1.1 Khoản 1 Điều 31 như sau:"},{"k":"p","t":"“c) Các trường hợp cấp lại, gộp sổ, điều chỉnh nội dung đã ghi trên sổ BHXH, thẻ BHYT; cộng nối thời gian nhưng không phải đóng BHXH: kê khai hồ sơ theo quy định tại Điều 27 và nộp hồ sơ như sau:”"},{"k":"p","t":"34. Sửa đổi, bổ sung gạch đầu dòng (-) thứ hai Tiết c Điểm 1.1 Khoản 1 Điều 31 như sau:"},{"k":"p","t":"“- Người đang bảo lưu thời gian đóng BHXH hoặc đã được giải quyết hưởng lương hưu, trợ cấp BHXH đề nghị cấp lại, điều chỉnh nội dung trên sổ BHXH: nộp cho cơ quan BHXH trên toàn quốc.”"},{"k":"p","t":"35. Sửa đổi, bổ sung Tiết c Điểm 1.3 Khoản 1 Điều 31 như sau:"},{"k":"p","t":"“b) Thông báo, xác nhận thời gian đóng BHXH hằng năm.”"},{"k":"p","t":"36. Sửa đổi, bổ sung Tiết c Điểm 2.3 Khoản 2 Điều 31 như sau:"},{"k":"p","t":"“b) Thông báo, xác nhận thời gian đóng BHXH hằng năm.”"},{"k":"p","t":"37. Sửa đổi, bổ sung Điểm 2.1 Khoản 2 Điều 31 như sau:"},{"k":"p","t":"“2.1. Kê khai và nộp hồ sơ: Kê khai hồ sơ theo quy định tại Điều 24, Điều 27 và nộp hồ sơ cho Đại lý thu hoặc nộp cho cơ quan BHXH.”"},{"k":"p","t":"38. Sửa đổi, bổ sung Điểm 2.2 Khoản 2 Điều 31 như sau:"},{"k":"p","t":"“2.2. Đóng tiền: Đóng tiền cho Đại lý thu hoặc cho cơ quan BHXH theo phương thức đăng ký hoặc qua ngân hàng hoặc hệ thống tiện ích thông minh theo phương thức đăng ký.”"},{"k":"p","t":"39. Sửa đổi, bổ sung Điểm 3.1 Khoản 3 Điều 31 như sau:"},{"k":"p","t":"“3.1. Kê khai hồ sơ: kê khai hồ sơ theo quy định tại Điều 25, Khoản 4 Điều 27 và nộp hồ sơ như sau:”"},{"k":"p","t":"40. Sửa đổi, bổ sung gạch đầu dòng (-) thứ nhất Điểm 3.2 Khoản 3 Điều 31 như sau:"},{"k":"p","t":"“- Người tham gia BHYT theo hộ gia đình, người được ngân sách hỗ trợ một phần mức đóng BHYT: Đóng tiền cho Đại lý thu hoặc cho cơ quan BHXH theo phương thức đăng ký hoặc qua ngân hàng hoặc hệ thống tiện ích thông minh.”"},{"k":"p","t":"41. Sửa đổi, bổ sung tên Điều 32, tên Khoản 1 Điều 32 như sau:"},{"k":"p","t":"“Điều 32. Đơn vị, cơ quan lao động - thương binh và xã hội, UBND xã, Đại lý thu/nhà trường, Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội, Phòng/Tổ chế độ BHXH"},{"k":"p","t":"“1. Đơn vị”"},{"k":"p","t":"42. Sửa đổi, bổ sung gạch đầu dòng (-) thứ hai Tiết c Điểm 1.2 Khoản 1 Điều 32 như sau:"},{"k":"p","t":"“- Đối với người tham gia chưa được cấp hoặc quên mã số BHXH: phối hợp cơ quan BHXH nơi đăng ký đóng để hoàn thiện, xác định mã số BHXH.”"},{"k":"p","t":"43. Sửa đổi, bổ sung Điểm 1.3 Khoản 1 Điều 32 như sau:"},{"k":"p","t":"“1.3. Nộp hồ sơ: nộp hồ sơ cho cơ quan BHXH thông qua dịch vụ bưu chính công ích.”"},{"k":"p","t":"44. Sửa đổi, bổ sung Tiết a Điểm 1.5 Khoản 1 Điều 32 như sau:"},{"k":"p","t":"“a) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C12-TS) hằng tháng qua dịch vụ bưu chính công ích để kiểm tra, đối chiếu, nếu có sai lệch, phối hợp với cơ quan BHXH để giải quyết.”"},{"k":"p","t":"45. Sửa đổi, bổ sung Tiết c Điểm 1.5 Khoản 1 Điều 32 như sau:"},{"k":"p","t":"“c) Phối hợp với cơ quan BHXH/đơn vị dịch vụ bưu chính công ích trả trực tiếp sổ BHXH cho người tham gia, nhận thẻ BHYT trả cho người tham gia.”"},{"k":"p","t":"46. Bổ sung Tiết c Điểm 2.2 Khoản 2 Điều 32 như sau:"},{"k":"p","t":"“c) Giấy thanh toán thù lao cho tổ chức làm đại lý (Mẫu C66-HD ban hành kèm theo Thông tư số 102/2018/TT-BTC ngày 14/11/2018 của Bộ Tài chính).”"},{"k":"p","t":"47. Sửa đổi, bổ sung Điểm 2.3 Khoản 2 Điều 32 như sau:"},{"k":"p","t":"“2.3. Nộp hồ sơ: nộp hồ sơ cho cơ quan BHXH hoặc thông qua dịch vụ bưu chính công ích.”"},{"k":"p","t":"48. Sửa đổi, bổ sung Tiết a Điểm 2.5 Khoản 2 Điều 32 như sau:"},{"k":"p","t":"“a) Thẻ BHYT để trả cho người tham gia; phối hợp với cơ quan BHXH/đơn vị dịch vụ bưu chính công ích trả sổ BHXH cho người tham gia.”"},{"k":"p","t":"49. Bổ sung Tiết c Điểm 2.5 Khoản 2 Điều 32 như sau:"},{"k":"p","t":"“c) Nhận thù lao theo quy định.”"},{"k":"p","t":"50. Sửa đổi, bổ sung Điểm 3.1 Khoản 3 Điều 32 như sau:"},{"k":"p","t":"“3.1. Nhận hồ sơ"},{"k":"p","t":"Hồ sơ của người tham gia theo quy định.”"},{"k":"p","t":"51. Sửa đổi, bổ sung Tiết a Điểm 3.2 Khoản 3 Điều 32 như sau:"},{"k":"p","t":"“a) Kê khai hồ sơ: theo quy định tại Điều 25, Khoản 4 Điều 27. Trường hợp đã kết nối liên thông dữ liệu đăng ký khai sinh của trẻ em dưới 6 tuổi trên Hệ thống thông tin đăng ký và quản lý hộ tịch của Bộ Tư pháp, không thực hiện lập Danh sách cấp thẻ BHYT (Mẫu D03-TS).”"},{"k":"p","t":"52. Sửa đổi, bổ sung Điểm 3.3 Khoản 3 Điều 32 như sau:"},{"k":"p","t":"“3.3. Nộp hồ sơ:"},{"k":"p","t":"a) Nộp hồ sơ cho cơ quan lao động - thương binh và xã hội các đối tượng tại Điểm 3.3a, 3.3b, 3.3c, 3.5, 3.6, 3.7, 3.8, 3.9, 3.12, 3.16 Khoản 3; Điểm 4.1, 4.1a, 4.3 Khoản 4 Điều 17 và các đối tượng khác (nếu có) theo phân cấp."},{"k":"p","t":"b) Nộp hồ sơ cho cơ quan BHXH các đối tượng còn lại thông qua dịch vụ bưu chính công ích.”"},{"k":"p","t":"53. Sửa đổi, bổ sung Tiết a Điểm 3.4 Khoản 3 Điều 32 như sau:"},{"k":"p","t":"“a) Danh sách cấp thẻ BHYT (Mẫu D10a-TS), thẻ BHYT để trả cho người tham gia.”"},{"k":"p","t":"54. Bổ sung Tiết c Điểm 3.4 Khoản 3 Điều 32 như sau:"},{"k":"p","t":"“c) Nhận kinh phí hỗ trợ lập danh sách người tham gia BHYT.”"},{"k":"p","t":"55. Sửa đổi, bổ sung Khoản 4, Khoản 5, Khoản 6 Điều 32 như sau:"},{"k":"p","t":"“4. Cơ quan lao động - thương binh và xã hội"},{"k":"p","t":"4.1. Nhận Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) do UBND xã gửi đến, phối hợp với cơ quan BHXH đối chiếu, xác nhận, gửi cơ quan BHXH tính số tiền thu và cấp thẻ BHYT."},{"k":"p","t":"4.2. Hằng quý"},{"k":"p","t":"a) Nhận Mẫu C12-TS quý các đối tượng quản lý qua dịch vụ bưu chính công ích để kiểm tra, đối chiếu, chuyển kinh phí hoặc đề nghị cơ quan tài chính chuyển kinh phí vào quỹ BHYT theo quy định."},{"k":"p","t":"b) Danh sách cấp thẻ BHYT (Mẫu D10a-TS) các đối tượng quản lý để theo dõi, quản lý."},{"k":"p","t":"5. Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội"},{"k":"p","t":"5.1. Nhận hồ sơ của người tham gia theo quy định."},{"k":"p","t":"5.2. Kê khai hồ sơ"},{"k":"p","t":"a) Kê khai hồ sơ: theo quy định tại Điều 25, Khoản 4 Điều 27."},{"k":"p","t":"b) Ghi mã số BHXH: Tương tự như Tiết c Điểm 1.2 Khoản 1 Điều này."},{"k":"p","t":"5.3. Nộp hồ sơ: Nộp hồ sơ cho cơ quan BHXH thông qua dịch vụ bưu chính công ích."},{"k":"p","t":"5.4. Đóng tiền: Tổng hợp, chuyển kinh phí hoặc đề nghị cơ quan lao động - thương binh và xã hội hoặc cơ quan tài chính chuyển kinh phí vào quỹ BHYT theo quy định."},{"k":"p","t":"5.5. Nhận kết quả: Danh sách cấp thẻ BHYT (Mẫu D10a-TS), thẻ BHYT để trả cho người tham gia."},{"k":"p","t":"6. Phòng/Tổ chế độ BHXH"},{"k":"p","t":"6.1. Nhận hồ sơ của người tham gia theo quy định."},{"k":"p","t":"6.2. Kê khai hồ sơ"},{"k":"p","t":"a) Lập Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) đối với người tham gia BHYT do tổ chức BHXH đóng (kể cả đối tượng đang chờ ban hành quyết định hưởng hưu trí)."},{"k":"p","t":"b) Lập danh sách và hồ sơ người lao động giải quyết BHXH một lần còn thời gian BHTN chưa hưởng; người tham gia hưởng, dừng, hủy hưởng trợ cấp thất nghiệp gửi Phòng/Tổ quản lý thu để đối chiếu và xác nhận lại dữ liệu tổng thời gian đóng BHTN chưa hưởng trên cơ sở dữ liệu thu toàn quốc."},{"k":"p","t":"c) Hồ sơ đề nghị điều chỉnh thu BHXH, BHTN để giải quyết hưởng các chế độ BHXH, BHTN."},{"k":"p","t":"6.3. Nộp hồ sơ: Nộp hồ sơ cho Bộ phận tiếp nhận hồ sơ.”"},{"k":"p","t":"56. Sửa đổi, bổ sung Điều 33 như sau:"},{"k":"p","t":"“Điều 33a. Xử lý hồ sơ và cấp mã số BHXH"},{"k":"p","t":"1. Bộ phận tiếp nhận hồ sơ"},{"k":"p","t":"1.1. Nhận hồ sơ của người tham gia, đơn vị, Cơ sở trợ giúp xã hội, Cơ sở nuôi dưỡng, điều dưỡng thương binh và người có công; Cơ sở giáo dục nghề nghiệp thuộc ngành lao động, thương binh và xã hội, UBND xã, Đại lý thu/nhà trường do đơn vị dịch vụ bưu chính công ích, Phòng/Tổ chế độ BHXH chuyển đến; kể cả hồ sơ nhận qua Cổng dịch vụ công quốc gia, Cổng dịch vụ công của BHXH Việt Nam hoặc qua Hệ thống các phần mềm giao dịch điện tử của BHXH Việt Nam; kiểm tra, đối chiếu, kiểm đếm số lượng, các chỉ tiêu trên mẫu biểu theo quy định với dữ liệu quản lý."},{"k":"p","t":"a) Trường hợp dữ liệu quản lý và hồ sơ chưa đúng, đủ: Lập Phiếu Yêu cầu bổ sung, hoàn thiện hồ sơ (Mẫu số 02) hoặc Phiếu Từ chối tiếp nhận giải quyết hồ sơ (Mẫu số 03) ban hành kèm theo Quyết định số 2192/QĐ-BHXH ngày 10/12/2019 của BHXH ban hành Quy chế tổ chức và hoạt động của Bộ phận Tiếp nhận và Trả kết quả giải quyết thủ tục hành chính theo cơ chế một cửa, một cửa liên thông trong ngành BHXH."},{"k":"p","t":"b) Trường hợp dữ liệu quản lý và hồ sơ đúng, đủ: Viết giấy hẹn (Mẫu số 01 ban hành kèm theo Quyết định số 2192/QĐ-BHXH)."},{"k":"p","t":"c) Đối với người tham gia nộp hồ sơ tại cơ quan BHXH:"},{"k":"p","t":"- Hướng dẫn người tham gia lập hồ sơ quy định tại Điều 23, 24, 25, 27. Đối với các trường hợp có hồ sơ kèm theo thì sao và xác nhận, trả bản chính."},{"k":"p","t":"- Hướng dẫn người tham gia nộp tiền theo quy định."},{"k":"p","t":"- Viết giấy hẹn (Mẫu số 01) ban hành kèm theo Quyết định số 2192/QĐ-BHXH."},{"k":"p","t":"1.2. Chuyển hồ sơ, dữ liệu cho Phòng/Tổ cấp sổ, thẻ."},{"k":"p","t":"Trường hợp đã kết nối liên thông dữ liệu đăng ký khai sinh của trẻ em dưới 6 tuổi trên Hệ thống thông tin đăng ký và quản lý hộ tịch của Bộ Tư pháp: Phần mềm tiếp nhận và quản lý hồ sơ tự động lập Danh sách cấp thẻ BHYT (Mẫu D03-TS) chuyển Phòng/Tổ cấp sổ, thẻ."},{"k":"p","t":"1.3. Nhận từ Phòng/Tổ cấp sổ, thẻ, Phòng/Tổ quản lý thu kết quả giải quyết thủ tục hành chính của đơn vị, người tham gia (sổ BHXH, thẻ BHYT), hồ sơ của đơn vị, người tham gia, hồ sơ xác định số phải thu, cấp sổ BHXH, thẻ BHYT của cơ quan BHXH."},{"k":"p","t":"a) Trả sổ BHXH cho người tham gia, thẻ BHYT cho đơn vị để trả cho người tham gia thông qua dịch vụ bưu chính công ích."},{"k":"p","t":"b) Lưu trữ hồ sơ theo quy định."},{"k":"p","t":"2. Phòng/Tổ cấp sổ, thẻ"},{"k":"p","t":"2.1. Nhận hồ sơ, dữ liệu giao dịch điện tử do Bộ phận tiếp nhận hồ sơ, Phòng/Tổ quản lý thu, Phòng/Tổ chế độ BHXH chuyển đến; kiểm tra, đối chiếu đúng đủ các chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu quản lý ."},{"k":"p","t":"a) Đối với hồ sơ cộng nối thời gian nhưng không phải đóng BHXH; điều chỉnh chức danh làm nghề hoặc công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm trước năm 1995; gộp sổ BHXH: phối hợp với các phòng liên quan thẩm định, lập Phiếu đề nghị cập nhật thời gian công tác không phải đóng BHXH (Mẫu C09-TS), Danh sách đề nghị gộp sổ BHXH (Mẫu C18-TS) trình Lãnh đạo phê duyệt; scan hồ sơ có ý kiến phê duyệt của Lãnh đạo BHXH tỉnh vào phần mềm quản lý thu."},{"k":"p","t":"b) Phân loại và chuyển hồ sơ"},{"k":"p","t":"- Chuyển ngay Phòng/Tổ quản lý thu hồ sơ của đơn vị, người tham gia có đủ mã số BHXH."},{"k":"p","t":"- Đối với hồ sơ có từ 01 người tham gia trở lên chưa có mã số BHXH:  Hoàn thiện mã số BHXH cho người tham gia theo quy định cơ sở dữ liệu hộ gia đình, ghi mã số BHXH vào cột mã số BHXH trên Mẫu D02-TS, D03-TS, D05-TS, chuyển cho Phòng/Tổ quản lý thu."},{"k":"p","t":"- Trường hợp đơn vị, người tham gia nộp hồ sơ phát sinh của tháng sau vào ngày cuối tháng trước, đảm bảo thẻ BHYT có giá trị sử dụng ngày mùng một tháng phát sinh."},{"k":"p","t":"2.2. Căn cứ tình hình thực tế từng địa phương, Giám đốc BHXH tỉnh giao thời hạn xử lý hồ sơ giữa các bộ phận nghiệp vụ, đảm bảo thời gian hoàn thiện mã số BHXH, cập nhật dữ liệu thu, cấp sổ BHXH, thẻ BHYT cho người tham gia không quá 02 ngày."},{"k":"p","t":"Điều 33b. Ghi dữ liệu, quản lý dữ liệu thu"},{"k":"p","t":"1. Phân bổ số phải thu"},{"k":"p","t":"1.1. Cán bộ thu"},{"k":"p","t":"Nhận hồ sơ và dữ liệu do Phòng/Tổ cấp sổ, thẻ; kiểm tra, đối chiếu chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu đang quản lý:"},{"k":"p","t":"a) Trường hợp dữ liệu và hồ sơ chưa khớp đúng: Lập Phiếu Yêu cầu bổ sung, hoàn thiện hồ sơ (Mẫu số 02)."},{"k":"p","t":"b) Trường hợp dữ liệu quản lý và hồ sơ khớp đúng: Cập nhật hồ sơ, dữ liệu vào phần mềm quản lý thu:"},{"k":"p","t":"- Hồ sơ tại Tiết a Điểm 2.1 Khoản 2 Điều 33a: Kiểm tra, đối chiếu Mẫu C09-TS, Mẫu C18-TS với hồ sơ scan trên phần mềm quản lý thu; trường hợp khớp đúng, cập nhật vào cơ sở dữ liệu thu."},{"k":"p","t":"- Đối với dữ liệu phát sinh theo đợt, cập nhật dữ liệu vào phần mềm quản lý thu, ghi quá trình đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN vào từng quỹ tương ứng để tính số tiền phải đóng, thời gian tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN, ghi giá trị sử dụng của thẻ BHYT của từng người tham gia; xác định số tiền chi thù lao cho tổ chức làm đại lý thu BHXH, BHYT."},{"k":"p","t":"Đối với người lao động chuyển đơn vị, thực hiện chuyển dữ liệu đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN từ đơn vị cũ về đơn vị mới để quản lý, theo dõi (đảm bảo mỗi người tham gia chỉ có một dữ liệu đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN duy nhất để theo dõi quá trình đóng kể từ khi tham gia)."},{"k":"p","t":"Trước 17 giờ hằng ngày, chốt dữ liệu đơn vị phát sinh trong ngày, tổng hợp số phải thu BHXH, BHYT, BHTN, BHTNLĐ, BNN của từng người tham gia (Mẫu C69a-HD)."},{"k":"p","t":"- Trước 8 giờ 30 phút hằng ngày, ký Mẫu C69a-HD của ngày hôm trước liền kề đối với các đơn vị được giao phụ trách, lưu trữ trên phần mềm quản lý thu."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu C69a-HD, phần mềm quản lý thu tự động khóa dữ liệu."},{"k":"p","t":"1.2. Giám đốc BHXH huyện, Trưởng phòng quản lý thu:"},{"k":"p","t":"Trước 8 giờ 45 phút hằng ngày:"},{"k":"p","t":"+ Tổng hợp số phải thu BHXH, BHYT, BHTN, BHTNLĐ, BNN của từng đơn vị ngày hôm trước liền kề (Mẫu C69b-HD) theo từng cán bộ thu; ký, lưu trữ trên phần mềm quản lý thu."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu C69b-HD, phần mềm quản lý thu tự động khóa dữ liệu."},{"k":"p","t":"1.3. Giám đốc BHXH tỉnh: Trước 9 giờ hằng ngày, tổng hợp số phải thu BHXH, BHYT, BHTN, BHTNLĐ, BNN toàn tỉnh (Mẫu C69c-HD), tổng hợp trích thù lao cho tổ chức làm đại lý thu BHXH, BHYT (Mẫu số D11c-TS); ký, lưu trên phần mềm quản lý thu."},{"k":"p","t":"+ Sau 05 phút không thực hiện ký Mẫu C69c-HD, Mẫu số D11c-TS, phần mềm quản lý thu tự động khóa dữ liệu."},{"k":"p","t":"1.4. Trưởng ban Thu"},{"k":"p","t":"Trước 9 giờ 30 phút hằng ngày, tổng hợp mẫu C69d-HD, Mẫu C83d-HD, Mẫu D11d-TS, Mẫu D12d-TS toàn quốc từ phần mềm quản lý thu; ký, báo cáo Lãnh đạo Ngành, lưu trên phần mềm quản lý thu, tự động đối chiếu với phần mềm kế toán."},{"k":"p","t":"2. Phân bổ số tiền đã thu"},{"k":"p","t":"2.1. Cán bộ KH-TC"},{"k":"p","t":"a) Căn cứ chứng từ nộp tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN hằng ngày của đơn vị, cơ quan lao động - thương binh và xã hội, cơ quan tài chính, người tham gia (bao gồm cả ghi thu số tiền đóng BHYT của đối tượng tham gia BHYT do ngân sách Trung ương và quỹ BHXH, BHTN đảm bảo); phân bổ ngay số tiền đã thu BHXH, BHYT, BHTN, BHTNLĐ, BNN và lãi chậm đóng cho từng người tham gia (Mẫu C83a-HD) theo thứ tự như sau: ."},{"k":"p","t":"- Phân bổ tiền cho người lao động đủ điều kiện hưởng BHXH hoặc chấm dứt HĐLĐ, HĐLV (bao gồm tiền đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN và tiền lãi chậm đóng) để kịp thời giải quyết chế độ BHXH, BHTN, BHTNLĐ, BNN cho người lao động theo quy định của pháp luật (nếu có);"},{"k":"p","t":"- Số tiền còn lại, hạch toán thu theo thứ tự:"},{"k":"p","t":"+ Thu đủ số tiền phải đóng vào quỹ BHYT và tiền lãi phạt chậm đóng, trốn đóng BHYT (nếu có);"},{"k":"p","t":"+ Thu đủ số tiền phải đóng vào quỹ BHTN và tiền lãi phạt chậm đóng, trốn đóng BHTN (nếu có);"},{"k":"p","t":"+ Thu đủ số tiền phải đóng vào quỹ BHTNLĐ, BNN và tiền lãi phạt chậm đóng, trốn đóng BHTNLĐ, BNN (nếu có);"},{"k":"p","t":"+ Thu tiền đóng vào quỹ BHXH (ốm đau, thai sản, hưu trí và tử tuất) và tiền lãi phạt chậm đóng, trốn đóng BHXH (nếu có)."},{"k":"p","t":"+ Trường hợp số tiền đóng không đủ phân bổ vào các quỹ nêu trên, thực hiện phân bổ đều theo tỷ trọng số phải thu tại Mẫu C69a-HD."},{"k":"p","t":"- Trước 17 giờ hằng ngày, chốt dữ liệu phân bổ số tiền đã thu đơn vị phát sinh trong ngày. Trường hợp chứng từ phát sinh sau 17 giờ, phần mềm tự động phân bổ đến 23 giờ 59 phút."},{"k":"p","t":"b) Trước 8 giờ 30 phút hằng ngày:"},{"k":"p","t":"- Tổng hợp, ký Mẫu C83a-HD của ngày hôm trước liền kề."},{"k":"p","t":"- Chốt dữ liệu Bảng tổng hợp số tiền chi cho tổ chức làm đại lý thu (Mẫu số D12b-TS) của ngày hôm trước liền kề."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu C83a-HD, phần mềm kế toán tự động khóa dữ liệu."},{"k":"p","t":"2.2. Trưởng phòng KHTC/Giám đốc BHXH huyện: Trước 8 giờ 45 hằng ngày, ký Bảng tổng hợp phân bổ số tiền đã thu BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C83b-HD), Mẫu D12b-TS của ngày hôm trước liền kề, lưu trữ trên phần mềm kế toán."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu C83b-HD, Mẫu D12b-TS, phần mềm kế toán tự động khóa dữ liệu."},{"k":"p","t":"2.3. Giám đốc BHXH tỉnh: Trước 9 giờ hằng ngày, ký Bảng tổng hợp phân bổ số tiền đã thu BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C83c-HD), Bảng tổng hợp số tiền chi cho tổ chức làm đại lý thu (Mẫu D12c-TS), lưu trữ trên phần mềm kế toán."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu C83c-HD, Mẫu D12c-TS, phần mềm kế toán tự động khóa dữ liệu."},{"k":"p","t":"2.4. Lưu trữ hồ sơ, chứng từ theo quy định."},{"k":"p","t":"3. Vụ Trưởng Vụ Tài chính - Kế toán"},{"k":"p","t":"Trước 9 giờ hằng ngày, tổng hợp mẫu C69d-HD, Mẫu C83d-HD, Mẫu D11d-TS, Mẫu D12d-TS toàn quốc từ phần mềm kế toán; ký, báo cáo Lãnh đạo Ngành, tự động đối chiếu với phần mềm quản lý thu."},{"k":"p","t":"Điều 33c. Sử dụng dữ liệu thu"},{"k":"p","t":"1. Phòng/Tổ cấp sổ, thẻ"},{"k":"p","t":"Nhận hồ sơ, dữ liệu do Phòng/Tổ quản lý thu chuyển đến; kiểm tra, đối chiếu các chỉ tiêu trên mẫu biểu, hồ sơ với dữ liệu quản lý; trường hợp dữ liệu và hồ sơ chưa khớp đúng: Lập Phiếu Yêu cầu bổ sung, hoàn thiện hồ sơ (Mẫu số 02); căn cứ dữ liệu quản lý thu đã được ghi vào cơ sở dữ liệu thu:"},{"k":"p","t":"1.1. In Sổ BHXH, thẻ BHYT; ký trên phần mềm quản lý thu Danh sách cấp sổ BHXH (Mẫu D09a-TS), Danh sách thẻ BHYT (Mẫu D10a-TS) kèm theo hồ sơ của đơn vị, người tham gia chuyển Bộ phận tiếp nhận hồ sơ để trả đơn vị, người tham gia và lưu trữ theo quy định."},{"k":"p","t":"1.2. In xác nhận thời gian tham gia vào sổ BHXH trả người lao động khi phát sinh trường hợp:"},{"k":"p","t":"a) Xác nhận sổ BHXH cho người lao động khi dừng đóng BHXH, BHTN; giải quyết chế độ BHXH, BHTN."},{"k":"p","t":"b) Xác nhận quá trình đóng BHTNLĐ, BNN đến thời điểm người tham gia bị TNLĐ, BNN."},{"k":"p","t":"c) Xác nhận quá trình đóng BHXH, BHTN khi có đề nghị của đơn vị hoặc cơ quan thanh tra, kiểm tra."},{"k":"p","t":"d) Sổ BHXH đối với trường hợp người tham gia giải quyết BHXH một lần còn thời gian đóng BHTN."},{"k":"p","t":"đ) Điều chỉnh thông tin tham gia BHXH, BHTN (kể cả trường hợp đã giải quyết chế độ BHXH)."},{"k":"p","t":"e) Đối với các trường hợp xác nhận sổ BHXH để hưởng chế độ hưu trí, bảo lưu thời gian đóng BHXH, chuyển toàn bộ dữ liệu quá trình tham gia theo dõi riêng làm căn cứ giải quyết chế độ BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"1.3. Hằng tháng: Tổng hợp Báo cáo chỉ tiêu quản lý thu; cấp sổ BHXH, thẻ BHYT (Mẫu B01-TS), ký trên phần mềm quản lý thu."},{"k":"p","t":"1.4. Hằng năm, in (hoặc thuê dịch vụ in):"},{"k":"p","t":"a) Thông báo xác nhận thời gian tham gia BHXH, BHTN của người lao động (Mẫu C14-TS) đối với trường hợp người lao động có địa chỉ liên hệ nhưng không có số điện thoại trong cơ sở dữ liệu; gửi từng người tham gia thông qua dịch vụ bưu chính công ích trước ngày 31/3 hằng năm. Kiểm tra, giám sát việc gửi bản xác nhận thời gian tham gia BHXH, BHTN (Mẫu C14-TS) của dịch vụ bưu chính công ích."},{"k":"p","t":"Đối với người tham gia BHXH đã có số điện thoại trong cơ sở dữ liệu: gửi tin nhắn tới số điện thoại của người tham gia về việc xác nhận thời gian tham gia BHXH, BHTN."},{"k":"p","t":"b) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C13-TS) gửi đơn vị thông qua dịch vụ bưu chính công ích. Kiểm tra, giám sát việc gửi và nhận Mẫu C13-TS của dịch vụ bưu chính công ích và việc niêm yết tại đơn vị."},{"k":"p","t":"1.5. Lập Phiếu sử dụng phôi sổ BHXH (Mẫu C06-TS), Phiếu sử dụng phôi thẻ BHYT (C07-TS) và Mở sổ theo dõi tình hình cấp sổ BHXH, thời hạn sử dụng thẻ BHYT; tình hình sử dụng phôi sổ BHXH, phôi thẻ BHYT (Mẫu S04-TS, S05-TS, S06-TS, S07-TS). Các loại Phiếu sử dụng và Sổ theo dõi được quản lý trong cơ sở dữ liệu, chỉ thực hiện in khi có yêu cầu của Lãnh đạo, đoàn kiểm tra hoặc cơ quan có thẩm quyền."},{"k":"p","t":"2. Phòng/Tổ quản lý thu"},{"k":"p","t":"2.1. Hằng tháng, Giám đốc BHXH tỉnh, huyện phê duyệt, lưu trữ trên phần mềm quản lý thu:"},{"k":"p","t":"a) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ-BNN (Mẫu C12-TS) gửi đơn vị thông qua dịch vụ bưu chính công ích. Kiểm tra, giám sát việc gửi và nhận Mẫu C12-TS của dịch vụ bưu chính công ích."},{"k":"p","t":"b) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ-BNN (Mẫu C12-TS) của đối tượng do tổ chức BHXH đóng BHYT, gửi Phòng/Tổ KHTC."},{"k":"p","t":"c) Báo cáo chỉ tiêu quản lý thu; cấp sổ BHXH, thẻ BHYT (Mẫu B01-TS), Báo cáo tình hình thu BHXH, BHYT, BHTN, BHTNLĐ-BNN (Mẫu B06-TS)."},{"k":"p","t":"d) Mẫu C69b-HD, Mẫu số D11b-TS tổng hợp tháng."},{"k":"p","t":"đ) Danh sách người chỉ tham gia BHYT (Mẫu D03-TS) do tổ chức BHXH đóng; người đã hiến bộ phận cơ thể người, trẻ em dưới 6 tuổi (nếu có) gửi UBND xã xác nhận."},{"k":"p","t":"e) Danh sách thẻ BHYT (Mẫu D10a-TS) của các đối tượng do Bộ Lao động - Thương binh và Xã hội quản lý gửi cơ quan lao động - thương binh và xã hội để theo dõi, quản lý."},{"k":"p","t":"2.2. Hằng quý Giám đốc BHXH tỉnh, huyện ký duyệt, lưu trên phần mềm quản lý thu:"},{"k":"p","t":"a) Mẫu C12-TS gửi cơ quan lao động - thương binh và xã hội, Bảng tổng hợp đối tượng và kinh phí do ngân sách nhà nước đóng, hỗ trợ đóng BHYT (Mẫu số 1 ban hành kèm theo Nghị định số 146/2018/NĐ-CP ngày 17/10/2018 của Chính phủ) gửi cơ quan tài chính chuyển kinh phí tương ứng vào quỹ BHYT."},{"k":"p","t":"b) Tổng hợp số thẻ BHYT và số phải thu theo nơi đăng ký KCB ban đầu (Mẫu B05-TS)."},{"k":"p","t":"c) Báo cáo nghiệp vụ (Mẫu B02a-TS, Mẫu B02a-TS lũy kế từ đầu năm, Mẫu B04a-TS)."},{"k":"p","t":"d) Báo cáo nghiệp vụ của toàn tỉnh (Mẫu B02b-TS, Mẫu B02b-TS lũy kế từ đầu năm, Mẫu B04b-TS)."},{"k":"p","t":"đ) Bảng tổng hợp đối tượng tham gia BHXH tự nguyện, ngân sách nhà nước hỗ trợ (Mẫu B09-TS) gửi cơ quan tài chính chuyển kinh phí vào quỹ BHXH."},{"k":"p","t":"2.3. Phối hợp với cơ quan lao động - thương binh và xã hội rà soát, đối chiếu Danh sách người chỉ tham gia BHYT (Mẫu D03-TS)."},{"k":"p","t":"2.4. Phối hợp với Phòng/Tổ cấp sổ, thẻ, Phòng/Tổ KH-TC lập hồ sơ các trường hợp hoàn trả, trình Giám đốc BHXH phê duyệt."},{"k":"p","t":"3. Phòng/Tổ KHTC"},{"k":"p","t":"3.1. Nhận Mẫu C12-TS của các đối tượng do tổ chức BHXH đóng để kiểm tra, đối chiếu, trường hợp có sai lệch, phối hợp với Phòng/Tổ chế độ BHXH, Phòng/Tổ quản lý thu xử lý."},{"k":"p","t":"3.2. Hằng tháng: Giám đốc BHXH tỉnh, huyện ký trên phần mềm kế toán Mẫu C83b-HD, Mẫu D12b-TS tổng hợp tháng, lưu trữ trên phần mềm kế toán."},{"k":"p","t":"4. Phòng/Tổ Truyền thông và phát triển đối tượng"},{"k":"p","t":"4.1. Trước 8 giờ 30 phút hằng ngày: Cán bộ khai thác phát triển đối tượng: tổng hợp Bảng chi tiết trích thù lao cho tổ chức làm đại lý thu BHXH, BHYT (Mẫu số D11a-TS), ký, lưu trên phần mềm quản lý thu."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu D11a-TS, phần mềm quản lý thu tự động khóa dữ liệu."},{"k":"p","t":"4.2. Trước 8 giờ 45 phút hằng ngày: Trưởng phòng Truyền thông và phát triển đối tượng/Giám đốc BHXH huyện: tổng hợp Bảng tổng hợp trích thù lao cho tổ chức làm đại lý thu BHXH, BHYT (Mẫu số D11b-TS) của ngày hôm trước liền kề; ký, lưu trữ trên phần mềm quản lý thu."},{"k":"p","t":"Sau 05 phút không thực hiện ký Mẫu D11b-TS, phần mềm quản lý thu tự động khóa dữ liệu."},{"k":"p","t":"4.3. Hằng tháng, in:"},{"k":"p","t":"- Danh sách đối tượng tham gia BHXH tự nguyện, BHYT trước 30 ngày đến hạn phải đóng (Mẫu D08a-TS) gửi đại lý thu để đôn đốc, thu tiền đóng."},{"k":"p","t":"- Đối chiếu biên lai thu tiền và số tiền đã thu theo Mẫu C17-TS, Tổng hợp trích thù lao cho tổ chức làm đại lý thu BHXH, BHYT (Mẫu số D12b-TS) với Phòng/Tổ KH-TC và Đại lý thu/nhà trường."},{"k":"p","t":"5. Phòng/Tổ Chế độ BHXH"},{"k":"p","t":"5.1. Trường hợp hồ sơ đúng với dữ liệu thu, thì giải quyết các chế độ BHXH, BHTNLĐ, BNN, BHTN."},{"k":"p","t":"5.2. Trường hợp dữ liệu trong phần mềm quản lý thu và hồ sơ chưa khớp đúng phối hợp Phòng/Tổ quản lý thu, Phòng/Tổ cấp sổ, thẻ để phối hợp xác nhận dữ liệu đúng quy định trước khi giải quyết."},{"k":"p","t":"5.3. Tổng hợp danh sách người lao động có thời gian truy thu trùng với thời gian hưởng trợ cấp thất nghiệp hoặc trùng thời gian một năm nghỉ việc đã hưởng BHXH một lần (Mẫu C19-TS) để thu hồi trợ cấp thất nghiệp hoặc BHXH một lần."},{"k":"p","t":"6. Phòng/Tổ Giám định BHYT"},{"k":"p","t":"6.1. In Bảng tổng hợp số tiền phải đóng và số thẻ đăng ký KCB ban đầu (Mẫu B05-TS) từ phần mềm quản lý thu gửi cơ sở khám chữa bệnh."},{"k":"p","t":"6.2. Cập nhật Danh sách cơ sở KCB khi ký hợp đồng với cơ sở KCB ban đầu vào phần mềm quản lý thu theo phân cấp quản lý.”"},{"k":"p","t":"57. Sửa đổi, bổ sung gạch đầu dòng (-) thứ 3 Tiết a Điểm 1.1 Khoản 1 Điều 34 như sau:"},{"k":"p","t":"“- Danh sách đơn vị giải thể, phá sản, bị thu hồi Giấy chứng nhận đăng ký kinh doanh, ngừng hoạt động, tạm ngừng hoạt động (Mẫu số D04c-TS).”"},{"k":"p","t":"58. Sửa đổi, bổ sung Tiết a Điểm 1.2 Khoản 1 Điều 34 như sau:"},{"k":"p","t":"“a) Căn cứ vào phân quyền do Trung tâm CNTT cung cấp để rà soát, đối chiếu, phân tích, xử lý dữ liệu và lập Danh sách đơn vị đề nghị thanh tra đột xuất (Mẫu số D04m-TS).”"},{"k":"p","t":"59. Sửa đổi, bổ sung Tiết a Điểm 1.3 Khoản 1 Điều 34 như sau:"},{"k":"p","t":"“a) Căn cứ danh sách đề nghị Ban Thu chuyển đến, xây dựng kế hoạch thanh tra theo quy định.”"},{"k":"p","t":"60. Sửa đổi, bổ sung gạch đầu dòng (-) thứ 3 Tiết a Điểm 2.1 Khoản 2 Điều 34 như sau:"},{"k":"p","t":"- Danh sách đơn vị giải thể, phá sản, bị thu hồi Giấy chứng nhận đăng ký kinh doanh, ngừng hoạt động, tạm ngừng hoạt động (Mẫu số D04c-TS).”"},{"k":"p","t":"61. Sửa đổi, bổ sung Điểm 2.2 Khoản 2 Điều 34 như sau:"},{"k":"p","t":"“2.2. Quy trình rà soát, điều tra, đôn đốc thu BHXH, BHYT, BHTN, BHTNLĐ, BNN"},{"k":"p","t":"a) Phòng/Tổ quản lý thu"},{"k":"p","t":"- Phối hợp với Phòng/Tổ Truyền thông và phát triển đối tượng và các đơn vị liên quan: Kiểm tra, đối chiếu Mẫu số D04a-TS, Mẫu số D04b-TS với dữ liệu đơn vị đang quản lý thu, xây dựng kế hoạch và tổ chức thực hiện khai thác, phát triển đối tượng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"+ Gửi đơn vị sử dụng lao động:"},{"k":"p","t":"Mẫu D04e-TS kèm theo Mẫu D04a-TS đến đơn vị chưa đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động."},{"k":"p","t":"Mẫu D04e-TS kèm theo Mẫu D04b-TS đến đơn vị đang đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động nhưng chưa đầy đủ."},{"k":"p","t":"Sau 15 ngày, đơn vị chưa thực hiện đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động, tiếp tục gửi lần 2."},{"k":"p","t":"+ Phối hợp với Phòng/Tổ Truyền thông và phát triển đối tượng và đơn vị liên quan làm việc trực tiếp với đơn vị, rà soát, điều tra, đôn đốc đơn vị đăng ký tham gia và đóng đủ BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động; lập Biên bản làm việc (Mẫu D04h-TS) yêu cầu đơn vị thực hiện đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động trong thời hạn 05 ngày."},{"k":"p","t":"Đối với đơn vị chấp hành đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động: Hướng dẫn đơn vị, người lao động lập hồ sơ đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN theo quy định tại Điều 23 nộp cho cơ quan BHXH (hoặc hướng dẫn đơn vị thực hiện giao dịch điện tử)."},{"k":"p","t":"Đối với đơn vị không chấp hành đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động hoặc không ký biên bản làm việc: Sau 05 ngày kể từ ngày lập biên bản làm việc, phối hợp Phòng Thanh tra - Kiểm tra/Tổ kiểm tra, Phòng/Tổ Truyền thông và phát triển đối tượng lập Mẫu số D04m-TS, trình Giám đốc ban hành quyết định thanh tra chuyên ngành đóng BHXH, BHYT, BHTN đột xuất hoặc phối hợp với cơ quan quản lý lao động, cơ quan Thuế thành lập đoàn thanh tra liên ngành."},{"k":"p","t":"- Hằng tháng, phối hợp với Phòng/Tổ Truyền thông và phát triển đối tượng, Phòng Thanh tra - Kiểm tra/Tổ kiểm tra theo dõi, đôn đốc đơn vị đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động. Thông tin trên các phương tiện thông tin đại chúng (báo, đài phát thanh, truyền hình) doanh nghiệp chưa đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động."},{"k":"p","t":"- Hằng quý:"},{"k":"p","t":"+ Phối hợp với Phòng/Tổ Truyền thông và phát triển đối tượng, Phòng Thanh tra - Kiểm tra/Tổ kiểm tra tham mưu với Giám đốc báo cáo UBND các cấp tình hình chấp hành pháp luật về BHXH, BHYT, BHTN, BHTNLĐ, BNN tình hình thu, cấp thẻ BHYT cho người lao động của các đơn vị trên địa bàn."},{"k":"p","t":"+ Kiến nghị, đề xuất xử lý theo quy định các trường hợp đơn vị vi phạm pháp luật về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN: không đăng ký tham gia hoặc đăng ký đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN không đủ số lao động, không đúng thời hạn theo quy định."},{"k":"p","t":"- Hằng năm: Báo cáo tình hình khai thác, phát triển đối tượng của các đơn vị cùng tham gia BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu số D04k-TS)."},{"k":"p","t":"b) Phòng Thanh tra - Kiểm tra/Tổ kiểm tra:"},{"k":"p","t":"- Căn cứ hồ sơ, dữ liệu từ các Phòng/Tổ chuyển đến, rà soát, đối chiếu kế hoạch thanh tra trên địa bàn của cơ quan có thẩm quyền:"},{"k":"p","t":"+ Trường hợp đơn vị có trong kế hoạch thanh tra, có văn bản (kèm theo danh sách các đơn vị thanh tra) đề nghị phối hợp thanh tra việc chấp hành pháp luật về BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"+ Trường hợp đơn vị không có trong kế hoạch thanh tra và các trường hợp đã đề nghị phối hợp thực hiện thanh tra nhưng không thực hiện được thì lập Mẫu số D04m-TS để tổ chức thanh tra chuyên ngành theo quy định."},{"k":"p","t":"- Phối hợp với Phòng/Tổ quản lý thu, Phòng/Tổ Truyền thông và phát triển đối tượng:"},{"k":"p","t":"+ Tổ chức thanh tra đột xuất chuyên ngành về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"+ Tổng hợp hồ sơ, tham mưu với Giám đốc chuyển hồ sơ sang cơ quan công an đề nghị điều tra khi có dấu hiệu phạm tội trốn đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động theo pháp luật hình sự."},{"k":"p","t":"c) Phòng/Tổ Truyền thông và phát triển đối tượng: Phối hợp với Phòng/Tổ quản lý thu, Phòng Thanh tra - Kiểm tra/Tổ kiểm tra thực hiện rà soát, điều tra, đôn đốc thu BHXH, BHYT, BHTN, BHTNLĐ, BNN.”"},{"k":"p","t":"62. Sửa đổi Điều 35 như sau:"},{"k":"p","t":"“Điều 35. Khai thác, phát triển đối tượng tham gia BHXH tự nguyện, đối tượng tham gia BHYT được ngân sách nhà nước hỗ trợ một phần mức đóng và đối tượng tham gia BHYT theo hộ gia đình"},{"k":"p","t":"1. Phòng/Tổ Truyền thông và phát triển đối tượng"},{"k":"p","t":"1.1. Căn cứ tình hình phát triển kinh tế - xã hội, dân số, số người đã tham gia BHXH, BHYT, dữ liệu hộ gia đình tham gia BHYT; dữ liệu quản lý từ cơ quan Thuế trên địa bàn:"},{"k":"p","t":"a) Xây dựng, giao chỉ tiêu phát triển người tham gia BHXH tự nguyện, BHYT cho BHXH huyện/đại lý thu."},{"k":"p","t":"b) Hướng dẫn, kiểm tra, đôn đốc đại lý thu, nhân viên đại lý thu đến các địa bàn dân cư để tuyên truyền, vận động người dân tham gia BHXH tự nguyện, BHYT."},{"k":"p","t":"1.2. Thường xuyên tổ chức đào tạo, bồi dưỡng cho nhân viên đại lý thu kỹ năng khai thác, vận động thu, tuyên truyền, chế độ, chính sách BHXH, BHYT."},{"k":"p","t":"1.3. Cung cấp danh sách hộ nghèo, hộ cận nghèo đã được phê duyệt kịp thời cho Đại lý thu để có cơ sở xác định đối tượng tham gia BHXH tự nguyện thuộc hộ nghèo, hộ cận nghèo được ngân sách nhà nước hỗ trợ tiền đóng BHXH tự nguyện."},{"k":"p","t":"2. Phòng/Tổ quản lý thu: Hằng tháng phối hợp với Phòng/Tổ Truyền thông và phát triển đối tượng rà soát, đối chiếu số người đã tham gia và số người chưa tham gia BHYT để giao đại lý thu để thu.”"},{"k":"p","t":"63. Sửa đổi, bổ sung Điều 36 như sau:"},{"k":"p","t":"“Điều 36. Quản lý nợ; đôn đốc thu nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN"},{"k":"p","t":"1. Phân loại nợ"},{"k":"p","t":"1.1. Nợ dưới 01 tháng: là số tiền phát sinh hằng tháng thuộc trách nhiệm đóng của đơn vị, cơ quan lao động - thương binh và xã hội, cơ quan tài chính và người tham gia nhưng chưa đóng."},{"k":"p","t":"1.2. Nợ từ 01 tháng đến dưới 03 tháng"},{"k":"p","t":"1.3. Nợ từ 03 tháng trở lên và không bao gồm các trường hợp tại Điểm 1.4 Khoản này."},{"k":"p","t":"1.4. Các trường hợp nợ khác:"},{"k":"p","t":"a) Đơn vị phá sản;"},{"k":"p","t":"b) Đơn vị giải thể;"},{"k":"p","t":"c) Đơn vị dừng hoạt động sản xuất, kinh doanh;"},{"k":"p","t":"d) Đơn vị đang trong thời gian được tạm dừng đóng vào quỹ hưu trí và tử tuất."},{"k":"p","t":"đ) Đơn vị có chủ doanh nghiệp bỏ trốn."},{"k":"p","t":"2. Hồ sơ xác định nợ"},{"k":"p","t":"2.1. Đối với đơn vị nợ quy định tại Điểm 1.1, 1.2, 1.3 Khoản 1 Điều này:"},{"k":"p","t":"a) Thông báo kết quả đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu C12-TS)."},{"k":"p","t":"b) Biên bản làm việc về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu D04h-TS) nếu có."},{"k":"p","t":"2.2. Đối với các trường hợp nợ khác quy định tại Điểm 1.4 Khoản 1 Điều này:"},{"k":"p","t":"a) Đơn vị tại Tiết a: Quyết định Tuyên bố phá sản của Tòa án nhân dân."},{"k":"p","t":"b) Đơn vị tại Tiết b: Thông báo về việc doanh nghiệp giải thể đăng công bố nội dung giải thể trên Cổng thông tin quốc gia về đăng ký doanh nghiệp;"},{"k":"p","t":"c) Đơn vị tại Tiết c: Một trong các giấy tờ sau:"},{"k":"p","t":"Quyết định mở thủ tục phá sản của Tòa án nhân dân; Quyết định giải thể doanh nghiệp hoặc Thông báo về tình trạng doanh nghiệp đang làm thủ tục giải thể trên Cổng thông tin quốc gia về đăng ký doanh nghiệp; Biên bản làm việc liên ngành có xác nhận của chính quyền địa phương"},{"k":"p","t":"d) Đơn vị tại Tiết d: Văn bản cho phép tạm dừng đóng của cơ quan có thẩm quyền."},{"k":"p","t":"đ) Đơn vị tại Tiết đ: Văn bản xác định của UBND tỉnh hoặc văn bản xác định của đơn vị được UBND tỉnh ủy quyền."},{"k":"p","t":"3. Tổ chức thu và thu nợ tại BHXH huyện, BHXH tỉnh"},{"k":"p","t":"3.1. Phòng/Tổ quản lý thu"},{"k":"p","t":"a) Hằng tháng, cán bộ thu thực hiện đôn đốc đơn vị nộp tiền theo quy định."},{"k":"p","t":"b) Trường hợp đơn vị nợ quá 02 tháng tiền đóng, đối với phương thức đóng hằng tháng; 04 tháng, đối với phương thức đóng 03 tháng một lần; 07 tháng, đối với phương thức đóng 06 tháng một lần:"},{"k":"p","t":"- Cán bộ thu trực tiếp đến đơn vị để đôn đốc, lập Biên bản làm việc về việc đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động (Mẫu D04h-TS);"},{"k":"p","t":"- Gửi văn bản đôn đốc 15 ngày một lần."},{"k":"p","t":"- Sau 02 lần gửi văn bản mà đơn vị không nộp tiền và thực hiện các biện pháp đôn đốc mà đơn vị vẫn không đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN, phối hợp với Phòng Thanh tra - Kiểm tra/Tổ kiểm tra lập Danh sách đơn vị đề nghị thành lập đoàn thanh tra đột xuất (Mẫu số D04m-TS) để tổ chức thanh tra chuyên ngành theo quy định hoặc phối hợp với Phòng Thanh tra - Kiểm tra/Tổ kiểm tra."},{"k":"p","t":"c) Nhận kết luận thanh tra để theo dõi, đôn đốc đơn vị thực hiện."},{"k":"p","t":"d) Hằng tháng: thông báo danh sách đơn vị cố tình không đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN trên các phương tiện thông tin đại chúng."},{"k":"p","t":"đ) Hằng quý lập báo cáo đánh giá tình hình thu nợ (Mẫu B03a-TS), ký trên phần mềm quản lý thu; kèm theo dữ liệu điện tử chi tiết đơn vị nợ BHXH, BHYT, BHTN, BHTNLĐ, BNN (Mẫu B03-TS) của tháng cuối quý tự động gửi BHXH Việt Nam."},{"k":"p","t":"3.2. Phòng Thanh tra - Kiểm tra/Tổ kiểm tra"},{"k":"p","t":"a) Nhận hồ sơ từ Phòng/Tổ quản lý thu chuyển đến, phối hợp thanh tra chuyên ngành đột xuất về đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN; xử phạt vi phạm hành chính theo quy định."},{"k":"p","t":"b) Chuyển 01 bản kết luận thanh tra cho Phòng/Tổ quản lý thu để theo dõi, đôn đốc đơn vị thực hiện."},{"k":"p","t":"c) Trường hợp đơn vị có dấu hiệu phạm tội trốn đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN cho người lao động, phối hợp chuyển hồ sơ sang cơ quan có thẩm quyền đề nghị điều tra, xử lý theo quy định của pháp luật hình sự."},{"k":"p","t":"4. Quy trình quản lý các đơn vị phá sản, giải thể, dừng hoạt động sản xuất kinh doanh, đơn vị đang trong thời gian được tạm dừng đóng vào quỹ hưu trí và tử tuất."},{"k":"p","t":"4.1. Cập nhật trạng thái đơn vị vào phần mềm quản lý thu."},{"k":"p","t":"- Cán bộ thu: Căn cứ hồ sơ đơn vị theo quy định tại Điểm 2.2 Khoản 2 Điều này, cập nhật trạng thái của đơn vị tương ứng kèm theo bản scan hồ sơ xác định tình trạng doanh nghiệp vào phần mềm quản lý thu (riêng đơn vị tại Tiết d Khoản 1 Điều này thực hiện theo Quyết định cho phép tạm dừng đóng của cơ quan có thẩm quyền), giảm toàn bộ người tham gia trong đơn vị, tạm dừng tính lãi, ghi nhận quá trình của người tham gia BHXH, BHYT, BHTN tại đơn vị tính đến thời điểm đóng, lập báo cáo (theo biểu mẫu B12-TS, B12a-TS) ký duyệt."},{"k":"p","t":"- Giám đốc BHXH kiểm tra, phê duyệt trên phần mềm quản lý thu, lưu vào cơ sở dữ liệu của người tham gia."},{"k":"p","t":"4.2. Cập nhật thay đổi"},{"k":"p","t":"a) Nội dung thay đổi phải cập nhật"},{"k":"p","t":"- Đơn vị nộp hồ sơ đề nghị giải quyết chế độ tử tuất, hưu trí, BHXH một lần cho người lao động;"},{"k":"p","t":"- Đơn vị đóng BHXH, BHYT, BHTN cho người lao động đủ điều kiện hưởng lương hưu hoặc chuyển đi (bảo lưu);"},{"k":"p","t":"- Các trường hợp người lao động tiếp tục tham gia BHXH tại đơn vị khác, tại địa bàn khác hoặc được giải quyết chế độ BHXH tại địa bàn tỉnh, huyện khác."},{"k":"p","t":"b) Quy trình thực hiện"},{"k":"p","t":"- Cán bộ thu:"},{"k":"p","t":"+ Cập nhật dữ liệu, scan hồ sơ ký duyệt, trình Giám đốc BHXH tỉnh ký duyệt gửi BHXH Việt Nam phê duyệt."},{"k":"p","t":"+ Nhận lại hồ sơ do BHXH Việt Nam phê duyệt giải quyết theo quy định."},{"k":"p","t":"- Ban Thu:"},{"k":"p","t":"+ Nhận dữ liệu do BHXH tỉnh gửi lên, xem xét, cho phép nhập dữ liệu điều chỉnh vào phần mềm quản lý thu. Trường hợp không đủ hồ sơ, dữ liệu có sai sót yêu cầu/ý kiến, gửi lại BHXH tỉnh."},{"k":"p","t":"64. Sửa đổi, bổ sung Điểm 2.3 Khoản 2 Điều 38 như sau:"},{"k":"p","t":"“2.3. Hồ sơ đúng đủ theo quy định tại Phụ lục 02."},{"k":"p","t":"a) Trường hợp đơn vị đề nghị truy thu cộng nối tổng thời gian dưới 03 tháng: cán bộ thu chịu trách nhiệm kiểm tra hồ sơ theo Phụ lục 02 trước khi truy thu."},{"k":"p","t":"b) Trường hợp đơn vị đề nghị truy thu cộng nối tổng thời gian từ 03 đến 06 tháng: Trong thời hạn 07 ngày kể từ ngày nhận đủ hồ sơ theo quy định, cán bộ thu lập biên bản (Mẫu D04h-TS), trình Giám đốc BHXH phê duyệt."},{"k":"p","t":"c) Trường hợp đơn vị đề nghị truy thu cộng nối tổng thời gian trên 06 tháng trở lên: Trong thời hạn 07 ngày kể từ ngày nhận đủ hồ sơ theo quy định, cán bộ thu lập biên bản (Mẫu D04h-TS), trình Giám đốc BHXH thực hiện thanh tra đột xuất và xử lý theo quy định.”"},{"k":"p","t":"65. Bổ sung Khoản 4 Điều 38 như sau:"},{"k":"p","t":"“4. Khi cập nhật dữ liệu truy thu theo quy định tại Khoản 1 Điều 33b, cán bộ thu kiểm tra, đối chiếu với dữ liệu giải quyết BHXH một lần, BHTN toàn quốc, trường hợp có thời gian truy thu trùng với thời gian hưởng trợ cấp thất nghiệp hoặc trùng thời gian một năm nghỉ việc đã hưởng BHXH một lần, ký Mẫu C19-TS gửi Phòng/Tổ chế độ BHXH.”"},{"k":"p","t":"66. Sửa đổi, bổ sung Điểm 1.1 Khoản 1 Điều 43 như sau:"},{"k":"p","t":"“1.1. Chuyển khoản: Chuyển tiền đóng vào tài khoản chuyên thu của cơ quan BHXH mở tại ngân hàng hoặc Kho bạc Nhà nước hoặc qua phương thức tiện ích thông minh.”"},{"k":"p","t":"67. Sửa đổi, bổ sung Tiết e Điểm 3.1 Khoản 3 Điều 43 như sau:"},{"k":"p","t":"“e) Trường hợp một người có từ 02 sổ BHXH trở lên có thời gian đóng BHXH, BHTN trùng nhau thì cơ quan BHXH thực hiện hoàn trả cho người lao động số tiền đơn vị và người lao động đã đóng vào quỹ hưu trí, tử tuất và số tiền đã đóng vào quỹ BHTN (bao gồm cả số tiền thuộc trách nhiệm đóng BHXH, BHTN của người sử dụng lao động), không bao gồm tiền lãi. Cơ quan BHXH quản lý nơi người lao động đang làm việc hoặc đang sinh sống thực hiện hoàn trả cho người lao động theo quy định tại Khoản 2 Điều 46.”"},{"k":"p","t":"68. Sửa đổi, bổ sung Điểm 3.3 Khoản 3 Điều 43 như sau:"},{"k":"p","t":"3.3. Trình tự hoàn trả"},{"k":"p","t":"a) Hồ sơ đề nghị hoàn trả"},{"k":"p","t":"- Trường hợp quy định tại Tiết a Điểm 2.1 Khoản này: đơn vị lập hồ sơ theo quy định tại Điều 23."},{"k":"p","t":"- Trường hợp quy định tại Tiết b, e Điểm 2.1 Khoản này, lập Mẫu TK1-TS, kèm theo:"},{"k":"p","t":"+ Sổ BHXH đối với người tham gia BHXH tự nguyện, tất cả các sổ BHXH đối với người có thời gian đóng BHXH, BHTN trùng nhau."},{"k":"p","t":"+ Văn bản chứng thực hoặc bản kèm theo bản chính Giấy chứng tử đối với trường hợp chết."},{"k":"p","t":"- Trường hợp hoàn trả tiền đóng BHYT cho nhiều người trong cùng đối tượng, UBND xã, đại lý thu/nhà trường lập danh sách đề nghị hoàn trả theo Mẫu D03-TS gửi cơ quan BHXH."},{"k":"p","t":"- Các trường hợp còn lại: đơn vị hoặc ngân hàng, kho bạc có văn bản đề nghị."},{"k":"p","t":"b) Phòng/Tổ Quản lý thu"},{"k":"p","t":"- Cán bộ thu kiểm tra sổ BHXH, thẻ BHYT với cơ sở dữ liệu thu toàn quốc nếu đúng tổng hợp dữ liệu về kho dữ liệu bảo lưu BHXH để giải quyết, khi giải quyết xong dữ liệu giải quyết tự động lưu hồ sơ đã hoàn trả."},{"k":"p","t":"- Phối hợp với Phòng/Tổ KH-TC xác định nguyên nhân, số tiền đã đóng thừa, số tiền chuyển nhầm, hạch toán nhầm vào tài khoản chuyên thu."},{"k":"p","t":"- Giám đốc BHXH ban hành Quyết định hoàn trả (Mẫu C16-TS), gửi 01 bản cho Phòng/Tổ KH-TC và làm thủ tục chuyển tiền, lưu Phòng/Tổ Quản lý thu 01 bản. Trường hợp ngân hàng hoặc Kho bạc Nhà nước hạch toán nhầm thì gửi 01 bản cho ngân hàng hoặc Kho bạc Nhà nước đó để kiểm soát."},{"k":"p","t":"c) Giám đốc BHXH kiểm tra, ký duyệt và lưu hồ sơ trên kho dữ liệu bảo lưu của phần mềm quản lý thu để báo cáo BHXH cấp trên theo quy định."},{"k":"p","t":"69. Sửa đổi, bổ sung tên Mục 3 Chương VI như sau:"},{"k":"p","t":"“CẤP, QUẢN LÝ PHÔI SỔ BHXH, PHÔI THẺ BHYT”"},{"k":"p","t":"70. Sửa đổi, bổ sung Điều 44, Điều 45 như sau:"},{"k":"p","t":"“Điều 44. Quản lý phôi sổ BHXH và phôi thẻ BHYT"},{"k":"p","t":"1. Phôi sổ BHXH, thẻ BHYT do BHXH Việt Nam tổ chức in để cấp phát cho BHXH các tỉnh, BHXH Bộ Quốc phòng và BHXH Công an nhân dân."},{"k":"p","t":"2. Việc tổ chức in, nhập kho, xuất kho, kiểm kê, hủy bỏ và quyết toán phôi sổ BHXH, thẻ BHYT thực hiện theo quy định hiện hành."},{"k":"p","t":"3. Trách nhiệm quản lý phôi sổ BHXH, phôi thẻ BHYT"},{"k":"p","t":"3.1. Ban Sổ - Thẻ"},{"k":"p","t":"- Tổng hợp nhu cầu sử dụng phôi sổ BHXH, phôi thẻ BHYT trên toàn quốc trình Tổng Giám đốc kế hoạch mua sắm."},{"k":"p","t":"- Phối hợp đôn đốc, kiểm tra chất lượng và tiến độ in phôi sổ BHXH, phôi thẻ BHYT đảm bảo đúng quy định."},{"k":"p","t":"- Theo dõi, điều tiết việc cấp phát, sử dụng phôi sổ BHXH, thẻ BHYT."},{"k":"p","t":"3.2. Đơn vị được giao tổ chức in phôi sổ BHXH, phôi thẻ BHYT"},{"k":"p","t":"- Tổ chức thực hiện kế hoạch in phôi sổ BHXH, phôi thẻ BHYT theo đúng quy định đã được Tổng Giám đốc phê duyệt."},{"k":"p","t":"- Chủ trì, phối hợp Ban Sổ - Thẻ đôn đốc, kiểm tra tiến độ thực hiện, chất lượng phôi sổ BHXH, phôi thẻ BHYT theo hợp đồng."},{"k":"p","t":"- Theo dõi, đôn đốc nhà in chuyển phôi sổ BHXH, phôi thẻ BHYT cho BHXH các tỉnh đảm bảo đúng thời gian, số lượng."},{"k":"p","t":"- Chuyển một bản sao vận đơn gửi sổ BHXH, thẻ BHYT cho Ban Sổ - Thẻ để theo dõi tiến độ thực hiện."},{"k":"p","t":"3.3. BHXH tỉnh/huyện"},{"k":"p","t":"a) Văn phòng/Phòng/Tổ KH-TC"},{"k":"p","t":"- Tiếp nhận phôi sổ BHXH, phôi thẻ BHYT, trường hợp phát hiện phôi sổ BHXH, phôi thẻ BHYT không đảm bảo số lượng, số seri, chất lượng lập biên bản báo cáo về BHXH Việt Nam (Ban Sổ - Thẻ)."},{"k":"p","t":"- Căn cứ kế hoạch cấp phôi sổ BHXH, phôi thẻ BHYT được lãnh đạo phê duyệt thực hiện việc xuất kho theo quy định."},{"k":"p","t":"- Chủ trì trong việc tổ chức tiếp nhận, quản lý phôi sổ BHXH, phôi thẻ BHYT đã nhận; lưu giữ sổ BHXH, thẻ BHYT hỏng do Phòng Cấp sổ, thẻ/ BHXH cấp huyện chuyển về đúng quy định."},{"k":"p","t":"b) Phòng/Tổ Cấp sổ, thẻ"},{"k":"p","t":"- Tổng hợp số lượng, theo dõi, điều tiết việc sử dụng phôi sổ BHXH,  phôi thẻ BHYT."},{"k":"p","t":"- Cấp phát phôi sổ BHXH, phôi thẻ BHYT cho từng cán bộ làm công tác in sổ BHXH, thẻ BHYT để sử dụng. Khi cấp cho cán bộ sử dụng phải viết phiếu giao nhận phôi sổ BHXH, phôi thẻ BHYT (Mẫu C08-TS)."},{"k":"p","t":"- Cán bộ trực tiếp in sổ BHXH, thẻ BHYT có trách nhiệm bảo quản phôi sổ BHXH, phôi thẻ BHYT được cấp (kể cả số phôi sổ BHXH, phôi thẻ BHYT bị hư hỏng trong quá trình tác nghiệp, trường hợp in hỏng phải được cắt góc)."},{"k":"p","t":"- Trước ngày 01/02 hàng năm, Phòng Cấp sổ, thẻ/BHXH huyện lập danh mục sổ BHXH, thẻ BHYT hỏng năm trước (do in, do bảo quản) để bàn giao cho BHXH tỉnh."}]},{"id":"qd505_45","no":45,"code":"Điều 45","title":"Điều 45. Kiểm kê, hủy phôi sổ BHXH, thẻ BHYT","shortTitle":"Kiểm kê, hủy phôi sổ BHXH, thẻ BHYT","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Kiểm kê phôi sổ BHXH, thẻ BHYT"},{"k":"p","t":"a) Định kỳ cuối mỗi quý và cuối năm BHXH tỉnh/huyện kiểm kê phôi sổ BHXH, thẻ BHYT nhằm xác nhận số lượng của phôi sổ BHXH, phôi thẻ BHYT, số sêri thẻ BHYT còn tồn kho thực tế và chênh lệch thừa thiếu so với sổ sách kế toán."},{"k":"p","t":"b) Tổ kiểm kê BHXH tỉnh, huyện gồm đại diện: lãnh đạo BHXH tỉnh,  huyện; các Phòng/Tổ Cấp sổ, thẻ; Phòng/Tổ KH-TC; Văn phòng. Việc kiểm kê phải lập Biên bản (Mẫu C32-HD ban hành kèm theo Thông tư số 107/2017/TT-BTC); trong đó nêu rõ lý do thừa, thiếu và xác định trách nhiệm của tập thể, cá nhân cùng kiến nghị việc giải quyết."},{"k":"p","t":"2. Hủy sổ BHXH, thẻ BHYT hỏng"},{"k":"p","t":"a) Thành lập Hội đồng hủy sổ BHXH, thẻ BHYT do Lãnh đạo BHXH tỉnh làm Chủ tịch, đại diện lãnh đạo các Phòng: KH-TC; Cấp sổ, thẻ; Thanh tra - Kiểm tra, Văn phòng làm ủy viên."},{"k":"p","t":"b) Định kỳ trước 15/3 hằng năm tổ chức hủy sổ BHXH, thẻ BHYT hỏng đã có thời gian lưu giữ trên 01 năm tại kho của Văn phòng; đồng thời lập biên bản hủy sổ BHXH, thẻ BHYT (Mẫu C10-TS).”"},{"k":"p","t":"c) Ban Sổ - Thẻ giám sát, kiểm tra việc hủy sổ BHXH, thẻ BHYT của BHXH tỉnh."},{"k":"p","t":"71. Sửa đổi, bổ sung tên Mục 4 Chương VI như sau:"},{"k":"p","t":"“GHI VÀ QUẢN LÝ DỮ LIỆU SỔ BHXH, THẺ BHYT”"},{"k":"p","t":"72. Sửa đổi, bổ sung Điều 46 như sau:"},{"k":"p","t":"“Điều 46. Nội dung ghi trên sổ BHXH và gộp sổ BHXH"},{"k":"p","t":"Nội dung ghi trên sổ BHXH và gộp sổ BHXH đối với một người có từ 2 sổ BHXH trở lên được quản lý theo Điều 33b."},{"k":"p","t":"1. Ghi, xác nhận thời gian đóng BHXH, BHTN, BHTNLĐ, BNN trong sổ BHXH"},{"k":"p","t":"1.1. Nội dung ghi trong sổ BHXH phải đầy đủ theo từng giai đoạn tương ứng với mức đóng và điều kiện làm việc của người tham gia BHXH, BHTN, BHTNLĐ, BNN (kể cả thời gian người lao động không làm việc và không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng như nghỉ việc hưởng chế độ ốm đau, thai sản; nghỉ việc không hưởng tiền lương; tạm hoãn HĐLĐ)."},{"k":"p","t":"1.2. Đối với đơn vị nợ tiền đóng BHXH, BHTN, BHTNLĐ, BNN, nếu người lao động đủ điều kiện hưởng BHXH hoặc chấm dứt HĐLĐ, HĐLV thì đơn vị có trách nhiệm đóng đủ BHXH, BHTN, BHTNLĐ, BNN, bao gồm cả tiền lãi chậm đóng theo quy định, cơ quan BHXH xác nhận sổ BHXH để kịp thời giải quyết chế độ BHXH, BHTN cho người lao động."},{"k":"p","t":"Trường hợp đơn vị chưa đóng đủ thì xác nhận sổ BHXH đến thời điểm đã đóng BHXH, BHTN, BHTNLĐ, BNN. Sau khi thu hồi được số tiền đơn vị còn nợ thì xác nhận bổ sung trên sổ BHXH."},{"k":"p","t":"1.3. Khi điều chỉnh giảm thời gian đóng hoặc giảm mức đóng BHXH, BHTN, BHTNLĐ, BNN đã ghi trong sổ BHXH, phải ghi cụ thể nội dung điều chỉnh, xác nhận lũy kế hoặc tổng thời gian đã đóng BHXH, BHTN, BHTNLĐ, BNN."},{"k":"p","t":"2. Gộp sổ BHXH và hoàn trả"},{"k":"p","t":"Trường hợp một người có từ 2 sổ BHXH trở lên đề nghị gộp sổ BHXH, cán bộ Phòng/Tổ cấp sổ, thẻ thực hiện kiểm tra, đối chiếu nội dung đã ghi trên các sổ BHXH và cơ sở dữ liệu; lập Danh sách đề nghị gộp sổ BHXH (Mẫu C18-TS) chuyển cán bộ Phòng/Tổ quản lý thu thực hiện:"},{"k":"p","t":"+ Trường hợp thời gian đóng BHXH trên các sổ BHXH không trùng nhau: Thực hiện gộp quá trình đóng BHXH của các sổ BHXH trên cơ sở dữ liệu; hủy mã số sổ BHXH đã gộp."},{"k":"p","t":"+ Trường hợp thời gian đóng BHXH trên các sổ BHXH trùng nhau: lập Quyết định hoàn trả (Mẫu C16-TS) để hoàn trả cho người lao động theo quy định tại Điểm 2.3 Khoản 2 Điều 43."},{"k":"p","t":"3. Người lao động có sổ BHXH bảo lưu quá trình đóng kể cả do BHXH Bộ Quốc phòng, Bộ Công an cấp, đăng ký tham gia tiếp hoặc giải quyết chế độ. Phòng/Tổ quản lý thu có trách nhiệm cập nhật dữ liệu, đối chiếu nội dung đã ghi trên sổ BHXH với dữ liệu quá trình đóng do BHXH Bộ Quốc phòng, BHXH Công an nhân dân cung cấp."},{"k":"p","t":"4. Sổ BHXH của người lao động di chuyển đơn vị đóng được chuyển toàn bộ quá trình thời gian đã đóng đến đơn vị mới để ghi quá trình đóng tiếp."},{"k":"p","t":"5. Thẩm quyền ký trên sổ BHXH"},{"k":"p","t":"5.1. Giám đốc BHXH tỉnh, huyện quét chữ ký trong phần mềm để in sổ BHXH."},{"k":"p","t":"5.2. Giám đốc BHXH tỉnh, huyện chịu trách nhiệm về việc quản lý con dấu theo quy định hiện hành của BHXH Việt Nam.”"},{"k":"p","t":"73. Sửa đổi, bổ sung Điều 47 như sau:"},{"k":"p","t":"“Điều 47. Giá trị sử dụng thẻ BHYT"},{"k":"p","t":"1. Dữ liệu thẻ BHYT được quản lý tập trung và liên thông với dữ liệu thu. Các cơ sở KCB khi tiếp nhận thẻ BHYT của bệnh nhân đến khám bệnh thực hiện tra cứu thông tin về dữ liệu thẻ BHYT trên cổng tiếp nhận dữ liệu hệ thống thông tin giám định BHYT để xác định giá trị sử dụng của thẻ BHYT."},{"k":"p","t":"2. Thẻ BHYT có giá trị sử dụng tương ứng số tiền đóng BHYT (trừ đối tượng trẻ em dưới 6 tuổi), thời điểm thẻ BHYT có giá trị sử dụng như sau:"},{"k":"p","t":"2.1. Đối tượng quy định tại Khoản 1, 2, 3 và Điểm 4.1, 4.1a, 4.2 Khoản 4 Điều 17: thẻ BHYT có giá trị kể từ ngày đóng BHYT, trừ một số đối tượng thẻ BHYT có giá trị sử dụng như sau:"},{"k":"p","t":"a) Đối với người hưởng trợ cấp thất nghiệp, thẻ BHYT có giá trị sử dụng từ tháng đầu tiên hưởng trợ cấp thất nghiệp ghi trong quyết định của cơ quan nhà nước cấp có thẩm quyền."},{"k":"p","t":"b) Đối với đối tượng quy định tại Điểm 3.5 khoản 3 Điều 17:"},{"k":"p","t":"- Trường hợp trẻ em sinh trước ngày 30/9: Thẻ bảo hiểm y tế có giá trị sử dụng đến hết ngày 30/9 của năm trẻ đủ 72 tháng tuổi;"},{"k":"p","t":"- Trường hợp trẻ sinh sau ngày 30/9: Thẻ bảo hiểm y tế có giá trị sử dụng đến hết ngày cuối của tháng trẻ đủ 72 tháng tuổi."},{"k":"p","t":"c) Đối với người thuộc diện hưởng trợ cấp bảo trợ xã hội hàng tháng, thẻ bảo hiểm y tế có giá trị sử dụng từ ngày được hưởng trợ cấp xã hội tại quyết định của UBND cấp huyện."},{"k":"p","t":"d) Đối với người thuộc hộ gia đình nghèo, người dân tộc thiểu số đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn, người đang sinh sống tại vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn, người sinh sống tại xã đảo, huyện đảo; người thuộc hộ gia đình cận nghèo mà được ngân sách nhà nước hỗ trợ 100% mức đóng BHYT, thẻ BHYT có giá trị sử dụng từ ngày được xác định tại quyết định phê duyệt danh sách của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"đ) Đối với người được phong tặng danh hiệu nghệ nhân nhân dân, nghệ nhân ưu tú thuộc hộ gia đình có mức thu nhập bình quân đầu người hàng tháng thấp hơn mức lương cơ sở, thẻ BHYT có giá trị sử dụng từ ngày được xác định tại Quyết định phê duyệt danh sách của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"e) Đối với người hiến bộ phận cơ thể, thẻ BHYT có giá trị sử dụng ngay sau khi hiến bộ phận cơ thể."},{"k":"p","t":"g) Đối với học sinh, sinh viên:"},{"k":"p","t":"- Học sinh của cơ sở giáo dục phổ thông, trong đó:"},{"k":"p","t":"+ Đối với học sinh lớp 1: Giá trị sử dụng bắt đầu từ ngày 01/10 năm đầu tiên của cấp tiểu học;"},{"k":"p","t":"+ Đối với học sinh lớp 12: Thẻ BHYT có giá trị sử dụng đến hết ngày 30/9 của năm đó."},{"k":"p","t":"- Học sinh, sinh viên của cơ sở giáo dục đại học, cơ sở giáo dục nghề nghiệp, trong đó:"},{"k":"p","t":"+ Đối với học sinh, sinh viên năm thứ nhất của khóa học: Thẻ BHYT có giá trị sử dụng từ ngày nhập học, trừ trường hợp thẻ của học sinh lớp 12 đang còn giá trị sử dụng;"},{"k":"p","t":"+ Đối với học sinh, sinh viên năm cuối của khóa học: Thẻ BHYT có giá trị sử dụng đến ngày cuối của tháng kết thúc khóa học."},{"k":"p","t":"2.2. Đối tượng quy định tại Điểm 4.3 Khoản 4, Khoản 5 và Khoản 8 Điều 17 có thời gian tham gia BHYT liên tục, thẻ BHYT có giá trị sử dụng từ ngày đóng BHYT. Trường hợp tham gia BHYT lần đầu hoặc tham gia không liên tục từ 3 tháng trở lên trong năm tài chính thì thẻ BHYT có giá trị sử dụng sau 30 ngày kể từ ngày người tham gia nộp tiền đóng BHYT."},{"k":"p","t":"2.3. Đối tượng quy định tại Khoản 1 Điều 17 chậm đóng BHYT từ 30 ngày trở lên thì đơn vị sử dụng lao động phải chịu trách nhiệm theo quy định tại Điều 49 Luật BHYT sửa đổi, bổ sung."},{"k":"p","t":"3. Người tham gia BHYT được thay đổi cơ sở đăng ký KCB ban đầu vào tháng đầu quý."},{"k":"p","t":"4. Người lao động hưởng chế độ ốm đau, thai sản tiếp tục sử dụng thẻ BHYT đã cấp, không thực hiện đổi thẻ BHYT. Đối với người lao động nghỉ không lương mà trong thời gian đó đơn vị lập hồ sơ nghỉ hưởng chế độ thai sản thì ghi giá trị sử dụng từ tháng nghỉ thai sản đến hết giá trị sử dụng của thẻ BHYT đã cấp."},{"k":"p","t":"Ví dụ 18: Bà Nguyễn Thị A làm việc và đóng BHXH, BHYT, BHTN, BHTNLĐ, BNN tại Công ty M từ tháng 7/2016. Tháng 02/2017, Bà A xin nghỉ không lương từ tháng 3/2017, được đơn vị đồng ý và lập hồ sơ báo giảm Bà A nghỉ không lương với cơ quan BHXH từ tháng 3/2017, cơ quan BHXH giảm giá trị sử dụng của thẻ BHYT từ ngày 01/3/2017. Tháng 5/2017, đơn vị lập hồ sơ bảo giảm Bà A nghỉ việc hưởng chế độ thai sản từ tháng ngày 01/5/2017, cơ quan BHXH ghi giá sử dụng từ ngày 01/5/2017 đến hết thời hạn của thẻ BHYT đã cấp."},{"k":"p","t":"5. Người lao động nghỉ ốm đau dài ngày hoặc nghỉ hưởng chế độ hưu trí, thẻ BHYT đã cấp tiếp tục được sử dụng đến hết tháng đơn vị báo giảm. Thẻ BHYT mới có giá trị sử dụng từ ngày đầu của tháng kế tiếp của tháng báo giảm."},{"k":"p","t":"6. Người lao động vẫn đóng BHYT hằng tháng trong thời gian bị tạm giam, tạm giữ hoặc tạm đình chỉ công tác để điều tra, xem xét kết luận có vi phạm hay không vi phạm pháp luật thì thẻ BHYT đã cấp tiếp tục được sử dụng. Trường hợp cơ quan có thẩm quyền xác định người lao động có tội thì thẻ BHYT được sử dụng đến hết tháng đơn vị có báo giảm."},{"k":"p","t":"7. BHXH tỉnh thực hiện gia hạn giá trị sử dụng thẻ BHYT trên cơ sở dữ liệu quản lý, không thực hiện in đổi thẻ BHYT mới (trừ trường hợp mất, rách, hỏng hoặc thay đổi thông tin trên thẻ).”"},{"k":"p","t":"74. Sửa đổi, bổ sung Điều 48 như sau:"},{"k":"p","t":"“Điều 48. Hệ thống chứng từ, sổ, mẫu biểu"},{"k":"p","t":"Hệ thống chứng từ, sổ, mẫu biểu được mở trên hệ thống phần mềm liên thông để tổng hợp và báo cáo theo Phụ lục đính kèm.”"},{"k":"p","t":"75. Sửa đổi, bổ sung Điểm 1.6 Khoản 1 Điều 51 như sau:"},{"k":"p","t":"“1.6. Giám đốc BHXH huyện phân công, giao nhiệm vụ cho cán bộ, công chức, viên chức và người lao động theo từng lĩnh vực trong Tổ nghiệp vụ để thực hiện đúng các nội dung của Tổ nghiệp vụ quy định tại Văn bản này để thực hiện quy trình thu; cấp sổ BHXH, thẻ BHYT. Cán bộ, công chức, viên chức và người lao động chịu trách nhiệm trước Giám đốc BHXH tỉnh, huyện, trước pháp luật về những nội dung được giao kể cả khi nghỉ chế độ hoặc chuyển công tác.”"},{"k":"p","t":"76. Bổ sung Điểm 2.6 Khoản 2 Điều 51 như sau:"},{"k":"p","t":"“2.6. Quản lý chặt chẽ việc tiếp nhận và sử dụng phôi sổ BHXH và thẻ BHYT theo quy định tại Văn bản này.”"},{"k":"p","t":"77. Sửa đổi, bổ sung Điểm 2.10 Khoản 2 Điều 51 như sau:"},{"k":"p","t":"“2.10. Giám đốc BHXH tỉnh chịu trách nhiệm đối với quyền lợi hưởng của người tham gia và tiền lãi chậm đóng của đơn vị (nếu có) do xử lý hồ sơ giữa các bộ phận nghiệp vụ, cấp mã số BHXH, cập nhật dữ liệu thu, chứng từ nộp tiền đóng BHXH, BHYT, BHTN, cấp sổ BHXH, thẻ BHYT quá thời hạn của đơn vị, người tham gia. Cán bộ, công chức, viên chức và người lao động chịu trách nhiệm trước Giám đốc BHXH tỉnh, trước pháp luật về những nội dung được giao kể cả khi nghỉ chế độ hoặc chuyển công tác.”"},{"k":"p","t":"78. Sửa đổi, bổ sung tên Điểm 3.1 Khoản 3 Điều 51 như sau:"},{"k":"p","t":"“3.1. Ban Thu, Vụ Tài chính - Kế toán, Ban Sổ - Thẻ”"},{"k":"p","t":"79. Bổ sung Tiết đ Điểm 3.1 Khoản 3 Điều 51 như sau:"},{"k":"p","t":"“đ) Phối hợp với Trung tâm CNTT nâng cấp và nghiệm thu phần mềm quản lý thu đáp ứng với yêu cầu quản lý và quy trình thu tại quy định này, sử dụng và bồi dưỡng cán bộ BHXH các cấp các tiện ích trên hệ thống phần mềm quản lý thu.”"},{"k":"p","t":"80. Sửa đổi, bổ sung tên Điểm 3.4 Khoản 3 Điều 51 như sau:"},{"k":"p","t":"“3.4. Các Ban, Vụ: Kế hoạch và Đầu tư, Thực hiện chính sách BHXH, Thực hiện chính sách BHYT, Pháp chế, Văn phòng và Trung tâm CNTT phối hợp với Ban Thu, Ban Sổ - Thẻ:”"},{"k":"p","t":"81. Sửa đổi, bổ sung Điểm 1.6 Khoản 1 Phụ lục 01 như sau:"},{"k":"p","t":"“- Quyết định phục viên hoặc xuất ngũ hoặc thôi việc (Trường hợp quân nhân bị mất quyết định phục viên, xuất ngũ thì cung cấp giấy xác nhận của Thủ trưởng cấp Trung đoàn và tương đương trở lên nơi trực tiếp quản lý đối tượng trước khi phục viên, xuất ngũ hoặc trực tiếp quản lý đối tượng sau khi phục viên xuất ngũ tại địa phương).”"},{"k":"p","t":"82. Sửa đổi, bổ sung Tiết 1.1 Điểm 1 Mục I Phụ lục 03"},{"k":"p","t":"“1.1. Người có công với cách mạng theo quy định tại Pháp lệnh Ưu đãi người có công với cách mạng, bao gồm: Người hoạt động cách mạng trước ngày 01/01/1945; người hoạt động cách mạng từ ngày 01/01/1945 đến ngày khởi nghĩa tháng 8/1945; Bà mẹ Việt Nam anh hùng; thương binh, người hưởng chính sách như thương binh, thương binh loại B, bệnh binh suy giảm khả năng lao động từ 81% trở lên; người hoạt động kháng chiến bị nhiễm chất độc hóa học có tỷ lệ suy giảm khả năng lao động từ 81% trở lên. Hồ sơ làm căn cứ điều chỉnh mức quyền lợi trên thẻ BHYT gồm một trong các loại giấy tờ sau:"},{"k":"p","t":"a) Thẻ thương binh, thẻ bệnh binh;"},{"k":"p","t":"b) Giấy chứng nhận người hưởng chính sách như thương binh;"},{"k":"p","t":"c) Quyết định công nhận là người hoạt động cách mạng trước ngày 01/01/1945, người hoạt động cách mạng từ ngày 01/01/1945 đến ngày khởi nghĩa tháng 8/1945 của Ban Thường vụ tỉnh ủy, Thành ủy trực thuộc Trung ương;"},{"k":"p","t":"d) Quyết định hưởng trợ cấp của Sở Lao động - Thương binh và Xã hội."},{"k":"p","t":"đ) Giấy xác nhận của Sở Lao động Thương binh và Xã hội nơi đang hưởng trợ cấp hằng tháng hoặc đã giải quyết trợ cấp một lần (theo hướng dẫn về cơ sở xác định là người có công với cách mạng tại Công văn số 467/NCC ngày 17/6/2010 của Bộ Lao động - Thương binh và Xã hội);"},{"k":"p","t":"“e) Quyết định hưởng trợ cấp, phụ cấp đối với người hoạt động kháng chiến bị nhiễm chất độc hóa học, ghi rõ tỷ lệ suy giảm khả năng lao động từ 81% trở lên theo quy định tại Thông tư số 05/2013/TT-BLĐTBXH ngày 15/5/2013 của Bộ Lao động - Thương binh & Xã hội.”"},{"k":"p","t":"83. Sửa đổi, bổ sung tên Khoản 2 Mục I Phụ lục 03"},{"k":"p","t":"“2. Cựu chiến binh theo quy định tại Nghị định số 150/2006/NĐ-CP, Nghị định số 157/2016/NĐ-CP”"},{"k":"p","t":"84. Sửa đổi, bổ sung Tiết a Điểm 2.2 Khoản 2 Mục I Phụ lục 03"},{"k":"p","t":"“a) Quyết định phục viên hoặc xuất ngũ hoặc chuyển ngành ghi rõ thời gian, địa điểm nơi trực tiếp chiến đấu, trực tiếp phục vụ chiến đấu theo quy định tại Quyết định 62/2011/QĐ-TTg ngày 09/11/2011 của Thủ tướng Chính phủ. Trường hợp Quyết định phục viên, xuất ngũ, chuyển ngành không ghi rõ thời gian, địa điểm nơi trực tiếp chiến đấu, trực tiếp phục vụ chiến đấu thì bổ sung bản xác nhận về địa bàn phục vụ trong quân đội của cấp trung đoàn hoặc tương đương trở lên nơi trực tiếp quản lý đối tượng trước khi phục viên, xuất ngũ theo mẫu số 04B-HBKV - Bản khai cá nhân về thời gian, địa bàn phục vụ trong quân đội có hưởng phụ cấp khu vực (ban hành kèm theo Thông tư số 181/2016/TT-BQP đối với người có thời gian phục vụ trong quân đội trước ngày 01/01/2007).”"},{"k":"p","t":"85. Sửa đổi, bổ sung tên Điểm 2.3 Khoản 2 Mục I Phụ lục 03"},{"k":"p","t":"“2.3. Cựu chiến binh là sỹ quan, quân nhân chuyên nghiệp tại ngũ được nghỉ hưu."},{"k":"p","t":"Cơ quan BHXH căn cứ hồ sơ, dữ liệu của sỹ quan, quân nhân chuyên nghiệp tại ngũ được cơ quan quân đội giải quyết hưu, để cấp thẻ theo quyền lợi của đối tượng cựu chiến binh.”"},{"k":"p","t":"86. Sửa đổi, bổ sung tên Điểm 2.4 Khoản 1 Mục I Phụ lục 03"},{"k":"p","t":"“2.4. Sĩ quan, quân nhân chuyên nghiệp đã hoàn thành nhiệm vụ tại ngũ trong thời kỳ xây dựng và bảo vệ tổ quốc đã nghỉ hưu, phục viên, xuất ngũ, chuyển ngành.”"},{"k":"p","t":"Hồ sơ làm căn cứ điều chỉnh quyền lợi in trên thẻ BHYT gồm một trong các loại giấy tờ sau: Quyết định phục viên xuất ngũ hoặc chuyển ngành.”"},{"k":"p","t":"87. Sửa đổi, bổ sung Khoản 4 Mục I Phụ lục 03"},{"k":"p","t":"“4. Người dân tộc thiể
