u số đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn; người đang sinh sống tại vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn; người đang sinh sống tại xã đảo, huyện đạo. Cơ quan BHXH căn cứ sổ hộ khẩu để điều chỉnh quyền lợi in trên thẻ BHYT.”"},{"k":"p","t":"88. Sửa đổi, bổ sung Khoản 7 Mục I Phụ lục 03"},{"k":"p","t":"“7. Người thuộc hộ gia đình nghèo và hộ gia đình cận nghèo:"},{"k":"p","t":"Hồ sơ làm căn cứ điều chỉnh quyền lợi in trên thẻ BHTY gồm một trong các loại giấy tờ sau:"},{"k":"p","t":"a) Giấy chứng nhận học sinh, sinh viên thuộc hộ nghèo theo Thông tư liên tịch số 18/2009/TTLT-BGDĐT-BTC-BLĐTBXH."},{"k":"p","t":"b) Xác nhận của chủ tịch UBND xã, phường, thị trấn đối với người thuộc hộ gia đình nghèo, hộ gia đình cận nghèo theo kết quả rà soát thường xuyên (quy định tại Điều 5 Thông tư số 17/2016/TT-BLĐTBXH) và Thông tư số 14/2018/TT-BLĐTBXH).”"},{"k":"p","t":"89. Sửa đổi, bổ sung Khoản 1 Mục II Phụ lục 03"},{"k":"p","t":"“1. Người tham gia hoặc đơn vị yêu cầu thay đổi thông tin trên thẻ BHYT"},{"k":"p","t":"1.1. Trường hợp thay đổi thông tin về nhân thân do người tham gia kê khai sai so với hồ sơ gốc"},{"k":"p","t":"Hồ sơ làm căn cứ thay đổi thông tin in trên thẻ BHYT gồm một trong các loại giấy tờ sau: Chứng minh thư hoặc thẻ căn cước công dân hoặc hộ chiếu hoặc các giấy tờ tùy thân có ảnh khác do cơ quan, tổ chức có thẩm quyền cấp như: Giấy xác nhận của Công an cấp xã hoặc giấy xác nhận của cơ sở giáo dục nơi quản lý học sinh, sinh viên ..."},{"k":"p","t":"1.2. Trường hợp thay đổi thông tin về nhân thân do đơn vị kê khai sai so với hồ sơ của người tham gia:"},{"k":"p","t":"Cơ quan BHXH rà soát, thông báo và phối hợp với đơn vị điều chỉnh thông tin in trên thẻ BHYT."},{"k":"p","t":"1.3. Bổ sung mã nơi đối tượng sinh sống đối với người dân tộc thiểu số và người thuộc hộ gia đình nghèo tham gia BHYT đang sinh sống tại vùng có điều kiện kinh tế - xã hội khó khăn, vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn; người tham gia BHYT đang sinh sống tại xã đảo, huyện đảo."},{"k":"p","t":"Hồ sơ làm căn cứ thay đổi thông tin in trên thẻ BHYT gồm một trong các loại giấy tờ sau:"},{"k":"p","t":"a) Đối với người lao động: cơ quan BHXH có trách nhiệm phối hợp với các đơn vị có liên quan rà soát, xác định nơi đối tượng đang làm việc ở địa bàn thuộc vùng nào, cấp mã nơi sinh sống theo vùng đó"},{"k":"p","t":"b) Đối với các đối tượng khác: Sổ hộ khẩu.”"},{"k":"p","t":"90. Sửa đổi, bổ sung Khoản 2 Mục II Phụ lục 03"},{"k":"p","t":"“Chứng minh thư hoặc thẻ căn cước công dân hoặc hộ chiếu hoặc các giấy tờ tùy thân có ảnh khác do cơ quan, tổ chức có thẩm quyền cấp như: Giấy xác nhận của Công an cấp xã hoặc giấy xác nhận của cơ sở giáo dục nơi quản lý học sinh, sinh viên ...”"},{"k":"p","t":"91. Sửa đổi, bổ sung Mẫu biểu ban hành kèm theo Quyết định số 595/QĐ-BHXH, Quyết định số 888/QĐ-BHXH ngày 16/7/2018 của Tổng Giám đốc Bảo hiểm xã hội Việt Nam sửa đổi, bổ sung một số Điều của Quy trình thu BHXH, BHYT, BHTNLĐ, BNN; quản lý sổ BHXH, thẻ BHYT ban hành kèm theo Quyết định số 595/QĐ-BHXH (Mẫu biểu đính kèm)."},{"k":"p","t":"92. Bãi bỏ: Điểm 2.3 Khoản 2 Điều 2; Khoản 4 Điều 3; Điểm 2.4 Khoản 2 Điều 17; Điều 26; Tiết a Điểm 1.3 Khoản 1, Tiết a Điểm 2.3 Khoản 2, Tiết a Điểm 3.3 Khoản 3 Điều 31; Khoản 2 Điều 43; Tiết b, c, d, e, g, h, i, k, l, m, Điểm 2.1, Mục I; Tiết b, c, d, e, Điểm 2.2, Mục I Phụ lục 03 ban hành kèm theo Quyết định số 595/QĐ-BHXH, Phụ lục 03 ban hành kèm theo Quyết định số 888/QĐ-BHXH ngày 16/7/2018 của Tổng Giám đốc Bảo hiểm xã hội Việt Nam sửa đổi, bổ sung một số Điều của Quy trình thu BHXH, BHYT, BHTNLĐ, BNN; quản lý sổ BHXH, thẻ BHYT ban hành kèm theo Quyết định số 595/QĐ-BHXH; Quyết định 618/QĐ-BHXH ngày 30/5/2019 của BHXH Việt Nam về việc ban hành mẫu Thông báo Kết quả đóng bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, bệnh nghề nghiệp (Mẫu C12-TS); Công văn số 2326/BHXH-BT ngày 27/6/2019 của BHXH Việt Nam về việc cung cấp chi tiết tình hình đóng bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, bệnh nghề nghiệp."}]},{"id":"qd505_2","no":2,"code":"Điều 2","title":"Điều 2. Quyết định này có hiệu lực thi hành từ ngày 01/5/2020. Các văn bản quy định do Bảo hiểm xã hội Việt Nam ban hành trước đây trái với Quyết định này đều hết hiệu lực.","shortTitle":"Quyết định này có hiệu lực thi hành từ ngày 01/5/2020. Các văn bản quy định do Bảo hiểm xã hội Việt Nam ban hành trước đây trái với Quyết định này đều hết hiệu lực.","chuong":"","muc":"","level":1,"content":[]},{"id":"qd505_3","no":3,"code":"Điều 3","title":"Điều 3. Trưởng Ban Thu, Trưởng Ban Sổ - Thẻ, Chánh Văn phòng, Thủ trưởng các đơn vị trực thuộc Bảo hiểm xã hội Việt Nam; Giám đốc bảo hiểm xã hội các tỉnh, thành phố trực thuộc Trung ương chịu trách nhiệm thi hành Quyết định này./.","shortTitle":"Trưởng Ban Thu, Trưởng Ban Sổ - Thẻ, Chánh Văn phòng, Thủ trưởng các đơn vị trực thuộc Bảo hiểm xã hội Việt Nam; Giám đốc bảo hiểm xã hội các tỉnh, thành phố trực thuộc Trung ương chịu trách nhiệm thi hành Quyết định này./.","chuong":"","muc":"","level":1,"content":[{"k":"tbl","rows":[["Nơi nhận:- Như Điều 3;- VPCP (để b/c TTg CP, các Phó TTg);- Các Bộ: LĐTB&XH, TC, YT, NV, TP, QP, CA;- UBND tỉnh, TP trực thuộc TƯ;- HĐQL - BHXHVH;- TGĐ, các phó TGĐ;- Các đơn vị trực thuộc BHXH VN;- BHXH Bộ QP, CA;- Lưu: VT, ST, BT(20b).","KT. TỔNG GIÁM ĐỐCPHÓ TỔNG GIÁM ĐỐCTrần Đình Liệu"]]},{"k":"p","t":"FILE ĐÍNH KÈM VĂN BẢN"}]}],"refs":{},"details":{},"summaries":{"qd505_1":{"tldr":"Điều này sửa đổi, bổ sung hàng loạt nội dung của Quy trình thu BHXH, BHYT, BHTN, BHTNLĐ-BNN; quản lý sổ BHXH, thẻ BHYT ban hành kèm Quyết định 595/QĐ-BHXH (92 nhóm sửa đổi), gồm đối tượng tham gia, mức đóng, hồ sơ - thủ tục, quy trình xử lý dữ liệu thu, quản lý nợ và truy thu.","points":["Lao động nước ngoài tham gia BHXH bắt buộc khi có giấy phép lao động/chứng chỉ/giấy phép hành nghề và HĐLĐ không xác định thời hạn hoặc từ đủ 01 năm trở lên; từ 01/01/2022 đóng 8% tiền lương vào quỹ hưu trí, tử tuất, đơn vị đóng 3% vào quỹ ốm đau - thai sản và 14% vào quỹ hưu trí, tử tuất.","Đơn vị nông, lâm, ngư, diêm nghiệp trả lương theo sản phẩm/khoán đăng ký đóng 03 hoặc 06 tháng một lần; đóng BHXH tự nguyện một lần cho những năm còn thiếu khi đủ tuổi hưởng lương hưu nhưng thiếu không quá 10 năm (120 tháng) để đủ 20 năm.","Mức đóng BHYT hằng tháng bằng 4,5% mức lương cơ sở theo từng nhóm (do cơ quan BHXH, ngân sách nhà nước, đối tượng tự đóng hoặc người sử dụng lao động đóng); nhóm tự đóng được ngân sách hỗ trợ tối thiểu 70%, riêng hộ cận nghèo tại huyện nghèo theo Nghị quyết 30a được hỗ trợ 100%.","Bổ sung quy trình xử lý hồ sơ, cấp mã số BHXH (Điều 33a), ghi và quản lý dữ liệu thu (Điều 33b), sử dụng dữ liệu thu (Điều 33c) với các mốc chốt, ký mẫu biểu theo giờ trong ngày (trước 8h30, 8h45, 9h, 9h30; sau 05 phút không ký phần mềm tự khóa dữ liệu); thời gian hoàn thiện mã số, cập nhật dữ liệu, cấp sổ BHXH, thẻ BHYT không quá 02 ngày.","Quản lý nợ phân loại: nợ dưới 01 tháng, từ 01 đến dưới 03 tháng, từ 03 tháng trở lên và các trường hợp nợ khác (phá sản, giải thể, dừng hoạt động, tạm dừng đóng quỹ hưu trí tử tuất, chủ bỏ trốn); đơn vị nợ quá 02 tháng (đóng hằng tháng), 04 tháng (03 tháng/lần), 07 tháng (06 tháng/lần) thì cán bộ thu trực tiếp đôn đốc, gửi văn bản 15 ngày một lần.","Truy thu cộng nối: dưới 03 tháng cán bộ thu tự kiểm tra; từ 03 đến 06 tháng và trên 06 tháng phải lập biên bản trong 07 ngày kể từ ngày nhận đủ hồ sơ, trình Giám đốc BHXH phê duyệt (trên 06 tháng thì thanh tra đột xuất); người có từ 02 sổ BHXH trùng thời gian được hoàn trả phần đã đóng vào quỹ hưu trí, tử tuất và BHTN, không bao gồm tiền lãi."]},"qd505_45":{"tldr":"Điều này sửa đổi, bổ sung các nội dung về kiểm kê, hủy phôi sổ BHXH, thẻ BHYT, ghi và quản lý dữ liệu sổ BHXH, giá trị sử dụng thẻ BHYT, hồ sơ điều chỉnh quyền lợi trên thẻ và bãi bỏ một số quy định của Quyết định 595/QĐ-BHXH.","points":["Định kỳ cuối mỗi quý và cuối năm BHXH tỉnh/huyện kiểm kê phôi sổ BHXH, thẻ BHYT (lập Biên bản Mẫu C32-HD); định kỳ trước 15/3 hằng năm Hội đồng hủy do Lãnh đạo BHXH tỉnh làm Chủ tịch hủy sổ, thẻ hỏng đã lưu giữ trên 01 năm (lập biên bản Mẫu C10-TS).","Sổ BHXH ghi đầy đủ theo từng giai đoạn (kể cả thời gian không làm việc và không hưởng lương từ 14 ngày làm việc trở lên trong tháng); đơn vị nợ thì xác nhận sổ đến thời điểm đã đóng, thu hồi xong nợ thì xác nhận bổ sung; người có từ 2 sổ trở lên được gộp sổ, nếu trùng thời gian thì lập Quyết định hoàn trả (Mẫu C16-TS).","Thẻ BHYT có giá trị tương ứng số tiền đóng (trừ trẻ em dưới 6 tuổi); người hưởng trợ cấp thất nghiệp có giá trị từ tháng đầu tiên; trẻ sinh trước 30/9 dùng đến hết 30/9 năm đủ 72 tháng tuổi, sinh sau 30/9 dùng đến hết ngày cuối tháng đủ 72 tháng tuổi.","Đối tượng tham gia liên tục có thẻ BHYT giá trị từ ngày đóng; tham gia lần đầu hoặc không liên tục từ 3 tháng trở lên trong năm tài chính thì thẻ có giá trị sau 30 ngày kể từ ngày nộp tiền; chậm đóng từ 30 ngày trở lên thì đơn vị chịu trách nhiệm theo Điều 49 Luật BHYT.","Người tham gia được đổi cơ sở KCB ban đầu vào tháng đầu quý; lao động nghỉ ốm đau, thai sản tiếp tục dùng thẻ đã cấp; BHXH tỉnh gia hạn giá trị thẻ trên cơ sở dữ liệu, không in đổi thẻ mới trừ khi mất, rách, hỏng hoặc thay đổi thông tin.","Bãi bỏ nhiều điểm, khoản, tiết của Quyết định 595/QĐ-BHXH và Quyết định 888/QĐ-BHXH ngày 16/7/2018, Quyết định 618/QĐ-BHXH ngày 30/5/2019 (Mẫu C12-TS) và Công văn 2326/BHXH-BT ngày 27/6/2019."]},"qd505_3":{"tldr":"Trưởng Ban Thu, Trưởng Ban Sổ - Thẻ, Chánh Văn phòng, Thủ trưởng các đơn vị trực thuộc Bảo hiểm xã hội Việt Nam và Giám đốc bảo hiểm xã hội các tỉnh, thành phố trực thuộc Trung ương chịu trách nhiệm thi hành Quyết định này.","points":[]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
