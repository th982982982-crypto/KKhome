","Số giờ làm thêm không quá 50% số giờ làm việc bình thường trong 01 ngày; theo tuần thì tổng số giờ làm việc bình thường và làm thêm không quá 12 giờ/ngày; không quá 40 giờ trong 01 tháng.","Không quá 200 giờ trong 01 năm, trừ trường hợp quy định tại khoản 3.","Được làm thêm không quá 300 giờ/năm trong một số ngành, nghề như dệt, may, da, giày, điện, điện tử, chế biến nông, lâm, diêm nghiệp, thủy sản; điện, viễn thông, lọc dầu, cấp thoát nước; công việc trình độ cao thị trường không cung ứng kịp; công việc cấp bách; trường hợp khác do Chính phủ quy định.","Khi tổ chức làm thêm theo khoản 3 phải thông báo bằng văn bản cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh."]},"blld-45_108":{"tldr":"Trong trường hợp đặc biệt, người sử dụng lao động có quyền yêu cầu làm thêm giờ vào bất kỳ ngày nào không bị giới hạn số giờ theo Điều 107 và người lao động không được từ chối.","points":["Thực hiện lệnh động viên, huy động bảo đảm nhiệm vụ quốc phòng, an ninh theo quy định pháp luật.","Thực hiện công việc bảo vệ tính mạng, tài sản trong phòng ngừa, khắc phục hậu quả thiên tai, hỏa hoạn, dịch bệnh nguy hiểm và thảm họa, trừ trường hợp có nguy cơ ảnh hưởng đến tính mạng, sức khỏe người lao động theo pháp luật về an toàn, vệ sinh lao động."]},"blld-45_109":{"tldr":"Người lao động làm việc từ 06 giờ trở lên trong ngày được nghỉ giữa giờ ít nhất 30 phút liên tục, làm ban đêm ít nhất 45 phút liên tục.","points":["Làm việc theo ca liên tục từ 06 giờ trở lên thì thời gian nghỉ giữa giờ được tính vào giờ làm việc.","Ngoài thời gian nghỉ trên, người sử dụng lao động bố trí các đợt nghỉ giải lao và ghi vào nội quy lao động."]},"blld-45_111":{"tldr":"Mỗi tuần người lao động được nghỉ ít nhất 24 giờ liên tục; trường hợp đặc biệt thì bình quân 01 tháng được nghỉ ít nhất 04 ngày.","points":["Trường hợp đặc biệt do chu kỳ lao động không thể nghỉ hằng tuần thì bảo đảm bình quân 01 tháng ít nhất 04 ngày.","Người sử dụng lao động có quyền sắp xếp ngày nghỉ hằng tuần vào Chủ nhật hoặc ngày khác trong tuần nhưng phải ghi vào nội quy lao động.","Nếu ngày nghỉ hằng tuần trùng ngày nghỉ lễ, tết theo khoản 1 Điều 112 thì được nghỉ bù vào ngày làm việc kế tiếp."]},"blld-45_112":{"tldr":"Người lao động được nghỉ làm việc hưởng nguyên lương trong các ngày lễ, tết theo quy định; lao động nước ngoài được nghỉ thêm 01 ngày Tết cổ truyền và 01 ngày Quốc khánh của nước họ.","points":["Tết Dương lịch 01 ngày; Tết Âm lịch 05 ngày; Ngày Chiến thắng (30/4) 01 ngày; Ngày Quốc tế lao động (01/5) 01 ngày; Quốc khánh 02 ngày (02/9 và 01 ngày liền kề trước hoặc sau); Giỗ Tổ Hùng Vương (10/3 âm lịch) 01 ngày.","Lao động nước ngoài được nghỉ thêm 01 ngày Tết cổ truyền dân tộc và 01 ngày Quốc khánh của nước họ.","Hằng năm Thủ tướng Chính phủ quyết định cụ thể ngày nghỉ tại điểm b và điểm đ khoản 1."]},"blld-45_113":{"tldr":"Người lao động làm đủ 12 tháng cho một người sử dụng lao động được nghỉ hằng năm hưởng nguyên lương, số ngày tùy điều kiện công việc; làm chưa đủ 12 tháng thì nghỉ theo tỷ lệ tương ứng.","points":["Nghỉ 12 ngày với công việc bình thường; 14 ngày với người chưa thành niên, khuyết tật, nghề nặng nhọc độc hại nguy hiểm; 16 ngày với nghề đặc biệt nặng nhọc độc hại nguy hiểm.","Thôi việc, mất việc mà chưa nghỉ hoặc chưa nghỉ hết được thanh toán tiền lương cho những ngày chưa nghỉ.","Người sử dụng lao động quy định lịch nghỉ sau khi tham khảo ý kiến người lao động; có thể thỏa thuận nghỉ nhiều lần hoặc nghỉ gộp tối đa 03 năm một lần.","Nếu đi đường bộ, sắt, thủy mà số ngày đi và về trên 02 ngày thì từ ngày thứ 03 trở đi được tính thêm thời gian đi đường, chỉ tính cho 01 lần nghỉ trong năm.","Chính phủ quy định chi tiết Điều này."]},"blld-45_115":{"tldr":"Người lao động được nghỉ việc riêng hưởng nguyên lương khi kết hôn (03 ngày), con kết hôn (01 ngày), người thân thiết chết (03 ngày), và nghỉ không hưởng lương 01 ngày trong một số trường hợp khác.","points":["Nghỉ hưởng nguyên lương (phải thông báo): kết hôn 03 ngày; con đẻ, con nuôi kết hôn 01 ngày; cha mẹ đẻ/nuôi, cha mẹ vợ/chồng, vợ/chồng, con đẻ/nuôi chết 03 ngày.","Nghỉ không hưởng lương 01 ngày (phải thông báo) khi ông bà nội ngoại, anh chị em ruột chết; cha hoặc mẹ kết hôn; anh chị em ruột kết hôn.","Ngoài các trường hợp trên, người lao động có thể thỏa thuận với người sử dụng lao động để nghỉ không hưởng lương."]},"blld-45_116":{"tldr":"Đối với các công việc có tính chất đặc biệt, các Bộ, ngành quản lý quy định cụ thể thời giờ làm việc, thời giờ nghỉ ngơi sau khi thống nhất với Bộ Lao động - Thương binh và Xã hội và phải tuân thủ Điều 109 của Bộ luật này.","points":["Áp dụng cho công việc có tính chất đặc biệt như vận tải đường bộ/sắt/thủy/hàng không, dầu khí trên biển, làm việc trên biển, nghệ thuật, bức xạ và hạt nhân, sóng cao tần, tin học, nghiên cứu khoa học công nghệ tiên tiến, thiết kế công nghiệp, thợ lặn, hầm lò, sản xuất thời vụ, gia công theo đơn đặt hàng, thường trực 24/24 giờ và công việc đặc biệt khác do Chính phủ quy định.","Các Bộ, ngành quản lý quy định cụ thể sau khi thống nhất với Bộ Lao động - Thương binh và Xã hội và phải tuân thủ Điều 109 của Bộ luật này."]},"blld-45_118":{"tldr":"Người sử dụng lao động phải ban hành nội quy lao động; nếu sử dụng từ 10 người lao động trở lên thì phải bằng văn bản, với các nội dung chủ yếu được quy định.","points":["Sử dụng từ 10 người lao động trở lên thì nội quy lao động phải bằng văn bản; nội dung không được trái pháp luật về lao động và pháp luật liên quan.","Nội dung chủ yếu gồm: thời giờ làm việc nghỉ ngơi; trật tự nơi làm việc; an toàn vệ sinh lao động; phòng chống quấy rối tình dục; bảo vệ tài sản và bí mật kinh doanh, công nghệ, sở hữu trí tuệ; trường hợp chuyển làm việc khác; hành vi vi phạm và hình thức xử lý kỷ luật; trách nhiệm vật chất; người có thẩm quyền xử lý kỷ luật.","Trước khi ban hành hoặc sửa đổi, bổ sung phải tham khảo ý kiến tổ chức đại diện người lao động tại cơ sở nơi có tổ chức này.","Nội quy phải được thông báo đến người lao động và niêm yết những nội dung chính ở nơi cần thiết.","Chính phủ quy định chi tiết Điều này."]},"blld-45_119":{"tldr":"Người sử dụng lao động sử dụng từ 10 người lao động trở lên phải đăng ký nội quy lao động tại cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh nơi đăng ký kinh doanh.","points":["Trong thời hạn 10 ngày kể từ ngày ban hành nội quy lao động phải nộp hồ sơ đăng ký.","Trong thời hạn 07 ngày làm việc kể từ ngày nhận hồ sơ, nếu nội dung trái pháp luật thì cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh thông báo, hướng dẫn sửa đổi, bổ sung và đăng ký lại.","Có chi nhánh, đơn vị, cơ sở ở nhiều địa bàn thì gửi nội quy đã đăng ký đến cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh nơi đặt các đơn vị đó.","Cơ quan chuyên môn về lao động cấp tỉnh có thể ủy quyền cho cơ quan chuyên môn về lao động cấp huyện thực hiện đăng ký."]},"blld-45_120":{"tldr":"Hồ sơ đăng ký nội quy lao động gồm văn bản đề nghị, nội quy lao động, văn bản góp ý của tổ chức đại diện người lao động và các văn bản liên quan đến kỷ luật, trách nhiệm vật chất (nếu có).","points":["Văn bản đề nghị đăng ký nội quy lao động.","Nội quy lao động.","Văn bản góp ý của tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức này.","Các văn bản của người sử dụng lao động có quy định liên quan đến kỷ luật lao động và trách nhiệm vật chất (nếu có)."]},"blld-45_121":{"tldr":"Nội quy lao động có hiệu lực sau 15 ngày kể từ ngày cơ quan nhà nước có thẩm quyền nhận được đầy đủ hồ sơ đăng ký; trường hợp dưới 10 người lao động ban hành bằng văn bản thì hiệu lực do người sử dụng lao động quyết định trong nội quy.","points":["Có hiệu lực sau 15 ngày kể từ ngày cơ quan có thẩm quyền theo Điều 119 nhận đầy đủ hồ sơ đăng ký.","Trường hợp sử dụng dưới 10 người lao động ban hành nội quy bằng văn bản thì hiệu lực do người sử dụng lao động quyết định trong nội quy lao động."]},"blld-45_122":{"tldr":"Việc xử lý kỷ luật lao động phải tuân theo các nguyên tắc về chứng minh lỗi, sự tham gia của tổ chức đại diện, quyền bào chữa và lập biên bản; có các giới hạn và trường hợp không được xử lý kỷ luật.","points":["Người sử dụng lao động phải chứng minh lỗi; có sự tham gia của tổ chức đại diện người lao động tại cơ sở mà người bị xử lý là thành viên; người lao động có mặt và có quyền tự bào chữa, nhờ luật sư hoặc tổ chức đại diện; người chưa đủ 15 tuổi phải có người đại diện theo pháp luật; phải ghi thành biên bản.","Không áp dụng nhiều hình thức xử lý kỷ luật đối với một hành vi vi phạm.","Một người có nhiều hành vi vi phạm thì chỉ áp dụng hình thức kỷ luật cao nhất tương ứng với hành vi nặng nhất.","Không xử lý kỷ luật khi đang nghỉ ốm đau, điều dưỡng, nghỉ được đồng ý; bị tạm giữ, tạm giam; chờ kết quả điều tra theo khoản 1 và 2 Điều 125; lao động nữ mang thai, nghỉ thai sản, nuôi con dưới 12 tháng tuổi.","Không xử lý kỷ luật người vi phạm trong khi mắc bệnh tâm thần hoặc bệnh khác làm mất khả năng nhận thức hoặc điều khiển hành vi.","Chính phủ quy định trình tự, thủ tục xử lý kỷ luật lao động."]},"blld-45_123":{"tldr":"Thời hiệu xử lý kỷ luật lao động là 06 tháng kể từ ngày xảy ra hành vi vi phạm, hoặc 12 tháng nếu liên quan trực tiếp đến tài chính, tài sản, tiết lộ bí mật công nghệ, bí mật kinh doanh.","points":["Thời hiệu 06 tháng kể từ ngày xảy ra vi phạm; 12 tháng nếu liên quan trực tiếp đến tài chính, tài sản, tiết lộ bí mật công nghệ, bí mật kinh doanh.","Khi hết thời gian quy định tại khoản 4 Điều 122, nếu hết thời hiệu hoặc còn nhưng không đủ 60 ngày thì được kéo dài để xử lý nhưng không quá 60 ngày kể từ ngày hết thời gian đó.","Người sử dụng lao động phải ban hành quyết định xử lý kỷ luật trong thời hạn quy định tại khoản 1 và khoản 2 Điều này."]},"blld-45_125":{"tldr":"Người sử dụng lao động được áp dụng hình thức sa thải trong các trường hợp như trộm cắp, tham ô, tiết lộ bí mật, tái phạm khi chưa xóa kỷ luật, hoặc tự ý bỏ việc theo mức quy định.","points":["Trộm cắp, tham ô, đánh bạc, cố ý gây thương tích, sử dụng ma túy tại nơi làm việc.","Tiết lộ bí mật kinh doanh, bí mật công nghệ, xâm phạm sở hữu trí tuệ, gây thiệt hại nghiêm trọng hoặc đe dọa gây thiệt hại đặc biệt nghiêm trọng về tài sản, lợi ích, hoặc quấy rối tình dục tại nơi làm việc theo nội quy lao động.","Bị xử lý kỷ luật kéo dài thời hạn nâng lương hoặc cách chức mà tái phạm trong thời gian chưa xóa kỷ luật.","Tự ý bỏ việc 05 ngày cộng dồn trong 30 ngày hoặc 20 ngày cộng dồn trong 365 ngày tính từ ngày đầu tự ý bỏ việc mà không có lý do chính đáng.","Lý do chính đáng gồm thiên tai, hỏa hoạn, bản thân hoặc thân nhân bị ốm có xác nhận của cơ sở khám chữa bệnh có thẩm quyền và trường hợp khác quy định trong nội quy lao động."]},"blld-45_126":{"tldr":"Người lao động bị kỷ luật đương nhiên được xóa kỷ luật sau các thời hạn nhất định nếu không tiếp tục vi phạm, và có thể được xét giảm thời hạn nếu sửa chữa tiến bộ.","points":["Bị khiển trách sau 03 tháng, kéo dài thời hạn nâng lương sau 06 tháng, cách chức sau 03 năm kể từ ngày bị xử lý, nếu không tiếp tục vi phạm thì đương nhiên được xóa kỷ luật.","Bị kéo dài thời hạn nâng lương sau khi chấp hành được một nửa thời hạn, nếu sửa chữa tiến bộ thì có thể được người sử dụng lao động xét giảm thời hạn."]},"blld-45_127":{"tldr":"Khi xử lý kỷ luật lao động, nghiêm cấm xâm phạm thân thể, danh dự người lao động, phạt tiền hoặc cắt lương thay xử lý kỷ luật, và xử lý hành vi không được quy định trong nội quy, hợp đồng hoặc pháp luật.","points":["Cấm xâm phạm sức khỏe, danh dự, tính mạng, uy tín, nhân phẩm của người lao động.","Cấm phạt tiền, cắt lương thay việc xử lý kỷ luật lao động.","Cấm xử lý kỷ luật đối với hành vi không được quy định trong nội quy lao động, không thỏa thuận trong hợp đồng lao động đã giao kết hoặc pháp luật về lao động không quy định."]},"blld-45_128":{"tldr":"Người sử dụng lao động có quyền tạm đình chỉ công việc khi vụ việc vi phạm phức tạp, thời hạn không quá 15 ngày (đặc biệt không quá 90 ngày), người lao động được tạm ứng 50% tiền lương.","points":["Được tạm đình chỉ khi vụ việc có tình tiết phức tạp và để tiếp tục làm việc sẽ gây khó khăn cho xác minh; chỉ thực hiện sau khi tham khảo ý kiến tổ chức đại diện người lao động tại cơ sở mà người đó là thành viên.","Thời hạn tạm đình chỉ không quá 15 ngày, trường hợp đặc biệt không quá 90 ngày; được tạm ứng 50% tiền lương trước khi bị đình chỉ.","Hết thời hạn tạm đình chỉ phải nhận người lao động trở lại làm việc.","Nếu bị xử lý kỷ luật, người lao động không phải trả lại số tiền lương đã tạm ứng.","Nếu không bị xử lý kỷ luật thì được trả đủ tiền lương cho thời gian bị tạm đình chỉ công việc."]},"blld-45_129":{"tldr":"Người lao động làm hư hỏng hoặc làm mất tài sản của người sử dụng lao động phải bồi thường theo pháp luật hoặc nội quy lao động; có giới hạn bồi thường cho thiệt hại không nghiêm trọng do sơ suất.","points":["Làm hư hỏng dụng cụ, thiết bị hoặc gây thiệt hại tài sản thì phải bồi thường theo pháp luật hoặc nội quy lao động.","Thiệt hại không nghiêm trọng do sơ suất với giá trị không quá 10 tháng lương tối thiểu vùng do Chính phủ công bố thì bồi thường nhiều nhất là 03 tháng tiền lương và bị khấu trừ hằng tháng vào lương theo khoản 3 Điều 102.","Làm mất dụng cụ, thiết bị, tài sản hoặc tiêu hao vật tư quá định mức thì bồi thường một phần hoặc toàn bộ theo thời giá thị trường hoặc nội quy; có hợp đồng trách nhiệm thì bồi thường theo hợp đồng đó.","Do thiên tai, hỏa hoạn, địch họa, dịch bệnh nguy hiểm, thảm họa, sự kiện khách quan không thể lường trước và khắc phục dù đã áp dụng mọi biện pháp thì không phải bồi thường."]},"blld-45_130":{"tldr":"Việc quyết định mức bồi thường thiệt hại phải căn cứ vào lỗi, mức độ thiệt hại thực tế và hoàn cảnh thực tế của người lao động; Chính phủ quy định trình tự, thủ tục, thời hiệu.","points":["Xem xét, quyết định mức bồi thường phải căn cứ vào lỗi, mức độ thiệt hại thực tế và hoàn cảnh thực tế gia đình, nhân thân, tài sản của người lao động.","Chính phủ quy định trình tự, thủ tục, thời hiệu xử lý việc bồi thường thiệt hại."]},"blld-45_131":{"tldr":"Người bị xử lý kỷ luật, tạm đình chỉ công việc hoặc phải bồi thường theo chế độ trách nhiệm vật chất nếu thấy không thỏa đáng có quyền khiếu nại hoặc yêu cầu giải quyết tranh chấp lao động.","points":["Có quyền khiếu nại với người sử dụng lao động, với cơ quan có thẩm quyền theo pháp luật hoặc yêu cầu giải quyết tranh chấp lao động theo trình tự pháp luật quy định.","Chính phủ quy định chi tiết Điều này."]},"blld-45_134":{"tldr":"Người sử dụng lao động có trách nhiệm thực hiện đầy đủ các giải pháp bảo đảm an toàn, vệ sinh lao động; người lao động có trách nhiệm chấp hành quy định và nắm vững kiến thức, kỹ năng về an toàn, vệ sinh lao động.","points":["Người sử dụng lao động thực hiện đầy đủ các giải pháp bảo đảm an toàn, vệ sinh lao động tại nơi làm việc.","Người lao động chấp hành quy định, nội quy, quy trình, yêu cầu về an toàn, vệ sinh lao động; tuân thủ pháp luật và nắm vững kiến thức, kỹ năng về các biện pháp bảo đảm an toàn, vệ sinh lao động."]},"blld-45_135":{"tldr":"Nhà nước bảo đảm bình đẳng giới, phòng chống quấy rối tình dục, khuyến khích tạo điều kiện việc làm và có các chính sách hỗ trợ lao động nữ.","points":["Bảo đảm quyền bình đẳng của lao động nữ, lao động nam, thực hiện biện pháp bình đẳng giới và phòng, chống quấy rối tình dục tại nơi làm việc.","Khuyến khích người sử dụng lao động tạo việc làm thường xuyên, áp dụng thời gian biểu linh hoạt, làm việc không trọn thời gian, giao việc làm tại nhà.","Có biện pháp tạo việc làm, cải thiện điều kiện lao động, nâng cao trình độ nghề, chăm sóc sức khỏe, tăng phúc lợi cho lao động nữ.","Có chính sách giảm thuế đối với người sử dụng lao động sử dụng nhiều lao động nữ theo pháp luật về thuế.","Nhà nước có kế hoạch tổ chức nhà trẻ, lớp mẫu giáo ở nơi có nhiều lao động, mở rộng loại hình đào tạo thuận lợi cho lao động nữ.","Chính phủ quy định chi tiết Điều này."]},"blld-45_136":{"tldr":"Người sử dụng lao động có trách nhiệm bảo đảm bình đẳng giới, tham khảo ý kiến lao động nữ, bảo đảm buồng tắm và vệ sinh, và hỗ trợ xây dựng nhà trẻ, lớp mẫu giáo.","points":["Bảo đảm bình đẳng giới và biện pháp thúc đẩy bình đẳng giới trong tuyển dụng, bố trí việc làm, đào tạo, thời giờ làm việc nghỉ ngơi, tiền lương và các chế độ khác.","Tham khảo ý kiến lao động nữ hoặc đại diện khi quyết định vấn đề liên quan đến quyền và lợi ích của phụ nữ.","Bảo đảm có đủ buồng tắm và buồng vệ sinh phù hợp tại nơi làm việc.","Giúp đỡ, hỗ trợ xây dựng nhà trẻ, lớp mẫu giáo hoặc một phần chi phí gửi trẻ, mẫu giáo cho người lao động."]},"blld-45_137":{"tldr":"Bộ luật bảo vệ thai sản: hạn chế làm việc ban đêm, làm thêm, công tác xa với lao động mang thai hoặc nuôi con nhỏ; cấm sa thải vì lý do thai sản; quy định nghỉ trong thời gian hành kinh và nuôi con.","points":["Không sử dụng làm việc ban đêm, làm thêm giờ, công tác xa khi mang thai từ tháng thứ 07 (hoặc từ tháng thứ 06 nếu làm ở vùng cao, sâu, xa, biên giới, hải đảo); hoặc đang nuôi con dưới 12 tháng tuổi, trừ khi người lao động đồng ý.","Lao động nữ làm nghề nặng nhọc độc hại nguy hiểm hoặc ảnh hưởng xấu tới chức năng sinh sản và nuôi con khi mang thai và có thông báo thì được chuyển công việc nhẹ hơn, an toàn hơn hoặc giảm 01 giờ làm việc hằng ngày mà không bị cắt giảm lương và quyền lợi đến hết thời gian nuôi con dưới 12 tháng tuổi.","Không sa thải hoặc đơn phương chấm dứt hợp đồng vì lý do kết hôn, mang thai, nghỉ thai sản, nuôi con dưới 12 tháng tuổi, trừ một số trường hợp người sử dụng lao động chết, mất tích, chấm dứt hoạt động hoặc không có người đại diện.","Hợp đồng hết hạn trong thời gian mang thai hoặc nuôi con dưới 12 tháng tuổi thì được ưu tiên giao kết hợp đồng mới.","Trong thời gian hành kinh được nghỉ mỗi ngày 30 phút, trong thời gian nuôi con dưới 12 tháng tuổi được nghỉ mỗi ngày 60 phút và vẫn hưởng đủ tiền lương theo hợp đồng."]},"blld-45_138":{"tldr":"Lao động nữ mang thai có xác nhận của cơ sở khám chữa bệnh có thẩm quyền về việc tiếp tục làm việc sẽ ảnh hưởng xấu tới thai nhi thì có quyền đơn phương chấm dứt hoặc tạm hoãn hợp đồng lao động.","points":["Có quyền đơn phương chấm dứt hoặc tạm hoãn hợp đồng lao động khi có xác nhận của cơ sở khám chữa bệnh có thẩm quyền về việc tiếp tục làm việc sẽ ảnh hưởng xấu tới thai nhi.","Khi đơn phương chấm dứt hoặc tạm hoãn phải thông báo cho người sử dụng lao động kèm xác nhận của cơ sở khám chữa bệnh có thẩm quyền.","Trường hợp tạm hoãn, thời gian do hai bên thỏa thuận nhưng tối thiểu bằng thời gian cơ sở khám chữa bệnh chỉ định tạm nghỉ; không có chỉ định thì hai bên thỏa thuận về thời gian tạm hoãn."]},"blld-45_139":{"tldr":"Lao động nữ được nghỉ thai sản trước và sau khi sinh con 06 tháng (nghỉ trước sinh không quá 02 tháng), hưởng chế độ thai sản theo bảo hiểm xã hội; có quy định nghỉ thêm, đi làm sớm và chế độ với lao động nam, nhận con nuôi.","points":["Nghỉ thai sản trước và sau khi sinh con là 06 tháng, thời gian nghỉ trước khi sinh không quá 02 tháng; sinh đôi trở lên thì từ con thứ 02, mỗi con mẹ được nghỉ thêm 01 tháng.","Trong thời gian nghỉ thai sản được hưởng chế độ thai sản theo pháp luật về bảo hiểm xã hội.","Hết thời gian nghỉ thai sản, nếu có nhu cầu có thể nghỉ thêm thời gian không hưởng lương sau khi thỏa thuận với người sử dụng lao động.","Có thể trở lại làm việc khi đã nghỉ ít nhất 04 tháng, phải báo trước, được người sử dụng lao động đồng ý và có xác nhận của cơ sở khám chữa bệnh có thẩm quyền; ngoài tiền lương ngày làm việc vẫn được hưởng trợ cấp thai sản theo bảo hiểm xã hội.","Lao động nam khi vợ sinh con, người nhận nuôi con nuôi dưới 06 tháng tuổi, lao động nữ mang thai hộ và người mẹ nhờ mang thai hộ được nghỉ hưởng chế độ thai sản theo bảo hiểm xã hội."]},"blld-45_140":{"tldr":"Lao động được bảo đảm việc làm cũ khi trở lại làm việc sau khi nghỉ hết thời gian theo các khoản 1, 3 và 5 Điều 139 mà không bị cắt giảm tiền lương và quyền, lợi ích so với trước khi nghỉ thai sản.","points":["Được bảo đảm việc làm cũ, không bị cắt giảm tiền lương và quyền, lợi ích so với trước khi nghỉ thai sản.","Trường hợp việc làm cũ không còn thì người sử dụng lao động phải bố trí việc làm khác với mức lương không thấp hơn mức lương trước khi nghỉ thai sản."]},"blld-45_141":{"tldr":"Người lao động được hưởng trợ cấp theo pháp luật về bảo hiểm xã hội cho thời gian nghỉ việc khi chăm sóc con dưới 07 tuổi ốm đau, khám thai, sẩy thai và thực hiện các biện pháp tránh thai.","points":["Áp dụng cho thời gian nghỉ chăm sóc con dưới 07 tuổi ốm đau, khám thai, sẩy thai, nạo, hút thai, thai chết lưu, phá thai bệnh lý, thực hiện biện pháp tránh thai, triệt sản.","Người lao động được hưởng trợ cấp theo quy định của pháp luật về bảo hiểm xã hội."]},"blld-45_142":{"tldr":"Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành danh mục nghề, công việc có ảnh hưởng xấu tới chức năng sinh sản và nuôi con; người sử dụng lao động phải cung cấp đầy đủ thông tin và bảo đảm điều kiện an toàn.","points":["Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành danh mục nghề, công việc có ảnh hưởng xấu tới chức năng sinh sản và nuôi con.","Người sử dụng lao động phải cung cấp đầy đủ thông tin về tính chất nguy hiểm, nguy cơ, yêu cầu công việc để người lao động lựa chọn và bảo đảm điều kiện an toàn, vệ sinh lao động khi sử dụng họ làm công việc thuộc danh mục đó."]},"blld-45_143":{"tldr":"Lao động chưa thành niên là người lao động chưa đủ 18 tuổi, với các giới hạn về công việc theo từng nhóm tuổi.","points":["Lao động chưa thành niên là người lao động chưa đủ 18 tuổi.","Người từ đủ 15 tuổi đến chưa đủ 18 tuổi không được làm công việc hoặc làm ở nơi làm việc quy định tại Điều 147.","Người từ đủ 13 tuổi đến chưa đủ 15 tuổi chỉ được làm công việc nhẹ theo danh mục do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành.","Người chưa đủ 13 tuổi chỉ được làm các công việc theo quy định tại khoản 3 Điều 145."]},"blld-45_144":{"tldr":"Lao động chưa thành niên chỉ được làm công việc phù hợp sức khỏe; người sử dụng lao động có trách nhiệm chăm sóc, lập sổ theo dõi, có sự đồng ý của cha mẹ và tạo cơ hội học tập.","points":["Lao động chưa thành niên chỉ được làm công việc phù hợp với sức khỏe để bảo đảm phát triển thể lực, trí lực, nhân cách.","Người sử dụng lao động có trách nhiệm quan tâm chăm sóc về lao động, sức khỏe, học tập trong quá trình lao động.","Phải có sự đồng ý của cha, mẹ hoặc người giám hộ; lập sổ theo dõi riêng ghi đầy đủ họ tên, ngày tháng năm sinh, công việc, kết quả kiểm tra sức khỏe định kỳ và xuất trình khi cơ quan có thẩm quyền yêu cầu.","Phải tạo cơ hội để lao động chưa thành niên học văn hóa, giáo dục nghề nghiệp, đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề."]},"blld-45_145":{"tldr":"Khi sử dụng người chưa đủ 15 tuổi làm việc, người sử dụng lao động phải giao kết hợp đồng bằng văn bản, bố trí giờ làm không ảnh hưởng học tập, có giấy khám sức khỏe và bảo đảm điều kiện làm việc phù hợp lứa tuổi.","points":["Phải giao kết hợp đồng lao động bằng văn bản với người chưa đủ 15 tuổi và người đại diện theo pháp luật của người đó.","Bố trí giờ làm việc không ảnh hưởng đến thời gian học tập; phải có giấy khám sức khỏe và tổ chức kiểm tra sức khỏe định kỳ ít nhất một lần trong 06 tháng; bảo đảm điều kiện an toàn, vệ sinh lao động phù hợp lứa tuổi.","Chỉ được tuyển dụng và sử dụng người từ đủ 13 đến chưa đủ 15 tuổi vào công việc nhẹ theo khoản 3 Điều 143.","Không được tuyển dụng, sử dụng người chưa đủ 13 tuổi, trừ công việc nghệ thuật, thể dục, thể thao không tổn hại đến sự phát triển và phải có sự đồng ý của cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết Điều này."]},"blld-45_146":{"tldr":"Thời giờ làm việc của người chưa đủ 15 tuổi không quá 04 giờ/ngày và 20 giờ/tuần; của người từ đủ 15 đến chưa đủ 18 tuổi không quá 08 giờ/ngày và 40 giờ/tuần.","points":["Người chưa đủ 15 tuổi: không quá 04 giờ trong 01 ngày và 20 giờ trong 01 tuần; không được làm thêm giờ, làm việc ban đêm.","Người từ đủ 15 đến chưa đủ 18 tuổi: không quá 08 giờ trong 01 ngày và 40 giờ trong 01 tuần; có thể làm thêm giờ, làm ban đêm trong một số nghề, công việc theo danh mục do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành."]},"blld-45_147":{"tldr":"Cấm sử dụng người lao động từ đủ 15 tuổi đến chưa đủ 18 tuổi làm các công việc và làm việc ở các nơi nguy hại được liệt kê.","points":["Cấm các công việc: mang vác vật nặng vượt thể trạng; sản xuất, kinh doanh cồn, rượu, bia, thuốc lá, chất tác động tinh thần/gây nghiện; sản xuất, sử dụng, vận chuyển hóa chất, khí gas, chất nổ; bảo trì, bảo dưỡng thiết bị, máy móc; phá dỡ công trình; nấu, thổi, đúc, cán, dập, hàn kim loại; lặn biển, đánh bắt thủy hải sản xa bờ; công việc khác gây tổn hại sự phát triển.","Cấm làm việc ở các nơi: dưới nước, dưới lòng đất, hang động, đường hầm; công trường xây dựng; cơ sở giết mổ gia súc; sòng bạc, quán bar, vũ trường, karaoke, khách sạn, nhà nghỉ, tắm hơi, xoa bóp, điểm kinh doanh xổ số, trò chơi điện tử; nơi khác gây tổn hại sự phát triển.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định danh mục tại điểm h khoản 1 và điểm đ khoản 2 Điều này."]},"blld-45_148":{"tldr":"Người lao động cao tuổi là người tiếp tục lao động sau độ tuổi quy định tại khoản 2 Điều 169, có quyền thỏa thuận rút ngắn thời giờ làm việc hoặc làm việc không trọn thời gian.","points":["Người lao động cao tuổi là người tiếp tục lao động sau độ tuổi theo khoản 2 Điều 169.","Có quyền thỏa thuận với người sử dụng lao động về việc rút ngắn thời giờ làm việc hằng ngày hoặc áp dụng chế độ làm việc không trọn thời gian.","Nhà nước khuyến khích sử dụng người lao động cao tuổi làm việc phù hợp sức khỏe để bảo đảm quyền lao động và sử dụng hiệu quả nguồn nhân lực."]},"blld-45_149":{"tldr":"Khi sử dụng người lao động cao tuổi, hai bên có thể giao kết nhiều lần hợp đồng xác định thời hạn; người đang hưởng lương hưu vẫn được hưởng tiền lương và quyền lợi khác; cấm dùng vào nghề nặng nhọc độc hại nguy hiểm trừ khi bảo đảm an toàn.","points":["Hai bên có thể thỏa thuận giao kết nhiều lần hợp đồng lao động xác định thời hạn.","Người lao động cao tuổi đang hưởng lương hưu mà làm việc theo hợp đồng mới thì ngoài chế độ hưu trí còn được hưởng tiền lương và các quyền lợi khác theo pháp luật, hợp đồng lao động.","Không được sử dụng làm nghề nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm có ảnh hưởng xấu tới sức khỏe, trừ trường hợp bảo đảm các điều kiện làm việc an toàn.","Người sử dụng lao động có trách nhiệm quan tâm chăm sóc sức khỏe của người lao động cao tuổi tại nơi làm việc."]},"blld-45_150":{"tldr":"Nhà nước khuyến khích đưa người lao động Việt Nam đi làm việc ở nước ngoài; lao động Việt Nam ở nước ngoài và công dân Việt Nam làm việc cho tổ chức, cá nhân nước ngoài tại Việt Nam phải tuân theo pháp luật và được pháp luật bảo vệ.","points":["Nhà nước khuyến khích doanh nghiệp, cơ quan, tổ chức, cá nhân tìm kiếm, mở rộng thị trường để đưa người lao động Việt Nam đi làm việc ở nước ngoài.","Người lao động Việt Nam đi làm việc ở nước ngoài phải tuân theo pháp luật Việt Nam và pháp luật nước sở tại, trừ trường hợp điều ước quốc tế mà Việt Nam là thành viên có quy định khác.","Công dân Việt Nam làm việc cho tổ chức nước ngoài tại Việt Nam, trong khu công nghiệp, khu kinh tế, khu chế xuất, khu công nghệ cao hoặc cho cá nhân là công dân nước ngoài tại Việt Nam phải tuân theo pháp luật Việt Nam và được pháp luật bảo vệ.","Chính phủ quy định chi tiết việc tuyển dụng, quản lý lao động Việt Nam làm việc cho tổ chức, cá nhân nước ngoài tại Việt Nam."]},"blld-45_151":{"tldr":"Người lao động nước ngoài làm việc tại Việt Nam phải đủ 18 tuổi, có năng lực hành vi dân sự đầy đủ, có chuyên môn và sức khỏe, không vướng án và có giấy phép lao động; thời hạn hợp đồng không vượt quá thời hạn giấy phép lao động.","points":["Người lao động nước ngoài phải đủ 18 tuổi trở lên, có năng lực hành vi dân sự đầy đủ; có trình độ chuyên môn, kỹ thuật, tay nghề, kinh nghiệm và đủ sức khỏe theo quy định của Bộ trưởng Bộ Y tế.","Không đang chấp hành hình phạt, chưa được xóa án tích hoặc đang bị truy cứu trách nhiệm hình sự theo pháp luật nước ngoài hoặc Việt Nam.","Phải có giấy phép lao động do cơ quan nhà nước có thẩm quyền của Việt Nam cấp, trừ trường hợp quy định tại Điều 154.","Thời hạn hợp đồng lao động không được vượt quá thời hạn của Giấy phép lao động; hai bên có thể thỏa thuận giao kết nhiều lần hợp đồng xác định thời hạn.","Người lao động nước ngoài phải tuân theo pháp luật lao động Việt Nam và được pháp luật Việt Nam bảo vệ, trừ trường hợp điều ước quốc tế có quy định khác."]},"blld-45_152":{"tldr":"Chỉ được tuyển người lao động nước ngoài vào vị trí quản lý, điều hành, chuyên gia, lao động kỹ thuật mà lao động Việt Nam chưa đáp ứng được; trước khi tuyển phải giải trình nhu cầu và được cơ quan có thẩm quyền chấp thuận bằng văn bản.","points":["Chỉ được tuyển người lao động nước ngoài vào vị trí quản lý, điều hành, chuyên gia và lao động kỹ thuật mà người lao động Việt Nam chưa đáp ứng được theo nhu cầu sản xuất, kinh doanh.","Trước khi tuyển dụng, doanh nghiệp, cơ quan, tổ chức, cá nhân phải giải trình nhu cầu sử dụng lao động và được cơ quan nhà nước có thẩm quyền chấp thuận bằng văn bản.","Nhà thầu trước khi tuyển, sử dụng phải kê khai cụ thể vị trí, trình độ, kinh nghiệm, thời gian làm việc và được cơ quan nhà nước có thẩm quyền chấp thuận bằng văn bản."]},"blld-45_153":{"tldr":"Người lao động nước ngoài phải xuất trình giấy phép lao động khi được yêu cầu; làm việc không có giấy phép sẽ bị buộc xuất cảnh hoặc trục xuất, còn người sử dụng lao động vi phạm bị xử lý theo pháp luật.","points":["Người lao động nước ngoài phải xuất trình giấy phép lao động khi có yêu cầu của cơ quan nhà nước có thẩm quyền.","Người lao động nước ngoài làm việc không có giấy phép lao động bị buộc xuất cảnh hoặc trục xuất theo pháp luật về nhập cảnh, xuất cảnh, quá cảnh, cư trú.","Người sử dụng lao động sử dụng người lao động nước ngoài không có giấy phép lao động bị xử lý theo quy định của pháp luật."]},"blld-45_154":{"tldr":"Điều này liệt kê các trường hợp người lao động nước ngoài làm việc tại Việt Nam không thuộc diện cấp giấy phép lao động.","points":["Chủ sở hữu hoặc thành viên góp vốn của công ty TNHH, hoặc Chủ tịch/thành viên Hội đồng quản trị công ty cổ phần có giá trị góp vốn theo quy định của Chính phủ.","Trưởng văn phòng đại diện, dự án hoặc người chịu trách nhiệm chính về hoạt động của tổ chức quốc tế, tổ chức phi chính phủ nước ngoài tại Việt Nam.","Vào Việt Nam dưới 03 tháng để chào bán dịch vụ hoặc để xử lý sự cố, tình huống kỹ thuật, công nghệ phức tạp mà chuyên gia Việt Nam và chuyên gia nước ngoài hiện ở Việt Nam không xử lý được.","Luật sư nước ngoài đã được cấp Giấy phép hành nghề luật sư tại Việt Nam theo Luật Luật sư.","Trường hợp theo điều ước quốc tế mà Việt Nam là thành viên; người nước ngoài kết hôn với người Việt Nam và sinh sống trên lãnh thổ Việt Nam; và trường hợp khác theo quy định của Chính phủ."]},"blld-45_156":{"tldr":"Điều này liệt kê các trường hợp làm giấy phép lao động hết hiệu lực.","points":["Giấy phép lao động hết thời hạn; chấm dứt hợp đồng lao động.","Nội dung hợp đồng lao động không đúng với nội dung giấy phép, hoặc làm việc không đúng với nội dung trong giấy phép đã được cấp.","Hợp đồng trong các lĩnh vực là cơ sở phát sinh giấy phép lao động hết thời hạn hoặc chấm dứt.","Có văn bản thông báo của phía nước ngoài thôi cử lao động nước ngoài làm việc tại Việt Nam.","Doanh nghiệp, tổ chức, đối tác phía Việt Nam hoặc tổ chức nước ngoài tại Việt Nam sử dụng lao động nước ngoài chấm dứt hoạt động; giấy phép lao động bị thu hồi."]},"blld-45_158":{"tldr":"Nhà nước bảo trợ quyền lao động, tự tạo việc làm của người khuyết tật và có chính sách khuyến khích, ưu đãi đối với người sử dụng lao động trong tạo việc làm và nhận người khuyết tật vào làm việc.","points":["Nhà nước bảo trợ quyền lao động, tự tạo việc làm của người lao động là người khuyết tật.","Nhà nước có chính sách khuyến khích, ưu đãi phù hợp với người sử dụng lao động trong tạo việc làm và nhận người khuyết tật vào làm việc theo pháp luật về người khuyết tật."]},"blld-45_159":{"tldr":"Người sử dụng lao động phải bảo đảm điều kiện, công cụ, an toàn vệ sinh lao động và khám sức khỏe định kỳ phù hợp với người khuyết tật, đồng thời tham khảo ý kiến họ khi quyết định vấn đề liên quan đến quyền lợi của họ.","points":["Phải bảo đảm điều kiện lao động, công cụ lao động, an toàn, vệ sinh lao động và tổ chức khám sức khỏe định kỳ phù hợp với người lao động là người khuyết tật.","Phải tham khảo ý kiến của người lao động là người khuyết tật khi quyết định những vấn đề liên quan đến quyền và lợi ích của họ."]},"blld-45_160":{"tldr":"Cấm sử dụng người khuyết tật suy giảm khả năng lao động từ 51% trở lên, khuyết tật nặng hoặc đặc biệt nặng làm thêm giờ, làm việc ban đêm và cấm bố trí làm công việc nặng nhọc, độc hại, nguy hiểm khi không có sự đồng ý của họ.","points":["Cấm sử dụng người khuyết tật nhẹ suy giảm khả năng lao động từ 51% trở lên, khuyết tật nặng hoặc đặc biệt nặng làm thêm giờ, làm việc vào ban đêm, trừ trường hợp họ đồng ý.","Cấm sử dụng người khuyết tật làm công việc nặng nhọc, độc hại, nguy hiểm theo danh mục do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành nếu không có sự đồng ý của họ sau khi đã được cung cấp đầy đủ thông tin về công việc."]},"blld-45_161":{"tldr":"Lao động là người giúp việc gia đình là người làm thường xuyên các công việc trong gia đình cho một hoặc nhiều hộ gia đình; Chính phủ quy định về đối tượng này.","points":["Lao động là người giúp việc gia đình là người làm thường xuyên các công việc trong gia đình của một hoặc nhiều hộ gia đình.","Các công việc gồm nội trợ, quản gia, chăm sóc trẻ em, người bệnh, người già, lái xe, làm vườn và công việc khác cho hộ gia đình nhưng không liên quan đến hoạt động thương mại.","Chính phủ quy định về lao động là người giúp việc gia đình."]},"blld-45_162":{"tldr":"Hợp đồng với người giúp việc gia đình phải bằng văn bản; thời hạn do hai bên thỏa thuận và mỗi bên có quyền đơn phương chấm dứt bất kỳ lúc nào nhưng phải báo trước ít nhất 15 ngày.","points":["Người sử dụng lao động phải giao kết hợp đồng lao động bằng văn bản với lao động là người giúp việc gia đình.","Thời hạn hợp đồng do hai bên thỏa thuận; một bên có quyền đơn phương chấm dứt bất kỳ khi nào nhưng phải báo trước ít nhất 15 ngày.","Hai bên thỏa thuận trong hợp đồng về hình thức trả lương, kỳ hạn trả lương, thời giờ làm việc hằng ngày, chỗ ở."]},"blld-45_163":{"tldr":"Điều này quy định các nghĩa vụ của người sử dụng lao động đối với người giúp việc gia đình, gồm thực hiện hợp đồng, trả tiền bảo hiểm xã hội, bảo hiểm y tế, tôn trọng danh dự và một số nghĩa vụ khác.","points":["Thực hiện đầy đủ thỏa thuận đã giao kết trong hợp đồng lao động.","Trả cho người giúp việc gia đình khoản tiền bảo hiểm xã hội, bảo hiểm y tế theo pháp luật để họ chủ động tham gia bảo hiểm.","Tôn trọng danh dự, nhân phẩm của người giúp việc gia đình.","Bố trí chỗ ăn, ở hợp vệ sinh nếu có thỏa thuận; tạo cơ hội cho họ học văn hóa, giáo dục nghề nghiệp.","Trả tiền tàu xe đi đường khi người giúp việc thôi việc về nơi cư trú, trừ trường hợp họ chấm dứt hợp đồng trước thời hạn."]},"blld-45_164":{"tldr":"Điều này quy định các nghĩa vụ của lao động là người giúp việc gia đình, gồm thực hiện hợp đồng, bồi thường khi làm hỏng, mất tài sản, thông báo nguy cơ tai nạn và tố cáo hành vi vi phạm.","points":["Thực hiện đầy đủ thỏa thuận đã giao kết trong hợp đồng lao động.","Phải bồi thường theo thỏa thuận hoặc theo pháp luật nếu làm hỏng, mất tài sản của người sử dụng lao động.","Thông báo kịp thời với người sử dụng lao động về khả năng, nguy cơ gây tai nạn, đe dọa an toàn, sức khỏe, tính mạng, tài sản.","Tố cáo với cơ quan có thẩm quyền nếu người sử dụng lao động có hành vi ngược đãi, quấy rối tình dục, cưỡng bức lao động hoặc vi phạm pháp luật khác."]},"blld-45_166":{"tldr":"Người lao động trong lĩnh vực nghệ thuật, thể dục, thể thao, hàng hải, hàng không được áp dụng một số chế độ phù hợp theo quy định của Chính phủ.","points":["Áp dụng một số chế độ phù hợp về đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề; hợp đồng lao động; tiền lương, tiền thưởng; thời giờ làm việc, nghỉ ngơi; an toàn, vệ sinh lao động.","Các chế độ này thực hiện theo quy định của Chính phủ."]},"blld-45_168":{"tldr":"Người sử dụng lao động và người lao động phải tham gia bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp; với người không thuộc diện tham gia bắt buộc, người sử dụng lao động trả thêm một khoản tương đương cùng kỳ trả lương.","points":["Người sử dụng lao động, người lao động phải tham gia bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp; khuyến khích tham gia các hình thức bảo hiểm khác.","Trong thời gian người lao động nghỉ việc hưởng chế độ bảo hiểm xã hội, người sử dụng lao động không phải trả lương, trừ trường hợp hai bên thỏa thuận khác.","Với người lao động không thuộc đối tượng tham gia bảo hiểm bắt buộc, người sử dụng lao động phải chi trả thêm cùng kỳ trả lương một khoản tương đương mức đóng bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp."]},"blld-45_169":{"tldr":"Tuổi nghỉ hưu trong điều kiện lao động bình thường được điều chỉnh theo lộ trình đến đủ 62 tuổi với nam vào năm 2028 và đủ 60 tuổi với nữ vào năm 2035; có thể nghỉ sớm hoặc muộn hơn không quá 05 tuổi tùy trường hợp.","points":["Người lao động bảo đảm điều kiện về thời gian đóng bảo hiểm xã hội được hưởng lương hưu khi đủ tuổi nghỉ hưu.","Tuổi nghỉ hưu trong điều kiện bình thường điều chỉnh theo lộ trình đến đủ 62 tuổi với nam vào năm 2028 và đủ 60 tuổi với nữ vào năm 2035.","Từ năm 2021 là đủ 60 tuổi 03 tháng với nam và 55 tuổi 04 tháng với nữ; sau đó mỗi năm tăng thêm 03 tháng với nam và 04 tháng với nữ.","Người bị suy giảm khả năng lao động, làm nghề nặng nhọc, độc hại, nguy hiểm hoặc làm việc ở vùng kinh tế-xã hội đặc biệt khó khăn có thể nghỉ hưu thấp hơn nhưng không quá 05 tuổi.","Người có trình độ chuyên môn, kỹ thuật cao và một số trường hợp đặc biệt có thể nghỉ hưu cao hơn nhưng không quá 05 tuổi so với quy định tại khoản 2."]},"blld-45_170":{"tldr":"Người lao động có quyền thành lập, gia nhập, hoạt động công đoàn và tổ chức của người lao động tại doanh nghiệp; các tổ chức đại diện này bình đẳng về quyền và nghĩa vụ trong bảo vệ quyền lợi người lao động.","points":["Người lao động có quyền thành lập, gia nhập và hoạt động công đoàn theo Luật Công đoàn.","Người lao động trong doanh nghiệp có quyền thành lập, gia nhập và tham gia tổ chức của người lao động tại doanh nghiệp theo Điều 172, 173, 174.","Các tổ chức đại diện người lao động bình đẳng về quyền và nghĩa vụ trong đại diện, bảo vệ quyền và lợi ích hợp pháp, chính đáng của người lao động."]},"blld-45_172":{"tldr":"Tổ chức của người lao động tại doanh nghiệp được thành lập, hoạt động hợp pháp sau khi được cấp đăng ký, hoạt động theo nguyên tắc tuân thủ Hiến pháp, pháp luật, điều lệ; bị thu hồi đăng ký khi vi phạm tôn chỉ, mục đích hoặc chấm dứt tồn tại.","points":["Tổ chức được thành lập và hoạt động hợp pháp sau khi cơ quan nhà nước có thẩm quyền cấp đăng ký.","Tổ chức và hoạt động phải bảo đảm nguyên tắc tuân thủ Hiến pháp, pháp luật, điều lệ; tự nguyện, tự quản, dân chủ, minh bạch.","Bị thu hồi đăng ký khi vi phạm tôn chỉ, mục đích quy định tại điểm b khoản 1 Điều 174 hoặc chấm dứt tồn tại do chia, tách, hợp nhất, sáp nhập, giải thể hoặc doanh nghiệp giải thể, phá sản.","Trường hợp gia nhập Công đoàn Việt Nam thì thực hiện theo Luật Công đoàn.","Chính phủ quy định về hồ sơ, trình tự, thủ tục đăng ký, thu hồi đăng ký, quản lý tài chính, tài sản và các vấn đề tổ chức của tổ chức này."]},"blld-45_173":{"tldr":"Tại thời điểm đăng ký, tổ chức của người lao động tại doanh nghiệp phải có số lượng thành viên tối thiểu theo quy định của Chính phủ; ban lãnh đạo do thành viên bầu và phải đáp ứng điều kiện về lý lịch tư pháp.","points":["Tại thời điểm đăng ký phải có số lượng tối thiểu thành viên là người lao động làm việc tại doanh nghiệp theo quy định của Chính phủ.","Ban lãnh đạo do thành viên của tổ chức bầu.","Thành viên ban lãnh đạo là người lao động Việt Nam đang làm việc tại doanh nghiệp; không đang bị truy cứu trách nhiệm hình sự, chấp hành hình phạt hoặc chưa được xóa án tích về các tội xâm phạm an ninh quốc gia, quyền tự do dân chủ của công dân, sở hữu theo Bộ luật Hình sự."]},"blld-45_174":{"tldr":"Điều này quy định các nội dung chủ yếu phải có trong điều lệ tổ chức của người lao động tại doanh nghiệp; Chính phủ quy định chi tiết.","points":["Điều lệ phải có tên, địa chỉ, biểu tượng (nếu có); tôn chỉ, mục đích, phạm vi hoạt động bảo vệ quyền, lợi ích hợp pháp của thành viên trong quan hệ lao động tại doanh nghiệp.","Quy định điều kiện, thủ tục gia nhập và ra khỏi tổ chức; không đồng thời có thành viên là lao động thông thường và lao động trực tiếp tham gia ra quyết định về điều kiện lao động, tuyển dụng, kỷ luật, chấm dứt hợp đồng hoặc chuyển công việc.","Quy định cơ cấu tổ chức, nhiệm kỳ, người đại diện; nguyên tắc tổ chức, hoạt động; thể thức thông qua quyết định.","Những nội dung phải do thành viên quyết định theo đa số gồm thông qua, sửa đổi điều lệ; bầu, miễn nhiệm người đứng đầu và ban lãnh đạo; chia, tách, hợp nhất, sáp nhập, đổi tên, giải thể, liên kết; gia nhập Công đoàn Việt Nam.","Quy định phí thành viên, nguồn tài sản, tài chính và quản lý, sử dụng; thu, chi phải được theo dõi, lưu trữ và công khai hằng năm; kiến nghị và giải quyết kiến nghị nội bộ. Chính phủ quy định chi tiết."]},"blld-45_175":{"tldr":"Điều này nghiêm cấm người sử dụng lao động phân biệt đối xử với người lao động vì lý do thành lập, gia nhập, hoạt động tổ chức đại diện, cũng như can thiệp, thao túng quá trình thành lập và hoạt động của tổ chức này.","points":["Cấm phân biệt đối xử với người lao động, thành viên ban lãnh đạo tổ chức đại diện vì lý do thành lập, gia nhập hoặc hoạt động tổ chức.","Cấm yêu cầu tham gia, không tham gia hoặc ra khỏi tổ chức để được tuyển dụng, giao kết hoặc gia hạn hợp đồng; cấm sa thải, kỷ luật, đơn phương chấm dứt, không gia hạn hợp đồng, chuyển công việc vì lý do đó.","Cấm phân biệt đối xử về tiền lương, thời giờ làm việc, quyền và nghĩa vụ khác; cấm cản trở, gây khó khăn nhằm làm suy yếu hoạt động của tổ chức.","Cấm can thiệp, thao túng quá trình thành lập, bầu cử, xây dựng kế hoạch và hoạt động của tổ chức, kể cả hỗ trợ tài chính hoặc biện pháp kinh tế nhằm vô hiệu hóa, suy yếu hoặc phân biệt đối xử giữa các tổ chức đại diện."]},"blld-45_176":{"tldr":"Thành viên ban lãnh đạo tổ chức đại diện người lao động tại cơ sở có quyền tiếp cận người lao động và người sử dụng lao động, được dùng thời gian làm việc để thực hiện công việc của tổ chức mà vẫn được trả lương.","points":["Có quyền tiếp cận người lao động tại nơi làm việc khi thực hiện nhiệm vụ, bảo đảm không ảnh hưởng hoạt động bình thường của người sử dụng lao động; tiếp cận người sử dụng lao động để thực hiện nhiệm vụ đại diện.","Được sử dụng thời gian làm việc theo khoản 2 và 3 để thực hiện công việc của tổ chức mà vẫn được người sử dụng lao động trả lương; được hưởng các bảo đảm khác trong quan hệ lao động.","Chính phủ quy định thời gian tối thiểu người sử dụng lao động dành cho toàn bộ ban lãnh đạo trên cơ sở số lượng thành viên của tổ chức.","Tổ chức đại diện và người sử dụng lao động thỏa thuận về thời gian tăng thêm so với mức tối thiểu và cách thức sử dụng thời gian phù hợp điều kiện thực tế."]},"blld-45_177":{"tldr":"Điều này quy định nghĩa vụ của người sử dụng lao động đối với tổ chức đại diện người lao động tại cơ sở, gồm không cản trở, công nhận tổ chức, thỏa thuận khi xử lý thành viên ban lãnh đạo và gia hạn hợp đồng đến hết nhiệm kỳ.","points":["Không cản trở, gây khó khăn khi người lao động thành lập, gia nhập, tham gia hoạt động hợp pháp của tổ chức; công nhận và tôn trọng quyền của tổ chức đã thành lập hợp pháp.","Phải thỏa thuận bằng văn bản với ban lãnh đạo khi đơn phương chấm dứt hợp đồng, chuyển công việc khác, kỷ luật sa thải thành viên ban lãnh đạo; nếu không thỏa thuận được phải báo cáo cơ quan chuyên môn về lao động cấp tỉnh.","Sau 30 ngày kể từ ngày báo cho cơ quan chuyên môn về lao động cấp tỉnh, người sử dụng lao động mới có quyền quyết định; nếu không nhất trí, các bên có quyền yêu cầu giải quyết tranh chấp lao động.","Phải gia hạn hợp đồng đã giao kết đến hết nhiệm kỳ cho thành viên ban lãnh đạo đang trong nhiệm kỳ mà hết hạn hợp đồng; thực hiện các nghĩa vụ khác theo pháp luật."]},"blld-45_178":{"tldr":"Điều này quy định các quyền và nghĩa vụ của tổ chức đại diện người lao động tại cơ sở trong quan hệ lao động, gồm thương lượng tập thể, đối thoại, tham khảo ý kiến, đại diện giải quyết tranh chấp và tổ chức, lãnh đạo đình công.","points":["Thương lượng tập thể với người sử dụng lao động và đối thoại tại nơi làm việc theo Bộ luật này.","Được tham khảo ý kiến xây dựng và giám sát việc thực hiện thang lương, bảng lương, mức lao động, quy chế trả lương, quy chế thưởng, nội quy lao động và vấn đề liên quan đến quyền lợi của thành viên.","Đại diện cho người lao động trong giải quyết khiếu nại, tranh chấp lao động cá nhân khi được người lao động ủy quyền; tổ chức và lãnh đạo đình công.","Tiếp nhận hỗ trợ kỹ thuật của cơ quan, tổ chức đăng ký hoạt động hợp pháp tại Việt Nam để tìm hiểu pháp luật lao động và hoạt động đại diện sau khi được cấp đăng ký.","Được người sử dụng lao động bố trí nơi làm việc, cung cấp thông tin, bảo đảm điều kiện cần thiết cho hoạt động; các quyền và nghĩa vụ khác theo pháp luật."]},"blld-45_179":{"tldr":"Điều này định nghĩa tranh chấp lao động và phân loại thành tranh chấp lao động cá nhân, tranh chấp lao động tập thể về quyền và tranh chấp lao động tập thể về lợi ích.","points":["Tranh chấp lao động là tranh chấp về quyền, nghĩa vụ, lợi ích phát sinh giữa các bên trong quá trình xác lập, thực hiện hoặc chấm dứt quan hệ lao động; giữa các tổ chức đại diện người lao động; hoặc từ quan hệ liên quan trực tiếp.","Gồm tranh chấp lao động cá nhân (giữa người lao động với người sử dụng lao động, doanh nghiệp đưa đi làm việc ở nước ngoài, hoặc người sử dụng lao động thuê lại) và tranh chấp lao động tập thể về quyền hoặc về lợi ích.","Tranh chấp tập thể về quyền phát sinh khi có khác nhau trong hiểu, thực hiện thỏa ước, nội quy, quy chế, pháp luật lao động, hoặc khi người sử dụng lao động phân biệt đối xử, can thiệp, thao túng tổ chức đại diện, vi phạm nghĩa vụ thương lượng thiện chí.","Tranh chấp tập thể về lợi ích gồm tranh chấp phát sinh trong quá trình thương lượng tập thể hoặc khi một bên từ chối, không tiến hành thương lượng trong thời hạn quy định."]},"blld-45_180":{"tldr":"Điều này quy định các nguyên tắc giải quyết tranh chấp lao động: tôn trọng quyền tự định đoạt, coi trọng hòa giải, trọng tài, công khai minh bạch, bảo đảm sự tham gia của đại diện các bên.","points":["Tôn trọng quyền tự định đoạt thông qua thương lượng của các bên trong suốt quá trình giải quyết.","Coi trọng giải quyết thông qua hòa giải, trọng tài trên cơ sở tôn trọng quyền, lợi ích hai bên và lợi ích chung của xã hội, không trái pháp luật.","Công khai, minh bạch, khách quan, kịp thời, nhanh chóng và đúng pháp luật; bảo đảm sự tham gia của đại diện các bên.","Việc giải quyết do cơ quan, tổ chức, cá nhân có thẩm quyền tiến hành sau khi có yêu cầu của bên tranh chấp hoặc theo đề nghị của cơ quan có thẩm quyền và được các bên đồng ý."]},"blld-45_181":{"tldr":"Điều này quy định trách nhiệm của cơ quan, tổ chức trong giải quyết tranh chấp lao động, gồm hướng dẫn, hỗ trợ các bên, tập huấn hòa giải viên, trọng tài viên và tiếp nhận, phân loại, chuyển yêu cầu trong thời hạn 05 ngày làm việc.","points":["Cơ quan quản lý nhà nước về lao động phối hợp với tổ chức đại diện người lao động, tổ chức đại diện người sử dụng lao động hướng dẫn, hỗ trợ, giúp đỡ các bên.","Bộ Lao động - Thương binh và Xã hội tổ chức tập huấn, nâng cao năng lực chuyên môn của hòa giải viên lao động, trọng tài viên lao động.","Cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân là đầu mối tiếp nhận yêu cầu, có trách nhiệm phân loại, hướng dẫn, hỗ trợ, giúp đỡ các bên.","Trong thời hạn 05 ngày làm việc, cơ quan tiếp nhận phải chuyển yêu cầu đến hòa giải viên lao động (trường hợp bắt buộc hòa giải), đến Hội đồng trọng tài hoặc hướng dẫn gửi đến Tòa án."]},"blld-45_182":{"tldr":"Điều này quy định quyền của các bên (tham gia trực tiếp hoặc qua đại diện, rút hoặc thay đổi yêu cầu, yêu cầu thay người giải quyết) và nghĩa vụ (cung cấp tài liệu, chứng cứ và chấp hành kết quả) trong giải quyết tranh chấp lao động.","points":["Các bên có quyền trực tiếp hoặc qua đại diện tham gia giải quyết; rút yêu cầu hoặc thay đổi nội dung yêu cầu.","Có quyền yêu cầu thay đổi người tiến hành giải quyết nếu có lý do cho rằng người đó không vô tư hoặc không khách quan.","Có nghĩa vụ cung cấp đầy đủ, kịp thời tài liệu, chứng cứ chứng minh cho yêu cầu của mình.","Có nghĩa vụ chấp hành thỏa thuận đã đạt được, quyết định của Ban trọng tài lao động, bản án, quyết định của Tòa án đã có hiệu lực pháp luật."]},"blld-45_183":{"tldr":"Cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động có quyền yêu cầu cung cấp tài liệu, chứng cứ, trưng cầu giám định, mời người làm chứng và người có liên quan trong phạm vi nhiệm vụ, quyền hạn của mình.","points":["Trong phạm vi nhiệm vụ, quyền hạn của mình, có quyền yêu cầu các bên tranh chấp và cơ quan, tổ chức, cá nhân có liên quan cung cấp tài liệu, chứng cứ.","Có quyền trưng cầu giám định, mời người làm chứng và người có liên quan."]},"blld-45_184":{"tldr":"Hòa giải viên lao động do Chủ tịch Ủy ban nhân dân cấp tỉnh bổ nhiệm để hòa giải tranh chấp lao động, tranh chấp về hợp đồng đào tạo nghề và hỗ trợ phát triển quan hệ lao động; Chính phủ quy định tiêu chuẩn và thủ tục.","points":["Hòa giải viên lao động do Chủ tịch Ủy ban nhân dân cấp tỉnh bổ nhiệm để hòa giải tranh chấp lao động, tranh chấp về hợp đồng đào tạo nghề và hỗ trợ phát triển quan hệ lao động.","Chính phủ quy định tiêu chuẩn, trình tự, thủ tục bổ nhiệm, chế độ, điều kiện hoạt động, quản lý và thẩm quyền, trình tự, thủ tục cử hòa giải viên lao động."]},"blld-45_185":{"tldr":"Hội đồng trọng tài lao động do Chủ tịch Ủy ban nhân dân cấp tỉnh thành lập, nhiệm kỳ 05 năm, có ít nhất 15 trọng tài viên do ba bên đề cử ngang nhau; khi có yêu cầu sẽ lập Ban trọng tài lao động làm việc theo nguyên tắc tập thể, quyết định theo đa số.","points":["Chủ tịch Ủy ban nhân dân cấp tỉnh thành lập Hội đồng trọng tài lao động, bổ nhiệm Chủ tịch, thư ký và các trọng tài viên; nhiệm kỳ là 05 năm.","Số trọng tài viên ít nhất là 15 người, gồm số lượng ngang nhau do ba bên đề cử: tối thiểu 05 do cơ quan chuyên môn về lao động cấp tỉnh, tối thiểu 05 do công đoàn cấp tỉnh, tối thiểu 05 do tổ chức đại diện người sử dụng lao động.","Trọng tài viên là người hiểu biết pháp luật, có kinh nghiệm trong quan hệ lao động, có uy tín, công tâm; làm việc theo chế độ chuyên trách hoặc kiêm nhiệm.","Khi có yêu cầu theo Điều 189, 193, 197, Hội đồng lập Ban trọng tài lao động: mỗi bên chọn 01 trọng tài viên, hai trọng tài viên đó thống nhất chọn 01 người khác làm Trưởng Ban; nếu các bên cùng chọn một trọng tài viên thì Ban chỉ gồm 01 người.","Ban trọng tài lao động làm việc theo nguyên tắc tập thể và quyết định theo đa số, trừ trường hợp Ban chỉ gồm 01 trọng tài viên. Chính phủ quy định chi tiết."]},"blld-45_186":{"tldr":"Khi tranh chấp lao động đang được cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết trong thời hạn quy định thì không bên nào được hành động đơn phương chống lại bên kia.","points":["Trong thời gian tranh chấp lao động đang được cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết trong thời hạn theo quy định của Bộ luật này, không bên nào được hành động đơn phương chống lại bên kia."]},"blld-45_188":{"tldr":"Tranh chấp lao động cá nhân phải qua hòa giải của hòa giải viên lao động trước khi yêu cầu Hội đồng trọng tài lao động hoặc Tòa án, trừ một số tranh chấp không bắt buộc; hòa giải viên phải kết thúc hòa giải trong 05 ngày làm việc kể từ ngày nhận yêu cầu.","points":["Các tranh chấp không bắt buộc qua hòa giải gồm: sa thải hoặc bị đơn phương chấm dứt HĐLĐ; bồi thường thiệt hại, trợ cấp khi chấm dứt HĐLĐ; người giúp việc gia đình với NSDLĐ; BHXH, BHYT, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động - bệnh nghề nghiệp; bồi thường giữa NLĐ với doanh nghiệp đưa người đi làm việc ở nước ngoài; NLĐ thuê lại với NSDLĐ thuê lại.","Trong 05 ngày làm việc kể từ khi nhận yêu cầu, hòa giải viên phải kết thúc hòa giải; phiên họp phải có mặt hai bên (có thể ủy quyền).","Hòa giải viên lập biên bản hòa giải thành (có chữ ký các bên và hòa giải viên) khi các bên thỏa thuận được hoặc chấp nhận phương án hòa giải.","Lập biên bản hòa giải không thành nếu phương án không được chấp nhận hoặc một bên đã được triệu tập hợp lệ lần thứ hai vẫn vắng mặt không có lý do chính đáng.","Bản sao biên bản phải gửi cho các bên trong 01 ngày làm việc kể từ ngày lập.","Nếu không bắt buộc hòa giải, hết thời hạn hòa giải mà không tiến hành, hoặc hòa giải không thành thì các bên có quyền yêu cầu Hội đồng trọng tài lao động hoặc Tòa án giải quyết."]},"blld-45_189":{"tldr":"Trên cơ sở đồng thuận, các bên có quyền yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp lao động cá nhân; khi yêu cầu trọng tài thì không được đồng thời yêu cầu Tòa án, trừ trường hợp tại khoản 4.","points":["Trong 07 ngày làm việc kể từ ngày nhận yêu cầu, Ban trọng tài lao động phải được thành lập.","Trong 30 ngày kể từ ngày thành lập, Ban trọng tài lao động phải ra quyết định giải quyết và gửi cho các bên.","Hết thời hạn mà Ban trọng tài không được thành lập hoặc không ra quyết định thì các bên có quyền yêu cầu Tòa án giải quyết.","Nếu một bên không thi hành quyết định của Ban trọng tài lao động thì các bên có quyền yêu cầu Tòa án giải quyết."]},"blld-45_190":{"tldr":"Quy định thời hiệu yêu cầu giải quyết tranh chấp lao động cá nhân tính từ ngày phát hiện hành vi bị cho là vi phạm quyền và lợi ích hợp pháp.","points":["Thời hiệu yêu cầu hòa giải viên lao động là 06 tháng.","Thời hiệu yêu cầu Hội đồng trọng tài lao động là 09 tháng.","Thời hiệu yêu cầu Tòa án là 01 năm.","Thời gian có sự kiện bất khả kháng, trở ngại khách quan hoặc lý do khác theo pháp luật không tính vào thời hiệu nếu người yêu cầu chứng minh được."]},"blld-45_191":{"tldr":"Tranh chấp lao động tập thể về quyền thuộc thẩm quyền giải quyết của hòa giải viên lao động, Hội đồng trọng tài lao động và Tòa án nhân dân, và phải qua hòa giải trước khi yêu cầu trọng tài hoặc Tòa án.","points":["Cơ quan, tổ chức, cá nhân có thẩm quyền: hòa giải viên lao động; Hội đồng trọng tài lao động; Tòa án nhân dân.","Phải giải quyết qua thủ tục hòa giải của hòa giải viên lao động trước khi yêu cầu Hội đồng trọng tài lao động hoặc Tòa án."]},"blld-45_192":{"tldr":"Trình tự, thủ tục hòa giải tranh chấp lao động tập thể về quyền thực hiện theo các khoản 2, 3, 4, 5 và 6 Điều 188; nếu hòa giải không thành các bên có thể yêu cầu Hội đồng trọng tài lao động hoặc Tòa án.","points":["Đối với tranh chấp tại điểm b và điểm c khoản 2 Điều 179 mà xác định có hành vi vi phạm pháp luật, hòa giải viên lập biên bản và chuyển hồ sơ đến cơ quan có thẩm quyền xử lý.","Khi hòa giải không thành hoặc hết thời hạn hòa giải mà không tiến hành, các bên được lựa chọn yêu cầu Hội đồng trọng tài lao động (theo Điều 193) hoặc yêu cầu Tòa án giải quyết."]},"blld-45_193":{"tldr":"Trên cơ sở đồng thuận, các bên có quyền yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp lao động tập thể về quyền khi hòa giải không thành, hết thời hạn hòa giải mà không tiến hành, hoặc một bên không thực hiện thỏa thuận trong biên bản hòa giải thành.","points":["Trong 07 ngày làm việc kể từ ngày nhận yêu cầu, Ban trọng tài lao động phải được thành lập.","Trong 30 ngày kể từ ngày thành lập, Ban trọng tài phải ra quyết định giải quyết căn cứ pháp luật lao động, thỏa ước lao động tập thể, nội quy lao động đã đăng ký và các quy chế, thỏa thuận hợp pháp khác.","Đối với tranh chấp tại điểm b và điểm c khoản 2 Điều 179 mà có hành vi vi phạm pháp luật, Ban trọng tài không ra quyết định mà lập biên bản và chuyển hồ sơ đến cơ quan có thẩm quyền.","Trong thời gian Hội đồng trọng tài đang giải quyết, các bên không được đồng thời yêu cầu Tòa án.","Hết thời hạn mà Ban trọng tài không được thành lập hoặc không ra quyết định, hoặc một bên không thi hành quyết định, thì các bên có quyền yêu cầu Tòa án giải quyết."]},"blld-45_194":{"tldr":"Quy định thời hiệu yêu cầu giải quyết tranh chấp lao động tập thể về quyền tính từ ngày phát hiện hành vi bị cho là vi phạm quyền hợp pháp.","points":["Thời hiệu yêu cầu hòa giải viên lao động là 06 tháng.","Thời hiệu yêu cầu Hội đồng trọng tài lao động là 09 tháng.","Thời hiệu yêu cầu Tòa án là 01 năm."]},"blld-45_195":{"tldr":"Tranh chấp lao động tập thể về lợi ích thuộc thẩm quyền giải quyết của hòa giải viên lao động và Hội đồng trọng tài lao động, và phải qua hòa giải trước khi yêu cầu trọng tài hoặc tiến hành thủ tục đình công.","points":["Tổ chức, cá nhân có thẩm quyền: hòa giải viên lao động; Hội đồng trọng tài lao động.","Phải giải quyết qua thủ tục hòa giải của hòa giải viên lao động trước khi yêu cầu Hội đồng trọng tài lao động hoặc tiến hành thủ tục đình công."]},"blld-45_196":{"tldr":"Trình tự, thủ tục hòa giải tranh chấp lao động tập thể về lợi ích thực hiện theo các khoản 2, 3, 4 và 5 Điều 188; biên bản hòa giải thành có giá trị pháp lý như thỏa ước lao động tập thể của doanh nghiệp.","points":["Biên bản hòa giải thành phải gồm đầy đủ nội dung các bên đã thỏa thuận, có chữ ký các bên và hòa giải viên, và có giá trị pháp lý như thỏa ước lao động tập thể của doanh nghiệp.","Khi hòa giải không thành, hết thời hạn hòa giải mà không tiến hành, hoặc một bên không thực hiện thỏa thuận trong biên bản hòa giải thành, các bên được lựa chọn: yêu cầu Hội đồng trọng tài lao động (theo Điều 197); hoặc tổ chức đại diện NLĐ tiến hành thủ tục tại các Điều 200, 201, 202 để đình công."]},"blld-45_197":{"tldr":"Trên cơ sở đồng thuận, các bên có quyền yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp lao động tập thể về lợi ích khi hòa giải không thành, hết thời hạn hòa giải mà không tiến hành, hoặc một bên không thực hiện thỏa thuận trong biên bản hòa giải thành.","points":["Trong 07 ngày làm việc kể từ ngày nhận yêu cầu, Ban trọng tài lao động phải được thành lập.","Trong 30 ngày kể từ ngày thành lập, Ban trọng tài phải ra quyết định giải quyết căn cứ pháp luật lao động, thỏa ước lao động tập thể, nội quy lao động đã đăng ký và các quy chế, thỏa thuận hợp pháp khác.","Khi đã chọn giải quyết qua Hội đồng trọng tài, tổ chức đại diện NLĐ không được đình công trong thời gian Hội đồng đang giải quyết.","Hết thời hạn mà Ban trọng tài không được thành lập, không ra quyết định, hoặc NSDLĐ không thực hiện quyết định, thì tổ chức đại diện NLĐ có quyền tiến hành thủ tục tại các Điều 200, 201, 202 để đình công."]},"blld-45_198":{"tldr":"Đình công là sự ngừng việc tạm thời, tự nguyện và có tổ chức của người lao động nhằm đạt yêu cầu trong quá trình giải quyết tranh chấp lao động, do tổ chức đại diện NLĐ có quyền thương lượng tập thể là một bên tranh chấp lao động tập thể tổ chức và lãnh đạo.","points":[]},"blld-45_199":{"tldr":"Tổ chức đại diện NLĐ là bên tranh chấp lao động tập thể về lợi ích có quyền tiến hành thủ tục tại các Điều 200, 201 và 202 để đình công trong các trường hợp luật định.","points":["Hòa giải không thành hoặc hết thời hạn hòa giải theo khoản 2 Điều 188 mà hòa giải viên lao động không tiến hành hòa giải.","Ban trọng tài lao động không được thành lập, hoặc thành lập nhưng không ra quyết định giải quyết, hoặc NSDLĐ là bên tranh chấp không thực hiện quyết định của Ban trọng tài lao động."]},"blld-45_201":{"tldr":"Trước khi đình công, tổ chức đại diện NLĐ có quyền tổ chức và lãnh đạo đình công phải lấy ý kiến toàn thể NLĐ hoặc thành viên ban lãnh đạo các tổ chức đại diện NLĐ tham gia thương lượng.","points":["Nội dung lấy ý kiến gồm: đồng ý hay không đồng ý đình công; và phương án về nội dung tại các điểm b, c, d khoản 2 Điều 202.","Việc lấy ý kiến thực hiện trực tiếp bằng lấy phiếu, chữ ký hoặc hình thức khác.","Thời gian, địa điểm, cách thức lấy ý kiến do tổ chức đại diện NLĐ quyết định và phải thông báo cho NSDLĐ biết trước ít nhất 01 ngày.","Việc lấy ý kiến không được làm ảnh hưởng hoạt động sản xuất, kinh doanh bình thường; NSDLĐ không được gây khó khăn, cản trở hoặc can thiệp."]},"blld-45_202":{"tldr":"Khi có trên 50% số người được lấy ý kiến đồng ý thì tổ chức đại diện NLĐ ra quyết định đình công bằng văn bản; phải gửi văn bản cho các cơ quan ít nhất 05 ngày làm việc trước ngày bắt đầu đình công.","points":["Quyết định đình công phải có: kết quả lấy ý kiến; thời điểm và địa điểm đình công; phạm vi đình công; yêu cầu của NLĐ; họ tên, địa chỉ liên hệ của người đại diện tổ chức và lãnh đạo đình công.","Ít nhất 05 ngày làm việc trước ngày bắt đầu đình công, phải gửi văn bản quyết định đình công cho NSDLĐ, UBND cấp huyện và cơ quan chuyên môn về lao động thuộc UBND cấp tỉnh.","Đến thời điểm bắt đầu đình công, nếu NSDLĐ vẫn không chấp nhận giải quyết yêu cầu thì tổ chức đại diện NLĐ tổ chức và lãnh đạo đình công."]},"blld-45_203":{"tldr":"Quy định quyền của các bên trước và trong quá trình đình công, bao gồm tiếp tục thỏa thuận hoặc đề nghị hòa giải, và các quyền riêng của tổ chức đại diện NLĐ và của NSDLĐ.","points":["Các bên có thể tiếp tục thỏa thuận hoặc cùng đề nghị hòa giải viên lao động, Hội đồng trọng tài lao động tiến hành hòa giải, giải quyết tranh chấp.","Tổ chức đại diện NLĐ có quyền: rút quyết định đình công nếu chưa đình công hoặc chấm dứt đình công nếu đang đình công; yêu cầu Tòa án tuyên bố cuộc đình công hợp pháp.","NSDLĐ có quyền: chấp nhận toàn bộ hoặc một phần yêu cầu và thông báo bằng văn bản; đóng cửa tạm thời nơi làm việc trong thời gian đình công; yêu cầu Tòa án tuyên bố cuộc đình công bất hợp pháp."]},"blld-45_204":{"tldr":"Liệt kê các trường hợp đình công bị coi là bất hợp pháp.","points":["Không thuộc trường hợp được đình công quy định tại Điều 199.","Không do tổ chức đại diện NLĐ có quyền tổ chức và lãnh đạo đình công.","Vi phạm quy định về trình tự, thủ tục tiến hành đình công.","Tranh chấp lao động tập thể đang được cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết.","Tiến hành đình công trong trường hợp không được đình công quy định tại Điều 209.","Khi đã có quyết định hoãn hoặc ngừng đình công của cơ quan có thẩm quyền theo Điều 210."]},"blld-45_205":{"tldr":"Ít nhất 03 ngày làm việc trước ngày đóng cửa tạm thời nơi làm việc, NSDLĐ phải niêm yết công khai quyết định tại nơi làm việc và thông báo cho các cơ quan, tổ chức liên quan.","points":["Phải thông báo cho tổ chức đại diện NLĐ đang tổ chức và lãnh đạo đình công.","Phải thông báo cho UBND cấp tỉnh và UBND cấp huyện có nơi làm việc dự kiến đóng cửa."]},"blld-45_207":{"tldr":"Quy định tiền lương và quyền lợi của NLĐ trong thời gian đình công, phân biệt giữa người không tham gia phải ngừng việc và người tham gia đình công.","points":["NLĐ không tham gia đình công nhưng phải ngừng việc vì lý do đình công thì được trả lương ngừng việc theo khoản 2 Điều 99 và các quyền lợi khác theo pháp luật lao động.","NLĐ tham gia đình công không được trả lương và các quyền lợi khác, trừ trường hợp các bên có thỏa thuận khác."]},"blld-45_208":{"tldr":"Liệt kê các hành vi bị nghiêm cấm trước, trong và sau khi đình công.","points":["Cản trở quyền đình công hoặc kích động, lôi kéo, ép buộc NLĐ đình công; cản trở NLĐ không tham gia đình công đi làm việc.","Dùng bạo lực; hủy hoại máy, thiết bị, tài sản của NSDLĐ.","Xâm phạm trật tự, an toàn công cộng.","Chấm dứt HĐLĐ hoặc xử lý kỷ luật lao động, điều động sang công việc khác hoặc đi làm nơi khác đối với NLĐ, người lãnh đạo đình công vì lý do chuẩn bị hoặc tham gia đình công.","Trù dập, trả thù người tham gia đình công, người lãnh đạo đình công.","Lợi dụng đình công để thực hiện hành vi vi phạm pháp luật."]},"blld-45_209":{"tldr":"Không được đình công ở nơi sử dụng lao động mà việc đình công có thể đe dọa đến quốc phòng, an ninh, trật tự công cộng, sức khỏe của con người; Chính phủ quy định danh mục nơi này.","points":["Chính phủ quy định danh mục nơi sử dụng lao động không được đình công và việc giải quyết tranh chấp lao động tại các nơi đó."]},"blld-45_210":{"tldr":"Chủ tịch UBND cấp tỉnh quyết định hoãn hoặc ngừng đình công khi xét thấy cuộc đình công có nguy cơ gây thiệt hại nghiêm trọng cho nền kinh tế quốc dân, lợi ích công cộng, đe dọa quốc phòng, an ninh, trật tự công cộng, sức khỏe con người.","points":["Chính phủ quy định chi tiết việc hoãn, ngừng đình công và giải quyết quyền lợi của NLĐ."]},"blld-45_211":{"tldr":"Trong thời hạn 12 giờ kể từ khi nhận thông báo về cuộc đình công không tuân theo các Điều 200, 201, 202, Chủ tịch UBND cấp huyện chủ trì, chỉ đạo cơ quan chuyên môn về lao động phối hợp với công đoàn cùng cấp và cơ quan liên quan gặp gỡ các bên để hỗ trợ tìm biện pháp giải quyết.","points":["Nếu phát hiện hành vi vi phạm pháp luật thì lập biên bản, xử lý hoặc kiến nghị cơ quan có thẩm quyền xử lý cá nhân, tổ chức vi phạm.","Đối với nội dung tranh chấp lao động thì tùy loại tranh chấp, hướng dẫn, hỗ trợ các bên tiến hành thủ tục giải quyết theo Bộ luật này."]},"blld-45_212":{"tldr":"Liệt kê nội dung quản lý nhà nước về lao động.","points":["Ban hành và tổ chức thực hiện văn bản quy phạm pháp luật về lao động.","Theo dõi, thống kê, cung cấp thông tin cung cầu lao động; quyết định chính sách tiền lương, chính sách - quy hoạch - kế hoạch nguồn nhân lực, giáo dục nghề nghiệp, phát triển kỹ năng nghề; xây dựng khung trình độ kỹ năng nghề quốc gia và khung trình độ quốc gia Việt Nam; quy định danh mục nghề chỉ được sử dụng lao động đã qua đào tạo hoặc có chứng chỉ kỹ năng nghề quốc gia.","Nghiên cứu khoa học về lao động; thống kê, thông tin về lao động, thị trường lao động, mức sống, tiền lương, thu nhập; quản lý lao động về số lượng, chất lượng, biến động.","Xây dựng cơ chế, thiết chế hỗ trợ phát triển quan hệ lao động; thúc đẩy áp dụng Bộ luật đối với người làm việc không có quan hệ lao động; đăng ký và quản lý tổ chức của NLĐ tại doanh nghiệp.","Kiểm tra, thanh tra, xử lý vi phạm và giải quyết khiếu nại, tố cáo, tranh chấp lao động.","Hợp tác quốc tế về lao động."]},"blld-45_213":{"tldr":"Quy định thẩm quyền quản lý nhà nước về lao động giữa Chính phủ, Bộ Lao động - Thương binh và Xã hội, các Bộ, cơ quan ngang Bộ và UBND các cấp.","points":["Chính phủ thống nhất quản lý nhà nước về lao động trong phạm vi cả nước.","Bộ Lao động - Thương binh và Xã hội chịu trách nhiệm trước Chính phủ thực hiện quản lý nhà nước về lao động.","Bộ, cơ quan ngang Bộ thực hiện và phối hợp với Bộ Lao động - Thương binh và Xã hội trong phạm vi nhiệm vụ, quyền hạn của mình.","UBND các cấp thực hiện quản lý nhà nước về lao động trong phạm vi địa phương."]},"blld-45_214":{"tldr":"Liệt kê nội dung thanh tra lao động.","points":["Thanh tra việc chấp hành quy định pháp luật về lao động.","Điều tra tai nạn lao động và vi phạm an toàn, vệ sinh lao động.","Tham gia hướng dẫn áp dụng hệ thống tiêu chuẩn, quy chuẩn kỹ thuật về điều kiện lao động, an toàn, vệ sinh lao động.","Giải quyết khiếu nại, tố cáo về lao động.","Xử lý theo thẩm quyền và kiến nghị cơ quan có thẩm quyền xử lý vi phạm pháp luật về lao động."]},"blld-45_216":{"tldr":"Thanh tra lao động có quyền thanh tra, điều tra nơi thuộc đối tượng, phạm vi thanh tra được giao theo quyết định thanh tra.","points":["Khi thanh tra đột xuất theo quyết định của người có thẩm quyền trong trường hợp khẩn cấp có nguy cơ đe dọa an toàn, tính mạng, sức khỏe, danh dự, nhân phẩm của NLĐ tại nơi làm việc thì không cần báo trước."]},"blld-45_217":{"tldr":"Người vi phạm Bộ luật này tùy tính chất, mức độ bị xử lý kỷ luật, xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự, nếu gây thiệt hại thì phải bồi thường.","points":["Khi Tòa án đã quyết định cuộc đình công là bất hợp pháp, NLĐ đang đình công phải ngừng ngay và trở lại làm việc; nếu không thì tùy mức độ có thể bị xử lý kỷ luật lao động.","Nếu cuộc đình công bất hợp pháp gây thiệt hại cho NSDLĐ thì tổ chức đại diện NLĐ tổ chức và lãnh đạo đình công phải bồi thường thiệt hại.","Người lợi dụng đình công gây mất trật tự, làm tổn hại tài sản NSDLĐ; người cản trở quyền đình công, kích động, lôi kéo, ép buộc; người trù dập, trả thù thì tùy mức độ bị xử phạt hành chính hoặc truy cứu trách nhiệm hình sự, nếu gây thiệt hại phải bồi thường."]},"blld-45_219":{"tldr":"Sửa đổi, bổ sung một số điều của Luật Bảo hiểm xã hội số 58/2014/QH13 (Điều 54, 55, khoản 1 Điều 73) và Điều 32 của Bộ luật Tố tụng dân sự số 92/2015/QH13 liên quan đến điều kiện hưởng lương hưu và thẩm quyền giải quyết tranh chấp lao động của Tòa án.","points":["Sửa Điều 54 Luật BHXH: NLĐ có đủ 20 năm đóng BHXH trở lên được hưởng lương hưu nếu đủ tuổi theo khoản 2 Điều 169 BLLĐ, hoặc đủ tuổi theo khoản 3 Điều 169 và có đủ 15 năm làm nghề nặng nhọc, độc hại, nguy hiểm hoặc ở vùng đặc biệt khó khăn; trường hợp khai thác than trong hầm lò được thấp hơn tối đa 10 tuổi với đủ 15 năm; người nhiễm HIV do tai nạn rủi ro nghề nghiệp.","Sửa Điều 54: nhóm điểm đ, e khoản 1 Điều 2 có đủ 20 năm đóng được hưởng nếu thấp hơn tối đa 05 tuổi (trừ các luật chuyên ngành quy định khác), hoặc thấp hơn tối đa 05 tuổi với đủ 15 năm nghề nặng nhọc/vùng đặc biệt khó khăn, hoặc nhiễm HIV do tai nạn nghề nghiệp.","Sửa Điều 54: lao động nữ là cán bộ, công chức cấp xã hoặc hoạt động không chuyên trách ở xã, phường, thị trấn có từ đủ 15 năm đến dưới 20 năm đóng BHXH và đủ tuổi nghỉ hưu theo khoản 2 Điều 169 thì được hưởng lương hưu.","Sửa Điều 55 Luật BHXH về hưởng lương hưu khi suy giảm khả năng lao động: mức thấp hơn khi thấp hơn tối đa 05 tuổi và suy giảm 61% đến dưới 81%, thấp hơn tối đa 10 tuổi và suy giảm từ 81% trở lên, hoặc đủ 15 năm nghề đặc biệt nặng nhọc độc hại nguy hiểm và suy giảm từ 61% trở lên.","Sửa khoản 1 Điều 73 Luật BHXH: hưởng lương hưu khi đủ tuổi nghỉ hưu theo khoản 2 Điều 169 BLLĐ và đủ 20 năm đóng BHXH trở lên.","Sửa Điều 32 Bộ luật Tố tụng dân sự: bổ sung các khoản 1a, 1b, 1c về thẩm quyền của Tòa án giải quyết tranh chấp lao động cá nhân và tập thể về quyền liên quan trọng tài lao động; bãi bỏ khoản 2 Điều 32."]},"blld-45_220":{"tldr":"Bộ luật có hiệu lực thi hành từ ngày 01/01/2021; Bộ luật Lao động số 10/2012/QH13 hết hiệu lực kể từ ngày này.","points":["HĐLĐ, thỏa ước lao động tập thể, các thỏa thuận hợp pháp đã giao kết mà không trái hoặc bảo đảm cho NLĐ quyền và điều kiện thuận lợi hơn được tiếp tục thực hiện, trừ khi các bên thỏa thuận sửa đổi, bổ sung để phù hợp.","Chế độ lao động đối với cán bộ, công chức, viên chức, lực lượng Quân đội nhân dân, Công an nhân dân, tổ chức xã hội, xã viên hợp tác xã, người làm việc không có quan hệ lao động do văn bản pháp luật khác quy định nhưng tùy đối tượng được áp dụng một số quy định trong Bộ luật này."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
