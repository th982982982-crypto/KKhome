":[{"k":"p","t":"1. Số lượng người tham gia thương lượng tập thể của mỗi bên do các bên thỏa thuận."},{"k":"p","t":"2. Thành phần tham gia thương lượng tập thể của mỗi bên do bên đó quyết định."},{"k":"p","t":"Trường hợp bên người lao động có nhiều tổ chức đại diện tham gia thương lượng tập thể theo quy định tại khoản 2 Điều 68 của Bộ luật này thì tổ chức đại diện có quyền yêu cầu thương lượng quyết định số lượng đại diện của mỗi tổ chức tham gia thương lượng."},{"k":"p","t":"Trường hợp bên người lao động có nhiều tổ chức đại diện tham gia thương lượng tập thể theo quy định tại khoản 3 Điều 68 của Bộ luật này thì số lượng đại diện của mỗi tổ chức do các tổ chức đó thỏa thuận. Trường hợp không thỏa thuận được thì từng tổ chức xác định số lượng đại diện tham gia tương ứng theo số lượng thành viên của tổ chức mình trên tổng số thành viên của các tổ chức."},{"k":"p","t":"3. Mỗi bên thương lượng tập thể có quyền mời tổ chức đại diện cấp trên của mình cử người tham gia là đại diện thương lượng và bên kia không được từ chối. Đại diện thương lượng tập thể của mỗi bên không được vượt quá số lượng quy định tại khoản 1 Điều này, trừ trường hợp được bên kia đồng ý."}]},{"id":"blld-45_70","no":70,"code":"Điều 70","title":"Điều 70. Quy trình thương lượng tập thể tại doanh nghiệp","shortTitle":"Quy trình thương lượng tập thể tại doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Khi có yêu cầu thương lượng tập thể của tổ chức đại diện người lao động tại cơ sở có quyền yêu cầu thương lượng tập thể theo quy định tại Điều 68 của Bộ luật này hoặc yêu cầu của người sử dụng lao động thì bên nhận được yêu cầu không được từ chối việc thương lượng."},{"k":"p","t":"Trong thời hạn 07 ngày làm việc kể từ ngày nhận được yêu cầu và nội dung thương lượng, các bên thỏa thuận về địa điểm, thời gian bắt đầu thương lượng."},{"k":"p","t":"Người sử dụng lao động có trách nhiệm bố trí thời gian, địa điểm và các điều kiện cần thiết để tổ chức các phiên họp thương lượng tập thể."},{"k":"p","t":"Thời gian bắt đầu thương lượng không được quá 30 ngày kể từ ngày nhận được yêu cầu thương lượng tập thể."},{"k":"p","t":"2. Thời gian thương lượng tập thể không được quá 90 ngày kể từ ngày bắt đầu thương lượng, trừ trường hợp các bên có thỏa thuận khác."},{"k":"p","t":"Thời gian tham gia các phiên họp thương lượng tập thể của đại diện bên người lao động được tính là thời gian làm việc có hưởng lương. Trường hợp người lao động là thành viên của tổ chức đại diện người lao động tham gia các phiên họp thương lượng tập thể thì thời gian tham gia các phiên họp không tính vào thời gian quy định tại khoản 2 Điều 176 của Bộ luật này."},{"k":"p","t":"3. Trong quá trình thương lượng tập thể, nếu có yêu cầu của bên đại diện người lao động thì trong thời hạn 10 ngày kể từ ngày nhận được yêu cầu, bên người sử dụng lao động có trách nhiệm cung cấp thông tin về tình hình hoạt động sản xuất, kinh doanh và nội dung khác liên quan trực tiếp đến nội dung thương lượng trong phạm vi doanh nghiệp nhằm tạo điều kiện thuận lợi cho thương lượng tập thể, trừ thông tin về bí mật kinh doanh, bí mật công nghệ của người sử dụng lao động."},{"k":"p","t":"4. Tổ chức đại diện người lao động tại cơ sở có quyền tổ chức thảo luận, lấy ý kiến người lao động về nội dung, cách thức tiến hành và kết quả của quá trình thương lượng tập thể."},{"k":"p","t":"Tổ chức đại diện người lao động tại cơ sở quyết định về thời gian, địa điểm và cách thức tiến hành thảo luận, lấy ý kiến người lao động nhưng không được làm ảnh hưởng đến hoạt động sản xuất, kinh doanh bình thường của doanh nghiệp."},{"k":"p","t":"Người sử dụng lao động không được gây khó khăn, cản trở hoặc can thiệp vào quá trình tổ chức đại diện người lao động thảo luận, lấy ý kiến người lao động."},{"k":"p","t":"5. Việc thương lượng tập thể phải được lập biên bản, trong đó ghi rõ nội dung đã được các bên thống nhất, nội dung còn ý kiến khác nhau. Biên bản thương lượng tập thể phải có chữ ký của đại diện các bên thương lượng và của người ghi biên bản. Tổ chức đại diện người lao động tại cơ sở công bố rộng rãi, công khai biên bản thương lượng tập thể đến toàn bộ người lao động."}]},{"id":"blld-45_71","no":71,"code":"Điều 71","title":"Điều 71. Thương lượng tập thể không thành","shortTitle":"Thương lượng tập thể không thành","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thương lượng tập thể không thành thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Một bên từ chối thương lượng hoặc không tiến hành thương lượng trong thời hạn quy định tại khoản 1 Điều 70 của Bộ luật này;"},{"k":"p","t":"b) Đã hết thời hạn quy định tại khoản 2 Điều 70 của Bộ luật này mà các bên không đạt được thỏa thuận;"},{"k":"p","t":"c) Chưa hết thời hạn quy định tại khoản 2 Điều 70 của Bộ luật này nhưng các bên cùng xác định và tuyên bố về việc thương lượng tập thể không đạt được thỏa thuận."},{"k":"p","t":"2. Khi thương lượng không thành, các bên thương lượng tiến hành thủ tục giải quyết tranh chấp lao động theo quy định của Bộ luật này. Trong khi đang giải quyết tranh chấp lao động, tổ chức đại diện người lao động không được tổ chức đình công."}]},{"id":"blld-45_72","no":72,"code":"Điều 72","title":"Điều 72. Thương lượng tập thể ngành, thương lượng tập thể có nhiều doanh nghiệp tham gia","shortTitle":"Thương lượng tập thể ngành, thương lượng tập thể có nhiều doanh nghiệp tham gia","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Nguyên tắc, nội dung thương lượng tập thể ngành, thương lượng tập thể có nhiều doanh nghiệp tham gia thực hiện theo quy định tại Điều 66 và Điều 67 của Bộ luật này."},{"k":"p","t":"2. Quy trình tiến hành thương lượng tập thể ngành, thương lượng tập thể có nhiều doanh nghiệp tham gia do các bên thỏa thuận quyết định, bao gồm cả việc thỏa thuận tiến hành thương lượng tập thể thông qua Hội đồng thương lượng tập thể quy định tại Điều 73 của Bộ luật này."},{"k":"p","t":"3. Trường hợp thương lượng tập thể ngành thì đại diện thương lượng là tổ chức công đoàn ngành và tổ chức đại diện người sử dụng lao động cấp ngành quyết định."},{"k":"p","t":"Trường hợp thương lượng tập thể có nhiều doanh nghiệp tham gia thì đại diện thương lượng do các bên thương lượng quyết định trên cơ sở tự nguyện, thỏa thuận."}]},{"id":"blld-45_73","no":73,"code":"Điều 73","title":"Điều 73. Thương lượng tập thể có nhiều doanh nghiệp tham gia thông qua Hội đồng thương lượng tập thể","shortTitle":"Thương lượng tập thể có nhiều doanh nghiệp tham gia thông qua Hội đồng thương lượng tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trên cơ sở đồng thuận, các bên thương lượng tập thể có nhiều doanh nghiệp tham gia có thể yêu cầu Ủy ban nhân dân cấp tỉnh nơi đặt trụ sở chính của các doanh nghiệp tham gia thương lượng hoặc nơi do các bên lựa chọn trong trường hợp các doanh nghiệp tham gia thương lượng có trụ sở chính tại nhiều tỉnh, thành phố trực thuộc Trung ương thành lập Hội đồng thương lượng tập thể để tiến hành thương lượng tập thể."},{"k":"p","t":"2. Khi nhận được yêu cầu của các bên thương lượng tập thể có nhiều doanh nghiệp tham gia, Ủy ban nhân dân cấp tỉnh quyết định thành lập Hội đồng thương lượng tập thể để tổ chức việc thương lượng tập thể. Thành phần Hội đồng thương lượng tập thể bao gồm:"},{"k":"p","t":"a) Chủ tịch Hội đồng do các bên quyết định và có trách nhiệm điều phối hoạt động của Hội đồng thương lượng tập thể, hỗ trợ cho việc thương lượng tập thể của các bên;"},{"k":"p","t":"b) Đại diện các bên thương lượng tập thể do mỗi bên cử. Số lượng đại diện mỗi bên thương lượng tham gia Hội đồng do các bên thỏa thuận;"},{"k":"p","t":"c) Đại diện Ủy ban nhân dân cấp tỉnh."},{"k":"p","t":"3. Hội đồng thương lượng tập thể tiến hành thương lượng theo yêu cầu của các bên và tự chấm dứt hoạt động khi thỏa ước lao động tập thể có nhiều doanh nghiệp tham gia được ký kết hoặc theo thỏa thuận của các bên."},{"k":"p","t":"4. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chức năng, nhiệm vụ, hoạt động của Hội đồng thương lượng tập thể."}]},{"id":"blld-45_74","no":74,"code":"Điều 74","title":"Điều 74. Trách nhiệm của Ủy ban nhân dân cấp tỉnh trong thương lượng tập thể","shortTitle":"Trách nhiệm của Ủy ban nhân dân cấp tỉnh trong thương lượng tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tổ chức đào tạo, bồi dưỡng kỹ năng thương lượng tập thể cho các bên thương lượng tập thể."},{"k":"p","t":"2. Xây dựng và cung cấp các thông tin, dữ liệu về kinh tế - xã hội, thị trường lao động, quan hệ lao động nhằm hỗ trợ, thúc đẩy thương lượng tập thể."},{"k":"p","t":"3. Chủ động hoặc khi có yêu cầu của cả hai bên thương lượng tập thể, hỗ trợ các bên đạt được thỏa thuận trong quá trình thương lượng tập thể; trường hợp không có yêu cầu, việc chủ động hỗ trợ của Ủy ban nhân dân cấp tỉnh chỉ được tiến hành nếu được các bên đồng ý."},{"k":"p","t":"4. Thành lập Hội đồng thương lượng tập thể khi có yêu cầu của các bên thương lượng tập thể có nhiều doanh nghiệp theo quy định tại Điều 73 của Bộ luật này."},{"k":"p","t":"THỎA ƯỚC LAO ĐỘNG TẬP THỂ"}]},{"id":"blld-45_75","no":75,"code":"Điều 75","title":"Điều 75. Thỏa ước lao động tập thể","shortTitle":"Thỏa ước lao động tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thỏa ước lao động tập thể là thỏa thuận đạt được thông qua thương lượng tập thể và được các bên ký kết bằng văn bản."},{"k":"p","t":"Thỏa ước lao động tập thể bao gồm thỏa ước lao động tập thể doanh nghiệp, thỏa ước lao động tập thể ngành, thỏa ước lao động tập thể có nhiều doanh nghiệp và các thỏa ước lao động tập thể khác."},{"k":"p","t":"2. Nội dung thỏa ước lao động tập thể không được trái với quy định của pháp luật; khuyến khích có lợi hơn cho người lao động so với quy định của pháp luật."}]},{"id":"blld-45_76","no":76,"code":"Điều 76","title":"Điều 76. Lấy ý kiến và ký kết thỏa ước lao động tập thể","shortTitle":"Lấy ý kiến và ký kết thỏa ước lao động tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Đối với thỏa ước lao động tập thể doanh nghiệp, trước khi ký kết, dự thảo thỏa ước lao động tập thể đã được các bên đàm phán phải được lấy ý kiến của toàn bộ người lao động trong doanh nghiệp. Thỏa ước lao động tập thể doanh nghiệp chỉ được ký kết khi có trên 50% người lao động của doanh nghiệp biểu quyết tán thành."},{"k":"p","t":"2. Đối với thỏa ước lao động tập thể ngành, đối tượng lấy ý kiến bao gồm toàn bộ thành viên ban lãnh đạo của các tổ chức đại diện người lao động tại các doanh nghiệp tham gia thương lượng. Thỏa ước lao động tập thể ngành chỉ được ký kết khi có trên 50% tổng số người được lấy ý kiến biểu quyết tán thành."},{"k":"p","t":"Đối với thỏa ước lao động tập thể có nhiều doanh nghiệp, đối tượng lấy ý kiến bao gồm toàn bộ người lao động tại các doanh nghiệp tham gia thương lượng hoặc toàn bộ thành viên ban lãnh đạo của các tổ chức đại diện người lao động tại các doanh nghiệp tham gia thương lượng. Chỉ những doanh nghiệp có trên 50% số người được lấy ý kiến biểu quyết tán thành mới tham gia ký kết thỏa ước lao động tập thể có nhiều doanh nghiệp."},{"k":"p","t":"3. Thời gian, địa điểm và cách thức lấy ý kiến biểu quyết đối với dự thảo thỏa ước lao động tập thể do tổ chức đại diện người lao động quyết định nhưng không được làm ảnh hưởng đến hoạt động sản xuất, kinh doanh bình thường của doanh nghiệp tham gia thương lượng. Người sử dụng lao động không được gây khó khăn, cản trở hoặc can thiệp vào quá trình tổ chức đại diện người lao động lấy ý kiến biểu quyết về dự thảo thỏa ước."},{"k":"p","t":"4. Thỏa ước lao động tập thể được ký kết bởi đại diện hợp pháp của các bên thương lượng."},{"k":"p","t":"Trường hợp thỏa ước lao động tập thể có nhiều doanh nghiệp được tiến hành thông qua Hội đồng thương lượng tập thể thì được ký kết bởi Chủ tịch Hội đồng thương lượng tập thể và đại diện hợp pháp của các bên thương lượng."},{"k":"p","t":"5. Thỏa ước lao động tập thể phải được gửi cho mỗi bên ký kết và cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh theo quy định tại Điều 77 của Bộ luật này."},{"k":"p","t":"Đối với thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp thì từng người sử dụng lao động và từng tổ chức đại diện người lao động tại các doanh nghiệp tham gia thỏa ước phải được nhận 01 bản."},{"k":"p","t":"6. Sau khi thỏa ước lao động tập thể được ký kết, người sử dụng lao động phải công bố cho người lao động của mình biết."},{"k":"p","t":"7. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_77","no":77,"code":"Điều 77","title":"Điều 77. Gửi thỏa ước lao động tập thể","shortTitle":"Gửi thỏa ước lao động tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Trong thời hạn 10 ngày kể từ ngày thỏa ước lao động tập thể được ký kết, người sử dụng lao động tham gia thỏa ước phải gửi 01 bản thỏa ước lao động tập thể đến cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh nơi đặt trụ sở chính."}]},{"id":"blld-45_78","no":78,"code":"Điều 78","title":"Điều 78. Hiệu lực và thời hạn của thỏa ước lao động tập thể","shortTitle":"Hiệu lực và thời hạn của thỏa ước lao động tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Ngày có hiệu lực của thỏa ước lao động tập thể do các bên thỏa thuận và được ghi trong thỏa ước. Trường hợp các bên không thỏa thuận ngày có hiệu lực thì thỏa ước lao động tập thể có hiệu lực kể từ ngày ký kết."},{"k":"p","t":"Thỏa ước lao động tập thể sau khi có hiệu lực phải được các bên tôn trọng thực hiện."},{"k":"p","t":"2. Thỏa ước lao động tập thể doanh nghiệp có hiệu lực áp dụng đối với người sử dụng lao động và toàn bộ người lao động của doanh nghiệp. Thỏa ước lao động tập thể ngành và thỏa ước lao động tập thể có nhiều doanh nghiệp có hiệu lực áp dụng đối với toàn bộ người sử dụng lao động và người lao động của các doanh nghiệp tham gia thỏa ước lao động tập thể."},{"k":"p","t":"3. Thỏa ước lao động tập thể có thời hạn từ 01 năm đến 03 năm. Thời hạn cụ thể do các bên thỏa thuận và ghi trong thỏa ước lao động tập thể. Các bên có quyền thỏa thuận thời hạn khác nhau đối với các nội dung của thỏa ước lao động tập thể."}]},{"id":"blld-45_79","no":79,"code":"Điều 79","title":"Điều 79. Thực hiện thỏa ước lao động tập thể tại doanh nghiệp","shortTitle":"Thực hiện thỏa ước lao động tập thể tại doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động, người lao động, bao gồm cả người lao động vào làm việc sau ngày thỏa ước lao động tập thể có hiệu lực, có nghĩa vụ thực hiện đầy đủ thỏa ước lao động tập thể đang có hiệu lực."},{"k":"p","t":"2. Trường hợp quyền, nghĩa vụ và lợi ích của các bên trong hợp đồng lao động đã giao kết trước ngày thỏa ước lao động tập thể có hiệu lực thấp hơn quy định tương ứng của thỏa ước lao động tập thể thì phải thực hiện theo thỏa ước lao động tập thể. Quy định của người sử dụng lao động chưa phù hợp với thỏa ước lao động tập thể thì phải được sửa đổi cho phù hợp; trong thời gian chưa sửa đổi thì thực hiện theo nội dung tương ứng của thỏa ước lao động tập thể."},{"k":"p","t":"3. Khi một bên cho rằng bên kia thực hiện không đầy đủ hoặc vi phạm thỏa ước lao động tập thể thì có quyền yêu cầu thi hành đúng thỏa ước lao động tập thể và các bên có trách nhiệm cùng xem xét giải quyết; nếu không giải quyết được, mỗi bên đều có quyền yêu cầu giải quyết tranh chấp lao động tập thể theo quy định của pháp luật."}]},{"id":"blld-45_80","no":80,"code":"Điều 80","title":"Điều 80. Thực hiện thỏa ước lao động tập thể doanh nghiệp trong trường hợp chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp","shortTitle":"Thực hiện thỏa ước lao động tập thể doanh nghiệp trong trường hợp chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trường hợp chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp thì người sử dụng lao động kế tiếp và tổ chức đại diện người lao động có quyền thương lượng theo quy định tại Điều 68 của Bộ luật này căn cứ vào phương án sử dụng lao động để xem xét lựa chọn việc tiếp tục thực hiện, sửa đổi, bổ sung thỏa ước lao động tập thể doanh nghiệp cũ hoặc thương lượng để ký kết thỏa ước lao động tập thể mới."},{"k":"p","t":"2. Trường hợp thỏa ước lao động tập thể doanh nghiệp hết hiệu lực do người sử dụng lao động chấm dứt hoạt động thì quyền lợi của người lao động được giải quyết theo quy định của pháp luật."}]},{"id":"blld-45_81","no":81,"code":"Điều 81","title":"Điều 81. Quan hệ giữa thỏa ước lao động tập thể doanh nghiệp, thỏa ước lao động tập thể ngành và thỏa ước lao động tập thể có nhiều doanh nghiệp","shortTitle":"Quan hệ giữa thỏa ước lao động tập thể doanh nghiệp, thỏa ước lao động tập thể ngành và thỏa ước lao động tập thể có nhiều doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trường hợp thỏa ước lao động tập thể doanh nghiệp, thỏa ước lao động tập thể có nhiều doanh nghiệp, thỏa ước lao động tập thể ngành quy định về quyền, nghĩa vụ và lợi ích của người lao động khác nhau thì thực hiện theo nội dung có lợi nhất cho người lao động."},{"k":"p","t":"2. Doanh nghiệp thuộc đối tượng áp dụng của thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp nhưng chưa có thỏa ước lao động tập thể doanh nghiệp thì có thể xây dựng thỏa ước lao động tập thể doanh nghiệp với những nội dung có lợi hơn cho người lao động so với thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp."},{"k":"p","t":"3. Khuyến khích doanh nghiệp chưa tham gia thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp thực hiện nội dung có lợi hơn cho người lao động của thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp."}]},{"id":"blld-45_82","no":82,"code":"Điều 82","title":"Điều 82. Sửa đổi, bổ sung thỏa ước lao động tập thể","shortTitle":"Sửa đổi, bổ sung thỏa ước lao động tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thỏa ước lao động tập thể chỉ được sửa đổi, bổ sung theo thỏa thuận tự nguyện của các bên, thông qua thương lượng tập thể."},{"k":"p","t":"Việc sửa đổi, bổ sung thỏa ước lao động tập thể được thực hiện như việc thương lượng, ký kết thỏa ước lao động tập thể."},{"k":"p","t":"2. Trường hợp quy định của pháp luật thay đổi dẫn đến thỏa ước lao động tập thể không còn phù hợp với quy định của pháp luật thì các bên phải tiến hành sửa đổi, bổ sung thỏa ước lao động tập thể cho phù hợp với quy định của pháp luật. Trong thời gian tiến hành sửa đổi, bổ sung thỏa ước lao động tập thể thì quyền lợi của người lao động được thực hiện theo quy định của pháp luật."}]},{"id":"blld-45_83","no":83,"code":"Điều 83","title":"Điều 83. Thỏa ước lao động tập thể hết hạn","shortTitle":"Thỏa ước lao động tập thể hết hạn","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Trong thời hạn 90 ngày trước ngày thỏa ước lao động tập thể hết hạn, các bên có thể thương lượng để kéo dài thời hạn của thỏa ước lao động tập thể hoặc ký kết thỏa ước lao động tập thể mới. Trường hợp các bên thỏa thuận kéo dài thời hạn của thỏa ước lao động tập thể thì phải lấy ý kiến theo quy định tại Điều 76 của Bộ luật này."},{"k":"p","t":"Khi thỏa ước lao động tập thể hết hạn mà các bên vẫn tiếp tục thương lượng thì thỏa ước lao động tập thể cũ vẫn được tiếp tục thực hiện trong thời hạn không quá 90 ngày kể từ ngày thỏa ước lao động tập thể hết hạn, trừ trường hợp các bên có thỏa thuận khác."}]},{"id":"blld-45_84","no":84,"code":"Điều 84","title":"Điều 84. Mở rộng phạm vi áp dụng của thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp","shortTitle":"Mở rộng phạm vi áp dụng của thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Khi một thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp có phạm vi áp dụng chiếm trên 75% người lao động hoặc trên 75% doanh nghiệp cùng ngành, nghề, lĩnh vực trong khu công nghiệp, khu kinh tế, khu chế xuất, khu công nghệ cao thì người sử dụng lao động hoặc tổ chức đại diện của người lao động tại đó đề nghị cơ quan nhà nước có thẩm quyền quyết định mở rộng phạm vi áp dụng một phần hoặc toàn bộ thỏa ước đó đối với các doanh nghiệp cùng ngành, nghề, lĩnh vực trong khu công nghiệp, khu kinh tế, khu chế xuất, khu công nghệ cao."},{"k":"p","t":"2. Chính phủ quy định chi tiết khoản 1 Điều này; quy định trình tự, thủ tục và thẩm quyền quyết định mở rộng phạm vi áp dụng thỏa ước lao động tập thể quy định tại khoản 1 Điều này."}]},{"id":"blld-45_85","no":85,"code":"Điều 85","title":"Điều 85. Gia nhập và rút khỏi thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp","shortTitle":"Gia nhập và rút khỏi thỏa ước lao động tập thể ngành hoặc thỏa ước lao động tập thể có nhiều doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có thể gia nhập thỏa ước lao động tập thể ngành, thỏa ước lao động tập thể có nhiều doanh nghiệp khi có sự đồng thuận của tất cả người sử dụng lao động và tổ chức đại diện người lao động tại doanh nghiệp là thành viên của thỏa ước, trừ trường hợp quy định tại khoản 1 Điều 84 của Bộ luật này."},{"k":"p","t":"2. Doanh nghiệp thành viên của thỏa ước lao động tập thể ngành, thỏa ước lao động tập thể có nhiều doanh nghiệp được rút khỏi thỏa ước lao động tập thể khi có sự đồng thuận của tất cả người sử dụng lao động và tổ chức đại diện người lao động tại doanh nghiệp là thành viên của thỏa ước, trừ trường hợp có khó khăn đặc biệt trong hoạt động sản xuất, kinh doanh."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_86","no":86,"code":"Điều 86","title":"Điều 86. Thỏa ước lao động tập thể vô hiệu","shortTitle":"Thỏa ước lao động tập thể vô hiệu","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thỏa ước lao động tập thể vô hiệu từng phần khi một hoặc một số nội dung trong thỏa ước lao động tập thể vi phạm pháp luật."},{"k":"p","t":"2. Thỏa ước lao động tập thể vô hiệu toàn bộ thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Toàn bộ nội dung thỏa ước lao động tập thể vi phạm pháp luật;"},{"k":"p","t":"b) Người ký kết không đúng thẩm quyền;"},{"k":"p","t":"c) Không tuân thủ đúng quy trình thương lượng, ký kết thỏa ước lao động tập thể."}]},{"id":"blld-45_87","no":87,"code":"Điều 87","title":"Điều 87. Thẩm quyền tuyên bố thỏa ước lao động tập thể vô hiệu","shortTitle":"Thẩm quyền tuyên bố thỏa ước lao động tập thể vô hiệu","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Tòa án nhân dân có quyền tuyên bố thỏa ước lao động tập thể vô hiệu."}]},{"id":"blld-45_88","no":88,"code":"Điều 88","title":"Điều 88. Xử lý thỏa ước lao động tập thể vô hiệu","shortTitle":"Xử lý thỏa ước lao động tập thể vô hiệu","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Khi thỏa ước lao động tập thể bị tuyên bố vô hiệu thì quyền, nghĩa vụ và lợi ích của các bên ghi trong thỏa ước lao động tập thể tương ứng với toàn bộ hoặc phần bị tuyên bố vô hiệu được giải quyết theo quy định của pháp luật và các thỏa thuận hợp pháp trong hợp đồng lao động."}]},{"id":"blld-45_89","no":89,"code":"Điều 89","title":"Điều 89. Chi phí thương lượng, ký kết thỏa ước lao động tập thể","shortTitle":"Chi phí thương lượng, ký kết thỏa ước lao động tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Mọi chi phí cho việc thương lượng, ký kết, sửa đổi, bổ sung, gửi và công bố thỏa ước lao động tập thể do phía người sử dụng lao động chi trả."},{"k":"p","t":"Chương VITIỀN LƯƠNG"}]},{"id":"blld-45_90","no":90,"code":"Điều 90","title":"Điều 90. Tiền lương","shortTitle":"Tiền lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Tiền lương là số tiền mà người sử dụng lao động trả cho người lao động theo thỏa thuận để thực hiện công việc, bao gồm mức lương theo công việc hoặc chức danh, phụ cấp lương và các khoản bổ sung khác."},{"k":"p","t":"2. Mức lương theo công việc hoặc chức danh không được thấp hơn mức lương tối thiểu."},{"k":"p","t":"3. Người sử dụng lao động phải bảo đảm trả lương bình đẳng, không phân biệt giới tính đối với người lao động làm công việc có giá trị như nhau."}]},{"id":"blld-45_91","no":91,"code":"Điều 91","title":"Điều 91. Mức lương tối thiểu","shortTitle":"Mức lương tối thiểu","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Mức lương tối thiểu là mức lương thấp nhất được trả cho người lao động làm công việc giản đơn nhất trong điều kiện lao động bình thường nhằm bảo đảm mức sống tối thiểu của người lao động và gia đình họ, phù hợp với điều kiện phát triển kinh tế - xã hội."},{"k":"p","t":"2. Mức lương tối thiểu được xác lập theo vùng, ấn định theo tháng, giờ."},{"k":"p","t":"3. Mức lương tối thiểu được điều chỉnh dựa trên mức sống tối thiểu của người lao động và gia đình họ; tương quan giữa mức lương tối thiểu và mức lương trên thị trường; chỉ số giá tiêu dùng, tốc độ tăng trưởng kinh tế; quan hệ cung, cầu lao động; việc làm và thất nghiệp; năng suất lao động; khả năng chi trả của doanh nghiệp."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này; quyết định và công bố mức lương tối thiểu trên cơ sở khuyến nghị của Hội đồng tiền lương quốc gia."}]},{"id":"blld-45_92","no":92,"code":"Điều 92","title":"Điều 92. Hội đồng tiền lương quốc gia","shortTitle":"Hội đồng tiền lương quốc gia","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hội đồng tiền lương quốc gia là cơ quan tư vấn cho Chính phủ về mức lương tối thiểu và chính sách tiền lương đối với người lao động."},{"k":"p","t":"2. Thủ tướng Chính phủ thành lập Hội đồng tiền lương quốc gia bao gồm các thành viên là đại diện của Bộ Lao động - Thương binh và Xã hội, Tổng Liên đoàn Lao động Việt Nam, một số tổ chức đại diện người sử dụng lao động ở trung ương và chuyên gia độc lập."},{"k":"p","t":"3. Chính phủ quy định chức năng, nhiệm vụ, cơ cấu tổ chức và hoạt động của Hội đồng tiền lương quốc gia."}]},{"id":"blld-45_93","no":93,"code":"Điều 93","title":"Điều 93. Xây dựng thang lương, bảng lương và định mức lao động","shortTitle":"Xây dựng thang lương, bảng lương và định mức lao động","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải xây dựng thang lương, bảng lương và định mức lao động làm cơ sở để tuyển dụng, sử dụng lao động, thỏa thuận mức lương theo công việc hoặc chức danh ghi trong hợp đồng lao động và trả lương cho người lao động."},{"k":"p","t":"2. Mức lao động phải là mức trung bình bảo đảm số đông người lao động thực hiện được mà không phải kéo dài thời giờ làm việc bình thường và phải được áp dụng thử trước khi ban hành chính thức."},{"k":"p","t":"3. Người sử dụng lao động phải tham khảo ý kiến của tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở khi xây dựng thang lương, bảng lương và định mức lao động."},{"k":"p","t":"Thang lương, bảng lương và mức lao động phải được công bố công khai tại nơi làm việc trước khi thực hiện."}]},{"id":"blld-45_94","no":94,"code":"Điều 94","title":"Điều 94. Nguyên tắc trả lương","shortTitle":"Nguyên tắc trả lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải trả lương trực tiếp, đầy đủ, đúng hạn cho người lao động. Trường hợp người lao động không thể nhận lương trực tiếp thì người sử dụng lao động có thể trả lương cho người được người lao động ủy quyền hợp pháp."},{"k":"p","t":"2. Người sử dụng lao động không được hạn chế hoặc can thiệp vào quyền tự quyết chi tiêu lương của người lao động; không được ép buộc người lao động chi tiêu lương vào việc mua hàng hóa, sử dụng dịch vụ của người sử dụng lao động hoặc của đơn vị khác mà người sử dụng lao động chỉ định."}]},{"id":"blld-45_95","no":95,"code":"Điều 95","title":"Điều 95. Trả lương","shortTitle":"Trả lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động trả lương cho người lao động căn cứ vào tiền lương đã thỏa thuận, năng suất lao động và chất lượng thực hiện công việc."},{"k":"p","t":"2. Tiền lương ghi trong hợp đồng lao động và tiền lương trả cho người lao động bằng tiền Đồng Việt Nam, trường hợp người lao động là người nước ngoài tại Việt Nam thì có thể bằng ngoại tệ."},{"k":"p","t":"3. Mỗi lần trả lương, người sử dụng lao động phải thông báo bảng kê trả lương cho người lao động, trong đó ghi rõ tiền lương, tiền lương làm thêm giờ, tiền lương làm việc vào ban đêm, nội dung và số tiền bị khấu trừ (nếu có)."}]},{"id":"blld-45_96","no":96,"code":"Điều 96","title":"Điều 96. Hình thức trả lương","shortTitle":"Hình thức trả lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động và người lao động thỏa thuận về hình thức trả lương theo thời gian, sản phẩm hoặc khoán."},{"k":"p","t":"2. Lương được trả bằng tiền mặt hoặc trả qua tài khoản cá nhân của người lao động được mở tại ngân hàng."},{"k":"p","t":"Trường hợp trả lương qua tài khoản cá nhân của người lao động được mở tại ngân hàng thì người sử dụng lao động phải trả các loại phí liên quan đến việc mở tài khoản và chuyển tiền lương."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_97","no":97,"code":"Điều 97","title":"Điều 97. Kỳ hạn trả lương","shortTitle":"Kỳ hạn trả lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động hưởng lương theo giờ, ngày, tuần thì được trả lương sau giờ, ngày, tuần làm việc hoặc được trả gộp do hai bên thỏa thuận nhưng không quá 15 ngày phải được trả gộp một lần."},{"k":"p","t":"2. Người lao động hưởng lương theo tháng được trả một tháng một lần hoặc nửa tháng một lần. Thời điểm trả lương do hai bên thỏa thuận và phải được ấn định vào một thời điểm có tính chu kỳ."},{"k":"p","t":"3. Người lao động hưởng lương theo sản phẩm, theo khoán được trả lương theo thỏa thuận của hai bên; nếu công việc phải làm trong nhiều tháng thì hằng tháng được tạm ứng tiền lương theo khối lượng công việc đã làm trong tháng."},{"k":"p","t":"4. Trường hợp vì lý do bất khả kháng mà người sử dụng lao động đã tìm mọi biện pháp khắc phục nhưng không thể trả lương đúng hạn thì không được chậm quá 30 ngày; nếu trả lương chậm từ 15 ngày trở lên thì người sử dụng lao động phải đền bù cho người lao động một khoản tiền ít nhất bằng số tiền lãi của số tiền trả chậm tính theo lãi suất huy động tiền gửi có kỳ hạn 01 tháng do ngân hàng nơi người sử dụng lao động mở tài khoản trả lương cho người lao động công bố tại thời điểm trả lương."}]},{"id":"blld-45_98","no":98,"code":"Điều 98","title":"Điều 98. Tiền lương làm thêm giờ, làm việc vào ban đêm","shortTitle":"Tiền lương làm thêm giờ, làm việc vào ban đêm","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động làm thêm giờ được trả lương tính theo đơn giá tiền lương hoặc tiền lương thực trả theo công việc đang làm như sau:"},{"k":"p","t":"a) Vào ngày thường, ít nhất bằng 150%;"},{"k":"p","t":"b) Vào ngày nghỉ hằng tuần, ít nhất bằng 200%;"},{"k":"p","t":"c) Vào ngày nghỉ lễ, tết, ngày nghỉ có hưởng lương, ít nhất bằng 300% chưa kể tiền lương ngày lễ, tết, ngày nghỉ có hưởng lương đối với người lao động hưởng lương ngày."},{"k":"p","t":"2. Người lao động làm việc vào ban đêm thì được trả thêm ít nhất bằng 30% tiền lương tính theo đơn giá tiền lương hoặc tiền lương thực trả theo công việc của ngày làm việc bình thường."},{"k":"p","t":"3. Người lao động làm thêm giờ vào ban đêm thì ngoài việc trả lương theo quy định tại khoản 1 và khoản 2 Điều này, người lao động còn được trả thêm 20% tiền lương tính theo đơn giá tiền lương hoặc tiền lương theo công việc làm vào ban ngày của ngày làm việc bình thường hoặc của ngày nghỉ hằng tuần hoặc của ngày nghỉ lễ, tết."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_99","no":99,"code":"Điều 99","title":"Điều 99. Tiền lương ngừng việc","shortTitle":"Tiền lương ngừng việc","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Trường hợp phải ngừng việc, người lao động được trả lương như sau:"},{"k":"p","t":"1. Nếu do lỗi của người sử dụng lao động thì người lao động được trả đủ tiền lương theo hợp đồng lao động;"},{"k":"p","t":"2. Nếu do lỗi của người lao động thì người đó không được trả lương; những người lao động khác trong cùng đơn vị phải ngừng việc thì được trả lương theo mức do hai bên thỏa thuận nhưng không được thấp hơn mức lương tối thiểu;"},{"k":"p","t":"3. Nếu vì sự cố về điện, nước mà không do lỗi của người sử dụng lao động hoặc do thiên tai, hỏa hoạn, dịch bệnh nguy hiểm, địch họa, di dời địa điểm hoạt động theo yêu cầu của cơ quan nhà nước có thẩm quyền hoặc vì lý do kinh tế thì hai bên thỏa thuận về tiền lương ngừng việc như sau:"},{"k":"p","t":"a) Trường hợp ngừng việc từ 14 ngày làm việc trở xuống thì tiền lương ngừng việc được thỏa thuận không thấp hơn mức lương tối thiểu;"},{"k":"p","t":"b) Trường hợp phải ngừng việc trên 14 ngày làm việc thì tiền lương ngừng việc do hai bên thỏa thuận nhưng phải bảo đảm tiền lương ngừng việc trong 14 ngày đầu tiên không thấp hơn mức lương tối thiểu."}]},{"id":"blld-45_100","no":100,"code":"Điều 100","title":"Điều 100. Trả lương thông qua người cai thầu","shortTitle":"Trả lương thông qua người cai thầu","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Nơi nào sử dụng người cai thầu hoặc người có vai trò trung gian tương tự thì người sử dụng lao động là chủ chính phải có danh sách và địa chỉ của những người này kèm theo danh sách những người lao động làm việc với họ và phải bảo đảm việc họ tuân thủ quy định của pháp luật về trả lương, an toàn, vệ sinh lao động."},{"k":"p","t":"2. Trường hợp người cai thầu hoặc người có vai trò trung gian tương tự không trả lương hoặc trả lương không đầy đủ và không bảo đảm các quyền lợi khác cho người lao động thì người sử dụng lao động là chủ chính phải chịu trách nhiệm trả lương và bảo đảm các quyền lợi cho người lao động."},{"k":"p","t":"Trong trường hợp này, người sử dụng lao động là chủ chính có quyền yêu cầu người cai thầu hoặc người có vai trò trung gian tương tự đền bù hoặc yêu cầu cơ quan nhà nước có thẩm quyền giải quyết tranh chấp theo quy định của pháp luật."}]},{"id":"blld-45_101","no":101,"code":"Điều 101","title":"Điều 101. Tạm ứng tiền lương","shortTitle":"Tạm ứng tiền lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động được tạm ứng tiền lương theo điều kiện do hai bên thỏa thuận và không bị tính lãi."},{"k":"p","t":"2. Người sử dụng lao động phải cho người lao động tạm ứng tiền lương tương ứng với số ngày người lao động tạm thời nghỉ việc để thực hiện nghĩa vụ công dân từ 01 tuần trở lên nhưng tối đa không quá 01 tháng tiền lương theo hợp đồng lao động và người lao động phải hoàn trả số tiền đã tạm ứng."},{"k":"p","t":"Người lao động nhập ngũ theo quy định của Luật Nghĩa vụ quân sự thì không được tạm ứng tiền lương."},{"k":"p","t":"3. Khi nghỉ hằng năm, người lao động được tạm ứng một khoản tiền ít nhất bằng tiền lương của những ngày nghỉ."}]},{"id":"blld-45_102","no":102,"code":"Điều 102","title":"Điều 102. Khấu trừ tiền lương","shortTitle":"Khấu trừ tiền lương","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động chỉ được khấu trừ tiền lương của người lao động để bồi thường thiệt hại do làm hư hỏng dụng cụ, thiết bị, tài sản của người sử dụng lao động theo quy định tại Điều 129 của Bộ luật này."},{"k":"p","t":"2. Người lao động có quyền được biết lý do khấu trừ tiền lương của mình."},{"k":"p","t":"3. Mức khấu trừ tiền lương hằng tháng không được quá 30% tiền lương thực trả hằng tháng của người lao động sau khi trích nộp các khoản bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp, thuế thu nhập cá nhân."}]},{"id":"blld-45_103","no":103,"code":"Điều 103","title":"Điều 103. Chế độ nâng lương, nâng bậc, phụ cấp, trợ cấp","shortTitle":"Chế độ nâng lương, nâng bậc, phụ cấp, trợ cấp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Chế độ nâng lương, nâng bậc, phụ cấp, trợ cấp và các chế độ khuyến khích đối với người lao động được thỏa thuận trong hợp đồng lao động, thỏa ước lao động tập thể hoặc quy định của người sử dụng lao động."}]},{"id":"blld-45_104","no":104,"code":"Điều 104","title":"Điều 104. Thưởng","shortTitle":"Thưởng","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thưởng là số tiền hoặc tài sản hoặc bằng các hình thức khác mà người sử dụng lao động thưởng cho người lao động căn cứ vào kết quả sản xuất, kinh doanh, mức độ hoàn thành công việc của người lao động."},{"k":"p","t":"2. Quy chế thưởng do người sử dụng lao động quyết định và công bố công khai tại nơi làm việc sau khi tham khảo ý kiến của tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở."},{"k":"p","t":"THỜI GIỜ LÀM VIỆC"}]},{"id":"blld-45_105","no":105,"code":"Điều 105","title":"Điều 105. Thời giờ làm việc bình thường","shortTitle":"Thời giờ làm việc bình thường","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thời giờ làm việc bình thường không quá 08 giờ trong 01 ngày và không quá 48 giờ trong 01 tuần."},{"k":"p","t":"2. Người sử dụng lao động có quyền quy định thời giờ làm việc theo ngày hoặc tuần nhưng phải thông báo cho người lao động biết; trường hợp theo tuần thì thời giờ làm việc bình thường không quá 10 giờ trong 01 ngày và không quá 48 giờ trong 01 tuần."},{"k":"p","t":"Nhà nước khuyến khích người sử dụng lao động thực hiện tuần làm việc 40 giờ đối với người lao động."},{"k":"p","t":"3. Người sử dụng lao động có trách nhiệm bảo đảm giới hạn thời gian làm việc tiếp xúc với yếu tố nguy hiểm, yếu tố có hại đúng theo quy chuẩn kỹ thuật quốc gia và pháp luật có liên quan."}]},{"id":"blld-45_106","no":106,"code":"Điều 106","title":"Điều 106. Giờ làm việc ban đêm","shortTitle":"Giờ làm việc ban đêm","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Giờ làm việc ban đêm được tính từ 22 giờ đến 06 giờ sáng ngày hôm sau."}]},{"id":"blld-45_107","no":107,"code":"Điều 107","title":"Điều 107. Làm thêm giờ","shortTitle":"Làm thêm giờ","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thời gian làm thêm giờ là khoảng thời gian làm việc ngoài thời giờ làm việc bình thường theo quy định của pháp luật, thỏa ước lao động tập thể hoặc nội quy lao động."},{"k":"p","t":"2. Người sử dụng lao động được sử dụng người lao động làm thêm giờ khi đáp ứng đầy đủ các yêu cầu sau đây:"},{"k":"p","t":"a) Phải được sự đồng ý của người lao động;"},{"k":"p","t":"b) Bảo đảm số giờ làm thêm của người lao động không quá 50% số giờ làm việc bình thường trong 01 ngày; trường hợp áp dụng quy định thời giờ làm việc bình thường theo tuần thì tổng số giờ làm việc bình thường và số giờ làm thêm không quá 12 giờ trong 01 ngày; không quá 40 giờ trong 01 tháng;"},{"k":"p","t":"c) Bảo đảm số giờ làm thêm của người lao động không quá 200 giờ trong 01 năm, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Người sử dụng lao động được sử dụng người lao động làm thêm không quá 300 giờ trong 01 năm trong một số ngành, nghề, công việc hoặc trường hợp sau đây:"},{"k":"p","t":"a) Sản xuất, gia công xuất khẩu sản phẩm hàng dệt, may, da, giày, điện, điện tử, chế biến nông, lâm, diêm nghiệp, thủy sản;"},{"k":"p","t":"b) Sản xuất, cung cấp điện, viễn thông, lọc dầu; cấp, thoát nước;"},{"k":"p","t":"c) Trường hợp giải quyết công việc đòi hỏi lao động có trình độ chuyên môn, kỹ thuật cao mà thị trường lao động không cung ứng đầy đủ, kịp thời;"},{"k":"p","t":"d) Trường hợp phải giải quyết công việc cấp bách, không thể trì hoãn do tính chất thời vụ, thời điểm của nguyên liệu, sản phẩm hoặc để giải quyết công việc phát sinh do yếu tố khách quan không dự liệu trước, do hậu quả thời tiết, thiên tai, hỏa hoạn, địch họa, thiếu điện, thiếu nguyên liệu, sự cố kỹ thuật của dây chuyền sản xuất;"},{"k":"p","t":"đ) Trường hợp khác do Chính phủ quy định."},{"k":"p","t":"4. Khi tổ chức làm thêm giờ theo quy định tại khoản 3 Điều này, người sử dụng lao động phải thông báo bằng văn bản cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_108","no":108,"code":"Điều 108","title":"Điều 108. Làm thêm giờ trong trường hợp đặc biệt","shortTitle":"Làm thêm giờ trong trường hợp đặc biệt","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Người sử dụng lao động có quyền yêu cầu người lao động làm thêm giờ vào bất kỳ ngày nào mà không bị giới hạn về số giờ làm thêm theo quy định tại Điều 107 của Bộ luật này và người lao động không được từ chối trong trường hợp sau đây:"},{"k":"p","t":"1. Thực hiện lệnh động viên, huy động bảo đảm nhiệm vụ quốc phòng, an ninh theo quy định của pháp luật;"},{"k":"p","t":"2. Thực hiện các công việc nhằm bảo vệ tính mạng con người, tài sản của cơ quan, tổ chức, cá nhân trong phòng ngừa, khắc phục hậu quả thiên tai, hỏa hoạn, dịch bệnh nguy hiểm và thảm họa, trừ trường hợp có nguy cơ ảnh hưởng đến tính mạng, sức khỏe của người lao động theo quy định của pháp luật về an toàn, vệ sinh lao động."},{"k":"p","t":"THỜI GIỜ NGHỈ NGƠI"}]},{"id":"blld-45_109","no":109,"code":"Điều 109","title":"Điều 109. Nghỉ trong giờ làm việc","shortTitle":"Nghỉ trong giờ làm việc","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động làm việc theo thời giờ làm việc quy định tại Điều 105 của Bộ luật này từ 06 giờ trở lên trong một ngày thì được nghỉ giữa giờ ít nhất 30 phút liên tục, làm việc ban đêm thì được nghỉ giữa giờ ít nhất 45 phút liên tục."},{"k":"p","t":"Trường hợp người lao động làm việc theo ca liên tục từ 06 giờ trở lên thì thời gian nghỉ giữa giờ được tính vào giờ làm việc."},{"k":"p","t":"2. Ngoài thời gian nghỉ quy định tại khoản 1 Điều này, người sử dụng lao động bố trí cho người lao động các đợt nghỉ giải lao và ghi vào nội quy lao động."}]},{"id":"blld-45_110","no":110,"code":"Điều 110","title":"Điều 110. Nghỉ chuyển ca","shortTitle":"Nghỉ chuyển ca","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Người lao động làm việc theo ca được nghỉ ít nhất 12 giờ trước khi chuyển sang ca làm việc khác."}]},{"id":"blld-45_111","no":111,"code":"Điều 111","title":"Điều 111. Nghỉ hằng tuần","shortTitle":"Nghỉ hằng tuần","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Mỗi tuần, người lao động được nghỉ ít nhất 24 giờ liên tục. Trong trường hợp đặc biệt do chu kỳ lao động không thể nghỉ hằng tuần thì người sử dụng lao động có trách nhiệm bảo đảm cho người lao động được nghỉ tính bình quân 01 tháng ít nhất 04 ngày."},{"k":"p","t":"2. Người sử dụng lao động có quyền quyết định sắp xếp ngày nghỉ hằng tuần vào ngày Chủ nhật hoặc ngày xác định khác trong tuần nhưng phải ghi vào nội quy lao động."},{"k":"p","t":"3. Nếu ngày nghỉ hằng tuần trùng với ngày nghỉ lễ, tết quy định tại khoản 1 Điều 112 của Bộ luật này thì người lao động được nghỉ bù ngày nghỉ hằng tuần vào ngày làm việc kế tiếp."}]},{"id":"blld-45_112","no":112,"code":"Điều 112","title":"Điều 112. Nghỉ lễ, tết","shortTitle":"Nghỉ lễ, tết","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động được nghỉ làm việc, hưởng nguyên lương trong những ngày lễ, tết sau đây:"},{"k":"p","t":"a) Tết Dương lịch: 01 ngày (ngày 01 tháng 01 dương lịch);"},{"k":"p","t":"b) Tết Âm lịch: 05 ngày;"},{"k":"p","t":"c) Ngày Chiến thắng: 01 ngày (ngày 30 tháng 4 dương lịch);"},{"k":"p","t":"d) Ngày Quốc tế lao động: 01 ngày (ngày 01 tháng 5 dương lịch);"},{"k":"p","t":"đ) Quốc khánh: 02 ngày (ngày 02 tháng 9 dương lịch và 01 ngày liền kề trước hoặc sau);"},{"k":"p","t":"e) Ngày Giỗ Tổ Hùng Vương: 01 ngày (ngày 10 tháng 3 âm lịch)."},{"k":"p","t":"2. Lao động là người nước ngoài làm việc tại Việt Nam ngoài các ngày nghỉ theo quy định tại khoản 1 Điều này còn được nghỉ thêm 01 ngày Tết cổ truyền dân tộc và 01 ngày Quốc khánh của nước họ."},{"k":"p","t":"3. Hằng năm, căn cứ vào điều kiện thực tế, Thủ tướng Chính phủ quyết định cụ thể ngày nghỉ quy định tại điểm b và điểm đ khoản 1 Điều này."}]},{"id":"blld-45_113","no":113,"code":"Điều 113","title":"Điều 113. Nghỉ hằng năm","shortTitle":"Nghỉ hằng năm","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động làm việc đủ 12 tháng cho một người sử dụng lao động thì được nghỉ hằng năm, hưởng nguyên lương theo hợp đồng lao động như sau:"},{"k":"p","t":"a) 12 ngày làm việc đối với người làm công việc trong điều kiện bình thường;"},{"k":"p","t":"b) 14 ngày làm việc đối với người lao động chưa thành niên, lao động là người khuyết tật, người làm nghề, công việc nặng nhọc, độc hại, nguy hiểm;"},{"k":"p","t":"c) 16 ngày làm việc đối với người làm nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm."},{"k":"p","t":"2. Người lao động làm việc chưa đủ 12 tháng cho một người sử dụng lao động thì số ngày nghỉ hằng năm theo tỷ lệ tương ứng với số tháng làm việc."},{"k":"p","t":"3. Trường hợp do thôi việc, bị mất việc làm mà chưa nghỉ hằng năm hoặc chưa nghỉ hết số ngày nghỉ hằng năm thì được người sử dụng lao động thanh toán tiền lương cho những ngày chưa nghỉ."},{"k":"p","t":"4. Người sử dụng lao động có trách nhiệm quy định lịch nghỉ hằng năm sau khi tham khảo ý kiến của người lao động và phải thông báo trước cho người lao động biết. Người lao động có thể thỏa thuận với người sử dụng lao động để nghỉ hằng năm thành nhiều lần hoặc nghỉ gộp tối đa 03 năm một lần."},{"k":"p","t":"5. Khi nghỉ hằng năm mà chưa đến kỳ trả lương, người lao động được tạm ứng tiền lương theo quy định tại khoản 3 Điều 101 của Bộ luật này."},{"k":"p","t":"6. Khi nghỉ hằng năm, nếu người lao động đi bằng các phương tiện đường bộ, đường sắt, đường thủy mà số ngày đi đường cả đi và về trên 02 ngày thì từ ngày thứ 03 trở đi được tính thêm thời gian đi đường ngoài ngày nghỉ hằng năm và chỉ được tính cho 01 lần nghỉ trong năm."},{"k":"p","t":"7. Chính phủ quy định chi tiết điều này."}]},{"id":"blld-45_114","no":114,"code":"Điều 114","title":"Điều 114. Ngày nghỉ hằng năm tăng thêm theo thâm niên làm việc","shortTitle":"Ngày nghỉ hằng năm tăng thêm theo thâm niên làm việc","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Cứ đủ 05 năm làm việc cho một người sử dụng lao động thì số ngày nghỉ hằng năm của người lao động theo quy định tại khoản 1 Điều 113 của Bộ luật này được tăng thêm tương ứng 01 ngày."}]},{"id":"blld-45_115","no":115,"code":"Điều 115","title":"Điều 115. Nghỉ việc riêng, nghỉ không hưởng lương","shortTitle":"Nghỉ việc riêng, nghỉ không hưởng lương","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động được nghỉ việc riêng mà vẫn hưởng nguyên lương và phải thông báo với người sử dụng lao động trong trường hợp sau đây:"},{"k":"p","t":"a) Kết hôn: nghỉ 03 ngày;"},{"k":"p","t":"b) Con đẻ, con nuôi kết hôn: nghỉ 01 ngày;"},{"k":"p","t":"c) Cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi; cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi của vợ hoặc chồng; vợ hoặc chồng; con đẻ, con nuôi chết: nghỉ 03 ngày."},{"k":"p","t":"2. Người lao động được nghỉ không hưởng lương 01 ngày và phải thông báo với người sử dụng lao động khi ông nội, bà nội, ông ngoại, bà ngoại, anh, chị, em ruột chết; cha hoặc mẹ kết hôn; anh, chị, em ruột kết hôn."},{"k":"p","t":"3. Ngoài quy định tại khoản 1 và khoản 2 Điều này, người lao động có thể thỏa thuận với người sử dụng lao động để nghỉ không hưởng lương."},{"k":"p","t":"THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠIĐỐI VỚI NGƯỜI LÀM CÔNG VIỆC CÓ TÍNH CHẤT ĐẶC BIỆT"}]},{"id":"blld-45_116","no":116,"code":"Điều 116","title":"Điều 116. Thời giờ làm việc, thời giờ nghỉ ngơi đối với người làm công việc có tính chất đặc biệt","shortTitle":"Thời giờ làm việc, thời giờ nghỉ ngơi đối với người làm công việc có tính chất đặc biệt","chuong":"Chương VII — THỜI GIỜ LÀM VIỆC, THỜI GIỜ NGHỈ NGƠI","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Đối với các công việc có tính chất đặc biệt trong lĩnh vực vận tải đường bộ, đường sắt, đường thủy, đường hàng không; thăm dò, khai thác dầu khí trên biển; làm việc trên biển; trong lĩnh vực nghệ thuật; sử dụng kỹ thuật bức xạ và hạt nhân; ứng dụng kỹ thuật sóng cao tần; tin học, công nghệ tin học; nghiên cứu ứng dụng khoa học, công nghệ tiên tiến; thiết kế công nghiệp; công việc của thợ lặn; công việc trong hầm lò; công việc sản xuất có tính thời vụ, công việc gia công theo đơn đặt hàng; công việc phải thường trực 24/24 giờ; các công việc có tính chất đặc biệt khác do Chính phủ quy định thì các Bộ, ngành quản lý quy định cụ thể thời giờ làm việc, thời giờ nghỉ ngơi sau khi thống nhất với Bộ Lao động - Thương binh và Xã hội và phải tuân thủ quy định tại Điều 109 của Bộ luật này."},{"k":"p","t":"KỶ LUẬT LAO ĐỘNG"}]},{"id":"blld-45_117","no":117,"code":"Điều 117","title":"Điều 117. Kỷ luật lao động","shortTitle":"Kỷ luật lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Kỷ luật lao động là những quy định về việc tuân theo thời gian, công nghệ và điều hành sản xuất, kinh doanh do người sử dụng lao động ban hành trong nội quy lao động và do pháp luật quy định."}]},{"id":"blld-45_118","no":118,"code":"Điều 118","title":"Điều 118. Nội quy lao động","shortTitle":"Nội quy lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải ban hành nội quy lao động, nếu sử dụng từ 10 người lao động trở lên thì nội quy lao động phải bằng văn bản."},{"k":"p","t":"2. Nội dung nội quy lao động không được trái với pháp luật về lao động và quy định của pháp luật có liên quan. Nội quy lao động bao gồm những nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Thời giờ làm việc, thời giờ nghỉ ngơi;"},{"k":"p","t":"b) Trật tự tại nơi làm việc;"},{"k":"p","t":"c) An toàn, vệ sinh lao động;"},{"k":"p","t":"d) Phòng, chống quấy rối tình dục tại nơi làm việc; trình tự, thủ tục xử lý hành vi quấy rối tình dục tại nơi làm việc;"},{"k":"p","t":"đ) Việc bảo vệ tài sản và bí mật kinh doanh, bí mật công nghệ, sở hữu trí tuệ của người sử dụng lao động;"},{"k":"p","t":"e) Trường hợp được tạm thời chuyển người lao động làm việc khác so với hợp đồng lao động;"},{"k":"p","t":"g) Các hành vi vi phạm kỷ luật lao động của người lao động và các hình thức xử lý kỷ luật lao động;"},{"k":"p","t":"h) Trách nhiệm vật chất;"},{"k":"p","t":"i) Người có thẩm quyền xử lý kỷ luật lao động."},{"k":"p","t":"3. Trước khi ban hành nội quy lao động hoặc sửa đổi, bổ sung nội quy lao động, người sử dụng lao động phải tham khảo ý kiến của tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở."},{"k":"p","t":"4. Nội quy lao động phải được thông báo đến người lao động và những nội dung chính phải được niêm yết ở những nơi cần thiết tại nơi làm việc."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_119","no":119,"code":"Điều 119","title":"Điều 119. Đăng ký nội quy lao động","shortTitle":"Đăng ký nội quy lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động sử dụng từ 10 người lao động trở lên phải đăng ký nội quy lao động tại cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh nơi người sử dụng lao động đăng ký kinh doanh."},{"k":"p","t":"2. Trong thời hạn 10 ngày kể từ ngày ban hành nội quy lao động, người sử dụng lao động phải nộp hồ sơ đăng ký nội quy lao động."},{"k":"p","t":"3. Trong thời hạn 07 ngày làm việc kể từ ngày nhận được hồ sơ đăng ký nội quy lao động, nếu nội dung nội quy lao động có quy định trái với pháp luật thì cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh thông báo, hướng dẫn người sử dụng lao động sửa đổi, bổ sung và đăng ký lại."},{"k":"p","t":"4. Người sử dụng lao động có các chi nhánh, đơn vị, cơ sở sản xuất, kinh doanh đặt ở nhiều địa bàn khác nhau thì gửi nội quy lao động đã được đăng ký đến cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh nơi đặt chi nhánh, đơn vị, cơ sở sản xuất, kinh doanh."},{"k":"p","t":"5. Căn cứ điều kiện cụ thể, cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh có thể ủy quyền cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp huyện thực hiện việc đăng ký nội quy lao động theo quy định tại Điều này."}]},{"id":"blld-45_120","no":120,"code":"Điều 120","title":"Điều 120. Hồ sơ đăng ký nội quy lao động","shortTitle":"Hồ sơ đăng ký nội quy lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Hồ sơ đăng ký nội quy lao động bao gồm:"},{"k":"p","t":"1. Văn bản đề nghị đăng ký nội quy lao động;"},{"k":"p","t":"2. Nội quy lao động;"},{"k":"p","t":"3. Văn bản góp ý của tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở;"},{"k":"p","t":"4. Các văn bản của người sử dụng lao động có quy định liên quan đến kỷ luật lao động và trách nhiệm vật chất (nếu có)."}]},{"id":"blld-45_121","no":121,"code":"Điều 121","title":"Điều 121. Hiệu lực của nội quy lao động","shortTitle":"Hiệu lực của nội quy lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Nội quy lao động có hiệu lực sau 15 ngày kể từ ngày cơ quan nhà nước có thẩm quyền quy định tại Điều 119 của Bộ luật này nhận được đầy đủ hồ sơ đăng ký nội quy lao động."},{"k":"p","t":"Trường hợp người sử dụng lao động sử dụng dưới 10 người lao động ban hành nội quy lao động bằng văn bản thì hiệu lực do người sử dụng lao động quyết định trong nội quy lao động."}]},{"id":"blld-45_122","no":122,"code":"Điều 122","title":"Điều 122. Nguyên tắc, trình tự, thủ tục xử lý kỷ luật lao động","shortTitle":"Nguyên tắc, trình tự, thủ tục xử lý kỷ luật lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Việc xử lý kỷ luật lao động được quy định như sau:"},{"k":"p","t":"a) Người sử dụng lao động phải chứng minh được lỗi của người lao động;"},{"k":"p","t":"b) Phải có sự tham gia của tổ chức đại diện người lao động tại cơ sở mà người lao động đang bị xử lý kỷ luật là thành viên;"},{"k":"p","t":"c) Người lao động phải có mặt và có quyền tự bào chữa, nhờ luật sư hoặc tổ chức đại diện người lao động bào chữa; trường hợp là người chưa đủ 15 tuổi thì phải có sự tham gia của người đại diện theo pháp luật;"},{"k":"p","t":"d) Việc xử lý kỷ luật lao động phải được ghi thành biên bản."},{"k":"p","t":"2. Không được áp dụng nhiều hình thức xử lý kỷ luật lao động đối với một hành vi vi phạm kỷ luật lao động."},{"k":"p","t":"3. Khi một người lao động đồng thời có nhiều hành vi vi phạm kỷ luật lao động thì chỉ áp dụng hình thức kỷ luật cao nhất tương ứng với hành vi vi phạm nặng nhất."},{"k":"p","t":"4. Không được xử lý kỷ luật lao động đối với người lao động đang trong thời gian sau đây:"},{"k":"p","t":"a) Nghỉ ốm đau, điều dưỡng; nghỉ việc được sự đồng ý của người sử dụng lao động;"},{"k":"p","t":"b) Đang bị tạm giữ, tạm giam;"},{"k":"p","t":"c) Đang chờ kết quả của cơ quan có thẩm quyền điều tra xác minh và kết luận đối với hành vi vi phạm được quy định tại khoản 1 và khoản 2 Điều 125 của Bộ luật này;"},{"k":"p","t":"d) Người lao động nữ mang thai; người lao động nghỉ thai sản, nuôi con dưới 12 tháng tuổi."},{"k":"p","t":"5. Không xử lý kỷ luật lao động đối với người lao động vi phạm kỷ luật lao động trong khi mắc bệnh tâm thần hoặc một bệnh khác làm mất khả năng nhận thức hoặc khả năng điều khiển hành vi của mình."},{"k":"p","t":"6. Chính phủ quy định trình tự, thủ tục xử lý kỷ luật lao động."}]},{"id":"blld-45_123","no":123,"code":"Điều 123","title":"Điều 123. Thời hiệu xử lý kỷ luật lao động","shortTitle":"Thời hiệu xử lý kỷ luật lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thời hiệu xử lý kỷ luật lao động là 06 tháng kể từ ngày xảy ra hành vi vi phạm; trường hợp hành vi vi phạm liên quan trực tiếp đến tài chính, tài sản, tiết lộ bí mật công nghệ, bí mật kinh doanh của người sử dụng lao động thì thời hiệu xử lý kỷ luật lao động là 12 tháng."},{"k":"p","t":"2. Khi hết thời gian quy định tại khoản 4 Điều 122 của Bộ luật này, nếu hết thời hiệu hoặc còn thời hiệu nhưng không đủ 60 ngày thì được kéo dài thời hiệu để xử lý kỷ luật lao động nhưng không quá 60 ngày kể từ ngày hết thời gian nêu trên."},{"k":"p","t":"3. Người sử dụng lao động phải ban hành quyết định xử lý kỷ luật lao động trong thời hạn quy định tại khoản 1 và khoản 2 Điều này."}]},{"id":"blld-45_124","no":124,"code":"Điều 124","title":"Điều 124. Hình thức xử lý kỷ luật lao động","shortTitle":"Hình thức xử lý kỷ luật lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Khiển trách."},{"k":"p","t":"2. Kéo dài thời hạn nâng lương không quá 06 tháng."},{"k":"p","t":"3. Cách chức."},{"k":"p","t":"4. Sa thải."}]},{"id":"blld-45_125","no":125,"code":"Điều 125","title":"Điều 125. Áp dụng hình thức xử lý kỷ luật sa thải","shortTitle":"Áp dụng hình thức xử lý kỷ luật sa thải","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Hình thức xử lý kỷ luật sa thải được người sử dụng lao động áp dụng trong trường hợp sau đây:"},{"k":"p","t":"1. Người lao động có hành vi trộm cắp, tham ô, đánh bạc, cố ý gây thương tích, sử dụng ma tuý tại nơi làm việc;"},{"k":"p","t":"2. Người lao động có hành vi tiết lộ bí mật kinh doanh, bí mật công nghệ, xâm phạm quyền sở hữu trí tuệ của người sử dụng lao động, có hành vi gây thiệt hại nghiêm trọng hoặc đe dọa gây thiệt hại đặc biệt nghiêm trọng về tài sản, lợi ích của người sử dụng lao động hoặc quấy rối tình dục tại nơi làm việc được quy định trong nội quy lao động;"},{"k":"p","t":"3. Người lao động bị xử lý kỷ luật kéo dài thời hạn nâng lương hoặc cách chức mà tái phạm trong thời gian chưa xóa kỷ luật. Tái phạm là trường hợp người lao động lặp lại hành vi vi phạm đã bị xử lý kỷ luật mà chưa được xóa kỷ luật theo quy định tại Điều 126 của Bộ luật này;"},{"k":"p","t":"4. Người lao động tự ý bỏ việc 05 ngày cộng dồn trong thời hạn 30 ngày hoặc 20 ngày cộng dồn trong thời hạn 365 ngày tính từ ngày đầu tiên tự ý bỏ việc mà không có lý do chính đáng."},{"k":"p","t":"Trường hợp được coi là có lý do chính đáng bao gồm thiên tai, hỏa hoạn, bản thân, thân nhân bị ốm có xác nhận của cơ sở khám bệnh, chữa bệnh có thẩm quyền và trường hợp khác được quy định trong nội quy lao động."}]},{"id":"blld-45_126","no":126,"code":"Điều 126","title":"Điều 126. Xóa kỷ luật, giảm thời hạn chấp hành kỷ luật lao động","shortTitle":"Xóa kỷ luật, giảm thời hạn chấp hành kỷ luật lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người lao động bị khiển trách sau 03 tháng hoặc bị xử lý kỷ luật kéo dài thời hạn nâng lương sau 06 tháng hoặc bị xử lý kỷ luật cách chức sau 03 năm kể từ ngày bị xử lý, nếu không tiếp tục vi phạm kỷ luật lao động thì đương nhiên được xóa kỷ luật."},{"k":"p","t":"2. Người lao động bị xử lý kỷ luật kéo dài thời hạn nâng lương sau khi chấp hành được một nửa thời hạn nếu sửa chữa tiến bộ thì có thể được người sử dụng lao động xét giảm thời hạn."}]},{"id":"blld-45_127","no":127,"code":"Điều 127","title":"Điều 127. Các hành vi bị nghiêm cấm khi xử lý kỷ luật lao động","shortTitle":"Các hành vi bị nghiêm cấm khi xử lý kỷ luật lao động","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Xâm phạm sức khỏe, danh dự, tính mạng, uy tín, nhân phẩm của người lao động."},{"k":"p","t":"2. Phạt tiền, cắt lương thay việc xử lý kỷ luật lao động."},{"k":"p","t":"3. Xử lý kỷ luật lao động đối với người lao động có hành vi vi phạm không được quy định trong nội quy lao động hoặc không thỏa thuận trong hợp đồng lao động đã giao kết hoặc pháp luật về lao động không có quy định."}]},{"id":"blld-45_128","no":128,"code":"Điều 128","title":"Điều 128. Tạm đình chỉ công việc","shortTitle":"Tạm đình chỉ công việc","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động có quyền tạm đình chỉ công việc của người lao động khi vụ việc vi phạm có những tình tiết phức tạp nếu xét thấy để người lao động tiếp tục làm việc sẽ gây khó khăn cho việc xác minh. Việc tạm đình chỉ công việc của người lao động chỉ được thực hiện sau khi tham khảo ý kiến của tổ chức đại diện người lao động tại cơ sở mà người lao động đang bị xem xét tạm đình chỉ công việc là thành viên."},{"k":"p","t":"2. Thời hạn tạm đình chỉ công việc không được quá 15 ngày, trường hợp đặc biệt không được quá 90 ngày. Trong thời gian bị tạm đình chỉ công việc, người lao động được tạm ứng 50% tiền lương trước khi bị đình chỉ công việc."},{"k":"p","t":"Hết thời hạn tạm đình chỉ công việc, người sử dụng lao động phải nhận người lao động trở lại làm việc."},{"k":"p","t":"3. Trường hợp người lao động bị xử lý kỷ luật lao động, người lao động cũng không phải trả lại số tiền lương đã tạm ứng."},{"k":"p","t":"4. Trường hợp người lao động không bị xử lý kỷ luật lao động thì được người sử dụng lao động trả đủ tiền lương cho thời gian bị tạm đình chỉ công việc."},{"k":"p","t":"TRÁCH NHIỆM VẬT CHẤT"}]},{"id":"blld-45_129","no":129,"code":"Điều 129","title":"Điều 129. Bồi thường thiệt hại","shortTitle":"Bồi thường thiệt hại","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động làm hư hỏng dụng cụ, thiết bị hoặc có hành vi khác gây thiệt hại tài sản của người sử dụng lao động thì phải bồi thường theo quy định của pháp luật hoặc nội quy lao động của người sử dụng lao động."},{"k":"p","t":"Trường hợp người lao động gây thiệt hại không nghiêm trọng do sơ suất với giá trị không quá 10 tháng lương tối thiểu vùng do Chính phủ công bố được áp dụng tại nơi người lao động làm việc thì người lao động phải bồi thường nhiều nhất là 03 tháng tiền lương và bị khấu trừ hằng tháng vào lương theo quy định tại khoản 3 Điều 102 của Bộ luật này."},{"k":"p","t":"2. Người lao động làm mất dụng cụ, thiết bị, tài sản của người sử dụng lao động hoặc tài sản khác do người sử dụng lao động giao hoặc tiêu hao vật tư quá định mức cho phép thì phải bồi thường thiệt hại một phần hoặc toàn bộ theo thời giá thị trường hoặc nội quy lao động; trường hợp có hợp đồng trách nhiệm thì phải bồi thường theo hợp đồng trách nhiệm; trường hợp do thiên tai, hỏa hoạn, địch họa, dịch bệnh nguy hiểm, thảm họa, sự kiện xảy ra khách quan không thể lường trước được và không thể khắc phục được mặc dù đã áp dụng mọi biện pháp cần thiết và khả năng cho phép thì không phải bồi thường."}]},{"id":"blld-45_130","no":130,"code":"Điều 130","title":"Điều 130. Xử lý bồi thường thiệt hại","shortTitle":"Xử lý bồi thường thiệt hại","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Việc xem xét, quyết định mức bồi thường thiệt hại phải căn cứ vào lỗi, mức độ thiệt hại thực tế và hoàn cảnh thực tế gia đình, nhân thân và tài sản của người lao động."},{"k":"p","t":"2. Chính phủ quy định trình tự, thủ tục, thời hiệu xử lý việc bồi thường thiệt hại."}]},{"id":"blld-45_131","no":131,"code":"Điều 131","title":"Điều 131. Khiếu nại về kỷ luật lao động, trách nhiệm vật chất","shortTitle":"Khiếu nại về kỷ luật lao động, trách nhiệm vật chất","chuong":"Chương VIII — KỶ LUẬT LAO ĐỘNG, TRÁCH NHIỆM VẬT CHẤT","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Người bị xử lý kỷ luật lao động, bị tạm đình chỉ công việc hoặc phải bồi thường theo chế độ trách nhiệm vật chất nếu thấy không thỏa đáng có quyền khiếu nại với người sử dụng lao động, với cơ quan có thẩm quyền theo quy định của pháp luật hoặc yêu cầu giải quyết tranh chấp lao động theo trình tự do pháp luật quy định."},{"k":"p","t":"Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_132","no":132,"code":"Điều 132","title":"Điều 132. Tuân thủ pháp luật về an toàn, vệ sinh lao động","shortTitle":"Tuân thủ pháp luật về an toàn, vệ sinh lao động","chuong":"Chương IX — AN TOÀN, VỆ SINH LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"Người sử dụng lao động, người lao động và cơ quan, tổ chức, cá nhân có liên quan đến lao động, sản xuất, kinh doanh phải thực hiện quy định của pháp luật về an toàn, vệ sinh lao động."}]},{"id":"blld-45_133","no":133,"code":"Điều 133","title":"Điều 133. Chương trình an toàn, vệ sinh lao động","shortTitle":"Chương trình an toàn, vệ sinh lao động","chuong":"Chương IX — AN TOÀN, VỆ SINH LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ quyết định Chương trình quốc gia về an toàn, vệ sinh lao động."},{"k":"p","t":"2. Ủy ban nhân dân cấp tỉnh trình Hội đồng nhân dân cùng cấp quyết định Chương trình an toàn, vệ sinh lao động của địa phương và đưa vào kế hoạch phát triển kinh tế - xã hội."}]},{"id":"blld-45_134","no":134,"code":"Điều 134","title":"Điều 134. Bảo đảm an toàn, vệ sinh lao động tại nơi làm việc","shortTitle":"Bảo đảm an toàn, vệ sinh lao động tại nơi làm việc","chuong":"Chương IX — AN TOÀN, VỆ SINH LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động có trách nhiệm thực hiện đầy đủ các giải pháp nhằm bảo đảm an toàn, vệ sinh lao động tại nơi làm việc."},{"k":"p","t":"2. Người lao động có trách nhiệm chấp hành quy định, nội quy, quy trình, yêu cầu về an toàn, vệ sinh lao động; tuân thủ pháp luật và nắm vững kiến thức, kỹ năng về các biện pháp bảo đảm an toàn, vệ sinh lao động tại nơi làm việc."}]},{"id":"blld-45_135","no":135,"code":"Điều 135","title":"Điều 135. Chính sách của Nhà nước","shortTitle":"Chính sách của Nhà nước","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"1. Bảo đảm quyền bình đẳng của lao động nữ, lao động nam, thực hiện các biện pháp bảo đảm bình đẳng giới và phòng, chống quấy rối tình dục tại nơi làm việc."},{"k":"p","t":"2. Khuyến khích người sử dụng lao động tạo điều kiện để lao động nữ, lao động nam có việc làm thường xuyên, áp dụng rộng rãi chế độ làm việc theo thời gian biểu linh hoạt, làm việc không trọn thời gian, giao việc làm tại nhà."},{"k":"p","t":"3. Có biện pháp tạo việc làm, cải thiện điều kiện lao động, nâng cao trình độ nghề nghiệp, chăm sóc sức khỏe, tăng cường phúc lợi về vật chất và tinh thần của lao động nữ nhằm giúp lao động nữ phát huy có hiệu quả năng lực nghề nghiệp, kết hợp hài hòa cuộc sống lao động và cuộc sống gia đình."},{"k":"p","t":"4. Có chính sách giảm thuế đối với người sử dụng lao động có sử dụng nhiều lao động nữ theo quy định của pháp luật về thuế."},{"k":"p","t":"5. Nhà nước có kế hoạch, biện pháp tổ chức nhà trẻ, lớp mẫu giáo ở nơi có nhiều lao động. Mở rộng nhiều loại hình đào tạo thuận lợi cho lao động nữ có thêm nghề dự phòng và phù hợp với đặc điểm về cơ thể, sinh lý và chức năng làm mẹ của phụ nữ."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_136","no":136,"code":"Điều 136","title":"Điều 136. Trách nhiệm của người sử dụng lao động","shortTitle":"Trách nhiệm của người sử dụng lao động","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"1. Bảo đảm thực hiện bình đẳng giới và các biện pháp thúc đẩy bình đẳng giới trong tuyển dụng, bố trí, sắp xếp việc làm, đào tạo, thời giờ làm việc, thời giờ nghỉ ngơi, tiền lương và các chế độ khác."},{"k":"p","t":"2. Tham khảo ý kiến của lao động nữ hoặc đại diện của họ khi quyết định những vấn đề liên quan đến quyền và lợi ích của phụ nữ."},{"k":"p","t":"3. Bảo đảm có đủ buồng tắm và buồng vệ sinh phù hợp tại nơi làm việc."},{"k":"p","t":"4. Giúp đỡ, hỗ trợ xây dựng nhà trẻ, lớp mẫu giáo hoặc một phần chi phí gửi trẻ, mẫu giáo cho người lao động."}]},{"id":"blld-45_137","no":137,"code":"Điều 137","title":"Điều 137. Bảo vệ thai sản","shortTitle":"Bảo vệ thai sản","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động không được sử dụng người lao động làm việc ban đêm, làm thêm giờ và đi công tác xa trong trường hợp sau đây:"},{"k":"p","t":"a) Mang thai từ tháng thứ 07 hoặc từ tháng thứ 06 nếu làm việc ở vùng cao, vùng sâu, vùng xa, biên giới, hải đảo;"},{"k":"p","t":"b) Đang nuôi con dưới 12 tháng tuổi, trừ trường hợp được người lao động đồng ý."},{"k":"p","t":"2. Lao động nữ làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm hoặc làm nghề, công việc có ảnh hưởng xấu tới chức năng sinh sản và nuôi con khi mang thai và có thông báo cho người sử dụng lao động biết thì được người sử dụng lao động chuyển sang làm công việc nhẹ hơn, an toàn hơn hoặc giảm bớt 01 giờ làm việc hằng ngày mà không bị cắt giảm tiền lương và quyền, lợi ích cho đến hết thời gian nuôi con dưới 12 tháng tuổi."},{"k":"p","t":"3. Người sử dụng lao động không được sa thải hoặc đơn phương chấm dứt hợp đồng lao động đối với người lao động vì lý do kết hôn, mang thai, nghỉ thai sản, nuôi con dưới 12 tháng tuổi, trừ trường hợp người sử dụng lao động là cá nhân chết, bị Tòa án tuyên bố mất năng lực hành vi dân sự, mất tích hoặc đã chết hoặc người sử dụng lao động không phải là cá nhân chấm dứt hoạt động hoặc bị cơ quan chuyên môn về đăng ký kinh doanh thuộc Ủy ban nhân dân cấp tỉnh ra thông báo không có người đại diện theo pháp luật, người được ủy quyền thực hiện quyền và nghĩa vụ của người đại diện theo pháp luật."},{"k":"p","t":"Trường hợp hợp đồng lao động hết hạn trong thời gian lao động nữ mang thai hoặc nuôi con dưới 12 tháng tuổi thì được ưu tiên giao kết hợp đồng lao động mới."},{"k":"p","t":"4. Lao động nữ trong thời gian hành kinh được nghỉ mỗi ngày 30 phút, trong thời gian nuôi con dưới 12 tháng tuổi được nghỉ mỗi ngày 60 phút trong thời gian làm việc. Thời gian nghỉ vẫn được hưởng đủ tiền lương theo hợp đồng lao động."}]},{"id":"blld-45_138","no":138,"code":"Điều 138","title":"Điều 138. Quyền đơn phương chấm dứt, tạm hoãn hợp đồng lao động của lao động nữ mang thai","shortTitle":"Quyền đơn phương chấm dứt, tạm hoãn hợp đồng lao động của lao động nữ mang thai","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"1. Lao động nữ mang thai nếu có xác nhận của cơ sở khám bệnh, chữa bệnh có thẩm quyền về việc tiếp tục làm việc sẽ ảnh hưởng xấu tới thai nhi thì có quyền đơn phương chấm dứt hợp đồng lao động hoặc tạm hoãn thực hiện hợp đồng lao động."},{"k":"p","t":"Trường hợp đơn phương chấm dứt hợp đồng lao động hoặc tạm hoãn thực hiện hợp đồng lao động thì phải thông báo cho người sử dụng lao động kèm theo xác nhận của cơ sở khám bệnh, chữa bệnh có thẩm quyền về việc tiếp tục làm việc sẽ ảnh hưởng xấu tới thai nhi."},{"k":"p","t":"2. Trường hợp tạm hoãn thực hiện hợp đồng lao động, thời gian tạm hoãn do người lao động thỏa thuận với người sử dụng lao động nhưng tối thiểu phải bằng thời gian do cơ sở khám bệnh, chữa bệnh có thẩm quyền chỉ định tạm nghỉ. Trường hợp không có chỉ định của cơ sở khám bệnh, chữa bệnh có thẩm quyền về thời gian tạm nghỉ thì hai bên thỏa thuận về thời gian tạm hoãn thực hiện hợp đồng lao động."}]},{"id":"blld-45_139","no":139,"code":"Điều 139","title":"Điều 139. Nghỉ thai sản","shortTitle":"Nghỉ thai sản","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"1. Lao động nữ được nghỉ thai sản trước và sau khi sinh con là 06 tháng; thời gian nghỉ trước khi sinh không quá 02 tháng."},{"k":"p","t":"Trường hợp lao động nữ sinh đôi trở lên thì tính từ con thứ 02 trở đi, cứ mỗi con, người mẹ được nghỉ thêm 01 tháng."},{"k":"p","t":"2. Trong thời gian nghỉ thai sản, lao động nữ được hưởng chế độ thai sản theo quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"3. Hết thời gian nghỉ thai sản theo quy định tại khoản 1 Điều này, nếu có nhu cầu, lao động nữ có thể nghỉ thêm một thời gian không hưởng lương sau khi thỏa thuận với người sử dụng lao động."},{"k":"p","t":"4. Trước khi hết thời gian nghỉ thai sản theo quy định tại khoản 1 Điều này, lao động nữ có thể trở lại làm việc khi đã nghỉ ít nhất được 04 tháng nhưng người lao động phải báo trước, được người sử dụng lao động đồng ý và có xác nhận của cơ sở khám bệnh, chữa bệnh có thẩm quyền về việc đi làm sớm không có hại cho sức khỏe của người lao động. Trong trường hợp này, ngoài tiền lương của những ngày làm việc do người sử dụng lao động trả, lao động nữ vẫn tiếp tục được hưởng trợ cấp thai sản theo quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"5. Lao động nam khi vợ sinh con, người lao động nhận nuôi con nuôi dưới 06 tháng tuổi, lao động nữ mang thai hộ và người lao động là người mẹ nhờ mang thai hộ được nghỉ việc hưởng chế độ thai sản theo quy định của pháp luật về bảo hiểm xã hội."}]},{"id":"blld-45_140","no":140,"code":"Điều 140","title":"Điều 140. Bảo đảm việc làm cho lao động nghỉ thai sản","shortTitle":"Bảo đảm việc làm cho lao động nghỉ thai sản","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"Lao động được bảo đảm việc làm cũ khi trở lại làm việc sau khi nghỉ hết thời gian theo quy định tại các khoản 1, 3 và 5 Điều 139 của Bộ luật này mà không bị cắt giảm tiền lương và quyền, lợi ích so với trước khi nghỉ thai sản; trường hợp việc làm cũ không còn thì người sử dụng lao động phải bố trí việc làm khác cho họ với mức lương không thấp hơn mức lương trước khi nghỉ thai sản."}]},{"id":"blld-45_141","no":141,"code":"Điều 141","title":"Điều 141. Trợ cấp trong thời gian chăm sóc con ốm đau, thai sản và thực hiện các biện pháp tránh thai","shortTitle":"Trợ cấp trong thời gian chăm sóc con ốm đau, thai sản và thực hiện các biện pháp tránh thai","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"Thời gian nghỉ việc khi chăm sóc con dưới 07 tuổi ốm đau, khám thai, sẩy thai, nạo, hút thai, thai chết lưu, phá thai bệnh lý, thực hiện các biện pháp tránh thai, triệt sản, người lao động được hưởng trợ cấp theo quy định của pháp luật về bảo hiểm xã hội."}]},{"id":"blld-45_142","no":142,"code":"Điều 142","title":"Điều 142. Nghề, công việc có ảnh hưởng xấu tới chức năng sinh sản và nuôi con","shortTitle":"Nghề, công việc có ảnh hưởng xấu tới chức năng sinh sản và nuôi con","chuong":"Chương X — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNG NỮVÀ BẢO ĐẢM BÌNH ĐẲNG GIỚI","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành danh mục nghề, công việc có ảnh hưởng xấu tới chức năng sinh sản và nuôi con."},{"k":"p","t":"2. Người sử dụng lao động phải cung cấp đầy đủ thông tin về tính chất nguy hiểm, nguy cơ, yêu cầu của công việc để người lao động lựa chọn và phải bảo đảm điều kiện an toàn, vệ sinh lao động cho người lao động theo quy định khi sử dụng họ làm công việc thuộc danh mục quy định tại khoản 1 Điều này."},{"k":"p","t":"LAO ĐỘNG CHƯA THÀNH NIÊN"}]},{"id":"blld-45_143","no":143,"code":"Điều 143","title":"Điều 143. Lao động chưa thành niên","shortTitle":"Lao động chưa thành niên","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Lao động chưa thành niên là người lao động chưa đủ 18 tuổi."},{"k":"p","t":"2. Người từ đủ 15 tuổi đến chưa đủ 18 tuổi không được làm công việc hoặc làm việc ở nơi làm việc quy định tại Điều 147 của Bộ luật này."},{"k":"p","t":"3. Người từ đủ 13 tuổi đến chưa đủ 15 tuổi chỉ được làm công việc nhẹ theo danh mục do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành."},{"k":"p","t":"4. Người chưa đủ 13 tuổi chỉ được làm các công việc theo quy định tại khoản 3 Điều 145 của Bộ luật này."}]},{"id":"blld-45_144","no":144,"code":"Điều 144","title":"Điều 144. Nguyên tắc sử dụng lao động chưa thành niên","shortTitle":"Nguyên tắc sử dụng lao động chưa thành niên","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Lao độn
