 định danh mục nghề chỉ được sử dụng lao động đã qua đào tạo giáo dục nghề nghiệp hoặc có chứng chỉ kỹ năng nghề quốc gia."},{"k":"p","t":"3. Tổ chức và tiến hành nghiên cứu khoa học về lao động; thống kê, thông tin về lao động và thị trường lao động, về mức sống, tiền lương và thu nhập của người lao động; quản lý lao động về số lượng, chất lượng và biến động lao động."},{"k":"p","t":"4. Xây dựng các cơ chế, thiết chế hỗ trợ phát triển quan hệ lao động tiến bộ, hài hòa và ổn định; thúc đẩy việc áp dụng quy định của Bộ luật này đối với người làm việc không có quan hệ lao động; thực hiện việc đăng ký và quản lý hoạt động của tổ chức của người lao động tại doanh nghiệp."},{"k":"p","t":"5. Kiểm tra, thanh tra, xử lý vi phạm pháp luật và giải quyết khiếu nại, tố cáo về lao động; giải quyết tranh chấp lao động theo quy định của pháp luật."},{"k":"p","t":"6. Hợp tác quốc tế về lao động."}]},{"id":"blld-45_213","no":213,"code":"Điều 213","title":"Điều 213. Thẩm quyền quản lý nhà nước về lao động","shortTitle":"Thẩm quyền quản lý nhà nước về lao động","chuong":"Chương XV — QUẢN LÝ NHÀ NƯỚC VỀ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ thống nhất quản lý nhà nước về lao động trong phạm vi cả nước."},{"k":"p","t":"2. Bộ Lao động - Thương binh và Xã hội chịu trách nhiệm trước Chính phủ thực hiện quản lý nhà nước về lao động."},{"k":"p","t":"3. Bộ, cơ quan ngang Bộ, trong phạm vi nhiệm vụ, quyền hạn của mình, có trách nhiệm thực hiện và phối hợp với Bộ Lao động - Thương binh và Xã hội trong quản lý nhà nước về lao động."},{"k":"p","t":"4. Ủy ban nhân dân các cấp thực hiện quản lý nhà nước về lao động trong phạm vi địa phương mình."},{"k":"p","t":"XỬ LÝ VI PHẠM PHÁP LUẬT VỀ LAO ĐỘNG"}]},{"id":"blld-45_214","no":214,"code":"Điều 214","title":"Điều 214. Nội dung thanh tra lao động","shortTitle":"Nội dung thanh tra lao động","chuong":"Chương XVI — THANH TRA LAO ĐỘNG,","muc":"","level":1,"content":[{"k":"p","t":"1. Thanh tra việc chấp hành quy định của pháp luật về lao động."},{"k":"p","t":"2. Điều tra tai nạn lao động và vi phạm an toàn, vệ sinh lao động."},{"k":"p","t":"3. Tham gia hướng dẫn áp dụng hệ thống tiêu chuẩn, quy chuẩn kỹ thuật về điều kiện lao động, an toàn, vệ sinh lao động."},{"k":"p","t":"4. Giải quyết khiếu nại, tố cáo về lao động theo quy định của pháp luật."},{"k":"p","t":"5. Xử lý theo thẩm quyền và kiến nghị cơ quan có thẩm quyền xử lý vi phạm pháp luật về lao động."}]},{"id":"blld-45_215","no":215,"code":"Điều 215","title":"Điều 215. Thanh tra chuyên ngành về lao động","shortTitle":"Thanh tra chuyên ngành về lao động","chuong":"Chương XVI — THANH TRA LAO ĐỘNG,","muc":"","level":1,"content":[{"k":"p","t":"1. Thẩm quyền thanh tra chuyên ngành về lao động thực hiện theo quy định của Luật Thanh tra."},{"k":"p","t":"2. Việc thanh tra an toàn, vệ sinh lao động thực hiện theo quy định của Luật An toàn, vệ sinh lao động."}]},{"id":"blld-45_216","no":216,"code":"Điều 216","title":"Điều 216. Quyền của thanh tra lao động","shortTitle":"Quyền của thanh tra lao động","chuong":"Chương XVI — THANH TRA LAO ĐỘNG,","muc":"","level":1,"content":[{"k":"p","t":"Thanh tra lao động có quyền thanh tra, điều tra nơi thuộc đối tượng, phạm vi thanh tra được giao theo quyết định thanh tra."},{"k":"p","t":"Khi thanh tra đột xuất theo quyết định của người có thẩm quyền trong trường hợp khẩn cấp có nguy cơ đe dọa an toàn, tính mạng, sức khỏe, danh dự, nhân phẩm của người lao động tại nơi làm việc thì không cần báo trước."}]},{"id":"blld-45_217","no":217,"code":"Điều 217","title":"Điều 217. Xử lý vi phạm","shortTitle":"Xử lý vi phạm","chuong":"Chương XVI — THANH TRA LAO ĐỘNG,","muc":"","level":1,"content":[{"k":"p","t":"1. Người nào có hành vi vi phạm quy định của Bộ luật này thì tùy theo tính chất, mức độ vi phạm mà bị xử lý kỷ luật, xử phạt vi phạm hành chính hoặc bị truy cứu trách nhiệm hình sự, nếu gây thiệt hại thì phải bồi thường theo quy định của pháp luật."},{"k":"p","t":"2. Khi đã có quyết định của Tòa án về cuộc đình công là bất hợp pháp thì người lao động đang tham gia đình công phải ngừng ngay đình công và trở lại làm việc; nếu người lao động không ngừng đình công, không trở lại làm việc thì tùy theo mức độ vi phạm có thể bị xử lý kỷ luật lao động theo quy định của pháp luật về lao động."},{"k":"p","t":"Trong trường hợp cuộc đình công là bất hợp pháp mà gây thiệt hại cho người sử dụng lao động thì tổ chức đại diện người lao động tổ chức và lãnh đạo đình công phải bồi thường thiệt hại theo quy định của pháp luật."},{"k":"p","t":"3. Người lợi dụng đình công gây mất trật tự, an toàn công cộng, làm tổn hại máy, thiết bị, tài sản của người sử dụng lao động; người có hành vi cản trở thực hiện quyền đình công, kích động, lôi kéo, ép buộc người lao động đình công; người có hành vi trù dập, trả thù người tham gia đình công, người lãnh đạo cuộc đình công thì tùy theo mức độ vi phạm mà bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự, nếu gây thiệt hại thì phải bồi thường theo quy định của pháp luật."}]},{"id":"blld-45_218","no":218,"code":"Điều 218","title":"Điều 218. Miễn, giảm thủ tục đối với trường hợp sử dụng dưới 10 lao động","shortTitle":"Miễn, giảm thủ tục đối với trường hợp sử dụng dưới 10 lao động","chuong":"Chương XVII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Người sử dụng lao động sử dụng dưới 10 người lao động thực hiện quy định của Bộ luật này nhưng được miễn, giảm một số thủ tục theo quy định của Chính phủ."}]},{"id":"blld-45_219","no":219,"code":"Điều 219","title":"Điều 219. Sửa đổi, bổ sung một số điều của các luật có liên quan đến lao động","shortTitle":"Sửa đổi, bổ sung một số điều của các luật có liên quan đến lao động","chuong":"Chương XVII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung một số điều của Luật Bảo hiểm xã hội số 58/2014/QH13 đã được sửa đổi, bổ sung theo Luật số 84/2015/QH13 và Luật số 35/2018/QH14:"},{"k":"p","t":"a) Sửa đổi, bổ sung Điều 54 như sau:"},{"k":"p","t":"“Điều 54. Điều kiện hưởng lương hưu"},{"k":"p","t":"1. Người lao động quy định tại các điểm a, b, c, d, g, h và i khoản 1 Điều 2 của Luật này, trừ trường hợp quy định tại khoản 3 Điều này, khi nghỉ việc có đủ 20 năm đóng bảo hiểm xã hội trở lên thì được hưởng lương hưu nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động;"},{"k":"p","t":"b) Đủ tuổi theo quy định tại khoản 3 Điều 169 của Bộ luật Lao động và có đủ 15 năm làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục do Bộ Lao động - Thương binh và Xã hội ban hành hoặc có đủ 15 năm làm việc ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn bao gồm cả thời gian làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên trước ngày 01 tháng 01 năm 2021;"},{"k":"p","t":"c) Người lao động có tuổi thấp hơn tối đa 10 tuổi so với tuổi nghỉ hưu của người lao động quy định tại khoản 2 Điều 169 của Bộ luật Lao động và có đủ 15 năm làm công việc khai thác than trong hầm lò;"},{"k":"p","t":"d) Người bị nhiễm HIV do tai nạn rủi ro nghề nghiệp trong khi thực hiện nhiệm vụ được giao."},{"k":"p","t":"2. Người lao động quy định tại điểm đ và điểm e khoản 1 Điều 2 của Luật này nghỉ việc có đủ 20 năm đóng bảo hiểm xã hội trở lên được hưởng lương hưu khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có tuổi thấp hơn tối đa 05 tuổi so với tuổi nghỉ hưu quy định tại khoản 2 Điều 169 của Bộ luật Lao động, trừ trường hợp Luật Sĩ quan Quân đội nhân dân Việt Nam, Luật Công an nhân dân, Luật Cơ yếu, Luật Quân nhân chuyên nghiệp, công nhân và viên chức quốc phòng có quy định khác;"},{"k":"p","t":"b) Có tuổi thấp hơn tối đa 05 tuổi so với tuổi nghỉ hưu quy định tại khoản 3 Điều 169 của Bộ luật Lao động và có đủ 15 năm làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục do Bộ Lao động - Thương binh và Xã hội ban hành hoặc có đủ 15 năm làm việc ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn bao gồm cả thời gian làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên trước ngày 01 tháng 01 năm 2021;"},{"k":"p","t":"c) Người bị nhiễm HIV do tai nạn rủi ro nghề nghiệp trong khi thực hiện nhiệm vụ được giao."},{"k":"p","t":"3. Lao động nữ là cán bộ, công chức cấp xã hoặc là người hoạt động không chuyên trách ở xã, phường, thị trấn tham gia bảo hiểm xã hội khi nghỉ việc mà có từ đủ 15 năm đến dưới 20 năm đóng bảo hiểm xã hội và đủ tuổi nghỉ hưu quy định tại khoản 2 Điều 169 của Bộ luật Lao động thì được hưởng lương hưu."},{"k":"p","t":"4. Điều kiện về tuổi hưởng lương hưu đối với một số trường hợp đặc biệt theo quy định của Chính phủ.”;"},{"k":"p","t":"b) Sửa đổi, bổ sung Điều 55 như sau:"},{"k":"p","t":"“Điều 55. Điều kiện hưởng lương hưu khi suy giảm khả năng lao động"},{"k":"p","t":"1. Người lao động quy định tại các điểm a, b, c, d, g, h và i khoản 1 Điều 2 của Luật này khi nghỉ việc có đủ 20 năm đóng bảo hiểm xã hội trở lên được hưởng lương hưu với mức thấp hơn so với người đủ điều kiện hưởng lương hưu quy định tại các điểm a, b và c khoản 1 Điều 54 của Luật này nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có tuổi thấp hơn tối đa 05 tuổi so với tuổi nghỉ hưu quy định tại khoản 2 Điều 169 của Bộ luật Lao động khi bị suy giảm khả năng lao động từ 61% đến dưới 81%;"},{"k":"p","t":"b) Có tuổi thấp hơn tối đa 10 tuổi so với tuổi nghỉ hưu quy định tại khoản 2 Điều 169 của Bộ luật Lao động khi bị suy giảm khả năng lao động từ 81% trở lên;"},{"k":"p","t":"c) Có đủ 15 năm trở lên làm nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục do Bộ Lao động - Thương binh và Xã hội ban hành và bị suy giảm khả năng lao động từ 61% trở lên."},{"k":"p","t":"2. Người lao động quy định tại điểm đ và điểm e khoản 1 Điều 2 của Luật này khi nghỉ việc có đủ 20 năm đóng bảo hiểm xã hội trở lên, bị suy giảm khả năng lao động từ 61% trở lên được hưởng lương hưu với mức thấp hơn so với người đủ điều kiện hưởng lương hưu quy định tại điểm a và điểm b khoản 2 Điều 54 của Luật này khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có tuổi thấp hơn tối đa 10 tuổi so với tuổi nghỉ hưu quy định tại khoản 2 Điều 169 của Bộ luật Lao động;"},{"k":"p","t":"b) Có đủ 15 năm trở lên làm nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục do Bộ Lao động - Thương binh và Xã hội ban hành.”;"},{"k":"p","t":"c) Sửa đổi, bổ sung khoản 1 Điều 73 như sau:"},{"k":"p","t":"“1. Người lao động hưởng lương hưu khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Đủ tuổi nghỉ hưu theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động;"},{"k":"p","t":"b) Đủ 20 năm đóng bảo hiểm xã hội trở lên.”."},{"k":"p","t":"2. Sửa đổi, bổ sung Điều 32 của Bộ luật Tố tụng dân sự số 92/2015/QH13 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung tên điều, khoản 1; bổ sung các khoản 1a, 1b và 1c vào sau khoản 1 như sau:"},{"k":"p","t":"“Điều 32. Những tranh chấp về lao động và tranh chấp liên quan đến lao động thuộc thẩm quyền giải quyết của Tòa án"},{"k":"p","t":"1. Tranh chấp lao động cá nhân giữa người lao động với người sử dụng lao động phải thông qua thủ tục hòa giải của hòa giải viên lao động mà hòa giải thành nhưng các bên không thực hiện hoặc thực hiện không đúng, hòa giải không thành hoặc hết thời hạn hòa giải theo quy định của pháp luật về lao động mà hòa giải viên lao động không tiến hành hòa giải, trừ các tranh chấp lao động sau đây không bắt buộc phải qua thủ tục hòa giải:"},{"k":"p","t":"a) Về xử lý kỷ luật lao động theo hình thức sa thải hoặc về trường hợp bị đơn phương chấm dứt hợp đồng lao động;"},{"k":"p","t":"b) Về bồi thường thiệt hại, trợ cấp khi chấm dứt hợp đồng lao động;"},{"k":"p","t":"c) Giữa người giúp việc gia đình với người sử dụng lao động;"},{"k":"p","t":"d) Về bảo hiểm xã hội theo quy định của pháp luật về bảo hiểm xã hội, về bảo hiểm y tế theo quy định của pháp luật về bảo hiểm y tế, về bảo hiểm thất nghiệp theo quy định của pháp luật về việc làm, về bảo hiểm tai nạn lao động, bệnh nghề nghiệp theo quy định của pháp luật về an toàn, vệ sinh lao động;"},{"k":"p","t":"đ) Về bồi thường thiệt hại giữa người lao động với doanh nghiệp, tổ chức đưa người lao động đi làm việc ở nước ngoài theo hợp đồng;"},{"k":"p","t":"e) Giữa người lao động thuê lại với người sử dụng lao động thuê lại."},{"k":"p","t":"1a.Tranh chấp lao động cá nhân mà hai bên thỏa thuận lựa chọn Hội đồng trọng tài lao động giải quyết nhưng hết thời hạn theo quy định của pháp luật về lao động mà Ban trọng tài lao động không được thành lập, Ban trọng tài lao động không ra quyết định giải quyết tranh chấp hoặc một trong các bên không thi hành quyết định của Ban trọng tài lao động thì có quyền yêu cầu Tòa án giải quyết."},{"k":"p","t":"1b. Tranh chấp lao động tập thể về quyền theo quy định của pháp luật về lao động đã qua thủ tục hòa giải của hòa giải viên lao động mà hòa giải không thành, hết thời hạn hòa giải theo quy định của pháp luật về lao động mà hòa giải viên lao động không tiến hành hòa giải hoặc một trong các bên không thực hiện biên bản hòa giải thành thì có quyền yêu cầu Tòa án giải quyết."},{"k":"p","t":"1c. Tranh chấp lao động tập thể về quyền mà hai bên thỏa thuận lựa chọn Hội đồng trọng tài lao động giải quyết nhưng hết thời hạn theo quy định của pháp luật về lao động mà Ban trọng tài lao động không được thành lập, Ban trọng tài lao động không ra quyết định giải quyết tranh chấp hoặc một trong các bên không thi hành quyết định của Ban trọng tài lao động thì có quyền yêu cầu Tòa án giải quyết.”;"},{"k":"p","t":"b) Bãi bỏ khoản 2 Điều 32."}]},{"id":"blld-45_220","no":220,"code":"Điều 220","title":"Điều 220. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương XVII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ luật này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2021."},{"k":"p","t":"Bộ luật Lao động số 10/2012/QH13 hết hiệu lực thi hành kể từ ngày Bộ luật này có hiệu lực."},{"k":"p","t":"2. Kể từ ngày Bộ luật này có hiệu lực thi hành, hợp đồng lao động, thỏa ước lao động tập thể, các thỏa thuận hợp pháp đã giao kết có nội dung không trái hoặc bảo đảm cho người lao động có quyền và điều kiện thuận lợi hơn so với quy định của Bộ luật này được tiếp tục thực hiện, trừ trường hợp các bên có thỏa thuận về việc sửa đổi, bổ sung để phù hợp và để áp dụng quy định của Bộ luật này."},{"k":"p","t":"3. Chế độ lao động đối với cán bộ, công chức, viên chức, người thuộc lực lượng Quân đội nhân dân, Công an nhân dân, tổ chức xã hội, xã viên hợp tác xã, người làm việc không có quan hệ lao động do các văn bản pháp luật khác quy định nhưng tùy từng đối tượng mà được áp dụng một số quy định trong Bộ luật này."},{"k":"p","t":"----------------------------------------------------------------------------------------------------------------------------"},{"k":"p","t":"Bộ luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XIV, kỳ họp thứ 8 thông qua ngày 20 tháng 11 năm 2019./."},{"k":"p","t":"CHỦ TỊCH QUỐC HỘI"},{"k":"p","t":"Đã ký: Nguyễn Thị Kim Ngân"}]}],"refs":{},"details":{},"summaries":{"blld-45_1":{"tldr":"Bộ luật Lao động quy định tiêu chuẩn lao động; quyền, nghĩa vụ, trách nhiệm của người lao động, người sử dụng lao động, tổ chức đại diện người lao động tại cơ sở, tổ chức đại diện người sử dụng lao động trong quan hệ lao động và các quan hệ khác liên quan trực tiếp đến quan hệ lao động; quản lý nhà nước về lao động.","points":[]},"blld-45_3":{"tldr":"Điều giải thích các từ ngữ dùng trong Bộ luật: người lao động, người sử dụng lao động, tổ chức đại diện hai bên, quan hệ lao động, cưỡng bức lao động, phân biệt đối xử, quấy rối tình dục tại nơi làm việc.","points":["Người lao động làm việc theo thỏa thuận, được trả lương, chịu sự quản lý của người sử dụng lao động; độ tuổi lao động tối thiểu là đủ 15 tuổi, trừ trường hợp tại Mục 1 Chương XI.","Người sử dụng lao động là doanh nghiệp, cơ quan, tổ chức, hợp tác xã, hộ gia đình, cá nhân có thuê mướn lao động; nếu là cá nhân thì phải có năng lực hành vi dân sự đầy đủ.","Tổ chức đại diện người lao động tại cơ sở gồm công đoàn cơ sở và tổ chức của người lao động tại doanh nghiệp; quan hệ lao động gồm quan hệ lao động cá nhân và tập thể.","Cưỡng bức lao động là dùng vũ lực, đe dọa dùng vũ lực hoặc thủ đoạn khác để ép buộc người lao động làm việc trái ý muốn.","Phân biệt đối xử trong lao động dựa trên các yếu tố như chủng tộc, giới tính, độ tuổi, tôn giáo, khuyết tật, HIV...; phân biệt xuất phát từ yêu cầu đặc thù công việc hoặc bảo vệ người dễ bị tổn thương không bị xem là phân biệt đối xử.","Quấy rối tình dục tại nơi làm việc là hành vi có tính chất tình dục mà người khác không mong muốn hoặc chấp nhận; nơi làm việc là bất kỳ nơi nào người lao động thực tế làm việc theo thỏa thuận hoặc phân công."]},"blld-45_4":{"tldr":"Điều quy định các chính sách của Nhà nước về lao động nhằm bảo đảm quyền lợi hai bên, phát triển nguồn nhân lực, thị trường lao động, đối thoại - thương lượng tập thể và bình đẳng giới.","points":["Bảo đảm quyền, lợi ích hợp pháp của người lao động và người làm việc không có quan hệ lao động; khuyến khích thỏa thuận có lợi hơn cho người lao động.","Bảo đảm quyền, lợi ích hợp pháp của người sử dụng lao động; quản lý lao động đúng pháp luật, dân chủ, công bằng, văn minh.","Tạo điều kiện tạo việc làm, dạy nghề, học nghề; phát triển, phân bố nguồn nhân lực, nâng cao năng suất, ưu đãi lao động trình độ cao.","Phát triển thị trường lao động, đa dạng hình thức kết nối cung - cầu lao động.","Thúc đẩy đối thoại, thương lượng tập thể, xây dựng quan hệ lao động tiến bộ, hài hòa, ổn định.","Bảo đảm bình đẳng giới và bảo vệ lao động nữ, người khuyết tật, người cao tuổi, lao động chưa thành niên."]},"blld-45_5":{"tldr":"Điều quy định các quyền và nghĩa vụ của người lao động trong quan hệ lao động.","points":["Quyền: làm việc, tự do lựa chọn việc làm, không bị phân biệt đối xử, cưỡng bức lao động, quấy rối tình dục.","Quyền hưởng lương theo thỏa thuận, được bảo hộ lao động, nghỉ theo chế độ, nghỉ hằng năm có hưởng lương, hưởng phúc lợi tập thể.","Quyền thành lập, gia nhập tổ chức đại diện người lao động; tham gia đối thoại, thương lượng tập thể; đơn phương chấm dứt hợp đồng lao động; đình công.","Quyền từ chối làm việc nếu có nguy cơ rõ ràng đe dọa trực tiếp đến tính mạng, sức khỏe.","Nghĩa vụ: thực hiện hợp đồng lao động, thỏa ước lao động tập thể; chấp hành kỷ luật, nội quy lao động; tuân theo sự quản lý, điều hành, giám sát.","Nghĩa vụ thực hiện quy định pháp luật về lao động, việc làm, bảo hiểm xã hội, y tế, thất nghiệp và an toàn, vệ sinh lao động."]},"blld-45_6":{"tldr":"Điều quy định các quyền và nghĩa vụ của người sử dụng lao động trong quan hệ lao động.","points":["Quyền: tuyển dụng, bố trí, quản lý, điều hành, giám sát lao động; khen thưởng và xử lý vi phạm kỷ luật lao động.","Quyền thành lập, gia nhập tổ chức đại diện người sử dụng lao động; đóng cửa tạm thời nơi làm việc.","Quyền yêu cầu tổ chức đại diện người lao động thương lượng ký thỏa ước lao động tập thể; đối thoại, trao đổi về các vấn đề quan hệ lao động.","Nghĩa vụ: thực hiện hợp đồng lao động, thỏa ước lao động tập thể; tôn trọng danh dự, nhân phẩm người lao động; thực hiện quy chế dân chủ ở cơ sở.","Nghĩa vụ đào tạo, đào tạo lại, bồi dưỡng nâng cao trình độ, kỹ năng nghề cho người lao động.","Nghĩa vụ thực hiện pháp luật về lao động, bảo hiểm, an toàn vệ sinh lao động; xây dựng giải pháp phòng, chống quấy rối tình dục; tham gia phát triển tiêu chuẩn kỹ năng nghề quốc gia."]},"blld-45_7":{"tldr":"Điều quy định nguyên tắc xây dựng quan hệ lao động qua đối thoại, thương lượng, thỏa thuận và vai trò của các bên, công đoàn, tổ chức đại diện người sử dụng lao động.","points":["Quan hệ lao động được xác lập qua đối thoại, thương lượng, thỏa thuận theo nguyên tắc tự nguyện, thiện chí, bình đẳng, hợp tác, tôn trọng quyền lợi của nhau.","Các bên xây dựng quan hệ lao động tiến bộ, hài hòa, ổn định với sự hỗ trợ của cơ quan nhà nước có thẩm quyền.","Công đoàn tham gia hỗ trợ xây dựng quan hệ lao động, giám sát việc thi hành pháp luật lao động, bảo vệ quyền lợi người lao động.","Phòng Thương mại và Công nghiệp Việt Nam, Liên minh Hợp tác xã Việt Nam và các tổ chức đại diện người sử dụng lao động khác đại diện, bảo vệ quyền lợi người sử dụng lao động."]},"blld-45_8":{"tldr":"Điều liệt kê các hành vi bị nghiêm cấm trong lĩnh vực lao động.","points":["Phân biệt đối xử trong lao động; ngược đãi người lao động, cưỡng bức lao động; quấy rối tình dục tại nơi làm việc.","Lợi dụng danh nghĩa dạy nghề, tập nghề để trục lợi, bóc lột sức lao động hoặc lôi kéo, ép buộc người học nghề vào hoạt động trái pháp luật.","Sử dụng lao động chưa qua đào tạo hoặc chưa có chứng chỉ kỹ năng nghề quốc gia đối với nghề, công việc bắt buộc phải có.","Lôi kéo, dụ dỗ, hứa hẹn, quảng cáo gian dối để lừa gạt hoặc tuyển dụng nhằm mua bán người, bóc lột, cưỡng bức lao động.","Sử dụng lao động chưa thành niên trái pháp luật."]},"blld-45_10":{"tldr":"Điều quy định quyền làm việc của người lao động: tự do lựa chọn việc làm và cách thức tìm kiếm việc làm.","points":["Được tự do lựa chọn việc làm, làm việc cho bất kỳ người sử dụng lao động nào và ở bất kỳ nơi nào pháp luật không cấm.","Được trực tiếp liên hệ với người sử dụng lao động hoặc thông qua tổ chức dịch vụ việc làm để tìm kiếm việc làm theo nguyện vọng, khả năng, trình độ và sức khỏe."]},"blld-45_11":{"tldr":"Điều quy định cách thức tuyển dụng lao động và nguyên tắc người lao động không phải trả chi phí tuyển dụng.","points":["Người sử dụng lao động được tuyển dụng trực tiếp hoặc thông qua tổ chức dịch vụ việc làm, doanh nghiệp cho thuê lại lao động theo nhu cầu.","Người lao động không phải trả chi phí cho việc tuyển dụng lao động."]},"blld-45_12":{"tldr":"Điều quy định trách nhiệm quản lý lao động của người sử dụng lao động về sổ quản lý lao động và khai trình, báo cáo sử dụng lao động.","points":["Lập, cập nhật, quản lý, sử dụng sổ quản lý lao động bằng bản giấy hoặc điện tử và xuất trình khi cơ quan nhà nước có thẩm quyền yêu cầu.","Khai trình việc sử dụng lao động trong thời hạn 30 ngày kể từ ngày bắt đầu hoạt động, định kỳ báo cáo thay đổi về lao động với cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh và thông báo cho cơ quan bảo hiểm xã hội.","Chính phủ quy định chi tiết Điều này."]},"blld-45_13":{"tldr":"Điều định nghĩa hợp đồng lao động và yêu cầu phải giao kết hợp đồng trước khi nhận người lao động vào làm việc.","points":["Hợp đồng lao động là sự thỏa thuận về việc làm có trả công, tiền lương, điều kiện lao động, quyền và nghĩa vụ của mỗi bên.","Thỏa thuận bằng tên gọi khác nhưng có nội dung về việc làm có trả công, tiền lương và sự quản lý, điều hành, giám sát thì được coi là hợp đồng lao động.","Trước khi nhận người lao động vào làm việc, người sử dụng lao động phải giao kết hợp đồng lao động."]},"blld-45_14":{"tldr":"Điều quy định hình thức hợp đồng lao động: phải bằng văn bản, làm thành 02 bản; được phép giao kết bằng lời nói với hợp đồng dưới 01 tháng trong một số trường hợp ngoại trừ.","points":["Hợp đồng lao động phải giao kết bằng văn bản, làm thành 02 bản, mỗi bên giữ 01 bản, trừ trường hợp tại khoản 2.","Hợp đồng giao kết qua phương tiện điện tử dưới hình thức thông điệp dữ liệu có giá trị như hợp đồng bằng văn bản.","Có thể giao kết bằng lời nói với hợp đồng có thời hạn dưới 01 tháng, trừ trường hợp tại khoản 2 Điều 18, điểm a khoản 1 Điều 145 và khoản 1 Điều 162."]},"blld-45_16":{"tldr":"Điều quy định nghĩa vụ cung cấp thông tin trung thực của cả hai bên khi giao kết hợp đồng lao động.","points":["Người sử dụng lao động phải cung cấp thông tin trung thực về công việc, địa điểm, điều kiện, thời giờ làm việc, tiền lương, bảo hiểm, bảo vệ bí mật kinh doanh - công nghệ và vấn đề khác mà người lao động yêu cầu.","Người lao động phải cung cấp thông tin trung thực về họ tên, ngày tháng năm sinh, giới tính, nơi cư trú, trình độ học vấn, kỹ năng nghề, tình trạng sức khỏe và vấn đề khác mà người sử dụng lao động yêu cầu."]},"blld-45_17":{"tldr":"Điều liệt kê các hành vi người sử dụng lao động không được làm khi giao kết, thực hiện hợp đồng lao động.","points":["Giữ bản chính giấy tờ tùy thân, văn bằng, chứng chỉ của người lao động.","Yêu cầu người lao động thực hiện biện pháp bảo đảm bằng tiền hoặc tài sản khác cho việc thực hiện hợp đồng lao động.","Buộc người lao động thực hiện hợp đồng lao động để trả nợ cho người sử dụng lao động."]},"blld-45_18":{"tldr":"Điều quy định thẩm quyền giao kết hợp đồng lao động của bên người lao động và bên người sử dụng lao động, bao gồm trường hợp ủy quyền theo nhóm.","points":["Người lao động trực tiếp giao kết hợp đồng lao động, trừ trường hợp tại khoản 2.","Với công việc mùa vụ, công việc có thời hạn dưới 12 tháng, nhóm người lao động từ đủ 18 tuổi trở lên có thể ủy quyền cho một người trong nhóm giao kết bằng văn bản, có hiệu lực như giao kết với từng người và kèm danh sách có chữ ký từng người.","Bên người sử dụng lao động: người đại diện theo pháp luật của doanh nghiệp, người đứng đầu cơ quan/tổ chức có tư cách pháp nhân, người đại diện hộ gia đình/tổ hợp tác, cá nhân trực tiếp sử dụng lao động, hoặc người được ủy quyền.","Bên người lao động: người từ đủ 18 tuổi trở lên; người từ đủ 15 đến chưa đủ 18 tuổi khi có đồng ý bằng văn bản của người đại diện theo pháp luật; người chưa đủ 15 tuổi và người đại diện theo pháp luật; người được nhóm ủy quyền.","Người được ủy quyền giao kết hợp đồng lao động không được ủy quyền lại cho người khác."]},"blld-45_19":{"tldr":"Điều quy định người lao động có thể giao kết nhiều hợp đồng lao động với nhiều người sử dụng lao động và việc tham gia bảo hiểm trong trường hợp đó.","points":["Người lao động có thể giao kết nhiều hợp đồng lao động với nhiều người sử dụng lao động nhưng phải bảo đảm thực hiện đầy đủ các nội dung đã giao kết.","Việc tham gia bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp khi giao kết nhiều hợp đồng được thực hiện theo quy định pháp luật về bảo hiểm và an toàn, vệ sinh lao động."]},"blld-45_20":{"tldr":"Điều quy định hai loại hợp đồng lao động (không xác định thời hạn và xác định thời hạn không quá 36 tháng) và cách xử lý khi hợp đồng xác định thời hạn hết hạn mà người lao động tiếp tục làm việc.","points":["Hợp đồng không xác định thời hạn: hai bên không xác định thời hạn, thời điểm chấm dứt; hợp đồng xác định thời hạn: hai bên xác định thời hạn không quá 36 tháng kể từ thời điểm có hiệu lực.","Trong thời hạn 30 ngày kể từ ngày hợp đồng hết hạn, hai bên phải ký hợp đồng mới; trong thời gian chưa ký, quyền và nghĩa vụ thực hiện theo hợp đồng đã giao kết.","Hết 30 ngày mà không ký hợp đồng mới thì hợp đồng xác định thời hạn đã giao kết trở thành hợp đồng không xác định thời hạn.","Nếu ký hợp đồng mới là hợp đồng xác định thời hạn thì chỉ được ký thêm 01 lần, sau đó nếu tiếp tục làm việc phải ký hợp đồng không xác định thời hạn, trừ giám đốc doanh nghiệp có vốn nhà nước và trường hợp tại khoản 1 Điều 149, khoản 2 Điều 151, khoản 4 Điều 177."]},"blld-45_21":{"tldr":"Điều quy định các nội dung chủ yếu của hợp đồng lao động, thỏa thuận bảo vệ bí mật kinh doanh - công nghệ và quy định riêng cho lĩnh vực nông, lâm, ngư, diêm nghiệp.","points":["Nội dung chủ yếu gồm: thông tin các bên; công việc và địa điểm làm việc; thời hạn hợp đồng; mức lương, hình thức và thời hạn trả lương, phụ cấp; chế độ nâng bậc, nâng lương; thời giờ làm việc, nghỉ ngơi; bảo hộ lao động; bảo hiểm; đào tạo, bồi dưỡng.","Khi công việc liên quan trực tiếp đến bí mật kinh doanh, bí mật công nghệ, người sử dụng lao động có quyền thỏa thuận bằng văn bản về nội dung, thời hạn bảo vệ và việc bồi thường khi vi phạm.","Với người lao động nông, lâm, ngư, diêm nghiệp, hai bên có thể giảm một số nội dung chủ yếu và thỏa thuận bổ sung phương thức giải quyết khi chịu ảnh hưởng thiên tai, hỏa hoạn, thời tiết.","Chính phủ quy định nội dung hợp đồng đối với người được thuê làm giám đốc trong doanh nghiệp có vốn nhà nước; Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết các khoản 1, 2 và 3."]},"blld-45_22":{"tldr":"Điều quy định phụ lục hợp đồng lao động là bộ phận của hợp đồng, có hiệu lực như hợp đồng nhưng không được sửa đổi thời hạn hợp đồng.","points":["Phụ lục hợp đồng lao động là bộ phận của hợp đồng và có hiệu lực như hợp đồng lao động.","Phụ lục được quy định chi tiết, sửa đổi, bổ sung một số điều, khoản nhưng không được sửa đổi thời hạn của hợp đồng lao động.","Nếu phụ lục quy định chi tiết dẫn đến cách hiểu khác với hợp đồng thì thực hiện theo nội dung hợp đồng; nếu sửa đổi, bổ sung thì phải ghi rõ nội dung và thời điểm có hiệu lực."]},"blld-45_24":{"tldr":"Điều quy định về thử việc: có thể ghi trong hợp đồng lao động hoặc giao kết hợp đồng thử việc, nội dung chủ yếu và trường hợp không áp dụng thử việc.","points":["Hai bên có thể thỏa thuận nội dung thử việc ghi trong hợp đồng lao động hoặc giao kết hợp đồng thử việc.","Nội dung chủ yếu của hợp đồng thử việc gồm thời gian thử việc và nội dung tại các điểm a, b, c, đ, g, h khoản 1 Điều 21.","Không áp dụng thử việc đối với người lao động giao kết hợp đồng lao động có thời hạn dưới 01 tháng."]},"blld-45_25":{"tldr":"Điều quy định thời gian thử việc do hai bên thỏa thuận, chỉ thử việc một lần đối với một công việc và giới hạn tối đa theo từng loại công việc.","points":["Chỉ được thử việc một lần đối với một công việc.","Không quá 180 ngày đối với công việc của người quản lý doanh nghiệp theo Luật Doanh nghiệp, Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh.","Không quá 60 ngày đối với công việc cần trình độ chuyên môn, kỹ thuật từ cao đẳng trở lên.","Không quá 30 ngày đối với công việc cần trình độ trung cấp, công nhân kỹ thuật, nhân viên nghiệp vụ.","Không quá 06 ngày làm việc đối với công việc khác."]},"blld-45_27":{"tldr":"Điều quy định việc thông báo kết quả thử việc và quyền hủy bỏ hợp đồng thử việc của mỗi bên.","points":["Khi kết thúc thời gian thử việc, người sử dụng lao động phải thông báo kết quả thử việc cho người lao động.","Thử việc đạt yêu cầu thì tiếp tục thực hiện hợp đồng lao động đã giao kết hoặc phải giao kết hợp đồng lao động; không đạt yêu cầu thì chấm dứt hợp đồng đã giao kết hoặc hợp đồng thử việc.","Trong thời gian thử việc, mỗi bên có quyền hủy bỏ hợp đồng thử việc hoặc hợp đồng lao động đã giao kết mà không cần báo trước và không phải bồi thường."]},"blld-45_29":{"tldr":"Điều quy định việc tạm thời chuyển người lao động làm công việc khác so với hợp đồng lao động, giới hạn thời gian, thủ tục báo trước và tiền lương.","points":["Khi gặp khó khăn đột xuất (thiên tai, hỏa hoạn, dịch bệnh, sự cố điện nước...) hoặc do nhu cầu sản xuất kinh doanh, được tạm thời chuyển người lao động làm công việc khác nhưng không quá 60 ngày làm việc cộng dồn trong 01 năm; quá thì phải có đồng ý bằng văn bản của người lao động.","Phải báo cho người lao động biết trước ít nhất 03 ngày làm việc, thông báo rõ thời hạn và bố trí công việc phù hợp sức khỏe, giới tính.","Được trả lương theo công việc mới; nếu lương mới thấp hơn thì giữ nguyên lương cũ trong 30 ngày làm việc; lương mới ít nhất bằng 85% lương cũ nhưng không thấp hơn mức lương tối thiểu.","Người lao động không đồng ý làm quá 60 ngày cộng dồn mà phải ngừng việc thì được trả lương ngừng việc theo Điều 99."]},"blld-45_30":{"tldr":"Điều liệt kê các trường hợp tạm hoãn thực hiện hợp đồng lao động và quy định người lao động không được hưởng lương trong thời gian tạm hoãn trừ khi có thỏa thuận hoặc quy định khác.","points":["Các trường hợp tạm hoãn gồm: thực hiện nghĩa vụ quân sự, Dân quân tự vệ; bị tạm giữ, tạm giam; chấp hành biện pháp đưa vào trường giáo dưỡng, cơ sở cai nghiện, cơ sở giáo dục bắt buộc.","Lao động nữ mang thai theo Điều 138; người được bổ nhiệm làm quản lý công ty TNHH một thành viên do Nhà nước nắm giữ 100% vốn điều lệ; người được ủy quyền thực hiện quyền đại diện chủ sở hữu nhà nước hoặc phần vốn doanh nghiệp; trường hợp khác do hai bên thỏa thuận.","Trong thời gian tạm hoãn, người lao động không được hưởng lương và quyền, lợi ích đã giao kết, trừ trường hợp hai bên có thỏa thuận hoặc pháp luật có quy định khác."]},"blld-45_31":{"tldr":"Điều quy định trong thời hạn 15 ngày kể từ ngày hết tạm hoãn, người lao động phải có mặt và người sử dụng lao động phải nhận lại làm công việc theo hợp đồng nếu hợp đồng còn thời hạn.","points":["Trong thời hạn 15 ngày kể từ ngày hết thời hạn tạm hoãn, người lao động phải có mặt tại nơi làm việc và người sử dụng lao động phải nhận lại làm công việc theo hợp đồng đã giao kết nếu còn thời hạn, trừ trường hợp hai bên có thỏa thuận hoặc pháp luật có quy định khác."]},"blld-45_32":{"tldr":"Điều quy định về làm việc không trọn thời gian: định nghĩa, cách thỏa thuận và bảo đảm bình đẳng quyền lợi cho người lao động.","points":["Người làm việc không trọn thời gian là người có thời gian làm việc ngắn hơn thời gian làm việc bình thường theo ngày, tuần hoặc tháng theo pháp luật, thỏa ước lao động tập thể hoặc nội quy lao động.","Người lao động thỏa thuận làm việc không trọn thời gian khi giao kết hợp đồng lao động.","Được hưởng lương; bình đẳng trong thực hiện quyền và nghĩa vụ, bình đẳng về cơ hội, không bị phân biệt đối xử, bảo đảm an toàn, vệ sinh lao động."]},"blld-45_33":{"tldr":"Điều quy định việc sửa đổi, bổ sung hợp đồng lao động: thủ tục báo trước, cách thực hiện khi thỏa thuận được và khi không thỏa thuận được.","points":["Bên có yêu cầu sửa đổi, bổ sung phải báo cho bên kia biết trước ít nhất 03 ngày làm việc về nội dung cần sửa đổi, bổ sung.","Nếu thỏa thuận được thì tiến hành bằng việc ký kết phụ lục hợp đồng lao động hoặc giao kết hợp đồng lao động mới.","Nếu không thỏa thuận được thì tiếp tục thực hiện hợp đồng lao động đã giao kết."]},"blld-45_34":{"tldr":"Điều liệt kê các trường hợp chấm dứt hợp đồng lao động.","points":["Hết hạn hợp đồng (trừ khoản 4 Điều 177); đã hoàn thành công việc; hai bên thỏa thuận chấm dứt.","Người lao động bị kết án phạt tù không được hưởng án treo hoặc không được trả tự do theo khoản 5 Điều 328 Bộ luật Tố tụng hình sự, tử hình hoặc bị cấm làm công việc ghi trong hợp đồng theo bản án, quyết định của Tòa án.","Người lao động nước ngoài bị trục xuất; người lao động chết hoặc bị tuyên bố mất năng lực hành vi dân sự, mất tích, đã chết.","Người sử dụng lao động là cá nhân chết hoặc bị tuyên mất năng lực/mất tích/đã chết; người sử dụng lao động không phải cá nhân chấm dứt hoạt động hoặc bị thông báo không có người đại diện theo pháp luật.","Người lao động bị xử lý kỷ luật sa thải; người lao động đơn phương chấm dứt theo Điều 35; người sử dụng lao động đơn phương chấm dứt theo Điều 36; cho thôi việc theo Điều 42, Điều 43.","Giấy phép lao động hết hiệu lực với người nước ngoài theo Điều 156; thử việc ghi trong hợp đồng không đạt yêu cầu hoặc một bên hủy bỏ thỏa thuận thử việc."]},"blld-45_35":{"tldr":"Điều quy định quyền đơn phương chấm dứt hợp đồng lao động của người lao động: thời hạn báo trước theo loại hợp đồng và các trường hợp không cần báo trước.","points":["Phải báo trước ít nhất 45 ngày với hợp đồng không xác định thời hạn; ít nhất 30 ngày với hợp đồng xác định thời hạn từ 12 đến 36 tháng; ít nhất 03 ngày làm việc với hợp đồng dưới 12 tháng.","Với một số ngành, nghề, công việc đặc thù thì thời hạn báo trước theo quy định của Chính phủ.","Không cần báo trước khi: không được bố trí đúng công việc, địa điểm, điều kiện làm việc (trừ Điều 29); không được trả đủ lương hoặc trả không đúng hạn (trừ khoản 4 Điều 97).","Không cần báo trước khi: bị ngược đãi, đánh đập, nhục mạ, cưỡng bức lao động; bị quấy rối tình dục tại nơi làm việc.","Không cần báo trước khi: lao động nữ mang thai phải nghỉ việc theo khoản 1 Điều 138; đủ tuổi nghỉ hưu theo Điều 169 (trừ có thỏa thuận khác); người sử dụng lao động cung cấp thông tin không trung thực theo khoản 1 Điều 16."]},"blld-45_36":{"tldr":"Điều quy định quyền đơn phương chấm dứt hợp đồng lao động của người sử dụng lao động: các trường hợp được chấm dứt, thời hạn báo trước và trường hợp không phải báo trước.","points":["Được chấm dứt khi người lao động thường xuyên không hoàn thành công việc theo quy chế đánh giá (phải tham khảo ý kiến tổ chức đại diện người lao động tại cơ sở nơi có tổ chức này).","Được chấm dứt khi người lao động ốm đau, tai nạn đã điều trị 12 tháng liên tục (hợp đồng không xác định thời hạn), 06 tháng liên tục (hợp đồng 12-36 tháng) hoặc quá nửa thời hạn (hợp đồng dưới 12 tháng) mà chưa hồi phục.","Được chấm dứt do thiên tai, hỏa hoạn, dịch bệnh, địch họa hoặc di dời, thu hẹp sản xuất theo yêu cầu cơ quan nhà nước mà buộc phải giảm chỗ làm việc; khi người lao động không có mặt sau thời hạn Điều 31; đủ tuổi nghỉ hưu theo Điều 169; tự ý bỏ việc không lý do chính đáng từ 05 ngày làm việc liên tục trở lên; cung cấp thông tin không trung thực theo khoản 2 Điều 16.","Thời hạn báo trước (cho trường hợp a, b, c, đ, g khoản 1): ít nhất 45 ngày với hợp đồng không xác định thời hạn; 30 ngày với hợp đồng 12-36 tháng; 03 ngày làm việc với hợp đồng dưới 12 tháng và trường hợp điểm b khoản 1.","Với ngành, nghề, công việc đặc thù thì thời hạn báo trước theo quy định của Chính phủ.","Không phải báo trước khi chấm dứt theo điểm d và điểm e khoản 1 (người lao động không có mặt sau thời hạn Điều 31; tự ý bỏ việc từ 05 ngày làm việc liên tục trở lên)."]},"blld-45_37":{"tldr":"Điều liệt kê các trường hợp người sử dụng lao động không được thực hiện quyền đơn phương chấm dứt hợp đồng lao động.","points":["Người lao động ốm đau hoặc bị tai nạn, bệnh nghề nghiệp đang điều trị, điều dưỡng theo chỉ định của cơ sở khám chữa bệnh có thẩm quyền, trừ trường hợp điểm b khoản 1 Điều 36.","Người lao động đang nghỉ hằng năm, nghỉ việc riêng và trường hợp nghỉ khác được người sử dụng lao động đồng ý.","Người lao động nữ mang thai; người đang nghỉ thai sản hoặc nuôi con dưới 12 tháng tuổi."]},"blld-45_40":{"tldr":"Điều quy định nghĩa vụ của người lao động khi đơn phương chấm dứt hợp đồng lao động trái pháp luật: không được trợ cấp thôi việc và phải bồi thường.","points":["Không được trợ cấp thôi việc.","Phải bồi thường cho người sử dụng lao động nửa tháng tiền lương theo hợp đồng và một khoản tiền tương ứng tiền lương trong những ngày không báo trước.","Phải hoàn trả chi phí đào tạo quy định tại Điều 62."]},"blld-45_41":{"tldr":"Người sử dụng lao động đơn phương chấm dứt hợp đồng lao động trái pháp luật phải nhận người lao động trở lại làm việc, trả lương và các khoản bảo hiểm trong những ngày không được làm việc, cộng thêm ít nhất 02 tháng tiền lương.","points":["Phải nhận lại làm việc theo hợp đồng đã giao kết; trả lương, đóng BHXH, BHYT, BHTN những ngày không được làm việc và trả thêm ít nhất bằng 02 tháng tiền lương theo hợp đồng.","Người lao động được nhận lại phải hoàn trả các khoản trợ cấp thôi việc, trợ cấp mất việc làm đã nhận; nếu không còn vị trí mà người lao động vẫn muốn làm việc thì hai bên thỏa thuận sửa đổi, bổ sung hợp đồng.","Vi phạm thời hạn báo trước theo khoản 2 Điều 36 thì phải trả khoản tiền tương ứng tiền lương theo hợp đồng trong những ngày không báo trước.","Nếu người lao động không muốn tiếp tục làm việc thì ngoài khoản tiền tại khoản 1 còn được trả trợ cấp thôi việc theo Điều 46.","Nếu người sử dụng lao động không muốn nhận lại và người lao động đồng ý thì ngoài khoản tiền khoản 1 và trợ cấp thôi việc theo Điều 46, hai bên thỏa thuận khoản bồi thường thêm nhưng ít nhất bằng 02 tháng tiền lương theo hợp đồng."]},"blld-45_42":{"tldr":"Điều này quy định các trường hợp được coi là thay đổi cơ cấu, công nghệ hoặc vì lý do kinh tế và nghĩa vụ của người sử dụng lao động xây dựng phương án sử dụng lao động, trả trợ cấp mất việc làm khi phải cho người lao động thôi việc.","points":["Thay đổi cơ cấu, công nghệ gồm: thay đổi cơ cấu tổ chức/tổ chức lại lao động; thay đổi quy trình, công nghệ, máy móc, thiết bị; thay đổi sản phẩm hoặc cơ cấu sản phẩm.","Lý do kinh tế gồm: khủng hoảng hoặc suy thoái kinh tế; thực hiện chính sách, pháp luật của Nhà nước khi cơ cấu lại nền kinh tế hoặc thực hiện cam kết quốc tế.","Khi ảnh hưởng việc làm của nhiều người lao động phải xây dựng và thực hiện phương án sử dụng lao động theo Điều 44; có chỗ làm việc mới thì ưu tiên đào tạo lại để tiếp tục sử dụng.","Nếu không giải quyết được việc làm mà phải cho thôi việc thì trả trợ cấp mất việc làm theo Điều 47.","Việc cho thôi việc chỉ tiến hành sau khi trao đổi ý kiến với tổ chức đại diện người lao động tại cơ sở (nơi người lao động là thành viên) và thông báo trước 30 ngày cho Ủy ban nhân dân cấp tỉnh và cho người lao động."]},"blld-45_43":{"tldr":"Khi chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản mà ảnh hưởng đến việc làm của nhiều người lao động thì người sử dụng lao động phải xây dựng phương án sử dụng lao động.","points":["Trường hợp ảnh hưởng đến việc làm của nhiều người lao động phải xây dựng phương án sử dụng lao động theo Điều 44.","Người sử dụng lao động hiện tại và kế tiếp có trách nhiệm thực hiện phương án sử dụng lao động đã được thông qua.","Người lao động bị thôi việc được nhận trợ cấp mất việc làm theo Điều 47."]},"blld-45_44":{"tldr":"Phương án sử dụng lao động phải có các nội dung chủ yếu về danh sách người lao động, biện pháp tài chính; khi xây dựng phải trao đổi ý kiến với tổ chức đại diện người lao động và thông báo công khai trong 15 ngày kể từ ngày được thông qua.","points":["Nội dung gồm: số lượng và danh sách người lao động được tiếp tục sử dụng, đào tạo lại, chuyển làm không trọn thời gian; người nghỉ hưu; người phải chấm dứt hợp đồng.","Nội dung còn gồm: quyền và nghĩa vụ của người sử dụng lao động, người lao động và các bên liên quan; biện pháp và nguồn tài chính bảo đảm thực hiện phương án.","Khi xây dựng phải trao đổi ý kiến với tổ chức đại diện người lao động tại cơ sở (nơi có tổ chức này).","Phương án phải được thông báo công khai cho người lao động biết trong thời hạn 15 ngày kể từ ngày được thông qua."]},"blld-45_45":{"tldr":"Người sử dụng lao động phải thông báo bằng văn bản cho người lao động về việc chấm dứt hợp đồng lao động, trừ một số trường hợp; điều này cũng xác định thời điểm chấm dứt khi người sử dụng lao động không phải là cá nhân.","points":["Phải thông báo bằng văn bản về việc chấm dứt hợp đồng, trừ các trường hợp quy định tại khoản 4, 5, 6, 7 và 8 Điều 34.","Người sử dụng lao động không phải cá nhân chấm dứt hoạt động thì thời điểm chấm dứt hợp đồng tính từ thời điểm có thông báo chấm dứt hoạt động.","Trường hợp bị cơ quan đăng ký kinh doanh thuộc Ủy ban nhân dân cấp tỉnh ra thông báo không có người đại diện theo pháp luật (theo khoản 7 Điều 34) thì thời điểm chấm dứt tính từ ngày ra thông báo."]},"blld-45_46":{"tldr":"Người sử dụng lao động trả trợ cấp thôi việc cho người lao động làm việc thường xuyên từ đủ 12 tháng trở lên, mỗi năm làm việc trợ cấp một nửa tháng tiền lương, trừ một số trường hợp.","points":["Áp dụng khi hợp đồng chấm dứt theo khoản 1, 2, 3, 4, 6, 7, 9 và 10 Điều 34, cho người làm việc thường xuyên từ đủ 12 tháng trở lên; mỗi năm làm việc trợ cấp một nửa tháng tiền lương.","Trừ trường hợp đủ điều kiện hưởng lương hưu theo pháp luật về BHXH và trường hợp tại điểm e khoản 1 Điều 36.","Thời gian tính trợ cấp là tổng thời gian làm việc thực tế trừ thời gian đã tham gia bảo hiểm thất nghiệp và thời gian đã được chi trả trợ cấp thôi việc, trợ cấp mất việc làm.","Tiền lương để tính trợ cấp là tiền lương bình quân của 06 tháng liền kề theo hợp đồng trước khi thôi việc.","Chính phủ quy định chi tiết Điều này."]},"blld-45_47":{"tldr":"Người sử dụng lao động trả trợ cấp mất việc làm cho người lao động làm việc thường xuyên từ đủ 12 tháng trở lên mà bị mất việc làm, mỗi năm làm việc trả 01 tháng tiền lương nhưng ít nhất bằng 02 tháng tiền lương.","points":["Áp dụng cho người làm việc thường xuyên từ đủ 12 tháng trở lên bị mất việc làm theo khoản 11 Điều 34; mỗi năm làm việc trả 01 tháng tiền lương nhưng ít nhất bằng 02 tháng tiền lương.","Thời gian tính trợ cấp là tổng thời gian làm việc thực tế trừ thời gian đã tham gia bảo hiểm thất nghiệp và thời gian đã được chi trả trợ cấp thôi việc, trợ cấp mất việc làm.","Tiền lương để tính trợ cấp là tiền lương bình quân của 06 tháng liền kề theo hợp đồng trước khi mất việc làm.","Chính phủ quy định chi tiết Điều này."]},"blld-45_48":{"tldr":"Trong thời hạn 14 ngày làm việc kể từ ngày chấm dứt hợp đồng, hai bên phải thanh toán đầy đủ các khoản tiền liên quan đến quyền lợi mỗi bên, một số trường hợp được kéo dài nhưng không quá 30 ngày.","points":["Hai bên thanh toán đầy đủ trong 14 ngày làm việc kể từ ngày chấm dứt hợp đồng; có thể kéo dài nhưng không quá 30 ngày trong các trường hợp như chấm dứt hoạt động, thay đổi cơ cấu/công nghệ/lý do kinh tế, chia tách sáp nhập..., thiên tai hỏa hoạn địch họa hoặc dịch bệnh nguy hiểm.","Tiền lương, BHXH, BHYT, BHTN, trợ cấp thôi việc và quyền lợi khác được ưu tiên thanh toán khi doanh nghiệp, hợp tác xã chấm dứt hoạt động, giải thể, phá sản.","Người sử dụng lao động phải hoàn thành thủ tục xác nhận thời gian đóng BHXH, BHTN và trả lại bản chính giấy tờ khác đã giữ.","Người sử dụng lao động phải cung cấp bản sao tài liệu liên quan đến quá trình làm việc nếu người lao động yêu cầu; chi phí sao, gửi do người sử dụng lao động trả."]},"blld-45_49":{"tldr":"Hợp đồng lao động vô hiệu toàn bộ trong các trường hợp nội dung vi phạm pháp luật, giao kết không đúng thẩm quyền hoặc công việc bị pháp luật cấm; vô hiệu từng phần khi phần đó vi phạm pháp luật nhưng không ảnh hưởng phần còn lại.","points":["Vô hiệu toàn bộ khi: toàn bộ nội dung vi phạm pháp luật; người giao kết không đúng thẩm quyền hoặc vi phạm nguyên tắc giao kết tại khoản 1 Điều 15; công việc giao kết là công việc pháp luật cấm.","Vô hiệu từng phần khi nội dung của phần đó vi phạm pháp luật nhưng không ảnh hưởng đến các phần còn lại của hợp đồng."]},"blld-45_51":{"tldr":"Điều này quy định cách xử lý hợp đồng lao động bị tuyên bố vô hiệu từng phần và vô hiệu toàn bộ.","points":["Vô hiệu từng phần: quyền, nghĩa vụ, lợi ích hai bên giải quyết theo thỏa ước lao động tập thể đang áp dụng; không có thỏa ước thì theo pháp luật; hai bên sửa đổi, bổ sung phần bị vô hiệu cho phù hợp.","Vô hiệu toàn bộ: quyền, nghĩa vụ, lợi ích của người lao động giải quyết theo pháp luật; trường hợp ký sai thẩm quyền thì hai bên ký lại.","Chính phủ quy định chi tiết Điều này."]},"blld-45_52":{"tldr":"Cho thuê lại lao động là việc người lao động giao kết hợp đồng với doanh nghiệp cho thuê lại lao động rồi được chuyển sang làm việc, chịu sự điều hành của người sử dụng lao động khác mà vẫn duy trì quan hệ lao động với doanh nghiệp đã giao kết hợp đồng.","points":["Người lao động giao kết hợp đồng với doanh nghiệp cho thuê lại lao động, sau đó chuyển sang làm việc và chịu sự điều hành của người sử dụng lao động khác mà vẫn duy trì quan hệ lao động với bên đã giao kết hợp đồng.","Hoạt động cho thuê lại lao động là ngành, nghề kinh doanh có điều kiện, chỉ thực hiện bởi doanh nghiệp có Giấy phép hoạt động cho thuê lại lao động và áp dụng đối với một số công việc nhất định."]},"blld-45_53":{"tldr":"Thời hạn cho thuê lại lao động tối đa là 12 tháng; điều này quy định các trường hợp bên thuê lại được và không được sử dụng lao động thuê lại.","points":["Thời hạn cho thuê lại lao động đối với người lao động tối đa là 12 tháng.","Được sử dụng lao động thuê lại để: đáp ứng tạm thời sự gia tăng đột ngột nhu cầu lao động; thay thế người nghỉ thai sản, tai nạn lao động, bệnh nghề nghiệp hoặc thực hiện nghĩa vụ công dân; có nhu cầu lao động trình độ chuyên môn, kỹ thuật cao.","Không được sử dụng để thay thế người đang đình công, giải quyết tranh chấp lao động; khi không có thỏa thuận về bồi thường tai nạn lao động, bệnh nghề nghiệp; thay thế người bị cho thôi việc do thay đổi cơ cấu, công nghệ, lý do kinh tế hoặc chia, tách, hợp nhất, sáp nhập.","Bên thuê lại không được chuyển người lao động thuê lại cho người sử dụng lao động khác; không được sử dụng lao động thuê lại từ doanh nghiệp không có Giấy phép hoạt động cho thuê lại lao động."]},"blld-45_54":{"tldr":"Doanh nghiệp cho thuê lại lao động phải ký quỹ và được cấp Giấy phép hoạt động cho thuê lại lao động; Chính phủ quy định chi tiết các điều kiện, thủ tục liên quan.","points":["Doanh nghiệp cho thuê lại lao động phải ký quỹ và được cấp Giấy phép hoạt động cho thuê lại lao động.","Chính phủ quy định việc ký quỹ, điều kiện, trình tự, thủ tục cấp, cấp lại, gia hạn, thu hồi Giấy phép và danh mục công việc được thực hiện cho thuê lại lao động."]},"blld-45_55":{"tldr":"Doanh nghiệp cho thuê lại lao động và bên thuê lại phải ký hợp đồng cho thuê lại lao động bằng văn bản thành 02 bản với các nội dung chủ yếu, và không được thỏa thuận quyền, lợi ích của người lao động thấp hơn hợp đồng lao động đã ký.","points":["Phải ký kết hợp đồng cho thuê lại lao động bằng văn bản, làm thành 02 bản, mỗi bên giữ 01 bản.","Nội dung chủ yếu gồm: địa điểm, vị trí, nội dung công việc, yêu cầu đối với người lao động; thời hạn thuê lại và thời gian bắt đầu làm việc; thời giờ làm việc, nghỉ ngơi, an toàn vệ sinh lao động; trách nhiệm bồi thường tai nạn lao động, bệnh nghề nghiệp; nghĩa vụ mỗi bên đối với người lao động.","Hợp đồng không được có thỏa thuận về quyền, lợi ích của người lao động thấp hơn hợp đồng lao động mà doanh nghiệp cho thuê lại đã ký với người lao động."]},"blld-45_56":{"tldr":"Ngoài quyền và nghĩa vụ tại Điều 6, doanh nghiệp cho thuê lại lao động còn có các quyền và nghĩa vụ riêng về bảo đảm trình độ người lao động, thông báo nội dung hợp đồng, trả lương và xử lý kỷ luật.","points":["Bảo đảm đưa người lao động có trình độ phù hợp yêu cầu của bên thuê lại và nội dung hợp đồng lao động đã ký.","Thông báo cho người lao động biết nội dung hợp đồng cho thuê lại lao động; thông báo cho bên thuê lại biết sơ yếu lý lịch và yêu cầu của người lao động.","Bảo đảm trả lương cho người lao động thuê lại không thấp hơn lương của người lao động bên thuê lại có cùng trình độ, làm cùng công việc hoặc công việc có giá trị như nhau.","Lập hồ sơ ghi rõ số lao động đã cho thuê lại, bên thuê lại và định kỳ báo cáo cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh.","Xử lý kỷ luật lao động đối với người lao động vi phạm khi bên thuê lại trả lại người lao động do vi phạm kỷ luật lao động."]},"blld-45_57":{"tldr":"Điều này quy định quyền và nghĩa vụ của bên thuê lại lao động đối với người lao động thuê lại.","points":["Thông báo, hướng dẫn người lao động thuê lại biết nội quy lao động và các quy chế khác của mình.","Không được phân biệt đối xử về điều kiện lao động giữa người lao động thuê lại và người lao động của mình.","Thỏa thuận với người lao động thuê lại về làm việc ban đêm, làm thêm giờ theo quy định của Bộ luật.","Có thể thỏa thuận với người lao động thuê lại và doanh nghiệp cho thuê lại để tuyển dụng chính thức khi hợp đồng lao động chưa chấm dứt.","Trả lại người lao động thuê lại không đáp ứng yêu cầu hoặc vi phạm kỷ luật lao động và cung cấp chứng cứ về hành vi vi phạm kỷ luật cho doanh nghiệp cho thuê lại."]},"blld-45_58":{"tldr":"Ngoài quyền và nghĩa vụ tại Điều 5, người lao động thuê lại còn có các quyền và nghĩa vụ riêng về thực hiện công việc, chấp hành kỷ luật, được trả lương, khiếu nại và thỏa thuận chấm dứt hợp đồng.","points":["Thực hiện công việc theo hợp đồng lao động đã ký với doanh nghiệp hoạt động cho thuê lại lao động.","Chấp hành kỷ luật lao động, nội quy lao động; tuân theo sự quản lý, điều hành, giám sát hợp pháp của bên thuê lại lao động.","Được trả lương không thấp hơn lương của người lao động bên thuê lại có cùng trình độ, làm cùng công việc hoặc công việc có giá trị như nhau.","Khiếu nại với doanh nghiệp cho thuê lại khi bị bên thuê lại vi phạm thỏa thuận trong hợp đồng cho thuê lại lao động.","Thỏa thuận chấm dứt hợp đồng lao động với doanh nghiệp cho thuê lại để giao kết hợp đồng lao động với bên thuê lại lao động."]},"blld-45_59":{"tldr":"Người lao động được tự do lựa chọn đào tạo nghề nghiệp, tham gia đánh giá, công nhận kỹ năng nghề quốc gia; Nhà nước khuyến khích người sử dụng lao động đủ điều kiện đào tạo nghề và phát triển kỹ năng nghề.","points":["Người lao động được tự do lựa chọn đào tạo nghề nghiệp, tham gia đánh giá, công nhận kỹ năng nghề quốc gia, phát triển năng lực nghề nghiệp phù hợp nhu cầu việc làm và khả năng của mình.","Nhà nước khuyến khích người sử dụng lao động đủ điều kiện đào tạo nghề và phát triển kỹ năng nghề cho người lao động đang làm việc cho mình và người lao động khác trong xã hội.","Hoạt động khuyến khích gồm: thành lập cơ sở giáo dục nghề nghiệp hoặc mở lớp đào tạo tại nơi làm việc, phối hợp đào tạo các trình độ; tổ chức thi kỹ năng nghề, tham gia hội đồng kỹ năng nghề, dự báo nhu cầu, đánh giá và công nhận kỹ năng nghề."]},"blld-45_60":{"tldr":"Người sử dụng lao động xây dựng kế hoạch hằng năm và dành kinh phí đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề cho người lao động và hằng năm thông báo kết quả cho cơ quan chuyên môn về lao động.","points":["Xây dựng kế hoạch hằng năm và dành kinh phí cho đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề, phát triển kỹ năng nghề cho người lao động đang làm việc; đào tạo trước khi chuyển làm nghề khác.","Hằng năm thông báo kết quả đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh."]},"blld-45_61":{"tldr":"Điều này quy định về học nghề, tập nghề để làm việc cho người sử dụng lao động, gồm thời hạn tập nghề không quá 03 tháng, độ tuổi và việc không được thu học phí.","points":["Học nghề là tuyển người vào để đào tạo nghề tại nơi làm việc, thời gian theo chương trình đào tạo của từng trình độ theo Luật Giáo dục nghề nghiệp; tập nghề là tuyển người vào hướng dẫn thực hành công việc, thời hạn không quá 03 tháng.","Người sử dụng lao động tuyển vào học nghề, tập nghề để làm việc cho mình không phải đăng ký hoạt động giáo dục nghề nghiệp; không được thu học phí; phải ký hợp đồng đào tạo.","Người học nghề, tập nghề phải đủ 14 tuổi trở lên và đủ sức khỏe phù hợp; với nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt phải từ đủ 18 tuổi trở lên, trừ lĩnh vực nghệ thuật, thể dục, thể thao.","Trong thời gian học nghề, tập nghề nếu trực tiếp hoặc tham gia lao động thì được trả lương theo mức hai bên thỏa thuận.","Hết thời hạn học nghề, tập nghề, hai bên phải ký kết hợp đồng lao động khi đủ điều kiện theo quy định của Bộ luật."]},"blld-45_62":{"tldr":"Khi người lao động được đào tạo nâng cao trình độ, kỹ năng nghề, đào tạo lại từ kinh phí của người sử dụng lao động thì hai bên phải ký hợp đồng đào tạo nghề với các nội dung chủ yếu; điều này cũng quy định các khoản thuộc chi phí đào tạo.","points":["Phải ký hợp đồng đào tạo nghề khi người lao động được đào tạo nâng cao trình độ, kỹ năng nghề, đào tạo lại trong nước hoặc nước ngoài từ kinh phí của người sử dụng lao động, kể cả kinh phí do đối tác tài trợ; làm thành 02 bản, mỗi bên giữ 01 bản.","Nội dung chủ yếu gồm: nghề đào tạo; địa điểm, thời gian, tiền lương trong thời gian đào tạo; thời hạn cam kết làm việc sau đào tạo; chi phí đào tạo và trách nhiệm hoàn trả; trách nhiệm của người sử dụng lao động và của người lao động.","Chi phí đào tạo gồm các khoản chi có chứng từ hợp lệ trả cho người dạy, tài liệu, trường lớp, máy thiết bị, vật liệu thực hành, chi phí khác hỗ trợ người học và tiền lương, tiền đóng BHXH, BHYT, BHTN cho người học trong thời gian đi học.","Trường hợp gửi đi đào tạo ở nước ngoài thì chi phí đào tạo còn bao gồm chi phí đi lại, chi phí sinh hoạt trong thời gian đào tạo."]},"blld-45_63":{"tldr":"Đối thoại tại nơi làm việc là việc chia sẻ thông tin, trao đổi ý kiến giữa người sử dụng lao động với người lao động hoặc tổ chức đại diện; người sử dụng lao động phải tổ chức đối thoại định kỳ ít nhất 01 năm một lần và trong một số trường hợp khác.","points":["Đối thoại tại nơi làm việc là việc chia sẻ thông tin, tham khảo, thảo luận, trao đổi ý kiến giữa người sử dụng lao động với người lao động hoặc tổ chức đại diện về các vấn đề liên quan đến quyền, lợi ích và mối quan tâm của các bên.","Phải tổ chức đối thoại: định kỳ ít nhất 01 năm một lần; khi có yêu cầu của một hoặc các bên; khi có vụ việc tại điểm a khoản 1 Điều 36, các điều 42, 44, 93, 104, 118 và khoản 1 Điều 128.","Khuyến khích các bên đối thoại ngoài những trường hợp bắt buộc.","Chính phủ quy định việc tổ chức đối thoại và thực hiện quy chế dân chủ ở cơ sở tại nơi làm việc."]},"blld-45_64":{"tldr":"Nội dung đối thoại bắt buộc theo điểm c khoản 2 Điều 63; ngoài ra các bên lựa chọn một hoặc một số nội dung khác để tiến hành đối thoại.","points":["Nội dung đối thoại bắt buộc theo quy định tại điểm c khoản 2 Điều 63.","Ngoài ra, các bên lựa chọn một hoặc một số nội dung: tình hình sản xuất, kinh doanh; việc thực hiện hợp đồng lao động, thỏa ước lao động tập thể, nội quy, quy chế, cam kết; điều kiện làm việc.","Các nội dung khác gồm: yêu cầu của người lao động/tổ chức đại diện đối với người sử dụng lao động; yêu cầu của người sử dụng lao động đối với người lao động/tổ chức đại diện; nội dung khác mà một hoặc các bên quan tâm."]},"blld-45_65":{"tldr":"Thương lượng tập thể là việc đàm phán, thỏa thuận giữa một hoặc nhiều tổ chức đại diện người lao động với một hoặc nhiều người sử dụng lao động hoặc tổ chức đại diện của họ nhằm xác lập điều kiện lao động và xây dựng quan hệ lao động tiến bộ, hài hòa, ổn định.","points":["Là việc đàm phán, thỏa thuận giữa một bên là một hoặc nhiều tổ chức đại diện người lao động với một bên là một hoặc nhiều người sử dụng lao động hoặc tổ chức đại diện người sử dụng lao động.","Mục đích nhằm xác lập điều kiện lao động, quy định về mối quan hệ giữa các bên và xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định."]},"blld-45_67":{"tldr":"Các bên thương lượng lựa chọn một hoặc một số nội dung để tiến hành thương lượng tập thể.","points":["Các nội dung gồm: tiền lương, trợ cấp, nâng lương, thưởng, bữa ăn và chế độ khác; mức lao động, thời giờ làm việc, nghỉ ngơi, làm thêm giờ, nghỉ giữa ca; bảo đảm việc làm.","Các nội dung khác gồm: bảo đảm an toàn, vệ sinh lao động, thực hiện nội quy lao động; điều kiện, phương tiện hoạt động và mối quan hệ với tổ chức đại diện người lao động; cơ chế phòng ngừa, giải quyết tranh chấp lao động.","Còn gồm: bảo đảm bình đẳng giới, bảo vệ thai sản, nghỉ hằng năm, phòng chống bạo lực và quấy rối tình dục tại nơi làm việc; nội dung khác mà một hoặc các bên quan tâm."]},"blld-45_68":{"tldr":"Tổ chức đại diện người lao động tại cơ sở có quyền yêu cầu thương lượng tập thể khi đạt tỷ lệ thành viên tối thiểu theo quy định của Chính phủ; điều này quy định cách xác định tổ chức có quyền khi doanh nghiệp có nhiều tổ chức đại diện.","points":["Có quyền yêu cầu thương lượng tập thể khi đạt tỷ lệ thành viên tối thiểu trên tổng số người lao động trong doanh nghiệp theo quy định của Chính phủ.","Khi có nhiều tổ chức đáp ứng, tổ chức có quyền yêu cầu là tổ chức có số thành viên nhiều nhất; các tổ chức khác có thể tham gia khi được tổ chức có quyền đồng ý.","Khi không tổ chức nào đáp ứng, các tổ chức có quyền tự nguyện kết hợp để yêu cầu thương lượng nhưng tổng số thành viên phải đạt tỷ lệ tối thiểu theo khoản 1.","Chính phủ quy định việc giải quyết tranh chấp giữa các bên liên quan đến quyền thương lượng tập thể."]},"blld-45_69":{"tldr":"Số lượng và thành phần người tham gia thương lượng tập thể của mỗi bên do bên đó quyết định/thỏa thuận; mỗi bên có quyền mời tổ chức đại diện cấp trên cử người tham gia và bên kia không được từ chối.","points":["Số lượng người tham gia thương lượng của mỗi bên do các bên thỏa thuận; thành phần do mỗi bên quyết định.","Bên người lao động có nhiều tổ chức tham gia theo khoản 2 Điều 68 thì tổ chức có quyền yêu cầu quyết định số lượng đại diện mỗi tổ chức.","Bên người lao động có nhiều tổ chức tham gia theo khoản 3 Điều 68 thì số lượng đại diện mỗi tổ chức do các tổ chức thỏa thuận; không thỏa thuận được thì xác định tương ứng theo tỷ lệ thành viên.","Mỗi bên có quyền mời tổ chức đại diện cấp trên cử người tham gia, bên kia không được từ chối; số đại diện không vượt quá số lượng tại khoản 1, trừ khi bên kia đồng ý."]},"blld-45_70":{"tldr":"Điều này quy định quy trình thương lượng tập thể tại doanh nghiệp, gồm các thời hạn 07 ngày làm việc thỏa thuận thời gian địa điểm, bắt đầu không quá 30 ngày, thời gian thương lượng không quá 90 ngày, và việc lập biên bản.","points":["Bên nhận yêu cầu không được từ chối thương lượng; trong 07 ngày làm việc kể từ ngày nhận yêu cầu các bên thỏa thuận địa điểm, thời gian bắt đầu; thời gian bắt đầu không quá 30 ngày kể từ ngày nhận yêu cầu.","Thời gian thương lượng không quá 90 ngày kể từ ngày bắt đầu, trừ khi các bên có thỏa thuận khác; thời gian dự họp của đại diện bên người lao động được tính là thời gian làm việc có hưởng lương.","Khi có yêu cầu của bên đại diện người lao động, trong 10 ngày người sử dụng lao động phải cung cấp thông tin về sản xuất, kinh doanh và nội dung liên quan, trừ bí mật kinh doanh, bí mật công nghệ.","Tổ chức đại diện người lao động tại cơ sở có quyền tổ chức thảo luận, lấy ý kiến người lao động nhưng không làm ảnh hưởng hoạt động bình thường; người sử dụng lao động không được gây khó khăn, cản trở, can thiệp.","Thương lượng phải lập biên bản ghi rõ nội dung thống nhất và nội dung còn khác nhau, có chữ ký của đại diện các bên và người ghi biên bản; tổ chức đại diện công bố công khai biên bản đến toàn bộ người lao động."]},"blld-45_71":{"tldr":"Điều này quy định các trường hợp thương lượng tập thể không thành và việc các bên tiến hành thủ tục giải quyết tranh chấp lao động, trong khi giải quyết thì không được tổ chức đình công.","points":["Thương lượng không thành khi: một bên từ chối hoặc không tiến hành thương lượng trong thời hạn tại khoản 1 Điều 70; đã hết thời hạn tại khoản 2 Điều 70 mà không đạt thỏa thuận; chưa hết thời hạn nhưng các bên cùng tuyên bố không đạt thỏa thuận.","Khi thương lượng không thành, các bên tiến hành thủ tục giải quyết tranh chấp lao động theo Bộ luật; trong khi đang giải quyết tranh chấp, tổ chức đại diện người lao động không được tổ chức đình công."]},"blld-45_72":{"tldr":"Nguyên tắc, nội dung thương lượng tập thể ngành và có nhiều doanh nghiệp tham gia thực hiện theo Điều 66 và Điều 67; quy trình do các bên thỏa thuận quyết định, kể cả thông qua Hội đồng thương lượng tập thể.","points":["Nguyên tắc, nội dung thực hiện theo Điều 66 và Điều 67.","Quy trình do các bên thỏa thuận quyết định, bao gồm cả việc thỏa thuận thương lượng thông qua Hội đồng thương lượng tập thể quy định tại Điều 73.","Thương lượng tập thể ngành: đại diện là tổ chức công đoàn ngành và tổ chức đại diện người sử dụng lao động cấp ngành quyết định; thương lượng có nhiều doanh nghiệp: đại diện do các bên quyết định trên cơ sở tự nguyện, thỏa thuận."]},"blld-45_73":{"tldr":"Trên cơ sở đồng thuận, các bên thương lượng tập thể có nhiều doanh nghiệp có thể yêu cầu Ủy ban nhân dân cấp tỉnh thành lập Hội đồng thương lượng tập thể để tiến hành thương lượng.","points":["Các bên có thể yêu cầu Ủy ban nhân dân cấp tỉnh nơi đặt trụ sở chính hoặc nơi các bên lựa chọn thành lập Hội đồng thương lượng tập thể.","Ủy ban nhân dân cấp tỉnh quyết định thành lập Hội đồng; thành phần gồm Chủ tịch Hội đồng do các bên quyết định, đại diện các bên thương lượng do mỗi bên cử, và đại diện Ủy ban nhân dân cấp tỉnh.","Hội đồng tiến hành thương lượng theo yêu cầu của các bên và tự chấm dứt hoạt động khi thỏa ước lao động tập thể có nhiều doanh nghiệp được ký kết hoặc theo thỏa thuận của các bên.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chức năng, nhiệm vụ, hoạt động của Hội đồng thương lượng tập thể."]},"blld-45_74":{"tldr":"Điều này quy định trách nhiệm của Ủy ban nhân dân cấp tỉnh trong thương lượng tập thể, gồm đào tạo kỹ năng, cung cấp thông tin, hỗ trợ các bên và thành lập Hội đồng thương lượng tập thể.","points":["Tổ chức đào tạo, bồi dưỡng kỹ năng thương lượng tập thể cho các bên.","Xây dựng và cung cấp thông tin, dữ liệu về kinh tế - xã hội, thị trường lao động, quan hệ lao động nhằm hỗ trợ, thúc đẩy thương lượng tập thể.","Hỗ trợ các bên đạt thỏa thuận; trường hợp không có yêu cầu, việc chủ động hỗ trợ chỉ tiến hành nếu được các bên đồng ý.","Thành lập Hội đồng thương lượng tập thể khi có yêu cầu của các bên thương lượng tập thể có nhiều doanh nghiệp theo Điều 73."]},"blld-45_75":{"tldr":"Thỏa ước lao động tập thể là thỏa thuận đạt được qua thương lượng tập thể và được các bên ký kết bằng văn bản, gồm nhiều loại và không được trái pháp luật.","points":["Gồm thỏa ước doanh nghiệp, thỏa ước ngành, thỏa ước có nhiều doanh nghiệp và các thỏa ước khác.","Nội dung không được trái pháp luật; khuyến khích có lợi hơn cho người lao động so với pháp luật."]},"blld-45_76":{"tldr":"Trước khi ký kết, dự thảo thỏa ước phải được lấy ý kiến và chỉ được ký khi đạt tỷ lệ tán thành theo quy định; thỏa ước phải được gửi, công bố theo quy định.","points":["Thỏa ước doanh nghiệp chỉ được ký khi có trên 50% người lao động của doanh nghiệp biểu quyết tán thành.","Thỏa ước ngành chỉ được ký khi có trên 50% tổng số người được lấy ý kiến tán thành; với thỏa ước nhiều doanh nghiệp, chỉ doanh nghiệp có trên 50% số người được lấy ý kiến tán thành mới tham gia ký kết.","Người sử dụng lao động không được gây khó khăn, cản trở hoặc can thiệp vào quá trình lấy ý kiến biểu quyết.","Thỏa ước phải gửi cho mỗi bên ký kết và cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh theo Điều 77.","Với thỏa ước ngành hoặc nhiều doanh nghiệp, từng người sử dụng lao động và từng tổ chức đại diện người lao động phải nhận 01 bản.","Sau khi ký kết, người sử dụng lao động phải công bố cho người lao động của mình biết."]},"blld-45_78":{"tldr":"Ngày hiệu lực do các bên thỏa thuận ghi trong thỏa ước, nếu không thỏa thuận thì có hiệu lực từ ngày ký kết; thỏa ước có thời hạn từ 01 năm đến 03 năm.","points":["Không thỏa thuận ngày hiệu lực thì thỏa ước có hiệu lực kể từ ngày ký kết và phải được các bên tôn trọng thực hiện.","Thỏa ước doanh nghiệp áp dụng với người sử dụng lao động và toàn bộ người lao động của doanh nghiệp; thỏa ước ngành và nhiều doanh nghiệp áp dụng với toàn bộ người sử dụng lao động và người lao động của các doanh nghiệp tham gia.","Thời hạn từ 01 năm đến 03 năm; các bên có quyền thỏa thuận thời hạn khác nhau đối với các nội dung của thỏa ước."]},"blld-45_79":{"tldr":"Người sử dụng lao động và người lao động có nghĩa vụ thực hiện đầy đủ thỏa ước đang có hiệu lực; nội dung hợp đồng thấp hơn thỏa ước thì thực hiện theo thỏa ước.","points":["Nghĩa vụ thực hiện áp dụng cả với người lao động vào làm việc sau ngày thỏa ước có hiệu lực.","Quyền, nghĩa vụ, lợi ích trong hợp đồng giao kết trước ngày thỏa ước có hiệu lực mà thấp hơn thỏa ước thì phải thực hiện theo thỏa ước.","Quy định của người sử dụng lao động chưa phù hợp phải được sửa đổi; trong thời gian chưa sửa đổi thì thực hiện theo nội dung tương ứng của thỏa ước.","Khi một bên cho rằng bên kia thực hiện không đầy đủ hoặc vi phạm thì có quyền yêu cầu thi hành đúng; nếu không giải quyết được thì có quyền yêu cầu giải quyết tranh chấp lao động tập thể."]},"blld-45_80":{"tldr":"Khi chia, tách, hợp nhất, sáp nhập, bán, cho thuê, chuyển đổi loại hình hoặc chuyển nhượng tài sản doanh nghiệp, người sử dụng lao động kế tiếp và tổ chức đại diện người lao động có quyền thương lượng để xử lý thỏa ước.","points":["Căn cứ phương án sử dụng lao động để xem xét tiếp tục thực hiện, sửa đổi, bổ sung thỏa ước cũ hoặc thương lượng ký kết thỏa ước mới theo Điều 68.","Trường hợp thỏa ước hết hiệu lực do người sử dụng lao động chấm dứt hoạt động thì quyền lợi người lao động được giải quyết theo quy định của pháp luật."]},"blld-45_81":{"tldr":"Khi thỏa ước doanh nghiệp, nhiều doanh nghiệp và ngành quy định khác nhau thì thực hiện theo nội dung có lợi nhất cho người lao động.","points":["Quy định khác nhau về quyền, nghĩa vụ, lợi ích thì thực hiện theo nội dung có lợi nhất cho người lao động.","Doanh nghiệp thuộc đối tượng áp dụng thỏa ước ngành hoặc nhiều doanh nghiệp nhưng chưa có thỏa ước doanh nghiệp có thể xây dựng thỏa ước doanh nghiệp với nội dung có lợi hơn.","Khuyến khích doanh nghiệp chưa tham gia thỏa ước ngành hoặc nhiều doanh nghiệp thực hiện nội dung có lợi hơn cho người lao động."]},"blld-45_82":{"tldr":"Thỏa ước chỉ được sửa đổi, bổ sung theo thỏa thuận tự nguyện của các bên qua thương lượng tập thể; khi pháp luật thay đổi thì phải sửa đổi cho phù hợp.","points":["Việc sửa đổi, bổ sung được thực hiện như việc thương lượng, ký kết thỏa ước.","Khi pháp luật thay đổi khiến thỏa ước không còn phù hợp thì các bên phải sửa đổi, bổ sung cho phù hợp.","Trong thời gian sửa đổi, bổ sung, quyền lợi người lao động được thực hiện theo quy định của pháp luật."]},"blld-45_83":{"tldr":"Trong 90 ngày trước khi thỏa ước hết hạn, các bên có thể thương lượng kéo dài thời hạn hoặc ký thỏa ước mới; thỏa ước cũ tiếp tục thực hiện không quá 90 ngày khi vẫn đang thương lượng.","points":["Trong thời hạn 90 ngày trước ngày hết hạn, các bên có thể thương lượng kéo dài thời hạn hoặc ký kết thỏa ước mới.","Trường hợp thỏa thuận kéo dài thời hạn thì phải lấy ý kiến theo Điều 76.","Khi hết hạn mà các bên vẫn tiếp tục thương lượng thì thỏa ước cũ tiếp tục thực hiện không quá 90 ngày kể từ ngày hết hạn, trừ trường hợp các bên có thỏa thuận khác."]},"blld-45_84":{"tldr":"Khi thỏa ước ngành hoặc nhiều doanh nghiệp có phạm vi áp dụng chiếm trên 75% người lao động hoặc trên 75% doanh nghiệp cùng ngành, nghề, lĩnh vực trong khu công nghiệp, khu kinh tế, khu chế xuất, khu công nghệ cao thì có thể đề nghị mở rộng phạm vi áp dụng.","points":["Người sử dụng lao động hoặc tổ chức đại diện người lao động đề nghị cơ quan nhà nước có thẩm quyền quyết định mở rộng phạm vi áp dụng một phần hoặc toàn bộ thỏa ước cho các doanh nghiệp cùng ngành, nghề, lĩnh vực trong các khu nêu trên.","Chính phủ quy định chi tiết khoản 1; quy định trình tự, thủ tục và thẩm quyền quyết định mở rộng phạm vi áp dụng."]},"blld-45_85":{"tldr":"Doanh nghiệp có thể gia nhập hoặc rút khỏi thỏa ước ngành, thỏa ước nhiều doanh nghiệp khi có sự đồng thuận của tất cả người sử dụng lao động và tổ chức đại diện người lao động là thành viên của thỏa ước.","points":["Gia nhập khi có sự đồng thuận của tất cả các thành viên thỏa ước, trừ trường hợp quy định tại khoản 1 Điều 84.","Rút khỏi khi có sự đồng thuận của tất cả các thành viên thỏa ước, trừ trường hợp có khó khăn đặc biệt trong hoạt động sản xuất, kinh doanh.","Chính phủ quy định chi tiết Điều này."]},"blld-45_86":{"tldr":"Thỏa ước vô hiệu từng phần khi một hoặc một số nội dung vi phạm pháp luật; vô hiệu toàn bộ trong các trường hợp luật định.","points":["Vô hiệu từng phần khi một hoặc một số nội dung vi phạm pháp luật.","Vô hiệu toàn bộ khi: toàn bộ nội dung vi phạm pháp luật; người ký kết không đúng thẩm quyền; không tuân thủ đúng quy trình thương lượng, ký kết."]},"blld-45_88":{"tldr":"Khi thỏa ước bị tuyên bố vô hiệu thì quyền, nghĩa vụ, lợi ích các bên tương ứng với phần hoặc toàn bộ bị vô hiệu được giải quyết theo quy định của pháp luật và các thỏa thuận hợp pháp trong hợp đồng lao động.","points":[]},"blld-45_90":{"tldr":"Tiền lương là số tiền người sử dụng lao động trả cho người lao động theo thỏa thuận, gồm mức lương theo công việc hoặc chức danh, phụ cấp lương và các khoản bổ sung khác.","points":["Mức lương theo công việc hoặc chức danh không được thấp hơn mức lương tối thiểu.","Phải bảo đảm trả lương bình đẳng, không phân biệt giới tính đối với người lao động làm công việc có giá trị như nhau."]},"blld-45_91":{"tldr":"Mức lương tối thiểu là mức lương thấp nhất trả cho người lao động làm công việc giản đơn nhất trong điều kiện lao động bình thường, được xác lập theo vùng và ấn định theo tháng, giờ.","points":["Nhằm bảo đảm mức sống tối thiểu của người lao động và gia đình họ, phù hợp điều kiện phát triển kinh tế - xã hội.","Được xác lập theo vùng, ấn định theo tháng, giờ.","Được điều chỉnh dựa trên mức sống tối thiểu, tương quan với mức lương thị trường, chỉ số giá tiêu dùng, tốc độ tăng trưởng kinh tế, cung cầu lao động, việc làm và thất nghiệp, năng suất lao động, khả năng chi trả của doanh nghiệp.","Chính phủ quyết định và công bố mức lương tối thiểu trên cơ sở khuyến nghị của Hội đồng tiền lương quốc gia."]},"blld-45_92":{"tldr":"Hội đồng tiền lương quốc gia là cơ quan tư vấn cho Chính phủ về mức lương tối thiểu và chính sách tiền lương, do Thủ tướng Chính phủ thành lập.","points":["Thành viên gồm đại diện Bộ Lao động - Thương binh và Xã hội, Tổng Liên đoàn Lao động Việt Nam, một số tổ chức đại diện người sử dụng lao động ở trung ương và chuyên gia độc lập.","Chính phủ quy định chức năng, nhiệm vụ, cơ cấu tổ chức và hoạt động của Hội đồng."]},"blld-45_93":{"tldr":"Người sử dụng lao động phải xây dựng thang lương, bảng lương và định mức lao động làm cơ sở tuyển dụng, sử dụng lao động, thỏa thuận mức lương và trả lương.","points":["Mức lao động phải là mức trung bình bảo đảm số đông người lao động thực hiện được mà không phải kéo dài thời giờ làm việc bình thường và phải được áp dụng thử trước khi ban hành chính thức.","Phải tham khảo ý kiến tổ chức đại diện người lao động tại cơ sở (nơi có tổ chức này) khi xây dựng.","Thang lương, bảng lương và mức lao động phải được công bố công khai tại nơi làm việc trước khi thực hiện."]},"blld-45_94":{"tldr":"Người sử dụng lao động phải trả lương trực tiếp, đầy đủ, đúng hạn và không được hạn chế hay can thiệp vào quyền tự quyết chi tiêu lương của người lao động.","points":["Trường hợp người lao động không thể nhận lương trực tiếp thì có thể trả cho người được người lao động ủy quyền hợp pháp.","Không được ép buộc người lao động chi tiêu lương vào việc mua hàng hóa, sử dụng dịch vụ của người sử dụng lao động hoặc đơn vị khác do người sử dụng lao động chỉ định."]},"blld-45_95":{"tldr":"Người sử dụng lao động trả lương căn cứ tiền lương đã thỏa thuận, năng suất và chất lượng công việc; trả bằng tiền Đồng Việt Nam (người nước ngoài có thể bằng ngoại tệ).","points":["Tiền lương ghi trong hợp đồng và trả cho người lao động bằng tiền Đồng Việt Nam; người nước ngoài tại Việt Nam có thể bằng ngoại tệ.","Mỗi lần trả lương phải thông báo bảng kê ghi rõ tiền lương, tiền lương làm thêm giờ, tiền lương làm việc vào ban đêm, nội dung và số tiền bị khấu trừ (nếu có)."]},"blld-45_96":{"tldr":"Hai bên thỏa thuận hình thức trả lương theo thời gian, sản phẩm hoặc khoán; lương trả bằng tiền mặt hoặc qua tài khoản cá nhân tại ngân hàng.","points":["Hình thức trả lương theo thời gian, sản phẩm hoặc khoán do hai bên thỏa thuận.","Trường hợp trả qua tài khoản ngân hàng thì người sử dụng lao động phải trả các loại phí liên quan đến việc mở tài khoản và chuyển tiền lương.","Chính phủ quy định chi tiết Điều này."]},"blld-45_97":{"tldr":"Kỳ hạn trả lương tùy theo hình thức hưởng lương; trường hợp bất khả kháng không được chậm quá 30 ngày và chậm từ 15 ngày trở lên phải đền bù lãi.","points":["Hưởng lương theo giờ, ngày, tuần được trả sau giờ, ngày, tuần làm việc hoặc trả gộp nhưng không quá 15 ngày phải trả gộp một lần.","Hưởng lương theo tháng được trả một tháng một lần hoặc nửa tháng một lần, ấn định vào thời điểm có tính chu kỳ.","Hưởng lương theo sản phẩm, khoán làm nhiều tháng thì hằng tháng được tạm ứng theo khối lượng công việc đã làm.","Trường hợp bất khả kháng không trả lương đúng hạn thì không được chậm quá 30 ngày; chậm từ 15 ngày trở lên phải đền bù khoản tiền ít nhất bằng số tiền lãi tính theo lãi suất huy động tiền gửi có kỳ hạn 01 tháng do ngân hàng nơi mở tài khoản trả lương công bố tại thời điểm trả lương."]},"blld-45_98":{"tldr":"Tiền lương làm thêm giờ tính theo tỷ lệ: ngày thường ít nhất 150%, ngày nghỉ tuần ít nhất 200%, ngày lễ tết ít nhất 300%; làm ban đêm được trả thêm ít nhất 30%.","points":["Làm thêm vào ngày thường ít nhất bằng 150%; ngày nghỉ hằng tuần ít nhất 200%; ngày nghỉ lễ, tết, ngày nghỉ có hưởng lương ít nhất 300% (chưa kể tiền lương ngày lễ, tết, ngày nghỉ có hưởng lương đối với người hưởng lương ngày).","Làm việc vào ban đêm được trả thêm ít nhất bằng 30% tiền lương theo đơn giá hoặc tiền lương thực trả của ngày làm việc bình thường.","Làm thêm giờ vào ban đêm còn được trả thêm 20% tiền lương theo công việc làm vào ban ngày của ngày làm việc bình thường, ngày nghỉ hằng tuần hoặc ngày nghỉ lễ, tết.","Chính phủ quy định chi tiết Điều này."]},"blld-45_99":{"tldr":"Tiền lương ngừng việc được trả tùy theo nguyên nhân: lỗi người sử dụng lao động trả đủ lương, lỗi người lao động không được trả lương, do nguyên nhân khách quan thì thỏa thuận không thấp hơn mức lương tối thiểu.","points":["Do lỗi người sử dụng lao động thì người lao động được trả đủ tiền lương theo hợp đồng.","Do lỗi người lao động thì người đó không được trả lương; người lao động khác cùng đơn vị phải ngừng việc được trả theo thỏa thuận nhưng không thấp hơn mức lương tối thiểu.","Do sự cố điện, nước không do lỗi người sử dụng lao động, thiên tai, hỏa hoạn, dịch bệnh nguy hiểm, địch họa, di dời theo yêu cầu cơ quan nhà nước hoặc lý do kinh tế thì hai bên thỏa thuận.","Ngừng việc từ 14 ngày làm việc trở xuống thì tiền lương ngừng việc thỏa thuận không thấp hơn mức lương tối thiểu.","Ngừng việc trên 14 ngày làm việc thì do hai bên thỏa thuận nhưng phải bảo đảm 14 ngày đầu tiên không thấp hơn mức lương tối thiểu."]},"blld-45_100":{"tldr":"Nơi sử dụng người cai thầu hoặc trung gian tương tự thì người sử dụng lao động là chủ chính phải có danh sách và bảo đảm tuân thủ pháp luật về trả lương, an toàn, vệ sinh lao động.","points":["Chủ chính phải có danh sách, địa chỉ của người cai thầu/trung gian kèm danh sách người lao động làm việc với họ và bảo đảm họ tuân thủ pháp luật về trả lương, an toàn, vệ sinh lao động.","Nếu người cai thầu/trung gian không trả lương hoặc trả không đầy đủ thì chủ chính phải chịu trách nhiệm trả lương và bảo đảm quyền lợi.","Trường hợp này chủ chính có quyền yêu cầu người cai thầu/trung gian đền bù hoặc yêu cầu cơ quan nhà nước giải quyết tranh chấp."]},"blld-45_101":{"tldr":"Người lao động được tạm ứng tiền lương theo điều kiện hai bên thỏa thuận và không bị tính lãi; có quy định tạm ứng khi thực hiện nghĩa vụ công dân và khi nghỉ hằng năm.","points":["Tạm ứng theo điều kiện hai bên thỏa thuận và không bị tính lãi.","Thực hiện nghĩa vụ công dân từ 01 tuần trở lên được tạm ứng tương ứng số ngày nghỉ nhưng tối đa không quá 01 tháng tiền lương theo hợp đồng và phải hoàn trả; người nhập ngũ theo Luật Nghĩa vụ quân sự thì không được tạm ứng.","Khi nghỉ hằng năm, người lao động được tạm ứng một khoản tiền ít nhất bằng tiền lương của những ngày nghỉ."]},"blld-45_102":{"tldr":"Người sử dụng lao động chỉ được khấu trừ tiền lương để bồi thường thiệt hại do làm hư hỏng dụng cụ, thiết bị, tài sản theo Điều 129; mức khấu trừ hằng tháng không quá 30% tiền lương thực trả sau khi trích nộp các khoản bắt buộc.","points":["Chỉ được khấu trừ để bồi thường thiệt hại do làm hư hỏng dụng cụ, thiết bị, tài sản theo Điều 129.","Người lao động có quyền được biết lý do khấu trừ tiền lương.","Mức khấu trừ hằng tháng không quá 30% tiền lương thực trả hằng tháng sau khi trích nộp bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp, thuế thu nhập cá nhân."]},"blld-45_104":{"tldr":"Thưởng là tiền, tài sản hoặc hình thức khác mà người sử dụng lao động thưởng cho người lao động căn cứ kết quả sản xuất, kinh doanh và mức độ hoàn thành công việc.","points":["Quy chế thưởng do người sử dụng lao động quyết định và công bố công khai tại nơi làm việc sau khi tham khảo ý kiến tổ chức đại diện người lao động tại cơ sở (nơi có tổ chức này)."]},"blld-45_105":{"tldr":"Thời giờ làm việc bình thường không quá 08 giờ trong 01 ngày và không quá 48 giờ trong 01 tuần; theo tuần thì không quá 10 giờ/ngày và 48 giờ/tuần.","points":["Người sử dụng lao động có quyền quy định thời giờ làm việc theo ngày hoặc tuần nhưng phải thông báo; theo tuần thì không quá 10 giờ trong 01 ngày và 48 giờ trong 01 tuần.","Nhà nước khuyến khích thực hiện tuần làm việc 40 giờ.","Phải bảo đảm giới hạn thời gian làm việc tiếp xúc với yếu tố nguy hiểm, có hại đúng quy chuẩn kỹ thuật quốc gia và pháp luật liên quan."]},"blld-45_107":{"tldr":"Làm thêm giờ là thời gian ngoài giờ làm việc bình thường; chỉ được sử dụng khi có sự đồng ý của người lao động và không quá các giới hạn giờ luật định.","points":["Phải được sự đồng ý của người lao động.
