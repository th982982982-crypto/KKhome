g chưa thành niên chỉ được làm công việc phù hợp với sức khỏe để bảo đảm sự phát triển thể lực, trí lực, nhân cách."},{"k":"p","t":"2. Người sử dụng lao động khi sử dụng lao động chưa thành niên có trách nhiệm quan tâm chăm sóc người lao động về các mặt lao động, sức khỏe, học tập trong quá trình lao động."},{"k":"p","t":"3. Khi sử dụng lao động chưa thành niên, người sử dụng lao động phải có sự đồng ý của cha, mẹ hoặc người giám hộ; lập sổ theo dõi riêng, ghi đầy đủ họ tên, ngày tháng năm sinh, công việc đang làm, kết quả những lần kiểm tra sức khỏe định kỳ và xuất trình khi cơ quan nhà nước có thẩm quyền yêu cầu."},{"k":"p","t":"4. Người sử dụng lao động phải tạo cơ hội để lao động chưa thành niên được học văn hóa, giáo dục nghề nghiệp, đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề."}]},{"id":"blld-45_145","no":145,"code":"Điều 145","title":"Điều 145. Sử dụng người chưa đủ 15 tuổi làm việc","shortTitle":"Sử dụng người chưa đủ 15 tuổi làm việc","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Khi sử dụng người chưa đủ 15 tuổi làm việc, người sử dụng lao động phải tuân theo quy định sau đây:"},{"k":"p","t":"a) Phải giao kết hợp đồng lao động bằng văn bản với người chưa đủ 15 tuổi và người đại diện theo pháp luật của người đó;"},{"k":"p","t":"b) Bố trí giờ làm việc không ảnh hưởng đến thời gian học tập của người chưa đủ 15 tuổi;"},{"k":"p","t":"c) Phải có giấy khám sức khỏe của cơ sở khám bệnh, chữa bệnh có thẩm quyền xác nhận sức khỏe của người chưa đủ 15 tuổi phù hợp với công việc và tổ chức kiểm tra sức khỏe định kỳ ít nhất một lần trong 06 tháng;"},{"k":"p","t":"d) Bảo đảm điều kiện làm việc, an toàn, vệ sinh lao động phù hợp với lứa tuổi."},{"k":"p","t":"2. Người sử dụng lao động chỉ được tuyển dụng và sử dụng người từ đủ 13 tuổi đến chưa đủ 15 tuổi vào làm các công việc nhẹ theo quy định tại khoản 3 Điều 143 của Bộ luật này."},{"k":"p","t":"3. Người sử dụng lao động không được tuyển dụng và sử dụng người chưa đủ 13 tuổi làm việc, trừ các công việc nghệ thuật, thể dục, thể thao nhưng không làm tổn hại đến sự phát triển thể lực, trí lực, nhân cách của người chưa đủ 13 tuổi và phải có sự đồng ý của cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh."},{"k":"p","t":"4. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết Điều này."}]},{"id":"blld-45_146","no":146,"code":"Điều 146","title":"Điều 146. Thời giờ làm việc của người chưa thành niên","shortTitle":"Thời giờ làm việc của người chưa thành niên","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thời giờ làm việc của người chưa đủ 15 tuổi không được quá 04 giờ trong 01 ngày và 20 giờ trong 01 tuần; không được làm thêm giờ, làm việc vào ban đêm."},{"k":"p","t":"2. Thời giờ làm việc của người từ đủ 15 tuổi đến chưa đủ 18 tuổi không được quá 08 giờ trong 01 ngày và 40 giờ trong 01 tuần. Người từ đủ 15 tuổi đến chưa đủ 18 tuổi có thể được làm thêm giờ, làm việc vào ban đêm trong một số nghề, công việc theo danh mục do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành."}]},{"id":"blld-45_147","no":147,"code":"Điều 147","title":"Điều 147. Công việc và nơi làm việc cấm sử dụng người lao động từ đủ 15 tuổi đến chưa đủ 18 tuổi","shortTitle":"Công việc và nơi làm việc cấm sử dụng người lao động từ đủ 15 tuổi đến chưa đủ 18 tuổi","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Cấm sử dụng người lao động từ đủ 15 tuổi đến chưa đủ 18 tuổi làm các công việc sau đây:"},{"k":"p","t":"a) Mang, vác, nâng các vật nặng vượt quá thể trạng của người chưa thành niên;"},{"k":"p","t":"b) Sản xuất, kinh doanh cồn, rượu, bia, thuốc lá, chất tác động đến tinh thần hoặc chất gây nghiện khác;"},{"k":"p","t":"c) Sản xuất, sử dụng hoặc vận chuyển hóa chất, khí gas, chất nổ;"},{"k":"p","t":"d) Bảo trì, bảo dưỡng thiết bị, máy móc;"},{"k":"p","t":"đ) Phá dỡ các công trình xây dựng;"},{"k":"p","t":"e) Nấu, thổi, đúc, cán, dập, hàn kim loại;"},{"k":"p","t":"g) Lặn biển, đánh bắt thủy, hải sản xa bờ;"},{"k":"p","t":"h) Công việc khác gây tổn hại đến sự phát triển thể lực, trí lực, nhân cách của người chưa thành niên."},{"k":"p","t":"2. Cấm sử dụng người lao động từ đủ 15 tuổi đến chưa đủ 18 tuổi làm việc ở các nơi sau đây:"},{"k":"p","t":"a) Dưới nước, dưới lòng đất, trong hang động, trong đường hầm;"},{"k":"p","t":"b) Công trường xây dựng;"},{"k":"p","t":"c) Cơ sở giết mổ gia súc;"},{"k":"p","t":"d) Sòng bạc, quán bar, vũ trường, phòng hát karaoke, khách sạn, nhà nghỉ, cơ sở tắm hơi, cơ sở xoa bóp; điểm kinh doanh xổ số, dịch vụ trò chơi điện tử;"},{"k":"p","t":"đ) Nơi làm việc khác gây tổn hại đến sự phát triển thể lực, trí lực, nhân cách của người chưa thành niên."},{"k":"p","t":"3. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định danh mục tại điểm h khoản 1 và điểm đ khoản 2 Điều này."},{"k":"p","t":"NGƯỜI LAO ĐỘNG CAO TUỔI"}]},{"id":"blld-45_148","no":148,"code":"Điều 148","title":"Điều 148. Người lao động cao tuổi","shortTitle":"Người lao động cao tuổi","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động cao tuổi là người tiếp tục lao động sau độ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật này."},{"k":"p","t":"2. Người lao động cao tuổi có quyền thỏa thuận với người sử dụng lao động về việc rút ngắn thời giờ làm việc hằng ngày hoặc áp dụng chế độ làm việc không trọn thời gian."},{"k":"p","t":"3. Nhà nước khuyến khích sử dụng người lao động cao tuổi làm việc phù hợp với sức khỏe để bảo đảm quyền lao động và sử dụng hiệu quả nguồn nhân lực."}]},{"id":"blld-45_149","no":149,"code":"Điều 149","title":"Điều 149. Sử dụng người lao động cao tuổi","shortTitle":"Sử dụng người lao động cao tuổi","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Khi sử dụng người lao động cao tuổi, hai bên có thể thỏa thuận giao kết nhiều lần hợp đồng lao động xác định thời hạn."},{"k":"p","t":"2. Khi người lao động cao tuổi đang hưởng lương hưu theo quy định của Luật Bảo hiểm xã hội mà làm việc theo hợp đồng lao động mới thì ngoài quyền lợi đang hưởng theo chế độ hưu trí, người lao động cao tuổi được hưởng tiền lương và các quyền lợi khác theo quy định của pháp luật, hợp đồng lao động."},{"k":"p","t":"3. Không được sử dụng người lao động cao tuổi làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm có ảnh hưởng xấu tới sức khỏe người lao động cao tuổi, trừ trường hợp bảo đảm các điều kiện làm việc an toàn."},{"k":"p","t":"4. Người sử dụng lao động có trách nhiệm quan tâm chăm sóc sức khỏe của người lao động cao tuổi tại nơi làm việc."},{"k":"p","t":"NGƯỜI LAO ĐỘNG VIỆT NAM ĐI LÀM VIỆC Ở NƯỚC NGOÀI,LAO ĐỘNG CHO CÁC TỔ CHỨC, CÁ NHÂN NƯỚC NGOÀI TẠI VIỆT NAM,LAO ĐỘNG LÀ NGƯỜI NƯỚC NGOÀI LÀM VIỆC TẠI VIỆT NAM"}]},{"id":"blld-45_150","no":150,"code":"Điều 150","title":"Điều 150. Người lao động Việt Nam đi làm việc ở nước ngoài, lao động cho các tổ chức, cá nhân nước ngoài tại Việt Nam","shortTitle":"Người lao động Việt Nam đi làm việc ở nước ngoài, lao động cho các tổ chức, cá nhân nước ngoài tại Việt Nam","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Nhà nước khuyến khích doanh nghiệp, cơ quan, tổ chức, cá nhân tìm kiếm và mở rộng thị trường lao động để đưa người lao động Việt Nam đi làm việc ở nước ngoài."},{"k":"p","t":"Người lao động Việt Nam đi làm việc ở nước ngoài phải tuân theo quy định của pháp luật Việt Nam, pháp luật nước sở tại, trừ trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác."},{"k":"p","t":"2. Công dân Việt Nam làm việc cho các tổ chức nước ngoài tại Việt Nam, trong khu công nghiệp, khu kinh tế, khu chế xuất, khu công nghệ cao hoặc làm việc cho cá nhân là công dân nước ngoài tại Việt Nam phải tuân theo pháp luật Việt Nam và được pháp luật bảo vệ."},{"k":"p","t":"3. Chính phủ quy định chi tiết việc tuyển dụng, quản lý lao động Việt Nam làm việc cho các tổ chức, cá nhân nước ngoài tại Việt Nam."}]},{"id":"blld-45_151","no":151,"code":"Điều 151","title":"Điều 151. Điều kiện người lao động nước ngoài làm việc tại Việt Nam","shortTitle":"Điều kiện người lao động nước ngoài làm việc tại Việt Nam","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động nước ngoài làm việc tại Việt Nam là người có quốc tịch nước ngoài và phải đáp ứng các điều kiện sau đây:"},{"k":"p","t":"a) Đủ 18 tuổi trở lên và có năng lực hành vi dân sự đầy đủ;"},{"k":"p","t":"b) Có trình độ chuyên môn, kỹ thuật, tay nghề, kinh nghiệm làm việc; có đủ sức khỏe theo quy định của Bộ trưởng Bộ Y tế;"},{"k":"p","t":"c) Không phải là người đang trong thời gian chấp hành hình phạt hoặc chưa được xóa án tích hoặc đang trong thời gian bị truy cứu trách nhiệm hình sự theo quy định của pháp luật nước ngoài hoặc pháp luật Việt Nam;"},{"k":"p","t":"d) Có giấy phép lao động do cơ quan nhà nước có thẩm quyền của Việt Nam cấp, trừ trường hợp quy định tại Điều 154 của Bộ luật này."},{"k":"p","t":"2. Thời hạn của hợp đồng lao động đối với người lao động nước ngoài làm việc tại Việt Nam không được vượt quá thời hạn của Giấy phép lao động. Khi sử dụng người lao động nước ngoài làm việc tại Việt Nam, hai bên có thể thỏa thuận giao kết nhiều lần hợp đồng lao động xác định thời hạn."},{"k":"p","t":"3. Người lao động nước ngoài làm việc tại Việt Nam phải tuân theo pháp luật lao động Việt Nam và được pháp luật Việt Nam bảo vệ, trừ trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác."}]},{"id":"blld-45_152","no":152,"code":"Điều 152","title":"Điều 152. Điều kiện tuyển dụng, sử dụng người lao động nước ngoài làm việc tại Việt Nam","shortTitle":"Điều kiện tuyển dụng, sử dụng người lao động nước ngoài làm việc tại Việt Nam","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp, cơ quan, tổ chức, cá nhân, nhà thầu chỉ được tuyển dụng người lao động nước ngoài vào làm vị trí công việc quản lý, điều hành, chuyên gia và lao động kỹ thuật mà người lao động Việt Nam chưa đáp ứng được theo nhu cầu sản xuất, kinh doanh."},{"k":"p","t":"2. Doanh nghiệp, cơ quan, tổ chức, cá nhân trước khi tuyển dụng người lao động nước ngoài vào làm việc tại Việt Nam phải giải trình nhu cầu sử dụng lao động và được sự chấp thuận bằng văn bản của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"3. Nhà thầu trước khi tuyển và sử dụng lao động nước ngoài làm việc tại Việt Nam phải kê khai cụ thể các vị trí công việc, trình độ chuyên môn, kỹ thuật, kinh nghiệm làm việc, thời gian làm việc cần sử dụng lao động nước ngoài để thực hiện gói thầu và được sự chấp thuận bằng văn bản của cơ quan nhà nước có thẩm quyền."}]},{"id":"blld-45_153","no":153,"code":"Điều 153","title":"Điều 153. Trách nhiệm của người sử dụng lao động và người lao động nước ngoài","shortTitle":"Trách nhiệm của người sử dụng lao động và người lao động nước ngoài","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động nước ngoài phải xuất trình giấy phép lao động khi có yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Người lao động nước ngoài làm việc tại Việt Nam không có giấy phép lao động sẽ bị buộc xuất cảnh hoặc trục xuất theo quy định của pháp luật về nhập cảnh, xuất cảnh, quá cảnh, cư trú của người nước ngoài tại Việt Nam."},{"k":"p","t":"3. Người sử dụng lao động sử dụng người lao động nước ngoài làm việc cho mình mà không có giấy phép lao động thì bị xử lý theo quy định của pháp luật."}]},{"id":"blld-45_154","no":154,"code":"Điều 154","title":"Điều 154. Người lao động nước ngoài làm việc tại Việt Nam không thuộc diện cấp giấy phép lao động","shortTitle":"Người lao động nước ngoài làm việc tại Việt Nam không thuộc diện cấp giấy phép lao động","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Là chủ sở hữu hoặc thành viên góp vốn của công ty trách nhiệm hữu hạn có giá trị góp vốn theo quy định của Chính phủ."},{"k":"p","t":"2. Là Chủ tịch Hội đồng quản trị hoặc thành viên Hội đồng quản trị của công ty cổ phần có giá trị góp vốn theo quy định của Chính phủ."},{"k":"p","t":"3. Là Trưởng văn phòng đại diện, dự án hoặc chịu trách nhiệm chính về hoạt động của tổ chức quốc tế, tổ chức phi chính phủ nước ngoài tại Việt Nam."},{"k":"p","t":"4. Vào Việt Nam với thời hạn dưới 03 tháng để thực hiện chào bán dịch vụ."},{"k":"p","t":"5. Vào Việt Nam với thời hạn dưới 03 tháng để xử lý sự cố, tình huống kỹ thuật, công nghệ phức tạp nảy sinh làm ảnh hưởng hoặc có nguy cơ ảnh hưởng tới sản xuất, kinh doanh mà các chuyên gia Việt Nam và các chuyên gia nước ngoài hiện đang ở Việt Nam không xử lý được."},{"k":"p","t":"6. Là luật sư nước ngoài đã được cấp Giấy phép hành nghề luật sư tại Việt Nam theo quy định của Luật Luật sư."},{"k":"p","t":"7. Trường hợp theo quy định của điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"8. Người nước ngoài kết hôn với người Việt Nam và sinh sống trên lãnh thổ Việt Nam."},{"k":"p","t":"9. Trường hợp khác theo quy định của Chính phủ."}]},{"id":"blld-45_155","no":155,"code":"Điều 155","title":"Điều 155. Thời hạn của giấy phép lao động","shortTitle":"Thời hạn của giấy phép lao động","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Thời hạn của giấy phép lao động tối đa là 02 năm, trường hợp gia hạn thì chỉ được gia hạn một lần với thời hạn tối đa là 02 năm."}]},{"id":"blld-45_156","no":156,"code":"Điều 156","title":"Điều 156. Các trường hợp giấy phép lao động hết hiệu lực","shortTitle":"Các trường hợp giấy phép lao động hết hiệu lực","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Giấy phép lao động hết thời hạn."},{"k":"p","t":"2. Chấm dứt hợp đồng lao động."},{"k":"p","t":"3. Nội dung của hợp đồng lao động không đúng với nội dung của giấy phép lao động đã được cấp."},{"k":"p","t":"4. Làm việc không đúng với nội dung trong giấy phép lao động đã được cấp."},{"k":"p","t":"5. Hợp đồng trong các lĩnh vực là cơ sở phát sinh giấy phép lao động hết thời hạn hoặc chấm dứt."},{"k":"p","t":"6. Có văn bản thông báo của phía nước ngoài thôi cử lao động là người nước ngoài làm việc tại Việt Nam."},{"k":"p","t":"7. Doanh nghiệp, tổ chức, đối tác phía Việt Nam hoặc tổ chức nước ngoài tại Việt Nam sử dụng lao động là người nước ngoài chấm dứt hoạt động."},{"k":"p","t":"8. Giấy phép lao động bị thu hồi."}]},{"id":"blld-45_157","no":157,"code":"Điều 157","title":"Điều 157. Cấp, cấp lại, gia hạn, thu hồi giấy phép lao động, giấy xác nhận không thuộc diện cấp giấy phép lao động","shortTitle":"Cấp, cấp lại, gia hạn, thu hồi giấy phép lao động, giấy xác nhận không thuộc diện cấp giấy phép lao động","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Chính phủ quy định điều kiện, trình tự, thủ tục cấp, cấp lại, gia hạn, thu hồi giấy phép lao động và giấy xác nhận không thuộc diện cấp giấy phép lao động đối với người lao động nước ngoài làm việc tại Việt Nam."},{"k":"p","t":"LAO ĐỘNG LÀ NGƯỜI KHUYẾT TẬT"}]},{"id":"blld-45_158","no":158,"code":"Điều 158","title":"Điều 158. Chính sách của Nhà nước đối với lao động là người khuyết tật","shortTitle":"Chính sách của Nhà nước đối với lao động là người khuyết tật","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"Nhà nước bảo trợ quyền lao động, tự tạo việc làm của người lao động là người khuyết tật; có chính sách khuyến khích, ưu đãi phù hợp đối với người sử dụng lao động trong tạo việc làm và nhận người lao động là người khuyết tật vào làm việc theo quy định của pháp luật về người khuyết tật."}]},{"id":"blld-45_159","no":159,"code":"Điều 159","title":"Điều 159. Sử dụng lao động là người khuyết tật","shortTitle":"Sử dụng lao động là người khuyết tật","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải bảo đảm về điều kiện lao động, công cụ lao động, an toàn, vệ sinh lao động và tổ chức khám sức khỏe định kỳ phù hợp với người lao động là người khuyết tật."},{"k":"p","t":"2. Người sử dụng lao động phải tham khảo ý kiến của người lao động là người khuyết tật khi quyết định những vấn đề liên quan đến quyền và lợi ích của họ."}]},{"id":"blld-45_160","no":160,"code":"Điều 160","title":"Điều 160. Các hành vi bị nghiêm cấm khi sử dụng lao động là người khuyết tật","shortTitle":"Các hành vi bị nghiêm cấm khi sử dụng lao động là người khuyết tật","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Sử dụng người lao động là người khuyết tật nhẹ suy giảm khả năng lao động từ 51% trở lên, khuyết tật nặng hoặc khuyết tật đặc biệt nặng làm thêm giờ, làm việc vào ban đêm, trừ trường hợp người lao động là người khuyết tật đồng ý."},{"k":"p","t":"2. Sử dụng người lao động là người khuyết tật làm công việc nặng nhọc, độc hại, nguy hiểm theo danh mục do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành mà không có sự đồng ý của người khuyết tật sau khi đã được người sử dụng lao động cung cấp đầy đủ thông tin về công việc đó."},{"k":"p","t":"LAO ĐỘNG LÀ NGƯỜI GIÚP VIỆC GIA ĐÌNH"}]},{"id":"blld-45_161","no":161,"code":"Điều 161","title":"Điều 161. Lao động là người giúp việc gia đình","shortTitle":"Lao động là người giúp việc gia đình","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Lao động là người giúp việc gia đình là người lao động làm thường xuyên các công việc trong gia đình của một hoặc nhiều hộ gia đình."},{"k":"p","t":"Các công việc trong gia đình bao gồm công việc nội trợ, quản gia, chăm sóc trẻ em, chăm sóc người bệnh, chăm sóc người già, lái xe, làm vườn và các công việc khác cho hộ gia đình nhưng không liên quan đến hoạt động thương mại."},{"k":"p","t":"2. Chính phủ quy định về lao động là người giúp việc gia đình."}]},{"id":"blld-45_162","no":162,"code":"Điều 162","title":"Điều 162. Hợp đồng lao động đối với lao động là người giúp việc gia đình","shortTitle":"Hợp đồng lao động đối với lao động là người giúp việc gia đình","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải giao kết hợp đồng lao động bằng văn bản với lao động là người giúp việc gia đình."},{"k":"p","t":"2. Thời hạn của hợp đồng lao động đối với lao động là người giúp việc gia đình do hai bên thỏa thuận. Một bên có quyền đơn phương chấm dứt hợp đồng lao động bất kỳ khi nào nhưng phải báo trước ít nhất 15 ngày."},{"k":"p","t":"3. Hai bên thỏa thuận trong hợp đồng lao động về hình thức trả lương, kỳ hạn trả lương, thời giờ làm việc hằng ngày, chỗ ở."}]},{"id":"blld-45_163","no":163,"code":"Điều 163","title":"Điều 163. Nghĩa vụ của người sử dụng lao động khi sử dụng lao động là người giúp việc gia đình","shortTitle":"Nghĩa vụ của người sử dụng lao động khi sử dụng lao động là người giúp việc gia đình","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Thực hiện đầy đủ thỏa thuận đã giao kết trong hợp đồng lao động."},{"k":"p","t":"2. Trả cho người giúp việc gia đình khoản tiền bảo hiểm xã hội, bảo hiểm y tế theo quy định của pháp luật để người lao động chủ động tham gia bảo hiểm xã hội, bảo hiểm y tế."},{"k":"p","t":"3. Tôn trọng danh dự, nhân phẩm của người giúp việc gia đình."},{"k":"p","t":"4. Bố trí chỗ ăn, ở hợp vệ sinh cho người giúp việc gia đình nếu có thỏa thuận."},{"k":"p","t":"5. Tạo cơ hội cho người giúp việc gia đình được tham gia học văn hóa, giáo dục nghề nghiệp."},{"k":"p","t":"6. Trả tiền tàu xe đi đường khi người giúp việc gia đình thôi việc về nơi cư trú, trừ trường hợp người giúp việc gia đình chấm dứt hợp đồng lao động trước thời hạn."}]},{"id":"blld-45_164","no":164,"code":"Điều 164","title":"Điều 164. Nghĩa vụ của lao động là người giúp việc gia đình","shortTitle":"Nghĩa vụ của lao động là người giúp việc gia đình","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Thực hiện đầy đủ thỏa thuận đã giao kết trong hợp đồng lao động."},{"k":"p","t":"2. Phải bồi thường theo thỏa thuận hoặc theo quy định của pháp luật nếu làm hỏng, mất tài sản của người sử dụng lao động."},{"k":"p","t":"3. Thông báo kịp thời với người sử dụng lao động về khả năng, nguy cơ gây tai nạn, đe dọa an toàn, sức khỏe, tính mạng, tài sản của gia đình người sử dụng lao động và bản thân."},{"k":"p","t":"4. Tố cáo với cơ quan có thẩm quyền nếu người sử dụng lao động có hành vi ngược đãi, quấy rối tình dục, cưỡng bức lao động hoặc có hành vi khác vi phạm pháp luật."}]},{"id":"blld-45_165","no":165,"code":"Điều 165","title":"Điều 165. Các hành vi bị nghiêm cấm đối với người sử dụng lao động","shortTitle":"Các hành vi bị nghiêm cấm đối với người sử dụng lao động","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Ngược đãi, quấy rối tình dục, cưỡng bức lao động, dùng vũ lực đối với lao động là người giúp việc gia đình."},{"k":"p","t":"2. Giao việc cho người giúp việc gia đình không theo hợp đồng lao động."},{"k":"p","t":"3. Giữ giấy tờ tùy thân của người lao động."},{"k":"p","t":"MỘT SỐ LAO ĐỘNG KHÁC"}]},{"id":"blld-45_166","no":166,"code":"Điều 166","title":"Điều 166. Người lao động làm việc trong lĩnh vực nghệ thuật, thể dục, thể thao, hàng hải, hàng không","shortTitle":"Người lao động làm việc trong lĩnh vực nghệ thuật, thể dục, thể thao, hàng hải, hàng không","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 6","level":1,"content":[{"k":"p","t":"Người lao động làm việc trong lĩnh vực nghệ thuật, thể dục, thể thao, hàng hải, hàng không được áp dụng một số chế độ phù hợp về đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề; hợp đồng lao động; tiền lương, tiền thưởng; thời giờ làm việc, thời giờ nghỉ ngơi; an toàn, vệ sinh lao động theo quy định của Chính phủ."}]},{"id":"blld-45_167","no":167,"code":"Điều 167","title":"Điều 167. Người lao động nhận công việc về làm tại nhà","shortTitle":"Người lao động nhận công việc về làm tại nhà","chuong":"Chương XI — NHỮNG QUY ĐỊNH RIÊNG ĐỐI VỚI LAO ĐỘNGCHƯA THÀNH NIÊN VÀ MỘT SỐ LAO ĐỘNG KHÁC","muc":"Mục 6","level":1,"content":[{"k":"p","t":"Người lao động có thể thỏa thuận với người sử dụng lao động để nhận việc về làm tại nhà."}]},{"id":"blld-45_168","no":168,"code":"Điều 168","title":"Điều 168. Tham gia bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp","shortTitle":"Tham gia bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp","chuong":"Chương XII — BẢO HIỂM XÃ HỘI, BẢO HIỂM Y TẾ, BẢO HIỂM THẤT NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động, người lao động phải tham gia bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp; người lao động được hưởng các chế độ theo quy định của pháp luật về bảo hiểm xã hội, bảo hiểm y tế và bảo hiểm thất nghiệp."},{"k":"p","t":"Khuyến khích người sử dụng lao động, người lao động tham gia các hình thức bảo hiểm khác đối với người lao động."},{"k":"p","t":"2. Trong thời gian người lao động nghỉ việc hưởng chế độ bảo hiểm xã hội thì người sử dụng lao động không phải trả lương cho người lao động, trừ trường hợp hai bên có thỏa thuận khác."},{"k":"p","t":"3. Đối với người lao động không thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp thì người sử dụng lao động có trách nhiệm chi trả thêm cùng lúc với kỳ trả lương một khoản tiền cho người lao động tương đương với mức người sử dụng lao động đóng bảo hiểm xã hội bắt buộc, bảo hiểm y tế, bảo hiểm thất nghiệp cho người lao động theo quy định của pháp luật về bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp."}]},{"id":"blld-45_169","no":169,"code":"Điều 169","title":"Điều 169. Tuổi nghỉ hưu","shortTitle":"Tuổi nghỉ hưu","chuong":"Chương XII — BẢO HIỂM XÃ HỘI, BẢO HIỂM Y TẾ, BẢO HIỂM THẤT NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động bảo đảm điều kiện về thời gian đóng bảo hiểm xã hội theo quy định của pháp luật về bảo hiểm xã hội được hưởng lương hưu khi đủ tuổi nghỉ hưu."},{"k":"p","t":"2. Tuổi nghỉ hưu của người lao động trong điều kiện lao động bình thường được điều chỉnh theo lộ trình cho đến khi đủ 62 tuổi đối với lao động nam vào năm 2028 và đủ 60 tuổi đối với lao động nữ vào năm 2035."},{"k":"p","t":"Kể từ năm 2021, tuổi nghỉ hưu của người lao động trong điều kiện lao động bình thường là đủ 60 tuổi 03 tháng đối với lao động nam và đủ 55 tuổi 04 tháng đối với lao động nữ; sau đó, cứ mỗi năm tăng thêm 03 tháng đối với lao động nam và 04 tháng đối với lao động nữ."},{"k":"p","t":"3. Người lao động bị suy giảm khả năng lao động; làm nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm; làm nghề, công việc nặng nhọc, độc hại, nguy hiểm; làm việc ở vùng có điều kiện kinh tế-xã hội đặc biệt khó khăn có thể nghỉ hưu ở tuổi thấp hơn nhưng không quá 05 tuổi so với quy định tại khoản 2 Điều này tại thời điểm nghỉ hưu, trừ trường hợp pháp luật có quy định khác."},{"k":"p","t":"4. Người lao động có trình độ chuyên môn, kỹ thuật cao và một số trường hợp đặc biệt có thể nghỉ hưu ở tuổi cao hơn nhưng không quá 05 tuổi so với quy định tại khoản 2 Điều này tại thời điểm nghỉ hưu, trừ trường hợp pháp luật có quy định khác."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_170","no":170,"code":"Điều 170","title":"Điều 170. Quyền thành lập, gia nhập và tham gia hoạt động của tổ chức đại diện người lao động tại cơ sở","shortTitle":"Quyền thành lập, gia nhập và tham gia hoạt động của tổ chức đại diện người lao động tại cơ sở","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động có quyền thành lập, gia nhập và hoạt động công đoàn theo quy định của Luật Công đoàn."},{"k":"p","t":"2. Người lao động trong doanh nghiệp có quyền thành lập, gia nhập và tham gia hoạt động của tổ chức của người lao động tại doanh nghiệp theo quy định tại các điều 172, 173 và 174 của Bộ luật này."},{"k":"p","t":"3. Các tổ chức đại diện người lao động quy định tại khoản 1 và khoản 2 Điều này bình đẳng về quyền và nghĩa vụ trong việc đại diện bảo vệ quyền và lợi ích hợp pháp, chính đáng của người lao động trong quan hệ lao động."}]},{"id":"blld-45_171","no":171,"code":"Điều 171","title":"Điều 171. Công đoàn cơ sở thuộc hệ thống tổ chức Công đoàn Việt Nam","shortTitle":"Công đoàn cơ sở thuộc hệ thống tổ chức Công đoàn Việt Nam","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Công đoàn cơ sở thuộc hệ thống tổ chức Công đoàn Việt Nam được thành lập ở các cơ quan, tổ chức, đơn vị, doanh nghiệp."},{"k":"p","t":"2. Việc thành lập, giải thể, tổ chức và hoạt động của Công đoàn cơ sở được thực hiện theo quy định của Luật Công đoàn."}]},{"id":"blld-45_172","no":172,"code":"Điều 172","title":"Điều 172. Thành lập, gia nhập tổ chức của người lao động tại doanh nghiệp","shortTitle":"Thành lập, gia nhập tổ chức của người lao động tại doanh nghiệp","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức của người lao động tại doanh nghiệp được thành lập và hoạt động hợp pháp sau khi cơ quan nhà nước có thẩm quyền cấp đăng ký."},{"k":"p","t":"Tổ chức của người lao động tại doanh nghiệp tổ chức và hoạt động phải bảo đảm nguyên tắc tuân thủ Hiến pháp, pháp luật và điều lệ; tự nguyện, tự quản, dân chủ, minh bạch."},{"k":"p","t":"2. Tổ chức của người lao động tại doanh nghiệp bị thu hồi đăng ký khi vi phạm về tôn chỉ, mục đích của tổ chức quy định tại điểm b khoản 1 Điều 174 của Bộ luật này hoặc tổ chức của người lao động tại doanh nghiệp chấm dứt sự tồn tại trong trường hợp chia, tách, hợp nhất, sáp nhập, giải thể hoặc doanh nghiệp giải thể, phá sản."},{"k":"p","t":"3. Trường hợp tổ chức của người lao động tại doanh nghiệp gia nhập Công đoàn Việt Nam thì thực hiện theo quy định của Luật Công đoàn."},{"k":"p","t":"4. Chính phủ quy định về hồ sơ, trình tự, thủ tục đăng ký; thẩm quyền, thủ tục cấp đăng ký, thu hồi đăng ký; quản lý nhà nước đối với vấn đề tài chính, tài sản của tổ chức của người lao động tại doanh nghiệp; chia, tách, hợp nhất, sáp nhập, giải thể, quyền liên kết của tổ chức của người lao động tại doanh nghiệp."}]},{"id":"blld-45_173","no":173,"code":"Điều 173","title":"Điều 173. Ban lãnh đạo và thành viên tổ chức của người lao động tại doanh nghiệp","shortTitle":"Ban lãnh đạo và thành viên tổ chức của người lao động tại doanh nghiệp","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Tại thời điểm đăng ký, tổ chức của người lao động tại doanh nghiệp phải có số lượng tối thiểu thành viên là người lao động làm việc tại doanh nghiệp theo quy định của Chính phủ."},{"k":"p","t":"2. Ban lãnh đạo do thành viên của tổ chức của người lao động tại doanh nghiệp bầu. Thành viên ban lãnh đạo là người lao động Việt Nam đang làm việc tại doanh nghiệp; không đang trong thời gian bị truy cứu trách nhiệm hình sự, chấp hành hình phạt hoặc chưa được xóa án tích do phạm các tội xâm phạm an ninh quốc gia, các tội xâm phạm quyền tự do của con người, quyền tự do, dân chủ của công dân, các tội xâm phạm sở hữu theo quy định của Bộ luật Hình sự."}]},{"id":"blld-45_174","no":174,"code":"Điều 174","title":"Điều 174. Điều lệ tổ chức của người lao động tại doanh nghiệp","shortTitle":"Điều lệ tổ chức của người lao động tại doanh nghiệp","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Điều lệ tổ chức của người lao động tại doanh nghiệp phải có các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ tổ chức; biểu tượng (nếu có);"},{"k":"p","t":"b) Tôn chỉ, mục đích và phạm vi hoạt động là bảo vệ quyền, lợi ích hợp pháp, chính đáng của thành viên tổ chức mình trong quan hệ lao động tại doanh nghiệp; cùng với người sử dụng lao động giải quyết các vấn đề liên quan đến quyền, nghĩa vụ và lợi ích của người lao động và người sử dụng lao động; xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định;"},{"k":"p","t":"c) Điều kiện, thủ tục gia nhập và ra khỏi tổ chức của người lao động tại doanh nghiệp."},{"k":"p","t":"Trong một tổ chức của người lao động tại doanh nghiệp không đồng thời có thành viên là người lao động thông thường và thành viên là người lao động trực tiếp tham gia vào quá trình ra quyết định liên quan đến điều kiện lao động, tuyển dụng lao động, kỷ luật lao động, chấm dứt hợp đồng lao động hoặc chuyển người lao động làm công việc khác;"},{"k":"p","t":"d) Cơ cấu tổ chức, nhiệm kỳ, người đại diện của tổ chức;"},{"k":"p","t":"đ) Nguyên tắc tổ chức, hoạt động;"},{"k":"p","t":"e) Thể thức thông qua quyết định của tổ chức."},{"k":"p","t":"Những nội dung phải do thành viên quyết định theo đa số bao gồm thông qua, sửa đổi, bổ sung điều lệ của tổ chức; bầu cử, miễn nhiệm người đứng đầu và thành viên ban lãnh đạo của tổ chức; chia, tách, hợp nhất, sáp nhập, đổi tên, giải thể, liên kết tổ chức; gia nhập Công đoàn Việt Nam;"},{"k":"p","t":"g) Phí thành viên, nguồn tài sản, tài chính và việc quản lý, sử dụng tài sản, tài chính của tổ chức."},{"k":"p","t":"Việc thu, chi tài chính của tổ chức của người lao động tại doanh nghiệp phải được theo dõi, lưu trữ và định kỳ hằng năm công khai cho thành viên của tổ chức;"},{"k":"p","t":"h) Kiến nghị và giải quyết kiến nghị của thành viên trong nội bộ tổ chức."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_175","no":175,"code":"Điều 175","title":"Điều 175. Các hành vi bị nghiêm cấm đối với người sử dụng lao động liên quan đến thành lập, gia nhập và hoạt động của tổ chức đại diện người lao động tại cơ sở","shortTitle":"Các hành vi bị nghiêm cấm đối với người sử dụng lao động liên quan đến thành lập, gia nhập và hoạt động của tổ chức đại diện người lao động tại cơ sở","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Phân biệt đối xử đối với người lao động, thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở vì lý do thành lập, gia nhập hoặc hoạt động tổ chức đại diện người lao động, bao gồm:"},{"k":"p","t":"a) Yêu cầu tham gia, không tham gia hoặc ra khỏi tổ chức đại diện người lao động tại cơ sở để được tuyển dụng, giao kết hoặc gia hạn hợp đồng lao động;"},{"k":"p","t":"b) Sa thải, kỷ luật, đơn phương chấm dứt hợp đồng lao động, không tiếp tục giao kết hoặc gia hạn hợp đồng lao động, chuyển người lao động làm công việc khác;"},{"k":"p","t":"c) Phân biệt đối xử về tiền lương, thời giờ làm việc, các quyền và nghĩa vụ khác trong quan hệ lao động;"},{"k":"p","t":"d) Cản trở, gây khó khăn liên quan đến công việc nhằm làm suy yếu hoạt động của tổ chức đại diện người lao động tại cơ sở."},{"k":"p","t":"2. Can thiệp, thao túng quá trình thành lập, bầu cử, xây dựng kế hoạch công tác và tổ chức thực hiện các hoạt động của tổ chức đại diện người lao động tại cơ sở, bao gồm cả việc hỗ trợ tài chính hoặc các biện pháp kinh tế khác nhằm làm vô hiệu hóa hoặc suy yếu việc thực hiện chức năng đại diện của tổ chức đại diện người lao động tại cơ sở hoặc phân biệt đối xử giữa các tổ chức đại diện người lao động tại cơ sở."}]},{"id":"blld-45_176","no":176,"code":"Điều 176","title":"Điều 176. Quyền của thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở","shortTitle":"Quyền của thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở có quyền sau đây:"},{"k":"p","t":"a) Tiếp cận người lao động tại nơi làm việc trong quá trình thực hiện các nhiệm vụ của tổ chức đại diện người lao động tại cơ sở. Việc thực hiện quyền này phải bảo đảm không ảnh hưởng đến hoạt động bình thường của người sử dụng lao động;"},{"k":"p","t":"b) Tiếp cận người sử dụng lao động để thực hiện các nhiệm vụ đại diện của tổ chức đại diện người lao động tại cơ sở;"},{"k":"p","t":"c) Được sử dụng thời gian làm việc theo quy định tại khoản 2 và khoản 3 Điều này để thực hiện công việc của tổ chức đại diện người lao động tại cơ sở mà vẫn được người sử dụng lao động trả lương;"},{"k":"p","t":"d) Được hưởng các bảo đảm khác trong quan hệ lao động và trong việc thực hiện chức năng đại diện theo quy định của pháp luật."},{"k":"p","t":"2. Chính phủ quy định thời gian tối thiểu mà người sử dụng lao động dành cho toàn bộ thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở để thực hiện nhiệm vụ của tổ chức đại diện trên cơ sở số lượng thành viên của tổ chức."},{"k":"p","t":"3. Tổ chức đại diện người lao động tại cơ sở và người sử dụng lao động thỏa thuận về thời gian tăng thêm so với thời gian tối thiểu quy định tại khoản 2 Điều này và cách thức sử dụng thời gian làm việc của thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở phù hợp với điều kiện thực tế."}]},{"id":"blld-45_177","no":177,"code":"Điều 177","title":"Điều 177. Nghĩa vụ của người sử dụng lao động đối với tổ chức đại diện người lao động tại cơ sở","shortTitle":"Nghĩa vụ của người sử dụng lao động đối với tổ chức đại diện người lao động tại cơ sở","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Không được cản trở, gây khó khăn khi người lao động tiến hành các hoạt động hợp pháp nhằm thành lập, gia nhập và tham gia các hoạt động của tổ chức đại diện người lao động tại cơ sở."},{"k":"p","t":"2. Công nhận và tôn trọng các quyền của tổ chức đại diện người lao động tại cơ sở đã được thành lập hợp pháp."},{"k":"p","t":"3. Phải thỏa thuận bằng văn bản với ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở khi đơn phương chấm dứt hợp đồng lao động, chuyển làm công việc khác, kỷ luật sa thải đối với người lao động là thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở. Trường hợp không thỏa thuận được, hai bên phải báo cáo với cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh. Sau 30 ngày kể từ ngày báo cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh biết, người sử dụng lao động mới có quyền quyết định. Trường hợp không nhất trí với quyết định của người sử dụng lao động thì người lao động, ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở có quyền yêu cầu giải quyết tranh chấp lao động theo trình tự, thủ tục do pháp luật quy định."},{"k":"p","t":"4. Phải gia hạn hợp đồng lao động đã giao kết đến hết nhiệm kỳ cho người lao động là thành viên ban lãnh đạo của tổ chức đại diện người lao động tại cơ sở đang trong nhiệm kỳ mà hết hạn hợp đồng lao động."},{"k":"p","t":"5. Các nghĩa vụ khác theo quy định của pháp luật."}]},{"id":"blld-45_178","no":178,"code":"Điều 178","title":"Điều 178. Quyền và nghĩa vụ của tổ chức đại diện người lao động tại cơ sở trong quan hệ lao động","shortTitle":"Quyền và nghĩa vụ của tổ chức đại diện người lao động tại cơ sở trong quan hệ lao động","chuong":"Chương XIII — TỔ CHỨC ĐẠI DIỆN NGƯỜI LAO ĐỘNG TẠI CƠ SỞ","muc":"","level":1,"content":[{"k":"p","t":"1. Thương lượng tập thể với người sử dụng lao động theo quy định của Bộ luật này."},{"k":"p","t":"2. Đối thoại tại nơi làm việc theo quy định của Bộ luật này."},{"k":"p","t":"3. Được tham khảo ý kiến xây dựng và giám sát việc thực hiện thang lương, bảng lương, mức lao động, quy chế trả lương, quy chế thưởng, nội quy lao động và những vấn đề liên quan đến quyền, lợi ích của người lao động là thành viên của mình."},{"k":"p","t":"4. Đại diện cho người lao động trong quá trình giải quyết khiếu nại, tranh chấp lao động cá nhân khi được người lao động ủy quyền."},{"k":"p","t":"5. Tổ chức và lãnh đạo đình công theo quy định của Bộ luật này."},{"k":"p","t":"6. Tiếp nhận hỗ trợ kỹ thuật của cơ quan, tổ chức đăng ký hoạt động hợp pháp tại Việt Nam nhằm tìm hiểu pháp luật về lao động; về trình tự, thủ tục thành lập tổ chức đại diện người lao động và việc tiến hành các hoạt động đại diện trong quan hệ lao động sau khi được cấp đăng ký."},{"k":"p","t":"7. Được người sử dụng lao động bố trí nơi làm việc và được cung cấp thông tin, bảo đảm các điều kiện cần thiết cho hoạt động của tổ chức đại diện người lao động tại cơ sở."},{"k":"p","t":"8. Các quyền và nghĩa vụ khác theo quy định của pháp luật."},{"k":"p","t":"NHỮNG QUY ĐỊNH CHUNGVỀ GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG"}]},{"id":"blld-45_179","no":179,"code":"Điều 179","title":"Điều 179. Tranh chấp lao động","shortTitle":"Tranh chấp lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Tranh chấp lao động là tranh chấp về quyền và nghĩa vụ, lợi ích phát sinh giữa các bên trong quá trình xác lập, thực hiện hoặc chấm dứt quan hệ lao động; tranh chấp giữa các tổ chức đại diện người lao động với nhau; tranh chấp phát sinh từ quan hệ có liên quan trực tiếp đến quan hệ lao động. Các loại tranh chấp lao động bao gồm:"},{"k":"p","t":"a) Tranh chấp lao động cá nhân giữa người lao động với người sử dụng lao động; giữa người lao động với doanh nghiệp, tổ chức đưa người lao động đi làm việc ở nước ngoài theo hợp đồng; giữa người lao động thuê lại với người sử dụng lao động thuê lại;"},{"k":"p","t":"b) Tranh chấp lao động tập thể về quyền hoặc về lợi ích giữa một hay nhiều tổ chức đại diện người lao động với người sử dụng lao động hoặc một hay nhiều tổ chức của người sử dụng lao động."},{"k":"p","t":"2. Tranh chấp lao động tập thể về quyền là tranh chấp giữa một hay nhiều tổ chức đại diện người lao động với người sử dụng lao động hoặc một hay nhiều tổ chức của người sử dụng lao động phát sinh trong trường hợp sau đây:"},{"k":"p","t":"a) Có sự khác nhau trong việc hiểu và thực hiện quy định của thỏa ước lao động tập thể, nội quy lao động, quy chế và thỏa thuận hợp pháp khác;"},{"k":"p","t":"b) Có sự khác nhau trong việc hiểu và thực hiện quy định của pháp luật về lao động;"},{"k":"p","t":"c) Khi người sử dụng lao động có hành vi phân biệt đối xử đối với người lao động, thành viên ban lãnh đạo của tổ chức đại diện người lao động vì lý do thành lập, gia nhập, hoạt động trong tổ chức đại diện người lao động; can thiệp, thao túng tổ chức đại diện người lao động; vi phạm nghĩa vụ về thương lượng thiện chí."},{"k":"p","t":"3. Tranh chấp lao động tập thể về lợi ích bao gồm:"},{"k":"p","t":"a) Tranh chấp lao động phát sinh trong quá trình thương lượng tập thể;"},{"k":"p","t":"b) Khi một bên từ chối thương lượng hoặc không tiến hành thương lượng trong thời hạn theo quy định của pháp luật."}]},{"id":"blld-45_180","no":180,"code":"Điều 180","title":"Điều 180. Nguyên tắc giải quyết tranh chấp lao động","shortTitle":"Nguyên tắc giải quyết tranh chấp lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Tôn trọng quyền tự định đoạt thông qua thương lượng của các bên trong suốt quá trình giải quyết tranh chấp lao động."},{"k":"p","t":"2. Coi trọng giải quyết tranh chấp lao động thông qua hòa giải, trọng tài trên cơ sở tôn trọng quyền và lợi ích của hai bên tranh chấp, tôn trọng lợi ích chung của xã hội, không trái pháp luật."},{"k":"p","t":"3. Công khai, minh bạch, khách quan, kịp thời, nhanh chóng và đúng pháp luật."},{"k":"p","t":"4. Bảo đảm sự tham gia của đại diện các bên trong quá trình giải quyết tranh chấp lao động."},{"k":"p","t":"5. Việc giải quyết tranh chấp lao động do cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động tiến hành sau khi có yêu cầu của bên tranh chấp hoặc theo đề nghị của cơ quan, tổ chức, cá nhân có thẩm quyền và được các bên tranh chấp đồng ý."}]},{"id":"blld-45_181","no":181,"code":"Điều 181","title":"Điều 181. Trách nhiệm của cơ quan, tổ chức trong giải quyết tranh chấp lao động","shortTitle":"Trách nhiệm của cơ quan, tổ chức trong giải quyết tranh chấp lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý nhà nước về lao động có trách nhiệm phối hợp với tổ chức đại diện người lao động, tổ chức đại diện người sử dụng lao động hướng dẫn, hỗ trợ và giúp đỡ các bên trong giải quyết tranh chấp lao động."},{"k":"p","t":"2. Bộ Lao động - Thương binh và Xã hội tổ chức việc tập huấn, nâng cao năng lực chuyên môn của hòa giải viên lao động, trọng tài viên lao động trong giải quyết tranh chấp lao động."},{"k":"p","t":"3. Khi có yêu cầu, cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân là đầu mối tiếp nhận yêu cầu giải quyết tranh chấp lao động và có trách nhiệm phân loại, hướng dẫn, hỗ trợ, giúp đỡ các bên trong giải quyết tranh chấp lao động."},{"k":"p","t":"Trong thời hạn 05 ngày làm việc, cơ quan tiếp nhận yêu cầu giải quyết tranh chấp lao động có trách nhiệm chuyển yêu cầu đến hòa giải viên lao động đối với trường hợp bắt buộc phải qua thủ tục hòa giải lao động, chuyển đến Hội đồng trọng tài trong trường hợp yêu cầu Hội đồng trọng tài giải quyết hoặc hướng dẫn gửi đến Tòa án để giải quyết."}]},{"id":"blld-45_182","no":182,"code":"Điều 182","title":"Điều 182. Quyền và nghĩa vụ của hai bên trong giải quyết tranh chấp lao động","shortTitle":"Quyền và nghĩa vụ của hai bên trong giải quyết tranh chấp lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trong giải quyết tranh chấp lao động, các bên có quyền sau đây:"},{"k":"p","t":"a) Trực tiếp hoặc thông qua đại diện để tham gia vào quá trình giải quyết;"},{"k":"p","t":"b) Rút yêu cầu hoặc thay đổi nội dung yêu cầu;"},{"k":"p","t":"c) Yêu cầu thay đổi người tiến hành giải quyết tranh chấp lao động nếu có lý do cho rằng người đó có thể không vô tư hoặc không khách quan."},{"k":"p","t":"2. Trong giải quyết tranh chấp lao động, các bên có nghĩa vụ sau đây:"},{"k":"p","t":"a) Cung cấp đầy đủ, kịp thời tài liệu, chứng cứ để chứng minh cho yêu cầu của mình;"},{"k":"p","t":"b) Chấp hành thỏa thuận đã đạt được, quyết định của Ban trọng tài lao động, bản án, quyết định của Tòa án đã có hiệu lực pháp luật."}]},{"id":"blld-45_183","no":183,"code":"Điều 183","title":"Điều 183. Quyền của cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động","shortTitle":"Quyền của cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động, trong phạm vi nhiệm vụ, quyền hạn của mình, có quyền yêu cầu các bên tranh chấp, cơ quan, tổ chức, cá nhân có liên quan cung cấp tài liệu, chứng cứ, trưng cầu giám định, mời người làm chứng và người có liên quan."}]},{"id":"blld-45_184","no":184,"code":"Điều 184","title":"Điều 184. Hòa giải viên lao động","shortTitle":"Hòa giải viên lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hòa giải viên lao động là người do Chủ tịch Ủy ban nhân dân cấp tỉnh bổ nhiệm để hòa giải tranh chấp lao động, tranh chấp về hợp đồng đào tạo nghề; hỗ trợ phát triển quan hệ lao động."},{"k":"p","t":"2. Chính phủ quy định tiêu chuẩn, trình tự, thủ tục bổ nhiệm, chế độ, điều kiện hoạt động và việc quản lý hòa giải viên lao động; thẩm quyền, trình tự, thủ tục cử hòa giải viên lao động."}]},{"id":"blld-45_185","no":185,"code":"Điều 185","title":"Điều 185. Hội đồng trọng tài lao động","shortTitle":"Hội đồng trọng tài lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định thành lập Hội đồng trọng tài lao động, bổ nhiệm Chủ tịch, thư ký và các trọng tài viên lao động của Hội đồng trọng tài lao động. Nhiệm kỳ của Hội đồng trọng tài lao động là 05 năm."},{"k":"p","t":"2. Số lượng trọng tài viên lao động của Hội đồng trọng tài lao động do Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định, ít nhất là 15 người, bao gồm số lượng ngang nhau do các bên đề cử, cụ thể như sau:"},{"k":"p","t":"a) Tối thiểu 05 thành viên do cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh đề cử, trong đó có Chủ tịch Hội đồng là đại diện lãnh đạo và thư ký Hội đồng là công chức của cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh;"},{"k":"p","t":"b) Tối thiểu 05 thành viên do công đoàn cấp tỉnh đề cử;"},{"k":"p","t":"c) Tối thiểu 05 thành viên do các tổ chức đại diện của người sử dụng lao động trên địa bàn tỉnh thống nhất đề cử."},{"k":"p","t":"3. Tiêu chuẩn và chế độ làm việc của trọng tài viên lao động được quy định như sau:"},{"k":"p","t":"a) Trọng tài viên lao động là người hiểu biết pháp luật, có kinh nghiệm trong lĩnh vực quan hệ lao động, có uy tín và công tâm;"},{"k":"p","t":"b) Khi đề cử trọng tài viên lao động theo quy định tại khoản 2 Điều này, cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh, công đoàn cấp tỉnh, tổ chức đại diện của người sử dụng lao động có thể cử người của cơ quan, tổ chức mình hoặc cử người khác đáp ứng đầy đủ các tiêu chuẩn đối với trọng tài viên lao động theo quy định;"},{"k":"p","t":"c) Thư ký Hội đồng trọng tài lao động thực hiện nhiệm vụ thường trực của Hội đồng trọng tài lao động. Trọng tài viên lao động làm việc theo chế độ chuyên trách hoặc kiêm nhiệm."},{"k":"p","t":"4. Khi có yêu cầu giải quyết tranh chấp lao động theo quy định tại các điều 189, 193 và 197 của Bộ luật này, Hội đồng trọng tài lao động quyết định thành lập Ban trọng tài lao động để giải quyết tranh chấp như sau:"},{"k":"p","t":"a) Đại diện mỗi bên tranh chấp chọn 01 trọng tài viên trong số danh sách trọng tài viên lao động;"},{"k":"p","t":"b) Trọng tài viên lao động do các bên lựa chọn theo quy định tại điểm a khoản này thống nhất lựa chọn 01 trọng tài viên lao động khác làm Trưởng Ban trọng tài lao động;"},{"k":"p","t":"c) Trường hợp các bên tranh chấp cùng lựa chọn một trọng tài viên để giải quyết tranh chấp lao động thì Ban trọng tài lao động chỉ gồm 01 trọng tài viên lao động đã được lựa chọn."},{"k":"p","t":"5. Ban trọng tài lao động làm việc theo nguyên tắc tập thể và quyết định theo đa số, trừ trường hợp quy định tại điểm c khoản 4 Điều này."},{"k":"p","t":"6. Chính phủ quy định chi tiết về tiêu chuẩn, điều kiện, trình tự, thủ tục bổ nhiệm, miễn nhiệm, chế độ và điều kiện hoạt động của trọng tài viên lao động, Hội đồng trọng tài lao động; tổ chức và hoạt động của Hội đồng trọng tài lao động; việc thành lập và hoạt động của Ban trọng tài lao động quy định tại Điều này."}]},{"id":"blld-45_186","no":186,"code":"Điều 186","title":"Điều 186. Cấm hành động đơn phương trong khi tranh chấp lao động đang được giải quyết","shortTitle":"Cấm hành động đơn phương trong khi tranh chấp lao động đang được giải quyết","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Khi tranh chấp lao động đang được cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết trong thời hạn theo quy định của Bộ luật này thì không bên nào được hành động đơn phương chống lại bên kia."},{"k":"p","t":"THẨM QUYỀN VÀ TRÌNH TỰ GIẢI QUYẾTTRANH CHẤP LAO ĐỘNG CÁ NHÂN"}]},{"id":"blld-45_187","no":187,"code":"Điều 187","title":"Điều 187. Thẩm quyền giải quyết tranh chấp lao động cá nhân","shortTitle":"Thẩm quyền giải quyết tranh chấp lao động cá nhân","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động cá nhân bao gồm:"},{"k":"p","t":"1. Hòa giải viên lao động;"},{"k":"p","t":"2. Hội đồng trọng tài lao động;"},{"k":"p","t":"3. Tòa án nhân dân."}]},{"id":"blld-45_188","no":188,"code":"Điều 188","title":"Điều 188. Trình tự, thủ tục hòa giải tranh chấp lao động cá nhân của hòa giải viên lao động","shortTitle":"Trình tự, thủ tục hòa giải tranh chấp lao động cá nhân của hòa giải viên lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tranh chấp lao động cá nhân phải được giải quyết thông qua thủ tục hòa giải của hòa giải viên lao động trước khi yêu cầu Hội đồng trọng tài lao động hoặc Tòa án giải quyết, trừ các tranh chấp lao động sau đây không bắt buộc phải qua thủ tục hòa giải:"},{"k":"p","t":"a) Về xử lý kỷ luật lao động theo hình thức sa thải hoặc về trường hợp bị đơn phương chấm dứt hợp đồng lao động;"},{"k":"p","t":"b) Về bồi thường thiệt hại, trợ cấp khi chấm dứt hợp đồng lao động;"},{"k":"p","t":"c) Giữa người giúp việc gia đình với người sử dụng lao động;"},{"k":"p","t":"d) Về bảo hiểm xã hội theo quy định của pháp luật về bảo hiểm xã hội, về bảo hiểm y tế theo quy định của pháp luật về bảo hiểm y tế, về bảo hiểm thất nghiệp theo quy định của pháp luật về việc làm, về bảo hiểm tai nạn lao động, bệnh nghề nghiệp theo quy định của pháp luật về an toàn, vệ sinh lao động;"},{"k":"p","t":"đ) Về bồi thường thiệt hại giữa người lao động với doanh nghiệp, tổ chức đưa người lao động đi làm việc ở nước ngoài theo hợp đồng;"},{"k":"p","t":"e) Giữa người lao động thuê lại với người sử dụng lao động thuê lại."},{"k":"p","t":"2. Trong thời hạn 05 ngày làm việc kể từ ngày hòa giải viên lao động nhận được yêu cầu từ bên yêu cầu giải quyết tranh chấp hoặc từ cơ quan quy định tại khoản 3 Điều 181 của Bộ luật này, hòa giải viên lao động phải kết thúc việc hòa giải."},{"k":"p","t":"3. Tại phiên họp hòa giải phải có mặt hai bên tranh chấp. Các bên tranh chấp có thể ủy quyền cho người khác tham gia phiên họp hòa giải."},{"k":"p","t":"4. Hòa giải viên lao động có trách nhiệm hướng dẫn, hỗ trợ các bên thương lượng để giải quyết tranh chấp."},{"k":"p","t":"Trường hợp các bên thỏa thuận được, hòa giải viên lao động lập biên bản hòa giải thành. Biên bản hòa giải thành phải có chữ ký của các bên tranh chấp và hòa giải viên lao động."},{"k":"p","t":"Trường hợp các bên không thỏa thuận được, hòa giải viên lao động đưa ra phương án hòa giải để các bên xem xét. Trường hợp các bên chấp nhận phương án hòa giải thì hòa giải viên lao động lập biên bản hòa giải thành. Biên bản hòa giải thành phải có chữ ký của các bên tranh chấp và hòa giải viên lao động."},{"k":"p","t":"Trường hợp phương án hòa giải không được chấp nhận hoặc có bên tranh chấp đã được triệu tập hợp lệ đến lần thứ hai mà vẫn vắng mặt không có lý do chính đáng thì hòa giải viên lao động lập biên bản hòa giải không thành. Biên bản hòa giải không thành phải có chữ ký của bên tranh chấp có mặt và hòa giải viên lao động."},{"k":"p","t":"5. Bản sao biên bản hòa giải thành hoặc hòa giải không thành phải được gửi cho các bên tranh chấp trong thời hạn 01 ngày làm việc kể từ ngày lập biên bản."},{"k":"p","t":"6. Trường hợp một trong các bên không thực hiện các thỏa thuận trong biên bản hòa giải thành thì bên kia có quyền yêu cầu Hội đồng trọng tài lao động hoặc Tòa án giải quyết."},{"k":"p","t":"7. Trường hợp không bắt buộc phải qua thủ tục hòa giải quy định tại khoản 1 Điều này hoặc trường hợp hết thời hạn hòa giải quy định tại khoản 2 Điều này mà hòa giải viên lao động không tiến hành hòa giải hoặc trường hợp hòa giải không thành theo quy định tại khoản 4 Điều này thì các bên tranh chấp có quyền lựa chọn một trong các phương thức sau để giải quyết tranh chấp:"},{"k":"p","t":"a) Yêu cầu Hội đồng trọng tài lao động giải quyết theo quy định tại Điều 189 của Bộ luật này;"},{"k":"p","t":"b) Yêu cầu Tòa án giải quyết."}]},{"id":"blld-45_189","no":189,"code":"Điều 189","title":"Điều 189. Giải quyết tranh chấp lao động cá nhân của Hội đồng trọng tài lao động","shortTitle":"Giải quyết tranh chấp lao động cá nhân của Hội đồng trọng tài lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trên cơ sở đồng thuận, các bên tranh chấp có quyền yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp trong trường hợp quy định tại khoản 7 Điều 188 của Bộ luật này. Khi yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp, các bên không được đồng thời yêu cầu Tòa án giải quyết, trừ trường hợp quy định tại khoản 4 Điều này."},{"k":"p","t":"2. Trong thời hạn 07 ngày làm việc kể từ ngày nhận được yêu cầu giải quyết tranh chấp theo quy định tại khoản 1 Điều này, Ban trọng tài lao động phải được thành lập để giải quyết tranh chấp."},{"k":"p","t":"3. Trong thời hạn 30 ngày kể từ ngày Ban trọng tài lao động được thành lập, Ban trọng tài lao động phải ra quyết định về việc giải quyết tranh chấp và gửi cho các bên tranh chấp."},{"k":"p","t":"4. Trường hợp hết thời hạn quy định tại khoản 2 Điều này mà Ban trọng tài lao động không được thành lập hoặc hết thời hạn quy định tại khoản 3 Điều này mà Ban trọng tài lao động không ra quyết định giải quyết tranh chấp thì các bên có quyền yêu cầu Tòa án giải quyết."},{"k":"p","t":"5. Trường hợp một trong các bên không thi hành quyết định giải quyết tranh chấp của Ban trọng tài lao động thì các bên có quyền yêu cầu Tòa án giải quyết."}]},{"id":"blld-45_190","no":190,"code":"Điều 190","title":"Điều 190. Thời hiệu yêu cầu giải quyết tranh chấp lao động cá nhân","shortTitle":"Thời hiệu yêu cầu giải quyết tranh chấp lao động cá nhân","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời hiệu yêu cầu hòa giải viên lao động thực hiện hòa giải tranh chấp lao động cá nhân là 06 tháng kể từ ngày phát hiện ra hành vi mà bên tranh chấp cho rằng quyền và lợi ích hợp pháp của mình bị vi phạm."},{"k":"p","t":"2. Thời hiệu yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp lao động cá nhân là 09 tháng kể từ ngày phát hiện ra hành vi mà bên tranh chấp cho rằng quyền và lợi ích hợp pháp của mình bị vi phạm."},{"k":"p","t":"3. Thời hiệu yêu cầu Tòa án giải quyết tranh chấp lao động cá nhân là 01 năm kể từ ngày phát hiện ra hành vi mà bên tranh chấp cho rằng quyền và lợi ích hợp pháp của mình bị vi phạm."},{"k":"p","t":"4. Trường hợp người yêu cầu chứng minh được vì sự kiện bất khả kháng, trở ngại khách quan hoặc lý do khác theo quy định của pháp luật mà không thể yêu cầu đúng thời hạn quy định tại Điều này thì thời gian có sự kiện bất khả kháng, trở ngại khách quan hoặc lý do đó không tính vào thời hiệu yêu cầu giải quyết tranh chấp lao động cá nhân."},{"k":"p","t":"THẨM QUYỀN VÀ TRÌNH TỰ GIẢI QUYẾTTRANH CHẤP LAO ĐỘNG TẬP THỂ VỀ QUYỀN"}]},{"id":"blld-45_191","no":191,"code":"Điều 191","title":"Điều 191. Thẩm quyền giải quyết tranh chấp lao động tập thể về quyền","shortTitle":"Thẩm quyền giải quyết tranh chấp lao động tập thể về quyền","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động tập thể về quyền bao gồm:"},{"k":"p","t":"a) Hòa giải viên lao động;"},{"k":"p","t":"b) Hội đồng trọng tài lao động;"},{"k":"p","t":"c) Tòa án nhân dân."},{"k":"p","t":"2. Tranh chấp lao động tập thể về quyền phải được giải quyết thông qua thủ tục hòa giải của hòa giải viên lao động trước khi yêu cầu Hội đồng trọng tài lao động hoặc Tòa án giải quyết."}]},{"id":"blld-45_192","no":192,"code":"Điều 192","title":"Điều 192. Trình tự, thủ tục giải quyết tranh chấp lao động tập thể về quyền","shortTitle":"Trình tự, thủ tục giải quyết tranh chấp lao động tập thể về quyền","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trình tự, thủ tục hòa giải tranh chấp lao động tập thể về quyền được thực hiện theo quy định tại các khoản 2, 3, 4, 5 và 6 Điều 188 của Bộ luật này."},{"k":"p","t":"Đối với tranh chấp quy định tại điểm b và điểm c khoản 2 Điều 179 của Bộ luật này mà xác định có hành vi vi phạm pháp luật thì hòa giải viên lao động lập biên bản và chuyển hồ sơ, tài liệu đến cơ quan có thẩm quyền xem xét, xử lý theo quy định của pháp luật."},{"k":"p","t":"2. Trong trường hợp hòa giải không thành hoặc hết thời hạn hòa giải quy định tại khoản 2 Điều 188 của Bộ luật này mà hòa giải viên lao động không tiến hành hòa giải thì các bên tranh chấp có quyền lựa chọn một trong các phương thức sau để giải quyết tranh chấp:"},{"k":"p","t":"a) Yêu cầu Hội đồng trọng tài lao động giải quyết theo quy định tại Điều 193 của Bộ luật này;"},{"k":"p","t":"b) Yêu cầu Tòa án giải quyết."}]},{"id":"blld-45_193","no":193,"code":"Điều 193","title":"Điều 193. Giải quyết tranh chấp lao động tập thể về quyền của Hội đồng trọng tài lao động","shortTitle":"Giải quyết tranh chấp lao động tập thể về quyền của Hội đồng trọng tài lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trên cơ sở đồng thuận, các bên tranh chấp có quyền yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp trong trường hợp hòa giải không thành hoặc hết thời hạn hòa giải quy định tại khoản 2 Điều 188 của Bộ luật này mà hòa giải viên lao động không tiến hành hòa giải hoặc một trong các bên không thực hiện thỏa thuận trong biên bản hòa giải thành."},{"k":"p","t":"2. Trong thời hạn 07 ngày làm việc kể từ ngày nhận được yêu cầu giải quyết tranh chấp theo quy định tại khoản 1 Điều này, Ban trọng tài lao động phải được thành lập để giải quyết tranh chấp."},{"k":"p","t":"3. Trong thời hạn 30 ngày kể từ ngày được thành lập, căn cứ vào quy định của pháp luật về lao động, thỏa ước lao động tập thể, nội quy lao động đã được đăng ký và các quy chế, thỏa thuận hợp pháp khác, Ban trọng tài phải ra quyết định về việc giải quyết tranh chấp và gửi cho các bên tranh chấp."},{"k":"p","t":"Đối với tranh chấp quy định tại điểm b và điểm c khoản 2 Điều 179 của Bộ luật này mà xác định có hành vi vi phạm pháp luật thì Ban trọng tài lao động không ra quyết định giải quyết mà lập biên bản và chuyển hồ sơ, tài liệu đến cơ quan có thẩm quyền xem xét, xử lý theo quy định của pháp luật."},{"k":"p","t":"4. Trường hợp các bên lựa chọn giải quyết tranh chấp thông qua Hội đồng trọng tài lao động theo quy định tại Điều này thì trong thời gian Hội đồng trọng tài lao động đang tiến hành giải quyết tranh chấp, các bên không được đồng thời yêu cầu Tòa án giải quyết."},{"k":"p","t":"5. Khi hết thời hạn quy định tại khoản 2 Điều này mà Ban trọng tài lao động không được thành lập hoặc hết thời hạn quy định tại khoản 3 Điều này mà Ban trọng tài lao động không ra quyết định giải quyết tranh chấp thì các bên có quyền yêu cầu Tòa án giải quyết."},{"k":"p","t":"6. Trường hợp một trong các bên không thi hành quyết định giải quyết tranh chấp của Ban trọng tài lao động thì các bên có quyền yêu cầu Tòa án giải quyết."}]},{"id":"blld-45_194","no":194,"code":"Điều 194","title":"Điều 194. Thời hiệu yêu cầu giải quyết tranh chấp lao động tập thể về quyền","shortTitle":"Thời hiệu yêu cầu giải quyết tranh chấp lao động tập thể về quyền","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thời hiệu yêu cầu hòa giải viên lao động thực hiện hòa giải tranh chấp lao động tập thể về quyền là 06 tháng kể từ ngày phát hiện ra hành vi mà bên tranh chấp cho rằng quyền hợp pháp của mình bị vi phạm."},{"k":"p","t":"2. Thời hiệu yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp lao động tập thể về quyền là 09 tháng kể từ ngày phát hiện ra hành vi mà bên tranh chấp cho rằng quyền hợp pháp của mình bị vi phạm."},{"k":"p","t":"3. Thời hiệu yêu cầu Tòa án giải quyết tranh chấp lao động tập thể về quyền là 01 năm kể từ ngày phát hiện ra hành vi mà bên tranh chấp cho rằng quyền hợp pháp của mình bị vi phạm."},{"k":"p","t":"THẨM QUYỀN VÀ TRÌNH TỰ GIẢI QUYẾTTRANH CHẤP LAO ĐỘNG TẬP THỂ VỀ LỢI ÍCH"}]},{"id":"blld-45_195","no":195,"code":"Điều 195","title":"Điều 195. Thẩm quyền giải quyết tranh chấp lao động tập thể về lợi ích","shortTitle":"Thẩm quyền giải quyết tranh chấp lao động tập thể về lợi ích","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân có thẩm quyền giải quyết tranh chấp lao động tập thể về lợi ích bao gồm:"},{"k":"p","t":"a) Hòa giải viên lao động;"},{"k":"p","t":"b) Hội đồng trọng tài lao động."},{"k":"p","t":"2. Tranh chấp lao động tập thể về lợi ích phải được giải quyết thông qua thủ tục hòa giải của hòa giải viên lao động trước khi yêu cầu Hội đồng trọng tài lao động giải quyết hoặc tiến hành thủ tục đình công."}]},{"id":"blld-45_196","no":196,"code":"Điều 196","title":"Điều 196. Trình tự, thủ tục giải quyết tranh chấp lao động tập thể về lợi ích","shortTitle":"Trình tự, thủ tục giải quyết tranh chấp lao động tập thể về lợi ích","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Trình tự, thủ tục hòa giải tranh chấp lao động tập thể về lợi ích được thực hiện theo quy định tại các khoản 2, 3, 4 và 5 Điều 188 của Bộ luật này."},{"k":"p","t":"2. Trường hợp hòa giải thành, biên bản hòa giải thành phải bao gồm đầy đủ nội dung các bên đã đạt được thỏa thuận, có chữ ký của các bên tranh chấp và hòa giải viên lao động. Biên bản hòa giải thành có giá trị pháp lý như thỏa ước lao động tập thể của doanh nghiệp."},{"k":"p","t":"3. Trường hợp hòa giải không thành hoặc hết thời hạn hòa giải quy định tại khoản 2 Điều 188 của Bộ luật này mà hòa giải viên lao động không tiến hành hòa giải hoặc một trong các bên không thực hiện thỏa thuận trong biên bản hòa giải thành thì các bên tranh chấp có quyền lựa chọn một trong các phương thức sau để giải quyết tranh chấp:"},{"k":"p","t":"a) Yêu cầu Hội đồng trọng tài lao động giải quyết theo quy định tại Điều 197 của Bộ luật này;"},{"k":"p","t":"b) Tổ chức đại diện người lao động có quyền tiến hành thủ tục quy định tại các điều 200, 201 và 202 của Bộ luật này để đình công."}]},{"id":"blld-45_197","no":197,"code":"Điều 197","title":"Điều 197. Giải quyết tranh chấp lao động tập thể về lợi ích của Hội đồng trọng tài lao động","shortTitle":"Giải quyết tranh chấp lao động tập thể về lợi ích của Hội đồng trọng tài lao động","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Trên cơ sở đồng thuận, các bên tranh chấp có quyền yêu cầu Hội đồng trọng tài lao động giải quyết tranh chấp trong trường hợp hòa giải không thành hoặc hết thời hạn hòa giải quy định tại khoản 2 Điều 188 của Bộ luật này mà hòa giải viên lao động không tiến hành hòa giải hoặc một trong các bên không thực hiện thỏa thuận trong biên bản hòa giải thành."},{"k":"p","t":"2. Trong thời hạn 07 ngày làm việc kể từ ngày nhận được yêu cầu giải quyết tranh chấp theo quy định tại khoản 1 Điều này, Ban trọng tài lao động phải được thành lập để giải quyết tranh chấp."},{"k":"p","t":"3. Trong thời hạn 30 ngày kể từ ngày được thành lập, căn cứ vào quy định của pháp luật về lao động, thỏa ước lao động tập thể, nội quy lao động đã được đăng ký và các quy chế, thỏa thuận hợp pháp khác, Ban trọng tài lao động phải ra quyết định về việc giải quyết tranh chấp và gửi cho các bên tranh chấp."},{"k":"p","t":"4. Khi các bên lựa chọn giải quyết tranh chấp thông qua Hội đồng trọng tài lao động theo quy định tại Điều này thì tổ chức đại diện người lao động không được tiến hành đình công trong thời gian Hội đồng trọng tài lao động đang tiến hành giải quyết tranh chấp."},{"k":"p","t":"Khi hết thời hạn quy định tại khoản 2 Điều này mà Ban trọng tài lao động không được thành lập hoặc hết thời hạn quy định tại khoản 3 Điều này mà Ban trọng tài không ra quyết định giải quyết tranh chấp hoặc người sử dụng lao động là bên tranh chấp không thực hiện quyết định giải quyết tranh chấp của Ban trọng tài lao động thì tổ chức đại diện người lao động là bên tranh chấp có quyền tiến hành thủ tục quy định tại các điều 200, 201 và 202 của Bộ luật này để đình công."},{"k":"p","t":"ĐÌNH CÔNG"}]},{"id":"blld-45_198","no":198,"code":"Điều 198","title":"Điều 198. Đình công","shortTitle":"Đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"Đình công là sự ngừng việc tạm thời, tự nguyện và có tổ chức của người lao động nhằm đạt được yêu cầu trong quá trình giải quyết tranh chấp lao động và do tổ chức đại diện người lao động có quyền thương lượng tập thể là một bên tranh chấp lao động tập thể tổ chức và lãnh đạo."}]},{"id":"blld-45_199","no":199,"code":"Điều 199","title":"Điều 199. Trường hợp người lao động có quyền đình công","shortTitle":"Trường hợp người lao động có quyền đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"Tổ chức đại diện người lao động là bên tranh chấp lao động tập thể về lợi ích có quyền tiến hành thủ tục quy định tại các điều 200, 201 và 202 của Bộ luật này để đình công trong trường hợp sau đây:"},{"k":"p","t":"1. Hòa giải không thành hoặc hết thời hạn hòa giải quy định tại khoản 2 Điều 188 của Bộ luật này mà hòa giải viên lao động không tiến hành hòa giải;"},{"k":"p","t":"2. Ban trọng tài lao động không được thành lập hoặc thành lập nhưng không ra quyết định giải quyết tranh chấp hoặc người sử dụng lao động là bên tranh chấp không thực hiện quyết định giải quyết tranh chấp của Ban trọng tài lao động."}]},{"id":"blld-45_200","no":200,"code":"Điều 200","title":"Điều 200. Trình tự đình công","shortTitle":"Trình tự đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Lấy ý kiến về đình công theo quy định tại Điều 201 của Bộ luật này."},{"k":"p","t":"2. Ra quyết định đình công và thông báo đình công theo quy định tại Điều 202 của Bộ luật này."},{"k":"p","t":"3. Tiến hành đình công."}]},{"id":"blld-45_201","no":201,"code":"Điều 201","title":"Điều 201. Lấy ý kiến về đình công","shortTitle":"Lấy ý kiến về đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Trước khi tiến hành đình công, tổ chức đại diện người lao động có quyền tổ chức và lãnh đạo đình công quy định tại Điều 198 của Bộ luật này có trách nhiệm lấy ý kiến của toàn thể người lao động hoặc thành viên ban lãnh đạo của các tổ chức đại diện người lao động tham gia thương lượng."},{"k":"p","t":"2. Nội dung lấy ý kiến bao gồm:"},{"k":"p","t":"a) Đồng ý hay không đồng ý đình công;"},{"k":"p","t":"b) Phương án của tổ chức đại diện người lao động về nội dung quy định tại các điểm b, c và d khoản 2 Điều 202 của Bộ luật này."},{"k":"p","t":"3. Việc lấy ý kiến được thực hiện trực tiếp bằng hình thức lấy phiếu hoặc chữ ký hoặc hình thức khác."},{"k":"p","t":"4. Thời gian, địa điểm và cách thức tiến hành lấy ý kiến về đình công do tổ chức đại diện người lao động quyết định và phải thông báo cho người sử dụng lao động biết trước ít nhất 01 ngày. Việc lấy ý kiến không được làm ảnh hưởng đến hoạt động sản xuất, kinh doanh bình thường của người sử dụng lao động. Người sử dụng lao động không được gây khó khăn, cản trở hoặc can thiệp vào quá trình tổ chức đại diện người lao động tiến hành lấy ý kiến về đình công."}]},{"id":"blld-45_202","no":202,"code":"Điều 202","title":"Điều 202. Quyết định đình công và thông báo thời điểm bắt đầu đình công","shortTitle":"Quyết định đình công và thông báo thời điểm bắt đầu đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Khi có trên 50% số người được lấy ý kiến đồng ý với nội dung lấy ý kiến đình công theo quy định tại khoản 2 Điều 201 của Bộ luật này thì tổ chức đại diện người lao động ra quyết định đình công bằng văn bản."},{"k":"p","t":"2. Quyết định đình công phải có các nội dung sau đây:"},{"k":"p","t":"a) Kết quả lấy ý kiến đình công;"},{"k":"p","t":"b) Thời điểm bắt đầu đình công, địa điểm đình công;"},{"k":"p","t":"c) Phạm vi tiến hành đình công;"},{"k":"p","t":"d) Yêu cầu của người lao động;"},{"k":"p","t":"đ) Họ tên, địa chỉ liên hệ của người đại diện cho tổ chức đại diện người lao động tổ chức và lãnh đạo đình công."},{"k":"p","t":"3. Ít nhất là 05 ngày làm việc trước ngày bắt đầu đình công, tổ chức đại diện người lao động tổ chức và lãnh đạo đình công phải gửi văn bản về việc quyết định đình công cho người sử dụng lao động, Ủy ban nhân dân cấp huyện và cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh."},{"k":"p","t":"4. Đến thời điểm bắt đầu đình công, nếu người sử dụng lao động vẫn không chấp nhận giải quyết yêu cầu của người lao động thì tổ chức đại diện người lao động tổ chức và lãnh đạo đình công."}]},{"id":"blld-45_203","no":203,"code":"Điều 203","title":"Điều 203. Quyền của các bên trước và trong quá trình đình công","shortTitle":"Quyền của các bên trước và trong quá trình đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Tiếp tục thỏa thuận để giải quyết nội dung tranh chấp lao động tập thể hoặc cùng đề nghị hòa giải viên lao động, Hội đồng trọng tài lao động tiến hành hòa giải, giải quyết tranh chấp lao động."},{"k":"p","t":"2. Tổ chức đại diện người lao động có quyền tổ chức và lãnh đạo đình công theo quy định tại Điều 198 của Bộ luật này có quyền sau đây:"},{"k":"p","t":"a) Rút quyết định đình công nếu chưa đình công hoặc chấm dứt đình công nếu đang đình công;"},{"k":"p","t":"b) Yêu cầu Tòa án tuyên bố cuộc đình công là hợp pháp."},{"k":"p","t":"3. Người sử dụng lao động có quyền sau đây:"},{"k":"p","t":"a) Chấp nhận toàn bộ hoặc một phần yêu cầu và thông báo bằng văn bản cho tổ chức đại diện người lao động đang tổ chức và lãnh đạo đình công;"},{"k":"p","t":"b) Đóng cửa tạm thời nơi làm việc trong thời gian đình công do không đủ điều kiện để duy trì hoạt động bình thường hoặc để bảo vệ tài sản;"},{"k":"p","t":"c) Yêu cầu Tòa án tuyên bố cuộc đình công là bất hợp pháp."}]},{"id":"blld-45_204","no":204,"code":"Điều 204","title":"Điều 204. Trường hợp đình công bất hợp pháp","shortTitle":"Trường hợp đình công bất hợp pháp","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Không thuộc trường hợp được đình công quy định tại Điều 199 của Bộ luật này."},{"k":"p","t":"2. Không do tổ chức đại diện người lao động có quyền tổ chức và lãnh đạo đình công."},{"k":"p","t":"3. Vi phạm các quy định về trình tự, thủ tục tiến hành đình công theo quy định của Bộ luật này."},{"k":"p","t":"4. Khi tranh chấp lao động tập thể đang được cơ quan, tổ chức, cá nhân có thẩm quyền giải quyết theo quy định của Bộ luật này."},{"k":"p","t":"5. Tiến hành đình công trong trường hợp không được đình công quy định tại Điều 209 của Bộ luật này."},{"k":"p","t":"6. Khi đã có quyết định hoãn hoặc ngừng đình công của cơ quan có thẩm quyền theo quy định tại Điều 210 của Bộ luật này."}]},{"id":"blld-45_205","no":205,"code":"Điều 205","title":"Điều 205. Thông báo quyết định đóng cửa tạm thời nơi làm việc","shortTitle":"Thông báo quyết định đóng cửa tạm thời nơi làm việc","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"Ít nhất 03 ngày làm việc trước ngày đóng cửa tạm thời nơi làm việc, người sử dụng lao động phải niêm yết công khai quyết định đóng cửa tạm thời nơi làm việc tại nơi làm việc và thông báo cho các cơ quan, tổ chức sau đây:"},{"k":"p","t":"1. Tổ chức đại diện người lao động đang tổ chức và lãnh đạo đình công;"},{"k":"p","t":"2. Ủy ban nhân dân cấp tỉnh có nơi làm việc dự kiến đóng cửa;"},{"k":"p","t":"3. Ủy ban nhân dân cấp huyện có nơi làm việc dự kiến đóng cửa."}]},{"id":"blld-45_206","no":206,"code":"Điều 206","title":"Điều 206. Trường hợp cấm đóng cửa tạm thời nơi làm việc","shortTitle":"Trường hợp cấm đóng cửa tạm thời nơi làm việc","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Trước 12 giờ so với thời điểm bắt đầu đình công ghi trong quyết định đình công."},{"k":"p","t":"2. Sau khi người lao động ngừng đình công."}]},{"id":"blld-45_207","no":207,"code":"Điều 207","title":"Điều 207. Tiền lương và các quyền lợi hợp pháp khác của người lao động trong thời gian đình công","shortTitle":"Tiền lương và các quyền lợi hợp pháp khác của người lao động trong thời gian đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Người lao động không tham gia đình công nhưng phải ngừng việc vì lý do đình công thì được trả lương ngừng việc theo quy định tại khoản 2 Điều 99 của Bộ luật này và các quyền lợi khác theo quy định của pháp luật về lao động."},{"k":"p","t":"2. Người lao động tham gia đình công không được trả lương và các quyền lợi khác theo quy định của pháp luật, trừ trường hợp các bên có thỏa thuận khác."}]},{"id":"blld-45_208","no":208,"code":"Điều 208","title":"Điều 208. Các hành vi bị nghiêm cấm trước, trong và sau khi đình công","shortTitle":"Các hành vi bị nghiêm cấm trước, trong và sau khi đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Cản trở việc thực hiện quyền đình công hoặc kích động, lôi kéo, ép buộc người lao động đình công; cản trở người lao động không tham gia đình công đi làm việc."},{"k":"p","t":"2. Dùng bạo lực; hủy hoại máy, thiết bị, tài sản của người sử dụng lao động."},{"k":"p","t":"3. Xâm phạm trật tự, an toàn công cộng."},{"k":"p","t":"4. Chấm dứt hợp đồng lao động hoặc xử lý kỷ luật lao động đối với người lao động, người lãnh đạo đình công hoặc điều động người lao động, người lãnh đạo đình công sang làm công việc khác, đi làm việc ở nơi khác vì lý do chuẩn bị đình công hoặc tham gia đình công."},{"k":"p","t":"5. Trù dập, trả thù người lao động tham gia đình công, người lãnh đạo đình công."},{"k":"p","t":"6. Lợi dụng đình công để thực hiện hành vi vi phạm pháp luật."}]},{"id":"blld-45_209","no":209,"code":"Điều 209","title":"Điều 209. Nơi sử dụng lao động không được đình công","shortTitle":"Nơi sử dụng lao động không được đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Không được đình công ở nơi sử dụng lao động mà việc đình công có thể đe dọa đến quốc phòng, an ninh, trật tự công cộng, sức khỏe của con người."},{"k":"p","t":"2. Chính phủ quy định danh mục nơi sử dụng lao động không được đình công và việc giải quyết tranh chấp lao động tại nơi sử dụng lao động không được đình công quy định tại khoản 1 Điều này."}]},{"id":"blld-45_210","no":210,"code":"Điều 210","title":"Điều 210. Quyết định hoãn, ngừng đình công","shortTitle":"Quyết định hoãn, ngừng đình công","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Khi xét thấy cuộc đình công có nguy cơ gây thiệt hại nghiêm trọng cho nền kinh tế quốc dân, lợi ích công cộng, đe dọa đến quốc phòng, an ninh, trật tự công cộng, sức khỏe của con người thì Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định hoãn hoặc ngừng đình công."},{"k":"p","t":"2. Chính phủ quy định chi tiết việc hoãn, ngừng đình công và giải quyết quyền lợi của người lao động."}]},{"id":"blld-45_211","no":211,"code":"Điều 211","title":"Điều 211. Xử lý cuộc đình công không đúng trình tự, thủ tục","shortTitle":"Xử lý cuộc đình công không đúng trình tự, thủ tục","chuong":"Chương XIV — GIẢI QUYẾT TRANH CHẤP LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"Trong thời hạn 12 giờ kể từ khi nhận được thông báo về cuộc đình công không tuân theo quy định tại các điều 200, 201 và 202 của Bộ luật này, Chủ tịch Ủy ban nhân dân cấp huyện chủ trì, chỉ đạo cơ quan chuyên môn về lao động phối hợp với công đoàn cùng cấp, cơ quan, tổ chức có liên quan trực tiếp gặp gỡ người sử dụng lao động và đại diện ban lãnh đạo tổ chức đại diện người lao động tại cơ sở để nghe ý kiến, hỗ trợ các bên tìm biện pháp giải quyết, đưa hoạt động sản xuất, kinh doanh trở lại bình thường."},{"k":"p","t":"Trường hợp phát hiện có hành vi vi phạm pháp luật thì lập biên bản, tiến hành xử lý hoặc kiến nghị cơ quan có thẩm quyền xử lý cá nhân, tổ chức đã thực hiện hành vi vi phạm pháp luật theo quy định của pháp luật."},{"k":"p","t":"Đối với các nội dung tranh chấp lao động thì tùy từng loại tranh chấp, hướng dẫn, hỗ trợ các bên tiến hành các thủ tục giải quyết tranh chấp lao động theo quy định của Bộ luật này."}]},{"id":"blld-45_212","no":212,"code":"Điều 212","title":"Điều 212. Nội dung quản lý nhà nước về lao động","shortTitle":"Nội dung quản lý nhà nước về lao động","chuong":"Chương XV — QUẢN LÝ NHÀ NƯỚC VỀ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Ban hành và tổ chức thực hiện văn bản quy phạm pháp luật về lao động."},{"k":"p","t":"2. Theo dõi, thống kê, cung cấp thông tin về cung cầu và biến động cung, cầu lao động; quyết định chính sách tiền lương đối với người lao động; quyết định chính sách, quy hoạch, kế hoạch về nguồn nhân lực, phân bố và sử dụng lao động toàn xã hội, giáo dục nghề nghiệp, phát triển kỹ năng nghề; xây dựng khung trình độ kỹ năng nghề quốc gia, khung trình độ quốc gia Việt Nam đối với các trình độ thuộc giáo dục nghề nghiệp. Quy
