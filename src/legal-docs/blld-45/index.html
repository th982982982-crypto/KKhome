<script id="LD" type="application/json">{"meta":{"title":"Bộ luật 45/2019/QH14 — Bộ Luật Lao động","shortCode":"BLLD 45/2019","subtitle":"Bộ Luật Lao động","slug":"blld-45","effectiveDate":"01/01/2021","scope":"Bộ luật Lao động quy định tiêu chuẩn lao động; quyền, nghĩa vụ, trách nhiệm của người lao động, người sử dụng lao động, tổ chức đại diện người lao động tại cơ sở, tổ chức đại diện người sử dụng lao động trong quan hệ lao động và các quan hệ khác liên quan trực tiếp đến quan hệ lao động; quản lý nhà nước về lao động.","description":"Bộ Luật Lao động","related":[]},"outline":[{"id":"blld-45_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Bộ luật Lao động quy định tiêu chuẩn lao động; quyền, nghĩa vụ, trách nhiệm của người lao động, người sử dụng lao động, tổ chức đại diện người lao động tại cơ sở, tổ chức đại diện người sử dụng lao động trong quan hệ lao động và các quan hệ khác liên quan trực tiếp đến quan hệ lao động; quản lý nhà nước về lao động."}]},{"id":"blld-45_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động, người học nghề, người tập nghề và người làm việc không có quan hệ lao động."},{"k":"p","t":"2. Người sử dụng lao động."},{"k":"p","t":"3. Người lao động nước ngoài làm việc tại Việt Nam."},{"k":"p","t":"4. Cơ quan, tổ chức, cá nhân khác có liên quan trực tiếp đến quan hệ lao động."}]},{"id":"blld-45_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Bộ luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Người lao động là người làm việc cho người sử dụng lao động theo thỏa thuận, được trả lương và chịu sự quản lý, điều hành, giám sát của người sử dụng lao động."},{"k":"p","t":"Độ tuổi lao động tối thiểu của người lao động là đủ 15 tuổi, trừ trường hợp quy định tại Mục 1 Chương XI của Bộ luật này."},{"k":"p","t":"2. Người sử dụng lao động là doanh nghiệp, cơ quan, tổ chức, hợp tác xã, hộ gia đình, cá nhân có thuê mướn, sử dụng người lao động làm việc cho mình theo thỏa thuận; trường hợp người sử dụng lao động là cá nhân thì phải có năng lực hành vi dân sự đầy đủ."},{"k":"p","t":"3. Tổ chức đại diện người lao động tại cơ sở là tổ chức được thành lập trên cơ sở tự nguyện của người lao động tại một đơn vị sử dụng lao động nhằm mục đích bảo vệ quyền và lợi ích hợp pháp, chính đáng của người lao động trong quan hệ lao động thông qua thương lượng tập thể hoặc các hình thức khác theo quy định của pháp luật về lao động. Tổ chức đại diện người lao động tại cơ sở bao gồm công đoàn cơ sở và tổ chức của người lao động tại doanh nghiệp."},{"k":"p","t":"4. Tổ chức đại diện người sử dụng lao động là tổ chức được thành lập hợp pháp, đại diện và bảo vệ quyền, lợi ích hợp pháp của người sử dụng lao động trong quan hệ lao động."},{"k":"p","t":"5. Quan hệ lao động là quan hệ xã hội phát sinh trong việc thuê mướn, sử dụng lao động, trả lương giữa người lao động, người sử dụng lao động, các tổ chức đại diện của các bên, cơ quan nhà nước có thẩm quyền. Quan hệ lao động bao gồm quan hệ lao động cá nhân và quan hệ lao động tập thể."},{"k":"p","t":"6. Người làm việc không có quan hệ lao động là người làm việc không trên cơ sở thuê mướn bằng hợp đồng lao động."},{"k":"p","t":"7. Cưỡng bức lao động là việc dùng vũ lực, đe dọa dùng vũ lực hoặc các thủ đoạn khác để ép buộc người lao động phải làm việc trái ý muốn của họ."},{"k":"p","t":"8. Phân biệt đối xử trong lao động là hành vi phân biệt, loại trừ hoặc ưu tiên dựa trên chủng tộc, màu da, nguồn gốc quốc gia hoặc nguồn gốc xã hội, dân tộc, giới tính, độ tuổi, tình trạng thai sản, tình trạng hôn nhân, tôn giáo, tín ngưỡng, chính kiến, khuyết tật, trách nhiệm gia đình hoặc trên cơ sở tình trạng nhiễm HIV hoặc vì lý do thành lập, gia nhập và hoạt động công đoàn, tổ chức của người lao động tại doanh nghiệp có tác động làm ảnh hưởng đến bình đẳng về cơ hội việc làm hoặc nghề nghiệp."},{"k":"p","t":"Việc phân biệt, loại trừ hoặc ưu tiên xuất phát từ yêu cầu đặc thù của công việc và các hành vi duy trì, bảo vệ việc làm cho người lao động dễ bị tổn thương thì không bị xem là phân biệt đối xử."},{"k":"p","t":"9. Quấy rối tình dục tại nơi làm việc là hành vi có tính chất tình dục của bất kỳ người nào đối với người khác tại nơi làm việc mà không được người đó mong muốn hoặc chấp nhận. Nơi làm việc là bất kỳ nơi nào mà người lao động thực tế làm việc theo thỏa thuận hoặc phân công của người sử dụng lao động."}]},{"id":"blld-45_4","no":4,"code":"Điều 4","title":"Điều 4. Chính sách của Nhà nước về lao động","shortTitle":"Chính sách của Nhà nước về lao động","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Bảo đảm quyền và lợi ích hợp pháp, chính đáng của người lao động, người làm việc không có quan hệ lao động; khuyến khích những thỏa thuận bảo đảm cho người lao động có điều kiện thuận lợi hơn so với quy định của pháp luật về lao động."},{"k":"p","t":"2. Bảo đảm quyền và lợi ích hợp pháp của người sử dụng lao động, quản lý lao động đúng pháp luật, dân chủ, công bằng, văn minh và nâng cao trách nhiệm xã hội."},{"k":"p","t":"3. Tạo điều kiện thuận lợi đối với hoạt động tạo việc làm, tự tạo việc làm, dạy nghề và học nghề để có việc làm; hoạt động sản xuất, kinh doanh thu hút nhiều lao động; áp dụng một số quy định của Bộ luật này đối với người làm việc không có quan hệ lao động."},{"k":"p","t":"4. Có chính sách phát triển, phân bố nguồn nhân lực; nâng cao năng suất lao động; đào tạo, bồi dưỡng và nâng cao trình độ, kỹ năng nghề cho người lao động; hỗ trợ duy trì, chuyển đổi nghề nghiệp, việc làm cho người lao động; ưu đãi đối với người lao động có trình độ chuyên môn, kỹ thuật cao đáp ứng yêu cầu của cách mạng công nghiệp, sự nghiệp công nghiệp hóa, hiện đại hóa đất nước."},{"k":"p","t":"5. Có chính sách phát triển thị trường lao động, đa dạng các hình thức kết nối cung, cầu lao động."},{"k":"p","t":"6. Thúc đẩy người lao động và người sử dụng lao động đối thoại, thương lượng tập thể, xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định."},{"k":"p","t":"7. Bảo đảm bình đẳng giới; quy định chế độ lao động và chính sách xã hội nhằm bảo vệ lao động nữ, lao động là người khuyết tật, người lao động cao tuổi, lao động chưa thành niên."}]},{"id":"blld-45_5","no":5,"code":"Điều 5","title":"Điều 5. Quyền và nghĩa vụ của người lao động","shortTitle":"Quyền và nghĩa vụ của người lao động","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động có các quyền sau đây:"},{"k":"p","t":"a) Làm việc; tự do lựa chọn việc làm, nơi làm việc, nghề nghiệp, học nghề, nâng cao trình độ nghề nghiệp; không bị phân biệt đối xử, cưỡng bức lao động, quấy rối tình dục tại nơi làm việc;"},{"k":"p","t":"b) Hưởng lương phù hợp với trình độ, kỹ năng nghề trên cơ sở thỏa thuận với người sử dụng lao động; được bảo hộ lao động, làm việc trong điều kiện bảo đảm về an toàn, vệ sinh lao động; nghỉ theo chế độ, nghỉ hằng năm có hưởng lương và được hưởng phúc lợi tập thể;"},{"k":"p","t":"c) Thành lập, gia nhập, hoạt động trong tổ chức đại diện người lao động, tổ chức nghề nghiệp và tổ chức khác theo quy định của pháp luật; yêu cầu và tham gia đối thoại, thực hiện quy chế dân chủ, thương lượng tập thể với người sử dụng lao động và được tham vấn tại nơi làm việc để bảo vệ quyền và lợi ích hợp pháp, chính đáng của mình; tham gia quản lý theo nội quy của người sử dụng lao động;"},{"k":"p","t":"d) Từ chối làm việc nếu có nguy cơ rõ ràng đe dọa trực tiếp đến tính mạng, sức khỏe trong quá trình thực hiện công việc;"},{"k":"p","t":"đ) Đơn phương chấm dứt hợp đồng lao động;"},{"k":"p","t":"e) Đình công;"},{"k":"p","t":"g) Các quyền khác theo quy định của pháp luật."},{"k":"p","t":"2. Người lao động có các nghĩa vụ sau đây:"},{"k":"p","t":"a) Thực hiện hợp đồng lao động, thỏa ước lao động tập thể và thỏa thuận hợp pháp khác;"},{"k":"p","t":"b) Chấp hành kỷ luật lao động, nội quy lao động; tuân theo sự quản lý, điều hành, giám sát của người sử dụng lao động;"},{"k":"p","t":"c) Thực hiện quy định của pháp luật về lao động, việc làm, giáo dục nghề nghiệp, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp và an toàn, vệ sinh lao động."}]},{"id":"blld-45_6","no":6,"code":"Điều 6","title":"Điều 6. Quyền và nghĩa vụ của người sử dụng lao động","shortTitle":"Quyền và nghĩa vụ của người sử dụng lao động","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động có các quyền sau đây:"},{"k":"p","t":"a) Tuyển dụng, bố trí, quản lý, điều hành, giám sát lao động; khen thưởng và xử lý vi phạm kỷ luật lao động;"},{"k":"p","t":"b) Thành lập, gia nhập, hoạt động trong tổ chức đại diện người sử dụng lao động, tổ chức nghề nghiệp và tổ chức khác theo quy định của pháp luật;"},{"k":"p","t":"c) Yêu cầu tổ chức đại diện người lao động thương lượng với mục đích ký kết thỏa ước lao động tập thể; tham gia giải quyết tranh chấp lao động, đình công; đối thoại, trao đổi với tổ chức đại diện người lao động về các vấn đề trong quan hệ lao động, cải thiện đời sống vật chất và tinh thần của người lao động;"},{"k":"p","t":"d) Đóng cửa tạm thời nơi làm việc;"},{"k":"p","t":"đ) Các quyền khác theo quy định của pháp luật."},{"k":"p","t":"2. Người sử dụng lao động có các nghĩa vụ sau đây:"},{"k":"p","t":"a) Thực hiện hợp đồng lao động, thỏa ước lao động tập thể và thỏa thuận hợp pháp khác; tôn trọng danh dự, nhân phẩm của người lao động;"},{"k":"p","t":"b) Thiết lập cơ chế và thực hiện đối thoại, trao đổi với người lao động và tổ chức đại diện người lao động; thực hiện quy chế dân chủ ở cơ sở tại nơi làm việc;"},{"k":"p","t":"c) Đào tạo, đào tạo lại, bồi dưỡng nâng cao trình độ, kỹ năng nghề nhằm duy trì, chuyển đổi nghề nghiệp, việc làm cho người lao động;"},{"k":"p","t":"d) Thực hiện quy định của pháp luật về lao động, việc làm, giáo dục nghề nghiệp, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp và an toàn, vệ sinh lao động; xây dựng và thực hiện các giải pháp phòng, chống quấy rối tình dục tại nơi làm việc;"},{"k":"p","t":"đ) Tham gia phát triển tiêu chuẩn kỹ năng nghề quốc gia, đánh giá, công nhận kỹ năng nghề cho người lao động."}]},{"id":"blld-45_7","no":7,"code":"Điều 7","title":"Điều 7. Xây dựng quan hệ lao động","shortTitle":"Xây dựng quan hệ lao động","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Quan hệ lao động được xác lập qua đối thoại, thương lượng, thỏa thuận theo nguyên tắc tự nguyện, thiện chí, bình đẳng, hợp tác, tôn trọng quyền và lợi ích hợp pháp của nhau."},{"k":"p","t":"2. Người sử dụng lao động, tổ chức đại diện người sử dụng lao động và người lao động, tổ chức đại diện người lao động xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định với sự hỗ trợ của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"3. Công đoàn tham gia cùng với cơ quan nhà nước có thẩm quyền hỗ trợ xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định; giám sát việc thi hành quy định của pháp luật về lao động; bảo vệ quyền và lợi ích hợp pháp, chính đáng của người lao động."},{"k":"p","t":"4. Phòng Thương mại và Công nghiệp Việt Nam, Liên minh Hợp tác xã Việt Nam và các tổ chức đại diện của người sử dụng lao động khác được thành lập theo quy định của pháp luật có vai trò đại diện, bảo vệ quyền và lợi ích hợp pháp của người sử dụng lao động, tham gia xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định."}]},{"id":"blld-45_8","no":8,"code":"Điều 8","title":"Điều 8. Các hành vi bị nghiêm cấm trong lĩnh vực lao động","shortTitle":"Các hành vi bị nghiêm cấm trong lĩnh vực lao động","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Phân biệt đối xử trong lao động."},{"k":"p","t":"2. Ngược đãi người lao động, cưỡng bức lao động."},{"k":"p","t":"3. Quấy rối tình dục tại nơi làm việc."},{"k":"p","t":"4. Lợi dụng danh nghĩa dạy nghề, tập nghề để trục lợi, bóc lột sức lao động hoặc lôi kéo, dụ dỗ, ép buộc người học nghề, người tập nghề vào hoạt động trái pháp luật."},{"k":"p","t":"5. Sử dụng lao động chưa qua đào tạo hoặc chưa có chứng chỉ kỹ năng nghề quốc gia đối với nghề, công việc phải sử dụng lao động đã được đào tạo hoặc phải có chứng chỉ kỹ năng nghề quốc gia."},{"k":"p","t":"6. Lôi kéo, dụ dỗ, hứa hẹn, quảng cáo gian dối hoặc thủ đoạn khác để lừa gạt người lao động hoặc để tuyển dụng người lao động với mục đích mua bán người, bóc lột, cưỡng bức lao động hoặc lợi dụng dịch vụ việc làm, hoạt động đưa người lao động đi làm việc ở nước ngoài theo hợp đồng để thực hiện hành vi trái pháp luật."},{"k":"p","t":"7. Sử dụng lao động chưa thành niên trái pháp luật."}]},{"id":"blld-45_9","no":9,"code":"Điều 9","title":"Điều 9. Việc làm, giải quyết việc làm","shortTitle":"Việc làm, giải quyết việc làm","chuong":"Chương II — VIỆC LÀM, TUYỂN DỤNG VÀ QUẢN LÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Việc làm là hoạt động lao động tạo ra thu nhập mà pháp luật không cấm."},{"k":"p","t":"2. Nhà nước, người sử dụng lao động và xã hội có trách nhiệm tham gia giải quyết việc làm, bảo đảm cho mọi người có khả năng lao động đều có cơ hội có việc làm."}]},{"id":"blld-45_10","no":10,"code":"Điều 10","title":"Điều 10. Quyền làm việc của người lao động","shortTitle":"Quyền làm việc của người lao động","chuong":"Chương II — VIỆC LÀM, TUYỂN DỤNG VÀ QUẢN LÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Được tự do lựa chọn việc làm, làm việc cho bất kỳ người sử dụng lao động nào và ở bất kỳ nơi nào mà pháp luật không cấm."},{"k":"p","t":"2. Trực tiếp liên hệ với người sử dụng lao động hoặc thông qua tổ chức dịch vụ việc làm để tìm kiếm việc làm theo nguyện vọng, khả năng, trình độ nghề nghiệp và sức khỏe của mình."}]},{"id":"blld-45_11","no":11,"code":"Điều 11","title":"Điều 11. Tuyển dụng lao động","shortTitle":"Tuyển dụng lao động","chuong":"Chương II — VIỆC LÀM, TUYỂN DỤNG VÀ QUẢN LÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động có quyền trực tiếp hoặc thông qua tổ chức dịch vụ việc làm, doanh nghiệp hoạt động cho thuê lại lao động để tuyển dụng lao động theo nhu cầu của người sử dụng lao động."},{"k":"p","t":"2. Người lao động không phải trả chi phí cho việc tuyển dụng lao động."}]},{"id":"blld-45_12","no":12,"code":"Điều 12","title":"Điều 12. Trách nhiệm quản lý lao động của người sử dụng lao động","shortTitle":"Trách nhiệm quản lý lao động của người sử dụng lao động","chuong":"Chương II — VIỆC LÀM, TUYỂN DỤNG VÀ QUẢN LÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Lập, cập nhật, quản lý, sử dụng sổ quản lý lao động bằng bản giấy hoặc bản điện tử và xuất trình khi cơ quan nhà nước có thẩm quyền yêu cầu."},{"k":"p","t":"2. Khai trình việc sử dụng lao động trong thời hạn 30 ngày kể từ ngày bắt đầu hoạt động, định kỳ báo cáo tình hình thay đổi về lao động trong quá trình hoạt động với cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh và thông báo cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"GIAO KẾT HỢP ĐỒNG LAO ĐỘNG"}]},{"id":"blld-45_13","no":13,"code":"Điều 13","title":"Điều 13. Hợp đồng lao động","shortTitle":"Hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hợp đồng lao động là sự thỏa thuận giữa người lao động và người sử dụng lao động về việc làm có trả công, tiền lương, điều kiện lao động, quyền và nghĩa vụ của mỗi bên trong quan hệ lao động."},{"k":"p","t":"Trường hợp hai bên thỏa thuận bằng tên gọi khác nhưng có nội dung thể hiện về việc làm có trả công, tiền lương và sự quản lý, điều hành, giám sát của một bên thì được coi là hợp đồng lao động."},{"k":"p","t":"2. Trước khi nhận người lao động vào làm việc thì người sử dụng lao động phải giao kết hợp đồng lao động với người lao động."}]},{"id":"blld-45_14","no":14,"code":"Điều 14","title":"Điều 14. Hình thức hợp đồng lao động","shortTitle":"Hình thức hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hợp đồng lao động phải được giao kết bằng văn bản và được làm thành 02 bản, người lao động giữ 01 bản, người sử dụng lao động giữ 01 bản, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"Hợp đồng lao động được giao kết thông qua phương tiện điện tử dưới hình thức thông điệp dữ liệu theo quy định của pháp luật về giao dịch điện tử có giá trị như hợp đồng lao động bằng văn bản."},{"k":"p","t":"2. Hai bên có thể giao kết hợp đồng lao động bằng lời nói đối với hợp đồng có thời hạn dưới 01 tháng, trừ trường hợp quy định tại khoản 2 Điều 18, điểm a khoản 1 Điều 145 và khoản 1 Điều 162 của Bộ luật này."}]},{"id":"blld-45_15","no":15,"code":"Điều 15","title":"Điều 15. Nguyên tắc giao kết hợp đồng lao động","shortTitle":"Nguyên tắc giao kết hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Tự nguyện, bình đẳng, thiện chí, hợp tác và trung thực."},{"k":"p","t":"2. Tự do giao kết hợp đồng lao động nhưng không được trái pháp luật, thỏa ước lao động tập thể và đạo đức xã hội."}]},{"id":"blld-45_16","no":16,"code":"Điều 16","title":"Điều 16. Nghĩa vụ cung cấp thông tin khi giao kết hợp đồng lao động","shortTitle":"Nghĩa vụ cung cấp thông tin khi giao kết hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải cung cấp thông tin trung thực cho người lao động về công việc, địa điểm làm việc, điều kiện làm việc, thời giờ làm việc, thời giờ nghỉ ngơi, an toàn, vệ sinh lao động, tiền lương, hình thức trả lương, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, quy định về bảo vệ bí mật kinh doanh, bảo vệ bí mật công nghệ và vấn đề khác liên quan trực tiếp đến việc giao kết hợp đồng lao động mà người lao động yêu cầu."},{"k":"p","t":"2. Người lao động phải cung cấp thông tin trung thực cho người sử dụng lao động về họ tên, ngày tháng năm sinh, giới tính, nơi cư trú, trình độ học vấn, trình độ kỹ năng nghề, xác nhận tình trạng sức khỏe và vấn đề khác liên quan trực tiếp đến việc giao kết hợp đồng lao động mà người sử dụng lao động yêu cầu."}]},{"id":"blld-45_17","no":17,"code":"Điều 17","title":"Điều 17. Hành vi người sử dụng lao động không được làm khi giao kết, thực hiện hợp đồng lao động","shortTitle":"Hành vi người sử dụng lao động không được làm khi giao kết, thực hiện hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Giữ bản chính giấy tờ tùy thân, văn bằng, chứng chỉ của người lao động."},{"k":"p","t":"2. Yêu cầu người lao động phải thực hiện biện pháp bảo đảm bằng tiền hoặc tài sản khác cho việc thực hiện hợp đồng lao động."},{"k":"p","t":"3. Buộc người lao động thực hiện hợp đồng lao động để trả nợ cho người sử dụng lao động."}]},{"id":"blld-45_18","no":18,"code":"Điều 18","title":"Điều 18. Thẩm quyền giao kết hợp đồng lao động","shortTitle":"Thẩm quyền giao kết hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người lao động trực tiếp giao kết hợp đồng lao động, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Đối với công việc theo mùa vụ, công việc nhất định có thời hạn dưới 12 tháng thì nhóm người lao động từ đủ 18 tuổi trở lên có thể ủy quyền cho một người lao động trong nhóm để giao kết hợp đồng lao động; trong trường hợp này, hợp đồng lao động phải được giao kết bằng văn bản và có hiệu lực như giao kết với từng người lao động."},{"k":"p","t":"Hợp đồng lao động do người được ủy quyền ký kết phải kèm theo danh sách ghi rõ họ tên, ngày tháng năm sinh, giới tính, nơi cư trú và chữ ký của từng người lao động."},{"k":"p","t":"3. Người giao kết hợp đồng lao động bên phía người sử dụng lao động là người thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Người đại diện theo pháp luật của doanh nghiệp hoặc người được ủy quyền theo quy định của pháp luật;"},{"k":"p","t":"b) Người đứng đầu cơ quan, tổ chức có tư cách pháp nhân theo quy định của pháp luật hoặc người được ủy quyền theo quy định của pháp luật;"},{"k":"p","t":"c) Người đại diện của hộ gia đình, tổ hợp tác, tổ chức khác không có tư cách pháp nhân hoặc người được ủy quyền theo quy định của pháp luật;"},{"k":"p","t":"d) Cá nhân trực tiếp sử dụng lao động."},{"k":"p","t":"4. Người giao kết hợp đồng lao động bên phía người lao động là người thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Người lao động từ đủ 18 tuổi trở lên;"},{"k":"p","t":"b) Người lao động từ đủ 15 tuổi đến chưa đủ 18 tuổi khi có sự đồng ý bằng văn bản của người đại diện theo pháp luật của người đó;"},{"k":"p","t":"c) Người chưa đủ 15 tuổi và người đại diện theo pháp luật của người đó;"},{"k":"p","t":"d) Người lao động được những người lao động trong nhóm ủy quyền hợp pháp giao kết hợp đồng lao động."},{"k":"p","t":"5. Người được ủy quyền giao kết hợp đồng lao động không được ủy quyền lại cho người khác giao kết hợp đồng lao động."}]},{"id":"blld-45_19","no":19,"code":"Điều 19","title":"Điều 19. Giao kết nhiều hợp đồng lao động","shortTitle":"Giao kết nhiều hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người lao động có thể giao kết nhiều hợp đồng lao động với nhiều người sử dụng lao động nhưng phải bảo đảm thực hiện đầy đủ các nội dung đã giao kết."},{"k":"p","t":"2. Người lao động đồng thời giao kết nhiều hợp đồng lao động với nhiều người sử dụng lao động thì việc tham gia bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp được thực hiện theo quy định của pháp luật về bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp và an toàn, vệ sinh lao động."}]},{"id":"blld-45_20","no":20,"code":"Điều 20","title":"Điều 20. Loại hợp đồng lao động","shortTitle":"Loại hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hợp đồng lao động phải được giao kết theo một trong các loại sau đây:"},{"k":"p","t":"a) Hợp đồng lao động không xác định thời hạn là hợp đồng mà trong đó hai bên không xác định thời hạn, thời điểm chấm dứt hiệu lực của hợp đồng;"},{"k":"p","t":"b) Hợp đồng lao động xác định thời hạn là hợp đồng mà trong đó hai bên xác định thời hạn, thời điểm chấm dứt hiệu lực của hợp đồng trong thời gian không quá 36 tháng kể từ thời điểm có hiệu lực của hợp đồng."},{"k":"p","t":"2. Khi hợp đồng lao động quy định tại điểm b khoản 1 Điều này hết hạn mà người lao động vẫn tiếp tục làm việc thì thực hiện như sau:"},{"k":"p","t":"a) Trong thời hạn 30 ngày kể từ ngày hợp đồng lao động hết hạn, hai bên phải ký kết hợp đồng lao động mới; trong thời gian chưa ký kết hợp đồng lao động mới thì quyền, nghĩa vụ và lợi ích của hai bên được thực hiện theo hợp đồng đã giao kết;"},{"k":"p","t":"b) Nếu hết thời hạn 30 ngày kể từ ngày hợp đồng lao động hết hạn mà hai bên không ký kết hợp đồng lao động mới thì hợp đồng đã giao kết theo quy định tại điểm b khoản 1 Điều này trở thành hợp đồng lao động không xác định thời hạn;"},{"k":"p","t":"c) Trường hợp hai bên ký kết hợp đồng lao động mới là hợp đồng lao động xác định thời hạn thì cũng chỉ được ký thêm 01 lần, sau đó nếu người lao động vẫn tiếp tục làm việc thì phải ký kết hợp đồng lao động không xác định thời hạn, trừ hợp đồng lao động đối với người được thuê làm giám đốc trong doanh nghiệp có vốn nhà nước và trường hợp quy định tại khoản 1 Điều 149, khoản 2 Điều 151 và khoản 4 Điều 177 của Bộ luật này."}]},{"id":"blld-45_21","no":21,"code":"Điều 21","title":"Điều 21. Nội dung hợp đồng lao động","shortTitle":"Nội dung hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hợp đồng lao động phải có những nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Tên, địa chỉ của người sử dụng lao động và họ tên, chức danh của người giao kết hợp đồng lao động bên phía người sử dụng lao động;"},{"k":"p","t":"b) Họ tên, ngày tháng năm sinh, giới tính, nơi cư trú, số thẻ Căn cước công dân, Chứng minh nhân dân hoặc hộ chiếu của người giao kết hợp đồng lao động bên phía người lao động;"},{"k":"p","t":"c) Công việc và địa điểm làm việc;"},{"k":"p","t":"d) Thời hạn của hợp đồng lao động;"},{"k":"p","t":"đ) Mức lương theo công việc hoặc chức danh, hình thức trả lương, thời hạn trả lương, phụ cấp lương và các khoản bổ sung khác;"},{"k":"p","t":"e) Chế độ nâng bậc, nâng lương;"},{"k":"p","t":"g) Thời giờ làm việc, thời giờ nghỉ ngơi;"},{"k":"p","t":"h) Trang bị bảo hộ lao động cho người lao động;"},{"k":"p","t":"i) Bảo hiểm xã hội, bảo hiểm y tế và bảo hiểm thất nghiệp;"},{"k":"p","t":"k) Đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề."},{"k":"p","t":"2. Khi người lao động làm việc có liên quan trực tiếp đến bí mật kinh doanh, bí mật công nghệ theo quy định của pháp luật thì người sử dụng lao động có quyền thỏa thuận bằng văn bản với người lao động về nội dung, thời hạn bảo vệ bí mật kinh doanh, bảo vệ bí mật công nghệ, quyền lợi và việc bồi thường trong trường hợp vi phạm."},{"k":"p","t":"3. Đối với người lao động làm việc trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp thì tùy theo loại công việc mà hai bên có thể giảm một số nội dung chủ yếu của hợp đồng lao động và thỏa thuận bổ sung nội dung về phương thức giải quyết trong trường hợp thực hiện hợp đồng chịu ảnh hưởng của thiên tai, hỏa hoạn, thời tiết."},{"k":"p","t":"4. Chính phủ quy định nội dung của hợp đồng lao động đối với người lao động được thuê làm giám đốc trong doanh nghiệp có vốn nhà nước."},{"k":"p","t":"5. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết các khoản 1,2 và 3 Điều này."}]},{"id":"blld-45_22","no":22,"code":"Điều 22","title":"Điều 22. Phụ lục hợp đồng lao động","shortTitle":"Phụ lục hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Phụ lục hợp đồng lao động là bộ phận của hợp đồng lao động và có hiệu lực như hợp đồng lao động."},{"k":"p","t":"2. Phụ lục hợp đồng lao động quy định chi tiết, sửa đổi, bổ sung một số điều, khoản của hợp đồng lao động nhưng không được sửa đổi thời hạn của hợp đồng lao động."},{"k":"p","t":"Trường hợp phụ lục hợp đồng lao động quy định chi tiết một số điều, khoản của hợp đồng lao động mà dẫn đến cách hiểu khác với hợp đồng lao động thì thực hiện theo nội dung của hợp đồng lao động."},{"k":"p","t":"Trường hợp phụ lục hợp đồng lao động sửa đổi, bổ sung một số điều, khoản của hợp đồng lao động thì phải ghi rõ nội dung điều, khoản sửa đổi, bổ sung và thời điểm có hiệu lực."}]},{"id":"blld-45_23","no":23,"code":"Điều 23","title":"Điều 23. Hiệu lực của hợp đồng lao động","shortTitle":"Hiệu lực của hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Hợp đồng lao động có hiệu lực kể từ ngày hai bên giao kết, trừ trường hợp hai bên có thỏa thuận hoặc pháp luật có quy định khác."}]},{"id":"blld-45_24","no":24,"code":"Điều 24","title":"Điều 24. Thử việc","shortTitle":"Thử việc","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động và người lao động có thể thỏa thuận nội dung thử việc ghi trong hợp đồng lao động hoặc thỏa thuận về thử việc bằng việc giao kết hợp đồng thử việc."},{"k":"p","t":"2. Nội dung chủ yếu của hợp đồng thử việc gồm thời gian thử việc và nội dung quy định tại các điểm a, b, c, đ, g và h khoản 1 Điều 21 của Bộ luật này."},{"k":"p","t":"3. Không áp dụng thử việc đối với người lao động giao kết hợp đồng lao động có thời hạn dưới 01 tháng."}]},{"id":"blld-45_25","no":25,"code":"Điều 25","title":"Điều 25. Thời gian thử việc","shortTitle":"Thời gian thử việc","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Thời gian thử việc do hai bên thỏa thuận căn cứ vào tính chất và mức độ phức tạp của công việc nhưng chỉ được thử việc một lần đối với một công việc và bảo đảm điều kiện sau đây:"},{"k":"p","t":"1. Không quá 180 ngày đối với công việc của người quản lý doanh nghiệp theo quy định của Luật Doanh nghiệp, Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp;"},{"k":"p","t":"2. Không quá 60 ngày đối với công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật từ cao đẳng trở lên;"},{"k":"p","t":"3. Không quá 30 ngày đối với công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật trung cấp, công nhân kỹ thuật, nhân viên nghiệp vụ;"},{"k":"p","t":"4. Không quá 06 ngày làm việc đối với công việc khác."}]},{"id":"blld-45_26","no":26,"code":"Điều 26","title":"Điều 26. Tiền lương thử việc","shortTitle":"Tiền lương thử việc","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Tiền lương của người lao động trong thời gian thử việc do hai bên thỏa thuận nhưng ít nhất phải bằng 85% mức lương của công việc đó."}]},{"id":"blld-45_27","no":27,"code":"Điều 27","title":"Điều 27. Kết thúc thời gian thử việc","shortTitle":"Kết thúc thời gian thử việc","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Khi kết thúc thời gian thử việc, người sử dụng lao động phải thông báo kết quả thử việc cho người lao động."},{"k":"p","t":"Trường hợp thử việc đạt yêu cầu thì người sử dụng lao động tiếp tục thực hiện hợp đồng lao động đã giao kết đối với trường hợp thỏa thuận thử việc trong hợp đồng lao động hoặc phải giao kết hợp đồng lao động đối với trường hợp giao kết hợp đồng thử việc."},{"k":"p","t":"Trường hợp thử việc không đạt yêu cầu thì chấm dứt hợp đồng lao động đã giao kết hoặc hợp đồng thử việc."},{"k":"p","t":"2. Trong thời gian thử việc, mỗi bên có quyền hủy bỏ hợp đồng thử việc hoặc hợp đồng lao động đã giao kết mà không cần báo trước và không phải bồi thường."},{"k":"p","t":"THỰC HIỆN HỢP ĐỒNG LAO ĐỘNG"}]},{"id":"blld-45_28","no":28,"code":"Điều 28","title":"Điều 28. Thực hiện công việc theo hợp đồng lao động","shortTitle":"Thực hiện công việc theo hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Công việc theo hợp đồng lao động phải do người lao động đã giao kết hợp đồng thực hiện. Địa điểm làm việc được thực hiện theo hợp đồng lao động, trừ trường hợp hai bên có thỏa thuận khác."}]},{"id":"blld-45_29","no":29,"code":"Điều 29","title":"Điều 29. Chuyển người lao động làm công việc khác so với hợp đồng lao động","shortTitle":"Chuyển người lao động làm công việc khác so với hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Khi gặp khó khăn đột xuất do thiên tai, hỏa hoạn, dịch bệnh nguy hiểm, áp dụng biện pháp ngăn ngừa, khắc phục tai nạn lao động, bệnh nghề nghiệp, sự cố điện, nước hoặc do nhu cầu sản xuất, kinh doanh thì người sử dụng lao động được quyền tạm thời chuyển người lao động làm công việc khác so với hợp đồng lao động nhưng không được quá 60 ngày làm việc cộng dồn trong 01 năm; trường hợp chuyển người lao động làm công việc khác so với hợp đồng lao động quá 60 ngày làm việc cộng dồn trong 01 năm thì chỉ được thực hiện khi người lao động đồng ý bằng văn bản."},{"k":"p","t":"Người sử dụng lao động quy định cụ thể trong nội quy lao động những trường hợp do nhu cầu sản xuất, kinh doanh mà người sử dụng lao động được tạm thời chuyển người lao động làm công việc khác so với hợp đồng lao động."},{"k":"p","t":"2. Khi tạm thời chuyển người lao động làm công việc khác so với hợp đồng lao động quy định tại khoản 1 Điều này, người sử dụng lao động phải báo cho người lao động biết trước ít nhất 03 ngày làm việc, thông báo rõ thời hạn làm tạm thời và bố trí công việc phù hợp với sức khỏe, giới tính của người lao động."},{"k":"p","t":"3. Người lao động chuyển sang làm công việc khác so với hợp đồng lao động được trả lương theo công việc mới. Nếu tiền lương của công việc mới thấp hơn tiền lương của công việc cũ thì được giữ nguyên tiền lương của công việc cũ trong thời hạn 30 ngày làm việc. Tiền lương theo công việc mới ít nhất phải bằng 85% tiền lương của công việc cũ nhưng không thấp hơn mức lương tối thiểu."},{"k":"p","t":"4. Người lao động không đồng ý tạm thời làm công việc khác so với hợp đồng lao động quá 60 ngày làm việc cộng dồn trong 01 năm mà phải ngừng việc thì người sử dụng lao động phải trả lương ngừng việc theo quy định tại Điều 99 của Bộ luật này."}]},{"id":"blld-45_30","no":30,"code":"Điều 30","title":"Điều 30. Tạm hoãn thực hiện hợp đồng lao động","shortTitle":"Tạm hoãn thực hiện hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Các trường hợp tạm hoãn thực hiện hợp đồng lao động bao gồm:"},{"k":"p","t":"a) Người lao động thực hiện nghĩa vụ quân sự, nghĩa vụ tham gia Dân quân tự vệ;"},{"k":"p","t":"b) Người lao động bị tạm giữ, tạm giam theo quy định của pháp luật về tố tụng hình sự;"},{"k":"p","t":"c) Người lao động phải chấp hành quyết định áp dụng biện pháp đưa vào trường giáo dưỡng, cơ sở cai nghiện bắt buộc hoặc cơ sở giáo dục bắt buộc;"},{"k":"p","t":"d) Lao động nữ mang thai theo quy định tại Điều 138 của Bộ luật này;"},{"k":"p","t":"đ) Người lao động được bổ nhiệm làm người quản lý doanh nghiệp của công ty trách nhiệm hữu hạn một thành viên do Nhà nước nắm giữ 100% vốn điều lệ;"},{"k":"p","t":"e) Người lao động được ủy quyền để thực hiện quyền, trách nhiệm của đại diện chủ sở hữu nhà nước đối với phần vốn nhà nước tại doanh nghiệp;"},{"k":"p","t":"g) Người lao động được ủy quyền để thực hiện quyền, trách nhiệm của doanh nghiệp đối với phần vốn của doanh nghiệp đầu tư tại doanh nghiệp khác;"},{"k":"p","t":"h) Trường hợp khác do hai bên thỏa thuận."},{"k":"p","t":"2. Trong thời gian tạm hoãn thực hiện hợp đồng lao động, người lao động không được hưởng lương và quyền, lợi ích đã giao kết trong hợp đồng lao động, trừ trường hợp hai bên có thỏa thuận hoặc pháp luật có quy định khác."}]},{"id":"blld-45_31","no":31,"code":"Điều 31","title":"Điều 31. Nhận lại người lao động hết thời hạn tạm hoãn thực hiện hợp đồng lao động","shortTitle":"Nhận lại người lao động hết thời hạn tạm hoãn thực hiện hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Trong thời hạn 15 ngày kể từ ngày hết thời hạn tạm hoãn thực hiện hợp đồng lao động, người lao động phải có mặt tại nơi làm việc và người sử dụng lao động phải nhận người lao động trở lại làm công việc theo hợp đồng lao động đã giao kết nếu hợp đồng lao động còn thời hạn, trừ trường hợp hai bên có thỏa thuận hoặc pháp luật có quy định khác."}]},{"id":"blld-45_32","no":32,"code":"Điều 32","title":"Điều 32. Làm việc không trọn thời gian","shortTitle":"Làm việc không trọn thời gian","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động làm việc không trọn thời gian là người lao động có thời gian làm việc ngắn hơn so với thời gian làm việc bình thường theo ngày hoặc theo tuần hoặc theo tháng được quy định trong pháp luật về lao động, thỏa ước lao động tập thể hoặc nội quy lao động."},{"k":"p","t":"2. Người lao động thỏa thuận với người sử dụng lao động làm việc không trọn thời gian khi giao kết hợp đồng lao động."},{"k":"p","t":"3. Người lao động làm việc không trọn thời gian được hưởng lương; bình đẳng trong thực hiện quyền và nghĩa vụ với người lao động làm việc trọn thời gian; bình đẳng về cơ hội, không bị phân biệt đối xử, bảo đảm an toàn, vệ sinh lao động."}]},{"id":"blld-45_33","no":33,"code":"Điều 33","title":"Điều 33. Sửa đổi, bổ sung hợp đồng lao động","shortTitle":"Sửa đổi, bổ sung hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trong quá trình thực hiện hợp đồng lao động, nếu bên nào có yêu cầu sửa đổi, bổ sung nội dung hợp đồng lao động thì phải báo cho bên kia biết trước ít nhất 03 ngày làm việc về nội dung cần sửa đổi, bổ sung."},{"k":"p","t":"2. Trường hợp hai bên thỏa thuận được thì việc sửa đổi, bổ sung nội dung hợp đồng lao động được tiến hành bằng việc ký kết phụ lục hợp đồng lao động hoặc giao kết hợp đồng lao động mới."},{"k":"p","t":"3. Trường hợp hai bên không thỏa thuận được việc sửa đổi, bổ sung nội dung hợp đồng lao động thì tiếp tục thực hiện hợp đồng lao động đã giao kết."},{"k":"p","t":"CHẤM DỨT HỢP ĐỒNG LAO ĐỘNG"}]},{"id":"blld-45_34","no":34,"code":"Điều 34","title":"Điều 34. Các trường hợp chấm dứt hợp đồng lao động","shortTitle":"Các trường hợp chấm dứt hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hết hạn hợp đồng lao động, trừ trường hợp quy định tại khoản 4 Điều 177 của Bộ luật này."},{"k":"p","t":"2. Đã hoàn thành công việc theo hợp đồng lao động."},{"k":"p","t":"3. Hai bên thỏa thuận chấm dứt hợp đồng lao động."},{"k":"p","t":"4. Người lao động bị kết án phạt tù nhưng không được hưởng án treo hoặc không thuộc trường hợp được trả tự do theo quy định tại khoản 5 Điều 328 của Bộ luật Tố tụng hình sự, tử hình hoặc bị cấm làm công việc ghi trong hợp đồng lao động theo bản án, quyết định của Tòa án đã có hiệu lực pháp luật."},{"k":"p","t":"5. Người lao động là người nước ngoài làm việc tại Việt Nam bị trục xuất theo bản án, quyết định của Tòa án đã có hiệu lực pháp luật, quyết định của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"6. Người lao động chết; bị Tòa án tuyên bố mất năng lực hành vi dân sự, mất tích hoặc đã chết."},{"k":"p","t":"7. Người sử dụng lao động là cá nhân chết; bị Tòa án tuyên bố mất năng lực hành vi dân sự, mất tích hoặc đã chết. Người sử dụng lao động không phải là cá nhân chấm dứt hoạt động hoặc bị cơ quan chuyên môn về đăng ký kinh doanh thuộc Ủy ban nhân dân cấp tỉnh ra thông báo không có người đại diện theo pháp luật, người được ủy quyền thực hiện quyền và nghĩa vụ của người đại diện theo pháp luật."},{"k":"p","t":"8. Người lao động bị xử lý kỷ luật sa thải."},{"k":"p","t":"9. Người lao động đơn phương chấm dứt hợp đồng lao động theo quy định tại Điều 35 của Bộ luật này."},{"k":"p","t":"10. Người sử dụng lao động đơn phương chấm dứt hợp đồng lao động theo quy định tại Điều 36 của Bộ luật này."},{"k":"p","t":"11. Người sử dụng lao động cho người lao động thôi việc theo quy định tại Điều 42 và Điều 43 của Bộ luật này."},{"k":"p","t":"12. Giấy phép lao động hết hiệu lực đối với người lao động là người nước ngoài làm việc tại Việt Nam theo quy định tại Điều 156 của Bộ luật này."},{"k":"p","t":"13. Trường hợp thỏa thuận nội dung thử việc ghi trong hợp đồng lao động mà thử việc không đạt yêu cầu hoặc một bên hủy bỏ thỏa thuận thử việc."}]},{"id":"blld-45_35","no":35,"code":"Điều 35","title":"Điều 35. Quyền đơn phương chấm dứt hợp đồng lao động của người lao động","shortTitle":"Quyền đơn phương chấm dứt hợp đồng lao động của người lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động có quyền đơn phương chấm dứt hợp đồng lao động nhưng phải báo trước cho người sử dụng lao động như sau:"},{"k":"p","t":"a) Ít nhất 45 ngày nếu làm việc theo hợp đồng lao động không xác định thời hạn;"},{"k":"p","t":"b) Ít nhất 30 ngày nếu làm việc theo hợp đồng lao động xác định thời hạn có thời hạn từ 12 tháng đến 36 tháng;"},{"k":"p","t":"c) Ít nhất 03 ngày làm việc nếu làm việc theo hợp đồng lao động xác định thời hạn có thời hạn dưới 12 tháng;"},{"k":"p","t":"d) Đối với một số ngành, nghề, công việc đặc thù thì thời hạn báo trước được thực hiện theo quy định của Chính phủ."},{"k":"p","t":"2. Người lao động có quyền đơn phương chấm dứt hợp đồng lao động không cần báo trước trong trường hợp sau đây:"},{"k":"p","t":"a) Không được bố trí theo đúng công việc, địa điểm làm việc hoặc không được bảo đảm điều kiện làm việc theo thỏa thuận, trừ trường hợp quy định tại Điều 29 của Bộ luật này;"},{"k":"p","t":"b) Không được trả đủ lương hoặc trả lương không đúng thời hạn, trừ trường hợp quy định tại khoản 4 Điều 97 của Bộ luật này;"},{"k":"p","t":"c) Bị người sử dụng lao động ngược đãi, đánh đập hoặc có lời nói, hành vi nhục mạ, hành vi làm ảnh hưởng đến sức khỏe, nhân phẩm, danh dự; bị cưỡng bức lao động;"},{"k":"p","t":"d) Bị quấy rối tình dục tại nơi làm việc;"},{"k":"p","t":"đ) Lao động nữ mang thai phải nghỉ việc theo quy định tại khoản 1 Điều 138 của Bộ luật này;"},{"k":"p","t":"e) Đủ tuổi nghỉ hưu theo quy định tại Điều 169 của Bộ luật này, trừ trường hợp các bên có thỏa thuận khác;"},{"k":"p","t":"g) Người sử dụng lao động cung cấp thông tin không trung thực theo quy định tại khoản 1 Điều 16 của Bộ luật này làm ảnh hưởng đến việc thực hiện hợp đồng lao động."}]},{"id":"blld-45_36","no":36,"code":"Điều 36","title":"Điều 36. Quyền đơn phương chấm dứt hợp đồng lao động của người sử dụng lao động","shortTitle":"Quyền đơn phương chấm dứt hợp đồng lao động của người sử dụng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động có quyền đơn phương chấm dứt hợp đồng lao động trong trường hợp sau đây:"},{"k":"p","t":"a) Người lao động thường xuyên không hoàn thành công việc theo hợp đồng lao động được xác định theo tiêu chí đánh giá mức độ hoàn thành công việc trong quy chế của người sử dụng lao động. Quy chế đánh giá mức độ hoàn thành công việc do người sử dụng lao động ban hành nhưng phải tham khảo ý kiến tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở;"},{"k":"p","t":"b) Người lao động bị ốm đau, tai nạn đã điều trị 12 tháng liên tục đối với người làm việc theo hợp đồng lao động không xác định thời hạn hoặc đã điều trị 06 tháng liên tục đối với người làm việc theo hợp đồng lao động xác định thời hạn có thời hạn từ 12 tháng đến 36 tháng hoặc quá nửa thời hạn hợp đồng lao động đối với người làm việc theo hợp đồng lao động xác định thời hạn có thời hạn dưới 12 tháng mà khả năng lao động chưa hồi phục."},{"k":"p","t":"Khi sức khỏe của người lao động bình phục thì người sử dụng lao động xem xét để tiếp tục giao kết hợp đồng lao động với người lao động;"},{"k":"p","t":"c) Do thiên tai, hỏa hoạn, dịch bệnh nguy hiểm, địch họa hoặc di dời, thu hẹp sản xuất, kinh doanh theo yêu cầu của cơ quan nhà nước có thẩm quyền mà người sử dụng lao động đã tìm mọi biện pháp khắc phục nhưng vẫn buộc phải giảm chỗ làm việc;"},{"k":"p","t":"d) Người lao động không có mặt tại nơi làm việc sau thời hạn quy định tại Điều 31 của Bộ luật này;"},{"k":"p","t":"đ) Người lao động đủ tuổi nghỉ hưu theo quy định tại Điều 169 của Bộ luật này, trừ trường hợp có thỏa thuận khác;"},{"k":"p","t":"e) Người lao động tự ý bỏ việc mà không có lý do chính đáng từ 05 ngày làm việc liên tục trở lên;"},{"k":"p","t":"g) Người lao động cung cấp không trung thực thông tin theo quy định tại khoản 2 Điều 16 của Bộ luật này khi giao kết hợp đồng lao động làm ảnh hưởng đến việc tuyển dụng người lao động."},{"k":"p","t":"2. Khi đơn phương chấm dứt hợp đồng lao động trong trường hợp quy định tại các điểm a, b, c, đ và g khoản 1 Điều này, người sử dụng lao động phải báo trước cho người lao động như sau:"},{"k":"p","t":"a) Ít nhất 45 ngày đối với hợp đồng lao động không xác định thời hạn;"},{"k":"p","t":"b) Ít nhất 30 ngày đối với hợp đồng lao động xác định thời hạn có thời hạn từ 12 tháng đến 36 tháng;"},{"k":"p","t":"c) Ít nhất 03 ngày làm việc đối với hợp đồng lao động xác định thời hạn có thời hạn dưới 12 tháng và đối với trường hợp quy định tại điểm b khoản 1 Điều này;"},{"k":"p","t":"d) Đối với một số ngành, nghề, công việc đặc thù thì thời hạn báo trước được thực hiện theo quy định của Chính phủ."},{"k":"p","t":"3. Khi đơn phương chấm dứt hợp đồng lao động quy định tại điểm d và điểm e khoản 1 Điều này thì người sử dụng lao động không phải báo trước cho người lao động."}]},{"id":"blld-45_37","no":37,"code":"Điều 37","title":"Điều 37. Trường hợp người sử dụng lao động không được thực hiện quyền đơn phương chấm dứt hợp đồng lao động","shortTitle":"Trường hợp người sử dụng lao động không được thực hiện quyền đơn phương chấm dứt hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động ốm đau hoặc bị tai nạn, bệnh nghề nghiệp đang điều trị, điều dưỡng theo chỉ định của cơ sở khám bệnh, chữa bệnh có thẩm quyền, trừ trường hợp quy định tại điểm b khoản 1 Điều 36 của Bộ luật này."},{"k":"p","t":"2. Người lao động đang nghỉ hằng năm, nghỉ việc riêng và trường hợp nghỉ khác được người sử dụng lao động đồng ý."},{"k":"p","t":"3. Người lao động nữ mang thai; người lao động đang nghỉ thai sản hoặc nuôi con dưới 12 tháng tuổi."}]},{"id":"blld-45_38","no":38,"code":"Điều 38","title":"Điều 38. Hủy bỏ việc đơn phương chấm dứt hợp đồng lao động","shortTitle":"Hủy bỏ việc đơn phương chấm dứt hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Mỗi bên đều có quyền hủy bỏ việc đơn phương chấm dứt hợp đồng lao động trước khi hết thời hạn báo trước nhưng phải thông báo bằng văn bản và phải được bên kia đồng ý."}]},{"id":"blld-45_39","no":39,"code":"Điều 39","title":"Điều 39. Đơn phương chấm dứt hợp đồng lao động trái pháp luật","shortTitle":"Đơn phương chấm dứt hợp đồng lao động trái pháp luật","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Đơn phương chấm dứt hợp đồng lao động trái pháp luật là trường hợp chấm dứt hợp đồng lao động không đúng quy định tại các điều 35, 36 và 37 của Bộ luật này."}]},{"id":"blld-45_40","no":40,"code":"Điều 40","title":"Điều 40. Nghĩa vụ của người lao động khi đơn phương chấm dứt hợp đồng lao động trái pháp luật","shortTitle":"Nghĩa vụ của người lao động khi đơn phương chấm dứt hợp đồng lao động trái pháp luật","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Không được trợ cấp thôi việc."},{"k":"p","t":"2. Phải bồi thường cho người sử dụng lao động nửa tháng tiền lương theo hợp đồng lao động và một khoản tiền tương ứng với tiền lương theo hợp đồng lao động trong những ngày không báo trước."},{"k":"p","t":"3. Phải hoàn trả cho người sử dụng lao động chi phí đào tạo quy định tại Điều 62 của Bộ luật này."}]},{"id":"blld-45_41","no":41,"code":"Điều 41","title":"Điều 41. Nghĩa vụ của người sử dụng lao động khi đơn phương chấm dứt hợp đồng lao động trái pháp luật","shortTitle":"Nghĩa vụ của người sử dụng lao động khi đơn phương chấm dứt hợp đồng lao động trái pháp luật","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Phải nhận người lao động trở lại làm việc theo hợp đồng lao động đã giao kết; phải trả tiền lương, đóng bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp trong những ngày người lao động không được làm việc và phải trả thêm cho người lao động một khoản tiền ít nhất bằng 02 tháng tiền lương theo hợp đồng lao động."},{"k":"p","t":"Sau khi được nhận lại làm việc, người lao động hoàn trả cho người sử dụng lao động các khoản tiền trợ cấp thôi việc, trợ cấp mất việc làm nếu đã nhận của người sử dụng lao động."},{"k":"p","t":"Trường hợp không còn vị trí, công việc đã giao kết trong hợp đồng lao động mà người lao động vẫn muốn làm việc thì hai bên thỏa thuận để sửa đổi, bổ sung hợp đồng lao động."},{"k":"p","t":"Trường hợp vi phạm quy định về thời hạn báo trước quy định tại khoản 2 Điều 36 của Bộ luật này thì phải trả một khoản tiền tương ứng với tiền lương theo hợp đồng lao động trong những ngày không báo trước."},{"k":"p","t":"2. Trường hợp người lao động không muốn tiếp tục làm việc thì ngoài khoản tiền phải trả quy định tại khoản 1 Điều này người sử dụng lao động phải trả trợ cấp thôi việc theo quy định tại Điều 46 của Bộ luật này để chấm dứt hợp đồng lao động."},{"k":"p","t":"3. Trường hợp người sử dụng lao động không muốn nhận lại người lao động và người lao động đồng ý thì ngoài khoản tiền người sử dụng lao động phải trả theo quy định tại khoản 1 Điều này và trợ cấp thôi việc theo quy định tại Điều 46 của Bộ luật này, hai bên thỏa thuận khoản tiền bồi thường thêm cho người lao động nhưng ít nhất bằng 02 tháng tiền lương theo hợp đồng lao động để chấm dứt hợp đồng lao động."}]},{"id":"blld-45_42","no":42,"code":"Điều 42","title":"Điều 42. Nghĩa vụ của người sử dụng lao động trong trường hợp thay đổi cơ cấu, công nghệ hoặc vì lý do kinh tế","shortTitle":"Nghĩa vụ của người sử dụng lao động trong trường hợp thay đổi cơ cấu, công nghệ hoặc vì lý do kinh tế","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Những trường hợp sau đây được coi là thay đổi cơ cấu, công nghệ:"},{"k":"p","t":"a) Thay đổi cơ cấu tổ chức, tổ chức lại lao động;"},{"k":"p","t":"b) Thay đổi quy trình, công nghệ, máy móc, thiết bị sản xuất, kinh doanh gắn với ngành, nghề sản xuất, kinh doanh của người sử dụng lao động;"},{"k":"p","t":"c) Thay đổi sản phẩm hoặc cơ cấu sản phẩm."},{"k":"p","t":"2. Những trường hợp sau đây được coi là vì lý do kinh tế:"},{"k":"p","t":"a) Khủng hoảng hoặc suy thoái kinh tế;"},{"k":"p","t":"b) Thực hiện chính sách, pháp luật của Nhà nước khi cơ cấu lại nền kinh tế hoặc thực hiện cam kết quốc tế."},{"k":"p","t":"3. Trường hợp thay đổi cơ cấu, công nghệ mà ảnh hưởng đến việc làm của nhiều người lao động thì người sử dụng lao động phải xây dựng và thực hiện phương án sử dụng lao động theo quy định tại Điều 44 của Bộ luật này; trường hợp có chỗ làm việc mới thì ưu tiên đào tạo lại người lao động để tiếp tục sử dụng."},{"k":"p","t":"4. Trong trường hợp vì lý do kinh tế mà nhiều người lao động có nguy cơ mất việc làm, phải thôi việc thì người sử dụng lao động phải xây dựng và thực hiện phương án sử dụng lao động theo quy định tại Điều 44 của Bộ luật này."},{"k":"p","t":"5. Trong trường hợp người sử dụng lao động không thể giải quyết được việc làm mà phải cho người lao động thôi việc thì phải trả trợ cấp mất việc làm theo quy định tại Điều 47 của Bộ luật này."},{"k":"p","t":"6. Việc cho thôi việc đối với người lao động theo quy định tại Điều này chỉ được tiến hành sau khi đã trao đổi ý kiến với tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở mà người lao động là thành viên và thông báo trước 30 ngày cho Ủy ban nhân dân cấp tỉnh và cho người lao động."}]},{"id":"blld-45_43","no":43,"code":"Điều 43","title":"Điều 43. Nghĩa vụ của người sử dụng lao động khi chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp, hợp tác xã","shortTitle":"Nghĩa vụ của người sử dụng lao động khi chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp, hợp tác xã","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trong trường hợp chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp, hợp tác xã mà ảnh hưởng đến việc làm của nhiều người lao động thì người sử dụng lao động phải xây dựng phương án sử dụng lao động theo quy định tại Điều 44 của Bộ luật này."},{"k":"p","t":"2. Người sử dụng lao động hiện tại và người sử dụng lao động kế tiếp có trách nhiệm thực hiện phương án sử dụng lao động đã được thông qua."},{"k":"p","t":"3. Người lao động bị thôi việc thì được nhận trợ cấp mất việc làm theo quy định tại Điều 47 của Bộ luật này."}]},{"id":"blld-45_44","no":44,"code":"Điều 44","title":"Điều 44. Phương án sử dụng lao động","shortTitle":"Phương án sử dụng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Phương án sử dụng lao động phải có những nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Số lượng và danh sách người lao động tiếp tục được sử dụng, người lao động được đào tạo lại để tiếp tục sử dụng, người lao động được chuyển sang làm việc không trọn thời gian;"},{"k":"p","t":"b) Số lượng và danh sách người lao động nghỉ hưu;"},{"k":"p","t":"c) Số lượng và danh sách người lao động phải chấm dứt hợp đồng lao động;"},{"k":"p","t":"d) Quyền và nghĩa vụ của người sử dụng lao động, người lao động và các bên liên quan trong việc thực hiện phương án sử dụng lao động;"},{"k":"p","t":"đ) Biện pháp và nguồn tài chính bảo đảm thực hiện phương án."},{"k":"p","t":"2. Khi xây dựng phương án sử dụng lao động, người sử dụng lao động phải trao đổi ý kiến với tổ chức đại diện người lao động tại cơ sở đối với nơi có tổ chức đại diện người lao động tại cơ sở. Phương án sử dụng lao động phải được thông báo công khai cho người lao động biết trong thời hạn 15 ngày kể từ ngày được thông qua."}]},{"id":"blld-45_45","no":45,"code":"Điều 45","title":"Điều 45. Thông báo chấm dứt hợp đồng lao động","shortTitle":"Thông báo chấm dứt hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động phải thông báo bằng văn bản cho người lao động về việc chấm dứt hợp đồng lao động khi hợp đồng lao động chấm dứt theo quy định của Bộ luật này, trừ trường hợp quy định tại các khoản 4, 5, 6, 7 và 8 Điều 34 của Bộ luật này."},{"k":"p","t":"2. Trường hợp người sử dụng lao động không phải là cá nhân chấm dứt hoạt động thì thời điểm chấm dứt hợp đồng lao động tính từ thời điểm có thông báo chấm dứt hoạt động."},{"k":"p","t":"Trường hợp người sử dụng lao động không phải là cá nhân bị cơ quan chuyên môn về đăng ký kinh doanh thuộc Ủy ban nhân dân cấp tỉnh ra thông báo không có người đại diện theo pháp luật, người được ủy quyền thực hiện quyền và nghĩa vụ của người đại diện theo pháp luật theo quy định tại khoản 7 Điều 34 của Bộ luật này thì thời điểm chấm dứt hợp đồng lao động tính từ ngày ra thông báo."}]},{"id":"blld-45_46","no":46,"code":"Điều 46","title":"Điều 46. Trợ cấp thôi việc","shortTitle":"Trợ cấp thôi việc","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Khi hợp đồng lao động chấm dứt theo quy định tại các khoản 1, 2, 3, 4, 6, 7, 9 và 10 Điều 34 của Bộ luật này thì người sử dụng lao động có trách nhiệm trả trợ cấp thôi việc cho người lao động đã làm việc thường xuyên cho mình từ đủ 12 tháng trở lên, mỗi năm làm việc được trợ cấp một nửa tháng tiền lương, trừ trường hợp đủ điều kiện hưởng lương hưu theo quy định của pháp luật về bảo hiểm xã hội và trường hợp quy định tại điểm e khoản 1 Điều 36 của Bộ luật này."},{"k":"p","t":"2. Thời gian làm việc để tính trợ cấp thôi việc là tổng thời gian người lao động đã làm việc thực tế cho người sử dụng lao động trừ đi thời gian người lao động đã tham gia bảo hiểm thất nghiệp theo quy định của pháp luật về bảo hiểm thất nghiệp và thời gian làm việc đã được người sử dụng lao động chi trả trợ cấp thôi việc, trợ cấp mất việc làm."},{"k":"p","t":"3. Tiền lương để tính trợ cấp thôi việc là tiền lương bình quân của 06 tháng liền kề theo hợp đồng lao động trước khi người lao động thôi việc."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_47","no":47,"code":"Điều 47","title":"Điều 47. Trợ cấp mất việc làm","shortTitle":"Trợ cấp mất việc làm","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động trả trợ cấp mất việc làm cho người lao động đã làm việc thường xuyên cho mình từ đủ 12 tháng trở lên mà bị mất việc làm theo quy định tại khoản 11 Điều 34 của Bộ luật này, cứ mỗi năm làm việc trả 01 tháng tiền lương nhưng ít nhất bằng 02 tháng tiền lương."},{"k":"p","t":"2. Thời gian làm việc để tính trợ cấp mất việc làm là tổng thời gian người lao động đã làm việc thực tế cho người sử dụng lao động trừ đi thời gian người lao động đã tham gia bảo hiểm thất nghiệp theo quy định của pháp luật về bảo hiểm thất nghiệp và thời gian làm việc đã được người sử dụng lao động chi trả trợ cấp thôi việc, trợ cấp mất việc làm."},{"k":"p","t":"3. Tiền lương để tính trợ cấp mất việc làm là tiền lương bình quân của 06 tháng liền kề theo hợp đồng lao động trước khi người lao động mất việc làm."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"blld-45_48","no":48,"code":"Điều 48","title":"Điều 48. Trách nhiệm khi chấm dứt hợp đồng lao động","shortTitle":"Trách nhiệm khi chấm dứt hợp đồng lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 14 ngày làm việc kể từ ngày chấm dứt hợp đồng lao động, hai bên có trách nhiệm thanh toán đầy đủ các khoản tiền có liên quan đến quyền lợi của mỗi bên, trừ trường hợp sau đây có thể kéo dài nhưng không được quá 30 ngày:"},{"k":"p","t":"a) Người sử dụng lao động không phải là cá nhân chấm dứt hoạt động;"},{"k":"p","t":"b) Người sử dụng lao động thay đổi cơ cấu, công nghệ hoặc vì lý do kinh tế;"},{"k":"p","t":"c) Chia, tách, hợp nhất, sáp nhập; bán, cho thuê, chuyển đổi loại hình doanh nghiệp; chuyển nhượng quyền sở hữu, quyền sử dụng tài sản của doanh nghiệp, hợp tác xã;"},{"k":"p","t":"d) Do thiên tai, hỏa hoạn, địch họa hoặc dịch bệnh nguy hiểm."},{"k":"p","t":"2. Tiền lương, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, trợ cấp thôi việc và các quyền lợi khác của người lao động theo thỏa ước lao động tập thể, hợp đồng lao động được ưu tiên thanh toán trong trường hợp doanh nghiệp, hợp tác xã bị chấm dứt hoạt động, bị giải thể, phá sản."},{"k":"p","t":"3. Người sử dụng lao động có trách nhiệm sau đây:"},{"k":"p","t":"a) Hoàn thành thủ tục xác nhận thời gian đóng bảo hiểm xã hội, bảo hiểm thất nghiệp và trả lại cùng với bản chính giấy tờ khác nếu người sử dụng lao động đã giữ của người lao động;"},{"k":"p","t":"b) Cung cấp bản sao các tài liệu liên quan đến quá trình làm việc của người lao động nếu người lao động có yêu cầu. Chi phí sao, gửi tài liệu do người sử dụng lao động trả."},{"k":"p","t":"HỢP ĐỒNG LAO ĐỘNG VÔ HIỆU"}]},{"id":"blld-45_49","no":49,"code":"Điều 49","title":"Điều 49. Hợp đồng lao động vô hiệu","shortTitle":"Hợp đồng lao động vô hiệu","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Hợp đồng lao động vô hiệu toàn bộ trong trường hợp sau đây:"},{"k":"p","t":"a) Toàn bộ nội dung của hợp đồng lao động vi phạm pháp luật;"},{"k":"p","t":"b) Người giao kết hợp đồng lao động không đúng thẩm quyền hoặc vi phạm nguyên tắc giao kết hợp đồng lao động quy định tại khoản 1 Điều 15 của Bộ luật này;"},{"k":"p","t":"c) Công việc đã giao kết trong hợp đồng lao động là công việc mà pháp luật cấm."},{"k":"p","t":"2. Hợp đồng lao động vô hiệu từng phần khi nội dung của phần đó vi phạm pháp luật nhưng không ảnh hưởng đến các phần còn lại của hợp đồng."}]},{"id":"blld-45_50","no":50,"code":"Điều 50","title":"Điều 50. Thẩm quyền tuyên bố hợp đồng lao động vô hiệu","shortTitle":"Thẩm quyền tuyên bố hợp đồng lao động vô hiệu","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 4","level":1,"content":[{"k":"p","t":"Tòa án nhân dân có quyền tuyên bố hợp đồng lao động vô hiệu."}]},{"id":"blld-45_51","no":51,"code":"Điều 51","title":"Điều 51. Xử lý hợp đồng lao động vô hiệu","shortTitle":"Xử lý hợp đồng lao động vô hiệu","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Khi hợp đồng lao động bị tuyên bố vô hiệu từng phần thì xử lý như sau:"},{"k":"p","t":"a) Quyền, nghĩa vụ và lợi ích của hai bên được giải quyết theo thỏa ước lao động tập thể đang áp dụng; trường hợp không có thỏa ước lao động tập thể thì thực hiện theo quy định của pháp luật;"},{"k":"p","t":"b) Hai bên tiến hành sửa đổi, bổ sung phần của hợp đồng lao động bị tuyên bố vô hiệu để phù hợp với thỏa ước lao động tập thể hoặc pháp luật về lao động."},{"k":"p","t":"2. Khi hợp đồng lao động bị tuyên bố vô hiệu toàn bộ thì quyền, nghĩa vụ và lợi ích của người lao động được giải quyết theo quy định của pháp luật; trường hợp do ký sai thẩm quyền thì hai bên ký lại."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"CHO THUÊ LẠI LAO ĐỘNG"}]},{"id":"blld-45_52","no":52,"code":"Điều 52","title":"Điều 52. Cho thuê lại lao động","shortTitle":"Cho thuê lại lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Cho thuê lại lao động là việc người lao động giao kết hợp đồng lao động với một người sử dụng lao động là doanh nghiệp cho thuê lại lao động, sau đó người lao động được chuyển sang làm việc và chịu sự điều hành của người sử dụng lao động khác mà vẫn duy trì quan hệ lao động với người sử dụng lao động đã giao kết hợp đồng lao động."},{"k":"p","t":"2. Hoạt động cho thuê lại lao động là ngành, nghề kinh doanh có điều kiện, chỉ được thực hiện bởi các doanh nghiệp có Giấy phép hoạt động cho thuê lại lao động và áp dụng đối với một số công việc nhất định."}]},{"id":"blld-45_53","no":53,"code":"Điều 53","title":"Điều 53. Nguyên tắc hoạt động cho thuê lại lao động","shortTitle":"Nguyên tắc hoạt động cho thuê lại lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Thời hạn cho thuê lại lao động đối với người lao động tối đa là 12 tháng."},{"k":"p","t":"2. Bên thuê lại lao động được sử dụng lao động thuê lại trong trường hợp sau đây:"},{"k":"p","t":"a) Đáp ứng tạm thời sự gia tăng đột ngột về nhu cầu sử dụng lao động trong khoảng thời gian nhất định;"},{"k":"p","t":"b) Thay thế người lao động trong thời gian nghỉ thai sản, bị tai nạn lao động, bệnh nghề nghiệp hoặc phải thực hiện các nghĩa vụ công dân;"},{"k":"p","t":"c) Có nhu cầu sử dụng lao động trình độ chuyên môn, kỹ thuật cao."},{"k":"p","t":"3. Bên thuê lại lao động không được sử dụng lao động thuê lại trong trường hợp sau đây:"},{"k":"p","t":"a) Để thay thế người lao động đang trong thời gian thực hiện quyền đình công, giải quyết tranh chấp lao động;"},{"k":"p","t":"b) Không có thỏa thuận cụ thể về trách nhiệm bồi thường tai nạn lao động, bệnh nghề nghiệp của người lao động thuê lại với doanh nghiệp cho thuê lại lao động;"},{"k":"p","t":"c) Thay thế người lao động bị cho thôi việc do thay đổi cơ cấu, công nghệ, vì lý do kinh tế hoặc chia, tách, hợp nhất, sáp nhập."},{"k":"p","t":"4. Bên thuê lại lao động không được chuyển người lao động thuê lại cho người sử dụng lao động khác; không được sử dụng người lao động thuê lại được cung cấp bởi doanh nghiệp không có Giấy phép hoạt động cho thuê lại lao động."}]},{"id":"blld-45_54","no":54,"code":"Điều 54","title":"Điều 54. Doanh nghiệp cho thuê lại lao động","shortTitle":"Doanh nghiệp cho thuê lại lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp cho thuê lại lao động phải ký quỹ và được cấp Giấy phép hoạt động cho thuê lại lao động."},{"k":"p","t":"2. Chính phủ quy định việc ký quỹ, điều kiện, trình tự, thủ tục cấp, cấp lại, gia hạn, thu hồi Giấy phép hoạt động cho thuê lại lao động và danh mục công việc được thực hiện cho thuê lại lao động."}]},{"id":"blld-45_55","no":55,"code":"Điều 55","title":"Điều 55. Hợp đồng cho thuê lại lao động","shortTitle":"Hợp đồng cho thuê lại lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp cho thuê lại lao động và bên thuê lại lao động phải ký kết hợp đồng cho thuê lại lao động bằng văn bản và được làm thành 02 bản, mỗi bên giữ 01 bản."},{"k":"p","t":"2. Hợp đồng cho thuê lại lao động gồm các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Địa điểm làm việc, vị trí việc làm cần sử dụng lao động thuê lại, nội dung cụ thể của công việc, yêu cầu cụ thể đối với người lao động thuê lại;"},{"k":"p","t":"b) Thời hạn thuê lại lao động; thời gian bắt đầu làm việc của người lao động thuê lại;"},{"k":"p","t":"c) Thời giờ làm việc, thời giờ nghỉ ngơi, điều kiện an toàn, vệ sinh lao động tại nơi làm việc;"},{"k":"p","t":"d) Trách nhiệm bồi thường tai nạn lao động, bệnh nghề nghiệp;"},{"k":"p","t":"đ) Nghĩa vụ của mỗi bên đối với người lao động."},{"k":"p","t":"3. Hợp đồng cho thuê lại lao động không được có những thỏa thuận về quyền, lợi ích của người lao động thấp hơn so với hợp đồng lao động mà doanh nghiệp cho thuê lại lao động đã ký với người lao động."}]},{"id":"blld-45_56","no":56,"code":"Điều 56","title":"Điều 56. Quyền và nghĩa vụ của doanh nghiệp cho thuê lại lao động","shortTitle":"Quyền và nghĩa vụ của doanh nghiệp cho thuê lại lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"Ngoài các quyền và nghĩa vụ quy định tại Điều 6 của Bộ luật này, doanh nghiệp cho thuê lại lao động có các quyền và nghĩa vụ sau đây:"},{"k":"p","t":"1. Bảo đảm đưa người lao động có trình độ phù hợp với những yêu cầu của bên thuê lại lao động và nội dung của hợp đồng lao động đã ký với người lao động;"},{"k":"p","t":"2. Thông báo cho người lao động biết nội dung của hợp đồng cho thuê lại lao động;"},{"k":"p","t":"3. Thông báo cho bên thuê lại lao động biết sơ yếu lý lịch của người lao động, yêu cầu của người lao động;"},{"k":"p","t":"4. Bảo đảm trả lương cho người lao động thuê lại không thấp hơn tiền lương của người lao động của bên thuê lại lao động có cùng trình độ, làm cùng công việc hoặc công việc có giá trị như nhau;"},{"k":"p","t":"5. Lập hồ sơ ghi rõ số lao động đã cho thuê lại, bên thuê lại lao động và định kỳ báo cáo cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh;"},{"k":"p","t":"6. Xử lý kỷ luật lao động đối với người lao động vi phạm kỷ luật lao động khi bên thuê lại lao động trả lại người lao động do vi phạm kỷ luật lao động."}]},{"id":"blld-45_57","no":57,"code":"Điều 57","title":"Điều 57. Quyền và nghĩa vụ của bên thuê lại lao động","shortTitle":"Quyền và nghĩa vụ của bên thuê lại lao động","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Thông báo, hướng dẫn cho người lao động thuê lại biết nội quy lao động và các quy chế khác của mình."},{"k":"p","t":"2. Không được phân biệt đối xử về điều kiện lao động đối với người lao động thuê lại so với người lao động của mình."},{"k":"p","t":"3. Thỏa thuận với người lao động thuê lại về làm việc vào ban đêm, làm thêm giờ theo quy định của Bộ luật này."},{"k":"p","t":"4. Thỏa thuận với người lao động thuê lại và doanh nghiệp cho thuê lại lao động để tuyển dụng chính thức người lao động thuê lại làm việc cho mình trong trường hợp hợp đồng lao động của người lao động thuê lại với doanh nghiệp cho thuê lại lao động chưa chấm dứt."},{"k":"p","t":"5. Trả lại người lao động thuê lại không đáp ứng yêu cầu như đã thỏa thuận hoặc vi phạm kỷ luật lao động cho doanh nghiệp cho thuê lại lao động."},{"k":"p","t":"6. Cung cấp cho doanh nghiệp cho thuê lại lao động chứng cứ về hành vi vi phạm kỷ luật lao động của người lao động thuê lại để xem xét xử lý kỷ luật lao động."}]},{"id":"blld-45_58","no":58,"code":"Điều 58","title":"Điều 58. Quyền và nghĩa vụ của người lao động thuê lại","shortTitle":"Quyền và nghĩa vụ của người lao động thuê lại","chuong":"Chương III — HỢP ĐỒNG LAO ĐỘNG","muc":"Mục 5","level":1,"content":[{"k":"p","t":"Ngoài các quyền và nghĩa vụ theo quy định tại Điều 5 của Bộ luật này, người lao động thuê lại có các quyền và nghĩa vụ sau đây:"},{"k":"p","t":"1. Thực hiện công việc theo hợp đồng lao động đã ký với doanh nghiệp hoạt động cho thuê lại lao động;"},{"k":"p","t":"2. Chấp hành kỷ luật lao động, nội quy lao động; tuân theo sự quản lý, điều hành, giám sát hợp pháp của bên thuê lại lao động;"},{"k":"p","t":"3. Được trả lương không thấp hơn tiền lương của người lao động của bên thuê lại lao động có cùng trình độ, làm cùng công việc hoặc công việc có giá trị như nhau;"},{"k":"p","t":"4. Khiếu nại với doanh nghiệp cho thuê lại lao động trong trường hợp bị bên thuê lại lao động vi phạm các thỏa thuận trong hợp đồng cho thuê lại lao động;"},{"k":"p","t":"5. Thỏa thuận chấm dứt hợp đồng lao động với doanh nghiệp cho thuê lại lao động để giao kết hợp đồng lao động với bên thuê lại lao động."}]},{"id":"blld-45_59","no":59,"code":"Điều 59","title":"Điều 59. Đào tạo nghề nghiệp và phát triển kỹ năng nghề","shortTitle":"Đào tạo nghề nghiệp và phát triển kỹ năng nghề","chuong":"Chương IV — GIÁO DỤC NGHỀ NGHIỆP VÀ PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động được tự do lựa chọn đào tạo nghề nghiệp, tham gia đánh giá, công nhận kỹ năng nghề quốc gia, phát triển năng lực nghề nghiệp phù hợp với nhu cầu việc làm và khả năng của mình."},{"k":"p","t":"2. Nhà nước có chính sách khuyến khích người sử dụng lao động có đủ điều kiện đào tạo nghề nghiệp và phát triển kỹ năng nghề cho người lao động đang làm việc cho mình và người lao động khác trong xã hội thông qua hoạt động sau đây:"},{"k":"p","t":"a) Thành lập cơ sở giáo dục nghề nghiệp hoặc mở lớp đào tạo nghề tại nơi làm việc để đào tạo, đào tạo lại, bồi dưỡng, nâng cao trình độ, kỹ năng nghề cho người lao động; phối hợp với cơ sở giáo dục nghề nghiệp đào tạo các trình độ sơ cấp, trung cấp, cao đẳng và các chương trình đào tạo nghề nghiệp khác theo quy định;"},{"k":"p","t":"b) Tổ chức thi kỹ năng nghề cho người lao động; tham gia hội đồng kỹ năng nghề; dự báo nhu cầu và xây dựng tiêu chuẩn kỹ năng nghề; tổ chức đánh giá và công nhận kỹ năng nghề; phát triển năng lực nghề nghiệp cho người lao động."}]},{"id":"blld-45_60","no":60,"code":"Điều 60","title":"Điều 60. Trách nhiệm của người sử dụng lao động về đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề","shortTitle":"Trách nhiệm của người sử dụng lao động về đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề","chuong":"Chương IV — GIÁO DỤC NGHỀ NGHIỆP VÀ PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động xây dựng kế hoạch hằng năm và dành kinh phí cho việc đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề, phát triển kỹ năng nghề cho người lao động đang làm việc cho mình; đào tạo cho người lao động trước khi chuyển làm nghề khác cho mình."},{"k":"p","t":"2. Hằng năm, người sử dụng lao động thông báo kết quả đào tạo, bồi dưỡng, nâng cao trình độ, kỹ năng nghề cho cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh."}]},{"id":"blld-45_61","no":61,"code":"Điều 61","title":"Điều 61. Học nghề, tập nghề để làm việc cho người sử dụng lao động","shortTitle":"Học nghề, tập nghề để làm việc cho người sử dụng lao động","chuong":"Chương IV — GIÁO DỤC NGHỀ NGHIỆP VÀ PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Học nghề để làm việc cho người sử dụng lao động là việc người sử dụng lao động tuyển người vào để đào tạo nghề nghiệp tại nơi làm việc. Thời gian học nghề theo chương trình đào tạo của từng trình độ theo quy định của Luật Giáo dục nghề nghiệp."},{"k":"p","t":"2. Tập nghề để làm việc cho người sử dụng lao động là việc người sử dụng lao động tuyển người vào để hướng dẫn thực hành công việc, tập làm nghề theo vị trí việc làm tại nơi làm việc. Thời hạn tập nghề không quá 03 tháng."},{"k":"p","t":"3. Người sử dụng lao động tuyển người vào học nghề, tập nghề để làm việc cho mình thì không phải đăng ký hoạt động giáo dục nghề nghiệp; không được thu học phí; phải ký hợp đồng đào tạo theo quy định của Luật Giáo dục nghề nghiệp."},{"k":"p","t":"4. Người học nghề, người tập nghề phải đủ 14 tuổi trở lên và phải có đủ sức khỏe phù hợp với yêu cầu học nghề, tập nghề. Người học nghề, người tập nghề thuộc danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành phải từ đủ 18 tuổi trở lên, trừ lĩnh vực nghệ thuật, thể dục, thể thao."},{"k":"p","t":"5. Trong thời gian học nghề, tập nghề, nếu người học nghề, người tập nghề trực tiếp hoặc tham gia lao động thì được người sử dụng lao động trả lương theo mức do hai bên thỏa thuận."},{"k":"p","t":"6. Hết thời hạn học nghề, tập nghề, hai bên phải ký kết hợp đồng lao động khi đủ các điều kiện theo quy định của Bộ luật này."}]},{"id":"blld-45_62","no":62,"code":"Điều 62","title":"Điều 62. Hợp đồng đào tạo nghề giữa người sử dụng lao động, người lao động và chi phí đào tạo nghề","shortTitle":"Hợp đồng đào tạo nghề giữa người sử dụng lao động, người lao động và chi phí đào tạo nghề","chuong":"Chương IV — GIÁO DỤC NGHỀ NGHIỆP VÀ PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Hai bên phải ký kết hợp đồng đào tạo nghề trong trường hợp người lao động được đào tạo nâng cao trình độ, kỹ năng nghề, đào tạo lại ở trong nước hoặc nước ngoài từ kinh phí của người sử dụng lao động, kể cả kinh phí do đối tác tài trợ cho người sử dụng lao động."},{"k":"p","t":"Hợp đồng đào tạo nghề phải làm thành 02 bản, mỗi bên giữ 01 bản."},{"k":"p","t":"2. Hợp đồng đào tạo nghề phải có các nội dung chủ yếu sau đây:"},{"k":"p","t":"a) Nghề đào tạo;"},{"k":"p","t":"b) Địa điểm, thời gian và tiền lương trong thời gian đào tạo;"},{"k":"p","t":"c) Thời hạn cam kết phải làm việc sau khi được đào tạo;"},{"k":"p","t":"d) Chi phí đào tạo và trách nhiệm hoàn trả chi phí đào tạo;"},{"k":"p","t":"đ) Trách nhiệm của người sử dụng lao động;"},{"k":"p","t":"e) Trách nhiệm của người lao động."},{"k":"p","t":"3. Chi phí đào tạo bao gồm các khoản chi có chứng từ hợp lệ về chi phí trả cho người dạy, tài liệu học tập, trường, lớp, máy, thiết bị, vật liệu thực hành, các chi phí khác hỗ trợ cho người học và tiền lương, tiền đóng bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp cho người học trong thời gian đi học. Trường hợp người lao động được gửi đi đào tạo ở nước ngoài thì chi phí đào tạo còn bao gồm chi phí đi lại, chi phí sinh hoạt trong thời gian đào tạo."},{"k":"p","t":"ĐỐI THOẠI TẠI NƠI LÀM VIỆC"}]},{"id":"blld-45_63","no":63,"code":"Điều 63","title":"Điều 63. Tổ chức đối thoại tại nơi làm việc","shortTitle":"Tổ chức đối thoại tại nơi làm việc","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối thoại tại nơi làm việc là việc chia sẻ thông tin, tham khảo, thảo luận, trao đổi ý kiến giữa người sử dụng lao động với người lao động hoặc tổ chức đại diện người lao động về những vấn đề liên quan đến quyền, lợi ích và mối quan tâm của các bên tại nơi làm việc nhằm tăng cường sự hiểu biết, hợp tác, cùng nỗ lực hướng tới giải pháp các bên cùng có lợi."},{"k":"p","t":"2. Người sử dụng lao động phải tổ chức đối thoại tại nơi làm việc trong trường hợp sau đây:"},{"k":"p","t":"a) Định kỳ ít nhất 01 năm một lần;"},{"k":"p","t":"b) Khi có yêu cầu của một hoặc các bên;"},{"k":"p","t":"c) Khi có vụ việc quy định tại điểm a khoản 1 Điều 36, các điều 42, 44, 93, 104,118 và khoản 1 Điều 128 của Bộ luật này."},{"k":"p","t":"3. Khuyến khích người sử dụng lao động và người lao động hoặc tổ chức đại diện người lao động tiến hành đối thoại ngoài những trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"4. Chính phủ quy định việc tổ chức đối thoại và thực hiện quy chế dân chủ ở cơ sở tại nơi làm việc."}]},{"id":"blld-45_64","no":64,"code":"Điều 64","title":"Điều 64. Nội dung đối thoại tại nơi làm việc","shortTitle":"Nội dung đối thoại tại nơi làm việc","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Nội dung đối thoại bắt buộc theo quy định tại điểm c khoản 2 Điều 63 của Bộ luật này."},{"k":"p","t":"2. Ngoài nội dung quy định tại khoản 1 Điều này, các bên lựa chọn một hoặc một số nội dung sau đây để tiến hành đối thoại:"},{"k":"p","t":"a) Tình hình sản xuất, kinh doanh của người sử dụng lao động;"},{"k":"p","t":"b) Việc thực hiện hợp đồng lao động, thỏa ước lao động tập thể, nội quy lao động, quy chế và cam kết, thỏa thuận khác tại nơi làm việc;"},{"k":"p","t":"c) Điều kiện làm việc;"},{"k":"p","t":"d) Yêu cầu của người lao động, tổ chức đại diện người lao động đối với người sử dụng lao động;"},{"k":"p","t":"đ) Yêu cầu của người sử dụng lao động đối với người lao động, tổ chức đại diện người lao động;"},{"k":"p","t":"e) Nội dung khác mà một hoặc các bên quan tâm."},{"k":"p","t":"THƯƠNG LƯỢNG TẬP THỂ"}]},{"id":"blld-45_65","no":65,"code":"Điều 65","title":"Điều 65. Thương lượng tập thể","shortTitle":"Thương lượng tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Thương lượng tập thể là việc đàm phán, thỏa thuận giữa một bên là một hoặc nhiều tổ chức đại diện người lao động với một bên là một hoặc nhiều người sử dụng lao động hoặc tổ chức đại diện người sử dụng lao động nhằm xác lập điều kiện lao động, quy định về mối quan hệ giữa các bên và xây dựng quan hệ lao động tiến bộ, hài hòa và ổn định."}]},{"id":"blld-45_66","no":66,"code":"Điều 66","title":"Điều 66. Nguyên tắc thương lượng tập thể","shortTitle":"Nguyên tắc thương lượng tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Thương lượng tập thể được tiến hành theo nguyên tắc tự nguyện, hợp tác, thiện chí, bình đẳng, công khai và minh bạch."}]},{"id":"blld-45_67","no":67,"code":"Điều 67","title":"Điều 67. Nội dung thương lượng tập thể","shortTitle":"Nội dung thương lượng tập thể","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Các bên thương lượng lựa chọn một hoặc một số nội dung sau để tiến hành thương lượng tập thể:"},{"k":"p","t":"1. Tiền lương, trợ cấp, nâng lương, thưởng, bữa ăn và các chế độ khác;"},{"k":"p","t":"2. Mức lao động và thời giờ làm việc, thời giờ nghỉ ngơi, làm thêm giờ, nghỉ giữa ca;"},{"k":"p","t":"3. Bảo đảm việc làm đối với người lao động;"},{"k":"p","t":"4. Bảo đảm an toàn, vệ sinh lao động; thực hiện nội quy lao động;"},{"k":"p","t":"5. Điều kiện, phương tiện hoạt động của tổ chức đại diện người lao động; mối quan hệ giữa người sử dụng lao động và tổ chức đại diện người lao động;"},{"k":"p","t":"6. Cơ chế, phương thức phòng ngừa, giải quyết tranh chấp lao động;"},{"k":"p","t":"7. Bảo đảm bình đẳng giới, bảo vệ thai sản, nghỉ hằng năm; phòng, chống bạo lực và quấy rối tình dục tại nơi làm việc;"},{"k":"p","t":"8. Nội dung khác mà một hoặc các bên quan tâm."}]},{"id":"blld-45_68","no":68,"code":"Điều 68","title":"Điều 68. Quyền thương lượng tập thể của tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp","shortTitle":"Quyền thương lượng tập thể của tổ chức đại diện người lao động tại cơ sở trong doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tổ chức đại diện người lao động tại cơ sở có quyền yêu cầu thương lượng tập thể khi đạt tỷ lệ thành viên tối thiểu trên tổng số người lao động trong doanh nghiệp theo quy định của Chính phủ."},{"k":"p","t":"2. Trường hợp doanh nghiệp có nhiều tổ chức đại diện người lao động tại cơ sở đáp ứng quy định tại khoản 1 Điều này thì tổ chức có quyền yêu cầu thương lượng là tổ chức có số thành viên nhiều nhất trong doanh nghiệp. Các tổ chức đại diện người lao động tại cơ sở khác có thể tham gia thương lượng tập thể khi được tổ chức đại diện người lao động có quyền yêu cầu thương lượng tập thể đồng ý."},{"k":"p","t":"3. Trường hợp doanh nghiệp có nhiều tổ chức đại diện người lao động tại cơ sở mà không có tổ chức nào đáp ứng quy định tại khoản 1 Điều này thì các tổ chức có quyền tự nguyện kết hợp với nhau để yêu cầu thương lượng tập thể nhưng tổng số thành viên của các tổ chức này phải đạt tỷ lệ tối thiểu theo quy định tại khoản 1 Điều này."},{"k":"p","t":"4. Chính phủ quy định việc giải quyết tranh chấp giữa các bên liên quan đến quyền thương lượng tập thể."}]},{"id":"blld-45_69","no":69,"code":"Điều 69","title":"Điều 69. Đại diện thương lượng tập thể tại doanh nghiệp","shortTitle":"Đại diện thương lượng tập thể tại doanh nghiệp","chuong":"Chương V — ĐỐI THOẠI TẠI NƠI LÀM VIỆC, THƯƠNG LƯỢNG TẬP THỂ,THỎA ƯỚC LAO ĐỘNG TẬP THỂ","muc":"Mục 2","level":1,"content
