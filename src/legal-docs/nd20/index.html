<script id="LD" type="application/json">{"meta":{"title":"Nghị định 20/2025/NĐ-CP — Sửa đổi, bổ sung một số điều của NĐ 132/2020 về quản lý thuế với DN có giao dịch liên kết","shortCode":"NĐ 20/2025","subtitle":"Sửa đổi, bổ sung NĐ 132/2020 (giao dịch liên kết)","slug":"nd20","effectiveDate":"27/03/2025","scope":"","description":"Sửa đổi, bổ sung NĐ 132/2020 (giao dịch liên kết)","related":[]},"outline":[{"id":"nd20_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điều của Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết","shortTitle":"Sửa đổi, bổ sung một số điều của Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm d, điểm k và bổ sung điểm m khoản 2 Điều 5 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung điểm d như sau:"},{"k":"p","t":"“d) Một doanh nghiệp bảo lãnh hoặc cho một doanh nghiệp khác vay vốn dưới bất kỳ hình thức nào (bao gồm cả các khoản vay từ bên thứ ba được đảm bảo từ nguồn tài chính của bên liên kết và các giao dịch tài chính có bản chất tương tự) với điều kiện tổng dư nợ các khoản vốn vay của doanh nghiệp đi vay với doanh nghiệp cho vay hoặc bảo lãnh ít nhất bằng 25% vốn góp của chủ sở hữu của doanh nghiệp đi vay và chiếm trên 50% tổng dư nợ tất cả các khoản nợ trung và dài hạn của doanh nghiệp đi vay."},{"k":"p","t":"Quy định tại điểm d khoản này không áp dụng với các trường hợp sau:"},{"k":"p","t":"d.1) Bên bảo lãnh hoặc cho vay là các tổ chức kinh tế hoạt động theo quy định của Luật các tổ chức tín dụng không tham gia trực tiếp, gián tiếp điều hành, kiểm soát, góp vốn, đầu tư vào doanh nghiệp đi vay hoặc doanh nghiệp được bảo lãnh theo quy định tại các điểm a, c, đ, e, g, h, k, l và m khoản này."},{"k":"p","t":"d.2) Bên bảo lãnh hoặc cho vay là các tổ chức kinh tế hoạt động theo quy định của Luật các tổ chức tín dụng và doanh nghiệp đi vay hoặc được bảo lãnh không trực tiếp, gián tiếp cùng chịu sự điều hành, kiểm soát, góp vốn, đầu tư của một bên khác theo quy định tại các điểm b, e và i khoản này.”"},{"k":"p","t":"b) Sửa đổi, bổ sung điểm k như sau:"},{"k":"p","t":"“k) Các trường hợp khác trong đó doanh nghiệp (bao gồm cả chi nhánh hạch toán độc lập thực hiện kê khai, nộp thuế thu nhập doanh nghiệp) chịu sự điều hành, kiểm soát, quyết định trên thực tế đối với hoạt động sản xuất kinh doanh của doanh nghiệp kia;”"},{"k":"p","t":"c) Bổ sung điểm m như sau:"},{"k":"p","t":"“m) Tổ chức tín dụng với Công ty con hoặc với Công ty kiểm soát hoặc với Công ty liên kết của tổ chức tín dụng theo quy định tại Luật Các tổ chức tín dụng và các văn bản sửa đổi, bổ sung hoặc thay thế (nếu có);”"},{"k":"p","t":"2. Sửa đổi, bổ sung khoản 2 Điều 21 như sau:"},{"k":"p","t":"“2. Ngân hàng Nhà nước trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp thông tin, số liệu về các khoản vay, trả nợ nước ngoài của từng doanh nghiệp cụ thể có giao dịch liên kết trên cơ sở danh sách do Cơ quan thuế yêu cầu, bao gồm dữ liệu về kim ngạch khoản vay, lãi suất, kỳ trả lãi, trả gốc, thực tế rút vốn, trả nợ (gốc, lãi) và các thông tin liên quan khác (nếu có)."},{"k":"p","t":"Phối hợp cung cấp thông tin được báo cáo theo quy định pháp luật về người có liên quan của thành viên Hội đồng quản trị, thành viên Hội đồng thành viên, thành viên Ban kiểm soát, Tổng giám đốc (Giám đốc), Phó Tổng giám đốc (Phó giám đốc) và chức danh tương đương theo quy định tại Điều lệ của tổ chức tín dụng; người có liên quan của cổ đông sở hữu từ 01% vốn điều lệ trở lên của tổ chức tín dụng; Công ty liên kết của tổ chức tín dụng theo hệ thống thông tin dữ liệu quản lý của Ngân hàng Nhà nước khi cơ quan thuế đề nghị.”"}]},{"id":"nd20_2","no":2,"code":"Điều 2","title":"Điều 2. Thay thế Phụ lục I - Thông tin về quan hệ liên kết và giao dịch liên kết ban hành kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết bằng Phụ lục I ban hành kèm theo Nghị định này.","shortTitle":"Thay thế Phụ lục I - Thông tin về quan hệ liên kết và giao dịch liên kết ban hành kèm theo Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 của Chính phủ quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết bằng Phụ lục I ban hành kèm theo Nghị định này.","chuong":"","muc":"","level":1,"content":[]},{"id":"nd20_3","no":3,"code":"Điều 3","title":"Điều 3. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp, tại kỳ tính thuế thu nhập doanh nghiệp năm 2020, năm 2021, năm 2022 và năm 2023, doanh nghiệp đi vay chỉ có quan hệ liên kết với tổ chức kinh tế hoạt động theo quy định của Luật Các tổ chức tín dụng quy định tại điểm d khoản 2 Điều 5 Nghị định số 132/2020/NĐ-CP và doanh nghiệp đi vay với bên cho vay hoặc bảo lãnh thuộc trường hợp quy định tại điểm d.1 và điểm d.2 khoản 2 Điều 5 Nghị định số 132/2020/NĐ-CP được sửa đổi, bổ sung tại Điều 1 Nghị định này, có giao dịch liên kết thuộc phạm vi điều chỉnh tại khoản 2 Điều 1 Nghị định số 132/2020/NĐ-CP và có chi phí lãi vay không được trừ theo quy định tại điểm a khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP thì kể từ kỳ tính thuế năm 2024 thực hiện như sau:"},{"k":"p","t":"1. Trường hợp doanh nghiệp không có quan hệ liên kết và không phát sinh giao dịch liên kết theo quy định tại Nghị định số 132/2020/NĐ-CP và Nghị định này thì phần chi phí lãi vay không được trừ và chưa được chuyển sang các kỳ tính thuế tiếp theo tính đến cuối kỳ tính thuế năm 2023 được phân bổ đều chuyển sang các kỳ tính thuế tiếp theo cho thời gian còn lại theo quy định về thời gian được chuyển chi phí lãi vay tại điểm b khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"2. Trường hợp doanh nghiệp có quan hệ liên kết và giao dịch liên kết theo quy định tại Nghị định số 132/2020/NĐ-CP và Nghị định này thì chi phí lãi vay không được trừ và chưa được chuyển sang các kỳ tính thuế tiếp theo thực hiện theo quy định tại điểm b khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP."}]},{"id":"nd20_4","no":4,"code":"Điều 4","title":"Điều 4. Tổ chức thực hiện và hiệu lực thi hành","shortTitle":"Tổ chức thực hiện và hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 27 tháng 3 năm 2025 và áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2024."},{"k":"p","t":"2. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n-  Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện Kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Giám sát tài chính Quốc gia;\n- Ngân hàng Chính sách Xã hội;\n- Ngân hàng Phát triển Việt Nam;\n- Ủy ban trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các đoàn thể;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2).","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\nHồ Đức Phớc"]]},{"k":"p","t":"Phụ lục I"},{"k":"p","t":"(Kèm theo Nghị định số 20/2025/NĐ-CP ngày 10 tháng 02 năm 2025 của Chính phủ)"},{"k":"p","t":"_____________"},{"k":"p","t":"THÔNG TIN VỀ QUAN HỆ LIÊN KẾT VÀ GIAO DỊCH LIÊN KẾT(Kèm theo Tờ khai quyết toán thuế thu nhập doanh nghiệp)Kỳ tính thuế: Từ……………….đến……………………."},{"k":"p","t":"[01] Tên người nộp thuế………………………………………………………………  dịch liên kết",""],["a","Người nộp thuế có phát sinh giao dịch liên kết nhưng tổng doanh thu phát sinh của kỳ tính thuế dưới 50 tỷ đồng và tổng giá trị tất cả các giao dịch liên kết phát sinh trong kỳ tính thuế dưới 30 tỷ đồng",""],["b","Người nộp thuế đã ký kết Thoả thuận trước về phương pháp xác định giá tính thuế thực hiện nộp Báo cáo thường niên theo quy định pháp luật về Thoả thuận trước về phương pháp xác định giá tính thuế",""],["c","Người nộp thuế thực hiện kinh doanh với chức năng đơn giản, không phát sinh doanh thu, chi phí từ hoạt động khai thác, sử dụng tài sản vô hình, có doanh thu dưới 200 tỷ đồng, áp dụng tỷ suất lợi nhuận thuần trước lãi vay và thuế thu nhập doanh nghiệp trên doanh thu, bao gồm các lĩnh vực như sau:",""],["","- Phân phối: Từ 5% trở lên",""],["","- Sản xuất: Từ 10% trở lên",""],["","- Gia công: Từ 15% trở lên",""]]},{"k":"p","t":"___________________"},{"k":"p","t":"2 Người nộp thuế đánh dấu “x” vào dòng trường hợp miễn trừ áp dụng tương ứng."},{"k":"p","t":"MỤC III. THÔNG TIN XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT"},{"k":"p","t":"Đơn vị tiền: Đồng Việt Nam"},{"k":"tbl","rows":[["STT","Nội dung","Giá trị bán ra cho bên liên kết","Giá trị mua vào từ bên liên kết","Lợi nhuận tăng do xác định lại theo giá giao dịch độc lập","Thu hộ, chi hộ, phân bổ cơ sở thường trú3","Giao dịch thuộc phạm vi áp dụng APA4"],["","","Giá trị ghi nhận của giao dịch liên kết","Giá trị xác định lại theo giá giao dịch độc lập","Chênh lệch","Phương pháp xác định giá","Giá trị ghi nhận của giao dịch liên kết","Giá trị xác định lại theo giá giao dịch độc lập","Chênh lệch","Phương pháp xác định giá","","",""],["(1)","(2)","(3)","(4)","(5)=(4)-(3)","(6)","(7)","(8)","(9)=(8)-(7)","(10)","(11)=(5)+(9)","(12)","(13)"],["I","Tổng giá trị giao dịch phát sinh từ hoạt động kinh doanh","","","","","","","","","","",""],["II","Tổng giá trị giao dịch phát sinh từ hoạt động liên kết","","","","","","","","","","",""],["1","Hàng hoá","","","","","","","","","","",""],["1.1","Hàng hoá  DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ(Ký, ghi rõ họ tên; chức vụ và đóng dấu (nếu có))"]]},{"k":"p","t":"HƯỚNG DẪN KÊ KHAI MỘT SỐ CHỈ TIÊU"},{"k":"p","t":"A. Kỳ tính thuế: Ghi thông tin tương ứng với kỳ tính thuế của Tờ khai quyết toán thuế thu nhập doanh nghiệp. Kỳ tính thuế xác định theo quy định tại Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"B. Thông tin chung của người nộp thuế: Từ chỉ tiêu [01] đến chỉ tiêu [10] ghi thông tin tương ứng với thông tin đã ghi tại Tờ khai quyết toán thuế thu nhập doanh nghiệp."},{"k":"p","t":"C. Mục I. Thông tin về các bên liên kết:"},{"k":"p","t":"- Cột (2): Ghi đầy đủ tên của từng bên liên kết:"},{"k":"p","t":"+ Trường hợp bên liên kết tại Việt Nam là tổ chức thì ghi theo thông tin tại giấy phép đăng ký doanh nghiệp; là cá nhân thì ghi theo thông tin tại chứng minh nhân dân, thẻ căn cước công dân, hộ chiếu."},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân ngoài Việt Nam thì ghi theo thông tin tại văn bản xác định quan hệ liên kết như giấy phép đăng ký kinh doanh, hợp đồng, thỏa thuận giao dịch của người nộp thuế với bên liên kết."},{"k":"p","t":"- Cột (3): Ghi tên quốc gia, vùng lãnh thổ nơi bên liên kết là đối tượng cư trú."},{"k":"p","t":"- Cột (4): Ghi mã số thuế của các bên liên kết:"},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân tại Việt Nam thì ghi đủ mã số thuế."},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân ngoài Việt Nam thì ghi đủ mã số thuế, mã định danh người nộp thuế, nếu không có thì ghi rõ lý do."},{"k":"p","t":"- Cột (5): Căn cứ quy định tại khoản 2 Điều 5 Nghị định số 132/2020/NĐ-CP và Điều 1 Nghị định số 20/2025/NĐ-CP, người nộp thuế phát sinh giao dịch liên kết kê khai hình thức quan hệ liên kết tương ứng với từng bên liên kết bằng cách đánh dấu “x” vào ô tương ứng. Trường hợp bên liên kết thuộc nhiều hơn một hình thức quan hệ liên kết, người nộp thuế đánh dấu “x” vào các ô tương ứng."},{"k":"p","t":"D. Mục II. Các trường hợp được miễn kê khai, miễn lập hồ sơ xác định giá giao dịch liên kết:"},{"k":"p","t":"Nếu người nộp thuế thuộc trường hợp được miễn kê khai, miễn lập Hồ sơ xác định giá giao dịch liên kết quy định tại Điều 19 Nghị định số 132/2020/NĐ-CP tại Cột (2) thì đánh dấu “x” vào ô thuộc diện miễn trừ tương ứng tại Cột (3)."},{"k":"p","t":"Trường hợp người nộp thuế được miễn kê khai, miễn lập hồ sơ xác định giá giao dịch liên kết theo quy định tại khoản 1 Điều 19 Nghị định số 132/2020/NĐ-CP, người nộp thuế chỉ đánh dấu vào ô tương ứng tại Cột (3) và không phải kê khai các mục III và IV Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, người nộp thuế kê khai các mục III và IV theo hướng dẫn tương ứng tại các phần Đ.1 và E."},{"k":"p","t":"Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm b khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, người nộp thuế kê khai theo hướng dẫn tương ứng tại các phần Đ.2 và E."},{"k":"p","t":"Đ. Mục III. Thông tin xác định giá giao dịch liên kết:"},{"k":"p","t":"Đ.1. Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP và đã kê khai đánh dấu (x) vào cột 3 tại dòng a hoặc dòng c chỉ tiêu miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP thực hiện kê khai mục này như sau:"},{"k":"p","t":"- Cột (3), (7) và (12): Kê khai như hướng dẫn tại phần Đ.2 Phụ lục này."},{"k":"p","t":"- Cột (4), (5), 6), (8), (9), (10) và (11): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Đối với trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, tổng giá trị tất cả các giao dịch liên kết phát sinh trong kỳ tính thuế làm căn cứ xác định điều kiện được miễn trừ được tính bằng (=) tổng giá trị tại Cột (3) cộng (+) Cột (7) của dòng chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động liên kết”."},{"k":"p","t":"Đ.2. Người nộp thuế không thuộc trường hợp được miễn lập Hồ sơ xác định giá giao dịch liên kết tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP kê khai như sau:"},{"k":"p","t":"- Chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động kinh doanh”:"},{"k":"p","t":"+ Cột (3): Ghi tổng giá trị doanh thu bán ra cho các bên liên kết và các bên độc lập, bao gồm: Doanh thu bán hàng và cung cấp dịch vụ, doanh thu hoạt động tài chính và thu nhập khác (không bao gồm các khoản thu hộ)."},{"k":"p","t":"+ Cột (7): Ghi tổng giá trị chi phí phải trả cho các bên liên kết và các bên độc lập, bao gồm: Chi phí hàng hóa và dịch vụ mua vào, chi phí tài chính, chi phí bán hàng, chi phí quản lý doanh nghiệp và chi phí khác (không bao gồm các khoản chi hộ)."},{"k":"p","t":"+ Cột (4), (5), (6), (8), (9), (10), (11), (12) và (13): Để trống không phải kê khai."},{"k":"p","t":"- Chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động liên kết”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với từng chỉ tiêu Hàng hóa cộng (+) Dịch vụ."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với các chỉ tiêu Hàng hóa hình thành tài sản cố định cộng (+) Hàng hóa không hình thành tài sản cố định."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa hình thành tài sản cố định” và các dòng chi tiết “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị phát sinh từ mua hoặc bán tài sản cố định của người nộp thuế với các bên liên kết theo giá trị tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị phát sinh từ mua hoặc bán tài sản cố định với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và (10)."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa không hình thành tài sản cố định” và các dòng chi tiết “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị phát sinh từ mua hoặc bán hàng hoá không phải là tài sản cố định của người nộp thuế với các bên liên kết theo giá trị tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị phát sinh từ mua hoặc bán hàng hoá không phải là tài sản cố định của người nộp thuế với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và (10)."},{"k":"p","t":"- Chỉ tiêu “Dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với các chỉ tiêu “Nghiên cứu, phát triển” cộng (+) “Quảng cáo, tiếp thị” cộng (+) “Quản lý kinh doanh và tư vấn, đào tạo” cộng (+) “Hoạt động tài chính cộng” (+) “Dịch vụ khác”."},{"k":"p","t":"- Các chỉ tiêu “Nghiên cứu, phát triển”; “Quảng cáo, tiếp thị”; “Quản lý kinh doanh và tư vấn, đào tạo”; “Hoạt động tài chính và Dịch vụ khác”, và chi tiết theo từng “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị từng loại dịch vụ phát sinh từ giao dịch với các bên liên kết được ghi nhận theo giá trị ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị từng loại dịch vụ phát sinh từ giao dịch với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và Cột (10)."},{"k":"p","t":"- Cột (6) và (10): Ghi tương ứng với từng chỉ tiêu theo từng bên liên kết ký hiệu viết tắt tên phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP cấu thành giá trị bán ra cho bên liên kết và giá trị mua vào từ bên liên kết của người nộp thuế xác định theo Hồ sơ xác định giá giao dịch liên kết, cụ thể như sau:"},{"k":"p","t":"+ PP1: Phương pháp so sánh giá giao dịch liên kết với giá giao dịch độc lập (phương pháp so sánh giá giao dịch độc lập)."},{"k":"p","t":"+ PP2: Phương pháp so sánh tỷ suất lợi nhuận của người nộp thuế với tỷ suất lợi nhuận của các đối tượng so sánh độc lập."},{"k":"p","t":"PP2-1: Phương pháp so sánh tỷ suất lợi gộp trên doanh thu (phương pháp giá bán lại)."},{"k":"p","t":"PP2-2: Phương pháp so sánh tỷ suất lợi gộp trên giá vốn (phương pháp giá vốn cộng lãi)."},{"k":"p","t":"PP2-3: Phương pháp so sánh tỷ suất lợi nhuận thuần."},{"k":"p","t":"+ PP3: Phương pháp phân bổ lợi nhuận giữa các bên liên kết."},{"k":"p","t":"Ví dụ:"},{"k":"p","t":"+ Mua máy móc từ bên liên kết A trên cơ sở phương pháp so sánh giá giao dịch độc lập, tại dòng chỉ tiêu Hàng hóa hình thành tài sản cố định từ bên liên kết A Cột (10): Ghi PP1."},{"k":"p","t":"+ Thu phí dịch vụ quản lý cung cấp cho bên liên kết B trên cơ sở phương pháp giá vốn cộng lãi, tại dòng chỉ tiêu Quản lý kinh doanh và tư vấn, đào tạo cho bên liên kết B Cột (6): Ghi PP2-2."},{"k":"p","t":"- Cột (5) và (9): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Cột (11): Ghi lợi nhuận tăng do xác định lại theo giá giao dịch độc lập."},{"k":"p","t":"- Cột (12): Ghi lần lượt tổng giá trị thu hộ, tổng giá trị chi hộ, tổng giá trị doanh thu phân bổ cho cơ sở thường trú, tổng giá trị chi phí phân bổ cho cơ sở thường trú phát sinh trong kỳ tính thuế."},{"k":"p","t":"- Cột (13): Ghi theo hướng dẫn tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP tương ứng với từng giao dịch thuộc phạm vi áp dụng APA và để trống các ô tương ứng với các dòng chỉ tiêu ghi số liệu tổng giá trị."},{"k":"p","t":"E. Mục IV. Kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết:"},{"k":"p","t":"- Chỉ tiêu “Người nộp thuế đã ký thỏa thuận trước về phương pháp xác định giá tính thuế (APA)”:"},{"k":"p","t":"Người nộp thuế đánh dấu “x” vào “Có” nếu đã ký APA đơn phương, song phương hoặc đa phương với Cơ quan thuế Việt Nam. Trường hợp người nộp thuế không ký APA với Cơ quan thuế thì đánh dấu “x” vào “Không” và để trống không kê khai các chỉ tiêu tại Cột (4) bảng kết quả sản xuất kinh doanh tại mục này."},{"k":"p","t":"- Người nộp thuế chỉ phát sinh các khoản thu hoặc doanh thu với các bên độc lập chỉ kê khai tại Cột (6) của bảng kết quả sản xuất kinh doanh phù hợp với từng loại hình doanh nghiệp đối với từng chỉ tiêu tương ứng được hướng dẫn tại Phụ lục này."},{"k":"p","t":"1. Dành cho người nộp thuế thuộc các ngành sản xuất, thương mại, dịch vụ:"},{"k":"p","t":"a) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2a miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1), (2), (3), (4), (5), (6), (7), (8), (8.1), (9), (9.1), (9.1.a), (9.1.b), (10), (11) và (12):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Các chỉ tiêu tại dòng (13), (14), (15), (15.1), (15.2), (15.3), (15.4), (15.5) và (16) xác định và tính toán theo quy định tại điểm a, điểm b khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu tại dòng (17): Người nộp thuế để trống không kê khai."},{"k":"p","t":"b) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2c miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1), (2), (3), (4), (5), (6), (7), (8), (8.1), (9), (9.1), (9.1.a), (9.1.b),(10),(11)và (12):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Các chỉ tiêu tại dòng (13), (14), (15), (15.1), (15.2), (15.3), (15.4), (15.5) và (16) xác định và tính toán theo quy định tại điểm a, điểm b khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần tại các dòng chỉ tiêu (17.1), (17.2), (17.3), (17...) theo quy định tại điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột 6: Người nộp thuế kê khai giá trị Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với lĩnh vực hoạt động theo quy định tại điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế thực hiện kinh doanh nhiều hơn một lĩnh vực, theo dõi, hạch toán riêng doanh thu, chi phí của từng lĩnh vực hoặc theo dõi, hạch toán riêng được doanh thu nhưng không theo dõi, hạch toán riêng được chi phí phát sinh của từng lĩnh vực thực hiện kê khai riêng theo từng lĩnh vực."},{"k":"p","t":"Trường hợp người nộp thuế thực hiện kinh doanh nhiều hơn một lĩnh vực không theo dõi, hạch toán riêng được doanh thu và chi phí của từng lĩnh vực thực hiện kê khai theo lĩnh vực có tỷ suất cao nhất."},{"k":"p","t":"c) Trường hợp người nộp thuế không được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, kê khai như sau:"},{"k":"p","t":"- Chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của các giao dịch cung cấp hàng hóa, dịch vụ cho các bên liên kết xác định giá theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của các giao dịch cung cấp hàng hóa, dịch vụ cho các bên độc lập theo giá trị ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"Các chỉ tiêu “Doanh thu bán hàng hoá, dịch vụ xuất khẩu” và “Các khoản giảm trừ doanh thu”: Người nộp thuế kê khai tương ứng doanh thu bán hàng hoá và cung cấp dịch vụ và ghi theo hướng dẫn tương tự tại chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ”."},{"k":"p","t":"- Chỉ tiêu “Doanh thu thuần về bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Các khoản giảm trừ doanh thu”."},{"k":"p","t":"- Chỉ tiêu “Giá vốn hàng bán”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của giá vốn hàng bán tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên liên kết và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của giá vốn hàng bán tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên độc lập và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6) có giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Doanh thu thuần về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Giá vốn hàng bán”."},{"k":"p","t":"- Các chỉ tiêu “Chi phí bán hàng” và “Chi phí quản lý doanh nghiệp”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của chi phí bán hàng, chi phí quản lý doanh nghiệp tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên liên kết bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của chi phí bán hàng, chi phí quản lý doanh nghiệp tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên độc lập bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong hoạt động sản xuất kinh doanh, người nộp thuế theo dõi hạch toán và ghi giá trị hạch toán, xác định riêng đối với chi phí từ bên liên kết thuộc phạm vi xác định giá theo Hồ sơ xác định giá giao dịch liên kết; theo APA và giao dịch với các bên độc lập tương ứng với cột (3), (4) và (5). Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Doanh thu hoạt động tài chính”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị doanh thu hoạt động tài chính."},{"k":"p","t":"- Chỉ tiêu “Lãi tiền gửi và lãi cho vay”: Ghi giá trị tiền lãi thu được từ hoạt động cho vay tính vào doanh thu hoạt động tài chính trong kỳ."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị theo xác định tại Hồ sơ xác định giá giao dịch liên kết, theo APA đối với giao dịch phát sinh với các bên liên kết và giá trị ghi tại sổ kế toán đối với giao dịch phát sinh với các bên độc lập."},{"k":"p","t":"- Chỉ tiêu “Chi phí tài chính”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị chi phí hoạt động tài chính."},{"k":"p","t":"- Chỉ tiêu “Chi phí lãi tiền vay dùng cho hoạt động sản xuất, kinh doanh”: Ghi giá trị chi phí lãi vay tính vào chi phí tài chính trong kỳ."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị theo xác định tại Hồ sơ xác định giá giao dịch liên kết, theo APA đối với giao dịch phát sinh với các bên liên kết và giá trị ghi tại sổ kế toán đối với giao dịch phát sinh với các bên độc lập."},{"k":"p","t":"- Chỉ tiêu “Chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị chi phí khấu hao đã tính vào chi phí trong kỳ và được xác định bằng tổng giá trị chi phí khấu hao đã tính vào giá vốn hàng bán, chi phí bán hàng và chi phí quản lý doanh nghiệp."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Chi phí bán hàng” trừ (-) chỉ tiêu “Chi phí quản lý doanh nghiệp” cộng (+) chỉ tiêu “Doanh thu tài chính” trừ (-) chỉ tiêu “Chi phí tài chính”."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Chi phí bán hàng” trừ (-) chỉ tiêu “Chi phí quản lý doanh nghiệp”."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh” cộng (+) chỉ tiêu “Chi phí lãi vay” trừ (-) chỉ tiêu “Lãi tiền gửi và lãi cho vay” cộng (+) chỉ tiêu “Chi phí khấu hao”."},{"k":"p","t":"- Chỉ tiêu “Tỷ lệ chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ trên tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị tỷ lệ phần trăm bằng (=) giá trị [chỉ tiêu “Chi phí lãi tiền vay” trừ (-) chỉ tiêu “Lãi tiền gửi và lãi cho vay”] chia (:) giá trị chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (17.1), (17.2), (17.3),... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Ví dụ:"},{"k":"p","t":"+ Người nộp thuế sử dụng phương pháp so sánh tỷ suất lợi nhuận thuần và áp dụng Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí để xác định lợi nhuận thuần trong kỳ tính thuế, tại Cột (2) chỉ tiêu (17.1): Ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí và kê khai mức tỷ suất tương ứng theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Người nộp thuế sử dụng phương pháp so sánh tỷ suất lợi nhuận thuần và áp dụng Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí đối với hoạt động sản xuất theo Hồ sơ xác định giá giao dịch liên kết; Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với hoạt động phân phối theo APA, tại Cột (2) chỉ tiêu (17.1) và (17.2): Ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí đối với hoạt động sản xuất tại chỉ tiêu (17.1) và kê khai tỷ suất tương ứng tại Cột (3); ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với hoạt động phân phối tại chỉ tiêu (17.2) và kê khai tỷ suất tương ứng tại Cột (4)."},{"k":"p","t":"- Trường hợp người nộp thuế thực hiện nhiều chức năng sản xuất, kinh doanh và Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết khác nhau thì kê khai Kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết riêng đối với từng chức năng sản xuất, kinh doanh."},{"k":"p","t":"2. Dành cho người nộp thuế thuộc các ngành ngân hàng, tín dụng:"},{"k":"p","t":"- Chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị của thu nhập lãi và các khoản thu nhập tương tự từ các bên liên kết không ký APA xác định theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3), theo APA tại Cột (4) và theo giá trị ghi sổ kế toán phát sinh với bên độc lập tại Cột (5)."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Chi phí lãi và các khoản chi phí tương tự”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị Chi trả lãi và các khoản chi phí tương tự tương ứng với Thu nhập lãi và các khoản thu nhập tương tự thu được từ các bên liên kết và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị Chi trả lãi và các khoản chi phí tương tự tương ứng với Thu nhập lãi và các khoản thu nhập tương tự thu được từ các bên độc lập bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Thu nhập lãi thuần”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu Thu nhập lãi và các khoản thu nhập tương tự trừ (-) chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ hoạt động dịch vụ”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Thu nhập lãi và các khoản thu nhập tương tự."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động dịch vụ”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Lãi/lỗ thuần từ hoạt động dịch vụ”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập từ hoạt động dịch vụ” trừ (-) chỉ tiêu “Chi phí hoạt động dịch vụ”."},{"k":"p","t":"- Các chỉ tiêu “Lãi/lỗ thuần từ hoạt động kinh doanh ngoại hối”, “Lãi/lỗ thuần từ mua bán chứng khoán kinh doanh”, “Lãi/lỗ thuần từ mua bán chứng khoán đầu tư”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ hoạt động khác”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động khác”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập từ hoạt động khác” trừ (-) chỉ tiêu “Chi phí hoạt động khác”."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ góp vốn, mua cổ phần”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Chi trả lãi và các khoản chi phí tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí dự phòng rủi ro tín dụng”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị chi phí dự phòng rủi ro tín dụng tương ứng với thu nhập và các khoản thu có tính chất là doanh thu tại Cột (3), (4) và (5) được trích lập dự phòng."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong hoạt động kinh doanh, người nộp thuế hạch toán, xác định riêng tương ứng với từng khoản thu có tính chất là doanh thu tại các cột (3), (4), (5) và ghi giá trị được hạch toán, xác định riêng. Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận trước thuế”: Phản ánh tổng số lợi nhuận thực hiện trước thuế của tổ chức ngân hàng, tín dụng trong kỳ tính thuế và được xác định như sau:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập lãi thuần” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động dịch vụ” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động kinh doanh ngoại hối” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ mua bán chứng khoán kinh doanh” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ mua bán chứng khoán đầu tư” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác” cộng (+) chỉ tiêu “Thu nhập từ góp vốn, mua cổ phần” trừ (-) chỉ tiêu “Chi phí hoạt động” trừ (-) chỉ tiêu “Chi phí dự phòng rủi ro tín dụng”."},{"k":"p","t":"- Chỉ tiêu: “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Tổng lợi nhuận trước thuế” trừ (-) chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (18.1), (18.2), (18.3) ... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận áp dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"3. Dành cho người nộp thuế là các công ty chứng khoán:"},{"k":"p","t":"a) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2a Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1.1.a), (1.1.b), (1.1.c), (1.2), (1.3), (1.4), (1.5), (1.6), (1.7), (1.8), (1.9), (1.10), (1.11), (2.1.a), (2.1.b), (2.1.c), (2 2), (2.3), (2.4), (2.5), (2.6), (2.7), (2.8), (2.9), (2.10), (2.11), (2.12), (3.1), (3.2), (3.3), (3.4), (4.1), (4.2), (4.3), (4.4), (4.5), (5), (6), (7), và (10):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Chỉ tiêu tại dòng (15): Người nộp thuế để trống không kê khai."},{"k":"p","t":"b) Trường hợp người nộp thuế không được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, kê khai như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1.1.a), (1.1.b), (1.1.c), (1.2), (1.3), (1.4), (1.5), (1.6), (1.7), (1.8), (1.9), (1.10), (1.11), (2.1.a), (2.1.b), (2.1.c), (2.2), (2.3), (2.4), (2.5), (2.6), (2.7), (2.8), (2.9), (2.10), (2.11), (2.12), (3.1), (3.2), (3.3), (3.4), (4.1), (4.2), (4.3), (4.4), (4.5), (5), (6) và (10):"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị của thu nhập lãi và các khoản thu nhập tương tự từ các bên liên kết không ký APA xác định theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3), theo APA tại Cột (4) và theo giá trị ghi sổ kế toán phát sinh với bên độc lập tại Cột (5)."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong kỳ, người nộp thuế theo dõi hạch toán và ghi giá trị hạch toán, xác định riêng đối với chi phí từ bên liên kết thuộc phạm vi xác định giá theo Hồ sơ xác định giá giao dịch liên kết; theo APA và giao dịch với các bên độc lập tương ứng với cột (3), (4) và (5). Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng
