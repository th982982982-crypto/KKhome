số liệu khai trên là đúng và chịu trách nhiệm trước pháp luật về số liệu đã khai."},{"k":"tbl","rows":[["NHÂN VIÊN ĐẠI LÝ THUẾHọ và tên:…………………..Chứng chỉ hành nghề số:….","….., ngày….. tháng….. năm….NGƯỜI NỘP THUẾ hoặcĐẠI DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ(Ký, ghi rõ họ tên; chức vụ và đóng dấu (nếu có))"]]},{"k":"p","t":"HƯỚNG DẪN KÊ KHAI MỘT SỐ CHỈ TIÊU"},{"k":"p","t":"A. Kỳ tính thuế: Ghi thông tin tương ứng với kỳ tính thuế của Tờ khai quyết toán thuế thu nhập doanh nghiệp. Kỳ tính thuế xác định theo quy định tại Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"B. Thông tin chung của người nộp thuế: Từ chỉ tiêu [01] đến chỉ tiêu [10] ghi thông tin tương ứng với thông tin đã ghi tại Tờ khai quyết toán thuế thu nhập doanh nghiệp."},{"k":"p","t":"C. Mục I. Thông tin về các bên liên kết:"},{"k":"p","t":"- Cột (2): Ghi đầy đủ tên của từng bên liên kết:"},{"k":"p","t":"+ Trường hợp bên liên kết tại Việt Nam là tổ chức thì ghi theo thông tin tại giấy phép đăng ký doanh nghiệp; là cá nhân thì ghi theo thông tin tại chứng minh nhân dân, thẻ căn cước công dân, hộ chiếu."},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân ngoài Việt Nam thì ghi theo thông tin tại văn bản xác định quan hệ liên kết như giấy phép đăng ký kinh doanh, hợp đồng, thỏa thuận giao dịch của người nộp thuế với bên liên kết."},{"k":"p","t":"- Cột (3): Ghi tên quốc gia, vùng lãnh thổ nơi bên liên kết là đối tượng cư trú."},{"k":"p","t":"- Cột (4): Ghi mã số thuế của các bên liên kết:"},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân tại Việt Nam thì ghi đủ mã số thuế."},{"k":"p","t":"+ Trường hợp bên liên kết là tổ chức, cá nhân ngoài Việt Nam thì ghi đủ mã số thuế, mã định danh người nộp thuế, nếu không có thì ghi rõ lý do."},{"k":"p","t":"- Cột (5): Căn cứ quy định tại khoản 2 Điều 5 Nghị định số 132/2020/NĐ-CP và Điều 1 Nghị định số 20/2025/NĐ-CP, người nộp thuế phát sinh giao dịch liên kết kê khai hình thức quan hệ liên kết tương ứng với từng bên liên kết bằng cách đánh dấu “x” vào ô tương ứng. Trường hợp bên liên kết thuộc nhiều hơn một hình thức quan hệ liên kết, người nộp thuế đánh dấu “x” vào các ô tương ứng."},{"k":"p","t":"D. Mục II. Các trường hợp được miễn kê khai, miễn lập hồ sơ xác định giá giao dịch liên kết:"},{"k":"p","t":"Nếu người nộp thuế thuộc trường hợp được miễn kê khai, miễn lập Hồ sơ xác định giá giao dịch liên kết quy định tại Điều 19 Nghị định số 132/2020/NĐ-CP tại Cột (2) thì đánh dấu “x” vào ô thuộc diện miễn trừ tương ứng tại Cột (3)."},{"k":"p","t":"Trường hợp người nộp thuế được miễn kê khai, miễn lập hồ sơ xác định giá giao dịch liên kết theo quy định tại khoản 1 Điều 19 Nghị định số 132/2020/NĐ-CP, người nộp thuế chỉ đánh dấu vào ô tương ứng tại Cột (3) và không phải kê khai các mục III và IV Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, người nộp thuế kê khai các mục III và IV theo hướng dẫn tương ứng tại các phần Đ.1 và E."},{"k":"p","t":"Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm b khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, người nộp thuế kê khai theo hướng dẫn tương ứng tại các phần Đ.2 và E."},{"k":"p","t":"Đ. Mục III. Thông tin xác định giá giao dịch liên kết:"},{"k":"p","t":"Đ.1. Trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP và đã kê khai đánh dấu (x) vào cột 3 tại dòng a hoặc dòng c chỉ tiêu miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP thực hiện kê khai mục này như sau:"},{"k":"p","t":"- Cột (3), (7) và (12): Kê khai như hướng dẫn tại phần Đ.2 Phụ lục này."},{"k":"p","t":"- Cột (4), (5), 6), (8), (9), (10) và (11): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Đối với trường hợp người nộp thuế được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, tổng giá trị tất cả các giao dịch liên kết phát sinh trong kỳ tính thuế làm căn cứ xác định điều kiện được miễn trừ được tính bằng (=) tổng giá trị tại Cột (3) cộng (+) Cột (7) của dòng chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động liên kết”."},{"k":"p","t":"Đ.2. Người nộp thuế không thuộc trường hợp được miễn lập Hồ sơ xác định giá giao dịch liên kết tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP kê khai như sau:"},{"k":"p","t":"- Chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động kinh doanh”:"},{"k":"p","t":"+ Cột (3): Ghi tổng giá trị doanh thu bán ra cho các bên liên kết và các bên độc lập, bao gồm: Doanh thu bán hàng và cung cấp dịch vụ, doanh thu hoạt động tài chính và thu nhập khác (không bao gồm các khoản thu hộ)."},{"k":"p","t":"+ Cột (7): Ghi tổng giá trị chi phí phải trả cho các bên liên kết và các bên độc lập, bao gồm: Chi phí hàng hóa và dịch vụ mua vào, chi phí tài chính, chi phí bán hàng, chi phí quản lý doanh nghiệp và chi phí khác (không bao gồm các khoản chi hộ)."},{"k":"p","t":"+ Cột (4), (5), (6), (8), (9), (10), (11), (12) và (13): Để trống không phải kê khai."},{"k":"p","t":"- Chỉ tiêu “Tổng giá trị giao dịch phát sinh từ hoạt động liên kết”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với từng chỉ tiêu Hàng hóa cộng (+) Dịch vụ."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với các chỉ tiêu Hàng hóa hình thành tài sản cố định cộng (+) Hàng hóa không hình thành tài sản cố định."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa hình thành tài sản cố định” và các dòng chi tiết “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị phát sinh từ mua hoặc bán tài sản cố định của người nộp thuế với các bên liên kết theo giá trị tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị phát sinh từ mua hoặc bán tài sản cố định với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và (10)."},{"k":"p","t":"- Chỉ tiêu “Hàng hóa không hình thành tài sản cố định” và các dòng chi tiết “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị phát sinh từ mua hoặc bán hàng hoá không phải là tài sản cố định của người nộp thuế với các bên liên kết theo giá trị tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị phát sinh từ mua hoặc bán hàng hoá không phải là tài sản cố định của người nộp thuế với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và (10)."},{"k":"p","t":"- Chỉ tiêu “Dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (7) và (8): Ghi tổng giá trị tại các ô tương ứng với các chỉ tiêu “Nghiên cứu, phát triển” cộng (+) “Quảng cáo, tiếp thị” cộng (+) “Quản lý kinh doanh và tư vấn, đào tạo” cộng (+) “Hoạt động tài chính cộng” (+) “Dịch vụ khác”."},{"k":"p","t":"- Các chỉ tiêu “Nghiên cứu, phát triển”; “Quảng cáo, tiếp thị”; “Quản lý kinh doanh và tư vấn, đào tạo”; “Hoạt động tài chính và Dịch vụ khác”, và chi tiết theo từng “Bên liên kết A”, “Bên liên kết B”,...:"},{"k":"p","t":"+ Cột (3) và (7): Ghi tổng giá trị từng loại dịch vụ phát sinh từ giao dịch với các bên liên kết được ghi nhận theo giá trị ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (4) và (8): Ghi tổng giá trị từng loại dịch vụ phát sinh từ giao dịch với các bên liên kết được xác định theo phương pháp xác định giá giao dịch liên kết tương ứng tại Cột (6) và Cột (10)."},{"k":"p","t":"- Cột (6) và (10): Ghi tương ứng với từng chỉ tiêu theo từng bên liên kết ký hiệu viết tắt tên phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP cấu thành giá trị bán ra cho bên liên kết và giá trị mua vào từ bên liên kết của người nộp thuế xác định theo Hồ sơ xác định giá giao dịch liên kết, cụ thể như sau:"},{"k":"p","t":"+ PP1: Phương pháp so sánh giá giao dịch liên kết với giá giao dịch độc lập (phương pháp so sánh giá giao dịch độc lập)."},{"k":"p","t":"+ PP2: Phương pháp so sánh tỷ suất lợi nhuận của người nộp thuế với tỷ suất lợi nhuận của các đối tượng so sánh độc lập."},{"k":"p","t":"PP2-1: Phương pháp so sánh tỷ suất lợi gộp trên doanh thu (phương pháp giá bán lại)."},{"k":"p","t":"PP2-2: Phương pháp so sánh tỷ suất lợi gộp trên giá vốn (phương pháp giá vốn cộng lãi)."},{"k":"p","t":"PP2-3: Phương pháp so sánh tỷ suất lợi nhuận thuần."},{"k":"p","t":"+ PP3: Phương pháp phân bổ lợi nhuận giữa các bên liên kết."},{"k":"p","t":"Ví dụ:"},{"k":"p","t":"+ Mua máy móc từ bên liên kết A trên cơ sở phương pháp so sánh giá giao dịch độc lập, tại dòng chỉ tiêu Hàng hóa hình thành tài sản cố định từ bên liên kết A Cột (10): Ghi PP1."},{"k":"p","t":"+ Thu phí dịch vụ quản lý cung cấp cho bên liên kết B trên cơ sở phương pháp giá vốn cộng lãi, tại dòng chỉ tiêu Quản lý kinh doanh và tư vấn, đào tạo cho bên liên kết B Cột (6): Ghi PP2-2."},{"k":"p","t":"- Cột (5) và (9): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Cột (11): Ghi lợi nhuận tăng do xác định lại theo giá giao dịch độc lập."},{"k":"p","t":"- Cột (12): Ghi lần lượt tổng giá trị thu hộ, tổng giá trị chi hộ, tổng giá trị doanh thu phân bổ cho cơ sở thường trú, tổng giá trị chi phí phân bổ cho cơ sở thường trú phát sinh trong kỳ tính thuế."},{"k":"p","t":"- Cột (13): Ghi theo hướng dẫn tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP tương ứng với từng giao dịch thuộc phạm vi áp dụng APA và để trống các ô tương ứng với các dòng chỉ tiêu ghi số liệu tổng giá trị."},{"k":"p","t":"E. Mục IV. Kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết:"},{"k":"p","t":"- Chỉ tiêu “Người nộp thuế đã ký thỏa thuận trước về phương pháp xác định giá tính thuế (APA)”:"},{"k":"p","t":"Người nộp thuế đánh dấu “x” vào “Có” nếu đã ký APA đơn phương, song phương hoặc đa phương với Cơ quan thuế Việt Nam. Trường hợp người nộp thuế không ký APA với Cơ quan thuế thì đánh dấu “x” vào “Không” và để trống không kê khai các chỉ tiêu tại Cột (4) bảng kết quả sản xuất kinh doanh tại mục này."},{"k":"p","t":"- Người nộp thuế chỉ phát sinh các khoản thu hoặc doanh thu với các bên độc lập chỉ kê khai tại Cột (6) của bảng kết quả sản xuất kinh doanh phù hợp với từng loại hình doanh nghiệp đối với từng chỉ tiêu tương ứng được hướng dẫn tại Phụ lục này."},{"k":"p","t":"1. Dành cho người nộp thuế thuộc các ngành sản xuất, thương mại, dịch vụ:"},{"k":"p","t":"a) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2a miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1), (2), (3), (4), (5), (6), (7), (8), (8.1), (9), (9.1), (9.1.a), (9.1.b), (10), (11) và (12):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Các chỉ tiêu tại dòng (13), (14), (15), (15.1), (15.2), (15.3), (15.4), (15.5) và (16) xác định và tính toán theo quy định tại điểm a, điểm b khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu tại dòng (17): Người nộp thuế để trống không kê khai."},{"k":"p","t":"b) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2c miễn lập Hồ sơ xác định giá giao dịch liên kết của Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1), (2), (3), (4), (5), (6), (7), (8), (8.1), (9), (9.1), (9.1.a), (9.1.b),(10),(11)và (12):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Các chỉ tiêu tại dòng (13), (14), (15), (15.1), (15.2), (15.3), (15.4), (15.5) và (16) xác định và tính toán theo quy định tại điểm a, điểm b khoản 3 Điều 16 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần tại các dòng chỉ tiêu (17.1), (17.2), (17.3), (17...) theo quy định tại điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột 6: Người nộp thuế kê khai giá trị Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với lĩnh vực hoạt động theo quy định tại điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"Trường hợp người nộp thuế thực hiện kinh doanh nhiều hơn một lĩnh vực, theo dõi, hạch toán riêng doanh thu, chi phí của từng lĩnh vực hoặc theo dõi, hạch toán riêng được doanh thu nhưng không theo dõi, hạch toán riêng được chi phí phát sinh của từng lĩnh vực thực hiện kê khai riêng theo từng lĩnh vực."},{"k":"p","t":"Trường hợp người nộp thuế thực hiện kinh doanh nhiều hơn một lĩnh vực không theo dõi, hạch toán riêng được doanh thu và chi phí của từng lĩnh vực thực hiện kê khai theo lĩnh vực có tỷ suất cao nhất."},{"k":"p","t":"c) Trường hợp người nộp thuế không được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a hoặc điểm c khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, kê khai như sau:"},{"k":"p","t":"- Chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của các giao dịch cung cấp hàng hóa, dịch vụ cho các bên liên kết xác định giá theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của các giao dịch cung cấp hàng hóa, dịch vụ cho các bên độc lập theo giá trị ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"Các chỉ tiêu “Doanh thu bán hàng hoá, dịch vụ xuất khẩu” và “Các khoản giảm trừ doanh thu”: Người nộp thuế kê khai tương ứng doanh thu bán hàng hoá và cung cấp dịch vụ và ghi theo hướng dẫn tương tự tại chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ”."},{"k":"p","t":"- Chỉ tiêu “Doanh thu thuần về bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Các khoản giảm trừ doanh thu”."},{"k":"p","t":"- Chỉ tiêu “Giá vốn hàng bán”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của giá vốn hàng bán tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên liên kết và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của giá vốn hàng bán tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên độc lập và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6) có giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Doanh thu thuần về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Giá vốn hàng bán”."},{"k":"p","t":"- Các chỉ tiêu “Chi phí bán hàng” và “Chi phí quản lý doanh nghiệp”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị của chi phí bán hàng, chi phí quản lý doanh nghiệp tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên liên kết bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị của chi phí bán hàng, chi phí quản lý doanh nghiệp tương ứng với doanh thu bán hàng và cung cấp dịch vụ cho các bên độc lập bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong hoạt động sản xuất kinh doanh, người nộp thuế theo dõi hạch toán và ghi giá trị hạch toán, xác định riêng đối với chi phí từ bên liên kết thuộc phạm vi xác định giá theo Hồ sơ xác định giá giao dịch liên kết; theo APA và giao dịch với các bên độc lập tương ứng với cột (3), (4) và (5). Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Doanh thu hoạt động tài chính”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị doanh thu hoạt động tài chính."},{"k":"p","t":"- Chỉ tiêu “Lãi tiền gửi và lãi cho vay”: Ghi giá trị tiền lãi thu được từ hoạt động cho vay tính vào doanh thu hoạt động tài chính trong kỳ."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị theo xác định tại Hồ sơ xác định giá giao dịch liên kết, theo APA đối với giao dịch phát sinh với các bên liên kết và giá trị ghi tại sổ kế toán đối với giao dịch phát sinh với các bên độc lập."},{"k":"p","t":"- Chỉ tiêu “Chi phí tài chính”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị chi phí hoạt động tài chính."},{"k":"p","t":"- Chỉ tiêu “Chi phí lãi tiền vay dùng cho hoạt động sản xuất, kinh doanh”: Ghi giá trị chi phí lãi vay tính vào chi phí tài chính trong kỳ."},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị theo xác định tại Hồ sơ xác định giá giao dịch liên kết, theo APA đối với giao dịch phát sinh với các bên liên kết và giá trị ghi tại sổ kế toán đối với giao dịch phát sinh với các bên độc lập."},{"k":"p","t":"- Chỉ tiêu “Chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị chi phí khấu hao đã tính vào chi phí trong kỳ và được xác định bằng tổng giá trị chi phí khấu hao đã tính vào giá vốn hàng bán, chi phí bán hàng và chi phí quản lý doanh nghiệp."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Chi phí bán hàng” trừ (-) chỉ tiêu “Chi phí quản lý doanh nghiệp” cộng (+) chỉ tiêu “Doanh thu tài chính” trừ (-) chỉ tiêu “Chi phí tài chính”."},{"k":"p","t":"- Chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Lợi nhuận gộp về bán hàng và cung cấp dịch vụ” trừ (-) chỉ tiêu “Chi phí bán hàng” trừ (-) chỉ tiêu “Chi phí quản lý doanh nghiệp”."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị chỉ tiêu “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh” cộng (+) chỉ tiêu “Chi phí lãi vay” trừ (-) chỉ tiêu “Lãi tiền gửi và lãi cho vay” cộng (+) chỉ tiêu “Chi phí khấu hao”."},{"k":"p","t":"- Chỉ tiêu “Tỷ lệ chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ trên tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị tỷ lệ phần trăm bằng (=) giá trị [chỉ tiêu “Chi phí lãi tiền vay” trừ (-) chỉ tiêu “Lãi tiền gửi và lãi cho vay”] chia (:) giá trị chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (17.1), (17.2), (17.3),... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"Ví dụ:"},{"k":"p","t":"+ Người nộp thuế sử dụng phương pháp so sánh tỷ suất lợi nhuận thuần và áp dụng Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí để xác định lợi nhuận thuần trong kỳ tính thuế, tại Cột (2) chỉ tiêu (17.1): Ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí và kê khai mức tỷ suất tương ứng theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Người nộp thuế sử dụng phương pháp so sánh tỷ suất lợi nhuận thuần và áp dụng Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí đối với hoạt động sản xuất theo Hồ sơ xác định giá giao dịch liên kết; Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với hoạt động phân phối theo APA, tại Cột (2) chỉ tiêu (17.1) và (17.2): Ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên tổng chi phí đối với hoạt động sản xuất tại chỉ tiêu (17.1) và kê khai tỷ suất tương ứng tại Cột (3); ghi Lợi nhuận thuần từ hoạt động sản xuất kinh doanh trong kỳ không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính trên doanh thu thuần đối với hoạt động phân phối tại chỉ tiêu (17.2) và kê khai tỷ suất tương ứng tại Cột (4)."},{"k":"p","t":"- Trường hợp người nộp thuế thực hiện nhiều chức năng sản xuất, kinh doanh và Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết khác nhau thì kê khai Kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết riêng đối với từng chức năng sản xuất, kinh doanh."},{"k":"p","t":"2. Dành cho người nộp thuế thuộc các ngành ngân hàng, tín dụng:"},{"k":"p","t":"- Chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị của thu nhập lãi và các khoản thu nhập tương tự từ các bên liên kết không ký APA xác định theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3), theo APA tại Cột (4) và theo giá trị ghi sổ kế toán phát sinh với bên độc lập tại Cột (5)."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Chi phí lãi và các khoản chi phí tương tự”:"},{"k":"p","t":"+ Cột (3) và (4): Ghi tổng giá trị Chi trả lãi và các khoản chi phí tương tự tương ứng với Thu nhập lãi và các khoản thu nhập tương tự thu được từ các bên liên kết và bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (5): Ghi tổng giá trị Chi trả lãi và các khoản chi phí tương tự tương ứng với Thu nhập lãi và các khoản thu nhập tương tự thu được từ các bên độc lập bằng (=) tổng giá trị phát sinh với các bên liên kết xác định theo Hồ sơ xác định giá giao dịch liên kết và theo APA cộng (+) giá trị giao dịch phát sinh với các bên độc lập ghi tại sổ kế toán."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Chỉ tiêu “Thu nhập lãi thuần”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu Thu nhập lãi và các khoản thu nhập tương tự trừ (-) chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ hoạt động dịch vụ”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Thu nhập lãi và các khoản thu nhập tương tự."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động dịch vụ”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Lãi/lỗ thuần từ hoạt động dịch vụ”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập từ hoạt động dịch vụ” trừ (-) chỉ tiêu “Chi phí hoạt động dịch vụ”."},{"k":"p","t":"- Các chỉ tiêu “Lãi/lỗ thuần từ hoạt động kinh doanh ngoại hối”, “Lãi/lỗ thuần từ mua bán chứng khoán kinh doanh”, “Lãi/lỗ thuần từ mua bán chứng khoán đầu tư”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ hoạt động khác”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động khác”: Ghi theo hướng dẫn tương tự tại chỉ tiêu Chi trả lãi và các khoản chi phí tương tự."},{"k":"p","t":"- Chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác”:"},{"k":"p","t":"Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập từ hoạt động khác” trừ (-) chỉ tiêu “Chi phí hoạt động khác”."},{"k":"p","t":"- Chỉ tiêu “Thu nhập từ góp vốn, mua cổ phần”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Thu nhập lãi và các khoản thu nhập tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí hoạt động”: Ghi theo hướng dẫn tương tự tại chỉ tiêu “Chi trả lãi và các khoản chi phí tương tự”."},{"k":"p","t":"- Chỉ tiêu “Chi phí dự phòng rủi ro tín dụng”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị chi phí dự phòng rủi ro tín dụng tương ứng với thu nhập và các khoản thu có tính chất là doanh thu tại Cột (3), (4) và (5) được trích lập dự phòng."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong hoạt động kinh doanh, người nộp thuế hạch toán, xác định riêng tương ứng với từng khoản thu có tính chất là doanh thu tại các cột (3), (4), (5) và ghi giá trị được hạch toán, xác định riêng. Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận trước thuế”: Phản ánh tổng số lợi nhuận thực hiện trước thuế của tổ chức ngân hàng, tín dụng trong kỳ tính thuế và được xác định như sau:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng (=) giá trị tương ứng theo từng cột tại chỉ tiêu “Thu nhập lãi thuần” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động dịch vụ” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động kinh doanh ngoại hối” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ mua bán chứng khoán kinh doanh” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ mua bán chứng khoán đầu tư” cộng (+) chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác” cộng (+) chỉ tiêu “Thu nhập từ góp vốn, mua cổ phần” trừ (-) chỉ tiêu “Chi phí hoạt động” trừ (-) chỉ tiêu “Chi phí dự phòng rủi ro tín dụng”."},{"k":"p","t":"- Chỉ tiêu: “Lợi nhuận thuần từ hoạt động sản xuất kinh doanh”:"},{"k":"p","t":"+ Cột (3), (4), (5) và (6): Ghi giá trị bằng giá trị tương ứng theo từng cột tại chỉ tiêu “Tổng lợi nhuận trước thuế” trừ (-) chỉ tiêu “Lãi/lỗ thuần từ hoạt động khác”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (18.1), (18.2), (18.3) ... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận áp dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."},{"k":"p","t":"3. Dành cho người nộp thuế là các công ty chứng khoán:"},{"k":"p","t":"a) Trường hợp người nộp thuế đã kê khai đánh dấu (x) vào Cột 3 tại dòng 2a Mục II Phụ lục I kèm theo Nghị định số 20/2025/NĐ-CP, thực hiện kê khai theo hướng dẫn như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1.1.a), (1.1.b), (1.1.c), (1.2), (1.3), (1.4), (1.5), (1.6), (1.7), (1.8), (1.9), (1.10), (1.11), (2.1.a), (2.1.b), (2.1.c), (2 2), (2.3), (2.4), (2.5), (2.6), (2.7), (2.8), (2.9), (2.10), (2.11), (2.12), (3.1), (3.2), (3.3), (3.4), (4.1), (4.2), (4.3), (4.4), (4.5), (5), (6), (7), và (10):"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị được xác định từ số liệu tại Báo cáo tài chính."},{"k":"p","t":"- Chỉ tiêu tại dòng (15): Người nộp thuế để trống không kê khai."},{"k":"p","t":"b) Trường hợp người nộp thuế không được miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại điểm a khoản 2 Điều 19 Nghị định số 132/2020/NĐ-CP, kê khai như sau:"},{"k":"p","t":"- Các chỉ tiêu tại dòng (1.1.a), (1.1.b), (1.1.c), (1.2), (1.3), (1.4), (1.5), (1.6), (1.7), (1.8), (1.9), (1.10), (1.11), (2.1.a), (2.1.b), (2.1.c), (2.2), (2.3), (2.4), (2.5), (2.6), (2.7), (2.8), (2.9), (2.10), (2.11), (2.12), (3.1), (3.2), (3.3), (3.4), (4.1), (4.2), (4.3), (4.4), (4.5), (5), (6) và (10):"},{"k":"p","t":"+ Cột (3), (4) và (5): Ghi tổng giá trị của thu nhập lãi và các khoản thu nhập tương tự từ các bên liên kết không ký APA xác định theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3), theo APA tại Cột (4) và theo giá trị ghi sổ kế toán phát sinh với bên độc lập tại Cột (5)."},{"k":"p","t":"+ Cột (6): Ghi tổng giá trị được xác định theo công thức tính tại Phụ lục I ban hành kèm theo Nghị định số 20/2025/NĐ-CP."},{"k":"p","t":"- Đối với các chỉ tiêu chi phí phát sinh trong kỳ, người nộp thuế theo dõi hạch toán và ghi giá trị hạch toán, xác định riêng đối với chi phí từ bên liên kết thuộc phạm vi xác định giá theo Hồ sơ xác định giá giao dịch liên kết; theo APA và giao dịch với các bên độc lập tương ứng với cột (3), (4) và (5). Trường hợp không xác định riêng được thì người nộp thuế lựa chọn tiêu thức phân bổ phù hợp nhất theo một hoặc một số yếu tố như doanh thu, chi phí, tài sản, nhân lực hoặc yếu tố khác phù hợp với bản chất hoạt động và ghi giá trị chi phí phân bổ vào các ô tương ứng (3), (4) và (5)."},{"k":"p","t":"- Chỉ tiêu “Tổng lợi nhuận thuần từ hoạt động kinh doanh trong kỳ cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ cộng chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị bằng giá trị chỉ tiêu “Kết quả hoạt động” cộng (+) chỉ tiêu “Tổng Chi phí lãi vay phát sinh trong kỳ” trừ (-) “Tổng lãi tiền gửi và lãi cho vay phát sinh trong kỳ” cộng (+) chỉ tiêu “Chi phí khấu hao phát sinh trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ lệ chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ trên tổng lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay trong kỳ cộng chi phí khấu hao phát sinh trong kỳ”:"},{"k":"p","t":"+ Cột (3), (4) và (5): Người nộp thuế để trống không kê khai."},{"k":"p","t":"+ Cột (6): Ghi giá trị tỷ lệ phần trăm bằng (=) giá trị [chỉ tiêu “Tổng Chi phí lãi tiền vay” trừ (-) chỉ tiêu “Tổng lãi tiền gửi và lãi cho vay”] chia (:) giá trị chỉ tiêu “Lợi nhuận thuần từ hoạt động kinh doanh cộng chi phí lãi vay cộng chi phí khấu hao phát sinh trong kỳ”."},{"k":"p","t":"- Chỉ tiêu “Tỷ suất lợi nhuận sử dụng xác định giá giao dịch liên kết”:"},{"k":"p","t":"+ Cột (2): Ghi các tỷ suất lợi nhuận áp dụng để điều chỉnh, xác định giá giao dịch liên kết tại các dòng chỉ tiêu (15.1), (15.2) (15.3), ... tương ứng với phương pháp xác định giá giao dịch liên kết theo quy định tại khoản 2 và 3 Điều 13, Điều 14, Điều 15 Nghị định số 132/2020/NĐ-CP."},{"k":"p","t":"+ Cột (3) và (4): Ghi giá trị tỷ suất lợi nhuận áp dụng xác định giá giao dịch liên kết theo Hồ sơ xác định giá giao dịch liên kết tại Cột (3) và theo APA tại Cột (4)."},{"k":"p","t":"+ Cột (5) và (6): Người nộp thuế để trống không kê khai."}]}],"refs":{"nd20_1":[{"kind":"related","targetSlug":"nd132","targetAnchor":"nd132_1","label":"NĐ 132/2020 — Văn bản gốc (Quản lý thuế với DN có giao dịch liên kết)"}]},"details":{},"summaries":{"nd20_1":{"tldr":"Sửa đổi, bổ sung định nghĩa quan hệ liên kết qua bảo lãnh/cho vay tại điểm d, k khoản 2 Điều 5 và bổ sung điểm m (tổ chức tín dụng với công ty con/công ty liên kết); đồng thời sửa trách nhiệm phối hợp cung cấp thông tin của Ngân hàng Nhà nước tại khoản 2 Điều 21 Nghị định 132/2020.","points":["Điểm d: thu hẹp phạm vi \"bảo lãnh hoặc cho vay từ 25% vốn góp và trên 50% tổng dư nợ trung, dài hạn\" — loại trừ trường hợp bên bảo lãnh/cho vay là tổ chức tín dụng không trực tiếp/gián tiếp điều hành, kiểm soát, góp vốn vào doanh nghiệp đi vay (và ngược lại, không cùng chịu sự điều hành của một bên khác).","Điểm k: mở rộng định nghĩa \"chịu sự điều hành, kiểm soát, quyết định trên thực tế\" áp dụng cho cả chi nhánh hạch toán độc lập kê khai, nộp thuế TNDN riêng.","Điểm m (mới): tổ chức tín dụng với công ty con, công ty kiểm soát hoặc công ty liên kết của tổ chức tín dụng theo Luật Các tổ chức tín dụng cũng là quan hệ liên kết.","Ngân hàng Nhà nước có trách nhiệm phối hợp cung cấp cho cơ quan thuế thông tin về khoản vay, trả nợ nước ngoài của doanh nghiệp có giao dịch liên kết, và thông tin người có liên quan của lãnh đạo, cổ đông lớn, công ty liên kết của tổ chức tín dụng khi được đề nghị."]},"nd20_2":{"tldr":"Thay thế toàn bộ Phụ lục I (mẫu kê khai thông tin về quan hệ liên kết và giao dịch liên kết) ban hành kèm Nghị định 132/2020 bằng mẫu Phụ lục I mới ban hành kèm Nghị định này.","points":["Mẫu mới cập nhật cột \"Hình thức quan hệ liên kết\" tại Mục I để phản ánh đúng các điểm d, k, m khoản 2 Điều 5 vừa được sửa đổi, bổ sung tại Điều 1.","Cấu trúc 4 mục giữ nguyên: thông tin các bên liên kết, các trường hợp miễn kê khai/miễn lập hồ sơ, thông tin xác định giá giao dịch liên kết, và kết quả sản xuất kinh doanh sau khi xác định giá giao dịch liên kết."]},"nd20_3":{"tldr":"Quy định chuyển tiếp cho phần chi phí lãi vay không được trừ của các kỳ tính thuế 2020-2023, áp dụng riêng cho doanh nghiệp chỉ có quan hệ liên kết với tổ chức tín dụng theo trường hợp loại trừ mới bổ sung (điểm d.1, d.2 khoản 2 Điều 5).","points":["Từ kỳ tính thuế năm 2024, nếu doanh nghiệp không còn quan hệ liên kết/giao dịch liên kết theo quy định mới thì phần chi phí lãi vay chưa được trừ hết tính đến cuối năm 2023 được phân bổ đều cho các kỳ tính thuế còn lại theo thời gian chuyển lãi vay quy định tại điểm b khoản 3 Điều 16 Nghị định 132/2020.","Nếu doanh nghiệp vẫn còn quan hệ liên kết/giao dịch liên kết theo quy định mới thì tiếp tục thực hiện chuyển chi phí lãi vay chưa được trừ theo đúng quy định hiện hành tại điểm b khoản 3 Điều 16 Nghị định 132/2020."]},"nd20_4":{"tldr":"Nghị định có hiệu lực thi hành từ 27/3/2025 và áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2024; giao các Bộ, ngành, địa phương và tổ chức, cá nhân liên quan chịu trách nhiệm thi hành.","points":["Hiệu lực thi hành: 27/3/2025.","Áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2024 — bao gồm cả quy định chuyển tiếp tại Điều 3.","Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, cơ quan thuộc Chính phủ, Chủ tịch UBND tỉnh/thành phố và tổ chức, cá nhân liên quan chịu trách nhiệm thi hành."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
