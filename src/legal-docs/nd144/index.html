<script id="LD" type="application/json">{"meta":{"title":"Nghị định 144/2026/NĐ-CP — Sửa đổi, bổ sung một số điều các Nghị định về thuế","shortCode":"NĐ 144/2026","subtitle":"Sửa đổi, bổ sung một số Nghị định","slug":"nd144","effectiveDate":"20/06/2026","scope":"","description":"Sửa đổi, bổ sung một số Nghị định","related":[]},"outline":[{"id":"nd144_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điểm, khoản của Điều 4","shortTitle":"Sửa đổi, bổ sung một số điểm, khoản của Điều 4","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bổ sung khoản 3a vào sau khoản 3 như sau:"},{"k":"p","t":"“3a. Bảo hiểm nhân thọ, bảo hiểm sức khỏe, bảo hiểm người học, các dịch vụ bảo hiểm khác liên quan đến con người; bảo hiểm vật nuôi, bảo hiểm cây trồng, các dịch vụ bảo hiểm nông nghiệp khác; bảo hiểm tàu, thuyền, trang thiết bị và các dụng cụ cần thiết khác phục vụ trực tiếp đánh bắt thủy sản; tái bảo hiểm theo quy định của pháp luật về kinh doanh bảo hiểm; bảo hiểm các công trình, thiết bị dầu khí, tàu chứa dầu mang quốc tịch nước ngoài do nhà thầu dầu khí hoặc nhà thầu phụ nước ngoài thuê để hoạt động tại vùng biển Việt Nam, vùng biển chồng lấn mà Việt Nam và các quốc gia có bờ biển tiếp liền hay đối diện đã thỏa thuận đặt dưới chế độ khai thác chung.”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm đ khoản 4 như sau:"},{"k":"p","t":"“đ) Bán nợ bao gồm bán khoản phải trả và khoản phải thu, bán chứng chỉ tiền gửi”."},{"k":"p","t":"3. Sửa đổi, bổ sung khoản 14 như sau:"},{"k":"p","t":"“14. Sản phẩm xuất khẩu là tài nguyên, khoáng sản khai thác chưa chế biến thành sản phẩm khác và sản phẩm xuất khẩu là tài nguyên, khoáng sản khai thác đã chế biến thành sản phẩm khác theo định hướng của nhà nước về không khuyến khích xuất khẩu, hạn chế xuất khẩu các tài nguyên, khoáng sản thô được quy định tại Danh mục (Phụ lục I, Phụ lục II) ban hành kèm theo Nghị định này."},{"k":"p","t":"Trong trường hợp cần thiết phải điều chỉnh sản phẩm xuất khẩu tại Danh mục (Phụ lục I, Phụ lục II) để phù hợp với bối cảnh kinh tế - xã hội, định hướng của nhà nước về không khuyến khích xuất khẩu, hạn chế xuất khẩu các tài nguyên, khoáng sản thô trong từng thời kỳ, Bộ Công Thương xác định và đề xuất điều chỉnh Danh mục gửi Bộ Tài chính chủ trì, nghiên cứu, phối hợp với các bộ, cơ quan liên quan báo cáo Chính phủ xem xét, quyết định.”."}]},{"id":"nd144_2","no":2,"code":"Điều 2","title":"Điều 2. Sửa đổi, bổ sung điểm b khoản 1 Điều 9","shortTitle":"Sửa đổi, bổ sung điểm b khoản 1 Điều 9","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“b) Doanh thu hàng hóa, dịch vụ và doanh thu hoa hồng đại lý được hưởng từ hoạt động đại lý bán hàng hóa, dịch vụ thuộc đối tượng không chịu thuế giá trị gia tăng; doanh thu hoa hồng môi giới dịch vụ bảo hiểm thuộc đối tượng không chịu thuế giá trị gia tăng.”."}]},{"id":"nd144_3","no":3,"code":"Điều 3","title":"Điều 3. Sửa đổi, bổ sung một số điểm của khoản 2 Điều 23","shortTitle":"Sửa đổi, bổ sung một số điểm của khoản 2 Điều 23","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm a như sau:"},{"k":"p","t":"“a) Tổng doanh thu của hàng hóa, dịch vụ bán ra bao gồm doanh thu của hàng hóa, dịch vụ chịu thuế giá trị gia tăng; doanh thu của hàng hóa, dịch vụ không chịu thuế giá trị gia tăng; giá trị gia tăng của hoạt động mua, bán, chế tác vàng, bạc, đá quý (trừ trường hợp giá trị gia tăng âm (-)) và doanh thu của hàng hóa, dịch vụ quy định tại khoản 2 Điều 40 Nghị định này (nếu có)."},{"k":"p","t":"Riêng doanh thu của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài được xác định theo quy định của pháp luật về các tổ chức tín dụng; doanh thu của hoạt động về chứng khoán và thị trường chứng khoán được xác định theo quy định của pháp luật về chứng khoán; doanh thu của hoạt động kinh doanh bảo hiểm được xác định theo quy định của pháp luật về kinh doanh bảo hiểm”."},{"k":"p","t":"2. Bổ sung điểm c vào sau điểm b như sau:"},{"k":"p","t":"“c) Doanh thu của hàng hóa, dịch vụ chịu thuế giá trị gia tăng quy định tại khoản này bao gồm cả doanh thu của hàng hóa không phải kê khai, tính nộp thuế giá trị gia tăng (nếu có) quy định tại khoản 1 Điều 5 Luật Thuế giá trị gia tăng số 48/2024/QH15 đã được sửa đổi, bổ sung bởi Luật số 149/2025/QH15.”"}]},{"id":"nd144_4","no":4,"code":"Điều 4","title":"Điều 4. Sửa đổi, bổ sung điểm g khoản 2 Điều 26","shortTitle":"Sửa đổi, bổ sung điểm g khoản 2 Điều 26","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“g) Đối với hàng hóa, dịch vụ mua trả chậm, trả góp có giá trị hàng hóa, dịch vụ mua từ 05 triệu đồng trở lên, cơ sở kinh doanh căn cứ vào hợp đồng mua hàng hóa, dịch vụ bằng văn bản, hóa đơn giá trị gia tăng và chứng từ thanh toán không dùng tiền mặt của hàng hóa, dịch vụ mua trả chậm, trả góp để khấu trừ thuế giá trị gia tăng đầu vào. Trường hợp chưa có chứng từ thanh toán không dùng tiền mặt do chưa đến thời điểm thanh toán theo hợp đồng, phụ lục hợp đồng thì cơ sở kinh doanh vẫn được khấu trừ thuế giá trị gia tăng đầu vào. Đến thời điểm thanh toán theo hợp đồng, phụ lục hợp đồng, cơ sở kinh doanh không có chứng từ thanh toán không dùng tiền mặt thì cơ sở kinh doanh phải kê khai, điều chỉnh giảm số thuế giá trị gia tăng đầu vào được khấu trừ đối với phần giá trị hàng hóa, dịch vụ không có chứng từ thanh toán không dùng tiền mặt vào kỳ tính thuế phát sinh nghĩa vụ thanh toán theo hợp đồng, phụ lục hợp đồng. Trường hợp sau khi điều chỉnh, cơ sở kinh doanh có chứng từ thanh toán không dùng tiền mặt thì cơ sở kinh doanh được kê khai, khấu trừ số thuế giá trị gia tăng đầu vào đối với phần giá trị hàng hóa, dịch vụ có chứng từ thanh toán không dùng tiền mặt vào kỳ tính thuế có chứng từ thanh toán không dùng tiền mặt.”."}]},{"id":"nd144_5","no":5,"code":"Điều 5","title":"Điều 5. Thay thế Danh mục (Phụ lục I, Phụ lục II)","shortTitle":"Thay thế Danh mục (Phụ lục I, Phụ lục II)","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thay thế Danh mục (Phụ lục I, Phụ lục II) ban hành kèm theo Nghị định số 181/2025/NĐ-CP th document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function summaryHtml(s){
  if(!s||(!s.tldr&&!(s.points&&s.points.length)))return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
  var h='';
  if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
  if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
  return h;
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
