<script id="LD" type="application/json">{"meta":{"title":"Nghị định 105/2026/NĐ-CP — Hướng dẫn thi hành Luật Công đoàn về tài chính công đoàn","shortCode":"NĐ 105/2026","subtitle":"Tài chính công đoàn","slug":"nd105","effectiveDate":"31/03/2026","scope":"1. Quy định chi tiết các nội dung về: a) Phương thức, thời hạn và nguồn đóng kinh phí công đoàn, trường hợp không đóng hoặc chậm đóng kinh phí công đoàn theo khoản 2 Điều 29 Luật Công đoàn; đơn vị sự nghiệp không hưởng 100% lương từ ngân sách nhà nước; nội dung ngân sách nhà nước cấp hỗ trợ theo quy định tại khoản 2 Điều 29 Luật Công đoàn đã được sửa đổi, bổ sung tại khoản 8 Điều 2 Luật số 97/2025","description":"Tài chính công đoàn","related":[]},"outline":[{"id":"nd105_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Quy định chi tiết các nội dung về:"},{"k":"p","t":"a) Phương thức, thời hạn và nguồn đóng kinh phí công đoàn, trường hợp không đóng hoặc chậm đóng kinh phí công đoàn theo khoản 2 Điều 29 Luật Công đoàn; đơn vị sự nghiệp không hưởng 100% lương từ ngân sách nhà nước; nội dung ngân sách nhà nước cấp hỗ trợ theo quy định tại khoản 2 Điều 29 Luật Công đoàn đã được sửa đổi, bổ sung tại khoản 8 Điều 2 Luật số 97/2025/QH15."},{"k":"p","t":"b) Miễn, giảm, tạm dừng đóng kinh phí công đoàn theo quy định tại khoản 4 Điều 30 Luật Công đoàn."},{"k":"p","t":"c) Việc quản lý, sử dụng kinh phí công đoàn của tổ chức của người lao động tại doanh nghiệp theo quy định tại khoản 6 Điều 31 Luật Công đoàn."},{"k":"p","t":"2. Hướng dẫn thi hành việc ban hành tiêu chuẩn, định mức, chế độ chi tiêu và quản lý, sử dụng tài chính công đoàn theo khoản 5 Điều 31 Luật Công đoàn."}]},{"id":"nd105_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng đóng kinh phí công đoàn theo quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn đã được sửa đổi, bổ sung tại khoản 8 Điều 2 Luật số 97/2025/QH15 bao gồm: Doanh nghiệp, đơn vị sự nghiệp không hưởng 100% lương từ ngân sách nhà nước, hợp tác xã, liên hiệp hợp tác xã và cơ quan, tổ chức, đơn vị khác có sử dụng lao động theo quy định của pháp luật."},{"k":"p","t":"2. Cơ quan, tổ chức, các cấp công đoàn, cá nhân có liên quan đến quản lý và sử dụng tài chính công đoàn theo quy định của Luật Công đoàn."},{"k":"p","t":"3. Tổ chức của người lao động tại doanh nghiệp được cấp đăng ký theo Điều 172 Bộ luật Lao động năm 2019."}]},{"id":"nd105_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc quản lý và sử dụng kinh phí công đoàn","shortTitle":"Nguyên tắc quản lý và sử dụng kinh phí công đoàn","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí công đoàn được quản lý, sử dụng theo các nguyên tắc, nhiệm vụ quy định tại khoản 1 và khoản 2 Điều 31 Luật Công đoàn."},{"k":"p","t":"2. Tổ chức công đoàn được giao quản lý, sử dụng tài chính công đoàn được mở tài khoản tại Kho bạc Nhà nước để phản ánh các khoản ngân sách nhà nước cấp hỗ trợ; được mở tài khoản tiền gửi tại ngân hàng để phản ánh các khoản thu, chi kinh phí công đoàn theo quy định của Luật Công đoàn."},{"k":"p","t":"3. Kết thúc năm ngân sách, nguồn thu kinh phí công đoàn chưa sử dụng hết được chuyển sang năm sau để tiếp tục sử dụng theo quy định; đối với nguồn ngân sách nhà nước cấp hỗ trợ, thực hiện theo quy định của Luật Ngân sách nhà nước và các văn bản hướng dẫn Luật về khóa sổ ngân sách cuối năm."}]},{"id":"nd105_4","no":4,"code":"Điều 4","title":"Điều 4. Phương thức, thời hạn đóng kinh phí công đoàn","shortTitle":"Phương thức, thời hạn đóng kinh phí công đoàn","chuong":"Chương II — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Phương thức đóng kinh phí công đoàn"},{"k":"p","t":"a) Phương thức đóng kinh phí công đoàn mỗi tháng một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động đối với:"},{"k":"p","t":"Đơn vị sự nghiệp công lập không hưởng 100% lương từ ngân sách nhà nước (đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên và chi đầu tư, đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên)."},{"k":"p","t":"Đơn vị sự nghiệp công lập tự bảo đảm một phần chi thường xuyên."},{"k":"p","t":"Cơ quan, tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam có liên quan đến tổ chức và hoạt động công đoàn, văn phòng điều hành của phía nước ngoài trong hợp đồng hợp tác kinh doanh tại Việt Nam có sử dụng lao động là người Việt Nam."},{"k":"p","t":"Cơ quan, tổ chức, đơn vị khác, doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã."},{"k":"p","t":"b) Phương thức đóng kinh phí công đoàn theo mỗi tháng một lần hoặc 03 tháng một lần cùng với thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động trên cơ sở đăng ký với tổ chức công đoàn đối với:"},{"k":"p","t":"Tổ chức, doanh nghiệp nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả tiền lương theo chu kỳ sản xuất, kinh doanh."},{"k":"p","t":"2. Thời hạn đóng kinh phí công đoàn"},{"k":"p","t":"a) Thời hạn đóng kinh phí công đoàn chậm nhất là ngày cuối cùng của tháng tiếp theo đối với cơ quan, tổ chức, đơn vị, doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đóng kinh phí công đoàn theo tháng quy định tại khoản 1 Điều này."},{"k":"p","t":"b) Thời hạn đóng kinh phí công đoàn chậm nhất là ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đối với phương thức đóng 03 tháng một lần đối với tổ chức, doanh nghiệp nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả tiền lương theo chu kỳ sản xuất, kinh doanh đóng kinh phí công đoàn theo phương thức 03 tháng một lần quy định tại điểm b khoản 1 Điều này."}]},{"id":"nd105_5","no":5,"code":"Điều 5","title":"Điều 5. Nguồn đóng kinh phí công đoàn","shortTitle":"Nguồn đóng kinh phí công đoàn","chuong":"Chương II — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với đơn vị sự nghiệp công lập tự bảo đảm một phần chi thường xuyên: Nguồn đóng kinh phí công đoàn từ nguồn ngân sách nhà nước, nguồn thu sự nghiệp và nguồn thu hợp pháp khác (nếu có) và được hạch toán vào chi phí của đơn vị."},{"k":"p","t":"2. Đối với đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên và chi đầu tư, đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên: Nguồn kinh phí công đoàn đơn vị tự bảo đảm từ nguồn thu hoạt động sự nghiệp, nguồn thu khác (nếu có) và được hạch toán vào chi phí của đơn vị."},{"k":"p","t":"3. Đối với cơ quan, đơn vị, tổ chức còn lại, doanh nghiệp, liên hiệp hợp tác xã, hợp tác xã: Nguồn đóng kinh phí công đoàn từ nguồn tài chính của cơ quan, đơn vị, tổ chức khác, doanh nghiệp, liên hiệp hợp tác xã, hợp tác xã và được hạch toán vào chi phí hoạt động sản xuất, kinh doanh, dịch vụ trong kỳ theo quy định của pháp luật."}]},{"id":"nd105_6","no":6,"code":"Điều 6","title":"Điều 6. Chậm đóng, không đóng kinh phí công đoàn","shortTitle":"Chậm đóng, không đóng kinh phí công đoàn","chuong":"Chương II — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Chậm đóng kinh phí công đoàn là hành vi của đối tượng đóng kinh phí công đoàn chưa đóng hoặc đóng chưa đầy đủ số tiền phải đóng theo mức đóng quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn kể từ sau thời hạn đóng kinh phí công đoàn quy định tại khoản 2 Điều 4 Nghị định này."},{"k":"p","t":"2. Không đóng kinh phí công đoàn là hành vi của đối tượng đóng kinh phí công đoàn thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Không trích, đóng kinh phí công đoàn."},{"k":"p","t":"b) Không đóng hoặc đóng không đầy đủ số tiền phải đóng theo mức đóng quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn trong thời hạn 60 ngày kể từ ngày hết thời hạn quy định tại khoản 2 Điều 4 của Nghị định này."},{"k":"p","t":"c) Không đóng hoặc đóng không đầy đủ số người thuộc đối tượng phải đóng trong thời hạn 60 ngày kể từ ngày hết thời hạn quy định tại khoản 2 Điều 4 của Nghị định này."},{"k":"p","t":"3. Trường hợp tạm dừng đóng kinh phí công đoàn, giảm mức đóng kinh phí công đoàn không thuộc trường hợp chậm đóng, không đóng kinh phí công đoàn quy định tại khoản 1 và khoản 2 Điều này."}]},{"id":"nd105_7","no":7,"code":"Điều 7","title":"Điều 7. Các nội dung ngân sách trung ương hỗ trợ đối với Tổng Liên đoàn Lao động Việt Nam","shortTitle":"Các nội dung ngân sách trung ương hỗ trợ đối với Tổng Liên đoàn Lao động Việt Nam","chuong":"Chương III — NGÂN SÁCH NHÀ NƯỚC HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí đóng niên liễm của Tổng Liên đoàn Lao động Việt Nam cho các tổ chức quốc tế."},{"k":"p","t":"2. Kinh phí hoạt động của các đơn vị sự nghiệp công lập trực thuộc Tổng Liên đoàn Lao động Việt Nam theo Quyết định của cấp có thẩm quyền về chức năng, nhiệm vụ, tổ chức bộ máy của Tổng Liên đoàn Lao động Việt Nam: Ngân sách trung ương hỗ trợ theo quy định của pháp luật về cơ chế tự chủ tài chính của đơn vị sự nghiệp công lập."},{"k":"p","t":"3. Kinh phí thực hiện các nhiệm vụ khoa học và công nghệ, đổi mới sáng tạo và chuyển đổi số do Tổng Liên đoàn Lao động Việt Nam thực hiện."},{"k":"p","t":"4. Kinh phí đào tạo bồi dưỡng cán bộ, công chức, viên chức của Tổng Liên đoàn Lao động Việt Nam và đơn vị trực thuộc Tổng Liên đoàn Lao động Việt Nam thành lập theo quy định của cấp có thẩm quyền: Ngân sách trung ương hỗ trợ theo quy định của pháp luật về đào tạo bồi dưỡng công chức, viên chức."},{"k":"p","t":"5. Kinh phí thực hiện các chương trình mục tiêu quốc gia (nếu có), chương trình, đề án, dự án của Tổng Liên đoàn Lao động Việt Nam được cấp có thẩm quyền phê duyệt."},{"k":"p","t":"6. Kinh phí thực hiện các nhiệm vụ do cơ quan nhà nước có thẩm quyền đặt hàng với Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"7. Kinh phí thực hiện các dự án có nguồn vốn nước ngoài do Tổng Liên đoàn Lao động Việt Nam thực hiện, được cấp có thẩm quyền phê duyệt."},{"k":"p","t":"8. Kinh phí thực hiện kế hoạch tổ chức đoàn ra, đoàn vào được cấp có thẩm quyền phê duyệt của Tổng Liên đoàn Lao động Việt Nam khi thực hiện nhiệm vụ đại diện duy nhất của người lao động ở cấp quốc gia trong quan hệ lao động và quan hệ quốc tế về công đoàn."},{"k":"p","t":"9. Chi đầu tư phát triển của Tổng Liên đoàn Lao động Việt Nam theo dự án được cấp có thẩm quyền phê duyệt."}]},{"id":"nd105_8","no":8,"code":"Điều 8","title":"Điều 8. Các nội dung ngân sách địa phương hỗ trợ đối với Liên đoàn Lao động cấp tỉnh","shortTitle":"Các nội dung ngân sách địa phương hỗ trợ đối với Liên đoàn Lao động cấp tỉnh","chuong":"Chương III — NGÂN SÁCH NHÀ NƯỚC HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí hoạt động của các đơn vị sự nghiệp công lập trực thuộc Liên đoàn Lao động cấp tỉnh theo Quyết định của cấp có thẩm quyền về chức năng, nhiệm vụ, tổ chức bộ máy của Liên đoàn Lao động cấp tỉnh: Ngân sách địa phương hỗ trợ theo quy định của pháp luật về cơ chế tự chủ tài chính của đơn vị sự nghiệp công lập."},{"k":"p","t":"2. Kinh phí thực hiện các nhiệm vụ khoa học và công nghệ, đổi mới sáng tạo và chuyển đổi số do Liên đoàn Lao động cấp tỉnh thực hiện."},{"k":"p","t":"3. Kinh phí đào tạo bồi dưỡng cán bộ, công chức, viên chức của Liên đoàn Lao động cấp tỉnh và đơn vị trực thuộc Liên đoàn Lao động cấp tỉnh thành lập theo quy định của cấp có thẩm quyền: Ngân sách địa phương hỗ trợ theo quy định của pháp luật về đào tạo bồi dưỡng công chức, viên chức."},{"k":"p","t":"4. Kinh phí thực hiện các chương trình mục tiêu quốc gia (nếu có), chương trình, đề án, dự án của Liên đoàn Lao động cấp tỉnh được cấp có thẩm quyền phê duyệt."},{"k":"p","t":"5. Kinh phí thực hiện các nhiệm vụ do cơ quan nhà nước có thẩm quyền đặt hàng với Liên đoàn Lao động cấp tỉnh."},{"k":"p","t":"6. Kinh phí thực hiện các dự án có nguồn vốn nước ngoài do Liên đoàn Lao động cấp tỉnh thực hiện, được cấp có thẩm quyền phê duyệt."},{"k":"p","t":"7. Chi đầu tư phát triển của Liên đoàn Lao động cấp tỉnh theo dự án được cấp có thẩm quyền phê duyệt."}]},{"id":"nd105_9","no":9,"code":"Điều 9","title":"Điều 9. Ngân sách nhà nước hỗ trợ kinh phí hoạt động của Công đoàn Việt Nam","shortTitle":"Ngân sách nhà nước hỗ trợ kinh phí hoạt động của Công đoàn Việt Nam","chuong":"Chương III — NGÂN SÁCH NHÀ NƯỚC HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"Ngân sách nhà nước hỗ trợ kinh phí hoạt động của Công đoàn Việt Nam theo nguyên tắc bảo đảm cân đối kinh phí hoạt động của Công đoàn Việt Nam và phân cấp ngân sách nhà nước đối với trường hợp nguồn thu tài chính công đoàn quy định tại các điểm a, b và d khoản 1 Điều 29 Luật Công đoàn, không bảo đảm kinh phí hoạt động thường xuyên của hệ thống tổ chức của Công đoàn Việt Nam và hoạt động thực hiện quyền, trách nhiệm của công đoàn."}]},{"id":"nd105_10","no":10,"code":"Điều 10","title":"Điều 10. Quản lý, sử dụng kinh phí ngân sách nhà nước hỗ trợ","shortTitle":"Quản lý, sử dụng kinh phí ngân sách nhà nước hỗ trợ","chuong":"Chương III — NGÂN SÁCH NHÀ NƯỚC HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí thuộc ngân sách cấp nào hỗ trợ thì phân bổ cho cơ quan, đơn vị thuộc công đoàn cấp đó thực hiện; không sử dụng ngân sách trung ương để hỗ trợ cho cơ quan, đơn vị thuộc công đoàn cấp dưới."},{"k":"p","t":"2. Cơ quan, đơn vị được ngân sách nhà nước hỗ trợ phải thực hiện sử dụng kinh phí theo đúng chế độ, tiêu chuẩn, định mức do cơ quan nhà nước có thẩm quyền quy định; bảo đảm đúng mục đích, tiết kiệm, có hiệu quả và có đủ hồ sơ, chứng từ thanh toán; chịu sự kiểm tra, kiểm soát của cơ quan tài chính, Kho bạc Nhà nước trong quá trình thực hiện dự toán ngân sách được giao."},{"k":"p","t":"3. Việc lập dự toán, chấp hành, kế toán và quyết toán kinh phí ngân sách nhà nước cấp hỗ trợ thực hiện theo quy định của pháp luật về ngân sách nhà nước, pháp luật về đầu tư công và kế toán, thống kê."}]},{"id":"nd105_11","no":11,"code":"Điều 11","title":"Điều 11. Miễn đóng kinh phí công đoàn","shortTitle":"Miễn đóng kinh phí công đoàn","chuong":"Chương IV — MIỄN, GIẢM, TẠM DỪNG ĐÓNG KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thực hiện giải thể theo quy định của Luật Doanh nghiệp, Luật Hợp tác xã được Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh xem xét và ban hành quyết định miễn số tiền chưa đóng kinh phí công đoàn theo quy định phân cấp của Tổng Liên đoàn Lao động Việt Nam khi công đoàn tham gia phương án giải quyết nợ (trong đó có nợ đóng kinh phí công đoàn) của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thực hiện giải thể."},{"k":"p","t":"2. Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thực hiện phá sản theo quy định của Luật Doanh nghiệp, Luật Hợp tác xã, Luật Phá sản, Luật Phục hồi, Phá sản được Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh xem xét và ban hành quyết định miễn số tiền chưa đóng kinh phí công đoàn theo quy định phân cấp của Tổng Liên đoàn Lao động Việt Nam khi công đoàn nộp đơn yêu cầu áp dụng thủ tục phá sản đối với doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã."}]},{"id":"nd105_12","no":12,"code":"Điều 12","title":"Điều 12. Giảm mức đóng kinh phí công đoàn","shortTitle":"Giảm mức đóng kinh phí công đoàn","chuong":"Chương IV — MIỄN, GIẢM, TẠM DỪNG ĐÓNG KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"Giảm mức đóng kinh phí công đoàn tại khoản 2 Điều 30 của Luật Công đoàn được quy định như sau:"},{"k":"p","t":"1. Các trường hợp được xem xét giảm mức đóng kinh phí công đoàn là các trường hợp đã hết thời gian được tạm dừng đóng kinh phí công đoàn theo Điều 13 Nghị định này, tiếp tục phải cắt giảm số lao động hiện có từ 30% hoặc từ 30 lao động trở lên đối với doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã có sử dụng dưới 200 lao động và đối với hợp tác xã từ 30 thành viên chính thức, thành viên liên kết góp vốn của hợp tác xã; từ 50 lao động trở lên đối với người sử dụng lao động có sử dụng lao động từ 200 đến 1000 lao động và đối với hợp tác xã từ 50 thành viên chính thức, thành viên liên kết góp vốn của hợp tác xã; từ 100 lao động trở lên đối với người sử dụng lao động có sử dụng trên 1000 lao động và đối với hợp tác xã từ 100 thành viên chính thức, thành viên liên kết góp vốn của hợp tác xã (các trường hợp trên không bao gồm việc tuyển dụng mới 20% so với số lượng lao động bị cắt giảm trong vòng 3 tháng kể từ ngày cắt giảm lao động)."},{"k":"p","t":"2. Thời gian giảm mức đóng kinh phí công đoàn:"},{"k":"p","t":"a) Thời gian giảm mức đóng kinh phí công đoàn theo tháng và không quá 06 tháng."},{"k":"p","t":"b) Hết thời hạn giảm mức đóng kinh phí công đoàn quy định tại điểm a khoản này, doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã tiếp tục đóng kinh phí công đoàn theo mức đóng quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn."},{"k":"p","t":"3. Mức giảm đóng kinh phí công đoàn tối đa 20% mức đóng kinh phí công đoàn theo quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn."},{"k":"p","t":"4. Thẩm quyền và quy trình xem xét giảm mức đóng kinh phí công đoàn"},{"k":"p","t":"a) Thẩm quyền xem xét giảm mức đóng kinh phí công đoàn do Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh theo quy định phân cấp của Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"b) Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã nêu tại khoản 1 Điều này gửi 01 bộ hồ sơ gồm văn bản (theo mẫu Phụ lục I ban hành kèm theo Nghị định này) đề nghị xem xét giảm mức đóng kinh phí công đoàn kèm theo Báo cáo tình hình sử dụng lao động và danh sách người lao động thuộc đối tượng phải cắt giảm hiện có theo quy định tại khoản 1 Điều này và tổng số lao động có mặt trước khi phải cắt giảm số lao động hiện có đến Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động Việt Nam cấp tỉnh."},{"k":"p","t":"Căn cứ tình hình thực tế, Tổng Liên đoàn Lao động Việt Nam quy định cụ thể cách thức thực hiện theo hình thức trực tiếp, trực tuyến hoặc qua dịch vụ bưu chính."},{"k":"p","t":"c) Trong thời hạn 15 ngày làm việc kể từ ngày nhận được văn bản đề nghị của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã kèm theo tài liệu nêu tại điểm b khoản này, căn cứ khả năng cân đối của tài chính công đoàn (không bao gồm nguồn ngân sách nhà nước hỗ trợ), Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh xem xét, trả lời bằng văn bản việc giảm mức đóng kinh phí công đoàn đối với doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đảm bảo điều kiện quy định tại khoản 1 và khoản 2 Điều này (trường hợp không đồng ý nêu rõ lý do)."}]},{"id":"nd105_13","no":13,"code":"Điều 13","title":"Điều 13. Tạm dừng đóng kinh phí công đoàn","shortTitle":"Tạm dừng đóng kinh phí công đoàn","chuong":"Chương IV — MIỄN, GIẢM, TẠM DỪNG ĐÓNG KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"Tạm dừng đóng kinh phí công đoàn tại khoản 3 Điều 30 của Luật Công đoàn được quy định như sau:"},{"k":"p","t":"1. Các trường hợp được xem xét tạm dừng đóng kinh phí công đoàn:"},{"k":"p","t":"a) Gặp khó khăn do thay đổi cơ cấu, công nghệ hoặc khủng hoảng, suy thoái kinh tế hoặc thực hiện chính sách của Nhà nước khi tái cơ cấu nền kinh tế."},{"k":"p","t":"b) Gặp khó khăn do thiên tai, hỏa hoạn, dịch bệnh, mất mùa."},{"k":"p","t":"2. Điều kiện được xem xét tạm dừng đóng kinh phí công đoàn:"},{"k":"p","t":"Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thuộc một trong các trường hợp quy định tại khoản 1 Điều này và đáp ứng một trong các điều kiện dưới đây thì được xem xét tạm dừng đóng kinh phí công đoàn:"},{"k":"p","t":"a) Phải tạm dừng sản xuất, kinh doanh từ 30 ngày trở lên và không giải quyết được việc làm cho người lao động, trong đó số lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc phải tạm thời nghỉ việc xin tạm dừng đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất từ 50% tổng số lao động có mặt trước khi tạm dừng sản xuất, kinh doanh trở lên;"},{"k":"p","t":"b) Bị thiệt hại trên 50% tổng giá trị tài sản do thiên tai, hỏa hoạn, dịch bệnh, mất mùa gây ra (không kể giá trị tài sản là đất)."},{"k":"p","t":"3. Thời gian tạm dừng đóng kinh phí công đoàn:"},{"k":"p","t":"a) Thời gian tạm dừng đóng kinh phí công đoàn theo tháng và không quá 12 tháng."},{"k":"p","t":"b) Hết thời hạn tạm dừng đóng kinh phí công đoàn quy định tại điểm a khoản này, doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã tiếp tục đóng kinh phí công đoàn theo mức đóng quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn (trừ trường hợp được giảm mức đóng kinh phí công đoàn theo Điều 12 của Nghị định này)."},{"k":"p","t":"4. Thẩm quyền và quy trình xem xét tạm dừng đóng kinh phí công đoàn"},{"k":"p","t":"a) Thẩm quyền và quy trình xác định số lao động tham gia bảo hiểm xã hội bắt buộc tạm thời nghỉ việc xin tạm dừng đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất, giá trị tài sản bị thiệt hại theo quy định tại khoản 2 Điều này thực hiện theo quy định tại Điều 10 Nghị định số 158/2025/NĐ-CP ngày 25 tháng 6 năm 2025 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Bảo hiểm xã hội về bảo hiểm xã hội bắt buộc."},{"k":"p","t":"Trường hợp doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đã có danh sách người lao động tại thời điểm trước khi tạm dừng sản xuất, kinh doanh và tại thời điểm đề nghị danh sách số lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc phải tạm thời nghỉ việc để đề nghị tạm dừng đóng vào quỹ hưu trí và tử tuất hoặc văn bản của cấp có thẩm quyền xác định giá trị tài sản thiệt hại thì được sử dụng danh sách hoặc văn bản này để thực hiện thủ tục tạm dừng đóng kinh phí công đoàn."},{"k":"p","t":"b) Thẩm quyền và quy trình xem xét tạm dừng đóng kinh phí công đoàn"},{"k":"p","t":"Thẩm quyền xem xét tạm dừng đóng kinh phí công đoàn do Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh theo quy định phân cấp của Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã gửi 01 bộ hồ sơ gồm văn bản (theo mẫu Phụ lục II ban hành kèm theo Nghị định này) đề nghị tạm dừng đóng kinh phí công đoàn kèm theo Báo cáo tình hình sử dụng lao động và danh sách người lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc tạm nghỉ việc xin tạm dừng đóng bảo hiểm xã hội bắt buộc từ 50% tổng số lao động có mặt trước khi tạm dừng sản xuất, kinh doanh trở lên hoặc báo cáo bị thiệt hại trên 50% tổng giá trị tài sản do thiên tai, hỏa hoạn, dịch bệnh, mất mùa gây ra (không kể giá trị tài sản là đất) đến Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh."},{"k":"p","t":"Căn cứ tình hình thực tế, Tổng Liên đoàn Lao động Việt Nam quy định cụ thể cách thức thực hiện theo hình thức trực tiếp, trực tuyến hoặc qua dịch vụ bưu chính."},{"k":"p","t":"Trong thời hạn 15 ngày làm việc kể từ ngày nhận được văn bản đề nghị của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã kèm theo các tài liệu nêu trên, căn cứ khả năng cân đối của tài chính công đoàn (không bao gồm nguồn ngân sách nhà nước hỗ trợ), Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh có trách nhiệm xem xét và trả lời bằng văn bản việc tạm dừng đóng kinh phí công đoàn đối với doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đảm bảo điều kiện quy định tại khoản 1, khoản 2 và khoản 3 Điều này (trường hợp không đồng ý nêu rõ lý do). Trường hợp doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được tạm dừng đóng kinh phí công đoàn thì thời điểm tạm dừng đóng kinh phí công đoàn tính từ tháng doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đề nghị tại văn bản gửi Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh."}]},{"id":"nd105_14","no":14,"code":"Điều 14","title":"Điều 14. Trách nhiệm của Tổng Liên đoàn Lao động Việt Nam khi thực hiện miễn, giảm, tạm dừng đóng kinh phí công đoàn","shortTitle":"Trách nhiệm của Tổng Liên đoàn Lao động Việt Nam khi thực hiện miễn, giảm, tạm dừng đóng kinh phí công đoàn","chuong":"Chương IV — MIỄN, GIẢM, TẠM DỪNG ĐÓNG KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Hướng dẫn, tổ chức thực hiện việc miễn, giảm, tạm dừng đóng kinh phí công đoàn theo quy định tại các Điều 11, Điều 12 và Điều 13 Nghị định này."},{"k":"p","t":"2. Hằng năm, công khai các trường hợp được miễn, giảm, tạm dừng đóng kinh phí công đoàn trên cổng thông tin điện tử của Tổng Liên đoàn Lao động Việt Nam hoặc Liên đoàn Lao động cấp tỉnh theo phân cấp của Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"3. Tổng hợp kết quả miễn, giảm, tạm dừng đóng kinh phí công đoàn trong báo cáo Quốc hội về tình hình thu, chi và quản lý sử dụng tài chính công đoàn theo khoản 4 Điều 33 Luật Công đoàn."},{"k":"p","t":"4. Hỗ trợ kinh phí hoạt động công đoàn và thực hiện các nhiệm vụ tại khoản 2 Điều 31 Luật Công đoàn tại các doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được giảm, tạm dừng đóng kinh phí công đoàn."},{"k":"p","t":"5. Chỉ đạo, yêu cầu Liên đoàn Lao động cấp tỉnh báo cáo định kỳ hằng quý việc miễn, giảm, tạm dừng đóng kinh phí công đoàn để làm cơ sở đánh giá khả năng cân đối tài chính công đoàn khi xem xét miễn, giảm, tạm dừng đóng kinh phí công đoàn."}]},{"id":"nd105_15","no":15,"code":"Điều 15","title":"Điều 15. Về phân phối kinh phí công đoàn của tổ chức của người lao động tại doanh nghiệp","shortTitle":"Về phân phối kinh phí công đoàn của tổ chức của người lao động tại doanh nghiệp","chuong":"Chương V — QUẢN LÝ, SỬ DỤNG KINH PHÍ CÔNG ĐOÀN CỦA TỔ CHỨC CỦA NGƯỜI LAO ĐỘNG TẠI DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức của người lao động tại doanh nghiệp phải được cấp đăng ký theo quy định tại Điều 172 Bộ luật Lao động năm 2019 và doanh nghiệp nơi tổ chức của người lao động tại doanh nghiệp được cấp đăng ký tổ chức và hoạt động có thực hiện nghĩa vụ đóng kinh phí công đoàn theo quy định tại điểm b khoản 1 Điều 29 Luật Công đoàn."},{"k":"p","t":"2. Trong thời hạn 15 ngày làm việc kể từ ngày nhận được văn bản đề nghị phân phối kinh phí công đoàn dành cho cấp cơ sở của tổ chức của người lao động tại doanh nghiệp kèm bản sao đăng ký được cơ quan nhà nước có thẩm quyền cấp, Liên đoàn Lao động cấp tỉnh có trách nhiệm gửi văn bản thông báo phương thức, thời hạn và căn cứ tính toán việc phân phối kinh phí. Thời điểm phân phối cho tổ chức của người lao động tại doanh nghiệp tính từ tháng Liên đoàn Lao động cấp tỉnh có văn bản thông báo."},{"k":"p","t":"3. Hằng tháng, tổ chức của người lao động tại doanh nghiệp gửi thông báo tổng số tiền kinh phí công đoàn doanh nghiệp thực đóng theo quỹ tiền lương của người lao động đang là thành viên của tổ chức này thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc theo quy định đến công đoàn cơ sở tại doanh nghiệp (nếu có) hoặc Liên đoàn Lao động cấp tỉnh theo mẫu thông báo quy định của Tổng Liên đoàn Lao động Việt Nam. Thời hạn gửi thông báo chậm nhất là ngày cuối cùng của tháng tiếp theo kỳ đóng hàng tháng của doanh nghiệp."},{"k":"p","t":"Trường hợp tổ chức của người lao động tại doanh nghiệp không thực hiện gửi thông báo trong thời hạn quy định mà không có lý do chính đáng, Liên đoàn Lao động cấp tỉnh thực hiện tạm dừng phân phối kinh phí cho tổ chức này trong tháng kế tiếp."},{"k":"p","t":"4. Kinh phí công đoàn dành cho cấp cơ sở thực hiện theo quy định của Tổng Liên đoàn Lao động Việt Nam. Số tiền kinh phí công đoàn dành cho cấp cơ sở phân phối cho tổ chức của người lao động tại doanh nghiệp được xác định như sau:"},{"k":"tbl","rows":[["Số tiền kinh phí công đoàn phân phối cho tổ chức của người lao động tại doanh nghiệp","=","Tổng số tiền kinh phí công đoàn doanh nghiệp thực đóng theo quỹ tiền lương của người lao động (đối với thành viên của tổ chức của người lao động tại doanh nghiệp) thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc theo quy định","x","Số tiền kinh phí công đoàn dành cho cấp cơ sở"],["","","Tổng số tiền kinh phí công đoàn doanh nghiệp thực đóng theo quỹ tiền lương của toàn bộ người lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc theo quy định","",""]]},{"k":"p","t":"5. Khi tổ chức của người lao động tại doanh nghiệp chấm dứt hoạt động hoặc bị thu hồi giấy phép theo quy định tại Điều 172 Bộ luật Lao động năm 2019 thì toàn bộ số kinh phí công đoàn dành cho cấp cơ sở phân phối cho tổ chức của người lao động tại doanh nghiệp chưa sử dụng phải chuyển trả cho công đoàn cơ sở tại doanh nghiệp (nếu có) hoặc Liên đoàn Lao động cấp tỉnh theo quy định của Tổng Liên đoàn Lao động Việt Nam."}]},{"id":"nd105_16","no":16,"code":"Điều 16","title":"Điều 16. Quản lý, sử dụng kinh phí công đoàn của tổ chức của người lao động tại doanh nghiệp","shortTitle":"Quản lý, sử dụng kinh phí công đoàn của tổ chức của người lao động tại doanh nghiệp","chuong":"Chương V — QUẢN LÝ, SỬ DỤNG KINH PHÍ CÔNG ĐOÀN CỦA TỔ CHỨC CỦA NGƯỜI LAO ĐỘNG TẠI DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức của người lao động tại doanh nghiệp sử dụng kinh phí công đoàn theo các nội dung quy định tại điểm a, b, c, g và h khoản 2 Điều 31 Luật Công đoàn; việc thu, chi kinh phí công đoàn phải được theo dõi, lưu trữ theo hướng dẫn của Tổng Liên đoàn Lao động Việt Nam và định kỳ hàng năm công khai cho thành viên của tổ chức theo các hình thức quy định tại Điều 34 Luật Công đoàn."},{"k":"p","t":"2. Tổ chức của người lao động tại doanh nghiệp có trách nhiệm cung cấp đầy đủ việc sử dụng kinh phí công đoàn theo yêu cầu bằng văn bản của tổ chức công đoàn để tổ chức công đoàn báo cáo, công khai việc quản lý, sử dụng tài chính công đoàn theo Điều 33 và Điều 34 Luật Công đoàn hoặc theo yêu cầu của cơ quan có thẩm quyền theo quy định của pháp luật."}]},{"id":"nd105_17","no":17,"code":"Điều 17","title":"Điều 17. Trách nhiệm tổ chức thực hiện","shortTitle":"Trách nhiệm tổ chức thực hiện","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Đơn vị sự nghiệp công lập không hưởng 100% lương từ ngân sách nhà nước, doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, cơ quan, tổ chức, đơn vị khác tại Điều 4 có trách nhiệm:"},{"k":"p","t":"a) Đóng kinh phí công đoàn đầy đủ, đúng thời hạn cho tổ chức công đoàn theo đúng quy định tại Nghị định này và quy định của Tổng Liên đoàn Lao động Việt Nam về phân cấp thu, phân phối nguồn thu kinh phí công đoàn;"},{"k":"p","t":"b) Cung cấp đầy đủ, chính xác thông tin, tài liệu có liên quan đến trách nhiệm đóng kinh phí công đoàn khi có yêu cầu của tổ chức công đoàn, cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Tổng Liên đoàn Lao động Việt Nam có trách nhiệm:"},{"k":"p","t":"a) Quy định phân cấp thu, phân phối nguồn thu và quản lý nguồn thu kinh phí công đoàn, thẩm quyền xem xét, quyết định việc miễn, giảm, tạm dừng đóng kinh phí công đoàn tại Điều 11, Điều 12 và Điều 13 Nghị định này để thực hiện trong hệ thống tổ chức của Công đoàn Việt Nam."},{"k":"p","t":"b) Chỉ đạo tổ chức công đoàn các cấp quản lý, sử dụng kinh phí công đoàn theo đúng quy định; phối hợp với các cơ quan quản lý nhà nước có chức năng thanh tra và kiểm tra, giám sát việc thực hiện đóng kinh phí công đoàn theo quy định Điều 4 Nghị định này; kiến nghị các cơ quan chức năng xử lý vi phạm pháp luật về đóng kinh phí công đoàn."},{"k":"p","t":"c) Chủ trì, phối hợp với các bộ, cơ quan liên quan, ủy ban nhân dân các tỉnh, thành phố triển khai thực hiện Điều 9 Nghị định này như sau: Xây dựng dự toán đối với các nguồn thu quy định tại điểm a, b và d khoản 1 Điều 29 Luật Công đoàn và dự toán chi thực hiện các nhiệm vụ quy định tại khoản 2 Điều 31 Luật Công đoàn theo chế độ, tiêu chuẩn, định mức do Tổng Liên đoàn Lao động Việt Nam ban hành theo quy định tại khoản 5 Điều 31 Luật Công đoàn, xác định phần chênh lệch thiếu đối với nguồn tài chính công đoàn của Công đoàn Việt Nam và công đoàn các cấp để làm cơ sở trình cấp có thẩm quyền hỗ trợ tài chính công đoàn theo phân cấp ngân sách nhà nước."},{"k":"p","t":"d) Xây dựng và ban hành tiêu chuẩn, định mức, chế độ chi tiêu tài chính công đoàn được thực hiện theo nguyên tắc như sau:"},{"k":"p","t":"Đối với tiêu chuẩn, định mức, chế độ chi tiêu đã được cơ quan nhà nước hoặc cấp có thẩm quyền ban hành: Thực hiện theo các quy định hiện hành."},{"k":"p","t":"Đối với tiêu chuẩn, định mức, chế độ chi tiêu để thực hiện nhiệm vụ của Công đoàn Việt Nam chưa được cơ quan nhà nước (hoặc cấp) có thẩm quyền ban hành:"},{"k":"p","t":"Căn cứ khả năng tài chính công đoàn và thực tế phát sinh, Tổng Liên đoàn Lao động Việt Nam xây dựng và đề xuất nội dung chi, mức chi. Một số nội dung chi đặc thù được thực hiện như sau:"},{"k":"p","t":"Chi xây dựng mới, thay thế hoặc sửa đổi, bổ sung nghị quyết, quyết định của Đoàn Chủ tịch, Thường trực Đoàn Chủ tịch Tổng Liên đoàn Lao động Việt Nam, nghị quyết, quyết định của Ban Chấp hành Tổng Liên đoàn Lao động Việt Nam về quản lý, sử dụng tài chính công đoàn; mức chi theo khả năng cân đối của tài chính công đoàn (không bao gồm nguồn ngân sách nhà nước hỗ trợ) nhưng tối đa không vượt quá mức chi xây dựng Thông tư tại Phụ lục II ban hành kèm theo Nghị quyết số 197/2025/QH15 của Quốc hội."},{"k":"p","t":"Tổng Liên đoàn Lao động Việt Nam căn cứ Nghị định số 289/2025/NĐ-CP ngày 06 tháng 11 năm 2025 của Chính phủ hướng dẫn thi hành Nghị quyết số 197/2025/QH15 để xây dựng văn bản hướng dẫn (nghị quyết hoặc quyết định) báo cáo Đoàn Chủ tịch Tổng Liên đoàn Lao động Việt Nam xem xét, quyết định đảm bảo phù hợp, tiết kiệm, hiệu quả."},{"k":"p","t":"Chi hỗ trợ động viên, khuyến khích tập thể, cá nhân ngoài hệ thống Công đoàn Việt Nam phối hợp chỉ đạo hoạt động công đoàn; triển khai phát triển đoàn viên công đoàn, thành lập công đoàn cơ sở, tổ chức thu, phân phối kinh phí công đoàn; phối hợp với các cơ quan quản lý nhà nước có chức năng thanh tra và kiểm tra, giám sát và đôn đốc thu hồi đối với các trường hợp không đóng kinh phí công đoàn, chậm đóng kinh phí công đoàn, đóng không đúng mức kinh phí công đoàn quy định, đóng kinh phí công đoàn không đủ số người thuộc đối tượng phải đóng; quản lý, sử dụng kinh phí công đoàn không đúng quy định: Mức hỗ trợ đối với cá nhân không quá 03 lần mức lương cơ sở/lần và đối với tập thể không quá 15 lần mức lương cơ sở/lần; số lần hỗ trợ trong một năm không quá 04 lần."},{"k":"p","t":"3. Bộ Tài chính có trách nhiệm:"},{"k":"p","t":"a) Cân đối, đề xuất trình cấp có thẩm quyền bố trí ngân sách trung ương hỗ trợ tài chính công đoàn theo quy định tại Điều 7 và Điều 9 Nghị định này theo quy định của pháp luật về ngân sách nhà nước và pháp luật đầu tư công."},{"k":"p","t":"b) Chủ trì, phối hợp với các bộ, ngành liên quan trình Chính phủ khi Tổng Liên đoàn Lao động Việt Nam đề nghị Chính phủ có ý kiến đối với dự thảo Quy định tiêu chuẩn, định mức, chế độ chi tiêu tài chính công đoàn quy định tại điểm d khoản 2 Điều này."},{"k":"p","t":"4. Ủy ban nhân dân các tỉnh, thành phố có trách nhiệm cân đối, bố trí ngân sách địa phương hỗ trợ Liên đoàn Lao động cấp tỉnh theo quy định tại Điều 8 và Điều 9 Nghị định này theo quy định của pháp luật về ngân sách nhà nước và pháp luật đầu tư công."}]},{"id":"nd105_18","no":18,"code":"Điều 18","title":"Điều 18. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 16 tháng 5 năm 2026."},{"k":"p","t":"2. Nghị định số 191/2013/NĐ-CP ngày 21 tháng 11 năm 2013 của Chính phủ quy định chi tiết về tài chính công đoàn hết hiệu lực thi hành từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"3. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch ủy ban nhân dân các tỉnh, thành phố chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các tổ chức chính trị - xã hội;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nKT. <script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
