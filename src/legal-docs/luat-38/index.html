ăm, báo cáo tài chính năm, tờ khai giao dịch liên kết; các tài liệu khác có liên quan đến quyết toán thuế."},{"k":"p","t":"4. Hồ sơ khai thuế đối với loại thuế khai và nộp theo từng lần phát sinh nghĩa vụ thuế bao gồm:"},{"k":"p","t":"a) Tờ khai thuế;"},{"k":"p","t":"b) Hóa đơn, hợp đồng và chứng từ khác có liên quan đến nghĩa vụ thuế theo quy định của pháp luật."},{"k":"p","t":"5. Đối với hàng hóa xuất khẩu, nhập khẩu thì hồ sơ hải quan theo quy định của Luật Hải quan được sử dụng làm hồ sơ khai thuế."},{"k":"p","t":"6. Hồ sơ khai thuế đối với trường hợp chấm dứt hoạt động, chấm dứt hợp đồng, chuyển đổi loại hình doanh nghiệp, tổ chức lại doanh nghiệp bao gồm:"},{"k":"p","t":"a) Tờ khai quyết toán thuế;"},{"k":"p","t":"b) Báo cáo tài chính đến thời điểm chấm dứt hoạt động hoặc chấm dứt hợp đồng hoặc chuyển đổi loại hình doanh nghiệp hoặc tổ chức lại doanh nghiệp;"},{"k":"p","t":"c) Tài liệu khác có liên quan đến quyết toán thuế."},{"k":"p","t":"7. Báo cáo lợi nhuận liên quốc gia trong trường hợp người nộp thuế là công ty mẹ tối cao của tập đoàn tại Việt Nam có phát sinh giao dịch liên kết xuyên biên giới và có mức doanh thu hợp nhất toàn cầu vượt mức quy định hoặc người nộp thuế có công ty mẹ tối cao tại nước ngoài mà công ty mẹ tối cao có nghĩa vụ lập báo cáo lợi nhuận liên quốc gia theo quy định của nước sở tại."},{"k":"p","t":"8. Chính phủ quy định chi tiết hồ sơ khai thuế quy định tại Điều này; quy định loại thuế khai theo tháng, khai theo quý, khai theo năm, khai theo từng lần phát sinh nghĩa vụ thuế, khai quyết toán thuế; khai các khoản phải nộp về phí, lệ phí do cơ quan đại diện nước Cộng hòa xã hội chủ nghĩa Việt Nam ở nước ngoài thực hiện thu; kê khai, cung cấp, trao đổi, sử dụng thông tin đối với báo cáo lợi nhuận liên quốc gia; tiêu chí xác định người nộp thuế để khai thuế theo quý."}]},{"id":"luat-38_44","no":44,"code":"Điều 44","title":"Điều 44. Thời hạn nộp hồ sơ khai thuế","shortTitle":"Thời hạn nộp hồ sơ khai thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp hồ sơ khai thuế đối với loại thuế khai theo tháng, theo quý được quy định như sau:"},{"k":"p","t":"a) Chậm nhất là ngày thứ 20 của tháng tiếp theo tháng phát sinh nghĩa vụ thuế đối với trường hợp khai và nộp theo tháng;"},{"k":"p","t":"b) Chậm nhất là ngày cuối cùng của tháng đầu của quý tiếp theo quý phát sinh nghĩa vụ thuế đối với trường hợp khai và nộp theo quý."},{"k":"p","t":"2. Thời hạn nộp hồ sơ khai thuế đối với loại thuế có kỳ tính thuế theo năm được quy định như sau:"},{"k":"p","t":"a) Chậm nhất là ngày cuối cùng của tháng thứ 3 kể từ ngày kết thúc năm dương lịch hoặc năm tài chính đối với hồ sơ quyết toán thuế năm; chậm nhất là ngày cuối cùng của tháng đầu tiên của năm dương lịch hoặc năm tài chính đối với hồ sơ khai thuế năm;"},{"k":"p","t":"b) Chậm nhất là ngày cuối cùng của tháng thứ 4 kể từ ngày kết thúc năm dương lịch đối với hồ sơ quyết toán thuế thu nhập cá nhân của cá nhân trực tiếp quyết toán thuế;"},{"k":"p","t":"c) Chậm nhất là ngày 15 tháng 12 của năm trước liền kề đối với hồ sơ khai thuế khoán của hộ kinh doanh, cá nhân kinh doanh nộp thuế theo phương pháp khoán; trường hợp hộ kinh doanh, cá nhân kinh doanh mới kinh doanh thì thời hạn nộp hồ sơ khai thuế khoán chậm nhất là 10 ngày kể từ ngày bắt đầu kinh doanh."},{"k":"p","t":"3. Thời hạn nộp hồ sơ khai thuế đối với loại thuế khai và nộp theo từng lần phát sinh nghĩa vụ thuế chậm nhất là ngày thứ 10 kể từ ngày phát sinh nghĩa vụ thuế."},{"k":"p","t":"4. Thời hạn nộp hồ sơ khai thuế đối với trường hợp chấm dứt hoạt động, chấm dứt hợp đồng hoặc tổ chức lại doanh nghiệp chậm nhất là ngày thứ 45 kể từ ngày xảy ra sự kiện."},{"k":"p","t":"5. Chính phủ quy định thời hạn nộp hồ sơ khai thuế đối với thuế sử dụng đất nông nghiệp; thuế sử dụng đất phi nông nghiệp; tiền sử dụng đất; tiền thuê đất, thuê mặt nước; tiền cấp quyền khai thác khoáng sản; tiền cấp quyền khai thác tài nguyên nước; lệ phí trước bạ; lệ phí môn bài; khoản thu vào ngân sách nhà nước theo quy định của pháp luật về quản lý, sử dụng tài sản công; báo cáo lợi nhuận liên quốc gia."},{"k":"p","t":"6. Thời hạn nộp hồ sơ khai thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của Luật Hải quan."},{"k":"p","t":"7. Trường hợp người nộp thuế khai thuế thông qua giao dịch điện tử trong ngày cuối cùng của thời hạn nộp hồ sơ khai thuế mà cổng thông tin điện tử của cơ quan thuế gặp sự cố thì người nộp thuế nộp hồ sơ khai thuế, chứng từ nộp thuế điện tử trong ngày tiếp theo sau khi cổng thông tin điện tử của cơ quan thuế tiếp tục hoạt động."}]},{"id":"luat-38_45","no":45,"code":"Điều 45","title":"Điều 45. Địa điểm nộp hồ sơ khai thuế","shortTitle":"Địa điểm nộp hồ sơ khai thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế nộp hồ sơ khai thuế tại cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"2. Trường hợp nộp hồ sơ khai thuế theo cơ chế một cửa liên thông thì địa điểm nộp hồ sơ khai thuế thực hiện theo quy định của cơ chế đó."},{"k":"p","t":"3. Địa điểm nộp hồ sơ khai thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của Luật Hải quan."},{"k":"p","t":"4. Chính phủ quy định địa điểm nộp hồ sơ khai thuế đối với các trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế có nhiều hoạt động sản xuất, kinh doanh;"},{"k":"p","t":"b) Người nộp thuế thực hiện hoạt động sản xuất, kinh doanh ở nhiều địa bàn; người nộp thuế có phát sinh nghĩa vụ thuế đối với các loại thuế khai và nộp theo từng lần phát sinh;"},{"k":"p","t":"c) Người nộp thuế có phát sinh nghĩa vụ thuế đối với các khoản thu từ đất; cấp quyền khai thác tài nguyên nước, tài nguyên khoáng sản;"},{"k":"p","t":"d) Người nộp thuế có phát sinh nghĩa vụ thuế quyết toán thuế thu nhập cá nhân;"},{"k":"p","t":"đ) Người nộp thuế thực hiện khai thuế thông qua giao dịch điện tử và các trường hợp cần thiết khác."}]},{"id":"luat-38_46","no":46,"code":"Điều 46","title":"Điều 46. Gia hạn nộp hồ sơ khai thuế","shortTitle":"Gia hạn nộp hồ sơ khai thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế không có khả năng nộp hồ sơ khai thuế đúng thời hạn do thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ thì được thủ trưởng cơ quan thuế quản lý trực tiếp gia hạn nộp hồ sơ khai thuế."},{"k":"p","t":"2. Thời gian gia hạn không quá 30 ngày đối với việc nộp hồ sơ khai thuế tháng, khai thuế quý, khai thuế năm, khai thuế theo từng lần phát sinh nghĩa vụ thuế; 60 ngày đối với việc nộp hồ sơ khai quyết toán thuế kể từ ngày hết thời hạn phải nộp hồ sơ khai thuế."},{"k":"p","t":"3. Người nộp thuế phải gửi đến cơ quan thuế văn bản đề nghị gia hạn nộp hồ sơ khai thuế trước khi hết thời hạn nộp hồ sơ khai thuế, trong đó nêu rõ lý do đề nghị gia hạn có xác nhận của Ủy ban nhân dân cấp xã hoặc Công an xã, phường, thị trấn nơi phát sinh trường hợp được gia hạn quy định tại khoản 1 Điều này."},{"k":"p","t":"4. Trong thời hạn 03 ngày làm việc kể từ ngày nhận được văn bản đề nghị gia hạn nộp hồ sơ khai thuế, cơ quan thuế phải trả lời bằng văn bản cho người nộp thuế về việc chấp nhận hay không chấp nhận việc gia hạn nộp hồ sơ khai thuế."}]},{"id":"luat-38_47","no":47,"code":"Điều 47","title":"Điều 47. Khai bổ sung hồ sơ khai thuế","shortTitle":"Khai bổ sung hồ sơ khai thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế phát hiện hồ sơ khai thuế đã nộp cho cơ quan thuế có sai, sót thì được khai bổ sung hồ sơ khai thuế trong thời hạn 10 năm kể từ ngày hết thời hạn nộp hồ sơ khai thuế của kỳ tính thuế có sai, sót nhưng trước khi cơ quan thuế, cơ quan có thẩm quyền công bố quyết định thanh tra, kiểm tra."},{"k":"p","t":"2. Khi cơ quan thuế, cơ quan có thẩm quyền đã công bố quyết định thanh tra, kiểm tra thuế tại trụ sở của người nộp thuế thì người nộp thuế vẫn được khai bổ sung hồ sơ khai thuế; cơ quan thuế thực hiện xử phạt vi phạm hành chính về quản lý thuế đối với hành vi quy định tại Điều 142 và Điều 143 của Luật này."},{"k":"p","t":"3. Sau khi cơ quan thuế, cơ quan có thẩm quyền đã ban hành kết luận, quyết định xử lý về thuế sau thanh tra, kiểm tra tại trụ sở của người nộp thuế thì việc khai bổ sung hồ sơ khai thuế được quy định như sau:"},{"k":"p","t":"a) Người nộp thuế được khai bổ sung hồ sơ khai thuế đối với trường hợp làm tăng số tiền thuế phải nộp, giảm số tiền thuế được khấu trừ hoặc giảm số tiền thuế được miễn, giảm, hoàn và bị xử phạt vi phạm hành chính về quản lý thuế đối với hành vi quy định tại Điều 142 và Điều 143 của Luật này;"},{"k":"p","t":"b) Trường hợp người nộp thuế phát hiện hồ sơ khai thuế có sai, sót nếu khai bổ sung làm giảm số tiền thuế phải nộp hoặc làm tăng số tiền thuế được khấu trừ, tăng số tiền thuế được miễn, giảm, hoàn thì thực hiện theo quy định về giải quyết khiếu nại về thuế."},{"k":"p","t":"4. Hồ sơ khai bổ sung hồ sơ khai thuế bao gồm:"},{"k":"p","t":"a) Tờ khai bổ sung;"},{"k":"p","t":"b) Bản giải trình khai bổ sung và các tài liệu có liên quan."},{"k":"p","t":"5. Đối với hàng hóa xuất khẩu, nhập khẩu, việc khai bổ sung hồ sơ khai thuế thực hiện theo quy định của pháp luật về hải quan."}]},{"id":"luat-38_48","no":48,"code":"Điều 48","title":"Điều 48. Trách nhiệm của cơ quan quản lý thuế trong việc tiếp nhận hồ sơ khai thuế","shortTitle":"Trách nhiệm của cơ quan quản lý thuế trong việc tiếp nhận hồ sơ khai thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế tiếp nhận hồ sơ khai thuế của người nộp thuế qua các hình thức sau đây:"},{"k":"p","t":"a) Nhận hồ sơ trực tiếp tại cơ quan quản lý thuế;"},{"k":"p","t":"b) Nhận hồ sơ gửi qua đường bưu chính;"},{"k":"p","t":"c) Nhận hồ sơ điện tử qua cổng giao dịch điện tử của cơ quan quản lý thuế."},{"k":"p","t":"2. Cơ quan quản lý thuế tiếp nhận hồ sơ khai thuế thông báo về việc tiếp nhận hồ sơ khai thuế; trường hợp hồ sơ không hợp pháp, không đầy đủ, không đúng mẫu quy định thì thông báo cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ."}]},{"id":"luat-38_49","no":49,"code":"Điều 49","title":"Điều 49. Nguyên tắc ấn định thuế","shortTitle":"Nguyên tắc ấn định thuế","chuong":"Chương V — ẤN ĐỊNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Ấn định thuế phải dựa trên các nguyên tắc quản lý thuế, căn cứ tính thuế, phương pháp tính thuế theo quy định của pháp luật về thuế, pháp luật về hải quan."},{"k":"p","t":"2. Cơ quan quản lý thuế ấn định số tiền thuế phải nộp hoặc ấn định từng yếu tố, căn cứ tính thuế để xác định số tiền thuế phải nộp."}]},{"id":"luat-38_50","no":50,"code":"Điều 50","title":"Điều 50. Ấn định thuế đối với người nộp thuế trong trường hợp vi phạm pháp luật về thuế","shortTitle":"Ấn định thuế đối với người nộp thuế trong trường hợp vi phạm pháp luật về thuế","chuong":"Chương V — ẤN ĐỊNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế bị ấn định thuế khi thuộc một trong các trường hợp vi phạm pháp luật về thuế sau đây:"},{"k":"p","t":"a) Không đăng ký thuế, không khai thuế, không nộp bổ sung hồ sơ thuế theo yêu cầu của cơ quan thuế hoặc khai thuế không đầy đủ, trung thực, chính xác về căn cứ tính thuế;"},{"k":"p","t":"b) Không phản ánh hoặc phản ánh không đầy đủ, trung thực, chính xác số liệu trên sổ kế toán để xác định nghĩa vụ thuế;"},{"k":"p","t":"c) Không xuất trình sổ kế toán, hóa đơn, chứng từ và các tài liệu cần thiết liên quan đến việc xác định số tiền thuế phải nộp trong thời hạn quy định;"},{"k":"p","t":"d) Không chấp hành quyết định thanh tra thuế, kiểm tra thuế theo quy định;"},{"k":"p","t":"đ) Mua, bán, trao đổi và hạch toán giá trị hàng hóa, dịch vụ không theo giá trị giao dịch thông thường trên thị trường;"},{"k":"p","t":"e) Mua, trao đổi hàng hóa sử dụng hóa đơn không hợp pháp, sử dụng không hợp pháp hóa đơn mà hàng hóa là có thật theo xác định của cơ quan có thẩm quyền và đã được kê khai doanh thu tính thuế;"},{"k":"p","t":"g) Có dấu hiệu bỏ trốn hoặc phát tán tài sản để không thực hiện nghĩa vụ thuế;"},{"k":"p","t":"h) Thực hiện các giao dịch không đúng với bản chất kinh tế, không đúng thực tế phát sinh nhằm mục đích giảm nghĩa vụ thuế của người nộp thuế;"},{"k":"p","t":"i) Không tuân thủ quy định về nghĩa vụ kê khai, xác định giá giao dịch liên kết hoặc không cung cấp thông tin theo quy định về quản lý thuế đối với doanh nghiệp có phát sinh giao dịch liên kết."},{"k":"p","t":"2. Căn cứ ấn định thuế bao gồm:"},{"k":"p","t":"a) Cơ sở dữ liệu của cơ quan quản lý thuế và cơ sở dữ liệu thương mại;"},{"k":"p","t":"b) So sánh số tiền thuế phải nộp của cơ sở kinh doanh cùng mặt hàng, ngành, nghề, quy mô tại địa phương; trường hợp tại địa phương của cơ sở kinh doanh không có thông tin về mặt hàng, ngành, nghề, quy mô của cơ sở kinh doanh thì so sánh với địa phương khác;"},{"k":"p","t":"c) Tài liệu và kết quả kiểm tra, thanh tra còn hiệu lực;"},{"k":"p","t":"d) Tỷ lệ thu thuế trên doanh thu đối với từng lĩnh vực, ngành, nghề theo quy định của pháp luật về thuế."},{"k":"p","t":"3. Người nộp thuế bị ấn định từng yếu tố liên quan đến việc xác định số tiền thuế phải nộp khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Qua kiểm tra hồ sơ khai thuế, cơ quan thuế có căn cứ cho rằng người nộp thuế khai chưa đầy đủ hoặc chưa chính xác các yếu tố làm cơ sở xác định số tiền thuế phải nộp, đã yêu cầu người nộp thuế khai bổ sung nhưng người nộp thuế không khai bổ sung theo yêu cầu của cơ quan thuế;"},{"k":"p","t":"b) Qua kiểm tra sổ kế toán, hóa đơn, chứng từ liên quan đến việc xác định số tiền thuế phải nộp, cơ quan thuế có cơ sở chứng minh người nộp thuế hạch toán không chính xác, không trung thực các yếu tố liên quan đến việc xác định số tiền thuế phải nộp;"},{"k":"p","t":"c) Hạch toán giá bán hàng hóa, dịch vụ không đúng với giá thực tế thanh toán làm giảm doanh thu tính thuế hoặc hạch toán giá mua hàng hóa, nguyên vật liệu phục vụ cho sản xuất, kinh doanh không theo giá thực tế thanh toán phù hợp với thị trường làm tăng chi phí, tăng thuế giá trị gia tăng được khấu trừ, giảm nghĩa vụ thuế phải nộp;"},{"k":"p","t":"d) Người nộp thuế nộp hồ sơ khai thuế nhưng không xác định được các yếu tố làm cơ sở xác định căn cứ tính thuế hoặc có xác định được các yếu tố làm cơ sở xác định căn cứ tính thuế nhưng không tự tính được số tiền thuế phải nộp."},{"k":"p","t":"4. Người nộp thuế bị ấn định số tiền thuế phải nộp theo tỷ lệ trên doanh thu theo quy định của pháp luật đối với các trường hợp cơ quan thuế qua kiểm tra, thanh tra phát hiện sổ kế toán, hóa đơn, chứng từ không đầy đủ, không hợp pháp hoặc kê khai, tính thuế không đúng thực tế trong trường hợp có quy mô về doanh thu tối đa bằng mức cao nhất về tiêu chí của doanh nghiệp siêu nhỏ theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa và không thuộc trường hợp ấn định thuế quy định tại khoản 3 Điều này."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_51","no":51,"code":"Điều 51","title":"Điều 51. Xác định mức thuế đối với hộ kinh doanh, cá nhân kinh doanh nộp thuế theo phương pháp khoán thuế","shortTitle":"Xác định mức thuế đối với hộ kinh doanh, cá nhân kinh doanh nộp thuế theo phương pháp khoán thuế","chuong":"Chương V — ẤN ĐỊNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế xác định số tiền thuế phải nộp theo phương pháp khoán thuế (sau đây gọi là mức thuế khoán) đối với trường hợp hộ kinh doanh, cá nhân kinh doanh không thực hiện hoặc thực hiện không đầy đủ chế độ kế toán, hóa đơn, chứng từ, trừ trường hợp quy định tại khoản 5 Điều này."},{"k":"p","t":"2. Cơ quan thuế căn cứ vào tài liệu kê khai của hộ kinh doanh, cá nhân kinh doanh, cơ sở dữ liệu của cơ quan thuế, ý kiến của Hội đồng tư vấn thuế xã, phường, thị trấn để xác định mức thuế khoán."},{"k":"p","t":"3. Mức thuế khoán được tính theo năm dương lịch hoặc theo tháng đối với trường hợp kinh doanh theo thời vụ. Mức thuế khoán phải được công khai trong địa bàn xã, phường, thị trấn. Trường hợp có thay đổi ngành, nghề, quy mô kinh doanh, ngừng, tạm ngừng kinh doanh, người nộp thuế phải khai báo với cơ quan thuế để điều chỉnh mức thuế khoán."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định chi tiết căn cứ, trình tự để xác định mức thuế khoán đối với hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"5. Hộ kinh doanh, cá nhân kinh doanh có quy mô về doanh thu, lao động đáp ứng từ mức cao nhất về tiêu chí của doanh nghiệp siêu nhỏ theo quy định pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa phải thực hiện chế độ kế toán và nộp thuế theo phương pháp kê khai."}]},{"id":"luat-38_52","no":52,"code":"Điều 52","title":"Điều 52. Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương V — ẤN ĐỊNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan hải quan ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu trong các trường hợp sau đây:"},{"k":"p","t":"a) Người khai thuế dựa vào các tài liệu không hợp pháp để khai thuế, tính thuế; không khai thuế hoặc kê khai không chính xác, đầy đủ nội dung liên quan đến xác định nghĩa vụ thuế;"},{"k":"p","t":"b) Quá thời hạn quy định mà người khai thuế không cung cấp, từ chối hoặc trì hoãn, kéo dài việc cung cấp hồ sơ, sổ kế toán, tài liệu, chứng từ, dữ liệu, số liệu liên quan đến việc xác định chính xác số tiền thuế phải nộp theo quy định;"},{"k":"p","t":"c) Người khai thuế không chứng minh, giải trình hoặc quá thời hạn quy định mà không giải trình được các nội dung liên quan đến việc xác định nghĩa vụ thuế theo quy định của pháp luật; không chấp hành quyết định kiểm tra, thanh tra của cơ quan hải quan;"},{"k":"p","t":"d) Người khai thuế không phản ánh hoặc phản ánh không đầy đủ, trung thực, chính xác số liệu trên sổ kế toán để xác định nghĩa vụ thuế;"},{"k":"p","t":"đ) Cơ quan hải quan có đủ bằng chứng, căn cứ xác định về việc khai báo trị giá không đúng với trị giá giao dịch thực tế;"},{"k":"p","t":"e) Giao dịch được thực hiện không đúng với bản chất kinh tế, không đúng thực tế phát sinh, ảnh hưởng đến số tiền thuế phải nộp;"},{"k":"p","t":"g) Người khai thuế không tự tính được số tiền thuế phải nộp;"},{"k":"p","t":"h) Trường hợp khác do cơ quan hải quan hoặc cơ quan khác phát hiện việc kê khai, tính thuế không đúng với quy định của pháp luật."},{"k":"p","t":"2. Cơ quan hải quan căn cứ hàng hóa thực tế xuất khẩu, nhập khẩu; căn cứ tính thuế, phương pháp tính thuế; cơ sở dữ liệu của cơ quan quản lý thuế và cơ sở dữ liệu thương mại; hồ sơ khai báo hải quan; tài liệu và các thông tin khác có liên quan đến hàng hóa xuất khẩu, nhập khẩu để ấn định số tiền thuế phải nộp."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_53","no":53,"code":"Điều 53","title":"Điều 53. Trách nhiệm của cơ quan quản lý thuế trong việc ấn định thuế","shortTitle":"Trách nhiệm của cơ quan quản lý thuế trong việc ấn định thuế","chuong":"Chương V — ẤN ĐỊNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế thông báo bằng văn bản cho người nộp thuế về lý do ấn định thuế, căn cứ ấn định thuế, số tiền thuế ấn định, thời hạn nộp tiền thuế."},{"k":"p","t":"2. Trường hợp cơ quan quản lý thuế thực hiện ấn định thuế qua kiểm tra thuế, thanh tra thuế thì lý do ấn định thuế, căn cứ ấn định thuế, số tiền thuế ấn định, thời hạn nộp tiền thuế phải được ghi trong biên bản kiểm tra thuế, thanh tra thuế, quyết định xử lý về thuế của cơ quan quản lý thuế."},{"k":"p","t":"3. Trường hợp số tiền thuế ấn định của cơ quan quản lý thuế lớn hơn số tiền thuế phải nộp theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thì cơ quan quản lý thuế phải hoàn trả số tiền thuế nộp thừa."},{"k":"p","t":"4. Trường hợp số tiền thuế ấn định của cơ quan quản lý thuế nhỏ hơn số tiền thuế phải nộp theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thì người nộp thuế có trách nhiệm nộp bổ sung. Cơ quan quản lý thuế chịu trách nhiệm về việc ấn định thuế."}]},{"id":"luat-38_54","no":54,"code":"Điều 54","title":"Điều 54. Trách nhiệm của người nộp thuế trong việc nộp số tiền thuế ấn định","shortTitle":"Trách nhiệm của người nộp thuế trong việc nộp số tiền thuế ấn định","chuong":"Chương V — ẤN ĐỊNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Người nộp thuế phải nộp số tiền thuế ấn định theo quyết định xử lý về thuế của cơ quan quản lý thuế; trường hợp không đồng ý với số tiền thuế do cơ quan quản lý thuế ấn định thì người nộp thuế vẫn phải nộp số tiền thuế đó, đồng thời có quyền đề nghị cơ quan quản lý thuế giải thích hoặc khiếu nại, khởi kiện về việc ấn định thuế. Người nộp thuế có trách nhiệm cung cấp các hồ sơ, tài liệu để chứng minh cho việc khiếu nại, khởi kiện."}]},{"id":"luat-38_55","no":55,"code":"Điều 55","title":"Điều 55. Thời hạn nộp thuế","shortTitle":"Thời hạn nộp thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp người nộp thuế tính thuế, thời hạn nộp thuế chậm nhất là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế. Trường hợp khai bổ sung hồ sơ khai thuế, thời hạn nộp thuế là thời hạn nộp hồ sơ khai thuế của kỳ tính thuế có sai, sót."},{"k":"p","t":"Đối với thuế thu nhập doanh nghiệp thì tạm nộp theo quý, thời hạn nộp thuế chậm nhất là ngày 30 của tháng đầu quý sau."},{"k":"p","t":"Đối với dầu thô, thời hạn nộp thuế tài nguyên, thuế thu nhập doanh nghiệp theo lần xuất bán dầu thô là 35 ngày kể từ ngày xuất bán đối với dầu thô bán nội địa hoặc kể từ ngày thông quan hàng hóa theo quy định của pháp luật về hải quan đối với dầu thô xuất khẩu."},{"k":"p","t":"Đối với khí thiên nhiên, thời hạn nộp thuế tài nguyên, thuế thu nhập doanh nghiệp theo tháng."},{"k":"p","t":"2. Trường hợp cơ quan thuế tính thuế, thời hạn nộp thuế là thời hạn ghi trên thông báo của cơ quan thuế."},{"k":"p","t":"3. Đối với các khoản thu khác thuộc ngân sách nhà nước từ đất, tiền cấp quyền khai thác tài nguyên nước, tài nguyên khoáng sản, lệ phí trước bạ, lệ phí môn bài thì thời hạn nộp theo quy định của Chính phủ."},{"k":"p","t":"4. Đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế theo quy định của pháp luật về thuế, thời hạn nộp thuế thực hiện theo quy định của Luật Thuế xuất khẩu, thuế nhập khẩu; trường hợp phát sinh số tiền thuế phải nộp sau khi thông quan hoặc giải phóng hàng hóa thì thời hạn nộp thuế phát sinh được thực hiện như sau:"},{"k":"p","t":"a) Thời hạn nộp thuế khai bổ sung, nộp số tiền thuế ấn định được áp dụng theo thời hạn nộp thuế của tờ khai hải quan ban đầu;"},{"k":"p","t":"b) Thời hạn nộp thuế đối với hàng hóa phải phân tích, giám định để xác định chính xác số tiền thuế phải nộp; hàng hóa chưa có giá chính thức tại thời điểm đăng ký tờ khai hải quan; hàng hóa có khoản thực thanh toán, hàng hóa có các khoản điều chỉnh cộng vào trị giá hải quan chưa xác định được tại thời điểm đăng ký tờ khai hải quan được thực hiện theo quy định của Bộ trưởng Bộ Tài chính."}]},{"id":"luat-38_56","no":56,"code":"Điều 56","title":"Điều 56. Địa điểm và hình thức nộp thuế","shortTitle":"Địa điểm và hình thức nộp thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế nộp tiền thuế vào ngân sách nhà nước theo quy định sau đây:"},{"k":"p","t":"a) Tại Kho bạc Nhà nước;"},{"k":"p","t":"b) Tại cơ quan quản lý thuế nơi tiếp nhận hồ sơ khai thuế;"},{"k":"p","t":"c) Thông qua tổ chức được cơ quan quản lý thuế ủy nhiệm thu thuế;"},{"k":"p","t":"d) Thông qua ngân hàng thương mại, tổ chức tín dụng khác và tổ chức dịch vụ theo quy định của pháp luật."},{"k":"p","t":"2. Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng khác và tổ chức dịch vụ theo quy định của pháp luật có trách nhiệm bố trí địa điểm, phương tiện, công chức, nhân viên thu tiền thuế bảo đảm thuận lợi cho người nộp thuế nộp tiền thuế kịp thời vào ngân sách nhà nước."},{"k":"p","t":"3. Cơ quan, tổ chức khi nhận tiền thuế hoặc khấu trừ tiền thuế phải cấp cho người nộp thuế chứng từ thu tiền thuế."},{"k":"p","t":"4. Trong thời hạn 08 giờ làm việc kể từ khi thu tiền thuế của người nộp thuế, cơ quan, tổ chức nhận tiền thuế phải chuyển tiền vào ngân sách nhà nước. Trường hợp thu thuế bằng tiền mặt tại vùng sâu, vùng xa, hải đảo, vùng đi lại khó khăn, thời hạn chuyển tiền thuế vào ngân sách nhà nước theo quy định của Bộ trưởng Bộ Tài chính."}]},{"id":"luat-38_57","no":57,"code":"Điều 57","title":"Điều 57. Thứ tự thanh toán tiền thuế, tiền chậm nộp, tiền phạt","shortTitle":"Thứ tự thanh toán tiền thuế, tiền chậm nộp, tiền phạt","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thứ tự thanh toán tiền thuế, tiền chậm nộp, tiền phạt được thực hiện theo thời hạn trước, sau và theo thứ tự quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Thứ tự thanh toán tiền thuế, tiền chậm nộp, tiền phạt được quy định như sau:"},{"k":"p","t":"a) Tiền nợ thuế, tiền phạt, tiền chậm nộp quá hạn thuộc đối tượng áp dụng các biện pháp cưỡng chế;"},{"k":"p","t":"b) Tiền nợ thuế, tiền phạt, tiền chậm nộp quá hạn chưa thuộc đối tượng áp dụng các biện pháp cưỡng chế;"},{"k":"p","t":"c) Tiền thuế, tiền phạt, tiền chậm nộp phát sinh."}]},{"id":"luat-38_58","no":58,"code":"Điều 58","title":"Điều 58. Xác định ngày đã nộp thuế","shortTitle":"Xác định ngày đã nộp thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp nộp tiền thuế không bằng tiền mặt, ngày đã nộp thuế là ngày Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng khác, tổ chức dịch vụ trích tiền từ tài khoản của người nộp thuế hoặc người nộp thay và được ghi nhận trên chứng từ nộp tiền thuế."},{"k":"p","t":"2. Trường hợp nộp tiền thuế trực tiếp bằng tiền mặt, ngày đã nộp thuế là ngày Kho bạc Nhà nước, cơ quan quản lý thuế hoặc tổ chức được ủy nhiệm thu thuế cấp chứng từ thu tiền thuế."}]},{"id":"luat-38_59","no":59,"code":"Điều 59","title":"Điều 59. Xử lý đối với việc chậm nộp tiền thuế","shortTitle":"Xử lý đối với việc chậm nộp tiền thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp phải nộp tiền chậm nộp bao gồm:"},{"k":"p","t":"a) Người nộp thuế chậm nộp tiền thuế so với thời hạn quy định, thời hạn gia hạn nộp thuế, thời hạn ghi trong thông báo của cơ quan quản lý thuế, thời hạn trong quyết định ấn định thuế hoặc quyết định xử lý của cơ quan quản lý thuế;"},{"k":"p","t":"b) Người nộp thuế khai bổ sung hồ sơ khai thuế làm tăng số tiền thuế phải nộp hoặc cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền kiểm tra, thanh tra phát hiện khai thiếu số tiền thuế phải nộp thì phải nộp tiền chậm nộp đối với số tiền thuế phải nộp tăng thêm kể từ ngày kế tiếp ngày cuối cùng thời hạn nộp thuế của kỳ tính thuế có sai, sót hoặc kể từ ngày hết thời hạn nộp thuế của tờ khai hải quan ban đầu;"},{"k":"p","t":"c) Người nộp thuế khai bổ sung hồ sơ khai thuế làm giảm số tiền thuế đã được hoàn trả hoặc cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền kiểm tra, thanh tra phát hiện số tiền thuế được hoàn nhỏ hơn số tiền thuế đã hoàn thì phải nộp tiền chậm nộp đối với số tiền thuế đã hoàn trả phải thu hồi kể từ ngày nhận được tiền hoàn trả từ ngân sách nhà nước;"},{"k":"p","t":"d) Trường hợp được nộp dần tiền thuế nợ quy định tại khoản 5 Điều 124 của Luật này;"},{"k":"p","t":"đ) Trường hợp không bị xử phạt vi phạm hành chính về quản lý thuế do hết thời hiệu xử phạt nhưng bị truy thu số tiền thuế thiếu quy định tại khoản 3 Điều 137 của Luật này;"},{"k":"p","t":"e) Trường hợp không bị xử phạt vi phạm hành chính về quản lý thuế đối với hành vi quy định tại khoản 3 và khoản 4 Điều 142 của Luật này;"},{"k":"p","t":"g) Cơ quan, tổ chức được cơ quan quản lý thuế ủy nhiệm thu thuế chậm chuyển tiền thuế, tiền chậm nộp, tiền phạt của người nộp thuế vào ngân sách nhà nước thì phải nộp tiền chậm nộp đối với số tiền chậm chuyển theo quy định."},{"k":"p","t":"2. Mức tính tiền chậm nộp và thời gian tính tiền chậm nộp được quy định như sau:"},{"k":"p","t":"a) Mức tính tiền chậm nộp bằng 0,03%/ngày tính trên số tiền thuế chậm nộp;"},{"k":"p","t":"b) Thời gian tính tiền chậm nộp được tính liên tục kể từ ngày tiếp theo ngày phát sinh tiền chậm nộp quy định tại khoản 1 Điều này đến ngày liền kề trước ngày số tiền nợ thuế, tiền thu hồi hoàn thuế, tiền thuế tăng thêm, tiền thuế ấn định, tiền thuế chậm chuyển đã nộp vào ngân sách nhà nước."},{"k":"p","t":"3. Người nộp thuế tự xác định số tiền chậm nộp theo quy định tại khoản 1, khoản 2 Điều này và nộp vào ngân sách nhà nước theo quy định. Trường hợp người nộp thuế có khoản tiền thuế, tiền chậm nộp, tiền phạt nộp thừa thì thực hiện theo quy định tại khoản 1 Điều 60 của Luật này."},{"k":"p","t":"4. Trường hợp sau 30 ngày kể từ ngày hết thời hạn nộp thuế, người nộp thuế chưa nộp tiền thuế, tiền chậm nộp, tiền phạt thì cơ quan quản lý thuế thông báo cho người nộp thuế biết số tiền thuế, tiền phạt còn nợ và số ngày chậm nộp."},{"k":"p","t":"5. Không tính tiền chậm nộp trong các trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế cung ứng hàng hóa, dịch vụ được thanh toán bằng nguồn vốn ngân sách nhà nước, bao gồm cả nhà thầu phụ được quy định trong hợp đồng ký với chủ đầu tư và được chủ đầu tư trực tiếp thanh toán nhưng chưa được thanh toán thì không phải nộp tiền chậm nộp."},{"k":"p","t":"Số tiền nợ thuế không tính chậm nộp là tổng số tiền thuế còn nợ ngân sách nhà nước của người nộp thuế nhưng không vượt quá số tiền ngân sách nhà nước chưa thanh toán;"},{"k":"p","t":"b) Các trường hợp quy định tại điểm b khoản 4 Điều 55 của Luật này thì không tính tiền chậm nộp trong thời gian chờ kết quả phân tích, giám định; trong thời gian chưa có giá chính thức; trong thời gian chưa xác định được khoản thực thanh toán, các khoản điều chỉnh cộng vào trị giá hải quan."},{"k":"p","t":"6. Chưa tính tiền chậm nộp đối với các trường hợp được khoanh nợ theo quy định tại Điều 83 của Luật này."},{"k":"p","t":"7. Người nộp thuế khai bổ sung hồ sơ khai thuế làm giảm số tiền thuế phải nộp hoặc cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền kiểm tra, thanh tra phát hiện số tiền thuế phải nộp giảm thì được điều chỉnh số tiền chậm nộp đã tính tương ứng với số tiền chênh lệch giảm."},{"k":"p","t":"8. Người nộp thuế phải nộp tiền chậm nộp theo quy định tại khoản 1 Điều này được miễn tiền chậm nộp trong trường hợp bất khả kháng quy định tại khoản 27 Điều 3 của Luật này."},{"k":"p","t":"9. Bộ trưởng Bộ Tài chính quy định thủ tục xử lý đối với việc chậm nộp tiền thuế."}]},{"id":"luat-38_60","no":60,"code":"Điều 60","title":"Điều 60. Xử lý số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa","shortTitle":"Xử lý số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có số tiền thuế, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, tiền chậm nộp, tiền phạt phải nộp thì được bù trừ số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa với số tiền thuế, tiền chậm nộp, tiền phạt còn nợ hoặc trừ vào số tiền thuế, tiền chậm nộp, tiền phạt phải nộp của lần nộp thuế tiếp theo hoặc được hoàn trả số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa khi người nộp thuế không còn nợ tiền thuế, tiền chậm nộp, tiền phạt."},{"k":"p","t":"Trường hợp người nộp thuế đề nghị bù trừ tiền thuế, tiền chậm nộp, tiền phạt nộp thừa với số tiền thuế, tiền chậm nộp, tiền phạt còn nợ thì không tính tiền chậm nộp tương ứng với khoản tiền bù trừ trong khoảng thời gian từ ngày phát sinh khoản nộp thừa đến ngày cơ quan quản lý thuế thực hiện bù trừ."},{"k":"p","t":"2. Trường hợp người nộp thuế yêu cầu hoàn trả số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa thì cơ quan quản lý thuế phải ra quyết định hoàn trả số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa hoặc có văn bản trả lời nêu rõ lý do không hoàn trả trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản yêu cầu."},{"k":"p","t":"3. Không hoàn trả số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa và cơ quan quản lý thuế thực hiện thanh khoản số tiền nộp thừa trên sổ kế toán, trên hệ thống dữ liệu điện tử trong các trường hợp sau đây:"},{"k":"p","t":"a) Cơ quan quản lý thuế đã thông báo cho người nộp thuế về số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa được hoàn trả nhưng người nộp thuế từ chối nhận lại số tiền nộp thừa bằng văn bản;"},{"k":"p","t":"b) Người nộp thuế không hoạt động tại địa chỉ đã đăng ký với cơ quan thuế, đã được cơ quan quản lý thuế thông báo về số tiền nộp thừa trên phương tiện thông tin đại chúng mà sau 01 năm kể từ ngày thông báo, người nộp thuế không có phản hồi bằng văn bản yêu cầu hoàn trả tiền thuế, tiền chậm nộp, tiền phạt nộp thừa với cơ quan quản lý thuế;"},{"k":"p","t":"c) Khoản nộp thừa quá thời hạn 10 năm kể từ ngày nộp tiền vào ngân sách nhà nước mà người nộp thuế không bù trừ nghĩa vụ thuế và không hoàn thuế."},{"k":"p","t":"4. Trường hợp người nộp thuế không hoạt động tại địa chỉ đăng ký kinh doanh có tiền thuế, tiền chậm nộp, tiền phạt nộp thừa và tiền thuế, tiền chậm nộp, tiền phạt còn nợ thì cơ quan quản lý thuế thực hiện bù trừ tiền thuế, tiền chậm nộp, tiền phạt nộp thừa với số tiền thuế, tiền chậm nộp, tiền phạt còn nợ."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định thẩm quyền, thủ tục xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa quy định tại Điều này."}]},{"id":"luat-38_61","no":61,"code":"Điều 61","title":"Điều 61. Nộp thuế trong thời gian giải quyết khiếu nại, khởi kiện","shortTitle":"Nộp thuế trong thời gian giải quyết khiếu nại, khởi kiện","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trong thời gian giải quyết khiếu nại, khởi kiện của người nộp thuế về số tiền thuế, tiền chậm nộp, tiền phạt do cơ quan quản lý thuế tính hoặc ấn định, người nộp thuế vẫn phải nộp đủ số tiền thuế, tiền chậm nộp, tiền phạt đó, trừ trường hợp cơ quan nhà nước có thẩm quyền quyết định tạm đình chỉ thực hiện quyết định tính thuế, quyết định ấn định thuế của cơ quan quản lý thuế."},{"k":"p","t":"2. Trường hợp số tiền thuế, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, tiền chậm nộp, tiền phạt được xác định theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thì người nộp thuế được hoàn trả số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa."},{"k":"p","t":"Người nộp thuế có quyền yêu cầu cơ quan quản lý thuế trả tiền lãi theo mức 0,03%/ngày tính trên số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa. Nguồn tiền trả lãi được chi trả từ ngân sách trung ương theo quy định của pháp luật về ngân sách nhà nước."},{"k":"p","t":"3. Thủ tục xử lý đối với trường hợp số tiền thuế, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, tiền chậm nộp, tiền phạt được xác định theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án được thực hiện theo quy định tại khoản 5 Điều 60 của Luật này."}]},{"id":"luat-38_62","no":62,"code":"Điều 62","title":"Điều 62. Gia hạn nộp thuế","shortTitle":"Gia hạn nộp thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc gia hạn nộp thuế được xem xét trên cơ sở đề nghị của người nộp thuế thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Bị thiệt hại vật chất, gây ảnh hưởng trực tiếp đến sản xuất, kinh doanh do gặp trường hợp bất khả kháng quy định tại khoản 27 Điều 3 của Luật này;"},{"k":"p","t":"b) Phải ngừng hoạt động do di dời cơ sở sản xuất, kinh doanh theo yêu cầu của cơ quan có thẩm quyền làm ảnh hưởng đến kết quả sản xuất, kinh doanh."},{"k":"p","t":"2. Người nộp thuế thuộc trường hợp được gia hạn nộp thuế quy định tại khoản 1 Điều này được gia hạn nộp thuế một phần hoặc toàn bộ tiền thuế phải nộp."},{"k":"p","t":"3. Thời gian gia hạn nộp thuế được quy định như sau:"},{"k":"p","t":"a) Không quá 02 năm kể từ ngày hết thời hạn nộp thuế đối với trường hợp quy định tại điểm a khoản 1 Điều này;"},{"k":"p","t":"b) Không quá 01 năm kể từ ngày hết thời hạn nộp thuế đối với trường hợp quy định tại điểm b khoản 1 Điều này."},{"k":"p","t":"4. Người nộp thuế không bị phạt và không phải nộp tiền chậm nộp tính trên số tiền nợ thuế trong thời gian gia hạn nộp thuế."},{"k":"p","t":"5. Thủ trưởng cơ quan quản lý thuế quản lý trực tiếp căn cứ hồ sơ gia hạn nộp thuế để quyết định số tiền thuế được gia hạn, thời gian gia hạn nộp thuế."}]},{"id":"luat-38_63","no":63,"code":"Điều 63","title":"Điều 63. Gia hạn nộp thuế trong trường hợp đặc biệt","shortTitle":"Gia hạn nộp thuế trong trường hợp đặc biệt","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Chính phủ quyết định việc gia hạn nộp thuế cho các đối tượng, ngành, nghề kinh doanh gặp khó khăn đặc biệt trong từng thời kỳ nhất định. Việc gia hạn nộp thuế không dẫn đến điều chỉnh dự toán thu ngân sách nhà nước đã được Quốc hội quyết định."}]},{"id":"luat-38_64","no":64,"code":"Điều 64","title":"Điều 64. Hồ sơ gia hạn nộp thuế","shortTitle":"Hồ sơ gia hạn nộp thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thuộc trường hợp được gia hạn nộp thuế theo quy định của Luật này phải lập và gửi hồ sơ gia hạn nộp thuế cho cơ quan quản lý thuế quản lý trực tiếp."},{"k":"p","t":"2. Hồ sơ gia hạn nộp thuế bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị gia hạn nộp thuế, trong đó nêu rõ lý do, số tiền thuế, thời hạn nộp;"},{"k":"p","t":"b) Tài liệu chứng minh lý do gia hạn nộp thuế."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định chi tiết hồ sơ gia hạn nộp thuế."}]},{"id":"luat-38_65","no":65,"code":"Điều 65","title":"Điều 65. Tiếp nhận và xử lý hồ sơ gia hạn nộp thuế","shortTitle":"Tiếp nhận và xử lý hồ sơ gia hạn nộp thuế","chuong":"Chương VI — NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế tiếp nhận hồ sơ gia hạn nộp thuế của người nộp thuế qua các hình thức sau đây:"},{"k":"p","t":"a) Nhận hồ sơ trực tiếp tại cơ quan quản lý thuế;"},{"k":"p","t":"b) Nhận hồ sơ gửi qua đường bưu chính;"},{"k":"p","t":"c) Nhận hồ sơ điện tử qua cổng giao dịch điện tử của cơ quan quản lý thuế."},{"k":"p","t":"2. Cơ quan quản lý thuế xử lý hồ sơ gia hạn nộp thuế theo quy định sau đây:"},{"k":"p","t":"a) Trường hợp hồ sơ hợp pháp, đầy đủ, đúng mẫu quy định thì thông báo bằng văn bản về việc gia hạn nộp thuế cho người nộp thuế trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ;"},{"k":"p","t":"b) Trường hợp hồ sơ không đầy đủ theo quy định thì thông báo bằng văn bản cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ."}]},{"id":"luat-38_66","no":66,"code":"Điều 66","title":"Điều 66. Hoàn thành nghĩa vụ nộp thuế trong trường hợp xuất cảnh","shortTitle":"Hoàn thành nghĩa vụ nộp thuế trong trường hợp xuất cảnh","chuong":"Chương VII — TRÁCH NHIỆM HOÀN THÀNH NGHĨA VỤ NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thuộc trường hợp đang bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, người Việt Nam xuất cảnh để định cư ở nước ngoài, người Việt Nam định cư ở nước ngoài, người nước ngoài trước khi xuất cảnh từ Việt Nam phải hoàn thành nghĩa vụ nộp thuế; trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì bị tạm hoãn xuất cảnh theo quy định của pháp luật về xuất cảnh, nhập cảnh."},{"k":"p","t":"2. Cơ quan quản lý thuế có trách nhiệm thông báo cho cơ quan quản lý xuất cảnh, nhập cảnh về cá nhân, người nộp thuế quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_67","no":67,"code":"Điều 67","title":"Điều 67. Hoàn thành nghĩa vụ nộp thuế trong trường hợp giải thể, phá sản, chấm dứt hoạt động","shortTitle":"Hoàn thành nghĩa vụ nộp thuế trong trường hợp giải thể, phá sản, chấm dứt hoạt động","chuong":"Chương VII — TRÁCH NHIỆM HOÀN THÀNH NGHĨA VỤ NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc hoàn thành nghĩa vụ nộp thuế trong trường hợp doanh nghiệp giải thể được thực hiện theo quy định của pháp luật về doanh nghiệp, pháp luật về các tổ chức tín dụng, pháp luật về kinh doanh bảo hiểm và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Việc hoàn thành nghĩa vụ nộp thuế trong trường hợp doanh nghiệp phá sản được thực hiện theo trình tự, thủ tục quy định tại Luật Phá sản."},{"k":"p","t":"3. Doanh nghiệp chấm dứt hoạt động, bỏ địa chỉ đăng ký kinh doanh chưa hoàn thành nghĩa vụ nộp thuế thì phần tiền thuế nợ còn lại do chủ sở hữu doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên, cổ đông góp vốn, thành viên góp vốn, thành viên hợp danh chịu trách nhiệm nộp theo quy định đối với mỗi loại hình doanh nghiệp quy định tại Luật Doanh nghiệp."},{"k":"p","t":"4. Hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động kinh doanh chưa hoàn thành nghĩa vụ nộp thuế thì phần tiền thuế nợ còn lại do chủ hộ, cá nhân chịu trách nhiệm nộp."},{"k":"p","t":"5. Người nộp thuế có chi nhánh, đơn vị phụ thuộc chấm dứt hoạt động mà vẫn còn nợ thuế và các khoản thu khác thuộc ngân sách nhà nước thì có trách nhiệm kế thừa các khoản nợ của chi nhánh, đơn vị phụ thuộc."}]},{"id":"luat-38_68","no":68,"code":"Điều 68","title":"Điều 68. Hoàn thành nghĩa vụ nộp thuế trong trường hợp tổ chức lại doanh nghiệp","shortTitle":"Hoàn thành nghĩa vụ nộp thuế trong trường hợp tổ chức lại doanh nghiệp","chuong":"Chương VII — TRÁCH NHIỆM HOÀN THÀNH NGHĨA VỤ NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp bị chia có trách nhiệm hoàn thành nghĩa vụ nộp thuế trước khi thực hiện chia doanh nghiệp; trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì các doanh nghiệp mới được thành lập từ doanh nghiệp bị chia có trách nhiệm hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"2. Doanh nghiệp bị tách, bị hợp nhất, bị sáp nhập có trách nhiệm hoàn thành nghĩa vụ nộp thuế trước khi tách, hợp nhất, sáp nhập; trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì doanh nghiệp bị tách và doanh nghiệp được tách, doanh nghiệp hợp nhất, doanh nghiệp nhận sáp nhập có trách nhiệm hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"3. Doanh nghiệp được chuyển đổi loại hình doanh nghiệp có trách nhiệm hoàn thành nghĩa vụ nộp thuế trước khi chuyển đổi; trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì doanh nghiệp chuyển đổi có trách nhiệm hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"4. Việc tổ chức lại doanh nghiệp không làm thay đổi thời hạn nộp thuế của doanh nghiệp được tổ chức lại. Trường hợp doanh nghiệp được tổ chức lại hoặc các doanh nghiệp thành lập mới không nộp thuế đầy đủ theo thời hạn nộp thuế đã quy định thì bị xử phạt theo quy định của pháp luật."}]},{"id":"luat-38_69","no":69,"code":"Điều 69","title":"Điều 69. Hoàn thành nghĩa vụ nộp thuế trong trường hợp người nộp thuế là người đã chết, người bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự","shortTitle":"Hoàn thành nghĩa vụ nộp thuế trong trường hợp người nộp thuế là người đã chết, người bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự","chuong":"Chương VII — TRÁCH NHIỆM HOÀN THÀNH NGHĨA VỤ NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc hoàn thành nghĩa vụ nộp thuế của người đã chết, người bị Tòa án tuyên bố là đã chết do người được thừa kế thực hiện trong phần tài sản của người đã chết, người bị Tòa án tuyên bố là đã chết để lại hoặc phần tài sản người thừa kế được chia tại thời điểm nhận thừa kế. Trong trường hợp không có người thừa kế hoặc tất cả những người thừa kế từ chối nhận di sản thừa kế thì việc hoàn thành nghĩa vụ nộp thuế của người đã chết, người bị Tòa án tuyên bố là đã chết thực hiện theo quy định của pháp luật về dân sự."},{"k":"p","t":"2. Việc hoàn thành nghĩa vụ nộp thuế của người bị Tòa án tuyên bố mất tích hoặc mất năng lực hành vi dân sự do người quản lý tài sản của người mất tích hoặc người mất năng lực hành vi dân sự thực hiện trong phần tài sản của người đó."},{"k":"p","t":"3. Trường hợp Tòa án ra quyết định hủy bỏ quyết định tuyên bố một người là đã chết, mất tích hoặc mất năng lực hành vi dân sự thì số nợ tiền thuế, tiền chậm nộp, tiền phạt đã xóa theo quy định tại Điều 85 của Luật này được phục hồi lại, nhưng không bị tính tiền chậm nộp cho thời gian bị tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự."}]},{"id":"luat-38_70","no":70,"code":"Điều 70","title":"Điều 70. Các trường hợp hoàn thuế","shortTitle":"Các trường hợp hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế thực hiện hoàn thuế đối với tổ chức, cá nhân thuộc trường hợp hoàn thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Cơ quan thuế hoàn trả tiền nộp thừa đối với trường hợp người nộp thuế có số tiền đã nộp ngân sách nhà nước lớn hơn số phải nộp ngân sách nhà nước theo quy định tại khoản 1 Điều 60 của Luật này."}]},{"id":"luat-38_71","no":71,"code":"Điều 71","title":"Điều 71. Hồ sơ hoàn thuế","shortTitle":"Hồ sơ hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thuộc trường hợp được hoàn thuế lập và gửi hồ sơ hoàn thuế cho cơ quan quản lý thuế có thẩm quyền."},{"k":"p","t":"2. Hồ sơ hoàn thuế bao gồm:"},{"k":"p","t":"a) Văn bản yêu cầu hoàn thuế;"},{"k":"p","t":"b) Các tài liệu liên quan đến yêu cầu hoàn thuế."}]},{"id":"luat-38_72","no":72,"code":"Điều 72","title":"Điều 72. Tiếp nhận và phản hồi thông tin hồ sơ hoàn thuế","shortTitle":"Tiếp nhận và phản hồi thông tin hồ sơ hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế có nhiệm vụ tiếp nhận hồ sơ hoàn thuế theo quy định sau đây:"},{"k":"p","t":"a) Cơ quan thuế quản lý trực tiếp người nộp thuế tiếp nhận hồ sơ hoàn thuế đối với các trường hợp được hoàn thuế theo quy định của pháp luật về thuế. Cơ quan thuế quản lý khoản thu tiếp nhận hồ sơ hoàn trả tiền nộp thừa; trường hợp hoàn trả tiền nộp thừa theo quyết toán thuế thu nhập doanh nghiệp, quyết toán thuế thu nhập cá nhân thì cơ quan thuế tiếp nhận hồ sơ quyết toán thuế thu nhập doanh nghiệp, quyết toán thuế thu nhập cá nhân của người nộp thuế tiếp nhận hồ sơ hoàn trả tiền nộp thừa;"},{"k":"p","t":"b) Cơ quan hải quan nơi quản lý khoản thu tiếp nhận hồ sơ hoàn thuế đối với các trường hợp hoàn thuế theo quy định của pháp luật về thuế; trường hợp người nước ngoài, người Việt Nam định cư ở nước ngoài xuất cảnh có hàng hóa thuộc trường hợp hoàn thuế thì cơ quan hải quan nơi làm thủ tục xuất cảnh tiếp nhận hồ sơ hoàn thuế."},{"k":"p","t":"2. Người nộp thuế nộp hồ sơ hoàn thuế thông qua các hình thức sau đây:"},{"k":"p","t":"a) Nộp hồ sơ trực tiếp tại cơ quan quản lý thuế;"},{"k":"p","t":"b) Gửi hồ sơ qua đường bưu chính;"},{"k":"p","t":"c) Gửi hồ sơ điện tử qua cổng giao dịch điện tử của cơ quan quản lý thuế."},{"k":"p","t":"3. Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ hoàn thuế, cơ quan quản lý thuế thực hiện phân loại hồ sơ và thông báo cho người nộp thuế về việc chấp nhận hồ sơ và thời hạn giải quyết hồ sơ hoàn thuế hoặc thông báo bằng văn bản cho người nộp thuế trong trường hợp hồ sơ không đầy đủ."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"luat-38_73","no":73,"code":"Điều 73","title":"Điều 73. Phân loại hồ sơ hoàn thuế","shortTitle":"Phân loại hồ sơ hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ hoàn thuế được phân loại thành hồ sơ thuộc diện kiểm tra trước hoàn thuế và hồ sơ thuộc diện hoàn thuế trước."},{"k":"p","t":"2. Hồ sơ thuộc diện kiểm tra trước hoàn thuế bao gồm:"},{"k":"p","t":"a) Hồ sơ của người nộp thuế đề nghị hoàn thuế lần đầu của từng trường hợp hoàn thuế theo quy định của pháp luật về thuế. Trường hợp người nộp thuế có hồ sơ hoàn thuế gửi cơ quan quản lý thuế lần đầu nhưng không thuộc diện được hoàn thuế theo quy định thì lần đề nghị hoàn thuế kế tiếp vẫn xác định là đề nghị hoàn thuế lần đầu;"},{"k":"p","t":"b) Hồ sơ của người nộp thuế đề nghị hoàn thuế trong thời hạn 02 năm kể từ thời điểm bị xử lý về hành vi trốn thuế;"},{"k":"p","t":"c) Hồ sơ của tổ chức giải thể, phá sản, chấm dứt hoạt động, bán, giao và chuyển giao doanh nghiệp nhà nước;"},{"k":"p","t":"d) Hồ sơ hoàn thuế thuộc loại rủi ro về thuế cao theo phân loại quản lý rủi ro trong quản lý thuế;"},{"k":"p","t":"đ) Hồ sơ hoàn thuế thuộc trường hợp hoàn thuế trước nhưng hết thời hạn theo thông báo bằng văn bản của cơ quan quản lý thuế mà người nộp thuế không giải trình, bổ sung hồ sơ hoàn thuế hoặc có giải trình, bổ sung hồ sơ hoàn thuế nhưng không chứng minh được số tiền thuế đã khai là đúng;"},{"k":"p","t":"e) Hồ sơ hoàn thuế đối với hàng hóa xuất khẩu, nhập khẩu không thực hiện thanh toán qua ngân hàng thương mại, tổ chức tín dụng khác theo quy định của pháp luật;"},{"k":"p","t":"g) Hồ sơ hoàn thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc diện phải kiểm tra trước hoàn thuế theo quy định của Chính phủ."},{"k":"p","t":"3. Hồ sơ thuộc diện hoàn thuế trước là hồ sơ của người nộp thuế không thuộc trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"luat-38_74","no":74,"code":"Điều 74","title":"Điều 74. Địa điểm kiểm tra hồ sơ hoàn thuế","shortTitle":"Địa điểm kiểm tra hồ sơ hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ thuộc diện hoàn thuế trước được thực hiện kiểm tra tại trụ sở của cơ quan quản lý thuế."},{"k":"p","t":"2. Hồ sơ thuộc diện kiểm tra trước hoàn thuế được thực hiện kiểm tra tại trụ sở của người nộp thuế hoặc trụ sở của cơ quan, tổ chức, cá nhân có liên quan."}]},{"id":"luat-38_75","no":75,"code":"Điều 75","title":"Điều 75. Thời hạn giải quyết hồ sơ hoàn thuế","shortTitle":"Thời hạn giải quyết hồ sơ hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với hồ sơ thuộc diện hoàn thuế trước, chậm nhất là 06 ngày làm việc kể từ ngày cơ quan quản lý thuế có thông báo về việc chấp nhận hồ sơ và thời hạn giải quyết hồ sơ hoàn thuế, cơ quan quản lý thuế phải quyết định hoàn thuế cho người nộp thuế hoặc thông báo chuyển hồ sơ của người nộp thuế sang kiểm tra trước hoàn thuế nếu thuộc trường hợp quy định tại khoản 2 Điều 73 của Luật này hoặc thông báo không hoàn thuế cho người nộp thuế nếu hồ sơ không đủ điều kiện hoàn thuế."},{"k":"p","t":"Trường hợp thông tin khai trên hồ sơ hoàn thuế khác với thông tin quản lý của cơ quan quản lý thuế thì cơ quan quản lý thuế thông báo bằng văn bản để người nộp thuế giải trình, bổ sung thông tin. Thời gian giải trình, bổ sung thông tin không tính trong thời hạn giải quyết hồ sơ hoàn thuế."},{"k":"p","t":"2. Đối với hồ sơ thuộc diện kiểm tra trước hoàn thuế, chậm nhất là 40 ngày kể từ ngày cơ quan quản lý thuế có thông báo bằng văn bản về việc chấp nhận hồ sơ và thời hạn giải quyết hồ sơ hoàn thuế, cơ quan quản lý thuế phải quyết định hoàn thuế cho người nộp thuế hoặc không hoàn thuế cho người nộp thuế nếu hồ sơ không đủ điều kiện hoàn thuế."},{"k":"p","t":"3. Quá thời hạn quy định tại khoản 1 và khoản 2 Điều này, nếu việc chậm ban hành quyết định hoàn thuế do lỗi của cơ quan quản lý thuế thì ngoài số tiền thuế phải hoàn trả, cơ quan quản lý thuế còn phải trả tiền lãi với mức 0,03%/ngày tính trên số tiền phải hoàn trả và số ngày chậm hoàn trả. Nguồn tiền trả lãi được chi từ ngân sách trung ương theo quy định của pháp luật về ngân sách nhà nước."}]},{"id":"luat-38_76","no":76,"code":"Điều 76","title":"Điều 76. Thẩm quyền quyết định hoàn thuế","shortTitle":"Thẩm quyền quyết định hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổng cục trưởng Tổng cục Thuế, Cục trưởng Cục Thuế tỉnh, thành phố trực thuộc trung ương quyết định việc hoàn thuế đối với trường hợp hoàn thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Thủ trưởng cơ quan thuế nơi tiếp nhận hồ sơ hoàn thuế nộp thừa quyết định việc hoàn thuế đối với trường hợp hoàn trả tiền nộp thừa theo quy định của Luật này."},{"k":"p","t":"3. Tổng cục trưởng Tổng cục Hải quan, Cục trưởng Cục Hải quan, Chi cục trưởng Chi cục Hải quan nơi phát sinh số tiền thuế được hoàn quyết định việc hoàn thuế đối với trường hợp hoàn thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định trình tự, thủ tục hoàn thuế."}]},{"id":"luat-38_77","no":77,"code":"Điều 77","title":"Điều 77. Thanh tra, kiểm tra sau hoàn thuế","shortTitle":"Thanh tra, kiểm tra sau hoàn thuế","chuong":"Chương VIII — THỦ TỤC HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế thực hiện thanh tra, kiểm tra đối với hồ sơ thuộc diện hoàn thuế trước theo nguyên tắc rủi ro trong quản lý thuế và trong thời hạn 05 năm kể từ ngày ban hành quyết định hoàn thuế."},{"k":"p","t":"2. Thủ tục, thẩm quyền, trách nhiệm thanh tra, kiểm tra của cơ quan quản lý thuế đối với hồ sơ hoàn thuế được thực hiện theo quy định của Luật này và Luật Thanh tra."},{"k":"p","t":"KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ"}]},{"id":"luat-38_78","no":78,"code":"Điều 78","title":"Điều 78. Không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Không thu thuế đối với trường hợp không phải nộp thuế xuất khẩu, thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Bộ trưởng Bộ Tài chính quy định thủ tục không thu thuế."}]},{"id":"luat-38_79","no":79,"code":"Điều 79","title":"Điều 79. Miễn thuế, giảm thuế","shortTitle":"Miễn thuế, giảm thuế","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế, giảm thuế được thực hiện theo quy định của pháp luật về thuế và khoản 2 Điều này."},{"k":"p","t":"2. Miễn thuế đối với các trường hợp sau đây:"},{"k":"p","t":"a) Hộ gia đình, cá nhân thuộc đối tượng nộp thuế sử dụng đất phi nông nghiệp có số tiền thuế phải nộp hằng năm từ 50.000 đồng trở xuống;"},{"k":"p","t":"b) Cá nhân có số tiền thuế phát sinh phải nộp hằng năm sau quyết toán thuế thu nhập cá nhân từ tiền lương, tiền công từ 50.000 đồng trở xuống."}]},{"id":"luat-38_80","no":80,"code":"Điều 80","title":"Điều 80. Hồ sơ miễn thuế, giảm thuế","shortTitle":"Hồ sơ miễn thuế, giảm thuế","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế, giảm thuế đối với trường hợp người nộp thuế tự xác định số tiền thuế được miễn, giảm bao gồm:"},{"k":"p","t":"a) Tờ khai thuế;"},{"k":"p","t":"b) Tài liệu liên quan đến việc xác định số tiền thuế được miễn, giảm."},{"k":"p","t":"2. Hồ sơ miễn thuế, giảm thuế đối với trường hợp cơ quan quản lý thuế quyết định miễn thuế, giảm thuế bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị miễn thuế, giảm thuế trong đó nêu rõ loại thuế đề nghị miễn, giảm; lý do miễn thuế, giảm thuế; số tiền thuế đề nghị miễn, giảm;"},{"k":"p","t":"b) Tài liệu liên quan đến việc xác định số tiền thuế đề nghị miễn, giảm."},{"k":"p","t":"3. Trường hợp miễn thuế quy định tại điểm a khoản 2 Điều 79 của Luật này thì cơ quan thuế căn cứ sổ thuế để thông báo danh sách hộ gia đình, cá nhân thuộc diện miễn thuế. Trường hợp miễn thuế quy định tại điểm b khoản 2 Điều 79 của Luật này thì người nộp thuế tự xác định số tiền thuế được miễn trên cơ sở tờ khai quyết toán thuế thu nhập cá nhân."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định chi tiết hồ sơ miễn thuế, giảm thuế quy định tại Điều này; quy định trường hợp người nộp thuế tự xác định số tiền thuế được miễn, giảm và trường hợp cơ quan quản lý thuế xác định số tiền thuế được miễn, giảm."}]},{"id":"luat-38_81","no":81,"code":"Điều 81","title":"Điều 81. Nộp và tiếp nhận hồ sơ miễn thuế, giảm thuế","shortTitle":"Nộp và tiếp nhận hồ sơ miễn thuế, giảm thuế","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trường hợp người nộp thuế tự xác định số tiền thuế được miễn, giảm thì việc nộp và tiếp nhận hồ sơ miễn thuế, giảm thuế được thực hiện đồng thời với việc khai, nộp và tiếp nhận hồ sơ khai thuế quy định tại Chương IV của Luật này."},{"k":"p","t":"2. Trường hợp cơ quan quản lý thuế quyết định miễn thuế, giảm thuế theo quy định của pháp luật về thuế thì việc nộp hồ sơ miễn thuế, giảm thuế được quy định như sau:"},{"k":"p","t":"a) Đối với thuế xuất khẩu, thuế nhập khẩu và các loại thuế khác liên quan đến hàng hóa xuất khẩu, nhập khẩu thì hồ sơ được nộp tại cơ quan hải quan có thẩm quyền giải quyết theo quy định của Chính phủ;"},{"k":"p","t":"b) Đối với các loại thuế khác thì hồ sơ được nộp tại cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"3. Người nộp thuế nộp hồ sơ miễn thuế, giảm thuế thông qua hình thức sau đây:"},{"k":"p","t":"a) Nộp hồ sơ trực tiếp tại cơ quan quản lý thuế;"},{"k":"p","t":"b) Gửi hồ sơ qua đường bưu chính;"},{"k":"p","t":"c) Gửi hồ sơ điện tử qua cổng giao dịch điện tử của cơ quan quản lý thuế."},{"k":"p","t":"4. Cơ quan quản lý thuế tiếp nhận hồ sơ miễn thuế, giảm thuế thông báo về việc tiếp nhận hồ sơ miễn thuế, giảm thuế; trường hợp hồ sơ không hợp pháp, không đầy đủ, không đúng mẫu theo quy định thì trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ, cơ quan quản lý thuế phải thông báo bằng văn bản cho người nộp thuế."}]},{"id":"luat-38_82","no":82,"code":"Điều 82","title":"Điều 82. Thời hạn giải quyết hồ sơ miễn thuế, giảm thuế đối với trường hợp cơ quan quản lý thuế quyết định số tiền thuế được miễn, giảm","shortTitle":"Thời hạn giải quyết hồ sơ miễn thuế, giảm thuế đối với trường hợp cơ quan quản lý thuế quyết định số tiền thuế được miễn, giảm","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 30 ngày kể từ ngày nhận đủ hồ sơ, cơ quan quản lý thuế quyết định miễn thuế, giảm thuế hoặc thông báo bằng văn bản cho người nộp thuế lý do không thuộc diện được miễn thuế, giảm thuế."},{"k":"p","t":"2. Trường hợp cần kiểm tra thực tế để có đủ căn cứ giải quyết hồ sơ miễn thuế, giảm thuế thì trong thời hạn 40 ngày kể từ ngày nhận đủ hồ sơ, cơ quan quản lý thuế ban hành quyết định miễn thuế, giảm thuế hoặc thông báo bằng văn bản cho người nộp thuế lý do không được miễn thuế, giảm thuế."},{"k":"p","t":"KHOANH TIỀN THUẾ NỢ"}]},{"id":"luat-38_83","no":83,"code":"Điều 83","title":"Điều 83. Các trường hợp được khoanh tiền thuế nợ","shortTitle":"Các trường hợp được khoanh tiền thuế nợ","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế là người đã chết, người bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự."},{"k":"p","t":"Thời gian khoanh nợ được tính từ ngày được cấp giấy chứng tử hoặc giấy báo tử hoặc các giấy tờ thay cho giấy báo tử theo quy định của pháp luật về hộ tịch hoặc quyết định của Tòa án tuyên bố là đã chết, mất tích, mất năng lực hành vi dân sự."},{"k":"p","t":"2. Người nộp thuế có quyết định giải thể gửi cơ quan quản lý thuế, cơ quan đăng ký kinh doanh để làm thủ tục giải thể, cơ quan đăng ký kinh doanh đã thông báo người nộp thuế đang làm thủ tục giải thể trên hệ thống thông tin quốc gia về đăng ký kinh doanh nhưng người nộp thuế chưa hoàn thành thủ tục giải thể."},{"k":"p","t":"Thời gian khoanh nợ được tính từ ngày cơ quan đăng ký kinh doanh có thông báo về việc người nộp thuế đang làm thủ tục giải thể trên hệ thống thông tin quốc gia về đăng ký kinh doanh."},{"k":"p","t":"3. Người nộp thuế đã nộp đơn yêu cầu mở thủ tục phá sản hoặc bị người có quyền, nghĩa vụ liên quan nộp đơn yêu cầu mở thủ tục phá sản theo quy định của pháp luật về phá sản."},{"k":"p","t":"Thời gian khoanh nợ được tính từ ngày Tòa án có thẩm quyền thông báo thụ lý đơn yêu cầu mở thủ tục phá sản hoặc người nộp thuế đã gửi hồ sơ phá sản doanh nghiệp đến cơ quan quản lý thuế nhưng đang trong thời gian làm các thủ tục thanh toán, xử lý nợ theo quy định của Luật Phá sản."},{"k":"p","t":"4. Người nộp thuế không còn hoạt động kinh doanh tại địa chỉ kinh doanh đã đăng ký với cơ quan đăng ký kinh doanh, cơ quan quản lý thuế đã phối hợp với Ủy ban nhân dân cấp xã nơi người nộp thuế có trụ sở hoặc địa chỉ liên lạc để kiểm tra, xác minh thông tin người nộp thuế không hiện diện tại địa bàn và thông báo trên toàn quốc về việc người nộp thuế hoặc đại diện theo pháp luật của người nộp thuế không hiện diện tại địa chỉ nơi người nộp thuế có trụ sở, địa chỉ liên lạc đã đăng ký với cơ quan quản lý thuế."},{"k":"p","t":"Thời gian khoanh nợ được tính từ ngày cơ quan quản lý thuế có văn bản thông báo trên toàn quốc về việc người nộp thuế hoặc đại diện theo pháp luật của người nộp thuế không hiện diện tại địa chỉ kinh doanh, địa chỉ liên lạc đã đăng ký với cơ quan quản lý thuế."},{"k":"p","t":"5. Người nộp thuế đã bị cơ quan quản lý thuế có văn bản đề nghị cơ quan có thẩm quyền thu hồi hoặc đã bị cơ quan có thẩm quyền thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy phép thành lập và hoạt động, giấy phép hành nghề."},{"k":"p","t":"Thời gian khoanh nợ được tính từ ngày cơ quan quản lý thuế có văn bản đề nghị cơ quan có thẩm quyền thu hồi hoặc từ ngày có hiệu lực của quyết định thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy phép thành lập và hoạt động, giấy phép hành nghề."}]},{"id":"luat-38_84","no":84,"code":"Điều 84","title":"Điều 84. Thủ tục, hồ sơ, thời gian, thẩm quyền khoanh nợ","shortTitle":"Thủ tục, hồ sơ, thời gian, thẩm quyền khoanh nợ","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Chính phủ quy định thủ tục, hồ sơ, thời gian khoanh nợ đối với trường hợp được khoanh nợ."},{"k":"p","t":"2. Thủ trưởng cơ quan quản lý thuế quản lý trực tiếp người nộp thuế quyết định việc khoanh nợ."},{"k":"p","t":"3. Cơ quan quản lý thuế tiếp tục theo dõi các khoản tiền thuế nợ được khoanh và phối hợp với các cơ quan có liên quan để thu hồi tiền thuế nợ khi người nộp thuế có khả năng nộp thuế hoặc thực hiện xóa nợ theo quy định tại Điều 85 của Luật này."},{"k":"p","t":"XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT"}]},{"id":"luat-38_85","no":85,"code":"Điều 85","title":"Điều 85. Trường hợp được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","shortTitle":"Trường hợp được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp, hợp tác xã bị tuyên bố phá sản đã thực hiện các khoản thanh toán theo quy định của pháp luật về phá sản mà không còn tài sản để nộp tiền thuế, tiền chậm nộp, tiền phạt."},{"k":"p","t":"2. Cá nhân đã chết hoặc bị Tòa án tuyên bố là đã chết, mất năng lực hành vi dân sự mà không có tài sản, bao gồm cả tài sản được thừa kế để nộp tiền thuế, tiền chậm nộp, tiền phạt còn nợ."},{"k":"p","t":"3. Các khoản nợ tiền thuế, tiền chậm nộp, tiền phạt của người nộp thuế không thuộc trường hợp quy định tại khoản 1 và khoản 2 Điều này mà cơ quan quản lý thuế đã áp dụng biện pháp cưỡng chế quy định tại điểm g khoản 1 Điều 125 của Luật này và các khoản nợ tiền thuế, tiền chậm nộp, tiền phạt này đã quá 10 năm kể từ ngày hết thời hạn nộp thuế nhưng không có khả năng thu hồi."},{"k":"p","t":"Người nộp thuế là cá nhân, cá nhân kinh doanh, chủ hộ gia đình, chủ hộ kinh doanh, chủ doanh nghiệp tư nhân và công ty trách nhiệm hữu hạn một thành viên đã được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt quy định tại khoản này trước khi quay lại sản xuất, kinh doanh hoặc thành lập cơ sở sản xuất, kinh doanh mới thì phải hoàn trả cho Nhà nước khoản nợ tiền thuế, tiền chậm nộp, tiền phạt đã được xóa."},{"k":"p","t":"4. Tiền thuế, tiền chậm nộp, tiền phạt đối với các trường hợp bị ảnh hưởng do thiên tai, thảm họa, dịch bệnh có phạm vi rộng đã được xem xét miễn tiền chậm nộp theo quy định tại khoản 8 Điều 59 của Luật này và đã được gia hạn nộp thuế theo quy định tại điểm a khoản 1 Điều 62 của Luật này mà vẫn còn thiệt hại, không có khả năng phục hồi được sản xuất, kinh doanh và không có khả năng nộp tiền thuế, tiền chậm nộp, tiền phạt."},{"k":"p","t":"5. Chính phủ quy định việc phối hợp giữa cơ quan quản lý thuế và cơ quan đăng ký kinh doanh, chính quyền địa phương bảo đảm các khoản tiền thuế, tiền chậm nộp, tiền phạt đã được xóa phải được hoàn trả vào ngân sách nhà nước theo quy định tại khoản 3 Điều này trước khi cấp giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp; quy định chi tiết khoản 4 Điều này."}]},{"id":"luat-38_86","no":86,"code":"Điều 86","title":"Điều 86. Hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","shortTitle":"Hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế quản lý trực tiếp người nộp thuế thuộc diện được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt lập và gửi hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt đến cơ quan, người có thẩm quyền."},{"k":"p","t":"2. Hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị xóa nợ tiền thuế, tiền chậm nộp, tiền phạt của cơ quan quản lý thuế quản lý trực tiếp người nộp thuế thuộc diện được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt;"},{"k":"p","t":"b) Quyết định tuyên bố phá sản đối với trường hợp doanh nghiệp, hợp tác xã bị tuyên bố phá sản;"},{"k":"p","t":"c) Các tài liệu liên quan đến việc đề nghị xóa nợ tiền thuế, tiền chậm nộp, tiền phạt."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"luat-38_87","no":87,"code":"Điều 87","title":"Điều 87. Thẩm quyền xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","shortTitle":"Thẩm quyền xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định xóa nợ tiền thuế, tiền chậm nộp, tiền phạt đối với các trường hợp sau đây:"},{"k":"p","t":"a) Trường hợp quy định tại khoản 1 và khoản 2 Điều 85 của Luật này;"},{"k":"p","t":"b) Hộ gia đình, hộ kinh doanh, cá nhân kinh doanh, cá nhân quy định tại khoản 3 Điều 85 của Luật này;"},{"k":"p","t":"c) Doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của Luật này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt dưới 5.000.000.000 đồng."},{"k":"p","t":"2. Tổng cục trưởng Tổng cục Thuế, Tổng cục trưởng Tổng cục Hải quan quyết định xóa nợ đối với doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của Luật này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt từ 5.000.000.000 đồng đến dưới 10.000.000.000 đồng."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quyết định xóa nợ đối với doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của Luật này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt từ 10.000.000.000 đồng đến dưới 15.000.000.000 đồng."},{"k":"p","t":"4. Thủ tướng Chính phủ quyết định xóa nợ đối với doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của Luật này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt từ 15.000.000.000 đồng trở lên."},{"k":"p","t":"5. Chủ tịch Ủy ban nhân dân cấp tỉnh báo cáo tình hình kết quả xóa nợ tiền thuế, tiền chậm nộp, tiền phạt cho Hội đồng nhân dân cùng cấp vào kỳ họp đầu năm. Bộ trưởng Bộ Tài chính tổng hợp tình hình xóa nợ tiền thuế, tiền chậm nộp, tiền phạt để Chính phủ báo cáo Quốc hội khi quyết toán ngân sách nhà nước."}]},{"id":"luat-38_88","no":88,"code":"Điều 88","title":"Điều 88. Trách nhiệm giải quyết hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","shortTitle":"Trách nhiệm giải quyết hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt","chuong":"Chương IX — KHÔNG THU THUẾ, MIỄN THUẾ, GIẢM THUẾ; KHOANH TIỀN THUẾ NỢ; XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Cơ quan, người có thẩm quyền đã nhận hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt phải thông báo cho cơ quan đã gửi hồ sơ để hoàn chỉnh khi hồ sơ chưa đầy đủ trong thời hạn 10 ngày làm việc kể từ ngày tiếp nhận hồ sơ."},{"k":"p","t":"2. Người có thẩm quyền phải ra quyết định xóa nợ tiền thuế, tiền chậm nộp, tiền phạt hoặc thông báo không thuộc diện được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt cho cơ quan đã gửi hồ sơ trong thời hạn 60 ngày kể từ ngày nhận đủ hồ sơ."}]},{"id":"luat-38_89","no":89,"code":"Điều 89","title":"Điều 89. Hóa đơn điện tử","shortTitle":"Hóa đơn điện tử","chuong":"Chương X — ÁP DỤNG HÓA ĐƠN, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Hóa đơn điện tử là hóa đơn có mã hoặc không có mã của cơ quan thuế được thể hiện ở dạng dữ liệu điện tử do tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ lập, ghi nhận thông tin bán hàng hóa, cung cấp dịch vụ theo quy định của pháp luật về kế toán, pháp luật về thuế bằng phương tiện điện tử, bao gồm cả trường hợp hóa đơn được khởi tạo từ máy tính tiền có kết nối chuyển dữ liệu điện tử với cơ quan thuế."},{"k":"p","t":"2. Hóa đơn điện tử bao gồm hóa đơn giá trị gia tăng, hóa đơn bán hàng, tem điện tử, vé điện tử, thẻ điện tử, phiếu thu điện tử, phiếu xuất kho kiêm vận chuyển điện tử hoặc các chứng từ điện tử có tên gọi khác."},{"k":"p","t":"3. Hóa đơn điện tử có mã của cơ quan thuế là hóa đơn điện tử được cơ quan thuế cấp mã trước khi tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ gửi cho người mua."},{"k":"p","t":"Mã của cơ quan thuế trên hóa đơn điện tử bao gồm số giao dịch là một dãy số duy nhất do hệ thống của cơ quan thuế tạo ra và một chuỗi ký tự được cơ quan thuế mã hóa dựa trên thông tin của người bán lập trên hóa đơn."},{"k":"p","t":"4. Hóa đơn điện tử không có mã của cơ quan thuế là hóa đơn điện tử do tổ chức bán hàng hóa, cung cấp dịch vụ gửi cho người mua không có mã của cơ quan thuế."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_90","no":90,"code":"Điều 90","title":"Điều 90. Nguyên tắc lập, quản lý, sử dụng hóa đơn điện tử","shortTitle":"Nguyên tắc lập, quản lý, sử dụng hóa đơn điện tử","chuong":"Chương X — ÁP DỤNG HÓA ĐƠN, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Khi bán hàng hóa, cung cấp dịch vụ, người bán phải lập hóa đơn điện tử để giao cho người mua theo định dạng chuẩn dữ liệu và phải ghi đầy đủ nội dung theo quy định của pháp luật về thuế, pháp luật về kế toán, không phân biệt giá trị từng lần bán hàng hóa, cung cấp dịch vụ."},{"k":"p","t":"2. Trường hợp người bán có sử dụng máy tính tiền thì người bán đăng ký sử dụng hóa đơn điện tử được khởi tạo từ máy tính tiền có kết nối chuyển dữ liệu điện tử với cơ quan thuế."},{"k":"p","t":"3. Việc đăng ký, quản lý, sử dụng hóa đơn điện tử trong giao dịch bán hàng hóa, cung cấp dịch vụ phải tuân thủ quy định của pháp luật về giao dịch điện tử, pháp luật về kế toán, pháp luật về thuế."},{"k":"p","t":"4. Việc cấp mã của cơ quan thuế trên hóa đơn điện tử dựa trên thông tin của doanh nghiệp, tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh lập trên hóa đơn. Doanh nghiệp, tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh chịu trách nhiệm về tính chính xác của các thông tin trên hóa đơn."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_91","no":91,"code":"Điều 91","title":"Điều 91. Áp dụng hóa đơn điện tử khi bán hàng hóa, cung cấp dịch vụ","shortTitle":"Áp dụng hóa đơn điện tử khi bán hàng hóa, cung cấp dịch vụ","chuong":"Chương X — ÁP DỤNG HÓA ĐƠN, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp, tổ chức kinh tế sử dụng hóa đơn điện tử có mã của cơ quan thuế khi bán hàng hóa, cung cấp dịch vụ không phân biệt giá trị từng lần bán hàng hóa, cung cấp dịch vụ, trừ trường hợp quy định tại khoản 2 và khoản 4 Điều này."},{"k":"p","t":"2. Doanh nghiệp kinh doanh ở lĩnh vực điện lực, xăng dầu, bưu chính viễn thông, nước sạch, tài chính tín dụng, bảo hiểm, y tế, kinh doanh thương mại điện tử, kinh doanh siêu thị, thương mại, vận tải hàng không, đường bộ, đường sắt, đường biển, đường thủy và doanh nghiệp, tổ chức kinh tế đã hoặc sẽ thực hiện giao dịch với cơ quan thuế bằng phương tiện điện tử, xây dựng hạ tầng công nghệ thông tin, có hệ thống phần mềm kế toán, phần mềm lập hóa đơn điện tử đáp ứng lập, tra cứu hóa đơn điện tử, lưu trữ dữ liệu hóa đơn điện tử theo quy định và bảo đảm việc truyền dữ liệu hóa đơn điện tử đến người mua và đến cơ quan thuế thì được sử dụng hóa đơn điện tử không có mã của cơ quan thuế khi bán hàng hóa, cung cấp dịch vụ, không phân biệt giá trị từng lần bán hàng hóa, cung cấp dịch vụ, trừ trường hợp rủi ro về thuế cao theo quy định của Bộ trưởng Bộ Tài chính và trường hợp đăng ký sử dụng hóa đơn điện tử có mã của cơ quan thuế."},{"k":"p","t":"3. Hộ kinh doanh, cá nhân kinh doanh thuộc trường hợp quy định tại khoản 5 Điều 51 của Luật này và các trường hợp xác định được doanh thu khi bán hàng hóa, dịch vụ sử dụng hóa đơn điện tử có mã của cơ quan thuế khi bán hàng hóa, cung cấp dịch vụ."},{"k":"p","t":"4. Hộ kinh doanh, cá nhân kinh doanh không đáp ứng điều kiện phải sử dụng hóa đơn điện tử có mã của cơ quan thuế quy định tại khoản 1 và khoản 3 Điều này nhưng cần có hóa đơn để giao cho khách hàng hoặc trường hợp doanh nghiệp, tổ chức kinh tế, tổ chức khác được cơ quan thuế chấp nhận cấp hóa đơn điện tử để giao cho khách hàng thì được cơ quan thuế cấp hóa đơn điện tử có mã theo từng lần phát sinh và phải khai thuế, nộp thuế trước khi cơ quan thuế cấp hóa đơn điện tử theo từng lần phát sinh."}]},{"id":"luat-38_92","no":92,"code":"Điều 92","title":"Điều 92. Dịch vụ về hóa đơn điện tử","shortTitle":"Dịch vụ về hóa đơn điện tử","chuong":"Chương X — ÁP DỤNG HÓA ĐƠN, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Dịch vụ về hóa đơn điện tử bao gồm dịch vụ cung cấp giải pháp hóa đơn điện tử không có mã của cơ quan thuế, dịch vụ truyền dữ liệu hóa đơn điện tử không có mã của cơ quan thuế từ người nộp thuế tới cơ quan thuế và dịch vụ về hóa đơn điện tử có mã của cơ quan thuế."},{"k":"p","t":"2. Tổ chức cung cấp dịch vụ về hóa đơn điện tử bao gồm tổ chức cung cấp giải pháp hóa đơn điện tử, tổ chức cung cấp dịch vụ nhận, truyền, lưu trữ dữ liệu hóa đơn điện tử và các dịch vụ khác có liên quan đến hóa đơn điện tử."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này và quy định trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế không phải trả tiền dịch vụ, trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế phải trả tiền dịch vụ, trường hợp sử dụng hóa đơn điện tử không có mã của cơ quan thuế thông qua tổ chức cung cấp dịch vụ về hóa đơn điện tử."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định tiêu chí lựa chọn tổ chức cung cấp dịch vụ về hóa đơn điện tử để ký hợp đồng cung cấp dịch vụ hóa đơn điện tử có mã của cơ quan thuế và dịch vụ nhận, truyền, lưu trữ dữ liệu hóa đơn và các dịch vụ khác có liên quan."}]},{"id":"luat-38_93","no":93,"code":"Điều 93","title":"Điều 93. Cơ sở dữ liệu về hóa đơn điện tử","shortTitle":"Cơ sở dữ liệu về hóa đơn điện tử","chuong":"Chương X — ÁP DỤNG HÓA ĐƠN, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế có trách nhiệm tổ chức xây dựng, quản lý và phát triển cơ sở dữ liệu, hạ tầng kỹ thuật của hệ thống thông tin về hóa đơn; tổ chức thực hiện nhiệm vụ thu thập, xử lý thông tin, quản lý cơ sở dữ liệu hóa đơn và bảo đảm duy trì, vận hành, bảo mật, bảo đảm an ninh, an toàn hệ thống thông tin về hóa đơn; xây dựng định dạng chuẩn về hóa đơn."},{"k":"p","t":"Cơ sở dữ liệu về hóa đơn điện tử được sử dụng để phục vụ công tác quản lý thuế và cung cấp thông tin hóa đơn điện tử cho tổ chức, cá nhân có liên quan."},{"k":"p","t":"2. Các doanh nghiệp, tổ chức kinh tế quy định tại khoản 2 Điều 91 của Luật này sử dụng hóa đơn điện tử không có mã của cơ quan thuế thực hiện cung cấp dữ liệu hóa đơn điện tử theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Bộ Công Thương, Bộ Tài nguyên và Môi trường, Bộ Công an, Bộ Giao thông vận tải, Bộ Y tế và cơ quan khác có liên quan có trách nhiệm kết nối chia sẻ thông tin, dữ liệu liên quan cần thiết trong lĩnh vực quản lý với Bộ Tài chính để xây dựng cơ sở dữ liệu hóa đơn điện tử."},{"k":"p","t":"4. Khi kiểm tra hàng hóa lưu thông trên thị trường, đối với trường hợp sử dụng hóa đơn điện tử, cơ quan nhà nước, người có thẩm quyền truy cập cổng thông tin điện tử của cơ quan thuế để tra cứu thông tin về hóa đơn điện tử phục vụ yêu cầu quản lý, không yêu cầu cung cấp hóa đơn giấy. Các cơ quan có liên quan có trách nhiệm sử dụng các thiết bị để truy cập, tra cứu dữ liệu hóa đơn điện tử."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định về mẫu, quản lý sử dụng tem điện tử; quy định việc tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử; quy định cung cấp thông tin hóa đơn điện tử trong trường hợp không tra cứu được dữ liệu hóa đơn do sự cố, thiên tai gây ảnh hưởng đến việc truy cập mạng Internet."}]},{"id":"luat-38_94","no":94,"code":"Điều 94","title":"Điều 94. Chứng từ điện tử","shortTitle":"Chứng từ điện tử","chuong":"Chương X — ÁP DỤNG HÓA ĐƠN, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ điện tử bao gồm các loại chứng từ, biên lai được thể hiện ở dạng dữ liệu điện tử do cơ quan quản lý thuế hoặc tổ chức có trách nhiệm khấu trừ thuế cấp cho người nộp thuế bằng phương tiện điện tử khi thực hiện các thủ tục về thuế hoặc các khoản thu khác thuộc ngân sách nhà nước và các loại chứng từ, biên lai điện tử khác."},{"k":"p","t":"2. Chính phủ quy định chi tiết các loại chứng từ điện tử quy định tại Điều này và việc quản lý, sử dụng chứng từ điện tử."}]},{"id":"luat-38_95","no":95,"code":"Điều 95","title":"Điều 95. Hệ thống thông tin người nộp thuế","shortTitle":"Hệ thống thông tin người nộp thuế","chuong":"Chương XI — THÔNG TIN NGƯỜI NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hệ thống thông tin người nộp thuế là tập hợp thông tin, dữ liệu về người nộp thuế được thu thập, sắp xếp, lưu trữ, khai thác và sử dụng theo quy định của Luật này."},{"k":"p","t":"2. Thông tin người nộp thuế là cơ sở để thực hiện quản lý thuế, đánh giá dự báo tình hình, xây dựng chính sách về thuế, đánh giá mức độ chấp hành pháp luật của người nộp thuế, ngăn ngừa, phát hiện hành vi vi phạm pháp luật về thuế."}]},{"id":"luat-38_96","no":96,"code":"Điều 96","title":"Điều 96. Xây dựng, thu thập, xử lý và quản lý hệ thống thông tin người nộp thuế","shortTitle":"Xây dựng, thu thập, xử lý và quản lý hệ thống thông tin người nộp thuế","chuong":"Chương XI — THÔNG TIN NGƯỜI NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế có trách nhiệm tổ chức xây dựng, quản lý và phát triển cơ sở dữ liệu, hạ tầng kỹ thuật của hệ thống thông tin người nộp thuế, hệ thống thông tin quản lý thuế; tổ chức đơn vị chuyên trách thực hiện nhiệm vụ thu thập, xử lý, tổng hợp, phân tích thông tin và dự báo, quản lý cơ sở dữ liệu và bảo đảm duy trì, vận hành hệ thống thông tin người nộp thuế, hệ thống thông tin quản lý thuế."},{"k":"p","t":"2. Cơ quan quản lý thuế áp dụng các biện pháp nghiệp vụ cần thiết để thu thập, trao đổi, xử lý thông tin trong nước, ngoài nước, thông tin chính thức từ các cơ quan quản lý thuế, cơ quan có thẩm quyền ở nước ngoài theo điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên và thỏa thuận quốc tế có liên quan đến lĩnh vực thuế, lĩnh vực hải quan để sử dụng trong công tác quản lý thuế."},{"k":"p","t":"3. Cơ quan quản lý thuế phối hợp với cơ quan, tổ chức, cá nhân có liên quan để trao đổi thông tin, kết nối mạng trực tuyến."},{"k":"p","t":"4. Bộ
