<script id="LD" type="application/json">{"meta":{"title":"Luật 38/2019/QH14 — Luật Quản lý thuế","shortCode":"Luật 38/2019","subtitle":"Quản lý thuế (hiện hành)","slug":"luat-38","effectiveDate":"01/07/2020","scope":"Luật này quy định việc quản lý các loại thuế, các khoản thu khác thuộc ngân sách nhà nước.","description":"Quản lý thuế (hiện hành)","related":[]},"outline":[{"id":"luat-38_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định việc quản lý các loại thuế, các khoản thu khác thuộc ngân sách nhà nước."}]},{"id":"luat-38_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế bao gồm:"},{"k":"p","t":"a) Tổ chức, hộ gia đình, hộ kinh doanh, cá nhân nộp thuế theo quy định của pháp luật về thuế;"},{"k":"p","t":"b) Tổ chức, hộ gia đình, hộ kinh doanh, cá nhân nộp các khoản thu khác thuộc ngân sách nhà nước;"},{"k":"p","t":"c) Tổ chức, cá nhân khấu trừ thuế."},{"k":"p","t":"2. Cơ quan quản lý thuế bao gồm:"},{"k":"p","t":"a) Cơ quan thuế bao gồm Tổng cục Thuế, Cục Thuế, Chi cục Thuế, Chi cục Thuế khu vực;"},{"k":"p","t":"b) Cơ quan hải quan bao gồm Tổng cục Hải quan, Cục Hải quan, Cục Kiểm tra sau thông quan, Chi cục Hải quan."},{"k":"p","t":"3. Công chức quản lý thuế bao gồm công chức thuế, công chức hải quan."},{"k":"p","t":"4. Cơ quan nhà nước, tổ chức, cá nhân khác có liên quan."}]},{"id":"luat-38_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Thuế là một khoản nộp ngân sách nhà nước bắt buộc của tổ chức, hộ gia đình, hộ kinh doanh, cá nhân theo quy định của các luật thuế."},{"k":"p","t":"2. Các khoản thu khác thuộc ngân sách nhà nước do cơ quan quản lý thuế quản lý thu bao gồm:"},{"k":"p","t":"a) Phí và lệ phí theo quy định của Luật Phí và lệ phí;"},{"k":"p","t":"b) Tiền sử dụng đất nộp ngân sách nhà nước;"},{"k":"p","t":"c) Tiền thuê đất, thuê mặt nước;"},{"k":"p","t":"d) Tiền cấp quyền khai thác khoáng sản;"},{"k":"p","t":"đ) Tiền cấp quyền khai thác tài nguyên nước;"},{"k":"p","t":"e) Tiền nộp ngân sách nhà nước từ bán tài sản trên đất, chuyển nhượng quyền sử dụng đất theo quy định của Luật Quản lý, sử dụng tài sản công;"},{"k":"p","t":"g) Tiền thu từ xử phạt vi phạm hành chính theo quy định của pháp luật về xử phạt vi phạm hành chính trong lĩnh vực thuế và hải quan;"},{"k":"p","t":"h) Tiền chậm nộp và các khoản thu khác theo quy định của pháp luật."},{"k":"p","t":"3. Các khoản thu khác thuộc ngân sách nhà nước không do cơ quan quản lý thuế quản lý thu bao gồm:"},{"k":"p","t":"a) Tiền sử dụng khu vực biển để nhận chìm theo quy định của pháp luật về tài nguyên, môi trường biển và hải đảo;"},{"k":"p","t":"b) Tiền bảo vệ, phát triển đất trồng lúa theo quy định của pháp luật về đất đai;"},{"k":"p","t":"c) Tiền thu từ xử phạt vi phạm hành chính theo quy định của pháp luật về xử phạt vi phạm hành chính, trừ lĩnh vực thuế và hải quan;"},{"k":"p","t":"d) Tiền nộp ngân sách nhà nước theo quy định của pháp luật về quản lý, sử dụng tài sản công từ việc quản lý, sử dụng, khai thác tài sản công vào mục đích kinh doanh, cho thuê, liên doanh, liên kết, sau khi thực hiện nghĩa vụ thuế, phí, lệ phí;"},{"k":"p","t":"đ) Thu viện trợ;"},{"k":"p","t":"e) Các khoản thu khác theo quy định của pháp luật."},{"k":"p","t":"4. Trụ sở của người nộp thuế là địa điểm người nộp thuế tiến hành một phần hoặc toàn bộ hoạt động kinh doanh, bao gồm trụ sở chính, chi nhánh, cửa hàng, nơi sản xuất, nơi để hàng hóa, nơi để tài sản dùng cho sản xuất, kinh doanh; nơi cư trú hoặc nơi phát sinh nghĩa vụ thuế."},{"k":"p","t":"5. Mã số thuế là một dãy số gồm 10 chữ số hoặc 13 chữ số và ký tự khác do cơ quan thuế cấp cho người nộp thuế dùng để quản lý thuế."},{"k":"p","t":"6. Kỳ tính thuế là khoảng thời gian để xác định số tiền thuế phải nộp ngân sách nhà nước theo quy định của pháp luật về thuế."},{"k":"p","t":"7. Tờ khai thuế là văn bản theo mẫu do Bộ trưởng Bộ Tài chính quy định được người nộp thuế sử dụng để kê khai các thông tin nhằm xác định số tiền thuế phải nộp."},{"k":"p","t":"8. Tờ khai hải quan là văn bản theo mẫu do Bộ trưởng Bộ Tài chính quy định được sử dụng làm tờ khai thuế đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"9. Hồ sơ thuế là hồ sơ đăng ký thuế, khai thuế, hoàn thuế, miễn thuế, giảm thuế, miễn tiền chậm nộp, không tính tiền chậm nộp, gia hạn nộp thuế, nộp dần tiền thuế nợ, không thu thuế; hồ sơ hải quan; hồ sơ khoanh tiền thuế nợ; hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt."},{"k":"p","t":"10. Khai quyết toán thuế là việc xác định số tiền thuế phải nộp của năm tính thuế hoặc thời gian từ đầu năm tính thuế đến khi chấm dứt hoạt động phát sinh nghĩa vụ thuế hoặc thời gian từ khi phát sinh đến khi chấm dứt hoạt động phát sinh nghĩa vụ thuế theo quy định của pháp luật."},{"k":"p","t":"11. Năm tính thuế được xác định theo năm dương lịch từ ngày 01 tháng 01 đến ngày 31 tháng 12; trường hợp năm tài chính khác năm dương lịch thì năm tính thuế áp dụng theo năm tài chính."},{"k":"p","t":"12. Hoàn thành nghĩa vụ nộp thuế là việc nộp đủ số tiền thuế phải nộp, số tiền chậm nộp, tiền phạt vi phạm pháp luật về thuế và các khoản thu khác thuộc ngân sách nhà nước."},{"k":"p","t":"13. Cưỡng chế thi hành quyết định hành chính về quản lý thuế là việc áp dụng biện pháp theo quy định của Luật này và quy định khác của pháp luật có liên quan buộc người nộp thuế phải hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"14. Rủi ro về thuế là nguy cơ không tuân thủ pháp luật của người nộp thuế dẫn đến thất thu ngân sách nhà nước."},{"k":"p","t":"15. Quản lý rủi ro trong quản lý thuế là việc áp dụng có hệ thống quy định của pháp luật, các quy trình nghiệp vụ để xác định, đánh giá và phân loại các rủi ro có thể tác động tiêu cực đến hiệu quả, hiệu lực quản lý thuế làm cơ sở để cơ quan quản lý thuế phân bổ nguồn lực hợp lý và áp dụng các biện pháp quản lý hiệu quả."},{"k":"p","t":"16. Thoả thuận trước về phương pháp xác định giá tính thuế là thỏa thuận bằng văn bản giữa cơ quan thuế với người nộp thuế hoặc giữa cơ quan thuế với người nộp thuế và cơ quan thuế nước ngoài, vùng lãnh thổ mà Việt Nam đã ký hiệp định tránh đánh thuế hai lần và ngăn ngừa việc trốn lậu thuế đối với thuế thu nhập cho một thời hạn nhất định, trong đó xác định cụ thể các căn cứ tính thuế, phương pháp xác định giá tính thuế hoặc giá tính thuế theo giá thị trường. Thoả thuận trước về phương pháp xác định giá tính thuế được xác lập trước khi người nộp thuế nộp hồ sơ khai thuế."},{"k":"p","t":"17. Tiền thuế nợ là tiền thuế và các khoản thu khác thuộc ngân sách nhà nước do cơ quan quản lý thuế quản lý thu mà người nộp thuế chưa nộp ngân sách nhà nước khi hết thời hạn nộp theo quy định."},{"k":"p","t":"18. Cơ sở dữ liệu thương mại là hệ thống thông tin tài chính và dữ liệu của doanh nghiệp được tổ chức, sắp xếp và cập nhật do các tổ chức kinh doanh cung cấp cho cơ quan quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"19. Thông tin người nộp thuế là thông tin về người nộp thuế và thông tin liên quan đến nghĩa vụ thuế của người nộp thuế do người nộp thuế cung cấp, do cơ quan quản lý thuế thu thập được trong quá trình quản lý thuế."},{"k":"p","t":"20. Hệ thống thông tin quản lý thuế bao gồm hệ thống thông tin thống kê, kế toán thuế và các thông tin khác phục vụ công tác quản lý thuế."},{"k":"p","t":"21. Các bên có quan hệ liên kết là các bên tham gia trực tiếp hoặc gián tiếp vào việc điều hành, kiểm soát, góp vốn vào doanh nghiệp; các bên cùng chịu sự điều hành, kiểm soát trực tiếp hoặc gián tiếp bởi một tổ chức hoặc cá nhân; các bên cùng có một tổ chức hoặc cá nhân tham gia góp vốn; các doanh nghiệp được điều hành, kiểm soát bởi các cá nhân có mối quan hệ mật thiết trong cùng một gia đình."},{"k":"p","t":"22. Giao dịch liên kết là giao dịch giữa các bên có quan hệ liên kết."},{"k":"p","t":"23. Giao dịch độc lập là giao dịch giữa các bên không có quan hệ liên kết."},{"k":"p","t":"24. Nguyên tắc giao dịch độc lập là nguyên tắc được áp dụng trong kê khai, xác định giá tính thuế đối với người nộp thuế có phát sinh giao dịch liên kết nhằm phản ánh điều kiện giao dịch trong giao dịch liên kết tương đương với điều kiện trong giao dịch độc lập."},{"k":"p","t":"25. Nguyên tắc bản chất hoạt động, giao dịch quyết định nghĩa vụ thuế là nguyên tắc được áp dụng trong quản lý thuế nhằm phân tích các giao dịch, hoạt động sản xuất, kinh doanh của người nộp thuế để xác định nghĩa vụ thuế tương ứng với giá trị tạo ra từ bản chất giao dịch, hoạt động sản xuất, kinh doanh đó."},{"k":"p","t":"26. Công ty mẹ tối cao của tập đoàn là pháp nhân có vốn chủ sở hữu trực tiếp hoặc gián tiếp tại các pháp nhân khác của một tập đoàn đa quốc gia, không bị sở hữu bởi bất kỳ pháp nhân nào khác và báo cáo tài chính hợp nhất của công ty mẹ tối cao của tập đoàn không được hợp nhất vào bất kỳ báo cáo tài chính của một pháp nhân nào khác trên toàn cầu."},{"k":"p","t":"27. Trường hợp bất khả kháng bao gồm:"},{"k":"p","t":"a) Người nộp thuế bị thiệt hại vật chất do gặp thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ;"},{"k":"p","t":"b) Các trường hợp bất khả kháng khác theo quy định của Chính phủ."}]},{"id":"luat-38_4","no":4,"code":"Điều 4","title":"Điều 4. Nội dung quản lý thuế","shortTitle":"Nội dung quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đăng ký thuế, khai thuế, nộp thuế, ấn định thuế."},{"k":"p","t":"2. Hoàn thuế, miễn thuế, giảm thuế, không thu thuế."},{"k":"p","t":"3. Khoanh tiền thuế nợ; xóa nợ tiền thuế, tiền chậm nộp, tiền phạt; miễn tiền chậm nộp, tiền phạt; không tính tiền chậm nộp; gia hạn nộp thuế; nộp dần tiền thuế nợ."},{"k":"p","t":"4. Quản lý thông tin người nộp thuế."},{"k":"p","t":"5. Quản lý hóa đơn, chứng từ."},{"k":"p","t":"6. Kiểm tra thuế, thanh tra thuế và thực hiện biện pháp phòng, chống, ngăn chặn vi phạm pháp luật về thuế."},{"k":"p","t":"7. Cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"8. Xử phạt vi phạm hành chính về quản lý thuế."},{"k":"p","t":"9. Giải quyết khiếu nại, tố cáo về thuế."},{"k":"p","t":"10. Hợp tác quốc tế về thuế."},{"k":"p","t":"11. Tuyên truyền, hỗ trợ người nộp thuế."}]},{"id":"luat-38_5","no":5,"code":"Điều 5","title":"Điều 5. Nguyên tắc quản lý thuế","shortTitle":"Nguyên tắc quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Mọi tổ chức, hộ gia đình, hộ kinh doanh, cá nhân có nghĩa vụ nộp thuế theo quy định của luật."},{"k":"p","t":"2. Cơ quan quản lý thuế, các cơ quan khác của Nhà nước được giao nhiệm vụ quản lý thu thực hiện việc quản lý thuế theo quy định của Luật này và quy định khác của pháp luật có liên quan, bảo đảm công khai, minh bạch, bình đẳng và bảo đảm quyền, lợi ích hợp pháp của người nộp thuế."},{"k":"p","t":"3. Cơ quan, tổ chức, cá nhân có trách nhiệm tham gia quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"4. Thực hiện cải cách thủ tục hành chính và ứng dụng công nghệ thông tin hiện đại trong quản lý thuế; áp dụng các nguyên tắc quản lý thuế theo thông lệ quốc tế, trong đó có nguyên tắc bản chất hoạt động, giao dịch quyết định nghĩa vụ thuế, nguyên tắc quản lý rủi ro trong quản lý thuế và các nguyên tắc khác phù hợp với điều kiện của Việt Nam."},{"k":"p","t":"5. Áp dụng biện pháp ưu tiên khi thực hiện các thủ tục về thuế đối với hàng hóa xuất khẩu, nhập khẩu theo quy định của pháp luật về hải quan và quy định của Chính phủ."}]},{"id":"luat-38_6","no":6,"code":"Điều 6","title":"Điều 6. Các hành vi bị nghiêm cấm trong quản lý thuế","shortTitle":"Các hành vi bị nghiêm cấm trong quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông đồng, móc nối, bao che giữa người nộp thuế và công chức quản lý thuế, cơ quan quản lý thuế để chuyển giá, trốn thuế."},{"k":"p","t":"2. Gây phiền hà, sách nhiễu đối với người nộp thuế."},{"k":"p","t":"3. Lợi dụng để chiếm đoạt hoặc sử dụng trái phép tiền thuế."},{"k":"p","t":"4. Cố tình không kê khai hoặc kê khai thuế không đầy đủ, kịp thời, chính xác về số tiền thuế phải nộp."},{"k":"p","t":"5. Cản trở công chức quản lý thuế thi hành công vụ."},{"k":"p","t":"6. Sử dụng mã số thuế của người nộp thuế khác để thực hiện hành vi vi phạm pháp luật hoặc cho người khác sử dụng mã số thuế của mình không đúng quy định của pháp luật."},{"k":"p","t":"7. Bán hàng hóa, cung cấp dịch vụ không xuất hóa đơn theo quy định của pháp luật, sử dụng hóa đơn không hợp pháp và sử dụng không hợp pháp hóa đơn."},{"k":"p","t":"8. Làm sai lệch, sử dụng sai mục đích, truy cập trái phép, phá hủy hệ thống thông tin người nộp thuế."}]},{"id":"luat-38_7","no":7,"code":"Điều 7","title":"Điều 7. Đồng tiền khai thuế, nộp thuế","shortTitle":"Đồng tiền khai thuế, nộp thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đồng tiền khai thuế, nộp thuế là Đồng Việt Nam, trừ các trường hợp được phép khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi."},{"k":"p","t":"2. Người nộp thuế hạch toán kế toán bằng ngoại tệ theo quy định của Luật Kế toán phải quy đổi ra Đồng Việt Nam theo tỷ giá giao dịch thực tế tại thời điểm phát sinh giao dịch."},{"k":"p","t":"3. Đối với hàng hóa xuất khẩu, nhập khẩu, đồng tiền nộp thuế là Đồng Việt Nam, trừ các trường hợp được phép khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi. Tỷ giá tính thuế thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định đồng tiền khai thuế, nộp thuế bằng ngoại tệ tự do chuyển đổi quy định tại khoản 1, khoản 3 và tỷ giá giao dịch thực tế quy định tại khoản 2 Điều này."}]},{"id":"luat-38_8","no":8,"code":"Điều 8","title":"Điều 8. Giao dịch điện tử trong lĩnh vực thuế","shortTitle":"Giao dịch điện tử trong lĩnh vực thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế, cơ quan quản lý thuế, cơ quan quản lý nhà nước, tổ chức, cá nhân có đủ điều kiện thực hiện giao dịch điện tử trong lĩnh vực thuế phải thực hiện giao dịch điện tử với cơ quan quản lý thuế theo quy định của Luật này và pháp luật về giao dịch điện tử."},{"k":"p","t":"2. Người nộp thuế đã thực hiện giao dịch điện tử trong lĩnh vực thuế thì không phải thực hiện phương thức giao dịch khác."},{"k":"p","t":"3. Cơ quan quản lý thuế khi tiếp nhận, trả kết quả giải quyết thủ tục hành chính thuế cho người nộp thuế bằng phương thức điện tử phải xác nhận việc hoàn thành giao dịch điện tử của người nộp thuế, bảo đảm quyền của người nộp thuế quy định tại Điều 16 của Luật này."},{"k":"p","t":"4. Người nộp thuế phải thực hiện yêu cầu của cơ quan quản lý thuế nêu tại thông báo, quyết định, văn bản điện tử như đối với thông báo, quyết định, văn bản bằng giấy của cơ quan quản lý thuế."},{"k":"p","t":"5. Chứng từ điện tử sử dụng trong giao dịch điện tử phải được ký điện tử phù hợp với quy định của pháp luật về giao dịch điện tử."},{"k":"p","t":"6. Cơ quan, tổ chức đã kết nối thông tin điện tử với cơ quan quản lý thuế thì phải sử dụng chứng từ điện tử trong quá trình thực hiện giao dịch với cơ quan quản lý thuế; sử dụng chứng từ điện tử do cơ quan quản lý thuế cung cấp để giải quyết các thủ tục hành chính cho người nộp thuế và không được yêu cầu người nộp thuế nộp chứng từ giấy."},{"k":"p","t":"7. Cơ quan quản lý thuế tổ chức hệ thống thông tin điện tử có trách nhiệm sau đây:"},{"k":"p","t":"a) Hướng dẫn, hỗ trợ để người nộp thuế, tổ chức cung cấp dịch vụ về giao dịch điện tử trong lĩnh vực thuế, ngân hàng và các tổ chức liên quan thực hiện giao dịch điện tử trong lĩnh vực thuế;"},{"k":"p","t":"b) Xây dựng, quản lý, vận hành hệ thống tiếp nhận và xử lý dữ liệu thuế điện tử bảo đảm an ninh, an toàn, bảo mật và liên tục;"},{"k":"p","t":"c) Xây dựng hệ thống kết nối thông tin, cung cấp thông tin về số tiền thuế đã nộp ngân sách nhà nước, thông tin về tình hình thực hiện nghĩa vụ thuế của người nộp thuế cho các cơ quan, tổ chức, cá nhân có liên quan bằng điện tử để thực hiện các thủ tục hành chính cho người nộp thuế theo quy định;"},{"k":"p","t":"d) Cập nhật, quản lý, cung cấp các thông tin đăng ký sử dụng giao dịch thuế điện tử của người nộp thuế; xác thực giao dịch điện tử của người nộp thuế cho các cơ quan, tổ chức phối hợp thu ngân sách nhà nước để thực hiện quản lý thuế và quản lý thu ngân sách nhà nước;"},{"k":"p","t":"đ) Tiếp nhận, trả kết quả giải quyết thủ tục hành chính thuế cho người nộp thuế bằng phương thức điện tử;"},{"k":"p","t":"e) Trường hợp chứng từ điện tử của người nộp thuế đã được lưu trong cơ sở dữ liệu của cơ quan quản lý thuế thì cơ quan quản lý thuế, công chức quản lý thuế phải thực hiện khai thác, sử dụng dữ liệu trên hệ thống, không được yêu cầu người nộp thuế cung cấp hồ sơ thuế, chứng từ nộp thuế bằng giấy."},{"k":"p","t":"8. Bộ trưởng Bộ Tài chính quy định hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế."}]},{"id":"luat-38_9","no":9,"code":"Điều 9","title":"Điều 9. Quản lý rủi ro trong quản lý thuế","shortTitle":"Quản lý rủi ro trong quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế áp dụng quản lý rủi ro trong đăng ký thuế, khai thuế, nộp thuế, nợ thuế, cưỡng chế thi hành quyết định hành chính về quản lý thuế, hoàn thuế, kiểm tra thuế, thanh tra thuế, quản l‎ý và sử dụng hóa đơn, chứng từ và các nghiệp vụ khác trong quản lý thuế."},{"k":"p","t":"2. Cơ quan hải quan áp dụng quản lý rủi ro trong khai thuế, hoàn thuế, không thu thuế, kiểm tra thuế, thanh tra thuế và các nghiệp vụ khác trong quản lý thuế."},{"k":"p","t":"3. Áp dụng cơ chế quản lý rủi ro trong quản lý thuế gồm nghiệp vụ thu thập, xử lý thông tin, dữ liệu liên quan đến người nộp thuế; xây dựng tiêu chí quản lý thuế; đánh giá việc tuân thủ pháp luật của người nộp thuế; phân loại mức độ rủi ro trong quản lý thuế và tổ chức thực hiện các biện pháp quản lý thuế phù hợp."},{"k":"p","t":"4. Đánh giá việc tuân thủ pháp luật của người nộp thuế và phân loại mức độ rủi ro trong quản lý thuế được quy định như sau:"},{"k":"p","t":"a) Đánh giá mức độ tuân thủ pháp luật của người nộp thuế được thực hiện dựa trên hệ thống các tiêu chí, thông tin về lịch sử quá trình hoạt động của người nộp thuế, quá trình tuân thủ pháp luật và mối quan hệ hợp tác với cơ quan quản lý thuế trong việc thực hiện pháp luật về thuế và mức độ vi phạm pháp luật về thuế;"},{"k":"p","t":"b) Phân loại mức độ rủi ro trong quản lý thuế được thực hiện dựa trên mức độ tuân thủ pháp luật của người nộp thuế. Trong quá trình phân loại mức độ rủi ro, cơ quan quản lý thuế xem xét các nội dung có liên quan, gồm thông tin về dấu hiệu rủi ro; dấu hiệu, hành vi vi phạm trong quản lý thuế; thông tin về kết quả hoạt động nghiệp vụ của cơ quan quản lý thuế, cơ quan khác có liên quan theo quy định của Luật này;"},{"k":"p","t":"c) Cơ quan quản lý thuế sử dụng kết quả đánh giá việc tuân thủ pháp luật của người nộp thuế và kết quả phân loại mức độ rủi ro trong quản lý thuế để áp dụng các biện pháp quản lý thuế phù hợp."},{"k":"p","t":"5. Cơ quan quản lý thuế ứng dụng hệ thống công nghệ thông tin để tự động tích hợp, xử lý dữ liệu phục vụ việc áp dụng quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"6. Bộ trưởng Bộ Tài chính quy định tiêu chí đánh giá việc tuân thủ pháp luật của người nộp thuế, phân loại mức độ rủi ro và việc áp dụng quản lý rủi ro trong quản lý thuế."}]},{"id":"luat-38_10","no":10,"code":"Điều 10","title":"Điều 10. Xây dựng lực lượng quản lý thuế","shortTitle":"Xây dựng lực lượng quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Lực lượng quản lý thuế được xây dựng trong sạch, vững mạnh; được trang bị và làm chủ kỹ thuật hiện đại, hoạt động hiệu lực và hiệu quả."},{"k":"p","t":"2. Công chức quản lý thuế là người có đủ điều kiện được tuyển dụng, bổ nhiệm vào ngạch, chức vụ, chức danh trong cơ quan quản lý thuế; được đào tạo, bồi dưỡng và quản lý, sử dụng theo quy định của pháp luật về cán bộ, công chức."},{"k":"p","t":"3. Chế độ phục vụ, chức danh, tiêu chuẩn, lương, chế độ đãi ngộ khác, cấp hiệu, trang phục của công chức quản lý thuế được thực hiện theo quy định của pháp luật."},{"k":"p","t":"4. Cơ quan quản lý thuế có trách nhiệm đào tạo, xây dựng đội ngũ công chức quản lý thuế để thực hiện chức năng quản lý thuế theo quy định của pháp luật."}]},{"id":"luat-38_11","no":11,"code":"Điều 11","title":"Điều 11. Hiện đại hóa công tác quản lý thuế","shortTitle":"Hiện đại hóa công tác quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Công tác quản lý thuế được hiện đại hóa về phương pháp quản lý, thủ tục hành chính, bộ máy tổ chức, đội ngũ công chức, viên chức, áp dụng rộng rãi công nghệ thông tin, kỹ thuật hiện đại trên cơ sở dữ liệu thông tin chính xác về người nộp thuế để kiểm soát được tất cả đối tượng chịu thuế, căn cứ tính thuế; bảo đảm dự báo nhanh, chính xác số thu của ngân sách nhà nước; phát hiện và xử lý kịp thời các vướng mắc, vi phạm pháp luật về thuế; nâng cao hiệu lực, hiệu quả công tác quản lý thuế. Căn cứ vào tình hình phát triển kinh tế - xã hội trong từng thời kỳ, Nhà nước bảo đảm các nguồn lực tài chính để thực hiện nội dung quy định tại khoản này."},{"k":"p","t":"2. Nhà nước tạo điều kiện cho các tổ chức, cá nhân tham gia phát triển công nghệ và phương tiện kỹ thuật tiên tiến để áp dụng phương pháp quản lý thuế hiện đại, thực hiện giao dịch điện tử và quản lý thuế điện tử; đẩy mạnh phát triển các dịch vụ thanh toán thông qua hệ thống ngân hàng thương mại, tổ chức tín dụng khác để từng bước hạn chế các giao dịch thanh toán bằng tiền mặt của người nộp thuế."},{"k":"p","t":"3. Cơ quan quản lý thuế xây dựng hệ thống công nghệ thông tin đáp ứng yêu cầu hiện đại hóa công tác quản lý thuế, tiêu chuẩn kỹ thuật, định dạng dữ liệu về hóa đơn, chứng từ điện tử, hồ sơ thuế để thực hiện giao dịch điện tử giữa người nộp thuế với cơ quan quản lý thuế và giữa cơ quan quản lý thuế với cơ quan, tổ chức, cá nhân có liên quan."}]},{"id":"luat-38_12","no":12,"code":"Điều 12","title":"Điều 12. Hợp tác quốc tế về thuế của cơ quan quản lý thuế","shortTitle":"Hợp tác quốc tế về thuế của cơ quan quản lý thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong phạm vi nhiệm vụ, quyền hạn của mình, cơ quan quản lý thuế có trách nhiệm sau đây:"},{"k":"p","t":"1. Tham mưu giúp Bộ trưởng Bộ Tài chính đề xuất đàm phán, ký kết và thực hiện quyền, nghĩa vụ và bảo đảm lợi ích của nước Cộng hòa xã hội chủ nghĩa Việt Nam theo các điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên;"},{"k":"p","t":"2. Đàm phán, ký kết và tổ chức thực hiện thỏa thuận song phương, đa phương với cơ quan quản lý thuế nước ngoài;"},{"k":"p","t":"3. Tổ chức khai thác, trao đổi thông tin và hợp tác nghiệp vụ với cơ quan quản lý thuế nước ngoài, các tổ chức quốc tế có liên quan. Trao đổi thông tin về người nộp thuế, thông tin về các bên liên kết với cơ quan thuế nước ngoài phục vụ công tác quản lý thuế đối với giao dịch liên kết;"},{"k":"p","t":"4. Thực hiện các biện pháp hỗ trợ thu thuế theo các điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên bao gồm:"},{"k":"p","t":"a) Đề nghị cơ quan quản lý thuế nước ngoài và các cơ quan có thẩm quyền thực hiện hỗ trợ thu thuế tại nước ngoài đối với các khoản nợ thuế tại Việt Nam mà người nộp thuế có nghĩa vụ phải nộp khi người nộp thuế không còn ở Việt Nam;"},{"k":"p","t":"b) Thực hiện hỗ trợ thu thuế theo đề nghị của cơ quan quản lý thuế nước ngoài đối với các khoản nợ thuế phải nộp tại nước ngoài của người nộp thuế tại Việt Nam bằng biện pháp đôn đốc thu nợ thuế theo quy định của Luật này và phù hợp với thực tiễn quản lý thuế của Việt Nam."}]},{"id":"luat-38_13","no":13,"code":"Điều 13","title":"Điều 13. Kế toán, thống kê về thuế","shortTitle":"Kế toán, thống kê về thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế thực hiện hạch toán kế toán tiền thuế, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước do cơ quan quản lý thuế phải thu, đã thu, miễn, giảm, xóa nợ, không thu thuế, hoàn trả theo quy định của pháp luật về kế toán và pháp luật về ngân sách nhà nước."},{"k":"p","t":"2. Cơ quan quản lý thuế thực hiện thống kê số tiền thuế được ưu đãi, miễn, giảm và các thông tin thống kê khác về thuế, người nộp thuế theo quy định của pháp luật về thống kê và pháp luật về thuế."},{"k":"p","t":"3. Hằng năm, cơ quan quản lý thuế nộp báo cáo kế toán, thống kê về thuế cho cơ quan có thẩm quyền và thực hiện công khai thông tin theo quy định của pháp luật."},{"k":"p","t":"TỔ CHỨC, CÁ NHÂN TRONG QUẢN LÝ THUẾ"}]},{"id":"luat-38_14","no":14,"code":"Điều 14","title":"Điều 14. Nhiệm vụ, quyền hạn của Chính phủ","shortTitle":"Nhiệm vụ, quyền hạn của Chính phủ","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Thống nhất quản lý nhà nước về quản lý thuế, bảo đảm sự phối hợp chặt chẽ giữa cơ quan quản lý ngành và địa phương trong quản lý thuế."},{"k":"p","t":"2. Gia hạn nộp thuế cho các đối tượng, ngành, nghề sản xuất, kinh doanh trong trường hợp khó khăn đặc biệt trong từng thời kỳ nhất định."},{"k":"p","t":"3. Báo cáo Quốc hội, Ủy ban Thường vụ Quốc hội, Chủ tịch nước về tình hình quản lý thuế theo yêu cầu."}]},{"id":"luat-38_15","no":15,"code":"Điều 15","title":"Điều 15. Nhiệm vụ, quyền hạn, trách nhiệm của Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ","shortTitle":"Nhiệm vụ, quyền hạn, trách nhiệm của Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính là cơ quan chủ trì giúp Chính phủ thống nhất quản lý nhà nước về quản lý thuế và có nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Ban hành theo thẩm quyền hoặc trình cấp có thẩm quyền ban hành văn bản quy phạm pháp luật về quản lý thuế;"},{"k":"p","t":"b) Tổ chức việc thực hiện quản lý thuế theo quy định của Luật này và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"c) Tổ chức việc lập và thực hiện dự toán thu ngân sách nhà nước;"},{"k":"p","t":"d) Tổ chức kiểm tra, thanh tra việc thực hiện pháp luật về thuế và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"đ) Xử lý vi phạm pháp luật và giải quyết khiếu nại, tố cáo liên quan đến việc thực hiện pháp luật về thuế theo thẩm quyền;"},{"k":"p","t":"e) Tổ chức thực hiện hợp tác quốc tế về thuế;"},{"k":"p","t":"g) Phối hợp với Bộ Kế hoạch và Đầu tư và Bộ khác có liên quan hướng dẫn việc thực hiện giám định độc lập về giá trị của máy móc, thiết bị, dây chuyền công nghệ theo quy định của Luật Đầu tư."},{"k":"p","t":"2. Bộ Công an có trách nhiệm sau đây:"},{"k":"p","t":"a) Kết nối, tiếp nhận thông tin với cơ quan quản lý thuế về việc hoàn thành nghĩa vụ nộp thuế đối với phương tiện giao thông cơ giới đường bộ khi đăng ký quyền sở hữu, quyền sử dụng theo quy định của pháp luật;"},{"k":"p","t":"b) Tổ chức tiếp nhận, xử lý, giải quyết tin báo, tố giác tội phạm và kiến nghị khởi tố, tiếp nhận các hồ sơ do cơ quan quản lý thuế phát hiện hành vi vi phạm có dấu hiệu tội phạm trong lĩnh vực thuế chuyển đến, tiến hành điều tra, xử lý tội phạm trong lĩnh vực thuế theo quy định của pháp luật; trường hợp không khởi tố vụ án hình sự hoặc đình chỉ điều tra vụ án thì thông báo bằng văn bản cho cơ quan quản lý thuế biết rõ lý do và chuyển hồ sơ cho cơ quan quản lý thuế giải quyết theo thẩm quyền."},{"k":"p","t":"3. Bộ Công Thương có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn các cơ quan chức năng trong việc kết nối, cung cấp thông tin liên quan để phối hợp với Bộ Tài chính trong quản lý thuế đối với các tổ chức, cá nhân hoạt động thương mại điện tử, nhượng quyền thương mại và các hoạt động liên quan;"},{"k":"p","t":"b) Chỉ đạo, hướng dẫn các cơ quan chức năng phối hợp với cơ quan quản lý thuế thực hiện quy định của pháp luật về kinh doanh hàng hóa, dịch vụ thương mại trên thị trường và lĩnh vực khác theo quy định của pháp luật."},{"k":"p","t":"4. Bộ Thông tin và Truyền thông có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn các cơ quan chức năng phối hợp với cơ quan quản lý thuế để quản lý thuế đối với hoạt động cung cấp, sử dụng dịch vụ Internet, thông tin trên mạng, trò chơi điện tử trên mạng;"},{"k":"p","t":"b) Chỉ đạo, hướng dẫn các cơ quan chức năng trong việc kết nối, cung cấp thông tin liên quan với cơ quan quản lý thuế đối với tổ chức, cá nhân trực tiếp tham gia hoặc có liên quan đến việc quản lý, cung cấp, sử dụng dịch vụ Internet, thông tin trên mạng, trò chơi điện tử trên mạng."},{"k":"p","t":"5. Ngân hàng Nhà nước Việt Nam có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn các tổ chức tín dụng trong việc kết nối, cung cấp thông tin với cơ quan quản lý thuế liên quan đến giao dịch qua ngân hàng của tổ chức, cá nhân và phối hợp với cơ quan quản lý thuế thực hiện biện pháp cưỡng chế theo quy định của Luật này;"},{"k":"p","t":"b) Xây dựng và phát triển hệ thống thanh toán thương mại điện tử quốc gia, các tiện ích tích hợp thanh toán điện tử để sử dụng rộng rãi cho các mô hình thương mại điện tử;"},{"k":"p","t":"c) Thiết lập cơ chế quản lý, giám sát các giao dịch thanh toán hỗ trợ công tác quản lý thuế đối với hoạt động cung cấp dịch vụ xuyên biên giới trong thương mại điện tử."},{"k":"p","t":"6. Bộ Kế hoạch và Đầu tư có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn các cơ quan chức năng phối hợp với cơ quan quản lý thuế trong việc cấp, thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký đầu tư, giấy chứng nhận đăng ký thuế và các giấy chứng nhận đăng ký khác của người nộp thuế theo cơ chế một cửa liên thông;"},{"k":"p","t":"b) Chỉ đạo, hướng dẫn các cơ quan chức năng tăng cường công tác thẩm định dự án đầu tư nhằm ngăn chặn tình trạng chuyển giá, tránh thuế;"},{"k":"p","t":"c) Chỉ đạo, hướng dẫn các cơ quan chức năng tăng cường công tác thanh tra, kiểm tra, giám định chất lượng, giá trị máy móc, thiết bị, công nghệ được sử dụng trong quá trình hoạt động của dự án đầu tư;"},{"k":"p","t":"d) Chỉ đạo, hướng dẫn các cơ quan chức năng phối hợp với cơ quan quản lý thuế trong việc thực hiện quy định của pháp luật về ưu đãi đầu tư phù hợp với quy định của pháp luật về thuế."},{"k":"p","t":"7. Bộ Tài nguyên và Môi trường có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn các cơ quan chức năng phối hợp với cơ quan quản lý thuế trong việc quản lý các khoản thu liên quan đến đất đai, tài sản gắn liền với đất và tài nguyên khoáng sản;"},{"k":"p","t":"b) Cung cấp thông tin người nộp thuế do cơ quan tài nguyên, môi trường quản lý có liên quan đến công tác quản lý thuế theo yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"8. Bộ Giao thông vận tải có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, hướng dẫn các cơ quan chức năng trong việc kết nối, cung cấp thông tin liên quan đến quản lý thuế đối với doanh nghiệp, cá nhân hoạt động trong lĩnh vực vận tải hàng hóa, hành khách;"},{"k":"p","t":"b) Kết nối, cung cấp thông tin về tiêu chí kỹ thuật liên quan đến quản lý thu đối với tài sản là phương tiện phải đăng ký quyền sở hữu, quyền sử dụng."},{"k":"p","t":"9. Bộ Lao động - Thương binh và Xã hội có trách nhiệm chỉ đạo, hướng dẫn các cơ quan chức năng trong việc kết nối, cung cấp thông tin với cơ quan quản lý thuế liên quan đến việc cấp phép cho người lao động nước ngoài làm việc ở Việt Nam và người lao động Việt Nam đi làm việc ở nước ngoài."},{"k":"p","t":"10. Bộ Y tế có trách nhiệm chỉ đạo, hướng dẫn các cơ quan chức năng phối hợp với cơ quan quản lý thuế trong việc kết nối, cung cấp thông tin của các cơ sở kinh doanh dược, cơ sở khám bệnh, chữa bệnh."},{"k":"p","t":"11. Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ có trách nhiệm phối hợp với Bộ Tài chính thực hiện nhiệm vụ quản lý nhà nước về quản lý thuế theo quy định của Chính phủ."}]},{"id":"luat-38_16","no":16,"code":"Điều 16","title":"Điều 16. Quyền của người nộp thuế","shortTitle":"Quyền của người nộp thuế","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Được hỗ trợ, hướng dẫn thực hiện việc nộp thuế; cung cấp thông tin, tài liệu để thực hiện nghĩa vụ, quyền lợi về thuế."},{"k":"p","t":"2. Được nhận văn bản liên quan đến nghĩa vụ thuế của các cơ quan chức năng khi tiến hành thanh tra, kiểm tra, kiểm toán."},{"k":"p","t":"3. Yêu cầu cơ quan quản lý thuế giải thích về việc tính thuế, ấn định thuế; yêu cầu giám định số lượng, chất lượng, chủng loại hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"4. Được giữ bí mật thông tin, trừ các thông tin phải cung cấp cho cơ quan nhà nước có thẩm quyền hoặc thông tin công khai về thuế theo quy định của pháp luật."},{"k":"p","t":"5. Hưởng các ưu đãi về thuế, hoàn thuế theo quy định của pháp luật về thuế; được biết thời hạn giải quyết hoàn thuế, số tiền thuế không được hoàn và căn cứ pháp lý đối với số tiền thuế không được hoàn."},{"k":"p","t":"6. Ký hợp đồng với tổ chức kinh doanh dịch vụ làm thủ tục về thuế, đại lý làm thủ tục hải quan để thực hiện dịch vụ đại lý thuế, đại lý làm thủ tục hải quan."},{"k":"p","t":"7. Được nhận quyết định xử lý về thuế, biên bản kiểm tra thuế, thanh tra thuế, được yêu cầu giải thích nội dung quyết định xử lý về thuế; được bảo lưu ý kiến trong biên bản kiểm tra thuế, thanh tra thuế; được nhận văn bản kết luận kiểm tra thuế, thanh tra thuế, quyết định xử lý về thuế sau thanh tra, kiểm tra của cơ quan quản lý thuế."},{"k":"p","t":"8. Được bồi thường thiệt hại do cơ quan quản lý thuế, công chức quản lý thuế gây ra theo quy định của pháp luật."},{"k":"p","t":"9. Yêu cầu cơ quan quản lý thuế xác nhận việc thực hiện nghĩa vụ nộp thuế của mình."},{"k":"p","t":"10. Khiếu nại, khởi kiện quyết định hành chính, hành vi hành chính liên quan đến quyền và lợi ích hợp pháp của mình."},{"k":"p","t":"11. Không bị xử phạt vi phạm hành chính về thuế, không tính tiền chậm nộp đối với trường hợp do người nộp thuế thực hiện theo văn bản hướng dẫn và quyết định xử lý của cơ quan thuế, cơ quan nhà nước có thẩm quyền liên quan đến nội dung xác định nghĩa vụ thuế của người nộp thuế."},{"k":"p","t":"12. Tố cáo hành vi vi phạm pháp luật của công chức quản lý thuế và tổ chức, cá nhân khác theo quy định của pháp luật về tố cáo."},{"k":"p","t":"13. Được tra cứu, xem, in toàn bộ chứng từ điện tử mà mình đã gửi đến cổng thông tin điện tử của cơ quan quản lý thuế theo quy định của Luật này và pháp luật về giao dịch điện tử."},{"k":"p","t":"14. Được sử dụng chứng từ điện tử trong giao dịch với cơ quan quản lý thuế và cơ quan, tổ chức có liên quan."}]},{"id":"luat-38_17","no":17,"code":"Điều 17","title":"Điều 17. Trách nhiệm của người nộp thuế","shortTitle":"Trách nhiệm của người nộp thuế","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Thực hiện đăng ký thuế, sử dụng mã số thuế theo quy định của pháp luật."},{"k":"p","t":"2. Khai thuế chính xác, trung thực, đầy đủ và nộp hồ sơ thuế đúng thời hạn; chịu trách nhiệm trước pháp luật về tính chính xác, trung thực, đầy đủ của hồ sơ thuế."},{"k":"p","t":"3. Nộp tiền thuế, tiền chậm nộp, tiền phạt đầy đủ, đúng thời hạn, đúng địa điểm."},{"k":"p","t":"4. Chấp hành chế độ kế toán, thống kê và quản lý, sử dụng hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"5. Ghi chép chính xác, trung thực, đầy đủ những hoạt động phát sinh nghĩa vụ thuế, khấu trừ thuế và giao dịch phải kê khai thông tin về thuế."},{"k":"p","t":"6. Lập và giao hóa đơn, chứng từ cho người mua theo đúng số lượng, chủng loại, giá trị thực thanh toán khi bán hàng hóa, cung cấp dịch vụ theo quy định của pháp luật."},{"k":"p","t":"7. Cung cấp chính xác, đầy đủ, kịp thời thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế, bao gồm cả thông tin về giá trị đầu tư; số hiệu và nội dung giao dịch của tài khoản được mở tại ngân hàng thương mại, tổ chức tín dụng khác; giải thích việc tính thuế, khai thuế, nộp thuế theo yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"8. Chấp hành quyết định, thông báo, yêu cầu của cơ quan quản lý thuế, công chức quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"9. Chịu trách nhiệm thực hiện nghĩa vụ thuế theo quy định của pháp luật trong trường hợp người đại diện theo pháp luật hoặc đại diện theo ủy quyền thay mặt người nộp thuế thực hiện thủ tục về thuế sai quy định."},{"k":"p","t":"10. Người nộp thuế thực hiện hoạt động kinh doanh tại địa bàn có cơ sở hạ tầng về công nghệ thông tin phải thực hiện kê khai, nộp thuế, giao dịch với cơ quan quản lý thuế thông qua phương tiện điện tử theo quy định của pháp luật."},{"k":"p","t":"11. Căn cứ tình hình thực tế và điều kiện trang bị công nghệ thông tin, Chính phủ quy định chi tiết việc người nộp thuế không phải nộp các chứng từ trong hồ sơ khai, nộp thuế, hồ sơ hoàn thuế và các hồ sơ thuế khác mà cơ quan quản lý nhà nước đã có."},{"k":"p","t":"12. Xây dựng, quản lý, vận hành hệ thống hạ tầng kỹ thuật bảo đảm việc thực hiện giao dịch điện tử với cơ quan quản lý thuế, áp dụng kết nối thông tin liên quan đến việc thực hiện nghĩa vụ thuế với cơ quan quản lý thuế."},{"k":"p","t":"13. Người nộp thuế có phát sinh giao dịch liên kết có nghĩa vụ lập, lưu trữ, kê khai, cung cấp hồ sơ thông tin về người nộp thuế và các bên liên kết của người nộp thuế bao gồm cả thông tin về các bên liên kết cư trú tại các quốc gia, vùng lãnh thổ ngoài Việt Nam theo quy định của Chính phủ."}]},{"id":"luat-38_18","no":18,"code":"Điều 18","title":"Điều 18. Nhiệm vụ của cơ quan quản lý thuế","shortTitle":"Nhiệm vụ của cơ quan quản lý thuế","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức thực hiện quản lý thu thuế và các khoản thu khác thuộc ngân sách nhà nước theo quy định của pháp luật về thuế và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Tuyên truyền, phổ biến, hướng dẫn pháp luật về thuế; công khai các thủ tục về thuế tại trụ sở, trang thông tin điện tử của cơ quan quản lý thuế và trên các phương tiện thông tin đại chúng."},{"k":"p","t":"3. Giải thích, cung cấp thông tin liên quan đến việc xác định nghĩa vụ thuế cho người nộp thuế; cơ quan thuế có trách nhiệm công khai mức thuế phải nộp của hộ kinh doanh, cá nhân kinh doanh trên địa bàn xã, phường, thị trấn."},{"k":"p","t":"4. Bảo mật thông tin của người nộp thuế, trừ các thông tin cung cấp cho cơ quan có thẩm quyền hoặc thông tin được công bố công khai theo quy định của pháp luật."},{"k":"p","t":"5. Thực hiện việc miễn thuế; giảm thuế; xóa nợ tiền thuế, tiền chậm nộp, tiền phạt; miễn tiền chậm nộp, tiền phạt; không tính tiền chậm nộp; gia hạn nộp thuế; nộp dần tiền thuế nợ; khoanh tiền thuế nợ, không thu thuế; xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa; hoàn thuế theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"6. Xác nhận việc thực hiện nghĩa vụ thuế của người nộp thuế khi có đề nghị theo quy định của pháp luật."},{"k":"p","t":"7. Giải quyết khiếu nại, tố cáo liên quan đến việc thực hiện pháp luật về thuế theo thẩm quyền."},{"k":"p","t":"8. Giao biên bản, kết luận, quyết định xử lý về thuế sau kiểm tra thuế, thanh tra thuế cho người nộp thuế và giải thích khi có yêu cầu."},{"k":"p","t":"9. Bồi thường thiệt hại cho người nộp thuế theo quy định của pháp luật về trách nhiệm bồi thường của Nhà nước."},{"k":"p","t":"10. Giám định để xác định số tiền thuế phải nộp của người nộp thuế theo trưng cầu, yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"11. Xây dựng, tổ chức hệ thống thông tin điện tử và ứng dụng công nghệ thông tin để thực hiện giao dịch điện tử trong lĩnh vực thuế."}]},{"id":"luat-38_19","no":19,"code":"Điều 19","title":"Điều 19. Quyền hạn của cơ quan quản lý thuế","shortTitle":"Quyền hạn của cơ quan quản lý thuế","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Yêu cầu người nộp thuế cung cấp thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế, bao gồm cả thông tin về giá trị đầu tư; số hiệu, nội dung giao dịch của các tài khoản được mở tại ngân hàng thương mại, tổ chức tín dụng khác và giải thích việc tính thuế, khai thuế, nộp thuế."},{"k":"p","t":"2. Yêu cầu tổ chức, cá nhân có liên quan cung cấp thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế và phối hợp với cơ quan quản lý thuế để thực hiện pháp luật về thuế."},{"k":"p","t":"3. Kiểm tra thuế, thanh tra thuế theo quy định của pháp luật."},{"k":"p","t":"4. Ấn định thuế."},{"k":"p","t":"5. Cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"6. Xử phạt vi phạm hành chính về quản lý thuế theo thẩm quyền; công khai trên phương tiện thông tin đại chúng các trường hợp vi phạm pháp luật về thuế."},{"k":"p","t":"7. Áp dụng biện pháp ngăn chặn và bảo đảm việc xử phạt vi phạm hành chính về quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"8. Ủy nhiệm cho cơ quan, tổ chức, cá nhân thu một số loại thuế theo quy định của Chính phủ."},{"k":"p","t":"9. Cơ quan thuế áp dụng cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế với người nộp thuế, với cơ quan thuế nước ngoài, vùng lãnh thổ mà Việt Nam đã ký hiệp định tránh đánh thuế hai lần và ngăn ngừa việc trốn lậu thuế đối với thuế thu nhập."},{"k":"p","t":"10. Mua thông tin, tài liệu, dữ liệu của các đơn vị cung cấp trong nước và ngoài nước để phục vụ công tác quản lý thuế; chi trả chi phí ủy nhiệm thu thuế từ tiền thuế thu được hoặc từ nguồn kinh phí của cơ quan quản lý thuế theo quy định của Chính phủ."}]},{"id":"luat-38_20","no":20,"code":"Điều 20","title":"Điều 20. Nhiệm vụ, quyền hạn của Hội đồng nhân dân, Ủy ban nhân dân các cấp","shortTitle":"Nhiệm vụ, quyền hạn của Hội đồng nhân dân, Ủy ban nhân dân các cấp","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Hội đồng nhân dân các cấp, trong phạm vi nhiệm vụ, quyền hạn của mình, quyết định nhiệm vụ thu ngân sách hằng năm và giám sát việc thực hiện pháp luật về thuế tại địa phương."},{"k":"p","t":"2. Ủy ban nhân dân các cấp, trong phạm vi nhiệm vụ, quyền hạn của mình, có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo các cơ quan có liên quan tại địa phương phối hợp với cơ quan quản lý thuế lập dự toán và tổ chức thực hiện nhiệm vụ thu thuế, các khoản thu khác thuộc ngân sách nhà nước trên địa bàn;"},{"k":"p","t":"b) Phối hợp với Bộ Tài chính, cơ quan quản lý thuế và cơ quan khác có thẩm quyền trong việc quản lý, thực hiện pháp luật về thuế;"},{"k":"p","t":"c) Xử phạt vi phạm hành chính và giải quyết khiếu nại, tố cáo liên quan đến việc thực hiện pháp luật về thuế theo thẩm quyền."}]},{"id":"luat-38_21","no":21,"code":"Điều 21","title":"Điều 21. Nhiệm vụ, quyền hạn của Kiểm toán nhà nước","shortTitle":"Nhiệm vụ, quyền hạn của Kiểm toán nhà nước","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Thực hiện kiểm toán hoạt động đối với cơ quan quản lý thuế theo quy định của pháp luật về kiểm toán nhà nước, pháp luật về thuế và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Đối với kiến nghị của Kiểm toán nhà nước liên quan đến việc thực hiện nghĩa vụ thuế của người nộp thuế được quy định như sau:"},{"k":"p","t":"a) Trường hợp Kiểm toán nhà nước trực tiếp kiểm toán người nộp thuế theo quy định của Luật Kiểm toán nhà nước có nội dung kiến nghị về nghĩa vụ nộp ngân sách nhà nước thì Kiểm toán nhà nước phải gửi biên bản hoặc báo cáo kiểm toán cho người nộp thuế và người nộp thuế có trách nhiệm thực hiện kiến nghị theo báo cáo kiểm toán của Kiểm toán nhà nước. Trường hợp người nộp thuế không đồng ý với kiến nghị của Kiểm toán nhà nước thì người nộp thuế có quyền khiếu nại kiến nghị của Kiểm toán nhà nước;"},{"k":"p","t":"b) Trường hợp Kiểm toán nhà nước không trực tiếp kiểm toán đối với người nộp thuế mà thực hiện kiểm toán tại cơ quan quản lý thuế có nội dung kiến nghị nêu trong báo cáo kiểm toán liên quan đến nghĩa vụ thuế của người nộp thuế thì Kiểm toán nhà nước gửi bản trích sao có kiến nghị liên quan đến nghĩa vụ thuế cho người nộp thuế để thực hiện. Cơ quan quản lý thuế có trách nhiệm tổ chức thực hiện kiến nghị của Kiểm toán nhà nước. Trường hợp người nộp thuế không đồng ý với nghĩa vụ thuế phải nộp thì người nộp thuế có văn bản đề nghị cơ quan quản lý thuế, Kiểm toán nhà nước xem xét lại nghĩa vụ thuế phải nộp. Căn cứ đề nghị của người nộp thuế, Kiểm toán nhà nước chủ trì, phối hợp với cơ quan quản lý thuế thực hiện việc xác định chính xác nghĩa vụ thuế của người nộp thuế và chịu trách nhiệm theo quy định của pháp luật."}]},{"id":"luat-38_22","no":22,"code":"Điều 22","title":"Điều 22. Nhiệm vụ, quyền hạn của Thanh tra nhà nước","shortTitle":"Nhiệm vụ, quyền hạn của Thanh tra nhà nước","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Thực hiện thanh tra hoạt động của cơ quan quản lý thuế theo quy định của pháp luật về thanh tra, pháp luật về thuế và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Đối với kết luận của Thanh tra nhà nước liên quan đến nghĩa vụ thuế phải nộp của người nộp thuế được quy định như sau:"},{"k":"p","t":"a) Trường hợp Thanh tra nhà nước trực tiếp thanh tra người nộp thuế theo quy định của Luật Thanh tra có nội dung kết luận về nghĩa vụ nộp ngân sách nhà nước thì Thanh tra nhà nước phải gửi biên bản hoặc kết luận cho người nộp thuế và người nộp thuế có trách nhiệm thực hiện kết luận của Thanh tra. Trường hợp người nộp thuế không đồng ý với kết luận của Thanh tra nhà nước thì người nộp thuế có quyền khiếu nại kết luận của Thanh tra nhà nước;"},{"k":"p","t":"b) Trường hợp Thanh tra nhà nước không trực tiếp thanh tra đối với người nộp thuế mà thực hiện thanh tra tại cơ quan quản lý thuế có nội dung kiến nghị nêu trong kết luận thanh tra liên quan đến nghĩa vụ thuế của người nộp thuế thì Thanh tra nhà nước gửi bản trích sao có kết luận liên quan đến nghĩa vụ thuế cho người nộp thuế để thực hiện. Cơ quan quản lý thuế có trách nhiệm tổ chức thực hiện kết luận của Thanh tra nhà nước. Trường hợp người nộp thuế không đồng ý với nghĩa vụ thuế phải nộp thì người nộp thuế có văn bản đề nghị cơ quan quản lý thuế, Thanh tra nhà nước xem xét lại nghĩa vụ thuế phải nộp. Căn cứ đề nghị của người nộp thuế, Thanh tra nhà nước chủ trì, phối hợp với cơ quan quản lý thuế thực hiện việc xác định chính xác nghĩa vụ thuế của người nộp thuế và chịu trách nhiệm theo quy định của pháp luật."}]},{"id":"luat-38_23","no":23,"code":"Điều 23","title":"Điều 23. Nhiệm vụ, quyền hạn của cơ quan điều tra, Viện kiểm sát, Tòa án","shortTitle":"Nhiệm vụ, quyền hạn của cơ quan điều tra, Viện kiểm sát, Tòa án","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan điều tra, Viện kiểm sát, Tòa án, trong phạm vi nhiệm vụ, quyền hạn của mình, có trách nhiệm tiếp nhận, xử lý, giải quyết tin báo, tố giác tội phạm và kiến nghị khởi tố, khởi tố, điều tra, truy tố, xét xử kịp thời, nghiêm minh tội phạm trong lĩnh vực thuế theo quy định của pháp luật và thông báo kết quả xử lý cho cơ quan quản lý thuế."}]},{"id":"luat-38_24","no":24,"code":"Điều 24","title":"Điều 24. Nhiệm vụ, quyền hạn của Mặt trận Tổ quốc Việt Nam","shortTitle":"Nhiệm vụ, quyền hạn của Mặt trận Tổ quốc Việt Nam","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Mặt trận Tổ quốc Việt Nam tuyên truyền, vận động các tầng lớp nhân dân nghiêm chỉnh thi hành pháp luật về thuế."},{"k":"p","t":"2. Mặt trận Tổ quốc Việt Nam thực hiện giám sát, phản biện xã hội về thuế; phản ánh, kiến nghị với cơ quan nhà nước xem xét, giải quyết các vấn đề về thuế theo quy định của pháp luật."}]},{"id":"luat-38_25","no":25,"code":"Điều 25","title":"Điều 25. Nhiệm vụ, quyền hạn của tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp","shortTitle":"Nhiệm vụ, quyền hạn của tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp phối hợp với cơ quan quản lý thuế trong việc tuyên truyền, phổ biến, giáo dục pháp luật về thuế đến các hội viên."},{"k":"p","t":"2. Tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp phối hợp với cơ quan quản lý thuế trong việc cung cấp thông tin liên quan đến việc quản lý thuế."}]},{"id":"luat-38_26","no":26,"code":"Điều 26","title":"Điều 26. Nhiệm vụ, quyền hạn của cơ quan thông tin, báo chí","shortTitle":"Nhiệm vụ, quyền hạn của cơ quan thông tin, báo chí","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thông tin, báo chí tuyên truyền, phổ biến chính sách, pháp luật về thuế, nêu gương tổ chức, cá nhân thực hiện tốt pháp luật về thuế, phản ánh và phê phán các hành vi vi phạm pháp luật về thuế."},{"k":"p","t":"2. Cơ quan thông tin, báo chí phối hợp với các cơ quan quản lý thuế trong việc đăng tải, cung cấp thông tin theo quy định của pháp luật."}]},{"id":"luat-38_27","no":27,"code":"Điều 27","title":"Điều 27. Nhiệm vụ, quyền hạn của ngân hàng thương mại","shortTitle":"Nhiệm vụ, quyền hạn của ngân hàng thương mại","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Ngân hàng thương mại khi tham gia phối hợp thu thuế và thu các khoản thu khác thuộc ngân sách nhà nước có trách nhiệm sau đây:"},{"k":"p","t":"a) Phối hợp với cơ quan quản lý thuế, Kho bạc Nhà nước trong việc thực hiện nộp thuế điện tử, hoàn thuế điện tử cho người nộp thuế; xử lý, đối soát dữ liệu về nộp thuế điện tử, hoàn thuế điện tử;"},{"k":"p","t":"b) Truyền, nhận thông tin chứng từ nộp thuế điện tử, chuyển tiền thanh toán các khoản thu ngân sách nhà nước cho Kho bạc Nhà nước đầy đủ, chính xác, kịp thời theo đúng quy định của pháp luật;"},{"k":"p","t":"c) Hỗ trợ người nộp thuế trong quá trình thực hiện nộp thuế điện tử;"},{"k":"p","t":"d) Bảo mật thông tin của người nộp thuế, người khai hải quan theo quy định của pháp luật."},{"k":"p","t":"2. Cung cấp thông tin về số hiệu tài khoản theo mã số thuế của người nộp thuế khi mở tài khoản."},{"k":"p","t":"3. Khấu trừ, nộp thay nghĩa vụ thuế phải nộp theo quy định pháp luật về thuế của tổ chức, cá nhân ở nước ngoài có hoạt động kinh doanh thương mại điện tử có phát sinh thu nhập từ Việt Nam."},{"k":"p","t":"4. Trích tiền để nộp thuế từ tài khoản của người nộp thuế, phong tỏa tài khoản của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế theo đề nghị của cơ quan quản lý thuế."},{"k":"p","t":"5. Trường hợp người nộp thuế có bảo lãnh về tiền thuế, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước theo quy định của Luật này nhưng người nộp thuế không nộp đúng thời hạn thì ngân hàng bảo lãnh phải chịu trách nhiệm nộp tiền thuế, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước thay cho người nộp thuế trong phạm vi bảo lãnh."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_28","no":28,"code":"Điều 28","title":"Điều 28. Hội đồng tư vấn thuế xã, phường, thị trấn","shortTitle":"Hội đồng tư vấn thuế xã, phường, thị trấn","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ tịch Ủy ban nhân dân cấp huyện căn cứ số lượng, quy mô kinh doanh của các hộ kinh doanh, cá nhân kinh doanh trên địa bàn để quyết định thành lập Hội đồng tư vấn thuế xã, phường, thị trấn theo đề nghị của Chi cục trưởng Chi cục Thuế, Chi cục trưởng Chi cục Thuế khu vực."},{"k":"p","t":"2. Hội đồng tư vấn thuế xã, phường, thị trấn có nhiệm vụ tư vấn cho cơ quan thuế về doanh thu, mức thuế của các hộ kinh doanh, cá nhân kinh doanh nộp thuế theo phương pháp khoán trên địa bàn và phối hợp với cơ quan thuế đôn đốc các hộ kinh doanh, cá nhân kinh doanh thực hiện nghĩa vụ thuế theo quy định của pháp luật."},{"k":"p","t":"3. Kinh phí hoạt động của Hội đồng tư vấn thuế xã, phường, thị trấn do cơ quan thuế chi từ nguồn ngân sách nhà nước cấp cho ngành thuế."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định về hoạt động, quyền hạn, trách nhiệm của Hội đồng tư vấn thuế xã, phường, thị trấn."}]},{"id":"luat-38_29","no":29,"code":"Điều 29","title":"Điều 29. Nhiệm vụ, quyền hạn của tổ chức, cá nhân khác","shortTitle":"Nhiệm vụ, quyền hạn của tổ chức, cá nhân khác","chuong":"Chương II — NHIỆM VỤ, QUYỀN HẠN VÀ TRÁCH NHIỆM CỦA CƠ QUAN,","muc":"","level":1,"content":[{"k":"p","t":"1. Cung cấp thông tin liên quan đến việc xác định nghĩa vụ thuế theo đề nghị của cơ quan quản lý thuế."},{"k":"p","t":"2. Phối hợp với cơ quan quản lý thuế trong việc thực hiện các quyết định xử phạt vi phạm hành chính về quản lý thuế."},{"k":"p","t":"3. Tố giác hành vi vi phạm pháp luật về thuế đến cơ quan quản lý thuế hoặc cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"4. Yêu cầu người bán hàng, người cung cấp dịch vụ phải giao hóa đơn, chứng từ bán hàng hóa, dịch vụ đúng số lượng, chủng loại, giá trị thực thanh toán khi mua hàng hóa, dịch vụ."}]},{"id":"luat-38_30","no":30,"code":"Điều 30","title":"Điều 30. Đối tượng đăng ký thuế và cấp mã số thuế","shortTitle":"Đối tượng đăng ký thuế và cấp mã số thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế phải thực hiện đăng ký thuế và được cơ quan thuế cấp mã số thuế trước khi bắt đầu hoạt động sản xuất, kinh doanh hoặc có phát sinh nghĩa vụ với ngân sách nhà nước. Đối tượng đăng ký thuế bao gồm:"},{"k":"p","t":"a) Doanh nghiệp, tổ chức, cá nhân thực hiện đăng ký thuế theo cơ chế một cửa liên thông cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của Luật Doanh nghiệp và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Tổ chức, cá nhân không thuộc trường hợp quy định tại điểm a khoản này thực hiện đăng ký thuế trực tiếp với cơ quan thuế theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"2. Cấu trúc mã số thuế được quy định như sau:"},{"k":"p","t":"a) Mã số thuế 10 chữ số được sử dụng cho doanh nghiệp, tổ chức có tư cách pháp nhân; đại diện hộ gia đình, hộ kinh doanh và cá nhân khác;"},{"k":"p","t":"b) Mã số thuế 13 chữ số và ký tự khác được sử dụng cho đơn vị phụ thuộc và các đối tượng khác;"},{"k":"p","t":"c) Bộ trưởng Bộ Tài chính quy định chi tiết khoản này."},{"k":"p","t":"3. Việc cấp mã số thuế được quy định như sau:"},{"k":"p","t":"a) Doanh nghiệp, tổ chức kinh tế, tổ chức khác được cấp 01 mã số thuế duy nhất để sử dụng trong suốt quá trình hoạt động từ khi đăng ký thuế cho đến khi chấm dứt hiệu lực mã số thuế. Người nộp thuế có chi nhánh, văn phòng đại diện, đơn vị phụ thuộc trực tiếp thực hiện nghĩa vụ thuế thì được cấp mã số thuế phụ thuộc. Trường hợp doanh nghiệp, tổ chức, chi nhánh, văn phòng đại diện, đơn vị phụ thuộc thực hiện đăng ký thuế theo cơ chế một cửa liên thông cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì mã số ghi trên giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký kinh doanh đồng thời là mã số thuế;"},{"k":"p","t":"b) Cá nhân được cấp 01 mã số thuế duy nhất để sử dụng trong suốt cuộc đời của cá nhân đó. Người phụ thuộc của cá nhân được cấp mã số thuế để giảm trừ gia cảnh cho người nộp thuế thu nhập cá nhân. Mã số thuế cấp cho người phụ thuộc đồng thời là mã số thuế của cá nhân khi người phụ thuộc phát sinh nghĩa vụ với ngân sách nhà nước;"},{"k":"p","t":"c) Doanh nghiệp, tổ chức, cá nhân có trách nhiệm khấu trừ, nộp thuế thay được cấp mã số thuế nộp thay để thực hiện khai thuế, nộp thuế thay cho người nộp thuế;"},{"k":"p","t":"d) Mã số thuế đã cấp không được sử dụng lại để cấp cho người nộp thuế khác;"},{"k":"p","t":"đ) Mã số thuế của doanh nghiệp, tổ chức kinh tế, tổ chức khác sau khi chuyển đổi loại hình, bán, tặng, cho, thừa kế được giữ nguyên;"},{"k":"p","t":"e) Mã số thuế cấp cho hộ gia đình, hộ kinh doanh, cá nhân kinh doanh là mã số thuế cấp cho cá nhân người đại diện hộ gia đình, hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"4. Đăng ký thuế bao gồm:"},{"k":"p","t":"a) Đăng ký thuế lần đầu;"},{"k":"p","t":"b) Thông báo thay đổi thông tin đăng ký thuế;"},{"k":"p","t":"c) Thông báo khi tạm ngừng hoạt động, kinh doanh;"},{"k":"p","t":"d) Chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"đ) Khôi phục mã số thuế."}]},{"id":"luat-38_31","no":31,"code":"Điều 31","title":"Điều 31. Hồ sơ đăng ký thuế lần đầu","shortTitle":"Hồ sơ đăng ký thuế lần đầu","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì hồ sơ đăng ký thuế là hồ sơ đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của pháp luật."},{"k":"p","t":"2. Người nộp thuế là tổ chức đăng ký thuế trực tiếp với cơ quan thuế thì hồ sơ đăng ký thuế bao gồm:"},{"k":"p","t":"a) Tờ khai đăng ký thuế;"},{"k":"p","t":"b) Bản sao giấy phép thành lập và hoạt động, quyết định thành lập, giấy chứng nhận đăng ký đầu tư hoặc giấy tờ tương đương khác do cơ quan có thẩm quyền cấp phép còn hiệu lực;"},{"k":"p","t":"c) Các giấy tờ khác có liên quan."},{"k":"p","t":"3. Người nộp thuế là hộ gia đình, hộ kinh doanh, cá nhân đăng ký thuế trực tiếp với cơ quan thuế thì hồ sơ đăng ký thuế bao gồm:"},{"k":"p","t":"a) Tờ khai đăng ký thuế hoặc tờ khai thuế;"},{"k":"p","t":"b) Bản sao giấy chứng minh nhân dân, bản sao thẻ căn cước công dân hoặc bản sao hộ chiếu;"},{"k":"p","t":"c) Các giấy tờ khác có liên quan."},{"k":"p","t":"4. Việc kết nối thông tin giữa cơ quan quản lý nhà nước và cơ quan thuế để nhận hồ sơ đăng ký thuế và cấp mã số thuế theo cơ chế một cửa liên thông qua cổng thông tin điện tử được thực hiện theo quy định của pháp luật có liên quan."}]},{"id":"luat-38_32","no":32,"code":"Điều 32","title":"Điều 32. Địa điểm nộp hồ sơ đăng ký thuế lần đầu","shortTitle":"Địa điểm nộp hồ sơ đăng ký thuế lần đầu","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì địa điểm nộp hồ sơ đăng ký thuế là địa điểm nộp hồ sơ đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của pháp luật."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế thì địa điểm nộp hồ sơ đăng ký thuế được quy định như sau:"},{"k":"p","t":"a) Tổ chức, hộ kinh doanh, cá nhân kinh doanh nộp hồ sơ đăng ký thuế tại cơ quan thuế nơi tổ chức, hộ kinh doanh, cá nhân kinh doanh đó có trụ sở;"},{"k":"p","t":"b) Tổ chức, cá nhân có trách nhiệm khấu trừ và nộp thuế thay nộp hồ sơ đăng ký thuế tại cơ quan thuế quản lý trực tiếp tổ chức, cá nhân đó;"},{"k":"p","t":"c) Hộ gia đình, cá nhân không kinh doanh nộp hồ sơ đăng ký thuế tại cơ quan thuế nơi phát sinh thu nhập chịu thuế, nơi đăng ký hộ khẩu thường trú hoặc nơi đăng ký tạm trú hoặc nơi phát sinh nghĩa vụ với ngân sách nhà nước."},{"k":"p","t":"3. Cá nhân ủy quyền cho tổ chức, cá nhân chi trả thu nhập đăng ký thuế thay cho bản thân và người phụ thuộc nộp hồ sơ đăng ký thuế thông qua tổ chức, cá nhân chi trả thu nhập. Tổ chức, cá nhân chi trả thu nhập có trách nhiệm tổng hợp và nộp hồ sơ đăng ký thuế thay cho cá nhân đến cơ quan thuế quản lý trực tiếp tổ chức, cá nhân chi trả đó."}]},{"id":"luat-38_33","no":33,"code":"Điều 33","title":"Điều 33. Thời hạn đăng ký thuế lần đầu","shortTitle":"Thời hạn đăng ký thuế lần đầu","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì thời hạn đăng ký thuế là thời hạn đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của pháp luật."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế thì thời hạn đăng ký thuế là 10 ngày làm việc kể từ ngày sau đây:"},{"k":"p","t":"a) Được cấp giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy chứng nhận đăng ký đầu tư, quyết định thành lập;"},{"k":"p","t":"b) Bắt đầu hoạt động kinh doanh đối với tổ chức không thuộc diện đăng ký kinh doanh hoặc hộ kinh doanh, cá nhân kinh doanh thuộc diện đăng ký kinh doanh nhưng chưa được cấp giấy chứng nhận đăng ký kinh doanh;"},{"k":"p","t":"c) Phát sinh trách nhiệm khấu trừ thuế và nộp thuế thay; tổ chức nộp thay cho cá nhân theo hợp đồng, văn bản hợp tác kinh doanh;"},{"k":"p","t":"d) Ký hợp đồng nhận thầu đối với nhà thầu, nhà thầu phụ nước ngoài kê khai nộp thuế trực tiếp với cơ quan thuế; ký hợp đồng, hiệp định dầu khí;"},{"k":"p","t":"đ) Phát sinh nghĩa vụ thuế thu nhập cá nhân;"},{"k":"p","t":"e) Phát sinh yêu cầu được hoàn thuế;"},{"k":"p","t":"g) Phát sinh nghĩa vụ khác với ngân sách nhà nước."},{"k":"p","t":"3. Tổ chức, cá nhân chi trả thu nhập có trách nhiệm đăng ký thuế thay cho cá nhân có thu nhập chậm nhất là 10 ngày làm việc kể từ ngày phát sinh nghĩa vụ thuế trong trường hợp cá nhân chưa có mã số thuế; đăng ký thuế thay cho người phụ thuộc của người nộp thuế chậm nhất là 10 ngày làm việc kể từ ngày người nộp thuế đăng ký giảm trừ gia cảnh theo quy định của pháp luật trong trường hợp người phụ thuộc chưa có mã số thuế."}]},{"id":"luat-38_34","no":34,"code":"Điều 34","title":"Điều 34. Cấp giấy chứng nhận đăng ký thuế","shortTitle":"Cấp giấy chứng nhận đăng ký thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế cấp giấy chứng nhận đăng ký thuế cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày nhận đủ hồ sơ đăng ký thuế của người nộp thuế theo quy định. Thông tin của giấy chứng nhận đăng ký thuế bao gồm:"},{"k":"p","t":"a) Tên người nộp thuế;"},{"k":"p","t":"b) Mã số thuế;"},{"k":"p","t":"c) Số, ngày, tháng, năm của giấy chứng nhận đăng ký kinh doanh hoặc giấy phép thành lập và hoạt động hoặc giấy chứng nhận đăng ký đầu tư đối với tổ chức, cá nhân kinh doanh; số, ngày, tháng, năm của quyết định thành lập đối với tổ chức không thuộc diện đăng ký kinh doanh; thông tin của giấy chứng minh nhân dân, thẻ căn cước công dân hoặc hộ chiếu đối với cá nhân không thuộc diện đăng ký kinh doanh;"},{"k":"p","t":"d) Cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"2. Cơ quan thuế thông báo mã số thuế cho người nộp thuế thay giấy chứng nhận đăng ký thuế trong các trường hợp sau đây:"},{"k":"p","t":"a) Cá nhân ủy quyền cho tổ chức, cá nhân chi trả thu nhập đăng ký thuế thay cho cá nhân và người phụ thuộc của cá nhân;"},{"k":"p","t":"b) Cá nhân thực hiện đăng ký thuế qua hồ sơ khai thuế;"},{"k":"p","t":"c) Tổ chức, cá nhân đăng ký thuế để khấu trừ thuế và nộp thuế thay;"},{"k":"p","t":"d) Cá nhân đăng ký thuế cho người phụ thuộc."},{"k":"p","t":"3. Trường hợp bị mất, rách, nát, cháy giấy chứng nhận đăng ký thuế hoặc thông báo mã số thuế, cơ quan thuế cấp lại trong thời hạn 02 ngày làm việc kể từ ngày nhận đủ hồ sơ đề nghị của người nộp thuế theo quy định."}]},{"id":"luat-38_35","no":35,"code":"Điều 35","title":"Điều 35. Sử dụng mã số thuế","shortTitle":"Sử dụng mã số thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế phải ghi mã số thuế được cấp vào hóa đơn, chứng từ, tài liệu khi thực hiện các giao dịch kinh doanh; mở tài khoản tiền gửi tại ngân hàng thương mại, tổ chức tín dụng khác; khai thuế, nộp thuế, miễn thuế, giảm thuế, hoàn thuế, không thu thuế, đăng ký tờ khai hải quan và thực hiện các giao dịch về thuế khác đối với tất cả các nghĩa vụ phải nộp ngân sách nhà nước, kể cả trường hợp người nộp thuế hoạt động sản xuất, kinh doanh tại nhiều địa bàn khác nhau."},{"k":"p","t":"2. Người nộp thuế phải cung cấp mã số thuế cho cơ quan, tổ chức có liên quan hoặc ghi mã số thuế trên hồ sơ khi thực hiện thủ tục hành chính theo cơ chế một cửa liên thông với cơ quan quản lý thuế."},{"k":"p","t":"3. Cơ quan quản lý thuế, Kho bạc Nhà nước, ngân hàng thương mại phối hợp thu ngân sách nhà nước, tổ chức được cơ quan thuế ủy nhiệm thu thuế sử dụng mã số thuế của người nộp thuế trong quản lý thuế và thu thuế vào ngân sách nhà nước."},{"k":"p","t":"4. Ngân hàng thương mại, tổ chức tín dụng khác phải ghi mã số thuế trong hồ sơ mở tài khoản và các chứng từ giao dịch qua tài khoản của người nộp thuế."},{"k":"p","t":"5. Tổ chức, cá nhân khác trong việc tham gia quản lý thuế sử dụng mã số thuế đã được cấp của người nộp thuế khi cung cấp thông tin liên quan đến việc xác định nghĩa vụ thuế."},{"k":"p","t":"6. Khi bên Việt Nam chi trả tiền cho tổ chức, cá nhân có hoạt động kinh doanh xuyên biên giới dựa trên nền tảng trung gian kỹ thuật số không hiện diện tại Việt Nam thì phải sử dụng mã số thuế đã cấp cho tổ chức, cá nhân này để khấu trừ, nộp thay."},{"k":"p","t":"7. Khi mã số định danh cá nhân được cấp cho toàn bộ dân cư thì sử dụng mã số định danh cá nhân thay cho mã số thuế."}]},{"id":"luat-38_36","no":36,"code":"Điều 36","title":"Điều 36. Thông báo thay đổi thông tin đăng ký thuế","shortTitle":"Thông báo thay đổi thông tin đăng ký thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh khi có thay đổi thông tin đăng ký thuế thì thực hiện thông báo thay đổi thông tin đăng ký thuế cùng với việc thay đổi nội dung đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người nộp thuế thay đổi địa chỉ trụ sở dẫn đến thay đổi cơ quan thuế quản lý, người nộp thuế phải thực hiện các thủ tục về thuế với cơ quan thuế quản lý trực tiếp theo quy định của Luật này trước khi đăng ký thay đổi thông tin với cơ quan đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế khi có thay đổi thông tin đăng ký thuế thì phải thông báo cho cơ quan thuế quản lý trực tiếp trong thời hạn 10 ngày làm việc kể từ ngày phát sinh thông tin thay đổi."},{"k":"p","t":"3. Trường hợp cá nhân có ủy quyền cho tổ chức, cá nhân chi trả thu nhập thực hiện đăng ký thay đổi thông tin đăng ký thuế cho cá nhân và người phụ thuộc thì phải thông báo cho tổ chức, cá nhân chi trả thu nhập chậm nhất là 10 ngày làm việc kể từ ngày phát sinh thông tin thay đổi; tổ chức, cá nhân chi trả thu nhập có trách nhiệm thông báo cho cơ quan quản lý thuế chậm nhất là 10 ngày làm việc kể từ ngày nhận được ủy quyền của cá nhân."}]},{"id":"luat-38_37","no":37,"code":"Điều 37","title":"Điều 37. Thông báo khi tạm ngừng hoạt động, kinh doanh","shortTitle":"Thông báo khi tạm ngừng hoạt động, kinh doanh","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, hộ kinh doanh, cá nhân kinh doanh thuộc diện đăng ký kinh doanh tạm ngừng hoạt động, kinh doanh có thời hạn hoặc tiếp tục hoạt động, kinh doanh trước thời hạn đã thông báo theo quy định của Luật Doanh nghiệp và quy định khác của pháp luật có liên quan thì cơ quan thuế căn cứ vào thông báo của người nộp thuế hoặc cơ quan nhà nước có thẩm quyền để thực hiện quản lý thuế trong thời gian người nộp thuế tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn theo quy định của Luật này."},{"k":"p","t":"2. Tổ chức, hộ kinh doanh, cá nhân kinh doanh không thuộc diện đăng ký kinh doanh thì thực hiện thông báo đến cơ quan thuế quản lý trực tiếp chậm nhất là 01 ngày làm việc trước khi tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn đã thông báo để thực hiện quản lý thuế."},{"k":"p","t":"3. Chính phủ quy định về quản lý thuế đối với người nộp thuế trong thời hạn tạm ngừng hoạt động, kinh doanh hoặc tiếp tục hoạt động, kinh doanh trước thời hạn."}]},{"id":"luat-38_38","no":38,"code":"Điều 38","title":"Điều 38. Đăng ký thuế trong trường hợp tổ chức lại doanh nghiệp","shortTitle":"Đăng ký thuế trong trường hợp tổ chức lại doanh nghiệp","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh khi tổ chức lại doanh nghiệp thì thực hiện đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của pháp luật."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế khi tổ chức lại doanh nghiệp phải thực hiện chấm dứt hiệu lực mã số thuế đối với tổ chức bị chia, bị sáp nhập, bị hợp nhất hoặc thay đổi thông tin đối với tổ chức bị tách và đăng ký mới hoặc thay đổi thông tin đối với tổ chức mới sau khi chia, tách hoặc được sáp nhập, hợp nhất."}]},{"id":"luat-38_39","no":39,"code":"Điều 39","title":"Điều 39. Chấm dứt hiệu lực mã số thuế","shortTitle":"Chấm dứt hiệu lực mã số thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì thực hiện chấm dứt hiệu lực mã số thuế khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Chấm dứt hoạt động kinh doanh hoặc giải thể, phá sản;"},{"k":"p","t":"b) Bị thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký kinh doanh;"},{"k":"p","t":"c) Bị chia, bị sáp nhập, bị hợp nhất."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế thì thực hiện chấm dứt hiệu lực mã số thuế khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Chấm dứt hoạt động kinh doanh, không còn phát sinh nghĩa vụ thuế đối với tổ chức không kinh doanh;"},{"k":"p","t":"b) Bị thu hồi giấy chứng nhận đăng ký kinh doanh hoặc giấy phép tương đương;"},{"k":"p","t":"c) Bị chia, bị sáp nhập, bị hợp nhất;"},{"k":"p","t":"d) Bị cơ quan thuế ra thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"đ) Cá nhân chết, mất tích, mất năng lực hành vi dân sự theo quy định của pháp luật;"},{"k":"p","t":"e) Nhà thầu nước ngoài khi kết thúc hợp đồng;"},{"k":"p","t":"g) Nhà thầu, nhà đầu tư tham gia hợp đồng dầu khí khi kết thúc hợp đồng hoặc chuyển nhượng toàn bộ quyền lợi tham gia hợp đồng dầu khí."},{"k":"p","t":"3. Nguyên tắc chấm dứt hiệu lực mã số thuế được quy định như sau:"},{"k":"p","t":"a) Mã số thuế không được sử dụng trong các giao dịch kinh tế kể từ ngày cơ quan thuế thông báo chấm dứt hiệu lực;"},{"k":"p","t":"b) Mã số thuế của tổ chức khi đã chấm dứt hiệu lực không được sử dụng lại, trừ trường hợp quy định tại Điều 40 của Luật này;"},{"k":"p","t":"c) Mã số thuế của hộ kinh doanh, cá nhân kinh doanh khi chấm dứt hiệu lực thì mã số thuế của người đại diện hộ kinh doanh không bị chấm dứt hiệu lực và được sử dụng để thực hiện nghĩa vụ thuế khác của cá nhân đó;"},{"k":"p","t":"d) Khi doanh nghiệp, tổ chức kinh tế, tổ chức khác và cá nhân chấm dứt hiệu lực mã số thuế thì đồng thời phải thực hiện chấm dứt hiệu lực đối với mã số thuế nộp thay;"},{"k":"p","t":"đ) Người nộp thuế là đơn vị chủ quản chấm dứt hiệu lực mã số thuế thì các đơn vị phụ thuộc phải bị chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"4. Hồ sơ đề nghị chấm dứt hiệu lực mã số thuế bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"b) Các giấy tờ khác có liên quan."},{"k":"p","t":"5. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thực hiện đăng ký giải thể hoặc chấm dứt hoạt động tại cơ quan đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh theo quy định của pháp luật. Trước khi thực hiện tại cơ quan đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh người nộp thuế phải đăng ký với cơ quan thuế quản lý trực tiếp để hoàn thành nghĩa vụ nộp thuế theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"6. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế nộp hồ sơ chấm dứt hiệu lực mã số thuế đến cơ quan thuế quản lý trực tiếp trong thời hạn 10 ngày làm việc kể từ ngày có văn bản chấm dứt hoạt động hoặc chấm dứt hoạt động kinh doanh hoặc ngày kết thúc hợp đồng."}]},{"id":"luat-38_40","no":40,"code":"Điều 40","title":"Điều 40. Khôi phục mã số thuế","shortTitle":"Khôi phục mã số thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh nếu được khôi phục tình trạng pháp lý theo quy định của pháp luật về đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh thì đồng thời được khôi phục mã số thuế."},{"k":"p","t":"2. Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế nộp hồ sơ đề nghị khôi phục mã số thuế đến cơ quan thuế quản lý trực tiếp trong các trường hợp sau đây:"},{"k":"p","t":"a) Được cơ quan có thẩm quyền có văn bản hủy bỏ văn bản thu hồi giấy chứng nhận đăng ký kinh doanh hoặc giấy phép tương đương;"},{"k":"p","t":"b) Khi có nhu cầu tiếp tục hoạt động kinh doanh sau khi đã có hồ sơ chấm dứt hiệu lực mã số thuế gửi đến cơ quan thuế nhưng cơ quan thuế chưa ban hành thông báo chấm dứt hiệu lực mã số thuế;"},{"k":"p","t":"c) Khi cơ quan thuế có thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký nhưng chưa bị thu hồi giấy phép và chưa bị chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"3. Mã số thuế được tiếp tục sử dụng trong các giao dịch kinh tế kể từ ngày quyết định khôi phục tình trạng pháp lý của cơ quan đăng ký kinh doanh có hiệu lực hoặc ngày cơ quan thuế thông báo khôi phục mã số thuế."},{"k":"p","t":"4. Hồ sơ đề nghị khôi phục mã số thuế bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị khôi phục mã số thuế;"},{"k":"p","t":"b) Các giấy tờ khác có liên quan."}]},{"id":"luat-38_41","no":41,"code":"Điều 41","title":"Điều 41. Trách nhiệm của Bộ trưởng Bộ Tài chính, cơ quan thuế trong việc đăng ký thuế","shortTitle":"Trách nhiệm của Bộ trưởng Bộ Tài chính, cơ quan thuế trong việc đăng ký thuế","chuong":"Chương III — ĐĂNG KÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ trưởng Bộ Tài chính quy định chi tiết về hồ sơ; quy định thủ tục, mẫu biểu đăng ký thuế quy định tại các điều 31, 34, 36, 37, 38, 39 và 40 của Luật này."},{"k":"p","t":"2. Cơ quan thuế tiếp nhận hồ sơ đăng ký thuế của người nộp thuế qua các hình thức sau:"},{"k":"p","t":"a) Nhận hồ sơ trực tiếp tại cơ quan thuế;"},{"k":"p","t":"b) Nhận hồ sơ gửi qua đường bưu chính;"},{"k":"p","t":"c) Nhận hồ sơ điện tử qua cổng giao dịch điện tử của cơ quan thuế và từ hệ thống thông tin quốc gia về đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh."},{"k":"p","t":"3. Cơ quan thuế xử lý hồ sơ đăng ký thuế theo quy định sau đây:"},{"k":"p","t":"a) Trường hợp hồ sơ đầy đủ thì thông báo về việc chấp nhận hồ sơ và thời hạn giải quyết hồ sơ đăng ký thuế chậm nhất là 03 ngày làm việc kể từ ngày nhận đủ hồ sơ;"},{"k":"p","t":"b) Trường hợp hồ sơ không đầy đủ thì thông báo cho người nộp thuế chậm nhất là 02 ngày làm việc kể từ ngày tiếp nhận hồ sơ."},{"k":"p","t":"4. Trường hợp hồ sơ đăng ký thuế cùng với đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh từ hệ thống thông tin quốc gia về đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh (sau đây gọi chung là hệ thống thông tin quốc gia về đăng ký kinh doanh) thì cơ quan tiếp nhận hồ sơ đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký kinh doanh chuyển hồ sơ đến cơ quan thuế để thực hiện xử lý hồ sơ đăng ký thuế và trả kết quả cho người nộp thuế theo quy định của Luật này và quy định khác của pháp luật có liên quan."}]},{"id":"luat-38_42","no":42,"code":"Điều 42","title":"Điều 42. Nguyên tắc khai thuế, tính thuế","shortTitle":"Nguyên tắc khai thuế, tính thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế phải khai chính xác, trung thực, đầy đủ các nội dung trong tờ khai thuế theo mẫu do Bộ trưởng Bộ Tài chính quy định và nộp đủ các chứng từ, tài liệu quy định trong hồ sơ khai thuế với cơ quan quản lý thuế."},{"k":"p","t":"2. Người nộp thuế tự tính số tiền thuế phải nộp, trừ trường hợp việc tính thuế do cơ quan quản lý thuế thực hiện theo quy định của Chính phủ."},{"k":"p","t":"3. Người nộp thuế thực hiện khai thuế, tính thuế tại cơ quan thuế địa phương có thẩm quyền nơi có trụ sở. Trường hợp người nộp thuế hạch toán tập trung tại trụ sở chính, có đơn vị phụ thuộc tại đơn vị hành chính cấp tỉnh khác nơi có trụ sở chính thì người nộp thuế khai thuế tại trụ sở chính và tính thuế, phân bổ nghĩa vụ thuế phải nộp theo từng địa phương nơi được hưởng nguồn thu ngân sách nhà nước. Bộ trưởng Bộ Tài chính quy định chi tiết khoản này."},{"k":"p","t":"4. Đối với hoạt động kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số và các dịch vụ khác được thực hiện bởi nhà cung cấp ở nước ngoài không có cơ sở thường trú tại Việt Nam thì nhà cung cấp ở nước ngoài có nghĩa vụ trực tiếp hoặc ủy quyền thực hiện đăng ký thuế, khai thuế, nộp thuế tại Việt Nam theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"5. Nguyên tắc kê khai, xác định giá tính thuế đối với giao dịch liên kết được quy định như sau:"},{"k":"p","t":"a) Kê khai, xác định giá giao dịch liên kết theo nguyên tắc phân tích, so sánh với các giao dịch độc lập và nguyên tắc bản chất hoạt động, giao dịch quyết định nghĩa vụ thuế để xác định nghĩa vụ thuế phải nộp như trong điều kiện giao dịch giữa các bên độc lập;"},{"k":"p","t":"b) Giá giao dịch liên kết được điều chỉnh theo giao dịch độc lập để kê khai, xác định số tiền thuế phải nộp theo nguyên tắc không làm giảm thu nhập chịu thuế;"},{"k":"p","t":"c) Người nộp thuế có quy mô nhỏ, rủi ro về thuế thấp được miễn thực hiện quy định tại điểm a, điểm b khoản này và được áp dụng cơ chế đơn giản hóa trong kê khai, xác định giá giao dịch liên kết."},{"k":"p","t":"6. Nguyên tắc khai thuế đối với cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế được quy định như sau:"},{"k":"p","t":"a) Việc áp dụng cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế được thực hiện trên cơ sở đề nghị của người nộp thuế, sự thống nhất giữa cơ quan thuế và người nộp thuế theo thỏa thuận đơn phương, song phương và đa phương giữa cơ quan thuế, người nộp thuế và cơ quan thuế nước ngoài, vùng lãnh thổ có liên quan;"},{"k":"p","t":"b) Việc áp dụng cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế phải dựa trên thông tin của người nộp thuế, cơ sở dữ liệu thương mại có sự kiểm chứng bảo đảm tính pháp lý;"},{"k":"p","t":"c) Việc áp dụng cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế phải được Bộ trưởng Bộ Tài chính phê duyệt trước khi thực hiện; đối với các thỏa thuận song phương, đa phương có sự tham gia của cơ quan thuế nước ngoài thì được thực hiện theo quy định của pháp luật về điều ước quốc tế, thỏa thuận quốc tế."}]},{"id":"luat-38_43","no":43,"code":"Điều 43","title":"Điều 43. Hồ sơ khai thuế","shortTitle":"Hồ sơ khai thuế","chuong":"Chương IV — KHAI THUẾ, TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ khai thuế đối với loại thuế khai và nộp theo tháng là tờ khai thuế tháng."},{"k":"p","t":"2. Hồ sơ khai thuế đối với loại thuế khai và nộp theo quý là tờ khai thuế quý."},{"k":"p","t":"3. Hồ sơ khai thuế đối với loại thuế có kỳ tính thuế theo năm bao gồm:"},{"k":"p","t":"a) Hồ sơ khai thuế năm gồm tờ khai thuế năm và các tài liệu khác có liên quan đến xác định số tiền thuế phải nộp;"},{"k":"p","t":"b) Hồ sơ khai quyết toán thuế khi kết thúc năm gồm tờ khai quyết toán thuế n
