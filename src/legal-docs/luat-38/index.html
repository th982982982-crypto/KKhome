:"5. Sử dụng chứng từ, tài liệu không phản ánh đúng bản chất giao dịch hoặc giá trị giao dịch thực tế để xác định sai số tiền thuế phải nộp, số tiền thuế được miễn, số tiền thuế được giảm, số tiền thuế được hoàn, số tiền thuế không phải nộp."},{"k":"p","t":"6. Khai sai với thực tế hàng hóa xuất khẩu, nhập khẩu mà không khai bổ sung hồ sơ khai thuế sau khi hàng hóa đã được thông quan."},{"k":"p","t":"7. Cố ý không kê khai hoặc khai sai về thuế đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"8. Cấu kết với người gửi hàng để nhập khẩu hàng hóa nhằm mục đích trốn thuế."},{"k":"p","t":"9. Sử dụng hàng hóa thuộc đối tượng không chịu thuế, miễn thuế, xét miễn thuế không đúng mục đích quy định mà không khai báo việc chuyển đổi mục đích sử dụng với cơ quan quản lý thuế."},{"k":"p","t":"10. Người nộp thuế có hoạt động kinh doanh trong thời gian ngừng, tạm ngừng hoạt động kinh doanh nhưng không thông báo với cơ quan quản lý thuế."},{"k":"p","t":"11. Người nộp thuế không bị xử phạt về hành vi trốn thuế mà bị xử phạt theo quy định tại khoản 1 Điều 141 của Luật này đối với trường hợp sau đây:"},{"k":"p","t":"a) Không nộp hồ sơ đăng ký thuế, không nộp hồ sơ khai thuế, nộp hồ sơ khai thuế sau 90 ngày nhưng không phát sinh số tiền thuế phải nộp;"},{"k":"p","t":"b) Nộp hồ sơ khai thuế sau 90 ngày có phát sinh số tiền thuế phải nộp và người nộp thuế đã nộp đủ số tiền thuế, tiền chậm nộp vào ngân sách nhà nước trước thời điểm cơ quan thuế công bố quyết định kiểm tra thuế, thanh tra thuế hoặc trước thời điểm cơ quan thuế lập biên bản về hành vi chậm nộp hồ sơ khai thuế."}]},{"id":"luat-38_144","no":144,"code":"Điều 144","title":"Điều 144. Xử lý hành vi vi phạm của ngân hàng thương mại, người bảo lãnh nộp tiền thuế trong lĩnh vực quản lý thuế","shortTitle":"Xử lý hành vi vi phạm của ngân hàng thương mại, người bảo lãnh nộp tiền thuế trong lĩnh vực quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Ngân hàng thương mại không thực hiện trách nhiệm trích chuyển tiền từ tài khoản của người nộp thuế vào tài khoản của ngân sách nhà nước đối với số tiền thuế nợ phải nộp của người nộp thuế theo yêu cầu của cơ quan quản lý thuế thì bị phạt số tiền tương ứng với số tiền không trích chuyển vào tài khoản của ngân sách nhà nước, trừ trường hợp các tài khoản của người nộp thuế không còn số dư hoặc đã trích chuyển toàn bộ số dư tài khoản của người nộp thuế vào tài khoản của ngân sách nhà nước nhưng vẫn không đủ số tiền thuế nợ mà người nộp thuế phải nộp."},{"k":"p","t":"2. Người bảo lãnh không thực hiện nghĩa vụ bảo lãnh cho người nộp thuế trong trường hợp người nộp thuế không nộp thuế thì người bảo lãnh phải thực hiện nghĩa vụ của người nộp thuế trong phạm vi bảo lãnh."}]},{"id":"luat-38_145","no":145,"code":"Điều 145","title":"Điều 145. Xử lý hành vi vi phạm của tổ chức, cá nhân có liên quan trong lĩnh vực quản lý thuế","shortTitle":"Xử lý hành vi vi phạm của tổ chức, cá nhân có liên quan trong lĩnh vực quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân có liên quan đến việc thực hiện pháp luật về thuế quy định tại khoản 4 Điều 2 của Luật này có hành vi thông đồng, bao che người nộp thuế trốn thuế, không thực hiện quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế thì tùy theo tính chất, mức độ vi phạm mà bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự theo quy định của pháp luật."},{"k":"p","t":"2. Tổ chức, cá nhân khác có liên quan đến việc thực hiện pháp luật về thuế quy định tại khoản 4 Điều 2 của Luật này không thực hiện trách nhiệm của mình theo quy định của Luật này thì tùy theo tính chất, mức độ vi phạm mà bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự theo quy định của pháp luật."}]},{"id":"luat-38_146","no":146,"code":"Điều 146","title":"Điều 146. Xử phạt vi phạm hành chính về phí, lệ phí, hóa đơn trong lĩnh vực quản lý thuế","shortTitle":"Xử phạt vi phạm hành chính về phí, lệ phí, hóa đơn trong lĩnh vực quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Việc xử phạt vi phạm hành chính về phí, lệ phí, hóa đơn trong lĩnh vực quản lý thuế thực hiện theo quy định của Chính phủ."}]},{"id":"luat-38_147","no":147,"code":"Điều 147","title":"Điều 147. Khiếu nại, tố cáo","shortTitle":"Khiếu nại, tố cáo","chuong":"Chương XVI — KHIẾU NẠI, TỐ CÁO, KHỞI KIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế, tổ chức, cá nhân có quyền khiếu nại với cơ quan có thẩm quyền đối với quyết định hành chính, hành vi hành chính của cơ quan quản lý thuế, công chức quản lý thuế khi có căn cứ cho rằng quyết định hoặc hành vi đó là trái pháp luật, xâm phạm quyền, lợi ích hợp pháp của mình."},{"k":"p","t":"2. Cá nhân có quyền tố cáo hành vi vi phạm pháp luật về thuế của người nộp thuế, công chức quản lý thuế hoặc tổ chức, cá nhân khác."},{"k":"p","t":"3. Thẩm quyền, trình tự, thủ tục giải quyết khiếu nại, tố cáo được thực hiện theo quy định của pháp luật về khiếu nại, tố cáo."}]},{"id":"luat-38_148","no":148,"code":"Điều 148","title":"Điều 148. Khởi kiện","shortTitle":"Khởi kiện","chuong":"Chương XVI — KHIẾU NẠI, TỐ CÁO, KHỞI KIỆN","muc":"","level":1,"content":[{"k":"p","t":"Việc khởi kiện quyết định hành chính, hành vi hành chính của cơ quan quản lý thuế, công chức quản lý thuế được thực hiện theo quy định của pháp luật về tố tụng hành chính."}]},{"id":"luat-38_149","no":149,"code":"Điều 149","title":"Điều 149. Trách nhiệm và quyền hạn của cơ quan quản lý thuế trong việc giải quyết khiếu nại về thuế","shortTitle":"Trách nhiệm và quyền hạn của cơ quan quản lý thuế trong việc giải quyết khiếu nại về thuế","chuong":"Chương XVI — KHIẾU NẠI, TỐ CÁO, KHỞI KIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế nhận được khiếu nại về việc thực hiện pháp luật về thuế có quyền yêu cầu người khiếu nại cung cấp hồ sơ, tài liệu liên quan đến việc khiếu nại; nếu người khiếu nại từ chối cung cấp hồ sơ, tài liệu thì có quyền từ chối xem xét giải quyết khiếu nại."},{"k":"p","t":"2. Cơ quan quản lý thuế phải hoàn trả số tiền thuế, tiền chậm nộp, tiền phạt thu không đúng cho người nộp thuế, bên thứ ba trong thời hạn 15 ngày kể từ ngày nhận được quyết định xử lý của cơ quan có thẩm quyền."},{"k":"p","t":"3. Đối với vụ việc khiếu nại phức tạp, thủ trưởng cơ quan quản lý thuế là người giải quyết khiếu nại thực hiện tham vấn các cơ quan, tổ chức có liên quan, bao gồm cả khiếu nại lần đầu. Khi thực hiện việc tham vấn, thủ trưởng cơ quan quản lý thuế phải ban hành quyết định thành lập Hội đồng tham vấn. Hội đồng tham vấn hoạt động theo nguyên tắc biểu quyết theo đa số. Kết quả biểu quyết là cơ sở để thủ trưởng cơ quan quản lý thuế tham khảo khi ra quyết định xử lý khiếu nại. Thủ trưởng cơ quan quản lý thuế là người ra quyết định và chịu trách nhiệm về quyết định xử lý khiếu nại."}]},{"id":"luat-38_150","no":150,"code":"Điều 150","title":"Điều 150. Bổ sung một điều vào Luật Kế toán số 88/2015/QH13","shortTitle":"Bổ sung một điều vào Luật Kế toán số 88/2015/QH13","chuong":"Chương XVII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Bổ sung Điều 70a vào sau Điều 70 trong Chương IV như sau:"},{"k":"p","t":"“Điều 70a. Cung cấp dịch vụ kế toán của tổ chức kinh doanh dịch vụ làm thủ tục về thuế"},{"k":"p","t":"Tổ chức kinh doanh dịch vụ làm thủ tục về thuế được cung cấp dịch vụ kế toán cho doanh nghiệp siêu nhỏ khi có ít nhất một người có chứng chỉ kế toán viên.”."}]},{"id":"luat-38_151","no":151,"code":"Điều 151","title":"Điều 151. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương XVII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2020, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Quy định về hóa đơn, chứng từ điện tử của Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2022; khuyến khích cơ quan, tổ chức, cá nhân áp dụng quy định về hóa đơn, chứng từ điện tử của Luật này trước ngày 01 tháng 7 năm 2022."},{"k":"p","t":"3. Luật Quản lý thuế số 78/2006/QH11 đã được sửa đổi, bổ sung một số điều theo Luật số 21/2012/QH13, Luật số 71/2014/QH13 và Luật số 106/2016/QH13 hết hiệu lực kể từ ngày Luật này có hiệu lực thi hành, trừ trường hợp quy định tại khoản 1 Điều 152 của Luật này."},{"k":"p","t":"4. Căn cứ quy định của Luật này và quy định khác của pháp luật có liên quan, Chính phủ quy định việc áp dụng quy định quản lý khoản thu về thuế của Luật này để quản lý thu đối với các khoản thu khác thuộc ngân sách nhà nước và quy định về quản lý thuế đối với các giao dịch liên kết của những doanh nghiệp có quan hệ liên kết."}]},{"id":"luat-38_152","no":152,"code":"Điều 152","title":"Điều 152. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"Chương XVII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với các khoản thuế được miễn, giảm, không thu, xóa nợ phát sinh trước ngày 01 tháng 7 năm 2020 thì tiếp tục xử lý theo quy định của Luật Quản lý thuế số 78/2006/QH11 đã được sửa đổi, bổ sung một số điều theo Luật số 21/2012/QH13, Luật số 71/2014/QH13 và Luật số 106/2016/QH13."},{"k":"p","t":"2. Đối với các khoản tiền thuế nợ đến hết ngày 30 tháng 6 năm 2020 thì được xử lý theo quy định của Luật này, trừ trường hợp quy định tại khoản 1 Điều này."},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XIV, kỳ họp thứ 7 thông qua ngày 13 tháng 6 năm 2019."},{"k":"tbl","rows":[["","CHỦ TỊCH QUỐC HỘI\n(đã ký)\nNguyễn Thị Kim Ngân"]]}]}],"refs":{"luat-38_1":[{"kind":"replaces","targetSlug":null,"label":"Được thay thế bởi Luật Quản lý thuế 108/2025/QH15","note":"(hiệu lực 01/07/2026)"}]},"details":{},"summaries":{"luat-38_2":{"tldr":"Quy định các đối tượng áp dụng của Luật, gồm người nộp thuế, cơ quan quản lý thuế, công chức quản lý thuế và các cơ quan, tổ chức, cá nhân khác có liên quan.","points":["Người nộp thuế gồm: tổ chức, hộ gia đình, hộ kinh doanh, cá nhân nộp thuế; nộp các khoản thu khác thuộc ngân sách nhà nước; và tổ chức, cá nhân khấu trừ thuế.","Cơ quan thuế gồm Tổng cục Thuế, Cục Thuế, Chi cục Thuế, Chi cục Thuế khu vực.","Cơ quan hải quan gồm Tổng cục Hải quan, Cục Hải quan, Cục Kiểm tra sau thông quan, Chi cục Hải quan.","Công chức quản lý thuế gồm công chức thuế, công chức hải quan.","Cơ quan nhà nước, tổ chức, cá nhân khác có liên quan cũng thuộc đối tượng áp dụng."]},"luat-38_3":{"tldr":"Giải thích các từ ngữ dùng trong Luật như thuế, các khoản thu khác thuộc ngân sách nhà nước, mã số thuế, kỳ tính thuế, hồ sơ thuế và nhiều khái niệm khác.","points":["Mã số thuế là dãy số gồm 10 chữ số hoặc 13 chữ số và ký tự khác do cơ quan thuế cấp.","Năm tính thuế xác định theo năm dương lịch từ ngày 01 tháng 01 đến ngày 31 tháng 12; nếu năm tài chính khác năm dương lịch thì áp dụng theo năm tài chính.","Liệt kê các khoản thu khác thuộc ngân sách nhà nước do và không do cơ quan quản lý thuế quản lý thu.","Định nghĩa các bên có quan hệ liên kết, giao dịch liên kết, giao dịch độc lập và nguyên tắc giao dịch độc lập.","Trường hợp bất khả kháng gồm thiệt hại vật chất do thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ và các trường hợp khác theo quy định của Chính phủ."]},"luat-38_4":{"tldr":"Quy định 11 nội dung quản lý thuế.","points":["Đăng ký thuế, khai thuế, nộp thuế, ấn định thuế; hoàn thuế, miễn thuế, giảm thuế, không thu thuế.","Khoanh tiền thuế nợ; xóa nợ tiền thuế, tiền chậm nộp, tiền phạt; miễn, không tính tiền chậm nộp; gia hạn nộp thuế; nộp dần tiền thuế nợ.","Quản lý thông tin người nộp thuế; quản lý hóa đơn, chứng từ.","Kiểm tra thuế, thanh tra thuế; cưỡng chế thi hành quyết định hành chính về quản lý thuế; xử phạt vi phạm hành chính về quản lý thuế.","Giải quyết khiếu nại, tố cáo; hợp tác quốc tế; tuyên truyền, hỗ trợ người nộp thuế."]},"luat-38_5":{"tldr":"Quy định các nguyên tắc quản lý thuế, bảo đảm công khai, minh bạch, bình đẳng, cải cách thủ tục hành chính và áp dụng quản lý rủi ro.","points":["Mọi tổ chức, hộ gia đình, hộ kinh doanh, cá nhân có nghĩa vụ nộp thuế theo quy định của luật.","Quản lý thuế bảo đảm công khai, minh bạch, bình đẳng và bảo đảm quyền, lợi ích hợp pháp của người nộp thuế.","Cải cách thủ tục hành chính, ứng dụng công nghệ thông tin; áp dụng nguyên tắc bản chất hoạt động, giao dịch quyết định nghĩa vụ thuế và quản lý rủi ro.","Áp dụng biện pháp ưu tiên đối với hàng hóa xuất khẩu, nhập khẩu theo pháp luật về hải quan và quy định của Chính phủ."]},"luat-38_6":{"tldr":"Quy định 8 hành vi bị nghiêm cấm trong quản lý thuế.","points":["Thông đồng, móc nối, bao che giữa người nộp thuế và công chức, cơ quan quản lý thuế để chuyển giá, trốn thuế.","Gây phiền hà, sách nhiễu người nộp thuế; lợi dụng để chiếm đoạt hoặc sử dụng trái phép tiền thuế.","Cố tình không kê khai hoặc kê khai thuế không đầy đủ, kịp thời, chính xác; cản trở công chức quản lý thuế thi hành công vụ.","Sử dụng mã số thuế của người khác để vi phạm pháp luật hoặc cho người khác sử dụng mã số thuế của mình không đúng quy định.","Bán hàng, cung cấp dịch vụ không xuất hóa đơn, sử dụng hóa đơn không hợp pháp; làm sai lệch, phá hủy hệ thống thông tin người nộp thuế."]},"luat-38_7":{"tldr":"Quy định đồng tiền khai thuế, nộp thuế là Đồng Việt Nam, trừ các trường hợp được phép dùng ngoại tệ tự do chuyển đổi.","points":["Đồng tiền khai thuế, nộp thuế là Đồng Việt Nam, trừ trường hợp được phép khai, nộp bằng ngoại tệ tự do chuyển đổi.","Người hạch toán kế toán bằng ngoại tệ phải quy đổi ra Đồng Việt Nam theo tỷ giá giao dịch thực tế tại thời điểm phát sinh giao dịch.","Đối với hàng hóa xuất khẩu, nhập khẩu, tỷ giá tính thuế thực hiện theo quy định của pháp luật về hải quan.","Bộ trưởng Bộ Tài chính quy định đồng tiền khai, nộp thuế bằng ngoại tệ và tỷ giá giao dịch thực tế."]},"luat-38_8":{"tldr":"Quy định việc giao dịch điện tử trong lĩnh vực thuế; người nộp thuế đủ điều kiện phải giao dịch điện tử và không phải thực hiện phương thức giao dịch khác.","points":["Người nộp thuế và các bên đủ điều kiện phải thực hiện giao dịch điện tử với cơ quan quản lý thuế.","Người nộp thuế đã giao dịch điện tử thì không phải thực hiện phương thức giao dịch khác.","Chứng từ điện tử phải được ký điện tử phù hợp với pháp luật về giao dịch điện tử.","Cơ quan, tổ chức đã kết nối thông tin điện tử không được yêu cầu người nộp thuế nộp chứng từ giấy.","Bộ trưởng Bộ Tài chính quy định hồ sơ, thủ tục về giao dịch điện tử trong lĩnh vực thuế."]},"luat-38_9":{"tldr":"Quy định việc áp dụng quản lý rủi ro trong quản lý thuế của cơ quan thuế và cơ quan hải quan, dựa trên đánh giá tuân thủ pháp luật và phân loại mức độ rủi ro của người nộp thuế.","points":["Cơ quan thuế áp dụng quản lý rủi ro trong đăng ký thuế, khai thuế, nộp thuế, nợ thuế, cưỡng chế, hoàn thuế, kiểm tra, thanh tra, quản lý hóa đơn, chứng từ và nghiệp vụ khác.","Cơ quan hải quan áp dụng quản lý rủi ro trong khai thuế, hoàn thuế, không thu thuế, kiểm tra, thanh tra và nghiệp vụ khác.","Đánh giá mức độ tuân thủ pháp luật dựa trên hệ thống tiêu chí, lịch sử hoạt động, quá trình tuân thủ và mức độ vi phạm của người nộp thuế.","Cơ quan quản lý thuế ứng dụng công nghệ thông tin để tự động tích hợp, xử lý dữ liệu phục vụ quản lý rủi ro.","Bộ trưởng Bộ Tài chính quy định tiêu chí đánh giá tuân thủ, phân loại mức độ rủi ro và việc áp dụng quản lý rủi ro."]},"luat-38_10":{"tldr":"Quy định việc xây dựng lực lượng quản lý thuế trong sạch, vững mạnh, hiện đại; công chức quản lý thuế được tuyển dụng, đào tạo theo pháp luật về cán bộ, công chức.","points":["Lực lượng quản lý thuế được xây dựng trong sạch, vững mạnh, trang bị kỹ thuật hiện đại, hoạt động hiệu lực, hiệu quả.","Công chức quản lý thuế được tuyển dụng, bổ nhiệm, đào tạo, quản lý theo pháp luật về cán bộ, công chức.","Chế độ phục vụ, chức danh, tiêu chuẩn, lương, đãi ngộ, cấp hiệu, trang phục thực hiện theo quy định của pháp luật.","Cơ quan quản lý thuế có trách nhiệm đào tạo, xây dựng đội ngũ công chức quản lý thuế."]},"luat-38_11":{"tldr":"Quy định việc hiện đại hóa công tác quản lý thuế về phương pháp, thủ tục, bộ máy, ứng dụng công nghệ thông tin và phát triển thanh toán qua ngân hàng.","points":["Hiện đại hóa quản lý thuế về phương pháp, thủ tục hành chính, bộ máy, đội ngũ và áp dụng rộng rãi công nghệ thông tin trên cơ sở dữ liệu chính xác về người nộp thuế.","Nhà nước bảo đảm nguồn lực tài chính để thực hiện theo tình hình phát triển kinh tế - xã hội từng thời kỳ.","Đẩy mạnh dịch vụ thanh toán qua ngân hàng thương mại, tổ chức tín dụng để hạn chế giao dịch bằng tiền mặt.","Cơ quan quản lý thuế xây dựng hệ thống công nghệ thông tin, tiêu chuẩn kỹ thuật, định dạng dữ liệu về hóa đơn, chứng từ điện tử, hồ sơ thuế."]},"luat-38_12":{"tldr":"Quy định trách nhiệm hợp tác quốc tế về thuế của cơ quan quản lý thuế, gồm tham mưu đàm phán điều ước quốc tế, trao đổi thông tin và hỗ trợ thu thuế.","points":["Tham mưu giúp Bộ trưởng Bộ Tài chính đề xuất đàm phán, ký kết, thực hiện các điều ước quốc tế mà Việt Nam là thành viên.","Đàm phán, ký kết và tổ chức thực hiện thỏa thuận song phương, đa phương với cơ quan quản lý thuế nước ngoài.","Tổ chức khai thác, trao đổi thông tin và hợp tác nghiệp vụ với cơ quan quản lý thuế nước ngoài, các tổ chức quốc tế.","Đề nghị cơ quan nước ngoài hỗ trợ thu các khoản nợ thuế tại Việt Nam khi người nộp thuế không còn ở Việt Nam.","Thực hiện hỗ trợ thu thuế theo đề nghị của cơ quan nước ngoài bằng biện pháp đôn đốc thu nợ thuế."]},"luat-38_13":{"tldr":"Quy định cơ quan quản lý thuế thực hiện hạch toán kế toán và thống kê về thuế, hằng năm nộp báo cáo và công khai thông tin theo quy định.","points":["Cơ quan quản lý thuế hạch toán kế toán tiền thuế, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước theo pháp luật về kế toán và ngân sách nhà nước.","Thực hiện thống kê số tiền thuế được ưu đãi, miễn, giảm và các thông tin thống kê khác theo pháp luật về thống kê và thuế.","Hằng năm nộp báo cáo kế toán, thống kê về thuế cho cơ quan có thẩm quyền và công khai thông tin theo quy định."]},"luat-38_14":{"tldr":"Quy định nhiệm vụ, quyền hạn của Chính phủ trong quản lý thuế, gồm thống nhất quản lý nhà nước, gia hạn nộp thuế và báo cáo Quốc hội.","points":["Thống nhất quản lý nhà nước về quản lý thuế, bảo đảm phối hợp giữa cơ quan quản lý ngành và địa phương.","Gia hạn nộp thuế cho các đối tượng, ngành, nghề sản xuất, kinh doanh trong trường hợp khó khăn đặc biệt trong từng thời kỳ.","Báo cáo Quốc hội, Ủy ban Thường vụ Quốc hội, Chủ tịch nước về tình hình quản lý thuế theo yêu cầu."]},"luat-38_15":{"tldr":"Quy định nhiệm vụ, quyền hạn, trách nhiệm của Bộ Tài chính (cơ quan chủ trì) và các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ trong việc phối hợp quản lý thuế.","points":["Bộ Tài chính chủ trì giúp Chính phủ thống nhất quản lý nhà nước về thuế: ban hành văn bản, tổ chức quản lý thuế, lập dự toán thu, kiểm tra, thanh tra, hợp tác quốc tế.","Bộ Công an kết nối thông tin về hoàn thành nghĩa vụ thuế đối với phương tiện giao thông và xử lý tội phạm trong lĩnh vực thuế.","Bộ Công Thương, Bộ Thông tin và Truyền thông phối hợp quản lý thuế đối với thương mại điện tử, dịch vụ Internet, trò chơi điện tử trên mạng.","Ngân hàng Nhà nước chỉ đạo tổ chức tín dụng cung cấp thông tin, phối hợp cưỡng chế và phát triển hệ thống thanh toán thương mại điện tử.","Các Bộ Kế hoạch và Đầu tư, Tài nguyên và Môi trường, Giao thông vận tải, Lao động - Thương binh và Xã hội, Y tế và Bộ, cơ quan khác phối hợp cung cấp thông tin, kết nối phục vụ quản lý thuế."]},"luat-38_16":{"tldr":"Quy định 14 quyền của người nộp thuế, gồm được hỗ trợ, giữ bí mật thông tin, hưởng ưu đãi, hoàn thuế, khiếu nại, khởi kiện và sử dụng chứng từ điện tử.","points":["Được hỗ trợ, hướng dẫn nộp thuế; được cung cấp thông tin, tài liệu để thực hiện nghĩa vụ, quyền lợi về thuế.","Yêu cầu cơ quan quản lý thuế giải thích việc tính thuế, ấn định thuế; được giữ bí mật thông tin trừ trường hợp phải cung cấp theo quy định.","Hưởng ưu đãi, hoàn thuế; được biết thời hạn giải quyết hoàn thuế, số tiền thuế không được hoàn và căn cứ pháp lý.","Được bồi thường thiệt hại do cơ quan, công chức quản lý thuế gây ra; khiếu nại, khởi kiện, tố cáo theo quy định.","Không bị xử phạt, không tính tiền chậm nộp khi thực hiện theo văn bản hướng dẫn và quyết định xử lý của cơ quan thuế, cơ quan có thẩm quyền; được tra cứu và sử dụng chứng từ điện tử."]},"luat-38_17":{"tldr":"Quy định 13 trách nhiệm của người nộp thuế, gồm đăng ký thuế, khai thuế chính xác, nộp thuế đúng hạn, chấp hành chế độ kế toán, hóa đơn và cung cấp thông tin.","points":["Thực hiện đăng ký thuế, sử dụng mã số thuế theo quy định.","Khai thuế chính xác, trung thực, đầy đủ và nộp hồ sơ đúng thời hạn; nộp tiền thuế, tiền chậm nộp, tiền phạt đầy đủ, đúng thời hạn, đúng địa điểm.","Chấp hành chế độ kế toán, thống kê, quản lý, sử dụng hóa đơn, chứng từ; lập và giao hóa đơn, chứng từ cho người mua đúng số lượng, chủng loại, giá trị thực thanh toán.","Cung cấp chính xác, đầy đủ, kịp thời thông tin, tài liệu liên quan đến xác định nghĩa vụ thuế, kể cả thông tin về tài khoản tại ngân hàng, tổ chức tín dụng.","Người nộp thuế có giao dịch liên kết phải lập, lưu trữ, kê khai, cung cấp hồ sơ thông tin về mình và các bên liên kết, kể cả bên cư trú ngoài Việt Nam, theo quy định của Chính phủ."]},"luat-38_18":{"tldr":"Quy định 11 nhiệm vụ của cơ quan quản lý thuế, gồm tổ chức thu thuế, tuyên truyền, bảo mật thông tin, miễn giảm xóa nợ, hoàn thuế và bồi thường thiệt hại.","points":["Tổ chức thực hiện quản lý thu thuế và các khoản thu khác thuộc ngân sách nhà nước; tuyên truyền, phổ biến, công khai thủ tục về thuế.","Giải thích, cung cấp thông tin về nghĩa vụ thuế; công khai mức thuế phải nộp của hộ kinh doanh, cá nhân kinh doanh trên địa bàn xã, phường, thị trấn.","Bảo mật thông tin người nộp thuế trừ trường hợp phải cung cấp hoặc công bố công khai theo quy định.","Thực hiện miễn, giảm thuế; xóa nợ, miễn, không tính tiền chậm nộp, tiền phạt; gia hạn, nộp dần, khoanh tiền thuế nợ, không thu thuế, hoàn thuế.","Giải quyết khiếu nại, tố cáo; bồi thường thiệt hại; giám định; xây dựng hệ thống thông tin điện tử."]},"luat-38_19":{"tldr":"Quy định 10 quyền hạn của cơ quan quản lý thuế, gồm yêu cầu cung cấp thông tin, kiểm tra, thanh tra, ấn định thuế, cưỡng chế, xử phạt và áp dụng thỏa thuận trước về giá tính thuế.","points":["Yêu cầu người nộp thuế và tổ chức, cá nhân liên quan cung cấp thông tin, tài liệu liên quan đến xác định nghĩa vụ thuế, kể cả thông tin tài khoản ngân hàng.","Kiểm tra thuế, thanh tra thuế; ấn định thuế; cưỡng chế thi hành quyết định hành chính về quản lý thuế.","Xử phạt vi phạm hành chính về quản lý thuế và công khai trên phương tiện thông tin đại chúng các trường hợp vi phạm.","Ủy nhiệm cho cơ quan, tổ chức, cá nhân thu một số loại thuế theo quy định của Chính phủ.","Áp dụng cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế; mua thông tin, tài liệu, dữ liệu phục vụ quản lý thuế."]},"luat-38_20":{"tldr":"Quy định nhiệm vụ, quyền hạn của Hội đồng nhân dân và Ủy ban nhân dân các cấp trong việc quyết định, giám sát và phối hợp thực hiện pháp luật về thuế tại địa phương.","points":["Hội đồng nhân dân các cấp quyết định nhiệm vụ thu ngân sách hằng năm và giám sát việc thực hiện pháp luật về thuế tại địa phương.","Ủy ban nhân dân các cấp chỉ đạo các cơ quan liên quan phối hợp lập dự toán và tổ chức thực hiện nhiệm vụ thu thuế trên địa bàn.","Phối hợp với Bộ Tài chính, cơ quan quản lý thuế trong việc quản lý, thực hiện pháp luật về thuế.","Xử phạt vi phạm hành chính và giải quyết khiếu nại, tố cáo liên quan đến pháp luật về thuế theo thẩm quyền."]},"luat-38_21":{"tldr":"Quy định nhiệm vụ, quyền hạn của Kiểm toán nhà nước trong việc kiểm toán cơ quan quản lý thuế và xử lý kiến nghị liên quan đến nghĩa vụ thuế của người nộp thuế.","points":["Thực hiện kiểm toán hoạt động đối với cơ quan quản lý thuế theo pháp luật về kiểm toán nhà nước, pháp luật về thuế và pháp luật liên quan.","Khi Kiểm toán nhà nước trực tiếp kiểm toán người nộp thuế, người nộp thuế thực hiện kiến nghị theo báo cáo kiểm toán; nếu không đồng ý thì có quyền khiếu nại.","Khi kiểm toán tại cơ quan quản lý thuế có kiến nghị liên quan nghĩa vụ thuế, Kiểm toán nhà nước gửi bản trích sao cho người nộp thuế; cơ quan quản lý thuế tổ chức thực hiện.","Nếu người nộp thuế không đồng ý nghĩa vụ thuế phải nộp, Kiểm toán nhà nước chủ trì, phối hợp với cơ quan quản lý thuế xác định chính xác nghĩa vụ thuế và chịu trách nhiệm theo quy định."]},"luat-38_22":{"tldr":"Quy định nhiệm vụ, quyền hạn của Thanh tra nhà nước trong việc thanh tra cơ quan quản lý thuế và xử lý kết luận liên quan đến nghĩa vụ thuế của người nộp thuế.","points":["Thực hiện thanh tra hoạt động của cơ quan quản lý thuế theo pháp luật về thanh tra, pháp luật về thuế và pháp luật liên quan.","Khi Thanh tra nhà nước trực tiếp thanh tra người nộp thuế, người nộp thuế thực hiện kết luận; nếu không đồng ý thì có quyền khiếu nại.","Khi thanh tra tại cơ quan quản lý thuế có kiến nghị liên quan nghĩa vụ thuế, Thanh tra nhà nước gửi bản trích sao cho người nộp thuế; cơ quan quản lý thuế tổ chức thực hiện.","Nếu người nộp thuế không đồng ý nghĩa vụ thuế phải nộp, Thanh tra nhà nước chủ trì, phối hợp với cơ quan quản lý thuế xác định chính xác nghĩa vụ thuế và chịu trách nhiệm theo quy định."]},"luat-38_23":{"tldr":"Quy định trách nhiệm của cơ quan điều tra, Viện kiểm sát, Tòa án trong việc tiếp nhận, xử lý, điều tra, truy tố, xét xử tội phạm trong lĩnh vực thuế.","points":["Cơ quan điều tra, Viện kiểm sát, Tòa án tiếp nhận, xử lý, giải quyết tin báo, tố giác tội phạm và kiến nghị khởi tố trong lĩnh vực thuế.","Khởi tố, điều tra, truy tố, xét xử kịp thời, nghiêm minh tội phạm trong lĩnh vực thuế theo quy định của pháp luật.","Thông báo kết quả xử lý cho cơ quan quản lý thuế."]},"luat-38_24":{"tldr":"Quy định nhiệm vụ, quyền hạn của Mặt trận Tổ quốc Việt Nam trong việc tuyên truyền, vận động thi hành và giám sát, phản biện xã hội về thuế.","points":["Tuyên truyền, vận động các tầng lớp nhân dân nghiêm chỉnh thi hành pháp luật về thuế.","Thực hiện giám sát, phản biện xã hội về thuế; phản ánh, kiến nghị với cơ quan nhà nước giải quyết các vấn đề về thuế."]},"luat-38_25":{"tldr":"Quy định nhiệm vụ, quyền hạn của tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong việc phối hợp tuyên truyền và cung cấp thông tin về quản lý thuế.","points":["Phối hợp với cơ quan quản lý thuế tuyên truyền, phổ biến, giáo dục pháp luật về thuế đến các hội viên.","Phối hợp với cơ quan quản lý thuế trong việc cung cấp thông tin liên quan đến quản lý thuế."]},"luat-38_26":{"tldr":"Quy định nhiệm vụ, quyền hạn của cơ quan thông tin, báo chí trong tuyên truyền, phổ biến pháp luật về thuế và phối hợp cung cấp thông tin với cơ quan quản lý thuế.","points":["Tuyên truyền, phổ biến chính sách, pháp luật về thuế; nêu gương tổ chức, cá nhân thực hiện tốt và phê phán hành vi vi phạm.","Phối hợp với cơ quan quản lý thuế trong việc đăng tải, cung cấp thông tin theo quy định pháp luật."]},"luat-38_27":{"tldr":"Quy định trách nhiệm của ngân hàng thương mại khi phối hợp thu thuế và các khoản thu ngân sách nhà nước, gồm nộp/hoàn thuế điện tử, cung cấp thông tin tài khoản, khấu trừ nộp thay, trích tiền/phong tỏa tài khoản và trách nhiệm bảo lãnh.","points":["Phối hợp nộp thuế, hoàn thuế điện tử; truyền nhận chứng từ, chuyển tiền cho Kho bạc; hỗ trợ người nộp thuế; bảo mật thông tin.","Cung cấp thông tin số hiệu tài khoản theo mã số thuế khi người nộp thuế mở tài khoản.","Khấu trừ, nộp thay nghĩa vụ thuế của tổ chức, cá nhân nước ngoài kinh doanh thương mại điện tử có thu nhập từ Việt Nam.","Trích tiền nộp thuế, phong tỏa tài khoản người nộp thuế bị cưỡng chế theo đề nghị của cơ quan quản lý thuế.","Ngân hàng bảo lãnh phải nộp thay tiền thuế, tiền chậm nộp, tiền phạt trong phạm vi bảo lãnh nếu người nộp thuế không nộp đúng hạn.","Chính phủ quy định chi tiết Điều này."]},"luat-38_28":{"tldr":"Quy định việc thành lập, nhiệm vụ và kinh phí hoạt động của Hội đồng tư vấn thuế xã, phường, thị trấn.","points":["Chủ tịch UBND cấp huyện quyết định thành lập Hội đồng theo đề nghị của Chi cục trưởng Chi cục Thuế, Chi cục Thuế khu vực.","Hội đồng tư vấn về doanh thu, mức thuế của hộ, cá nhân kinh doanh nộp thuế khoán và phối hợp đôn đốc nghĩa vụ thuế.","Kinh phí hoạt động do cơ quan thuế chi từ nguồn ngân sách nhà nước cấp cho ngành thuế.","Bộ trưởng Bộ Tài chính quy định về hoạt động, quyền hạn, trách nhiệm của Hội đồng."]},"luat-38_29":{"tldr":"Quy định nhiệm vụ, quyền hạn của tổ chức, cá nhân khác trong việc phối hợp quản lý thuế.","points":["Cung cấp thông tin liên quan đến xác định nghĩa vụ thuế theo đề nghị của cơ quan quản lý thuế.","Phối hợp thực hiện các quyết định xử phạt vi phạm hành chính về quản lý thuế.","Tố giác hành vi vi phạm pháp luật về thuế đến cơ quan quản lý thuế hoặc cơ quan có thẩm quyền.","Yêu cầu người bán giao hóa đơn, chứng từ đúng số lượng, chủng loại, giá trị thực thanh toán khi mua hàng hóa, dịch vụ."]},"luat-38_30":{"tldr":"Quy định đối tượng đăng ký thuế, cấu trúc mã số thuế, nguyên tắc cấp mã số thuế và các nội dung đăng ký thuế.","points":["Người nộp thuế phải đăng ký thuế và được cấp mã số thuế trước khi hoạt động sản xuất, kinh doanh hoặc phát sinh nghĩa vụ với ngân sách.","Mã số thuế 10 chữ số dùng cho doanh nghiệp, tổ chức có tư cách pháp nhân, đại diện hộ gia đình, hộ kinh doanh, cá nhân khác.","Mã số thuế 13 chữ số và ký tự khác dùng cho đơn vị phụ thuộc và đối tượng khác.","Doanh nghiệp, tổ chức được cấp 01 mã số thuế duy nhất dùng suốt quá trình hoạt động; cá nhân được cấp 01 mã số thuế duy nhất dùng suốt cuộc đời.","Mã số thuế đã cấp không được sử dụng lại cho người nộp thuế khác; sau chuyển đổi, bán, tặng, cho, thừa kế thì giữ nguyên.","Đăng ký thuế gồm: lần đầu, thay đổi thông tin, tạm ngừng hoạt động, chấm dứt hiệu lực và khôi phục mã số thuế."]},"luat-38_31":{"tldr":"Quy định hồ sơ đăng ký thuế lần đầu đối với người nộp thuế đăng ký cùng đăng ký kinh doanh, tổ chức và hộ gia đình, hộ kinh doanh, cá nhân đăng ký trực tiếp.","points":["Đăng ký thuế cùng đăng ký doanh nghiệp/HTX/kinh doanh thì hồ sơ là hồ sơ đăng ký doanh nghiệp, HTX, kinh doanh.","Tổ chức đăng ký trực tiếp: tờ khai đăng ký thuế; bản sao giấy phép thành lập, quyết định thành lập, giấy chứng nhận đăng ký đầu tư hoặc giấy tờ tương đương; các giấy tờ khác liên quan.","Hộ gia đình, hộ kinh doanh, cá nhân đăng ký trực tiếp: tờ khai đăng ký thuế hoặc tờ khai thuế; bản sao CMND/CCCD/hộ chiếu; các giấy tờ khác liên quan.","Kết nối thông tin giữa cơ quan quản lý nhà nước và cơ quan thuế để nhận hồ sơ, cấp mã số thuế theo cơ chế một cửa liên thông qua cổng thông tin điện tử."]},"luat-38_32":{"tldr":"Quy định địa điểm nộp hồ sơ đăng ký thuế lần đầu theo từng đối tượng người nộp thuế.","points":["Đăng ký cùng đăng ký kinh doanh thì địa điểm nộp là địa điểm nộp hồ sơ đăng ký doanh nghiệp, HTX, kinh doanh.","Tổ chức, hộ kinh doanh, cá nhân kinh doanh nộp tại cơ quan thuế nơi có trụ sở.","Tổ chức, cá nhân khấu trừ, nộp thuế thay nộp tại cơ quan thuế quản lý trực tiếp.","Hộ gia đình, cá nhân không kinh doanh nộp tại nơi phát sinh thu nhập chịu thuế, nơi đăng ký thường trú/tạm trú hoặc nơi phát sinh nghĩa vụ với ngân sách.","Cá nhân ủy quyền cho tổ chức, cá nhân chi trả thu nhập nộp hồ sơ thay; tổ chức chi trả tổng hợp nộp đến cơ quan thuế quản lý trực tiếp tổ chức đó."]},"luat-38_33":{"tldr":"Quy định thời hạn đăng ký thuế lần đầu, trong đó đăng ký trực tiếp là 10 ngày làm việc kể từ các thời điểm phát sinh.","points":["Đăng ký cùng đăng ký kinh doanh thì thời hạn là thời hạn đăng ký doanh nghiệp, HTX, kinh doanh.","Đăng ký trực tiếp với cơ quan thuế: thời hạn 10 ngày làm việc kể từ ngày được cấp giấy chứng nhận, bắt đầu kinh doanh, phát sinh trách nhiệm khấu trừ/nộp thay, ký hợp đồng, phát sinh nghĩa vụ thuế TNCN, yêu cầu hoàn thuế hoặc nghĩa vụ khác với ngân sách.","Tổ chức, cá nhân chi trả thu nhập đăng ký thay cho cá nhân chậm nhất 10 ngày làm việc kể từ ngày phát sinh nghĩa vụ thuế (nếu cá nhân chưa có mã số thuế).","Đăng ký thay cho người phụ thuộc chậm nhất 10 ngày làm việc kể từ ngày đăng ký giảm trừ gia cảnh (nếu người phụ thuộc chưa có mã số thuế)."]},"luat-38_34":{"tldr":"Quy định thời hạn và thông tin của giấy chứng nhận đăng ký thuế, các trường hợp thông báo mã số thuế thay giấy chứng nhận và việc cấp lại.","points":["Cơ quan thuế cấp giấy chứng nhận đăng ký thuế trong 03 ngày làm việc kể từ ngày nhận đủ hồ sơ.","Giấy chứng nhận gồm: tên người nộp thuế; mã số thuế; thông tin giấy chứng nhận/giấy phép/quyết định/giấy tờ tùy thân; cơ quan thuế quản lý trực tiếp.","Thông báo mã số thuế thay giấy chứng nhận trong các trường hợp: ủy quyền đăng ký thay, đăng ký qua hồ sơ khai thuế, đăng ký để khấu trừ nộp thay, đăng ký cho người phụ thuộc.","Trường hợp mất, rách, nát, cháy giấy chứng nhận hoặc thông báo mã số thuế thì cấp lại trong 02 ngày làm việc kể từ ngày nhận đủ hồ sơ."]},"luat-38_35":{"tldr":"Quy định việc sử dụng mã số thuế của người nộp thuế và các cơ quan, tổ chức liên quan trong các giao dịch và quản lý thuế.","points":["Người nộp thuế phải ghi mã số thuế vào hóa đơn, chứng từ, tài liệu khi giao dịch, mở tài khoản, khai/nộp/miễn/giảm/hoàn thuế và các giao dịch về thuế khác.","Người nộp thuế cung cấp mã số thuế cho cơ quan, tổ chức liên quan hoặc ghi trên hồ sơ khi thực hiện thủ tục hành chính một cửa liên thông.","Cơ quan quản lý thuế, Kho bạc Nhà nước, ngân hàng thương mại, tổ chức ủy nhiệm thu sử dụng mã số thuế trong quản lý và thu thuế.","Ngân hàng thương mại, tổ chức tín dụng khác ghi mã số thuế trong hồ sơ mở tài khoản và chứng từ giao dịch qua tài khoản.","Khi bên Việt Nam chi trả cho tổ chức, cá nhân kinh doanh xuyên biên giới không hiện diện tại Việt Nam thì dùng mã số thuế đã cấp để khấu trừ, nộp thay.","Khi mã số định danh cá nhân được cấp cho toàn bộ dân cư thì dùng mã số định danh cá nhân thay cho mã số thuế."]},"luat-38_36":{"tldr":"Quy định việc thông báo thay đổi thông tin đăng ký thuế theo từng đối tượng, với thời hạn 10 ngày làm việc đối với đăng ký trực tiếp.","points":["Đăng ký cùng đăng ký kinh doanh thì thông báo thay đổi thông tin cùng với thay đổi nội dung đăng ký doanh nghiệp, HTX, kinh doanh.","Trường hợp thay đổi địa chỉ trụ sở dẫn đến thay đổi cơ quan thuế quản lý, phải làm thủ tục thuế với cơ quan thuế quản lý trực tiếp trước khi đăng ký thay đổi với cơ quan đăng ký kinh doanh.","Đăng ký trực tiếp với cơ quan thuế: thông báo cho cơ quan thuế quản lý trực tiếp trong 10 ngày làm việc kể từ ngày phát sinh thông tin thay đổi.","Cá nhân ủy quyền cho tổ chức, cá nhân chi trả thu nhập: thông báo cho tổ chức chi trả chậm nhất 10 ngày làm việc kể từ ngày phát sinh thay đổi; tổ chức chi trả thông báo cho cơ quan thuế chậm nhất 10 ngày làm việc kể từ ngày nhận ủy quyền."]},"luat-38_37":{"tldr":"Quy định việc thông báo khi tạm ngừng hoạt động, kinh doanh và quản lý thuế trong thời gian tạm ngừng.","points":["Tổ chức, hộ kinh doanh, cá nhân kinh doanh thuộc diện đăng ký kinh doanh: cơ quan thuế căn cứ thông báo của người nộp thuế hoặc cơ quan có thẩm quyền để quản lý thuế.","Đối tượng không thuộc diện đăng ký kinh doanh: thông báo đến cơ quan thuế quản lý trực tiếp chậm nhất 01 ngày làm việc trước khi tạm ngừng hoặc tiếp tục hoạt động trước thời hạn.","Chính phủ quy định về quản lý thuế đối với người nộp thuế trong thời hạn tạm ngừng hoặc tiếp tục hoạt động trước thời hạn."]},"luat-38_38":{"tldr":"Quy định việc đăng ký thuế trong trường hợp tổ chức lại doanh nghiệp.","points":["Đăng ký thuế cùng đăng ký kinh doanh thì thực hiện đăng ký thuế cùng đăng ký doanh nghiệp, HTX, kinh doanh khi tổ chức lại.","Đăng ký trực tiếp với cơ quan thuế: chấm dứt hiệu lực mã số thuế với tổ chức bị chia, sáp nhập, hợp nhất hoặc thay đổi thông tin với tổ chức bị tách; đăng ký mới hoặc thay đổi thông tin với tổ chức mới sau khi chia, tách, sáp nhập, hợp nhất."]},"luat-38_39":{"tldr":"Quy định các trường hợp, nguyên tắc, hồ sơ và thời hạn chấm dứt hiệu lực mã số thuế.","points":["Đăng ký cùng đăng ký kinh doanh chấm dứt hiệu lực mã số thuế khi: chấm dứt kinh doanh/giải thể/phá sản, bị thu hồi giấy chứng nhận, bị chia/sáp nhập/hợp nhất.","Đăng ký trực tiếp chấm dứt hiệu lực mã số thuế trong các trường hợp gồm chấm dứt kinh doanh, bị thu hồi giấy phép, bị chia/sáp nhập/hợp nhất, không hoạt động tại địa chỉ đăng ký, cá nhân chết/mất tích/mất năng lực, nhà thầu nước ngoài/dầu khí kết thúc hợp đồng.","Mã số thuế không được sử dụng trong giao dịch kinh tế kể từ ngày cơ quan thuế thông báo chấm dứt hiệu lực; mã số thuế tổ chức đã chấm dứt không được dùng lại trừ trường hợp Điều 40.","Khi đơn vị chủ quản chấm dứt hiệu lực mã số thuế thì đơn vị phụ thuộc bị chấm dứt; chấm dứt mã số thuế chính thì đồng thời chấm dứt mã số thuế nộp thay.","Hồ sơ gồm: văn bản đề nghị chấm dứt hiệu lực mã số thuế và các giấy tờ khác có liên quan.","Đăng ký trực tiếp nộp hồ sơ chấm dứt hiệu lực mã số thuế trong 10 ngày làm việc kể từ ngày có văn bản chấm dứt hoạt động/kinh doanh hoặc ngày kết thúc hợp đồng."]},"luat-38_40":{"tldr":"Quy định các trường hợp, hồ sơ và thời điểm khôi phục mã số thuế.","points":["Đăng ký cùng đăng ký kinh doanh: được khôi phục mã số thuế đồng thời khi được khôi phục tình trạng pháp lý.","Đăng ký trực tiếp nộp hồ sơ khôi phục khi: được hủy bỏ văn bản thu hồi giấy chứng nhận, có nhu cầu tiếp tục kinh doanh trước khi cơ quan thuế ban hành thông báo chấm dứt, hoặc bị thông báo không hoạt động tại địa chỉ nhưng chưa bị thu hồi giấy phép và chưa chấm dứt mã số thuế.","Mã số thuế được tiếp tục sử dụng kể từ ngày quyết định khôi phục tình trạng pháp lý có hiệu lực hoặc ngày cơ quan thuế thông báo khôi phục.","Hồ sơ gồm: văn bản đề nghị khôi phục mã số thuế và các giấy tờ khác có liên quan."]},"luat-38_41":{"tldr":"Quy định trách nhiệm của Bộ trưởng Bộ Tài chính và cơ quan thuế trong việc tiếp nhận và xử lý hồ sơ đăng ký thuế.","points":["Bộ trưởng Bộ Tài chính quy định chi tiết hồ sơ, thủ tục, mẫu biểu đăng ký thuế tại các điều 31, 34, 36, 37, 38, 39 và 40.","Cơ quan thuế tiếp nhận hồ sơ qua: trực tiếp tại cơ quan thuế, đường bưu chính, hoặc điện tử qua cổng giao dịch điện tử và hệ thống thông tin quốc gia về đăng ký kinh doanh.","Hồ sơ đầy đủ: thông báo chấp nhận và thời hạn giải quyết chậm nhất 03 ngày làm việc kể từ ngày nhận đủ hồ sơ.","Hồ sơ không đầy đủ: thông báo cho người nộp thuế chậm nhất 02 ngày làm việc kể từ ngày tiếp nhận.","Hồ sơ từ hệ thống thông tin quốc gia về đăng ký kinh doanh thì cơ quan tiếp nhận chuyển hồ sơ đến cơ quan thuế để xử lý và trả kết quả."]},"luat-38_42":{"tldr":"Quy định nguyên tắc khai thuế, tính thuế gồm tự khai tự tính, địa điểm khai, nghĩa vụ của nhà cung cấp nước ngoài, kê khai giao dịch liên kết và cơ chế thỏa thuận trước về giá tính thuế.","points":["Người nộp thuế khai chính xác, trung thực, đầy đủ theo mẫu của Bộ Tài chính và nộp đủ chứng từ, tài liệu trong hồ sơ khai thuế.","Người nộp thuế tự tính số tiền thuế phải nộp, trừ trường hợp cơ quan quản lý thuế tính theo quy định của Chính phủ.","Khai thuế tại cơ quan thuế nơi có trụ sở; nếu hạch toán tập trung có đơn vị phụ thuộc ở tỉnh khác thì khai tại trụ sở chính và phân bổ nghĩa vụ thuế theo từng địa phương.","Nhà cung cấp ở nước ngoài kinh doanh thương mại điện tử, nền tảng số không có cơ sở thường trú tại Việt Nam có nghĩa vụ trực tiếp hoặc ủy quyền đăng ký, khai, nộp thuế tại Việt Nam.","Kê khai, xác định giá giao dịch liên kết theo nguyên tắc phân tích, so sánh với giao dịch độc lập, bản chất quyết định hình thức, không làm giảm thu nhập chịu thuế; người nộp thuế quy mô nhỏ, rủi ro thấp được miễn và áp dụng cơ chế đơn giản hóa.","Cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế thực hiện trên đề nghị của người nộp thuế, dựa trên thông tin có kiểm chứng, phải được Bộ trưởng Bộ Tài chính phê duyệt trước khi thực hiện."]},"luat-38_43":{"tldr":"Quy định hồ sơ khai thuế theo tháng, quý, năm, từng lần phát sinh, hàng hóa xuất nhập khẩu, trường hợp chấm dứt hoạt động/tổ chức lại và báo cáo lợi nhuận liên quốc gia.","points":["Khai theo tháng là tờ khai thuế tháng; khai theo quý là tờ khai thuế quý.","Kỳ tính thuế theo năm gồm: hồ sơ khai thuế năm (tờ khai năm và tài liệu liên quan) và hồ sơ khai quyết toán thuế (tờ khai quyết toán năm, báo cáo tài chính năm, tờ khai giao dịch liên kết, tài liệu khác).","Khai theo từng lần phát sinh gồm: tờ khai thuế; hóa đơn, hợp đồng và chứng từ khác liên quan.","Hàng hóa xuất khẩu, nhập khẩu: hồ sơ hải quan theo Luật Hải quan được dùng làm hồ sơ khai thuế.","Trường hợp chấm dứt hoạt động, chấm dứt hợp đồng, chuyển đổi loại hình, tổ chức lại doanh nghiệp gồm: tờ khai quyết toán thuế, báo cáo tài chính đến thời điểm đó, tài liệu khác liên quan.","Báo cáo lợi nhuận liên quốc gia áp dụng với công ty mẹ tối cao có giao dịch liên kết xuyên biên giới, doanh thu hợp nhất toàn cầu vượt mức quy định; Chính phủ quy định chi tiết."]},"luat-38_44":{"tldr":"Quy định thời hạn nộp hồ sơ khai thuế theo tháng, quý, năm, từng lần phát sinh, trường hợp chấm dứt hoạt động/tổ chức lại và xử lý khi cổng điện tử gặp sự cố.","points":["Khai theo tháng: chậm nhất ngày thứ 20 của tháng tiếp theo; khai theo quý: chậm nhất ngày cuối cùng của tháng đầu của quý tiếp theo.","Quyết toán thuế năm: chậm nhất ngày cuối cùng của tháng thứ 3 kể từ ngày kết thúc năm; hồ sơ khai thuế năm: chậm nhất ngày cuối cùng của tháng đầu tiên của năm.","Quyết toán thuế TNCN của cá nhân trực tiếp quyết toán: chậm nhất ngày cuối cùng của tháng thứ 4 kể từ ngày kết thúc năm dương lịch.","Hồ sơ khai thuế khoán của hộ, cá nhân kinh doanh: chậm nhất ngày 15 tháng 12 năm trước liền kề; mới kinh doanh thì chậm nhất 10 ngày kể từ ngày bắt đầu kinh doanh.","Khai theo từng lần phát sinh: chậm nhất ngày thứ 10 kể từ ngày phát sinh nghĩa vụ thuế; chấm dứt hoạt động/hợp đồng/tổ chức lại: chậm nhất ngày thứ 45 kể từ ngày xảy ra sự kiện.","Nếu ngày cuối cùng cổng điện tử của cơ quan thuế gặp sự cố thì người nộp thuế nộp hồ sơ trong ngày tiếp theo sau khi cổng hoạt động trở lại."]},"luat-38_45":{"tldr":"Quy định địa điểm nộp hồ sơ khai thuế tại cơ quan thuế quản lý trực tiếp và các trường hợp đặc thù do Chính phủ quy định.","points":["Người nộp thuế nộp hồ sơ khai thuế tại cơ quan thuế quản lý trực tiếp.","Trường hợp một cửa liên thông thì địa điểm nộp theo quy định của cơ chế đó.","Hàng hóa xuất khẩu, nhập khẩu: địa điểm nộp theo quy định của Luật Hải quan.","Chính phủ quy định địa điểm nộp cho các trường hợp: nhiều hoạt động sản xuất kinh doanh, kinh doanh nhiều địa bàn, khoản thu từ đất/tài nguyên, quyết toán thuế TNCN, khai qua giao dịch điện tử và trường hợp cần thiết khác."]},"luat-38_46":{"tldr":"Quy định điều kiện, thời gian, thủ tục gia hạn nộp hồ sơ khai thuế khi gặp thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ.","points":["Người nộp thuế không nộp đúng hạn do thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ được thủ trưởng cơ quan thuế quản lý trực tiếp gia hạn.","Thời gian gia hạn không quá 30 ngày đối với hồ sơ khai thuế tháng, quý, năm, từng lần phát sinh; 60 ngày đối với hồ sơ khai quyết toán thuế kể từ ngày hết thời hạn phải nộp.","Người nộp thuế gửi văn bản đề nghị gia hạn trước khi hết hạn, nêu rõ lý do có xác nhận của UBND cấp xã hoặc Công an xã, phường, thị trấn.","Cơ quan thuế trả lời bằng văn bản trong 03 ngày làm việc kể từ ngày nhận được văn bản đề nghị gia hạn."]},"luat-38_47":{"tldr":"Quy định việc khai bổ sung hồ sơ khai thuế trong thời hạn 10 năm, gồm các trường hợp trước, trong và sau thanh tra, kiểm tra.","points":["Được khai bổ sung trong 10 năm kể từ ngày hết thời hạn nộp hồ sơ của kỳ tính thuế có sai sót, nhưng trước khi công bố quyết định thanh tra, kiểm tra.","Sau khi đã công bố quyết định thanh tra, kiểm tra tại trụ sở vẫn được khai bổ sung; cơ quan thuế xử phạt vi phạm hành chính theo Điều 142 và Điều 143.","Sau khi đã có kết luận, quyết định xử lý: được khai bổ sung khi làm tăng thuế phải nộp/giảm thuế khấu trừ/giảm miễn giảm hoàn và bị xử phạt theo Điều 142, 143.","Nếu khai bổ sung làm giảm thuế phải nộp hoặc tăng thuế khấu trừ, miễn, giảm, hoàn thì thực hiện theo quy định về giải quyết khiếu nại về thuế.","Hồ sơ khai bổ sung gồm: tờ khai bổ sung; bản giải trình khai bổ sung và tài liệu liên quan.","Hàng hóa xuất khẩu, nhập khẩu: khai bổ sung theo quy định pháp luật về hải quan."]},"luat-38_48":{"tldr":"Quy định trách nhiệm của cơ quan quản lý thuế trong việc tiếp nhận hồ sơ khai thuế qua các hình thức và thông báo cho người nộp thuế.","points":["Tiếp nhận hồ sơ qua: trực tiếp tại cơ quan quản lý thuế, đường bưu chính, hoặc điện tử qua cổng giao dịch điện tử.","Thông báo về việc tiếp nhận hồ sơ; nếu hồ sơ không hợp pháp, không đầy đủ, không đúng mẫu thì thông báo cho người nộp thuế trong 03 ngày làm việc kể từ ngày tiếp nhận."]},"luat-38_49":{"tldr":"Quy định nguyên tắc ấn định thuế của cơ quan quản lý thuế.","points":["Ấn định thuế phải dựa trên nguyên tắc quản lý thuế, căn cứ tính thuế, phương pháp tính thuế theo pháp luật về thuế, hải quan.","Cơ quan quản lý thuế ấn định số tiền thuế phải nộp hoặc ấn định từng yếu tố, căn cứ tính thuế để xác định số tiền thuế phải nộp."]},"luat-38_50":{"tldr":"Quy định các trường hợp người nộp thuế bị ấn định thuế khi vi phạm pháp luật về thuế, căn cứ ấn định thuế, ấn định từng yếu tố và ấn định theo tỷ lệ trên doanh thu. Chính phủ quy định chi tiết.","points":["Người nộp thuế bị ấn định thuế khi thuộc các trường hợp vi phạm: không đăng ký/khai thuế hoặc khai không đầy đủ, trung thực; không phản ánh đúng số liệu sổ kế toán; không xuất trình sổ sách, hóa đơn, chứng từ; không chấp hành quyết định thanh tra, kiểm tra thuế.","Các trường hợp khác: mua bán không theo giá thị trường; dùng hóa đơn không hợp pháp; có dấu hiệu bỏ trốn, phát tán tài sản; giao dịch không đúng bản chất kinh tế; không tuân thủ kê khai giá giao dịch liên kết.","Căn cứ ấn định thuế: cơ sở dữ liệu của cơ quan quản lý thuế và dữ liệu thương mại; so sánh số thuế của cơ sở cùng mặt hàng, ngành nghề, quy mô; tài liệu, kết quả kiểm tra, thanh tra còn hiệu lực; tỷ lệ thu thuế trên doanh thu theo từng lĩnh vực, ngành nghề.","Người nộp thuế bị ấn định từng yếu tố xác định số thuế khi: khai không đầy đủ/chính xác và không khai bổ sung theo yêu cầu; hạch toán không chính xác, không trung thực; hạch toán giá bán/mua không đúng giá thực tế; nộp hồ sơ nhưng không xác định/không tự tính được số thuế.","Ấn định theo tỷ lệ trên doanh thu áp dụng khi kiểm tra, thanh tra phát hiện sổ sách, hóa đơn không đầy đủ, không hợp pháp với doanh thu tối đa bằng mức cao nhất tiêu chí doanh nghiệp siêu nhỏ và không thuộc trường hợp ấn định tại khoản 3.","Chính phủ quy định chi tiết Điều này."]},"luat-38_51":{"tldr":"Quy định việc cơ quan thuế xác định mức thuế khoán đối với hộ kinh doanh, cá nhân kinh doanh không thực hiện hoặc thực hiện không đầy đủ chế độ kế toán, hóa đơn, chứng từ.","points":["Cơ quan thuế xác định mức thuế khoán với hộ kinh doanh, cá nhân kinh doanh không thực hiện/thực hiện không đầy đủ chế độ kế toán, hóa đơn, chứng từ, trừ trường hợp tại khoản 5.","Căn cứ xác định mức thuế khoán: tài liệu kê khai của hộ/cá nhân kinh doanh, cơ sở dữ liệu của cơ quan thuế, ý kiến của Hội đồng tư vấn thuế xã, phường, thị trấn.","Mức thuế khoán tính theo năm dương lịch hoặc theo tháng (kinh doanh theo thời vụ), phải công khai trong địa bàn xã, phường, thị trấn; khi thay đổi ngành nghề, quy mô, ngừng, tạm ngừng phải khai báo để điều chỉnh.","Bộ trưởng Bộ Tài chính quy định chi tiết căn cứ, trình tự xác định mức thuế khoán.","Hộ kinh doanh, cá nhân kinh doanh có quy mô doanh thu, lao động đạt từ mức cao nhất tiêu chí doanh nghiệp siêu nhỏ phải thực hiện chế độ kế toán và nộp thuế theo phương pháp kê khai."]},"luat-38_52":{"tldr":"Quy định các trường hợp và căn cứ để cơ quan hải quan ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu. Chính phủ quy định chi tiết.","points":["Cơ quan hải quan ấn định thuế khi: dùng tài liệu không hợp pháp để khai/tính thuế hoặc không khai, khai không chính xác; quá thời hạn không cung cấp/từ chối/trì hoãn cung cấp hồ sơ, sổ sách, chứng từ; không giải trình hoặc không chấp hành quyết định kiểm tra, thanh tra.","Các trường hợp khác: không phản ánh đúng số liệu sổ kế toán; khai báo trị giá không đúng trị giá giao dịch thực tế; giao dịch không đúng bản chất kinh tế; người khai thuế không tự tính được số thuế; trường hợp khác phát hiện kê khai, tính thuế không đúng.","Căn cứ ấn định: hàng hóa thực tế xuất/nhập khẩu; căn cứ tính thuế, phương pháp tính thuế; cơ sở dữ liệu của cơ quan quản lý thuế và dữ liệu thương mại; hồ sơ khai báo hải quan và các thông tin liên quan.","Chính phủ quy định chi tiết Điều này."]},"luat-38_53":{"tldr":"Quy định trách nhiệm của cơ quan quản lý thuế khi ấn định thuế, gồm thông báo bằng văn bản và xử lý chênh lệch giữa số thuế ấn định với số thuế theo quyết định khiếu nại, bản án của Tòa án.","points":["Cơ quan quản lý thuế thông báo bằng văn bản cho người nộp thuế về lý do, căn cứ ấn định thuế, số tiền thuế ấn định và thời hạn nộp.","Trường hợp ấn định thuế qua kiểm tra, thanh tra thì lý do, căn cứ, số tiền, thời hạn nộp phải ghi trong biên bản kiểm tra, thanh tra, quyết định xử lý về thuế.","Nếu số thuế ấn định lớn hơn số thuế phải nộp theo quyết định giải quyết khiếu nại hoặc bản án, quyết định của Tòa án thì cơ quan quản lý thuế phải hoàn trả số tiền nộp thừa.","Nếu số thuế ấn định nhỏ hơn thì người nộp thuế phải nộp bổ sung; cơ quan quản lý thuế chịu trách nhiệm về việc ấn định thuế."]},"luat-38_54":{"tldr":"Người nộp thuế phải nộp số tiền thuế ấn định theo quyết định xử lý; nếu không đồng ý vẫn phải nộp nhưng có quyền đề nghị giải thích, khiếu nại, khởi kiện.","points":["Người nộp thuế phải nộp số tiền thuế ấn định theo quyết định xử lý về thuế của cơ quan quản lý thuế.","Trường hợp không đồng ý vẫn phải nộp số thuế đó, đồng thời có quyền đề nghị giải thích hoặc khiếu nại, khởi kiện về việc ấn định thuế.","Người nộp thuế có trách nhiệm cung cấp hồ sơ, tài liệu để chứng minh cho việc khiếu nại, khởi kiện."]},"luat-38_55":{"tldr":"Quy định thời hạn nộp thuế trong trường hợp người nộp thuế tự tính, cơ quan thuế tính, các khoản thu khác và hàng hóa xuất khẩu, nhập khẩu.","points":["Trường hợp người nộp thuế tự tính: thời hạn nộp chậm nhất là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế; khai bổ sung thì theo thời hạn nộp hồ sơ của kỳ tính thuế có sai sót.","Thuế thu nhập doanh nghiệp tạm nộp theo quý, chậm nhất là ngày 30 của tháng đầu quý sau.","Dầu thô: thời hạn nộp thuế tài nguyên, thuế TNDN theo lần xuất bán là 35 ngày kể từ ngày xuất bán (nội địa) hoặc kể từ ngày thông quan (xuất khẩu); khí thiên nhiên nộp theo tháng.","Trường hợp cơ quan thuế tính thuế: thời hạn nộp là thời hạn ghi trên thông báo của cơ quan thuế.","Các khoản thu khác từ đất, cấp quyền khai thác tài nguyên nước, khoáng sản, lệ phí trước bạ, lệ phí môn bài: thời hạn nộp theo quy định của Chính phủ.","Hàng hóa xuất khẩu, nhập khẩu: theo Luật Thuế xuất khẩu, thuế nhập khẩu; số thuế phát sinh sau thông quan thì áp dụng thời hạn của tờ khai hải quan ban đầu hoặc theo quy định của Bộ trưởng Bộ Tài chính với hàng phải phân tích, giám định, chưa có giá chính thức."]},"luat-38_56":{"tldr":"Quy định địa điểm, hình thức nộp thuế vào ngân sách nhà nước và trách nhiệm của các tổ chức nhận tiền thuế, gồm thời hạn 08 giờ làm việc chuyển tiền vào ngân sách.","points":["Người nộp thuế nộp tiền vào ngân sách nhà nước tại: Kho bạc Nhà nước; cơ quan quản lý thuế nơi tiếp nhận hồ sơ khai thuế; tổ chức được ủy nhiệm thu thuế; ngân hàng thương mại, tổ chức tín dụng khác và tổ chức dịch vụ.","Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng, tổ chức dịch vụ có trách nhiệm bố trí địa điểm, phương tiện, nhân lực thu tiền thuận lợi cho người nộp thuế.","Cơ quan, tổ chức khi nhận hoặc khấu trừ tiền thuế phải cấp chứng từ thu tiền thuế cho người nộp thuế.","Trong thời hạn 08 giờ làm việc kể từ khi thu tiền thuế, cơ quan, tổ chức phải chuyển tiền vào ngân sách nhà nước; thu bằng tiền mặt ở vùng sâu, vùng xa, hải đảo, vùng đi lại khó khăn theo quy định của Bộ trưởng Bộ Tài chính."]},"luat-38_57":{"tldr":"Quy định thứ tự thanh toán tiền thuế, tiền chậm nộp, tiền phạt theo thời hạn trước sau và theo thứ tự ưu tiên các khoản nợ.","points":["Thứ tự thanh toán thực hiện theo thời hạn trước, sau và theo thứ tự quy định tại khoản 2.","Ưu tiên 1: tiền nợ thuế, tiền phạt, tiền chậm nộp quá hạn thuộc đối tượng áp dụng biện pháp cưỡng chế.","Ưu tiên 2: tiền nợ thuế, tiền phạt, tiền chậm nộp quá hạn chưa thuộc đối tượng áp dụng biện pháp cưỡng chế.","Ưu tiên 3: tiền thuế, tiền phạt, tiền chậm nộp phát sinh."]},"luat-38_58":{"tldr":"Quy định cách xác định ngày đã nộp thuế đối với trường hợp nộp không bằng tiền mặt và nộp trực tiếp bằng tiền mặt.","points":["Nộp không bằng tiền mặt: ngày đã nộp thuế là ngày Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng, tổ chức dịch vụ trích tiền từ tài khoản người nộp thuế hoặc người nộp thay và được ghi nhận trên chứng từ nộp tiền thuế.","Nộp trực tiếp bằng tiền mặt: ngày đã nộp thuế là ngày Kho bạc Nhà nước, cơ quan quản lý thuế hoặc tổ chức được ủy nhiệm thu thuế cấp chứng từ thu tiền thuế."]},"luat-38_59":{"tldr":"Quy định các trường hợp phải nộp tiền chậm nộp, mức tính 0,03%/ngày, thời gian tính, các trường hợp không tính hoặc chưa tính tiền chậm nộp và việc miễn tiền chậm nộp.","points":["Phải nộp tiền chậm nộp khi: chậm nộp so với thời hạn quy định; khai bổ sung làm tăng số thuế phải nộp hoặc bị phát hiện khai thiếu; khai bổ sung làm giảm số thuế đã hoàn hoặc số thuế được hoàn nhỏ hơn số đã hoàn; nộp dần tiền thuế nợ theo khoản 5 Điều 124; bị truy thu khi hết thời hiệu xử phạt; tổ chức ủy nhiệm thu chậm chuyển tiền.","Mức tính tiền chậm nộp bằng 0,03%/ngày tính trên số tiền thuế chậm nộp.","Thời gian tính tiền chậm nộp tính liên tục từ ngày tiếp theo ngày phát sinh đến ngày liền kề trước ngày số tiền nợ đã nộp vào ngân sách nhà nước.","Người nộp thuế tự xác định số tiền chậm nộp; sau 30 ngày kể từ ngày hết hạn mà chưa nộp thì cơ quan quản lý thuế thông báo số tiền còn nợ và số ngày chậm nộp.","Không tính tiền chậm nộp: cung ứng hàng hóa, dịch vụ được thanh toán bằng nguồn vốn ngân sách nhà nước nhưng chưa được thanh toán (không vượt quá số tiền ngân sách chưa thanh toán); các trường hợp tại điểm b khoản 4 Điều 55 trong thời gian chờ phân tích, giám định, chưa có giá chính thức. Chưa tính tiền chậm nộp với khoản được khoanh nợ theo Điều 83.","Khai bổ sung làm giảm số thuế phải nộp thì được điều chỉnh giảm tiền chậm nộp tương ứng; được miễn tiền chậm nộp trong trường hợp bất khả kháng theo khoản 27 Điều 3. Bộ trưởng Bộ Tài chính quy định thủ tục."]},"luat-38_60":{"tldr":"Quy định việc xử lý số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa: bù trừ, trừ vào lần nộp sau hoặc hoàn trả; thời hạn xử lý yêu cầu hoàn trả 05 ngày làm việc và các trường hợp không hoàn trả.","points":["Số tiền nộp thừa được bù trừ với số còn nợ, trừ vào lần nộp tiếp theo, hoặc được hoàn trả khi người nộp thuế không còn nợ; trường hợp đề nghị bù trừ thì không tính tiền chậm nộp tương ứng từ ngày phát sinh nộp thừa đến ngày bù trừ.","Khi yêu cầu hoàn trả số nộp thừa, cơ quan quản lý thuế phải ra quyết định hoàn trả hoặc trả lời nêu rõ lý do trong thời hạn 05 ngày làm việc kể từ ngày nhận văn bản yêu cầu.","Không hoàn trả và thực hiện thanh khoản số nộp thừa khi: người nộp thuế từ chối nhận lại bằng văn bản; không hoạt động tại địa chỉ đăng ký và sau 01 năm kể từ ngày thông báo không phản hồi; khoản nộp thừa quá thời hạn 10 năm kể từ ngày nộp mà không bù trừ, không hoàn thuế.","Người nộp thuế không hoạt động tại địa chỉ đăng ký kinh doanh có cả nộp thừa và còn nợ thì cơ quan quản lý thuế thực hiện bù trừ.","Bộ trưởng Bộ Tài chính quy định thẩm quyền, thủ tục xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa."]},"luat-38_61":{"tldr":"Quy định việc nộp thuế trong thời gian giải quyết khiếu nại, khởi kiện: vẫn phải nộp đủ, được hoàn trả nếu đã nộp thừa và được trả tiền lãi 0,03%/ngày.","points":["Trong thời gian giải quyết khiếu nại, khởi kiện, người nộp thuế vẫn phải nộp đủ số tiền thuế, tiền chậm nộp, tiền phạt, trừ khi cơ quan có thẩm quyền quyết định tạm đình chỉ thực hiện quyết định tính/ấn định thuế.","Nếu số đã nộp lớn hơn số xác định theo quyết định giải quyết khiếu nại hoặc bản án, quyết định của Tòa án thì người nộp thuế được hoàn trả số nộp thừa.","Người nộp thuế có quyền yêu cầu trả tiền lãi mức 0,03%/ngày tính trên số nộp thừa; nguồn tiền trả lãi từ ngân sách trung ương.","Thủ tục xử lý số nộp thừa thực hiện theo khoản 5 Điều 60 của Luật này."]},"luat-38_62":{"tldr":"Quy định các trường hợp được gia hạn nộp thuế, mức gia hạn, thời gian gia hạn (tối đa 02 năm hoặc 01 năm) và việc không bị phạt, không phải nộp tiền chậm nộp trong thời gian gia hạn.","points":["Gia hạn nộp thuế được xem xét trên cơ sở đề nghị khi: bị thiệt hại vật chất ảnh hưởng trực tiếp đến sản xuất, kinh doanh do bất khả kháng theo khoản 27 Điều 3; phải ngừng hoạt động do di dời cơ sở theo yêu cầu của cơ quan có thẩm quyền.","Được gia hạn một phần hoặc toàn bộ tiền thuế phải nộp.","Thời gian gia hạn không quá 02 năm với trường hợp tại điểm a khoản 1; không quá 01 năm với trường hợp tại điểm b khoản 1, kể từ ngày hết thời hạn nộp thuế.","Người nộp thuế không bị phạt và không phải nộp tiền chậm nộp tính trên số nợ thuế trong thời gian gia hạn.","Thủ trưởng cơ quan quản lý thuế quản lý trực tiếp căn cứ hồ sơ để quyết định số tiền thuế được gia hạn và thời gian gia hạn."]},"luat-38_64":{"tldr":"Quy định hồ sơ gia hạn nộp thuế gồm văn bản đề nghị và tài liệu chứng minh, gửi cho cơ quan quản lý thuế quản lý trực tiếp.","points":["Người nộp thuế thuộc trường hợp được gia hạn phải lập và gửi hồ sơ cho cơ quan quản lý thuế quản lý trực tiếp.","Hồ sơ gồm: văn bản đề nghị gia hạn nộp thuế nêu rõ lý do, số tiền thuế, thời hạn nộp; tài liệu chứng minh lý do gia hạn.","Bộ trưởng Bộ Tài chính quy định chi tiết hồ sơ gia hạn nộp thuế."]},"luat-38_65":{"tldr":"Quy định hình thức tiếp nhận và việc xử lý hồ sơ gia hạn nộp thuế, gồm thời hạn 10 ngày làm việc khi hồ sơ đầy đủ và 03 ngày làm việc khi hồ sơ không đầy đủ.","points":["Cơ quan quản lý thuế tiếp nhận hồ sơ qua: trực tiếp tại cơ quan quản lý thuế; đường bưu chính; hồ sơ điện tử qua cổng giao dịch điện tử.","Hồ sơ hợp pháp, đầy đủ, đúng mẫu: thông báo bằng văn bản về việc gia hạn trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ.","Hồ sơ không đầy đủ: thông báo bằng văn bản cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận hồ sơ."]},"luat-38_66":{"tldr":"Quy định việc hoàn thành nghĩa vụ nộp thuế trong trường hợp xuất cảnh; chưa hoàn thành thì bị tạm hoãn xuất cảnh. Chính phủ quy định chi tiết.","points":["Người đang bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, người Việt Nam xuất cảnh để định cư ở nước ngoài, người Việt Nam định cư ở nước ngoài, người nước ngoài trước khi xuất cảnh từ Việt Nam phải hoàn thành nghĩa vụ nộp thuế; chưa hoàn thành thì bị tạm hoãn xuất cảnh.","Cơ quan quản lý thuế có trách nhiệm thông báo cho cơ quan quản lý xuất cảnh, nhập cảnh về cá nhân, người nộp thuế quy định tại khoản 1.","Chính phủ quy định chi tiết Điều này."]},"luat-38_67":{"tldr":"Quy định việc hoàn thành nghĩa vụ nộp thuế trong các trường hợp giải thể, phá sản, chấm dứt hoạt động của doanh nghiệp, hộ kinh doanh, cá nhân kinh doanh và chi nhánh, đơn vị phụ thuộc.","points":["Doanh nghiệp giải thể: hoàn thành nghĩa vụ nộp thuế theo pháp luật về doanh nghiệp, tổ chức tín dụng, kinh doanh bảo hiểm và quy định liên quan.","Doanh nghiệp phá sản: hoàn thành nghĩa vụ nộp thuế theo trình tự, thủ tục quy định tại Luật Phá sản.","Doanh nghiệp chấm dứt hoạt động, bỏ địa chỉ đăng ký kinh doanh chưa hoàn thành nghĩa vụ thuế: phần tiền thuế nợ còn lại do chủ sở hữu doanh nghiệp tư nhân, chủ công ty TNHH một thành viên, cổ đông, thành viên góp vốn, thành viên hợp danh chịu trách nhiệm theo Luật Doanh nghiệp.","Hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động chưa hoàn thành nghĩa vụ thuế: phần tiền thuế nợ còn lại do chủ hộ, cá nhân chịu trách nhiệm nộp.","Người nộp thuế có chi nhánh, đơn vị phụ thuộc chấm dứt hoạt động còn nợ thuế và các khoản thu khác thì có trách nhiệm kế thừa các khoản nợ đó."]},"luat-38_68":{"tldr":"Quy định việc hoàn thành nghĩa vụ nộp thuế khi tổ chức lại doanh nghiệp (chia, tách, hợp nhất, sáp nhập, chuyển đổi); việc tổ chức lại không làm thay đổi thời hạn nộp thuế.","points":["Doanh nghiệp bị chia phải hoàn thành nghĩa vụ nộp thuế trước khi chia; nếu chưa hoàn thành thì các doanh nghiệp mới thành lập từ doanh nghiệp bị chia có trách nhiệm hoàn thành.","Doanh nghiệp bị tách, hợp nhất, sáp nhập phải hoàn thành nghĩa vụ trước khi thực hiện; nếu chưa hoàn thành thì doanh nghiệp bị tách và được tách, doanh nghiệp hợp nhất, nhận sáp nhập có trách nhiệm hoàn thành.","Doanh nghiệp chuyển đổi loại hình phải hoàn thành nghĩa vụ trước khi chuyển đổi; nếu chưa hoàn thành thì doanh nghiệp chuyển đổi có trách nhiệm hoàn thành.","Tổ chức lại doanh nghiệp không làm thay đổi thời hạn nộp thuế; nếu doanh nghiệp được tổ chức lại hoặc thành lập mới không nộp đủ theo thời hạn thì bị xử phạt theo quy định."]},"luat-38_69":{"tldr":"Quy định việc hoàn thành nghĩa vụ nộp thuế khi người nộp thuế đã chết, bị Tòa án tuyên bố đã chết, mất tích hoặc mất năng lực hành vi dân sự, do người thừa kế hoặc người quản lý tài sản thực hiện.","points":["Người đã chết, bị tuyên bố đã chết: người thừa kế thực hiện trong phần tài sản để lại hoặc phần tài sản được chia tại thời điểm nhận thừa kế; nếu không có người thừa kế hoặc tất cả từ chối nhận di sản thì thực hiện theo pháp luật về dân sự.","Người bị tuyên bố mất tích hoặc mất năng lực hành vi dân sự: do người quản lý tài sản thực hiện trong phần tài sản của người đó.","Nếu Tòa án hủy bỏ quyết định tuyên bố đã chết, mất tích, mất năng lực hành vi dân sự thì số nợ tiền thuế, tiền chậm nộp, tiền phạt đã xóa theo Điều 85 được phục hồi, nhưng không bị tính tiền chậm nộp cho thời gian bị tuyên bố."]},"luat-38_70":{"tldr":"Quy định các trường hợp hoàn thuế: hoàn thuế theo pháp luật về thuế và hoàn trả tiền nộp thừa.","points":["Cơ quan quản lý thuế thực hiện hoàn thuế đối với tổ chức, cá nhân thuộc trường hợp hoàn thuế theo quy định của pháp luật về thuế.","Cơ quan thuế hoàn trả tiền nộp thừa khi người nộp thuế có số đã nộp ngân sách nhà nước lớn hơn số phải nộp theo khoản 1 Điều 60 của Luật này."]},"luat-38_72":{"tldr":"Quy định việc tiếp nhận và phản hồi hồ sơ hoàn thuế, gồm cơ quan tiếp nhận, hình thức nộp và thời hạn 03 ngày làm việc phân loại, thông báo hồ sơ.","points":["Cơ quan thuế quản lý trực tiếp tiếp nhận hồ sơ hoàn thuế; cơ quan thuế quản lý khoản thu tiếp nhận hồ sơ hoàn trả tiền nộp thừa; hoàn trả theo quyết toán thuế TNDN, TNCN thì cơ quan tiếp nhận hồ sơ quyết toán tiếp nhận.","Cơ quan hải quan nơi quản lý khoản thu tiếp nhận hồ sơ hoàn thuế; người nước ngoài, người Việt Nam định cư ở nước ngoài xuất cảnh có hàng hóa thuộc trường hợp hoàn thuế thì cơ quan hải quan nơi làm thủ tục xuất cảnh tiếp nhận.","Hình thức nộp hồ sơ: trực tiếp tại cơ quan quản lý thuế; qua đường bưu chính; hồ sơ điện tử qua cổng giao dịch điện tử.","Trong thời hạn 03 ngày làm việc kể từ ngày tiếp nhận, cơ quan quản lý thuế phân loại hồ sơ và thông báo việc chấp nhận và thời hạn giải quyết hoặc thông báo bằng văn bản nếu hồ sơ không đầy đủ.","Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."]},"luat-38_73":{"tldr":"Quy định việc phân loại hồ sơ hoàn thuế thành hồ sơ kiểm tra trước hoàn thuế và hồ sơ hoàn thuế trước, liệt kê các trường hợp thuộc diện kiểm tra trước.","points":["Hồ sơ hoàn thuế được phân loại thành hồ sơ thuộc diện kiểm tra trước hoàn thuế và hồ sơ thuộc diện hoàn thuế trước.","Hồ sơ kiểm tra trước hoàn thuế gồm: hồ sơ đề nghị hoàn thuế lần đầu của từng trường hợp; hồ sơ đề nghị hoàn thuế trong thời hạn 02 năm kể từ thời điểm bị xử lý về hành vi trốn thuế; hồ sơ của tổ chức giải thể, phá sản, chấm dứt hoạt động, bán, giao, chuyển giao doanh nghiệp nhà nước.","Các trường hợp khác thuộc kiểm tra trước: hồ sơ thuộc loại rủi ro cao về thuế; hồ sơ hoàn thuế trước nhưng hết thời hạn mà không giải trình, bổ sung hoặc không chứng minh được số thuế đã khai đúng; hàng hóa xuất/nhập khẩu không thanh toán qua ngân hàng, tổ chức tín dụng; hàng hóa thuộc diện phải kiểm tra trước hoàn thuế theo quy định của Chính phủ.","Hồ sơ thuộc diện hoàn thuế trước là hồ sơ không thuộc các trường hợp tại khoản 2.","Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."]},"luat-38_74":{"tldr":"Quy định địa điểm kiểm tra hồ sơ hoàn thuế đối với hồ sơ hoàn thuế trước và hồ sơ kiểm tra trước hoàn thuế.","points":["Hồ sơ thuộc diện hoàn thuế trước được kiểm tra tại trụ sở của cơ quan quản lý thuế.","Hồ sơ thuộc diện kiểm tra trước hoàn thuế được kiểm tra tại trụ sở của người nộp thuế hoặc trụ sở của cơ quan, tổ chức, cá nhân có liên quan."]},"luat-38_75":{"tldr":"Quy định thời hạn giải quyết hồ sơ hoàn thuế: 06 ngày làm việc với hồ sơ hoàn thuế trước, 40 ngày với hồ sơ kiểm tra trước hoàn thuế; chậm do lỗi cơ quan quản lý thuế phải trả lãi 0,03%/ngày.","points":["Hồ sơ hoàn thuế trước: chậm nhất 06 ngày làm việc kể từ ngày thông báo chấp nhận hồ sơ, cơ quan quản lý thuế phải quyết định hoàn thuế, chuyển sang kiểm tra trước hoàn thuế nếu thuộc khoản 2 Điều 73, hoặc thông báo không hoàn thuế nếu không đủ điều kiện.","Thông tin trên hồ sơ khác với thông tin quản lý của cơ quan thì thông báo để người nộp thuế giải trình, bổ sung; thời gian giải trình, bổ sung không tính vào thời hạn giải quyết.","Hồ sơ kiểm tra trước hoàn thuế: chậm nhất 40 ngày kể từ ngày thông báo chấp nhận hồ sơ, cơ quan quản lý thuế phải quyết định hoàn thuế hoặc không hoàn thuế nếu không đủ điều kiện.","Quá thời hạn mà chậm do lỗi của cơ quan quản lý thuế thì ngoài số thuế phải hoàn còn phải trả tiền lãi 0,03%/ngày tính trên số tiền phải hoàn và số ngày chậm; nguồn tiền trả lãi từ ngân sách trung ương."]},"luat-38_76":{"tldr":"Quy định thẩm quyền quyết định hoàn thuế của cơ quan thuế, thủ trưởng cơ quan thuế nơi tiếp nhận hồ sơ nộp thừa và cơ quan hải quan; Bộ trưởng Bộ Tài chính quy định trình tự, thủ tục hoàn thuế.","points":["Tổng cục trưởng Tổng cục Thuế, Cục trưởng Cục Thuế tỉnh, thành phố trực thuộc trung ương quyết định hoàn thuế theo pháp luật về thuế.","Thủ trưởng cơ quan thuế nơi tiếp nhận hồ sơ hoàn thuế nộp thừa quyết định hoàn trả tiền nộp thừa.","Tổng cục trưởng Tổng cục Hải quan, Cục trưởng Cục Hải quan, Chi cục trưởng Chi cục Hải quan nơi phát sinh số tiền thuế được hoàn quyết định hoàn thuế.","Bộ trưởng Bộ Tài chính quy định trình tự, thủ tục hoàn thuế."]},"luat-38_77":{"tldr":"Cơ quan quản lý thuế thanh tra, kiểm tra hồ sơ hoàn thuế trước theo nguyên tắc rủi ro trong thời hạn 05 năm kể từ ngày ban hành quyết định hoàn thuế.","points":["Thanh tra, kiểm tra hồ sơ thuộc diện hoàn thuế trước theo nguyên tắc rủi ro, trong thời hạn 05 năm kể từ ngày ban hành quyết định hoàn thuế.","Thủ tục, thẩm quyền, trách nhiệm thanh tra, kiểm tra thực hiện theo Luật này và Luật Thanh tra."]},"luat-38_79":{"tldr":"Miễn thuế, giảm thuế thực hiện theo pháp luật về thuế; quy định hai trường hợp được miễn thuế khi số tiền thuế phải nộp hằng năm từ 50.000 đồng trở xuống.","points":["Miễn, giảm thuế thực hiện theo pháp luật về thuế và khoản 2 Điều này.","Miễn thuế cho hộ gia đình, cá nhân nộp thuế sử dụng đất phi nông nghiệp có số thuế phải nộp hằng năm từ 50.000 đồng trở xuống.","Miễn thuế cho cá nhân có số thuế phát sinh phải nộp hằng năm sau quyết toán thuế TNCN từ tiền lương, tiền công từ 50.000 đồng trở xuống."]},"luat-38_80":{"tldr":"Quy định thành phần hồ sơ miễn thuế, giảm thuế đối với trường hợp người nộp thuế tự xác định và trường hợp cơ quan quản lý thuế quyết định; Bộ trưởng Bộ Tài chính quy định chi tiết.","points":["Trường hợp tự xác định: hồ sơ gồm tờ khai thuế và tài liệu liên quan đến xác định số tiền thuế được miễn, giảm.","Trường hợp cơ quan quyết định: hồ sơ gồm văn bản đề nghị (nêu rõ loại thuế, lý do, số tiền) và tài liệu liên quan.","Miễn thuế theo điểm a khoản 2 Điều 79: cơ quan thuế căn cứ sổ thuế thông báo danh sách; theo điểm b: người nộp thuế tự xác định trên tờ khai quyết toán thuế TNCN.","Bộ trưởng Bộ Tài chính quy định chi tiết hồ sơ và phân định trường hợp tự xác định hay cơ quan quản lý thuế xác định."]},"luat-38_81":{"tldr":"Quy định việc nộp và tiếp nhận hồ sơ miễn thuế, giảm thuế theo từng trường hợp, nơi nộp, hình thức nộp; cơ quan thuế thông báo trong 03 ngày làm việc nếu hồ sơ không hợp lệ.","points":["Trường hợp tự xác định: nộp và tiếp nhận hồ sơ đồng thời với khai, nộp hồ sơ khai thuế theo Chương IV.","Trường hợp cơ quan quyết định: hồ sơ thuế XK, NK và thuế liên quan hàng XNK nộp tại cơ quan hải quan; các thuế khác nộp tại cơ quan thuế quản lý trực tiếp.","Hình thức nộp: trực tiếp, qua bưu chính, hoặc điện tử qua cổng giao dịch điện tử của cơ quan quản lý thuế.","Hồ sơ không hợp pháp, không đầy đủ, không đúng mẫu: cơ quan thông báo bằng văn bản trong 03 ngày làm việc kể từ ngày tiếp nhận."]},"luat-38_82":{"tldr":"Quy định thời hạn cơ quan quản lý thuế giải quyết hồ sơ miễn thuế, giảm thuế: 30 ngày kể từ ngày nhận đủ hồ sơ, hoặc 40 ngày nếu cần kiểm tra thực tế.","points":["Trong 30 ngày kể từ ngày nhận đủ hồ sơ, cơ quan quyết định miễn, giảm thuế hoặc thông báo lý do không thuộc diện.","Trường hợp cần kiểm tra thực tế: trong 40 ngày kể từ ngày nhận đủ hồ sơ, cơ quan ban hành quyết định hoặc thông báo lý do không được miễn, giảm."]},"luat-38_83":{"tldr":"Quy định 5 trường hợp được khoanh tiền thuế nợ và thời điểm tính thời gian khoanh nợ tương ứng với mỗi trường hợp.","points":["Người nộp thuế đã chết, bị tuyên bố đã chết, mất tích hoặc mất năng lực hành vi dân sự; khoanh nợ tính từ ngày cấp giấy chứng tử/giấy báo tử hoặc quyết định của Tòa án.","Người nộp thuế có quyết định giải thể, đã thông báo trên hệ thống đăng ký kinh doanh nhưng chưa hoàn thành thủ tục; tính từ ngày cơ quan đăng ký kinh doanh thông báo.","Người nộp thuế đã nộp hoặc bị nộp đơn yêu cầu mở thủ tục phá sản; tính từ ngày Tòa án thông báo thụ lý hoặc đang làm thủ tục thanh toán, xử lý nợ theo Luật Phá sản.","Người nộp thuế không còn hoạt động tại địa chỉ đăng ký, đã được kiểm tra, xác minh và thông báo toàn quốc; tính từ ngày có văn bản thông báo toàn quốc.","Người nộp thuế bị đề nghị thu hồi hoặc đã bị thu hồi giấy chứng nhận đăng ký kinh doanh/doanh nghiệp/hợp tác xã, giấy phép; tính từ ngày có văn bản đề nghị thu hồi hoặc ngày quyết định thu hồi có hiệu lực."]},"luat-38_84":{"tldr":"Chính phủ quy định thủ tục, hồ sơ, thời gian khoanh nợ; thủ trưởng cơ quan quản lý thuế trực tiếp quyết định khoanh nợ và tiếp tục theo dõi để thu hồi hoặc xóa nợ.","points":["Chính phủ quy định thủ tục, hồ sơ, thời gian khoanh nợ.","Thủ trưởng cơ quan quản lý thuế quản lý trực tiếp người nộp thuế quyết định việc khoanh nợ.","Cơ quan quản lý thuế tiếp tục theo dõi khoản nợ được khoanh, phối hợp thu hồi khi người nộp thuế có khả năng nộp hoặc thực hiện xóa nợ theo Điều 85."]},"luat-38_85":{"tldr":"Quy định các trường hợp được xóa nợ tiền thuế, tiền chậm nộp, tiền phạt, bao gồm phá sản, cá nhân đã chết/mất năng lực không tài sản, nợ quá 10 năm không thu hồi được, và do thiên tai, dịch bệnh diện rộng.","points":["Doanh nghiệp, hợp tác xã bị tuyên bố phá sản đã thanh toán theo pháp luật phá sản mà không còn tài sản nộp.","Cá nhân đã chết hoặc bị tuyên bố đã chết, mất năng lực hành vi dân sự mà không có tài sản (kể cả tài sản thừa kế) để nộp.","Nợ ngoài hai trường hợp trên, đã áp dụng cưỡng chế tại điểm g khoản 1 Điều 125, đã quá 10 năm kể từ hết thời hạn nộp thuế nhưng không có khả năng thu hồi; người được xóa phải hoàn trả khi quay lại sản xuất, kinh doanh hoặc lập cơ sở mới.","Trường hợp thiên tai, thảm họa, dịch bệnh diện rộng đã được miễn tiền chậm nộp (khoản 8 Điều 59) và gia hạn nộp thuế (điểm a khoản 1 Điều 62) mà vẫn còn thiệt hại, không phục hồi, không có khả năng nộp.","Chính phủ quy định việc phối hợp bảo đảm khoản đã xóa được hoàn trả vào ngân sách trước khi cấp giấy chứng nhận đăng ký kinh doanh, đăng ký doanh nghiệp; quy định chi tiết khoản 4."]},"luat-38_86":{"tldr":"Quy định việc lập, gửi và thành phần hồ sơ xóa nợ tiền thuế, tiền chậm nộp, tiền phạt; Bộ trưởng Bộ Tài chính quy định chi tiết.","points":["Cơ quan quản lý thuế quản lý trực tiếp lập và gửi hồ sơ xóa nợ đến cơ quan, người có thẩm quyền.","Hồ sơ gồm: văn bản đề nghị xóa nợ của cơ quan quản lý thuế trực tiếp; quyết định tuyên bố phá sản (đối với trường hợp phá sản); các tài liệu liên quan.","Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."]},"luat-38_87":{"tldr":"Quy định thẩm quyền xóa nợ tiền thuế, tiền chậm nộp, tiền phạt phân theo cấp và theo mức nợ của doanh nghiệp, hợp tác xã; quy định chế độ báo cáo kết quả xóa nợ.","points":["Chủ tịch UBND cấp tỉnh xóa nợ với trường hợp khoản 1, 2 Điều 85; hộ gia đình, hộ kinh doanh, cá nhân kinh doanh, cá nhân theo khoản 3 Điều 85; và doanh nghiệp, HTX theo khoản 3 có nợ dưới 5.000.000.000 đồng.","Tổng cục trưởng Tổng cục Thuế, Tổng cục trưởng Tổng cục Hải quan xóa nợ với doanh nghiệp, HTX theo khoản 3 có nợ từ 5.000.000.000 đến dưới 10.000.000.000 đồng.","Bộ trưởng Bộ Tài chính xóa nợ với doanh nghiệp, HTX theo khoản 3 có nợ từ 10.000.000.000 đến dưới 15.000.000.000 đồng.","Thủ tướng Chính phủ xóa nợ với doanh nghiệp, HTX theo khoản 3 có nợ từ 15.000.000.000 đồng trở lên.","Chủ tịch UBND cấp tỉnh báo cáo HĐND cùng cấp kỳ họp đầu năm; Bộ trưởng Bộ Tài chính tổng hợp để Chính phủ báo cáo Quốc hội khi quyết toán ngân sách."]},"luat-38_88":{"tldr":"Quy định trách nhiệm và thời hạn giải quyết hồ sơ xóa nợ: thông báo hoàn chỉnh hồ sơ trong 10 ngày làm việc và ra quyết định trong 60 ngày kể từ ngày nhận đủ hồ sơ.","points":["Khi hồ sơ chưa đầy đủ, cơ quan có thẩm quyền thông báo cho cơ quan gửi hồ sơ để hoàn chỉnh trong 10 ngày làm việc kể từ ngày tiếp nhận.","Người có thẩm quyền ra quyết định xóa nợ hoặc thông báo không thuộc diện được xóa trong 60 ngày kể từ ngày nhận đủ hồ sơ."]},"luat-38_89":{"tldr":"Định nghĩa hóa đơn điện tử, các loại hóa đơn điện tử, hóa đơn điện tử có mã và không có mã của cơ quan thuế; Chính phủ quy định chi tiết.","points":["Hóa đơn điện tử là hóa đơn có mã hoặc không có mã của cơ quan thuế ở dạng dữ liệu điện tử, gồm cả hóa đơn khởi tạo từ máy tính tiền có kết nối chuyển dữ liệu với cơ quan thuế.","Gồm: hóa đơn GTGT, hóa đơn bán hàng, tem, vé, thẻ điện tử, phiếu thu, phiếu xuất kho kiêm vận chuyển điện tử hoặc chứng từ điện tử có tên gọi khác.","Hóa đơn điện tử có mã: được cơ quan thuế cấp mã trước khi gửi cho người mua; mã gồm số giao dịch duy nhất và chuỗi ký tự được cơ quan thuế mã hóa.","Hóa đơn điện tử không có mã: do tổ chức bán hàng, cung cấp dịch vụ gửi cho người mua không có mã của cơ quan thuế.","Chính phủ quy định chi tiết Điều này."]},"luat-38_90":{"tldr":"Quy định nguyên tắc lập, quản lý, sử dụng hóa đơn điện tử: bắt buộc lập không phân biệt giá trị, đăng ký máy tính tiền, tuân thủ pháp luật liên quan; người lập chịu trách nhiệm về tính chính xác.","points":["Người bán phải lập hóa đơn điện tử giao cho người mua theo định dạng chuẩn, ghi đầy đủ nội dung, không phân biệt giá trị từng lần bán.","Người bán có dùng máy tính tiền thì đăng ký sử dụng hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối chuyển dữ liệu với cơ quan thuế.","Đăng ký, quản lý, sử dụng phải tuân thủ pháp luật về giao dịch điện tử, kế toán, thuế.","Cấp mã dựa trên thông tin người lập; doanh nghiệp, tổ chức, hộ, cá nhân kinh doanh chịu trách nhiệm về tính chính xác thông tin trên hóa đơn.","Chính phủ quy định chi tiết Điều này."]},"luat-38_91":{"tldr":"Quy định việc áp dụng hóa đơn điện tử có mã và không có mã của cơ quan thuế cho doanh nghiệp, tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh khi bán hàng hóa, cung cấp dịch vụ.","points":["Doanh nghiệp, tổ chức kinh tế sử dụng hóa đơn điện tử có mã của cơ quan thuế, không phân biệt giá trị, trừ trường hợp khoản 2 và 4.","Doanh nghiệp ở các lĩnh vực được liệt kê (điện, xăng dầu, viễn thông, nước sạch, tài chính tín dụng, bảo hiểm, y tế, thương mại điện tử, siêu thị, vận tải...) và đáp ứng điều kiện hạ tầng được dùng hóa đơn không có mã, trừ trường hợp rủi ro thuế cao hoặc đăng ký dùng hóa đơn có mã.","Hộ, cá nhân kinh doanh theo khoản 5 Điều 51 và trường hợp xác định được doanh thu sử dụng hóa đơn điện tử có mã của cơ quan thuế.","Hộ, cá nhân kinh doanh không đủ điều kiện hoặc tổ chức được chấp nhận thì được cơ quan thuế cấp hóa đơn điện tử có mã theo từng lần phát sinh và phải khai, nộp thuế trước khi được cấp."]},"luat-38_92":{"tldr":"Quy định nội dung dịch vụ về hóa đơn điện tử, tổ chức cung cấp dịch vụ; Chính phủ và Bộ trưởng Bộ Tài chính quy định chi tiết, tiêu chí lựa chọn tổ chức cung cấp.","points":["Dịch vụ về hóa đơn điện tử gồm: cung cấp giải pháp hóa đơn không mã, truyền dữ liệu hóa đơn không mã từ người nộp thuế tới cơ quan thuế, và dịch vụ hóa đơn có mã của cơ quan thuế.","Tổ chức cung cấp dịch vụ gồm tổ chức cung cấp giải pháp, tổ chức nhận/truyền/lưu trữ dữ liệu hóa đơn điện tử và các dịch vụ liên quan.","Chính phủ quy định chi tiết và quy định trường hợp sử dụng hóa đơn có mã không phải trả tiền dịch vụ, phải trả tiền dịch vụ, và trường hợp dùng hóa đơn không mã qua tổ chức cung cấp dịch vụ.","Bộ trưởng Bộ Tài chính quy định tiêu chí lựa chọn tổ chức cung cấp dịch vụ để ký hợp đồng."]},"luat-38_93":{"tldr":"Quy định trách nhiệm xây dựng, quản lý cơ sở dữ liệu hóa đơn điện tử; cung cấp dữ liệu, kết nối chia sẻ thông tin và tra cứu hóa đơn điện tử khi kiểm tra hàng hóa lưu thông.","points":["Cơ quan thuế xây dựng, quản lý, phát triển cơ sở dữ liệu, hạ tầng kỹ thuật hệ thống thông tin về hóa đơn; bảo đảm bảo mật, an ninh, an toàn; xây dựng định dạng chuẩn.","Doanh nghiệp, tổ chức kinh tế theo khoản 2 Điều 91 dùng hóa đơn không mã cung cấp dữ liệu theo quy định của Bộ trưởng Bộ Tài chính.","Bộ Công Thương, Bộ Tài nguyên và Môi trường, Bộ Công an, Bộ Giao thông vận tải, Bộ Y tế và cơ quan liên quan kết nối, chia sẻ thông tin với Bộ Tài chính.","Khi kiểm tra hàng hóa lưu thông, cơ quan nhà nước truy cập cổng thông tin của cơ quan thuế để tra cứu, không yêu cầu hóa đơn giấy.","Bộ trưởng Bộ Tài chính quy định mẫu, quản lý tem điện tử; việc tra cứu, cung cấp, sử dụng thông tin hóa đơn; cung cấp thông tin khi không tra cứu được do sự cố, thiên tai."]},"luat-38_94":{"tldr":"Định nghĩa chứng từ điện tử gồm các loại chứng từ, biên lai dạng dữ liệu điện tử do cơ quan quản lý thuế hoặc tổ chức khấu trừ thuế cấp; Chính phủ quy định chi tiết.","points":["Chứng từ điện tử gồm chứng từ, biên lai dạng dữ liệu điện tử do cơ quan quản lý thuế hoặc tổ chức có trách nhiệm khấu trừ thuế cấp cho người nộp thuế khi thực hiện thủ tục thuế hoặc khoản thu khác thuộc ngân sách.","Chính phủ quy định chi tiết các loại chứng từ điện tử và việc quản lý, sử dụng."]},"luat-38_95":{"tldr":"Định nghĩa hệ thống thông tin người nộp thuế và vai trò của thông tin người nộp thuế trong quản lý thuế, xây dựng chính sách, đánh giá chấp hành và phòng ngừa vi phạm.","points":["Hệ thống thông tin người nộp thuế là tập hợp thông tin, dữ liệu về người nộp thuế được thu thập, sắp xếp, lưu trữ, khai thác, sử dụng theo Luật này.","Thông tin người nộp thuế là cơ sở để quản lý thuế, đánh giá dự báo, xây dựng chính sách, đánh giá chấp hành pháp luật và ngăn ngừa, phát hiện vi phạm."]},"luat-38_96":{"tldr":"Quy định trách nhiệm của cơ quan quản lý thuế trong xây dựng, thu thập, xử lý và quản lý hệ thống thông tin người nộp thuế, bao gồm hợp tác quốc tế và phối hợp trao đổi thông tin.","points":["Cơ quan quản lý thuế xây dựng, quản lý, phát triển cơ sở dữ liệu, hạ tầng kỹ thuật; tổ chức đơn vị chuyên trách thu thập, xử lý, phân tích, dự báo và vận hành hệ thống.","Áp dụng biện pháp nghiệp vụ thu thập, trao đổi, xử lý thông tin trong và ngoài nước theo điều ước, thỏa thuận quốc tế về thuế, hải quan.","Phối hợp với cơ quan, tổ chức, cá nhân liên quan để trao đổi thông tin, kết nối mạng trực tuyến.","Bộ trưởng Bộ Tài chính quy định chi tiết việc xây dựng, thu thập, xử lý và quản lý hệ thống thông tin người nộp thuế."]},"luat-38_97":{"tldr":"Quy định trách nhi
