 trưởng Bộ Tài chính quy định chi tiết việc xây dựng, thu thập, xử lý và quản lý hệ thống thông tin người nộp thuế."}]},{"id":"luat-38_97","no":97,"code":"Điều 97","title":"Điều 97. Trách nhiệm của người nộp thuế trong việc cung cấp thông tin","shortTitle":"Trách nhiệm của người nộp thuế trong việc cung cấp thông tin","chuong":"Chương XI — THÔNG TIN NGƯỜI NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cung cấp đầy đủ, chính xác, trung thực, đúng thời hạn thông tin trong hồ sơ thuế, thông tin liên quan đến việc xác định nghĩa vụ thuế theo yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"2. Cung cấp thông tin bằng văn bản hoặc thông qua kết nối mạng với các hệ thống thông tin của cơ quan quản lý thuế theo yêu cầu."}]},{"id":"luat-38_98","no":98,"code":"Điều 98","title":"Điều 98. Trách nhiệm của tổ chức, cá nhân có liên quan trong việc cung cấp thông tin người nộp thuế","shortTitle":"Trách nhiệm của tổ chức, cá nhân có liên quan trong việc cung cấp thông tin người nộp thuế","chuong":"Chương XI — THÔNG TIN NGƯỜI NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các cơ quan sau đây có trách nhiệm cung cấp thông tin người nộp thuế cho cơ quan quản lý thuế:"},{"k":"p","t":"a) Cơ quan cấp giấy chứng nhận đăng ký đầu tư, giấy chứng nhận đăng ký doanh nghiệp, giấy phép thành lập và hoạt động có trách nhiệm cung cấp thông tin về nội dung giấy chứng nhận đăng ký đầu tư, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký  kinh doanh, giấy phép hành nghề, giấy phép thành lập và hoạt động, giấy chứng nhận thay đổi nội dung đăng ký kinh doanh của tổ chức, cá nhân cho cơ quan quản lý thuế trong thời hạn 07 ngày làm việc kể từ ngày cấp và cung cấp thông tin khác theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"b) Kho bạc Nhà nước cung cấp thông tin về số tiền thuế đã nộp, đã hoàn của người nộp thuế."},{"k":"p","t":"2. Cơ quan, tổ chức, cá nhân sau đây có trách nhiệm cung cấp thông tin theo yêu cầu của cơ quan quản lý thuế:"},{"k":"p","t":"a) Ngân hàng thương mại cung cấp nội dung giao dịch qua tài khoản, số dư tài khoản của người nộp thuế trong thời hạn 10 ngày làm việc kể từ ngày nhận được yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"b) Cơ quan quản lý nhà nước về nhà, đất cung cấp thông tin về hiện trạng sử dụng đất, sở hữu nhà của tổ chức, hộ gia đình, hộ kinh doanh, cá nhân, cá nhân kinh doanh;"},{"k":"p","t":"c) Cơ quan công an cung cấp, trao đổi thông tin liên quan đến đấu tranh phòng, chống tội phạm về thuế; cung cấp thông tin về xuất cảnh, nhập cảnh và thông tin về đăng ký, quản lý phương tiện giao thông;"},{"k":"p","t":"d) Tổ chức, cá nhân chi trả thu nhập có trách nhiệm cung cấp thông tin về chi trả thu nhập và số tiền thuế khấu trừ của người nộp thuế theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"đ) Cơ quan quản lý nhà nước về thương mại có trách nhiệm cung cấp thông tin về chính sách quản lý hàng hóa xuất khẩu, nhập khẩu, quá cảnh của Việt Nam và nước ngoài; thông tin về quản lý thị trường."},{"k":"p","t":"3. Các Bộ, ngành liên quan có trách nhiệm cung cấp thông tin người nộp thuế cho cơ quan quản lý thuế thông qua kết nối mạng trực tuyến, trao đổi dữ liệu điện tử hằng ngày qua hệ thống thông tin người nộp thuế hoặc thông qua cổng thông tin một cửa quốc gia."},{"k":"p","t":"4. Cơ quan, tổ chức, cá nhân khác có liên quan đến người nộp thuế có trách nhiệm cung cấp thông tin bằng văn bản hoặc dữ liệu điện tử người nộp thuế theo yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_99","no":99,"code":"Điều 99","title":"Điều 99. Bảo mật thông tin người nộp thuế","shortTitle":"Bảo mật thông tin người nộp thuế","chuong":"Chương XI — THÔNG TIN NGƯỜI NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế, công chức quản lý thuế, người đã là công chức quản lý thuế, cơ quan cung cấp, trao đổi thông tin người nộp thuế, tổ chức kinh doanh dịch vụ làm thủ tục về thuế phải giữ bí mật thông tin người nộp thuế theo quy định của pháp luật, trừ trường hợp quy định tại khoản 2 Điều này và Điều 100 của Luật này."},{"k":"p","t":"2. Để phục vụ hoạt động tố tụng, thanh tra, kiểm tra, kiểm toán trong trường hợp được yêu cầu bằng văn bản, cơ quan quản lý thuế có trách nhiệm cung cấp thông tin người nộp thuế cho các cơ quan sau đây:"},{"k":"p","t":"a) Cơ quan điều tra, Viện kiểm sát, Tòa án;"},{"k":"p","t":"b) Thanh tra nhà nước, Kiểm toán nhà nước;"},{"k":"p","t":"c) Cơ quan quản lý khác của Nhà nước theo quy định của pháp luật;"},{"k":"p","t":"d) Cơ quan quản lý thuế nước ngoài phù hợp với điều ước quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."}]},{"id":"luat-38_100","no":100,"code":"Điều 100","title":"Điều 100. Công khai thông tin người nộp thuế","shortTitle":"Công khai thông tin người nộp thuế","chuong":"Chương XI — THÔNG TIN NGƯỜI NỘP THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế được công khai thông tin người nộp thuế trong các trường hợp sau đây:"},{"k":"p","t":"a) Trốn thuế, chây ỳ không nộp tiền thuế và các khoản thu khác thuộc ngân sách nhà nước đúng thời hạn; nợ tiền thuế và các khoản thu khác thuộc ngân sách nhà nước;"},{"k":"p","t":"b) Vi phạm pháp luật về thuế làm ảnh hưởng đến quyền lợi và nghĩa vụ nộp thuế của tổ chức, cá nhân khác;"},{"k":"p","t":"c) Không thực hiện yêu cầu của cơ quan quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"LÀM THỦ TỤC HẢI QUAN"}]},{"id":"luat-38_101","no":101,"code":"Điều 101","title":"Điều 101. Tổ chức kinh doanh dịch vụ làm thủ tục về thuế","shortTitle":"Tổ chức kinh doanh dịch vụ làm thủ tục về thuế","chuong":"Chương XII — TỔ CHỨC KINH DOANH DỊCH VỤ LÀM THỦ TỤC VỀ THUẾ,","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức kinh doanh dịch vụ làm thủ tục về thuế (sau đây gọi là đại lý thuế) là doanh nghiệp được thành lập và hoạt động theo quy định của pháp luật về doanh nghiệp, thực hiện các dịch vụ theo thỏa thuận với người nộp thuế."},{"k":"p","t":"2. Doanh nghiệp đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế thực hiện đăng ký với Cục Thuế tỉnh, thành phố trực thuộc trung ương để được cấp giấy xác nhận đủ điều kinh doanh dịch vụ làm thủ tục về thuế."}]},{"id":"luat-38_102","no":102,"code":"Điều 102","title":"Điều 102. Điều kiện cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế","shortTitle":"Điều kiện cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế","chuong":"Chương XII — TỔ CHỨC KINH DOANH DỊCH VỤ LÀM THỦ TỤC VỀ THUẾ,","muc":"","level":1,"content":[{"k":"p","t":"1. Là doanh nghiệp đã được thành lập theo quy định của pháp luật."},{"k":"p","t":"2. Có ít nhất 02 người được cấp chứng chỉ hành nghề dịch vụ làm thủ tục về thuế, làm việc toàn thời gian tại doanh nghiệp."}]},{"id":"luat-38_103","no":103,"code":"Điều 103","title":"Điều 103. Cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế","shortTitle":"Cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế","chuong":"Chương XII — TỔ CHỨC KINH DOANH DỊCH VỤ LÀM THỦ TỤC VỀ THUẾ,","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế bao gồm:"},{"k":"p","t":"a) Đơn đề nghị cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế;"},{"k":"p","t":"b) Bản chụp chứng chỉ hành nghề dịch vụ làm thủ tục về thuế của các cá nhân làm việc tại doanh nghiệp;"},{"k":"p","t":"c) Bản sao hợp đồng lao động giữa doanh nghiệp với các cá nhân có chứng chỉ hành nghề dịch vụ làm thủ tục về thuế."},{"k":"p","t":"2. Cục Thuế tỉnh, thành phố trực thuộc trung ương thực hiện cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế cho doanh nghiệp trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ hợp lệ, trường hợp từ chối cấp thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-38_104","no":104,"code":"Điều 104","title":"Điều 104. Cung cấp dịch vụ làm thủ tục về thuế","shortTitle":"Cung cấp dịch vụ làm thủ tục về thuế","chuong":"Chương XII — TỔ CHỨC KINH DOANH DỊCH VỤ LÀM THỦ TỤC VỀ THUẾ,","muc":"","level":1,"content":[{"k":"p","t":"1. Dịch vụ do đại lý thuế cung cấp cho người nộp thuế theo hợp đồng bao gồm:"},{"k":"p","t":"a) Thủ tục đăng ký thuế, khai thuế, nộp thuế, quyết toán thuế, lập hồ sơ đề nghị miễn thuế, giảm thuế, hoàn thuế và các thủ tục về thuế khác thay người nộp thuế;"},{"k":"p","t":"b) Dịch vụ tư vấn thuế;"},{"k":"p","t":"c) Dịch vụ kế toán cho doanh nghiệp siêu nhỏ theo quy định tại Điều 150 của Luật này. Doanh nghiệp siêu nhỏ được xác định theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa."},{"k":"p","t":"2. Đại lý thuế có quyền, nghĩa vụ sau đây:"},{"k":"p","t":"a) Thực hiện các dịch vụ với người nộp thuế theo thỏa thuận trong hợp đồng;"},{"k":"p","t":"b) Tuân thủ quy định của Luật này, pháp luật về thuế và quy định khác của pháp luật có liên quan trong hoạt động hành nghề dịch vụ làm thủ tục về thuế;"},{"k":"p","t":"c) Chịu trách nhiệm trước pháp luật và chịu trách nhiệm trước người nộp thuế về nội dung dịch vụ đã cung cấp."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định việc quản lý hoạt động kinh doanh dịch vụ làm thủ tục về thuế."}]},{"id":"luat-38_105","no":105,"code":"Điều 105","title":"Điều 105. Chứng chỉ hành nghề dịch vụ làm thủ tục về thuế","shortTitle":"Chứng chỉ hành nghề dịch vụ làm thủ tục về thuế","chuong":"Chương XII — TỔ CHỨC KINH DOANH DỊCH VỤ LÀM THỦ TỤC VỀ THUẾ,","muc":"","level":1,"content":[{"k":"p","t":"1. Người được cấp chứng chỉ hành nghề dịch vụ làm thủ tục về thuế phải có các tiêu chuẩn sau đây:"},{"k":"p","t":"a) Có năng lực hành vi dân sự đầy đủ;"},{"k":"p","t":"b) Có trình độ từ đại học trở lên thuộc chuyên ngành kinh tế, tài chính, kế toán, kiểm toán hoặc chuyên ngành khác theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"c) Có thời gian công tác thực tế về tài chính, kế toán, kiểm toán, thuế từ 36 tháng trở lên sau khi tốt nghiệp đại học;"},{"k":"p","t":"d) Đạt kết quả kỳ thi lấy chứng chỉ hành nghề dịch vụ làm thủ tục về thuế."},{"k":"p","t":"Kỳ thi lấy chứng chỉ hành nghề dịch vụ làm thủ tục về thuế gồm môn pháp luật về thuế và môn kế toán."},{"k":"p","t":"2. Người có chứng chỉ kiểm toán viên hoặc chứng chỉ kế toán viên do cơ quan có thẩm quyền cấp theo quy định thì được cấp chứng chỉ hành nghề dịch vụ làm thủ tục về thuế mà không phải tham gia kỳ thi lấy chứng chỉ hành nghề dịch vụ làm thủ tục về thuế."},{"k":"p","t":"3. Người có chứng chỉ hành nghề dịch vụ làm thủ tục về thuế làm việc tại đại lý thuế gọi là nhân viên đại lý thuế. Nhân viên đại lý thuế phải tham gia đầy đủ chương trình cập nhật kiến thức."},{"k":"p","t":"4. Những người sau đây không được làm nhân viên đại lý thuế:"},{"k":"p","t":"a) Cán bộ, công chức, viên chức; sĩ quan, hạ sĩ quan, quân nhân chuyên nghiệp, công nhân quốc phòng, viên chức quốc phòng; sĩ quan, hạ sĩ quan, công nhân công an;"},{"k":"p","t":"b) Người đang bị cấm hành nghề dịch vụ làm thủ tục về thuế, kế toán, kiểm toán theo bản án, quyết định của Tòa án đã có hiệu lực pháp luật; người đang bị truy cứu trách nhiệm hình sự;"},{"k":"p","t":"c) Người đã bị kết án về một trong các tội xâm phạm trật tự quản lý kinh tế liên quan đến thuế, tài chính, kế toán mà chưa được xóa án tích; người đang bị áp dụng biện pháp xử lý hành chính giáo dục tại xã, phường, thị trấn, đưa vào cơ sở giáo dục bắt buộc, đưa vào cơ sở cai nghiện bắt buộc;"},{"k":"p","t":"d) Người bị xử phạt vi phạm hành chính về quản lý thuế, về kế toán, kiểm toán mà chưa hết thời hạn 06 tháng kể từ ngày chấp hành xong quyết định xử phạt trong trường hợp bị phạt cảnh cáo hoặc chưa hết thời hạn 01 năm kể từ ngày chấp hành xong quyết định xử phạt bằng hình thức khác."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định về việc tổ chức thi, điều kiện miễn môn thi; thủ tục cấp, thu hồi chứng chỉ hành nghề dịch vụ làm thủ tục về thuế; việc cập nhật kiến thức của nhân viên đại lý thuế."}]},{"id":"luat-38_106","no":106,"code":"Điều 106","title":"Điều 106. Tổ chức kinh doanh dịch vụ làm thủ tục hải quan","shortTitle":"Tổ chức kinh doanh dịch vụ làm thủ tục hải quan","chuong":"Chương XII — TỔ CHỨC KINH DOANH DỊCH VỤ LÀM THỦ TỤC VỀ THUẾ,","muc":"","level":1,"content":[{"k":"p","t":"Tổ chức kinh doanh dịch vụ làm thủ tục hải quan (sau đây gọi là đại lý làm thủ tục hải quan) thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"QUY ĐỊNH CHUNG VỀ KIỂM TRA THUẾ, THANH TRA THUẾ"}]},{"id":"luat-38_107","no":107,"code":"Điều 107","title":"Điều 107. Nguyên tắc kiểm tra thuế, thanh tra thuế","shortTitle":"Nguyên tắc kiểm tra thuế, thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Áp dụng quản lý rủi ro trong quản lý thuế và ứng dụng công nghệ thông tin trong kiểm tra thuế, thanh tra thuế."},{"k":"p","t":"2. Tuân thủ quy định của Luật này, quy định khác của pháp luật có liên quan và mẫu biểu thanh tra, kiểm tra, trình tự, thủ tục, hồ sơ kiểm tra thuế theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Không cản trở hoạt động bình thường của người nộp thuế."},{"k":"p","t":"4. Khi kiểm tra thuế, thanh tra thuế tại trụ sở của người nộp thuế, thủ trưởng cơ quan quản lý thuế phải ban hành quyết định kiểm tra, thanh tra."},{"k":"p","t":"5. Việc kiểm tra thuế, thanh tra thuế nhằm đánh giá tính đầy đủ, chính xác, trung thực nội dung các chứng từ, thông tin, hồ sơ mà người nộp thuế đã khai, nộp, xuất trình với cơ quan quản lý thuế; đánh giá việc tuân thủ pháp luật về thuế và quy định khác của pháp luật có liên quan của người nộp thuế để xử lý về thuế theo quy định của pháp luật."}]},{"id":"luat-38_108","no":108,"code":"Điều 108","title":"Điều 108. Xử lý kết quả kiểm tra thuế, thanh tra thuế","shortTitle":"Xử lý kết quả kiểm tra thuế, thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Căn cứ vào kết quả kiểm tra thuế, thanh tra thuế, thủ trưởng cơ quan quản lý thuế ra quyết định xử lý về thuế, thu hồi số tiền thuế đã hoàn không đúng quy định của pháp luật về thuế, xử phạt vi phạm hành chính về quản lý thuế theo thẩm quyền hoặc đề nghị người có thẩm quyền ra quyết định xử phạt vi phạm hành chính về quản lý thuế. Trường hợp xác định rõ hành vi vi phạm hành chính tại biên bản thanh tra thuế, kiểm tra thuế thì biên bản thanh tra thuế, kiểm tra thuế được xác định là biên bản vi phạm hành chính."},{"k":"p","t":"2. Trường hợp kiểm tra thuế, thanh tra thuế mà phát hiện hành vi trốn thuế có dấu hiệu tội phạm thì cơ quan quản lý thuế chuyển hồ sơ cho cơ quan điều tra có thẩm quyền để điều tra theo quy định của pháp luật; cơ quan quản lý thuế có trách nhiệm phối hợp với cơ quan tiến hành tố tụng trong việc điều tra, truy tố, xét xử theo quy định của pháp luật."},{"k":"p","t":"KIỂM TRA THUẾ"}]},{"id":"luat-38_109","no":109,"code":"Điều 109","title":"Điều 109. Kiểm tra thuế tại trụ sở của cơ quan quản lý thuế","shortTitle":"Kiểm tra thuế tại trụ sở của cơ quan quản lý thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Kiểm tra thuế tại trụ sở của cơ quan quản lý thuế do cơ quan quản lý thuế thực hiện đối với các hồ sơ thuế được quy định như sau:"},{"k":"p","t":"a) Kiểm tra thuế tại trụ sở của cơ quan thuế được thực hiện trên cơ sở hồ sơ thuế của người nộp thuế nhằm đánh giá tính đầy đủ, chính xác các thông tin, chứng từ trong hồ sơ thuế, sự tuân thủ pháp luật về thuế của người nộp thuế. Công chức thuế được giao nhiệm vụ kiểm tra thuế căn cứ vào mức độ rủi ro về thuế của hồ sơ thuế được phân loại từ cơ sở dữ liệu công nghệ thông tin hoặc theo phân công của thủ trưởng cơ quan thuế thực hiện phân tích hồ sơ thuế theo mức độ rủi ro về thuế để đề xuất kế hoạch kiểm tra tại trụ sở của cơ quan thuế hoặc xử lý theo quy định tại khoản 2 Điều này;"},{"k":"p","t":"b) Kiểm tra thuế tại trụ sở của cơ quan hải quan được thực hiện nhằm kiểm tra, đối chiếu, so sánh nội dung trong hồ sơ thuế với thông tin, tài liệu có liên quan, quy định của pháp luật về thuế, kết quả kiểm tra thực tế hàng hóa trong trường hợp cần thiết đối với hàng hóa xuất khẩu, nhập khẩu. Trường hợp kiểm tra sau thông quan tại trụ sở của cơ quan hải quan thì thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"2. Việc xử lý kết quả kiểm tra thuế tại trụ sở của cơ quan quản lý thuế được quy định như sau:"},{"k":"p","t":"a) Trường hợp kiểm tra trong quá trình làm thủ tục hải quan mà phát hiện vi phạm dẫn đến thiếu thuế, trốn thuế thì người nộp thuế phải nộp đủ thuế, bị xử phạt theo quy định của Luật này và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Trường hợp hồ sơ thuế có nội dung cần làm rõ liên quan đến số tiền thuế phải nộp, số tiền thuế được miễn, số tiền thuế được giảm, số tiền thuế còn được khấu trừ chuyển kỳ sau, số tiền thuế được hoàn, số tiền thuế không thu thì cơ quan quản lý thuế thông báo yêu cầu người nộp thuế giải trình hoặc bổ sung thông tin, tài liệu. Trường hợp người nộp thuế đã giải trình và bổ sung thông tin, tài liệu chứng minh số tiền thuế đã khai là đúng thì hồ sơ thuế được chấp nhận; nếu không đủ căn cứ chứng minh số tiền thuế đã khai là đúng thì cơ quan quản lý thuế yêu cầu người nộp thuế khai bổ sung."},{"k":"p","t":"Trường hợp hết thời hạn theo thông báo của cơ quan quản lý thuế mà người nộp thuế không giải trình, bổ sung thông tin, tài liệu hoặc không khai bổ sung hồ sơ thuế hoặc giải trình, khai bổ sung hồ sơ thuế không đúng thì thủ trưởng cơ quan quản lý thuế quyết định ấn định số tiền thuế phải nộp hoặc ra quyết định kiểm tra thuế tại trụ sở của người nộp thuế hoặc làm căn cứ để xây dựng kế hoạch kiểm tra, thanh tra theo nguyên tắc quản lý rủi ro trong quản lý thuế."}]},{"id":"luat-38_110","no":110,"code":"Điều 110","title":"Điều 110. Kiểm tra thuế tại trụ sở của người nộp thuế","shortTitle":"Kiểm tra thuế tại trụ sở của người nộp thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Kiểm tra thuế tại trụ sở của người nộp thuế được thực hiện trong các trường hợp sau đây:"},{"k":"p","t":"a) Trường hợp hồ sơ thuộc diện kiểm tra trước hoàn thuế; kiểm tra sau hoàn thuế đối với hồ sơ thuộc diện hoàn thuế trước;"},{"k":"p","t":"b) Trường hợp quy định tại điểm b khoản 2 Điều 109 của Luật này;"},{"k":"p","t":"c) Trường hợp kiểm tra sau thông quan tại trụ sở của người khai hải quan theo quy định của pháp luật về hải quan;"},{"k":"p","t":"d) Trường hợp có dấu hiệu vi phạm pháp luật;"},{"k":"p","t":"đ) Trường hợp được lựa chọn theo kế hoạch, chuyên đề;"},{"k":"p","t":"e) Trường hợp theo kiến nghị của Kiểm toán nhà nước, Thanh tra nhà nước, cơ quan khác có thẩm quyền;"},{"k":"p","t":"g) Trường hợp chia, tách, sáp nhập, hợp nhất, chuyển đổi loại hình doanh nghiệp, giải thể, chấm dứt hoạt động, cổ phần hóa, chấm dứt hiệu lực mã số thuế, chuyển địa điểm kinh doanh và các trường hợp kiểm tra đột xuất, kiểm tra theo chỉ đạo của cấp có thẩm quyền, trừ trường hợp giải thể, chấm dứt hoạt động mà cơ quan thuế không phải thực hiện quyết toán thuế theo quy định của pháp luật."},{"k":"p","t":"2. Đối với các trường hợp quy định tại các điểm đ, e và g khoản 1 Điều này, cơ quan quản lý thuế thực hiện kiểm tra tại trụ sở của người nộp thuế không quá 01 lần trong 01 năm."},{"k":"p","t":"3. Quyết định kiểm tra thuế phải được gửi cho người nộp thuế trong thời hạn 03 ngày làm việc và thực hiện công bố trong thời hạn 10 ngày làm việc kể từ ngày ký. Trước khi công bố quyết định kiểm tra mà người nộp thuế chứng minh được số tiền thuế đã khai là đúng và nộp đủ số tiền thuế phải nộp thì cơ quan quản lý thuế bãi bỏ quyết định kiểm tra thuế."},{"k":"p","t":"4. Trình tự, thủ tục kiểm tra thuế được quy định như sau:"},{"k":"p","t":"a) Công bố quyết định kiểm tra thuế khi bắt đầu tiến hành kiểm tra thuế;"},{"k":"p","t":"b) Đối chiếu nội dung khai báo với sổ kế toán, chứng từ kế toán, báo cáo tài chính, kết quả phân tích rủi ro về thuế, dữ liệu thông tin kiểm tra tại trụ sở của cơ quan thuế các tài liệu có liên quan, tình trạng thực tế trong phạm vi, nội dung của quyết định kiểm tra thuế;"},{"k":"p","t":"c) Thời hạn kiểm tra được xác định trong quyết định kiểm tra nhưng không quá 10 ngày làm việc tại trụ sở của người nộp thuế. Thời hạn kiểm tra được tính từ ngày công bố quyết định kiểm tra; trường hợp phạm vi kiểm tra lớn, nội dung phức tạp thì người đã quyết định kiểm tra có thể gia hạn 01 lần nhưng không quá 10 ngày làm việc tại trụ sở của người nộp thuế;"},{"k":"p","t":"d) Lập biên bản kiểm tra thuế trong thời hạn 05 ngày làm việc kể từ ngày hết thời hạn kiểm tra;"},{"k":"p","t":"đ) Xử lý theo thẩm quyền hoặc đề nghị cấp có thẩm quyền xử lý theo kết quả kiểm tra."},{"k":"p","t":"5. Trường hợp kiểm tra sau thông quan thực hiện theo quy định của pháp luật về hải quan."}]},{"id":"luat-38_111","no":111,"code":"Điều 111","title":"Điều 111. Quyền và nghĩa vụ của người nộp thuế trong kiểm tra thuế tại trụ sở của người nộp thuế","shortTitle":"Quyền và nghĩa vụ của người nộp thuế trong kiểm tra thuế tại trụ sở của người nộp thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có các quyền sau đây:"},{"k":"p","t":"a) Từ chối việc kiểm tra khi không có quyết định kiểm tra thuế;"},{"k":"p","t":"b) Từ chối cung cấp thông tin, tài liệu không liên quan đến nội dung kiểm tra thuế; thông tin, tài liệu thuộc bí mật nhà nước, trừ trường hợp pháp luật có quy định khác;"},{"k":"p","t":"c) Nhận biên bản kiểm tra thuế và yêu cầu giải thích nội dung biên bản kiểm tra thuế;"},{"k":"p","t":"d) Bảo lưu ý kiến trong biên bản kiểm tra thuế;"},{"k":"p","t":"đ) Khiếu nại, khởi kiện và yêu cầu bồi thường thiệt hại theo quy định của pháp luật;"},{"k":"p","t":"e) Tố cáo hành vi vi phạm pháp luật trong quá trình kiểm tra thuế."},{"k":"p","t":"2. Người nộp thuế có các nghĩa vụ sau đây:"},{"k":"p","t":"a) Chấp hành quyết định kiểm tra thuế của cơ quan quản lý thuế;"},{"k":"p","t":"b) Cung cấp kịp thời, đầy đủ, chính xác các thông tin, tài liệu liên quan đến nội dung kiểm tra theo yêu cầu của đoàn kiểm tra thuế; chịu trách nhiệm trước pháp luật về tính chính xác, trung thực của thông tin, tài liệu đã cung cấp;"},{"k":"p","t":"c) Ký biên bản kiểm tra thuế trong thời hạn 05 ngày làm việc kể từ ngày kết thúc kiểm tra;"},{"k":"p","t":"d) Chấp hành kiến nghị tại biên bản kiểm tra thuế, kết luận, quyết định xử lý kết quả kiểm tra thuế."}]},{"id":"luat-38_112","no":112,"code":"Điều 112","title":"Điều 112. Nhiệm vụ, quyền hạn của thủ trưởng cơ quan quản lý thuế ra quyết định kiểm tra thuế và công chức quản lý thuế trong việc kiểm tra thuế","shortTitle":"Nhiệm vụ, quyền hạn của thủ trưởng cơ quan quản lý thuế ra quyết định kiểm tra thuế và công chức quản lý thuế trong việc kiểm tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế ra quyết định kiểm tra thuế có nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Chỉ đạo thực hiện đúng nội dung, thời hạn ghi trong quyết định kiểm tra thuế;"},{"k":"p","t":"b) Áp dụng biện pháp quy định tại Điều 122 của Luật này;"},{"k":"p","t":"c) Gia hạn thời hạn kiểm tra;"},{"k":"p","t":"d) Quyết định xử lý về thuế, xử phạt vi phạm hành chính theo thẩm quyền hoặc kiến nghị người có thẩm quyền kết luận, ban hành quyết định xử phạt vi phạm hành chính về quản lý thuế;"},{"k":"p","t":"đ) Giải quyết khiếu nại, tố cáo theo thẩm quyền."},{"k":"p","t":"2. Công chức quản lý thuế khi thực hiện kiểm tra thuế có nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Thực hiện đúng nội dung, thời hạn ghi trong quyết định kiểm tra thuế;"},{"k":"p","t":"b) Yêu cầu người nộp thuế cung cấp thông tin, tài liệu liên quan đến nội dung kiểm tra thuế;"},{"k":"p","t":"c) Lập biên bản kiểm tra thuế; báo cáo kết quả kiểm tra với người đã ra quyết định kiểm tra thuế và chịu trách nhiệm về tính chính xác, trung thực, khách quan của biên bản, báo cáo đó;"},{"k":"p","t":"d) Xử phạt vi phạm hành chính theo thẩm quyền hoặc kiến nghị với người có thẩm quyền ra kết luận, quyết định xử lý vi phạm về thuế."},{"k":"p","t":"THANH TRA THUẾ"}]},{"id":"luat-38_113","no":113,"code":"Điều 113","title":"Điều 113. Các trường hợp thanh tra thuế","shortTitle":"Các trường hợp thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Khi có dấu hiệu vi phạm pháp luật về thuế."},{"k":"p","t":"2. Để giải quyết khiếu nại, tố cáo hoặc thực hiện các biện pháp phòng, chống tham nhũng."},{"k":"p","t":"3. Theo yêu cầu của công tác quản lý thuế trên cơ sở kết quả phân loại rủi ro trong quản lý thuế."},{"k":"p","t":"4. Theo kiến nghị của Kiểm toán nhà nước, kết luận của Thanh tra nhà nước và cơ quan khác có thẩm quyền."}]},{"id":"luat-38_114","no":114,"code":"Điều 114","title":"Điều 114. Quyết định thanh tra thuế","shortTitle":"Quyết định thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế các cấp có thẩm quyền ra quyết định thanh tra thuế."},{"k":"p","t":"2. Quyết định thanh tra thuế phải có các nội dung chính sau đây:"},{"k":"p","t":"a) Căn cứ pháp lý để thanh tra thuế;"},{"k":"p","t":"b) Đối tượng, nội dung, phạm vi, nhiệm vụ thanh tra thuế;"},{"k":"p","t":"c) Thời hạn tiến hành thanh tra thuế;"},{"k":"p","t":"d) Trưởng đoàn thanh tra thuế và các thành viên của đoàn thanh tra thuế."},{"k":"p","t":"3. Chậm nhất là 03 ngày làm việc kể từ ngày ký, quyết định thanh tra thuế phải được gửi cho đối tượng thanh tra."},{"k":"p","t":"4. Quyết định thanh tra thuế phải được công bố chậm nhất là 15 ngày kể từ ngày ra quyết định thanh tra thuế."}]},{"id":"luat-38_115","no":115,"code":"Điều 115","title":"Điều 115. Thời hạn thanh tra thuế","shortTitle":"Thời hạn thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thời hạn thanh tra thuế thực hiện theo quy định của Luật Thanh tra. Thời hạn của cuộc thanh tra được tính là thời gian thực hiện thanh tra tại trụ sở của người nộp thuế kể từ ngày công bố quyết định thanh tra đến ngày kết thúc việc thanh tra tại trụ sở của người nộp thuế."},{"k":"p","t":"2. Trường hợp cần thiết, người ra quyết định thanh tra thuế gia hạn thời hạn thanh tra thuế theo quy định của Luật Thanh tra. Việc gia hạn thời hạn thanh tra thuế do người ra quyết định thanh tra quyết định."}]},{"id":"luat-38_116","no":116,"code":"Điều 116","title":"Điều 116. Nhiệm vụ, quyền hạn của người ra quyết định thanh tra thuế","shortTitle":"Nhiệm vụ, quyền hạn của người ra quyết định thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người ra quyết định thanh tra thuế có các nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Chỉ đạo, kiểm tra, giám sát đoàn thanh tra thuế thực hiện đúng nội dung, quyết định thanh tra thuế;"},{"k":"p","t":"b) Yêu cầu đối tượng thanh tra cung cấp thông tin, tài liệu, báo cáo bằng văn bản, giải trình về những vấn đề liên quan đến nội dung thanh tra thuế; yêu cầu cơ quan, tổ chức, cá nhân có thông tin, tài liệu liên quan đến nội dung thanh tra thuế cung cấp thông tin, tài liệu đó;"},{"k":"p","t":"c) Trưng cầu giám định về những vấn đề liên quan đến nội dung thanh tra thuế;"},{"k":"p","t":"d) Tạm đình chỉ hoặc kiến nghị người có thẩm quyền đình chỉ việc làm khi xét thấy việc làm đó gây thiệt hại nghiêm trọng đến lợi ích của Nhà nước, quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân;"},{"k":"p","t":"đ) Quyết định xử lý theo thẩm quyền hoặc kiến nghị người có thẩm quyền xử lý kết quả thanh tra, đôn đốc việc thực hiện quyết định xử lý về thanh tra thuế;"},{"k":"p","t":"e) Giải quyết khiếu nại, tố cáo liên quan đến trách nhiệm của trưởng đoàn thanh tra thuế, các thành viên khác của đoàn thanh tra thuế;"},{"k":"p","t":"g) Đình chỉ, thay đổi trưởng đoàn thanh tra, thành viên đoàn thanh tra khi không đáp ứng được yêu cầu, nhiệm vụ thanh tra hoặc có hành vi vi phạm pháp luật hoặc khi phát hiện trưởng đoàn thanh tra, thành viên đoàn thanh tra có liên quan đến đối tượng thanh tra hoặc vì lý do khách quan khác mà không thể thực hiện nhiệm vụ thanh tra;"},{"k":"p","t":"h) Kết luận về nội dung thanh tra thuế;"},{"k":"p","t":"i) Chuyển hồ sơ vụ việc vi phạm pháp luật sang cơ quan điều tra khi phát hiện có dấu hiệu của tội phạm, đồng thời thông báo bằng văn bản cho Viện kiểm sát cùng cấp biết;"},{"k":"p","t":"k) Áp dụng các biện pháp quy định tại các điều 121, 122 và 123 của Luật này;"},{"k":"p","t":"l) Yêu cầu tổ chức tín dụng nơi đối tượng thanh tra có tài khoản phong tỏa tài khoản đó để phục vụ việc thanh tra khi có căn cứ cho rằng đối tượng thanh tra tẩu tán tài sản, không thực hiện quyết định thu hồi tiền, tài sản của Thủ trưởng cơ quan Thanh tra nhà nước, Thủ trưởng cơ quan được giao thực hiện chức năng thanh tra chuyên ngành hoặc Thủ trưởng cơ quan quản lý nhà nước."},{"k":"p","t":"2. Khi thực hiện nhiệm vụ, quyền hạn quy định tại khoản 1 Điều này, người ra quyết định thanh tra thuế phải chịu trách nhiệm trước pháp luật về quyết định của mình."}]},{"id":"luat-38_117","no":117,"code":"Điều 117","title":"Điều 117. Nhiệm vụ, quyền hạn của trưởng đoàn thanh tra thuế, thành viên đoàn thanh tra thuế","shortTitle":"Nhiệm vụ, quyền hạn của trưởng đoàn thanh tra thuế, thành viên đoàn thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trưởng đoàn thanh tra thuế có các nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Tổ chức, chỉ đạo các thành viên đoàn thanh tra thuế thực hiện đúng nội dung quyết định thanh tra thuế;"},{"k":"p","t":"b) Kiến nghị với người ra quyết định thanh tra áp dụng biện pháp thuộc nhiệm vụ, quyền hạn của người ra quyết định thanh tra theo quy định của pháp luật về thanh tra để bảo đảm thực hiện nhiệm vụ được giao;"},{"k":"p","t":"c) Yêu cầu đối tượng thanh tra xuất trình giấy phép hành nghề, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký đầu tư, giấy phép thành lập và hoạt động và cung cấp thông tin, tài liệu, báo cáo bằng văn bản, giải trình về những vấn đề liên quan đến nội dung thanh tra thuế;"},{"k":"p","t":"d) Lập biên bản về việc vi phạm của đối tượng thanh tra;"},{"k":"p","t":"đ) Kiểm kê tài sản liên quan đến nội dung thanh tra của đối tượng thanh tra;"},{"k":"p","t":"e) Yêu cầu cơ quan, tổ chức, cá nhân khác có thông tin, tài liệu liên quan đến nội dung thanh tra cung cấp thông tin, tài liệu đó;"},{"k":"p","t":"g) Yêu cầu người có thẩm quyền tạm giữ tiền, đồ vật, giấy phép sử dụng trái pháp luật khi xét thấy cần ngăn chặn ngay việc vi phạm pháp luật hoặc để xác minh tình tiết làm chứng cứ cho việc kết luận, xử lý;"},{"k":"p","t":"h) Quyết định niêm phong tài liệu của đối tượng thanh tra khi có căn cứ cho rằng có vi phạm pháp luật;"},{"k":"p","t":"i) Tạm đình chỉ hoặc kiến nghị người có thẩm quyền đình chỉ việc làm khi xét thấy việc làm đó gây thiệt hại nghiêm trọng đến lợi ích của Nhà nước, quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân;"},{"k":"p","t":"k) Yêu cầu tổ chức tín dụng nơi đối tượng thanh tra có tài khoản phong tỏa tài khoản đó để phục vụ việc thanh tra khi có căn cứ cho rằng đối tượng thanh tra có hành vi tẩu tán tài sản;"},{"k":"p","t":"l) Xử phạt vi phạm hành chính theo quy định của pháp luật;"},{"k":"p","t":"m) Báo cáo với người ra quyết định thanh tra thuế về kết quả thanh tra và chịu trách nhiệm về tính chính xác, trung thực, khách quan của báo cáo đó;"},{"k":"p","t":"n) Áp dụng biện pháp quy định tại Điều 122 của Luật này."},{"k":"p","t":"2. Thành viên đoàn thanh tra thuế có các nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Thực hiện nhiệm vụ theo sự phân công của trưởng đoàn thanh tra thuế;"},{"k":"p","t":"b) Yêu cầu đối tượng thanh tra cung cấp thông tin, tài liệu, báo cáo bằng văn bản, giải trình về vấn đề liên quan đến nội dung thanh tra; yêu cầu cơ quan, tổ chức, cá nhân có thông tin, tài liệu liên quan đến nội dung thanh tra cung cấp thông tin, tài liệu đó;"},{"k":"p","t":"c) Kiến nghị trưởng đoàn thanh tra áp dụng biện pháp thuộc nhiệm vụ, quyền hạn của trưởng đoàn thanh tra theo quy định tại khoản 1 Điều này để bảo đảm thực hiện nhiệm vụ được giao;"},{"k":"p","t":"d) Kiến nghị xử lý những vấn đề liên quan đến nội dung thanh tra thuế;"},{"k":"p","t":"đ) Báo cáo kết quả thực hiện nhiệm vụ được giao với trưởng đoàn thanh tra thuế, chịu trách nhiệm trước pháp luật và trưởng đoàn thanh tra về tính chính xác, trung thực, khách quan của nội dung đã báo cáo."}]},{"id":"luat-38_118","no":118,"code":"Điều 118","title":"Điều 118. Quyền và nghĩa vụ của đối tượng thanh tra thuế","shortTitle":"Quyền và nghĩa vụ của đối tượng thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Đối tượng thanh tra thuế có các quyền sau đây:"},{"k":"p","t":"a) Giải trình về những vấn đề có liên quan đến nội dung thanh tra thuế;"},{"k":"p","t":"b) Khiếu nại về quyết định, hành vi của người ra quyết định thanh tra, trưởng đoàn thanh tra, thành viên của đoàn thanh tra trong quá trình thanh tra; khiếu nại về kết luận thanh tra, quyết định xử lý sau thanh tra theo quy định của pháp luật về khiếu nại; trong khi chờ giải quyết khiếu nại, người khiếu nại vẫn phải thực hiện các quyết định đó;"},{"k":"p","t":"c) Nhận biên bản thanh tra thuế và yêu cầu giải thích nội dung biên bản thanh tra thuế;"},{"k":"p","t":"d) Từ chối cung cấp thông tin, tài liệu không liên quan đến nội dung thanh tra thuế, thông tin, tài liệu thuộc bí mật Nhà nước, trừ trường hợp pháp luật có quy định khác;"},{"k":"p","t":"đ) Yêu cầu bồi thường thiệt hại theo quy định của pháp luật;"},{"k":"p","t":"e) Tố cáo hành vi vi phạm pháp luật của thủ trưởng cơ quan quản lý thuế, trưởng đoàn thanh tra thuế và thành viên của đoàn thanh tra thuế theo quy định của pháp luật."},{"k":"p","t":"2. Đối tượng thanh tra thuế có các nghĩa vụ sau đây:"},{"k":"p","t":"a) Chấp hành quyết định thanh tra thuế;"},{"k":"p","t":"b) Cung cấp kịp thời, đầy đủ, chính xác các thông tin, tài liệu theo yêu cầu của người ra quyết định thanh tra, trưởng đoàn thanh tra, thành viên của đoàn thanh tra và phải chịu trách nhiệm trước pháp luật về tính chính xác, trung thực của thông tin, tài liệu đã cung cấp;"},{"k":"p","t":"c) Thực hiện yêu cầu, kiến nghị, kết luận thanh tra thuế, quyết định xử lý của người ra quyết định thanh tra, trưởng đoàn thanh tra, các thành viên của đoàn thanh tra và cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"d) Ký biên bản thanh tra."}]},{"id":"luat-38_119","no":119,"code":"Điều 119","title":"Điều 119. Kết luận thanh tra thuế","shortTitle":"Kết luận thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Chậm nhất là 15 ngày kể từ ngày nhận được báo cáo kết quả thanh tra thuế trừ trường hợp nội dung kết luận thanh tra phải chờ kết luận chuyên môn của cơ quan, tổ chức có thẩm quyền, người ra quyết định thanh tra thuế phải có văn bản kết luận thanh tra thuế. Kết luận thanh tra thuế phải có các nội dung chính sau đây:"},{"k":"p","t":"a) Đánh giá việc thực hiện pháp luật về thuế của đối tượng thanh tra thuộc nội dung thanh tra thuế;"},{"k":"p","t":"b) Kết luận về nội dung được thanh tra thuế;"},{"k":"p","t":"c) Xác định rõ tính chất, mức độ vi phạm, nguyên nhân, trách nhiệm của cơ quan, tổ chức, cá nhân có hành vi vi phạm;"},{"k":"p","t":"d) Xử lý theo thẩm quyền hoặc kiến nghị người có thẩm quyền xử lý vi phạm hành chính theo quy định của pháp luật."},{"k":"p","t":"2. Trong quá trình ra văn bản kết luận, quyết định xử lý, người ra quyết định thanh tra có quyền yêu cầu trưởng đoàn thanh tra, thành viên đoàn thanh tra báo cáo, yêu cầu đối tượng thanh tra giải trình để làm rõ thêm những vấn đề cần thiết phục vụ cho việc ra kết luận, quyết định xử lý."}]},{"id":"luat-38_120","no":120,"code":"Điều 120","title":"Điều 120. Thanh tra lại trong hoạt động thanh tra thuế","shortTitle":"Thanh tra lại trong hoạt động thanh tra thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thẩm quyền quyết định thanh tra lại vụ việc đã được kết luận nhưng phát hiện có dấu hiệu vi phạm pháp luật được quy định như sau:"},{"k":"p","t":"a) Chánh Thanh tra Bộ Tài chính quyết định thanh tra lại vụ việc đã được Tổng cục trưởng kết luận thuộc phạm vi, thẩm quyền quản lý nhà nước của Bộ Tài chính khi được Bộ trưởng Bộ Tài chính giao;"},{"k":"p","t":"b) Tổng cục trưởng quyết định thanh tra lại vụ việc đã được Cục trưởng thuộc Tổng cục kết luận;"},{"k":"p","t":"c) Cục trưởng quyết định thanh tra lại vụ việc đã được Chi cục trưởng thuộc Cục kết luận;"},{"k":"p","t":"d) Quyết định thanh tra lại bao gồm các nội dung được quy định tại Điều 114 của Luật này. Chậm nhất là 03 ngày làm việc kể từ ngày ký quyết định thanh tra lại, người ra quyết định thanh tra lại phải gửi quyết định thanh tra lại cho đối tượng thanh tra. Quyết định thanh tra lại phải được công bố chậm nhất là 15 ngày kể từ ngày ký và phải được đoàn thanh tra lập biên bản công bố quyết định thanh tra lại."},{"k":"p","t":"2. Việc thanh tra lại được thực hiện khi có một trong những căn cứ sau đây:"},{"k":"p","t":"a) Có vi phạm nghiêm trọng về trình tự, thủ tục trong quá trình tiến hành thanh tra;"},{"k":"p","t":"b) Có sai lầm trong việc áp dụng pháp luật khi kết luận thanh tra;"},{"k":"p","t":"c) Nội dung kết luận thanh tra không phù hợp với những chứng cứ thu thập được trong quá trình thanh tra hoặc có dấu hiệu rủi ro cao theo tiêu chí đánh giá rủi ro qua phân tích đánh giá rủi ro;"},{"k":"p","t":"d) Người ra quyết định thanh tra, trưởng đoàn thanh tra, thành viên đoàn thanh tra cố ý làm sai lệch hồ sơ vụ việc hoặc cố ý kết luận trái pháp luật;"},{"k":"p","t":"đ) Có dấu hiệu vi phạm pháp luật nghiêm trọng của đối tượng thanh tra chưa được phát hiện đầy đủ qua thanh tra."},{"k":"p","t":"3. Thời hiệu thanh tra lại, thời hạn thanh tra lại được quy định như sau:"},{"k":"p","t":"a) Thời hiệu thanh tra lại là 02 năm kể từ ngày ký kết luận thanh tra;"},{"k":"p","t":"b) Thời hạn thanh tra lại được thực hiện theo quy định tại Điều 115 của Luật này."},{"k":"p","t":"4. Khi tiến hành thanh tra lại, người ra quyết định thanh tra, trưởng đoàn thanh tra, thành viên đoàn thanh tra thực hiện nhiệm vụ, quyền hạn theo quy định tại Điều 116 và Điều 117 của Luật này."},{"k":"p","t":"5. Kết luận thanh tra lại, công khai kết luận thanh tra lại được quy định như sau:"},{"k":"p","t":"a) Kết luận thanh tra lại được thực hiện theo quy định tại Điều 119 của Luật này. Nội dung kết luận thanh tra lại phải xác định rõ tính chất, mức độ vi phạm, nguyên nhân, trách nhiệm của cơ quan, tổ chức, cá nhân đã tiến hành thanh tra, kết luận thanh tra và kiến nghị biện pháp xử lý."},{"k":"p","t":"Trong thời hạn 15 ngày kể từ ngày ký kết luận thanh tra lại, người ra quyết định thanh tra lại phải gửi kết luận thanh tra lại cho thủ trưởng cơ quan quản lý nhà nước cùng cấp, cơ quan thanh tra nhà nước cấp trên;"},{"k":"p","t":"b) Việc công khai kết luận thanh tra lại được thực hiện theo quy định của pháp luật về thanh tra."},{"k":"p","t":"BIỆN PHÁP ÁP DỤNG TRONG THANH TRA THUẾ ĐỐI VỚI"},{"k":"p","t":"TRƯỜNG HỢP CÓ DẤU HIỆU TRỐN THUẾ"}]},{"id":"luat-38_121","no":121,"code":"Điều 121","title":"Điều 121. Thu thập thông tin liên quan đến hành vi trốn thuế","shortTitle":"Thu thập thông tin liên quan đến hành vi trốn thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế có quyền yêu cầu cơ quan, tổ chức, cá nhân có thông tin liên quan đến hành vi trốn thuế cung cấp thông tin bằng văn bản hoặc trả lời trực tiếp."},{"k":"p","t":"2. Trong trường hợp yêu cầu cung cấp thông tin bằng văn bản thì cơ quan, tổ chức, cá nhân có trách nhiệm cung cấp thông tin đúng nội dung, thời hạn, địa chỉ được yêu cầu và chịu trách nhiệm về tính chính xác, trung thực của thông tin đã cung cấp; trường hợp không thể cung cấp được thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"3. Trong trường hợp yêu cầu cung cấp thông tin bằng trả lời trực tiếp thì người được yêu cầu cung cấp thông tin phải có mặt đúng thời gian, địa điểm ghi trong văn bản để cung cấp thông tin theo nội dung được yêu cầu và chịu trách nhiệm về tính chính xác, trung thực của thông tin đã cung cấp; trường hợp không thể có mặt thì việc cung cấp thông tin được thực hiện bằng văn bản."},{"k":"p","t":"Trong quá trình thu thập thông tin bằng trả lời trực tiếp, các thành viên của đoàn thanh tra phải lập biên bản làm việc và được ghi âm, ghi hình công khai."}]},{"id":"luat-38_122","no":122,"code":"Điều 122","title":"Điều 122. Tạm giữ tài liệu, tang vật liên quan đến hành vi trốn thuế","shortTitle":"Tạm giữ tài liệu, tang vật liên quan đến hành vi trốn thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế, trưởng đoàn thanh tra thuế quyết định tạm giữ tài liệu, tang vật liên quan đến hành vi trốn thuế."},{"k":"p","t":"2. Việc tạm giữ tài liệu, tang vật liên quan đến hành vi trốn thuế được áp dụng khi cần xác minh tình tiết làm căn cứ để có quyết định xử lý hoặc ngăn chặn ngay hành vi trốn thuế."},{"k":"p","t":"3. Trong quá trình thanh tra thuế, nếu đối tượng thanh tra có biểu hiện tẩu tán, tiêu hủy tài liệu, tang vật liên quan đến hành vi trốn thuế thì trưởng đoàn thanh tra thuế đang thi hành nhiệm vụ được quyền tạm giữ tài liệu, tang vật đó. Trong thời hạn 24 giờ kể từ khi tạm giữ tài liệu, tang vật, trưởng đoàn thanh tra thuế phải báo cáo thủ trưởng cơ quan quản lý thuế ra quyết định tạm giữ tài liệu, tang vật; trong thời hạn 08 giờ làm việc kể từ khi nhận được báo cáo, người có thẩm quyền phải xem xét và ra quyết định tạm giữ. Trường hợp người có thẩm quyền không đồng ý việc tạm giữ thì trưởng đoàn thanh tra thuế phải trả lại tài liệu, tang vật trong thời hạn 08 giờ làm việc kể từ khi người có thẩm quyền không đồng ý."},{"k":"p","t":"4. Khi tạm giữ tài liệu, tang vật liên quan đến hành vi trốn thuế trưởng đoàn thanh tra thuế phải lập biên bản tạm giữ. Trong biên bản tạm giữ phải ghi rõ tên, số lượng, chủng loại của tài liệu, tang vật bị tạm giữ; chữ ký của người thực hiện tạm giữ, người đang quản lý tài liệu, tang vật vi phạm. Người ra quyết định tạm giữ có trách nhiệm bảo quản tài liệu, tang vật tạm giữ và chịu trách nhiệm trước pháp luật nếu tài liệu, tang vật bị mất, bán, đánh tráo hoặc hư hỏng."},{"k":"p","t":"Trong trường hợp tài liệu, tang vật cần được niêm phong thì việc niêm phong phải được tiến hành ngay trước mặt người có tài liệu, tang vật; nếu người có tài liệu, tang vật vắng mặt thì việc niêm phong phải được tiến hành trước mặt đại diện gia đình hoặc đại diện tổ chức và đại diện chính quyền cấp xã, người chứng kiến."},{"k":"p","t":"5. Tang vật là tiền Việt Nam, ngoại tệ, vàng bạc, đá quý, kim khí quý và những vật thuộc diện quản lý đặc biệt phải được bảo quản theo quy định của pháp luật; tang vật là hàng hóa, vật phẩm dễ bị hư hỏng thì người ra quyết định tạm giữ phải tiến hành lập biên bản và tổ chức bán ngay để tránh tổn thất; tiền thu được phải được gửi vào tài khoản tạm giữ mở tại Kho bạc Nhà nước để bảo đảm thu đủ tiền thuế, tiền chậm nộp, tiền phạt."},{"k":"p","t":"6. Trong thời hạn 10 ngày làm việc kể từ ngày tạm giữ, người ra quyết định tạm giữ phải xử lý tài liệu, tang vật bị tạm giữ theo những biện pháp trong quyết định xử lý hoặc trả lại cho cá nhân, tổ chức nếu không áp dụng hình thức phạt tịch thu đối với tài liệu, tang vật bị tạm giữ. Thời hạn tạm giữ tài liệu, tang vật có thể được kéo dài đối với những vụ việc phức tạp, cần tiến hành xác minh, nhưng không quá 60 ngày kể từ ngày tạm giữ tài liệu, tang vật. Việc kéo dài thời hạn tạm giữ tài liệu, tang vật phải do người có thẩm quyền quy định tại khoản 1 Điều này quyết định."},{"k":"p","t":"7. Cơ quan quản lý thuế phải giao 01 bản quyết định tạm giữ, biên bản tạm giữ, quyết định xử lý tài liệu, tang vật liên quan đến hành vi trốn thuế cho tổ chức, cá nhân có tài liệu, tang vật bị tạm giữ."}]},{"id":"luat-38_123","no":123,"code":"Điều 123","title":"Điều 123. Khám nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế","shortTitle":"Khám nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế","chuong":"Chương XIII — KIỂM TRA THUẾ, THANH TRA THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế quyết định khám nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế. Trong trường hợp nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế là nơi ở thì phải được sự đồng ý bằng văn bản của người có thẩm quyền theo quy định của pháp luật."},{"k":"p","t":"2. Việc khám nơi cất giấu tài liệu, tang vật được tiến hành khi có căn cứ về việc cất giấu tài liệu, tang vật có liên quan đến hành vi trốn thuế."},{"k":"p","t":"3. Khi khám nơi cất giấu tài liệu, tang vật phải có mặt người chủ nơi bị khám và người chứng kiến. Trong trường hợp người chủ nơi bị khám vắng mặt mà việc khám không thể trì hoãn thì phải có đại diện chính quyền cấp xã và 02 người chứng kiến."},{"k":"p","t":"4. Không được khám nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế vào ban đêm, ngày lễ, ngày tết, khi người chủ nơi bị khám có việc hiếu, việc hỉ, trừ trường hợp phạm pháp quả tang và phải ghi rõ lý do vào biên bản."},{"k":"p","t":"5. Mọi trường hợp khám nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế đều phải có quyết định bằng văn bản và phải lập biên bản. Quyết định và biên bản khám nơi cất giấu tài liệu, tang vật phải được giao cho người chủ nơi bị khám 01 bản."},{"k":"p","t":"VỀ QUẢN LÝ THUẾ"}]},{"id":"luat-38_124","no":124,"code":"Điều 124","title":"Điều 124. Trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có tiền thuế nợ quá 90 ngày kể từ ngày hết thời hạn nộp theo quy định."},{"k":"p","t":"2. Người nộp thuế có tiền thuế nợ khi hết thời hạn gia hạn nộp tiền thuế."},{"k":"p","t":"3. Người nộp thuế có tiền thuế nợ có hành vi phát tán tài sản hoặc bỏ trốn."},{"k":"p","t":"4. Người nộp thuế không chấp hành quyết định xử phạt vi phạm hành chính về quản lý thuế theo thời hạn ghi trên quyết định xử phạt vi phạm hành chính về quản lý thuế, trừ trường hợp được hoãn hoặc tạm đình chỉ thi hành quyết định xử phạt."},{"k":"p","t":"5. Chưa thực hiện biện pháp cưỡng chế thuế đối với trường hợp người nộp thuế được cơ quan quản lý thuế khoanh tiền thuế nợ trong thời hạn khoanh nợ; không tính tiền chậm nộp thuế theo quy định của Luật này; được nộp dần tiền thuế nợ trong thời hạn nhưng không quá 12 tháng kể từ ngày bắt đầu của thời hạn cưỡng chế thuế."},{"k":"p","t":"Việc nộp dần tiền thuế nợ được thủ trưởng cơ quan quản lý trực tiếp người nộp thuế xem xét trên cơ sở đề nghị của người nộp thuế và phải có bảo lãnh của tổ chức tín dụng. Bộ trưởng Bộ Tài chính quy định số lần nộp dần và hồ sơ, thủ tục về nộp dần tiền thuế nợ."},{"k":"p","t":"6. Không thực hiện biện pháp cưỡng chế đối với người nộp thuế có nợ phí hải quan và lệ phí hàng hóa, phương tiện quá cảnh."},{"k":"p","t":"7. Cá nhân là người đại diện theo pháp luật của người nộp thuế phải hoàn thành nghĩa vụ nộp thuế của doanh nghiệp đang bị cưỡng chế thi hành quyết định hành chính về quản lý thuế trước khi xuất cảnh và có thể bị tạm hoãn xuất cảnh theo quy định của pháp luật về xuất cảnh, nhập cảnh."}]},{"id":"luat-38_125","no":125,"code":"Điều 125","title":"Điều 125. Biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế bao gồm:"},{"k":"p","t":"a) Trích tiền từ tài khoản của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế tại Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng khác; phong tỏa tài khoản;"},{"k":"p","t":"b) Khấu trừ một phần tiền lương hoặc thu nhập;"},{"k":"p","t":"c) Dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"d) Ngừng sử dụng hóa đơn;"},{"k":"p","t":"đ) Kê biên tài sản, bán đấu giá tài sản kê biên theo quy định của pháp luật;"},{"k":"p","t":"e) Thu tiền, tài sản khác của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế do cơ quan, tổ chức, cá nhân khác đang nắm giữ;"},{"k":"p","t":"g) Thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký đầu tư, giấy phép thành lập và hoạt động, giấy phép hành nghề."},{"k":"p","t":"2. Các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế quy định tại khoản 1 Điều này chấm dứt hiệu lực kể từ khi tiền thuế nợ được nộp đủ vào ngân sách nhà nước."},{"k":"p","t":"3. Việc áp dụng các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế được thực hiện như sau:"},{"k":"p","t":"a) Đối với các biện pháp cưỡng chế quy định tại các điểm a, b và c khoản 1 Điều này, căn cứ vào tình hình thực tế, cơ quan quản lý thuế áp dụng biện pháp cưỡng chế phù hợp;"},{"k":"p","t":"b) Đối với các biện pháp cưỡng chế quy định tại các điểm d, đ, e và g khoản 1 Điều này, trường hợp không áp dụng được biện pháp cưỡng chế trước thì cơ quan quản lý thuế chuyển sang áp dụng biện pháp cưỡng chế sau;"},{"k":"p","t":"c) Trường hợp quyết định cưỡng chế đối với một số biện pháp chưa hết hiệu lực nhưng không có hiệu quả mà cơ quan quản lý thuế có đủ thông tin, điều kiện thì thực hiện áp dụng biện pháp cưỡng chế trước đó hoặc biện pháp cưỡng chế tiếp theo quy định tại khoản 1 Điều này."}]},{"id":"luat-38_126","no":126,"code":"Điều 126","title":"Điều 126. Thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế, Cục trưởng Cục Điều tra chống buôn lậu thuộc Tổng cục Hải quan, Cục trưởng Cục Kiểm tra sau thông quan có thẩm quyền ra quyết định áp dụng biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế quy định tại các điểm a, b, c, d, đ và e khoản 1 Điều 125 của Luật này."},{"k":"p","t":"2. Việc thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký đầu tư, giấy phép thành lập và hoạt động, giấy phép hành nghề quy định tại điểm g khoản 1 Điều 125 của Luật này được thực hiện theo quy định của pháp luật."}]},{"id":"luat-38_127","no":127,"code":"Điều 127","title":"Điều 127. Quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế bao gồm các nội dung chính sau đây:"},{"k":"p","t":"a) Ngày, tháng, năm ra quyết định;"},{"k":"p","t":"b) Căn cứ ra quyết định;"},{"k":"p","t":"c) Người ra quyết định;"},{"k":"p","t":"d) Tên, địa chỉ, mã số thuế của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"đ) Lý do cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"e) Biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"g) Thời gian, địa điểm thực hiện;"},{"k":"p","t":"h) Cơ quan chủ trì, cơ quan phối hợp thực hiện quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"2. Quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế phải được gửi cho đối tượng bị cưỡng chế, cơ quan quản lý thuế cấp trên trực tiếp và các tổ chức, cá nhân có liên quan; trường hợp đủ điều kiện thực hiện giao dịch điện tử trong lĩnh vực quản lý thuế thì quyết định cưỡng chế được gửi bằng phương thức điện tử và cập nhật trên cổng thông tin điện tử của cơ quan quản lý thuế; trường hợp cưỡng chế bằng biện pháp quy định tại điểm đ khoản 1 Điều 125 của Luật này thì quyết định cưỡng chế phải được gửi cho Chủ tịch Ủy ban nhân dân cấp xã nơi thực hiện cưỡng chế thi hành quyết định hành chính về quản lý thuế trước khi thực hiện."},{"k":"p","t":"3. Quyết định cưỡng chế có hiệu lực thi hành trong thời hạn 01 năm kể từ ngày ban hành quyết định; trường hợp cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của đối tượng bị cưỡng chế thì có hiệu lực thi hành trong thời hạn 30 ngày kể từ ngày ban hành quyết định."}]},{"id":"luat-38_128","no":128,"code":"Điều 128","title":"Điều 128. Trách nhiệm tổ chức thi hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Trách nhiệm tổ chức thi hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Người ra quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế có trách nhiệm tổ chức thi hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"2. Ủy ban nhân dân cấp xã nơi có đối tượng thuộc diện cưỡng chế thi hành quyết định hành chính về quản lý thuế có trách nhiệm chỉ đạo các cơ quan phối hợp với cơ quan quản lý thuế thực hiện việc cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"3. Lực lượng Công an nhân dân có trách nhiệm bảo vệ an ninh, bảo đảm trật tự, an toàn xã hội, hỗ trợ cơ quan quản lý thuế trong quá trình cưỡng chế thi hành quyết định hành chính về quản lý thuế khi có yêu cầu của người ra quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế."}]},{"id":"luat-38_129","no":129,"code":"Điều 129","title":"Điều 129. Cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp trích tiền từ tài khoản, phong tỏa tài khoản áp dụng đối với đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế có tiền gửi tại Kho bạc Nhà nước, ngân hàng thương mại và tổ chức tín dụng khác."},{"k":"p","t":"2. Khi nhận được quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế, Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng khác có trách nhiệm trích số tiền ghi trong quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế từ tài khoản của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế và chuyển sang tài khoản của ngân sách nhà nước tại Kho bạc Nhà nước, đồng thời thông báo bằng văn bản cho người ra quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế và đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế biết."},{"k":"p","t":"3. Khi quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế đã hết hiệu lực mà Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng khác chưa trích đủ tiền thuế theo quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế thì phải thông báo bằng văn bản cho người ra quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế biết."},{"k":"p","t":"4. Trong thời hạn quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế có hiệu lực, nếu trong tài khoản của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế còn số dư mà Kho bạc Nhà nước, ngân hàng thương mại, tổ chức tín dụng khác không thực hiện việc trích tiền của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế để nộp vào ngân sách nhà nước theo quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế thì bị xử phạt vi phạm hành chính theo quy định tại Chương XV của Luật này."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_130","no":130,"code":"Điều 130","title":"Điều 130. Cưỡng chế bằng biện pháp khấu trừ một phần tiền lương hoặc thu nhập","shortTitle":"Cưỡng chế bằng biện pháp khấu trừ một phần tiền lương hoặc thu nhập","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp khấu trừ một phần tiền lương hoặc thu nhập được áp dụng đối với người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế đang làm việc theo biên chế hoặc hợp đồng từ 06 tháng trở lên hoặc đang được hưởng trợ cấp hưu trí, mất sức."},{"k":"p","t":"2. Tỷ lệ khấu trừ tiền lương, trợ cấp hưu trí hoặc mất sức đối với cá nhân không thấp hơn 10% và không quá 30% tổng số tiền lương, trợ cấp hằng tháng của cá nhân đó; đối với những khoản thu nhập khác thì tỷ lệ khấu trừ căn cứ vào thu nhập thực tế, nhưng không quá 50% tổng số thu nhập."},{"k":"p","t":"3. Cơ quan, tổ chức sử dụng lao động đang quản lý tiền lương hoặc thu nhập của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế có các trách nhiệm sau đây:"},{"k":"p","t":"a) Khấu trừ một phần tiền lương hoặc thu nhập của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế và chuyển số tiền đã khấu trừ vào tài khoản ngân sách nhà nước tại Kho bạc Nhà nước theo nội dung ghi trong quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế kể từ kỳ trả tiền lương hoặc thu nhập gần nhất cho đến khi khấu trừ đủ số tiền thuế nợ theo quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế, đồng thời thông báo cho người ra quyết định cưỡng chế và đối tượng bị cưỡng chế biết;"},{"k":"p","t":"b) Trong trường hợp chưa khấu trừ đủ số tiền thuế nợ theo quyết định cưỡng chế mà hợp đồng lao động của đối tượng bị cưỡng chế chấm dứt, cơ quan, tổ chức sử dụng lao động phải thông báo cho người ra quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế biết trong thời hạn 05 ngày làm việc kể từ ngày chấm dứt hợp đồng lao động;"},{"k":"p","t":"c) Cơ quan, tổ chức sử dụng lao động đang quản lý tiền lương hoặc thu nhập của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế cố tình không thực hiện quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế thì bị xử phạt vi phạm hành chính theo quy định tại Chương XV của Luật này."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_131","no":131,"code":"Điều 131","title":"Điều 131. Cưỡng chế bằng biện pháp dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Cưỡng chế bằng biện pháp dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan hải quan nơi người nộp thuế có tiền thuế nợ quá hạn phải thông báo chậm nhất là 05 ngày làm việc trước ngày áp dụng biện pháp dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"2. Không áp dụng biện pháp dừng làm thủ tục hải quan đối với các trường hợp sau đây:"},{"k":"p","t":"a) Hàng hóa xuất khẩu thuộc đối tượng miễn thuế, đối tượng không chịu thuế hoặc có mức thuế suất thuế xuất khẩu là 0%;"},{"k":"p","t":"b) Hàng hóa xuất khẩu, nhập khẩu phục vụ trực tiếp quốc phòng, an ninh, phòng, chống thiên tai, dịch bệnh, cứu trợ khẩn cấp; hàng viện trợ nhân đạo, viện trợ không hoàn lại."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_132","no":132,"code":"Điều 132","title":"Điều 132. Cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn","shortTitle":"Cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Khi thực hiện biện pháp cưỡng chế ngừng sử dụng hóa đơn, cơ quan quản lý thuế phải công khai trên cổng thông tin điện tử của cơ quan mình và trên phương tiện thông tin đại chúng trong thời hạn 24 giờ."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_133","no":133,"code":"Điều 133","title":"Điều 133. Cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên","shortTitle":"Cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Không áp dụng biện pháp kê biên tài sản trong trường hợp người nộp thuế là cá nhân đang trong thời gian chữa bệnh tại cơ sở khám bệnh, chữa bệnh được thành lập theo quy định của pháp luật."},{"k":"p","t":"2. Giá trị tài sản bị kê biên của đối tượng bị cưỡng chế tương đương với số tiền thuế đã ghi trong quyết định cưỡng chế và chi phí cho việc tổ chức thi hành cưỡng chế."},{"k":"p","t":"3. Những tài sản sau đây không được kê biên:"},{"k":"p","t":"a) Thuốc chữa bệnh, lương thực, thực phẩm phục vụ nhu cầu thiết yếu cho đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế và gia đình họ;"},{"k":"p","t":"b) Công cụ lao động;"},{"k":"p","t":"c) Nhà ở duy nhất, đồ dùng sinh hoạt thiết yếu cho đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế và gia đình họ;"},{"k":"p","t":"d) Đồ thờ cúng; di vật, huân chương, huy chương, bằng khen;"},{"k":"p","t":"đ) Tài sản phục vụ quốc phòng, an ninh."},{"k":"p","t":"4. Trong thời hạn 30 ngày kể từ ngày kê biên tài sản, đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế không nộp đủ tiền thuế nợ thì cơ quan quản lý thuế được quyền bán đấu giá tài sản kê biên để thu đủ tiền thuế nợ."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_134","no":134,"code":"Điều 134","title":"Điều 134. Cưỡng chế bằng biện pháp thu tiền, tài sản khác của đối tượng bị cưỡng chế do cơ quan, tổ chức, cá nhân khác đang giữ","shortTitle":"Cưỡng chế bằng biện pháp thu tiền, tài sản khác của đối tượng bị cưỡng chế do cơ quan, tổ chức, cá nhân khác đang giữ","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Việc cưỡng chế thu tiền, tài sản khác của đối tượng bị cưỡng chế do cơ quan, tổ chức, cá nhân khác (sau đây gọi là bên thứ ba) đang nắm giữ được áp dụng khi cơ quan quản lý thuế có căn cứ xác định bên thứ ba đang có khoản nợ hoặc giữ tiền, tài sản khác của đối tượng bị cưỡng chế."},{"k":"p","t":"2. Nguyên tắc thu tiền, tài sản khác của đối tượng bị cưỡng chế từ bên thứ ba được quy định như sau:"},{"k":"p","t":"a) Bên thứ ba có khoản nợ đến hạn phải trả cho đối tượng bị cưỡng chế hoặc giữ tiền, tài sản khác của đối tượng bị cưỡng chế thì có trách nhiệm nộp tiền thuế nợ thay cho đối tượng bị cưỡng chế;"},{"k":"p","t":"b) Trường hợp tiền, tài sản khác của đối tượng bị cưỡng chế do bên thứ ba đang nắm giữ là đối tượng của các giao dịch bảo đảm hoặc thuộc trường hợp giải quyết phá sản thì việc thu tiền, tài sản khác từ bên thứ ba được thực hiện theo quy định của pháp luật;"},{"k":"p","t":"c) Số tiền bên thứ ba nộp vào ngân sách nhà nước thay cho đối tượng bị cưỡng chế được xác định là số tiền đã thanh toán cho đối tượng bị cưỡng chế."},{"k":"p","t":"3. Trách nhiệm của bên thứ ba đang có khoản nợ hoặc giữ tiền, tài sản khác của đối tượng bị cưỡng chế được quy định như sau:"},{"k":"p","t":"a) Cung cấp cho cơ quan quản lý thuế thông tin về khoản nợ hoặc khoản tiền, tài sản khác đang nắm giữ của đối tượng thuộc diện cưỡng chế, trong đó nêu rõ số lượng tiền, thời hạn thanh toán nợ, loại tài sản, số lượng tài sản, tình trạng tài sản;"},{"k":"p","t":"b) Khi nhận được văn bản yêu cầu của cơ quan quản lý thuế thì không được chuyển trả tiền, tài sản khác cho đối tượng bị cưỡng chế cho đến khi hoàn thành nghĩa vụ nộp thuế hoặc chuyển giao tài sản cho cơ quan quản lý thuế để làm thủ tục bán đấu giá tài sản;"},{"k":"p","t":"c) Trong trường hợp không thực hiện được yêu cầu của cơ quan quản lý thuế thì phải có văn bản giải trình với cơ quan quản lý thuế trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"d) Cơ quan, tổ chức, cá nhân đang có khoản nợ hoặc nắm giữ tiền, tài sản khác của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế không thực hiện nộp thay số tiền thuế bị cưỡng chế trong thời hạn 15 ngày kể từ ngày nhận được yêu cầu của cơ quan quản lý thuế thì bị coi là nợ tiền thuế của Nhà nước và bị áp dụng các biện pháp cưỡng chế quy định tại khoản 1 Điều 125 của Luật này."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_135","no":135,"code":"Điều 135","title":"Điều 135. Cưỡng chế bằng biện pháp thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký đầu tư, giấy phép thành lập và hoạt động, giấy phép hành nghề","shortTitle":"Cưỡng chế bằng biện pháp thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký đầu tư, giấy phép thành lập và hoạt động, giấy phép hành nghề","chuong":"Chương XIV — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế có trách nhiệm gửi văn bản yêu cầu cơ quan quản lý nhà nước có thẩm quyền để thu hồi giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký đầu tư, giấy phép thành lập và hoạt động, giấy phép hành nghề."},{"k":"p","t":"2. Khi thực hiện biện pháp cưỡng chế quy định tại Điều này, cơ quan quản lý nhà nước có thẩm quyền phải thông báo công khai trên phương tiện thông tin đại chúng."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"QUY ĐỊNH CHUNG"}]},{"id":"luat-38_136","no":136,"code":"Điều 136","title":"Điều 136. Nguyên tắc xử phạt vi phạm hành chính về quản lý thuế","shortTitle":"Nguyên tắc xử phạt vi phạm hành chính về quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Việc xử phạt vi phạm hành chính về quản lý thuế được thực hiện theo quy định của pháp luật về quản lý thuế và pháp luật về xử lý vi phạm hành chính."},{"k":"p","t":"2. Vi phạm hành chính về sử dụng hóa đơn không hợp pháp, sử dụng không hợp pháp hóa đơn hoặc sử dụng hóa đơn không đúng quy định dẫn đến thiếu thuế, trốn thuế thì không xử phạt vi phạm hành chính về hóa đơn mà bị xử phạt vi phạm hành chính về quản lý thuế."},{"k":"p","t":"3. Mức phạt tiền tối đa đối với hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu, hành vi trốn thuế thực hiện theo quy định của Luật này."},{"k":"p","t":"4. Đối với cùng một hành vi vi phạm hành chính về quản lý thuế thì mức phạt tiền đối với tổ chức bằng 02 lần mức phạt tiền đối với cá nhân, trừ mức phạt tiền đối với hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu, hành vi trốn thuế."},{"k":"p","t":"5. Trường hợp người nộp thuế bị ấn định thuế theo quy định tại Điều 50 và Điều 52 của Luật này thì tùy theo tính chất, mức độ của hành vi vi phạm có thể bị xử phạt vi phạm hành chính về quản lý thuế theo quy định của Luật này."},{"k":"p","t":"6. Người có thẩm quyền đang thi hành công vụ phát hiện hành vi vi phạm hành chính về quản lý thuế có trách nhiệm lập biên bản vi phạm hành chính theo quy định. Trường hợp người nộp thuế đăng ký thuế, nộp hồ sơ khai thuế, quyết toán thuế điện tử nếu thông báo tiếp nhận hồ sơ đăng ký thuế, hồ sơ khai thuế, hồ sơ quyết toán thuế bằng phương thức điện tử xác định rõ hành vi vi phạm hành chính về quản lý thuế của người nộp thuế thì thông báo này là biên bản vi phạm hành chính làm căn cứ ban hành quyết định xử phạt."},{"k":"p","t":"7. Trường hợp vi phạm pháp luật về quản lý thuế đến mức phải truy cứu trách nhiệm hình sự thì thực hiện theo quy định của pháp luật về hình sự."}]},{"id":"luat-38_137","no":137,"code":"Điều 137","title":"Điều 137. Thời hiệu xử phạt vi phạm hành chính về quản lý thuế","shortTitle":"Thời hiệu xử phạt vi phạm hành chính về quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với hành vi vi phạm thủ tục thuế thì thời hiệu xử phạt là 02 năm kể từ ngày thực hiện hành vi vi phạm."},{"k":"p","t":"2. Đối với hành vi trốn thuế chưa đến mức truy cứu trách nhiệm hình sự, hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu thì thời hiệu xử phạt là 05 năm kể từ ngày thực hiện hành vi vi phạm."},{"k":"p","t":"3. Quá thời hiệu xử phạt vi phạm hành chính về quản lý thuế thì người nộp thuế không bị xử phạt nhưng vẫn phải nộp đủ số tiền thuế thiếu, số tiền thuế trốn, số tiền thuế được miễn, giảm, hoàn, không thu không đúng, tiền chậm nộp vào ngân sách nhà nước trong thời hạn 10 năm trở về trước kể từ ngày phát hiện hành vi vi phạm. Trường hợp người nộp thuế không đăng ký thuế thì phải nộp đủ số tiền thuế thiếu, số tiền thuế trốn, tiền chậm nộp cho toàn bộ thời gian trở về trước kể từ ngày phát hiện hành vi vi phạm."}]},{"id":"luat-38_138","no":138,"code":"Điều 138","title":"Điều 138. Hình thức xử phạt, mức phạt tiền và biện pháp khắc phục hậu quả","shortTitle":"Hình thức xử phạt, mức phạt tiền và biện pháp khắc phục hậu quả","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Các hình thức xử phạt vi phạm hành chính về quản lý thuế bao gồm:"},{"k":"p","t":"a) Cảnh cáo;"},{"k":"p","t":"b) Phạt tiền."},{"k":"p","t":"2. Mức phạt tiền trong xử phạt vi phạm hành chính về quản lý thuế được quy định như sau:"},{"k":"p","t":"a) Mức phạt tiền tối đa đối với hành vi quy định tại Điều 141 của Luật này thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính;"},{"k":"p","t":"b) Phạt 10% tính trên số tiền thuế khai thiếu số tiền thuế phải nộp hoặc số tiền thuế khai tăng trong trường hợp được miễn, giảm, hoàn, không thu thuế đối với hành vi quy định tại điểm a khoản 2 Điều 142 của Luật này;"},{"k":"p","t":"c) Phạt 20% tính trên số tiền thuế khai thiếu số tiền thuế phải nộp hoặc số tiền thuế khai tăng trong trường hợp được miễn, giảm, hoàn, không thu thuế đối với hành vi quy định tại khoản 1 và các điểm b, c khoản 2 Điều 142 của Luật này;"},{"k":"p","t":"d) Phạt từ 01 lần đến 03 lần số tiền thuế trốn đối với hành vi quy định tại Điều 143 của Luật này."},{"k":"p","t":"3. Các biện pháp khắc phục hậu quả trong xử phạt vi phạm hành chính về quản lý thuế bao gồm:"},{"k":"p","t":"a) Buộc nộp đủ số tiền thuế trốn, thiếu;"},{"k":"p","t":"b) Buộc nộp đủ số tiền đã miễn, giảm, hoàn, không thu thuế không đúng."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_139","no":139,"code":"Điều 139","title":"Điều 139. Thẩm quyền xử phạt vi phạm hành chính về quản lý thuế","shortTitle":"Thẩm quyền xử phạt vi phạm hành chính về quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thẩm quyền xử phạt vi phạm hành chính đối với hành vi vi phạm thủ tục thuế được thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính."},{"k":"p","t":"2. Thủ trưởng cơ quan quản lý thuế, Cục trưởng Cục Điều tra chống buôn lậu thuộc Tổng cục Hải quan có thẩm quyền ra quyết định xử phạt vi phạm hành chính đối với hành vi quy định tại các điều 142, 143, 144 và 145 của Luật này."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_140","no":140,"code":"Điều 140","title":"Điều 140. Miễn tiền phạt vi phạm hành chính về quản lý thuế","shortTitle":"Miễn tiền phạt vi phạm hành chính về quản lý thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người nộp thuế bị phạt tiền do vi phạm hành chính về quản lý thuế mà bị thiệt hại trong trường hợp bất khả kháng quy định tại khoản 27 Điều 3 của Luật này thì được miễn tiền phạt. Tổng số tiền miễn phạt tối đa không quá giá trị tài sản, hàng hóa bị thiệt hại."},{"k":"p","t":"2. Không miễn tiền phạt vi phạm hành chính về quản lý thuế đối với các trường hợp đã thực hiện xong quyết định xử phạt vi phạm hành chính về quản lý thuế của cơ quan quản lý thuế hoặc cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"HÀNH VI VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ"}]},{"id":"luat-38_141","no":141,"code":"Điều 141","title":"Điều 141. Hành vi vi phạm thủ tục thuế","shortTitle":"Hành vi vi phạm thủ tục thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hành vi vi phạm thủ tục thuế bao gồm:"},{"k":"p","t":"a) Hành vi vi phạm về thời hạn đăng ký thuế; thời hạn thông báo thay đổi thông tin trong đăng ký thuế;"},{"k":"p","t":"b) Hành vi vi phạm về thời hạn nộp hồ sơ khai thuế trong khoảng thời gian 90 ngày kể từ ngày hết thời hạn nộp hồ sơ khai thuế hoặc ngày hết thời hạn gia hạn nộp hồ sơ khai thuế theo quy định của Luật này;"},{"k":"p","t":"c) Hành vi vi phạm về thời hạn nộp hồ sơ khai thuế trong khoảng thời gian từ ngày hết hạn phải nộp tờ khai hải quan đến trước ngày xử lý hàng hóa không có người nhận theo quy định của Luật Hải quan;"},{"k":"p","t":"d) Hành vi khai sai, khai không đầy đủ các nội dung trong hồ sơ thuế nhưng không dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu thuế, trừ trường hợp người nộp thuế khai bổ sung trong thời hạn quy định;"},{"k":"p","t":"đ) Hành vi vi phạm quy định về cung cấp thông tin liên quan đến xác định nghĩa vụ thuế;"},{"k":"p","t":"e) Hành vi vi phạm quy định về chấp hành quyết định kiểm tra thuế, thanh tra thuế, cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"2. Không xử phạt vi phạm hành chính về quản lý thuế đối với hành vi vi phạm thủ tục thuế trong các trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế được gia hạn nộp hồ sơ khai thuế;"},{"k":"p","t":"b) Cá nhân trực tiếp quyết toán thuế thu nhập cá nhân chậm nộp hồ sơ quyết toán thuế thu nhập cá nhân mà có phát sinh số tiền thuế được hoàn;"},{"k":"p","t":"c) Hộ kinh doanh, cá nhân kinh doanh đã bị ấn định thuế theo quy định tại Điều 51 của Luật này."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-38_142","no":142,"code":"Điều 142","title":"Điều 142. Hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu","shortTitle":"Hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn bao gồm:"},{"k":"p","t":"a) Khai sai căn cứ tính thuế hoặc số tiền thuế được khấu trừ hoặc xác định sai trường hợp được miễn, giảm, hoàn thuế dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn nhưng các nghiệp vụ kinh tế đã được phản ánh đầy đủ trên hệ thống sổ kế toán, trên các hóa đơn, chứng từ hợp pháp;"},{"k":"p","t":"b) Người nộp thuế đã lập hồ sơ xác định giá thị trường hoặc đã lập tờ khai giao dịch liên kết nhưng cơ quan quản lý thuế, cơ quan có thẩm quyền khi thanh tra, kiểm tra kết luận số liệu thanh tra, kiểm tra khác với số liệu đã khai của người nộp thuế dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn;"},{"k":"p","t":"c) Sử dụng hóa đơn, chứng từ không hợp pháp, sử dụng không hợp pháp hóa đơn để hạch toán giá trị hàng hóa, dịch vụ mua vào làm giảm số tiền thuế phải nộp hoặc làm tăng số tiền thuế được miễn, giảm, hoàn nhưng người mua hàng hóa, dịch vụ sử dụng hóa đơn, chứng từ không hợp pháp chứng minh được lỗi vi phạm sử dụng hóa đơn không hợp pháp thuộc về bên bán hàng."},{"k":"p","t":"2. Người nộp thuế khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu đối với hàng hóa xuất khẩu, nhập khẩu nhưng không thuộc các trường hợp quy định tại khoản 6 và khoản 7 Điều 143 của Luật này thì ngoài việc phải khai bổ sung và nộp đủ số tiền thuế, tiền chậm nộp, người nộp thuế còn bị xử phạt vi phạm hành chính về quản lý thuế trong trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế tự phát hiện và khai bổ sung sau thời điểm cơ quan hải quan thông báo việc kiểm tra trực tiếp hồ sơ hải quan đối với hàng hóa đang làm thủ tục hải quan hoặc sau thời hạn 60 ngày kể từ ngày thông quan và trước thời điểm cơ quan hải quan quyết định kiểm tra sau thông quan, thanh tra đối với hàng hóa đã được thông quan;"},{"k":"p","t":"b) Cơ quan hải quan phát hiện trong quá trình làm thủ tục hải quan; phát hiện khi thanh tra đối với hàng hóa đã thông quan, kiểm tra sau thông quan và cá nhân, tổ chức vi phạm đã tự nguyện khắc phục hậu quả bằng cách nộp đủ số tiền thuế phải nộp theo quy định;"},{"k":"p","t":"c) Trường hợp không thuộc quy định tại điểm a và điểm b khoản này và cá nhân, tổ chức vi phạm đã tự nguyện khắc phục hậu quả bằng cách nộp đủ số tiền thuế phải nộp."},{"k":"p","t":"3. Người nộp thuế khai sai dẫn đến làm thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn nếu đã khai bổ sung hồ sơ khai thuế và tự giác khắc phục hậu quả bằng cách nộp đủ số tiền thuế phải nộp trước thời điểm cơ quan thuế công bố quyết định kiểm tra thuế, thanh tra thuế tại trụ sở của người nộp thuế hoặc trước thời điểm cơ quan thuế phát hiện không qua thanh tra, kiểm tra tại trụ sở của người nộp thuế hoặc trước khi cơ quan có thẩm quyền phát hiện thì không bị xử phạt vi phạm hành chính về quản lý thuế."},{"k":"p","t":"4. Đối với hàng hóa xuất khẩu, nhập khẩu, người nộp thuế không bị xử phạt vi phạm hành chính về quản lý thuế nhưng vẫn phải nộp số tiền thuế còn thiếu và tiền chậm nộp vào ngân sách nhà nước trong các trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế đã khai bổ sung trước thời điểm cơ quan hải quan thông báo việc kiểm tra trực tiếp hồ sơ hải quan đối với hàng hóa đang làm thủ tục hải quan;"},{"k":"p","t":"b) Người nộp thuế khai bổ sung trong thời hạn 60 ngày kể từ ngày thông quan và trước thời điểm cơ quan hải quan quyết định kiểm tra sau thông quan, thanh tra đối với hàng hóa đã được thông quan."}]},{"id":"luat-38_143","no":143,"code":"Điều 143","title":"Điều 143. Hành vi trốn thuế","shortTitle":"Hành vi trốn thuế","chuong":"Chương XV — XỬ PHẠT VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Không nộp hồ sơ đăng ký thuế; không nộp hồ sơ khai thuế; nộp hồ sơ khai thuế sau 90 ngày kể từ ngày hết thời hạn nộp hồ sơ khai thuế hoặc ngày hết thời hạn gia hạn nộp hồ sơ khai thuế theo quy định của Luật này."},{"k":"p","t":"2. Không ghi chép trong sổ kế toán các khoản thu liên quan đến việc xác định số tiền thuế phải nộp."},{"k":"p","t":"3. Không xuất hóa đơn khi bán hàng hóa, dịch vụ theo quy định của pháp luật hoặc ghi giá trị trên hóa đơn bán hàng thấp hơn giá trị thanh toán thực tế của hàng hóa, dịch vụ đã bán."},{"k":"p","t":"4. Sử dụng hóa đơn, chứng từ không hợp pháp, sử dụng không hợp pháp hóa đơn để hạch toán hàng hóa, nguyên liệu đầu vào trong hoạt động phát sinh nghĩa vụ thuế làm giảm số tiền thuế phải nộp hoặc làm tăng số tiền thuế được miễn, số tiền thuế được giảm hoặc tăng số tiền thuế được khấu trừ, số tiền thuế được hoàn, số tiền thuế không phải nộp."},{"k":"p","t"
