ệm của người nộp thuế trong việc cung cấp thông tin đầy đủ, chính xác, đúng thời hạn và qua kết nối mạng theo yêu cầu của cơ quan quản lý thuế.","points":["Cung cấp đầy đủ, chính xác, trung thực, đúng thời hạn thông tin trong hồ sơ thuế và thông tin liên quan đến xác định nghĩa vụ thuế.","Cung cấp thông tin bằng văn bản hoặc qua kết nối mạng với hệ thống thông tin của cơ quan quản lý thuế theo yêu cầu."]},"luat-38_98":{"tldr":"Quy định trách nhiệm của các cơ quan, tổ chức, cá nhân liên quan trong việc cung cấp thông tin người nộp thuế cho cơ quan quản lý thuế, kèm thời hạn cụ thể cho một số trường hợp.","points":["Cơ quan cấp giấy chứng nhận đăng ký đầu tư, đăng ký doanh nghiệp, giấy phép... cung cấp thông tin trong 07 ngày làm việc kể từ ngày cấp; Kho bạc Nhà nước cung cấp thông tin số thuế đã nộp, đã hoàn.","Ngân hàng thương mại cung cấp nội dung giao dịch, số dư tài khoản trong 10 ngày làm việc kể từ ngày nhận yêu cầu.","Cơ quan quản lý nhà, đất; cơ quan công an; tổ chức, cá nhân chi trả thu nhập; cơ quan quản lý thương mại cung cấp thông tin theo yêu cầu.","Các Bộ, ngành cung cấp thông tin qua kết nối mạng trực tuyến, trao đổi dữ liệu điện tử hằng ngày hoặc qua cổng thông tin một cửa quốc gia.","Cơ quan, tổ chức, cá nhân khác có liên quan cung cấp thông tin bằng văn bản hoặc dữ liệu điện tử theo yêu cầu; Chính phủ quy định chi tiết."]},"luat-38_99":{"tldr":"Quy định nghĩa vụ bảo mật thông tin người nộp thuế và các trường hợp cơ quan quản lý thuế phải cung cấp thông tin để phục vụ tố tụng, thanh tra, kiểm tra, kiểm toán khi được yêu cầu bằng văn bản.","points":["Cơ quan quản lý thuế, công chức, người đã là công chức, cơ quan trao đổi thông tin, tổ chức dịch vụ làm thủ tục về thuế phải giữ bí mật thông tin người nộp thuế, trừ khoản 2 Điều này và Điều 100.","Khi được yêu cầu bằng văn bản phục vụ tố tụng, thanh tra, kiểm tra, kiểm toán, cơ quan quản lý thuế cung cấp thông tin cho: cơ quan điều tra, Viện kiểm sát, Tòa án; Thanh tra nhà nước, Kiểm toán nhà nước; cơ quan quản lý khác của Nhà nước; cơ quan quản lý thuế nước ngoài theo điều ước quốc tế."]},"luat-38_100":{"tldr":"Quy định các trường hợp cơ quan quản lý thuế được công khai thông tin người nộp thuế; Chính phủ quy định chi tiết.","points":["Được công khai khi: trốn thuế, chây ỳ không nộp đúng hạn, nợ tiền thuế và khoản thu khác thuộc ngân sách.","Được công khai khi vi phạm pháp luật về thuế làm ảnh hưởng quyền lợi và nghĩa vụ nộp thuế của tổ chức, cá nhân khác.","Được công khai khi không thực hiện yêu cầu của cơ quan quản lý thuế theo quy định.","Chính phủ quy định chi tiết Điều này."]},"luat-38_101":{"tldr":"Tổ chức kinh doanh dịch vụ làm thủ tục về thuế (đại lý thuế) là doanh nghiệp được thành lập và hoạt động theo pháp luật về doanh nghiệp, thực hiện dịch vụ theo thỏa thuận với người nộp thuế. Doanh nghiệp đủ điều kiện phải đăng ký với Cục Thuế tỉnh, thành phố trực thuộc trung ương.","points":["Đại lý thuế là doanh nghiệp thực hiện dịch vụ theo thỏa thuận với người nộp thuế.","Doanh nghiệp đủ điều kiện đăng ký với Cục Thuế tỉnh, thành phố trực thuộc trung ương để được cấp giấy xác nhận đủ điều kiện."]},"luat-38_103":{"tldr":"Quy định hồ sơ đề nghị cấp giấy xác nhận đủ điều kiện kinh doanh dịch vụ làm thủ tục về thuế. Cục Thuế tỉnh, thành phố trực thuộc trung ương cấp trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ hợp lệ.","points":["Hồ sơ gồm: đơn đề nghị; bản chụp chứng chỉ hành nghề của cá nhân làm việc tại doanh nghiệp; bản sao hợp đồng lao động.","Cục Thuế cấp trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ hợp lệ.","Trường hợp từ chối cấp phải trả lời bằng văn bản và nêu rõ lý do."]},"luat-38_104":{"tldr":"Quy định các dịch vụ đại lý thuế cung cấp theo hợp đồng, quyền và nghĩa vụ của đại lý thuế. Bộ trưởng Bộ Tài chính quy định việc quản lý hoạt động kinh doanh dịch vụ làm thủ tục về thuế.","points":["Dịch vụ gồm: thủ tục về thuế thay người nộp thuế; tư vấn thuế; kế toán cho doanh nghiệp siêu nhỏ theo Điều 150.","Đại lý thuế thực hiện dịch vụ theo thỏa thuận trong hợp đồng và tuân thủ pháp luật về thuế.","Đại lý thuế chịu trách nhiệm trước pháp luật và trước người nộp thuế về nội dung dịch vụ đã cung cấp.","Bộ trưởng Bộ Tài chính quy định việc quản lý hoạt động kinh doanh dịch vụ làm thủ tục về thuế."]},"luat-38_105":{"tldr":"Quy định tiêu chuẩn cấp chứng chỉ hành nghề dịch vụ làm thủ tục về thuế, trường hợp được miễn thi, và những người không được làm nhân viên đại lý thuế.","points":["Tiêu chuẩn: năng lực hành vi dân sự đầy đủ; trình độ đại học trở lên chuyên ngành kinh tế, tài chính, kế toán, kiểm toán hoặc khác; công tác thực tế từ 36 tháng trở lên; đạt kỳ thi (môn pháp luật về thuế và môn kế toán).","Người có chứng chỉ kiểm toán viên hoặc kế toán viên được cấp mà không phải tham gia kỳ thi.","Nhân viên đại lý thuế phải tham gia đầy đủ chương trình cập nhật kiến thức.","Người bị phạt cảnh cáo chưa hết 06 tháng, hoặc bị phạt hình thức khác chưa hết 01 năm kể từ ngày chấp hành xong quyết định xử phạt thì không được làm nhân viên đại lý thuế.","Bộ trưởng Bộ Tài chính quy định tổ chức thi, điều kiện miễn môn thi, thủ tục cấp/thu hồi chứng chỉ, cập nhật kiến thức."]},"luat-38_107":{"tldr":"Quy định nguyên tắc kiểm tra thuế, thanh tra thuế: áp dụng quản lý rủi ro và công nghệ thông tin, tuân thủ pháp luật, không cản trở hoạt động bình thường của người nộp thuế.","points":["Áp dụng quản lý rủi ro và ứng dụng công nghệ thông tin trong kiểm tra, thanh tra thuế.","Tuân thủ Luật này và mẫu biểu, trình tự, thủ tục, hồ sơ theo quy định của Bộ trưởng Bộ Tài chính.","Không cản trở hoạt động bình thường của người nộp thuế.","Khi kiểm tra, thanh tra tại trụ sở người nộp thuế, thủ trưởng cơ quan quản lý thuế phải ban hành quyết định kiểm tra, thanh tra."]},"luat-38_108":{"tldr":"Căn cứ kết quả kiểm tra, thanh tra thuế, thủ trưởng cơ quan quản lý thuế ra quyết định xử lý về thuế, thu hồi tiền thuế hoàn không đúng, xử phạt vi phạm hành chính. Trường hợp phát hiện trốn thuế có dấu hiệu tội phạm thì chuyển hồ sơ cho cơ quan điều tra.","points":["Thủ trưởng cơ quan quản lý thuế ra quyết định xử lý về thuế, thu hồi tiền thuế hoàn không đúng, xử phạt vi phạm hành chính theo thẩm quyền.","Biên bản thanh tra, kiểm tra xác định rõ hành vi vi phạm được xác định là biên bản vi phạm hành chính.","Trường hợp trốn thuế có dấu hiệu tội phạm thì chuyển hồ sơ cho cơ quan điều tra có thẩm quyền."]},"luat-38_109":{"tldr":"Quy định kiểm tra thuế tại trụ sở cơ quan quản lý thuế trên cơ sở hồ sơ thuế và cách xử lý kết quả kiểm tra.","points":["Kiểm tra tại trụ sở cơ quan thuế dựa trên hồ sơ thuế, theo mức độ rủi ro phân loại từ cơ sở dữ liệu hoặc phân công của thủ trưởng cơ quan thuế.","Kiểm tra tại trụ sở cơ quan hải quan đối chiếu hồ sơ thuế với thông tin, tài liệu liên quan đối với hàng hóa xuất khẩu, nhập khẩu.","Phát hiện vi phạm dẫn đến thiếu thuế, trốn thuế thì người nộp thuế phải nộp đủ thuế và bị xử phạt.","Hồ sơ có nội dung cần làm rõ thì cơ quan thuế thông báo yêu cầu giải trình hoặc bổ sung thông tin, tài liệu.","Hết thời hạn mà không giải trình, bổ sung đúng thì thủ trưởng cơ quan quản lý thuế ấn định thuế hoặc ra quyết định kiểm tra tại trụ sở người nộp thuế."]},"luat-38_110":{"tldr":"Quy định các trường hợp, trình tự, thủ tục và thời hạn kiểm tra thuế tại trụ sở của người nộp thuế.","points":["Áp dụng trong các trường hợp như: kiểm tra trước/sau hoàn thuế, có dấu hiệu vi phạm, theo kế hoạch chuyên đề, theo kiến nghị của Kiểm toán/Thanh tra nhà nước, chia tách sáp nhập giải thể...","Các trường hợp điểm đ, e, g: kiểm tra tại trụ sở người nộp thuế không quá 01 lần trong 01 năm.","Quyết định kiểm tra gửi cho người nộp thuế trong 03 ngày làm việc và công bố trong 10 ngày làm việc kể từ ngày ký.","Thời hạn kiểm tra không quá 10 ngày làm việc tại trụ sở; có thể gia hạn 01 lần nhưng không quá 10 ngày làm việc.","Lập biên bản kiểm tra trong thời hạn 05 ngày làm việc kể từ ngày hết thời hạn kiểm tra."]},"luat-38_111":{"tldr":"Quy định quyền và nghĩa vụ của người nộp thuế trong kiểm tra thuế tại trụ sở của người nộp thuế.","points":["Quyền: từ chối kiểm tra khi không có quyết định; từ chối cung cấp thông tin không liên quan hoặc thuộc bí mật nhà nước; nhận và yêu cầu giải thích biên bản; bảo lưu ý kiến; khiếu nại, khởi kiện, yêu cầu bồi thường; tố cáo vi phạm.","Nghĩa vụ: chấp hành quyết định kiểm tra; cung cấp kịp thời, đầy đủ, chính xác thông tin, tài liệu.","Ký biên bản kiểm tra thuế trong thời hạn 05 ngày làm việc kể từ ngày kết thúc kiểm tra.","Chấp hành kiến nghị tại biên bản, kết luận, quyết định xử lý kết quả kiểm tra."]},"luat-38_112":{"tldr":"Quy định nhiệm vụ, quyền hạn của thủ trưởng cơ quan quản lý thuế ra quyết định kiểm tra và của công chức quản lý thuế trong việc kiểm tra thuế.","points":["Thủ trưởng cơ quan quản lý thuế: chỉ đạo thực hiện đúng nội dung, thời hạn; áp dụng biện pháp tại Điều 122; gia hạn thời hạn kiểm tra; quyết định xử lý về thuế, xử phạt; giải quyết khiếu nại, tố cáo.","Công chức quản lý thuế: thực hiện đúng nội dung, thời hạn; yêu cầu cung cấp thông tin, tài liệu; lập biên bản và báo cáo kết quả; xử phạt theo thẩm quyền hoặc kiến nghị xử lý."]},"luat-38_113":{"tldr":"Quy định các trường hợp thanh tra thuế.","points":["Khi có dấu hiệu vi phạm pháp luật về thuế.","Để giải quyết khiếu nại, tố cáo hoặc phòng, chống tham nhũng.","Theo yêu cầu của công tác quản lý thuế trên cơ sở kết quả phân loại rủi ro.","Theo kiến nghị của Kiểm toán nhà nước, kết luận của Thanh tra nhà nước và cơ quan khác có thẩm quyền."]},"luat-38_114":{"tldr":"Quy định thẩm quyền, nội dung chính và thời hạn gửi, công bố quyết định thanh tra thuế.","points":["Thủ trưởng cơ quan quản lý thuế các cấp có thẩm quyền ra quyết định thanh tra thuế.","Nội dung chính: căn cứ pháp lý; đối tượng, nội dung, phạm vi, nhiệm vụ; thời hạn; trưởng đoàn và các thành viên.","Chậm nhất 03 ngày làm việc kể từ ngày ký, quyết định phải được gửi cho đối tượng thanh tra.","Quyết định phải được công bố chậm nhất 15 ngày kể từ ngày ra quyết định."]},"luat-38_115":{"tldr":"Thời hạn thanh tra thuế thực hiện theo quy định của Luật Thanh tra; trường hợp cần thiết có thể gia hạn.","points":["Thời hạn thanh tra thuế theo Luật Thanh tra, tính từ ngày công bố quyết định đến ngày kết thúc thanh tra tại trụ sở người nộp thuế.","Trường hợp cần thiết, người ra quyết định thanh tra gia hạn theo quy định của Luật Thanh tra."]},"luat-38_116":{"tldr":"Quy định nhiệm vụ, quyền hạn của người ra quyết định thanh tra thuế và trách nhiệm trước pháp luật về quyết định của mình.","points":["Chỉ đạo, kiểm tra, giám sát đoàn thanh tra; yêu cầu cung cấp thông tin, tài liệu, giải trình; trưng cầu giám định.","Tạm đình chỉ việc làm gây thiệt hại nghiêm trọng; quyết định xử lý hoặc kiến nghị xử lý; giải quyết khiếu nại, tố cáo.","Đình chỉ, thay đổi trưởng đoàn, thành viên đoàn thanh tra; kết luận nội dung thanh tra; chuyển hồ sơ sang cơ quan điều tra khi có dấu hiệu tội phạm.","Áp dụng biện pháp tại các điều 121, 122 và 123; yêu cầu tổ chức tín dụng phong tỏa tài khoản.","Người ra quyết định thanh tra phải chịu trách nhiệm trước pháp luật về quyết định của mình."]},"luat-38_117":{"tldr":"Quy định nhiệm vụ, quyền hạn của trưởng đoàn thanh tra thuế và thành viên đoàn thanh tra thuế.","points":["Trưởng đoàn: tổ chức, chỉ đạo thành viên; yêu cầu xuất trình giấy tờ và cung cấp thông tin, tài liệu; lập biên bản vi phạm; kiểm kê tài sản; niêm phong tài liệu.","Trưởng đoàn: yêu cầu tạm giữ tiền, đồ vật, giấy phép trái pháp luật; tạm đình chỉ việc làm gây thiệt hại; yêu cầu phong tỏa tài khoản; xử phạt vi phạm hành chính; áp dụng biện pháp tại Điều 122.","Thành viên: thực hiện nhiệm vụ theo phân công của trưởng đoàn; yêu cầu cung cấp thông tin, tài liệu; kiến nghị áp dụng biện pháp và xử lý; báo cáo kết quả và chịu trách nhiệm."]},"luat-38_118":{"tldr":"Quy định quyền và nghĩa vụ của đối tượng thanh tra thuế.","points":["Quyền: giải trình; khiếu nại về quyết định, hành vi, kết luận thanh tra; nhận và yêu cầu giải thích biên bản; từ chối cung cấp thông tin không liên quan hoặc thuộc bí mật nhà nước; yêu cầu bồi thường; tố cáo vi phạm.","Trong khi chờ giải quyết khiếu nại, người khiếu nại vẫn phải thực hiện các quyết định đó.","Nghĩa vụ: chấp hành quyết định thanh tra; cung cấp kịp thời, đầy đủ, chính xác thông tin, tài liệu; thực hiện yêu cầu, kiến nghị, kết luận, quyết định xử lý; ký biên bản thanh tra."]},"luat-38_119":{"tldr":"Quy định thời hạn và nội dung chính của kết luận thanh tra thuế.","points":["Chậm nhất 15 ngày kể từ ngày nhận báo cáo kết quả thanh tra, người ra quyết định thanh tra phải có văn bản kết luận, trừ trường hợp phải chờ kết luận chuyên môn.","Nội dung chính: đánh giá việc thực hiện pháp luật về thuế; kết luận nội dung thanh tra; xác định tính chất, mức độ, nguyên nhân, trách nhiệm vi phạm; xử lý hoặc kiến nghị xử lý.","Người ra quyết định thanh tra có quyền yêu cầu báo cáo, giải trình để làm rõ những vấn đề cần thiết."]},"luat-38_120":{"tldr":"Quy định thẩm quyền, căn cứ, thời hiệu, thời hạn và kết luận thanh tra lại vụ việc đã được kết luận nhưng phát hiện có dấu hiệu vi phạm pháp luật.","points":["Thẩm quyền: Chánh Thanh tra Bộ Tài chính, Tổng cục trưởng, Cục trưởng theo từng cấp đã kết luận.","Quyết định thanh tra lại gửi cho đối tượng chậm nhất 03 ngày làm việc kể từ ngày ký, công bố chậm nhất 15 ngày kể từ ngày ký.","Căn cứ thanh tra lại: vi phạm nghiêm trọng trình tự, thủ tục; sai lầm áp dụng pháp luật; kết luận không phù hợp chứng cứ hoặc rủi ro cao; cố ý làm sai lệch hồ sơ; có dấu hiệu vi phạm nghiêm trọng chưa được phát hiện đầy đủ.","Thời hiệu thanh tra lại là 02 năm kể từ ngày ký kết luận thanh tra; thời hạn theo Điều 115.","Trong thời hạn 15 ngày kể từ ngày ký kết luận thanh tra lại phải gửi cho thủ trưởng cơ quan quản lý nhà nước cùng cấp, cơ quan thanh tra nhà nước cấp trên."]},"luat-38_121":{"tldr":"Quy định việc thu thập thông tin liên quan đến hành vi trốn thuế bằng văn bản hoặc trả lời trực tiếp.","points":["Thủ trưởng cơ quan quản lý thuế có quyền yêu cầu cơ quan, tổ chức, cá nhân cung cấp thông tin bằng văn bản hoặc trả lời trực tiếp.","Cung cấp bằng văn bản: đúng nội dung, thời hạn, địa chỉ và chịu trách nhiệm về tính chính xác; không cung cấp được thì trả lời bằng văn bản nêu rõ lý do.","Cung cấp trực tiếp: có mặt đúng thời gian, địa điểm; không có mặt được thì cung cấp bằng văn bản.","Khi thu thập bằng trả lời trực tiếp, thành viên đoàn thanh tra phải lập biên bản làm việc và được ghi âm, ghi hình công khai."]},"luat-38_122":{"tldr":"Quy định việc tạm giữ tài liệu, tang vật liên quan đến hành vi trốn thuế: thẩm quyền, điều kiện, thủ tục, bảo quản và thời hạn tạm giữ.","points":["Thủ trưởng cơ quan quản lý thuế, trưởng đoàn thanh tra quyết định tạm giữ khi cần xác minh hoặc ngăn chặn ngay hành vi trốn thuế.","Trường hợp đối tượng có biểu hiện tẩu tán, tiêu hủy: trong 24 giờ kể từ khi tạm giữ, trưởng đoàn báo cáo thủ trưởng; trong 08 giờ làm việc người có thẩm quyền phải xem xét, ra quyết định; nếu không đồng ý phải trả lại trong 08 giờ làm việc.","Phải lập biên bản tạm giữ ghi rõ tên, số lượng, chủng loại; người ra quyết định chịu trách nhiệm bảo quản.","Tang vật là tiền, ngoại tệ, vàng bạc, đá quý... bảo quản theo quy định; hàng dễ hư hỏng phải bán ngay và gửi tiền vào tài khoản tạm giữ tại Kho bạc Nhà nước.","Trong 10 ngày làm việc kể từ ngày tạm giữ phải xử lý; vụ việc phức tạp kéo dài nhưng không quá 60 ngày kể từ ngày tạm giữ."]},"luat-38_123":{"tldr":"Quy định việc khám nơi cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế: thẩm quyền, điều kiện, người chứng kiến và thủ tục.","points":["Thủ trưởng cơ quan quản lý thuế quyết định khám; nếu nơi cất giấu là nơi ở phải được sự đồng ý bằng văn bản của người có thẩm quyền.","Việc khám được tiến hành khi có căn cứ về việc cất giấu tài liệu, tang vật liên quan đến hành vi trốn thuế.","Khi khám phải có mặt người chủ nơi bị khám và người chứng kiến; nếu vắng mặt mà không thể trì hoãn thì phải có đại diện chính quyền cấp xã và 02 người chứng kiến.","Không khám vào ban đêm, ngày lễ, ngày tết, khi chủ nơi bị khám có việc hiếu, việc hỉ, trừ phạm pháp quả tang.","Mọi trường hợp khám đều phải có quyết định bằng văn bản, lập biên bản và giao cho người chủ nơi bị khám 01 bản."]},"luat-38_124":{"tldr":"Quy định các trường hợp người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế.","points":["Có tiền thuế nợ quá 90 ngày kể từ ngày hết thời hạn nộp; hoặc nợ khi hết thời hạn gia hạn nộp.","Có hành vi phát tán tài sản hoặc bỏ trốn; hoặc không chấp hành quyết định xử phạt vi phạm hành chính theo thời hạn.","Chưa cưỡng chế đối với trường hợp được khoanh nợ, không tính tiền chậm nộp, được nộp dần trong thời hạn nhưng không quá 12 tháng; nộp dần phải có bảo lãnh của tổ chức tín dụng.","Không cưỡng chế đối với người nộp thuế có nợ phí hải quan và lệ phí hàng hóa, phương tiện quá cảnh.","Người đại diện theo pháp luật phải hoàn thành nghĩa vụ nộp thuế trước khi xuất cảnh và có thể bị tạm hoãn xuất cảnh."]},"luat-38_125":{"tldr":"Quy định các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế và thứ tự, cách thức áp dụng.","points":["Các biện pháp: trích tiền/phong tỏa tài khoản; khấu trừ tiền lương hoặc thu nhập; dừng làm thủ tục hải quan; ngừng sử dụng hóa đơn; kê biên, bán đấu giá tài sản; thu tiền, tài sản do bên thứ ba nắm giữ; thu hồi các giấy chứng nhận, giấy phép.","Các biện pháp cưỡng chế chấm dứt hiệu lực kể từ khi tiền thuế nợ được nộp đủ vào ngân sách nhà nước.","Biện pháp tại điểm a, b, c áp dụng phù hợp theo tình hình thực tế; biện pháp tại điểm d, đ, e, g áp dụng tuần tự khi không áp dụng được biện pháp trước."]},"luat-38_126":{"tldr":"Quy định thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế.","points":["Thủ trưởng cơ quan quản lý thuế, Cục trưởng Cục Điều tra chống buôn lậu thuộc Tổng cục Hải quan, Cục trưởng Cục Kiểm tra sau thông quan có thẩm quyền áp dụng biện pháp tại điểm a, b, c, d, đ, e khoản 1 Điều 125.","Việc thu hồi các giấy chứng nhận, giấy phép tại điểm g khoản 1 Điều 125 thực hiện theo quy định của pháp luật."]},"luat-38_127":{"tldr":"Quy định nội dung chính của quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế, nơi gửi quyết định và hiệu lực thi hành.","points":["Nội dung chính gồm: ngày tháng năm ra quyết định, căn cứ, người ra quyết định, tên/địa chỉ/mã số thuế người bị cưỡng chế, lý do, biện pháp, thời gian-địa điểm, cơ quan chủ trì-phối hợp.","Quyết định phải gửi cho đối tượng bị cưỡng chế, cơ quan quản lý thuế cấp trên trực tiếp và tổ chức, cá nhân liên quan; gửi điện tử nếu đủ điều kiện giao dịch điện tử.","Cưỡng chế bằng biện pháp tại điểm đ khoản 1 Điều 125 phải gửi cho Chủ tịch UBND cấp xã nơi cưỡng chế trước khi thực hiện.","Quyết định cưỡng chế có hiệu lực thi hành trong thời hạn 01 năm kể từ ngày ban hành; trường hợp trích tiền/phong tỏa tài khoản thì hiệu lực 30 ngày kể từ ngày ban hành."]},"luat-38_128":{"tldr":"Quy định trách nhiệm tổ chức thi hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế của người ra quyết định, UBND cấp xã và lực lượng Công an nhân dân.","points":["Người ra quyết định cưỡng chế có trách nhiệm tổ chức thi hành quyết định cưỡng chế.","UBND cấp xã nơi có đối tượng thuộc diện cưỡng chế chỉ đạo các cơ quan phối hợp với cơ quan quản lý thuế thực hiện cưỡng chế.","Lực lượng Công an nhân dân bảo vệ an ninh, trật tự, an toàn xã hội, hỗ trợ cơ quan quản lý thuế khi có yêu cầu của người ra quyết định cưỡng chế."]},"luat-38_129":{"tldr":"Quy định biện pháp cưỡng chế trích tiền từ tài khoản, phong tỏa tài khoản đối với đối tượng có tiền gửi tại Kho bạc Nhà nước, ngân hàng thương mại và tổ chức tín dụng khác.","points":["Áp dụng đối với đối tượng bị cưỡng chế có tiền gửi tại Kho bạc Nhà nước, ngân hàng thương mại và tổ chức tín dụng khác.","Khi nhận quyết định, các tổ chức này trích số tiền ghi trong quyết định chuyển sang tài khoản ngân sách nhà nước và thông báo bằng văn bản cho người ra quyết định và đối tượng bị cưỡng chế.","Khi quyết định hết hiệu lực mà chưa trích đủ tiền thuế thì phải thông báo bằng văn bản cho người ra quyết định cưỡng chế.","Trong thời hạn quyết định có hiệu lực, nếu còn số dư mà không trích nộp thì bị xử phạt vi phạm hành chính theo Chương XV của Luật này.","Chính phủ quy định chi tiết Điều này."]},"luat-38_130":{"tldr":"Quy định biện pháp cưỡng chế khấu trừ một phần tiền lương hoặc thu nhập, tỷ lệ khấu trừ và trách nhiệm của cơ quan, tổ chức sử dụng lao động.","points":["Áp dụng với người nộp thuế đang làm việc theo biên chế hoặc hợp đồng từ 06 tháng trở lên hoặc đang hưởng trợ cấp hưu trí, mất sức.","Tỷ lệ khấu trừ tiền lương, trợ cấp hưu trí/mất sức của cá nhân không thấp hơn 10% và không quá 30% tổng tiền lương, trợ cấp hằng tháng; thu nhập khác không quá 50% tổng thu nhập.","Cơ quan, tổ chức sử dụng lao động khấu trừ và chuyển tiền vào tài khoản ngân sách nhà nước từ kỳ trả lương gần nhất cho đến khi đủ số tiền thuế nợ, thông báo cho người ra quyết định và đối tượng bị cưỡng chế.","Khi hợp đồng lao động chấm dứt mà chưa khấu trừ đủ thì phải thông báo cho người ra quyết định cưỡng chế trong thời hạn 05 ngày làm việc kể từ ngày chấm dứt hợp đồng.","Cơ quan, tổ chức cố tình không thực hiện quyết định cưỡng chế thì bị xử phạt vi phạm hành chính theo Chương XV của Luật này.","Chính phủ quy định chi tiết Điều này."]},"luat-38_131":{"tldr":"Quy định biện pháp cưỡng chế dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu và các trường hợp không áp dụng.","points":["Thủ trưởng cơ quan hải quan nơi người nộp thuế có tiền thuế nợ quá hạn phải thông báo chậm nhất 05 ngày làm việc trước ngày áp dụng biện pháp dừng làm thủ tục hải quan.","Không áp dụng với hàng hóa xuất khẩu thuộc đối tượng miễn thuế, không chịu thuế hoặc có mức thuế suất thuế xuất khẩu là 0%.","Không áp dụng với hàng hóa xuất nhập khẩu phục vụ trực tiếp quốc phòng, an ninh, phòng chống thiên tai, dịch bệnh, cứu trợ khẩn cấp; hàng viện trợ nhân đạo, viện trợ không hoàn lại.","Chính phủ quy định chi tiết Điều này."]},"luat-38_133":{"tldr":"Quy định biện pháp cưỡng chế kê biên tài sản, bán đấu giá tài sản kê biên; trường hợp không kê biên, giá trị tài sản kê biên và các tài sản không được kê biên.","points":["Không kê biên tài sản khi người nộp thuế là cá nhân đang chữa bệnh tại cơ sở khám bệnh, chữa bệnh được thành lập theo quy định pháp luật.","Giá trị tài sản bị kê biên tương đương số tiền thuế ghi trong quyết định cưỡng chế và chi phí tổ chức thi hành cưỡng chế.","Tài sản không được kê biên gồm: thuốc chữa bệnh, lương thực, thực phẩm thiết yếu; công cụ lao động; nhà ở duy nhất, đồ dùng sinh hoạt thiết yếu; đồ thờ cúng, di vật, huân chương, huy chương, bằng khen; tài sản phục vụ quốc phòng, an ninh.","Trong thời hạn 30 ngày kể từ ngày kê biên mà không nộp đủ tiền thuế nợ thì cơ quan quản lý thuế được bán đấu giá tài sản kê biên để thu đủ tiền thuế nợ.","Chính phủ quy định chi tiết Điều này."]},"luat-38_134":{"tldr":"Quy định biện pháp cưỡng chế thu tiền, tài sản khác của đối tượng bị cưỡng chế do bên thứ ba đang giữ; nguyên tắc và trách nhiệm của bên thứ ba.","points":["Áp dụng khi cơ quan quản lý thuế có căn cứ xác định bên thứ ba đang có khoản nợ hoặc giữ tiền, tài sản khác của đối tượng bị cưỡng chế.","Bên thứ ba có khoản nợ đến hạn phải trả hoặc giữ tiền, tài sản của đối tượng bị cưỡng chế có trách nhiệm nộp tiền thuế nợ thay; số tiền nộp thay được xác định là số tiền đã thanh toán cho đối tượng bị cưỡng chế.","Bên thứ ba phải cung cấp thông tin về khoản nợ/tiền/tài sản đang giữ; không chuyển trả cho đối tượng bị cưỡng chế khi nhận yêu cầu cho đến khi hoàn thành nghĩa vụ.","Trường hợp không thực hiện được yêu cầu thì phải giải trình bằng văn bản trong thời hạn 05 ngày làm việc kể từ ngày nhận văn bản yêu cầu.","Không nộp thay số tiền thuế bị cưỡng chế trong thời hạn 15 ngày kể từ ngày nhận yêu cầu thì bị coi là nợ tiền thuế của Nhà nước và bị áp dụng biện pháp cưỡng chế theo khoản 1 Điều 125.","Chính phủ quy định chi tiết Điều này."]},"luat-38_135":{"tldr":"Quy định biện pháp cưỡng chế thu hồi giấy chứng nhận đăng ký doanh nghiệp, đăng ký kinh doanh, đăng ký hợp tác xã, đăng ký đầu tư, giấy phép thành lập và hoạt động, giấy phép hành nghề.","points":["Thủ trưởng cơ quan quản lý thuế gửi văn bản yêu cầu cơ quan quản lý nhà nước có thẩm quyền thu hồi các giấy chứng nhận, giấy phép nêu trên.","Khi thực hiện biện pháp cưỡng chế này, cơ quan quản lý nhà nước có thẩm quyền phải thông báo công khai trên phương tiện thông tin đại chúng.","Chính phủ quy định chi tiết Điều này."]},"luat-38_136":{"tldr":"Quy định nguyên tắc xử phạt vi phạm hành chính về quản lý thuế, mức phạt đối với tổ chức/cá nhân và việc lập biên bản, truy cứu trách nhiệm hình sự.","points":["Xử phạt vi phạm hành chính về quản lý thuế thực hiện theo pháp luật về quản lý thuế và pháp luật về xử lý vi phạm hành chính.","Vi phạm về hóa đơn dẫn đến thiếu thuế, trốn thuế thì không xử phạt về hóa đơn mà bị xử phạt về quản lý thuế.","Cùng một hành vi vi phạm thì mức phạt tiền đối với tổ chức bằng 02 lần mức phạt đối với cá nhân, trừ hành vi khai sai dẫn đến thiếu thuế/tăng số thuế được miễn, giảm, hoàn, không thu và hành vi trốn thuế.","Người bị ấn định thuế theo Điều 50 và Điều 52 có thể bị xử phạt vi phạm hành chính về quản lý thuế tùy tính chất, mức độ.","Người có thẩm quyền phát hiện vi phạm phải lập biên bản; thông báo điện tử xác định rõ hành vi vi phạm là biên bản làm căn cứ ra quyết định xử phạt.","Vi phạm đến mức truy cứu trách nhiệm hình sự thì thực hiện theo pháp luật về hình sự."]},"luat-38_137":{"tldr":"Quy định thời hiệu xử phạt vi phạm hành chính về quản lý thuế và việc nộp đủ tiền thuế khi quá thời hiệu.","points":["Hành vi vi phạm thủ tục thuế: thời hiệu xử phạt là 02 năm kể từ ngày thực hiện hành vi vi phạm.","Hành vi trốn thuế chưa đến mức truy cứu hình sự, khai sai dẫn đến thiếu thuế/tăng số thuế được miễn, giảm, hoàn, không thu: thời hiệu xử phạt là 05 năm kể từ ngày thực hiện hành vi vi phạm.","Quá thời hiệu thì không bị xử phạt nhưng vẫn phải nộp đủ tiền thuế thiếu, trốn, miễn/giảm/hoàn/không thu sai và tiền chậm nộp trong thời hạn 10 năm trở về trước kể từ ngày phát hiện.","Trường hợp không đăng ký thuế thì phải nộp đủ tiền thuế thiếu, trốn, tiền chậm nộp cho toàn bộ thời gian trở về trước kể từ ngày phát hiện hành vi vi phạm."]},"luat-38_138":{"tldr":"Quy định các hình thức xử phạt, mức phạt tiền và biện pháp khắc phục hậu quả trong xử phạt vi phạm hành chính về quản lý thuế.","points":["Các hình thức xử phạt gồm: cảnh cáo và phạt tiền.","Phạt 10% trên số tiền thuế khai thiếu hoặc số tiền thuế khai tăng được miễn, giảm, hoàn, không thu đối với hành vi tại điểm a khoản 2 Điều 142.","Phạt 20% trên số tiền thuế khai thiếu hoặc số tiền thuế khai tăng được miễn, giảm, hoàn, không thu đối với hành vi tại khoản 1 và điểm b, c khoản 2 Điều 142.","Phạt từ 01 lần đến 03 lần số tiền thuế trốn đối với hành vi tại Điều 143; mức phạt tối đa với hành vi tại Điều 141 theo pháp luật về xử lý vi phạm hành chính.","Biện pháp khắc phục hậu quả: buộc nộp đủ tiền thuế trốn, thiếu; buộc nộp đủ tiền đã miễn, giảm, hoàn, không thu thuế không đúng.","Chính phủ quy định chi tiết Điều này."]},"luat-38_139":{"tldr":"Quy định thẩm quyền xử phạt vi phạm hành chính về quản lý thuế.","points":["Thẩm quyền xử phạt với hành vi vi phạm thủ tục thuế thực hiện theo pháp luật về xử lý vi phạm hành chính.","Thủ trưởng cơ quan quản lý thuế, Cục trưởng Cục Điều tra chống buôn lậu thuộc Tổng cục Hải quan có thẩm quyền ra quyết định xử phạt với hành vi tại các điều 142, 143, 144 và 145 của Luật này.","Chính phủ quy định chi tiết Điều này."]},"luat-38_140":{"tldr":"Quy định việc miễn tiền phạt vi phạm hành chính về quản lý thuế trong trường hợp bất khả kháng và các trường hợp không được miễn.","points":["Người nộp thuế bị phạt mà bị thiệt hại trong trường hợp bất khả kháng theo khoản 27 Điều 3 thì được miễn tiền phạt; tổng số tiền miễn phạt tối đa không quá giá trị tài sản, hàng hóa bị thiệt hại.","Không miễn tiền phạt đối với trường hợp đã thực hiện xong quyết định xử phạt vi phạm hành chính về quản lý thuế của cơ quan quản lý thuế hoặc cơ quan nhà nước có thẩm quyền.","Chính phủ quy định chi tiết Điều này."]},"luat-38_141":{"tldr":"Quy định các hành vi vi phạm thủ tục thuế và các trường hợp không xử phạt vi phạm hành chính về thủ tục thuế.","points":["Hành vi vi phạm thủ tục thuế gồm: vi phạm thời hạn đăng ký thuế, thông báo thay đổi thông tin; thời hạn nộp hồ sơ khai thuế trong 90 ngày kể từ hết thời hạn nộp/gia hạn.","Còn gồm: vi phạm thời hạn nộp hồ sơ khai thuế từ ngày hết hạn nộp tờ khai hải quan đến trước ngày xử lý hàng hóa không có người nhận; khai sai/khai không đầy đủ nhưng không dẫn đến thiếu thuế; vi phạm cung cấp thông tin xác định nghĩa vụ thuế; vi phạm chấp hành quyết định kiểm tra, thanh tra, cưỡng chế.","Không xử phạt khi: người nộp thuế được gia hạn nộp hồ sơ khai thuế.","Không xử phạt khi: cá nhân trực tiếp quyết toán thuế TNCN chậm nộp hồ sơ mà có phát sinh số tiền thuế được hoàn.","Không xử phạt khi: hộ kinh doanh, cá nhân kinh doanh đã bị ấn định thuế theo Điều 51 của Luật này.","Chính phủ quy định chi tiết Điều này."]},"luat-38_142":{"tldr":"Quy định hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu và các trường hợp xử phạt hoặc không xử phạt, riêng với hàng hóa xuất khẩu, nhập khẩu.","points":["Hành vi khai sai gồm: khai sai căn cứ tính thuế/số thuế khấu trừ/xác định sai trường hợp miễn, giảm, hoàn nhưng nghiệp vụ đã phản ánh đầy đủ trên sổ kế toán, hóa đơn, chứng từ hợp pháp; chênh lệch số liệu thanh tra với số đã khai về giao dịch liên kết; sử dụng hóa đơn không hợp pháp mà chứng minh được lỗi thuộc bên bán.","Với hàng hóa xuất nhập khẩu không thuộc khoản 6, khoản 7 Điều 143 thì ngoài khai bổ sung, nộp đủ tiền thuế, tiền chậm nộp còn bị xử phạt trong các trường hợp: tự phát hiện khai bổ sung sau khi hải quan thông báo kiểm tra hoặc sau 60 ngày kể từ thông quan và trước khi quyết định kiểm tra sau thông quan/thanh tra; hải quan phát hiện và đối tượng đã tự nguyện khắc phục; trường hợp khác đã tự nguyện nộp đủ tiền thuế.","Không bị xử phạt nếu đã khai bổ sung và tự giác nộp đủ tiền thuế trước khi cơ quan thuế công bố quyết định kiểm tra/thanh tra tại trụ sở hoặc trước khi cơ quan thuế, cơ quan có thẩm quyền phát hiện.","Với hàng hóa xuất nhập khẩu, không bị xử phạt nhưng vẫn nộp tiền thuế thiếu và tiền chậm nộp khi: khai bổ sung trước khi hải quan thông báo kiểm tra trực tiếp hồ sơ; hoặc khai bổ sung trong 60 ngày kể từ thông quan và trước khi hải quan quyết định kiểm tra sau thông quan, thanh tra."]},"luat-38_143":{"tldr":"Quy định các hành vi bị coi là trốn thuế và trường hợp không bị xử phạt về hành vi trốn thuế mà xử phạt theo khoản 1 Điều 141.","points":["Gồm: không nộp hồ sơ đăng ký thuế, hồ sơ khai thuế; nộp hồ sơ khai thuế sau 90 ngày kể từ hết thời hạn nộp/gia hạn; không ghi chép sổ kế toán các khoản thu; không xuất hóa đơn hoặc ghi giá trị hóa đơn thấp hơn giá trị thanh toán thực tế.","Gồm: sử dụng hóa đơn, chứng từ không hợp pháp để hạch toán làm giảm thuế phải nộp/tăng thuế miễn, giảm, khấu trừ, hoàn; sử dụng chứng từ, tài liệu không phản ánh đúng bản chất/giá trị giao dịch để xác định sai số thuế.","Gồm: khai sai thực tế hàng hóa xuất nhập khẩu mà không khai bổ sung sau thông quan; cố ý không kê khai hoặc khai sai thuế với hàng hóa xuất nhập khẩu; cấu kết với người gửi hàng để nhập khẩu nhằm trốn thuế.","Gồm: sử dụng hàng hóa không chịu thuế, miễn thuế, xét miễn thuế không đúng mục đích mà không khai báo chuyển đổi mục đích; kinh doanh trong thời gian ngừng, tạm ngừng hoạt động nhưng không thông báo.","Không bị xử phạt về trốn thuế mà xử phạt theo khoản 1 Điều 141 khi: không nộp hồ sơ đăng ký/khai thuế, nộp sau 90 ngày nhưng không phát sinh số thuế phải nộp; hoặc nộp hồ sơ sau 90 ngày có phát sinh thuế và đã nộp đủ tiền thuế, tiền chậm nộp trước khi cơ quan thuế công bố quyết định kiểm tra/thanh tra hoặc lập biên bản chậm nộp."]},"luat-38_144":{"tldr":"Quy định xử lý hành vi vi phạm của ngân hàng thương mại và người bảo lãnh nộp tiền thuế trong lĩnh vực quản lý thuế.","points":["Ngân hàng thương mại không trích chuyển tiền từ tài khoản người nộp thuế vào ngân sách nhà nước theo yêu cầu thì bị phạt số tiền tương ứng với số không trích chuyển, trừ trường hợp tài khoản không còn số dư hoặc đã trích toàn bộ số dư nhưng vẫn không đủ tiền thuế nợ.","Người bảo lãnh không thực hiện nghĩa vụ bảo lãnh khi người nộp thuế không nộp thuế thì phải thực hiện nghĩa vụ của người nộp thuế trong phạm vi bảo lãnh."]},"luat-38_145":{"tldr":"Quy định xử lý hành vi vi phạm của tổ chức, cá nhân có liên quan trong lĩnh vực quản lý thuế.","points":["Tổ chức, cá nhân liên quan theo khoản 4 Điều 2 có hành vi thông đồng, bao che người nộp thuế trốn thuế, không thực hiện quyết định cưỡng chế thì tùy tính chất, mức độ bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự.","Tổ chức, cá nhân khác liên quan theo khoản 4 Điều 2 không thực hiện trách nhiệm của mình thì tùy tính chất, mức độ bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự."]},"luat-38_147":{"tldr":"Quy định quyền khiếu nại, tố cáo của người nộp thuế, tổ chức, cá nhân và thẩm quyền, trình tự giải quyết.","points":["Người nộp thuế, tổ chức, cá nhân có quyền khiếu nại với cơ quan có thẩm quyền đối với quyết định hành chính, hành vi hành chính của cơ quan quản lý thuế, công chức quản lý thuế khi cho rằng trái pháp luật, xâm phạm quyền, lợi ích hợp pháp.","Cá nhân có quyền tố cáo hành vi vi phạm pháp luật về thuế của người nộp thuế, công chức quản lý thuế hoặc tổ chức, cá nhân khác.","Thẩm quyền, trình tự, thủ tục giải quyết khiếu nại, tố cáo thực hiện theo pháp luật về khiếu nại, tố cáo."]},"luat-38_149":{"tldr":"Quy định trách nhiệm và quyền hạn của cơ quan quản lý thuế trong việc giải quyết khiếu nại về thuế.","points":["Cơ quan quản lý thuế có quyền yêu cầu người khiếu nại cung cấp hồ sơ, tài liệu liên quan; nếu người khiếu nại từ chối thì có quyền từ chối xem xét giải quyết.","Phải hoàn trả tiền thuế, tiền chậm nộp, tiền phạt thu không đúng cho người nộp thuế, bên thứ ba trong thời hạn 15 ngày kể từ ngày nhận quyết định xử lý của cơ quan có thẩm quyền.","Với vụ việc khiếu nại phức tạp, thủ trưởng cơ quan quản lý thuế tham vấn các cơ quan liên quan, ban hành quyết định thành lập Hội đồng tham vấn hoạt động theo nguyên tắc biểu quyết đa số; thủ trưởng cơ quan quản lý thuế ra quyết định và chịu trách nhiệm về quyết định xử lý khiếu nại."]},"luat-38_150":{"tldr":"Bổ sung Điều 70a vào Luật Kế toán số 88/2015/QH13 về cung cấp dịch vụ kế toán của tổ chức kinh doanh dịch vụ làm thủ tục về thuế.","points":["Bổ sung Điều 70a vào sau Điều 70 trong Chương IV của Luật Kế toán số 88/2015/QH13.","Tổ chức kinh doanh dịch vụ làm thủ tục về thuế được cung cấp dịch vụ kế toán cho doanh nghiệp siêu nhỏ khi có ít nhất một người có chứng chỉ kế toán viên."]},"luat-38_151":{"tldr":"Quy định hiệu lực thi hành của Luật, gồm hiệu lực chung và hiệu lực riêng của quy định về hóa đơn, chứng từ điện tử.","points":["Luật có hiệu lực thi hành từ ngày 01 tháng 7 năm 2020, trừ trường hợp tại khoản 2 Điều này.","Quy định về hóa đơn, chứng từ điện tử có hiệu lực từ ngày 01 tháng 7 năm 2022; khuyến khích áp dụng trước ngày 01 tháng 7 năm 2022.","Luật Quản lý thuế số 78/2006/QH11 (đã sửa đổi theo Luật số 21/2012/QH13, 71/2014/QH13, 106/2016/QH13) hết hiệu lực kể từ ngày Luật này có hiệu lực, trừ trường hợp tại khoản 1 Điều 152.","Chính phủ quy định việc áp dụng quản lý khoản thu về thuế để quản lý thu các khoản thu khác thuộc ngân sách nhà nước và quản lý thuế với giao dịch liên kết."]},"luat-38_152":{"tldr":"Quy định chuyển tiếp đối với các khoản thuế được miễn, giảm, không thu, xóa nợ và các khoản tiền thuế nợ phát sinh trước ngày Luật có hiệu lực.","points":["Các khoản thuế được miễn, giảm, không thu, xóa nợ phát sinh trước ngày 01 tháng 7 năm 2020 tiếp tục xử lý theo Luật Quản lý thuế số 78/2006/QH11 (đã sửa đổi theo Luật số 21/2012/QH13, 71/2014/QH13, 106/2016/QH13).","Các khoản tiền thuế nợ đến hết ngày 30 tháng 6 năm 2020 được xử lý theo Luật này, trừ trường hợp tại khoản 1 Điều này.","Luật được Quốc hội khóa XIV, kỳ họp thứ 7 thông qua ngày 13 tháng 6 năm 2019."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
