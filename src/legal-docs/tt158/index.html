 định của pháp luật về quản lý thuế, pháp luật về hải quan. Một số trường hợp khi cơ quan quản lý thuế yêu cầu thì người nộp thuế phải xuất trình hồ sơ như sau:"},{"k":"p","t":"1. Đối với hàng hóa do tổ chức, cá nhân sản xuất, gia công, thuê gia công trực tiếp xuất khẩu ra nước ngoài quy định tại khoản 1 Điều 4 Nghị định số 360/2025/NĐ-CP, tổ chức, cá nhân phải có hồ sơ như sau:"},{"k":"p","t":"a) Hợp đồng bán hàng hoặc hợp đồng gia công cho nước ngoài kèm phụ lục hợp đồng gia công (nếu có phụ lục) hoặc hợp đồng thuê gia công kèm phụ lục hợp đồng gia công (nếu có phụ lục)."},{"k":"p","t":"b) Hóa đơn bán hàng hóa xuất khẩu hoặc hoá đơn tiền gia công."},{"k":"p","t":"c) Chứng từ thanh toán không dùng tiền mặt theo quy định tại Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"2. Đối với hàng hóa do tổ chức, cá nhân có hàng hoá xuất khẩu bán hoặc ủy thác cho tổ chức, cá nhân kinh doanh xuất khẩu để xuất khẩu ra nước ngoài theo hợp đồng kinh tế quy định tại khoản 1 Điều 4 Nghị định số 360/2025/NĐ- CP, tổ chức, cá nhân phải có hồ sơ như sau:"},{"k":"p","t":"a) Hợp đồng mua bán hàng hóa để xuất khẩu hoặc hợp đồng ủy thác xuất khẩu đối với trường hợp ủy thác xuất khẩu giữa tổ chức, cá nhân có hàng hoá xuất khẩu và tổ chức, cá nhân được uỷ thác xuất khẩu."},{"k":"p","t":"b) Hóa đơn bán hàng, giao hàng ủy thác xuất khẩu."},{"k":"p","t":"c) Biên bản thanh lý (thanh lý toàn bộ hoặc từng phần) hợp đồng mua bán hàng hoá để xuất khẩu, hợp đồng ủy thác xuất khẩu thể hiện rõ các nội dung sau: Tên, số lượng, chủng loại, mặt hàng, giá bán của hàng hóa đã thực tế xuất khẩu; hình thức thanh toán; số tiền và số, ngày chứng từ thanh toán hàng hóa xuất khẩu không dùng tiền mặt của người mua nước ngoài cho tổ chức, cá nhân xuất khẩu; số tiền và số, ngày của chứng từ thanh toán giữa tổ chức, cá nhân sản xuất với tổ chức, cá nhân xuất khẩu hoặc tổ chức, cá nhân nhận ủy thác xuất khẩu; số, ngày của hợp đồng xuất khẩu, tờ khai hải quan đối với hàng hóa xuất khẩu."},{"k":"p","t":"Đối với hàng hóa cơ sở xuất khẩu mua, được ủy thác xuất khẩu nhưng không xuất khẩu mà tiêu thụ trong nước, tổ chức, cá nhân có hàng hoá xuất khẩu phải kê khai, nộp thuế tiêu thụ đặc biệt đối với các hàng hóa này khi tiêu thụ (bán) trong nước."},{"k":"p","t":"3. Đối với hàng hoá tạm nhập khẩu, tái xuất khẩu và tạm xuất khẩu, tái nhập khẩu theo quy định tại khoản 2 Điều 4 Nghị định số 360/2025/NĐ-CP, tổ chức, cá nhân phải có hồ sơ như sau:"},{"k":"p","t":"a) Giấy phép kinh doanh tạm nhập, tái xuất, giấy phép tạm nhập, tái xuất, hoặc giấy phép tạm xuất, tái nhập theo quy định của pháp luật về quản lý ngoại thương."},{"k":"p","t":"b) Hợp đồng, văn bản thoả thuận hoặc văn bản thể hiện mục đích tạm nhập khẩu, tái xuất khẩu hoặc tạm xuất khẩu, tái nhập khẩu theo quy định của pháp luật về hải quan."},{"k":"p","t":"Người nộp thuế khai thông tin trên tờ khai hải quan và các chứng từ thuộc hồ sơ theo quy định của pháp luật về hải quan."},{"k":"p","t":"4. Đối với hàng hóa mang ra nước ngoài để bán tại hội chợ, triển lãm, giới thiệu sản phẩm, sự kiện ngoại giao, thể thao, văn hóa, nghệ thuật, tổ chức, cá nhân phải có hồ sơ như sau:"},{"k":"p","t":"a) Giấy mời hoặc giấy đăng ký tham gia hội chợ, triển lãm, giới thiệu sản phẩm, sự kiện ngoại giao, thể thao, văn hóa, nghệ thuật."},{"k":"p","t":"b) Bảng kê hàng hoá bán tại hội chợ, triển lãm, giới thiệu sản phẩm hoặc tại các sự kiện."},{"k":"p","t":"c) Chứng từ thanh toán tiền đối với hàng hoá bán tại hội chợ, triển lãm, trường hợp bán hàng thu tiền mặt có giá trị trên mức quy định thì phải khai báo với cơ quan hải quan, có chứng từ nộp tiền vào ngân hàng theo quy định hiện hành."},{"k":"p","t":"5. Đối với xe ô tô chở người, xe chở người bốn bánh có gắn động cơ không đăng ký lưu hành và chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học và xe ô tô chuyên dùng khác nhập khẩu quy định tại khoản 6 Điều 4 Nghị định số 360/2025/NĐ-CP, tổ chức, cá nhân nhập khẩu, tổ chức, cá nhân được ủy thác nhập khẩu phải xuất trình hoặc cung cấp cho cơ quan hải quan nơi mở tờ khai nhập khẩu thông tin, hồ sơ như sau:"},{"k":"p","t":"a) Thông tin tra cứu về tổ chức, cá nhân tại Cổng thông tin Quốc gia về đăng ký doanh nghiệp, trong đó chứng minh tổ chức, cá nhân nhập khẩu, ủy thác nhập khẩu đang hoạt động và có chức năng kinh doanh khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học hoặc văn bản xác nhận mục đích chuyên dùng khác."},{"k":"p","t":"b) Người nộp thuế khai thông tin trên tờ khai hải quan và các chứng từ thuộc hồ sơ theo quy định của pháp luật về hải quan; trong đó có khai thông tin về việc xe chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học theo cú pháp: “#phạm vi hẹp#” tại chỉ tiêu Mô tả hàng hóa trên tờ khai hải quan."},{"k":"p","t":"c) Hợp đồng mua bán hàng hoá; hợp đồng uỷ thác nhập khẩu đối với trường hợp ủy thác nhập khẩu giữa tổ chức, cá nhân có hàng hoá nhập khẩu và tổ chức, cá nhân được uỷ thác nhập khẩu."},{"k":"p","t":"d) Văn bản xác nhận xe ô tô chuyên dùng phục vụ an ninh, quốc phòng của Bộ Công an, Bộ Quốc phòng đối với xe chuyên dùng phục vụ an ninh, quốc phòng. Văn bản xác nhận xe chuyên dùng khác của Bộ Xây dựng đối với xe chuyên dùng khác."},{"k":"p","t":"6. Đối với xe ô tô chở người, xe chở người bốn bánh có gắn động cơ không đăng ký lưu hành và chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học và xe ô tô chuyên dùng khác sản xuất trong nước quy định tại khoản 6 Điều 4 Nghị định số 360/2025/NĐ-CP, tổ chức, cá nhân sản xuất trong nước xuất trình hoặc cung cấp thông tin, hồ sơ như sau:"},{"k":"p","t":"a) Thông tin tra cứu về tổ chức, cá nhân tại Cổng thông tin Quốc gia về đăng ký doanh nghiệp, trong đó chứng minh tổ chức, cá nhân mua hàng đang hoạt động và có chức năng kinh doanh khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học hoặc văn bản xác nhận mục đích chuyên dùng khác."},{"k":"p","t":"b) Người nộp thuế khai thông tin trên hoá đơn và các chứng từ thuộc hồ sơ theo quy định của pháp luật về quản lý thuế; trong đó có khai thông tin về việc xe chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học theo cú pháp: “#phạm vi hẹp#” tại chỉ tiêu Tên hàng hoá, dịch vụ trên hoá đơn."},{"k":"p","t":"c) Hợp đồng mua bán hàng hoá, trong hợp đồng phải thể hiện đây là xe ô tô chở người, xe chở người bốn bánh có gắn động cơ không đăng ký lưu hành và chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học và xe ô tô chuyên dùng khác."},{"k":"p","t":"d) Văn bản xác nhận xe ô tô chuyên dùng phục vụ an ninh, quốc phòng của Bộ Công an, Bộ Quốc phòng đối với xe chuyên dùng phục vụ an ninh, quốc phòng. Văn bản xác nhận xe chuyên dùng khác của Bộ Xây dựng đối với xe chuyên dùng khác."},{"k":"p","t":"7. Hồ sơ quy định tại Điều này là bản chính hoặc bản sao công chứng hoặc bản sao có đóng dấu của doanh nghiệp, tổ chức, cá nhân kinh doanh. Trường hợp các bên liên quan phát hành, sử dụng và lưu trữ hồ sơ dưới dạng điện tử thì sử dụng hồ sơ điện tử theo quy định."}]},{"id":"tt158_4","no":4,"code":"Điều 4","title":"Điều 4. Hoàn thuế đối với xăng sinh học","shortTitle":"Hoàn thuế đối với xăng sinh học","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với các doanh nghiệp được phép sản xuất xăng sinh học, hồ sơ đề nghị hoàn thuế tiêu thụ đặc biệt như sau:"},{"k":"p","t":"a) Giấy đề nghị hoàn trả thuế tiêu thụ đặc biệt đối với xăng sinh học theo Mẫu số 01a/ĐNHT tại Phụ lục ban hành kèm theo Thông tư này."},{"k":"p","t":"b) Bản sao Văn bản của cơ quan nhà nước có thẩm quyền về việc người nộp thuế được sản xuất xăng sinh học, nộp theo hồ sơ hoàn thuế tiêu thụ đặc biệt lần đầu."},{"k":"p","t":"2. Thủ tục hoàn thuế tiêu thụ đặc biệt thực hiện theo pháp luật về quản lý thuế."}]},{"id":"tt158_5","no":5,"code":"Điều 5","title":"Điều 5. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"2. Thông tư này thay thế:"},{"k":"p","t":"a) Thông tư số 195/2015/TT-BTC ngày 24 tháng 11 năm 2015 của Bộ Tài chính hướng dẫn thi hành Nghị định số 108/2015/NĐ-CP ngày 28 tháng 10 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Thuế tiêu thụ đặc biệt và Luật sửa đổi, bổ sung một số điều của Luật Thuế tiêu thụ đặc biệt."},{"k":"p","t":"b) Thông tư số 20/2017/TT-BTC ngày 06 tháng 3 năm 2017 của Bộ Tài chính sửa đổi, bổ sung khoản 2 Điều 8 Thông tư số 195/2015/TT-BTC (đã được sửa đổi, bổ sung bởi Thông tư số 130/2016/TT-BTC ngày 12 tháng 8 năm 2016 của Bộ Tài chính)."},{"k":"p","t":"3. Bãi bỏ quy định tại Điều 2 Thông tư số 130/2016/TT-BTC ngày 12 tháng 8 năm 2016 của Bộ Tài chính hướng dẫn Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của Luật Thuế giá trị gia tăng, Luật Thuế tiêu thụ đặc biệt và Luật Quản lý thuế và sửa đổi một số điều tại các Thông tư về thuế."},{"k":"p","t":"4. Trường hợp các văn bản quy phạm pháp luật quy định viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."},{"k":"p","t":"5. Trong quá trình thực hiện, nếu có khó khăn, vướng mắc, đề nghị các tổ chức, cá nhân kinh doanh phản ánh về Bộ Tài chính để được giải quyết kịp thời./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Văn phòng Trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chính phủ;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Chủ tịch nước;- Viện kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- Cơ quan Trung ương của các đoàn thể;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc trung ương;- Chi cục Hải quan, Kho bạc Nhà nước khu vực;- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính, Bộ Tư pháp;- Công báo, Cổng Thông tin điện tử của Chính phủ;- Cổng Thông tin điện tử Bộ Tài chính;- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, CST (172b).","KT. BỘ TRƯỞNGTHỨ TRƯỞNGCao Anh Tuấn"]]},{"k":"p","t":"Phụ lục(Kèm theo Thông tư số 158/2025/TT-BTC ngày 31 tháng 12 năm 2025 của Bộ trưởng Bộ Tài chính)"},{"k":"tbl","rows":[["","Mẫu số: 01a/ĐNHT(Kèm theo Thông tư số 158/2025/TT-BTC ngày 31 tháng 12 năm 2025 của Bộ trưởng Bộ Tài chính)"]]},{"k":"tbl","rows":[["TÊN TỔ CHỨC/CÁ NHÂN……………….______________","CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAMĐộc lập - Tự do - Hạnh phúc_______________________"],["Số: …………..","….., ngày ... tháng ... năm ..."]]},{"k":"p","t":"GIẤY ĐỀ NGHỊ"},{"k":"p","t":"HOÀN TRẢ THUẾ TIÊU THỤ ĐẶC BIỆT ĐỐI VỚI XĂNG SINH HỌC"},{"k":"p","t":"[01] Trường hợp hoàn trả thuế trước, kiểm tra sau: □"},{"k":"p","t":"Trường hợp kiểm tra trước, hoàn trả thuế sau: □"},{"k":"p","t":"Kính gửi: …………………… <tên cơ quan có thẩm quyền hoàn trả>"},{"k":"p","t":"I. Thông tin về tổ chức, cá nhân đề nghị hoàn trả:"},{"k":"p","t":"[02] Tên người nộp thuế: ............................................................................................."},{"k":"tbl","rows":[["[03] Mã số thuế:","","","","","","","","","","","","","",""]]},{"k":"p","t":"[04] CCCD/Hộ chiếu số: ……………………………………………… Ngày cấp: …../…../…….."},{"k":"p","t":"Nơi cấp: ………………………………. Quốc tịch: ............................................................"},{"k":"p","t":"[05] Địa chỉ: ................................................................................................................."},{"k":"p","t":"[06] Xã/phường/đặc khu: ……………………………. [07] Tỉnh/thành phố: ........................."},{"k":"p","t":"[08] Điện thoại: ……………………………………….. [09] Fax: ............... <script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');

  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){

  h+='</div>';

  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){

    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;

  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
