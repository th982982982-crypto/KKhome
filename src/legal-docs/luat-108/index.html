<script id="LD" type="application/json">{"meta":{"title":"Luật 108/2025/QH15 — Luật Quản lý thuế","shortCode":"Luật 108/2025","subtitle":"Quản lý thuế (mới)","slug":"luat-108","effectiveDate":"01/07/2026","scope":"Luật này quy định việc quản lý các loại thuế, các khoản thu khác thuộc ngân sách nhà nước.","description":"Quản lý thuế (mới)","related":[]},"outline":[{"id":"luat-108_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định việc quản lý các loại thuế, các khoản thu khác thuộc ngân sách nhà nước."}]},{"id":"luat-108_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế bao gồm:"},{"k":"p","t":"a) Tổ chức, hộ gia đình, hộ kinh doanh, cá nhân, cá nhân kinh doanh là người nộp thuế theo quy định của pháp luật về thuế;"},{"k":"p","t":"b) Tổ chức nước ngoài, cá nhân nước ngoài có hoạt động kinh doanh tại Việt Nam hoặc có thu nhập phát sinh tại Việt Nam là người nộp thuế theo quy định của pháp luật về thuế;"},{"k":"p","t":"c) Tổ chức nước ngoài, cá nhân nước ngoài có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác là người nộp thuế theo quy định của pháp luật về thuế;"},{"k":"p","t":"d) Tổ chức, hộ gia đình, hộ kinh doanh, cá nhân, cá nhân kinh doanh nộp các khoản thu khác thuộc ngân sách nhà nước theo quy định của pháp luật;"},{"k":"p","t":"đ) Tổ chức, cá nhân thực hiện khấu trừ, nộp thay số thuế đã khấu trừ theo quy định của pháp luật về thuế, pháp luật về quản lý thuế và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Cơ quan quản lý thuế bao gồm cơ quan thuế và cơ quan hải quan."},{"k":"p","t":"3. Công chức quản lý thuế bao gồm công chức thuế và công chức hải quan."},{"k":"p","t":"4. Cơ quan nhà nước, tổ chức, cá nhân khác có liên quan."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 1 và khoản 2 Điều này."}]},{"id":"luat-108_3","no":3,"code":"Điều 3","title":"Điều 3. Phân nhóm người nộp thuế trong quản lý thuế","shortTitle":"Phân nhóm người nộp thuế trong quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế thực hiện phân nhóm người nộp thuế theo các tiêu chí quy định tại khoản 2 Điều này để xác định chế độ ưu tiên đối với người nộp thuế trong quản lý thuế, phân bổ nguồn lực quản lý; áp dụng biện pháp quản lý thuế, giám sát thực hiện nghĩa vụ thuế, quy trình nghiệp vụ quản lý thuế phù hợp với từng phân nhóm người nộp thuế; áp dụng phương pháp phân tích và đánh giá mức độ rủi ro về thuế, mức độ tuân thủ pháp luật về thuế của người nộp thuế và lịch sử tuân thủ pháp luật của người nộp thuế."},{"k":"p","t":"2. Tiêu chí phân nhóm người nộp thuế bao gồm:"},{"k":"p","t":"a) Ngành nghề, lĩnh vực, đặc thù, phương thức hoạt động;"},{"k":"p","t":"b) Loại hình pháp lý, cơ cấu sở hữu;"},{"k":"p","t":"c) Quy mô hoạt động, quy mô doanh thu, số nộp ngân sách;"},{"k":"p","t":"d) Mức độ tuân thủ và lịch sử tuân thủ pháp luật về thuế của người nộp thuế;"},{"k":"p","t":"đ) Các tiêu chí khác theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"luat-108_4","no":4,"code":"Điều 4","title":"Điều 4. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Thuế là một khoản phải nộp ngân sách nhà nước bắt buộc của tổ chức, hộ gia đình, hộ kinh doanh, cá nhân, cá nhân kinh doanh theo quy định của các luật thuế."},{"k":"p","t":"2. Các khoản thu khác thuộc ngân sách nhà nước do cơ quan quản lý thuế quản lý thu (sau đây gọi là khoản thu khác) là các khoản thu được quy định tại điểm b khoản 1 Điều 38 của Luật này."},{"k":"p","t":"3. Các khoản thu khác thuộc ngân sách nhà nước không do cơ quan quản lý thuế quản lý thu là các khoản thu được quy định tại khoản 6 Điều 39 của Luật này."},{"k":"p","t":"4. Tiền thuế nợ là tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt do cơ quan quản lý thuế quản lý thu mà người nộp thuế chưa nộp ngân sách nhà nước khi hết thời hạn nộp theo quy định."},{"k":"p","t":"5. Hệ thống thông tin quản lý thuế là hệ thống xử lý tập trung, tích hợp trên nền tảng dữ liệu số, có chức năng thu thập, xử lý, lưu trữ, cập nhật và quản lý thông tin, dữ liệu về thuế nhằm cung cấp các dịch vụ số cho người nộp thuế; hỗ trợ quản lý thuế bằng phương thức điện tử; áp dụng công nghệ để hỗ trợ tối đa tự động hoá các quy trình nghiệp vụ."},{"k":"p","t":"6. Trụ sở của người nộp thuế là địa điểm người nộp thuế tiến hành một phần hoặc toàn bộ hoạt động kinh doanh, bao gồm trụ sở chính, chi nhánh, cửa hàng, nơi sản xuất, nơi để hàng hóa, nơi để tài sản dùng cho sản xuất, kinh doanh; nơi cư trú hoặc nơi phát sinh nghĩa vụ thuế."},{"k":"p","t":"7. Mã số thuế là dãy số hoặc dãy số kèm ký tự được cơ quan thuế xác định cho từng người nộp thuế dùng để quản lý thuế."},{"k":"p","t":"8. Kỳ tính thuế, kỳ tính khoản thu khác (sau đây gọi là kỳ tính thuế) là khoảng thời gian để xác định số tiền thuế, khoản thu khác phải nộp ngân sách nhà nước theo quy định của pháp luật về thuế, pháp luật về quản lý thuế và các quy định khác của pháp luật có liên quan bao gồm kỳ theo từng lần phát sinh, tháng, quý, năm hoặc kỳ quyết toán."},{"k":"p","t":"9. Hồ sơ thuế, hồ sơ khoản thu khác (sau đây gọi là hồ sơ thuế) là hồ sơ đăng ký thuế, hồ sơ khai thuế, hồ sơ khai khoản thu khác, hồ sơ nộp thuế, hồ sơ nộp khoản thu khác, hồ sơ gia hạn nộp hồ sơ khai thuế, hồ sơ gia hạn nộp hồ sơ khai khoản thu khác, hồ sơ hoàn thuế, hồ sơ hoàn khoản thu khác, hồ sơ miễn thuế, hồ sơ miễn khoản thu khác, hồ sơ giảm thuế, hồ sơ giảm khoản thu khác, hồ sơ không chịu thuế, hồ sơ không thu thuế, hồ sơ khoanh tiền thuế nợ, hồ sơ xóa tiền thuế nợ, hồ sơ miễn tiền chậm nộp, hồ sơ miễn tiền phạt, hồ sơ không tính tiền chậm nộp, hồ sơ gia hạn nộp thuế, hồ sơ gia hạn nộp khoản thu khác, hồ sơ gia hạn nộp tiền thuế nợ, hồ sơ nộp dần tiền thuế nợ, hồ sơ hải quan."},{"k":"p","t":"10. Cưỡng chế thi hành quyết định hành chính về quản lý thuế là việc áp dụng các biện pháp theo quy định của Luật này và quy định khác của pháp luật có liên quan buộc người nộp thuế phải thực hiện nghĩa vụ thuế."},{"k":"p","t":"11. Rủi ro về thuế là nguy cơ người nộp thuế không tuân thủ pháp luật dẫn đến thất thu ngân sách nhà nước."},{"k":"p","t":"12. Quản lý rủi ro trong quản lý thuế là việc cơ quan quản lý thuế áp dụng hệ thống các biện pháp, quy trình nghiệp vụ và công cụ phân tích dữ liệu để xác định, đánh giá, phân loại mức độ rủi ro về thuế theo tiêu chí do cơ quan quản lý thuế quy định, nhằm phân bổ nguồn lực, áp dụng các biện pháp quản lý phù hợp, tập trung xử lý các trường hợp rủi ro cao và kiểm soát kịp thời nguy cơ vi phạm pháp luật trong quản lý thuế."},{"k":"p","t":"13. Quản lý tuân thủ trong quản lý thuế là việc cơ quan quản lý thuế sử dụng hồ sơ, thông tin, tài liệu, dữ liệu về người nộp thuế để theo dõi, đánh giá mức độ chấp hành pháp luật về thuế và áp dụng biện pháp quản lý phù hợp nhằm khuyến khích, hỗ trợ tuân thủ tự nguyện, áp dụng chế độ ưu tiên đối với trường hợp tuân thủ tốt, tăng cường giám sát và xử lý kịp thời đối với trường hợp không tuân thủ."},{"k":"p","t":"14. Hoàn thành nghĩa vụ nộp thuế là việc nộp đủ tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt vi phạm hành chính về quản lý thuế."},{"k":"p","t":"15. Cơ sở dữ liệu thương mại là tập hợp thông tin, số liệu kinh tế, tài chính và thương mại do các tổ chức kinh doanh dữ liệu thu thập, xử lý, chuẩn hóa và cung cấp trên thị trường."},{"k":"p","t":"16. Thông tin người nộp thuế là thông tin, dữ liệu về người nộp thuế và thông tin liên quan đến nghĩa vụ thuế của người nộp thuế do người nộp thuế cung cấp, do cơ quan nhà nước, tổ chức, cá nhân liên quan có trách nhiệm cung cấp, do cơ quan quản lý thuế thu thập được trong quá trình quản lý thuế."},{"k":"p","t":"17. Các bên có quan hệ liên kết là các bên tham gia trực tiếp hoặc gián tiếp vào việc điều hành, kiểm soát, góp vốn vào doanh nghiệp; các bên cùng chịu sự điều hành, kiểm soát trực tiếp hoặc gián tiếp bởi một tổ chức hoặc cá nhân; các bên cùng có một tổ chức hoặc cá nhân tham gia góp vốn; các doanh nghiệp được điều hành, kiểm soát bởi các cá nhân là thành viên trong cùng một gia đình."},{"k":"p","t":"18. Giao dịch liên kết là giao dịch phát sinh giữa các bên có quan hệ liên kết."},{"k":"p","t":"19. Giao dịch độc lập là giao dịch phát sinh giữa các bên không có quan hệ liên kết."},{"k":"p","t":"20. Nguyên tắc giao dịch độc lập là nguyên tắc được áp dụng trong kê khai, xác định giá giao dịch liên kết của người nộp thuế có phát sinh giao dịch liên kết, theo đó các điều kiện trong giao dịch liên kết được xác định tương đương với các điều kiện trong giao dịch độc lập tương đồng trên thị trường."},{"k":"p","t":"21. Trường hợp bất khả kháng là trường hợp người nộp thuế bị thiệt hại vật chất do gặp thiên tai, thảm họa, dịch bệnh, hỏa hoạn, tai nạn bất ngờ và các trường hợp bất khả kháng khác theo quy định của Chính phủ."}]},{"id":"luat-108_5","no":5,"code":"Điều 5","title":"Điều 5. Nội dung quản lý thuế","shortTitle":"Nội dung quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế thực hiện quản lý thuế theo phân nhóm người nộp thuế."},{"k":"p","t":"2. Các nội dung quản lý thuế bao gồm:"},{"k":"p","t":"a) Đăng ký thuế; khai thuế, tính thuế, khấu trừ thuế; nộp thuế, tiền chậm nộp, tiền phạt; ấn định thuế; hoàn thuế; xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa; miễn thuế; giảm thuế; không chịu thuế; không thu thuế; khoanh tiền thuế nợ; xóa tiền thuế nợ; miễn tiền chậm nộp; miễn tiền phạt; tính tiền chậm nộp, không tính tiền chậm nộp; gia hạn nộp thuế, tiền chậm nộp, tiền phạt; gia hạn nộp hồ sơ khai thuế; nộp dần tiền thuế nợ; cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"b) Tuyên truyền, hỗ trợ người nộp thuế; quản lý rủi ro, quản lý tuân thủ;"},{"k":"p","t":"c) Quản lý thông tin người nộp thuế;"},{"k":"p","t":"d) Quản lý hóa đơn, chứng từ;"},{"k":"p","t":"đ) Kiểm tra thuế; thực hiện biện pháp phòng, chống, ngăn chặn vi phạm pháp luật về thuế; xử lý vi phạm hành chính về quản lý thuế; giải quyết khiếu nại, tố cáo về thuế;"},{"k":"p","t":"e) Hợp tác quốc tế về thuế; quản lý thuế theo các điều ước quốc tế về thuế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết, cam kết quốc tế về thuế."},{"k":"p","t":"3. Cơ quan thuế áp dụng các nội dung quản lý thuế quy định tại khoản 2 Điều này để quản lý khoản thu khác theo quy định của Luật này và các quy định khác của pháp luật có liên quan."}]},{"id":"luat-108_6","no":6,"code":"Điều 6","title":"Điều 6. Nguyên tắc quản lý thuế","shortTitle":"Nguyên tắc quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Quản lý thuế phải bảo đảm nguyên tắc công khai, minh bạch, bình đẳng, lấy người nộp thuế làm trung tâm phục vụ, bảo đảm quyền và lợi ích hợp pháp của người nộp thuế, nâng cao hiệu lực, hiệu quả quản lý thu ngân sách nhà nước."},{"k":"p","t":"2. Người nộp thuế có nghĩa vụ nộp thuế, các khoản thu khác thuộc ngân sách nhà nước theo quy định của luật thuế và quy định của pháp luật. Người nộp thuế tự xác định nghĩa vụ thuế, các khoản thu khác thuộc ngân sách nhà nước phải nộp, tự kê khai thuế, các khoản thu khác thuộc ngân sách nhà nước và tự nộp thuế, các khoản thu khác thuộc ngân sách nhà nước vào ngân sách nhà nước theo quy định của pháp luật về thuế, pháp luật về quản lý thuế và các quy định khác của pháp luật có liên quan, trừ trường hợp do cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo thuế, khoản thu khác theo quy định của pháp luật."},{"k":"p","t":"3. Cơ quan quản lý thuế, cơ quan nhà nước, tổ chức khác của nhà nước được giao nhiệm vụ quản lý thu ngân sách nhà nước thực hiện việc quản lý thuế, các khoản thu khác thuộc ngân sách nhà nước theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"4. Các nguyên tắc áp dụng trong quản lý thuế:"},{"k":"p","t":"a) Nguyên tắc bản chất hoạt động, giao dịch quyết định nghĩa vụ thuế trong quản lý thuế để xác định bản chất của các giao dịch, hoạt động sản xuất, kinh doanh của người nộp thuế làm cơ sở xác định nghĩa vụ thuế, khoản thu khác, đảm bảo các giao dịch của người nộp thuế thể hiện đúng bản chất thương mại, kinh tế, tài chính, không phụ thuộc hình thức của giao dịch được thể hiện trong hợp đồng, văn bản giữa người nộp thuế với bên liên quan;"},{"k":"p","t":"b) Nguyên tắc giao dịch độc lập;"},{"k":"p","t":"c) Nguyên tắc quản lý rủi ro dựa trên mức độ rủi ro để sử dụng hiệu quả nguồn lực và nâng cao hiệu quả quản lý;"},{"k":"p","t":"d) Nguyên tắc quản lý tuân thủ theo mức độ tuân thủ của người nộp thuế để có biện pháp khuyến khích tự giác, tự nguyện thực hiện nghĩa vụ nộp thuế;"},{"k":"p","t":"đ) Nguyên tắc quản lý thuế theo thông lệ quốc tế phù hợp với điều kiện của Việt Nam."}]},{"id":"luat-108_7","no":7,"code":"Điều 7","title":"Điều 7. Bảo mật, công khai thông tin người nộp thuế","shortTitle":"Bảo mật, công khai thông tin người nộp thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế, công chức quản lý thuế, người đã từng là công chức quản lý thuế, cơ quan cung cấp, trao đổi thông tin người nộp thuế, tổ chức kinh doanh dịch vụ làm thủ tục về thuế (sau đây gọi là đại lý thuế), tổ chức kinh doanh dịch vụ làm thủ tục hải quan (sau đây gọi là đại lý làm thủ tục hải quan) phải bảo mật thông tin người nộp thuế, trừ trường hợp cơ quan quản lý thuế cung cấp, công khai thông tin người nộp thuế quy định tại khoản 2 và khoản 3 Điều này."},{"k":"p","t":"2. Cơ quan quản lý thuế cung cấp thông tin người nộp thuế trong các trường hợp sau:"},{"k":"p","t":"a) Cung cấp cho cơ quan điều tra, Viện kiểm sát, Tòa án, cơ quan thanh tra, Kiểm toán nhà nước, cơ quan quản lý khác của nhà nước khi có yêu cầu bằng văn bản để phục vụ hoạt động tố tụng, thanh tra, kiểm tra, kiểm toán theo quy định của pháp luật;"},{"k":"p","t":"b) Cung cấp cho cơ quan nhà nước có thẩm quyền khác khi có yêu cầu bằng văn bản theo quy định của luật;"},{"k":"p","t":"c) Cung cấp cho cơ quan quản lý thuế nước ngoài phù hợp với điều ước quốc tế về thuế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết."},{"k":"p","t":"3. Cơ quan quản lý thuế được công khai thông tin người nộp thuế trong các trường hợp sau:"},{"k":"p","t":"a) Trốn thuế, khoản thu khác; chây ỳ không nộp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đúng thời hạn; nợ tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt;"},{"k":"p","t":"b) Vi phạm pháp luật về thuế làm ảnh hưởng đến quyền lợi và nghĩa vụ nộp thuế của tổ chức, cá nhân khác;"},{"k":"p","t":"c) Không thực hiện yêu cầu của cơ quan quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"4. Cơ quan, tổ chức, cá nhân được cơ quan quản lý thuế cung cấp thông tin theo các trường hợp quy định tại khoản 2 Điều này, cơ quan quản lý thuế, các cơ quan nhà nước khác, tổ chức có liên quan trong nước và ngoài nước khi thực hiện nhiệm vụ, trách nhiệm cung cấp, chia sẻ, trao đổi thông tin người nộp thuế phục vụ công tác quản lý thuế theo quy định tại các điều 38, 39 và 40 của Luật này phải sử dụng thông tin đúng mục đích và bảo mật thông tin theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"5. Chính phủ quy định chi tiết điểm c khoản 2 và khoản 3 Điều này."}]},{"id":"luat-108_8","no":8,"code":"Điều 8","title":"Điều 8. Các hành vi bị nghiêm cấm trong quản lý thuế","shortTitle":"Các hành vi bị nghiêm cấm trong quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông đồng, móc nối, bao che giữa người nộp thuế và công chức quản lý thuế, cơ quan quản lý thuế để chuyển giá, trốn thuế, khoản thu khác, gian lận, trục lợi tiền thuế, tiền ngân sách nhà nước. Lợi dụng chức vụ, quyền hạn để tiết lộ hoặc làm rò rỉ thông tin người nộp thuế trái quy định. Làm sai lệch kết quả kiểm tra, xử lý vi phạm pháp luật về thuế. Gây phiền hà, sách nhiễu đối với người nộp thuế. Lợi dụng để chiếm đoạt hoặc sử dụng trái phép tiền thuế, khoản thu khác."},{"k":"p","t":"2. Cố tình không kê khai hoặc kê khai thuế, khoản thu khác không đầy đủ, kịp thời, chính xác về số tiền thuế, khoản thu khác phải nộp, số tiền thuế, khoản thu khác được miễn, giảm, hoàn, không thu. Cản trở công chức quản lý thuế thi hành công vụ. Chống đối, trì hoãn, không cung cấp thông tin, tài liệu phục vụ kiểm tra, giám sát thuế, khoản thu khác."},{"k":"p","t":"3. Sử dụng mã số thuế của người nộp thuế khác để thực hiện hành vi vi phạm pháp luật hoặc cho người khác sử dụng mã số thuế của mình không đúng quy định của pháp luật."},{"k":"p","t":"4. Bán hàng hóa, cung cấp dịch vụ không lập hóa đơn theo quy định của pháp luật; sử dụng hóa đơn, chứng từ không hợp pháp, sử dụng không hợp pháp hóa đơn, chứng từ, làm giả hóa đơn, chứng từ để thực hiện hành vi trái pháp luật. Tạo lập hóa đơn, chứng từ điện tử trái phép hoặc phục vụ hành vi vi phạm trong lĩnh vực quản lý thuế."},{"k":"p","t":"5. Làm sai lệch, sử dụng sai mục đích, truy cập trái phép, phá hủy hệ thống thông tin người nộp thuế. Cung cấp, phát tán thông tin sai lệch gây ảnh hưởng đến uy tín, hoạt động của cơ quan quản lý thuế, người nộp thuế, Hệ thống thông tin quản lý thuế."}]},{"id":"luat-108_9","no":9,"code":"Điều 9","title":"Điều 9. Xây dựng lực lượng quản lý thuế","shortTitle":"Xây dựng lực lượng quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Lực lượng quản lý thuế được xây dựng trong sạch, vững mạnh; có đạo đức công vụ, tinh thần phục vụ người nộp thuế, tuân thủ kỷ luật, kỷ cương hành chính; được trang bị và làm chủ kỹ thuật hiện đại, hoạt động hiệu lực và hiệu quả."},{"k":"p","t":"2. Công chức quản lý thuế được áp dụng chế độ chức danh, tiêu chuẩn, lương, chế độ đãi ngộ, phù hiệu, cấp hiệu, trang phục, biển hiệu của công chức quản lý thuế nhằm bảo đảm công tác quản lý thuế, khuyến khích, nâng cao trách nhiệm, tính chuyên nghiệp và hiệu quả thực thi công vụ."},{"k":"p","t":"3. Cơ quan quản lý thuế có trách nhiệm đào tạo, xây dựng đội ngũ công chức quản lý thuế để thực hiện chức năng quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"4. Nhà nước bảo đảm các nguồn lực tài chính cho hoạt động của lực lượng quản lý thuế, cơ quan quản lý thuế; trong đó ưu tiên bố trí ngân sách nhà nước hằng năm để xây dựng và vận hành hệ thống công nghệ thông tin, chuyển đổi số trong quản lý thuế, hóa đơn điện tử, cơ sở vật chất, trang thiết bị và các nhiệm vụ chuyên môn phục vụ công tác để nâng cao hiệu quả quản lý thuế."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 2 và khoản 4 Điều này."},{"k":"p","t":"ĐĂNG KÝ THUẾ"}]},{"id":"luat-108_10","no":10,"code":"Điều 10","title":"Điều 10. Đăng ký thuế","shortTitle":"Đăng ký thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Phạm vi đăng ký thuế bao gồm đăng ký thuế lần đầu; thông báo thay đổi thông tin đăng ký thuế; thông báo khi tạm ngừng hoạt động, kinh doanh; chấm dứt hiệu lực mã số thuế; khôi phục mã số thuế."},{"k":"p","t":"2. Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, đơn vị phụ thuộc, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thực hiện đăng ký thuế cùng với việc đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký liên hiệp hợp tác xã, đăng ký tổ hợp tác, đăng ký hộ kinh doanh, đăng ký hoạt động, kinh doanh theo cơ chế một cửa liên thông."},{"k":"p","t":"3. Các trường hợp khác không thuộc quy định tại khoản 2 Điều này thực hiện đăng ký thuế trực tiếp với cơ quan thuế."},{"k":"p","t":"4. Thời hạn đăng ký thuế; trách nhiệm của người nộp thuế, cơ quan quản lý thuế, cơ quan nhà nước, tổ chức, cá nhân có liên quan đến đăng ký thuế thực hiện theo quy định của Chính phủ."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định chi tiết khoản 1 và khoản 3 Điều này."}]},{"id":"luat-108_11","no":11,"code":"Điều 11","title":"Điều 11. Mã số thuế","shortTitle":"Mã số thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Mã số thuế của cá nhân, hộ gia đình, hộ kinh doanh, cá nhân kinh doanh là số định danh cá nhân của cá nhân, chủ hộ gia đình, chủ hộ kinh doanh, cá nhân kinh doanh được cấp theo quy định của pháp luật về căn cước."},{"k":"p","t":"2. Mã số thuế của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, đơn vị phụ thuộc, tổ chức khác quy định tại khoản 2 Điều 10 của Luật này là mã số của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, đơn vị phụ thuộc, tổ chức khác được cấp theo quy định của pháp luật."},{"k":"p","t":"3. Mã số thuế của người nộp thuế không thuộc quy định tại khoản 1 và khoản 2 Điều này là mã số do cơ quan thuế cấp để sử dụng trong suốt quá trình hoạt động từ khi đăng ký thuế lần đầu cho đến khi chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"4. Mã số thuế của tổ chức, cá nhân có trách nhiệm khấu trừ, nộp thay số thuế đã khấu trừ của người nộp thuế khác thực hiện theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"5. Mã số thuế được sử dụng như sau:"},{"k":"p","t":"a) Được ghi trên hóa đơn, chứng từ, hồ sơ, tài liệu trong thực hiện các giao dịch kinh doanh, thực hiện thủ tục hành chính về thuế và mở tài khoản tại tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán;"},{"k":"p","t":"b) Được sử dụng trong quản lý thuế; trao đổi, chia sẻ, cung cấp thông tin về người nộp thuế với cơ quan quản lý thuế."},{"k":"p","t":"6. Chính phủ quy định chi tiết khoản 5 Điều này."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính quy định chi tiết các khoản 1, 2, 3 và 4 Điều này."},{"k":"p","t":"KHAI THUẾ, KHOẢN THU KHÁC; TÍNH THUẾ, KHOẢN THU KHÁC; KHẤU TRỪ THUẾ"}]},{"id":"luat-108_12","no":12,"code":"Điều 12","title":"Điều 12. Khai thuế, khoản thu khác; tính thuế, khoản thu khác; khấu trừ thuế","shortTitle":"Khai thuế, khoản thu khác; tính thuế, khoản thu khác; khấu trừ thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế phải khai chính xác, trung thực, đầy đủ các nội dung trong hồ sơ khai thuế, khoản thu khác đối với từng loại thuế, khoản thu khác và tự tính số tiền thuế, khoản thu khác phải nộp, trừ trường hợp việc tính thuế, khoản thu khác, thông báo thuế, khoản thu khác do cơ quan quản lý thuế thực hiện theo quy định của Chính phủ."},{"k":"p","t":"2. Tổ chức nước ngoài, cá nhân nước ngoài có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác và các dịch vụ khác thì trực tiếp hoặc ủy quyền thực hiện việc khai, nộp thuế, khoản thu khác tại Việt Nam, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Khấu trừ, khai thay, nộp thay:"},{"k":"p","t":"a) Tổ chức, cá nhân thuộc trường hợp khấu trừ, nộp thay số thuế đã khấu trừ theo quy định của pháp luật về thuế phải thực hiện khấu trừ thuế của người nộp thuế và khai, nộp số thuế đã khấu trừ;"},{"k":"p","t":"b) Tổ chức, cá nhân thuộc trường hợp khai thay, nộp thay thuế, khoản thu khác theo quy định của pháp luật về thuế và quy định khác của pháp luật có liên quan phải thực hiện khai thay, nộp thay thuế, khoản thu khác cho người nộp thuế;"},{"k":"p","t":"c) Người nộp thuế không phải nộp số tiền thuế, khoản thu khác đã được khấu trừ, khai thay, nộp thay."},{"k":"p","t":"4. Người nộp thuế không có khả năng nộp hồ sơ khai thuế, khoản thu khác đúng thời hạn trong trường hợp bất khả kháng quy định tại khoản 21 Điều 4 của Luật này được gia hạn như sau:"},{"k":"p","t":"a) Đối với trường hợp khai thuế, khoản thu khác theo tháng, quý, năm, từng lần phát sinh nghĩa vụ thuế, khoản thu khác, thời gian gia hạn không quá 30 ngày kể từ ngày hết thời hạn nộp hồ sơ khai thuế, khoản thu khác."},{"k":"p","t":"Đối với trường hợp khai quyết toán thuế, khoản thu khác, thời gian gia hạn không quá 60 ngày kể từ ngày hết thời hạn nộp hồ sơ khai quyết toán thuế, khoản thu khác;"},{"k":"p","t":"b) Trường hợp phải kéo dài thời gian gia hạn nộp hồ sơ khai thuế, khoản thu khác quy định tại điểm a khoản này, Chính phủ quy định phù hợp với tình hình thực tế."},{"k":"p","t":"5. Người nộp thuế phát hiện hồ sơ khai thuế, khoản thu khác đã nộp cho cơ quan thuế có sai, sót thì được khai bổ sung hồ sơ khai thuế, khoản thu khác trong thời hạn 05 năm kể từ ngày hết thời hạn nộp hồ sơ khai thuế, khoản thu khác của kỳ tính thuế có sai, sót đối với các trường hợp sau:"},{"k":"p","t":"a) Trước khi cơ quan thuế, cơ quan có thẩm quyền công bố quyết định thanh tra, kiểm tra;"},{"k":"p","t":"b) Hồ sơ không thuộc phạm vi, thời kỳ thanh tra, kiểm tra thuế, khoản thu khác nêu tại quyết định thanh tra, kiểm tra;"},{"k":"p","t":"c) Hồ sơ không thuộc trường hợp cơ quan điều tra yêu cầu không được khai bổ sung hồ sơ khai thuế, khoản thu khác để phục vụ điều tra vụ án;"},{"k":"p","t":"d) Người nộp thuế phát hiện hồ sơ khai thuế đã nộp còn sai, sót liên quan đến phạm vi, thời kỳ đã thanh tra, kiểm tra dẫn đến phát sinh tăng số thuế phải nộp, giảm số thuế đã được miễn, giảm, hoàn, giảm số thuế được khấu trừ, giảm số thuế đã nộp thừa thì người nộp thuế được bổ sung hồ sơ giải trình với cơ quan thuế. Cơ quan thuế có trách nhiệm rà soát hồ sơ giải trình liên quan đến phạm vi, thời kỳ đã thanh tra, kiểm tra của người nộp thuế, trường hợp chấp thuận hồ sơ giải trình của người nộp thuế thì cơ quan thuế ban hành thông báo chấp thuận cho người nộp thuế điều chỉnh hồ sơ khai thuế."},{"k":"p","t":"Người nộp thuế bị xử lý theo quy định như đối với trường hợp cơ quan thuế, cơ quan có thẩm quyền thanh tra, kiểm tra phát hiện. Công chức thanh tra, kiểm tra thuế liên quan đến hồ sơ giải trình chịu trách nhiệm về sai, sót chưa được phát hiện đầy đủ qua kiểm tra trong trường hợp tuân thủ chưa đúng quy định tại điểm n khoản 1 Điều 38 của Luật này;"},{"k":"p","t":"đ) Các trường hợp thực hiện theo kết luận, quyết định của cơ quan nhà nước có thẩm quyền liên quan đến nội dung xác định nghĩa vụ thuế của người nộp thuế. Trường hợp người nộp thuế khai bổ sung làm tăng số thuế phải nộp, giảm số thuế được khấu trừ, miễn, giảm, hoàn thì bị xử lý theo quy định như đối với trường hợp cơ quan thuế, cơ quan có thẩm quyền thanh tra, kiểm tra phát hiện;"},{"k":"p","t":"e) Chính phủ quy định các trường hợp cơ quan điều tra đề nghị không được khai bổ sung hồ sơ khai thuế, khoản thu khác để phục vụ điều tra vụ án và trách nhiệm thông báo của cơ quan điều tra cho cơ quan thuế khi kết thúc yêu cầu liên quan đến vụ án quy định tại điểm c khoản này và các trường hợp khai bổ sung theo kết luận, quyết định của cơ quan nhà nước có thẩm quyền liên quan đến nội dung xác định nghĩa vụ thuế của người nộp thuế quy định tại điểm đ khoản này."},{"k":"p","t":"6. Đối với hàng hóa xuất khẩu, nhập khẩu thì hồ sơ hải quan theo quy định của Luật Hải quan được sử dụng làm hồ sơ khai thuế. Việc khai thuế, khai bổ sung, thời hạn nộp hồ sơ khai thuế, cơ quan hải quan tiếp nhận hồ sơ khai thuế, tỷ giá tính thuế đối với hàng hóa xuất khẩu, hàng hóa nhập khẩu thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"7. Đồng tiền khai thuế, khoản thu khác là Đồng Việt Nam; đồng tiền tính thuế, khoản thu khác là Đồng Việt Nam. Chính phủ quy định các trường hợp được khai, tính bằng ngoại tệ."},{"k":"p","t":"8. Chính phủ quy định chi tiết các khoản 1, 2, 3, 5, 6, 7 và điểm b khoản 4 Điều này và các nội dung sau: các trường hợp không phải nộp hồ sơ khai thuế, khoản thu khác; kỳ tính thuế; thời hạn nộp hồ sơ khai thuế, khoản thu khác, trừ trường hợp quy định tại khoản 9 Điều này; việc khai thuế, khoản thu khác, tính thuế, khoản thu khác, nộp thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí; tỷ giá khai thuế, khoản thu khác quy đổi; việc kê khai, xác định giá tính thuế đối với giao dịch liên kết, báo cáo lợi nhuận liên quốc gia; phân bổ nghĩa vụ thuế, khoản thu khác phải nộp; trình tự, thủ tục tiếp nhận và xử lý hồ sơ đối với trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo thuế, khoản thu khác."},{"k":"p","t":"9. Bộ trưởng Bộ Tài chính quy định chi tiết điểm a khoản 4 Điều này và các nội dung sau: thời hạn nộp hồ sơ khai đối với thuế sử dụng đất nông nghiệp, thuế sử dụng đất phi nông nghiệp và khoản thu khác; kỳ tính thuế đối với từng loại thuế,khoản thu khác; việc khai thuế, khoản thu khác; tính thuế, khoản thu khác; hồ sơ khai thuế, khoản thu khác; hình thức nộp hồ sơ khai thuế, khoản thu khác; cơ quan quản lý thuế tiếp nhận, xử lý hồ sơ khai thuế, khoản thu khác."}]},{"id":"luat-108_13","no":13,"code":"Điều 13","title":"Điều 13. Khai thuế, khoản thu khác; tính thuế, khoản thu khác; khấu trừ thuế đối với hộ kinh doanh, cá nhân kinh doanh","shortTitle":"Khai thuế, khoản thu khác; tính thuế, khoản thu khác; khấu trừ thuế đối với hộ kinh doanh, cá nhân kinh doanh","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối với thuế giá trị gia tăng, thuế thu nhập cá nhân:"},{"k":"p","t":"a) Trường hợp hộ kinh doanh, cá nhân kinh doanh tự xác định có mức doanh thu hằng năm từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng không chịu thuế, đối tượng không phải nộp thuế theo quy định của pháp luật về thuế giá trị gia tăng, thuế thu nhập cá nhân, hộ kinh doanh, cá nhân kinh doanh thông báo doanh thu thực tế phát sinh trong năm với cơ quan thuế;"},{"k":"p","t":"b) Trường hợp hộ kinh doanh, cá nhân kinh doanh xác định có mức doanh thu hằng năm từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng chịu thuế, đối tượng phải nộp thuế theo quy định của pháp luật về thuế, hộ kinh doanh, cá nhân kinh doanh tự xác định số thuế giá trị gia tăng, thuế thu nhập cá nhân phải nộp theo quy định của pháp luật về thuế giá trị gia tăng, thuế thu nhập cá nhân."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử, hoá đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế, Hệ thống thông tin quản lý thuế tự động tạo lập tờ khai thuế để hỗ trợ hộ kinh doanh, cá nhân kinh doanh trong việc khai thuế và tính thuế trên cơ sở dữ liệu hóa đơn điện tử, cơ sở dữ liệu quản lý thuế và các nguồn cơ sở dữ liệu khác mà cơ quan thuế có được từ cơ quan nhà nước khác, tổ chức, cá nhân cung cấp."},{"k":"p","t":"2. Đối với các loại thuế khác và khoản thu khác:"},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh tự xác định số thuế, khoản thu khác phải nộp theo quy định của pháp luật về thuế, quy định khác của pháp luật có liên quan."},{"k":"p","t":"3. Hộ kinh doanh, cá nhân kinh doanh thực hiện khai thuế, tính thuế đối với từng loại thuế theo kỳ tính thuế. Cơ quan thuế căn cứ vào cơ sở dữ liệu quản lý thuế cung cấp thông tin để hỗ trợ hộ kinh doanh, cá nhân kinh doanh trong việc khai thuế và tính thuế."},{"k":"p","t":"4. Đối với hộ kinh doanh, cá nhân kinh doanh có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác:"},{"k":"p","t":"a) Trường hợp có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác có chức năng đặt hàng trực tuyến và chức năng thanh toán, chủ quản nền tảng thương mại điện tử, nền tảng số khác (trong nước hoặc nước ngoài) có trách nhiệm khấu trừ, khai thay và nộp thay số thuế đã khấu trừ của hộ kinh doanh, cá nhân kinh doanh;"},{"k":"p","t":"b) Trường hợp có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác không có chức năng đặt hàng trực tuyến và chức năng thanh toán, hộ kinh doanh, cá nhân kinh doanh trực tiếp khai thuế, tính thuế và nộp thuế theo quy định."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này và các nội dung sau: việc quyết toán thuế và xử lý tiền thuế, khoản thu khác nộp thừa; phạm vi trách nhiệm, cách thức các chủ quản nền tảng thương mại điện tử, nền tảng số khác thực hiện khấu trừ, khai thay và nộp thay số thuế đã khấu trừ của hộ kinh doanh, cá nhân kinh doanh; trách nhiệm khai thay, nộp thuế thay của tổ chức trong trường hợp hợp tác kinh doanh với hộ kinh doanh, cá nhân kinh doanh, ký hợp đồng với hộ kinh doanh, cá nhân kinh doanh làm đại lý bán đúng giá đối với xổ số, bảo hiểm, bán hàng đa cấp."},{"k":"p","t":"6. Bộ trưởng Bộ Tài chính quy định hồ sơ, thủ tục kê khai doanh thu, kê khai thuế, nộp thuế và hoàn thuế, chế độ kế toán áp dụng đối với hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"NỘP THUẾ, KHOẢN THU KHÁC, TIỀN CHẬM NỘP, TIỀN PHẠT; GIA HẠN NỘP THUẾ, KHOẢN THU KHÁC, TIỀN CHẬM NỘP, TIỀN PHẠT; XỬ LÝ TIỀN THUẾ, KHOẢN THU KHÁC, TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA;  XỬ LÝ CHẬM NỘP TIỀN THUẾ, KHOẢN THU KHÁC"}]},{"id":"luat-108_14","no":14,"code":"Điều 14","title":"Điều 14. Nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt; gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt","shortTitle":"Nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt; gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a) Trường hợp người nộp thuế tự tính thuế, khoản thu khác thì thời hạn nộp thuế, khoản thu khác chậm nhất là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế, khoản thu khác. Đối với trường hợp khai bổ sung hồ sơ khai thuế, khoản thu khác, thời hạn nộp thuế, khoản thu khác là thời hạn nộp hồ sơ khai thuế, khoản thu khác của kỳ tính thuế có sai, sót. Đối với trường hợp tạm nộp theo quý, thời hạn nộp thuế thực hiện theo quy định của Chính phủ;"},{"k":"p","t":"b) Đối với trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo nộp thuế, khoản thu khác, quyết định xử lý về thuế, khoản thu khác thì thời hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là thời hạn ghi trên thông báo, quyết định của cơ quan quản lý thuế theo quy định của pháp luật. Trường hợp cơ quan nhà nước có thẩm quyền ban hành văn bản xử lý về thuế, khoản thu khác thì thời hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là thời hạn ghi trên văn bản của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"Trong thời gian giải quyết khiếu nại, khởi kiện của người nộp thuế về số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộpthì người nộp thuế vẫn phải nộp đủ số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộp, trừ trường hợp cơ quan nhà nước có thẩm quyền quyết định tạm đình chỉ việc thực hiện thông báo nộp thuế, khoản thu khác, quyết định, văn bản xử lý về thuế, khoản thu khác, tiền chậm nộp, tiền phạt của cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"c) Đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế theo quy định của pháp luật về thuế, thời hạn nộp thuế thực hiện theo quy định của Luật Thuế xuất khẩu, thuế nhập khẩu; trường hợp phát sinh số tiền thuế phải nộp sau khi thông quan hoặc giải phóng hàng hóa thì thời hạn nộp thuế phát sinh thực hiện theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"2. Người nộp thuế nộp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo một trong các phương thức sau:"},{"k":"p","t":"a) Nộp theo phương thức điện tử qua Hệ thống thông tin quản lý thuế; Hệ thống dịch vụ công trực tuyến của Kho bạc Nhà nước; dịch vụ thanh toán điện tử của tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác có kết nối trực tiếp hoặc gián tiếp với Hệ thống thông tin quản lý thuế của cơ quan quản lý thuế theo quy định của pháp luật;"},{"k":"p","t":"b) Nộp trực tiếp tại tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác có kết nối trực tiếp hoặc gián tiếp với Hệ thống thông tin quản lý thuế của cơ quan quản lý thuế; cơ quan nhà nước có thẩm quyền theo quy định của pháp luật; cơ quan quản lý thuế; tổ chức được cơ quan quản lý thuế ủy nhiệm thu thuế."},{"k":"p","t":"3. Đồng tiền nộp thuế, khoản thu khác là đồng tiền khai thuế, khoản thu khác theo quy định tại khoản 7 Điều 12 của Luật này. Người nộp thuế khai thuế, khoản thu khác bằng đồng tiền nào thì nộp bằng đồng tiền đó."},{"k":"p","t":"4. Người nộp thuế sau khi nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt được cấp chứng từ nộp tiền. Trường hợp số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộp đã được cơ quan quản lý thuế cung cấp mã định danh khoản phải nộp thì người nộp thuế nộp theo mã định danh khoản phải nộp."},{"k":"p","t":"Cơ quan, tổ chức thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt quy định tại khoản 2 Điều này khi cấp chứng từ nộp tiền cho người nộp thuế thì đồng thời chuyển thông tin cho cơ quan quản lý thuế để hạch toán, thanh toán nghĩa vụ nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt cho người nộp thuế."},{"k":"p","t":"Mã định danh khoản phải nộp là một dãy các ký tự được tạo trên Hệ thống thông tin quản lý thuế, có tính duy nhất cho từng khoản phải nộp của người nộp thuế."},{"k":"p","t":"5. Việc xác định ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt được quy định như sau:"},{"k":"p","t":"a) Trường hợp nộp theo phương thức điện tử thì ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là ngày cơ quan, tổ chức quy định tại điểm a khoản 2 Điều này trích tiền từ tài khoản của người nộp thuế hoặc người nộp thay và được ghi trên chứng từ nộp tiền;"},{"k":"p","t":"b) Trường hợp nộp trực tiếp thì ngày nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là ngày cơ quan, tổ chức quy định tại điểm b khoản 2 Điều này thu tiền của người nộp thuế và được ghi nhận trên chứng từ thu tiền."},{"k":"p","t":"6. Việc nộp tiền phạt đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính. Việc gia hạn nộp tiền phạt đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của Luật này."},{"k":"p","t":"7. Người nộp thuế được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trong các trường hợp sau:"},{"k":"p","t":"a) Bị thiệt hại vật chất, gây ảnh hưởng trực tiếp đến sản xuất, kinh doanh do gặp trường hợp bất khả kháng theo quy định của Luật này;"},{"k":"p","t":"b) Phải ngừng hoạt động do di dời cơ sở sản xuất, kinh doanh theo yêu cầu của cơ quan nhà nước có thẩm quyền làm ảnh hưởng đến kết quả sản xuất, kinh doanh;"},{"k":"p","t":"c) Gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trong trường hợp đặc biệt do Chính phủ quy định. Việc gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt không dẫn đến điều chỉnh dự toán thu ngân sách nhà nước đã được Quốc hội quyết định."},{"k":"p","t":"Người nộp thuế được gia hạn theo quy định tại khoản này không phải nộp tiền chậm nộp tính trên số tiền thuế nợ được gia hạn trong thời gian gia hạn."},{"k":"p","t":"8. Chính phủ quy định chi tiết khoản 1 Điều này và các nội dung sau: thời hạn cơ quan, tổ chức thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp tiền vào ngân sách nhà nước; thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt; hồ sơ, thủ tục gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt đối với trường hợp quy định tại điểm c khoản 7 Điều này."},{"k":"p","t":"9. Bộ trưởng Bộ Tài chính quy định chi tiết các khoản 2, 3, 4, 5, 7 Điều này và các nội dung sau: việc tra soát và xử lý chứng từ nộp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt, việc giải quyết hồ sơ gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt, trừ trường hợp quy định tại điểm c khoản 7 Điều này."}]},{"id":"luat-108_15","no":15,"code":"Điều 15","title":"Điều 15. Xử lý số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa","shortTitle":"Xử lý số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa là số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đã nộp lớn hơn số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộp."},{"k":"p","t":"2. Người nộp thuế có số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa được bù trừ số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa với số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt phải nộp hoặc được hoàn trả số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa khi người nộp thuế không còn tiền thuế nợ. Việc bù trừ trong cùng hoặc giữa các loại thuế, khoản thu khác, tiền chậm nộp, tiền phạt do Hệ thống thông tin quản lý thuế thực hiện tự động hoặc theo đề nghị của người nộp thuế theo hướng dẫn của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"Trường hợp người nộp thuế có số tiền thuế giá trị gia tăng nộp thừa khi nhập khẩu hàng hóa và đã thực hiện kê khai khấu trừ số tiền thuế nộp thừa với cơ quan thuế thì việc xử lý số tiền thuế đã khấu trừ, nộp thừa thực hiện theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Trường hợp người nộp thuế đề nghị hoàn trả số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa thì thực hiện theo quy định tại Điều 18 của Luật này."},{"k":"p","t":"4. Không hoàn trả số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa trong các trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế từ chối nhận lại số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa;"},{"k":"p","t":"b) Số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa quá thời hạn 10 năm kể từ ngày nộp tiền vào ngân sách nhà nước mà người nộp thuế không bù trừ nghĩa vụ nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt và không đề nghị hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này và các nội dung sau: hồ sơ, thủ tục, thẩm quyền xử lý số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa; thời điểm xác định số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa; trường hợp bù trừ do Hệ thống thông tin quản lý thuế thực hiện tự động và trường hợp bù trừ theo đề nghị của người nộp thuế."}]},{"id":"luat-108_16","no":16,"code":"Điều 16","title":"Điều 16. Xử lý đối với việc chậm nộp tiền thuế, khoản thu khác","shortTitle":"Xử lý đối với việc chậm nộp tiền thuế, khoản thu khác","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Các trường hợp phải nộp tiền chậm nộp bao gồm:"},{"k":"p","t":"a) Người nộp thuế chậm nộp tiền thuế, khoản thu khác so với thời hạn nộp, thời hạn gia hạn nộp quy định tại Điều 14 của Luật này;"},{"k":"p","t":"b) Người nộp thuế khai bổ sung hồ sơ khai thuế, khoản thu khác làm tăng số tiền thuế, khoản thu khác phải nộp hoặc giảm số tiền thuế, khoản thu khác đã được miễn, giảm, hoàn, không thu;"},{"k":"p","t":"c) Cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền kiểm tra, thanh tra phát hiện người nộp thuế khai thiếu số tiền thuế, khoản thu khác phải nộp hoặc phát hiện số tiền thuế, khoản thu khác đã hoàn, đã miễn, đã giảm, đã không thu lớn hơn số tiền thuế, khoản thu khác được hoàn, được miễn, được giảm, không thu;"},{"k":"p","t":"d) Trường hợp được nộp dần tiền thuế nợ quy định tại khoản 6 Điều 48 của Luật này;"},{"k":"p","t":"đ) Trường hợp quy định tại khoản 8 Điều 44 của Luật này;"},{"k":"p","t":"e) Trường hợp không bị xử phạt vi phạm hành chính về quản lý thuế theo quy định tại điểm a khoản 2 Điều 44 đối với hành vi quy định tại khoản 2 Điều 45 của Luật này và trường hợp quy định tại điểm b khoản 2 Điều 44 của Luật này;"},{"k":"p","t":"g) Cơ quan, tổ chức được cơ quan quản lý thuế ủy nhiệm thu thuế, khoản thu khác, cơ quan, tổ chức được giao quản lý các khoản thu thuộc ngân sách nhà nước chậm nộp vào ngân sách nhà nước đối với số tiền đã thu được thì phải nộp tiền chậm nộp đối với số tiền nộp chậm theo quy định;"},{"k":"p","t":"h) Cơ quan, tổ chức thuộc đối tượng khấu trừ thuế, nộp thuế, khoản thu khác thay cho người nộp thuế theo quy định của pháp luật về thuế và quy định khác của pháp luật có liên quan nộp tiền không đầy đủ, không đúng thời hạn theo quy định của pháp luật thì có trách nhiệm nộp tiền chậm nộp theo quy định thay cho người nộp thuế;"},{"k":"p","t":"i) Việc nộp tiền chậm nộp đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế được tổ chức tín dụng bảo lãnh số thuế phải nộp thực hiện theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Mức tính tiền chậm nộp và thời gian tính tiền chậm nộp được quy định như sau:"},{"k":"p","t":"a) Mức tính tiền chậm nộp bằng 0,03%/ngày tính trên số tiền thuế, khoản thu khác chậm nộp do cơ quan thuế quản lý thu và 0,03%/ngày tính trên số tiền thuế chậm nộp do cơ quan hải quan quản lý thu;"},{"k":"p","t":"b) Thời gian tính tiền chậm nộp thực hiện theo quy định của Chính phủ."},{"k":"p","t":"3. Người nộp thuế tự xác định số tiền chậm nộp theo quy định tại khoản 1, khoản 2 Điều này và nộp vào ngân sách nhà nước theo quy định. Sau 30 ngày kể từ ngày người nộp thuế nộp tiền thuế, khoản thu khác, tiền phạt nhưng người nộp thuế chưa xác định số tiền chậm nộp thì cơ quan quản lý thuế xác định số tiền chậm nộp và thông báo cho người nộp thuế."},{"k":"p","t":"4. Trường hợp sau 30 ngày kể từ ngày hết thời hạn nộp thuế, khoản thu khác, người nộp thuế chưa nộp tiền thuế nợ thì cơ quan quản lý thuế thông báo cho người nộp thuế biết số tiền thuế nợ và số ngày chậm nộp."},{"k":"p","t":"5. Người nộp thuế thuộc trường hợp phải nộp tiền chậm nộp quy định tại khoản 1 Điều này được miễn tiền chậm nộp nếu thuộc trường hợp bất khả kháng quy định tại khoản 21 Điều 4 của Luật này."},{"k":"p","t":"6. Chính phủ quy định các nội dung sau: điều chỉnh mức tính tiền chậm nộp quy định tại điểm a khoản 2 Điều này phù hợp với tình hình kinh tế - xã hội trong từng thời kỳ, thời gian tính tiền chậm nộp, các trường hợp không tính tiền chậm nộp, chưa tính tiền chậm nộp và điều chỉnh tiền chậm nộp."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính quy định các nội dung sau: hồ sơ, trình tự, thủ tục, thẩm quyền xử lý đối với việc chậm nộp tiền thuế, khoản thu khác, miễn tiền chậm nộp, không tính tiền chậm nộp quy định tại Điều này."}]},{"id":"luat-108_17","no":17,"code":"Điều 17","title":"Điều 17. Hoàn thành nghĩa vụ nộp thuế","shortTitle":"Hoàn thành nghĩa vụ nộp thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hoàn thành nghĩa vụ nộp thuế trong trường hợp giải thể, phá sản, chấm dứt hoạt động, không hoạt động tại địa chỉ đã đăng ký:"},{"k":"p","t":"a) Việc hoàn thành nghĩa vụ nộp thuế trong trường hợp doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã giải thể được thực hiện theo quy định của pháp luật về doanh nghiệp, pháp luật về các tổ chức tín dụng, pháp luật về kinh doanh bảo hiểm, pháp luật về hợp tác xã và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Việc hoàn thành nghĩa vụ nộp thuế trong trường hợp doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã phá sản được thực hiện theo quy định của pháp luật về phục hồi, phá sản;"},{"k":"p","t":"c) Doanh nghiệp tư nhân, công ty trách nhiệm hữu hạn một thành viên, công ty hợp danh chấm dứt hoạt động, không hoạt động tại địa chỉ đã đăng ký chưa hoàn thành nghĩa vụ nộp thuế thì chủ sở hữu doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên, thành viên hợp danh hoàn thành nghĩa vụ nộp thuế theo quy định của pháp luật về doanh nghiệp; công ty trách nhiệm hữu hạn hai thành viên trở lên, công ty cổ phần chấm dứt hoạt động, không hoạt động tại địa chỉ đã đăng ký chưa hoàn thành nghĩa vụ nộp thuế thì cổ đông góp vốn, thành viên góp vốn chịu trách nhiệm hoàn thành nghĩa vụ nộp thuế theo quy định của pháp luật về doanh nghiệp;"},{"k":"p","t":"d) Hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động, không hoạt động tại địa chỉ đã đăng ký sản xuất, kinh doanh chưa hoàn thành nghĩa vụ nộp thuế thì phần tiền thuế nợ còn lại do chủ hộ kinh doanh, cá nhân chịu trách nhiệm hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"đ) Người nộp thuế có đơn vị phụ thuộc chấm dứt hoạt động, không hoạt động tại địa chỉ đã đăng ký mà chưa hoàn thành nghĩa vụ nộp thuế thì chịu trách nhiệm hoàn thành nghĩa vụ nộp thuế của đơn vị phụ thuộc;"},{"k":"p","t":"e) Chủ sở hữu doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên, thành viên hợp danh, chủ hộ kinh doanh, cá nhân kinh doanh chịu trách nhiệm hoàn thành nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế của doanh nghiệp tư nhân, công ty trách nhiệm hữu hạn một thành viên, công ty hợp danh, hộ kinh doanh, cá nhân kinh doanh không hoạt động tại địa chỉ đã đăng ký."},{"k":"p","t":"2. Hoàn thành nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế trong trường hợp tổ chức lại doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã:"},{"k":"p","t":"a) Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã bị chia có trách nhiệm hoàn thành nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế trước khi thực hiện chia doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã. Trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì các doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã mới được thành lập từ doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã bị chia có trách nhiệm kế thừa quyền lợi và hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"b) Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã bị tách, bị hợp nhất, bị sáp nhập có trách nhiệm hoàn thành nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế trước khi tách, hợp nhất, sáp nhập. Trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã bị tách và doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được tách; doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã hợp nhất; doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã nhận sáp nhập có trách nhiệm kế thừa quyền lợi và hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"c) Doanh nghiệp được chuyển đổi loại hình doanh nghiệp có trách nhiệm hoàn thành nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế trước khi chuyển đổi. Trường hợp chưa hoàn thành nghĩa vụ nộp thuế thì doanh nghiệp sau chuyển đổi có trách nhiệm kế thừa quyền lợi và hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"d) Việc tổ chức lại doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã không làm thay đổi thời hạn nộp thuế và khoản thu khác của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được tổ chức lại. Trường hợp doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được tổ chức lại hoặc các doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thành lập mới không nộp thuế và khoản thu khác đầy đủ theo thời hạn nộp thuế và khoản thu khác đã quy định thì bị xử phạt theo quy định của pháp luật."},{"k":"p","t":"3. Hoàn thành nghĩa vụ nộp thuế trong trường hợp người nộp thuế là người đã chết, người bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự:"},{"k":"p","t":"a) Người được thừa kế hoặc người được giao quản lý di sản thực hiện hoàn thành nghĩa vụ nộp thuế của người đã chết, người bị Tòa án tuyên bố là đã chết trong phần di sản của người đã chết, người bị Tòa án tuyên bố là đã chết để lại hoặc phần tài sản người thừa kế được chia tại thời điểm nhận thừa kế. Trong trường hợp không có người thừa kế hoặc tất cả những người thừa kế từ chối nhận di sản thừa kế thì việc hoàn thành nghĩa vụ nộp thuế của người đã chết, người bị Tòa án tuyên bố là đã chết thực hiện theo quy định của pháp luật về dân sự;"},{"k":"p","t":"b) Người quản lý tài sản của người mất năng lực hành vi dân sự thực hiện  hoàn thành nghĩa vụ nộp thuế của người bị Tòa án tuyên bố mất năng lực hành vi dân sự trong phần tài sản của người đó;"},{"k":"p","t":"c) Trường hợp Tòa án ra quyết định hủy bỏ quyết định tuyên bố một người là đã chết hoặc mất năng lực hành vi dân sự thì số tiền thuế nợ đã xóa theo quy định tại Điều 21 của Luật này được phục hồi lại, nhưng không bị tính tiền chậm nộp cho thời gian bị tuyên bố là đã chết hoặc mất năng lực hành vi dân sự;"},{"k":"p","t":"d) Người quản lý tài sản của người bị tuyên bố mất tích thực hiện hoàn thành nghĩa vụ nộp thuế của người bị Tòa án tuyên bố mất tích bằng tài sản của người đó theo quyết định của Tòa án."},{"k":"p","t":"4. Người nộp thuế có trách nhiệm hoàn thành nghĩa vụ nộp thuế trong trường hợp thay đổi địa chỉ trụ sở dẫn đến thay đổi cơ quan thuế quản lý, trừ trường hợp do thay đổi địa giới hành chính theo quy định của pháp luật."},{"k":"p","t":"5. Các trường hợp phải hoàn thành nghĩa vụ nộp thuế trước khi xuất cảnh bao gồm:"},{"k":"p","t":"a) Cá nhân kinh doanh, chủ hộ kinh doanh, cá nhân là chủ sở hữu hưởng lợi của doanh nghiệp, cá nhân là người đại diện theo pháp luật của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thuộc trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế chưa hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"b) Cá nhân kinh doanh, chủ hộ kinh doanh, cá nhân là chủ sở hữu hưởng lợi của doanh nghiệp, cá nhân là người đại diện theo pháp luật của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã không còn hoạt động tại địa chỉ đã đăng ký chưa hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"c) Cá nhân là người Việt Nam xuất cảnh để định cư ở nước ngoài, người Việt Nam định cư ở nước ngoài, người nước ngoài chưa hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"Chính phủ quy định số tiền thuế nợ và thời gian nợ theo ngưỡng để áp dụng biện pháp tạm hoãn xuất cảnh theo quy định của pháp luật về xuất cảnh, nhập cảnh."},{"k":"p","t":"6. Hoàn thành nghĩa vụ nộp thuế trong trường hợp chuyển nhượng dự án đầu tư, chuyển nhượng vốn:"},{"k":"p","t":"a) Tổ chức được thành lập theo quy định của pháp luật Việt Nam, cá nhân cư trú tại Việt Nam thực hiện chuyển nhượng dự án đầu tư, chuyển nhượng vốn có trách nhiệm hoàn thành nghĩa vụ nộp thuế phát sinh từ hoạt động chuyển nhượng dự án đầu tư, chuyển nhượng vốn theo quy định của pháp luật về thuế;"},{"k":"p","t":"b) Tổ chức được thành lập theo quy định của pháp luật nước ngoài, cá nhân nước ngoài không cư trú tại Việt Nam chuyển nhượng dự án đầu tư, chuyển nhượng vốn trực tiếp hoặc gián tiếp cho tổ chức được thành lập theo quy định của pháp luật Việt Nam, cá nhân cư trú tại Việt Nam thì bên nhận chuyển nhượng có trách nhiệm xác định, kê khai, khấu trừ và nộp thay số thuế phải nộp của bên chuyển nhượng. Trường hợp cả bên chuyển nhượng và bên nhận chuyển nhượng đều là tổ chức được thành lập theo quy định của pháp luật nước ngoài, cá nhân nước ngoài không cư trú tại Việt Nam thì tổ chức được thành lập theo quy định của pháp luật Việt Nam nơi bên chuyển nhượng vốn đầu tư trực tiếp hoặc gián tiếp có trách nhiệm kê khai và nộp thay số thuế phải nộp của bên chuyển nhượng theo quy định của pháp luật về thuế."},{"k":"p","t":"7. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"HOÀN THUẾ, KHOẢN THU KHÁC, TIỀN CHẬM NỘP, TIỀN PHẠT; MIỄN THUẾ, KHOẢN THU KHÁC; GIẢM THUẾ, KHOẢN THU KHÁC; KHÔNG THU THUẾ; KHÔNG CHỊU THUẾ"}]},{"id":"luat-108_18","no":18,"code":"Điều 18","title":"Điều 18. Hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt","shortTitle":"Hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Các trường hợp hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a) Hoàn thuế đối với tổ chức, cá nhân thuộc trường hợp hoàn thuế theo quy định của pháp luật về thuế;"},{"k":"p","t":"b) Hoàn trả tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa đối với tổ chức, cá nhân thuộc trường hợp hoàn trả theo quy định tại Điều 15 của Luật này;"},{"k":"p","t":"c) Hoàn trả cho cá nhân thuộc trường hợp hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo quy định tại điểm a và điểm b khoản này là người đã chết, người bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự thì người được thừa kế hoặc người được Tòa án giao quản lý tài sản của người đã chết, người bị tuyên bố là đã chết, mất tích, mất năng lực hành vi dân sự được nhận tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt được hoàn theo quy định của pháp luật về dân sự."},{"k":"p","t":"2. Người nộp thuế thuộc trường hợp được hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo quy định tại khoản 1 Điều này (sau đây gọi là hoàn thuế) lập và gửi hồ sơ hoàn thuế cho cơ quan quản lý thuế có thẩm quyền."},{"k":"p","t":"3. Cơ quan quản lý thuế phân loại hồ sơ hoàn thuế hoặc số tiền hoàn thuế để hoàn thuế trước cho người nộp thuế hoặc kiểm tra trước hoàn thuế. Quy định tại khoản này không áp dụng đối với trường hợp xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa của hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"4. Cơ quan thuế triển khai việc hoàn thuế tự động trên cơ sở dữ liệu, tiêu chí quản lý rủi ro, quy trình xử lý tự động và bảo đảm an toàn thông tin. Cơ quan thuế có trách nhiệm triển khai việc hoàn thuế tự động theo từng giai đoạn, phù hợp với điều kiện thực tế, điều kiện về hạ tầng và ứng dụng công nghệ thông tin."},{"k":"p","t":"5. Thẩm quyền quyết định hoàn thuế, thu hồi hoàn thuế:"},{"k":"p","t":"a) Thủ trưởng cơ quan quản lý thuế quyết định việc hoàn thuế, trừ trường hợp quy định tại điểm b khoản này;"},{"k":"p","t":"b) Cơ quan thuế quyết định việc hoàn thuế đối với trường hợp hoàn thuế tự động quy định tại khoản 4 Điều này;"},{"k":"p","t":"c) Thủ trưởng cơ quan quản lý thuế quyết định việc thu hồi hoàn thuế đối với trường hợp đã hoàn thuế quy định tại khoản 1 và khoản 4 Điều này."},{"k":"p","t":"6. Chính phủ quy định chi tiết khoản 1 Điều này và các nội dung sau: trường hợp không hoàn thuế; trường hợp hoàn thuế trước cho người nộp thuế; trường hợp kiểm tra trước hoàn thuế; thời hạn tiếp nhận, giải quyết và phản hồi thông tin hồ sơ hoàn thuế của cơ quan quản lý thuế."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính quy định chi tiết các khoản 2, 3, 4 và 5 Điều này và các nội dung sau: trình tự, thủ tục hoàn thuế; trình tự, thủ tục thu hồi hoàn thuế; trách nhiệm tiếp nhận, giải quyết và phản hồi thông tin hồ sơ hoàn thuế của cơ quan quản lý thuế; bù trừ nợ qua hoàn thuế."}]},{"id":"luat-108_19","no":19,"code":"Điều 19","title":"Điều 19. Miễn thuế, khoản thu khác; giảm thuế, khoản thu khác; không thu thuế; không chịu thuế","shortTitle":"Miễn thuế, khoản thu khác; giảm thuế, khoản thu khác; không thu thuế; không chịu thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Các trường hợp miễn thuế, khoản thu khác; giảm thuế, khoản thu khác; không thu thuế; không chịu thuế:"},{"k":"p","t":"a) Miễn thuế, khoản thu khác; giảm thuế, khoản thu khác; không thu thuế; không chịu thuế đối với tổ chức, cá nhân theo quy định của pháp luật về thuế, pháp luật về phí và lệ phí;"},{"k":"p","t":"b) Miễn thuế sử dụng đất phi nông nghiệp đối với hộ gia đình, cá nhân có số tiền thuế phải nộp hằng năm theo mức quy định của Chính phủ; miễn thuế thu nhập cá nhân đối với cá nhân có số tiền thuế phát sinh phải nộp sau quyết toán thuế thu nhập cá nhân từ tiền lương, tiền công hằng năm và các loại thuế khác theo mức quy định của Chính phủ."},{"k":"p","t":"2. Người nộp thuế thuộc trường hợp được miễn thuế, khoản thu khác, giảm thuế, khoản thu khác theo quy định tại khoản 1 Điều này (sau đây gọi là miễn thuế, giảm thuế), không thu thuế, không chịu thuế lập và gửi hồ sơ cho cơ quan quản lý thuế có thẩm quyền."},{"k":"p","t":"3. Cơ quan thuế triển khai việc miễn thuế, giảm thuế tự động cho người nộp thuế trên cơ sở dữ liệu, tiêu chí quản lý rủi ro, quy trình xử lý tự động và bảo đảm an toàn thông tin. Cơ quan thuế có trách nhiệm triển khai việc miễn thuế, giảm thuế tự động theo từng giai đoạn, phù hợp với điều kiện thực tế, điều kiện về hạ tầng và ứng dụng công nghệ thông tin."},{"k":"p","t":"4. Thẩm quyền quyết định miễn thuế, giảm thuế, không thu thuế, không chịu thuế:"},{"k":"p","t":"a) Thủ trưởng cơ quan quản lý thuế quyết định việc miễn thuế, giảm thuế, không thu thuế, không chịu thuế, trừ trường hợp quy định tại điểm b khoản này;"},{"k":"p","t":"b) Cơ quan thuế quyết định việc miễn thuế, giảm thuế đối với trường hợp miễn thuế, giảm thuế tự động quy định tại khoản 3 Điều này;"},{"k":"p","t":"c) Thủ trưởng cơ quan quản lý thuế quyết định việc thu hồi tiền miễn thuế, thu hồi tiền giảm thuế đối với trường hợp đã miễn thuế, giảm thuế quy định tại khoản 1 và khoản 3 Điều này."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 1 Điều này và các nội dung sau: thời hạn tiếp nhận, giải quyết hồ sơ miễn thuế, giảm thuế, không thu thuế, không chịu thuế."},{"k":"p","t":"6. Bộ trưởng Bộ Tài chính quy định chi tiết các khoản 2, 3, 4 Điều này và các nội dung sau: hồ sơ miễn thuế, giảm thuế, không thu thuế, không chịu thuế; trách nhiệm tiếp nhận, giải quyết và phản hồi thông tin hồ sơ miễn thuế, giảm thuế, không thu thuế của cơ quan quản lý thuế; trình tự, thủ tục giải quyết miễn thuế, giảm thuế, không thu thuế, thu hồi tiền miễn thuế, thu hồi tiền giảm thuế."},{"k":"p","t":"KHOANH TIỀN THUẾ NỢ, XÓA TIỀN THUẾ NỢ"}]},{"id":"luat-108_20","no":20,"code":"Điều 20","title":"Điều 20. Khoanh tiền thuế nợ","shortTitle":"Khoanh tiền thuế nợ","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Các trường hợp được khoanh tiền thuế nợ:"},{"k":"p","t":"a) Người nộp thuế là người đã chết, người bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự;"},{"k":"p","t":"b) Người nộp thuế có quyết định giải thể gửi cơ quan đăng ký kinh doanh để làm thủ tục giải thể, cơ quan đăng ký kinh doanh đã thông báo người nộp thuế đang làm thủ tục giải thể trên hệ thống thông tin quốc gia về đăng ký kinh doanh nhưng người nộp thuế chưa hoàn thành thủ tục giải thể;"},{"k":"p","t":"c) Người nộp thuế đã được Tòa án thông báo thụ lý đơn yêu cầu áp dụng thủ tục phá sản hoặc được khoanh tiền thuế nợ theo văn bản đề nghị của Tòa án theo quy định của pháp luật về phục hồi, phá sản;"},{"k":"p","t":"d) Người nộp thuế không còn hoạt động tại địa chỉ đã đăng ký kinh doanh với cơ quan đăng ký kinh doanh, cơ quan quản lý thuế;"},{"k":"p","t":"đ) Người nộp thuế đã bị cơ quan có thẩm quyền thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc giấy phép hoạt động kinh doanh nền tảng thương mại điện tử;"},{"k":"p","t":"e) Người nộp thuế bị hạn chế trên thực tế quyền khai thác, sử dụng về đất đai, khoáng sản được cấp, được giao do nguyên nhân từ cơ quan nhà nước có thẩm quyền dẫn đến nợ nghĩa vụ tài chính về đất, khoáng sản."},{"k":"p","t":"2. Thủ trưởng cơ quan quản lý thuế quyết định việc khoanh tiền thuế nợ, chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ."},{"k":"p","t":"3. Cơ quan quản lý thuế theo dõi các khoản tiền thuế nợ được khoanh, thực hiện các biện pháp nghiệp vụ để đôn đốc thu hồi tiền thuế nợ."},{"k":"p","t":"4. Người nộp thuế tạm thời chưa bị tính tiền chậm nộp trong thời gian khoanh tiền thuế nợ. Sau khi chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ, cơ quan quản lý thuế thực hiện tính đủ tiền chậm nộp kể từ thời điểm hết hạn nộp thuế theo quy định, trừ trường hợp quy định tại điểm e khoản 1 Điều này."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này và các nội dung sau: thời gian, số tiền thuế nợ được khoanh; các trường hợp chấm dứt hiệu lực của quyết định khoanh nợ; trách nhiệm của cơ quan nhà nước, cách thức, tiêu chí xác định trường hợp quy định tại điểm e khoản 1 Điều này."},{"k":"p","t":"6. Bộ trưởng Bộ Tài chính quy định thủ tục, hồ sơ khoanh tiền thuế nợ."}]},{"id":"luat-108_21","no":21,"code":"Điều 21","title":"Điều 21. Xoá tiền thuế nợ","shortTitle":"Xoá tiền thuế nợ","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Các trường hợp được xóa tiền thuế nợ:"},{"k":"p","t":"a) Cá nhân đã chết, cá nhân bị Tòa án tuyên bố là đã chết hoặc mất năng lực hành vi dân sự mà cá nhân đó không có tài sản, bao gồm cả tài sản được thừa kế;"},{"k":"p","t":"b) Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã bị Tòa án tuyên bố phá sản và đã thực hiện thanh toán các khoản nợ theo quy định của pháp luật về phục hồi, phá sản mà không còn tài sản;"},{"k":"p","t":"c) Người nộp thuế không thuộc trường hợp quy định tại điểm a và điểm b khoản này mà cơ quan quản lý thuế đã áp dụng biện pháp cưỡng chế quy định tại điểm h khoản 1 Điều 49 của Luật này và khoản tiền thuế nợ này đã quá 10 năm kể từ ngày hết thời hạn nộp nhưng không có khả năng thu hồi;"},{"k":"p","t":"d) Các trường hợp bị ảnh hưởng do thiên tai, thảm họa, dịch bệnh có phạm vi rộng đã được xem xét miễn tiền chậm nộp theo quy định tại khoản 5 Điều 16 của Luật này và đã được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo quy định tại điểm a khoản 7 Điều 14 của Luật này nhưng vẫn không có khả năng phục hồi sản xuất, kinh doanh và không có khả năng nộp tiền thuế nợ."},{"k":"p","t":"2. Người nộp thuế là cá nhân, cá nhân kinh doanh, chủ hộ kinh doanh, chủ hộ gia đình, chủ doanh nghiệp tư nhân và công ty trách nhiệm hữu hạn một thành viên đã được xóa tiền thuế nợ quy định tại điểm c khoản 1 Điều này trước khi quay lại sản xuất, kinh doanh hoặc thành lập cơ sở sản xuất, kinh doanh mới thì phải hoàn trả cho Nhà nước khoản tiền thuế nợ đã được xóa."},{"k":"p","t":"3. Chủ tịch Ủy ban nhân dân cấp tỉnh báo cáo Hội đồng nhân dân cùng cấp kết quả xóa tiền thuế nợ trên địa bàn. Bộ Tài chính báo cáo Chính phủ kết quả xóa tiền thuế nợ để báo cáo Quốc hội khi quyết toán ngân sách nhà nước."},{"k":"p","t":"4. Chính phủ quy định chi tiết điểm d khoản 1 Điều này và các nội dung sau: điều kiện xóa tiền thuế nợ; thẩm quyền xóa tiền thuế nợ; thời hạn giải quyết hồ sơ xóa tiền thuế nợ; trách nhiệm phối hợp của các tổ chức, cá nhân trong việc thu hồi tiền thuế nợ đã được xóa."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định hồ sơ, trình tự, thủ tục xóa tiền thuế nợ và trường hợp quy định tại các điểm a, b, c khoản 1 và khoản 2 Điều này."},{"k":"p","t":"KIỂM TRA THUẾ"}]},{"id":"luat-108_22","no":22,"code":"Điều 22","title":"Điều 22. Kiểm tra thuế","shortTitle":"Kiểm tra thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kiểm tra thuế:"},{"k":"p","t":"a) Áp dụng quản lý rủi ro và ứng dụng công nghệ thông tin trong kiểm tra thuế; ưu tiên kiểm tra trực tuyến, từ xa trên dữ liệu điện tử;"},{"k":"p","t":"b) Tuân thủ quy định của pháp luật và không cản trở hoạt động bình thường của người nộp thuế;"},{"k":"p","t":"c) Việc kiểm tra thuế nhằm đánh giá tính đầy đủ, chính xác, trung thực của việc kê khai, nộp thuế và việc tuân thủ pháp luật về thuế của người nộp thuế;"},{"k":"p","t":"d) Việc kiểm tra thuế của cơ quan thuế không trùng lặp về nội dung, phạm vi, thời gian giữa cơ quan thanh tra, kiểm tra, Kiểm toán nhà nước, trừ trường hợp có bằng chứng, căn cứ vi phạm cần kiểm tra lại;"},{"k":"p","t":"đ) Kiểm tra việc xác định giá giao dịch liên kết của người nộp thuế theo nguyên tắc giao dịch độc lập và bản chất kinh tế của hoạt động, giao dịch phát sinh quyết định nghĩa vụ thuế tương ứng với giá trị tạo ra từ bản chất kinh tế của hoạt động kinh doanh, giao dịch phát sinh của người nộp thuế; không công nhận các giao dịch liên kết không theo nguyên tắc giao dịch độc lập làm giảm nghĩa vụ thuế của doanh nghiệp."},{"k":"p","t":"2. Kiểm tra thuế tại trụ sở của cơ quan quản lý thuế:"},{"k":"p","t":"a) Việc kiểm tra thuế tại trụ sở của cơ quan quản lý thuế được thực hiện trên cơ sở hồ sơ thuế, cơ sở dữ liệu quản lý thuế có trên Hệ thống thông tin quản lý thuế; cơ quan hải quan kiểm tra thực tế hàng hóa xuất khẩu, hàng hóa nhập khẩu trong trường hợp cần thiết và còn đủ điều kiện;"},{"k":"p","t":"b) Cơ quan quản lý thuế có quyền yêu cầu người nộp thuế giải trình, bổ sung thông tin, tài liệu; ban hành quyết định ấn định thuế, xử lý vi phạm hành chính về quản lý thuế hoặc chuyển sang kiểm tra tại trụ sở người nộp thuế;"},{"k":"p","t":"c) Trường hợp kiểm tra sau thông quan thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"3. Kiểm tra thuế tại trụ sở của người nộp thuế:"},{"k":"p","t":"a) Cơ quan thuế kiểm tra thuế trong các trường hợp sau: trường hợp hồ sơ thuộc diện kiểm tra trước hoàn thuế; trường hợp hồ sơ thuộc diện kiểm tra sau hoàn thuế đối với hồ sơ thuộc diện hoàn thuế trước theo nguyên tắc quản lý rủi ro trong quản lý thuế và trong thời hạn 05 năm kể từ ngày ban hành quyết định hoàn thuế; trường hợp có dấu hiệu vi phạm pháp luật trong lĩnh vực thuế; trường hợp được lựa chọn theo kế hoạch, chuyên đề; trường hợp theo yêu cầu, đề nghị của cơ quan, người có thẩm quyền; người nộp thuế có rủi ro cao thuộc trường hợp: chia, tách, sáp nhập, hợp nhất, chuyển đổi loại hình doanh nghiệp, phá sản, giải thể, chấm dứt hoạt động, cổ phần hóa, chấm dứt hiệu lực mã số thuế, chuyển địa điểm kinh doanh; trường hợp quy định tại điểm b khoản 2 Điều này; trường hợp kiểm tra theo yêu cầu của việc giải quyết khiếu nại, tố cáo về thuế; trường hợp hồ sơ miễn thuế, giảm thuế, không thu thuế của người nộp thuế có rủi ro cao;"},{"k":"p","t":"b) Cơ quan hải quan kiểm tra thuế tại trụ sở người nộp thuế trong các trường hợp quy định tại điểm a khoản này; kiểm tra sau thông quan thực hiện theo quy định của pháp luật về hải quan; kiểm tra các điều kiện áp dụng chính sách thuế theo quy định của pháp luật có liên quan."},{"k":"p","t":"Trong quá trình kiểm tra, cơ quan hải quan thực hiện kiểm tra thực tế đối với hàng hóa xuất khẩu, hàng hóa nhập khẩu trong trường hợp cần thiết và còn đủ điều kiện;"},{"k":"p","t":"c) Đối với các trường hợp được lựa chọn theo kế hoạch, chuyên đề và các trường hợp chia, tách, sáp nhập, hợp nhất, chuyển đổi loại hình doanh nghiệp, phá sản, giải thể, chấm dứt hoạt động, cổ phần hóa, chấm dứt hiệu lực mã số thuế, chuyển địa điểm kinh doanh cơ quan thuế thực hiện kiểm tra tại trụ sở của người nộp thuế không quá 01 lần trong 01 năm. Quy định này không áp dụng đối với các trường hợp kiểm tra lại quy định tại điểm a khoản 6 Điều này;"},{"k":"p","t":"d) Thời hạn kiểm tra thuế không quá 20 ngày, kể từ ngày công bố quyết định kiểm tra, trường hợp cần thiết thì có thể gia hạn 01 lần nhưng không quá 20 ngày. Thời hạn kiểm tra thuế đối với doanh nghiệp có giao dịch liên kết không quá 40 ngày, trường hợp cần thiết thì có thể gia hạn 01 lần nhưng không quá 40 ngày. Trường hợp cần thu thập, trao đổi thông tin với cơ quan thuế nước ngoài thì thời hạn kiểm tra thuế có thể kéo dài nhưng không quá 02 năm."},{"k":"p","t":"Thời hạn kiểm tra quy định tại điểm này không bao gồm thời gian tạm dừng kiểm tra theo thông báo của cơ quan quản lý thuế."},{"k":"p","t":"4. Quyền, nghĩa vụ của người nộp thuế trong kiểm tra thuế:"},{"k":"p","t":"a) Quyền của người nộp thuế trong kiểm tra thuế được thực hiện theo quy định tại điểm e và điểm r khoản 1 Điều 37 của Luật này và quy định của pháp luật về kiểm tra chuyên ngành;"},{"k":"p","t":"b) Nghĩa vụ của người nộp thuế trong kiểm tra thuế được thực hiện theo quy định tại điểm p khoản 2 Điều 37 của Luật này và quy định của pháp luật về kiểm tra chuyên ngành."},{"k":"p","t":"5. Nhiệm vụ và quyền hạn của cơ quan quản lý thuế trong kiểm tra thuế:"},{"k":"p","t":"a) Thủ trưởng cơ quan quản lý thuế các cấp có nhiệm vụ và quyền hạn sau:  ban hành quyết định kiểm tra; điều chỉnh quyết định kiểm tra; bãi bỏ quyết định kiểm tra; chỉ đạo đoàn kiểm tra thực hiện đúng nội dung, thời hạn ghi trong quyết định kiểm tra thuế; áp dụng biện pháp quy định tại Điều 23 của Luật này; tạm dừng, tạm hoãn, gia hạn thời hạn kiểm tra; quyết định về xử lý vi phạm hành chính về quản lý thuế theo thẩm quyền hoặc kết luận kiểm tra hoặc thông báo kết quả kiểm tra hoặc kiến nghị người có thẩm quyền kết luận, ban hành các quyết định về xử lý vi phạm hành chính về quản lý thuế; chuyển hồ sơ sang cơ quan thanh tra để tiến hành thanh tra đối với vụ việc phức tạp, phạm vi rộng hoặc chuyển hồ sơ kiểm tra sang cơ quan điều tra theo quy định của pháp luật đối với trường hợp qua kiểm tra thuế mà phát hiện hành vi vi phạm trong lĩnh vực thuế có dấu hiệu trốn thuế, gian lận về thuế đến mức phải truy cứu trách nhiệm hình sự; giải quyết khiếu nại, tố cáo theo thẩm quyền;"},{"k":"p","t":"b) Trưởng đoàn kiểm tra có nhiệm vụ, quyền hạn sau: tổ chức, chỉ đạo các thành viên đoàn kiểm tra thực hiện đúng nội dung quyết định kiểm tra; yêu cầu người nộp thuế cung cấp thông tin, tài liệu, giải trình về vấn đề liên quan đến nội dung kiểm tra thuế; áp dụng biện pháp quy định tại khoản 2 Điều 23 của Luật này; quyết định việc niêm phong tài liệu, hàng hóa (nếu có) của đối tượng kiểm tra khi có căn cứ cho rằng có vi phạm pháp luật trong lĩnh vực thuế; lập biên bản kiểm tra thuế, biên bản kiểm tra thuế xác định rõ hành vi vi phạm hành chính thì biên bản kiểm tra thuế của cơ quan thuế được xác định là biên bản vi phạm hành chính; báo cáo người ra quyết định kiểm tra về kết quả kiểm tra;"},{"k":"p","t":"c) Thành viên đoàn kiểm tra khi thực hiện kiểm tra thuế có nhiệm vụ, quyền hạn sau: thực hiện nhiệm vụ theo sự phân công của trưởng đoàn kiểm tra thuế; yêu cầu người nộp thuế cung cấp thông tin, tài liệu, giải trình về vấn đề liên quan đến nội dung kiểm tra thuế được trưởng đoàn phân công thực hiện kiểm tra; báo cáo kết quả thực hiện nhiệm vụ được giao với trưởng đoàn kiểm tra thuế."},{"k":"p","t":"6. Kiểm tra lại trong hoạt động kiểm tra thuế:"},{"k":"p","t":"a) Các trường hợp kiểm tra lại:"},{"k":"p","t":"Cơ quan thuế thực hiện kiểm tra lại đối với các vụ việc đã được kết luận, ban hành quyết định về xử lý vi phạm hành chính về quản lý thuế trong các trường hợp sau: ban hành quyết định kiểm tra trái thẩm quyền; có vi phạm về trình tự, thủ tục trong quá trình tiến hành kiểm tra dẫn đến sai lệch về nội dung của kết luận kiểm tra, quyết định về xử lý vi phạm hành chính về quản lý thuế; có sai lầm trong việc áp dụng pháp luật khi xử lý vi phạm hành chính về quản lý thuế, kết luận kiểm tra; nội dung kết luận, xử lý vi phạm hành chính về quản lý thuế không phù hợp với những chứng cứ thu thập được trong quá trình kiểm tra; người ra quyết định kiểm tra, trưởng đoàn kiểm tra, thành viên đoàn kiểm tra cố ý làm sai lệch hồ sơ vụ việc hoặc cố ý kết luận, xử lý vi phạm hành chính về quản lý thuế trái pháp luật; có dấu hiệu vi phạm pháp luật nghiêm trọng trong lĩnh vực thuế của người nộp thuế thuộc phạm vi quyết định kiểm tra thuế chưa được phát hiện đầy đủ qua kiểm tra thuế."},{"k":"p","t":"Cơ quan hải quan thực hiện kiểm tra lại đối với các trường hợp có dấu hiệu vi phạm pháp luật về thuế của người nộp thuế thuộc phạm vi quyết định kiểm tra thuế nhưng chưa được kiểm tra, phát hiện, chưa được kết luận hoặc đã kết luận nhưng chưa đầy đủ, chính xác;"},{"k":"p","t":"b) Thẩm quyền kiểm tra lại: cơ quan quản lý thuế cấp trên thực hiện kiểm tra lại vụ việc của cơ quan quản lý thuế cấp dưới;"},{"k":"p","t":"c) Thời hạn kiểm tra lại thực hiện theo quy định tại điểm d khoản 3 Điều này;"},{"k":"p","t":"d) Thời hiệu kiểm tra lại là 02 năm kể từ ngày ký kết luận kiểm tra, quyết định về xử lý vi phạm hành chính về quản lý thuế;"},{"k":"p","t":"đ) Khi tiến hành kiểm tra lại, người ra quyết định kiểm tra, trưởng đoàn kiểm tra, thành viên đoàn kiểm tra thực hiện nhiệm vụ, quyền hạn theo quy định tại khoản 5 Điều này."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"luat-108_23","no":23,"code":"Điều 23","title":"Điều 23. Biện pháp áp dụng trong kiểm tra thuế đối với trường hợp có dấu hiệu trốn thuế","shortTitle":"Biện pháp áp dụng trong kiểm tra thuế đối với trường hợp có dấu hiệu trốn thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Thu thập thông tin liên quan đến trường hợp có dấu hiệu trốn thuế:"},{"k":"p","t":"a) Thủ trưởng cơ quan quản lý thuế có quyền yêu cầu cơ quan, tổ chức, cá nhân liên quan đến trường hợp có dấu hiệu trốn thuế cung cấp thông tin bằng văn bản hoặc trả lời trực tiếp. Cơ quan thuế có quyền truy cập vào dữ liệu phần mềm kế toán, hoá đơn điện tử, máy tính tiền của người nộp thuế có dấu hiệu trốn thuế;"},{"k":"p","t":"b) Cơ quan, tổ chức, cá nhân được yêu cầu cung cấp thông tin quy định tại điểm a khoản này có trách nhiệm cung cấp thông tin đúng nội dung, thời hạn, địa chỉ được yêu cầu và chịu trách nhiệm về tính chính xác, trung thực của thông tin đã cung cấp."},{"k":"p","t":"2. Tạm giữ tài liệu liên quan đến trường hợp có dấu hiệu trốn thuế:"},{"k":"p","t":"a) Thủ trưởng cơ quan quản lý thuế, trưởng đoàn kiểm tra thuế quyết định tạm giữ tài liệu liên quan đến trường hợp có dấu hiệu trốn thuế;"},{"k":"p","t":"b) Việc tạm giữ tài liệu liên quan đến trường hợp có dấu hiệu trốn thuế được áp dụng khi cần căn cứ xác định hành vi trốn thuế;"},{"k":"p","t":"c) Khi tạm giữ tài liệu liên quan đến trường hợp có dấu hiệu trốn thuế, trưởng đoàn kiểm tra thuế phải lập biên bản tạm giữ và có trách nhiệm bảo quản tài liệu tạm giữ;"},{"k":"p","t":"d) Cơ quan quản lý thuế phải giao 01 bản quyết định tạm giữ, biên bản tạm giữ liên quan đến trường hợp có dấu hiệu trốn thuế cho tổ chức, cá nhân có tài liệu bị tạm giữ."},{"k":"p","t":"ẤN ĐỊNH THUẾ"}]},{"id":"luat-108_24","no":24,"code":"Điều 24","title":"Điều 24. Ấn định thuế","shortTitle":"Ấn định thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 7","level":1,"content":[{"k":"p","t":"1. Nguyên tắc ấn định thuế:"},{"k":"p","t":"a) Ấn định thuế phải dựa trên các nguyên tắc quản lý thuế, căn cứ tính, phương pháp tính thuế theo quy định của pháp luật về thuế, pháp luật về hải quan;"},{"k":"p","t":"b) Cơ quan quản lý thuế ấn định số tiền thuế phải nộp hoặc ấn định từng yếu tố, căn cứ tính thuế để xác định số tiền thuế phải nộp."},{"k":"p","t":"2. Các trường hợp ấn định thuế của cơ quan thuế:"},{"k":"p","t":"a) Không đăng ký thuế; không khai thuế; không nộp bổ sung hồ sơ thuế theo yêu cầu của cơ quan thuế hoặc khai thuế không đầy đủ, trung thực, chính xác về căn cứ tính thuế;"},{"k":"p","t":"b) Hồ sơ khai thuế đã nộp nhưng không xác định được các yếu tố làm cơ sở xác định căn cứ tính thuế hoặc có xác định được các yếu tố làm cơ sở xác định căn cứ tính thuế nhưng không tự tính được số tiền thuế phải nộp;"},{"k":"p","t":"c) Không phản ánh hoặc phản ánh không đầy đủ, trung thực, chính xác số liệu trên sổ kế toán để xác định nghĩa vụ nộp thuế;"},{"k":"p","t":"d) Không xuất trình sổ kế toán, hóa đơn, chứng từ và các tài liệu cần thiết liên quan đến việc xác định số tiền thuế phải nộp trong thời hạn quy định;"},{"k":"p","t":"đ) Không chấp hành quyết định kiểm tra thuế theo quy định;"},{"k":"p","t":"e) Mua, bán, trao đổi và hạch toán, kê khai thuế theo giá trị hàng hóa, dịch vụ không đúng với giá thực tế thanh toán hoặc không theo giá trị giao dịch thông thường trên thị trường làm giảm nghĩa vụ nộp thuế;"},{"k":"p","t":"g) Mua, trao đổi hàng hóa sử dụng hóa đơn, chứng từ không hợp pháp, sử dụng không hợp pháp hóa đơn, chứng từ mà hàng hóa, dịch vụ là có thật theo xác định của cơ quan có thẩm quyền và đã được kê khai doanh thu tính thuế;"},{"k":"p","t":"h) Sử dụng chứng từ, tài liệu không phản ánh đúng bản chất giao dịch hoặc giá trị giao dịch thực tế để làm giảm nghĩa vụ thuế. Thực hiện các giao dịch không đúng với bản chất kinh tế nhằm mục đích giảm nghĩa vụ thuế;"},{"k":"p","t":"i) Không tuân thủ quy định về nghĩa vụ kê khai, xác định giá giao dịch liên kết hoặc không cung cấp thông tin theo quy định về quản lý thuế đối với doanh nghiệp có phát sinh giao dịch liên kết."},{"k":"p","t":"3. Chính phủ quy định các nội dung sau: căn cứ ấn định thuế; phương pháp ấn định thuế; thẩm quyền, thủ tục ấn định thuế; trách nhiệm của người nộp thuế, người khai thuế,  cơ quan thuế trong việc ấn định thuế."}]},{"id":"luat-108_25","no":25,"code":"Điều 25","title":"Điều 25. Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu","chu
