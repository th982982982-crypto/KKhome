ong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 7","level":1,"content":[{"k":"p","t":"1. Các trường hợp ấn định thuế của cơ quan hải quan đối với hàng hóa xuất khẩu, nhập khẩu:"},{"k":"p","t":"a) Người nộp thuế dựa vào các chứng từ, tài liệu, dữ liệu không hợp pháp để khai thuế, tính thuế; không khai thuế hoặc kê khai không chính xác, không đầy đủ, không trung thực nội dung liên quan đến xác định nghĩa vụ thuế;"},{"k":"p","t":"b) Quá thời hạn theo quy định của pháp luật về hải quan, quy định khác của pháp luật có liên quan hoặc yêu cầu bằng văn bản của cơ quan hải quan mà người nộp thuế không cung cấp, từ chối hoặc trì hoãn, kéo dài việc cung cấp hồ sơ, sổ kế toán, tài liệu, chứng từ, dữ liệu, số liệu liên quan đến việc xác định chính xác số tiền thuế phải nộp, miễn, giảm, hoàn, không thu, không chịu thuế theo quy định;"},{"k":"p","t":"c) Người nộp thuế không chứng minh, giải trình hoặc quá thời hạn quy định mà không giải trình được các nội dung liên quan đến việc xác định nghĩa vụ thuế theo quy định của pháp luật;"},{"k":"p","t":"d) Người nộp thuế không ghi nhận hoặc ghi nhận không đầy đủ, không trung thực, không chính xác số liệu trên sổ kế toán, hồ sơ, chứng từ, dữ liệu, tài liệu kế toán để xác định nghĩa vụ thuế;"},{"k":"p","t":"đ) Cơ quan hải quan có đủ bằng chứng, căn cứ xác định về việc khai báo trị giá, mã số, xuất xứ hàng hóa không đúng với thực tế, ảnh hưởng đến số thuế phải nộp, ưu đãi;"},{"k":"p","t":"e) Giao dịch được thực hiện không đúng với bản chất kinh tế, không đúng thực tế phát sinh, ảnh hưởng đến số tiền thuế phải nộp, miễn, giảm, hoàn, không thu, không chịu thuế;"},{"k":"p","t":"g) Người nộp thuế không tự tính được số tiền thuế phải nộp;"},{"k":"p","t":"h) Người nộp thuế không chấp hành quyết định kiểm tra của cơ quan hải quan;"},{"k":"p","t":"i) Trường hợp khác do cơ quan hải quan hoặc cơ quan khác phát hiện việc kê khai, tính thuế không đúng với quy định của pháp luật."},{"k":"p","t":"2. Cơ quan hải quan ấn định số tiền thuế phải nộp dựa trên các căn cứ: hàng hóa thực tế xuất khẩu, nhập khẩu; căn cứ tính thuế, phương pháp tính thuế; cơ sở dữ liệu quản lý thuế và cơ sở dữ liệu thương mại; hồ sơ hải quan; tài liệu, sổ sách, chứng từ, dữ liệu kế toán, kết quả thanh tra, kiểm tra, kết luận của cơ quan có thẩm quyền hoặc bản án, quyết định của Toà án đã có hiệu lực pháp luật và các thông tin khác có liên quan đến hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"3. Chính phủ quy định chi tiết khoản 1, khoản 2 Điều này và các nội dung sau:  phương pháp ấn định thuế; thẩm quyền, thủ tục ấn định thuế; trách nhiệm của người nộp thuế, người khai thuế, cơ quan hải quan trong việc ấn định thuế."}]},{"id":"luat-108_26","no":26,"code":"Điều 26","title":"Điều 26. Hóa đơn điện tử","shortTitle":"Hóa đơn điện tử","chuong":"Chương III — HÓA ĐƠN ĐIỆN TỬ, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Hóa đơn điện tử là hóa đơn ở dạng dữ liệu điện tử do tổ chức, hộ kinh doanh, cá nhân kinh doanh bán hàng hóa, cung cấp dịch vụ lập để ghi nhận thông tin bán hàng hóa, cung cấp dịch vụ theo quy định của pháp luật về thuế và pháp luật về kế toán."},{"k":"p","t":"2. Hóa đơn điện tử gồm hóa đơn điện tử có mã của cơ quan thuế, hóa đơn điện tử không có mã của cơ quan thuế, hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế."},{"k":"p","t":"3. Đối tượng sử dụng hóa đơn điện tử:"},{"k":"p","t":"a) Người nộp thuế sử dụng hóa đơn điện tử có mã của cơ quan thuế, hóa đơn điện tử không có mã của cơ quan thuế, hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế theo quy định của Chính phủ;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh không thuộc trường hợp sử dụng hóa đơn điện tử theo quy định của Chính phủ và doanh nghiệp, tổ chức kinh tế, tổ chức có nhu cầu sử dụng hóa đơn điện tử phải khai và nộp thuế trước khi được cơ quan thuế cấp hóa đơn điện tử có mã cho từng lần phát sinh giao dịch bán hàng hóa, cung cấp dịch vụ."},{"k":"p","t":"4. Dịch vụ về hóa đơn điện tử gồm dịch vụ cung cấp giải pháp lập, truyền, lưu trữ hóa đơn điện tử có mã hoặc không có mã, hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế. Tổ chức cung cấp dịch vụ hóa đơn điện tử phải đáp ứng điều kiện kỹ thuật, nhân sự, bảo đảm an toàn thông tin, bảo mật dữ liệu theo quy định của Bộ trưởng Bộ Tài chính và có trách nhiệm phối hợp với cơ quan thuế trong việc trao đổi, cung cấp thông tin phục vụ công tác quản lý thuế."},{"k":"p","t":"5. Nguyên tắc, quyền và trách nhiệm lập, quản lý, sử dụng hóa đơn điện tử:"},{"k":"p","t":"a) Tổ chức, hộ kinh doanh, cá nhân kinh doanh phải lập hóa đơn điện tử khi bán hàng hóa, cung cấp dịch vụ để giao cho người mua theo định dạng chuẩn dữ liệu và phải ghi đầy đủ nội dung theo quy định của pháp luật về thuế và pháp luật về kế toán, bảo đảm phản ánh đầy đủ, trung thực nội dung nghiệp vụ kinh tế phát sinh và chịu trách nhiệm trước pháp luật về tính chính xác của hóa đơn đã lập, trừ trường hợp không phải sử dụng hóa đơn điện tử theo quy định của Chính phủ;"},{"k":"p","t":"b) Việc đăng ký, quản lý, sử dụng hóa đơn điện tử phải tuân thủ quy định của pháp luật về giao dịch điện tử, pháp luật về kế toán và pháp luật về thuế;"},{"k":"p","t":"c) Thời điểm lập hóa đơn điện tử thực hiện theo quy định của Chính phủ;"},{"k":"p","t":"d) Người nộp thuế có trách nhiệm triển khai hệ thống hạ tầng kỹ thuật đáp ứng yêu cầu kết nối, lưu trữ, bảo mật và truy xuất hóa đơn điện tử theo đúng định dạng chuẩn và quy định của pháp luật;"},{"k":"p","t":"đ) Dữ liệu hóa đơn điện tử được quản lý tập trung, thống nhất để xây dựng cơ sở dữ liệu về hóa đơn; được kết nối, chia sẻ với các cơ quan, tổ chức có liên quan nhằm phục vụ công tác quản lý nhà nước và bảo vệ quyền lợi người mua."},{"k":"p","t":"Cơ quan thuế có trách nhiệm tổ chức, xây dựng, quản lý và vận hành hệ thống dữ liệu hóa đơn điện tử. Căn cứ kết quả phân tích rủi ro, cơ quan thuế áp dụng các biện pháp quản lý phù hợp, bao gồm cả việc ngừng, tạm ngừng sử dụng hóa đơn điện tử đối với các trường hợp có rủi ro cao về thuế và hóa đơn;"},{"k":"p","t":"e) Tổ chức cung cấp dịch vụ hóa đơn điện tử có trách nhiệm xây dựng cơ chế kiểm tra, phát hiện, cảnh báo trong sử dụng hóa đơn điện tử và cung cấp thông tin cho cơ quan thuế;"},{"k":"p","t":"g) Người mua có quyền và trách nhiệm yêu cầu người bán cung cấp hóa đơn điện tử khi mua hàng hóa, dịch vụ; được hưởng các biện pháp khuyến khích theo quy định của pháp luật."},{"k":"p","t":"6. Chính phủ quy định các nội dung sau: loại hóa đơn điện tử; đối tượng sử dụng; nội dung, thời điểm lập hóa đơn điện tử; trường hợp không phải sử dụng hóa đơn điện tử; trường hợp sử dụng hóa đơn điện tử được miễn phí dịch vụ; nhiệm vụ, quyền hạn, trách nhiệm của tổ chức, cá nhân trong việc quản lý, sử dụng hóa đơn điện tử."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính quy định các nội dung sau: đăng ký sử dụng hóa đơn điện tử; định dạng hóa đơn điện tử; ủy nhiệm lập hóa đơn điện tử; xử lý hóa đơn điện tử đã lập; ký hiệu mẫu, ký hiệu và mẫu hóa đơn điện tử tham khảo; chuyển đổi áp dụng hóa đơn điện tử; tiêu chí xác định người nộp thuế có rủi ro cao trong đăng ký sử dụng hóa đơn điện tử; các trường hợp ngừng, tạm ngừng sử dụng hóa đơn điện tử; biện pháp khuyến khích người mua lấy hóa đơn khi mua hàng hóa, dịch vụ và thực hiện khen thưởng người tiêu dùng tố giác người bán không lập và giao hóa đơn điện tử từ nguồn kinh phí do ngân sách nhà nước đảm bảo trong dự toán chi thường xuyên hằng năm theo quy định của pháp luật."}]},{"id":"luat-108_27","no":27,"code":"Điều 27","title":"Điều 27. Chứng từ điện tử","shortTitle":"Chứng từ điện tử","chuong":"Chương III — HÓA ĐƠN ĐIỆN TỬ, CHỨNG TỪ ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ điện tử là chứng từ thu thuế, phí, lệ phí hoặc chứng từ khấu trừ thuế ở dạng dữ liệu điện tử do cơ quan quản lý thuế hoặc tổ chức có trách nhiệm khấu trừ thuế cấp cho người nộp thuế bằng phương tiện điện tử."},{"k":"p","t":"2. Nguyên tắc lập, quản lý, sử dụng chứng từ điện tử:"},{"k":"p","t":"a) Việc đăng ký, quản lý, sử dụng chứng từ điện tử phải tuân thủ quy định của pháp luật về giao dịch điện tử, pháp luật về kế toán và pháp luật về thuế;"},{"k":"p","t":"b) Tổ chức lập chứng từ điện tử phải phản ánh đầy đủ, trung thực giao dịch phát sinh và chịu trách nhiệm trước pháp luật về tính chính xác của chứng từ đã lập."},{"k":"p","t":"3. Dịch vụ về chứng từ điện tử bao gồm dịch vụ cung cấp giải pháp lập, truyền, lưu trữ chứng từ điện tử. Tổ chức cung cấp dịch vụ phải đáp ứng điều kiện kỹ thuật, bảo đảm an toàn, bảo mật dữ liệu theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"4. Chính phủ quy định chi tiết các nội dung sau: loại chứng từ điện tử; nội dung, thời điểm lập chứng từ điện tử; phương thức lập chứng từ điện tử, văn bản hành chính thuế điện tử; kết nối, truyền dữ liệu chứng từ điện tử; trường hợp sử dụng được miễn phí dịch vụ; nhiệm vụ, quyền hạn, trách nhiệm của tổ chức, cá nhân trong việc quản lý, sử dụng chứng từ điện tử."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định chi tiết các nội dung sau: việc đăng ký sử dụng chứng từ điện tử; định dạng chứng từ điện tử; xử lý chứng từ điện tử đã lập; ký hiệu mẫu, ký hiệu chứng từ điện tử và mẫu chứng từ điện tử tham khảo."}]},{"id":"luat-108_28","no":28,"code":"Điều 28","title":"Điều 28. Phạm vi hợp tác quốc tế về thuế, quản lý thuế quốc tế","shortTitle":"Phạm vi hợp tác quốc tế về thuế, quản lý thuế quốc tế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ, QUẢN LÝ THUẾ QUỐC TẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Ký kết, tham gia các điều ước quốc tế, thỏa thuận quốc tế, diễn đàn quốc tế về thuế và tổ chức quốc tế khác."},{"k":"p","t":"2. Thực hiện các điều ước quốc tế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết phục vụ công tác quản lý thuế."},{"k":"p","t":"3. Thực hiện nghĩa vụ thành viên theo các điều ước quốc tế, thỏa thuận quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết và diễn đàn quốc tế về thuế phục vụ công tác quản lý thuế."}]},{"id":"luat-108_29","no":29,"code":"Điều 29","title":"Điều 29. Nguyên tắc hợp tác quốc tế về thuế, quản lý thuế quốc tế","shortTitle":"Nguyên tắc hợp tác quốc tế về thuế, quản lý thuế quốc tế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ, QUẢN LÝ THUẾ QUỐC TẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Tôn trọng chủ quyền quốc gia, bình đẳng và các bên cùng có lợi."},{"k":"p","t":"2. Tuân thủ điều ước quốc tế và thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết."},{"k":"p","t":"3. Bảo đảm bí mật thông tin và quyền lợi hợp pháp của người nộp thuế theo quy định của pháp luật Việt Nam và các điều ước quốc tế, thỏa thuận quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết, cam kết quốc tế về thuế liên quan."}]},{"id":"luat-108_30","no":30,"code":"Điều 30","title":"Điều 30. Nội dung quản lý thuế quốc tế của cơ quan quản lý thuế","shortTitle":"Nội dung quản lý thuế quốc tế của cơ quan quản lý thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ, QUẢN LÝ THUẾ QUỐC TẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng quản lý thuế quốc tế là các tổ chức, cá nhân thuộc phạm vi áp dụng của các điều ước quốc tế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết."},{"k":"p","t":"2. Nhiệm vụ của cơ quan quản lý thuế trong quản lý thuế quốc tế:"},{"k":"p","t":"a) Tham mưu giúp Bộ trưởng Bộ Tài chính đề xuất cơ quan, người có thẩm quyền ký kết và thực hiện quyền, nghĩa vụ và bảo đảm lợi ích của nước Cộng hòa xã hội chủ nghĩa Việt Nam theo các điều ước quốc tế;"},{"k":"p","t":"b) Đàm phán, ký và thực hiện các cam kết quốc tế về thuế để thực hiện các Hiệp định tránh đánh thuế hai lần, bao gồm: Thủ tục thỏa thuận song phương (MAP), thỏa thuận trước về phương pháp xác định giá tính thuế (APA). Trong đó, MAP là thỏa thuận bằng văn bản giữa cơ quan thuế Việt Nam và cơ quan thuế của nước, vùng lãnh thổ đã ký Hiệp định tránh đánh thuế hai lần với Việt Nam nhằm giải quyết tranh chấp về thuế cho người nộp thuế để tránh bị đánh thuế hai lần đối với cùng một khoản thu nhập, tài sản hoặc giải quyết việc đánh thuế của cơ quan thuế một nước không đúng quy định của Hiệp định tránh đánh thuế hai lần. APA là thỏa thuận bằng văn bản giữa cơ quan thuế với người nộp thuế (APA đơn phương) hoặc giữa cơ quan thuế Việt Nam với người nộp thuế và cơ quan thuế của nước, vùng lãnh thổ đã ký Hiệp định tránh đánh thuế hai lần với Việt Nam (APA song phương, đa phương). Thỏa thuận này nhằm xác định trước phương pháp xác định giá trong các giao dịch liên kết, phù hợp với nguyên tắc giao dịch độc lập để làm căn cứ xác định nghĩa vụ thuế thu nhập doanh nghiệp của doanh nghiệp có giao dịch liên kết trong một khoảng thời gian cụ thể."},{"k":"p","t":"c) Đàm phán, ký và thực hiện các cam kết quốc tế về thuế đối với hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"d) Hướng dẫn thực hiện và xử lý hồ sơ áp dụng các Hiệp định tránh đánh thuế hai lần, điều ước quốc tế về thuế khác;"},{"k":"p","t":"đ) Khai thác, trao đổi thông tin về người nộp thuế và hợp tác nghiệp vụ về thuế với các cơ quan thuế nước ngoài theo các điều ước quốc tế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết và diễn đàn thuế quốc tế phục vụ công tác quản lý thuế;"},{"k":"p","t":"e) Hợp tác và hỗ trợ hành chính khác về thuế với cơ quan thuế nước ngoài, tổ chức quốc tế phù hợp với quy định của pháp luật Việt Nam và các điều ước quốc tế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết;"},{"k":"p","t":"g) Triển khai thực hiện các quy định về Thuế tối thiểu toàn cầu, quản lý thuế đối với các doanh nghiệp có giao dịch liên kết và các nghĩa vụ thành viên khác mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết;"},{"k":"p","t":"h) Tổ chức thu thập, xác minh thông tin từ cơ quan, tổ chức và người nộp thuế theo tiêu chuẩn trao đổi thông tin của diễn đàn toàn cầu về minh bạch và trao đổi thông tin phục vụ mục đích thuế."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định nội dung, quy trình, thủ tục ký và thực hiện các cam kết quốc tế quy định tại điểm b khoản 2 Điều này."},{"k":"p","t":"4. Chính phủ quy định chi tiết các điểm e, g và h khoản 2 Điều này."}]},{"id":"luat-108_31","no":31,"code":"Điều 31","title":"Điều 31. Nguyên tắc thực hiện MAP, APA","shortTitle":"Nguyên tắc thực hiện MAP, APA","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ, QUẢN LÝ THUẾ QUỐC TẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Mọi thỏa thuận đạt được để thực hiện MAP theo các Hiệp định tránh đánh thuế hai lần mà nước Cộng hòa xã hội chủ nghĩa Việt Nam đã ký kết và có hiệu lực sẽ được thực hiện theo quy định của Hiệp định tránh đánh thuế hai lần đó."},{"k":"p","t":"2. Việc áp dụng cơ chế APA được thực hiện trên cơ sở đề nghị của người nộp thuế, sự thống nhất giữa cơ quan thuế và người nộp thuế theo thỏa thuận đơn phương, song phương và đa phương giữa cơ quan thuế, người nộp thuế và cơ quan thuế nước ngoài, vùng lãnh thổ có liên quan do thủ trưởng cơ quan thuế quyết định theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Việc áp dụng cơ chế APA phải dựa trên thông tin của người nộp thuế, cơ sở dữ liệu sử dụng trong quản lý thuế đối với doanh nghiệp có giao dịch liên kết bao gồm: cơ sở dữ liệu thương mại; cơ sở dữ liệu quản lý thuế; thông tin dữ liệu của các doanh nghiệp được công bố công khai trên thị trường chứng khoán, thông tin, dữ liệu công bố trên các sàn giao dịch hàng hóa, dịch vụ trong nước và quốc tế; thông tin, dữ liệu do các bộ, ngành, cơ quan nhà nước công bố hoặc cung cấp chính thức cho cơ quan quản lý thuế theo quy định của pháp luật; thông tin thu thập được thông qua hợp tác quốc tế về thuế do cơ quan quản lý thuế các nước, vùng lãnh thổ trao đổi theo các hiệp định, thỏa thuận về tránh đánh thuế hai lần, hỗ trợ hành chính thuế và các cơ chế chia sẻ thông tin đa phương."},{"k":"p","t":"4. APA có hiệu lực kể từ kỳ tính thuế mà trong kỳ tính thuế đó APA được ký kết hoặc từ năm liền kề sau năm ký kết căn cứ theo nội dung được cơ quan thuế và người nộp thuế thống nhất trong thỏa thuận"}]},{"id":"luat-108_32","no":32,"code":"Điều 32","title":"Điều 32. Nguyên tắc áp dụng quản lý rủi ro, tuân thủ và chuyển đổi số trong quản lý thuế","shortTitle":"Nguyên tắc áp dụng quản lý rủi ro, tuân thủ và chuyển đổi số trong quản lý thuế","chuong":"Chương V — QUẢN LÝ RỦI RO, QUẢN LÝ TUÂN THỦ, ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế áp dụng quản lý rủi ro và quản lý tuân thủ nhằm:"},{"k":"p","t":"a) Nâng cao hiệu quả công tác quản lý thuế, tối ưu hóa nguồn lực của cơ quan quản lý thuế;"},{"k":"p","t":"b) Tạo môi trường kinh doanh minh bạch, công bằng và khuyến khích người nộp thuế tự giác tuân thủ pháp luật về thuế; bảo vệ quyền, lợi ích hợp pháp của người nộp thuế;"},{"k":"p","t":"c) Phòng ngừa, phát hiện, ngăn chặn và xử lý kịp thời các hành vi không tuân thủ pháp luật về thuế."},{"k":"p","t":"2. Việc áp dụng quản lý rủi ro và quản lý tuân thủ phải đảm bảo các nguyên tắc sau đây:"},{"k":"p","t":"a) Bảo đảm khách quan, minh bạch, đúng quy định của pháp luật và không phân biệt đối xử;"},{"k":"p","t":"b) Dựa trên phân tích dữ liệu khách quan, toàn diện và cập nhật;"},{"k":"p","t":"c) Áp dụng các biện pháp quản lý phù hợp với đặc thù, mức độ tuân thủ và mức độ rủi ro của từng nhóm, từng đối tượng người nộp thuế;"},{"k":"p","t":"d) Ưu tiên ứng dụng công nghệ thông tin hiện đại, tự động hóa trong việc thu thập, xử lý dữ liệu, đánh giá phân loại mức độ tuân thủ, phân loại mức độ rủi ro."},{"k":"p","t":"3. Cơ quan quản lý thuế thực hiện chuyển đổi số, tự động hóa công tác quản lý dựa trên ứng dụng khoa học, công nghệ và dữ liệu lớn."},{"k":"p","t":"4. Giao dịch giữa người nộp thuế và cơ quan quản lý thuế được thực hiện bằng phương thức điện tử thông qua Hệ thống thông tin quản lý thuế, trừ một số trường hợp đặc biệt do Chính phủ quy định."},{"k":"p","t":"5. Cơ quan, tổ chức sử dụng chứng từ điện tử do cơ quan quản lý thuế cung cấp và không được yêu cầu người nộp thuế xuất trình chứng từ bằng giấy trong trường hợp dữ liệu đã có trong cơ sở dữ liệu dùng chung của cơ quan nhà nước."},{"k":"p","t":"6. Chính phủ quy định chi tiết khoản 4 Điều này."}]},{"id":"luat-108_33","no":33,"code":"Điều 33","title":"Điều 33. Quản lý rủi ro trong quản lý thuế","shortTitle":"Quản lý rủi ro trong quản lý thuế","chuong":"Chương V — QUẢN LÝ RỦI RO, QUẢN LÝ TUÂN THỦ, ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế áp dụng quản lý rủi ro trong quản lý về đăng ký thuế, khai thuế, khoản thu khác, nộp thuế, khoản thu khác, nợ thuế, khoản thu khác, hoàn thuế, khoản thu khác, kiểm tra thuế, quản lý và sử dụng hóa đơn, chứng từ và các hoạt động nghiệp vụ khác."},{"k":"p","t":"2. Cơ quan hải quan áp dụng quản lý rủi ro để quyết định kiểm tra thuế trong thực hiện thủ tục hải quan và các hoạt động nghiệp vụ khác đối với hàng hóa xuất khẩu, nhập khẩu, quá cảnh theo quy định của pháp luật về hải quan."},{"k":"p","t":"3. Quản lý rủi ro trong hoạt động nghiệp vụ quản lý thuế bao gồm việc thu thập, xử lý thông tin về thuế; xây dựng tiêu chí và tổ chức đánh giá, phân loại mức độ rủi ro trong hoạt động quản lý thuế; tổ chức thực hiện các biện pháp quản lý thuế phù hợp."},{"k":"p","t":"4. Cơ quan quản lý thuế ứng dụng Hệ thống thông tin quản lý thuế để tích hợp, xử lý dữ liệu phục vụ việc áp dụng quản lý rủi ro và tự động hóa trong hoạt động nghiệp vụ quản lý thuế."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính quy định các nội dung sau: tiêu chí đánh giá, phân loại mức độ rủi ro và việc áp dụng quản lý rủi ro trong hoạt động nghiệp vụ quản lý thuế."}]},{"id":"luat-108_34","no":34,"code":"Điều 34","title":"Điều 34. Quản lý tuân thủ trong quản lý thuế","shortTitle":"Quản lý tuân thủ trong quản lý thuế","chuong":"Chương V — QUẢN LÝ RỦI RO, QUẢN LÝ TUÂN THỦ, ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế thực hiện quản lý tuân thủ để phân bổ nguồn lực hiệu quả, khuyến khích sự tuân thủ tự nguyện và tạo môi trường kinh doanh công bằng, bao gồm:"},{"k":"p","t":"a) Xây dựng hệ thống đánh giá và phân loại mức độ tuân thủ pháp luật về thuế của người nộp thuế, đồng thời duy trì hồ sơ điện tử cho từng người nộp thuế, gồm các thông tin về: tần suất vi phạm pháp luật về thuế; tính chất và mức độ của hành vi vi phạm; mức độ hợp tác với cơ quan quản lý thuế trong việc thực hiện thủ tục thuế, kiểm tra và chấp hành các quyết định xử lý vi phạm và các thông tin khác liên quan đến nghĩa vụ thuế;"},{"k":"p","t":"b) Kết hợp giữa tuyên truyền, hỗ trợ, khuyến khích người nộp thuế tuân thủ tự nguyện với các biện pháp kiểm tra, giám sát dựa trên kết quả đánh giá mức độ tuân thủ, mức độ rủi ro và hành vi tuân thủ của người nộp thuế;"},{"k":"p","t":"c) Áp dụng chế độ ưu tiên đối với người nộp thuế tuân thủ tốt pháp luật về thuế, sẵn sàng kết nối, chia sẻ dữ liệu điện tử với cơ quan quản lý thuế, bao gồm dữ liệu về sổ kế toán, hóa đơn, chứng từ và các tài liệu liên quan đến nghĩa vụ thuế thông qua Hệ thống thông tin quản lý thuế theo quy định của Chính phủ."},{"k":"p","t":"Chính phủ quy định chi tiết về điều kiện, phạm vi và hình thức áp dụng chế độ ưu tiên đối với người nộp thuế tuân thủ pháp luật."},{"k":"p","t":"2. Cơ quan hải quan tổ chức áp dụng thống nhất quản lý tuân thủ pháp luật đối với người nộp thuế bao gồm: việc xây dựng, quản lý hồ sơ người nộp thuế; xây dựng tiêu chí, chỉ số tiêu chí và tổ chức đánh giá tuân thủ pháp luật của người nộp thuế; hỗ trợ, khuyến khích người nộp thuế nâng cao năng lực tuân thủ; áp dụng các biện pháp kiểm tra, giám sát, kiểm tra sau thông quan và các biện pháp nghiệp vụ khác theo mức độ tuân thủ pháp luật của người nộp thuế theo quy định của pháp luật."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định tiêu chí đánh giá việc tuân thủ pháp luật của người nộp thuế và các hoạt động quản lý tuân thủ trong quản lý thuế."}]},{"id":"luat-108_35","no":35,"code":"Điều 35","title":"Điều 35. Hệ thống thông tin quản lý thuế","shortTitle":"Hệ thống thông tin quản lý thuế","chuong":"Chương V — QUẢN LÝ RỦI RO, QUẢN LÝ TUÂN THỦ, ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hệ thống thông tin quản lý thuế xử lý tập trung, tích hợp; cung cấp các dịch vụ công trực tuyến toàn trình, dịch vụ số cho người nộp thuế; bảo đảm thu thập, xử lý, lưu trữ, cập nhật và quản lý thông tin, dữ liệu chính xác, đầy đủ, kịp thời. Toàn bộ quá trình này được ghi nhận, lưu lịch sử trên hệ thống."},{"k":"p","t":"2. Cơ sở dữ liệu quản lý thuế được xây dựng, phát triển và vận hành trên nền tảng dữ liệu số, kết nối và đồng bộ với hệ thống cơ sở dữ liệu quốc gia, cơ sở dữ liệu của các bộ, ngành, các tổ chức hợp tác quốc tế và tổ chức có liên quan. Cơ quan quản lý thuế được quyền thu thập, tiếp cận, sử dụng và mua sắm các cơ sở dữ liệu thương mại có sẵn trên thị trường theo quy định của pháp luật."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định tiêu chuẩn kỹ thuật, xây dựng hạ tầng công nghệ thông tin phục vụ kết nối, trao đổi thông tin, chia sẻ dữ liệu với các bên liên quan theo quy định của pháp luật. Các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ, chính quyền địa phương và các đơn vị liên quan có trách nhiệm xây dựng, triển khai hệ thống công nghệ thông tin đáp ứng yêu cầu kết nối, trao đổi thông tin thông qua nền tảng tích hợp, chia sẻ dữ liệu quốc gia theo quy định và bảo đảm tính chính xác, đầy đủ, kịp thời của dữ liệu cung cấp."},{"k":"p","t":"4. Cơ quan quản lý thuế sử dụng Hệ thống thông tin quản lý thuế để ban hành các văn bản, thông báo, quyết định hành chính thuế tự động trên cơ sở quy trình nghiệp vụ, các tiêu chí quản lý và dữ liệu trên hệ thống. Các văn bản, thông báo, quyết định hành chính thuế tự động được ký bằng chữ ký số của cơ quan quản lý thuế và có giá trị pháp lý như văn bản giấy. Quá trình xử lý được ghi nhận, lưu lịch sử trên Hệ thống thông tin quản lý thuế và cho phép người nộp thuế tra cứu kiến nghị, phản hồi thông tin và yêu cầu làm rõ các thông tin liên quan."}]},{"id":"luat-108_36","no":36,"code":"Điều 36","title":"Điều 36. Bảo đảm an toàn thông tin và quản lý rủi ro công nghệ thông tin","shortTitle":"Bảo đảm an toàn thông tin và quản lý rủi ro công nghệ thông tin","chuong":"Chương V — QUẢN LÝ RỦI RO, QUẢN LÝ TUÂN THỦ, ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thực hiện quản lý rủi ro công nghệ thông tin trong công tác quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"2. Các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ, chính quyền địa phương, các đơn vị có liên quan và cơ quan quản lý thuế có trách nhiệm:"},{"k":"p","t":"a) Bảo đảm an toàn, an ninh mạng và bảo mật thông tin người nộp thuế trong toàn bộ quá trình xây dựng, triển khai và vận hành Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"b) Thực hiện quản lý rủi ro công nghệ thông tin trong công tác quản lý thuế;"},{"k":"p","t":"c) Bảo đảm đầy đủ quyền lợi, nghĩa vụ của người nộp thuế trong trường hợp xảy ra sự cố công nghệ, không làm gián đoạn việc thực hiện nghĩa vụ thuế của người nộp thuế."},{"k":"p","t":"3. Trường hợp phát sinh sự cố kỹ thuật của Hệ thống thông tin quản lý thuế khi người nộp thuế thực hiện giao dịch điện tử dẫn đến người nộp thuế không thể thực hiện được nghĩa vụ thuế theo đúng thời hạn quy định thì người nộp thuế không bị xử phạt vi phạm hành chính về quản lý thuế, không tính tiền chậm nộp tiền thuế và không tính vào thời gian giải quyết hồ sơ thuế của cơ quan thuế trong thời gian xảy ra sự cố."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-108_37","no":37,"code":"Điều 37","title":"Điều 37. Quyền và nghĩa vụ của người nộp thuế","shortTitle":"Quyền và nghĩa vụ của người nộp thuế","chuong":"Chương VI — QUYỀN, NGHĨA VỤ; NHIỆM VỤ, QUYỀN HẠN CỦA BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có các quyền sau:"},{"k":"p","t":"a) Được hỗ trợ, hướng dẫn thực hiện nghĩa vụ thuế; cung cấp thông tin, tài liệu để thực hiện nghĩa vụ, quyền lợi về thuế;"},{"k":"p","t":"b) Được tra cứu, xem, in ​​và sử dụng chứng từ điện tử mà người nộp thuế đã gửi đến Hệ thống thông tin quản lý thuế theo quy định của Luật này và pháp luật về giao dịch điện tử; được yêu cầu tổ chức khấu trừ cấp chứng từ khấu trừ điện tử;"},{"k":"p","t":"c) Ký hợp đồng với đại lý thuế, đại lý làm thủ tục hải quan để thực hiện dịch vụ đại lý thuế, đại lý làm thủ tục hải quan; được ủy quyền khai thay, nộp thuế thay theo quy định của pháp luật về thuế, quản lý thuế, hải quan;"},{"k":"p","t":"d) Được áp dụng chế độ ưu tiên theo quy định của pháp luật về quản lý thuế, hải quan nếu đáp ứng đủ các điều kiện về chế độ ưu tiên theo quy định của pháp luật;"},{"k":"p","t":"đ) Được tra cứu tình hình thực hiện nghĩa vụ thuế, nhận thông báo số tiền thuế nợ qua tài khoản giao dịch điện tử do cơ quan quản lý thuế cung cấp;"},{"k":"p","t":"e) Được nhận thông báo, quyết định, biên bản, kết luận liên quan đến xác định nghĩa vụ thuế từ các cơ quan chức năng khi tiến hành thanh tra, kiểm tra, kiểm toán;"},{"k":"p","t":"g) Được giải thích về việc tính thuế, khoản thu khác, ấn định thuế, nội dung xử lý về thuế, khoản thu khác; được bảo lưu ý kiến, giải trình; được biết thời hạn giải quyết hoàn thuế, số tiền thuế không được hoàn và căn cứ pháp lý đối với số tiền thuế không được hoàn;"},{"k":"p","t":"h) Không phải nộp các chứng từ, tài liệu, không phải gửi các thông tin đã có sẵn trong hồ sơ thuế mà cơ quan quản lý thuế đã có, trừ trường hợp có thay đổi nội dung hoặc theo yêu cầu của cơ quan quản lý thuế để phục vụ kiểm tra thuế;"},{"k":"p","t":"i) Được yêu cầu xác nhận việc hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"k) Được bảo mật thông tin theo quy định tại Điều 7 của Luật này;"},{"k":"p","t":"l) Được khiếu nại, khởi kiện quyết định hành chính, hành vi hành chính về thuế liên quan đến quyền, lợi ích hợp pháp của người nộp thuế;"},{"k":"p","t":"m) Được tố cáo hành vi vi phạm pháp luật của công chức quản lý thuế, tổ chức, cá nhân khác theo quy định của pháp luật về tố cáo;"},{"k":"p","t":"n) Được bồi thường thiệt hại theo quy định của pháp luật về trách nhiệm bồi thường của Nhà nước nếu bị cơ quan quản lý thuế, công chức quản lý thuế gây thiệt hại trái pháp luật;"},{"k":"p","t":"o) Không bị xử phạt vi phạm hành chính về quản lý thuế, hóa đơn, không tính tiền chậm nộp đối với trường hợp do người nộp thuế thực hiện nghĩa vụ thuế, hóa đơn theo văn bản hành chính hoặc quyết định xử lý của cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền liên quan đến nội dung xác định nghĩa vụ thuế, hóa đơn của người nộp thuế;"},{"k":"p","t":"p) Được yêu cầu giám định hàng hóa xuất khẩu, nhập khẩu liên quan đến nghĩa vụ thuế;"},{"k":"p","t":"q) Được yêu cầu tra soát, điều chỉnh thông tin nếu phát hiện sai lệch trên chứng từ nộp ngân sách nhà nước hoặc dữ liệu do cơ quan quản lý thuế cung cấp;"},{"k":"p","t":"r) Khi cơ quan quản lý thuế kiểm tra thuế, người nộp thuế có quyền từ chối việc kiểm tra tại trụ sở người nộp thuế khi không có quyết định kiểm tra tại trụ sở người nộp thuế của cơ quan có thẩm quyền; từ chối việc kiểm tra tại trụ sở cơ quan quản lý thuế khi không có thông báo yêu cầu giải trình, bổ sung thông tin, tài liệu của cơ quan quản lý thuế; từ chối cung cấp thông tin, tài liệu không liên quan đến nội dung kiểm tra hoặc thuộc bí mật nhà nước, trừ trường hợp pháp luật có quy định khác; được giải trình về những vấn đề có liên quan đến nội dung kiểm tra và bảo lưu ý kiến; khiếu nại, khởi kiện, yêu cầu bồi thường thiệt hại theo quy định của pháp luật; tố cáo hành vi vi phạm pháp luật trong quá trình kiểm tra thuế; các quyền khác theo quy định của pháp luật về kiểm tra chuyên ngành."},{"k":"p","t":"2. Người nộp thuế có nghĩa vụ sau:"},{"k":"p","t":"a) Đăng ký thuế, sử dụng mã số thuế theo quy định;"},{"k":"p","t":"b) Khai chính xác, trung thực, đầy đủ và nộp hồ sơ thuế đúng hạn; chịu trách nhiệm trước pháp luật về tính chính xác, trung thực, đầy đủ của hồ sơ thuế và các tài liệu cung cấp cho cơ quan quản lý thuế trong quá trình giải quyết hồ sơ thuế;"},{"k":"p","t":"c) Nộp đầy đủ, đúng hạn các khoản thuế, khoản thu khác, tiền chậm nộp, tiền phạt. Trường hợp số tiền phải nộp đã được cơ quan quản lý thuế cung cấp mã định danh khoản phải nộp thì người nộp thuế nộp theo mã định danh khoản phải nộp;"},{"k":"p","t":"d) Tuân thủ chế độ kế toán, thống kê, sử dụng hóa đơn, chứng từ theo quy định;"},{"k":"p","t":"đ) Ghi chép, ghi nhận chính xác, trung thực, đầy đủ những hoạt động phát sinh nghĩa vụ thuế, khấu trừ thuế và giao dịch phải kê khai thông tin về thuế;"},{"k":"p","t":"e) Lập và giao hóa đơn, chứng từ cho người mua theo đúng số lượng, chủng loại, giá trị thực thanh toán khi bán hàng hóa, cung cấp dịch vụ theo quy định của pháp luật;"},{"k":"p","t":"g) Cung cấp chính xác, đầy đủ, kịp thời thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế dưới dạng văn bản giấy hoặc điện tử; cung cấp thông tin cho cơ quan quản lý thuế để thực hiện trao đổi thông tin với cơ quan quản lý thuế nước ngoài theo điều ước quốc tế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết; giải thích việc tính thuế, khoản thu khác, khai thuế, khoản thu khác, nộp thuế, khoản thu khác theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"h) Chấp hành quyết định, thông báo, yêu cầu của cơ quan quản lý thuế và công chức quản lý thuế theo quy định của pháp luật;"},{"k":"p","t":"i) Chịu trách nhiệm thực hiện nghĩa vụ thuế, khoản thu khác theo quy định của pháp luật bao gồm cả trong trường hợp người đại diện theo pháp luật hoặc đại diện theo ủy quyền thay mặt người nộp thuế thực hiện thủ tục về thuế, khoản thu khác sai quy định;"},{"k":"p","t":"k) Vận hành hạ tầng kỹ thuật để thực hiện giao dịch điện tử, kết nối thông tin nghĩa vụ thuế với cơ quan quản lý thuế;"},{"k":"p","t":"l) Sử dụng đúng mục đích các hàng hóa, dịch vụ miễn thuế, khoản thu khác, không chịu thuế theo kê khai; nếu thay đổi mục đích, phải kê khai lại và nộp tiền thuế, khoản thu khác và các khoản phát sinh theo quy định của pháp luật;"},{"k":"p","t":"m) Người nộp thuế có giao dịch liên kết phải lập, lưu trữ, kê khai, cung cấp hồ sơ về giao dịch liên kết và các bên liên kết của người nộp thuế, kể cả bên liên kết ở nước ngoài;"},{"k":"p","t":"n) Người nộp thuế là doanh nghiệp xã hội có trách nhiệm kê khai chính xác, trung thực và đầy đủ các khoản thu từ hoạt động hợp tác, tài trợ và hợp đồng kinh tế với tổ chức, cá nhân nước ngoài sử dụng cho mục đích xã hội, môi trường theo quy định của pháp luật về thuế và pháp luật có liên quan;"},{"k":"p","t":"o) Người nộp thuế phải nộp số tiền thuế, khoản thu khác ấn định theo quyết định xử lý về thuế, khoản thu khác của cơ quan quản lý thuế. Trường hợp không đồng ý với số tiền thuế, khoản thu khác do cơ quan quản lý thuế ấn định thì người nộp thuế vẫn phải nộp số tiền thuế, khoản thu khác đó, đồng thời có quyền đề nghị cơ quan quản lý thuế giải thích hoặc khiếu nại, khởi kiện về việc ấn định thuế. Người nộp thuế có trách nhiệm cung cấp các hồ sơ, tài liệu để chứng minh cho việc khiếu nại, khởi kiện;"},{"k":"p","t":"p) Khi cơ quan quản lý thuế kiểm tra thuế, người nộp thuế có nghĩa vụ chấp hành quyết định kiểm tra thuế tại trụ sở người nộp thuế của cơ quan quản lý thuế; chấp hành thông báo yêu cầu giải trình, bổ sung thông tin, tài liệu của cơ quan quản lý thuế; cung cấp kịp thời, đầy đủ, chính xác, trung thực các thông tin, tài liệu liên quan đến nội dung kiểm tra thuế; ký biên bản kiểm tra thuế trong thời hạn quy định của pháp luật; chấp hành kết luận, quyết định xử lý kết quả kiểm tra thuế."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính quy định chi tiết thủ tục tra soát, điều chỉnh thông tin, xác nhận hoàn thành nghĩa vụ nộp thuế theo yêu cầu của người nộp thuế."}]},{"id":"luat-108_38","no":38,"code":"Điều 38","title":"Điều 38. Nhiệm vụ và quyền hạn của cơ quan quản lý thuế, công chức quản lý thuế","shortTitle":"Nhiệm vụ và quyền hạn của cơ quan quản lý thuế, công chức quản lý thuế","chuong":"Chương VI — QUYỀN, NGHĨA VỤ; NHIỆM VỤ, QUYỀN HẠN CỦA BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nhiệm vụ của cơ quan quản lý thuế, công chức quản lý thuế:"},{"k":"p","t":"a) Tổ chức thực hiện quản lý thu đối với các loại thuế theo quy định của của pháp luật về thuế, tiền chậm nộp, tiền thu từ xử phạt vi phạm hành chính do cơ quan quản lý thuế thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính;"},{"k":"p","t":"b) Tổ chức thực hiện quản lý thu đối với các khoản thu khác gồm: phí và lệ phí theo quy định của Luật Phí và lệ phí; tiền sử dụng đất; tiền thuê đất; tiền cấp quyền khai thác khoáng sản; tiền cấp quyền khai thác tài nguyên nước; tiền sử dụng khu vực biển; thu từ chuyển đổi sở hữu doanh nghiệp, đơn vị sự nghiệp công lập; thu từ chuyển nhượng vốn, chuyển nhượng quyền mua cổ phần, quyền góp vốn nhà nước tại doanh nghiệp; lợi nhuận sau thuế còn lại sau khi trích lập các quỹ theo quy định của doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ, cổ tức và lợi nhuận được chia cho phần vốn nhà nước tại doanh nghiệp theo quy định; các khoản thu khác thuộc ngân sách nhà nước theo quy định của pháp luật."},{"k":"p","t":"Đối với các khoản phí, lệ phí không do cơ quan quản lý thuế trực tiếp thu thì cơ quan, tổ chức được giao thu phí, lệ phí theo quy định của Luật Phí và lệ phí thực hiện các nội dung quản lý thu theo quy định tại khoản 7 Điều 39 của Luật này."},{"k":"p","t":"Đối với các khoản thu thuộc lĩnh vực quản lý nhà nước của cơ quan, tổ chức khác nhưng giao cho cơ quan quản lý thuế tổ chức thu thì cơ quan, tổ chức quản lý khoản thu có trách nhiệm chuyển thông tin về việc xác định nghĩa vụ tài chính, nghĩa vụ phải nộp ngân sách nhà nước cho cơ quan quản lý thuế tổ chức thu và chịu trách nhiệm về tính chính xác, đầy đủ, kịp thời của thông tin nghĩa vụ tài chính, nghĩa vụ phải nộp ngân sách nhà nước theo quy định của pháp luật. Trường hợp có sự thay đổi các thông tin liên quan đến xác định nghĩa vụ tài chính, nghĩa vụ nộp ngân sách nhà nước đã chuyển cho cơ quan quản lý thuế thì cơ quan, tổ chức quản lý khoản thu có trách nhiệm thông báo cho cơ quan quản lý thuế để điều chỉnh, thông báo số tiền thuế và khoản thu khác, tiền chậm nộp, tiền phạt phải nộp của người nộp thuế;"},{"k":"p","t":"c) Tuyên truyền, phổ biến, hướng dẫn, giải thích pháp luật về thuế cho người nộp thuế; công khai quy trình, thủ tục hành chính thuế, các chương trình khuyến khích tuân thủ tự nguyện, chế độ ưu tiên tại trụ sở, trung tâm phục vụ hành chính công cấp tỉnh, cấp xã, trên Hệ thống thông tin quản lý thuế và các phương tiện thông tin đại chúng; ứng dụng công nghệ số để nâng cao hiệu quả hỗ trợ người nộp thuế kê khai, báo cáo, thực hiện nghĩa vụ thuế và nâng cao tuân thủ pháp luật về thuế;"},{"k":"p","t":"d) Cung cấp, chia sẻ thông tin người nộp thuế phục vụ công tác quản lý thuế theo quy định;"},{"k":"p","t":"đ) Xác nhận việc thực hiện nghĩa vụ thuế và xử lý tra soát, điều chỉnh thông tin theo đúng trình tự, thủ tục theo quy định của pháp luật. Xác nhận hoàn thành giao dịch trong trường hợp người nộp thuế hoàn thành giao dịch theo phương thức điện tử;"},{"k":"p","t":"e) Cung cấp thông tin về tình hình thực hiện nghĩa vụ thuế của người nộp thuế (bao gồm số tiền thuế, khoản thu khác nộp thừa), thông báo số tiền thuế nợ qua tài khoản giao dịch điện tử của người nộp thuế;"},{"k":"p","t":"g) Bồi thường thiệt hại cho người nộp thuế theo quy định của pháp luật về trách nhiệm bồi thường của Nhà nước trong trường hợp gây thiệt hại trái pháp luật;"},{"k":"p","t":"h) Thực hiện giám định thuế theo yêu cầu của cơ quan nhà nước có thẩm quyền nhằm xác định nghĩa vụ thuế phải nộp;"},{"k":"p","t":"i) Xây dựng, vận hành hệ thống thông tin điện tử, ứng dụng công nghệ thông tin và chuyển đổi số trong quản lý thuế; bảo đảm an toàn dữ liệu, kết nối liên thông với hệ thống của các cơ quan nhà nước có liên quan;"},{"k":"p","t":"k) Thực hiện hạch toán kế toán tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt do cơ quan quản lý thuế phải thu, đã thu, miễn, giảm, xóa nợ, hoàn trả theo quy định của pháp luật về kế toán và pháp luật về ngân sách nhà nước;"},{"k":"p","t":"l) Tổ chức thực hiện công tác thống kê thuế theo quy định của pháp luật;"},{"k":"p","t":"m) Quản lý thuế đối với các giao dịch xuyên biên giới, kinh tế số, thương mại điện tử, tài sản số và loại hình, giao dịch kinh tế mới phát sinh;"},{"k":"p","t":"n) Công chức quản lý thuế có nhiệm vụ và chịu trách nhiệm giải quyết hồ sơ thuế trong phạm vi hồ sơ, tài liệu, thông tin của người nộp thuế cung cấp, cơ sở dữ liệu quản lý thuế, thông tin của cơ quan nhà nước có thẩm quyền cung cấp có liên quan đến người nộp thuế, kết quả áp dụng quản lý rủi ro trong quản lý thuế, bảo đảm theo đúng chức trách, nhiệm vụ, tuân thủ quy định của pháp luật về thuế, quản lý thuế và quy định khác của pháp luật có liên quan, không chịu trách nhiệm về những nội dung trong các văn bản, giấy tờ, tài liệu có trong hồ sơ thuế đã được cơ quan, người có thẩm quyền khác chấp thuận, thẩm định, phê duyệt hoặc giải quyết trước đó;"},{"k":"p","t":"o) Cơ quan quản lý thuế có trách nhiệm hỗ trợ người nộp thuế trong trường hợp người nộp thuế gặp khó khăn trong thực hiện thủ tục thuế."},{"k":"p","t":"2. Quyền hạn của cơ quan quản lý thuế:"},{"k":"p","t":"a) Yêu cầu người nộp thuế cung cấp thông tin, tài liệu liên quan đến nghĩa vụ thuế, bao gồm cả thông tin đầu tư, chủ sở hữu, tài khoản ngân hàng, tài chính và giải trình liên quan đến khai, tính, nộp thuế, khoản thu khác; yêu cầu tổ chức, cá nhân liên quan cung cấp thông tin, tài liệu phục vụ công tác quản lý thuế, trao đổi thông tin với cơ quan thuế nước ngoài theo điều ước quốc tế hoặc thỏa thuận quốc tế về thuế và phối hợp thực hiện nghĩa vụ thuế; mua và sử dụng thông tin, dữ liệu trong và ngoài nước phục vụ công tác quản lý thuế; sử dụng thông tin từ cơ sở dữ liệu quốc gia và các cơ sở dữ liệu chuyên ngành để thực hiện quản lý thuế và giải quyết thủ tục hành chính;"},{"k":"p","t":"b) Thực hiện kiểm tra thuế; ấn định thuế theo quy định; cưỡng chế thi hành quyết định hành chính về thuế; xử phạt vi phạm hành chính và công khai trường hợp vi phạm trên phương tiện thông tin đại chúng; áp dụng biện pháp ngăn chặn và bảo đảm xử phạt vi phạm theo quy định của pháp luật, bao gồm cả yêu cầu tạm ngừng kinh doanh, yêu cầu cơ quan đăng ký kinh doanh tạm dừng thực hiện thay đổi nội dung đăng ký doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, hộ kinh doanh khi đang xử lý vi phạm thuế; ủy nhiệm thu thuế cho tổ chức, cá nhân theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Chính phủ quy định chi tiết khoản 1 Điều này."}]},{"id":"luat-108_39","no":39,"code":"Điều 39","title":"Điều 39. Nhiệm vụ, trách nhiệm và quyền hạn của các cơ quan nhà nước, các cơ quan kiểm tra, giám sát, Mặt trận Tổ quốc Việt Nam, các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong quản lý thuế","shortTitle":"Nhiệm vụ, trách nhiệm và quyền hạn của các cơ quan nhà nước, các cơ quan kiểm tra, giám sát, Mặt trận Tổ quốc Việt Nam, các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong quản lý thuế","chuong":"Chương VI — QUYỀN, NGHĨA VỤ; NHIỆM VỤ, QUYỀN HẠN CỦA BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ có nhiệm vụ, quyền hạn sau đây:"},{"k":"p","t":"a) Thống nhất quản lý nhà nước về quản lý thuế, bảo đảm sự phối hợp chặt chẽ giữa cơ quan quản lý ngành và địa phương trong quản lý thuế;"},{"k":"p","t":"b) Gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt cho các đối tượng, ngành, nghề sản xuất, kinh doanh trong trường hợp khó khăn đặc biệt trong từng thời kỳ nhất định;"},{"k":"p","t":"c) Báo cáo Quốc hội, Ủy ban Thường vụ Quốc hội, Chủ tịch nước về tình hình quản lý thuế theo yêu cầu."},{"k":"p","t":"2. Bộ Tài chính có nhiệm vụ giúp Chính phủ thống nhất quản lý nhà nước về thuế và các khoản thu khác thuộc ngân sách nhà nước."},{"k":"p","t":"3. Các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ theo phạm vi quản lý nhà nước có trách nhiệm sau đây:"},{"k":"p","t":"a) Phối hợp với Bộ Tài chính trong việc triển khai chính sách thuế, quản lý thuế, thực hiện chuyển đổi số, chia sẻ thông tin, dữ liệu để phòng ngừa các hành vi trốn thuế, gian lận thuế, thất thu ngân sách trong các hoạt động kinh doanh trên nền tảng số, thương mại điện tử, dịch vụ xuyên biên giới, các mô hình kinh doanh mới và các lĩnh vực kinh doanh khác;"},{"k":"p","t":"b) Kết nối, chia sẻ thông tin phục vụ quản lý thuế với cơ quan quản lý thuế bằng hình thức điện tử."},{"k":"p","t":"4. Hội đồng nhân dân các cấp, trong phạm vi nhiệm vụ, quyền hạn của mình, quyết định nhiệm vụ thu ngân sách hằng năm và giám sát việc thực hiện pháp luật về thuế tại địa phương."},{"k":"p","t":"5. Ủy ban nhân dân các cấp, trong phạm vi nhiệm vụ, quyền hạn của mình, có nhiệm vụ sau đây:"},{"k":"p","t":"a) Chỉ đạo các cơ quan có liên quan tại địa phương phối hợp với cơ quan quản lý thuế lập dự toán và tổ chức thực hiện nhiệm vụ thu thuế, các khoản thu khác thuộc ngân sách nhà nước trên địa bàn; thực hiện kê biên tài sản, bán đấu giá tài sản đối với người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên;"},{"k":"p","t":"b) Phối hợp với Bộ Tài chính, cơ quan quản lý thuế và cơ quan khác có thẩm quyền trong việc quản lý, thực hiện pháp luật về thuế;"},{"k":"p","t":"c) Xử phạt vi phạm hành chính và giải quyết khiếu nại, tố cáo liên quan đến việc thực hiện pháp luật về thuế theo thẩm quyền;"},{"k":"p","t":"d) Thực hiện chức năng quản lý nhà nước về phí, lệ phí và thu khác của ngân sách nhà nước không do cơ quan quản lý thuế quản lý thu thuộc thẩm quyền của Ủy ban nhân dân các cấp."},{"k":"p","t":"6. Cơ quan nhà nước, tổ chức được giao quản lý thu đối với các khoản thu khác thuộc ngân sách nhà nước thực hiện tổ chức thu vào ngân sách nhà nước theo quy định của pháp luật chuyên ngành và được áp dụng quy định về tính tiền chậm nộp, xử lý số tiền nộp thừa theo quy định của Luật này, kiến nghị cơ quan nhà nước có thẩm quyền thực hiện các biện pháp cưỡng chế quy định tại các điểm c, d, h khoản 1 Điều 49 của Luật này, bao gồm:"},{"k":"p","t":"a) Tiền thu từ xử phạt vi phạm hành chính do cơ quan nhà nước, tổ chức được giao quản lý thu thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính;"},{"k":"p","t":"b) Tiền nộp ngân sách nhà nước theo quy định của pháp luật về quản lý, sử dụng tài sản công từ việc quản lý, sử dụng, khai thác tài sản công vào mục đích kinh doanh, cho thuê, liên doanh, liên kết, xử lý tài sản công sau khi thực hiện nghĩa vụ thuế, phí, lệ phí;"},{"k":"p","t":"c) Tiền cấp quyền sử dụng tần số vô tuyến điện;"},{"k":"p","t":"d) Thu viện trợ;"},{"k":"p","t":"đ) Tiền chậm nộp các khoản thu thuộc khoản này;"},{"k":"p","t":"e) Các khoản thu khác theo quy định của pháp luật."},{"k":"p","t":"7. Cơ quan nhà nước, tổ chức được giao thu phí, lệ phí thực hiện tổ chức thu vào ngân sách nhà nước theo quy định của Luật Phí và lệ phí; được áp dụng quy định về tính tiền chậm nộp, xử lý số tiền nộp thừa theo quy định của Luật này, kiến nghị cơ quan nhà nước có thẩm quyền thực hiện các biện pháp cưỡng chế quy định tại các điểm c, d, h khoản 1 Điều 49 của Luật này."},{"k":"p","t":"8. Các cơ quan nhà nước có trách nhiệm cung cấp thông tin người nộp thuế cho cơ quan quản lý thuế thông qua phương thức điện tử:"},{"k":"p","t":"a) Cơ quan cấp các loại giấy chứng nhận, giấy phép có nhiệm vụ cung cấp thông tin về nội dung giấy chứng nhận đăng ký đầu tư, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, thông tin về chủ sở hữu, giấy phép hành nghề, giấy phép thành lập và hoạt động, giấy chứng nhận thay đổi nội dung đăng ký kinh doanh của tổ chức, cá nhân và cung cấp thông tin khác theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"b) Kho bạc Nhà nước cung cấp thông tin về số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đã nộp, đã hoàn của người nộp thuế;"},{"k":"p","t":"c) Cơ quan quản lý nhà nước về nhà, đất cung cấp thông tin về hiện trạng sử dụng đất, sở hữu nhà của tổ chức, hộ gia đình, hộ kinh doanh, cá nhân kinh doanh;"},{"k":"p","t":"d) Cơ quan công an cung cấp, trao đổi thông tin khi phát hiện người nộp thuế có hành vi vi phạm có dấu hiệu tội phạm trong lĩnh vực thuế; cung cấp thông tin về xuất cảnh, nhập cảnh và thông tin về đăng ký, quản lý phương tiện giao thông của người nộp thuế;"},{"k":"p","t":"đ) Cơ quan quản lý nhà nước về thương mại cung cấp thông tin về chính sách quản lý hàng hóa xuất khẩu, nhập khẩu, quá cảnh của Việt Nam và nước ngoài; thông tin về quản lý thị trường;"},{"k":"p","t":"e) Tòa án cung cấp, trao đổi thông tin về việc giải quyết phục hồi, phá sản, người bị Tòa án tuyên bố hoặc hủy bỏ quyết định tuyên bố là đã chết hoặc đã mất tích hoặc mất năng lực hành vi dân sự, thông tin về thừa kế theo pháp luật về dân sự;"},{"k":"p","t":"g) Cơ quan nhà nước cung cấp đầy đủ, kịp thời, chính xác thông tin theo yêu cầu của cơ quan thuế để thực hiện các thỏa thuận quốc tế hoặc điều ước quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết."},{"k":"p","t":"9. Nhiệm vụ, quyền hạn của Kiểm toán nhà nước:"},{"k":"p","t":"a) Thực hiện kiểm toán đối với hoạt động của cơ quan quản lý thuế theo quy định của pháp luật về kiểm toán nhà nước, pháp luật về thuế và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Trường hợp Kiểm toán nhà nước trực tiếp kiểm toán người nộp thuế theo quy định của Luật Kiểm toán nhà nước có nội dung kiến nghị về nghĩa vụ thuế và khoản thu khác phải nộp ngân sách nhà nước của người nộp thuế thì Kiểm toán nhà nước có trách nhiệm xác định hành vi vi phạm trong lĩnh vực quản lý thuế của người nộp thuế và gửi biên bản hoặc báo cáo kiểm toán cho người nộp thuế và người nộp thuế có trách nhiệm thực hiện kiến nghị theo biên bản, báo cáo kiểm toán của Kiểm toán nhà nước. Cơ quan quản lý thuế căn cứ hành vi vi phạm hành chính của người nộp thuế tại văn bản do Kiểm toán nhà nước lập và gửi cho cơ quan quản lý thuế để tiến hành xử phạt vi phạm hành chính về quản lý thuế theo quy định tại Luật Xử lý vi phạm hành chính và Luật này. Trường hợp người nộp thuế không đồng ý với kiến nghị của Kiểm toán nhà nước thì người nộp thuế có quyền khiếu nại kiến nghị của Kiểm toán nhà nước;"},{"k":"p","t":"c) Trường hợp Kiểm toán nhà nước không trực tiếp kiểm toán đối với người nộp thuế mà thực hiện kiểm toán tại cơ quan quản lý thuế có nội dung kiến nghị nêu trong báo cáo kiểm toán liên quan đến nghĩa vụ thuế và khoản thu khác phải nộp ngân sách nhà nước của người nộp thuế thì Kiểm toán nhà nước có trách nhiệm xác định hành vi vi phạm trong lĩnh vực quản lý thuế của người nộp thuế và gửi bản trích sao các văn bản có kiến nghị liên quan đến nghĩa vụ thuế và khoản thu khác phải nộp cho người nộp thuế để thực hiện. Cơ quan quản lý thuế có trách nhiệm tổ chức thực hiện kiến nghị của Kiểm toán nhà nước. Trường hợp người nộp thuế không đồng ý với nghĩa vụ thuế và khoản thu khác phải nộp thì người nộp thuế có văn bản đề nghị cơ quan quản lý thuế, Kiểm toán nhà nước xem xét lại nghĩa vụ thuế và khoản thu khác phải nộp. Căn cứ đề nghị của người nộp thuế, Kiểm toán nhà nước chủ trì, phối hợp với cơ quan quản lý thuế thực hiện việc xác định chính xác nghĩa vụ thuế và khoản thu khác của người nộp thuế và chịu trách nhiệm theo quy định của pháp luật."},{"k":"p","t":"10. Nhiệm vụ, quyền hạn của cơ quan thanh tra:"},{"k":"p","t":"a) Thực hiện thanh tra hoạt động của cơ quan quản lý thuế theo quy định của pháp luật về thanh tra, pháp luật về thuế và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Trường hợp cơ quan thanh tra trực tiếp thanh tra người nộp thuế theo quy định của Luật Thanh tra có nội dung kết luận về nghĩa vụ thuế và khoản thu khác phải nộp ngân sách nhà nước của người nộp thuế thì cơ quan thanh tra có trách nhiệm xác định hành vi vi phạm trong lĩnh vực quản lý thuế của người nộp thuế và gửi biên bản, kết luận hoặc quyết định xử lý sau thanh tra cho người nộp thuế và người nộp thuế có trách nhiệm thực hiện kết luận hoặc quyết định xử lý sau thanh tra của cơ quan thanh tra. Cơ quan quản lý thuế căn cứ hành vi vi phạm hành chính của người nộp thuế tại văn bản do cơ quan thanh tra lập và gửi cho cơ quan quản lý thuế để tiến hành xử phạt vi phạm hành chính về quản lý thuế theo quy định của Luật Xử lý vi phạm hành chính và Luật này. Trường hợp người nộp thuế không đồng ý với kết luận, quyết định xử lý sau thanh tra và việc xác định hành vi vi phạm trong lĩnh vực quản lý thuế của cơ quan thanh tra thì người nộp thuế có quyền khiếu nại kết luận, quyết định của cơ quan thanh tra;"},{"k":"p","t":"c) Trường hợp cơ quan thanh tra không trực tiếp thanh tra đối với người nộp thuế mà thực hiện thanh tra tại cơ quan quản lý thuế có nội dung kiến nghị nêu trong kết luận thanh tra hoặc quyết định xử lý sau thanh tra liên quan đến nghĩa vụ thuế và khoản thu khác phải nộp ngân sách nhà nước của người nộp thuế thì cơ quan thanh tra có trách nhiệm xác định hành vi vi phạm trong lĩnh vực quản lý thuế của người nộp thuế và gửi bản trích sao có kết luận hoặc quyết định xử lý sau thanh tra liên quan đến nghĩa vụ thuế và khoản thu khác phải nộp cho người nộp thuế để thực hiện. Cơ quan quản lý thuế có trách nhiệm tổ chức thực hiện kết luận hoặc quyết định xử lý sau thanh tra của cơ quan thanh tra. Trường hợp người nộp thuế không đồng ý với nghĩa vụ thuế và khoản thu khác phải nộp thì người nộp thuế có văn bản đề nghị cơ quan quản lý thuế, cơ quan thanh tra xem xét lại nghĩa vụ thuế, khoản thu khác phải nộp. Căn cứ đề nghị của người nộp thuế, cơ quan thanh tra chủ trì, phối hợp với cơ quan quản lý thuế thực hiện việc xác định chính xác nghĩa vụ thuế, khoản thu khác của người nộp thuế và chịu trách nhiệm theo quy định của pháp luật."},{"k":"p","t":"11. Cơ quan điều tra, Viện kiểm sát, Tòa án trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm tiếp nhận, xử lý, giải quyết tin báo, tố giác tội phạm và kiến nghị khởi tố, khởi tố, điều tra, truy tố, xét xử kịp thời, nghiêm minh tội phạm trong lĩnh vực thuế theo quy định của pháp luật và thông báo kết quả xử lý cho cơ quan quản lý thuế."},{"k":"p","t":"12. Nhiệm vụ, quyền hạn của cơ quan nhà nước có thẩm quyền trong kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí, lệ phí:"},{"k":"p","t":"a) Thực hiện kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí, lệ phí đối với cơ quan quản lý thuế các cấp và tổ chức thu phí, lệ phí theo quy định của pháp luật kiểm tra chuyên ngành;"},{"k":"p","t":"b) Tổ chức kiểm tra, giám sát theo kế hoạch định kỳ hoặc đột xuất, tổng thể hoặc chuyên đề tại trụ sở cơ quan kiểm tra hoặc tại đơn vị được kiểm tra, giám sát;"},{"k":"p","t":"c) Ban hành quyết định kiểm tra bằng văn bản, lập biên bản kiểm tra và tuân thủ đúng trình tự, thủ tục theo quy định của pháp luật kiểm tra chuyên ngành;"},{"k":"p","t":"d) Yêu cầu đơn vị được kiểm tra, giám sát và cơ quan, tổ chức, cá nhân liên quan giải trình cung cấp đầy đủ, đúng thời hạn hồ sơ, tài liệu phục vụ công tác kiểm tra, giám sát  và chịu trách nhiệm trước pháp luật về tính chính xác, trung thực của thông tin được cung cấp."},{"k":"p","t":"13. Nhiệm vụ, quyền hạn của Mặt trận Tổ quốc Việt Nam:"},{"k":"p","t":"a) Tuyên truyền, vận động các tầng lớp nhân dân nghiêm chỉnh thi hành pháp luật về thuế;"},{"k":"p","t":"b) Thực hiện giám sát, phản biện xã hội về thuế; phản ánh, kiến nghị với cơ quan nhà nước xem xét, giải quyết các vấn đề về thuế theo quy định của pháp luật."},{"k":"p","t":"14. Các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp có nhiệm vụ phối hợp với cơ quan quản lý thuế trong việc tuyên truyền, phổ biến, giáo dục pháp luật về thuế đến các hội viên và cung cấp thông tin liên quan đến việc quản lý thuế."},{"k":"p","t":"15. Chính phủ quy định chi tiết Điều này và các nội dung sau: nội dung, hình thức, phạm vi, thời hạn cung cấp thông tin, trách nhiệm, quyền hạn của các bên liên quan trong việc chia sẻ, kết nối thông tin phục vụ quản lý thuế."}]},{"id":"luat-108_40","no":40,"code":"Điều 40","title":"Điều 40. Nhiệm vụ, trách nhiệm và quyền hạn của tổ chức, cá nhân khác trong quản lý thuế","shortTitle":"Nhiệm vụ, trách nhiệm và quyền hạn của tổ chức, cá nhân khác trong quản lý thuế","chuong":"Chương VI — QUYỀN, NGHĨA VỤ; NHIỆM VỤ, QUYỀN HẠN CỦA BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thông tin, báo chí có nhiệm vụ, quyền hạn sau:"},{"k":"p","t":"a) Tuyên truyền, phổ biến chính sách, pháp luật về thuế, nêu gương tổ chức, cá nhân thực hiện tốt pháp luật về thuế, phản ánh và phê phán các hành vi vi phạm pháp luật về thuế;"},{"k":"p","t":"b) Phối hợp với các cơ quan quản lý thuế trong việc đăng tải, cung cấp thông tin theo quy định của pháp luật."},{"k":"p","t":"2. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán có nhiệm vụ, quyền hạn sau:"},{"k":"p","t":"a) Phối hợp với cơ quan quản lý thuế, Kho bạc Nhà nước trong việc thực hiện nộp thuế, khoản thu khác điện tử, hoàn thuế điện tử cho người nộp thuế; xử lý, đối soát dữ liệu về nộp thuế, khoản thu khác điện tử, hoàn thuế điện tử; truyền, nhận chứng từ nộp thuế điện tử, chuyển tiền vào ngân sách và gửi thông tin cho cơ quan quản lý thuế đầy đủ, chính xác, kịp thời theo quy định của pháp luật; không được hủy lệnh chuyển tiền sau khi thông tin nộp thuế đã được chuyển đến cơ quan quản lý thuế; hỗ trợ người nộp thuế trong quá trình thực hiện nộp thuế điện tử; bảo mật thông tin của người nộp thuế, người khai hải quan theo quy định của pháp luật;"},{"k":"p","t":"b) Định kỳ cung cấp thông tin về số hiệu tài khoản thanh toán theo mã số thuế của người nộp thuế khi mở, đóng tài khoản thanh toán tại tổ chức cung ứng dịch vụ thanh toán được mở tài khoản thanh toán;"},{"k":"p","t":"c) Thực hiện kết nối, chia sẻ các thông tin liên quan đến giao dịch và các thông tin khác của người nộp thuế để phục vụ quản lý thuế; cung cấp các thông tin, các giao dịch bất thường, cung cấp đầy đủ, kịp thời, chính xác thông tin theo yêu cầu của cơ quan thuế để thực hiện các điều ước quốc tế hoặc thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"d) Tiếp nhận các quyết định cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế bằng phương thức điện tử; trích tiền để nộp thuế, khoản thu khác từ tài khoản của người nộp thuế, phong tỏa tài khoản của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế theo đề nghị của cơ quan quản lý thuế;"},{"k":"p","t":"đ) Trường hợp người nộp thuế có bảo lãnh về tiền thuế phải nộp, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước theo quy định của Luật này nhưng người nộp thuế không nộp đúng thời hạn thì tổ chức bảo lãnh phải chịu trách nhiệm nộp đủ tiền thuế, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước thay cho người nộp thuế trong phạm vi bảo lãnh đã thỏa thuận tại hợp đồng, thỏa thuận, cam kết và thời hạn bảo lãnh;"},{"k":"p","t":"e) Tổ chức cung ứng dịch vụ thanh toán (không bao gồm Ngân hàng nhà nước) cung cấp thông tin về hàng hóa nhập khẩu được thế chấp làm tài sản bảo đảm các khoản vay theo yêu cầu của cơ quan hải quan;"},{"k":"p","t":"g) Trường hợp bên nhận bảo đảm (không bao gồm Ngân hàng nhà nước) bán tài sản bảo đảm để xử lý nợ theo quy định của pháp luật về xử lý tài sản bảo đảm và pháp luật về các tổ chức tín dụng thì bên nhận bảo đảm hoặc người mua theo thỏa thuận theo pháp luật về dân sự có trách nhiệm kê khai, nộp đầy đủ các nghĩa vụ thuế liên quan đến giao dịch xử lý tài sản bảo đảm thay cho bên bảo đảm."},{"k":"p","t":"Trường hợp bán tài sản bảo đảm là hàng hoá nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế thì bên bán tài sản bảo đảm hoặc người mua theo thỏa thuận theo pháp luật về dân sự có trách nhiệm kê khai, nộp đầy đủ các nghĩa vụ thuế liên quan đến tài sản bảo đảm thay cho bên bảo đảm;"},{"k":"p","t":"h) Đối với số tiền thuế, khoản thu khác chậm nộp hoặc nộp không đầy đủ vào ngân sách nhà nước do lỗi của tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán dẫn đến người nộp thuế bị tính tiền chậm nộp thì tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán có trách nhiệm thanh toán tiền chậm nộp cho người nộp thuế theo quy định của Luật này;"},{"k":"p","t":"i) Tổ chức cung ứng dịch vụ trung gian thanh toán có trách nhiệm phối hợp với cơ quan quản lý thuế trong công tác thu thuế."},{"k":"p","t":"3. Các tổ chức, cá nhân khác có nhiệm vụ, trách nhiệm và quyền hạn sau:"},{"k":"p","t":"a) Cung cấp thông tin liên quan đến việc xác định người nộp thuế, nghĩa vụ thuế, cung cấp đầy đủ, kịp thời, chính xác thông tin theo yêu cầu của cơ quan quản lý thuế để thực hiện các điều ước quốc tế hoặc thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết theo đề nghị của cơ quan quản lý thuế;"},{"k":"p","t":"b) Phối hợp với cơ quan quản lý thuế trong việc thực hiện các quyết định xử phạt vi phạm hành chính về quản lý thuế;"},{"k":"p","t":"c) Tố giác hành vi vi phạm pháp luật về thuế đến cơ quan quản lý thuế hoặc cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"d) Yêu cầu người bán hàng, người cung cấp dịch vụ phải giao hóa đơn, chứng từ bán hàng hóa, dịch vụ đúng số lượng, chủng loại, giá trị thực thanh toán khi mua hàng hóa, dịch vụ;"},{"k":"p","t":"đ) Người được uỷ quyền, bảo lãnh hoặc nộp thuế thay cho người nộp thuế có trách nhiệm cung cấp thông tin về hàng hoá xuất khẩu, nhập khẩu cho cơ quan quản lý thuế để làm căn cứ ấn định thuế theo quy định tại Điều 25 của Luật này;"},{"k":"p","t":"e) Các cơ quan, tổ chức, cá nhân khác có liên quan đến người nộp thuế có trách nhiệm phối hợp cung cấp thông tin phục vụ công tác quản lý thuế bằng văn bản giấy hoặc văn bản điện tử theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"g) Tổ chức quản lý nền tảng thương mại điện tử, tổ chức cung cấp dịch vụ tài sản số, tổ chức cung cấp dịch vụ logistic, các tổ chức thẻ quốc tế, tổ chức nước ngoài cung cấp dịch vụ thanh toán, dịch vụ trung gian thanh toán, dịch vụ xử lý giao dịch điện tử cho các tổ chức, cá nhân tại Việt Nam có trách nhiệm cung cấp thông tin định kỳ hoặc theo yêu cầu cho cơ quan quản lý thuế;"},{"k":"p","t":"h) Tổ chức, cá nhân chi trả thu nhập cung cấp thông tin về chi trả thu nhập và số tiền thuế khấu trừ của người nộp thuế, số tiền thuế, khoản thu khác đã kê khai thay, nộp thay cho cơ quan quản lý thuế theo quy định của Chính phủ;"},{"k":"p","t":"i) Bên thứ ba đang có khoản nợ hoặc giữ tiền, tài sản khác của đối tượng bị cưỡng chế cung cấp thông tin về khoản nợ hoặc khoản tiền, tài sản khác đang nắm giữ của đối tượng thuộc diện cưỡng chế và có trách nhiệm nộp tiền thuế nợ thay cho đối tượng bị cưỡng chế;"},{"k":"p","t":"k) Cơ quan, tổ chức thu tiền bán đấu giá có trách nhiệm cung cấp thông tin về tên hàng, số lượng, trị giá đã được kê biên, bán đấu giá cho cơ quan hải quan để thực hiện ấn định thuế đối với hàng hóa nhập khẩu chưa hoàn thành thủ tục hải quan bị cơ quan hải quan kê biên, bán đấu giá để cưỡng chế thi hành quyết định hành chính về quản lý thuế trong lĩnh vực hải quan, hàng hóa thuộc đối tượng miễn thuế, không chịu thuế bị kê biên, bán đấu giá theo quyết định của cơ quan có thẩm quyền, bản án, quyết định của Tòa án thuộc đối tượng phải nộp thuế;"},{"k":"p","t":"l) Trường hợp tổ chức bán đấu giá thực hiện việc bán tài sản bảo đảm để xử lý nghĩa vụ của người nộp thuế, nếu quyền sở hữu, quyền sử dụng tài sản đã được chuyển sang tổ chức bán đấu giá thì tổ chức bán đấu giá có trách nhiệm kê khai, nộp thuế, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước phát sinh từ tài sản bảo đảm. Nếu tài sản bảo đảm vẫn thuộc quyền sở hữu, quyền sử dụng của người nộp thuế thì tổ chức bán đấu giá có trách nhiệm khấu trừ, nộp thay nghĩa vụ thuế, khoản thu khác của người nộp thuế liên quan đến tài sản bảo đảm theo quy định. Tổ chức bán đấu giá có trách nhiệm kê khai, nộp đầy đủ nghĩa vụ thuế có liên quan đến tài sản bảo đảm là hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế theo quy định thay người nộp thuế."},{"k":"p","t":"4. Trường hợp các tổ chức quy định tại các điểm a, b, c, d, đ và e khoản 3 Điều này phát hiện sai, sót cần điều chỉnh đối với thông tin đã trao đổi, cung cấp giữa các cơ quan thì gửi hồ sơ tra soát, điều chỉnh thông tin theo quy định."},{"k":"p","t":"5. Đại lý thuế, hộ kinh doanh, cá nhân kinh doanh dịch vụ làm thủ tục về thuế:"},{"k":"p","t":"a) Đại lý thuế là doanh nghiệp được thành lập và hoạt động theo quy định của pháp luật, có ít nhất 02 người có đủ tiêu chuẩn kinh doanh dịch vụ tư vấn thuế, làm việc toàn thời gian tại doanh nghiệp, thực hiện các dịch vụ làm thủ tục về thuế theo thỏa thuận với người nộp thuế;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh dịch vụ làm thủ tục về thuế là cá nhân có đủ tiêu chuẩn kinh doanh dịch vụ tư vấn thuế và hoạt động theo quy định của pháp luật, thực hiện các dịch vụ làm thủ tục về thuế theo thỏa thuận với người nộp thuế;"},{"k":"p","t":"c) Dịch vụ do đại lý thuế, hộ kinh doanh, cá nhân kinh doanh dịch vụ làm thủ tục về thuế cung cấp cho người nộp thuế theo hợp đồng bao gồm: thủ tục đăng ký thuế, khai thuế, nộp thuế, quyết toán thuế, lập hồ sơ đề nghị miễn thuế, giảm thuế, hoàn thuế và các thủ tục về thuế khác thay người nộp thuế; dịch vụ tư vấn thuế; dịch vụ kế toán theo quy định của pháp luật về kế toán;"},{"k":"p","t":"d) Đại lý thuế, hộ kinh doanh, cá nhân kinh doanh dịch vụ làm thủ tục về thuế có quyền, nghĩa vụ sau: tuân thủ quy định của Luật này, pháp luật về thuế và quy định khác của pháp luật có liên quan trong hoạt động hành nghề dịch vụ làm thủ tục về thuế; chịu trách nhiệm trước pháp luật và chịu trách nhiệm trước người nộp thuế về nội dung dịch vụ đã cung cấp."},{"k":"p","t":"6. Đại lý làm thủ tục hải quan thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính quy định việc quản lý hoạt động kinh doanh dịch vụ làm thủ tục về thuế."},{"k":"p","t":"8. Chính phủ quy định chi tiết các nội dung sau: nhiệm vụ, quyền hạn của cơ quan thông tin, báo chí và tổ chức tín dụng, chi nhánh ngân hàng nước ngoài,  tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức cung ứng dịch vụ thanh toán trực tuyến và nội dung, hình thức, phương thức và thời hạn cung cấp thông tin trong việc chia sẻ, kết nối thông tin phục vụ quản lý thuế quy định tại Điều này; tiêu chuẩn kinh doanh dịch vụ làm thủ tục về thuế."}]},{"id":"luat-108_41","no":41,"code":"Điều 41","title":"Điều 41. Khiếu nại, tố cáo, giải quyết tranh chấp về thuế","shortTitle":"Khiếu nại, tố cáo, giải quyết tranh chấp về thuế","chuong":"Chương VII — KHIẾU NẠI, TỐ CÁO, GIẢI QUYẾT TRANH CHẤP","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế, tổ chức, cá nhân có quyền khiếu nại với cơ quan có thẩm quyền đối với quyết định hành chính, hành vi hành chính của cơ quan quản lý thuế, người có thẩm quyền của cơ quan quản lý thuế khi có căn cứ cho rằng quyết định hoặc hành vi đó là trái pháp luật, xâm phạm trực tiếp đến quyền, lợi ích hợp pháp của mình. Người khiếu nại được biết trình tự, thủ tục giải quyết khiếu nại trên Hệ thống thông tin quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"2. Cá nhân có quyền tố cáo hành vi vi phạm pháp luật về thuế của người nộp thuế, công chức quản lý thuế hoặc tổ chức, cá nhân khác."},{"k":"p","t":"3. Thẩm quyền, trình tự, thủ tục giải quyết khiếu nại, tố cáo được thực hiện theo quy định của pháp luật về khiếu nại, tố cáo."},{"k":"p","t":"4. Tranh chấp về thuế có yếu tố nước ngoài giữa người nộp thuế là tổ chức, cá nhân nước ngoài hoặc Việt Nam với cơ quan quản lý thuế Việt Nam, liên quan đến nghĩa vụ thuế phát sinh tại Việt Nam hoặc tại nước ngoài có thể được giải quyết thông qua:"},{"k":"p","t":"a) Trình tự, thủ tục khiếu nại theo quy định của pháp luật về khiếu nại;"},{"k":"p","t":"b) Trình tự, thủ tục tố tụng theo quy định của pháp luật về tố tụng hành chính;"},{"k":"p","t":"c) Cơ chế giải quyết tranh chấp được quy định tại hợp đồng, thỏa thuận và cam kết bảo lãnh của Chính phủ và điều ước quốc tế về thuế, điều ước quốc tế khác mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết (nếu có)."}]},{"id":"luat-108_42","no":42,"code":"Điều 42","title":"Điều 42. Trách nhiệm và quyền hạn của cơ quan quản lý thuế trong việc giải quyết khiếu nại về thuế","shortTitle":"Trách nhiệm và quyền hạn của cơ quan quản lý thuế trong việc giải quyết khiếu nại về thuế","chuong":"Chương VII — KHIẾU NẠI, TỐ CÁO, GIẢI QUYẾT TRANH CHẤP","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế nhận được khiếu nại về việc thực hiện pháp luật về thuế có quyền yêu cầu người khiếu nại cung cấp hồ sơ, tài liệu liên quan đến việc khiếu nại; nếu người khiếu nại từ chối cung cấp hồ sơ, tài liệu thì có quyền từ chối xem xét giải quyết khiếu nại."},{"k":"p","t":"2. Cơ quan quản lý thuế phải hoàn trả số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt thu không đúng cho người nộp thuế, bên thứ ba trong thời hạn 15 ngày kể từ ngày nhận được quyết định xử lý của cơ quan có thẩm quyền."},{"k":"p","t":"3. Đối với vụ việc khiếu nại phức tạp, thủ trưởng cơ quan quản lý thuế là người giải quyết khiếu nại thực hiện tham vấn các cơ quan, tổ chức có liên quan, bao gồm cả khiếu nại lần đầu. Khi thực hiện việc tham vấn, thủ trưởng cơ quan quản lý thuế phải ban hành quyết định thành lập Hội đồng tham vấn. Hội đồng tham vấn hoạt động theo nguyên tắc tập thể, biểu quyết theo đa số. Kết quả biểu quyết là cơ sở để thủ trưởng cơ quan quản lý thuế tham khảo khi ra quyết định xử lý khiếu nại. Thủ trưởng cơ quan quản lý thuế là người ra quyết định và chịu trách nhiệm về quyết định xử lý khiếu nại."}]},{"id":"luat-108_43","no":43,"code":"Điều 43","title":"Điều 43. Khởi kiện","shortTitle":"Khởi kiện","chuong":"Chương VII — KHIẾU NẠI, TỐ CÁO, GIẢI QUYẾT TRANH CHẤP","muc":"","level":1,"content":[{"k":"p","t":"Việc khởi kiện đối với quyết định hành chính, hành vi hành chính của cơ quan quản lý thuế, người có thẩm quyền của cơ quan quản lý thuế, cơ quan nhà nước được thực hiện theo quy định của pháp luật về tố tụng hành chính."},{"k":"p","t":"XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ"}]},{"id":"luat-108_44","no":44,"code":"Điều 44","title":"Điều 44. Nguyên tắc xử phạt vi phạm hành chính về quản lý thuế","shortTitle":"Nguyên tắc xử phạt vi phạm hành chính về quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Việc xử phạt vi phạm hành chính về quản lý thuế được thực hiện theo quy định của pháp luật về quản lý thuế và pháp luật về xử lý vi phạm hành chính."},{"k":"p","t":"2. Trường hợp không xử phạt vi phạm hành chính về quản lý thuế:"},{"k":"p","t":"a) Trường hợp người nộp thuế có hành vi khai sai quy định tại khoản 2 Điều 45 của Luật này nhưng đã khai bổ sung hồ sơ khai thuế và đã tự giác nộp đủ số tiền thuế phải nộp trước thời điểm cơ quan thuế công bố quyết định kiểm tra thuế, cơ quan có thẩm quyền khác công bố quyết định thanh tra, kiểm tra tại trụ sở người nộp thuế hoặc trước thời điểm cơ quan thuế phát hiện không qua kiểm tra thuế tại trụ sở của người nộp thuế hoặc trước khi cơ quan có thẩm quyền khác phát hiện; cá nhân trực tiếp quyết toán thuế thu nhập cá nhân chậm nộp hồ sơ quyết toán thuế thu nhập cá nhân mà có phát sinh số tiền thuế được hoàn và các trường hợp không bị xử phạt vi phạm hành chính khác quy định tại Luật này, quy định khác của pháp luật có liên quan và các trường hợp khác theo quy định của Chính phủ;"},{"k":"p","t":"b) Trường hợp người nộp thuế có hành vi khai sai quy định tại khoản 3 Điều 45 của Luật này nhưng đã khai bổ sung trước thời điểm cơ quan hải quan thông báo việc kiểm tra trực tiếp hồ sơ hải quan đối với hàng hóa đang làm thủ tục hải quan; Người nộp thuế khai bổ sung trong thời hạn 60 ngày kể từ ngày thông quan và trước thời điểm quyết định thanh tra, kiểm tra đối với hàng hóa đã thông quan, kiểm tra sau thông quan và các trường hợp khác theo quy định của Chính phủ."},{"k":"p","t":"3. Việc áp dụng mức phạt tiền trong xử phạt vi phạm hành chính về quản lý thuế được thực hiện như sau:"},{"k":"p","t":"a)  Phạt 10% tính trên số tiền thuế khai thiếu số tiền thuế phải nộp hoặc số tiền thuế khai tăng trong trường hợp được miễn, giảm, hoàn, không thu thuế đối với hành vi quy định tại điểm a khoản 3 Điều 45 của Luật này;"},{"k":"p","t":"b)  Phạt 20% tính trên số tiền thuế khai thiếu số tiền thuế phải nộp hoặc số tiền thuế khai tăng trong trường hợp được miễn, giảm, hoàn, không thu thuế đối với hành vi quy định tại khoản 2 và điểm b, điểm c khoản 3 Điều 45 của Luật này;"},{"k":"p","t":"c) Phạt từ 01 lần đến 03 lần số tiền thuế trốn đối với hành vi quy định tại khoản 4 Điều 45 của Luật này."},{"k":"p","t":"4. Đối với cùng một hành vi vi phạm hành chính về quản lý thuế thì mức phạt tiền đối với tổ chức bằng 02 lần mức phạt tiền đối với cá nhân. Riêng đối với hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu và hành vi trốn thuế thì mức phạt tiền không phân biệt giữa tổ chức và cá nhân."},{"k":"p","t":"5. Trường hợp người nộp thuế bị ấn định thuế theo quy định tại Điều 24 và Điều 25 của Luật này thì tùy theo tính chất, mức độ của hành vi vi phạm có thể bị xử phạt vi phạm hành chính về quản lý thuế theo quy định của Luật này."},{"k":"p","t":"6. Trường hợp vi phạm pháp luật về quản lý thuế đến mức phải truy cứu trách nhiệm hình sự thì thực hiện theo quy định của pháp luật về hình sự."},{"k":"p","t":"7. Đối với hành vi vi phạm thủ tục thuế thì thời hiệu xử phạt là 02 năm. Đối với hành vi trốn thuế chưa đến mức truy cứu trách nhiệm hình sự, hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu thì thời hiệu xử phạt là 05 năm. Thời điểm để tính thời hiệu xử phạt vi phạm hành chính thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính."},{"k":"p","t":"8. Quá thời hiệu xử phạt vi phạm hành chính về quản lý thuế thì người nộp thuế không bị xử phạt nhưng vẫn phải nộp đủ số tiền thuế thiếu, số tiền thuế trốn, số tiền thuế được miễn, giảm, hoàn, không thu không đúng, tiền chậm nộp vào ngân sách nhà nước trong thời hạn 10 năm trở về trước kể từ ngày phát hiện hành vi vi phạm. Trường hợp người nộp thuế không đăng ký thuế thì phải nộp đủ số tiền thuế thiếu, số tiền thuế trốn, tiền chậm nộp cho toàn bộ thời gian trở về trước kể từ ngày phát hiện hành vi vi phạm."},{"k":"p","t":"9. Người nộp thuế bị phạt tiền do vi phạm hành chính về quản lý thuế mà bị thiệt hại trong trường hợp bất khả kháng quy định tại khoản 21 Điều 4 của Luật này thì được miễn tiền phạt. Tổng số tiền miễn phạt tối đa không quá giá trị tài sản, hàng hóa bị thiệt hại. Không miễn tiền phạt vi phạm hành chính về quản lý thuế đối với các trường hợp đã thực hiện xong quyết định xử phạt vi phạm hành chính về quản lý thuế của cơ quan quản lý thuế hoặc cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"10. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-108_45","no":45,"code":"Điều 45","title":"Điều 45. Hành vi vi phạm trong lĩnh vực quản lý thuế","shortTitle":"Hành vi vi phạm trong lĩnh vực quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hành vi vi phạm thủ tục thuế, hóa đơn, chứng từ điện tử."},{"k":"p","t":"2. Hành vi khai sai căn cứ tính thuế hoặc xác định sai trường hợp được miễn, giảm, hoàn thuế hoặc sử dụng hóa đơn, chứng từ không hợp pháp không thuộc lỗi của người mua dẫn đến thiếu số tiền thuế phải nộp hoặc làm tăng số thuế được miễn, giảm, hoàn nhưng các nghiệp vụ kinh tế này đã được ghi nhận, phản ánh đầy đủ trên hệ thống sổ kế toán."},{"k":"p","t":"3. Người nộp thuế khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu đối với hàng hóa xuất khẩu, nhập khẩu nhưng không thuộc các trường hợp quy định tại điểm e, điểm g khoản 4 Điều này và điểm b khoản 2 Điều 44 của Luật này thì ngoài việc nộp đủ số tiền thuế, tiền chậm nộp, người nộp thuế còn bị xử phạt vi phạm hành chính về quản lý thuế trong trường hợp sau đây:"},{"k":"p","t":"a) Người nộp thuế tự phát hiện và khai bổ sung sau thời điểm cơ quan hải quan thông báo việc kiểm tra trực tiếp hồ sơ hải quan đối với hàng hóa đang làm thủ tục hải quan hoặc sau thời hạn 60 ngày kể từ ngày thông quan và trước thời điểm quyết định kiểm tra sau thông quan, thanh tra, kiểm tra đối với hàng hóa đã thông quan;"},{"k":"p","t":"b) Cơ quan hải quan phát hiện trong quá trình làm thủ tục hải quan; phát hiện khi kiểm tra sau thông quan, thanh tra, kiểm tra đối với hàng hóa đã thông quan và cá nhân, tổ chức vi phạm đã tự nguyện khắc phục hậu quả bằng cách nộp đủ số tiền thuế phải nộp theo quy định;"},{"k":"p","t":"c) Trường hợp không thuộc điểm a và điểm b khoản này mà người nộp thuế tự nguyện nộp đủ số tiền thuế phải nộp theo quy định."},{"k":"p","t":"4. Hành vi trốn thuế:"},{"k":"p","t":"a) Không nộp hồ sơ đăng ký thuế; không nộp hồ sơ khai thuế; nộp hồ sơ khai thuế sau 90 ngày kể từ ngày hết thời hạn nộp hồ sơ khai thuế hoặc ngày hết thời hạn gia hạn nộp hồ sơ khai thuế theo quy định của Luật này dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn;"},{"k":"p","t":"b) Không ghi chép, ghi nhận trong sổ kế toán các khoản thu liên quan đến việc xác định số tiền thuế phải nộp;"},{"k":"p","t":"c) Không lập hóa đơn và không kê khai thuế khi bán hàng hóa, dịch vụ theo quy định của pháp luật hoặc ghi giá trị trên hóa đơn bán hàng thấp hơn giá trị thanh toán thực tế của hàng hóa, dịch vụ đã bán để khai thuế;"},{"k":"p","t":"d) Sử dụng hóa đơn, chứng từ không hợp pháp, sử dụng không hợp pháp hóa đơn, chứng từ để hạch toán hàng hóa, dịch vụ mua vào trong hoạt động phát sinh nghĩa vụ thuế làm giảm số tiền thuế phải nộp hoặc làm tăng số tiền thuế được miễn, số tiền thuế được giảm hoặc tăng số tiền thuế được khấu trừ, số tiền thuế được hoàn, số tiền thuế không phải nộp;"},{"k":"p","t":"đ) Sử dụng chứng từ, tài liệu không phản ánh đúng bản chất giao dịch hoặc giá trị giao dịch thực tế để xác định sai số tiền thuế phải nộp, số tiền thuế được miễn, số tiền thuế được giảm, số tiền thuế được hoàn, số tiền thuế không phải nộp;"},{"k":"p","t":"e) Khai sai với thực tế hàng hóa xuất khẩu, nhập khẩu mà cá nhân, tổ chức vi phạm không tự nguyện khắc phục hậu quả bằng cách nộp đủ số tiền thuế phải nộp theo quy định;"},{"k":"p","t":"g) Cố ý không kê khai hoặc khai sai về thuế đối với hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"h) Cấu kết với người gửi hàng để nhập khẩu hàng hóa nhằm mục đích trốn thuế;"},{"k":"p","t":"i) Sử dụng hàng hóa thuộc đối tượng không chịu thuế, miễn thuế, xét miễn thuế không đúng mục đích quy định mà không khai báo việc chuyển đổi mục đích sử dụng với cơ quan quản lý thuế;"},{"k":"p","t":"k) Người nộp thuế có hoạt động kinh doanh trong thời gian ngừng, tạm ngừng hoạt động kinh doanh nhưng không thông báo với cơ quan quản lý thuế;"},{"k":"p","t":"l) Người nộp thuế không bị xử phạt về hành vi trốn thuế mà bị xử phạt về hành vi vi phạm thủ tục thuế đối với trường hợp sau đây: không nộp hồ sơ đăng ký thuế; không nộp hồ sơ khai thuế; nộp hồ sơ khai thuế sau 90 ngày kể từ ngày hết thời hạn nộp hồ sơ khai thuế hoặc hết thời hạn gia hạn nộp hồ sơ khai thuế nhưng không phát sinh số tiền thuế phải nộp; nộp hồ sơ khai thuế sau 90 ngày kể từ ngày hết thời hạn nộp hồ sơ khai thuế hoặc hết thời hạn gia hạn nộp hồ sơ khai thuế có phát sinh số tiền thuế phải nộp và người nộp thuế đã nộp đủ số tiền thuế, tiền chậm nộp vào ngân sách nhà nước trước thời điểm cơ quan thuế công bố quyết định kiểm tra thuế hoặc trước thời điểm cơ quan thuế lập biên bản về hành vi chậm nộp hồ sơ khai thuế."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-108_46","no":46,"code":"Điều 46","title":"Điều 46. Xử lý hành vi vi phạm của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, người bảo lãnh nộp tiền thuế, tổ chức, cá nhân có liên quan trong lĩnh vực quản lý thuế","shortTitle":"Xử lý hành vi vi phạm của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, người bảo lãnh nộp tiền thuế, tổ chức, cá nhân có liên quan trong lĩnh vực quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán không thực hiện trách nhiệm trích chuyển tiền từ tài khoản của người nộp thuế vào tài khoản của ngân sách nhà nước đối với số tiền thuế nợ phải nộp của người nộp thuế theo yêu cầu của cơ quan quản lý thuế thì bị phạt số tiền tương ứng với số tiền không trích chuyển vào tài khoản của ngân sách nhà nước, trừ trường hợp các tài khoản của người nộp thuế không còn số dư hoặc đã trích chuyển toàn bộ s
