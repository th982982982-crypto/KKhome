ố dư tài khoản của người nộp thuế vào tài khoản của ngân sách nhà nước nhưng vẫn không đủ số tiền thuế nợ mà người nộp thuế phải nộp."},{"k":"p","t":"2. Người bảo lãnh không thực hiện nghĩa vụ bảo lãnh cho người nộp thuế trong trường hợp người nộp thuế không nộp thuế thì người bảo lãnh phải thực hiện nghĩa vụ của người nộp thuế trong phạm vi bảo lãnh."},{"k":"p","t":"3. Tổ chức, cá nhân có liên quan đến việc thực hiện pháp luật về thuế quy định tại khoản 4 Điều 2 của Luật này có hành vi thông đồng, bao che người nộp thuế trốn thuế, không thực hiện quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế thì tùy theo tính chất, mức độ vi phạm mà bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự theo quy định của pháp luật."},{"k":"p","t":"4. Tổ chức, cá nhân khác có liên quan đến việc thực hiện pháp luật về thuế quy định tại khoản 4 Điều 2 của Luật này không thực hiện trách nhiệm của mình theo quy định của Luật này thì tùy theo tính chất, mức độ vi phạm mà bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự theo quy định của pháp luật."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-108_47","no":47,"code":"Điều 47","title":"Điều 47. Thẩm quyền xử phạt vi phạm hành chính về quản lý thuế","shortTitle":"Thẩm quyền xử phạt vi phạm hành chính về quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thẩm quyền xử phạt vi phạm hành chính đối với hành vi vi phạm thủ tục thuế được thực hiện theo quy định của pháp luật về xử lý vi phạm hành chính."},{"k":"p","t":"2. Thủ trưởng cơ quan quản lý thuế có thẩm quyền ra quyết định xử phạt vi phạm hành chính đối với hành vi quy định tại Điều 45 và Điều 46 của Luật này."},{"k":"p","t":"CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ"}]},{"id":"luat-108_48","no":48,"code":"Điều 48","title":"Điều 48. Trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có tiền thuế nợ quá 90 ngày kể từ ngày hết thời hạn nộp theo quy định."},{"k":"p","t":"2. Người nộp thuế có tiền thuế nợ khi hết thời hạn gia hạn nộp tiền thuế."},{"k":"p","t":"3. Người nộp thuế có tiền thuế nợ nhưng không hoạt động tại địa chỉ đã đăng ký hoặc có hành vi phát tán tài sản."},{"k":"p","t":"4. Người nộp thuế không chấp hành quyết định xử phạt vi phạm hành chính về quản lý thuế theo thời hạn ghi trên quyết định xử phạt vi phạm hành chính về quản lý thuế, trừ trường hợp được hoãn hoặc tạm đình chỉ thi hành quyết định xử phạt."},{"k":"p","t":"5. Người nộp thuế đã bị xử phạt hành chính về hành vi không chấp hành quyết định kiểm tra thuế nhưng tiếp tục không chấp hành quyết định kiểm tra thuế."},{"k":"p","t":"6. Chưa thực hiện biện pháp cưỡng chế thuế đối với khoản nợ của người nộp thuế được cơ quan quản lý thuế không tính tiền chậm nộp theo quy định; được nộp dần tiền thuế nợ trong thời hạn không quá 12 tháng kể từ ngày cơ quan có thẩm quyền ban hành văn bản chấp nhận nộp dần tiền thuế nợ và trong thời gian thư bảo lãnh có hiệu lực. Việc nộp dần tiền thuế nợ được thủ trưởng cơ quan quản lý thuế xem xét trên cơ sở đề nghị của người nộp thuế và phải có bảo lãnh của tổ chức tín dụng."},{"k":"p","t":"7. Không thực hiện biện pháp cưỡng chế đối với người nộp thuế có nợ phí hải quan và lệ phí hàng hóa, phương tiện vận tải quá cảnh."},{"k":"p","t":"8. Cơ quan thuế không thực hiện biện pháp cưỡng chế đối với số tiền thuế nợ được bù trừ qua hoàn thuế mà cơ quan thuế đang làm thủ tục bù trừ cho người nộp thuế."},{"k":"p","t":"9. Thủ trưởng cơ quan quản lý thuế căn cứ tình hình thực tế để quyết định trường hợp thực hiện cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"10. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-108_49","no":49,"code":"Điều 49","title":"Điều 49. Biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế bao gồm:"},{"k":"p","t":"a) Trích tiền từ tài khoản của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế tại tổ chức tín dụng, chi nhánh ngân hàng nước ngoài; phong tỏa tài khoản;"},{"k":"p","t":"b) Khấu trừ một phần tiền lương hoặc thu nhập;"},{"k":"p","t":"c) Dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"d) Ngừng sử dụng hóa đơn;"},{"k":"p","t":"đ) Thu tiền, tài sản khác của đối tượng bị cưỡng chế thi hành quyết định hành chính về quản lý thuế do cơ quan, tổ chức, cá nhân khác đang nắm giữ;"},{"k":"p","t":"e) Kê biên tài sản, bán đấu giá tài sản kê biên theo quy định của pháp luật;"},{"k":"p","t":"g) Nộp đơn yêu cầu áp dụng thủ tục phá sản;"},{"k":"p","t":"h) Thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc giấy phép hoạt động kinh doanh nền tảng thương mại điện tử."},{"k":"p","t":"2. Các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế quy định tại khoản 1 Điều này chấm dứt hiệu lực kể từ khi:"},{"k":"p","t":"a) Số tiền thuế nợ bị cưỡng chế đã được nộp đủ vào ngân sách nhà nước;"},{"k":"p","t":"b) Cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền ban hành văn bản miễn, giảm, không thu, nộp dần, gia hạn, không tính tiền chậm nộp;"},{"k":"p","t":"c) Cơ quan nhà nước có thẩm quyền ban hành văn bản đề nghị chấm dứt hiệu lực của quyết định cưỡng chế;"},{"k":"p","t":"d) Người nộp thuế đã chấp hành quyết định kiểm tra thuế đối với trường hợp quy định tại khoản 5 Điều 48 của Luật này."},{"k":"p","t":"3. Quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế phải được gửi cho người nộp thuế bị cưỡng chế và các tổ chức, cá nhân có liên quan. Trường hợp có đầy đủ cơ sở hạ tầng điện tử để phục vụ truyền nhận điện tử thì các quyết định cưỡng chế thi hành quyết định hành chính thuế được gửi bằng phương thức điện tử đến người nộp thuế và các tổ chức, cá nhân có liên quan để tổ chức thi hành."},{"k":"p","t":"4. Cơ quan quản lý thuế khi nộp đơn yêu cầu áp dụng thủ tục phá sản đối với người nộp thuế thuộc trường hợp bị cưỡng chế theo quy định không phải nộp lệ phí phá sản, tạm ứng chi phí phá sản."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này và trình tự thực hiện các biện pháp cưỡng chế."}]},{"id":"luat-108_50","no":50,"code":"Điều 50","title":"Điều 50. Thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương VIII — XỬ LÝ VI PHẠM HÀNH CHÍNH VỀ QUẢN LÝ THUẾ VÀ CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thủ trưởng cơ quan quản lý thuế có thẩm quyền:"},{"k":"p","t":"a) Ban hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế đối với biện pháp cưỡng chế quy định tại các điểm a, b, c, d và đ khoản 1 Điều 49 của Luật này;"},{"k":"p","t":"b) Nộp đơn yêu cầu áp dụng thủ tục phá sản quy định tại điểm g khoản 1 Điều 49 của Luật này thực hiện theo quy định pháp luật về phục hồi, phá sản;"},{"k":"p","t":"c) Đề nghị cơ quan có thẩm quyền thực hiện biện pháp quy định tại điểm h khoản 1 Điều 49 của Luật này."},{"k":"p","t":"2. Chủ tịch Ủy ban nhân dân các cấp ban hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế đối với biện pháp cưỡng chế kê biên tài sản, bán đấu giá tài sản kê biên theo đề nghị của cơ quan quản lý thuế."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-108_51","no":51,"code":"Điều 51","title":"Điều 51. Bổ sung Điều 70a vào sau Điều 70 của Luật Kế toán số 88/2015/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 38/2019/QH14 và Luật số 56/2024/QH15","shortTitle":"Bổ sung Điều 70a vào sau Điều 70 của Luật Kế toán số 88/2015/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 38/2019/QH14 và Luật số 56/2024/QH15","chuong":"Chương IX — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Bổ sung Điều 70a vào sau Điều 70 như sau:"},{"k":"p","t":"“Điều 70a. Cung cấp dịch vụ kế toán của tổ chức kinh doanh dịch vụ làm thủ tục về thuế"},{"k":"p","t":"Tổ chức kinh doanh dịch vụ làm thủ tục về thuế được cung cấp dịch vụ kế toán cho doanh nghiệp siêu nhỏ, hộ kinh doanh, cá nhân kinh doanh khi có ít nhất một người có chứng chỉ kế toán viên.”."}]},{"id":"luat-108_52","no":52,"code":"Điều 52","title":"Điều 52. Điều khoản thi hành","shortTitle":"Điều khoản thi hành","chuong":"Chương IX — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2026, trừ quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Quy định tại Điều 13 và việc sử dụng hóa đơn điện tử của hộ kinh doanh, cá nhân kinh doanh quy định tại Điều 26 của Luật này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"3. Luật Quản lý thuế số 38/2019/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 56/2024/QH15 (sau đây gọi là Luật Quản lý thuế số 38/2019/QH14) hết hiệu lực thi hành kể từ ngày Luật này có hiệu lực thi hành, trừ quy định tại khoản 1 và khoản 3 Điều 53 của Luật này; riêng quy định tại Điều 51 của Luật Quản lý thuế số 38/2019/QH14 hết hiệu lực thi hành kể từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"4. Cơ quan thuế có trách nhiệm tổ chức xây dựng, nâng cấp và hoàn thiện hệ thống thông tin phục vụ việc thực hiện đầy đủ các giao dịch điện tử trong quản lý thuế. Việc áp dụng toàn bộ các hình thức giao dịch điện tử trong lĩnh vực quản lý thuế được thực hiện theo lộ trình do Bộ trưởng Bộ Tài chính quy định, bảo đảm hoàn thành trước ngày 01 tháng 01 năm 2027."},{"k":"p","t":"5. Chính phủ quy định chi tiết các điều, khoản được giao tại Luật này và hướng dẫn thực hiện Luật này theo chức năng, nhiệm vụ đảm bảo yêu cầu quản lý; quy định về quản lý thuế đối với các giao dịch liên kết của những doanh nghiệp có quan hệ liên kết; quy định việc xử phạt vi phạm hành chính về phí, lệ phí trong lĩnh vực quản lý thuế."}]},{"id":"luat-108_53","no":53,"code":"Điều 53","title":"Điều 53. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương IX — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Các khoản thuế được miễn, giảm, không thu theo quy định của pháp luật tương ứng từng thời kỳ, phát sinh trước ngày 01 tháng 7 năm 2026 thì tiếp tục xử lý theo quy định của Luật Quản lý thuế số 38/2019/QH14."},{"k":"p","t":"2. Các khoản tiền thuế nợ đến hết ngày 30 tháng 6 năm 2026 thì được xử lý theo quy định của Luật này."},{"k":"p","t":"3. Các cuộc kiểm tra có quyết định kiểm tra được ban hành trước ngày Luật này có hiệu lực thi hành nhưng chưa ban hành kết luận hoặc quyết định xử lý thì tiếp tục thực hiện theo quy định của Luật Quản lý thuế số 38/2019/QH14."},{"k":"p","t":"_____________"},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XV, Kỳ họp thứ 10 thông qua ngày 10 tháng 12 năm 2025."},{"k":"tbl","rows":[["","CHỦ TỊCH QUỐC HỘI\nTrần Thanh Mẫn"]]}]}],"refs":{"luat-108_1":[{"kind":"guidance","targetSlug":"nd68","targetAnchor":"nd68_1","label":"NĐ 68/2026 — Chính sách & quản lý thuế"},{"kind":"guidance","targetSlug":"tt18","targetAnchor":"tt18_1","label":"TT 18/2026 — Hồ sơ, thủ tục quản lý thuế"},{"kind":"related","targetSlug":"luat-67","targetAnchor":"dieu-1","label":"Áp dụng cho TNDN (Luật 67)"},{"kind":"replaces","targetSlug":null,"label":"Thay thế Luật Quản lý thuế 38/2019/QH14","note":"(từ 01/07/2026)"}]},"details":{"luat-108_1":[{"match":"Luật này quy định việc quản lý các loại thuế, các khoản thu khác thuộc ngân sách nhà nước","title":"Điều 1 — Phạm vi (áp dụng cho mọi sắc thuế)","summary":"Luật Quản lý thuế áp dụng cho việc quản lý <strong>tất cả các loại thuế</strong> — TNDN, GTGT, TNCN... (đăng ký, kê khai, nộp, hoàn, thanh tra, cưỡng chế). Là khung thủ tục chung cho cả 3 chum thuế.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-1","label":"Luật 67 — Thuế TNDN"},{"targetSlug":"luat-48","targetAnchor":"luat-48_1","label":"Luật 48 — Thuế GTGT"},{"targetSlug":"luat-109","targetAnchor":"luat-109_1","label":"Luật 109 — Thuế TNCN"}]}],"luat-108_5":[{"match":"Cơ quan thuế thực hiện quản lý thuế theo phân nhóm người nộp thuế","title":"Điều 5 — Nội dung quản lý thuế","summary":"Nội dung quản lý thuế: đăng ký, khai, tính, nộp, hoàn, miễn/giảm, khoanh nợ, xóa nợ, quản lý thông tin, hóa đơn, thanh tra/kiểm tra, cưỡng chế. Hướng dẫn hồ sơ thủ tục tại TT 18.","links":[{"targetSlug":"tt18","targetAnchor":"tt18_1","label":"TT 18/2026 — Hồ sơ, thủ tục quản lý thuế"},{"targetSlug":"nd68","targetAnchor":"nd68_1","label":"NĐ 68/2026 — Chính sách & quản lý thuế"}]}],"luat-108_16":[{"match":"Các trường hợp phải nộp tiền chậm nộp bao gồm","title":"Điều 16 — Tiền chậm nộp","summary":"Quy định các trường hợp và mức tính tiền chậm nộp tiền thuế. Áp dụng chung khi chậm nộp bất kỳ sắc thuế nào (TNDN, GTGT, TNCN).","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_17","label":"Luật 108 Điều 17 — Hoàn thành nghĩa vụ nộp thuế"}]}],"luat-108_17":[{"match":"Hoàn thành nghĩa vụ nộp thuế trong trường hợp giải thể, phá sản, chấm dứt hoạt động","title":"Điều 17 — Hoàn thành nghĩa vụ nộp thuế","summary":"Thứ tự và trách nhiệm hoàn thành nghĩa vụ nộp thuế khi giải thể, phá sản, chấm dứt hoạt động. Liên quan quyết toán thuế TNDN khi chấm dứt hoạt động.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-5","label":"Luật 67 Điều 5 — Kỳ tính thuế (quyết toán)"}]}]},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}

  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
