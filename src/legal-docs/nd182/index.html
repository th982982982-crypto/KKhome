<script id="LD" type="application/json">{"meta":{"title":"Nghị định 182/2025/NĐ-CP — Sửa đổi, bổ sung một số điều của NĐ 134/2016","shortCode":"NĐ 182/2025","subtitle":"Sửa đổi, bổ sung NĐ 134/2016 (Thuế XNK)","slug":"nd182","effectiveDate":"01/07/2025","scope":"","description":"Sửa đổi, bổ sung NĐ 134/2016 (Thuế XNK)","related":[]},"outline":[{"id":"nd182_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung theo Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ","shortTitle":"Sửa đổi, bổ sung một số điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung theo Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung Điều 24 như sau:"},{"k":"p","t":"“Điều 24. Miễn thuế hàng hóa nhập khẩu để phát triển khoa học, công nghệ, đổi mới sáng tạo, công nghiệp công nghệ số"},{"k":"p","t":"1. Hàng hóa nhập khẩu để phát triển khoa học, công nghệ, đổi mới sáng tạo, công nghiệp công nghệ số được miễn thuế nhập khẩu theo quy định tại khoản 3 Điều 5 Luật số 90/2025/QH15 sửa đổi, bổ sung một số điều của Luật Đấu thầu; Luật Đầu tư theo phương thức đối tác công tư; Luật Hải quan; Luật Thuế giá trị gia tăng; Luật Thuế xuất khẩu, thuế nhập khẩu; Luật Đầu tư; Luật Đầu tư công; Luật Quản lý, sử dụng tài sản công ngày 25 tháng 6 năm 2025 (sau đây là Luật số 90/2025/QH15)."},{"k":"p","t":"2. Việc xác định hàng hóa nhập khẩu quy định tại các điểm a, c và d và việc xác định thời điểm bắt đầu nghiên cứu của tổ chức, doanh nghiệp quy định tại điểm c, điểm d khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15 do Bộ Khoa học và Công nghệ hướng dẫn."},{"k":"p","t":"3. Việc xác định hàng hóa nhập khẩu quy định tại điểm b khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15 thực hiện theo quy định tại khoản 4 Điều 14 Nghị định này."},{"k":"p","t":"4. Thời gian bắt đầu sản xuất, sản xuất thử nghiệm quy định tại điểm c, điểm d khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15: người nộp thuế tự kê khai, tự chịu trách nhiệm về ngày thực tế tiến hành hoạt động sản xuất, sản xuất thử nghiệm và thông báo trước khi làm thủ tục hải quan cho cơ quan hải quan nơi tiếp nhận hồ sơ thông báo danh mục miễn thuế."},{"k":"p","t":"Hết thời hạn miễn thuế 05 năm quy định tại điểm c khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15, người nộp thuế phải kê khai, nộp đủ thuế theo quy định đối với lượng nguyên liệu, vật tư, linh kiện nhập khẩu đã được miễn thuế nhưng không sử dụng hết."},{"k":"p","t":"5. Hàng hóa nhập khẩu quy định tại các điểm b, c và d khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15, thực hiện thông báo danh mục hàng hóa miễn thuế dự kiến nhập khẩu theo quy định tại Điều 30 Nghị định này."},{"k":"p","t":"6. Hồ sơ, thủ tục miễn thuế: thực hiện theo quy định tại Điều 31 Nghị định này. Đối với hàng hóa nhập khẩu quy định tại điểm a khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15 thực hiện theo quy định tại khoản này và tài liệu khác có liên quan đến hàng hoá nhập khẩu được miễn thuế theo quy định tại khoản 2 Điều này (nếu có).”"},{"k":"p","t":"2. Sửa đổi, bổ sung, thay thế một số nội dung của Điều 30 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung khoản 1 như sau:"},{"k":"p","t":"“1. Các trường hợp thông báo danh mục hàng hóa miễn thuế dự kiến nhập khẩu gồm các hàng hóa thuộc đối tượng miễn thuế quy định tại các điểm b, c và d khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15 và Điều 14, Điều 15, Điều 16, Điều 17, Điều 18, Điều 23 Nghị định này”."},{"k":"p","t":"b) Thay thế cụm từ “và khoản 18” thành “, các điểm b, c và d khoản 21 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15” tại điểm b khoản 2."},{"k":"p","t":"c) Sửa đổi, bổ sung điểm đ khoản 3 như sau:"},{"k":"p","t":"“đ) Giấy chứng nhận hoặc công nhận của cơ quan nhà nước có thẩm quyền đối với tổ chức khoa học và công nghệ, doanh nghiệp công nghệ cao và doanh nghiệp thành lập mới từ dự án đầu tư sản xuất sản phẩm công nghệ cao đã được cấp Giấy chứng nhận theo quy định của pháp luật về công nghệ cao, doanh nghiệp khoa học và công nghệ, trung tâm đổi mới sáng tạo, trung tâm nghiên cứu và phát triển: 01 bản chụp.”"},{"k":"p","t":"d) Sửa đổi, bổ sung điểm i khoản 3 như sau:"},{"k":"p","t":"“i) Bản thuyết minh dự án sản xuất sản phẩm công nghệ số quy định tại điểm d khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại khoản 3 Điều 5 Luật số 90/2025/QH15: 01 bản chụp”."}]},{"id":"nd182_2","no":2,"code":"Điều 2","title":"Điều 2. Thay thế, bãi bỏ một số từ, cụm từ, khoản, điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung theo Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ","shortTitle":"Thay thế, bãi bỏ một số từ, cụm từ, khoản, điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung theo Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bãi bỏ Điều 19 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Bỏ số “19” tại khoản 1 Điều 40 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"3. Thay thế “Điều 19” tại điểm c khoản 5 Điều 31 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ thành “điểm a khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15”."},{"k":"p","t":"4. Bỏ cụm từ “và hàng hóa nhập khẩu quy định tại khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu” tại khoản 2 Điều 40; khoản 5 Điều 40 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ."}]},{"id":"nd182_3","no":3,"code":"Điều 3","title":"Điều 3. Điều khoản thi hành","shortTitle":"Điều khoản thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025."},{"k":"p","t":"2. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các đoàn thể;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\nHồ Đức Phớc"]]}]}],"refs":{"nd182_1":[{"kind":"related","targetSlug":"nd134","targetAnchor":"nd134_1","label":"NĐ 134/2016 — Văn bản gốc (Thuế XNK)"}]},"details":{},"summaries":{"nd182_1":{"tldr":"Sửa đổi, bổ sung Điều 24 và Điều 30 Nghị định 134/2016/NĐ-CP. Điều 24 mới quy định miễn thuế nhập khẩu hàng hóa để phát triển khoa học, công nghệ, đổi mới sáng tạo, công nghiệp công nghệ số theo khoản 3 Điều 5 Luật số 90/2025/QH15.","points":["Hàng hóa nhập khẩu để phát triển khoa học, công nghệ, đổi mới sáng tạo, công nghiệp công nghệ số được miễn thuế nhập khẩu theo khoản 3 Điều 5 Luật số 90/2025/QH15.","Việc xác định hàng hóa tại các điểm a, c, d và thời điểm bắt đầu nghiên cứu tại điểm c, điểm d khoản 21 Điều 16 Luật Thuế XK, NK (sửa đổi tại Luật số 90/2025/QH15) do Bộ Khoa học và Công nghệ hướng dẫn.","Người nộp thuế tự kê khai, tự chịu trách nhiệm về ngày thực tế tiến hành sản xuất, sản xuất thử nghiệm và thông báo trước khi làm thủ tục hải quan cho cơ quan hải quan nơi tiếp nhận hồ sơ thông báo danh mục miễn thuế.","Hết thời hạn miễn thuế 05 năm quy định tại điểm c khoản 21 Điều 16, người nộp thuế phải kê khai, nộp đủ thuế đối với lượng nguyên liệu, vật tư, linh kiện nhập khẩu đã được miễn thuế nhưng không sử dụng hết.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này; thông báo danh mục hàng hóa miễn thuế dự kiến nhập khẩu theo Điều 30.","Bổ sung hồ sơ tại điểm đ, điểm i khoản 3 Điều 30: giấy chứng nhận/công nhận của cơ quan có thẩm quyền 01 bản chụp; bản thuyết minh dự án sản xuất sản phẩm công nghệ số 01 bản chụp."]},"nd182_2":{"tldr":"Thay thế, bãi bỏ một số từ, cụm từ, khoản, điều của Nghị định 134/2016/NĐ-CP (đã sửa đổi tại Nghị định 18/2021/NĐ-CP).","points":["Bãi bỏ Điều 19 Nghị định số 134/2016/NĐ-CP.","Bỏ số “19” tại khoản 1 Điều 40 Nghị định số 134/2016/NĐ-CP.","Thay thế “Điều 19” tại điểm c khoản 5 Điều 31 thành “điểm a khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu đã được sửa đổi, bổ sung tại Luật số 90/2025/QH15”.","Bỏ cụm từ “và hàng hóa nhập khẩu quy định tại khoản 21 Điều 16 Luật Thuế xuất khẩu, thuế nhập khẩu” tại khoản 2 Điều 40 và khoản 5 Điều 40."]},"nd182_3":{"tldr":"Điều khoản thi hành. Nghị định có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025.","points":["Nghị định này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025.","Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch UBND các tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
