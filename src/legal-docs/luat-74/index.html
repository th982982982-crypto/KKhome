ệc làm được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng.","Được hỗ trợ đào tạo nghề theo quy định của Chính phủ."]},"luat-74_11":{"tldr":"Chính sách việc làm công được thực hiện qua các chương trình, dự án, hoạt động sử dụng vốn nhà nước gắn với phát triển kinh tế - xã hội tại địa phương, ưu tiên một số nhóm đối tượng.","points":["Thực hiện theo hình thức lựa chọn nhà thầu là tham gia thực hiện của cộng đồng theo pháp luật về đấu thầu.","Ưu tiên tham gia việc làm công: người dân tộc thiểu số; hộ nghèo, hộ cận nghèo; người cao tuổi; người khuyết tật; người nuôi dưỡng, chăm sóc người khuyết tật đặc biệt nặng; người có đất thu hồi thuộc đối tượng được hỗ trợ đào tạo, chuyển đổi nghề, tìm kiếm việc làm theo pháp luật về đất đai.","Chính phủ quy định việc thực hiện chính sách việc làm công."]},"luat-74_12":{"tldr":"Quy định chính sách hỗ trợ việc làm cho người lao động là thanh niên: hỗ trợ đào tạo nghề trong một số trường hợp, vay vốn và hỗ trợ lập nghiệp, khởi nghiệp.","points":["Hỗ trợ đào tạo nghề cho: thanh niên hoàn thành nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân; thanh niên tình nguyện hoàn thành nhiệm vụ chương trình, dự án phát triển kinh tế - xã hội; trí thức trẻ tình nguyện hoàn thành nhiệm vụ tại khu kinh tế - quốc phòng.","Được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng.","Được hỗ trợ lập nghiệp, khởi nghiệp theo quy định của pháp luật."]},"luat-74_13":{"tldr":"Quy định chính sách hỗ trợ việc làm cho người lao động là người cao tuổi: vay vốn, hỗ trợ đào tạo, bồi dưỡng kỹ năng nghề và chính sách thích ứng với già hóa dân số.","points":["Được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm.","Được hỗ trợ đào tạo, bồi dưỡng nâng cao trình độ kỹ năng nghề và hỗ trợ tham gia đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia.","Nhà nước có chính sách hỗ trợ giải quyết việc làm, đào tạo lại, đào tạo chuyển đổi nghề nghiệp nhằm thích ứng với già hóa dân số, căn cứ điều kiện kinh tế - xã hội và khả năng cân đối ngân sách."]},"luat-74_14":{"tldr":"Quy định các đối tượng và chế độ hỗ trợ người lao động trước khi đi làm việc ở nước ngoài theo hợp đồng.","points":["Đối tượng được hỗ trợ: người có công với cách mạng và thân nhân; người dân tộc thiểu số; người thuộc hộ nghèo, hộ cận nghèo; người có đất thu hồi thuộc đối tượng được hỗ trợ; người hoàn thành nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân; thanh niên tình nguyện; trí thức trẻ tình nguyện tại khu kinh tế - quốc phòng.","Chế độ hỗ trợ: giáo dục định hướng trước khi đi; đào tạo, bồi dưỡng kỹ năng nghề, ngoại ngữ; chi phí khác cho người lao động đi làm việc ở nước ngoài theo hợp đồng.","Chính phủ quy định chi tiết chế độ hỗ trợ."]},"luat-74_15":{"tldr":"Quy định trách nhiệm của Nhà nước trong hỗ trợ phát triển thị trường lao động và nguồn kinh phí thực hiện.","points":["Nhà nước xây dựng, quản lý, vận hành, khai thác, nâng cấp hệ thống hạ tầng công nghệ, cơ sở dữ liệu về người lao động, hệ thống thông tin thị trường lao động.","Đầu tư xây dựng, nâng cao năng lực, hiện đại hóa hoạt động dịch vụ việc làm của tổ chức dịch vụ việc làm công; phát triển sàn giao dịch việc làm quốc gia.","Kinh phí từ ngân sách nhà nước theo pháp luật về ngân sách nhà nước, đầu tư công và nguồn khác theo quy định."]},"luat-74_16":{"tldr":"Quy định 4 nguyên tắc đăng ký lao động.","points":["Đơn giản, thuận tiện, kịp thời, chính xác, công khai, minh bạch trong trình tự, thủ tục đăng ký lao động.","Bảo đảm quyền, lợi ích hợp pháp của người sử dụng lao động, người lao động.","Ứng dụng khoa học, công nghệ, giao dịch điện tử trong đăng ký lao động.","Tiếp nhận, cập nhật, điều chỉnh thông tin vào cơ sở dữ liệu về người lao động và kết nối, đồng bộ với Cơ sở dữ liệu tổng hợp quốc gia, cơ sở dữ liệu quốc gia, chuyên ngành và khác."]},"luat-74_17":{"tldr":"Quy định các nhóm thông tin đăng ký lao động và việc xây dựng, quản lý cơ sở dữ liệu về người lao động tập trung, thống nhất toàn quốc.","points":["Thông tin đăng ký lao động gồm: nhóm thông tin cơ bản (họ tên, số định danh cá nhân, ngày sinh, giới tính, dân tộc, nơi ở hiện tại); giáo dục và chứng chỉ; tình trạng và nhu cầu việc làm; bảo hiểm xã hội, bảo hiểm thất nghiệp; thông tin khác về đặc điểm, đặc thù.","Người sử dụng lao động, người lao động đăng ký, điều chỉnh thông tin đăng ký lao động khi đăng ký, điều chỉnh thông tin tham gia bảo hiểm xã hội.","Người lao động không thuộc đối tượng trên nộp hồ sơ đăng ký, điều chỉnh đến nơi đăng ký lao động.","Cơ sở dữ liệu về người lao động được xây dựng và quản lý tập trung, thống nhất toàn quốc theo pháp luật về dữ liệu."]},"luat-74_18":{"tldr":"Quy định quyền và nghĩa vụ của người lao động liên quan đến thông tin đăng ký lao động và cơ sở dữ liệu về người lao động.","points":["Quyền: được bảo vệ thông tin đăng ký lao động; được khai thác thông tin của bản thân; được điều chỉnh, cập nhật thông tin; được sử dụng thông tin của bản thân trong giao dịch, tiếp cận chính sách hỗ trợ tạo việc làm, đánh giá kỹ năng nghề, tư vấn, giới thiệu việc làm, bảo hiểm thất nghiệp.","Nghĩa vụ: thực hiện đăng ký lao động; cung cấp đầy đủ, chính xác, trung thực, kịp thời thông tin và chịu trách nhiệm về thông tin đã cung cấp; kịp thời điều chỉnh thông tin khi có thay đổi về tình trạng và nhu cầu việc làm."]},"luat-74_19":{"tldr":"Quy định khái niệm hệ thống thông tin thị trường lao động và việc kết nối, chia sẻ dữ liệu với các cơ sở dữ liệu khác.","points":["Hệ thống thông tin thị trường lao động là tổng hợp hạ tầng công nghệ, phần mềm, dữ liệu được xây dựng, quản lý tập trung, thống nhất trên cả nước để phục vụ quản lý, nghiên cứu, hoạch định chính sách, phân tích, dự báo thị trường lao động và hỗ trợ các bên tham gia.","Được kết nối, cập nhật, đồng bộ, chia sẻ dữ liệu với Cơ sở dữ liệu tổng hợp quốc gia, cơ sở dữ liệu quốc gia, cơ sở dữ liệu về người lao động, chuyên ngành và khác."]},"luat-74_20":{"tldr":"Quy định các nội dung thông tin thị trường lao động và trách nhiệm cung cấp, chia sẻ thông tin cho Bộ Nội vụ.","points":["Thông tin thị trường lao động gồm: cung lao động, cầu lao động, kết nối cung - cầu lao động; đào tạo, trình độ kỹ năng nghề; xu hướng tìm kiếm việc làm và nhu cầu sử dụng lao động; tiền lương và thu nhập của người lao động.","Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ, Ủy ban nhân dân các cấp cung cấp, chia sẻ thông tin, dữ liệu liên quan cho Bộ Nội vụ."]},"luat-74_21":{"tldr":"Quy định việc quản lý, vận hành, khai thác hệ thống thông tin thị trường lao động và trách nhiệm của cơ quan quản lý nhà nước về việc làm.","points":["Việc quản lý, vận hành, khai thác phải tuân thủ Luật này, pháp luật về tiếp cận thông tin, về dữ liệu và pháp luật liên quan.","Cơ quan quản lý nhà nước về việc làm: quản lý, vận hành, cập nhật, khai thác hệ thống; phân tích, dự báo, phổ biến thông tin thị trường lao động thuộc thẩm quyền trên trang điện tử, phương tiện thông tin đại chúng và phương thức hợp pháp khác.","Cơ quan, tổ chức, cá nhân được tiếp cận, khai thác, sử dụng thông tin thị trường lao động đã được phổ biến."]},"luat-74_22":{"tldr":"Quy định các nội dung phát triển kỹ năng nghề và các đối tượng được Nhà nước hỗ trợ khi tham gia đào tạo, nâng cao kỹ năng nghề và đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia.","points":["Nội dung phát triển kỹ năng nghề gồm: xây dựng khung trình độ kỹ năng nghề quốc gia; xây dựng, công bố tiêu chuẩn kỹ năng nghề quốc gia và bộ công cụ đánh giá; ban hành danh mục nghề, công việc yêu cầu chứng chỉ; đào tạo, bồi dưỡng; nâng cao năng lực hệ thống đánh giá; công nhận lẫn nhau với quốc gia khác; xây dựng cơ sở dữ liệu.","Đối tượng được Nhà nước hỗ trợ: người có công với cách mạng và thân nhân; hộ nghèo, hộ cận nghèo; người khuyết tật; người cao tuổi; người dân tộc thiểu số; người hoàn thành nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân; thanh niên tình nguyện; trí thức trẻ tình nguyện; đối tượng khác do Chính phủ quyết định."]},"luat-74_23":{"tldr":"Quy định khung trình độ kỹ năng nghề quốc gia và tiêu chuẩn kỹ năng nghề quốc gia.","points":["Khung trình độ kỹ năng nghề quốc gia là khung phân loại các bậc trình độ kỹ năng nghề.","Tiêu chuẩn kỹ năng nghề quốc gia được xây dựng, thẩm định, công bố và áp dụng theo từng bậc trình độ kỹ năng nghề cho mỗi nghề và khung trình độ kỹ năng nghề quốc gia.","Chính phủ quy định chi tiết Điều này."]},"luat-74_24":{"tldr":"Quy định khái niệm chứng chỉ kỹ năng nghề quốc gia, lệ phí, nguyên tắc và nội dung đánh giá kỹ năng nghề quốc gia, cùng việc công nhận, thừa nhận lẫn nhau với các quốc gia khác.","points":["Chứng chỉ kỹ năng nghề quốc gia là văn bản do cơ quan nhà nước có thẩm quyền cấp để công nhận người lao động đủ khả năng thực hiện công việc đạt yêu cầu ở một bậc trình độ kỹ năng của một nghề.","Người đề nghị cấp, cấp lại chứng chỉ nộp lệ phí theo pháp luật về phí và lệ phí, trừ trường hợp do lỗi của cơ quan có thẩm quyền.","Nguyên tắc đánh giá: bảo đảm sự tự nguyện của người lao động; căn cứ tiêu chuẩn kỹ năng nghề quốc gia; chính xác, độc lập, khách quan, công bằng, minh bạch.","Nội dung đánh giá: kiến thức chuyên môn, kỹ thuật; kỹ năng thực hành; quy trình an toàn lao động, vệ sinh lao động; nội dung khác theo đặc thù nghề, công việc.","Khi có công nhận, thừa nhận lẫn nhau giữa Việt Nam với quốc gia khác thì chứng chỉ của quốc gia đó có giá trị tại Việt Nam và ngược lại."]},"luat-74_25":{"tldr":"Quy định về tổ chức đánh giá kỹ năng nghề quốc gia, điều kiện, giá dịch vụ và lệ phí cấp giấy chứng nhận hoạt động.","points":["Tổ chức đánh giá kỹ năng nghề quốc gia là pháp nhân được cấp giấy chứng nhận hoạt động khi đủ điều kiện về cơ sở vật chất, trang thiết bị, đánh giá viên và nhân sự khác.","Tổ chức thu tiền dịch vụ thì phải tự định giá và niêm yết giá cung ứng dịch vụ theo pháp luật về giá.","Đề nghị cấp, cấp lại giấy chứng nhận hoạt động phải nộp lệ phí theo pháp luật về phí và lệ phí, trừ trường hợp do lỗi của cơ quan có thẩm quyền."]},"luat-74_26":{"tldr":"Quy định nghề, công việc yêu cầu phải có chứng chỉ kỹ năng nghề quốc gia.","points":["Người lao động làm nghề, công việc ảnh hưởng trực tiếp đến an toàn và sức khỏe của người lao động hoặc cộng đồng phải có chứng chỉ kỹ năng nghề quốc gia.","Chính phủ ban hành danh mục nghề, công việc yêu cầu phải có chứng chỉ kỹ năng nghề quốc gia."]},"luat-74_27":{"tldr":"Quy định nội dung dịch vụ việc làm, các loại tổ chức dịch vụ việc làm và điều kiện hoạt động giao dịch điện tử, thương mại điện tử trong dịch vụ việc làm.","points":["Dịch vụ việc làm gồm: tư vấn, giới thiệu việc làm; cung ứng và giới thiệu lao động cho người sử dụng lao động; thu thập, phân tích, lưu trữ, cung cấp thông tin thị trường lao động.","Tổ chức dịch vụ việc làm gồm tổ chức dịch vụ việc làm công và doanh nghiệp hoạt động dịch vụ việc làm.","Hoạt động kinh doanh dịch vụ việc làm theo phương thức thương mại điện tử chỉ được thực hiện bởi doanh nghiệp có giấy phép hoạt động dịch vụ việc làm khi bảo đảm điều kiện theo pháp luật về thương mại điện tử."]},"luat-74_28":{"tldr":"Quy định về doanh nghiệp hoạt động dịch vụ việc làm: điều kiện cấp giấy phép, thành lập chi nhánh và niêm yết giá dịch vụ.","points":["Doanh nghiệp hoạt động dịch vụ việc làm được thành lập theo pháp luật về doanh nghiệp và được cấp giấy phép hoạt động dịch vụ việc làm.","Được cấp giấy phép khi có cơ sở vật chất, nhân sự đáp ứng yêu cầu, đã ký quỹ và phải duy trì các điều kiện này trong suốt quá trình hoạt động.","Được thành lập chi nhánh khi chi nhánh có cơ sở vật chất đáp ứng yêu cầu và phải thông báo cho cơ quan chuyên môn về việc làm của Ủy ban nhân dân cấp tỉnh nơi đặt trụ sở chính trước khi hoạt động.","Doanh nghiệp tự định giá và niêm yết giá dịch vụ việc làm theo pháp luật về giá."]},"luat-74_29":{"tldr":"Quy định 5 nguyên tắc bảo hiểm thất nghiệp.","points":["Bảo đảm chia sẻ rủi ro giữa những người tham gia bảo hiểm thất nghiệp.","Mức đóng được tính trên cơ sở tiền lương tháng của người lao động.","Mức hưởng được tính trên cơ sở mức đóng, thời gian đóng bảo hiểm thất nghiệp.","Việc thực hiện phải đơn giản, dễ dàng, thuận tiện, kịp thời và đầy đủ quyền lợi của người tham gia.","Quỹ bảo hiểm thất nghiệp được quản lý tập trung, thống nhất, công khai, minh bạch, đúng mục đích, bảo đảm an toàn, tăng trưởng và được Nhà nước bảo hộ."]},"luat-74_30":{"tldr":"Quy định các chế độ bảo hiểm thất nghiệp và việc Chính phủ có thể quy định giảm mức đóng, hỗ trợ trong trường hợp khủng hoảng, thiên tai, dịch bệnh.","points":["Các chế độ gồm: tư vấn, giới thiệu việc làm; hỗ trợ người lao động tham gia đào tạo, nâng cao trình độ kỹ năng nghề; trợ cấp thất nghiệp; hỗ trợ người sử dụng lao động đào tạo, bồi dưỡng, nâng cao kỹ năng nghề để duy trì việc làm.","Trường hợp khủng hoảng, suy thoái kinh tế, thiên tai, hỏa hoạn, địch họa hoặc dịch bệnh nguy hiểm, căn cứ tình hình thực tế và kết dư Quỹ, Chính phủ quy định việc giảm mức đóng, hỗ trợ bằng tiền hoặc hỗ trợ khác."]},"luat-74_31":{"tldr":"Quy định đối tượng người lao động và người sử dụng lao động tham gia bảo hiểm thất nghiệp, cùng các trường hợp không thuộc đối tượng tham gia.","points":["Người lao động tham gia: làm việc theo hợp đồng lao động không xác định thời hạn hoặc xác định thời hạn từ đủ 01 tháng trở lên (kể cả tên gọi khác có nội dung tương ứng); làm việc không trọn thời gian có tiền lương bằng hoặc cao hơn mức thấp nhất làm căn cứ đóng bảo hiểm xã hội bắt buộc; làm việc theo hợp đồng làm việc; người quản lý doanh nghiệp, kiểm soát viên, người đại diện phần vốn và các chức danh quản lý của hợp tác xã có hưởng tiền lương.","Không thuộc đối tượng tham gia: người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội, trợ cấp hằng tháng hoặc đủ điều kiện hưởng lương hưu; người đang làm việc theo hợp đồng thử việc; người giúp việc gia đình.","Người sử dụng lao động tham gia gồm: cơ quan nhà nước, đơn vị sự nghiệp công lập; cơ quan, đơn vị, doanh nghiệp thuộc Quân đội, Công an và tổ chức cơ yếu; các tổ chức chính trị, chính trị - xã hội và tổ chức khác; cơ quan, tổ chức nước ngoài, tổ chức quốc tế; doanh nghiệp, hợp tác xã, hộ kinh doanh và cá nhân có thuê mướn, sử dụng lao động.","Ủy ban Thường vụ Quốc hội quyết định việc tham gia của đối tượng khác có việc làm, thu nhập ổn định, thường xuyên trên cơ sở đề xuất của Chính phủ."]},"luat-74_32":{"tldr":"Quy định việc tham gia bảo hiểm thất nghiệp được thực hiện đồng bộ với bảo hiểm xã hội bắt buộc và được ghi nhận trong sổ bảo hiểm xã hội.","points":["Việc xác định đối tượng, đăng ký tham gia, điều chỉnh thông tin đăng ký kê khai được thực hiện đồng bộ với bảo hiểm xã hội bắt buộc theo pháp luật về bảo hiểm xã hội.","Việc tham gia, đóng, hưởng bảo hiểm thất nghiệp được ghi nhận trong sổ bảo hiểm xã hội, là cơ sở để giải quyết các chế độ bảo hiểm thất nghiệp."]},"luat-74_33":{"tldr":"Quy định mức đóng, trách nhiệm đóng, thời điểm và phương thức đóng bảo hiểm thất nghiệp; mức đóng tối đa 1% của người lao động, 1% của người sử dụng lao động và Nhà nước hỗ trợ tối đa 1%.","points":["Người lao động đóng tối đa bằng 1% tiền lương tháng; người sử dụng lao động đóng tối đa bằng 1% quỹ tiền lương tháng của những người đang tham gia; Nhà nước hỗ trợ tối đa 1% quỹ tiền lương tháng đóng, do ngân sách trung ương bảo đảm.","Hằng tháng, người sử dụng lao động đóng phần của mình và trích tiền lương của từng người lao động để đóng cùng lúc vào Quỹ; với lao động hưởng lương theo sản phẩm, khoán trong nông, lâm, ngư, diêm nghiệp có thể đóng hằng tháng, 03 tháng hoặc 06 tháng một lần, chậm nhất ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng.","Người lao động không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng thì không phải đóng bảo hiểm thất nghiệp của tháng đó.","Người sử dụng lao động được giảm tiền đóng thuộc trách nhiệm của mình cho người lao động là người khuyết tật trong thời gian không quá 12 tháng khi tuyển mới và sử dụng.","Trường hợp không đóng đủ bảo hiểm thất nghiệp cho người lao động thì người sử dụng lao động phải trả khoản tiền tương ứng với các chế độ mà người lao động được hưởng."]},"luat-74_34":{"tldr":"Quy định tiền lương làm căn cứ đóng bảo hiểm thất nghiệp, mức cao nhất bằng 20 lần mức lương tối thiểu tháng theo vùng, và việc tạm dừng, đóng bù khi bị tạm giam, tạm đình chỉ công việc.","points":["Đối tượng theo chế độ tiền lương do Nhà nước quy định: tiền lương tháng theo chức vụ, chức danh, ngạch, bậc và các phụ cấp chức vụ, thâm niên vượt khung, thâm niên nghề, hệ số chênh lệch bảo lưu lương (nếu có).","Đối tượng theo chế độ tiền lương do người sử dụng lao động quyết định: tiền lương tháng gồm mức lương theo công việc/chức danh, phụ cấp lương và khoản bổ sung khác trả thường xuyên, ổn định.","Tiền lương làm căn cứ đóng cao nhất bằng 20 lần mức lương tối thiểu tháng theo vùng do Chính phủ công bố tại thời điểm đóng.","Người bị tạm giam, tạm đình chỉ công việc thì tạm dừng đóng; nếu được truy lĩnh đủ tiền lương thì đóng bù cho thời gian tạm dừng, thực hiện đồng thời với đóng bù bảo hiểm xã hội bắt buộc."]},"luat-74_35":{"tldr":"Quy định cách tính thời gian đóng bảo hiểm thất nghiệp để xét hưởng chế độ và việc tính lại từ đầu sau khi chấm dứt hưởng trợ cấp thất nghiệp.","points":["Thời gian đóng để xét hưởng là tổng thời gian đã đóng từ khi bắt đầu đóng cho đến khi chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc mà chưa hưởng trợ cấp thất nghiệp.","Sau khi chấm dứt hưởng trợ cấp thất nghiệp, thời gian đóng tiếp theo được tính lại từ đầu, trừ trường hợp được bảo lưu theo khoản 5 và khoản 6 Điều 41.","Thời gian đóng bảo hiểm thất nghiệp không được tính để hưởng trợ cấp mất việc làm hoặc trợ cấp thôi việc theo pháp luật về lao động, viên chức."]},"luat-74_36":{"tldr":"Người lao động đang đóng bảo hiểm thất nghiệp bị chấm dứt hợp đồng/làm việc và có nhu cầu tìm kiếm việc làm được tư vấn, giới thiệu việc làm.","points":["Người lao động theo khoản 1 Điều 31 đang đóng bảo hiểm thất nghiệp bị chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc, có nhu cầu tìm việc thì được tư vấn, giới thiệu việc làm.","Chính phủ quy định việc tư vấn, giới thiệu việc làm."]},"luat-74_37":{"tldr":"Quy định điều kiện, thời gian và nội dung hỗ trợ người lao động tham gia đào tạo, nâng cao trình độ kỹ năng nghề; tổng thời gian hỗ trợ không quá 06 tháng.","points":["Người lao động đang hưởng trợ cấp thất nghiệp được hỗ trợ đào tạo, nâng cao trình độ kỹ năng nghề.","Người không thuộc đối tượng trên phải đủ điều kiện: thuộc đối tượng tại điểm a khoản 1 Điều 38; nộp hồ sơ trong thời hạn 12 tháng kể từ ngày chấm dứt hợp đồng/làm việc; trong 10 ngày làm việc kể từ ngày nộp đủ hồ sơ không thuộc các trường hợp có việc làm thuộc đối tượng đóng BHXH bắt buộc, nghĩa vụ quân sự/công an/dân quân, đi học trên 12 tháng, đưa vào cơ sở giáo dục/cai nghiện bắt buộc, tạm giam, chấp hành án tù, định cư nước ngoài hoặc chết; đã đóng từ đủ 09 tháng trở lên trong 36 tháng trước khi chấm dứt.","Tổng thời gian hỗ trợ không quá 06 tháng.","Nội dung hỗ trợ: học phí; tiền ăn trong thời gian tham gia đào tạo."]},"luat-74_38":{"tldr":"Quy định 4 điều kiện hưởng trợ cấp thất nghiệp, gồm điều kiện về chấm dứt việc làm hợp pháp, thời gian đóng, thời hạn nộp hồ sơ và tình trạng chưa có việc làm.","points":["Chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc theo pháp luật, không thuộc trường hợp đơn phương chấm dứt trái pháp luật hoặc nghỉ việc khi đủ điều kiện hưởng lương hưu.","Đã đóng bảo hiểm thất nghiệp từ đủ 12 tháng trở lên trong 24 tháng trước khi chấm dứt; nếu hợp đồng có thời hạn từ đủ 01 tháng đến dưới 12 tháng thì phải đóng đủ 12 tháng trở lên trong 36 tháng.","Đã nộp đủ hồ sơ hưởng trợ cấp thất nghiệp trong thời hạn 03 tháng kể từ ngày chấm dứt.","Trong 10 ngày làm việc kể từ ngày nộp đủ hồ sơ không thuộc các trường hợp có việc làm thuộc đối tượng đóng BHXH bắt buộc, nghĩa vụ quân sự/công an/dân quân, đi học trên 12 tháng, đưa vào cơ sở giáo dục/cai nghiện bắt buộc, tạm giam, chấp hành án tù, định cư nước ngoài hoặc chết."]},"luat-74_39":{"tldr":"Quy định mức hưởng, thời gian hưởng, thời điểm hưởng trợ cấp thất nghiệp và chế độ bảo hiểm y tế cho người đang hưởng trợ cấp thất nghiệp.","points":["Mức hưởng hằng tháng bằng 60% mức bình quân tiền lương tháng đóng bảo hiểm thất nghiệp của 06 tháng gần nhất trước khi chấm dứt, tối đa không quá 05 lần mức lương tối thiểu tháng theo vùng tại tháng cuối cùng đóng.","Thời gian hưởng: đóng đủ 12 tháng đến đủ 36 tháng được hưởng 03 tháng; sau đó cứ đóng đủ thêm 12 tháng được hưởng thêm 01 tháng, tối đa 12 tháng.","Thời điểm hưởng là ngày làm việc thứ 11 kể từ ngày nộp đủ hồ sơ.","Người đang hưởng trợ cấp thất nghiệp (kể cả thời gian tạm dừng hưởng theo khoản 2 Điều 41) được hưởng bảo hiểm y tế, do cơ quan bảo hiểm xã hội đóng từ Quỹ bảo hiểm thất nghiệp."]},"luat-74_41":{"tldr":"Quy định việc chuyển nơi hưởng, tạm dừng, tiếp tục, chấm dứt hưởng và hủy hưởng trợ cấp thất nghiệp, cùng các trường hợp được bảo lưu thời gian đóng.","points":["Trong thời gian hưởng, người lao động được chuyển nơi hưởng trợ cấp thất nghiệp khi có nhu cầu.","Bị tạm dừng hưởng khi không thông báo về việc tìm kiếm việc làm hằng tháng theo Điều 40; không được hưởng tiền và không được bảo lưu thời gian tạm dừng; được tiếp tục hưởng khi thực hiện thông báo nếu còn thời gian.","Chấm dứt hưởng khi: có việc làm thuộc đối tượng đóng BHXH bắt buộc; nghĩa vụ quân sự/công an/dân quân thường trực; hưởng lương hưu hằng tháng; sau 02 lần từ chối việc làm được giới thiệu không có lý do chính đáng; không thông báo tìm việc 03 tháng liên tục; định cư nước ngoài; đi học trên 12 tháng; bị xử phạt hành chính về BHTN; chết; vào cơ sở giáo dục/cai nghiện bắt buộc; bị tuyên bố mất tích; tạm giam, chấp hành án tù; theo đề nghị của người lao động.","Được bảo lưu thời gian đóng làm căn cứ tính thời gian hưởng lần sau nếu chấm dứt thuộc các điểm a, b, g, k, l, m và n khoản 4, trừ trường hợp không thông báo tình trạng."]},"luat-74_42":{"tldr":"Quy định trường hợp, điều kiện và thời gian hỗ trợ người sử dụng lao động đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm cho người lao động; tổng thời gian hỗ trợ không quá 06 tháng.","points":["Được hỗ trợ khi việc làm của nhiều người lao động tham gia bảo hiểm thất nghiệp bị ảnh hưởng hoặc có nguy cơ ảnh hưởng do: thay đổi cơ cấu, công nghệ hoặc lý do kinh tế; thiên tai, hỏa hoạn, địch họa, dịch bệnh nguy hiểm; di dời hoặc thu hẹp địa điểm sản xuất kinh doanh theo quyết định của cơ quan nhà nước; trường hợp khác theo quy định của Chính phủ.","Điều kiện: đóng đủ bảo hiểm thất nghiệp từ 12 tháng trở lên trong 24 tháng tính đến thời điểm đề nghị; có phương án đào tạo, bồi dưỡng, nâng cao kỹ năng nghề để duy trì việc làm.","Tổng thời gian hỗ trợ không quá 06 tháng."]},"luat-74_43":{"tldr":"Quy định Quỹ bảo hiểm thất nghiệp là quỹ tài chính độc lập với ngân sách nhà nước và việc kiểm toán định kỳ.","points":["Quỹ là quỹ tài chính độc lập với ngân sách nhà nước; được hạch toán, kế toán, lập báo cáo tài chính, kiểm toán nội bộ theo pháp luật về kế toán.","Định kỳ 03 năm, Kiểm toán nhà nước kiểm toán Quỹ và hoạt động đầu tư quỹ, báo cáo kết quả với Quốc hội; được kiểm toán đột xuất theo yêu cầu của Quốc hội, Ủy ban Thường vụ Quốc hội hoặc Chính phủ."]},"luat-74_45":{"tldr":"Quy định 5 nội dung sử dụng Quỹ bảo hiểm thất nghiệp.","points":["Chi trả các chế độ bảo hiểm thất nghiệp.","Chi trả hỗ trợ bằng tiền hoặc hỗ trợ khác theo khoản 2 Điều 30.","Đóng bảo hiểm y tế cho người hưởng trợ cấp thất nghiệp.","Chi tổ chức và hoạt động bảo hiểm thất nghiệp.","Đầu tư để bảo toàn và tăng trưởng quỹ."]},"luat-74_46":{"tldr":"Quy định nội dung, cách xác định mức chi và việc kiểm toán chi tổ chức và hoạt động bảo hiểm thất nghiệp.","points":["Nội dung chi gồm: tuyên truyền, tập huấn về BHTN; cải cách hành chính, phát triển và quản lý người tham gia, người thụ hưởng; đầu tư, sửa chữa, thuê, mua sắm tài sản, hàng hóa, dịch vụ; tổ chức thu, giải quyết, chi trả và hoạt động bộ máy cơ quan thực hiện.","Mức chi được tính trên cơ sở phần trăm của dự toán thu, chi BHTN, không gồm chi đóng bảo hiểm y tế cho người hưởng trợ cấp thất nghiệp, trích từ Quỹ.","Định kỳ 03 năm, Chính phủ báo cáo Ủy ban Thường vụ Quốc hội quyết định mức chi cùng với mức chi tổ chức và hoạt động bảo hiểm xã hội.","Kiểm toán nhà nước kiểm toán hằng năm đối với báo cáo quyết toán chi tổ chức và hoạt động bảo hiểm thất nghiệp."]},"luat-74_47":{"tldr":"Quy định Quỹ bảo hiểm thất nghiệp được đầu tư, hạch toán độc lập và yêu cầu về an toàn, kiểm soát rủi ro trong hoạt động đầu tư.","points":["Quỹ được đầu tư và hạch toán độc lập.","Hoạt động đầu tư phải bảo đảm an toàn, bền vững, hiệu quả; được kiểm soát, quản lý rủi ro và trích lập dự phòng rủi ro.","Chính phủ quy định việc đầu tư, kiểm soát, quản lý rủi ro và trích lập, sử dụng dự phòng rủi ro."]},"luat-74_48":{"tldr":"Quy định trách nhiệm của Chính phủ về bảo hiểm thất nghiệp.","points":["Quyết định hoặc trình cấp có thẩm quyền quyết định biện pháp xử lý, hỗ trợ khi cần thiết để bảo vệ quyền, lợi ích chính đáng về BHTN của người lao động, người sử dụng lao động.","Hằng năm báo cáo Quốc hội tình hình thực hiện chính sách, chế độ và quản lý, sử dụng Quỹ bảo hiểm thất nghiệp trong báo cáo về bảo hiểm xã hội.","Quy định việc lập quyết toán và phân công cơ quan duyệt, thẩm định, phê chuẩn quyết toán chi tổ chức và hoạt động BHTN; quy định quyền và trách nhiệm của các cơ quan, tổ chức, cá nhân liên quan."]},"luat-74_49":{"tldr":"Quy định quyền khiếu nại về bảo hiểm thất nghiệp.","points":["Cơ quan, tổ chức, cá nhân có quyền đề nghị cơ quan, tổ chức, cá nhân có thẩm quyền xem xét lại quyết định, hành vi khi có căn cứ cho rằng quyết định, hành vi đó trái pháp luật về bảo hiểm thất nghiệp, xâm phạm đến quyền và lợi ích hợp pháp của mình."]},"luat-74_50":{"tldr":"Quy định việc khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi hành chính về bảo hiểm thất nghiệp và trong hoạt động thanh tra.","points":["Khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi hành chính về BHTN thực hiện theo pháp luật về khiếu nại, trừ trường hợp tại khoản 2.","Khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi hành chính và quyết định, hành vi khác trong hoạt động thanh tra về BHTN thực hiện theo pháp luật về thanh tra."]},"luat-74_51":{"tldr":"Quy định việc khiếu nại, giải quyết khiếu nại và khởi kiện đối với quyết định, hành vi về bảo hiểm thất nghiệp của cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công, cùng thẩm quyền giải quyết.","points":["Quyết định, hành vi về BHTN là của cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công và người có thẩm quyền trong các cơ quan này khi thực hiện hoặc không thực hiện trách nhiệm theo pháp luật về BHTN.","Người khiếu nại có thể khiếu nại lần đầu đến cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ việc làm công, hoặc khởi kiện tại Tòa án.","Khiếu nại lần hai: nếu lần đầu do cơ quan BHXH giải quyết thì đến người đứng đầu cơ quan cấp trên trực tiếp; nếu do tổ chức dịch vụ việc làm công giải quyết thì đến người đứng đầu cơ quan chuyên môn về việc làm của Ủy ban nhân dân cấp tỉnh, hoặc khởi kiện tại Tòa án.","Không đồng ý với giải quyết lần hai hoặc hết thời hạn chưa được giải quyết thì có quyền khởi kiện tại Tòa án.","Thời hiệu, trình tự, thủ tục giải quyết khiếu nại thực hiện theo pháp luật về khiếu nại."]},"luat-74_52":{"tldr":"Quy định việc tố cáo, giải quyết tố cáo về bảo hiểm thất nghiệp theo pháp luật về tố cáo.","points":["Tố cáo, giải quyết tố cáo đối với hành vi vi phạm trong thực hiện nhiệm vụ, công vụ về BHTN và vi phạm về quản lý nhà nước trong lĩnh vực BHTN thực hiện theo pháp luật về tố cáo.","Cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công có trách nhiệm giải quyết tố cáo hành vi vi phạm trong chấp hành pháp luật về BHTN.","Trình tự, thủ tục tố cáo, giải quyết tố cáo thực hiện theo pháp luật về tố cáo."]},"luat-74_53":{"tldr":"Sửa đổi, bổ sung Luật Phí và lệ phí: bổ sung số thứ tự 36 và 37 vào Danh mục phí, lệ phí về lệ phí cấp giấy chứng nhận hoạt động đánh giá kỹ năng nghề quốc gia và lệ phí cấp chứng chỉ kỹ năng nghề quốc gia.","points":["Bổ sung số thứ tự 36 và 37 vào sau số thứ tự 35 mục III phần B của Phụ lục số 01 về Danh mục phí, lệ phí.","Số 36: Lệ phí cấp giấy chứng nhận hoạt động đánh giá kỹ năng nghề quốc gia — Bộ Tài chính.","Số 37: Lệ phí cấp chứng chỉ kỹ năng nghề quốc gia — Bộ Tài chính."]},"luat-74_54":{"tldr":"Luật có hiệu lực thi hành từ ngày 01/01/2026; Luật Việc làm số 38/2013/QH13 (đã sửa đổi, bổ sung theo Luật số 41/2024/QH15) hết hiệu lực kể từ ngày Luật này có hiệu lực.","points":["Luật này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026.","Luật Việc làm số 38/2013/QH13 hết hiệu lực kể từ ngày Luật này có hiệu lực, trừ các trường hợp quy định tại khoản 1, 2 và 3 Điều 55."]},"luat-74_55":{"tldr":"Quy định chuyển tiếp về nguồn Quỹ quốc gia về việc làm, hợp đồng tín dụng đã ký, tổ chức đánh giá kỹ năng nghề và hồ sơ hưởng bảo hiểm thất nghiệp đã nộp trước ngày Luật có hiệu lực.","points":["Chuyển nguồn Quỹ quốc gia về việc làm thành nguồn ngân sách trung ương cấp cho Ngân hàng Chính sách xã hội để làm nguồn vốn cho vay giải quyết việc làm.","Khách hàng đã ký hợp đồng tín dụng với Ngân hàng Chính sách xã hội từ Quỹ quốc gia về việc làm và nguồn tín dụng ưu đãi khác trước ngày Luật có hiệu lực thì tiếp tục thực hiện đến khi hoàn thành hợp đồng đã ký.","Tổ chức đánh giá kỹ năng nghề đã được cấp giấy chứng nhận hoạt động trước ngày Luật có hiệu lực thì tiếp tục hoạt động theo giấy chứng nhận đã được cấp.","Người lao động, người sử dụng lao động đã nộp hồ sơ hưởng chế độ BHTN trước ngày Luật có hiệu lực nhưng chưa có quyết định hưởng thì thực hiện theo Luật này."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
