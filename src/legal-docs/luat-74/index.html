<script id="LD" type="application/json">{"meta":{"title":"Luật 74/2025/QH15 — Luật Việc làm","shortCode":"Luật 74/2025","subtitle":"Việc làm","slug":"luat-74","effectiveDate":"01/07/2026","scope":"Luật này quy định chính sách hỗ trợ tạo việc làm, đăng ký lao động, hệ thống thông tin thị trường lao động, phát triển kỹ năng nghề, dịch vụ việc làm, bảo hiểm thất nghiệp và quản lý nhà nước về việc làm.","description":"Việc làm","related":[]},"outline":[{"id":"luat-74_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định chính sách hỗ trợ tạo việc làm, đăng ký lao động, hệ thống thông tin thị trường lao động, phát triển kỹ năng nghề, dịch vụ việc làm, bảo hiểm thất nghiệp và quản lý nhà nước về việc làm."}]},{"id":"luat-74_2","no":2,"code":"Điều 2","title":"Điều 2. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Người lao động là công dân Việt Nam từ đủ 15 tuổi trở lên có khả năng lao động và có nhu cầu làm việc. Trường hợp lao động chưa thành niên phải bảo đảm điều kiện theo quy định của Bộ luật Lao động."},{"k":"p","t":"2. Việc làm là hoạt động lao động tạo ra thu nhập mà pháp luật không cấm."},{"k":"p","t":"3. Tiêu chuẩn kỹ năng nghề quốc gia là yêu cầu về kiến thức chuyên môn, kỹ thuật, năng lực thực hành và khả năng ứng dụng mà người lao động cần phải có để thực hiện công việc theo từng bậc trình độ kỹ năng của từng nghề."},{"k":"p","t":"4. Bảo hiểm thất nghiệp là loại hình bảo hiểm bắt buộc do Nhà nước tổ chức mà người lao động, người sử dụng lao động tham gia để hỗ trợ duy trì việc làm, đào tạo, tư vấn, giới thiệu việc làm và bù đắp một phần thu nhập cho người lao động khi bị mất việc làm trên cơ sở đóng vào Quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"5. Việc làm công là việc làm tạm thời có trả công được tạo ra thông qua việc thực hiện các chương trình, dự án, hoạt động sử dụng vốn nhà nước tại địa phương."},{"k":"p","t":"6. Cơ sở dữ liệu về người lao động là tập hợp các dữ liệu về người lao động được sắp xếp, tổ chức để truy cập, khai thác, chia sẻ, quản lý và cập nhật."},{"k":"p","t":"7. Phân biệt đối xử trong việc làm là hành vi phân biệt, loại trừ hoặc ưu tiên dựa trên chủng tộc, màu da, nguồn gốc quốc gia hoặc nguồn gốc xã hội, dân tộc, giới tính, độ tuổi, tình trạng thai sản, tình trạng hôn nhân, tôn giáo, tín ngưỡng, khuyết tật, bệnh tật, trách nhiệm gia đình làm ảnh hưởng đến bình đẳng về cơ hội việc làm hoặc nghề nghiệp, trừ trường hợp xuất phát từ yêu cầu đặc thù của công việc và nhằm duy trì, bảo vệ việc làm cho người lao động dễ bị tổn thương."}]},{"id":"luat-74_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc về việc làm","shortTitle":"Nguyên tắc về việc làm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Bảo đảm quyền làm việc, tự do lựa chọn việc làm và nơi làm việc."},{"k":"p","t":"2. Bình đẳng về cơ hội việc làm, tiền lương và thu nhập."},{"k":"p","t":"3. Bảo đảm làm việc trong điều kiện an toàn lao động, vệ sinh lao động."}]},{"id":"luat-74_4","no":4,"code":"Điều 4","title":"Điều 4. Chính sách của Nhà nước về việc làm","shortTitle":"Chính sách của Nhà nước về việc làm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Phát triển kinh tế - xã hội nhằm tạo việc làm cho người lao động, xác định mục tiêu giải quyết việc làm trong chiến lược, quy hoạch, kế hoạch phát triển kinh tế - xã hội; phát triển việc làm trong khu vực kinh tế tư nhân; bố trí nguồn lực để thực hiện chính sách, chiến lược về việc làm, về phát triển kỹ năng nghề; phát triển chính sách bảo hiểm thất nghiệp."},{"k":"p","t":"2. Tư vấn, giới thiệu việc làm miễn phí cho người lao động và cung cấp thông tin thị trường lao động miễn phí qua tổ chức dịch vụ việc làm công."},{"k":"p","t":"3. Thúc đẩy chuyển dịch cơ cấu lao động phù hợp với cơ cấu kinh tế và theo hướng bền vững."},{"k":"p","t":"4. Hỗ trợ tạo việc làm, tự tạo việc làm, chuyển đổi việc làm."},{"k":"p","t":"5. Hỗ trợ phát triển thị trường lao động, ưu tiên đầu tư phát triển hạ tầng đáp ứng yêu cầu chuyển đổi số."},{"k":"p","t":"6. Khuyến khích phát triển kỹ năng nghề, tạo việc làm trong lĩnh vực khoa học, công nghệ, đổi mới sáng tạo, chuyển đổi số, kinh tế tuần hoàn, kinh tế xanh."},{"k":"p","t":"7. Khuyến khích tổ chức, cá nhân hỗ trợ, thực hiện các hoạt động phát triển kỹ năng nghề; tham gia đào tạo, đào tạo lại, tạo việc làm, tự tạo việc làm và duy trì việc làm theo hướng bền vững."}]},{"id":"luat-74_5","no":5,"code":"Điều 5","title":"Điều 5. Những hành vi bị nghiêm cấm","shortTitle":"Những hành vi bị nghiêm cấm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Phân biệt đối xử trong việc làm."},{"k":"p","t":"2. Gian lận, giả mạo hồ sơ trong việc thực hiện chính sách về việc làm, dịch vụ việc làm, đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia."},{"k":"p","t":"3. Lợi dụng hoạt động dịch vụ việc làm xâm phạm đến chủ quyền quốc gia, quốc phòng, an ninh, lợi ích quốc gia, dân tộc, trật tự, an toàn xã hội, lợi ích công cộng, quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân."},{"k":"p","t":"4. Khai thác, chia sẻ, mua bán, trao đổi, chiếm đoạt, sử dụng trái phép thông tin, dữ liệu trong cơ sở dữ liệu về người lao động và thông tin về thị trường lao động."}]},{"id":"luat-74_6","no":6,"code":"Điều 6","title":"Điều 6. Quản lý nhà nước về việc làm","shortTitle":"Quản lý nhà nước về việc làm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung quản lý nhà nước về việc làm bao gồm:"},{"k":"p","t":"a) Ban hành, tổ chức thực hiện văn bản quy phạm pháp luật về việc làm;"},{"k":"p","t":"b) Tuyên truyền, phổ biến và giáo dục pháp luật về việc làm;"},{"k":"p","t":"c) Quản lý lao động, thông tin thị trường lao động, phát triển kỹ năng nghề, chính sách hỗ trợ tạo việc làm, dịch vụ việc làm và bảo hiểm thất nghiệp;"},{"k":"p","t":"d) Thanh tra, kiểm tra, giám sát việc thực hiện chính sách, pháp luật về việc làm; giải quyết khiếu nại, tố cáo và xử lý vi phạm pháp luật về việc làm;"},{"k":"p","t":"đ) Hợp tác quốc tế về việc làm."},{"k":"p","t":"2. Trách nhiệm quản lý nhà nước về việc làm được quy định như sau:"},{"k":"p","t":"a) Chính phủ thống nhất quản lý nhà nước về việc làm;"},{"k":"p","t":"b) Bộ Nội vụ là cơ quan đầu mối giúp Chính phủ thực hiện quản lý nhà nước về việc làm;"},{"k":"p","t":"c) Bộ, cơ quan ngang Bộ, trong phạm vi nhiệm vụ, quyền hạn của mình, có trách nhiệm phối hợp với Bộ Nội vụ thực hiện quản lý nhà nước về việc làm;"},{"k":"p","t":"d) Ủy ban nhân dân các cấp, trong phạm vi nhiệm vụ, quyền hạn của mình, thực hiện quản lý nhà nước về việc làm tại địa phương."}]},{"id":"luat-74_7","no":7,"code":"Điều 7","title":"Điều 7. Trách nhiệm của cơ quan, tổ chức và cá nhân về việc làm","shortTitle":"Trách nhiệm của cơ quan, tổ chức và cá nhân về việc làm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên, trong phạm vi chức năng, nhiệm vụ của mình, có trách nhiệm tuyên truyền, vận động cơ quan, tổ chức và cá nhân tạo việc làm cho người lao động; thực hiện giám sát và phản biện xã hội trong việc xây dựng, thực hiện chính sách, pháp luật về việc làm theo quy định của pháp luật."},{"k":"p","t":"2. Cơ quan, tổ chức, trong phạm vi nhiệm vụ, quyền hạn của mình, có trách nhiệm tuyên truyền, phổ biến chính sách, pháp luật về việc làm; tạo việc làm; bảo vệ quyền và lợi ích hợp pháp của người lao động, người sử dụng lao động theo quy định của pháp luật."},{"k":"p","t":"3. Cá nhân có trách nhiệm chủ động tìm kiếm việc làm và tham gia tạo việc làm, nâng cao trình độ kỹ năng nghề."}]},{"id":"luat-74_8","no":8,"code":"Điều 8","title":"Điều 8. Tín dụng chính sách về giải quyết việc làm","shortTitle":"Tín dụng chính sách về giải quyết việc làm","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Nhà nước thực hiện tín dụng chính sách để hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và hỗ trợ người lao động đi làm việc ở nước ngoài theo hợp đồng thông qua Ngân hàng Chính sách xã hội từ nguồn vốn cho vay giải quyết việc làm."},{"k":"p","t":"2. Nguồn vốn cho vay giải quyết việc làm bao gồm:"},{"k":"p","t":"a) Ngân sách trung ương cấp cho Ngân hàng Chính sách xã hội;"},{"k":"p","t":"b) Ngân sách địa phương ủy thác cho Ngân hàng Chính sách xã hội;"},{"k":"p","t":"c) Nguồn huy động của Ngân hàng Chính sách xã hội được ngân sách nhà nước cấp bù chênh lệch lãi suất và phí quản lý;"},{"k":"p","t":"d) Nguồn vốn tổ chức, cá nhân ủy thác cho Ngân hàng Chính sách xã hội."},{"k":"p","t":"3. Căn cứ khả năng cân đối ngân sách của địa phương và nhu cầu giải quyết việc làm, Hội đồng nhân dân cấp tỉnh quyết định bố trí vốn từ ngân sách địa phương và nguồn vốn hợp pháp khác, giao Ủy ban nhân dân cùng cấp ủy thác cho Ngân hàng Chính sách xã hội để thực hiện cho vay giải quyết việc làm."}]},{"id":"luat-74_9","no":9,"code":"Điều 9","title":"Điều 9. Chính sách cho vay giải quyết việc làm","shortTitle":"Chính sách cho vay giải quyết việc làm","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm bao gồm:"},{"k":"p","t":"a) Doanh nghiệp nhỏ và vừa, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, hộ kinh doanh (sau đây gọi chung là cơ sở sản xuất, kinh doanh);"},{"k":"p","t":"b) Người lao động."},{"k":"p","t":"2. Đối tượng vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng là người lao động đi làm việc ở nước ngoài theo hợp đồng."},{"k":"p","t":"3. Đối tượng vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm với mức lãi suất thấp hơn bao gồm:"},{"k":"p","t":"a) Cơ sở sản xuất, kinh doanh sử dụng nhiều lao động là người khuyết tật, người dân tộc thiểu số, người đã chấp hành xong án phạt tù, người đã chấp hành xong quyết định đưa vào cơ sở giáo dục bắt buộc, người đã chấp hành xong quyết định đưa vào cơ sở cai nghiện bắt buộc;"},{"k":"p","t":"b) Người lao động là người dân tộc thiểu số thuộc hộ nghèo;"},{"k":"p","t":"c) Người lao động là người dân tộc Kinh thuộc hộ nghèo đang sinh sống tại địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định của Chính phủ;"},{"k":"p","t":"d) Người lao động là người khuyết tật; người lao động trong hộ gia đình đang trực tiếp nuôi dưỡng, chăm sóc người khuyết tật đặc biệt nặng; người lao động nhận nuôi dưỡng, chăm sóc người khuyết tật đặc biệt nặng;"},{"k":"p","t":"đ) Đối tượng khác do Chính phủ quyết định căn cứ tình hình kinh tế - xã hội và yêu cầu cho vay vốn giải quyết việc làm."},{"k":"p","t":"4. Đối tượng vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng với mức lãi suất thấp hơn bao gồm:"},{"k":"p","t":"a) Người lao động là người dân tộc thiểu số thuộc hộ nghèo;"},{"k":"p","t":"b) Người lao động là người dân tộc Kinh thuộc hộ nghèo đang sinh sống tại địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định của Chính phủ;"},{"k":"p","t":"c) Đối tượng khác do Chính phủ quyết định căn cứ tình hình kinh tế - xã hội và yêu cầu cho vay vốn giải quyết việc làm."},{"k":"p","t":"5. Cơ sở sản xuất, kinh doanh được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Có phương án sử dụng vốn vay khả thi phù hợp với ngành, nghề sản xuất, kinh doanh nhằm hỗ trợ tạo việc làm, duy trì, mở rộng việc làm;"},{"k":"p","t":"b) Thực hiện bảo đảm tiền vay theo quy định của pháp luật."},{"k":"p","t":"6. Người lao động được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Có năng lực hành vi dân sự đầy đủ;"},{"k":"p","t":"b) Có phương án sử dụng vốn vay để tạo việc làm, duy trì, mở rộng việc làm."},{"k":"p","t":"7. Người lao động được vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Có năng lực hành vi dân sự đầy đủ;"},{"k":"p","t":"b) Đã ký kết hợp đồng với doanh nghiệp dịch vụ, đơn vị sự nghiệp đưa người lao động đi làm việc ở nước ngoài theo hợp đồng theo quy định của pháp luật;"},{"k":"p","t":"c) Thực hiện bảo đảm tiền vay theo quy định pháp luật."},{"k":"p","t":"8. Đối với nguồn vốn ngân sách địa phương ủy thác cho Ngân hàng Chính sách xã hội, Hội đồng nhân dân cấp tỉnh quyết định các đối tượng khác đối tượng quy định tại khoản 3 và khoản 4 Điều này được vay vốn với mức lãi suất thấp hơn."},{"k":"p","t":"9. Đối với nguồn vốn tổ chức, cá nhân ủy thác cho Ngân hàng Chính sách xã hội thì tổ chức, cá nhân quyết định đối tượng vay vốn."},{"k":"p","t":"10. Chính phủ quy định chi tiết điểm a khoản 3 Điều này; quy định lãi suất cho vay, mức vay, thời hạn cho vay, hồ sơ, trình tự, thủ tục vay vốn và điều kiện bảo đảm tiền vay hỗ trợ tạo việc làm, duy trì, mở rộng việc làm, vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng đối với nguồn vốn quy định tại khoản 2 Điều 8 của Luật này."}]},{"id":"luat-74_10","no":10,"code":"Điều 10","title":"Điều 10. Chính sách hỗ trợ chuyển đổi nghề nghiệp, việc làm cho người lao động ở khu vực nông thôn","shortTitle":"Chính sách hỗ trợ chuyển đổi nghề nghiệp, việc làm cho người lao động ở khu vực nông thôn","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Căn cứ chiến lược, quy hoạch, kế hoạch phát triển kinh tế - xã hội, Nhà nước hỗ trợ chuyển đổi nghề nghiệp, việc làm cho người lao động ở khu vực nông thôn."},{"k":"p","t":"2. Người lao động ở khu vực nông thôn tham gia chuyển đổi nghề nghiệp, việc làm được hỗ trợ như sau:"},{"k":"p","t":"a) Vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng theo quy định của Luật này;"},{"k":"p","t":"b) Hỗ trợ đào tạo nghề theo quy định của Chính phủ."}]},{"id":"luat-74_11","no":11,"code":"Điều 11","title":"Điều 11. Chính sách việc làm công","shortTitle":"Chính sách việc làm công","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Chính sách việc làm công được thực hiện thông qua các chương trình, dự án, hoạt động sử dụng vốn nhà nước gắn với phát triển kinh tế - xã hội tại địa phương."},{"k":"p","t":"2. Các chương trình, dự án, hoạt động quy định tại khoản 1 Điều này được thực hiện hình thức lựa chọn nhà thầu là tham gia thực hiện của cộng đồng theo quy định của pháp luật về đấu thầu."},{"k":"p","t":"3. Ưu tiên tham gia việc làm công đối với người lao động là người dân tộc thiểu số; người thuộc hộ nghèo, hộ cận nghèo; người cao tuổi; người khuyết tật; người trong hộ gia đình đang trực tiếp nuôi dưỡng, chăm sóc người khuyết tật đặc biệt nặng; người nhận nuôi dưỡng, chăm sóc người khuyết tật đặc biệt nặng; người có đất thu hồi thuộc đối tượng được hỗ trợ đào tạo, chuyển đổi nghề và tìm kiếm việc làm theo quy định của pháp luật về đất đai."},{"k":"p","t":"4. Chính phủ quy định việc thực hiện chính sách việc làm công."}]},{"id":"luat-74_12","no":12,"code":"Điều 12","title":"Điều 12. Chính sách hỗ trợ việc làm cho người lao động là thanh niên","shortTitle":"Chính sách hỗ trợ việc làm cho người lao động là thanh niên","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Được hỗ trợ đào tạo nghề theo quy định của Chính phủ trong các trường hợp sau đây:"},{"k":"p","t":"a) Thanh niên hoàn thành nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân;"},{"k":"p","t":"b) Thanh niên tình nguyện hoàn thành nhiệm vụ thực hiện chương trình, dự án phát triển kinh tế - xã hội;"},{"k":"p","t":"c) Trí thức trẻ tình nguyện sau khi hoàn thành nhiệm vụ công tác tại khu kinh tế - quốc phòng."},{"k":"p","t":"2. Được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng theo quy định của Luật này."},{"k":"p","t":"3. Được hỗ trợ lập nghiệp, khởi nghiệp theo quy định của pháp luật."}]},{"id":"luat-74_13","no":13,"code":"Điều 13","title":"Điều 13. Chính sách hỗ trợ việc làm cho người lao động là người cao tuổi","shortTitle":"Chính sách hỗ trợ việc làm cho người lao động là người cao tuổi","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Được vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm theo quy định của Luật này."},{"k":"p","t":"2. Được hỗ trợ đào tạo, bồi dưỡng nâng cao trình độ kỹ năng nghề, hỗ trợ tham gia đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia theo quy định của Luật này."},{"k":"p","t":"3. Căn cứ điều kiện kinh tế - xã hội trong từng thời kỳ và khả năng cân đối ngân sách, Nhà nước có chính sách hỗ trợ giải quyết việc làm, đào tạo lại, đào tạo chuyển đổi nghề nghiệp cho người lao động nhằm thích ứng với già hóa dân số."}]},{"id":"luat-74_14","no":14,"code":"Điều 14","title":"Điều 14. Hỗ trợ người lao động đi làm việc ở nước ngoài theo hợp đồng","shortTitle":"Hỗ trợ người lao động đi làm việc ở nước ngoài theo hợp đồng","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động thuộc một trong các trường hợp sau đây được hỗ trợ trước khi đi làm việc ở nước ngoài theo hợp đồng:"},{"k":"p","t":"a) Người có công với cách mạng, thân nhân của người có công với cách mạng;"},{"k":"p","t":"b) Người dân tộc thiểu số;"},{"k":"p","t":"c) Người thuộc hộ nghèo, hộ cận nghèo;"},{"k":"p","t":"d) Người có đất thu hồi thuộc đối tượng được hỗ trợ đào tạo, chuyển đổi nghề và tìm kiếm việc làm theo quy định của pháp luật về đất đai;"},{"k":"p","t":"đ) Người hoàn thành nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân;"},{"k":"p","t":"e) Thanh niên tình nguyện hoàn thành nhiệm vụ thực hiện chương trình, dự án phát triển kinh tế - xã hội;"},{"k":"p","t":"g) Trí thức trẻ tình nguyện sau khi hoàn thành nhiệm vụ công tác tại khu kinh tế - quốc phòng."},{"k":"p","t":"2. Chế độ hỗ trợ bao gồm:"},{"k":"p","t":"a) Giáo dục định hướng trước khi đi làm việc ở nước ngoài theo hợp đồng;"},{"k":"p","t":"b) Đào tạo, bồi dưỡng nâng cao trình độ kỹ năng nghề, ngoại ngữ để đáp ứng yêu cầu của bên nước ngoài tiếp nhận lao động;"},{"k":"p","t":"c) Chi phí khác cho người lao động đi làm việc ở nước ngoài theo hợp đồng."},{"k":"p","t":"3. Chính phủ quy định chi tiết khoản 2 Điều này."}]},{"id":"luat-74_15","no":15,"code":"Điều 15","title":"Điều 15. Hoạt động hỗ trợ phát triển thị trường lao động","shortTitle":"Hoạt động hỗ trợ phát triển thị trường lao động","chuong":"Chương II — CHÍNH SÁCH HỖ TRỢ TẠO VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của Nhà nước trong việc hỗ trợ phát triển thị trường lao động bao gồm:"},{"k":"p","t":"a) Xây dựng, quản lý, vận hành, khai thác, nâng cấp hệ thống hạ tầng công nghệ, cơ sở dữ liệu về người lao động, hệ thống thông tin thị trường lao động;"},{"k":"p","t":"b) Đầu tư xây dựng, nâng cao năng lực, hiện đại hóa hoạt động dịch vụ việc làm của tổ chức dịch vụ việc làm công; phát triển sàn giao dịch việc làm quốc gia."},{"k":"p","t":"2. Kinh phí bảo đảm thực hiện quy định tại khoản 1 Điều này được sử dụng từ nguồn ngân sách nhà nước theo quy định của pháp luật về ngân sách nhà nước, pháp luật về đầu tư công và nguồn khác theo quy định của pháp luật."}]},{"id":"luat-74_16","no":16,"code":"Điều 16","title":"Điều 16. Nguyên tắc đăng ký lao động","shortTitle":"Nguyên tắc đăng ký lao động","chuong":"Chương III — ĐĂNG KÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đơn giản, thuận tiện, kịp thời, chính xác, công khai, minh bạch trong trình tự, thủ tục đăng ký lao động."},{"k":"p","t":"2. Bảo đảm quyền, lợi ích hợp pháp của người sử dụng lao động, người lao động khi đăng ký lao động."},{"k":"p","t":"3. Ứng dụng khoa học, công nghệ, giao dịch điện tử trong đăng ký lao động."},{"k":"p","t":"4. Tiếp nhận, cập nhật, điều chỉnh thông tin về người lao động vào cơ sở dữ liệu về người lao động và kết nối, đồng bộ với Cơ sở dữ liệu tổng hợp quốc gia, cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành và các cơ sở dữ liệu khác."}]},{"id":"luat-74_17","no":17,"code":"Điều 17","title":"Điều 17. Thông tin đăng ký lao động và cơ sở dữ liệu về người lao động","shortTitle":"Thông tin đăng ký lao động và cơ sở dữ liệu về người lao động","chuong":"Chương III — ĐĂNG KÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tin đăng ký lao động của người lao động bao gồm:"},{"k":"p","t":"a) Nhóm thông tin cơ bản: họ, chữ đệm và tên khai sinh; số định danh cá nhân; ngày, tháng, năm sinh; giới tính; dân tộc; nơi ở hiện tại;"},{"k":"p","t":"b) Nhóm thông tin về giáo dục phổ thông, giáo dục nghề nghiệp, giáo dục đại học, chứng chỉ kỹ năng nghề và các chứng chỉ khác;"},{"k":"p","t":"c) Nhóm thông tin về tình trạng việc làm và nhu cầu về việc làm;"},{"k":"p","t":"d) Nhóm thông tin về bảo hiểm xã hội, bảo hiểm thất nghiệp;"},{"k":"p","t":"đ) Nhóm thông tin khác về đặc điểm, đặc thù của người đăng ký."},{"k":"p","t":"2. Người sử dụng lao động, người lao động đăng ký, điều chỉnh thông tin đăng ký lao động khi đăng ký, điều chỉnh thông tin tham gia bảo hiểm xã hội."},{"k":"p","t":"3. Người lao động không thuộc đối tượng quy định tại khoản 2 Điều này đăng ký, điều chỉnh thông tin đăng ký lao động thì nộp hồ sơ đăng ký, điều chỉnh thông tin đăng ký lao động đến nơi đăng ký lao động."},{"k":"p","t":"4. Thông tin quy định tại khoản 1 Điều này được kết nối, cập nhật, đồng bộ, chia sẻ từ Cơ sở dữ liệu tổng hợp quốc gia, cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành và cơ sở dữ liệu khác theo quy định của Luật này, pháp luật về dữ liệu và quy định khác của pháp luật có liên quan."},{"k":"p","t":"5. Cơ sở dữ liệu về người lao động được xây dựng và quản lý tập trung, thống nhất toàn quốc theo quy định của pháp luật về dữ liệu."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này; quy định hồ sơ, trình tự, thủ tục, nơi đăng ký lao động; quy định việc tiếp nhận, quản lý, khai thác, kết nối, chia sẻ, sử dụng cơ sở dữ liệu về người lao động."}]},{"id":"luat-74_18","no":18,"code":"Điều 18","title":"Điều 18. Quyền và nghĩa vụ của người lao động","shortTitle":"Quyền và nghĩa vụ của người lao động","chuong":"Chương III — ĐĂNG KÝ LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động có quyền sau đây:"},{"k":"p","t":"a) Được bảo vệ thông tin đăng ký lao động của bản thân theo quy định của pháp luật về bảo vệ dữ liệu cá nhân và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Được khai thác thông tin của bản thân trong cơ sở dữ liệu về người lao động;"},{"k":"p","t":"c) Được cơ quan có thẩm quyền điều chỉnh, cập nhật thông tin đăng ký lao động trong cơ sở dữ liệu về người lao động;"},{"k":"p","t":"d) Được sử dụng thông tin của bản thân trong cơ sở dữ liệu về người lao động trong giao dịch, tiếp cận và thụ hưởng chính sách hỗ trợ tạo việc làm; đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia; tư vấn, giới thiệu việc làm; bảo hiểm thất nghiệp theo quy định của Luật này."},{"k":"p","t":"2. Người lao động có nghĩa vụ sau đây:"},{"k":"p","t":"a) Thực hiện việc đăng ký lao động theo quy định của Luật này;"},{"k":"p","t":"b) Cung cấp đầy đủ, chính xác, trung thực, kịp thời về thông tin đăng ký lao động cho cơ quan nhà nước có thẩm quyền, người sử dụng lao động và chịu trách nhiệm về thông tin đã cung cấp;"},{"k":"p","t":"c) Kịp thời thực hiện việc điều chỉnh thông tin trong cơ sở dữ liệu về người lao động khi có thay đổi thông tin quy định tại điểm c khoản 1 Điều 17 của Luật này."}]},{"id":"luat-74_19","no":19,"code":"Điều 19","title":"Điều 19. Hệ thống thông tin thị trường lao động","shortTitle":"Hệ thống thông tin thị trường lao động","chuong":"Chương IV — HỆ THỐNG THÔNG TIN THỊ TRƯỜNG LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hệ thống thông tin thị trường lao động là tổng hợp các yếu tố hạ tầng công nghệ, phần mềm, dữ liệu được xây dựng, quản lý tập trung, thống nhất trên phạm vi cả nước để phục vụ công tác quản lý, nghiên cứu, hoạch định chính sách, phân tích, dự báo thị trường lao động và hỗ trợ các cơ quan, tổ chức, cá nhân tham gia thị trường lao động."},{"k":"p","t":"2. Hệ thống thông tin thị trường lao động được kết nối, cập nhật, đồng bộ, chia sẻ dữ liệu với Cơ sở dữ liệu tổng hợp quốc gia, cơ sở dữ liệu quốc gia, cơ sở dữ liệu về người lao động, cơ sở dữ liệu chuyên ngành và cơ sở dữ liệu khác để cập nhật, chia sẻ, khai thác thông tin về thị trường lao động."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-74_20","no":20,"code":"Điều 20","title":"Điều 20. Thông tin thị trường lao động","shortTitle":"Thông tin thị trường lao động","chuong":"Chương IV — HỆ THỐNG THÔNG TIN THỊ TRƯỜNG LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tin thị trường lao động bao gồm:"},{"k":"p","t":"a) Thông tin về cung lao động, cầu lao động, kết nối cung - cầu lao động;"},{"k":"p","t":"b) Thông tin về đào tạo, trình độ kỹ năng nghề;"},{"k":"p","t":"c) Thông tin về xu hướng tìm kiếm việc làm và nhu cầu sử dụng lao động;"},{"k":"p","t":"d) Thông tin về tiền lương và thu nhập của người lao động."},{"k":"p","t":"2. Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ, Ủy ban nhân dân các cấp, trong phạm vi chức năng, nhiệm vụ, quyền hạn của mình, cung cấp, chia sẻ thông tin, dữ liệu có liên quan đến thông tin thị trường lao động cho Bộ Nội vụ."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-74_21","no":21,"code":"Điều 21","title":"Điều 21. Quản lý, vận hành, khai thác hệ thống thông tin thị trường lao động","shortTitle":"Quản lý, vận hành, khai thác hệ thống thông tin thị trường lao động","chuong":"Chương IV — HỆ THỐNG THÔNG TIN THỊ TRƯỜNG LAO ĐỘNG","muc":"","level":1,"content":[{"k":"p","t":"1. Việc quản lý, vận hành, khai thác thông tin thị trường lao động phải tuân thủ quy định của Luật này, pháp luật về tiếp cận thông tin, pháp luật về dữ liệu và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Cơ quan quản lý nhà nước về việc làm có trách nhiệm sau đây:"},{"k":"p","t":"a) Quản lý, vận hành, cập nhật, khai thác hệ thống thông tin thị trường lao động để phục vụ công tác nghiên cứu, hoạch định chính sách;"},{"k":"p","t":"b) Phân tích, dự báo và phổ biến thông tin thị trường lao động thuộc thẩm quyền;"},{"k":"p","t":"c) Phổ biến thông tin thị trường lao động trên các trang thông tin điện tử của cơ quan quản lý nhà nước về việc làm; phương tiện thông tin đại chúng và các phương thức hợp pháp khác."},{"k":"p","t":"3. Cơ quan, tổ chức và cá nhân được tiếp cận, khai thác, sử dụng thông tin thị trường lao động đã được phổ biến."}]},{"id":"luat-74_22","no":22,"code":"Điều 22","title":"Điều 22. Nội dung, hỗ trợ phát triển kỹ năng nghề","shortTitle":"Nội dung, hỗ trợ phát triển kỹ năng nghề","chuong":"Chương V — PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc phát triển kỹ năng nghề bao gồm các nội dung sau đây:"},{"k":"p","t":"a) Xây dựng, quản lý, thực hiện khung trình độ kỹ năng nghề quốc gia;"},{"k":"p","t":"b) Xây dựng, công bố tiêu chuẩn kỹ năng nghề quốc gia theo khung trình độ kỹ năng nghề quốc gia đáp ứng yêu cầu của thị trường lao động và cập nhật với tiêu chuẩn, trình độ kỹ năng nghề của khu vực, thế giới; xây dựng, phát triển các bộ công cụ đánh giá để công nhận, cấp chứng chỉ kỹ năng nghề quốc gia;"},{"k":"p","t":"c) Ban hành danh mục nghề, công việc yêu cầu phải có chứng chỉ kỹ năng nghề quốc gia;"},{"k":"p","t":"d) Đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề cho người lao động theo quy định của pháp luật;"},{"k":"p","t":"đ) Nâng cao năng lực của hệ thống tổ chức đánh giá kỹ năng nghề;"},{"k":"p","t":"e) Công nhận, thừa nhận lẫn nhau về chứng chỉ kỹ năng nghề quốc gia giữa Việt Nam với các quốc gia khác;"},{"k":"p","t":"g) Bảo đảm quyền, nghĩa vụ của người lao động, người sử dụng lao động về nâng cao trình độ kỹ năng nghề của người lao động theo quy định của pháp luật;"},{"k":"p","t":"h) Xây dựng cơ sở dữ liệu về nội dung phát triển kỹ năng nghề."},{"k":"p","t":"2. Bảo đảm sự tham gia của các bên liên quan trong phát triển kỹ năng nghề."},{"k":"p","t":"3. Nhà nước hỗ trợ người lao động thuộc các đối tượng sau đây khi tham gia đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề và đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia:"},{"k":"p","t":"a) Người có công với cách mạng, thân nhân của người có công với cách mạng;"},{"k":"p","t":"b) Người thuộc hộ nghèo, hộ cận nghèo;"},{"k":"p","t":"c) Người khuyết tật;"},{"k":"p","t":"d) Người cao tuổi;"},{"k":"p","t":"đ) Người dân tộc thiểu số;"},{"k":"p","t":"e) Người hoàn thành nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân;"},{"k":"p","t":"g) Thanh niên tình nguyện hoàn thành nhiệm vụ thực hiện chương trình, dự án phát triển kinh tế - xã hội;"},{"k":"p","t":"h) Trí thức trẻ tình nguyện sau khi hoàn thành nhiệm vụ công tác tại khu kinh tế - quốc phòng;"},{"k":"p","t":"i) Đối tượng khác do Chính phủ quyết định căn cứ tình hình kinh tế - xã hội."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này; quy định việc hỗ trợ đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề và việc hỗ trợ đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia."}]},{"id":"luat-74_23","no":23,"code":"Điều 23","title":"Điều 23. Khung trình độ, tiêu chuẩn kỹ năng nghề quốc gia","shortTitle":"Khung trình độ, tiêu chuẩn kỹ năng nghề quốc gia","chuong":"Chương V — PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Khung trình độ kỹ năng nghề quốc gia là khung phân loại các bậc trình độ kỹ năng nghề."},{"k":"p","t":"2. Tiêu chuẩn kỹ năng nghề quốc gia được xây dựng, thẩm định, công bố và áp dụng theo từng bậc trình độ kỹ năng nghề cho mỗi nghề và khung trình độ kỹ năng nghề quốc gia."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-74_24","no":24,"code":"Điều 24","title":"Điều 24. Đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia","shortTitle":"Đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia","chuong":"Chương V — PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng chỉ kỹ năng nghề quốc gia là văn bản do cơ quan nhà nước có thẩm quyền cấp để công nhận một người lao động có đủ khả năng thực hiện công việc đạt yêu cầu ở một bậc trình độ kỹ năng của một nghề trên cơ sở kết quả đánh giá kỹ năng nghề của tổ chức đánh giá kỹ năng nghề quốc gia."},{"k":"p","t":"2. Người đề nghị cấp, cấp lại chứng chỉ kỹ năng nghề quốc gia nộp lệ phí theo quy định của pháp luật về phí và lệ phí, trừ trường hợp do lỗi của cơ quan có thẩm quyền."},{"k":"p","t":"3. Việc đánh giá kỹ năng nghề quốc gia phải tuân thủ các nguyên tắc sau đây:"},{"k":"p","t":"a) Bảo đảm sự tự nguyện của người lao động;"},{"k":"p","t":"b) Căn cứ tiêu chuẩn kỹ năng nghề quốc gia;"},{"k":"p","t":"c) Chính xác, độc lập, khách quan, công bằng, minh bạch."},{"k":"p","t":"4. Nội dung đánh giá kỹ năng nghề quốc gia bao gồm:"},{"k":"p","t":"a) Kiến thức chuyên môn, kỹ thuật;"},{"k":"p","t":"b) Kỹ năng thực hành;"},{"k":"p","t":"c) Quy trình an toàn lao động, vệ sinh lao động;"},{"k":"p","t":"d) Các nội dung khác theo đặc thù nghề, công việc."},{"k":"p","t":"5. Trường hợp có sự công nhận, thừa nhận lẫn nhau về chứng chỉ kỹ năng nghề quốc gia giữa Việt Nam với các quốc gia khác thì chứng chỉ kỹ năng nghề của quốc gia đó có giá trị tại Việt Nam và ngược lại."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này; quy định thẩm quyền, điều kiện, hồ sơ, trình tự, thủ tục cấp, cấp lại, thu hồi chứng chỉ kỹ năng nghề quốc gia; việc công nhận, thừa nhận lẫn nhau về chứng chỉ kỹ năng nghề quốc gia giữa Việt Nam với các quốc gia khác."}]},{"id":"luat-74_25","no":25,"code":"Điều 25","title":"Điều 25. Tổ chức đánh giá kỹ năng nghề quốc gia","shortTitle":"Tổ chức đánh giá kỹ năng nghề quốc gia","chuong":"Chương V — PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức đánh giá kỹ năng nghề quốc gia là pháp nhân được cơ quan nhà nước có thẩm quyền cấp giấy chứng nhận hoạt động đánh giá kỹ năng nghề quốc gia khi đủ điều kiện về cơ sở vật chất, trang thiết bị, đánh giá viên và nhân sự khác."},{"k":"p","t":"2. Tổ chức đánh giá kỹ năng nghề quốc gia thu tiền dịch vụ đánh giá kỹ năng nghề quốc gia thì phải tự định giá và niêm yết giá cung ứng dịch vụ theo quy định của pháp luật về giá."},{"k":"p","t":"3. Tổ chức đánh giá kỹ năng nghề quốc gia đề nghị cấp, cấp lại giấy chứng nhận hoạt động phải nộp lệ phí theo quy định của pháp luật về phí và lệ phí, trừ trường hợp do lỗi của cơ quan có thẩm quyền."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này; quy định về hồ sơ, trình tự, thủ tục cấp giấy chứng nhận hoạt động đánh giá kỹ năng nghề quốc gia."}]},{"id":"luat-74_26","no":26,"code":"Điều 26","title":"Điều 26. Nghề, công việc yêu cầu phải có chứng chỉ kỹ năng nghề quốc gia","shortTitle":"Nghề, công việc yêu cầu phải có chứng chỉ kỹ năng nghề quốc gia","chuong":"Chương V — PHÁT TRIỂN KỸ NĂNG NGHỀ","muc":"","level":1,"content":[{"k":"p","t":"1. Người lao động làm nghề, công việc ảnh hưởng trực tiếp đến an toàn và sức khỏe của người lao động hoặc cộng đồng phải có chứng chỉ kỹ năng nghề quốc gia."},{"k":"p","t":"2. Chính phủ ban hành danh mục nghề, công việc yêu cầu phải có chứng chỉ kỹ năng nghề quốc gia."}]},{"id":"luat-74_27","no":27,"code":"Điều 27","title":"Điều 27. Nội dung, tổ chức dịch vụ việc làm","shortTitle":"Nội dung, tổ chức dịch vụ việc làm","chuong":"Chương VI — DỊCH VỤ VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Dịch vụ việc làm bao gồm tư vấn, giới thiệu việc làm; cung ứng và giới thiệu lao động cho người sử dụng lao động; thu thập, phân tích, lưu trữ, cung cấp thông tin về thị trường lao động."},{"k":"p","t":"2. Tổ chức dịch vụ việc làm bao gồm tổ chức dịch vụ việc làm công và doanh nghiệp hoạt động dịch vụ việc làm."},{"k":"p","t":"3. Tổ chức dịch vụ việc làm có đủ điều kiện thực hiện giao dịch điện tử trong lĩnh vực dịch vụ việc làm thì thực hiện giao dịch điện tử với người lao động, người sử dụng lao động theo quy định của Luật này và quy định của pháp luật về giao dịch điện tử."},{"k":"p","t":"4. Hoạt động kinh doanh dịch vụ việc làm theo phương thức thương mại điện tử chỉ được thực hiện bởi doanh nghiệp có giấy phép hoạt động dịch vụ việc làm khi bảo đảm các điều kiện theo quy định của pháp luật về thương mại điện tử."},{"k":"p","t":"5. Chính phủ quy định điều kiện thành lập, tổ chức và hoạt động của tổ chức dịch vụ việc làm công."}]},{"id":"luat-74_28","no":28,"code":"Điều 28","title":"Điều 28. Doanh nghiệp hoạt động dịch vụ việc làm","shortTitle":"Doanh nghiệp hoạt động dịch vụ việc làm","chuong":"Chương VI — DỊCH VỤ VIỆC LÀM","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp hoạt động dịch vụ việc làm là doanh nghiệp được thành lập và hoạt động theo quy định của pháp luật về doanh nghiệp và được cơ quan nhà nước có thẩm quyền cấp giấy phép hoạt động dịch vụ việc làm."},{"k":"p","t":"2. Doanh nghiệp được cấp giấy phép hoạt động dịch vụ việc làm khi có cơ sở vật chất, nhân sự đáp ứng yêu cầu hoạt động dịch vụ việc làm, đã ký quỹ và phải duy trì các điều kiện này trong suốt quá trình hoạt động."},{"k":"p","t":"3. Doanh nghiệp hoạt động dịch vụ việc làm được thành lập chi nhánh khi chi nhánh có cơ sở vật chất đáp ứng yêu cầu hoạt động dịch vụ việc làm và phải thực hiện thông báo cho cơ quan chuyên môn về việc làm của Ủy ban nhân dân cấp tỉnh nơi đặt trụ sở chính trước khi thực hiện hoạt động dịch vụ việc làm."},{"k":"p","t":"4. Doanh nghiệp hoạt động dịch vụ việc làm tự định giá và thực hiện niêm yết giá dịch vụ việc làm theo quy định của pháp luật về giá."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 2 và khoản 3 Điều này; quy định mẫu giấy phép, hồ sơ, trình tự, thủ tục cấp, cấp lại, gia hạn, thu hồi giấy phép hoạt động dịch vụ việc làm."},{"k":"p","t":"NGUYÊN TẮC, ĐỐI TƯỢNG, CHẾ ĐỘ BẢO HIỂM THẤT NGHIỆP"}]},{"id":"luat-74_29","no":29,"code":"Điều 29","title":"Điều 29. Nguyên tắc bảo hiểm thất nghiệp","shortTitle":"Nguyên tắc bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Bảo đảm chia sẻ rủi ro giữa những người tham gia bảo hiểm thất nghiệp."},{"k":"p","t":"2. Mức đóng bảo hiểm thất nghiệp được tính trên cơ sở tiền lương tháng của người lao động."},{"k":"p","t":"3. Mức hưởng bảo hiểm thất nghiệp được tính trên cơ sở mức đóng, thời gian đóng bảo hiểm thất nghiệp."},{"k":"p","t":"4. Việc thực hiện bảo hiểm thất nghiệp phải đơn giản, dễ dàng, thuận tiện, bảo đảm kịp thời và đầy đủ quyền lợi của người tham gia."},{"k":"p","t":"5. Quỹ bảo hiểm thất nghiệp được quản lý tập trung, thống nhất, công khai, minh bạch; được sử dụng đúng mục đích; bảo đảm an toàn, tăng trưởng và được Nhà nước bảo hộ."}]},{"id":"luat-74_30","no":30,"code":"Điều 30","title":"Điều 30. Các chế độ bảo hiểm thất nghiệp","shortTitle":"Các chế độ bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Các chế độ bảo hiểm thất nghiệp bao gồm:"},{"k":"p","t":"a) Tư vấn, giới thiệu việc làm;"},{"k":"p","t":"b) Hỗ trợ người lao động tham gia đào tạo, nâng cao trình độ kỹ năng nghề;"},{"k":"p","t":"c) Trợ cấp thất nghiệp;"},{"k":"p","t":"d) Hỗ trợ người sử dụng lao động đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm cho người lao động."},{"k":"p","t":"2. Trường hợp khủng hoảng, suy thoái kinh tế, thiên tai, hỏa hoạn, địch họa hoặc dịch bệnh nguy hiểm, căn cứ tình hình thực tế và kết dư Quỹ bảo hiểm thất nghiệp, Chính phủ quy định việc giảm mức đóng bảo hiểm thất nghiệp, hỗ trợ bằng tiền hoặc hỗ trợ khác."}]},{"id":"luat-74_31","no":31,"code":"Điều 31","title":"Điều 31. Đối tượng tham gia bảo hiểm thất nghiệp","shortTitle":"Đối tượng tham gia bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người lao động thuộc đối tượng tham gia bảo hiểm thất nghiệp bao gồm:"},{"k":"p","t":"a) Người làm việc theo hợp đồng lao động không xác định thời hạn, hợp đồng lao động xác định thời hạn từ đủ 01 tháng trở lên, kể cả trường hợp người lao động và người sử dụng lao động thỏa thuận bằng tên gọi khác nhưng có nội dung thể hiện về việc làm có trả công, tiền lương và sự quản lý, điều hành, giám sát của một bên;"},{"k":"p","t":"b) Người lao động quy định tại điểm a khoản này làm việc không trọn thời gian, có tiền lương trong tháng bằng hoặc cao hơn tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp nhất theo quy định của Luật Bảo hiểm xã hội;"},{"k":"p","t":"c) Người làm việc theo hợp đồng làm việc;"},{"k":"p","t":"d) Người quản lý doanh nghiệp, kiểm soát viên, người đại diện phần vốn của doanh nghiệp theo quy định của pháp luật; thành viên Hội đồng quản trị, Tổng giám đốc, Giám đốc, thành viên Ban kiểm soát hoặc kiểm soát viên và các chức danh quản lý khác được bầu của hợp tác xã, liên hiệp hợp tác xã theo quy định của Luật Hợp tác xã có hưởng tiền lương."},{"k":"p","t":"Trong trường hợp người lao động đồng thời thuộc nhiều đối tượng tham gia bảo hiểm thất nghiệp khác nhau quy định tại khoản này thì người lao động và người sử dụng lao động có trách nhiệm tham gia bảo hiểm thất nghiệp cùng với việc tham gia bảo hiểm xã hội bắt buộc."},{"k":"p","t":"2. Người lao động theo quy định tại khoản 1 Điều này mà đang hưởng lương hưu, trợ cấp bảo hiểm xã hội, trợ cấp hằng tháng theo quy định của Chính phủ hoặc đủ điều kiện hưởng lương hưu; người lao động đang làm việc theo hợp đồng thử việc theo quy định của pháp luật lao động; người lao động là người giúp việc gia đình thì không thuộc đối tượng tham gia bảo hiểm thất nghiệp."},{"k":"p","t":"3. Người sử dụng lao động tham gia bảo hiểm thất nghiệp bao gồm cơ quan nhà nước, đơn vị sự nghiệp công lập; cơ quan, đơn vị, doanh nghiệp thuộc Quân đội nhân dân, Công an nhân dân và tổ chức cơ yếu; tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội - nghề nghiệp, tổ chức xã hội khác; cơ quan, tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam; doanh nghiệp, tổ hợp tác, hợp tác xã, liên hiệp hợp tác xã, hộ kinh doanh, tổ chức khác và cá nhân có thuê mướn, sử dụng lao động theo quy định tại khoản 1 Điều này."},{"k":"p","t":"4. Ủy ban Thường vụ Quốc hội quyết định việc tham gia bảo hiểm thất nghiệp đối với đối tượng khác ngoài đối tượng quy định tại khoản 1 Điều này mà có việc làm, thu nhập ổn định, thường xuyên trên cơ sở đề xuất của Chính phủ phù hợp với điều kiện phát triển kinh tế - xã hội từng thời kỳ."},{"k":"p","t":"THAM GIA VÀ ĐÓNG BẢO HIỂM THẤT NGHIỆP"}]},{"id":"luat-74_32","no":32,"code":"Điều 32","title":"Điều 32. Tham gia bảo hiểm thất nghiệp","shortTitle":"Tham gia bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Việc xác định đối tượng tham gia bảo hiểm thất nghiệp, đăng ký tham gia bảo hiểm thất nghiệp, điều chỉnh thông tin đăng ký kê khai tham gia bảo hiểm thất nghiệp được thực hiện đồng bộ với việc xác định đối tượng tham gia bảo hiểm xã hội bắt buộc, đăng ký tham gia bảo hiểm xã hội bắt buộc, điều chỉnh thông tin đăng ký kê khai tham gia bảo hiểm xã hội bắt buộc theo quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"2. Việc tham gia, đóng, hưởng bảo hiểm thất nghiệp được ghi nhận trong sổ bảo hiểm xã hội theo quy định của Luật Bảo hiểm xã hội, là cơ sở để giải quyết các chế độ bảo hiểm thất nghiệp theo quy định của Luật này."}]},{"id":"luat-74_33","no":33,"code":"Điều 33","title":"Điều 33. Đóng bảo hiểm thất nghiệp","shortTitle":"Đóng bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Mức đóng và trách nhiệm đóng bảo hiểm thất nghiệp được quy định như sau:"},{"k":"p","t":"a) Người lao động đóng tối đa bằng 1 % tiền lương tháng;"},{"k":"p","t":"b) Người sử dụng lao động đóng tối đa bằng 1% quỹ tiền lương tháng của những người lao động đang tham gia bảo hiểm thất nghiệp;"},{"k":"p","t":"c) Nhà nước hỗ trợ tối đa 1% quỹ tiền lương tháng đóng bảo hiểm thất nghiệp của những người lao động đang tham gia bảo hiểm thất nghiệp và do ngân sách trung ương bảo đảm."},{"k":"p","t":"2. Hằng tháng, người sử dụng lao động đóng bảo hiểm thất nghiệp theo mức quy định tại điểm b khoản 1 Điều này và trích tiền lương của từng người lao động theo mức quy định tại điểm a khoản 1 Điều này để đóng cùng một lúc vào Quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"Đối với người lao động quy định tại điểm a khoản 1 Điều 31 của Luật này hưởng tiền lương theo sản phẩm, theo khoán tại doanh nghiệp, tổ hợp tác, hợp tác xã, liên hiệp hợp tác xã, hộ kinh doanh hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp thì người sử dụng lao động đăng ký với cơ quan bảo hiểm xã hội và thực hiện đóng bảo hiểm thất nghiệp hằng tháng, 03 tháng hoặc 06 tháng một lần. Thời hạn đóng chậm nhất là ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng."},{"k":"p","t":"3. Thời điểm đóng bảo hiểm thất nghiệp của người sử dụng lao động và người lao động là thời điểm đóng bảo hiểm xã hội bắt buộc."},{"k":"p","t":"4. Người lao động không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng thì không phải đóng bảo hiểm thất nghiệp của tháng đó."},{"k":"p","t":"5. Người sử dụng lao động có trách nhiệm đóng đủ bảo hiểm thất nghiệp. Việc xử lý hành vi chậm đóng, trốn đóng bảo hiểm thất nghiệp được thực hiện theo quy định của Luật Bảo hiểm xã hội."},{"k":"p","t":"6. Người sử dụng lao động được giảm tiền đóng bảo hiểm thất nghiệp thuộc trách nhiệm của người sử dụng lao động phải đóng cho người lao động là người khuyết tật trong thời gian không quá 12 tháng khi tuyển mới và sử dụng người lao động là người khuyết tật."},{"k":"p","t":"7. Người sử dụng lao động có trách nhiệm đóng đủ bảo hiểm thất nghiệp theo quy định đối với người lao động khi chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc để kịp thời giải quyết chế độ bảo hiểm thất nghiệp cho người lao động."},{"k":"p","t":"Trường hợp người sử dụng lao động không đóng đủ bảo hiểm thất nghiệp cho người lao động thì phải trả khoản tiền tương ứng với các chế độ bảo hiểm thất nghiệp mà người lao động được hưởng theo quy định của pháp luật."},{"k":"p","t":"8. Nhà nước chuyển kinh phí hỗ trợ từ ngân sách nhà nước vào Quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"9. Chính phủ quy định chi tiết các khoản 1, 6, 7 và 8 Điều này."}]},{"id":"luat-74_34","no":34,"code":"Điều 34","title":"Điều 34. Căn cứ đóng bảo hiểm thất nghiệp","shortTitle":"Căn cứ đóng bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tiền lương làm căn cứ đóng bảo hiểm thất nghiệp được quy định như sau:"},{"k":"p","t":"a) Người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định thì tiền lương làm căn cứ đóng bảo hiểm thất nghiệp là tiền lương tháng theo chức vụ, chức danh, ngạch, bậc và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung, phụ cấp thâm niên nghề, hệ số chênh lệch bảo lưu lương (nếu có);"},{"k":"p","t":"b) Người lao động thuộc đối tượng thực hiện chế độ tiền lương do người sử dụng lao động quyết định thì tiền lương làm căn cứ đóng bảo hiểm thất nghiệp là tiền lương tháng, bao gồm mức lương theo công việc hoặc chức danh, phụ cấp lương và các khoản bổ sung khác được thỏa thuận trả thường xuyên, ổn định trong mỗi kỳ trả lương."},{"k":"p","t":"Trường hợp người lao động ngừng việc vẫn hưởng tiền lương tháng bằng hoặc cao hơn tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp nhất thì đóng theo tiền lương được hưởng trong thời gian ngừng việc."},{"k":"p","t":"2. Tiền lương làm căn cứ đóng bảo hiểm thất nghiệp cao nhất bằng 20 lần mức lương tối thiểu tháng theo vùng do Chính phủ công bố tại thời điểm đóng bảo hiểm thất nghiệp."},{"k":"p","t":"3. Người lao động đang tham gia bảo hiểm thất nghiệp mà bị tạm giam, tạm đình chỉ công việc thì người lao động và người sử dụng lao động tạm dừng đóng bảo hiểm thất nghiệp; trường hợp người lao động được truy lĩnh đủ tiền lương thì người lao động và người sử dụng lao động đóng bù cho thời gian bị tạm giam, tạm đình chỉ công việc bằng số tiền phải đóng của những tháng tạm dừng đóng và thực hiện đồng thời với việc đóng bù bảo hiểm xã hội bắt buộc."},{"k":"p","t":"4. Việc truy thu, truy đóng bảo hiểm thất nghiệp thực hiện cùng với việc truy thu, truy đóng bảo hiểm xã hội bắt buộc theo quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-74_35","no":35,"code":"Điều 35","title":"Điều 35. Thời gian đóng bảo hiểm thất nghiệp","shortTitle":"Thời gian đóng bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời gian đóng bảo hiểm thất nghiệp để xét hưởng các chế độ bảo hiểm thất nghiệp là tổng thời gian đã đóng bảo hiểm thất nghiệp từ khi bắt đầu đóng bảo hiểm thất nghiệp cho đến khi người lao động chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc theo quy định của pháp luật mà chưa hưởng trợ cấp thất nghiệp."},{"k":"p","t":"2. Sau khi chấm dứt hưởng trợ cấp thất nghiệp, thời gian đóng bảo hiểm thất nghiệp tiếp theo được tính lại từ đầu, trừ trường hợp được bảo lưu theo quy định tại khoản 5 và khoản 6 Điều 41 của Luật này."},{"k":"p","t":"3. Thời gian người lao động đóng bảo hiểm thất nghiệp không được tính để hưởng trợ cấp mất việc làm hoặc trợ cấp thôi việc theo quy định của pháp luật về lao động, pháp luật về viên chức."},{"k":"p","t":"4. Chính phủ quy định về thời gian đã đóng bảo hiểm thất nghiệp nhưng chưa hưởng trợ cấp thất nghiệp."},{"k":"p","t":"TƯ VẤN, GIỚI THIỆU VIỆC LÀM VÀ HỖ TRỢ NGƯỜI LAO ĐỘNGTHAM GIA ĐÀO TẠO, NÂNG CAO TRÌNH ĐỘ KỸ NĂNG NGHỀ"}]},{"id":"luat-74_36","no":36,"code":"Điều 36","title":"Điều 36. Tư vấn, giới thiệu việc làm","shortTitle":"Tư vấn, giới thiệu việc làm","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động quy định tại khoản 1 Điều 31 của Luật này đang đóng bảo hiểm thất nghiệp bị chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc mà có nhu cầu tìm kiếm việc làm được tư vấn, giới thiệu việc làm."},{"k":"p","t":"2. Chính phủ quy định việc tư vấn, giới thiệu việc làm."}]},{"id":"luat-74_37","no":37,"code":"Điều 37","title":"Điều 37. Hỗ trợ người lao động tham gia đào tạo, nâng cao trình độ kỹ năng nghề","shortTitle":"Hỗ trợ người lao động tham gia đào tạo, nâng cao trình độ kỹ năng nghề","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động đang hưởng trợ cấp thất nghiệp được hỗ trợ đào tạo, nâng cao trình độ kỹ năng nghề."},{"k":"p","t":"2. Trường hợp người lao động không thuộc đối tượng quy định tại khoản"},{"k":"p","t":"1 Điều này thì phải đáp ứng đủ các điều kiện sau đây:"},{"k":"p","t":"a) Thuộc đối tượng quy định tại điểm a khoản 1 Điều 38 của Luật này;"},{"k":"p","t":"b) Đã nộp hồ sơ đề nghị hỗ trợ đào tạo, nâng cao trình độ kỹ năng nghề trong thời hạn 12 tháng kể từ ngày chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc;"},{"k":"p","t":"c) Trong thời hạn 10 ngày làm việc kể từ ngày nộp đủ hồ sơ đề nghị hỗ trợ đào tạo, nâng cao trình độ kỹ năng nghề mà người lao động không thuộc một trong các trường hợp có việc làm và thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc theo quy định tại Luật Bảo hiểm xã hội hoặc thực hiện nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân, dân quân thường trực hoặc đi học tập có thời hạn trên 12 tháng hoặc chấp hành quyết định áp dụng biện pháp đưa vào cơ sở giáo dục bắt buộc, cơ sở cai nghiện bắt buộc hoặc bị tạm giam, chấp hành hình phạt tù hoặc ra nước ngoài định cư hoặc chết;"},{"k":"p","t":"d) Đã đóng bảo hiểm thất nghiệp từ đủ 09 tháng trở lên trong thời gian 36 tháng trước khi chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc."},{"k":"p","t":"3. Thời gian hỗ trợ đào tạo, nâng cao trình độ kỹ năng nghề thực hiện theo khóa học, thời gian học nhưng tổng thời gian hỗ trợ không quá 06 tháng."},{"k":"p","t":"4. Nội dung hỗ trợ đào tạo, nâng cao trình độ kỹ năng nghề bao gồm:"},{"k":"p","t":"a) Học phí;"},{"k":"p","t":"b) Tiền ăn cho người lao động trong thời gian tham gia đào tạo, nâng cao trình độ kỹ năng nghề."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này; quy định hồ sơ, trình tự, thủ tục hỗ trợ người lao động tham gia đào tạo, nâng cao trình độ kỹ năng nghề."},{"k":"p","t":"TRỢ CẤP THẤT NGHIỆP"}]},{"id":"luat-74_38","no":38,"code":"Điều 38","title":"Điều 38. Điều kiện hưởng","shortTitle":"Điều kiện hưởng","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Người lao động quy định tại khoản 1 Điều 31 của Luật này đang đóng bảo hiểm thất nghiệp được hưởng trợ cấp thất nghiệp khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc theo quy định của pháp luật mà không thuộc một trong các trường hợp người lao động đơn phương chấm dứt hợp đồng lao động trái pháp luật theo quy định của Bộ luật Lao động hoặc người lao động nghỉ việc khi đủ điều kiện hưởng lương hưu."},{"k":"p","t":"b) Đã đóng bảo hiểm thất nghiệp từ đủ 12 tháng trở lên trong thời gian 24 tháng trước khi chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người lao động làm việc theo hợp đồng lao động có thời hạn từ đủ 01 tháng đến dưới 12 tháng thì phải đóng đủ 12 tháng trở lên trong thời gian 36 tháng trước khi chấm dứt hợp đồng lao động."},{"k":"p","t":"c) Đã nộp đủ hồ sơ hưởng trợ cấp thất nghiệp trong thời hạn 03 tháng kể từ ngày chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc."},{"k":"p","t":"d) Trong thời hạn 10 ngày làm việc kể từ ngày nộp đủ hồ sơ hưởng trợ cấp thất nghiệp mà người lao động không thuộc một trong các trường hợp có việc làm và thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc theo quy định tại Luật Bảo hiểm xã hội hoặc thực hiện nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân, dân quân thường trực hoặc đi học tập có thời hạn trên 12 tháng hoặc chấp hành quyết định áp dụng biện pháp đưa vào cơ sở giáo dục bắt buộc, cơ sở cai nghiện bắt buộc hoặc bị tạm giam, chấp hành hình phạt tù hoặc ra nước ngoài định cư hoặc chết."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-74_39","no":39,"code":"Điều 39","title":"Điều 39. Mức hưởng, thời gian hưởng, thời điểm hưởng và hồ sơ, trình tự, thủ tục hưởng trợ cấp thất nghiệp","shortTitle":"Mức hưởng, thời gian hưởng, thời điểm hưởng và hồ sơ, trình tự, thủ tục hưởng trợ cấp thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Mức hưởng trợ cấp thất nghiệp hằng tháng bằng 60% mức bình quân tiền lương tháng đóng bảo hiểm thất nghiệp của 06 tháng đã đóng bảo hiểm thất nghiệp gần nhất trước khi chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc chấm dứt làm việc nhưng tối đa không quá 05 lần mức lương tối thiểu tháng theo vùng do Chính phủ công bố được áp dụng tại tháng cuối cùng đóng bảo hiểm thất nghiệp."},{"k":"p","t":"2. Thời gian hưởng trợ cấp thất nghiệp được tính theo số tháng đóng bảo hiểm thất nghiệp, cứ đóng đủ 12 tháng đến đủ 36 tháng thì được hưởng 03 tháng trợ cấp thất nghiệp, sau đó, cứ đóng đủ thêm 12 tháng thì được hưởng thêm 01 tháng trợ cấp thất nghiệp nhưng thời gian hưởng trợ cấp thất nghiệp tối đa 12 tháng."},{"k":"p","t":"3. Thời điểm hưởng trợ cấp thất nghiệp là ngày làm việc thứ 11 kể từ ngày nộp đủ hồ sơ hưởng trợ cấp thất nghiệp."},{"k":"p","t":"4. Người lao động đang hưởng trợ cấp thất nghiệp được hưởng chế độ bảo hiểm y tế theo quy định của pháp luật về bảo hiểm y tế, bao gồm thời gian tạm dừng hưởng trợ cấp thất nghiệp theo quy định tại khoản 2 Điều 41 của Luật này. Người đang hưởng trợ cấp thất nghiệp được cơ quan bảo hiểm xã hội đóng bảo hiểm y tế từ Quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 1 và khoản 2 Điều này; quy định hồ sơ, trình tự, thủ tục hưởng trợ cấp thất nghiệp."}]},{"id":"luat-74_40","no":40,"code":"Điều 40","title":"Điều 40. Trách nhiệm thông báo về việc tìm kiếm việc làm của người lao động","shortTitle":"Trách nhiệm thông báo về việc tìm kiếm việc làm của người lao động","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Trong thời gian hưởng trợ cấp thất nghiệp, hằng tháng, người lao động phải thông báo về việc tìm kiếm việc làm cho tổ chức dịch vụ việc làm công nơi đang hưởng trợ cấp thất nghiệp."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-74_41","no":41,"code":"Điều 41","title":"Điều 41. Chuyển nơi hưởng, tạm dừng, tiếp tục, chấm dứt hưởng và hủy hưởng trợ cấp thất nghiệp","shortTitle":"Chuyển nơi hưởng, tạm dừng, tiếp tục, chấm dứt hưởng và hủy hưởng trợ cấp thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Trong thời gian hưởng trợ cấp thất nghiệp, người lao động được chuyển nơi hưởng trợ cấp thất nghiệp khi có nhu cầu."},{"k":"p","t":"2. Người lao động đang hưởng trợ cấp thất nghiệp bị tạm dừng hưởng trợ cấp thất nghiệp khi không thông báo về việc tìm kiếm việc làm hằng tháng theo quy định tại Điều 40 của Luật này."},{"k":"p","t":"Người lao động không được hưởng tiền trợ cấp thất nghiệp trong thời gian bị tạm dừng hưởng trợ cấp thất nghiệp và thời gian tạm dừng thì không được bảo lưu."},{"k":"p","t":"3. Người lao động bị tạm dừng hưởng trợ cấp thất nghiệp nếu vẫn còn thời gian hưởng trợ cấp thất nghiệp thì được tiếp tục hưởng trợ cấp thất nghiệp khi thực hiện thông báo về việc tìm kiếm việc làm hằng tháng theo quy định tại Điều 40 của Luật này."},{"k":"p","t":"4. Người lao động đang hưởng trợ cấp thất nghiệp bị chấm dứt hưởng trợ cấp thất nghiệp khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có việc làm và thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc theo quy định tại Luật Bảo hiểm xã hội;"},{"k":"p","t":"b) Thực hiện nghĩa vụ quân sự, nghĩa vụ tham gia Công an nhân dân, dân quân thường trực;"},{"k":"p","t":"c) Hưởng lương hưu hằng tháng;"},{"k":"p","t":"d) Sau 02 lần từ chối nhận việc làm do tổ chức dịch vụ việc làm công nơi đang hưởng trợ cấp thất nghiệp giới thiệu mà không có lý do chính đáng;"},{"k":"p","t":"đ) Không thực hiện thông báo tìm kiếm việc làm hằng tháng theo quy định tại Điều 40 của Luật này trong 03 tháng liên tục;"},{"k":"p","t":"e) Ra nước ngoài để định cư;"},{"k":"p","t":"g) Đi học tập có thời hạn trên 12 tháng;"},{"k":"p","t":"h) Bị xử phạt vi phạm hành chính về hành vi vi phạm pháp luật về bảo hiểm thất nghiệp;"},{"k":"p","t":"i) Chết;"},{"k":"p","t":"k)Chấp hành quyết định áp dụng biện pháp đưa vào cơ sở giáo dục bắt buộc, cơ sở cai nghiện bắt buộc;"},{"k":"p","t":"l) Bị tòa án tuyên bố mất tích;"},{"k":"p","t":"m) Bị tạm giam; chấp hành hình phạt tù;"},{"k":"p","t":"n) Theo đề nghị của người lao động."},{"k":"p","t":"5. Người lao động bị chấm dứt hưởng trợ cấp thất nghiệp thuộc trường hợp quy định tại các điểm a, b, g, k, l, m và n khoản 4 Điều này được bảo lưu thời gian đóng bảo hiểm thất nghiệp làm căn cứ để tính thời gian hưởng trợ cấp thất nghiệp cho lần tiếp theo trừ trường hợp không thông báo tình trạng của người lao động quy định tại các điểm a, b, g, k, l, m và n khoản 4 Điều này."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này; quy định các trường hợp hủy hưởng bảo hiểm thất nghiệp, thời gian đóng bảo hiểm thất nghiệp được bảo lưu khi chấm dứt hưởng trợ cấp thất nghiệp."},{"k":"p","t":"HỖ TRỢ NGƯỜI SỬ DỤNG LAO ĐỘNG ĐÀO TẠO, BỒI DƯỠNG,  NÂNG CAO TRÌNH ĐỘ KỸ NĂNG NGHỀ ĐỂ DUY TRÌ VIỆC LÀM  CHO NGƯỜI LAO ĐỘNG"}]},{"id":"luat-74_42","no":42,"code":"Điều 42","title":"Điều 42. Hỗ trợ người sử dụng lao động đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm cho người lao động tham gia bảo hiểm thất nghiệp","shortTitle":"Hỗ trợ người sử dụng lao động đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm cho người lao động tham gia bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động được hỗ trợ trong trường hợp ảnh hưởng đến việc làm hoặc có nguy cơ ảnh hưởng đến việc làm của nhiều người lao động tham gia bảo hiểm thất nghiệp như sau:"},{"k":"p","t":"a) Thay đổi cơ cấu, công nghệ hoặc vì lý do kinh tế theo quy định tại Bộ luật Lao động;"},{"k":"p","t":"b) Thiên tai, hỏa hoạn, địch họa hoặc dịch bệnh nguy hiểm;"},{"k":"p","t":"c) Thực hiện theo quyết định của cơ quan nhà nước có thẩm quyền về việc di dời hoặc thu hẹp địa điểm sản xuất kinh doanh;"},{"k":"p","t":"d) Các trường hợp khác theo quy định của Chính phủ."},{"k":"p","t":"2. Người sử dụng lao động được hỗ trợ khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Đóng đủ bảo hiểm thất nghiệp từ 12 tháng trở lên trong thời gian 24 tháng tính đến thời điểm đề nghị hỗ trợ;"},{"k":"p","t":"b) Có phương án đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm."},{"k":"p","t":"3. Thời gian hỗ trợ đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm cho người lao động tùy theo khóa học, thời gian học nhưng tổng thời gian hỗ trợ không quá 06 tháng."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này; quy định mức hỗ trợ, hồ sơ, trình tự, thủ tục hỗ trợ người sử dụng lao động đào tạo, bồi dưỡng, nâng cao trình độ kỹ năng nghề để duy trì việc làm cho người lao động."},{"k":"p","t":"QUỸ BẢO HIỂM THẤT NGHIỆP"}]},{"id":"luat-74_43","no":43,"code":"Điều 43","title":"Điều 43. Quỹ bảo hiểm thất nghiệp","shortTitle":"Quỹ bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm thất nghiệp là quỹ tài chính độc lập với ngân sách nhà nước; được hạch toán, kế toán, lập báo cáo tài chính, kiểm toán nội bộ theo quy định của pháp luật về kế toán và quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Định kỳ 03 năm, Kiểm toán nhà nước thực hiện kiểm toán Quỹ bảo hiểm thất nghiệp, hoạt động đầu tư quỹ và báo cáo kết quả với Quốc hội. Theo yêu cầu của Quốc hội, Ủy ban Thường vụ Quốc hội hoặc Chính phủ, Quỹ bảo hiểm thất nghiệp được kiểm toán đột xuất."}]},{"id":"luat-74_44","no":44,"code":"Điều 44","title":"Điều 44. Nguồn hình thành Quỹ bảo hiểm thất nghiệp","shortTitle":"Nguồn hình thành Quỹ bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Các khoản đóng và hỗ trợ theo quy định tại khoản 1 Điều 33 của Luật này."},{"k":"p","t":"2. Tiền sinh lời của hoạt động đầu tư Quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"3. Các khoản thu hợp pháp khác theo quy định của pháp luật."}]},{"id":"luat-74_45","no":45,"code":"Điều 45","title":"Điều 45. Sử dụng Quỹ bảo hiểm thất nghiệp","shortTitle":"Sử dụng Quỹ bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Chi trả các chế độ bảo hiểm thất nghiệp."},{"k":"p","t":"2. Chi trả hỗ trợ bằng tiền hoặc hỗ trợ khác theo quy định tại khoản 2 Điều 30 của Luật này."},{"k":"p","t":"3. Chỉ đóng bảo hiểm y tế cho người hưởng trợ cấp thất nghiệp."},{"k":"p","t":"4. Chi tổ chức và hoạt động bảo hiểm thất nghiệp."},{"k":"p","t":"5. Đầu tư để bảo toàn và tăng trưởng quỹ."}]},{"id":"luat-74_46","no":46,"code":"Điều 46","title":"Điều 46. Chi tổ chức và hoạt động bảo hiểm thất nghiệp","shortTitle":"Chi tổ chức và hoạt động bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Chi tổ chức và hoạt động bảo hiểm thất nghiệp bao gồm các nội dung sau đây:"},{"k":"p","t":"a) Tuyên truyền, phổ biến, giải đáp, tư vấn chính sách, pháp luật về bảo hiểm thất nghiệp; tập huấn, bồi dưỡng chuyên môn, nghiệp vụ về bảo hiểm thất nghiệp;"},{"k":"p","t":"b) Cải cách hành chính bảo hiểm thất nghiệp; phát triển, quản lý người tham gia, người thụ hưởng chế độ bảo hiểm thất nghiệp;"},{"k":"p","t":"c) Đầu tư, nâng cấp, cải tạo, mở rộng, bảo dưỡng, sửa chữa tài sản, thuê, mua sắm tài sản, hàng hóa, dịch vụ liên quan đến quản lý và hoạt động bảo hiểm thất nghiệp;"},{"k":"p","t":"d) Tổ chức thu, giải quyết và chi trả bảo hiểm thất nghiệp và hoạt động bộ máy của cơ quan thực hiện chính sách bảo hiểm thất nghiệp."},{"k":"p","t":"2. Mức chi tổ chức và hoạt động bảo hiểm thất nghiệp được tính trên cơ sở số phần trăm của dự toán thu, chi bảo hiểm thất nghiệp, không bao gồm số chi đóng bảo hiểm y tế cho người hưởng trợ cấp thất nghiệp và được trích từ Quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"3. Định kỳ 03 năm, Chính phủ báo cáo Ủy ban Thường vụ Quốc hội quyết định về mức chi tổ chức và hoạt động bảo hiểm thất nghiệp cùng với mức chi tổ chức và hoạt động bảo hiểm xã hội."},{"k":"p","t":"4. Kiểm toán nhà nước thực hiện kiểm toán hằng năm đối với báo cáo quyết toán chi tổ chức và hoạt động bảo hiểm thất nghiệp."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 1 và khoản 2 Điều này."}]},{"id":"luat-74_47","no":47,"code":"Điều 47","title":"Điều 47. Quản lý hoạt động đầu tư Quỹ bảo hiểm thất nghiệp","shortTitle":"Quản lý hoạt động đầu tư Quỹ bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm thất nghiệp được đầu tư và hạch toán độc lập."},{"k":"p","t":"2. Hoạt động đầu tư Quỹ bảo hiểm thất nghiệp phải bảo đảm an toàn, bền vững, hiệu quả; được kiểm soát, quản lý rủi ro và trích lập dự phòng rủi ro."},{"k":"p","t":"3. Chính phủ quy định việc đầu tư Quỹ bảo hiểm thất nghiệp, việc kiểm soát, quản lý rủi ro đầu tư và trích lập, sử dụng dự phòng rủi ro."}]},{"id":"luat-74_48","no":48,"code":"Điều 48","title":"Điều 48. Trách nhiệm của Chính phủ về bảo hiểm thất nghiệp","shortTitle":"Trách nhiệm của Chính phủ về bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Quyết định hoặc trình cấp có thẩm quyền quyết định biện pháp xử lý, biện pháp hỗ trợ trong trường hợp cần thiết để bảo vệ quyền, lợi ích chính đáng về bảo hiểm thất nghiệp của người lao động, người sử dụng lao động."},{"k":"p","t":"2. Hằng năm, báo cáo Quốc hội tình hình thực hiện chính sách, chế độ bảo hiểm thất nghiệp, tình hình quản lý và sử dụng Quỹ bảo hiểm thất nghiệp trong báo cáo tình hình thực hiện chính sách, chế độ bảo hiểm xã hội, tình hình quản lý và sử dụng Quỹ bảo hiểm xã hội theo quy định."},{"k":"p","t":"3. Quy định việc lập quyết toán và phân công cơ quan quản lý nhà nước thực hiện việc duyệt, thẩm định, phê chuẩn quyết toán chi tổ chức và hoạt động bảo hiểm thất nghiệp."},{"k":"p","t":"4. Quy định quyền và trách nhiệm của các cơ quan, tổ chức, cá nhân có liên quan trong việc thực hiện bảo hiểm thất nghiệp."},{"k":"p","t":"KHIẾU NẠI, TỐ CÁO VỀ BẢO HIỂM THẤT NGHIỆP"}]},{"id":"luat-74_49","no":49,"code":"Điều 49","title":"Điều 49. Quyền khiếu nại về bảo hiểm thất nghiệp","shortTitle":"Quyền khiếu nại về bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 7","level":1,"content":[{"k":"p","t":"Cơ quan, tổ chức, cá nhân có quyền đề nghị cơ quan, tổ chức, cá nhân có thẩm quyền xem xét lại quyết định, hành vi của cơ quan, tổ chức, cá nhân khi có căn cứ cho rằng quyết định, hành vi đó trái pháp luật về bảo hiểm thất nghiệp, xâm phạm đến quyền và lợi ích hợp pháp của mình."}]},{"id":"luat-74_50","no":50,"code":"Điều 50","title":"Điều 50. Khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm thất nghiệp; quyết định, hành vi trong hoạt động thanh tra về bảo hiểm thất nghiệp","shortTitle":"Khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm thất nghiệp; quyết định, hành vi trong hoạt động thanh tra về bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 7","level":1,"content":[{"k":"p","t":"1. Việc khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm thất nghiệp thực hiện theo quy định của pháp luật về khiếu nại, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Việc khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính và quyết định, hành vi khác trong hoạt động thanh tra về bảo hiểm thất nghiệp được thực hiện theo quy định của pháp luật về thanh tra."}]},{"id":"luat-74_51","no":51,"code":"Điều 51","title":"Điều 51. Khiếu nại và giải quyết khiếu nại; khởi kiện đối với quyết định, hành vi về bảo hiểm thất nghiệp","shortTitle":"Khiếu nại và giải quyết khiếu nại; khởi kiện đối với quyết định, hành vi về bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 7","level":1,"content":[{"k":"p","t":"1. Quyết định, hành vi về bảo hiểm thất nghiệp là quyết định, hành vi của cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công, người có thẩm quyền trong cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công thực hiện hoặc không thực hiện trách nhiệm theo quy định của pháp luật về bảo hiểm thất nghiệp."},{"k":"p","t":"2. Việc khiếu nại đối với quyết định, hành vi về bảo hiểm thất nghiệp được thực hiện như sau:"},{"k":"p","t":"a) Khi có căn cứ cho rằng quyết định, hành vi về bảo hiểm thất nghiệp là trái pháp luật, xâm phạm quyền, lợi ích hợp pháp của mình thì người khiếu nại khiếu nại lần đầu đến cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ việc làm công nơi người có quyết định, hành vi về bảo hiểm thất nghiệp hoặc khởi kiện tại Tòa án theo quy định của pháp luật;"},{"k":"p","t":"b) Trường hợp người khiếu nại không đồng ý với kết quả giải quyết khiếu nại lần đầu của cơ quan bảo hiểm xã hội hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khiếu nại lần hai đến người đứng đầu cơ quan cấp trên trực tiếp hoặc khởi kiện tại Tòa án theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người khiếu nại không đồng ý với kết quả giải quyết khiếu nại lần đầu của tổ chức dịch vụ việc làm công hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khiếu nại lần hai đến người đứng đầu cơ quan chuyên môn về việc làm của Ủy ban nhân dân cấp tỉnh hoặc khởi kiện tại Tòa án theo quy định của pháp luật;"},{"k":"p","t":"c) Trường hợp người khiếu nại không đồng ý với quyết định giải quyết khiếu nại lần hai hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khởi kiện tại Tòa án theo quy định của pháp luật."},{"k":"p","t":"3. Thẩm quyền giải quyết khiếu nại đối với quyết định, hành vi về bảo hiểm thất nghiệp của cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công được quy định như sau:"},{"k":"p","t":"a) Người đứng đầu cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công có thẩm quyền giải quyết khiếu nại lần đầu đối với quyết định, hành vi về bảo hiểm thất nghiệp của mình, của người có thẩm quyền do mình trực tiếp quản lý;"},{"k":"p","t":"b) Người đứng đầu cơ quan cấp trên trực tiếp của cơ quan bảo hiểm xã hội có thẩm quyền giải quyết khiếu nại lần hai đối với quyết định, hành vi về bảo hiểm thất nghiệp đã được người đứng đầu cơ quan bảo hiểm xã hội cấp dưới giải quyết lần đầu nhưng còn khiếu nại hoặc khiếu nại lần đầu đã hết thời hạn nhưng chưa được giải quyết;"},{"k":"p","t":"c) Người đứng đầu cơ quan chuyên môn về việc làm của Ủy ban nhân dân cấp tỉnh có thẩm quyền giải quyết khiếu nại lần hai đối với quyết định, hành vi về bảo hiểm thất nghiệp đã được người đứng đầu tổ chức dịch vụ việc làm công giải quyết lần đầu nhưng còn khiếu nại hoặc khiếu nại lần đầu đã hết thời hạn nhưng chưa được giải quyết."},{"k":"p","t":"4. Thời hiệu khiếu nại, trình tự, thủ tục giải quyết khiếu nại về bảo hiểm thất nghiệp được thực hiện theo quy định của pháp luật về khiếu nại."}]},{"id":"luat-74_52","no":52,"code":"Điều 52","title":"Điều 52. Tố cáo, giải quyết tố cáo về bảo hiểm thất nghiệp","shortTitle":"Tố cáo, giải quyết tố cáo về bảo hiểm thất nghiệp","chuong":"Chương VII — BẢO HIỂM THẤT NGHIỆP","muc":"Mục 7","level":1,"content":[{"k":"p","t":"1. Việc tố cáo, giải quyết tố cáo đối với hành vi vi phạm pháp luật trong việc thực hiện nhiệm vụ, công vụ về bảo hiểm thất nghiệp và hành vi vi phạm pháp luật về quản lý nhà nước trong lĩnh vực bảo hiểm thất nghiệp được thực hiện theo quy định của pháp luật về tố cáo."},{"k":"p","t":"2. Cơ quan bảo hiểm xã hội, tổ chức dịch vụ việc làm công có trách nhiệm giải quyết tố cáo hành vi vi phạm pháp luật trong việc chấp hành quy định của pháp luật về bảo hiểm thất nghiệp."},{"k":"p","t":"3. Trình tự, thủ tục tố cáo, giải quyết tố cáo về hành vi vi phạm pháp luật quy định tại khoản 2 Điều này được thực hiện theo quy định của pháp luật về tố cáo."}]},{"id":"luat-74_53","no":53,"code":"Điều 53","title":"Điều 53. Sửa đổi, bổ sung Luật Phí và lệ phí số 97/2015/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 09/2017/QH14, Luật số 23/2018/QH14, Luật số 72/2020/QH14, Luật số 16/2023/QH15, Luật số 20/2023/QH15, Luật số 24/2023/QH15, Luật số 33/2024/QH15 và Luật số 35/2024/QH15","shortTitle":"Sửa đổi, bổ sung Luật Phí và lệ phí số 97/2015/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 09/2017/QH14, Luật số 23/2018/QH14, Luật số 72/2020/QH14, Luật số 16/2023/QH15, Luật số 20/2023/QH15, Luật số 24/2023/QH15, Luật số 33/2024/QH15 và Luật số 35/2024/QH15","chuong":"Chương VIII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Bổ sung số thứ tự 36 và 37 vào sau số thứ tự 35 mục III phần B của Phụ lục số 01 về Danh mục phí, lệ phí như sau:"},{"k":"tbl","rows":[["36","Lệ phí cấp giấy chứng nhận hoạt động đánh giá kỹ năng nghề quốc gia","Bộ Tài chính"],["37","Lệ phí cấp chứng chỉ kỹ năng nghề quốc gia","Bộ Tài chính"]]}]},{"id":"luat-74_54","no":54,"code":"Điều 54","title":"Điều 54. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VIII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"2. Luật Việc làm số 38/2013/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 41/2024/QH15 hết hiệu lực kể từ ngày Luật này có hiệu lực thi hành, trừ trường hợp quy định tại các khoản 1, 2 và 3 Điều 55 của Luật này."}]},{"id":"luat-74_55","no":55,"code":"Điều 55","title":"Điều 55. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"Chương VIII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Chuyển nguồn Quỹ quốc gia về việc làm thành nguồn ngân sách trung ương cấp cho Ngân hàng Chính sách xã hội để làm nguồn vốn cho vay giải quyết việc làm theo quy định của Chính phủ."},{"k":"p","t":"2. Khách hàng vay vốn từ Quỹ quốc gia về việc làm và các nguồn tín dụng ưu đãi khác theo quy định của Luật Việc làm số 38/2013/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 41/2024/QH15 đã ký kết hợp đồng tín dụng với Ngân hàng Chính sách xã hội trước ngày Luật này có hiệu lực thi hành thì tiếp tục thực hiện đến khi hoàn thành hợp đồng đã ký kết."},{"k":"p","t":"3. Tổ chức đánh giá kỹ năng nghề đã được cấp giấy chứng nhận hoạt động đánh giá kỹ năng nghề quốc gia trước ngày Luật này có hiệu lực thi hành thì tiếp tục hoạt động theo giấy chứng nhận đã được cấp."},{"k":"p","t":"4. Người lao động và người sử dụng lao động đã nộp hồ sơ đề nghị hưởng chế độ bảo hiểm thất nghiệp trước ngày Luật này có hiệu lực thi hành nhưng chưa có quyết định hưởng chế độ bảo hiểm thất nghiệp thì thực hiện theo quy định tại Luật này."},{"k":"p","t":"_________________________________________________________________________________"},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XV, Kỳ họp thứ 9 thông qua ngày 16 tháng 6 năm 2025."},{"k":"tbl","rows":[["","CHỦ TỊCH QUỐC HỘI\nTrần Thanh Mẫn"]]}]}],"refs":{},"details":{},"summaries":{"luat-74_2":{"tldr":"Giải thích các từ ngữ dùng trong Luật: người lao động, việc làm, tiêu chuẩn kỹ năng nghề quốc gia, bảo hiểm thất nghiệp, việc làm công, cơ sở dữ liệu về người lao động và phân biệt đối xử trong việc làm.","points":["Người lao động: công dân Việt Nam từ đủ 15 tuổi trở lên có khả năng lao động và có nhu cầu làm việc; lao động chưa thành niên phải bảo đảm điều kiện theo Bộ luật Lao động.","Việc làm: hoạt động lao động tạo ra thu nhập mà pháp luật không cấm.","Bảo hiểm thất nghiệp: loại hình bảo hiểm bắt buộc do Nhà nước tổ chức để hỗ trợ duy trì việc làm, đào tạo, tư vấn, giới thiệu việc làm và bù đắp một phần thu nhập khi mất việc làm.","Việc làm công: việc làm tạm thời có trả công, tạo ra qua các chương trình, dự án, hoạt động sử dụng vốn nhà nước tại địa phương.","Phân biệt đối xử trong việc làm: phân biệt, loại trừ hoặc ưu tiên dựa trên chủng tộc, màu da, nguồn gốc, dân tộc, giới tính, độ tuổi, thai sản, hôn nhân, tôn giáo, tín ngưỡng, khuyết tật, bệnh tật, trách nhiệm gia đình làm ảnh hưởng đến bình đẳng cơ hội việc làm."]},"luat-74_4":{"tldr":"Quy định 7 nhóm chính sách của Nhà nước về việc làm, từ phát triển kinh tế - xã hội tạo việc làm đến hỗ trợ tạo việc làm, phát triển thị trường lao động và khuyến khích phát triển kỹ năng nghề.","points":["Phát triển kinh tế - xã hội để tạo việc làm; phát triển việc làm khu vực kinh tế tư nhân; bố trí nguồn lực cho chính sách việc làm, phát triển kỹ năng nghề và bảo hiểm thất nghiệp.","Tư vấn, giới thiệu việc làm miễn phí và cung cấp thông tin thị trường lao động miễn phí qua tổ chức dịch vụ việc làm công.","Thúc đẩy chuyển dịch cơ cấu lao động; hỗ trợ tạo việc làm, tự tạo việc làm, chuyển đổi việc làm.","Hỗ trợ phát triển thị trường lao động, ưu tiên đầu tư hạ tầng đáp ứng chuyển đổi số.","Khuyến khích phát triển kỹ năng nghề, tạo việc làm trong khoa học, công nghệ, đổi mới sáng tạo, chuyển đổi số, kinh tế tuần hoàn, kinh tế xanh."]},"luat-74_5":{"tldr":"Quy định 4 hành vi bị nghiêm cấm trong lĩnh vực việc làm.","points":["Phân biệt đối xử trong việc làm.","Gian lận, giả mạo hồ sơ trong thực hiện chính sách việc làm, dịch vụ việc làm, đánh giá, cấp chứng chỉ kỹ năng nghề quốc gia.","Lợi dụng hoạt động dịch vụ việc làm xâm phạm chủ quyền quốc gia, quốc phòng, an ninh, lợi ích quốc gia, dân tộc, trật tự, an toàn xã hội, lợi ích công cộng, quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân.","Khai thác, chia sẻ, mua bán, trao đổi, chiếm đoạt, sử dụng trái phép thông tin, dữ liệu trong cơ sở dữ liệu về người lao động và thông tin thị trường lao động."]},"luat-74_6":{"tldr":"Quy định nội dung quản lý nhà nước về việc làm và trách nhiệm của các cơ quan; Bộ Nội vụ là cơ quan đầu mối giúp Chính phủ thực hiện.","points":["Nội dung quản lý: ban hành và tổ chức thực hiện văn bản pháp luật; tuyên truyền, phổ biến, giáo dục pháp luật; quản lý lao động, thông tin thị trường lao động, kỹ năng nghề, hỗ trợ tạo việc làm, dịch vụ việc làm và bảo hiểm thất nghiệp; thanh tra, kiểm tra, giải quyết khiếu nại, tố cáo; hợp tác quốc tế.","Chính phủ thống nhất quản lý nhà nước về việc làm.","Bộ Nội vụ là cơ quan đầu mối giúp Chính phủ thực hiện quản lý nhà nước về việc làm.","Bộ, cơ quan ngang Bộ phối hợp với Bộ Nội vụ; Ủy ban nhân dân các cấp thực hiện quản lý nhà nước về việc làm tại địa phương."]},"luat-74_7":{"tldr":"Quy định trách nhiệm về việc làm của Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên, của cơ quan, tổ chức và của cá nhân.","points":["Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên: tuyên truyền, vận động tạo việc làm; giám sát và phản biện xã hội trong xây dựng, thực hiện chính sách, pháp luật về việc làm.","Cơ quan, tổ chức: tuyên truyền, phổ biến chính sách, pháp luật về việc làm; tạo việc làm; bảo vệ quyền và lợi ích hợp pháp của người lao động, người sử dụng lao động.","Cá nhân: chủ động tìm kiếm việc làm, tham gia tạo việc làm, nâng cao trình độ kỹ năng nghề."]},"luat-74_8":{"tldr":"Nhà nước thực hiện tín dụng chính sách hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và hỗ trợ đi làm việc ở nước ngoài qua Ngân hàng Chính sách xã hội, từ nguồn vốn cho vay giải quyết việc làm.","points":["Tín dụng chính sách được thực hiện thông qua Ngân hàng Chính sách xã hội từ nguồn vốn cho vay giải quyết việc làm.","Nguồn vốn gồm: ngân sách trung ương cấp; ngân sách địa phương ủy thác; nguồn huy động của Ngân hàng Chính sách xã hội được ngân sách nhà nước cấp bù chênh lệch lãi suất và phí quản lý; nguồn vốn tổ chức, cá nhân ủy thác.","Hội đồng nhân dân cấp tỉnh quyết định bố trí vốn từ ngân sách địa phương và nguồn hợp pháp khác, giao Ủy ban nhân dân cùng cấp ủy thác cho Ngân hàng Chính sách xã hội để cho vay giải quyết việc làm."]},"luat-74_9":{"tldr":"Quy định đối tượng, điều kiện vay vốn hỗ trợ tạo việc làm, duy trì, mở rộng việc làm và vay vốn hỗ trợ đi làm việc ở nước ngoài theo hợp đồng, bao gồm các đối tượng được vay với lãi suất thấp hơn.","points":["Đối tượng vay hỗ trợ tạo việc làm, duy trì, mở rộng việc làm: cơ sở sản xuất, kinh doanh (doanh nghiệp nhỏ và vừa, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, hộ kinh doanh) và người lao động.","Đối tượng vay hỗ trợ đi làm việc ở nước ngoài theo hợp đồng: người lao động đi làm việc ở nước ngoài theo hợp đồng.","Vay với lãi suất thấp hơn (tạo/duy trì/mở rộng việc làm): cơ sở dùng nhiều lao động khuyết tật, dân tộc thiểu số, người đã chấp hành xong án phạt tù, cơ sở giáo dục/cai nghiện bắt buộc; lao động dân tộc thiểu số thuộc hộ nghèo; lao động dân tộc Kinh thuộc hộ nghèo ở địa bàn đặc biệt khó khăn; người khuyết tật, người nuôi dưỡng người khuyết tật đặc biệt nặng.","Điều kiện vay của người lao động (tạo/duy trì/mở rộng việc làm): có năng lực hành vi dân sự đầy đủ; có phương án sử dụng vốn vay.","Điều kiện vay đi làm việc ở nước ngoài: có năng lực hành vi dân sự đầy đủ; đã ký hợp đồng với doanh nghiệp dịch vụ, đơn vị sự nghiệp; thực hiện bảo đảm tiền vay.","Chính phủ quy định lãi suất, mức vay, thời hạn, hồ sơ, trình tự, thủ tục và điều kiện bảo đảm tiền vay."]},"luat-74_10":{"tldr":"Nhà nước hỗ trợ chuyển đổi nghề nghiệp, việc làm cho người lao động ở khu vực nông thôn theo chiến lược, quy hoạch, kế hoạch phát triển kinh tế - xã hội.","points":["Người lao động ở khu vực nông thôn tham gia chuyển đổi nghề nghiệp, vi
