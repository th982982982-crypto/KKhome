<script id="LD" type="application/json">{"meta":{"title":"Luật 109/2025/QH15 — Luật Thuế Thu nhập cá nhân","shortCode":"Luật 109/2025","subtitle":"Thuế Thu nhập cá nhân (TNCN)","slug":"luat-109","effectiveDate":"01/07/2026","scope":"Luật này quy định về người nộp thuế, thu nhập chịu thuế, thu nhập được miễn thuế, giảm thuế và căn cứ tính thuế thu nhập cá nhân.","description":"Thuế Thu nhập cá nhân (TNCN)","related":[]},"outline":[{"id":"luat-109_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định về người nộp thuế, thu nhập chịu thuế, thu nhập được miễn thuế, giảm thuế và căn cứ tính thuế thu nhập cá nhân."}]},{"id":"luat-109_2","no":2,"code":"Điều 2","title":"Điều 2. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thu nhập cá nhân là cá nhân cư trú có thu nhập chịu thuế quy định tại Điều 3 của Luật này phát sinh trong và ngoài lãnh thổ Việt Nam và cá nhân không cư trú có thu nhập chịu thuế quy định tại Điều 3 của Luật này phát sinh trong lãnh thổ Việt Nam."},{"k":"p","t":"2. Cá nhân cư trú là người đáp ứng một trong các điều kiện sau đây:"},{"k":"p","t":"a) Có mặt tại Việt Nam từ 183 ngày trở lên tính trong 01 năm dương lịch hoặc tính theo 12 tháng liên tục kể từ ngày đầu tiên có mặt tại Việt Nam;"},{"k":"p","t":"b) Có nơi ở thường xuyên tại Việt Nam, bao gồm có nơi ở đăng ký thường trú hoặc có nhà thuê để ở tại Việt Nam theo hợp đồng thuê có thời hạn."},{"k":"p","t":"3. Cá nhân không cư trú là người không đáp ứng điều kiện quy định tại khoản 2 Điều này."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_3","no":3,"code":"Điều 3","title":"Điều 3. Thu nhập chịu thuế","shortTitle":"Thu nhập chịu thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập chịu thuế thu nhập cá nhân gồm các loại thu nhập sau đây, trừ thu nhập được miễn thuế quy định tại Điều 4 của Luật này:"},{"k":"p","t":"1. Thu nhập từ kinh doanh, bao gồm:"},{"k":"p","t":"a) Thu nhập từ hoạt động sản xuất, kinh doanh hàng hoá, dịch vụ;"},{"k":"p","t":"b) Thu nhập từ hoạt động hành nghề độc lập của cá nhân có giấy phép hoặc chứng chỉ hành nghề theo quy định của pháp luật;"},{"k":"p","t":"c) Thu nhập từ hoạt động đại lý, môi giới, hợp tác kinh doanh với tổ chức;"},{"k":"p","t":"d) Thu nhập từ hoạt động kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số."},{"k":"p","t":"2. Thu nhập từ tiền lương, tiền công, bao gồm:"},{"k":"p","t":"a) Tiền lương, tiền công và các khoản có tính chất tiền lương, tiền công;"},{"k":"p","t":"b) Tiền thù lao, các khoản lợi ích bằng tiền hoặc không bằng tiền dưới mọi hình thức;"},{"k":"p","t":"c) Các khoản phụ cấp, trợ cấp, thu nhập khác trừ các khoản: phụ cấp, trợ cấp theo quy định của pháp luật về ưu đãi người có công; phụ cấp quốc phòng, an ninh; phụ cấp độc hại, nguy hiểm đối với ngành, nghề hoặc công việc ở nơi làm việc có yếu tố độc hại, nguy hiểm; phụ cấp thu hút, phụ cấp khu vực theo quy định của pháp luật; phụ cấp, trợ cấp, sinh hoạt phí do cơ quan Việt Nam ở nước ngoài chi trả; trợ cấp khó khăn đột xuất, trợ cấp tai nạn lao động, bệnh nghề nghiệp, trợ cấp một lần khi sinh con hoặc nhận nuôi con nuôi, trợ cấp do suy giảm khả năng lao động, trợ cấp hưu trí một lần,  trợ cấp tuất hàng tháng và các khoản trợ cấp khác theo quy định của pháp luật về bảo hiểm xã hội; trợ cấp thôi việc, trợ cấp mất việc làm; trợ cấp mang tính chất bảo trợ xã hội và các khoản phụ cấp, trợ cấp, thu nhập khác không mang tính chất tiền lương, tiền công do Chính phủ quy định."},{"k":"p","t":"3. Thu nhập từ đầu tư vốn, bao gồm:"},{"k":"p","t":"a) Tiền lãi cho vay;"},{"k":"p","t":"b) Lợi tức cổ phần;"},{"k":"p","t":"c) Thu nhập từ đầu tư vốn dưới các hình thức khác."},{"k":"p","t":"4. Thu nhập từ chuyển nhượng vốn, bao gồm:"},{"k":"p","t":"a) Thu nhập từ chuyển nhượng phần vốn trong các tổ chức kinh tế;"},{"k":"p","t":"b) Thu nhập từ chuyển nhượng chứng khoán;"},{"k":"p","t":"c) Thu nhập từ chuyển nhượng vốn dưới các hình thức khác."},{"k":"p","t":"5. Thu nhập từ chuyển nhượng bất động sản, bao gồm:"},{"k":"p","t":"a) Thu nhập từ chuyển nhượng quyền sử dụng đất và tài sản gắn liền với đất;"},{"k":"p","t":"b) Thu nhập từ chuyển nhượng quyền sở hữu hoặc sử dụng nhà ở;"},{"k":"p","t":"c) Thu nhập từ chuyển nhượng quyền thuê đất, quyền thuê mặt nước;"},{"k":"p","t":"d) Các khoản thu nhập khác nhận được từ chuyển nhượng bất động sản dưới mọi hình thức."},{"k":"p","t":"6. Thu nhập từ trúng thưởng, bao gồm:"},{"k":"p","t":"a) Trúng thưởng xổ số;"},{"k":"p","t":"b) Trúng thưởng trong các hình thức khuyến mại;"},{"k":"p","t":"c) Trúng thưởng trong các hình thức đặt cược;"},{"k":"p","t":"d) Trúng thưởng trong các trò chơi, cuộc thi có thưởng và các hình thức trúng thưởng khác, trừ trúng thưởng trong ca-si-no."},{"k":"p","t":"7. Thu nhập từ tiền bản quyền, bao gồm:"},{"k":"p","t":"a) Thu nhập từ chuyển giao, chuyển quyền sử dụng các đối tượng của quyền sở hữu trí tuệ;"},{"k":"p","t":"b) Thu nhập từ chuyển giao công nghệ."},{"k":"p","t":"8. Thu nhập từ nhượng quyền thương mại."},{"k":"p","t":"9. Thu nhập từ nhận thừa kế, quà tặng là chứng khoán, phần vốn trong các tổ chức kinh tế, cơ sở kinh doanh, bất động sản và các tài sản phải đăng ký sở hữu hoặc đăng ký sử dụng."},{"k":"p","t":"10. Thu nhập khác, bao gồm:"},{"k":"p","t":"a) Thu nhập từ chuyển nhượng tên miền quốc gia Việt Nam “.vn”;"},{"k":"p","t":"b) Thu nhập từ chuyển nhượng kết quả giảm phát thải khí nhà kính, tín chỉ các-bon;"},{"k":"p","t":"c) Thu nhập từ chuyển nhượng biển số xe trúng đấu giá theo quy định của pháp luật;"},{"k":"p","t":"d) Thu nhập từ chuyển nhượng tài sản số;"},{"k":"p","t":"đ) Thu nhập từ chuyển nhượng vàng miếng."},{"k":"p","t":"Chính phủ quy định ngưỡng giá trị vàng miếng chịu thuế, thời điểm áp dụng thu và điều chỉnh thuế suất thuế thu nhập cá nhân đối với chuyển nhượng vàng miếng phù hợp với lộ trình quản lý thị trường vàng."},{"k":"p","t":"11. Chính phủ quy định chi tiết Điều này và việc quy đổi thu nhập chịu thuế nhận được không bằng tiền, không bằng Đồng Việt Nam."}]},{"id":"luat-109_4","no":4,"code":"Điều 4","title":"Điều 4. Thu nhập được miễn thuế","shortTitle":"Thu nhập được miễn thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thu nhập từ chuyển nhượng, nhận thừa kế, quà tặng là bất động sản giữa vợ với chồng; cha đẻ, mẹ đẻ với con đẻ; cha nuôi, mẹ nuôi với con nuôi; cha chồng, mẹ chồng với con dâu; cha vợ, mẹ vợ với con rể; ông nội, bà nội với cháu nội; ông ngoại, bà ngoại với cháu ngoại; anh, chị, em ruột với nhau."},{"k":"p","t":"2. Thu nhập từ chuyển nhượng nhà ở, quyền sử dụng đất ở và tài sản gắn liền với đất ở của cá nhân trong trường hợp cá nhân chỉ có một nhà ở, đất ở duy nhất tại Việt Nam."},{"k":"p","t":"3. Thu nhập từ giá trị quyền sử dụng đất của cá nhân được Nhà nước giao đất."},{"k":"p","t":"4. Thu nhập của hộ gia đình, cá nhân trực tiếp sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa qua chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường; sản xuất muối; thu nhập từ lợi tức cổ phần của thành viên hợp tác xã, liên hiệp hợp tác xã nông nghiệp, cá nhân là nông dân ký kết hợp đồng với doanh nghiệp tham gia “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản."},{"k":"p","t":"5. Thu nhập từ chuyển đổi đất nông nghiệp của hộ gia đình, cá nhân được Nhà nước giao để sản xuất."},{"k":"p","t":"6. Thu nhập từ lãi trái phiếu chính phủ, lãi trái phiếu chính quyền địa phương, lãi tiền gửi tại tổ chức tín dụng, lãi từ hợp đồng bảo hiểm nhân thọ."},{"k":"p","t":"7. Thu nhập từ kiều hối."},{"k":"p","t":"8. Tiền lương làm việc ban đêm, làm thêm giờ, tiền lương, tiền công trả cho những ngày không nghỉ phép theo quy định của pháp luật."},{"k":"p","t":"9. Tiền lương hưu do Quỹ bảo hiểm xã hội chi trả; thu nhập do quỹ bảo hiểm hưu trí bổ sung, quỹ hưu trí tự nguyện chi trả."},{"k":"p","t":"10. Thu nhập từ học bổng, bao gồm:"},{"k":"p","t":"a) Học bổng nhận được từ ngân sách nhà nước;"},{"k":"p","t":"b) Học bổng nhận được từ tổ chức trong nước và ngoài nước theo chương trình hỗ trợ khuyến học của tổ chức đó."},{"k":"p","t":"11. Thu nhập từ bồi thường hợp đồng bảo hiểm nhân thọ, phi nhân thọ, tiền bồi thường tai nạn lao động, khoản bồi thường nhà nước và các khoản bồi thường khác theo quy định của pháp luật."},{"k":"p","t":"12. Thu nhập nhận được từ các tổ chức và quỹ từ thiện được cơ quan nhà nước có thẩm quyền cho phép thành lập hoặc công nhận, hoạt động vì mục đích từ thiện, nhân đạo, không vì mục tiêu lợi nhuận."},{"k":"p","t":"13. Thu nhập nhận được từ nguồn viện trợ nước ngoài vì mục đích từ thiện, nhân đạo dưới hình thức chính phủ và phi chính phủ được cơ quan nhà nước có thẩm quyền phê duyệt."},{"k":"p","t":"14. Thu nhập từ tiền lương, tiền công của thuyền viên là người Việt Nam làm việc cho các hãng tàu nước ngoài hoặc các hãng tàu Việt Nam vận tải quốc tế."},{"k":"p","t":"15. Thu nhập của cá nhân là chủ tàu, cá nhân có quyền sử dụng tàu và cá nhân làm việc trên tàu từ hoạt động cung cấp hàng hóa, dịch vụ trực tiếp phục vụ hoạt động khai thác, đánh bắt thủy sản xa bờ."},{"k":"p","t":"16. Thu nhập từ chuyển nhượng lần đầu kết quả giảm phát thải khí nhà kính của cá nhân được công nhận kết quả giảm phát thải khí nhà kính, tín chỉ các-bon của cá nhân được cấp tín chỉ các-bon; thu nhập từ tiền lãi trái phiếu xanh; thu nhập từ chuyển nhượng lần đầu trái phiếu xanh sau khi phát hành."},{"k":"p","t":"17. Thu nhập từ tiền lương, tiền công từ thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo."},{"k":"p","t":"18. Thu nhập từ quyền tác giả của nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo khi kết quả nhiệm vụ được thương mại hóa theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về sở hữu trí tuệ."},{"k":"p","t":"19. Thu nhập của nhà đầu tư cá nhân, chuyên gia từ dự án khởi nghiệp sáng tạo, sáng lập viên cho doanh nghiệp khởi nghiệp sáng tạo, nhà đầu tư cá nhân góp vốn vào quỹ đầu tư mạo hiểm."},{"k":"p","t":"20. Thu nhập từ tiền lương, tiền công của chuyên gia nước ngoài làm việc tại chương trình, dự án tài trợ bằng nguồn vốn ODA không hoàn lại, chương trình, dự án phi chính phủ nước ngoài tại Việt Nam; cá nhân là người Việt Nam làm việc tại cơ quan đại diện của tổ chức quốc tế thuộc Hệ thống Liên hợp quốc tại Việt Nam; cá nhân tham gia lực lượng gìn giữ hòa bình của Liên hợp quốc."},{"k":"p","t":"21. Thu nhập sau khi đã nộp thuế thu nhập doanh nghiệp của cá nhân là chủ doanh nghiệp tư nhân, cá nhân là chủ công ty trách nhiệm hữu hạn một thành viên."},{"k":"p","t":"22. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_5","no":5,"code":"Điều 5","title":"Điều 5. Các trường hợp miễn thuế, giảm thuế khác","shortTitle":"Các trường hợp miễn thuế, giảm thuế khác","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế gặp khó khăn do thiên tai, dịch bệnh, hoả hoạn, tai nạn, bệnh hiểm nghèo ảnh hưởng đến khả năng nộp thuế thì được giảm thuế tương ứng với mức độ thiệt hại nhưng không vượt quá số thuế phải nộp."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân trong thời hạn 05 năm đối với thu nhập từ tiền lương, tiền công của cá nhân là nhân lực công nghiệp công nghệ số chất lượng cao thuộc các trường hợp sau:"},{"k":"p","t":"a) Thu nhập từ dự án hoạt động công nghiệp công nghệ số trong khu công nghệ số tập trung;"},{"k":"p","t":"b) Thu nhập từ dự án nghiên cứu và phát triển, sản xuất sản phẩm công nghệ số trọng điểm, chip bán dẫn, hệ thống trí tuệ nhân tạo;"},{"k":"p","t":"c) Thu nhập từ các hoạt động đào tạo nhân lực công nghiệp công nghệ số."},{"k":"p","t":"3. Miễn thuế thu nhập cá nhân trong thời hạn 05 năm đối với thu nhập từ tiền lương, tiền công của cá nhân là nhân lực công nghệ cao thực hiện hoạt động nghiên cứu và phát triển công nghệ cao hoặc công nghệ chiến lược thuộc Danh mục công nghệ cao được ưu tiên đầu tư phát triển hoặc Danh mục công nghệ chiến lược, Danh mục sản phẩm công nghệ chiến lược theo quy định của pháp luật về công nghệ cao."},{"k":"p","t":"4. Miễn thuế thu nhập cá nhân đối với chuyển nhượng chứng chỉ quỹ mở thành lập theo quy định của pháp luật về chứng khoán được nắm giữ từ 02 năm trở lên kể từ ngày mua."},{"k":"p","t":"5. Giảm 50% thuế thu nhập cá nhân đối với lợi tức của nhà đầu tư cá nhân được chia từ quỹ đầu tư chứng khoán, quỹ đầu tư bất động sản thành lập theo quy định của Luật Chứng khoán trong thời hạn do Chính phủ quy định."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_6","no":6,"code":"Điều 6","title":"Điều 6. Quản lý thuế đối với thuế thu nhập cá nhân","shortTitle":"Quản lý thuế đối với thuế thu nhập cá nhân","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Căn cứ quy định của Luật này, Chính phủ quy định về kỳ tính thuế theo năm đối với thu nhập từ kinh doanh, thu nhập từ tiền lương, tiền công của cá nhân cư trú; kỳ tính thuế theo từng lần phát sinh đối với các khoản thu nhập khác của cá nhân cư trú và cá nhân không cư trú; thời điểm xác định thu nhập tính thuế; quyết toán thuế; hoàn thuế đối với trường hợp cá nhân có số thuế đã nộp lớn hơn số thuế phải nộp hoặc chưa đến mức phải nộp; trách nhiệm khấu trừ, khai thay, nộp thay cho người nộp thuế phù hợp với quy định của Luật Quản lý thuế."}]},{"id":"luat-109_7","no":7,"code":"Điều 7","title":"Điều 7. Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Cá nhân cư trú có hoạt động sản xuất, kinh doanh có mức doanh thu năm từ 500 triệu đồng trở xuống không phải nộp thuế thu nhập cá nhân. Chính phủ trình Ủy ban Thường vụ Quốc hội điều chỉnh mức doanh thu không phải nộp thuế thu nhập cá nhân phù hợp với tình hình kinh tế - xã hội trong từng thời kỳ."},{"k":"p","t":"2. Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh của cá nhân cư trú có doanh thu năm trên mức quy định tại khoản 1 Điều này được xác định bằng thu nhập tính thuế nhân (x) với thuế suất. Trong đó:"},{"k":"p","t":"a) Thu nhập tính thuế được xác định bằng doanh thu của hàng hóa, dịch vụ bán ra trừ (-) đi chi phí liên quan đến hoạt động sản xuất, kinh doanh trong kỳ tính thuế;"},{"k":"p","t":"b) Cá nhân kinh doanh có doanh thu năm trên mức quy định tại khoản 1 Điều này đến 03 tỷ đồng: thuế suất 15%;"},{"k":"p","t":"c) Cá nhân kinh doanh có doanh thu năm trên 03 tỷ đồng đến 50 tỷ đồng: thuế suất 17%;"},{"k":"p","t":"d) Cá nhân kinh doanh có doanh thu năm trên 50 tỷ đồng: thuế suất 20%."},{"k":"p","t":"Thu nhập từ cho thuê bất động sản quy định tại khoản 4 Điều này không áp dụng cách tính thuế quy định tại khoản này."},{"k":"p","t":"3. Cá nhân kinh doanh có doanh thu năm trên mức quy định tại khoản 1 Điều này đến 03 tỷ đồng được lựa chọn nộp thuế theo quy định tại điểm a và điểm b khoản 2 Điều này hoặc nộp thuế theo thuế suất nhân (x) với doanh thu tính thuế. Doanh thu tính thuế và thuế suất được xác định như sau:"},{"k":"p","t":"a) Doanh thu tính thuế được xác định bằng phần doanh thu vượt trên mức quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Phân phối, cung cấp hàng hoá: thuế suất 0,5%;"},{"k":"p","t":"c) Dịch vụ, xây dựng không bao thầu nguyên vật liệu: thuế suất 2%. Riêng hoạt động cho thuê tài sản, đại lý bảo hiểm, đại lý xổ số, đại lý bán hàng đa cấp: thuế suất 5%;"},{"k":"p","t":"d) Sản xuất, vận tải, dịch vụ có gắn với hàng hoá, xây dựng có bao thầu nguyên vật liệu: thuế suất 1,5%;"},{"k":"p","t":"đ) Hoạt động cung cấp sản phẩm và dịch vụ nội dung thông tin số về giải trí, trò chơi điện tử, phim số, ảnh số, nhạc số, quảng cáo số: thuế suất 5%;"},{"k":"p","t":"e) Hoạt động kinh doanh khác: thuế suất 1%."},{"k":"p","t":"4. Cá nhân cho thuê bất động sản, trừ hoạt động kinh doanh lưu trú, nộp thuế thu nhập cá nhân được xác định bằng phần doanh thu vượt trên mức quy định tại khoản 1 Điều này nhân (x) với thuế suất 5%."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_8","no":8,"code":"Điều 8","title":"Điều 8. Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của cá nhân cư trú được xác định bằng thu nhập tính thuế quy định tại khoản 2 Điều này, không phân biệt nơi trả thu nhập, nhân (x) với thuế suất tại Biểu thuế lũy tiến từng phần quy định tại Điều 9 của Luật này."},{"k":"p","t":"2. Thu nhập tính thuế đối với thu nhập từ tiền lương, tiền công là tổng thu nhập chịu thuế quy định tại khoản 2 Điều 3 của Luật này mà người nộp thuế nhận được trong kỳ tính thuế, trừ (-) đi các khoản đóng góp bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm trách nhiệm nghề nghiệp đối với một số ngành, nghề phải tham gia bảo hiểm bắt buộc, khoản đóng góp tham gia bảo hiểm hưu trí bổ sung theo quy định của Luật Bảo hiểm xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ không vượt quá mức do Chính phủ quy định và các khoản giảm trừ quy định tại Điều 10 và Điều 11 của Luật này."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ tiền lương, tiền công là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế hoặc thời điểm người nộp thuế nhận được thu nhập."}]},{"id":"luat-109_9","no":9,"code":"Điều 9","title":"Điều 9. Biểu thuế luỹ tiến từng phần","shortTitle":"Biểu thuế luỹ tiến từng phần","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Biểu thuế luỹ tiến từng phần áp dụng đối với thu nhập tính thuế quy định tại khoản 2 Điều 8 của Luật này."},{"k":"p","t":"2. Biểu thuế luỹ tiến từng phần được quy định như sau:"},{"k":"tbl","rows":[["Bậc thuế","Phần thu nhập tính thuế/năm\n(triệu đồng)","Phần thu nhập tính thuế/tháng\n(triệu đồng)","Thuế suất (%)"],["1","Đến 120","Đến 10","5"],["2","Trên 120 đến 360","Trên 10 đến 30","10"],["3","Trên 360 đến 720","Trên 30 đến 60","20"],["4","Trên 720 đến 1.200","Trên 60 đến 100","30"],["5","Trên 1.200","Trên 100","35"]]}]},{"id":"luat-109_10","no":10,"code":"Điều 10","title":"Điều 10. Giảm trừ gia cảnh","shortTitle":"Giảm trừ gia cảnh","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Giảm trừ gia cảnh là số tiền được trừ vào thu nhập chịu thuế trước khi tính thuế đối với thu nhập từ tiền lương, tiền công của người nộp thuế là cá nhân cư trú. Giảm trừ gia cảnh gồm:"},{"k":"p","t":"a) Mức giảm trừ đối với người nộp thuế là 15,5 triệu đồng/tháng (186 triệu đồng/năm);"},{"k":"p","t":"b) Mức giảm trừ đối với mỗi người phụ thuộc là 6,2 triệu đồng/tháng."},{"k":"p","t":"2. Căn cứ biến động của giá cả, thu nhập, Chính phủ trình Ủy ban Thường vụ Quốc hội quy định mức giảm trừ gia cảnh quy định tại khoản 1 Điều này phù hợp với tình hình kinh tế - xã hội trong từng thời kỳ."},{"k":"p","t":"3. Việc xác định mức giảm trừ gia cảnh đối với người phụ thuộc thực hiện theo nguyên tắc mỗi người phụ thuộc chỉ được tính giảm trừ một lần vào một người nộp thuế."},{"k":"p","t":"4. Người phụ thuộc là người mà người nộp thuế có trách nhiệm nuôi dưỡng, bao gồm:"},{"k":"p","t":"a) Con chưa thành niên; con là người mất năng lực hành vi dân sự, người khuyết tật, không có khả năng lao động;"},{"k":"p","t":"b) Các cá nhân không có thu nhập hoặc có thu nhập không vượt quá mức do Bộ trưởng Bộ Tài chính quy định, bao gồm con thành niên đang học đại học, cao đẳng, trung học chuyên nghiệp hoặc học nghề; vợ hoặc chồng không có khả năng lao động; bố, mẹ đã hết tuổi lao động hoặc không có khả năng lao động; những người khác không nơi nương tựa mà người nộp thuế phải trực tiếp nuôi dưỡng."}]},{"id":"luat-109_11","no":11,"code":"Điều 11","title":"Điều 11. Giảm trừ đối với các khoản đóng góp từ thiện, nhân đạo và các khoản giảm trừ khác","shortTitle":"Giảm trừ đối với các khoản đóng góp từ thiện, nhân đạo và các khoản giảm trừ khác","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"Cá nhân cư trú được giảm trừ vào thu nhập chịu thuế trước khi tính thuế đối với thu nhập từ tiền lương, tiền công các khoản sau đây:"},{"k":"p","t":"1. Khoản đóng góp từ thiện, nhân đạo, bao gồm:"},{"k":"p","t":"a) Khoản đóng góp vào tổ chức, cơ sở chăm sóc, nuôi dưỡng trẻ em có hoàn cảnh đặc biệt khó khăn, người khuyết tật, người già không nơi nương tựa;"},{"k":"p","t":"b) Khoản đóng góp vào quỹ từ thiện, quỹ nhân đạo, quỹ khuyến học;"},{"k":"p","t":"c) Khoản đóng góp vào các tổ chức có chức năng huy động tài trợ được thành lập và hoạt động theo quy định của pháp luật."},{"k":"p","t":"Tổ chức, cơ sở và các quỹ quy định tại khoản này phải được cơ quan nhà nước có thẩm quyền cho phép thành lập hoặc công nhận, hoạt động vì mục đích từ thiện, nhân đạo, khuyến học, không vì mục tiêu lợi nhuận."},{"k":"p","t":"2. Khoản chi cho y tế, giáo dục - đào tạo của người nộp thuế, người phụ thuộc của người nộp thuế được giảm trừ vào thu nhập trước khi tính thuế theo mức do Chính phủ quy định."},{"k":"p","t":"3. Các khoản chi quy định tại Điều này phải đáp ứng các điều kiện về hóa đơn, chứng từ theo quy định của pháp luật và không được chi trả từ các nguồn khác."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_12","no":12,"code":"Điều 12","title":"Điều 12. Thuế thu nhập cá nhân đối với thu nhập từ đầu tư vốn","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ đầu tư vốn","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế đối với thu nhập từ đầu tư vốn của cá nhân cư trú được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 5%."},{"k":"p","t":"2. Thu nhập tính thuế từ đầu tư vốn là tổng số các khoản thu nhập chịu thuế từ đầu tư vốn quy định tại khoản 3 Điều 3 của Luật này mà người nộp thuế nhận được theo từng lần phát sinh."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ đầu tư vốn là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế hoặc thời điểm người nộp thuế nhận được thu nhập."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_13","no":13,"code":"Điều 13","title":"Điều 13. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn của cá nhân cư trú được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 20% theo từng lần chuyển nhượng. Trong đó, thu nhập tính thuế từ chuyển nhượng vốn được xác định bằng giá chuyển nhượng trừ (-) đi giá mua và các khoản chi phí hợp lý liên quan đến việc tạo ra thu nhập từ chuyển nhượng vốn."},{"k":"p","t":"Trường hợp không xác định giá mua và các chi phí liên quan đến việc chuyển nhượng vốn thì thuế thu nhập cá nhân được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 2%."},{"k":"p","t":"2. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng chứng khoán được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 0,1% theo từng lần chuyển nhượng."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ chuyển nhượng vốn là thời điểm giao dịch hoàn thành theo quy định của pháp luật."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_14","no":14,"code":"Điều 14","title":"Điều 14. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản của cá nhân cư trú được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 2%."},{"k":"p","t":"2. Thời điểm xác định thu nhập tính thuế từ chuyển nhượng bất động sản là thời điểm hợp đồng chuyển nhượng có hiệu lực theo quy định của pháp luật hoặc thời điểm đăng ký quyền sử dụng, quyền sở hữu bất động sản."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_15","no":15,"code":"Điều 15","title":"Điều 15. Thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng của cá nhân cư trú được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 10%."},{"k":"p","t":"2. Thu nhập tính thuế từ trúng thưởng là phần giá trị giải thưởng vượt trên 20 triệu đồng mà người nộp thuế nhận được theo từng lần trúng thưởng."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ trúng thưởng là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế."}]},{"id":"luat-109_16","no":16,"code":"Điều 16","title":"Điều 16. Thuế thu nhập cá nhân đối với thu nhập từ tiền bản quyền","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ tiền bản quyền","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ tiền bản quyền của cá nhân cư trú được tính bằng thu nhập tính thuế nhân (x) với thuế suất 5%."},{"k":"p","t":"2. Thu nhập tính thuế từ tiền bản quyền là phần thu nhập vượt trên 20 triệu đồng mà người nộp thuế nhận được khi chuyển giao, chuyển quyền sử dụng các đối tượng của quyền sở hữu trí tuệ, chuyển giao công nghệ theo từng hợp đồng."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ tiền bản quyền là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế."}]},{"id":"luat-109_17","no":17,"code":"Điều 17","title":"Điều 17. Thuế thu nhập cá nhân đối với thu nhập từ nhượng quyền thương mại","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ nhượng quyền thương mại","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ nhượng quyền thương mại của cá nhân cư trú được tính bằng thu nhập tính thuế nhân (x) với thuế suất 5%."},{"k":"p","t":"2. Thu nhập tính thuế từ nhượng quyền thương mại là phần thu nhập vượt trên 20 triệu đồng mà người nộp thuế nhận được theo từng hợp đồng nhượng quyền thương mại."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ nhượng quyền thương mại là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế."}]},{"id":"luat-109_18","no":18,"code":"Điều 18","title":"Điều 18. Thuế thu nhập cá nhân đối với thu nhập từ nhận thừa kế, quà tặng","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ nhận thừa kế, quà tặng","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ nhận thừa kế, quà tặng của cá nhân cư trú được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 10%."},{"k":"p","t":"2. Thu nhập tính thuế từ nhận thừa kế, quà tặng là phần giá trị tài sản thừa kế, quà tặng vượt trên 20 triệu đồng mà người nộp thuế nhận được theo từng lần phát sinh."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế được quy định như sau:"},{"k":"p","t":"a) Đối với thu nhập từ nhận thừa kế là thời điểm người nộp thuế nhận được thừa kế;"},{"k":"p","t":"b) Đối với thu nhập từ nhận quà tặng là thời điểm tổ chức, cá nhân tặng cho người nộp thuế hoặc thời điểm người nộp thuế nhận được thu nhập."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_19","no":19,"code":"Điều 19","title":"Điều 19. Thuế thu nhập cá nhân đối với thu nhập khác","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập khác","chuong":"Chương II — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập khác của cá nhân cư trú quy định tại các điểm a, b và c khoản 10 Điều 3 của Luật này được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 5%. Trong đó, thu nhập tính thuế là phần thu nhập vượt trên 20 triệu đồng mà người nộp thuế nhận được theo từng lần phát sinh."},{"k":"p","t":"2. Thuế thu nhập cá nhân đối với thu nhập khác của cá nhân cư trú quy định tại điểm d và điểm đ khoản 10 Điều 3 của Luật này được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 0,1%."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân chi trả thu nhập cho người nộp thuế hoặc thời điểm người nộp thuế nhận được thu nhập."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_20","no":20,"code":"Điều 20","title":"Điều 20. Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh của cá nhân không cư trú được xác định bằng doanh thu từ hoạt động kinh doanh quy định tại khoản 2 Điều này nhân (x) với thuế suất quy định tại khoản 3 Điều này."},{"k":"p","t":"2. Doanh thu là toàn bộ tiền bán hàng, tiền gia công, tiền cung ứng dịch vụ kể cả trợ giá, phụ thu, phụ trội mà cá nhân được hưởng, không phân biệt đã thu được tiền hay chưa thu được tiền, bao gồm cả chi phí do bên mua hàng hoá, dịch vụ trả thay cho cá nhân không cư trú mà không được hoàn trả."},{"k":"p","t":"Trường hợp thoả thuận hợp đồng không bao gồm thuế thu nhập cá nhân thì doanh thu tính thuế phải quy đổi là toàn bộ số tiền mà cá nhân không cư trú nhận được dưới bất kỳ hình thức nào từ việc cung cấp hàng hoá, dịch vụ tại Việt Nam không phụ thuộc vào địa điểm tiến hành các hoạt động kinh doanh."},{"k":"p","t":"3. Thuế suất:"},{"k":"p","t":"a) Phân phối, cung cấp hàng hoá: 1%;"},{"k":"p","t":"b) Dịch vụ, xây dựng không bao thầu nguyên vật liệu: 5%;"},{"k":"p","t":"c) Sản xuất, vận tải, dịch vụ có gắn với hàng hoá, xây dựng có bao thầu nguyên vật liệu: 2%;"},{"k":"p","t":"d) Hoạt động cung cấp sản phẩm và dịch vụ nội dung thông tin số về giải trí, trò chơi điện tử, phim số, ảnh số, nhạc số, quảng cáo: 5%;"},{"k":"p","t":"đ) Hoạt động kinh doanh khác: 2%."}]},{"id":"luat-109_21","no":21,"code":"Điều 21","title":"Điều 21. Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của cá nhân không cư trú được xác định bằng tổng số tiền lương, tiền công mà cá nhân không cư trú nhận được do thực hiện công việc tại Việt Nam nhân (x) với thuế suất 20%, không phân biệt nơi trả thu nhập."}]},{"id":"luat-109_22","no":22,"code":"Điều 22","title":"Điều 22. Thuế thu nhập cá nhân đối với thu nhập từ đầu tư vốn","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ đầu tư vốn","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"Thuế thu nhập cá nhân đối với thu nhập từ đầu tư vốn của cá nhân không cư trú được xác định bằng tổng số thu nhập mà cá nhân không cư trú nhận được từ việc đầu tư vốn vào tổ chức, cá nhân tại Việt Nam nhân (x) với thuế suất 5%."}]},{"id":"luat-109_23","no":23,"code":"Điều 23","title":"Điều 23. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn của cá nhân không cư trú được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 20% theo từng lần phát sinh, không phân biệt việc chuyển nhượng được thực hiện tại Việt Nam hay tại nước ngoài. Trong đó, thu nhập tính thuế từ chuyển nhượng vốn được xác định bằng giá chuyển nhượng trừ (-) đi giá mua và các khoản chi phí hợp lý liên quan đến việc tạo ra thu nhập từ chuyển nhượng phần vốn tại tổ chức, cá nhân Việt Nam."},{"k":"p","t":"Trường hợp không xác định được giá mua và các chi phí liên quan đến việc chuyển nhượng vốn thì thuế thu nhập cá nhân được xác định bằng giá chuyển nhượng phần vốn tại tổ chức, cá nhân Việt Nam nhân (x) với thuế suất 2%."},{"k":"p","t":"2. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng chứng khoán của cá nhân không cư trú được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 0,1%."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_24","no":24,"code":"Điều 24","title":"Điều 24. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng bất động sản của cá nhân không cư trú được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 2%."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_25","no":25,"code":"Điều 25","title":"Điều 25. Thuế thu nhập cá nhân đối với thu nhập từ tiền bản quyền, nhượng quyền thương mại","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ tiền bản quyền, nhượng quyền thương mại","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ tiền bản quyền của cá nhân không cư trú được xác định bằng phần thu nhập vượt trên 20 triệu đồng theo từng hợp đồng chuyển giao, chuyển quyền sử dụng các đối tượng của quyền sở hữu trí tuệ, chuyển giao công nghệ tại Việt Nam nhân (x) với thuế suất 5%."},{"k":"p","t":"2. Thuế thu nhập cá nhân đối với thu nhập từ nhượng quyền thương mại của cá nhân không cư trú được xác định bằng phần thu nhập vượt trên 20 triệu đồng theo từng hợp đồng nhượng quyền thương mại tại Việt Nam nhân (x) với thuế suất 5%."}]},{"id":"luat-109_26","no":26,"code":"Điều 26","title":"Điều 26. Thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng, nhận thừa kế, quà tặng","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng, nhận thừa kế, quà tặng","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"Thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng, nhận thừa kế, quà tặng của cá nhân không cư trú được xác định bằng phần giá trị vượt trên 20 triệu đồng theo từng lần trúng thưởng, nhận thừa kế, quà tặng tại Việt Nam nhân (x) với thuế suất 10%."}]},{"id":"luat-109_27","no":27,"code":"Điều 27","title":"Điều 27. Thuế thu nhập cá nhân đối với thu nhập khác","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập khác","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập khác của cá nhân không cư trú quy định tại các điểm a, b và c khoản 10 Điều 3 của Luật này được xác định bằng thu nhập tính thuế nhân (x) với thuế suất 5%."},{"k":"p","t":"Thu nhập tính thuế là phần thu nhập vượt trên 20 triệu đồng mà người nộp thuế nhận được theo từng lần phát sinh."},{"k":"p","t":"2. Thuế thu nhập cá nhân đối với thu nhập khác của cá nhân không cư trú quy định tại điểm d và điểm đ khoản 10 Điều 3 của Luật này được xác định bằng giá chuyển nhượng nhân (x) với thuế suất 0,1%."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-109_28","no":28,"code":"Điều 28","title":"Điều 28. Thời điểm xác định thu nhập tính thuế","shortTitle":"Thời điểm xác định thu nhập tính thuế","chuong":"Chương III — CĂN CỨ TÍNH THUẾ ĐỐI VỚI CÁ NHÂN KHÔNG CƯ TRÚ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời điểm xác định thu nhập tính thuế đối với thu nhập quy định tại Điều 20 của Luật này là thời điểm cá nhân không cư trú nhận được thu nhập hoặc thời điểm xuất hoá đơn bán hàng hoá, cung cấp dịch vụ."},{"k":"p","t":"2. Thời điểm xác định thu nhập tính thuế đối với thu nhập quy định tại các điều 21, 22, 25, 26 và 27 của Luật này là thời điểm tổ chức, cá nhân tại Việt Nam trả thu nhập cho cá nhân không cư trú hoặc thời điểm cá nhân không cư trú nhận được thu nhập."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế đối với thu nhập quy định tại Điều 23 của Luật này là thời điểm giao dịch hoàn thành theo quy định của pháp luật."},{"k":"p","t":"4. Thời điểm xác định thu nhập tính thuế đối với thu nhập quy định tại Điều 24 của Luật này là thời điểm hợp đồng chuyển nhượng có hiệu lực theo quy định của pháp luật hoặc thời điểm đăng ký quyền sử dụng, quyền sở hữu bất động sản."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"Điều 29. Hiệu lực thi hành"},{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2026, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Các quy định liên quan đến thu nhập từ kinh doanh, từ tiền lương, tiền công của cá nhân cư trú áp dụng từ kỳ tính thuế năm 2026."},{"k":"p","t":"3. Luật Thuế thu nhập cá nhân số 04/2007/QH12 đã được sửa đổi, bổ sung một số điều theo Luật số 26/2012/QH13, Luật số 71/2014/QH13, Luật số 31/2024/QH15, Luật số 43/2024/QH15, Luật số 48/2024/QH15, Luật số 56/2025/QH15, Luật số 71/2025/QH15 và Luật số 93/2025/QH15 hết hiệu lực kể từ ngày Luật này có hiệu lực thi hành; riêng các quy định liên quan đến thu nhập từ kinh doanh, từ tiền lương, tiền công của cá nhân cư trú hết hiệu lực thi hành từ kỳ tính thuế năm 2026."},{"k":"p","t":"4. Trường  hợp có quy định khác nhau về ưu đãi thuế giữa Luật này với Luật Thủ đô, nghị quyết của Quốc hội và giải pháp quy định tại điểm h khoản 8 Điều 10 của Luật Tổ chức Chính phủ thì áp dụng theo quy định của Luật Thủ đô, nghị quyết của Quốc hội và giải pháp quy định tại điểm h khoản 8 Điều 10 của Luật Tổ chức Chính phủ. Trường hợp quy định tại Luật này ưu đãi hơn thì người nộp thuế được lựa chọn áp dụng mức ưu đãi có lợi nhất."},{"k":"p","t":"Luật này được Quốc hội nước Cộng hoà xã hội chủ nghĩa Việt Nam  khóa XV, Kỳ họp thứ 10 thông qua ngày 10 tháng 12 năm 2025."},{"k":"tbl","rows":[["","CHỦ TỊCH QUỐC HỘI\nTrần Thanh Mẫn"]]}]}],"refs":{"luat-109_1":[{"kind":"related","targetSlug":"luat-09","targetAnchor":"luat-09_1","label":"Luật 09/2026 — Sửa đổi Luật TNCN"},{"kind":"related","targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Quản lý thuế TNCN"},{"kind":"related","targetSlug":"tt152","targetAnchor":"tt152_1","label":"TT 152 — Kế toán hộ/cá nhân kinh doanh"},{"kind":"guidance","targetSlug":"nd253","targetAnchor":"nd253_1","label":"NĐ 253/2026 — Hướng dẫn chi tiết Luật Thuế TNCN"},{"kind":"related","targetSlug":"nq110","targetAnchor":"nq110_1","label":"NQ 110/2025 — Điều chỉnh mức giảm trừ gia cảnh"},{"kind":"guidance","targetSlug":"tt87","targetAnchor":"tt87_1","label":"TT 87/2026 — Hướng dẫn chi tiết Luật Thuế TNCN"}]},"details":{"luat-109_2":[{"match":"Người nộp thuế thu nhập cá nhân là cá nhân cư trú có thu nhập chịu thuế quy định tại","title":"Điều 2 — Người nộp thuế TNCN","summary":"Người nộp thuế TNCN gồm cá nhân cư trú (chịu thuế với thu nhập toàn cầu) và cá nhân không cư trú (chịu thuế với thu nhập phát sinh tại VN). Quản lý, kê khai theo Luật QLT 108.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Quản lý thuế TNCN"}]}],"luat-109_3":[{"match":"Thu nhập chịu thuế thu nhập cá nhân gồm các loại thu nhập sau đây","title":"Điều 3 — Thu nhập chịu thuế TNCN","summary":"10 loại thu nhập chịu thuế: tiền lương/công, kinh doanh, đầu tư vốn, chuyển nhượng vốn/BĐS, trúng thưởng, bản quyền, nhượng quyền, thừa kế, quà tặng — trừ thu nhập miễn thuế tại Điều 4.","links":[{"targetSlug":"luat-109","targetAnchor":"luat-109_4","label":"Luật 109 Điều 4 — Thu nhập được miễn thuế"},{"targetSlug":"luat-109","targetAnchor":"luat-109_8","label":"Luật 109 Điều 8 — TNCN từ tiền lương"}]}],"luat-109_4":[{"match":"Thu nhập từ chuyển nhượng, nhận thừa kế, quà tặng là bất động sản giữa vợ với chồng","title":"Điều 4 — Thu nhập được miễn thuế TNCN","summary":"Miễn thuế: chuyển nhượng/thừa kế/quà tặng BĐS giữa người thân ruột thịt, nhà ở duy nhất, lãi tiền gửi ngân hàng, thu nhập nông nghiệp của hộ trực tiếp sản xuất...","links":[{"targetSlug":"luat-109","targetAnchor":"luat-109_3","label":"Luật 109 Điều 3 — Thu nhập chịu thuế"}]}],"luat-109_8":[{"match":"Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của cá nhân cư trú được xác định","title":"Điều 8 — TNCN từ tiền lương, tiền công","summary":"Thuế = thu nhập tính thuế × thuế suất (biểu lũy tiến Điều 9). Thu nhập tính thuế = thu nhập chịu thuế − các khoản giảm trừ (gia cảnh, BHXH bắt buộc, từ thiện). <strong>Liên hệ TNDN:</strong> tiền lương là chi phí được trừ của DN (Luật 67 Điều 9).","links":[{"targetSlug":"luat-109","targetAnchor":"luat-109_9","label":"Luật 109 Điều 9 — Biểu thuế lũy tiến"},{"targetSlug":"luat-109","targetAnchor":"luat-109_10","label":"Luật 109 Điều 10 — Giảm trừ gia cảnh"},{"targetSlug":"luat-67","targetAnchor":"dieu-9","label":"Luật 67 Điều 9 — Tiền lương là chi phí được trừ"}]}],"luat-109_9":[{"match":"Biểu thuế luỹ tiến từng phần áp dụng đối với thu nhập tính thuế quy định tại","title":"Điều 9 — Biểu thuế lũy tiến từng phần","summary":"Áp dụng cho thu nhập từ tiền lương, tiền công với các bậc thuế suất lũy tiến. Thu nhập tính thuế xác định sau khi trừ giảm trừ gia cảnh (Điều 10).","links":[{"targetSlug":"luat-109","targetAnchor":"luat-109_8","label":"Luật 109 Điều 8 — TNCN từ tiền lương"},{"targetSlug":"luat-109","targetAnchor":"luat-109_10","label":"Luật 109 Điều 10 — Giảm trừ gia cảnh"}]}],"luat-109_10":[{"match":"Giảm trừ gia cảnh là số tiền được trừ vào thu nhập chịu thuế trước khi tính thuế","title":"Điều 10 — Giảm trừ gia cảnh","summary":"Gồm giảm trừ cho bản thân người nộp thuế và cho mỗi người phụ thuộc. Trừ vào thu nhập từ tiền lương/kinh doanh trước khi áp biểu thuế lũy tiến (Điều 9).","links":[{"targetSlug":"luat-109","targetAnchor":"luat-109_9","label":"Luật 109 Điều 9 — Biểu thuế lũy tiến"},{"targetSlug":"luat-109","targetAnchor":"luat-109_11","label":"Luật 109 Điều 11 — Giảm trừ đóng góp từ thiện"}]}],"luat-109_11":[{"match":"Cá nhân cư trú được giảm trừ vào thu nhập chịu thuế trước khi tính thuế đối với thu nhập từ tiền lương","title":"Điều 11 — Giảm trừ đóng góp từ thiện, nhân đạo","summary":"Khoản đóng góp từ thiện, nhân đạo, khuyến học được trừ vào thu nhập chịu thuế từ tiền lương trước khi tính thuế (bổ sung cho giảm trừ gia cảnh Điều 10).","links":[{"targetSlug":"luat-109","targetAnchor":"luat-109_10","label":"Luật 109 Điều 10 — Giảm trừ gia cảnh"}]}],"luat-109_13":[{"match":"Thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng vốn của cá nhân cư trú được xác định bằng","title":"Điều 13 — TNCN từ chuyển nhượng vốn","summary":"Thuế TNCN từ chuyển nhượng vốn của cá nhân cư trú = thu nhập tính thuế × thuế suất. <strong>Liên hệ TNDN:</strong> với doanh nghiệp, chuyển nhượng vốn áp dụng Luật 67 Điều 3.2.a.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-3","label":"Luật 67 Điều 3 — TN chuyển nhượng vốn (với DN)"}]}]},"summaries":{"luat-109_2":{"tldr":"Người nộp thuế thu nhập cá nhân gồm cá nhân cư trú (chịu thuế với thu nhập phát sinh trong và ngoài lãnh thổ Việt Nam) và cá nhân không cư trú (chịu thuế với thu nhập phát sinh trong lãnh thổ Việt Nam).","points":["Cá nhân cư trú là người đáp ứng một trong các điều kiện: có mặt tại Việt Nam từ 183 ngày trở lên tính trong 01 năm dương lịch hoặc theo 12 tháng liên tục kể từ ngày đầu tiên có mặt; hoặc có nơi ở thường xuyên tại Việt Nam (nơi ở đăng ký thường trú hoặc có nhà thuê để ở theo hợp đồng thuê có thời hạn).","Cá nhân không cư trú là người không đáp ứng điều kiện của cá nhân cư trú.","Chính phủ quy định chi tiết Điều này."]},"luat-109_3":{"tldr":"Thu nhập chịu thuế thu nhập cá nhân gồm 10 loại thu nhập (trừ thu nhập được miễn thuế tại Điều 4).","points":["Thu nhập từ kinh doanh: sản xuất, kinh doanh hàng hóa, dịch vụ; hành nghề độc lập có giấy phép/chứng chỉ; đại lý, môi giới, hợp tác kinh doanh với tổ chức; kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số.","Thu nhập từ tiền lương, tiền công: gồm tiền lương, tiền công và các khoản có tính chất tiền lương; tiền thù lao, lợi ích bằng tiền/không bằng tiền; phụ cấp, trợ cấp, thu nhập khác (trừ các khoản phụ cấp, trợ cấp được liệt kê như ưu đãi người có công, quốc phòng an ninh, độc hại nguy hiểm, bảo hiểm xã hội, thôi việc, bảo trợ xã hội...).","Thu nhập từ đầu tư vốn (tiền lãi cho vay, lợi tức cổ phần, hình thức khác); từ chuyển nhượng vốn (phần vốn trong tổ chức kinh tế, chứng khoán, hình thức khác).","Thu nhập từ chuyển nhượng bất động sản; từ trúng thưởng (xổ số, khuyến mại, đặt cược, trò chơi/cuộc thi có thưởng, trừ trúng thưởng trong ca-si-no).","Thu nhập từ tiền bản quyền (chuyển giao, chuyển quyền sử dụng đối tượng quyền sở hữu trí tuệ; chuyển giao công nghệ); từ nhượng quyền thương mại; từ nhận thừa kế, quà tặng là chứng khoán, phần vốn, bất động sản và tài sản phải đăng ký.","Thu nhập khác: chuyển nhượng tên miền quốc gia \".vn\"; chuyển nhượng kết quả giảm phát thải khí nhà kính, tín chỉ các-bon; chuyển nhượng biển số xe trúng đấu giá; chuyển nhượng tài sản số; chuyển nhượng vàng miếng (Chính phủ quy định ngưỡng giá trị, thời điểm áp dụng và điều chỉnh thuế suất)."]},"luat-109_4":{"tldr":"Điều này liệt kê 21 nhóm thu nhập được miễn thuế thu nhập cá nhân; Chính phủ quy định chi tiết.","points":["Chuyển nhượng, nhận thừa kế, quà tặng là bất động sản giữa người thân theo quy định (vợ chồng; cha mẹ đẻ với con đẻ; cha mẹ nuôi với con nuôi; cha mẹ chồng/vợ với con dâu/rể; ông bà nội/ngoại với cháu; anh, chị, em ruột).","Chuyển nhượng nhà ở, quyền sử dụng đất ở và tài sản gắn liền với đất ở khi cá nhân chỉ có một nhà ở, đất ở duy nhất tại Việt Nam; giá trị quyền sử dụng đất được Nhà nước giao; chuyển đổi đất nông nghiệp được Nhà nước giao để sản xuất.","Thu nhập của hộ gia đình, cá nhân trực tiếp sản xuất nông nghiệp, lâm nghiệp, chăn nuôi, thủy sản chưa qua chế biến hoặc chỉ sơ chế thông thường; sản xuất muối; lợi tức cổ phần thành viên hợp tác xã nông nghiệp, nông dân ký hợp đồng \"Cánh đồng lớn\", trồng rừng sản xuất, nuôi trồng thủy sản.","Lãi trái phiếu chính phủ/chính quyền địa phương, lãi tiền gửi tổ chức tín dụng, lãi hợp đồng bảo hiểm nhân thọ; kiều hối; tiền lương làm đêm, làm thêm giờ, tiền lương ngày không nghỉ phép; lương hưu do Quỹ BHXH chi trả và quỹ hưu trí bổ sung/tự nguyện chi trả.","Học bổng từ ngân sách nhà nước hoặc từ tổ chức trong/ngoài nước theo chương trình khuyến học; bồi thường bảo hiểm, tai nạn lao động, bồi thường nhà nước; thu nhập từ tổ chức/quỹ từ thiện và viện trợ nước ngoài vì mục đích từ thiện, nhân đạo.","Tiền lương, tiền công của thuyền viên Việt Nam làm cho hãng tàu nước ngoài/hãng tàu Việt Nam vận tải quốc tế; thu nhập từ khai thác, đánh bắt thủy sản xa bờ; thu nhập về khoa học, công nghệ và đổi mới sáng tạo, tín chỉ các-bon, trái phiếu xanh, khởi nghiệp sáng tạo, ODA/phi chính phủ; và thu nhập sau thuế TNDN của chủ doanh nghiệp tư nhân, chủ công ty TNHH một thành viên."]},"luat-109_5":{"tldr":"Điều này quy định các trường hợp miễn, giảm thuế khác; Chính phủ quy định chi tiết.","points":["Người nộp thuế gặp khó khăn do thiên tai, dịch bệnh, hỏa hoạn, tai nạn, bệnh hiểm nghèo ảnh hưởng khả năng nộp thuế được giảm thuế tương ứng mức độ thiệt hại nhưng không vượt quá số thuế phải nộp.","Miễn thuế trong thời hạn 05 năm với tiền lương, tiền công của nhân lực công nghiệp công nghệ số chất lượng cao thuộc các trường hợp: dự án trong khu công nghệ số tập trung; dự án nghiên cứu phát triển, sản xuất sản phẩm công nghệ số trọng điểm, chip bán dẫn, hệ thống trí tuệ nhân tạo; hoạt động đào tạo nhân lực công nghiệp công nghệ số.","Miễn thuế trong thời hạn 05 năm với tiền lương, tiền công của nhân lực công nghệ cao thực hiện nghiên cứu phát triển công nghệ cao/công nghệ chiến lược thuộc danh mục theo quy định pháp luật về công nghệ cao.","Miễn thuế với chuyển nhượng chứng chỉ quỹ mở (theo pháp luật chứng khoán) được nắm giữ từ 02 năm trở lên kể từ ngày mua.","Giảm 50% thuế đối với lợi tức của nhà đầu tư cá nhân được chia từ quỹ đầu tư chứng khoán, quỹ đầu tư bất động sản (theo Luật Chứng khoán) trong thời hạn do Chính phủ quy định."]},"luat-109_6":{"tldr":"Căn cứ Luật này, Chính phủ quy định các nội dung quản lý thuế thu nhập cá nhân phù hợp với Luật Quản lý thuế.","points":["Kỳ tính thuế theo năm đối với thu nhập từ kinh doanh, tiền lương, tiền công của cá nhân cư trú; kỳ tính thuế theo từng lần phát sinh đối với các khoản thu nhập khác của cá nhân cư trú và cá nhân không cư trú.","Thời điểm xác định thu nhập tính thuế; quyết toán thuế.","Hoàn thuế khi số thuế đã nộp lớn hơn số phải nộp hoặc chưa đến mức phải nộp.","Trách nhiệm khấu trừ, khai thay, nộp thay cho người nộp thuế."]},"luat-109_7":{"tldr":"Quy định cách tính thuế thu nhập cá nhân với thu nhập từ kinh doanh của cá nhân cư trú: doanh thu năm từ 500 triệu đồng trở xuống không phải nộp thuế; trên mức đó tính theo thu nhập tính thuế nhân thuế suất hoặc theo doanh thu nhân thuế suất.","points":["Cá nhân cư trú có doanh thu năm từ 500 triệu đồng trở xuống không phải nộp thuế (Chính phủ trình Ủy ban Thường vụ Quốc hội điều chỉnh mức theo từng thời kỳ).","Tính theo thu nhập tính thuế (doanh thu trừ chi phí) nhân thuế suất: trên mức tại khoản 1 đến 03 tỷ đồng: 15%; trên 03 tỷ đến 50 tỷ đồng: 17%; trên 50 tỷ đồng: 20%.","Cá nhân có doanh thu trên mức tại khoản 1 đến 03 tỷ đồng được chọn nộp theo thu nhập tính thuế hoặc theo thuế suất nhân doanh thu tính thuế (phần doanh thu vượt trên mức tại khoản 1).","Thuế suất trên doanh thu tính thuế: phân phối, cung cấp hàng hóa 0,5%; dịch vụ, xây dựng không bao thầu nguyên vật liệu 2% (riêng cho thuê tài sản, đại lý bảo hiểm/xổ số/bán hàng đa cấp 5%); sản xuất, vận tải, dịch vụ gắn với hàng hóa, xây dựng có bao thầu 1,5%; nội dung thông tin số (giải trí, trò chơi điện tử, phim/ảnh/nhạc số, quảng cáo số) 5%; kinh doanh khác 1%.","Cá nhân cho thuê bất động sản (trừ kinh doanh lưu trú) nộp thuế bằng phần doanh thu vượt trên mức tại khoản 1 nhân thuế suất 5%."]},"luat-109_8":{"tldr":"Thuế thu nhập cá nhân với tiền lương, tiền công của cá nhân cư trú bằng thu nhập tính thuế nhân Biểu thuế lũy tiến từng phần tại Điều 9, không phân biệt nơi trả thu nhập.","points":["Thu nhập tính thuế = tổng thu nhập chịu thuế tại khoản 2 Điều 3 trong kỳ trừ các khoản đóng bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm trách nhiệm nghề nghiệp bắt buộc, đóng góp bảo hiểm hưu trí bổ sung, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ (không vượt mức Chính phủ quy định) và các khoản giảm trừ tại Điều 10, Điều 11.","Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân trả thu nhập hoặc thời điểm người nộp thuế nhận được thu nhập."]},"luat-109_9":{"tldr":"Biểu thuế lũy tiến từng phần áp dụng cho thu nhập tính thuế tại khoản 2 Điều 8, gồm 5 bậc với thuế suất từ 5% đến 35%.","points":["Bậc 1: đến 120 triệu đồng/năm (đến 10 triệu đồng/tháng): thuế suất 5%.","Bậc 2: trên 120 đến 360 triệu đồng/năm (trên 10 đến 30 triệu đồng/tháng): 10%.","Bậc 3: trên 360 đến 720 triệu đồng/năm (trên 30 đến 60 triệu đồng/tháng): 20%.","Bậc 4: trên 720 đến 1.200 triệu đồng/năm (trên 60 đến 100 triệu đồng/tháng): 30%.","Bậc 5: trên 1.200 triệu đồng/năm (trên 100 triệu đồng/tháng): 35%."]},"luat-109_10":{"tldr":"Giảm trừ gia cảnh là số tiền được trừ vào thu nhập chịu thuế trước khi tính thuế đối với tiền lương, tiền công của cá nhân cư trú, gồm mức cho người nộp thuế và cho người phụ thuộc.","points":["Mức giảm trừ cho người nộp thuế: 15,5 triệu đồng/tháng (186 triệu đồng/năm); cho mỗi người phụ thuộc: 6,2 triệu đồng/tháng.","Căn cứ biến động giá cả, thu nhập, Chính phủ trình Ủy ban Thường vụ Quốc hội quy định mức giảm trừ phù hợp từng thời kỳ.","Mỗi người phụ thuộc chỉ được tính giảm trừ một lần vào một người nộp thuế.","Người phụ thuộc gồm: con chưa thành niên, con mất năng lực hành vi dân sự/khuyết tật/không có khả năng lao động; và cá nhân không có thu nhập hoặc thu nhập không vượt mức do Bộ trưởng Bộ Tài chính quy định (con thành niên đang học đại học, cao đẳng, trung học chuyên nghiệp/học nghề; vợ/chồng không có khả năng lao động; bố mẹ đã hết tuổi lao động hoặc không có khả năng lao động; người khác không nơi nương tựa phải trực tiếp nuôi dưỡng)."]},"luat-109_11":{"tldr":"Cá nhân cư trú được giảm trừ vào thu nhập chịu thuế trước khi tính thuế đối với tiền lương, tiền công các khoản đóng góp từ thiện, nhân đạo và khoản chi y tế, giáo dục - đào tạo.","points":["Khoản đóng góp từ thiện, nhân đạo gồm: đóng góp vào tổ chức, cơ sở chăm sóc, nuôi dưỡng trẻ em hoàn cảnh đặc biệt khó khăn, người khuyết tật, người già không nơi nương tựa; quỹ từ thiện, quỹ nhân đạo, quỹ khuyến học; tổ chức có chức năng huy động tài trợ thành lập theo pháp luật.","Tổ chức, cơ sở, quỹ nêu trên phải được cơ quan nhà nước có thẩm quyền cho phép thành lập hoặc công nhận, hoạt động vì mục đích từ thiện, nhân đạo, khuyến học, không vì mục tiêu lợi nhuận.","Khoản chi cho y tế, giáo dục - đào tạo của người nộp thuế và người phụ thuộc được giảm trừ theo mức do Chính phủ quy định.","Các khoản chi phải đáp ứng điều kiện về hóa đơn, chứng từ theo quy định và không được chi trả từ các nguồn khác."]},"luat-109_12":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ đầu tư vốn của cá nhân cư trú bằng thu nhập tính thuế nhân thuế suất 5%.","points":["Thu nhập tính thuế là tổng các khoản thu nhập chịu thuế từ đầu tư vốn (khoản 3 Điều 3) nhận được theo từng lần phát sinh.","Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân trả thu nhập hoặc thời điểm người nộp thuế nhận được thu nhập."]},"luat-109_13":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ chuyển nhượng vốn của cá nhân cư trú tính theo từng lần chuyển nhượng, với mức thuế khác nhau cho chuyển nhượng vốn và chuyển nhượng chứng khoán.","points":["Chuyển nhượng vốn: thu nhập tính thuế (giá chuyển nhượng trừ giá mua và chi phí hợp lý) nhân thuế suất 20% theo từng lần chuyển nhượng.","Trường hợp không xác định được giá mua và chi phí liên quan: thuế = giá chuyển nhượng nhân thuế suất 2%.","Chuyển nhượng chứng khoán: thuế = giá chuyển nhượng nhân thuế suất 0,1% theo từng lần chuyển nhượng.","Thời điểm xác định thu nhập tính thuế là thời điểm giao dịch hoàn thành theo quy định của pháp luật."]},"luat-109_14":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ chuyển nhượng bất động sản của cá nhân cư trú bằng giá chuyển nhượng nhân thuế suất 2%.","points":["Thời điểm xác định thu nhập tính thuế là thời điểm hợp đồng chuyển nhượng có hiệu lực theo quy định pháp luật hoặc thời điểm đăng ký quyền sử dụng, quyền sở hữu bất động sản.","Chính phủ quy định chi tiết Điều này."]},"luat-109_15":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ trúng thưởng của cá nhân cư trú bằng thu nhập tính thuế nhân thuế suất 10%.","points":["Thu nhập tính thuế là phần giá trị giải thưởng vượt trên 20 triệu đồng nhận được theo từng lần trúng thưởng.","Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế."]},"luat-109_16":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ tiền bản quyền của cá nhân cư trú bằng thu nhập tính thuế nhân thuế suất 5%.","points":["Thu nhập tính thuế là phần thu nhập vượt trên 20 triệu đồng nhận được khi chuyển giao, chuyển quyền sử dụng đối tượng của quyền sở hữu trí tuệ, chuyển giao công nghệ theo từng hợp đồng.","Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế."]},"luat-109_17":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ nhượng quyền thương mại của cá nhân cư trú bằng thu nhập tính thuế nhân thuế suất 5%.","points":["Thu nhập tính thuế là phần thu nhập vượt trên 20 triệu đồng nhận được theo từng hợp đồng nhượng quyền thương mại.","Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân trả thu nhập cho người nộp thuế."]},"luat-109_18":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ nhận thừa kế, quà tặng của cá nhân cư trú bằng thu nhập tính thuế nhân thuế suất 10%.","points":["Thu nhập tính thuế là phần giá trị tài sản thừa kế, quà tặng vượt trên 20 triệu đồng nhận được theo từng lần phát sinh.","Thời điểm xác định thu nhập tính thuế: với thừa kế là thời điểm người nộp thuế nhận được thừa kế; với quà tặng là thời điểm tổ chức, cá nhân tặng cho người nộp thuế hoặc thời điểm người nộp thuế nhận được thu nhập."]},"luat-109_19":{"tldr":"Thuế thu nhập cá nhân với thu nhập khác của cá nhân cư trú được tính theo hai cách tùy loại thu nhập tại khoản 10 Điều 3.","points":["Thu nhập khác tại các điểm a, b và c khoản 10 Điều 3: thu nhập tính thuế (phần vượt trên 20 triệu đồng theo từng lần phát sinh) nhân thuế suất 5%.","Thu nhập khác tại điểm d và điểm đ khoản 10 Điều 3: giá chuyển nhượng nhân thuế suất 0,1%.","Thời điểm xác định thu nhập tính thuế là thời điểm tổ chức, cá nhân chi trả thu nhập hoặc thời điểm người nộp thuế nhận được thu nhập."]},"luat-109_20":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ kinh doanh của cá nhân không cư trú bằng doanh thu nhân thuế suất tương ứng theo từng loại hoạt động.","points":["Doanh thu là toàn bộ tiền bán hàng, gia công, cung ứng dịch vụ kể cả trợ giá, phụ thu, phụ trội, không phân biệt đã thu được tiền hay chưa, bao gồm cả chi phí do bên mua trả thay mà không được hoàn trả.","Nếu hợp đồng không bao gồm thuế thu nhập cá nhân thì doanh thu tính thuế phải quy đổi là toàn bộ số tiền cá nhân không cư trú nhận được từ cung cấp hàng hóa, dịch vụ tại Việt Nam.","Thuế suất: phân phối, cung cấp hàng hóa 1%; dịch vụ, xây dựng không bao thầu nguyên vật liệu 5%; sản xuất, vận tải, dịch vụ gắn với hàng hóa, xây dựng có bao thầu 2%; nội dung thông tin số (giải trí, trò chơi điện tử, phim/ảnh/nhạc số, quảng cáo) 5%; kinh doanh khác 2%."]},"luat-109_21":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ tiền lương, tiền công của cá nhân không cư trú bằng tổng tiền lương, tiền công nhận được do thực hiện công việc tại Việt Nam nhân thuế suất 20%, không phân biệt nơi trả thu nhập.","points":[]},"luat-109_23":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ chuyển nhượng vốn của cá nhân không cư trú tính theo từng lần phát sinh, không phân biệt chuyển nhượng tại Việt Nam hay nước ngoài.","points":["Chuyển nhượng vốn: thu nhập tính thuế (giá chuyển nhượng trừ giá mua và chi phí hợp lý liên quan đến phần vốn tại tổ chức, cá nhân Việt Nam) nhân thuế suất 20% theo từng lần phát sinh.","Trường hợp không xác định được giá mua và chi phí liên quan: thuế = giá chuyển nhượng phần vốn tại tổ chức, cá nhân Việt Nam nhân thuế suất 2%.","Chuyển nhượng chứng khoán: thuế = giá chuyển nhượng nhân thuế suất 0,1%.","Chính phủ quy định chi tiết Điều này."]},"luat-109_25":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ tiền bản quyền và nhượng quyền thương mại của cá nhân không cư trú đều bằng phần thu nhập vượt trên 20 triệu đồng nhân thuế suất 5%.","points":["Tiền bản quyền: phần thu nhập vượt trên 20 triệu đồng theo từng hợp đồng chuyển giao, chuyển quyền sử dụng đối tượng quyền sở hữu trí tuệ, chuyển giao công nghệ tại Việt Nam nhân thuế suất 5%.","Nhượng quyền thương mại: phần thu nhập vượt trên 20 triệu đồng theo từng hợp đồng nhượng quyền thương mại tại Việt Nam nhân thuế suất 5%."]},"luat-109_26":{"tldr":"Thuế thu nhập cá nhân với thu nhập từ trúng thưởng, nhận thừa kế, quà tặng của cá nhân không cư trú bằng phần giá trị vượt trên 20 triệu đồng theo từng lần trúng thưởng, nhận thừa kế, quà tặng tại Việt Nam nhân thuế suất 10%.","points":[]},"luat-109_27":{"tldr":"Thuế thu nhập cá nhân với thu nhập khác của cá nhân không cư trú được tính theo hai cách tùy loại thu nhập tại khoản 10 Điều 3.","points":["Thu nhập khác tại các điểm a, b và c khoản 10 Điều 3: thu nhập tính thuế (phần vượt trên 20 triệu đồng theo từng lần phát sinh) nhân thuế suất 5%.","Thu nhập khác tại điểm d và điểm đ khoản 10 Điều 3: giá chuyển nhượng nhân thuế suất 0,1%.","Chính phủ quy định chi tiết Điều này."]},"luat-109_28":{"tldr":"Điều này quy định thời điểm xác định thu nhập tính thuế đối với các khoản thu nhập của cá nhân không cư trú theo từng điều tương ứng.","points":["Với thu nhập tại Điều 20: thời điểm cá nhân không cư trú nhận được thu nhập hoặc thời điểm xuất hóa đơn bán hàng hóa, cung cấp dịch vụ.","Với thu nhập tại các Điều 21, 22, 25, 26 và 27: thời điểm tổ chức, cá nhân tại Việt Nam trả thu nhập hoặc thời điểm cá nhân không cư trú nhận được thu nhập.","Với thu nhập tại Điều 23: thời điểm giao dịch hoàn thành theo quy định của pháp luật.","Với thu nhập tại Điều 24: thời điểm hợp đồng chuyển nhượng có hiệu lực hoặc thời điểm đăng ký quyền sử dụng, quyền sở hữu bất động sản."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
