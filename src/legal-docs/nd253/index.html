"content":[{"k":"p","t":"Nghị định này áp dụng đối với người nộp thuế, cơ quan thuế và các tổ chức, cá nhân khác có liên quan đến nội dung quy định tại Điều 1 của Nghị định này."}]},{"id":"nd253_3","no":3,"code":"Điều 3","title":"Điều 3. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thu nhập cá nhân là cá nhân cư trú có thu nhập chịu thuế quy định tại Điều 3 của Luật Thuế thu nhập cá nhân phát sinh trong và ngoài lãnh thổ Việt Nam và cá nhân không cư trú có thu nhập chịu thuế quy định tại Điều 3 của Luật Thuế thu nhập cá nhân phát sinh trong lãnh thổ Việt Nam."},{"k":"p","t":"2. Việc xác định cá nhân cư trú và cá nhân không cư trú thực hiện theo quy định tại Điều 4 và Điều 5 của Nghị định này."}]},{"id":"nd253_4","no":4,"code":"Điều 4","title":"Điều 4. Cá nhân cư trú","shortTitle":"Cá nhân cư trú","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Cá nhân cư trú là cá nhân đáp ứng một trong các điều kiện theo quy định tại khoản 2 Điều 2 của Luật Thuế thu nhập cá nhân và được quy định chi tiết như sau:"},{"k":"p","t":"1. Có mặt tại Việt Nam từ 183 ngày trở lên tính trong một năm dương lịch hoặc trong 12 tháng liên tục kể từ ngày đầu tiên có mặt tại Việt Nam. Trong đó, đối với cá nhân nhập cảnh, xuất cảnh, ngày đến được tính là một ngày, ngày đi được tính là một ngày, trường hợp nhập cảnh và xuất cảnh trong cùng một ngày thì được tính chung là một ngày cư trú. Ngày đến và ngày đi được căn cứ vào chứng thực của cơ quan quản lý xuất nhập cảnh trên hộ chiếu, giấy thông hành hoặc các tài liệu liên quan tới mục đích nhập cảnh, xuất cảnh của cá nhân khi đến và khi rời Việt Nam."},{"k":"p","t":"Cá nhân có mặt tại Việt Nam theo quy định tại khoản này là sự hiện diện của cá nhân đó trên lãnh thổ Việt Nam."},{"k":"p","t":"2. Có nơi ở thường xuyên tại Việt Nam theo một trong hai trường hợp sau:"},{"k":"p","t":"a) Có nơi ở đăng ký thường trú, cụ thể như sau:"},{"k":"p","t":"Đối với công dân Việt Nam: là nơi cá nhân sinh sống thường xuyên, ổn định không có thời hạn tại một chỗ ở nhất định và đã đăng ký thường trú theo quy định của pháp luật về cư trú."},{"k":"p","t":"Đối với người nước ngoài: là nơi ở thường trú ghi trong Thẻ thường trú hoặc nơi ở tạm trú khai khi đề nghị đăng ký cấp Thẻ tạm trú do cơ quan có thẩm quyền thuộc Bộ Công an cấp;"},{"k":"p","t":"b) Có nhà thuê để ở tại Việt Nam theo quy định của pháp luật về nhà ở, với thời hạn của các hợp đồng thuê từ 183 ngày trở lên trong năm tính thuế, cụ thể như sau:"},{"k":"p","t":"Cá nhân chưa hoặc không có nơi ở thường xuyên theo hướng dẫn tại điểm a khoản này nhưng có tổng số ngày thuê nhà để ở theo các hợp đồng thuê từ 183 ngày trở lên trong năm tính thuế cũng được xác định là cá nhân cư trú, kể cả trường hợp thuê nhà ở nhiều nơi. Nhà thuê để ở bao gồm cả trường hợp ở khách sạn, ở nhà khách, nhà nghỉ, nhà trọ, ở nơi làm việc, ở trụ sở cơ quan không phân biệt cá nhân tự thuê hay người sử dụng lao động thuê cho người lao động."},{"k":"p","t":"3. Trường hợp cá nhân có nơi ở thường xuyên tại Việt Nam theo quy định tại khoản 2 Điều này nhưng thực tế có mặt tại Việt Nam dưới 183 ngày trong năm tính thuế mà cá nhân không chứng minh được là cá nhân cư trú của nước nào thì cá nhân đó là cá nhân cư trú tại Việt Nam."},{"k":"p","t":"Việc chứng minh là đối tượng cư trú của nước khác được căn cứ vào Giấy chứng nhận cư trú. Trường hợp cá nhân thuộc nước hoặc vùng lãnh thổ đã ký kết Hiệp định tránh đánh thuế hai lần và ngăn ngừa việc trốn lậu thuế với Việt Nam không có quy định cấp Giấy chứng nhận cư trú thì cá nhân cung cấp bản chụp Hộ chiếu để chứng minh thời gian cư trú."}]},{"id":"nd253_5","no":5,"code":"Điều 5","title":"Điều 5. Cá nhân không cư trú","shortTitle":"Cá nhân không cư trú","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Cá nhân không cư trú theo quy định tại khoản 3 Điều 2 của Luật Thuế thu nhập cá nhân là người không đáp ứng điều kiện quy định tại Điều 4 của Nghị định này."}]},{"id":"nd253_6","no":6,"code":"Điều 6","title":"Điều 6. Thu nhập chịu thuế","shortTitle":"Thu nhập chịu thuế","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Thu nhập chịu thuế của cá nhân gồm các loại thu nhập quy định tại các Điều 7, 8, 9, 10, 11, 12, 13, 14, 15 và 16 của Nghị định này, trừ thu nhập được miễn thuế quy định tại Mục 1 Chương III của Nghị định này."},{"k":"p","t":"2. Phạm vi xác định thu nhập chịu thuế của cá nhân cư trú và không cư trú được quy định như sau:"},{"k":"p","t":"a) Đối với cá nhân cư trú, thu nhập chịu thuế là thu nhập phát sinh trong và ngoài lãnh thổ Việt Nam, không phân biệt nơi trả và nhận thu nhập;"},{"k":"p","t":"b) Đối với cá nhân không cư trú, thu nhập chịu thuế là thu nhập phát sinh trong lãnh thổ Việt Nam, không phân biệt nơi trả và nhận thu nhập."},{"k":"p","t":"3. Đối với các nước mà nước Cộng hòa xã hội chủ nghĩa Việt Nam đã ký Hiệp định tránh đánh thuế hai lần và ngăn ngừa việc trốn lậu thuế thì được trừ số thuế thu nhập cá nhân đã nộp tại nước ngoài vào số thuế thu nhập cá nhân phải nộp ở Việt Nam theo quy định của Hiệp định."}]},{"id":"nd253_7","no":7,"code":"Điều 7","title":"Điều 7. Thu nhập từ kinh doanh","shortTitle":"Thu nhập từ kinh doanh","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ kinh doanh quy định tại khoản 1 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Thu nhập từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ theo quy định của pháp luật. Riêng đối với thu nhập từ hoạt động của hộ gia đình, cá nhân trực tiếp sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa qua chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường, sản xuất muối chỉ áp dụng đối với trường hợp không đủ điều kiện được miễn thuế quy định tại Điều 21 của Nghị định này."},{"k":"p","t":"2. Thu nhập từ hoạt động hành nghề độc lập của cá nhân có giấy phép hoặc chứng chỉ hành nghề và có đăng ký kinh doanh theo quy định của pháp luật."},{"k":"p","t":"3. Thu nhập từ hoạt động đại lý, kể cả đại lý bảo hiểm, đại lý xổ số, đại lý bán hàng đa cấp."},{"k":"p","t":"4. Thu nhập từ hoạt động môi giới theo quy định của pháp luật."},{"k":"p","t":"5. Thu nhập từ hoạt động hợp tác kinh doanh với tổ chức, doanh nghiệp."},{"k":"p","t":"6. Thu nhập từ hoạt động kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số."}]},{"id":"nd253_8","no":8,"code":"Điều 8","title":"Điều 8. Thu nhập từ tiền lương, tiền công","shortTitle":"Thu nhập từ tiền lương, tiền công","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ tiền lương, tiền công quy định tại khoản 2 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Tiền lương, tiền công và các khoản có tính chất tiền lương, tiền công mà người lao động nhận được từ người sử dụng lao động dưới mọi hình thức bằng tiền hoặc không bằng tiền."},{"k":"p","t":"2. Tiền thù lao, các khoản lợi ích bằng tiền hoặc không bằng tiền mà cá nhân nhận được từ tổ chức, cá nhân, người sử dụng lao động dưới mọi hình thức:"},{"k":"p","t":"a) Tiền tham gia đề tài, dự án, đề án; tiền nhuận bút theo quy định của pháp luật về chế độ nhuận bút; tiền tham gia các hoạt động giảng dạy; tiền tham gia biểu diễn văn hóa, nghệ thuật, thể dục, thể thao;"},{"k":"p","t":"b) Tiền nhận được từ tham gia hội đồng quản trị, ban kiểm soát, hội đồng quản lý, các hiệp hội, hội nghề nghiệp, các hội được thành lập theo quy định của pháp luật và các tổ chức khác;"},{"k":"p","t":"c) Tiền thù lao nhận được từ cung cấp dịch vụ của cá nhân không đăng ký kinh doanh, không đăng ký thuế cho hoạt động kinh doanh, kể cả có hay không có giấy phép hoặc chứng chỉ hành nghề;"},{"k":"p","t":"d) Phí hội viên và các khoản chi phí dịch vụ khác phục vụ cho cá nhân để chăm sóc sức khỏe, vui chơi, thể thao, giải trí, thẩm mỹ. Trường hợp các dịch vụ này được sử dụng chung, không ghi tên cá nhân hoặc nhóm cá nhân sử dụng tại phiếu hoặc thẻ hội viên thì không tính vào thu nhập chịu thuế;"},{"k":"p","t":"đ) Phần khoán chi văn phòng phẩm, công tác phí, điện thoại, trang phục phục vụ công việc của cá nhân cao hơn mức quy định sau đây:"},{"k":"p","t":"Đối với cán bộ, công chức, viên chức và người làm việc trong các cơ quan hành chính nhà nước, đơn vị sự nghiệp, Đảng, đoàn thể, hội, hiệp hội: mức khoán chi áp dụng theo văn bản của cơ quan nhà nước có thẩm quyền hoặc theo quy chế của cơ quan, tổ chức đó."},{"k":"p","t":"Đối với người lao động làm việc trong các doanh nghiệp, tổ chức khác có hoạt động sản xuất, kinh doanh: mức khoán chi áp dụng phù hợp với việc xác định chi phí được trừ khi tính thuế thu nhập doanh nghiệp theo pháp luật về thuế thu nhập doanh nghiệp."},{"k":"p","t":"Đối với người lao động làm việc trong các tổ chức quốc tế, các văn phòng đại diện của tổ chức nước ngoài: mức khoán chi thực hiện theo quy định của tổ chức quốc tế, văn phòng đại diện của tổ chức nước ngoài;"},{"k":"p","t":"e) Khoản tiền do người sử dụng lao động đóng góp tham gia bảo hiểm hưu trí bổ sung theo quy định của Luật Bảo hiểm xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ cho người lao động;"},{"k":"p","t":"g) Khoản tiền ăn giữa ca, ăn trưa do người sử dụng lao động chi cho người lao động vượt quá 1,2 triệu đồng/người/tháng. Trường hợp người sử dụng lao động tổ chức bữa ăn giữa ca, ăn trưa cho người lao động dưới các hình thức như trực tiếp nấu ăn, mua suất ăn, cấp phiếu ăn thì không tính vào thu nhập chịu thuế của cá nhân;"},{"k":"p","t":"h) Tiền nhà ở, điện, nước và các dịch vụ kèm theo (nếu có)"},{"k":"p","t":"Trường hợp người lao động được hưởng lợi ích từ nhà ở do người sử dụng lao động xây cho người lao động đang làm việc tại đơn vị thì không tính vào thu nhập chịu thuế thu nhập cá nhân của người lao động đối với khoản lợi ích này, bao gồm cả tiền điện, nước và các dịch vụ kèm theo (nếu có)."},{"k":"p","t":"Trường hợp tiền thuê nhà ở, điện, nước và các dịch vụ kèm theo (nếu có) do người sử dụng lao động trả thay thì tính vào thu nhập chịu thuế của cá nhân theo số thực tế trả thay nhưng không vượt quá 15% tổng thu nhập chịu thuế của người lao động phát sinh tại đơn vị chưa bao gồm tiền thuê nhà, điện nước và dịch vụ kèm theo (nếu có);"},{"k":"p","t":"i) Các khoản thưởng bằng tiền hoặc không bằng tiền, bao gồm cả thưởng bằng chứng khoán; thưởng từ cuộc thi, sự kiện do người sử dụng lao động tổ chức cho người lao động. Đối với các khoản thưởng không bằng tiền, việc quy đổi được thực hiện theo quy định tại Điều 17 của Nghị định này;"},{"k":"p","t":"k) Các khoản lợi ích khác mà người sử dụng lao động chi cho người lao động, bao gồm cả chi trong các ngày nghỉ, lễ; chi thuê các dịch vụ tư vấn, dịch vụ làm thủ tục về thuế cho đích danh một hoặc một nhóm cá nhân; chi thuê người giúp việc gia đình, lái xe, người làm các công việc khác trong gia đình theo hợp đồng."},{"k":"p","t":"3. Các khoản phụ cấp, trợ cấp, thu nhập khác, trừ các khoản sau:"},{"k":"p","t":"a) Trợ cấp, phụ cấp ưu đãi hàng tháng và trợ cấp một lần theo quy định của pháp luật về ưu đãi người có công;"},{"k":"p","t":"b) Trợ cấp hàng tháng, trợ cấp một lần đối với các đối tượng tham gia kháng chiến, bảo vệ tổ quốc, làm nhiệm vụ quốc tế, thanh niên xung phong đã hoàn thành nhiệm vụ;"},{"k":"p","t":"c) Trợ cấp, phụ cấp quốc phòng, an ninh; trợ cấp, phụ cấp đối với lực lượng vũ trang;"},{"k":"p","t":"d) Phụ cấp độc hại, nguy hiểm, bồi dưỡng bằng hiện vật đối với những ngành, nghề hoặc công việc ở nơi làm việc có yếu tố độc hại, nguy hiểm;"},{"k":"p","t":"đ) Phụ cấp thu hút, phụ cấp khu vực;"},{"k":"p","t":"e) Phụ cấp, trợ cấp, sinh hoạt phí do cơ quan Việt Nam ở nước ngoài chi trả cho thành viên cơ quan Việt Nam ở nước ngoài, phu nhân/phu quân và con đi theo thành viên cơ quan Việt Nam ở nước ngoài theo quy định của Luật Cơ quan đại diện nước Cộng hòa xã hội chủ nghĩa Việt Nam ở nước ngoài, Nghị định số 08/2019/NĐ-CP quy định một số chế độ đối với thành viên cơ quan Việt Nam ở nước ngoài và các văn bản sửa đổi, bổ sung hoặc thay thế;"},{"k":"p","t":"g) Trợ cấp tai nạn lao động, bệnh nghề nghiệp, trợ cấp một lần khi sinh con hoặc nhận nuôi con nuôi, trợ cấp do suy giảm khả năng lao động, trợ cấp hưu trí một lần, trợ cấp tuất hàng tháng và các khoản trợ cấp khác theo quy định của pháp luật về bảo hiểm xã hội;"},{"k":"p","t":"h) Trợ cấp khó khăn đột xuất, trợ cấp thất nghiệp, trợ cấp thôi việc, trợ cấp mất việc làm theo quy định của pháp luật."},{"k":"p","t":"Trường hợp tổ chức, doanh nghiệp có quy định cụ thể tại quy chế tài chính hoặc quy chế nội bộ hoặc hợp đồng lao động hoặc thỏa ước lao động về mức trợ cấp thôi việc, trợ cấp mất việc làm cao hơn mức quy định của pháp luật thì phần chi trả thực tế vượt mức này cũng không tính vào thu nhập chịu thuế của người lao động;"},{"k":"p","t":"i) Trợ cấp đối với các đối tượng được bảo trợ xã hội theo quy định của pháp luật về bảo trợ xã hội;"},{"k":"p","t":"k) Phụ cấp phục vụ đối với lãnh đạo cấp cao;"},{"k":"p","t":"l) Trợ cấp một lần đối với cá nhân khi chuyển công tác đến vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn, hỗ trợ một lần đối với cán bộ, công chức làm công tác về chủ quyền biển đảo theo quy định của pháp luật. Trợ cấp chuyển vùng một lần đối với người nước ngoài đến cư trú tại Việt Nam, người Việt Nam đi làm việc ở nước ngoài, người Việt Nam cư trú dài hạn ở nước ngoài về Việt Nam làm việc."},{"k":"p","t":"Riêng trợ cấp chuyển vùng một lần đối với người nước ngoài đến cư trú tại Việt Nam, người Việt Nam đi làm việc ở nước ngoài, người Việt Nam cư trú dài hạn ở nước ngoài về Việt Nam làm việc theo mức ghi tại quyết định hoặc văn bản điều động, luân chuyển, quy chế tài chính hoặc quy chế nội bộ hoặc hợp đồng lao động hoặc thỏa ước lao động;"},{"k":"p","t":"m) Phụ cấp đối với nhân viên y tế thôn, bản;"},{"k":"p","t":"n) Phụ cấp đặc thù ngành, nghề."},{"k":"p","t":"Các khoản phụ cấp, trợ cấp không tính vào thu nhập chịu thuế quy định tại khoản này phải được cơ quan nhà nước có thẩm quyền quy định theo pháp luật về ưu đãi người có công, quốc phòng, an ninh, ngoại giao, lao động, bảo hiểm xã hội, y tế, giáo dục - đào tạo và pháp luật liên quan khác. Trường hợp khoản phụ cấp, trợ cấp nhận được cao hơn mức phụ cấp, trợ cấp quy định thì phần vượt phải tính vào thu nhập chịu thuế thu nhập cá nhân của cá nhân, trừ quy định tại điểm h khoản này."},{"k":"p","t":"4. Các khoản thu nhập không mang tính chất tiền lương, tiền công không tính vào thu nhập chịu thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"a) Các khoản tiền thưởng kèm theo các danh hiệu được Nhà nước phong tặng; tiền thưởng kèm theo các danh hiệu thi đua, các hình thức khen thưởng theo quy định của pháp luật về thi đua khen thưởng; tiền thưởng kèm theo giải thưởng quốc gia, giải thưởng quốc tế được Nhà nước Việt Nam thừa nhận; tiền thưởng về cải tiến kỹ thuật, sáng chế, phát minh được cơ quan nhà nước có thẩm quyền công nhận; tiền thưởng về việc phát hiện, khai báo hành vi vi phạm pháp luật với cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"b) Khoản tiền hỗ trợ của người sử dụng lao động cho việc khám bệnh, chữa bệnh hiểm nghèo cho bản thân người lao động và thân nhân của người lao động bao gồm: con đẻ, con nuôi, con riêng của vợ hoặc chồng; vợ hoặc chồng; cha đẻ, mẹ đẻ; cha vợ, mẹ vợ (hoặc cha chồng, mẹ chồng); cha dượng, mẹ kế; cha nuôi, mẹ nuôi."},{"k":"p","t":"Mức hỗ trợ không tính vào thu nhập chịu thuế là số tiền người sử dụng lao động hỗ trợ thực tế theo hóa đơn, chứng từ nhưng tối đa không quá số tiền trả viện phí của người lao động và thân nhân người lao động sau khi đã trừ số tiền chi trả của tổ chức bảo hiểm (nếu có)."},{"k":"p","t":"Việc xác định bệnh hiểm nghèo theo quy định của Bộ trưởng Bộ Y tế;"},{"k":"p","t":"c) Khoản tiền nhận được theo chế độ liên quan đến sử dụng phương tiện đi lại trong cơ quan nhà nước, đơn vị sự nghiệp công lập, tổ chức Đảng, đoàn thể; phương tiện phục vụ đưa đón người lao động từ nơi ở đến nơi làm việc và ngược lại theo quy chế của đơn vị;"},{"k":"p","t":"d) Khoản tiền nhận được theo chế độ nhà ở công vụ theo quy định của pháp luật;"},{"k":"p","t":"đ) Các khoản nhận được ngoài tiền lương, tiền công do tham gia, phục vụ hoạt động Đảng, đoàn, Quốc hội hoặc xây dựng, tham gia ý kiến, thẩm định, thẩm tra các văn bản pháp luật, Nghị quyết, các báo cáo chính trị; tham gia các đoàn kiểm tra, giám sát; tiếp xúc cử tri, tiếp công dân; trang phục và các công việc khác có liên quan đến phục vụ trực tiếp hoạt động của Văn phòng Quốc hội, Hội đồng dân tộc và các Ủy ban của Quốc hội, các Đoàn đại biểu Quốc hội, Văn phòng Trung ương và các Ban của Đảng, Văn phòng Thành ủy, Tỉnh ủy và các Ban của Thành ủy, Tỉnh ủy;"},{"k":"p","t":"e) Khoản tiền mua vé máy bay do người sử dụng lao động trả thay (hoặc thanh toán) cho người lao động là người nước ngoài, người lao động là người Việt Nam làm việc ở nước ngoài về phép mỗi năm một lần từ Việt Nam đến quốc gia người nước ngoài mang quốc tịch hoặc quốc gia nơi gia đình người nước ngoài sinh sống và ngược lại, quốc gia nơi người Việt Nam đang làm việc về Việt Nam và ngược lại;"},{"k":"p","t":"g) Khoản tiền học phí cho con của người lao động nước ngoài học tại Việt Nam, con của người lao động Việt Nam đang làm việc ở nước ngoài học tại nước ngoài theo bậc học từ mầm non đến trung học phổ thông do người sử dụng lao động trả thay (hoặc thanh toán) cho người lao động;"},{"k":"p","t":"h) Khoản tiền do người sử dụng lao động mua cho người lao động sản phẩm bảo hiểm không bắt buộc và không có tích lũy về phí bảo hiểm, bao gồm cả các sản phẩm sức khỏe, bảo hiểm tử kỳ (không bao gồm sản phẩm bảo hiểm tử kỳ có hoàn phí) mà người tham gia bảo hiểm không nhận được tiền phí tích lũy từ việc tham gia bảo hiểm, ngoài khoản tiền bảo hiểm hoặc bồi thường theo thỏa thuận tại hợp đồng bảo hiểm do doanh nghiệp bảo hiểm trả."},{"k":"p","t":"Trường hợp mua bảo hiểm không bắt buộc và không có tích lũy về phí bảo hiểm của các doanh nghiệp bảo hiểm không thành lập và hoạt động theo pháp luật Việt Nam nhưng được phép bán bảo hiểm tại Việt Nam thì cũng không tính vào thu nhập chịu thuế thu nhập cá nhân quy định tại điểm này;"},{"k":"p","t":"i) Khoản chi do người sử dụng lao động trả thay tiền đào tạo nâng cao trình độ, tay nghề cho người lao động phù hợp với công việc chuyên môn, nghiệp vụ của người lao động hoặc theo kế hoạch của người sử dụng lao động;"},{"k":"p","t":"k) Các khoản thanh toán mà người sử dụng lao động trả cho nhà cung cấp hoặc cho người lao động để phục vụ việc điều động, luân chuyển, đi công tác của người lao động theo quy định tại quyết định hoặc văn bản điều động, luân chuyển, cử người lao động đi công tác, quy chế tài chính hoặc quy chế nội bộ hoặc hợp đồng lao động hoặc thỏa ước lao động và có hóa đơn, chứng từ theo quy định;"},{"k":"p","t":"l) Các khoản thu nhập của cá nhân nhận được từ các hội, tổ chức tài trợ trong trường hợp cá nhân là thành viên của hội, tổ chức đó khi tham gia sáng tác các tác phẩm văn học nghệ thuật để thực hiện nhiệm vụ chính trị của Nhà nước hoặc theo chương trình hoạt động phù hợp với điều lệ của hội, tổ chức và kinh phí tài trợ được sử dụng từ nguồn ngân sách nhà nước hoặc được quản lý theo quy định của Nhà nước;"},{"k":"p","t":"m) Khoản tiền nhận được từ người sử dụng lao động chi đám hiếu, hỉ cho bản thân và gia đình người lao động theo quy chế tài chính hoặc quy chế nội bộ hoặc hợp đồng lao động hoặc thỏa ước lao động của đơn vị trả thu nhập và phù hợp với mức được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp theo pháp luật về thuế thu nhập doanh nghiệp;"},{"k":"p","t":"n) Tiền và lợi ích nhận được từ nguồn tài chính công đoàn không mang tính chất tiền lương, tiền công theo quy định của Luật Công đoàn;"},{"k":"p","t":"o) Tiền chế độ dinh dưỡng, chế độ đặc thù chăm sóc bảo đảm sức khỏe và sinh lý phụ nữ theo quy định tại Điều 5 và Điều 8 của Nghị định số 349/2025/NĐ-CP quy định chế độ, chính sách đối với thành viên đội thể thao tham gia tập trung tập huấn, thi đấu."}]},{"id":"nd253_9","no":9,"code":"Điều 9","title":"Điều 9. Thu nhập từ đầu tư vốn","shortTitle":"Thu nhập từ đầu tư vốn","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ đầu tư vốn quy định tại khoản 3 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Tiền lãi nhận được từ việc cho các tổ chức, doanh nghiệp, hộ gia đình, cá nhân vay theo hợp đồng vay hoặc thỏa thuận vay."},{"k":"p","t":"2. Cổ tức nhận được từ việc góp vốn mua cổ phần; lợi tức nhận được do tham gia góp vốn vào công ty trách nhiệm hữu hạn, công ty hợp danh, hợp tác xã, liên hiệp hợp tác xã, liên doanh, hợp đồng hợp tác kinh doanh và các hình thức kinh doanh khác theo quy định của pháp luật; lợi tức nhận được do tham gia góp vốn vào tổ chức tín dụng; lợi tức nhận được do góp vốn vào quỹ đầu tư chứng khoán và quỹ đầu tư khác được thành lập và hoạt động theo quy định của pháp luật."},{"k":"p","t":"3. Thu nhập từ đầu tư vốn dưới các hình thức khác như:"},{"k":"p","t":"a) Phần tăng thêm của giá trị vốn góp nhận được khi giải thể doanh nghiệp, chuyển đổi mô hình hoạt động, chia, tách, sáp nhập, hợp nhất doanh nghiệp hoặc khi rút vốn;"},{"k":"p","t":"b) Thu nhập nhận được từ lãi trái phiếu, tín phiếu và các giấy tờ có giá khác do các tổ chức trong nước phát hành;"},{"k":"p","t":"c) Các khoản thu nhập nhận được từ đầu tư vốn dưới các hình thức khác theo quy định của pháp luật, kể cả trường hợp góp vốn đầu tư bằng hiện vật, quyền sử dụng đất, tài sản gắn liền với đất, quyền sở hữu trí tuệ, công nghệ và bí quyết kỹ thuật;"},{"k":"p","t":"d) Thu nhập từ cổ tức trả bằng cổ phiếu, cổ phiếu phát hành từ nguồn vốn chủ sở hữu cho cổ đông hiện hữu, thu nhập từ lợi tức ghi tăng vốn."}]},{"id":"nd253_10","no":10,"code":"Điều 10","title":"Điều 10. Thu nhập từ chuyển nhượng vốn","shortTitle":"Thu nhập từ chuyển nhượng vốn","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ chuyển nhượng vốn quy định tại khoản 4 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Thu nhập từ chuyển nhượng một phần hoặc toàn bộ số vốn góp trong công ty trách nhiệm hữu hạn, công ty hợp danh, hợp đồng hợp tác kinh doanh, hợp tác xã, liên hiệp hợp tác xã, quỹ tín dụng nhân dân, tổ chức khác."},{"k":"p","t":"2. Thu nhập từ chuyển nhượng chứng khoán là thu nhập từ chuyển nhượng cổ phiếu, quyền mua cổ phiếu; chuyển nhượng trái phiếu, tín phiếu, chứng chỉ quỹ và các loại chứng khoán khác theo quy định của pháp luật về chứng khoán; thu nhập từ chuyển nhượng cổ phiếu của các cá nhân trong công ty cổ phần theo quy định tại khoản 2 Điều 4 của Luật Chứng khoán và Điều 121 của Luật Doanh nghiệp."},{"k":"p","t":"3. Thu nhập khi góp vốn bằng phần vốn góp, chứng khoán để thành lập doanh nghiệp hoặc tăng vốn của doanh nghiệp theo quy định của pháp luật."},{"k":"p","t":"4. Thu nhập từ chuyển nhượng vốn dưới các hình thức khác, bao gồm cả trường hợp bán doanh nghiệp, chuyển nhượng quyền góp vốn và các hình thức chuyển nhượng vốn khác theo quy định của pháp luật."},{"k":"p","t":"5. Trường hợp bán toàn bộ doanh nghiệp tư nhân, công ty trách nhiệm hữu hạn một thành viên do một cá nhân làm chủ sở hữu dưới hình thức chuyển nhượng vốn có gắn với bất động sản thì được xác định là thu nhập từ hoạt động chuyển nhượng bất động sản."}]},{"id":"nd253_11","no":11,"code":"Điều 11","title":"Điều 11. Thu nhập từ chuyển nhượng bất động sản","shortTitle":"Thu nhập từ chuyển nhượng bất động sản","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ chuyển nhượng bất động sản quy định tại khoản 5 Điều 3 của Luật Thuế thu nhập cá nhân là thu nhập từ hoạt động chuyển nhượng, hoạt động ủy quyền mà người nhận ủy quyền có đầy đủ nội dung như quyền sở hữu đối với bất động sản theo quy định của pháp luật về dân sự được quy định cụ thể như sau:"},{"k":"p","t":"1. Thu nhập từ chuyển nhượng quyền sử dụng đất; thu nhập từ chuyển nhượng quyền sử dụng đất và tài sản gắn liền với đất, trong đó tài sản gắn liền với đất bao gồm:"},{"k":"p","t":"a) Nhà ở, kể cả nhà ở hình thành trong tương lai;"},{"k":"p","t":"b) Kết cấu hạ tầng và các công trình xây dựng gắn liền với đất, bao gồm cả công trình xây dựng hình thành trong tương lai theo pháp luật về kinh doanh bất động sản;"},{"k":"p","t":"c) Các tài sản là sản phẩm nông nghiệp, lâm nghiệp, ngư nghiệp gắn liền với đất."},{"k":"p","t":"2. Thu nhập từ chuyển nhượng quyền sở hữu hoặc sử dụng nhà ở, bao gồm cả nhà ở hình thành trong tương lai theo pháp luật về kinh doanh bất động sản."},{"k":"p","t":"3. Thu nhập từ chuyển nhượng quyền thuê đất trong hợp đồng thuê đất (bao gồm cả đất có mặt nước), quyền thuê mặt nước."},{"k":"p","t":"4. Các khoản thu nhập khác nhận được từ chuyển nhượng bất động sản dưới mọi hình thức, bao gồm cả thu nhập khi góp vốn bằng bất động sản để thành lập doanh nghiệp hoặc tăng vốn của doanh nghiệp theo quy định của pháp luật."}]},{"id":"nd253_12","no":12,"code":"Điều 12","title":"Điều 12. Thu nhập từ trúng thưởng","shortTitle":"Thu nhập từ trúng thưởng","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ trúng thưởng quy định tại khoản 6 Điều 3 của Luật Thuế thu nhập cá nhân là các khoản tiền hoặc hiện vật mà cá nhân nhận được bao gồm:"},{"k":"p","t":"1. Trúng thưởng xổ số do các công ty xổ số phát hành trả thưởng."},{"k":"p","t":"2. Trúng thưởng trong các hình thức khuyến mại khi tham gia mua bán hàng hóa, dịch vụ theo quy định của Luật Thương mại."},{"k":"p","t":"3. Trúng thưởng trong các hình thức đặt cược được pháp luật cho phép."},{"k":"p","t":"4. Trúng thưởng trong các trò chơi, cuộc thi có thưởng và các hình thức trúng thưởng khác, trừ trúng thưởng trong casino và khoản tiền thưởng quy định tại điểm i khoản 2 Điều 8 của Nghị định này."}]},{"id":"nd253_13","no":13,"code":"Điều 13","title":"Điều 13. Thu nhập từ tiền bản quyền","shortTitle":"Thu nhập từ tiền bản quyền","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ tiền bản quyền quy định tại khoản 7 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Thu nhập từ hoạt động chuyển nhượng, chuyển quyền sử dụng các đối tượng của quyền sở hữu trí tuệ theo quy định của pháp luật về sở hữu trí tuệ."},{"k":"p","t":"2. Thu nhập từ chuyển giao công nghệ theo quy định của pháp luật về chuyển giao công nghệ."}]},{"id":"nd253_14","no":14,"code":"Điều 14","title":"Điều 14. Thu nhập từ nhượng quyền thương mại","shortTitle":"Thu nhập từ nhượng quyền thương mại","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ nhượng quyền thương mại quy định tại khoản 8 Điều 3 của Luật Thuế thu nhập cá nhân là các khoản thu nhập mà cá nhân nhận được từ các hợp đồng nhượng quyền thương mại, bao gồm cả trường hợp nhượng lại quyền thương mại theo quy định của pháp luật về thương mại."}]},{"id":"nd253_15","no":15,"code":"Điều 15","title":"Điều 15. Thu nhập từ nhận thừa kế, quà tặng","shortTitle":"Thu nhập từ nhận thừa kế, quà tặng","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ nhận thừa kế, quà tặng quy định tại khoản 9 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Thu nhập từ nhận thừa kế, quà tặng là một phần hoặc toàn bộ số vốn góp trong công ty trách nhiệm hữu hạn, công ty hợp danh, hợp đồng hợp tác kinh doanh, hợp tác xã, liên hiệp hợp tác xã, quỹ tín dụng nhân dân, tổ chức khác."},{"k":"p","t":"2. Thu nhập từ nhận thừa kế, quà tặng là cổ phiếu, quyền mua cổ phiếu; trái phiếu, tín phiếu, chứng chỉ quỹ và các loại chứng khoán khác theo quy định của pháp luật về chứng khoán; cổ phiếu của các cá nhân trong công ty cổ phần theo quy định tại khoản 2 Điều 4 của Luật Chứng khoán và Điều 121 của Luật Doanh nghiệp."},{"k":"p","t":"3. Thu nhập từ nhận thừa kế, quà tặng là bất động sản bao gồm: quyền sử dụng đất; quyền sử dụng đất có tài sản gắn liền với đất; quyền sở hữu nhà, kể cả nhà ở hình thành trong tương lai; kết cấu hạ tầng và các công trình xây dựng gắn liền với đất, kể cả công trình xây dựng hình thành trong tương lai; quyền thuê đất trong hợp đồng thuê đất (bao gồm cả đất có mặt nước); quyền thuê mặt nước; tài sản khác là bất động sản theo quy định của pháp luật."},{"k":"p","t":"4. Thu nhập từ nhận thừa kế, quà tặng là ô tô, xe gắn máy, xe mô tô, tàu thủy, kể cả sà lan, ca nô, tàu kéo, tàu đẩy, thuyền, kể cả du thuyền, tàu bay, súng săn, súng thể thao và các tài sản khác phải đăng ký quyền sở hữu hoặc quyền sử dụng với cơ quan quản lý nhà nước."}]},{"id":"nd253_16","no":16,"code":"Điều 16","title":"Điều 16. Thu nhập khác","shortTitle":"Thu nhập khác","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập khác quy định tại khoản 10 Điều 3 của Luật Thuế thu nhập cá nhân bao gồm:"},{"k":"p","t":"1. Thu nhập từ chuyển nhượng tên miền quốc gia Việt Nam “.vn” là khoản thu nhập nhận được từ việc chuyển nhượng quyền sử dụng tên miền quốc gia Việt Nam “.vn” cho tổ chức, cá nhân khác."},{"k":"p","t":"2. Thu nhập từ chuyển nhượng kết quả giảm phát thải khí nhà kính, tín chỉ các bon của cá nhân sở hữu kết quả giảm phát thải khí nhà kính, tín chỉ các bon trừ trường hợp quy định tại khoản 1 Điều 34 của Nghị định này."},{"k":"p","t":"3. Thu nhập từ chuyển nhượng biển số xe trúng đấu giá theo quy định của pháp luật."},{"k":"p","t":"4. Thu nhập từ chuyển nhượng tài sản số bao gồm tài sản ảo, tài sản mã hóa và các tài sản số khác theo quy định của pháp luật về công nghiệp công nghệ số."}]},{"id":"nd253_17","no":17,"code":"Điều 17","title":"Điều 17. Quy đổi thu nhập chịu thuế","shortTitle":"Quy đổi thu nhập chịu thuế","chuong":"Chương II — THU NHẬP CHỊU THUẾ THU NHẬP CÁ NHÂN","muc":"","level":1,"content":[{"k":"p","t":"1. Thu nhập chịu thuế thu nhập cá nhân nhận được bằng ngoại tệ phải quy đổi ra Đồng Việt Nam theo tỷ giá mua vào của ngân hàng thương mại nơi cá nhân mở tài khoản giao dịch hoặc nơi tổ chức, cá nhân chi trả thu nhập mở tài khoản thực hiện chi trả thu nhập tại thời điểm phát sinh thu nhập. Trường hợp tổ chức, cá nhân không mở tài khoản tại Việt Nam thì lấy theo tỷ giá trung tâm của Đồng Việt Nam với Đô la Mỹ hoặc tỷ giá tính chéo của Đồng Việt Nam với một số ngoại tệ khác công bố trên cổng thông tin điện tử của Ngân hàng Nhà nước Việt Nam tại thời điểm phát sinh thu nhập."},{"k":"p","t":"2. Thu nhập chịu thuế thu nhập cá nhân nhận được không bằng tiền phải được quy đổi ra tiền và tính theo Đồng Việt Nam theo giá trị giao dịch thông thường trên thị trường của sản phẩm, dịch vụ đó hoặc sản phẩm, dịch vụ cùng loại hoặc tương đương tại thời điểm phát sinh thu nhập."},{"k":"p","t":"THU NHẬP ĐƯỢC MIỄN THUẾ"}]},{"id":"nd253_18","no":18,"code":"Điều 18","title":"Điều 18. Thu nhập từ chuyển nhượng, nhận thừa kế, quà tặng là bất động sản","shortTitle":"Thu nhập từ chuyển nhượng, nhận thừa kế, quà tặng là bất động sản","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng, nhận thừa kế, quà tặng là bất động sản (bao gồm cả nhà ở, công trình xây dựng hình thành trong tương lai theo quy định của pháp luật về kinh doanh bất động sản) giữa: vợ với chồng; cha đẻ, mẹ đẻ với con đẻ; cha nuôi, mẹ nuôi với con nuôi; cha chồng, mẹ chồng với con dâu (kể cả khi chồng chết); cha vợ, mẹ vợ với con rể (kể cả khi vợ chết); ông nội, bà nội với cháu nội; ông ngoại, bà ngoại với cháu ngoại; anh, chị em ruột với nhau."},{"k":"p","t":"2. Trường hợp bất động sản (bao gồm cả nhà ở, công trình xây dựng hình thành trong tương lai theo quy định pháp luật về kinh doanh bất động sản) khi vợ/chồng ly hôn được phân chia theo thỏa thuận hoặc do tòa án phán quyết thì thu nhập từ việc phân chia tài sản này thuộc diện được miễn thuế."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo pháp luật về quản lý thuế."}]},{"id":"nd253_19","no":19,"code":"Điều 19","title":"Điều 19. Thu nhập từ chuyển nhượng nhà ở, quyền sử dụng đất ở và tài sản gắn liền với đất ở duy nhất của cá nhân","shortTitle":"Thu nhập từ chuyển nhượng nhà ở, quyền sử dụng đất ở và tài sản gắn liền với đất ở duy nhất của cá nhân","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng nhà ở, quyền sử dụng đất ở và tài sản gắn liền với đất ở của cá nhân trong trường hợp người chuyển nhượng chỉ có duy nhất một nhà ở, quyền sử dụng đất ở tại Việt Nam."},{"k":"p","t":"Quy định miễn thuế tại khoản này không áp dụng đối với trường hợp chuyển nhượng nhà ở, công trình xây dựng hình thành trong tương lai."},{"k":"p","t":"2. Cá nhân chuyển nhượng có duy nhất một nhà ở, quyền sử dụng đất ở tại Việt Nam được miễn thuế theo quy định tại khoản 1 Điều này phải đáp ứng các điều kiện sau:"},{"k":"p","t":"a) Chỉ có duy nhất quyền sở hữu một nhà ở hoặc quyền sử dụng một thửa đất ở (bao gồm cả trường hợp có nhà ở hoặc công trình xây dựng gắn liền với thửa đất đó) tại thời điểm chuyển nhượng. Trường hợp cá nhân có thêm nhà ở, công trình xây dựng hình thành trong tương lai tại thời điểm chuyển nhượng thì việc chuyển nhượng này không được xác định là nhà ở, quyền sử dụng đất ở duy nhất của cá nhân."},{"k":"p","t":"Trường hợp chuyển nhượng nhà ở có chung quyền sở hữu, đất ở có chung quyền sử dụng (bao gồm cả vợ/chồng có chung quyền sở hữu nhà ở, quyền sử dụng đất ở) thì chỉ cá nhân chưa có quyền sở hữu nhà ở, quyền sử dụng đất ở nơi khác được miễn thuế; cá nhân có chung quyền sở hữu nhà ở, quyền sử dụng đất ở còn có quyền sở hữu nhà ở, quyền sử dụng đất ở khác không được miễn thuế;"},{"k":"p","t":"b) Có quyền sở hữu nhà ở, quyền sử dụng đất ở tính đến thời điểm chuyển nhượng tối thiểu là 183 ngày."},{"k":"p","t":"Thời điểm xác định quyền sở hữu nhà ở, quyền sử dụng đất ở là ngày cấp Giấy chứng nhận quyền sử dụng đất ở, quyền sở hữu nhà ở và tài sản khác gắn liền với đất. Riêng trường hợp được cấp lại, cấp đổi theo quy định của pháp luật về đất đai thì thời điểm xác định quyền sở hữu nhà ở, quyền sử dụng đất ở được tính theo thời điểm cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất trước khi được cấp lại, cấp đổi;"},{"k":"p","t":"c) Chuyển nhượng toàn bộ nhà ở, quyền sử dụng đất ở. Trường hợp cá nhân có quyền hoặc chung quyền sở hữu nhà, quyền sử dụng đất ở duy nhất nhưng chuyển nhượng một phần thì không được miễn thuế cho phần chuyển nhượng đó."},{"k":"p","t":"3. Nhà ở, quyền sử dụng đất ở duy nhất được miễn thuế do cá nhân chuyển nhượng bất động sản tự kê khai và chịu trách nhiệm. Trường hợp phát hiện kê khai không đúng sẽ bị truy thu thuế và xử phạt theo quy định của pháp luật về quản lý thuế và pháp luật liên quan khác."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo pháp luật về quản lý thuế."}]},{"id":"nd253_20","no":20,"code":"Điều 20","title":"Điều 20. Thu nhập từ giá trị quyền sử dụng đất của cá nhân được Nhà nước giao đất","shortTitle":"Thu nhập từ giá trị quyền sử dụng đất của cá nhân được Nhà nước giao đất","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ giá trị quyền sử dụng đất của cá nhân được Nhà nước giao đất không phải trả tiền hoặc được giảm tiền sử dụng đất theo quy định của pháp luật."},{"k":"p","t":"2. Trường hợp cá nhân được miễn, giảm tiền sử dụng đất khi giao đất, nếu chuyển nhượng diện tích đất được miễn, giảm tiền sử dụng đất thì khai, nộp thuế đối với thu nhập từ chuyển nhượng bất động sản."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo pháp luật về quản lý thuế."}]},{"id":"nd253_21","no":21,"code":"Điều 21","title":"Điều 21. Thu nhập của hộ gia đình, cá nhân trực tiếp sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa qua chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường; sản xuất muối","shortTitle":"Thu nhập của hộ gia đình, cá nhân trực tiếp sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa qua chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường; sản xuất muối","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập của hộ gia đình, cá nhân trực tiếp sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa qua chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường; sản xuất muối."},{"k":"p","t":"2. Việc miễn thuế đối với thu nhập của hộ gia đình, cá nhân quy định tại khoản 1 Điều này phải đáp ứng các điều kiện sau:"},{"k":"p","t":"a) Có quyền sử dụng đất, quyền thuê đất trong hợp đồng thuê đất (bao gồm cả đất có mặt nước), quyền sử dụng mặt nước, quyền thuê mặt nước hợp pháp để sản xuất và trực tiếp tham gia lao động sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt, sản xuất muối."},{"k":"p","t":"Trường hợp đi thuê lại đất, mặt nước của tổ chức, cá nhân khác thì phải có văn bản thuê đất, mặt nước theo quy định của pháp luật (trừ trường hợp hộ gia đình, cá nhân nhận khoán trồng rừng, chăm sóc, quản lý và bảo vệ rừng theo quy định pháp luật). Đối với hoạt động đánh bắt thủy sản phải có giấy chứng nhận quyền sở hữu hoặc hợp đồng thuê tàu, thuyền sử dụng vào mục đích đánh bắt và trực tiếp tham gia hoạt động đánh bắt thủy sản (trừ trường hợp đánh bắt thủy sản trên sông bằng hình thức đáy sông (đáy cá) và không thuộc những hoạt động khai thác thủy sản bị cấm theo quy định của pháp luật);"},{"k":"p","t":"b) Thực tế có nơi cư trú tại địa phương nơi diễn ra hoạt động sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt, sản xuất muối."},{"k":"p","t":"Địa phương nơi diễn ra hoạt động sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, sản xuất muối quy định tại điểm này tính theo đơn vị hành chính cấp xã, kể cả xã giáp ranh với xã diễn ra hoạt động sản xuất."},{"k":"p","t":"Riêng đối với hoạt động đánh bắt thủy sản thì không phụ thuộc nơi cư trú."},{"k":"p","t":"3. Việc xác định sản phẩm chưa qua chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường quy định tại khoản 1 Điều này thực hiện theo quy định tại Nghị định số 181/2025/NĐ-CP quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng và các văn bản sửa đổi, bổ sung."}]},{"id":"nd253_22","no":22,"code":"Điều 22","title":"Điều 22. Thu nhập từ lợi tức cổ phần của thành viên hợp tác xã, liên hiệp hợp tác xã nông nghiệp, cá nhân là nông dân ký kết hợp đồng với doanh nghiệp tham gia “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản","shortTitle":"Thu nhập từ lợi tức cổ phần của thành viên hợp tác xã, liên hiệp hợp tác xã nông nghiệp, cá nhân là nông dân ký kết hợp đồng với doanh nghiệp tham gia “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ lợi tức cổ phần của thành viên hợp tác xã, liên hiệp hợp tác xã nông nghiệp, cá nhân là nông dân ký kết hợp đồng với doanh nghiệp tham gia “Cánh đồng lớn” trong việc sản xuất, tiêu thụ sản phẩm nông sản, trồng rừng sản xuất, nuôi trồng thủy sản."},{"k":"p","t":"2. Việc xác định thành viên hợp tác xã, liên hiệp hợp tác xã làm căn cứ thực hiện việc miễn thuế quy định tại khoản 1 Điều này thực hiện theo quy định của pháp luật về hợp tác xã."},{"k":"p","t":"3. Cá nhân tham gia “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản được miễn thuế theo quy định tại khoản 1 Điều này phải đáp ứng các điều kiện sau:"},{"k":"p","t":"a) Có quyền sử dụng đất, quyền thuê đất trong hợp đồng thuê đất (bao gồm cả đất có mặt nước), quyền sử dụng mặt nước, quyền thuê mặt nước hợp pháp để tham gia “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản (bao gồm cả trường hợp đi thuê lại đất, mặt nước của tổ chức, cá nhân khác theo quy định của pháp luật);"},{"k":"p","t":"b) Thực tế có nơi cư trú tại địa phương nơi diễn ra hoạt động “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản."},{"k":"p","t":"Địa phương nơi diễn ra hoạt động “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản theo hướng dẫn này tính theo đơn vị hành chính cấp xã, kể cả xã giáp ranh với xã diễn ra hoạt động “Cánh đồng lớn”, trồng rừng sản xuất, nuôi trồng thủy sản."}]},{"id":"nd253_23","no":23,"code":"Điều 23","title":"Điều 23. Thu nhập từ chuyển đổi đất nông nghiệp của hộ gia đình, cá nhân được Nhà nước giao để sản xuất","shortTitle":"Thu nhập từ chuyển đổi đất nông nghiệp của hộ gia đình, cá nhân được Nhà nước giao để sản xuất","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập của cá nhân từ chuyển đổi đất nông nghiệp để hợp lý hóa sản xuất nông nghiệp nhưng không làm thay đổi mục đích sử dụng đất của hộ gia đình, cá nhân trực tiếp sản xuất nông nghiệp, được Nhà nước giao để sản xuất."},{"k":"p","t":"2. Hồ sơ, thủ tục miễn thuế thực hiện theo pháp luật về quản lý thuế."}]},{"id":"nd253_24","no":24,"code":"Điều 24","title":"Điều 24. Thu nhập từ lãi trái phiếu Chính phủ, lãi trái phiếu chính quyền địa phương, lãi tiền gửi tại tổ chức tín dụng, lãi từ hợp đồng bảo hiểm nhân thọ","shortTitle":"Thu nhập từ lãi trái phiếu Chính phủ, lãi trái phiếu chính quyền địa phương, lãi tiền gửi tại tổ chức tín dụng, lãi từ hợp đồng bảo hiểm nhân thọ","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập của cá nhân từ khoản lãi mà cá nhân nhận được từ trái phiếu Chính phủ do Chính phủ phát hành và trái phiếu chính quyền địa phương do Ủy ban nhân dân cấp tỉnh phát hành."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với khoản lãi tiền gửi cá nhân nhận được từ lãi gửi Đồng Việt Nam, vàng, ngoại tệ tại các tổ chức tín dụng, chi nhánh ngân hàng nước ngoài được thành lập và hoạt động theo quy định của Luật Các tổ chức tín dụng dưới các hình thức gửi không kỳ hạn, có kỳ hạn, gửi tiết kiệm, chứng chỉ tiền gửi (bao gồm cả lãi nhận được từ chuyển nhượng chứng chỉ tiền gửi), kỳ phiếu, tín phiếu và các hình thức nhận tiền gửi khác theo nguyên tắc có hoàn trả đầy đủ tiền gốc, lãi cho người gửi theo thỏa thuận."},{"k":"p","t":"3. Miễn thuế thu nhập cá nhân đối với khoản lãi từ hợp đồng bảo hiểm nhân thọ mà cá nhân nhận được theo hợp đồng mua bảo hiểm nhân thọ của các doanh nghiệp bảo hiểm."}]},{"id":"nd253_25","no":25,"code":"Điều 25","title":"Điều 25. Thu nhập từ kiều hối","shortTitle":"Thu nhập từ kiều hối","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với khoản tiền cá nhân nhận được từ nước ngoài do thân nhân là người Việt Nam định cư ở nước ngoài, người Việt Nam đi lao động, công tác, học tập tại nước ngoài gửi tiền về cho thân nhân ở trong nước."},{"k":"p","t":"2. Trường hợp cá nhân nhận được tiền từ nước ngoài do thân nhân là người nước ngoài gửi về đáp ứng điều kiện về khuyến khích chuyển tiền về nước theo quy định của Ngân hàng Nhà nước Việt Nam thì cũng được miễn thuế theo quy định tại Điều này."},{"k":"p","t":"3. Căn cứ xác định thu nhập được miễn thuế là các giấy tờ chứng minh nguồn tiền nhận từ nước ngoài và chứng từ chi tiền của tổ chức trả hộ (nếu có)."}]},{"id":"nd253_26","no":26,"code":"Điều 26","title":"Điều 26. Tiền lương, tiền công làm việc ban đêm, làm thêm giờ, tiền lương, tiền công trả cho những ngày không nghỉ phép","shortTitle":"Tiền lương, tiền công làm việc ban đêm, làm thêm giờ, tiền lương, tiền công trả cho những ngày không nghỉ phép","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với tiền lương, tiền công làm việc ban đêm, làm thêm giờ tại nơi làm việc phù hợp với quy định về điều kiện và thời gian theo pháp luật về lao động."},{"k":"p","t":"Tổ chức, doanh nghiệp trả thu nhập phải lập bảng kê phản ánh rõ thời gian làm đêm, làm thêm giờ tại nơi làm việc, khoản tiền lương làm đêm, làm thêm giờ đã trả cho người lao động. Bảng kê này được lưu tại tổ chức, doanh nghiệp trả thu nhập và xuất trình khi có yêu cầu của cơ quan thuế. Trường hợp không lập bảng kê riêng, tổ chức trả thu nhập có trách nhiệm chứng minh khoản tiền lương, tiền công làm việc ban đêm, làm thêm giờ tại nơi làm việc thông qua bảng lương, bảng chấm công, hợp đồng lao động và các tài liệu hợp pháp khác."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với tiền lương, tiền công trả cho những ngày không nghỉ phép phù hợp với quy định về điều kiện và mức tiền lương, tiền công trả cho những ngày không nghỉ phép theo quy định tại khoản 3 Điều 113 của Bộ luật Lao động và quy định của Luật Cán bộ công chức, Luật Viên chức."},{"k":"p","t":"3. Trường hợp tiền lương, tiền công làm việc ban đêm, làm thêm giờ, tiền lương, tiền công trả cho những ngày không nghỉ phép vượt mức quy định của pháp luật thì phần vượt mức quy định tính vào thu nhập chịu thuế của cá nhân."}]},{"id":"nd253_27","no":27,"code":"Điều 27","title":"Điều 27. Tiền lương hưu do Quỹ bảo hiểm xã hội chi trả; thu nhập do quỹ bảo hiểm hưu trí bổ sung, quỹ hưu trí tự nguyện chi trả","shortTitle":"Tiền lương hưu do Quỹ bảo hiểm xã hội chi trả; thu nhập do quỹ bảo hiểm hưu trí bổ sung, quỹ hưu trí tự nguyện chi trả","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với tiền lương hưu do Quỹ bảo hiểm xã hội chi trả theo pháp luật về bảo hiểm xã hội, bao gồm cả trường hợp cá nhân sinh sống, làm việc tại Việt Nam nhận được thu nhập từ tiền lương hưu do nước ngoài chi trả."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với thu nhập do quỹ bảo hiểm hưu trí bổ sung, quỹ hưu trí tự nguyện chi trả, không phân biệt chi trả định kỳ, chi trả một lần, chi trả trước hay sau tuổi nghỉ hưu."}]},{"id":"nd253_28","no":28,"code":"Điều 28","title":"Điều 28. Thu nhập từ học bổng","shortTitle":"Thu nhập từ học bổng","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ học bổng nhận được từ ngân sách nhà nước, bao gồm: học bổng của Bộ Giáo dục và Đào tạo, Sở Giáo dục và Đào tạo, Quỹ học bổng quốc gia, quỹ khuyến tài, khuyến học, cơ sở giáo dục công lập hoặc các loại học bổng khác có nguồn từ ngân sách nhà nước."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với thu nhập từ học bổng nhận được từ các tổ chức trong nước và ngoài nước (bao gồm cả khoản tiền sinh hoạt phí) theo chương trình hỗ trợ của tổ chức đó."},{"k":"p","t":"3. Tổ chức trả học bổng cho cá nhân nêu tại khoản 1 và khoản 2 Điều này phải lưu giữ các quyết định cấp học bổng và các chứng từ trả học bổng. Trường hợp cá nhân nhận học bổng trực tiếp từ các tổ chức nước ngoài thì cá nhân nhận thu nhập phải lưu giữ tài liệu hoặc chứng từ (nếu có) để chứng minh."}]},{"id":"nd253_29","no":29,"code":"Điều 29","title":"Điều 29. Thu nhập từ bồi thường hợp đồng bảo hiểm nhân thọ, phi nhân thọ, tiền bồi thường tai nạn lao động, khoản bồi thường nhà nước và các khoản bồi thường khác","shortTitle":"Thu nhập từ bồi thường hợp đồng bảo hiểm nhân thọ, phi nhân thọ, tiền bồi thường tai nạn lao động, khoản bồi thường nhà nước và các khoản bồi thường khác","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ bồi thường hợp đồng bảo hiểm nhân thọ, phi nhân thọ, bảo hiểm sức khỏe mà cá nhân nhận được từ tổ chức bảo hiểm nhân thọ, phi nhân thọ, bảo hiểm sức khỏe, tổ chức cung cấp bảo hiểm vi mô trả cho người được bảo hiểm hoặc người thụ hưởng theo hợp đồng bảo hiểm đã ký kết."},{"k":"p","t":"Căn cứ xác định khoản bồi thường này là văn bản hoặc quyết định bồi thường của tổ chức bảo hiểm hoặc tòa án và chứng từ trả tiền bồi thường."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền bồi thường tai nạn lao động mà người lao động nhận được từ người sử dụng lao động hoặc Quỹ bảo hiểm xã hội khi bị tai nạn trong quá trình tham gia lao động."},{"k":"p","t":"Căn cứ xác định khoản bồi thường này là văn bản hoặc quyết định bồi thường của người sử dụng lao động hoặc tòa án và chứng từ chi bồi thường tai nạn lao động."},{"k":"p","t":"3. Miễn thuế thu nhập cá nhân đối với thu nhập từ bồi thường, hỗ trợ, tái định cư do Nhà nước thu hồi đất theo quy định, kể cả các khoản thu nhập do các tổ chức, doanh nghiệp bồi thường, hỗ trợ khi thực hiện thu hồi đất."},{"k":"p","t":"Căn cứ để xác định thu nhập từ bồi thường, hỗ trợ, tái định cư tại khoản này được xác định theo phương án bồi thường, tái định cư đã được cơ quan nhà nước có thẩm quyền phê duyệt."},{"k":"p","t":"4. Miễn thuế thu nhập cá nhân đối với thu nhập từ bồi thường nhà nước theo quy định của pháp luật về bồi thường nhà nước."},{"k":"p","t":"Căn cứ xác định khoản bồi thường này là quyết định của cơ quan nhà nước có thẩm quyền buộc cơ quan hoặc cá nhân có quyết định sai phải bồi thường và chứng từ chi bồi thường."},{"k":"p","t":"5. Miễn thuế thu nhập cá nhân đối với thu nhập từ bồi thường thiệt hại ngoài hợp đồng (bao gồm lãi chậm trả) theo quy định của Bộ luật Dân sự."},{"k":"p","t":"Căn cứ xác định khoản bồi thường được miễn thuế dựa trên bản án, quyết định có hiệu lực pháp luật của Tòa án hoặc văn bản thỏa thuận bồi thường thiệt hại giữa các bên đã được công chứng, chứng thực theo quy định của pháp luật."}]},{"id":"nd253_30","no":30,"code":"Điều 30","title":"Điều 30. Thu nhập nhận được từ các tổ chức và quỹ từ thiện","shortTitle":"Thu nhập nhận được từ các tổ chức và quỹ từ thiện","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập nhận được từ các tổ chức, quỹ từ thiện được cơ quan nhà nước có thẩm quyền cho phép thành lập hoặc công nhận, hoạt động vì mục đích từ thiện, nhân đạo, khuyến học không vì mục tiêu lợi nhuận."},{"k":"p","t":"2. Căn cứ xác định thu nhập được miễn thuế là văn bản hoặc quyết định trao khoản thu nhập của quỹ từ thiện và chứng từ chi tiền, hiện vật từ các tổ chức, quỹ từ thiện."}]},{"id":"nd253_31","no":31,"code":"Điều 31","title":"Điều 31. Thu nhập nhận được từ nguồn viện trợ nước ngoài","shortTitle":"Thu nhập nhận được từ nguồn viện trợ nước ngoài","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập nhận được từ nguồn viện trợ nước ngoài vì mục đích từ thiện, nhân đạo dưới hình thức chính phủ và phi chính phủ (bao gồm nguồn viện trợ hỗ trợ phát triển chính thức, viện trợ không thuộc hỗ trợ phát triển chính thức, viện trợ quốc tế khẩn cấp để cứu trợ và khắc phục hậu quả thiên tai) được cơ quan nhà nước có thẩm quyền phê duyệt."},{"k":"p","t":"2. Căn cứ xác định thu nhập được miễn thuế là văn bản của cơ quan nhà nước có thẩm quyền phê duyệt việc nhận viện trợ."}]},{"id":"nd253_32","no":32,"code":"Điều 32","title":"Điều 32. Thu nhập từ tiền lương, tiền công của thuyền viên là người Việt Nam","shortTitle":"Thu nhập từ tiền lương, tiền công của thuyền viên là người Việt Nam","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của thuyền viên là người Việt Nam nhận được do làm việc cho các hãng tàu nước ngoài hoặc các hãng tàu Việt Nam vận tải quốc tế."},{"k":"p","t":"2. Việc xác định thuyền viên là người Việt Nam làm việc cho các hãng tàu nước ngoài hoặc các hãng tàu Việt Nam vận tải quốc tế được miễn thuế theo quy định tại khoản 1 Điều này thực hiện theo quy định tại Bộ luật Hàng hải Việt Nam và các văn bản quy phạm pháp luật có liên quan."}]},{"id":"nd253_33","no":33,"code":"Điều 33","title":"Điều 33. Thu nhập từ hoạt động cung cấp hàng hóa, dịch vụ trực tiếp phục vụ hoạt động khai thác thủy sản xa bờ","shortTitle":"Thu nhập từ hoạt động cung cấp hàng hóa, dịch vụ trực tiếp phục vụ hoạt động khai thác thủy sản xa bờ","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Miễn thuế thu nhập cá nhân đối với thu nhập của cá nhân là chủ tàu, cá nhân có quyền sử dụng tàu và cá nhân làm việc trên tàu có được từ hoạt động cung cấp hàng hóa, dịch vụ trực tiếp phục vụ hoạt động khai thác thủy sản xa bờ theo quy định pháp luật."}]},{"id":"nd253_34","no":34,"code":"Điều 34","title":"Điều 34. Thu nhập từ chuyển nhượng chứng chỉ giảm phát thải, chuyển nhượng tín chỉ các bon; thu nhập từ tiền lãi trái phiếu xanh, chuyển nhượng trái phiếu xanh","shortTitle":"Thu nhập từ chuyển nhượng chứng chỉ giảm phát thải, chuyển nhượng tín chỉ các bon; thu nhập từ tiền lãi trái phiếu xanh, chuyển nhượng trái phiếu xanh","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng lần đầu kết quả giảm phát thải khí nhà kính, tín chỉ các bon của cá nhân được cấp, công nhận kết quả giảm phát thải khí nhà kính, tín chỉ các bon đó."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lãi trái phiếu xanh."},{"k":"p","t":"3. Miễn thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng trái phiếu xanh lần đầu sau khi phát hành."},{"k":"p","t":"Thu nhập từ chuyển nhượng trái phiếu xanh được miễn thuế tại khoản này là khoản thu nhập cá nhân nhận được từ việc chuyển nhượng trái phiếu xanh mà cá nhân trực tiếp mua của tổ chức phát hành trái phiếu xanh."}]},{"id":"nd253_35","no":35,"code":"Điều 35","title":"Điều 35. Thu nhập từ tiền lương, tiền công từ thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo","shortTitle":"Thu nhập từ tiền lương, tiền công từ thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công từ thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo."},{"k":"p","t":"2. Thu nhập của cá nhân từ tiền lương, tiền công thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo được miễn thuế xác định như sau:"},{"k":"p","t":"a) Đối với nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo sử dụng ngân sách nhà nước:"},{"k":"p","t":"Tiền lương, tiền công của cá nhân thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo sử dụng ngân sách nhà nước là khoản tiền thù lao tham gia nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo quy định tại điểm a khoản 1 Điều 6 của Nghị định số 265/2025/NĐ-CP quy định chi tiết và hướng dẫn thi hành một số điều của Luật Khoa học, công nghệ và đổi mới sáng tạo về tài chính và đầu tư trong khoa học, công nghệ và đổi mới sáng tạo."},{"k":"p","t":"Khoản thù lao tham gia nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo của các cá nhân được xác định trên cơ sở nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo sử dụng ngân sách nhà nước được cấp có thẩm quyền phê duyệt theo quy định tại Nghị định số 267/2025/NĐ-CP quy định chi tiết và hướng dẫn một số điều của Luật Khoa học, công nghệ và đổi mới sáng tạo về chương trình, nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo và một số quy định về thúc đẩy hoạt động nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, Nghị định số 268/2025/NĐ-CP quy định chi tiết và hướng dẫn một số điều của Luật Khoa học, công nghệ và đổi mới sáng tạo về đổi mới sáng tạo; khuyến khích hoạt động khoa học, công nghệ và đổi mới sáng tạo trong doanh nghiệp; công nhận trung tâm đổi mới sáng tạo, hỗ trợ khởi nghiệp sáng tạo; công nhận cá nhân, doanh nghiệp khởi nghiệp sáng tạo; hạ tầng mạng lưới và hệ sinh thái khởi nghiệp sáng tạo."},{"k":"p","t":"b) Đối với nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo không sử dụng ngân sách nhà nước:"},{"k":"p","t":"Nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo không sử dụng ngân sách nhà nước là nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo theo pháp luật về khoa học, công nghệ và đổi mới sáng tạo, được doanh nghiệp phê duyệt, triển khai bằng nguồn kinh phí hợp pháp của doanh nghiệp hoặc nguồn kinh phí hợp pháp của đơn vị phối hợp, không sử dụng kinh phí từ nguồn ngân sách nhà nước."},{"k":"p","t":"Việc xác định tiền lương, tiền công của cá nhân tham gia thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo không sử dụng ngân sách nhà nước thực hiện theo quy định về khoản chi của doanh nghiệp tài trợ cho chuyên gia, nhà khoa học, cá nhân thực hiện nhiệm vụ nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo quy định tại khoản 1 Điều 15 của Nghị định số 265/2025/NĐ-CP hoặc thực hiện theo quy định về khoản chi tiền lương, tiền công của doanh nghiệp cho nhân công trực tiếp tham gia thực hiện hoạt động nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo quy định tại khoản 2 Điều 15 của Nghị định số 265/2025/NĐ-CP."},{"k":"p","t":"Doanh nghiệp có trách nhiệm xây dựng và ban hành quy trình nội bộ quy định việc quản lý các nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo thuộc phạm vi quản lý. Chịu trách nhiệm về sự phù hợp của các hoạt động nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo trong nhiệm vụ do mình phê duyệt với các quy định về nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo quy định tại pháp luật về khoa học, công nghệ và đổi mới sáng tạo."},{"k":"p","t":"Hồ sơ xác định điều kiện để được miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công từ thực hiện nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo không sử dụng ngân sách nhà nước, bao gồm: Quyết định phê duyệt hoặc thuyết minh nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo được phê duyệt; hợp đồng thuê nghiên cứu khoa học, phát triển công nghệ, đổi mới sáng tạo; biên bản bàn giao, nghiệm thu sản phẩm, thanh lý hợp đồng kèm theo các tài liệu, hóa đơn, chứng từ có liên quan (nếu có). Hồ sơ này được lưu tại tổ chức, doanh nghiệp trả thu nhập và xuất trình khi có yêu cầu của cơ quan thuế."}]},{"id":"nd253_36","no":36,"code":"Điều 36","title":"Điều 36. Thu nhập từ quyền tác giả của nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo","shortTitle":"Thu nhập từ quyền tác giả của nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ quyền tác giả của nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo khi kết quả nhiệm vụ được thương mại hóa theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về sở hữu trí tuệ."},{"k":"p","t":"2. Việc xác định thương mại hóa kết quả nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo theo quy định tại Điều 27 của Luật Khoa học, công nghệ và đổi mới sáng tạo."}]},{"id":"nd253_37","no":37,"code":"Điều 37","title":"Điều 37. Thu nhập của nhà đầu tư cá nhân, chuyên gia từ dự án khởi nghiệp sáng tạo, sáng lập viên cho doanh nghiệp khởi nghiệp sáng tạo, nhà đầu tư cá nhân góp vốn vào quỹ đầu tư mạo hiểm","shortTitle":"Thu nhập của nhà đầu tư cá nhân, chuyên gia từ dự án khởi nghiệp sáng tạo, sáng lập viên cho doanh nghiệp khởi nghiệp sáng tạo, nhà đầu tư cá nhân góp vốn vào quỹ đầu tư mạo hiểm","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ đầu tư vốn của nhà đầu tư cá nhân nhận được từ dự án khởi nghiệp sáng tạo, sáng lập viên doanh nghiệp khởi nghiệp sáng tạo, nhà đầu tư cá nhân góp vốn vào quỹ đầu tư mạo hiểm."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của chuyên gia hỗ trợ khởi nghiệp sáng tạo từ dự án khởi nghiệp sáng tạo, doanh nghiệp khởi nghiệp sáng tạo."},{"k":"p","t":"3. Việc xác định dự án khởi nghiệp sáng tạo, doanh nghiệp khởi nghiệp sáng tạo, chuyên gia hỗ trợ khởi nghiệp sáng tạo, nhà đầu tư cá nhân khởi nghiệp sáng tạo, cá nhân, nhóm cá nhân khởi nghiệp sáng tạo là sáng lập viên doanh nghiệp khởi nghiệp sáng tạo được thực hiện theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo; việc xác định quỹ đầu tư mạo hiểm, quỹ đầu tư khởi nghiệp sáng tạo theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo và pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa."}]},{"id":"nd253_38","no":38,"code":"Điều 38","title":"Điều 38. Thu nhập từ tiền lương, tiền công của chuyên gia nước ngoài làm việc tại chương trình, dự án tài trợ bằng nguồn vốn ODA không hoàn lại, chương trình, dự án phi chính phủ nước ngoài tại Việt Nam; cá nhân là người Việt Nam làm việc tại cơ quan đại diện của tổ chức quốc tế thuộc Hệ thống Liên hợp quốc tại Việt Nam; cá nhân tham gia lực lượng gìn giữ hòa bình của Liên hợp quốc","shortTitle":"Thu nhập từ tiền lương, tiền công của chuyên gia nước ngoài làm việc tại chương trình, dự án tài trợ bằng nguồn vốn ODA không hoàn lại, chương trình, dự án phi chính phủ nước ngoài tại Việt Nam; cá nhân là người Việt Nam làm việc tại cơ quan đại diện của tổ chức quốc tế thuộc Hệ thống Liên hợp quốc tại Việt Nam; cá nhân tham gia lực lượng gìn giữ hòa bình của Liên hợp quốc","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của chuyên gia nước ngoài làm việc tại chương trình, dự án tài trợ bằng nguồn vốn ODA không hoàn lại là người không có quốc tịch Việt Nam vào Việt Nam để cung cấp dịch vụ tư vấn về chuyên môn và kỹ thuật hoặc thực hiện các nhiệm vụ khác phục vụ cho công tác nghiên cứu, xây dựng, thẩm định, theo dõi đánh giá, quản lý và thực hiện chương trình, dự án ODA không hoàn lại theo quy định hay thỏa thuận trong các điều ước quốc tế về ODA không hoàn lại đã ký kết giữa cơ quan có thẩm quyền của Bên Việt Nam và Bên nước ngoài."},{"k":"p","t":"Cá nhân được miễn thuế theo khoản này áp dụng đối với các trường hợp sau:"},{"k":"p","t":"a) Bên nước ngoài tuyển chọn và ký hợp đồng với chuyên gia hoặc nhà thầu (công ty) mà chuyên gia thuộc danh sách tư vấn trong tài liệu đấu thầu của nhà thầu (công ty) trên cơ sở kết quả đấu thầu được cấp có thẩm quyền của Bên nước ngoài phê duyệt và phía Việt Nam chấp nhận;"},{"k":"p","t":"b) Bên Việt Nam tuyển chọn và ký hợp đồng với chuyên gia hoặc nhà thầu (công ty) mà chuyên gia thuộc danh sách tư vấn trong tài liệu đấu thầu của nhà thầu (công ty) trên cơ sở kết quả đấu thầu được cấp có thẩm quyền của Bên Việt Nam phê duyệt và phía nước ngoài chấp thuận."},{"k":"p","t":"2. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của chuyên gia nước ngoài làm việc tại chương trình, dự án, phi dự án tiếp nhận nguồn vốn viện trợ không thuộc hỗ trợ phát triển chính thức, viện trợ quốc tế khẩn cấp để cứu trợ và khắc phục hậu quả thiên tai (bao gồm viện trợ từ các tổ chức phi chính phủ nước ngoài) tại Việt Nam là người không có quốc tịch Việt Nam để trực tiếp thực hiện các hoạt động của chương trình, dự án, phi dự án trên cơ sở thống nhất giữa nhà tài trợ nước ngoài và cơ quan chủ quản dự án hoặc chủ dự án của Việt Nam quy định tại văn kiện chương trình, dự án, phi dự án đã được phê duyệt theo quy định của pháp luật về tiếp nhận, quản lý và sử dụng viện trợ của nước ngoài cho Việt Nam."},{"k":"p","t":"Cá nhân được miễn thuế theo khoản này áp dụng đối với các trường hợp sau:"},{"k":"p","t":"a) Tổ chức phi chính phủ nước ngoài tuyển chọn và ký hợp đồng với chuyên gia nước ngoài theo điều khoản giao việc (TOR) cho chuyên gia nước ngoài đính kèm hợp đồng;"},{"k":"p","t":"b) Cơ quan chủ quản dự án hoặc chủ chương trình/dự án/phi dự án không thuộc hỗ trợ phát triển chính thức, viện trợ quốc tế khẩn cấp để cứu trợ và khắc phục hậu quả thiên tai (bao gồm viện trợ từ các tổ chức phi chính phủ nước ngoài) tuyển chọn và ký hợp đồng với chuyên gia nước ngoài theo điều khoản giao việc (TOR) cho chuyên gia nước ngoài đính kèm hợp đồng."},{"k":"p","t":"3. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của cá nhân người Việt Nam làm việc tại cơ quan đại diện của tổ chức quốc tế thuộc Hệ thống Liên hợp quốc tại Việt Nam là người có quốc tịch Việt Nam được tuyển dụng theo hợp đồng để làm việc tại cơ quan đại diện của tổ chức quốc tế thuộc hệ thống Liên hợp quốc tại Việt Nam, không bao gồm cá nhân là người Việt Nam được tuyển dụng và làm việc theo giờ."},{"k":"p","t":"4. Miễn thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của cá nhân có quyết định của cấp có thẩm quyền cử đi tham gia lực lượng gìn giữ hòa bình của Liên hợp quốc trong thời gian làm nhiệm vụ theo quy định của pháp luật."},{"k":"p","t":"5. Hồ sơ, thủ tục miễn thuế quy định tại các khoản 1, 2 và 3 Điều này thực hiện theo pháp luật về quản lý thuế."}]},{"id":"nd253_39","no":39,"code":"Điều 39","title":"Điều 39. Thu nhập của chủ doanh nghiệp tư nhân, cá nhân là chủ công ty trách nhiệm hữu hạn một thành viên","shortTitle":"Thu nhập của chủ doanh nghiệp tư nhân, cá nhân là chủ công ty trách nhiệm hữu hạn một thành viên","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Miễn thuế thu nhập cá nhân đối với thu nhập của chủ doanh nghiệp tư nhân, cá nhân là chủ công ty trách nhiệm hữu hạn một thành viên thành lập theo pháp luật Việt Nam nhận được sau khi doanh nghiệp đã hoàn thành nghĩa vụ thuế thu nhập doanh nghiệp."},{"k":"p","t":"CÁC TRƯỜNG HỢP MIỄN THUẾ, GIẢM THUẾ KHÁC"}]},{"id":"nd253_40","no":40,"code":"Điều 40","title":"Điều 40. Giảm thuế do thiên tai, dịch bệnh, hỏa hoạn, tai nạn, bệnh hiểm nghèo","shortTitle":"Giảm thuế do thiên tai, dịch bệnh, hỏa hoạn, tai nạn, bệnh hiểm nghèo","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế gặp khó khăn bị do thiên tai, dịch bệnh, hỏa hoạn, tai nạn, bệnh hiểm nghèo ảnh hưởng đến khả năng nộp thuế thì được xét giảm thuế tương ứng với mức độ thiệt hại nhưng không vượt quá số thuế thu nhập cá nhân phải nộp."},{"k":"p","t":"Việc xác định bệnh hiểm nghèo theo quy định của Bộ trưởng Bộ Y tế."},{"k":"p","t":"2. Việc xét giảm thuế được thực hiện theo năm. Người nộp thuế gặp khó khăn do thiên tai, dịch bệnh, hỏa hoạn, tai nạn, bệnh hiểm nghèo trong năm nào thì được xét giảm số thuế phải nộp của năm đó."},{"k":"p","t":"3. Số thuế phải nộp làm căn cứ xét giảm thuế là tổng số thuế thu nhập cá nhân mà người nộp thuế phải nộp trong năm tính thuế, bao gồm:"},{"k":"p","t":"a) Thuế thu nhập cá nhân phải nộp theo kỳ tính thuế đối với thu nhập từ kinh doanh và thu nhập từ tiền lương, tiền công của cá nhân;"},{"k":"p","t":"b) Thuế thu nhập cá nhân đã nộp hoặc đã khấu trừ đối với thu nhập từ đầu tư vốn, thu nhập từ chuyển nhượng vốn, thu nhập từ chuyển nhượng bất động sản, thu nhập từ trúng thưởng, thu nhập từ bản quyền, thu nhập từ nhượng quyền thương mại, thu nhập từ thừa kế, thu nhập từ quà tặng, thu nhập khác."},{"k":"p","t":"4. Căn cứ để xác định mức độ thiệt hại được giảm thuế là tổng chi phí thực tế để khắc phục thiệt hại, để chi trả chi phí khám bệnh, chữa bệnh trừ (-) đi các khoản bồi thường, bảo hiểm nhận được từ tổ chức bảo hiểm (nếu có) hoặc từ tổ chức, cá nhân gây ra thiệt hại (nếu có)."},{"k":"p","t":"5. Số thuế giảm được xác định như sau:"},{"k":"p","t":"a) Trường hợp số thuế phải nộp trong năm lớn hơn mức độ thiệt hại thì số thuế giảm bằng mức độ thiệt hại;"},{"k":"p","t":"b) Trường hợp số thuế phải nộp trong năm nhỏ hơn mức độ thiệt hại thì số thuế giảm bằng số thuế phải nộp."},{"k":"p","t":"6. Hồ sơ, thủ tục xét giảm thuế tại Điều này thực hiện theo pháp luật về quản lý thuế."}]},{"id":"nd253_41","no":41,"code":"Điều 41","title":"Điều 41. Miễn thuế đối với cá nhân là nhân lực công nghiệp công nghệ số chất lượng cao","shortTitle":"Miễn thuế đối với cá nhân là nhân lực công nghiệp công nghệ số chất lượng cao","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân trong thời hạn 05 năm đối với thu nhập từ tiền lương, tiền công của cá nhân là nhân lực công nghiệp công nghệ số chất lượng cao trong các trường hợp sau:"},{"k":"p","t":"a) Thu nhập từ dự án hoạt động công nghiệp công nghệ số trong khu công nghệ số tập trung;"},{"k":"p","t":"b) Thu nhập từ dự án nghiên cứu và phát triển, sản xuất sản phẩm công nghệ số trọng điểm, chip bán dẫn, hệ thống trí tuệ nhân tạo;"},{"k":"p","t":"c) Thu nhập từ các hoạt động đào tạo nhân lực công nghiệp công nghệ số."},{"k":"p","t":"2. Việc xác định nhân lực công nghiệp công nghệ số chất lượng cao làm căn cứ miễn thuế tại khoản 1 Điều này thực hiện theo quy định của pháp luật về công nghiệp công nghệ số và pháp luật có liên quan."},{"k":"p","t":"a) Việc xác định nhân lực công nghiệp công nghệ số chất lượng cao thực hiện theo quy định tại các Điều 5, 6, 7, 8, 9 và 10 của Nghị định số 353/2025/NĐ-CP quy định chi tiết một số điều và biện pháp để tổ chức, hướng dẫn thi hành Luật Công nghiệp công nghệ số và quy định của pháp luật về công nghiệp công nghệ số;"},{"k":"p","t":"b) Việc xác định hoạt động công nghiệp công nghệ số thực hiện theo Điều 13 của Luật Công nghiệp công nghệ số và Điều 4 của Nghị định số 353/2025/NĐ-CP."},{"k":"p","t":"3. Thời gian miễn thuế tính liên tục kể từ tháng phát sinh thu nhập được miễn thuế. Trường hợp phát sinh thu nhập trong tháng thì thời gian tính miễn thuế được tính đủ tháng."},{"k":"p","t":"4. Trường hợp cá nhân vừa có thu nhập từ tiền lương, tiền công được miễn thuế theo quy định tại khoản 1 Điều này, vừa có thu nhập từ tiền lương, tiền công khác thì số thuế thu nhập cá nhân được miễn được xác định như sau:"},{"k":"tbl","rows":[["Số thuếđược miễntrong kỳtính thuế","=","Số thuế thu nhập cá nhântính trên tổng thu nhập tínhthuế từ tiền lương, tiền côngtrong kỳ tính thuế","x","Thu nhập được miễn thuếtừ tiền lương, tiền công tạikhoản 1 Điều này"],["","","","","Tổng thu nhập chịu thuếtừ tiền lương, tiền côngtrong kỳ tính thuế"]]},{"k":"p","t":"5. Việc khấu trừ thuế, quyết toán thuế theo quy định tại Điều 50 và Điều 51 của Nghị định này."}]},{"id":"nd253_42","no":42,"code":"Điều 42","title":"Điều 42. Miễn thuế đối với cá nhân là nhân lực công nghệ cao","shortTitle":"Miễn thuế đối với cá nhân là nhân lực công nghệ cao","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân trong thời hạn 05 năm đối với thu nhập từ tiền lương, tiền công của cá nhân là nhân lực công nghệ cao trong các trường hợp sau:"},{"k":"p","t":"a) Thu nhập từ thực hiện hoạt động nghiên cứu và phát triển công nghệ cao thuộc Danh mục công nghệ cao được ưu tiên đầu tư phát triển, Danh mục sản phẩm công nghệ cao được khuyến khích phát triển theo quy định của pháp luật về công nghệ cao;"},{"k":"p","t":"b) Thu nhập từ hoạt động nghiên cứu và phát triển công nghệ chiến lược thuộc Danh mục công nghệ chiến lược, Danh mục sản phẩm công nghệ chiến lược theo quy định của pháp luật về công nghệ cao."},{"k":"p","t":"2. Việc xác định nhân lực công nghệ cao thực hiện hoạt động nghiên cứu và phát triển công nghệ cao hoặc công nghệ chiến lược thuộc Danh mục công nghệ cao được ưu tiên đầu tư phát triển hoặc Danh mục công nghệ chiến lược, Danh mục sản phẩm công nghệ chiến lược theo quy định của pháp luật về công nghệ cao. Một số trường hợp cụ thể như sau:"},{"k":"p","t":"a) Việc xác định nhân lực công nghệ cao theo quy định tại khoản 1 Điều này làm căn cứ thực hiện miễn thuế được thực hiện theo quy định tại Điều 13 Luật Công nghệ cao và các văn bản hướng dẫn thi hành;"},{"k":"p","t":"b) Việc xác định hoạt động nghiên cứu và phát triển công nghệ cao hoặc công nghệ chiến lược thuộc Danh mục công nghệ cao được ưu tiên đầu tư phát triển, Danh mục sản phẩm công nghệ cao được khuyến khích phát triển; Danh mục công nghệ chiến lược, Danh mục sản phẩm công nghệ chiến lược được thực hiện theo quy định tại Điều 11 và Điều 12 của Luật Công nghệ cao và các văn bản hướng dẫn thi hành."},{"k":"p","t":"3. Thời gian miễn thuế tính liên tục kể từ tháng phát sinh thu nhập được miễn thuế. Trường hợp phát sinh thu nhập trong tháng thì thời gian tính miễn thuế được tính đủ tháng."},{"k":"p","t":"4. Trường hợp cá nhân vừa có thu nhập từ tiền lương, tiền công được miễn thuế theo quy định tại khoản 1 Điều này, vừa có thu nhập từ tiền lương, tiền công khác thì số thuế thu nhập cá nhân được miễn được xác định như sau:"},{"k":"tbl","rows":[["Số thuếđược miễntrong kỳtính thuế","=","Số thuế thu nhập cá nhântính trên tổng thu nhập tínhthuế từ tiền lương, tiền côngtrong kỳ tính thuế","x","Thu nhập được miễn thuếtừ tiền lương, tiền công tạikhoản 1 Điều này"],["","","","","Tổng thu nhập chịu thuếtừ tiền lương, tiền côngtrong kỳ tính thuế"]]},{"k":"p","t":"5. Việc khấu trừ thuế, quyết toán thuế theo quy định tại Điều 50 và Điều 51 của Nghị định này."}]},{"id":"nd253_43","no":43,"code":"Điều 43","title":"Điều 43. Miễn thuế đối với chuyển nhượng chứng chỉ quỹ mở","shortTitle":"Miễn thuế đối với chuyển nhượng chứng chỉ quỹ mở","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Miễn thuế thu nhập cá nhân đối với thu nhập từ chuyển nhượng chứng chỉ quỹ mở thành lập theo pháp luật chứng khoán và tại thời điểm bán chứng chỉ quỹ đó phải đảm bảo thời gian nắm giữ từ đủ 02 năm trở lên kể từ ngày mua."},{"k":"p","t":"2. Trường hợp cá nhân có chứng chỉ quỹ mở mua trước ngày 01 tháng 7 năm 2026 và thực hiện chuyển nhượng kể từ ngày 01 tháng 7 năm 2026 thì được miễn thuế thu nhập cá nhân khi cá nhân chuyển nhượng chứng chỉ quỹ đó nếu đã có thời gian nắm giữ chứng chỉ quỹ đó từ đủ 02 năm trở lên kể từ ngày mua."},{"k":"p","t":"3. Trường hợp cá nhân chuyển nhượng chứng chỉ quỹ được mua tại các thời điểm khác nhau thì thời gian nắm giữ 2 năm quy định tại khoản 1 và khoản 2 Điều này của chứng chỉ quỹ đó được xác định theo nguyên tắc chứng chỉ quỹ nào mua trước thì được tính là bán trước."}]},{"id":"nd253_44","no":44,"code":"Điều 44","title":"Điều 44. Giảm thuế đối với lợi tức của nhà đầu tư được chia từ quỹ đầu tư chứng khoán, quỹ đầu tư bất động sản","shortTitle":"Giảm thuế đối với lợi tức của nhà đầu tư được chia từ quỹ đầu tư chứng khoán, quỹ đầu tư bất động sản","chuong":"Chương III — THU NHẬP ĐƯỢC MIỄN THUẾ, GIẢM THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Thu nhập từ lợi tức của nhà đầu tư cá nhân được chia từ quỹ đầu tư chứng khoán, quỹ đầu tư bất động sản thành lập theo Luật Chứng khoán được giảm 50% thuế thu nhập cá nhân trong 05 năm kể từ ngày 01 tháng 7 năm 2026 đến hết ngày 30 tháng 6 năm 2031."},{"k":"p","t":"THU NHẬP TỪ KINH DOANH"}]},{"id":"nd253_45","no":45,"code":"Điều 45","title":"Điều 45. Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ kinh doanh","chuong":"Chương IV — CĂN CỨ TÍNH THUẾ ĐỐI VỚI THU NHẬP CỦA CÁ NHÂN CƯ TRÚ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Cá nhân cư trú có hoạt động sản xuất, kinh doanh thực hiện nộp thuế theo quy định tại Điều 7 của Luật Thuế thu nhập cá nhân, Nghị định số 68/2026/NĐ-CP quy định về chính sách thuế và quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh và các văn bản sửa đổi, bổ sung."},{"k":"p","t":"2. Thuế suất tính trên doanh thu tính thuế quy định tại khoản 3 Điều 7 của Luật Thuế thu nhập cá nhân được quy định chi tiết theo danh mục ngành, nghề tại Phụ lục ban hành kèm theo Nghị định này."},{"k":"p","t":"THU NHẬP TỪ TIỀN LƯƠNG, TIỀN CÔNG"}]},{"id":"nd253_46","no":46,"code":"Điều 46","title":"Điều 46. Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công","shortTitle":"Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công","chuong":"Chương IV — CĂN CỨ TÍNH THUẾ ĐỐI VỚI THU NHẬP CỦA CÁ NHÂN CƯ TRÚ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của cá nhân cư trú được xác định bằng thu nhập tính thuế quy định tại khoản 2 Điều này, không phân biệt nơi trả và nhận thu nhập, nhân (x) với thuế suất tại Biểu thuế lũy tiến từng phần quy định tại Điều 9 của Luật Thuế thu nhập cá nhân. Số thuế tính theo từng bậc thuế xác định bằng phần thu nhập tính thuế của bậc thuế nhân (x) với thuế suất tương ứng của bậc thuế đó."},{"k":"p","t":"2. Thu nhập tính thuế đối với thu nhập từ tiền lương, tiền công là tổng thu nhập chịu thuế quy định tại Điều 8 của Nghị định này mà người nộp thuế nhận được trong kỳ tính thuế trừ (-) đi các khoản dưới đây:"},{"k":"p","t":"a) Các khoản đóng góp bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm trách nhiệm nghề nghiệp đối với một số ngành, nghề phải tham gia bảo hiểm bắt buộc, khoản đóng góp bảo hiểm xã hội tự nguyện theo Luật Bảo hiểm xã hội, khoản đóng góp bảo hiểm y tế tự nguyện theo Luật Bảo hiểm y tế, khoản đóng góp tham gia bảo hiểm hưu trí bổ sung theo Luật Bảo hiểm xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ."},{"k":"p","t":"Mức đóng góp tham gia bảo hiểm hưu trí bổ sung theo Luật Bảo hiểm xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ được trừ ra khỏi thu nhập khi xác định thu nhập tính thuế quy định tại điểm này tổng tối đa không quá 03 triệu đồng/tháng cho các hình thức tham gia bảo hiểm này, bao gồm cả số tiền do người sử dụng lao động đóng cho người lao động và cả số tiền do người lao động tự đóng (nếu có)."},{"k":"p","t":"Trường hợp cá nhân cư trú tại Việt Nam có thu nhập từ tiền lương, tiền công ở nước ngoài đã tham gia đóng các khoản bảo hiểm bắt buộc theo quy định của quốc gia nơi cá nhân đóng các loại bảo hiểm này như bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm trách nhiệm nghề nghiệp đối với một số ngành, nghề phải tham gia bảo hiểm bắt buộc thì được trừ các khoản phí bảo hiểm đó vào thu nhập chịu thuế khi xác định thu nhập tính thuế từ tiền lương, tiền công."},{"k":"p","t":"Khoản đóng góp bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm trách nhiệm nghề nghiệp đối với một số ngành, nghề phải tham gia bảo hiểm bắt buộc, khoản đóng góp tham gia bảo hiểm hưu trí bổ sung theo Luật Bảo hiểm xã hội, mua bảo hiểm hưu trí tự nguyện của năm nào được trừ vào thu nhập chịu thuế của năm đó."},{"k":"p","t":"Căn cứ xác định thu nhập được trừ là bản chụp chứng từ nộp tiền (hoặc nộp phí) do tổ chức bảo hiểm, quỹ hưu trí bổ sung, doanh nghiệp bảo hiểm cấp và xác nhận của tổ chức trả thu nhập về số tiền bảo hiểm đã khấu trừ, đã nộp (trường hợp tổ chức trả thu nhập nộp thay);"},{"k":"p","t":"b) Các khoản giảm trừ gia cảnh quy định tại Điều 10 của Luật Thuế thu nhập cá nhân và Điều 47 của Nghị định này;"},{"k":"p","t":"c) Các khoản đóng góp từ thiện, nhân đạo và các khoản giảm trừ khác quy định tại Điều 11 của Luật Thuế thu nhập cá nhân và Điều 49 của Nghị định này."},{"k":"p","t":"3. Thời điểm xác định thu nhập tính thuế từ tiền lương, tiền công là thời điểm người sử dụng lao động trả tiền lương, tiền công cho người nộp thuế hoặc thời điểm người nộp thuế nhận được thu nhập, kể cả các khoản lợi ích bằng tiền hoặc không bằng tiền, các khoản trợ cấp, phụ cấp và thu nhập khác quy định tại Điều 8 của Nghị định này trong kỳ tính thuế."},{"k":"p","t":"4. Trường hợp tổ chức, cá nhân trả thu nhập từ tiền lương, tiền công cho cá nhân không bao gồm thuế thu nhập cá nhân thì việc quy đổi thu nhập không bao gồm thuế thành thu nhập tính thuế cụ thể như sau:"},{"k":"p","t":"a) Thu nhập làm căn cứ quy đổi thành thu nhập tính thuế là thu nhập thực nhận cộng (+) với các khoản lợi ích do tổ chức, cá nhân trả thu nhập trả thay cho cá nhân nhận thu nhập (nếu có) trừ (-) đi các khoản giảm trừ. Trường hợp người sử dụng lao động áp dụng chính sách “tiền thuế giả đị
