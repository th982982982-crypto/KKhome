<script id="LD" type="application/json">{"meta":{"title":"Thông tư 58/2026/TT-BTC — Kế toán DN Siêu nhỏ","shortCode":"TT 58/2026","subtitle":"Kế toán doanh nghiệp siêu nhỏ","slug":"tt58","number":"58/2026/TT-BTC","effectiveDate":"01/07/2026","scope":"Hướng dẫn chứng từ, ghi sổ, lập BCTC cho DN siêu nhỏ. Hiệu lực 01/07/2026, thay thế TT132/2018.","description":"TT 58/2026 đơn giản hóa kế toán cho DNSN: không bắt buộc kế toán trưởng, cho phép người thân làm kế toán, 4 mức ghi sổ tùy phương pháp nộp thuế, BCTC rút gọn (B01+B02-DNSN).","tkNote":"Doanh nghiệp siêu nhỏ không áp dụng hệ thống tài khoản kế toán đôi. Thay vào đó sử dụng sổ kế toán đơn giản — xem tab Biểu mẫu.","related":["TT 133/2016 — Kế toán DN nhỏ vừa","TT 99/2025 — Kế toán DN thông thường","Luật 67/2025/QH15 — Thuế TNDN (thuế suất 15%)"]},"outline":[{"id":"tt58_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này hướng dẫn về chứng từ kế toán, ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp siêu nhỏ. Việc xác định nghĩa vụ thuế của doanh nghiệp siêu nhỏ được thực hiện theo quy định của pháp luật về thuế."}]},{"id":"tt58_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng áp dụng Thông tư này là các doanh nghiệp siêu nhỏ, trong đó, tiêu chí xác định doanh nghiệp siêu nhỏ thực hiện theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh nếu có nhu cầu thì được lựa chọn áp dụng Thông tư này để thực hiện công tác kế toán."}]},{"id":"tt58_3","no":3,"code":"Điều 3","title":"Điều 3. Tổ chức công tác kế toán","shortTitle":"Tổ chức công tác kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ được bố trí người làm kế toán là cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, vợ, chồng, con đẻ, con nuôi, anh, chị, em ruột của người đại diện theo pháp luật, của người đứng đầu, của giám đốc hoặc tổng giám đốc và của cấp phó của người đứng đầu, phó giám đốc hoặc phó tổng giám đốc phụ trách công tác tài chính - kế toán; Người đang làm quản lý, điều hành, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản trong doanh nghiệp siêu nhỏ hoặc thuê dịch vụ làm kế toán cho doanh nghiệp siêu nhỏ theo quy định của pháp luật phù hợp với nhu cầu của doanh nghiệp."},{"k":"p","t":"2. Doanh nghiệp siêu nhỏ không bắt buộc phải bố trí kế toán trưởng, trường hợp doanh nghiệp siêu nhỏ bố trí phụ trách kế toán thay cho kế toán trưởng thì phụ trách kế toán được ký thay kế toán trưởng tại các chứng từ kế toán, sổ kế toán, báo cáo tài chính của đơn vị."}]},{"id":"tt58_4","no":4,"code":"Điều 4","title":"Điều 4. Áp dụng chế độ kế toán","shortTitle":"Áp dụng chế độ kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ căn cứ vào phương pháp nộp thuế giá trị gia tăng (GTGT), thuế thu nhập doanh nghiệp (TNDN) theo pháp luật về thuế GTGT, thuế TNDN để thực hiện ghi sổ kế toán theo một trong các trường hợp quy định tại Điều 5, Điều 6, Điều 7, Điều 8 Thông tư này và lập báo cáo tài chính theo hướng dẫn tại Điều 10 Thông tư này. Trường hợp doanh nghiệp siêu nhỏ chuyển đổi phương pháp nộp thuế GTGT, thuế TNDN theo quy định của pháp luật thuế thì áp dụng danh mục sổ kế toán được hướng dẫn tại Thông tư này phù hợp với phương pháp nộp thuế của doanh nghiệp."},{"k":"p","t":"2. Trường hợp trong năm tài chính, doanh nghiệp siêu nhỏ có những thay đổi các tiêu chí dẫn đến không còn thuộc đối tượng áp dụng Thông tư này thì được áp dụng Thông tư này cho đến hết năm tài chính hiện tại và phải áp dụng chế độ kế toán phù hợp với quy định của pháp luật kể từ năm tài chính kế tiếp."},{"k":"p","t":"3. Doanh nghiệp siêu nhỏ được lựa chọn áp dụng chế độ kế toán doanh nghiệp nhỏ và vừa cho phù hợp với đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của đơn vị nhưng phải áp dụng nhất quán trong một năm tài chính. Việc thay đổi chế độ kế toán áp dụng chỉ được thực hiện tại ngày bắt đầu kỳ kế toán năm tiếp theo."},{"k":"p","t":"4. Trường hợp hộ kinh doanh, cá nhân kinh doanh lựa chọn áp dụng chế độ kế toán theo Thông tư này thì phải áp dụng nhất quán trong một năm tài chính. Việc thay đổi chế độ kế toán áp dụng chỉ được thực hiện tại ngày bắt đầu kỳ kế toán năm tiếp theo."},{"k":"p","t":"5. Trường hợp để phù hợp với đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý, doanh nghiệp siêu nhỏ được thiết kế thêm hoặc sửa đổi, bổ sung biểu mẫu chứng từ kế toán và sổ kế toán so với các biểu mẫu chứng từ kế toán và sổ kế toán được hướng dẫn tại Thông tư này. Biểu mẫu chứng từ kế toán và sổ kế toán của doanh nghiệp khi sửa đổi, bổ sung phải đảm bảo tuân thủ quy định tại Điều 16, các khoản 1, 2, 3, 4 của Điều 24 Luật Kế toán và phải phản ánh đầy đủ, kịp thời, trung thực, minh bạch, để kiểm tra, kiểm soát và đối chiếu được tài sản, nguồn vốn của doanh nghiệp. Doanh nghiệp có phát sinh các chứng từ kế toán thuộc đối tượng điều chỉnh của pháp luật khác thì phải thực hiện theo quy định của pháp luật đó."},{"k":"p","t":"6. Trường hợp doanh nghiệp siêu nhỏ sử dụng hóa đơn điện tử và được hệ thống thông tin quản lý thuế của cơ quan thuế hỗ trợ xác định, thông báo thông tin số thuế GTGT, thuế TNDN, các loại thuế khác phải nộp (nếu có) thì doanh nghiệp siêu nhỏ sử dụng các mẫu sổ kế toán hướng dẫn tại Thông tư này để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."},{"k":"p","t":"Chương II \nQUY ĐỊNH CỤ THỂ"}]},{"id":"tt58_5","no":5,"code":"Điều 5","title":"Điều 5. Doanh nghiệp siêu nhỏ nộp thuế GTGT và thuế TNDN theo tỷ lệ phần trăm (%) trên doanh thu","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT và thuế TNDN theo tỷ lệ phần trăm (%) trên doanh thu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định doanh thu."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S1-DNSN) để ghi doanh thu bán hàng hóa, dịch vụ."},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S1-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm:........"},{"k":"p","t":"Đơn vị tính:......."},{"k":"tbl","rows":[["Hóa đơn, Chứng từ","Hóa đơn, Chứng từ","Diễn giải","Số tiền"],["Số hiệu","Ngày, tháng","Diễn giải","Số tiền"],["A","B","C","1"],["","","1. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","……",""],["","","Tổng cộng (1)",""],["","","Thuế GTGT",""],["","","Thuế TNDN",""],["","","2. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","….",""],["","","Tổng cộng (2)",""],["","","Thuế GTGT",""],["","","Thuế TNDN",""],["","","3. Nhóm hàng hóa, dịch vụ, ngành nghề....",""],["","","….",""],["","","Tổng cộng (3)",""],["","","Thuế GTGT",""],["","","Thuế TNDN",""],["","","Tổng số thuế GTGT phải nộp",""],["","","Tổng số thuế TNDN phải nộp",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN THEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"b) Nội dung: Sổ này được mở để ghi doanh thu bán hàng hóa, cung cấp dịch vụ trong kỳ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT hoặc cùng tỷ lệ % tính thuế TNDN. Trường hợp doanh nghiệp siêu nhỏ có nhiều nhóm hàng hóa, dịch vụ, ngành nghề khác nhau thì sổ này có thể mở cho từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT hoặc cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh doanh thu bán hàng hóa, dịch vụ. Tùy theo yêu cầu quản lý, doanh nghiệp siêu nhỏ có thể ghi doanh thu theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, cung cấp dịch vụ có cùng tỷ lệ % tính thuế GTGT hoặc cùng tỷ lệ % tính thuế TNDN. Trên cơ sở doanh thu bán hàng hóa, dịch vụ trong kỳ, doanh nghiệp siêu nhỏ xác định số thuế GTGT, thuế TNDN phải nộp theo quy định của pháp luật thuế. Dòng cuối cùng ghi tổng số thuế GTGT, thuế TNDN phải nộp trong kỳ."}]},{"id":"tt58_6","no":6,"code":"Điều 6","title":"Điều 6. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo tỷ lệ % trên doanh thu và nộp thuế TNDN trên thu nhập tính thuế","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo tỷ lệ % trên doanh thu và nộp thuế TNDN trên thu nhập tính thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định các khoản doanh thu, thu nhập, các khoản chi phí và số thuế GTGT, thuế TNDN phải nộp, đã nộp trong kỳ."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây"},{"k":"tbl","rows":[["STT","Tên sổ kế toán","Ký hiệu"],["1","Sổ doanh thu bán hàng hóa, dịch vụ","Mẫu số S2a-DNSN"],["2","Sổ chi tiết doanh thu, chi phí","Mẫu số S2b-DNSN"],["3","Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa","Mẫu số S2c-DNSN"],["4","Sổ chi tiết tiền","Mẫu số S2d-DNSN"]]},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-DNSN)"},{"k":"p","t":"a1) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S2a-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỐ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm: ......................."},{"k":"p","t":"Đơn vị tính:............."},{"k":"tbl","rows":[["Hóa đơn, Chứng từ","Hóa đơn, Chứng từ","Diễn giải","Số tiền"],["Số hiệu","Ngày, tháng","Diễn giải",""],["A","B","C","1"],["","","Số thuế GTGT còn phải nộp đầu kỳ (1)",""],["","","Số phát sinh trong kỳ",""],["","","A. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","…..",""],["","","Tổng cộng (1)",""],["","","Thuế GTGT",""],["","","B. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","…..",""],["","","Tổng cộng (2)",""],["","","Thuế GTGT",""],["","","C. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","Tổng cộng (3)",""],["","","Thuế GTGT",""],["","","Tổng số thuế GTGT phải nộp trong kỳ (2)",""],["","","Số thuế GTGT đã nộp trong kỳ (3)",""],["","","Số thuế GTGT còn phải nộp cuối kỳ {(4)= (1)+ (2) - (3)}",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN THEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"a2) Nội dung"},{"k":"p","t":"Sổ này được mở để ghi doanh thu bán hàng hóa, cung cấp dịch vụ trong kỳ theo từng nhóm hàng hóa, dịch vụ, ngành nghề kinh doanh có cùng tỷ lệ % tính thuế GTGT. Trường hợp doanh nghiệp siêu nhỏ có nhiều nhóm hàng hóa, dịch vụ, ngành nghề khác nhau thì sổ này có thể mở cho từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT."},{"k":"p","t":"a3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT. Doanh nghiệp siêu nhỏ có thể ghi doanh thu theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ theo từng ngành, nghề có cùng tỷ lệ % tính thuế GTGT. Trên cơ sở doanh thu bán hàng hóa, dịch vụ trong kỳ, doanh nghiệp siêu nhỏ xác định số thuế GTGT phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Dòng “Số thuế GTGT còn phải nộp đầu kỳ”: Doanh nghiệp siêu nhỏ căn cứ số thuế GTGT còn phải nộp cuối kỳ trước chuyển sang để theo dõi, phản ánh số thuế GTGT còn phải nộp đầu kỳ."},{"k":"p","t":"- Dòng \"Số phát sinh trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề hoặc theo từng giao dịch có cùng tỷ lệ % tính thuế GTGT phát sinh trong kỳ."},{"k":"p","t":"- Dòng \"Tổng số thuế GTGT phải nộp trong kỳ\": Doanh nghiệp siêu nhỏ căn cứ số thuế GTGT phải nộp theo từng ngành, nghề có cùng tỷ lệ % tính thuế GTGT để xác định tổng số thuế GTGT phải nộp trong kỳ."},{"k":"p","t":"- Dòng \"Số thuế GTGT đã nộp trong kỳ\": Doanh nghiệp siêu nhỏ ghi số thuế GTGT đã nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế GTGT còn phải nộp cuối kỳ\": Doanh nghiệp siêu nhỏ căn cứ chênh lệch của số thuế GTGT còn phải nộp đầu kỳ, số thuế GTGT phải nộp trong kỳ, số thuế GTGT đã nộp trong kỳ để xác định số thuế GTGT còn phải nộp cuối kỳ chuyển sang kỳ sau."},{"k":"p","t":"b) Sổ chi tiết doanh thu, chi phí (Mẫu số S2b-DNSN)"},{"k":"p","t":"b1) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .................\nĐịa chỉ:...................","Mẫu số S2b-DNSN\n(Kèm theo Thông tư số 58/ hập trong kỳ)"],["Đơn giá xuất kho =","(Số lượng hàng tồn đầu kỳ + số lượng hàng nhập trong kỳ)"]]},{"k":"p","t":"- Cột 2: Ghi số lượng của từng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Cột 3: Ghi giá trị (thành tiền) của từng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho (Cột 3 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 4: Ghi số lượng của từng vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho."},{"k":"p","t":"- Cột 5: Ghi giá trị (thành tiền) của từng vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (Cột 5 = Cột 1 x Cột 4)."},{"k":"p","t":"- Cột 6: Ghi số lượng của từng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho."},{"k":"p","t":"- Cột 7: Ghi giá trị (thành tiền) của từng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho (Cột 7 = Cột 1 x Cột 6)."},{"k":"p","t":"d) Sổ chi tiết tiền (Mẫu số S2d-DNSN)"},{"k":"p","t":"d1) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S2d-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỔ CHI TIẾT TIỀN"},{"k":"p","t":"Năm: ............"},{"k":"p","t":"Đơn vị tính:.........."},{"k":"tbl","rows":[["Hóa đơn, Chứng từ","Hóa đơn, Chứng từ","Diễn giải","Số tiền","Số tiền"],["Số hiệu","Ngày tháng","Diễn giải","Thu/Gửi vào","Chi/Rút ra"],["A","B","C","1","2"],["","","Tiền mặt","",""],["","","Tiền mặt tồn đầu kỳ","",""],["","","....","",""],["","","Tổng tiền thu vào trong kỳ","",""],["","","Tổng tiền chi ra trong kỳ","",""],["","","Tiền mặt tồn cuối kỳ","",""],["","","Tiền gửi không kỳ hạn","",""],["","","Ngân hàng….","",""],["","","Tiền gửi tồn đầu kỳ","",""],["","","…..","",""],["","","Tổng tiền gửi vào trong kỳ","",""],["","","Tổng tiền rút ra trong kỳ","",""],["","","Tiền gửi tồn cuối kỳ","",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN THEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"d2) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi tình hình thu, chi bằng tiền mặt hoặc tiền gửi không kỳ hạn (tiền gửi để thanh toán) trong tài khoản của doanh nghiệp siêu nhỏ tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán theo quy định của pháp luật. Doanh nghiệp có thể mở sổ này chi tiết theo từng loại tiền (tiền mặt, tiền gửi không kỳ hạn). Đối với tiền gửi không kỳ hạn, sổ này có thể được mở để theo dõi riêng số tiền gửi tại từng ngân hàng hoặc từng tổ chức cung ứng dịch vụ thanh toán."},{"k":"p","t":"d3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1, 2: Ghi số tiền thu, chi tiền mặt hoặc số tiền gửi không kỳ hạn gửi vào, rút ra."},{"k":"p","t":"Cuối kỳ, doanh nghiệp siêu nhỏ tính ra số tiền mặt thu, chi, tồn quỹ và số tiền gửi không kỳ hạn gửi vào, rút ra, dư cuối kỳ."}]},{"id":"tt58_7","no":7,"code":"Điều 7","title":"Điều 7. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và thuế TNDN theo tỷ lệ % trên doanh thu","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và thuế TNDN theo tỷ lệ % trên doanh thu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định doanh thu."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây"},{"k":"tbl","rows":[["STT","Tên sổ kế toán","Ký hiệu"],["1","Sổ doanh thu bán hàng hóa, dịch vụ","Mẫu số S3a- DNSN"],["2","Sổ theo dõi nghĩa vụ thuế GTGT","Mẫu số S3b- DNSN"]]},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S3a- DNSN)"},{"k":"p","t":"a1) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S3a-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm: ............"},{"k":"p","t":"Đơn vị tính:............"},{"k":"tbl","rows":[["Hóa đơn, Chứng từ","Hóa đơn, Chứng từ","Diễn giải","Số tiền"],["Số hiệu","Ngày, tháng","Diễn giải","Số tiền"],["A","B","C","1"],["","","Số thuế TNDN còn phải nộp đầu kỳ (1)",""],["","","Số phát sinh trong kỳ",""],["","","A. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","….",""],["","","Tổng cộng (1)",""],["","","Thuế TNDN",""],["","","B. Nhóm hàng hóa, dịch vụ, ngành nghề ....",""],["","","…..",""],["","","Tổng cộng (2)",""],["","","Thuế TNDN",""],["","","Tổng số thuế TNDN phải nộp trong kỳ (2)",""],["","","Số thuế TNDN đã nộp trong kỳ (3)",""],["","","Số thuế TNDN còn phải nộp cuối kỳ {(4)= (1)+(2)-(3)}",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN THEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"a2) Nội dung"},{"k":"p","t":"Sổ này được mở để ghi doanh thu bán hàng hóa, cung cấp dịch vụ trong kỳ theo từng nhóm hàng hóa, dịch vụ, ngành nghề kinh doanh có cùng tỷ lệ % tính thuế TNDN. Trường hợp doanh nghiệp siêu nhỏ có nhiều nhóm hàng hóa, dịch vụ, ngành nghề khác nhau thì sổ này có thể mở cho từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"a3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"- Dòng “Số thuế TNDN còn phải nộp đầu kỳ\": Doanh nghiệp siêu nhỏ căn cứ số thuế TNDN phải nộp kỳ trước chuyển sang để theo dõi, phản ánh số thuế TNDN còn phải nộp đầu kỳ."},{"k":"p","t":"- Dòng “Số phát sinh trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề hoặc theo từng giao dịch có cùng tỷ lệ % tính thuế TNDN phát sinh trong kỳ. Doanh nghiệp siêu nhỏ có thể ghi doanh thu theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Dòng “Tổng số thuế TNDN phải nộp trong kỳ\": Trên cơ sở doanh thu bán hàng hóa, dịch vụ trong kỳ, doanh nghiệp siêu nhỏ xác định số tiền thuế TNDN phải nộp theo từng ngành, nghề hoặc theo từng giao dịch có cùng tỷ lệ % tính thuế TNDN để xác định tổng số thuế TNDN phải nộp trong kỳ theo quy định của pháp luật thuế."},{"k":"p","t":"- Dòng “Số thuế TNDN đã nộp trong kỳ\": Doanh nghiệp siêu nhỏ ghi số tiền thuế TNDN đã tạm nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế TNDN còn phải nộp cuối kỳ\": Doanh nghiệp siêu nhỏ căn cứ số thuế TNDN còn phải nộp kỳ trước; số thuế TNDN phải nộp và số thuế TNDN đã tạm nộp trong kỳ để xác định số tiền thuế TNDN còn phải nộp cuối kỳ chuyển sang kỳ sau."},{"k":"p","t":"b) Sổ theo dõi nghĩa vụ thuế GTGT (Mẫu số S3b- DNSN)"},{"k":"p","t":"b1) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S3b-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỔ THEO DÕI NGHĨA VỤ THUẾ GTGT"},{"k":"p","t":"Năm:........"},{"k":"p","t":"Đơn vị tính:............."},{"k":"tbl","rows":[["Hóa đơn, chứng từ","Hóa đơn, chứng từ","Diễn giải","Số thuế GTGT đầu vào","Số thuế GTGT đầu ra"],["Số hiệu","Ngày, tháng","Diễn giải","Số thuế GTGT đầu vào","Số thuế GTGT đầu ra"],["A","B","C","1","2"],["","","Số dư đầu kỳ","",""],["","","Số thuế GTGT còn được khấu trừ hoặc được hoàn đầu kỳ","",""],["","","Số thuế GTGT còn phải nộp đầu kỳ","",""],["","","Số phát sinh trong kỳ","",""],["","","...","",""],["","","...","",""],["","","...","",""],["","","Cộng số phát sinh trong kỳ","",""],["","","Tổng số thuế GTGT phải nộp trong kỳ (2)","",""],["","","....","",""],["","","Số thuế GTGT đã nộp trong kỳ (3)","",""],["","","...","",""],["","","Số thuế GTGT đã được hoàn trong kỳ (4)","",""],["","","...","",""],["","","Số dư cuối kỳ","",""],["","","Số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ","",""],["","","Số thuế GTGT còn phải nộp cuối kỳ","",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Ngày ... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN THEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"b2) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi tình hình thực hiện nghĩa vụ thuế GTGT mà doanh nghiệp siêu nhỏ phải nộp, đã nộp và còn phải nộp. Thông tin, số liệu trên sổ này làm căn cứ để cơ quan thuế xác định doanh nghiệp có nộp thuế đúng, đủ và kịp thời vào ngân sách nhà nước theo quy định của pháp luật thuế hay không."},{"k":"p","t":"b3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Dòng “Số dư đầu kỳ”: Doanh nghiệp siêu nhỏ căn cứ nghĩa vụ thuế GTGT cuối kỳ trước chuyển sang là số thuế GTGT còn được khấu trừ hoặc được hoàn hoặc là số thuế GTGT còn phải nộp để ghi dòng số dư đầu kỳ tương ứng với cột 1 hoặc cột 2."},{"k":"p","t":"- Dòng “Số phát sinh trong kỳ”: Doanh nghiệp siêu nhỏ căn cứ vào hóa đơn, chứng từ phát sinh trong kỳ liên quan đến số thuế GTGT đầu vào được khấu trừ để ghi nhận vào cột 1, liên quan đến số thuế GTGT đầu ra để ghi nhận vào cột 2."},{"k":"p","t":"- Dòng “Tổng số thuế GTGT phải nộp trong kỳ\": Doanh nghiệp siêu nhỏ căn cứ chênh lệch giữa số thuế GTGT đầu ra và số thuế GTGT đầu vào được khấu trừ để xác định số thuế GTGT phải nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế GTGT đã nộp trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh số thuế GTGT doanh nghiệp đã nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế GTGT đã được hoàn trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh số thuế GTGT doanh nghiệp đã được hoàn trong kỳ."},{"k":"p","t":"- Dòng “Số dư cuối kỳ\": Doanh nghiệp siêu nhỏ căn cứ vào số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ để ghi nhận vào dòng “Số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ\" tại cột 1; căn cứ vào số thuế GTGT còn phải nộp cuối kỳ để ghi nhận vào dòng “Số thuế GTGT còn phải nộp cuối kỳ\" tại cột 2. Trong đó:"},{"k":"p","t":"+ Số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ = số thuế GTGT đầu vào dư đầu kỳ + số thuế GTGT đầu vào phát sinh trong kỳ - số thuế GTGT đầu ra phát sinh trong kỳ + số thuế GTGT đã nộp trong kỳ - số thuế GTGT đã được hoàn trong kỳ."},{"k":"p","t":"+ Số thuế GTGT còn phải nộp cuối kỳ = số thuế GTGT đầu ra phải nộp dư đầu kỳ + số thuế GTGT đầu ra phát sinh trong kỳ - số thuế GTGT đầu vào phát sinh trong kỳ - số thuế GTGT đã nộp trong kỳ + số thuế GTGT đã được hoàn trong kỳ."}]},{"id":"tt58_8","no":8,"code":"Điều 8","title":"Điều 8. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN trên thu nhập tính thuế","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN trên thu nhập tính thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định các khoản doanh thu, thu nhập, các khoản chi phí và số thuế GTGT, thuế TNDN phải nộp, đã nộp trong kỳ."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây:"},{"k":"tbl","rows":[["STT","Tên sổ kế toán","Ký hiệu"],["1","Sổ chi tiết doanh thu, chi phí","Mẫu số S2b-DNSN"],["2","Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa","Mẫu số S2c-DNSN"],["3","Sổ chi tiết tiền","Mẫu số S2d-DNSN"],["4","Sổ theo dõi nghĩa vụ thuế GTGT","Mẫu số S3b-DNSN"]]},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ chi tiết doanh thu, chi phí (Mẫu số S2b-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết b điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"b) Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2c-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết c điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"c) Sổ chi tiết tiền (Mẫu số S2d-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết d điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"d) Sổ theo dõi nghĩa vụ thuế GTGT (Mẫu số S3b-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết b điểm 2.2 khoản 2 Điều 7 Thông tư này."}]},{"id":"tt58_9","no":9,"code":"Điều 9","title":"Điều 9. Danh mục sổ kế toán khác và chứng từ kế toán khác","shortTitle":"Danh mục sổ kế toán khác và chứng từ kế toán khác","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Danh mục sổ kế toán khác"},{"k":"p","t":"Ngoài các sổ kế toán hướng dẫn tại Điều 5, Điều 6, Điều 7, Điều 8 Thông tư này, căn cứ vào đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của đơn vị, doanh nghiệp siêu nhỏ có thể sử dụng các sổ kế toán chi tiết theo danh mục sau đây:"},{"k":"tbl","rows":[["STT","Tên sổ kế toán","Ký hiệu"],["1","Sổ chi tiết thanh toán công nợ","Mẫu số S4a-DNSN"],["2","Sổ tài sản cố định","Mẫu số S4b-DNSN"],["3","Sổ theo dõi nghĩa vụ thuế khác","Mẫu số S4c-DNSN"], ời hạn thanh toán, từng lần thanh toán,..."},{"k":"p","t":"Riêng các nghĩa vụ thuế và các khoản phải nộp nhà nước phản ánh vào sổ này không bao gồm thuế GTGT, thuế TNDN mà chỉ bao gồm thuế thu nhập cá nhân, thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường, thuế sử dụng đất và thuế khác."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi nội dung của nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột 1: Ghi giá trị các khoản nợ phải thu về bán hàng hóa, dịch vụ, cho vay, tạm ứng, ký cược, ký quỹ,...."},{"k":"p","t":"- Cột 2: Ghi giá trị các khoản nợ phải thu đã thu được tiền."},{"k":"p","t":"- Cột 3: Ghi giá trị các khoản nợ còn phải thu."},{"k":"p","t":"- Cột 4: Ghi giá trị các khoản nợ phải trả về mua hàng hóa, dịch vụ, khoản đi vay, nhận ký quỹ, ký cược,..."},{"k":"p","t":"- Cột 5: Ghi giá trị các khoản nợ phải trả đã trả tiền."},{"k":"p","t":"- Cột 6: Ghi giá trị các khoản nợ còn phải trả."},{"k":"p","t":"1.2. Sổ tài sản cố định (Mẫu số S4b-DNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S4b-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỔ TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"Loại tài sản:.............."},{"k":"tbl","rows":[["Ghi tăng TSCĐ","Ghi tăng TSCĐ","Ghi tăng TSCĐ","Ghi tăng TSCĐ","Ghi tăng TSCĐ","Số khấu hao TSCĐ","Số khấu hao TSCĐ","Số khấu hao TSCĐ","Ghi giảm TSCĐ","Ghi giảm TSCĐ","Ghi giảm TSCĐ"],["Chứng từ","Chứng từ","Tên, đặc điểm, ký hiệu TSCĐ","Tháng, năm đưa vào sử dụng","Nguyên giá TSCĐ","Khấu hao","Khấu hao","Khấu hao lũy kế","Chứng từ","Chứng từ","Lý do giảm TSCĐ"],["Số hiệu","Ngày, tháng","Tỷ lệ (%) khấu hao","Tháng, năm đưa vào sử dụng","Nguyên giá TSCĐ","Mức khấu hao","Số hiệu","Khấu hao lũy kế","Số hiệu","Ngày, tháng, năm","Lý do giảm TSCĐ"],["A","B","C","D","1","2", óa, dịch vụ thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"- Cột 4: Ghi mức thuế suất theo quy định của pháp luật thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế sử dụng đất."},{"k":"p","t":"- Cột 5: Thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế theo tỷ lệ %."},{"k":"p","t":"- Cột 6: Tính thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế tuyệt đối."},{"k":"p","t":"- Cột 7: Tính thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 8: Tính thuế bảo vệ môi trường phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 9: Tính thuế tài nguyên phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 10: Tính thuế sử dụng đất phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 11: Tính thuế khác theo quy định của pháp luật thuế."},{"k":"p","t":"1.4. Sổ theo dõi vốn chủ sở hữu (Mẫu số S4d-DNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số S4d-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"SỔ THEO DÕI VỐN CHỦ SỞ HỮU"},{"k":"p","t":"Năm:............"},{"k":"p","t":"Đơn vị tính:..............."},{"k":"tbl","rows":[["Chứng từ","Chứng từ","Diễn giải","Tăng trong kỳ","Giảm trong kỳ","Số dư"],["Số hiệu","Ngày, tháng","Diễn giải","Tăng trong kỳ","Giảm trong kỳ","Số dư"],["A","B","C","1","2","3"],["","","1. Vốn góp của chủ sở hữu","","",""],["","","1.1. Số dư đầu kỳ","","",""],["","","1.2. Phát sinh trong kỳ","","",""],["","","1.3. Số dư cuối kỳ","","",""],["","","2. Lợi nhuận sau thuế chưa phân phối","","",""],["","","2.1. Số dư đầu kỳ","","",""],["","","2.2. Phát sinh trong kỳ","","",""],["","","………","","",""],["","","2.3. Số dư cuối kỳ","","",""],["","","3. Các quỹ thuộc vốn chủ sở hữu","","",""],["","","3.1. Số dư đầu kỳ","","" ............................................."},{"k":"p","t":"- Số chứng từ gốc kèm theo:..............................................."},{"k":"p","t":"Ngày ... tháng ... năm ..."},{"k":"tbl","rows":[["NGƯỜI GIAO HÀNG\n(Ký, ghi rõ họ tên)","THỦ KHO\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG \n(Hoặc bộ phận có nhu cầu nhập) \n(Ký, ghi rõ họ tên)"]]},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Chứng từ này được lập để theo dõi và phản ánh vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho do mua ngoài, tự sản xuất, thuê ngoài gia công chế biến, nhận góp vốn hoặc thừa phát hiện trong kiểm kê làm căn cứ ghi sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa, thanh toán tiền hàng, xác định trách nhiệm với người có liên quan và ghi sổ kế toán."},{"k":"p","t":"c) Phương pháp lập"},{"k":"p","t":"Góc trên bên trái của Phiếu nhập kho phải ghi rõ tên của đơn vị, bộ phận nhập kho. Phiếu nhập kho có thể lập cho một hoặc nhiều loại vật liệu, dụng cụ, sản phẩm, hàng hóa cùng nhập tại một kho."},{"k":"p","t":"Khi lập phiếu nhập kho phải ghi rõ số phiếu nhập và ngày, tháng, năm lập phiếu; họ tên người giao vật liệu, dụng cụ, sản phẩm, hàng hóa; số hóa đơn hoặc lệnh nhập kho; tên kho, địa điểm nhập kho."},{"k":"p","t":"- Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, quy cách, phẩm chất; mã số và đơn vị tính của vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi số lượng theo chứng từ (hóa đơn hoặc lệnh nhập)."},{"k":"p","t":"- Cột 2: Ghi số lượng thực nhập vào kho."},{"k":"p","t":"- Cột 3, 4: Ghi đơn giá và tính ra số tiền của từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa thực nhập kho (cột 4 = cột 2 x cột 3)."},{"k":"p","t":"- Dòng cộng: Ghi tổng số tiền của các loại vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Dòng “Tổng số tiền (viết bằng chữ)”: Ghi tổng số tiền trên Phiếu nhập kho bằng chữ."},{"k":"p","t":"2.4. Phiếu xuất kho (Mẫu số 02-VT)"},{"k":"p","t":"a) Biểu mẫu chứng từ kế toán"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số 02-VT\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"PHIẾU XUẤT KHO"},{"k":"p","t":"Ngày....tháng.....năm......  \t\tSố............."},{"k":"p","t":"- Họ và tên người nhận hàng:...............Địa  chỉ (bộ phận)....................."},{"k":"p","t":"- Lý do xuất kho:..............................."},{"k":"p","t":"- Xuất tại kho (ngăn lô):................... Địa  điểm.................."},{"k":"tbl","rows":[["STT","Tên, nhãn hiệu, quy cách, phẩm chất vật liệu, dụng cụ, sản phẩm, hàng hóa","Mã\nSố","Đơn vị tính","Số lượng","Số lượng","Đơn giá","Thành tiền"],["STT","Tên, nhãn hiệu, quy cách, phẩm chất vật liệu, dụng cụ, sản phẩm, hàng hóa","Mã\nSố","Đơn vị tính","Yêu cầu","Thực xuất","Đơn giá","Thành tiền"],["A","B","C","D","1","2","3","4"],["","","","","","","",""],["","Cộng","x","x","","","",""]]},{"k":"p","t":"- Tổng số tiền (viết bằng chữ): ..........................."},{"k":"p","t":"- Số chứng từ gốc kèm theo:............................"},{"k":"p","t":"Ngày ... tháng ... năm ..."},{"k":"tbl","rows":[["NGƯỜI NHẬN HÀNG\n(Ký, ghi rõ họ tên)","THỦ KHO\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG \n(Hoặc bộ phận có nhu cầu nhập) \n(Ký, ghi rõ họ tên)","GIÁM ĐỐC\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Chứng từ này được lập để theo dõi vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho cho các bộ phận sử dụng trong doanh nghiệp, làm căn cứ để hạch toán chi phí sản xuất kinh doanh, tính và kiểm tra việc sử dụng, thực hiện định mức tiêu hao vật tư."},{"k":"p","t":"c) Phương pháp lập"},{"k":"p","t":"Góc bên trái của Phiếu xuất kho phải ghi rõ tên của đơn vị, bộ phận xuất kho. Phiếu xuất kho có thể lập cho một hoặc nhiều loại vật liệu, dụng cụ, sản phẩm, hàng hóa cùng xuất tại một kho."},{"k":"p","t":"Khi lập phiếu xuất kho phải ghi rõ số phiếu xuất và ngày, tháng, năm lập phiếu; họ tên, đơn vị (bộ phận) của người nhận vật liệu, dụng cụ, sản phẩm, hàng hóa; lý do xuất kho; tên kho, địa điểm xuất kho."},{"k":"p","t":"- Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, quy cách, phẩm chất, mã số và đơn vị tính của vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa yêu cầu xuất kho."},{"k":"p","t":"- Cột 2: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa thực tế xuất kho (số lượng thực tế xuất kho chỉ có thể bằng hoặc ít hơn số lượng yêu cầu)."},{"k":"p","t":"- Cột 3, 4: Ghi đơn giá và tính thành tiền của từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (cột 4 = cột 2 x cột 3)."},{"k":"p","t":"- Dòng Cộng: Ghi tổng số tiền của các loại vật liệu, dụng cụ, sản phẩm, hàng hóa thực tế đã xuất kho."},{"k":"p","t":"- Dòng \"Tổng số tiền (viết bằng chữ)\": Ghi tổng số tiền viết bằng chữ trên Phiếu xuất kho."}]},{"id":"tt58_10","no":10,"code":"Điều 10","title":"Điều 10. Báo cáo tài chính","shortTitle":"Báo cáo tài chính","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Về trách nhiệm lập và nộp báo cáo tài chính"},{"k":"p","t":"a) Hàng năm, doanh nghiệp siêu nhỏ nộp thuế TNDN theo phương pháp tính thuế trên thu nhập tính thuế phải lập báo cáo tài chính theo hướng dẫn tại Thông tư này, trừ trường hợp pháp luật có quy định khác."},{"k":"p","t":"Báo cáo tài chính năm của doanh nghiệp siêu nhỏ phải được nộp cho cơ quan nhà nước có thẩm quyền trong thời hạn 90 ngày, kể từ ngày kết thúc kỳ kế toán năm."},{"k":"p","t":"Nơi nhận báo cáo tài chính của doanh nghiệp siêu nhỏ được thực hiện theo quy định của pháp luật có liên quan, trường hợp khi báo cáo tài chính của doanh nghiệp siêu nhỏ được lưu giữ tại Hệ thống thông tin quốc gia về đăng ký doanh nghiệp thì các cơ quan nhận báo cáo tài chính của doanh nghiệp được yêu cầu cung cấp thông tin về báo cáo tài chính của doanh nghiệp theo quy định của pháp luật."},{"k":"p","t":"b) Doanh nghiệp siêu nhỏ nộp thuế TNDN theo tỷ lệ % trên doanh thu bán hàng hóa, dịch vụ không bắt buộc phải lập báo cáo tài chính để nộp cho cơ quan nhà nước có thẩm quyền, trừ trường hợp pháp luật khác có yêu cầu."},{"k":"p","t":"Trường hợp doanh nghiệp siêu nhỏ nộp thuế TNDN theo tỷ lệ % trên doanh thu bán hàng hóa, dịch vụ nếu lựa chọn áp dụng chế độ kế toán quy định tại Điều 6, Điều 8 Thông tư này để phục vụ cho nhu cầu quản lý hoạt động sản xuất kinh doanh của doanh nghiệp thì vẫn lập báo cáo tài chính nhưng không bắt buộc phải nộp cho cơ quan nhà nước có thẩm quyền mà được bảo quản, lưu trữ, sử dụng tại doanh nghiệp theo quy định và cung cấp thông tin khi có yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Hệ thống báo cáo tài chính của doanh nghiệp siêu nhỏ"},{"k":"p","t":"2.1. Hàng năm, các doanh nghiệp siêu nhỏ nộp thuế TNDN theo phương pháp tính thuế trên thu nhập tính thuế lập các báo cáo tài chính theo danh mục sau đây:"},{"k":"tbl","rows":[["STT","Tên báo cáo tài chính","Ký hiệu"],["1","Báo cáo tình hình tài chính","Mẫu số B01 - DNSN"],["2","Báo cáo kết quả hoạt động kinh doanh","Mẫu số B02 - DNSN"]]},{"k":"p","t":"2.2. Biểu mẫu, nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ"},{"k":"p","t":"2.2.1. Báo cáo tình hình tài chính (Mẫu số B01 - DNSN)"},{"k":"p","t":"a) Biểu mẫu báo cáo tài chính"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:...............","Mẫu số B01-DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"BÁO CÁO TÌNH HÌNH TÀI CHÍNH"},{"k":"p","t":"Tại ngày... tháng... năm ..."},{"k":"p","t":"Đơn vị tính:............."},{"k":"tbl","rows":[["CHỈ TIÊU","Mã số","Số cuối năm","Số đầu năm"],["1","2","3","4"],["TÀI SẢN","","",""],["1. Tiền","110","",""],["2. Các khoản nợ phải thu","120","",""],["3. Hàng tồn kho","130","",""],["4. Tài sản cố định","140","",""],["5. Tài sản khác","150","",""],["TỔNG CỘNG TÀI SẢN (200=110+120+130+140+150)","200","",""],["NGUỒN VỐN","","",""],["I. Nợ phải trả","300","",""],["1. Các khoản nợ phải trả","310","",""],["2. Thuế và các khoản phải nộp Nhà nước","320","",""],["II. Vốn chủ sở hữu","400","",""],["1. Vốn đầu tư của chủ sở hữu","410","",""],["2. Lợi nhuận sau thuế chưa phân phối","420","",""],["3. Các quỹ thuộc vốn chủ sở hữu","430","",""],["TỔNG CỘNG NGUỒN VỐN (500=300+400)","500","",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Phê duyệt, ngày... tháng ... năm ...\nNGƯỜI ĐẠI DIỆN\nTHEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"b) Nội dung và phương pháp lập báo cáo tình hình tài chính"},{"k":"p","t":"b1) Tài sản"},{"k":"p","t":"- Tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ số dư tiền mặt tại quỹ, tiền gửi không kỳ hạn (tiền gửi để thanh toán) trong tài khoản của doanh nghiệp siêu nhỏ tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư cuối kỳ của tiền mặt và tiền gửi không kỳ hạn trên sổ chi tiết tiền."},{"k":"p","t":"- Các khoản nợ phải thu (Mã số 120)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị các khoản nợ phải thu của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán, như: Phải thu của khách hàng, thuế GTGT được khấu trừ, phải thu về cho vay, tạm ứng, ký cược, ký quỹ,...."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ của các khoản nợ phải thu trên sổ chi tiết thanh toán công nợ và các sổ kế toán khác có liên quan."},{"k":"p","t":"- Hàng tồn kho (Mã số 130)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị các loại hàng tồn kho dự trữ cho quá trình sản xuất, kinh doanh của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư cuối kỳ của các hàng tồn kho trên các sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Tài sản cố định (Mã số 140)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị còn lại (nguyên giá trừ giá trị hao mòn lũy kế) của các loại TSCĐ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư cuối kỳ chi tiết của các loại TSCĐ trên sổ TSCĐ."},{"k":"p","t":"- Tài sản khác (Mã số 150)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các tài sản khác ngoài các tài sản đã được phản ánh tại các Mã số 110, 120, 130, 140 nêu trên (nếu có), ví dụ tiền gửi có kỳ hạn (tiền gửi tiết kiệm,...), chênh lệch số thuế doanh nghiệp đã tạm nộp lớn hơn số thuế phải nộp Nhà nước,...."},{"k":"p","t":"- Tổng cộng tài sản (Mã số 200)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng trị giá tài sản của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Mã số 200 = Mã số 110 + Mã số 120 + Mã số 130 + Mã số 140 + Mã số 150"},{"k":"p","t":"b2) Nợ phải trả (Mã số 300)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ số nợ phải trả của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Mã số 300 = Mã số 310 + Mã số 320"},{"k":"p","t":"- Các khoản nợ phải trả (Mã số 310)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền mà doanh nghiệp siêu nhỏ còn phải trả cho các đối tượng công nợ như phải trả người bán, phải trả nợ vay, tiền lương và các khoản trích theo lương, nhận ký quỹ, ký cược, các khoản nợ phải trả khác,"},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ của các khoản nợ phải trả trên sổ chi tiết thanh toán công nợ."},{"k":"p","t":"- Thuế và các khoản phải nộp Nhà nước (Mã số 320)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản thuế GTGT, thuế TNDN và các nghĩa vụ thuế khác mà doanh nghiệp siêu nhỏ còn phải nộp Nhà nước tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Tùy theo từng phương pháp tính thuế GTGT, thuế TNDN và các nghĩa vụ thuế khác, số liệu ghi vào chỉ tiêu này căn cứ vào số dư chi tiết cuối kỳ trên các sổ doanh thu bán hàng hóa, dịch vụ; sổ theo dõi nghĩa vụ thuế GTGT; sổ chi tiết doanh thu, chi phí; sổ chi tiết thanh toán công nợ,..."},{"k":"p","t":"b3) Vốn chủ sở hữu (Mã số 400)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản vốn chủ sở hữu của doanh nghiệp siêu nhỏ, bao gồm vốn đầu tư của chủ sở hữu, lợi nhuận sau thuế chưa phân phối và các quỹ thuộc vốn chủ sở hữu."},{"k":"p","t":"Mã số 400 = Mã số 410 + Mã số 420 + Mã số 430"},{"k":"p","t":"- Vốn đầu tư của chủ sở hữu (Mã số 410)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số vốn mà các chủ sở hữu (cổ đông, thành viên góp vốn) đã thực góp vào doanh nghiệp tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ trên Sổ theo dõi vốn chủ sở hữu (chi tiết vốn góp của chủ sở hữu)."},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối (Mã số 420)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi (hoặc lỗ) sau thuế chưa phân phối còn lại tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ trên Sổ theo dõi vốn chủ sở hữu (chi tiết lợi nhuận sau thuế chưa phân phối)."},{"k":"p","t":"- Các quỹ thuộc vốn chủ sở hữu (Mã số 430)"},{"k":"p","t":"Chỉ tiêu này phản ánh số dư các quỹ thuộc vốn chủ sở hữu tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ trên Sổ theo dõi vốn chủ sở hữu (chi tiết các quỹ thuộc vốn chủ sở hữu)."},{"k":"p","t":"- Tổng cộng nguồn vốn (Mã số 500)"},{"k":"p","t":"Phản ánh tổng số các nguồn vốn hình thành tài sản của doanh nghiệp tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Mã số 500 = Mã số 300 + Mã số 400."},{"k":"p","t":"Chỉ tiêu “Tổng cộng Tài sản” = Chỉ tiêu “Tổng cộng Nguồn vốn”"},{"k":"p","t":"(Mã số 200)\t\t\t\t(Mã số 500)"},{"k":"p","t":"2.2.2. Báo cáo kết quả hoạt động kinh doanh (Mẫu số B02 - DNSN)"},{"k":"p","t":"a) Biểu mẫu báo cáo tài chính"},{"k":"tbl","rows":[["ĐƠN VỊ: .............\nĐịa chỉ:..............","Mẫu số B02 - DNSN\n(Kèm theo Thông tư số 58/2026/TT-BTC ngày 25 tháng 5 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"BÁO CÁO KẾT QUẢ HOẠT ĐỘNG KINH DOANH"},{"k":"p","t":"Năm.................."},{"k":"p","t":"Đơn vị tính:................"},{"k":"tbl","rows":[["Chỉ tiêu","Mã\nsố","Năm\nNay","Năm trước"],["1","2","3","4"],["1. Doanh thu và thu nhập thuần","01","",""],["2. Các khoản chi phí","02","",""],["3. Lợi nhuận kế toán trước thuế TNDN {(03)= (01)-(02)}","03","",""],["4. Chi phí thuế TNDN","10","",""],["5. Lợi nhuận sau thuế TNDN {(20) = (03)-( 10)}","20","",""]]},{"k":"tbl","rows":[["NGƯỜI LẬP BIỂU\n(Ký, ghi rõ họ tên)","KẾ TOÁN TRƯỞNG\n(Ký, ghi rõ họ tên)","Phê duyệt, ngày... tháng ... năm ... \nNGƯỜI ĐẠI DIỆN\nTHEO PHÁP LUẬT\n(Ký, ghi rõ họ tên, đóng dấu)"]]},{"k":"p","t":"b) Nội dung và phương pháp lập báo cáo tài chính"},{"k":"p","t":"b1) Doanh thu và thu nhập thuần (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng doanh thu thuần về bán hàng và cung cấp dịch vụ và thu nhập khác sau khi đã trừ đi các khoản giảm trừ doanh thu trong kỳ báo cáo (nếu có)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ tổng doanh thu bán hàng hóa, dịch vụ và các khoản thu nhập khác trên sổ chi tiết doanh thu, chi phí hoặc Sổ doanh thu bán hàng hóa, dịch vụ."},{"k":"p","t":"b2) Các khoản chi phí (Mã số 02)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số chi phí phát sinh trong kỳ báo cáo gồm chi phí nguyên vật liệu, chi phí nhân công, chi phí khấu hao tài sản cố định, chi phí dịch vụ mua ngoài, chi phí lãi vay,..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng chi phí trong kỳ trên sổ chi tiết doanh thu, chi phí."},{"k":"p","t":"b3) Lợi nhuận kế toán trước thuế TNDN (Mã số 03)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số lợi nhuận thuần (hoặc lỗ) từ các hoạt động của doanh nghiệp siêu nhỏ. Số liệu để ghi vào chỉ tiêu này căn cứ vào số chênh lệch giữa doanh thu và thu nhập thuần với các khoản chi phí trong kỳ."},{"k":"p","t":"Mã số 03 = Mã số 01 - Mã số 02."},{"k":"p","t":"b4) Chi phí thuế TNDN (Mã số 10)"},{"k":"p","t":"Chỉ tiêu này phản ánh số chi phí thuế TNDN phải nộp trong năm báo cáo theo quy định của pháp luật thuế, số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số thuế TNDN phải nộp trên sổ chi tiết doanh thu, chi phí."},{"k":"p","t":"b5) Lợi nhuận sau thuế TNDN (Mã số 20)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lợi nhuận sau thuế TNDN của doanh nghiệp siêu nhỏ trong năm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào chênh lệch giữa lợi nhuận kế toán trước thuế TNDN và chi phí thuế TNDN."},{"k":"p","t":"Mã số 20 = Mã số 03 - Mã số 10."}]},{"id":"tt58_11","no":11,"code":"Điều 11","title":"Điều 11. Chuyển số dư trên sổ kế toán","shortTitle":"Chuyển số dư trên sổ kế toán","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ căn cứ vào số dư các tài khoản kế toán theo quy định tại Thông tư số 132/2018/TT-BTC ngày 28/12/2018 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho doanh nghiệp siêu nhỏ để thực hiện chuyển vào các sổ kế toán liên quan khi áp dụng Thông tư này như sau:"},{"k":"p","t":"a) Doanh nghiệp căn cứ vào số dư Nợ của TK 1111 \"Tiền mặt\" chuyển sang số dư đầu kỳ của sổ chi tiết tiền (chi tiết phần tiền mặt), số dư Nợ của TK 1112 \"Tiền gửi ngân hàng\" chuyển sang số dư đầu kỳ của Sổ chi tiết tiền (chi tiết phần tiền gửi không kỳ hạn (tiền gửi để thanh toán) tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán theo quy định của pháp luật;"},{"k":"p","t":"b) Doanh nghiệp căn cứ vào số dư Nợ TK 1311 “Phải thu khách hàng”, số dư Nợ TK 1318 “Các khoản nợ phải thu khác”, số dư Có TK 3311 “Phải trả người lao động”, số dư Có TK 3312 “Các khoản trích theo lương”, số dư Có TK 3318 “Các khoản nợ phải trả khác”, chuyển sang số dư đầu kỳ tương ứng với các khoản nợ phải thu hoặc các khoản nợ phải trả của sổ chi tiết thanh toán công nợ theo từng đối tượng công nợ;"},{"k":"p","t":"c) Doanh nghiệp căn cứ vào số dư Nợ TK 1313 “Thuế GTGT được khấu trừ”, số dư Có TK 33131 “Thuế GTGT phải nộp” chuyển sang các dòng tương ứng với số thuế GTGT đầu vào hoặc số thuế GTGT đầu ra trên sổ theo dõi nghĩa vụ thuế GTGT;"},{"k":"p","t":"d) Doanh nghiệp căn cứ số dư Nợ TK 1521 “Nguyên vật liệu, dụng cụ”, TK 1524 “Chi phí sản xuất kinh doanh dở dang”, TK 1526 “Thành phẩm, hàng hóa” chuyển sang số dư đầu kỳ trên sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa mở chi tiết cho từng vật liệu, dụng cụ, sản phẩm, hàng hóa;"},{"k":"p","t":"đ) Doanh nghiệp căn cứ số dư Nợ TK 211 “Tài sản cố định” chuyển sang số dư đầu kỳ của sổ Tài sản cố định;"},{"k":"p","t":"e) Doanh nghiệp căn cứ số dư Có của các TK 33134 “Thuế thu nhập doanh nghiệp”, TK 33138 “Thuế khác, phí, lệ phí và các khoản khác phải nộp Nhà nước” chuyển sang số dư đầu kỳ của các cột tương ứng trên sổ doanh thu bán hàng hóa, dịch vụ hoặc sổ theo dõi thuế GTGT (đối với thuế GTGT), sổ chi tiết doanh thu, chi phí (đối với thuế TNDN) và sổ chi tiết thanh toán công nợ (đối với thuế thu nhập cá nhân và các loại thuế khác);"},{"k":"p","t":"g) Doanh nghiệp căn cứ số dư Có của các TK 4111 “Vốn góp của chủ sở hữu”, TK 4118 “Lợi nhuận sau thuế chưa phân phối” chuyển sang số dư đầu kỳ của Sổ theo dõi vốn chủ sở hữu (chi tiết vốn góp của chủ sở hữu và lợi nhuận sau thuế chưa phân phối)."},{"k":"p","t":"2. Doanh nghiệp siêu nhỏ khi thay đổi chế độ kế toán áp dụng (do chuyển đổi phương pháp nộp thuế GTGT, thuế TNDN theo quy định của pháp luật thuế hoặc do lựa chọn hoặc bỏ lựa chọn áp dụng chế độ kế toán cho doanh nghiệp nhỏ và vừa) thì căn cứ số dư cuối kỳ trên các sổ kế toán kỳ trước để chuyển sang số dư đầu kỳ của sổ kế toán tương ứng ở kỳ sau cho phù hợp."}]},{"id":"tt58_12","no":12,"code":"Điều 12","title":"Điều 12. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/7/2026 và áp dụng cho năm tài chính bắt đầu từ ngày hoặc sau ngày 01/7/2026."},{"k":"p","t":"2. Thông tư số 132/2018/TT-BTC ngày 28/12/2018 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho doanh nghiệp siêu nhỏ hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành."},{"k":"p","t":"3. Ủy ban Nhân dân, Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các doanh nghiệp siêu nhỏ thực hiện Thông tư này."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng và các Phó Thủ tướng Chính phủ;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Quốc hội;\n- Hội đồng dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Chủ tịch nước;\n- Viện kiểm sát nhân dân tối cao;\n- Tòa án nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban trung ương Mặt trận Tổ quốc Việt Nam;\n- Liên đoàn Thương mại và Công nghiệp Việt Nam;\n-  Các Bộ, cơ quan ngang Bộ;\n- HĐNĐ, UBND các tỉnh, thành phố trực thuộc TW;\n- Sở Tài chính các tỉnh, thành phố trực thuộc TW;\n- Thuế các tỉnh, thành phố trực thuộc TW;\n- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính (Bộ Tư pháp);\n- Hiệp hội Kế toán và Kiểm toán Việt Nam;\n- Hội Kiểm toán viên hành nghề Việt Nam;\n- Cơ sở dữ liệu quốc gia về pháp luật;\n- Công báo; cổng thông tin điện tử: Chính phủ, Bộ Tài chính;\n- Các đơn vị thuộc và trực thuộc Bộ Tài chính;\n- Lưu: VT, Cục QLKT (50bản)","KT. BỘ TRƯỞNG\nTHỨ TRƯỞNG\n\n\n\n\n\n\n\nTạ Anh Tuấn"]]}]}],"forms":[{"code":"S1-DNSN","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Phụ lục I — Sổ kế toán","note":"Dùng cho DNSN nộp thuế GTGT và TNDN theo tỷ lệ % (Điều 5)"},{"code":"S2a-DNSN","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Phụ lục I — Sổ kế toán","note":"Dùng cho DNSN nộp thuế GTGT theo % và TNDN theo KT (Điều 6)"},{"code":"S2b-DNSN","title":"Sổ chi tiết doanh thu, chi phí","pl":"Phụ lục I — Sổ kế toán","note":"Điều 6, 8"},{"code":"S2c-DNSN","title":"Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa","pl":"Phụ lục I — Sổ kế toán","note":"Điều 6, 7, 8"},{"code":"S2d-DNSN","title":"Sổ chi tiết tiền","pl":"Phụ lục I — Sổ kế toán","note":"Điều 6, 7, 8"},{"code":"S3a-DNSN","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Phụ lục I — Sổ kế toán","note":"Dùng cho DNSN nộp thuế GTGT theo KT và TNDN theo % (Điều 7)"},{"code":"S3b-DNSN","title":"Sổ theo dõi nghĩa vụ thuế GTGT","pl":"Phụ lục I — Sổ kế toán","note":"Điều 7, 8"},{"code":"S4a-DNSN","title":"Sổ chi tiết thanh toán công nợ","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"S4b-DNSN","title":"Sổ tài sản cố định","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"S4c-DNSN","title":"Sổ theo dõi nghĩa vụ thuế khác","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"S4d-DNSN","title":"Sổ theo dõi vốn chủ sở hữu","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"01-TT","title":"Phiếu thu","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"02-TT","title":"Phiếu chi","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"01-VT","title":"Phiếu nhập kho","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"02-VT","title":"Phiếu xuất kho","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"B01-DNSN","title":"Báo cáo tình hình tài chính","pl":"Phụ lục III — Báo cáo tài chính","note":"Điều 10 — lập và trình bày BCTC"},{"code":"B02-DNSN","title":"Báo cáo kết quả hoạt động kinh doanh","pl":"Phụ lục III — Báo cáo tài chính","note":"Điều 10 — lập và trình bày BCTC"}],"accounts":[],"refs":{"tt58_2":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"taxpayer","label":"Luật 67/2025 — Điều 2: Đối tượng nộp thuế"},{"kind":"related","targetSlug":"tt133","targetAnchor":"tt133_1","label":"TT 133/2016 — DN nhỏ và vừa"},{"kind":"related","targetSlug":"tt152","targetAnchor":"tt152_1","label":"TT 152/2025 — Hộ kinh doanh"}],"tt58_5":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"rates","label":"Luật 67/2025 — Điều 10: Thuế suất 15%"},{"kind":"related","targetSlug":"luat-67","targetAnchor":"method","label":"Luật 67/2025 — Điều 11: Phương pháp tính thuế"}],"tt58_6":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"method","label":"Luật 67/2025 — Điều 11: Phương pháp tính thuế"}],"tt58_12":[{"kind":"replaces","targetSlug":null,"label":"Thay thế Thông tư 132/2018/TT-BTC","note":"(chưa nạp)"}]},"details":{"tt58_2":[{"match":"Đối tượng áp dụng Thông tư này là các doanh nghiệp siêu nhỏ","title":"TT 58 Điều 2 — DN siêu nhỏ (thuế suất 15%)","summary":"Đối tượng áp dụng TT 58 là DN siêu nhỏ — thường có doanh thu năm không quá 3 tỷ, áp dụng thuế suất 15% theo Điều 10.2 Luật 67. Khi tăng quy mô lên DN nhỏ/vừa, chuyển sang TT 133.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-10","label":"Luật 67 Điều 10 — Thuế suất 15% DN siêu nhỏ"},{"targetSlug":"tt133","targetAnchor":"tt133_2","label":"TT 133 Điều 2 — DN nhỏ và vừa"}]}],"tt58_5":[{"match":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật","title":"TT 58 Điều 5 — DN siêu nhỏ nộp thuế theo % doanh thu","summary":"DN siêu nhỏ nộp thuế GTGT và TNDN theo tỷ lệ % trên doanh thu — kế toán đơn giản hóa, không bắt buộc hệ thống TK kép. Phương pháp % doanh thu căn cứ Điều 11 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Tính thuế theo % doanh thu"}]}],"tt58_6":[{"match":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn","title":"TT 58 Điều 6 — DN siêu nhỏ nộp TNDN trên thu nhập tính thuế","summary":"Trường hợp DN siêu nhỏ nộp GTGT theo % doanh thu nhưng nộp TNDN trên thu nhập tính thuế (xác định được chi phí): áp dụng thuế suất 15% theo Điều 10.2 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-10","label":"Luật 67 Điều 10 — Thuế suất 15%"},{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Phương pháp tính thuế"}]}],"tt58_1":[{"match":"Thông tư này hướng dẫn về chứng từ kế toán, ghi sổ kế toán, lập và trình bày Báo cáo tài chính","title":"TT 58 Điều 1 — Phạm vi (kế toán DN siêu nhỏ)","summary":"TT 58 hướng dẫn chứng từ, ghi sổ, BCTC cho DN siêu nhỏ. Hộ kinh doanh thành lập DN siêu nhỏ được miễn thuế 2 năm (Điều 15 Luật 67); khi tăng quy mô chuyển sang TT 133.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-15","label":"Luật 67 Điều 15 — Miễn thuế 2 năm DN từ hộ KD"},{"targetSlug":"tt133","targetAnchor":"tt133_1","label":"TT 133 Điều 1 — Kế toán DN nhỏ và vừa"}]}],"tt58_3":[{"match":"Doanh nghiệp siêu nhỏ được bố trí người làm kế toán","title":"TT 58 Điều 3 — Tổ chức công tác kế toán (đơn giản hóa)","summary":"DN siêu nhỏ được bố trí người làm kế toán là người thân (cha mẹ, vợ/chồng, con...) và không bắt buộc bố trí kế toán trưởng — giảm gánh nặng tuân thủ cho DN siêu nhỏ.","links":[{"label":"Áp dụng cho DN siêu nhỏ — đơn giản hóa tổ chức kế toán","note":""}]}],"tt58_4":[{"match":"Doanh nghiệp siêu nhỏ căn cứ vào phương pháp nộp thuế giá trị gia tăng","title":"TT 58 Điều 4 — Áp dụng chế độ kế toán theo phương pháp nộp thuế","summary":"DN siêu nhỏ chọn chế độ kế toán tương ứng phương pháp nộp thuế GTGT/TNDN: theo % doanh thu (Điều 5) hoặc theo phương pháp khấu trừ + TNDN trên thu nhập tính thuế (Điều 7, 8). Phương pháp tính thuế căn cứ Điều 11 Luật 67.","links":[{"targetSlug":"tt58","targetAnchor":"tt58_5","label":"TT 58 Điều 5 — Nộp thuế theo % doanh thu"},{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Phương pháp tính thuế"}]}],"tt58_7":[{"match":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn","title":"TT 58 Điều 7 — Nộp GTGT khấu trừ, TNDN theo % doanh thu","summary":"Trường hợp DN siêu nhỏ nộp GTGT theo phương pháp khấu trừ và nộp TNDN theo tỷ lệ % trên doanh thu: chứng từ, sổ sách và cách ghi nhận tương ứng. Phương pháp % doanh thu căn cứ Điều 11 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-11","label":"Luật 67 Điều 11 — Tính thuế theo % doanh thu"}]}],"tt58_8":[{"match":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và","title":"TT 58 Điều 8 — Nộp GTGT khấu trừ, TNDN trên thu nhập tính thuế","summary":"Trường hợp DN siêu nhỏ nộp GTGT khấu trừ và nộp TNDN trên thu nhập tính thuế (xác định được doanh thu, chi phí): áp dụng thuế suất 15% theo Điều 10.2 Luật 67.","links":[{"targetSlug":"luat-67","targetAnchor":"dieu-10","label":"Luật 67 Điều 10 — Thuế suất 15%"}]}],"tt58_9":[{"match":"Danh mục sổ kế toán khác","title":"TT 58 Điều 9 — Danh mục sổ và chứng từ kế toán khác","summary":"Quy định danh mục sổ kế toán và chứng từ kế toán khác mà DN siêu nhỏ sử dụng ngoài các biểu mẫu bắt buộc — phục vụ ghi chép đơn giản, gọn nhẹ.","links":[{"label":"Biểu mẫu sổ/chứng từ áp dụng cho DN siêu nhỏ","note":""}]}],"tt58_10":[{"match":"Về trách nhiệm lập và nộp báo cáo tài chính","title":"TT 58 Điều 10 — Báo cáo tài chính DN siêu nhỏ","summary":"Trách nhiệm, kỳ lập và nơi nộp BCTC của DN siêu nhỏ (đơn giản hóa so với DN nhỏ và vừa theo TT 133).","links":[{"targetSlug":"tt133","targetAnchor":"tt133_1","label":"TT 133 — Chế độ kế toán DN nhỏ và vừa (so sánh)"}]}],"tt58_11":[{"match":"Doanh nghiệp siêu nhỏ căn cứ vào số dư các tài khoản kế toán theo quy định tại Thông tư","title":"TT 58 Điều 11 — Chuyển số dư từ chế độ kế toán cũ","summary":"Hướng dẫn chuyển số dư tài khoản từ chế độ kế toán cũ (TT 132/2018) sang chế độ theo TT 58 khi chuyển đổi.","links":[{"label":"Thay thế TT 132/2018/TT-BTC","note":""}]}],"tt58_12":[{"match":"Thông tư này có hiệu lực thi hành kể từ ngày 01/7/2026","title":"TT 58 Điều 12 — Hiệu lực thi hành","summary":"TT 58/2026 có hiệu lực từ 01/7/2026, áp dụng cho năm tài chính bắt đầu từ/sau ngày này, thay thế TT 132/2018 về kế toán DN siêu nhỏ.","links":[{"label":"Hiệu lực 01/7/2026 — thay thế TT 132/2018","note":""}]}]}}</script>

var D=JSON.parse(document.getElementById('LD').textContent);

function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:2px 12px;font-size:10.5px;font-style:italic;color:#94a3b8">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px 12px;font-size:12px;color:var(--mu)">Không tìm thấy</div>';
  el.innerHTML=h;
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span> › </span>'+e(a.muc):'')+'<span> › </span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  var cnt=a.content||[];
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+applyDetails(id,autolink(t))+'</p>';}else if(c.k==='tbl'&&c.rows){h+='<table class="ct">';c.rows.forEach(function(row,ri){h+='<tr>';row.forEach(function(cell){var tg=ri===0?'th':'td';h+='<'+tg+'>'+e(cell)+'</'+tg+'>'});h+='</tr>'});h+='</table>';}})}
  else{h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>'}
  h+='</div>';
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  h+=renderRefs(id);
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  // Switch to main tab if not already there
  if(!document.getElementById('s-main').classList.contains('on')){
    tab('main',document.querySelector('.tab'));
  }
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildForms(){
  var h='';
  if(!D.forms||!D.forms.length){
    h='<div class="no-tk"><p>Không có biểu mẫu riêng.</p></div>';
    document.getElementById('s-forms').innerHTML=h;return;
  }
  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#1e40af">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx) để sử dụng.</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a><a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');
  if(!btn||btn.classList.contains('loading'))return;
  ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type');
  var orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span>...';
  try{
    var url='/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type;
    var res=await fetch(url,{credentials:'include'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var blob=await res.blob();
    var ext=type==='excel'?'.xlsx':'.docx';
    var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+ext;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(err){
    alert('Chưa có file biểu mẫu này hoặc lỗi tải. Vui lòng thử lại sau.');
  }finally{
    setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},800);
  }
});
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){
    el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Văn bản này không áp dụng hệ thống tài khoản kế toán.')+'</p></div>';
    return;
  }
  var h='<h2 style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:14px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:14px">'+D.outline.filter(function(a){return a.chuong&&a.chuong.indexOf('TÀI KHOẢN')>=0}).length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều khoản</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td style="font-size:13px">'+e(a.name)+'</td><td>';
    if(a.dieu){h+='<a class="tk-link" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.dieu+'\');return false" href="#">Xem Điều</a>'}
    h+='</td></tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:20px;font-weight:800;color:#1e3a8a;margin-bottom:4px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12px;color:var(--mu);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="sc"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="sc"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 12px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
// Hash navigation — jump to specific article when loaded with #articleId
function initHash(){
  var h=window.location.hash.slice(1);
  if(h&&D.outline.find(function(a){return a.id===h})){show(h)}
  else if(D.outline.length){show(D.outline[0].id)}
}
buildSb();buildForms();buildTK();buildHome();
initHash();
</script>
