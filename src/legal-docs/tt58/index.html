<script id="LD" type="application/json">{"meta":{"title":"Thông tư 58/2026/TT-BTC — Kế toán DN Siêu nhỏ","shortCode":"TT 58/2026","subtitle":"Kế toán doanh nghiệp siêu nhỏ","slug":"tt58","number":"58/2026/TT-BTC","effectiveDate":"01/07/2026","scope":"Hướng dẫn chứng từ, ghi sổ, lập BCTC cho DN siêu nhỏ. Hiệu lực 01/07/2026, thay thế TT132/2018.","description":"TT 58/2026 đơn giản hóa kế toán cho DNSN: không bắt buộc kế toán trưởng, cho phép người thân làm kế toán, 4 mức ghi sổ tùy phương pháp nộp thuế, BCTC rút gọn (B01+B02-DNSN).","tkNote":"Doanh nghiệp siêu nhỏ không áp dụng hệ thống tài khoản kế toán đôi. Thay vào đó sử dụng sổ kế toán đơn giản — xem tab Biểu mẫu.","related":["TT 133/2016 — Kế toán DN nhỏ vừa","TT 99/2025 — Kế toán DN thông thường","Luật 67/2025/QH15 — Thuế TNDN (thuế suất 15%)"]},"outline":[{"id":"tt58_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này hướng dẫn về chứng từ kế toán, ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp siêu nhỏ. Việc xác định nghĩa vụ thuế của doanh nghiệp siêu nhỏ được thực hiện theo quy định của pháp luật về thuế."}]},{"id":"tt58_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng áp dụng Thông tư này là các doanh nghiệp siêu nhỏ, trong đó, tiêu chí xác định doanh nghiệp siêu nhỏ thực hiện theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh nếu có nhu cầu thì được lựa chọn áp dụng Thông tư này để thực hiện công tác kế toán."}]},{"id":"tt58_3","no":3,"code":"Điều 3","title":"Điều 3. Tổ chức công tác kế toán","shortTitle":"Tổ chức công tác kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ được bố trí người làm kế toán là cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, vợ, chồng, con đẻ, con nuôi, anh, chị, em ruột của người đại diện theo pháp luật, của người đứng đầu, của giám đốc hoặc tổng giám đốc và của cấp phó của người đứng đầu, phó giám đốc hoặc phó tổng giám đốc phụ trách công tác tài chính - kế toán; Người đang làm quản lý, điều hành, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản trong doanh nghiệp siêu nhỏ hoặc thuê dịch vụ làm kế toán cho doanh nghiệp siêu nhỏ theo quy định của pháp luật phù hợp với nhu cầu của doanh nghiệp."},{"k":"p","t":"2. Doanh nghiệp siêu nhỏ không bắt buộc phải bố trí kế toán trưởng, trường hợp doanh nghiệp siêu nhỏ bố trí phụ trách kế toán thay cho kế toán trưởng thì phụ trách kế toán được ký thay kế toán trưởng tại các chứng từ kế toán, sổ kế toán, báo cáo tài chính của đơn vị."}]},{"id":"tt58_4","no":4,"code":"Điều 4","title":"Điều 4. Áp dụng chế độ kế toán","shortTitle":"Áp dụng chế độ kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ căn cứ vào phương pháp nộp thuế giá trị gia tăng (GTGT), thuế thu nhập doanh nghiệp (TNDN) theo pháp luật về thuế GTGT, thuế TNDN để thực hiện ghi sổ kế toán theo một trong các trường hợp quy định tại Điều 5, Điều 6, Điều 7, Điều 8 Thông tư này và lập báo cáo tài chính theo hướng dẫn tại Điều 10 Thông tư này. Trường hợp doanh nghiệp siêu nhỏ chuyển đổi phương pháp nộp thuế GTGT, thuế TNDN theo quy định của pháp luật thuế thì áp dụng danh mục sổ kế toán được hướng dẫn tại Thông tư này phù hợp với phương pháp nộp thuế của doanh nghiệp."},{"k":"p","t":"2. Trường hợp trong năm tài chính, doanh nghiệp siêu nhỏ có những thay đổi các tiêu chí dẫn đến không còn thuộc đối tượng áp dụng Thông tư này thì được áp dụng Thông tư này cho đến hết năm tài chính hiện tại và phải áp dụng chế độ kế toán phù hợp với quy định của pháp luật kể từ năm tài chính kế tiếp."},{"k":"p","t":"3. Doanh nghiệp siêu nhỏ được lựa chọn áp dụng chế độ kế toán doanh nghiệp nhỏ và vừa cho phù hợp với đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của đơn vị nhưng phải áp dụng nhất quán trong một năm tài chính. Việc thay đổi chế độ kế toán áp dụng chỉ được thực hiện tại ngày bắt đầu kỳ kế toán năm tiếp theo."},{"k":"p","t":"4. Trường hợp hộ kinh doanh, cá nhân kinh doanh lựa chọn áp dụng chế độ kế toán theo Thông tư này thì phải áp dụng nhất quán trong một năm tài chính. Việc thay đổi chế độ kế toán áp dụng chỉ được thực hiện tại ngày bắt đầu kỳ kế toán năm tiếp theo."},{"k":"p","t":"5. Trường hợp để phù hợp với đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý, doanh nghiệp siêu nhỏ được thiết kế thêm hoặc sửa đổi, bổ sung biểu mẫu chứng từ kế toán và sổ kế toán so với các biểu mẫu chứng từ kế toán và sổ kế toán được hướng dẫn tại Thông tư này. Biểu mẫu chứng từ kế toán và sổ kế toán của doanh nghiệp khi sửa đổi, bổ sung phải đảm bảo tuân thủ quy định tại Điều 16, các khoản 1, 2, 3, 4 của Điều 24 Luật Kế toán và phải phản ánh đầy đủ, kịp thời, trung thực, minh bạch, để kiểm tra, kiểm soát và đối chiếu được tài sản, nguồn vốn của doanh nghiệp. Doanh nghiệp có phát sinh các chứng từ kế toán thuộc đối tượng điều chỉnh của pháp luật khác thì phải thực hiện theo quy định của pháp luật đó."},{"k":"p","t":"6. Trường hợp doanh nghiệp siêu nhỏ sử dụng hóa đơn điện tử và được hệ thống thông tin quản lý thuế của cơ quan thuế hỗ trợ xác định, thông báo thông tin số thuế GTGT, thuế TNDN, các loại thuế khác phải nộp (nếu có) thì doanh nghiệp siêu nhỏ sử dụng các mẫu sổ kế toán hướng dẫn tại Thông tư này để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."},{"k":"p","t":"Chương II \nQUY ĐỊNH CỤ THỂ"}]},{"id":"tt58_5","no":5,"code":"Điều 5","title":"Điều 5. Doanh nghiệp siêu nhỏ nộp thuế GTGT và thuế TNDN theo tỷ lệ phần trăm (%) trên doanh thu","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT và thuế TNDN theo tỷ lệ phần trăm (%) trên doanh thu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định doanh thu."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S1-DNSN) để ghi doanh thu bán hàng hóa, dịch vụ."},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm:........"}]},{"id":"tt58_6","no":6,"code":"Điều 6","title":"Điều 6. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo tỷ lệ % trên doanh thu và nộp thuế TNDN trên thu nhập tính thuế","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo tỷ lệ % trên doanh thu và nộp thuế TNDN trên thu nhập tính thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định các khoản doanh thu, thu nhập, các khoản chi phí và số thuế GTGT, thuế TNDN phải nộp, đã nộp trong kỳ."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây"},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-DNSN)"},{"k":"p","t":"a1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỐ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"}]},{"id":"tt58_7","no":7,"code":"Điều 7","title":"Điều 7. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và thuế TNDN theo tỷ lệ % trên doanh thu","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và thuế TNDN theo tỷ lệ % trên doanh thu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định doanh thu."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây"},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S3a- DNSN)"},{"k":"p","t":"a1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"}]},{"id":"tt58_8","no":8,"code":"Điều 8","title":"Điều 8. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN trên thu nhập tính thuế","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN trên thu nhập tính thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định các khoản doanh thu, thu nhập, các khoản chi phí và số thuế GTGT, thuế TNDN phải nộp, đã nộp trong kỳ."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây:"},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ chi tiết doanh thu, chi phí (Mẫu số S2b-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết b điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"b) Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2c-DNSN)"}]},{"id":"tt58_9","no":9,"code":"Điều 9","title":"Điều 9. Danh mục sổ kế toán khác và chứng từ kế toán khác","shortTitle":"Danh mục sổ kế toán khác và chứng từ kế toán khác","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Danh mục sổ kế toán khác"},{"k":"p","t":"Ngoài các sổ kế toán hướng dẫn tại Điều 5, Điều 6, Điều 7, Điều 8 Thông tư này, căn cứ vào đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của đơn vị, doanh nghiệp siêu nhỏ có thể sử dụng các sổ kế toán chi tiết theo danh mục sau đây:"},{"k":"p","t":"1.1. Sổ chi tiết thanh toán công nợ (Mẫu số S4a-DNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ CHI TIẾT THANH TOÁN CÔNG NỢ"},{"k":"p","t":"Đối tượng:.........................."},{"k":"p","t":"Đơn vị tính: ................."},{"k":"p","t":"b) Nội dung"}]},{"id":"tt58_10","no":10,"code":"Điều 10","title":"Điều 10. Báo cáo tài chính","shortTitle":"Báo cáo tài chính","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Về trách nhiệm lập và nộp báo cáo tài chính"},{"k":"p","t":"a) Hàng năm, doanh nghiệp siêu nhỏ nộp thuế TNDN theo phương pháp tính thuế trên thu nhập tính thuế phải lập báo cáo tài chính theo hướng dẫn tại Thông tư này, trừ trường hợp pháp luật có quy định khác."},{"k":"p","t":"Báo cáo tài chính năm của doanh nghiệp siêu nhỏ phải được nộp cho cơ quan nhà nước có thẩm quyền trong thời hạn 90 ngày, kể từ ngày kết thúc kỳ kế toán năm."},{"k":"p","t":"Nơi nhận báo cáo tài chính của doanh nghiệp siêu nhỏ được thực hiện theo quy định của pháp luật có liên quan, trường hợp khi báo cáo tài chính của doanh nghiệp siêu nhỏ được lưu giữ tại Hệ thống thông tin quốc gia về đăng ký doanh nghiệp thì các cơ quan nhận báo cáo tài chính của doanh nghiệp được yêu cầu cung cấp thông tin về báo cáo tài chính của doanh nghiệp theo quy định của pháp luật."},{"k":"p","t":"b) Doanh nghiệp siêu nhỏ nộp thuế TNDN theo tỷ lệ % trên doanh thu bán hàng hóa, dịch vụ không bắt buộc phải lập báo cáo tài chính để nộp cho cơ quan nhà nước có thẩm quyền, trừ trường hợp pháp luật khác có yêu cầu."},{"k":"p","t":"Trường hợp doanh nghiệp siêu nhỏ nộp thuế TNDN theo tỷ lệ % trên doanh thu bán hàng hóa, dịch vụ nếu lựa chọn áp dụng chế độ kế toán quy định tại Điều 6, Điều 8 Thông tư này để phục vụ cho nhu cầu quản lý hoạt động sản xuất kinh doanh của doanh nghiệp thì vẫn lập báo cáo tài chính nhưng không bắt buộc phải nộp cho cơ quan nhà nước có thẩm quyền mà được bảo quản, lưu trữ, sử dụng tại doanh nghiệp theo quy định và cung cấp thông tin khi có yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Hệ thống báo cáo tài chính của doanh nghiệp siêu nhỏ"},{"k":"p","t":"2.1. Hàng năm, các doanh nghiệp siêu nhỏ nộp thuế TNDN theo phương pháp tính thuế trên thu nhập tính thuế lập các báo cáo tài chính theo danh mục sau đây:"}]},{"id":"tt58_11","no":11,"code":"Điều 11","title":"Điều 11. Chuyển số dư trên sổ kế toán","shortTitle":"Chuyển số dư trên sổ kế toán","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ căn cứ vào số dư các tài khoản kế toán theo quy định tại Thông tư số 132/2018/TT-BTC ngày 28/12/2018 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho doanh nghiệp siêu nhỏ để thực hiện chuyển vào các sổ kế toán liên quan khi áp dụng Thông tư này như sau:"},{"k":"p","t":"a) Doanh nghiệp căn cứ vào số dư Nợ của TK 1111 \"Tiền mặt\" chuyển sang số dư đầu kỳ của sổ chi tiết tiền (chi tiết phần tiền mặt), số dư Nợ của TK 1112 \"Tiền gửi ngân hàng\" chuyển sang số dư đầu kỳ của Sổ chi tiết tiền (chi tiết phần tiền gửi không kỳ hạn (tiền gửi để thanh toán) tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán theo quy định của pháp luật;"},{"k":"p","t":"b) Doanh nghiệp căn cứ vào số dư Nợ TK 1311 “Phải thu khách hàng”, số dư Nợ TK 1318 “Các khoản nợ phải thu khác”, số dư Có TK 3311 “Phải trả người lao động”, số dư Có TK 3312 “Các khoản trích theo lương”, số dư Có TK 3318 “Các khoản nợ phải trả khác”, chuyển sang số dư đầu kỳ tương ứng với các khoản nợ phải thu hoặc các khoản nợ phải trả của sổ chi tiết thanh toán công nợ theo từng đối tượng công nợ;"},{"k":"p","t":"c) Doanh nghiệp căn cứ vào số dư Nợ TK 1313 “Thuế GTGT được khấu trừ”, số dư Có TK 33131 “Thuế GTGT phải nộp” chuyển sang các dòng tương ứng với số thuế GTGT đầu vào hoặc số thuế GTGT đầu ra trên sổ theo dõi nghĩa vụ thuế GTGT;"},{"k":"p","t":"d) Doanh nghiệp căn cứ số dư Nợ TK 1521 “Nguyên vật liệu, dụng cụ”, TK 1524 “Chi phí sản xuất kinh doanh dở dang”, TK 1526 “Thành phẩm, hàng hóa” chuyển sang số dư đầu kỳ trên sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa mở chi tiết cho từng vật liệu, dụng cụ, sản phẩm, hàng hóa;"},{"k":"p","t":"đ) Doanh nghiệp căn cứ số dư Nợ TK 211 “Tài sản cố định” chuyển sang số dư đầu kỳ của sổ Tài sản cố định;"},{"k":"p","t":"e) Doanh nghiệp căn cứ số dư Có của các TK 33134 “Thuế thu nhập doanh nghiệp”, TK 33138 “Thuế khác, phí, lệ phí và các khoản khác phải nộp Nhà nước” chuyển sang số dư đầu kỳ của các cột tương ứng trên sổ doanh thu bán hàng hóa, dịch vụ hoặc sổ theo dõi thuế GTGT (đối với thuế GTGT), sổ chi tiết doanh thu, chi phí (đối với thuế TNDN) và sổ chi tiết thanh toán công nợ (đối với thuế thu nhập cá nhân và các loại thuế khác);"},{"k":"p","t":"g) Doanh nghiệp căn cứ số dư Có của các TK 4111 “Vốn góp của chủ sở hữu”, TK 4118 “Lợi nhuận sau thuế chưa phân phối” chuyển sang số dư đầu kỳ của Sổ theo dõi vốn chủ sở hữu (chi tiết vốn góp của chủ sở hữu và lợi nhuận sau thuế chưa phân phối)."}]},{"id":"tt58_12","no":12,"code":"Điều 12","title":"Điều 12. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/7/2026 và áp dụng cho năm tài chính bắt đầu từ ngày hoặc sau ngày 01/7/2026."},{"k":"p","t":"2. Thông tư số 132/2018/TT-BTC ngày 28/12/2018 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho doanh nghiệp siêu nhỏ hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành."},{"k":"p","t":"3. Ủy ban Nhân dân, Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các doanh nghiệp siêu nhỏ thực hiện Thông tư này."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết."}]}],"forms":[{"code":"S1-DNSN","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Phụ lục I — Sổ kế toán","note":"Dùng cho DNSN nộp thuế GTGT và TNDN theo tỷ lệ % (Điều 5)"},{"code":"S2a-DNSN","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Phụ lục I — Sổ kế toán","note":"Dùng cho DNSN nộp thuế GTGT theo % và TNDN theo KT (Điều 6)"},{"code":"S2b-DNSN","title":"Sổ chi tiết doanh thu, chi phí","pl":"Phụ lục I — Sổ kế toán","note":"Điều 6, 8"},{"code":"S2c-DNSN","title":"Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa","pl":"Phụ lục I — Sổ kế toán","note":"Điều 6, 7, 8"},{"code":"S2d-DNSN","title":"Sổ chi tiết tiền","pl":"Phụ lục I — Sổ kế toán","note":"Điều 6, 7, 8"},{"code":"S3a-DNSN","title":"Sổ doanh thu bán hàng hóa, dịch vụ","pl":"Phụ lục I — Sổ kế toán","note":"Dùng cho DNSN nộp thuế GTGT theo KT và TNDN theo % (Điều 7)"},{"code":"S3b-DNSN","title":"Sổ theo dõi nghĩa vụ thuế GTGT","pl":"Phụ lục I — Sổ kế toán","note":"Điều 7, 8"},{"code":"S4a-DNSN","title":"Sổ chi tiết thanh toán công nợ","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"S4b-DNSN","title":"Sổ tài sản cố định","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"S4c-DNSN","title":"Sổ theo dõi nghĩa vụ thuế khác","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"S4d-DNSN","title":"Sổ theo dõi vốn chủ sở hữu","pl":"Phụ lục I — Sổ kế toán","note":"Điều 9 — sổ kế toán khác"},{"code":"01-TT","title":"Phiếu thu","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"02-TT","title":"Phiếu chi","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"01-VT","title":"Phiếu nhập kho","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"02-VT","title":"Phiếu xuất kho","pl":"Phụ lục II — Chứng từ kế toán","note":"Điều 9 — chứng từ kế toán"},{"code":"B01-DNSN","title":"Báo cáo tình hình tài chính","pl":"Phụ lục III — Báo cáo tài chính","note":"Điều 10 — lập và trình bày BCTC"},{"code":"B02-DNSN","title":"Báo cáo kết quả hoạt động kinh doanh","pl":"Phụ lục III — Báo cáo tài chính","note":"Điều 10 — lập và trình bày BCTC"}],"accounts":[]}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:2px 12px;font-size:10.5px;font-style:italic;color:#94a3b8">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px 12px;font-size:12px;color:var(--mu)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span> › </span>'+e(a.muc):'')+'<span> › </span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  var cnt=a.content||[];
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+t+'</p>';}})}
  else{h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>'}
  h+='</div>';
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  // Switch to main tab if not already there
  if(!document.getElementById('s-main').classList.contains('on')){
    tab('main',document.querySelector('.tab'));
  }
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildForms(){
  var h='';
  if(!D.forms||!D.forms.length){
    h='<div class="no-tk"><p>Không có biểu mẫu riêng.</p></div>';
    document.getElementById('s-forms').innerHTML=h;return;
  }
  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#1e40af">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx) để sử dụng.</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a><a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');
  if(!btn||btn.classList.contains('loading'))return;
  ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type');
  var orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span>...';
  try{
    var url='/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type;
    var res=await fetch(url,{credentials:'include'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var blob=await res.blob();
    var ext=type==='excel'?'.xlsx':'.docx';
    var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+ext;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(err){
    alert('Chưa có file biểu mẫu này hoặc lỗi tải. Vui lòng thử lại sau.');
  }finally{
    setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},800);
  }
});
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){
    el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Văn bản này không áp dụng hệ thống tài khoản kế toán.')+'</p></div>';
    return;
  }
  var h='<h2 style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:14px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:14px">'+D.outline.filter(function(a){return a.chuong&&a.chuong.indexOf('TÀI KHOẢN')>=0}).length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều khoản</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td style="font-size:13px">'+e(a.name)+'</td><td>';
    if(a.dieu){h+='<a class="tk-link" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.dieu+'\');return false" href="#">Xem Điều</a>'}
    h+='</td></tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:20px;font-weight:800;color:#1e3a8a;margin-bottom:4px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12px;color:var(--mu);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="sc"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="sc"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 12px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
// Hash navigation — jump to specific article when loaded with #articleId
function initHash(){
  var h=window.location.hash.slice(1);
  if(h&&D.outline.find(function(a){return a.id===h})){show(h)}
  else if(D.outline.length){show(D.outline[0].id)}
}
buildSb();buildForms();buildTK();buildHome();
initHash();
</script>
