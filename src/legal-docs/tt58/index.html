<script type="application/json" id="LDATA">{"meta":{"title":"Thông tư 58/2026/TT-BTC — Chế độ Kế toán Doanh nghiệp Siêu nhỏ","shortCode":"TT58","subtitle":"Kế toán DN siêu nhỏ · tra cứu đầy đủ","number":"58/2026/TT-BTC","effectiveDate":"01/07/2026","scope":"Hướng dẫn chứng từ kế toán, ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp siêu nhỏ.","description":"Thông tư 58/2026/TT-BTC hướng dẫn chế độ kế toán đặc thù cho doanh nghiệp siêu nhỏ. Thông tư áp dụng cho các doanh nghiệp có quy mô siêu nhỏ theo tiêu chí Nghị định 80/2021/NĐ-CP, với thủ tục kế toán đơn giản hóa, không bắt buộc kế toán trưởng và cho phép người thân trong gia đình làm kế toán.","related":["TT 133/2016/TT-BTC — Kế toán DN nhỏ vừa","TT 99/2025/TT-BTC — Kế toán DN thông thường","Luật 67/2025/QH15 — Thuế TNDN","Luật Kế toán 88/2015/QH13"]},"outline":[{"id":"tt58_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này hướng dẫn về chứng từ kế toán, ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp siêu nhỏ. Việc xác định nghĩa vụ thuế của doanh nghiệp siêu nhỏ được thực hiện theo quy định của pháp luật về thuế."}]},{"id":"tt58_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng áp dụng Thông tư này là các doanh nghiệp siêu nhỏ, trong đó, tiêu chí xác định doanh nghiệp siêu nhỏ thực hiện theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh nếu có nhu cầu thì được lựa chọn áp dụng Thông tư này để thực hiện công tác kế toán."}]},{"id":"tt58_3","no":3,"code":"Điều 3","title":"Điều 3. Tổ chức công tác kế toán","shortTitle":"Tổ chức công tác kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ được bố trí người làm kế toán là cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, vợ, chồng, con đẻ, con nuôi, anh, chị, em ruột của người đại diện theo pháp luật, của người đứng đầu, của giám đốc hoặc tổng giám đốc và của cấp phó của người đứng đầu, phó giám đốc hoặc phó tổng giám đốc phụ trách công tác tài chính - kế toán; Người đang làm quản lý, điều hành, thủ kho, thủ quỹ, người được giao nhiệm vụ thường xuyên mua, bán tài sản trong doanh nghiệp siêu nhỏ hoặc thuê dịch vụ làm kế toán cho doanh nghiệp siêu nhỏ theo quy định của pháp luật phù hợp với nhu cầu của doanh nghiệp."},{"k":"p","t":"2. Doanh nghiệp siêu nhỏ không bắt buộc phải bố trí kế toán trưởng, trường hợp doanh nghiệp siêu nhỏ bố trí phụ trách kế toán thay cho kế toán trưởng thì phụ trách kế toán được ký thay kế toán trưởng tại các chứng từ kế toán, sổ kế toán, báo cáo tài chính của đơn vị."}]},{"id":"tt58_4","no":4,"code":"Điều 4","title":"Điều 4. Áp dụng chế độ kế toán","shortTitle":"Áp dụng chế độ kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ căn cứ vào phương pháp nộp thuế giá trị gia tăng (GTGT), thuế thu nhập doanh nghiệp (TNDN) theo pháp luật về thuế GTGT, thuế TNDN để thực hiện ghi sổ kế toán theo một trong các trường hợp quy định tại Điều 5, Điều 6, Điều 7, Điều 8 Thông tư này và lập báo cáo tài chính theo hướng dẫn tại Điều 10 Thông tư này. Trường hợp doanh nghiệp siêu nhỏ chuyển đổi phương pháp nộp thuế GTGT, thuế TNDN theo quy định của pháp luật thuế thì áp dụng danh mục sổ kế toán được hướng dẫn tại Thông tư này phù hợp với phương pháp nộp thuế của doanh nghiệp."},{"k":"p","t":"2. Trường hợp trong năm tài chính, doanh nghiệp siêu nhỏ có những thay đổi các tiêu chí dẫn đến không còn thuộc đối tượng áp dụng Thông tư này thì được áp dụng Thông tư này cho đến hết năm tài chính hiện tại và phải áp dụng chế độ kế toán phù hợp với quy định của pháp luật kể từ năm tài chính kế tiếp."},{"k":"p","t":"3. Doanh nghiệp siêu nhỏ được lựa chọn áp dụng chế độ kế toán doanh nghiệp nhỏ và vừa cho phù hợp với đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của đơn vị nhưng phải áp dụng nhất quán trong một năm tài chính. Việc thay đổi chế độ kế toán áp dụng chỉ được thực hiện tại ngày bắt đầu kỳ kế toán năm tiếp theo."},{"k":"p","t":"4. Trường hợp hộ kinh doanh, cá nhân kinh doanh lựa chọn áp dụng chế độ kế toán theo Thông tư này thì phải áp dụng nhất quán trong một năm tài chính. Việc thay đổi chế độ kế toán áp dụng chỉ được thực hiện tại ngày bắt đầu kỳ kế toán năm tiếp theo."},{"k":"p","t":"5. Trường hợp để phù hợp với đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý, doanh nghiệp siêu nhỏ được thiết kế thêm hoặc sửa đổi, bổ sung biểu mẫu chứng từ kế toán và sổ kế toán so với các biểu mẫu chứng từ kế toán và sổ kế toán được hướng dẫn tại Thông tư này. Biểu mẫu chứng từ kế toán và sổ kế toán của doanh nghiệp khi sửa đổi, bổ sung phải đảm bảo tuân thủ quy định tại Điều 16, các khoản 1, 2, 3, 4 của Điều 24 Luật Kế toán và phải phản ánh đầy đủ, kịp thời, trung thực, minh bạch, để kiểm tra, kiểm soát và đối chiếu được tài sản, nguồn vốn của doanh nghiệp. Doanh nghiệp có phát sinh các chứng từ kế toán thuộc đối tượng điều chỉnh của pháp luật khác thì phải thực hiện theo quy định của pháp luật đó."},{"k":"p","t":"6. Trường hợp doanh nghiệp siêu nhỏ sử dụng hóa đơn điện tử và được hệ thống thông tin quản lý thuế của cơ quan thuế hỗ trợ xác định, thông báo thông tin số thuế GTGT, thuế TNDN, các loại thuế khác phải nộp (nếu có) thì doanh nghiệp siêu nhỏ sử dụng các mẫu sổ kế toán hướng dẫn tại Thông tư này để theo dõi, đối chiếu với số thuế phải nộp theo thông báo của cơ quan thuế."},{"k":"p","t":"Chương II \nQUY ĐỊNH CỤ THỂ"}]},{"id":"tt58_5","no":5,"code":"Điều 5","title":"Điều 5. Doanh nghiệp siêu nhỏ nộp thuế GTGT và thuế TNDN theo tỷ lệ phần trăm (%) trên doanh thu","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT và thuế TNDN theo tỷ lệ phần trăm (%) trên doanh thu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định doanh thu."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S1-DNSN) để ghi doanh thu bán hàng hóa, dịch vụ."},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm:........"},{"k":"p","t":"Đơn vị tính:......."},{"k":"p","t":"b) Nội dung: Sổ này được mở để ghi doanh thu bán hàng hóa, cung cấp dịch vụ trong kỳ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT hoặc cùng tỷ lệ % tính thuế TNDN. Trường hợp doanh nghiệp siêu nhỏ có nhiều nhóm hàng hóa, dịch vụ, ngành nghề khác nhau thì sổ này có thể mở cho từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT hoặc cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh doanh thu bán hàng hóa, dịch vụ. Tùy theo yêu cầu quản lý, doanh nghiệp siêu nhỏ có thể ghi doanh thu theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, cung cấp dịch vụ có cùng tỷ lệ % tính thuế GTGT hoặc cùng tỷ lệ % tính thuế TNDN. Trên cơ sở doanh thu bán hàng hóa, dịch vụ trong kỳ, doanh nghiệp siêu nhỏ xác định số thuế GTGT, thuế TNDN phải nộp theo quy định của pháp luật thuế. Dòng cuối cùng ghi tổng số thuế GTGT, thuế TNDN phải nộp trong kỳ."}]},{"id":"tt58_6","no":6,"code":"Điều 6","title":"Điều 6. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo tỷ lệ % trên doanh thu và nộp thuế TNDN trên thu nhập tính thuế","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo tỷ lệ % trên doanh thu và nộp thuế TNDN trên thu nhập tính thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định các khoản doanh thu, thu nhập, các khoản chi phí và số thuế GTGT, thuế TNDN phải nộp, đã nộp trong kỳ."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây"},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S2a-DNSN)"},{"k":"p","t":"a1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỐ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm: ......................."},{"k":"p","t":"Đơn vị tính:............."},{"k":"p","t":"a2) Nội dung"},{"k":"p","t":"Sổ này được mở để ghi doanh thu bán hàng hóa, cung cấp dịch vụ trong kỳ theo từng nhóm hàng hóa, dịch vụ, ngành nghề kinh doanh có cùng tỷ lệ % tính thuế GTGT. Trường hợp doanh nghiệp siêu nhỏ có nhiều nhóm hàng hóa, dịch vụ, ngành nghề khác nhau thì sổ này có thể mở cho từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT."},{"k":"p","t":"a3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế GTGT. Doanh nghiệp siêu nhỏ có thể ghi doanh thu theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ theo từng ngành, nghề có cùng tỷ lệ % tính thuế GTGT. Trên cơ sở doanh thu bán hàng hóa, dịch vụ trong kỳ, doanh nghiệp siêu nhỏ xác định số thuế GTGT phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Dòng “Số thuế GTGT còn phải nộp đầu kỳ”: Doanh nghiệp siêu nhỏ căn cứ số thuế GTGT còn phải nộp cuối kỳ trước chuyển sang để theo dõi, phản ánh số thuế GTGT còn phải nộp đầu kỳ."},{"k":"p","t":"- Dòng \"Số phát sinh trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề hoặc theo từng giao dịch có cùng tỷ lệ % tính thuế GTGT phát sinh trong kỳ."},{"k":"p","t":"- Dòng \"Tổng số thuế GTGT phải nộp trong kỳ\": Doanh nghiệp siêu nhỏ căn cứ số thuế GTGT phải nộp theo từng ngành, nghề có cùng tỷ lệ % tính thuế GTGT để xác định tổng số thuế GTGT phải nộp trong kỳ."},{"k":"p","t":"- Dòng \"Số thuế GTGT đã nộp trong kỳ\": Doanh nghiệp siêu nhỏ ghi số thuế GTGT đã nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế GTGT còn phải nộp cuối kỳ\": Doanh nghiệp siêu nhỏ căn cứ chênh lệch của số thuế GTGT còn phải nộp đầu kỳ, số thuế GTGT phải nộp trong kỳ, số thuế GTGT đã nộp trong kỳ để xác định số thuế GTGT còn phải nộp cuối kỳ chuyển sang kỳ sau."},{"k":"p","t":"b) Sổ chi tiết doanh thu, chi phí (Mẫu số S2b-DNSN)"},{"k":"p","t":"b1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ CHI TIẾT DOANH THU, CHI PHÍ"},{"k":"p","t":"Năm:..........."},{"k":"p","t":"Đơn vị tính:....."},{"k":"p","t":"b2) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi doanh thu, thu nhập và chi phí phát sinh trong hoạt động sản xuất, kinh doanh và hoạt động khác của doanh nghiệp siêu nhỏ. Trên cơ sở doanh thu, thu nhập và các khoản chi phí, doanh nghiệp siêu nhỏ xác định số thuế TNDN phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"b3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1: Ghi số tiền phù hợp với từng nội dung nêu tại cột C."},{"k":"p","t":"- Dòng “Số thuế TNDN còn phải nộp đầu kỳ\": Doanh nghiệp siêu nhỏ căn cứ vào số thuế TNDN phải nộp kỳ trước chuyển sang để theo dõi, phản ánh số thuế TNDN còn phải nộp đầu kỳ."},{"k":"p","t":"- Dòng “Số phát sinh trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh doanh thu, thu nhập, chi phí từ hoạt động bán hàng hóa, dịch vụ và hoạt động khác phát sinh trong kỳ."},{"k":"p","t":"- Dòng “1. Doanh thu và thu nhập Doanh nghiệp siêu nhỏ căn cứ vào hóa đơn, chứng từ để ghi doanh thu, thu nhập phát sinh từ hoạt động bán hàng hóa, dịch vụ và hoạt động khác theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Dòng “2. Chi phí\": Doanh nghiệp siêu nhỏ căn cứ vào hóa đơn, chứng từ liên quan để ghi tổng chi phí phát sinh trong kỳ theo từng nghiệp vụ phát sinh."},{"k":"p","t":"- Dòng “Tổng số thuế TNDN phải nộp trong kỳ”: Doanh nghiệp siêu nhỏ căn cứ vào thông tin chi tiết trong phần “1. Doanh thu và thu nhập”, “2. Chi phí” để xác định thu nhập tính thuế TNDN và căn cứ vào thuế suất thuế TNDN tương ứng với từng hoạt động theo quy định của pháp luật thuế để xác định tổng số thuế TNDN phải nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế TNDN đã nộp trong kỳ”: Doanh nghiệp siêu nhỏ ghi số tiền thuế TNDN đã tạm nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế TNDN còn phải nộp cuối kỳ”: Doanh nghiệp siêu nhỏ căn cứ số thuế TNDN còn phải nộp hoặc được hoàn của kỳ trước; chênh lệch giữa tổng số thuế TNDN phải nộp và số thuế TNDN đã tạm nộp trong kỳ để xác định số tiền thuế TNDN còn phải nộp cuối kỳ để chuyển sang kỳ sau."},{"k":"p","t":"c) Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2c-DNSN)"},{"k":"p","t":"c1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ CHI TIẾT VẬT LIỆU, DỤNG CỤ, SẢN PHẨM, HÀNG HÓA"},{"k":"p","t":"Tên vật liệu, dụng cụ, sản phẩm, hàng hóa............"},{"k":"p","t":"Kho:........"},{"k":"p","t":"c2) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi, quản lý về tình hình nhập, xuất, tồn kho cho từng vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"c3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột D: Đơn vị tính của từng vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi đơn giá nhập, xuất, tồn của từng vật liệu, dụng cụ, sản phẩm, hàng hóa. Trong đó, đơn giá nhập kho của từng vật liệu, dụng cụ, sản phẩm, hàng hóa căn cứ vào chứng từ nhập vật liệu, dụng cụ, sản phẩm, hàng hóa theo từng nguồn nhập."},{"k":"p","t":"Đơn giá xuất kho được tính riêng cho từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa theo công thức sau:"},{"k":"p","t":"- Cột 2: Ghi số lượng của từng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Cột 3: Ghi giá trị (thành tiền) của từng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho (Cột 3 = Cột 1 x Cột 2)."},{"k":"p","t":"- Cột 4: Ghi số lượng của từng vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho."},{"k":"p","t":"- Cột 5: Ghi giá trị (thành tiền) của từng vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (Cột 5 = Cột 1 x Cột 4)."},{"k":"p","t":"- Cột 6: Ghi số lượng của từng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho."},{"k":"p","t":"- Cột 7: Ghi giá trị (thành tiền) của từng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho (Cột 7 = Cột 1 x Cột 6)."},{"k":"p","t":"d) Sổ chi tiết tiền (Mẫu số S2d-DNSN)"},{"k":"p","t":"d1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ CHI TIẾT TIỀN"},{"k":"p","t":"Năm: ............"},{"k":"p","t":"Đơn vị tính:.........."},{"k":"p","t":"d2) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi tình hình thu, chi bằng tiền mặt hoặc tiền gửi không kỳ hạn (tiền gửi để thanh toán) trong tài khoản của doanh nghiệp siêu nhỏ tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán theo quy định của pháp luật. Doanh nghiệp có thể mở sổ này chi tiết theo từng loại tiền (tiền mặt, tiền gửi không kỳ hạn). Đối với tiền gửi không kỳ hạn, sổ này có thể được mở để theo dõi riêng số tiền gửi tại từng ngân hàng hoặc từng tổ chức cung ứng dịch vụ thanh toán."},{"k":"p","t":"d3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1, 2: Ghi số tiền thu, chi tiền mặt hoặc số tiền gửi không kỳ hạn gửi vào, rút ra."},{"k":"p","t":"Cuối kỳ, doanh nghiệp siêu nhỏ tính ra số tiền mặt thu, chi, tồn quỹ và số tiền gửi không kỳ hạn gửi vào, rút ra, dư cuối kỳ."}]},{"id":"tt58_7","no":7,"code":"Điều 7","title":"Điều 7. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và thuế TNDN theo tỷ lệ % trên doanh thu","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và thuế TNDN theo tỷ lệ % trên doanh thu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định doanh thu."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây"},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ doanh thu bán hàng hóa, dịch vụ (Mẫu số S3a- DNSN)"},{"k":"p","t":"a1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ DOANH THU BÁN HÀNG HÓA, DỊCH VỤ"},{"k":"p","t":"Năm: ............"},{"k":"p","t":"Đơn vị tính:............"},{"k":"p","t":"a2) Nội dung"},{"k":"p","t":"Sổ này được mở để ghi doanh thu bán hàng hóa, cung cấp dịch vụ trong kỳ theo từng nhóm hàng hóa, dịch vụ, ngành nghề kinh doanh có cùng tỷ lệ % tính thuế TNDN. Trường hợp doanh nghiệp siêu nhỏ có nhiều nhóm hàng hóa, dịch vụ, ngành nghề khác nhau thì sổ này có thể mở cho từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"a3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"- Cột 1: Ghi số tiền bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề để làm căn cứ xác định doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề có cùng tỷ lệ % tính thuế TNDN."},{"k":"p","t":"- Dòng “Số thuế TNDN còn phải nộp đầu kỳ\": Doanh nghiệp siêu nhỏ căn cứ số thuế TNDN phải nộp kỳ trước chuyển sang để theo dõi, phản ánh số thuế TNDN còn phải nộp đầu kỳ."},{"k":"p","t":"- Dòng “Số phát sinh trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh doanh thu bán hàng hóa, dịch vụ theo từng nhóm hàng hóa, dịch vụ, ngành nghề hoặc theo từng giao dịch có cùng tỷ lệ % tính thuế TNDN phát sinh trong kỳ. Doanh nghiệp siêu nhỏ có thể ghi doanh thu theo từng hóa đơn, chứng từ hoặc theo số tổng cộng kèm theo bảng dữ liệu chi tiết về hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"- Dòng “Tổng số thuế TNDN phải nộp trong kỳ\": Trên cơ sở doanh thu bán hàng hóa, dịch vụ trong kỳ, doanh nghiệp siêu nhỏ xác định số tiền thuế TNDN phải nộp theo từng ngành, nghề hoặc theo từng giao dịch có cùng tỷ lệ % tính thuế TNDN để xác định tổng số thuế TNDN phải nộp trong kỳ theo quy định của pháp luật thuế."},{"k":"p","t":"- Dòng “Số thuế TNDN đã nộp trong kỳ\": Doanh nghiệp siêu nhỏ ghi số tiền thuế TNDN đã tạm nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế TNDN còn phải nộp cuối kỳ\": Doanh nghiệp siêu nhỏ căn cứ số thuế TNDN còn phải nộp kỳ trước; số thuế TNDN phải nộp và số thuế TNDN đã tạm nộp trong kỳ để xác định số tiền thuế TNDN còn phải nộp cuối kỳ chuyển sang kỳ sau."},{"k":"p","t":"b) Sổ theo dõi nghĩa vụ thuế GTGT (Mẫu số S3b- DNSN)"},{"k":"p","t":"b1) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ THEO DÕI NGHĨA VỤ THUẾ GTGT"},{"k":"p","t":"Năm:........"},{"k":"p","t":"Đơn vị tính:............."},{"k":"p","t":"b2) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi tình hình thực hiện nghĩa vụ thuế GTGT mà doanh nghiệp siêu nhỏ phải nộp, đã nộp và còn phải nộp. Thông tin, số liệu trên sổ này làm căn cứ để cơ quan thuế xác định doanh nghiệp có nộp thuế đúng, đủ và kịp thời vào ngân sách nhà nước theo quy định của pháp luật thuế hay không."},{"k":"p","t":"b3) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Dòng “Số dư đầu kỳ”: Doanh nghiệp siêu nhỏ căn cứ nghĩa vụ thuế GTGT cuối kỳ trước chuyển sang là số thuế GTGT còn được khấu trừ hoặc được hoàn hoặc là số thuế GTGT còn phải nộp để ghi dòng số dư đầu kỳ tương ứng với cột 1 hoặc cột 2."},{"k":"p","t":"- Dòng “Số phát sinh trong kỳ”: Doanh nghiệp siêu nhỏ căn cứ vào hóa đơn, chứng từ phát sinh trong kỳ liên quan đến số thuế GTGT đầu vào được khấu trừ để ghi nhận vào cột 1, liên quan đến số thuế GTGT đầu ra để ghi nhận vào cột 2."},{"k":"p","t":"- Dòng “Tổng số thuế GTGT phải nộp trong kỳ\": Doanh nghiệp siêu nhỏ căn cứ chênh lệch giữa số thuế GTGT đầu ra và số thuế GTGT đầu vào được khấu trừ để xác định số thuế GTGT phải nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế GTGT đã nộp trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh số thuế GTGT doanh nghiệp đã nộp trong kỳ."},{"k":"p","t":"- Dòng “Số thuế GTGT đã được hoàn trong kỳ\": Doanh nghiệp siêu nhỏ phản ánh số thuế GTGT doanh nghiệp đã được hoàn trong kỳ."},{"k":"p","t":"- Dòng “Số dư cuối kỳ\": Doanh nghiệp siêu nhỏ căn cứ vào số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ để ghi nhận vào dòng “Số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ\" tại cột 1; căn cứ vào số thuế GTGT còn phải nộp cuối kỳ để ghi nhận vào dòng “Số thuế GTGT còn phải nộp cuối kỳ\" tại cột 2. Trong đó:"},{"k":"p","t":"+ Số thuế GTGT còn được khấu trừ hoặc được hoàn cuối kỳ = số thuế GTGT đầu vào dư đầu kỳ + số thuế GTGT đầu vào phát sinh trong kỳ - số thuế GTGT đầu ra phát sinh trong kỳ + số thuế GTGT đã nộp trong kỳ - số thuế GTGT đã được hoàn trong kỳ."},{"k":"p","t":"+ Số thuế GTGT còn phải nộp cuối kỳ = số thuế GTGT đầu ra phải nộp dư đầu kỳ + số thuế GTGT đầu ra phát sinh trong kỳ - số thuế GTGT đầu vào phát sinh trong kỳ - số thuế GTGT đã nộp trong kỳ + số thuế GTGT đã được hoàn trong kỳ."}]},{"id":"tt58_8","no":8,"code":"Điều 8","title":"Điều 8. Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN trên thu nhập tính thuế","shortTitle":"Doanh nghiệp siêu nhỏ nộp thuế GTGT theo phương pháp khấu trừ và nộp thuế TNDN trên thu nhập tính thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán"},{"k":"p","t":"Doanh nghiệp siêu nhỏ sử dụng hóa đơn, Bảng kê thu mua hàng hóa, dịch vụ không có hóa đơn và các chứng từ kế toán khác theo quy định của pháp luật kế toán, pháp luật thuế làm căn cứ xác định các khoản doanh thu, thu nhập, các khoản chi phí và số thuế GTGT, thuế TNDN phải nộp, đã nộp trong kỳ."},{"k":"p","t":"2. Sổ kế toán"},{"k":"p","t":"2.1. Trường hợp này, doanh nghiệp siêu nhỏ áp dụng các sổ kế toán theo danh mục sau đây:"},{"k":"p","t":"2.2. Biểu mẫu sổ kế toán, nội dung và phương pháp ghi sổ kế toán"},{"k":"p","t":"a) Sổ chi tiết doanh thu, chi phí (Mẫu số S2b-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết b điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"b) Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mẫu số S2c-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết c điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"c) Sổ chi tiết tiền (Mẫu số S2d-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết d điểm 2.2 khoản 2 Điều 6 Thông tư này."},{"k":"p","t":"d) Sổ theo dõi nghĩa vụ thuế GTGT (Mẫu số S3b-DNSN)"},{"k":"p","t":"Biểu mẫu, nội dung và phương pháp ghi sổ được thực hiện theo hướng dẫn tại tiết b điểm 2.2 khoản 2 Điều 7 Thông tư này."}]},{"id":"tt58_9","no":9,"code":"Điều 9","title":"Điều 9. Danh mục sổ kế toán khác và chứng từ kế toán khác","shortTitle":"Danh mục sổ kế toán khác và chứng từ kế toán khác","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Danh mục sổ kế toán khác"},{"k":"p","t":"Ngoài các sổ kế toán hướng dẫn tại Điều 5, Điều 6, Điều 7, Điều 8 Thông tư này, căn cứ vào đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của đơn vị, doanh nghiệp siêu nhỏ có thể sử dụng các sổ kế toán chi tiết theo danh mục sau đây:"},{"k":"p","t":"1.1. Sổ chi tiết thanh toán công nợ (Mẫu số S4a-DNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ CHI TIẾT THANH TOÁN CÔNG NỢ"},{"k":"p","t":"Đối tượng:.........................."},{"k":"p","t":"Đơn vị tính: ................."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi tình hình thanh toán các khoản nợ phải thu và các khoản nợ phải trả của doanh nghiệp siêu nhỏ. Trường hợp doanh nghiệp siêu nhỏ có nhiều khoản nợ phải thu và nhiều khoản nợ phải trả với nội dung, tính chất và các đối tượng công nợ khác nhau (ví dụ nợ phải thu của khách hàng, về cho vay, về tạm ứng; nợ phải trả cho người bán, về nợ vay, về nhận ký quỹ, ký cược của đơn vị khác, tiền lương và các khoản phải nộp theo lương; thuế và các khoản phải nộp nhà nước thì căn cứ vào đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý, sổ này có thể được mở chi tiết theo từng đối tượng công nợ (khách hàng, người bán,...) để theo dõi việc thanh toán các khoản công nợ theo từng đối tượng, từng thời hạn thanh toán, từng lần thanh toán,..."},{"k":"p","t":"Riêng các nghĩa vụ thuế và các khoản phải nộp nhà nước phản ánh vào sổ này không bao gồm thuế GTGT, thuế TNDN mà chỉ bao gồm thuế thu nhập cá nhân, thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường, thuế sử dụng đất và thuế khác."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của hóa đơn, chứng từ."},{"k":"p","t":"- Cột C: Ghi nội dung của nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột 1: Ghi giá trị các khoản nợ phải thu về bán hàng hóa, dịch vụ, cho vay, tạm ứng, ký cược, ký quỹ,...."},{"k":"p","t":"- Cột 2: Ghi giá trị các khoản nợ phải thu đã thu được tiền."},{"k":"p","t":"- Cột 3: Ghi giá trị các khoản nợ còn phải thu."},{"k":"p","t":"- Cột 4: Ghi giá trị các khoản nợ phải trả về mua hàng hóa, dịch vụ, khoản đi vay, nhận ký quỹ, ký cược,..."},{"k":"p","t":"- Cột 5: Ghi giá trị các khoản nợ phải trả đã trả tiền."},{"k":"p","t":"- Cột 6: Ghi giá trị các khoản nợ còn phải trả."},{"k":"p","t":"1.2. Sổ tài sản cố định (Mẫu số S4b-DNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"Loại tài sản:.............."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi và quản lý tài sản cố định của doanh nghiệp siêu nhỏ từ khi mua sắm, đưa vào sử dụng cho đến khi ghi giảm TSCĐ."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"Sổ này được mở để theo dõi cho từng loại TSCĐ hoặc các loại TSCĐ của doanh nghiệp siêu nhỏ (nhà cửa, máy móc thiết bị,...). Căn cứ vào chứng từ tăng, giảm TSCĐ để ghi vào sổ TSCĐ:"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi tên, đặc điểm, ký hiệu của TSCĐ."},{"k":"p","t":"- Cột D: Ghi tháng, năm đưa TSCĐ vào sử dụng."},{"k":"p","t":"- Cột 1: Ghi nguyên giá TSCĐ."},{"k":"p","t":"- Cột 2: Ghi tỷ lệ khấu hao hàng năm của TSCĐ."},{"k":"p","t":"- Cột 3: Ghi số khấu hao TSCĐ trong năm."},{"k":"p","t":"- Cột 4: Ghi số khấu hao lũy kế của TSCĐ tính đến cuối kỳ hoặc đến thời điểm ghi giảm TSCĐ."},{"k":"p","t":"- Cột E, G: Ghi số hiệu, ngày, tháng, năm của chứng từ ghi giảm TSCĐ."},{"k":"p","t":"- Cột H: Ghi lý do giảm TSCĐ (nhượng bán, thanh lý,...)."},{"k":"p","t":"1.3. Sổ theo dõi nghĩa vụ thuế khác (Mẫu số S4C-ĐNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ THEO DÕI NGHĨA VỤ THUẾ KHÁC"},{"k":"p","t":"Năm: .............."},{"k":"p","t":"Đơn vị tính:..............."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Sổ này được mở để doanh nghiệp siêu nhỏ theo dõi các loại thuế khác (nếu có): thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường, thuế sử dụng đất và thuế khác. Tùy theo đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý, doanh nghiệp siêu nhỏ có thể mở sổ này chi tiết cho từng loại thuế."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B: Ghi nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1: Ghi lượng hàng hóa, dịch vụ chịu thuế."},{"k":"p","t":"- Cột 2: Ghi mức thuế tuyệt đối theo quy định của pháp luật thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường."},{"k":"p","t":"- Cột 3: Giá tính thuế/01 đơn vị hàng hóa, dịch vụ thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"- Cột 4: Ghi mức thuế suất theo quy định của pháp luật thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế sử dụng đất."},{"k":"p","t":"- Cột 5: Thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế theo tỷ lệ %."},{"k":"p","t":"- Cột 6: Tính thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế tuyệt đối."},{"k":"p","t":"- Cột 7: Tính thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 8: Tính thuế bảo vệ môi trường phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 9: Tính thuế tài nguyên phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 10: Tính thuế sử dụng đất phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"- Cột 11: Tính thuế khác theo quy định của pháp luật thuế."},{"k":"p","t":"1.4. Sổ theo dõi vốn chủ sở hữu (Mẫu số S4d-DNSN)"},{"k":"p","t":"a) Biểu mẫu sổ kế toán"},{"k":"p","t":"SỔ THEO DÕI VỐN CHỦ SỞ HỮU"},{"k":"p","t":"Năm:............"},{"k":"p","t":"Đơn vị tính:..............."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Sổ này được mở để theo dõi chi tiết tình hình tăng, giảm và số dư các loại vốn chủ sở hữu của doanh nghiệp, như vốn góp của chủ sở hữu, lợi nhuận sau thuế chưa phân phối, các quỹ thuộc vốn chủ sở hữu."},{"k":"p","t":"c) Phương pháp ghi sổ"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột 1: Ghi giá trị các loại vốn chủ sở hữu tăng trong kỳ."},{"k":"p","t":"- Cột 2: Ghi giá trị các loại vốn chủ sở hữu giảm trong kỳ."},{"k":"p","t":"- Cột 3: Ghi giá trị số dư đầu kỳ và số dư cuối kỳ của các loại vốn chủ sở hữu."},{"k":"p","t":"2. Danh mục chứng từ khác"},{"k":"p","t":"Ngoài hóa đơn, bảng kê mua hàng hóa, dịch vụ không có hóa đơn, doanh nghiệp siêu nhỏ có thể lựa chọn sử dụng các chứng từ kế toán theo danh mục sau đây:"},{"k":"p","t":"2.1. Phiếu thu (Mẫu số 01-TT)"},{"k":"p","t":"a) Biểu mẫu chứng từ kế toán"},{"k":"p","t":"PHIẾU THU"},{"k":"p","t":"Ngày….tháng …năm…..  \t\t\tSố:…...."},{"k":"p","t":"Họ và tên người nộp tiền: …..............................................."},{"k":"p","t":"Địa chỉ:..............................................."},{"k":"p","t":"Lý do nộp:..............................................."},{"k":"p","t":"Số tiền:...............................................(Viết  bằng chữ):..............................................."},{"k":"p","t":"Kèm theo:...............................................Chứng từ gốc:"},{"k":"p","t":"Ngày ... tháng ... năm ..."},{"k":"p","t":"Đã nhận đủ số tiền (viết bằng chữ): .........................."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Chứng từ này được lập để phản ánh số tiền mặt thực tế nhập quỹ và làm căn cứ để ghi sổ chi tiết tiền. Mọi khoản tiền mặt nhập quỹ đều phải có Phiếu thu."},{"k":"p","t":"c) Phương pháp lập"},{"k":"p","t":"- Phiếu thu phải ghi rõ tên doanh nghiệp và địa chỉ của doanh nghiệp; Ghi rõ họ, tên, địa chỉ người nộp tiền."},{"k":"p","t":"- Dòng “Lý do nộp\" ghi rõ nội dung nộp tiền như: Thu tiền bán hàng hóa, sản phẩm, thu tiền tạm ứng còn thừa,..."},{"k":"p","t":"- Dòng “Số tiền\": Ghi bằng số và bằng chữ số tiền nộp vào quỹ, ghi rõ đơn vị tính là đồng Việt Nam,..."},{"k":"p","t":"- Dòng tiếp theo ghi số lượng chứng từ gốc kèm theo Phiếu thu."},{"k":"p","t":"2.2. Phiếu chi (Mẫu số 02-TT)"},{"k":"p","t":"a) Biểu mẫu chứng từ kế toán"},{"k":"p","t":"PHIẾU CHI"},{"k":"p","t":"Ngày....tháng ...năm..... \t\t\tSố:....."},{"k":"p","t":"Họ và tên người nhận tiền: .............................................."},{"k":"p","t":"Địa chỉ:.........................................."},{"k":"p","t":"Lý do chi:.........................................."},{"k":"p","t":"Số tiền:..........................................(Viết bằng chữ):.........................................."},{"k":"p","t":"Kèm theo..........................................Chứng  từ gốc:"},{"k":"p","t":"Ngày ... tháng ... năm ..."},{"k":"p","t":"Đã nhận đủ số tiền (viết bằng chữ): .................................."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Chứng từ này được lập để phản ánh các khoản tiền mặt thực tế xuất quỹ và làm căn cứ để ghi sổ chi tiết tiền."},{"k":"p","t":"c) Phương pháp lập"},{"k":"p","t":"- Phiếu chi phải ghi rõ tên doanh nghiệp và địa chỉ của doanh nghiệp; Ghi rõ họ, tên, địa chỉ người nhận tiền."},{"k":"p","t":"- Dòng “Lý do chi\" ghi rõ nội dung chi tiền."},{"k":"p","t":"- Dòng “Số tiền\": Ghi bằng số hoặc bằng chữ số tiền xuất quỹ, ghi rõ đơn vị tính là đồng Việt Nam,..."},{"k":"p","t":"- Dòng tiếp theo ghi số lượng chứng từ gốc kèm theo Phiếu chi."},{"k":"p","t":"2.3. Phiếu nhập kho (Mẫu số 01-VT)"},{"k":"p","t":"a) Biểu mẫu chứng từ kế toán"},{"k":"p","t":"PHIẾU NHẬP KHO"},{"k":"p","t":"Ngày....tháng.....năm......  \t\tSố............."},{"k":"p","t":"- Họ và tên người giao: ......................................................"},{"k":"p","t":"- Theo số ......ngày .....tháng ....năm .....của..............................................."},{"k":"p","t":"Nhập tại kho:...............................................địa  điểm..............................................."},{"k":"p","t":"- Tổng số tiền (viết bằng chữ): ..............................................."},{"k":"p","t":"- Số chứng từ gốc kèm theo:..............................................."},{"k":"p","t":"Ngày ... tháng ... năm ..."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Chứng từ này được lập để theo dõi và phản ánh vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho do mua ngoài, tự sản xuất, thuê ngoài gia công chế biến, nhận góp vốn hoặc thừa phát hiện trong kiểm kê làm căn cứ ghi sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa, thanh toán tiền hàng, xác định trách nhiệm với người có liên quan và ghi sổ kế toán."},{"k":"p","t":"c) Phương pháp lập"},{"k":"p","t":"Góc trên bên trái của Phiếu nhập kho phải ghi rõ tên của đơn vị, bộ phận nhập kho. Phiếu nhập kho có thể lập cho một hoặc nhiều loại vật liệu, dụng cụ, sản phẩm, hàng hóa cùng nhập tại một kho."},{"k":"p","t":"Khi lập phiếu nhập kho phải ghi rõ số phiếu nhập và ngày, tháng, năm lập phiếu; họ tên người giao vật liệu, dụng cụ, sản phẩm, hàng hóa; số hóa đơn hoặc lệnh nhập kho; tên kho, địa điểm nhập kho."},{"k":"p","t":"- Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, quy cách, phẩm chất; mã số và đơn vị tính của vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi số lượng theo chứng từ (hóa đơn hoặc lệnh nhập)."},{"k":"p","t":"- Cột 2: Ghi số lượng thực nhập vào kho."},{"k":"p","t":"- Cột 3, 4: Ghi đơn giá và tính ra số tiền của từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa thực nhập kho (cột 4 = cột 2 x cột 3)."},{"k":"p","t":"- Dòng cộng: Ghi tổng số tiền của các loại vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Dòng “Tổng số tiền (viết bằng chữ)”: Ghi tổng số tiền trên Phiếu nhập kho bằng chữ."},{"k":"p","t":"2.4. Phiếu xuất kho (Mẫu số 02-VT)"},{"k":"p","t":"a) Biểu mẫu chứng từ kế toán"},{"k":"p","t":"PHIẾU XUẤT KHO"},{"k":"p","t":"Ngày....tháng.....năm......  \t\tSố............."},{"k":"p","t":"- Họ và tên người nhận hàng:...............Địa  chỉ (bộ phận)....................."},{"k":"p","t":"- Lý do xuất kho:..............................."},{"k":"p","t":"- Xuất tại kho (ngăn lô):................... Địa  điểm.................."},{"k":"p","t":"- Tổng số tiền (viết bằng chữ): ..........................."},{"k":"p","t":"- Số chứng từ gốc kèm theo:............................"},{"k":"p","t":"Ngày ... tháng ... năm ..."},{"k":"p","t":"b) Nội dung"},{"k":"p","t":"Chứng từ này được lập để theo dõi vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho cho các bộ phận sử dụng trong doanh nghiệp, làm căn cứ để hạch toán chi phí sản xuất kinh doanh, tính và kiểm tra việc sử dụng, thực hiện định mức tiêu hao vật tư."},{"k":"p","t":"c) Phương pháp lập"},{"k":"p","t":"Góc bên trái của Phiếu xuất kho phải ghi rõ tên của đơn vị, bộ phận xuất kho. Phiếu xuất kho có thể lập cho một hoặc nhiều loại vật liệu, dụng cụ, sản phẩm, hàng hóa cùng xuất tại một kho."},{"k":"p","t":"Khi lập phiếu xuất kho phải ghi rõ số phiếu xuất và ngày, tháng, năm lập phiếu; họ tên, đơn vị (bộ phận) của người nhận vật liệu, dụng cụ, sản phẩm, hàng hóa; lý do xuất kho; tên kho, địa điểm xuất kho."},{"k":"p","t":"- Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, quy cách, phẩm chất, mã số và đơn vị tính của vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa yêu cầu xuất kho."},{"k":"p","t":"- Cột 2: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa thực tế xuất kho (số lượng thực tế xuất kho chỉ có thể bằng hoặc ít hơn số lượng yêu cầu)."},{"k":"p","t":"- Cột 3, 4: Ghi đơn giá và tính thành tiền của từng loại vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (cột 4 = cột 2 x cột 3)."},{"k":"p","t":"- Dòng Cộng: Ghi tổng số tiền của các loại vật liệu, dụng cụ, sản phẩm, hàng hóa thực tế đã xuất kho."},{"k":"p","t":"- Dòng \"Tổng số tiền (viết bằng chữ)\": Ghi tổng số tiền viết bằng chữ trên Phiếu xuất kho."}]},{"id":"tt58_10","no":10,"code":"Điều 10","title":"Điều 10. Báo cáo tài chính","shortTitle":"Báo cáo tài chính","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Về trách nhiệm lập và nộp báo cáo tài chính"},{"k":"p","t":"a) Hàng năm, doanh nghiệp siêu nhỏ nộp thuế TNDN theo phương pháp tính thuế trên thu nhập tính thuế phải lập báo cáo tài chính theo hướng dẫn tại Thông tư này, trừ trường hợp pháp luật có quy định khác."},{"k":"p","t":"Báo cáo tài chính năm của doanh nghiệp siêu nhỏ phải được nộp cho cơ quan nhà nước có thẩm quyền trong thời hạn 90 ngày, kể từ ngày kết thúc kỳ kế toán năm."},{"k":"p","t":"Nơi nhận báo cáo tài chính của doanh nghiệp siêu nhỏ được thực hiện theo quy định của pháp luật có liên quan, trường hợp khi báo cáo tài chính của doanh nghiệp siêu nhỏ được lưu giữ tại Hệ thống thông tin quốc gia về đăng ký doanh nghiệp thì các cơ quan nhận báo cáo tài chính của doanh nghiệp được yêu cầu cung cấp thông tin về báo cáo tài chính của doanh nghiệp theo quy định của pháp luật."},{"k":"p","t":"b) Doanh nghiệp siêu nhỏ nộp thuế TNDN theo tỷ lệ % trên doanh thu bán hàng hóa, dịch vụ không bắt buộc phải lập báo cáo tài chính để nộp cho cơ quan nhà nước có thẩm quyền, trừ trường hợp pháp luật khác có yêu cầu."},{"k":"p","t":"Trường hợp doanh nghiệp siêu nhỏ nộp thuế TNDN theo tỷ lệ % trên doanh thu bán hàng hóa, dịch vụ nếu lựa chọn áp dụng chế độ kế toán quy định tại Điều 6, Điều 8 Thông tư này để phục vụ cho nhu cầu quản lý hoạt động sản xuất kinh doanh của doanh nghiệp thì vẫn lập báo cáo tài chính nhưng không bắt buộc phải nộp cho cơ quan nhà nước có thẩm quyền mà được bảo quản, lưu trữ, sử dụng tại doanh nghiệp theo quy định và cung cấp thông tin khi có yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Hệ thống báo cáo tài chính của doanh nghiệp siêu nhỏ"},{"k":"p","t":"2.1. Hàng năm, các doanh nghiệp siêu nhỏ nộp thuế TNDN theo phương pháp tính thuế trên thu nhập tính thuế lập các báo cáo tài chính theo danh mục sau đây:"},{"k":"p","t":"2.2. Biểu mẫu, nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ"},{"k":"p","t":"2.2.1. Báo cáo tình hình tài chính (Mẫu số B01 - DNSN)"},{"k":"p","t":"a) Biểu mẫu báo cáo tài chính"},{"k":"p","t":"BÁO CÁO TÌNH HÌNH TÀI CHÍNH"},{"k":"p","t":"Tại ngày... tháng... năm ..."},{"k":"p","t":"Đơn vị tính:............."},{"k":"p","t":"b) Nội dung và phương pháp lập báo cáo tình hình tài chính"},{"k":"p","t":"b1) Tài sản"},{"k":"p","t":"- Tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ số dư tiền mặt tại quỹ, tiền gửi không kỳ hạn (tiền gửi để thanh toán) trong tài khoản của doanh nghiệp siêu nhỏ tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư cuối kỳ của tiền mặt và tiền gửi không kỳ hạn trên sổ chi tiết tiền."},{"k":"p","t":"- Các khoản nợ phải thu (Mã số 120)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị các khoản nợ phải thu của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán, như: Phải thu của khách hàng, thuế GTGT được khấu trừ, phải thu về cho vay, tạm ứng, ký cược, ký quỹ,...."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ của các khoản nợ phải thu trên sổ chi tiết thanh toán công nợ và các sổ kế toán khác có liên quan."},{"k":"p","t":"- Hàng tồn kho (Mã số 130)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị các loại hàng tồn kho dự trữ cho quá trình sản xuất, kinh doanh của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư cuối kỳ của các hàng tồn kho trên các sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Tài sản cố định (Mã số 140)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị còn lại (nguyên giá trừ giá trị hao mòn lũy kế) của các loại TSCĐ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư cuối kỳ chi tiết của các loại TSCĐ trên sổ TSCĐ."},{"k":"p","t":"- Tài sản khác (Mã số 150)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các tài sản khác ngoài các tài sản đã được phản ánh tại các Mã số 110, 120, 130, 140 nêu trên (nếu có), ví dụ tiền gửi có kỳ hạn (tiền gửi tiết kiệm,...), chênh lệch số thuế doanh nghiệp đã tạm nộp lớn hơn số thuế phải nộp Nhà nước,...."},{"k":"p","t":"- Tổng cộng tài sản (Mã số 200)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng trị giá tài sản của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Mã số 200 = Mã số 110 + Mã số 120 + Mã số 130 + Mã số 140 + Mã số 150"},{"k":"p","t":"b2) Nợ phải trả (Mã số 300)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ số nợ phải trả của doanh nghiệp siêu nhỏ tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Mã số 300 = Mã số 310 + Mã số 320"},{"k":"p","t":"- Các khoản nợ phải trả (Mã số 310)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền mà doanh nghiệp siêu nhỏ còn phải trả cho các đối tượng công nợ như phải trả người bán, phải trả nợ vay, tiền lương và các khoản trích theo lương, nhận ký quỹ, ký cược, các khoản nợ phải trả khác,"},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ của các khoản nợ phải trả trên sổ chi tiết thanh toán công nợ."},{"k":"p","t":"- Thuế và các khoản phải nộp Nhà nước (Mã số 320)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản thuế GTGT, thuế TNDN và các nghĩa vụ thuế khác mà doanh nghiệp siêu nhỏ còn phải nộp Nhà nước tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Tùy theo từng phương pháp tính thuế GTGT, thuế TNDN và các nghĩa vụ thuế khác, số liệu ghi vào chỉ tiêu này căn cứ vào số dư chi tiết cuối kỳ trên các sổ doanh thu bán hàng hóa, dịch vụ; sổ theo dõi nghĩa vụ thuế GTGT; sổ chi tiết doanh thu, chi phí; sổ chi tiết thanh toán công nợ,..."},{"k":"p","t":"b3) Vốn chủ sở hữu (Mã số 400)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản vốn chủ sở hữu của doanh nghiệp siêu nhỏ, bao gồm vốn đầu tư của chủ sở hữu, lợi nhuận sau thuế chưa phân phối và các quỹ thuộc vốn chủ sở hữu."},{"k":"p","t":"Mã số 400 = Mã số 410 + Mã số 420 + Mã số 430"},{"k":"p","t":"- Vốn đầu tư của chủ sở hữu (Mã số 410)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số vốn mà các chủ sở hữu (cổ đông, thành viên góp vốn) đã thực góp vào doanh nghiệp tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ trên Sổ theo dõi vốn chủ sở hữu (chi tiết vốn góp của chủ sở hữu)."},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối (Mã số 420)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi (hoặc lỗ) sau thuế chưa phân phối còn lại tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ trên Sổ theo dõi vốn chủ sở hữu (chi tiết lợi nhuận sau thuế chưa phân phối)."},{"k":"p","t":"- Các quỹ thuộc vốn chủ sở hữu (Mã số 430)"},{"k":"p","t":"Chỉ tiêu này phản ánh số dư các quỹ thuộc vốn chủ sở hữu tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư cuối kỳ trên Sổ theo dõi vốn chủ sở hữu (chi tiết các quỹ thuộc vốn chủ sở hữu)."},{"k":"p","t":"- Tổng cộng nguồn vốn (Mã số 500)"},{"k":"p","t":"Phản ánh tổng số các nguồn vốn hình thành tài sản của doanh nghiệp tại thời điểm kết thúc kỳ kế toán."},{"k":"p","t":"Mã số 500 = Mã số 300 + Mã số 400."},{"k":"p","t":"Chỉ tiêu “Tổng cộng Tài sản” = Chỉ tiêu “Tổng cộng Nguồn vốn”"},{"k":"p","t":"(Mã số 200)\t\t\t\t(Mã số 500)"},{"k":"p","t":"2.2.2. Báo cáo kết quả hoạt động kinh doanh (Mẫu số B02 - DNSN)"},{"k":"p","t":"a) Biểu mẫu báo cáo tài chính"},{"k":"p","t":"BÁO CÁO KẾT QUẢ HOẠT ĐỘNG KINH DOANH"},{"k":"p","t":"Năm.................."},{"k":"p","t":"Đơn vị tính:................"},{"k":"p","t":"b) Nội dung và phương pháp lập báo cáo tài chính"},{"k":"p","t":"b1) Doanh thu và thu nhập thuần (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng doanh thu thuần về bán hàng và cung cấp dịch vụ và thu nhập khác sau khi đã trừ đi các khoản giảm trừ doanh thu trong kỳ báo cáo (nếu có)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ tổng doanh thu bán hàng hóa, dịch vụ và các khoản thu nhập khác trên sổ chi tiết doanh thu, chi phí hoặc Sổ doanh thu bán hàng hóa, dịch vụ."},{"k":"p","t":"b2) Các khoản chi phí (Mã số 02)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số chi phí phát sinh trong kỳ báo cáo gồm chi phí nguyên vật liệu, chi phí nhân công, chi phí khấu hao tài sản cố định, chi phí dịch vụ mua ngoài, chi phí lãi vay,..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng chi phí trong kỳ trên sổ chi tiết doanh thu, chi phí."},{"k":"p","t":"b3) Lợi nhuận kế toán trước thuế TNDN (Mã số 03)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số lợi nhuận thuần (hoặc lỗ) từ các hoạt động của doanh nghiệp siêu nhỏ. Số liệu để ghi vào chỉ tiêu này căn cứ vào số chênh lệch giữa doanh thu và thu nhập thuần với các khoản chi phí trong kỳ."},{"k":"p","t":"Mã số 03 = Mã số 01 - Mã số 02."},{"k":"p","t":"b4) Chi phí thuế TNDN (Mã số 10)"},{"k":"p","t":"Chỉ tiêu này phản ánh số chi phí thuế TNDN phải nộp trong năm báo cáo theo quy định của pháp luật thuế, số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số thuế TNDN phải nộp trên sổ chi tiết doanh thu, chi phí."},{"k":"p","t":"b5) Lợi nhuận sau thuế TNDN (Mã số 20)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lợi nhuận sau thuế TNDN của doanh nghiệp siêu nhỏ trong năm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào chênh lệch giữa lợi nhuận kế toán trước thuế TNDN và chi phí thuế TNDN."},{"k":"p","t":"Mã số 20 = Mã số 03 - Mã số 10."}]},{"id":"tt58_11","no":11,"code":"Điều 11","title":"Điều 11. Chuyển số dư trên sổ kế toán","shortTitle":"Chuyển số dư trên sổ kế toán","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp siêu nhỏ căn cứ vào số dư các tài khoản kế toán theo quy định tại Thông tư số 132/2018/TT-BTC ngày 28/12/2018 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho doanh nghiệp siêu nhỏ để thực hiện chuyển vào các sổ kế toán liên quan khi áp dụng Thông tư này như sau:"},{"k":"p","t":"a) Doanh nghiệp căn cứ vào số dư Nợ của TK 1111 \"Tiền mặt\" chuyển sang số dư đầu kỳ của sổ chi tiết tiền (chi tiết phần tiền mặt), số dư Nợ của TK 1112 \"Tiền gửi ngân hàng\" chuyển sang số dư đầu kỳ của Sổ chi tiết tiền (chi tiết phần tiền gửi không kỳ hạn (tiền gửi để thanh toán) tại các ngân hàng và tổ chức cung ứng dịch vụ thanh toán theo quy định của pháp luật;"},{"k":"p","t":"b) Doanh nghiệp căn cứ vào số dư Nợ TK 1311 “Phải thu khách hàng”, số dư Nợ TK 1318 “Các khoản nợ phải thu khác”, số dư Có TK 3311 “Phải trả người lao động”, số dư Có TK 3312 “Các khoản trích theo lương”, số dư Có TK 3318 “Các khoản nợ phải trả khác”, chuyển sang số dư đầu kỳ tương ứng với các khoản nợ phải thu hoặc các khoản nợ phải trả của sổ chi tiết thanh toán công nợ theo từng đối tượng công nợ;"},{"k":"p","t":"c) Doanh nghiệp căn cứ vào số dư Nợ TK 1313 “Thuế GTGT được khấu trừ”, số dư Có TK 33131 “Thuế GTGT phải nộp” chuyển sang các dòng tương ứng với số thuế GTGT đầu vào hoặc số thuế GTGT đầu ra trên sổ theo dõi nghĩa vụ thuế GTGT;"},{"k":"p","t":"d) Doanh nghiệp căn cứ số dư Nợ TK 1521 “Nguyên vật liệu, dụng cụ”, TK 1524 “Chi phí sản xuất kinh doanh dở dang”, TK 1526 “Thành phẩm, hàng hóa” chuyển sang số dư đầu kỳ trên sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa mở chi tiết cho từng vật liệu, dụng cụ, sản phẩm, hàng hóa;"},{"k":"p","t":"đ) Doanh nghiệp căn cứ số dư Nợ TK 211 “Tài sản cố định” chuyển sang số dư đầu kỳ của sổ Tài sản cố định;"},{"k":"p","t":"e) Doanh nghiệp căn cứ số dư Có của các TK 33134 “Thuế thu nhập doanh nghiệp”, TK 33138 “Thuế khác, phí, lệ phí và các khoản khác phải nộp Nhà nước” chuyển sang số dư đầu kỳ của các cột tương ứng trên sổ doanh thu bán hàng hóa, dịch vụ hoặc sổ theo dõi thuế GTGT (đối với thuế GTGT), sổ chi tiết doanh thu, chi phí (đối với thuế TNDN) và sổ chi tiết thanh toán công nợ (đối với thuế thu nhập cá nhân và các loại thuế khác);"},{"k":"p","t":"g) Doanh nghiệp căn cứ số dư Có của các TK 4111 “Vốn góp của chủ sở hữu”, TK 4118 “Lợi nhuận sau thuế chưa phân phối” chuyển sang số dư đầu kỳ của Sổ theo dõi vốn chủ sở hữu (chi tiết vốn góp của chủ sở hữu và lợi nhuận sau thuế chưa phân phối)."},{"k":"p","t":"2. Doanh nghiệp siêu nhỏ khi thay đổi chế độ kế toán áp dụng (do chuyển đổi phương pháp nộp thuế GTGT, thuế TNDN theo quy định của pháp luật thuế hoặc do lựa chọn hoặc bỏ lựa chọn áp dụng chế độ kế toán cho doanh nghiệp nhỏ và vừa) thì căn cứ số dư cuối kỳ trên các sổ kế toán kỳ trước để chuyển sang số dư đầu kỳ của sổ kế toán tương ứng ở kỳ sau cho phù hợp."}]},{"id":"tt58_12","no":12,"code":"Điều 12","title":"Điều 12. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 01/7/2026 và áp dụng cho năm tài chính bắt đầu từ ngày hoặc sau ngày 01/7/2026."},{"k":"p","t":"2. Thông tư số 132/2018/TT-BTC ngày 28/12/2018 của Bộ trưởng Bộ Tài chính hướng dẫn chế độ kế toán cho doanh nghiệp siêu nhỏ hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành."},{"k":"p","t":"3. Ủy ban Nhân dân, Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các doanh nghiệp siêu nhỏ thực hiện Thông tư này."},{"k":"p","t":"4. Trong quá trình thực hiện nếu có vướng mắc, đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết."}]}]}</script>
<div class="topbar">
  <div class="topbar-logo">TT58<span>Kế toán DN siêu nhỏ · tra cứu đầy đủ</span></div>
  <div class="topbar-search"><span class="si">🔍</span><input id="q" placeholder="Tìm kiếm điều khoản..." oninput="doSearch(this.value)"></div>
  <div class="tab-sw">
    <button class="tab-btn active" onclick="switchTab('tracuu',this)">📖 Nội dung</button>
    <button class="tab-btn" onclick="switchTab('home',this)">🏛️ Tổng quan</button>
  </div>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="section active" id="sec-tracuu"><div id="art-view"><div style="color:var(--muted);padding:40px 0;text-align:center">← Chọn điều khoản từ danh sách bên trái</div></div></div>
    <div class="section" id="sec-home"></div>
  </div>
</div>
<script>
const D=DATA;
let curId=null;
function esc(s){{return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}}
function buildSidebar(filter){{
  const el=document.getElementById('sidebar');
  let h='';let chuong='';
  const items=filter?D.outline.filter(a=>
    a.title.toLowerCase().includes(filter.toLowerCase())||
    (a.content||[]).some(c=>c.t&&c.t.toLowerCase().includes(filter.toLowerCase()))
  ):D.outline;
  items.forEach(a=>{{
    if(a.chuong!==chuong){{h+=`<div class="nav-section">${{esc(a.chuong)}}</div>`;chuong=a.chuong}}
    if(a.muc&&a.muc!==h._lastMuc){{h+=`<div style="padding:4px 16px;font-size:11px;font-style:italic;color:#94a3b8">${{esc(a.muc)}}</div>`;h._lastMuc=a.muc}}
    h+=`<div class="nav-item${{curId===a.id?' active':''}}" onclick="showArt('${{a.id}}')" data-id="${{a.id}}"><span class="dot"></span><span>${{esc(a.title)}}</span></div>`;
  }});
  if(!items.length)h='<div style="padding:20px 16px;font-size:13px;color:var(--muted)">Không tìm thấy kết quả</div>';
  el.innerHTML=h;
}}
function showArt(id){{
  const a=D.outline.find(x=>x.id===id);if(!a)return;
  curId=id;buildSidebar(document.getElementById('q').value);
  const q=document.getElementById('q').value.toLowerCase();
  let content=a.content||[];
  let html=`<div class="breadcrumb">${{esc(a.chuong)}}${{a.muc?`<span>›</span>${{esc(a.muc)}}`:''}}<span>›</span><span>${{esc(a.code)}}</span></div>`;
  html+=`<div class="art-title">${{esc(a.title)}}</div><div class="art-content">`;
  if(content.length){{content.forEach(c=>{{if(c.k==='p'&&c.t){{let t=esc(c.t);if(q)t=t.replace(new RegExp(q.replace(/[.*+?^${{}}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark class="highlight">${{m}}</mark>`);html+=`<p>${{t}}</p>`;}}}})}}
  else html+='<p style="color:var(--muted)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>';
  html+='</div>';
  document.getElementById('art-view').innerHTML=html;
  document.querySelector(`[data-id="${{id}}"]`)?.scrollIntoView({{block:'nearest'}});
}}
function doSearch(v){{buildSidebar(v);if(!v&&curId){{setTimeout(()=>document.querySelector(`[data-id="${{curId}}"]`)?.scrollIntoView({{block:'nearest'}}),50)}}}}
function switchTab(t,btn){{
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  btn.classList.add('active');
  if(t==='tracuu')buildSidebar(document.getElementById('q').value);
}}
function buildHome(){{
  const m=D.meta;
  const chuongs=[...new Set(D.outline.map(a=>a.chuong))];
  let h=`<h1 style="font-size:22px;font-weight:800;color:#1e3a8a;margin-bottom:6px">${{esc(m.title)}}</h1>`;
  h+=`<p style="font-size:13px;color:var(--muted);margin-bottom:20px">${{esc(m.scope)}}</p>`;
  h+=`<div class="home-grid">
    <div class="stat-card"><div class="num">${{D.outline.length}}</div><div class="lbl">Điều khoản</div></div>
    <div class="stat-card"><div class="num">${{chuongs.length}}</div><div class="lbl">Chương</div></div>
    <div class="stat-card"><div class="num">${{m.effectiveDate}}</div><div class="lbl">Hiệu lực</div></div>
  </div>`;
  h+=`<div class="desc-block"><p>${{esc(m.description)}}</p></div>`;
  h+='<h3 style="font-size:15px;font-weight:700;margin:20px 0 10px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chuongs.forEach(c=>{{
    const arts=D.outline.filter(a=>a.chuong===c);
    h+=`<div style="margin-bottom:12px"><div style="font-weight:700;font-size:13px;color:var(--primary);margin-bottom:6px">${{esc(c)}}</div>`;
    arts.forEach(a=>h+=`<div style="font-size:13px;padding:3px 0 3px 16px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="switchTab('tracuu',document.querySelector('.tab-btn'));showArt('${{a.id}}')">${{esc(a.title)}}</div>`);
    h+='</div>';
  }});
  h+='<h3 style="font-size:15px;font-weight:700;margin:20px 0 10px;color:#1e3a8a">Văn bản liên quan</h3>';
  (m.related||[]).forEach(r=>h+=`<span class="tag">${{esc(r)}}</span>`);
  document.getElementById('sec-home').innerHTML=h;
}}
buildSidebar();buildHome();
if(D.outline.length)showArt(D.outline[0].id);
</script>
</body></html>
