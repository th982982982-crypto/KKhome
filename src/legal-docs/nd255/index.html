dưới 500 tỷ đồng, áp dụng tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp (không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính) trên doanh thu thuần, bao gồm các lĩnh vực như sau:"},{"k":"p","t":"c.1) Phân phối: Từ 5% trở lên;"},{"k":"p","t":"c.2) Sản xuất: Từ 10% trở lên;"},{"k":"p","t":"c.3) Gia công: Từ 15% trở lên."},{"k":"p","t":"Trường hợp người nộp thuế theo dõi, hạch toán riêng doanh thu, chi phí của từng lĩnh vực thì áp dụng tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp trên doanh thu thuần tương ứng với từng lĩnh vực."},{"k":"p","t":"Trường hợp người nộp thuế theo dõi, hạch toán riêng được doanh thu nhưng không theo dõi, hạch toán riêng được chi phí phát sinh của từng lĩnh vực trong hoạt động sản xuất, kinh doanh thì thực hiện phân bổ chi phí theo tỷ lệ doanh thu của từng lĩnh vực để áp dụng tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp trên doanh thu thuần tương ứng với từng lĩnh vực."},{"k":"p","t":"Trường hợp người nộp thuế không theo dõi, hạch toán riêng được doanh thu và chi phí của từng lĩnh vực hoạt động sản xuất, kinh doanh để xác định tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp tương ứng với từng lĩnh vực thì áp dụng tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp trên doanh thu thuần của lĩnh vực có tỷ suất cao nhất."},{"k":"p","t":"Trường hợp người nộp thuế không áp dụng theo mức tỷ suất lợi nhuận thuần quy định tại điểm này thì phải lập Hồ sơ xác định giá giao dịch liên kết theo quy định."},{"k":"p","t":"3. Người nộp thuế thuộc trường hợp được miễn kê khai, miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại khoản 1, khoản 2 Điều này, việc xác định tổng chi phí lãi vay được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp của doanh nghiệp có giao dịch liên kết được thực hiện theo quy định tại khoản 3 Điều 16 Nghị định này."}]},{"id":"nd255_21","no":21,"code":"Điều 21","title":"Điều 21. Trách nhiệm và quyền hạn của cơ quan thuế trong quản lý giá giao dịch liên kết","shortTitle":"Trách nhiệm và quyền hạn của cơ quan thuế trong quản lý giá giao dịch liên kết","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Áp dụng quản lý rủi ro trong quản lý thuế đối với giá giao dịch liên kết theo quy định của pháp luật thuế."},{"k":"p","t":"a) Quản lý, sử dụng thông tin của người nộp thuế có giao dịch liên kết phục vụ công tác quản lý rủi ro;"},{"k":"p","t":"b) Áp dụng quản lý rủi ro trong việc lập kế hoạch kiểm tra doanh nghiệp có quan hệ liên kết và giao dịch liên kết;"},{"k":"p","t":"c) Quản lý, sử dụng Báo cáo lợi nhuận liên quốc gia của người nộp thuế phục vụ công tác quản lý rủi ro, trao đổi thông tin theo quy định và cam kết của Việt Nam tại Thỏa thuận quốc tế về thuế, không sử dụng để điều chỉnh hoặc ấn định giá giao dịch liên kết."},{"k":"p","t":"2. Cơ quan thuế căn cứ các nguyên tắc phân tích, so sánh, nguyên tắc và phương pháp xác định giá giao dịch liên kết được quy định tại Nghị định này và các thông tin kê khai nghĩa vụ thuế của doanh nghiệp có giao dịch liên kết để thực hiện ấn định thuế trong các trường hợp sau:"},{"k":"p","t":"a) Người nộp thuế vi phạm pháp luật về thuế nhưng thực hiện đầy đủ chế độ kế toán, hóa đơn, chứng từ: Việc ấn định doanh thu, chi phí hoặc thu nhập chịu thuế để xác định nghĩa vụ thuế được thực hiện theo các nguyên tắc phân tích, so sánh, nguyên tắc và phương pháp xác định giá giao dịch liên kết và cơ sở dữ liệu sử dụng trong quản lý giá giao dịch liên kết quy định tại Nghị định này;"},{"k":"p","t":"b) Các trường hợp khác theo quy định tại Điều 24 Luật Quản lý thuế số 108/2025/QH15 và các văn bản quy phạm pháp luật về quản lý thuế;"},{"k":"p","t":"c) Cơ quan thuế có trách nhiệm tạo điều kiện cho người nộp thuế chứng minh, giải trình về số liệu, dữ liệu của đối tượng so sánh độc lập sử dụng trong Hồ sơ xác định giá giao dịch liên kết."},{"k":"p","t":"3. Cơ quan thuế có quyền ấn định mức giá; tỷ suất lợi nhuận; tỷ lệ phân bố lợi nhuận; thu nhập chịu thuế hoặc số thuế thu nhập doanh nghiệp phải nộp đối với người nộp thuế không tuân thủ quy định về kê khai, xác định giao dịch liên kết; không cung cấp hoặc cung cấp không đầy đủ thông tin, dữ liệu kê khai xác định giá giao dịch liên kết trong các trường hợp sau:"},{"k":"p","t":"a) Người nộp thuế không kê khai, kê khai không đầy đủ thông tin, kê khai sai thông tin hoặc không nộp Phụ lục I ban hành kèm theo Nghị định này;"},{"k":"p","t":"b) Người nộp thuế cung cấp không đầy đủ thông tin Hồ sơ xác định giá giao dịch liên kết quy định tại Phụ lục II, Phụ lục III ban hành kèm theo Nghị định này hoặc không xuất trình Hồ sơ xác định giá giao dịch liên kết và các dữ liệu, chứng từ và tài liệu được sử dụng làm căn cứ phân tích, so sánh, xác định giá tại Hồ sơ xác định giá giao dịch liên kết theo yêu cầu của cơ quan thuế trong thời hạn theo quy định tại Nghị định này. Thông tin tại Hồ sơ xác định giá giao dịch liên kết được xác định là trọng yếu nếu thông tin này gây ảnh hưởng đến kết quả phân tích lựa chọn đối tượng so sánh độc lập tương đồng; phương pháp xác định giá giao dịch liên kết hoặc kết quả điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế;"},{"k":"p","t":"c) Người nộp thuế sử dụng các thông tin về giao dịch độc lập không trung thực, không đúng thực tế để phân tích, so sánh, kê khai xác định giá giao dịch liên kết hoặc dựa vào các tài liệu, dữ liệu và chứng từ không hợp pháp, không hợp lệ hoặc không nêu rõ nguồn gốc xuất xứ để xác định mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận áp dụng cho giao dịch liên kết;"},{"k":"p","t":"d) Người nộp thuế có hành vi vi phạm các quy định về xác định giá giao dịch liên kết tại Điều 20 Nghị định này;"},{"k":"p","t":"đ) Cơ sở dữ liệu sử dụng để ấn định thuế thực hiện theo quy định tại Điều 17 Nghị định này."},{"k":"p","t":"4. Cơ quan thuế có trách nhiệm bảo mật thông tin do người nộp thuế cung cấp liên quan đến việc xác định giá giao dịch liên kết theo quy định tại Nghị định này. Việc cung cấp thông tin cho các cơ quan, tổ chức thực hiện theo quy định tại khoản 5 Điều này."},{"k":"p","t":"5. Trường hợp qua kiểm tra xác định giá giao dịch liên kết có phát sinh vướng mắc về cơ chế, chính sách liên quan đến các ngành, lĩnh vực chuyên ngành, cơ quan thuế lấy ý kiến các cơ quan, tổ chức, cá nhân liên quan, cụ thể:"},{"k":"p","t":"a) Cơ quan quản lý chuyên ngành, các tổ chức, hiệp hội chuyên ngành;"},{"k":"p","t":"b) Cơ quan thuế có trách nhiệm cung cấp hồ sơ, thông tin, tài liệu liên quan đến xác định giá giao dịch liên kết cho các cơ quan, tổ chức chuyên ngành được lấy ý kiến. Các cơ quan, đơn vị được lấy ý kiến có trách nhiệm bảo mật thông tin theo quy định của pháp luật."},{"k":"p","t":"6. Cơ quan thuế trao đổi thông tin với người nộp thuế và cơ quan thuế đối tác theo thủ tục tham vấn trước, trong và sau quá trình kiểm tra giá giao dịch liên kết như sau:"},{"k":"p","t":"a) Trường hợp qua việc áp dụng quản lý rủi ro trong quản lý thuế đối với giá giao dịch liên kết, cơ quan thuế thấy cần thiết trao đổi thông tin trước với người nộp thuế đối với nội dung tại Phụ lục I ban hành kèm theo Nghị định này và Hồ sơ xác định giá giao dịch liên kết của người nộp thuế, cơ quan thuế gửi công văn đề nghị tổ chức tham vấn với người nộp thuế để trao đổi, cung cấp trước các thông tin về Hồ sơ xác định giá giao dịch liên kết của người nộp thuế theo quy định tại Nghị định này;"},{"k":"p","t":"b) Trường hợp cơ quan thuế cần liên lạc, trao đổi với cơ quan thuế đối tác về Báo cáo lợi nhuận liên quốc gia và các thông tin liên quan khác thì thực hiện theo quy định về thủ tục thỏa thuận song phương và trao đổi thông tin tại Hiệp định thuế có liên quan. Trong trường hợp cần thiết, cơ quan thuế thông báo bằng văn bản cho người nộp thuế về việc tạm dừng kiểm tra để tiến hành trao đổi thông tin với cơ quan thuế đối tác theo quy định của pháp luật thuế."},{"k":"p","t":"7. Cơ quan thuế thực hiện cơ chế trao đổi thông tin tự động phải bảo mật thông tin theo quy định tại điều ước quốc tế, thỏa thuận quốc tế về thuế mà Việt Nam là thành viên hoặc là bên ký kết và theo tiêu chuẩn của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin cho mục đích thuế. Hằng năm, cơ quan thuế thông báo danh sách các cơ quan thuế nước ngoài thực hiện trao đổi thông tin tự động đối với Báo cáo lợi nhuận liên quốc gia và tình trạng không thực hiện trao đổi thông tin một cách hệ thống (nếu có) trên Trang thông tin điện tử của ngành thuế."},{"k":"p","t":"8. Cơ quan thuế thực hiện điều chỉnh việc xác định giá giao dịch liên kết theo thỏa thuận song phương quy định tại các Hiệp định thuế có liên quan."},{"k":"p","t":"9. Trường hợp cơ quan thuế ký Thỏa thuận trước về phương pháp xác định giá tính thuế, cơ quan thuế có trách nhiệm:"},{"k":"p","t":"a) Thực hiện quản lý, kiểm tra các giao dịch liên kết không thuộc phạm vi áp dụng Thỏa thuận trước về phương pháp xác định giá tính thuế theo nguyên tắc quản lý rủi ro;"},{"k":"p","t":"b) Quản lý, kiểm tra việc tuân thủ Thỏa thuận trước về phương pháp xác định giá tính thuế đã ký kết của người nộp thuế theo quy định."},{"k":"p","t":"10. Quản lý tuân thủ và hỗ trợ người nộp thuế có giao dịch liên kết"},{"k":"p","t":"a) Cơ quan thuế xây dựng và tổ chức thực hiện chương trình hỗ trợ người nộp thuế tuân thủ tự nguyện đối với doanh nghiệp có giao dịch liên kết trên cơ sở quản lý rủi ro, phù hợp với khả năng đáp ứng của hệ thống cơ sở dữ liệu ngành thuế và quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"b) Cơ quan thuế căn cứ dữ liệu kê khai của người nộp thuế công bố tỷ suất lợi nhuận ngành theo từng lĩnh vực, địa bàn hoặc nhóm người nộp thuế để hỗ"},{"k":"p","t":"trợ người nộp thuế kê khai, xác định giá giao dịch liên kết theo nguyên tắc giao dịch độc lập;"},{"k":"p","t":"c) Cơ quan thuế hỗ trợ người nộp thuế nâng cao tính tuân thủ, giảm rủi ro trong kê khai, xác định giá giao dịch liên kết khi người nộp thuế tham gia chương trình hỗ trợ tuân thủ tự nguyện;"},{"k":"p","t":"d) Cơ quan thuế có trách nhiệm bảo mật thông tin, dữ liệu do người nộp thuế cung cấp khi tham gia chương trình hỗ trợ tuân thủ tự nguyện theo quy định của pháp luật."}]},{"id":"nd255_22","no":22,"code":"Điều 22","title":"Điều 22. Trách nhiệm của các bộ, cơ quan ngang bộ và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương","shortTitle":"Trách nhiệm của các bộ, cơ quan ngang bộ và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"a) Chịu trách nhiệm thực hiện quản lý nhà nước về thuế đối với doanh nghiệp có quan hệ liên kết và giao dịch liên kết theo quy định tại Nghị định này;"},{"k":"p","t":"b) Chủ trì, phối hợp với cơ quan thông tấn, báo chí và các bộ, ngành trong phạm vi nhiệm vụ, quyền hạn thực hiện công tác thông tin, tuyên truyền quản lý nhà nước về thuế đối với doanh nghiệp có giao dịch liên kết;"},{"k":"p","t":"c) Kiểm tra việc thực hiện các quy định về thuế đối với doanh nghiệp có giao dịch liên kết theo quy định tại Nghị định này."},{"k":"p","t":"2. Ngân hàng Nhà nước trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"a) Phối hợp cung cấp thông tin, số liệu về các khoản vay, trả nợ nước ngoài của từng doanh nghiệp cụ thể có giao dịch liên kết trên cơ sở danh sách do cơ quan thuế yêu cầu, bao gồm dữ liệu về kim ngạch khoản vay, lãi suất, kỳ trả lãi, trả gốc, thực tế rút vốn, trả nợ (gốc, lãi) và các thông tin liên quan khác (nếu có);"},{"k":"p","t":"b) Phối hợp cung cấp thông tin khi cơ quan thuế đề nghị đối với các thông tin chưa được công khai theo quy định của Luật Các tổ chức tín dụng số 32/2024/QH15 (được sửa đổi, bổ sung tại Luật số 96/2025/QH15)."},{"k":"p","t":"3. Bộ Khoa học và Công nghệ, Bộ Nông nghiệp và Môi trường trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"a) Phối hợp cung cấp cơ sở dữ liệu liên quan đến các hợp đồng chuyển giao công nghệ; hợp đồng chuyển giao quyền sở hữu công nghiệp; chuyển giao quyền đăng ký, chuyển nhượng quyền sở hữu đối với giống cây trồng; hồ sơ đăng ký quyền sở hữu trí tuệ sau khi được xác lập quyền sở hữu công nghiệp, quyền đối với giống cây trồng và cung cấp thông tin cho cơ quan thuế khi được lấy ý kiến để thực hiện công tác quản lý thuế đối với doanh nghiệp có giao dịch liên kết;"},{"k":"p","t":"b) Phối hợp cung cấp cơ sở dữ liệu về các doanh nghiệp được cấp phép kinh doanh trong lĩnh vực thuộc phạm vi quản lý và thông tin về giao dịch liên kết trong lĩnh vực kinh tế số theo đề nghị của cơ quan thuế;"},{"k":"p","t":"c) Việc cung cấp, kết nối, chia sẻ thông tin, dữ liệu trong giao dịch điện tử giữa Bộ Khoa học và Công nghệ với cơ quan thuế được thực hiện theo quy định tại Nghị định số 194/2025/NĐ-CP quy định chi tiết một số điều của Luật Giao dịch điện tử về cơ sở dữ liệu quốc gia, kết nối và chia sẻ dữ liệu, dữ liệu mở phục vụ giao dịch điện tử của cơ quan nhà nước."},{"k":"p","t":"4. Bộ Công Thương trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm:"},{"k":"p","t":"Phối hợp cung cấp cơ sở dữ liệu về giá giao dịch của các hàng hóa trên các sở giao dịch hàng hóa trong nước và thông tin theo chức năng nhiệm vụ thuộc phạm vi quản lý của Bộ Công Thương theo đề nghị của cơ quan thuế."},{"k":"p","t":"5. Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm tổ chức xây dựng, quản lý, kết nối và chia sẻ cơ sở dữ liệu thuộc lĩnh vực quản lý chuyên ngành phục vụ công tác quản lý thuế đối với doanh nghiệp có giao dịch liên kết theo quy định của pháp luật."},{"k":"p","t":"6. Các bộ, ngành trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm phối hợp Bộ Tài chính triển khai thực hiện Nghị định này."}]},{"id":"nd255_23","no":23,"code":"Điều 23","title":"Điều 23. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2026 và áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2026."},{"k":"p","t":"2. Nghị định số 132/2020/NĐ-CP ngày 05 tháng 11 năm 2020 quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết và Nghị định số 20/2025/NĐ-CP ngày 10 tháng 02 năm 2025 của Chính phủ quy định về quản lý thuế đối với doanh nghiệp có giao dịch liên kết hết hiệu lực kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"3. Trường hợp doanh nghiệp thuộc đối tượng được chuyển tiếp theo quy định tại Điều 3 Nghị định số 20/2025/NĐ-CP thì tiếp tục được chuyển tiếp cho thời gian còn lại theo quy định tại Điều 3 Nghị định số 20/2025/NĐ-CP."}]},{"id":"nd255_24","no":24,"code":"Điều 24","title":"Điều 24. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính chủ trì, phối hợp với các bộ, ngành liên quan và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương triển khai thực hiện Nghị định này."},{"k":"p","t":"2. Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các tổ chức chính trị - xã hội;\n- VPCP: BTCN, các PCN, Trợ lý TTg, các Vụ, Cục, Công báo;\n-  Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\nNguyễn Văn Thắng"]]}]}],"forms":[{"code":"PL1","title":"THÔNG TIN VỀ QUAN HỆ LIÊN KẾT VÀ GIAO DỊCH LIÊN KẾT","pl":"Phụ lục I","note":""},{"code":"PL2","title":"DANH MỤC CÁC THÔNG TIN, TÀI LIỆU CẦN CUNG CẤPTẠI HỒ SƠ QUỐC GIA","pl":"Phụ lục II","note":""},{"code":"PL3","title":"DANH MỤC CÁC THÔNG TIN, TÀI LIỆU CẦN CUNG CẤPTẠI HỒ SƠ TOÀN CẦU","pl":"Phụ lục III","note":""},{"code":"PL4","title":"KÊ KHAI THÔNG TIN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","pl":"Phụ lục IV","note":""},{"code":"PL5","title":"CÔNG THỨC TÍNH GIÁ TRỊ GIAO DỊCH ĐỘC LẬP CHUẨN","pl":"Phụ lục V","note":""}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
