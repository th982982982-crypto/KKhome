<script id="LD" type="application/json">{"meta":{"title":"Nghị định 255/2026/NĐ-CP — Quản lý thuế đối với các giao dịch liên kết của doanh nghiệp có quan hệ liên kết","shortCode":"NĐ 255/2026","subtitle":"Quản lý thuế với Giao dịch liên kết (thay NĐ132, NĐ20)","slug":"nd255","effectiveDate":"01/07/2026","scope":"Nghị định này quy định về nguyên tắc áp dụng quản lý thuế đối với các giao dịch liên kết của những doanh nghiệp có quan hệ liên kết; các bên có quan hệ liên kết; phân tích, so sánh, lựa chọn đối tượng so sánh độc lập và các phương pháp xác định giá giao dịch liên kết; xác định chi phí để tính thuế đối với doanh nghiệp có giao dịch liên kết; quyền và nghĩa vụ của người nộp thuế trong kê khai, lập h","description":"Quản lý thuế với Giao dịch liên kết (thay NĐ132, NĐ20)","related":[]},"outline":[{"id":"nd255_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Nghị định này quy định về nguyên tắc áp dụng quản lý thuế đối với các giao dịch liên kết của những doanh nghiệp có quan hệ liên kết; các bên có quan hệ liên kết; phân tích, so sánh, lựa chọn đối tượng so sánh độc lập và các phương pháp xác định giá giao dịch liên kết; xác định chi phí để tính thuế đối với doanh nghiệp có giao dịch liên kết; quyền và nghĩa vụ của người nộp thuế trong kê khai, lập hồ sơ xác định giá giao dịch liên kết; trách nhiệm của người nộp thuế liên quan đến báo cáo lợi nhuận liên quốc gia; trách nhiệm của các cơ quan nhà nước trong quản lý thuế đối với người nộp thuế có phát sinh giao dịch liên kết."}]},{"id":"nd255_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức sản xuất, kinh doanh hàng hóa, dịch vụ (sau đây gọi chung là người nộp thuế) là đối tượng nộp thuế thu nhập doanh nghiệp có phát sinh giao dịch với các bên có quan hệ liên kết theo quy định tại Điều 5 Nghị định này."},{"k":"p","t":"2. Cơ quan thuế."},{"k":"p","t":"3. Cơ quan nhà nước, tổ chức, cá nhân khác có liên quan."}]},{"id":"nd255_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc áp dụng","shortTitle":"Nguyên tắc áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có giao dịch liên kết phải loại trừ các yếu tố làm giảm nghĩa vụ thuế do quan hệ liên kết chi phối, tác động để kê khai, xác định nghĩa vụ thuế đối với các giao dịch liên kết tương đương với các giao dịch độc lập có cùng điều kiện."},{"k":"p","t":"2. Cơ quan thuế quản lý, kiểm tra đối với giá giao dịch liên kết của người nộp thuế theo nguyên tắc áp dụng trong quản lý thuế quy định tại khoản 4 Điều 6 và nguyên tắc kiểm tra thuế quy định tại khoản 1 Điều 22 Luật Quản lý thuế số 108/2025/QH15."}]},{"id":"nd255_4","no":4,"code":"Điều 4","title":"Điều 4. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Các từ ngữ trong Nghị định này được hiểu như sau:"},{"k":"p","t":"1. Giao dịch liên kết là các giao dịch mua, bán, trao đổi, thuê, cho thuê, mượn, cho mượn, chuyển giao, chuyển nhượng hàng hóa, cung cấp dịch vụ; vay, cho vay, dịch vụ tài chính, đảm bảo tài chính và các công cụ tài chính khác; mua, bán, trao đổi, thuê, cho thuê, mượn, cho mượn, chuyển giao, chuyển nhượng tài sản hữu hình, tài sản vô hình và thỏa thuận mua, bán, sử dụng chung nguồn lực như tài sản, vốn, lao động, chia sẻ chi phí giữa các bên có quan hệ liên kết, trừ các giao dịch kinh doanh đối với hàng hóa, dịch vụ thuộc phạm vi điều chỉnh giá của Nhà nước thực hiện theo quy định của pháp luật về giá."},{"k":"p","t":"2. Hiệp định thuế là hiệp định được quy định tại điểm 11 Phụ lục I ban hành kèm theo Nghị định số 236/2025/NĐ-CP quy định chi tiết một số điều của Nghị quyết số 107/2023/QH15 ngày 29 tháng 11 năm 2023 của Quốc hội về việc áp dụng thuế thu nhập doanh nghiệp bổ sung theo quy định chống xói mòn cơ sở thuế toàn cầu."},{"k":"p","t":"3. Thỏa thuận của Nhà chức trách có thẩm quyền là thuật ngữ rút gọn của Thỏa thuận được ký kết giữa Nhà chức trách có thẩm quyền của Việt Nam và quốc gia, vùng lãnh thổ đối tác trên cơ sở điều ước quốc tế hoặc thỏa thuận quốc tế có quy định về trao đổi thông tin trong đó quy định cụ thể về việc trao đổi tự động Báo cáo lợi nhuận liên quốc gia."},{"k":"p","t":"4. Công ty mẹ tối cao là công ty được quy định tại khoản 4 Điều 3 Nghị quyết số 107/2023/QH15 về việc áp dụng thuế thu nhập doanh nghiệp bổ sung theo quy định chống xói mòn cơ sở thuế toàn cầu."},{"k":"p","t":"5. Cơ quan thuế đối tác là cơ quan thuế của nước, vùng lãnh thổ ký kết Hiệp định thuế với Việt Nam."},{"k":"p","t":"6. Đối tượng so sánh độc lập là các giao dịch độc lập giữa các bên không có quan hệ liên kết hoặc doanh nghiệp thực hiện giao dịch độc lập được lựa chọn trên cơ sở phân tích, so sánh, xác định đối tượng so sánh tương đồng để xác định mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận nhằm xác định nghĩa vụ thuế phải nộp ngân sách nhà nước của người nộp thuế, đảm bảo đúng quy định của Luật Quản lý thuế và Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"7. Khác biệt trọng yếu là khác biệt về các yếu tố hình thành giá có ảnh hưởng quan trọng hoặc đáng kể đến mức giá, tỷ suất lợi nhuận và tỷ lệ phân bổ lợi nhuận của các bên tham gia giao dịch."},{"k":"p","t":"8. Khoảng giá trị giao dịch độc lập là tập hợp các giá trị về mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận của các đối tượng so sánh độc lập được cơ quan thuế hoặc người nộp thuế lựa chọn trên cơ sở dữ liệu quy định tại Điều 17 Nghị định này. Các giá trị thuộc tập hợp này có mức độ so sánh tin cậy tương đương nhau. Trong trường hợp cần thiết, áp dụng phương pháp xác suất thống kê để xác định khoảng giá trị giao dịch độc lập chuẩn và giá trị trung vị mang tính chất đại diện, phổ quát, phổ biến nhằm tăng độ tin cậy của tập hợp các đối tượng so sánh độc lập."},{"k":"p","t":"9. Khoảng giá trị giao dịch độc lập chuẩn là tập hợp các giá trị từ bách phân vị thứ 35 đến bách phân vị thứ 75; trung vị của khoảng giá trị giao dịch độc lập chuẩn là giá trị bách phân vị thứ 50 theo hàm xác suất thống kê."},{"k":"p","t":"10. Tổ chức thay mặt nộp Báo cáo lợi nhuận liên quốc gia là thành viên của tập đoàn đa quốc gia được Công ty mẹ tối cao chỉ định thay mặt Công ty mẹ tối cao lập và nộp Báo cáo lợi nhuận liên quốc gia tại quốc gia, vùng lãnh thổ nơi thành viên đó là đối tượng cư trú thuế."},{"k":"p","t":"11. Hồ sơ quốc gia là thông tin về giao dịch liên kết, chính sách và phương pháp xác định giá đối với giao dịch liên kết của người nộp thuế tại Việt Nam."},{"k":"p","t":"12. Hồ sơ toàn cầu là thông tin về hoạt động kinh doanh của tập đoàn đa quốc gia, chính sách và phương pháp xác định giá giao dịch liên kết của tập đoàn trên toàn cầu và chính sách phân bổ thu nhập và phân bổ các hoạt động, chức năng trong chuỗi giá trị của tập đoàn."},{"k":"p","t":"13. Tình trạng không thực hiện trao đổi thông tin một cách hệ thống là trường hợp quốc gia hoặc vùng lãnh thổ đã có thỏa thuận trao đổi tự động Báo cáo lợi nhuận liên quốc gia đang có hiệu lực, nhưng tạm ngừng việc trao đổi vì các lý do không phù hợp với các điều kiện của thỏa thuận đó, hoặc liên tục không thực hiện việc trao đổi các Báo cáo lợi nhuận liên quốc gia mà quốc gia hoặc vùng lãnh thổ đó đang nắm giữ, dẫn đến việc cơ quan thuế Việt Nam không nhận được báo cáo theo quy định."}]},{"id":"nd255_5","no":5,"code":"Điều 5","title":"Điều 5. Các bên có quan hệ liên kết","shortTitle":"Các bên có quan hệ liên kết","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Các bên có quan hệ liên kết (sau đây gọi là “bên liên kết”) thực hiện theo quy định tại khoản 17 Điều 4 Luật Quản lý thuế số 108/2025/QH15."},{"k":"p","t":"2. Các bên có quan hệ liên kết gồm:"},{"k":"p","t":"a) Một doanh nghiệp nắm giữ trực tiếp hoặc gián tiếp ít nhất 25% vốn góp của chủ sở hữu của doanh nghiệp kia;"},{"k":"p","t":"b) Cả hai doanh nghiệp đều có ít nhất 25% vốn góp của chủ sở hữu do một bên thứ ba nắm giữ trực tiếp hoặc gián tiếp;"},{"k":"p","t":"c) Một doanh nghiệp là cổ đông lớn nhất về vốn góp của chủ sở hữu và nắm giữ trực tiếp hoặc gián tiếp ít nhất 10% tổng số cổ phần của doanh nghiệp kia;"},{"k":"p","t":"d) Một doanh nghiệp bảo lãnh hoặc cho một doanh nghiệp khác vay vốn dưới bất kỳ hình thức nào (bao gồm cả các khoản vay từ bên thứ ba được đảm bảo từ nguồn tài chính của bên liên kết và các giao dịch tài chính có bản chất tương tự) với điều kiện tổng dư nợ các khoản vốn vay của doanh nghiệp đi vay với doanh nghiệp cho vay hoặc bảo lãnh ít nhất bằng 25% vốn góp của chủ sở hữu của doanh nghiệp đi vay và chiếm trên 50% tổng dư nợ tất cả các khoản nợ trung và dài hạn của doanh nghiệp đi vay."},{"k":"p","t":"Quy định tại điểm d khoản này không áp dụng với các trường hợp sau:"},{"k":"p","t":"d.1) Bên bảo lãnh hoặc cho vay là các tổ chức kinh tế hoạt động theo quy định của Luật Các tổ chức tín dụng số 32/2024/QH15 (được sửa đổi, bổ sung tại Luật số 96/2025/QH15) không tham gia trực tiếp, gián tiếp điều hành, kiểm soát, góp vốn, đầu tư vào doanh nghiệp đi vay hoặc doanh nghiệp được bảo lãnh theo quy định tại các điểm a, c, đ, e, g, h, k, l và điểm m khoản này."},{"k":"p","t":"d.2) Bên bảo lãnh hoặc cho vay là các tổ chức kinh tế hoạt động theo quy định của Luật Các tổ chức tín dụng số 32/2024/QH15 (được sửa đổi, bổ sung tại Luật số 96/2025/QH15) và doanh nghiệp đi vay hoặc được bảo lãnh không trực tiếp, gián tiếp cùng chịu sự điều hành, kiểm soát, góp vốn, đầu tư của một bên khác theo quy định tại các điểm b, e và điểm i khoản này."},{"k":"p","t":"d.3) Chủ nợ, bên bảo lãnh là tổ chức do Nhà nước sở hữu 100% vốn điều lệ có chức năng mua, bán, xử lý nợ không tham gia trực tiếp, gián tiếp điều hành, kiểm soát góp vốn, đầu tư vào doanh nghiệp bên nợ hoặc doanh nghiệp được bảo lãnh theo quy định tại điểm a và điểm c khoản này."},{"k":"p","t":"đ) Một doanh nghiệp chỉ định thành viên ban lãnh đạo điều hành hoặc nắm quyền kiểm soát của một doanh nghiệp khác với điều kiện số lượng các thành viên được doanh nghiệp thứ nhất chỉ định chiếm trên 50% tổng số thành viên ban lãnh đạo điều hành hoặc nắm quyền kiểm soát của doanh nghiệp thứ hai; hoặc một thành viên được doanh nghiệp thứ nhất chỉ định có quyền quyết định các chính sách tài chính hoặc hoạt động kinh doanh của doanh nghiệp thứ hai;"},{"k":"p","t":"e) Hai doanh nghiệp cùng có trên 50% thành viên ban lãnh đạo hoặc cùng có một thành viên ban lãnh đạo có quyền quyết định các chính sách tài chính hoặc hoạt động kinh doanh được chỉ định bởi một bên thứ ba;"},{"k":"p","t":"g) Hai doanh nghiệp được điều hành hoặc chịu sự kiểm soát về nhân sự, tài chính và hoạt động kinh doanh bởi các cá nhân thuộc một trong các mối quan hệ vợ, chồng; cha mẹ đẻ, cha mẹ nuôi, cha dượng, mẹ kế, cha mẹ vợ, cha mẹ chồng; con đẻ, con nuôi, con riêng của vợ hoặc chồng, con dâu, con rể; anh, chị, em cùng cha mẹ, anh, chị em cùng cha khác mẹ, anh, chị, em cùng mẹ khác cha, anh rể, em rể, chị dâu, em dâu của người cùng cha mẹ hoặc cùng cha khác mẹ, cùng mẹ khác cha; ông bà nội, ông bà ngoại; cháu nội, cháu ngoại; cô, dì, chú, cậu, bác ruột và cháu ruột;"},{"k":"p","t":"h) Hai cơ sở kinh doanh có mối quan hệ trụ sở chính và cơ sở thường trú hoặc cùng là cơ sở thường trú của tổ chức, cá nhân nước ngoài;"},{"k":"p","t":"i) Các doanh nghiệp chịu sự kiểm soát của một cá nhân thông qua vốn góp của cá nhân này vào doanh nghiệp đó hoặc trực tiếp tham gia điều hành doanh nghiệp;"},{"k":"p","t":"k) Các trường hợp khác trong đó doanh nghiệp (bao gồm cả chi nhánh hạch toán độc lập thực hiện kê khai, nộp thuế thu nhập doanh nghiệp) chịu sự điều hành, kiểm soát, quyết định trên thực tế đối với hoạt động sản xuất kinh doanh của doanh nghiệp kia;"},{"k":"p","t":"l) Doanh nghiệp có phát sinh các giao dịch nhượng, nhận chuyển nhượng vốn góp ít nhất 25% vốn góp của chủ sở hữu của doanh nghiệp trong kỳ tính thuế; vay, cho vay, mượn, cho mượn ít nhất 10% vốn góp của chủ sở hữu tại thời điểm phát sinh giao dịch trong kỳ tính thuế với cá nhân điều hành, kiểm soát doanh nghiệp hoặc với cá nhân thuộc một trong các mối quan hệ theo quy định tại điểm g khoản này;"},{"k":"p","t":"m) Tổ chức tín dụng với Công ty con hoặc với Công ty kiểm soát hoặc với Công ty liên kết của tổ chức tín dụng theo quy định tại Luật Các tổ chức tín dụng số 32/2024/QH15 (được sửa đổi, bổ sung tại Luật số 96/2025/QH15)."}]},{"id":"nd255_6","no":6,"code":"Điều 6","title":"Điều 6. Nguyên tắc phân tích, so sánh","shortTitle":"Nguyên tắc phân tích, so sánh","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Phân tích, so sánh giao dịch liên kết thực hiện theo nguyên tắc bản chất hoạt động, giao dịch quyết định nghĩa vụ thuế để xác định bản chất giao dịch liên kết:"},{"k":"p","t":"a) Bản chất giao dịch được đối chiếu giữa hợp đồng pháp lý hoặc văn bản, thỏa thuận giao dịch của các bên liên kết với thực tiễn thực hiện của các bên. Trường hợp người nộp thuế phát sinh giao dịch liên kết nhưng không có thỏa thuận bằng văn bản hoặc thỏa thuận không phù hợp nguyên tắc giao dịch độc lập hoặc thực tế thực hiện không phù hợp nguyên tắc giao dịch độc lập giữa các bên không có quan hệ liên kết, giao dịch liên kết phải được xác định theo đúng bản chất kinh doanh giữa các bên độc lập, cụ thể: Bên liên kết nhận doanh thu, lợi nhuận từ giao dịch liên kết với người nộp thuế phải có quyền sở hữu và kiểm soát rủi ro kinh doanh đối với các tài sản, hàng hóa, dịch vụ, nguồn lực, quyền mang lại lợi ích kinh tế và các quyền tạo ra thu nhập từ cổ phần, cổ phiếu và các công cụ tài chính khác và người nộp thuế phát sinh chi phí từ giao dịch với bên liên kết phải nhận được lợi ích, giá trị kinh tế trực tiếp hoặc góp phần tạo ra doanh thu, giá trị gia tăng cho hoạt động sản xuất, kinh doanh của người nộp thuế phù hợp nguyên tắc giao dịch độc lập;"},{"k":"p","t":"b) Bản chất giao dịch được xác định bằng phương pháp thu thập thông tin, chứng cứ, dữ liệu về giao dịch, rủi ro của các bên liên kết trong thực tiễn hoạt động sản xuất kinh doanh."},{"k":"p","t":"2. Phân tích, so sánh giao dịch liên kết với giao dịch độc lập:"},{"k":"p","t":"a) Căn cứ đối chiếu các hợp đồng, văn bản, thỏa thuận và quan hệ kinh tế, thương mại, tài chính trong các giao dịch liên kết của người nộp thuế là dữ liệu, thực tế thực hiện giao dịch giữa các bên liên kết để so sánh với các quyết định kinh doanh có thể được các bên độc lập chấp thuận trong điều kiện tương đồng. Nguyên tắc đối chiếu áp dụng trong phân tích, so sánh coi trọng bản chất và thực tiễn kinh doanh, rủi ro gánh chịu của các bên liên kết hơn là các thỏa thuận bằng văn bản;"},{"k":"p","t":"b) Phân tích, so sánh phải đảm bảo tính tương đồng giữa doanh nghiệp thực hiện giao dịch độc lập với doanh nghiệp có giao dịch liên kết hoặc giao dịch độc lập với giao dịch liên kết, không có yếu tố khác biệt ảnh hưởng trọng yếu đến mức giá; tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận giữa các bên. Trường hợp có yếu tố khác biệt ảnh hưởng trọng yếu đến mức giá; tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận, phải phân tích, xác định và thực hiện điều chỉnh loại trừ yếu tố khác biệt trọng yếu đó thông qua so sánh các yếu tố quy định tại Điều 7, Điều 10 Nghị định này và phù hợp với từng phương pháp xác định giá giao dịch liên kết quy định tại Điều 13, Điều 14, Điều 15 Nghị định này."}]},{"id":"nd255_7","no":7,"code":"Điều 7","title":"Điều 7. Lựa chọn đối tượng so sánh độc lập","shortTitle":"Lựa chọn đối tượng so sánh độc lập","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Lựa chọn đối tượng so sánh độc lập nội bộ là việc lựa chọn giao dịch của chính người nộp thuế với bên không có quan hệ liên kết, đảm bảo tương đồng không có khác biệt ảnh hưởng trọng yếu đến mức giá; tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận giữa các bên. Trường hợp không có đối tượng so sánh độc lập nội bộ tương đồng, thực hiện lựa chọn đối tượng so sánh theo điểm b và điểm c khoản 4 Điều 17 Nghị định này. Việc so sánh giữa giao dịch liên kết và giao dịch độc lập được thực hiện trên cơ sở từng giao dịch đối với từng sản phẩm tương đồng. Trường hợp không thể so sánh giao dịch theo sản phẩm, việc gộp chung các giao dịch phải đảm bảo phù hợp bản chất, thực tiễn kinh doanh và việc áp dụng phương pháp xác định giá của giao dịch liên kết được thực hiện theo quy định tại Điều 12, Điều 13, Điều 14, Điều 15 Nghị định này."},{"k":"p","t":"2. Dữ liệu tài chính, kinh doanh của các đối tượng so sánh phải đảm bảo độ tin cậy để sử dụng cho mục đích kê khai, tính thuế, phù hợp với các quy định về kế toán, thống kê và thuế. Thời điểm phát sinh giao dịch của các đối tượng so sánh độc lập phải cùng thời điểm phát sinh với giao dịch liên kết hoặc có năm tài chính cùng với năm tài chính của người nộp thuế, trừ trường hợp đặc thù cần thiết mở rộng thời gian so sánh theo quy định tại Điều 9 Nghị định này. Định dạng dữ liệu phải đảm bảo có thể so sánh, tính toán được các mức giá tại thời điểm giao dịch hoặc trong cùng kỳ tính thuế; dữ liệu so sánh về tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận phải đảm bảo ít nhất là ba kỳ tính thuế liên tục. Đối với các giá trị tỷ suất, tỷ lệ tương đối, người nộp thuế làm tròn số đến chữ số thứ hai sau dấu thập phân. Trường hợp số tương đối được lấy từ các số liệu công bố không có số tuyệt đối đi kèm và không sử dụng nguyên tắc làm tròn này thì lấy theo số liệu đã công bố có trích dẫn nguồn."},{"k":"p","t":"3. Số lượng tối thiểu đối tượng so sánh độc lập được chọn sau khi phân tích, so sánh và điều chỉnh khác biệt trọng yếu được lựa chọn như sau: 01 đối tượng trong trường hợp giao dịch liên kết hoặc người nộp thuế thực hiện giao dịch liên kết và đối tượng so sánh độc lập không có khác biệt; 03 đối tượng trong trường hợp đối tượng so sánh độc lập có khác biệt nhưng có đủ thông tin, dữ liệu làm cơ sở để loại trừ tất cả các khác biệt trọng yếu và 05 đối tượng trong trường hợp chỉ có thông tin, dữ liệu làm cơ sở để loại trừ hầu hết các khác biệt trọng yếu của đối tượng so sánh độc lập."}]},{"id":"nd255_8","no":8,"code":"Điều 8","title":"Điều 8. Điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế","shortTitle":"Điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp tìm kiếm được các đối tượng so sánh độc lập có mức độ so sánh tin cậy tương đương nhau, không có khác biệt hoặc có khác biệt nhưng có đủ thông tin, dữ liệu làm cơ sở để loại trừ tất cả các khác biệt trọng yếu:"},{"k":"p","t":"a) Nếu mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế thuộc khoảng giá trị giao dịch độc lập của các đối tượng so sánh độc lập tương đồng thì người nộp thuế không phải thực hiện điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận để xác định giá giao dịch liên kết;"},{"k":"p","t":"b) Nếu mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế không thuộc khoảng giá trị giao dịch độc lập của các đối tượng so sánh độc lập tương đồng thì người nộp thuế phải xác định giá trị thuộc khoảng giao dịch độc lập phản ánh mức độ tương đồng cao nhất với giao dịch liên kết để điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của giao dịch liên kết nhưng không làm giảm thu nhập chịu thuế, không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước của người nộp thuế."},{"k":"p","t":"2. Trường hợp chỉ có thông tin dữ liệu làm cơ sở để loại trừ hầu hết các khác biệt trọng yếu của đối tượng so sánh độc lập, tối thiểu lựa chọn 05 đối tượng so sánh độc lập và áp dụng khoảng giá trị giao dịch độc lập chuẩn theo hướng dẫn tại Phụ lục V ban hành kèm theo Nghị định này. Việc lựa chọn giá trị thuộc khoảng giá trị giao dịch độc lập chuẩn để điều chỉnh, xác định lại mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận của người nộp thuế như sau:"},{"k":"p","t":"a) Nếu mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế là giá trị thuộc khoảng giá trị giao dịch độc lập chuẩn của các đối tượng so sánh độc lập tương đồng, người nộp thuế không phải điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận để xác định giá giao dịch liên kết;"},{"k":"p","t":"b) Trường hợp mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế không thuộc khoảng giá trị giao dịch độc lập chuẩn của các đối tượng so sánh độc lập tương đồng, người nộp thuế phải xác định giá trị thuộc khoảng giao dịch độc lập chuẩn phản ánh mức độ tương đồng cao nhất với giao dịch liên kết để điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của giao dịch liên kết và xác định thu nhập chịu thuế, số thuế phải nộp nhưng không làm giảm thu nhập chịu thuế, không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước;"},{"k":"p","t":"c) Trường hợp cơ quan thuế thực hiện điều chỉnh hoặc ấn định mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế, giá trị điều chỉnh hoặc ấn định là giá trị trung vị của khoảng giá trị giao dịch độc lập chuẩn."},{"k":"p","t":"3. Căn cứ phương pháp xác định giá giao dịch liên kết và các đối tượng so sánh độc lập được lựa chọn, thực hiện điều chỉnh mức giá; tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận của người nộp thuế để xác định nghĩa vụ thuế thu nhập doanh nghiệp của người nộp thuế không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước."}]},{"id":"nd255_9","no":9,"code":"Điều 9","title":"Điều 9. Mở rộng phạm vi phân tích, so sánh","shortTitle":"Mở rộng phạm vi phân tích, so sánh","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với giao dịch liên kết mang tính đặc thù không tìm kiếm được đối tượng so sánh độc lập để so sánh thì thực hiện mở rộng phạm vi phân tích, so sánh về ngành, thị trường địa lý, thời gian so sánh để tìm kiếm đối tượng so sánh độc lập. Việc mở rộng phạm vi phân tích, so sánh được thực hiện như sau:"},{"k":"p","t":"a) Lựa chọn các đối tượng so sánh độc lập theo phân ngành kinh tế thống kê có tính tương đồng cao nhất với phân ngành hoạt động của người nộp thuế trong cùng thị trường địa bàn, cùng địa phương, trong nước;"},{"k":"p","t":"b) Mở rộng địa bàn so sánh sang các nước trong khu vực có điều kiện ngành và trình độ phát triển kinh tế tương đồng."},{"k":"p","t":"2. Trường hợp mở rộng phạm vi phân tích lựa chọn đối tượng so sánh độc lập tại các địa bàn nêu trên, phải phân tích tính tương đồng và các khác biệt trọng yếu định tính và định lượng theo quy định tại khoản 6 Điều 10 và Điều 14 Nghị định này hoặc sử dụng số liệu, dữ liệu của các đối tượng so sánh độc lập trong niên độ trước và thực hiện điều chỉnh các khác biệt trọng yếu do yếu tố thời gian (nếu có)."},{"k":"p","t":"Thời gian mở rộng thu thập số liệu, dữ liệu của đối tượng so sánh độc lập không quá một năm tài chính so với năm tài chính của người nộp thuế nếu sử dụng phương pháp xác định giá giao dịch liên kết quy định tại Điều 14 Nghị định này."}]},{"id":"nd255_10","no":10,"code":"Điều 10","title":"Điều 10. Các tiêu thức để phân tích, so sánh, điều chỉnh khác biệt trọng yếu","shortTitle":"Các tiêu thức để phân tích, so sánh, điều chỉnh khác biệt trọng yếu","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Phân tích, so sánh áp dụng phương pháp đối chiếu, rà soát, điều chỉnh khác biệt trọng yếu đối với các yếu tố so sánh để lựa chọn các đối tượng so sánh độc lập gồm đặc tính sản phẩm của hàng hóa, dịch vụ, tài sản (sau đây viết tắt là đặc tính sản phẩm); chức năng hoạt động và tài sản, rủi ro sản xuất kinh doanh; điều kiện hợp đồng và điều kiện kinh tế khi phát sinh giao dịch."},{"k":"p","t":"2. Đặc tính sản phẩm là các đặc tính có ảnh hưởng đến giá của sản phẩm bao gồm: đặc tính hàng hóa hữu hình như đặc tính vật lý, chủng loại sản phẩm, chất lượng, nhãn hiệu thương mại của sản phẩm, độ tin cậy, tính sẵn có và sản lượng cung cấp; đặc tính dịch vụ như bản chất, mức độ phức tạp, chuyên môn và phạm vi dịch vụ; đặc tính tài sản vô hình như hình thức chuyển giao, loại hình tài sản, hình thức sở hữu, thời hạn, mức độ bảo hộ sở hữu, thời gian chuyển giao, các quyền được chuyển giao và các lợi ích có thể thu được từ việc sử dụng tài sản vô hình."},{"k":"p","t":"a) Phân tích tài sản vô hình và khả năng phân bổ lợi nhuận cho các bên liên kết không chỉ căn cứ vào quyền sở hữu pháp lý mà phải xem xét tất cả các hoạt động kiểm soát rủi ro và năng lực tài chính để quản lý rủi ro đối với toàn bộ quá trình phát triển, gia tăng, duy trì, bảo hộ và khai thác tài sản vô hình giữa các bên liên kết. Việc phân tích, so sánh căn cứ vào một số đặc điểm của tài sản vô hình như tính độc quyền; phạm vi và thời hạn bảo hộ pháp lý; các quyền xác lập theo văn bằng bảo hộ, giấy phép và văn bản chuyển giao quyền của tài sản vô hình; phạm vi địa lý đối với các quyền của tài sản vô hình; vòng đời; giai đoạn phát triển; quyền về tăng cường giá trị, sửa đổi và cập nhật đối với tài sản vô hình; mức lợi nhuận dự kiến của tài sản vô hình;"},{"k":"p","t":"b) Phân tích đặc điểm tài sản vô hình bao gồm các nội dung xác định tài sản vô hình sử dụng hoặc chuyển nhượng trong giao dịch và những rủi ro cụ thể, trọng yếu về kinh tế liên quan đến phát triển, gia tăng, duy trì, bảo vệ và khai thác tài sản vô hình; xác định thỏa thuận tại hợp đồng như quyền sở hữu pháp lý đối với tài sản vô hình, các điều khoản và điều kiện của thỏa thuận pháp lý, đăng ký, thỏa thuận về giấy phép và các hợp đồng liên quan, các rủi ro kèm theo; xác định bên thực hiện chức năng khai thác, sử dụng tài sản, quản lý rủi ro liên quan đến phát triển, gia tăng, duy trì, bảo hộ và khai thác tài sản vô hình; xác định các điều khoản thỏa thuận theo hợp đồng và thực tiễn thực hiện của các bên; xác định giao dịch liên kết thực tế liên quan đến phát triển, gia tăng, duy trì, bảo hộ và khai thác tài sản vô hình khi xem xét quyền sở hữu pháp lý của tài sản vô hình và các mối quan hệ, các quyền theo hợp đồng có liên quan, quá trình thực hiện của các bên và xác định giá của giao dịch phù hợp với đóng góp, chức năng thực hiện, tài sản sử dụng và rủi ro giả định của các bên."},{"k":"p","t":"3. Chức năng hoạt động, tài sản và rủi ro sản xuất kinh doanh do mỗi bên của hợp đồng thực hiện và tài sản, rủi ro sản xuất kinh doanh trong mối quan hệ với các chi phí cơ hội, điều kiện kinh tế, điều kiện ngành, lĩnh vực hoạt động và vị trí địa lý của người nộp thuế được phân tích để xác định các yếu tố phản ánh khả năng thu lợi nhuận từ các hoạt động và thực tiễn kinh doanh mà người nộp thuế đã thực hiện gắn với chức năng và việc sử dụng các tài sản, vốn và chi phí có liên quan."},{"k":"p","t":"Kết quả phân tích phản ánh chức năng chính trong mối quan hệ giữa việc sử dụng các loại tài sản, vốn, chi phí cơ hội cũng như rủi ro gắn với việc đầu tư tài sản, vốn và chi phí đó với khả năng thu lợi nhuận mà người nộp thuế thực hiện có liên quan đến giao dịch kinh doanh, cụ thể:"},{"k":"p","t":"a) Một số chức năng chính của doanh nghiệp được phân tích trong toàn bộ chuỗi giá trị của tập đoàn bao gồm nghiên cứu, phát triển như thực hiện dịch vụ nghiên cứu phát triển theo hợp đồng, tự chủ nghiên cứu phát triển, phát triển công nghệ kỹ thuật và thiết kế sản phẩm; sản xuất gồm sản xuất tự chủ, sản xuất cấp phép, sản xuất theo hợp đồng, gia công, lắp ráp, cài đặt thiết bị; mua bán, quản lý nguyên vật liệu và các hoạt động mua bán khác; phân phối gồm phân phối tự chủ, phân phối rủi ro hạn chế, đại lý hoa hồng, phân phối bán buôn, phân phối bán lẻ; cung cấp dịch vụ hỗ trợ như pháp lý, kế toán tài chính, tín dụng thu nợ, đào tạo và quản lý nhân sự; cung cấp dịch vụ vận chuyển, lưu kho; thực hiện phát triển thương hiệu như hoạt động marketing, quảng cáo, quảng bá, nghiên cứu thị trường và chức năng khác trong chuỗi giá trị ngành;"},{"k":"p","t":"b) Một số tài sản chính của doanh nghiệp gồm tài sản vô hình như bí quyết kỹ thuật, bản quyền, bí quyết kinh doanh, công thức bí mật, bằng sáng chế, các tài sản vô hình liên quan tới hoạt động thương mại, marketing như thương hiệu, hệ thống xây dựng và nhận diện thương hiệu, danh sách, số liệu và quan hệ với khách hàng; tài sản hữu hình như nhà xưởng, máy móc, thiết bị; các tài sản tài chính và các quyền lợi, lợi ích kinh tế từ các tài sản này trong quá trình khai thác, sử dụng và chuyển nhượng tài sản;"},{"k":"p","t":"c) Một số rủi ro chính trong kinh doanh gồm rủi ro chiến lược hoặc rủi ro thị trường do thực hiện các chiến lược kinh doanh như thâm nhập, mở rộng hoặc duy trì thị trường; rủi ro về cơ sở hạ tầng hay rủi ro hàng tồn kho; rủi ro tài chính như rủi ro tín dụng và nợ xấu, rủi ro tỷ giá hối đoái; rủi ro giao dịch như các yếu tố giá và điều khoản thanh toán trong giao dịch thương mại; rủi ro sản phẩm từ thiết kế phát triển, sản xuất đến quản lý chất lượng và dịch vụ sau bán hàng; rủi ro kinh doanh từ các khoản đầu tư vốn và số lượng khách hàng và các rủi ro bất khả kháng."},{"k":"p","t":"Phân tích rủi ro kinh doanh của người nộp thuế trong toàn bộ chuỗi giá trị của tập đoàn nhằm xác định các rủi ro trọng yếu đối với toàn bộ chuỗi giá trị ngành, khả năng kiểm soát rủi ro như việc đưa ra quyết định quản lý rủi ro và xử lý khi thực tế xảy ra các rủi ro này, bao gồm: xác định các rủi ro chính về kinh tế; đánh giá mức độ phân bổ, dàn xếp rủi ro tại các hợp đồng pháp lý hoặc văn bản, thỏa thuận của người nộp thuế; phân tích chức năng kiểm soát và giảm thiểu rủi ro trên hợp đồng pháp lý hoặc văn bản, thỏa thuận; kiểm tra, rà soát tình hình thực hiện và gánh chịu, phân bổ rủi ro của người nộp thuế trên thực tế. Trường hợp có khác biệt về phân bổ rủi ro tại các hợp đồng pháp lý hoặc văn bản, thỏa thuận so với thực tiễn thực hiện, căn cứ kết quả phân tích rủi ro, cơ quan thuế thực hiện phân bổ lại rủi ro và điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế."},{"k":"p","t":"4. Điều khoản hợp đồng khi thực hiện giao dịch bao gồm một số các điều khoản về khối lượng, điều kiện giao dịch hoặc phân phối sản phẩm; thời hạn, điều kiện và phương thức thanh toán; điều kiện bảo hành, thay thế, nâng cấp, chỉnh sửa hoặc hiệu chỉnh sản phẩm; điều kiện về đặc quyền kinh doanh, phân phối sản phẩm; một số điều kiện có ảnh hưởng kinh tế khác như dịch vụ hỗ trợ, tư vấn kiểm tra chất lượng, hướng dẫn sử dụng, hỗ trợ quảng cáo, khuyến mại."},{"k":"p","t":"a) Trường hợp các điều khoản hợp đồng pháp lý hoặc văn bản, thỏa thuận không phản ánh đầy đủ thực tiễn thực hiện giữa các bên liên kết, việc phân tích, so sánh được thực hiện trên cơ sở rà soát các sự kiện thực tế hoặc các dữ liệu tài chính để xác định đặc điểm, bản chất kinh tế và các rủi ro kinh doanh thực tế của các bên;"},{"k":"p","t":"b) Trường hợp các bên liên kết không ký kết hợp đồng pháp lý hoặc văn bản, thỏa thuận, không ghi nhận doanh thu hoặc chi phí như hỗ trợ kỹ thuật, hợp lực tập đoàn, chia sẻ bí quyết kinh doanh hoặc sử dụng nhân sự biệt phái, kiêm nhiệm thì việc phân tích được tiến hành để xác định bản chất giao dịch, giá trị giao dịch, thu nhập tạo ra từ các giao dịch này và đóng góp của từng bên liên kết. Trên cơ sở đó, so sánh với các quyết định kinh doanh có thể được các bên độc lập chấp nhận trong điều kiện tương đồng để xác định lại giao dịch liên kết của người nộp thuế."},{"k":"p","t":"5. Điều kiện kinh tế của giao dịch và điều kiện của thị trường tại thời điểm diễn ra giao dịch có ảnh hưởng đến mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của các bên."},{"k":"p","t":"a) Một số điều kiện kinh tế khi diễn ra giao dịch như quy mô, vị trí địa lý của thị trường sản xuất và tiêu thụ sản phẩm, cấp độ thị trường như bán buôn, bán lẻ thông thường, phân phối độc quyền; mức độ cạnh tranh của sản phẩm trên thị trường và vị trí cạnh tranh tương ứng của người bán và người mua; khả năng sẵn có của hàng hóa thay thế; mức độ cung cầu trên thị trường nói chung và từng khu vực cụ thể; sức mua người tiêu dùng; các yếu tố kinh tế tác động đến chi phí sản xuất kinh doanh phát sinh tại nơi diễn ra giao dịch như chính sách ưu đãi thuế; chính sách điều tiết thị trường của các chính phủ; chi phí sản xuất, chi phí đất đai, lao động, vốn; chu kỳ kinh doanh và các yếu tố có tác động tích cực đến mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế như các đặc điểm về vị trí, lợi thế và việc tiết kiệm được chi phí dựa trên các yếu tố địa lý, thị trường của địa phương, lực lượng lao động và việc tập trung các chức năng hợp lực và chuyên môn hóa căn cứ đóng góp của tất cả các bên liên kết tham gia tạo lập giá trị;"},{"k":"p","t":"b) Trường hợp người nộp thuế và các đối tượng so sánh không cư trú cùng quốc gia, vùng lãnh thổ hoặc không cung cấp hàng hóa, dịch vụ tại cùng thị trường địa lý, việc phân tích điều kiện kinh tế bao gồm phân tích mức độ tương đồng của các thị trường nơi người nộp thuế và các đối tượng so sánh cư trú đối với các lợi thế so sánh, đặc lợi về vị trí tác động đến các yếu tố cạnh tranh như chi phí lao động, chi phí nguyên vật liệu, vận chuyển, tiền thuê đất, chi phí đào tạo, trợ cấp, ưu đãi về chính sách tài chính, thuế, chi phí cơ sở hạ tầng, mức độ tăng trưởng của thị trường và các đặc điểm lợi thế của thị trường như số lượng dân số, khách hàng với khả năng chi tiêu tăng trưởng tốt và các đặc điểm lợi thế so sánh khác."},{"k":"p","t":"6. Phân tích, so sánh, loại trừ các yếu tố khác biệt trọng yếu là phân tích loại trừ khác biệt về mặt định tính và định lượng đối với thông tin hoặc số liệu tài chính có ảnh hưởng trọng yếu đến yếu tố làm căn cứ xác định giá giao dịch liên kết theo từng phương pháp xác định giá giao dịch liên kết quy định tại Điều 13, Điều 14, Điều 15 Nghị định này. Khác biệt định lượng là khác biệt xác định bằng số tuyệt đối về chu kỳ kinh doanh, số năm thành lập, hoạt động của doanh nghiệp hoặc số tương đối như khác biệt về chỉ tiêu tài chính theo đặc thù ngành nghề đầu tư hoặc chức năng hoạt động, khác biệt về vốn lưu động; khác biệt định tính là các thông tin được xác định căn cứ vào từng phương pháp xác định giá giao dịch liên kết quy định tại Điều 13, Điều 14, Điều 15 Nghị định này."},{"k":"p","t":"a) Các yếu tố khác biệt được xác định là trọng yếu bao gồm: Khác biệt về đặc tính sản phẩm, điều kiện hợp đồng, chức năng, tài sản và rủi ro và ngành nghề kinh doanh, điều kiện kinh tế của người nộp thuế và các đối tượng so sánh độc lập; các khác biệt về chính sách, môi trường đầu tư, tác động của chi phí đầu vào sản xuất kinh doanh tại các địa bàn tại địa phương, trong nước và nước ngoài;"},{"k":"p","t":"b) Các khác biệt định lượng và định tính phải được rà soát, điều chỉnh tương ứng với các yếu tố so sánh có ảnh hưởng trọng yếu đến phương pháp xác định giá giao dịch liên kết quy định tại Điều 13, Điều 14, Điều 15 Nghị định này."},{"k":"p","t":"7. Kết quả phân tích, so sánh là căn cứ lựa chọn đối tượng so sánh độc lập phù hợp với từng phương pháp xác định giá giao dịch liên kết quy định tại Điều 13, Điều 14, Điều 15 Nghị định này. Trường hợp người nộp thuế không thực hiện điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận theo các đối tượng so sánh độc lập với lý do các khác biệt định tính và định lượng gây ảnh hưởng trọng yếu thì người nộp thuế phải tìm kiếm, lựa chọn lại các đối tượng so sánh độc lập để xác định khoảng giá trị giao dịch độc lập chuẩn đảm bảo mức độ tin cậy, tương đồng nhất và thực hiện điều chỉnh giá giao dịch liên kết theo quy định tại Nghị định này."}]},{"id":"nd255_11","no":11,"code":"Điều 11","title":"Điều 11. Trình tự phân tích, so sánh","shortTitle":"Trình tự phân tích, so sánh","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Xác định bản chất của giao dịch liên kết trước khi tiến hành phân tích tính tương đồng với các đối tượng so sánh độc lập."},{"k":"p","t":"2. Phân tích, so sánh, tìm kiếm, lựa chọn các đối tượng so sánh độc lập tương đồng trên cơ sở xác định thời gian so sánh, đặc tính sản phẩm, điều kiện hợp đồng; phân tích ngành, thị trường, điều kiện kinh tế khi phát sinh giao dịch; phân tích giao dịch liên kết và người nộp thuế thực hiện giao dịch liên kết; nguồn cơ sở dữ liệu; phương pháp xác định giá giao dịch liên kết và điều chỉnh các khác biệt trọng yếu, cụ thể:"},{"k":"p","t":"a) Xác định phạm vi, nội dung và yếu tố so sánh bao gồm thời gian so sánh; thông tin phân tích về người nộp thuế đối với các yếu tố so sánh về chức năng, tài sản, rủi ro; đặc tính sản phẩm; điều kiện hợp đồng; điều kiện kinh tế khi phát sinh giao dịch, phân tích ngành, thị trường, hoàn cảnh hoạt động kinh doanh, giao dịch hàng hóa, dịch vụ và tài sản của các bên để lựa chọn bên liên kết cần thực hiện xác định giá giao dịch liên kết theo quy định tại Nghị định này;"},{"k":"p","t":"b) Đánh giá, tìm kiếm đối tượng so sánh gồm ưu tiên rà soát các đối tượng so sánh độc lập nội bộ trên cơ sở xác minh độ tin cậy và tính độc lập của các đối tượng này đảm bảo không phải là các giao dịch dàn xếp không theo nguyên tắc giao dịch độc lập; xây dựng các tiêu chí tìm kiếm và xác định các nguồn cơ sở dữ liệu tin cậy có thể sử dụng theo quy định tại Điều 17 Nghị định này để tiến hành tìm kiếm các đối tượng so sánh độc lập tương đồng. Trên cơ sở các thông tin đã phân tích và rà soát tính sẵn có đối với dữ liệu của đối tượng so sánh độc lập, lựa chọn phương pháp xác định giá giao dịch liên kết phù hợp với bản chất hoạt động kinh doanh, thương mại, tài chính, rủi ro của bên liên kết cần thực hiện xác định giá;"},{"k":"p","t":"c) Phân tích mức độ tương đồng và tin cậy của các đối tượng so sánh độc lập được lựa chọn trên cơ sở rà soát, sàng lọc các tiêu chí định tính và định lượng; phân tích thông tin kinh tế, ngành và số liệu tài chính của các đối tượng được chọn để xác minh mức độ tương đồng; xác định khác biệt trọng yếu và điều chỉnh khác biệt trọng yếu. Trên cơ sở kết quả lựa chọn các đối tượng so sánh độc lập tương đồng, sử dụng dữ liệu, số liệu tài chính của các đối tượng so sánh độc lập được lựa chọn để xác định căn cứ thực hiện điều chỉnh mức giá, tỷ suất lợi nhuận, tỷ lệ phân bổ lợi nhuận của người nộp thuế theo quy định tại Điều 8 Nghị định này."},{"k":"p","t":"3. Xác định mức giá, tỷ suất lợi nhuận hoặc tỷ lệ phân bổ lợi nhuận căn cứ kết quả phân tích các đối tượng so sánh độc lập để làm cơ sở so sánh, áp dụng xác định nghĩa vụ thuế thu nhập doanh nghiệp phải nộp của người nộp thuế, không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước. Phương pháp tính toán phải được áp dụng thống nhất trong chu kỳ, giai đoạn sản xuất kinh doanh phù hợp chức năng, mô hình kinh doanh theo quy định tại Điều 12, Điều 13, Điều 14, Điều 15 Nghị định này."}]},{"id":"nd255_12","no":12,"code":"Điều 12","title":"Điều 12. Lựa chọn phương pháp xác định giá giao dịch liên kết","shortTitle":"Lựa chọn phương pháp xác định giá giao dịch liên kết","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"Phương pháp so sánh xác định giá của giao dịch liên kết (viết tắt là phương pháp xác định giá giao dịch liên kết) được áp dụng phù hợp nguyên tắc giao dịch độc lập, bản chất giao dịch và chức năng của người nộp thuế trên cơ sở tính toán, áp dụng thống nhất trong toàn bộ chu kỳ, giai đoạn sản xuất kinh doanh; căn cứ dữ liệu tài chính của các đối tượng so sánh độc lập được lựa chọn theo các nguyên tắc phân tích, so sánh quy định tại Điều 6, Điều 7, Điều 8, Điều 9, Điều 10 Nghị định này. Phương pháp xác định giá giao dịch liên kết được lựa chọn trong các phương pháp quy định tại Điều 13, Điều 14, Điều 15 Nghị định này, căn cứ vào đặc điểm của giao dịch liên kết và căn cứ vào thông tin dữ liệu sẵn có."}]},{"id":"nd255_13","no":13,"code":"Điều 13","title":"Điều 13. Phương pháp so sánh giá giao dịch liên kết với giá giao dịch độc lập","shortTitle":"Phương pháp so sánh giá giao dịch liên kết với giá giao dịch độc lập","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp áp dụng phương pháp so sánh giá giao dịch liên kết với giá giao dịch độc lập (sau đây viết tắt là phương pháp so sánh giá giao dịch độc lập)"},{"k":"p","t":"Người nộp thuế thực hiện giao dịch liên kết đối với từng chủng loại hàng hóa, tài sản hữu hình, loại hình dịch vụ có điều kiện giao dịch, lưu thông phổ biến trên thị trường hoặc có giá được công bố trên các sàn giao dịch hàng hóa, dịch vụ trong nước và quốc tế; giao dịch thanh toán phí bản quyền khi khai thác tài sản vô hình; thanh toán lãi vay trong hoạt động vay và cho vay; hoặc người nộp thuế thực hiện cả giao dịch độc lập và giao dịch liên kết đối với sản phẩm tương đồng về đặc tính sản phẩm và điều kiện hợp đồng."},{"k":"p","t":"2. Nguyên tắc áp dụng:"},{"k":"p","t":"a) Phương pháp so sánh giá giao dịch độc lập được thực hiện trên nguyên tắc không có khác biệt về đặc tính sản phẩm và điều kiện hợp đồng khi so sánh giá giao dịch độc lập và giá giao dịch liên kết có ảnh hưởng trọng yếu đến giá sản phẩm. Trường hợp có các khác biệt ảnh hưởng trọng yếu đến giá sản phẩm, phải loại trừ các khác biệt trọng yếu này;"},{"k":"p","t":"b) Các yếu tố đặc tính sản phẩm và điều kiện hợp đồng có tác động trọng yếu đến giá sản phẩm, bao gồm: Đặc tính, chất lượng, thương hiệu, nhãn hiệu thương mại của sản phẩm và quy mô, khối lượng giao dịch; các điều kiện hợp đồng cung cấp, chuyển giao sản phẩm; khối lượng, thời hạn chuyển giao, thời hạn thanh toán và các điều kiện khác của hợp đồng; quyền phân phối, tiêu thụ hàng hóa, dịch vụ, tài sản có ảnh hưởng đến giá trị kinh tế và thị trường nơi diễn ra giao dịch và các yếu tố khác tác động đến giá sản phẩm như điều kiện kinh tế và chức năng hoạt động của người nộp thuế."},{"k":"p","t":"3. Phương pháp xác định:"},{"k":"p","t":"a) Giá sản phẩm trong giao dịch liên kết được điều chỉnh theo giá sản phẩm trong giao dịch độc lập hoặc giá trị thuộc khoảng giá trị giao dịch độc lập chuẩn của các đối tượng so sánh độc lập theo quy định tại Nghị định này;"},{"k":"p","t":"b) Trường hợp giá sản phẩm được công bố trên các sàn giao dịch hàng hóa, dịch vụ trong nước và quốc tế, giá sản phẩm trong giao dịch liên kết được xác định theo giá sản phẩm được công bố có thời điểm và các điều kiện giao dịch tương đồng;"},{"k":"p","t":"c) Người nộp thuế mua máy móc, thiết bị từ bên liên kết ở nước ngoài phải có tài liệu, chứng từ chứng minh giá mua máy móc, thiết bị tuân theo nguyên tắc giao dịch độc lập tại thời điểm mua: Đối với máy móc, thiết bị mới, giá so sánh là giá hóa đơn bên liên kết mua máy móc, thiết bị đó từ bên độc lập; đối với máy móc, thiết bị đã qua sử dụng, phải có hóa đơn, chứng từ gốc tại thời điểm mua, khi đó giá trị tài sản được xác định lại theo quy định hiện hành của pháp luật về hướng dẫn quản lý, sử dụng và trích khấu hao tài sản cố định."},{"k":"p","t":"4. Kết quả xác định giá giao dịch liên kết là giá tính thuế để kê khai, xác định số thuế thu nhập doanh nghiệp phải nộp nhưng không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước của người nộp thuế."}]},{"id":"nd255_14","no":14,"code":"Điều 14","title":"Điều 14. Phương pháp so sánh tỷ suất lợi nhuận của người nộp thuế với tỷ suất lợi nhuận của các đối tượng so sánh độc lập","shortTitle":"Phương pháp so sánh tỷ suất lợi nhuận của người nộp thuế với tỷ suất lợi nhuận của các đối tượng so sánh độc lập","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp áp dụng:"},{"k":"p","t":"Người nộp thuế không có cơ sở dữ liệu và thông tin để áp dụng phương pháp so sánh giá giao dịch độc lập quy định tại Điều 13 Nghị định này hoặc người nộp thuế không thể so sánh giao dịch theo sản phẩm trên cơ sở từng giao dịch đối với từng sản phẩm tương đồng, việc gộp chung các giao dịch được tiến hành nhằm đảm bảo phù hợp bản chất, thực tiễn kinh doanh và lựa chọn được tỷ suất lợi nhuận của các đối tượng so sánh độc lập phù hợp hoặc người nộp thuế không thực hiện chức năng tự chủ đối với toàn bộ chuỗi hoạt động sản xuất, kinh doanh hoặc không tham gia thực hiện các giao dịch liên kết theo quy định tại Điều 15 Nghị định này, cụ thể:"},{"k":"p","t":"a) Phương pháp so sánh tỷ suất lợi nhuận gộp trên doanh thu (phương pháp giá bán lại) áp dụng trong trường hợp người nộp thuế thực hiện bán hàng, phân phối lại các sản phẩm mua từ bên liên kết cho các khách hàng độc lập và không tạo ra tài sản vô hình gắn liền với sản phẩm bán ra; không tham gia vào quá trình phát triển, gia tăng, duy trì, bảo vệ tài sản vô hình do bên liên kết sở hữu gắn với sản phẩm bán ra hoặc không thực hiện gia công, chế biến, lắp ráp thay đổi tính chất, đặc điểm sản phẩm, gắn nhãn hiệu thương mại để làm gia tăng giá trị sản phẩm. Phương pháp giá bán lại không áp dụng cho người nộp thuế là nhà phân phối sở hữu các tài sản vô hình có giá trị của tập đoàn đối với thương hiệu, nhãn hiệu hàng hóa và các tài sản vô hình liên quan đến marketing khác như danh sách khách hàng, kênh phân phối, biểu tượng, hình ảnh và các yếu tố nhận diện thương hiệu trong hoạt động nghiên cứu thị trường, tiếp thị, xúc tiến thương mại hoặc phát sinh chi phí tạo lập, thiết kế các kênh phân phối, nhận diện thương hiệu, hoặc các chi phí sau bán hàng;"},{"k":"p","t":"b) Phương pháp so sánh tỷ suất lợi nhuận gộp trên giá vốn (phương pháp giá vốn cộng lãi) áp dụng trong trường hợp người nộp thuế không sở hữu tài sản vô hình và gánh chịu ít rủi ro kinh doanh, thực hiện chức năng sản xuất theo hợp đồng, đơn đặt hàng hoặc gia công, lắp ráp, chế tạo, chế biến sản phẩm, cài đặt thiết bị; thu mua, cung ứng sản phẩm; cung cấp dịch vụ hoặc thực hiện nghiên cứu phát triển theo hợp đồng cho bên liên kết. Phương pháp giá vốn cộng lãi không áp dụng cho người nộp thuế là doanh nghiệp sản xuất tự chủ, thực hiện các chức năng nghiên cứu phát triển sản phẩm đến xây dựng thương hiệu, nhãn hiệu hàng hóa, chiến lược thị trường và bảo hành sản phẩm, chăm sóc khách hàng;"},{"k":"p","t":"c) Phương pháp so sánh tỷ suất lợi nhuận thuần: Phương pháp so sánh tỷ suất lợi nhuận thuần áp dụng trong trường hợp người nộp thuế không có thông tin để áp dụng phương pháp so sánh giá giao dịch độc lập; không có dữ liệu và thông tin về phương pháp hạch toán kế toán của các đối tượng so sánh độc lập hoặc không tìm được các đối tượng so sánh có chức năng và sản phẩm tương đồng nên không đủ cơ sở áp dụng các phương pháp so sánh tỷ suất lợi nhuận gộp trên doanh thu hoặc trên giá vốn; người nộp thuế thực hiện các chức năng phân phối hoặc sản xuất không sở hữu tài sản vô hình hoặc không tham gia phát triển, gia tăng, duy trì, bảo vệ và khai thác tài sản vô hình hoặc không thuộc trường hợp áp dụng phương pháp phân bổ lợi nhuận giữa các bên liên kết theo quy định tại khoản 1 Điều 15 Nghị định này."},{"k":"p","t":"2. Nguyên tắc áp dụng:"},{"k":"p","t":"a) Phương pháp so sánh tỷ suất lợi nhuận được áp dụng trên nguyên tắc không có khác biệt về chức năng hoạt động, tài sản, rủi ro; điều kiện kinh tế và phương pháp hạch toán kế toán khi so sánh giữa người nộp thuế và đối tượng so sánh độc lập có ảnh hưởng trọng yếu đến tỷ suất lợi nhuận. Trường hợp có các khác biệt ảnh hưởng trọng yếu đến tỷ suất lợi nhuận, khi đó phải loại trừ các khác biệt trọng yếu này;"},{"k":"p","t":"Các yếu tố có tác động trọng yếu đến tỷ suất lợi nhuận, bao gồm: Các yếu tố về tài sản, vốn, chi phí; quyền kiểm soát, quyền quyết định trên thực tế phục vụ cho việc thực hiện chức năng chính của người nộp thuế; tính chất ngành nghề hoạt động kinh doanh và thị trường sản xuất, tiêu thụ sản phẩm; phương pháp hạch toán kế toán và cơ cấu chi phí của sản phẩm; điều kiện kinh tế diễn ra giao dịch; các quan hệ thương mại hoặc tài chính của tập đoàn đa quốc gia; hỗ trợ kỹ thuật; chia sẻ bí quyết kinh doanh; sử dụng nhân sự biệt phái hoặc kiêm nhiệm và các điều kiện kinh tế của ngành, lĩnh vực kinh doanh của người nộp thuế, đặc tính sản phẩm và điều kiện hợp đồng;"},{"k":"p","t":"b) Trường hợp áp dụng phương pháp giá bán lại: Khác biệt có thể gây ảnh hưởng trọng yếu đến tỷ suất lợi nhuận gộp trên giá bán ra (doanh thu thuần) như các chi phí phản ánh chức năng của doanh nghiệp là đại lý bán hàng, nhà phân phối độc quyền hoặc nhà phân phối thực hiện marketing; mức độ tăng trưởng phát triển của thị trường tiêu thụ sản phẩm; chức năng của người nộp thuế trong chuỗi cung ứng như bán lẻ, bán buôn và phương pháp hạch toán kế toán của các bên;"},{"k":"p","t":"c) Trường hợp áp dụng phương pháp giá vốn cộng lãi: Khác biệt có thể gây ảnh hưởng trọng yếu đến tỷ suất lợi nhuận gộp trên giá vốn gồm các chi phí phản ánh chức năng hoạt động của doanh nghiệp như sản xuất theo hợp đồng chỉ định từ công ty mẹ hoặc cung cấp dịch vụ nội bộ tập đoàn; các nghĩa vụ thực hiện hợp đồng như thời hạn chuyển giao sản phẩm, chi phí giám sát chất lượng, lưu kho, điều kiện thanh toán và phương pháp hạch toán kế toán đối với các yếu tố cấu thành trong giá vốn của người nộp thuế và các đối tượng so sánh độc lập;"},{"k":"p","t":"d) Trường hợp áp dụng phương pháp so sánh tỷ suất lợi nhuận thuần: Khác biệt có thể gây ảnh hưởng trọng yếu đến tỷ suất lợi nhuận thuần như khác biệt về chức năng hoạt động, tài sản, rủi ro; điều kiện kinh tế; điều kiện hợp đồng và đặc tính sản phẩm theo quy định tại Điều 10 Nghị định này."},{"k":"p","t":"Người nộp thuế thực hiện kinh doanh với chức năng sản xuất phân phối đơn giản, không có chức năng quyết định chiến lược và phát sinh giao dịch tạo giá trị gia tăng thấp, không chịu rủi ro hàng tồn kho, rủi ro thị trường và không phát sinh doanh thu, chi phí từ hoạt động khai thác tài sản vô hình thì không gánh chịu lỗ phát sinh trong hoạt động sản xuất kinh doanh từ các rủi ro này."},{"k":"p","t":"3. Phương pháp xác định:"},{"k":"p","t":"Phương pháp so sánh tỷ suất lợi nhuận sử dụng tỷ suất lợi nhuận gộp hoặc tỷ suất lợi nhuận thuần của các đối tượng so sánh độc lập được chọn để xác định tỷ suất lợi nhuận gộp hoặc tỷ suất lợi nhuận thuần tương ứng của người nộp thuế. Việc lựa chọn tỷ suất lợi nhuận bao gồm tỷ suất lợi nhuận gộp hoặc tỷ suất lợi nhuận thuần tính trên doanh thu, chi phí hoặc tài sản phụ thuộc vào bản chất và điều kiện kinh tế của giao dịch, chức năng của người nộp thuế và phương pháp hạch toán kế toán của các bên. Cơ sở xác định tỷ suất lợi nhuận là số liệu kế toán của người nộp thuế về doanh thu, chi phí hoặc tài sản không do các bên liên kết kiểm soát, quyết định."},{"k":"p","t":"a) Phương pháp so sánh tỷ suất lợi nhuận gộp trên doanh thu (phương pháp giá bán lại):"},{"k":"p","t":"Giá mua vào của hàng hóa, dịch vụ, tài sản (giá vốn) từ bên liên kết bằng (=) giá bán ra (doanh thu thuần) của hàng hóa, dịch vụ, tài sản bán lại cho bên độc lập trừ (-) lợi nhuận gộp trên giá bán ra (doanh thu thuần) của người nộp thuế trừ (-) một số chi phí khác bao gồm trong giá mua: Thuế nhập khẩu; lệ phí hải quan; chi phí bảo hiểm, vận chuyển quốc tế (nếu có)."},{"k":"p","t":"Lợi nhuận gộp trên giá bán ra (doanh thu thuần) của người nộp thuế được xác định từ các đối tượng so sánh độc lập bằng (=) giá bán ra (doanh thu thuần) của người nộp thuế nhân (x) tỷ suất lợi nhuận gộp trên giá bán ra (doanh thu thuần) của các đối tượng so sánh độc lập được lựa chọn."},{"k":"p","t":"Tỷ suất lợi nhuận gộp trên giá bán ra (doanh thu thuần) của các đối tượng so sánh độc lập được lựa chọn là giá trị thuộc khoảng giao dịch độc lập chuẩn của tỷ suất lợi nhuận gộp trên giá bán ra (doanh thu thuần) của các đối tượng so sánh độc lập được lựa chọn để điều chỉnh phù hợp với các nguyên tắc quy định tại Nghị định này."},{"k":"p","t":"Giá mua vào từ bên liên kết (hoặc giá vốn) được điều chỉnh theo đối tượng so sánh độc lập là giá tính thuế, chi phí kê khai, để xác định nghĩa vụ thuế thu nhập doanh nghiệp phải nộp của người nộp thuế."},{"k":"p","t":"b) Phương pháp so sánh tỷ suất lợi nhuận gộp trên giá vốn (phương pháp giá vốn cộng lãi):"},{"k":"p","t":"Giá bán ra (hoặc doanh thu thuần) của hàng hóa, dịch vụ, tài sản bán cho bên liên kết được xác định bằng (=) giá vốn của hàng hóa, dịch vụ, tài sản mua vào từ bên độc lập cộng (+) lợi nhuận gộp trên giá vốn của người nộp thuế."},{"k":"p","t":"Lợi nhuận gộp trên giá vốn của người nộp thuế được xác định từ các đối tượng so sánh độc lập bằng (=) giá vốn của người nộp thuế nhân (x) tỷ suất lợi nhuận gộp trên giá vốn của các đối tượng so sánh độc lập được lựa chọn."},{"k":"p","t":"Tỷ suất lợi nhuận gộp trên giá vốn của các đối tượng so sánh độc lập được lựa chọn là giá trị thuộc khoảng giao dịch độc lập chuẩn của tỷ suất lợi nhuận gộp trên giá vốn của các đối tượng so sánh độc lập được lựa chọn để điều chỉnh phù hợp với các nguyên tắc quy định tại Nghị định này."},{"k":"p","t":"Giá bán ra cho bên liên kết (hoặc doanh thu thuần) được điều chỉnh theo đối tượng so sánh độc lập là giá tính thuế, chi phí kê khai để xác định nghĩa vụ thuế thu nhập doanh nghiệp phải nộp của người nộp thuế."},{"k":"p","t":"c) Phương pháp so sánh tỷ suất lợi nhuận thuần:"},{"k":"p","t":"Tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay và thuế thu nhập doanh nghiệp trên doanh thu, chi phí hoặc tài sản của người nộp thuế thực hiện giao dịch liên kết được điều chỉnh theo tỷ suất lợi nhuận thuần chưa trừ chi phí lãi vay trên doanh thu, chi phí hoặc tài sản của các đối tượng so sánh độc lập được chọn, trên cơ sở đó điều chỉnh, xác định nghĩa vụ thuế của người nộp thuế."},{"k":"p","t":"Lợi nhuận thuần không bao gồm chênh lệch doanh thu và chi phí của hoạt động tài chính."},{"k":"p","t":"Tỷ suất lợi nhuận thuần được lựa chọn là giá trị thuộc khoảng giao dịch độc lập chuẩn của tỷ suất lợi nhuận thuần của các đối tượng so sánh độc lập được chọn để điều chỉnh, xác định thu nhập chịu thuế và nghĩa vụ thuế phải nộp của người nộp thuế phù hợp với các nguyên tắc quy định tại Nghị định này."},{"k":"p","t":"Các chỉ tiêu tỷ suất lợi nhuận thuần chưa trừ lãi vay và thuế thu nhập doanh nghiệp được xác định theo quy định của pháp luật về kế toán, quản lý thuế và thuế thu nhập doanh nghiệp."},{"k":"p","t":"4. Kết quả xác định tỷ suất lợi nhuận được điều chỉnh của người nộp thuế là căn cứ xác định thu nhập chịu thuế và số thuế thu nhập doanh nghiệp phải nộp, nhưng không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước của người nộp thuế."}]},{"id":"nd255_15","no":15,"code":"Điều 15","title":"Điều 15. Phương pháp phân bổ lợi nhuận giữa các bên liên kết","shortTitle":"Phương pháp phân bổ lợi nhuận giữa các bên liên kết","chuong":"Chương II — PHÂN TÍCH, SO SÁNH, LỰA CHỌN ĐỐI TƯỢNG SO SÁNH ĐỘC LẬP VÀ CÁC PHƯƠNG PHÁP XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp áp dụng:"},{"k":"p","t":"a) Người nộp thuế tham gia thực hiện giao dịch liên kết, đặc thù, được tích hợp, khép kín trong tập đoàn, các hoạt động phát triển sản phẩm mới, sử dụng công nghệ độc quyền, tham gia vào chuỗi giá trị giao dịch độc quyền của tập đoàn hoặc quá trình phát triển, gia tăng, duy trì, bảo vệ và khai thác tài sản vô hình độc quyền, không có căn cứ để xác định giá giữa các bên liên kết hoặc các giao dịch có liên quan chặt chẽ, thực hiện đồng thời, các giao dịch tài chính phức tạp liên quan đến nhiều thị trường tài chính trên thế giới;"},{"k":"p","t":"b) Người nộp thuế tham gia các giao dịch kinh tế số, không có căn cứ để xác định giá giữa các bên liên kết hoặc tham gia việc tạo giá trị tăng thêm thu được từ hợp lực trong tập đoàn;"},{"k":"p","t":"c) Người nộp thuế thực hiện chức năng tự chủ đối với toàn bộ quá trình sản xuất, kinh doanh và không phải đối tượng áp dụng theo quy định tại khoản 1 Điều 13, khoản 1 Điều 14 Nghị định này."},{"k":"p","t":"2. Nguyên tắc áp dụng:"},{"k":"p","t":"Phương pháp phân bổ lợi nhuận là phương pháp phân bố tổng lợi nhuận thu được để xác định lợi nhuận của người nộp thuế tham gia vào chuỗi giao dịch. Phương pháp phân bổ lợi nhuận được áp dụng đối với: Tổng lợi nhuận thực tế và lợi nhuận tiềm năng thu được xác định bằng các số liệu tài chính trên cơ sở các chứng từ hợp lý, hợp lệ; giá trị và lợi nhuận của giao dịch phải được xác định theo cùng phương pháp kế toán trong toàn bộ thời gian áp dụng phương pháp phân bổ lợi nhuận."},{"k":"p","t":"3. Phương pháp xác định:"},{"k":"p","t":"Lợi nhuận được điều chỉnh của người nộp thuế được phân bổ trên tổng lợi nhuận thu được, bao gồm lợi nhuận thực tế và lợi nhuận tiềm năng của các bên tham gia chuỗi giao dịch."},{"k":"p","t":"Lợi nhuận được điều chỉnh của người nộp thuế là tổng lợi nhuận cơ bản và lợi nhuận phụ trội. Lợi nhuận cơ bản xác định theo phương pháp so sánh tỷ suất lợi nhuận quy định tại Điều 14 Nghị định này. Lợi nhuận phụ trội xác định theo tỷ lệ phân bổ dựa trên một hoặc một số yếu tố như doanh thu, chi phí, tài sản hoặc nhân lực của các bên liên kết tham gia giao dịch và phù hợp nguyên tắc giao dịch độc lập."},{"k":"p","t":"Trường hợp không đủ thông tin, dữ liệu để phân bổ lợi nhuận được điều chỉnh theo quy định trên, việc phân bổ có thể dựa trên một hoặc một số yếu tố như doanh thu, chi phí, tài sản hoặc nhân lực của các bên liên kết tham gia giao dịch và phù hợp nguyên tắc giao dịch độc lập."},{"k":"p","t":"4. Kết quả xác định lợi nhuận được điều chỉnh của người nộp thuế là căn cứ xác định thu nhập chịu thuế và số thuế thu nhập doanh nghiệp phải nộp, nhưng không làm giảm nghĩa vụ thuế phải nộp ngân sách nhà nước của người nộp thuế."}]},{"id":"nd255_16","no":16,"code":"Điều 16","title":"Điều 16. Xác định chi phí để tính thuế đối với doanh nghiệp có giao dịch liên kết","shortTitle":"Xác định chi phí để tính thuế đối với doanh nghiệp có giao dịch liên kết","chuong":"Chương III — XÁC ĐỊNH CHI PHÍ ĐỂ TÍNH THUẾ ĐỐI VỚI DOANH NGHIỆP CÓ GIAO DỊCH LIÊN KẾT; QUYỀN VÀ NGHĨA VỤ CỦA NGƯỜI NỘP THUẾ TRONG KÊ KHAI, LẬP HỒ SƠ XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT; TRÁCH NHIỆM CỦA NGƯỜI NỘP THUẾ LIÊN QUAN ĐẾN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","muc":"","level":1,"content":[{"k":"p","t":"1. Chi phí của giao dịch liên kết không phù hợp bản chất giao dịch độc lập hoặc không góp phần tạo ra doanh thu, thu nhập cho hoạt động sản xuất, kinh doanh của người nộp thuế không được tính vào chi phí được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp trong kỳ, bao gồm:"},{"k":"p","t":"a) Chi phí thanh toán cho bên liên kết không thực hiện bất kỳ hoạt động sản xuất, kinh doanh nào liên quan đến ngành nghề, hoạt động sản xuất, kinh doanh của người nộp thuế; không có quyền lợi, trách nhiệm liên quan đối với tài sản, hàng hóa, dịch vụ cung cấp cho người nộp thuế;"},{"k":"p","t":"b) Chi phí thanh toán cho bên liên kết có hoạt động sản xuất, kinh doanh nhưng quy mô tài sản, số lượng nhân viên và chức năng sản xuất, kinh doanh không tương xứng với giá trị giao dịch mà bên liên kết nhận được từ người nộp thuế;"},{"k":"p","t":"c) Chi phí thanh toán cho bên liên kết là đối tượng cư trú của một nước hoặc vùng lãnh thổ không thu thuế thu nhập doanh nghiệp, không góp phần tạo ra doanh thu, giá trị gia tăng cho hoạt động sản xuất, kinh doanh của người nộp thuế."},{"k":"p","t":"2. Chi phí dịch vụ giữa các bên liên kết:"},{"k":"p","t":"a) Trừ các khoản chi quy định tại điểm b khoản này, người nộp thuế được trừ các khoản chi phí dịch vụ vào chi phí tính thuế trong kỳ nếu đáp ứng đủ các điều kiện như sau: Dịch vụ được cung cấp có giá trị thương mại, tài chính, kinh tế và phục vụ trực tiếp cho hoạt động sản xuất kinh doanh của người nộp thuế; dịch vụ từ các bên liên kết được xác định đã cung cấp trong điều kiện hoàn cảnh tương tự các bên độc lập chi trả cho các dịch vụ này; phí dịch vụ được thanh toán trên cơ sở nguyên tắc giao dịch độc lập và phương pháp tính giá giao dịch liên kết hoặc phân bổ mức phí dịch vụ giữa các bên liên kết phải được áp dụng thống nhất trong toàn tập đoàn đối với loại hình dịch vụ tương tự và người nộp thuế phải cung cấp hợp đồng, chứng từ, hóa đơn và thông tin về phương pháp tính, yếu tố phân bổ và chính sách giá của tập đoàn đối với dịch vụ được cung cấp."},{"k":"p","t":"Trường hợp liên quan đến các trung tâm thực hiện chức năng chuyên môn hóa và hợp lực tạo giá trị tăng thêm của tập đoàn, người nộp thuế phải xác định tổng giá trị tạo ra từ các chức năng này, xác định mức phân bổ lợi nhuận phù hợp với giá trị đóng góp của các bên liên kết sau khi đã trừ (-) mức phí dịch vụ tương ứng cho bên liên kết thực hiện chức năng điều phối, cung cấp dịch vụ của giao dịch độc lập có tính chất tương đồng;"},{"k":"p","t":"b) Chi phí dịch vụ không được trừ khi xác định thu nhập chịu thuế bao gồm: Chi phí phát sinh từ các dịch vụ được cung cấp chỉ nhằm mục đích phục vụ lợi ích hoặc tạo giá trị cho các bên liên kết khác; dịch vụ phục vụ lợi ích cổ đông của bên liên kết; dịch vụ tính phí trùng lặp do nhiều bên liên kết cung cấp cho cùng một loại dịch vụ, không xác định được giá trị gia tăng cho người nộp thuế; dịch vụ về bản chất là các lợi ích người nộp thuế nhận được do là thành viên của một tập đoàn và chi phí mà bên liên kết cộng thêm đối với dịch vụ do bên thứ ba cung cấp thông qua trung gian bên liên kết không đóng góp thêm giá trị cho dịch vụ,"},{"k":"p","t":"3. Tổng chi phí lãi vay được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp đối với doanh nghiệp có giao dịch liên kết:"},{"k":"p","t":"a) Tổng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ của người nộp thuế được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp không vượt quá 30% của tổng lợi nhuận thuần từ hoạt động kinh doanh trong kỳ cộng chi phí lãi vay sau khi trừ lãi tiền gửi và lãi cho vay phát sinh trong kỳ cộng chi phí khấu hao phát sinh trong kỳ của người nộp thuế;"},{"k":"p","t":"b) Phần chi phí lãi vay không được trừ theo quy định tại điểm a khoản này được chuyển sang kỳ tính thuế tiếp theo khi xác định tổng chi phí lãi vay được trừ trong trường hợp tổng chi phí lãi vay phát sinh được trừ của kỳ tính thuế tiếp theo thấp hơn mức quy định tại điểm a khoản này. Thời gian chuyển chi phí lãi vay tính liên tục không quá 05 năm kể từ năm tiếp sau năm phát sinh chi phí lãi vay không được trừ;"},{"k":"p","t":"c) Quy định tại điểm a khoản này không áp dụng với các khoản vay của người nộp thuế là tổ chức tín dụng theo Luật Các tổ chức tín dụng số 32/2024/QH15 (được sửa đổi, bổ sung tại Luật số 96/2025/QH15); tổ chức kinh doanh bảo hiểm theo Luật Kinh doanh bảo hiểm số 08/2022/QH15 (được sửa đổi bổ sung tại Luật số 139/2025/QH15); các khoản vay vốn hỗ trợ phát triển chính thức (ODA), vay ưu đãi của Chính phủ thực hiện theo phương thức Chính phủ đi vay nước ngoài cho các doanh nghiệp vay lại; các khoản vay thực hiện chương trình mục tiêu quốc gia (chương trình nông thôn mới và giảm nghèo bền vững); các khoản vay đầu tư chương trình, dự án thực hiện chính sách phúc lợi xã hội của Nhà nước (nhà ở tái định cư, nhà ở công nhân, sinh viên, nhà ở xã hội và dự án phúc lợi công cộng khác);"},{"k":"p","t":"d) Người nộp thuế kê khai tỷ lệ chi phí lãi vay trong kỳ tính thuế theo Phụ lục I ban hành kèm theo Nghị định này."}]},{"id":"nd255_17","no":17,"code":"Điều 17","title":"Điều 17. Cơ sở dữ liệu sử dụng trong kê khai, xác định, quản lý giá giao dịch liên kết","shortTitle":"Cơ sở dữ liệu sử dụng trong kê khai, xác định, quản lý giá giao dịch liên kết","chuong":"Chương III — XÁC ĐỊNH CHI PHÍ ĐỂ TÍNH THUẾ ĐỐI VỚI DOANH NGHIỆP CÓ GIAO DỊCH LIÊN KẾT; QUYỀN VÀ NGHĨA VỤ CỦA NGƯỜI NỘP THUẾ TRONG KÊ KHAI, LẬP HỒ SƠ XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT; TRÁCH NHIỆM CỦA NGƯỜI NỘP THUẾ LIÊN QUAN ĐẾN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ sở dữ liệu sử dụng trong kê khai, xác định giá giao dịch liên kết của người nộp thuế, bao gồm:"},{"k":"p","t":"a) Cơ sở dữ liệu thương mại quy định tại khoản 15 Điều 4 Luật Quản lý thuế số 108/2025/QH15 và các văn bản quy phạm pháp luật về quản lý thuế;"},{"k":"p","t":"b) Thông tin, dữ liệu của các doanh nghiệp được công bố công khai trên thị trường chứng khoán;"},{"k":"p","t":"c) Thông tin, dữ liệu công bố trên các sàn giao dịch hàng hóa, dịch vụ trong nước và quốc tế;"},{"k":"p","t":"d) Thông tin Cơ sở dữ liệu quốc gia; thông tin do các cơ quan bộ, ngành trong nước hoặc các nguồn chính thức khác được công bố công khai."},{"k":"p","t":"2. Cơ sở dữ liệu sử dụng trong quản lý giá giao dịch liên kết của cơ quan thuế, bao gồm:"},{"k":"p","t":"a) Cơ sở dữ liệu quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Cơ sở dữ liệu quản lý thuế quy định tại khoản 2 Điều 35 Luật Quản lý thuế số 108/2025/QH15 và các văn bản quy phạm pháp luật về quản lý thuế."},{"k":"p","t":"3. Cơ sở dữ liệu được sử dụng theo thứ tự ưu tiên như sau:"},{"k":"p","t":"a) Thông tin, dữ liệu của các doanh nghiệp được công bố công khai trên thị trường chứng khoán; thông tin, dữ liệu công bố trên các sàn giao dịch hàng hóa, dịch vụ trong nước và quốc tế; thông tin Cơ sở dữ liệu quốc gia; thông tin do các cơ quan bộ, ngành trong nước hoặc các nguồn chính thức khác được công bố công khai;"},{"k":"p","t":"b) Cơ sở dữ liệu thương mại;"},{"k":"p","t":"c) Cơ sở dữ liệu quản lý thuế."},{"k":"p","t":"Việc sử dụng thứ tự ưu tiên cơ sở dữ liệu theo quy định tại khoản này phải đảm bảo nguyên tắc phân tích, so sánh theo Điều 6 Nghị định này."},{"k":"p","t":"4. Phân tích lựa chọn đối tượng so sánh độc lập để phân tích, xác định khoảng giao dịch độc lập tuân thủ nguyên tắc phân tích, so sánh và các phương pháp xác định giá giao dịch liên kết quy định tại Nghị định này, theo thứ tự ưu tiên lựa chọn dữ liệu so sánh như sau:"},{"k":"p","t":"a) Đối tượng so sánh nội bộ của người nộp thuế;"},{"k":"p","t":"b) Đối tượng so sánh cư trú cùng quốc gia, lãnh thổ với người nộp thuế;"},{"k":"p","t":"c) Đối tượng ở các nước trong khu vực có điều kiện ngành và trình độ phát triển kinh tế tương đồng."},{"k":"p","t":"Trường hợp lựa chọn đối tượng so sánh nước ngoài tại các thị trường địa lý khác, phải phân tích tính tương đồng và các khác biệt trọng yếu định tính và định lượng theo quy định tại Điều 9 và Điều 10 Nghị định này."}]},{"id":"nd255_18","no":18,"code":"Điều 18","title":"Điều 18. Quyền và nghĩa vụ của người nộp thuế trong kê khai, lập hồ sơ xác định giá giao dịch liên kết","shortTitle":"Quyền và nghĩa vụ của người nộp thuế trong kê khai, lập hồ sơ xác định giá giao dịch liên kết","chuong":"Chương III — XÁC ĐỊNH CHI PHÍ ĐỂ TÍNH THUẾ ĐỐI VỚI DOANH NGHIỆP CÓ GIAO DỊCH LIÊN KẾT; QUYỀN VÀ NGHĨA VỤ CỦA NGƯỜI NỘP THUẾ TRONG KÊ KHAI, LẬP HỒ SƠ XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT; TRÁCH NHIỆM CỦA NGƯỜI NỘP THUẾ LIÊN QUAN ĐẾN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","muc":"","level":1,"content":[{"k":"p","t":"1. Quyền của người nộp thuế"},{"k":"p","t":"Quyền của người nộp thuế trong kê khai, xác định giá giao dịch liên kết thực hiện theo quy định tại khoản 1 Điều 37 Luật Quản lý thuế số 108/2025/QH15."},{"k":"p","t":"2. Nghĩa vụ của người nộp thuế"},{"k":"p","t":"Nghĩa vụ của người nộp thuế trong kê khai, xác định giá giao dịch liên kết thực hiện theo quy định tại khoản 2 Điều 37 Luật Quản lý thuế số 108/2025/QH15 và các quy định sau:"},{"k":"p","t":"a) Kê khai, xác định giá giao dịch liên kết không làm giảm nghĩa vụ thuế thu nhập doanh nghiệp phải nộp tại Việt Nam;"},{"k":"p","t":"b) Chứng minh việc thực hiện phân tích, so sánh và lựa chọn phương pháp xác định giá giao dịch liên kết;"},{"k":"p","t":"c) Kê khai thông tin về quan hệ liên kết và giao dịch liên kết theo Phụ lục I, Phụ lục II, Phụ lục III ban hành kèm theo Nghị định này và nộp cùng Tờ khai quyết toán thuế thu nhập doanh nghiệp;"},{"k":"p","t":"d) Lập, lưu giữ và cung cấp Hồ sơ xác định giá giao dịch liên kết là các thông tin, hồ sơ, tài liệu, số liệu, chứng từ gồm:"},{"k":"p","t":"d.1) Thông tin về quan hệ liên kết và giao dịch liên kết theo Phụ lục I ban hành kèm theo Nghị định này;"},{"k":"p","t":"d.2) Hồ sơ quốc gia theo danh mục các nội dung thông tin, tài liệu quy định tại Phụ lục II ban hành kèm theo Nghị định này;"},{"k":"p","t":"d.3) Hồ sơ toàn cầu theo danh mục các nội dung thông tin, tài liệu quy định tại Phụ lục III ban hành kèm theo Nghị định này;"},{"k":"p","t":"d.4) Báo cáo lợi nhuận liên quốc gia của Công ty mẹ tối cao theo quy định tại Điều 19 và Phụ lục IV ban hành kèm theo Nghị định này."},{"k":"p","t":"3. Hồ sơ xác định giá giao dịch liên kết được lập trước thời điểm kê khai quyết toán thuế thu nhập doanh nghiệp hằng năm và phải lưu giữ, xuất trình theo yêu cầu cung cấp thông tin của cơ quan thuế."},{"k":"p","t":"Hồ sơ xác định giá giao dịch liên kết và các thông tin tài liệu, chứng từ của người nộp thuế cung cấp cho cơ quan thuế thực hiện theo quy định của pháp luật quản lý thuế. Các dữ liệu, chứng từ và tài liệu sử dụng làm căn cứ phân tích, so sánh, xác định giá giao dịch liên kết phải nêu rõ nguồn gốc xuất xứ. Trường hợp dữ liệu của các đối tượng so sánh độc lập là số liệu kế toán, người nộp thuế có trách nhiệm lưu trữ và cung cấp cho cơ quan thuế bằng bản mềm, dưới định dạng bảng tính."},{"k":"p","t":"4. Người nộp thuế có trách nhiệm cung cấp đầy đủ, chính xác và chịu trách nhiệm trước pháp luật đối với các thông tin, tài liệu tại Hồ sơ xác định giá giao dịch liên kết khi có yêu cầu của cơ quan thuế trong quá trình tham vấn trước khi tiến hành kiểm tra theo quy định tại Điều 21 Nghị định này. Thời hạn cung cấp Hồ sơ xác định giá giao dịch liên kết không quá 30 ngày làm việc kể từ khi nhận được văn bản yêu cầu của cơ quan thuế. Trường hợp người nộp thuế có lý do chính đáng thì thời hạn cung cấp Hồ sơ xác định giá giao dịch liên kết được gia hạn 01 lần không quá 15 ngày làm việc, kể từ ngày hết hạn."},{"k":"p","t":"5. Công ty tư vấn, kiểm toán độc lập hoặc tổ chức kinh doanh dịch vụ làm thủ tục về thuế (sau đây gọi là đại lý thuế) là đại diện cho người nộp thuế lập Hồ sơ xác định giá giao dịch liên kết có trách nhiệm tuân thủ pháp luật quản lý thuế đối với doanh nghiệp có quan hệ liên kết quy định tại Nghị định này và chịu trách nhiệm trước pháp luật theo quy định."}]},{"id":"nd255_19","no":19,"code":"Điều 19","title":"Điều 19. Trách nhiệm của người nộp thuế liên quan đến Báo cáo lợi nhuận liên quốc gia","shortTitle":"Trách nhiệm của người nộp thuế liên quan đến Báo cáo lợi nhuận liên quốc gia","chuong":"Chương III — XÁC ĐỊNH CHI PHÍ ĐỂ TÍNH THUẾ ĐỐI VỚI DOANH NGHIỆP CÓ GIAO DỊCH LIÊN KẾT; QUYỀN VÀ NGHĨA VỤ CỦA NGƯỜI NỘP THUẾ TRONG KÊ KHAI, LẬP HỒ SƠ XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT; TRÁCH NHIỆM CỦA NGƯỜI NỘP THUẾ LIÊN QUAN ĐẾN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế là Công ty mẹ tối cao tại Việt Nam có doanh thu hợp nhất toàn cầu trong năm tài chính liền kề trước năm báo cáo tương đương từ 750 triệu Euro trở lên phải lập và nộp Báo cáo lợi nhuận liên quốc gia theo Phụ lục IV ban hành kèm theo Nghị định này cho cơ quan thuế."},{"k":"p","t":"2. Người nộp thuế tại Việt Nam có Công ty mẹ tối cao tại nước ngoài có doanh thu hợp nhất toàn cầu trong năm tài chính liền kề trước năm báo cáo tương đương từ 750 triệu Euro trở lên có nghĩa vụ liên quan đến Báo cáo lợi nhuận liên quốc gia như sau:"},{"k":"p","t":"a) Người nộp thuế không phải nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế Việt Nam trong các trường hợp sau:"},{"k":"p","t":"a.1) Công ty mẹ tối cao có nghĩa vụ lập và nộp Báo cáo lợi nhuận liên quốc gia tại quốc gia, vùng lãnh thổ nơi cư trú và báo cáo này được trao đổi tự động cho cơ quan thuế Việt Nam theo Thỏa thuận của Nhà chức trách có thẩm quyền;"},{"k":"p","t":"Người nộp thuế tại Việt Nam gửi Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế Việt Nam theo quy định tại điểm d khoản này."},{"k":"p","t":"a.2) Công ty mẹ tối cao chỉ định một tổ chức thay mặt nộp Báo cáo lợi nhuận liên quốc gia tại quốc gia, vùng lãnh thổ nơi tổ chức này là đối tượng cư trú chậm nhất vào ngày kết thúc năm tài chính của Công ty mẹ tối cao và đáp ứng các điều kiện sau:"},{"k":"p","t":"a.2.1) Quốc gia, vùng lãnh thổ nơi tổ chức thay mặt nộp báo cáo là đối tượng cư trú có quy định yêu cầu nộp Báo cáo lợi nhuận liên quốc gia;"},{"k":"p","t":"a.2.2) Quốc gia, vùng lãnh thổ này có Thỏa thuận của Nhà chức trách có thẩm quyền đang có hiệu lực với Việt Nam tại thời điểm đến hạn nộp Báo cáo;"},{"k":"p","t":"a.2.3) Quốc gia, vùng lãnh thổ này không thuộc trường hợp không thực hiện trao đổi thông tin một cách hệ thống;"},{"k":"p","t":"a.2.4) Tổ chức thay mặt nộp báo cáo đã thông báo cho Nhà chức trách có thẩm quyền tại quốc gia, vùng lãnh thổ nơi tổ chức này là đối tượng cư trú về việc là tổ chức thay mặt nộp báo cáo theo quy định của pháp luật nước sở tại trong trường hợp pháp luật của quốc gia, vùng lãnh thổ đó có quy định yêu cầu thông báo;"},{"k":"p","t":"a.2.5) Người nộp thuế tại Việt Nam gửi Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế Việt Nam theo quy định tại điểm d khoản này kèm theo văn bản chỉ định tổ chức thay mặt nộp báo cáo;"},{"k":"p","t":"Trường hợp các điều kiện quy định tại điểm a.2 khoản này không đáp ứng, người nộp thuế phải thực hiện nghĩa vụ nộp Báo cáo lợi nhuận liên quốc gia theo quy định tại điểm b khoản này."},{"k":"p","t":"b) Người nộp thuế chỉ phải nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế khi thuộc một trong các trường hợp sau:"},{"k":"p","t":"b.1) Công ty mẹ tối cao không có nghĩa vụ lập và nộp Báo cáo lợi nhuận liên quốc gia tại quốc gia, vùng lãnh thổ nơi Công ty mẹ tối cao là đối tượng cư trú;"},{"k":"p","t":"b.2) Quốc gia, vùng lãnh thổ nơi Công ty mẹ tối cao là đối tượng cư trú có điều ước quốc tế về thuế hoặc thỏa thuận quốc tế với Việt Nam nhưng không có Thỏa thuận của Nhà chức trách có thẩm quyền có hiệu lực với Việt Nam tại thời điểm đến hạn nộp báo cáo;"},{"k":"p","t":"b.3) Quốc gia, vùng lãnh thổ nơi Công ty mẹ tối cao là đối tượng cư trú có Thỏa thuận của Nhà chức trách có thẩm quyền với Việt Nam nhưng đã xảy ra tình trạng không thực hiện trao đổi thông tin một cách hệ thống và tình trạng này đã được thông báo cho người nộp thuế tại Việt Nam."},{"k":"p","t":"Người nộp thuế không phải nộp Báo cáo lợi nhuận liên quốc gia theo quy định tại điểm b khoản này trong trường hợp Công ty mẹ tối cao không có nghĩa vụ lập và nộp Báo cáo lợi nhuận liên quốc gia tại quốc gia, vùng lãnh thổ nơi cư trú do doanh thu hợp nhất toàn cầu của tập đoàn theo Báo cáo tài chính hợp nhất của năm tài chính liền kề trước năm báo cáo thấp hơn ngưỡng phải nộp Báo cáo lợi nhuận liên quốc gia theo quy định của quốc gia, vùng lãnh thổ đó xuất phát từ sự khác biệt về ngưỡng doanh thu, đồng tiền quy đổi hoặc nguyên tắc xác định doanh thu giữa các quốc gia, vùng lãnh thổ."},{"k":"p","t":"Việc yêu cầu nộp Báo cáo lợi nhuận liên quốc gia theo quy định tại điểm b khoản này chỉ được thực hiện khi Việt Nam đáp ứng các điều kiện về bảo mật thông tin, tính nhất quán và sử dụng thông tin đúng mục đích theo quy định tại điểm h khoản 2 Điều 30 Luật Quản lý thuế số 108/2025/QH15. Cơ quan thuế có trách nhiệm công khai việc đáp ứng các điều kiện này trên Trang thông tin điện tử của ngành thuế."},{"k":"p","t":"Trường hợp tập đoàn đa quốc gia có nhiều hơn 01 người nộp thuế tại Việt Nam và Công ty mẹ tối cao có văn bản chỉ định một người nộp thuế tại Việt Nam nộp Báo cáo lợi nhuận liên quốc gia thì người nộp thuế được chỉ định có trách nhiệm nộp Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia theo quy định tại điểm d khoản này kèm theo văn bản chỉ định và thực hiện nghĩa vụ nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế."},{"k":"p","t":"c) Người nộp thuế tại Việt Nam được Công ty mẹ tối cao chỉ định là tổ chức thay mặt nộp Báo cáo lợi nhuận liên quốc gia có trách nhiệm lập và nộp Báo cáo lợi nhuận liên quốc gia theo Phụ lục IV ban hành kèm theo Nghị định này cho cơ quan thuế. Người nộp thuế được chỉ định có trách nhiệm nộp Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia theo quy định tại điểm d khoản này kèm theo văn bản chỉ định."},{"k":"p","t":"d) Người nộp thuế có nghĩa vụ nộp Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia cho cơ quan thuế theo Mẫu số 01/TB-BCLN ban hành kèm theo Nghị định này."},{"k":"p","t":"Trường hợp tập đoàn đa quốc gia có nhiều hơn 01 người nộp thuế tại Việt Nam và Công ty mẹ tối cao ở nước ngoài có văn bản chỉ định một người nộp thuế tại Việt Nam nộp Thông báo thì người nộp thuế được chỉ định có nghĩa vụ nộp Thông báo kèm theo văn bản chỉ định."},{"k":"p","t":"Kể từ ngày Nghị định này có hiệu lực thi hành, người nộp thuế chỉ phải nộp Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia 01 lần khi lần đầu phát sinh nghĩa vụ liên quan đến Báo cáo lợi nhuận liên quốc gia. Thời hạn nộp Thông báo chậm nhất là ngày kết thúc năm tài chính của Công ty mẹ tối cao của năm báo cáo. Trường hợp có thay đổi thông tin tại Thông báo về đối tượng nộp Báo cáo lợi nhuận liên quốc gia đã nộp gần nhất, bao gồm cả trường hợp chấm dứt nghĩa vụ nộp Báo cáo lợi nhuận liên quốc gia, người nộp thuế có trách nhiệm nộp Thông báo để cập nhật thông tin cho cơ quan thuế chậm nhất 90 ngày kể từ ngày phát sinh thay đổi."},{"k":"p","t":"3. Thời hạn nộp Báo cáo lợi nhuận liên quốc gia chậm nhất là 12 tháng kể từ ngày kết thúc năm tài chính của Công ty mẹ tối cao của năm báo cáo."},{"k":"p","t":"4. Báo cáo lợi nhuận liên quốc gia được nộp theo định dạng XML đã được mã hóa."},{"k":"p","t":"5. Thông báo và Báo cáo lợi nhuận liên quốc gia được nộp qua Hệ thống thông tin quản lý thuế."},{"k":"p","t":"6. Tỷ giá ngoại tệ để xác định ngưỡng doanh thu hợp nhất được xác định theo tỷ giá trung tâm hoặc trung bình tỷ giá tính chéo của tháng 12 năm liền kề trước năm báo cáo được tham chiếu do Ngân hàng Nhà nước Việt Nam công bố."}]},{"id":"nd255_20","no":20,"code":"Điều 20","title":"Điều 20. Các trường hợp người nộp thuế được miễn kê khai, miễn lập Hồ sơ xác định giá giao dịch liên kết","shortTitle":"Các trường hợp người nộp thuế được miễn kê khai, miễn lập Hồ sơ xác định giá giao dịch liên kết","chuong":"Chương III — XÁC ĐỊNH CHI PHÍ ĐỂ TÍNH THUẾ ĐỐI VỚI DOANH NGHIỆP CÓ GIAO DỊCH LIÊN KẾT; QUYỀN VÀ NGHĨA VỤ CỦA NGƯỜI NỘP THUẾ TRONG KÊ KHAI, LẬP HỒ SƠ XÁC ĐỊNH GIÁ GIAO DỊCH LIÊN KẾT; TRÁCH NHIỆM CỦA NGƯỜI NỘP THUẾ LIÊN QUAN ĐẾN BÁO CÁO LỢI NHUẬN LIÊN QUỐC GIA","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế được miễn kê khai xác định giá giao dịch liên kết tại Mục III, Mục IV Phụ lục I ban hành kèm theo Nghị định, miễn lập Hồ sơ xác định giá giao dịch liên kết theo quy định tại Nghị định này trong trường hợp chỉ phát sinh giao dịch với các bên liên kết là đối tượng nộp thuế thu nhập doanh nghiệp tại Việt Nam, áp dụng cùng mức thuế suất thuế thu nhập doanh nghiệp với người nộp thuế và không bên nào được hưởng ưu đãi thuế thu nhập doanh nghiệp trong kỳ tính thuế, nhưng phải kê khai căn cứ miễn trừ tại Mục I, Mục II tại Phụ lục I ban hành kèm theo Nghị định này."},{"k":"p","t":"2. Người nộp thuế có trách nhiệm kê khai xác định giá giao dịch liên kết theo Phụ lục I ban hành kèm theo Nghị định này nhưng được miễn lập Hồ sơ xác định giá giao dịch liên kết trong các trường hợp sau:"},{"k":"p","t":"a) Người nộp thuế có phát sinh giao dịch liên kết nhưng tổng doanh thu phát sinh của kỳ tính thuế dưới 50 tỷ đồng và tổng giá trị tất cả các giao dịch liên kết phát sinh trong kỳ tính thuế dưới 30 tỷ đồng;"},{"k":"p","t":"b) Người nộp thuế đã ký kết Thỏa thuận trước về phương pháp xác định giá tính thuế thực hiện nộp báo cáo thường niên theo quy định pháp luật về Thỏa thuận trước về phương pháp xác định giá tính thuế. Các giao dịch liên kết không thuộc phạm vi áp dụng Thỏa thuận trước về phương pháp xác định giá tính thuế, người nộp thuế có trách nhiệm kê khai xác định giá giao dịch liên kết theo quy định tại Điều 18 Nghị định này;"},{"k":"p","t":"c) Người nộp thuế thực hiện kinh doanh không phát sinh doanh thu, chi phí từ hoạt động khai thác, sử dụng tài sản vô hình, có doanh thu
