<script id="LD" type="application/json">{"meta":{"title":"Thông tư 96/2026/TT-BTC — Sửa đổi, bổ sung một số điều của Thông tư số 67/2023/TT-BTC hướng dẫn Luật Kinh doanh bảo hiểm","shortCode":"TT 96/2026","subtitle":"Sửa đổi, bổ sung TT 67/2023 (kinh doanh bảo hiểm)","slug":"tt96","effectiveDate":"02/07/2026","scope":"","description":"Sửa đổi, bổ sung TT 67/2023 (kinh doanh bảo hiểm)","related":[]},"outline":[{"id":"tt96_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung khoản 2 Điều 1 như sau:","shortTitle":"Sửa đổi, bổ sung khoản 2 Điều 1 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“2. Thông tư hướng dẫn điểm b khoản 2 Điều 119 Luật Kinh doanh bảo hiểm về thông tin công khai thường xuyên và khoản 6 Điều 7, điểm c khoản 2 Điều 32, Điều 44, khoản 7 Điều 49 và điểm k, p khoản 3 Điều 50 Nghị định số 46/2023/NĐ-CP ngày 01 ngày 7 năm 2023 của Chính phủ quy định chi tiết thi hành một số điều của Luật Kinh doanh bảo hiểm được sửa đổi, bổ sung bởi Nghị định số 97/2026/NĐ-CP (sau đây gọi là Nghị định số 46/2023/NĐ-CP), bao gồm biểu mẫu các thông tin của cơ sở dữ liệu về hoạt động kinh doanh bảo hiểm; mẫu tài liệu giải trình phương pháp, cơ sở tính phí bảo hiểm; hướng dẫn, minh họa các phương pháp, công thức, cơ sở trích lập dự phòng nghiệp vụ; thời điểm ghi nhận doanh thu đối với từng loại hình bảo hiểm và quản lý đại lý bảo hiểm cá nhân, chi hỗ trợ, chi thù lao.”."}]},{"id":"tt96_2","no":2,"code":"Điều 2","title":"Điều 2. Sửa đổi, bổ sung đoạn mở đầu và một số khoản của Điều 7 như sau:","shortTitle":"Sửa đổi, bổ sung đoạn mở đầu và một số khoản của Điều 7 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung đoạn mở đầu và khoản 1 Điều 7 như sau:"},{"k":"p","t":"“Doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài, tổ chức tương hỗ cung cấp bảo hiểm vi mô, doanh nghiệp môi giới bảo hiểm, đại lý bảo hiểm cung cấp dịch vụ, sản phẩm bảo hiểm trên môi trường mạng phải thực hiện các yêu cầu về dịch vụ, kỹ thuật, bảo mật và lưu trữ dữ liệu theo quy định của pháp luật về giao dịch điện tử, dữ liệu, an ninh mạng, thương mại điện tử và các quy định sau:"},{"k":"p","t":"1. Xây dựng, ban hành quy chế hoạt động cung cấp dịch vụ, sản phẩm bảo hiểm trên môi trường mạng, bao gồm những thông tin chính như sau: mô tả quy trình giao dịch; kiểm soát rủi ro, bảo đảm an ninh mạng; quyền và nghĩa vụ của các bên liên quan; cơ chế giải quyết khiếu nại, tranh chấp; chính sách bảo vệ dữ liệu cá nhân; giải pháp xử lý sự cố, hệ thống dự phòng; lưu trữ và biện pháp xử lý vi phạm đối với trường hợp không tuân thủ quy chế hoạt động.”."},{"k":"p","t":"2. Sửa đổi, bổ sung khoản 7 Điều 7 như sau:"},{"k":"p","t":"“7. Xác định cấp độ và triển khai các phương án bảo đảm an toàn hệ thống thông tin tương ứng theo quy định của pháp luật về an ninh mạng, an toàn hệ thống thông tin theo cấp độ và giao dịch điện tử trong hoạt động tài chính.”."}]},{"id":"tt96_3","no":3,"code":"Điều 3","title":"Điều 3. Sửa đổi, bổ sung khoản 2 Điều 17 như sau:","shortTitle":"Sửa đổi, bổ sung khoản 2 Điều 17 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“2. Ngoài việc đáp ứng các quy định tại khoản 1 Điều này, hợp đồng bảo hiểm liên kết đầu tư và hợp đồng bảo hiểm hưu trí còn phải nêu rõ cách thức phân bổ phí bảo hiểm và các khoản phí tính cho bên mua bảo hiểm. Các khoản phí tính cho bên mua bảo hiểm phải phù hợp với quy định tại Điều 99 Nghị định số 46/2023/NĐ-CP. Trong trường hợp điều chỉnh các khoản phí tính cho bên mua bảo hiểm, doanh nghiệp bảo hiểm có trách nhiệm thông báo cho bên mua bảo hiểm bằng văn bản ít nhất 03 tháng trước khi áp dụng mức phí mới.”."}]},{"id":"tt96_4","no":4,"code":"Điều 4","title":"Điều 4. Sửa đổi, bổ sung điểm a và b khoản 1 Điều 20 như sau:","shortTitle":"Sửa đổi, bổ sung điểm a và b khoản 1 Điều 20 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“a) Tính toán phí bảo hiểm và tham gia xây dựng quy tắc, điều kiện, điều khoản của các sản phẩm bảo hiểm, tái bảo hiểm; xác nhận phí bảo hiểm, các khoản phí tính cho bên mua bảo hiểm (đối với sản phẩm liên kết đầu tư, bảo hiểm hưu trí) được xây dựng dựa trên số liệu thống kê, đảm bảo tính khả thi về kinh tế, kỹ thuật của sản phẩm, công bằng với bên mua bảo hiểm, đáp ứng quy định của pháp luật và bảo đảm khả năng thanh toán của doanh nghiệp bảo hiểm, doanh nghiệp tái bảo hiểm, chi nhánh nước ngoài tại Việt Nam; định kỳ hàng năm xem xét, đánh giá các giả định tính phí, đảm bảo các giả định tính phí được sử dụng hợp lý, thống nhất, phù hợp với số liệu thống kê và thực tế triển khai của doanh nghiệp, chi nhánh; kịp thời đề xuất các điều chỉnh, thay đổi các giả định tính phí với Tổng Giám đốc (Giám đốc) của doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài trong trường hợp cần thiết."},{"k":"p","t":"b) Tính toán và đảm bảo việc trích lập dự phòng nghiệp vụ bảo hiểm đầy đủ theo quy định của pháp luật;”."}]},{"id":"tt96_5","no":5,"code":"Điều 5","title":"Điều 5. Sửa đổi, bổ sung một số điểm của Điều 22 như sau:","shortTitle":"Sửa đổi, bổ sung một số điểm của Điều 22 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm a khoản 1 như sau:"},{"k":"p","t":"“a) Đối với tỷ lệ rủi ro tử vong, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài có thể sử dụng một trong số các nguồn sau:"},{"k":"p","t":"- Bảng tỷ lệ tử vong CSO 1980 quy định tại Phụ lục V ban hành kèm theo Thông tư này; các tỷ lệ điều chỉnh dựa trên bảng tỷ lệ tử vong CSO 1980 này;"},{"k":"p","t":"- Bảng tỷ lệ tử vong được xây dựng dựa trên số liệu thực tế triển khai của doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài trong thời gian tối thiểu 10 năm;"},{"k":"p","t":"- Các bảng tỷ lệ tử vong do công ty mẹ của doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài hoặc doanh nghiệp tái bảo hiểm, tổ chức nhận tái bảo hiểm cung cấp;"},{"k":"p","t":"Trong trường hợp tỷ lệ tử vong do doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài sử dụng cao hơn 70% tỷ lệ tử vong theo bảng tỷ lệ tử vong CSO 1980, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài phải giải trình được tính hợp lý, điểm đặc trưng của nhóm khách hàng dự kiến áp dụng tỷ lệ cao hơn đó.”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm a khoản 2 như sau:"},{"k":"p","t":"“a) Các giả định về chi phí triển khai sản phẩm bảo hiểm (chi phí cố định và chi phí biến đổi) được xác định dựa trên số liệu thống kê 3 năm liên tiếp liền kề năm nộp hồ sơ và kế hoạch kinh doanh của doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài. Trường hợp doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài hoạt động chưa đủ 3 năm thì giả định về chi phí triển khai sản phẩm bảo hiểm được xác định dựa trên kế hoạch kinh doanh 5 năm;”."},{"k":"p","t":"3. Sửa đổi, bổ sung điểm c khoản 3 như sau:"},{"k":"p","t":"“c) Phí rủi ro của sản phẩm bảo hiểm liên kết đầu tư, bảo hiểm hưu trí thực hiện theo quy định sau:"},{"k":"p","t":"- Đối với sản phẩm bảo hiểm liên kết đầu tư, sản phẩm bảo hiểm hưu trí cung cấp quyền lợi tử vong và thương tật toàn bộ vĩnh viễn: phí rủi ro không vượt quá 80% tỷ lệ tử vong theo bảng tỷ lệ tử vong CSO 1980 quy định tại Phụ lục V ban hành kèm theo Thông tư này nhân với số tiền bảo hiểm chịu rủi ro."},{"k":"p","t":"- Đối với sản phẩm bảo hiểm liên kết đầu tư chỉ cung cấp quyền lợi bảo hiểm tử vong: phí rủi ro không vượt quá 72% tỷ lệ tử vong theo bảng tỷ lệ tử vong CSO 1980 quy định tại Phụ lục V ban hành kèm theo Thông tư này nhân với số tiền bảo hiểm chịu rủi ro."},{"k":"p","t":"Trường hợp doanh nghiệp bảo hiểm áp dụng phí rủi ro cao hơn mức quy định nêu trên thì phải giải trình được tính hợp lý, điểm đặc trưng của nhóm khách hàng dự kiến áp dụng phí rủi ro cao hơn đó;”."}]},{"id":"tt96_6","no":6,"code":"Điều 6","title":"Điều 6. Sửa đổi, bổ sung một số điểm của Điều 25 như sau:","shortTitle":"Sửa đổi, bổ sung một số điểm của Điều 25 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm d khoản 1 như sau:"},{"k":"p","t":"“d) Thực hiện thông báo cụ thể các trường hợp và căn cứ tăng, giảm phí bảo hiểm."},{"k":"p","t":"Việc tăng phí bảo hiểm phải căn cứ trên các yếu tố làm tăng rủi ro được bảo hiểm."},{"k":"p","t":"Việc giảm phí bảo hiểm phải bảo đảm trong mọi trường hợp phí bảo hiểm sau khi giảm phí không thấp hơn phí bảo hiểm thuần và căn cứ trên một hoặc một số các yếu tố làm giảm, phân tán, chia sẻ rủi ro hoặc giảm chi phí triển khai sản phẩm bảo hiểm xe cơ giới, bao gồm quy mô số phương tiện được bảo hiểm, lựa chọn mức khấu trừ, mức miễn thường, lịch sử bồi thường, hình thức phân phối sản phẩm và các yếu tố khác (nếu có), trường hợp giảm phí bảo hiểm do bán hàng trực tiếp, mức phí bảo hiểm được giảm không vượt quá tỷ lệ hoa hồng đại lý bảo hiểm theo quy định tại Điều 51 Thông tư này;”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm a và điểm b khoản 2 như sau:"},{"k":"p","t":"“a) Phí bảo hiểm thuần được xác định trên số liệu thống kê thực tế triển khai của doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài, bảo đảm tính quy mô và liên tục theo chuỗi thời gian tối thiểu trong 5 năm liên tiếp."},{"k":"p","t":"Trường hợp số liệu thống kê không bảo đảm tính quy mô và liên tục, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài có thể sử dụng các nguồn sau:"},{"k":"p","t":"- Phí bảo hiểm thuần do cơ quan, tổ chức có thẩm quyền công bố;"},{"k":"p","t":"- Số liệu thống kê, dữ liệu công khai, chính thức do các tổ chức được thành lập và hoạt động hợp pháp tại Việt Nam công khai, xuất bản;"},{"k":"p","t":"- Phí bảo hiểm thuần do công ty mẹ hoặc doanh nghiệp tái bảo hiểm, tổ chức bảo hiểm nước ngoài nhận tái bảo hiểm cung cấp; trong trường hợp này doanh nghiệp, tổ chức tái bảo hiểm phải được xếp hạng tối thiểu “BBB” theo Standard & Poor’s hoặc Fitch, “B++” theo A.M.Best, “Baa1” theo Moody’s hoặc các kết quả xếp hạng tương đương của các tổ chức có chức năng, kinh nghiệm xếp hạng khác tại năm tài chính gần nhất so với thời điểm nộp hồ sơ thông báo phương pháp, cơ sở tính phí bảo hiểm và phải có kinh nghiệm khai thác tái bảo hiểm đối với loại rủi ro này tại thị trường Việt Nam hoặc Châu Á. Trường hợp có điều chỉnh phí bảo hiểm thuần của nhà tái bảo hiểm nước ngoài (tăng hoặc giảm), doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài phải có giải trình lý do. Việc sử dụng phí bảo hiểm thuần do các doanh nghiệp, tổ chức tái bảo hiểm cung cấp phải bảo đảm phù hợp với các quyền lợi bảo hiểm do doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài dự kiến cung cấp tại quy tắc, điều khoản của sản phẩm bảo hiểm."},{"k":"p","t":"Trường hợp doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài xác định phí bảo hiểm thuần đối với các rủi ro bảo hiểm dành cho Xe cơ giới thân thiện môi trường và Xe cơ giới sử dụng năng lượng sạch, năng lượng xanh, thân thiện môi trường theo quy định tại Thông tư số 53/2024/TT-BGTVT ngày 15/11/2024 hoặc các văn bản sửa đổi, bổ sung (nếu có): Doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài có thể sử dụng các nguồn số liệu thống kê do các tổ chức trong nước và quốc tế đăng tải công khai trên các trang thông tin điện tử chính thức của các tổ chức đó hoặc sử dụng kết hợp các số liệu thống kê này với các số liệu thống kê của doanh nghiệp, chi nhánh trong thời gian tối thiểu 3 năm liên tiếp."},{"k":"p","t":"Việc sử dụng nguồn dữ liệu triển khai của sản phẩm theo quy định tại điểm này, quy trình đánh giá rủi ro và quy trình dừng bán và tính phí lại sản phẩm phải được nêu rõ tại quy trình nội bộ về phát triển và định phí sản phẩm. Quy trình này phải được Hội đồng quản trị (Hội đồng thành viên) hoặc Tổng Giám đốc (Giám đốc) thông qua. Việc tuân thủ quy trình nội bộ về phát triển và định phí sản phẩm bảo hiểm phải được kiểm toán nội bộ xem xét định kỳ hàng năm."},{"k":"p","t":"b) Phí bảo hiểm thuần được xác định cụ thể cho từng rủi ro hoặc cho một số rủi ro sau đây: đâm, va (bao gồm cả va chạm vào vật thể khác); lật, đổ, chìm, rơi; bị các vật thể khác rơi vào; cháy, nổ; thiên tai; mất cắp; và các rủi ro khác (nếu có)."},{"k":"p","t":"Khi thông báo áp dụng phương pháp, cơ sở tính phí bảo hiểm hoặc thay đổi phương pháp, cơ sở tính phí bảo hiểm xe cơ giới, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm nước ngoài không được thay đổi phí bảo hiểm thuần đã thông báo ít nhất trong 12 tháng kế tiếp đối với cùng loại xe cơ giới, mục đích kinh doanh và sử dụng xe cơ giới, năm sản xuất của xe cơ giới và nhóm khách hàng.”."}]},{"id":"tt96_7","no":7,"code":"Điều 7","title":"Điều 7. Sửa đổi, bổ sung gạch đầu dòng đầu tiên điểm b khoản 2 Điều 38 như sau:","shortTitle":"Sửa đổi, bổ sung gạch đầu dòng đầu tiên điểm b khoản 2 Điều 38 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“- 80% Bảng tỷ lệ tử vong CSO 1980 và các cơ sở kỹ thuật khác phù hợp với các quyền lợi bảo hiểm mà doanh nghiệp bảo hiểm cam kết với khách hàng tại sản phẩm bảo hiểm."},{"k":"p","t":"Trong mọi trường hợp, tỷ lệ tử vong và các tỷ lệ rủi ro áp dụng trong trích lập dự phòng không được thấp hơn tỷ lệ tử vong và tỷ lệ rủi ro mà doanh nghiệp bảo hiểm sử dụng để tính phí sản phẩm bảo hiểm.”."}]},{"id":"tt96_8","no":8,"code":"Điều 8","title":"Điều 8. Sửa đổi, bổ sung khoản 3 Điều 40 như sau:","shortTitle":"Sửa đổi, bổ sung khoản 3 Điều 40 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“3. Đối với doanh nghiệp bảo hiểm phi nhân thọ, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài, doanh nghiệp tái bảo hiểm kinh doanh bảo hiểm sức khỏe, bảo hiểm tử kỳ có thời hạn từ 01 năm trở xuống: Mức trích lập hàng năm theo quy định tại điểm b khoản 1 Điều 37 Thông tư này. Dự phòng này được sử dụng để trả tiền bồi thường khi có biến động lớn về tỷ lệ rủi ro dẫn đến tổng phí bảo hiểm giữ lại trong năm tài chính sau khi đã trích lập dự phòng phí chưa được hưởng và dự phòng bồi thường cho khiếu nại chưa giải quyết không đủ để chi trả số tiền bồi thường thuộc trách nhiệm của doanh nghiệp bảo hiểm phi nhân thọ, chi nhánh nước ngoài tại Việt Nam, doanh nghiệp tái bảo hiểm. Số tiền tối đa được sử dụng được tính theo công thức sau:"}]},{"id":"tt96_9","no":9,"code":"Điều 9","title":"Điều 9. Sửa đổi, bổ sung tên Mục 4 Chương IV như sau:","shortTitle":"Sửa đổi, bổ sung tên Mục 4 Chương IV như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“DOANH THU, CHI PHÍ”"}]},{"id":"tt96_10","no":10,"code":"Điều 10","title":"Điều 10. Sửa đổi, bổ sung khoản 1 Điều 41 như sau:","shortTitle":"Sửa đổi, bổ sung khoản 1 Điều 41 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“1. Doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài tại Việt Nam hạch toán khoản thu phí bảo hiểm gốc vào doanh thu hoạt động kinh doanh bảo hiểm khi phát sinh trách nhiệm bảo hiểm đối với bên mua bảo hiểm, cụ thể như sau:"},{"k":"p","t":"a) Khi hợp đồng bảo hiểm đã được giao kết và bên mua bảo hiểm đã đóng đủ phí bảo hiểm;"},{"k":"p","t":"b) Có bằng chứng về việc hợp đồng bảo hiểm đã được giao kết và bên mua bảo hiểm đã đóng đủ phí bảo hiểm;"},{"k":"p","t":"c) Khi hợp đồng bảo hiểm đã giao kết và doanh nghiệp bảo hiểm phi nhân thọ, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài có thỏa thuận với bên mua bảo hiểm về thời hạn thanh toán phí bảo hiểm theo quy định tại điểm a và c khoản 2 Điều 26 Thông tư này, doanh nghiệp bảo hiểm phi nhân thọ, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài hạch toán doanh thu khoản phí bảo hiểm bên mua bảo hiểm phải đóng theo thỏa thuận tại hợp đồng bảo hiểm khi bắt đầu thời hạn bảo hiểm;"},{"k":"p","t":"d) Khi hợp đồng bảo hiểm đã giao kết và có thỏa thuận cho bên mua bảo hiểm về việc đóng phí bảo hiểm theo kỳ tại hợp đồng bảo hiểm, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài hạch toán doanh thu số phí bảo hiểm tương ứng với kỳ hoặc các kỳ phí bảo hiểm đã phát sinh, không hạch toán doanh thu số phí bảo hiểm chưa đến kỳ bên mua bảo hiểm phải đóng theo thỏa thuận tại hợp đồng bảo hiểm.”."}]},{"id":"tt96_11","no":11,"code":"Điều 11","title":"Điều 11. Bổ sung Điều 41a vào sau Điều 41 như sau:","shortTitle":"Bổ sung Điều 41a vào sau Điều 41 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“Điều 41a. Chi hỗ trợ, chi thù lao cho nhân viên hoặc thành viên của tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp, hợp tác xã"},{"k":"p","t":"1. Doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài chi hỗ trợ, chi thù lao cho nhân viên hoặc thành viên của tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp, hợp tác xã được doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài ủy quyền để tư vấn, thu xếp việc giao kết hợp đồng bảo hiểm vi mô cho chính các thành viên của tổ chức đó sau khi mang lại dịch vụ cho doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài."},{"k":"p","t":"2. Doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài căn cứ vào quy định tại khoản 3 Điều này, điều kiện và đặc điểm cụ thể của mình để xây dựng quy chế chi hỗ trợ, chi thù lao áp dụng thống nhất và công khai trong doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài."},{"k":"p","t":"3. Tỷ lệ chi hỗ trợ, chi thù lao tối đa được trả trên phí bảo hiểm thực tế thu được của từng hợp đồng bảo hiểm mà doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài trả cho nhân viên hoặc thành viên của tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp, hợp tác xã không vượt quá 5% tỷ lệ hoa hồng đại lý bảo hiểm tối đa tương ứng với từng hợp đồng bảo hiểm thuộc từng nghiệp vụ bảo hiểm phi nhân thọ, nhân thọ, sức khỏe quy định tại khoản 3 Điều 51 Thông tư này.”."}]},{"id":"tt96_12","no":12,"code":"Điều 12","title":"Điều 12. Bãi bỏ khoản 3 và sửa đổi, bổ sung một số điểm, khoản của Điều 42 như sau:","shortTitle":"Bãi bỏ khoản 3 và sửa đổi, bổ sung một số điểm, khoản của Điều 42 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm e khoản 1 như sau:"},{"k":"p","t":"“e) Chuyên gia tính toán có trách nhiệm bảo đảm các giao dịch liên quan đến nhiều nguồn, nghiệp vụ phải được tập hợp và phân bổ cho từng nguồn, nghiệp vụ dựa trên cơ sở công bằng và hợp lý, nhất quán. Cuối năm, chuyên gia tính toán xác định và điều chỉnh lại tỷ lệ phân bổ các giao dịch liên quan đến nhiều nguồn, nghiệp vụ bảo đảm đáp ứng quy định tại Thông tư này, phù hợp với nguyên tắc đã thông báo với Bộ Tài chính và thực tế triển khai hoạt động của doanh nghiệp.”."},{"k":"p","t":"2. Sửa đổi, bổ sung khoản 2 như sau:"},{"k":"p","t":"“2. Người đại diện theo pháp luật, chuyên gia tính toán và kế toán trưởng của doanh nghiệp bảo hiểm phi nhân thọ, doanh nghiệp bảo hiểm sức khỏe, doanh nghiệp tái bảo hiểm, chi nhánh nước ngoài tại Việt Nam chịu trách nhiệm về việc xây dựng nguyên tắc phân bổ doanh thu, chi phí theo quy định tại Thông tư này và thực hiện thủ tục thông báo với Bộ Tài chính, thực hiện tách nguồn vốn chủ sở hữu và nguồn phí bảo hiểm, tính chính xác các số liệu của nguồn phí bảo hiểm và nguồn vốn chủ sở hữu. Hội đồng quản trị, Hội đồng thành viên của doanh nghiệp bảo hiểm phi nhân thọ, doanh nghiệp bảo hiểm sức khỏe, doanh nghiệp tái bảo hiểm hoặc cấp có thẩm quyền của chi nhánh nước ngoài tại Việt Nam chịu trách nhiệm phê duyệt nguyên tắc phân bổ doanh thu, chi phí và có trách nhiệm giám sát việc triển khai thực hiện các nguyên tắc phân bổ này sau khi đã thông báo với Bộ Tài chính.”."}]},{"id":"tt96_13","no":13,"code":"Điều 13","title":"Điều 13. Sửa đổi, bổ sung một số điểm của Điều 43 như sau:","shortTitle":"Sửa đổi, bổ sung một số điểm của Điều 43 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm a khoản 5 và bổ sung điểm a1 vào sau điểm a khoản 5 như sau:"},{"k":"p","t":"“a) Chi bồi thường bảo hiểm sau khi trừ thu bồi thường nhượng tái bảo hiểm, chi trích lập dự phòng nghiệp vụ bảo hiểm, chi hoa hồng đại lý bảo hiểm, chi hoa hồng môi giới bảo hiểm; chi thưởng, hỗ trợ đại lý bảo hiểm và các quyền lợi khác từ hoạt động đại lý bảo hiểm theo thỏa thuận trong hợp đồng đại lý bảo hiểm; chi đào tạo ban đầu và thi cấp chứng chỉ đại lý; chi đào tạo nâng cao kiến thức cho đại lý; chi tuyển dụng đại lý bảo hiểm; chi quản lý các đại lý bảo hiểm cá nhân; chi kiểm tra, giám sát, đánh giá chất lượng đại lý bảo hiểm."},{"k":"p","t":"a1) Chi hỗ trợ, chi thù lao cho nhân viên hoặc thành viên của tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp, hợp tác xã được doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài ủy quyền để tư vấn, thu xếp việc giao kết hợp đồng bảo hiểm vi mô cho chính các thành viên của tổ chức đó để triển khai bảo hiểm vi mô;”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm e khoản 5 như sau:"},{"k":"p","t":"“e) Chi phí chung bao gồm chi quản lý doanh nghiệp và chi khác được phân bổ cho nguồn phí bảo hiểm theo nguyên tắc phân bổ đã thông báo với Bộ Tài chính;”."},{"k":"p","t":"3. Sửa đổi, bổ sung điểm a khoản 6 như sau:"},{"k":"p","t":"“a) Chi phí chung bao gồm chi quản lý doanh nghiệp và chi khác được phân bổ cho nguồn vốn chủ sở hữu theo nguyên tắc phân bổ đã thông báo với Bộ Tài chính;”."}]},{"id":"tt96_14","no":14,"code":"Điều 14","title":"Điều 14. Sửa đổi, bổ sung điểm b khoản 5 và bổ sung điểm b1 vào sau điểm b khoản 5 Điều 46 như sau:","shortTitle":"Sửa đổi, bổ sung điểm b khoản 5 và bổ sung điểm b1 vào sau điểm b khoản 5 Điều 46 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“b) Chi giám định tổn thất; chi thưởng, hỗ trợ đại lý bảo hiểm và quyền lợi khác từ hoạt động đại lý bảo hiểm theo thỏa thuận trong hợp đồng đại lý bảo hiểm, chi đề phòng, hạn chế tổn thất, chi đánh giá rủi ro của đối tượng bảo hiểm; chi đào tạo ban đầu và thi cấp chứng chỉ đại lý; chi đào tạo nâng cao kiến thức cho đại lý; chi tuyển dụng đại lý bảo hiểm; chi quản lý các đại lý bảo hiểm cá nhân; chi kiểm tra, giám sát, đánh giá chất lượng đại lý bảo hiểm;"},{"k":"p","t":"b1) Chi hỗ trợ, chi thù lao cho nhân viên hoặc thành viên của tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp, hợp tác xã được doanh nghiệp bảo hiểm ủy quyền để tư vấn, thu xếp việc giao kết hợp đồng bảo hiểm vi mô cho chính các thành viên của tổ chức đó để triển khai bảo hiểm vi mô;”."}]},{"id":"tt96_15","no":15,"code":"Điều 15","title":"Điều 15. Sửa đổi, bổ sung khoản 5 Điều 49 như sau:","shortTitle":"Sửa đổi, bổ sung khoản 5 Điều 49 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“5. Các thông tin công khai thường xuyên phải được cập nhật và truy cập được trên trang thông tin điện tử của doanh nghiệp bảo hiểm, doanh nghiệp tái bảo hiểm, chi nhánh nước ngoài tại Việt Nam."},{"k":"p","t":"Đối với các thông tin công khai thường xuyên tại điểm b khoản 2 Điều 119 Luật Kinh doanh bảo hiểm, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài phải nêu rõ thời hạn chấp thuận hoặc từ chối bồi thường, trả tiền bảo hiểm, giải quyết phản ánh, yêu cầu, khiếu nại của khách hàng.”."}]},{"id":"tt96_16","no":16,"code":"Điều 16","title":"Điều 16. Sửa đổi, bổ sung một số tiết của Điều 51 như sau:","shortTitle":"Sửa đổi, bổ sung một số tiết của Điều 51 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung tiết a điểm 3.2 khoản 3 Điều 51 như sau:"},{"k":"p","t":"“a) Đối với các hợp đồng bảo hiểm nhân thọ cá nhân:"},{"k":"p","t":"Tỷ lệ hoa hồng đại lý bảo hiểm tối đa được áp dụng đối với các nghiệp vụ bảo hiểm theo quy định sau:"},{"k":"p","t":"- Đối với các hợp đồng bảo hiểm phát hành trước ngày 01/7/2024, tỷ lệ hoa hồng đại lý bảo hiểm tối đa theo bảng sau:"},{"k":"tbl","rows":[["Nghiệp vụ bảo hiểm","Tỷ lệ hoa hồng đại lý bảo hiểm tối đa (%)"],["","Phương thức nộp phí định kỳ","Phương thức nộp phí 1 lần"],["","Năm hợp đồng thứ nhất","Năm hợp đồng thứ hai","Các năm hợp đồng tiếp theo",""],["1. Bảo hiểm tử kỳ","40","20","15","15"],["2. Bảo hiểm sinh kỳ","","","",""],["- Thời hạn bảo hiểm từ 10 năm trở xuống","15","10","5","5"],["- Thời hạn bảo hiểm trên 10 năm","20","10","5","5"],["3. Bảo hiểm hỗn hợp:","","","",""],["- Thời hạn bảo hiểm từ 10 năm trở xuống","25","7","5","5"],["- Thời hạn bảo hiểm trên 10 năm","40","10","10","7"],["4. Bảo hiểm trọn đời","30","20","15","10"],["5. Bảo hiểm trả tiền định kỳ","25","10","7","7"],["6. Bảo hiểm liên kết chung","","","",""],["- Từ 10 năm trở xuống","25","7","5","5"],["- Trên 10 năm","40","10","10","7"],["7. Bảo hiểm liên kết đơn vị","40","10","10","7"]]},{"k":"p","t":"- Đối với các hợp đồng bảo hiểm phát hành kể từ ngày 01/7/2024 đến hết ngày 31/12/2026, tỷ lệ hoa hồng đại lý bảo hiểm tối đa thực hiện như sau:"},{"k":"p","t":"+ Đối với các hợp đồng bảo hiểm có thời hạn từ 01 năm trở xuống và 01 năm tái tục hàng năm: 20%"},{"k":"p","t":"+ Đối với các hợp đồng bảo hiểm trên 01 năm:"},{"k":"tbl","rows":[["Nghiệp vụ bảo hiểm","Tỷ lệ hoa hồng đại lý bảo hiểm tối đa (%)"],["","Phương thức nộp phí định kỳ","Phương thức nộp phí 1 lần"],["","Năm hợp đồng thứ nhất","Năm hợp đồng thứ hai","Các năm hợp đồng tiếp theo",""],["1. Bảo hiểm tử kỳ, Bảo hiểm trọn đời","40","20","15","15"],["2. Bảo hiểm sinh kỳ, Bảo hiểm trả tiền định kỳ, Bảo hiểm hỗn hợp:","","","",""],["- Thời hạn bảo hiểm từ 10 năm trở xuống","25","7","5","5"],["- Thời hạn bảo hiểm trên 10 năm","30","20","10","7"],["3. Bảo hiểm liên kết chung, Bảo hiểm liên kết đơn vị","30","20","10","7"]]},{"k":"p","t":"- Đối với các hợp đồng bảo hiểm phát hành kể từ ngày 01/01/2027, tỷ lệ hoa hồng đại lý bảo hiểm tối đa thực hiện như sau:"},{"k":"p","t":"+ Đối với các hợp đồng bảo hiểm có thời hạn từ 01 năm trở xuống và 01 năm tái tục hàng năm: 20%"},{"k":"p","t":"+ Đối với các hợp đồng bảo hiểm trên 01 năm:"},{"k":"tbl","rows":[["Nghiệp vụ bảo hiểm","Tỷ lệ hoa hồng đại lý bảo hiểm tối đa (%)"],["","Phương thức nộp phí định kỳ","Phương thức nộp phí 1 lần"],["","Năm hợp đồng thứ nhất","Năm hợp đồng thứ hai","Các năm hợp đồng tiếp theo",""],["1. Bảo hiểm tử kỳ, Bảo hiểm trọn đời","40","20","15","15"],["2. Bảo hiểm sinh kỳ, Bảo hiểm trả tiền định kỳ, Bảo hiểm hỗn hợp:","","","",""],["- Thời hạn bảo hiểm từ 10 năm trở xuống","25","7","5","5"],["- Thời hạn bảo hiểm trên 10 năm","30","20","10","7"],["3. Bảo hiểm liên kết chung, Bảo hiểm liên kết đơn vị (đối với phí bảo hiểm cơ bản)","30","20","10","7"]]},{"k":"p","t":"+ Hoa hồng đại lý bảo hiểm đối với phí bảo hiểm đóng thêm của hợp đồng bảo hiểm liên kết chung, hợp đồng bảo hiểm liên kết đơn vị không được vượt quá tỷ lệ phí ban đầu đối với phần phí bảo hiểm đóng thêm."},{"k":"p","t":"2. Sửa đổi, bổ sung tiết b điểm 3.2 khoản 3 Điều 51 như sau:"},{"k":"p","t":"“b) Hoa hồng đại lý bảo hiểm đối với phí bảo hiểm cơ bản của hợp đồng bảo hiểm hưu trí: 3% tổng phí bảo hiểm cơ bản;"},{"k":"p","t":"Hoa hồng đại lý bảo hiểm đối với phí bảo hiểm đóng thêm của hợp đồng bảo hiểm hưu trí không được vượt quá tỷ lệ phí ban đầu đối với phần phí bảo hiểm đóng thêm.”."},{"k":"p","t":"3. Sửa đổi, bổ sung tiết c điểm 3.2 khoản 3 Điều 51 như sau:"},{"k":"p","t":"“c) Đối với các hợp đồng bảo hiểm nhân thọ nhóm: Tỷ lệ hoa hồng đại lý bảo hiểm tối đa bằng 50% các tỷ lệ tương ứng áp dụng cho các hợp đồng bảo hiểm nhân thọ cá nhân cùng loại quy định tại tiết a điểm này.”."}]},{"id":"tt96_17","no":17,"code":"Điều 17","title":"Điều 17. Sửa đổi, bổ sung một số điểm của Điều 52 như sau:","shortTitle":"Sửa đổi, bổ sung một số điểm của Điều 52 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm a khoản 1 như sau:"},{"k":"p","t":"“a) Đối với bảo hiểm sức khỏe, bảo hiểm tử kỳ có thời hạn từ 01 năm trở xuống: Tổng các khoản chi thưởng, hỗ trợ và quyền lợi khác của các đại lý bảo hiểm không vượt quá 100% hoa hồng đại lý bảo hiểm của tất cả các hợp đồng bảo hiểm thuộc bảo hiểm sức khỏe, bảo hiểm tử kỳ đã khai thác trong năm tài chính;”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm a khoản 2 như sau:"},{"k":"p","t":"“a) Đối với các đại lý thực hiện khai thác mới: Tổng các khoản thưởng, hỗ trợ đại lý bảo hiểm và các quyền lợi khác của đại lý trong mỗi năm tài chính không vượt quá tổng giá trị của 20% phí bảo hiểm thực tế thu được của các hợp đồng bảo hiểm có thời hạn từ 01 năm trở xuống và 01 năm tái tục hàng năm và 30% phí bảo hiểm khai thác năm đầu thực tế thu được đối với phương thức nộp phí định kỳ hoặc 7% phí bảo hiểm thực tế thu được theo phương thức nộp phí 1 lần đối với các hợp đồng bảo hiểm có thời hạn trên 01 năm;”."}]},{"id":"tt96_18","no":18,"code":"Điều 18","title":"Điều 18. Sửa đổi, bổ sung một số khoản của Điều 53 như sau:","shortTitle":"Sửa đổi, bổ sung một số khoản của Điều 53 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bổ sung điểm d vào sau điểm c khoản 3 như sau:"},{"k":"p","t":"“d) Phối hợp với doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm nước ngoài trong việc giám sát và kiểm tra nhằm đảm bảo chất lượng hoạt động giới thiệu, tư vấn sản phẩm bảo hiểm của các nhân viên của tổ chức hoạt động đại lý bảo hiểm; kịp thời phối hợp với doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm nước ngoài thực hiện kiểm tra, rà soát, xử lý các khiếu nại của bên mua bảo hiểm liên quan đến việc tư vấn của nhân viên của tổ chức hoạt động đại lý bảo hiểm; thực hiện các biện pháp xử lý vi phạm (nếu có) theo quyết định của doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm nước ngoài.”."},{"k":"p","t":"2. Sửa đổi, bổ sung tiêu đề khoản 4 và điểm a khoản 4 như sau:"},{"k":"p","t":"“4. Việc cung cấp sản phẩm bảo hiểm qua đại lý bảo hiểm, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài phải thực hiện theo quy định sau:"},{"k":"p","t":"a) Thực hiện việc giám sát và kiểm tra nhằm đảm bảo chất lượng hoạt động giới thiệu, tư vấn sản phẩm bảo hiểm của đại lý bảo hiểm; kịp thời kiểm tra, rà soát, xử lý các khiếu nại của bên mua bảo hiểm liên quan đến việc tư vấn của đại lý bảo hiểm. Trường hợp phát hiện đại lý bảo hiểm vi phạm quy định, doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài phải có biện pháp xử lý đối với các đại lý bảo hiểm vi phạm;”."}]},{"id":"tt96_19","no":19,"code":"Điều 19","title":"Điều 19. Bổ sung Điều 53a vào sau Điều 53 như sau:","shortTitle":"Bổ sung Điều 53a vào sau Điều 53 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“Điều 53a. Quản lý đại lý bảo hiểm cá nhân"},{"k":"p","t":"Quản lý đại lý bảo hiểm cá nhân là hoạt động do doanh nghiệp bảo hiểm, chi nhánh doanh nghiệp bảo hiểm phi nhân thọ nước ngoài tự thực hiện hoặc thuê ngoài nhằm mục đích quản lý , hỗ trợ một hoặc nhiều nhóm đại lý bảo hiểm cá nhân thực hiện hoạt động đại lý bảo hiểm được quy định tại khoản 5 Điều 4 Luật Kinh doanh bảo hiểm.”."}]},{"id":"tt96_20","no":20,"code":"Điều 20","title":"Điều 20. Sửa đổi, bổ sung khoản 2 Điều 61 như sau:","shortTitle":"Sửa đổi, bổ sung khoản 2 Điều 61 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"“2. Trong thời hạn 30 ngày kể từ ngày có thay đổi, doanh nghiệp bảo hiểm nước ngoài, doanh nghiệp tái bảo hiểm nước ngoài, tập đoàn tài chính, bảo hiểm nước ngoài, doanh nghiệp môi giới bảo hiểm nước ngoài (đối với trường hợp thay đổi Trưởng văn phòng đại diện) hoặc văn phòng đại diện nước ngoài tại Việt Nam (đối với trường hợp thay đổi địa điểm đặt văn phòng đại diện nước ngoài tại Việt Nam) phải thông báo cho Bộ Tài chính. Hồ sơ thông báo bao gồm:"},{"k":"p","t":"a) Văn bản thông báo theo mẫu quy định tại Phụ lục XIII Thông tư này;"},{"k":"p","t":"b) Sơ yếu lý lịch, bản sao thẻ căn cước công dân hoặc thẻ căn cước hoặc hộ chiếu hoặc giấy tờ chứng thực cá nhân hợp pháp khác theo quy định của pháp luật đối với trường hợp thay đổi Trưởng văn phòng đại diện. Khi các loại giấy tờ về lai lịch, nhân dạng của công dân Việt Nam thuộc thành phần hồ sơ quy định tại Thông tư này đã được tích hợp trong Cơ sở dữ liệu quốc gia về dân cư, Cơ sở dữ liệu căn cước công dân và các cơ sở dữ liệu khác thì Bộ Tài chính có trách nhiệm khai thác và sử dụng thông tin trong Cơ sở dữ liệu quốc gia về dân cư, Cơ sở dữ liệu căn cước công dân và các cơ sở dữ liệu khác trên cơ sở trao đổi, cung cấp thông tin giữa các cơ quan quản lý nhà nước;"},{"k":"p","t":"c) Bản sao hợp đồng thuê địa điểm đặt văn phòng đại diện nước ngoài tại Việt Nam hoặc bằng chứng chứng minh quyền sử dụng địa điểm đặt văn phòng đại diện nước ngoài tại Việt Nam có xác nhận của văn phòng đại diện đối với trường hợp thay đổi địa điểm đặt văn phòng đại diện nước ngoài tại Việt Nam.”."}]},{"id":"tt96_21","no":21,"code":"Điều 21","title":"Điều 21. Sửa đổi, bổ sung điểm a và b khoản 4 Điều 62 như sau:","shortTitle":"Sửa đổi, bổ sung điểm a và b khoản 4 Điều 62 như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Thay thế cụm từ “đến hết ngày 31 tháng 12 năm 2027”  bằng cụm từ “đến hết ngày 31 tháng 12 năm 2030” tại điểm a và b khoản 4 Điều 62."}]},{"id":"tt96_22","no":22,"code":"Điều 22","title":"Điều 22. Thay thế một số Phụ lục của Thông tư số 67/2023/TT-BTC như sau:","shortTitle":"Thay thế một số Phụ lục của Thông tư số 67/2023/TT-BTC như sau:","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thay thế các phụ lục III, IV, X, XI bằng các phụ lục III, IV, X, XI ban hành kèm theo Thông tư này."},{"k":"p","t":"2. Thay thế Mẫu báo cáo số 13-NT Phụ lục VIII bằng Mẫu báo cáo số 13-NT Phụ lục VIII ban hành kèm theo Thông tư này."}]},{"id":"tt96_23","no":23,"code":"Điều 23","title":"Điều 23. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 2 tháng 7 năm 2026, trừ các trường hợp quy định tại khoản 2 Điều 16 và khoản 2 Điều 17 Thông tư này có hiệu lực thi hành kể từ ngày 01/01/2027."},{"k":"p","t":"2. Trường hợp các văn bản quy phạm pháp luật quy định viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."},{"k":"p","t":"3. Trong quá trình thực hiện, nếu có khó khăn, vướng mắc, đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để nghiên cứu, hướng dẫn bổ sung."}]},{"id":"tt96_24","no":24,"code":"Điều 24","title":"Điều 24. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Đối với các phương pháp, cơ sở tính phí hoặc phương pháp, cơ sở trích lập dự phòng nghiệp vụ đã được Bộ Tài chính chấp thuận trước ngày Thông tư này có hiệu lực thì tiếp tục thực hiện theo phương pháp, cơ sở đó./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Văn phòng Trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chính phủ;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Chủ tịch nước;- Cơ sở dữ liệu quốc gia về pháp luật;- Viện kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- Cơ quan Trung ương của các tổ chức chính trị-xã hội;- Các bộ, cơ quan ngang bộ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Cục Kiểm tra văn bản và tổ chức thi hành pháp luật, Bộ Tư pháp;- Công báo, Cổng Thông tin điện tử của Chính phủ;- Cổng Thông tin điện tử Bộ Tài chính;- HHBH, DNBH, DNTBH, DNMGBH; CNNN; VPĐD- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, QLBH ( b)","KT. BỘ TRƯỞNGTHỨ TRƯỞNGLê Tấn Cận"]]}]}],"forms":[{"code":"1","title":"TÀI LIỆU GIẢI TRÌNH PHƯƠNG PHÁP, CƠ SỞ TÍNH PHÍ","pl":"","note":""},{"code":"2","title":"TÀI LIỆU GIẢI TRÌNH PHƯƠNG PHÁP,","pl":"","note":""},{"code":"13-NT","title":"BÁO CÁO","pl":"","note":""},{"code":"1-MGBH","title":"BÁO CÁO","pl":"","note":""},{"code":"2-MGBH","title":"BÁO CÁO","pl":"","note":""},{"code":"3-MGBH","title":"BÁO CÁO","pl":"","note":""},{"code":"4-MGBH","title":"BÁO CÁO","pl":"","note":""},{"code":"01-DLBH","ti <script>

}

function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';

  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
