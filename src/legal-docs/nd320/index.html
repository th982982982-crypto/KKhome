<script id="LD" type="application/json">{"meta":{"title":"Nghị định 320/2025/NĐ-CP — Hướng dẫn chi tiết Luật Thuế TNDN","shortCode":"NĐ 320/2025","subtitle":"Quy định chi tiết Luật Thuế TNDN (Luật 67/2025)","slug":"nd320","number":"320/2025/NĐ-CP","effectiveDate":"15/12/2025","scope":"Quy định chi tiết và biện pháp thi hành Luật Thuế TNDN số 67/2025/QH15. Hiệu lực 15/12/2025, áp dụng từ kỳ tính thuế 2025.","description":"NĐ 320/2025 hướng dẫn chi tiết Luật 67/2025: người nộp thuế, thu nhập chịu/miễn thuế, doanh thu, chi được trừ/không được trừ, thuế suất, phương pháp tính, chuyển nhượng vốn/BĐS, ưu đãi thuế và Quỹ KHCN. Thay thế NĐ 218/2013, 91/2014, 12/2015, 57/2021.","related":["Luật 67/2025/QH15 — Thuế TNDN","TT 20/2026/TT-BTC — hướng dẫn chi tiết","TT 99/2025 — Kế toán DN","Thay thế: NĐ 218/2013, 91/2014, 12/2015, 57/2021"]},"outline":[{"id":"nd320_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh và đối tượng áp dụng","shortTitle":"Phạm vi điều chỉnh và đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Phạm vi điều chỉnh"},{"k":"p","t":"a) Quy định chi tiết một số điều của Luật Thuế thu nhập doanh nghiệp, bao gồm: Điều 2; Điều 3; Điều 4; Điều 8; Điều 9; khoản 3 Điều 10; khoản 2 Điều 11; các khoản 2, 3 và 4 Điều 12; khoản 1 Điều 13; khoản 6 Điều 14; Điều 15; Điều 16; các khoản 1,3 và 5 Điều 18; khoản 3 Điều 19;"},{"k":"p","t":"b) Quy định các biện pháp để tổ chức, hướng dẫn thi hành Luật Thuế thu nhập doanh nghiệp, bao gồm: Xác định thu nhập tính thuế; căn cứ tính thuế; thuế suất; phương pháp tính thuế; nguyên tắc, đối tượng áp dụng ưu đãi thuế thu nhập doanh nghiệp; thuế suất ưu đãi; miễn thuế, giảm thuế; điều kiện áp dụng ưu đãi thuế; trích lập Quỹ phát triển khoa học và công nghệ của doanh nghiệp; hiệu lực thi hành."},{"k":"p","t":"2. Đối tượng áp dụng"},{"k":"p","t":"Nghị định này áp dụng đối với các tổ chức, cá nhân có liên quan đến phạm vi điều chỉnh quy định tại khoản 1 Điều này."}]},{"id":"nd320_2","no":2,"code":"Điều 2","title":"Điều 2. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế theo quy định tại khoản 1 Điều 2 Luật Thuế thu nhập doanh nghiệp (sau đây gọi là doanh nghiệp) bao gồm:"},{"k":"p","t":"a) Doanh nghiệp được thành lập và hoạt động theo quy định của Luật Doanh nghiệp, Luật Đầu tư, Luật Kinh doanh bảo hiểm, Luật Chứng khoán, Luật Dầu khí, Luật Thương mại, Điều ước quốc tế và quy định tại các văn bản quy phạm pháp luật khác;"},{"k":"p","t":"b) Doanh nghiệp được thành lập theo quy định của pháp luật nước ngoài (sau đây gọi là doanh nghiệp nước ngoài) có cơ sở thường trú hoặc không có cơ sở thường trú tại Việt Nam, trong đó:"},{"k":"p","t":"b1) Doanh nghiệp nước ngoài có cơ sở thường trú tại Việt Nam nộp thuế đối với thu nhập chịu thuế phát sinh tại Việt Nam và thu nhập chịu thuế phát sinh ngoài Việt Nam liên quan đến hoạt động của cơ sở thường trú đó;"},{"k":"p","t":"b2) Doanh nghiệp nước ngoài có cơ sở thường trú tại Việt Nam nộp thuế đối với thu nhập chịu thuế phát sinh tại Việt Nam mà khoản thu nhập này không liên quan đến hoạt động của cơ sở thường trú;"},{"k":"p","t":"b3) Doanh nghiệp nước ngoài không có cơ sở thường trú tại Việt Nam, nộp thuế đối với thu nhập chịu thuế phát sinh tại Việt Nam;"},{"k":"p","t":"b4) Doanh nghiệp nước ngoài có cơ sở thường trú tại Việt Nam (không bao gồm doanh nghiệp nước ngoài quy định tại điểm b1 và điểm b2 khoản này) cung cấp hàng hóa, dịch vụ tại Việt Nam theo các hình thức kinh doanh thương mại điện tử, kinh doanh trên nền tảng số nộp thuế đối với thu nhập chịu thuế phát sinh tại Việt Nam;"},{"k":"p","t":"c) Các đơn vị sự nghiệp được thành lập theo quy định của pháp luật Việt Nam;"},{"k":"p","t":"d) Hợp tác xã, liên hiệp hợp tác xã được thành lập theo quy định của Luật Hợp tác xã;"},{"k":"p","t":"đ) Tổ chức kinh tế được thành lập và hoạt động theo quy định của Luật Các tổ chức tín dụng;"},{"k":"p","t":"e) Tổ chức khác ngoài tổ chức quy định tại các điểm a, b, c, d và đ khoản này có hoạt động sản xuất, kinh doanh có thu nhập chịu thuế theo quy định tại Điều 3 của Nghị định này;"},{"k":"p","t":"Doanh nghiệp được thành lập theo quy định của pháp luật Việt Nam quy định tại khoản này nộp thuế đối với thu nhập chịu thuế phát sinh tại Việt Nam và thu nhập chịu thuế phát sinh ngoài Việt Nam."},{"k":"p","t":"2. Tổ chức được thành lập và hoạt động (hoặc đăng ký hoạt động) theo quy định của pháp luật Việt Nam (bao gồm cả tổ chức quản lý sàn giao dịch thương mại điện tử, tổ chức quản lý nền tảng số) là người nộp thuế trong trường hợp nộp thuế thay khi bên Việt Nam mua dịch vụ (kể cả mua dịch vụ gắn với hàng hóa, mua hàng hóa được cung cấp, phân phối theo hình thức xuất khẩu, nhập khẩu tại chỗ hoặc theo các điều khoản thương mại quốc tế (Incoterms)), kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số, nhận chuyển nhượng vốn trên cơ sở hợp đồng với doanh nghiệp nước ngoài quy định tại các điểm b2, b3 và b4 khoản 1 Điều này; Công ty quản lý quỹ đầu tư chứng khoán là người nộp thuế thay cho nhà đầu tư khi Quỹ đầu tư chứng khoán chia lợi tức cho nhà đầu tư quy định tại khoản 3 Điều 14 và là người nộp thuế đối với thu nhập từ chuyển nhượng, cho thuê bất động sản của quỹ đầu tư bất động sản quy định tại khoản 6 Điều 15 của Nghị định này; trường hợp bên nhận chuyển nhượng vốn của doanh nghiệp nước ngoài là tổ chức, cá nhân nước ngoài thì người nộp thuế là doanh nghiệp thành lập theo pháp luật Việt Nam nơi các tổ chức nước ngoài đầu tư vốn."},{"k":"p","t":"3. Cơ sở thường trú của doanh nghiệp nước ngoài quy định tại điểm b khoản 1 Điều này là cơ sở sản xuất, kinh doanh mà thông qua cơ sở này, doanh nghiệp nước ngoài tiến hành một phần hoặc toàn bộ hoạt động sản xuất, kinh doanh tại Việt Nam, bao gồm:"},{"k":"p","t":"a) Chi nhánh, văn phòng điều hành, nhà máy, công xưởng, phương tiện vận tải, mỏ dầu, mỏ khí, mỏ hoặc địa điểm khai thác tài nguyên thiên nhiên khác tại Việt Nam;"},{"k":"p","t":"b) Địa điểm xây dựng, công trình xây dựng, lắp đặt, lắp ráp;"},{"k":"p","t":"c) Cơ sở cung cấp dịch vụ, bao gồm cả dịch vụ tư vấn thông qua người làm công hoặc tổ chức, cá nhân khác;"},{"k":"p","t":"d) Đại lý cho doanh nghiệp nước ngoài;"},{"k":"p","t":"đ) Đại diện tại Việt Nam trong trường hợp là đại diện có thẩm quyền ký kết hợp đồng đứng tên doanh nghiệp nước ngoài hoặc đại diện không có thẩm quyền ký kết hợp đồng đứng tên doanh nghiệp nước ngoài nhưng thường xuyên thực hiện việc giao hàng hóa hoặc cung ứng dịch vụ tại Việt Nam;"},{"k":"p","t":"e) Nền tảng thương mại điện tử, nền tảng số mà thông qua đó doanh nghiệp nước ngoài tiến hành cung cấp hàng hóa, dịch vụ tại Việt Nam."},{"k":"p","t":"Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"nd320_3","no":3,"code":"Điều 3","title":"Điều 3. Thu nhập chịu thuế","shortTitle":"Thu nhập chịu thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thu nhập để xác định thu nhập chịu thuế bao gồm thu nhập từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ quy định tại khoản 2 và thu nhập khác quy định tại khoản 3 Điều này."},{"k":"p","t":"2. Thu nhập từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ bao gồm:"},{"k":"p","t":"a) Thu nhập của doanh nghiệp từ ngành, nghề đã đăng ký kinh doanh, bao gồm cả ngành, nghề quy định tại khoản 2 Điều 3 Luật Thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b) Thu nhập từ hoạt động dầu khí và các khoản thu nhập khác có liên quan trực tiếp đến hoạt động dầu khí phát sinh trong kỳ tính thuế, được xác định theo từng hợp đồng dầu khí, Điều ước quốc tế và quy định tại các văn bản quy phạm pháp luật khác."},{"k":"p","t":"3. Thu nhập khác bao gồm:"},{"k":"p","t":"a) Thu nhập từ chuyển nhượng vốn, chuyển nhượng chứng khoán, chuyển nhượng quyền góp vốn quy định tại Điều 13 và Điều 14 của Nghị định này, không bao gồm: Khoản thu liên quan trực tiếp đến việc phát hành cổ phiếu và cổ tức của cổ phiếu (trừ cổ tức của cổ phiếu thuộc loại nợ phải trả), bán cổ phiếu quỹ, cổ phiếu mua lại của chính mình và các khoản thu khác liên quan trực tiếp đến việc tăng, giảm vốn chủ sở hữu của doanh nghiệp;"},{"k":"p","t":"b) Thu nhập từ chuyển nhượng bất động sản theo quy định tại các Điều 15, 16 và 17 của Nghị định này, trừ thu nhập từ chuyển nhượng bất động sản của doanh nghiệp kinh doanh bất động sản;"},{"k":"p","t":"c) Thu nhập từ chuyển nhượng dự án đầu tư, thu nhập từ chuyển nhượng quyền tham gia dự án đầu tư, thu nhập từ chuyển nhượng quyền thăm dò, khai thác, chế biến khoáng sản theo quy định của pháp luật;"},{"k":"p","t":"d) Thu nhập từ quyền sở hữu, quyền sử dụng tài sản, bao gồm cả tiền bản quyền dưới mọi hình thức trả cho quyền sở hữu, quyền sử dụng tài sản; thu nhập về quyền sở hữu trí tuệ; thu nhập từ chuyển giao công nghệ theo quy định của pháp luật."},{"k":"p","t":"Thu nhập từ quyền sở hữu trí tuệ, chuyển giao công nghệ được xác định bằng tổng số tiền thu được trừ đi giá vốn hoặc chi phí tạo ra quyền sở hữu trí tuệ, công nghệ được chuyển giao, chi phí duy trì, gia hạn, sửa đổi, nâng cấp, phát triển quyền sở hữu trí tuệ, công nghệ được chuyển giao và các khoản chi được trừ khác có liên quan đến quyền sở hữu trí tuệ, chuyển giao công nghệ;"},{"k":"p","t":"đ) Thu nhập từ cho thuê tài sản (trừ tài sản là bất động sản) dưới mọi hình thức."},{"k":"p","t":"Thu nhập từ cho thuê tài sản được xác định bằng doanh thu từ hoạt động cho thuê tài sản trừ đi các khoản chi: Chi phí khấu hao, duy tu, sửa chữa, bảo dưỡng tài sản, chi phí thuê tài sản để cho thuê lại (nếu có) và các chi được trừ khác có liên quan đến việc cho thuê tài sản;"},{"k":"p","t":"e) Thu nhập từ chuyển nhượng, thanh lý tài sản, trừ tài sản là bất động sản."},{"k":"p","t":"Thu nhập từ chuyển nhượng, thanh lý tài sản quy định tại điểm này được xác định bằng doanh thu thu được từ việc chuyển nhượng, thanh lý tài sản trừ đi giá trị còn lại của tài sản chuyển nhượng, thanh lý tại thời điểm chuyển nhượng, thanh lý và các khoản chi phí được trừ liên quan đến việc chuyển nhượng, thanh lý tài sản;"},{"k":"p","t":"g) Thu nhập từ lãi tiền gửi, lãi cho vay vốn, bán ngoại tệ (trừ thu nhập từ hoạt động cấp tín dụng, gửi tiền, kinh doanh ngoại tệ của tổ chức tín dụng), bao gồm:"},{"k":"p","t":"g1) Lãi tiền gửi tại các tổ chức tín dụng, lãi cho vay vốn dưới mọi hình thức theo quy định của pháp luật bao gồm cả tiền lãi trả chậm, lãi trả góp, phí bảo lãnh tín dụng và các khoản phí khác trong hợp đồng cho vay vốn;"},{"k":"p","t":"g2) Thu nhập từ hoạt động bán ngoại tệ được xác định bằng tổng số tiền thu từ bán ngoại tệ trừ đi tổng giá mua hoặc tổng giá vốn của số lượng ngoại tệ bán ra;"},{"k":"p","t":"h) Thu nhập từ chênh lệch tỷ giá trong kỳ tính thuế bao gồm khoản chênh lệch tỷ giá do đánh giá lại các khoản nợ phải trả có gốc ngoại tệ cuối kỳ tính thuế và khoản chênh lệch tỷ giá hối đoái phát sinh trong kỳ, cụ thể như sau:"},{"k":"p","t":"h1) Khoản chênh lệch tỷ giá phát sinh trong kỳ và chênh lệch tỷ giá do đánh giá lại các khoản nợ phải trả bằng ngoại tệ cuối kỳ tính thuế liên quan trực tiếp đến doanh thu, chi phí của hoạt động sản xuất, kinh doanh chính của doanh nghiệp được tính vào chi phí hoặc thu nhập của hoạt động sản xuất, kinh doanh chính của doanh nghiệp. Khoản chênh lệch tỷ giá phát sinh trong kỳ và chênh lệch tỷ giá do đánh giá lại các khoản nợ phải trả bằng ngoại tệ cuối kỳ tính thuế không liên quan trực tiếp đến doanh thu, chi phí của hoạt động sản xuất, kinh doanh chính của doanh nghiệp, nếu phát sinh lỗ chênh lệch tỷ giá thì tính vào chi phí tài chính, nếu phát sinh lãi chênh lệch tỷ giá thì tính vào thu nhập khác khi xác định thu nhập chịu thuế;"},{"k":"p","t":"h2) Chênh lệch tỷ giá hối đoái của các khoản mục có gốc ngoại tệ phát sinh trong kỳ được tính vào thu nhập là khoản chênh lệch giữa tỷ giá tại thời điểm phát sinh các khoản có gốc ngoại tệ với tỷ giá tại thời điểm ghi nhận ban đầu;"},{"k":"p","t":"h3) Các khoản chênh lệch tỷ giá hối đoái quy định tại điểm này không bao gồm chênh lệch tỷ giá hối đoái do đánh giá lại số dư cuối năm tài chính là: tiền mặt, tiền gửi, tiền đang chuyển, các khoản nợ phải thu có gốc ngoại tệ;"},{"k":"p","t":"i) Các khoản trích trước vào chi phí nhưng không sử dụng hoặc sử dụng không hết theo kỳ hạn trích lập mà doanh nghiệp không hạch toán điều chỉnh giảm chi phí;"},{"k":"p","t":"k) Khoản nợ khó đòi đã xóa nay đòi được; khoản nợ phải trả không xác định được chủ nợ; khoản thu nhập từ kinh doanh của những năm trước bị bỏ sót phát hiện ra;"},{"k":"p","t":"l) Chênh lệch giữa thu về tiền phạt, tiền bồi thường do vi phạm hợp đồng kinh tế hoặc thưởng do thực hiện tốt cam kết theo hợp đồng (không bao gồm các khoản tiền phạt, tiền bồi thường được ghi giảm giá trị công trình trong giai đoạn đầu tư hoặc đã được ghi giảm giá trị hàng hóa, dịch vụ mua về) trừ đi khoản bị phạt (trừ các khoản tiền phạt về vi phạm hành chính theo quy định của pháp luật về xử lý vi phạm hành chính), trả bồi thường do vi phạm hợp đồng theo quy định của pháp luật tính vào thu nhập khác. Trường hợp phát sinh chênh lệch âm thì giảm trừ vào thu nhập khác; trường hợp trong năm không phát sinh thu nhập khác thì được giảm trừ vào thu nhập hoạt động sản xuất, kinh doanh;"},{"k":"p","t":"m) Quà biếu, quà tặng bằng tiền, bằng hiện vật, quà tặng dưới dạng dịch vụ, hàng hóa không phải thanh toán; thu nhập nhận được bằng tiền, bằng hiện vật, quà tặng dưới dạng dịch vụ từ các nguồn tài trợ (trừ khoản hỗ trợ trực tiếp từ ngân sách nhà nước và từ Quỹ Hỗ trợ đầu tư do Chính phủ thành lập quy định tại khoản 8 Điều 4 của Nghị định này); thu nhập nhận được từ các khoản hỗ trợ tiếp thị, hỗ trợ chi phí, chiết khấu thanh toán, thưởng khuyến mại và các khoản hỗ trợ khác."},{"k":"p","t":"Giá trị của các khoản thu nhập nhận được bằng hiện vật, quà tặng dưới dạng dịch vụ, hàng hóa không phải thanh toán được xác định bằng giá trị của hàng hóa, dịch vụ cùng loại hoặc tương đương tại thời điểm nhận;"},{"k":"p","t":"n) Các khoản tiền, tài sản, lợi ích vật chất khác doanh nghiệp nhận được từ các tổ chức, cá nhân theo thỏa thuận, hợp đồng phù hợp với pháp luật dân sự do doanh nghiệp bàn giao lại vị trí đất cũ để di dời cơ sở sản xuất, kinh doanh sau khi trừ đi các khoản chi phí liên quan như chi phí di dời (chi phí vận chuyển, lắp đặt), giá trị còn lại của tài sản cố định và các chi phí khác (nếu có);"},{"k":"p","t":"o) Chênh lệch do đánh giá lại tài sản theo quy định của pháp luật để góp vốn, điều chuyển khi chia, tách, sáp nhập, hợp nhất, chuyển đổi loại hình doanh nghiệp (trừ trường hợp quy định tại khoản 9 Điều 4 của Nghị định này), được xác định cụ thể như sau:"},{"k":"p","t":"o1) Chênh lệch tăng hoặc giảm do đánh giá lại tài sản là phần chênh lệch giữa giá trị đánh giá lại với giá trị còn lại của tài sản ghi trên sổ sách kế toán và tính một lần vào thu nhập khác (đối với chênh lệch tăng) hoặc giảm trừ thu nhập khác (đối với chênh lệch giảm) trong kỳ tính thuế khi xác định thu nhập chịu thuế thu nhập doanh nghiệp tại doanh nghiệp có tài sản đánh giá lại khi thực hiện chia, tách, sáp nhập, hợp nhất, chuyển đổi loại hình doanh nghiệp, góp vốn;"},{"k":"p","t":"o2) Chênh lệch tăng hoặc giảm do đánh giá lại giá trị quyền sử dụng đất để: góp vốn (mà doanh nghiệp nhận giá trị quyền sử dụng đất được phân bổ dần giá trị đất vào chi phí được trừ), điều chuyển khi chia, tách, hợp nhất, sáp nhập, chuyển đổi loại hình doanh nghiệp; góp vốn vào các dự án đầu tư xây dựng nhà, hạ tầng để bán thì doanh nghiệp tính một lần vào thu nhập khác (đối với chênh lệch tăng) hoặc giảm trừ thu nhập khác (đối với chênh lệch giảm) trong kỳ tính thuế khi xác định thu nhập chịu thuế thu nhập doanh nghiệp."},{"k":"p","t":"Riêng chênh lệch tăng do đánh giá lại giá trị quyền sử dụng đất góp vốn vào doanh nghiệp để hình thành tài sản cố định thực hiện sản xuất, kinh doanh mà doanh nghiệp nhận giá trị quyền sử dụng đất không được trích khấu hao và không được phân bổ dần giá trị đất vào chi phí được trừ thì phần chênh lệch này được tính dần vào thu nhập khác của doanh nghiệp có quyền sử dụng đất đánh giá lại trong thời gian tối đa không quá 10 năm bắt đầu từ năm giá trị quyền sử dụng đất được đem góp vốn. Doanh nghiệp phải có thông báo số năm doanh nghiệp phân bổ vào thu nhập khác khi nộp hồ sơ khai quyết toán thuế thu nhập doanh nghiệp của năm bắt đầu kê khai khoản thu nhập này (năm có đánh giá lại giá trị quyền sử dụng đất đem góp vốn)."},{"k":"p","t":"Trường hợp sau khi góp vốn, doanh nghiệp tiếp tục thực hiện chuyển nhượng vốn góp bằng giá trị quyền sử dụng đất (bao gồm cả trường hợp chuyển nhượng vốn góp trước thời hạn 10 năm) thì thu nhập từ hoạt động chuyển nhượng vốn góp bằng giá trị quyền sử dụng đất phải tính và kê khai nộp thuế theo thu nhập chuyển nhượng bất động sản;"},{"k":"p","t":"o3) Doanh nghiệp nhận tài sản góp vốn, nhận tài sản điều chuyển khi chia, tách, hợp nhất, sáp nhập, chuyển đổi loại hình doanh nghiệp được trích khấu hao hoặc phân bổ dần vào chi phí theo giá trị đánh giá lại (trừ trường hợp giá trị quyền sử dụng đất không được trích khấu hao hoặc phân bổ vào chi phí theo quy định);"},{"k":"p","t":"p) Thu nhập từ hợp đồng hợp tác kinh doanh (BCC) được xác định bằng tổng doanh thu theo hợp đồng BCC trừ đi tổng chi phí liên quan đến việc tạo ra doanh thu của hợp đồng BCC."},{"k":"p","t":"p1) Trường hợp các bên tham gia hợp đồng BCC phân chia kết quả kinh doanh bằng doanh thu bán hàng hóa, dịch vụ thì doanh thu tính thuế là doanh thu của từng bên được chia theo hợp đồng;"},{"k":"p","t":"p2) Trường hợp các bên tham gia hợp đồng BCC phân chia kết quả kinh doanh bằng sản phẩm thì doanh thu tính thuế là doanh thu của sản phẩm được chia cho từng bên theo hợp đồng;"},{"k":"p","t":"p3) Trường hợp các bên tham gia hợp đồng BCC phân chia kết quả kinh doanh bằng lợi nhuận trước thuế, các bên tham gia hợp đồng BCC phải cử ra một bên làm đại diện có trách nhiệm xuất hóa đơn, ghi nhận doanh thu, chi phí, xác định lợi nhuận trước thuế thu nhập doanh nghiệp chia cho từng bên tham gia hợp đồng BCC. Mỗi bên tham gia hợp đồng BCC tự thực hiện nghĩa vụ thuế thu nhập doanh nghiệp của mình theo quy định;"},{"k":"p","t":"p4) Trường hợp các bên tham gia hợp đồng BCC phân chia kết quả kinh doanh bằng lợi nhuận sau thuế thu nhập doanh nghiệp, các bên tham gia hợp đồng BCC phải cử ra một bên làm đại diện có trách nhiệm xuất hóa đơn, ghi nhận doanh thu, chi phí và kê khai nộp thuế thu nhập doanh nghiệp thay cho các bên còn lại tham gia hợp đồng BCC;"},{"k":"p","t":"q) Các khoản thu nhập nhận được từ hoạt động sản xuất, kinh doanh ở nước ngoài là tổng các khoản thu nhập nhận được trước thuế thu nhập doanh nghiệp (hoặc một loại thuế có bản chất tương tự như thuế thu nhập doanh nghiệp);"},{"k":"p","t":"r) Thu nhập từ bán phế liệu, phế phẩm sau khi đã trừ chi phí thu hồi và chi phí tiêu thụ, được xác định cụ thể như sau:"},{"k":"p","t":"r1) Trường hợp doanh nghiệp phát sinh khoản thu nhập từ bán phế liệu, phế phẩm được tạo ra trong quá trình sản xuất của các sản phẩm thuộc ngành, nghề, địa bàn đang được hưởng ưu đãi thuế thu nhập doanh nghiệp thì khoản thu nhập này được hưởng ưu đãi thuế thu nhập doanh nghiệp;"},{"k":"p","t":"r2) Trường hợp doanh nghiệp phát sinh khoản thu nhập từ bán phế liệu, phế phẩm được tạo ra trong quá trình sản xuất của các sản phẩm không được hưởng ưu đãi thuế thu nhập doanh nghiệp thì khoản thu nhập này được tính vào thu nhập khác;"},{"k":"p","t":"s) Khoản tiền hoàn thuế xuất khẩu, thuế nhập khẩu của hàng hóa đã thực xuất khẩu, thực nhập khẩu phát sinh ngay trong năm quyết toán thuế thu nhập doanh nghiệp thì được tính giảm trừ chi phí trong năm quyết toán đó. Trường hợp khoản tiền hoàn thuế xuất khẩu, thuế nhập khẩu của hàng hóa đã thực xuất khẩu, thực nhập khẩu phát sinh của các năm quyết toán thuế thu nhập doanh nghiệp trước thì tính vào thu nhập khác của năm quyết toán phát sinh khoản thu nhập;"},{"k":"p","t":"t) Các khoản thu nhập từ các hoạt động góp vốn, mua cổ phần, liên doanh, liên kết trong nước được chia từ thu nhập trước khi nộp thuế thu nhập doanh nghiệp;"},{"k":"p","t":"u) Trường hợp doanh nghiệp thực hiện tiếp nhận thêm thành viên góp vốn mới theo quy định của pháp luật mà số tiền thành viên góp vốn mới bỏ ra cao hơn giá trị phần vốn góp của thành viên đó trong tổng số vốn điều lệ của doanh nghiệp thì xử lý như sau:"},{"k":"p","t":"u1) Nếu khoản chênh lệch cao hơn này được xác định là thuộc sở hữu của doanh nghiệp, bổ sung vào nguồn vốn sản xuất, kinh doanh thì không tính vào thu nhập chịu thuế để tính thuế thu nhập doanh nghiệp của doanh nghiệp nhận vốn góp;"},{"k":"p","t":"u2) Nếu khoản chênh lệch cao hơn này được chia cho các thành viên góp vốn cũ thì khoản chênh lệch này là thu nhập của các thành viên góp vốn cũ;"},{"k":"p","t":"v) Các khoản thu nhập khác theo quy định của pháp luật."},{"k":"p","t":"4. Thu nhập chịu thuế phát sinh tại Việt Nam của các doanh nghiệp nước ngoài quy định tại điểm c và điểm d khoản 2 Điều 2 Luật Thuế thu nhập doanh nghiệp là thu nhập nhận được có nguồn gốc từ Việt Nam từ hoạt động cung ứng dịch vụ, cung cấp và phân phối hàng hóa (kể cả hoạt động cung cấp hàng hóa, dịch vụ theo các hình thức kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số), cho vay vốn, tiền bản quyền cho tổ chức, cá nhân Việt Nam hoặc cho tổ chức, cá nhân nước ngoài đang kinh doanh tại Việt Nam không phụ thuộc vào địa điểm tiến hành kinh doanh; thu nhập từ chuyển nhượng vốn (trực tiếp hoặc gián tiếp), dự án đầu tư, quyền góp vốn, quyền tham gia các dự án đầu tư, quyền thăm dò, khai thác, chế biến khoáng sản tại Việt Nam không phụ thuộc vào địa điểm thực hiện việc chuyển nhượng."},{"k":"p","t":"Bộ trưởng Bộ Tài chính quy định chi tiết điểm b khoản 2 và khoản 4 Điều này."}]},{"id":"nd320_4","no":4,"code":"Điều 4","title":"Điều 4. Thu nhập được miễn thuế","shortTitle":"Thu nhập được miễn thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập được miễn thuế thực hiện theo quy định tại Điều 4 Luật Thuế thu nhập doanh nghiệp, bao gồm:"},{"k":"p","t":"1. Thu nhập từ hoạt động đánh bắt hải sản; thu nhập của doanh nghiệp từ sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, chế biến nông sản, thủy sản (kể cả trường hợp mua sản phẩm nông sản, thủy sản về chế biến, thuê gia công, nhận gia công chế biến) ở địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn; thu nhập của hợp tác xã, liên hiệp hợp tác xã từ sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, chế biến nông sản, thủy sản (kể cả trường hợp mua sản phẩm nông sản, thủy sản về chế biến, thuê gia công, nhận gia công chế biến), sản xuất muối."},{"k":"p","t":"a) Thu nhập từ sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được miễn thuế theo quy định tại Nghị định này là thu nhập từ sản phẩm do doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã tự trồng, chăn nuôi, nuôi trồng, kể cả thu nhập từ thanh lý các sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, thu nhập từ việc bán phế liệu, phế phẩm liên quan đến các sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng hoặc tự trồng, chăn nuôi, nuôi trồng sau đó sơ chế thông thường."},{"k":"p","t":"Sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng của hợp tác xã, liên hiệp hợp tác xã và của doanh nghiệp được xác định căn cứ theo mã ngành kinh tế cấp 1 của ngành nông nghiệp, lâm nghiệp và thủy sản quy định tại Hệ thống ngành kinh tế Việt Nam;"},{"k":"p","t":"b) Thu nhập của sản phẩm, hàng hóa chế biến từ nông sản, thủy sản được miễn thuế phải đáp ứng đồng thời các điều kiện sau:"},{"k":"p","t":"b1) Tỷ lệ giá trị nguyên vật liệu là nông sản, thủy sản trên chi phí sản xuất hàng hóa, sản phẩm (giá thành hàng hóa, sản phẩm) từ 30% trở lên."},{"k":"p","t":"Nguyên liệu đầu vào của hoạt động chế biến nông sản, thủy sản phải là nông sản, thủy sản chưa chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường (bao gồm cả phụ phẩm của quá trình sơ chế nông sản, thủy sản);"},{"k":"p","t":"b2) Sản phẩm, hàng hóa từ chế biến nông sản, thủy sản không thuộc diện chịu thuế tiêu thụ đặc biệt theo quy định của Luật Thuế tiêu thụ đặc biệt."},{"k":"p","t":"Trường hợp sản phẩm tươi sống và được đông lạnh đạt độ âm từ 18 độ C trở lên (lạnh hơn), sản phẩm chế biến từ sản phẩm tươi sống thành sản phẩm chín, sản phẩm chế biến từ nguyên liệu có pha trộn gia vị phụ liệu để ra hàng giá trị gia tăng cũng được coi là sản phẩm, hàng hóa thủy sản đã qua chế biến. Doanh nghiệp phải xác định riêng thu nhập của sản phẩm, hàng hóa chế biến từ nông sản, thủy sản để được miễn thuế thu nhập doanh nghiệp;"},{"k":"p","t":"c) Việc xác định sản phẩm chỉ qua sơ chế thông thường quy định tại khoản này thực hiện theo quy định tại Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"2. Thu nhập của hợp tác xã, liên hiệp hợp tác xã hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp ở địa bàn có điều kiện kinh tế - xã hội khó khăn hoặc ở địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn."},{"k":"p","t":"3. Thu nhập từ việc thực hiện dịch vụ kỹ thuật trực tiếp phục vụ nông nghiệp được miễn thuế gồm: Thu nhập từ dịch vụ tưới, tiêu nước, thoát lũ, ngăn lũ, ngăn triều cường, ngăn mặn, rửa mặn, rửa phèn, giữ ngọt; cày, bừa đất; nạo vét kênh, mương nội đồng; dịch vụ phòng trừ sâu, bệnh cho cây trồng, vật nuôi; dịch vụ thu hoạch sản phẩm nông nghiệp."},{"k":"p","t":"Các dịch vụ kỹ thuật quy định tại khoản này được xác định căn cứ theo mã ngành kinh tế cấp 1 của ngành nông nghiệp quy định tại Hệ thống ngành kinh tế Việt Nam."},{"k":"p","t":"4. Thu nhập từ việc thực hiện hợp đồng nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số, thu nhập từ bán sản phẩm làm ra từ công nghệ mới lần đầu tiên áp dụng ở Việt Nam, thu nhập từ bán sản phẩm sản xuất thử nghiệm trong thời gian sản xuất thử nghiệm bao gồm cả sản xuất thử nghiệm có kiểm soát theo quy định của pháp luật được miễn thuế 03 năm."},{"k":"p","t":"a) Thu nhập từ việc thực hiện hợp đồng nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về công nghiệp công nghệ số, pháp luật về chuyển đổi số được miễn thuế trong thời gian thực hiện hợp đồng nhưng tối đa không quá 03 năm kể từ khi có thu nhập từ thực hiện hợp đồng nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số;"},{"k":"p","t":"b) Thu nhập từ bán sản phẩm làm ra từ công nghệ mới lần đầu tiên áp dụng ở Việt Nam được miễn thuế 03 năm kể từ khi có thu nhập từ bán sản phẩm."},{"k":"p","t":"Sản phẩm làm ra từ công nghệ mới lần đầu tiên được áp dụng tại Việt Nam được miễn thuế phải đảm bảo công nghệ mới lần đầu tiên áp dụng tại Việt Nam được cơ quan có thẩm quyền xác nhận;"},{"k":"p","t":"c) Thu nhập từ bán sản phẩm sản xuất thử nghiệm trong thời gian sản xuất thử nghiệm bao gồm cả sản xuất thử nghiệm có kiểm soát theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo được miễn thuế 03 năm kể từ khi có thu nhập từ bán sản phẩm sản xuất thử nghiệm."},{"k":"p","t":"Sản phẩm sản xuất thử nghiệm được miễn thuế phải được cơ quan có thẩm quyền xác nhận."},{"k":"p","t":"5. Thu nhập từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ của doanh nghiệp có từ 30% số lao động bình quân trong năm trở lên là người khuyết tật, người sau cai nghiện ma túy, người nhiễm vi rút gây ra hội chứng suy giảm miễn dịch mắc phải ở người (HIV/AIDS) và có số lao động bình quân trong năm từ 20 người trở lên, không bao gồm doanh nghiệp hoạt động trong lĩnh vực tài chính, kinh doanh bất động sản."},{"k":"p","t":"a) Doanh nghiệp được miễn thuế quy định tại khoản này đáp ứng các điều kiện sau:"},{"k":"p","t":"a1) Đối với doanh nghiệp có sử dụng lao động là người khuyết tật (bao gồm cả thương binh, bệnh binh), lao động là người nhiễm HIV/AIDS thì lao động là người khuyết tật, người nhiễm HIV/AIDS phải có xác nhận của cơ quan y tế có thẩm quyền;"},{"k":"p","t":"a2) Đối với doanh nghiệp có sử dụng lao động là người sau cai nghiện ma túy thì lao động là người sau cai nghiện ma túy phải có giấy chứng nhận hoàn thành cai nghiện của các cơ sở cai nghiện hoặc xác nhận của cơ quan có thẩm quyền liên quan;"},{"k":"p","t":"b) Thu nhập được miễn thuế quy định tại khoản này không bao gồm thu nhập khác quy định tại khoản 3 Điều 3 của Nghị định này."},{"k":"p","t":"6. Thu nhập từ hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp dành riêng cho người dân tộc thiểu số, người khuyết tật, trẻ em có hoàn cảnh đặc biệt, đối tượng tệ nạn xã hội, trong đó:"},{"k":"p","t":"a) Cơ sở giáo dục nghề nghiệp, đào tạo nghề nghiệp được miễn thuế theo quy định tại khoản này là cơ sở được thành lập theo quy định của pháp luật về giáo dục nghề nghiệp, đào tạo nghề nghiệp và có danh sách các học viên là người dân tộc thiểu số, người khuyết tật, trẻ em có hoàn cảnh đặc biệt, đối tượng tệ nạn xã hội;"},{"k":"p","t":"b) Trường hợp cơ sở giáo dục nghề nghiệp, đào tạo nghề nghiệp thực hiện hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp cho cả các đối tượng khác thì phần thu nhập được miễn thuế được xác định theo tỷ lệ giữa số người dân tộc thiểu số, người khuyết tật, trẻ em có hoàn cảnh đặc biệt, đối tượng tệ nạn xã hội so với tổng số người học của cơ sở."},{"k":"p","t":"7. Thu nhập được chia từ hoạt động góp vốn, mua cổ phần, liên doanh, liên kết kinh tế với doanh nghiệp trong nước, sau khi bên nhận góp vốn, liên doanh, liên kết đã nộp thuế theo quy định của Luật Thuế thu nhập doanh nghiệp, kể cả trường hợp bên nhận góp vốn, bên phát hành cổ phiếu, bên liên doanh, liên kết được hưởng ưu đãi thuế thu nhập doanh nghiệp."},{"k":"p","t":"8. Khoản tài trợ nhận được để sử dụng cho hoạt động giáo dục, văn hóa, nghệ thuật, từ thiện, nhân đạo và hoạt động xã hội khác tại Việt Nam; khoản tài trợ nhận được từ doanh nghiệp không có mối quan hệ liên kết, tổ chức, cá nhân trong nước và ngoài nước để sử dụng cho hoạt động nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số; khoản hỗ trợ trực tiếp từ ngân sách nhà nước và từ Quỹ Hỗ trợ đầu tư do Chính phủ thành lập; khoản bồi thường của Nhà nước theo quy định của pháp luật."},{"k":"p","t":"a) Tổ chức nhận tài trợ quy định tại khoản này là tổ chức được thành lập và hoạt động theo quy định của pháp luật."},{"k":"p","t":"Doanh nghiệp có mối quan hệ liên kết quy định tại khoản này thực hiện theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"b) Khoản tài trợ cho hoạt động nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số thực hiện theo pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về công nghiệp công nghệ số và pháp luật về chuyển đổi số;"},{"k":"p","t":"c) Khoản hỗ trợ trực tiếp từ ngân sách nhà nước là khoản hỗ trợ từ ngân sách nhà nước các cấp theo quy định của pháp luật về ngân sách nhà nước;"},{"k":"p","t":"d) Khoản bồi thường của Nhà nước quy định tại khoản này được xác định theo pháp luật về trách nhiệm bồi thường của Nhà nước và khoản bồi thường của Nhà nước theo quy định của pháp luật khác;"},{"k":"p","t":"đ) Quỹ Hỗ trợ đầu tư quy định tại khoản này là Quỹ được thành lập, quản lý và sử dụng theo quy định tại Nghị định số 182/2024/NĐ-CP ngày 31 tháng 12 năm 2024 của Chính phủ về thành lập, quản lý và sử dụng Quỹ Hỗ trợ đầu tư;"},{"k":"p","t":"e) Trường hợp khoản tài trợ, hỗ trợ nhận được tại khoản này mà doanh nghiệp sử dụng không đúng mục đích thì bị truy thu thuế và xử phạt vi phạm theo quy định của pháp luật."},{"k":"p","t":"9. Khoản chênh lệch do đánh giá lại tài sản theo quy định của pháp luật để cổ phần hóa, sắp xếp lại doanh nghiệp do nhà nước nắm giữ 100% vốn điều lệ."},{"k":"p","t":"a) Doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ thực hiện cổ phần hóa, sắp xếp lại theo quy định của pháp luật về quản lý và đầu tư vốn nhà nước tại doanh nghiệp;"},{"k":"p","t":"b) Khoản chênh lệch do đánh giá lại tài sản quy định tại khoản này được ghi tăng vào phần vốn của Nhà nước tại doanh nghiệp;"},{"k":"p","t":"c) Doanh nghiệp sau cổ phần hóa, sắp xếp lại được trích khấu hao hoặc phân bổ dần vào chi phí theo giá trị đánh giá lại."},{"k":"p","t":"10. Thu nhập từ chuyển nhượng chứng chỉ giảm phát thải, chuyển nhượng tín chỉ các-bon lần đầu của doanh nghiệp được cấp chứng chỉ giảm phát thải, tín chỉ các-bon; thu nhập từ tiền lãi trái phiếu xanh; thu nhập từ chuyển nhượng trái phiếu xanh lần đầu sau khi phát hành, trong đó:"},{"k":"p","t":"a) Thu nhập từ chuyển nhượng chứng chỉ giảm phát thải, chuyển nhượng tín chỉ các-bon quy định tại khoản này là thu nhập của doanh nghiệp được cấp chứng chỉ giảm phát thải, tín chỉ các-bon;"},{"k":"p","t":"b) Thu nhập từ chuyển nhượng trái phiếu xanh lần đầu sau khi phát hành quy định tại khoản này là thu nhập từ chuyển nhượng trái phiếu xanh mà doanh nghiệp trực tiếp mua của tổ chức phát hành trái phiếu xanh."},{"k":"p","t":"11. Thu nhập (bao gồm cả lãi tiền gửi ngân hàng, lãi trái phiếu Chính phủ, lãi tín phiếu kho bạc) từ thực hiện nhiệm vụ Nhà nước giao trong các trường hợp sau:"},{"k":"p","t":"a) Thu nhập của Ngân hàng Phát triển Việt Nam trong hoạt động tín dụng đầu tư phát triển, tín dụng xuất khẩu, bao gồm: Tín dụng đầu tư, tín dụng xuất khẩu của Nhà nước; bảo lãnh tín dụng và các khoản tín dụng khác do cơ quan có thẩm quyền của Nhà nước giao;"},{"k":"p","t":"b) Thu nhập của Ngân hàng Chính sách xã hội từ hoạt động tín dụng cho người nghèo và các đối tượng chính sách khác;"},{"k":"p","t":"c) Thu nhập của Công ty trách nhiệm hữu hạn một thành viên quản lý tài sản của các tổ chức tín dụng Việt Nam;"},{"k":"p","t":"d) Thu nhập từ hoạt động có thu của Quỹ Bảo hiểm xã hội Việt Nam, tổ chức bảo hiểm tiền gửi, Quỹ Bảo hiểm y tế, Quỹ hỗ trợ học nghề, Quỹ hỗ trợ việc làm ngoài nước, Quỹ hỗ trợ nông dân, Quỹ trợ giúp pháp lý Việt Nam, Quỹ viễn thông công ích, Quỹ đầu tư phát triển địa phương, Quỹ Bảo vệ môi trường Việt Nam, Quỹ bảo lãnh tín dụng cho doanh nghiệp nhỏ và vừa, Quỹ hỗ trợ phát triển Hợp tác xã, Quỹ hỗ trợ phụ nữ nghèo, Quỹ bảo hộ công dân và pháp nhân tại nước ngoài, Quỹ phát triển nhà, Quỹ phát triển doanh nghiệp nhỏ và vừa, Quỹ phát triển khoa học và công nghệ của bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ, tỉnh, thành phố hoặc Quỹ phát triển khoa học, công nghệ và đổi mới sáng tạo của bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ, cơ quan khác ở trung ương, Ủy ban nhân dân cấp tỉnh, Quỹ đầu tư mạo hiểm quốc gia, Quỹ đầu tư mạo hiểm của địa phương được thành lập theo quy định của Luật Khoa học, công nghệ và đổi mới sáng tạo, Quỹ trợ vốn cho người lao động nghèo tự tạo việc làm, Quỹ phát triển đất, Quỹ công nghiệp quốc phòng, an ninh, Quỹ chính sách, đối ngoại quốc phòng, Quỹ Hỗ trợ đầu tư, Quỹ hỗ trợ xây dựng chính sách, pháp luật và quỹ, tổ chức khác của Nhà nước hoạt động không vì mục tiêu lợi nhuận do Chính phủ, Thủ tướng Chính phủ quy định hoặc quyết định."},{"k":"p","t":"Trường hợp các Quỹ, tổ chức nêu trên phát sinh các khoản thu nhập khác ngoài các khoản thu nhập từ hoạt động có thu do thực hiện nhiệm vụ Nhà nước giao thì phải tính và nộp thuế theo quy định."},{"k":"p","t":"12. Phần thu nhập không chia của cơ sở thực hiện xã hội hóa trong lĩnh vực giáo dục - đào tạo, y tế và lĩnh vực xã hội hóa khác để lại để đầu tư phát triển cơ sở đó; phần thu nhập hình thành quỹ chung không chia, tài sản chung không chia của hợp tác xã, liên hiệp hợp tác xã được thành lập và hoạt động theo quy định của Luật Hợp tác xã."},{"k":"p","t":"a) Phần thu nhập không chia của cơ sở thực hiện xã hội hóa được miễn thuế quy định tại khoản này phải đáp ứng tỷ lệ phần thu nhập không chia trên thu nhập tính thuế tối thiểu là 25%;"},{"k":"p","t":"b) Cơ sở thực hiện xã hội hóa quy định tại khoản này bao gồm:"},{"k":"p","t":"b1) Các cơ sở ngoài công lập được thành lập và có đủ điều kiện hoạt động theo quy định của cơ quan có thẩm quyền trong các lĩnh vực xã hội hóa;"},{"k":"p","t":"b2) Các doanh nghiệp được thành lập để hoạt động trong các lĩnh vực xã hội hóa và có đủ điều kiện hoạt động theo quy định của cơ quan có thẩm quyền;"},{"k":"p","t":"b3) Các đơn vị sự nghiệp công lập thực hiện góp vốn, huy động vốn, liên doanh, liên kết theo quy định của pháp luật thành lập các cơ sở hạch toán độc lập hoặc doanh nghiệp hoạt động trong các lĩnh vực xã hội hóa theo quyết định của cơ quan có thẩm quyền."},{"k":"p","t":"Cơ sở xã hội hóa phải đáp ứng danh mục loại hình, tiêu chí quy mô, tiêu chuẩn theo danh mục do Thủ tướng Chính phủ quy định;"},{"k":"p","t":"c) Trường hợp phần thu nhập không chia để lại theo quy định tại khoản này mà các đơn vị có chia hoặc chi sai mục đích sẽ bị truy thu thuế và xử phạt vi phạm theo quy định của pháp luật."},{"k":"p","t":"13. Thu nhập từ chuyển giao công nghệ thuộc lĩnh vực ưu tiên chuyển giao cho tổ chức, cá nhân ở địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn."},{"k":"p","t":"a) Quy định về chuyển giao công nghệ tại khoản này và khoản 3 Điều 21 của Nghị định này thực hiện theo quy định của pháp luật về chuyển giao công nghệ và pháp luật khác có liên quan;"},{"k":"p","t":"b) Lĩnh vực ưu tiên chuyển giao công nghệ là các công nghệ thuộc danh mục công nghệ khuyến khích chuyển giao theo quy định của pháp luật về chuyển giao công nghệ;"},{"k":"p","t":"c) Địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định tại điểm a khoản 3 Điều 18 của Nghị định này."},{"k":"p","t":"14. Thu nhập của đơn vị sự nghiệp công lập từ cung cấp dịch vụ sự nghiệp công, bao gồm:"},{"k":"p","t":"a) Dịch vụ sự nghiệp công cơ bản, thiết yếu thuộc danh mục dịch vụ sự nghiệp công sử dụng ngân sách nhà nước;"},{"k":"p","t":"b) Dịch vụ sự nghiệp công mà Nhà nước phải hỗ trợ, đảm bảo kinh phí hoạt động do chưa tính đủ chi phí cung cấp dịch vụ trong giá dịch vụ;"},{"k":"p","t":"c) Dịch vụ sự nghiệp công tại địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn;"},{"k":"p","t":"d) Đơn vị sự nghiệp công lập quy định tại khoản này là tổ chức được thành lập theo quyết định của cơ quan có thẩm quyền;"},{"k":"p","t":"đ) Dịch vụ sự nghiệp công, dịch vụ sự nghiệp công cơ bản, thiết yếu, dịch vụ sự nghiệp công mà Nhà nước phải hỗ trợ, đảm bảo kinh phí hoạt động do chưa tính đủ chi phí quy định tại khoản này được xác định theo Nghị định số 60/2021/NĐ-CP ngày 21 tháng 6 năm 2021 của Chính phủ quy định cơ chế tự chủ tài chính của đơn vị sự nghiệp công lập (đã được sửa đổi, bổ sung bởi Nghị định số 111/2025/NĐ-CP ngày 22 tháng 5 năm 2025 của Chính phủ)."}]},{"id":"nd320_5","no":5,"code":"Điều 5","title":"Điều 5. Căn cứ tính thuế","shortTitle":"Căn cứ tính thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Căn cứ tính thuế là thu nhập tính thuế trong kỳ tính thuế và thuế suất."},{"k":"p","t":"2. Kỳ tính thuế thực hiện theo quy định tại Điều 5 Luật Thuế thu nhập doanh nghiệp và quy định của pháp luật quản lý thuế."}]},{"id":"nd320_6","no":6,"code":"Điều 6","title":"Điều 6. Thu nhập chịu thuế và bù trừ thu nhập chịu thuế trong kỳ tính thuế","shortTitle":"Thu nhập chịu thuế và bù trừ thu nhập chịu thuế trong kỳ tính thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có nhiều hoạt động sản xuất, kinh doanh trong kỳ tính thuế thì thu nhập chịu thuế từ hoạt động sản xuất, kinh doanh là tổng thu nhập của tất cả các hoạt động sản xuất, kinh doanh."},{"k":"p","t":"2. Trường hợp doanh nghiệp có hoạt động sản xuất, kinh doanh bị lỗ thì được bù trừ số lỗ vào thu nhập chịu thuế của các hoạt động sản xuất, kinh doanh có thu nhập do doanh nghiệp tự lựa chọn, trừ trường hợp quy định tại khoản 3 và khoản 4 Điều này."},{"k":"p","t":"Phần thu nhập chịu thuế còn lại sau khi bù trừ áp dụng mức thuế suất thuế thu nhập doanh nghiệp của hoạt động sản xuất, kinh doanh còn thu nhập."},{"k":"p","t":"3. Trường hợp doanh nghiệp có hoạt động chuyển nhượng bất động sản, chuyển nhượng dự án đầu tư, chuyển nhượng quyền tham gia dự án đầu tư bị lỗ thì không bù trừ với thu nhập chịu thuế của hoạt động sản xuất, kinh doanh đang được hưởng ưu đãi thuế có thu nhập."},{"k":"p","t":"4. Thu nhập chịu thuế từ hoạt động chuyển nhượng dự án đầu tư thăm dò, khai thác, chế biến khoáng sản; chuyển nhượng quyền tham gia dự án đầu tư thăm dò, khai thác, chế biến khoáng sản; chuyển nhượng quyền thăm dò, khai thác, chế biến khoáng sản phải xác định riêng để kê khai nộp thuế, không được bù trừ lỗ, lãi với hoạt động sản xuất, kinh doanh trong kỳ tính thuế."}]},{"id":"nd320_7","no":7,"code":"Điều 7","title":"Điều 7. Xác định lỗ và chuyển lỗ","shortTitle":"Xác định lỗ và chuyển lỗ","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Lỗ phát sinh trong kỳ tính thuế là số chênh lệch âm về thu nhập tính thuế chưa bao gồm các khoản lỗ được kết chuyển từ các năm trước chuyển sang."},{"k":"p","t":"2. Doanh nghiệp sau khi quyết toán thuế mà bị lỗ thì chuyển toàn bộ và liên tục số lỗ vào thu nhập chịu thuế những năm tiếp theo. Thời gian chuyển lỗ tính liên tục không quá 05 năm, kể từ năm tiếp theo năm phát sinh lỗ."},{"k":"p","t":"Doanh nghiệp tạm thời chuyển lỗ vào thu nhập của các quý của năm khi xác định số thuế tạm nộp theo quý và chuyển chính thức vào năm khi lập tờ khai quyết toán thuế năm. Việc chuyển lỗ trong một số trường hợp cụ thể như sau:"},{"k":"p","t":"a) Doanh nghiệp có số lỗ giữa các quý trong cùng một năm thì được bù trừ số lỗ của quý trước vào các quý tiếp theo của năm đó. Khi quyết toán thuế thu nhập doanh nghiệp, doanh nghiệp xác định số lỗ của cả năm và chuyển toàn bộ và liên tục số lỗ vào thu nhập chịu thuế của những năm tiếp theo năm phát sinh lỗ theo quy định nêu trên;"},{"k":"p","t":"b) Doanh nghiệp tự xác định số lỗ được trừ vào thu nhập chịu thuế theo quy định tại Nghị định này. Trường hợp trong thời gian chuyển lỗ có phát sinh tiếp số lỗ thì số lỗ phát sinh này (không bao gồm số lỗ của kỳ trước chuyển sang) sẽ được chuyển lỗ toàn bộ và liên tục không quá 05 năm, kể từ năm tiếp theo năm phát sinh lỗ này."},{"k":"p","t":"b1) Trường hợp cơ quan có thẩm quyền kiểm tra, thanh tra quyết toán thuế thu nhập doanh nghiệp xác định số lỗ doanh nghiệp được chuyển khác với số lỗ do doanh nghiệp tự xác định thì số lỗ được chuyển xác định theo kết luận của cơ quan kiểm tra, thanh tra nhưng đảm bảo chuyển lỗ toàn bộ và liên tục không quá 05 năm, kể từ năm tiếp theo năm phát sinh lỗ theo quy định;"},{"k":"p","t":"b2) Quá thời hạn 05 năm kể từ năm tiếp theo năm phát sinh lỗ, nếu số lỗ phát sinh chưa chuyển hết thì sẽ không được chuyển vào thu nhập của các năm tiếp theo."},{"k":"p","t":"3. Doanh nghiệp có lỗ từ hoạt động chuyển nhượng dự án thăm dò, khai thác khoáng sản; chuyển nhượng quyền tham gia dự án thăm dò, khai thác, chế biến khoáng sản; chuyển nhượng quyền thăm dò, khai thác, chế biến khoáng sản được chuyển lỗ sang năm sau vào thu nhập chịu thuế của hoạt động đó. Thời gian chuyển lỗ tính liên tục không quá 05 năm, kể từ năm tiếp theo năm phát sinh lỗ."},{"k":"p","t":"4. Doanh nghiệp chuyển đổi loại hình doanh nghiệp, chuyển đổi chủ sở hữu, sáp nhập, hợp nhất, chia, tách sau khi thực hiện quyết toán thuế theo quy định mà có lỗ thì số lỗ của doanh nghiệp phải được theo dõi chi tiết theo năm phát sinh và bù trừ vào thu nhập cùng năm của doanh nghiệp sau khi chuyển đổi, sáp nhập, hợp nhất hoặc được tiếp tục chuyển lỗ vào các năm tiếp theo của doanh nghiệp sau khi chuyển đổi, sáp nhập, hợp nhất để đảm bảo nguyên tắc chuyển lỗ tính liên tục không quá 05 năm, kể từ năm tiếp theo năm phát sinh lỗ và quy định tại khoản 4 Điều 25 của Nghị định này."},{"k":"p","t":"Số lỗ của doanh nghiệp phát sinh trước khi chia, tách thành doanh nghiệp khác và đang còn trong thời gian chuyển lỗ theo quy định thì số lỗ này sẽ được phân bổ cho các doanh nghiệp sau khi chia, tách theo tỷ lệ vốn chủ sở hữu được chia, tách."}]},{"id":"nd320_8","no":8,"code":"Điều 8","title":"Điều 8. Doanh thu","shortTitle":"Doanh thu","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Doanh thu để tính thu nhập chịu thuế thực hiện theo quy định tại Điều 8 Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"1. Doanh thu để tính thu nhập chịu thuế là toàn bộ tiền bán hàng, tiền gia công, tiền cung ứng dịch vụ kể cả trợ giá, phụ thu, phụ trội mà doanh nghiệp được hưởng, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"a) Đối với doanh nghiệp kê khai, nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế thì doanh thu tính thuế thu nhập doanh nghiệp là doanh thu không có thuế giá trị gia tăng;"},{"k":"p","t":"b) Đối với doanh nghiệp kê khai, nộp thuế giá trị gia tăng theo phương pháp trực tiếp trên giá trị gia tăng thì doanh thu tính thuế thu nhập doanh nghiệp bao gồm cả thuế giá trị gia tăng."},{"k":"p","t":"2. Thời điểm xác định doanh thu"},{"k":"p","t":"a) Đối với hoạt động bán hàng hóa là thời điểm chuyển giao quyền sở hữu, quyền sử dụng hàng hóa cho người mua;"},{"k":"p","t":"b) Đối với hoạt động cung ứng dịch vụ là thời điểm hoàn thành việc cung ứng dịch vụ hoặc hoàn thành từng phần việc cung ứng dịch vụ cho người mua trừ trường hợp nêu tại khoản 3 Điều này;"},{"k":"p","t":"c) Bộ trưởng Bộ Tài chính quy định thời điểm xác định doanh thu ngoài các trường hợp quy định tại điểm a và điểm b khoản này."},{"k":"p","t":"3. Doanh thu để tính thu nhập chịu thuế đối với một số trường hợp được quy định cụ thể như sau:"},{"k":"p","t":"a) Đối với hoạt động gia công hàng hóa là tiền thu về hoạt động gia công bao gồm cả tiền công, chi phí về nhiên liệu, động lực, vật liệu phụ và chi phí khác phục vụ cho việc gia công hàng hóa;"},{"k":"p","t":"b) Đối với hàng hóa, dịch vụ bán theo phương thức trả góp, trả chậm là tiền bán hàng hóa, dịch vụ trả tiền một lần, không bao gồm tiền lãi trả góp, tiền lãi trả chậm;"},{"k":"p","t":"c) Đối với hàng hóa của các đơn vị giao đại lý và nhận đại lý theo hợp đồng đại lý bán đúng giá hưởng hoa hồng được xác định như sau:"},{"k":"p","t":"c1) Doanh nghiệp giao hàng hóa cho các đại lý (kể cả đại lý bán hàng đa cấp) là tổng số tiền bán hàng hóa;"},{"k":"p","t":"c2) Doanh nghiệp nhận làm đại lý bán hàng đúng giá quy định của doanh nghiệp giao đại lý là tiền hoa hồng được hưởng theo hợp đồng đại lý;"},{"k":"p","t":"d) Đối với hàng hóa, dịch vụ dùng để trao đổi, tiêu dùng nội bộ (không bao gồm hàng hóa, dịch vụ sử dụng để tiếp tục quá trình sản xuất, kinh doanh của doanh nghiệp) được xác định theo giá bán của sản phẩm, hàng hóa, dịch vụ cùng loại hoặc tương đương trên thị trường tại thời điểm trao đổi, tiêu dùng nội bộ;"},{"k":"p","t":"đ) Đối với hoạt động cho thuê tài sản là số tiền bên thuê trả từng kỳ theo hợp đồng thuê. Trường hợp bên thuê trả tiền trước cho nhiều năm thì doanh nghiệp căn cứ điều kiện thực hiện chế độ kế toán, hóa đơn chứng từ thực tế và việc xác định chi phí, có thể lựa chọn một trong hai phương pháp xác định doanh thu để tính thu nhập chịu thuế như sau: Là số tiền cho thuê tài sản của từng năm được xác định bằng số tiền trả trước chia cho số năm trả tiền trước hoặc là toàn bộ số tiền cho thuê tài sản của số năm trả tiền trước."},{"k":"p","t":"Trường hợp doanh nghiệp đang trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp lựa chọn phương pháp xác định doanh thu để tính thu nhập chịu thuế là toàn bộ số tiền thuê bên thuê trả trước cho nhiều năm thì việc xác định số thuế thu nhập doanh nghiệp từng năm/kỳ ưu đãi thuế căn cứ vào tổng số thuế thu nhập doanh nghiệp của số năm trả tiền trước chia cho số năm bên thuê trả tiền trước;"},{"k":"p","t":"e) Đối với hoạt động kinh doanh sân gôn là tiền bán thẻ hội viên, bán vé chơi gôn và các khoản thu khác trong kỳ tính thuế được xác định như sau:"},{"k":"p","t":"e1) Đối với hình thức bán vé, bán thẻ chơi gôn theo ngày, doanh thu kinh doanh sân gôn làm căn cứ xác định thu nhập tính thuế thu nhập doanh nghiệp là số tiền thu được từ bán vé, bán thẻ và các khoản thu khác phát sinh trong kỳ tính thuế;"},{"k":"p","t":"e2) Đối với hình thức bán vé, bán thẻ hội viên loại thẻ trả trước cho nhiều năm, doanh thu làm căn cứ xác định thu nhập tính thuế thu nhập doanh nghiệp của từng năm là số tiền bán thẻ và các khoản thu khác thực thu được chia cho số năm sử dụng thẻ hoặc xác định theo doanh thu trả tiền một lần;"},{"k":"p","t":"g) Đối với hoạt động kinh doanh dịch vụ khác mà khách hàng trả tiền trước cho nhiều năm là số tiền bên mua dịch vụ trả từng năm theo hợp đồng. Trường hợp bên mua dịch vụ trả tiền trước cho nhiều năm thì doanh thu để tính thu nhập chịu thuế được phân bổ đều cho số năm trả tiền trước hoặc xác định theo doanh thu trả tiền một lần. Trường hợp doanh nghiệp đang trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp, việc xác định số thuế được ưu đãi phải căn cứ vào tổng số thuế thu nhập doanh nghiệp phải nộp của số năm thu tiền trước chia cho số năm thu tiền trước;"},{"k":"p","t":"h) Đối với hoạt động ngân hàng, chứng khoán (bao gồm cả chứng khoán phái sinh), bảo hiểm, việc xác định doanh thu thực hiện theo quy định đối với pháp luật về chế độ tài chính của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, pháp luật về chứng khoán và pháp luật về bảo hiểm."},{"k":"p","t":"Đối với dịch vụ tài chính phái sinh, việc xác định doanh thu thực hiện theo quy định của pháp luật về kế toán và pháp luật khác có liên quan (nếu có);"},{"k":"p","t":"i) Đối với hoạt động vận tải là toàn bộ doanh thu vận chuyển hành khách, hàng hóa, hành lý phát sinh trong kỳ tính thuế;"},{"k":"p","t":"k) Đối với hoạt động xây dựng, lắp đặt là giá trị công trình, giá trị hạng mục công trình hoặc giá trị khối lượng công trình xây dựng, lắp đặt nghiệm thu;"},{"k":"p","t":"k1) Trường hợp xây dựng, lắp đặt có bao thầu nguyên vật liệu, máy móc, thiết bị là số tiền từ hoạt động xây dựng, lắp đặt bao gồm cả giá trị nguyên vật liệu, máy móc, thiết bị;"},{"k":"p","t":"k2) Trường hợp xây dựng, lắp đặt không bao thầu nguyên vật liệu, máy móc, thiết bị là số tiền từ hoạt động xây dựng, lắp đặt không bao gồm giá trị nguyên vật liệu, máy móc, thiết bị;"},{"k":"p","t":"l) Đối với hoạt động kinh doanh dưới hình thức hợp đồng BCC là số tiền bán hàng hóa, dịch vụ theo hợp đồng;"},{"k":"p","t":"l1) Trường hợp các bên tham gia hợp đồng BCC phân chia kết quả kinh doanh bằng doanh thu bán hàng hóa, dịch vụ thì doanh thu tính thuế là doanh thu của từng bên được chia theo hợp đồng;"},{"k":"p","t":"l2) Trường hợp các bên tham gia hợp đồng BCC phân chia kết quả kinh doanh bằng sản phẩm thì doanh thu tính thuế là doanh thu của sản phẩm được chia cho từng bên theo hợp đồng;"},{"k":"p","t":"m) Đối với hoạt động tìm kiếm, thăm dò và khai thác dầu thô, khí thiên nhiên là toàn bộ giá trị của sản lượng dầu thô, khí thiên nhiên thực được bán tại điểm giao nhận quy định trong hợp đồng dầu khí mà ở đó dầu thô, khí thiên nhiên được chuyển giao quyền sở hữu cho các bên tham gia hợp đồng dầu khí, theo giao dịch sòng phẳng của hợp đồng mua bán dầu thô và hợp đồng mua bán khí thiên nhiên trong kỳ tính thuế (không bao gồm thuế giá trị gia tăng)."},{"k":"p","t":"m1) Trường hợp dầu thô được bán không theo giao dịch sòng phẳng thì doanh thu từ hoạt động khai thác dầu thô được xác định bằng cách lấy khối lượng phần dầu thô nhân với giá bán trung bình cộng của tháng xuất bán dầu thô của dầu thô cùng loại hoặc tương đương trên thị trường quốc tế. Người nộp thuế có trách nhiệm cung cấp cho cơ quan thuế các thông tin về thành phần, chất lượng của dầu thô đang khai thác. Khi cần thiết, cơ quan thuế tham khảo giá bán trên thị trường Mỹ (WTI), thị trường Anh (Brent) hay thị trường Singapore (Plátt’s) hoặc tham khảo ý kiến cơ quan nhà nước có thẩm quyền về việc xác định giá dầu thô đang khai thác của người nộp thuế;"},{"k":"p","t":"m2) Giao dịch sòng phẳng thực hiện theo quy định của pháp luật dầu khí;"},{"k":"p","t":"n) Đối với hoạt động kinh doanh trò chơi có thưởng (casino, trò chơi điện tử có thưởng, kinh doanh có đặt cược) là số tiền thu từ hoạt động này bao gồm cả thuế tiêu thụ đặc biệt trừ đi số tiền đã trả thưởng cho khách;"},{"k":"p","t":"o) Trường hợp khác theo hướng dẫn của Bộ trưởng Bộ Tài chính."}]},{"id":"nd320_9","no":9,"code":"Điều 9","title":"Điều 9. Các khoản chi được trừ khi xác định thu nhập chịu thuế","shortTitle":"Các khoản chi được trừ khi xác định thu nhập chịu thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Trừ các khoản chi không được trừ quy định tại Điều 10 của Nghị định này, doanh nghiệp được trừ các khoản chi khi xác định thu nhập chịu thuế nếu đáp ứng đủ điều kiện tại các điểm a, b và c sau đây:"},{"k":"p","t":"a) Khoản chi thực tế phát sinh liên quan đến hoạt động sản xuất, kinh doanh của doanh nghiệp, bao gồm cả khoản chi phí bổ sung được trừ theo tỷ lệ phần trăm tính trên chi phí thực tế phát sinh trong kỳ tính thuế liên quan đến hoạt động nghiên cứu và phát triển của doanh nghiệp;"},{"k":"p","t":"a1) Khoản chi phí phát sinh trong kỳ tính thuế liên quan đến hoạt động nghiên cứu và phát triển của doanh nghiệp được tính vào chi phí được trừ tối đa không quá 200% tính trên chi phí thực tế cho hoạt động này (không bao gồm các khoản chi quy định tại khoản 3 Điều 10 của Nghị định này) phát sinh trong kỳ tính thuế tại doanh nghiệp;"},{"k":"p","t":"a2) Việc xác định mức chi được trừ cho hoạt động nghiên cứu và phát triển quy định tại điểm này phải đảm bảo sau khi áp dụng mức chi bổ sung, doanh nghiệp không bị lỗ;"},{"k":"p","t":"a3) Việc xác định khoản chi phí thực tế phát sinh trong kỳ tính thuế liên quan đến hoạt động nghiên cứu và phát triển quy định tại điểm này thực hiện theo quy định của pháp luật về khoa học công nghệ và đổi mới sáng tạo;"},{"k":"p","t":"b) Khoản chi có đủ hóa đơn, chứng từ theo quy định của pháp luật."},{"k":"p","t":"Đối với các trường hợp: Mua sản phẩm là nông, lâm, thủy sản của người sản xuất, đánh bắt trực tiếp bán ra; mua sản phẩm thủ công làm bằng đay, cói, tre, nứa, lá, song, mây, rơm, vỏ dừa, sọ dừa hoặc nguyên liệu tận dụng từ sản phẩm nông nghiệp của người sản xuất thủ công trực tiếp bán ra; mua phế liệu của người trực tiếp thu nhặt; mua đồ dùng, tài sản của hộ gia đình, cá nhân trực tiếp bán ra; mua hàng hóa, dịch vụ của cá nhân, hộ kinh doanh (không bao gồm các trường hợp nêu trên) có mức doanh thu dưới ngưỡng doanh thu chịu thuế giá trị gia tăng phải có chứng từ chi trả tiền theo quy định của pháp luật về kế toán, hóa đơn, chứng từ cho người bán (đối với trường hợp giá trị mua hàng hóa, dịch vụ trong ngày của từng hộ, cá nhân từ 05 triệu đồng trở lên phải thanh toán không dùng tiền mặt) và Bảng kê thu mua hàng hóa, dịch vụ do người đại diện theo pháp luật hoặc người được ủy quyền của doanh nghiệp ký và chịu trách nhiệm;"},{"k":"p","t":"c) Khoản chi có chứng từ thanh toán không dùng tiền mặt đối với trường hợp mua hàng hóa, dịch vụ và các khoản thanh toán khác từng lần có giá trị từ 05 triệu đồng trở lên. Chứng từ thanh toán không dùng tiền mặt thực hiện theo quy định của các văn bản pháp luật về thuế giá trị gia tăng."},{"k":"p","t":"c1) Trường hợp mua hàng hóa, dịch vụ của một người bán có giá trị dưới 05 triệu đồng nhưng mua nhiều lần trong cùng một ngày có tổng giá trị từ 05 triệu đồng trở lên thì chỉ được tính vào chi phí được trừ trong trường hợp có chứng từ thanh toán không dùng tiền mặt;"},{"k":"p","t":"c2) Trường hợp doanh nghiệp phát sinh các khoản chi do doanh nghiệp ủy quyền/giao cho người lao động trực tiếp mua hộ hàng hóa, dịch vụ để phục vụ hoạt động sản xuất kinh doanh của doanh nghiệp từ 05 triệu đồng trở lên mà các khoản chi phí này được thanh toán bởi người lao động bằng dịch vụ thanh toán không dùng tiền mặt thì tính vào chi phí được trừ nếu đáp ứng đủ các điều kiện sau: Có hóa đơn, chứng từ theo quy định của pháp luật về kế toán, hóa đơn, chứng từ và quy chế tài chính hoặc quy chế nội bộ hoặc quyết định của doanh nghiệp quy định việc ủy quyền hoặc cho phép người lao động được phép thanh toán khoản mua hàng hóa, dịch vụ để phục vụ hoạt động sản xuất kinh doanh của doanh nghiệp và khoản chi này sau đó được doanh nghiệp thanh toán lại cho người lao động;"},{"k":"p","t":"c3) Trường hợp mua hàng hóa, dịch vụ từng lần có giá trị từ 05 triệu đồng trở lên mà đến thời điểm ghi nhận chi phí, doanh nghiệp chưa thanh toán thì doanh nghiệp được tính vào chi phí được trừ khi xác định thu nhập chịu thuế. Trường hợp khi thanh toán doanh nghiệp không có chứng từ thanh toán không dùng tiền mặt thì doanh nghiệp phải kê khai, điều chỉnh giảm chi phí đối với phần giá trị hàng hóa, dịch vụ không có chứng từ thanh toán không dùng tiền mặt vào kỳ tính thuế phát sinh việc thanh toán bằng tiền mặt (kể cả trong trường hợp cơ quan thuế và các cơ quan chức năng đã có quyết định thanh tra, kiểm tra kỳ tính thuế có phát sinh khoản chi phí này)."},{"k":"p","t":"2. Doanh nghiệp được tính vào chi phí được trừ khi xác định thu nhập chịu thuế đối với khoản chi thực tế phát sinh khác đáp ứng đủ điều kiện tại điểm b và điểm c khoản 1 Điều này, bao gồm:"},{"k":"p","t":"a) Khoản chi cho thực hiện nhiệm vụ giáo dục quốc phòng và an ninh, huấn luyện, hoạt động của lực lượng dân quân tự vệ và phục vụ các nhiệm vụ quốc phòng, an ninh khác theo quy định của pháp luật;"},{"k":"p","t":"b) Khoản chi hỗ trợ phục vụ cho hoạt động của tổ chức đảng, tổ chức chính trị - xã hội trong doanh nghiệp;"},{"k":"p","t":"c) Khoản chi cho hoạt động giáo dục nghề nghiệp, đào tạo nghề nghiệp cho người lao động bao gồm: Chi phí trả cho người dạy, tài liệu học tập, thiết bị dùng để hoạt động giáo dục nghề nghiệp, vật liệu thực hành, các chi phí khác hỗ trợ cho người học; chi phí đào tạo của doanh nghiệp cho người lao động được tuyển dụng vào làm việc tại doanh nghiệp; chi phí đào tạo, đào tạo lại, bồi dưỡng nghiệp vụ cho người lao động đang làm việc tại doanh nghiệp."},{"k":"p","t":"Các hoạt động giáo dục, đào tạo, đào tạo lại, bồi dưỡng nghiệp vụ cho người lao động quy định tại điểm này phải được quy định chi tiết tại một trong các hồ sơ sau: Hợp đồng lao động, Thỏa ước lao động tập thể, Quy chế tài chính của doanh nghiệp;"},{"k":"p","t":"d) Khoản chi thực tế cho hoạt động phòng, chống HIV/AIDS nơi làm việc của doanh nghiệp, bao gồm: Chi phí đào tạo cán bộ phòng, chống HIV/AIDS của doanh nghiệp; chi phí tổ chức truyền thông phòng, chống HIV/AIDS cho người lao động của doanh nghiệp; phí thực hiện tư vấn, khám và xét nghiệm HIV/AIDS; chi phí hỗ trợ người nhiễm HIV/AIDS là người lao động của doanh nghiệp;"},{"k":"p","t":"đ) Khoản tài trợ cho giáo dục, y tế, văn hóa, phòng, chống, khắc phục hậu quả thiên tai, dịch bệnh, làm nhà đại đoàn kết, nhà tình nghĩa, nhà cho các đối tượng chính sách theo quy định của pháp luật; khoản tài trợ theo quy định của Chính phủ, Thủ tướng Chính phủ dành cho các địa phương thuộc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn; khoản tài trợ cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số."},{"k":"p","t":"đ1) Khoản tài trợ cho giáo dục bằng tiền hoặc hiện vật quy định tại điểm này gồm: Tài trợ cho các trường học công lập, dân lập và tư thục thuộc hệ thống giáo dục quốc dân theo quy định của pháp luật về giáo dục mà khoản tài trợ này không phải là để góp vốn, mua cổ phần trong các cơ sở này; tài trợ cơ sở vật chất phục vụ giảng dạy, học tập và hoạt động của trường học; tài trợ cho các hoạt động thường xuyên của trường; tài trợ học bổng cho học sinh, sinh viên thuộc các cơ sở giáo dục phổ thông, cơ sở giáo dục nghề nghiệp và cơ sở giáo dục đại học được quy định tại Luật Giáo dục (tài trợ trực tiếp cho học sinh, sinh viên hoặc thông qua các cơ sở giáo dục, thông qua các cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật); tài trợ cho các cuộc thi về các môn học được giảng dạy trong trường học mà đối tượng tham gia dự thi là người học; tài trợ để thành lập các Quỹ khuyến học giáo dục theo quy định của pháp luật về giáo dục đào tạo;"},{"k":"p","t":"đ2) Khoản tài trợ cho y tế bằng tiền hoặc hiện vật quy định tại điểm này gồm: Tài trợ cho các cơ sở y tế được thành lập theo quy định pháp luật về y tế mà khoản tài trợ này không phải là để góp vốn, mua cổ phần trong các cơ sở y tế đó; tài trợ thiết bị y tế, dụng cụ y tế, thuốc chữa bệnh; tài trợ cho các hoạt động thường xuyên của tổ chức được cấp phép hoạt động khám, chữa bệnh theo pháp luật; tài trợ cho người bệnh thông qua một cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật;"},{"k":"p","t":"đ3) Khoản tài trợ cho văn hóa bằng tiền hoặc hiện vật quy định tại tiết này gồm: Tài trợ cho bảo tàng, thư viện, được thành lập theo quy định pháp luật về văn hóa mà khoản tài trợ này không phải là để góp vốn, mua cổ phần trong các bảo tàng, thư viện đó; tài trợ trực tiếp cho các hoạt động thường xuyên của Quỹ bảo tồn di sản văn hóa; tài trợ cho bảo tàng, thư viện, Quỹ bảo tồn di sản văn hóa thông qua một cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật;"},{"k":"p","t":"đ4) Khoản tài trợ cho phòng, chống, khắc phục hậu quả thiên tai, dịch bệnh bằng tiền hoặc hiện vật quy định tại điểm này gồm: Tài trợ để phòng, chống, khắc phục hậu quả thiên tai, dịch bệnh trực tiếp cho tổ chức được thành lập và hoạt động theo quy định của pháp luật; tài trợ cho cá nhân bị thiệt hại thông qua một cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật;"},{"k":"p","t":"đ5) Khoản tài trợ làm nhà đại đoàn kết, nhà tình nghĩa, nhà bằng tiền hoặc hiện vật cho các đối tượng chính sách quy định tại điểm này bao gồm: Tài trợ trực tiếp hoặc tài trợ thông qua một cơ quan, tổ chức có chức năng huy động tài trợ theo quy định của pháp luật."},{"k":"p","t":"Đối tượng chính sách quy định tại khoản này bao gồm: Người có công theo quy định của pháp luật về người có công; đối tượng bảo trợ xã hội hưởng trợ cấp từ ngân sách nhà nước; người thuộc hộ nghèo, cận nghèo và các trường hợp khác theo quy định của pháp luật;"},{"k":"p","t":"đ6) Khoản tài trợ bằng tiền hoặc hiện vật theo quy định của Chính phủ hoặc quyết định của Thủ tướng Chính phủ dành cho các địa phương thuộc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn là chương trình được Chính phủ, Thủ tướng Chính phủ quy định thực hiện ở các địa phương thuộc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn (bao gồm cả khoản tài trợ của doanh nghiệp cho việc xây dựng công trình hạ tầng ở địa bàn kinh tế - xã hội đặc biệt khó khăn theo Đề án được cấp có thẩm quyền phê duyệt)."},{"k":"p","t":"đ7) Khoản tài trợ bằng tiền hoặc hiện vật cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số cho các tổ chức, cá nhân. Đối tượng nhận tài trợ quy định tại điểm này thực hiện theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về chuyển đổi số;"},{"k":"p","t":"e) Khoản chi cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số."},{"k":"p","t":"Việc xác định khoản chi cho nghiên cứu khoa học, phát triển công nghệ và đổi mới sáng tạo, chuyển đổi số quy định tại điểm này thực hiện theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo, pháp luật về chuyển đổi số;"},{"k":"p","t":"g) Phần giá trị tổn thất do thiên tai, dịch bệnh và trường hợp bất khả kháng khác không được bồi thường."},{"k":"p","t":"g1) Phần giá trị tổn thất do thiên tai, dịch bệnh và trường hợp bất khả kháng khác không được bồi thường được xác định bằng tổng giá trị tổn thất trừ đi phần giá trị doanh nghiệp bảo hiểm hoặc tổ chức, cá nhân khác phải bồi thường theo quy định của pháp luật;"},{"k":"p","t":"g2) Trường hợp khoản bồi thường doanh nghiệp nhận được khác với kỳ phát sinh khoản tổn thất mà doanh nghiệp chưa trừ khoản bồi thường này vào giá trị tổn thất thì doanh nghiệp tính khoản bồi thường vào thu nhập khác tại kỳ phát sinh khoản bồi thường;"},{"k":"p","t":"g3) Việc xác định trường hợp bất khả kháng khác làm cơ sở xác định phần giá trị tổn thất được trừ quy định tại điểm này gồm thảm họa, hỏa hoạn, tai nạn bất ngờ và các trường hợp khác thực hiện theo quy định của pháp luật quản lý thuế;"},{"k":"p","t":"h) Khoản chi thực tế cho người được biệt phái tham gia quản trị, điều hành, kiểm soát tổ chức tín dụng được kiểm soát đặc biệt, ngân hàng thương mại được chuyển giao bắt buộc theo quy định của Luật Các tổ chức tín dụng;"},{"k":"p","t":"i) Một số khoản chi phục vụ sản xuất, kinh doanh của doanh nghiệp nhưng chưa tương ứng với doanh thu phát sinh trong kỳ, bao gồm:"},{"k":"p","t":"i1)Chi phí của bên tham gia dự thầu phải bỏ ra cho hoạt động tham gia đấu thầu nhưng không trúng thầu;"},{"k":"p","t":"i2) Chi phí nghiên cứu thị trường, nghiên cứu sản phẩm, dịch vụ chuẩn bị cho việc sản xuất sản phẩm, dịch vụ mới, chi phí đầu tư cho dự án phát triển sản phẩm, dịch vụ mới nhưng không thành công hoặc dừng triển khai."},{"k":"p","t":"Doanh nghiệp được tính vào chi phí được trừ khi tính thuế thu nhập doanh nghiệp đối với các khoản chi phí quy định tại điểm này khi có báo cáo nghiên cứu về phát triển thị trường, phát triển về sản phẩm, dịch vụ mới gửi cơ quan quản lý nhà nước có liên quan theo quy định của pháp luật chuyên ngành. Trường hợp pháp luật chuyên ngành không yêu cầu gửi báo cáo thì thực hiện lưu trữ báo cáo tại doanh nghiệp;"},{"k":"p","t":"i3) Chi phí tiền thuê đất và chi phí quản lý, duy trì cơ sở hạ tầng trả cho các doanh nghiệp kinh doanh cơ sở hạ tầng trong các khu kinh tế, khu công nghệ cao, khu nông nghiệp ứng dụng công nghệ cao, khu công nghệ số tập trung, khu công nghiệp, cụm công nghiệp, chi phí tiền thuê đất trả cho Nhà nước đối với đất thuê của Nhà nước trong đó đất và cơ sở hạ tầng này phải là địa điểm, trụ sở sản xuất, kinh doanh của doanh nghiệp trong trường hợp chưa tham gia vào hoạt động sản xuất, kinh doanh của doanh nghiệp;"},{"k":"p","t":"i4) Chi phí khấu hao hoặc phân bổ dần vào chi phí theo quy định đối với tài sản cho thuê trong thời gian chưa có khách thuê."},{"k":"p","t":"Trường hợp doanh nghiệp có tài sản cho thuê nhưng chưa có khách thuê, nếu tài sản thuộc quyền sở hữu hoặc quyền sử dụng hợp pháp của doanh nghiệp thì doanh nghiệp được tính vào chi phí được trừ đối với khoản chi phí liên quan đến tài sản này trong thời gian chưa có khách thuê;"},{"k":"p","t":"i5) Chi phí thành lập doanh nghiệp hoặc chi nhánh, đơn vị phụ thuộc, địa điểm kinh doanh của doanh nghiệp; chi phí khôi phục sau khi tạm dừng sản xuất, kinh doanh (không phải là các khoản chi đầu tư xây dựng để hình thành tài sản cố định); chi phí hoàn trả lại hiện trạng theo hợp đồng trước khi chấm dứt hoạt động sản xuất, kinh doanh của doanh nghiệp hoặc chấm dứt hoạt động chi nhánh, đơn vị phụ thuộc, địa điểm kinh doanh của doanh nghiệp;"},{"k":"p","t":"i6) Chi phí giới thiệu/marketing sản phẩm, dịch vụ trước khi bán hàng."},{"k":"p","t":"Doanh nghiệp được tính vào chi phí được trừ khi tính thuế thu nhập doanh nghiệp đối với các khoản chi phí quy định tại điểm này khi có báo cáo về chủ trương đầu tư sản xuất sản phẩm, dịch vụ gửi cơ quan quản lý nhà nước có liên quan theo quy định của pháp luật chuyên ngành. Trường hợp pháp luật chuyên ngành không yêu cầu gửi báo cáo thì thực hiện lưu trữ báo cáo tại doanh nghiệp;"},{"k":"p","t":"i7) Chi phí hủy hàng tồn kho hư hỏng do thay đổi quá trình sinh hóa tự nhiên, hàng lạc hậu mốt, lạc hậu kỹ thuật, lỗi thời, hàng hết hạn sử dụng, hàng không còn giá trị sử dụng, hàng không đủ điều kiện lưu thông trên thị trường do quy định của các luật chuyên ngành; chi phí hủy nguyên liệu, vật tư, linh kiện không còn nhu cầu sử dụng. Chi phí hủy hàng tại điểm này bao gồm giá trị hàng hủy theo giá vốn của hàng hóa, nguyên liệu, vật tư, linh kiện (trừ phần trích lập dự phòng theo quy định (nếu có)) và chi phí liên quan đến hoạt động hủy hàng;"},{"k":"p","t":"i8) Chi phí hủy tài sản do hư hỏng không còn nhu cầu sử dụng. Chi phí hủy tài sản tại điểm này bao gồm giá trị còn lại trên sổ sách tại doanh nghiệp và chi phí liên quan đến hoạt động hủy tài sản;"},{"k":"p","t":"i9) Chi phí hủy phế liệu, phế phẩm phát sinh trong quá trình gia công, sản xuất."},{"k":"p","t":"Doanh nghiệp phải lưu giữ và cung cấp đầy đủ hồ sơ liên quan đến các khoản chi phí tại điểm i khoản này để phục vụ cho công tác thanh tra, kiểm tra theo quy định của pháp luật;"},{"k":"p","t":"k) Khoản chi hỗ trợ xây dựng công trình công cộng đồng thời phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp."},{"k":"p","t":"Việc xác định công trình công cộng quy định tại tiết này được thực hiện theo quy định tại điểm 2 Mục I, Mục III và Mục IV Phụ lục I ban hành kèm theo Nghị định số 06/2021/NĐ-CP ngày 26 tháng 01 năm 2021 của Chính phủ quy định chi tiết một số nội dung về quản lý chất lượng, thi công xây dựng và bảo trì công trình xây dựng;"},{"k":"p","t":"l) Chi phí liên quan đến việc giảm phát thải khí nhà kính nhằm trung hòa các-bon và net zero, giảm ô nhiễm môi trường, đồng thời liên quan đến hoạt động sản xuất, kinh doanh của doanh nghiệp;"},{"k":"p","t":"m) Khoản đóng góp vào các Quỹ được thành lập theo quyết định của Thủ tướng Chính phủ và quy định của Chính phủ, bao gồm: Quỹ viễn thông công ích; Quỹ Phòng, chống tác hại thuốc lá; Quỹ bảo vệ môi trường Việt Nam và các Quỹ được thành lập theo quyết định của Thủ tướng Chính phủ, quy định của Chính phủ. Khoản đóng góp vào các Quỹ được tính vào chi phí được trừ quy định tại điểm này là khoản doanh nghiệp có nghĩa vụ phải nộp vào các Quỹ theo quy định."}]},{"id":"nd320_10","no":10,"code":"Điều 10","title":"Điều 10. Các khoản chi không được trừ khi xác định thu nhập chịu thuế","shortTitle":"Các khoản chi không được trừ khi xác định thu nhập chịu thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Các khoản chi không được trừ khi xác định thu nhập chịu thuế thực hiện theo quy định tại khoản 2 Điều 9 Luật Thuế thu nhập doanh nghiệp, cụ thể như sau:"},{"k":"p","t":"1. Các khoản chi không đáp ứng đủ các điều kiện quy định tại khoản 1 Điều 9 của Nghị định này."},{"k":"p","t":"2. Các khoản tiền phạt về vi phạm hành chính bao gồm: Vi phạm luật giao thông, vi phạm quy định đăng ký kinh doanh, vi phạm quy định kế toán, vi phạm pháp luật về thuế bao gồm cả tiền chậm nộp thuế theo quy định của Luật Quản lý thuế và các khoản phạt về vi phạm hành chính khác theo quy định của pháp luật."},{"k":"p","t":"3. Các khoản chi được bù đắp bằng nguồn kinh phí khác; khoản chi đã được chi từ Quỹ phát triển khoa học và công nghệ của doanh nghiệp, Quỹ phát triển khoa học, công nghệ và đổi mới sáng tạo, chuyển đổi số của doanh nghiệp."},{"k":"p","t":"4. Phần chi vượt mức quy định đối với các khoản chi sau:"},{"k":"p","t":"a) Phần chi phí quản lý kinh doanh do doanh nghiệp nước ngoài phân bổ cho cơ sở thường trú tại Việt Nam vượt mức tính theo công thức sau:"},{"k":"tbl","rows":[["Chi phí quản lý kinh doanh do công ty ở nước ngoài phân bổ cho cơ sở thường trú tại Việt Nam trong kỳ tính thuế","=","Doanh thu tính thuế của cơ sở thường trú tại Việt Nam trong kỳ tính thuế","x","Tổng số chi phí quản lý kinh doanh của công ty ở nước ngoài trong kỳ tính thuế"],["Chi phí quản lý kinh doanh do công ty ở nước ngoài phân bổ cho cơ sở thường trú tại Việt Nam trong kỳ tính thuế","=","Tổng doanh thu của công ty ở nước ngoài, bao gồm cả doanh thu của các cơ sở thường trú ở các nước khác trong kỳ tính thuế","x","Tổng số chi phí quản lý kinh doanh của công ty ở nước ngoài trong kỳ tính thuế"]]},{"k":"p","t":"b) Phần chi phí liên quan đến việc thuê quản lý đối với hoạt động kinh doanh trò chơi điện tử có thưởng, kinh doanh casino vượt quá 4% doanh thu hoạt động kinh doanh trò chơi điện tử có thưởng, kinh doanh casino;"},{"k":"p","t":"c) Chi trả lãi tiền vay của doanh nghiệp có giao dịch liên kết theo quy định của pháp luật về quản lý thuế đối với doanh nghiệp có giao dịch liên kết;"},{"k":"p","t":"d) Phần chi cho các khoản có tính chất phúc lợi trực tiếp cho người lao động vượt quá 01 tháng lương bình quân thực tế thực hiện trong năm tính thuế, bao gồm: Chi đám hiếu, hỷ của bản thân và gia đình người lao động; chi nghỉ mát; chi hỗ trợ điều trị khám bệnh, chữa bệnh; chi hỗ trợ bổ sung kiến thức học tập tại cơ sở giáo dục, cơ sở hoạt động giáo dục nghề nghiệp; chi hỗ trợ gia đình người lao động bị ảnh hưởng bởi thiên tai, dịch họa, tai nạn, ốm đau; chi khen thưởng con của người lao động có thành tích tốt trong học tập; chi hỗ trợ chi phí đi lại ngày lễ, tết cho người lao động; chi bảo hiểm tai nạn (không bao gồm trường hợp chi bảo hiểm tai nạn bắt buộc theo quy định của pháp luật chuyên ngành), bảo hiểm sức khỏe, bảo hiểm tự nguyện khác cho người lao động (trừ khoản đóng góp tham gia bảo hiểm hưu trí bổ sung theo quy định của Luật Bảo hiểm xã hội, khoản chi mua bảo hiểm nhân thọ cho người lao động, bảo hiểm hưu trí tự nguyện cho người lao động hướng dẫn tại điểm đ khoản này) và những khoản chi có tính chất phúc lợi khác, cụ thể như sau:"},{"k":"p","t":"d1) Việc xác định 01 tháng lương bình quân thực tế thực hiện trong năm tính thuế của doanh nghiệp được xác định bằng quỹ tiền lương thực hiện trong năm chia cho 12 tháng. Trường hợp doanh nghiệp hoạt động không đủ 12 tháng thì việc xác định 01 tháng lương bình quân thực tế thực hiện trong năm tính thuế được xác định bằng quỹ tiền lương thực hiện trong năm chia cho số tháng thực tế hoạt động trong năm;"},{"k":"p","t":"d2) Quỹ tiền lương thực hiện là tổng số tiền lương thực tế đã chi trả của năm quyết toán đó đến thời hạn cuối cùng nộp hồ sơ quyết toán theo quy định (không bao gồm số tiền trích lập quỹ dự phòng tiền lương của năm trước chi trong năm quyết toán thuế);"},{"k":"p","t":"đ) Phần chi vượt mức 05 triệu đồng/tháng/người để đóng góp tham gia bảo hiểm hưu trí bổ sung theo Luật Bảo hiểm xã hội hoặc quỹ có tính chất an sinh xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ cho người lao động. Phần vượt mức quy định của pháp luật về bảo hiểm xã hội, về bảo hiểm y tế để trích nộp các quỹ có tính chất an sinh xã hội (bảo hiểm xã hội, bảo hiểm hưu trí bổ sung bắt buộc), Quỹ bảo hiểm y tế và Quỹ bảo hiểm thất nghiệp cho người lao động, cụ thể như sau:"},{"k":"p","t":"đ1) Khoản tham gia bảo hiểm hưu trí bổ sung theo Luật Bảo hiểm xã hội hoặc quỹ có tính chất an sinh xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ cho người lao động được tính vào chi phí được trừ ngoài việc không vượt mức quy định tại điểm này còn phải được ghi cụ thể điều kiện hưởng và mức hưởng tại một trong các hồ sơ sau: Hợp đồng lao động; Thỏa ước lao động tập thể; Quy chế tài chính của Công ty, Tổng công ty, Tập đoàn; Quy chế thưởng do Chủ tịch Hội đồng quản trị Tổng giám đốc, Giám đốc quy định theo quy chế tài chính của Công ty, Tổng công ty, Tập đoàn;"},{"k":"p","t":"đ2) Doanh nghiệp không được tính vào chi phí đối với các khoản chi tham gia bảo hiểm hưu trí bổ sung theo Luật Bảo hiểm xã hội hoặc quỹ có tính chất an sinh xã hội, mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ cho người lao động nếu doanh nghiệp không thực hiện đầy đủ các nghĩa vụ về bảo hiểm bắt buộc cho người lao động (kể cả trường hợp nợ tiền bảo hiểm bắt buộc)."},{"k":"p","t":"5. Trích lập và sử dụng các khoản dự phòng không theo đúng quy định của pháp luật về trích lập dự phòng: Dự phòng giảm giá hàng tồn kho, dự phòng tổn thất các khoản đầu tư tài chính, dự phòng nợ phải thu khó đòi, dự phòng bảo hành sản phẩm, hàng hóa, công trình xây lắp và dự phòng rủi ro nghề nghiệp của doanh nghiệp thẩm định giá, doanh nghiệp cung cấp dịch vụ kiểm toán độc lập."},{"k":"p","t":"6. Chi khấu hao tài sản cố định thuộc một trong các trường hợp sau:"},{"k":"p","t":"a) Chi khấu hao đối với tài sản cố định không sử dụng cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ."},{"k":"p","t":"Riêng tài sản cố định phục vụ cho người lao động làm việc tại doanh nghiệp, bao gồm: Nhà nghỉ giữa ca, nhà ăn giữa ca, nhà thay quần áo, nhà vệ sinh, phòng hoặc trạm y tế để khám, chữa bệnh, cơ sở đào tạo, dạy nghề, thư viện, nhà trẻ, khu thể thao và các thiết bị, nội thất đủ điều kiện là tài sản cố định lắp đặt trong các công trình nêu trên; bể chứa nước sạch, nhà để xe; xe đưa đón người lao động, nhà ở trực tiếp cho người lao động; chi phí xây dựng cơ sở vật chất, chi phí mua sắm máy móc, thiết bị là tài sản cố định dùng để tổ chức hoạt động giáo dục nghề nghiệp và những tài sản dùng để phục vụ trực tiếp cho người lao động trong doanh nghiệp được trích khấu hao tính vào chi phí được trừ khi xác định thu nhập chịu thuế;"},{"k":"p","t":"b) Chi khấu hao đối với tài sản cố định không có giấy tờ chứng minh thuộc quyền sở hữu của doanh nghiệp (trừ tài sản cố định thuê tài chính);"},{"k":"p","t":"c) Chi khấu hao đối với tài sản cố định không được quản lý, theo dõi, hạch toán trong sổ sách kế toán của doanh nghiệp theo chế độ quản lý tài sản cố định và hạch toán kế toán hiện hành;"},{"k":"p","t":"d) Phần trích khấu hao không đúng hoặc vượt mức quy định hiện hành của Bộ trưởng Bộ Tài chính về chế độ quản lý, sử dụng và trích khấu hao tài sản cố định, cụ thể như sau:"},{"k":"p","t":"d1) Doanh nghiệp trích khấu hao tài sản cố định theo quy định của Bộ trưởng Bộ Tài chính về chế độ quản lý, sử dụng và trích khấu hao tài sản cố định kể cả trường hợp khấu hao nhanh nhưng phải đáp ứng điều kiện đảm bảo kinh doanh có lãi;"},{"k":"p","t":"d2) Đối với tài sản là công cụ, dụng cụ, bao bì luân chuyển không đáp ứng đủ điều kiện xác định là tài sản cố định theo quy định (bao gồm các công cụ, dụng cụ, bao bì luân chuyển không đáp ứng đủ điều kiện xác định là tài sản cố định phục vụ cho người lao động nêu tại điểm a khoản này) thì chi phí mua tài sản nêu trên được phân bổ dần vào chi phí hoạt động sản xuất kinh doanh trong kỳ nhưng tối đa không quá 03 năm;"},{"k":"p","t":"đ) Khấu hao đối với tài sản cố định đã khấu hao hết giá trị trừ trường hợp tài sản cố định được cơ quan có thẩm quyền cho phép đánh giá lại;"},{"k":"p","t":"e) Một số trường hợp cụ thể được xác định như sau:"},{"k":"p","t":"e1) Không được tính vào chi phí được trừ khi xác định thu nhập chịu thuế đối với: Phần trích khấu hao tương ứng với nguyên giá vượt trên 1,6 tỷ đồng/xe đối với ô tô chở người từ 9 chỗ ngồi trở xuống (trừ ô tô dùng cho kinh doanh vận tải hành khách, kinh doanh du lịch, khách sạn; ô tô dùng để làm mẫu và lái thử cho kinh doanh ô tô); phần trích khấu hao đối với tài sản cố định là máy bay, trực thăng, tàu lượn, du thuyền không sử dụng kinh doanh vận chuyển hàng hóa, hành khách, kinh doanh du lịch, khách sạn. Trường hợp doanh nghiệp có chuyển nhượng, thanh lý xe ô tô chở người từ 9 chỗ ngồi trở xuống thì giá trị còn lại của xe được xác định bằng nguyên giá thực mua tài sản cố định trừ đi số khấu hao lũy kế của tài sản cố định theo chế độ quản lý sử dụng và trích khấu hao tài sản cố định tính đến thời điểm chuyển nhượng, thanh lý xe."},{"k":"p","t":"Ô tô chở người từ 9 chỗ ngồi trở xuống chuyên kinh doanh vận tải hành khách, du lịch và khách sạn là các ô tô được đăng ký tên doanh nghiệp mà doanh nghiệp này trong Giấy chứng nhận đăng ký doanh nghiệp hoặc Giấy chứng nhận đăng ký kinh doanh có đăng ký một trong các ngành nghề: Vận tải hành khách, kinh doanh du lịch, khách sạn và được cấp phép kinh doanh theo quy định tại các văn bản pháp luật về kinh doanh vận tải, hành khách, du lịch, khách sạn. Máy bay, trực thăng, tàu lượn, du thuyền không sử dụng cho mục đích kinh doanh vận chuyển hàng hoá, hành khách, khách du lịch là máy bay, trực thăng, tàu lượn, du thuyền của các doanh nghiệp đăng ký và hạch toán trích khấu hao tài sản cố định nhưng trong Giấy chứng nhận đăng ký doanh nghiệp hoặc Giấy chứng nhận đăng ký kinh doanh của doanh nghiệp không đăng ký ngành nghề vận tải hàng hoá, vận tải hành khách, kinh doanh du lịch, khách sạn;"},{"k":"p","t":"e2) Đối với công trình trên đất vừa sử dụng cho sản xuất, kinh doanh vừa sử dụng cho mục đích khác thì không được tính khấu hao vào chi phí được trừ đối với giá trị công trình trên đất tương ứng phần diện tích không sử dụng vào hoạt động sản xuất kinh doanh hoặc không sử dụng phục vụ cho người lao động làm việc tại doanh nghiệp theo quy định tại điểm a khoản này."},{"k":"p","t":"Doanh nghiệp được trích khấu hao tính vào chi phí được trừ khi xác định thu nhập chịu thuế theo đúng mức trích khấu hao và thời gian sử dụng tài sản cố định theo quy định của Bộ trưởng Bộ Tài chính đối với các công trình trê
