iảm thuế tính từ năm thứ 04 kể từ năm cấp Giấy chứng nhận, Giấy xác nhận ưu đãi."},{"k":"p","t":"5. Ưu đãi thuế đối với dự án đầu tư mở rộng:"},{"k":"p","t":"a) Doanh nghiệp có dự án đầu tư đang hoạt động mở rộng quy mô, nâng cao công suất, đổi mới công nghệ, giảm ô nhiễm hoặc cải thiện môi trường thuộc ngành, nghề, địa bàn ưu đãi thuế thu nhập doanh nghiệp quy định tại Điều 18 Nghị định này (sau đây gọi là đầu tư mở rộng) thì phần thu nhập tăng thêm từ đầu tư mở rộng được hưởng ưu đãi thuế theo dự án đang hoạt động cho thời gian còn lại và không phải hạch toán riêng khoản thu nhập tăng thêm từ đầu tư mở rộng với thu nhập từ dự án đang hoạt động;"},{"k":"p","t":"b) Trường hợp dự án đang hoạt động đã hết thời gian hưởng ưu đãi thuế thì khoản thu nhập tăng thêm từ dự án đầu tư mở rộng đáp ứng các tiêu chí quy định tại khoản 6 Điều này được miễn thuế, giảm thuế và không được hưởng ưu đãi về thuế suất. Thời gian miễn thuế, giảm thuế đối với thu nhập tăng thêm do đầu tư mở rộng bằng với thời gian miễn thuế, giảm thuế áp dụng đối với dự án đầu tư mới cùng ngành, nghề, địa bàn ưu đãi thuế thu nhập doanh nghiệp và được tính từ năm dự án đầu tư hoàn thành số vốn đầu tư đã đăng ký."},{"k":"p","t":"b1) Doanh nghiệp phải hạch toán riêng khoản thu nhập tăng thêm từ đầu tư mở rộng để áp dụng ưu đãi. Trường hợp không hạch toán riêng được thì thu nhập từ hoạt động đầu tư mở rộng xác định theo tỷ lệ giữa nguyên giá tài sản cố định đầu tư mới đưa vào sử dụng cho sản xuất, kinh doanh trên tổng nguyên giá tài sản cố định của doanh nghiệp;"},{"k":"p","t":"b2) Trường hợp trong kỳ tính thuế, doanh nghiệp không tính riêng được thu nhập tăng thêm do đầu tư mở rộng thì thu nhập tăng thêm do đầu tư mở rộng được áp dụng ưu đãi thuế thu nhập doanh nghiệp như sau:"},{"k":"tbl","rows":[["Phần thu nhập \ntăng thêm do đầu \ntư mở rộng được \náp dụng ưu đãi \nthuế thu nhập \ndoanh nghiệp","=","Tổng thu nhập chịu \nthuế trong kỳ tính \nthuế (không bao \ngồm thu nhập khác\nkhông được hưởng \nưu đãi)","x","Nguyên giá tài sản cố \nđịnh đầu tư mở rộng đưa \nvào sử dụng cho sản \nxuất, kinh doanh"],["Phần thu nhập \ntăng thêm do đầu \ntư mở rộng được \náp dụng ưu đãi \nthuế thu nhập \ndoanh nghiệp","=","Tổng thu nhập chịu \nthuế trong kỳ tính \nthuế (không bao \ngồm thu nhập khác\nkhông được hưởng \nưu đãi)","x","Tổng nguyên giá tài sản \ncố định của doanh \nnghiệp"]]},{"k":"p","t":"b3) Tổng nguyên giá tài sản cố định của doanh nghiệp gồm: Nguyên giá tài sản cố định đầu tư mở rộng đưa vào sử dụng cho sản xuất, kinh doanh và nguyên giá tài sản cố định hiện có đang dùng cho sản xuất, kinh doanh theo số liệu cuối kỳ trên Bảng cân đối kế toán (Báo cáo tình hình tài chính) năm;"},{"k":"p","t":"c) Ưu đãi thuế quy định tại khoản này không áp dụng đối với các trường hợp đầu tư mở rộng do sáp nhập, mua lại doanh nghiệp hoặc dự án đầu tư đang hoạt động."},{"k":"p","t":"6. Dự án đầu tư mở rộng được hưởng ưu đãi quy định tại điểm b khoản 5 Điều này phải đáp ứng một trong các tiêu chí sau:"},{"k":"p","t":"a) Nguyên giá tài sản cố định tăng thêm khi dự án đầu tư hoàn thành việc giải ngân số vốn đầu tư mở rộng đã đăng ký đạt tối thiểu từ 40 tỷ đồng đối với dự án đầu tư mở rộng thuộc ngành, nghề hưởng ưu đãi thuế thu nhập doanh nghiệp theo quy định của Nghị định này hoặc từ 20 tỷ đồng đối với dự án đầu tư mở rộng thực hiện tại các địa bàn quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này;"},{"k":"p","t":"b) Tỷ trọng nguyên giá tài sản cố định khi dự án đầu tư hoàn thành việc giải ngân số vốn đầu tư mở rộng đã đăng ký tăng thêm đạt tối thiểu từ 20% so với tổng nguyên giá tài sản cố định trước khi bắt đầu đầu tư mở rộng;"},{"k":"p","t":"c) Công suất thiết kế tăng thêm khi dự án đầu tư hoàn thành việc giải ngân số vốn đầu tư mở rộng đã đăng ký tối thiểu từ 20% so với công suất thiết kế trước khi bắt đầu đầu tư mở rộng."},{"k":"p","t":"Thời gian miễn thuế, giảm thuế quy định tại khoản này được tính từ năm dự án đầu tư mở rộng hoàn thành số vốn đầu tư đã đăng ký và có thu nhập; trường hợp không có thu nhập chịu thuế trong ba năm đầu, kể từ năm đầu tiên hoàn thành số vốn đầu tư đã đăng ký từ dự án đầu tư mở rộng thì thời gian miễn thuế, giảm thuế được tính từ năm thứ tư dự án đầu tư mở rộng hoàn thành số vốn đầu tư đã đăng ký. Số vốn đầu tư đăng ký đã hoàn thành giải ngân được xác định bằng chênh lệch giữa nguyên giá tổng tài sản cố định trên Bảng cân đối kế toán (Báo cáo tình hình tài chính) của doanh nghiệp tại thời điểm doanh nghiệp hoàn thành dự án đầu tư mở rộng so với thời điểm trước khi thực hiện đầu tư mở rộng. Trong thời gian doanh nghiệp chưa hoàn thành giải ngân số vốn đầu tư đã đăng ký thì doanh nghiệp không được hưởng ưu đãi thuế cho dự án đầu tư mở rộng."},{"k":"p","t":"Bộ trưởng Bộ Tài chính hướng dẫn việc đăng ký số vốn đầu tư để thực hiện dự án đầu tư mở rộng của doanh nghiệp."}]},{"id":"nd320_21","no":21,"code":"Điều 21","title":"Điều 21. Các trường hợp miễn thuế, giảm thuế khác","shortTitle":"Các trường hợp miễn thuế, giảm thuế khác","chuong":"Chương V — ƯU ĐÃI THUẾ THU NHẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp sản xuất, xây dựng, vận tải (trừ đơn vị sự nghiệp, văn phòng thuộc các tập đoàn, tổng công ty không trực tiếp sản xuất, kinh doanh) sử dụng từ 10 đến 100 lao động nữ, trong đó số lao động nữ chiếm trên 50% tổng số lao động có mặt thường xuyên hoặc sử dụng thường xuyên trên 100 lao động nữ mà số lao động nữ chiếm trên 30% tổng số lao động có mặt thường xuyên của doanh nghiệp, được giảm thuế thu nhập doanh nghiệp bằng số chi thêm cho lao động nữ gồm:"},{"k":"p","t":"a) Chi đào tạo lại nghề;"},{"k":"p","t":"b) Chi phí tiền lương và phụ cấp (nếu có) cho cô giáo dạy ở nhà trẻ, mẫu giáo do doanh nghiệp tổ chức và quản lý;"},{"k":"p","t":"c) Chi khám sức khỏe thêm trong năm;"},{"k":"p","t":"d) Chi bồi dưỡng cho lao động nữ sau khi sinh con theo mức chi cụ thể do cơ quan có thẩm quyền quy định;"},{"k":"p","t":"đ) Lương, phụ cấp trả cho thời gian lao động nữ được nghỉ sau khi sinh con, nghỉ cho con bú theo chế độ nhưng vẫn làm việc."},{"k":"p","t":"Số chi thêm cho lao động nữ được giảm thuế thu nhập doanh nghiệp quy định tại khoản này phải đáp ứng điều kiện về hóa đơn, chứng từ thanh toán không dùng tiền mặt quy định tại khoản 1 Điều 9 của Nghị định này."},{"k":"p","t":"2. Doanh nghiệp sử dụng lao động là người dân tộc thiểu số được giảm thuế thu nhập doanh nghiệp bằng số chi thêm cho lao động là người dân tộc thiểu số, bao gồm: Chi đào tạo nghề, tiền hỗ trợ về nhà ở, bảo hiểm xã hội, bảo hiểm y tế cho người dân tộc thiểu số trong trường hợp chưa được Nhà nước hỗ trợ theo chế độ quy định."},{"k":"p","t":"Số chi thêm cho lao động là người dân tộc thiểu số được giảm thuế thu nhập doanh nghiệp quy định tại khoản này phải đáp ứng điều kiện về hóa đơn, chứng từ thanh toán không dùng tiền mặt quy định tại khoản 1 Điều 9 của Nghị định này."},{"k":"p","t":"3. Doanh nghiệp thực hiện chuyển giao công nghệ thuộc lĩnh vực ưu tiên chuyển giao cho tổ chức, cá nhân ở địa bàn có điều kiện kinh tế - xã hội khó khăn, đơn vị sự nghiệp công lập cung cấp dịch vụ sự nghiệp công ở địa bàn có điều kiện kinh tế - xã hội khó khăn được giảm 50% số thuế thu nhập doanh nghiệp tính trên phần thu nhập từ chuyển giao công nghệ, thu nhập từ cung cấp dịch vụ sự nghiệp công ở địa bàn có điều kiện kinh tế - xã hội khó khăn."},{"k":"p","t":"Địa bàn có điều kiện kinh tế - xã hội khó khăn theo quy định tại điểm b khoản 3 Điều 18 của Nghị định này."},{"k":"p","t":"4. Doanh nghiệp quy định tại khoản 2 và khoản 3 Điều 11 của Nghị định này thành lập mới từ hộ kinh doanh (bao gồm cá nhân kinh doanh chuyển đổi lên doanh nghiệp) được miễn thuế thu nhập doanh nghiệp trong 02 năm liên tục kể từ khi có thu nhập chịu thuế."},{"k":"p","t":"a) Thời gian miễn thuế quy định tại khoản này được tính liên tục từ năm đầu tiên doanh nghiệp có thu nhập chịu thuế, trường hợp không có thu nhập chịu thuế trong ba năm đầu, kể từ năm đầu tiên có doanh thu thì thời gian miễn thuế được tính từ năm thứ 04."},{"k":"p","t":"Trường hợp trong kỳ tính thuế đầu tiên của doanh nghiệp có thời gian sản xuất, kinh doanh được miễn thuế dưới 12 tháng, doanh nghiệp được lựa chọn hưởng miễn thuế ngay kỳ tính thuế đó hoặc đăng ký với cơ quan thuế thời gian bắt đầu được miễn thuế từ kỳ tính thuế tiếp theo. Trường hợp doanh nghiệp đăng ký thời gian miễn thuế vào kỳ tính thuế tiếp theo thì phải xác định số thuế phải nộp của kỳ tính thuế đầu tiên để nộp ngân sách nhà nước theo quy định;"},{"k":"p","t":"b) Sau thời gian miễn thuế quy định tại khoản này, trường hợp doanh nghiệp thực hiện dự án đầu tư thuộc ngành, nghề, địa bàn ưu đãi thuế quy định tại Điều 18 của Nghị định này thì tiếp tục được hưởng mức ưu đãi (thuế suất ưu đãi và miễn thuế, giảm thuế) tương ứng theo quy định tại Điều 19 và Điều 20 của Nghị định này."},{"k":"p","t":"Hết thời gian miễn thuế và thời gian hưởng ưu đãi thuế (nếu có) quy định tại khoản này, doanh nghiệp thực hiện mức thuế suất thuế thu nhập doanh nghiệp theo quy định tại khoản 2 và khoản 3 Điều 11 của Nghị định này;"},{"k":"p","t":"c) Hộ kinh doanh, cá nhân kinh doanh quy định tại khoản này phải đáp ứng điều kiện đã đăng ký và hoạt động theo quy định của pháp luật, đồng thời có thời gian sản xuất, kinh doanh liên tục ít nhất là 12 tháng tính đến ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp lần đầu;"},{"k":"p","t":"d) Doanh nghiệp thành lập mới được miễn thuế, ưu đãi thuế theo quy định tại khoản này là doanh nghiệp đăng ký kinh doanh lần đầu, không bao gồm trường hợp doanh nghiệp thành lập mới mà người đại diện theo pháp luật (trừ trường hợp người đại diện theo pháp luật không phải là thành viên góp vốn), thành viên hợp danh hoặc người có số vốn góp cao nhất đã tham gia hoạt động kinh doanh với vai trò là người đại diện theo pháp luật, thành viên hợp danh hoặc người có số vốn góp cao nhất trong các doanh nghiệp đang hoạt động hoặc đã giải thể nhưng chưa được 12 tháng tính từ thời điểm giải thể doanh nghiệp cũ đến thời điểm thành lập doanh nghiệp mới."},{"k":"p","t":"5. Tổ chức khoa học và công nghệ công lập, cơ sở giáo dục đại học công lập hoạt động không vì mục tiêu lợi nhuận được miễn thuế như sau:"},{"k":"p","t":"a) Tổ chức khoa học và công nghệ công lập theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo hoạt động không vì mục tiêu lợi nhuận được miễn thuế đối với thu nhập từ thực hiện nghiên cứu khoa học, phát triển công nghệ và thu nhập từ cung cấp dịch vụ khoa học, công nghệ và đổi mới sáng tạo;"},{"k":"p","t":"b) Cơ sở giáo dục đại học công lập theo quy định của Luật Giáo dục đại học hoạt động không vì mục tiêu lợi nhuận được miễn thuế đối với khoản thu quy định tại Điều 64 của Luật Giáo dục đại học năm 2012 (được sửa đổi, bổ sung tại khoản 32 Điều 1 của Luật sửa đổi, bổ sung một số điều của Luật Giáo dục đại học năm 2018)."}]},{"id":"nd320_22","no":22,"code":"Điều 22","title":"Điều 22. Trích lập Quỹ phát triển khoa học và công nghệ của doanh nghiệp","shortTitle":"Trích lập Quỹ phát triển khoa học và công nghệ của doanh nghiệp","chuong":"Chương V — ƯU ĐÃI THUẾ THU NHẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Việc trích lập Quỹ phát triển khoa học và công nghệ của doanh nghiệp được thực hiện theo quy định tại Điều 17 Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"2. Lãi suất tính lãi đối với số thuế thu hồi tính trên phần Quỹ không sử dụng hết quy định tại khoản 2 Điều 17 của Luật Thuế thu nhập doanh nghiệp là lãi suất trái phiếu kho bạc loại kỳ hạn 05 năm hoặc kỳ hạn 10 năm (trong trường hợp không có loại kỳ hạn 05 năm) được phát hành gần thời điểm thu hồi nhất và thời gian tính lãi là 02 năm, kể cả trường hợp doanh nghiệp hoàn nhập Quỹ trước thời hạn 05 năm."},{"k":"p","t":"3. Hàng năm, doanh nghiệp tự quyết định mức trích lập Quỹ phát triển khoa học và công nghệ theo quy định và lập Báo cáo trích lập, sử dụng Quỹ phát triển khoa học và công nghệ cùng tờ khai quyết toán thuế thu nhập doanh nghiệp."},{"k":"p","t":"Trường hợp doanh nghiệp đã lựa chọn trích lập Quỹ phát triển khoa học, công nghệ và đổi mới sáng tạo, chuyển đổi số theo quy định tại Nghị quyết số 198/2025/QH15 ngày 17 tháng 5 năm 2025 của Quốc hội về một số cơ chế, chính sách đặc biệt phát triển kinh tế tư nhân thì không trích lập Quỹ phát triển khoa học và công nghệ theo quy định tại Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính quy định về nghĩa vụ thuế trong trường hợp tài sản cố định đã được hình thành từ nguồn Quỹ để phục vụ cho hoạt động nghiên cứu khoa học và công nghệ chưa hết hao mòn mà được doanh nghiệp chuyển sang phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp và mẫu Báo cáo trích lập, sử dụng Quỹ phát triển khoa học và công nghệ của doanh nghiệp."}]},{"id":"nd320_23","no":23,"code":"Điều 23","title":"Điều 23. Điều kiện áp dụng ưu đãi thuế thu nhập doanh nghiệp","shortTitle":"Điều kiện áp dụng ưu đãi thuế thu nhập doanh nghiệp","chuong":"Chương V — ƯU ĐÃI THUẾ THU NHẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"Điều kiện áp dụng ưu đãi thuế thu nhập doanh nghiệp thực hiện theo quy định tại Điều 18 Luật Thuế thu nhập doanh nghiệp."},{"k":"p","t":"1. Trong thời gian đang được hưởng ưu đãi thuế thu nhập doanh nghiệp nếu doanh nghiệp thực hiện nhiều hoạt động sản xuất, kinh doanh thì doanh nghiệp phải hạch toán riêng thu nhập từ hoạt động sản xuất, kinh doanh được ưu đãi thuế quy định tại các Điều 4, 19, 20 và 21 của Nghị định này với thu nhập từ hoạt động sản xuất, kinh doanh không được ưu đãi thuế."},{"k":"p","t":"a) Trường hợp trong kỳ tính thuế, doanh nghiệp không hạch toán riêng thu nhập từ hoạt động sản xuất, kinh doanh được hưởng ưu đãi thuế và thu nhập từ hoạt động sản xuất, kinh doanh không được hưởng ưu đãi thuế thì phần thu nhập của hoạt động sản xuất, kinh doanh ưu đãi thuế xác định bằng tổng thu nhập chịu thuế nhân với tỷ lệ phần trăm (%) doanh thu hoặc chi phí được trừ của hoạt động sản xuất, kinh doanh ưu đãi thuế so với tổng doanh thu hoặc tổng chi phí được trừ của doanh nghiệp trong kỳ tính thuế;"},{"k":"p","t":"b) Trường hợp có khoản doanh thu hoặc chi phí được trừ không thể hạch toán riêng được thì khoản doanh thu hoặc chi phí được trừ đó xác định theo tỷ lệ giữa doanh thu hoặc chi phí được trừ của hoạt động sản xuất, kinh doanh hưởng ưu đãi thuế trên tổng doanh thu hoặc chi phí được trừ của doanh nghiệp."},{"k":"p","t":"2. Trong cùng một thời gian, nếu doanh nghiệp được hưởng nhiều mức ưu đãi thuế khác nhau đối với cùng một khoản thu nhập thì doanh nghiệp được lựa chọn áp dụng mức ưu đãi thuế có lợi nhất:"},{"k":"p","t":"a) Trường hợp doanh nghiệp đang trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp mà lựa chọn chuyển sang áp dụng ưu đãi thuế theo tiêu chí khác có mức ưu đãi thuế có lợi hơn thì phải trừ đi thời gian ưu đãi (số năm đã áp dụng miễn thuế, giảm thuế và thuế suất ưu đãi) đã hưởng;"},{"k":"p","t":"b) Trường hợp doanh nghiệp đã hưởng hết ưu đãi thuế thu nhập doanh nghiệp theo quy định của các văn bản quy phạm pháp luật về thuế thu nhập doanh nghiệp mà được cấp Giấy chứng nhận doanh nghiệp công nghệ cao, Giấy chứng nhận doanh nghiệp nông nghiệp ứng dụng công nghệ cao, Giấy chứng nhận doanh nghiệp khoa học và công nghệ, Giấy chứng nhận dự án ứng dụng công nghệ cao, Giấy xác nhận ưu đãi dự án sản xuất sản phẩm công nghiệp hỗ trợ thì được hưởng ưu đãi cho thời gian còn lại. Thời gian ưu đãi còn lại được xác định bằng mức ưu đãi áp dụng cho doanh nghiệp công nghệ cao, doanh nghiệp nông nghiệp ứng dụng công nghệ cao, doanh nghiệp khoa học công nghệ, dự án ứng dụng công nghệ cao, dự án sản xuất sản phẩm công nghiệp hỗ trợ trừ đi thời gian ưu đãi đã hưởng trước đó theo quy định của pháp luật về thuế thu nhập doanh nghiệp (số năm đã áp dụng miễn thuế, giảm thuế và thuế suất ưu đãi);"},{"k":"p","t":"c) Trường hợp doanh nghiệp có khoản thu nhập trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp vừa đáp ứng điều kiện theo ngành, nghề ưu đãi thuế khác hoặc theo địa bàn ưu đãi mà doanh nghiệp lựa chọn hưởng ưu đãi theo ngành, nghề ưu đãi khác hoặc theo địa bàn ưu đãi thuế thì sau khi hết thời gian ưu đãi theo ngành nghề ưu đãi khác hoặc theo địa bàn ưu đãi (bao gồm cả thời gian miễn thuế, giảm thuế và thuế suất ưu đãi) thì được chuyển sang áp dụng mức thuế suất ưu đãi hoặc miễn thuế áp dụng đối với lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp theo quy định tại Nghị định này;"},{"k":"p","t":"d) Trường hợp doanh nghiệp đã lựa chọn hưởng ưu đãi theo quy định tại các điểm a, b và c khoản này thì áp dụng mức ưu đãi đã lựa chọn cho toàn bộ thời gian hưởng ưu đãi còn lại; sau khi lựa chọn doanh nghiệp không được chuyển sang áp dụng ưu đãi theo tiêu chí khác."},{"k":"p","t":"3. Áp dụng ưu đãi thuế thu nhập doanh nghiệp theo tiêu chí địa bàn ưu đãi thuế thu nhập doanh nghiệp:"},{"k":"p","t":"a) Doanh nghiệp có dự án đầu tư sản xuất hưởng ưu đãi thuế theo tiêu chí địa bàn ưu đãi thuế thu nhập doanh nghiệp mà có phát sinh thu nhập từ cung cấp sản phẩm, hàng hóa do dự án sản xuất ra ngoài địa bàn thực hiện dự án đầu tư thì cũng được hưởng ưu đãi thuế đối với khoản thu nhập này;"},{"k":"p","t":"b) Dự án đầu tư trong lĩnh vực thương mại, dịch vụ tại địa bàn ưu đãi thuế thu nhập doanh nghiệp (bao gồm cả khu kinh tế, khu công nghệ cao, khu nông nghiệp ứng dụng công nghệ cao, khu công nghệ số tập trung) chỉ được hưởng ưu đãi đối với thu nhập của dự án đầu tư phát sinh tại địa bàn thực hiện dự án đầu tư."},{"k":"p","t":"Doanh nghiệp có dự án đầu tư trong lĩnh vực kinh doanh vận tải được hưởng ưu đãi thuế thu nhập doanh nghiệp do đáp ứng điều kiện ưu đãi về địa bàn thì doanh nghiệp được hưởng ưu đãi thuế thu nhập doanh nghiệp đối với thu nhập từ hoạt động dịch vụ vận tải căn cứ theo địa bàn thành lập dự án đầu tư thuộc địa bàn được hưởng ưu đãi thuế và có điểm đi hoặc điểm đến thuộc địa bàn thành lập dự án đầu tư."},{"k":"p","t":"4. Doanh nghiệp có dự án đầu tư được hưởng ưu đãi thuế thu nhập doanh nghiệp theo quy định của pháp luật về thuế thu nhập doanh nghiệp tại thời điểm cấp phép hoặc cấp Giấy chứng nhận đăng ký đầu tư hoặc được phép đầu tư theo quy định của pháp luật về đầu tư. Trường hợp pháp luật về thuế thu nhập doanh nghiệp có thay đổi mà doanh nghiệp đáp ứng điều kiện ưu đãi thuế theo quy định của pháp luật mới được sửa đổi, bổ sung thì doanh nghiệp được lựa chọn hưởng ưu đãi về thuế suất và về thời gian miễn thuế, giảm thuế theo quy định của pháp luật tại thời điểm cấp phép, cấp Giấy chứng nhận đăng ký đầu tư, được phép đầu tư hoặc theo quy định của pháp luật mới được sửa đổi, bổ sung cho thời gian còn lại kể từ kỳ tính thuế năm 2025."},{"k":"p","t":"Trường hợp doanh nghiệp có dự án đầu tư mà không thuộc diện được hưởng ưu đãi theo quy định của các văn bản quy phạm pháp luật về thuế thu nhập doanh nghiệp trước thời điểm Nghị định này có hiệu lực nhưng thuộc diện hưởng ưu đãi theo quy định của Nghị định này thì được áp dụng ưu đãi theo quy định của Nghị định này cho thời gian còn lại kể từ kỳ tính thuế năm 2025."},{"k":"p","t":"5. Thu nhập được miễn thuế, ưu đãi thuế trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp tại Nghị định này bao gồm cả thu nhập từ thanh lý tài sản là sản phẩm nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp và thu nhập từ việc bán phế liệu, phế phẩm là sản phẩm nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp."},{"k":"p","t":"6. Trường hợp dự án đầu tư mới của doanh nghiệp tại năm đầu tiên phát sinh doanh thu, thu nhập được hưởng ưu đãi thuế có thời gian dưới 12 tháng, doanh nghiệp được lựa chọn hưởng ưu đãi thuế (thuế suất, thời gian miễn thuế, giảm thuế) đối với dự án đầu tư ngay từ kỳ tính thuế phát sinh doanh thu, thu nhập đó hoặc đăng ký với cơ quan thuế thời gian bắt đầu được hưởng ưu đãi thuế từ kỳ tính thuế tiếp theo. Trường hợp doanh nghiệp đăng ký thời gian áp dụng ưu đãi thuế của dự án đầu tư mới vào kỳ tính thuế tiếp theo thì phải xác định số thuế phải nộp từ dự án đầu tư này của năm đầu tiên phát sinh doanh thu, thu nhập để nộp vào ngân sách nhà nước theo quy định."},{"k":"p","t":"a) Trường hợp doanh nghiệp công nghệ cao, doanh nghiệp nông nghiệp ứng dụng công nghệ cao, doanh nghiệp khoa học và công nghệ trong kỳ tính thuế đầu tiên phát sinh doanh thu hoặc trong kỳ tính thuế đầu tiên có thu nhập có thời gian phát sinh doanh thu, thu nhập được hưởng ưu đãi thuế dưới 12  tháng, doanh nghiệp được lựa chọn hưởng ưu đãi thuế (thuế suất, thời gian miễn thuế, giảm thuế) ngay từ kỳ tính thuế đầu tiên đó hoặc đăng ký với cơ quan thuế thời gian bắt đầu được hưởng ưu đãi thuế từ kỳ tính thuế tiếp theo. Trường hợp doanh nghiệp đăng ký thời gian ưu đãi thuế vào kỳ tính thuế tiếp theo thì phải xác định số thuế phải nộp của kỳ tính thuế đầu tiên để nộp vào ngân sách nhà nước theo quy định."},{"k":"p","t":"b) Trường hợp doanh nghiệp thực hiện chuyển đổi kỳ tính thuế thu nhập doanh nghiệp (bao gồm cả chuyển đổi kỳ tính thuế từ năm dương lịch sang năm tài chính hoặc ngược lại) thì kỳ tính thuế thu nhập doanh nghiệp của năm chuyển đổi không vượt quá 12 tháng. Doanh nghiệp đang trong thời gian được hưởng ưu đãi thuế thu nhập doanh nghiệp mà có thực hiện chuyển đổi kỳ tính thuế thì doanh nghiệp được lựa chọn: Ưu đãi trong năm chuyển đổi kỳ tính thuế hoặc nộp thuế theo mức thuế suất không được hưởng ưu đãi của năm chuyển đổi kỳ tính thuế và hưởng ưu đãi thuế sang năm tiếp theo."},{"k":"p","t":"7. Doanh nghiệp thành lập hoặc doanh nghiệp có dự án đầu tư từ việc sáp nhập, hợp nhất, chia, tách, chuyển đổi chủ sở hữu, chuyển đổi loại hình doanh nghiệp có trách nhiệm thực hiện nghĩa vụ nộp thuế thu nhập doanh nghiệp (kể cả tiền phạt nếu có), đồng thời được kế thừa các ưu đãi thuế thu nhập doanh nghiệp (kể cả các khoản lỗ chưa được kết chuyển) của doanh nghiệp hoặc dự án đầu tư trước khi chuyển đổi, chia, tách, sáp nhập, hợp nhất nếu tiếp tục đáp ứng các điều kiện ưu đãi thuế thu nhập doanh nghiệp, điều kiện chuyển lỗ theo quy định."},{"k":"p","t":"8. Ưu đãi thuế thu nhập doanh nghiệp theo diện dự án đầu tư mới:"},{"k":"p","t":"a) Dự án đầu tư mới được hưởng ưu đãi thuế thu nhập doanh nghiệp quy định tại Điều 19 và Điều 20 của Nghị định này phải được cơ quan Nhà nước có thẩm quyền cấp Giấy chứng nhận đăng ký đầu tư hoặc được chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc cho phép đầu tư theo quy định của pháp luật chuyên ngành."},{"k":"p","t":"Đối với các dự án đầu tư không thuộc diện phải cấp Giấy chứng nhận đăng ký đầu tư, chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc cho phép đầu tư theo quy định của pháp luật chuyên ngành thì việc xác định dự án đầu tư mới căn cứ vào Báo cáo thực hiện dự án đầu tư của doanh nghiệp theo quy định của pháp luật về đầu tư gửi cơ quan đăng ký đầu tư;"},{"k":"p","t":"b) Dự án đầu tư mới được hưởng ưu đãi thuế thu nhập doanh nghiệp theo diện đầu tư mới không bao gồm các các trường hợp sau:"},{"k":"p","t":"b1) Dự án đầu tư hình thành từ việc: Sáp nhập, hợp nhất, chia, tách, chuyển đổi loại hình doanh nghiệp theo quy định của pháp luật."},{"k":"p","t":"b2) Dự án đầu tư hình thành từ việc chuyển đổi chủ sở hữu (bao gồm cả trường hợp thực hiện dự án đầu tư mới nhưng vẫn kế thừa tài sản, địa điểm kinh doanh, ngành nghề kinh doanh của doanh nghiệp cũ để tiếp tục hoạt động sản xuất, kinh doanh; mua lại dự án đầu tư đang hoạt động);"},{"k":"p","t":"c) Đối với doanh nghiệp đang được hưởng ưu đãi thuế thu nhập doanh nghiệp theo diện doanh nghiệp mới thành lập từ dự án đầu tư thì ưu đãi thuế chỉ áp dụng đối với thu nhập từ hoạt động sản xuất, kinh doanh đáp ứng điều kiện ưu đãi đầu tư ghi trong Giấy chứng nhận đăng ký doanh nghiệp hoặc Giấy chứng nhận đầu tư lần đầu của doanh nghiệp. Đối với doanh nghiệp đang hoạt động sản xuất, kinh doanh nếu có sự thay đổi Giấy chứng nhận đăng ký doanh nghiệp hoặc Giấy chứng nhận đầu tư nhưng sự thay đổi đó không làm thay đổi việc đáp ứng các điều kiện ưu đãi thuế của dự án đó theo quy định thì doanh nghiệp tiếp tục được hưởng ưu đãi thuế cho thời gian còn lại hoặc ưu đãi theo diện đầu tư mở rộng nếu đáp ứng điều kiện ưu đãi theo quy định;"},{"k":"p","t":"d) Đối với dự án đầu tư được cấp Giấy chứng nhận đăng ký đầu tư hoặc được phép đầu tư theo quy định của pháp luật về đầu tư mà trong Hồ sơ đăng ký đầu tư lần đầu gửi cơ quan cấp phép đầu tư đã đăng ký số vốn đầu tư, phân kỳ đầu tư kèm tiến độ thực hiện đầu tư, trường hợp các giai đoạn tiếp theo thực tế có thực hiện được coi là dự án thành phần của dự án đầu tư đã được cấp phép lần đầu nếu thực hiện theo tiến độ (trừ trường hợp bất khả kháng, khó khăn do nguyên nhân khách quan trong khâu giải phóng mặt bằng, giải quyết thủ tục hành chính của cơ quan Nhà nước, do thiên tai, hỏa hoạn hoặc khó khăn, bất khả kháng khác) thì các dự án thành phần của dự án đầu tư lần đầu được hưởng ưu đãi thuế cho thời gian còn lại của dự án đầu tư lần đầu tính từ thời điểm dự án thành phần có thu nhập được hưởng ưu đãi."},{"k":"p","t":"Trong thời gian triển khai các dự án thành phần theo từng giai đoạn nêu trên nếu nhà đầu tư được cơ quan quản lý Nhà nước về đầu tư cho phép gia hạn thực hiện dự án theo quy định của pháp luật về đầu tư và doanh nghiệp thực hiện theo đúng thời hạn đã được gia hạn thì cũng được hưởng ưu đãi thuế theo quy định nêu trên."},{"k":"p","t":"9. Thuế suất 15% và 17% quy định tại khoản 2 và khoản 3 Điều 11 và quy định về ưu đãi thuế tại các Điều 4, 19, 20 và 21 của Nghị định này không áp dụng đối với:"},{"k":"p","t":"a) Thu nhập từ chuyển nhượng vốn, chuyển nhượng quyền góp vốn; thu nhập từ chuyển nhượng bất động sản, trừ thu nhập từ đầu tư xây dựng nhà ở xã hội quy định tại điểm s khoản 2 Điều 18 của Nghị định này; thu nhập từ chuyển nhượng dự án đầu tư (trừ chuyển nhượng dự án chế biến khoáng sản), chuyển nhượng quyền tham gia dự án đầu tư, chuyển nhượng quyền thăm dò, khai thác, chế biến khoáng sản; thu nhập từ hoạt động sản xuất, kinh doanh ở ngoài Việt Nam;"},{"k":"p","t":"b) Thu nhập từ hoạt động tìm kiếm, thăm dò và khai thác dầu khí, tài nguyên quý hiếm khác và thu nhập từ hoạt động thăm dò, khai thác khoáng sản;"},{"k":"p","t":"c) Thu nhập từ sản xuất, kinh doanh trò chơi điện tử trên mạng; thu nhập từ sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng chịu thuế tiêu thụ đặc biệt theo quy định của Luật Thuế tiêu thụ đặc biệt, trừ dự án sản xuất, lắp ráp ô tô, máy bay, trực thăng, tàu lượn, du thuyền, lọc hóa dầu;"},{"k":"p","t":"d) Các khoản thu nhập khác quy định tại khoản 3 Điều 3 của Nghị định này không liên quan đến hoạt động sản xuất, kinh doanh được ưu đãi thuế."},{"k":"p","t":"Quy định tại điểm này áp dụng đối với cả trường hợp thực hiện dự án đầu tư đáp ứng điều kiện ưu đãi về ngành, nghề quy định tại khoản 2 và điều kiện ưu đãi về địa bàn ưu đãi đầu tư quy định tại khoản 3 Điều 18 của Nghị định này;"},{"k":"p","t":"e) Trường hợp khác theo hướng dẫn của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"10. Trong thời gian được ưu đãi thuế thu nhập doanh nghiệp, nếu trong kỳ tính thuế mà doanh nghiệp không đáp ứng một trong các điều kiện ưu đãi thuế quy định tại các khoản 1, 3, 4, 5, 6, 8, 12 và 14 Điều 4, khoản 2 và khoản 3 Điều 11, Điều 18, Điều 19, Điều 20, Điều 21 và quy định tại Điều này thì kỳ tính thuế đó không được hưởng ưu đãi thuế mà phải nộp thuế theo mức thuế suất 20% (đối với các trường hợp đang hưởng ưu đãi theo các điều kiện ngành, nghề, địa bàn ưu đãi quy định tại các Điều 18, 19 và 20 của Nghị định này thì năm đó cũng tính vào thời gian ưu đãi mà doanh nghiệp đang đăng ký hưởng)."},{"k":"p","t":"Đối với dự án đầu tư quy định tại điểm g và điểm h khoản 1 Điều 18, điểm c và điểm d khoản 6 Điều 19 của Nghị định này, trường hợp sau 03 năm (đối với dự án đầu tư quy định tại điểm g là 05 năm) kể từ khi được cấp phép đầu tư (không kể bị chậm tiến độ do nguyên nhân khách quan trong khâu giải phóng mặt bằng, giải quyết thủ tục hành chính của cơ quan nhà nước hoặc do thiên tai, địch họa, hỏa hoạn hoặc khó khăn, bất khả kháng khác và được cơ quan cấp Giấy chứng nhận đầu tư chấp thuận, báo cáo Thủ tướng Chính phủ phê duyệt) hoặc năm thứ 04 kể từ năm có doanh thu (đối với dự án đầu tư quy định tại điểm g là năm thứ 06) mà dự án đầu tư của doanh nghiệp không đáp ứng các điều kiện nêu tại điểm g và điểm h khoản 1 Điều 18, điểm c và điểm d khoản 6 Điều 19 của Nghị định này thì không được hưởng ưu đãi thuế thu nhập doanh nghiệp, đồng thời doanh nghiệp phải kê khai, nộp số tiền thuế thu nhập doanh nghiệp đã kê khai hưởng ưu đãi của các năm trước (nếu có) theo quy định của pháp luật và không bị coi là hành vi khai sai theo quy định của pháp luật về quản lý thuế. Trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp, nếu có năm tính thuế mà doanh nghiệp không đáp ứng đủ một trong các điều kiện ưu đãi thuế quy định tại điểm g và điểm h khoản 1 Điều 18 của Nghị định này thì năm đó doanh nghiệp không được hưởng ưu đãi thuế thu nhập doanh nghiệp."},{"k":"p","t":"11. Doanh nghiệp công nghệ cao, doanh nghiệp nông nghiệp ứng dụng công nghệ cao, doanh nghiệp khoa học và công nghệ được hưởng ưu đãi thuế thu nhập doanh nghiệp đối với thu nhập từ hoạt động công nghệ cao, ứng dụng công nghệ cao, kết quả nghiên cứu khoa học và phát triển công nghệ và các khoản thu nhập có liên quan trực tiếp từ hoạt động công nghệ cao, ứng dụng công nghệ cao, kết quả nghiên cứu khoa học và phát triển công nghệ."}]},{"id":"nd320_24","no":24,"code":"Điều 24","title":"Điều 24. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VI — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành kể từ ngày ký ban hành và áp dụng từ kỳ tính thuế thu nhập doanh nghiệp năm 2025. Việc xác định thời gian áp dụng trong một số trường hợp cụ thể như sau:"},{"k":"p","t":"a) Doanh nghiệp được lựa chọn áp dụng quy định về doanh thu, chi phí, ưu đãi thuế, miễn thuế, giảm thuế, chuyển lỗ tại Nghị định này từ đầu kỳ tính thuế năm 2025 hoặc từ ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực hoặc từ ngày Nghị định này có hiệu lực thi hành; trường hợp kỳ tính thuế năm 2025 của doanh nghiệp bắt đầu sau ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực thì áp dụng từ ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực hoặc từ ngày Nghị định này có hiệu lực thi hành;"},{"k":"p","t":"b) Quy định về chứng từ thanh toán không dùng tiền mặt tại điểm c khoản 1 Điều 9 và quy định về chuyển nhượng vốn tại điểm i khoản 3 Điều 12 của Nghị định này áp dụng từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"2. Nghị định này thay thế:"},{"k":"p","t":"a) Nghị định số 218/2013/NĐ-CP ngày 26 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều Luật Thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b) Nghị định số 91/2014/NĐ-CP ngày 01 tháng 10 năm 2014 của Chính phủ sửa đổi, bổ sung một số điều tại các Nghị định về thuế;"},{"k":"p","t":"c) Nghị định số 12/2015/NĐ-CP ngày 12 tháng 02 năm 2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật về thuế và sửa đổi, bổ sung một số điều của các Nghị định về thuế;"},{"k":"p","t":"d) Nghị định số 57/2021/NĐ-CP ngày 04 tháng 6 năm 2021 của Chính phủ bổ sung điểm g khoản 2 Điều 20 Nghị định số 218/2013/NĐ-CP về ưu đãi thuế thu nhập doanh nghiệp đối với dự án sản xuất sản phẩm công nghiệp hỗ trợ."},{"k":"p","t":"3. Trường hợp các văn bản quy phạm pháp luật quy định viện dẫn tại Nghị định này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"nd320_25","no":25,"code":"Điều 25","title":"Điều 25. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương VI — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có dự án đầu tư mới trước ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực còn đang trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp, kể cả trường hợp dự án đầu tư mới chưa được hưởng ưu đãi theo quy định của các văn bản quy phạm pháp luật về thuế thu nhập doanh nghiệp trước thời điểm Nghị định này có hiệu lực thi hành, thì được hưởng ưu đãi cho thời gian còn lại theo quy định của các văn bản quy phạm pháp luật tại thời điểm cấp Giấy chứng nhận đăng ký đầu tư hoặc được chấp thuận chủ trương đầu tư theo quy định của pháp luật về đầu tư hoặc được phép đầu tư theo quy định của pháp luật chuyên ngành; trường hợp mức ưu đãi tại Nghị định này cao hơn mức ưu đãi đang hưởng thì được chuyển sang áp dụng ưu đãi theo Nghị định này cho thời gian còn lại. Thời gian còn lại quy định tại điểm này được tính từ kỳ tính thuế 2025."},{"k":"p","t":"2. Doanh nghiệp có dự án đầu tư mở rộng được cấp hoặc điều chỉnh Giấy chứng nhận đăng ký đầu tư hoặc chấp thuận chủ trương đầu tư hoặc Báo cáo thực hiện dự án đầu tư của doanh nghiệp theo quy định của pháp luật về đầu tư gửi cơ quan đăng ký đầu tư hoặc cho phép đầu tư theo quy định của pháp luật chuyên ngành (sau đây gọi là được phép đầu tư) trước ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực còn đang trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp, kể cả trường hợp dự án đầu tư mở rộng đã được cấp hoặc điều chỉnh Giấy chứng nhận đăng ký đầu tư hoặc được phép đầu tư nhưng chưa được hưởng ưu đãi theo quy định của các văn bản quy phạm pháp luật về thuế thu nhập doanh nghiệp trước thời điểm Nghị định này có hiệu lực thi hành, thì được hưởng ưu đãi cho thời gian còn lại theo quy định của các văn bản quy phạm pháp luật tại thời điểm được cấp hoặc điều chỉnh Giấy chứng nhận đăng ký đầu tư hoặc được phép đầu tư; trường hợp mức ưu đãi tại Nghị định này cao hơn mức ưu đãi đang hưởng (kể cả trường hợp thuộc diện nhưng chưa được hưởng) thì được chuyển sang áp dụng ưu đãi theo Nghị định này cho thời gian còn lại. Thời gian còn lại quy định tại điểm này được tính từ kỳ tính thuế 2025."},{"k":"p","t":"Trường hợp doanh nghiệp có dự án đầu tư mở rộng được cấp hoặc điều chỉnh Giấy chứng nhận đăng ký đầu tư hoặc chấp thuận chủ trương đầu tư hoặc được phép đầu tư trước ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực thì việc xác định ưu đãi và thời điểm tính hưởng ưu đãi thuế đối với đầu tư mở rộng thực hiện theo quy định của văn bản có hiệu lực tại thời điểm được cấp hoặc điều chỉnh Giấy chứng nhận đăng ký đầu tư hoặc chấp thuận chủ trương đầu tư hoặc được phép đầu tư."},{"k":"p","t":"3. Doanh nghiệp có khoản thu nhập từ hoạt động được hưởng ưu đãi theo quy định của văn bản pháp luật về thuế thu nhập doanh nghiệp trước ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực (không bao gồm dự án đầu tư quy định tại khoản 1 và khoản 2 Điều này) mà khoản thu nhập đó không thuộc diện được ưu đãi thuế theo quy định của Luật Thuế thu nhập doanh nghiệp thì không được hưởng ưu đãi thuế kể từ ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực."},{"k":"p","t":"4. Doanh nghiệp có số lỗ phát sinh trước thời điểm Nghị định này có hiệu lực thi hành (bao gồm cả số lỗ từ hoạt động chuyển nhượng bất động sản, chuyển nhượng dự án đầu tư, chuyển nhượng quyền tham gia dự án đầu tư) nhưng còn trong thời hạn chuyển lỗ theo quy định thì tiếp tục được chuyển lỗ theo quy định tại Nghị định này cho thời gian còn lại. Số lỗ từ hoạt động chuyển nhượng bất động sản, chuyển nhượng dự án đầu tư, chuyển nhượng quyền tham gia dự án đầu tư của các kỳ trước không được chuyển vào lãi từ hoạt động sản xuất, kinh doanh được hưởng ưu đãi thuế."}]},{"id":"nd320_26","no":26,"code":"Điều 26","title":"Điều 26. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương VI — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ trưởng Bộ Tài chính quy định chi tiết các Điều, khoản được giao tại Nghị định và hướng dẫn thực hiện Nghị định này theo chức năng, nhiệm vụ, đảm bảo yêu cầu quản lý."},{"k":"p","t":"2. Bộ trưởng Bộ Khoa học và Công nghệ: Xây dựng văn bản quy phạm pháp luật trình cấp có thẩm quyền hoặc ban hành theo thẩm quyền để làm căn cứ thực hiện các chính sách về miễn thuế, ưu đãi thuế quy định tại khoản 4 Điều 4 của Nghị định này và các nội dung có liên quan theo chức năng, nhiệm vụ."},{"k":"p","t":"3. Bộ trưởng Bộ Công Thương: Xây dựng văn bản quy phạm pháp luật trình cấp có thẩm quyền hoặc ban hành theo thẩm quyền văn bản hướng dẫn về sản phẩm công nghiệp hỗ trợ quy định tại điểm c khoản 2 Điều 18 của Nghị định này."},{"k":"p","t":"4. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các tổ chức chính trị - xã hội;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\n\n\n\n\n\n\n\nHồ Đức Phớc"]]}]}],"refs":{"nd320_2":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"taxpayer","label":"Luật 67/2025 — Điều 2: Đối tượng nộp thuế"}],"nd320_4":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"exempt-income","label":"Luật 67/2025 — Điều 4: Thu nhập miễn thuế"}],"nd320_7":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"loss","label":"Luật 67/2025 — chuyển lỗ"}],"nd320_9":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"expenses","label":"Luật 67/2025 — Điều 9: Chi phí được trừ"},{"kind":"guidance","targetSlug":"tt20","targetAnchor":"tt20_3","label":"TT 20/2026 — Điều 3: Hồ sơ khoản chi được trừ"},{"kind":"guidance","targetSlug":"tt99","targetAnchor":"s98","label":"TT 99/2025 — TK 642: Chi phí QLDN"},{"kind":"guidance","targetSlug":"tt133","targetAnchor":"tt133_64","label":"TT 133/2016 — Điều 64: TK 642 (SME)"}],"nd320_10":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"expenses","label":"Luật 67/2025 — Điều 9: Chi phí được trừ"}],"nd320_11":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"rates","label":"Luật 67/2025 — Điều 10: Thuế suất"},{"kind":"guidance","targetSlug":"tt99","targetAnchor":"s101","label":"TT 99/2025 — TK 821: Chi phí thuế TNDN"},{"kind":"guidance","targetSlug":"tt133","targetAnchor":"tt133_67","label":"TT 133/2016 — Điều 67: TK 821 (SME)"}],"nd320_12":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"method","label":"Luật 67/2025 — Điều 11: Phương pháp tính thuế"},{"kind":"guidance","targetSlug":"tt20","targetAnchor":"tt20_5","label":"TT 20/2026 — Điều 5: Thời điểm doanh thu"},{"kind":"guidance","targetSlug":"tt58","targetAnchor":"tt58_5","label":"TT 58/2026 — Điều 5: nộp thuế % (DN siêu nhỏ)"}],"nd320_19":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"incentive-rates","label":"Luật 67/2025 — Điều 12–14: Ưu đãi thuế"},{"kind":"guidance","targetSlug":"tt20","targetAnchor":"tt20_4","label":"TT 20/2026 — Điều 4: Hồ sơ ưu đãi"},{"kind":"guidance","targetSlug":"tt99","targetAnchor":"s67","label":"TT 99/2025 — TK 333: Thuế phải nộp NN"}],"nd320_20":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"incentive-rates","label":"Luật 67/2025 — Điều 12–14: Ưu đãi thuế"}],"nd320_22":[{"kind":"related","targetSlug":"luat-67","targetAnchor":"fund","label":"Luật 67/2025 — Điều 17: Quỹ KHCN"},{"kind":"guidance","targetSlug":"tt20","targetAnchor":"tt20_9","label":"TT 20/2026 — Điều 9: TSCĐ từ Quỹ KHCN"}],"nd320_24":[{"kind":"replaces","targetSlug":null,"label":"Thay thế NĐ 218/2013, 91/2014, 12/2015, 57/2021","note":"(chưa nạp)"}]}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tkbold(h){return h.replace(/(TK\s*\d[\d\.]*)/g,'<span class="tk">$1</span>').replace(/(Tài khoản\s+\d[\d\.]*)/g,'<span class="tk">$1</span>')}
var isNo=function(t){return /^Nợ\s+(các\s+)?TK\b|^Nợ\s+TK/.test(t)};
var isCo=function(t){return /^Có\s+(các\s+)?TK\b|^Có\s+TK/.test(t)};
function jline(t){var h=tkbold(e(t)).replace(/^(Nợ|Có)\s+/,'');return '<div class="line '+(isNo(t)?'no':'co')+'">'+h+'</div>'}
function rtable(rows){var h='<table class="ct">';rows.forEach(function(r,ri){h+='<tr>';r.forEach(function(c){var tg=ri===0?'th':'td';h+='<'+tg+'>'+e(c)+'</'+tg+'>'});h+='</tr>'});return h+'</table>'}

/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
function renderContent(content,q){
  var h='',i=0,n=content.length;
  while(i<n){
    var c=content[i];
    if(c.k==='tbl'){h+=rtable(c.rows);i++;continue}
    var t=(c.t||'').trim();
    if(!t){i++;continue}
    if(isNo(t)||isCo(t)){var blk='<div class="je">';while(i<n&&content[i].k==='p'&&(isNo((content[i].t||'').trim())||isCo((content[i].t||'').trim()))){blk+=jline((content[i].t||'').trim());i++}h+=blk+'</div>';continue}
    if(/^Bên Nợ\s*:?$/.test(t)){h+='<div class="lbl lbl-no">'+e(t.replace(/:$/,''))+'</div>';i++;continue}
    if(/^Bên Có\s*:?$/.test(t)){h+='<div class="lbl lbl-co">'+e(t.replace(/:$/,''))+'</div>';i++;continue}
    if(/^Số dư bên (Nợ|Có)/.test(t)){h+='<div class="lbl lbl-du">'+tkbold(e(t))+'</div>';i++;continue}
    if(/^\d+\.\s/.test(t)&&t.length<140){h+='<p class="p-num">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^\d+\.\d+\.?\s/.test(t)){h+='<p class="p-sub">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^[a-zđ]\)\s/.test(t)){h+='<p class="p-sub">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^[-+•]\s/.test(t)){h+='<p class="p-dash">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    h+='<p>'+hl(tkbold(e(t)),q)+'</p>';i++;
  }
  return autolink(h||'<p style="color:var(--mut)">(Mục này không có nội dung văn bản.)</p>');
}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:3px 14px;font-size:11px;font-style:italic;color:var(--mut)">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px;font-size:12px;color:var(--mut)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span>›</span>'+e(a.muc):'')+'<span>›</span><b>'+e(a.code)+'</b></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">'+renderContent(a.content||[],q)+'</div>'+renderRefs(id);
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  if(!document.getElementById('s-main').classList.contains('on'))tab('main',document.querySelector('.tab'));
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:21px;font-weight:800;color:#1e3a8a;margin-bottom:5px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12.5px;color:var(--mut);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="scard"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="scard"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div><div class="scard"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12.5px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 14px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
function initHash(){var hh=window.location.hash.slice(1);if(hh&&D.outline.find(function(a){return a.id===hh}))show(hh);else if(D.outline.length)show(D.outline[0].id)}
buildSb();buildHome();initHash();
</script></body></html>
