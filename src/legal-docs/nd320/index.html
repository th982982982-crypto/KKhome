n đất như trụ sở văn phòng, nhà xưởng, cửa hàng phục vụ cho hoạt động sản xuất, kinh doanh của doanh nghiệp nếu đáp ứng các điều kiện như sau: Có Giấy chứng nhận quyền sử dụng đất mang tên doanh nghiệp (trong trường hợp đất thuộc quyền sử dụng của doanh nghiệp) hoặc có hợp đồng thuê đất, mượn đất giữa doanh nghiệp với đơn vị, cá nhân có đất và đại diện doanh nghiệp phải chịu trách nhiệm trước pháp luật về tính chính xác của hợp đồng (trong trường hợp đất đi thuê hoặc đi mượn); có hóa đơn thanh toán khối lượng công trình xây dựng bàn giao kèm theo hợp đồng xây dựng công trình, thanh lý hợp đồng (nếu có), quyết toán giá trị công trình xây dựng mang tên, địa chỉ và mã số thuế của doanh nghiệp; công trình trên đất được quản lý, theo dõi hạch toán theo quy định hiện hành về quản lý tài sản cố định;"},{"k":"p","t":"e3) Trường hợp tài sản cố định thuộc quyền sở hữu của doanh nghiệp đang dùng cho sản xuất, kinh doanh nhưng phải tạm thời dừng do sản xuất theo mùa vụ với thời gian dưới 09 tháng; tạm thời dừng để sửa chữa, để di dời di chuyển địa điểm, để bảo trì, bảo dưỡng theo định kỳ, với thời gian dưới 12 tháng, sau đó tài sản cố định tiếp tục đưa vào phục vụ cho hoạt động sản xuất kinh doanh thì trong khoảng thời gian tạm dừng đó doanh nghiệp được trích khấu hao và khoản chi phí khấu hao tài sản cố định trong thời gian tạm dừng được tính vào chi phí được trừ khi xác định thu nhập chịu thuế."},{"k":"p","t":"Doanh nghiệp phải lưu giữ và cung cấp đầy đủ hồ sơ, nguyên nhân của việc tạm dừng tài sản cố định khi cơ quan thuế yêu cầu;"},{"k":"p","t":"e4) Quyền sử dụng đất lâu dài không được trích khấu hao và phân bổ vào chi phí được trừ khi xác định thu nhập chịu thuế. Quyền sử dụng đất có thời hạn nếu có đầy đủ hóa đơn, chứng từ và thực hiện đúng quy định của pháp luật, có tham gia vào hoạt động sản xuất, kinh doanh thì được phân bổ dần vào chi phí được trừ theo thời hạn được phép sử dụng đất ghi trong Giấy chứng nhận quyền sử dụng đất hoặc thời gian cho thuê đất ghi trong hợp đồng giao đất/cho thuê đất (bao gồm cả trường hợp đầu tư xây dựng mới, dừng hoạt động để sửa chữa, để đầu tư xây dựng mới)."},{"k":"p","t":"Trường hợp doanh nghiệp mua tài sản cố định hữu hình là nhà cửa, vật kiến trúc gắn liền với quyền sử dụng đất lâu dài thì giá trị quyền sử dụng đất phải xác định riêng và ghi nhận là tài sản cố định vô hình; tài sản cố định hữu hình là nhà cửa, vật kiến trúc thì nguyên giá là giá mua thực tế phải trả cộng với các khoản chi phí liên quan trực tiếp đến việc đưa tài sản cố định hữu hình vào sử dụng. Giá trị quyền sử dụng đất được xác định theo giá ghi trên hợp đồng mua bất động sản (tài sản) phù hợp với giá thị trường nhưng không được thấp hơn giá đất tại bảng giá đất do Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương quy định tại thời điểm mua tài sản. Trường hợp doanh nghiệp mua tài sản cố định hữu hình là nhà cửa, vật kiến trúc gắn liền với quyền sử dụng đất lâu dài không tách riêng được giá trị quyền sử dụng đất thì giá trị quyền sử dụng đất được xác định theo giá đất tại bảng giá đất do Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương quy định tại thời điểm mua tài sản."},{"k":"p","t":"Trường hợp doanh nghiệp có chuyển nhượng một phần vốn hoặc chuyển nhượng toàn bộ doanh nghiệp khác theo quy định của pháp luật, nếu có chuyển giao tài sản thì doanh nghiệp nhận chuyển nhượng chỉ được trích khấu hao tài sản cố định vào chi phí được trừ đối với các tài sản chuyển giao đủ điều kiện trích khấu hao theo giá trị còn lại trên sổ sách kế toán tại doanh nghiệp chuyển nhượng."},{"k":"p","t":"7. Các khoản chi phí trích trước theo kỳ hạn, theo chu kỳ mà đến hết kỳ hạn, hết chu kỳ chưa chi hoặc chi không hết, cụ thể như sau:"},{"k":"p","t":"a) Các khoản trích trước bao gồm: Khoản trích trước về sửa chữa lớn tài sản cố định theo quy định của pháp luật kế toán; các khoản trích trước đối với hoạt động đã tính doanh thu nhưng còn tiếp tục phải thực hiện nghĩa vụ theo hợp đồng (kể cả trường hợp doanh nghiệp có hoạt động cho thuê tài sản, hoạt động kinh doanh dịch vụ trong nhiều năm nhưng có thu tiền trước của khách hàng và đã tính toàn bộ vào doanh thu của năm thu tiền) và các khoản trích trước khác;"},{"k":"p","t":"b) Trường hợp doanh nghiệp có hoạt động sản xuất, kinh doanh đã ghi nhận doanh thu tính thuế thu nhập doanh nghiệp nhưng chưa phát sinh đầy đủ chi phí thì được trích trước các khoản chi phí theo quy định vào chi phí được trừ tương ứng với doanh thu đã ghi nhận khi xác định thu nhập chịu thuế thu nhập doanh nghiệp. Khi kết thúc hợp đồng, doanh nghiệp phải tính toán xác định chính xác số chi phí thực tế căn cứ các hóa đơn, chứng từ hợp pháp thực tế đã phát sinh để điều chỉnh tăng chi phí (trường hợp chi phí thực tế phát sinh lớn hơn số đã trích trước) hoặc giảm chi phí (trường hợp chi phí thực tế phát sinh nhỏ hơn số đã trích trước) vào kỳ tính thuế kết thúc hợp đồng."},{"k":"p","t":"8. Chi cho người lao động thuộc một trong các trường hợp sau:"},{"k":"p","t":"a) Chi tiền lương, tiền công và các khoản phải trả khác cho người lao động doanh nghiệp đã hạch toán vào chi phí sản xuất kinh doanh trong kỳ nhưng thực tế không chi trả hoặc không có chứng từ thanh toán theo quy định của pháp luật;"},{"k":"p","t":"b) Các khoản tiền lương, tiền công, tiền thưởng cho người lao động không được ghi cụ thể điều kiện được hưởng và mức được hưởng tại một trong các hồ sơ sau: Hợp đồng lao động hoặc văn bản của doanh nghiệp nước ngoài cử người sang làm việc tại Việt Nam (đối với trường hợp người nước ngoài được điều chuyển hoặc di chuyển trong nội bộ Tập đoàn, giữa công ty mẹ với công ty con); Thoả ước lao động tập thể; Quy chế tài chính của Công ty, Tổng công ty, Tập đoàn; Quy chế thưởng do Chủ tịch Hội đồng quản trị, Tổng giám đốc, Giám đốc quy định theo quy chế tài chính của Công ty, Tổng công ty, Tập đoàn."},{"k":"p","t":"b1) Trường hợp doanh nghiệp ký hợp đồng lao động với người nước ngoài trong đó có ghi khoản chi về tiền học cho con của người nước ngoài học tại Việt Nam theo bậc học từ mầm non đến trung học phổ thông được doanh nghiệp trả có tính chất tiền lương, tiền công và có đầy đủ hóa đơn, chứng từ theo quy định thì được tính vào chi phí được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b2) Trường hợp doanh nghiệp ký hợp đồng lao động với người lao động trong đó có ghi khoản chi về tiền nhà do doanh nghiệp trả cho người lao động, khoản chi trả này có tính chất tiền lương, tiền công và có đầy đủ hóa đơn, chứng từ theo quy định thì được tính vào chi phí được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b3) Trường hợp doanh nghiệp Việt Nam ký hợp đồng với doanh nghiệp nước ngoài trong đó nêu rõ doanh nghiệp Việt Nam phải chịu các chi phí về chỗ ở cho các chuyên gia nước ngoài trong thời gian công tác ở Việt Nam thì tiền thuê nhà cho các chuyên gia nước ngoài làm việc tại Việt Nam do doanh nghiệp Việt Nam chi trả được tính vào chi phí được trừ khi xác định thu nhập chịu thuế thu nhập doanh nghiệp;"},{"k":"p","t":"c) Chi tiền lương, tiền công và các khoản phụ cấp phải trả cho người lao động nhưng hết thời hạn nộp hồ sơ quyết toán thuế năm thực tế chưa chi; trừ trường hợp doanh nghiệp có trích lập quỹ lương dự phòng. Mức dự phòng hàng năm do doanh nghiệp quyết định nhưng không quá 17% quỹ tiền lương thực hiện."},{"k":"p","t":"Việc trích lập quỹ lương dự phòng phải đảm bảo sau khi trích lập, doanh nghiệp không bị lỗ, nếu doanh nghiệp bị lỗ thì không được trích đủ 17%. Trường hợp năm trước doanh nghiệp có trích lập quỹ lương dự phòng mà sau 6 tháng kể từ ngày kết thúc kỳ tính thuế doanh nghiệp chưa sử dụng hoặc sử dụng không hết quỹ lương dự phòng thì doanh nghiệp phải tính giảm chi phí của năm sau;"},{"k":"p","t":"d) Tiền lương, tiền công của chủ doanh nghiệp tư nhân, chủ công ty trách nhiệm hữu hạn một thành viên do một cá nhân làm chủ; thù lao trả cho các sáng lập viên, thành viên của hội đồng thành viên, hội đồng quản trị mà những người này không trực tiếp tham gia điều hành sản xuất, kinh doanh;"},{"k":"p","t":"đ) Phần chi trang phục bằng hiện vật cho người lao động không có hóa đơn, chứng từ. Phần chi trang phục bằng tiền cho người lao động vượt quá 05 triệu đồng/người/năm."},{"k":"p","t":"Trường hợp doanh nghiệp có chi trang phục cả bằng tiền và hiện vật cho người lao động để được tính vào chi phí được trừ thì mức chi tối đa đối với chi bằng tiền không vượt quá 05 triệu đồng/người/năm, bằng hiện vật phải có hóa đơn, chứng từ;"},{"k":"p","t":"e) Chi thưởng sáng kiến, cải tiến mà doanh nghiệp không có quy chế quy định cụ thể về việc chi thưởng sáng kiến, cải tiến và không có hội đồng nghiệm thu sáng kiến, cải tiến;"},{"k":"p","t":"g) Chi phụ cấp phương tiện đi lại đi nghỉ phép không đúng theo quy định của Bộ luật Lao động;"},{"k":"p","t":"h) Chi phụ cấp cho người lao động đi công tác, chi phí đi lại và tiền thuê chỗ ở cho người lao động đi công tác nếu có đầy đủ hóa đơn, chứng từ được tính vào chi phí được trừ khi xác định thu nhập chịu thuế. Trường hợp doanh nghiệp cử người lao động đi công tác (bao gồm công tác trong nước và công tác nước ngoài) nếu có phát sinh chi phí từ 05 triệu đồng trở lên mà các khoản chi phí này được thanh toán bởi cá nhân bằng dịch vụ thanh toán không dùng tiền mặt thì xác định đủ điều kiện là hình thức thanh toán không dùng tiền mặt của doanh nghiệp và tính vào chi phí được trừ nếu đáp ứng đủ các điều kiện sau: Có hóa đơn, chứng từ theo quy định của pháp luật về kế toán, pháp luật về hóa đơn, chứng từ do người cung cấp hàng hóa, dịch vụ giao xuất; doanh nghiệp có quyết định hoặc văn bản cử người lao động đi công tác; quy chế tài chính hoặc quy chế nội bộ của doanh nghiệp cho phép người lao động được phép thanh toán khoản công tác phí, mua vé phương tiện đi lại bởi cá nhân bằng dịch vụ thanh toán không dùng tiền mặt và khoản chi này sau đó được doanh nghiệp thanh toán lại cho người lao động."},{"k":"p","t":"Trường hợp doanh nghiệp có khoán tiền đi lại, tiền ở, phụ cấp cho người lao động đi công tác và thực hiện đúng theo quy chế tài chính hoặc quy chế nội bộ của doanh nghiệp thì được tính vào chi phí được trừ khoản chi khoán tiền đi lại, tiền ở, tiền phụ cấp;"},{"k":"p","t":"i) Các khoản chi được trừ sau đây nhưng nếu chi không đúng đối tượng, không đúng mục đích:"},{"k":"p","t":"i1) Các khoản chi thêm cho lao động nữ, bao gồm: Chi cho công tác đào tạo lại nghề cho lao động nữ trong trường hợp nghề cũ không còn phù hợp phải chuyển đổi sang nghề khác theo quy hoạch phát triển của doanh nghiệp, bao gồm học phí (nếu có) cộng với chênh lệch tiền lương ngạch bậc (đảm bảo 100% lương cho người đi học); chi phí tiền lương và phụ cấp (nếu có) cho giáo viên dạy ở nhà trẻ, mẫu giáo do doanh nghiệp tổ chức và quản lý; chi phí tổ chức khám sức khỏe thêm trong năm như khám bệnh nghề nghiệp, mãn tính hoặc phụ khoa cho nữ công nhân viên; chi bồi dưỡng cho lao động nữ sau khi sinh con; phụ cấp làm thêm giờ cho lao động nữ trong trường hợp vì lý do khách quan người lao động nữ không nghỉ sau khi sinh con, nghỉ cho con bú mà ở lại làm việc cho doanh nghiệp được trả theo chế độ hiện hành, kể cả trường hợp trả lương theo sản phẩm mà lao động nữ vẫn làm việc trong thời gian không nghỉ theo chế độ;"},{"k":"p","t":"i2) Các khoản chi thêm cho lao động là người dân tộc thiểu số được tính vào chi phí được trừ bao gồm: Học phí đi học (nếu có) cộng với chênh lệch tiền lương ngạch bậc (đảm bảo 100% lương cho người đi học); tiền hỗ trợ về nhà ở, bảo hiểm xã hội, bảo hiểm y tế cho người dân tộc thiểu số trong trường hợp chưa được Nhà nước hỗ trợ theo chế độ quy định;"},{"k":"p","t":"k) Chi trả trợ cấp mất việc làm, trợ cấp thôi việc, chi bồi thường, trợ cấp cho người bị tai nạn lao động, bệnh nghề nghiệp cho người lao động không theo đúng quy định;"},{"k":"p","t":"l) Chi phí mua thẻ hội viên sân gôn, chi phí chơi gôn."},{"k":"p","t":"9. Chi trả lãi tiền vay tương ứng với phần vốn điều lệ (đối với doanh nghiệp tư nhân là vốn đầu tư) đã đăng ký còn thiếu theo tiến độ góp vốn ghi trong điều lệ của doanh nghiệp nhưng tiến độ góp vốn tối đa không được vượt quá thời hạn góp vốn theo quy định của Luật Doanh nghiệp kể cả trường hợp doanh nghiệp đã đi vào sản xuất kinh doanh; chi trả lãi tiền vay trong quá trình đầu tư đã được ghi nhận vào giá trị của tài sản, giá trị công trình đầu tư."},{"k":"p","t":"a) Trường hợp doanh nghiệp đã góp đủ vốn điều lệ, trong quá trình kinh doanh có khoản chi trả lãi tiền vay để đầu tư vào doanh nghiệp khác thì khoản chi này được tính vào chi phí được trừ khi xác định thu nhập chịu thuế;"},{"k":"p","t":"b) Chi trả lãi tiền vay tương ứng với vốn điều lệ còn thiếu theo tiến độ góp vốn ghi trong điều lệ của doanh nghiệp nhưng tiến độ góp vốn tối đa không được vượt quá thời hạn góp vốn theo quy định của Luật Doanh nghiệp không được trừ khi xác định thu nhập chịu thuế được xác định như sau:"},{"k":"p","t":"b1) Trường hợp số tiền vay nhỏ hơn hoặc bằng số vốn điều lệ còn thiếu thì toàn bộ lãi tiền vay là khoản chi không được trừ;"},{"k":"p","t":"b2) Trường hợp số tiền vay lớn hơn số vốn điều lệ còn thiếu theo tiến độ góp vốn thì xác định như sau: Nếu doanh nghiệp phát sinh nhiều khoản vay thì khoản chi trả lãi tiền vay không được trừ bằng tỷ lệ (%) giữa vốn điều lệ còn thiếu trên tổng số tiền vay nhân với tổng số lãi vay; nếu doanh nghiệp chỉ phát sinh một khoản vay thì khoản chi trả lãi tiền vay không được trừ bằng số vốn điều lệ còn thiếu nhân với lãi suất của khoản vay nhân với thời gian góp vốn điều lệ còn thiếu."},{"k":"p","t":"10. Phần chi phí trả lãi tiền vay vốn sản xuất kinh doanh của đối tượng không phải là tổ chức tín dụng vượt quá mức quy định tại Bộ luật Dân sự."},{"k":"p","t":"11. Phần chi phí được phép thu hồi vượt quá tỷ lệ quy định tại hợp đồng dầu khí được duyệt; trường hợp hợp đồng dầu khí không quy định về tỷ lệ thu hồi chi phí thì phần chi phí vượt trên 35% không được tính vào chi phí được trừ; các chi phí không được tính vào chi phí thu hồi gồm:"},{"k":"p","t":"a) Các khoản chi quy định tại Điều 10 của Nghị định này;"},{"k":"p","t":"b) Chi phí phát sinh trước khi hợp đồng dầu khí có hiệu lực, trừ trường hợp đã được thỏa thuận trong hợp đồng dầu khí hoặc theo quyết định của Thủ tướng Chính phủ;"},{"k":"p","t":"c) Các loại hoa hồng dầu khí và các khoản chi khác không tính vào chi phí thu hồi theo hợp đồng;"},{"k":"p","t":"d) Chi lãi đối với khoản đầu tư cho tìm kiếm, thăm dò, phát triển mỏ và khai thác dầu khí;"},{"k":"p","t":"đ) Tiền phạt, tiền bồi thường thiệt hại;"},{"k":"p","t":"e) Các khoản chi khác không được tính vào chi phí thu hồi theo Luật Dầu khí, thỏa thuận tại hợp đồng dầu khí, chi phí vượt tỷ lệ để lại quy định tại Điều ước quốc tế."},{"k":"p","t":"Bộ trưởng Bộ Tài chính quy định chi tiết khoản này."},{"k":"p","t":"12. Thuế giá trị gia tăng đầu vào đã được khấu trừ hoặc hoàn thuế; thuế giá trị gia tăng nộp theo phương pháp khấu trừ; thuế giá trị gia tăng đầu vào của tài sản cố định là ô tô từ 9 chỗ ngồi trở xuống vượt mức quy định được khấu trừ theo quy định tại các văn bản pháp luật về thuế giá trị gia tăng; thuế thu nhập doanh nghiệp, trừ trường hợp doanh nghiệp nộp thay thuế thu nhập doanh nghiệp của doanh nghiệp nước ngoài mà theo thoả thuận tại hợp đồng với doanh nghiệp nước ngoài, doanh thu của doanh nghiệp nước ngoài nhận được không bao gồm thuế thu nhập doanh nghiệp; thuế thu nhập cá nhân, trừ trường hợp doanh nghiệp ký hợp đồng lao động quy định tiền lương, tiền công trả cho người lao động không bao gồm thuế thu nhập cá nhân; tiền chậm nộp theo quy định pháp luật về quản lý thuế."},{"k":"p","t":"Phần thuế giá trị gia tăng nộp theo phương pháp khấu trừ quy định tại điểm này không bao gồm phần thuế giá trị gia tăng đầu ra của hàng biếu, hàng tặng không thu tiền theo quy định của pháp luật về thuế giá trị gia tăng phục vụ hoạt động sản xuất, kinh doanh của doanh nghiệp; phần thuế giá trị gia tăng phải nộp phát sinh của hàng hóa, dịch vụ sử dụng để tài trợ theo quy định tại điểm đ khoản 2 Điều 9 của Nghị định này; phần thuế giá trị gia tăng của hàng hóa, dịch vụ đầu vào có liên quan trực tiếp đến sản xuất, kinh doanh của doanh nghiệp chưa được khấu trừ hết nhưng không thuộc trường hợp hoàn thuế. Số thuế giá trị gia tăng đầu vào khi đã được tính vào chi phí được trừ thì không được khấu trừ với số thuế giá trị gia tăng đầu ra."},{"k":"p","t":"13. Chi đóng góp hình thành nguồn chi phí quản lý cho cấp trên; phần chi đóng góp vào các Hội được thành lập theo quy định của Nghị định số 126/2024/NĐ-CP ngày 08 tháng 10 năm 2024 của Chính phủ vượt quá mức quy định của Hội."},{"k":"p","t":"14. Chi trả tiền điện, tiền nước đối với những hợp đồng điện, nước do chủ sở hữu là tổ chức, hộ gia đình, cá nhân cho thuê địa điểm sản xuất, kinh doanh ký trực tiếp với đơn vị cung cấp điện, nước không có đủ chứng từ thuộc một trong các trường hợp sau:"},{"k":"p","t":"a) Trường hợp doanh nghiệp thuê địa điểm sản xuất, kinh doanh trực tiếp thanh toán tiền điện, nước cho nhà cung cấp điện, nước không có các hóa đơn thanh toán tiền điện, nước và hợp đồng thuê địa điểm sản xuất, kinh doanh;"},{"k":"p","t":"b) Trường hợp doanh nghiệp thuê địa điểm sản xuất, kinh doanh thanh toán tiền điện, nước với chủ sở hữu cho thuê địa điểm sản xuất, kinh doanh không có chứng từ thanh toán tiền điện, nước đối với người cho thuê địa điểm sản xuất, kinh doanh phù hợp với số lượng điện, nước thực tế tiêu thụ và hợp đồng thuê địa điểm sản xuất kinh doanh."},{"k":"p","t":"15. Phần chi phí thuê tài sản cố định vượt quá mức phân bổ theo số năm mà bên đi thuê trả tiền trước."},{"k":"p","t":"a) Đối với chi phí sửa chữa, nâng cấp tài sản cố định đi thuê mà trong hợp đồng thuê tài sản quy định bên đi thuê có trách nhiệm sửa chữa, nâng cấp tài sản trong thời gian thuê thì chi phí sửa chữa, nâng cấp tài sản cố định đi thuê được phép hạch toán vào chi phí hoặc phân bổ dần vào chi phí nhưng thời gian tối đa không quá 03 năm;"},{"k":"p","t":"b) Trường hợp doanh nghiệp có chi các khoản chi phí để có các tài sản không thuộc tài sản cố định như: Chi về mua và sử dụng các tài liệu kỹ thuật, bằng sáng chế, giấy phép chuyển giao công nghệ, nhãn hiệu thương mại, lợi thế kinh doanh, quyền sử dụng thương hiệu thì các khoản chi này được phân bổ dần vào chi phí kinh doanh nhưng tối đa không quá 03 năm;"},{"k":"p","t":"c) Trường hợp doanh nghiệp có góp vốn bằng giá trị lợi thế kinh doanh, giá trị quyền sử dụng thương hiệu thì giá trị lợi thế kinh doanh, giá trị quyền sử dụng thương hiệu góp vốn không tính vào chi phí được trừ khi xác định thu nhập chịu thuế."},{"k":"p","t":"16. Lỗ chênh lệch tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ cuối kỳ tính thuế, bao gồm chênh lệch tỷ giá hối đoái do đánh giá lại số dư cuối năm là tiền mặt, tiền gửi, tiền đang chuyển, các khoản nợ phải thu có gốc ngoại tệ (trừ lỗ chênh lệch tỷ giá hối đoái do đánh giá lại các khoản nợ phải trả có gốc ngoại tệ cuối kỳ tính thuế)."},{"k":"p","t":"a) Trong giai đoạn sản xuất, kinh doanh, kể cả việc đầu tư xây dựng để hình thành tài sản cố định của doanh nghiệp đang hoạt động, chênh lệch tỷ giá hối đoái phát sinh từ các giao dịch bằng ngoại tệ của các khoản mục tiền tệ có gốc ngoại tệ sẽ được hạch toán vào doanh thu hoạt động tài chính hoặc chi phí tài chính trong kỳ tính thuế;"},{"k":"p","t":"b) Đối với khoản nợ phải thu, khoản cho vay, tiền mặt, tiền gửi, tiền đang chuyển có gốc ngoại tệ phát sinh trong kỳ, chênh lệch tỷ giá hối đoái được tính vào chi phí được trừ là khoản chênh lệch giữa tỷ giá tại thời điểm phát sinh với tỷ giá tại thời điểm ghi nhận ban đầu."},{"k":"p","t":"17. Chi tài trợ, chi ủng hộ địa phương, chi ủng hộ các đoàn thể, tổ chức xã hội, chi từ thiện, trừ chi ủng hộ, tài trợ quy định tại điểm đ khoản 2 Điều 9 của Nghị định này."},{"k":"p","t":"18. Chi về đầu tư xây dựng cơ bản trong giai đoạn đầu tư để hình thành tài sản cố định."},{"k":"p","t":"a) Khi bắt đầu hoạt động sản xuất, kinh doanh, doanh nghiệp chưa phát sinh doanh thu nhưng có phát sinh các khoản chi thường xuyên để duy trì hoạt động sản xuất, kinh doanh của doanh nghiệp (không phải là các khoản chi đầu tư xây dựng để hình thành tài sản cố định) mà các khoản chi này đáp ứng các điều kiện theo quy định thì khoản chi này được tính vào chi phí được trừ khi xác định thu nhập chịu thuế;"},{"k":"p","t":"b) Trường hợp trong giai đoạn đầu tư, doanh nghiệp có phát sinh khoản chi trả tiền vay thì khoản chi này được tính vào giá trị đầu tư. Trường hợp trong giai đoạn đầu tư xây dựng cơ bản, doanh nghiệp phát sinh cả khoản chi trả lãi tiền vay và thu từ lãi tiền gửi thì được bù trừ giữa khoản chi trả lãi tiền vay và thu từ lãi tiền gửi, sau khi bù trừ phần chênh lệch còn lại ghi giảm giá trị đầu tư."},{"k":"p","t":"19. Khoản chi liên quan trực tiếp đến việc phát hành cổ phiếu (trừ cổ phiếu thuộc loại nợ phải trả) và cổ tức của cổ phiếu (trừ cổ tức của cổ phiếu thuộc loại nợ phải trả), mua cổ phiếu quỹ, cổ phiếu mua lại của chính mình và các khoản chi khác liên quan trực tiếp đến việc tăng, giảm vốn chủ sở hữu của doanh nghiệp."},{"k":"p","t":"20. Số tiền cấp quyền khai thác khoáng sản vượt mức tiền khai thác khoáng sản phải nộp hàng năm theo quy định của pháp luật về khoáng sản."},{"k":"p","t":"a) Khi thực hiện quyết toán số tiền cấp quyền khai thác khoáng sản theo quy định của pháp luật về khoáng sản, trường hợp số tiền đã nộp nhỏ hơn số phải nộp sau khi quyết toán thì số tiền cấp quyền khai thác khoáng sản nộp bổ sung được tính vào chi phí được trừ tại kỳ tính thuế phát sinh khoản nộp bổ sung của doanh nghiệp khai thác, thu hồi khoáng sản."},{"k":"p","t":"b) Trường hợp các giấy phép khai thác khoáng sản, văn bản cho phép khai thác, thu hồi khoáng sản còn thời hạn khai thác, thu hồi khoáng sản tính đến thời điểm Nghị định này có hiệu lực thì tiền cấp quyền khai thác khoáng sản tính vào chi phí được trừ được xác định theo số tiền cấp quyền khai thác khoáng sản còn phải nộp sau quyết toán theo quy định của pháp luật về khoáng sản phân bổ đều cho số năm còn được khai thác, thu hồi."},{"k":"p","t":"c) Đối với tiền cấp quyền khai thác khoáng sản đã tính vào chi phí được trừ theo kỳ tính thuế trước khi Nghị định này có hiệu lực thi hành thì không điều chỉnh lại."},{"k":"p","t":"21. Các khoản chi của hoạt động kinh doanh: Ngân hàng, bảo hiểm, xổ số, chứng khoán, hợp đồng BT, BOT, BTO và một số hoạt động kinh doanh đặc thù khác không đúng hoặc vượt mức quy định của cơ quan có thẩm quyền."},{"k":"p","t":"a) Đối với chi phí trả lãi tiền vay của các hợp đồng BT, BOT, BTO:"},{"k":"p","t":"a1) Doanh nghiệp BT, BOT, BTO được tính vào chi phí được trừ đối với khoản chi trả lãi tiền vay của các hợp đồng BT, BOT, BTO theo thực tế phát sinh trong kỳ. Trường hợp doanh nghiệp lựa chọn áp dụng phân bổ chi phí lãi vay của các hợp đồng BT, BOT, BTO theo doanh thu thì chi phí lãi vay trong kỳ của các hợp đồng BT, BOT, BTO được xác định theo công thức sau:"},{"k":"tbl","rows":[["Chi phí lãi \nvay trong kỳ","=","Tổng chi phí lãi vay theo \nphương án tài chính","x","Doanh thu thực\nhiện trong kỳ"],["Chi phí lãi \nvay trong kỳ","=","Tổng doanh thu theo \nphương án tài chính","x","Doanh thu thực\nhiện trong kỳ"]]},{"k":"p","t":"a2) Trường hợp doanh nghiệp đã lựa chọn áp dụng chi phí trả lãi tiền vay phân bổ theo doanh thu thì việc áp dụng phương pháp phân bổ chi phí trả lãi tiền vay được áp dụng trong suốt thời gian thực hiện hợp đồng BT, BOT, BTO;"},{"k":"p","t":"a3) Phần chi phí trả lãi tiền vay theo thực tế phát sinh trong kỳ của các hợp đồng BT, BOT, BTO vượt mức chi phí lãi vay phân bổ theo doanh thu quy định tại điểm này không được tính vào chi phí được trừ trong kỳ mà chuyển sang các kỳ tính thuế tiếp theo;"},{"k":"p","t":"a4) Trường hợp trong kỳ tính thuế doanh nghiệp phát sinh giao dịch liên kết thì thực hiện theo quy định của pháp luật về quản lý thuế đối với doanh nghiệp có giao dịch liên kết."},{"k":"p","t":"b) Các khoản chi của hoạt động kinh doanh ngân hàng, bảo hiểm, xổ số, chứng khoán không đúng hoặc vượt mức quy định theo hướng dẫn của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"22. Khoản chi không tương ứng với doanh thu tính thuế, trừ các khoản chi quy định tại điểm i khoản 2 Điều 9 của Nghị định này."},{"k":"p","t":"23. Khoản chi không đáp ứng điều kiện chi, nội dung chi theo quy định của pháp luật chuyên ngành, bao gồm: Khoản chi cho làm thêm giờ vượt mức thời gian quy định của pháp luật về lao động; khoản chi quảng cáo trong trường hợp quảng cáo các sản phẩm, hàng hóa, dịch vụ bị cấm quảng cáo hoặc quảng cáo các sản phẩm, hàng hóa, dịch vụ phải đăng ký với cơ quan có thẩm quyền nhưng doanh nghiệp không thực hiện đăng ký quảng cáo theo quy định của pháp luật; khoản chi phục vụ sản xuất, kinh doanh không đúng hoặc vượt mức chi theo quy định của pháp luật chuyên ngành."}]},{"id":"nd320_11","no":11,"code":"Điều 11","title":"Điều 11. Thuế suất","shortTitle":"Thuế suất","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế suất thuế thu nhập doanh nghiệp là 20%, trừ trường hợp quy định tại các khoản 2, 3 và 5 Điều này và đối tượng được ưu đãi về thuế suất quy định tại Điều 19 Nghị định này."},{"k":"p","t":"2. Thuế suất 15% áp dụng đối với doanh nghiệp có tổng doanh thu năm không quá 03 tỷ đồng."},{"k":"p","t":"3. Thuế suất 17% áp dụng đối với doanh nghiệp có tổng doanh thu năm từ trên 03 tỷ đồng đến không quá 50 tỷ đồng."},{"k":"p","t":"4. Tổng doanh thu làm căn cứ xác định doanh nghiệp thuộc đối tượng áp dụng thuế suất 15% và 17% quy định tại khoản 2 và khoản 3 Điều này là tổng doanh thu từ hoạt động bán hàng, cung cấp dịch vụ (không bao gồm các khoản giảm trừ doanh thu), doanh thu từ hoạt động tài chính và thu nhập khác trên Phụ lục kết quả hoạt động sản xuất kinh doanh kèm theo tờ khai quyết toán thuế thu nhập doanh nghiệp của kỳ tính thuế năm trước liền kề."},{"k":"p","t":"a) Trường hợp doanh nghiệp có thời gian hoạt động của kỳ tính thuế năm trước liền kề dưới 12 tháng thì tổng doanh thu kỳ tính thuế năm trước liền kề được xác định bằng tổng doanh thu thực tế trong kỳ tính thuế đó chia cho số tháng doanh nghiệp thực tế hoạt động sản xuất, kinh doanh trong kỳ tính thuế nhân với 12 tháng."},{"k":"p","t":"Trường hợp doanh nghiệp mới thành lập, doanh nghiệp chuyển đổi loại hình doanh nghiệp, chuyển đổi hình thức sở hữu, hợp nhất, sáp nhập, chia, tách trong tháng bất kỳ của kỳ tính thuế năm trước liền kề thì thời gian hoạt động được tính đủ tháng;"},{"k":"p","t":"b) Trường hợp doanh nghiệp mới thành lập trong kỳ tính thuế và dự kiến tổng doanh thu trong kỳ tính thuế không quá 03 tỷ đồng hoặc không quá 50 tỷ đồng thì doanh nghiệp xác định tạm nộp hàng quý tương ứng theo mức thuế suất 15% hoặc 17%."},{"k":"p","t":"Kết thúc kỳ tính thuế, trường hợp tổng doanh thu thực tế trong kỳ tính thuế như dự kiến quy định tại điểm này thì doanh nghiệp thực hiện kê khai, quyết toán thuế thu nhập doanh nghiệp theo quy định. Trường hợp tổng doanh thu thực tế không đáp ứng điều kiện để hưởng mức thuế suất tương ứng như dự kiến quy định tại điểm này dẫn đến nộp thiếu so với số thuế phải tạm nộp theo quy định thì doanh nghiệp nộp bổ sung số tiền thuế còn thiếu và tiền chậm nộp theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"c) Thuế suất 15% và 17% quy định tại Điều này không áp dụng đối với doanh nghiệp được thành lập theo quy định của pháp luật Việt Nam là công ty con hoặc công ty có quan hệ liên kết mà doanh nghiệp trong quan hệ liên kết không phải là doanh nghiệp đáp ứng điều kiện áp dụng thuế suất quy định tại khoản 2 và khoản 3 Điều này."},{"k":"p","t":"5. Thuế suất thuế thu nhập doanh nghiệp đối với một số trường hợp khác được quy định như sau:"},{"k":"p","t":"a) Đối với hoạt động tìm kiếm, thăm dò và khai thác dầu khí từ 25% đến 50%. Căn cứ vào vị trí, điều kiện khai thác và trữ lượng mỏ, Thủ tướng Chính phủ quyết định mức thuế suất cụ thể phù hợp với từng hợp đồng dầu khí;"},{"k":"p","t":"b) Đối với hoạt động thăm dò, khai thác tài nguyên quý hiếm (bao gồm: Bạch kim, vàng, bạc, thiếc, wonfram, antimoan, đá quý, đất hiếm và tài nguyên quý hiếm khác theo quy định của pháp luật) là 50%. Trường hợp các mỏ có từ 70% diện tích được giao trở lên ở địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn, thuế suất là 40%."}]},{"id":"nd320_12","no":12,"code":"Điều 12","title":"Điều 12. Phương pháp tính thuế","shortTitle":"Phương pháp tính thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Số thuế thu nhập doanh nghiệp phải nộp trong kỳ tính thuế được tính bằng thu nhập tính thuế nhân với thuế suất, trừ trường hợp quy định tại các khoản 3, 4 và 5 Điều này."},{"k":"p","t":"2. Doanh nghiệp Việt Nam đầu tư ở nước ngoài có phát sinh thu nhập từ hoạt động sản xuất, kinh doanh tại nước ngoài trong kỳ tính thuế thực hiện như sau đây:"},{"k":"p","t":"a) Đối với các nước mà Việt Nam đã ký Hiệp định tránh đánh thuế hai lần thì thực hiện theo quy định của Hiệp định;"},{"k":"p","t":"b) Đối với các nước mà Việt Nam chưa ký Hiệp định tránh đánh thuế hai lần, trường hợp thuế thu nhập doanh nghiệp (hoặc một loại thuế có bản chất tương tự như thuế thu nhập doanh nghiệp) ở các nước mà doanh nghiệp đầu tư có mức thuế suất thuế thu nhập doanh nghiệp thấp hơn thì thu phần chênh lệch so với số thuế thu nhập doanh nghiệp tính theo Luật Thuế thu nhập doanh nghiệp của Việt Nam, cụ thể như sau:"},{"k":"p","t":"b1) Doanh nghiệp Việt Nam đầu tư ra nước ngoài có thu nhập từ hoạt động sản xuất, kinh doanh tại nước ngoài, thực hiện kê khai và nộp thuế thu nhập doanh nghiệp theo quy định của Luật Thuế thu nhập doanh nghiệp của Việt Nam, kể cả trường hợp doanh nghiệp đang được hưởng ưu đãi miễn thuế, giảm thuế thu nhập theo quy định của nước doanh nghiệp đầu tư. Mức thuế suất thuế thu nhập doanh nghiệp để tính và kê khai thuế đối với các khoản thu nhập từ nước ngoài là 20%, không áp dụng mức thuế suất ưu đãi (nếu có) mà doanh nghiệp Việt Nam đầu tư ra nước ngoài đang được hưởng theo Luật Thuế thu nhập doanh nghiệp của Việt Nam;"},{"k":"p","t":"b2) Trường hợp khoản thu nhập từ dự án đầu tư tại nước ngoài đã chịu thuế thu nhập doanh nghiệp ở nước ngoài, khi tính thuế thu nhập doanh nghiệp phải nộp tại Việt Nam, doanh nghiệp Việt Nam đầu tư ra nước ngoài được trừ số thuế đã nộp ở nước ngoài hoặc đã được đối tác nước tiếp nhận đầu tư trả thay, nhưng số thuế được trừ không vượt quá số thuế thu nhập tính theo quy định của Luật Thuế thu nhập doanh nghiệp của Việt Nam. Số thuế thu nhập doanh nghiệp mà doanh nghiệp Việt Nam đầu tư ra nước ngoài được miễn thuế, giảm thuế đối với phần lợi nhuận được hưởng từ dự án đầu tư ở nước ngoài theo luật pháp của nước doanh nghiệp đầu tư cũng được trừ khi xác định số thuế thu nhập doanh nghiệp phải nộp tại Việt Nam;"},{"k":"p","t":"b3) Trường hợp tại thời điểm doanh nghiệp kê khai và nộp thuế thu nhập doanh nghiệp theo quy định của Luật Thuế thu nhập doanh nghiệp của Việt Nam mà khoản thu nhập từ dự án đầu tư tại nước ngoài chưa nộp thuế thu nhập doanh nghiệp ở nước ngoài thì sau khi nộp thuế ở nước ngoài, doanh nghiệp thực hiện khai bổ sung hồ sơ khai thuế để điều chỉnh số thuế thu nhập doanh nghiệp đã nộp tại Việt Nam (nếu có). Trường hợp phát sinh số thuế nộp thừa thì doanh nghiệp được hoàn hoặc chuyển sang kỳ sau theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"b4) Trường hợp doanh nghiệp Việt Nam đầu tư ở nước ngoài có thu nhập từ dự án đầu tư tại nước ngoài trong kỳ tính thuế mà không thực hiện kê khai và nộp thuế đối với phần thu nhập này thì cơ quan thuế thực hiện ấn định thu nhập chịu thuế từ hoạt động sản xuất, kinh doanh tại nước ngoài theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"b5) Khoản thu nhập từ dự án đầu tư tại nước ngoài được kê khai vào quyết toán thuế thu nhập doanh nghiệp của kỳ tính thuế phát sinh khoản thuế thu nhập doanh nghiệp phải nộp ở nước ngoài. Khoản lãi, lỗ phát sinh từ dự án đầu tư ở nước ngoài không được trừ vào số lỗ, lãi phát sinh trong nước của doanh nghiệp khi tính thuế thu nhập doanh nghiệp."},{"k":"p","t":"Bộ trưởng Bộ Tài chính hướng dẫn cụ thể hồ sơ kê khai và nộp thuế của doanh nghiệp Việt Nam đầu tư ra nước ngoài đối với khoản thu nhập từ dự án đầu tư tại nước ngoài quy định tại khoản này;"},{"k":"p","t":"c) Đối với doanh nghiệp là công ty mẹ có số thuế được phân bổ từ số thuế bổ sung của đơn vị hợp thành chịu thuế suất thấp theo quy định tại khoản 11 Điều 5 Nghị quyết số 107/2023/QH15 ngày 29 tháng 11 năm 2023 của Quốc hội về việc áp dụng thuế thu nhập doanh nghiệp bổ sung theo quy định chống xói mòn cơ sở thuế toàn cầu và các văn bản hướng dẫn thì số thuế được phân bổ được trừ vào số thuế thu nhập doanh nghiệp phải nộp theo pháp luật thuế thu nhập doanh nghiệp của Việt Nam nhưng tổng số thuế được trừ quy định tại điểm b khoản này và điểm này không vượt quá số thuế thu nhập tính theo quy định của Luật Thuế thu nhập doanh nghiệp của Việt Nam."},{"k":"p","t":"Việc bù trừ quy định tại điểm này được thực hiện vào kỳ tính thuế mà doanh nghiệp kê khai và nộp thuế theo quy định tại Nghị quyết số 107/2023/QH15."},{"k":"p","t":"3. Số thuế thu nhập doanh nghiệp phải nộp đối với doanh nghiệp nước ngoài quy định tại các điểm b2, b3 và b4 khoản 1 Điều 2 của Nghị định này được tính theo tỷ lệ % trên doanh thu tính thuế phát sinh tại Việt Nam, cụ thể như sau:"},{"k":"p","t":"a) Dịch vụ: 5%, riêng dịch vụ quản lý nhà hàng, khách sạn, casino: 10%; trường hợp cung ứng dịch vụ có gắn với hàng hóa thì hàng hóa được tính theo tỷ lệ 1%; trường hợp không tách riêng được giá trị hàng hoá với giá trị dịch vụ: 2%;"},{"k":"p","t":"b) Cung cấp và phân phối hàng hóa tại Việt Nam theo hình thức xuất khẩu, nhập khẩu tại chỗ hoặc theo các điều khoản thương mại quốc tế (Incoterms): 1%; riêng trường hợp các doanh nghiệp nước ngoài bán hàng hóa là nguyên liệu, vật tư, linh kiện tại kho ngoại quan, khu phi thuế quan để nhập khẩu vào Việt Nam phục vụ sản xuất hàng xuất khẩu, gia công hàng xuất khẩu theo hợp đồng, các doanh nghiệp nước ngoài chỉ định doanh nghiệp chế xuất giao hàng hóa là nguyên liệu, vật tư, linh kiện cho doanh nghiệp chế xuất khác để phục vụ sản xuất hàng xuất khẩu, gia công hàng xuất khẩu theo hợp đồng không phải nộp thuế thu nhập doanh nghiệp;"},{"k":"p","t":"c) Tiền bản quyền: 10%;"},{"k":"p","t":"d) Cho thuê máy bay, trực thăng, tàu lượn (kể cả thuê động cơ, phụ tùng), tàu biển: 2%;"},{"k":"p","t":"đ) Cho thuê giàn khoan, máy móc, thiết bị, phương tiện vận tải (trừ quy định tại điểm d khoản này): 5%;"},{"k":"p","t":"e) Lãi tiền vay: 5%;"},{"k":"p","t":"g) Chuyển nhượng chứng khoán; tái bảo hiểm ra nước ngoài: 0,1%;"},{"k":"p","t":"h) Dịch vụ tài chính phái sinh: 2%;"},{"k":"p","t":"i) Chuyển nhượng vốn (trừ trường hợp giao dịch tái cơ cấu sở hữu của các công ty trong nội bộ tập đoàn không làm thay đổi công ty mẹ tối cao của các bên tham gia có sở hữu trực tiếp, gián tiếp doanh nghiệp tại Việt Nam sau tái cơ cấu và không phát sinh thu nhập): 2%;"},{"k":"p","t":"k) Xây dựng, vận tải và hoạt động khác: 2%."},{"k":"p","t":"Doanh thu tính thuế được xác định theo quy định tại Điều 8 của Nghị định này. Bộ trưởng Bộ Tài chính quy định chi tiết khoản này, bao gồm cả việc xác định doanh thu tính thuế thu nhập doanh nghiệp đối với một số trường hợp cụ thể."},{"k":"p","t":"4. Doanh nghiệp có tổng doanh thu năm không quá 03 tỷ đồng quy định tại Điều 11 của Nghị định này, trong trường hợp không xác định được chi phí, thu nhập của hoạt động sản xuất, kinh doanh thì kê khai nộp thuế thu nhập doanh nghiệp theo tỷ lệ phần trăm (%) trên doanh thu bán hàng hoá, dịch vụ, cụ thể như sau:"},{"k":"p","t":"a) Phân phối, cung cấp hàng hóa: 0,3%;"},{"k":"p","t":"b) Sản xuất, vận tải, dịch vụ có gắn với hàng hóa, xây dựng có bao thầu nguyên vật liệu: 1,2%;"},{"k":"p","t":"c) Dịch vụ (bao gồm cả lãi tiền gửi, lãi tiền cho vay), xây dựng không bao thầu nguyên vật liệu: 1,5%. Riêng hoạt động cho thuê tài sản, đại lý bảo hiểm, đại lý xổ số, đại lý bán hàng đa cấp: 4%;"},{"k":"p","t":"d) Hoạt động cung cấp sản phẩm và dịch vụ nội dung thông tin số về giải trí, trò chơi điện tử, phim số, ảnh số, nhạc số, quảng cáo số: 4%;"},{"k":"p","t":"đ) Hoạt động khác: 0,5%."},{"k":"p","t":"5. Hợp tác xã, liên hiệp hợp tác xã được thành lập theo quy định của Luật Hợp tác xã, đơn vị sự nghiệp và tổ chức khác quy định tại các điểm c, d và e khoản 1 Điều 2 của Nghị định này có hoạt động sản xuất, kinh doanh hàng hoá, dịch vụ có thu nhập chịu thuế thu nhập doanh nghiệp (trừ thu nhập được miễn thuế quy định tại Điều 4 của Nghị định này) mà các đơn vị này hạch toán được doanh thu nhưng không xác định được chi phí, thu nhập của hoạt động sản xuất, kinh doanh thì kê khai nộp thuế thu nhập doanh nghiệp tính theo tỷ lệ % trên doanh thu bán hàng hoá, dịch vụ, cụ thể như sau:"},{"k":"p","t":"a) Đối với dịch vụ (bao gồm cả lãi tiền gửi, lãi tiền cho vay): 5%. Riêng dịch vụ trong lĩnh vực giáo dục, y tế, biểu diễn nghệ thuật: 2%;"},{"k":"p","t":"b) Đối với sản xuất, kinh doanh hàng hoá: 1%;"},{"k":"p","t":"c) Đối với hoạt động khác: 2%."}]},{"id":"nd320_13","no":13,"code":"Điều 13","title":"Điều 13. Thu nhập từ chuyển nhượng vốn","shortTitle":"Thu nhập từ chuyển nhượng vốn","chuong":"Chương III — THU NHẬP TỪ CHUYỂN NHƯỢNG VỐN,\nCHUYỂN NHƯỢNG CHỨNG KHOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Thu nhập từ chuyển nhượng vốn của doanh nghiệp là thu nhập có được từ chuyển nhượng một phần hoặc toàn bộ số vốn của doanh nghiệp đã đầu tư cho một hoặc nhiều tổ chức, cá nhân khác (bao gồm cả trường hợp bán doanh nghiệp, chuyển nhượng quyền góp vốn và các hình thức chuyển nhượng vốn khác theo quy định của pháp luật), chuyển nhượng cổ phần của công ty không phải là công ty đại chúng, chuyển nhượng cổ phần của tổ chức không phải là tổ chức niêm yết, đăng ký giao dịch theo quy định của pháp luật chứng khoán."},{"k":"p","t":"Thời điểm xác định thu nhập từ chuyển nhượng vốn là thời điểm chuyển quyền sở hữu vốn."},{"k":"p","t":"a) Trường hợp doanh nghiệp bán toàn bộ công ty trách nhiệm hữu hạn một thành viên do tổ chức làm chủ sở hữu dưới hình thức chuyển nhượng vốn có gắn với bất động sản thì kê khai và nộp thuế thu nhập doanh nghiệp theo hoạt động chuyển nhượng bất động sản;"},{"k":"p","t":"b) Trường hợp doanh nghiệp có chuyển nhượng vốn không nhận bằng tiền mà nhận bằng tài sản (bao gồm cổ phiếu, chứng chỉ quỹ), lợi ích vật chất khác có phát sinh thu nhập thì phải chịu thuế thu nhập doanh nghiệp. Giá trị tài sản, cổ phiếu, chứng chỉ quỹ và lợi ích vật chất khác được xác định theo giá bán của sản phẩm trên thị trường tại thời điểm nhận tài sản;"},{"k":"p","t":"c) Doanh nghiệp có thu nhập từ chuyển nhượng vốn thì khoản thu nhập này được xác định là khoản thu nhập khác và kê khai vào thu nhập chịu thuế khi tính thuế thu nhập doanh nghiệp."},{"k":"p","t":"2. Xác định thu nhập tính thuế từ chuyển nhượng vốn"},{"k":"p","t":"Thu nhập tính thuế từ chuyển nhượng vốn được xác định bằng giá chuyển nhượng trừ đi giá mua của phần vốn chuyển nhượng và chi phí chuyển nhượng."},{"k":"p","t":"a) Giá chuyển nhượng được xác định là tổng giá trị thực tế mà bên chuyển nhượng thu được theo hợp đồng chuyển nhượng."},{"k":"p","t":"a1) Trường hợp hợp đồng chuyển nhượng vốn quy định việc thanh toán theo hình thức trả góp, trả chậm thì doanh thu của hợp đồng chuyển nhượng không bao gồm lãi trả góp, lãi trả chậm theo thời hạn quy định trong hợp đồng;"},{"k":"p","t":"a2) Trường hợp hợp đồng chuyển nhượng không quy định giá thanh toán hoặc cơ quan thuế có cơ sở để xác định giá thanh toán không phù hợp theo giá thị trường, cơ quan thuế có quyền kiểm tra và ấn định giá chuyển nhượng. Doanh nghiệp có chuyển nhượng một phần vốn góp trong doanh nghiệp mà giá chuyển nhượng đối với phần vốn góp này không phù hợp theo giá thị trường thì cơ quan thuế được ấn định lại toàn bộ giá trị của doanh nghiệp tại thời điểm chuyển nhượng để xác định lại giá chuyển nhượng tương ứng với tỷ lệ phần vốn góp chuyển nhượng;"},{"k":"p","t":"a3) Doanh nghiệp có hoạt động chuyển nhượng vốn cho tổ chức, cá nhân thì phần giá trị vốn chuyển nhượng theo hợp đồng chuyển nhượng có giá trị từ 05 triệu đồng trở lên phải có chứng từ thanh toán không dùng tiền mặt. Trường hợp việc chuyển nhượng vốn không có chứng từ thanh toán không dùng tiền mặt thì cơ quan thuế có quyền ấn định giá chuyển nhượng."},{"k":"p","t":"Việc ấn định giá chuyển nhượng quy định tại điểm này thực hiện theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"b) Giá mua của phần vốn chuyển nhượng được xác định đối với từng trường hợp như sau:"},{"k":"p","t":"b1) Trường hợp là vốn góp thành lập doanh nghiệp thì giá mua là giá trị phần vốn góp lũy kế đến thời điểm chuyển nhượng vốn trên cơ sở sổ sách, hồ sơ, chứng từ kế toán và được các bên tham gia đầu tư vốn hoặc tham gia hợp đồng hợp tác kinh doanh xác nhận hoặc kết quả kiểm toán của công ty kiểm toán độc lập đối với doanh nghiệp 100% vốn nước ngoài;"},{"k":"p","t":"b2) Trường hợp là phần vốn do mua lại thì giá mua là giá trị vốn tại thời điểm mua. Giá mua được xác định căn cứ vào hợp đồng mua lại phần vốn góp, chứng từ thanh toán;"},{"k":"p","t":"b3) Trường hợp doanh nghiệp đủ điều kiện hạch toán kế toán bằng đồng ngoại tệ và thực hiện theo đúng quy định của pháp luật về chế độ kế toán có chuyển nhượng vốn góp bằng ngoại tệ thì giá chuyển nhượng và giá mua của phần vốn chuyển nhượng được xác định bằng đồng ngoại tệ; trường hợp doanh nghiệp hạch toán kế toán bằng đồng Việt Nam có chuyển nhượng vốn góp bằng ngoại tệ thì giá chuyển nhượng phải được xác định bằng đồng Việt Nam theo pháp luật về quản lý thuế;"},{"k":"p","t":"c) Chi phí chuyển nhượng là các khoản chi thực tế liên quan trực tiếp đến việc chuyển nhượng, có chứng từ, hóa đơn hợp pháp. Chi phí chuyển nhượng bao gồm: Chi phí để làm các thủ tục pháp lý cần thiết cho việc chuyển nhượng; các khoản phí và lệ phí phải nộp khi làm thủ tục chuyển nhượng; các chi phí giao dịch, đàm phán, ký kết hợp đồng chuyển nhượng và các chi phí khác có chứng từ chứng minh."},{"k":"p","t":"Trường hợp chi phí chuyển nhượng phát sinh ở nước ngoài thì các chứng từ gốc đó phải được một cơ quan công chứng hoặc kiểm toán độc lập của nước có chi phí phát sinh xác nhận và chứng từ phải được dịch ra tiếng Việt (có xác nhận của đại diện có thẩm quyền)."}]},{"id":"nd320_14","no":14,"code":"Điều 14","title":"Điều 14. Thu nhập từ đầu tư chứng khoán","shortTitle":"Thu nhập từ đầu tư chứng khoán","chuong":"Chương III — THU NHẬP TỪ CHUYỂN NHƯỢNG VỐN,\nCHUYỂN NHƯỢNG CHỨNG KHOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Thu nhập từ chuyển nhượng chứng khoán của doanh nghiệp là thu nhập có được từ việc chuyển nhượng cổ phiếu, quyền mua cổ phiếu của công ty đại chúng, tổ chức niêm yết, tổ chức đăng ký giao dịch, chuyển nhượng trái phiếu, tín phiếu, chứng chỉ quỹ và các loại chứng khoán khác theo quy định của pháp luật về chứng khoán."},{"k":"p","t":"a) Trường hợp doanh nghiệp thực hiện phát hành thêm cổ phiếu để huy động vốn thì phần chênh lệch giữa giá phát hành và mệnh giá không tính vào thu nhập chịu thuế để tính thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b) Trường hợp doanh nghiệp tiến hành chia, tách, hợp nhất, sáp nhập mà thực hiện hoán đổi cổ phiếu tại thời điểm chia, tách, hợp nhất, sáp nhập nếu phát sinh thu nhập thì phần thu nhập này phải chịu thuế thu nhập doanh nghiệp;"},{"k":"p","t":"c) Trường hợp doanh nghiệp có chuyển nhượng chứng khoán không nhận bằng tiền mà nhận bằng tài sản (bao gồm cổ phiếu, chứng chỉ quỹ), lợi ích vật chất khác có phát sinh thu nhập thì phải chịu thuế thu nhập doanh nghiệp. Giá trị tài sản, cổ phiếu, chứng chỉ quỹ và lợi ích vật chất khác được xác định theo giá bán của sản phẩm trên thị trường tại thời điểm nhận tài sản;"},{"k":"p","t":"d) Doanh nghiệp có thu nhập từ chuyển nhượng chứng khoán thì khoản thu nhập này được xác định là khoản thu nhập khác và kê khai vào thu nhập chịu thuế khi tính thuế thu nhập doanh nghiệp."},{"k":"p","t":"2. Xác định thu nhập tính thuế từ chuyển nhượng chứng khoán"},{"k":"p","t":"Thu nhập tính thuế từ chuyển nhượng chứng khoán trong kỳ được xác định bằng giá bán chứng khoán trừ đi giá mua của chứng khoán chuyển nhượng và các chi phí liên quan đến việc chuyển nhượng."},{"k":"p","t":"a) Giá bán chứng khoán được xác định như sau:"},{"k":"p","t":"a1) Đối với chứng khoán niêm yết và chứng khoán của công ty đại chúng chưa niêm yết nhưng thực hiện đăng ký giao dịch tại Sở Giao dịch chứng khoán thì giá bán chứng khoán là giá thực tế bán chứng khoán (là giá khớp lệnh hoặc giá thỏa thuận) theo thông báo của Sở Giao dịch chứng khoán;"},{"k":"p","t":"a2) Đối với chứng khoán của các công ty không thuộc các trường hợp nêu trên thì giá bán chứng khoán là giá chuyển nhượng ghi trên hợp đồng chuyển nhượng;"},{"k":"p","t":"b) Giá mua của chứng khoán được xác định như sau:"},{"k":"p","t":"b1) Đối với chứng khoán niêm yết và chứng khoán của công ty đại chúng chưa niêm yết nhưng thực hiện đăng ký giao dịch tại Sở Giao dịch chứng khoán thì giá mua chứng khoán là giá thực mua chứng khoán (là giá khớp lệnh hoặc giá thỏa thuận) theo thông báo của Sở Giao dịch chứng khoán;"},{"k":"p","t":"b2) Đối với chứng khoán mua thông qua đấu giá thì giá mua chứng khoán là mức giá ghi trên thông báo kết quả trúng đấu giá cổ phần của tổ chức thực hiện đấu giá cổ phần và giấy nộp tiền;"},{"k":"p","t":"b3) Đối với chứng khoán không thuộc các trường hợp nêu trên thì giá mua chứng khoán là giá chuyển nhượng ghi trên hợp đồng chuyển nhượng;"},{"k":"p","t":"c) Chi phí chuyển nhượng là các khoản chi thực tế liên quan trực tiếp đến việc chuyển nhượng, có chứng từ, hóa đơn hợp pháp, bao gồm: Chi phí để làm các thủ tục pháp lý cần thiết cho việc chuyển nhượng; các khoản phí và lệ phí theo quy định của pháp luật về phí và lệ phí; các chi phí giao dịch, đàm phán, ký kết hợp đồng chuyển nhượng và các chi phí khác có chứng từ chứng minh."},{"k":"p","t":"3. Quỹ đầu tư chứng khoán (trừ công ty đầu tư chứng khoán) không thuộc đối tượng nộp thuế thu nhập doanh nghiệp. Công ty quản lý Quỹ đầu tư chứng khoán khấu trừ thuế thu nhập doanh nghiệp phải nộp của tổ chức đầu tư (không phân biệt tổ chức đầu tư trong nước hay tổ chức đầu tư nước ngoài) khi Quỹ đầu tư chứng khoán chia lợi tức cho nhà đầu tư theo thuế suất 20%."},{"k":"p","t":"Lợi tức chịu thuế quy định tại khoản này không bao gồm phần lợi tức thuộc diện được miễn thuế hoặc đã nộp thuế thu nhập doanh nghiệp theo quy định của pháp luật."}]},{"id":"nd320_15","no":15,"code":"Điều 15","title":"Điều 15. Thu nhập từ chuyển nhượng bất động sản","shortTitle":"Thu nhập từ chuyển nhượng bất động sản","chuong":"Chương IV — THU NHẬP TỪ CHUYỂN NHƯỢNG BẤT ĐỘNG SẢN","muc":"","level":1,"content":[{"k":"p","t":"Thu nhập từ hoạt động chuyển nhượng bất động sản bao gồm:"},{"k":"p","t":"1. Thu nhập từ chuyển nhượng quyền sử dụng đất, chuyển nhượng quyền thuê đất (bao gồm cả chuyển nhượng dự án gắn với chuyển nhượng quyền sử dụng đất, quyền thuê đất theo quy định của pháp luật)."},{"k":"p","t":"2. Thu nhập từ hoạt động cho thuê, cho thuê lại quyền sử dụng đất của doanh nghiệp kinh doanh bất động sản theo quy định của pháp luật về đất đai không phân biệt có hay không có kết cấu hạ tầng, công trình kiến trúc gắn liền với đất."},{"k":"p","t":"Thu nhập từ hoạt động cho thuê, cho thuê lại quyền sử dụng đất quy định tại khoản này không bao gồm trường hợp doanh nghiệp có hoạt động cho thuê nhà, cơ sở hạ tầng, công trình kiến trúc trên đất nhưng không có quyền cho thuê, cho thuê lại quyền sử dụng đất theo quy định của pháp luật về đất đai."},{"k":"p","t":"3. Thu nhập từ chuyển nhượng nhà, công trình xây dựng gắn liền với đất, kể cả các tài sản gắn liền với nhà, công trình xây dựng đó nếu không tách riêng giá trị tài sản khi chuyển nhượng không phân biệt có hay không có chuyển nhượng quyền sử dụng đất, chuyển nhượng quyền thuê đất."},{"k":"p","t":"4. Thu nhập từ chuyển nhượng các tài sản gắn liền với đất."},{"k":"p","t":"5. Thu nhập từ chuyển nhượng quyền sở hữu nhà ở, cơ sở hạ tầng, công trình kiến trúc trên đất."},{"k":"p","t":"6. Thu nhập từ chuyển nhượng, cho thuê bất động sản của Quỹ đầu tư bất động sản theo quy định của pháp luật."},{"k":"p","t":"Công ty quản lý Quỹ đầu tư chứng khoán kê khai và nộp thuế đối với thu nhập từ chuyển nhượng, cho thuê bất động sản quy định tại khoản này."}]},{"id":"nd320_16","no":16,"code":"Điều 16","title":"Điều 16. Căn cứ tính thuế","shortTitle":"Căn cứ tính thuế","chuong":"Chương IV — THU NHẬP TỪ CHUYỂN NHƯỢNG BẤT ĐỘNG SẢN","muc":"","level":1,"content":[{"k":"p","t":"1. Căn cứ tính thuế thu nhập từ chuyển nhượng bất động sản là thu nhập tính thuế và thuế suất."},{"k":"p","t":"2. Thu nhập tính thuế được xác định bằng thu nhập chịu thuế từ chuyển nhượng bất động sản trừ đi các khoản lỗ của hoạt động chuyển nhượng bất động sản được chuyển lỗ theo quy định (nếu có)."},{"k":"p","t":"3. Thu nhập chịu thuế từ chuyển nhượng bất động sản được xác định bằng doanh thu từ hoạt động chuyển nhượng bất động sản trừ đi chi phí được trừ từ hoạt động chuyển nhượng bất động sản (bao gồm: Giá vốn của bất động sản và các khoản chi phí được trừ liên quan đến hoạt động chuyển nhượng bất động sản) quy định tại Điều 17 của Nghị định này."},{"k":"p","t":"4. Thuế suất thuế thu nhập doanh nghiệp đối với hoạt động chuyển nhượng bất động sản là 20%."},{"k":"p","t":"5. Số thuế thu nhập doanh nghiệp trong kỳ tính thuế đối với hoạt động chuyển nhượng bất động sản bằng thu nhập tính thuế từ hoạt động chuyển nhượng bất động sản nhân với thuế suất 20%."},{"k":"p","t":"6. Trường hợp tổ chức tín dụng, tổ chức mà Nhà nước sở hữu 100% vốn điều lệ do Chính phủ thành lập có chức năng mua, bán, xử lý nợ nhận giá trị bất động sản và tài sản khác là tài sản bảo đảm tiền vay để thay thế cho việc thực hiện nghĩa vụ được bảo đảm thì tổ chức tín dụng, tổ chức mà Nhà nước sở hữu 100% vốn điều lệ do Chính phủ thành lập có chức năng mua, bán, xử lý nợ khi được phép chuyển nhượng bất động sản, tài sản khác theo quy định của pháp luật phải kê khai nộp thuế từ hoạt động chuyển nhượng bất động sản, tài sản khác vào ngân sách nhà nước. Trường hợp bán đấu giá bất động sản, tài sản khác là tài sản bảo đảm tiền vay thì số tiền thu được thực hiện thanh toán theo quy định của pháp luật về bảo đảm tiền vay và kê khai, nộp thuế theo quy định. Sau khi thanh toán các khoản trên, số tiền còn lại được trả cho các tổ chức kinh doanh đã thế chấp bất động sản, tài sản khác để bảo đảm tiền vay."},{"k":"p","t":"Trường hợp tổ chức tín dụng, tổ chức mà Nhà nước sở hữu 100% vốn điều lệ do Chính phủ thành lập có chức năng mua, bán, xử lý nợ được phép chuyển nhượng bất động sản, tài sản khác đã được thế chấp theo quy định của pháp luật để thu hồi vốn nếu không xác định được giá vốn của bất động sản, tài sản khác thì giá vốn được xác định bằng vốn vay phải trả theo hợp đồng thế chấp bất động sản, tài sản khác cộng với chi phí lãi vay chưa trả đến thời điểm phát mãi bất động sản, tài sản khác thế chấp theo hợp đồng và các khoản chi phí phát sinh khi chuyển nhượng bất động sản, tài sản khác nếu có hóa đơn, chứng từ hợp pháp."},{"k":"p","t":"7. Trường hợp cơ quan thi hành án hoặc tổ chức có thẩm quyền bán đấu giá bất động sản, tài sản khác là tài sản bảo đảm thi hành án thì số tiền thu được thực hiện theo quy định của pháp luật về kê biên, đấu giá để bảo đảm thi hành án. Tổ chức bán đấu giá bất động sản, tài sản khác thực hiện kê khai, khấu trừ tiền thuế từ chuyển nhượng bất động sản, tài sản khác nộp vào ngân sách nhà nước. Trên các chứng từ ghi rõ kê khai, nộp thuế về bán tài sản đảm bảo thi hành án."},{"k":"p","t":"Trường hợp cơ quan thi hành án hoặc tổ chức có thẩm quyền chuyển nhượng bất động sản, tài sản khác là tài sản đảm bảo thi hành án nếu không xác định được giá vốn của bất động sản, tài sản khác thì giá vốn được xác định bằng số tiền nợ phải trả nợ theo quyết định của Tòa án hoặc cơ quan có thẩm quyền để thi hành án cộng với các khoản chi phí phát sinh khi chuyển nhượng bất động sản, tài sản khác nếu có hóa đơn chứng từ hợp pháp."}]},{"id":"nd320_17","no":17,"code":"Điều 17","title":"Điều 17. Doanh thu, chi phí được trừ từ hoạt động chuyển nhượng bất động sản","shortTitle":"Doanh thu, chi phí được trừ từ hoạt động chuyển nhượng bất động sản","chuong":"Chương IV — THU NHẬP TỪ CHUYỂN NHƯỢNG BẤT ĐỘNG SẢN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh thu từ hoạt động chuyển nhượng bất động sản"},{"k":"p","t":"a) Doanh thu từ hoạt động chuyển nhượng bất động sản được xác định theo giá thực tế chuyển nhượng bất động sản theo hợp đồng chuyển nhượng, mua bán bất động sản phù hợp với quy định của pháp luật (bao gồm cả các khoản phụ thu và phí thu thêm nếu có)."},{"k":"p","t":"Trường hợp giá chuyển quyền sử dụng đất theo hợp đồng chuyển nhượng, mua bán bất động sản thấp hơn giá đất tại bảng giá đất do Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương quy định tại thời điểm ký hợp đồng chuyển nhượng bất động sản thì tính theo giá đất do Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương quy định tại thời điểm ký hợp đồng chuyển nhượng bất động sản;"},{"k":"p","t":"b) Thời điểm xác định doanh thu tính thuế là thời điểm bên bán bàn giao bất động sản cho bên mua, không phụ thuộc việc bên mua đã đăng ký quyền sở hữu tài sản, quyền sử dụng đất, xác lập quyền sử dụng đất tại cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"c) Trường hợp doanh nghiệp thực hiện dự án đầu tư cơ sở hạ tầng, nhà để chuyển nhượng hoặc cho thuê, có thu tiền ứng trước của khách hàng theo tiến độ dưới mọi hình thức thì thời điểm xác định doanh thu tính thuế thu nhập doanh nghiệp tạm nộp là thời điểm thu tiền của khách hàng, cụ thể:"},{"k":"p","t":"c1) Trường hợp doanh nghiệp có thu tiền của khách hàng mà xác định được chi phí tương ứng với doanh thu đã ghi nhận (bao gồm cả chi phí trích trước của phần dự toán hạng mục công trình chưa hoàn thành tương ứng với doanh thu đã ghi nhận) thì doanh nghiệp kê khai, nộp thuế thu nhập doanh nghiệp theo doanh thu trừ chi phí;"},{"k":"p","t":"c2) Trường hợp doanh nghiệp có thu tiền của khách hàng mà chưa xác định được chi phí tương ứng với doanh thu thì doanh nghiệp kê khai tạm nộp thuế thu nhập doanh nghiệp theo tỷ lệ 1% trên doanh thu thu được tiền (không bao gồm thuế giá trị gia tăng) và doanh thu này chưa phải tính vào doanh thu tính thuế thu nhập doanh nghiệp trong năm;"},{"k":"p","t":"c3) Khi bàn giao bất động sản doanh nghiệp phải thực hiện quyết toán thuế thu nhập doanh nghiệp và quyết toán lại số thuế thu nhập doanh nghiệp phải nộp. Trường hợp số thuế thu nhập doanh nghiệp đã tạm nộp thấp hơn số thuế thu nhập doanh nghiệp phải nộp thì doanh nghiệp phải nộp đủ số thuế còn thiếu vào ngân sách nhà nước. Trường hợp số thuế thu nhập doanh nghiệp đã tạm nộp lớn hơn số thuế phải nộp thì doanh nghiệp được trừ số thuế nộp thừa vào số thuế thu nhập doanh nghiệp phải nộp của kỳ tiếp theo hoặc được hoàn lại số thuế đã nộp thừa;"},{"k":"p","t":"c4) Đối với doanh nghiệp kinh doanh bất động sản có thu tiền ứng trước của khách hàng theo tiến độ và kê khai tạm nộp thuế theo tỷ lệ % trên doanh thu thu được tiền, doanh thu này chưa phải tính vào doanh thu tính thuế thu nhập doanh nghiệp trong năm đồng thời có phát sinh chi phí quảng cáo, tiếp thị, khuyến mại, hoa hồng môi giới khi bắt đầu chào bán vào năm phát sinh doanh thu thu tiền theo tiến độ thì chưa tính các khoản chi phí này vào năm phát sinh chi phí. Các khoản chi phí quảng cáo, tiếp thị, khuyến mại, hoa hồng môi giới này được tính vào chi phí được trừ tại năm đầu tiên bàn giao bất động sản, phát sinh doanh thu tính thuế thu nhập doanh nghiệp;"},{"k":"p","t":"d) Doanh thu để tính thu nhập chịu thuế trong một số trường hợp được xác định như sau:"},{"k":"p","t":"d1) Trường hợp doanh nghiệp có cho thuê lại đất thì doanh thu để tính thu nhập chịu thuế là số tiền bên thuê trả từng kỳ theo hợp đồng thuê. Trường hợp bên thuê trả tiền thuê trước cho nhiều năm thì doanh thu để tính thu nhập chịu thuế được phân bổ đều cho số năm trả tiền trước hoặc được xác định theo doanh thu trả tiền một lần. Việc chọn hình thức doanh thu trả tiền một lần chỉ được xác định khi doanh nghiệp đã đảm bảo hoàn thành các trách nhiệm tài chính đối với Nhà nước, đảm bảo các nghĩa vụ đối với các bên thuê lại đất cho hết thời hạn cho thuê lại đất."},{"k":"p","t":"Trường hợp doanh nghiệp đang trong thời gian hưởng ưu đãi thuế thu nhập doanh nghiệp lựa chọn phương pháp xác định doanh thu để tính thu nhập chịu thuế là toàn bộ số tiền thuê bên thuê trả trước cho nhiều năm thì việc xác định số thuế thu nhập doanh nghiệp từng năm miễn thuế, giảm thuế căn cứ vào tổng số thuế thu nhập doanh nghiệp của số năm trả tiền trước chia cho số năm bên thuê trả tiền trước;"},{"k":"p","t":"d2) Trường hợp tổ chức tín dụng nhận giá trị quyền sử dụng đất bảo đảm tiền vay để thay thế cho việc thực hiện nghĩa vụ được bảo đảm nếu có chuyển quyền sử dụng đất là tài sản thế chấp bảo đảm tiền vay thì doanh thu để tính thu nhập chịu thuế là giá chuyển nhượng quyền sử dụng đất do các bên thỏa thuận;"},{"k":"p","t":"d3) Trường hợp chuyển quyền sử dụng đất là tài sản kê biên bảo đảm thi hành án thì doanh thu để tính thu nhập chịu thuế là giá chuyển nhượng quyền sử dụng đất do các bên đương sự thỏa thuận hoặc giá do Hội đồng định giá xác định."},{"k":"p","t":"Việc xác định doanh thu đối với các trường hợp nêu tại điểm d phải đảm bảo các nguyên tắc nêu tại các điểm a, b và c khoản này."},{"k":"p","t":"2. Chi phí được trừ từ hoạt động chuyển nhượng bất động sản"},{"k":"p","t":"Các khoản chi được trừ để xác định thu nhập chịu thuế của hoạt động chuyển nhượng bất động sản trong kỳ tính thuế phải tương ứng với doanh thu để tính thu nhập chịu thuế và phải đảm bảo các điều kiện của các khoản chi được trừ quy định tại Điều 9 của Nghị định này và không thuộc các khoản chi không được trừ quy định tại Điều 10 của Nghị định này. Chi phí chuyển nhượng bất động sản được trừ bao gồm:"},{"k":"p","t":"a) Giá vốn của đất chuyển quyền được xác định phù hợp với nguồn gốc quyền sử dụng đất, cụ thể như sau:"},{"k":"p","t":"a1) Đối với đất Nhà nước giao có thu tiền sử dụng đất, thu tiền cho thuê đất thì giá vốn là số tiền sử dụng đất, số tiền cho thuê đất thực nộp ngân sách nhà nước;"},{"k":"p","t":"a2) Đối với đất nhận quyền sử dụng của tổ chức, cá nhân khác thì căn cứ vào hợp đồng và chứng từ trả tiền hợp pháp khi nhận quyền sử dụng đất, quyền thuê đất; trường hợp không có hợp đồng và chứng từ trả tiền hợp pháp thì giá vốn được tính theo giá đất tại bảng giá đất do Ủy ban nhân dân cấp tỉnh quy định (trước ngày 01 tháng 01 năm 2026) hoặc Hội đồng nhân dân cấp tỉnh quyết định (kể từ ngày 01 tháng 01 năm 2026) tại thời điểm doanh nghiệp nhận chuyển nhượng bất động sản;"},{"k":"p","t":"a3) Trường hợp đất của doanh nghiệp được thừa kế, cho, biếu, tặng trước năm 1994 thì giá vốn được xác định theo giá các loại đất do Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương quyết định năm 1994 căn cứ vào Bảng khung giá các loại đất quy định tại Nghị định số 87-CP ngày 17 tháng 8 năm 1994 của Chính phủ;"},{"k":"p","t":"a4) Đối với đất có nguồn gốc do góp vốn thì giá vốn là giá trị quyền sử dụng đất, quyền thuê đất theo biên bản định giá tài sản khi góp vốn;"},{"k":"p","t":"a5) Trường hợp doanh nghiệp đổi công trình lấy đất của Nhà nước thì giá vốn được xác định theo giá trị công trình đã đổi, trừ trường hợp thực hiện theo quy định riêng của cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"a6) Giá trúng đấu giá trong trường hợp đấu giá quyền sử dụng đất, quyền thuê đất;"},{"k":"p","t":"a7) Đối với đất của doanh nghiệp có nguồn gốc do thừa kế theo pháp luật dân sự, do được cho, biếu, tặng mà không xác định được giá vốn thì được tính theo bảng giá đất do Ủy ban nhân dân cấp tỉnh quy định (trước ngày 01 tháng 01 năm 2026) hoặc Hội đồng nhân dân cấp tỉnh quyết định (kể từ ngày 01 tháng 01 năm 2026) tại thời điểm thừa kế, cho, biếu, tặng;"},{"k":"p","t":"a8) Đối với đất thế chấp bảo đảm tiền vay, đất là tài sản kê biên để bảo đảm thi hành án thì giá vốn đất được xác định tùy theo từng trường hợp cụ thể theo hướng dẫn nêu trên."},{"k":"p","t":"Đối với các trường hợp quy định tại điểm a khoản này, trường hợp được cơ quan nhà nước có thẩm quyền cho phép chuyển mục đích sử dụng đất theo quy định của pháp luật về đất đai thì giá vốn bao gồm cả số tiền sử dụng đất, tiền thuê đất nộp ngân sách nhà nước theo quy định của pháp luật về đất đai khi chuyển mục đích sử dụng đất;"},{"k":"p","t":"b) Chi phí bồi thường, hỗ trợ, tái định cư do doanh nghiệp tự nguyện ứng trước theo phương án bồi thường tái định cư đã được cơ quan nhà nước có thẩm quyền phê duyệt theo quy định của pháp luật về đất đai."},{"k":"p","t":"Hồ sơ, chứng từ của các khoản chi phí bồi thường, hỗ trợ, tái định cư thực hiện theo quy định của pháp luật về đất đai;"},{"k":"p","t":"c) Các loại phí, lệ phí theo quy định của pháp luật liên quan đến cấp quyền sử dụng đất;"},{"k":"p","t":"d) Chi phí cải tạo đất, san lấp mặt bằng;"},{"k":"p","t":"đ) Chi phí đầu tư xây dựng kết cấu hạ tầng như đường giao thông, điện, cấp nước, thoát nước, bưu chính viễn thông;"},{"k":"p","t":"e) Giá trị kết cấu hạ tầng, công trình kiến trúc có trên đất;"},{"k":"p","t":"g) Các khoản chi phí khác liên quan đến bất động sản được chuyển nhượng;"},{"k":"p","t":"h) Trường hợp doanh nghiệp vừa có hoạt động kinh doanh bất động sản vừa có hoạt động kinh doanh được hưởng ưu đãi thuế thì phải hạch toán riêng các khoản chi phí. Trường hợp không hạch toán riêng được chi phí của từng hoạt động thì chi phí chung được phân bổ theo tỷ lệ giữa doanh thu từ chuyển nhượng bất động sản so với tổng doanh thu của doanh nghiệp;"},{"k":"p","t":"i) Không được tính vào chi phí chuyển nhượng bất động sản các khoản chi phí đã được Nhà nước thanh toán hoặc thanh toán bằng nguồn vốn khác."},{"k":"p","t":"3. Trường hợp dự án đầu tư hoàn thành từng phần và chuyển nhượng dần theo tiến độ hoàn thành thì các khoản chi phí chung sử dụng cho dự án, chi phí trực tiếp sử dụng cho phần dự án đã hoàn thành được phân bổ theo m2 đất chuyển quyền để xác định thu nhập chịu thuế của diện tích đất chuyển quyền; bao gồm: Chi phí đường giao thông nội bộ; khuôn viên cây xanh; chi phí đầu tư xây dựng hệ thống cấp, thoát nước; trạm biến thế điện; chi phí bồi thường về tài sản trên đất; chi phí bồi thường, hỗ trợ, tái định cư và kinh phí tổ chức thực hiện bồi thường giải phóng mặt bằng được cấp có thẩm quyền phê duyệt còn lại chưa được trừ vào tiền sử dụng đất, tiền thuê đất theo quy định; các chi phí khác đầu tư trên đất liên quan đến chuyển quyền sử dụng đất, chuyển quyền thuê đất."},{"k":"p","t":"a) Việc phân bổ các chi phí trên được thực hiện theo công thức sau:"},{"k":"tbl","rows":[["Chi phí phân \nbổ cho diện \ntích đất đã \nchuyển nhượng","=","Tổng chi phí đầu tư kết cấu hạ tầng","x","Diện tích đất đã \nchuyển nhượng"],["Chi phí phân \nbổ cho diện \ntích đất đã \nchuyển nhượng","=","Tổng diện tích đất được giao dự \nán (trừ diện tích đất sử dụng vào \nmục đích công cộng theo quy \nđịnh của pháp luật về đất đai)","x","Diện tích đất đã \nchuyển nhượng"]]},{"k":"p","t":"b) Trường hợp một phần diện tích của dự án không chuyển nhượng được sử dụng vào hoạt động kinh doanh khác thì các khoản chi phí chung nêu trên cũng phân bổ cho cả phần diện tích này để theo dõi, hạch toán, kê khai nộp thuế thu nhập doanh nghiệp đối với hoạt động kinh doanh khác;"},{"k":"p","t":"c) Trường hợp doanh nghiệp có hoạt động đầu tư xây dựng cơ sở hạ tầng kéo dài trong nhiều năm và chỉ quyết toán giá trị kết cấu hạ tầng khi toàn bộ công việc hoàn tất thì khi tổng hợp chi phí chuyển nhượng bất động sản cho phần diện tích đất đã chuyển quyền, doanh nghiệp được tạm phân bổ chi phí đầu tư kết cấu hạ tầng thực tế đã phát sinh theo tỷ lệ diện tích đất đã chuyển quyền theo công thức quy định tại điểm a khoản này và trích trước các khoản chi phí đầu tư xây dựng cơ sở hạ tầng tương ứng với doanh thu đã ghi nhận khi xác định thu nhập chịu thuế. Sau khi hoàn tất quá trình đầu tư xây dựng, doanh nghiệp tính toán, điều chỉnh lại phần chi phí đầu tư kết cấu hạ tầng đã tạm phân bổ và trích trước cho phần diện tích đã chuyển quyền cho phù hợp với tổng giá trị kết cấu hạ tầng. Trường hợp khi điều chỉnh lại phát sinh số thuế nộp thừa so với số thuế thu nhập từ chuyển nhượng bất động sản phải nộp thì doanh nghiệp được trừ số thuế nộp thừa vào số thuế phải nộp của kỳ tính thuế tiếp theo hoặc được hoàn trả theo quy định; nếu số thuế đã nộp chưa đủ thì doanh nghiệp có trách nhiệm nộp đủ số thuế còn thiếu theo quy định."}]},{"id":"nd320_18","no":18,"code":"Điều 18","title":"Điều 18. Nguyên tắc, đối tượng áp dụng ưu đãi thuế thu nhập doanh nghiệp","shortTitle":"Nguyên tắc, đối tượng áp dụng ưu đãi thuế thu nhập doanh nghiệp","chuong":"Chương V — ƯU ĐÃI THUẾ THU NHẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp được hưởng ưu đãi thuế thu nhập doanh nghiệp theo ngành, nghề ưu đãi thuế thu nhập doanh nghiệp, địa bàn ưu đãi thuế thu nhập doanh nghiệp quy định tại Điều này. Mức ưu đãi thuế thu nhập doanh nghiệp thực hiện theo quy định tại Điều 19 và Điều 20 của Nghị định này."},{"k":"p","t":"Trường hợp Nghị định khác của Chính phủ có quy định về ưu đãi thuế thu nhập doanh nghiệp khác với quy định của Nghị định này thì thực hiện theo quy định của Nghị định này, trừ Nghị định quy định chi tiết Luật Thủ đô, Nghị định được ban hành theo quy định tại điểm c khoản 1 Điều 14 Luật Ban hành văn bản quy phạm pháp luật và điểm h khoản 8 Điều 10 Luật Tổ chức Chính phủ, các văn bản hướng dẫn các Nghị quyết quy định cơ chế, chính sách đặc biệt, đặc thù của Quốc hội và các Nghị quyết của Chính phủ, Nghị quyết của Ủy ban Thường vụ Quốc hội quy định các trường hợp tại khoản 2 và khoản 3 Điều 4 của Nghị quyết số 206/2025/QH15 ngày 24 tháng 6 năm 2025 của Quốc hội về cơ chế đặc biệt xử lý khó khăn, vướng mắc do quy định của pháp luật."},{"k":"p","t":"2. Ngành, nghề ưu đãi thuế thu nhập doanh nghiệp bao gồm các trường hợp sau:"},{"k":"p","t":"a) Ứng dụng công nghệ cao, đầu tư mạo hiểm cho phát triển công nghệ cao thuộc danh mục công nghệ cao được ưu tiên đầu tư phát triển theo quy định của Luật Công nghệ cao; ứng dụng công nghệ chiến lược theo quy định của pháp luật về khoa học, công nghệ và đổi mới sáng tạo; ươm tạo công nghệ cao, ươm tạo doanh nghiệp công nghệ cao; đầu tư xây dựng - kinh doanh cơ sở ươm tạo công nghệ cao, ươm tạo doanh nghiệp công nghệ cao;"},{"k":"p","t":"b) Sản xuất sản phẩm phần mềm; sản xuất sản phẩm an toàn thông tin mạng và cung cấp dịch vụ an toàn thông tin mạng đảm bảo các điều kiện theo quy định của pháp luật về an toàn thông tin mạng; sản xuất sản phẩm, cung cấp dịch vụ công nghệ số trọng điểm, sản xuất thiết bị điện tử theo quy định của pháp luật về công nghiệp công nghệ số; nghiên cứu và phát triển, thiết kế, sản xuất, đóng gói, kiểm thử sản phẩm chip bán dẫn; xây dựng trung tâm dữ liệu trí tuệ nhân tạo theo quy định của pháp luật về công nghiệp công nghệ số;"},{"k":"p","t":"c) Sản xuất sản phẩm công nghiệp hỗ trợ thuộc Danh mục sản phẩm công nghiệp hỗ trợ ưu tiên phát triển do Chính phủ quy định đáp ứng một trong các tiêu chí sau đây:"},{"k":"p","t":"c1) Sản phẩm công nghiệp hỗ trợ cho công nghệ cao theo quy định của Luật Công nghệ cao;"},{"k":"p","t":"c2) Sản phẩm công nghiệp hỗ trợ cho sản xuất sản phẩm các ngành dệt - may, da - giầy, điện tử - tin học (bao gồm cả thiết kế, sản xuất bán dẫn), sản xuất lắp ráp ô tô, cơ khí chế tạo đến ngày Luật Thuế thu nhập doanh nghiệp có hiệu lực thi hành (ngày 01 tháng 10 năm 2025) mà trong nước chưa sản xuất được hoặc đã sản xuất được nhưng phải đáp ứng tiêu chuẩn kỹ thuật của Liên minh Châu Âu hoặc tương đương (nếu có) theo hướng dẫn của Bộ trưởng Bộ Công Thương;"},{"k":"p","t":"d) Sản xuất năng lượng tái tạo, năng lượng sạch, năng lượng từ việc tiêu hủy chất thải; bảo vệ môi trường; sản xuất vật liệu composit, các loại vật liệu xây dựng nhẹ, vật liệu quý hiếm; sản xuất quốc phòng, an ninh và sản xuất sản phẩm động viên công nghiệp theo quy định của pháp luật về công nghiệp quốc phòng, an ninh và động viên công nghiệp; sản xuất sản phẩm công nghiệp hóa chất trọng điểm và sản phẩm cơ khí trọng điểm theo quy định của pháp luật về hóa chất, pháp luật về cơ khí;"},{"k":"p","t":"đ) Đầu tư phát triển nhà máy nước, nhà máy điện, hệ thống cấp thoát nước, cầu, đường bộ, đường sắt, cảng hàng không, cảng biển, cảng sông, sân bay, nhà ga và công trình cơ sở hạ tầng đặc biệt quan trọng khác do Thủ tướng Chính phủ quyết định;"},{"k":"p","t":"e) Doanh nghiệp công nghệ cao, doanh nghiệp nông nghiệp ứng dụng công nghệ cao theo quy định của Luật Công nghệ cao; doanh nghiệp khoa học và công nghệ theo quy định của Luật Khoa học, công nghệ và đổi mới sáng tạo;"},{"k":"p","t":"g) Dự án đầu tư trong lĩnh vực sản xuất đáp ứng các điều kiện sau đây:"},{"k":"p","t":"g1) Có quy mô vốn đầu tư tối thiểu 12.000 tỷ đồng và thực hiện giải ngân tổng vốn đầu tư đăng ký không quá 05 năm kể từ ngày được phép đầu tư theo quy định của pháp luật về đầu tư;"},{"k":"p","t":"g2) Sử dụng công nghệ đáp ứng yêu cầu theo quy định của Bộ trưởng Bộ Khoa học và Công nghệ;"},{"k":"p","t":"h) Dự án đầu tư thuộc đối tượng ưu đãi và hỗ trợ đầu tư đặc biệt quy định tại khoản 2 Điều 20 Luật Đầu tư."},{"k":"p","t":"Thời gian giải ngân tổng vốn đầu tư của các dự án quy định tại điểm này không quá 10 năm kể từ thời điểm cấp Giấy chứng nhận đầu tư hoặc được phép đầu tư theo quy định của pháp luật về đầu tư;"},{"k":"p","t":"i) Trồng, chăm sóc, bảo vệ rừng; sản xuất, nhân và lai tạo giống cây trồng, vật nuôi; đầu tư bảo quản nông sản sau thu hoạch, bảo quản nông sản, thủy sản và thực phẩm; sản xuất, khai thác và tinh chế muối, trừ sản xuất muối quy định tại khoản 1 Điều 4 của Nghị định này;"},{"k":"p","t":"k) Nuôi trồng lâm sản;"},{"k":"p","t":"l) Sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, chế biến nông sản, thủy sản."},{"k":"p","t":"Thu nhập từ chế biến nông sản, thủy sản quy định tại điểm này phải đáp ứng các điều kiện quy định tại điểm b1 và điểm b2 khoản 1 Điều 4 của Nghị định này;"},{"k":"p","t":"m) Sản xuất thép cao cấp; sản xuất sản phẩm tiết kiệm năng lượng; sản xuất máy móc, thiết bị phục vụ cho sản xuất nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp; sản xuất thiết bị tưới tiêu; sản xuất thức ăn gia súc, gia cầm, thủy sản;"},{"k":"p","t":"n) Sản xuất, lắp ráp ô tô; sản xuất sản phẩm công nghệ số khác;"},{"k":"p","t":"o) Đầu tư kinh doanh cơ sở kỹ thuật hỗ trợ doanh nghiệp nhỏ và vừa, cơ sở ươm tạo doanh nghiệp nhỏ và vừa; đầu tư kinh doanh khu làm việc chung hỗ trợ doanh nghiệp nhỏ và vừa khởi nghiệp sáng tạo theo quy định của Luật Hỗ trợ doanh nghiệp nhỏ và vừa;"},{"k":"p","t":"p) Quỹ tín dụng nhân dân, tổ chức tài chính vi mô, ngân hàng hợp tác xã;"},{"k":"p","t":"q) Hợp tác xã, liên hiệp hợp tác xã hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp;"},{"k":"p","t":"r) Xã hội hóa trong các lĩnh vực giáo dục - đào tạo, dạy nghề, y tế, văn hóa, thể thao, môi trường theo Danh mục loại hình, tiêu chí quy mô, tiêu chuẩn do Thủ tướng Chính phủ quy định; giám định tư pháp;"},{"k":"p","t":"s) Đầu tư xây dựng nhà ở xã hội để bán, cho thuê, cho thuê mua đối với các đối tượng quy định tại Luật Nhà ở;"},{"k":"p","t":"t) Xuất bản theo quy định của Luật Xuất bản;"},{"k":"p","t":"u) Báo chí (bao gồm cả quảng cáo trên báo) theo quy định của Luật Báo chí."},{"k":"p","t":"3. Địa bàn ưu đãi thuế thu nhập doanh nghiệp bao gồm:"},{"k":"p","t":"a) Địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định của pháp luật về đầu tư, trừ địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn quy định tại số thứ tự 55 Phụ lục III danh mục địa bàn ưu đãi đầu tư ban hành kèm theo Nghị định số 31/2021/NĐ-CP ngày 26 tháng 3 năm 2021 của Chính phủ (được sửa đổi, bổ sung tại khoản 37 Điều 1 Nghị định số 239/2025/NĐ-CP ngày 03 tháng 9 năm 2025 của Chính phủ);"},{"k":"p","t":"b) Địa bàn có điều kiện kinh tế - xã hội khó khăn theo quy định của pháp luật về đầu tư, trừ địa bàn có điều kiện kinh tế - xã hội khó khăn quy định tại số thứ tự 55 Phụ lục III danh mục địa bàn ưu đãi đầu tư ban hành kèm theo Nghị định số 31/2021/NĐ-CP ngày 26 tháng 3 năm 2021 của Chính phủ (được sửa đổi, bổ sung tại khoản 37 Điều 1 Nghị định số 239/2025/NĐ-CP ngày 03 tháng 9 năm 2025 của Chính phủ);"},{"k":"p","t":"c) Khu kinh tế, khu công nghệ cao, khu nông nghiệp ứng dụng công nghệ cao, khu công nghệ số tập trung."}]},{"id":"nd320_19","no":19,"code":"Điều 19","title":"Điều 19. Thuế suất ưu đãi","shortTitle":"Thuế suất ưu đãi","chuong":"Chương V — ƯU ĐÃI THUẾ THU NHẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Áp dụng thuế suất 10% trong 15 năm đối với:"},{"k":"p","t":"a) Thu nhập của doanh nghiệp từ thực hiện dự án đầu tư mới quy định tại các điểm a, b, c, d và đ khoản 2 Điều 18; thu nhập của doanh nghiệp quy định tại điểm e khoản 2 Điều 18 của Nghị định này;"},{"k":"p","t":"b) Thu nhập của doanh nghiệp từ thực hiện dự án đầu tư quy định tại điểm g và điểm h khoản 2 Điều 18 của Nghị định này;"},{"k":"p","t":"c) Thu nhập của doanh nghiệp từ thực hiện dự án đầu tư mới thuộc địa bàn quy định tại điểm a khoản 3 Điều 18 của Nghị định này;"},{"k":"p","t":"d) Thu nhập của doanh nghiệp từ thực hiện dự án đầu tư mới tại khu công nghệ cao, khu nông nghiệp ứng dụng công nghệ cao, khu công nghệ số tập trung; dự án đầu tư mới tại khu kinh tế nằm trên địa bàn ưu đãi thuế quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này, bao gồm cả trường hợp dự án đầu tư mới tại khu kinh tế mà vị trí thực hiện dự án đầu tư mới có trên 50% phần diện tích nằm trên địa bàn ưu đãi thuế quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này."},{"k":"p","t":"2. Áp dụng thuế suất 10% trong suốt thời gian hoạt động đối với:"},{"k":"p","t":"a) Thu nhập của doanh nghiệp tại địa bàn ưu đãi thuế quy định tại điểm b khoản 3 Điều 18 của Nghị định này từ hoạt động thuộc ngành, nghề quy định tại điểm k và điểm l khoản 2 Điều 18 của Nghị định này;"},{"k":"p","t":"b) Thu nhập của doanh nghiệp từ hoạt động thuộc ngành, nghề quy định tại các điểm i, r và s khoản 2 Điều 18 của Nghị định này;"},{"k":"p","t":"c) Thu nhập của nhà xuất bản từ hoạt động thuộc ngành, nghề quy định tại điểm t khoản 2 Điều 18 của Nghị định này;"},{"k":"p","t":"d) Thu nhập của hợp tác xã, liên hiệp hợp tác xã quy định tại điểm q khoản 2 Điều 18 của Nghị định này không thuộc địa bàn quy định tại khoản 3 Điều 18 của Nghị định này;"},{"k":"p","t":"đ) Thu nhập của cơ quan báo chí thuộc ngành, nghề quy định tại điểm u khoản 2 Điều 18 của Nghị định này."},{"k":"p","t":"3. Áp dụng thuế suất 15% trong suốt thời gian hoạt động đối với thu nhập của doanh nghiệp không thuộc địa bàn quy định tại khoản 3 Điều 18 của Nghị định này từ hoạt động thuộc ngành, nghề quy định tại điểm l khoản 2 Điều 18 của Nghị định này."},{"k":"p","t":"4. Áp dụng thuế suất 17% trong thời gian 10 năm đối với:"},{"k":"p","t":"a) Dự án đầu tư mới thuộc ngành, nghề ưu đãi quy định tại các điểm m, n và o khoản 2 Điều 18 của Nghị định này;"},{"k":"p","t":"b) Dự án đầu tư mới thực hiện tại địa bàn quy định tại điểm b khoản 3 Điều 18 của Nghị định này;"},{"k":"p","t":"c) Dự án đầu tư mới tại khu kinh tế không nằm trên địa bàn quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này, bao gồm cả trường hợp dự án đầu tư mới của doanh nghiệp thực hiện tại khu kinh tế mà vị trí thực hiện dự án đầu tư mới có trên 50% phần diện tích nằm trên địa bàn không phải là địa bàn ưu đãi thuế quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này."},{"k":"p","t":"5. Áp dụng thuế suất 17% trong suốt thời gian hoạt động đối với thu nhập của doanh nghiệp tại điểm p khoản 2 Điều 18 của Nghị định này."},{"k":"p","t":"6. Việc kéo dài thời gian và áp dụng thuế suất ưu đãi"},{"k":"p","t":"a) Thủ tướng Chính phủ quyết định việc kéo dài thêm thời gian áp dụng thuế suất ưu đãi tối đa không quá 15 năm đối với các trường hợp quy định tại điểm b và điểm c khoản này;"},{"k":"p","t":"b) Dự án đầu tư mới quy định tại các điểm a, b, d và đ khoản 2 Điều 18 của Nghị định này, có quy mô vốn đầu tư tối thiểu 6.000 tỷ đồng, có ảnh hưởng lớn về kinh tế - xã hội cần đặc biệt khuyến khích;"},{"k":"p","t":"c) Dự án đầu tư quy định tại điểm g khoản 2 Điều 18 của Nghị định này đáp ứng một trong các tiêu chí sau:"},{"k":"p","t":"c1) Sản xuất sản phẩm hàng hóa có khả năng cạnh tranh toàn cầu, doanh thu đạt trên 20.000 tỷ đồng/năm chậm nhất sau 05 năm kể từ khi có doanh thu từ dự án đầu tư;"},{"k":"p","t":"c2) Sử dụng thường xuyên trên 6.000 lao động được xác định theo quy định của pháp luật về lao động;"},{"k":"p","t":"c3) Dự án đầu tư thuộc lĩnh vực hạ tầng kinh tế kỹ thuật, bao gồm: Đầu tư phát triển nhà máy nước, nhà máy điện, hệ thống cấp thoát nước, cầu, đường bộ, đường sắt, cảng hàng không, cảng biển, cảng sông, sân bay, nhà ga, năng lượng mới, năng lượng sạch, công nghiệp tiết kiệm năng lượng, dự án lọc hóa dầu;"},{"k":"p","t":"d) Đối với dự án đầu tư mới quy định tại điểm h khoản 2 Điều 18 của Nghị định này, Thủ tướng Chính phủ quyết định việc áp dụng thuế suất giảm không quá 50% mức thuế suất quy định tại khoản 1 Điều này; thời gian áp dụng thuế suất ưu đãi không quá 1,5 lần so với thời gian áp dụng thuế suất ưu đãi quy định tại khoản 1 Điều này và được kéo dài thêm không quá 15 năm nhưng không vượt quá thời hạn của dự án đầu tư."},{"k":"p","t":"7. Thời gian áp dụng thuế suất ưu đãi đối với thu nhập từ thực hiện dự án đầu tư mới của doanh nghiệp quy định tại Điều này (bao gồm cả dự án nêu tại điểm g khoản 2 Điều 18 của Nghị định này) được tính từ năm đầu tiên dự án đầu tư mới của doanh nghiệp có doanh thu."},{"k":"p","t":"Trường hợp doanh nghiệp được cấp Giấy chứng nhận doanh nghiệp công nghệ cao, Giấy chứng nhận doanh nghiệp nông nghiệp ứng dụng công nghệ cao, Giấy chứng nhận doanh nghiệp khoa học và công nghệ, Giấy chứng nhận dự án ứng dụng công nghệ cao, Giấy xác nhận ưu đãi dự án sản xuất sản phẩm công nghiệp hỗ trợ sau thời điểm phát sinh doanh thu thì thời gian áp dụng thuế suất ưu đãi được tính kể từ năm được cấp Giấy chứng nhận, Giấy xác nhận ưu đãi."}]},{"id":"nd320_20","no":20,"code":"Điều 20","title":"Điều 20. Miễn thuế, giảm thuế","shortTitle":"Miễn thuế, giảm thuế","chuong":"Chương V — ƯU ĐÃI THUẾ THU NHẬP DOANH NGHIỆP","muc":"","level":1,"content":[{"k":"p","t":"1. Miễn thuế 04 năm và giảm 50% số thuế phải nộp trong 09 năm tiếp theo đối với:"},{"k":"p","t":"a) Thu nhập của doanh nghiệp quy định tại khoản 1 Điều 19 của Luật này;"},{"k":"p","t":"b) Thu nhập của doanh nghiệp quy định tại điểm r khoản 2 Điều 18 của Nghị định này thuộc địa bàn quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này; trường hợp thu nhập của doanh nghiệp quy định tại điểm r khoản 2 Điều 18 của Nghị định này không thuộc địa bàn quy định tại điểm a và điểm b khoản 3 Điều 18 của Nghị định này được miễn thuế tối đa 04 năm và giảm 50% số thuế phải nộp tối đa không quá 05 năm tiếp theo."},{"k":"p","t":"2. Miễn thuế 02 năm và giảm 50% số thuế phải nộp trong 04 năm tiếp theo đối với thu nhập của doanh nghiệp quy định tại khoản 4 Điều 19 của Nghị định này."},{"k":"p","t":"3. Đối với các dự án đầu tư mới quy định tại các điểm h khoản 2 Điều 18 của Nghị định này, Thủ tướng Chính phủ quyết định kéo dài thời gian miễn thuế, giảm thuế tối đa không quá 1,5 lần thời gian miễn thuế, giảm thuế quy định tại khoản 1 Điều này và không vượt quá thời hạn của dự án đầu tư."},{"k":"p","t":"4. Thời gian miễn thuế, giảm thuế được tính từ năm đầu tiên có thu nhập chịu thuế từ dự án đầu tư, trường hợp không có thu nhập chịu thuế trong 03 năm đầu, kể từ năm đầu tiên có doanh thu từ dự án thì thời gian miễn thuế, giảm thuế được tính từ năm thứ 04."},{"k":"p","t":"Trường hợp doanh nghiệp được cấp Giấy chứng nhận dự án ứng dụng công nghệ cao, Giấy chứng nhận doanh nghiệp công nghệ cao, Giấy chứng nhận doanh nghiệp nông nghiệp ứng dụng công nghệ cao, Giấy chứng nhận doanh nghiệp khoa học và công nghệ, Giấy xác nhận ưu đãi dự án sản xuất sản phẩm công nghiệp hỗ trợ sau thời điểm phát sinh thu nhập thì thời gian miễn thuế, giảm thuế được tính kể từ năm được cấp Giấy chứng nhận, Giấy xác nhận ưu đãi. Trường hợp tại năm cấp Giấy chứng nhận, Giấy xác nhận ưu đãi mà chưa có thu nhập thì thời gian miễn thuế, giảm thuế được tính kể từ năm đầu tiên có thu nhập, nếu trong 03 năm đầu kể từ năm được cấp Giấy chứng nhận, Giấy xác nhận ưu đãi mà doanh nghiệp không có thu nhập chịu thuế thì thời gian miễn thuế, g
