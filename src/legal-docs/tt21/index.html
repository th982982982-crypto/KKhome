<script id="LD" type="application/json">{"meta":{"title":"Thông tư 21/2026/TT-BTC — Sửa đổi, bổ sung một số điều của Thông tư số 80/2021/TT-BTC","shortCode":"TT 21/2026","subtitle":"Sửa đổi, bổ sung TT 80/2021 (miễn giảm tiền thuê đất, mẫu TNDN)","slug":"tt21","effectiveDate":"17/03/2026","scope":"","description":"Sửa đổi, bổ sung TT 80/2021 (miễn giảm tiền thuê đất, mẫu TNDN)","related":[]},"outline":[{"id":"tt21_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điều của Thông tư số 80/2021/TT-BTC ngày 29 tháng 9 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành một số điều của Luật Quản lý thuế và Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế","shortTitle":"Sửa đổi, bổ sung một số điều của Thông tư số 80/2021/TT-BTC ngày 29 tháng 9 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành một số điều của Luật Quản lý thuế và Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi Điều 59 như sau:"},{"k":"p","t":"“Điều 59. Hồ sơ miễn tiền thuê đất một số năm, giảm tiền thuê đất đối với trường hợp cơ quan thuế có thẩm quyền giải quyết hồ sơ miễn thuế, giảm thuế"},{"k":"p","t":"1. Hồ sơ miễn, giảm tiền thuê đất đối với trường hợp được Nhà nước cho thuê đất trả tiền thuê đất hàng năm để sử dụng vào mục đích sản xuất nông nghiệp, lâm nghiệp, nuôi trồng thủy sản, làm muối mà bị thiên tai, hoả hoạn theo quy định tại khoản 3 Điều 5 Nghị định số 230/2025/NĐ-CP ngày 19 tháng 8 năm 2025 của Chính phủ quy định các trường hợp khác được miễn, giảm tiền sử dụng đất, tiền thuê đất theo quy định tại khoản 2 Điều 157 Luật Đất đai năm 2024, bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị theo mẫu số 01/MGTH ban hành kèm theo phụ lục I Thông tư này;"},{"k":"p","t":"b) Biên bản xác định mức độ, giá trị thiệt hại về tài sản theo mẫu số 02/MGTH ban hành kèm theo phụ lục I Thông tư này (không cần xác nhận của đại diện chính quyền)."},{"k":"p","t":"Cơ quan có thẩm quyền xác định mức độ, giá trị thiệt hại là cơ quan tài chính hoặc các cơ quan giám định xác định mức độ, giá trị thiệt hại về tài sản."},{"k":"p","t":"Trường hợp thiệt hại về hàng hoá: Người nộp thuế cung cấp Biên bản giám định (chứng thư giám định) về mức độ thiệt hại của Cơ quan giám định và cơ quan giám định phải chịu trách nhiệm pháp lý về tính chính xác của kết quả và kết luận trong chứng thư giám định theo quy định của pháp luật;"},{"k":"p","t":"c) Bản sao tài liệu chứng minh về các khoản hỗ trợ của Nhà nước theo quy định của pháp luật (trong trường hợp người thuê đất có nhận được khoản hỗ trợ của Nhà nước theo quy định của pháp luật);"},{"k":"p","t":"d) Bản sao Quyết định cho thuê đất hoặc Hợp đồng thuê đất của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Hồ sơ giảm tiền thuê đất đối với trường hợp được Nhà nước cho thuê đất trả tiền thuê đất hàng năm sử dụng vào mục đích sản xuất, kinh doanh (trừ dự án sử dụng đất vào mục đích sản xuất nông nghiệp, lâm nghiệp, nuôi trồng thủy sản, làm muối) nhưng phải tạm ngừng hoạt động để khắc phục hậu quả do bị thiên tai, hỏa hoạn hoặc do tai nạn bất khả kháng theo quy định tại khoản 4 Điều 5 Nghị định số 230/2025/NĐ-CP, bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị theo mẫu số 01/MGTH ban hành kèm theo phụ lục I Thông tư này;"},{"k":"p","t":"b) Bản sao văn bản xác nhận về thời gian tạm ngừng hoạt động sản xuất, kinh doanh của cơ quan quản lý nhà nước về đăng ký đầu tư hoặc cơ quan được Ủy ban nhân dân cấp tỉnh giao nhiệm vụ xác định thời gian tạm ngừng hoạt động sản xuất, kinh doanh theo quy định;"},{"k":"p","t":"c) Bản sao Quyết định cho thuê đất hoặc Hợp đồng thuê đất của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"3. Hồ sơ miễn, giảm tiền thuê đất đối với tổ chức, đơn vị có sử dụng lao động là người dân tộc thiểu số cư trú hợp pháp trên địa bàn các tỉnh, thành phố trực thuộc trung ương và các địa bàn có địa giới hành chính thuộc đối tượng được hưởng chính sách hỗ trợ theo Quyết định của Thủ tướng Chính phủ về việc hỗ trợ tổ chức, đơn vị sử dụng lao động là người dân tộc thiểu số tại khu vực miền núi, vùng đặc biệt khó khăn theo quy định tại khoản 5 Điều 5 Nghị định số 230/2025/NĐ-CP, bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị theo mẫu số 01/MGTH ban hành kèm theo phụ lục I Thông tư này;"},{"k":"p","t":"b) Văn bản của tổ chức, đơn vị thông tin về: Tỷ lệ (%) sử dụng lao động là người dân tộc thiểu số, số lao động là người dân tộc thiểu số bình quân năm và số lao động có mặt làm việc thường xuyên bình quân năm theo quy định tại khoản 5 Điều 5 Nghị định số 230/2025/NĐ-CP."},{"k":"p","t":"Tổ chức, đơn vị có sử dụng lao động là người dân tộc thiểu số chịu trách nhiệm về các thông tin cung cấp nêu trên;"},{"k":"p","t":"c) Bản sao Quyết định cho thuê đất hoặc Hợp đồng thuê đất của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"4. Hồ sơ miễn, giảm tiền thuê đất đối với tổ chức, đơn vị có sử dụng lao động là người khuyết tật được Nhà nước cho thuê đất trả tiền thuê đất hàng năm sử dụng vào mục đích sản xuất, kinh doanh theo quy định tại khoản 6 Điều 5 Nghị định số 230/2025/NĐ-CP, bao gồm:"},{"k":"p","t":"a) Văn bản đề nghị theo mẫu số 01/MGTH ban hành kèm theo phụ lục I Thông tư này;"},{"k":"p","t":"b) Bản sao văn bản của cơ quan nhà nước có thẩm quyền xác nhận tỷ lệ (%) sử dụng lao động là người khuyết tật theo quy định tại Thông tư số 18/2018/TT-BLĐTBXH ngày 30 tháng 10 năm 2018 của Bộ trưởng Bộ Lao động - Thương binh và Xã hội sửa đổi, bổ sung một số điều của các Thông tư liên quan đến thủ tục hành chính thuộc phạm vi chức năng quản lý nhà nước của Bộ Lao động - Thương binh và Xã hội hoặc văn bản của tổ chức, đơn vị thông tin về tỷ lệ (%) sử dụng lao động là người khuyết tật của năm trước liền kề năm phải nộp tiền thuê đất theo quy định tại khoản 6 Điều 5 Nghị định số 230/2025/NĐ-CP."},{"k":"p","t":"Tổ chức, đơn vị có sử dụng lao động là người khuyết tật chịu trách nhiệm về thông tin cung cấp nêu trên;"},{"k":"p","t":"c) Bản sao Quyết định cho thuê đất hoặc Hợp đồng thuê đất của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"5. Đối với các giấy tờ trong hồ sơ miễn, giảm tiền thuê đất quy định tại Điều này do cơ quan nhà nước cấp hoặc xác nhận đã được tích hợp đầy đủ trên cơ sở dữ liệu quốc gia và Cơ quan có thẩm quyền giải quyết miễn, giảm tiền thuê đất được quyền khai thác dữ liệu này thì người thuê đất không phải nộp các giấy tờ này khi nộp hồ sơ đề nghị miễn, giảm tiền thuê đất. Trường hợp không khai thác được thông tin hoặc thông tin khai thác được không đầy đủ, không chính xác thì cơ quan có thẩm quyền giải quyết miễn, giảm tiền thuê đất yêu cầu người thuê đất bổ sung thành phần hồ sơ để giải quyết miễn, giảm tiền thuê đất; đồng thời đề nghị người thuê đất thực hiện cập nhật, điều chỉnh thông tin trong các Cơ sở dữ liệu theo quy định của pháp luật.”."},{"k":"p","t":"2. Sửa đổi khoản 2 Điều 82 như sau:"},{"k":"p","t":"“2. Mức kinh phí ủy nhiệm thu:"},{"k":"p","t":"Mức kinh phí ủy nhiệm thu đối với các khoản thu tại khoản 1 Điều này được xác định bằng tỷ lệ % trên tổng số tiền thuế và các khoản thu khác thuộc ngân sách nhà nước được quy định trong Hợp đồng ủy nhiệm thu."},{"k":"p","t":"Giao Cục trưởng Cục Thuế quyết định mức kinh phí ủy nhiệm thu phù hợp với từng địa bàn. Mức kinh phí ủy nhiệm thu bình quân không vượt quá 6% trên tổng số tiền thu được, Cục Thuế được điều hòa giữa các địa phương. Nội dung chi ủy nhiệm thu được bố trí ngoài định mức chi quản lý hành chính, được giao trong dự toán chi hoạt động thường xuyên của Cơ quan Thuế theo quy định.”."},{"k":"p","t":"3. Thay thế một số mẫu biểu như sau:"},{"k":"p","t":"a) Thay thế Mẫu số 02/TNDN ban hành kèm theo Thông tư số 80/2021/TT-BTC bằng Mẫu số 02/TNDN ban hành kèm theo Thông tư này."},{"k":"p","t":"b) Thay thế Mẫu số 05/TNDN ban hành kèm theo Thông tư số 80/2021/TT-BTC bằng Mẫu số 05/TNDN ban hành kèm theo Thông tư này."},{"k":"p","t":"4. Bãi bỏ Điều 60 Thông tư số 80/2021/TT-BTC."}]},{"id":"tt21_2","no":2,"code":"Điều 2","title":"Điều 2. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trong thời gian Ủy ban nhân dân cấp tỉnh chưa ban hành trình tự, thủ tục hành chính về đất đai, trong đó có giấy tờ chứng minh thuộc đối tượng miễn, giảm nghĩa vụ tài chính theo quy định tại khoản 22 Điều 13 Nghị định số 50/2026/NĐ-CP ngày 31 tháng 01 năm 2026 của Chính phủ quy định chi tiết một số điều của Nghị quyết số 254/2025/QH15 ngày 11 tháng 12 năm 2025 của Quốc hội quy định một số cơ chế, chính sách tháo gỡ khó khăn, vướng mắc trong tổ chức thi hành Luật Đất đai về tiền sử dụng đất, tiền thuê đất thì Ủy ban nhân dân cấp tỉnh quyết định việc áp dụng hồ sơ miễn, giảm tiền sử dụng đất, tiền thuê đất quy định tại Điều 59, Điều 60 Thông tư số 80/2021/TT-BTC hoặc quyết định hồ sơ miễn, giảm tiền sử dụng đất, tiền thuê đất đối với từng trường hợp cụ thể."},{"k":"p","t":"2. Đối với trường hợp doanh nghiệp nước ngoài quy định tại các điểm b2, b3 và b4 khoản 1 Điều 2 Nghị định số 320/2025/NĐ-CP ngày 15/12/2025 của Chính phủ có hợp đồng chuyển nhượng vốn đã ký trước ngày Nghị định số 320/2025/NĐ-CP có hiệu lực thi hành, doanh nghiệp nước ngoài thực hiện khai thuế thu nhập doanh nghiệp đối với hoạt động chuyển nhượng vốn theo Mẫu số 05/TNDN ban hành kèm theo Thông tư số 80/2021/TT-BTC ngày 29/9/2021 của Bộ Tài chính."}]},{"id":"tt21_3","no":3,"code":"Điều 3","title":"Điều 3. Điều khoản thi hành","shortTitle":"Điều khoản thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày 17 tháng 3 năm 2026."},{"k":"p","t":"2. Trong trường hợp các văn bản quy phạm pháp luật dẫn chiếu tại Thông tư này được sửa đổi, bổ sung, thay thế thì thực hiện theo quy định tương ứng tại văn bản sửa đổi, bổ sung, thay thế đó."},{"k":"p","t":"3. Trong quá trình thực hiện, trường hợp có khó khăn, vướng mắc, đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để được hướng dẫn./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ:- Văn phòng Trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Hội đồng Dân tộc;- Ủy ban Kinh tế và Tài chính;- Văn phòng Chủ tịch nước;- Viện kiểm sát nhân dân tối cao;- Toà án nhân dân tối cao;- Kiểm toán nhà nước;- Cơ quan trung ương của các đoàn thể;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Thuế, Sở Tài chính các tỉnh, thành phố trực thuộc trung ương;- Kho bạc Nhà nước các khu vực;- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính, Bộ Tư pháp;- Công báo;- Cổng Thông tin điện tử Chính phủ;- Cơ sở dữ liệu quốc gia về pháp luật;- Cổng Thông tin điện tử Bộ Tài chính;- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, CT (CS 160b)","KT. BỘ TRƯỞNGTHỨ TRƯỞNGCao Anh Tuấn"]]},{"k":"tbl","rows":[["","Mẫu số: 02/TNDN(Ban hành kèm theo Thông tư số 21/2026/TT-BTC ngày 17 tháng 3 năm 2026 của Bộ trưởng Bộ Tài chính)"]]},{"k":"p","t":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAMĐộc lập - Tự do - Hạnh phúc________________________"},{"k":"p","t":"TỜ KHAI THUẾ THU NHẬP DOANH NGHIỆP"},{"k":"p","t":"(Áp dụng đối với hoạt động chuyển nhượng bất động sản theo từng lần phát sinh)"},{"k":"p","t":"□ Tổ chức áp dụng phương pháp tỷ lệ trên doanh thu theo quy định của pháp luật về thuế TNDN có hoạt động chuyển nhượng bất động sản"},{"k":"p","t":"□ Cơ quan thi hành án hoặc tổ chức có thẩm quyền bán đấu giá bất động sản, tài sản khác là tài sản bảo đảm thi hành án"},{"k":"p","t":"[01] Kỳ tính thuế: Từng lần phát sinh ngày.........tháng........năm..........."},{"k":"p","t":"[02] Lần đầu □[03] Bổ sung lần thứ:..."},{"k":"p","t":"1. Bên chuyển nhượng"},{"k":"p","t":"[04] Tên tổ chức chuyển nhượng: ......................................................................................."},{"k":"p","t":"[05] Mã số thuế: ................................................................ <script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
