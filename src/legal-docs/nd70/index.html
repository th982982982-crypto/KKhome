 hợp cần điều chỉnh một số tiêu thức nội dung trên biên lai điện tử cho phù hợp với thực tế, tổ chức thu phí, lệ phí có văn bản trao đổi với Bộ Tài chính (Tổng cục Thuế, Tổng cục Hải quan) xem xét và có hướng dẫn trước khi thực hiện."},{"k":"p","t":"Ngoài các thông tin bắt buộc theo quy định tại khoản này, tổ chức thu phí, lệ phí có thể tạo thêm các thông tin khác, kể cả tạo lo-go, hình ảnh trang trí hoặc quảng cáo phù hợp với quy định của pháp luật và không che khuất, làm mờ các nội dung bắt buộc thể hiện trên biên lai. Cỡ chữ của các thông tin tạo thêm không được lớn hơn cỡ chữ của các nội dung bắt buộc thể hiện trên biên lai.”"},{"k":"p","t":"c) Sửa đổi, bổ sung khoản 3 như sau:"},{"k":"p","t":"“3. Ký hiệu mẫu, ký hiệu chứng từ thực hiện theo hướng dẫn của Bộ trưởng Bộ Tài chính. Mẫu hiển thị chứng từ điện tử theo hướng dẫn tại khoản 10 Điều 4 Nghị định số 11/2020/NĐ-CP ngày 20 tháng 01 năm 2020 của Chính phủ quy định về thủ tục hành chính thuộc lĩnh vực Kho bạc Nhà nước và các văn bản hướng dẫn thi hành.”"},{"k":"p","t":"19. Bổ sung Điều 32a vào sau Điều 32 như sau:"},{"k":"p","t":"“Điều 32a. Quy định về lập và ủy nhiệm lập biên lai"},{"k":"p","t":"1. Lập biên lai"},{"k":"p","t":"Nội dung trên biên lai phải đúng với nội dung nghiệp vụ kinh tế phát sinh; biên lai phải được lập theo thứ tự liên tục từ số nhỏ đến số lớn."},{"k":"p","t":"Nội dung lập trên biên lai phải được thống nhất trên các liên có cùng một số biên lai, nếu ghi sai, hỏng thì người thu tiền không được xé khỏi cuống hoặc nếu đã xé thì phải kèm theo tờ biên lai đã ghi sai, hỏng; tổ chức thu phí, lệ phí khi lập biên lai phải đóng dấu của tổ chức thu phí, lệ phí vào góc trên, bên trái liên 2 của biên lai (liên giao cho người nộp các khoản thu khác thuộc ngân sách nhà nước)."},{"k":"p","t":"2. Biên lai được lập theo đúng hướng dẫn tại khoản 1 Điều này là chứng từ hợp pháp để thanh toán, hạch toán và quyết toán tài chính."},{"k":"p","t":"Trường hợp không đáp ứng các hướng dẫn tại khoản 1 Điều này thì không có giá trị thanh toán và không được hạch toán, quyết toán tài chính."},{"k":"p","t":"3. Ủy nhiệm lập biên lai"},{"k":"p","t":"a) Tổ chức thu phí, lệ phí ủy nhiệm cho bên thứ ba lập biên lai. Việc ủy nhiệm giữa bên ủy nhiệm và bên nhận ủy nhiệm phải theo hình thức văn bản, đồng thời phải gửi thông báo cho cơ quan thuế quản lý trực tiếp bên ủy nhiệm và bên nhận ủy nhiệm theo Mẫu số 02/UN-BLG Phụ lục IA ban hành kèm theo Nghị định này, chậm nhất là 03 ngày trước khi bên nhận ủy nhiệm lập biên lai; trường hợp sử dụng biên lai điện tử thì bên ủy nhiệm và bên nhận ủy nhiệm phải thông báo cho cơ quan thuế khi đăng ký sử dụng biên lai điện tử theo Mẫu số 01/ĐKTĐ-CTĐT Phụ lục IA ban hành kèm theo Nghị định này;"},{"k":"p","t":"b) Nội dung văn bản ủy nhiệm phải ghi đầy đủ các thông tin về biên lai ủy nhiệm (hình thức, loại, ký hiệu, số lượng biên lai (từ số... đến số...)); mục đích ủy nhiệm; thời hạn ủy nhiệm; phương thức giao nhận hoặc phương thức cài đặt biên lai ủy nhiệm (nếu là biên lai tự in hoặc điện tử); phương thức thanh toán biên lai ủy nhiệm;"},{"k":"p","t":"c) Bên ủy nhiệm phải lập thông báo ủy nhiệm có ghi đầy đủ các thông tin về biên lai ủy nhiệm, mục đích ủy nhiệm, thời hạn ủy nhiệm dựa trên văn bản ủy nhiệm đã ký kết, có tên, chữ ký, dấu (nếu có) của đại diện bên ủy nhiệm cho bên nhận ủy nhiệm và gửi thông báo phát hành tới cơ quan thuế theo mẫu 02/PH-BLG Phụ lục IA ban hành kèm theo Nghị định này; đồng thời phải được niêm yết tại nơi tổ chức thu tiền phí, lệ phí, tổ chức nhận ủy nhiệm;"},{"k":"p","t":"d) Biên lai ủy nhiệm được lập vẫn phải ghi tên của tổ chức thu phí, lệ phí (bên ủy nhiệm) và đóng dấu bên ủy nhiệm phía trên bên trái của mỗi tờ biên lai (trường hợp biên lai được in từ thiết bị in của bên nhận ủy nhiệm hoặc biên lai điện tử thì không phải đóng dấu, không phải có chữ ký số của bên ủy nhiệm);"},{"k":"p","t":"đ) Trường hợp tổ chức thu phí, lệ phí có nhiều đơn vị trực thuộc trực tiếp thu phí hoặc nhiều cơ sở nhận ủy nhiệm thu cùng sử dụng hình thức biên lai đặt in có cùng ký hiệu theo phương thức phân chia cho tùng cơ sở trong toàn hệ thống thì tổ chức thu phí, lệ phí phải có sổ theo dõi phân bổ số lượng biên lai cho từng đơn vị trực thuộc, từng cơ sở nhận ủy nhiệm. Các đơn vị trực thuộc, cơ sở nhận ủy nhiệm phải sử dụng biên lai theo thứ tự từ số nhỏ đến số lớn trong phạm vi số biên lai được phân chia;"},{"k":"p","t":"e) Bên ủy nhiệm và bên nhận ủy nhiệm phải tổng hợp báo cáo định kỳ việc sử dụng các biên lai ủy nhiệm. Bên ủy nhiệm phải thực hiện báo cáo sử dụng biên lai với cơ quan thuế trực tiếp quản lý theo hướng dẫn tại Nghị định này (bao gồm cả số biên lai của bên nhận ủy nhiệm sử dụng). Bên nhận ủy nhiệm không phải thực hiện thông báo phát hành biên lai và báo cáo tình hình sử dụng biên lai với cơ quan thuế;"},{"k":"p","t":"g) Trường hợp chấm dứt trước hạn ủy nhiệm, hai bên phải xác định bằng văn bản, đồng thời thông báo cho cơ quan thuế và niêm yết tại nơi thu phí, lệ phí.”"},{"k":"p","t":"20. Sửa đổi, bổ sung khoản 1 và khoản 3 Điều 33 như sau:"},{"k":"p","t":"“1. Các loại chứng từ quy định tại khoản 1 Điều 30 Nghị định này phải thực hiện theo định dạng sau:"},{"k":"p","t":"a) Định dạng chứng từ điện tử sử dụng ngôn ngữ định dạng văn bản XML (XML là chữ viết tắt của cụm từ tiếng Anh \"eXtensible Markup Language\" được tạo ra với mục đích chia sẻ dữ liệu điện tử giữa các hệ thống công nghệ thông tin);"},{"k":"p","t":"b) Định dạng chứng từ điện tử gồm hai thành phần: thành phần chứa dữ liệu nghiệp vụ chứng từ điện tử và thành phần chứa dữ liệu chữ ký số;"},{"k":"p","t":"c) Tổng cục Thuế, Tổng cục Hải quan xây dựng và công bố thành phần chứa dữ liệu nghiệp vụ chứng từ điện tử, thành phần chứa dữ liệu chữ ký số và cung cấp công cụ hiển thị các nội dung của chứng từ điện tử theo quy định tại Nghị định này.”"},{"k":"p","t":"“3. Chứng từ điện tử phải được hiển thị đầy đủ, chính xác các nội dung của chứng từ đảm bảo không dẫn tới cách hiểu sai lệch để người sử dụng có thể đọc được bằng phương tiện điện tử.”"},{"k":"p","t":"21. Sửa đổi tên Điều 34 và sửa đổi, bổ sung Điều 34 như sau:"},{"k":"p","t":"“Điều 34. Đăng ký sử dụng chứng từ điện tử"},{"k":"p","t":"1. Tổ chức, cá nhân khấu trừ thuế thu nhập cá nhân, khấu trừ thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số, tổ chức thu các khoản thuế, phí, lệ phí trước khi sử dụng chứng từ điện tử theo khoản 1 Điều 30 Nghị định này thì thực hiện đăng ký sử dụng qua Cổng thông tin điện tử của Tổng cục Thuế, Tổng cục Hải quan hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử."},{"k":"p","t":"Trường hợp tổ chức, cá nhân trả thu nhập không thuộc đối tượng áp dụng hóa đơn điện tử; tổ chức, cá nhân trả thu nhập sử dụng hóa đơn điện tử có mã của cơ quan thuế không phải trả tiền dịch vụ theo quy định tại khoản 11 Điều 1 Nghị định này thì được lựa chọn đăng ký sử dụng chứng từ khấu trừ thuế thu nhập cá nhân điện tử thông qua Cổng thông tin điện tử của Tổng cục Thuế hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử được Tổng cục Thuế ủy thác cung cấp dịch vụ chứng từ khấu trừ thuế thu nhập cá nhân điện tử không phải trả tiền dịch vụ."},{"k":"p","t":"Nội dung thông tin đăng ký theo Mẫu số 01/ĐKTĐ-CTĐT Phụ lục IA ban hành kèm theo Nghị định này."},{"k":"p","t":"Cổng thông tin điện tử của Tổng cục Thuế, Tổng cục Hải quan gửi thông báo theo Mẫu số 01/TB-TNĐT Phụ lục IB ban hành kèm theo Nghị định này về việc tiếp nhận đăng ký sử dụng chứng từ điện tử qua tổ chức cung cấp dịch vụ hóa đơn điện tử đối với trường hợp đăng ký sử dụng chứng từ điện tử thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử."},{"k":"p","t":"Cổng thông tin điện tử của Tổng cục Thuế, Tổng cục Hải quan gửi thông báo điện tử theo Mẫu số 01/TB-TNĐT Phụ lục IB ban hành kèm theo Nghị định này về việc tiếp nhận đăng ký sử dụng chứng từ điện tử cho tổ chức, cá nhân khấu trừ thuế, tổ chức thu các khoản phí, lệ phí, qua địa chỉ thư điện tử đã đăng ký với cơ quan thuế đối với trường hợp đăng ký sử dụng chứng từ điện tử trực tiếp tại Cổng thông tin điện tử của Tổng cục Thuế, Tổng cục Hải quan."},{"k":"p","t":"2. Trong thời gian 01 ngày làm việc kể từ ngày nhận được đăng ký sử dụng chứng từ điện tử, cơ quan quản lý thuế có trách nhiệm gửi Thông báo điện tử theo Mẫu số 01/TB-ĐKĐT Phụ lục IB ban hành kèm theo Nghị định này qua tổ chức cung cấp dịch vụ hóa đơn điện tử và gửi thông báo điện tử trực tiếp đến tổ chức, cá nhân khấu trừ thuế; tổ chức thu các khoản phí, lệ phí về việc chấp nhận hoặc không chấp nhận đăng ký sử dụng chứng từ điện tử."},{"k":"p","t":"3. Kể từ thời điểm cơ quan quản lý thuế chấp nhận đăng ký sử dụng chứng từ điện tử theo quy định tại Nghị định này, tổ chức nêu tại khoản 1 Điều này phải ngừng sử dụng chứng từ điện tử đã thực hiện theo các quy định trước đây, tiêu hủy những chứng từ giấy còn tồn chưa sử dụng (nếu có) theo quy định."},{"k":"p","t":"4. Trường hợp có thay đổi thông tin đã đăng ký sử dụng chứng từ điện tử tại khoản 1 Điều này, tổ chức, cá nhân khấu trừ thuế, tổ chức thu thuế, phí, lệ phí thuộc ngân sách nhà nước thực hiện thay đổi thông tin và gửi lại cơ quan quản lý thuế theo Mẫu số 01/ĐKTĐ-CTĐT Phụ lục IA ban hành kèm theo Nghị định này qua Cổng thông tin điện tử của Tổng cục Thuế, Tổng cục Hải quan hoặc qua tổ chức cung cấp dịch vụ hóa đơn điện tử, Cổng thông tin điện tử của Tổng cục Thuế, Tổng cục Hải quan tiếp nhận mẫu đăng ký thay đổi thông tin và cơ quan quản lý thuế thực hiện theo quy định tại khoản 2 Điều này.”"},{"k":"p","t":"22. Bổ sung Điều 34a và Điều 34b vào sau Điều 34 như sau:"},{"k":"p","t":"“Điều 34a. Xử lý chứng từ điện tử đã lập"},{"k":"p","t":"Trường hợp chứng từ điện tử đã lập sai thì tổ chức khấu trừ thuế thực hiện xử lý chứng từ điện tử đã lập theo nguyên tắc tương tự xử lý hóa đơn điện tử đã lập quy định tại Điều 19 Nghị định này. Thông báo chứng từ đã lập sai theo Mẫu số 04/SS-CTĐT Phụ lục IA ban hành kèm theo Nghị định này."},{"k":"p","t":"Điều 34b. Trách nhiệm của tổ chức, cá nhân khấu trừ thuế thu nhập cá nhân, tổ chức thu thuế, phí, lệ phí khi sử dụng chứng từ điện tử"},{"k":"p","t":"1. Quản lý tên và mật khẩu của các tài khoản đã được cơ quan quản lý thuế cấp."},{"k":"p","t":"2. Tạo lập chứng từ khấu trừ thuế thu nhập cá nhân điện tử, biên lai thu thuế, phí, lệ phí điện tử để gửi đến người bị khấu trừ thuế thu nhập cá nhân, người nộp các khoản thuế, phí, lệ phí và chịu trách nhiệm trước pháp luật về tính hợp pháp, chính xác của chứng từ điện tử đã lập."},{"k":"p","t":"3. Chuyển dữ liệu chứng từ điện tử đến cơ quan quản lý thuế"},{"k":"p","t":"a) Chuyển dữ liệu chứng từ khấu trừ thuế thu nhập cá nhân điện tử"},{"k":"p","t":"Tổ chức, cá nhân khấu trừ thuế sau khi lập đầy đủ các nội dung trên chứng từ khấu trừ thuế thu nhập cá nhân điện tử gửi cho người bị khấu trừ thuế và đồng thời gửi cho cơ quan thuế ngay trong ngày lập chứng từ."},{"k":"p","t":"Tổ chức, cá nhân khấu trừ thuế thực hiện chuyển dữ liệu chứng từ khấu trừ thuế thu nhập cá nhân điện tử đến cơ quan thuế theo định dạng dữ liệu theo quy định tại Điều 33 Nghị định này qua tổ chức cung cấp dịch vụ hóa đơn điện tử; tổ chức khấu trừ thuế thu nhập cá nhân là tổ chức kết nối chuyển dữ liệu hóa đơn điện tử theo hình thức gửi trực tiếp đến cơ quan thuế thì chuyển dữ liệu chứng từ khấu trừ thuế thu nhập cá nhân qua Cổng thông tin điện tử của Tổng cục Thuế; tổ chức, cá nhân trả thu nhập không thuộc đối tượng áp dụng hóa đơn điện tử và tổ chức, cá nhân trả thu nhập sử dụng hóa đơn điện tử có mã của cơ quan thuế không phải trả tiền dịch vụ theo quy định tại khoản 10 Điều 1 Nghị định này thì được lựa chọn chuyển dữ liệu chứng từ khấu trừ thuế thu nhập cá nhân điện tử thông qua Cổng thông tin điện tử của Tổng cục Thuế hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử được Tổng cục Thuế ủy thác cung cấp dịch vụ chứng từ khấu trừ thuế thu nhập cá nhân điện tử."},{"k":"p","t":"b) Tổ chức thu thuế, phí, lệ phí gửi báo cáo tình hình sử dụng biên lai theo Mẫu số BC26/BLĐT Phụ lục IA ban hành kèm theo Nghị định này để gửi cơ quan quản lý thuế cùng với thời gian gửi Tờ khai phí, lệ phí (trừ phí hải quan; lệ phí hàng hoá, hành lý, phương tiện vận tải quá cảnh) theo quy định của Luật Quản lý thuế số 38/2019/QH14 và các văn bản hướng dẫn thi hành."},{"k":"p","t":"4. Lưu trữ và bảo đảm tính toàn vẹn của toàn bộ chứng từ điện tử; thực hiện các quy định pháp luật về bảo đảm an toàn, an ninh hệ thống dữ liệu điện tử."},{"k":"p","t":"5. Chấp hành sự thanh tra, kiểm tra, đối chiếu của cơ quan quản lý thuế và các cơ quan có thẩm quyền theo quy định của pháp luật.”"},{"k":"p","t":"23. Sửa đổi, bổ sung khoản 1 Điều 35 như sau:"},{"k":"p","t":"“1. Cơ quan quản lý thuế tạo biên lai theo hình thức đặt in (loại không in sẵn mệnh giá) được bán cho các tổ chức thu phí, lệ phí theo giá đảm bảo bù đắp chi phí in ấn, phát hành.”"},{"k":"p","t":"24. Sửa đổi, bổ sung khoản 1, khoản 2 và khoản 4 Điều 36 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung khoản 1, khoản 2 như sau:"},{"k":"p","t":"“1. Tổ chức thu phí, lệ phí trước khi sử dụng biên lai đặt in, tự in phải lập Thông báo phát hành biên lai và gửi đến cơ quan quản lý thuế quản lý trực tiếp hoặc cơ quan quản lý thuế nơi người nộp thuế đóng trụ sở. Thông báo phát hành biên lai gửi cơ quan quản lý thuế theo phương thức điện tử."},{"k":"p","t":"2. Phát hành biên lai của cơ quan quản lý thuế"},{"k":"p","t":"Biên lai do cơ quan quản lý thuế đặt in trước khi bán hoặc cấp lần đầu phải lập thông báo phát hành biên lai. Thông báo phát hành biên lai phải được gửi đến tất cả các Cục Thuế hoặc Cục Hải quan trong cả nước trong thời hạn 10 ngày làm việc, kể từ ngày lập thông báo phát hành và trước khi bán. Khi phát hành biên lai phải đảm bảo không được trùng số biên lai trong cùng ký hiệu."},{"k":"p","t":"Trường hợp Cục Thuế hoặc Cục Hải quan đã đưa nội dung Thông báo phát hành biên lai lên trang thông tin điện tử của Tổng cục Thuế hoặc Tổng cục Hải quan thì không phải gửi thông báo phát hành biên lai đến Cục Thuế, Cục Hải quan khác."},{"k":"p","t":"Trường hợp có sự thay đổi về nội dung đã thông báo phát hành, cơ quan quản lý thuế phải thực hiện thủ tục thông báo phát hành mới theo hướng dẫn nêu trên.”"},{"k":"p","t":"b) Sửa đổi, bổ sung khoản 4 như sau:"},{"k":"p","t":"“4. Trình tự, thủ tục phát hành biên lai:"},{"k":"p","t":"a) Thông báo phát hành biên lai và biên lai mẫu phải được gửi đến cơ quan quản lý thuế chậm nhất 05 ngày làm việc trước khi tổ chức kinh doanh bắt đầu sử dụng biên lai. Thông báo phát hành biên lai gồm cả biên lai mẫu phải được niêm yết rõ ràng tại tổ chức thu phí, lệ phí và tổ chức được ủy quyền hoặc ủy nhiệm thu phí, lệ phí trong suốt thời gian sử dụng biên lai;"},{"k":"p","t":"b) Trường hợp khi nhận được Thông báo phát hành biên lai do tổ chức thu thuế, phí, lệ phí gửi đến, cơ quan quản lý thuế phát hiện Thông báo phát hành không đảm bảo đủ nội dung theo đúng quy định thì trong thời hạn 03 ngày làm việc kể từ ngày nhận được Thông báo, cơ quan quản lý thuế phải có văn bản thông báo cho tổ chức thu thuế, phí, lệ phí biết. Tổ chức thu thuế, phí, lệ phí có trách nhiệm điều chỉnh để thông báo phát hành mới đúng quy định;"},{"k":"p","t":"c) Trường hợp tổ chức thu thuế, phí, lệ phí khi phát hành biên lai từ lần thứ hai trở đi, nếu không có sự thay đổi về nội dung và hình thức biên lai đã thông báo phát hành với cơ quan thuế thì không phải gửi kèm biên lai mẫu;"},{"k":"p","t":"d) Đối với các số biên lai đã thực hiện thông báo phát hành nhưng chưa sử dụng hết có in sẵn tên, địa chỉ, khi có sự thay đổi tên, địa chỉ nhưng không thay đổi mã số thuế và cơ quan thuế quản lý trực tiếp, nếu tổ chức thu phí, lệ phí vẫn có nhu cầu sử dụng biên lai đã đặt in thì thực hiện đóng dấu tên, địa chỉ mới vào bên cạnh tiêu thức tên, địa chỉ đã in sẵn để tiếp tục sử dụng và gửi thông báo điều chỉnh thông tin tại Thông báo phát hành biên lai đến cơ quan thuế quản lý trực tiếp theo Mẫu số 02/ĐCPH-BLG Phụ lục IA ban hành kèm theo Nghị định này."},{"k":"p","t":"Trường hợp có sự thay đổi địa chỉ kinh doanh dẫn đến thay đổi cơ quan quản lý thuế quản lý trực tiếp, nếu tổ chức thu phí, lệ phí có nhu cầu tiếp tục sử dụng số biên lai đã phát hành chưa sử dụng hết thì phải nộp báo cáo tình hình sử dụng biên lai với cơ quan quản lý thuế nơi chuyển đi và đóng dấu địa chỉ mới lên biên lai, gửi bảng kê biên lai chưa sử dụng theo Mẫu số 02/BK-BLG Phụ lục IA ban hành kèm theo Nghị định này và thông báo điều chỉnh thông tin tại thông báo phát hành biên lai đến cơ quan thuế nơi chuyển đến (trong đó nêu rõ số biên lai đã phát hành chưa sử dụng, sẽ tiếp tục sử dụng). Nếu tổ chức không có nhu cầu sử dụng số biên lai đã phát hành nhưng chưa sử dụng hết thì thực hiện hủy các số biên lai chưa sử dụng và thông báo kết quả hủy biên lai với cơ quan quản lý thuế nơi chuyển đi và thực hiện thông báo phát hành biên lai mới với cơ quan quản lý thuế nơi chuyển đến.”"},{"k":"p","t":"25. Sửa đổi, bổ sung khoản 2 Điều 38 như sau:"},{"k":"p","t":"“2. Báo cáo tình hình sử dụng biên lai gồm các nội dung sau: Tên đơn vị, mã số thuế (nếu có), địa chỉ; tên loại biên lai; ký hiệu mẫu biên lai, ký hiệu biên lai; số tồn đầu kỳ, mua phát hành trong kỳ; số sử dụng, xóa bỏ, mất, hủy trong kỳ; tồn cuối kỳ gửi cho cơ quan quản lý thuế. Trường hợp trong kỳ không sử dụng biên lai, tại báo cáo tình hình sử dụng biên lai ghi số lượng biên lai sử dụng bằng không (=0). Trường hợp kỳ trước đã sử dụng hết biên lai, đã báo cáo tình hình sử dụng biên lai kỳ trước với số tồn bằng không (0), trong kỳ không thông báo phát hành biên lai thu tiền thuế, phí, lệ phí, không sử dụng biên lai thì tổ chức thu thuế, phí, lệ phí không phải nộp báo cáo tình hình sử dụng biên lai."},{"k":"p","t":"Trường hợp tổ chức thu thuế, phí, lệ phí ủy nhiệm cho bên thứ ba lập biên lai thì tổ chức thu thuế, phí, lệ phí vẫn phải báo cáo tình hình sử dụng biên lai."},{"k":"p","t":"Báo cáo tình hình sử dụng biên lai theo Mẫu số BC26/BLĐT hoặc Mẫu số BC26/BLG Phụ lục IA ban hành kèm theo Nghị định này.”"},{"k":"p","t":"26. Bổ sung điểm g vào khoản 3 Điều 39 như sau:"},{"k":"p","t":"“g) Trình tự tiêu huỷ biên lai đối với hàng hoá xuất khẩu, nhập khẩu, quá cảnh, phương tiện vận tải xuất cảnh, nhập cảnh, quá cảnh thực hiện theo quy định tại điểm a, b, c, d, đ, e khoản này với Cục Hải quan.”"},{"k":"p","t":"27. Sửa đổi, bổ sung khoản 1 Điều 40 như sau:"},{"k":"p","t":"“1. Tổ chức thu các khoản thuế, phí lệ phí nếu phát hiện mất, cháy, hỏng biên lai đã lập hoặc chưa lập phải lập báo cáo về việc mất, cháy, hỏng và thông báo với cơ quan quản lý thuế quản lý trực tiếp với nội dung như sau: tên tổ chức, cá nhân làm mất, cháy, hỏng biên lai; mã số thuế, địa chỉ; căn cứ biên bản mất, cháy, hỏng; tên loại biên lai; ký hiệu mẫu biên lai; ký hiệu biên lai; từ số; đến số; số lượng; liên biên lai chậm nhất không quá 05 ngày làm việc kể từ ngày xảy ra việc mất, cháy, hỏng biên lai. Trường hợp ngày cuối cùng (ngày thứ 05) trùng với ngày nghỉ theo quy định của pháp luật thì ngày cuối cùng của thời hạn được tính là ngày tiếp theo của ngày nghỉ đó."},{"k":"p","t":"Báo cáo về việc mất, cháy, hỏng biên lai thực hiện theo Mẫu số BC21/BLG Phụ lục IA ban hành kèm theo Nghị định này.”"},{"k":"p","t":"28. Sửa đổi, bổ sung khoản 2 Điều 46 như sau:"},{"k":"p","t":"“2. Các bên sử dụng thông tin hóa đơn điện tử bao gồm:"},{"k":"p","t":"a) Các doanh nghiệp, tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh là người bán hàng hóa, cung cấp dịch vụ; các tổ chức, cá nhân là người mua hàng hóa, dịch vụ;"},{"k":"p","t":"b) Các cơ quan quản lý nhà nước sử dụng thông tin hóa đơn điện tử để: thực hiện các thủ tục hành chính theo quy định của pháp luật; kiểm tra tính hợp pháp của hàng hóa lưu thông trên thị trường; phục vụ hoạt động tố tụng, thanh tra, kiểm tra, kiểm toán;"},{"k":"p","t":"c) Các tổ chức tín dụng sử dụng thông tin hóa đơn điện tử để thực hiện các thủ tục về thuế, thủ tục thanh toán qua ngân hàng;"},{"k":"p","t":"d) Các tổ chức cung cấp dịch vụ hóa đơn điện tử;"},{"k":"p","t":"đ) Các tổ chức sử dụng thông tin chứng từ điện tử khấu trừ thuế thu nhập cá nhân; chứng từ điện tử khấu trừ thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số;"},{"k":"p","t":"e) Cơ quan quản lý thuế nước ngoài phù hợp với điều ước quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên.”"},{"k":"p","t":"29. Sửa đổi, bổ sung Điều 47 như sau:"},{"k":"p","t":"“Điều 47. Hình thức khai thác, sử dụng thông tin hóa đơn điện tử trên Cổng thông tin điện tử"},{"k":"p","t":"1. Bên sử dụng thông tin là các doanh nghiệp, tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh là người bán hàng hóa, cung cấp dịch vụ; các tổ chức, cá nhân là người mua hàng hóa, dịch vụ khai thác thông tin từ hóa đơn điện tử theo các nội dung thông tin từ Cổng thông tin điện tử của Tổng cục Thuế."},{"k":"p","t":"2. Bên sử dụng thông tin là các cơ quan quản lý nhà nước, các tổ chức tín dụng, tổ chức cung cấp dịch vụ hóa đơn điện tử: tra cứu, sử dụng thông tin hóa đơn điện tử, chứng từ điện tử theo phạm vi, thời gian, trách nhiệm và quyền truy cập Cổng thông tin điện tử về hóa đơn điện tử được quy định cụ thể tại văn bản thống nhất giữa hai bên."},{"k":"p","t":"Bên sử dụng thông tin nêu tại khoản 2 Điều này có trách nhiệm phân công đầu mối đăng ký sử dụng thông tin hóa đơn điện tử (sau đây gọi tắt là đầu mối đăng ký) và thông báo cho Tổng cục Thuế bằng văn bản."},{"k":"p","t":"3. Tổng cục Thuế, Cục Thuế thực hiện cấp tối đa 02 tài khoản khai thác sử dụng thông tin hóa đơn điện tử cho người sử dụng của cơ quan, tổ chức quản lý đồng cấp theo văn bản giữa các bên.”"},{"k":"p","t":"30. Sửa đổi tên Điều 48 và sửa đổi, bổ sung Điều 48 như sau:"},{"k":"p","t":"“Điều 48. Cung cấp, tra cứu thông tin hóa đơn điện tử"},{"k":"p","t":"1. Nội dung thông tin hóa đơn điện tử được cung cấp là các nội dung của hóa đơn điện tử theo quy định tại Điều 10 Nghị định này và tình trạng hóa đơn điện tử."},{"k":"p","t":"2. Thông tin hóa đơn điện tử được cơ quan thuế cung cấp dưới dạng văn bản hoặc dữ liệu điện tử.”"},{"k":"p","t":"31. Sửa đổi tên Điều 49 và sửa đổi, bổ sung Điều 49 như sau:"},{"k":"p","t":"“Điều 49. Đăng ký mới, bổ sung thông tin đăng ký, thu hồi tài khoản truy cập Cổng thông tin điện tử để khai thác sử dụng thông tin hóa đơn điện tử"},{"k":"p","t":"1. Đầu mối đăng ký của bên sử dụng thông tin gửi 01 văn bản đến Tổng cục Thuế hoặc Cục Thuế để đề nghị đăng ký mới hoặc bổ sung thông tin hoặc thu hồi tài khoản theo Mẫu số 01/CCTT-ĐK Phụ lục II ban hành kèm theo Nghị định này."},{"k":"p","t":"2. Trong thời hạn không quá 02 ngày làm việc kể từ khi nhận được văn bản đề nghị, Tổng cục Thuế hoặc Cục Thuế thực hiện việc cấp tài khoản mới hoặc bổ sung thông tin của tài khoản hoặc thu hồi tài khoản và thông báo cho bên sử dụng thông tin bằng văn bản. Trường hợp không chấp nhận đăng ký tài khoản hoặc không bổ sung thời hạn sử dụng của tài khoản phải nêu rõ lý do."},{"k":"p","t":"Các tài khoản đăng ký mới cấp cho từng cá nhân được thông báo bằng hình thức gửi thư điện tử."},{"k":"p","t":"3. Thời hạn sử dụng tài khoản truy cập Cổng thông tin điện tử đối với cả trường hợp đăng ký mới và bổ sung thông tin là 12 tháng hoặc do bên sử dụng thông tin đề nghị nhưng không quá 12 tháng tính từ ngày Tổng cục Thuế hoặc Cục Thuế gửi văn bản thông báo kết quả đăng ký mới hoặc bổ sung thời hạn sử dụng cho đầu mối đăng ký của bên sử dụng thông tin.”"},{"k":"p","t":"32. Sửa đổi, bổ sung khoản 1, khoản 3 Điều 50 như sau:"},{"k":"p","t":"“1. Tổng cục Thuế, Cục Thuế thực hiện việc thu hồi tài khoản truy cập Cổng thông tin điện tử trong các trường hợp sau:"},{"k":"p","t":"a) Khi có đề nghị từ đầu mối đăng ký của bên sử dụng thông tin;"},{"k":"p","t":"b) Thời hạn sử dụng đã hết;"},{"k":"p","t":"c) Tài khoản truy cập Cổng thông tin điện tử không thực hiện việc tra cứu thông tin trong thời gian 06 tháng liên tục;"},{"k":"p","t":"d) Phát hiện trường hợp sử dụng thông tin hóa đơn điện tử không đúng mục đích, phục vụ cho hoạt động nghiệp vụ theo chức năng, nhiệm vụ của bên sử dụng thông tin, không đúng quy định của pháp luật về bảo vệ bí mật nhà nước.”"},{"k":"p","t":"“3. Chậm nhất là 05 ngày làm việc trước thời điểm chính thức chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử của bên sử dụng thông tin (trừ trường hợp đầu mối đăng ký của bên sử dụng thông tin có đề nghị bằng văn bản), Tổng cục Thuế, Cục Thuế thông báo bằng hình thức điện tử cho bên sử dụng thông tin về việc chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử, chứng từ điện tử.”"},{"k":"p","t":"33. Sửa đổi, bổ sung khoản 5 Điều 52 như sau:"},{"k":"p","t":"“5. Trường hợp tạm ngừng cung cấp thông tin hóa đơn điện tử, Tổng cục Thuế thực hiện thông báo trên Cổng thông tin điện tử của Tổng cục Thuế về hóa đơn điện tử với các bên sử dụng thông tin. Nội dung thông báo phải nêu rõ khoảng thời gian dự kiến phục hồi các hoạt động cung cấp thông tin.”"},{"k":"p","t":"34. Sửa đổi, bổ sung khoản 1 và khoản 4 Điều 53 như sau:"},{"k":"p","t":"“1. Sử dụng thông tin hóa đơn điện tử đúng mục đích, phục vụ cho hoạt động nghiệp vụ theo chức năng, nhiệm vụ của bên sử dụng thông tin, đúng quy định của pháp luật về bảo vệ bí mật nhà nước. Các thông tin thu thập từ cơ quan thuế, bên sử dụng thông tin không cung cấp thông tin cho bên thứ ba khi chưa có sự đồng ý của cơ quan thuế cung cấp thông tin hoặc tài khoản.”"},{"k":"p","t":"“4. Quản lý, bảo mật thông tin tài khoản truy cập Cổng thông tin điện tử.”"},{"k":"p","t":"35. Sửa đổi, bổ sung Điều 54 như sau:"},{"k":"p","t":"“Điều 54. Kinh phí thực hiện"},{"k":"p","t":"Kinh phí thực hiện việc tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử của các cơ quan quản lý nhà nước theo quy định tại Nghị định này được cấp từ ngân sách nhà nước trên cơ sở dự toán kinh phí hàng năm được phê duyệt cho các cơ quan, đơn vị theo quy định của pháp luật.”"},{"k":"p","t":"36. Sửa đổi tên Điều 56 và sửa đổi, bổ sung Điều 56 như sau:"},{"k":"p","t":"“Điều 56. Quyền và trách nhiệm của người mua hàng hóa, dịch vụ"},{"k":"p","t":"1. Người mua hàng hóa, dịch vụ có quyền:"},{"k":"p","t":"a) Yêu cầu người bán lập và giao hóa đơn khi mua hàng hóa, dịch vụ."},{"k":"p","t":"b) Cung cấp chính xác thông tin cần thiết để người bán lập hóa đơn."},{"k":"p","t":"c) Ký các liên hóa đơn đã ghi đầy đủ nội dung trong trường hợp các bên có thỏa thuận về việc người mua ký trên hóa đơn."},{"k":"p","t":"d) Tra cứu, nhận file gốc hóa đơn điện tử của người bán."},{"k":"p","t":"đ) Sử dụng hóa đơn hợp pháp theo quy định pháp luật cho các hoạt động kinh doanh; để chứng minh quyền sử dụng, quyền sở hữu hàng hóa, dịch vụ; xổ số hoặc được bồi thường thiệt hại theo quy định của pháp luật; được dùng để hạch toán kế toán hoạt động mua hàng hóa, dịch vụ theo quy định của pháp luật về kế toán; kê khai các loại thuế; đăng ký quyền sử dụng, quyền sở hữu và để kê khai thanh toán vốn ngân sách nhà nước theo các quy định của pháp luật. Hóa đơn dùng cho mục đích này phải là hóa đơn có thông tin xác định được người mua."},{"k":"p","t":"2. Người mua hàng hóa, dịch vụ có trách nhiệm:"},{"k":"p","t":"a) Sử dụng hóa đơn đúng mục đích."},{"k":"p","t":"b) Cung cấp thông tin trên hóa đơn cho các cơ quan có thẩm quyền khi được yêu cầu, trường hợp sử dụng hóa đơn do cơ quan thuế đặt in thì phải cung cấp hóa đơn bản gốc, trường hợp sử dụng hóa đơn điện tử thì thực hiện quy định về việc tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử.”"},{"k":"p","t":"37. Bổ sung Điều 57a vào sau Điều 57 như sau:"},{"k":"p","t":"“Điều 57a. Trách nhiệm của cơ quan hải quan trong quản lý chứng từ điện tử"},{"k":"p","t":"1. Tổng cục Hải quan có trách nhiệm:"},{"k":"p","t":"a) Xây dựng cơ sở dữ liệu về chứng từ điện tử để phục vụ công tác quản lý thuế, phục vụ công tác quản lý nhà nước của các cơ quan khác của nhà nước;"},{"k":"p","t":"b) Thông báo các loại chứng từ đã được phát hành, được báo mất, không còn giá trị sử dụng."},{"k":"p","t":"2. Cục Hải quan có trách nhiệm:"},{"k":"p","t":"a) Quản lý hoạt động tạo, phát hành chứng từ của các tổ chức đã đăng ký tạo, phát hành chứng từ với cơ quan hải quan trên địa bàn quản lý;"},{"k":"p","t":"b) Thanh tra, kiểm tra hoạt động tạo, phát hành và sử dụng chứng từ trên địa bàn;"},{"k":"p","t":"c) Theo dõi, kiểm tra hoạt động hủy chứng từ theo quy định của Bộ Tài chính trên địa bàn.”"},{"k":"p","t":"38. Sửa đổi, bổ sung khoản 3 Điều 58 như sau:"},{"k":"p","t":"“3. Tổ chức, cá nhân sản xuất, nhập khẩu những sản phẩm chịu thuế tiêu thụ đặc biệt thuộc đối tượng sử dụng tem theo quy định của pháp luật thực hiện quét mã QR cho sản phẩm sản xuất tại Việt Nam trước khi tiêu thụ trong nước hoặc sản phẩm sản xuất ở nước ngoài khi nhập khẩu để đảm bảo kết nối thông tin về in và sử dụng tem, tem điện tử giữa tổ chức sản xuất, nhập khẩu với cơ quan quản lý thuế. Thông tin về in, sử dụng tem điện tử là cơ sở để lập, quản lý và xây dựng cơ sở dữ liệu hóa đơn điện tử. Các đối tượng sử dụng tem có trách nhiệm chi trả chi phí in và sử dụng tem theo quy định của Bộ trưởng Bộ Tài chính.”"},{"k":"p","t":"39. Bổ sung khoản 2a vào sau khoản 2 Điều 60 như sau:"},{"k":"p","t":"“2a. Trường hợp tổ chức, hộ kinh doanh, cá nhân kinh doanh thuộc diện áp dụng hóa đơn điện tử khởi tạo từ máy tính tiền theo quy định tại Nghị định này nhưng chưa có máy tính tiền do chưa đáp ứng điều kiện về hạ tầng công nghệ thông tin, giải pháp xuất hóa đơn điện tử từ máy tính tiền thì cơ quan thuế có kế hoạch, giải pháp hỗ trợ và thông báo đến người nộp thuế về việc chuyển đổi áp dụng hóa đơn điện tử khởi tạo từ máy tính tiền. Trường hợp người nộp thuế đã được cơ quan thuế hỗ trợ và thông báo về việc chuyển đổi áp dụng hóa đơn điện tử khởi tạo từ máy tính tiền nhưng không chuyển đổi thì được xác định là hành vi vi phạm quy định về sử dụng hóa đơn, cơ quan thuế phối hợp với cơ quan có thẩm quyền để xử lý vi phạm theo quy định của pháp luật.”"},{"k":"p","t":"40. Sửa đổi, bổ sung Điều 61 như sau:"},{"k":"p","t":"“Điều 61. Trách nhiệm thi hành"},{"k":"p","t":"1. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, căn cứ chức năng, nhiệm vụ được giao có trách nhiệm triển khai thực hiện Nghị định này."},{"k":"p","t":"2. Bộ Tài chính có trách nhiệm hướng dẫn, tổ chức triển khai giải pháp hóa đơn điện tử khởi tạo từ máy tính tiền, hóa đơn điện tử đối với hoạt động thương mại điện tử."},{"k":"p","t":"3. Bộ Công Thương có trách nhiệm triển khai các giải pháp để quản lý toàn bộ hoạt động kinh doanh thương mại điện tử và phối hợp với Bộ Tài chính triển khai các giải pháp hóa đơn điện tử đối với hoạt động thương mại điện tử theo quy định tại Nghị định này."},{"k":"p","t":"4. Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương chỉ đạo các cơ quan, đơn vị trên địa bàn phối hợp để triển khai thực hiện Nghị định này. Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương có trách nhiệm chỉ đạo Ủy ban nhân dân các cấp có trách nhiệm phối hợp với cơ quan thuế để rà soát, phân loại và có giải pháp thúc đẩy người nộp thuế chuyển đổi áp dụng hóa đơn điện tử khởi tạo từ máy tính tiền. Trường hợp người nộp thuế thuộc diện triển khai hóa đơn điện tử khởi tạo từ máy tính tiền nhưng chưa thực hiện chuyển đổi do chưa đáp ứng điều kiện về hạ tầng công nghệ thông tin thì cơ quan thuế báo cáo Ủy ban nhân dân để có giải pháp hỗ trợ kịp thời về hạ tầng công nghệ thông tin; trường hợp người nộp thuế thuộc diện triển khai hóa đơn điện tử khởi tạo từ máy tính tiền nhưng không thực hiện chuyển đổi thì cơ quan thuế báo cáo Ủy ban nhân dân để chỉ đạo các cơ quan ban ngành địa phương phối hợp để xử lý vi phạm về hành vi không xuất hóa đơn khi bán hàng hóa, dịch vụ theo quy định, xử lý về đăng ký kinh doanh do vi phạm pháp luật thuế và hóa đơn. Cơ quan thuế tham mưu Ủy ban nhân dân phối hợp với Hội bảo vệ người tiêu dùng Việt Nam để phát động và triển khai các phong trào người tiêu dùng văn minh thực hiện lấy hóa đơn khi mua hàng hóa, dịch vụ nhằm lan tỏa chủ trương chính sách của Nhà nước.”"}]},{"id":"nd70_2","no":2,"code":"Điều 2","title":"Điều 2. Sửa đổi, bổ sung một số mẫu tại Phụ lục ban hành kèm theo Nghị định số 123/2020/NĐ-CP, bãi bỏ một số quy định của Nghị định số 123/2020/NĐ-CP","shortTitle":"Sửa đổi, bổ sung một số mẫu tại Phụ lục ban hành kèm theo Nghị định số 123/2020/NĐ-CP, bãi bỏ một số quy định của Nghị định số 123/2020/NĐ-CP","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bổ sung Mẫu số 01/BK-ĐCTT, Mẫu số 01/TH-DT, Mẫu số 04/SS-CTĐT vào Phụ lục IA; bổ sung Mẫu số 01/TB-NSD vào Phụ lục IB ban hành kèm theo Nghị định này."},{"k":"p","t":"2. Sửa đổi, bổ sung Mẫu số 01/ĐKTĐ-HĐĐT, Mẫu số 04/SS-HĐĐT, Mẫu số 06/ĐN-PSĐT, Mẫu số 01/TH-HĐĐT, Mẫu số BC26/BLĐT, Mẫu số 01/ĐKTĐ-CTĐT tại Phụ lục IA, Mẫu số 01/TB-TNĐT, Mẫu số 01/TB-ĐKĐT, Mẫu số 01/TB-SSĐT, Mẫu số 01/TB-KTDL, Mẫu số 01/TB-KTT tại Phụ lục IB, Mẫu số 03/TNCN tại Phụ lục III ban hành kèm theo Nghị định này."},{"k":"p","t":"3. Thay thế cụm từ “hộ, cá nhân kinh doanh” bằng cụm từ “hộ kinh doanh, cá nhân kinh doanh” tại Điều 2, khoản 4 Điều 4, Điều 14, Điều 17, Điều 23, Điều 25, Điều 27, Điều 29 Nghị định số 123/2020/NĐ-CP."},{"k":"p","t":"4. Bãi bỏ khoản 10 Điều 3; điểm g khoản 4 Điều 9; khoản 2 Điều 33; Điều 37; khoản 2 Điều 50; Điều 51; khoản 3, khoản 4 Điều 52; khoản 5 Điều 53."}]},{"id":"nd70_3","no":3,"code":"Điều 3","title":"Điều 3. Hiệu lực và trách nhiệm thi hành","shortTitle":"Hiệu lực và trách nhiệm thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 6 năm 2025."},{"k":"p","t":"2. Bộ trưởng Bộ Tài chính hướng dẫn thi hành các khoản 3, khoản 6, khoản 7, khoản 11, khoản 18, khoản 37 và khoản 38 Điều 1 Nghị định này và các trường hợp khác theo yêu cầu quản lý."},{"k":"p","t":"3. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Chủ tịch nước;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Quốc hội;- Tòa án nhân dân tối cao;- Viện kiểm sát nhân dân tối cao;- Kiểm toán nhà nước;- Ngân hàng Chính sách xã hội;- Ngân hàng Phát triển Việt Nam;- Ủy ban trung ương Mặt trận Tổ quốc Việt Nam;- Cơ quan trung ương của các đoàn thể;- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;- Lưu: VT, KTTH (2b)","TM. CHÍNH PHỦKT. THỦ TƯỚNGPHÓ THỦ TƯỚNGHồ Đức Phớc"]]},{"k":"p","t":"Phụ lục IA"},{"k":"p","t":"DANH SÁCH CÁC BIỂU, MẪU SỬA ĐỔI - NGƯỜI NỘP THUẾ"},{"k":"p","t":"(Kèm theo Nghị định số 70/2025/NĐ-CPngày 20 tháng 3 năm 2025 của Chính phủ)"},{"k":"p","t":"_____________"},{"k":"tbl","rows":[["Mẫu số","Tên hồ sơ, mẫu biểu","Tình trạng"],["1. Hóa đơn điện tử",""],["01/ĐKTĐ-HĐĐT","Tờ khai đăng ký/thay đổi thông tin sử dụng hóa đơn điện tử","Sửa đổi, bổ sung"],["04/SS-HĐĐT","Thông báo hóa đơn điện tử đã lập sai","Sửa đổi, bổ sung"],["06/ĐN-PSĐT","Đơn đề nghị cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh","Sửa đổi, bổ sung"],["01/TH-HĐĐT","Bảng tổng hợp dữ liệu hóa đơn điện tử","Sửa đổi, bổ sung"],["01/BK-ĐCTT","Bảng kê hóa đơn điện tử đã lập sai","Bổ sung"],["01/TH-DT","Bảng tổng hợp doanh thu (đối với hoạt động kinh doanh casino, trò chơi điện tử có thưởng)","Bổ sung"],["2. Chứng từ điện tử"],["01/ĐKTĐ-CTĐT","Tờ khai đăng ký/thay đổi thông tin sử dụng chứng từ điện tử","Sửa đổi, bổ sung Mẫu số 01/ĐKTĐ-BL"],["04/SS-CTĐT","Thông báo chứng từ điện tử đã lập sai","Bổ sung"],["BC26/BLĐT","Báo cáo tình hình sử dụng biên lai điện tử thu thuế, phí, lệ phí","Sửa đổi, bổ sung"]]},{"k":"p","t":"Mẫu số: 01/ĐKTĐ-HĐĐT"},{"k":"p","t":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"},{"k":"p","t":"Độc lập - Tự do - Hạnh phúc"},{"k":"p","t":"_____________"},{"k":"p","t":"TỜ KHAI"},{"k":"p","t":"Đăng ký/thay đổi thông tin sử dụng hóa đơn điện tử"},{"k":"p","t":"__________"},{"k":"tbl","rows":[["","□ Đăng ký mới\n□ Thay đổi thông tin",""]]},{"k":"tbl","rows":[["Tên người nộp thuế:","……………………………………………………………………………………."],["Mã số thuế:","……………………………………………………………………………………."],["Cơ quan thuế quản lý:","……………………………………………………………………………………."],["Người liên hệ:\n(Đại diện theo pháp luật/ Hộ, cá nhân kinh doanh)","…………………………………","Điện thoại liên hệ:………………………….\n(Đại diện theo pháp luật/ Hộ, cá nhân kinh doanh)"],["Số CC/CCCD/số định danh/Hộ chiếu (*)...","","Ngày tháng năm sinh:"],["Giới tính","",""],["Địa chỉ liên hệ: của NNT","………………………………..","Thư điện tử:………………………………. của NNT"],["Theo Nghị định số 70/2025/NĐ-CP ngày 20 tháng 3 năm 2025 của Chính phủ, chúng tôi/tôi thuộc đối tượng sử dụng hóa đơn điện tử. Chúng tôi/tôi đăng ký/thay đổi thông tin đã đăng ký với cơ quan thuế về việc sử dụng hóa đơn điện tử như sau:"],["1. Hình thức hóa đơn:"],["□ Có mã của cơ quan thuế\n□ Hóa đơn khởi tạo từ Máy tính tiền\n□ Không có mã của cơ quan thuế"],["2. Hình thức gửi dữ liệu hóa đơn điện tử:"],["a. □ Trường hợp sử dụng hóa đơn điện tử có mã trên Cổng thông tin điện tử của Tổng cục Thuế hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử được Tổng cục Thuế ủy thác"],["□ Doanh nghiệp nhỏ và vừa, hợp tác xã, hộ, cá nhân kinh doanh tại địa bàn có điều kiện kinh tế xã hội khó khăn, địa bàn có điều kiện kinh tế xã hội đặc biệt khó khăn (điểm a khoản 1 Điều 14 của Nghị định)\n□ Doanh nghiệp nhỏ và vừa khác theo đề nghị của Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương gửi Bộ Tài chính trừ doanh nghiệp hoạt động tại các khu kinh tế, khu công nghiệp, khu công nghệ cao (điểm b khoản 1 Điều 14 của Nghị định)\n□ Cơ quan thuế hoặc cơ quan được giao nhiệm vụ tổ chức, xử lý tài sản công theo quy định pháp luật về quản lý, sử dụng tài sản công (khoản 1 Điều 15 Nghị định)"],["b. □ Trường hợp sử dụng hóa đơn điện tử không có mã của cơ quan thuế:"],["□ Gửi trực tiếp đến cơ quan thuế (điểm b1, khoản 3, Điều 22 của Nghị định).\n□ Gửi đến cơ quan thuế thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử (điểm b2, khoản 3, Điều 22 của Nghị định).\n□ Nhà cung cấp ở nước ngoài không có cơ sở thường trú tại Việt Nam hoạt động thương mại điện tử, kinh doanh trên nền tảng số và các dịch vụ khác tại Việt Nam (điểm a.1 khoản 3 Nghị định)"],["3. Phương thức chuyển dữ liệu hóa đơn điện tử:"],["□ Chuyển đầy đủ nội dung từng hóa đơn.\n□ Chuyển dữ liệu hóa đơn điện tử theo Bảng tổng hợp dữ liệu hóa đơn điện tử theo Mẫu số 01/TH-HĐĐT(điểm a1, khoản 3 Điều 22 của Nghị định)."],["4. Loại hóa đơn sử dụng:"],["□ Hóa đơn GTGT\n□ Hóa đơn GTGT tích hợp biên lai thu thuế, phí, lệ phí\n□ Hóa đơn bán hàng\n□ Hóa đơn bán hàng tích hợp biên lai thu thuế, phí, lệ phí\n□ Hóa đơn thương mại\n□ Hóa đơn nhà cung cấp ở nước ngoài không có cơ sở thường trú tại Việt Nam\n□ Hóa đơn bán tài sản công\n□ Hóa đơn bán hàng dự trữ quốc gia\n□ Các loại hóa đơn khác\n□ Các chứng từ được in, phát hành, sử dụng và quản lý như hóa đơn."],["5. Danh sách chứng thư số sử dụng:"],["STT","Tên tổ chức cơ quan chứng thực/cấp/công nhận chữ ký số, chữ ký điện tử","Số sê-ri chứng thư","Thời hạn sử dụng chứng thư số","Hình thức đăng ký (Thêm mới, gia hạn, ngừng sử dụng)"],["","","","Từ ngày","Đến ngày",""],["","","","","",""],["6. Đăng ký ủy nhiệm lập hóa đơn"],["STT","Tên loại hóa đơn ủy nhiệm","Ký hiệu mẫu hóa đơn","Ký hiệu hóa đơn ủy nhiệm","Tên tổ chức được/nhận ủy nhiệm","Mục đích ủy nhiệm","Thời hạn ủy nhiệm","Phương thức thanh toán hóa đơn ủy nhiệm"],["(1)","(2)","(3)","(4)","(5)","(6)","(7)","(8)"],["","","","","","","",""],["7. Tổ chức cung cấp dịch vụ"],["STT","Tên tổ chức cung cấp dịch vụ","Mã số thuế","Thời gian","Ghi chú"],["","","","Từ ngày","Đến ngày",""],["","","","","",""],["8. Thông tin đơn vị truyền nhận"],["STT","Tên đơn vị truyền nhận","Mã số thuế","Thời gian","Ghi chú"],["","","","Từ ngày","Đến ngày",""],["","","","","",""],["9. Thông tin đơn vị hạch toán phụ thuộc cần cấp quyền tra cứu hóa đơn"],["STT","Tên đơn vị","Mã số thuế","Thời gian","Ghi chú"],["","","","Từ ngày","Đến ngày",""],["","","","","",""],["10. Đề nghị tạm ngừng <script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function summaryHtml(s){
  if(!s||(!s.tldr&&!(s.points&&s.points.length)))return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
  var h='';
  if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
  if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
  return h;
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
