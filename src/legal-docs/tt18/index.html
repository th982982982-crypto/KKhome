anh, thay đổi thông tin, tạm ngừng kinh doanh, chấm dứt hoạt động địa điểm kinh doanh đến cơ quan thuế quản lý trụ sở kinh doanh quy định tại điểm đ khoản 4 Điều 8 Nghị định số 68/2026/NĐ-CP theo Mẫu số 01/TB-ĐĐKD ban hành kèm theo Thông tư này."},{"k":"p","t":"2. Cơ quan thuế gửi thông báo cho người nộp thuế biết theo Mẫu số 02/TB-ĐĐKD ban hành kèm theo Thông tư này."}]},{"id":"tt18_4","no":4,"code":"Điều 4","title":"Điều 4. Hồ sơ thông báo doanh thu, kê khai thuế","shortTitle":"Hồ sơ thông báo doanh thu, kê khai thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ thông báo doanh thu, kê khai thuế đối với hộ kinh doanh, cá nhân kinh doanh"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng không chịu thuế giá trị gia tăng, không phải nộp thuế thu nhập cá nhân (bao gồm cả hộ kinh doanh, cá nhân kinh doanh mới ra kinh doanh) thông báo doanh thu thực tế phát sinh trong năm và kê khai các loại thuế khác theo Mẫu số 01/TKN-CNKD ban hành kèm theo Thông tư này."},{"k":"p","t":"b) Đối với hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng nộp thuế thu nhập cá nhân theo phương pháp thuế suất nhân (x) với doanh thu tính thuế, hồ sơ khai thuế giá trị gia tăng, thuế thu nhập cá nhân và các loại thuế khác là Tờ khai theo Mẫu số 01/CNKD ban hành kèm theo Thông tư này."},{"k":"p","t":"c) Đối với hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng nộp thuế thu nhập cá nhân theo phương pháp thu nhập tính thuế nhân (x) với thuế suất"},{"k":"p","t":"- Hồ sơ khai thuế giá trị gia tăng, thuế thu nhập cá nhân và các loại thuế khác trong năm là Tờ khai theo Mẫu số 01/CNKD ban hành kèm theo Thông tư này."},{"k":"p","t":"- Hồ sơ khai quyết toán thuế thu nhập cá nhân là Tờ khai quyết toán thuế thu nhập cá nhân theo Mẫu số 02/CNKD-TNCN-QTT ban hành kèm theo Thông tư này."},{"k":"p","t":"d) Hộ kinh doanh, cá nhân kinh doanh đang hoạt động thuộc đối tượng quy định tại điểm b khoản 4 Điều 17 Nghị định số 68/2026/NĐ-CP gửi Thông báo số tài khoản/số hiệu ví điện tử theo Mẫu số 01/BK-STK ban hành kèm theo Thông tư này chậm nhất là ngày 20 tháng 4 năm 2026."},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh đang hoạt động thuộc đối tượng quy định tại điểm a khoản 4 Điều 17 Nghị định số 68/2026/NĐ-CP gửi Thông báo số tài khoản/số hiệu ví điện tử theo Mẫu số 01/BK-STK ban hành kèm theo Thông tư này kèm theo Tờ khai thuế đầu tiên của năm 2026."},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh mới ra kinh doanh gửi Thông báo số tài khoản/số hiệu ví điện tử theo mẫu số 01/BK-STK ban hành kèm theo Thông tư này kèm theo Thông báo doanh thu hoặc Tờ khai thuế đầu tiên của năm 2026."},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh khi thay đổi thông tin số tài khoản/số hiệu ví điện tử thì thông báo cho cơ quan thuế theo quy định của pháp luật quản lý thuế."},{"k":"p","t":"2. Hồ sơ khai thuế giá trị gia tăng, thuế thu nhập cá nhân đối với trường hợp tổ chức, cá nhân khấu trừ khai thuế thay, nộp thuế thay"},{"k":"p","t":"a) Đối với tổ chức khai thuế thay, nộp thuế thay cho cá nhân hợp tác kinh doanh với tổ chức là Tờ khai theo Mẫu số 01/TCKT và Phụ lục Bảng kê chi tiết hộ kinh doanh, cá nhân kinh doanh theo Mẫu số 01/BK-KTHTKD ban hành kèm theo Thông tư này."},{"k":"p","t":"b) Đối với tổ chức khai thuế thay, nộp thuế thay cho cá nhân cho thuê bất động sản, trừ hoạt động kinh doanh lưu trú là Tờ khai theo Mẫu số 01/TCKT và Phụ lục Bảng kê chi tiết cá nhân cho thuê bất động sản theo Mẫu số 02/BK-KTBĐS ban hành kèm theo Thông tư này."},{"k":"p","t":"c) Đối với doanh nghiệp xổ số, bảo hiểm, bán hàng đa cấp trả tiền hoa hồng cho cá nhân trực tiếp ký hợp đồng làm đại lý bán đúng giá; doanh nghiệp bảo hiểm trả phí tích lũy bảo hiểm nhân thọ, bảo hiểm không bắt buộc khác, hồ sơ gồm:"},{"k":"p","t":"- Tờ khai theo Mẫu số 01/XSBHĐC ban hành kèm theo Thông tư này;"},{"k":"p","t":"- Phụ lục Bảng kê chi tiết cá nhân có phát sinh doanh thu từ hoạt động đại lý xổ số, đại lý bảo hiểm, bán hàng đa cấp theo Mẫu số 01/BK-XSBHĐC ban hành kèm theo Thông tư này và gửi kèm theo Tờ khai thuế của tháng/quý cuối cùng trong năm tính thuế."},{"k":"p","t":"3. Đối với cá nhân trực tiếp ký hợp đồng làm đại lý xổ số, đại lý bảo hiểm, đại lý bán hàng đa cấp, hoạt động kinh doanh khác chưa khấu trừ, nộp thuế trong năm là Tờ khai thuế năm theo Mẫu số 01/TKN-CNKD ban hành kèm theo Thông tư này."},{"k":"p","t":"4. Đối với cá nhân cho thuê bất động sản trực tiếp khai thuế với cơ quan thuế là Tờ khai thuế đối với hoạt động cho thuê bất động sản theo Mẫu số 01/BĐS và Phụ lục Bảng kê chi tiết bất động sản theo Mẫu số 01/BK-BĐS ban hành kèm theo Thông tư này."}]},{"id":"tt18_5","no":5,"code":"Điều 5","title":"Điều 5. Hồ sơ đề nghị hoàn thuế nộp thừa","shortTitle":"Hồ sơ đề nghị hoàn thuế nộp thừa","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hoàn thuế nộp thừa đối với hộ kinh doanh, cá nhân kinh doanh nộp thuế thu nhập cá nhân theo phương pháp thuế suất nhân (x) với doanh thu tính thuế là Tờ khai thuế theo Mẫu số 01/TKN-CNKD ban hành kèm theo Thông tư này."},{"k":"p","t":"2. Hồ sơ đề nghị hoàn thuế nộp thừa đối với hộ kinh doanh, cá nhân kinh doanh nộp thuế thu nhập cá nhân theo phương pháp thu nhập tính thuế nhân (x) với thuế suất là Tờ khai thuế theo Mẫu số 02/QTT-TNCN-CNKD ban hành kèm theo Thông tư này."}]},{"id":"tt18_6","no":6,"code":"Điều 6","title":"Điều 6. Tiếp nhận, phân loại, giải quyết hồ sơ hoàn thuế nộp thừa","shortTitle":"Tiếp nhận, phân loại, giải quyết hồ sơ hoàn thuế nộp thừa","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế tiếp nhận, phân loại, giải quyết hồ sơ hoàn thuế nộp thừa của hộ kinh doanh, cá nhân kinh doanh theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"2. Cơ quan thuế ban hành Quyết định hoàn thuế hoặc Quyết định hoàn thuế kiêm bù trừ thu ngân sách nhà nước theo quy định."},{"k":"p","t":"3. Cơ quan thuế gửi Lệnh hoàn trả khoản thu ngân sách nhà nước hoặc Lệnh hoàn trả kiêm bù trừ khoản thu ngân sách nhà nước cho Kho bạc Nhà nước quản lý địa bàn tương ứng với cơ quan thuế ban hành Lệnh hoàn trả để thực hiện hạch toán hoàn trả và chuyển chứng từ cho Kho bạc Nhà nước nơi có khoản thu ngân sách nhà nước được bù trừ để hạch toán thu ngân sách nhà nước theo quy định để thực hiện hoàn thuế cho người nộp thuế."}]},{"id":"tt18_7","no":7,"code":"Điều 7","title":"Điều 7. Trả kết quả giải quyết hoàn thuế","shortTitle":"Trả kết quả giải quyết hoàn thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Cơ quan thuế gửi Quyết định hoàn thuế, Phụ lục số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa được hoàn trả (nếu có) hoặc Quyết định hoàn thuế kiêm bù trừ thu ngân sách nhà nước, Phụ lục số tiền thuế, tiền chậm nộp, tiền phạt nộp thừa được hoàn trả kiêm bù trừ thu ngân sách nhà nước (nếu có) cho người nộp thuế, cơ quan, tổ chức có liên quan; trường hợp không được hoàn thuế thì cơ quan thuế gửi Thông báo về việc không được hoàn thuế cho hộ kinh doanh, cá nhân kinh doanh theo quy định tại Thông tư số 80/2021/TT-BTC ngày 29 tháng 9 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thi hành một số điều của Luật Quản lý thuế và Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế."}]},{"id":"tt18_8","no":8,"code":"Điều 8","title":"Điều 8. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với trường hợp quy định tại khoản 3 Điều 18 Nghị định số 68/2026/NĐ-CP ngày 05/03/2026 của Chính phủ thì được khai điều chỉnh theo Tờ khai thuế đối với hoạt động cho thuê tài sản Mẫu số 01/TTS ban hành kèm theo Thông tư số 40/2021/TT-BTC ngày 01 tháng 6 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thuế giá trị gia tăng, thuế thu nhập cá nhân và quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh theo doanh thu chịu thuế thực tế phát sinh trong năm 2025 và khai doanh thu năm 2026 theo Tờ khai thuế đối với hoạt động cho thuê bất động sản Mẫu số 01/BĐS ban hành kèm theo Thông tư này."},{"k":"p","t":"2. Đối với trường hợp đã kê khai, nộp thuế theo hướng dẫn tại Thông tư số 40/2021/TT-BTC thì không điều chỉnh lại. Trường hợp chưa khai thuế thì thực hiện theo hồ sơ, thủ tục quy định tại Thông tư này và không bị xử phạt."},{"k":"p","t":"3. Hộ kinh doanh, cá nhân kinh doanh lập và gửi Bảng kê hàng tồn kho, máy móc, thiết bị quy định tại khoản 4 Điều 18 Nghị định số 68/2026/NĐ-CP theo Mẫu số 01/BK-HTK ban hành kèm theo Thông tư này."}]},{"id":"tt18_9","no":9,"code":"Điều 9","title":"Điều 9. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành kể từ ngày ký ban hành."},{"k":"p","t":"2. Thông tư này thay thế Thông tư số 40/2021/TT-BTC ngày 01 tháng 6 năm 2021 của Bộ trưởng Bộ Tài chính hướng dẫn thuế giá trị gia tăng, thuế thu nhập cá nhân và quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh; Thông tư số 100/2021/TT-BTC ngày 15 tháng 11 năm 2021 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 40/2021/TT-BTC ngày 01/6/2021 hướng dẫn thuế giá trị gia tăng, thuế thu nhập cá nhân và quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"3. Trường hợp các văn bản quy phạm pháp luật quy định viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."},{"k":"p","t":"4. Trong quá trình thực hiện, nếu có khó khăn, vướng mắc, đề nghị các đơn vị, cơ sở kinh doanh phản ánh kịp thời về Bộ Tài chính để được giải quyết./."},{"k":"tbl","rows":[["Nơi nhận: - Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Văn phòng Trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Văn phòng Chính phủ;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Chủ tịch nước;- Cơ sở dữ liệu quốc gia về pháp luật;- Viện kiểm sát nhân dân tối cao;- Tòa án nhân dân tối cao;- Kiểm toán nhà nước;- Cơ quan Trung ương của các đoàn thể;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Sở Tài chính, Thuế các tỉnh, thành phố trực thuộc trung ương;- Chi cục Hải quan, Kho bạc Nhà nước khu vực;- Cục Kiểm tra văn bản và Quản lý xử lý vi phạm hành chính, Bộ Tư pháp;- Công báo, Cổng Thông tin điện tử của Chính phủ;- Cổng Thông tin điện tử Bộ Tài chính;- Các đơn vị thuộc Bộ Tài chính;- Lưu: VT, CT (    b)","KT. BỘ TRƯỞNGTHỨ TRƯỞNGCao Anh Tuấn"]]}]}],"forms":[{"code":"01-TB-DDKD","title":"THÔNG BÁO","pl":"","note":""},{"code":"02-TB-DDKD","title":"THÔNG BÁO","pl":"","note":""},{"code":"01-TKN-CNKD","title":"THÔNG BÁO DOANH THU/TỜ KHAI THUẾ NĂM","pl":"","note":""},{"code":"01-CNKD","title":"TỜ KHAI THUẾ ĐỐI VỚI HỘ KINH DOANH, CÁ NHÂN KINH DOANH","pl":"","note":""},{"code":"02-CNKD-TNCN-QTT","title":"TỜ KHAI QUYẾT TOÁN THUẾ THU NHẬP CÁ NHÂN","pl":"","note":""},{"code":"01-BK-STK","title":"THÔNG BÁO SỐ TÀI KHOẢN/SỐ HIỆU VÍ ĐIỆN TỬ","pl":"","note":""},{"code":"01-TCKT","title":"TỜ KHAI THUẾ CỦA TỔ CHỨC KHAI THAY","pl":"","note":""},{"code":"01-BK-KTHTKD","title":"BẢNG KÊ CHI TIẾT HỘ KINH DOANH, CÁ NHÂN KINH DOANH","pl":"","note":""},{"code":"02-BK-KTBDS","title":"BẢNG KÊ CHI TIẾT CÁ NHÂN CHO THUÊ BẤT ĐỘNG SẢN","pl":"","note":""},{"code":"01-XSBHDC","title":"TỜ KHAI THUẾ THU NHẬP CÁ NHÂN","pl":"","note":""},{"code":"01-BK-XSBHDC","title":"BẢNG KÊ CHI TIẾT CÁ NHÂN CÓ PHÁT SINH DOANH THUTỪ HOẠT ĐỘNG ĐẠI LÝ XỔ SỔ, ĐẠI LÝ BẢO HIỂM, BÁN HÀNG ĐA CẤP","pl":"","note":""},{"code":"01-BDS","title":"THÔNG BÁO DOANH THU/TỜ KHAI THUẾ ĐỐI VỚI HOẠT ĐỘNG CHO THUÊ BẤT ĐỘNG SẢN","pl":"","note":""},{"code":"01-BK-BDS","title":"BẢNG KÊ CHI TIẾT BẤT ĐỘNG SẢN CHO THUÊ","pl":"","note":""},{"code":"01-BK-HTK","title":"BẢNG KÊ HÀNG TỒN KHO, MÁY MÓC, THIẾT BỊ CỦA HỘ KINH DOANH, CÁ NHÂN KINH DOANH","pl":"","note":""}],"refs":{"tt18_1":[{"kind":"related","targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108/2025 (căn cứ)"},{"kind":"related","targetSlug":"nd68","targetAnchor":"nd68_1","label":"NĐ 68/2026 — Chính sách & quản lý thuế"}]},"details":{"tt18_1":[{"match":"Thông tư này quy định chi tiết về hồ sơ, thủ tục thông báo doanh thu, kê khai thuế","title":"TT 18 Điều 1 — Phạm vi (hồ sơ, thủ tục quản lý thuế)","summary":"TT 18 hướng dẫn hồ sơ, thủ tục thông báo doanh thu, kê khai, nộp, hoàn thuế theo Luật Quản lý thuế 108 và NĐ 68.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108/2025"},{"targetSlug":"nd68","targetAnchor":"nd68_1","label":"NĐ 68/2026 — Chính sách & quản lý thuế"}]}],"tt18_3":[{"match":"Hộ kinh doanh, cá nhân kinh doanh gửi Thông báo về việc thành lập địa điểm kinh doanh","title":"TT 18 Điều 3 — Thông báo địa điểm kinh doanh","summary":"Thủ tục thông báo thành lập/thay đổi địa điểm kinh doanh của hộ, cá nhân kinh doanh với cơ quan thuế.","links":[{"targetSlug":"nd68","targetAnchor":"nd68_2","label":"NĐ 68 Điều 2 — Đối tượng hộ kinh doanh"}]}]},"summaries":{}}</script>

function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function summaryHtml(s){
  if(!s||(!s.tldr&&!(s.points&&s.points.length)))return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
  var h='';
  if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
  if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
  return h;
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
