ới cơ quan BHXH; thực hiện giám sát, phản biện xã hội."]},"luat-41_15":{"tldr":"Quy định quyền và trách nhiệm của tổ chức đại diện người sử dụng lao động về bảo hiểm xã hội.","points":["Bảo vệ quyền và lợi ích hợp pháp của người sử dụng lao động tham gia BHXH.","Kiến nghị, tham gia xây dựng, sửa đổi, bổ sung chính sách, pháp luật về BHXH.","Tuyên truyền, phổ biến chính sách, pháp luật về BHXH cho người sử dụng lao động; vận động thành viên chấp hành.","Tham gia kiểm tra, giám sát việc thực hiện pháp luật về BHXH; kiến nghị cơ quan nhà nước có thẩm quyền xử lý hành vi vi phạm."]},"luat-41_16":{"tldr":"Quy định về cơ quan bảo hiểm xã hội và chức năng của cơ quan này.","points":["Cơ quan BHXH là cơ quan nhà nước có chức năng thực hiện chế độ, chính sách BHXH; quản lý và sử dụng các quỹ BHXH, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế.","Cơ quan BHXH thực hiện thanh tra chuyên ngành về đóng BHXH, bảo hiểm thất nghiệp, bảo hiểm y tế và nhiệm vụ khác theo quy định.","Chính phủ quy định chức năng, nhiệm vụ, quyền hạn và cơ cấu tổ chức của cơ quan BHXH."]},"luat-41_17":{"tldr":"Quy định quyền hạn của cơ quan bảo hiểm xã hội trong việc yêu cầu thông tin, kiểm tra, thanh tra và xử lý vi phạm.","points":["Yêu cầu người sử dụng lao động xuất trình sổ quản lý lao động, thang lương, bảng lương và tài liệu khác liên quan đến đóng, hưởng BHXH bắt buộc, bảo hiểm thất nghiệp, bảo hiểm y tế.","Được cơ quan đăng ký kinh doanh, cấp giấy phép kết nối, chia sẻ thông tin để rà soát, kiểm tra việc đăng ký tham gia BHXH bắt buộc đối với doanh nghiệp, tổ chức thành lập mới.","Được cơ quan thuế cung cấp thông tin về chi phí tiền lương để tính thuế và thông tin khác liên quan đến tham gia BHXH.","Từ chối chi trả khi yêu cầu không đúng quy định; trường hợp từ chối phải trả lời bằng văn bản và nêu rõ lý do.","Kiểm tra việc thực hiện pháp luật và thanh tra chuyên ngành về đóng BHXH, bảo hiểm thất nghiệp, bảo hiểm y tế.","Kiến nghị xây dựng, sửa đổi chính sách; xử lý vi phạm hoặc kiến nghị cơ quan có thẩm quyền xử lý vi phạm."]},"luat-41_18":{"tldr":"Quy định trách nhiệm của cơ quan bảo hiểm xã hội trong tổ chức thực hiện chính sách, quản lý quỹ, chế độ báo cáo và cơ sở dữ liệu.","points":["Tuyên truyền, tư vấn chính sách; xây dựng chiến lược phát triển ngành, chiến lược đầu tư dài hạn; tổ chức đánh giá, công bố mức độ hài lòng.","Ban hành mẫu sổ BHXH, mẫu hồ sơ BHXH bắt buộc, tự nguyện, bảo hiểm thất nghiệp sau khi có ý kiến thống nhất của Bộ Lao động - Thương binh và Xã hội.","Tổ chức thu, chi; tiếp nhận hồ sơ và cấp sổ BHXH, thẻ bảo hiểm y tế; giải quyết hưởng và trả lương hưu, trợ cấp đầy đủ, đúng thời hạn; xác nhận thời gian đóng.","Quản lý, sử dụng quỹ; thực hiện biện pháp bảo toàn và tăng trưởng quỹ theo quyết định của Hội đồng quản lý BHXH; thực hiện thống kê, kế toán tài chính.","Chế độ báo cáo: định kỳ 03 tháng báo cáo Hội đồng quản lý BHXH; định kỳ 06 tháng báo cáo Bộ Lao động - Thương binh và Xã hội, Bộ Y tế và Ủy ban nhân dân cùng cấp; hằng năm báo cáo Bộ Tài chính.","Định kỳ 05 năm đánh giá, dự báo khả năng cân đối quỹ hưu trí và tử tuất; chủ trì xây dựng, quản lý, cập nhật cơ sở dữ liệu quốc gia về bảo hiểm."]},"luat-41_19":{"tldr":"Quy định về Hội đồng quản lý bảo hiểm xã hội: vị trí, thành phần, nhiệm kỳ và chế độ làm việc.","points":["Hội đồng quản lý BHXH được tổ chức ở cấp quốc gia, giúp Chính phủ, Thủ tướng Chính phủ chỉ đạo, giám sát hoạt động của cơ quan BHXH và tư vấn chính sách BHXH, bảo hiểm thất nghiệp, bảo hiểm y tế.","Thành phần gồm đại diện Tổng Liên đoàn Lao động Việt Nam, tổ chức đại diện người sử dụng lao động ở trung ương, các Bộ (Tài chính, Lao động - Thương binh và Xã hội, Y tế, Nội vụ, Công an, Quốc phòng), Bảo hiểm xã hội Việt Nam, Ngân hàng nhà nước Việt Nam và tổ chức, cá nhân khác có liên quan.","Hội đồng có Chủ tịch, các Phó Chủ tịch và các ủy viên do Thủ tướng Chính phủ bổ nhiệm, miễn nhiệm, cách chức; nhiệm kỳ thành viên là 05 năm.","Thành viên chịu trách nhiệm cá nhân, bảo lưu về quyết định, ý kiến khi được lấy ý kiến hoặc biểu quyết đối với các quy định tại Điều 20.","Chủ tịch Hội đồng báo cáo Thủ tướng Chính phủ về những vấn đề chưa thống nhất ý kiến giữa các thành viên."]},"luat-41_20":{"tldr":"Quy định nhiệm vụ, quyền hạn và trách nhiệm của Hội đồng quản lý bảo hiểm xã hội về chiến lược, báo cáo, đầu tư và kiến nghị chính sách.","points":["Thông qua chiến lược phát triển ngành, kế hoạch dài hạn, 05 năm, chiến lược đầu tư dài hạn hoặc kế hoạch hằng năm; giám sát, kiểm tra việc thực hiện sau khi được phê duyệt.","Thông qua các báo cáo hằng năm về thực hiện chính sách và tình hình quản lý, sử dụng các quỹ trước khi cơ quan BHXH trình cơ quan có thẩm quyền.","Quyết định và chịu trách nhiệm trước Chính phủ về danh mục, cơ cấu và phương thức đầu tư cụ thể của các quỹ.","Thông qua đề án, phương án bảo toàn và tăng trưởng quỹ; dự toán hằng năm về thu, chi; mức chi tổ chức và hoạt động; chiến lược đầu tư dài hạn; phương án đầu tư hằng năm.","Kiến nghị xây dựng, sửa đổi, bổ sung chính sách, pháp luật và kiện toàn hệ thống tổ chức cơ quan BHXH.","Hằng năm báo cáo Chính phủ, Thủ tướng Chính phủ về kết quả hoạt động; thực hiện nhiệm vụ, quyền hạn khác do Chính phủ, Thủ tướng Chính phủ giao."]},"luat-41_21":{"tldr":"Quy định đối tượng và điều kiện hưởng trợ cấp hưu trí xã hội đối với công dân Việt Nam.","points":["Công dân Việt Nam được hưởng trợ cấp hưu trí xã hội khi đủ các điều kiện: từ đủ 75 tuổi trở lên; không hưởng lương hưu hoặc trợ cấp BHXH hằng tháng (trừ trường hợp khác theo quy định của Chính phủ); có văn bản đề nghị hưởng.","Công dân Việt Nam từ đủ 70 tuổi đến dưới 75 tuổi thuộc hộ nghèo, hộ cận nghèo và đáp ứng điều kiện tại điểm b, c khoản 1 thì được hưởng trợ cấp hưu trí xã hội.","Ủy ban Thường vụ Quốc hội quyết định điều chỉnh giảm dần độ tuổi hưởng trên cơ sở đề nghị của Chính phủ.","Chính phủ quy định chi tiết khoản 2 Điều này."]},"luat-41_22":{"tldr":"Quy định các chế độ, trình tự, thủ tục thực hiện trợ cấp hưu trí xã hội, bao gồm mức trợ cấp, bảo hiểm y tế và hỗ trợ mai táng.","points":["Mức trợ cấp hưu trí xã hội hằng tháng do Chính phủ quy định; định kỳ 03 năm Chính phủ rà soát, xem xét điều chỉnh.","Ủy ban nhân dân cấp tỉnh trình Hội đồng nhân dân cùng cấp quyết định hỗ trợ thêm cho người hưởng trợ cấp hưu trí xã hội tùy điều kiện.","Đối tượng tại Điều 21 đồng thời thuộc đối tượng hưởng trợ cấp xã hội hằng tháng thì được hưởng chế độ trợ cấp cao hơn.","Người đang hưởng trợ cấp hưu trí xã hội hằng tháng được ngân sách nhà nước đóng bảo hiểm y tế; khi chết thì tổ chức, cá nhân lo mai táng được nhận hỗ trợ chi phí mai táng theo pháp luật về người cao tuổi.","Chính phủ quy định trình tự, thủ tục thực hiện trợ cấp hưu trí xã hội."]},"luat-41_23":{"tldr":"Quy định chế độ trợ cấp hằng tháng đối với người lao động đủ tuổi nghỉ hưu nhưng không đủ điều kiện hưởng lương hưu và chưa đủ tuổi hưởng trợ cấp hưu trí xã hội.","points":["Công dân Việt Nam đủ tuổi nghỉ hưu có thời gian đóng BHXH nhưng không đủ điều kiện hưởng lương hưu và chưa đủ điều kiện hưởng trợ cấp hưu trí xã hội, nếu không hưởng BHXH một lần, không bảo lưu và có yêu cầu thì được hưởng trợ cấp hằng tháng từ chính khoản đóng của mình.","Thời gian hưởng, mức hưởng trợ cấp hằng tháng xác định căn cứ vào thời gian đóng, căn cứ đóng BHXH của người lao động.","Mức trợ cấp hằng tháng thấp nhất bằng mức trợ cấp hưu trí xã hội hằng tháng quy định tại khoản 1 Điều 22; nếu tổng tiền tính theo thời gian đóng cao hơn thì được hưởng mức cao hơn; nếu không đủ và có nguyện vọng thì được đóng một lần cho phần còn thiếu.","Mức trợ cấp hằng tháng được điều chỉnh theo quy định tại Điều 67 của Luật này.","Khi người đang hưởng trợ cấp hằng tháng chết, thân nhân được hưởng trợ cấp một lần cho những tháng chưa nhận và trợ cấp mai táng nếu đủ điều kiện tại điểm a khoản 1 Điều 85 hoặc điểm a khoản 1 Điều 109.","Người đang hưởng trợ cấp hằng tháng được ngân sách nhà nước đóng bảo hiểm y tế; Chính phủ quy định chi tiết Điều này."]},"luat-41_24":{"tldr":"Người lao động không đủ điều kiện hưởng lương hưu và chưa đủ tuổi hưởng trợ cấp hưu trí xã hội gửi hồ sơ đến cơ quan bảo hiểm xã hội; cơ quan BHXH giải quyết trong 05 ngày làm việc.","points":["Đối tượng tại khoản 1 Điều 23 gửi hồ sơ đến cơ quan BHXH gồm: sổ bảo hiểm xã hội và văn bản đề nghị hưởng trợ cấp hằng tháng.","Trong 05 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan BHXH có trách nhiệm giải quyết; nếu không giải quyết phải trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_25":{"tldr":"Sổ bảo hiểm xã hội được cấp cho từng người lao động, có bản điện tử và bản giấy với giá trị pháp lý như nhau.","points":["Sổ BHXH cấp cho từng người lao động, chứa thông tin nhân thân, việc đóng, hưởng, giải quyết chế độ và thông tin liên quan.","Cấp bằng bản điện tử và bản giấy, có giá trị pháp lý như nhau.","Chậm nhất ngày 01/01/2026 thực hiện cấp sổ BHXH bản điện tử; bản giấy cấp khi người tham gia yêu cầu.","Dữ liệu sổ BHXH được cập nhật chính xác, kịp thời, đối chiếu và quản lý theo quy định.","Chính phủ quy định chi tiết Điều này."]},"luat-41_26":{"tldr":"Giao dịch điện tử trong lĩnh vực BHXH có giá trị pháp lý tương đương giao dịch bằng bản giấy; chậm nhất ngày 01/01/2027 cơ quan BHXH phải bảo đảm điều kiện thực hiện.","points":["Cơ quan, tổ chức, cá nhân đủ điều kiện thực hiện giao dịch điện tử với cơ quan BHXH theo Luật này và pháp luật về giao dịch điện tử.","Hồ sơ, chứng từ giao dịch điện tử phù hợp pháp luật về giao dịch điện tử; có giá trị pháp lý tương đương giao dịch bằng bản giấy.","Chậm nhất ngày 01/01/2027, cơ quan BHXH phải bảo đảm điều kiện thực hiện giao dịch điện tử thuộc lĩnh vực BHXH.","Chính phủ quy định chi tiết Điều này và việc điều chỉnh, cắt giảm, đơn giản hóa hồ sơ, thủ tục từ bản giấy sang giao dịch điện tử."]},"luat-41_27":{"tldr":"Quy định hồ sơ đăng ký tham gia BHXH bắt buộc và BHXH tự nguyện.","points":["Hồ sơ đăng ký BHXH bắt buộc (trừ đối tượng tại điểm m, n khoản 1 Điều 2) gồm: tờ khai đăng ký của người sử dụng lao động kèm danh sách người lao động và tờ khai đăng ký của người lao động.","Đối tượng tại điểm m, n khoản 1 Điều 2: nếu nộp qua người sử dụng lao động thì theo khoản 1; nếu tự nộp thì hồ sơ là tờ khai tại điểm b khoản 1.","Hồ sơ đăng ký BHXH tự nguyện là tờ khai đăng ký của người tham gia BHXH tự nguyện."]},"luat-41_28":{"tldr":"Người sử dụng lao động kê khai, nộp hồ sơ tham gia BHXH bắt buộc trong 30 ngày; cơ quan BHXH cấp sổ trong 05 ngày làm việc.","points":["Người sử dụng lao động nộp hồ sơ tham gia BHXH bắt buộc trong thời hạn 30 ngày kể từ ngày người lao động thuộc đối tượng tham gia, trừ trường hợp tại khoản 2.","Đối tượng tại điểm m, n khoản 1 Điều 2 nếu tự nộp thì nộp tờ khai tại điểm b khoản 1 Điều 27 trong 30 ngày kể từ ngày thuộc đối tượng tham gia.","Người tham gia BHXH tự nguyện nộp hồ sơ tại khoản 3 Điều 27 cho cơ quan BHXH.","Trong 05 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan BHXH cấp sổ BHXH; nếu không cấp phải trả lời bằng văn bản và nêu rõ lý do.","Chính phủ quy định chi tiết Điều này."]},"luat-41_29":{"tldr":"Khi thông tin đăng ký kê khai thay đổi, người đăng ký nộp tờ khai điều chỉnh; cơ quan BHXH điều chỉnh trong 05 ngày làm việc.","points":["Khi thông tin thay đổi, người đăng ký kê khai theo Điều 28 nộp tờ khai điều chỉnh kèm bản sao giấy tờ liên quan cho cơ quan BHXH.","Trong 05 ngày làm việc kể từ ngày nhận đủ tờ khai và giấy tờ, cơ quan BHXH có trách nhiệm điều chỉnh thông tin; nếu không thực hiện phải trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_30":{"tldr":"Cơ quan BHXH chủ trì xác định, theo dõi đối tượng tham gia BHXH bắt buộc và phát triển đối tượng tham gia BHXH tự nguyện.","points":["Cơ quan BHXH chủ trì, phối hợp xác định và theo dõi đối tượng tham gia BHXH bắt buộc tại Điều 2; đôn đốc, hướng dẫn lập hồ sơ đăng ký.","Bộ, cơ quan ngang Bộ, Ủy ban nhân dân các cấp phối hợp với cơ quan BHXH tổ chức xác định đối tượng tham gia BHXH bắt buộc.","Cơ quan BHXH chủ trì, phối hợp vận động phát triển đối tượng tham gia BHXH tự nguyện.","Các cơ quan chủ quản cơ sở dữ liệu quốc gia, chuyên ngành về lao động, dân cư, thuế, đăng ký doanh nghiệp có trách nhiệm kết nối, chia sẻ thông tin với cơ quan BHXH theo quy định của Chính phủ."]},"luat-41_31":{"tldr":"Quy định căn cứ đóng BHXH: tiền lương đóng BHXH bắt buộc và thu nhập đóng BHXH tự nguyện, với mức thấp nhất và cao nhất theo mức tham chiếu.","points":["Người lao động hưởng chế độ tiền lương do Nhà nước quy định: căn cứ đóng là tiền lương tháng theo chức vụ, chức danh, ngạch, bậc, cấp bậc quân hàm và các khoản phụ cấp chức vụ, thâm niên vượt khung, thâm niên nghề, hệ số chênh lệch bảo lưu lương (nếu có).","Người lao động hưởng chế độ tiền lương do người sử dụng lao động quyết định: căn cứ đóng là tiền lương tháng gồm mức lương theo công việc/chức danh, phụ cấp lương và khoản bổ sung khác thỏa thuận trả thường xuyên, ổn định.","Đối tượng tại điểm g, h, m, n khoản 1 Điều 2 được lựa chọn tiền lương làm căn cứ đóng nhưng thấp nhất bằng mức tham chiếu, cao nhất bằng 20 lần mức tham chiếu; sau ít nhất 12 tháng được lựa chọn lại.","Tiền lương làm căn cứ đóng BHXH bắt buộc thấp nhất bằng mức tham chiếu, cao nhất bằng 20 lần mức tham chiếu tại thời điểm đóng.","Thu nhập làm căn cứ đóng BHXH tự nguyện thấp nhất bằng mức chuẩn hộ nghèo khu vực nông thôn, cao nhất bằng 20 lần mức tham chiếu tại thời điểm đóng.","Chính phủ quy định chi tiết điểm b khoản 1; quy định việc truy thu, truy đóng BHXH bắt buộc."]},"luat-41_32":{"tldr":"Tỷ lệ đóng BHXH bắt buộc gồm 3% vào quỹ ốm đau, thai sản và 22% vào quỹ hưu trí, tử tuất; BHXH tự nguyện 22% vào quỹ hưu trí, tử tuất.","points":["BHXH bắt buộc: 3% tiền lương làm căn cứ đóng vào quỹ ốm đau và thai sản.","BHXH bắt buộc: 22% tiền lương làm căn cứ đóng vào quỹ hưu trí và tử tuất.","BHXH tự nguyện: 22% thu nhập làm căn cứ đóng vào quỹ hưu trí và tử tuất."]},"luat-41_33":{"tldr":"Quy định mức đóng, phương thức và thời hạn đóng BHXH bắt buộc của người lao động theo từng nhóm đối tượng.","points":["Đối tượng tại điểm a, b, c, d, i, k, l khoản 1 và khoản 2 Điều 2: đóng hằng tháng bằng 8% tiền lương vào quỹ hưu trí và tử tuất; người hưởng lương theo sản phẩm, khoán trong nông, lâm, ngư, diêm nghiệp được đóng hằng tháng, 03 tháng hoặc 06 tháng một lần.","Đối tượng tại điểm g khoản 1 Điều 2: đóng hằng tháng bằng 22% tiền lương vào quỹ hưu trí và tử tuất; phương thức đóng 03, 06, 12 tháng một lần hoặc đóng trước một lần cho thời gian hợp đồng; thời hạn chậm nhất là ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng.","Đối tượng tại điểm h khoản 1 Điều 2: đóng hằng tháng bằng 22% vào quỹ hưu trí và tử tuất; đóng qua cơ quan quản lý theo phương thức hằng tháng, 03 hoặc 06 tháng một lần.","Đối tượng tại điểm m, n khoản 1 Điều 2: đóng hằng tháng bằng 3% vào quỹ ốm đau và thai sản, 22% vào quỹ hưu trí và tử tuất; đóng trực tiếp hoặc qua hộ kinh doanh, doanh nghiệp, hợp tác xã theo phương thức hằng tháng, 03 hoặc 06 tháng một lần.","Đối tượng tại điểm a, b, c, d, i khoản 1 và khoản 2 không hưởng lương từ 14 ngày làm việc trở lên trong tháng thì không phải đóng BHXH tháng đó, trừ khi có thỏa thuận đóng theo căn cứ đóng tháng gần nhất.","Thiếu tối đa 06 tháng để đủ điều kiện hưởng lương hưu hoặc trợ cấp tuất hằng tháng thì được đóng tiếp một lần với mức bằng tổng mức đóng của người lao động và người sử dụng lao động vào quỹ hưu trí và tử tuất; thiếu trên 06 tháng để đủ điều kiện hưởng lương hưu thì có quyền đóng tiếp BHXH tự nguyện."]},"luat-41_34":{"tldr":"Quy định mức đóng, phương thức và thời hạn đóng BHXH bắt buộc của người sử dụng lao động.","points":["Đối với đối tượng tại điểm a, b, c, d, i, k, l khoản 1 và khoản 2 Điều 2: đóng 3% vào quỹ ốm đau và thai sản, 14% vào quỹ hưu trí và tử tuất.","Đóng 22% tiền lương vào quỹ hưu trí và tử tuất cho đối tượng tại điểm đ và điểm e khoản 1 Điều 2.","Không phải đóng cho đối tượng theo khoản 5 Điều 33, trừ trường hợp có thỏa thuận đóng theo căn cứ đóng tháng gần nhất.","Thời hạn đóng chậm nhất: ngày cuối cùng của tháng tiếp theo (đóng hằng tháng); ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng (đóng 03 hoặc 06 tháng một lần)."]},"luat-41_35":{"tldr":"Cơ quan BHXH đôn đốc bằng văn bản, công khai và gửi thông tin về người sử dụng lao động chậm đóng, trốn đóng BHXH bắt buộc, bảo hiểm thất nghiệp.","points":["Đối với trường hợp tại khoản 1 Điều 38, cơ quan BHXH phát hiện và đôn đốc bằng văn bản; khi phát hiện chậm đóng thuộc khoản 2, khoản 3 Điều 38 hoặc trốn đóng thì kịp thời đôn đốc bằng văn bản.","Công khai trên Cổng thông tin điện tử của cơ quan BHXH về việc chậm đóng, trốn đóng.","Gửi thông tin về người sử dụng lao động chậm đóng, trốn đóng đến cơ quan quản lý nhà nước và cơ quan thanh tra có liên quan để xử lý theo thẩm quyền.","Chính phủ quy định chi tiết Điều này."]},"luat-41_36":{"tldr":"Người tham gia BHXH tự nguyện đóng 22% thu nhập làm căn cứ đóng vào quỹ hưu trí và tử tuất, được chọn nhiều phương thức đóng.","points":["Đối tượng tại khoản 4 Điều 2 hằng tháng đóng bằng 22% mức thu nhập làm căn cứ đóng vào quỹ hưu trí và tử tuất; Chính phủ quy định chính sách hỗ trợ tiền đóng.","Phương thức đóng: hằng tháng; 03 tháng một lần; 06 tháng một lần; 12 tháng một lần; một lần cho nhiều năm về sau (số tiền thấp hơn); một lần cho thời gian còn thiếu để đủ điều kiện hưởng lương hưu (số tiền cao hơn).","Thời hạn đóng: trong tháng (hằng tháng); trong 03 tháng (03 tháng một lần); trong 04 tháng đầu (06 tháng một lần); trong 07 tháng đầu (12 tháng một lần).","Trường hợp đóng một lần cho thời gian còn thiếu: tại thời điểm đăng ký phương thức và mức thu nhập, sớm nhất là tháng trước liền kề tháng người lao động đủ tuổi nghỉ hưu.","Chính phủ quy định chi tiết điểm đ và điểm e khoản 2 Điều này."]},"luat-41_37":{"tldr":"Quy định các trường hợp tạm dừng đóng BHXH bắt buộc vào quỹ hưu trí và tử tuất, tối đa 12 tháng, và việc đóng bù.","points":["Người sử dụng lao động gặp khó khăn phải tạm dừng sản xuất, kinh doanh dẫn đến không có khả năng đóng thì được tạm dừng đóng vào quỹ hưu trí và tử tuất tối đa 12 tháng.","Hết thời hạn tạm dừng, tiếp tục đóng và đóng bù cho thời gian tạm dừng; thời hạn đóng bù chậm nhất là ngày cuối cùng của tháng tiếp theo tháng kết thúc tạm dừng; số tiền đóng bù bằng số tiền phải đóng của những tháng tạm dừng.","Người lao động bị tạm giam, tạm đình chỉ công việc thì tạm dừng đóng; nếu được truy lĩnh đủ tiền lương thì đóng bù bằng số tiền phải đóng của những tháng tạm dừng.","Chính phủ quy định chi tiết Điều này và các trường hợp khác tạm dừng đóng BHXH bắt buộc."]},"luat-41_38":{"tldr":"Quy định các trường hợp được coi là chậm đóng BHXH bắt buộc, bảo hiểm thất nghiệp của người sử dụng lao động.","points":["Chưa đóng hoặc đóng chưa đầy đủ số tiền phải đóng theo hồ sơ đã đăng ký kể từ sau ngày đóng chậm nhất (khoản 4 Điều 34) hoặc sau ngày đóng BHTN chậm nhất, trừ trường hợp tại điểm đ, e khoản 1 Điều 39.","Không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia BHXH bắt buộc trong thời hạn 60 ngày kể từ ngày hết thời hạn quy định tại khoản 1 Điều 28.","Không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia BHTN trong thời hạn 60 ngày kể từ ngày hết thời hạn phải tham gia BHTN.","Thuộc trường hợp không bị coi là trốn đóng BHXH bắt buộc, BHTN theo khoản 2 Điều 39."]},"luat-41_39":{"tldr":"Quy định các trường hợp được coi là trốn đóng BHXH bắt buộc, bảo hiểm thất nghiệp của người sử dụng lao động.","points":["Sau 60 ngày kể từ ngày hết thời hạn tại khoản 1 Điều 28 mà không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia BHXH bắt buộc; tương tự đối với BHTN.","Đăng ký tiền lương làm căn cứ đóng BHXH bắt buộc thấp hơn quy định tại khoản 1 Điều 31; đăng ký tiền lương đóng BHTN thấp hơn quy định.","Không đóng hoặc đóng không đầy đủ số tiền đã đăng ký BHXH bắt buộc sau 60 ngày kể từ ngày đóng chậm nhất (khoản 4 Điều 34) và đã được đôn đốc theo Điều 35; tương tự đối với BHTN.","Các trường hợp khác bị coi là trốn đóng theo quy định của Chính phủ.","Chính phủ quy định chi tiết Điều này và các trường hợp có lý do chính đáng thì không bị coi là trốn đóng."]},"luat-41_40":{"tldr":"Biện pháp xử lý hành vi chậm đóng BHXH bắt buộc, bảo hiểm thất nghiệp gồm đóng đủ, nộp 0,03%/ngày, xử phạt hành chính và không xét khen thưởng.","points":["Bắt buộc đóng đủ số tiền chậm đóng; nộp số tiền bằng 0,03%/ngày tính trên số tiền chậm đóng và số ngày chậm đóng vào quỹ BHXH, quỹ BHTN.","Xử phạt vi phạm hành chính theo quy định của pháp luật.","Không xem xét trao tặng các danh hiệu thi đua, hình thức khen thưởng.","Chính phủ quy định chi tiết khoản 1 Điều này."]},"luat-41_41":{"tldr":"Biện pháp xử lý hành vi trốn đóng BHXH bắt buộc, bảo hiểm thất nghiệp gồm đóng đủ, nộp 0,03%/ngày, xử phạt hành chính hoặc truy cứu trách nhiệm hình sự và không xét khen thưởng.","points":["Bắt buộc đóng đủ số tiền trốn đóng; nộp số tiền bằng 0,03%/ngày tính trên số tiền trốn đóng và số ngày trốn đóng vào quỹ BHXH, quỹ BHTN.","Xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự theo quy định của pháp luật.","Không xem xét trao tặng các danh hiệu thi đua, hình thức khen thưởng.","Chính phủ quy định chi tiết khoản 1 Điều này."]},"luat-41_42":{"tldr":"Quy định đối tượng, các trường hợp được hưởng và các trường hợp không được hưởng chế độ ốm đau.","points":["Đối tượng tại điểm a, b, c, d, i, k, l, m, n khoản 1 và khoản 2 Điều 2 được hưởng chế độ ốm đau khi nghỉ việc trong các trường hợp tại khoản 1, trừ trường hợp khoản 2.","Các trường hợp được hưởng: điều trị bệnh không phải bệnh nghề nghiệp; tai nạn không phải tai nạn lao động; tai nạn khi đi từ nơi ở đến nơi làm việc và ngược lại; điều trị, phục hồi chức năng khi thương tật, bệnh tật tái phát; hiến, lấy, ghép mô, bộ phận cơ thể người; chăm sóc con dưới 07 tuổi bị ốm đau.","Không được hưởng nếu: tự gây thương tích hoặc tự gây tổn hại sức khỏe; sử dụng chất ma túy, tiền chất ma túy (trừ theo chỉ định khám chữa bệnh); thời gian lần đầu nghỉ điều trị, phục hồi chức năng do tai nạn lao động, bệnh nghề nghiệp; thời gian nghỉ trùng với nghỉ theo pháp luật lao động, nghỉ hưởng nguyên lương, thai sản, dưỡng sức phục hồi sức khỏe."]},"luat-41_43":{"tldr":"Quy định thời gian tối đa hưởng chế độ ốm đau trong một năm theo thời gian đã đóng BHXH và điều kiện làm việc, tính theo ngày làm việc.","points":["Thời gian tối đa trong một năm (01/01–31/12) tính theo ngày làm việc, không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần.","Điều kiện bình thường: 30 ngày nếu đóng dưới 15 năm; 40 ngày nếu đóng từ đủ 15 đến dưới 30 năm; 60 ngày nếu đóng từ đủ 30 năm trở lên.","Nghề nặng nhọc, độc hại, nguy hiểm hoặc vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn: 40 ngày nếu đóng dưới 15 năm; 50 ngày nếu đóng từ đủ 15 đến dưới 30 năm; 70 ngày nếu đóng từ đủ 30 năm trở lên.","Hết thời hạn mà tiếp tục điều trị bệnh thuộc danh mục bệnh cần chữa trị dài ngày (do Bộ trưởng Bộ Y tế ban hành) thì được hưởng tiếp với mức theo khoản 3 Điều 45, tính theo ngày làm việc.","Đối tượng tại điểm d khoản 1 Điều 2: thời gian hưởng căn cứ vào thời gian điều trị nội trú và thời gian nghỉ việc theo chỉ định của người hành nghề khám bệnh, chữa bệnh."]},"luat-41_44":{"tldr":"Thời gian hưởng chế độ chăm sóc con ốm đau trong một năm tối đa 20 ngày nếu con dưới 03 tuổi, tối đa 15 ngày nếu con từ đủ 03 đến dưới 07 tuổi.","points":["Trong một năm (01/01–31/12) cho mỗi con: tối đa 20 ngày nếu con dưới 03 tuổi; tối đa 15 ngày nếu con từ đủ 03 tuổi đến dưới 07 tuổi.","Cả cha và mẹ cùng tham gia BHXH bắt buộc thì thời gian hưởng của mỗi người theo khoản 1.","Thời gian nghỉ tính theo ngày làm việc, không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."]},"luat-41_45":{"tldr":"Quy định căn cứ và mức hưởng trợ cấp ốm đau theo tháng, với các mức 75%, 65%, 55%, 50%, 100% tùy trường hợp.","points":["Căn cứ tính: tiền lương làm căn cứ đóng BHXH của tháng gần nhất trước tháng nghỉ việc; hoặc của tháng đầu tiên tham gia/tham gia trở lại nếu nghỉ ngay trong tháng đó.","Mức hưởng theo khoản 1 Điều 43 và Điều 44 bằng 75% tiền lương làm căn cứ đóng BHXH.","Mức hưởng theo khoản 2 Điều 43: 65% nếu đóng từ đủ 30 năm trở lên; 55% nếu đóng từ đủ 15 đến dưới 30 năm; 50% nếu đóng dưới 15 năm.","Mức hưởng theo khoản 3 Điều 43 bằng 100% tiền lương làm căn cứ đóng BHXH.","Mức hưởng một ngày bằng mức hưởng theo tháng chia cho 24 ngày; nửa ngày bằng một nửa mức một ngày; nghỉ dưới nửa ngày tính nửa ngày, từ nửa ngày đến dưới một ngày tính một ngày.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết về ngày làm việc và việc tính, xác định điều kiện từng trường hợp."]},"luat-41_46":{"tldr":"Người lao động đã nghỉ ốm đau từ đủ 30 ngày trở lên trong một năm mà chưa phục hồi được nghỉ dưỡng sức tối đa 10 ngày/năm; mức hưởng 30% mức tham chiếu một ngày.","points":["Đã nghỉ ốm đau từ đủ 30 ngày trở lên trong một năm, trong 30 ngày kể từ ngày hết thời gian nghỉ mà sức khỏe chưa phục hồi thì được nghỉ dưỡng sức tối đa 10 ngày trong một năm (01/01–31/12).","Thời gian nghỉ dưỡng sức liên tục, bao gồm cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần; thời gian từ cuối năm trước chuyển sang đầu năm sau được tính cho năm trước.","Thời gian nghỉ tối đa: 10 ngày (sau ốm đau do mắc bệnh cần chữa trị dài ngày); 07 ngày (sau ốm đau do phải phẫu thuật); 05 ngày (trường hợp khác).","Thời gian nghỉ do người sử dụng lao động và Ban Chấp hành công đoàn cơ sở quyết định; nếu khác ý kiến thì người sử dụng lao động quyết định.","Mức hưởng một ngày nghỉ dưỡng sức, phục hồi sức khỏe bằng 30% mức tham chiếu.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc tính, xác định điều kiện từng trường hợp."]},"luat-41_47":{"tldr":"Hồ sơ đề nghị hưởng trợ cấp ốm đau khác nhau theo trường hợp điều trị nội trú, ngoại trú hoặc khám chữa bệnh ở nước ngoài; Bộ trưởng Bộ Y tế quy định mẫu, trình tự, thẩm quyền cấp.","points":["Điều trị nội trú: bản chính hoặc bản sao một trong các giấy tờ — giấy ra viện; bản tóm tắt hồ sơ bệnh án; giấy tờ khác chứng minh quá trình điều trị nội trú.","Điều trị ngoại trú: một trong các giấy tờ — giấy chứng nhận nghỉ việc hưởng BHXH; bản chính/bản sao giấy ra viện hoặc bản tóm tắt hồ sơ bệnh án có ghi chỉ định thời gian cần điều trị ngoại trú sau điều trị nội trú.","Khám chữa bệnh ở nước ngoài: giấy tờ thể hiện tên bệnh, thời gian điều trị do cơ sở nước ngoài cấp; phải có bản dịch tiếng Việt công chứng/chứng thực và được hợp pháp hóa lãnh sự, trừ trường hợp điều ước quốc tế có quy định khác.","Bộ trưởng Bộ Y tế quy định mẫu, trình tự, thẩm quyền cấp giấy tờ tại khoản 1 và khoản 2 và giấy tờ thay thế trong trường hợp bất khả kháng do thiên tai, thảm họa, dịch bệnh."]},"luat-41_48":{"tldr":"Quy định trách nhiệm và thời hạn nộp, lập danh sách và giải quyết hưởng trợ cấp ốm đau giữa người lao động, người sử dụng lao động và cơ quan BHXH.","points":["Người lao động nộp hồ sơ cho người sử dụng lao động chậm nhất 45 ngày kể từ ngày trở lại làm việc.","Trong 07 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người lao động, người sử dụng lao động lập danh sách kèm hồ sơ nộp cho cơ quan BHXH.","Trong 07 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người sử dụng lao động, cơ quan BHXH giải quyết; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_49":{"tldr":"Quy định thời hạn lập danh sách và giải quyết hưởng trợ cấp dưỡng sức, phục hồi sức khỏe sau khi ốm đau.","points":["Trong 07 ngày làm việc kể từ ngày người lao động nghỉ việc hưởng trợ cấp dưỡng sức, người sử dụng lao động lập danh sách và nộp cho cơ quan BHXH.","Trong 07 ngày làm việc kể từ ngày nhận danh sách, cơ quan BHXH giải quyết; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_50":{"tldr":"Quy định các đối tượng và điều kiện hưởng chế độ thai sản, gồm yêu cầu về thời gian đóng BHXH bắt buộc trong từng trường hợp.","points":["Các trường hợp hưởng: lao động nữ mang thai; sinh con; mang thai hộ; nhờ mang thai hộ; nhận nuôi con nuôi dưới 06 tháng tuổi; thực hiện biện pháp tránh thai tại cơ sở khám chữa bệnh; lao động nam tham gia BHXH bắt buộc có vợ sinh con, vợ mang thai hộ sinh con.","Đối tượng tại điểm b, c, d, đ khoản 1 phải đóng BHXH bắt buộc từ đủ 06 tháng trở lên trong 12 tháng liền kề trước khi sinh con/nhận con/nhận nuôi.","Đối tượng tại điểm b, c đã đóng đủ 12 tháng trở lên mà phải nghỉ dưỡng thai theo chỉ định thì phải đóng từ đủ 03 tháng trở lên trong 12 tháng liền kề trước khi sinh con.","Người đủ điều kiện tại khoản 2/3/5 mà chấm dứt HĐLĐ, HĐLV hoặc thôi việc trước khi sinh/nhận con vẫn hưởng theo các điều 53, 54, 55, 56 và khoản 1, 2, 3 Điều 58; thời gian này không tính là thời gian đóng BHXH.","Đối tượng tại điểm b khoản 1 phải nghỉ việc để điều trị vô sinh: đã đóng từ đủ 06 tháng trở lên trong 24 tháng liền kề trước khi sinh con."]},"luat-41_51":{"tldr":"Lao động nữ mang thai được nghỉ khám thai tối đa 05 lần, mỗi lần không quá 02 ngày, tính theo ngày làm việc.","points":["Nghỉ đi khám thai tối đa 05 lần, mỗi lần không quá 02 ngày.","Thời gian này tính theo ngày làm việc, không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."]},"luat-41_52":{"tldr":"Quy định thời gian nghỉ tối đa khi sảy thai, phá thai, thai chết... theo tuần tuổi thai; trường hợp thai từ đủ 22 tuần tuổi trở lên đủ điều kiện thì nghỉ như sinh con.","points":["Tối đa: 10 ngày nếu thai dưới 05 tuần tuổi; 20 ngày nếu thai từ đủ 05 đến dưới 13 tuần tuổi; 40 ngày nếu thai từ đủ 13 đến dưới 22 tuần tuổi; 50 ngày nếu thai từ đủ 22 tuần tuổi trở lên.","Lao động nữ mang thai từ đủ 22 tuần tuổi trở lên đủ điều kiện tại khoản 2/3/5 Điều 50 mà bị sảy thai, phá thai, thai chết trong tử cung/khi chuyển dạ thì lao động nữ và người chồng được nghỉ hưởng chế độ thai sản như sinh con.","Thời gian nghỉ tại khoản 1 tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."]},"luat-41_53":{"tldr":"Quy định thời gian nghỉ chế độ thai sản khi sinh con cho lao động nữ và lao động nam, các trường hợp mẹ chết hoặc không đủ sức khỏe, và việc tính thời gian đóng BHXH.","points":["Lao động nữ khi sinh con nghỉ theo khoản 1 Điều 139 Bộ luật Lao động; trở lại làm việc sớm theo khoản 4 Điều 139 thì hưởng tiền lương ngày làm việc do NSDLĐ trả và tiếp tục hưởng trợ cấp thai sản theo Điều 59; hai bên đóng BHXH bắt buộc cho thời gian trở lại làm việc.","Lao động nam tham gia BHXH bắt buộc khi vợ sinh con nghỉ: 05 ngày làm việc; 07 ngày làm việc nếu vợ sinh phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi; sinh đôi 10 ngày làm việc (sinh ba trở lên thêm 03 ngày/con từ con thứ ba); sinh đôi phải phẫu thuật 14 ngày làm việc (sinh ba trở lên phải phẫu thuật thêm 03 ngày/con từ con thứ ba).","Ngày bắt đầu nghỉ của lao động nam phải trong khoảng 60 ngày kể từ ngày vợ sinh con; nghỉ nhiều lần thì lần cuối phải trong 60 ngày đầu và tổng không quá thời gian tại khoản 2.","Mang thai đôi trở lên mà khi sinh có thai chết trong tử cung/khi chuyển dạ thì thời gian nghỉ và trợ cấp một lần tính theo số thai gồm cả con sống, con chết và thai chết.","Mẹ chết sau khi sinh: cha hoặc người trực tiếp nuôi dưỡng nghỉ hưởng chế độ với thời gian còn lại của mẹ; nếu mẹ không đủ điều kiện khoản 2/3/5 Điều 50 mà chết thì nghỉ cho đến khi con đủ 06 tháng tuổi; chỉ có cha tham gia BHXH mà mẹ chết hoặc gặp rủi ro không đủ sức khỏe chăm con thì cha nghỉ cho đến khi con đủ 06 tháng tuổi.","Thời gian nghỉ tại các khoản 1, 4, 5, 6, 7 tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần; thời gian nghỉ thai sản khi sinh con/nhận nuôi/mang thai hộ được tính là thời gian đóng BHXH bắt buộc, NLĐ và NSDLĐ không phải đóng (trường hợp khác nghỉ từ 14 ngày làm việc trở lên trong tháng cũng vậy)."]},"luat-41_54":{"tldr":"Quy định chế độ thai sản của lao động nữ mang thai hộ, gồm khám thai, sảy/phá thai, sinh con đến thời điểm giao trẻ và dưỡng sức.","points":["Khám thai theo Điều 51; sảy thai, phá thai, thai chết trong tử cung/khi chuyển dạ, thai ngoài tử cung theo Điều 52.","Khi sinh con đủ điều kiện khoản 2/3 Điều 50: nghỉ cho đến thời điểm giao đứa trẻ cho bên nhờ mang thai hộ nhưng không vượt quá thời gian tại khoản 1 Điều 53.","Nếu từ ngày sinh đến thời điểm giao trẻ chưa đủ 60 ngày thì vẫn hưởng cho đến khi đủ 60 ngày tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần; nếu trước khi giao mà đứa trẻ chết và chưa đủ 60 ngày thì vẫn hưởng cho đến khi đủ 60 ngày.","Trong 30 ngày đầu kể từ ngày hết thời hạn hưởng (khoản 2 và điểm a khoản 3) mà sức khỏe chưa phục hồi thì được nghỉ dưỡng sức theo Điều 60, trừ trường hợp chấm dứt HĐLĐ, HĐLV hoặc thôi việc trước thời điểm sinh con.","Khi lao động nữ mang thai hộ sinh con, người chồng đang tham gia BHXH bắt buộc được nghỉ theo khoản 2 và khoản 3 Điều 53."]},"luat-41_55":{"tldr":"Lao động nữ nhờ mang thai hộ đã đóng BHXH bắt buộc từ đủ 06 tháng trở lên trong 12 tháng tính đến thời điểm nhận con được nghỉ hưởng chế độ thai sản đến khi con đủ 06 tháng tuổi.","points":["Điều kiện: đã đóng BHXH bắt buộc từ đủ 06 tháng trở lên trong thời gian 12 tháng tính đến thời điểm nhận con.","Nghỉ từ thời điểm nhận con cho đến khi con đủ 06 tháng tuổi; sinh đôi trở lên nghỉ thêm 01 tháng cho mỗi con tính từ con thứ hai trở đi.","Không nghỉ việc thì ngoài tiền lương còn được hưởng trợ cấp thai sản theo quy định.","Lao động nữ nhờ mang thai hộ chết hoặc được xác nhận không đủ sức khỏe chăm con khi con chưa đủ 06 tháng tuổi: người chồng hoặc người trực tiếp nuôi dưỡng nghỉ hưởng chế độ với thời gian còn lại; nếu đang tham gia BHXH bắt buộc mà không nghỉ thì ngoài tiền lương còn được hưởng trợ cấp với thời gian còn lại."]},"luat-41_56":{"tldr":"Người lao động nhận nuôi con nuôi dưới 06 tháng tuổi được nghỉ hưởng chế độ thai sản từ ngày giao nhận đến khi con đủ 06 tháng tuổi.","points":["Nghỉ từ ngày giao nhận con nuôi cho đến khi con đủ 06 tháng tuổi.","Cả cha và mẹ cùng tham gia BHXH bắt buộc đủ điều kiện khoản 2 Điều 50 thì chỉ cha hoặc mẹ được nghỉ.","Không nghỉ việc thì chỉ được hưởng trợ cấp một lần theo Điều 58."]},"luat-41_57":{"tldr":"Quy định thời gian nghỉ hưởng chế độ khi thực hiện biện pháp tránh thai: không quá 07 ngày khi đặt dụng cụ tránh thai và không quá 15 ngày khi triệt sản.","points":["Không quá 07 ngày đối với lao động nữ đặt dụng cụ tránh thai trong tử cung.","Không quá 15 ngày đối với người lao động thực hiện biện pháp triệt sản.","Thời gian này do người hành nghề khám chữa bệnh chỉ định và tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."]},"luat-41_58":{"tldr":"Quy định các trường hợp được trợ cấp một lần khi sinh con, nhận con nhờ mang thai hộ hoặc nhận nuôi con nuôi dưới 06 tháng tuổi; mức bằng 02 lần mức tham chiếu cho mỗi con.","points":["Lao động nữ sinh con đủ điều kiện khoản 2/3/5 Điều 50 được trợ cấp một lần; nếu không đủ điều kiện mà người chồng đủ điều kiện khoản 2 Điều 50 thì người chồng được trợ cấp một lần.","Lao động nữ mang thai hộ đủ điều kiện khoản 2/3 Điều 50 được trợ cấp một lần khi sinh con.","Người mang thai hộ không tham gia/không đủ điều kiện: người mẹ nhờ mang thai hộ đã đóng từ đủ 06 tháng trở lên trong 12 tháng tính đến thời điểm nhận con được trợ cấp một lần; lần lượt đến người chồng của người mẹ nhờ mang thai hộ, rồi người chồng của người mang thai hộ (đóng từ đủ 06 tháng trở lên trong 12 tháng).","Người lao động nhận nuôi con nuôi dưới 06 tháng tuổi đủ điều kiện khoản 2 Điều 50 được trợ cấp một lần.","Mức trợ cấp một lần cho mỗi con bằng 02 lần mức tham chiếu tại tháng sinh con, nhận con do nhờ mang thai hộ, nhận nuôi con nuôi."]},"luat-41_59":{"tldr":"Quy định cách tính trợ cấp thai sản theo tháng, ngày, dựa trên mức bình quân tiền lương làm căn cứ đóng BHXH bắt buộc của 06 tháng gần nhất trước khi nghỉ.","points":["Trợ cấp thai sản một tháng (các điều 51, 52, 53, 54, 55, 56, 57) bằng 100% mức bình quân tiền lương làm căn cứ đóng BHXH bắt buộc của 06 tháng gần nhất trước khi nghỉ.","Đóng chưa đủ 06 tháng: trợ cấp đối với các trường hợp được liệt kê là mức bình quân tiền lương của các tháng đã đóng.","Trợ cấp một ngày tại Điều 51 và khoản 2 Điều 53 = trợ cấp một tháng chia cho 24 ngày.","Trợ cấp khi sinh con/nhận con/nhận nuôi tính theo khoản 1; trường hợp có ngày lẻ hoặc trường hợp Điều 52 và Điều 57 thì mức mỗi ngày = trợ cấp một tháng chia cho 30 ngày.","Trợ cấp của lao động nữ mang thai hộ/nhờ mang thai hộ thực hiện theo khoản 1, 2, 3 và tính trên mức bình quân tiền lương trước khi nghỉ của lao động nữ mang thai hộ/nhờ mang thai hộ.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc tính, xác định điều kiện từng trường hợp."]},"luat-41_60":{"tldr":"Trong 30 ngày kể từ ngày hết thời gian nghỉ thai sản mà lao động nữ chưa phục hồi sức khỏe thì được nghỉ dưỡng sức tối đa 05–10 ngày, mức hưởng bằng 30% mức tham chiếu/ngày.","points":["Trong 30 ngày kể từ ngày hết thời gian nghỉ (Điều 52, khoản 1/4 Điều 53, điểm a khoản 3 Điều 54) mà chưa phục hồi sức khỏe thì được nghỉ dưỡng sức; thời gian liên tục gồm cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần; chuyển tiếp năm sau tính cho năm trước.","Thời gian nghỉ tối đa: 10 ngày nếu sinh một lần từ hai con trở lên; 07 ngày nếu sinh con phải phẫu thuật; 05 ngày đối với trường hợp khác.","Mức hưởng một ngày bằng 30% mức tham chiếu.","Không áp dụng khoản 1, 2, 3 nếu lao động nữ trở lại làm việc trước khi hết thời gian nghỉ thai sản khi sinh con tại khoản 1 Điều 53.","Số ngày nghỉ do người sử dụng lao động và Ban Chấp hành công đoàn cơ sở quyết định; Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc tính, xác định điều kiện."]},"luat-41_61":{"tldr":"Quy định chi tiết hồ sơ đề nghị hưởng chế độ thai sản cho từng đối tượng (sinh con, mang thai hộ, nhận con nuôi, lao động nam, người chồng...) và yêu cầu đối với giấy tờ do nước ngoài cấp.","points":["Lao động nữ sinh con/mang thai hộ sinh con/nhờ mang thai hộ: bản sao giấy khai sinh hoặc trích lục khai sinh hoặc bản sao giấy chứng sinh của con, kèm giấy tờ khác tùy trường hợp (điều trị vô sinh, mẹ chết, không đủ sức khỏe, dưỡng thai, thỏa thuận mang thai hộ).","Trường hợp con chết ngay sau sinh chưa được cấp giấy chứng sinh hoặc thai từ 22 tuần tuổi đủ điều kiện theo khoản 2 Điều 52: một trong các giấy tờ — bản tóm tắt hồ sơ bệnh án; giấy ra viện; giấy báo tử của con; văn bản xác nhận của UBND cấp xã (con chết trong vòng 24 giờ sau sinh).","Khám thai (Điều 51), sảy/phá thai (Điều 52), tránh thai (Điều 57): một trong các giấy tờ — giấy ra viện/bản tóm tắt hồ sơ bệnh án/giấy tờ chứng minh điều trị nội trú; giấy chứng nhận nghỉ việc hưởng BHXH (ngoại trú); giấy ra viện có thông tin chỉ định điều trị ngoại trú sau nội trú.","Nhận nuôi con nuôi dưới 06 tháng tuổi: bản sao giấy chứng nhận nuôi con nuôi và biên bản giao nhận con.","Lao động nam khi vợ sinh con / người chồng của lao động nữ nhờ mang thai hộ / người chồng của lao động nữ mang thai hộ: bản sao giấy khai sinh/trích lục/giấy chứng sinh; bổ sung giấy tờ về phẫu thuật hoặc sinh con dưới 32 tuần tuổi và thỏa thuận mang thai hộ khi cần.","Giấy tờ do nước ngoài cấp phải có bản dịch tiếng Việt công chứng/chứng thực và được hợp pháp hóa lãnh sự, trừ trường hợp điều ước quốc tế có quy định khác; Bộ trưởng Bộ Y tế quy định mẫu, trình tự, thẩm quyền cấp và giấy tờ thay thế khi bất khả kháng do thiên tai, thảm họa, dịch bệnh."]},"luat-41_62":{"tldr":"Quy định trách nhiệm nộp, thời hạn nộp và giải quyết hưởng chế độ thai sản đối với người tham gia BHXH bắt buộc.","points":["Người lao động nộp hồ sơ cho người sử dụng lao động chậm nhất 45 ngày kể từ ngày hết thời gian nghỉ việc hưởng chế độ thai sản.","Trong 07 ngày làm việc kể từ ngày nhận đủ hồ sơ, người sử dụng lao động lập danh sách kèm hồ sơ nộp cho cơ quan BHXH.","Người lao động nộp trực tiếp cho cơ quan BHXH nếu thôi việc trước thời điểm sinh con/nhận con/nhận nuôi hoặc không còn người sử dụng lao động.","Cơ quan BHXH giải quyết trong 07 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người sử dụng lao động, 05 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người lao động; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_63":{"tldr":"Quy định thời hạn lập danh sách và giải quyết hưởng trợ cấp dưỡng sức, phục hồi sức khỏe sau thai sản.","points":["Trong 07 ngày làm việc kể từ ngày người lao động nghỉ việc hưởng trợ cấp dưỡng sức sau thai sản, người sử dụng lao động lập danh sách và nộp cho cơ quan BHXH.","Trong 07 ngày làm việc kể từ ngày nhận danh sách, cơ quan BHXH giải quyết; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_64":{"tldr":"Quy định đối tượng và điều kiện hưởng lương hưu, với yêu cầu thời gian đóng BHXH bắt buộc từ đủ 15 năm trở lên và các điều kiện tuổi theo Bộ luật Lao động.","points":["Nhóm điểm a, b, c, g, h, i, k, l, m, n khoản 1 và khoản 2 Điều 2 có thời gian đóng từ đủ 15 năm trở lên được hưởng nếu: đủ tuổi nghỉ hưu theo khoản 2 Điều 169 BLLĐ; hoặc theo khoản 3 Điều 169 với 15 năm làm nghề nặng nhọc/độc hại/nguy hiểm hoặc vùng đặc biệt khó khăn (gồm nơi có phụ cấp khu vực hệ số 0,7 trở lên trước 01/01/2021); hoặc tuổi thấp hơn tối đa 10 tuổi và có từ đủ 15 năm trở lên khai thác than trong hầm lò; hoặc nhiễm HIV/AIDS do tai nạn rủi ro nghề nghiệp.","Nhóm điểm d, đ, e khoản 1 Điều 2 có thời gian đóng từ đủ 15 năm trở lên được hưởng nếu: tuổi thấp hơn tối đa 05 tuổi (trừ trường hợp luật chuyên ngành quy định khác); hoặc tuổi thấp hơn tối đa 10 tuổi với từ đủ 15 năm làm nghề nặng nhọc/độc hại/nguy hiểm hoặc vùng đặc biệt khó khăn; hoặc nhiễm HIV/AIDS do tai nạn rủi ro nghề nghiệp.","Chính phủ quy định việc hưởng lương hưu với trường hợp không xác định được ngày, tháng sinh hoặc mất hồ sơ và các trường hợp đặc biệt khác."]},"luat-41_65":{"tldr":"Quy định đối tượng và điều kiện hưởng lương hưu khi suy giảm khả năng lao động, với mức thấp hơn người đủ điều kiện thông thường, yêu cầu đóng BHXH bắt buộc từ đủ 20 năm trở lên.","points":["Nhóm điểm a, b, c, g, h, i, k, l, m, n khoản 1 và khoản 2 Điều 2 có đóng từ đủ 20 năm trở lên: tuổi thấp hơn tối đa 05 tuổi và suy giảm khả năng lao động từ 61% đến dưới 81%; hoặc thấp hơn tối đa 10 tuổi và suy giảm từ 81% trở lên; hoặc từ đủ 15 năm làm nghề đặc biệt nặng nhọc/độc hại/nguy hiểm và suy giảm từ 61% trở lên.","Nhóm điểm d, đ, e khoản 1 Điều 2 có đóng từ đủ 20 năm trở lên, suy giảm từ 61% trở lên: tuổi thấp hơn tối đa 10 tuổi so với điểm a khoản 1 Điều 64; hoặc từ đủ 15 năm làm nghề đặc biệt nặng nhọc/độc hại/nguy hiểm.","Mức lương hưu thấp hơn so với người đủ điều kiện hưởng tại Điều 64."]},"luat-41_66":{"tldr":"Quy định cách tính mức lương hưu hằng tháng: lao động nữ và nam đạt 45% tương ứng số năm đóng, mỗi năm thêm 2%, tối đa 75%; trừ tỷ lệ khi nghỉ hưu trước tuổi.","points":["Lao động nữ: 45% mức bình quân tiền lương (Điều 72) tương ứng 15 năm đóng, mỗi năm thêm 2%, tối đa 75%.","Lao động nam: 45% tương ứng 20 năm đóng, mỗi năm thêm 2%, tối đa 75%; nam đóng từ đủ 15 đến dưới 20 năm thì 40% tương ứng 15 năm, mỗi năm thêm 1%.","Đối tượng tại Điều 65 (suy giảm khả năng lao động): tính như khoản 1, sau đó mỗi năm nghỉ hưu trước tuổi giảm 2%; nghỉ trước tuổi dưới 06 tháng không giảm, từ đủ 06 đến dưới 12 tháng giảm 1%.","Trường hợp có thời gian đóng theo điều ước quốc tế nhưng ở Việt Nam dưới 15 năm thì mỗi năm đóng tính bằng 2,25% mức bình quân tiền lương (Điều 72).","Mức lương hưu của người lao động một số nghề đặc thù trong lực lượng vũ trang do Chính phủ quy định, kinh phí từ ngân sách nhà nước."]},"luat-41_67":{"tldr":"Lương hưu được điều chỉnh trên cơ sở mức tăng chỉ số giá tiêu dùng phù hợp với khả năng ngân sách nhà nước và quỹ BHXH; ưu tiên điều chỉnh thỏa đáng với người lương thấp và nghỉ hưu trước năm 1995.","points":["Điều chỉnh trên cơ sở mức tăng của chỉ số giá tiêu dùng phù hợp với khả năng của ngân sách nhà nước và quỹ BHXH.","Điều chỉnh thỏa đáng đối với người có mức lương hưu thấp và nghỉ hưu trước năm 1995, thu hẹp khoảng cách chênh lệch giữa các thời kỳ.","Chính phủ quy định thời điểm, đối tượng, mức điều chỉnh lương hưu."]},"luat-41_68":{"tldr":"Lao động nam đóng cao hơn 35 năm, lao động nữ cao hơn 30 năm thì khi nghỉ hưu được hưởng trợ cấp một lần ngoài lương hưu.","points":["Điều kiện: lao động nam đóng cao hơn 35 năm, lao động nữ đóng cao hơn 30 năm.","Mức trợ cấp cho mỗi năm đóng cao hơn bằng 0,5 lần mức bình quân tiền lương (Điều 72) cho mỗi năm đóng cao hơn đến tuổi nghỉ hưu.","Nếu đã đủ điều kiện hưởng lương hưu (Điều 64, 65) mà tiếp tục đóng thì mức trợ cấp bằng 02 lần mức bình quân tiền lương (Điều 72) cho mỗi năm đóng cao hơn kể từ sau thời điểm đủ tuổi nghỉ hưu đến thời điểm nghỉ hưu."]},"luat-41_69":{"tldr":"Quy định thời điểm hưởng lương hưu theo từng nhóm đối tượng, gắn với thời điểm đủ điều kiện và văn bản của người sử dụng lao động hoặc đề nghị của người lao động.","points":["Nhóm điểm a, b, c, d, đ, e, i, k, l khoản 1 và khoản 2 Điều 2 đang tham gia BHXH bắt buộc: thời điểm đủ điều kiện hưởng và được ghi trong văn bản của NSDLĐ xác định chấm dứt HĐLĐ hoặc chấm dứt làm việc.","Nhóm điểm g, h, m, n khoản 1 Điều 2 và người đang bảo lưu thời gian đóng: thời điểm đủ điều kiện hưởng và được ghi trong văn bản đề nghị của người lao động.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết, gồm thời điểm hưởng đối với trường hợp khoản 7 Điều 33 và việc tính, xác định điều kiện giải quyết chế độ hưu trí."]},"luat-41_70":{"tldr":"Quy định các trường hợp được hưởng bảo hiểm xã hội một lần đối với đối tượng đã chấm dứt tham gia bảo hiểm xã hội, cùng cách tính mức hưởng theo số năm và căn cứ đóng.","points":["Đối tượng khoản 1 Điều 2 đã chấm dứt tham gia BHXH được hưởng một lần nếu: đủ tuổi hưởng lương hưu mà chưa đủ 15 năm đóng (có thể chọn trợ cấp hằng tháng theo Điều 23); ra nước ngoài định cư; mắc ung thư, bại liệt, xơ gan mất bù, lao nặng, AIDS; suy giảm khả năng lao động từ 81% trở lên hoặc khuyết tật đặc biệt nặng; có thời gian đóng trước ngày Luật có hiệu lực, sau 12 tháng không thuộc diện đóng bắt buộc, không đóng tự nguyện và chưa đủ 20 năm; hoặc trường hợp điểm d, đ, e khoản 1 Điều 2 khi phục viên, xuất ngũ, thôi việc.","Đối tượng khoản 2 Điều 2 được hưởng một lần nếu: đủ tuổi hưởng lương hưu mà chưa đủ 15 năm đóng; mắc ung thư, bại liệt, xơ gan mất bù, lao nặng, AIDS; suy giảm khả năng lao động từ 81% trở lên hoặc khuyết tật đặc biệt nặng; đủ điều kiện hưởng lương hưu nhưng không tiếp tục cư trú tại Việt Nam; hoặc chấm dứt hợp đồng lao động/giấy phép, chứng chỉ hành nghề hết hiệu lực mà không được gia hạn.","Mức hưởng tính theo số năm và căn cứ đóng (không gồm tiền ngân sách hỗ trợ đóng tự nguyện): 1,5 tháng mức bình quân cho mỗi năm đóng trước 2014; 02 tháng cho mỗi năm đóng từ 2014 trở đi; chưa đủ một năm thì bằng số tiền đã đóng nhưng không quá 02 tháng mức bình quân.","Tháng lẻ của thời gian đóng trước 2014 được chuyển sang giai đoạn từ 2014 trở đi để tính mức hưởng.","Trường hợp điểm c, d khoản 1 thì mức hưởng tính bao gồm cả tiền ngân sách nhà nước hỗ trợ đóng tự nguyện.","Thời điểm tính hưởng là thời điểm cơ quan BHXH ban hành quyết định; người vừa đủ điều kiện hưởng lương hưu vừa đủ điều kiện hưởng một lần (các điểm b, c, d khoản 1 và b, c, đ khoản 2) được lựa chọn; Chính phủ quy định chi tiết."]},"luat-41_71":{"tldr":"Người lao động nghỉ việc mà chưa đủ điều kiện hưởng lương hưu (Điều 64, 65), chưa hưởng bảo hiểm xã hội một lần (Điều 70) hoặc chưa hưởng trợ cấp hằng tháng (Điều 23) thì được bảo lưu thời gian đóng bảo hiểm xã hội.","points":[]},"luat-41_72":{"tldr":"Quy định cách tính mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội để tính lương hưu, trợ cấp một lần, phân biệt theo chế độ tiền lương do Nhà nước hay người sử dụng lao động quyết định.","points":["Người thực hiện chế độ tiền lương do Nhà nước quy định, toàn bộ thời gian đóng theo chế độ này: tham gia trước 01/01/1995 tính bình quân 05 năm cuối; từ 01/01/1995 đến 31/12/2000 tính 06 năm cuối; từ 01/01/2001 đến 31/12/2006 tính 08 năm cuối; từ 01/01/2007 đến 31/12/2015 tính 10 năm cuối.","Từ 01/01/2016 đến 31/12/2019 tính bình quân 15 năm cuối; từ 01/01/2020 đến 31/12/2024 tính 20 năm cuối; từ 01/01/2025 trở đi tính bình quân toàn bộ thời gian đóng.","Người có toàn bộ thời gian đóng theo chế độ tiền lương do người sử dụng lao động quyết định: tính bình quân tiền lương toàn bộ thời gian.","Người vừa có thời gian đóng theo chế độ Nhà nước vừa theo chế độ người sử dụng lao động: tính bình quân chung các thời gian, trong đó thời gian theo chế độ Nhà nước tính theo khoản 1.","Chính phủ quy định chi tiết và quy định mức bình quân đối với người thực hiện chế độ tiền lương do Nhà nước quy định trong một số trường hợp đặc biệt."]},"luat-41_73":{"tldr":"Quy định việc điều chỉnh tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc để tính mức bình quân theo Điều 72.","points":["Người thực hiện chế độ tiền lương do Nhà nước quy định: tham gia trước 01/01/2016 được điều chỉnh theo mức tham chiếu tại thời điểm hưởng chế độ hưu trí; tham gia từ 01/01/2016 trở đi được điều chỉnh như khoản 2.","Người thực hiện chế độ tiền lương do người sử dụng lao động quyết định: điều chỉnh trên cơ sở chỉ số giá tiêu dùng của từng thời kỳ theo quy định của Chính phủ."]},"luat-41_74":{"tldr":"Khi Nhà nước áp dụng chế độ tiền lương theo vị trí việc làm, chức danh và chức vụ lãnh đạo thay thế hệ thống bảng lương hiện hành, Chính phủ báo cáo Quốc hội xem xét, quyết định việc điều chỉnh căn cứ đóng, cách tính mức bình quân, điều chỉnh tiền lương làm căn cứ đóng và những nội dung cần thiết khác.","points":[]},"luat-41_75":{"tldr":"Quy định các trường hợp tạm dừng, chấm dứt và tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng.","points":["Tạm dừng hưởng khi: xuất cảnh trái phép; bị Tòa án tuyên bố mất tích; không xác minh được thông tin người thụ hưởng theo điểm c khoản 2 Điều 11.","Chấm dứt hưởng khi: chết hoặc bị Tòa án tuyên bố là đã chết; từ chối hưởng bằng văn bản; có kết luận của cơ quan có thẩm quyền về hưởng BHXH không đúng quy định pháp luật.","Đối tượng tạm dừng và điểm a khoản 2 được tiếp tục chi trả gồm cả tiền của thời gian chưa nhận khi: người xuất cảnh trái phép trở về; có quyết định Tòa án hủy bỏ tuyên bố mất tích hoặc đã chết; đã xác minh được thông tin theo điểm c khoản 2 Điều 11.","Người từ chối hưởng (điểm b khoản 2) được tiếp tục chi trả kể từ thời điểm cơ quan BHXH nhận văn bản đề nghị hưởng lại và không gồm tiền của thời gian chưa nhận do từ chối.","Người có thời gian chưa nhận trước khi chết thì thân nhân được nhận lương hưu, trợ cấp những tháng chưa nhận; người bị tạm dừng do tuyên bố mất tích sau đó bị tuyên bố là đã chết thì thân nhân không được nhận trong thời gian tạm dừng.","Các trường hợp tạm dừng, chấm dứt, hưởng tiếp khác theo quy định của Chính phủ."]},"luat-41_76":{"tldr":"Người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng ra nước ngoài định cư, nếu có nguyện vọng, được giải quyết hưởng trợ cấp một lần.","points":["Mức trợ cấp một lần đối với người đang hưởng lương hưu: mỗi năm đóng trước 2014 tính 1,5 tháng lương hưu đang hưởng, mỗi năm đóng từ 2014 trở đi tính 02 tháng; sau đó mỗi tháng đã hưởng lương hưu trừ 0,5 tháng; mức thấp nhất bằng 03 tháng lương hưu đang hưởng.","Mức trợ cấp một lần đối với người đang hưởng trợ cấp BHXH hằng tháng bằng 03 tháng trợ cấp đang hưởng.","Hồ sơ gồm văn bản đề nghị kèm bản sao giấy xác nhận về việc thôi quốc tịch Việt Nam hoặc bản dịch tiếng Việt được chứng thực/công chứng một trong các giấy tờ quy định tại điểm a, b, c, d khoản 2 Điều 78.","Trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan BHXH giải quyết; nếu không giải quyết phải trả lời bằng văn bản nêu rõ lý do."]},"luat-41_77":{"tldr":"Quy định hồ sơ đề nghị hưởng lương hưu đối với người tham gia bảo hiểm xã hội bắt buộc, gồm trường hợp đang tham gia và đang bảo lưu.","points":["Người đang tham gia BHXH bắt buộc: sổ BHXH; bản chính hoặc bản sao văn bản xác định việc chấm dứt hợp đồng lao động hoặc văn bản chấm dứt làm việc hoặc văn bản đề nghị của đối tượng điểm g, h, m, n khoản 1 Điều 2.","Người đang bảo lưu thời gian đóng BHXH bắt buộc: sổ BHXH; văn bản đề nghị của người đang bảo lưu.","Trường hợp Điều 65: bổ sung biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật nặng, đặc biệt nặng ghi rõ tỷ lệ phần trăm suy giảm khả năng lao động.","Trường hợp điểm d khoản 1 và điểm c khoản 2 Điều 64: bổ sung bản sao giấy chứng nhận bị nhiễm HIV do tai nạn rủi ro nghề nghiệp."]},"luat-41_78":{"tldr":"Quy định hồ sơ đề nghị hưởng bảo hiểm xã hội một lần và các giấy tờ bổ sung theo từng trường hợp.","points":["Hồ sơ cơ bản: sổ BHXH; văn bản đề nghị hưởng BHXH một lần của người lao động.","Trường hợp điểm b khoản 1 Điều 70 (ra nước ngoài định cư): bổ sung bản sao giấy xác nhận thôi quốc tịch Việt Nam hoặc bản dịch tiếng Việt được chứng thực/công chứng một trong các giấy tờ: hộ chiếu do nước ngoài cấp; thị thực có xác nhận cho phép nhập cảnh để định cư; thẻ thường trú dài hạn ở nước ngoài; giấy tờ hợp pháp khác thể hiện định cư ở nước ngoài theo quy định của Chính phủ.","Trường hợp điểm c khoản 1 và điểm b khoản 2 Điều 70: bổ sung bản tóm tắt hồ sơ bệnh án hoặc bản chính/bản sao giấy ra viện.","Trường hợp điểm d khoản 1 và điểm c khoản 2 Điều 70: bổ sung biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật đặc biệt nặng."]},"luat-41_79":{"tldr":"Quy định trình tự, thời hạn nộp hồ sơ và giải quyết hưởng lương hưu, hưởng bảo hiểm xã hội một lần.","points":["Trong thời hạn 20 ngày trước thời điểm người lao động đủ điều kiện hưởng lương hưu, người sử dụng lao động nộp hồ sơ theo Điều 77 cho cơ quan BHXH.","Trong thời hạn 20 ngày trước thời điểm đủ điều kiện, người đang bảo lưu thời gian đóng BHXH bắt buộc nộp hồ sơ theo Điều 77 cho cơ quan BHXH.","Người đủ điều kiện hưởng BHXH một lần nộp hồ sơ theo Điều 78 cho cơ quan BHXH.","Cơ quan BHXH giải quyết trong thời hạn 20 ngày (không gồm ngày nghỉ lễ, tết) kể từ ngày nhận đủ hồ sơ đối với người hưởng lương hưu, hoặc 07 ngày làm việc đối với người hưởng BHXH một lần; nếu không giải quyết phải trả lời bằng văn bản nêu rõ lý do."]},"luat-41_80":{"tldr":"Quy định hồ sơ đề nghị tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng đối với các trường hợp đã bị tạm dừng hoặc chấm dứt hưởng (điểm a, b khoản 3 và khoản 4 Điều 75).","points":["Hồ sơ gồm văn bản đề nghị tiếp tục hưởng và giấy tờ khác tùy trường hợp.","Văn bản của cơ quan nhà nước có thẩm quyền về việc trở về nước đối với trường hợp điểm a khoản 3 Điều 75.","Quyết định của Tòa án hủy bỏ quyết định tuyên bố mất tích hoặc hủy bỏ quyết định tuyên bố là đã chết đối với trường hợp điểm b khoản 3 Điều 75."]},"luat-41_81":{"tldr":"Quy định trình tự giải quyết tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng đối với trường hợp đã bị tạm dừng hoặc chấm dứt hưởng.","points":["Người đề nghị nộp hồ sơ theo Điều 80 cho cơ quan BHXH.","Trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan BHXH giải quyết; nếu không giải quyết phải trả lời bằng văn bản nêu rõ lý do."]},"luat-41_82":{"tldr":"Quy định việc thay đổi hình thức nhận, nơi nhận lương hưu, trợ cấp bảo hiểm xã hội hằng tháng.","points":["Người đang hưởng có nguyện vọng thay đổi hình thức nhận hoặc thay đổi nơi nhận do chuyển nơi cư trú trong nước thì có văn bản gửi cơ quan BHXH nơi đang chi trả.","Trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản, cơ quan BHXH giải quyết; nếu không giải quyết phải trả lời bằng văn bản nêu rõ lý do."]},"luat-41_83":{"tldr":"Quy định về hồ sơ, trình tự khám giám định mức suy giảm khả năng lao động để giải quyết chế độ bảo hiểm xã hội.","points":["Hồ sơ, trình tự khám giám định mức suy giảm khả năng lao động do Bộ trưởng Bộ Y tế quy định.","Việc khám giám định phải bảo đảm chính xác, công khai, minh bạch; Hội đồng giám định y khoa chịu trách nhiệm về tính chính xác của kết quả giám định."]},"luat-41_84":{"tldr":"Đối tượng hưởng chế độ tử tuất của người tham gia bảo hiểm xã hội bị chết là thân nhân quy định tại khoản 2 Điều 86, các điểm a, b, c khoản 2 Điều 88; người thừa kế quy định tại điểm d khoản 2 Điều 88; tổ chức, cá nhân lo mai táng quy định tại khoản 1 Điều 85 và thân nhân quy định tại khoản 3 Điều 85.","points":[]},"luat-41_85":{"tldr":"Quy định các trường hợp được nhận trợ cấp mai táng và mức trợ cấp.","points":["Tổ chức, cá nhân lo mai táng được nhận một lần trợ cấp mai táng khi người sau chết: đối tượng khoản 1 và khoản 2 Điều 2 có thời gian đóng BHXH bắt buộc từ đủ 12 tháng trở lên; chết do tai nạn lao động, bệnh nghề nghiệp theo pháp luật về an toàn, vệ sinh lao động; người đang hưởng hoặc đang tạm dừng hưởng lương hưu, hoặc đang hưởng/tạm dừng hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc.","Mức trợ cấp mai táng bằng 10 lần mức tham chiếu tại tháng mà người đó chết.","Trường hợp đối tượng điểm a, b, c khoản 1 bị Tòa án tuyên bố là đã chết thì thân nhân được hưởng trợ cấp mai táng theo khoản 2."]},"luat-41_86":{"tldr":"Quy định các trường hợp người tham gia bảo hiểm xã hội chết mà thân nhân được hưởng trợ cấp tuất hằng tháng và điều kiện đối với thân nhân.","points":["Đối tượng khoản 1 Điều 2 khi chết hoặc bị tuyên bố là đã chết, thân nhân được hưởng tuất hằng tháng nếu: có thời gian đóng BHXH bắt buộc từ đủ 15 năm trở lên; đang hưởng hoặc tạm dừng hưởng lương hưu; chết do tai nạn lao động, bệnh nghề nghiệp; đang hưởng hoặc tạm dừng hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng với mức suy giảm khả năng lao động từ 61% trở lên.","Thân nhân được hưởng gồm: con (kể cả con khi người mẹ đang mang thai mà người cha chết, con khi lao động nữ mang thai hộ đang mang thai mà người cha/mẹ nhờ mang thai hộ chết) đến khi đủ 18 tuổi; con bị suy giảm khả năng lao động từ 81% trở lên.","Vợ, chồng đủ tuổi theo khoản 2 Điều 169 Bộ luật Lao động; hoặc chưa đủ tuổi mà bị suy giảm khả năng lao động từ 81% trở lên.","Cha đẻ, mẹ đẻ; cha đẻ, mẹ đẻ của vợ/chồng; thành viên khác trong gia đình mà người tham gia BHXH có nghĩa vụ nuôi dưỡng: đủ tuổi theo khoản 2 Điều 169 Bộ luật Lao động; hoặc chưa đủ tuổi mà bị suy giảm khả năng lao động từ 81% trở lên.","Không áp dụng trợ cấp tuất hằng tháng đối với thân nhân điểm b, c, d, đ khoản 2 đang hưởng tiền lương và tham gia BHXH bắt buộc hoặc đang hưởng lương hưu, trợ cấp mất sức lao động, trợ cấp hằng tháng bằng hoặc cao hơn mức tham chiếu (không gồm trợ cấp ưu đãi người có công).","Kết quả khám giám định mức suy giảm khả năng lao động để hưởng tuất hằng tháng phải xác định chậm nhất 06 tháng kể từ ngày người tham gia BHXH chết hoặc kể từ ngày thân nhân điểm a khoản 2 hết thời hạn hưởng; Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc tính, xác định điều kiện."]},"luat-41_87":{"tldr":"Quy định mức trợ cấp tuất hằng tháng đối với mỗi thân nhân, số thân nhân tối đa và thời điểm hưởng.","points":["Mức trợ cấp tuất hằng tháng đối với mỗi thân nhân bằng 50% mức tham chiếu; trường hợp thân nhân không có người trực tiếp nuôi dưỡng bằng 70% mức tham chiếu; Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc xác định thân nhân không có người trực tiếp nuôi dưỡng.","Một người chết hoặc bị tuyên bố là đã chết thuộc đối tượng khoản 1 Điều 86: số thân nhân hưởng tuất hằng tháng tối đa 04 người; nếu có từ 02 người chết hoặc bị tuyên bố là đã chết trở lên thì thân nhân được hưởng 02 lần mức trợ cấp quy định tại khoản 1.","Thời điểm hưởng tính từ ngày đầu tiên của tháng liền kề sau tháng đối tượng chết hoặc bị tuyên bố là đã chết; trường hợp con sinh sau thời điểm người cha (hoặc người mẹ nhờ mang thai hộ) chết thì tính từ tháng con được sinh."]},"luat-41_88":{"tldr":"Quy định các trường hợp thân nhân được hưởng trợ cấp tuất một lần khi người tham gia bảo hiểm xã hội chết hoặc bị Tòa án tuyên bố là đã chết.","points":["Đối tượng làm phát sinh xét hưởng: người đang tham gia BHXH hoặc đang bảo lưu thời gian đóng BHXH; người đang hưởng hoặc tạm dừng hưởng lương hưu, hoặc đang hưởng/tạm dừng hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc.","Thân nhân được hưởng tuất một lần khi: không đủ điều kiện điểm a khoản 1 Điều 86; thuộc trường hợp khoản 1 Điều 86 nhưng không có thân nhân hưởng tuất hằng tháng theo khoản 2 Điều 86; thân nhân thuộc diện hưởng tuất hằng tháng nhưng có nguyện vọng hưởng một lần.","Trường hợp không có thân nhân quy định tại khoản 7 Điều 3 thì trợ cấp tuất một lần thực hiện theo pháp luật về thừa kế."]},"luat-41_89":{"tldr":"Quy định mức trợ cấp tuất một lần đối với thân nhân theo từng nhóm đối tượng.","points":["Đối với thân nhân của người đang tham gia/bảo lưu (điểm a khoản 1 Điều 88): bằng mức trợ cấp tuất mỗi năm đóng nhân số năm đóng nhưng không thấp hơn 03 tháng mức bình quân tiền lương làm căn cứ đóng; mức bình quân tính theo Điều 72 đến thời điểm dừng đóng.","Mức trợ cấp mỗi năm đóng: 1,5 tháng mức bình quân cho năm đóng trước 2014; 02 tháng cho năm đóng từ 2014 trở đi; tháng lẻ trước 2014 chuyển sang giai đoạn từ 2014 trở đi.","Đối với thân nhân của người đang hưởng/tạm dừng hưởng lương hưu chết: chết trong 02 tháng đầu thì bằng 48 tháng lương hưu của tháng đang hưởng; chết từ tháng thứ ba trở đi thì mỗi tháng giảm 0,5 tháng lương hưu so với mức trên nhưng không thấp hơn 03 tháng lương hưu của tháng đang hưởng.","Đối với thân nhân của người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc hưởng BHXH một lần trước khi chết: bằng 03 tháng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng của tháng đang hưởng.","Mức tham chiếu dùng để tính trợ cấp tuất một lần là mức tham chiếu tại tháng đối tượng điểm a khoản 1 Điều 88 chết.","Chính phủ quy định việc giải quyết tử tuất đối với người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng chưa nghỉ việc hoặc còn bảo lưu thời gian đóng, và người đồng thời đang hưởng lương hưu."]},"luat-41_90":{"tldr":"Quy định hồ sơ đề nghị hưởng chế độ tử tuất theo từng nhóm đối tượng và trường hợp chỉ hưởng trợ cấp mai táng.","points":["Thân nhân của người đang tham gia hoặc đang bảo lưu thời gian đóng: sổ BHXH; bản sao giấy chứng tử/trích lục khai tử/giấy báo tử/quyết định Tòa án tuyên bố là đã chết; tờ khai của thân nhân; bản chính/bản sao biên bản điều tra tai nạn lao động (nếu chết do tai nạn lao động) hoặc bản sao bệnh án điều trị bệnh nghề nghiệp (nếu chết do bệnh nghề nghiệp); biên bản giám định hoặc giấy xác nhận khuyết tật đặc biệt nặng đối với thân nhân suy giảm khả năng lao động từ 81% trở lên.","Thân nhân của người đang hưởng/tạm dừng hưởng lương hưu hoặc trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc: bản sao giấy chứng tử/trích lục khai tử/giấy báo tử/quyết định Tòa án; tờ khai của thân nhân; biên bản giám định hoặc giấy xác nhận khuyết tật đặc biệt nặng đối với thân nhân suy giảm khả năng lao động từ 81% trở lên.","Trường hợp chỉ hưởng trợ cấp mai táng: sổ BHXH (trừ người đang hưởng lương hưu, trợ cấp hằng tháng); bản sao giấy chứng tử/trích lục khai tử/giấy báo tử/quyết định Tòa án; tờ khai của tổ chức, cá nhân lo mai táng.","Việc giải quyết hưởng chế độ tử tuất đối với người nước ngoài do Chính phủ quy định."]},"luat-41_91":{"tldr":"Quy định thời hạn nộp hồ sơ và giải quyết hưởng chế độ tử tuất.","points":["Trong thời hạn 90 ngày kể từ ngày người đang bảo lưu, người đang hưởng/tạm dừng hưởng lương hưu, trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng chết, thân nhân hoặc tổ chức/cá nhân lo mai táng nộp hồ sơ theo Điều 90 cho cơ quan BHXH.","Trong thời hạn 90 ngày kể từ ngày người lao động đang tham gia BHXH bắt buộc chết, thân nhân hoặc tổ chức/cá nhân lo mai táng nộp hồ sơ theo Điều 90 cho người sử dụng lao động; trong 30 ngày kể từ ngày nhận đủ hồ sơ, người sử dụng lao động nộp hồ sơ cho cơ quan BHXH.","Trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan BHXH giải quyết; nếu không giải quyết phải trả lời bằng văn bản nêu rõ lý do."]},"luat-41_92":{"tldr":"Quy định việc giải quyết hưởng chế độ bảo hiểm xã hội bắt buộc khi nộp hồ sơ hoặc giải quyết chậm so với thời hạn quy định.","points":["Nộp hồ sơ quá thời hạn quy định tại khoản 1 và 2 Điều 48, khoản 1 Điều 49, khoản 1 Điều 62, khoản 1 Điều 63, khoản 1 Điều 79, khoản 1 và 2 Điều 91 thì phải giải trình bằng văn bản gửi cơ quan BHXH khi nộp hồ sơ.","Nộp hồ sơ quá thời hạn hoặc giải quyết chậm gây thiệt hại đến quyền, lợi ích hợp pháp của người thụ hưởng thì phải bồi thường theo pháp luật, trừ trường hợp do lỗi của người thụ hưởng."]},"luat-41_93":{"tldr":"Lương hưu và chế độ bảo hiểm xã hội được chi trả qua tài khoản người thụ hưởng, trực tiếp từ cơ quan bảo hiểm xã hội hoặc tổ chức được ủy quyền, hoặc thông qua người sử dụng lao động.","points":["Qua tài khoản người thụ hưởng mở tại ngân hàng thương mại, chi nhánh ngân hàng nước ngoài được thành lập và hoạt động tại Việt Nam.","Trực tiếp từ cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ được cơ quan bảo hiểm xã hội ủy quyền.","Thông qua người sử dụng lao động."]},"luat-41_94":{"tldr":"Người đóng bảo hiểm xã hội tự nguyện (hoặc vừa bắt buộc vừa tự nguyện) từ đủ 06 tháng trở lên trong 12 tháng trước khi sinh con được hưởng trợ cấp thai sản khi lao động nữ sinh con hoặc lao động nam có vợ sinh con.","points":["Điều kiện: đóng từ đủ 06 tháng trở lên trong 12 tháng trước khi sinh con; áp dụng cho lao động nữ sinh con và lao động nam có vợ sinh con.","Chỉ có mẹ tham gia mà mẹ chết sau khi sinh con thì cha hoặc người trực tiếp nuôi dưỡng được hưởng.","Cả cha và mẹ cùng đủ điều kiện theo khoản 1 thì chỉ cha hoặc mẹ được hưởng.","Vừa đủ điều kiện hưởng trợ cấp thai sản tự nguyện vừa đủ điều kiện hưởng chế độ thai sản bắt buộc thì chỉ hưởng chế độ thai sản bắt buộc.","Mẹ đủ điều kiện chế độ thai sản bắt buộc, cha đủ điều kiện trợ cấp thai sản tự nguyện thì mỗi người hưởng theo loại của mình.","Cha đủ điều kiện chế độ thai sản bắt buộc, mẹ đủ điều kiện trợ cấp thai sản tự nguyện thì mỗi người hưởng theo loại của mình."]},"luat-41_95":{"tldr":"Mức trợ cấp thai sản là 2.000.000 đồng cho mỗi con được sinh ra và mỗi thai từ 22 tuần tuổi trở lên chết trong tử cung hoặc chết khi chuyển dạ; do ngân sách nhà nước bảo đảm.","points":["Mức trợ cấp thai sản 2.000.000 đồng cho mỗi con được sinh ra và mỗi thai từ 22 tuần tuổi trở lên chết trong tử cung, thai chết trong khi chuyển dạ.","Lao động nữ là người dân tộc thiểu số hoặc người dân tộc Kinh có chồng là người dân tộc thiểu số thuộc hộ nghèo khi sinh con còn được hưởng chính sách hỗ trợ khác theo quy định của Chính phủ.","Ngân sách nhà nước bảo đảm thực hiện; Chính phủ quyết định điều chỉnh mức trợ cấp thai sản theo từng thời kỳ."]},"luat-41_96":{"tldr":"Hồ sơ đề nghị hưởng trợ cấp thai sản là bản sao giấy khai sinh/trích lục khai sinh/giấy chứng sinh của con; trường hợp con chết chưa được cấp giấy chứng sinh thì dùng một trong các giấy tờ thay thế.","points":["Bản sao giấy khai sinh hoặc trích lục khai sinh hoặc bản sao giấy chứng sinh của con.","Trường hợp thai chết trong tử cung, chết khi chuyển dạ hoặc con chết sau khi sinh chưa được cấp giấy chứng sinh thì dùng một trong các giấy tờ sau.","Bản chính hoặc bản sao bản tóm tắt hồ sơ bệnh án thể hiện thông tin con chết.","Bản chính hoặc bản sao giấy ra viện của lao động nữ sinh con thể hiện thông tin con chết.","Bản sao giấy báo tử của con.","Văn bản xác nhận của Ủy ban nhân dân cấp xã đối với trường hợp con chết trong vòng 24 giờ sau khi sinh."]},"luat-41_97":{"tldr":"Người lao động nộp hồ sơ trong 60 ngày kể từ ngày sinh con; cơ quan bảo hiểm xã hội giải quyết trong 05 ngày làm việc kể từ ngày nhận đủ hồ sơ, nếu không giải quyết phải trả lời bằng văn bản nêu rõ lý do.","points":["Trong 60 ngày kể từ ngày sinh con, người lao động nộp hồ sơ theo Điều 96 cho cơ quan bảo hiểm xã hội.","Trong 05 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan bảo hiểm xã hội giải quyết; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_99":{"tldr":"Mức lương hưu hằng tháng: nữ bằng 45% tương ứng 15 năm đóng, nam bằng 45% tương ứng 20 năm đóng, sau đó mỗi năm thêm 2%, tối đa 75%.","points":["Lao động nữ: 45% mức bình quân thu nhập (Điều 104) tương ứng 15 năm đóng, sau đó mỗi năm thêm 2%, tối đa 75%.","Lao động nam: 45% mức bình quân thu nhập (Điều 104) tương ứng 20 năm đóng, sau đó mỗi năm thêm 2%, tối đa 75%.","Lao động nam đóng từ đủ 15 năm đến dưới 20 năm: 40% tương ứng 15 năm đóng, sau đó mỗi năm thêm 1%.","Điều chỉnh lương hưu thực hiện theo Điều 67.","Có thời gian đóng theo điều ước quốc tế mà thời gian đóng ở Việt Nam dưới 15 năm thì mỗi năm đóng trong thời gian này tính bằng 2,25% mức bình quân thu nhập (Điều 104)."]},"luat-41_100":{"tldr":"Lao động nam đóng trên 35 năm, lao động nữ đóng trên 30 năm thì khi nghỉ hưu được hưởng trợ cấp một lần, mỗi năm đóng cao hơn bằng 0,5 lần mức bình quân thu nhập (02 lần nếu tiếp tục đóng sau khi đủ điều kiện hưởng lương hưu).","points":["Nam đóng cao hơn 35 năm, nữ đóng cao hơn 30 năm thì ngoài lương hưu còn được trợ cấp một lần.","Mỗi năm đóng cao hơn bằng 0,5 lần mức bình quân thu nhập (Điều 104) cho mỗi năm đóng cao hơn đến tuổi nghỉ hưu.","Đã đủ điều kiện hưởng lương hưu (Điều 98) mà tiếp tục đóng thì trợ cấp bằng 02 lần mức bình quân thu nhập cho mỗi năm đóng cao hơn số năm tại khoản 1, từ sau thời điểm đủ tuổi nghỉ hưu đến thời điểm nghỉ hưu."]},"luat-41_101":{"tldr":"Thời điểm hưởng lương hưu tính từ ngày đầu tiên của tháng liền kề sau tháng đủ điều kiện hưởng lương hưu; có các quy định riêng cho trường hợp tiếp tục đóng hoặc đóng một lần cho năm còn thiếu.","points":["Tính từ ngày đầu tiên của tháng liền kề sau tháng đủ điều kiện hưởng lương hưu theo Điều 98.","Tiếp tục đóng tự nguyện sau khi đủ điều kiện: thời điểm là ngày đầu tiên của tháng liền kề sau tháng dừng đóng và có yêu cầu hưởng.","Đóng một lần cho những năm còn thiếu (điểm e khoản 2 Điều 36): thời điểm là ngày đầu tiên của tháng liền kề sau tháng đóng đủ số tiền.","Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết Điều này."]},"luat-41_102":{"tldr":"Người tham gia bảo hiểm xã hội tự nguyện được hưởng bảo hiểm xã hội một lần khi thuộc các trường hợp quy định; mức hưởng tính theo số năm đóng (1,5 lần trước năm 2014, 02 lần từ năm 2014 trở đi).","points":["Trường hợp được hưởng: đủ tuổi nghỉ hưu nhưng đóng chưa đủ 15 năm và không tiếp tục tham gia; ra nước ngoài định cư; mắc ung thư, bại liệt, xơ gan mất bù, lao nặng, AIDS; suy giảm khả năng lao động từ 81% trở lên hoặc khuyết tật đặc biệt nặng; đóng trước ngày Luật có hiệu lực, sau 12 tháng không tiếp tục đóng mà chưa đủ 20 năm.","Đủ tuổi nghỉ hưu chưa đủ 15 năm có thể chọn hưởng trợ cấp hằng tháng theo Điều 23 thay vì BHXH một lần.","Mức hưởng: 1,5 lần mức bình quân thu nhập tháng đóng đối với năm đóng trước năm 2014.","Mức hưởng: 02 lần mức bình quân thu nhập tháng đóng đối với năm đóng từ năm 2014 trở đi; tháng lẻ trước 2014 chuyển sang giai đoạn từ 2014.","Chưa đủ một năm thì bằng số tiền đã đóng nhưng không quá 02 lần mức bình quân thu nhập.","Đối tượng được Nhà nước hỗ trợ: mức hưởng không bao gồm tiền ngân sách hỗ trợ, trừ trường hợp điểm c, d khoản 1."]},"luat-41_103":{"tldr":"Người lao động dừng đóng bảo hiểm xã hội tự nguyện mà chưa đủ điều kiện hưởng lương hưu, chưa nhận BHXH một lần hoặc chưa hưởng trợ cấp hằng tháng thì được bảo lưu thời gian đóng bảo hiểm xã hội.","points":["Dừng đóng BHXH tự nguyện mà chưa đủ điều kiện hưởng lương hưu (Điều 98), chưa nhận BHXH một lần (Điều 102) hoặc chưa hưởng trợ cấp hằng tháng (Điều 23) thì được bảo lưu thời gian đóng."]},"luat-41_104":{"tldr":"Mức bình quân thu nhập làm căn cứ đóng BHXH tự nguyện tính bằng bình quân các mức thu nhập làm căn cứ đóng của toàn bộ thời gian đóng, được điều chỉnh theo chỉ số giá tiêu dùng từng thời kỳ.","points":["Tính bằng bình quân các mức thu nhập làm căn cứ đóng BHXH của toàn bộ thời gian đóng.","Thu nhập tháng đã đóng được điều chỉnh trên cơ sở chỉ số giá tiêu dùng của từng thời kỳ theo quy định của Chính phủ."]},"luat-41_106":{"tldr":"Hồ sơ đề nghị hưởng BHXH một lần gồm sổ bảo hiểm xã hội và văn bản đề nghị; tùy trường hợp tại Điều 102 có thêm giấy tờ chứng minh tương ứng.","points":["Hồ sơ cơ bản: sổ bảo hiểm xã hội; văn bản đề nghị hưởng BHXH một lần của người lao động.","Trường hợp điểm b khoản 1 Điều 102 (định cư nước ngoài): thêm giấy xác nhận thôi quốc tịch Việt Nam hoặc bản dịch chứng thực/công chứng hộ chiếu nước ngoài, thị thực, thẻ thường trú dài hạn, hoặc giấy tờ hợp pháp khác.","Trường hợp điểm c khoản 1 Điều 102: thêm bản tóm tắt hồ sơ bệnh án hoặc bản chính/bản sao giấy ra viện.","Trường hợp điểm d khoản 1 Điều 102: thêm biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật đặc biệt nặng."]},"luat-41_107":{"tldr":"Người bảo lưu/tham gia BHXH tự nguyện nộp hồ sơ hưởng lương hưu trong 20 ngày trước thời điểm đủ điều kiện; cơ quan BHXH giải quyết trong 20 ngày (lương hưu) hoặc 07 ngày làm việc (BHXH một lần).","points":["Trong 20 ngày trước thời điểm đủ điều kiện hưởng lương hưu, nộp hồ sơ theo Điều 105 cho cơ quan BHXH.","Khi đủ điều kiện và có yêu cầu hưởng BHXH một lần, nộp hồ sơ theo Điều 106.","Thời điểm kết thúc ngày cuối cùng của tháng dừng đóng hoặc tháng chấm dứt hợp đồng lao động là căn cứ xác định thời điểm đủ điều kiện hưởng BHXH một lần đối với điểm đ khoản 1 Điều 102.","Giải quyết trong 20 ngày (không gồm ngày nghỉ lễ, tết) đối với lương hưu, hoặc 07 ngày làm việc đối với BHXH một lần; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_109":{"tldr":"Người đóng BHXH từ đủ 60 tháng trở lên hoặc đang/tạm dừng hưởng lương hưu khi chết thì tổ chức, cá nhân lo mai táng được nhận trợ cấp mai táng bằng 10 lần mức tham chiếu tại tháng chết.","points":["Đối tượng: người đóng BHXH từ đủ 60 tháng trở lên; người đang hưởng hoặc tạm dừng hưởng lương hưu.","Mức trợ cấp mai táng bằng 10 lần mức tham chiếu tại tháng người đó chết.","Trường hợp bị Tòa án tuyên bố là đã chết thì thân nhân được hưởng trợ cấp theo khoản 2."]},"luat-41_110":{"tldr":"Thân nhân của người tham gia/bảo lưu/đang hưởng/tạm dừng hưởng lương hưu khi chết được hưởng trợ cấp tuất một lần, tính theo số năm đóng hoặc theo thời gian đã hưởng lương hưu.","points":["Đối tượng có thân nhân được hưởng: đang tham gia BHXH tự nguyện, bảo lưu thời gian đóng, đang hưởng hoặc tạm dừng hưởng lương hưu.","Thân nhân của người tham gia/bảo lưu: mỗi năm đóng trước năm 2014 bằng 1,5 lần mức bình quân thu nhập; tháng lẻ trước 2014 chuyển sang giai đoạn từ 2014.","Mỗi năm đóng từ năm 2014 trở đi bằng 02 lần mức bình quân thu nhập; đóng chưa đủ 60 tháng thì bằng số tiền đã đóng.","Có cả thời gian đóng bắt buộc và tự nguyện thì trợ cấp tuất một lần tối thiểu bằng 03 lần mức bình quân tiền lương và thu nhập làm căn cứ đóng.","Thân nhân của người đang hưởng/tạm dừng hưởng lương hưu, chết trong 02 tháng đầu: bằng 48 tháng lương hưu của tháng đang hưởng.","Chết từ tháng thứ ba trở đi: mỗi tháng giảm 0,5 tháng lương hưu so với điểm a, nhưng không thấp hơn 03 tháng lương hưu của tháng đang hưởng."]},"luat-41_111":{"tldr":"Người vừa có thời gian đóng BHXH bắt buộc vừa tự nguyện: nếu đủ số năm đóng bắt buộc theo quy định thì hưởng chế độ hưu trí, trợ cấp tuất hằng tháng, trợ cấp mai táng theo chính sách bắt buộc.","points":["Từ đủ 15 năm đóng bắt buộc trở lên (đối tượng Điều 64) hoặc từ đủ 20 năm (đối tượng Điều 65): điều kiện, mức hưởng lương hưu theo chính sách BHXH bắt buộc.","Từ đủ 15 năm đóng bắt buộc trở lên: được hưởng trợ cấp tuất hằng tháng theo chính sách BHXH bắt buộc.","Từ đủ 12 tháng đóng bắt buộc trở lên: được hưởng trợ cấp mai táng theo chính sách BHXH bắt buộc.","Chính phủ quy định chi tiết Điều này."]},"luat-41_112":{"tldr":"Hồ sơ đề nghị hưởng chế độ tử tuất theo các quy định tại Điều 90; thân nhân nộp hồ sơ trong 90 ngày kể từ ngày chết, cơ quan BHXH giải quyết trong 10 ngày làm việc.","points":["Thân nhân của người đang tham gia hoặc bảo lưu: hồ sơ theo điểm a, b, c khoản 1 Điều 90.","Thân nhân của người đang hưởng/tạm dừng hưởng lương hưu: hồ sơ theo điểm a, b khoản 2 Điều 90.","Trường hợp chỉ hưởng trợ cấp mai táng: hồ sơ theo khoản 3 Điều 90.","Trong 90 ngày kể từ ngày người đó chết, thân nhân nộp hồ sơ cho cơ quan BHXH.","Trong 10 ngày làm việc kể từ ngày nhận đủ hồ sơ, cơ quan BHXH giải quyết; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do."]},"luat-41_113":{"tldr":"Nộp hồ sơ quá thời hạn quy định phải giải trình bằng văn bản; nếu nộp/giải quyết chậm gây thiệt hại đến quyền lợi người thụ hưởng thì phải bồi thường, trừ trường hợp do lỗi của người thụ hưởng.","points":["Nộp hồ sơ quá thời hạn tại khoản 1 Điều 97, khoản 1 Điều 107, điểm a khoản 2 Điều 112 thì phải giải trình bằng văn bản khi nộp hồ sơ.","Nộp quá hạn hoặc giải quyết chậm gây thiệt hại đến quyền, lợi ích hợp pháp của người thụ hưởng thì phải bồi thường theo pháp luật, trừ trường hợp do lỗi của người thụ hưởng."]},"luat-41_115":{"tldr":"Người tham gia BHXH tự nguyện đang hưởng lương hưu ra nước ngoài định cư được hưởng trợ cấp một lần; người đang hưởng lương hưu chuyển nơi cư trú trong nước được giải quyết thay đổi hình thức/nơi nhận.","points":["Ra nước ngoài định cư: mỗi năm đóng trước năm 2014 bằng 1,5 tháng lương hưu đang hưởng, mỗi năm từ 2014 trở đi bằng 02 tháng; sau đó mỗi tháng đã hưởng lương hưu trừ 0,5 tháng; thấp nhất bằng 03 tháng lương hưu đang hưởng.","Người đang hưởng trợ cấp BHXH hằng tháng ra nước ngoài định cư: trợ cấp một lần bằng 03 tháng trợ cấp đang hưởng.","Hồ sơ gồm văn bản đề nghị kèm giấy xác nhận thôi quốc tịch Việt Nam hoặc bản dịch chứng thực/công chứng giấy tờ theo điểm a, b, c, d khoản 2 Điều 106.","Giải quyết trong 07 ngày làm việc kể từ ngày nhận đủ hồ sơ; không giải quyết thì trả lời bằng văn bản và nêu rõ lý do.","Chuyển nơi cư trú trong nước: có văn bản gửi cơ quan BHXH nơi đang chi trả; giải quyết trong 05 ngày làm việc.","Tạm dừng, chấm dứt, tiếp tục hưởng lương hưu thực hiện theo các điều 75, 80 và 81."]},"luat-41_116":{"tldr":"Quỹ bảo hiểm xã hội là quỹ tài chính độc lập với ngân sách nhà nước; định kỳ 03 năm Kiểm toán nhà nước thực hiện kiểm toán quỹ và hoạt động đầu tư, báo cáo Quốc hội.","points":["Quỹ BHXH là quỹ tài chính độc lập với ngân sách nhà nước; được hạch toán, kế toán, lập báo cáo tài chính, kiểm toán nội bộ theo pháp luật.","Định kỳ 03 năm, Kiểm toán nhà nước kiểm toán quỹ BHXH, hoạt động đầu tư quỹ và báo cáo Quốc hội; có thể kiểm toán đột xuất theo yêu cầu của Quốc hội, Ủy ban Thường vụ Quốc hội, Chính phủ.","Khi thanh tra, kiểm toán phát hiện chồng chéo, trùng lặp thì phối hợp xử lý, bảo đảm một nội dung chỉ là đối tượng của một cơ quan thanh tra hoặc một cơ quan kiểm toán nhà nước."]},"luat-41_118":{"tldr":"Quỹ bảo hiểm xã hội gồm quỹ ốm đau và thai sản, quỹ hưu trí và tử tuất, quỹ bảo hiểm tai nạn lao động - bệnh nghề nghiệp; quỹ bảo hiểm thất nghiệp theo Luật Việc làm.","points":["Quỹ ốm đau và thai sản.","Quỹ hưu trí và tử tuất.","Quỹ bảo hiểm tai nạn lao động - bệnh nghề nghiệp theo Luật An toàn, vệ sinh lao động.","Quỹ bảo hiểm thất nghiệp theo Luật Việc làm."]},"luat-41_119":{"tldr":"Quỹ bảo hiểm xã hội được sử dụng để chi trả các chế độ BHXH, đóng bảo hiểm y tế cho một số đối tượng, chi phí khám giám định, chi tổ chức và hoạt động, và đầu tư bảo toàn, tăng trưởng quỹ.","points":["Chi trả các chế độ BHXH bắt buộc và tự nguyện theo Chương V, Chương VI và trợ cấp hằng tháng theo Điều 23.","Chi đóng bảo hiểm y tế cho: người đang hưởng lương hưu; người nghỉ việc hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng; người nghỉ hưởng chế độ thai sản từ 14 ngày làm việc trở lên trong tháng; người nghỉ hưởng trợ cấp ốm đau với bệnh cần chữa trị dài ngày; người nghỉ hưởng chế độ ốm đau từ 14 ngày làm việc trở lên trong tháng.","Chi trả phí khám giám định mức suy giảm khả năng lao động khi không do người sử dụng lao động giới thiệu mà kết quả đủ điều kiện hưởng chế độ.","Chi tổ chức và hoạt động BHXH theo Điều 120.","Đầu tư để bảo toàn và tăng trưởng quỹ theo Mục 2 Chương này."]},"luat-41_120":{"tldr":"Chi tổ chức và hoạt động bảo hiểm xã hội dùng cho tuyên truyền, cải cách hành chính, đầu tư tài sản, tổ chức thu chi và bộ máy; mức chi tính theo phần trăm dự toán thu, chi và trích từ tiền sinh lời đầu tư quỹ.","points":["Nhiệm vụ chi: tuyên truyền, phổ biến, tư vấn, tập huấn về BHXH; cải cách hành chính, phát triển và quản lý người tham gia, người thụ hưởng; đầu tư, mua sắm, bảo dưỡng tài sản; tổ chức thu, chi trả và hoạt động bộ máy cơ quan BHXH các cấp, Hội đồng quản lý BHXH.","Mức chi tính trên số phần trăm của dự toán thu, chi BHXH, không bao gồm chi đóng BHYT cho người hưởng chế độ, được trích từ tiền sinh lời của hoạt động đầu tư quỹ.","Định kỳ 03 năm, Chính phủ báo cáo Ủy ba
