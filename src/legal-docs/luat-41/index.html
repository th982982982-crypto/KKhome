":"c) Tờ khai của thân nhân;"},{"k":"p","t":"d) Bản chính hoặc bản sao biên bản điều tra tai nạn lao động đối với trường hợp chết do tai nạn lao động; bản sao bệnh án điều trị bệnh nghề nghiệp đối với trường hợp chết do bệnh nghề nghiệp;"},{"k":"p","t":"đ) Biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật đặc biệt nặng có thể hiện kết luận của Hội đồng giám định y khoa ghi rõ tỷ lệ phần trăm suy giảm khả năng lao động đối với thân nhân bị suy giảm khả năng lao động từ 81% trở lên."},{"k":"p","t":"2. Hồ sơ đề nghị hưởng chế độ tử tuất đối với thân nhân của người đang hưởng lương hưu hoặc đang tạm dừng hưởng lương hưu hoặc trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc bao gồm:"},{"k":"p","t":"a) Bản sao giấy chứng tử hoặc trích lục khai tử hoặc bản sao giấy báo tử hoặc bản sao quyết định của Toà án tuyên bố là đã chết;"},{"k":"p","t":"b) Tờ khai của thân nhân;"},{"k":"p","t":"c) Biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật đặc biệt nặng có thể hiện kết luận của Hội đồng giám định y khoa ghi rõ tỷ lệ phần trăm suy giảm khả năng lao động đối với thân nhân bị suy giảm khả năng lao động từ 81% trở lên."},{"k":"p","t":"3. Hồ sơ đề nghị hưởng trợ cấp mai táng đối với trường hợp chỉ hưởng trợ cấp mai táng bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội, trừ trường hợp người đang hưởng lương hưu, trợ cấp hằng tháng;"},{"k":"p","t":"b) Bản sao giấy chứng tử hoặc trích lục khai tử hoặc bản sao giấy báo tử hoặc bản sao quyết định của Tòa án tuyên bố là đã chết;"},{"k":"p","t":"c) Tờ khai của tổ chức, cá nhân lo mai táng."},{"k":"p","t":"4. Việc giải quyết hưởng chế độ tử tuất đối với người nước ngoài do Chính phủ quy định."}]},{"id":"luat-41_91","no":91,"code":"Điều 91","title":"Điều 91. Giải quyết hưởng chế độ tử tuất","shortTitle":"Giải quyết hưởng chế độ tử tuất","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 90 ngày kể từ ngày người đang bảo lưu thời gian đóng bảo hiểm xã hội, người đang hưởng hoặc đang tạm dừng hưởng lương hưu, trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng chết thì thân nhân hoặc tổ chức, cá nhân lo mai táng nộp hồ sơ quy định tại Điều 90 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Trong thời hạn 90 ngày kể từ ngày người lao động đang tham gia bảo hiểm xã hội bắt buộc chết thì thân nhân hoặc tổ chức, cá nhân lo mai táng nộp hồ sơ quy định tại Điều 90 của Luật này cho người sử dụng lao động."},{"k":"p","t":"Trong thời hạn 30 ngày kể từ ngày nhận đủ hồ sơ từ thân nhân của người lao động, người sử dụng lao động có trách nhiệm nộp hồ sơ cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"3. Trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_92","no":92,"code":"Điều 92","title":"Điều 92. Giải quyết hưởng chế độ bảo hiểm xã hội bắt buộc chậm so với thời hạn quy định","shortTitle":"Giải quyết hưởng chế độ bảo hiểm xã hội bắt buộc chậm so với thời hạn quy định","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Trường hợp nộp hồ sơ quá thời hạn quy định tại khoản 1 và khoản 2 Điều 48, khoản 1 Điều 49, khoản 1 Điều 62, khoản 1 Điều 63, khoản 1 Điều 79, khoản 1 và khoản 2 Điều 91 của Luật này thì phải giải trình bằng văn bản và gửi cho cơ quan bảo hiểm xã hội khi nộp hồ sơ."},{"k":"p","t":"2. Trường hợp nộp hồ sơ quá thời hạn quy định hoặc giải quyết hưởng chế độ bảo hiểm xã hội bắt buộc chậm so với thời hạn quy định, gây thiệt hại đến quyền, lợi ích hợp pháp của người thụ hưởng thì phải bồi thường theo quy định của pháp luật, trừ trường hợp do lỗi của người thụ hưởng chế độ bảo hiểm xã hội."}]},{"id":"luat-41_93","no":93,"code":"Điều 93","title":"Điều 93. Hình thức chi trả lương hưu và chế độ bảo hiểm xã hội","shortTitle":"Hình thức chi trả lương hưu và chế độ bảo hiểm xã hội","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Thông qua tài khoản của người thụ hưởng mở tại ngân hàng thương mại, chi nhánh ngân hàng nước ngoài được thành lập và hoạt động tại Việt Nam."},{"k":"p","t":"2. Trực tiếp từ cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ được cơ quan bảo hiểm xã hội ủy quyền."},{"k":"p","t":"3. Thông qua người sử dụng lao động."},{"k":"p","t":"TRỢ CẤP THAI SẢN"}]},{"id":"luat-41_94","no":94,"code":"Điều 94","title":"Điều 94. Đối tượng và điều kiện hưởng trợ cấp thai sản","shortTitle":"Đối tượng và điều kiện hưởng trợ cấp thai sản","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối tượng có thời gian đóng bảo hiểm xã hội tự nguyện hoặc vừa có thời gian đóng bảo hiểm xã hội bắt buộc vừa có thời gian đóng bảo hiểm xã hội tự nguyện từ đủ 06 tháng trở lên trong thời gian 12 tháng trước khi sinh con được hưởng trợ cấp thai sản khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Lao động nữ sinh con;"},{"k":"p","t":"b) Lao động nam có vợ sinh con."},{"k":"p","t":"2. Trường hợp chỉ có mẹ tham gia bảo hiểm xã hội mà mẹ chết sau khi sinh con thì cha hoặc người trực tiếp nuôi dưỡng được hưởng trợ cấp thai sản."},{"k":"p","t":"3. Trường hợp cả cha và mẹ cùng tham gia bảo hiểm xã hội đủ điều kiện hưởng trợ cấp thai sản quy định tại khoản 1 Điều này thì chỉ cha hoặc mẹ được hưởng trợ cấp thai sản."},{"k":"p","t":"4. Trường hợp người quy định tại khoản 1 Điều này vừa có đủ điều kiện hưởng trợ cấp thai sản trong bảo hiểm xã hội tự nguyện và vừa có đủ điều kiện hưởng chế độ thai sản trong bảo hiểm xã hội bắt buộc thì chỉ được hưởng chế độ thai sản trong bảo hiểm xã hội bắt buộc."},{"k":"p","t":"5. Trường hợp mẹ đủ điều kiện hưởng chế độ thai sản trong bảo hiểm xã hội bắt buộc, cha đủ điều kiện hưởng trợ cấp thai sản trong bảo hiểm xã hội tự nguyện thì mẹ được hưởng chế độ thai sản trong bảo hiểm xã hội bắt buộc và cha được hưởng trợ cấp thai sản trong bảo hiểm xã hội tự nguyện."},{"k":"p","t":"6. Trường hợp cha đủ điều kiện hưởng chế độ thai sản trong bảo hiểm xã hội bắt buộc, mẹ đủ điều kiện hưởng trợ cấp thai sản trong bảo hiểm xã hội tự nguyện thì cha được hưởng chế độ thai sản trong bảo hiểm xã hội bắt buộc và mẹ được hưởng trợ cấp thai sản trong bảo hiểm xã hội tự nguyện."}]},{"id":"luat-41_95","no":95,"code":"Điều 95","title":"Điều 95. Trợ cấp thai sản","shortTitle":"Trợ cấp thai sản","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Mức trợ cấp thai sản là 2.000.000 đồng cho mỗi con được sinh ra và mỗi thai từ 22 tuần tuổi trở lên chết trong tử cung, thai chết trong khi chuyển dạ."},{"k":"p","t":"Lao động nữ là người dân tộc thiểu số hoặc lao động nữ là người dân tộc Kinh có chồng là người dân tộc thiểu số thuộc hộ nghèo khi sinh con còn được hưởng chính sách hỗ trợ khác theo quy định của Chính phủ."},{"k":"p","t":"2. Ngân sách nhà nước bảo đảm thực hiện quy định tại khoản 1 Điều này. Chính phủ quyết định điều chỉnh mức trợ cấp thai sản phù hợp với điều kiện phát triển kinh tế - xã hội và khả năng của ngân sách nhà nước từng thời kỳ."}]},{"id":"luat-41_96","no":96,"code":"Điều 96","title":"Điều 96. Hồ sơ đề nghị hưởng trợ cấp thai sản","shortTitle":"Hồ sơ đề nghị hưởng trợ cấp thai sản","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Hồ sơ đề nghị hưởng trợ cấp thai sản là một trong các giấy tờ sau đây:"},{"k":"p","t":"1. Bản sao giấy khai sinh hoặc trích lục khai sinh hoặc bản sao giấy chứng sinh của con;"},{"k":"p","t":"2. Trường hợp thai chết trong tử cung, thai chết trong khi chuyển dạ hoặc con chết sau khi sinh mà chưa được cấp giấy chứng sinh thì hồ sơ là một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Bản chính hoặc bản sao bản tóm tắt hồ sơ bệnh án có thể hiện thông tin con chết;"},{"k":"p","t":"b) Bản chính hoặc bản sao giấy ra viện của lao động nữ sinh con có thể hiện thông tin con chết;"},{"k":"p","t":"c) Bản sao giấy báo tử của con;"},{"k":"p","t":"d) Văn bản xác nhận của Ủy ban nhân dân cấp xã đối với trường hợp con chết trong vòng 24 giờ sau khi sinh."}]},{"id":"luat-41_97","no":97,"code":"Điều 97","title":"Điều 97. Giải quyết hưởng trợ cấp thai sản","shortTitle":"Giải quyết hưởng trợ cấp thai sản","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 60 ngày kể từ ngày sinh con, người lao động có trách nhiệm nộp hồ sơ quy định tại Điều 96 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"CHẾ ĐỘ HƯU TRÍ"}]},{"id":"luat-41_98","no":98,"code":"Điều 98","title":"Điều 98. Đối tượng và điều kiện hưởng lương hưu","shortTitle":"Đối tượng và điều kiện hưởng lương hưu","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Người tham gia bảo hiểm xã hội tự nguyện được hưởng lương hưu khi đủ tuổi nghỉ hưu theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động và có thời gian đóng bảo hiểm xã hội từ đủ 15 năm trở lên."}]},{"id":"luat-41_99","no":99,"code":"Điều 99","title":"Điều 99. Mức lương hưu hằng tháng","shortTitle":"Mức lương hưu hằng tháng","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Mức lương hưu hằng tháng của đối tượng đủ điều kiện quy định tại Điều 98 của Luật này được tính như sau:"},{"k":"p","t":"a) Đối với lao động nữ bằng 45% mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 104 của Luật này tương ứng 15 năm đóng bảo hiểm xã hội, sau đó cứ thêm mỗi năm đóng thì tính thêm 2%, mức tối đa bằng 75%;"},{"k":"p","t":"b) Đối với lao động nam bằng 45% mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 104 của Luật này tương ứng 20 năm đóng bảo hiểm xã hội, sau đó cứ thêm mỗi năm đóng thì tính thêm 2%, mức tối đa bằng 75%."},{"k":"p","t":"Trường hợp lao động nam có thời gian đóng bảo hiểm xã hội từ đủ 15 năm đến dưới 20 năm, mức lương hưu hằng tháng bằng 40% mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 104 của Luật này tương ứng 15 năm đóng bảo hiểm xã hội, sau đó cứ thêm mỗi năm đóng thì tính thêm 1%."},{"k":"p","t":"2. Việc điều chỉnh lương hưu được thực hiện theo quy định tại Điều 67 của Luật này."},{"k":"p","t":"3. Việc tính mức lương hưu hằng tháng của người lao động đủ điều kiện hưởng lương hưu mà có thời gian đóng bảo hiểm xã hội theo quy định của điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên nhưng có thời gian đóng bảo hiểm xã hội ở Việt Nam dưới 15 năm thì mỗi năm đóng trong thời gian này được tính bằng 2,25% mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 104 của Luật này."}]},{"id":"luat-41_100","no":100,"code":"Điều 100","title":"Điều 100. Trợ cấp một lần khi nghỉ hưu","shortTitle":"Trợ cấp một lần khi nghỉ hưu","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Lao động nam có thời gian đóng bảo hiểm xã hội cao hơn 35 năm, lao động nữ có thời gian đóng bảo hiểm xã hội cao hơn 30 năm thì khi nghỉ hưu, ngoài lương hưu còn được hưởng trợ cấp một lần."},{"k":"p","t":"2. Mức hưởng trợ cấp một lần cho mỗi năm đóng cao hơn quy định tại khoản 1 Điều này bằng 0,5 lần của mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 104 của Luật này cho mỗi năm đóng cao hơn đến tuổi nghỉ hưu theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người lao động đã đủ điều kiện hưởng lương hưu theo quy định tại Điều 98 của Luật này mà tiếp tục đóng bảo hiểm xã hội thì mức trợ cấp bằng 02 lần của mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 104 của Luật này cho mỗi năm đóng cao hơn số năm quy định tại khoản 1 Điều này kể từ sau thời điểm đủ tuổi nghỉ hưu theo quy định của pháp luật đến thời điểm nghỉ hưu."}]},{"id":"luat-41_101","no":101,"code":"Điều 101","title":"Điều 101. Thời điểm hưởng lương hưu","shortTitle":"Thời điểm hưởng lương hưu","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời điểm hưởng lương hưu đối với đối tượng quy định tại Điều 98 của Luật này được tính từ ngày đầu tiên của tháng liền kề sau tháng đủ điều kiện hưởng lương hưu theo quy định tại Điều 98 của Luật này."},{"k":"p","t":"2. Trường hợp người tham gia bảo hiểm xã hội tiếp tục đóng bảo hiểm xã hội tự nguyện sau khi đã đủ điều kiện hưởng lương hưu thì thời điểm hưởng lương hưu là ngày đầu tiên của tháng liền kề sau tháng dừng đóng và có yêu cầu hưởng lương hưu."},{"k":"p","t":"3. Trường hợp người tham gia bảo hiểm xã hội tự nguyện đóng một lần cho những năm còn thiếu theo quy định tại điểm e khoản 2 Điều 36 của Luật này thì thời điểm hưởng lương hưu là ngày đầu tiên của tháng liền kề sau tháng đóng đủ số tiền cho những năm còn thiếu."},{"k":"p","t":"4. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết Điều này; quy định về việc tính, việc xác định điều kiện đối với từng trường hợp để giải quyết chế độ hưu trí."}]},{"id":"luat-41_102","no":102,"code":"Điều 102","title":"Điều 102. Hưởng bảo hiểm xã hội một lần","shortTitle":"Hưởng bảo hiểm xã hội một lần","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại khoản 4 Điều 2 của Luật này mà có yêu cầu thì được hưởng bảo hiểm xã hội một lần nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Đủ tuổi nghỉ hưu theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động nhưng có thời gian đóng bảo hiểm xã hội chưa đủ 15 năm mà không tiếp tục tham gia bảo hiểm xã hội."},{"k":"p","t":"Trường hợp người lao động không hưởng bảo hiểm xã hội một lần thì có thể lựa chọn hưởng trợ cấp hằng tháng theo quy định tại Điều 23 của Luật này;"},{"k":"p","t":"b) Ra nước ngoài để định cư;"},{"k":"p","t":"c) Người đang mắc một trong những bệnh ung thư, bại liệt, xơ gan mất bù, lao nặng, AIDS;"},{"k":"p","t":"d) Người có mức suy giảm khả năng lao động từ 81% trở lên; người khuyết tật đặc biệt nặng;"},{"k":"p","t":"đ) Người lao động có thời gian đóng bảo hiểm xã hội trước ngày Luật này có hiệu lực thi hành, sau 12 tháng không tiếp tục đóng bảo hiểm xã hội mà chưa đủ 20 năm đóng bảo hiểm xã hội."},{"k":"p","t":"2. Mức hưởng bảo hiểm xã hội một lần được tính theo số năm đã đóng và căn cứ đóng bảo hiểm xã hội, cứ mỗi năm được tính như sau:"},{"k":"p","t":"a) Bằng 1,5 lần của mức bình quân thu nhập tháng đóng bảo hiểm xã hội đối với năm đóng trước năm 2014."},{"k":"p","t":"Trường hợp thời gian đóng bảo hiểm xã hội có cả trước và sau năm 2014 mà thời gian đóng trước năm 2014 có tháng lẻ thì những tháng lẻ đó được chuyển sang giai đoạn đóng bảo hiểm xã hội từ năm 2014 trở đi để tính mức hưởng bảo hiểm xã hội một lần;"},{"k":"p","t":"b) Bằng 02 lần của mức bình quân thu nhập tháng đóng bảo hiểm xã hội đối với năm đóng từ năm 2014 trở đi;"},{"k":"p","t":"c) Trường hợp thời gian đóng bảo hiểm xã hội chưa đủ một năm thì mức hưởng bằng số tiền đã đóng nhưng không quá 02 lần của mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội."},{"k":"p","t":"3. Mức hưởng bảo hiểm xã hội một lần của đối tượng được Nhà nước hỗ trợ thực hiện theo quy định tại khoản 2 Điều này không bao gồm số tiền ngân sách nhà nước hỗ trợ đóng bảo hiểm xã hội tự nguyện, trừ trường hợp quy định tại điểm c và điểm d khoản 1 Điều này."},{"k":"p","t":"4. Thời điểm tính hưởng bảo hiểm xã hội một lần là thời điểm ghi trong quyết định của cơ quan bảo hiểm xã hội."},{"k":"p","t":"5. Trường hợp người lao động quy định tại các điểm b, c và d khoản 1 Điều này vừa đủ điều kiện hưởng lương hưu vừa đủ điều kiện hưởng bảo hiểm xã hội một lần thì người lao động được lựa chọn hưởng lương hưu hoặc bảo hiểm xã hội một lần."},{"k":"p","t":"6. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_103","no":103,"code":"Điều 103","title":"Điều 103. Bảo lưu thời gian đóng bảo hiểm xã hội","shortTitle":"Bảo lưu thời gian đóng bảo hiểm xã hội","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Người lao động dừng đóng bảo hiểm xã hội tự nguyện mà chưa đủ điều kiện để hưởng lương hưu theo quy định tại Điều 98 hoặc chưa nhận bảo hiểm xã hội một lần theo quy định tại Điều 102 của Luật này hoặc chưa hưởng trợ cấp hằng tháng theo quy định tại Điều 23 của Luật này thì được bảo lưu thời gian đóng bảo hiểm xã hội."}]},{"id":"luat-41_104","no":104,"code":"Điều 104","title":"Điều 104. Mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội tự nguyện","shortTitle":"Mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội tự nguyện","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội tự nguyện được tính bằng bình quân các mức thu nhập làm căn cứ đóng bảo hiểm xã hội của toàn bộ thời gian đóng."},{"k":"p","t":"2. Thu nhập tháng đã đóng bảo hiểm xã hội để làm căn cứ tính mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội của người lao động được điều chỉnh trên cơ sở chỉ số giá tiêu dùng của từng thời kỳ theo quy định của Chính phủ."}]},{"id":"luat-41_105","no":105,"code":"Điều 105","title":"Điều 105. Hồ sơ đề nghị hưởng lương hưu đối với người tham gia bảo hiểm xã hội tự nguyện","shortTitle":"Hồ sơ đề nghị hưởng lương hưu đối với người tham gia bảo hiểm xã hội tự nguyện","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Hồ sơ đề nghị hưởng lương hưu đối với người tham gia bảo hiểm xã hội tự nguyện bao gồm sổ bảo hiểm xã hội và văn bản đề nghị hưởng lương hưu."}]},{"id":"luat-41_106","no":106,"code":"Điều 106","title":"Điều 106. Hồ sơ đề nghị hưởng bảo hiểm xã hội một lần","shortTitle":"Hồ sơ đề nghị hưởng bảo hiểm xã hội một lần","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng bảo hiểm xã hội một lần bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội;"},{"k":"p","t":"b) Văn bản đề nghị hưởng bảo hiểm xã hội một lần của người lao động."},{"k":"p","t":"2. Trường hợp quy định tại điểm b khoản 1 Điều 102 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm bản sao giấy xác nhận của cơ quan có thẩm quyền về việc thôi quốc tịch Việt Nam hoặc bản dịch tiếng Việt được chứng thực hoặc công chứng một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Hộ chiếu do nước ngoài cấp;"},{"k":"p","t":"b) Thị thực của cơ quan nước ngoài có thẩm quyền cấp có xác nhận việc cho phép nhập cảnh để định cư ở nước ngoài;"},{"k":"p","t":"c) Thẻ thường trú dài hạn ở nước ngoài của cơ quan nước ngoài có thẩm quyền cấp;"},{"k":"p","t":"d) Giấy tờ hợp pháp khác thể hiện việc định cư ở nước ngoài theo quy định của Chính phủ."},{"k":"p","t":"3. Trường hợp quy định tại điểm c khoản 1 Điều 102 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm bản tóm tắt hồ sơ bệnh án hoặc bản chính hoặc bản sao giấy ra viện."},{"k":"p","t":"4. Trường hợp quy định tại điểm d khoản 1 Điều 102 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật đặc biệt nặng."}]},{"id":"luat-41_107","no":107,"code":"Điều 107","title":"Điều 107. Giải quyết hưởng lương hưu, bảo hiểm xã hội một lần đối với người đang bảo lưu thời gian đóng bảo hiểm xã hội, người tham gia bảo hiểm xã hội tự nguyện","shortTitle":"Giải quyết hưởng lương hưu, bảo hiểm xã hội một lần đối với người đang bảo lưu thời gian đóng bảo hiểm xã hội, người tham gia bảo hiểm xã hội tự nguyện","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 20 ngày trước thời điểm đủ điều kiện hưởng lương hưu, người đang bảo lưu thời gian đóng bảo hiểm xã hội, người tham gia bảo hiểm xã hội tự nguyện nộp hồ sơ quy định tại Điều 105 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Người lao động khi đủ điều kiện và có yêu cầu hưởng bảo hiểm xã hội một lần nộp hồ sơ quy định tại Điều 106 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"Thời điểm kết thúc ngày cuối cùng của tháng dừng đóng bảo hiểm xã hội hoặc tháng chấm dứt hợp đồng lao động là căn cứ để xác định thời điểm đủ điều kiện giải quyết hưởng bảo hiểm xã hội một lần đối với trường hợp người hưởng bảo hiểm xã hội theo quy định tại điểm đ khoản 1 Điều 102 của Luật này."},{"k":"p","t":"3. Trong thời hạn 20 ngày, không bao gồm ngày nghỉ lễ, tết, kể từ ngày nhận đủ hồ sơ theo quy định đối với người đề nghị hưởng lương hưu hoặc trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định đối với người đề nghị hưởng bảo hiểm xã hội một lần, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"CHẾ ĐỘ TỬ TUẤT"}]},{"id":"luat-41_108","no":108,"code":"Điều 108","title":"Điều 108. Đối tượng hưởng chế độ tử tuất","shortTitle":"Đối tượng hưởng chế độ tử tuất","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Đối tượng hưởng chế độ tử tuất của người tham gia bảo hiểm xã hội tự nguyện bị chết là tổ chức, cá nhân lo mai táng quy định tại khoản 1 Điều 109 của Luật này; thân nhân quy định khoản 3 Điều 109 của Luật này và khoản 1 Điều 110 của Luật này."}]},{"id":"luat-41_109","no":109,"code":"Điều 109","title":"Điều 109. Trợ cấp mai táng","shortTitle":"Trợ cấp mai táng","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Những người sau đây khi chết thì tổ chức, cá nhân lo mai táng được nhận một lần trợ cấp mai táng:"},{"k":"p","t":"a) Người có thời gian đóng bảo hiểm xã hội từ đủ 60 tháng trở lên;"},{"k":"p","t":"b) Người đang hưởng lương hưu, tạm dừng hưởng lương hưu."},{"k":"p","t":"2. Mức trợ cấp mai táng bằng 10 lần mức tham chiếu tại tháng mà người quy định tại khoản 1 Điều này chết."},{"k":"p","t":"3. Trường hợp người quy định tại khoản 1 Điều này bị Tòa án tuyên bố là đã chết thì thân nhân được hưởng trợ cấp quy định tại khoản 2 Điều này."}]},{"id":"luat-41_110","no":110,"code":"Điều 110","title":"Điều 110. Trợ cấp tuất một lần","shortTitle":"Trợ cấp tuất một lần","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người đang tham gia bảo hiểm xã hội tự nguyện hoặc đang bảo lưu thời gian đóng bảo hiểm xã hội hoặc đang hưởng lương hưu hoặc đang tạm dừng hưởng lương hưu khi chết thì thân nhân được hưởng trợ cấp tuất một lần."},{"k":"p","t":"2. Mức trợ cấp tuất một lần đối với thân nhân của người đang tham gia bảo hiểm xã hội tự nguyện hoặc đang bảo lưu thời gian đóng bảo hiểm xã hội được tính theo số năm đã đóng bảo hiểm xã hội, cứ mỗi năm tính như sau:"},{"k":"p","t":"a) Bằng 1,5 lần của mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội cho những năm đóng bảo hiểm xã hội trước năm 2014."},{"k":"p","t":"Trường hợp thời gian đóng bảo hiểm xã hội có cả trước và sau năm 2014 mà thời gian đóng trước năm 2014 có tháng lẻ thì những tháng lẻ đó được chuyển sang giai đoạn đóng bảo hiểm xã hội từ năm 2014 trở đi;"},{"k":"p","t":"b) Bằng 02 lần của mức bình quân thu nhập làm căn cứ đóng bảo hiểm xã hội cho các năm đóng bảo hiểm xã hội từ năm 2014 trở đi;"},{"k":"p","t":"c) Bằng số tiền đã đóng đối với trường hợp người lao động có thời gian đóng chưa đủ 60 tháng."},{"k":"p","t":"3. Trường hợp người có cả thời gian đóng bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện thì mức hưởng trợ cấp tuất một lần tối thiểu bằng 03 lần của mức bình quân tiền lương và thu nhập làm căn cứ đóng bảo hiểm xã hội."},{"k":"p","t":"4. Mức trợ cấp tuất một lần đối với thân nhân của người đang hưởng lương hưu hoặc đang tạm dừng hưởng lương hưu chết được tính theo thời gian đã hưởng lương hưu và được quy định như sau:"},{"k":"p","t":"a) Trường hợp chết trong 02 tháng đầu thì mức trợ cấp tuất một lần bằng 48 tháng lương hưu của tháng đang hưởng;"},{"k":"p","t":"b) Trường hợp chết từ tháng thứ ba trở đi thì cứ mỗi tháng mức trợ cấp tuất một lần giảm 0,5 tháng lương hưu so với mức trợ cấp quy định tại điểm a khoản này nhưng không thấp hơn 03 tháng lương hưu của tháng đang hưởng."}]},{"id":"luat-41_111","no":111,"code":"Điều 111","title":"Điều 111. Chế độ hưu trí và chế độ tử tuất đối với người vừa có thời gian đóng bảo hiểm xã hội bắt buộc vừa có thời gian đóng bảo hiểm xã hội tự nguyện","shortTitle":"Chế độ hưu trí và chế độ tử tuất đối với người vừa có thời gian đóng bảo hiểm xã hội bắt buộc vừa có thời gian đóng bảo hiểm xã hội tự nguyện","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Chế độ hưu trí và chế độ tử tuất đối với người vừa có thời gian đóng bảo hiểm xã hội bắt buộc vừa có thời gian đóng bảo hiểm xã hội tự nguyện được quy định như sau:"},{"k":"p","t":"a) Có từ đủ 15 năm đóng bảo hiểm xã hội bắt buộc trở lên nếu thuộc đối tượng quy định tại Điều 64 của Luật này, có từ đủ 20 năm đóng bảo hiểm xã hội bắt buộc trở lên nếu thuộc đối tượng quy định tại Điều 65 của Luật này thì điều kiện, mức hưởng lương hưu thực hiện theo chính sách bảo hiểm xã hội bắt buộc;"},{"k":"p","t":"b) Có từ đủ 15 năm đóng bảo hiểm xã hội bắt buộc trở lên thì được hưởng trợ cấp tuất hằng tháng theo chính sách bảo hiểm xã hội bắt buộc;"},{"k":"p","t":"c) Có từ đủ 12 tháng đóng bảo hiểm xã hội bắt buộc trở lên thì được hưởng trợ cấp mai táng theo chính sách bảo hiểm xã hội bắt buộc."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_112","no":112,"code":"Điều 112","title":"Điều 112. Hồ sơ đề nghị và giải quyết hưởng chế độ tử tuất","shortTitle":"Hồ sơ đề nghị và giải quyết hưởng chế độ tử tuất","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng chế độ tử tuất được quy định như sau:"},{"k":"p","t":"a) Hồ sơ đề nghị hưởng chế độ tử tuất đối với thân nhân của người đang tham gia bảo hiểm xã hội hoặc đang bảo lưu thời gian đóng bảo hiểm xã hội được thực hiện theo quy định tại các điểm a, b và c khoản 1 Điều 90 của Luật này;"},{"k":"p","t":"b) Hồ sơ đề nghị hưởng chế độ tử tuất đối với thân nhân của người đang hưởng hoặc đang tạm dừng hưởng lương hưu thực hiện theo quy định tại điểm a và điểm b khoản 2 Điều 90 của Luật này;"},{"k":"p","t":"c) Hồ sơ đối với trường hợp chỉ hưởng trợ cấp mai táng thực hiện theo quy định tại khoản 3 Điều 90 của Luật này."},{"k":"p","t":"2. Việc giải quyết hưởng chế độ tử tuất thực hiện như sau:"},{"k":"p","t":"a) Trong thời hạn 90 ngày kể từ ngày người đang bảo lưu thời gian đóng bảo hiểm xã hội, người tham gia bảo hiểm xã hội tự nguyện, người đang hưởng lương hưu hoặc đang tạm dừng hưởng lương hưu chết thì thân nhân nộp hồ sơ cho cơ quan bảo hiểm xã hội;"},{"k":"p","t":"b) Trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_113","no":113,"code":"Điều 113","title":"Điều 113. Giải quyết hưởng chế độ bảo hiểm xã hội tự nguyện chậm so với thời hạn quy định","shortTitle":"Giải quyết hưởng chế độ bảo hiểm xã hội tự nguyện chậm so với thời hạn quy định","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trường hợp nộp hồ sơ quá thời hạn quy định tại khoản 1 Điều 97, khoản 1 Điều 107, điểm a khoản 2 Điều 112 của Luật này thì phải giải trình bằng văn bản và gửi cho cơ quan bảo hiểm xã hội khi nộp hồ sơ."},{"k":"p","t":"2. Trường hợp nộp hồ sơ quá thời hạn quy định hoặc giải quyết hưởng chế độ bảo hiểm xã hội tự nguyện chậm so với thời hạn quy định, gây thiệt hại đến quyền, lợi ích hợp pháp của người thụ hưởng thì phải bồi thường theo quy định của pháp luật, trừ trường hợp do lỗi của người thụ hưởng chế độ bảo hiểm xã hội."}]},{"id":"luat-41_114","no":114,"code":"Điều 114","title":"Điều 114. Hình thức chi trả lương hưu và chế độ bảo hiểm xã hội tự nguyện","shortTitle":"Hình thức chi trả lương hưu và chế độ bảo hiểm xã hội tự nguyện","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thông qua tài khoản của người thụ hưởng mở tại ngân hàng thương mại, chi nhánh ngân hàng nước ngoài được thành lập và hoạt động tại Việt Nam."},{"k":"p","t":"2. Trực tiếp từ cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ được cơ quan bảo hiểm xã hội ủy quyền."}]},{"id":"luat-41_115","no":115,"code":"Điều 115","title":"Điều 115. Trợ cấp một lần đối với người đang hưởng lương hưu ra nước ngoài để định cư; chuyển nơi hưởng lương hưu; tạm dừng, chấm dứt, tiếp tục hưởng lương hưu","shortTitle":"Trợ cấp một lần đối với người đang hưởng lương hưu ra nước ngoài để định cư; chuyển nơi hưởng lương hưu; tạm dừng, chấm dứt, tiếp tục hưởng lương hưu","chuong":"Chương VI — BẢO HIỂM XÃ HỘI TỰ NGUYỆN","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm xã hội tự nguyện đang hưởng lương hưu ra nước ngoài để định cư nếu có nguyện vọng thì được giải quyết hưởng trợ cấp một lần và việc giải quyết hưởng trợ cấp một lần thực hiện như sau:"},{"k":"p","t":"a) Mức trợ cấp một lần đối với người đang hưởng lương hưu được tính theo thời gian đã đóng bảo hiểm xã hội trong đó mỗi năm đóng bảo hiểm xã hội trước năm 2014 được tính bằng 1,5 tháng lương hưu đang hưởng, mỗi năm đóng bảo hiểm xã hội từ năm 2014 trở đi được tính bằng 02 tháng lương hưu đang hưởng; sau đó mỗi tháng đã hưởng lương hưu thì mức trợ cấp một lần trừ 0,5 tháng lương hưu. Mức thấp nhất bằng 03 tháng lương hưu đang hưởng;"},{"k":"p","t":"b) Mức trợ cấp một lần đối với người đang hưởng trợ cấp bảo hiểm xã hội hằng tháng bằng 03 tháng trợ cấp đang hưởng;"},{"k":"p","t":"c) Hồ sơ đề nghị hưởng trợ cấp một lần bao gồm văn bản đề nghị hưởng trợ cấp một lần kèm theo bản sao giấy xác nhận của cơ quan có thẩm quyền về việc thôi quốc tịch Việt Nam hoặc bản dịch tiếng Việt được chứng thực hoặc công chứng một trong các giấy tờ quy định tại các điểm a, b, c và d khoản 2 Điều 106 của Luật này;"},{"k":"p","t":"d) Trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"2. Người đang hưởng lương hưu chuyển đến nơi ở khác trong nước và có nguyện vọng hưởng bảo hiểm xã hội ở nơi cư trú mới được thực hiện như sau:"},{"k":"p","t":"a) Người đang hưởng lương hưu có nguyện vọng thay đổi hình thức nhận hoặc thay đổi nơi nhận do chuyển nơi cư trú trong nước thì có văn bản gửi cơ quan bảo hiểm xã hội nơi đang chi trả;"},{"k":"p","t":"b) Trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản quy định tại điểm a khoản này, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"3. Việc tạm dừng, chấm dứt, tiếp tục hưởng lương hưu được thực hiện theo quy định tại các điều 75, 80 và 81 của Luật này."},{"k":"p","t":"HÌNH THÀNH VÀ SỬ DỤNG QUỸ BẢO HIỂM XÃ HỘI"}]},{"id":"luat-41_116","no":116,"code":"Điều 116","title":"Điều 116. Quỹ bảo hiểm xã hội","shortTitle":"Quỹ bảo hiểm xã hội","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm xã hội là quỹ tài chính độc lập với ngân sách nhà nước; được hạch toán, kế toán, lập báo cáo tài chính, kiểm toán nội bộ theo quy định của pháp luật về kế toán và các quy định khác của pháp luật có liên quan."},{"k":"p","t":"2. Định kỳ 03 năm, Kiểm toán nhà nước thực hiện kiểm toán quỹ bảo hiểm xã hội, hoạt động đầu tư quỹ và báo cáo kết quả với Quốc hội. Theo yêu cầu của Quốc hội, Ủy ban Thường vụ Quốc hội và Chính phủ, quỹ bảo hiểm xã hội được kiểm toán đột xuất."},{"k":"p","t":"Trường hợp tiến hành hoạt động thanh tra, hoạt động kiểm toán nhà nước về bảo hiểm xã hội, nếu phát hiện chồng chéo, trùng lặp, cơ quan thanh tra phối hợp với cơ quan kiểm toán nhà nước xử lý theo quy định của Luật Thanh tra và Luật Kiểm toán nhà nước, bảo đảm một nội dung hoạt động của tổ chức, cá nhân chỉ là đối tượng của một cơ quan thanh tra hoặc một cơ quan kiểm toán nhà nước; bảo đảm phòng ngừa, phát hiện và xử lý hành vi vi phạm pháp luật về bảo hiểm xã hội."}]},{"id":"luat-41_117","no":117,"code":"Điều 117","title":"Điều 117. Các nguồn hình thành quỹ bảo hiểm xã hội","shortTitle":"Các nguồn hình thành quỹ bảo hiểm xã hội","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động đóng theo quy định."},{"k":"p","t":"2. Người lao động đóng theo quy định."},{"k":"p","t":"3. Tiền sinh lời của hoạt động đầu tư quỹ."},{"k":"p","t":"4. Ngân sách nhà nước."},{"k":"p","t":"5. Các nguồn thu hợp pháp khác."}]},{"id":"luat-41_118","no":118,"code":"Điều 118","title":"Điều 118. Các quỹ thành phần của quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp","shortTitle":"Các quỹ thành phần của quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm xã hội bao gồm các quỹ thành phần sau đây:"},{"k":"p","t":"a) Quỹ ốm đau và thai sản;"},{"k":"p","t":"b) Quỹ hưu trí và tử tuất;"},{"k":"p","t":"c) Quỹ bảo hiểm tai nạn lao động - bệnh nghề nghiệp theo quy định của Luật An toàn, vệ sinh lao động."},{"k":"p","t":"2. Quỹ bảo hiểm thất nghiệp theo quy định của Luật Việc làm."}]},{"id":"luat-41_119","no":119,"code":"Điều 119","title":"Điều 119. Sử dụng quỹ bảo hiểm xã hội","shortTitle":"Sử dụng quỹ bảo hiểm xã hội","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Chi trả các chế độ bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện cho đối tượng theo quy định tại Chương V, Chương VI của Luật này và trợ cấp hằng tháng quy định tại Điều 23 của Luật này."},{"k":"p","t":"2. Chi đóng bảo hiểm y tế cho các đối tượng sau đây:"},{"k":"p","t":"a) Người đang hưởng lương hưu;"},{"k":"p","t":"b) Người nghỉ việc hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng;"},{"k":"p","t":"c) Người nghỉ việc hưởng chế độ thai sản từ 14 ngày làm việc trở lên trong tháng;"},{"k":"p","t":"d) Nghỉ việc hưởng trợ cấp ốm đau đối với người lao động bị mắc bệnh thuộc danh mục bệnh cần chữa trị dài ngày do Bộ trưởng Bộ Y tế ban hành;"},{"k":"p","t":"đ) Người lao động nghỉ việc hưởng chế độ ốm đau từ 14 ngày làm việc trở lên trong tháng."},{"k":"p","t":"3. Chi trả phí khám giám định mức suy giảm khả năng lao động đối với trường hợp không do người sử dụng lao động giới thiệu đi khám giám định mức suy giảm khả năng lao động mà kết quả giám định đủ điều kiện hưởng chế độ bảo hiểm xã hội."},{"k":"p","t":"4. Chi tổ chức và hoạt động bảo hiểm xã hội theo quy định tại Điều 120 của Luật này."},{"k":"p","t":"5. Đầu tư để bảo toàn và tăng trưởng quỹ theo quy định tại Mục 2 Chương này."}]},{"id":"luat-41_120","no":120,"code":"Điều 120","title":"Điều 120. Chi tổ chức và hoạt động bảo hiểm xã hội","shortTitle":"Chi tổ chức và hoạt động bảo hiểm xã hội","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Chi tổ chức và hoạt động bảo hiểm xã hội được sử dụng để thực hiện các nhiệm vụ sau đây:"},{"k":"p","t":"a) Tuyên truyền, phổ biến, giải đáp, tư vấn chính sách, pháp luật về bảo hiểm xã hội; tập huấn, bồi dưỡng chuyên môn, nghiệp vụ về bảo hiểm xã hội;"},{"k":"p","t":"b) Cải cách hành chính bảo hiểm xã hội; phát triển, quản lý người tham gia, người thụ hưởng chế độ bảo hiểm xã hội;"},{"k":"p","t":"c) Đầu tư, nâng cấp, cải tạo, mở rộng, bảo dưỡng, sửa chữa tài sản, thuê, mua sắm tài sản, hàng hóa, dịch vụ liên quan đến quản lý và hoạt động bảo hiểm xã hội;"},{"k":"p","t":"d) Tổ chức thu, chi trả bảo hiểm xã hội và hoạt động bộ máy của cơ quan bảo hiểm xã hội các cấp, Hội đồng quản lý bảo hiểm xã hội."},{"k":"p","t":"2. Mức chi tổ chức và hoạt động bảo hiểm xã hội được tính trên cơ sở số phần trăm của dự toán thu, chi bảo hiểm xã hội, không bao gồm số chi đóng bảo hiểm y tế cho người hưởng các chế độ bảo hiểm xã hội và được trích từ tiền sinh lời của hoạt động đầu tư quỹ bảo hiểm xã hội."},{"k":"p","t":"3. Định kỳ 03 năm, Chính phủ báo cáo Ủy ban Thường vụ Quốc hội quyết định về mức chi tổ chức và hoạt động bảo hiểm xã hội."},{"k":"p","t":"4. Kiểm toán nhà nước thực hiện kiểm toán hằng năm đối với báo cáo quyết toán chi tổ chức và hoạt động bảo hiểm xã hội."},{"k":"p","t":"5. Chính phủ quy định chi tiết khoản 1 và khoản 2 Điều này."},{"k":"p","t":"ĐẦU TƯ QUỸ BẢO HIỂM XÃ HỘI"}]},{"id":"luat-41_121","no":121,"code":"Điều 121","title":"Điều 121. Nguyên tắc đầu tư","shortTitle":"Nguyên tắc đầu tư","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hoạt động đầu tư quỹ bảo hiểm xã hội phải bảo đảm an toàn, bền vững và hiệu quả."},{"k":"p","t":"2. Đa dạng hóa danh mục đầu tư, cơ cấu và phương thức đầu tư phù hợp với năng lực và cơ sở vật chất của tổ chức đầu tư quỹ bảo hiểm xã hội; ưu tiên đầu tư vào trái phiếu Chính phủ, nhất là trái phiếu Chính phủ dài hạn."},{"k":"p","t":"3. Hoạt động đầu tư quỹ bảo hiểm xã hội thực hiện theo chiến lược đầu tư dài hạn và phương án đầu tư hằng năm."}]},{"id":"luat-41_122","no":122,"code":"Điều 122","title":"Điều 122. Danh mục đầu tư và phương thức đầu tư","shortTitle":"Danh mục đầu tư và phương thức đầu tư","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Danh mục đầu tư quỹ bảo hiểm xã hội tại thị trường trong nước bao gồm:"},{"k":"p","t":"a) Công cụ nợ của Chính phủ, bao gồm trái phiếu Chính phủ, tín phiếu Kho bạc Nhà nước, công trái xây dựng Tổ quốc;"},{"k":"p","t":"b) Trái phiếu chính quyền địa phương, trái phiếu được Chính phủ bảo lãnh;"},{"k":"p","t":"c) Tiền gửi tại các ngân hàng thương mại nhà nước và ngân hàng thương mại cổ phần có vốn nhà nước trên 50% vốn điều lệ; không thực hiện đầu tư quỹ bảo hiểm xã hội tại các ngân hàng thương mại đang được kiểm soát đặc biệt;"},{"k":"p","t":"d) Trái phiếu, chứng chỉ tiền gửi của các ngân hàng thương mại nhà nước và ngân hàng thương mại cổ phần có vốn nhà nước trên 50% vốn điều lệ; không thực hiện đầu tư quỹ bảo hiểm xã hội tại các ngân hàng thương mại đang được kiểm soát đặc biệt."},{"k":"p","t":"2. Đầu tư quỹ bảo hiểm xã hội tại thị trường quốc tế là trái phiếu Chính phủ."},{"k":"p","t":"3. Phương thức đầu tư quỹ bảo hiểm xã hội bao gồm tự đầu tư, ủy thác đầu tư tại thị trường trong nước, thị trường quốc tế."},{"k":"p","t":"4. Chính phủ quy định lộ trình đa dạng hóa, tiêu chí danh mục đầu tư, cơ cấu đầu tư và phương thức đầu tư quỹ bảo hiểm xã hội, bảo đảm nguyên tắc quy định tại Điều 121 của Luật này."}]},{"id":"luat-41_123","no":123,"code":"Điều 123","title":"Điều 123. Quản lý hoạt động đầu tư quỹ bảo hiểm xã hội","shortTitle":"Quản lý hoạt động đầu tư quỹ bảo hiểm xã hội","chuong":"Chương VII — QUỸ BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm xã hội được đầu tư và hạch toán độc lập theo từng quỹ thành phần."},{"k":"p","t":"2. Hoạt động đầu tư quỹ phải được kiểm soát, quản lý rủi ro và trích lập dự phòng rủi ro."},{"k":"p","t":"3. Chính phủ quy định quy trình kiểm soát, quản lý rủi ro đầu tư, trích lập và sử dụng dự phòng rủi ro."}]},{"id":"luat-41_124","no":124,"code":"Điều 124","title":"Điều 124. Đối tượng tham gia bảo hiểm hưu trí bổ sung","shortTitle":"Đối tượng tham gia bảo hiểm hưu trí bổ sung","chuong":"Chương VIII — BẢO HIỂM HƯU TRÍ BỔ SUNG","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng tham gia bảo hiểm hưu trí bổ sung là người sử dụng lao động và người lao động."}]},{"id":"luat-41_125","no":125,"code":"Điều 125","title":"Điều 125. Nguyên tắc bảo hiểm hưu trí bổ sung","shortTitle":"Nguyên tắc bảo hiểm hưu trí bổ sung","chuong":"Chương VIII — BẢO HIỂM HƯU TRÍ BỔ SUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Mức đóng bảo hiểm hưu trí bổ sung do người sử dụng lao động và người lao động tự nguyện thỏa thuận."},{"k":"p","t":"2. Khoản đóng góp vào quỹ bảo hiểm hưu trí bổ sung được quản lý theo từng tài khoản hưu trí cá nhân."},{"k":"p","t":"3. Hoạt động quản lý quỹ bảo hiểm hưu trí bổ sung thực hiện theo nguyên tắc công khai, minh bạch và phải bảo đảm đầu tư theo đúng quy định của pháp luật."},{"k":"p","t":"4. Mức chi trả bảo hiểm hưu trí bổ sung được xác định trên cơ sở số dư tài khoản hưu trí cá nhân tại thời điểm chi trả, được tích lũy thông qua hoạt động đầu tư quỹ bảo hiểm hưu trí bổ sung theo nguyên tắc thị trường."}]},{"id":"luat-41_126","no":126,"code":"Điều 126","title":"Điều 126. Quỹ bảo hiểm hưu trí bổ sung","shortTitle":"Quỹ bảo hiểm hưu trí bổ sung","chuong":"Chương VIII — BẢO HIỂM HƯU TRÍ BỔ SUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Quỹ bảo hiểm hưu trí bổ sung là quỹ tài chính độc lập với ngân sách nhà nước; được hạch toán, kế toán, lập báo cáo tài chính, kiểm toán theo quy định của pháp luật về kế toán và pháp luật về kiểm toán."},{"k":"p","t":"2. Nguồn hình thành quỹ bảo hiểm hưu trí bổ sung bao gồm đóng góp của người sử dụng lao động, người lao động và tiền sinh lời của hoạt động đầu tư của quỹ."},{"k":"p","t":"3. Quỹ bảo hiểm hưu trí bổ sung được sử dụng để chi trả chế độ hưu trí bổ sung cho người lao động, chi phí tổ chức và hoạt động quản lý."}]},{"id":"luat-41_127","no":127,"code":"Điều 127","title":"Điều 127. Chính sách của Nhà nước đối với bảo hiểm hưu trí bổ sung","shortTitle":"Chính sách của Nhà nước đối với bảo hiểm hưu trí bổ sung","chuong":"Chương VIII — BẢO HIỂM HƯU TRÍ BỔ SUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Khuyến khích phát triển bảo hiểm hưu trí bổ sung thông qua các chính sách ưu đãi theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Hoàn thiện pháp luật và chính sách về bảo hiểm hưu trí bổ sung, tổ chức thực hiện chính sách bảo hiểm hưu trí bổ sung chuyên nghiệp, hiện đại, minh bạch; tạo điều kiện cho người sử dụng lao động và người lao động có thêm sự lựa chọn tham gia đóng góp để được hưởng mức lương hưu cao hơn."},{"k":"p","t":"3. Chính phủ quy định về bảo hiểm hưu trí bổ sung."}]},{"id":"luat-41_128","no":128,"code":"Điều 128","title":"Điều 128. Quyền khiếu nại về bảo hiểm xã hội","shortTitle":"Quyền khiếu nại về bảo hiểm xã hội","chuong":"Chương IX — KHIẾU NẠI, TỐ CÁO VÀ XỬ LÝ VI PHẠM VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"Cá nhân, cơ quan, tổ chức có quyền đề nghị cơ quan, tổ chức, cá nhân có thẩm quyền xem xét lại quyết định, hành vi của cơ quan, tổ chức, cá nhân khi có căn cứ cho rằng quyết định, hành vi đó là trái pháp luật về bảo hiểm xã hội, xâm phạm đến quyền và lợi ích hợp pháp của mình."}]},{"id":"luat-41_129","no":129,"code":"Điều 129","title":"Điều 129. Khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm xã hội của cơ quan hành chính nhà nước, cơ quan bảo hiểm xã hội và người có thẩm quyền trong cơ quan hành chính nhà nước, cơ quan bảo hiểm xã hội","shortTitle":"Khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm xã hội của cơ quan hành chính nhà nước, cơ quan bảo hiểm xã hội và người có thẩm quyền trong cơ quan hành chính nhà nước, cơ quan bảo hiểm xã hội","chuong":"Chương IX — KHIẾU NẠI, TỐ CÁO VÀ XỬ LÝ VI PHẠM VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Việc khiếu nại và giải quyết khiếu nại đối với quyết định hành chính, hành vi hành chính về bảo hiểm xã hội của cơ quan hành chính nhà nước, người có thẩm quyền trong cơ quan hành chính nhà nước; việc khiếu nại và giải quyết khiếu nại đối với quyết định xử phạt vi phạm hành chính của cơ quan bảo hiểm xã hội, người có thẩm quyền trong cơ quan bảo hiểm xã hội được thực hiện theo quy định của pháp luật về khiếu nại, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Việc khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi trong hoạt động thanh tra về bảo hiểm xã hội được thực hiện theo quy định của pháp luật về thanh tra."}]},{"id":"luat-41_130","no":130,"code":"Điều 130","title":"Điều 130. Khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi về bảo hiểm xã hội","shortTitle":"Khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi về bảo hiểm xã hội","chuong":"Chương IX — KHIẾU NẠI, TỐ CÁO VÀ XỬ LÝ VI PHẠM VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Quyết định về bảo hiểm xã hội là văn bản do cơ quan bảo hiểm xã hội, người có thẩm quyền trong cơ quan bảo hiểm xã hội ban hành để thực hiện quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"2. Hành vi về bảo hiểm xã hội là hành vi của cơ quan bảo hiểm xã hội, người có thẩm quyền trong cơ quan bảo hiểm xã hội thực hiện hoặc không thực hiện trách nhiệm theo quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"3. Trình tự khiếu nại đối với quyết định, hành vi về bảo hiểm xã hội được thực hiện như sau, trừ trường hợp quy định tại khoản 5 Điều này:"},{"k":"p","t":"a) Khi có căn cứ cho rằng quyết định, hành vi về bảo hiểm xã hội là trái pháp luật, xâm phạm quyền, lợi ích hợp pháp của mình thì người khiếu nại khiếu nại lần đầu đến người đã ra quyết định hoặc cơ quan bảo hiểm xã hội nơi người có hành vi về bảo hiểm xã hội hoặc khởi kiện tại Tòa án theo quy định của pháp luật;"},{"k":"p","t":"b) Trường hợp người khiếu nại không đồng ý với quyết định giải quyết khiếu nại lần đầu hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khiếu nại lần hai đến Thủ trưởng cơ quan bảo hiểm xã hội cấp trên trực tiếp của người có thẩm quyền giải quyết khiếu nại lần đầu hoặc khởi kiện tại Tòa án theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người khiếu nại không đồng ý với quyết định giải quyết khiếu nại lần đầu của Thủ trưởng cơ quan Bảo hiểm xã hội Việt Nam hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khởi kiện tại Tòa án theo quy định của pháp luật;"},{"k":"p","t":"c) Trường hợp người khiếu nại không đồng ý với quyết định giải quyết khiếu nại lần hai hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khởi kiện tại Tòa án theo quy định của pháp luật."},{"k":"p","t":"4. Thẩm quyền giải quyết khiếu nại đối với quyết định, hành vi về bảo hiểm xã hội của cơ quan bảo hiểm xã hội được quy định như sau, trừ trường hợp quy định tại khoản 5 Điều này:"},{"k":"p","t":"a) Thủ trưởng cơ quan bảo hiểm xã hội có thẩm quyền giải quyết khiếu nại lần đầu đối với quyết định, hành vi về bảo hiểm xã hội của mình, của người có thẩm quyền do mình quản lý trực tiếp;"},{"k":"p","t":"b) Thủ trưởng cơ quan bảo hiểm xã hội cấp trên trực tiếp có thẩm quyền giải quyết khiếu nại lần hai đối với quyết định, hành vi về bảo hiểm xã hội đã được Thủ trưởng cơ quan bảo hiểm xã hội cấp dưới giải quyết lần đầu nhưng còn khiếu nại hoặc khiếu nại lần đầu đã hết thời hạn nhưng chưa được giải quyết."},{"k":"p","t":"5. Việc giải quyết khiếu nại đối với quyết định, hành vi có liên quan đến việc thụ hưởng các chế độ bảo hiểm xã hội hoặc tính thời gian công tác trong khu vực nhà nước để hưởng bảo hiểm xã hội trước ngày 01 tháng 01 năm 1995 mà không đủ hồ sơ gốc, không còn hồ sơ gốc hoặc không còn cơ quan, đơn vị trực tiếp quản lý người lao động được thực hiện như sau:"},{"k":"p","t":"a) Thủ trưởng cơ quan bảo hiểm xã hội cấp tỉnh giải quyết khiếu nại lần đầu;"},{"k":"p","t":"b) Trường hợp người khiếu nại không đồng ý với việc giải quyết khiếu nại lần đầu của Thủ trưởng cơ quan bảo hiểm xã hội cấp tỉnh hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khiếu nại đến Chủ tịch Ủy ban nhân dân cấp tỉnh hoặc khởi kiện tại Tòa án theo quy định của pháp luật;"},{"k":"p","t":"c) Trường hợp người khiếu nại không đồng ý với việc giải quyết khiếu nại lần hai của Chủ tịch Ủy ban nhân dân cấp tỉnh hoặc hết thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khởi kiện tại Tòa án theo quy định của pháp luật."},{"k":"p","t":"6. Thời hiệu khiếu nại, trình tự, thủ tục giải quyết khiếu nại về bảo hiểm xã hội được thực hiện theo quy định của pháp luật về khiếu nại."},{"k":"p","t":"7. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_131","no":131,"code":"Điều 131","title":"Điều 131. Tố cáo, giải quyết tố cáo về bảo hiểm xã hội","shortTitle":"Tố cáo, giải quyết tố cáo về bảo hiểm xã hội","chuong":"Chương IX — KHIẾU NẠI, TỐ CÁO VÀ XỬ LÝ VI PHẠM VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Việc tố cáo, giải quyết tố cáo đối với hành vi vi phạm pháp luật trong việc thực hiện nhiệm vụ, công vụ về bảo hiểm xã hội và hành vi vi phạm pháp luật về quản lý nhà nước trong lĩnh vực bảo hiểm xã hội được thực hiện theo quy định của pháp luật về tố cáo."},{"k":"p","t":"2. Cơ quan bảo hiểm xã hội có trách nhiệm giải quyết tố cáo đối với hành vi vi phạm pháp luật trong việc chấp hành quy định của pháp luật về bảo hiểm xã hội, trừ trường hợp quy định tại khoản 3 Điều này."},{"k":"p","t":"3. Chủ tịch Ủy ban nhân dân cấp tỉnh có trách nhiệm giải quyết tố cáo đối với hành vi vi phạm pháp luật của cơ quan, tổ chức, cá nhân trong việc chấp hành quy định của pháp luật về bảo hiểm xã hội trước năm 1995."},{"k":"p","t":"4. Trình tự, thủ tục tố cáo, giải quyết tố cáo về hành vi vi phạm pháp luật quy định tại khoản 2 và khoản 3 Điều này được thực hiện theo quy định của pháp luật về tố cáo."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_132","no":132,"code":"Điều 132","title":"Điều 132. Xử lý vi phạm pháp luật về bảo hiểm xã hội","shortTitle":"Xử lý vi phạm pháp luật về bảo hiểm xã hội","chuong":"Chương IX — KHIẾU NẠI, TỐ CÁO VÀ XỬ LÝ VI PHẠM VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan, tổ chức có hành vi vi phạm quy định của Luật này, tùy theo tính chất, mức độ vi phạm mà bị xử phạt vi phạm hành chính hoặc bị truy cứu trách nhiệm hình sự; nếu gây thiệt hại thì phải bồi thường theo quy định của pháp luật."},{"k":"p","t":"2. Cá nhân có hành vi vi phạm quy định của Luật này, tùy theo tính chất, mức độ vi phạm mà bị xử phạt vi phạm hành chính, xử lý kỷ luật hoặc bị truy cứu trách nhiệm hình sự; nếu gây thiệt hại thì phải bồi thường theo quy định của pháp luật."}]},{"id":"luat-41_133","no":133,"code":"Điều 133","title":"Điều 133. Nội dung quản lý nhà nước về bảo hiểm xã hội","shortTitle":"Nội dung quản lý nhà nước về bảo hiểm xã hội","chuong":"Chương X — QUẢN LÝ NHÀ NƯỚC VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Ban hành, trình cấp có thẩm quyền ban hành và tổ chức thực hiện chiến lược, chính sách, pháp luật về bảo hiểm xã hội."},{"k":"p","t":"2. Tuyên truyền, phổ biến, giáo dục pháp luật về bảo hiểm xã hội."},{"k":"p","t":"3. Thực hiện công tác thống kê nhà nước về bảo hiểm xã hội."},{"k":"p","t":"4. Đào tạo, bồi dưỡng và phát triển nguồn nhân lực về bảo hiểm xã hội."},{"k":"p","t":"5. Tổ chức bộ máy thực hiện bảo hiểm xã hội."},{"k":"p","t":"6. Cơ chế tài chính, tài chính quỹ bảo hiểm xã hội."},{"k":"p","t":"7. Kiểm tra, thanh tra, giải quyết khiếu nại, tố cáo và xử lý vi phạm pháp luật về bảo hiểm xã hội."},{"k":"p","t":"8. Sơ kết, tổng kết, khen thưởng về bảo hiểm xã hội."},{"k":"p","t":"9. Hợp tác quốc tế về bảo hiểm xã hội."}]},{"id":"luat-41_134","no":134,"code":"Điều 134","title":"Điều 134. Trách nhiệm quản lý nhà nước về bảo hiểm xã hội","shortTitle":"Trách nhiệm quản lý nhà nước về bảo hiểm xã hội","chuong":"Chương X — QUẢN LÝ NHÀ NƯỚC VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Chính phủ thống nhất quản lý nhà nước về bảo hiểm xã hội."},{"k":"p","t":"2. Bộ Lao động - Thương binh và Xã hội là cơ quan đầu mối giúp Chính phủ thực hiện quản lý nhà nước về bảo hiểm xã hội, Bộ Tài chính là cơ quan giúp Chính phủ thực hiện quản lý nhà nước về tài chính bảo hiểm xã hội, tài chính quỹ bảo hiểm xã hội."},{"k":"p","t":"3. Bộ, cơ quan ngang Bộ, trong phạm vi nhiệm vụ, quyền hạn của mình, có trách nhiệm thực hiện và phối hợp với Bộ Lao động - Thương binh và Xã hội, Bộ Tài chính trong thực hiện quản lý nhà nước về bảo hiểm xã hội."},{"k":"p","t":"4. Ủy ban nhân dân các cấp thực hiện quản lý nhà nước về bảo hiểm xã hội tại địa phương."},{"k":"p","t":"5. Bảo hiểm xã hội Việt Nam tham gia, phối hợp với Bộ Lao động - Thương binh và Xã hội, Bộ Tài chính, Ủy ban nhân dân cấp tỉnh trong thực hiện quản lý nhà nước về bảo hiểm xã hội."}]},{"id":"luat-41_135","no":135,"code":"Điều 135","title":"Điều 135. Trách nhiệm của Chính phủ","shortTitle":"Trách nhiệm của Chính phủ","chuong":"Chương X — QUẢN LÝ NHÀ NƯỚC VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Thống nhất quản lý, chỉ đạo, bảo đảm sự phối hợp chặt chẽ giữa cơ quan quản lý nhà nước, cơ quan tổ chức thực hiện và các cơ quan có liên quan trong thực hiện bảo hiểm xã hội."},{"k":"p","t":"2. Quy định việc lập quyết toán và phân công cơ quan quản lý nhà nước thực hiện việc duyệt, thẩm định, phê chuẩn quyết toán chi tổ chức và hoạt động bảo hiểm xã hội; quy định việc quyết toán thu, chi quỹ bảo hiểm xã hội, quỹ bảo hiểm y tế, quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"3. Thực hiện cải cách hành chính về bảo hiểm xã hội để bảo đảm thuận tiện, có lợi hơn cho người tham gia và người thụ hưởng chế độ bảo hiểm xã hội."},{"k":"p","t":"4. Quyết định hoặc trình cấp có thẩm quyền quyết định biện pháp xử lý, biện pháp hỗ trợ trong trường hợp cần thiết để bảo vệ quyền, lợi ích chính đáng về bảo hiểm xã hội của người lao động, người sử dụng lao động."},{"k":"p","t":"5. Định kỳ hằng năm, báo cáo Quốc hội tình hình thực hiện chính sách, chế độ bảo hiểm xã hội, tình hình quản lý và sử dụng quỹ bảo hiểm xã hội. Định kỳ 05 năm, báo cáo Quốc hội về việc đánh giá, dự báo khả năng cân đối của quỹ hưu trí và tử tuất."}]},{"id":"luat-41_136","no":136,"code":"Điều 136","title":"Điều 136. Trách nhiệm của Bộ Lao động - Thương binh và Xã hội","shortTitle":"Trách nhiệm của Bộ Lao động - Thương binh và Xã hội","chuong":"Chương X — QUẢN LÝ NHÀ NƯỚC VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Xây dựng, trình cấp có thẩm quyền ban hành hoặc ban hành theo thẩm quyền chính sách, pháp luật về trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, chiến lược, kế hoạch phát triển bảo hiểm xã hội. Ban hành Bộ chỉ số đánh giá mức độ hài lòng của tổ chức, cá nhân đối với việc thực hiện chính sách bảo hiểm xã hội, bảo hiểm thất nghiệp."},{"k":"p","t":"2. Chủ trì phối hợp với Bảo hiểm xã hội Việt Nam và các cơ quan, tổ chức có liên quan xây dựng và trình Chính phủ ban hành chỉ tiêu phát triển đối tượng tham gia bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện."},{"k":"p","t":"3. Tuyên truyền, phổ biến, giáo dục pháp luật về trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện."},{"k":"p","t":"4. Chỉ đạo, hướng dẫn tổ chức thực hiện chính sách, pháp luật về trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện."},{"k":"p","t":"5. Kiểm tra, thanh tra, xử lý vi phạm pháp luật, giải quyết khiếu nại, tố cáo về trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, trừ quy định tại khoản 2 Điều 137 của Luật này."},{"k":"p","t":"6. Chủ trì phối hợp với Bộ, cơ quan ngang Bộ, Bảo hiểm xã hội Việt Nam trình Chính phủ quyết định biện pháp xử lý trong trường hợp cần thiết để bảo vệ quyền, lợi ích chính đáng về bảo hiểm xã hội của người lao động."},{"k":"p","t":"7. Chủ trì phối hợp thực hiện công tác thống kê, thông tin về bảo hiểm xã hội."},{"k":"p","t":"8. Tổ chức đào tạo, bồi dưỡng, tập huấn về bảo hiểm xã hội."},{"k":"p","t":"9. Tổ chức nghiên cứu khoa học và hợp tác quốc tế về bảo hiểm xã hội."},{"k":"p","t":"10. Chủ trì, phối hợp với Bộ Tài chính xây dựng báo cáo của Chính phủ quy định tại khoản 5 Điều 135 của Luật này."},{"k":"p","t":"11. Trình Chính phủ quy định chức năng, nhiệm vụ, quyền hạn và cơ cấu tổ chức của cơ quan bảo hiểm xã hội theo quy định tại khoản 2 Điều 16 của Luật này."}]},{"id":"luat-41_137","no":137,"code":"Điều 137","title":"Điều 137. Trách nhiệm của Bộ Tài chính","shortTitle":"Trách nhiệm của Bộ Tài chính","chuong":"Chương X — QUẢN LÝ NHÀ NƯỚC VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Xây dựng, trình cấp có thẩm quyền ban hành hoặc ban hành theo thẩm quyền cơ chế tài chính về bảo hiểm xã hội; quy định về chi tổ chức và hoạt động bảo hiểm xã hội quy định tại Điều 120 của Luật này."},{"k":"p","t":"2. Kiểm tra, thanh tra, xử lý vi phạm pháp luật và giải quyết khiếu nại, tố cáo về quản lý tài chính bảo hiểm xã hội."},{"k":"p","t":"3. Chủ trì xây dựng nội dung về tình hình quản lý và sử dụng quỹ bảo hiểm xã hội gửi Bộ Lao động - Thương binh và Xã hội để tổng hợp, xây dựng báo cáo của Chính phủ quy định tại khoản 5 Điều 135 của Luật này."},{"k":"p","t":"4. Chủ trì xây dựng báo cáo của Chính phủ quy định tại khoản 3 Điều 120 của Luật này."},{"k":"p","t":"5. Trình Chính phủ quy định về hoạt động đầu tư quỹ bảo hiểm xã hội; hạch toán, phân bổ các quỹ thành phần của quỹ bảo hiểm xã hội."},{"k":"p","t":"6. Xây dựng, trình cấp có thẩm quyền ban hành hoặc ban hành theo thẩm quyền chính sách, pháp luật về bảo hiểm hưu trí bổ sung; chỉ đạo, hướng dẫn tổ chức triển khai thực hiện chính sách, pháp luật về bảo hiểm hưu trí bổ sung; theo dõi, đánh giá, thanh tra, kiểm tra tình hình thực hiện bảo hiểm hưu trí bổ sung; xử lý vi phạm pháp luật và giải quyết khiếu nại, tố cáo về bảo hiểm hưu trí bổ sung; thực hiện công tác thống kê, thông tin về bảo hiểm hưu trí bổ sung."}]},{"id":"luat-41_138","no":138,"code":"Điều 138","title":"Điều 138. Trách nhiệm của Ủy ban nhân dân các cấp","shortTitle":"Trách nhiệm của Ủy ban nhân dân các cấp","chuong":"Chương X — QUẢN LÝ NHÀ NƯỚC VỀ BẢO HIỂM XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Ủy ban nhân dân cấp tỉnh chịu trách nhiệm trước Hội đồng nhân dân cùng cấp trong việc chỉ đạo, tổ chức thực hiện chính sách bảo hiểm xã hội, phát triển đối tượng tham gia bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện và chậm đóng bảo hiểm xã hội bắt buộc, trốn đóng bảo hiểm xã hội bắt buộc trong phạm vi địa phương."},{"k":"p","t":"2. Ủy ban nhân dân các cấp thực hiện quản lý nhà nước về bảo hiểm xã hội trong phạm vi địa phương theo phân cấp của Chính phủ và có trách nhiệm sau đây:"},{"k":"p","t":"a) Chỉ đạo, tổ chức thực hiện chính sách, pháp luật về bảo hiểm xã hội;"},{"k":"p","t":"b) Xây dựng chỉ tiêu phát triển đối tượng tham gia bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện trong kế hoạch phát triển kinh tế - xã hội hằng năm trình cơ quan có thẩm quyền quyết định;"},{"k":"p","t":"c) Tổ chức tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm xã hội;"},{"k":"p","t":"d) Kiểm tra, thanh tra, xử phạt vi phạm hành chính và giải quyết khiếu nại, tố cáo về bảo hiểm xã hội;"},{"k":"p","t":"đ) Kiến nghị với cơ quan nhà nước có thẩm quyền sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm xã hội."}]},{"id":"luat-41_139","no":139,"code":"Điều 139","title":"Điều 139. Sửa đổi, bổ sung một số luật có liên quan đến bảo hiểm xã hội","shortTitle":"Sửa đổi, bổ sung một số luật có liên quan đến bảo hiểm xã hội","chuong":"Chương XI — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung một số điều của Luật An toàn, vệ sinh lao động số 84/2015/QH13 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung khoản 7 Điều 42 như sau:"},{"k":"p","t":"“7. Chi tổ chức và hoạt động bảo hiểm tai nạn lao động, bệnh nghề nghiệp thực hiện theo quy định của Luật Bảo hiểm xã hội.”;"},{"k":"p","t":"b) Sửa đổi, bổ sung khoản 1 Điều 43 như sau:"},{"k":"p","t":"“1. Đối tượng áp dụng chế độ bảo hiểm tai nạn lao động, bệnh nghề nghiệp theo quy định tại Mục này là người lao động tham gia bảo hiểm xã hội bắt buộc theo quy định tại các điểm a, b, c, d, đ, e, i và l khoản 1 Điều 2 và người sử dụng lao động quy định tại khoản 3 Điều 2 của Luật Bảo hiểm xã hội.”;"},{"k":"p","t":"c) Sửa đổi, bổ sung điểm b khoản 2 Điều 44 như sau:"},{"k":"p","t":"“b) Tiền sinh lời của hoạt động đầu tư từ quỹ theo quy định tại Điều 120 và Điều 121 của Luật Bảo hiểm xã hội;”;"},{"k":"p","t":"d) Sửa đổi, bổ sung khoản 3 Điều 49 như sau:"},{"k":"p","t":"“3. Việc tạm dừng, hưởng tiếp trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng, trợ cấp phục vụ thực hiện theo quy định tại Điều 75 của Luật Bảo hiểm xã hội; hồ sơ, trình tự giải quyết hưởng tiếp trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng thực hiện theo quy định tại Điều 80 và Điều 81 của Luật Bảo hiểm xã hội.”;"},{"k":"p","t":"đ) Sửa đổi, bổ sung khoản 5 Điều 49 như sau:"},{"k":"p","t":"“5. Người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng khi ra nước ngoài để định cư được giải quyết hưởng trợ cấp một lần; mức trợ cấp một lần bằng 03 tháng mức trợ cấp đang hưởng. Hồ sơ, trình tự giải quyết trợ cấp một lần thực hiện theo quy định của Luật Bảo hiểm xã hội.”;"},{"k":"p","t":"e) Sửa đổi, bổ sung khoản 3 Điều 53 như sau:"},{"k":"p","t":"“3. Người lao động bị chết trong thời gian điều trị thương tật, bệnh tật mà chưa được giám định mức suy giảm khả năng lao động."},{"k":"p","t":"Hồ sơ hưởng chế độ tử tuất trong trường hợp người lao động bị chết do tai nạn lao động, bệnh nghề nghiệp thực hiện theo quy định tại khoản 1 Điều 90 của Luật Bảo hiểm xã hội.”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm e khoản 3 Điều 57 của Luật Việc làm số 38/2013/QH13 như sau:"},{"k":"p","t":"“e) Chi tổ chức và hoạt động bảo hiểm thất nghiệp thực hiện theo quy định của Luật Bảo hiểm xã hội;”."},{"k":"p","t":"3. Bãi bỏ khoản 2 Điều 17 của Luật Người cao tuổi số 39/2009/QH12."}]},{"id":"luat-41_140","no":140,"code":"Điều 140","title":"Điều 140. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương XI — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025."},{"k":"p","t":"2. Luật Bảo hiểm xã hội số 58/2014/QH13 đã được sửa đổi, bổ sung một số điều theo Luật số 84/2015/QH13, Luật số 35/2018/QH14, Bộ luật số 45/2019/QH14 (sau đây gọi chung là Luật số 58/2014/QH13) và Nghị quyết số 93/2015/QH13 ngày 22 tháng 6 năm 2015 của Quốc hội về việc thực hiện chính sách hưởng bảo hiểm xã hội một lần đối với người lao động hết hiệu lực thi hành kể từ ngày Luật này có hiệu lực thi hành."}]},{"id":"luat-41_141","no":141,"code":"Điều 141","title":"Điều 141. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"Chương XI — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Người đang hưởng trợ cấp mất sức lao động, trợ cấp tai nạn lao động, bệnh nghề nghiệp, trợ cấp tuất hằng tháng, trợ cấp hằng tháng đối với cán bộ xã, phường, thị trấn đã nghỉ việc, trợ cấp hằng tháng đối với công nhân cao su và người đang hưởng trợ cấp hằng tháng sau khi đã hết thời hạn hưởng trợ cấp mất sức lao động được điều chỉnh mức hưởng theo quy định của Chính phủ."},{"k":"p","t":"2. Người bị đình chỉ, tạm dừng hưởng bảo hiểm xã hội do chấp hành hình phạt tù nhưng không được hưởng án treo trước ngày 01 tháng 01 năm 2016 thì thực hiện theo quy định của pháp luật về bảo hiểm xã hội tại thời điểm bị đình chỉ, tạm dừng."},{"k":"p","t":"3. Người lao động đã có thời gian công tác và tham gia bảo hiểm xã hội trước ngày 01 tháng 01 năm 1995 tại nơi có phụ cấp khu vực, người lao động đã có thời gian đóng bảo hiểm xã hội bao gồm phụ cấp khu vực trước ngày 01 tháng 01 năm 2007 thì được hưởng trợ cấp khu vực một lần khi giải quyết hưởng lương hưu hoặc hưởng bảo hiểm xã hội một lần hoặc hưởng chế độ tử tuất."},{"k":"p","t":"4. Người đang hưởng lương hưu, trợ cấp mất sức lao động, trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng mà đồng thời đang hưởng phụ cấp khu vực hằng tháng tại nơi thường trú có phụ cấp khu vực thì được tiếp tục hưởng phụ cấp khu vực theo mức đang hưởng. Khi thay đổi nơi thường trú thì việc xác định hưởng phụ cấp khu vực thực hiện theo quy định của Chính phủ."},{"k":"p","t":"5. Kể từ ngày Luật này có hiệu lực thi hành mà người lao động đang nghỉ việc hưởng chế độ ốm đau do mắc bệnh thuộc danh mục bệnh cần chữa trị dài ngày do Bộ trưởng Bộ Y tế ban hành hoặc đang nghỉ việc hưởng chế độ thai sản theo quy định của Luật số 58/2014/QH13 thì tiếp tục thực hiện đến hết thời hạn đã được giải quyết."},{"k":"p","t":"6. Người đang hưởng trợ cấp mất sức lao động, đang hưởng trợ cấp hằng tháng sau khi đã hết thời hạn hưởng trợ cấp mất sức lao động, đang hưởng trợ cấp hằng tháng đối với công nhân cao su, đang hưởng trợ cấp hằng tháng đối với cán bộ xã, phường, thị trấn đã nghỉ việc khi chết thì thân nhân được giải quyết chế độ tử tuất theo quy định của Chính phủ."},{"k":"p","t":"7. Người lao động có thời gian làm việc trong khu vực nhà nước trước ngày 01 tháng 01 năm 1995 thì thời gian này được tính để hưởng bảo hiểm xã hội theo quy định của Chính phủ."},{"k":"p","t":"8. Hằng năm, Nhà nước chuyển từ ngân sách một khoản kinh phí vào quỹ bảo hiểm xã hội để bảo đảm trả đủ lương hưu, trợ cấp bảo hiểm xã hội đối với người hưởng lương hưu, trợ cấp bảo hiểm xã hội trước ngày 01 tháng 01 năm 1995."},{"k":"p","t":"9. Người tham gia bảo hiểm xã hội tự nguyện trước ngày 01 tháng 01 năm 2021 và đủ 20 năm đóng bảo hiểm xã hội tự nguyện trở lên thì được hưởng lương hưu khi đủ 60 tuổi đối với nam, đủ 55 tuổi đối với nữ, trừ trường hợp người lao động có nguyện vọng hưởng lương hưu theo quy định tại Điều 98 của Luật này."},{"k":"p","t":"10. Người lao động có từ đủ 15 năm đóng bảo hiểm xã hội trở lên và có văn bản của cơ quan bảo hiểm xã hội xác nhận về việc chờ đủ điều kiện về tuổi đời để hưởng lương hưu được quy định tại Nghị định số 12/CP ngày 26 tháng 01 năm 1995 được sửa đổi, bổ sung một số điều theo Nghị định số 01/2003/NĐ-CP ngày 09 tháng 01 năm 2003 của Chính phủ thì được hưởng lương hưu khi nam đủ 60 tuổi, nữ đủ 55 tuổi."},{"k":"p","t":"Cán bộ xã thuộc đối tượng điều chỉnh của Nghị định số 09/1998/NĐ-CP ngày 23 tháng 01 năm 1998 của Chính phủ đã có quyết định hoặc giấy chứng nhận chờ đủ điều kiện về tuổi đời để hưởng trợ cấp hằng tháng của cơ quan bảo hiểm xã hội thì được hưởng trợ cấp hằng tháng khi nam đủ 55 tuổi, nữ đủ 50 tuổi."},{"k":"p","t":"11. Đối tượng quy định tại điểm a, b, c, d, đ, g và i khoản 1 Điều 2 của Luật này đã tham gia bảo hiểm xã hội trước ngày Luật này có hiệu lực thi hành mà có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 20 năm trở lên thì mức lương hưu hằng tháng thấp nhất bằng mức tham chiếu."},{"k":"p","t":"12. Đối với số tiền bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp mà người sử dụng lao động có trách nhiệm đóng theo quy định của Luật số 58/2014/QH13, Luật Việc làm số 38/2013/QH13 nhưng đến hết ngày 30 tháng 6 năm 2025 mà không đóng hoặc không đóng đầy đủ thì được xử lý theo quy định về chậm đóng, trốn đóng của Luật này."},{"k":"p","t":"13. Khi chưa bãi bỏ mức lương cơ sở thì mức tham chiếu quy định tại Luật này bằng mức lương cơ sở. Tại thời điểm mức lương cơ sở bị bãi bỏ thì mức tham chiếu không thấp hơn mức lương cơ sở đó."},{"k":"p","t":"14. Văn bản ủy quyền cho người khác nhận lương hưu, trợ cấp bảo hiểm xã hội và chế độ khác theo quy định của Luật số 58/2014/QH13 được tiếp tục thực hiện đến hết ngày 30 tháng 6 năm 2026."},{"k":"p","t":"15. Chính phủ quy định chi tiết Điều này."},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XV, kỳ họp thứ 7 thông qua ngày 29 tháng 6 năm 2024."},{"k":"tbl","rows":[["","CHỦ TỊCH QUỐC HỘI\n(Đã ký)\nTrần Thanh Mẫn"]]}]}],"refs":{},"details":{},"summaries":{"luat-41_1":{"tldr":"Luật này quy định về quyền, trách nhiệm của cơ quan, tổ chức, cá nhân đối với bảo hiểm xã hội và tổ chức thực hiện bảo hiểm xã hội.","points":["Phạm vi gồm: trợ cấp hưu trí xã hội; đăng ký tham gia và quản lý thu, đóng bảo hiểm xã hội.","Bao gồm các chế độ, chính sách bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện; quỹ bảo hiểm xã hội; bảo hiểm hưu trí bổ sung.","Bao gồm khiếu nại, tố cáo và xử lý vi phạm về bảo hiểm xã hội; quản lý nhà nước về bảo hiểm xã hội."]},"luat-41_2":{"tldr":"Quy định đối tượng tham gia bảo hiểm xã hội bắt buộc (người lao động Việt Nam, người lao động nước ngoài, người sử dụng lao động) và bảo hiểm xã hội tự nguyện, cùng cách xử lý khi đồng thời thuộc nhiều đối tượng và các trường hợp không thuộc đối tượng tham gia bắt buộc.","points":["Người lao động Việt Nam tham gia BHXH bắt buộc gồm: người làm việc theo HĐLĐ không xác định thời hạn hoặc xác định thời hạn từ đủ 01 tháng trở lên; cán bộ, công chức, viên chức; lực lượng quân đội, công an, cơ yếu; dân quân thường trực; người đi làm việc ở nước ngoài theo hợp đồng; người quản lý doanh nghiệp, hợp tác xã có/không hưởng tiền lương; người hoạt động không chuyên trách cấp xã, thôn, tổ dân phố; chủ hộ kinh doanh có đăng ký kinh doanh; người làm không trọn thời gian có tiền lương bằng hoặc cao hơn mức thấp nhất.","Người lao động nước ngoài tham gia BHXH bắt buộc khi làm việc theo HĐLĐ xác định thời hạn từ đủ 12 tháng trở lên, trừ: di chuyển nội bộ doanh nghiệp; tại thời điểm giao kết HĐLĐ đã đủ tuổi nghỉ hưu theo khoản 2 Điều 169 Bộ luật Lao động; điều ước quốc tế có quy định khác.","Đối tượng tham gia BHXH tự nguyện gồm: công dân Việt Nam từ đủ 15 tuổi trở lên không thuộc diện bắt buộc và không đang hưởng lương hưu, trợ cấp BHXH, trợ cấp hằng tháng; người đang tạm hoãn HĐLĐ, hợp đồng làm việc (trừ khi hai bên thỏa thuận đóng bắt buộc).","Người đồng thời thuộc nhiều đối tượng bắt buộc thì tham gia theo quy tắc thứ tự/đối tượng tương ứng quy định tại khoản 5 (ví dụ giao kết với nhiều người sử dụng lao động thì theo HĐLĐ giao kết đầu tiên).","Ủy ban Thường vụ Quốc hội quyết định việc tham gia BHXH bắt buộc với đối tượng khác có việc làm, thu nhập ổn định, thường xuyên trên cơ sở đề xuất của Chính phủ.","Không thuộc đối tượng tham gia BHXH bắt buộc: người đang hưởng lương hưu, trợ cấp BHXH, trợ cấp hằng tháng; lao động giúp việc gia đình; chủ hộ kinh doanh và người quản lý hợp tác xã không hưởng lương đã đủ tuổi nghỉ hưu (trừ trường hợp còn thiếu tối đa 06 tháng theo khoản 7 Điều 33)."]},"luat-41_3":{"tldr":"Giải thích các từ ngữ dùng trong Luật, gồm bảo hiểm xã hội, trợ cấp hưu trí xã hội, BHXH bắt buộc, BHXH tự nguyện, bảo hiểm hưu trí bổ sung và các khái niệm liên quan.","points":["Bảo hiểm xã hội là sự bảo đảm thay thế hoặc bù đắp một phần thu nhập khi bị giảm/mất thu nhập do ốm đau, thai sản, tai nạn lao động, bệnh nghề nghiệp, nghỉ hưu hoặc chết.","BHXH bắt buộc do Nhà nước tổ chức mà người lao động, người sử dụng lao động thuộc đối tượng phải tham gia; BHXH tự nguyện do công dân Việt Nam tự nguyện tham gia, được lựa chọn mức đóng, phương thức đóng.","Thời gian đóng BHXH là tổng thời gian đã đóng BHXH bắt buộc và tự nguyện, trừ trường hợp điều ước quốc tế có quy định khác.","Thân nhân gồm con đẻ, con nuôi, vợ/chồng, cha mẹ đẻ, cha mẹ nuôi, cha mẹ vợ/chồng hoặc thành viên khác trong gia đình mà người tham gia đang có nghĩa vụ nuôi dưỡng.","Bản sao giấy tờ dùng để thực hiện BHXH là giấy tờ được cấp từ sổ gốc, được chứng thực từ bản chính hoặc trường hợp khác do Chính phủ quy định."]},"luat-41_4":{"tldr":"Quy định các loại hình và chế độ bảo hiểm xã hội: trợ cấp hưu trí xã hội, BHXH bắt buộc, BHXH tự nguyện, bảo hiểm thất nghiệp và bảo hiểm hưu trí bổ sung.","points":["Trợ cấp hưu trí xã hội có các chế độ: trợ cấp hưu trí xã hội hằng tháng; hỗ trợ chi phí mai táng; hưởng bảo hiểm y tế do ngân sách nhà nước đóng.","BHXH bắt buộc có các chế độ: ốm đau; thai sản; hưu trí; tử tuất; bảo hiểm tai nạn lao động, bệnh nghề nghiệp theo Luật An toàn, vệ sinh lao động.","BHXH tự nguyện có các chế độ: trợ cấp thai sản; hưu trí; tử tuất; bảo hiểm tai nạn lao động theo Luật An toàn, vệ sinh lao động.","Bảo hiểm thất nghiệp theo quy định của Luật Việc làm.","Bảo hiểm hưu trí bổ sung."]},"luat-41_5":{"tldr":"Quy định các nguyên tắc của bảo hiểm xã hội về mức hưởng, mức đóng, cách tính thời gian đóng và việc quản lý quỹ.","points":["Mức hưởng BHXH bắt buộc và tự nguyện được tính trên cơ sở mức đóng và thời gian đóng; có chia sẻ giữa những người tham gia.","Mức đóng BHXH bắt buộc tính trên tiền lương làm căn cứ đóng; mức đóng BHXH tự nguyện tính trên thu nhập làm căn cứ đóng do người tham gia lựa chọn.","Người có cả thời gian đóng bắt buộc và tự nguyện được hưởng trợ cấp hằng tháng, hưu trí, tử tuất trên cơ sở tổng thời gian đã đóng; thời gian đã tính hưởng BHXH một lần không được tính lại.","Quỹ BHXH được quản lý tập trung, thống nhất, công khai, minh bạch, hạch toán độc lập theo các quỹ thành phần và nhóm đối tượng.","Thời gian đóng tối thiểu để xác định điều kiện hưởng lương hưu và trợ cấp tuất hằng tháng tính theo năm, một năm tính đủ 12 tháng; khi tính mức hưởng, tháng lẻ từ 01-06 tháng tính nửa năm, từ 07-11 tháng tính một năm.","Việc giải quyết chế độ BHXH xác định theo pháp luật về BHXH tại thời điểm hưởng chế độ."]},"luat-41_6":{"tldr":"Quy định các chính sách của Nhà nước đối với bảo hiểm xã hội nhằm xây dựng hệ thống đa tầng hướng tới bao phủ toàn dân.","points":["Xây dựng hệ thống BHXH đa tầng gồm trợ cấp hưu trí xã hội, BHXH bắt buộc, BHXH tự nguyện, bảo hiểm hưu trí bổ sung.","Bảo đảm quyền, lợi ích hợp pháp của người tham gia; có chính sách hỗ trợ tín dụng cho người có thời gian đóng BHXH bị mất việc làm.","Ngân sách nhà nước bảo đảm các chế độ của trợ cấp hưu trí xã hội và một số chế độ khác.","Bảo hộ, bảo toàn và tăng trưởng quỹ BHXH; hỗ trợ người tham gia BHXH tự nguyện.","Khuyến khích địa phương hỗ trợ thêm tiền đóng cho người tham gia BHXH tự nguyện và hỗ trợ thêm cho người hưởng trợ cấp hưu trí xã hội.","Hoàn thiện pháp luật, phát triển tổ chức thực hiện, ưu tiên đầu tư hạ tầng công nghệ thông tin; khuyến khích tham gia bảo hiểm hưu trí bổ sung."]},"luat-41_7":{"tldr":"Quy định về mức tham chiếu dùng để tính mức đóng, mức hưởng một số chế độ bảo hiểm xã hội.","points":["Mức tham chiếu là mức tiền do Chính phủ quyết định, dùng để tính mức đóng, mức hưởng một số chế độ BHXH.","Mức tham chiếu được điều chỉnh trên cơ sở mức tăng của chỉ số giá tiêu dùng, tăng trưởng kinh tế, phù hợp với khả năng của ngân sách nhà nước và quỹ BHXH.","Chính phủ quy định chi tiết Điều này."]},"luat-41_8":{"tldr":"Quy định về hợp tác quốc tế trong lĩnh vực bảo hiểm xã hội theo nguyên tắc các bên cùng có lợi.","points":["Hợp tác quốc tế thực hiện theo nguyên tắc các bên cùng có lợi, phù hợp pháp luật quốc tế và pháp luật Việt Nam.","Khuyến khích hợp tác quốc tế tăng cường năng lực quản lý, tổ chức thực hiện và phát triển hệ thống chính sách BHXH hướng tới bao phủ toàn dân.","Thúc đẩy đàm phán, ký kết điều ước, thỏa thuận quốc tế về BHXH để bảo đảm quyền lợi cho người lao động Việt Nam ở nước ngoài và người lao động nước ngoài tại Việt Nam.","Khi điều ước quốc tế quy định thời gian tham gia BHXH ở Việt Nam và nước ngoài được tính để xét điều kiện hưởng, thì mức hưởng tại Việt Nam tính theo thời gian đã đóng tại Việt Nam."]},"luat-41_9":{"tldr":"Quy định các hành vi bị nghiêm cấm trong lĩnh vực bảo hiểm xã hội, bảo hiểm thất nghiệp.","points":["Chậm đóng, trốn đóng BHXH bắt buộc, bảo hiểm thất nghiệp.","Chiếm dụng tiền hưởng BHXH, bảo hiểm thất nghiệp; sử dụng quỹ BHXH, quỹ bảo hiểm thất nghiệp trái pháp luật.","Cản trở, gây khó khăn hoặc làm thiệt hại đến quyền, lợi ích hợp pháp của đối tượng tham gia, thụ hưởng.","Gian lận, giả mạo hồ sơ; đăng ký, báo cáo sai sự thật; cung cấp thông tin không chính xác.","Truy cập, khai thác, cung cấp cơ sở dữ liệu về BHXH, bảo hiểm thất nghiệp trái pháp luật; thông đồng, móc nối, bao che, giúp sức vi phạm.","Cầm cố, mua bán, thế chấp, đặt cọc sổ bảo hiểm xã hội dưới mọi hình thức; hành vi khác theo quy định của luật."]},"luat-41_10":{"tldr":"Quy định quyền của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội.","points":["Người tham gia được hưởng chế độ BHXH, được cấp sổ BHXH, được cung cấp thông tin định kỳ hằng tháng qua phương tiện điện tử và xác nhận thông tin khi yêu cầu.","Người tham gia được yêu cầu người sử dụng lao động thực hiện đầy đủ trách nhiệm; được tuyên truyền chính sách; được khiếu nại, tố cáo, khởi kiện.","Người tham gia được chủ động đi khám giám định y khoa nếu đang bảo lưu thời gian đóng và được thanh toán phí giám định khi kết quả đủ điều kiện hưởng.","Người thụ hưởng được nhận chế độ đầy đủ, kịp thời, thuận tiện; được hưởng bảo hiểm y tế trong các trường hợp đang hưởng lương hưu, nghỉ hưởng chế độ thai sản/ốm đau từ 14 ngày làm việc trở lên trong tháng, hưởng trợ cấp TNLĐ-BNN hằng tháng và một số trường hợp khác.","Người thụ hưởng được ủy quyền bằng văn bản cho người khác (văn bản ủy quyền nhận lương hưu, trợ cấp có hiệu lực tối đa 12 tháng kể từ ngày xác lập, phải được chứng thực).","Người từ đủ 80 tuổi trở lên nếu có nhu cầu được chi trả lương hưu, trợ cấp tại nơi cư trú; người thụ hưởng được từ chối hưởng chế độ và khiếu nại, tố cáo, khởi kiện."]},"luat-41_11":{"tldr":"Quy định trách nhiệm của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội.","points":["Người tham gia có trách nhiệm đóng BHXH, theo dõi việc thực hiện trách nhiệm về BHXH đối với mình và kê khai chính xác, trung thực, đầy đủ thông tin khi đăng ký tham gia.","Người thụ hưởng phải thực hiện đúng trình tự, thủ tục hưởng chế độ theo quy định.","Người thụ hưởng phải hoàn trả tiền hưởng khi có quyết định của cơ quan có thẩm quyền xác định việc hưởng không đúng quy định.","Người thụ hưởng qua tài khoản ngân hàng định kỳ hằng năm có trách nhiệm phối hợp với cơ quan BHXH hoặc tổ chức dịch vụ được ủy quyền để xác minh thông tin đủ điều kiện thụ hưởng."]},"luat-41_12":{"tldr":"Quy định quyền của người sử dụng lao động trong lĩnh vực bảo hiểm xã hội.","points":["Từ chối thực hiện yêu cầu không đúng quy định của pháp luật về BHXH.","Được tạm dừng đóng BHXH bắt buộc theo quy định tại Điều 37 của Luật này.","Được cơ quan BHXH hướng dẫn trình tự, thủ tục thực hiện BHXH; được tuyên truyền, phổ biến chính sách, pháp luật về BHXH.","Khiếu nại, tố cáo và khởi kiện về BHXH theo quy định của pháp luật."]},"luat-41_13":{"tldr":"Quy định trách nhiệm của người sử dụng lao động trong việc đăng ký, đóng và thực hiện chế độ bảo hiểm xã hội cho người lao động.","points":["Đăng ký tham gia BHXH bắt buộc cho người lao động; phối hợp trả sổ BHXH bản giấy cho người lao động; lập hồ sơ để người lao động hưởng chế độ.","Phối hợp với cơ quan BHXH xác nhận thời gian đóng khi người lao động chấm dứt HĐLĐ, hợp đồng làm việc hoặc thôi việc.","Đóng BHXH bắt buộc theo Điều 34 và hằng tháng trích khoản phải đóng theo Điều 33 từ tiền lương của người lao động để đóng cùng lúc vào quỹ BHXH.","Giới thiệu người lao động thuộc đối tượng theo Điều 65 đi khám giám định y khoa; phối hợp trả trợ cấp BHXH khi chi trả qua người sử dụng lao động.","Xuất trình, cung cấp đầy đủ, chính xác, kịp thời thông tin, tài liệu liên quan đến đóng, hưởng BHXH theo yêu cầu của cơ quan nhà nước có thẩm quyền.","Bồi thường cho người lao động nếu không thực hiện hoặc thực hiện không đầy đủ trách nhiệm đóng BHXH bắt buộc gây thiệt hại; phối hợp thu hồi số tiền BHXH hưởng không đúng quy định khi có quyết định của cơ quan có thẩm quyền."]},"luat-41_14":{"tldr":"Quy định quyền và trách nhiệm của công đoàn, Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên của Mặt trận về bảo hiểm xã hội.","points":["Công đoàn bảo vệ quyền, lợi ích hợp pháp của người lao động tham gia BHXH; yêu cầu cung cấp thông tin BHXH của người lao động.","Công đoàn tuyên truyền, tư vấn chính sách; thực hiện giám sát, kiến nghị xử lý vi phạm; tham gia thanh tra, kiểm tra việc thi hành pháp luật về BHXH.","Công đoàn khởi kiện người có hành vi vi phạm gây ảnh hưởng đến quyền, lợi ích hợp pháp của người lao động, tập thể người lao động; kiến nghị xây dựng, sửa đổi, bổ sung chính sách, pháp luật.","Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên tuyên truyền, vận động Nhân dân, đoàn viên, hội viên thực hiện chính sách, chủ động tham gia BHXH.","Mặt trận tham gia bảo vệ quyền, lợi ích hợp pháp của đoàn viên, hội viên; chia sẻ thông tin, dữ liệu v
