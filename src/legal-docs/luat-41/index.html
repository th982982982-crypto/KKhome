n lương và sự quản lý, điều hành, giám sát của một bên;"},{"k":"p","t":"b) Cán bộ, công chức, viên chức;"},{"k":"p","t":"c) Công nhân và viên chức quốc phòng, công nhân công an, người làm công tác khác trong tổ chức cơ yếu;"},{"k":"p","t":"d) Sĩ quan, quân nhân chuyên nghiệp quân đội nhân dân; sĩ quan, hạ sĩ quan nghiệp vụ, sĩ quan, hạ sĩ quan chuyên môn kỹ thuật công an nhân dân; người làm công tác cơ yếu hưởng lương như đối với quân nhân;"},{"k":"p","t":"đ) Hạ sĩ quan, binh sĩ quân đội nhân dân; hạ sĩ quan, chiến sĩ nghĩa vụ công an nhân dân; học viên quân đội, công an, cơ yếu đang theo học được hưởng sinh hoạt phí;"},{"k":"p","t":"e) Dân quân thường trực;"},{"k":"p","t":"g) Người lao động đi làm việc ở nước ngoài theo hợp đồng quy định tại Luật Người lao động Việt Nam đi làm việc ở nước ngoài theo hợp đồng, trừ trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác;"},{"k":"p","t":"h) Vợ hoặc chồng không hưởng lương từ ngân sách nhà nước được cử đi công tác nhiệm kỳ cùng thành viên cơ quan đại diện nước Cộng hòa xã hội chủ nghĩa Việt Nam ở nước ngoài được hưởng chế độ sinh hoạt phí;"},{"k":"p","t":"i) Người quản lý doanh nghiệp, kiểm soát viên, người đại diện phần vốn nhà nước, người đại diện phần vốn của doanh nghiệp theo quy định của pháp luật; thành viên Hội đồng quản trị, Tổng giám đốc, Giám đốc, thành viên Ban kiểm soát hoặc kiểm soát viên và các chức danh quản lý khác được bầu của hợp tác xã, liên hiệp hợp tác xã theo quy định của Luật Hợp tác xã có hưởng tiền lương;"},{"k":"p","t":"k) Người hoạt động không chuyên trách ở cấp xã, ở thôn, tổ dân phố;"},{"k":"p","t":"l) Đối tượng quy định tại điểm a khoản này làm việc không trọn thời gian, có tiền lương trong tháng bằng hoặc cao hơn tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp nhất;"},{"k":"p","t":"m) Chủ hộ kinh doanh của hộ kinh doanh có đăng ký kinh doanh tham gia theo quy định của Chính phủ;"},{"k":"p","t":"n) Người quản lý doanh nghiệp, kiểm soát viên, người đại diện phần vốn nhà nước, người đại diện phần vốn của doanh nghiệp theo quy định của pháp luật; thành viên Hội đồng quản trị, Tổng giám đốc, Giám đốc, thành viên Ban kiểm soát hoặc kiểm soát viên và các chức danh quản lý khác được bầu của hợp tác xã, liên hiệp hợp tác xã theo quy định của Luật Hợp tác xã không hưởng tiền lương."},{"k":"p","t":"2. Người lao động là công dân nước ngoài làm việc tại Việt Nam thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc khi làm việc theo hợp đồng lao động xác định thời hạn có thời hạn từ đủ 12 tháng trở lên với người sử dụng lao động tại Việt Nam, trừ các trường hợp sau đây:"},{"k":"p","t":"a) Di chuyển trong nội bộ doanh nghiệp theo quy định của pháp luật về người lao động nước ngoài làm việc tại Việt Nam;"},{"k":"p","t":"b) Tại thời điểm giao kết hợp đồng lao động đã đủ tuổi nghỉ hưu theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động;"},{"k":"p","t":"c) Điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác."},{"k":"p","t":"3. Người sử dụng lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc bao gồm cơ quan nhà nước, đơn vị sự nghiệp công lập; cơ quan, đơn vị, doanh nghiệp thuộc Quân đội nhân dân, Công an nhân dân và tổ chức cơ yếu; tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội - nghề nghiệp, tổ chức xã hội khác; cơ quan, tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam; doanh nghiệp, tổ hợp tác, hợp tác xã, liên hiệp hợp tác xã, hộ kinh doanh, tổ chức khác và cá nhân có thuê mướn, sử dụng lao động theo hợp đồng lao động."},{"k":"p","t":"4. Đối tượng tham gia bảo hiểm xã hội tự nguyện bao gồm:"},{"k":"p","t":"a) Công dân Việt Nam từ đủ 15 tuổi trở lên không thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc và không phải là người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội, trợ cấp hằng tháng;"},{"k":"p","t":"b) Đối tượng quy định tại điểm a và điểm b khoản 1 Điều này đang tạm hoãn thực hiện hợp đồng lao động, hợp đồng làm việc, trừ trường hợp hai bên có thỏa thuận về việc đóng bảo hiểm xã hội bắt buộc trong thời gian này."},{"k":"p","t":"5. Người đồng thời thuộc nhiều đối tượng tham gia bảo hiểm xã hội bắt buộc khác nhau quy định tại khoản 1 Điều này thì việc tham gia bảo hiểm xã hội bắt buộc theo quy định như sau:"},{"k":"p","t":"a) Đối tượng quy định tại điểm a và điểm l khoản 1 Điều này mà giao kết hợp đồng lao động với nhiều người sử dụng lao động thì tham gia bảo hiểm xã hội bắt buộc theo hợp đồng lao động giao kết đầu tiên."},{"k":"p","t":"Trường hợp hợp đồng lao động đang sử dụng làm căn cứ tham gia bảo hiểm xã hội bắt buộc đang tạm hoãn thực hiện hợp đồng mà hai bên không có thỏa thuận về việc đóng bảo hiểm xã hội bắt buộc trong thời gian tạm hoãn thì tham gia bảo hiểm xã hội bắt buộc theo thứ tự về thời gian có hiệu lực của hợp đồng được ký kết;"},{"k":"p","t":"b) Đối tượng quy định tại điểm b và điểm i khoản 1 Điều này đồng thời cũng thuộc đối tượng quy định tại điểm a hoặc điểm l khoản 1 Điều này thì tham gia bảo hiểm xã hội bắt buộc theo đối tượng tương ứng quy định tại điểm b hoặc điểm i khoản 1 Điều này;"},{"k":"p","t":"c) Đối tượng quy định tại điểm i và điểm n khoản 1 Điều này làm việc tại nhiều doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thì tham gia bảo hiểm xã hội bắt buộc tại doanh nghiệp, hợp tác xã hoặc liên hiệp hợp tác xã đầu tiên tham gia quản lý, điều hành;"},{"k":"p","t":"d) Đối tượng quy định tại điểm g và điểm k khoản 1 Điều này đồng thời thuộc đối tượng quy định tại một trong các điểm a, i và l khoản 1 Điều này thì tham gia bảo hiểm xã hội bắt buộc theo đối tượng tương ứng quy định tại điểm a, i hoặc l khoản 1 Điều này theo thứ tự đến trước;"},{"k":"p","t":"đ) Đối tượng quy định tại điểm k khoản 1 Điều này đồng thời thuộc đối tượng quy định tại điểm m hoặc điểm n khoản 1 Điều này thì tham gia bảo hiểm xã hội bắt buộc theo đối tượng quy định tại điểm k khoản 1 Điều này;"},{"k":"p","t":"e) Đối tượng quy định tại điểm m và điểm n khoản 1 Điều này đồng thời thuộc nhiều đối tượng quy định tại khoản 1 Điều này thì việc tham gia bảo hiểm xã hội bắt buộc theo quy định của Chính phủ;"},{"k":"p","t":"g) Đối tượng quy định tại điểm e khoản 1 Điều này đồng thời thuộc đối tượng quy định tại điểm k hoặc điểm m khoản 1 Điều này thì tham gia bảo hiểm xã hội bắt buộc theo đối tượng quy định tại điểm e khoản 1 Điều này."},{"k":"p","t":"6. Ủy ban Thường vụ Quốc hội quyết định việc tham gia bảo hiểm xã hội bắt buộc đối với đối tượng khác ngoài đối tượng quy định tại khoản 1 Điều này mà có việc làm, thu nhập ổn định, thường xuyên trên cơ sở đề xuất của Chính phủ phù hợp với điều kiện phát triển kinh tế - xã hội từng thời kỳ."},{"k":"p","t":"7. Trường hợp không thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc bao gồm:"},{"k":"p","t":"a) Người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội, trợ cấp hằng tháng."},{"k":"p","t":"Chính phủ quy định đối tượng hưởng trợ cấp bảo hiểm xã hội, trợ cấp hằng tháng không thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc;"},{"k":"p","t":"b) Lao động là người giúp việc gia đình;"},{"k":"p","t":"c) Đối tượng quy định tại điểm m và điểm n khoản 1 Điều này đã đủ tuổi nghỉ hưu theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động, trừ trường hợp thời gian đóng bảo hiểm xã hội còn thiếu tối đa 06 tháng quy định tại khoản 7 Điều 33 của Luật này."}]},{"id":"luat-41_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Luật này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Bảo hiểm xã hội là sự bảo đảm thay thế hoặc bù đắp một phần thu nhập của người tham gia bảo hiểm xã hội khi họ bị giảm hoặc mất thu nhập do ốm đau, thai sản, tai nạn lao động, bệnh nghề nghiệp, khi nghỉ hưu hoặc chết, trên cơ sở đóng vào quỹ bảo hiểm xã hội hoặc do ngân sách nhà nước bảo đảm."},{"k":"p","t":"2. Trợ cấp hưu trí xã hội là loại hình bảo hiểm xã hội do ngân sách nhà nước bảo đảm cho người cao tuổi đủ điều kiện theo quy định của Luật này."},{"k":"p","t":"3. Bảo hiểm xã hội bắt buộc là loại hình bảo hiểm xã hội do Nhà nước tổ chức mà người lao động, người sử dụng lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc phải tham gia."},{"k":"p","t":"4. Bảo hiểm xã hội tự nguyện là loại hình bảo hiểm xã hội do Nhà nước tổ chức mà công dân Việt Nam tự nguyện tham gia và được lựa chọn mức đóng, phương thức đóng phù hợp với thu nhập của mình."},{"k":"p","t":"5. Bảo hiểm hưu trí bổ sung là loại hình bảo hiểm mang tính chất tự nguyện theo nguyên tắc thị trường nhằm bổ sung cho chế độ hưu trí trong bảo hiểm xã hội bắt buộc, có cơ chế tạo lập quỹ từ đóng góp của người sử dụng lao động hoặc của người sử dụng lao động và người lao động."},{"k":"p","t":"6. Thời gian đóng bảo hiểm xã hội là tổng thời gian đã đóng bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện theo quy định của Luật này, trừ trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác."},{"k":"p","t":"7. Thân nhân là con đẻ, con nuôi, vợ hoặc chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, cha vợ hoặc cha chồng, mẹ vợ hoặc mẹ chồng của người tham gia bảo hiểm xã hội hoặc thành viên khác trong gia đình mà người tham gia bảo hiểm xã hội đang có nghĩa vụ nuôi dưỡng theo quy định của pháp luật về hôn nhân và gia đình."},{"k":"p","t":"8. Người thụ hưởng là đối tượng đủ điều kiện hưởng chế độ bảo hiểm xã hội theo quy định của Luật này."},{"k":"p","t":"9. Đăng ký tham gia bảo hiểm xã hội là việc người sử dụng lao động, người lao động nộp hồ sơ kê khai thông tin về người lao động, người sử dụng lao động, tiền lương, thu nhập làm căn cứ đóng bảo hiểm xã hội, phương thức đóng và các nội dung khác có liên quan theo quy định của pháp luật để tham gia bảo hiểm xã hội cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"10. Giao dịch điện tử trong lĩnh vực bảo hiểm xã hội là giao dịch được thực hiện bằng phương tiện điện tử bao gồm đăng ký tham gia, cấp sổ bảo hiểm xã hội, đóng bảo hiểm xã hội; giải quyết, chi trả chế độ bảo hiểm xã hội và các hoạt động khác trong lĩnh vực bảo hiểm xã hội."},{"k":"p","t":"11. Cơ sở dữ liệu quốc gia về bảo hiểm là cơ sở dữ liệu dùng chung tập hợp thông tin về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế được số hóa, chuẩn hóa, lưu trữ, quản lý bằng cơ sở hạ tầng thông tin để phục vụ quản lý nhà nước và giao dịch của cơ quan, tổ chức, cá nhân."},{"k":"p","t":"12. Bản sao các giấy tờ dùng để thực hiện bảo hiểm xã hội quy định tại Luật này là giấy tờ thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Được cơ quan, tổ chức có thẩm quyền cấp từ sổ gốc;"},{"k":"p","t":"b) Được cơ quan, tổ chức có thẩm quyền chứng thực từ bản chính;"},{"k":"p","t":"c) Trường hợp khác do Chính phủ quy định."}]},{"id":"luat-41_4","no":4,"code":"Điều 4","title":"Điều 4. Loại hình, các chế độ bảo hiểm xã hội","shortTitle":"Loại hình, các chế độ bảo hiểm xã hội","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Trợ cấp hưu trí xã hội có các chế độ sau đây:"},{"k":"p","t":"a) Trợ cấp hưu trí xã hội hằng tháng;"},{"k":"p","t":"b) Hỗ trợ chi phí mai táng;"},{"k":"p","t":"c) Hưởng bảo hiểm y tế do ngân sách nhà nước đóng."},{"k":"p","t":"2. Bảo hiểm xã hội bắt buộc có các chế độ sau đây:"},{"k":"p","t":"a) Ốm đau;"},{"k":"p","t":"b) Thai sản;"},{"k":"p","t":"c) Hưu trí;"},{"k":"p","t":"d) Tử tuất;"},{"k":"p","t":"đ) Bảo hiểm tai nạn lao động, bệnh nghề nghiệp theo quy định của Luật An toàn, vệ sinh lao động."},{"k":"p","t":"3. Bảo hiểm xã hội tự nguyện có các chế độ sau đây:"},{"k":"p","t":"a) Trợ cấp thai sản;"},{"k":"p","t":"b) Hưu trí;"},{"k":"p","t":"c) Tử tuất;"},{"k":"p","t":"d) Bảo hiểm tai nạn lao động theo quy định của Luật An toàn, vệ sinh lao động."},{"k":"p","t":"4. Bảo hiểm thất nghiệp theo quy định của Luật Việc làm."},{"k":"p","t":"5. Bảo hiểm hưu trí bổ sung."}]},{"id":"luat-41_5","no":5,"code":"Điều 5","title":"Điều 5. Nguyên tắc bảo hiểm xã hội","shortTitle":"Nguyên tắc bảo hiểm xã hội","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Mức hưởng bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện được tính trên cơ sở mức đóng và thời gian đóng bảo hiểm xã hội; có chia sẻ giữa những người tham gia bảo hiểm xã hội theo quy định của Luật này."},{"k":"p","t":"2. Mức đóng bảo hiểm xã hội bắt buộc được tính trên cơ sở tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc. Mức đóng bảo hiểm xã hội tự nguyện được tính trên cơ sở thu nhập làm căn cứ đóng bảo hiểm xã hội tự nguyện do người tham gia lựa chọn."},{"k":"p","t":"3. Người vừa có thời gian đóng bảo hiểm xã hội bắt buộc vừa có thời gian đóng bảo hiểm xã hội tự nguyện được hưởng chế độ trợ cấp hằng tháng, chế độ hưu trí và chế độ tử tuất trên cơ sở thời gian đã đóng bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện."},{"k":"p","t":"Thời gian đóng bảo hiểm xã hội đã được tính hưởng bảo hiểm xã hội một lần thì không được tính vào thời gian làm cơ sở tính hưởng chế độ bảo hiểm xã hội."},{"k":"p","t":"4. Quỹ bảo hiểm xã hội được quản lý tập trung, thống nhất, công khai, minh bạch; được sử dụng đúng mục đích và được hạch toán độc lập theo các quỹ thành phần, các nhóm đối tượng thực hiện chế độ tiền lương do Nhà nước quy định và chế độ tiền lương do người sử dụng lao động quyết định."},{"k":"p","t":"5. Việc thực hiện bảo hiểm xã hội phải đơn giản, dễ dàng, thuận tiện, bảo đảm kịp thời và đầy đủ quyền lợi của người tham gia, người thụ hưởng chế độ bảo hiểm xã hội."},{"k":"p","t":"6. Thời gian đóng bảo hiểm xã hội tối thiểu để xác định điều kiện hưởng lương hưu và trợ cấp tuất hằng tháng tính theo năm, một năm phải tính đủ 12 tháng. Trường hợp tính mức hưởng, thời gian đóng bảo hiểm xã hội có tháng lẻ từ 01 tháng đến 06 tháng được tính là nửa năm, từ 07 tháng đến 11 tháng được tính là một năm."},{"k":"p","t":"7. Việc giải quyết các chế độ bảo hiểm xã hội được xác định theo quy định của pháp luật về bảo hiểm xã hội tại thời điểm hưởng chế độ bảo hiểm xã hội."}]},{"id":"luat-41_6","no":6,"code":"Điều 6","title":"Điều 6. Chính sách của Nhà nước đối với bảo hiểm xã hội","shortTitle":"Chính sách của Nhà nước đối với bảo hiểm xã hội","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Xây dựng hệ thống bảo hiểm xã hội đa tầng bao gồm trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện, bảo hiểm hưu trí bổ sung để hướng tới bao phủ toàn dân theo lộ trình phù hợp với điều kiện phát triển kinh tế - xã hội."},{"k":"p","t":"2. Bảo đảm quyền, lợi ích hợp pháp của các tổ chức, cá nhân tham gia bảo hiểm xã hội; có chính sách hỗ trợ về tín dụng cho người lao động có thời gian đóng bảo hiểm xã hội mà bị mất việc làm."},{"k":"p","t":"3. Ngân sách nhà nước bảo đảm các chế độ của trợ cấp hưu trí xã hội và một số chế độ khác theo quy định của Luật này."},{"k":"p","t":"4. Bảo hộ, bảo toàn và tăng trưởng quỹ bảo hiểm xã hội."},{"k":"p","t":"5. Hỗ trợ người tham gia bảo hiểm xã hội tự nguyện."},{"k":"p","t":"6. Khuyến khích các địa phương tùy theo điều kiện kinh tế - xã hội, khả năng cân đối ngân sách, kết hợp huy động các nguồn lực xã hội hỗ trợ thêm tiền đóng bảo hiểm xã hội cho người tham gia bảo hiểm xã hội tự nguyện và hỗ trợ thêm cho người hưởng trợ cấp hưu trí xã hội."},{"k":"p","t":"7. Hoàn thiện pháp luật và chính sách về bảo hiểm xã hội; phát triển hệ thống tổ chức thực hiện bảo hiểm xã hội chuyên nghiệp, hiện đại, minh bạch và hiệu quả; ưu tiên đầu tư phát triển hạ tầng công nghệ thông tin đáp ứng yêu cầu chuyển đổi số, giao dịch điện tử và yêu cầu quản lý về bảo hiểm xã hội."},{"k":"p","t":"8. Khuyến khích tham gia bảo hiểm hưu trí bổ sung."}]},{"id":"luat-41_7","no":7,"code":"Điều 7","title":"Điều 7. Mức tham chiếu","shortTitle":"Mức tham chiếu","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Mức tham chiếu là mức tiền do Chính phủ quyết định dùng để tính mức đóng, mức hưởng một số chế độ bảo hiểm xã hội quy định trong Luật này."},{"k":"p","t":"2. Mức tham chiếu được điều chỉnh trên cơ sở mức tăng của chỉ số giá tiêu dùng, tăng trưởng kinh tế, phù hợp với khả năng của ngân sách nhà nước và quỹ bảo hiểm xã hội."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_8","no":8,"code":"Điều 8","title":"Điều 8. Hợp tác quốc tế về bảo hiểm xã hội","shortTitle":"Hợp tác quốc tế về bảo hiểm xã hội","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hợp tác quốc tế về bảo hiểm xã hội được thực hiện theo nguyên tắc các bên cùng có lợi, phù hợp với quy định của pháp luật quốc tế và pháp luật Việt Nam."},{"k":"p","t":"2. Khuyến khích hợp tác quốc tế trong việc tăng cường năng lực quản lý và tổ chức thực hiện bảo hiểm xã hội, phát triển hệ thống chính sách bảo hiểm xã hội linh hoạt, đa dạng, đa tầng, hiện đại, hội nhập quốc tế, hướng tới bao phủ toàn dân theo lộ trình phù hợp với điều kiện phát triển kinh tế - xã hội của đất nước, kết hợp hài hòa các nguyên tắc đóng - hưởng, công bằng, bình đẳng, chia sẻ và bền vững."},{"k":"p","t":"3. Thúc đẩy đàm phán, ký kết các điều ước quốc tế, thỏa thuận quốc tế về bảo hiểm xã hội để bảo đảm quyền lợi cho người lao động Việt Nam đi làm việc ở nước ngoài, người lao động nước ngoài đến làm việc tại Việt Nam."},{"k":"p","t":"4. Trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định về thời gian tham gia bảo hiểm xã hội của người lao động ở Việt Nam và ở nước ngoài được tính để xét điều kiện hưởng chế độ bảo hiểm xã hội thì mức hưởng chế độ bảo hiểm xã hội ở Việt Nam được tính theo thời gian người lao động đã đóng bảo hiểm xã hội tại Việt Nam."}]},{"id":"luat-41_9","no":9,"code":"Điều 9","title":"Điều 9. Các hành vi bị nghiêm cấm","shortTitle":"Các hành vi bị nghiêm cấm","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Chậm đóng, trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp."},{"k":"p","t":"2. Chiếm dụng tiền hưởng bảo hiểm xã hội, bảo hiểm thất nghiệp."},{"k":"p","t":"3. Cản trở, gây khó khăn hoặc làm thiệt hại đến quyền, lợi ích hợp pháp của đối tượng tham gia, thụ hưởng bảo hiểm xã hội, bảo hiểm thất nghiệp."},{"k":"p","t":"4. Gian lận, giả mạo hồ sơ trong việc thực hiện bảo hiểm xã hội, bảo hiểm thất nghiệp."},{"k":"p","t":"5. Sử dụng quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp trái pháp luật."},{"k":"p","t":"6. Truy cập, khai thác, cung cấp cơ sở dữ liệu về bảo hiểm xã hội, bảo hiểm thất nghiệp trái pháp luật."},{"k":"p","t":"7. Đăng ký, báo cáo sai sự thật; cung cấp thông tin không chính xác về bảo hiểm xã hội, bảo hiểm thất nghiệp."},{"k":"p","t":"8. Thông đồng, móc nối, bao che, giúp sức cơ quan, tổ chức, cá nhân thực hiện hành vi vi phạm pháp luật về bảo hiểm xã hội, bảo hiểm thất nghiệp."},{"k":"p","t":"9. Cầm cố, mua bán, thế chấp, đặt cọc sổ bảo hiểm xã hội dưới mọi hình thức."},{"k":"p","t":"10. Hành vi khác theo quy định của luật."},{"k":"p","t":"CHỨC THỰC HIỆN BẢO HIỂM XÃ HỘI"},{"k":"p","t":"QUYỀN VÀ TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC,"},{"k":"p","t":"CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI"}]},{"id":"luat-41_10","no":10,"code":"Điều 10","title":"Điều 10. Quyền của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội","shortTitle":"Quyền của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm xã hội có các quyền sau đây:"},{"k":"p","t":"a) Hưởng chế độ bảo hiểm xã hội theo quy định của Luật này;"},{"k":"p","t":"b) Được cấp sổ bảo hiểm xã hội;"},{"k":"p","t":"c) Được cơ quan bảo hiểm xã hội định kỳ hằng tháng cung cấp thông tin về việc đóng bảo hiểm xã hội thông qua phương tiện điện tử; được cơ quan bảo hiểm xã hội xác nhận thông tin về đóng bảo hiểm xã hội khi có yêu cầu;"},{"k":"p","t":"d) Yêu cầu người sử dụng lao động và các cơ quan, tổ chức có liên quan thực hiện đầy đủ trách nhiệm về bảo hiểm xã hội đối với mình theo quy định của pháp luật;"},{"k":"p","t":"đ) Được tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm xã hội;"},{"k":"p","t":"e) Chủ động đi khám giám định y khoa để xác định mức suy giảm khả năng lao động nếu thuộc trường hợp đang bảo lưu thời gian đóng bảo hiểm xã hội và được thanh toán phí giám định y khoa khi kết quả giám định y khoa đủ điều kiện để hưởng chế độ bảo hiểm xã hội theo quy định của Luật này;"},{"k":"p","t":"g) Khiếu nại, tố cáo và khởi kiện về bảo hiểm xã hội theo quy định của pháp luật."},{"k":"p","t":"2. Người thụ hưởng chế độ bảo hiểm xã hội có các quyền sau đây:"},{"k":"p","t":"a) Nhận các chế độ bảo hiểm xã hội đầy đủ, kịp thời, thuận tiện;"},{"k":"p","t":"b) Hưởng bảo hiểm y tế trong trường hợp đang hưởng lương hưu; nghỉ việc hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng; trong thời gian nghỉ việc hưởng chế độ thai sản từ 14 ngày làm việc trở lên trong tháng; trong thời gian nghỉ việc hưởng chế độ ốm đau từ 14 ngày làm việc trở lên trong tháng hoặc nghỉ việc hưởng trợ cấp ốm đau đối với người lao động bị mắc bệnh thuộc danh mục bệnh cần chữa trị dài ngày do Bộ trưởng Bộ Y tế ban hành; đang hưởng chế độ quy định tại Điều 23 của Luật này;"},{"k":"p","t":"c) Được thanh toán phí giám định y khoa đối với trường hợp không do người sử dụng lao động giới thiệu đi khám giám định mức suy giảm khả năng lao động mà kết quả giám định y khoa đủ điều kiện để hưởng chế độ bảo hiểm xã hội theo quy định của Luật này;"},{"k":"p","t":"d) Ủy quyền bằng văn bản cho người khác thực hiện bảo hiểm xã hội. Trường hợp ủy quyền nhận lương hưu, trợ cấp bảo hiểm xã hội và chế độ khác theo quy định của Luật này thì văn bản ủy quyền có hiệu lực tối đa là 12 tháng kể từ ngày xác lập việc ủy quyền. Văn bản ủy quyền phải được chứng thực theo quy định của pháp luật về chứng thực;"},{"k":"p","t":"đ) Đối với người từ đủ 80 tuổi trở lên nếu có nhu cầu thì được cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ được cơ quan bảo hiểm xã hội ủy quyền thực hiện việc chi trả lương hưu, trợ cấp bảo hiểm xã hội tại nơi cư trú trên lãnh thổ Việt Nam;"},{"k":"p","t":"e) Được cơ quan bảo hiểm xã hội định kỳ hằng tháng cung cấp thông tin về việc hưởng chế độ bảo hiểm xã hội thông qua phương tiện điện tử; được cơ quan bảo hiểm xã hội xác nhận thông tin về hưởng bảo hiểm xã hội khi có yêu cầu;"},{"k":"p","t":"g) Khiếu nại, tố cáo và khởi kiện về bảo hiểm xã hội theo quy định của pháp luật;"},{"k":"p","t":"h) Từ chối hưởng chế độ bảo hiểm xã hội."}]},{"id":"luat-41_11","no":11,"code":"Điều 11","title":"Điều 11. Trách nhiệm của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội","shortTitle":"Trách nhiệm của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người tham gia bảo hiểm xã hội có trách nhiệm sau đây:"},{"k":"p","t":"a) Đóng bảo hiểm xã hội theo quy định của Luật này;"},{"k":"p","t":"b) Theo dõi việc thực hiện trách nhiệm về bảo hiểm xã hội đối với mình;"},{"k":"p","t":"c) Thực hiện việc kê khai chính xác, trung thực, đầy đủ thông tin theo đúng quy định về đăng ký tham gia bảo hiểm xã hội."},{"k":"p","t":"2. Người thụ hưởng chế độ bảo hiểm xã hội có trách nhiệm sau đây:"},{"k":"p","t":"a) Thực hiện các quy định về trình tự, thủ tục, quy định khác về hưởng chế độ bảo hiểm xã hội theo quy định của Luật này và quy định khác của pháp luật có liên quan;"},{"k":"p","t":"b) Hoàn trả tiền hưởng chế độ bảo hiểm xã hội khi có quyết định của cơ quan có thẩm quyền xác định việc hưởng không đúng quy định;"},{"k":"p","t":"c) Định kỳ hằng năm, người thụ hưởng chế độ bảo hiểm xã hội qua tài khoản cá nhân mở tại ngân hàng có trách nhiệm phối hợp với cơ quan bảo hiểm xã hội hoặc tổ chức dịch vụ được cơ quan bảo hiểm xã hội ủy quyền để thực hiện việc xác minh thông tin đủ điều kiện thụ hưởng chế độ bảo hiểm xã hội."}]},{"id":"luat-41_12","no":12,"code":"Điều 12","title":"Điều 12. Quyền của người sử dụng lao động","shortTitle":"Quyền của người sử dụng lao động","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Từ chối thực hiện yêu cầu không đúng quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"2. Được tạm dừng đóng bảo hiểm xã hội bắt buộc theo quy định tại Điều 37 của Luật này."},{"k":"p","t":"3. Được cơ quan bảo hiểm xã hội hướng dẫn trình tự, thủ tục thực hiện bảo hiểm xã hội."},{"k":"p","t":"4. Được tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm xã hội."},{"k":"p","t":"5. Khiếu nại, tố cáo và khởi kiện về bảo hiểm xã hội theo quy định của pháp luật."}]},{"id":"luat-41_13","no":13,"code":"Điều 13","title":"Điều 13. Trách nhiệm của người sử dụng lao động","shortTitle":"Trách nhiệm của người sử dụng lao động","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đăng ký tham gia bảo hiểm xã hội bắt buộc cho người lao động theo quy định của Luật này; phối hợp với cơ quan bảo hiểm xã hội trong việc trả sổ bảo hiểm xã hội bản giấy cho người lao động."},{"k":"p","t":"2. Lập hồ sơ để người lao động được hưởng chế độ bảo hiểm xã hội."},{"k":"p","t":"3. Phối hợp với cơ quan bảo hiểm xã hội trong việc xác nhận thời gian đóng bảo hiểm xã hội khi người lao động chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc thôi việc theo quy định của pháp luật."},{"k":"p","t":"4. Đóng bảo hiểm xã hội bắt buộc cho người lao động theo quy định tại Điều 34 của Luật này và hằng tháng trích khoản tiền phải đóng bảo hiểm xã hội bắt buộc theo quy định tại Điều 33 của Luật này từ tiền lương của người lao động để đóng cùng một lúc vào quỹ bảo hiểm xã hội."},{"k":"p","t":"5. Xem xét giới thiệu người lao động thuộc đối tượng theo quy định tại Điều 65 của Luật này đi khám giám định y khoa để xác định mức suy giảm khả năng lao động tại Hội đồng giám định y khoa."},{"k":"p","t":"6. Phối hợp với cơ quan bảo hiểm xã hội trả trợ cấp bảo hiểm xã hội cho người lao động trong trường hợp chi trả thông qua người sử dụng lao động."},{"k":"p","t":"7. Xuất trình, cung cấp đầy đủ, chính xác, kịp thời thông tin, tài liệu liên quan đến việc đóng, hưởng bảo hiểm xã hội thuộc trách nhiệm của người sử dụng lao động theo yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"8. Bồi thường cho người lao động theo quy định của pháp luật nếu không thực hiện hoặc thực hiện không đầy đủ trách nhiệm đóng bảo hiểm xã hội bắt buộc theo quy định của Luật này mà gây thiệt hại đến quyền, lợi ích hợp pháp của người lao động."},{"k":"p","t":"9. Phối hợp, tạo điều kiện để cơ quan bảo hiểm xã hội thực hiện thu hồi số tiền bảo hiểm xã hội hưởng không đúng quy định của người lao động khi có quyết định của cơ quan có thẩm quyền."}]},{"id":"luat-41_14","no":14,"code":"Điều 14","title":"Điều 14. Quyền và trách nhiệm của công đoàn, Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên của Mặt trận","shortTitle":"Quyền và trách nhiệm của công đoàn, Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên của Mặt trận","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trong phạm vi chức năng, nhiệm vụ của mình và theo quy định của pháp luật có liên quan, công đoàn có quyền và trách nhiệm sau đây:"},{"k":"p","t":"a) Bảo vệ quyền, lợi ích hợp pháp của người lao động tham gia bảo hiểm xã hội;"},{"k":"p","t":"b) Yêu cầu người sử dụng lao động, cơ quan bảo hiểm xã hội cung cấp thông tin về bảo hiểm xã hội của người lao động;"},{"k":"p","t":"c) Tuyên truyền, phổ biến, tư vấn chính sách, pháp luật về bảo hiểm xã hội cho người lao động;"},{"k":"p","t":"d) Thực hiện hoạt động giám sát và kiến nghị với cơ quan nhà nước có thẩm quyền xử lý hành vi vi phạm pháp luật về bảo hiểm xã hội;"},{"k":"p","t":"đ) Tham gia thanh tra, kiểm tra việc thi hành pháp luật về bảo hiểm xã hội;"},{"k":"p","t":"e) Khởi kiện người có hành vi vi phạm pháp luật về bảo hiểm xã hội gây ảnh hưởng đến quyền và lợi ích hợp pháp của người lao động, tập thể người lao động;"},{"k":"p","t":"g) Kiến nghị, tham gia xây dựng, sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm xã hội."},{"k":"p","t":"2. Trong phạm vi chức năng, nhiệm vụ của mình và theo quy định của pháp luật có liên quan, Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên của Mặt trận có quyền và trách nhiệm sau đây:"},{"k":"p","t":"a) Tuyên truyền, vận động Nhân dân, đoàn viên, hội viên thực hiện chính sách, pháp luật về bảo hiểm xã hội, chủ động tham gia các loại hình bảo hiểm xã hội phù hợp với bản thân và gia đình;"},{"k":"p","t":"b) Tham gia bảo vệ quyền, lợi ích hợp pháp của đoàn viên, hội viên; chia sẻ thông tin, dữ liệu về người lao động, thành viên, hội viên của mình với cơ quan bảo hiểm xã hội;"},{"k":"p","t":"c) Thực hiện các hoạt động giám sát, phản biện xã hội, tham gia với cơ quan nhà nước trong việc xây dựng và thực hiện chính sách, pháp luật về bảo hiểm xã hội."}]},{"id":"luat-41_15","no":15,"code":"Điều 15","title":"Điều 15. Quyền và trách nhiệm của tổ chức đại diện người sử dụng lao động","shortTitle":"Quyền và trách nhiệm của tổ chức đại diện người sử dụng lao động","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Bảo vệ quyền và lợi ích hợp pháp của người sử dụng lao động tham gia bảo hiểm xã hội."},{"k":"p","t":"2. Kiến nghị, tham gia xây dựng, sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm xã hội."},{"k":"p","t":"3. Tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm xã hội cho người sử dụng lao động."},{"k":"p","t":"4. Vận động người sử dụng lao động là thành viên của mình chấp hành chính sách, pháp luật về bảo hiểm xã hội."},{"k":"p","t":"5. Tham gia kiểm tra, giám sát việc thực hiện pháp luật về bảo hiểm xã hội theo quy định của pháp luật."},{"k":"p","t":"6. Kiến nghị cơ quan nhà nước có thẩm quyền xử lý hành vi vi phạm pháp luật về bảo hiểm xã hội."},{"k":"p","t":"TỔ CHỨC THỰC HIỆN BẢO HIỂM XÃ HỘI"}]},{"id":"luat-41_16","no":16,"code":"Điều 16","title":"Điều 16. Cơ quan bảo hiểm xã hội","shortTitle":"Cơ quan bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Cơ quan bảo hiểm xã hội là cơ quan nhà nước có chức năng thực hiện chế độ, chính sách bảo hiểm xã hội; quản lý và sử dụng các quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế; thanh tra chuyên ngành về đóng bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế; nhiệm vụ khác theo quy định của Luật này và luật khác có liên quan."},{"k":"p","t":"2. Chính phủ quy định chức năng, nhiệm vụ, quyền hạn và cơ cấu tổ chức của cơ quan bảo hiểm xã hội."}]},{"id":"luat-41_17","no":17,"code":"Điều 17","title":"Điều 17. Quyền hạn của cơ quan bảo hiểm xã hội","shortTitle":"Quyền hạn của cơ quan bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Yêu cầu người sử dụng lao động xuất trình sổ quản lý lao động, thang lương, bảng lương và thông tin, tài liệu khác liên quan đến việc đóng, hưởng chế độ bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"2. Được cơ quan đăng ký kinh doanh, cơ quan cấp giấy chứng nhận hoạt động hoặc giấy phép hoạt động kết nối, chia sẻ thông tin hoặc cung cấp bản sao giấy phép hoạt động, giấy chứng nhận hoạt động hoặc giấy chứng nhận đăng ký doanh nghiệp, hợp tác xã, hộ kinh doanh để rà soát, kiểm tra việc thực hiện đăng ký tham gia bảo hiểm xã hội bắt buộc đối với doanh nghiệp, tổ chức thành lập mới."},{"k":"p","t":"3. Được cơ quan thuế cung cấp thông tin về chi phí tiền lương để tính thuế của người sử dụng lao động và các thông tin khác có liên quan đến việc tham gia bảo hiểm xã hội theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"4. Từ chối chi trả chế độ bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp, bảo hiểm y tế khi yêu cầu chi trả không đúng quy định của pháp luật; trường hợp từ chối chi trả phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"5. Kiểm tra việc thực hiện pháp luật về bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, việc thực hiện hợp đồng khám bệnh, chữa bệnh bảo hiểm y tế; việc đóng, chi trả bảo hiểm thất nghiệp, bảo hiểm y tế. Thanh tra chuyên ngành về đóng bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"6. Kiến nghị với cơ quan nhà nước có thẩm quyền xây dựng, sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế và quản lý quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế."},{"k":"p","t":"7. Xử lý vi phạm pháp luật hoặc kiến nghị cơ quan nhà nước có thẩm quyền xử lý vi phạm pháp luật về bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp, bảo hiểm y tế."}]},{"id":"luat-41_18","no":18,"code":"Điều 18","title":"Điều 18. Trách nhiệm của cơ quan bảo hiểm xã hội","shortTitle":"Trách nhiệm của cơ quan bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tuyên truyền, phổ biến, giải đáp, tư vấn chính sách, pháp luật về bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp, bảo hiểm y tế; xây dựng chiến lược phát triển ngành bảo hiểm xã hội, chiến lược đầu tư dài hạn trình cơ quan có thẩm quyền phê duyệt; xây dựng phương án đầu tư hằng năm trình Hội đồng quản lý bảo hiểm xã hội quyết định; tổ chức đánh giá và công bố mức độ hài lòng của tổ chức, cá nhân đối với việc thực hiện chính sách, pháp luật về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"2. Ban hành mẫu sổ bảo hiểm xã hội, mẫu hồ sơ bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp sau khi có ý kiến thống nhất của Bộ Lao động - Thương binh và Xã hội."},{"k":"p","t":"3. Tổ chức thực hiện thu, chi bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp, bảo hiểm y tế theo quy định của pháp luật."},{"k":"p","t":"4. Tiếp nhận hồ sơ tham gia bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp, bảo hiểm y tế và cấp sổ bảo hiểm xã hội, thẻ bảo hiểm y tế cho người lao động."},{"k":"p","t":"5. Tiếp nhận hồ sơ đề nghị hưởng và giải quyết hưởng chế độ bảo hiểm xã hội; tổ chức trả lương hưu, trợ cấp bảo hiểm xã hội, bảo hiểm thất nghiệp đầy đủ, thuận tiện và đúng thời hạn."},{"k":"p","t":"6. Xác nhận thời gian đóng bảo hiểm xã hội, bảo hiểm thất nghiệp cho từng người lao động; cung cấp đầy đủ và kịp thời thông tin về việc đóng, quyền được hưởng chế độ, thủ tục thực hiện bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện khi người lao động, người sử dụng lao động hoặc tổ chức công đoàn yêu cầu."},{"k":"p","t":"7. Ứng dụng công nghệ thông tin, thực hiện cải cách thủ tục hành chính bảo đảm công khai, minh bạch, đơn giản, thuận tiện cho người tham gia và người thụ hưởng chế độ bảo hiểm xã hội; lưu trữ hồ sơ của người tham gia và người thụ hưởng chế độ bảo hiểm xã hội, bảo hiểm thất nghiệp theo quy định của pháp luật."},{"k":"p","t":"8. Quản lý, sử dụng quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế theo quy định của pháp luật."},{"k":"p","t":"9. Thực hiện các biện pháp bảo toàn và tăng trưởng quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế theo quyết định của Hội đồng quản lý bảo hiểm xã hội."},{"k":"p","t":"10. Thực hiện công tác thống kê, kế toán tài chính về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"11. Tập huấn và hướng dẫn nghiệp vụ về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"12. Thực hiện chế độ báo cáo như sau:"},{"k":"p","t":"a) Định kỳ 03 tháng, báo cáo Hội đồng quản lý bảo hiểm xã hội tình hình thực hiện chính sách, chế độ bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế;"},{"k":"p","t":"b) Định kỳ 06 tháng, báo cáo Bộ Lao động - Thương binh và Xã hội về tình hình thực hiện chính sách, chế độ bảo hiểm xã hội bắt buộc, bảo hiểm xã hội tự nguyện, bảo hiểm thất nghiệp; báo cáo Bộ Y tế về tình hình thực hiện chính sách, chế độ bảo hiểm y tế;"},{"k":"p","t":"c) Định kỳ 06 tháng, cơ quan bảo hiểm xã hội tại địa phương báo cáo Ủy ban nhân dân cùng cấp về tình hình thực hiện chính sách, chế độ bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế trong phạm vi địa phương quản lý;"},{"k":"p","t":"d) Hằng năm, báo cáo Bộ Tài chính về tình hình quản lý và sử dụng quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế."},{"k":"p","t":"13. Định kỳ 05 năm, đánh giá và dự báo khả năng cân đối của quỹ hưu trí và tử tuất."},{"k":"p","t":"14. Cung cấp tài liệu, thông tin liên quan đến việc thực hiện chính sách, pháp luật về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế theo yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"15. Giải quyết khiếu nại, tố cáo về việc thực hiện bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế theo quy định của Luật này và quy định khác của pháp luật có liên quan."},{"k":"p","t":"16. Thực hiện hợp tác quốc tế về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"17. Xác định và theo dõi người lao động, người sử dụng lao động thuộc đối tượng tham gia bảo hiểm xã hội theo quy định tại Điều 30 của Luật này."},{"k":"p","t":"18. Chủ trì xây dựng, quản lý, cập nhật, duy trì cơ sở dữ liệu quốc gia về bảo hiểm và khai thác, sử dụng, chia sẻ dữ liệu trong cơ sở dữ liệu quốc gia về bảo hiểm theo quy định của pháp luật."}]},{"id":"luat-41_19","no":19,"code":"Điều 19","title":"Điều 19. Hội đồng quản lý bảo hiểm xã hội","shortTitle":"Hội đồng quản lý bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hội đồng quản lý bảo hiểm xã hội được tổ chức ở cấp quốc gia có trách nhiệm giúp Chính phủ, Thủ tướng Chính phủ chỉ đạo, giám sát hoạt động của cơ quan bảo hiểm xã hội và tư vấn chính sách bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế."},{"k":"p","t":"2. Hội đồng quản lý bảo hiểm xã hội gồm đại diện Tổng Liên đoàn Lao động Việt Nam, tổ chức đại diện người sử dụng lao động ở trung ương, Bộ Tài chính, Bộ Lao động - Thương binh và Xã hội, Bộ Y tế, Bộ Nội vụ, Bảo hiểm xã hội Việt Nam, Bộ Công an, Bộ Quốc phòng, Ngân hàng nhà nước Việt Nam và tổ chức, cá nhân khác có liên quan."},{"k":"p","t":"3. Hội đồng quản lý bảo hiểm xã hội có Chủ tịch, các Phó Chủ tịch và các ủy viên do Thủ tướng Chính phủ bổ nhiệm, miễn nhiệm, cách chức; nhiệm kỳ của thành viên Hội đồng quản lý bảo hiểm xã hội là 05 năm."},{"k":"p","t":"4. Chính phủ quy định về trình tự, thủ tục thành lập, chế độ làm việc, trách nhiệm, kinh phí hoạt động của Hội đồng quản lý bảo hiểm xã hội và bộ máy giúp việc của Hội đồng quản lý bảo hiểm xã hội."},{"k":"p","t":"Thành viên Hội đồng quản lý bảo hiểm xã hội chịu trách nhiệm cá nhân, bảo lưu về quyết định, ý kiến của mình khi được lấy ý kiến bằng văn bản hoặc biểu quyết thông qua đối với các quy định tại Điều 20 của Luật này."},{"k":"p","t":"Chủ tịch Hội đồng quản lý bảo hiểm xã hội báo cáo Thủ tướng Chính phủ về những vấn đề chưa thống nhất ý kiến giữa các thành viên Hội đồng quản lý bảo hiểm xã hội."}]},{"id":"luat-41_20","no":20,"code":"Điều 20","title":"Điều 20. Nhiệm vụ, quyền hạn và trách nhiệm của Hội đồng quản lý bảo hiểm xã hội","shortTitle":"Nhiệm vụ, quyền hạn và trách nhiệm của Hội đồng quản lý bảo hiểm xã hội","chuong":"Chương II — QUYỀN, TRÁCH NHIỆM CỦA CƠ QUAN, TỔ CHỨC, CÁ NHÂN VỀ BẢO HIỂM XÃ HỘI VÀ TỔ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thông qua chiến lược phát triển ngành bảo hiểm xã hội, kế hoạch dài hạn, 05 năm về thực hiện chính sách, pháp luật bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế, chiến lược đầu tư dài hạn trước khi trình cấp có thẩm quyền phê duyệt hoặc thông qua kế hoạch hằng năm về thực hiện chính sách, pháp luật bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế; giám sát, kiểm tra việc thực hiện của cơ quan bảo hiểm xã hội về các chiến lược, kế hoạch, đề án sau khi được phê duyệt."},{"k":"p","t":"2. Thông qua các báo cáo hằng năm về việc thực hiện chính sách, pháp luật bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế; tình hình quản lý và sử dụng các quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế trước khi cơ quan bảo hiểm xã hội trình cơ quan có thẩm quyền."},{"k":"p","t":"3. Quyết định và chịu trách nhiệm trước Chính phủ về danh mục đầu tư, cơ cấu đầu tư và phương thức đầu tư cụ thể của các quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế trên cơ sở đề nghị của cơ quan bảo hiểm xã hội."},{"k":"p","t":"4. Thông qua các nội dung sau đây:"},{"k":"p","t":"a) Đề án, phương án bảo toàn và tăng trưởng các quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế;"},{"k":"p","t":"b) Dự toán hằng năm về thu, chi các quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế; mức chi tổ chức và hoạt động bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế; báo cáo quyết toán về chi tổ chức và hoạt động bảo hiểm xã hội; chiến lược đầu tư dài hạn trước khi cơ quan bảo hiểm xã hội trình cơ quan có thẩm quyền;"},{"k":"p","t":"c) Phương án đầu tư hằng năm."},{"k":"p","t":"5. Kiến nghị cơ quan nhà nước có thẩm quyền xây dựng, sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm xã hội, bảo hiểm thất nghiệp, bảo hiểm y tế, chiến lược phát triển bảo hiểm xã hội, kiện toàn hệ thống tổ chức cơ quan bảo hiểm xã hội, cơ chế quản lý và sử dụng quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp, quỹ bảo hiểm y tế."},{"k":"p","t":"6. Hằng năm, báo cáo Chính phủ, Thủ tướng Chính phủ về kết quả hoạt động, tình hình thực hiện các nhiệm vụ, quyền hạn theo quy định của Luật này."},{"k":"p","t":"7. Thực hiện nhiệm vụ, quyền hạn khác do Chính phủ, Thủ tướng Chính phủ giao."}]},{"id":"luat-41_21","no":21,"code":"Điều 21","title":"Điều 21. Đối tượng và điều kiện hưởng trợ cấp hưu trí xã hội","shortTitle":"Đối tượng và điều kiện hưởng trợ cấp hưu trí xã hội","chuong":"Chương III — TRỢ CẤP HƯU TRÍ XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Công dân Việt Nam được hưởng trợ cấp hưu trí xã hội khi có đủ các điều kiện sau đây:"},{"k":"p","t":"a) Từ đủ 75 tuổi trở lên;"},{"k":"p","t":"b) Không hưởng lương hưu hoặc trợ cấp bảo hiểm xã hội hằng tháng, trừ trường hợp khác theo quy định của Chính phủ;"},{"k":"p","t":"c) Có văn bản đề nghị hưởng trợ cấp hưu trí xã hội."},{"k":"p","t":"2. Công dân Việt Nam từ đủ 70 tuổi đến dưới 75 tuổi thuộc hộ nghèo, hộ cận nghèo và đáp ứng đủ điều kiện quy định tại điểm b và điểm c khoản 1 Điều này thì được hưởng trợ cấp hưu trí xã hội."},{"k":"p","t":"3. Ủy ban Thường vụ Quốc hội quyết định điều chỉnh giảm dần độ tuổi hưởng trợ cấp hưu trí xã hội trên cơ sở đề nghị của Chính phủ phù hợp với điều kiện phát triển kinh tế - xã hội và khả năng của ngân sách nhà nước từng thời kỳ."},{"k":"p","t":"4. Chính phủ quy định chi tiết khoản 2 Điều này."}]},{"id":"luat-41_22","no":22,"code":"Điều 22","title":"Điều 22. Các chế độ, trình tự, thủ tục thực hiện trợ cấp hưu trí xã hội","shortTitle":"Các chế độ, trình tự, thủ tục thực hiện trợ cấp hưu trí xã hội","chuong":"Chương III — TRỢ CẤP HƯU TRÍ XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Mức trợ cấp hưu trí xã hội hằng tháng do Chính phủ quy định phù hợp với điều kiện phát triển kinh tế - xã hội và khả năng của ngân sách nhà nước từng thời kỳ. Định kỳ 03 năm, Chính phủ thực hiện rà soát, xem xét việc điều chỉnh mức trợ cấp hưu trí xã hội."},{"k":"p","t":"Tùy theo điều kiện kinh tế - xã hội, khả năng cân đối ngân sách, huy động các nguồn lực xã hội, Ủy ban nhân dân cấp tỉnh trình Hội đồng nhân dân cùng cấp quyết định hỗ trợ thêm cho người hưởng trợ cấp hưu trí xã hội."},{"k":"p","t":"2. Trường hợp đối tượng quy định tại Điều 21 của Luật này đồng thời thuộc đối tượng hưởng trợ cấp xã hội hằng tháng thì được hưởng chế độ trợ cấp cao hơn."},{"k":"p","t":"3. Người đang hưởng trợ cấp hưu trí xã hội hằng tháng được ngân sách nhà nước đóng bảo hiểm y tế theo quy định của pháp luật về bảo hiểm y tế, khi chết thì tổ chức, cá nhân lo mai táng được nhận hỗ trợ chi phí mai táng theo quy định của pháp luật về người cao tuổi."},{"k":"p","t":"4. Chính phủ quy định trình tự, thủ tục thực hiện trợ cấp hưu trí xã hội."}]},{"id":"luat-41_23","no":23,"code":"Điều 23","title":"Điều 23. Chế độ đối với người lao động không đủ điều kiện hưởng lương hưu và chưa đủ tuổi hưởng trợ cấp hưu trí xã hội","shortTitle":"Chế độ đối với người lao động không đủ điều kiện hưởng lương hưu và chưa đủ tuổi hưởng trợ cấp hưu trí xã hội","chuong":"Chương III — TRỢ CẤP HƯU TRÍ XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Công dân Việt Nam đủ tuổi nghỉ hưu có thời gian đóng bảo hiểm xã hội nhưng không đủ điều kiện hưởng lương hưu theo quy định của pháp luật và chưa đủ điều kiện hưởng trợ cấp hưu trí xã hội theo quy định tại Điều 21 của Luật này, nếu không hưởng bảo hiểm xã hội một lần và không bảo lưu mà có yêu cầu thì được hưởng trợ cấp hằng tháng từ chính khoản đóng của mình theo quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Thời gian hưởng, mức hưởng trợ cấp hằng tháng được xác định căn cứ vào thời gian đóng, căn cứ đóng bảo hiểm xã hội của người lao động."},{"k":"p","t":"3. Mức trợ cấp hằng tháng thấp nhất bằng mức trợ cấp hưu trí xã hội hằng tháng quy định tại khoản 1 Điều 22 của Luật này."},{"k":"p","t":"Trường hợp tổng số tiền tính theo thời gian đóng, căn cứ đóng bảo hiểm xã hội của người lao động cao hơn số tiền tính mức trợ cấp hằng tháng bằng mức trợ cấp hưu trí xã hội tại thời điểm giải quyết hưởng cho khoảng thời gian từ khi đủ tuổi nghỉ hưu đến khi đủ tuổi hưởng trợ cấp hưu trí xã hội thì người lao động được tính để hưởng trợ cấp hằng tháng với mức cao hơn."},{"k":"p","t":"Trường hợp tổng số tiền tính theo thời gian đóng, căn cứ đóng bảo hiểm xã hội không đủ để người lao động hưởng trợ cấp hằng tháng cho đến khi đủ tuổi hưởng trợ cấp hưu trí xã hội, nếu người lao động có nguyện vọng thì được đóng một lần cho phần còn thiếu để hưởng cho đến khi đủ tuổi hưởng trợ cấp hưu trí xã hội."},{"k":"p","t":"4. Mức trợ cấp hằng tháng quy định tại khoản 3 Điều này được áp dụng việc điều chỉnh theo quy định tại Điều 67 của Luật này."},{"k":"p","t":"5. Trường hợp người đang hưởng trợ cấp hằng tháng chết thì thân nhân được hưởng trợ cấp một lần cho những tháng chưa nhận và được hưởng một lần trợ cấp mai táng nếu đủ điều kiện quy định tại điểm a khoản 1 Điều 85 hoặc điểm a khoản 1 Điều 109 của Luật này."},{"k":"p","t":"6. Người đang trong thời gian hưởng trợ cấp hằng tháng thì được ngân sách nhà nước đóng bảo hiểm y tế."},{"k":"p","t":"7. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_24","no":24,"code":"Điều 24","title":"Điều 24. Trình tự, thủ tục thực hiện chế độ đối với người lao động không đủ điều kiện hưởng lương hưu và chưa đủ tuổi hưởng trợ cấp hưu trí xã hội","shortTitle":"Trình tự, thủ tục thực hiện chế độ đối với người lao động không đủ điều kiện hưởng lương hưu và chưa đủ tuổi hưởng trợ cấp hưu trí xã hội","chuong":"Chương III — TRỢ CẤP HƯU TRÍ XÃ HỘI","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại khoản 1 Điều 23 của Luật này gửi hồ sơ đến cơ quan bảo hiểm xã hội. Hồ sơ bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội;"},{"k":"p","t":"b) Văn bản đề nghị hưởng trợ cấp hằng tháng."},{"k":"p","t":"2. Trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định tại khoản 1 Điều này, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"BẮT BUỘC VÀ BẢO HIỂM XÃ HỘI TỰ NGUYỆN"},{"k":"p","t":"ĐĂNG KÝ THAM GIA BẢO HIỂM XÃ HỘI BẮT BUỘC VÀ"},{"k":"p","t":"BẢO HIỂM XÃ HỘI TỰ NGUYỆN"}]},{"id":"luat-41_25","no":25,"code":"Điều 25","title":"Điều 25. Sổ bảo hiểm xã hội","shortTitle":"Sổ bảo hiểm xã hội","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Sổ bảo hiểm xã hội được cấp cho từng người lao động, trong đó chứa đựng thông tin cơ bản về nhân thân, ghi nhận việc đóng, hưởng, giải quyết các chế độ bảo hiểm xã hội và các thông tin cần thiết khác có liên quan."},{"k":"p","t":"2. Sổ bảo hiểm xã hội được cấp bằng bản điện tử, bản giấy và có giá trị pháp lý như nhau."},{"k":"p","t":"Chậm nhất là ngày 01 tháng 01 năm 2026, thực hiện cấp sổ bảo hiểm xã hội bằng bản điện tử; sổ bảo hiểm xã hội bằng bản giấy được cấp khi người tham gia bảo hiểm xã hội yêu cầu."},{"k":"p","t":"3. Dữ liệu về sổ bảo hiểm xã hội được cập nhật chính xác, kịp thời, đối chiếu thông tin và quản lý theo quy định."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_26","no":26,"code":"Điều 26","title":"Điều 26. Giao dịch điện tử trong lĩnh vực bảo hiểm xã hội","shortTitle":"Giao dịch điện tử trong lĩnh vực bảo hiểm xã hội","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Cơ quan, tổ chức, cá nhân có đủ điều kiện thực hiện giao dịch điện tử trong lĩnh vực bảo hiểm xã hội thì thực hiện giao dịch điện tử với cơ quan bảo hiểm xã hội theo quy định của Luật này và pháp luật về giao dịch điện tử."},{"k":"p","t":"2. Hồ sơ, chứng từ sử dụng trong giao dịch điện tử thực hiện phù hợp với quy định của pháp luật về giao dịch điện tử. Giao dịch điện tử trong lĩnh vực bảo hiểm xã hội quy định tại khoản 1 Điều này có giá trị pháp lý tương đương với giao dịch bằng bản giấy."},{"k":"p","t":"3. Chậm nhất là ngày 01 tháng 01 năm 2027, cơ quan bảo hiểm xã hội phải bảo đảm điều kiện để thực hiện giao dịch điện tử thuộc lĩnh vực bảo hiểm xã hội."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này và việc điều chỉnh, cắt giảm, đơn giản hóa hồ sơ, thủ tục thực hiện bảo hiểm xã hội từ giao dịch bằng bản giấy theo quy định của Luật này sang giao dịch điện tử để bảo đảm thuận tiện cho người tham gia và người thụ hưởng chế độ bảo hiểm xã hội."}]},{"id":"luat-41_27","no":27,"code":"Điều 27","title":"Điều 27. Hồ sơ đăng ký tham gia bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện","shortTitle":"Hồ sơ đăng ký tham gia bảo hiểm xã hội bắt buộc và bảo hiểm xã hội tự nguyện","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hồ sơ đăng ký tham gia bảo hiểm xã hội bắt buộc của đối tượng tham gia bảo hiểm xã hội bắt buộc, trừ đối tượng quy định tại điểm m và điểm n khoản 1 Điều 2 của Luật này bao gồm:"},{"k":"p","t":"a) Tờ khai đăng ký tham gia bảo hiểm xã hội của người sử dụng lao động kèm theo danh sách người lao động tham gia bảo hiểm xã hội;"},{"k":"p","t":"b) Tờ khai đăng ký tham gia bảo hiểm xã hội của người lao động."},{"k":"p","t":"2. Hồ sơ đăng ký tham gia bảo hiểm xã hội bắt buộc của đối tượng quy định tại điểm m và điểm n khoản 1 Điều 2 của Luật này nếu nộp qua người sử dụng lao động thì thực hiện theo quy định tại khoản 1 Điều này, nếu tự nộp thì hồ sơ là tờ khai quy định tại điểm b khoản 1 Điều này."},{"k":"p","t":"3. Hồ sơ đăng ký tham gia bảo hiểm xã hội tự nguyện là tờ khai đăng ký tham gia bảo hiểm xã hội của người tham gia bảo hiểm xã hội tự nguyện."}]},{"id":"luat-41_28","no":28,"code":"Điều 28","title":"Điều 28. Đăng ký tham gia bảo hiểm xã hội và cấp sổ bảo hiểm xã hội","shortTitle":"Đăng ký tham gia bảo hiểm xã hội và cấp sổ bảo hiểm xã hội","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động có trách nhiệm kê khai và nộp hồ sơ tham gia bảo hiểm xã hội bắt buộc của người lao động theo quy định tại khoản 1 và khoản 2 Điều 27 của Luật này cho cơ quan bảo hiểm xã hội trong thời hạn 30 ngày kể từ ngày người lao động thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc, trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Đối tượng quy định tại điểm m và điểm n khoản 1 Điều 2 của Luật này nếu tự nộp thì nộp hồ sơ là tờ khai quy định tại điểm b khoản 1 Điều 27 của Luật này cho cơ quan bảo hiểm xã hội trong thời hạn 30 ngày kể từ ngày thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc."},{"k":"p","t":"3. Người tham gia bảo hiểm xã hội tự nguyện nộp hồ sơ quy định tại khoản 3 Điều 27 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"4. Trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm cấp sổ bảo hiểm xã hội; trường hợp không cấp sổ bảo hiểm xã hội thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"5. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_29","no":29,"code":"Điều 29","title":"Điều 29. Điều chỉnh thông tin đăng ký kê khai tham gia bảo hiểm xã hội","shortTitle":"Điều chỉnh thông tin đăng ký kê khai tham gia bảo hiểm xã hội","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Khi thông tin đăng ký kê khai tham gia bảo hiểm xã hội thay đổi thì người đăng ký kê khai theo quy định tại Điều 28 của Luật này nộp tờ khai điều chỉnh thông tin kèm theo bản sao giấy tờ có liên quan đến việc điều chỉnh thông tin cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ tờ khai và giấy tờ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm điều chỉnh thông tin tham gia bảo hiểm xã hội của người tham gia; trường hợp không thực hiện điều chỉnh thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI BẮT BUỘC"},{"k":"p","t":"VÀ BẢO HIỂM XÃ HỘI TỰ NGUYỆN"}]},{"id":"luat-41_30","no":30,"code":"Điều 30","title":"Điều 30. Xác định đối tượng tham gia bảo hiểm xã hội bắt buộc và phát triển đối tượng tham gia bảo hiểm xã hội tự nguyện","shortTitle":"Xác định đối tượng tham gia bảo hiểm xã hội bắt buộc và phát triển đối tượng tham gia bảo hiểm xã hội tự nguyện","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Cơ quan bảo hiểm xã hội chủ trì, phối hợp với cơ quan, tổ chức, cá nhân có liên quan trong việc xác định và theo dõi đối tượng tham gia bảo hiểm xã hội bắt buộc quy định tại Điều 2 của Luật này; đôn đốc và hướng dẫn việc lập hồ sơ đăng ký tham gia bảo hiểm xã hội bắt buộc."},{"k":"p","t":"Bộ, cơ quan ngang Bộ, Ủy ban nhân dân các cấp phối hợp với cơ quan bảo hiểm xã hội để tổ chức việc xác định đối tượng tham gia bảo hiểm xã hội bắt buộc."},{"k":"p","t":"2. Cơ quan bảo hiểm xã hội chủ trì, phối hợp với cơ quan, tổ chức, cá nhân có liên quan vận động để phát triển đối tượng tham gia bảo hiểm xã hội tự nguyện."},{"k":"p","t":"3. Các cơ quan chủ quản cơ sở dữ liệu quốc gia và cơ sở dữ liệu chuyên ngành về lao động, dân cư, thuế, đăng ký doanh nghiệp có trách nhiệm kết nối, chia sẻ thông tin, dữ liệu liên quan đến người tham gia và người thuộc diện tham gia bảo hiểm xã hội với cơ quan bảo hiểm xã hội theo quy định của Chính phủ."}]},{"id":"luat-41_31","no":31,"code":"Điều 31","title":"Điều 31. Căn cứ đóng bảo hiểm xã hội","shortTitle":"Căn cứ đóng bảo hiểm xã hội","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc được quy định như sau:"},{"k":"p","t":"a) Người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định thì tiền lương làm căn cứ đóng bảo hiểm xã hội là tiền lương tháng theo chức vụ, chức danh, ngạch, bậc, cấp bậc quân hàm và các khoản phụ cấp chức vụ, phụ cấp thâm niên vượt khung, phụ cấp thâm niên nghề, hệ số chênh lệch bảo lưu lương (nếu có);"},{"k":"p","t":"b) Người lao động thuộc đối tượng thực hiện chế độ tiền lương do người sử dụng lao động quyết định thì tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc là tiền lương tháng, bao gồm mức lương theo công việc hoặc chức danh, phụ cấp lương và các khoản bổ sung khác được thỏa thuận trả thường xuyên, ổn định trong mỗi kỳ trả lương."},{"k":"p","t":"Trường hợp người lao động ngừng việc vẫn hưởng tiền lương tháng bằng hoặc cao hơn tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp nhất thì đóng theo tiền lương được hưởng trong thời gian ngừng việc;"},{"k":"p","t":"c) Đối tượng quy định tại các điểm đ, e và k khoản 1 Điều 2 của Luật này thì tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc do Chính phủ quy định;"},{"k":"p","t":"d) Đối tượng quy định tại các điểm g, h, m và n khoản 1 Điều 2 của Luật này được lựa chọn tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc nhưng thấp nhất bằng mức tham chiếu và cao nhất bằng 20 lần mức tham chiếu tại thời điểm đóng."},{"k":"p","t":"Sau ít nhất 12 tháng thực hiện đóng bảo hiểm xã hội theo tiền lương làm căn cứ đóng bảo hiểm xã hội đã lựa chọn thì người lao động được lựa chọn lại tiền lương làm căn cứ đóng bảo hiểm xã hội;"},{"k":"p","t":"đ) Tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp nhất bằng mức tham chiếu và cao nhất bằng 20 lần mức tham chiếu tại thời điểm đóng."},{"k":"p","t":"2. Thu nhập làm căn cứ đóng bảo hiểm xã hội tự nguyện thấp nhất bằng mức chuẩn hộ nghèo của khu vực nông thôn và cao nhất bằng 20 lần mức tham chiếu tại thời điểm đóng."},{"k":"p","t":"3. Chính phủ quy định chi tiết điểm b khoản 1 Điều này; quy định việc truy thu, truy đóng bảo hiểm xã hội bắt buộc."}]},{"id":"luat-41_32","no":32,"code":"Điều 32","title":"Điều 32. Tỷ lệ đóng bảo hiểm xã hội","shortTitle":"Tỷ lệ đóng bảo hiểm xã hội","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tỷ lệ đóng bảo hiểm xã hội bắt buộc bao gồm:"},{"k":"p","t":"a) 3% tiền lương làm căn cứ đóng bảo hiểm xã hội vào quỹ ốm đau và thai sản;"},{"k":"p","t":"b) 22% tiền lương làm căn cứ đóng bảo hiểm xã hội vào quỹ hưu trí và tử tuất."},{"k":"p","t":"2. Tỷ lệ đóng bảo hiểm xã hội tự nguyện bằng 22% thu nhập làm căn cứ đóng bảo hiểm xã hội vào quỹ hưu trí và tử tuất."}]},{"id":"luat-41_33","no":33,"code":"Điều 33","title":"Điều 33. Mức đóng, phương thức và thời hạn đóng bảo hiểm xã hội bắt buộc của người lao động","shortTitle":"Mức đóng, phương thức và thời hạn đóng bảo hiểm xã hội bắt buộc của người lao động","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Mức đóng và phương thức đóng của đối tượng quy định tại các điểm a, b, c, d, i, k và l khoản 1 và khoản 2 Điều 2 của Luật này được quy định như sau:"},{"k":"p","t":"a) Mức đóng hằng tháng bằng 8% tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất;"},{"k":"p","t":"b) Đóng cho cơ quan bảo hiểm xã hội theo phương thức đóng hằng tháng."},{"k":"p","t":"Trường hợp đối tượng quy định tại điểm a khoản 1 Điều 2 của Luật này hưởng tiền lương theo sản phẩm, theo khoán tại doanh nghiệp, tổ hợp tác, hợp tác xã, liên hiệp hợp tác xã, hộ kinh doanh hoạt động trong lĩnh vực nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp thì đóng theo phương thức đóng hằng tháng, 03 tháng hoặc 06 tháng một lần."},{"k":"p","t":"2. Mức đóng, phương thức và thời hạn đóng của đối tượng quy định tại điểm g khoản 1 Điều 2 của Luật này được quy định như sau:"},{"k":"p","t":"a) Mức đóng hằng tháng bằng 22% tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất;"},{"k":"p","t":"b) Đóng cho cơ quan bảo hiểm xã hội theo phương thức đóng 03 tháng, 06 tháng, 12 tháng một lần hoặc đóng trước một lần cho khoảng thời gian của hợp đồng người lao động Việt Nam đi làm việc ở nước ngoài; thời hạn đóng chậm nhất là ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng."},{"k":"p","t":"Trường hợp người lao động được gia hạn hợp đồng hoặc ký hợp đồng lao động mới ngay tại nước tiếp nhận lao động thì thực hiện đóng bảo hiểm xã hội theo phương thức quy định tại điểm này cho thời gian được gia hạn hoặc ký hợp đồng lao động mới hoặc truy đóng sau khi về nước."},{"k":"p","t":"3. Mức đóng, phương thức và thời hạn đóng của đối tượng quy định tại điểm h khoản 1 Điều 2 của Luật này được quy định như sau:"},{"k":"p","t":"a) Mức đóng hằng tháng bằng 22% tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất;"},{"k":"p","t":"b) Đóng qua cơ quan, tổ chức quản lý cán bộ, công chức, viên chức, người lao động trước khi người này được cử làm thành viên cơ quan đại diện nước Cộng hòa xã hội chủ nghĩa Việt Nam ở nước ngoài theo phương thức đóng hằng tháng, 03 tháng hoặc 06 tháng một lần; thời hạn đóng chậm nhất là ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng."},{"k":"p","t":"4. Mức đóng, phương thức và thời hạn đóng của đối tượng quy định điểm m và điểm n khoản 1 Điều 2 của Luật này được quy định như sau:"},{"k":"p","t":"a) Mức đóng hằng tháng bằng 3% tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc vào quỹ ốm đau và thai sản, 22% tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất;"},{"k":"p","t":"b) Đóng trực tiếp cho cơ quan bảo hiểm xã hội hoặc đóng qua hộ kinh doanh, doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã tham gia quản lý theo phương thức đóng hằng tháng, 03 tháng hoặc 06 tháng một lần; thời hạn đóng chậm nhất là ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng."},{"k":"p","t":"5. Đối tượng quy định tại các điểm a, b, c, d và i khoản 1 và khoản 2 Điều 2 của Luật này mà không hưởng tiền lương từ 14 ngày làm việc trở lên trong tháng thì người lao động không phải đóng bảo hiểm xã hội tháng đó, trừ trường hợp người sử dụng lao động và người lao động có thỏa thuận về việc có đóng bảo hiểm xã hội cho người lao động tháng đó với căn cứ đóng bằng căn cứ đóng bảo hiểm xã hội tháng gần nhất."},{"k":"p","t":"Đối tượng quy định tại các điểm đ, e và k khoản 1 Điều 2 của Luật này mà không làm việc từ 14 ngày làm việc trở lên trong tháng thì thực hiện theo quy định của Chính phủ."},{"k":"p","t":"6. Trường hợp trong tháng đầu làm việc hoặc trong tháng đầu trở lại làm việc mà người lao động nghỉ việc hưởng chế độ ốm đau từ 14 ngày làm việc trở lên thì vẫn phải đóng bảo hiểm xã hội của tháng đó."},{"k":"p","t":"7. Trường hợp thời gian đóng bảo hiểm xã hội bắt buộc còn thiếu tối đa 06 tháng để đủ điều kiện hưởng lương hưu hoặc trợ cấp tuất hằng tháng thì người lao động hoặc thân nhân của người lao động được đóng tiếp một lần cho số tháng còn thiếu với mức đóng hằng tháng bằng tổng mức đóng của người lao động và người sử dụng lao động trước khi người lao động nghỉ việc hoặc chết vào quỹ hưu trí và tử tuất. Thời gian đóng tiếp không được tính là thời gian làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành hoặc thời gian làm việc ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn."},{"k":"p","t":"Trường hợp người lao động chấm dứt đóng bảo hiểm xã hội bắt buộc mà thời gian đóng bảo hiểm xã hội còn thiếu trên 06 tháng để đủ điều kiện hưởng lương hưu thì có quyền đóng tiếp bảo hiểm xã hội tự nguyện."},{"k":"p","t":"8. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết khoản 7 Điều này."}]},{"id":"luat-41_34","no":34,"code":"Điều 34","title":"Điều 34. Mức đóng, phương thức và thời hạn đóng bảo hiểm xã hội bắt buộc của người sử dụng lao động","shortTitle":"Mức đóng, phương thức và thời hạn đóng bảo hiểm xã hội bắt buộc của người sử dụng lao động","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người sử dụng lao động hằng tháng đóng bảo hiểm xã hội bắt buộc tính trên tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc của đối tượng quy định tại các điểm a, b, c, d, i, k và l khoản 1 và khoản 2 Điều 2 của Luật này như sau:"},{"k":"p","t":"a) 3% vào quỹ ốm đau và thai sản;"},{"k":"p","t":"b) 14% vào quỹ hưu trí và tử tuất."},{"k":"p","t":"2. Người sử dụng lao động hằng tháng đóng 22% tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc vào quỹ hưu trí và tử tuất cho đối tượng quy định tại điểm đ và điểm e khoản 1 Điều 2 của Luật này."},{"k":"p","t":"3. Người sử dụng lao động không phải đóng bảo hiểm xã hội cho đối tượng theo quy định tại khoản 5 Điều 33 của Luật này, trừ trường hợp người sử dụng lao động có thỏa thuận với người lao động về việc có đóng bảo hiểm xã hội cho người lao động tháng đó với căn cứ đóng bằng căn cứ đóng bảo hiểm xã hội tháng gần nhất."},{"k":"p","t":"4. Phương thức, thời hạn đóng bảo hiểm xã hội bắt buộc chậm nhất đối với người sử dụng lao động được quy định như sau:"},{"k":"p","t":"a) Ngày cuối cùng của tháng tiếp theo đối với phương thức đóng hằng tháng;"},{"k":"p","t":"b) Ngày cuối cùng của tháng tiếp theo ngay sau chu kỳ đóng đối với phương thức đóng 03 tháng một lần hoặc 06 tháng một lần."}]},{"id":"luat-41_35","no":35,"code":"Điều 35","title":"Điều 35. Đôn đốc thực hiện trách nhiệm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","shortTitle":"Đôn đốc thực hiện trách nhiệm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối với trường hợp quy định tại khoản 1 Điều 38 của Luật này, cơ quan bảo hiểm xã hội có trách nhiệm phát hiện và đôn đốc bằng văn bản."},{"k":"p","t":"Khi phát hiện người sử dụng lao động chậm đóng thuộc các trường hợp quy định tại khoản 2 và khoản 3 Điều 38 của Luật này hoặc trốn đóng, cơ quan bảo hiểm xã hội có trách nhiệm kịp thời đôn đốc bằng văn bản."},{"k":"p","t":"2. Cơ quan bảo hiểm xã hội công khai trên Cổng thông tin điện tử của cơ quan bảo hiểm xã hội về việc người sử dụng lao động chậm đóng, trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp."},{"k":"p","t":"3. Cơ quan bảo hiểm xã hội gửi thông tin về người sử dụng lao động chậm đóng, trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp đến cơ quan quản lý nhà nước về bảo hiểm xã hội, bảo hiểm thất nghiệp và cơ quan thanh tra có liên quan để xem xét xử lý theo thẩm quyền."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_36","no":36,"code":"Điều 36","title":"Điều 36. Mức đóng, phương thức và thời hạn đóng bảo hiểm xã hội của người tham gia bảo hiểm xã hội tự nguyện","shortTitle":"Mức đóng, phương thức và thời hạn đóng bảo hiểm xã hội của người tham gia bảo hiểm xã hội tự nguyện","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại khoản 4 Điều 2 của Luật này, hằng tháng đóng bằng 22% mức thu nhập làm căn cứ đóng bảo hiểm xã hội tự nguyện vào quỹ hưu trí và tử tuất."},{"k":"p","t":"Căn cứ vào điều kiện phát triển kinh tế - xã hội, khả năng ngân sách nhà nước từng thời kỳ, Chính phủ quy định mức hỗ trợ, đối tượng hỗ trợ và thời gian thực hiện chính sách hỗ trợ tiền đóng bảo hiểm xã hội cho người tham gia bảo hiểm xã hội tự nguyện."},{"k":"p","t":"2. Người tham gia bảo hiểm xã hội tự nguyện được chọn một trong các phương thức đóng sau đây:"},{"k":"p","t":"a) Hằng tháng;"},{"k":"p","t":"b) 03 tháng một lần;"},{"k":"p","t":"c) 06 tháng một lần;"},{"k":"p","t":"d) 12 tháng một lần;"},{"k":"p","t":"đ) Một lần cho nhiều năm về sau với số tiền đóng thấp hơn số tiền đóng theo mức quy định tại khoản 1 Điều này;"},{"k":"p","t":"e) Một lần cho thời gian đóng bảo hiểm xã hội còn thiếu để đủ điều kiện hưởng lương hưu với số tiền đóng cao hơn số tiền đóng theo mức quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Thời hạn đóng bảo hiểm xã hội tự nguyện đối với người lao động được quy định như sau:"},{"k":"p","t":"a) Trong tháng đối với phương thức đóng hằng tháng;"},{"k":"p","t":"b) Trong 03 tháng đối với phương thức đóng 03 tháng một lần;"},{"k":"p","t":"c) Trong 04 tháng đầu đối với phương thức đóng 06 tháng một lần;"},{"k":"p","t":"d) Trong 07 tháng đầu đối với phương thức đóng 12 tháng một lần;"},{"k":"p","t":"đ) Tại thời điểm đăng ký phương thức đóng và mức thu nhập tháng làm căn cứ đóng đối với trường hợp quy định tại điểm đ khoản 2 Điều này;"},{"k":"p","t":"e) Tại thời điểm đăng ký phương thức đóng và mức thu nhập tháng làm căn cứ đóng đối với trường hợp quy định tại điểm e khoản 2 Điều này nhưng sớm nhất là tháng trước liền kề tháng người lao động đủ tuổi nghỉ hưu theo quy định."},{"k":"p","t":"4. Chính phủ quy định chi tiết điểm đ và điểm e khoản 2 Điều này."}]},{"id":"luat-41_37","no":37,"code":"Điều 37","title":"Điều 37. Tạm dừng đóng bảo hiểm xã hội bắt buộc","shortTitle":"Tạm dừng đóng bảo hiểm xã hội bắt buộc","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Tạm dừng đóng vào quỹ hưu trí và tử tuất được quy định như sau:"},{"k":"p","t":"a) Trong trường hợp người sử dụng lao động gặp khó khăn phải tạm dừng sản xuất, kinh doanh dẫn đến việc người lao động và người sử dụng lao động không có khả năng đóng bảo hiểm xã hội thì được tạm dừng đóng vào quỹ hưu trí và tử tuất trong thời gian tối đa 12 tháng;"},{"k":"p","t":"b) Hết thời hạn tạm dừng đóng quy định tại điểm a khoản này, người sử dụng lao động và người lao động tiếp tục đóng bảo hiểm xã hội bắt buộc và đóng bù cho thời gian tạm dừng đóng."},{"k":"p","t":"Thời hạn đóng bù chậm nhất là ngày cuối cùng của tháng tiếp theo tháng kết thúc việc tạm dừng đóng. Số tiền đóng bù bằng số tiền phải đóng của những tháng tạm dừng đóng."},{"k":"p","t":"2. Người lao động đang tham gia bảo hiểm xã hội bắt buộc mà bị tạm giam, tạm đình chỉ công việc thì người lao động và người sử dụng lao động tạm dừng đóng bảo hiểm xã hội bắt buộc; trường hợp người lao động được truy lĩnh đủ tiền lương thì người lao động và người sử dụng lao động đóng bù cho thời gian bị tạm giam, tạm đình chỉ công việc bằng số tiền phải đóng của những tháng tạm dừng đóng."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này; quy định các trường hợp khác tạm dừng đóng bảo hiểm xã hội bắt buộc."}]},{"id":"luat-41_38","no":38,"code":"Điều 38","title":"Điều 38. Chậm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","shortTitle":"Chậm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Chậm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp là hành vi của người sử dụng lao động thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"1. Chưa đóng hoặc đóng chưa đầy đủ số tiền phải đóng theo hồ sơ tham gia bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp đã đăng ký kể từ sau ngày đóng bảo hiểm xã hội chậm nhất quy định tại khoản 4 Điều 34 của Luật này hoặc kể từ sau ngày đóng bảo hiểm thất nghiệp chậm nhất theo quy định của pháp luật về bảo hiểm thất nghiệp, trừ trường hợp quy định tại điểm đ và điểm e khoản 1 Điều 39 của Luật này;"},{"k":"p","t":"2. Không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia bảo hiểm xã hội bắt buộc trong thời hạn 60 ngày kể từ ngày hết thời hạn quy định tại khoản 1 Điều 28 của Luật này;"},{"k":"p","t":"3. Không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia bảo hiểm thất nghiệp trong thời hạn 60 ngày kể từ ngày hết thời hạn phải tham gia bảo hiểm thất nghiệp theo quy định của pháp luật về bảo hiểm thất nghiệp;"},{"k":"p","t":"4. Thuộc trường hợp không bị coi là trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp theo quy định tại khoản 2 Điều 39 của Luật này."}]},{"id":"luat-41_39","no":39,"code":"Điều 39","title":"Điều 39. Trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","shortTitle":"Trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp là hành vi của người sử dụng lao động thuộc một trong các trường hợp sau đây để không đóng hoặc đóng không đầy đủ bảo hiểm xã hội, bảo hiểm thất nghiệp cho người lao động:"},{"k":"p","t":"a) Sau 60 ngày kể từ ngày hết thời hạn quy định tại khoản 1 Điều 28 của Luật này mà người sử dụng lao động không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia bảo hiểm xã hội bắt buộc;"},{"k":"p","t":"b) Sau 60 ngày kể từ ngày hết thời hạn phải tham gia bảo hiểm thất nghiệp theo quy định của pháp luật về bảo hiểm thất nghiệp mà người sử dụng lao động không đăng ký hoặc đăng ký không đầy đủ số người phải tham gia bảo hiểm thất nghiệp;"},{"k":"p","t":"c) Đăng ký tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp hơn quy định tại khoản 1 Điều 31 của Luật này;"},{"k":"p","t":"d) Đăng ký tiền lương làm căn cứ đóng bảo hiểm thất nghiệp thấp hơn quy định của pháp luật về bảo hiểm thất nghiệp;"},{"k":"p","t":"đ) Không đóng hoặc đóng không đầy đủ số tiền đã đăng ký bảo hiểm xã hội bắt buộc sau 60 ngày kể từ ngày đóng bảo hiểm xã hội bắt buộc chậm nhất quy định tại khoản 4 Điều 34 của Luật này và đã được cơ quan có thẩm quyền đôn đốc theo quy định tại Điều 35 của Luật này;"},{"k":"p","t":"e) Không đóng hoặc đóng không đầy đủ số tiền đã đăng ký bảo hiểm thất nghiệp sau 60 ngày kể từ ngày đóng bảo hiểm thất nghiệp chậm nhất theo quy định của pháp luật về bảo hiểm thất nghiệp và đã được cơ quan có thẩm quyền đôn đốc theo quy định tại Điều 35 của Luật này;"},{"k":"p","t":"g) Các trường hợp khác bị coi là trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp theo quy định của Chính phủ."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này; quy định các trường hợp thuộc khoản 1 Điều này nhưng có lý do chính đáng thì không bị coi là trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp."}]},{"id":"luat-41_40","no":40,"code":"Điều 40","title":"Điều 40. Biện pháp xử lý hành vi chậm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","shortTitle":"Biện pháp xử lý hành vi chậm đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Bắt buộc đóng đủ số tiền chậm đóng; nộp số tiền bằng 0,03%/ngày tính trên số tiền bảo hiểm xã hội, bảo hiểm thất nghiệp chậm đóng và số ngày chậm đóng vào quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"2. Xử phạt vi phạm hành chính theo quy định của pháp luật."},{"k":"p","t":"3. Không xem xét trao tặng các danh hiệu thi đua, hình thức khen thưởng."},{"k":"p","t":"4. Chính phủ quy định chi tiết khoản 1 Điều này."}]},{"id":"luat-41_41","no":41,"code":"Điều 41","title":"Điều 41. Biện pháp xử lý hành vi trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","shortTitle":"Biện pháp xử lý hành vi trốn đóng bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp","chuong":"Chương IV — ĐĂNG KÝ THAM GIA VÀ QUẢN LÝ THU, ĐÓNG BẢO HIỂM XÃ HỘI","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Bắt buộc đóng đủ số tiền trốn đóng; nộp số tiền bằng 0,03%/ngày tính trên số tiền bảo hiểm xã hội, bảo hiểm thất nghiệp trốn đóng và số ngày trốn đóng vào quỹ bảo hiểm xã hội, quỹ bảo hiểm thất nghiệp."},{"k":"p","t":"2. Xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự theo quy định của pháp luật."},{"k":"p","t":"3. Không xem xét trao tặng các danh hiệu thi đua, hình thức khen thưởng."},{"k":"p","t":"4. Chính phủ quy định chi tiết khoản 1 Điều này."},{"k":"p","t":"CHẾ ĐỘ ỐM ĐAU"}]},{"id":"luat-41_42","no":42,"code":"Điều 42","title":"Điều 42. Đối tượng, điều kiện hưởng chế độ ốm đau","shortTitle":"Đối tượng, điều kiện hưởng chế độ ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại các điểm a, b, c, d, i, k, l, m và n khoản 1 và khoản 2 Điều 2 của Luật này được hưởng chế độ ốm đau khi nghỉ việc thuộc một trong các trường hợp sau đây, trừ trường hợp quy định tại khoản 2 Điều này:"},{"k":"p","t":"a) Điều trị khi mắc bệnh mà không phải bệnh nghề nghiệp;"},{"k":"p","t":"b) Điều trị khi bị tai nạn mà không phải là tai nạn lao động;"},{"k":"p","t":"c) Điều trị khi bị tai nạn khi đi từ nơi ở đến nơi làm việc hoặc từ nơi làm việc về nơi ở theo tuyến đường và thời gian hợp lý theo quy định của pháp luật về an toàn, vệ sinh lao động;"},{"k":"p","t":"d) Điều trị, phục hồi chức năng lao động khi thương tật, bệnh tật tái phát do tai nạn lao động, bệnh nghề nghiệp hoặc do bị tai nạn quy định tại điểm c khoản này;"},{"k":"p","t":"đ) Hiến, lấy, ghép mô, bộ phận cơ thể người theo quy định của pháp luật;"},{"k":"p","t":"e) Chăm sóc con dưới 07 tuổi bị ốm đau."},{"k":"p","t":"2. Người lao động không được hưởng chế độ ốm đau trong các trường hợp sau đây:"},{"k":"p","t":"a) Tự gây thương tích hoặc tự gây tổn hại cho sức khỏe của mình;"},{"k":"p","t":"b) Sử dụng chất ma túy, tiền chất ma túy theo danh mục do Chính phủ quy định, trừ trường hợp sử dụng thuốc tiền chất hoặc thuốc dạng phối hợp có chứa tiền chất theo chỉ định của người hành nghề khám bệnh, chữa bệnh thuộc cơ sở khám bệnh, chữa bệnh;"},{"k":"p","t":"c) Trong thời gian lần đầu phải nghỉ việc để điều trị, phục hồi chức năng lao động khi bị tai nạn lao động, bệnh nghề nghiệp;"},{"k":"p","t":"d) Trong thời gian nghỉ việc theo quy định tại khoản 1 Điều này trùng với thời gian nghỉ theo quy định của pháp luật về lao động hoặc đang nghỉ việc hưởng nguyên lương theo quy định của pháp luật chuyên ngành khác hoặc đang nghỉ việc hưởng chế độ thai sản, dưỡng sức phục hồi sức khỏe theo quy định của pháp luật về bảo hiểm xã hội."}]},{"id":"luat-41_43","no":43,"code":"Điều 43","title":"Điều 43. Thời gian hưởng chế độ ốm đau","shortTitle":"Thời gian hưởng chế độ ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thời gian tối đa hưởng chế độ ốm đau trong một năm (từ ngày 01 tháng 01 đến ngày 31 tháng 12) đối với đối tượng quy định tại các điểm a, b, c, i, k, l, m và n khoản 1 và khoản 2 Điều 2 của Luật này tính theo ngày làm việc không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần và được quy định như sau:"},{"k":"p","t":"a) Làm việc trong điều kiện bình thường thì được hưởng 30 ngày nếu đã đóng bảo hiểm xã hội bắt buộc dưới 15 năm; 40 ngày nếu đã đóng từ đủ 15 năm đến dưới 30 năm; 60 ngày nếu đã đóng từ đủ 30 năm trở lên;"},{"k":"p","t":"b) Làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành hoặc làm việc ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn thì được hưởng 40 ngày nếu đã đóng bảo hiểm xã hội bắt buộc dưới 15 năm; 50 ngày nếu đã đóng từ đủ 15 năm đến dưới 30 năm; 70 ngày nếu đã đóng từ đủ 30 năm trở lên."},{"k":"p","t":"2. Hết thời hạn hưởng chế độ ốm đau quy định tại khoản 1 Điều này mà vẫn tiếp tục điều trị thì người lao động nghỉ việc do mắc bệnh thuộc danh mục bệnh cần chữa trị dài ngày do Bộ trưởng Bộ Y tế ban hành được hưởng tiếp chế độ ốm đau với mức theo quy định tại khoản 3 Điều 45 của Luật này. Thời gian nghỉ hưởng chế độ ốm đau theo quy định tại khoản này tính theo ngày làm việc không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."},{"k":"p","t":"3. Thời gian hưởng chế độ ốm đau đối với đối tượng quy định tại điểm d khoản 1 Điều 2 của Luật này căn cứ vào thời gian điều trị nội trú tại cơ sở khám bệnh, chữa bệnh và thời gian mà người lao động phải nghỉ việc theo chỉ định của người hành nghề khám bệnh, chữa bệnh thuộc cơ sở khám bệnh, chữa bệnh."}]},{"id":"luat-41_44","no":44,"code":"Điều 44","title":"Điều 44. Thời gian hưởng chế độ khi chăm sóc con ốm đau","shortTitle":"Thời gian hưởng chế độ khi chăm sóc con ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Thời gian hưởng chế độ khi chăm sóc con ốm đau trong một năm (từ ngày 01 tháng
