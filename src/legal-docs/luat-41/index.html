 01 đến ngày 31 tháng 12) cho mỗi con tối đa là 20 ngày nếu con dưới 03 tuổi; tối đa là 15 ngày nếu con từ đủ 03 tuổi đến dưới 07 tuổi."},{"k":"p","t":"2. Trường hợp cả cha và mẹ cùng tham gia bảo hiểm xã hội bắt buộc thì thời gian hưởng chế độ khi chăm sóc con ốm đau của mỗi người theo quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Thời gian nghỉ việc hưởng chế độ khi chăm sóc con ốm đau quy định tại Điều này tính theo ngày làm việc không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."}]},{"id":"luat-41_45","no":45,"code":"Điều 45","title":"Điều 45. Trợ cấp ốm đau","shortTitle":"Trợ cấp ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Mức hưởng trợ cấp ốm đau được tính theo tháng và tính trên căn cứ sau đây:"},{"k":"p","t":"a) Tiền lương làm căn cứ đóng bảo hiểm xã hội của tháng gần nhất trước tháng nghỉ việc hưởng chế độ ốm đau;"},{"k":"p","t":"b) Tiền lương làm căn cứ đóng bảo hiểm xã hội của tháng đầu tiên tham gia bảo hiểm xã hội hoặc tháng tham gia trở lại nếu phải nghỉ việc hưởng chế độ ốm đau ngay trong tháng đầu tiên tham gia hoặc tháng tham gia trở lại."},{"k":"p","t":"2. Mức hưởng trợ cấp ốm đau của người lao động quy định tại khoản 1 Điều 43 và Điều 44 của Luật này bằng 75% tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Mức hưởng trợ cấp ốm đau của người lao động quy định tại khoản 2 Điều 43 của Luật này được tính như sau:"},{"k":"p","t":"a) Bằng 65% tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại khoản 1 Điều này nếu đã đóng bảo hiểm xã hội bắt buộc từ đủ 30 năm trở lên;"},{"k":"p","t":"b) Bằng 55% tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại khoản 1 Điều này nếu đã đóng bảo hiểm xã hội bắt buộc từ đủ 15 năm đến dưới 30 năm;"},{"k":"p","t":"c) Bằng 50% tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại khoản 1 Điều này nếu đã đóng bảo hiểm xã hội bắt buộc dưới 15 năm."},{"k":"p","t":"4. Mức hưởng trợ cấp ốm đau của người lao động quy định tại khoản 3 Điều 43 của Luật này bằng 100% tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại khoản 1 Điều này."},{"k":"p","t":"5. Mức hưởng trợ cấp ốm đau một ngày được tính bằng mức hưởng trợ cấp ốm đau theo tháng chia cho 24 ngày. Mức hưởng trợ cấp ốm đau nửa ngày được tính bằng một nửa mức hưởng trợ cấp ốm đau một ngày."},{"k":"p","t":"Khi tính mức hưởng trợ cấp ốm đau đối với người lao động nghỉ việc hưởng chế độ ốm đau không trọn ngày thì trường hợp nghỉ việc dưới nửa ngày được tính là nửa ngày; từ nửa ngày đến dưới một ngày được tính là một ngày."},{"k":"p","t":"6. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết về ngày làm việc; quy định việc tính, việc xác định điều kiện đối với từng trường hợp để giải quyết chế độ ốm đau."}]},{"id":"luat-41_46","no":46,"code":"Điều 46","title":"Điều 46. Dưỡng sức, phục hồi sức khoẻ sau khi ốm đau","shortTitle":"Dưỡng sức, phục hồi sức khoẻ sau khi ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người lao động đã nghỉ việc hưởng chế độ ốm đau từ đủ 30 ngày trở lên trong một năm, trong khoảng thời gian 30 ngày kể từ ngày hết thời gian nghỉ việc hưởng chế độ ốm đau mà sức khỏe chưa phục hồi thì được nghỉ dưỡng sức, phục hồi sức khỏe tối đa 10 ngày trong một năm (từ ngày 01 tháng 01 đến ngày 31 tháng 12)."},{"k":"p","t":"Thời gian nghỉ dưỡng sức, phục hồi sức khỏe liên tục bao gồm cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần. Người lao động đủ điều kiện nghỉ dưỡng sức, phục hồi sức khỏe trong năm nào thì thời gian nghỉ việc hưởng dưỡng sức, phục hồi sức khỏe được tính cho năm đó. Trường hợp có thời gian nghỉ dưỡng sức, phục hồi sức khỏe từ cuối năm trước chuyển tiếp sang đầu năm sau thì thời gian nghỉ đó được tính cho năm trước."},{"k":"p","t":"2. Thời gian nghỉ dưỡng sức, phục hồi sức khỏe do người sử dụng lao động và Ban Chấp hành công đoàn cơ sở quyết định; trường hợp hai bên có ý kiến khác nhau thì người sử dụng lao động quyết định số ngày nghỉ trên cơ sở đề nghị của Ban Chấp hành công đoàn cơ sở, trường hợp đơn vị sử dụng lao động chưa có công đoàn cơ sở thì do người sử dụng lao động quyết định. Thời gian nghỉ dưỡng sức phục hồi sức khỏe tối đa được quy định như sau:"},{"k":"p","t":"a) 10 ngày đối với người lao động sức khỏe chưa phục hồi sau thời gian ốm đau do mắc bệnh cần chữa trị dài ngày;"},{"k":"p","t":"b) 07 ngày đối với người lao động sức khỏe chưa phục hồi sau thời gian ốm đau do phải phẫu thuật;"},{"k":"p","t":"c) 05 ngày đối với trường hợp khác."},{"k":"p","t":"3. Mức hưởng cho một ngày nghỉ dưỡng sức, phục hồi sức khỏe sau khi ốm đau bằng 30% mức tham chiếu."},{"k":"p","t":"4. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định về việc tính, việc xác định điều kiện đối với từng trường hợp nghỉ dưỡng sức, phục hồi sức khoẻ sau khi ốm đau."}]},{"id":"luat-41_47","no":47,"code":"Điều 47","title":"Điều 47. Hồ sơ đề nghị hưởng trợ cấp ốm đau","shortTitle":"Hồ sơ đề nghị hưởng trợ cấp ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng trợ cấp ốm đau đối với người lao động hoặc con của người lao động điều trị nội trú là bản chính hoặc bản sao của một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Giấy ra viện;"},{"k":"p","t":"b) Bản tóm tắt hồ sơ bệnh án;"},{"k":"p","t":"c) Giấy tờ khác chứng minh quá trình điều trị nội trú."},{"k":"p","t":"2. Hồ sơ đề nghị hưởng trợ cấp ốm đau đối với người lao động hoặc con của người lao động điều trị ngoại trú là một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Giấy chứng nhận nghỉ việc hưởng bảo hiểm xã hội;"},{"k":"p","t":"b) Bản chính hoặc bản sao giấy ra viện có ghi chỉ định thời gian cần điều trị ngoại trú sau thời gian điều trị nội trú;"},{"k":"p","t":"c) Bản chính hoặc bản sao bản tóm tắt hồ sơ bệnh án có ghi chỉ định thời gian cần điều trị ngoại trú sau thời gian điều trị nội trú."},{"k":"p","t":"3. Hồ sơ đề nghị hưởng trợ cấp ốm đau đối với người lao động hoặc con của người lao động khám bệnh, chữa bệnh ở nước ngoài là các giấy tờ khám bệnh, chữa bệnh thể hiện tên bệnh, thời gian điều trị bệnh do cơ sở khám bệnh, chữa bệnh ở nước ngoài cấp và phải đáp ứng các yêu cầu sau đây:"},{"k":"p","t":"a) Có bản dịch tiếng Việt được công chứng hoặc chứng thực theo quy định của pháp luật về công chứng, chứng thực;"},{"k":"p","t":"b) Được hợp pháp hóa lãnh sự, trừ trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác."},{"k":"p","t":"4. Bộ trưởng Bộ Y tế quy định mẫu, trình tự, thẩm quyền cấp giấy tờ trong hồ sơ quy định tại khoản 1 và khoản 2 Điều này do các cơ sở khám bệnh, chữa bệnh cấp và quy định giấy tờ thay thế trong trường hợp bất khả kháng do thiên tai, thảm họa, dịch bệnh."}]},{"id":"luat-41_48","no":48,"code":"Điều 48","title":"Điều 48. Giải quyết hưởng trợ cấp ốm đau","shortTitle":"Giải quyết hưởng trợ cấp ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người lao động có trách nhiệm nộp hồ sơ quy định tại Điều 47 của Luật này cho người sử dụng lao động. Thời hạn nộp hồ sơ chậm nhất là 45 ngày kể từ ngày trở lại làm việc."},{"k":"p","t":"2. Trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người lao động, người sử dụng lao động có trách nhiệm lập danh sách người lao động nghỉ việc hưởng chế độ ốm đau kèm theo hồ sơ nộp cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"3. Trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định từ người sử dụng lao động, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_49","no":49,"code":"Điều 49","title":"Điều 49. Giải quyết hưởng trợ cấp dưỡng sức, phục hồi sức khoẻ sau khi ốm đau","shortTitle":"Giải quyết hưởng trợ cấp dưỡng sức, phục hồi sức khoẻ sau khi ốm đau","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 07 ngày làm việc kể từ ngày người lao động nghỉ việc hưởng trợ cấp dưỡng sức, phục hồi sức khỏe sau khi ốm đau, người sử dụng lao động lập danh sách người lao động nghỉ việc hưởng trợ cấp dưỡng sức, phục hồi sức khỏe và nộp cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Trong thời hạn 07 ngày làm việc kể từ ngày nhận danh sách do người sử dụng lao động lập, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"CHẾ ĐỘ THAI SẢN"}]},{"id":"luat-41_50","no":50,"code":"Điều 50","title":"Điều 50. Đối tượng và điều kiện hưởng chế độ thai sản","shortTitle":"Đối tượng và điều kiện hưởng chế độ thai sản","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại các điểm a, b, c, d, i, k, l, m và n khoản 1 và khoản 2 Điều 2 của Luật này được hưởng chế độ thai sản khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Lao động nữ mang thai;"},{"k":"p","t":"b) Lao động nữ sinh con;"},{"k":"p","t":"c) Lao động nữ mang thai hộ;"},{"k":"p","t":"d) Lao động nữ nhờ mang thai hộ;"},{"k":"p","t":"đ) Người lao động nhận nuôi con nuôi dưới 06 tháng tuổi;"},{"k":"p","t":"e) Người lao động sử dụng các biện pháp tránh thai mà các biện pháp đó phải được thực hiện tại cơ sở khám bệnh, chữa bệnh;"},{"k":"p","t":"g) Lao động nam đang tham gia bảo hiểm xã hội bắt buộc có vợ sinh con, vợ mang thai hộ sinh con."},{"k":"p","t":"2. Đối tượng quy định tại các điểm b, c, d và đ khoản 1 Điều này phải đóng bảo hiểm xã hội bắt buộc từ đủ 06 tháng trở lên trong thời gian 12 tháng liền kề trước khi sinh con hoặc nhận con khi nhờ mang thai hộ hoặc nhận nuôi con nuôi dưới 06 tháng tuổi."},{"k":"p","t":"3. Đối tượng quy định tại điểm b và điểm c khoản 1 Điều này đã đóng bảo hiểm xã hội bắt buộc từ đủ 12 tháng trở lên mà khi mang thai phải nghỉ việc để dưỡng thai theo chỉ định của người hành nghề khám bệnh, chữa bệnh thuộc cơ sở khám bệnh, chữa bệnh thì phải đóng bảo hiểm xã hội bắt buộc từ đủ 03 tháng trở lên trong thời gian 12 tháng liền kề trước khi sinh con."},{"k":"p","t":"4. Đối tượng đủ điều kiện quy định tại khoản 2 hoặc khoản 3 hoặc khoản 5 Điều này mà chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc thôi việc trước thời điểm sinh con hoặc nhận con khi nhờ mang thai hộ hoặc nhận nuôi con nuôi dưới 06 tháng tuổi thì vẫn được hưởng chế độ thai sản theo quy định tại các điều 53, 54, 55 và 56 và các khoản 1, 2 và 3 Điều 58 của Luật này. Thời gian hưởng chế độ thai sản không được tính là thời gian đóng bảo hiểm xã hội."},{"k":"p","t":"5. Đối tượng quy định tại điểm b khoản 1 Điều này đã đóng bảo hiểm xã hội bắt buộc từ đủ 06 tháng trở lên trong thời gian 24 tháng liền kề trước khi sinh con đối với trường hợp phải nghỉ việc để điều trị vô sinh."}]},{"id":"luat-41_51","no":51,"code":"Điều 51","title":"Điều 51. Thời gian nghỉ việc hưởng chế độ thai sản khi khám thai","shortTitle":"Thời gian nghỉ việc hưởng chế độ thai sản khi khám thai","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Lao động nữ mang thai được nghỉ việc hưởng chế độ thai sản để đi khám thai tối đa 05 lần, mỗi lần không quá 02 ngày."},{"k":"p","t":"2. Thời gian nghỉ việc hưởng chế độ thai sản khi khám thai được tính theo ngày làm việc không kể ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."}]},{"id":"luat-41_52","no":52,"code":"Điều 52","title":"Điều 52. Thời gian nghỉ việc hưởng chế độ thai sản khi sảy thai, phá thai, thai chết trong tử cung, thai chết trong khi chuyển dạ, thai ngoài tử cung","shortTitle":"Thời gian nghỉ việc hưởng chế độ thai sản khi sảy thai, phá thai, thai chết trong tử cung, thai chết trong khi chuyển dạ, thai ngoài tử cung","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời gian nghỉ việc hưởng chế độ thai sản khi sảy thai, phá thai, thai chết trong tử cung, thai chết trong khi chuyển dạ, thai ngoài tử cung do người hành nghề khám bệnh, chữa bệnh thuộc cơ sở khám bệnh, chữa bệnh chỉ định nhưng tối đa theo quy định sau đây:"},{"k":"p","t":"a) 10 ngày nếu thai dưới 05 tuần tuổi;"},{"k":"p","t":"b) 20 ngày nếu thai từ đủ 05 tuần tuổi đến dưới 13 tuần tuổi;"},{"k":"p","t":"c) 40 ngày nếu thai từ đủ 13 tuần tuổi đến dưới 22 tuần tuổi;"},{"k":"p","t":"d) 50 ngày nếu thai từ đủ 22 tuần tuổi trở lên."},{"k":"p","t":"2. Trường hợp lao động nữ mang thai từ đủ 22 tuần tuổi trở lên đủ điều kiện quy định tại khoản 2 hoặc khoản 3 hoặc khoản 5 Điều 50 của Luật này mà bị sảy thai, phá thai, thai chết trong tử cung, thai chết trong khi chuyển dạ thì lao động nữ và người chồng được nghỉ việc hưởng chế độ thai sản như trường hợp lao động nữ sinh con."},{"k":"p","t":"3. Thời gian nghỉ việc hưởng chế độ thai sản quy định tại khoản 1 Điều này tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."}]},{"id":"luat-41_53","no":53,"code":"Điều 53","title":"Điều 53. Thời gian nghỉ việc hưởng chế độ thai sản khi sinh con","shortTitle":"Thời gian nghỉ việc hưởng chế độ thai sản khi sinh con","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời gian nghỉ việc hưởng chế độ thai sản của lao động nữ khi sinh con được thực hiện theo quy định tại khoản 1 Điều 139 của Bộ luật Lao động."},{"k":"p","t":"Trường hợp lao động nữ trở lại làm việc trước khi hết thời gian nghỉ việc hưởng chế độ thai sản khi sinh con theo quy định tại khoản 4 Điều 139 của Bộ luật Lao động thì được hưởng tiền lương của những ngày làm việc do người sử dụng lao động trả và tiếp tục được hưởng trợ cấp thai sản theo mức quy định tại Điều 59 của Luật này; người sử dụng lao động và người lao động có trách nhiệm đóng bảo hiểm xã hội bắt buộc cho thời gian người lao động trở lại làm việc."},{"k":"p","t":"2. Lao động nam đang tham gia bảo hiểm xã hội bắt buộc khi vợ sinh con được nghỉ việc hưởng chế độ thai sản với thời gian như sau:"},{"k":"p","t":"a) 05 ngày làm việc;"},{"k":"p","t":"b) 07 ngày làm việc khi vợ sinh con phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi;"},{"k":"p","t":"c) Trường hợp vợ sinh đôi thì được nghỉ 10 ngày làm việc. Trường hợp sinh ba trở lên thì được nghỉ thêm 03 ngày làm việc cho mỗi con tính từ con thứ ba trở đi;"},{"k":"p","t":"d) Trường hợp vợ sinh đôi phải phẫu thuật thì được nghỉ 14 ngày làm việc. Trường hợp sinh ba trở lên phải phẫu thuật thì được nghỉ thêm 03 ngày làm việc cho mỗi con tính từ con thứ ba trở đi."},{"k":"p","t":"3. Ngày bắt đầu nghỉ việc hưởng chế độ thai sản quy định tại khoản 2 Điều này phải trong khoảng thời gian 60 ngày kể từ ngày vợ sinh con, trường hợp người lao động nghỉ nhiều lần thì ngày bắt đầu nghỉ việc của lần cuối cùng phải trong khoảng thời gian 60 ngày đầu kể từ ngày vợ sinh con và tổng thời gian nghỉ việc hưởng chế độ thai sản không quá thời gian quy định tại khoản 2 Điều này."},{"k":"p","t":"4. Trường hợp lao động nữ mang thai đôi trở lên mà khi sinh nếu có thai chết trong tử cung, thai chết trong khi chuyển dạ thì thời gian nghỉ việc hưởng chế độ thai sản và trợ cấp một lần khi sinh con được tính theo số thai bao gồm cả con sống, con chết và thai chết."},{"k":"p","t":"5. Trường hợp chỉ có mẹ hoặc cả cha và mẹ đều tham gia bảo hiểm xã hội bắt buộc mà mẹ chết sau khi sinh con thì cha hoặc người trực tiếp nuôi dưỡng được nghỉ việc hưởng chế độ thai sản để chăm sóc con đối với thời gian còn lại của người mẹ theo quy định tại khoản 1 Điều này. Trường hợp mẹ tham gia bảo hiểm xã hội bắt buộc nhưng không đủ điều kiện quy định tại khoản 2 hoặc khoản 3 hoặc khoản 5 Điều 50 của Luật này mà chết thì cha hoặc người trực tiếp nuôi dưỡng được nghỉ việc hưởng chế độ thai sản cho đến khi con đủ 06 tháng tuổi."},{"k":"p","t":"6. Trường hợp cha hoặc người trực tiếp nuôi dưỡng không nghỉ việc theo quy định tại khoản 5 Điều này thì ngoài tiền lương còn được hưởng trợ cấp thai sản đối với thời gian còn lại của người mẹ kể từ ngày liền kề sau ngày người mẹ chết theo quy định tại khoản 1 Điều này."},{"k":"p","t":"7. Trường hợp chỉ có cha tham gia bảo hiểm xã hội bắt buộc mà mẹ chết sau khi sinh con hoặc gặp rủi ro sau khi sinh mà không đủ sức khỏe để chăm sóc con theo xác nhận của cơ sở khám bệnh, chữa bệnh thì cha được nghỉ việc hưởng chế độ thai sản cho đến khi con đủ 06 tháng tuổi."},{"k":"p","t":"8. Đối với trường hợp lao động nữ sinh con, người lao động nhận nuôi con nuôi dưới 06 tháng tuổi, lao động nữ mang thai hộ khi sinh con, lao động nữ nhờ mang thai hộ thì thời gian nghỉ việc hưởng chế độ thai sản được tính là thời gian đóng bảo hiểm xã hội bắt buộc, người lao động và người sử dụng lao động không phải đóng bảo hiểm xã hội."},{"k":"p","t":"Đối với các trường hợp khác mà có thời gian nghỉ việc hưởng chế độ thai sản từ 14 ngày làm việc trở lên trong tháng thì thời gian này được tính là thời gian đóng bảo hiểm xã hội bắt buộc, người lao động và người sử dụng lao động không phải đóng bảo hiểm xã hội."},{"k":"p","t":"9. Thời gian nghỉ việc hưởng chế độ thai sản quy định tại các khoản 1, 4, 5, 6 và 7 Điều này tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."}]},{"id":"luat-41_54","no":54,"code":"Điều 54","title":"Điều 54. Chế độ thai sản của lao động nữ mang thai hộ","shortTitle":"Chế độ thai sản của lao động nữ mang thai hộ","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Lao động nữ mang thai hộ được nghỉ việc hưởng chế độ thai sản khi khám thai theo quy định tại Điều 51 của Luật này."},{"k":"p","t":"2. Lao động nữ mang thai hộ khi sảy thai, phá thai hoặc có thai chết trong tử cung, thai chết trong khi chuyển dạ, thai ngoài tử cung được nghỉ việc hưởng chế độ thai sản theo quy định tại Điều 52 của Luật này."},{"k":"p","t":"3. Lao động nữ mang thai hộ khi sinh con mà có đủ điều kiện quy định tại khoản 2 hoặc khoản 3 Điều 50 của Luật này được:"},{"k":"p","t":"a) Nghỉ việc hưởng chế độ thai sản cho đến thời điểm giao đứa trẻ cho bên nhờ mang thai hộ nhưng không vượt quá thời gian quy định tại khoản 1 Điều 53 của Luật này."},{"k":"p","t":"Trong trường hợp kể từ ngày sinh đến thời điểm giao đứa trẻ mà thời gian hưởng chế độ thai sản chưa đủ 60 ngày thì lao động nữ mang thai hộ vẫn được hưởng chế độ thai sản cho đến khi đủ 60 ngày tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần. Thời điểm giao đứa trẻ cho bên nhờ mang thai hộ là thời điểm ghi trong văn bản xác nhận thời điểm giao đứa trẻ của bên nhờ mang thai hộ và bên mang thai hộ."},{"k":"p","t":"Trường hợp trước thời điểm giao nếu đứa trẻ chết mà thời gian hưởng chế độ thai sản chưa đủ 60 ngày thì lao động nữ mang thai hộ vẫn được hưởng chế độ thai sản cho đến khi đủ 60 ngày tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần;"},{"k":"p","t":"b) Trong khoảng thời gian 30 ngày đầu kể từ ngày hết thời hạn hưởng chế độ thai sản quy định tại khoản 2 Điều này và điểm a khoản này mà sức khỏe chưa phục hồi thì lao động nữ mang thai hộ được nghỉ dưỡng sức, phục hồi sức khỏe theo quy định tại Điều 60 của Luật này, trừ trường hợp lao động nữ mang thai hộ chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc thôi việc trước thời điểm sinh con."},{"k":"p","t":"4. Khi lao động nữ mang thai hộ sinh con thì người chồng đang tham gia bảo hiểm xã hội bắt buộc được nghỉ việc hưởng chế độ thai sản theo quy định tại khoản 2 và khoản 3 Điều 53 của Luật này."}]},{"id":"luat-41_55","no":55,"code":"Điều 55","title":"Điều 55. Chế độ thai sản của lao động nữ nhờ mang thai hộ","shortTitle":"Chế độ thai sản của lao động nữ nhờ mang thai hộ","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Lao động nữ nhờ mang thai hộ đã đóng bảo hiểm xã hội bắt buộc từ đủ 06 tháng trở lên trong thời gian 12 tháng tính đến thời điểm nhận con thì được hưởng chế độ thai sản như sau:"},{"k":"p","t":"1. Được nghỉ việc hưởng chế độ thai sản từ thời điểm nhận con cho đến khi con đủ 06 tháng tuổi. Trường hợp sinh đôi trở lên thì được nghỉ thêm 01 tháng cho mỗi con tính từ con thứ hai trở đi."},{"k":"p","t":"Trường hợp lao động nữ nhờ mang thai hộ không nghỉ việc thì ngoài tiền lương còn được hưởng trợ cấp thai sản theo quy định;"},{"k":"p","t":"2. Trường hợp lao động nữ nhờ mang thai hộ chết hoặc được cơ sở khám bệnh, chữa bệnh xác nhận không đủ sức khỏe để chăm sóc con khi con chưa đủ 06 tháng tuổi thì người chồng của lao động nữ nhờ mang thai hộ hoặc người trực tiếp nuôi dưỡng được nghỉ việc hưởng chế độ thai sản để chăm sóc con đối với thời gian còn lại của lao động nữ nhờ mang thai hộ theo quy định tại khoản 1 Điều này."},{"k":"p","t":"Trường hợp người chồng của lao động nữ nhờ mang thai hộ hoặc người trực tiếp nuôi dưỡng đang tham gia bảo hiểm xã hội bắt buộc mà không nghỉ việc thì ngoài tiền lương còn được hưởng trợ cấp thai sản đối với thời gian còn lại của lao động nữ nhờ mang thai hộ theo quy định tại khoản 1 Điều này."}]},{"id":"luat-41_56","no":56,"code":"Điều 56","title":"Điều 56. Chế độ thai sản khi nhận nuôi con nuôi dưới 06 tháng tuổi","shortTitle":"Chế độ thai sản khi nhận nuôi con nuôi dưới 06 tháng tuổi","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động nhận nuôi con nuôi dưới 06 tháng tuổi thì được nghỉ việc hưởng chế độ thai sản kể từ ngày giao nhận con nuôi cho đến khi con đủ 06 tháng tuổi."},{"k":"p","t":"Trường hợp cả cha và mẹ cùng tham gia bảo hiểm xã hội bắt buộc đủ điều kiện hưởng chế độ thai sản quy định tại khoản 2 Điều 50 của Luật này thì chỉ cha hoặc mẹ được nghỉ việc hưởng chế độ thai sản."},{"k":"p","t":"2. Người lao động nhận nuôi con nuôi dưới 06 tháng tuổi không nghỉ việc thì chỉ được hưởng trợ cấp một lần theo quy định tại Điều 58 của Luật này."}]},{"id":"luat-41_57","no":57,"code":"Điều 57","title":"Điều 57. Thời gian nghỉ việc hưởng chế độ khi thực hiện các biện pháp tránh thai","shortTitle":"Thời gian nghỉ việc hưởng chế độ khi thực hiện các biện pháp tránh thai","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời gian người lao động nghỉ việc hưởng chế độ thai sản khi thực hiện các biện pháp tránh thai do người hành nghề khám bệnh, chữa bệnh thuộc cơ sở khám bệnh, chữa bệnh chỉ định nhưng không quá 07 ngày đối với lao động nữ đặt dụng cụ tránh thai trong tử cung và không quá 15 ngày đối với người lao động thực hiện biện pháp triệt sản."},{"k":"p","t":"2. Thời gian nghỉ việc hưởng chế độ thai sản quy định tại khoản 1 Điều này tính cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần."}]},{"id":"luat-41_58","no":58,"code":"Điều 58","title":"Điều 58. Trợ cấp một lần khi sinh con, nhận con khi nhờ mang thai hộ hoặc nhận nuôi con nuôi dưới 06 tháng tuổi","shortTitle":"Trợ cấp một lần khi sinh con, nhận con khi nhờ mang thai hộ hoặc nhận nuôi con nuôi dưới 06 tháng tuổi","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Lao động nữ sinh con có đủ điều kiện quy định tại khoản 2 hoặc khoản 3 hoặc khoản 5 Điều 50 của Luật này thì được trợ cấp một lần khi sinh con."},{"k":"p","t":"Lao động nữ sinh con nhưng không đủ điều kiện quy định tại khoản 2 hoặc khoản 3 hoặc khoản 5 Điều 50 của Luật này mà người chồng có đủ điều kiện quy định tại khoản 2 Điều 50 của Luật này thì người chồng được trợ cấp một lần."},{"k":"p","t":"2. Lao động nữ mang thai hộ có đủ điều kiện theo quy định tại khoản 2 hoặc khoản 3 Điều 50 của Luật này thì được trợ cấp một lần khi sinh con."},{"k":"p","t":"Trường hợp người mang thai hộ không tham gia bảo hiểm xã hội bắt buộc hoặc không đủ điều kiện thì người mẹ nhờ mang thai hộ đã đóng bảo hiểm xã hội bắt buộc từ đủ 06 tháng trở lên trong thời gian 12 tháng tính đến thời điểm nhận con được trợ cấp một lần."},{"k":"p","t":"Trường hợp người mang thai hộ, người mẹ nhờ mang thai hộ không tham gia bảo hiểm xã hội bắt buộc hoặc không đủ điều kiện thì người chồng của người mẹ nhờ mang thai hộ đã đóng bảo hiểm xã hội bắt buộc từ đủ 06 tháng trở lên trong thời gian 12 tháng tính đến thời điểm nhận con được trợ cấp một lần."},{"k":"p","t":"Trường hợp người mang thai hộ, người mẹ nhờ mang thai hộ và người chồng của người mẹ nhờ mang thai hộ không tham gia bảo hiểm xã hội bắt buộc hoặc không đủ điều kiện thì người chồng của người mang thai hộ đã đóng bảo hiểm xã hội bắt buộc từ đủ 06 tháng trở lên trong thời gian 12 tháng tính đến thời điểm người mang thai hộ sinh con được trợ cấp một lần."},{"k":"p","t":"3. Người lao động nhận nuôi con nuôi dưới 06 tháng tuổi đủ điều kiện theo quy định tại khoản 2 Điều 50 của Luật này thì được trợ cấp một lần."},{"k":"p","t":"4. Mức trợ cấp một lần cho mỗi con quy định tại các khoản 1, 2 và 3 Điều này bằng 02 lần mức tham chiếu tại tháng lao động nữ sinh con, nhận con do nhờ mang thai hộ, nhận nuôi con nuôi."}]},{"id":"luat-41_59","no":59,"code":"Điều 59","title":"Điều 59. Trợ cấp thai sản","shortTitle":"Trợ cấp thai sản","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trợ cấp thai sản một tháng của người lao động quy định tại các điều 51, 52, 53, 54, 55, 56 và 57 của Luật này bằng 100% mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc của 06 tháng gần nhất trước khi nghỉ việc hưởng chế độ thai sản."},{"k":"p","t":"Đối với người lao động đóng bảo hiểm xã hội bắt buộc chưa đủ 06 tháng thì trợ cấp thai sản của người lao động quy định tại Điều 51, Điều 52, các khoản 2, 5, 6 và 7 Điều 53, các khoản 1, 2 và 4 Điều 54, khoản 2 Điều 55 và Điều 57 của Luật này là mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc của các tháng đã đóng."},{"k":"p","t":"2. Trợ cấp thai sản một ngày đối với trường hợp quy định tại Điều 51 và khoản 2 Điều 53 của Luật này được tính bằng trợ cấp thai sản một tháng chia cho 24 ngày."},{"k":"p","t":"3. Trợ cấp thai sản khi sinh con, nhận con khi nhờ mang thai hộ hoặc nhận nuôi con nuôi dưới 06 tháng tuổi được tính theo mức trợ cấp thai sản quy định tại khoản 1 Điều này, trường hợp có ngày lẻ hoặc trường hợp quy định tại Điều 52 và Điều 57 của Luật này thì mức trợ cấp mỗi ngày được tính bằng mức trợ cấp thai sản một tháng chia cho 30 ngày."},{"k":"p","t":"4. Trợ cấp thai sản của lao động nữ mang thai hộ, lao động nữ nhờ mang thai hộ được thực hiện theo quy định tại các khoản 1, 2 và 3 Điều này và được tính trên cơ sở mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc theo quy định tại Điều này trước khi nghỉ việc hưởng chế độ thai sản của lao động nữ mang thai hộ, lao động nữ nhờ mang thai hộ."},{"k":"p","t":"5. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc tính, việc xác định điều kiện đối với từng trường hợp hưởng chế độ thai sản."}]},{"id":"luat-41_60","no":60,"code":"Điều 60","title":"Điều 60. Dưỡng sức, phục hồi sức khoẻ sau thai sản","shortTitle":"Dưỡng sức, phục hồi sức khoẻ sau thai sản","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trong thời gian 30 ngày kể từ ngày hết thời gian nghỉ việc hưởng chế độ thai sản quy định tại Điều 52, khoản 1 hoặc khoản 4 Điều 53, điểm a khoản 3 Điều 54 của Luật này, lao động nữ chưa phục hồi sức khỏe thì được nghỉ dưỡng sức, phục hồi sức khoẻ."},{"k":"p","t":"Thời gian nghỉ dưỡng sức, phục hồi sức khỏe liên tục bao gồm cả ngày nghỉ lễ, tết, ngày nghỉ hằng tuần. Trường hợp có thời gian nghỉ dưỡng sức, phục hồi sức khỏe từ cuối năm trước chuyển tiếp sang đầu năm sau thì thời gian nghỉ đó được tính cho năm trước."},{"k":"p","t":"2. Thời gian nghỉ dưỡng sức, phục hồi sức khỏe quy định tại khoản 1 Điều này do người sử dụng lao động và Ban Chấp hành công đoàn cơ sở quyết định; trường hợp hai bên có ý kiến khác nhau thì người sử dụng lao động quyết định số ngày nghỉ trên cơ sở đề nghị của Ban Chấp hành công đoàn cơ sở, trường hợp đơn vị sử dụng lao động chưa có công đoàn cơ sở thì do người sử dụng lao động quyết định. Thời gian nghỉ dưỡng sức, phục hồi sức khỏe tối đa được quy định như sau:"},{"k":"p","t":"a) 10 ngày đối với lao động nữ sinh một lần từ hai con trở lên;"},{"k":"p","t":"b) 07 ngày đối với lao động nữ sinh con phải phẫu thuật;"},{"k":"p","t":"c) 05 ngày đối với trường hợp khác."},{"k":"p","t":"3. Mức hưởng cho một ngày nghỉ dưỡng sức, phục hồi sức khỏe sau thai sản bằng 30% mức tham chiếu."},{"k":"p","t":"4. Không áp dụng quy định tại các khoản 1, 2 và 3 Điều này trong trường hợp lao động nữ trở lại làm việc trước khi hết thời gian nghỉ việc hưởng chế độ thai sản khi sinh con quy định tại khoản 1 Điều 53 của Luật này."},{"k":"p","t":"5. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc tính, việc xác định điều kiện đối với từng trường hợp được nghỉ dưỡng sức, phục hồi sức khoẻ sau thai sản."}]},{"id":"luat-41_61","no":61,"code":"Điều 61","title":"Điều 61. Hồ sơ đề nghị hưởng chế độ thai sản","shortTitle":"Hồ sơ đề nghị hưởng chế độ thai sản","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng chế độ thai sản đối với lao động nữ sinh con hoặc lao động nữ mang thai hộ sinh con hoặc lao động nữ nhờ mang thai hộ là bản sao giấy khai sinh hoặc trích lục khai sinh hoặc bản sao giấy chứng sinh của con và giấy tờ khác trong các trường hợp sau đây:"},{"k":"p","t":"a) Giấy tờ chứng minh quá trình điều trị vô sinh của lao động nữ trong trường hợp quy định tại khoản 5 Điều 50 của Luật này;"},{"k":"p","t":"b) Bản sao giấy chứng tử hoặc trích lục khai tử của lao động nữ sinh con, lao động nữ nhờ mang thai hộ trong trường hợp chết sau khi sinh con;"},{"k":"p","t":"c) Bản chính hoặc bản sao văn bản xác nhận của cơ sở khám bệnh, chữa bệnh về tình trạng người mẹ sau khi sinh con mà không còn đủ sức khỏe để chăm sóc con hoặc lao động nữ nhờ mang thai hộ sau khi nhận con mà không còn đủ sức khỏe để chăm sóc con;"},{"k":"p","t":"d) Bản chính hoặc bản sao giấy xác nhận của cơ sở khám bệnh, chữa bệnh về việc lao động nữ phải nghỉ việc để dưỡng thai trong trường hợp quy định tại khoản 3 Điều 50 của Luật này;"},{"k":"p","t":"đ) Bản sao bản thỏa thuận về mang thai hộ vì mục đích nhân đạo theo quy định tại Điều 96 của Luật Hôn nhân và gia đình và bản sao văn bản xác nhận thời điểm giao nhận con giữa bên mang thai hộ và bên nhờ mang thai hộ trong trường hợp lao động nữ mang thai hộ sinh con hoặc lao động nữ nhờ mang thai hộ nhận con."},{"k":"p","t":"2. Hồ sơ đề nghị hưởng chế độ thai sản đối với lao động nữ sinh con và lao động nữ mang thai hộ sinh con trong trường hợp con chết ngay sau khi sinh mà chưa được cấp giấy chứng sinh, lao động nữ mang thai từ 22 tuần tuổi trở lên đủ điều kiện hưởng chế độ thai sản khi sinh con theo quy định tại khoản 2 Điều 52 của Luật này là một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Bản chính hoặc bản sao bản tóm tắt hồ sơ bệnh án có thể hiện thông tin con chết, thai chết;"},{"k":"p","t":"b) Bản chính hoặc bản sao giấy ra viện của lao động nữ sinh con hoặc của lao động nữ mang thai hộ sinh con có thể hiện thông tin con chết, thai chết;"},{"k":"p","t":"c) Bản sao giấy báo tử của con;"},{"k":"p","t":"d) Văn bản xác nhận của Ủy ban nhân dân cấp xã đối với trường hợp con chết trong vòng 24 giờ sau khi sinh."},{"k":"p","t":"3. Hồ sơ đề nghị hưởng chế độ thai sản đối với lao động nữ khi khám thai theo quy định tại Điều 51 của Luật này; lao động nữ sảy thai, phá thai hoặc có thai chết trong tử cung, thai chết trong khi chuyển dạ, thai ngoài tử cung theo quy định tại Điều 52 của Luật này; người lao động thực hiện biện pháp tránh thai theo quy định tại Điều 57 của Luật này là một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Bản chính hoặc bản sao giấy ra viện hoặc bản tóm tắt hồ sơ bệnh án hoặc giấy tờ chứng minh quá trình điều trị nội trú của người lao động trong trường hợp điều trị nội trú;"},{"k":"p","t":"b) Giấy chứng nhận nghỉ việc hưởng bảo hiểm xã hội trong trường hợp điều trị ngoại trú;"},{"k":"p","t":"c) Bản chính hoặc bản sao giấy ra viện có thể hiện thông tin chỉ định về thời gian cần điều trị ngoại trú sau thời gian điều trị nội trú."},{"k":"p","t":"4. Hồ sơ đề nghị hưởng chế độ thai sản đối với người lao động nhận nuôi con nuôi dưới 06 tháng tuổi bao gồm bản sao giấy chứng nhận nuôi con nuôi và biên bản giao nhận con."},{"k":"p","t":"5. Hồ sơ đề nghị nghỉ việc hưởng chế độ thai sản hoặc hưởng trợ cấp một lần đối với lao động nam khi vợ sinh con là bản sao giấy khai sinh hoặc trích lục khai sinh hoặc bản sao giấy chứng sinh của con; trường hợp giấy chứng sinh không thể hiện thông tin về việc sinh con phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi thì cần thêm bản chính hoặc bản sao văn bản của cơ sở khám bệnh, chữa bệnh thể hiện thông tin về việc sinh con phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi."},{"k":"p","t":"Trường hợp con chết sau khi sinh mà chưa được cấp giấy chứng sinh thì hồ sơ là bản chính hoặc bản sao bản tóm tắt hồ sơ bệnh án hoặc giấy ra viện của người mẹ có thể hiện thông tin về con chết."},{"k":"p","t":"6. Hồ sơ đề nghị hưởng chế độ thai sản đối với người chồng của lao động nữ nhờ mang thai hộ hưởng trợ cấp một lần khi nhận con phải có bản sao giấy khai sinh hoặc trích lục khai sinh hoặc bản sao giấy chứng sinh của con. Trường hợp con chết sau khi sinh mà chưa được cấp giấy chứng sinh thì hồ sơ là bản sao bản tóm tắt hồ sơ bệnh án hoặc bản chính hoặc bản sao giấy ra viện của người mang thai hộ có thể hiện thông tin về con chết hoặc văn bản khác của cơ sở khám bệnh, chữa bệnh có thể hiện thông tin về con chết sau khi sinh."},{"k":"p","t":"7. Hồ sơ đề nghị nghỉ việc hưởng chế độ thai sản hoặc hưởng trợ cấp một lần đối với người chồng của lao động nữ mang thai hộ khi vợ sinh con bao gồm các giấy tờ sau đây:"},{"k":"p","t":"a) Bản sao giấy chứng sinh hoặc trích lục khai sinh hoặc bản sao giấy khai sinh; trường hợp giấy chứng sinh không thể hiện thông tin về việc sinh con phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi thì cần thêm bản chính hoặc bản sao văn bản của cơ sở khám bệnh, chữa bệnh thể hiện thông tin về việc sinh con phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi;"},{"k":"p","t":"b) Bản sao bản thỏa thuận về mang thai hộ vì mục đích nhân đạo theo quy định tại Điều 96 của Luật Hôn nhân và gia đình."},{"k":"p","t":"8. Trường hợp các giấy tờ quy định tại các khoản 1, 2, 3, 4, 5, 6 và 7 Điều này hoặc các giấy tờ có nội dung tương tự do cơ quan, tổ chức, cá nhân có thẩm quyền của nước ngoài cấp thì phải đáp ứng được các yêu cầu sau đây:"},{"k":"p","t":"a) Có bản dịch tiếng Việt được công chứng hoặc chứng thực theo quy định của pháp luật về công chứng, chứng thực;"},{"k":"p","t":"b) Được hợp pháp hóa lãnh sự, trừ trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác."},{"k":"p","t":"9. Bộ trưởng Bộ Y tế quy định mẫu, trình tự, thẩm quyền cấp các giấy tờ trong hồ sơ quy định tại các điểm a, c và d khoản 1 Điều này do các cơ sở khám bệnh, chữa bệnh cấp và quy định giấy tờ thay thế trong trường hợp bất khả kháng do thiên tai, thảm họa, dịch bệnh."}]},{"id":"luat-41_62","no":62,"code":"Điều 62","title":"Điều 62. Giải quyết hưởng chế độ thai sản đối với người tham gia bảo hiểm xã hội bắt buộc","shortTitle":"Giải quyết hưởng chế độ thai sản đối với người tham gia bảo hiểm xã hội bắt buộc","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người lao động có trách nhiệm nộp hồ sơ quy định tại Điều 61 của Luật này cho người sử dụng lao động. Thời hạn nộp hồ sơ chậm nhất là 45 ngày kể từ ngày hết thời gian nghỉ việc hưởng chế độ thai sản."},{"k":"p","t":"Trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người lao động, người sử dụng lao động có trách nhiệm lập danh sách người lao động nghỉ việc hưởng chế độ thai sản kèm theo hồ sơ quy định tại Điều 61 của Luật này nộp cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Người lao động nộp hồ sơ quy định tại Điều 61 của Luật này cho cơ quan bảo hiểm xã hội trong trường hợp thôi việc trước thời điểm sinh con, nhận con khi nhờ mang thai hộ, nhận nuôi con nuôi dưới 06 tháng tuổi hoặc không còn người sử dụng lao động."},{"k":"p","t":"3. Cơ quan bảo hiểm xã hội có trách nhiệm giải quyết trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người sử dụng lao động, 05 ngày làm việc kể từ ngày nhận đủ hồ sơ từ người lao động; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_63","no":63,"code":"Điều 63","title":"Điều 63. Giải quyết hưởng trợ cấp dưỡng sức, phục hồi sức khoẻ sau thai sản","shortTitle":"Giải quyết hưởng trợ cấp dưỡng sức, phục hồi sức khoẻ sau thai sản","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 07 ngày làm việc kể từ ngày người lao động nghỉ việc hưởng trợ cấp dưỡng sức, phục hồi sức khỏe sau thai sản, người sử dụng lao động lập danh sách người lao động nghỉ việc hưởng trợ cấp dưỡng sức, phục hồi sức khỏe sau thai sản và nộp cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Trong thời hạn 07 ngày làm việc kể từ ngày nhận danh sách theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."},{"k":"p","t":"CHẾ ĐỘ HƯU TRÍ"}]},{"id":"luat-41_64","no":64,"code":"Điều 64","title":"Điều 64. Đối tượng và điều kiện hưởng lương hưu","shortTitle":"Đối tượng và điều kiện hưởng lương hưu","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại các điểm a, b, c, g, h, i, k, l, m và n khoản 1 và khoản 2 Điều 2 của Luật này khi nghỉ việc có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 15 năm trở lên thì được hưởng lương hưu nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Đủ tuổi nghỉ hưu theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động;"},{"k":"p","t":"b) Đủ tuổi nghỉ hưu theo quy định tại khoản 3 Điều 169 của Bộ luật Lao động và có tổng thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 15 năm trở lên khi làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành hoặc làm việc ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn bao gồm cả thời gian làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên trước ngày 01 tháng 01 năm 2021;"},{"k":"p","t":"c) Có tuổi thấp hơn tối đa 10 tuổi so với tuổi quy định tại khoản 2 Điều 169 của Bộ luật Lao động và có từ đủ 15 năm trở lên làm công việc khai thác than trong hầm lò theo quy định của Chính phủ;"},{"k":"p","t":"d) Người bị nhiễm HIV/AIDS do tai nạn rủi ro nghề nghiệp trong khi thực hiện nhiệm vụ được giao."},{"k":"p","t":"2. Đối tượng quy định tại các điểm d, đ và e khoản 1 Điều 2 của Luật này khi nghỉ việc có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 15 năm trở lên thì được hưởng lương hưu nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có tuổi thấp hơn tối đa 05 tuổi so với tuổi quy định tại khoản 2 Điều 169 của Bộ luật Lao động, trừ trường hợp Luật Sĩ quan Quân đội nhân dân Việt Nam, Luật Công an nhân dân, Luật Cơ yếu, Luật Quân nhân chuyên nghiệp, công nhân và viên chức quốc phòng có quy định khác;"},{"k":"p","t":"b) Có tuổi thấp hơn tối đa 10 tuổi so với tuổi quy định tại khoản 2 Điều 169 của Bộ luật Lao động và có tổng thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 15 năm trở lên khi làm nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm hoặc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành hoặc làm việc ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn bao gồm cả thời gian làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên trước ngày 01 tháng 01 năm 2021;"},{"k":"p","t":"c) Người bị nhiễm HIV/AIDS do tai nạn rủi ro nghề nghiệp trong khi thực hiện nhiệm vụ được giao."},{"k":"p","t":"3. Chính phủ quy định việc hưởng lương hưu đối với trường hợp không xác định được ngày, tháng sinh hoặc mất hồ sơ và các trường hợp đặc biệt khác."}]},{"id":"luat-41_65","no":65,"code":"Điều 65","title":"Điều 65. Đối tượng và điều kiện hưởng lương hưu khi suy giảm khả năng lao động","shortTitle":"Đối tượng và điều kiện hưởng lương hưu khi suy giảm khả năng lao động","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại các điểm a, b, c, g, h, i, k, l, m và n khoản 1 và khoản 2 Điều 2 của Luật này khi nghỉ việc có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 20 năm trở lên thì được hưởng lương hưu với mức thấp hơn so với người đủ điều kiện hưởng lương hưu quy định tại các điểm a, b và c khoản 1 Điều 64 của Luật này nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có tuổi thấp hơn tối đa 05 tuổi so với tuổi quy định tại điểm a khoản 1 Điều 64 của Luật này và bị suy giảm khả năng lao động từ 61% đến dưới 81%;"},{"k":"p","t":"b) Có tuổi thấp hơn tối đa 10 tuổi so với tuổi quy định tại điểm a khoản 1 Điều 64 của Luật này và bị suy giảm khả năng lao động từ 81% trở lên;"},{"k":"p","t":"c) Có từ đủ 15 năm trở lên làm nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành và bị suy giảm khả năng lao động từ 61% trở lên."},{"k":"p","t":"2. Đối tượng quy định tại các điểm d, đ và e khoản 1 Điều 2 của Luật này khi nghỉ việc có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 20 năm trở lên, bị suy giảm khả năng lao động từ 61% trở lên thì được hưởng lương hưu với mức thấp hơn so với người đủ điều kiện hưởng lương hưu quy định tại điểm a và điểm b khoản 2 Điều 64 của Luật này nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Có tuổi thấp hơn tối đa 10 tuổi so với tuổi quy định tại điểm a khoản 1 Điều 64 của Luật này;"},{"k":"p","t":"b) Có từ đủ 15 năm trở lên làm nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm thuộc danh mục nghề, công việc đặc biệt nặng nhọc, độc hại, nguy hiểm do Bộ trưởng Bộ Lao động - Thương binh và Xã hội ban hành."}]},{"id":"luat-41_66","no":66,"code":"Điều 66","title":"Điều 66. Mức lương hưu hằng tháng","shortTitle":"Mức lương hưu hằng tháng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Mức lương hưu hằng tháng của đối tượng đủ điều kiện quy định tại Điều 64 của Luật này được tính như sau:"},{"k":"p","t":"a) Đối với lao động nữ bằng 45% mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 72 của Luật này tương ứng 15 năm đóng bảo hiểm xã hội, sau đó cứ thêm mỗi năm đóng thì tính thêm 2%, mức tối đa bằng 75%;"},{"k":"p","t":"b) Đối với lao động nam bằng 45% mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 72 của Luật này tương ứng 20 năm đóng bảo hiểm xã hội, sau đó cứ thêm mỗi năm đóng thì tính thêm 2%, mức tối đa bằng 75%."},{"k":"p","t":"Trường hợp lao động nam có thời gian đóng bảo hiểm xã hội từ đủ 15 năm đến dưới 20 năm, mức lương hưu hằng tháng bằng 40% mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 72 của Luật này tương ứng 15 năm đóng bảo hiểm xã hội, sau đó cứ thêm mỗi năm đóng thì tính thêm 1%."},{"k":"p","t":"2. Mức lương hưu hằng tháng của đối tượng là người lao động thuộc một số nghề, công việc đặc biệt đặc thù trong lực lượng vũ trang nhân dân do Chính phủ quy định. Nguồn kinh phí thực hiện từ ngân sách nhà nước."},{"k":"p","t":"3. Mức lương hưu hằng tháng của đối tượng đủ điều kiện quy định tại Điều 65 của Luật này được tính như quy định tại khoản 1 Điều này, sau đó cứ mỗi năm nghỉ hưu trước tuổi quy định thì giảm 2%."},{"k":"p","t":"Trường hợp thời gian nghỉ hưu trước tuổi dưới 06 tháng thì không giảm tỷ lệ phần trăm hưởng lương hưu, từ đủ 06 tháng đến dưới 12 tháng thì giảm 1%."},{"k":"p","t":"4. Việc tính mức lương hưu hằng tháng của người lao động đủ điều kiện hưởng lương hưu mà có thời gian đóng bảo hiểm xã hội theo quy định của điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên nhưng có thời gian đóng bảo hiểm xã hội ở Việt Nam dưới 15 năm thì mỗi năm đóng trong thời gian này được tính bằng 2,25% mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 72 của Luật này."},{"k":"p","t":"5. Chính phủ quy định chi tiết về mức hưởng và điều kiện hưởng lương hưu."}]},{"id":"luat-41_67","no":67,"code":"Điều 67","title":"Điều 67. Điều chỉnh lương hưu","shortTitle":"Điều chỉnh lương hưu","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Lương hưu được điều chỉnh trên cơ sở mức tăng của chỉ số giá tiêu dùng phù hợp với khả năng của ngân sách nhà nước và quỹ bảo hiểm xã hội."},{"k":"p","t":"2. Điều chỉnh mức tăng lương hưu thỏa đáng đối với đối tượng có mức lương hưu thấp và nghỉ hưu trước năm 1995 bảo đảm thu hẹp khoảng cách chênh lệch lương hưu giữa người nghỉ hưu ở các thời kỳ."},{"k":"p","t":"3. Chính phủ quy định thời điểm, đối tượng, mức điều chỉnh lương hưu quy định tại Điều này."}]},{"id":"luat-41_68","no":68,"code":"Điều 68","title":"Điều 68. Trợ cấp một lần khi nghỉ hưu","shortTitle":"Trợ cấp một lần khi nghỉ hưu","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Lao động nam có thời gian đóng bảo hiểm xã hội cao hơn 35 năm, lao động nữ có thời gian đóng bảo hiểm xã hội cao hơn 30 năm thì khi nghỉ hưu, ngoài lương hưu còn được hưởng trợ cấp một lần."},{"k":"p","t":"2. Mức hưởng trợ cấp một lần cho mỗi năm đóng cao hơn quy định tại khoản 1 Điều này bằng 0,5 lần của mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 72 của Luật này cho mỗi năm đóng cao hơn đến tuổi nghỉ hưu theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người lao động đã đủ điều kiện hưởng lương hưu theo quy định tại Điều 64 và Điều 65 của Luật này mà tiếp tục đóng bảo hiểm xã hội thì mức trợ cấp bằng 02 lần của mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội quy định tại Điều 72 của Luật này cho mỗi năm đóng cao hơn số năm quy định tại khoản 1 Điều này kể từ sau thời điểm đủ tuổi nghỉ hưu theo quy định của pháp luật đến thời điểm nghỉ hưu."}]},{"id":"luat-41_69","no":69,"code":"Điều 69","title":"Điều 69. Thời điểm hưởng lương hưu","shortTitle":"Thời điểm hưởng lương hưu","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thời điểm hưởng lương hưu đối với đối tượng quy định tại các điểm a, b, c, d, đ, e, i, k và l khoản 1 và khoản 2 Điều 2 của Luật này đang tham gia bảo hiểm xã hội bắt buộc là thời điểm đủ điều kiện hưởng lương hưu theo quy định và được ghi trong văn bản của người sử dụng lao động xác định việc chấm dứt hợp đồng lao động hoặc xác định việc chấm dứt làm việc."},{"k":"p","t":"2. Thời điểm hưởng lương hưu đối với đối tượng quy định tại các điểm g, h, m và n khoản 1 Điều 2 của Luật này và người đang bảo lưu thời gian đóng bảo hiểm xã hội là thời điểm đủ điều kiện hưởng lương hưu theo quy định và được ghi trong văn bản đề nghị của người lao động."},{"k":"p","t":"3. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định chi tiết Điều này; quy định thời điểm hưởng lương hưu đối với trường hợp quy định tại khoản 7 Điều 33 của Luật này; quy định về việc tính, việc xác định điều kiện đối với từng trường hợp để giải quyết chế độ hưu trí."}]},{"id":"luat-41_70","no":70,"code":"Điều 70","title":"Điều 70. Hưởng bảo hiểm xã hội một lần","shortTitle":"Hưởng bảo hiểm xã hội một lần","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại khoản 1 Điều 2 của Luật này đã chấm dứt tham gia bảo hiểm xã hội mà có đề nghị thì được hưởng bảo hiểm xã hội một lần nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Đủ tuổi hưởng lương hưu mà chưa đủ 15 năm đóng bảo hiểm xã hội."},{"k":"p","t":"Trường hợp người lao động không hưởng bảo hiểm xã hội một lần thì có thể lựa chọn hưởng trợ cấp hằng tháng theo quy định tại Điều 23 của Luật này;"},{"k":"p","t":"b) Ra nước ngoài để định cư;"},{"k":"p","t":"c) Người đang mắc một trong những bệnh ung thư, bại liệt, xơ gan mất bù, lao nặng, AIDS;"},{"k":"p","t":"d) Người có mức suy giảm khả năng lao động từ 81% trở lên; người khuyết tật đặc biệt nặng;"},{"k":"p","t":"đ) Người lao động có thời gian đóng bảo hiểm xã hội trước ngày Luật này có hiệu lực thi hành, sau 12 tháng không thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc mà cũng không tham gia bảo hiểm xã hội tự nguyện và có thời gian đóng bảo hiểm xã hội chưa đủ 20 năm;"},{"k":"p","t":"e) Trường hợp quy định tại các điểm d, đ và e khoản 1 Điều 2 của Luật này khi phục viên, xuất ngũ, thôi việc không thuộc đối tượng tham gia bảo hiểm xã hội bắt buộc mà cũng không tham gia bảo hiểm xã hội tự nguyện và không đủ điều kiện để hưởng lương hưu."},{"k":"p","t":"2. Đối tượng quy định tại khoản 2 Điều 2 của Luật này đã chấm dứt tham gia bảo hiểm xã hội mà có đề nghị thì được hưởng bảo hiểm xã hội một lần nếu thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Đủ tuổi hưởng lương hưu mà chưa đủ 15 năm đóng bảo hiểm xã hội;"},{"k":"p","t":"b) Người đang mắc một trong những bệnh ung thư, bại liệt, xơ gan mất bù, lao nặng, AIDS;"},{"k":"p","t":"c) Người có mức suy giảm khả năng lao động từ 81% trở lên; người khuyết tật đặc biệt nặng;"},{"k":"p","t":"d) Người lao động đủ điều kiện hưởng lương hưu theo quy định nhưng không tiếp tục cư trú tại Việt Nam;"},{"k":"p","t":"đ) Người lao động khi chấm dứt hợp đồng lao động hoặc giấy phép lao động, chứng chỉ hành nghề, giấy phép hành nghề hết hiệu lực mà không được gia hạn."},{"k":"p","t":"3. Mức hưởng bảo hiểm xã hội một lần được tính theo số năm đã đóng và căn cứ đóng bảo hiểm xã hội nhưng không bao gồm số tiền ngân sách nhà nước hỗ trợ đóng bảo hiểm xã hội tự nguyện, cứ mỗi năm được tính như sau:"},{"k":"p","t":"a) Bằng 1,5 tháng mức bình quân tiền lương tháng đóng bảo hiểm xã hội đối với năm đóng trước năm 2014."},{"k":"p","t":"Trường hợp có thời gian đóng bảo hiểm xã hội trước và sau năm 2014 mà thời gian đóng trước năm 2014 có tháng lẻ thì những tháng lẻ đó được chuyển sang giai đoạn đóng bảo hiểm xã hội từ năm 2014 trở đi để tính mức hưởng bảo hiểm xã hội một lần;"},{"k":"p","t":"b) Bằng 02 tháng mức bình quân tiền lương tháng đóng bảo hiểm xã hội đối với năm đóng từ năm 2014 trở đi;"},{"k":"p","t":"c) Trường hợp thời gian đóng bảo hiểm xã hội chưa đủ một năm thì mức hưởng bằng số tiền đã đóng nhưng không quá 02 tháng mức bình quân tiền lương tháng đóng bảo hiểm xã hội."},{"k":"p","t":"4. Trường hợp quy định tại điểm c và điểm d khoản 1 Điều này thì mức hưởng bảo hiểm xã hội một lần được tính theo số năm đã đóng và căn cứ đóng bảo hiểm xã hội bao gồm số tiền ngân sách nhà nước hỗ trợ đóng bảo hiểm xã hội tự nguyện; việc tính mức hưởng mỗi năm thực hiện theo quy định tại các điểm a, b và c khoản 3 Điều này."},{"k":"p","t":"5. Thời điểm tính hưởng bảo hiểm xã hội một lần là thời điểm cơ quan bảo hiểm xã hội ban hành quyết định hưởng bảo hiểm xã hội một lần."},{"k":"p","t":"6. Trường hợp người lao động quy định tại các điểm b, c và d khoản 1 và các điểm b, c và đ khoản 2 Điều này vừa đủ điều kiện hưởng lương hưu vừa đủ điều kiện hưởng bảo hiểm xã hội một lần thì người lao động được lựa chọn hưởng lương hưu hằng tháng hoặc hưởng bảo hiểm xã hội một lần."},{"k":"p","t":"7. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-41_71","no":71,"code":"Điều 71","title":"Điều 71. Bảo lưu thời gian đóng bảo hiểm xã hội","shortTitle":"Bảo lưu thời gian đóng bảo hiểm xã hội","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Người lao động khi nghỉ việc mà chưa đủ điều kiện để hưởng lương hưu theo quy định tại Điều 64, Điều 65 của Luật này hoặc chưa hưởng bảo hiểm xã hội một lần theo quy định tại Điều 70 của Luật này hoặc chưa hưởng trợ cấp hằng tháng theo quy định tại Điều 23 của Luật này thì được bảo lưu thời gian đóng bảo hiểm xã hội."}]},{"id":"luat-41_72","no":72,"code":"Điều 72","title":"Điều 72. Mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội để tính lương hưu, trợ cấp một lần","shortTitle":"Mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội để tính lương hưu, trợ cấp một lần","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định có toàn bộ thời gian đóng bảo hiểm xã hội theo chế độ tiền lương này thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của số năm đóng bảo hiểm xã hội trước khi nghỉ hưu như sau:"},{"k":"p","t":"a) Bắt đầu tham gia bảo hiểm xã hội trước ngày 01 tháng 01 năm 1995 thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của 05 năm cuối trước khi nghỉ hưu;"},{"k":"p","t":"b) Bắt đầu tham gia bảo hiểm xã hội trong khoảng thời gian từ ngày 01 tháng 01 năm 1995 đến ngày 31 tháng 12 năm 2000 thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của 06 năm cuối trước khi nghỉ hưu;"},{"k":"p","t":"c) Bắt đầu tham gia bảo hiểm xã hội trong khoảng thời gian từ ngày 01 tháng 01 năm 2001 đến ngày 31 tháng 12 năm 2006 thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của 08 năm cuối trước khi nghỉ hưu;"},{"k":"p","t":"d) Bắt đầu tham gia bảo hiểm xã hội trong khoảng thời gian từ ngày 01 tháng 01 năm 2007 đến ngày 31 tháng 12 năm 2015 thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của 10 năm cuối trước khi nghỉ hưu;"},{"k":"p","t":"đ) Bắt đầu tham gia bảo hiểm xã hội từ ngày 01 tháng 01 năm 2016 đến ngày 31 tháng 12 năm 2019 thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của 15 năm cuối trước khi nghỉ hưu;"},{"k":"p","t":"e) Bắt đầu tham gia bảo hiểm xã hội từ ngày 01 tháng 01 năm 2020 đến ngày 31 tháng 12 năm 2024 thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của 20 năm cuối trước khi nghỉ hưu;"},{"k":"p","t":"g) Bắt đầu tham gia bảo hiểm xã hội từ ngày 01 tháng 01 năm 2025 trở đi thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của toàn bộ thời gian đóng bảo hiểm xã hội."},{"k":"p","t":"2. Người lao động có toàn bộ thời gian đóng bảo hiểm xã hội theo chế độ tiền lương do người sử dụng lao động quyết định thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội của toàn bộ thời gian."},{"k":"p","t":"3. Người lao động vừa có thời gian đóng bảo hiểm xã hội thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định, vừa có thời gian đóng bảo hiểm xã hội theo chế độ tiền lương do người sử dụng lao động quyết định thì tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội chung của các thời gian, trong đó thời gian đóng theo chế độ tiền lương do Nhà nước quy định được tính bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội theo quy định tại khoản 1 Điều này."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này và quy định mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội đối với người lao động thực hiện chế độ tiền lương do Nhà nước quy định trong một số trường hợp đặc biệt."}]},{"id":"luat-41_73","no":73,"code":"Điều 73","title":"Điều 73. Điều chỉnh tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc","shortTitle":"Điều chỉnh tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc để tính mức bình quân quy định tại Điều 72 của Luật này của người lao động thuộc đối tượng thực hiện chế độ tiền lương do Nhà nước quy định được điều chỉnh như sau:"},{"k":"p","t":"a) Đối với người lao động bắt đầu tham gia bảo hiểm xã hội trước ngày 01 tháng 01 năm 2016, được điều chỉnh theo mức tham chiếu tại thời điểm hưởng chế độ hưu trí;"},{"k":"p","t":"b) Đối với người lao động bắt đầu tham gia bảo hiểm xã hội từ ngày 01 tháng 01 năm 2016 trở đi, được điều chỉnh như quy định tại khoản 2 Điều này."},{"k":"p","t":"2. Tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc để tính mức bình quân quy định tại Điều 72 của Luật này của người lao động thuộc đối tượng thực hiện chế độ tiền lương do người sử dụng lao động quyết định được điều chỉnh trên cơ sở chỉ số giá tiêu dùng của từng thời kỳ theo quy định của Chính phủ."}]},{"id":"luat-41_74","no":74,"code":"Điều 74","title":"Điều 74. Thực hiện bảo hiểm xã hội khi áp dụng chế độ tiền lương theo vị trí việc làm, chức danh và chức vụ lãnh đạo thay thế cho hệ thống bảng lương hiện hành","shortTitle":"Thực hiện bảo hiểm xã hội khi áp dụng chế độ tiền lương theo vị trí việc làm, chức danh và chức vụ lãnh đạo thay thế cho hệ thống bảng lương hiện hành","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Trường hợp Nhà nước áp dụng chế độ tiền lương theo vị trí việc làm, chức danh và chức vụ lãnh đạo thay thế cho hệ thống bảng lương hiện hành thì Chính phủ báo cáo Quốc hội xem xét, quyết định việc điều chỉnh căn cứ đóng bảo hiểm xã hội bắt buộc, cách tính mức bình quân tiền lương làm căn cứ tính lương hưu, trợ cấp bảo hiểm xã hội, điều chỉnh tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc và những nội dung cần thiết khác."}]},{"id":"luat-41_75","no":75,"code":"Điều 75","title":"Điều 75. Tạm dừng, chấm dứt, tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng","shortTitle":"Tạm dừng, chấm dứt, tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Tạm dừng việc hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng đối với người đang hưởng khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Xuất cảnh trái phép;"},{"k":"p","t":"b) Bị Tòa án tuyên bố mất tích;"},{"k":"p","t":"c) Khi không xác minh được thông tin người thụ hưởng theo quy định tại điểm c khoản 2 Điều 11 của Luật này."},{"k":"p","t":"2. Chấm dứt việc hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng đối với người đang hưởng khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Chết hoặc bị Tòa án tuyên bố là đã chết;"},{"k":"p","t":"b) Từ chối hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng bằng văn bản;"},{"k":"p","t":"c) Kết luận của cơ quan có thẩm quyền về hưởng bảo hiểm xã hội không đúng quy định của pháp luật."},{"k":"p","t":"3. Lương hưu, trợ cấp bảo hiểm xã hội hằng tháng của đối tượng quy định tại khoản 1 và điểm a khoản 2 Điều này được tiếp tục chi trả bao gồm cả tiền lương hưu, trợ cấp bảo hiểm xã hội hằng tháng của thời gian chưa nhận khi thuộc một trong các trường hợp sau đây:"},{"k":"p","t":"a) Người xuất cảnh trái phép trở về;"},{"k":"p","t":"b) Có quyết định của Tòa án hủy bỏ quyết định tuyên bố mất tích hoặc quyết định tuyên bố là đã chết;"},{"k":"p","t":"c) Đối tượng quy định tại điểm c khoản 1 Điều này đã xác minh được thông tin theo quy định tại điểm c khoản 2 Điều 11 của Luật này."},{"k":"p","t":"4. Lương hưu, trợ cấp bảo hiểm xã hội hằng tháng của đối tượng quy định tại điểm b khoản 2 Điều này được tiếp tục chi trả kể từ thời điểm cơ quan bảo hiểm xã hội nhận văn bản đề nghị được hưởng lại lương hưu, trợ cấp bảo hiểm xã hội hằng tháng và không bao gồm tiền lương hưu, trợ cấp bảo hiểm xã hội hằng tháng của thời gian chưa nhận do từ chối nhận."},{"k":"p","t":"5. Người hưởng lương hưu hoặc trợ cấp bảo hiểm xã hội hằng tháng có thời gian chưa nhận lương hưu, trợ cấp trước khi chết thì thân nhân của người đó được nhận lương hưu, trợ cấp của những tháng chưa nhận."},{"k":"p","t":"6. Người bị tạm dừng hưởng lương hưu hoặc trợ cấp bảo hiểm xã hội hằng tháng khi có quyết định của Tòa án tuyên bố mất tích, sau đó có quyết định của Tòa án tuyên bố là đã chết thì thân nhân của người đó không được nhận lương hưu, trợ cấp trong thời gian tạm dừng hưởng."},{"k":"p","t":"7. Các trường hợp tạm dừng, chấm dứt, hưởng tiếp lương hưu, trợ cấp bảo hiểm xã hội hằng tháng khác theo quy định của Chính phủ."}]},{"id":"luat-41_76","no":76,"code":"Điều 76","title":"Điều 76. Trợ cấp một lần đối với người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng ra nước ngoài để định cư","shortTitle":"Trợ cấp một lần đối với người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng ra nước ngoài để định cư","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng ra nước ngoài để định cư nếu có nguyện vọng thì được giải quyết hưởng trợ cấp một lần."},{"k":"p","t":"2. Mức trợ cấp một lần đối với người đang hưởng lương hưu được tính theo thời gian đã đóng bảo hiểm xã hội trong đó mỗi năm đóng bảo hiểm xã hội trước năm 2014 được tính bằng 1,5 tháng lương hưu đang hưởng, mỗi năm đóng bảo hiểm xã hội từ năm 2014 trở đi được tính bằng 02 tháng lương hưu đang hưởng; sau đó mỗi tháng đã hưởng lương hưu thì mức trợ cấp một lần trừ 0,5 tháng lương hưu. Mức thấp nhất bằng 03 tháng lương hưu đang hưởng."},{"k":"p","t":"3. Mức trợ cấp một lần đối với người đang hưởng trợ cấp bảo hiểm xã hội hằng tháng bằng 03 tháng trợ cấp đang hưởng."},{"k":"p","t":"4. Hồ sơ đề nghị hưởng trợ cấp một lần bao gồm văn bản đề nghị hưởng trợ cấp một lần kèm theo bản sao giấy xác nhận của cơ quan có thẩm quyền về việc thôi quốc tịch Việt Nam hoặc bản dịch tiếng Việt được chứng thực hoặc công chứng một trong các giấy tờ quy định tại các điểm a, b, c và d khoản 2 Điều 78 của Luật này."},{"k":"p","t":"5. Trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_77","no":77,"code":"Điều 77","title":"Điều 77. Hồ sơ đề nghị hưởng lương hưu đối với người tham gia bảo hiểm xã hội bắt buộc","shortTitle":"Hồ sơ đề nghị hưởng lương hưu đối với người tham gia bảo hiểm xã hội bắt buộc","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng lương hưu đối với người đang tham gia bảo hiểm xã hội bắt buộc bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội;"},{"k":"p","t":"b) Bản chính hoặc bản sao văn bản xác định việc chấm dứt hợp đồng lao động hoặc văn bản chấm dứt làm việc hoặc văn bản đề nghị của đối tượng quy định tại các điểm g, h, m và n khoản 1 Điều 2 của Luật này."},{"k":"p","t":"2. Hồ sơ đề nghị hưởng lương hưu đối với người đang bảo lưu thời gian đóng bảo hiểm xã hội bắt buộc bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội;"},{"k":"p","t":"b) Văn bản đề nghị của người đang bảo lưu thời gian đóng bảo hiểm xã hội bắt buộc."},{"k":"p","t":"3. Trường hợp quy định tại Điều 65 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật nặng, đặc biệt nặng có thể hiện kết luận của Hội đồng giám định y khoa ghi rõ tỷ lệ phần trăm suy giảm khả năng lao động."},{"k":"p","t":"4. Trường hợp quy định tại điểm d khoản 1 và điểm c khoản 2 Điều 64 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm bản sao giấy chứng nhận bị nhiễm HIV do tai nạn rủi ro nghề nghiệp."}]},{"id":"luat-41_78","no":78,"code":"Điều 78","title":"Điều 78. Hồ sơ đề nghị hưởng bảo hiểm xã hội một lần","shortTitle":"Hồ sơ đề nghị hưởng bảo hiểm xã hội một lần","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng bảo hiểm xã hội một lần bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội;"},{"k":"p","t":"b) Văn bản đề nghị hưởng bảo hiểm xã hội một lần của người lao động."},{"k":"p","t":"2. Trường hợp quy định tại điểm b khoản 1 Điều 70 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm bản sao giấy xác nhận của cơ quan có thẩm quyền về việc thôi quốc tịch Việt Nam hoặc bản dịch tiếng Việt được chứng thực hoặc công chứng một trong các giấy tờ sau đây:"},{"k":"p","t":"a) Hộ chiếu do nước ngoài cấp;"},{"k":"p","t":"b) Thị thực của cơ quan nước ngoài có thẩm quyền cấp có xác nhận việc cho phép nhập cảnh để định cư ở nước ngoài;"},{"k":"p","t":"c) Thẻ thường trú dài hạn ở nước ngoài của cơ quan nước ngoài có thẩm quyền cấp;"},{"k":"p","t":"d) Giấy tờ hợp pháp khác thể hiện việc định cư ở nước ngoài theo quy định của Chính phủ."},{"k":"p","t":"3. Trường hợp quy định tại điểm c khoản 1 và điểm b khoản 2 Điều 70 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm bản tóm tắt hồ sơ bệnh án hoặc bản chính hoặc bản sao giấy ra viện."},{"k":"p","t":"4. Trường hợp quy định tại điểm d khoản 1 và điểm c khoản 2 Điều 70 của Luật này, ngoài hồ sơ quy định tại khoản 1 Điều này thì có thêm biên bản giám định mức suy giảm khả năng lao động của Hội đồng giám định y khoa hoặc bản sao giấy xác nhận mức độ khuyết tật đặc biệt nặng."}]},{"id":"luat-41_79","no":79,"code":"Điều 79","title":"Điều 79. Giải quyết hưởng lương hưu, hưởng bảo hiểm xã hội một lần","shortTitle":"Giải quyết hưởng lương hưu, hưởng bảo hiểm xã hội một lần","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Trong thời hạn 20 ngày trước thời điểm người lao động đủ điều kiện hưởng lương hưu, người sử dụng lao động nộp hồ sơ quy định tại Điều 77 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"Trong thời hạn 20 ngày trước thời điểm đủ điều kiện hưởng lương hưu, người đang bảo lưu thời gian đóng bảo hiểm xã hội bắt buộc nộp hồ sơ quy định tại Điều 77 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Người lao động khi đủ điều kiện hưởng bảo hiểm xã hội một lần nộp hồ sơ quy định tại Điều 78 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"3. Trong thời hạn 20 ngày, không bao gồm ngày nghỉ lễ, tết, kể từ ngày nhận đủ hồ sơ theo quy định đối với người đề nghị hưởng lương hưu hoặc trong thời hạn 07 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định đối với người đề nghị hưởng bảo hiểm xã hội một lần, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_80","no":80,"code":"Điều 80","title":"Điều 80. Hồ sơ đề nghị tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng trong trường hợp đã bị tạm dừng hoặc chấm dứt hưởng","shortTitle":"Hồ sơ đề nghị tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng trong trường hợp đã bị tạm dừng hoặc chấm dứt hưởng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Hồ sơ đề nghị tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng đối với các trường hợp quy định tại điểm a và điểm b khoản 3 và khoản 4 Điều 75 của Luật này bao gồm văn bản đề nghị tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng và giấy tờ khác tùy theo từng trường hợp sau đây:"},{"k":"p","t":"1. Văn bản của cơ quan nhà nước có thẩm quyền về việc trở về nước đối với trường hợp quy định điểm a khoản 3 Điều 75 của Luật này;"},{"k":"p","t":"2. Quyết định của Tòa án hủy bỏ quyết định tuyên bố mất tích hoặc hủy bỏ quyết định tuyên bố là đã chết đối với trường hợp quy định điểm b khoản 3 Điều 75 của Luật này."}]},{"id":"luat-41_81","no":81,"code":"Điều 81","title":"Điều 81. Giải quyết tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng trong trường hợp đã bị tạm dừng hoặc chấm dứt hưởng","shortTitle":"Giải quyết tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng trong trường hợp đã bị tạm dừng hoặc chấm dứt hưởng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người đề nghị tiếp tục hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng nộp hồ sơ quy định tại Điều 80 của Luật này cho cơ quan bảo hiểm xã hội."},{"k":"p","t":"2. Trong thời hạn 10 ngày làm việc kể từ ngày nhận đủ hồ sơ theo quy định, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_82","no":82,"code":"Điều 82","title":"Điều 82. Thay đổi hình thức nhận, nơi nhận lương hưu, trợ cấp bảo hiểm xã hội hằng tháng","shortTitle":"Thay đổi hình thức nhận, nơi nhận lương hưu, trợ cấp bảo hiểm xã hội hằng tháng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người đang hưởng lương hưu, trợ cấp bảo hiểm xã hội hằng tháng có nguyện vọng thay đổi hình thức nhận hoặc thay đổi nơi nhận do chuyển nơi cư trú trong nước thì có văn bản gửi cơ quan bảo hiểm xã hội nơi đang chi trả."},{"k":"p","t":"2. Trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản quy định tại khoản 1 Điều này, cơ quan bảo hiểm xã hội có trách nhiệm giải quyết; trường hợp không giải quyết thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"luat-41_83","no":83,"code":"Điều 83","title":"Điều 83. Hồ sơ, trình tự khám giám định mức suy giảm khả năng lao động để giải quyết chế độ bảo hiểm xã hội","shortTitle":"Hồ sơ, trình tự khám giám định mức suy giảm khả năng lao động để giải quyết chế độ bảo hiểm xã hội","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Hồ sơ, trình tự khám giám định mức suy giảm khả năng lao động để giải quyết chế độ bảo hiểm xã hội do Bộ trưởng Bộ Y tế quy định."},{"k":"p","t":"2. Việc khám giám định mức suy giảm khả năng lao động phải bảo đảm chính xác, công khai, minh bạch. Hội đồng giám định y khoa chịu trách nhiệm về tính chính xác của kết quả giám định."},{"k":"p","t":"CHẾ ĐỘ TỬ TUẤT"}]},{"id":"luat-41_84","no":84,"code":"Điều 84","title":"Điều 84. Đối tượng hưởng chế độ tử tuất","shortTitle":"Đối tượng hưởng chế độ tử tuất","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"Đối tượng hưởng chế độ tử tuất của người tham gia bảo hiểm xã hội bị chết là thân nhân quy định khoản 2 Điều 86, các điểm a, b và c khoản 2 Điều 88 của Luật này; người thừa kế quy định tại điểm d khoản 2 Điều 88 của Luật này; tổ chức, cá nhân lo mai táng quy định khoản 1 Điều 85 của Luật này và thân nhân quy định tại khoản 3 Điều 85 của Luật này."}]},{"id":"luat-41_85","no":85,"code":"Điều 85","title":"Điều 85. Trợ cấp mai táng","shortTitle":"Trợ cấp mai táng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Người sau đây khi chết thì tổ chức, cá nhân lo mai táng được nhận một lần trợ cấp mai táng:"},{"k":"p","t":"a) Đối tượng quy định tại khoản 1 và khoản 2 Điều 2 của Luật này có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 12 tháng trở lên;"},{"k":"p","t":"b) Chết do tai nạn lao động, bệnh nghề nghiệp theo quy định của pháp luật về an toàn, vệ sinh lao động;"},{"k":"p","t":"c) Người đang hưởng hoặc đang tạm dừng hưởng lương hưu; người đang hưởng hoặc đang tạm dừng hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc."},{"k":"p","t":"2. Mức trợ cấp mai táng bằng 10 lần mức tham chiếu tại tháng mà người quy định tại khoản 1 Điều này chết."},{"k":"p","t":"3. Trường hợp đối tượng quy định tại các điểm a, b và c khoản 1 Điều này bị Tòa án tuyên bố là đã chết thì thân nhân được hưởng trợ cấp mai táng quy định tại khoản 2 Điều này."}]},{"id":"luat-41_86","no":86,"code":"Điều 86","title":"Điều 86. Các trường hợp hưởng trợ cấp tuất hằng tháng","shortTitle":"Các trường hợp hưởng trợ cấp tuất hằng tháng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Đối tượng quy định tại khoản 1 Điều 2 của Luật này khi chết hoặc bị Tòa án tuyên bố là đã chết thuộc một trong các trường hợp sau đây thì thân nhân quy định tại khoản 2 Điều này được hưởng tiền tuất hằng tháng:"},{"k":"p","t":"a) Có thời gian đóng bảo hiểm xã hội bắt buộc từ đủ 15 năm trở lên;"},{"k":"p","t":"b) Đang hưởng lương hưu hoặc đang tạm dừng hưởng lương hưu;"},{"k":"p","t":"c) Chết do tai nạn lao động, bệnh nghề nghiệp theo quy định của pháp luật về an toàn, vệ sinh lao động;"},{"k":"p","t":"d) Đang hưởng hoặc đang tạm dừng hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng với mức suy giảm khả năng lao động từ 61% trở lên."},{"k":"p","t":"2. Thân nhân của đối tượng quy định tại khoản 1 Điều này được hưởng trợ cấp tuất hằng tháng, bao gồm:"},{"k":"p","t":"a) Các con bao gồm cả con khi người mẹ đang mang thai mà người cha chết, con khi lao động nữ mang thai hộ đang mang thai mà người cha hoặc người mẹ nhờ mang thai hộ chết thì được hưởng đến khi đủ 18 tuổi;"},{"k":"p","t":"b) Con bị suy giảm khả năng lao động từ 81% trở lên;"},{"k":"p","t":"c) Vợ, chồng đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động. Vợ, chồng chưa đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động mà bị suy giảm khả năng lao động từ 81% trở lên;"},{"k":"p","t":"d) Cha đẻ, mẹ đẻ; cha đẻ, mẹ đẻ của vợ hoặc của chồng; thành viên khác của gia đình đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động mà người quy định tại khoản 1 Điều này đang có nghĩa vụ nuôi dưỡng theo quy định của pháp luật về hôn nhân và gia đình;"},{"k":"p","t":"đ) Cha đẻ, mẹ đẻ; cha đẻ, mẹ đẻ của vợ hoặc của chồng; thành viên khác của gia đình chưa đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động bị suy giảm khả năng lao động từ 81% trở lên mà người tham gia bảo hiểm xã hội đang có nghĩa vụ nuôi dưỡng theo quy định của pháp luật về hôn nhân và gia đình."},{"k":"p","t":"3. Không áp dụng trợ cấp tuất hằng tháng đối với thân nhân quy định tại các điểm b, c, d và đ khoản 2 Điều này là người đang hưởng tiền lương và tham gia bảo hiểm xã hội bắt buộc hoặc đang hưởng lương hưu, trợ cấp mất sức lao động hằng tháng, trợ cấp hằng tháng mà mức hưởng bằng hoặc cao hơn mức tham chiếu, không bao gồm khoản trợ cấp theo quy định của pháp luật về ưu đãi người có công với cách mạng."},{"k":"p","t":"4. Kết quả khám giám định mức suy giảm khả năng lao động để hưởng trợ cấp tuất hằng tháng phải được xác định chậm nhất 06 tháng kể từ ngày người tham gia bảo hiểm xã hội chết hoặc kể từ ngày thân nhân quy định tại điểm a khoản 2 Điều này hết thời hạn hưởng trợ cấp theo quy định."},{"k":"p","t":"5. Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định về việc tính, việc xác định điều kiện đối với từng trường hợp để giải quyết chế độ tử tuất."}]},{"id":"luat-41_87","no":87,"code":"Điều 87","title":"Điều 87. Mức trợ cấp tuất hằng tháng","shortTitle":"Mức trợ cấp tuất hằng tháng","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Mức trợ cấp tuất hằng tháng đối với mỗi thân nhân bằng 50% mức tham chiếu; trường hợp thân nhân không có người trực tiếp nuôi dưỡng thì mức trợ cấp tuất hằng tháng bằng 70% mức tham chiếu."},{"k":"p","t":"Bộ trưởng Bộ Lao động - Thương binh và Xã hội quy định việc xác định thân nhân không có người trực tiếp nuôi dưỡng."},{"k":"p","t":"2. Trường hợp một người chết hoặc bị Tòa án tuyên bố là đã chết thuộc đối tượng quy định tại khoản 1 Điều 86 của Luật này thì số thân nhân được hưởng trợ cấp tuất hằng tháng tối đa 04 người; trường hợp có từ 02 người chết hoặc bị Tòa án tuyên bố là đã chết trở lên thì thân nhân được hưởng 02 lần mức trợ cấp quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Thời điểm hưởng trợ cấp tuất hằng tháng được tính kể từ ngày đầu tiên của tháng liền kề sau tháng mà đối tượng quy định tại khoản 1 Điều 86 của Luật này chết hoặc bị Tòa án tuyên bố là đã chết. Trường hợp con được sinh sau thời điểm người cha, người cha là chồng của người mẹ nhờ mang thai hộ hoặc người mẹ nhờ mang thai hộ chết thì thời điểm hưởng trợ cấp tuất hằng tháng của con tính từ tháng con được sinh."}]},{"id":"luat-41_88","no":88,"code":"Điều 88","title":"Điều 88. Các trường hợp hưởng trợ cấp tuất một lần","shortTitle":"Các trường hợp hưởng trợ cấp tuất một lần","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Các đối tượng sau đây chết hoặc bị Tòa án tuyên bố là đã chết thì thân nhân được xét hưởng trợ cấp tuất một lần:"},{"k":"p","t":"a) Người đang tham gia bảo hiểm xã hội hoặc đang bảo lưu thời gian đóng bảo hiểm xã hội;"},{"k":"p","t":"b) Người đang hưởng hoặc đang tạm dừng hưởng lương hưu; người đang hưởng hoặc đang tạm dừng hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc."},{"k":"p","t":"2. Đối tượng quy định tại khoản 1 Điều này khi chết thì thân nhân được hưởng tiền tuất một lần trong các trường hợp sau đây:"},{"k":"p","t":"a) Không đủ điều kiện quy định tại điểm a khoản 1 Điều 86 của Luật này;"},{"k":"p","t":"b) Thuộc một trong các trường hợp quy định tại khoản 1 Điều 86 của Luật này nhưng không có thân nhân hưởng tiền tuất hằng tháng quy định tại khoản 2 Điều 86 của Luật này;"},{"k":"p","t":"c) Thân nhân thuộc diện hưởng trợ cấp tuất hằng tháng theo quy định tại khoản 2 Điều 86 của Luật này nhưng có nguyện vọng hưởng trợ cấp tuất một lần;"},{"k":"p","t":"d) Trường hợp không có thân nhân quy định tại khoản 7 Điều 3 của Luật này thì trợ cấp tuất một lần được thực hiện theo quy định của pháp luật về thừa kế."}]},{"id":"luat-41_89","no":89,"code":"Điều 89","title":"Điều 89. Mức trợ cấp tuất một lần","shortTitle":"Mức trợ cấp tuất một lần","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Mức trợ cấp tuất một lần đối với thân nhân của đối tượng quy định tại điểm a khoản 1 Điều 88 của Luật này bằng mức trợ cấp tuất cho mỗi năm đóng bảo hiểm xã hội nhân với số năm đóng bảo hiểm xã hội nhưng không thấp hơn 03 tháng mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội. Mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội để tính trợ cấp tuất một lần thực hiện theo quy định tại Điều 72 của Luật này tính đến thời điểm dừng đóng. Mức trợ cấp tuất cho mỗi năm đóng bảo hiểm xã hội được quy định như sau:"},{"k":"p","t":"a) Bằng 1,5 tháng mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội cho những năm đóng bảo hiểm xã hội trước năm 2014."},{"k":"p","t":"Trường hợp thời gian đóng bảo hiểm xã hội có cả trước và sau năm 2014 mà thời gian đóng trước năm 2014 có tháng lẻ thì những tháng lẻ đó được chuyển sang giai đoạn đóng bảo hiểm xã hội từ năm 2014 trở đi;"},{"k":"p","t":"b) Bằng 02 tháng mức bình quân tiền lương làm căn cứ đóng bảo hiểm xã hội cho các năm đóng bảo hiểm xã hội từ năm 2014 trở đi."},{"k":"p","t":"2. Mức trợ cấp tuất một lần đối với thân nhân của người đang hưởng lương hưu hoặc đang tạm dừng hưởng lương hưu chết được tính theo thời gian đã hưởng lương hưu và được quy định như sau:"},{"k":"p","t":"a) Trường hợp chết trong 02 tháng đầu thì mức trợ cấp tuất một lần bằng 48 tháng lương hưu của tháng đang hưởng;"},{"k":"p","t":"b) Trường hợp chết từ tháng thứ ba trở đi thì cứ mỗi tháng mức trợ cấp tuất một lần giảm 0,5 tháng lương hưu so với mức trợ cấp quy định tại điểm a khoản này nhưng không thấp hơn 03 tháng lương hưu của tháng đang hưởng."},{"k":"p","t":"3. Mức trợ cấp tuất một lần đối với thân nhân của người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đã nghỉ việc hưởng bảo hiểm xã hội một lần trước khi chết bằng 03 tháng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng của tháng đang hưởng."},{"k":"p","t":"4. Mức tham chiếu dùng để tính trợ cấp tuất một lần là mức tham chiếu tại tháng mà đối tượng quy định tại điểm a khoản 1 Điều 88 của Luật này chết."},{"k":"p","t":"5. Chính phủ quy định việc giải quyết chế độ tử tuất đối với trường hợp người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng chưa nghỉ việc hoặc còn bảo lưu thời gian đóng bảo hiểm xã hội và người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng đồng thời là người đang hưởng lương hưu."}]},{"id":"luat-41_90","no":90,"code":"Điều 90","title":"Điều 90. Hồ sơ đề nghị hưởng chế độ tử tuất","shortTitle":"Hồ sơ đề nghị hưởng chế độ tử tuất","chuong":"Chương V — BẢO HIỂM XÃ HỘI BẮT BUỘC","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Hồ sơ đề nghị hưởng chế độ tử tuất đối với thân nhân của người đang tham gia bảo hiểm xã hội hoặc đang bảo lưu thời gian đóng bảo hiểm xã hội bao gồm:"},{"k":"p","t":"a) Sổ bảo hiểm xã hội;"},{"k":"p","t":"b) Bản sao giấy chứng tử hoặc trích lục khai tử hoặc bản sao giấy báo tử hoặc bản sao quyết định của Tòa án tuyên bố là đã chết;"},{"k":"p","t
