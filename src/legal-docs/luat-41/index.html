n Thường vụ Quốc hội quyết định về mức chi.","Kiểm toán nhà nước kiểm toán hằng năm đối với báo cáo quyết toán chi tổ chức và hoạt động BHXH.","Chính phủ quy định chi tiết khoản 1 và khoản 2."]},"luat-41_121":{"tldr":"Hoạt động đầu tư quỹ bảo hiểm xã hội phải bảo đảm an toàn, bền vững, hiệu quả; đa dạng hóa danh mục và thực hiện theo chiến lược dài hạn cùng phương án đầu tư hằng năm.","points":["Bảo đảm an toàn, bền vững và hiệu quả.","Đa dạng hóa danh mục đầu tư, cơ cấu và phương thức đầu tư phù hợp năng lực và cơ sở vật chất; ưu tiên đầu tư vào trái phiếu Chính phủ, nhất là trái phiếu Chính phủ dài hạn.","Thực hiện theo chiến lược đầu tư dài hạn và phương án đầu tư hằng năm."]},"luat-41_122":{"tldr":"Quy định danh mục đầu tư quỹ bảo hiểm xã hội tại thị trường trong nước và quốc tế cùng các phương thức đầu tư; Chính phủ quy định lộ trình, tiêu chí, cơ cấu và phương thức.","points":["Danh mục trong nước: công cụ nợ của Chính phủ (trái phiếu Chính phủ, tín phiếu Kho bạc Nhà nước, công trái xây dựng Tổ quốc); trái phiếu chính quyền địa phương, trái phiếu được Chính phủ bảo lãnh.","Tiền gửi, trái phiếu, chứng chỉ tiền gửi tại ngân hàng thương mại nhà nước và ngân hàng thương mại cổ phần có vốn nhà nước trên 50% vốn điều lệ; không đầu tư tại ngân hàng đang được kiểm soát đặc biệt.","Đầu tư tại thị trường quốc tế là trái phiếu Chính phủ.","Phương thức đầu tư: tự đầu tư, ủy thác đầu tư tại thị trường trong nước, thị trường quốc tế.","Chính phủ quy định lộ trình đa dạng hóa, tiêu chí danh mục, cơ cấu và phương thức đầu tư, bảo đảm nguyên tắc tại Điều 121."]},"luat-41_123":{"tldr":"Quỹ bảo hiểm xã hội được đầu tư và hạch toán độc lập theo từng quỹ thành phần; hoạt động đầu tư phải được kiểm soát, quản lý rủi ro và trích lập dự phòng rủi ro.","points":["Đầu tư và hạch toán độc lập theo từng quỹ thành phần.","Hoạt động đầu tư phải được kiểm soát, quản lý rủi ro và trích lập dự phòng rủi ro.","Chính phủ quy định quy trình kiểm soát, quản lý rủi ro đầu tư, trích lập và sử dụng dự phòng rủi ro."]},"luat-41_125":{"tldr":"Bảo hiểm hưu trí bổ sung dựa trên mức đóng tự nguyện thỏa thuận, quản lý theo tài khoản hưu trí cá nhân, công khai minh bạch; mức chi trả xác định trên số dư tài khoản tại thời điểm chi trả.","points":["Mức đóng do người sử dụng lao động và người lao động tự nguyện thỏa thuận.","Khoản đóng góp được quản lý theo từng tài khoản hưu trí cá nhân.","Quản lý theo nguyên tắc công khai, minh bạch và đầu tư đúng quy định pháp luật.","Mức chi trả xác định trên số dư tài khoản hưu trí cá nhân tại thời điểm chi trả, tích lũy qua đầu tư theo nguyên tắc thị trường."]},"luat-41_126":{"tldr":"Quỹ bảo hiểm hưu trí bổ sung là quỹ tài chính độc lập với ngân sách nhà nước, hình thành từ đóng góp và tiền sinh lời đầu tư, dùng để chi trả chế độ hưu trí bổ sung và chi phí quản lý.","points":["Là quỹ tài chính độc lập với ngân sách nhà nước; hạch toán, kế toán, lập báo cáo tài chính, kiểm toán theo pháp luật về kế toán và kiểm toán.","Nguồn hình thành: đóng góp của người sử dụng lao động, người lao động và tiền sinh lời của hoạt động đầu tư của quỹ.","Sử dụng để chi trả chế độ hưu trí bổ sung cho người lao động, chi phí tổ chức và hoạt động quản lý."]},"luat-41_127":{"tldr":"Nhà nước khuyến khích phát triển bảo hiểm hưu trí bổ sung qua ưu đãi thuế, hoàn thiện pháp luật và chính sách; Chính phủ quy định về bảo hiểm hưu trí bổ sung.","points":["Khuyến khích phát triển thông qua các chính sách ưu đãi theo pháp luật về thuế.","Hoàn thiện pháp luật, chính sách; tổ chức thực hiện chuyên nghiệp, hiện đại, minh bạch; tạo điều kiện đóng góp thêm để hưởng lương hưu cao hơn.","Chính phủ quy định về bảo hiểm hưu trí bổ sung."]},"luat-41_128":{"tldr":"Cá nhân, cơ quan, tổ chức có quyền đề nghị cơ quan, tổ chức, cá nhân có thẩm quyền xem xét lại quyết định, hành vi khi có căn cứ cho rằng trái pháp luật về bảo hiểm xã hội, xâm phạm quyền và lợi ích hợp pháp của mình.","points":[]},"luat-41_129":{"tldr":"Khiếu nại và giải quyết khiếu nại đối với quyết định, hành vi hành chính về bảo hiểm xã hội thực hiện theo pháp luật về khiếu nại; trường hợp trong hoạt động thanh tra thực hiện theo pháp luật về thanh tra.","points":["Khiếu nại quyết định, hành vi hành chính về bảo hiểm xã hội của cơ quan hành chính nhà nước, người có thẩm quyền; khiếu nại quyết định xử phạt vi phạm hành chính của cơ quan bảo hiểm xã hội, người có thẩm quyền: thực hiện theo pháp luật về khiếu nại, trừ trường hợp tại khoản 2.","Khiếu nại quyết định, hành vi trong hoạt động thanh tra về bảo hiểm xã hội: thực hiện theo pháp luật về thanh tra."]},"luat-41_130":{"tldr":"Quy định khái niệm quyết định, hành vi về bảo hiểm xã hội và trình tự, thẩm quyền giải quyết khiếu nại (lần đầu, lần hai, khởi kiện tại Tòa án), gồm trường hợp đặc thù trước ngày 01/01/1995.","points":["Quyết định về bảo hiểm xã hội là văn bản do cơ quan/người có thẩm quyền của cơ quan bảo hiểm xã hội ban hành; hành vi là việc thực hiện hoặc không thực hiện trách nhiệm theo pháp luật.","Khiếu nại lần đầu đến người đã ra quyết định hoặc cơ quan bảo hiểm xã hội nơi có hành vi, hoặc khởi kiện tại Tòa án.","Không đồng ý giải quyết lần đầu hoặc hết thời hạn chưa giải quyết: khiếu nại lần hai đến Thủ trưởng cơ quan bảo hiểm xã hội cấp trên trực tiếp hoặc khởi kiện; không đồng ý lần hai hoặc hết thời hạn: khởi kiện tại Tòa án.","Thẩm quyền: Thủ trưởng cơ quan bảo hiểm xã hội giải quyết lần đầu với quyết định, hành vi của mình và người do mình quản lý trực tiếp; cấp trên trực tiếp giải quyết lần hai.","Trường hợp liên quan thụ hưởng chế độ hoặc tính thời gian công tác khu vực nhà nước trước ngày 01/01/1995 mà không đủ/không còn hồ sơ gốc hoặc không còn cơ quan quản lý: Thủ trưởng cơ quan bảo hiểm xã hội cấp tỉnh giải quyết lần đầu, sau đó Chủ tịch Ủy ban nhân dân cấp tỉnh hoặc khởi kiện tại Tòa án.","Thời hiệu, trình tự, thủ tục theo pháp luật về khiếu nại; Chính phủ quy định chi tiết Điều này."]},"luat-41_131":{"tldr":"Tố cáo, giải quyết tố cáo về bảo hiểm xã hội thực hiện theo pháp luật về tố cáo; cơ quan bảo hiểm xã hội giải quyết tố cáo về chấp hành pháp luật, riêng hành vi trước năm 1995 do Chủ tịch Ủy ban nhân dân cấp tỉnh giải quyết.","points":["Tố cáo, giải quyết tố cáo hành vi vi phạm trong thực hiện nhiệm vụ, công vụ và quản lý nhà nước về bảo hiểm xã hội: theo pháp luật về tố cáo.","Cơ quan bảo hiểm xã hội giải quyết tố cáo hành vi vi phạm trong chấp hành pháp luật về bảo hiểm xã hội, trừ trường hợp tại khoản 3.","Chủ tịch Ủy ban nhân dân cấp tỉnh giải quyết tố cáo hành vi vi phạm trong chấp hành pháp luật về bảo hiểm xã hội trước năm 1995.","Trình tự, thủ tục theo pháp luật về tố cáo; Chính phủ quy định chi tiết Điều này."]},"luat-41_132":{"tldr":"Cơ quan, tổ chức, cá nhân vi phạm Luật này, tùy tính chất, mức độ bị xử lý theo quy định; gây thiệt hại phải bồi thường.","points":["Cơ quan, tổ chức vi phạm bị xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm hình sự; gây thiệt hại phải bồi thường.","Cá nhân vi phạm bị xử phạt vi phạm hành chính, xử lý kỷ luật hoặc truy cứu trách nhiệm hình sự; gây thiệt hại phải bồi thường."]},"luat-41_133":{"tldr":"Liệt kê các nội dung quản lý nhà nước về bảo hiểm xã hội.","points":["Ban hành, trình ban hành và tổ chức thực hiện chiến lược, chính sách, pháp luật; tuyên truyền, phổ biến, giáo dục pháp luật về bảo hiểm xã hội.","Thực hiện công tác thống kê nhà nước; đào tạo, bồi dưỡng và phát triển nguồn nhân lực về bảo hiểm xã hội.","Tổ chức bộ máy thực hiện bảo hiểm xã hội; cơ chế tài chính, tài chính quỹ bảo hiểm xã hội.","Kiểm tra, thanh tra, giải quyết khiếu nại, tố cáo và xử lý vi phạm pháp luật về bảo hiểm xã hội.","Sơ kết, tổng kết, khen thưởng; hợp tác quốc tế về bảo hiểm xã hội."]},"luat-41_134":{"tldr":"Chính phủ thống nhất quản lý nhà nước về bảo hiểm xã hội; Bộ Lao động - Thương binh và Xã hội là cơ quan đầu mối, Bộ Tài chính quản lý về tài chính, cùng các Bộ, Ủy ban nhân dân và Bảo hiểm xã hội Việt Nam phối hợp.","points":["Chính phủ thống nhất quản lý nhà nước về bảo hiểm xã hội.","Bộ Lao động - Thương binh và Xã hội là cơ quan đầu mối; Bộ Tài chính giúp Chính phủ quản lý nhà nước về tài chính bảo hiểm xã hội, tài chính quỹ bảo hiểm xã hội.","Bộ, cơ quan ngang Bộ thực hiện và phối hợp với Bộ Lao động - Thương binh và Xã hội, Bộ Tài chính.","Ủy ban nhân dân các cấp quản lý nhà nước về bảo hiểm xã hội tại địa phương.","Bảo hiểm xã hội Việt Nam tham gia, phối hợp với Bộ Lao động - Thương binh và Xã hội, Bộ Tài chính, Ủy ban nhân dân cấp tỉnh."]},"luat-41_135":{"tldr":"Quy định trách nhiệm của Chính phủ trong quản lý, chỉ đạo, quyết toán, cải cách hành chính và báo cáo Quốc hội về bảo hiểm xã hội.","points":["Thống nhất quản lý, chỉ đạo, bảo đảm phối hợp chặt chẽ giữa các cơ quan trong thực hiện bảo hiểm xã hội.","Quy định lập quyết toán và phân công cơ quan duyệt, thẩm định, phê chuẩn quyết toán chi tổ chức và hoạt động; quy định quyết toán thu, chi quỹ bảo hiểm xã hội, quỹ bảo hiểm y tế, quỹ bảo hiểm thất nghiệp.","Thực hiện cải cách hành chính về bảo hiểm xã hội thuận tiện, có lợi hơn cho người tham gia và người thụ hưởng.","Quyết định hoặc trình quyết định biện pháp xử lý, hỗ trợ khi cần thiết để bảo vệ quyền, lợi ích chính đáng của người lao động, người sử dụng lao động.","Định kỳ hằng năm báo cáo Quốc hội tình hình thực hiện chính sách, chế độ, quản lý và sử dụng quỹ; định kỳ 05 năm báo cáo Quốc hội về đánh giá, dự báo khả năng cân đối quỹ hưu trí và tử tuất."]},"luat-41_136":{"tldr":"Quy định trách nhiệm của Bộ Lao động - Thương binh và Xã hội về xây dựng chính sách, tuyên truyền, chỉ đạo, thanh tra và các nhiệm vụ liên quan đến trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc và tự nguyện.","points":["Xây dựng, trình hoặc ban hành chính sách, pháp luật, chiến lược, kế hoạch phát triển bảo hiểm xã hội; ban hành Bộ chỉ số đánh giá mức độ hài lòng đối với thực hiện chính sách bảo hiểm xã hội, bảo hiểm thất nghiệp.","Chủ trì phối hợp xây dựng và trình Chính phủ ban hành chỉ tiêu phát triển đối tượng tham gia bảo hiểm xã hội bắt buộc, tự nguyện.","Tuyên truyền, phổ biến, giáo dục pháp luật; chỉ đạo, hướng dẫn tổ chức thực hiện chính sách, pháp luật về trợ cấp hưu trí xã hội, bảo hiểm xã hội bắt buộc, tự nguyện.","Kiểm tra, thanh tra, xử lý vi phạm, giải quyết khiếu nại, tố cáo, trừ quy định tại khoản 2 Điều 137.","Chủ trì phối hợp thực hiện thống kê, thông tin; tổ chức đào tạo, bồi dưỡng, tập huấn; nghiên cứu khoa học và hợp tác quốc tế về bảo hiểm xã hội.","Chủ trì, phối hợp Bộ Tài chính xây dựng báo cáo của Chính phủ tại khoản 5 Điều 135; trình Chính phủ quy định chức năng, nhiệm vụ, quyền hạn và cơ cấu tổ chức cơ quan bảo hiểm xã hội theo khoản 2 Điều 16."]},"luat-41_137":{"tldr":"Quy định trách nhiệm của Bộ Tài chính về cơ chế tài chính bảo hiểm xã hội, thanh tra tài chính, đầu tư quỹ và chính sách bảo hiểm hưu trí bổ sung.","points":["Xây dựng, trình hoặc ban hành cơ chế tài chính về bảo hiểm xã hội; quy định về chi tổ chức và hoạt động bảo hiểm xã hội tại Điều 120.","Kiểm tra, thanh tra, xử lý vi phạm và giải quyết khiếu nại, tố cáo về quản lý tài chính bảo hiểm xã hội.","Chủ trì xây dựng nội dung về tình hình quản lý và sử dụng quỹ gửi Bộ Lao động - Thương binh và Xã hội để tổng hợp báo cáo tại khoản 5 Điều 135; chủ trì xây dựng báo cáo tại khoản 3 Điều 120.","Trình Chính phủ quy định về hoạt động đầu tư quỹ; hạch toán, phân bổ các quỹ thành phần.","Xây dựng, trình hoặc ban hành chính sách, pháp luật về bảo hiểm hưu trí bổ sung; chỉ đạo, hướng dẫn, theo dõi, đánh giá, thanh tra, kiểm tra, xử lý vi phạm, giải quyết khiếu nại, tố cáo và thống kê, thông tin về bảo hiểm hưu trí bổ sung."]},"luat-41_138":{"tldr":"Quy định trách nhiệm của Ủy ban nhân dân các cấp trong chỉ đạo, tổ chức thực hiện chính sách, phát triển đối tượng, xử lý chậm/trốn đóng và quản lý nhà nước về bảo hiểm xã hội tại địa phương.","points":["Ủy ban nhân dân cấp tỉnh chịu trách nhiệm trước Hội đồng nhân dân cùng cấp trong chỉ đạo, tổ chức thực hiện chính sách, phát triển đối tượng tham gia và chậm đóng, trốn đóng bảo hiểm xã hội bắt buộc trong phạm vi địa phương.","Chỉ đạo, tổ chức thực hiện chính sách, pháp luật; xây dựng chỉ tiêu phát triển đối tượng trong kế hoạch phát triển kinh tế - xã hội hằng năm trình cơ quan có thẩm quyền.","Tổ chức tuyên truyền, phổ biến chính sách, pháp luật về bảo hiểm xã hội.","Kiểm tra, thanh tra, xử phạt vi phạm hành chính và giải quyết khiếu nại, tố cáo về bảo hiểm xã hội.","Kiến nghị cơ quan nhà nước có thẩm quyền sửa đổi, bổ sung chính sách, pháp luật về bảo hiểm xã hội."]},"luat-41_139":{"tldr":"Sửa đổi, bổ sung một số điều của Luật An toàn, vệ sinh lao động số 84/2015/QH13, Luật Việc làm số 38/2013/QH13 và bãi bỏ một quy định của Luật Người cao tuổi số 39/2009/QH12.","points":["Sửa đổi, bổ sung Luật An toàn, vệ sinh lao động số 84/2015/QH13: khoản 7 Điều 42, khoản 1 Điều 43, điểm b khoản 2 Điều 44, khoản 3 và khoản 5 Điều 49, khoản 3 Điều 53.","Người đang hưởng trợ cấp tai nạn lao động, bệnh nghề nghiệp hằng tháng khi ra nước ngoài định cư được trợ cấp một lần bằng 03 tháng mức trợ cấp đang hưởng.","Sửa đổi, bổ sung điểm e khoản 3 Điều 57 Luật Việc làm số 38/2013/QH13: chi tổ chức và hoạt động bảo hiểm thất nghiệp thực hiện theo Luật Bảo hiểm xã hội.","Bãi bỏ khoản 2 Điều 17 của Luật Người cao tuổi số 39/2009/QH12."]},"luat-41_140":{"tldr":"Luật có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025; Luật Bảo hiểm xã hội số 58/2014/QH13 và Nghị quyết số 93/2015/QH13 hết hiệu lực kể từ ngày Luật này có hiệu lực.","points":["Có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025.","Luật số 58/2014/QH13 (đã sửa đổi theo Luật số 84/2015/QH13, Luật số 35/2018/QH14, Bộ luật số 45/2019/QH14) và Nghị quyết số 93/2015/QH13 ngày 22/6/2015 hết hiệu lực kể từ ngày Luật này có hiệu lực."]},"luat-41_141":{"tldr":"Quy định chuyển tiếp về điều chỉnh mức hưởng, phụ cấp khu vực, lương hưu, tử tuất, mức tham chiếu và xử lý chậm/trốn đóng đối với các đối tượng tham gia trước thời điểm Luật có hiệu lực.","points":["Người đang hưởng các loại trợ cấp hằng tháng (mất sức lao động, tai nạn lao động, bệnh nghề nghiệp, tuất, cán bộ xã nghỉ việc, công nhân cao su...) được điều chỉnh mức hưởng theo quy định của Chính phủ.","Người có thời gian công tác/đóng bảo hiểm xã hội có phụ cấp khu vực trước ngày 01/01/1995 (hoặc trước 01/01/2007) được hưởng trợ cấp khu vực một lần khi hưởng lương hưu, bảo hiểm xã hội một lần hoặc tử tuất; người đang hưởng đồng thời phụ cấp khu vực hằng tháng được tiếp tục hưởng theo mức đang hưởng.","Người tham gia bảo hiểm xã hội tự nguyện trước ngày 01/01/2021 và đủ 20 năm đóng trở lên được hưởng lương hưu khi đủ 60 tuổi (nam), đủ 55 tuổi (nữ), trừ trường hợp hưởng theo Điều 98.","Đối tượng tại điểm a, b, c, d, đ, g, i khoản 1 Điều 2 đã tham gia trước ngày Luật có hiệu lực và có từ đủ 20 năm đóng bảo hiểm xã hội bắt buộc trở lên thì mức lương hưu hằng tháng thấp nhất bằng mức tham chiếu.","Số tiền bảo hiểm xã hội bắt buộc, bảo hiểm thất nghiệp phải đóng theo Luật số 58/2014/QH13, Luật Việc làm số 38/2013/QH13 mà đến hết ngày 30/6/2025 không đóng/đóng không đầy đủ thì xử lý theo quy định về chậm đóng, trốn đóng của Luật này.","Khi chưa bãi bỏ mức lương cơ sở thì mức tham chiếu bằng mức lương cơ sở; văn bản ủy quyền nhận lương hưu, trợ cấp theo Luật số 58/2014/QH13 tiếp tục thực hiện đến hết ngày 30/6/2026; Chính phủ quy định chi tiết Điều này."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
