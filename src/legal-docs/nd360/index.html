<script id="LD" type="application/json">{"meta":{"title":"Nghị định 360/2025/NĐ-CP — Quy định chi tiết thi hành Luật Thuế TTĐB","shortCode":"NĐ 360/2025","subtitle":"Hướng dẫn Luật Thuế TTĐB","slug":"nd360","effectiveDate":"01/01/2026","scope":"Nghị định này quy định chi tiết thi hành về đối tượng chịu thuế tại Điều 2, đối tượng không chịu thuế tại Điều 3, giá tính thuế tại Điều 6, cách xác định đối tượng được áp dụng quy định tại mục 4đ Biểu thuế tiêu thụ đặc biệt và quy đổi mức thuế tuyệt đối áp dụng đối với bao thuốc lá, điếu xì gà tại Điều 8 và hoàn thuế, khấu trừ thuế tại Điều 9 của Luật Thuế tiêu thụ đặc biệt.","description":"Hướng dẫn Luật Thuế TTĐB","related":[]},"outline":[{"id":"nd360_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Nghị định này quy định chi tiết thi hành về đối tượng chịu thuế tại Điều 2, đối tượng không chịu thuế tại Điều 3, giá tính thuế tại Điều 6, cách xác định đối tượng được áp dụng quy định tại mục 4đ Biểu thuế tiêu thụ đặc biệt và quy đổi mức thuế tuyệt đối áp dụng đối với bao thuốc lá, điếu xì gà tại Điều 8 và hoàn thuế, khấu trừ thuế tại Điều 9 của Luật Thuế tiêu thụ đặc biệt."}]},{"id":"nd360_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng áp dụng của Nghị định này bao gồm:"},{"k":"p","t":"1. Người nộp thuế quy định tại Điều 4 của Luật Thuế tiêu thụ đặc biệt."},{"k":"p","t":"2. Cơ quan quản lý thuế theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"3. Các tổ chức, cá nhân khác có liên quan."}]},{"id":"nd360_3","no":3,"code":"Điều 3","title":"Điều 3. Đối tượng chịu thuế","shortTitle":"Đối tượng chịu thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng chịu thuế tiêu thụ đặc biệt thực hiện theo quy định tại Điều 2 của Luật Thuế tiêu thụ đặc biệt. Trường hợp quy định tại điểm d, e, h, l khoản 1, khoản 2 và khoản 3 Điều 2 của Luật Thuế tiêu thụ đặc biệt được quy định như sau:"},{"k":"p","t":"1. Xe có gắn động cơ dưới 24 chỗ, bao gồm: xe ô tô chở người; xe chở người bốn bánh có gắn động cơ; xe ô tô pick-up chở người; xe ô tô pick-up chở hàng cabin kép; xe ô tô tải VAN có từ hai hàng ghế trở lên, có thiết kế vách ngăn cố định giữa khoang chở người và khoang chở hàng, không bao gồm các loại xe quy định tại điểm d khoản 1 Điều 3 của Luật Thuế tiêu thụ đặc biệt và quy định tại khoản 6 Điều 4 của Nghị định này."},{"k":"p","t":"2. Máy bay, trực thăng, tàu lượn và du thuyền, không bao gồm các loại quy định tại điểm c khoản 1 Điều 3 của Luật Thuế tiêu thụ đặc biệt và quy định tại khoản 5 Điều 4 của Nghị định này."},{"k":"p","t":"3. Điều hòa nhiệt độ công suất trên 24.000 BTU đến 90.000 BTU (trong đó công suất là công suất làm lạnh danh định do nhà sản xuất công bố) trừ loại theo thiết kế của nhà sản xuất chỉ để lắp trên phương tiện vận tải bao gồm ô tô, toa xe lửa, máy bay, trực thăng, tàu, thuyền. Trường hợp tổ chức, cá nhân sản xuất bán hoặc tổ chức, cá nhân nhập khẩu nhập tách riêng từng bộ phận là cục nóng hoặc cục lạnh thì hàng hóa bán ra hoặc nhập khẩu (cục nóng, cục lạnh) vẫn thuộc đối tượng chịu thuế tiêu thụ đặc biệt như đối với sản phẩm hoàn chỉnh (máy điều hòa nhiệt độ hoàn chỉnh)."},{"k":"p","t":"4. Nước giải khát theo Tiêu chuẩn quốc gia (TCVN) có hàm lượng đường trên 5g/100ml quy định tại điểm l khoản 1 Điều 2 của Luật Thuế tiêu thụ đặc biệt là:"},{"k":"p","t":"a) Nước giải khát theo Tiêu chuẩn quốc gia của Việt Nam (TCVN 12828:2019) về nước giải khát;"},{"k":"p","t":"b) Hàm lượng đường được tính là đường tổng số ghi trên nhãn sản phẩm theo quy định của Bộ trưởng Bộ Y tế về nội dung, cách ghi thành phần dinh dưỡng, giá trị dinh dưỡng trên nhãn thực phẩm. Trường hợp sản phẩm nhập khẩu chưa dán nhãn sản phẩm theo quy định của Bộ trưởng Bộ Y tế về nội dung, cách ghi thành phần dinh dưỡng, giá trị dinh dưỡng trên nhãn thực phẩm thì tổ chức, cá nhân nhập khẩu chịu trách nhiệm tự xác định, kê khai, tính nộp thuế theo quy định."},{"k":"p","t":"5. Kinh doanh vũ trường, kinh doanh ka-ra-ô-kê (karaoke) theo quy định tại Nghị định số 54/2019/NĐ-CP ngày 19 tháng 6 năm 2019 của Chính phủ quy định về kinh doanh dịch vụ ka-ra-ô-kê, dịch vụ vũ trường được sửa đổi, bổ sung bởi Nghị định số 148/2024/NĐ-CP ngày 12 tháng 11 năm 2024."},{"k":"p","t":"6. Kinh doanh mát-xa (massage) được xác định theo quy định pháp luật chuyên ngành thuộc loại hình kinh doanh có điều kiện."},{"k":"p","t":"7. Kinh doanh ca-si-nô (casino) theo quy định tại Nghị định số 03/2017/NĐ-CP ngày 16 tháng 01 năm 2017 của Chính phủ về kinh doanh casino được sửa đổi, bổ sung bởi Nghị định số 145/2024/NĐ-CP ngày 04 tháng 11 năm 2024; trò chơi điện tử có thưởng bao gồm trò chơi bằng máy giắc-pót (jackpot), máy sờ-lot (slot) và các loại máy tương tự theo quy định tại Nghị định số 121/2021/NĐ-CP ngày 27 tháng 12 năm 2021 của Chính phủ về kinh doanh trò chơi điện tử có thưởng dành cho người nước ngoài."},{"k":"p","t":"8. Kinh doanh đặt cược bao gồm đặt cược thể thao, giải trí và các hình thức đặt cược khác theo quy định tại Nghị định số 06/2017/NĐ-CP ngày 24 tháng 01 năm 2017 của Chính phủ về kinh doanh đặt cược đua ngựa, đua chó và bóng đá quốc tế được sửa đổi, bổ sung bởi Điều 9 Nghị định số 151/2018/NĐ-CP ngày 07 tháng 11 năm 2018 của Chính phủ sửa đổi, bổ sung một số Nghị định quy định về điều kiện đầu tư, kinh doanh thuộc phạm vi quản lý nhà nước của Bộ Tài chính."},{"k":"p","t":"9. Kinh doanh gôn (golf) theo quy định tại Nghị định số 52/2020/NĐ-CP ngày 27 tháng 4 năm 2020 của Chính phủ về đầu tư xây dựng và kinh doanh sân gôn được sửa đổi, bổ sung bởi Điều 107 Nghị định số 31/2021/NĐ-CP ngày 26 tháng 3 năm 2021 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Đầu tư, bao gồm kinh doanh sân tập gôn, bán thẻ hội viên, vé chơi gôn."},{"k":"p","t":"10. Kinh doanh xổ số theo quy định tại Nghị định số 30/2007/NĐ-CP ngày 01 tháng 3 năm 2007 của Chính phủ về kinh doanh xổ số được sửa đổi, bổ sung một số điều bởi Nghị định số 78/2012/NĐ-CP ngày 05 tháng 10 năm 2012 của Chính phủ và Điều 4 Nghị định số 151/2018/NĐ-CP ngày 07 tháng 11 năm 2018."},{"k":"p","t":"11. Trường hợp cần thiết phải sửa đổi, bổ sung đối tượng chịu thuế để phù hợp với bối cảnh kinh tế - xã hội trong từng thời kỳ, Bộ Tài chính chủ trì, phối hợp với các bộ, cơ quan có liên quan báo cáo Chính phủ trình Ủy ban Thường vụ Quốc hội xem xét, quyết định và báo cáo Quốc hội tại kỳ họp gần nhất."}]},{"id":"nd360_4","no":4,"code":"Điều 4","title":"Điều 4. Đối tượng không chịu thuế","shortTitle":"Đối tượng không chịu thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng không chịu thuế tiêu thụ đặc biệt là hàng hóa, dịch vụ không quy định tại Điều 2 của Luật Thuế tiêu thụ đặc biệt và được quy định tại Điều 3 của Luật Thuế tiêu thụ đặc biệt. Một số trường hợp được quy định như sau:"},{"k":"p","t":"1. Hàng hóa do tổ chức, cá nhân sản xuất, gia công, thuê gia công trực tiếp xuất khẩu ra nước ngoài hoặc bán, ủy thác cho tổ chức, cá nhân kinh doanh khác để xuất khẩu ra nước ngoài. Hàng hóa xuất khẩu ra nước ngoài quy định tại khoản này không bao gồm: hàng hóa bán từ nội địa vào khu phi thuế quan; hàng hóa sản xuất, gia công, thuê gia công, mua bán giữa các khu phi thuế quan với nhau."},{"k":"p","t":"2. Hàng tạm nhập khẩu, tái xuất khẩu và tạm xuất khẩu, tái nhập khẩu không phải nộp thuế nhập khẩu, thuế xuất khẩu trong thời hạn theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu. Trường hợp quá thời hạn tái xuất khẩu, tái nhập khẩu hoặc bán ra hoặc thay đổi mục đích sử dụng trong thời hạn tạm nhập khẩu, tạm xuất khẩu thì tổ chức, cá nhân kinh doanh phải nộp thuế tiêu thụ đặc biệt."},{"k":"p","t":"a) Hàng hóa tạm nhập khẩu, tái xuất khẩu, nếu thực tái xuất khẩu trong thời hạn không phải nộp thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu thì không phải nộp thuế tiêu thụ đặc biệt tương ứng với số hàng thực tái xuất khẩu."},{"k":"p","t":"b) Hàng hóa tạm xuất khẩu, tái nhập khẩu, nếu thực tái nhập khẩu trong thời hạn không phải nộp thuế xuất khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu thì không phải nộp thuế tiêu thụ đặc biệt tương ứng với số hàng thực tái nhập khẩu."},{"k":"p","t":"3. Đồ dùng của tổ chức, cá nhân nước ngoài theo tiêu chuẩn miễn trừ ngoại giao theo quy định tại Phụ lục I, II, III Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu được sửa đổi, bổ sung bởi Nghị định số 18/2021/NĐ-CP ngày 11 tháng 03 năm 2021; hàng hóa trong tiêu chuẩn hành lý miễn thuế nhập khẩu theo quy định tại Điều 6 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu; hàng nhập khẩu để bán tại cửa hàng miễn thuế theo quy định tại Nghị định số 68/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định về điều kiện kinh doanh hàng miễn thuế, kho bãi, địa điểm làm thủ tục hải quan, tập kết, kiểm tra, giám sát hải quan được sửa đổi, bổ sung một số điều bởi Nghị định số 67/2020/NĐ-CP ngày 15 tháng 6 năm 2020 và Nghị định số 100/2020/NĐ-CP ngày 28 tháng 8 năm 2020 của Chính phủ về kinh doanh hàng miễn thuế."},{"k":"p","t":"4. Hàng hóa xuất khẩu ra nước ngoài đã được nhà sản xuất hoặc nhà nhập khẩu nộp thuế tiêu thụ đặc biệt bị phía nước ngoài trả lại khi nhập khẩu là hàng hóa không thuộc quy định tại khoản 1 Điều này và cung cấp hồ sơ chứng minh hàng hóa bị trả lại, chứng từ đã nộp thuế tiêu thụ đặc biệt theo quy định."},{"k":"p","t":"Hàng hóa quy định tại khoản này phải đáp ứng điều kiện chưa qua sử dụng, gia công, chế biến."},{"k":"p","t":"5. Máy bay, trực thăng, tàu lượn, du thuyền sử dụng cho mục đích kinh doanh vận chuyển hàng hóa, hành khách, khách du lịch và máy bay, trực thăng, tàu lượn sử dụng cho mục đích an ninh, quốc phòng, cứu thương, cứu hộ, cứu nạn, chữa cháy, huấn luyện đào tạo phi công, quay phim, chụp ảnh, đo đạc bản đồ, sản xuất nông nghiệp."},{"k":"p","t":"Máy bay, trực thăng, tàu lượn, du thuyền thuộc đối tượng không chịu thuế tiêu thụ đặc biệt quy định tại khoản này bao gồm cả trường hợp tổ chức, cá nhân nhập khẩu, sản xuất để cho thuê theo đúng mục đích thuộc đối tượng không chịu thuế, trường hợp có thay đổi mục đích sử dụng so với mục đích đã được xác định thuộc đối tượng không chịu thuế thì thuộc đối tượng chịu thuế tiêu thụ đặc biệt. Trong đó:"},{"k":"p","t":"a) Tổ chức, cá nhân kinh doanh có máy bay, trực thăng, tàu lượn, du thuyền nhập khẩu thay đổi mục đích sử dụng phải kê khai nộp thuế tiêu thụ đặc biệt với cơ quan hải quan theo hướng dẫn của Bộ Tài chính về thủ tục hải quan; kiểm tra giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"b) Tổ chức, cá nhân kinh doanh có máy bay, trực thăng, tàu lượn, du thuyền sản xuất trong nước thay đổi mục đích sử dụng thì thực hiện nghĩa vụ nộp thuế tiêu thụ đặc biệt thay cho tổ chức, cá nhân sản xuất và kê khai, nộp thuế tiêu thụ đặc biệt theo giá trị còn lại sau khi trừ giá trị đã khấu hao theo quy định với cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"6. Đối với xe ô tô, xe chở người bốn bánh có gắn động cơ quy định tại điểm d khoản 1 Điều 3 của Luật Thuế tiêu thụ đặc biệt là các loại xe theo thiết kế của nhà sản xuất được sử dụng làm xe ô tô cứu thương, xe ô tô chở phạm nhân, xe ô tô tang lễ; xe ô tô thiết kế vừa có chỗ ngồi, vừa có chỗ đứng chở được từ 24 người trở lên; xe ô tô chở người, xe chở người bốn bánh có gắn động cơ không đăng ký lưu hành và chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học; xe ô tô chuyên dùng phục vụ an ninh, quốc phòng do Bộ Công an hoặc Bộ Quốc phòng xác định. Bộ Xây dựng chủ trì phối hợp với các cơ quan liên quan xác định, hướng dẫn cụ thể về xe chuyên dùng khác thuộc đối tượng không chịu thuế tiêu thụ đặc biệt trong trường hợp có phát sinh."},{"k":"p","t":"Đối với xe ô tô chở người, xe chở người bốn bánh có gắn động cơ không đăng ký lưu hành và chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học thuộc đối tượng không chịu thuế quy định tại khoản này phải có tài liệu chứng minh chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học. Xe không đăng ký lưu hành là xe không đăng ký tham gia giao thông theo quy định của pháp luật về trật tự an toàn giao thông đường bộ."},{"k":"p","t":"Trường hợp xe ô tô chở người, xe chở người bốn bánh có gắn động cơ nêu tại khoản này thay đổi mục đích sử dụng so với mục đích đã được xác định thuộc đối tượng không chịu thuế thì thuộc đối tượng chịu thuế tiêu thụ đặc biệt. Trong đó:"},{"k":"p","t":"a) Tổ chức, cá nhân kinh doanh có xe ô tô chở người, xe chở người bốn bánh có gắn động cơ nhập khẩu thay đổi mục đích sử dụng phải kê khai nộp thuế tiêu thụ đặc biệt với cơ quan hải quan theo hướng dẫn của Bộ Tài chính về thủ tục hải quan; kiểm tra giám sát hải quan; thuế xuất khẩu, thuế nhập khẩu và quản lý thuế đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"b) Tổ chức, cá nhân kinh doanh có xe ô tô chở người, xe chở người bốn bánh có gắn động cơ sản xuất trong nước thay đổi mục đích sử dụng thì thực hiện nghĩa vụ nộp thuế tiêu thụ đặc biệt thay cho tổ chức, cá nhân sản xuất và kê khai, nộp thuế tiêu thụ đặc biệt theo giá trị còn lại sau khi trừ giá trị đã khấu hao theo quy định với cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"7. Trường hợp cần thiết phải sửa đổi, bổ sung đối tượng không chịu thuế để phù hợp với bối cảnh kinh tế - xã hội trong từng thời kỳ, Bộ Tài chính chủ trì, phối hợp với các bộ, cơ quan có liên quan báo cáo Chính phủ trình Ủy ban Thường vụ Quốc hội xem xét, quyết định và báo cáo Quốc hội tại kỳ họp gần nhất."},{"k":"p","t":"8. Bộ Tài chính hướng dẫn về hồ sơ xác định đối tượng không chịu thuế tiêu thụ đặc biệt quy định tại khoản 1, khoản 2 và khoản 6 Điều này."}]},{"id":"nd360_5","no":5,"code":"Điều 5","title":"Điều 5. Giá tính thuế","shortTitle":"Giá tính thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Giá tính thuế thực hiện theo quy định tại Điều 6 của Luật Thuế tiêu thụ đặc biệt. Các trường hợp quy định tại điểm a, c, d, e, g, h khoản 1 và khoản 3 Điều 6 của Luật Thuế tiêu thụ đặc biệt được quy định như sau:"},{"k":"p","t":"1. Đối với hàng hóa sản xuất trong nước, hàng hóa nhập khẩu là giá do tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu bán ra."},{"k":"p","t":"a) Giá tính thuế tiêu thụ đặc biệt đối với hàng hóa bán ra (trừ mặt hàng thuốc lá) được xác định như sau:"},{"k":"tbl","rows":[["Giá tính thuế tiêu thụ đặc biệt","=","Giá bán chưa có thuế giá trị gia tăng","-","Thuế bảo vệ môi trường (nếu có)"],["","","1 + Thuế suất thuế tiêu thụ đặc biệt"]]},{"k":"p","t":"Trong đó, giá bán chưa có thuế giá trị gia tăng được xác định theo quy định của pháp luật về thuế giá trị gia tăng, thuế bảo vệ môi trường được xác định theo quy định của pháp luật về thuế bảo vệ môi trường."},{"k":"p","t":"b) Đối với mặt hàng thuốc lá bán ra, giá tính thuế tiêu thụ đặc biệt được xác định như sau:"},{"k":"tbl","rows":[["Giá tính thuế tiêu thụ đặc biệt đối với thuốc lá","=","Giá bán chưa có thuế giá trị gia tăng","-","Thuế tuyệt đối đối với thuốc lá"],["","","1 + Thuế suất thuế tiêu thụ đặc biệt"]]},{"k":"p","t":"Trong đó, giá bán chưa có thuế giá trị gia tăng được xác định theo quy định của pháp luật về thuế giá trị gia tăng. Khi xác định giá tính thuế tiêu thụ đặc biệt đối với thuốc lá thì không được trừ các khoản đóng góp bắt buộc và kinh phí hỗ trợ theo quy định."},{"k":"p","t":"c) Trường hợp tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu hàng hóa chịu thuế tiêu thụ đặc biệt bán hàng qua các doanh nghiệp trực thuộc hạch toán phụ thuộc thì giá làm căn cứ tính thuế tiêu thụ đặc biệt là giá do doanh nghiệp hạch toán phụ thuộc bán ra."},{"k":"p","t":"d) Tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu bán hàng thông qua đại lý bán đúng giá do tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu quy định và chỉ hưởng hoa hồng thì giá bán làm căn cứ xác định giá tính thuế tiêu thụ đặc biệt là giá do tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu quy định chưa trừ hoa hồng."},{"k":"p","t":"đ) Trường hợp hàng hóa chịu thuế tiêu thụ đặc biệt được bán cho các doanh nghiệp kinh doanh thương mại là doanh nghiệp có quan hệ công ty mẹ, công ty con hoặc các công ty con trong cùng công ty mẹ với doanh nghiệp sản xuất, doanh nghiệp nhập khẩu hoặc doanh nghiệp kinh doanh thương mại là doanh nghiệp có mối quan hệ liên kết thì giá bán làm căn cứ xác định giá tính thuế tiêu thụ đặc biệt không được thấp hơn tỷ lệ 7% so với giá bình quân của các doanh nghiệp kinh doanh thương mại mua trực tiếp của doanh nghiệp sản xuất, nhập khẩu bán ra."},{"k":"p","t":"Trường hợp tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu thành lập nhiều doanh nghiệp kinh doanh thương mại trung gian có quan hệ công ty mẹ, công ty con hoặc các công ty con trong cùng công ty mẹ hoặc có mối quan hệ liên kết thì giá bán làm căn cứ xác định giá tính thuế tiêu thụ đặc biệt không được thấp hơn tỷ lệ 7% so với giá bình quân của các doanh nghiệp kinh doanh thương mại này bán cho doanh nghiệp kinh doanh thương mại không có quan hệ công ty mẹ, công ty con, hoặc các công ty con trong cùng công ty mẹ, hoặc có mối quan hệ liên kết với tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu. Riêng mặt hàng xe ô tô giá bán bình quân của doanh nghiệp kinh doanh thương mại để so sánh là giá bán xe ô tô chưa bao gồm các lựa chọn về trang thiết bị, phụ tùng mà doanh nghiệp kinh doanh thương mại lắp đặt thêm theo yêu cầu của khách hàng."},{"k":"p","t":"Việc xác định doanh nghiệp sản xuất, doanh nghiệp nhập khẩu và doanh nghiệp kinh doanh thương mại có mối quan hệ liên kết thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"2. Đối với hàng hóa gia công thuộc diện chịu thuế tiêu thụ đặc biệt là giá bán hàng hóa của tổ chức, cá nhân giao gia công bán ra hoặc giá bán của sản phẩm cùng loại hoặc tương đương tại cùng thời điểm bán hàng."},{"k":"p","t":"Trường hợp tổ chức, cá nhân giao gia công bán hàng cho doanh nghiệp kinh doanh thương mại là doanh nghiệp có quan hệ công ty mẹ, công ty con hoặc các công ty con trong cùng công ty mẹ với doanh nghiệp sản xuất, doanh nghiệp nhập khẩu hoặc doanh nghiệp kinh doanh thương mại là doanh nghiệp có mối quan hệ liên kết thì giá tính thuế được xác định theo quy định tại điểm đ khoản 1 Điều này."},{"k":"p","t":"3. Đối với hàng hóa sản xuất dưới hình thức hợp tác kinh doanh giữa tổ chức, cá nhân sản xuất và tổ chức, cá nhân sử dụng hoặc sở hữu thương hiệu (nhãn hiệu) hàng hóa, công nghệ sản xuất thì giá tính thuế tiêu thụ đặc biệt là giá bán ra của tổ chức, cá nhân sử dụng hoặc sở hữu thương hiệu hàng hóa, công nghệ sản xuất. Trường hợp tổ chức, cá nhân sản xuất theo giấy phép nhượng quyền và chuyển giao hàng hóa cho chi nhánh hoặc đại diện của công ty nước ngoài tại Việt Nam để tiêu thụ sản phẩm thì giá tính thuế tiêu thụ đặc biệt là giá bán ra của chi nhánh, đại diện công ty nước ngoài tại Việt Nam."},{"k":"p","t":"Trường hợp các doanh nghiệp này bán hàng cho doanh nghiệp kinh doanh thương mại là doanh nghiệp có quan hệ công ty mẹ, công ty con hoặc các công ty con trong cùng công ty mẹ với doanh nghiệp sản xuất, doanh nghiệp nhập khẩu hoặc doanh nghiệp kinh doanh thương mại là doanh nghiệp có mối quan hệ liên kết thì giá tính thuế được xác định theo quy định tại điểm đ khoản 1 Điều này."},{"k":"p","t":"4. Đối với hàng hóa chịu thuế tiêu thụ đặc biệt, giá tính thuế không loại trừ giá trị vỏ bao bì, vỏ chai."},{"k":"p","t":"Đối với mặt hàng bia chai nếu có đặt tiền cược vỏ chai, định kỳ hàng quý tổ chức, cá nhân sản xuất và khách hàng thực hiện quyết toán số tiền đặt cược vỏ chai mà số tiền đặt cược tương ứng với giá trị số vỏ chai không thu hồi được phải đưa vào doanh thu tính thuế tiêu thụ đặc biệt."},{"k":"p","t":"5. Đối với dịch vụ, giá tính thuế tiêu thụ đặc biệt là giá cung ứng dịch vụ của tổ chức, cá nhân kinh doanh chưa có thuế giá trị gia tăng và chưa có thuế tiêu thụ đặc biệt, được xác định như sau:"},{"k":"tbl","rows":[["Giá tính thuế tiêu thụ đặc biệt","=","Giá dịch vụ chưa có thuế giá trị gia tăng"],["","","1 + Thuế suất thuế tiêu thụ đặc biệt"]]},{"k":"p","t":"Giá dịch vụ chưa có thuế giá trị gia tăng làm căn cứ xác định giá tính thuế tiêu thụ đặc biệt đối với một số dịch vụ quy định như sau:"},{"k":"p","t":"a) Đối với kinh doanh gôn là giá bán thẻ hội viên, giá bán vé chơi gôn bao gồm cả tiền phí chơi gôn, tiền bán vé tập gôn, tiền bảo dưỡng sân cỏ, hoạt động cho thuê xe (buggy), thuê người giúp việc trong khi chơi gôn (caddy), tiền ký quỹ (nếu có) và các khoản thu khác liên quan đến chơi gôn do người chơi gôn, hội viên trả cho tổ chức, cá nhân kinh doanh gôn. Trường hợp khoản ký quỹ được trả lại người ký quỹ thì số tiền thuế tiêu thụ đặc biệt đã nộp tính trên khoản ký quỹ được trả lại sẽ được xác định là số thuế tiêu thụ đặc biệt nộp thừa và được xử lý theo quy định của pháp luật về quản lý thuế. Trường hợp tổ chức, cá nhân kinh doanh gôn có kinh doanh các loại hàng hóa, dịch vụ khác không thuộc đối tượng chịu thuế tiêu thụ đặc biệt như: khách sạn, ăn uống, bán hàng hóa, hoặc các trò chơi thì giá tính thuế tiêu thụ đặc biệt đối với kinh doanh gôn không bao gồm giá của các hàng hóa, dịch vụ đó."},{"k":"p","t":"b) Đối với dịch vụ kinh doanh ca-si-nô, trò chơi điện tử có thưởng là số tiền thu được từ hoạt động này trừ số tiền đã đổi trả cho khách không sử dụng hết và số tiền trả thưởng cho khách (nếu có). Trong đó, số tiền thu được là số tiền thu từ đổi đồng tiền quy ước cho người chơi tại quầy, tại bàn chơi và số tiền thu tại máy trò chơi điện tử có thưởng."},{"k":"p","t":"c) Đối với kinh doanh đặt cược, giá làm căn cứ xác định giá tính thuế tiêu thụ đặc biệt là doanh thu bán vé đặt cược trừ (-) tiền trả thưởng cho khách hàng, không bao gồm doanh số bán vé vào cửa xem các sự kiện giải trí gắn với hoạt động đặt cược."},{"k":"p","t":"d) Đối với kinh doanh vũ trường, mát-xa và ka-ra-ô-kê, giá làm căn cứ xác định giá tính thuế tiêu thụ đặc biệt là doanh thu của các hoạt động trong vũ trường, cơ sở mát-xa và ka-ra-ô-kê, bao gồm cả doanh thu của dịch vụ ăn uống và các dịch vụ khác đi kèm."},{"k":"p","t":"6. Giá tính thuế tiêu thụ đặc biệt đối với hàng hóa, dịch vụ quy định tại Điều này bao gồm cả khoản thu thêm, được thu (nếu có) mà tổ chức, cá nhân kinh doanh được hưởng."},{"k":"p","t":"Trường hợp tổ chức, cá nhân nhập khẩu, sản xuất nhiều loại hàng hóa và kinh doanh nhiều loại dịch vụ chịu thuế tiêu thụ đặc biệt có các mức thuế suất khác nhau thì phải xác định giá tính thuế tiêu thụ đặc biệt riêng đối với từng loại hàng hóa, dịch vụ. Trường hợp không tách riêng được thì tổ chức, cá nhân nhập khẩu, sản xuất phải tính, nộp thuế tiêu thụ đặc biệt theo giá tính thuế tiêu thụ đặc biệt có mức thuế suất thuế tiêu thụ đặc biệt cao nhất mà tổ chức, cá nhân có sản xuất, kinh doanh, trong đó: giá tính thuế tiêu thụ đặc biệt là toàn bộ giá bán hàng hóa, cung ứng dịch vụ của tổ chức, cá nhân nhập khẩu, sản xuất chưa có thuế giá trị gia tăng và chưa có thuế tiêu thụ đặc biệt (xác định theo mức thuế suất thuế tiêu thụ đặc biệt cao nhất mà tổ chức, cá nhân có sản xuất, kinh doanh)."}]},{"id":"nd360_6","no":6,"code":"Điều 6","title":"Điều 6. Cách xác định đối tượng được áp dụng quy định tại mục 4đ Biểu thuế tiêu thụ đặc biệt thuộc Điều 8 của Luật Thuế tiêu thụ đặc biệt","shortTitle":"Cách xác định đối tượng được áp dụng quy định tại mục 4đ Biểu thuế tiêu thụ đặc biệt thuộc Điều 8 của Luật Thuế tiêu thụ đặc biệt","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Xe ô tô chạy bằng xăng kết hợp năng lượng điện quy định tại mục 4đ Biểu thuế tiêu thụ đặc biệt là xe ô tô hybrid điện theo quy định của Bộ Xây dựng."},{"k":"p","t":"2. Đối với xe ô tô hybrid điện có cùng phân nhóm với xe ô tô quy định tại mục 4a Biểu thuế tiêu thụ đặc biệt, việc xác định tỷ trọng xăng sử dụng không quá 70% số năng lượng sử dụng được xác định theo một trong hai phương pháp như sau:"},{"k":"p","t":"a) Phương pháp 1: Đối chiếu mức tiêu thụ nhiên liệu (xăng) theo chu trình tổ hợp (kết hợp) của xe ô tô hybrid điện với mức tiêu thụ nhiên liệu (xăng) trung bình của xe ô tô động cơ đốt trong sử dụng thuần xăng, cùng loại dung tích xi lanh theo phân nhóm quy định tại mục 4a Biểu thuế tiêu thụ đặc biệt. Tỷ lệ tiêu thụ xăng của xe hybrid điện so với mức tiêu thụ xăng trung bình của xe ô tô động cơ đốt trong sử dụng thuần xăng, cùng loại dung tích xi lanh được xác định theo công thức sau:"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"R: Tỷ lệ tiêu thụ xăng của xe ô tô hybrid điện so với tiêu thụ xăng trung bình của xe ô tô động cơ đốt trong sử dụng thuần xăng, cùng loại dung tích xi lanh (%);"},{"k":"p","t":"FCeq: Giá trị tiêu thụ xăng theo chu trình tổ hợp của xe ô tô hybrid điện đã được cơ quan có thẩm quyền cấp giấy chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường (L/100 km);"},{"k":"p","t":"FCconv : Giá trị tiêu thụ xăng trung bình của các loại xe ô tô động cơ đốt trong sử dụng thuần xăng, cùng loại dung tích xi lanh, theo chu trình tổ hợp đã được cơ quan có thẩm quyền cấp giấy chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường (L/100 km) và được tính theo công thức:"},{"k":"p","t":"Trong đó:"},{"k":"p","t":"i: chỉ số thứ tự của mẫu xe động cơ đốt trong sử dụng thuần xăng, cùng loại dung tích xi lanh theo phân nhóm quy định tại mục 4a Biểu thuế tiêu thụ đặc biệt;"},{"k":"p","t":"FCi: mức tiêu thụ xăng của mẫu xe ô tô thứ i;"},{"k":"p","t":"Vi: số lượng xe của mẫu xe ô tô thứ i được sản xuất lắp ráp, nhập khẩu trong 03 năm gần nhất."},{"k":"p","t":"Bộ Xây dựng công bố công khai giá trị FCconv trên Cổng Thông tin điện tử của Bộ Xây dựng trước ngày 31 tháng 3 hằng năm để làm căn cứ so sánh, xác định xe ô tô đáp ứng tỷ lệ xăng sử dụng không quá 70% tổng số năng lượng sử dụng. Giá trị FCconv được công bố lần đầu trước ngày 31 tháng 01 năm 2026."},{"k":"p","t":"b) Phương pháp 2: Đối chiếu mức tiêu thụ nhiên liệu (xăng) theo chu trình tổ hợp (kết hợp) của xe ô tô hybrid điện với xe ô tô động cơ đốt trong sử dụng thuần xăng được sản xuất lắp ráp, nhập khẩu có cùng nhãn hiệu, cùng loại phương tiện, cùng kiểu dáng theo Tiêu chuẩn Việt Nam TCVN 6211, cùng số người cho phép chở không kể người lái, có thể tích làm việc (dung tích xi lanh) không nhỏ hơn dung tích xi lanh của xe ô tô động cơ đốt trong sử dụng thuần xăng. Các thông tin để đối chiếu được thể hiện tương ứng trong Giấy Chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường xe ô tô sản xuất, lắp ráp hoặc Giấy Chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường xe ô tô, rơ moóc, sơ mi rơ moóc nhập khẩu do cơ quan có thẩm quyền đã cấp trong thời gian gần nhất so với thời điểm xác định."},{"k":"p","t":"3. Đối với xe ô tô hybrid điện có cùng phân nhóm với xe ô tô quy định tại mục 4b, 4c và 4d Biểu thuế tiêu thụ đặc biệt, có giá trị tiêu thụ nhiên liệu (tính bằng lít xăng/100 km) không vượt quá 70% giá trị tiêu thụ xăng của xe ô tô động cơ đốt trong sử dụng thuần xăng, cùng loại dung tích xi lanh theo phân nhóm quy định tương ứng tại mục 4b, 4c và 4d Biểu thuế tiêu thụ đặc biệt. Tỷ lệ tiêu thụ xăng của xe chạy bằng xăng kết hợp năng lượng điện so với xe ô tô động cơ đốt trong sử dụng thuần xăng cùng loại xe ô tô và được xác định theo tài liệu kỹ thuật của nhà sản xuất công bố. Doanh nghiệp nhập khẩu xe ô tô, doanh nghiệp sản xuất, lắp ráp ô tô trong nước có trách nhiệm công bố công khai tài liệu kỹ thuật này trên trang thông tin điện tử của doanh nghiệp (nếu có) hoặc hình thức thích hợp khác."},{"k":"p","t":"4. Đối với xe ô tô chạy bằng xăng kết hợp năng lượng sinh học quy định tại mục 4đ Biểu thuế tiêu thụ đặc biệt là loại xe được thiết kế theo tiêu chuẩn của nhà sản xuất, đáp ứng được với xăng sinh học trong đó tỷ trọng xăng khoáng sử dụng không quá 70% số năng lượng sử dụng."}]},{"id":"nd360_7","no":7,"code":"Điều 7","title":"Điều 7. Quy đổi mức thuế tuyệt đối áp dụng đối với bao thuốc lá, điếu xì gà","shortTitle":"Quy đổi mức thuế tuyệt đối áp dụng đối với bao thuốc lá, điếu xì gà","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp bao thuốc lá có tổng số điếu thuốc lá khác 20 điếu thì việc quy đổi mức thuế tuyệt đối áp dụng đối với bao thuốc lá này được xác định như sau:"},{"k":"tbl","rows":[["Mức thuế tuyệt đối của bao thuốc lá có tổng số điếu thuốc lá khác 20 điếu","=","Mức thuế tuyệt đối áp dụng đối với bao thuốc lá 20 điếu tại thời điểm áp dụng","x","Số lượng điếu của 01 bao thuốc lá"],["","","20","",""]]},{"k":"p","t":"2. Trường hợp điếu xì gà có trọng lượng khác 20g/điếu thì việc quy đổi mức thuế tuyệt đối áp dụng đối với điếu xì gà này được xác định như sau:"},{"k":"tbl","rows":[["Mức thuế tuyệt đối của điếu xì gà có trọng lượng khác 20g/điếu","=","Mức thuế tuyệt đối áp dụng đối với xì gà có trọng lượng 20g/điếu tại thời điểm áp dụng","x","Tổng trọng lượng theo gam (g) của 01 điếu xì gà"],["","","20","",""]]}]},{"id":"nd360_8","no":8,"code":"Điều 8","title":"Điều 8. Hoàn thuế, khấu trừ thuế","shortTitle":"Hoàn thuế, khấu trừ thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Việc hoàn thuế, khấu trừ thuế tiêu thụ đặc biệt thực hiện theo quy định tại Điều 9 của Luật Thuế tiêu thụ đặc biệt. Một số trường hợp được quy định như sau:"},{"k":"p","t":"1. Đối với trường hợp hàng hóa là nguyên liệu nhập khẩu để sản xuất, gia công hàng xuất khẩu ra nước ngoài tại điểm a khoản 1 Điều 9 của Luật Thuế tiêu thụ đặc biệt thì được hoàn lại số thuế tiêu thụ đặc biệt đã nộp tương ứng với số nguyên liệu dùng để sản xuất, gia công hàng hóa thực tế xuất khẩu ra nước ngoài."},{"k":"p","t":"Hồ sơ, trình tự, thẩm quyền giải quyết hoàn thuế tiêu thụ đặc biệt đối với hàng hóa là nguyên liệu nhập khẩu để sản xuất, gia công hàng xuất khẩu được thực hiện theo quy định về hoàn thuế nhập khẩu tại pháp luật thuế xuất khẩu, thuế nhập khẩu và pháp luật có liên quan."},{"k":"p","t":"2. Người nộp thuế sản xuất hàng hóa thuộc đối tượng chịu thuế tiêu thụ đặc biệt bằng các nguyên liệu chịu thuế tiêu thụ đặc biệt được khấu trừ số thuế tiêu thụ đặc biệt đã nộp đối với nguyên liệu nhập khẩu (bao gồm cả số thuế tiêu thụ đặc biệt đã nộp theo Quyết định ấn định thuế của cơ quan hải quan, trừ trường hợp cơ quan hải quan xử phạt về gian lận, trốn thuế) hoặc đã trả đối với nguyên liệu mua trực tiếp từ tổ chức, cá nhân sản xuất trong nước khi xác định số thuế tiêu thụ đặc biệt phải nộp. Số thuế tiêu thụ đặc biệt được khấu trừ tương ứng với số thuế tiêu thụ đặc biệt của nguyên liệu đã sử dụng để sản xuất hàng hóa chịu thuế tiêu thụ đặc biệt bán ra. Đối với số thuế tiêu thụ đặc biệt không được khấu trừ hoặc chưa được khấu trừ do không phát sinh số thuế tiêu thụ đặc biệt bán ra (bao gồm cả trường hợp giải thể, phá sản), người nộp thuế được tính vào chi phí để tính thuế thu nhập doanh nghiệp."},{"k":"p","t":"3. Đối với mặt hàng xăng sinh học:"},{"k":"p","t":"a) Số thuế tiêu thụ đặc biệt được khấu trừ của kỳ khai thuế được căn cứ vào số thuế tiêu thụ đặc biệt đã nộp hoặc đã trả tương ứng với số thuế tiêu thụ đặc biệt của lượng nguyên liệu mua vào của kỳ khai thuế trước liền kề của xăng khoáng để sản xuất xăng sinh học."},{"k":"p","t":"b) Đối với các doanh nghiệp được phép sản xuất, pha chế xăng sinh học, việc kê khai nộp thuế, khấu trừ thuế tiêu thụ đặc biệt được thực hiện tại cơ quan thuế quản lý trực tiếp. Số thuế tiêu thụ đặc biệt chưa được khấu trừ hết của xăng khoáng nguyên liệu dùng để sản xuất, pha chế xăng sinh học được bù trừ với số thuế tiêu thụ đặc biệt phải nộp của hàng hóa, dịch vụ khác phát sinh trong kỳ. Trường hợp sau khi bù trừ, còn số thuế tiêu thụ đặc biệt chưa được khấu trừ hết của xăng khoáng nguyên liệu dùng để sản xuất, pha chế xăng sinh học thì được khấu trừ vào kỳ tiếp theo hoặc hoàn trả theo quy định của Bộ Tài chính."},{"k":"p","t":"4. Người nộp thuế tiêu thụ đặc biệt đối với hàng hóa chịu thuế tiêu thụ đặc biệt nhập khẩu được khấu trừ số thuế tiêu thụ đặc biệt đã nộp ở khâu nhập khẩu (bao gồm cả số thuế tiêu thụ đặc biệt đã nộp theo Quyết định ấn định thuế của cơ quan hải quan, trừ trường hợp cơ quan hải quan xử phạt về gian lận, trốn thuế) khi xác định số thuế tiêu thụ đặc biệt phải nộp bán ra trong nước. Số thuế tiêu thụ đặc biệt được khấu trừ tương ứng với số thuế tiêu thụ đặc biệt của hàng hóa nhập khẩu chịu thuế tiêu thụ đặc biệt bán ra và chỉ được khấu trừ tối đa bằng tương ứng số thuế tiêu thụ đặc biệt được tính ở khâu bán ra trong nước. Số thuế tiêu thụ đặc biệt không được khấu trừ hoặc chưa được khấu trừ do không phát sinh số thuế tiêu thụ đặc biệt bán ra (bao gồm cả trường hợp giải thể, phá sản), người nộp thuế được tính vào chi phí để tính thuế thu nhập doanh nghiệp."},{"k":"p","t":"5. Chứng từ để khấu trừ thuế tiêu thụ đặc biệt đối với trường hợp nhập khẩu nguyên liệu chịu thuế tiêu thụ đặc biệt để sản xuất, gia công hàng hóa chịu thuế tiêu thụ đặc biệt và trường hợp nhập khẩu hàng hóa chịu thuế tiêu thụ đặc biệt là chứng từ nộp thuế tiêu thụ đặc biệt ở khâu nhập khẩu."},{"k":"p","t":"6. Chứng từ để được khấu trừ thuế tiêu thụ đặc biệt đối với trường hợp mua nguyên liệu trực tiếp của nhà sản xuất trong nước:"},{"k":"p","t":"a) Hợp đồng mua bán hàng hóa, trong hợp đồng phải có nội dung thể hiện hàng hóa do tổ chức, cá nhân bán hàng trực tiếp sản xuất; bản sao Giấy chứng nhận đăng ký doanh nghiệp, Giấy chứng nhận đăng ký hộ kinh doanh."},{"k":"p","t":"b) Chứng từ thanh toán không dùng tiền mặt theo quy định tại Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng."},{"k":"p","t":"c) Chứng từ để làm căn cứ khấu trừ thuế tiêu thụ đặc biệt là hóa đơn giá trị gia tăng khi mua hàng. Số thuế tiêu thụ đặc biệt mà tổ chức, cá nhân mua hàng đã trả khi mua nguyên liệu được xác định bằng (=) giá tính thuế tiêu thụ đặc biệt nhân (x) thuế suất thuế tiêu thụ đặc biệt; trong đó:"},{"k":"tbl","rows":[["Giá tính thuế tiêu thụ đặc biệt","=","Giá mua chưa có thuế giá trị gia tăng (thể hiện trên hóa đơn giá trị gia tăng)","-","Thuế bảo vệ môi trường (nếu có)"],["","","1 + Thuế suất thuế tiêu thụ đặc biệt"]]},{"k":"p","t":"7. Việc khấu trừ tiền thuế tiêu thụ đặc biệt được thực hiện khi kê khai thuế tiêu thụ đặc biệt và số thuế tiêu thụ đặc biệt phải nộp được xác định theo công thức sau:"},{"k":"tbl","rows":[["Số thuế tiêu thụđặc biệt phải nộp","=","Số thuế tiêu thụ đặc biệt của hàng hóa chịu thuế tiêu thụ đặc biệt được bán ra trong kỳ","-","Số thuế tiêu thụ đặc biệt đã nộp đối với hàng hóa, nguyên liệu ở khâu nhập khẩu hoặc số thuế tiêu thụ đặc biệt đã trả ở khâu nguyên liệu mua vào tương ứng với số hàng hóa được bán ra trong kỳ"]]},{"k":"p","t":"Trường hợp chưa xác định được chính xác số thuế tiêu thụ đặc biệt đã nộp (hoặc đã trả) cho số hàng hóa tương ứng với số sản phẩm tiêu thụ trong kỳ thì có thể căn cứ vào số liệu của kỳ trước để tính số thuế tiêu thụ đặc biệt được khấu trừ và sẽ xác định theo số thực tế vào cuối quý hoặc cuối năm. Số thuế tiêu thụ đặc biệt được phép khấu trừ tối đa không vượt quá số thuế tiêu thụ đặc biệt tính cho phần hàng hóa theo tiêu chuẩn định mức kinh tế kỹ thuật của sản phẩm."}]},{"id":"nd360_9","no":9,"code":"Điều 9","title":"Điều 9. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"2. Nghị định này thay thế:"},{"k":"p","t":"a) Nghị định số 108/2015/NĐ-CP ngày 28 tháng 10 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Thuế tiêu thụ đặc biệt và Luật sửa đổi, bổ sung một số điều của Luật Thuế tiêu thụ đặc biệt;"},{"k":"p","t":"b) Nghị định số 14/2019/NĐ-CP ngày 01 tháng 02 năm 2019 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 108/2015/NĐ-CP ngày 28 tháng 10 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Thuế tiêu thụ đặc biệt và Luật sửa đổi, bổ sung một số điều của Luật Thuế tiêu thụ đặc biệt."},{"k":"p","t":"3. Bãi bỏ quy định tại Điều 2 Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật sửa đổi, bổ sung một số điều của Luật Thuế giá trị gia tăng, Luật Thuế tiêu thụ đặc biệt và Luật Quản lý thuế."},{"k":"p","t":"4. Trường hợp các văn bản quy phạm pháp luật, Tiêu chuẩn quốc gia viện dẫn tại Nghị định này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản quy phạm pháp luật, Tiêu chuẩn quốc gia được sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"nd360_10","no":10,"code":"Điều 10","title":"Điều 10. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp tổ chức, cá nhân nhập khẩu mặt hàng điều hòa nhiệt độ có công suất từ 24.000 BTU trở xuống trước ngày 01 tháng 01 năm 2026 thì không điều chỉnh lại số thuế tiêu thụ đặc biệt đã nộp ở khâu nhập khẩu."}]},{"id":"nd360_11","no":11,"code":"Điều 11","title":"Điều 11. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính và các bộ quản lý chuyên ngành quy định chi tiết các điều, khoản được giao tại Nghị định và hướng dẫn thực hiện Nghị định này theo chức năng, nhiệm vụ bảo đảm yêu cầu quản lý."},{"k":"p","t":"2. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương và các cơ quan, tổ chức, cá nhân liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Chủ tịch nước;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Quốc hội;- Tòa án nhân dân tối cao;- Viện kiểm sát nhân dân tối cao;- Kiểm toán nhà nước;- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;- Cơ quan trung ương của các tổ chức chính trị - xã hội;- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;- Lưu: VT, KTTH (2b).","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\nHồ Đức Phớc"]]}]}],"refs":{"nd360_1":[{"kind":"related","targetSlug":"luat-66","targetAnchor":"luat-66_1","label":"Luật 66/2025 — Luật Thuế TTĐB (căn cứ)"},{"kind":"guidance","targetSlug":"tt158","targetAnchor":"tt158_1","label":"TT 158/2025 — Hồ sơ, thủ tục"}]},"details":{"nd360_3":[{"match":"Đối tượng chịu thuế tiêu thụ đặc biệt thực hiện theo quy định tại","title":"NĐ 360 Điều 3 — Đối tượng chịu thuế (chi tiết Luật 66 Điều 2)","summary":"Chi tiết hóa danh mục hàng hóa, dịch vụ chịu TTĐB và một số trường hợp đặc thù. Cụ thể hóa Điều 2 Luật 66.","links":[{"targetSlug":"luat-66","targetAnchor":"luat-66_2","label":"Luật 66 Điều 2 — Đối tượng chịu thuế"}]}],"nd360_4":[{"match":"Đối tượng không chịu thuế tiêu thụ đặc biệt là hàng hóa, dịch vụ không quy định tại","title":"NĐ 360 Điều 4 — Đối tượng không chịu thuế (chi tiết Luật 66 Điều 3)","summary":"Chi tiết hóa các trường hợp không chịu TTĐB. Hồ sơ, thủ tục xác định tại TT 158 Điều 3.","links":[{"targetSlug":"luat-66","targetAnchor":"luat-66_3","label":"Luật 66 Điều 3 — Đối tượng không chịu thuế"},{"targetSlug":"tt158","targetAnchor":"tt158_3","label":"TT 158 Điều 3 — Hồ sơ xác định"}]}],"nd360_5":[{"match":"Giá tính thuế thực hiện theo quy định tại","title":"NĐ 360 Điều 5 — Giá tính thuế (chi tiết Luật 66 Điều 6)","summary":"Chi tiết hóa giá tính thuế TTĐB cho từng loại hàng hóa, dịch vụ (sản xuất, nhập khẩu, gia công, bán qua cơ sở liên kết...). Cụ thể hóa Điều 6 Luật 66.","links":[{"targetSlug":"luat-66","targetAnchor":"luat-66_6","label":"Luật 66 Điều 6 — Giá tính thuế"}]}],"nd360_8":[{"match":"Việc hoàn thuế, khấu trừ thuế tiêu thụ đặc biệt thực hiện theo quy định tại","title":"NĐ 360 Điều 8 — Hoàn thuế, khấu trừ (chi tiết Luật 66 Điều 9)","summary":"Chi tiết điều kiện, thủ tục hoàn và khấu trừ TTĐB. Hồ sơ hoàn thuế xăng sinh học tại TT 158 Điều 4.","links":[{"targetSlug":"luat-66","targetAnchor":"luat-66_9","label":"Luật 66 Điều 9 — Hoàn thuế, khấu trừ"},{"targetSlug":"tt158","targetAnchor":"tt158_4","label":"TT 158 Điều 4 — Hoàn thuế xăng sinh học"}]}]},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
