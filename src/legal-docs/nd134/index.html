<script id="LD" type="application/json">{"meta":{"title":"Nghị định 134/2016/NĐ-CP — Quy định chi tiết và biện pháp thi hành Luật Thuế XNK","shortCode":"NĐ 134/2016","subtitle":"Hướng dẫn Luật Thuế Xuất khẩu, Nhập khẩu","slug":"nd134","effectiveDate":"01/09/2016","scope":"1. Nghị định này quy định về đối tượng chịu thuế; áp dụng thuế suất thuế xuất khẩu, thuế nhập khẩu, thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu; miễn thuế, giảm thuế, hoàn thuế xuất khẩu, thuế nhập khẩu. 2. Nghị định này áp dụng đối với: a) Người nộp thuế theo quy định của Luật thuế xuất khẩu, thuế nhập khẩu; b) Cơ quan hải quan, công chức hải quan; c) Tổ chức, cá nhân có quyền và nghĩ","description":"Hướng dẫn Luật Thuế Xuất khẩu, Nhập khẩu","related":[]},"outline":[{"id":"nd134_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh, đối tượng áp dụng","shortTitle":"Phạm vi điều chỉnh, đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này quy định về đối tượng chịu thuế; áp dụng thuế suất thuế xuất khẩu, thuế nhập khẩu, thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu; miễn thuế, giảm thuế, hoàn thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Nghị định này áp dụng đối với:"},{"k":"p","t":"a) Người nộp thuế theo quy định của Luật thuế xuất khẩu, thuế nhập khẩu;"},{"k":"p","t":"b) Cơ quan hải quan, công chức hải quan;"},{"k":"p","t":"c) Tổ chức, cá nhân có quyền và nghĩa vụ liên quan đến hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"d) Cơ quan, tổ chức có liên quan đến việc thực hiện các quy định của Luật thuế xuất khẩu, thuế nhập khẩu."}]},{"id":"nd134_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng chịu thuế","shortTitle":"Đối tượng chịu thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu qua cửa khẩu, biên giới Việt Nam."},{"k":"p","t":"2. Hàng hóa xuất khẩu từ thị trường trong nước vào doanh nghiệp chế xuất, khu chế xuất, kho bảo thuế, kho ngoại quan và các khu phi thuế quan khác phù hợp với quy định tại khoản 1 Điều 4 Luật thuế xuất khẩu, thuế nhập khẩu; hàng hóa nhập khẩu từ doanh nghiệp chế xuất, khu chế xuất, kho bảo thuế, kho ngoại quan và các khu phi thuế quan khác phù hợp với quy định tại khoản 1 Điều 4 Luật thuế xuất khẩu, thuế nhập khẩu vào thị trường trong nước."},{"k":"p","t":"3. Hàng hóa xuất khẩu, nhập khẩu tại chỗ quy định tại khoản 3 Điều 2 Luật thuế xuất khẩu, thuế nhập khẩu thực hiện theo quy định tại Nghị định số 08/2015/NĐ-CP ngày 21 tháng 01 năm 2015 của Chính phủ quy định chi tiết và biện pháp thi hành Luật hải quan về thủ tục hải quan, kiểm tra, giám sát, kiểm soát hải quan."},{"k":"p","t":"4. Hàng hóa của doanh nghiệp chế xuất thực hiện quyền xuất khẩu, quyền nhập khẩu, quyền phân phối quy định tại khoản 3 Điều 2 Luật thuế xuất khẩu, thuế nhập khẩu là hàng hóa do doanh nghiệp chế xuất xuất khẩu, nhập khẩu để thực hiện quyền xuất khẩu, quyền nhập khẩu, quyền phân phối theo quy định của pháp luật thương mại, pháp luật đầu tư."}]},{"id":"nd134_3","no":3,"code":"Điều 3","title":"Điều 3. Áp dụng thuế suất đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Áp dụng thuế suất đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế suất đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại Điều 5, Điều 6 và Điều 7 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Trường hợp mức thuế suất ưu đãi của một mặt hàng quy định tại Biểu thuế xuất khẩu, Biểu thuế nhập khẩu ưu đãi thấp hơn so với mức thuế suất ưu đãi đặc biệt quy định tại Biểu thuế xuất khẩu, nhập khẩu ưu đãi đặc biệt thì được áp dụng mức thuế suất ưu đãi."},{"k":"p","t":"Người nộp thuế được xử lý tiền thuế nộp thừa theo quy định của pháp luật về quản lý thuế trong trường hợp đã nộp thuế nhập khẩu theo mức thuế suất ưu đãi đặc biệt cao hơn mức thuế suất ưu đãi."}]},{"id":"nd134_4","no":4,"code":"Điều 4","title":"Điều 4. Thời hạn nộp thuế, bảo lãnh, đặt cọc số tiền thuế phải nộp","shortTitle":"Thời hạn nộp thuế, bảo lãnh, đặt cọc số tiền thuế phải nộp","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp thuế quy định tại Điều 9 Luật thuế xuất khẩu, thuế nhập khẩu áp dụng đối với hàng hóa xuất khẩu, nhập khẩu thuộc đối tượng chịu thuế theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Bảo lãnh tiền thuế đối với hàng hóa xuất khẩu, nhập khẩu được thực hiện theo một trong hai hình thức: Bảo lãnh riêng hoặc bảo lãnh chung."},{"k":"p","t":"a) Bảo lãnh riêng là việc tổ chức tín dụng hoạt động theo quy định của Luật các tổ chức tín dụng cam kết bảo lãnh thực hiện đầy đủ nghĩa vụ nộp số tiền thuế cho một tờ khai hải quan hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"b) Bảo lãnh chung là việc tổ chức tín dụng hoạt động theo quy định của Luật các tổ chức tín dụng cam kết bảo lãnh thực hiện đầy đủ nghĩa vụ nộp số tiền thuế cho hai tờ khai hải quan hàng hóa xuất khẩu, nhập khẩu trở lên tại một hoặc nhiều Chi cục Hải quan. Bảo lãnh chung được trừ lùi, khôi phục tương ứng với số tiền thuế đã nộp;"},{"k":"p","t":"c) Trường hợp tổ chức tín dụng nhận bảo lãnh riêng hoặc bảo lãnh chung nhưng hết thời hạn bảo lãnh đối với từng tờ khai mà người nộp thuế chưa nộp thuế và tiền chậm nộp (nếu có), tổ chức tín dụng nhận bảo lãnh có trách nhiệm nộp đủ tiền thuế, tiền chậm nộp thay người nộp thuế vào ngân sách nhà nước trên cơ sở thông tin trên hệ thống xử lý dữ liệu điện tử hải quan hoặc thông báo của cơ quan hải quan;"},{"k":"p","t":"d) Nội dung thư bảo lãnh, việc nộp thư bảo lãnh và kiểm tra, theo dõi, xử lý thư bảo lãnh thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"3. Trường hợp sử dụng hình thức đặt cọc tiền thuế nhập khẩu đối với hàng hóa kinh doanh tạm nhập, tái xuất trong thời hạn tạm nhập, tái xuất (bao gồm cả thời gian gia hạn), người nộp thuế phải nộp một khoản tiền tương đương số tiền thuế nhập khẩu của hàng hóa tạm nhập vào tài khoản tiền gửi của cơ quan hải quan tại Kho bạc nhà nước."},{"k":"p","t":"Việc hoàn trả tiền đặt cọc thực hiện như quy định về hoàn trả tiền thuế, tiền chậm nộp, tiền phạt nộp thừa theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"4. Đối với hàng hóa kinh doanh tạm nhập tái xuất, quá thời hạn lưu giữ, doanh nghiệp chưa tái xuất hàng hóa ra khỏi Việt Nam thì cơ quan hải quan chuyển số tiền đặt cọc từ tài khoản tiền gửi của cơ quan hải quan vào ngân sách nhà nước; đối với trường hợp bảo lãnh thì tổ chức tín dụng có trách nhiệm nộp số tiền tương ứng với số tiền thuế nhập khẩu vào ngân sách nhà nước trên cơ sở thông tin trên hệ thống xử lý dữ liệu điện tử hải quan hoặc thông báo của cơ quan hải quan."}]},{"id":"nd134_5","no":5,"code":"Điều 5","title":"Điều 5. Miễn thuế đối với hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ","shortTitle":"Miễn thuế đối với hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ được miễn thuế nhập khẩu theo quy định tại khoản 1 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu, gồm:"},{"k":"p","t":"a) Cơ quan đại diện ngoại giao, cơ quan lãnh sự được nhập khẩu, tạm nhập khẩu miễn thuế hàng hóa theo danh mục và định lượng quy định tại Phụ lục I ban hành kèm theo Nghị định này. Viên chức ngoại giao, viên chức lãnh sự được nhập khẩu, tạm nhập khẩu miễn thuế hàng hóa theo danh mục và định lượng quy định tại Phụ lục II ban hành kèm theo Nghị định này. Nhân viên hành chính kỹ thuật thuộc cơ quan đại diện ngoại giao, nhân viên lãnh sự thuộc cơ quan lãnh sự được nhập khẩu, tạm nhập khẩu miễn thuế hàng hóa theo danh mục và định lượng quy định tại Phụ lục III ban hành kèm theo Nghị định này."},{"k":"p","t":"b) Cơ quan đại diện của tổ chức quốc tế thuộc hệ thống Liên hợp quốc, viên chức của cơ quan này được nhập khẩu, tạm nhập khẩu miễn thuế hàng hóa theo danh mục và định lượng quy định tại Phụ lục I, II ban hành kèm theo Nghị định này."},{"k":"p","t":"c) Cơ quan đại diện của tổ chức quốc tế ngoài hệ thống Liên hợp quốc, thành viên của cơ quan này được miễn thuế nhập khẩu theo quy định của điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"d) Cơ quan đại diện của tổ chức phi chính phủ, thành viên của cơ quan này được miễn thuế nhập khẩu theo quy định trong các thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi Chính phủ đó."},{"k":"p","t":"2. Đối tượng quy định tại điểm a, b khoản 1 Điều này được nhập khẩu miễn thuế vượt định lượng đối với mặt hàng rượu, bia, thuốc lá quy định tại Phụ lục I ban hành kèm theo Nghị định này để phục vụ hoạt động ngoại giao. Định lượng rượu, bia, thuốc lá nhập khẩu miễn thuế thực hiện theo xác nhận của Bộ Ngoại giao."},{"k":"p","t":"3. Ngoài các mặt hàng quy định tại Phụ lục I, Phụ lục II, Phụ lục III ban hành kèm theo Nghị định này, đối tượng quy định tại điểm a, b khoản 1 Điều này được nhập khẩu miễn thuế các hàng hóa cần thiết khác để phục vụ cho nhu cầu công tác trên cơ sở nguyên tắc có đi có lại hoặc thông lệ quốc tế. Chủng loại và định lượng hàng hóa nhập khẩu miễn thuế thực hiện theo xác nhận của Bộ Ngoại giao."},{"k":"p","t":"4. Trường hợp điều ước quốc tế hoặc thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi Chính phủ nước ngoài quy định tại điểm c, điểm d khoản 1 Điều này có quy định miễn thuế nhưng không quy định cụ thể về chủng loại và định lượng, Bộ Tài chính thống nhất với Bộ Ngoại giao báo cáo Thủ tướng Chính phủ quyết định chủng loại và định lượng hàng hóa miễn thuế."},{"k":"p","t":"Chủng loại và định lượng hàng hóa miễn thuế quy định tại khoản này không vượt quá danh mục và định lượng hàng hóa miễn thuế quy định tại Phụ lục I, Phụ lục II, Phụ lục III ban hành kèm theo Nghị định này."},{"k":"p","t":"5. Trường hợp tạm nhập khẩu xe ô tô, xe gắn máy để thay thế cho xe ô tô, xe gắn máy đã tạm nhập khẩu theo tiêu chuẩn định lượng của các đối tượng là cơ quan quy định tại điểm a, điểm b khoản 1 Điều này chỉ được thực hiện sau khi đã hoàn thành thủ tục tái xuất khẩu hoặc tiêu hủy hoặc chuyển nhượng."},{"k":"p","t":"Cá nhân quy định tại điểm a, điểm b khoản 1 Điều này chỉ được tạm nhập khẩu miễn thuế xe ô tô, xe gắn máy để thay thế cho xe ô tô, xe gắn máy đã tạm nhập khẩu theo tiêu chuẩn định lượng sau khi đã hoàn thành thủ tục tái xuất khẩu hoặc tiêu hủy đối với xe ô tô, xe gắn máy đã tạm nhập khẩu."},{"k":"p","t":"6. Hồ sơ miễn thuế:"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan, trừ trường hợp mua hàng miễn thuế tại cửa hàng miễn thuế;"},{"k":"p","t":"b) Sổ định mức miễn thuế theo quy định tại khoản 7 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan, trừ trường hợp Sổ định mức miễn thuế đã được cập nhật vào Cổng thông tin một cửa quốc gia;"},{"k":"p","t":"c) Giấy tờ chứng minh đã hoàn thành việc tái xuất khẩu hoặc tiêu hủy hoặc chuyển nhượng đối với các trường hợp quy định tại khoản 4 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"d) Văn bản xác nhận của Bộ Ngoại giao đối với trường hợp nhập khẩu hàng hóa quy định tại khoản 2, khoản 3 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"đ) Văn bản phê duyệt của Thủ tướng Chính phủ đối với trường hợp nhập khẩu hàng hóa quy định tại khoản 4 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"7. Thủ tục miễn thuế: Thực hiện theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"Cơ quan hải quan nơi làm thủ tục hải quan thực hiện theo dõi việc xuất khẩu, nhập khẩu sử dụng định mức bằng phương thức điện tử. Trường hợp chưa thực hiện theo dõi định mức bằng phương thức điện tử, người nộp thuế có trách nhiệm nộp 01 bản chụp, xuất trình bản chính sổ định mức để đối chiếu, trừ lùi."},{"k":"p","t":"8. Thủ tục cấp Sổ định mức miễn thuế:"},{"k":"p","t":"a) Hồ sơ đề nghị cấp Sổ định mức miễn thuế đối với cơ quan, tổ chức:"},{"k":"p","t":"Công văn đề nghị cấp Sổ định mức miễn thuế của cơ quan đại diện ngoại giao, cơ quan lãnh sự, tổ chức quốc tế, tổ chức phi chính phủ theo Mẫu số 01 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính."},{"k":"p","t":"Công văn thông báo về việc thành lập cơ quan đại diện tại Việt Nam khi cấp Sổ định mức miễn thuế lần đầu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"b) Hồ sơ đề nghị cấp Sổ định mức miễn thuế đối với cá nhân:"},{"k":"p","t":"Công văn đề nghị cấp Sổ định mức miễn thuế của cơ quan đại diện ngoại giao, cơ quan lãnh sự, tổ chức quốc tế, tổ chức phi chính phủ theo Mẫu số 02 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính."},{"k":"p","t":"Chứng minh thư do Bộ Ngoại giao cấp (đối với đối tượng quy định tại điểm a, điểm b khoản 1 Điều này): 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"Giấy phép lao động hoặc văn bản có giá trị tương đương do cơ quan có thẩm quyền cấp đối với thành viên của tổ chức quốc tế, tổ chức phi chính phủ (đối với đối tượng quy định tại điểm c, điểm d khoản 1 Điều này): 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"c) Thẩm quyền cấp Sổ định mức miễn thuế:"},{"k":"p","t":"Cục Lễ tân Nhà nước - Bộ Ngoại giao hoặc cơ quan được Bộ Ngoại giao ủy quyền thực hiện cấp Sổ định mức miễn thuế cho các cơ quan, tổ chức, cá nhân quy định tại điểm a, điểm b khoản 1 Điều này trong thời hạn chậm nhất 05 ngày làm việc kể từ ngày nhận đủ hồ sơ."},{"k":"p","t":"Cục Hải quan tỉnh, thành phố nơi đóng trụ sở của cơ quan, tổ chức quy định tại khoản 1 Điều này thực hiện cấp Sổ định mức miễn thuế cho các tổ chức, cá nhân quy định tại điểm c, điểm d khoản 1 Điều này trong thời hạn chậm nhất 05 ngày làm việc kể từ ngày nhận đủ hồ sơ."},{"k":"p","t":"Bộ Ngoại giao tiếp tục theo dõi và cấp Sổ định mức miễn thuế đối với các đối tượng ưu đãi miễn trừ quy định tại điểm c khoản 1 Điều này đã được Bộ Ngoại giao cấp Sổ định mức miễn thuế trước thời điểm Nghị định này có hiệu lực."},{"k":"p","t":"Cơ quan quy định tại điểm này thực hiện cập nhật thông tin trên Sổ định mức miễn thuế cho Tổng cục Hải quan thông qua Cổng thông tin một cửa quốc gia sau khi cấp Sổ định mức miễn thuế."}]},{"id":"nd134_6","no":6,"code":"Điều 6","title":"Điều 6. Miễn thuế đối với hành lý của người xuất cảnh, nhập cảnh","shortTitle":"Miễn thuế đối với hành lý của người xuất cảnh, nhập cảnh","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nhập cảnh bằng hộ chiếu hoặc giấy tờ thay hộ chiếu (trừ giấy thông hành dùng cho việc xuất cảnh, nhập cảnh), do cơ quan nhà nước có thẩm quyền của Việt Nam hoặc của nước ngoài cấp, có hành lý mang theo người, hành lý gửi trước hoặc gửi sau chuyến đi được miễn thuế nhập khẩu cho từng lần nhập cảnh theo định mức như sau:"},{"k":"p","t":"a) Rượu từ 20 độ trở lên: 1,5 lít hoặc rượu dưới 20 độ: 2,0 lít hoặc đồ uống có cồn, bia: 3,0 lít."},{"k":"p","t":"Đối với rượu, nếu người nhập cảnh mang nguyên chai, bình, lọ, can (sau đây viết tắt là chai) có dung tích lớn hơn dung tích quy định nhưng không vượt quá 01 lít thì được miễn thuế cả chai. Trường hợp vượt quá 01 lít thì phần vượt định mức phải nộp thuế theo quy định của pháp luật;"},{"k":"p","t":"b) Thuốc lá điếu: 200 điếu hoặc thuốc lá sợi: 250 gam hoặc xì gà: 20 điếu;"},{"k":"p","t":"c) Đồ dùng cá nhân với số lượng, chủng loại phù hợp với mục đích chuyến đi;"},{"k":"p","t":"d) Các vật phẩm khác ngoài hàng hóa quy định tại các điểm a, b, và c khoản này (không nằm trong Danh mục hàng hóa cấm nhập khẩu, tạm ngừng nhập khẩu hoặc nhập khẩu có điều kiện) có tổng trị giá hải quan không quá 10.000.000 đồng Việt Nam;"},{"k":"p","t":"Trường hợp vượt định mức phải nộp thuế, người nhập cảnh được chọn vật phẩm để miễn thuế trong trường hợp hành lý mang theo gồm nhiều vật phẩm."},{"k":"p","t":"2. Người điều khiển tàu bay và nhân viên phục vụ trên các chuyến bay quốc tế; người điều khiển tàu hỏa và nhân viên phục vụ trên tàu hỏa liên vận quốc tế; sĩ quan, thuyền viên làm việc trên tàu biển; lái xe, người lao động Việt Nam làm việc ở các nước láng giềng có chung biên giới đường bộ với Việt Nam không được hưởng định mức hành lý miễn thuế quy định tại các điểm a, b và d khoản 1 Điều này cho từng lần nhập cảnh mà cứ 90 ngày được miễn thuế 01 lần. Định mức quy định tại điểm a, điểm b khoản 1 Điều này không áp dụng đối với người dưới 18 tuổi."},{"k":"p","t":"3. Người xuất cảnh bằng hộ chiếu hoặc giấy tờ thay hộ chiếu do cơ quan nhà nước có thẩm quyền của Việt Nam hoặc của nước ngoài cấp, có hành lý mang theo người, hành lý gửi trước hoặc gửi sau chuyến đi, không thuộc Danh mục hàng cấm xuất khẩu, tạm ngừng xuất khẩu hoặc xuất khẩu có điều kiện theo quy định của pháp luật, được miễn thuế xuất khẩu không hạn chế định mức."},{"k":"p","t":"4. Hồ sơ miễn thuế là hồ sơ hải quan theo quy định của pháp luật hải quan."},{"k":"p","t":"5. Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."}]},{"id":"nd134_7","no":7,"code":"Điều 7","title":"Điều 7. Miễn thuế đối với tài sản di chuyển","shortTitle":"Miễn thuế đối với tài sản di chuyển","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân có tài sản di chuyển theo quy định tại khoản 20 Điều 4 Luật hải quan được miễn thuế xuất khẩu, thuế nhập khẩu theo quy định tại khoản 2 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a) Người nước ngoài, người Việt Nam định cư ở nước ngoài đến công tác, làm việc tại Việt Nam từ 12 tháng trở lên;"},{"k":"p","t":"b) Tổ chức, công dân Việt Nam có hoạt động ở nước ngoài từ 12 tháng trở lên sau khi kết thúc hoạt động trở về nước;"},{"k":"p","t":"c) Công dân Việt Nam định cư ở nước ngoài đã đăng ký thường trú tại Việt Nam cho lần đầu tiên nhập khẩu tài sản di chuyển."},{"k":"p","t":"2. Định mức miễn thuế nhập khẩu đối với tài sản di chuyển (gồm đồ dùng, vật dụng phục vụ sinh hoạt, làm việc đã qua sử dụng hoặc chưa qua sử dụng, trừ xe ô tô, xe gắn máy) là 01 cái hoặc 01 bộ đối với mỗi tổ chức hoặc cá nhân."},{"k":"p","t":"Trường hợp tài sản di chuyển vượt định mức miễn thuế của cơ quan, tổ chức được ngân sách nhà nước đảm bảo kinh phí hoạt động, Bộ Tài chính quyết định miễn thuế đối với từng trường hợp."},{"k":"p","t":"3. Hồ sơ miễn thuế:"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"b) Giấy phép lao động hoặc văn bản có giá trị tương đương do cơ quan có thẩm quyền cấp đối với người nước ngoài, người Việt Nam định cư ở nước ngoài đến công tác, làm việc tại Việt Nam từ 12 tháng trở lên: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Văn bản chứng minh việc chấm dứt hoạt động hoặc chấm dứt thời hạn lao động ở nước ngoài đối với tổ chức, công dân Việt Nam có hoạt động ở nước ngoài từ 12 tháng trở lên sau khi kết thúc hoạt động trở về nước: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"d) Hộ chiếu (có đóng dấu kiểm chứng nhập cảnh của cơ quan quản lý xuất nhập cảnh tại cửa khẩu hoặc đóng dấu kiểm chứng nhập cảnh của cơ quan quản lý xuất nhập cảnh tại cửa khẩu trên thị thực rời đối với trường hợp hộ chiếu được cấp thị thực rời) hoặc giấy tờ thay hộ chiếu còn giá trị (có đóng dấu kiểm chứng nhập cảnh của cơ quan quản lý xuất nhập cảnh tại cửa khẩu) đối với người Việt Nam định cư ở nước ngoài đã đăng ký thường trú tại Việt Nam: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"đ) Sổ hộ khẩu thường trú do cơ quan Công an cấp trong đó ghi rõ địa chỉ cư trú ở nước ngoài đối với người Việt Nam định cư ở nước ngoài đã đăng ký thường trú tại Việt Nam: 01 bản sao công chứng hoặc chứng thực;"},{"k":"p","t":"e) Quyết định của Bộ trưởng Bộ Tài chính về việc miễn thuế đối với tài sản di chuyển vượt định mức miễn thuế: 01 bản chính."},{"k":"p","t":"4. Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."}]},{"id":"nd134_8","no":8,"code":"Điều 8","title":"Điều 8. Miễn thuế đối với quà biếu, quà tặng","shortTitle":"Miễn thuế đối với quà biếu, quà tặng","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Quà biếu, quà tặng được miễn thuế theo quy định tại khoản 2 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu là những mặt hàng không thuộc Danh mục mặt hàng cấm nhập khẩu, cấm xuất khẩu, tạm ngừng xuất khẩu, tạm ngừng nhập khẩu, không thuộc danh mục mặt hàng chịu thuế tiêu thụ đặc biệt (trừ trường hợp quà biếu, quà tặng chịu thuế tiêu thụ đặc biệt để phục vụ mục đích an ninh, quốc phòng) theo quy định của pháp luật."},{"k":"p","t":"2. Định mức miễn thuế:"},{"k":"p","t":"a) Quà biếu, quà tặng của tổ chức, cá nhân nước ngoài cho tổ chức, cá nhân Việt Nam; quà biếu, quà tặng của tổ chức, cá nhân Việt Nam cho tổ chức, cá nhân nước ngoài có trị giá hải quan không vượt quá 2.000.000 đồng hoặc có trị giá hải quan trên 2.000.000 đồng nhưng tổng số tiền thuế phải nộp dưới 200.000 đồng được miễn thuế không quá 04 lần/năm."},{"k":"p","t":"b) Quà biếu, quà tặng của tổ chức, cá nhân nước ngoài cho cơ quan, tổ chức Việt Nam được ngân sách nhà nước đảm bảo kinh phí hoạt động theo pháp luật về ngân sách; quà biếu, quà tặng vì mục đích nhân đạo, từ thiện có trị giá hải quan không vượt quá 30.000.000 đồng được miễn thuế không quá 04 lần/năm."},{"k":"p","t":"Trường hợp vượt định mức miễn thuế của cơ quan, tổ chức được ngân sách nhà nước đảm bảo kinh phí hoạt động, Bộ Tài chính quyết định miễn thuế đối với từng trường hợp."},{"k":"p","t":"c) Quà biếu, quà tặng của tổ chức, cá nhân nước ngoài cho cá nhân Việt Nam là thuốc, thiết bị y tế cho người bị bệnh thuộc Danh mục bệnh hiểm nghèo quy định tại Phụ lục IV Nghị định này có trị giá hải quan không vượt quá 10.000.000 đồng được miễn thuế không quá 4 lần/năm."},{"k":"p","t":"3. Hồ sơ miễn thuế:"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"b) Văn bản thỏa thuận biếu tặng trong trường hợp người nhận quà tặng là tổ chức: 01 bản chụp có đóng dấu sao y bản chính của tổ chức nhận quà tặng."},{"k":"p","t":"Người nhận quà tặng là cá nhân có trách nhiệm kê khai chính xác, trung thực trên tờ khai hải quan về hàng hóa xuất khẩu, nhập khẩu là quà biếu, tặng; các thông tin về tên, địa chỉ người tặng, người nhận quà biếu, tặng ở nước ngoài và chịu trách nhiệm trước pháp luật về việc kê khai;"},{"k":"p","t":"c) Quyết định của Bộ trưởng Bộ Tài chính về việc miễn thuế đối với quà biếu, quà tặng vượt định mức miễn thuế: 01 bản chính;"},{"k":"p","t":"d) Văn bản của cơ quan chủ quản cấp trên về việc cho phép tiếp nhận để sử dụng hàng hóa miễn thuế hoặc văn bản chứng minh tổ chức được ngân sách nhà nước đảm bảo kinh phí hoạt động đối với quà biếu, quà tặng cho cơ quan, tổ chức được Nhà nước đảm bảo kinh phí hoạt động: 01 bản chính;"},{"k":"p","t":"đ) Văn bản của Chủ tịch Ủy ban nhân dân tỉnh, thành phố hoặc bộ, ngành chủ quản đối với quà biếu, quà tặng vì mục đích nhân đạo, từ thiện: 01 bản chính."},{"k":"p","t":"4. Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."}]},{"id":"nd134_9","no":9,"code":"Điều 9","title":"Điều 9. Miễn thuế đối với hàng hóa mua bán, trao đổi của cư dân biên giới","shortTitle":"Miễn thuế đối với hàng hóa mua bán, trao đổi của cư dân biên giới","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa mua bán, trao đổi của cư dân biên giới thuộc Danh mục hàng hóa để phục vụ cho sản xuất, tiêu dùng của cư dân biên giới do Bộ Công Thương công bố trong định mức quy định tại Phụ lục V Nghị định này được miễn thuế theo quy định tại khoản 3 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"Trường hợp thu mua, vận chuyển hàng hóa trong định mức nhưng không sử dụng cho sản xuất, tiêu dùng của cư dân biên giới phải kê khai, nộp thuế theo quy định."},{"k":"p","t":"2. Hàng hóa xuất khẩu, nhập khẩu của thương nhân của nước có chung đường biên giới nước ngoài được phép kinh doanh ở chợ biên giới phải nộp thuế xuất khẩu, thuế nhập khẩu theo quy định."},{"k":"p","t":"3. Hồ sơ miễn thuế:"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định của pháp luật hải quan;"},{"k":"p","t":"b) Giấy thông hành biên giới hoặc thẻ căn cước công dân: Xuất trình bản chính."},{"k":"p","t":"4. Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."}]},{"id":"nd134_10","no":10,"code":"Điều 10","title":"Điều 10. Miễn thuế đối với hàng hóa nhập khẩu để gia công, sản phẩm gia công xuất khẩu","shortTitle":"Miễn thuế đối với hàng hóa nhập khẩu để gia công, sản phẩm gia công xuất khẩu","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu để gia công, sản phẩm gia công xuất khẩu theo hợp đồng gia công được miễn thuế xuất khẩu, thuế nhập khẩu theo quy định tại khoản 6 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu, gồm:"},{"k":"p","t":"a) Nguyên liệu, bán thành phẩm, vật tư (bao gồm cả vật tư làm bao bì hoặc bao bì để đóng gói sản phẩm xuất khẩu), linh kiện nhập khẩu trực tiếp cấu thành sản phẩm xuất khẩu hoặc tham gia trực tiếp vào quá trình gia công hàng hóa xuất khẩu nhưng không trực tiếp chuyển hóa thành hàng hóa, bao gồm cả trường hợp bên nhận gia công tự nhập khẩu nguyên liệu, vật tư, linh kiện để thực hiện hợp đồng gia công;"},{"k":"p","t":"b) Hàng hóa nhập khẩu không sử dụng để mua bán, trao đổi hoặc tiêu dùng mà chỉ dùng làm hàng mẫu;"},{"k":"p","t":"c) Máy móc, thiết bị nhập khẩu được thỏa thuận trong hợp đồng gia công để thực hiện gia công;"},{"k":"p","t":"d) Sản phẩm hoàn chỉnh nhập khẩu để gắn vào sản phẩm gia công hoặc đóng chung với sản phẩm gia công thành mặt hàng đồng bộ và xuất khẩu ra nước ngoài được thể hiện trong hợp đồng gia công hoặc phụ lục hợp đồng gia công và được quản lý như nguyên liệu, vật tư nhập khẩu để gia công;"},{"k":"p","t":"đ) Linh kiện, phụ tùng nhập khẩu để bảo hành cho sản phẩm gia công xuất khẩu được thể hiện trong hợp đồng gia công hoặc phụ lục hợp đồng gia công và được quản lý như nguyên liệu, vật tư nhập khẩu để gia công;"},{"k":"p","t":"e) Hàng hóa nhập khẩu để gia công nhưng được phép tiêu hủy tại Việt Nam và thực tế đã tiêu hủy."},{"k":"p","t":"Trường hợp hàng hóa nhập khẩu để gia công được sử dụng làm quà biếu, quà tặng thì thực hiện miễn thuế theo quy định tại Điều 8 Nghị định này."},{"k":"p","t":"Hết thời hạn thực hiện hợp đồng gia công, hàng nhập khẩu để gia công không sử dụng phải tái xuất. Trường hợp không tái xuất phải kê khai nộp thuế theo quy định;"},{"k":"p","t":"g) Sản phẩm gia công xuất khẩu."},{"k":"p","t":"Trường hợp sản phẩm gia công xuất khẩu được sản xuất từ nguyên liệu, vật tư trong nước có thuế xuất khẩu thì khi xuất khẩu phải chịu thuế đối với phần trị giá nguyên liệu, vật tư trong nước cấu thành trong sản phẩm xuất khẩu theo thuế suất của nguyên liệu, vật tư."},{"k":"p","t":"2. Cơ sở để xác định hàng hóa được miễn thuế:"},{"k":"p","t":"a) Tổ chức, cá nhân có hợp đồng gia công theo quy định của Nghị định số 187/2013/NĐ-CP ngày 20 tháng 11 năm 2013 của Chính phủ quy định chi tiết thi hành Luật thương mại về hoạt động mua bán hàng hóa quốc tế và các hoạt động đại lý mua, bán, gia công và quá cảnh hàng hóa với nước ngoài."},{"k":"p","t":"Người nộp thuế kê khai trên tờ khai hải quan các thông tin về số, ngày hợp đồng gia công, tên đối tác thuế gia công;"},{"k":"p","t":"b) Người nộp thuế hoặc tổ chức, cá nhân nhận gia công lại cho người nộp thuế có cơ sở gia công, sản xuất hàng hóa xuất khẩu trên lãnh thổ Việt Nam và thực hiện thông báo cơ sở gia công, sản xuất theo quy định của pháp luật về hải quan và thông báo hợp đồng gia công cho cơ quan hải quan."},{"k":"p","t":"c) Nguyên liệu, vật tư, linh kiện nhập khẩu được sử dụng để gia công, sản xuất sản phẩm đã xuất khẩu."},{"k":"p","t":"Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện nhập khẩu được miễn thuế là trị giá hoặc lượng nguyên liệu, vật tư, linh kiện nhập khẩu thực tế được sử dụng để sản xuất sản phẩm gia công thực tế xuất khẩu, được xác định khi quyết toán việc quản lý, sử dụng nguyên liệu, vật tư nhập khẩu để gia công sản phẩm xuất khẩu theo quy định của pháp luật về hải quan."},{"k":"p","t":"Khi quyết toán, người nộp thuế có trách nhiệm kê khai chính xác, trung thực trị giá hoặc lượng nguyên liệu, vật tư, linh kiện xuất khẩu thực tế sử dụng để sản xuất sản phẩm gia công thực tế nhập khẩu đã được miễn thuế khi làm thủ tục hải quan."},{"k":"p","t":"3. Thiết bị, máy móc, nguyên liệu, vật tư, linh kiện, sản phẩm gia công do phía nước ngoài thanh toán thay tiền công gia công phải nộp thuế nhập khẩu theo quy định."},{"k":"p","t":"4. Phế liệu, phế phẩm và nguyên liệu, vật tư dư thừa đã nhập khẩu để gia công không quá 3% tổng lượng của từng nguyên liệu, vật tư thực nhập khẩu theo hợp đồng gia công được miễn thuế nhập khẩu khi tiêu thụ nội địa, nhưng phải kê khai nộp thuế giá trị gia tăng, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường (nếu có) cho cơ quan hải quan."},{"k":"p","t":"5. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_11","no":11,"code":"Điều 11","title":"Điều 11. Miễn thuế đối với hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu","shortTitle":"Miễn thuế đối với hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu để gia công, sản phẩm gia công nhập khẩu theo hợp đồng gia công được miễn thuế xuất khẩu, thuế nhập khẩu theo quy định tại khoản 6 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu, gồm:"},{"k":"p","t":"a) Nguyên liệu, vật tư, linh kiện xuất khẩu."},{"k":"p","t":"Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện đã xuất khẩu tương ứng với sản phẩm gia công không nhập khẩu trở lại phải chịu thuế xuất khẩu theo mức thuế suất của nguyên liệu, vật tư, linh kiện xuất khẩu."},{"k":"p","t":"Hàng hóa xuất khẩu để gia công là tài nguyên, khoáng sản, sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51 % giá thành sản phẩm trở lên và hàng hóa xuất khẩu để gia công thuộc đối tượng chịu thuế xuất khẩu thì không được miễn thuế xuất khẩu."},{"k":"p","t":"Việc xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng dưới 51% giá thành sản phẩm căn cứ vào quy định về xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên quy định tại Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật sửa đổi, bổ sung một số điều của Luật thuế giá trị gia tăng, Luật thuế tiêu thụ đặc biệt và Luật quản lý thuế và các văn bản hướng dẫn thi hành;"},{"k":"p","t":"b) Hàng hóa xuất khẩu không sử dụng để mua bán, trao đổi hoặc tiêu dùng mà chỉ dùng làm hàng mẫu;"},{"k":"p","t":"c) Máy móc, thiết bị xuất khẩu được thỏa thuận trong hợp đồng gia công để thực hiện gia công;"},{"k":"p","t":"d) Sản phẩm đặt gia công ở nước ngoài khi nhập khẩu trở lại Việt Nam được miễn thuế nhập khẩu đối với phần trị giá của nguyên liệu, vật tư, linh kiện xuất khẩu cấu thành sản phẩm gia công và phải chịu thuế đối với phần trị giá còn lại của sản phẩm theo mức thuế suất thuế nhập khẩu của sản phẩm gia công nhập khẩu."},{"k":"p","t":"2. Cơ sở để xác định hàng hóa được miễn thuế:"},{"k":"p","t":"a) Người nộp thuế có hợp đồng gia công theo quy định của Nghị định số 187/2013/NĐ-CP ngày 20 tháng 11 năm 2013 của Chính phủ quy định chi tiết thi hành Luật thương mại về hoạt động mua bán hàng hóa quốc tế và các hoạt động đại lý mua, bán, gia công và quá cảnh hàng hóa với nước ngoài."},{"k":"p","t":"b) Nguyên liệu, vật tư, linh kiện xuất khẩu được sử dụng để gia công, sản xuất sản phẩm đã nhập khẩu."},{"k":"p","t":"Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện xuất khẩu được miễn thuế là trị giá hoặc lượng nguyên liệu, vật tư, linh kiện xuất khẩu thực tế được sử dụng để sản xuất sản phẩm gia công thực tế nhập khẩu, được xác định khi quyết toán việc quản lý, sử dụng nguyên liệu, vật tư, linh kiện nhập khẩu để gia công sản phẩm xuất khẩu theo quy định của pháp luật về hải quan."},{"k":"p","t":"Khi quyết toán, người nộp thuế có trách nhiệm kê khai chính xác, trung thực trị giá hoặc lượng nguyên liệu, vật tư, linh kiện xuất khẩu thực tế sử dụng để sản xuất sản phẩm gia công thực tế nhập khẩu đã được miễn thuế khi làm thủ tục hải quan."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"Người nộp thuế kê khai trên tờ khai hải quan các thông tin về số, ngày hợp đồng gia công; số, ngày văn bản đã thông báo cho cơ quan hải quan về sản phẩm xuất khẩu có tổng trị giá tài nguyên, khoáng sản cộng với chi phí năng lượng dưới 51% giá thành sản phẩm."}]},{"id":"nd134_12","no":12,"code":"Điều 12","title":"Điều 12. Miễn thuế đối với hàng hóa nhập khẩu để sản xuất hàng hóa xuất khẩu","shortTitle":"Miễn thuế đối với hàng hóa nhập khẩu để sản xuất hàng hóa xuất khẩu","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên liệu, vật tư, linh kiện, bán thành phẩm, sản phẩm hoàn chỉnh nhập khẩu để sản xuất hàng hóa xuất khẩu được miễn thuế nhập khẩu theo quy định tại khoản 7 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a) Nguyên liệu, vật tư (bao gồm cả vật tư làm bao bì hoặc bao bì để đóng gói sản phẩm xuất khẩu), linh kiện, bán thành phẩm nhập khẩu trực tiếp cấu thành sản phẩm xuất khẩu hoặc tham gia trực tiếp vào quá trình sản xuất hàng hóa xuất khẩu nhưng không trực tiếp chuyển hóa thành hàng hóa;"},{"k":"p","t":"b) Sản phẩm hoàn chỉnh nhập khẩu để gắn, lắp ráp vào sản phẩm xuất khẩu hoặc đóng chung thành mặt hàng đồng bộ với sản phẩm xuất khẩu;"},{"k":"p","t":"c) Linh kiện, phụ tùng nhập khẩu để bảo hành cho sản phẩm xuất khẩu;"},{"k":"p","t":"d) Hàng hóa nhập khẩu không sử dụng để mua bán, trao đổi hoặc tiêu dùng mà chỉ dùng làm hàng mẫu."},{"k":"p","t":"2. Cơ sở để xác định hàng hóa được miễn thuế:"},{"k":"p","t":"a) Tổ chức, cá nhân sản xuất hàng hóa xuất khẩu có cơ sở sản xuất hàng hóa xuất khẩu trên lãnh thổ Việt Nam; có quyền sở hữu hoặc quyền sử dụng đối với máy móc, thiết bị tại cơ sở sản xuất phù hợp với nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất hàng hóa xuất khẩu và thực hiện thông báo cơ sở sản xuất theo quy định của pháp luật về hải quan;"},{"k":"p","t":"b) Nguyên liệu, vật tư, linh kiện nhập khẩu được sử dụng để sản xuất sản phẩm đã xuất khẩu."},{"k":"p","t":"Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện nhập khẩu được miễn thuế là trị giá hoặc lượng nguyên liệu, vật tư, linh kiện nhập khẩu thực tế được sử dụng để sản xuất sản phẩm thực tế xuất khẩu, được xác định khi quyết toán việc quản lý, sử dụng nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất sản phẩm xuất khẩu theo quy định của pháp luật về hải quan."},{"k":"p","t":"Khi quyết toán, người nộp thuế có trách nhiệm kê khai chính xác, trung thực trị giá hoặc lượng nguyên liệu, vật tư, linh kiện xuất khẩu thực tế sử dụng để sản xuất sản phẩm gia công thực tế nhập khẩu đã được miễn thuế khi làm thủ tục hải quan."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_13","no":13,"code":"Điều 13","title":"Điều 13. Miễn thuế đối với hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định","shortTitle":"Miễn thuế đối với hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định được miễn thuế theo quy định tại khoản 9 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập để bảo hành, sửa chữa, thay thế quy định tại điểm c khoản 9 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu phải đảm bảo không làm thay đổi hình dáng, công dụng và đặc tính cơ bản của hàng hóa tạm nhập, tạm xuất và không tạo ra hàng hóa khác."},{"k":"p","t":"Trường hợp thay thế hàng hóa theo điều kiện bảo hành của hợp đồng mua bán thì hàng hóa thay thế phải đảm bảo về hình dáng, công dụng và đặc tính cơ bản của hàng hóa được thay thế."},{"k":"p","t":"3. Phương tiện quay vòng theo phương thức tạm nhập, tái xuất hoặc tạm xuất, tái nhập để chứa hàng hóa xuất khẩu, nhập khẩu, bao gồm:"},{"k":"p","t":"a) Container rỗng có hoặc không có móc treo;"},{"k":"p","t":"b) Bồn mềm lót trong Container để chứa hàng lỏng;"},{"k":"p","t":"c) Các phương tiện khác có thể sử dụng nhiều lần để chứa hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."},{"k":"p","t":"Đối với hàng hóa kinh doanh tạm nhập tái xuất, người nộp thuế phải nộp thêm thư bảo lãnh của tổ chức tín dụng hoặc giấy nộp tiền đặt cọc vào tài khoản tiền gửi của cơ quan hải quan tại Kho bạc Nhà nước: 01 bản chính đối với trường hợp thư bảo lãnh chưa được cập nhật vào hệ thống xử lý dữ liệu điện tử hải quan."},{"k":"p","t":"Việc bảo lãnh hoặc đặt cọc tiền thuế nhập khẩu đối với hàng kinh doanh tạm nhập, tái xuất thực hiện theo quy định tại Điều 4 Nghị định này."}]},{"id":"nd134_14","no":14,"code":"Điều 14","title":"Điều 14. Miễn thuế hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư","shortTitle":"Miễn thuế hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư được miễn thuế nhập khẩu theo quy định tại khoản 11 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Hàng hóa nhập khẩu để tạo tài sản cố định của một dự án đầu tư có phần dự án thuộc đối tượng ưu đãi đầu tư được miễn thuế nhập khẩu đối với hàng hóa nhập khẩu được phân bổ, hạch toán riêng để sử dụng trực tiếp cho phần dự án thuộc đối tượng ưu đãi đầu tư."},{"k":"p","t":"3. Dự án đầu tư thuộc địa bàn ưu đãi đầu tư và không thuộc ngành nghề ưu đãi đầu tư thì được miễn thuế đối với hàng hóa nhập khẩu để tạo tài sản cố định phục vụ sản xuất của dự án ưu đãi đầu tư."},{"k":"p","t":"4. Căn cứ để xác định vật tư xây dựng trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"Tiêu chí xác định phương tiện vận tải chuyên dùng trong dây chuyền công nghệ sử dụng trực tiếp cho hoạt động sản xuất của dự án đầu tư thực hiện theo quy định của Bộ Khoa học và Công nghệ."},{"k":"p","t":"5. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_15","no":15,"code":"Điều 15","title":"Điều 15. Miễn thuế nhập khẩu đối với nguyên liệu, vật tư, linh kiện trong thời hạn 05 năm","shortTitle":"Miễn thuế nhập khẩu đối với nguyên liệu, vật tư, linh kiện trong thời hạn 05 năm","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được nhập khẩu để sản xuất của dự án đầu tư thuộc danh mục ngành, nghề đặc biệt ưu đãi đầu tư hoặc địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn theo quy định của pháp luật về đầu tư, doanh nghiệp công nghệ cao, doanh nghiệp khoa học và công nghệ, tổ chức khoa học và công nghệ được miễn thuế nhập khẩu trong thời hạn 05 năm kể từ khi bắt đầu sản xuất theo quy định tại khoản 13 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"Thời gian bắt đầu sản xuất là thời gian sản xuất chính thức, không bao gồm thời gian sản xuất thử. Người nộp thuế tự kê khai, tự chịu trách nhiệm về ngày thực tế tiến hành hoạt động sản xuất và thông báo trước khi làm thủ tục hải quan cho cơ quan hải quan nơi tiếp nhận hồ sơ thông báo danh mục miễn thuế."},{"k":"p","t":"Hết thời hạn miễn thuế 05 năm, người nộp thuế phải nộp đủ thuế theo quy định đối với lượng nguyên liệu, vật tư, linh kiện nhập khẩu nhưng không sử dụng hết đã được miễn thuế."},{"k":"p","t":"2. Việc xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng dưới 51 % giá thành sản phẩm căn cứ vào quy định về xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51 % giá thành sản phẩm trở lên quy định tại Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật sửa đổi, bổ sung một số điều của Luật thuế giá trị gia tăng, Luật thuế tiêu thụ đặc biệt và Luật quản lý thuế, các văn bản hướng dẫn Nghị định này."},{"k":"p","t":"3. Căn cứ để xác định ngành, nghề đặc biệt ưu đãi đầu tư, địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn thực hiện theo quy định tại Luật đầu tư và Nghị định số 118/2015/NĐ-CP ngày 12 tháng 11 năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật đầu tư."},{"k":"p","t":"Căn cứ để xác định nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_16","no":16,"code":"Điều 16","title":"Điều 16. Miễn thuế hàng hóa nhập khẩu phục vụ hoạt động dầu khí","shortTitle":"Miễn thuế hàng hóa nhập khẩu phục vụ hoạt động dầu khí","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu để phục vụ hoạt động dầu khí được miễn thuế nhập khẩu theo quy định tại khoản 15 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ để xác định phương tiện vận tải chuyên dùng phục vụ cho hoạt động dầu khí thực hiện theo quy định của Bộ Khoa học và Công nghệ."},{"k":"p","t":"3. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_17","no":17,"code":"Điều 17","title":"Điều 17. Miễn thuế hàng hóa nhập khẩu phục vụ hoạt động đóng tàu, tàu biển xuất khẩu","shortTitle":"Miễn thuế hàng hóa nhập khẩu phục vụ hoạt động đóng tàu, tàu biển xuất khẩu","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Dự án, cơ sở đóng tàu thuộc danh mục ngành, nghề ưu đãi theo quy định của pháp luật về đầu tư được miễn thuế nhập khẩu, thuế xuất khẩu theo quy định tại khoản 16 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ để xác định phương tiện vận tải trong dây chuyền công nghệ phục vụ trực tiếp cho hoạt động đóng tàu thực hiện theo quy định của Bộ Khoa học và Công nghệ."},{"k":"p","t":"3. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_18","no":18,"code":"Điều 18","title":"Điều 18. Miễn thuế đối với giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật","shortTitle":"Miễn thuế đối với giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Giống cây trồng; giống vật nuôi; phân bón, thuốc bảo vệ thực vật trong nước chưa sản xuất được, cần thiết nhập khẩu để phục vụ trực tiếp cho hoạt động nông nghiệp, lâm nghiệp, ngư nghiệp được miễn thuế nhập khẩu theo quy định tại khoản 12 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"3. Căn cứ để xác định hàng hóa nhập khẩu thuộc Danh mục giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật cần thiết nhập khẩu thực hiện theo quy định của Bộ Nông nghiệp và Phát triển nông thôn."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_19","no":19,"code":"Điều 19","title":"Điều 19. Miễn thuế hàng hóa nhập khẩu phục vụ nghiên cứu khoa học, phát triển công nghệ","shortTitle":"Miễn thuế hàng hóa nhập khẩu phục vụ nghiên cứu khoa học, phát triển công nghệ","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu để sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, phát triển hoạt động ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học và công nghệ, đổi mới công nghệ được miễn thuế nhập khẩu theo quy định tại khoản 21 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"Căn cứ để xác định máy móc, thiết bị, phụ tùng, vật tư chuyên dùng sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, phát triển hoạt động ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học và công nghệ, đổi mới công nghệ thực hiện theo quy định của Bộ Khoa học và Công nghệ."},{"k":"p","t":"3. Danh mục hoặc tiêu chí xác định tài liệu, sách báo khoa học chuyên dùng sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, phát triển hoạt động ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học và công nghệ, đổi mới công nghệ thực hiện theo quy định của Bộ Khoa học và Công nghệ."},{"k":"p","t":"4. Hồ sơ miễn thuế:"},{"k":"p","t":"Ngoài hồ sơ quy định tại Điều 31 Nghị định này, tùy từng trường hợp cụ thể người nộp thuế phải nộp thêm một trong các giấy tờ sau:"},{"k":"p","t":"a) Quyết định về việc thực hiện đề tài, chương trình, dự án, nhiệm vụ nghiên cứu khoa học, phát triển công nghệ và danh mục hàng hóa cần nhập khẩu để thực hiện đề tài, chương trình, dự án, nhiệm vụ nghiên cứu khoa học, phát triển công nghệ của cơ quan nhà nước có thẩm quyền theo quy định của Luật khoa học và công nghệ: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"b) Văn bản xác nhận danh mục hàng hóa để phát triển hoạt động ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học công nghệ của Ủy ban nhân dân tỉnh, thành phố, bộ chủ quản nơi có dự án, cơ sở ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học công nghệ: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Văn bản xác nhận danh mục hàng hóa để phục vụ đổi mới công nghệ của Bộ Khoa học và Công nghệ hoặc cơ quan được Bộ Khoa học và Công nghệ ủy quyền: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"5. Thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_20","no":20,"code":"Điều 20","title":"Điều 20. Miễn thuế đối với hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng","shortTitle":"Miễn thuế đối với hàng hóa nhập khẩu phục vụ trực tiếp cho an ninh, quốc phòng","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu chuyên dùng phục vụ trực tiếp cho an ninh, quốc phòng, trong đó phương tiện vận tải chuyên dùng phải là loại trong nước chưa sản xuất được, được miễn thuế theo quy định tại khoản 22 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Cơ sở để xác định hàng hóa được miễn thuế:"},{"k":"p","t":"a) Hàng hóa thuộc kế hoạch nhập khẩu hàng hóa chuyên dùng trực tiếp phục vụ an ninh, quốc phòng hàng năm được Thủ tướng Chính phủ phê duyệt hoặc do Bộ trưởng Bộ Công an, Bộ trưởng Bộ Quốc phòng phê duyệt theo ủy quyền của Thủ tướng Chính phủ."},{"k":"p","t":"b) Phương tiện vận tải chuyên dùng trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"3. Hồ sơ miễn thuế, gồm:"},{"k":"p","t":"a) Công văn đề nghị của Bộ Quốc phòng, Bộ Công an hoặc đơn vị được Bộ Quốc phòng, Bộ Công an ủy quyền, phân cấp theo Mẫu số 03a tại Phụ lục VII ban hành kèm theo Nghị định này (đối với trường hợp miễn thuế trước khi làm thủ tục hải quan) hoặc Mẫu số 03b tại Phụ lục VII ban hành kèm theo Nghị định này (đối với trường hợp đề nghị miễn thuế sau khi làm thủ tục hải quan): 01 bản chính."},{"k":"p","t":"b) Hợp đồng mua bán hàng hóa: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Hợp đồng ủy thác nhập khẩu hoặc hợp đồng cung cấp hàng hóa theo văn bản trúng thầu hoặc văn bản chỉ định thầu, trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu đối với trường hợp nhập khẩu ủy thác, đấu thầu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"4. Thủ tục miễn thuế:"},{"k":"p","t":"a) Trường hợp đề nghị miễn thuế trước khi làm thủ tục hải quan, Bộ Quốc phòng, Bộ Công an hoặc đơn vị được Bộ Quốc phòng, Bộ Công an ủy quyền, phân cấp nộp hồ sơ đề nghị miễn thuế đến Tổng cục Hải quan chậm nhất 05 ngày làm việc, trước khi đăng ký tờ khai hải quan."},{"k":"p","t":"Trong thời hạn tối đa 03 ngày làm việc, kể từ ngày tiếp nhận hồ sơ, Tổng cục Hải quan có văn bản thông báo hàng hóa được miễn thuế hoặc không thuộc trường hợp miễn thuế hoặc yêu cầu bổ sung hồ sơ."},{"k":"p","t":"Chi cục Hải quan nơi làm thủ tục căn cứ vào thông báo miễn thuế của Tổng cục Hải quan để thực hiện thông quan hàng hóa theo quy định."},{"k":"p","t":"b) Trường hợp đề nghị miễn thuế sau khi làm thủ tục hải quan:"},{"k":"p","t":"Bộ Công an, Bộ Quốc phòng hoặc đơn vị được Bộ Công an, Bộ Quốc phòng ủy quyền nộp hồ sơ đề nghị miễn thuế đến Tổng cục Hải quan. Thời hạn nộp hồ sơ đề nghị miễn thuế chậm nhất là 30 ngày làm việc kể từ ngày thông quan hoặc giải phóng hàng."},{"k":"p","t":"Trong thời hạn tối đa 03 ngày làm việc, kể từ ngày tiếp nhận hồ sơ, Tổng cục Hải quan thông báo miễn thuế, thông báo không thuộc trường hợp miễn thuế hoặc yêu cầu người nộp thuế bổ sung hồ sơ."},{"k":"p","t":"Chi cục Hải quan nơi làm thủ tục căn cứ vào quyết định miễn thuế của Tổng cục Hải quan để thực hiện thanh khoản số tiền thuế được miễn theo quy định."}]},{"id":"nd134_21","no":21,"code":"Điều 21","title":"Điều 21. Miễn thuế hàng hóa nhập khẩu phục vụ trực tiếp cho giáo dục","shortTitle":"Miễn thuế hàng hóa nhập khẩu phục vụ trực tiếp cho giáo dục","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu chuyên dùng trong nước chưa sản xuất được phục vụ trực tiếp cho giáo dục được miễn thuế nhập khẩu theo quy định tại khoản 20 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"3. Căn cứ xác định hàng hóa chuyên dùng nhập khẩu phục vụ trực tiếp cho giáo dục thực hiện theo quy định của Bộ Giáo dục và Đào tạo."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_22","no":22,"code":"Điều 22","title":"Điều 22. Miễn thuế hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan","shortTitle":"Miễn thuế hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan không sử dụng nguyên liệu, linh kiện nhập khẩu từ nước ngoài khi nhập khẩu vào thị trường trong nước được miễn thuế nhập khẩu theo quy định tại khoản 8 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Trường hợp sản phẩm được sản xuất, tái chế, lắp ráp tại khu phi thuế quan có sử dụng nguyên liệu, linh kiện nhập khẩu từ nước ngoài thì khi nhập khẩu vào thị trường trong nước phải nộp thuế nhập khẩu theo mức thuế suất, trị giá tính thuế của mặt hàng nhập khẩu vào nội địa Việt Nam."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_23","no":23,"code":"Điều 23","title":"Điều 23. Miễn thuế nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất, lắp ráp trang thiết bị y tế","shortTitle":"Miễn thuế nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất, lắp ráp trang thiết bị y tế","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên liệu, vật tư, linh kiện nhập khẩu trong nước chưa sản xuất được để sản xuất, lắp ráp trang thiết bị y tế của dự án đầu tư được ưu tiên nghiên cứu, chế tạo được miễn thuế nhập khẩu trong thời hạn 05 năm kể từ khi bắt đầu sản xuất theo quy định tại khoản 14 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"Danh mục sản phẩm trang thiết bị y tế được ưu tiên nghiên cứu, chế tạo quy định tại Phụ lục VI ban hành kèm theo Nghị định này."},{"k":"p","t":"2. Ngày bắt đầu sản xuất làm cơ sở miễn thuế nhập khẩu trong thời hạn 05 năm cho các trường hợp quy định tại khoản 1 Điều này là ngày thực tế tiến hành hoạt động sản xuất chính thức (không bao gồm thời gian sản xuất thử)."},{"k":"p","t":"Người nộp thuế tự kê khai, tự chịu trách nhiệm về ngày thực tế tiến hành hoạt động sản xuất và thông báo trước khi làm thủ tục hải quan cho cơ quan hải quan nơi tiếp nhận hồ sơ thông báo danh mục miễn thuế."},{"k":"p","t":"3. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_24","no":24,"code":"Điều 24","title":"Điều 24. Miễn thuế nguyên liệu, vật tư, linh kiện nhập khẩu phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm","shortTitle":"Miễn thuế nguyên liệu, vật tư, linh kiện nhập khẩu phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên liệu, vật tư, linh kiện nhập khẩu trong nước chưa sản xuất được phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm được miễn thuế nhập khẩu theo quy định tại khoản 18 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 30, Điều 31 Nghị định này."}]},{"id":"nd134_25","no":25,"code":"Điều 25","title":"Điều 25. Miễn thuế hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường","shortTitle":"Miễn thuế hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường được miễn thuế theo quy định tại khoản 19 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"3. Căn cứ để xác định hàng hóa nhập khẩu thuộc danh mục máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng nhập khẩu để thu gom, vận chuyển, xử lý, chế biến nước thải, rác thải, khí thải, quan trắc và phân tích môi trường, sản xuất năng lượng tái tạo; xử lý ô nhiễm môi trường, ứng phó, xử lý sự cố môi trường; sản phẩm xuất khẩu được sản xuất từ hoạt động tái chế, xử lý chất thải thực hiện theo quy định của Bộ Tài nguyên và Môi trường."},{"k":"p","t":"4. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_26","no":26,"code":"Điều 26","title":"Điều 26. Miễn thuế hàng hóa phục vụ hoạt động in, đúc tiền","shortTitle":"Miễn thuế hàng hóa phục vụ hoạt động in, đúc tiền","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng nhập khẩu phục vụ hoạt động in, đúc tiền được miễn thuế nhập khẩu theo quy định tại khoản 17 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu phải thuộc Danh mục do Thống đốc Ngân hàng Nhà nước Việt Nam ban hành."},{"k":"p","t":"Hàng hóa thuộc đối tượng nhập khẩu được miễn thuế theo quy định tại khoản 1 Điều này phải do các tổ chức được Ngân hàng Nhà nước chỉ định nhập khẩu."},{"k":"p","t":"2. Căn cứ xác định máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng nhập khẩu phục vụ hoạt động in, đúc tiền thực hiện theo quy định của Ngân hàng Nhà nước Việt Nam."},{"k":"p","t":"3. Hồ sơ miễn thuế:"},{"k":"p","t":"a) Hồ sơ hải quan thực hiện theo quy định của pháp luật về hải quan;"},{"k":"p","t":"b) Văn bản của Ngân hàng Nhà nước cho phép tổ chức được phép nhập khẩu máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng phục vụ hoạt động in, đúc tiền: 01 bản chụp có đóng dấu sao y bản chính."},{"k":"p","t":"4. Thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_27","no":27,"code":"Điều 27","title":"Điều 27. Miễn thuế nhập khẩu đối với hàng hóa không nhằm mục đích thương mại","shortTitle":"Miễn thuế nhập khẩu đối với hàng hóa không nhằm mục đích thương mại","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Hàng hóa không nhằm mục đích thương mại được miễn thuế nhập khẩu trong các trường hợp sau:"},{"k":"p","t":"1. Hàng mẫu, ảnh về hàng mẫu, phim về hàng mẫu, mô hình thay thế cho hàng mẫu có trị giá hải quan không vượt quá 50.000 đồng Việt Nam hoặc đã được xử lý để không thể được mua bán hoặc sử dụng, chỉ để làm mẫu."},{"k":"p","t":"2. Ấn phẩm quảng cáo thuộc Chương 49 của Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam, bao gồm: Tờ rơi, catalogue thương mại, niên giám, tài liệu quảng cáo, áp phích du lịch được dùng để quảng cáo, công bố hay quảng cáo một hàng hóa hoặc dịch vụ và được cung cấp miễn phí được miễn thuế nhập khẩu theo quy định tại khoản 10 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu với điều kiện mỗi lô hàng chỉ gồm 01 loại ấn phẩm và tổng khối lượng không quá 01 kg; trường hợp 01 lô hàng có nhiều loại ấn phẩm khác nhau thì mỗi loại ấn phẩm chỉ có một bản hoặc có tổng khối lượng ấn phẩm không vượt quá 01 kg."},{"k":"p","t":"3. Hồ sơ, thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_28","no":28,"code":"Điều 28","title":"Điều 28. Miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác","shortTitle":"Miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác được miễn thuế theo quy định tại khoản 23 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a) Hàng hóa trong nước chưa sản xuất được cần thiết nhập khẩu để sử dụng trực tiếp cho dự án thuộc chương trình phục vụ đảm bảo an sinh xã hội của Chính phủ được miễn thuế nhập khẩu."},{"k":"p","t":"b) Hàng hóa trong nước chưa sản xuất được nhập khẩu để khắc phục hậu quả thiên tai, thảm họa, dịch bệnh được miễn thuế nhập khẩu."},{"k":"p","t":"c) Hàng hóa xuất khẩu, nhập khẩu trong các trường hợp đặc biệt khác được Thủ tướng Chính phủ quyết định từng trường hợp cụ thể được miễn thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Căn cứ để xác định hàng hóa trong nước chưa sản xuất được thực hiện theo quy định của Bộ Kế hoạch và Đầu tư."},{"k":"p","t":"3. Hồ sơ đề nghị miễn thuế trước khi làm thủ tục hải quan đối với hàng hóa nhập khẩu để khắc phục hậu quả thiên tai, thảm họa, dịch bệnh, gồm:"},{"k":"p","t":"a) Công văn đề nghị miễn thuế của Ủy ban nhân dân cấp tỉnh, thành phố hoặc bộ hoặc cấp tương đương trong đó nêu rõ tình hình thiệt hại do thiên tai, thảm họa, dịch bệnh gây ra trên địa bàn: 01 bản chính;"},{"k":"p","t":"b) Danh mục hàng hóa nhập khẩu trực tiếp phục vụ khắc phục hậu quả thiên tai, thảm họa, dịch bệnh theo Mẫu số 04 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"c) Quyết định công bố dịch bệnh của cấp có thẩm quyền theo quy định của Luật phòng, chống bệnh truyền nhiễm đối với trường hợp nhập khẩu hàng hóa để khắc phục dịch bệnh: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"4. Hồ sơ đề nghị miễn thuế trước khi làm thủ tục hải quan đối với hàng hóa nhập khẩu phục vụ trực tiếp đảm bảo an sinh xã hội, gồm:"},{"k":"p","t":"a) Công văn đề nghị miễn thuế của Ủy ban nhân dân cấp tỉnh, thành phố hoặc bộ hoặc cấp tương đương: 01 bản chính;"},{"k":"p","t":"b) Danh mục hàng hóa nhập khẩu trực tiếp phục vụ đảm bảo an sinh xã hội theo Mẫu số 04 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính."},{"k":"p","t":"5. Thủ tục miễn thuế:"},{"k":"p","t":"a) Trên cơ sở công văn đề nghị miễn thuế của Ủy ban nhân dân tỉnh, thành phố hoặc bộ hoặc cấp tương đương, trong thời hạn 15 ngày, Bộ Tài chính thẩm định hồ sơ đề nghị miễn thuế và trình Thủ tướng Chính phủ quyết định kèm theo Danh mục hàng hóa đề nghị miễn thuế."},{"k":"p","t":"b) Căn cứ ý kiến chỉ đạo của Thủ tướng Chính phủ, Chi cục hải quan nơi làm thủ tục xuất khẩu, nhập khẩu hàng hóa thực hiện miễn thuế xuất khẩu, thuế nhập khẩu theo quy định."},{"k":"p","t":"6. Hồ sơ, thủ tục đề nghị miễn thuế đối với hàng hóa nhập khẩu để trực tiếp phục vụ yêu cầu cứu trợ khẩn cấp khi xảy ra thiên tai, thảm họa, dịch bệnh, gồm:"},{"k":"p","t":"a) Hồ sơ hải quan theo quy định tại Điều 24 Luật hải quan;"},{"k":"p","t":"b) Văn bản xác nhận của Ủy ban nhân dân cấp tỉnh, thành phố hoặc bộ hoặc cấp tương đương về việc nhập khẩu hàng hóa phục vụ yêu cầu cứu trợ khẩn cấp, trong đó nêu rõ tình hình thiệt hại do thiên tai, thảm họa, dịch bệnh gây ra trên địa bàn: 01 bản chính;"},{"k":"p","t":"c) Danh mục hàng hóa nhập khẩu trực tiếp phục vụ cứu trợ khẩn cấp: 01 bản chính;"},{"k":"p","t":"d) Quyết định công bố dịch bệnh của cấp có thẩm quyền theo quy định của Luật phòng, chống bệnh truyền nhiễm đối với trường hợp nhập khẩu hàng hóa để khắc phục dịch bệnh: 01 bản chụp."},{"k":"p","t":"Trên cơ sở hồ sơ đề nghị miễn thuế quy định tại khoản này, cơ quan hải quan nơi làm thủ tục hải quan giải quyết miễn thuế khi làm thủ tục hải quan."}]},{"id":"nd134_29","no":29,"code":"Điều 29","title":"Điều 29. Miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế, hàng hóa có trị giá tối thiểu, hàng hóa gửi qua dịch vụ chuyển phát nhanh","shortTitle":"Miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế, hàng hóa có trị giá tối thiểu, hàng hóa gửi qua dịch vụ chuyển phát nhanh","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu được miễn thuế xuất khẩu, thuế nhập khẩu theo điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"Cơ sở để xác định hàng hóa xuất khẩu, nhập khẩu được miễn thuế xuất khẩu, thuế nhập khẩu là số lượng, chủng loại, trị giá hàng hóa được quy định cụ thể tại điều ước quốc tế."},{"k":"p","t":"Trường hợp điều ước quốc tế không quy định cụ thể chủng loại, định lượng miễn thuế thì Bộ Tài chính thống nhất với Bộ Ngoại giao báo cáo Thủ tướng Chính phủ quyết định chủng loại và định lượng hàng hóa miễn thuế."},{"k":"p","t":"2. Hàng hóa nhập khẩu gửi qua dịch vụ chuyển phát nhanh có trị giá hải quan từ 1.000.000 đồng Việt Nam trở xuống hoặc có số tiền thuế phải nộp dưới 100.000 đồng Việt Nam được miễn thuế."},{"k":"p","t":"Trường hợp hàng hóa có trị giá hải quan vượt quá 1.000.000 đồng Việt Nam hoặc có tổng số tiền thuế phải nộp trên 100.000 đồng Việt Nam thì phải nộp thuế đối với toàn bộ lô hàng."},{"k":"p","t":"3. Hàng hóa có tổng trị giá hải quan dưới 500.000 đồng Việt Nam hoặc có tổng số tiền thuế xuất khẩu, nhập khẩu phải nộp dưới mức 50.000 đồng Việt Nam cho một lần xuất khẩu, nhập khẩu được miễn thuế xuất khẩu, nhập khẩu."},{"k":"p","t":"Quy định tại khoản này không áp dụng đối với hàng hóa là quà biếu, quà tặng, hàng hóa mua bán trao đổi của cư dân biên giới và hàng hóa gửi qua dịch vụ chuyển phát nhanh."},{"k":"p","t":"4. Hồ sơ miễn thuế:"},{"k":"p","t":"Hồ sơ hải quan thực hiện theo quy định của pháp luật về hải quan;"},{"k":"p","t":"Đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế, người nộp thuế nộp thêm:"},{"k":"p","t":"a) Điều ước quốc tế: 01 bản chụp xuất trình bản chính để đối chiếu, khi nộp hồ sơ miễn thuế lần đầu;"},{"k":"p","t":"b) Hợp đồng ủy thác, hợp đồng cung cấp hàng hóa theo văn bản trúng thầu hoặc văn bản chỉ định thầu ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu đối với trường hợp nhập khẩu ủy thác, đấu thầu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"5. Thủ tục miễn thuế thực hiện theo quy định tại Điều 31 Nghị định này."}]},{"id":"nd134_30","no":30,"code":"Điều 30","title":"Điều 30. Thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu đối với các trường hợp thông báo Danh mục miễn thuế","shortTitle":"Thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu đối với các trường hợp thông báo Danh mục miễn thuế","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp thông báo Danh mục hàng hóa nhập khẩu miễn thuế gồm các hàng hóa thuộc đối tượng miễn thuế quy định tại Điều 14, Điều 15, Điều 16, Điều 17, Điều 18, Điều 23, Điều 24 Nghị định này."},{"k":"p","t":"2. Nguyên tắc xây dựng Danh mục hàng hóa miễn thuế dự kiến nhập khẩu (sau đây gọi chung là Danh mục miễn thuế):"},{"k":"p","t":"a) Tổ chức, cá nhân sử dụng hàng hóa (chủ dự án; chủ cơ sở sản xuất, kinh doanh; chủ cơ sở đóng tàu; tổ chức, cá nhân tiến hành hoạt động dầu khí) sau đây gọi chung là chủ dự án, là người thông báo Danh mục hàng hóa xuất khẩu, nhập khẩu miễn thuế. Trường hợp chủ dự án không trực tiếp nhập khẩu hàng hóa miễn thuế mà nhà thầu chính hoặc nhà thầu phụ hoặc công ty cho thuê tài chính nhập khẩu hàng hóa thì nhà thầu, công ty cho thuê tài chính sử dụng danh mục miễn thuế do chủ dự án đã thông báo với cơ quan hải quan;"},{"k":"p","t":"b) Hàng hóa phải thuộc đối tượng được miễn thuế theo quy định tại một trong các trường hợp quy định tại khoản 11, khoản 12, khoản 13, khoản 14, khoản 15, khoản 16 và khoản 18 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu; và phù hợp với ngành nghề, lĩnh vực đầu tư, mục tiêu, quy mô, công suất của dự án, cơ sở sản xuất, hoạt động sử dụng hàng hóa miễn thuế;"},{"k":"p","t":"c) Danh mục miễn thuế được xây dựng một lần cho dự án, cơ sở sản xuất, hoạt động sử dụng hàng hóa miễn thuế, hoặc xây dựng theo từng giai đoạn, từng hạng mục, từng tổ hợp, dây chuyền phù hợp với thực tế và hồ sơ tài liệu thực hiện dự án, cơ sở sản xuất, hoạt động sử dụng hàng hóa miễn thuế, sau đây gọi chung là dự án."},{"k":"p","t":"3. Hồ sơ thông báo Danh mục miễn thuế, gồm:"},{"k":"p","t":"a) Công văn thông báo Danh mục miễn thuế nêu rõ cơ sở xác định hàng hóa miễn thuế theo Mẫu số 05 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b) Danh mục miễn thuế gửi qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan. Trường hợp hệ thống gặp sự cố hoặc thông báo Danh mục miễn thuế bằng giấy: Danh mục miễn thuế theo Mẫu số 06 tại Phụ lục VII ban hành kèm theo Nghị định này: 02 bản chính, Phiếu theo dõi trừ lùi theo Mẫu số 07 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"c) Giấy chứng nhận đăng ký đầu tư, giấy chứng nhận đăng ký doanh nghiệp hoặc giấy tờ có giá trị tương đương, trừ trường hợp miễn thuế quy định tại khoản 15 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"d) Bản trích lục luận chứng kinh tế kỹ thuật hoặc tài liệu kỹ thuật hoặc bản thuyết minh dự án: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"đ) Giấy chứng nhận doanh nghiệp công nghệ cao, doanh nghiệp khoa học và công nghệ, tổ chức khoa học và công nghệ của cơ quan có thẩm quyền đối với doanh nghiệp công nghệ cao, doanh nghiệp khoa học và công nghệ, tổ chức khoa học và công nghệ: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"e) Giấy chứng nhận đủ điều kiện sản xuất trang thiết bị y tế hoặc giấy tờ có giá trị tương đương theo quy định của pháp luật về quản lý trang thiết bị y tế đối với trường hợp miễn thuế quy định tại khoản 14 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"g) Hợp đồng dầu khí, quyết định giao nhiệm vụ thực hiện hoạt động dầu khí, văn bản của cơ quan có thẩm quyền phê duyệt chương trình công tác năm và ngân sách hàng năm đối với trường hợp miễn thuế quy định tại khoản 15 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"h) Hợp đồng đóng tàu, hợp đồng xuất khẩu tàu biển đối với trường hợp miễn thuế quy định tại điểm b, điểm c khoản 16 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"i) Bản thuyết minh dự án sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm đối với trường hợp miễn thuế quy định tại khoản 18 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"k) Hợp đồng bán hàng hoặc hợp đồng cung cấp hàng hóa theo kết quả thầu, hợp đồng ủy thác xuất khẩu, ủy thác nhập khẩu hàng hóa, hợp đồng cho thuê tài chính, trong trường hợp người nhập khẩu không phải là người thông báo Danh mục miễn thuế: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"4. Thời gian, địa điểm thông báo Danh mục miễn thuế:"},{"k":"p","t":"a) Chủ dự án có trách nhiệm gửi hồ sơ thông báo Danh mục miễn thuế theo quy định tại khoản 2 Điều này trước khi đăng ký tờ khai hàng hóa nhập khẩu miễn thuế đầu tiên;"},{"k":"p","t":"b) Nơi tiếp nhận thông báo Danh mục miễn thuế là Cục Hải quan nơi thực hiện dự án, Cục Hải quan nơi đóng trụ sở chính hoặc nơi quản lý tập trung của dự án đối với dự án được thực hiện ở nhiều tỉnh, thành phố, Cục Hải quan nơi lắp đặt tổ hợp, dây chuyền đối với danh mục hàng hóa miễn thuế dự kiến nhập khẩu theo tổ hợp, dây chuyền."},{"k":"p","t":"5. Trường hợp Danh mục miễn thuế đã thông báo có sai sót hoặc cần sửa đổi, chủ dự án thông báo Danh mục miễn thuế sửa đổi trước thời điểm nhập khẩu hàng hóa kèm theo các tài liệu liên quan để chứng minh việc bổ sung, điều chỉnh là phù hợp với nhu cầu của dự án."},{"k":"p","t":"6. Trách nhiệm của cơ quan hải quan:"},{"k":"p","t":"a) Trong thời hạn tối đa 03 ngày làm việc, kể từ ngày tiếp nhận hồ sơ, cơ quan hải quan thông báo cho chủ dự án về việc đã tiếp nhận Danh mục miễn thuế; bổ sung hồ sơ còn thiếu theo quy định tại khoản 2 Điều này; giải trình, làm rõ những thông tin có trong hồ sơ thông báo Danh mục miễn thuế hoặc thông báo hàng hóa không thuộc đối tượng miễn thuế;"},{"k":"p","t":"b) Trường hợp sửa đổi Danh mục miễn thuế làm thay đổi số tiền thuế đã được miễn, cơ quan hải quan nơi tiếp nhận hồ sơ thông báo Danh mục miễn thuế có trách nhiệm thông báo cho cơ quan hải quan nơi làm thủ tục nhập khẩu để thu hồi số tiền thuế đã được miễn không đúng quy định;"},{"k":"p","t":"c) Kiểm tra việc sử dụng hàng hóa miễn thuế trên cơ sở áp dụng cơ chế quản lý rủi ro theo quy định của pháp luật về quản lý thuế, pháp luật hải quan;"},{"k":"p","t":"d) Thu hồi, thông báo cho chủ dự án điều chỉnh Danh mục miễn thuế, dừng làm thủ tục miễn thuế, thu hồi số tiền thuế đã miễn phù hợp với dự án chấm dứt hoặc điều chỉnh hoạt động đối với trường hợp dự án chấm dứt hoặc điều chỉnh hoạt động."},{"k":"p","t":"7. Trách nhiệm của chủ dự án:"},{"k":"p","t":"a) Lập Danh mục miễn thuế theo quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Thông báo Danh mục miễn thuế, sửa đổi Danh mục miễn thuế và nhận thông tin phản hồi của cơ quan hải quan thông qua Hệ thống xử lý dữ liệu điện tử của cơ quan hải quan (trừ trường hợp chưa thực hiện được bằng phương thức điện tử);"},{"k":"p","t":"c) Kê khai chính xác, trung thực, đầy đủ và gửi hồ sơ thông báo Danh mục miễn thuế đúng thời hạn; chịu trách nhiệm trước pháp luật về tính chính xác, trung thực, đầy đủ của hồ sơ thông báo Danh mục miễn thuế, sử dụng đúng mục đích miễn thuế đối với số hàng hóa này;"},{"k":"p","t":"d) Lưu giữ các chứng từ liên quan đến cơ sở xác định hàng hóa xuất khẩu, nhập khẩu miễn thuế và xuất trình cho cơ quan hải quan, cơ quan có thẩm quyền khi thực hiện thanh tra, kiểm tra theo quy định;"},{"k":"p","t":"đ) Chậm nhất là ngày thứ 90 kể từ ngày kết thúc năm tài chính, chủ dự án thông báo việc sử dụng hàng hóa miễn thuế trong năm tài chính cho cơ quan hải quan nơi tiếp nhận Danh mục miễn thuế."}]},{"id":"nd134_31","no":31,"code":"Điều 31","title":"Điều 31. Hồ sơ, thủ tục miễn thuế khi làm thủ tục hải quan","shortTitle":"Hồ sơ, thủ tục miễn thuế khi làm thủ tục hải quan","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hồ sơ miễn thuế là hồ sơ hải quan theo quy định tại Luật hải quan và các văn bản hướng dẫn thi hành."},{"k":"p","t":"2. Ngoài hồ sơ quy định tại khoản 1 Điều này, tùy từng trường hợp, người nộp thuế nộp thêm một trong các chứng từ sau:"},{"k":"p","t":"a) Hợp đồng ủy thác trong trường hợp ủy thác xuất khẩu, nhập khẩu hàng hóa: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"b) Hợp đồng cung cấp hàng hóa theo văn bản trúng thầu hoặc văn bản chỉ định thầu trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu trong trường hợp tổ chức, cá nhân trúng thầu nhập khẩu hàng hóa: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Hợp đồng cung cấp hàng hóa cho tổ chức, cá nhân tiến hành hoạt động dầu khí trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu trong trường hợp tổ chức, cá nhân nhập khẩu hàng hóa cho hoạt động dầu khí: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"d) Hợp đồng cho thuê tài chính trong trường hợp cho thuê tài chính nhập khẩu hàng hóa cung cấp cho đối tượng được hưởng ưu đãi miễn thuế, trong đó ghi rõ giá cung cấp hàng hóa không bao gồm thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"đ) Chứng từ chuyển nhượng hàng hóa thuộc đối tượng miễn thuế đối với trường hợp hàng hóa thuộc đối tượng miễn thuế chuyển nhượng cho đối tượng miễn thuế khác, trong đó ghi rõ giá chuyển nhượng hàng hóa không bao gồm thuế nhập khẩu: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"e) Văn bản xác nhận của Bộ Khoa học và Công nghệ đối với phương tiện vận tải quy định tại Điều 14 Nghị định này: 01 bản chính."},{"k":"p","t":"g) Danh mục miễn thuế đã được cơ quan hải quan tiếp nhận đối với trường hợp thông báo Danh mục miễn thuế dự kiến nhập khẩu bằng giấy kèm Phiếu theo dõi trừ lùi đã được cơ quan hải quan tiếp nhận: 01 bản chụp, xuất trình bản chính để đối chiếu."},{"k":"p","t":"Trường hợp thông báo Danh mục miễn thuế thông qua Hệ thống xử lý dữ liệu điện tử, người nộp thuế không phải nộp Danh mục miễn thuế, cơ quan hải quan sử dụng Danh mục miễn thuế trên Hệ thống xử lý dữ liệu điện tử để thực hiện miễn thuế theo quy định."},{"k":"p","t":"3. Thủ tục miễn thuế:"},{"k":"p","t":"a) Người nộp thuế tự xác định, khai hàng hóa và số tiền thuế được miễn thuế (trừ việc kê khai số tiền thuế phải nộp đối với hàng hóa xuất khẩu, nhập khẩu để gia công do bên thuế gia công cung cấp) trên tờ khai hải quan khi làm thủ tục hải quan, chịu trách nhiệm trước pháp luật về nội dung khai báo."},{"k":"p","t":"b) Cơ quan hải quan nơi làm thủ tục hải quan căn cứ hồ sơ miễn thuế, đối chiếu với các quy định hiện hành để thực hiện miễn thuế theo quy định."},{"k":"p","t":"Trường hợp xác định hàng hóa nhập khẩu không thuộc đối tượng miễn thuế như khai báo thì thu thuế và xử phạt vi phạm (nếu có) theo quy định."},{"k":"p","t":"c) Hệ thống xử lý dữ liệu điện tử tự động trừ lùi số lượng hàng hóa xuất khẩu, nhập khẩu tương ứng với số lượng hàng hóa trong Danh mục miễn thuế."},{"k":"p","t":"Trường hợp thông báo Danh mục bằng giấy, cơ quan hải quan thực hiện cập nhật và trừ lùi số lượng hàng hóa đã xuất khẩu, nhập khẩu tương ứng với số lượng hàng hóa trong Danh mục miễn thuế."},{"k":"p","t":"Trường hợp nhập khẩu miễn thuế theo tổ hợp, dây chuyền, phải nhập khẩu làm nhiều chuyến để lắp ráp thành tổ hợp, thành dây chuyền hoàn chỉnh, không thể thực hiện trừ lùi theo số lượng hàng hóa tại thời điểm nhập khẩu thì trong thời hạn 15 ngày kể từ khi kết thúc việc nhập khẩu lô hàng cuối cùng của mỗi tổ hợp, dây chuyền, tổ chức, cá nhân có trách nhiệm tổng hợp các tờ khai đã nhập khẩu và quyết toán với cơ quan hải quan theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"4. Thủ tục miễn thuế đối với hàng hóa vượt định mức miễn thuế của tổ chức theo quy định tại khoản 2 Điều 7, khoản 2 Điều 8 Nghị định này:"},{"k":"p","t":"a) Hồ sơ đề nghị miễn thuế được gửi đến Tổng cục Hải quan chậm nhất 15 ngày làm việc trước khi làm thủ tục hải quan;"},{"k":"p","t":"b) Trường hợp hồ sơ đề nghị miễn thuế chưa đầy đủ, trong thời hạn tối đa 05 ngày làm việc, kể từ ngày tiếp nhận hồ sơ, Tổng cục Hải quan phải thông báo cho tổ chức, cá nhân để hoàn chỉnh hồ sơ;"},{"k":"p","t":"c) Trong thời hạn chậm nhất 15 ngày làm việc, kể từ ngày tiếp nhận đủ hồ sơ, Bộ Tài chính ban hành quyết định miễn thuế hoặc thông báo không miễn thuế trên cơ sở đề xuất của Tổng cục Hải quan;"},{"k":"p","t":"d) Căn cứ hồ sơ hải quan và quyết định miễn thuế của Bộ Tài chính, người nộp thuế và cơ quan hải quan nơi làm thủ tục hải quan thực hiện thủ tục miễn thuế khi làm thủ tục hải quan theo quy định tại khoản 3 Điều này."}]},{"id":"nd134_32","no":32,"code":"Điều 32","title":"Điều 32. Giảm thuế xuất khẩu, thuế nhập khẩu","shortTitle":"Giảm thuế xuất khẩu, thuế nhập khẩu","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu, nhập khẩu đang trong quá trình giám sát của cơ quan hải quan theo quy định tại Luật hải quan năm 2014 và các văn bản hướng dẫn thi hành, nếu bị hư hỏng, mất mát do nguyên nhân khách quan được giảm thuế theo quy định tại khoản 1 Điều 18 Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Hồ sơ đề nghị giảm thuế, gồm:"},{"k":"p","t":"a) Công văn đề nghị giảm thuế của người nộp thuế theo Mẫu số 08 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b) Hợp đồng bảo hiểm, thông báo trả tiền bồi thường của tổ chức nhận bảo hiểm (nếu có), trường hợp hợp đồng bảo hiểm không bao gồm nội dung bồi thường về thuế phải có xác nhận của tổ chức bảo hiểm; hợp đồng hoặc biên bản thỏa thuận đền bù của hãng vận tải đối với trường hợp tổn thất do hãng vận tải gây ra (nếu có): 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng tại địa bàn nơi phát sinh thiệt hại (biên bản xác nhận vụ cháy của cơ quan cảnh sát phòng cháy chữa cháy của địa phương nơi xảy ra vụ cháy; văn bản xác nhận của Ủy ban nhân dân cấp huyện về việc thiên tai, hỏa hoạn, tai nạn bất ngờ gây thiệt hại cho nguyên liệu, máy móc, thiết bị nhập khẩu): 01 bản chính."},{"k":"p","t":"Biên bản, văn bản xác nhận nguyên nhân thiệt hại phải được lập trong thời hạn 30 ngày kể từ ngày xảy ra thiệt hại;"},{"k":"p","t":"d) Giấy chứng nhận giám định của thương nhân kinh doanh dịch vụ giám định về số lượng hàng hóa bị mất mát hoặc tỷ lệ tổn thất thực tế của hàng hóa: nộp 01 bản chính."},{"k":"p","t":"Giấy chứng nhận giám định phải được lập trong thời hạn 30 ngày kể từ ngày xảy ra thiên tai, hỏa hoạn, tai nạn bất ngờ."},{"k":"p","t":"3. Thủ tục, thẩm quyền giảm thuế:"},{"k":"p","t":"a) Người nộp thuế nộp hồ sơ cho Chi cục Hải quan nơi làm thủ tục hải quan tại thời điểm làm thủ tục hải quan hoặc chậm nhất là 30 ngày làm việc kể từ ngày có văn bản xác nhận về mức độ hư hỏng, mất mát, thiệt hại;"},{"k":"p","t":"b) Trường hợp tại thời điểm làm thủ tục hải quan, người nộp thuế nộp đủ hồ sơ theo quy định, Chi cục Hải quan kiểm tra hồ sơ, kiểm tra thực tế hàng hóa, kiểm tra điều kiện giảm thuế và thực hiện giảm thuế trong thời hạn làm thủ tục hải quan theo quy định tại Điều 23 L
