uật hải quan;"},{"k":"p","t":"c) Trường hợp người nộp thuế nộp hồ sơ sau thời điểm làm thủ tục hải quan:"},{"k":"p","t":"Trường hợp hồ sơ đầy đủ theo quy định, Cục Hải quan có trách nhiệm lập hồ sơ, kiểm tra thông tin, thẩm định tính chính xác, đầy đủ của hồ sơ và gửi Tổng cục Hải quan trình Bộ Tài chính quyết định giảm thuế hoặc thông báo cho người nộp thuế biết lý do không thuộc đối tượng giảm thuế, số tiền thuế phải nộp trong thời hạn 15 ngày, kể từ ngày tiếp nhận đầy đủ hồ sơ. Hồ sơ chưa đầy đủ thì cơ quan hải quan thông báo cho người nộp thuế trong thời hạn 03 ngày làm việc, kể từ ngày tiếp nhận hồ sơ."},{"k":"p","t":"Trường hợp cần kiểm tra thực tế đối với hàng hóa đã qua khu vực giám sát hải quan để có đủ căn cứ giải quyết giảm thuế thì ban hành quyết định kiểm tra sau thông quan tại trụ sở người nộp thuế; trên cơ sở đó, thực hiện các công việc quy định tại điểm này trong thời hạn tối đa là 40 ngày kể từ ngày nhận đủ hồ sơ."}]},{"id":"nd134_33","no":33,"code":"Điều 33","title":"Điều 33. Hoàn thuế đối với hàng hóa xuất khẩu phải tái nhập","shortTitle":"Hoàn thuế đối với hàng hóa xuất khẩu phải tái nhập","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa xuất khẩu đã nộp thuế xuất khẩu nhưng phải tái nhập được hoàn thuế xuất khẩu và không phải nộp thuế nhập khẩu, gồm:"},{"k":"p","t":"a) Hàng hóa đã xuất khẩu nhưng phải nhập khẩu trở lại Việt Nam;"},{"k":"p","t":"b) Hàng hóa xuất khẩu do tổ chức, cá nhân ở Việt Nam gửi cho tổ chức, cá nhân ở nước ngoài thông qua dịch vụ bưu chính và dịch vụ chuyển phát nhanh quốc tế đã nộp thuế nhưng không giao được cho người nhận hàng hóa, phải tái nhập."},{"k":"p","t":"Người nộp thuế có trách nhiệm kê khai chính xác, trung thực trên tờ khai hải quan về hàng hóa tái nhập là hàng hóa xuất khẩu trước đây; các thông tin về số, ngày hợp đồng, tên đối tác mua hàng hóa đối với trường hợp có hợp đồng mua bán hàng hóa."},{"k":"p","t":"Cơ quan hải quan có trách nhiệm kiểm tra nội dung khai báo của người nộp thuế, ghi rõ kết quả kiểm tra để phục vụ cho việc giải quyết hoàn thuế."},{"k":"p","t":"2. Hồ sơ hoàn thuế, gồm:"},{"k":"p","t":"a) Công văn yêu cầu hoàn thuế hàng hóa nhập khẩu theo Mẫu số 09 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác (nếu có): 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"d) Đối với hàng hóa phải nhập khẩu trở lại do khách hàng nước ngoài từ chối nhận hàng hoặc không có người nhận hàng theo thông báo của hãng vận tải, phải có thêm thông báo của khách hàng nước ngoài hoặc văn bản thỏa thuận với khách hàng nước ngoài về việc nhận lại hàng hóa hoặc văn bản thông báo của hãng vận tải về việc không có người nhận hàng có nêu rõ lý do, số lượng, chủng loại hàng hóa trả lại đối với trường hợp hàng hóa do khách hàng trả lại: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"Trường hợp vì lý do bất khả kháng hoặc người nộp thuế tự phát hiện hàng hóa có sai sót, nhập khẩu trở lại thì không phải có văn bản này nhưng phải nêu rõ lý do nhập khẩu hàng hóa trả lại trong công văn đề nghị hoàn thuế;"},{"k":"p","t":"đ) Đối với hàng hóa xuất khẩu, nhập khẩu nêu tại điểm b khoản 1 điều này phải nộp thêm văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"3. Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp hàng hóa thuộc diện được hoàn thuế nhưng chưa nộp thuế hoặc không phải nộp thuế theo quy định tại Điều 19 Luật thuế xuất khẩu, thuế nhập khẩu, hồ sơ, thủ tục thực hiện như hồ sơ, thủ tục hoàn thuế."}]},{"id":"nd134_34","no":34,"code":"Điều 34","title":"Điều 34. Hoàn thuế đối với hàng hóa nhập khẩu phải tái xuất","shortTitle":"Hoàn thuế đối với hàng hóa nhập khẩu phải tái xuất","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa nhập khẩu đã nộp thuế nhập khẩu nhưng phải tái xuất được hoàn thuế nhập khẩu và không phải nộp thuế xuất khẩu, gồm:"},{"k":"p","t":"a) Hàng hóa nhập khẩu nhưng phải tái xuất ra nước ngoài hoặc xuất khẩu vào khu phi thuế quan để sử dụng trong khu phi thuế quan."},{"k":"p","t":"Việc tái xuất hàng hóa phải được thực hiện bởi người nhập khẩu ban đầu hoặc người được người nhập khẩu ban đầu ủy quyền, ủy thác xuất khẩu;"},{"k":"p","t":"b) Hàng hóa nhập khẩu do tổ chức, cá nhân ở nước ngoài gửi cho tổ chức, cá nhân ở Việt Nam thông qua dịch vụ bưu chính và dịch vụ chuyển phát nhanh quốc tế đã nộp thuế nhưng không giao được cho người nhận hàng hóa, phải tái xuất;"},{"k":"p","t":"c) Hàng hóa nhập khẩu đã nộp thuế sau đó bán cho các phương tiện của các hãng nước ngoài trên các tuyến đường quốc tế qua cảng Việt Nam và các phương tiện của Việt Nam trên các tuyến đường quốc tế theo quy định;"},{"k":"p","t":"d) Hàng hóa nhập khẩu đã nộp thuế nhập khẩu nhưng còn lưu kho, lưu bãi tại cửa khẩu và đang chịu sự giám sát của cơ quan hải quan được tái xuất ra nước ngoài."},{"k":"p","t":"Người nộp thuế có trách nhiệm kê khai chính xác, trung thực trên tờ khai hải quan về hàng hóa tái xuất là hàng hóa nhập khẩu trước đây; các thông tin về số, ngày hợp đồng, tên đối tác mua hàng hóa."},{"k":"p","t":"Cơ quan Hải quan có trách nhiệm kiểm tra nội dung khai báo của người nộp thuế, ghi rõ kết quả kiểm tra để phục vụ cho việc giải quyết hoàn thuế."},{"k":"p","t":"2. Hồ sơ hoàn thuế, gồm:"},{"k":"p","t":"a) Công văn yêu cầu hoàn thuế hàng hóa nhập khẩu theo Mẫu số 09 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b) Hóa đơn giá trị gia tăng hoặc hóa đơn bán hàng theo quy định của pháp luật về hóa đơn đối với trường hợp quy định tại điểm a, điểm c khoản 1 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"d) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác (nếu có): 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"đ) Văn bản thỏa thuận trả lại hàng hóa cho phía nước ngoài trong trường hợp xuất trả chủ hàng nước ngoài ban đầu đối với hàng hóa nhập khẩu quy định tại điểm a khoản 1 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"e) Văn bản thông báo của doanh nghiệp bưu chính, dịch vụ chuyển phát nhanh quốc tế về việc không giao được cho người nhận đối với hàng hóa nhập khẩu quy định tại điểm b khoản 1 Điều này: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"g) Văn bản xác nhận của doanh nghiệp cung ứng tàu biển về số lượng, trị giá hàng hóa mua của doanh nghiệp đầu mối nhập khẩu đã thực cung ứng cho tàu biển nước ngoài kèm bảng kê chứng từ thanh toán của các hãng tàu biển nước ngoài đối với hàng hóa nhập khẩu quy định tại điểm c khoản 1 Điều này: 01 bản chính."},{"k":"p","t":"3. Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp hàng hóa thuộc diện được hoàn thuế nhưng chưa nộp thuế hoặc không phải nộp thuế theo quy định tại Điều 19 Luật thuế xuất khẩu, thuế nhập khẩu, hồ sơ, thủ tục thực hiện như hồ sơ, thủ tục hoàn thuế."}]},{"id":"nd134_35","no":35,"code":"Điều 35","title":"Điều 35. Hoàn thuế đối với máy móc, thiết bị, dụng cụ, phương tiện vận chuyển của các tổ chức, cá nhân được phép tạm nhập, tái xuất","shortTitle":"Hoàn thuế đối với máy móc, thiết bị, dụng cụ, phương tiện vận chuyển của các tổ chức, cá nhân được phép tạm nhập, tái xuất","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có trách nhiệm tự kê khai, tự chịu trách nhiệm trước pháp luật về tỷ lệ mức khấu hao, phân bổ trị giá hàng hóa trong thời gian sử dụng và lưu lại tại Việt Nam theo quy định của pháp luật về kế toán khi đề nghị cơ quan hải quan hoàn thuế để làm cơ sở tính tỷ lệ trị giá sử dụng còn lại của hàng hóa."},{"k":"p","t":"Người nộp thuế có trách nhiệm kê khai chính xác, trung thực trên tờ khai hải quan về hàng hóa tái xuất là hàng hóa nhập khẩu trước đây; các thông tin về số, ngày hợp đồng, tên đối tác mua hàng hóa."},{"k":"p","t":"Cơ quan hải quan có trách nhiệm kiểm tra nội dung khai báo của người nộp thuế, ghi rõ kết quả kiểm tra để phục vụ cho việc giải quyết hoàn thuế."},{"k":"p","t":"2. Hồ sơ hoàn thuế, gồm:"},{"k":"p","t":"a) Công văn yêu cầu hoàn thuế hàng hóa nhập khẩu theo Mẫu số 09 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"3. Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp hàng hóa thuộc diện được hoàn thuế nhưng chưa nộp thuế hoặc không phải nộp thuế theo quy định tại Điều 19 Luật thuế xuất khẩu, thuế nhập khẩu, hồ sơ, thủ tục thực hiện như hồ sơ, thủ tục hoàn thuế."}]},{"id":"nd134_36","no":36,"code":"Điều 36","title":"Điều 36. Hoàn thuế đối với hàng hóa nhập khẩu để sản xuất, kinh doanh nhưng đã xuất khẩu sản phẩm","shortTitle":"Hoàn thuế đối với hàng hóa nhập khẩu để sản xuất, kinh doanh nhưng đã xuất khẩu sản phẩm","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đã nộp thuế nhập khẩu đối với hàng hóa nhập khẩu để sản xuất, kinh doanh nhưng đã đưa vào sản xuất hàng hóa xuất khẩu và đã xuất khẩu sản phẩm ra nước ngoài, hoặc xuất khẩu vào khu phi thuế quan, được hoàn thuế nhập khẩu đã nộp."},{"k":"p","t":"2. Hàng hóa nhập khẩu được hoàn thuế nhập khẩu, bao gồm:"},{"k":"p","t":"a) Nguyên liệu, vật tư (bao gồm cả vật tư làm bao bì hoặc bao bì để đóng gói sản phẩm xuất khẩu), linh kiện, bán thành phẩm nhập khẩu trực tiếp cấu thành sản phẩm xuất khẩu hoặc tham gia trực tiếp vào quá trình sản xuất hàng hóa xuất khẩu nhưng không trực tiếp chuyển hóa thành hàng hóa;"},{"k":"p","t":"b) Sản phẩm hoàn chỉnh nhập khẩu để gắn, lắp ráp vào sản phẩm xuất khẩu hoặc đóng chung thành mặt hàng đồng bộ với sản phẩm xuất khẩu;"},{"k":"p","t":"c) Linh kiện, phụ tùng nhập khẩu để bảo hành cho sản phẩm xuất khẩu."},{"k":"p","t":"3. Cơ sở để xác định hàng hóa được hoàn thuế:"},{"k":"p","t":"a) Tổ chức, cá nhân sản xuất hàng hóa xuất khẩu có cơ sở sản xuất hàng hóa xuất khẩu trên lãnh thổ Việt Nam; có quyền sở hữu hoặc quyền sử dụng đối với máy móc, thiết bị tại cơ sở sản xuất phù hợp với nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất hàng hóa xuất khẩu;"},{"k":"p","t":"b) Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện nhập khẩu được hoàn thuế là trị giá hoặc lượng nguyên liệu, vật tư, linh kiện nhập khẩu thực tế được sử dụng để sản xuất sản phẩm thực tế xuất khẩu;"},{"k":"p","t":"c) Sản phẩm xuất khẩu được làm thủ tục hải quan theo loại hình sản xuất xuất khẩu;"},{"k":"p","t":"d) Tổ chức, cá nhân trực tiếp hoặc ủy thác nhập khẩu hàng hóa, xuất khẩu sản phẩm."},{"k":"p","t":"Người nộp thuế có trách nhiệm kê khai chính xác, trung thực trên tờ khai hải quan về sản phẩm xuất khẩu được sản xuất từ hàng hóa nhập khẩu trước đây."},{"k":"p","t":"4. Trường hợp một loại nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất nhưng thu được hai hoặc nhiều loại sản phẩm khác nhau và chỉ xuất khẩu một loại sản phẩm, thì được hoàn thuế nhập khẩu tương ứng với phần nguyên liệu, vật tư, linh kiện cấu thành tương ứng với sản phẩm đã xuất khẩu tính trên tổng trị giá các sản phẩm thu được."},{"k":"p","t":"Tổng trị giá các sản phẩm thu được là tổng của trị giá sản phẩm xuất khẩu và giá bán sản phẩm tiêu thụ trong thị trường nội địa. Trị giá sản phẩm xuất khẩu không bao gồm phần trị giá nguyên liệu, vật tư, linh kiện mua tại nội địa cấu thành sản phẩm xuất khẩu."},{"k":"p","t":"Số tiền thuế nhập khẩu được hoàn được xác định bằng phương pháp phân bổ theo công thức sau đây:"},{"k":"p","t":"Số tiền thuế nhập khẩu (tương ứng với sản phẩm thực tế xuất khẩu"},{"k":"p","t":"="},{"k":"p","t":"Trị giá sản phẩm xuất khẩu"},{"k":"p","t":"x"},{"k":"p","t":"Tổng số tiền thuế nhập khẩu của nguyên liệu, vật tư, linh kiện nhập khẩu"},{"k":"p","t":"Tổng trị giá các sản phẩm thu được"},{"k":"p","t":"Trị giá sản phẩm xuất khẩu được xác định là số lượng sản phẩm thực xuất khẩu nhân (x) với trị giá tính thuế đối với hàng hóa xuất khẩu."},{"k":"p","t":"5. Hồ sơ hoàn thuế, gồm:"},{"k":"p","t":"a) Công văn yêu cầu hoàn thuế hàng hóa nhập khẩu theo Mẫu số 09 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính;"},{"k":"p","t":"b) Chứng từ thanh toán hàng hóa xuất khẩu, nhập khẩu đối với trường hợp đã thanh toán: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"c) Hợp đồng xuất khẩu, nhập khẩu và hóa đơn theo hợp đồng xuất khẩu, nhập khẩu đối với trường hợp mua, bán hàng hóa; hợp đồng ủy thác xuất khẩu, nhập khẩu nếu là hình thức xuất khẩu, nhập khẩu ủy thác: 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"Người nộp thuế kê khai trên tờ khai hải quan hàng xuất khẩu các thông tin về số, ngày hợp đồng, tên đối tác mua hàng hóa."},{"k":"p","t":"d) Báo cáo tính thuế nguyên liệu, vật tư, linh kiện nhập khẩu (theo Mẫu số 10 tại Phụ lục VII ban hành kèm theo Nghị định)."},{"k":"p","t":"Số tiền thuế nhập khẩu của nguyên liệu, vật tư, linh kiện được hoàn thuế phải tương ứng với lượng, chủng loại nguyên liệu, vật tư, linh kiện nhập khẩu thực tế được sử dụng để sản xuất sản phẩm thực tế đã xuất khẩu;"},{"k":"p","t":"đ) Hợp đồng gia công ký với khách hàng nước ngoài (đối với trường hợp nhập khẩu nguyên liệu, vật tư, linh kiện để sản xuất sản phẩm, sau đó sử dụng sản phẩm này để gia công hàng hóa xuất khẩu theo hợp đồng gia công với nước ngoài): nộp 01 bản chụp có đóng dấu sao y bản chính của cơ quan;"},{"k":"p","t":"e) Tài liệu chứng minh có cơ sở sản xuất trên lãnh thổ Việt Nam; có quyền sở hữu hoặc quyền sử dụng đối với máy móc, thiết bị tại cơ sở sản xuất phù hợp với nguyên liệu, vật tư, linh kiện nhập khẩu để sản xuất hàng hóa: 01 bản chụp có đóng dấu sao y bản chính của cơ quan."},{"k":"p","t":"6. Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp hàng hóa thuộc diện được hoàn thuế nhưng chưa nộp thuế hoặc không phải nộp thuế theo quy định tại Điều 19 Luật thuế xuất khẩu, thuế nhập khẩu, hồ sơ, thủ tục thực hiện như hồ sơ, thủ tục hoàn thuế."}]},{"id":"nd134_37","no":37,"code":"Điều 37","title":"Điều 37. Hoàn thuế đối với trường hợp người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu nhưng không có hàng hóa nhập khẩu, xuất khẩu hoặc nhập khẩu, xuất khẩu ít hơn so với hàng hóa nhập khẩu, xuất khẩu đã nộp thuế; không hoàn thuế đối với trường hợp có số tiền thuế tối thiểu","shortTitle":"Hoàn thuế đối với trường hợp người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu nhưng không có hàng hóa nhập khẩu, xuất khẩu hoặc nhập khẩu, xuất khẩu ít hơn so với hàng hóa nhập khẩu, xuất khẩu đã nộp thuế; không hoàn thuế đối với trường hợp có số tiền thuế tối thiểu","chuong":"Chương II — MIỄN THUẾ, GIẢM THUẾ, HOÀN THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu nhưng không có hàng hóa nhập khẩu, xuất khẩu hoặc nhập khẩu, xuất khẩu ít hơn so với hàng hóa nhập khẩu, xuất khẩu đã nộp thuế được hoàn thuế nhập khẩu hoặc thuế xuất khẩu đã nộp tương ứng với hàng hóa thực tế không xuất khẩu, nhập khẩu hoặc xuất khẩu, nhập khẩu ít hơn."},{"k":"p","t":"2. Các trường hợp thuộc diện được hoàn thuế xuất khẩu, thuế nhập khẩu quy định tại Điều 33, Điều 34, Điều 35, Điều 36, Điều 37 Nghị định này, có số tiền thuế được hoàn dưới 50.000 đồng Việt Nam theo tờ khai hải quan làm thủ tục hoàn thuế thì không được hoàn thuế."},{"k":"p","t":"Cơ quan hải quan không tiếp nhận hồ sơ hoàn thuế và không hoàn trả số tiền thuế được hoàn theo quy định tại khoản này."},{"k":"p","t":"3. Hồ sơ hoàn thuế: Công văn yêu cầu hoàn thuế hàng hóa nhập khẩu theo Mẫu số 09 tại Phụ lục VII ban hành kèm theo Nghị định này: 01 bản chính."},{"k":"p","t":"4. Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp hàng hóa thuộc diện được hoàn thuế nhưng chưa nộp thuế hoặc không phải nộp thuế theo quy định tại Điều 19 Luật thuế xuất khẩu, thuế nhập khẩu thì thực hiện hồ sơ, thủ tục không thu thuế như hồ sơ, thủ tục hoàn thuế."},{"k":"p","t":"Trường hợp người nộp thuế nộp đủ hồ sơ không thu thuế khi làm thủ tục hải quan và thuộc diện không thu thuế trước, kiểm tra sau, cơ quan hải quan không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu theo quy định."}]},{"id":"nd134_38","no":38,"code":"Điều 38","title":"Điều 38. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 9 năm 2016 và thay thế Nghị định số 87/2010/NĐ-CP ngày 13 tháng 8 năm 2010 của Chính phủ quy định chi tiết thi hành một số điều Luật thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"2. Bãi bỏ quy định về miễn thuế xuất khẩu, thuế nhập khẩu tại các Quyết định: số 31/2015/QĐ-TTg ngày 04 tháng 8 năm 2015, số 52/2015/QĐ-TTg ngày 20 tháng 10 năm 2015, số 53/2013/QĐ-TTg ngày 13 tháng 9 năm 2013 và Điều 7 Quyết định số 219/2009/QĐ-TTg ngày 01 tháng 10 năm 2009 của Thủ tướng Chính phủ."}]},{"id":"nd134_39","no":39,"code":"Điều 39","title":"Điều 39. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với dự án đang được hưởng ưu đãi về thuế xuất khẩu, thuế nhập khẩu có mức ưu đãi cao hơn mức ưu đãi quy định tại Luật thuế xuất khẩu, thuế nhập khẩu thì được tiếp tục thực hiện theo mức ưu đãi đó cho thời gian hưởng ưu đãi còn lại của dự án."},{"k":"p","t":"2. Đối với dự án đang được hưởng mức ưu đãi về thuế xuất khẩu, thuế nhập khẩu thấp hơn hoặc chưa được hưởng mức ưu đãi về thuế xuất khẩu, thuế nhập khẩu theo quy định tại Luật thuế xuất khẩu, thuế nhập khẩu năm 2016 thì được hưởng mức ưu đãi theo quy định của Luật thuế xuất khẩu, thuế nhập khẩu này cho thời gian hưởng ưu đãi còn lại của dự án."}]},{"id":"nd134_40","no":40,"code":"Điều 40","title":"Điều 40. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương III — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Kế hoạch và Đầu tư ban hành danh mục hàng hóa trong nước đã sản xuất được làm căn cứ xác định hàng hóa trong nước chưa sản xuất được quy định tại các Điều 14, 15, 16, 17, 18, 19, 20, 21, 23, 24, 25 và 28 của Nghị định này."},{"k":"p","t":"2. Bộ Khoa học và Công nghệ ban hành Danh mục hoặc tiêu chí để xác định:"},{"k":"p","t":"a) Phương tiện vận tải chuyên dùng cần thiết cho hoạt động dầu khí;"},{"k":"p","t":"b) Phương tiện vận tải chuyên dùng trong dây chuyền công nghệ sử dụng trực tiếp cho hoạt động sản xuất của dự án đầu tư;"},{"k":"p","t":"c) Phương tiện vận tải trong dây chuyền công nghệ phục vụ trực tiếp cho hoạt động đóng tàu;"},{"k":"p","t":"d) Tài liệu, sách báo, tạp chí khoa học chuyên dùng sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, ươm tạo doanh nghiệp khoa học công nghệ, đổi mới công nghệ;"},{"k":"p","t":"đ) Máy móc, thiết bị, phụ tùng, vật tư chuyên dùng sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, phát triển hoạt động ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học và công nghệ, đổi mới công nghệ trong nước đã sản xuất được."},{"k":"p","t":"3. Bộ Giáo dục và Đào tạo ban hành Danh mục hoặc tiêu chí để xác định hàng hóa chuyên dùng phục vụ trực tiếp cho giáo dục."},{"k":"p","t":"4. Bộ Nông nghiệp và Phát triển nông thôn ban hành Danh mục hoặc tiêu chí để xác định giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật cần thiết nhập khẩu."},{"k":"p","t":"5. Bộ Thông tin và Truyền thông ban hành Danh mục hoặc tiêu chí để xác định nguyên liệu, vật tư, linh kiện nhập khẩu phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm."},{"k":"p","t":"6. Bộ Tài nguyên và Môi trường ban hành Danh mục hoặc tiêu chí để xác định máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng nhập khẩu để bảo vệ môi trường và sản phẩm xuất khẩu được sản xuất từ hoạt động tái chế, xử lý chất thải."},{"k":"p","t":"7. Bộ Công an, Bộ Quốc phòng thông báo danh mục hàng hóa chuyên dùng nhập khẩu hàng năm trực tiếp phục vụ cho an ninh, quốc phòng Thủ tướng Chính phủ phê duyệt hoặc do Bộ trưởng Bộ Công an, Bộ trưởng Bộ Quốc phòng phê duyệt theo ủy quyền của Thủ tướng Chính phủ và cập nhật danh mục khi có thay đổi cho Tổng cục Hải quan."},{"k":"p","t":"8. Ngân hàng Nhà nước Việt Nam ban hành Danh mục máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng nhập khẩu phục vụ hoạt động in, đúc tiền của Ngân hàng Nhà nước Việt Nam và chỉ định tổ chức nhập khẩu."},{"k":"p","t":"9. Bộ Ngoại giao thông báo với Bộ Tài chính các nội dung có liên quan đến ưu đãi thuế trong các điều ước quốc tế, thỏa thuận giữa Chính phủ Việt Nam với tổ chức phi chính phủ nước ngoài."},{"k":"p","t":"10. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này./."},{"k":"p","t":"Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Chủ tịch nước;- Hội đồng dân tộc và các Ủy ban của Quốc hội;- Văn phòng Quốc hội;- Tòa án nhân dân tối cao;- Viện kiểm sát nhân dân tối cao;- Kiểm toán nhà nước;- Ủy ban Giám sát tài chính Quốc gia;- Ngân hàng Chính sách xã hội;- Ngân hàng Phát triển Việt Nam;- Ủy ban trung ương Mặt trận Tổ quốc Việt Nam;- Cơ quan trung ương của các đoàn thể;- Ban Chỉ đạo quốc gia chống buôn lậu, gian lận thương mại và hàng giả;- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;- Lưu: VT, KTTH (3b).M"},{"k":"p","t":"TM. CHÍNH PHỦTHỦ TƯỚNGNguyễn Xuân Phúc"}]}],"refs":{"nd134_1":[{"kind":"guidance","targetSlug":"nd18","targetAnchor":"nd18_1","label":"NĐ 18/2021 — Sửa đổi, bổ sung NĐ 134"},{"kind":"guidance","targetSlug":"nd182","targetAnchor":"nd182_1","label":"NĐ 182/2025 — Sửa đổi, bổ sung NĐ 134"},{"kind":"related","targetSlug":"luat-48","targetAnchor":"luat-48_7","label":"Luật 48 Đ7 — Thuế NK trong giá tính GTGT"},{"kind":"related","targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Quản lý thuế XNK"}]},"details":{"nd134_2":[{"match":"Hàng hóa xuất khẩu, nhập khẩu qua cửa khẩu, biên giới Việt Nam","title":"Điều 2 — Đối tượng chịu thuế XNK","summary":"Hàng hóa XK, NK qua cửa khẩu/biên giới; hàng từ thị trường trong nước vào khu phi thuế quan và ngược lại. <strong>Liên hệ:</strong> hàng nhập khẩu thường đồng thời chịu thuế GTGT (giá tính GTGT gồm cả thuế NK — Luật 48 Đ7) và có thể chịu TTĐB (Luật 66 Đ6).","links":[{"targetSlug":"luat-48","targetAnchor":"luat-48_7","label":"Luật 48 Điều 7 — Giá tính thuế GTGT hàng NK (gồm thuế NK)"},{"targetSlug":"luat-66","targetAnchor":"luat-66_6","label":"Luật 66 Điều 6 — Giá tính thuế TTĐB hàng NK"}]}],"nd134_3":[{"match":"Thuế suất đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại","title":"Điều 3 — Áp dụng thuế suất hàng XNK","summary":"Thuế suất XK/NK áp dụng theo Biểu thuế và các quy định của Luật Thuế XNK 107/2016 (ưu đãi, ưu đãi đặc biệt, thông thường). Trị giá hải quan và áp mã HS theo pháp luật hải quan.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Khai, nộp, ấn định thuế XNK"}]}],"nd134_4":[{"match":"Thời hạn nộp thuế quy định tại","title":"Điều 4 — Thời hạn nộp thuế, bảo lãnh, đặt cọc","summary":"Thời hạn nộp thuế XNK, điều kiện bảo lãnh số thuế phải nộp và đặt cọc (hàng tạm nhập tái xuất). Thủ tục kê khai, nộp, cưỡng chế theo Luật Quản lý thuế.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Quản lý thuế"}]}],"nd134_5":[{"match":"Hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ được miễn thuế","title":"Điều 5 — Miễn thuế hàng hưởng quyền ưu đãi, miễn trừ","summary":"Hàng hóa của tổ chức/cá nhân nước ngoài hưởng quyền ưu đãi, miễn trừ ngoại giao được miễn thuế XNK trong định lượng quy định. Một trong các trường hợp miễn thuế của NĐ 134.","links":[{"targetSlug":"nd18","targetAnchor":"nd18_1","label":"NĐ 18/2021 — Sửa đổi quy định miễn thuế"}]}],"nd134_16":[{"match":"Hàng hóa nhập khẩu để phục vụ hoạt động dầu khí được miễn thuế nhập khẩu","title":"Điều 16 — Miễn thuế hàng NK phục vụ dầu khí","summary":"Hàng hóa nhập khẩu phục vụ trực tiếp hoạt động dầu khí (thiết bị, phương tiện, vật tư trong nước chưa sản xuất được) được miễn thuế nhập khẩu.","links":[{"targetSlug":"nd182","targetAnchor":"nd182_1","label":"NĐ 182/2025 — Sửa đổi một số quy định miễn thuế"}]}],"nd134_19":[{"match":"Hàng hóa nhập khẩu để sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ","title":"Điều 19 — Miễn thuế hàng NK cho KHCN","summary":"Hàng hóa nhập khẩu sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, đổi mới sáng tạo (máy móc, thiết bị, phụ tùng trong nước chưa sản xuất được) được miễn thuế nhập khẩu.","links":[{"targetSlug":"nd18","targetAnchor":"nd18_1","label":"NĐ 18/2021 — Sửa đổi quy định miễn thuế KHCN"}]}],"nd134_33":[{"match":"Hàng hóa xuất khẩu đã nộp thuế xuất khẩu nhưng phải tái nhập được hoàn thuế xuất khẩu","title":"Điều 33 — Hoàn thuế hàng XK phải tái nhập","summary":"Hàng đã xuất khẩu, đã nộp thuế XK nhưng phải tái nhập được hoàn thuế XK và không phải nộp thuế NK. Thủ tục, hồ sơ hoàn thuế theo Luật Quản lý thuế.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Thủ tục hoàn thuế"}]}],"nd134_36":[{"match":"Người nộp thuế đã nộp thuế nhập khẩu đối với hàng hóa nhập khẩu để sản xuất, kinh doanh","title":"Điều 36 — Hoàn thuế hàng NK để sản xuất đã xuất khẩu","summary":"Hàng nhập khẩu để sản xuất, kinh doanh nhưng đã đưa vào sản xuất hàng xuất khẩu và đã xuất khẩu được hoàn thuế nhập khẩu tương ứng. Liên quan hồ sơ hoàn thuế tại TT 06.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Thủ tục hoàn thuế"},{"targetSlug":"tt06","targetAnchor":"tt06_12","label":"TT 06/2021 — Hồ sơ hoàn thuế"}]}],"nd134_37":[{"match":"Người nộp thuế đã nộp thuế nhập khẩu, thuế xuất khẩu nhưng không có hàng hóa nhập khẩu","title":"Điều 37 — Hoàn thuế khi không có hàng XNK / NK ít hơn","summary":"Trường hợp đã nộp thuế nhưng không có hàng XNK hoặc số lượng thực tế ít hơn được hoàn thuế phần chênh lệch. Thủ tục theo Luật Quản lý thuế và TT 06.","links":[{"targetSlug":"tt06","targetAnchor":"tt06_12","label":"TT 06/2021 — Hồ sơ hoàn thuế"}]}]},"summaries":{"nd134_1":{"tldr":"Nghị định quy định đối tượng chịu thuế; áp dụng thuế suất thuế xuất khẩu, nhập khẩu; thời hạn nộp thuế đối với hàng hóa xuất khẩu, nhập khẩu; miễn thuế, giảm thuế, hoàn thuế xuất khẩu, thuế nhập khẩu.","points":["Áp dụng đối với người nộp thuế theo Luật thuế xuất khẩu, thuế nhập khẩu.","Áp dụng đối với cơ quan hải quan, công chức hải quan.","Áp dụng đối với tổ chức, cá nhân có quyền và nghĩa vụ liên quan đến hàng hóa xuất khẩu, nhập khẩu.","Áp dụng đối với cơ quan, tổ chức có liên quan đến thực hiện quy định của Luật thuế xuất khẩu, thuế nhập khẩu."]},"nd134_2":{"tldr":"Quy định các đối tượng chịu thuế xuất khẩu, nhập khẩu, gồm hàng hóa qua cửa khẩu, biên giới; hàng hóa giữa thị trường trong nước và khu phi thuế quan; hàng hóa xuất nhập khẩu tại chỗ và hàng hóa của doanh nghiệp chế xuất thực hiện quyền xuất nhập khẩu, phân phối.","points":["Hàng hóa xuất khẩu, nhập khẩu qua cửa khẩu, biên giới Việt Nam.","Hàng hóa xuất khẩu từ thị trường trong nước vào doanh nghiệp chế xuất, khu chế xuất, kho bảo thuế, kho ngoại quan và các khu phi thuế quan khác; và hàng hóa nhập khẩu từ các khu này vào thị trường trong nước (theo khoản 1 Điều 4 Luật thuế xuất khẩu, thuế nhập khẩu).","Hàng hóa xuất khẩu, nhập khẩu tại chỗ (khoản 3 Điều 2 Luật) thực hiện theo Nghị định số 08/2015/NĐ-CP ngày 21/01/2015.","Hàng hóa của doanh nghiệp chế xuất thực hiện quyền xuất khẩu, nhập khẩu, phân phối là hàng do doanh nghiệp chế xuất xuất khẩu, nhập khẩu để thực hiện các quyền đó theo pháp luật thương mại, đầu tư."]},"nd134_3":{"tldr":"Thuế suất hàng hóa xuất khẩu, nhập khẩu thực hiện theo Điều 5, 6, 7 Luật thuế xuất khẩu, thuế nhập khẩu. Nếu thuế suất ưu đãi thấp hơn thuế suất ưu đãi đặc biệt thì được áp dụng thuế suất ưu đãi.","points":["Trường hợp thuế suất ưu đãi của mặt hàng tại Biểu thuế ưu đãi thấp hơn thuế suất ưu đãi đặc biệt thì được áp dụng mức thuế suất ưu đãi.","Người nộp thuế được xử lý tiền thuế nộp thừa theo pháp luật quản lý thuế nếu đã nộp thuế nhập khẩu theo thuế suất ưu đãi đặc biệt cao hơn thuế suất ưu đãi."]},"nd134_4":{"tldr":"Quy định thời hạn nộp thuế (theo Điều 9 Luật), bảo lãnh tiền thuế (bảo lãnh riêng hoặc bảo lãnh chung) và đặt cọc tiền thuế nhập khẩu đối với hàng kinh doanh tạm nhập, tái xuất.","points":["Bảo lãnh riêng: tổ chức tín dụng cam kết bảo lãnh nộp đủ tiền thuế cho một tờ khai hải quan.","Bảo lãnh chung: tổ chức tín dụng cam kết bảo lãnh nộp đủ tiền thuế cho hai tờ khai trở lên tại một hoặc nhiều Chi cục Hải quan; được trừ lùi, khôi phục tương ứng số tiền thuế đã nộp.","Hết thời hạn bảo lãnh mà người nộp thuế chưa nộp, tổ chức tín dụng nhận bảo lãnh phải nộp đủ tiền thuế, tiền chậm nộp thay vào ngân sách nhà nước.","Đặt cọc: hàng kinh doanh tạm nhập, tái xuất phải nộp khoản tiền tương đương tiền thuế nhập khẩu vào tài khoản tiền gửi của cơ quan hải quan tại Kho bạc nhà nước; hoàn trả như hoàn tiền nộp thừa.","Quá thời hạn lưu giữ chưa tái xuất, cơ quan hải quan chuyển tiền đặt cọc vào ngân sách nhà nước; trường hợp bảo lãnh thì tổ chức tín dụng nộp số tiền tương ứng tiền thuế nhập khẩu vào ngân sách."]},"nd134_5":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa của tổ chức, cá nhân nước ngoài được hưởng quyền ưu đãi, miễn trừ (cơ quan ngoại giao, lãnh sự, tổ chức quốc tế, tổ chức phi chính phủ) theo danh mục, định lượng tại các Phụ lục I, II, III và quy định hồ sơ, thủ tục, cấp Sổ định mức miễn thuế.","points":["Cơ quan đại diện ngoại giao, cơ quan lãnh sự nhập khẩu, tạm nhập khẩu miễn thuế theo Phụ lục I; viên chức ngoại giao, lãnh sự theo Phụ lục II; nhân viên hành chính kỹ thuật, nhân viên lãnh sự theo Phụ lục III.","Cơ quan đại diện của tổ chức quốc tế thuộc hệ thống Liên hợp quốc và viên chức theo Phụ lục I, II; ngoài hệ thống Liên hợp quốc và tổ chức phi chính phủ theo điều ước/thỏa thuận.","Được nhập khẩu miễn thuế vượt định lượng rượu, bia, thuốc lá để phục vụ ngoại giao theo xác nhận của Bộ Ngoại giao.","Tạm nhập khẩu xe ô tô, xe gắn máy thay thế chỉ thực hiện sau khi đã hoàn thành tái xuất khẩu hoặc tiêu hủy hoặc chuyển nhượng xe đã tạm nhập.","Cục Lễ tân Nhà nước - Bộ Ngoại giao (hoặc cơ quan được ủy quyền) cấp Sổ định mức miễn thuế cho đối tượng tại điểm a, b; Cục Hải quan tỉnh, thành phố cấp cho đối tượng tại điểm c, d; trong thời hạn chậm nhất 05 ngày làm việc kể từ ngày nhận đủ hồ sơ.","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_6":{"tldr":"Quy định định mức hành lý miễn thuế nhập khẩu cho người nhập cảnh từng lần và miễn thuế xuất khẩu không hạn chế định mức cho người xuất cảnh.","points":["Rượu từ 20 độ trở lên: 1,5 lít hoặc rượu dưới 20 độ: 2,0 lít hoặc đồ uống có cồn, bia: 3,0 lít; nếu chai có dung tích lớn hơn nhưng không quá 01 lít thì miễn thuế cả chai, vượt quá 01 lít phần vượt phải nộp thuế.","Thuốc lá điếu: 200 điếu hoặc thuốc lá sợi: 250 gam hoặc xì gà: 20 điếu.","Đồ dùng cá nhân phù hợp mục đích chuyến đi; các vật phẩm khác có tổng trị giá hải quan không quá 10.000.000 đồng Việt Nam.","Người điều khiển/nhân viên tàu bay, tàu hỏa liên vận quốc tế; thuyền viên; lái xe, người lao động Việt Nam làm việc ở nước láng giềng: cứ 90 ngày được miễn thuế 01 lần; định mức rượu, thuốc lá không áp dụng với người dưới 18 tuổi.","Người xuất cảnh có hành lý không thuộc danh mục cấm/tạm ngừng/có điều kiện được miễn thuế xuất khẩu không hạn chế định mức.","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_7":{"tldr":"Quy định miễn thuế xuất khẩu, nhập khẩu đối với tài sản di chuyển của tổ chức, cá nhân theo định mức 01 cái hoặc 01 bộ cho mỗi tổ chức hoặc cá nhân, cùng hồ sơ, thủ tục miễn thuế.","points":["Đối tượng: người nước ngoài, người Việt Nam định cư ở nước ngoài đến công tác, làm việc tại Việt Nam từ 12 tháng trở lên; tổ chức, công dân Việt Nam hoạt động ở nước ngoài từ 12 tháng trở lên trở về nước; công dân Việt Nam định cư ở nước ngoài đã đăng ký thường trú tại Việt Nam (lần đầu nhập khẩu tài sản di chuyển).","Định mức miễn thuế nhập khẩu tài sản di chuyển (đồ dùng, vật dụng sinh hoạt, làm việc, trừ xe ô tô, xe gắn máy) là 01 cái hoặc 01 bộ cho mỗi tổ chức hoặc cá nhân.","Trường hợp vượt định mức của cơ quan, tổ chức được ngân sách nhà nước đảm bảo kinh phí, Bộ Tài chính quyết định miễn thuế từng trường hợp.","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_8":{"tldr":"Quy định miễn thuế đối với quà biếu, quà tặng theo định mức trị giá hải quan và số lần/năm, kèm hồ sơ, thủ tục miễn thuế.","points":["Quà biếu, quà tặng được miễn thuế phải không thuộc danh mục cấm xuất/nhập khẩu, tạm ngừng và không thuộc danh mục chịu thuế tiêu thụ đặc biệt (trừ trường hợp phục vụ an ninh, quốc phòng).","Quà biếu, tặng giữa tổ chức, cá nhân nước ngoài và Việt Nam: trị giá hải quan không quá 2.000.000 đồng, hoặc trên 2.000.000 đồng nhưng tổng thuế phải nộp dưới 200.000 đồng, được miễn thuế không quá 04 lần/năm.","Quà biếu, tặng cho cơ quan, tổ chức được ngân sách nhà nước đảm bảo kinh phí; hoặc vì mục đích nhân đạo, từ thiện có trị giá hải quan không quá 30.000.000 đồng, miễn thuế không quá 04 lần/năm.","Quà là thuốc, thiết bị y tế cho người bệnh thuộc Danh mục bệnh hiểm nghèo (Phụ lục IV) có trị giá hải quan không quá 10.000.000 đồng, miễn thuế không quá 4 lần/năm.","Trường hợp vượt định mức của cơ quan, tổ chức được ngân sách nhà nước đảm bảo kinh phí, Bộ Tài chính quyết định miễn thuế từng trường hợp.","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_9":{"tldr":"Quy định miễn thuế đối với hàng hóa mua bán, trao đổi của cư dân biên giới thuộc Danh mục do Bộ Công Thương công bố trong định mức tại Phụ lục V, cùng hồ sơ, thủ tục miễn thuế.","points":["Hàng trong định mức nhưng không sử dụng cho sản xuất, tiêu dùng của cư dân biên giới phải kê khai, nộp thuế.","Hàng hóa xuất khẩu, nhập khẩu của thương nhân nước có chung đường biên giới được phép kinh doanh ở chợ biên giới phải nộp thuế xuất khẩu, nhập khẩu.","Hồ sơ gồm hồ sơ hải quan và giấy thông hành biên giới hoặc thẻ căn cước công dân (xuất trình bản chính).","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_10":{"tldr":"Quy định miễn thuế xuất khẩu, nhập khẩu đối với hàng hóa nhập khẩu để gia công và sản phẩm gia công xuất khẩu theo hợp đồng gia công, cơ sở xác định miễn thuế và xử lý phế liệu, phế phẩm.","points":["Đối tượng miễn thuế gồm nguyên liệu, vật tư, linh kiện; hàng mẫu; máy móc, thiết bị thỏa thuận trong hợp đồng; sản phẩm hoàn chỉnh gắn/đóng chung để xuất khẩu; linh kiện, phụ tùng bảo hành; hàng được phép tiêu hủy và thực tế đã tiêu hủy tại Việt Nam; và sản phẩm gia công xuất khẩu.","Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện được miễn thuế là phần thực tế dùng để sản xuất sản phẩm gia công thực tế xuất khẩu, xác định khi quyết toán.","Thiết bị, máy móc, nguyên liệu, vật tư, linh kiện, sản phẩm gia công do nước ngoài thanh toán thay tiền công gia công phải nộp thuế nhập khẩu.","Phế liệu, phế phẩm và nguyên liệu, vật tư dư thừa nhập khẩu để gia công không quá 3% tổng lượng từng nguyên liệu, vật tư thực nhập theo hợp đồng được miễn thuế nhập khẩu khi tiêu thụ nội địa, nhưng phải kê khai nộp thuế GTGT, tiêu thụ đặc biệt, bảo vệ môi trường (nếu có).","Hết thời hạn hợp đồng gia công, hàng nhập khẩu không sử dụng phải tái xuất; nếu không tái xuất phải kê khai nộp thuế.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_11":{"tldr":"Quy định miễn thuế xuất khẩu, nhập khẩu đối với hàng hóa xuất khẩu để gia công và sản phẩm gia công nhập khẩu theo hợp đồng gia công, cùng cơ sở xác định miễn thuế.","points":["Đối tượng gồm nguyên liệu, vật tư, linh kiện xuất khẩu; hàng mẫu; máy móc, thiết bị thỏa thuận trong hợp đồng; sản phẩm đặt gia công ở nước ngoài khi nhập khẩu trở lại được miễn thuế phần trị giá nguyên liệu, vật tư, linh kiện xuất khẩu cấu thành.","Hàng hóa xuất khẩu để gia công là tài nguyên, khoáng sản, sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên và thuộc đối tượng chịu thuế xuất khẩu thì không được miễn thuế xuất khẩu.","Phần trị giá hoặc lượng nguyên liệu, vật tư, linh kiện xuất khẩu tương ứng sản phẩm gia công không nhập khẩu trở lại phải chịu thuế xuất khẩu theo thuế suất của nguyên liệu, vật tư, linh kiện.","Trị giá hoặc lượng được miễn thuế là phần thực tế dùng để sản xuất sản phẩm gia công thực tế nhập khẩu, xác định khi quyết toán.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_12":{"tldr":"Quy định miễn thuế nhập khẩu đối với nguyên liệu, vật tư, linh kiện, bán thành phẩm, sản phẩm hoàn chỉnh nhập khẩu để sản xuất hàng hóa xuất khẩu, cùng cơ sở xác định miễn thuế.","points":["Đối tượng gồm nguyên liệu, vật tư, linh kiện, bán thành phẩm cấu thành/tham gia trực tiếp sản xuất hàng xuất khẩu; sản phẩm hoàn chỉnh để gắn, lắp ráp hoặc đóng chung; linh kiện, phụ tùng bảo hành; và hàng mẫu.","Tổ chức, cá nhân phải có cơ sở sản xuất trên lãnh thổ Việt Nam, có quyền sở hữu hoặc sử dụng máy móc, thiết bị phù hợp và thông báo cơ sở sản xuất theo pháp luật hải quan.","Trị giá hoặc lượng nguyên liệu, vật tư, linh kiện được miễn thuế là phần thực tế dùng để sản xuất sản phẩm thực tế xuất khẩu, xác định khi quyết toán.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_13":{"tldr":"Quy định miễn thuế đối với hàng hóa tạm nhập, tái xuất hoặc tạm xuất, tái nhập trong thời hạn nhất định, gồm cả hàng để bảo hành, sửa chữa, thay thế và phương tiện quay vòng.","points":["Hàng tạm nhập, tái xuất hoặc tạm xuất, tái nhập để bảo hành, sửa chữa, thay thế phải đảm bảo không thay đổi hình dáng, công dụng, đặc tính cơ bản và không tạo ra hàng hóa khác.","Phương tiện quay vòng được miễn thuế gồm: container rỗng có hoặc không có móc treo; bồn mềm lót trong container chứa hàng lỏng; các phương tiện khác sử dụng nhiều lần để chứa hàng xuất khẩu, nhập khẩu.","Đối với hàng kinh doanh tạm nhập tái xuất, phải nộp thêm thư bảo lãnh của tổ chức tín dụng hoặc giấy nộp tiền đặt cọc; việc bảo lãnh hoặc đặt cọc thực hiện theo Điều 4 Nghị định này.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_14":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa nhập khẩu để tạo tài sản cố định của đối tượng được hưởng ưu đãi đầu tư.","points":["Dự án có phần thuộc đối tượng ưu đãi đầu tư được miễn thuế đối với hàng hóa được phân bổ, hạch toán riêng để sử dụng trực tiếp cho phần dự án thuộc đối tượng ưu đãi đầu tư.","Dự án thuộc địa bàn ưu đãi đầu tư nhưng không thuộc ngành nghề ưu đãi đầu tư được miễn thuế đối với hàng hóa tạo tài sản cố định phục vụ sản xuất của dự án ưu đãi.","Căn cứ xác định vật tư xây dựng trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư; tiêu chí phương tiện vận tải chuyên dùng trong dây chuyền công nghệ theo Bộ Khoa học và Công nghệ.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_15":{"tldr":"Quy định miễn thuế nhập khẩu trong thời hạn 05 năm kể từ khi bắt đầu sản xuất đối với nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được nhập khẩu để sản xuất của dự án thuộc ngành, nghề đặc biệt ưu đãi đầu tư hoặc địa bàn đặc biệt khó khăn, doanh nghiệp công nghệ cao, khoa học và công nghệ.","points":["Thời gian bắt đầu sản xuất là thời gian sản xuất chính thức, không bao gồm sản xuất thử; người nộp thuế tự kê khai, tự chịu trách nhiệm và thông báo trước khi làm thủ tục hải quan.","Hết thời hạn miễn thuế 05 năm, người nộp thuế phải nộp đủ thuế đối với lượng nguyên liệu, vật tư, linh kiện nhập khẩu chưa sử dụng hết đã được miễn thuế.","Căn cứ xác định ngành, nghề đặc biệt ưu đãi, địa bàn đặc biệt khó khăn theo Luật đầu tư và Nghị định số 118/2015/NĐ-CP; căn cứ xác định hàng trong nước chưa sản xuất được theo Bộ Kế hoạch và Đầu tư.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_16":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa nhập khẩu để phục vụ hoạt động dầu khí theo khoản 15 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu.","points":["Căn cứ xác định phương tiện vận tải chuyên dùng phục vụ hoạt động dầu khí theo quy định của Bộ Khoa học và Công nghệ.","Căn cứ xác định hàng hóa trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_17":{"tldr":"Quy định miễn thuế nhập khẩu, thuế xuất khẩu đối với dự án, cơ sở đóng tàu thuộc danh mục ngành, nghề ưu đãi phục vụ hoạt động đóng tàu, tàu biển xuất khẩu.","points":["Căn cứ xác định phương tiện vận tải trong dây chuyền công nghệ phục vụ trực tiếp hoạt động đóng tàu theo quy định của Bộ Khoa học và Công nghệ.","Căn cứ xác định hàng hóa trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_18":{"tldr":"Quy định miễn thuế nhập khẩu đối với giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật trong nước chưa sản xuất được, cần thiết nhập khẩu để phục vụ trực tiếp cho nông nghiệp, lâm nghiệp, ngư nghiệp.","points":["Căn cứ xác định hàng hóa trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Căn cứ xác định hàng thuộc Danh mục giống cây trồng, giống vật nuôi, phân bón, thuốc bảo vệ thực vật cần thiết nhập khẩu theo Bộ Nông nghiệp và Phát triển nông thôn.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_19":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa nhập khẩu để sử dụng trực tiếp cho nghiên cứu khoa học, phát triển công nghệ, ươm tạo công nghệ, ươm tạo doanh nghiệp khoa học và công nghệ, đổi mới công nghệ, cùng hồ sơ miễn thuế.","points":["Căn cứ xác định hàng trong nước chưa sản xuất được theo Bộ Kế hoạch và Đầu tư; căn cứ xác định máy móc, thiết bị, phụ tùng, vật tư chuyên dùng theo Bộ Khoa học và Công nghệ.","Danh mục/tiêu chí tài liệu, sách báo khoa học chuyên dùng theo quy định của Bộ Khoa học và Công nghệ.","Ngoài hồ sơ theo Điều 31, tùy trường hợp phải nộp thêm: quyết định thực hiện đề tài/chương trình/dự án nghiên cứu và danh mục hàng cần nhập; hoặc văn bản xác nhận danh mục hàng để phát triển ươm tạo của UBND tỉnh/bộ chủ quản; hoặc văn bản xác nhận danh mục phục vụ đổi mới công nghệ của Bộ Khoa học và Công nghệ.","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_20":{"tldr":"Quy định miễn thuế đối với hàng hóa nhập khẩu chuyên dùng phục vụ trực tiếp cho an ninh, quốc phòng (phương tiện vận tải chuyên dùng phải là loại trong nước chưa sản xuất được), cùng cơ sở xác định, hồ sơ và thủ tục miễn thuế trước hoặc sau khi làm thủ tục hải quan.","points":["Hàng hóa phải thuộc kế hoạch nhập khẩu hàng chuyên dùng an ninh, quốc phòng hàng năm được Thủ tướng Chính phủ phê duyệt hoặc do Bộ trưởng Bộ Công an, Bộ trưởng Bộ Quốc phòng phê duyệt theo ủy quyền.","Trường hợp miễn thuế trước khi làm thủ tục hải quan: nộp hồ sơ đến Tổng cục Hải quan chậm nhất 05 ngày làm việc trước khi đăng ký tờ khai; Tổng cục Hải quan trả lời trong tối đa 03 ngày làm việc.","Trường hợp miễn thuế sau khi làm thủ tục hải quan: nộp hồ sơ chậm nhất 30 ngày làm việc kể từ ngày thông quan hoặc giải phóng hàng; Tổng cục Hải quan trả lời trong tối đa 03 ngày làm việc.","Hồ sơ gồm công văn đề nghị (Mẫu số 03a hoặc 03b Phụ lục VII), hợp đồng mua bán, hợp đồng ủy thác nhập khẩu hoặc hợp đồng cung cấp theo văn bản trúng thầu/chỉ định thầu."]},"nd134_21":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa chuyên dùng trong nước chưa sản xuất được phục vụ trực tiếp cho giáo dục.","points":["Căn cứ xác định hàng trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Căn cứ xác định hàng chuyên dùng nhập khẩu phục vụ trực tiếp cho giáo dục theo quy định của Bộ Giáo dục và Đào tạo.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_22":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa sản xuất, gia công, tái chế, lắp ráp tại khu phi thuế quan không sử dụng nguyên liệu, linh kiện nhập khẩu từ nước ngoài khi nhập khẩu vào thị trường trong nước.","points":["Trường hợp sản phẩm có sử dụng nguyên liệu, linh kiện nhập khẩu từ nước ngoài thì khi nhập khẩu vào thị trường trong nước phải nộp thuế nhập khẩu theo thuế suất, trị giá tính thuế của mặt hàng nhập khẩu vào nội địa Việt Nam.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_23":{"tldr":"Quy định miễn thuế nhập khẩu trong thời hạn 05 năm kể từ khi bắt đầu sản xuất đối với nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được nhập khẩu để sản xuất, lắp ráp trang thiết bị y tế của dự án được ưu tiên nghiên cứu, chế tạo (Danh mục tại Phụ lục VI).","points":["Ngày bắt đầu sản xuất làm cơ sở miễn thuế 05 năm là ngày thực tế tiến hành hoạt động sản xuất chính thức (không gồm sản xuất thử).","Người nộp thuế tự kê khai, tự chịu trách nhiệm về ngày thực tế sản xuất và thông báo trước khi làm thủ tục hải quan.","Căn cứ xác định hàng trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_24":{"tldr":"Quy định miễn thuế nhập khẩu đối với nguyên liệu, vật tư, linh kiện trong nước chưa sản xuất được phục vụ trực tiếp cho hoạt động sản xuất sản phẩm công nghệ thông tin, nội dung số, phần mềm.","points":["Căn cứ xác định hàng trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 30, Điều 31 Nghị định này."]},"nd134_25":{"tldr":"Quy định miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu để bảo vệ môi trường theo khoản 19 Điều 16 Luật thuế xuất khẩu, thuế nhập khẩu.","points":["Căn cứ xác định hàng trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Căn cứ xác định hàng thuộc danh mục máy móc, thiết bị, phương tiện, dụng cụ, vật tư chuyên dùng để thu gom, xử lý nước thải, rác thải, khí thải, quan trắc, sản xuất năng lượng tái tạo, xử lý ô nhiễm; và sản phẩm xuất khẩu từ tái chế, xử lý chất thải theo Bộ Tài nguyên và Môi trường.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_26":{"tldr":"Quy định miễn thuế nhập khẩu đối với máy móc, thiết bị, nguyên liệu, vật tư, linh kiện, bộ phận, phụ tùng nhập khẩu phục vụ hoạt động in, đúc tiền thuộc Danh mục do Thống đốc Ngân hàng Nhà nước Việt Nam ban hành.","points":["Hàng hóa miễn thuế phải do các tổ chức được Ngân hàng Nhà nước chỉ định nhập khẩu.","Căn cứ xác định hàng phục vụ in, đúc tiền theo quy định của Ngân hàng Nhà nước Việt Nam.","Hồ sơ gồm hồ sơ hải quan và văn bản của Ngân hàng Nhà nước cho phép tổ chức nhập khẩu (01 bản chụp có đóng dấu sao y bản chính).","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_27":{"tldr":"Quy định miễn thuế nhập khẩu đối với hàng hóa không nhằm mục đích thương mại, gồm hàng mẫu và ấn phẩm quảng cáo theo các điều kiện về trị giá, khối lượng.","points":["Hàng mẫu, ảnh/phim/mô hình thay thế hàng mẫu có trị giá hải quan không quá 50.000 đồng Việt Nam hoặc đã được xử lý để không thể mua bán, sử dụng, chỉ để làm mẫu.","Ấn phẩm quảng cáo thuộc Chương 49 (tờ rơi, catalogue, niên giám, áp phích du lịch...) cung cấp miễn phí được miễn thuế với điều kiện mỗi lô hàng chỉ gồm 01 loại ấn phẩm và tổng khối lượng không quá 01 kg; nếu nhiều loại thì mỗi loại chỉ một bản hoặc tổng khối lượng không quá 01 kg.","Hồ sơ, thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_28":{"tldr":"Quy định miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu để phục vụ đảm bảo an sinh xã hội, khắc phục hậu quả thiên tai, thảm họa, dịch bệnh và các trường hợp đặc biệt khác, cùng hồ sơ, thủ tục.","points":["Đối tượng gồm: hàng trong nước chưa sản xuất được nhập khẩu để sử dụng trực tiếp cho dự án thuộc chương trình an sinh xã hội của Chính phủ; hàng để khắc phục hậu quả thiên tai, thảm họa, dịch bệnh; và hàng xuất nhập khẩu trong trường hợp đặc biệt khác do Thủ tướng Chính phủ quyết định từng trường hợp.","Căn cứ xác định hàng trong nước chưa sản xuất được theo quy định của Bộ Kế hoạch và Đầu tư.","Hồ sơ đề nghị miễn thuế trước khi làm thủ tục hải quan gồm công văn đề nghị của UBND cấp tỉnh hoặc bộ hoặc cấp tương đương; danh mục hàng nhập khẩu (Mẫu số 04 Phụ lục VII); và quyết định công bố dịch bệnh (đối với khắc phục dịch bệnh).","Trên cơ sở công văn đề nghị, trong thời hạn 15 ngày Bộ Tài chính thẩm định và trình Thủ tướng Chính phủ quyết định kèm danh mục hàng đề nghị miễn thuế.","Hàng nhập khẩu trực tiếp phục vụ cứu trợ khẩn cấp được cơ quan hải quan giải quyết miễn thuế khi làm thủ tục hải quan, trên cơ sở hồ sơ gồm hồ sơ hải quan (Điều 24 Luật hải quan), văn bản xác nhận của UBND cấp tỉnh/bộ/cấp tương đương, danh mục hàng và quyết định công bố dịch bệnh (nếu có)."]},"nd134_29":{"tldr":"Quy định miễn thuế đối với hàng hóa xuất khẩu, nhập khẩu theo điều ước quốc tế; hàng hóa có trị giá tối thiểu; và hàng hóa gửi qua dịch vụ chuyển phát nhanh.","points":["Hàng xuất khẩu, nhập khẩu theo điều ước quốc tế mà Việt Nam là thành viên được miễn thuế; nếu điều ước không quy định cụ thể chủng loại, định lượng thì Bộ Tài chính thống nhất Bộ Ngoại giao báo cáo Thủ tướng Chính phủ quyết định.","Hàng nhập khẩu gửi qua chuyển phát nhanh có trị giá hải quan từ 1.000.000 đồng trở xuống hoặc số tiền thuế phải nộp dưới 100.000 đồng được miễn thuế; nếu vượt thì phải nộp thuế cho toàn bộ lô hàng.","Hàng có tổng trị giá hải quan dưới 500.000 đồng hoặc tổng tiền thuế phải nộp dưới 50.000 đồng cho một lần xuất/nhập khẩu được miễn thuế; không áp dụng với quà biếu, tặng, hàng cư dân biên giới và hàng gửi qua chuyển phát nhanh.","Hàng theo điều ước quốc tế phải nộp thêm điều ước quốc tế (01 bản chụp xuất trình bản chính, lần đầu) và hợp đồng ủy thác/cung cấp theo văn bản trúng thầu hoặc chỉ định thầu.","Thủ tục miễn thuế thực hiện theo Điều 31 Nghị định này."]},"nd134_30":{"tldr":"Quy định việc thông báo Danh mục hàng hóa miễn thuế dự kiến nhập khẩu (Danh mục miễn thuế) đối với các trường hợp phải thông báo, gồm nguyên tắc xây dựng, hồ sơ, thời gian, địa điểm thông báo và trách nhiệm của cơ quan hải quan, chủ dự án.","points":["Áp dụng cho các trường hợp miễn thuế tại Điều 14, 15, 16, 17, 18, 23, 24 Nghị định này.","Chủ dự án (chủ cơ sở sản xuất, đóng tàu, tổ chức/cá nhân hoạt động dầu khí) là người thông báo Danh mục miễn thuế; Danh mục được xây dựng một lần cho dự án hoặc theo từng giai đoạn, hạng mục, tổ hợp, dây chuyền.","Hồ sơ gồm công văn thông báo (Mẫu số 05), Danh mục miễn thuế (Mẫu số 06, Phiếu theo dõi trừ lùi Mẫu số 07 nếu bằng giấy), giấy chứng nhận đăng ký đầu tư/doanh nghiệp và các tài liệu kèm theo từng trường hợp.","Chủ dự án gửi hồ sơ trước khi đăng ký tờ khai hàng nhập khẩu miễn thuế đầu tiên; nơi tiếp nhận là Cục Hải quan nơi thực hiện dự án/đóng trụ sở chính/quản lý tập trung/lắp đặt tổ hợp, dây chuyền.","Cơ quan hải quan trong thời hạn tối đa 03 ngày làm việc thông báo đã tiếp nhận, yêu cầu bổ sung hồ sơ hoặc thông báo hàng không thuộc đối tượng miễn thuế; kiểm tra việc sử dụng hàng miễn thuế theo quản lý rủi ro.","Chậm nhất ngày thứ 90 kể từ ngày kết thúc năm tài chính, chủ dự án thông báo việc sử dụng hàng miễn thuế trong năm cho cơ quan hải quan nơi tiếp nhận Danh mục."]},"nd134_31":{"tldr":"Quy định hồ sơ, thủ tục miễn thuế khi làm thủ tục hải quan; người nộp thuế tự xác định và khai số tiền thuế được miễn, chịu trách nhiệm trước pháp luật.","points":["Ngoài hồ sơ hải quan, tùy trường hợp nộp thêm: hợp đồng ủy thác; hợp đồng cung cấp theo văn bản trúng thầu/chỉ định thầu; hợp đồng cung cấp cho hoạt động dầu khí; hợp đồng cho thuê tài chính; chứng từ chuyển nhượng hàng miễn thuế; văn bản xác nhận của Bộ Khoa học và Công nghệ; Danh mục miễn thuế và Phiếu theo dõi trừ lùi (nếu thông báo bằng giấy).","Người nộp thuế tự xác định, khai hàng hóa và số tiền thuế được miễn trên tờ khai; cơ quan hải quan đối chiếu để thực hiện miễn thuế; nếu không thuộc đối tượng miễn thuế thì thu thuế và xử phạt (nếu có).","Hệ thống xử lý dữ liệu điện tử tự động trừ lùi số lượng hàng; trường hợp nhập khẩu theo tổ hợp, dây chuyền làm nhiều chuyến, trong 15 ngày kể từ khi kết thúc nhập khẩu lô cuối phải tổng hợp tờ khai và quyết toán với cơ quan hải quan.","Hàng vượt định mức miễn thuế của tổ chức (khoản 2 Điều 7, khoản 2 Điều 8): nộp hồ sơ đến Tổng cục Hải quan chậm nhất 15 ngày làm việc trước khi làm thủ tục hải quan; bổ sung hồ sơ trong tối đa 05 ngày làm việc; Bộ Tài chính ban hành quyết định miễn thuế hoặc thông báo không miễn thuế trong chậm nhất 15 ngày làm việc kể từ ngày nhận đủ hồ sơ."]},"nd134_32":{"tldr":"Quy định giảm thuế xuất khẩu, thuế nhập khẩu đối với hàng hóa đang chịu sự giám sát của cơ quan hải quan bị hư hỏng, mất mát do nguyên nhân khách quan, cùng hồ sơ, thủ tục, thẩm quyền giảm thuế.","points":["Hồ sơ gồm công văn đề nghị giảm thuế (Mẫu số 08); hợp đồng bảo hiểm/thông báo bồi thường (nếu có); biên bản xác nhận nguyên nhân thiệt hại của cơ quan chức năng; và giấy chứng nhận giám định về số lượng mất mát hoặc tỷ lệ tổn thất.","Biên bản/văn bản xác nhận nguyên nhân thiệt hại và giấy chứng nhận giám định phải được lập trong thời hạn 30 ngày kể từ ngày xảy ra thiệt hại/thiên tai, hỏa hoạn, tai nạn bất ngờ.","Người nộp thuế nộp hồ sơ cho Chi cục Hải quan tại thời điểm làm thủ tục hải quan hoặc chậm nhất 30 ngày làm việc kể từ ngày có văn bản xác nhận mức độ hư hỏng, mất mát, thiệt hại.","Nộp hồ sơ sau thời điểm làm thủ tục hải quan: Cục Hải quan gửi Tổng cục Hải quan trình Bộ Tài chính quyết định trong thời hạn 15 ngày kể từ ngày nhận đủ hồ sơ; hồ sơ chưa đầy đủ thì thông báo trong 03 ngày làm việc.","Trường hợp cần kiểm tra thực tế hàng đã qua khu vực giám sát thì ban hành quyết định kiểm tra sau thông quan và thực hiện trong thời hạn tối đa 40 ngày kể từ ngày nhận đủ hồ sơ."]},"nd134_33":{"tldr":"Quy định hoàn thuế xuất khẩu đối với hàng hóa đã xuất khẩu nhưng phải tái nhập, không phải nộp thuế nhập khẩu, cùng hồ sơ, thủ tục hoàn thuế.","points":["Đối tượng gồm hàng đã xuất khẩu phải nhập khẩu trở lại Việt Nam; và hàng gửi cho tổ chức, cá nhân ở nước ngoài qua bưu chính, chuyển phát nhanh quốc tế đã nộp thuế nhưng không giao được, phải tái nhập.","Người nộp thuế kê khai chính xác trên tờ khai về hàng tái nhập là hàng xuất khẩu trước đây; cơ quan hải quan kiểm tra nội dung khai báo.","Hồ sơ gồm công văn yêu cầu hoàn thuế (Mẫu số 09); chứng từ thanh toán; hợp đồng và hóa đơn xuất nhập khẩu; và văn bản thông báo/thỏa thuận nhận lại hàng (đối với hàng khách nước ngoài từ chối hoặc không có người nhận).","Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế theo pháp luật quản lý thuế; trường hợp được hoàn thuế nhưng chưa nộp hoặc không phải nộp thuế (Điều 19 Luật) thì thực hiện như hồ sơ, thủ tục hoàn thuế."]},"nd134_34":{"tldr":"Quy định hoàn thuế nhập khẩu đối với hàng hóa nhập khẩu nhưng phải tái xuất, không phải nộp thuế xuất khẩu, cùng hồ sơ, thủ tục hoàn thuế.","points":["Đối tượng gồm hàng nhập khẩu phải tái xuất ra nước ngoài/xuất vào khu phi thuế quan; hàng gửi qua bưu chính, chuyển phát nhanh quốc tế đã nộp thuế nhưng không giao được phải tái xuất; hàng đã nộp thuế bán cho phương tiện hãng nước ngoài/Việt Nam trên tuyến đường quốc tế; hàng còn lưu kho, lưu bãi tại cửa khẩu đang chịu giám sát hải quan được tái xuất.","Việc tái xuất phải do người nhập khẩu ban đầu hoặc người được ủy quyền, ủy thác xuất khẩu thực hiện.","Người nộp thuế kê khai chính xác trên tờ khai về hàng tái xuất là hàng nhập khẩu trước đây; cơ quan hải quan kiểm tra nội dung khai báo.","Hồ sơ gồm công văn yêu cầu hoàn thuế (Mẫu số 09); hóa đơn GTGT/bán hàng; chứng từ thanh toán; hợp đồng và hóa đơn xuất nhập khẩu; và các văn bản kèm theo từng trường hợp.","Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế theo pháp luật quản lý thuế; trường hợp chưa nộp hoặc không phải nộp thuế (Điều 19 Luật) thì thực hiện như hồ sơ, thủ tục hoàn thuế."]},"nd134_35":{"tldr":"Quy định hoàn thuế đối với máy móc, thiết bị, dụng cụ, phương tiện vận chuyển của tổ chức, cá nhân được phép tạm nhập, tái xuất, dựa trên tỷ lệ trị giá sử dụng còn lại của hàng hóa.","points":["Người nộp thuế tự kê khai, tự chịu trách nhiệm về tỷ lệ mức khấu hao, phân bổ trị giá hàng trong thời gian sử dụng và lưu lại tại Việt Nam theo pháp luật kế toán để làm cơ sở tính tỷ lệ trị giá sử dụng còn lại.","Người nộp thuế kê khai chính xác trên tờ khai về hàng tái xuất là hàng nhập khẩu trước đây; cơ quan hải quan kiểm tra nội dung khai báo.","Hồ sơ gồm công văn yêu cầu hoàn thuế (Mẫu số 09); chứng từ thanh toán; hợp đồng và hóa đơn xuất nhập khẩu.","Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế theo pháp luật quản lý thuế; trường hợp chưa nộp hoặc không phải nộp thuế (Điều 19 Luật) thì thực hiện như hồ sơ, thủ tục hoàn thuế."]},"nd134_36":{"tldr":"Quy định hoàn thuế nhập khẩu đối với hàng hóa nhập khẩu để sản xuất, kinh doanh đã đưa vào sản xuất hàng xuất khẩu và đã xuất khẩu sản phẩm ra nước ngoài hoặc vào khu phi thuế quan.","points":["Hàng được hoàn thuế gồm nguyên liệu, vật tư, linh kiện, bán thành phẩm cấu thành/tham gia trực tiếp sản xuất hàng xuất khẩu; sản phẩm hoàn chỉnh để gắn, lắp ráp hoặc đóng chung; linh kiện, phụ tùng bảo hành.","Cơ sở hoàn thuế: có cơ sở sản xuất trên lãnh thổ Việt Nam, có quyền sở hữu/sử dụng máy móc, thiết bị phù hợp; trị giá hoặc lượng được hoàn thuế là phần thực tế dùng sản xuất sản phẩm thực tế xuất khẩu; sản phẩm làm thủ tục theo loại hình sản xuất xuất khẩu.","Trường hợp một loại nguyên liệu thu được nhiều loại sản phẩm và chỉ xuất khẩu một loại thì hoàn thuế tương ứng phần cấu thành sản phẩm đã xuất khẩu, xác định bằng phương pháp phân bổ theo công thức trên tổng trị giá các sản phẩm thu được.","Hồ sơ gồm công văn yêu cầu hoàn thuế (Mẫu số 09); chứng từ thanh toán; hợp đồng và hóa đơn xuất nhập khẩu; báo cáo tính thuế nguyên liệu, vật tư, linh kiện (Mẫu số 10); và tài liệu chứng minh có cơ sở sản xuất, quyền sở hữu/sử dụng máy móc, thiết bị.","Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế theo pháp luật quản lý thuế; trường hợp chưa nộp hoặc không phải nộp thuế (Điều 19 Luật) thì thực hiện như hồ sơ, thủ tục hoàn thuế."]},"nd134_37":{"tldr":"Quy định hoàn thuế đối với trường hợp người nộp thuế đã nộp thuế nhưng không có hàng hóa nhập khẩu, xuất khẩu hoặc nhập khẩu, xuất khẩu ít hơn so với hàng đã nộp thuế; không hoàn thuế đối với trường hợp số tiền thuế tối thiểu.","points":["Được hoàn thuế nhập khẩu hoặc thuế xuất khẩu đã nộp tương ứng với hàng hóa thực tế không xuất/nhập khẩu hoặc xuất/nhập khẩu ít hơn.","Các trường hợp được hoàn thuế tại Điều 33, 34, 35, 36, 37 có số tiền thuế được hoàn dưới 50.000 đồng Việt Nam theo tờ khai hải quan thì không được hoàn thuế; cơ quan hải quan không tiếp nhận hồ sơ và không hoàn trả số tiền này.","Hồ sơ hoàn thuế: công văn yêu cầu hoàn thuế (Mẫu số 09), 01 bản chính.","Thủ tục nộp, tiếp nhận, xử lý hồ sơ hoàn thuế theo pháp luật quản lý thuế; trường hợp chưa nộp hoặc không phải nộp thuế (Điều 19 Luật) thì thực hiện hồ sơ, thủ tục không thu thuế như hồ sơ, thủ tục hoàn thuế."]},"nd134_38":{"tldr":"Nghị định có hiệu lực thi hành từ ngày 01 tháng 9 năm 2016 và thay thế Nghị định số 87/2010/NĐ-CP ngày 13 tháng 8 năm 2010.","points":["Bãi bỏ quy định về miễn thuế xuất khẩu, thuế nhập khẩu tại các Quyết định số 31/2015/QĐ-TTg ngày 04/8/2015, số 52/2015/QĐ-TTg ngày 20/10/2015, số 53/2013/QĐ-TTg ngày 13/9/2013 và Điều 7 Quyết định số 219/2009/QĐ-TTg ngày 01/10/2009 của Thủ tướng Chính phủ."]},"nd134_39":{"tldr":"Quy định điều khoản chuyển tiếp đối với dự án đang được hưởng ưu đãi về thuế xuất khẩu, thuế nhập khẩu.","points":["Dự án đang hưởng mức ưu đãi cao hơn mức quy định tại Luật thuế xuất khẩu, thuế nhập khẩu được tiếp tục thực hiện theo mức ưu đãi đó cho thời gian hưởng ưu đãi còn lại.","Dự án đang hưởng mức ưu đãi thấp hơn hoặc chưa được hưởng ưu đãi theo Luật thuế xuất khẩu, thuế nhập khẩu năm 2016 thì được hưởng mức ưu đãi theo Luật này cho thời gian hưởng ưu đãi còn lại."]},"nd134_40":{"tldr":"Quy định trách nhiệm thi hành của các bộ, ngành trong việc ban hành danh mục hoặc tiêu chí xác định hàng hóa làm căn cứ miễn thuế, và trách nhiệm chung của các tổ chức, cá nhân liên quan.","points":["Bộ Kế hoạch và Đầu tư ban hành danh mục hàng trong nước đã sản xuất được làm căn cứ xác định hàng trong nước chưa sản xuất được (các Điều 14, 15, 16, 17, 18, 19, 20, 21, 23, 24, 25 và 28).","Bộ Khoa học và Công nghệ ban hành danh mục/tiêu chí xác định phương tiện vận tải chuyên dùng (dầu khí, dây chuyền sản xuất, đóng tàu) và tài liệu, máy móc, thiết bị, vật tư chuyên dùng cho nghiên cứu khoa học, đổi mới công nghệ.","Bộ Giáo dục và Đào tạo, Bộ Nông nghiệp và Phát triển nông thôn, Bộ Thông tin và Truyền thông, Bộ Tài nguyên và Môi trường ban hành danh mục/tiêu chí theo lĩnh vực tương ứng.","Bộ Công an, Bộ Quốc phòng thông báo danh mục hàng chuyên dùng nhập khẩu hàng năm phục vụ an ninh, quốc phòng được Thủ tướng Chính phủ phê duyệt hoặc theo ủy quyền; Ngân hàng Nhà nước Việt Nam ban hành danh mục hàng phục vụ in, đúc tiền và chỉ định tổ chức nhập khẩu; Bộ Ngoại giao thông báo với Bộ Tài chính nội dung ưu đãi thuế trong điều ước quốc tế, thỏa thuận với tổ chức phi chính phủ nước ngoài."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
