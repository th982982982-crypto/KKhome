"","","",""],["","","","","","","","","","",""],["","","","","","","","","","",""],["","","","","","","","","","",""]]},{"k":"p","t":"ĐẠI DIỆN THEO PHÁP LUẬTCỦA DOANH NGHIỆP(Ký tên và đóng dấu)"},{"k":"p","t":"Phụ lục IV"},{"k":"p","t":"HOÀN THUẾ ĐỐI VỚI HÀNG HÓA MUA TẠI VIỆT NAM MANG THEO KHI XUẤT CẢNH CỦA NGƯỜI NƯỚC NGOÀI, NGƯỜI VIỆT NAM ĐỊNH CƯ Ở NƯỚC NGOÀI MANG HỘ CHIẾU HOẶC GIẤY TỜ CÓ GIÁ TRỊ ĐI LẠI QUỐC TẾ"},{"k":"p","t":"(Kèm theo Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ)"},{"k":"p","t":"_________________"},{"k":"p","t":"Việc hoàn thuế đối với trường hợp người nước ngoài, người Việt Nam định cư ở nước ngoài mang hộ chiếu hoặc giấy tờ có giá trị đi lại quốc tế mua hàng hóa tại Việt Nam và mang theo khi xuất cảnh quy định tại Điều 33 Nghị định này được thực hiện như sau:"},{"k":"p","t":"1. Hàng hóa được hoàn thuế giá trị gia tăng quy định tại Phụ lục này là hàng hóa đáp ứng quy định sau:"},{"k":"p","t":"a) Hàng hóa không thuộc Danh mục hàng hóa cấm xuất khẩu; Danh mục hàng hóa xuất khẩu theo giấy phép của Bộ Công Thương hoặc Danh mục hàng hóa xuất khẩu thuộc diện quản lý chuyên ngành quy định tại Nghị định số 69/2018/NĐ-CP ngày 15 tháng 5 năm 2018 của Chính phủ quy định chi tiết một số điều của Luật Quản lý ngoại thương và các văn bản hướng dẫn Nghị định này."},{"k":"p","t":"b) Hàng hóa không thuộc đối tượng cấm đưa lên tàu bay quy định tại Điều 12 Luật Hàng không dân dụng Việt Nam ngày 29 tháng 6 năm 2006 và các văn bản hướng dẫn thực hiện."},{"k":"p","t":"c) Hàng hóa không thuộc các mặt hàng được hoàn thuế giá trị gia tăng của người nước ngoài, người Việt Nam định cư ở nước ngoài theo quy định tại Thông tư số 08/2003/TT-BTC ngày 15 tháng 01 năm 2003 của Bộ trưởng Bộ Tài chính hướng dẫn hoàn thuế giá trị gia tăng đối với cơ quan đại diện ngoại giao, cơ quan lãnh sự và cơ quan đại diện của tổ chức quốc tế tại Việt Nam."},{"k":"p","t":"d) Hàng hóa mua tại doanh nghiệp bán hàng hoàn thuế giá trị gia tăng, chưa qua sử dụng, còn nguyên đai, nguyên kiện khi mua hàng, có hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế được lập trong thời gian tối đa 60 ngày tính đến ngày người nước ngoài, người Việt Nam định cư ở nước ngoài xuất cảnh."},{"k":"p","t":"đ) Trị giá hàng hóa ghi trên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế mua tại 01 cửa hàng trong 01 ngày (kể cả cộng gộp nhiều hóa đơn mua hàng trong cùng 01 ngày tại 01 cửa hàng) tối thiểu từ 02 (hai) triệu đồng trở lên."},{"k":"p","t":"2. Số tiền được hoàn thuế, đồng tiền hoàn thuế giá trị gia tăng"},{"k":"p","t":"a) Số tiền thuế giá trị gia tăng người nước ngoài, người Việt Nam định cư ở nước ngoài được hoàn bằng 85% (tám mươi lăm phần trăm) trên tổng số tiền thuế giá trị gia tăng của số hàng hóa đủ điều kiện được hoàn thuế giá trị gia tăng do người nước ngoài, người Việt Nam định cư ở nước ngoài mang theo khi xuất cảnh qua cửa khẩu hoàn thuế."},{"k":"p","t":"Ngân hàng thương mại được hưởng bằng 15% (mười lăm phần trăm) trên tổng số tiền thuế giá trị gia tăng của số hàng hóa đủ điều kiện được hoàn thuế giá trị gia tăng do người nước ngoài, người Việt Nam định cư ở nước ngoài mang theo khi xuất cảnh qua cửa khẩu hoàn thuế."},{"k":"p","t":"b) Đồng tiền hoàn thuế là đồng Việt Nam. Trường hợp người nước ngoài, người Việt Nam định cư ở nước ngoài có yêu cầu được chuyển số tiền hoàn thuế từ đồng Việt Nam sang ngoại tệ tự do chuyển đổi thì ngân hàng thương mại thực hiện bán ngoại tệ cho người nước ngoài, người Việt Nam định cư ở nước ngoài theo quy định của pháp luật."},{"k":"p","t":"Tỷ giá chuyển đổi là tỷ giá do ngân hàng thương mại niêm yết tại thời điểm chuyển đổi và phù hợp với quy định của Ngân hàng Nhà nước Việt Nam."},{"k":"p","t":"3. Thời điểm hoàn thuế giá trị gia tăng"},{"k":"p","t":"a) Thời điểm hoàn thuế giá trị gia tăng cho người nước ngoài, người Việt Nam định cư ở nước ngoài xuất cảnh được thực hiện ngay sau khi người nước ngoài, người Việt Nam định cư ở nước ngoài hoàn thành thủ tục kiểm tra hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế tại quầy hoàn thuế của ngân hàng thương mại làm đại lý hoàn thuế và trước giờ lên tàu bay của chuyến bay hoặc tàu biển của chuyến tàu người nước ngoài, người Việt Nam định cư ở nước ngoài xuất cảnh."},{"k":"p","t":"b) Cơ quan hải quan, ngân hàng thương mại có trách nhiệm bố trí cán bộ, công chức làm việc trong tất cả các ngày kể cả ngày lễ, chủ nhật và ngoài giờ làm việc hành chính để thực hiện hoàn trả tiền thuế giá trị gia tăng cho người nước ngoài, người Việt Nam định cư ở nước ngoài theo quy định tại Nghị định này."},{"k":"p","t":"4. Hồ sơ, thủ tục hoàn thuế giá trị gia tăng cho người nước ngoài, người Việt Nam định cư ở nước ngoài khi xuất cảnh"},{"k":"p","t":"a) Người nước ngoài, người Việt Nam định cư ở nước ngoài xuất trình cho cơ quan hải quan tại quầy kiểm tra hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế, hàng hóa, các giấy tờ sau đây:"},{"k":"p","t":"a1) Hộ chiếu hoặc giấy tờ nhập xuất cảnh."},{"k":"p","t":"a2) Hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế theo quy định của Bộ Tài chính."},{"k":"p","t":"a3) Hàng hóa."},{"k":"p","t":"b) Cơ quan hải quan kiểm tra thực tế hàng hóa tại quầy kiểm tra hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế, hàng hóa. Việc kiểm tra thực hiện như sau:"},{"k":"p","t":"b1) Đối chiếu xác định từng nội dung khớp đúng giữa thông tin ghi trên hộ chiếu hoặc giấy tờ nhập xuất cảnh với thông tin trên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế do người nước ngoài, người Việt Nam định cư ở nước ngoài xuất trình; thông tin hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế trên Hệ thống quản lý hoàn thuế giá trị gia tăng cho người nước ngoài (Hệ thống) do doanh nghiệp bán hàng gửi, Hệ thống hóa đơn điện tử của cơ quan thuế và các quy định về hàng hóa được hoàn thuế quy định tại điểm 1 Phụ lục này."},{"k":"p","t":"b2) Kiểm tra thực tế hàng hóa đối với hàng hóa phải kiểm tra thực tế theo nguyên tắc quản lý rủi ro."},{"k":"p","t":"Trường hợp hàng hóa xuất trình không phù hợp với mô tả hàng hóa tại hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế hoặc hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế ghi không đầy đủ thông tin theo quy định hoặc hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế không có trên Hệ thống, Hệ thống hóa đơn điện tử của cơ quan thuế (trừ trường hợp Hệ thống xảy ra sự cố) thì cơ quan hải quan trao đổi, xác minh với doanh nghiệp bán hàng. Trường hợp thông tin trao đổi với doanh nghiệp bán hàng không khớp đúng với thông tin hàng hóa, hóa đơn và hộ chiếu thì cơ quan hải quan từ chối hoàn thuế."},{"k":"p","t":"b3) Ghi kết quả kiểm tra, đóng dấu đồng ý hoàn thuế hay từ chối hoàn thuế. Trường hợp cơ quan hải quan đồng ý hoàn thuế thì xác định mặt hàng, tính số tiền thuế giá trị gia tăng người nước ngoài, người Việt Nam định cư ở nước ngoài thực tế được hoàn theo quy định tại điểm 2 Phụ lục này."},{"k":"p","t":"b4) Cập nhật thông tin hoàn thuế giá trị gia tăng cho người nước ngoài, người Việt Nam định cư ở nước ngoài vào Hệ thống theo hướng dẫn của Bộ Tài chính, ký số."},{"k":"p","t":"Trường hợp Hệ thống xảy ra sự cố, cơ quan hải quan ký, đóng dấu xác nhận đồng ý hoàn thuế hay từ chối hoàn thuế vào hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế."},{"k":"p","t":"5. Hoàn trả tiền thuế cho người nước ngoài, người Việt Nam định cư ở nước ngoài"},{"k":"p","t":"a) Sau khi hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế và hàng hóa đã được cơ quan hải quan kiểm tra, người nước ngoài, người Việt Nam định cư ở nước ngoài có trách nhiệm xuất trình cho ngân hàng thương mại tại quầy hoàn thuế:"},{"k":"p","t":"a1) Thẻ lên tàu bay, tàu biển."},{"k":"p","t":"a2) Hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế đã được cơ quan hải quan kiểm tra xác định mặt hàng, tính số tiền hoàn thuế giá trị gia tăng người nước ngoài, người Việt Nam định cư ở nước ngoài được hoàn và đóng dấu xác nhận (bản chính)."},{"k":"p","t":"b) Ngân hàng thương mại thực hiện:"},{"k":"p","t":"b1) Kiểm tra thẻ lên tàu bay, tàu biển; hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế; kiểm tra trên Hệ thống thông tin về người xuất cảnh, hàng hóa, xác nhận đồng ý hoàn thuế của cơ quan hải quan và số thuế được hoàn."},{"k":"p","t":"Trường hợp thông tin về tên hành khách trên thẻ lên tàu bay, tàu biển không đúng với thông tin trên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế đã được cơ quan hải quan kiểm tra, xác nhận thì ngân hàng thương mại trao đổi, xác minh với cơ quan hải quan. Trường hợp thông tin trao đổi với cơ quan hải quan không khớp đúng với thông tin trên thẻ lên tàu bay, tàu biển thì ngân hàng thương mại từ chối hoàn thuế và thông báo trên Hệ thống để cơ quan hải quan biết."},{"k":"p","t":"b2) Cập nhật thông tin số hiệu, ngày tháng chuyến bay, chuyến tàu của người nước ngoài, người Việt Nam định cư ở nước ngoài và các thông tin khác theo hướng dẫn của Bộ Tài chính vào Hệ thống hoặc trên phần mềm của ngân hàng thương mại kết nối với Hệ thống, ký số và truyền cho cơ quan hải quan."},{"k":"p","t":"b3) Trả tiền hoàn thuế cho người nước ngoài, người Việt Nam định cư ở nước ngoài bằng tiền mặt hoặc qua thẻ quốc tế của người nước ngoài, người Việt Nam định cư ở nước ngoài theo số tiền thuế giá trị gia tăng người nước ngoài, người Việt Nam định cư ở nước ngoài thực tế được hoàn do cơ quan hải quan tính ghi trên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế."},{"k":"p","t":"Trường hợp trả tiền hoàn thuế cho người nước ngoài, người Việt Nam định cư ở nước ngoài qua thẻ quốc tế, ngân hàng đối chiếu thông tin (tên, số thẻ) người nước ngoài, người Việt Nam định cư ở nước ngoài đăng ký nhận tiền hoàn thuế và thẻ thực tế xuất trình để thực hiện việc hoàn thuế."},{"k":"p","t":"Trường hợp Hệ thống xảy ra sự cố, ngân hàng thương mại căn cứ hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế giấy và xác nhận của cơ quan hải quan theo quy định tại tiết b4 điểm 4 Phụ lục này, thực hiện hoàn trả tiền thuế cho người nước ngoài, người Việt Nam định cư ở nước ngoài theo quy định tại điểm 2 Phụ lục này, đồng thời ký tên, đóng dấu xác nhận đã thanh toán tiền hoàn thuế cho người nước ngoài, người Việt Nam định cư ở nước ngoài lên hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế."},{"k":"p","t":"Ngay sau khi Hệ thống hoạt động bình thường, ngân hàng thương mại cập nhật các thông tin hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế đã hoàn thuế trên Hệ thống hoặc phần mềm của ngân hàng thương mại kết nối với Hệ thống, ký số và truyền cho cơ quan hải quan."},{"k":"p","t":"b4) Trả lại người nước ngoài, người Việt Nam định cư ở nước ngoài thẻ lên tàu bay, tàu biển."},{"k":"p","t":"b5) Lưu trữ hồ sơ hoàn thuế đối với chứng từ điện tử và chứng từ giấy theo quy định của pháp luật."},{"k":"p","t":"6. Hồ sơ, thủ tục hoàn thuế giá trị gia tăng cho ngân hàng thương mại là đại lý hoàn thuế giá trị gia tăng cho khách xuất cảnh thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"Phụ lục V"},{"k":"p","t":"XÁC ĐỊNH TỶ TRỌNG TRỊ GIÁ TÀI NGUYÊN, KHOÁNG SẢN VÀ CHI PHÍ NĂNG LƯỢNG TRÊN GIÁ THÀNH SẢN PHẨM"},{"k":"p","t":"(Kèm theo Nghị định số 181/2025/NĐ-CP ngày 01 tháng 7 năm 2025 của Chính phủ)"},{"k":"p","t":"_____________________"},{"k":"p","t":"Sản phẩm xuất khẩu là hàng hóa được chế biến trực tiếp từ nguyên liệu chính là tài nguyên, khoáng sản có tổng trị giá tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51% giá thành sản xuất sản phẩm trở lên."},{"k":"p","t":"1. Tài nguyên, khoáng sản là tài nguyên, khoáng sản có nguồn gốc trong nước gồm: Khoáng sản kim loại; khoáng sản không kim loại; dầu thô; khí thiên nhiên; khí than."},{"k":"p","t":"2. Việc xác định tỷ trọng trị giá tài nguyên, khoáng sản và chi phí năng lượng trên giá thành được thực hiện theo công thức:"},{"k":"tbl","rows":[["Tỷ trọng trị giá tài nguyên, khoáng sản và chi phí năng lượng trên giá thành sản xuất sản phẩm","=","Trị giá tài nguyên, khoáng sản + chi phí năng lượng","x 100%"],["","","Tổng giá thành sản xuất sản phẩm",""]]},{"k":"p","t":"Trong đó:"},{"k":"p","t":"Trị giá tài nguyên, khoáng sản đưa vào chế biến được xác định như sau: Đối với tài nguyên, khoáng sản trực tiếp khai thác là chi phí trực tiếp, gián tiếp khai thác ra tài nguyên, khoáng sản không bao gồm chi phí vận chuyển tài nguyên, khoáng sản từ nơi khai thác đến nơi chế biến; đối với tài nguyên, khoáng sản mua để chế biến tiếp là giá thực tế mua không bao gồm chi phí vận chuyển tài nguyên, khoáng sản từ nơi mua đến nơi chế biến."},{"k":"p","t":"Chi phí năng lượng gồm: nhiên liệu, điện năng, nhiệt năng."},{"k":"p","t":"Trị giá tài nguyên, khoáng sản và chi phí năng lượng được xác định theo giá trị ghi sổ kế toán phù hợp với Bảng tổng hợp tính giá thành sản phẩm."},{"k":"p","t":"Giá thành sản xuất sản phẩm bao gồm: Chi phí nguyên vật liệu trực tiếp, chi phí nhân công trực tiếp và chi phí sản xuất chung. Các chi phí gián tiếp như chi phí bán hàng, chi phí quản lý, chi phí tài chính và chi phí khác không được tính vào giá thành sản xuất sản phẩm."},{"k":"p","t":"Tỷ lệ trị giá tài nguyên, khoáng sản và chi phí năng lượng trên giá thành sản xuất sản phẩm được xác định căn cứ vào quyết toán năm trước và tỷ lệ này được áp dụng ổn định trong năm xuất khẩu. Trường hợp năm đầu tiên xuất khẩu sản phẩm thì tỷ lệ trị giá tài nguyên, khoáng sản và chi phí năng lượng trên giá thành sản xuất sản phẩm được xác định theo phương án đầu tư và tỷ lệ này được áp dụng ổn định trong năm xuất khẩu; trường hợp không có phương án đầu tư thì tỷ lệ trị giá tài nguyên, khoáng sản và chi phí năng lượng trên giá thành sản xuất sản phẩm được xác định theo thực tế của sản phẩm xuất khẩu."},{"k":"p","t":"3. Trường hợp doanh nghiệp không xuất khẩu mà bán cho doanh nghiệp khác để xuất khẩu thì doanh nghiệp mua hàng hóa này để xuất khẩu phải thực hiện kê khai thuế giá trị gia tăng như sản phẩm cùng loại do doanh nghiệp sản xuất trực tiếp xuất khẩu."}]}],"forms":[{"code":"PL1","title":"TÀI NGUYÊN, KHOÁNG SẢN KHAI THÁC CHƯA CHẾ BIẾN THÀNH SẢN PHẨM KHÁC","pl":"Phụ lục l","note":""},{"code":"PL2","title":"TÀI NGUYÊN, KHOÁNG SẢN KHAI THÁC ĐÃ CHẾ BIẾN THÀNH SẢN PHẨM KHÁC","pl":"Phụ lục II","note":""},{"code":"PL3","title":"BẢNG KÊ HÀNG HÓA BÁN CHO KHÁCH XUẤT CẢNH TẠI KHU VỰC CÁCH LY, CỬA HÀNG MIỄN THUẾ","pl":"Phụ lục III","note":""},{"code":"PL4","title":"Phụ lục IV","pl":"Phụ lục IV","note":""},{"code":"PL5","title":"XÁC ĐỊNH TỶ TRỌNG TRỊ GIÁ TÀI NGUYÊN, KHOÁNG SẢN VÀ CHI PHÍ NĂNG LƯỢNG TRÊN GIÁ THÀNH SẢN PHẨM","pl":"Phụ lục V","note":""}],"refs":{"nd181_1":[{"kind":"related","targetSlug":"luat-48","targetAnchor":"luat-48_1","label":"Luật 48/2024 — Luật Thuế GTGT (căn cứ)"},{"kind":"guidance","targetSlug":"tt69","targetAnchor":"tt69_1","label":"TT 69/2025 — Hồ sơ, thủ tục"}]},"details":{"nd181_1":[{"match":"Nghị định này quy định chi tiết về người nộp thuế tại khoản 1, 4 và khoản 5","title":"NĐ 181 Điều 1 — Phạm vi (chi tiết Luật GTGT)","summary":"NĐ 181 quy định chi tiết thi hành Luật Thuế GTGT 48/2024 (người nộp thuế, đối tượng không chịu thuế, giá tính thuế, khấu trừ, hoàn thuế). Hồ sơ thủ tục hướng dẫn thêm tại TT 69.","links":[{"targetSlug":"luat-48","targetAnchor":"luat-48_1","label":"Luật 48/2024 — Luật Thuế GTGT"},{"targetSlug":"tt69","targetAnchor":"tt69_1","label":"TT 69/2025 — Hướng dẫn chi tiết"}]}],"nd181_3":[{"match":"Người nộp thuế thực hiện theo quy định tại","title":"NĐ 181 Điều 3 — Người nộp thuế (chi tiết Luật 48 Điều 4)","summary":"Chi tiết hóa người nộp thuế GTGT, đặc biệt nhà cung cấp nước ngoài và sàn TMĐT/nền tảng số. Cụ thể hóa Điều 4 Luật 48.","links":[{"targetSlug":"luat-48","targetAnchor":"luat-48_4","label":"Luật 48 Điều 4 — Người nộp thuế"}]}],"nd181_4":[{"match":"Đối tượng không chịu thuế thực hiện theo quy định tại","title":"NĐ 181 Điều 4 — Đối tượng không chịu thuế (chi tiết Luật 48 Điều 5)","summary":"Chi tiết hóa danh mục đối tượng không chịu thuế GTGT. Hồ sơ, thủ tục xác định tại TT 69 Điều 3.","links":[{"targetSlug":"luat-48","targetAnchor":"luat-48_5","label":"Luật 48 Điều 5 — Đối tượng không chịu thuế"},{"targetSlug":"tt69","targetAnchor":"tt69_3","label":"TT 69 Điều 3 — Hồ sơ xác định"}]}],"nd181_5":[{"match":"Đối với hàng hóa, dịch vụ do cơ sở kinh doanh bán ra là giá bán chưa có thuế giá trị gia tăng","title":"NĐ 181 Điều 5 — Giá tính thuế (chi tiết Luật 48 Điều 7)","summary":"Chi tiết hóa giá tính thuế GTGT cho từng loại hàng hóa, dịch vụ. Cụ thể hóa Điều 7 Luật 48.","links":[{"targetSlug":"luat-48","targetAnchor":"luat-48_7","label":"Luật 48 Điều 7 — Giá tính thuế"}]}]},"summaries":{"nd181_1":{"tldr":"Nghị định quy định chi tiết một số nội dung của Luật Thuế giá trị gia tăng: người nộp thuế (khoản 1, 4, 5 Điều 4), đối tượng không chịu thuế (Điều 5), giá tính thuế (Điều 7), thời điểm xác định thuế (khoản 2 Điều 8), thuế suất (khoản 1, 2 Điều 9), phương pháp khấu trừ (Điều 11), phương pháp tính trực tiếp (khoản 1 Điều 12), khấu trừ thuế đầu vào (Điều 14) và hoàn thuế (Điều 15).","points":["Quy định chi tiết người nộp thuế tại khoản 1, 4, 5 Điều 4 Luật Thuế GTGT, kể cả nhà cung cấp nước ngoài cung cấp dịch vụ cho người mua là tổ chức kinh doanh tại Việt Nam áp dụng phương pháp khấu trừ.","Phạm vi gồm: đối tượng không chịu thuế (Điều 5), giá tính thuế (Điều 7), thời điểm xác định thuế (khoản 2 Điều 8), thuế suất (khoản 1, 2 Điều 9).","Phạm vi gồm: phương pháp khấu trừ thuế (Điều 11), phương pháp tính trực tiếp (khoản 1 Điều 12), khấu trừ thuế GTGT đầu vào (Điều 14), hoàn thuế GTGT (Điều 15) của Luật Thuế GTGT."]},"nd181_3":{"tldr":"Người nộp thuế thực hiện theo Điều 4 Luật Thuế GTGT. Nghị định quy định chi tiết hai nhóm: nhóm tại khoản 1 (các tổ chức, doanh nghiệp, hộ/cá nhân kinh doanh) và nhóm tại khoản 4, khoản 5 (nhà cung cấp nước ngoài, nhà quản lý nền tảng số, tổ chức quản lý sàn TMĐT).","points":["Khoản 1 Điều 4 gồm: tổ chức thành lập và đăng ký kinh doanh theo Luật Doanh nghiệp, Luật Hợp tác xã, pháp luật chuyên ngành; tổ chức kinh tế của các tổ chức chính trị, xã hội, đơn vị vũ trang; doanh nghiệp có vốn đầu tư nước ngoài và bên nước ngoài hợp tác kinh doanh.","Cũng gồm: doanh nghiệp chế xuất có hoạt động kinh doanh khác; hộ, cá nhân sản xuất kinh doanh; nhóm người kinh doanh độc lập; tổ chức, cá nhân khác có hoạt động sản xuất, kinh doanh.","Khoản 4, 5 Điều 4 gồm nhà cung cấp nước ngoài không có cơ sở thường trú có hoạt động TMĐT, kinh doanh trên nền tảng số; tổ chức là nhà quản lý nền tảng số nước ngoài và tổ chức kinh doanh tại Việt Nam (phương pháp khấu trừ) khấu trừ, nộp thay nghĩa vụ thuế của nhà cung cấp nước ngoài.","Tổ chức quản lý sàn giao dịch TMĐT, tổ chức quản lý nền tảng số có chức năng thanh toán (khoản 5 Điều 4) thực hiện theo Nghị định số 117/2025/NĐ-CP ngày 09/6/2025."]},"nd181_4":{"tldr":"Đối tượng không chịu thuế GTGT thực hiện theo Điều 5 Luật Thuế GTGT; Nghị định quy định chi tiết 16 nhóm trường hợp. Cơ sở kinh doanh hàng hóa, dịch vụ không chịu thuế không được khấu trừ, không được hoàn thuế GTGT đầu vào, trừ trường hợp áp dụng thuế suất 0%.","points":["Sản phẩm trồng trọt, rừng trồng, chăn nuôi, thủy sản nuôi trồng/đánh bắt chưa chế biến hoặc chỉ qua sơ chế thông thường của tổ chức, cá nhân tự sản xuất, đánh bắt bán ra và ở khâu nhập khẩu; nhà ở thuộc tài sản công bán cho người đang thuê; chuyển quyền sử dụng đất.","Dịch vụ tài chính, ngân hàng, chứng khoán, thương mại: cấp tín dụng; cho vay của người không phải tổ chức tín dụng; kinh doanh chứng khoán; chuyển nhượng vốn; bán nợ; kinh doanh ngoại tệ; sản phẩm phái sinh; bán tài sản bảo đảm khoản nợ.","Dịch vụ tang lễ; duy tu, sửa chữa, xây dựng bằng vốn đóng góp của nhân dân, viện trợ nhân đạo từ 50% trở lên cho di tích, công trình công cộng, nhà ở đối tượng chính sách; dạy học, dạy nghề; xuất bản, nhập khẩu, phát hành báo, sách, in tiền.","Vận chuyển hành khách công cộng bằng xe buýt, tàu điện, phương tiện thủy nội địa; máy móc, thiết bị, vật tư trong nước chưa sản xuất được nhập khẩu cho nghiên cứu khoa học, dầu khí, tạo tài sản cố định; hàng viện trợ nhân đạo, viện trợ không hoàn lại.","Hàng chuyển khẩu, quá cảnh, tạm nhập tái xuất, nguyên liệu nhập để sản xuất/gia công xuất khẩu, mua bán với khu phi thuế quan; chuyển giao công nghệ, quyền sở hữu trí tuệ, phần mềm; sản phẩm xuất khẩu là tài nguyên, khoáng sản theo Phụ lục I, II; hàng nhập khẩu là quà tặng, hành lý miễn thuế, hàng cứu trợ.","Cơ sở kinh doanh hàng hóa, dịch vụ không chịu thuế GTGT không được khấu trừ, không được hoàn thuế GTGT đầu vào, trừ trường hợp áp dụng thuế suất 0% tại khoản 1 Điều 9 Luật Thuế GTGT."]},"nd181_5":{"tldr":"Giá tính thuế hàng hóa, dịch vụ bán ra là giá bán chưa có thuế GTGT (đã có thuế TTĐB, thuế BVMT nếu có nhưng chưa có GTGT). Giá tính thuế hàng nhập khẩu là trị giá tính thuế nhập khẩu cộng thuế nhập khẩu, thuế nhập khẩu bổ sung, thuế TTĐB và thuế BVMT (nếu có).","points":["Hàng hóa, dịch vụ bán ra: giá bán chưa có thuế GTGT; với hàng chịu thuế TTĐB là giá đã có TTĐB chưa có GTGT; với hàng chịu thuế BVMT là giá đã có BVMT chưa có GTGT; chịu cả TTĐB và BVMT là giá đã có cả hai chưa có GTGT.","Hàng nhập khẩu: trị giá tính thuế nhập khẩu + thuế nhập khẩu + thuế nhập khẩu bổ sung (nếu có) + thuế TTĐB (nếu có) + thuế BVMT (nếu có).","Hàng nhập khẩu được miễn thuế nhập khẩu: giá tính thuế GTGT là trị giá tính thuế nhập khẩu; được giảm thuế nhập khẩu: trị giá tính thuế nhập khẩu cộng thuế nhập khẩu sau khi đã giảm.","Hàng nhập khẩu chịu thuế GTGT, được miễn thuế nhập khẩu nhưng sau đó thay đổi mục đích sử dụng phát sinh thuế nhập khẩu phải nộp thì phải nộp thuế GTGT bổ sung trên số thuế nhập khẩu phải nộp."]},"nd181_6":{"tldr":"Hàng hóa, dịch vụ dùng để trao đổi, tiêu dùng nội bộ, biếu, tặng, cho có giá tính thuế là giá của hàng hóa, dịch vụ cùng loại/tương đương tại thời điểm phát sinh; một số trường hợp tiêu dùng nội bộ không phải tính thuế. Hàng hóa, dịch vụ khuyến mại theo pháp luật thương mại có giá tính thuế bằng 0.","points":["Trao đổi, tiêu dùng nội bộ, biếu, tặng, cho: giá tính thuế là giá của hàng hóa, dịch vụ cùng loại hoặc tương đương tại thời điểm phát sinh.","Không phải tính thuế GTGT với: hàng hóa, dịch vụ dùng tiếp tục quá trình sản xuất, kinh doanh; hàng hóa, dịch vụ phục vụ sản xuất kinh doanh (kể cả tài sản cố định tự xây dựng, tự sản xuất); tài sản điều chuyển nội bộ, khi chia tách, sáp nhập, góp vốn (có hồ sơ kèm theo).","Hàng hóa, dịch vụ dùng khuyến mại theo pháp luật thương mại có giá tính thuế bằng 0; trừ khuyến mại bằng hình thức giảm giá thì giá tính thuế là giá đã giảm đã đăng ký/thông báo.","Các hình thức khuyến mại giá tính thuế bằng 0 hoặc không tính vào giá tính thuế hàng bán ra: hàng mẫu/dịch vụ mẫu dùng thử; tặng hàng/cung cấp dịch vụ không thu tiền; phiếu mua hàng; phiếu dự thi; chương trình may rủi; chương trình khách hàng thường xuyên.","Trường hợp khuyến mại không thực hiện theo quy định của pháp luật thương mại thì giá tính thuế xác định như hàng biếu, tặng, cho tại khoản 1 Điều này."]},"nd181_7":{"tldr":"Giá tính thuế đối với cho thuê tài sản là số tiền cho thuê chưa có thuế GTGT; gia công hàng hóa là giá gia công chưa có thuế GTGT; xây dựng, lắp đặt là giá trị công trình/hạng mục bàn giao chưa có thuế GTGT.","points":["Cho thuê tài sản: số tiền cho thuê chưa có thuế GTGT theo hợp đồng; trả tiền từng kỳ hoặc trả trước thì giá tính thuế là số tiền cho thuê từng kỳ hoặc trả trước chưa có thuế GTGT.","Gia công hàng hóa: giá gia công theo hợp đồng chưa có thuế GTGT, gồm cả tiền công, chi phí nhiên liệu, vật liệu phụ và chi phí khác phục vụ gia công.","Xây dựng, lắp đặt: giá trị công trình, hạng mục, phần công việc bàn giao gồm cả nguyên vật liệu, máy móc, thiết bị chưa có thuế GTGT; nếu không bao thầu nguyên vật liệu, máy móc, thiết bị thì giá tính thuế không gồm các giá trị này."]},"nd181_8":{"tldr":"Giá tính thuế kinh doanh bất động sản là giá bán chưa có thuế GTGT trừ giá đất được trừ (tiền sử dụng đất hoặc tiền thuê đất nộp ngân sách). Nghị định quy định cách xác định giá đất được trừ trong 7 trường hợp.","points":["Được Nhà nước giao đất, cho thuê đất trả tiền một lần, chuyển mục đích, công nhận quyền sử dụng đất...: giá đất được trừ là tiền sử dụng đất, tiền thuê đất trả một lần theo Nghị định về tiền sử dụng đất, tiền thuê đất.","Nhận chuyển nhượng bất động sản là quyền sử dụng đất: giá đất được trừ là tiền sử dụng đất, tiền thuê đất nộp ngân sách của khu/thửa đất, không gồm giá trị cơ sở hạ tầng (được khấu trừ GTGT đầu vào của cơ sở hạ tầng).","Nhận góp vốn bằng quyền sử dụng đất: giá đất được trừ là tiền sử dụng đất, tiền thuê đất nộp ngân sách; hợp đồng BT thanh toán bằng quỹ đất: giá đất được trừ là giá trị quỹ đất được thanh toán.","Xây dựng, kinh doanh hạ tầng, xây nhà để bán/cho thuê: giá tính thuế là số tiền thu theo tiến độ trừ giá đất được trừ tương ứng tỷ lệ % số tiền thu trên tổng giá trị hợp đồng.","Xây nhà nhiều tầng, chung cư để bán: giá đất được trừ cho 1 m2 = giá đất được trừ chia số m2 sàn xây dựng (không gồm diện tích dùng chung).","Trường hợp nhận chuyển nhượng/góp vốn không xác định được tiền sử dụng đất hoặc tiền thuê đất nộp ngân sách thì giá tính thuế là giá chuyển nhượng chưa có thuế GTGT."]},"nd181_9":{"tldr":"Hoạt động đại lý, môi giới mua bán hàng hóa, dịch vụ hưởng hoa hồng có giá tính thuế là tiền hoa hồng chưa có thuế GTGT (trừ một số trường hợp không phải tính thuế). Hàng hóa, dịch vụ dùng hóa đơn ghi giá thanh toán đã có thuế thì giá chưa có thuế = giá thanh toán / (1 + thuế suất).","points":["Đại lý, môi giới hưởng hoa hồng: giá tính thuế là tiền hoa hồng chưa có thuế GTGT.","Không phải tính thuế: doanh thu và hoa hồng từ đại lý bán đúng giá hưởng hoa hồng của dịch vụ bưu chính, viễn thông, bán vé xổ số, vé máy bay, ô tô, tàu hỏa, tàu thủy; đại lý vận tải quốc tế; đại lý dịch vụ hàng không, hàng hải áp dụng thuế suất 0%; đại lý bán bảo hiểm.","Không phải tính thuế: doanh thu và hoa hồng từ đại lý bán hàng hóa, dịch vụ thuộc diện không chịu thuế GTGT.","Hàng hóa, dịch vụ dùng hóa đơn ghi giá thanh toán đã có thuế GTGT: Giá chưa có thuế GTGT = Giá thanh toán / (1 + thuế suất của hàng hóa, dịch vụ)."]},"nd181_10":{"tldr":"Giá tính thuế dịch vụ casino, trò chơi điện tử có thưởng là số tiền thu được trừ số tiền đổi trả cho khách không dùng hết và tiền trả thưởng, đã có thuế TTĐB, chưa có thuế GTGT. Dịch vụ đặt cược là số tiền thu từ bán vé trừ tiền trả thưởng, đã có TTĐB, chưa có GTGT.","points":["Casino, trò chơi điện tử có thưởng: số tiền thu được trừ số tiền đã đổi trả cho khách không sử dụng hết và số tiền trả thưởng (nếu có), đã có thuế TTĐB, chưa có thuế GTGT; số tiền thu được gồm tiền đổi đồng tiền quy ước tại quầy, bàn chơi và tại máy.","Kinh doanh đặt cược: số tiền thu từ bán vé đặt cược trừ số tiền đã trả thưởng (nếu có), đã có thuế TTĐB, chưa có thuế GTGT."]},"nd181_11":{"tldr":"Giá tính thuế đối với một số hoạt động (sản xuất điện của EVN, vận tải bốc xếp, du lịch lữ hành, cầm đồ, sách bán theo giá bìa, in, đại lý giám định/xét bồi thường) là giá bán chưa có thuế GTGT, với cách xác định chi tiết cho từng hoạt động.","points":["Điện thủy điện hạch toán phụ thuộc EVN/Tổng công ty phát điện: giá tính thuế tại địa phương nơi có nhà máy bằng 35% giá bán lẻ điện bình quân chưa có GTGT; điện nhiệt điện theo giá hợp đồng mua bán điện hoặc giá bán lẻ điện bình quân; điện loại khác theo giá do cơ quan có thẩm quyền quy định.","Vận tải, bốc xếp: giá cước chưa có thuế GTGT, không phân biệt trực tiếp hay thuê lại.","Du lịch lữ hành trọn gói: giá trọn gói là giá đã có thuế GTGT; Giá tính thuế = Giá trọn gói / (1 + thuế suất); các khoản chi ở nước ngoài có chứng từ hợp pháp được giảm trừ.","Dịch vụ cầm đồ: số tiền phải thu chưa có GTGT (gồm tiền lãi cho vay cầm đồ và khoản thu khác); nếu đã gồm GTGT thì Giá tính thuế = Số tiền phải thu / (1 + thuế suất).","Sách bán theo giá phát hành (giá bìa) theo Luật Xuất bản: giá bìa là giá đã có thuế GTGT; in: giá tính thuế là tiền công in chưa có GTGT (gồm cả tiền giấy nếu hợp đồng bao gồm); đại lý giám định, xét bồi thường, đòi bồi hoàn, xử lý hàng bồi thường 100% hưởng tiền công/hoa hồng: giá tính thuế là tiền công/hoa hồng chưa có GTGT."]},"nd181_12":{"tldr":"Giá tính thuế dịch vụ viễn thông quốc tế là giá cung cấp dịch vụ chưa có thuế GTGT; nếu có dịch vụ kết nối với mạng viễn thông nước ngoài thì được trừ khoản phí kết nối, phải tách riêng, nếu không tách được thì tính trên toàn bộ giá trị hợp đồng chưa có GTGT.","points":["Giá tính thuế là giá cung cấp dịch vụ viễn thông quốc tế chưa có thuế GTGT.","Trường hợp có dịch vụ kết nối với mạng viễn thông nước ngoài thì được trừ các khoản thu của khách hàng để trả phí kết nối; phải tách riêng phí kết nối.","Nếu không tách riêng được thì giá tính thuế là toàn bộ giá trị hợp đồng chưa có thuế GTGT."]},"nd181_13":{"tldr":"Đối với dịch vụ do nhà thầu nước ngoài, nhà thầu phụ nước ngoài (không có cơ sở thường trú/không cư trú, chưa thực hiện đầy đủ chế độ kế toán, hóa đơn) có doanh thu tại Việt Nam, giá tính thuế là toàn bộ doanh thu nhận được, chưa trừ các khoản thuế phải nộp. Không gồm nhà cung cấp nước ngoài tại khoản 4 Điều 4 Luật Thuế GTGT.","points":["Áp dụng cho tổ chức nước ngoài không có cơ sở thường trú, cá nhân ở nước ngoài không cư trú tại Việt Nam (nhà thầu nước ngoài, nhà thầu phụ nước ngoài) có doanh thu phát sinh tại Việt Nam, chưa thực hiện đầy đủ chế độ kế toán, hóa đơn, chứng từ.","Không bao gồm các nhà cung cấp nước ngoài quy định tại khoản 4 Điều 4 Luật Thuế GTGT.","Giá tính thuế là toàn bộ doanh thu từ cung cấp dịch vụ, dịch vụ gắn với hàng hóa chịu thuế GTGT mà nhà thầu nhận được, chưa trừ các khoản thuế phải nộp, kể cả chi phí do Bên Việt Nam trả thay (nếu có). Bộ Tài chính quy định chi tiết."]},"nd181_14":{"tldr":"Giá tính thuế bao gồm phụ thu, phí thu thêm cơ sở kinh doanh được hưởng nhưng không gồm các khoản thu không liên quan đến bán hàng (bồi thường, tiền thưởng, thu hộ...). Có chiết khấu thương mại thì giá tính thuế là giá đã chiết khấu chưa có GTGT.","points":["Giá tính thuế bao gồm cả khoản phụ thu và phí thu thêm ngoài giá hàng hóa, dịch vụ mà cơ sở kinh doanh được hưởng.","Không bao gồm các khoản thu không liên quan đến bán hàng hóa, cung cấp dịch vụ: bồi thường bằng tiền (kể cả bồi thường về đất, tài sản trên đất khi thu hồi đất), tiền thưởng, thu đòi người thứ ba của bảo hiểm, các khoản thu hộ, thù lao thu hộ/chi hộ cơ quan nhà nước, các khoản thu tài chính.","Áp dụng chiết khấu thương mại: giá tính thuế là giá bán đã chiết khấu thương mại chưa có thuế GTGT.","Trường hợp giá tính thuế bị thay đổi theo kết luận của cơ quan nhà nước có thẩm quyền thì giá tính thuế xác định theo kết luận đó."]},"nd181_15":{"tldr":"Thời điểm xác định thuế GTGT đối với hàng xuất khẩu do người bán tự xác định nhưng chậm nhất không quá ngày làm việc tiếp theo kể từ ngày hàng được thông quan; đối với hàng nhập khẩu là thời điểm xác định thuế nhập khẩu.","points":["Hàng hóa xuất khẩu: do người bán tự xác định nhưng chậm nhất không quá ngày làm việc tiếp theo kể từ ngày hàng hóa được thông quan theo pháp luật hải quan.","Hàng hóa nhập khẩu: là thời điểm xác định thuế nhập khẩu theo pháp luật về thuế xuất khẩu, thuế nhập khẩu."]},"nd181_16":{"tldr":"Quy định thời điểm xác định thuế GTGT cho các hoạt động đặc thù: viễn thông, bán điện, cung cấp nước sạch, bảo hiểm, bất động sản, xây dựng lắp đặt, dầu khí, thường gắn với thời điểm đối soát dữ liệu và các mốc chậm nhất cụ thể.","points":["Viễn thông phải đối soát dữ liệu kết nối: thời điểm hoàn thành đối soát nhưng chậm nhất không quá 02 tháng kể từ tháng phát sinh cước; cung cấp theo kỳ: chậm nhất không quá ngày 07 tháng sau hoặc không quá 07 ngày kể từ ngày kết thúc kỳ quy ước; thẻ trả trước, cước hòa mạng: thời điểm bán thẻ, thu cước.","Bán điện của công ty phát điện trên thị trường điện: theo thời điểm đối soát số liệu nhưng chậm nhất là ngày cuối cùng của thời hạn kê khai, nộp thuế của tháng phát sinh; bán điện khác và cung cấp nước sạch: chậm nhất không quá ngày 07 tháng sau hoặc 07 ngày kể từ ngày kết thúc kỳ quy ước.","Kinh doanh bảo hiểm: thời điểm ghi nhận doanh thu bảo hiểm theo pháp luật kinh doanh bảo hiểm.","Bất động sản: đã chuyển giao quyền sở hữu/sử dụng thì là thời điểm chuyển giao (không phân biệt đã thu tiền); chưa chuyển giao mà thu tiền theo tiến độ thì là ngày thu tiền hoặc theo thỏa thuận thanh toán.","Xây dựng, lắp đặt (kể cả đóng tàu): thời điểm nghiệm thu, bàn giao công trình/hạng mục/khối lượng hoàn thành (không phân biệt đã thu tiền).","Dầu khí: bán dầu thô, condensate, sản phẩm chế biến từ dầu thô là thời điểm xác định giá bán chính thức; bán khí thiên nhiên, khí đồng hành, khí than qua đường ống là thời điểm xác định khối lượng khí giao của tháng nhưng chậm nhất là ngày cuối thời hạn kê khai, nộp thuế của tháng phát sinh."]},"nd181_17":{"tldr":"Mức thuế suất 0% áp dụng đối với hàng hóa, dịch vụ xuất khẩu theo khoản 1 Điều 9 Luật Thuế GTGT, gồm hàng hóa xuất khẩu, dịch vụ xuất khẩu và hàng hóa, dịch vụ xuất khẩu khác (vận tải quốc tế, dịch vụ hàng không, hàng hải...). Đồng thời liệt kê các trường hợp không áp dụng thuế suất 0%.","points":["Hàng hóa xuất khẩu: hàng từ Việt Nam bán cho tổ chức, cá nhân ở nước ngoài tiêu dùng ngoài Việt Nam; bán cho tổ chức trong khu phi thuế quan phục vụ sản xuất xuất khẩu; bán tại khu vực cách ly cho cá nhân đã làm thủ tục xuất cảnh, cửa hàng miễn thuế.","Dịch vụ xuất khẩu: cung cấp trực tiếp cho tổ chức, cá nhân ở nước ngoài và tiêu dùng ngoài Việt Nam; cung cấp cho tổ chức trong khu phi thuế quan phục vụ sản xuất xuất khẩu.","Hàng hóa, dịch vụ xuất khẩu khác: vận tải quốc tế; cho thuê phương tiện vận tải dùng ngoài lãnh thổ; dịch vụ hàng không, hàng hải cho vận tải quốc tế; xây dựng, lắp đặt ở nước ngoài hoặc khu phi thuế quan; sản phẩm nội dung thông tin số cho bên nước ngoài; gia công chuyển tiếp để xuất khẩu.","Không áp dụng thuế suất 0% (điểm b, d khoản 1 Điều 9): chuyển giao công nghệ, chuyển nhượng quyền SHTT ra nước ngoài; tái bảo hiểm ra nước ngoài; cấp tín dụng; chuyển nhượng vốn; sản phẩm phái sinh; bưu chính, viễn thông; sản phẩm xuất khẩu tại khoản 14 Điều 4; thuốc lá, rượu, bia nhập khẩu rồi xuất khẩu.","Cũng không áp dụng 0%: xăng, dầu mua nội địa bán cho cơ sở trong khu phi thuế quan, ô tô bán cho tổ chức, cá nhân trong khu phi thuế quan; dịch vụ tại Việt Nam cho tổ chức, cá nhân nước ngoài (thi đấu thể thao, biểu diễn, hội nghị, khách sạn, đào tạo, quảng cáo, du lịch lữ hành...); một số dịch vụ cung cấp cho tổ chức, cá nhân trong khu phi thuế quan."]},"nd181_18":{"tldr":"Hàng hóa, dịch vụ xuất khẩu áp dụng thuế suất 0% phải đáp ứng điều kiện về hồ sơ: hợp đồng, chứng từ thanh toán không dùng tiền mặt, tờ khai hải quan (đối với hàng hóa). Quy định riêng cho dịch vụ xuất khẩu, vận tải quốc tế, dịch vụ ngành hàng không, hàng hải.","points":["Hàng hóa xuất khẩu: hợp đồng bán/gia công hàng xuất khẩu (hoặc hợp đồng ủy thác xuất khẩu); chứng từ thanh toán không dùng tiền mặt; tờ khai hải quan.","Dịch vụ xuất khẩu (trừ khoản 3, 4, 5): hợp đồng cung cấp dịch vụ với tổ chức, cá nhân ở nước ngoài hoặc trong khu phi thuế quan; chứng từ thanh toán không dùng tiền mặt.","Vận tải quốc tế: hợp đồng vận chuyển theo chặng quốc tế (vé đối với vận chuyển hành khách); chứng từ thanh toán không dùng tiền mặt (vận chuyển hành khách cá nhân có chứng từ thanh toán trực tiếp).","Dịch vụ ngành hàng không: hợp đồng hoặc yêu cầu cung cấp dịch vụ với tổ chức, hãng hàng không nước ngoài; chứng từ thanh toán không dùng tiền mặt; dịch vụ sửa chữa tàu bay phải làm thủ tục tạm nhập, tái xuất.","Dịch vụ ngành hàng hải: hợp đồng hoặc yêu cầu cung cấp dịch vụ với tổ chức ở nước ngoài, người đại lý tàu biển; chứng từ thanh toán không dùng tiền mặt; dịch vụ sửa chữa tàu biển phải làm thủ tục tạm nhập, tái xuất."]},"nd181_19":{"tldr":"Mức thuế suất 5% áp dụng đối với hàng hóa, dịch vụ theo khoản 2 Điều 9 Luật Thuế GTGT; Nghị định quy định chi tiết các nhóm như phân bón, dịch vụ nông nghiệp, sản phẩm trồng trọt/chăn nuôi/thủy sản chưa chế biến, thiết bị y tế, thuốc, đồ chơi trẻ em, sách.","points":["Phân bón, quặng để sản xuất phân bón, thuốc bảo vệ thực vật và chất kích thích tăng trưởng vật nuôi; dịch vụ đào đắp, nạo vét kênh mương phục vụ nông nghiệp, nuôi trồng chăm sóc cây trồng, sơ chế bảo quản sản phẩm nông nghiệp.","Sản phẩm cây trồng, rừng trồng (trừ gỗ, măng), chăn nuôi, thủy sản nuôi trồng/đánh bắt chưa chế biến hoặc chỉ qua sơ chế thông thường (trừ sản phẩm tại khoản 1 Điều 4); mủ cao su sơ chế; lưới, dây giềng, sợi đan lưới đánh cá.","Sản phẩm thủ công từ đay, cói, tre, nứa, lá, rơm, vỏ dừa, bèo tây...; xơ bông đã chải; giấy in báo; tàu khai thác thủy sản; máy móc, thiết bị chuyên dùng phục vụ sản xuất nông nghiệp.","Thiết bị y tế theo pháp luật quản lý thiết bị y tế; thuốc phòng bệnh, chữa bệnh; dược chất, dược liệu là nguyên liệu sản xuất thuốc.","Hoạt động nghệ thuật biểu diễn truyền thống, dân gian; đồ chơi cho trẻ em; sách các loại (trừ sách tại khoản 8 Điều 4)."]},"nd181_20":{"tldr":"Theo phương pháp khấu trừ, số thuế GTGT phải nộp = thuế GTGT đầu ra trừ thuế GTGT đầu vào được khấu trừ. Thuế đầu ra là tổng thuế của hàng hóa, dịch vụ bán ra trên hóa đơn; thuế đầu vào được khấu trừ là tổng thuế trên hóa đơn mua vào, chứng từ nộp thuế đáp ứng điều kiện khấu trừ.","points":["Số thuế GTGT phải nộp = thuế GTGT đầu ra trừ thuế GTGT đầu vào được khấu trừ.","Thuế GTGT đầu ra = tổng thuế GTGT của hàng hóa, dịch vụ bán ra ghi trên hóa đơn GTGT = giá tính thuế nhân thuế suất; nếu hóa đơn ghi giá thanh toán đã có thuế thì thuế đầu ra = giá thanh toán trừ giá tính thuế.","Thuế GTGT đầu vào được khấu trừ = tổng thuế trên hóa đơn GTGT mua vào, chứng từ nộp thuế GTGT hàng nhập khẩu hoặc chứng từ nộp thuế khi mua dịch vụ, đáp ứng điều kiện khấu trừ tại Mục 1, Mục 2 Chương III Nghị định."]},"nd181_21":{"tldr":"Phương pháp khấu trừ thuế áp dụng đối với cơ sở kinh doanh thực hiện đầy đủ chế độ kế toán, hóa đơn, chứng từ, gồm cơ sở có doanh thu hằng năm từ 01 tỷ đồng trở lên (trừ hộ, cá nhân kinh doanh) và cơ sở tự nguyện áp dụng. Thời gian áp dụng ổn định phương pháp là 02 năm liên tục.","points":["Cơ sở kinh doanh có doanh thu hằng năm từ bán hàng hóa, cung cấp dịch vụ từ 01 tỷ đồng trở lên (trừ hộ, cá nhân kinh doanh); thời gian áp dụng ổn định phương pháp là 02 năm liên tục.","Doanh thu hằng năm tự xác định theo chỉ tiêu Tổng doanh thu hàng hóa, dịch vụ bán ra chịu thuế GTGT trên Tờ khai tháng (từ tháng 11 năm trước đến hết tháng 10 năm hiện tại) hoặc Tờ khai quý (từ quý 4 năm trước đến hết quý 3 năm hiện tại).","Cơ sở mới thành lập hoạt động không đủ 12 tháng: tính doanh thu ước tính cả năm; nếu từ 01 tỷ đồng trở lên thì áp dụng khấu trừ, nếu dưới 01 tỷ đồng thì áp dụng tính trực tiếp trong 02 năm (trừ khi tự nguyện).","Cơ sở tự nguyện áp dụng khấu trừ (trừ hộ, cá nhân kinh doanh): doanh nghiệp, HTX có doanh thu dưới 01 tỷ đồng đã đủ chế độ kế toán; doanh nghiệp mới thành lập từ dự án đầu tư; có thực hiện đầu tư, mua sắm tài sản cố định hoặc có hợp đồng thuê địa điểm; tổ chức nước ngoài có cơ sở thường trú; tổ chức kinh tế khác hạch toán được GTGT đầu vào, đầu ra.","Tổ chức, cá nhân nước ngoài cung cấp hàng hóa, dịch vụ cho hoạt động tìm kiếm thăm dò, phát triển và khai thác dầu khí nộp thuế theo khấu trừ do bên Việt Nam kê khai, khấu trừ, nộp thay.","Chi nhánh mới thành lập của doanh nghiệp đang nộp thuế theo khấu trừ (kể cả lập từ dự án đầu tư) khai thuế riêng thì xác định phương pháp tính thuế theo phương pháp của doanh nghiệp đang hoạt động."]},"nd181_22":{"tldr":"Phương pháp tính trực tiếp trên giá trị gia tăng áp dụng cho hoạt động mua, bán, chế tác vàng, bạc, đá quý: thuế phải nộp = giá trị gia tăng nhân thuế suất. Giá trị gia tăng = giá thanh toán bán ra trừ giá thanh toán mua vào tương ứng; phải hạch toán riêng và xử lý GTGT âm.","points":["Số thuế GTGT phải nộp = giá trị gia tăng nhân thuế suất GTGT áp dụng cho hoạt động mua, bán, chế tác vàng, bạc, đá quý.","Giá trị gia tăng = giá thanh toán bán ra trừ giá thanh toán mua vào tương ứng; giá bán ra là giá thực tế bán gồm cả tiền công chế tác, thuế GTGT, phụ thu, phí; giá mua vào đã có thuế GTGT.","Cơ sở có hoạt động mua, bán, chế tác vàng, bạc, đá quý phải hạch toán riêng để nộp thuế theo phương pháp tính trực tiếp.","Phát sinh giá trị gia tăng âm (-) thì được bù trừ vào giá trị gia tăng dương (+); không đủ bù trừ thì kết chuyển trừ vào kỳ sau trong năm; kết thúc năm dương lịch, giá trị gia tăng âm không được kết chuyển sang năm sau."]},"nd181_23":{"tldr":"Quy định nguyên tắc khấu trừ thuế GTGT đầu vào: được khấu trừ toàn bộ với hàng hóa, dịch vụ dùng cho sản xuất, kinh doanh hàng chịu thuế (kể cả tổn thất không được bồi thường); chỉ khấu trừ phần dùng cho hoạt động chịu thuế khi dùng đồng thời; kê khai bổ sung khi sai sót; và các trường hợp không được khấu trừ.","points":["Thuế GTGT đầu vào của hàng hóa, dịch vụ dùng cho sản xuất kinh doanh hàng chịu thuế được khấu trừ toàn bộ, kể cả thuế đầu vào không được bồi thường của hàng bị tổn thất, hao hụt tự nhiên (trong định mức nếu có quy định).","Dùng đồng thời cho hoạt động chịu thuế và không chịu thuế: chỉ khấu trừ phần dùng cho hoạt động chịu thuế; không hạch toán riêng được thì khấu trừ theo tỷ lệ % doanh thu chịu thuế trên tổng doanh thu.","Khấu trừ toàn bộ thuế đầu vào của hàng hóa, dịch vụ bán cho tổ chức, cá nhân dùng vốn viện trợ nhân đạo, viện trợ không hoàn lại và của hoạt động tìm kiếm thăm dò, phát triển mỏ dầu khí.","Thuế đầu vào phát sinh trong tháng, quý nào được kê khai, khấu trừ trong tháng, quý đó; chưa khấu trừ hết thì khấu trừ vào kỳ tiếp theo; được khai bổ sung khi phát hiện sai sót trước khi cơ quan thuế công bố quyết định kiểm tra, thanh tra.","Hàng hóa chuyển từ không chịu thuế sang chịu thuế: chỉ khấu trừ thuế đầu vào dùng cho sản xuất kinh doanh hàng chịu thuế phát sinh từ ngày 01/7/2025.","Không được khấu trừ thuế đầu vào của tài sản cố định, máy móc, thiết bị: chuyên dùng sản xuất sản phẩm quốc phòng, an ninh; của tổ chức tín dụng, tái bảo hiểm, bảo hiểm nhân thọ, chứng khoán, khám chữa bệnh, đào tạo; máy bay, trực thăng, tàu lượn dân dụng, du thuyền không dùng kinh doanh; và các hóa đơn lập từ hành vi bị nghiêm cấm tại Điều 13 Luật Thuế GTGT."]},"nd181_24":{"tldr":"Quy định khấu trừ thuế GTGT đối với một số trường hợp đặc thù theo điểm g khoản 1 Điều 14 Luật Thuế GTGT: tài sản cố định phục vụ người lao động, góp vốn bằng tài sản, mua dưới hình thức ủy quyền, ô tô dưới 9 chỗ trị giá trên 1,6 tỷ đồng, và sản xuất khép kín.","points":["Tài sản cố định phục vụ người lao động trong khu vực sản xuất kinh doanh, nhà ở, trạm y tế cho công nhân khu công nghiệp: khấu trừ toàn bộ; tiền thuê nhà cho chuyên gia nước ngoài được khấu trừ nếu chuyên gia vẫn là nhân viên của doanh nghiệp nước ngoài và có hợp đồng quy định.","Góp vốn bằng tài sản mới mua, chưa sử dụng, có hóa đơn hợp pháp được hội đồng giao nhận vốn góp chấp nhận: trị giá vốn góp theo hóa đơn gồm cả thuế GTGT; bên nhận vốn góp được khấu trừ thuế GTGT trên hóa đơn.","Mua dưới hình thức ủy quyền (hóa đơn mang tên bên được ủy quyền): được khấu trừ, gồm doanh nghiệp bảo hiểm ủy quyền sửa chữa tài sản (bồi thường từ 05 triệu đồng trở lên phải thanh toán không dùng tiền mặt) và sáng lập viên ủy quyền chi hộ trước khi thành lập doanh nghiệp (hóa đơn từ 05 triệu đồng trở lên phải thanh toán không dùng tiền mặt).","Tài sản cố định là ô tô chở người từ 9 chỗ trở xuống (trừ ô tô dùng kinh doanh vận tải, du lịch, khách sạn, làm mẫu/lái thử) trị giá trên 1,6 tỷ đồng (chưa có GTGT): chỉ khấu trừ thuế đầu vào tương ứng phần trị giá đến 1,6 tỷ đồng.","Cơ sở sản xuất khép kín, hạch toán tập trung dùng sản phẩm không chịu thuế GTGT qua các khâu để sản xuất ra mặt hàng chịu thuế: thuế đầu vào tại các khâu được khấu trừ toàn bộ."]},"nd181_25":{"tldr":"Để khấu trừ, cơ sở kinh doanh phải có hóa đơn GTGT của hàng hóa, dịch vụ mua vào, hoặc chứng từ nộp thuế GTGT ở khâu nhập khẩu, hoặc chứng từ nộp thuế GTGT thay cho phía nước ngoài theo điểm a khoản 2 Điều 14 Luật Thuế GTGT.","points":["Phải có hóa đơn GTGT của hàng hóa, dịch vụ mua vào hoặc chứng từ nộp thuế GTGT khâu nhập khẩu.","Hoặc chứng từ nộp thuế GTGT thay cho phía nước ngoài (gồm cả chứng từ nộp thuế GTGT theo tỷ lệ % nhân doanh thu thay phía nước ngoài)."]},"nd181_26":{"tldr":"Cơ sở kinh doanh phải có chứng từ thanh toán không dùng tiền mặt đối với hàng hóa, dịch vụ mua vào từ 05 triệu đồng trở lên (đã gồm GTGT). Nghị định nêu các trường hợp đặc thù như thanh toán bù trừ, qua bên thứ ba, trả chậm/trả góp, và quy định cộng gộp nhiều lần mua trong ngày.","points":["Phải có chứng từ thanh toán không dùng tiền mặt với hàng hóa, dịch vụ mua vào (kể cả hàng nhập khẩu) từ 05 triệu đồng trở lên đã gồm thuế GTGT, theo Nghị định số 52/2024/NĐ-CP, trừ chứng từ bên mua nộp tiền mặt vào tài khoản bên bán.","Trường hợp đặc thù: thanh toán bù trừ giữa hàng mua và hàng bán, vay mượn hàng (phải có biên bản đối chiếu, xác nhận; bù trừ qua bên thứ ba phải có biên bản ba bên); bù trừ công nợ qua vay mượn tiền, cấn trừ qua bên thứ ba (phải có hợp đồng và chứng từ chuyển tiền).","Thanh toán ủy quyền qua bên thứ ba; thanh toán bằng cổ phiếu, trái phiếu (phải có hợp đồng văn bản trước); phần giá trị còn lại thanh toán bằng tiền từ 05 triệu đồng trở lên phải có chứng từ thanh toán không dùng tiền mặt.","Hàng hóa, dịch vụ mua trả chậm, trả góp từ 05 triệu đồng trở lên: được khấu trừ căn cứ hợp đồng, hóa đơn và chứng từ thanh toán không dùng tiền mặt; chưa đến hạn thanh toán vẫn được khấu trừ; đến hạn không có chứng từ thì phải điều chỉnh giảm số thuế đã khấu trừ.","Nhập khẩu/mua từng lần dưới 05 triệu đồng (giá đã có GTGT), hàng nhập khẩu là quà biếu, quà tặng, hàng mẫu không phải trả tiền: không cần chứng từ thanh toán không dùng tiền mặt.","Mua của một người nộp thuế dưới 05 triệu đồng nhưng nhiều lần trong cùng một ngày có tổng từ 05 triệu đồng trở lên thì chỉ được khấu trừ nếu có chứng từ thanh toán không dùng tiền mặt."]},"nd181_27":{"tldr":"Ngoài điều kiện tại Điều 25, Điều 26, hàng hóa, dịch vụ xuất khẩu để khấu trừ thuế GTGT đầu vào còn phải có hợp đồng với bên nước ngoài, hóa đơn, chứng từ thanh toán không dùng tiền mặt, tờ khai hải quan (đối với hàng hóa). Nghị định quy định chi tiết về tờ khai, chứng từ thanh toán và nhiều trường hợp thay thế đặc thù.","points":["Phải có: hợp đồng bán/gia công hàng hóa, cung cấp dịch vụ với bên nước ngoài; hóa đơn; chứng từ thanh toán không dùng tiền mặt; tờ khai hải quan đối với hàng xuất khẩu (trừ trường hợp không cần tờ khai); phiếu đóng gói, vận đơn, chứng từ bảo hiểm hàng hóa (nếu có).","Ủy thác xuất khẩu: phải có hợp đồng ủy thác và biên bản thanh lý hoặc biên bản đối chiếu công nợ định kỳ ghi rõ số lượng, chủng loại, giá trị, số/ngày hợp đồng, chứng từ thanh toán, tờ khai hải quan của bên nhận ủy thác.","Chứng từ thanh toán không dùng tiền mặt là chứng từ chuyển tiền từ tài khoản bên nhập khẩu sang tài khoản bên xuất khẩu; thanh toán trả chậm phải có thỏa thuận trong hợp đồng, đến hạn phải có chứng từ thanh toán không dùng tiền mặt.","Các trường hợp không phải đáp ứng điều kiện chứng từ thanh toán không dùng tiền mặt: cấn trừ vào khoản vay nợ nước ngoài; dùng tiền thanh toán để góp vốn với bên nhập khẩu; ủy quyền/bù trừ công nợ qua bên thứ ba, bên thứ tư; thanh toán qua tài khoản vãng lai của bên nước ngoài; số tiền thanh toán không khớp hợp đồng (phải giải trình).","Trường hợp bên nước ngoài mất khả năng thanh toán, hàng phải tiêu hủy hoặc bị tổn thất ngoài biên giới: được dùng các giấy tờ thay thế (tờ khai hải quan nước nhập khẩu, đơn khởi kiện, phán quyết tòa án, biên bản tiêu hủy, giấy xác nhận tổn thất...) thay cho chứng từ thanh toán không dùng tiền mặt.","Hóa đơn bán hàng hóa, cung cấp dịch vụ là hóa đơn thương mại hoặc hóa đơn GTGT theo pháp luật về hóa đơn, chứng từ."]},"nd181_28":{"tldr":"Đối với xuất khẩu qua sàn TMĐT nước ngoài và một số trường hợp đặc thù khác, ngoài điều kiện tại Điều 25, Điều 26, cơ sở xuất khẩu phải có tài liệu chứng minh đã xuất bán hàng hóa ở ngoài Việt Nam. Không đủ thủ tục thì không được khấu trừ, không phải tính thuế đầu ra (riêng gia công chuyển tiếp phải tính, nộp thuế như tiêu thụ nội địa).","points":["Xuất khẩu qua sàn TMĐT nước ngoài: hợp đồng với nhà quản lý sàn; hóa đơn; chứng từ thanh toán không dùng tiền mặt; tờ khai đã hoàn thành thủ tục hải quan khi gửi hàng ra nước ngoài; tài liệu chứng minh giao hàng cho người mua nước ngoài; phiếu đóng gói, vận đơn, chứng từ bảo hiểm (nếu có).","Xuất khẩu hàng gửi tại kho ngoại quan nước ngoài: hợp đồng xuất khẩu/ủy thác xuất khẩu; hóa đơn; chứng từ thanh toán không dùng tiền mặt; tờ khai hải quan; tài liệu chứng minh giao hàng (tờ khai khi xuất hàng giao hoặc tài liệu chứng minh đã bán tại kho ngoại quan).","Xuất khẩu tại hội chợ, triển lãm nước ngoài: chứng từ thanh toán không dùng tiền mặt; nếu thu và chuyển về nước bằng tiền mặt ngoại tệ thì phải có chứng từ kê khai với hải quan và chứng từ nộp tiền vào ngân hàng tại Việt Nam.","Hàng bán tại khu vực cách ly, cửa hàng miễn thuế: phải có Bảng kê hàng hóa đã bán cho khách xuất cảnh theo mẫu Phụ lục III; sản phẩm nội dung thông tin số: hồ sơ chứng minh tiêu dùng ngoài Việt Nam và chứng từ thanh toán không dùng tiền mặt.","Hàng gia công chuyển tiếp, xây dựng lắp đặt ở nước ngoài/khu phi thuế quan, hàng hóa vật tư xuất khẩu thực hiện công trình ở nước ngoài: phải có hợp đồng, hóa đơn, phiếu chuyển tiếp, tờ khai hải quan, chứng từ thanh toán không dùng tiền mặt theo từng trường hợp.","Không đủ thủ tục, hồ sơ thì không được khấu trừ thuế đầu vào, không phải tính thuế đầu ra; riêng gia công chuyển tiếp thiếu hồ sơ thì phải tính, nộp thuế GTGT như hàng tiêu thụ nội địa."]},"nd181_29":{"tldr":"Cơ sở kinh doanh trong tháng, quý có hàng hóa, dịch vụ xuất khẩu, nếu thuế GTGT đầu vào chưa khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn thuế theo tháng, quý (trừ hàng nhập khẩu sau đó xuất khẩu sang nước khác). Quy định cách hạch toán riêng và giới hạn số thuế được hoàn không vượt quá 10% doanh thu xuất khẩu.","points":["Có hàng hóa, dịch vụ xuất khẩu, thuế GTGT đầu vào chưa khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn theo tháng, quý, trừ hàng nhập khẩu sau đó xuất khẩu sang nước khác.","Đối tượng được hoàn: ủy thác xuất khẩu là cơ sở có hàng ủy thác; gia công chuyển tiếp là cơ sở ký hợp đồng gia công xuất khẩu với bên nước ngoài; hàng xuất khẩu thực hiện công trình xây dựng ở nước ngoài là cơ sở có hàng xuất khẩu.","Vừa có xuất khẩu vừa có tiêu thụ nội địa: phải hạch toán riêng thuế đầu vào cho xuất khẩu; không hạch toán riêng được thì xác định theo tỷ lệ doanh thu xuất khẩu trên tổng doanh thu chịu thuế.","Sau khi bù trừ với thuế phải nộp của hàng tiêu thụ nội địa còn lại từ 300 triệu đồng trở lên thì được hoàn; số thuế được hoàn cho hàng hóa, dịch vụ xuất khẩu không vượt quá 10% doanh thu xuất khẩu của kỳ hoàn thuế; phần vượt 10% được khấu trừ vào kỳ tiếp theo."]},"nd181_30":{"tldr":"Cơ sở kinh doanh nộp thuế theo phương pháp khấu trừ có dự án đầu tư (mới, mở rộng) đang trong giai đoạn đầu tư, sau khi bù trừ nếu thuế GTGT đầu vào chưa khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn. Quy định trình tự bù trừ, thời hạn nộp hồ sơ, dự án ngành nghề có điều kiện và các trường hợp không được hoàn (kết chuyển kỳ sau).","points":["Cơ sở nộp thuế theo khấu trừ có dự án đầu tư mới/mở rộng đang trong giai đoạn đầu tư (trừ dự án không hình thành tài sản cố định) có thuế đầu vào chưa hoàn thì bù trừ với thuế phải nộp của hoạt động đang thực hiện; sau bù trừ chưa khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn.","Dự án đã hoàn thành nhưng chưa hoàn thuế giai đoạn đầu tư thì nộp hồ sơ hoàn thuế trong thời hạn 01 năm kể từ ngày dự án/giai đoạn/hạng mục hoàn thành (ngày phát sinh doanh thu, không gồm doanh thu chạy thử, tài chính, thanh lý nguyên vật liệu).","Chủ dự án lập tổ chức kinh tế mới hoặc giao Ban Quản lý dự án, chi nhánh thực hiện: tổ chức mới, Ban Quản lý, chi nhánh được khấu trừ và hoàn thuế dự án sau khi bù trừ; khi hoàn thành nếu không tiếp tục quản lý vận hành thì phải bàn giao số thuế chưa khấu trừ hết.","Dự án đang đầu tư phải chấm dứt, chưa phát sinh thuế đầu ra của hoạt động chính: phải nộp lại số thuế đã được hoàn; số chưa hoàn thì không được giải quyết hoàn.","Dự án ngành, nghề kinh doanh có điều kiện được hoàn thuế khi đã được cấp giấy phép/giấy chứng nhận/văn bản xác nhận, chấp thuận, hoặc chưa phải đề nghị cấp, hoặc không phải có giấy kinh doanh có điều kiện.","Không được hoàn (kết chuyển sang kỳ sau): không góp đủ vốn điều lệ đã đăng ký; ngành nghề có điều kiện chưa đủ/không duy trì điều kiện kinh doanh; dự án khai thác tài nguyên, khoáng sản và sản xuất sản phẩm là tài nguyên, khoáng sản đã chế biến tại khoản 14 Điều 4 (trừ tìm kiếm thăm dò, phát triển mỏ dầu khí)."]},"nd181_31":{"tldr":"Cơ sở chỉ sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất 5%, nếu thuế GTGT đầu vào chưa khấu trừ hết từ 300 triệu đồng trở lên sau 12 tháng liên tục hoặc 04 quý liên tục thì được hoàn thuế. Cơ sở sản xuất nhiều mức thuế suất phải hạch toán riêng hoặc phân bổ theo tỷ lệ doanh thu.","points":["Cơ sở chỉ sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất 5% có thuế GTGT đầu vào chưa khấu trừ hết từ 300 triệu đồng trở lên sau 12 tháng liên tục hoặc 04 quý liên tục thì được hoàn thuế.","Cơ sở sản xuất nhiều mức thuế suất phải hạch toán riêng thuế đầu vào dùng cho hàng hóa, dịch vụ chịu 5%; không hạch toán riêng được thì xác định theo tỷ lệ doanh thu hoạt động chịu 5% trên tổng doanh thu chịu thuế của kỳ hoàn thuế.","Sau khi bù trừ với thuế phải nộp của hàng chịu thuế còn lại từ 300 triệu đồng trở lên thì được hoàn thuế đầu vào dùng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất 5%."]},"nd181_32":{"tldr":"Cơ sở kinh doanh nộp thuế theo phương pháp khấu trừ khi giải thể, phá sản được hoàn thuế GTGT nộp thừa hoặc đầu vào chưa khấu trừ hết (trừ trường hợp giải thể và chấm dứt dự án đầu tư tại khoản 1 Điều 30). Chi nhánh giải thể, tổ hợp tác chuyển thành HTX thì được kế thừa số thuế để khấu trừ, hoàn thuế.","points":["Cơ sở nộp thuế theo khấu trừ khi giải thể, phá sản được hoàn thuế GTGT nộp thừa hoặc thuế đầu vào chưa khấu trừ hết, trừ trường hợp giải thể và chấm dứt dự án đầu tư tại khoản 1 Điều 30; phải thực hiện theo pháp luật về giải thể, phá sản và quản lý thuế.","Chi nhánh nộp thuế theo khấu trừ giải thể, tổ hợp tác chuyển đổi thành HTX, liên hiệp HTX thì doanh nghiệp, HTX, liên hiệp HTX được kế thừa số thuế GTGT nộp thừa hoặc đầu vào chưa khấu trừ hết để khấu trừ, hoàn thuế."]},"nd181_33":{"tldr":"Người nước ngoài, người Việt Nam định cư ở nước ngoài (trừ thành viên tổ bay, đoàn thủy thủ) mang hộ chiếu hoặc giấy tờ có giá trị đi lại quốc tế được hoàn thuế đối với hàng hóa mua tại Việt Nam mang theo khi xuất cảnh; hồ sơ, thủ tục, số thuế, phương thức hoàn theo Phụ lục IV.","points":["Đối tượng: người nước ngoài, người Việt Nam định cư ở nước ngoài mang hộ chiếu hoặc giấy tờ có giá trị đi lại quốc tế, trừ thành viên Tổ bay (pháp luật hàng không) và thành viên Đoàn thủy thủ (pháp luật hàng hải).","Được hoàn thuế đối với hàng hóa mua tại Việt Nam mang theo khi xuất cảnh; hồ sơ, thủ tục, số thuế được hoàn, phương thức hoàn thuế quy định tại Phụ lục IV ban hành kèm theo Nghị định."]},"nd181_34":{"tldr":"Hoàn thuế GTGT đối với chương trình, dự án sử dụng vốn ODA không hoàn lại hoặc viện trợ không hoàn lại, viện trợ nhân đạo: chủ chương trình/dự án, nhà thầu chính, tổ chức được nhà tài trợ chỉ định và tổ chức ở Việt Nam sử dụng tiền viện trợ được hoàn số thuế GTGT đã trả cho hàng hóa, dịch vụ mua tại Việt Nam.","points":["Chủ chương trình, dự án hoặc nhà thầu chính (kể cả Văn phòng điều hành tại Việt Nam), tổ chức do nhà tài trợ chỉ định quản lý chương trình, dự án vốn ODA được hoàn số thuế GTGT đã trả cho hàng hóa, dịch vụ mua tại Việt Nam phục vụ chương trình, dự án.","Tổ chức ở Việt Nam sử dụng tiền viện trợ không hoàn lại, viện trợ nhân đạo của tổ chức, cá nhân nước ngoài để mua hàng hóa, dịch vụ phục vụ chương trình, dự án được hoàn số thuế GTGT đã trả cho hàng hóa, dịch vụ đó."]},"nd181_35":{"tldr":"Đối tượng được hưởng quyền ưu đãi miễn trừ ngoại giao theo pháp luật về ngoại giao mua hàng hóa, dịch vụ tại Việt Nam để sử dụng được hoàn số thuế GTGT đã trả ghi trên hóa đơn GTGT hoặc trên chứng từ thanh toán ghi giá thanh toán đã có thuế GTGT.","points":["Đối tượng hưởng quyền ưu đãi miễn trừ ngoại giao theo pháp luật về ngoại giao mua hàng hóa, dịch vụ tại Việt Nam để sử dụng được hoàn số thuế GTGT đã trả ghi trên hóa đơn GTGT hoặc trên chứng từ thanh toán ghi giá thanh toán đã có thuế GTGT."]},"nd181_37":{"tldr":"Cơ sở kinh doanh thuộc trường hợp hoàn thuế phải đáp ứng các điều kiện: nộp thuế theo phương pháp khấu trừ, có sổ kế toán, tài khoản tiền gửi theo mã số thuế; đáp ứng quy định về khấu trừ; người bán đã kê khai, nộp thuế đối với hóa đơn đã xuất; và lập, nộp hồ sơ hoàn thuế đúng quy định.","points":["Cơ sở được hoàn thuế theo Điều 29, 30, 31, 32 phải nộp thuế theo phương pháp khấu trừ, lập và lưu giữ sổ kế toán, chứng từ kế toán; có tài khoản tiền gửi tại ngân hàng theo mã số thuế.","Đáp ứng quy định về khấu trừ thuế GTGT đầu vào tại Mục 2 Chương III và không thuộc trường hợp tại khoản 15 Điều 23 Nghị định.","Người bán đã kê khai, nộp thuế GTGT với hóa đơn đã xuất: tại thời điểm nộp hồ sơ hoàn thuế, người bán đã nộp hồ sơ khai thuế và không còn nợ thuế GTGT của kỳ tương ứng; nếu người bán chưa nộp đủ hồ sơ hoặc còn nợ thuế thì cơ sở không được hoàn đối với các hóa đơn tương ứng.","Tại thời điểm nộp hồ sơ hoàn thuế phải đáp ứng đầy đủ điều kiện hoàn thuế, tuân thủ quy định khai thuế, lập hồ sơ hoàn thuế theo từng trường hợp gửi cơ quan thuế; cơ quan thuế phân loại hồ sơ hoàn trước hoặc kiểm tra trước hoàn thuế."]},"nd181_38":{"tldr":"Nghị định có hiệu lực thi hành từ ngày 01/7/2025, thay thế Nghị định số 209/2013/NĐ-CP và Nghị định số 49/2022/NĐ-CP, một số quy định của Nghị định số 134/2016/NĐ-CP và 26/2023/NĐ-CP, đồng thời bãi bỏ một số điều của các nghị định về thuế.","points":["Có hiệu lực thi hành từ ngày 01/7/2025.","Thay thế Nghị định số 209/2013/NĐ-CP, Nghị định số 49/2022/NĐ-CP và quy định về xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng chi phí năng lượng chiếm từ 51% giá thành tại Nghị định số 134/2016/NĐ-CP và Nghị định số 26/2023/NĐ-CP (bằng quy định tại Phụ lục V).","Bãi bỏ Điều 2 Nghị định số 91/2014/NĐ-CP, Điều 3 Nghị định số 12/2015/NĐ-CP, Điều 1 Nghị định số 100/2016/NĐ-CP và Điều 1 Nghị định số 146/2017/NĐ-CP.","Trường hợp văn bản viện dẫn được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."]},"nd181_39":{"tldr":"Điều khoản chuyển tiếp: dự án đầu tư trước ngày 01/7/2025 còn trong giai đoạn đầu tư được áp dụng quy định hoàn thuế đầu tư tại Điều 30; quy định hoàn thuế hoạt động chịu thuế suất 5% (Điều 31) và quy định tại khoản 3 Điều 37 áp dụng cho thuế phát sinh, kỳ tính thuế từ tháng 7/2025 hoặc quý 3/2025.","points":["Dự án đầu tư đã đầu tư trước ngày 01/7/2025 mà vẫn đang trong giai đoạn đầu tư kể từ ngày Nghị định có hiệu lực thì được áp dụng quy định hoàn thuế đối với đầu tư tại Điều 30.","Quy định hoàn thuế đối với hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất 5% tại Điều 31 áp dụng đối với số thuế GTGT đầu vào chưa khấu trừ hết phát sinh kể từ ngày Nghị định có hiệu lực.","Quy định tại khoản 3 Điều 37 áp dụng cho kỳ tính thuế từ tháng 7/2025 hoặc quý 3/2025."]},"nd181_40":{"tldr":"Điều khoản trách nhiệm thi hành: giao Bộ Tài chính quy định chi tiết các điều, khoản được giao và hướng dẫn thực hiện, quy định cụ thể đối với hàng hóa, dịch vụ không thuộc phạm vi điều chỉnh; các Bộ trưởng, Chủ tịch UBND tỉnh, thành phố và cơ quan, tổ chức, cá nhân liên quan chịu trách nhiệm thi hành.","points":["Bộ Tài chính quy định chi tiết các điều, khoản được giao và hướng dẫn thực hiện Nghị định theo chức năng, nhiệm vụ.","Bộ Tài chính quy định cụ thể đối với hàng hóa, dịch vụ không thuộc phạm vi điều chỉnh của Nghị định và Luật Thuế GTGT.","Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, cơ quan thuộc Chính phủ, Chủ tịch UBND tỉnh, thành phố trực thuộc trung ương và các cơ quan, tổ chức, cá nhân liên quan chịu trách nhiệm thi hành.","Kèm theo Nghị định có các phụ lục: Phụ lục I, II (Danh mục tài nguyên, khoáng sản khai thác chưa/đã chế biến); Phụ lục III (Bảng kê hàng hóa bán cho khách xuất cảnh); Phụ lục IV (hoàn thuế hàng mua tại Việt Nam mang theo khi xuất cảnh); Phụ lục V."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
