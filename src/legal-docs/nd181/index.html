ị gia tăng đầu vào của hàng hóa, dịch vụ mua vào phục vụ cho hoạt động của các đơn vị này. Trường hợp các đơn vị này có hoạt động kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng thì phải đăng ký, kê khai nộp thuế giá trị gia tăng riêng cho các hoạt động kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng."},{"k":"p","t":"15.  Cơ sở kinh doanh không đáp ứng quy định về khấu trừ thuế tại Mục 1, Mục 2 Chương III Nghị định này và các hóa đơn, chứng từ được lập từ các hành vi bị nghiêm cấm tại Điều 13 Luật Thuế giá trị gia tăng thì không được khấu trừ thuế giá trị gia tăng."},{"k":"p","t":"16.  Đối với số thuế giá trị gia tăng đầu vào không được khấu trừ, cơ sở kinh doanh được tính vào chi phí để tính thuế thu nhập doanh nghiệp hoặc tính vào nguyên giá của tài sản cố định theo quy định của pháp luật về thuế thu nhập doanh nghiệp, trừ số thuế giá trị gia tăng của hàng hóa, dịch vụ mua vào từng lần có giá trị từ 05 triệu đồng trở lên không có chứng từ thanh toán không dùng tiền mặt."}]},{"id":"nd181_24","no":24,"code":"Điều 24","title":"Điều 24. Khấu trừ thuế giá trị gia tăng đối với một số trường hợp đặc thù","shortTitle":"Khấu trừ thuế giá trị gia tăng đối với một số trường hợp đặc thù","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Việc khấu trừ thuế giá trị gia tăng trong một số trường hợp quy định tại điểm g khoản 1 Điều 14 Luật Thuế giá trị gia tăng thực hiện như sau:"},{"k":"p","t":"1.  Đối với hàng hóa, dịch vụ hình thành tài sản cố định phục vụ cho người lao động:"},{"k":"p","t":"a)  Thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ hình thành tài sản cố định phục vụ cho người lao động trong khu vực sản xuất, kinh doanh và nhà ở, trạm y tế cho công nhân làm việc trong các khu công nghiệp được khấu trừ toàn bộ."},{"k":"p","t":"b)  Trường hợp cơ sở kinh doanh thuê nhà ở cho công nhân làm việc trong các khu công nghiệp thì thuế giá trị gia tăng đối với khoản tiền thuê nhà được khấu trừ theo quy định. Trường hợp cơ sở kinh doanh xây dựng hoặc mua nhà ở ngoài khu công nghiệp phục vụ cho công nhân làm việc trong các khu công nghiệp, nhà xây dựng hoặc nhà mua thì thuế giá trị gia tăng của nhà xây dựng, nhà mua phục vụ cho công nhân được khấu trừ toàn bộ. Nhà ở cho công nhân quy định tại điểm này phải đáp ứng điều kiện nhà ở cho công nhân trong khu công nghiệp theo quy định của pháp luật về nhà ở."},{"k":"p","t":"c) Trường hợp các chuyên gia nước ngoài vẫn là nhân viên của doanh nghiệp ở nước ngoài, chịu sự điều động của doanh nghiệp ở nước ngoài, được doanh nghiệp ở nước ngoài trả lương và hưởng các chế độ của doanh nghiệp ở nước ngoài trong thời gian sang Việt Nam công tác, giữa doanh nghiệp ở nước ngoài và cơ sở kinh doanh tại Việt Nam có hợp đồng bằng văn bản nêu rõ cơ sở kinh doanh tại Việt Nam phải chịu các chi phí về chỗ ở cho các chuyên gia nước ngoài trong thời gian công tác ở Việt Nam thì thuế giá trị gia tăng của khoản tiền thuê nhà cho các chuyên gia nước ngoài làm việc tại Việt Nam do cơ sở kinh doanh tại Việt Nam chi trả được khấu trừ; trường hợp cơ sở kinh doanh có các chuyên gia nước ngoài sang Việt Nam công tác, giữ các chức vụ quản lý tại Việt Nam, hưởng lương tại Việt Nam theo hợp đồng lao động ký với cơ sở kinh doanh tại Việt Nam thì cơ sở kinh doanh không được khấu trừ thuế giá trị gia tăng của khoản tiền thuê nhà cho các chuyên gia nước ngoài này."},{"k":"p","t":"2.  Đối với trường hợp góp vốn bằng tài sản trong đó tài sản góp vốn là tài sản mới mua, chưa sử dụng, có hóa đơn hợp pháp được hội đồng giao nhận vốn góp chấp nhận thì trị giá vốn góp được xác định theo trị giá ghi trên hóa đơn bao gồm cả thuế giá trị gia tăng. Bên nhận vốn góp được khấu trừ thuế giá trị gia tăng ghi trên hóa đơn mua tài sản của bên góp vốn."},{"k":"p","t":"3. Đối với hàng hóa, dịch vụ mua vào dưới hình thức ủy quyền, cơ sở kinh doanh được khấu trừ thuế giá trị gia tăng của hàng hóa, dịch vụ mua vào dưới hình thức ủy quyền cho tổ chức, cá nhân khác mà hóa đơn mang tên tổ chức, cá nhân được ủy quyền bao gồm các trường hợp sau đây:"},{"k":"p","t":"a) Doanh nghiệp bảo hiểm ủy quyền cho người tham gia bảo hiểm sửa chữa tài sản; chi phí sửa chữa tài sản cùng các vật tư, phụ tùng thay thế có hóa đơn giá trị gia tăng ghi tên người tham gia bảo hiểm, doanh nghiệp bảo hiểm thực hiện thanh toán cho người tham gia bảo hiểm phí bảo hiểm tương ứng theo hợp đồng bảo hiểm thì doanh nghiệp bảo hiểm được khấu trừ thuế giá trị gia tăng tương ứng với phần bồi thường bảo hiểm thanh toán theo hóa đơn giá trị gia tăng đứng tên người tham gia bảo hiểm; trường hợp phần bồi thường bảo hiểm do doanh nghiệp bảo hiểm thanh toán cho người tham gia bảo hiểm có giá trị từ 05 triệu đồng trở lên thì phải thực hiện thanh toán không dùng tiền mặt."},{"k":"p","t":"b) Trước khi thành lập doanh nghiệp, các sáng lập viên có văn bản ủy quyền cho tổ chức, cá nhân thực hiện chi hộ một số khoản chi mua sắm hàng hóa, vật tư và chi phí khác liên quan đến việc thành lập doanh nghiệp thì doanh nghiệp được khấu trừ thuế giá trị gia tăng đầu vào theo hóa đơn giá trị gia tăng đứng tên tổ chức, cá nhân được ủy quyền và phải thực hiện thanh toán không dùng tiền mặt cho tổ chức, cá nhân được ủy quyền đối với những hóa đơn có giá trị từ 05 triệu đồng trở lên."},{"k":"p","t":"4. Đối với tài sản cố định là ô tô chở người từ 09 chỗ ngồi trở xuống (trừ ô tô sử dụng vào kinh doanh vận chuyển hàng hóa, hành khách, kinh doanh du lịch, khách sạn; ô tô dùng để làm mẫu và lái thử cho kinh doanh ô tô) có trị giá vượt trên 1,6 tỷ đồng (giá chưa có thuế giá trị gia tăng) thì số thuế giá trị gia tăng đầu vào được khấu trừ tương ứng với phần trị giá đến 1,6 tỷ đồng."},{"k":"p","t":"5. Đối với cơ sở sản xuất, kinh doanh tổ chức sản xuất khép kín, hạch toán tập trung có sử dụng sản phẩm thuộc đối tượng không chịu thuế giá trị gia tăng qua các khâu để sản xuất ra mặt hàng chịu thuế giá trị gia tăng thì số thuế giá trị gia tăng đầu vào tại các khâu được khấu trừ toàn bộ."},{"k":"p","t":"ĐIỀU KIỆN KHẤU TRỪ THUẾ GIÁ TRỊ GIA TĂNG ĐẦU VÀO"}]},{"id":"nd181_25","no":25,"code":"Điều 25","title":"Điều 25. Hóa đơn, chứng từ nộp thuế","shortTitle":"Hóa đơn, chứng từ nộp thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Cơ sở kinh doanh phải có hóa đơn giá trị gia tăng của hàng hóa, dịch vụ mua vào hoặc chứng từ nộp thuế giá trị gia tăng ở khâu nhập khẩu hoặc chứng từ nộp thuế giá trị gia tăng thay cho phía nước ngoài theo quy định tại điểm a khoản 2 Điều 14 Luật Thuế giá trị gia tăng (bao gồm cả chứng từ nộp thuế giá trị gia tăng theo tỷ lệ % nhân với doanh thu thay cho phía nước ngoài)."}]},{"id":"nd181_26","no":26,"code":"Điều 26","title":"Điều 26. Chứng từ thanh toán không dùng tiền mặt","shortTitle":"Chứng từ thanh toán không dùng tiền mặt","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Cơ sở kinh doanh phải có chứng từ thanh toán không dùng tiền mặt đối với hàng hóa, dịch vụ mua vào (bao gồm cả hàng hóa nhập khẩu) từ 05 triệu đồng trở lên đã bao gồm thuế giá trị gia tăng. Trong đó:"},{"k":"p","t":"1. Chứng từ thanh toán không dùng tiền mặt là chứng từ chứng minh việc thanh toán không dùng tiền mặt theo quy định của Nghị định số 52/2024/NĐ-CP ngày 15 tháng 5 năm 2024 của Chính phủ về thanh toán không dùng tiền mặt, trừ các chứng từ bên mua nộp tiền mặt vào tài khoản của bên bán."},{"k":"p","t":"2. Một số trường hợp đặc thù theo quy định tại điểm b khoản 2 Điều 14 Luật Thuế giá trị gia tăng bao gồm:"},{"k":"p","t":"a) Trường hợp hàng hóa, dịch vụ mua vào theo phương thức thanh toán bù trừ giữa giá trị hàng hóa, dịch vụ mua vào với giá trị hàng hóa, dịch vụ bán ra, vay mượn hàng mà phương thức thanh toán này được quy định cụ thể trong hợp đồng thì phải có biên bản đối chiếu số liệu và xác nhận giữa hai bên về việc thanh toán bù trừ giữa hàng hóa, dịch vụ mua vào với hàng hóa, dịch vụ bán ra, vay mượn hàng. Trường hợp bù trừ công nợ qua bên thứ ba phải có biên bản bù trừ công nợ của ba bên làm căn cứ khấu trừ thuế."},{"k":"p","t":"b) Trường hợp hàng hóa, dịch vụ mua vào theo phương thức bù trừ công nợ như vay, mượn tiền; cấn trừ công nợ qua bên thứ ba mà phương thức thanh toán này được quy định cụ thể trong hợp đồng thì phải có hợp đồng vay, mượn tiền dưới hình thức văn bản được lập trước đó và có chứng từ chuyển tiền từ tài khoản của bên cho vay, cho mượn sang tài khoản của bên đi vay, đi mượn đối với khoản vay, mượn bằng tiền bao gồm cả trường hợp bù trừ giữa giá trị hàng hóa, dịch vụ mua vào với khoản tiền mà bên bán hỗ trợ cho bên mua, hoặc nhờ bên mua chi hộ."},{"k":"p","t":"c) Trường hợp hàng hóa, dịch vụ mua vào được thanh toán ủy quyền qua bên thứ ba thanh toán không dùng tiền mặt (bao gồm cả trường hợp bên bán yêu cầu bên mua thanh toán không dùng tiền mặt cho bên thứ ba do bên bán chỉ định) thì việc thanh toán theo ủy quyền hoặc thanh toán cho bên thứ ba theo chỉ định của bên bán phải được quy định cụ thể trong hợp đồng dưới"},{"k":"p","t":"hình thức văn bản và bên thứ ba là một tổ chức hoặc thể nhân đang hoạt động theo quy định của pháp luật."},{"k":"p","t":"d) Trường hợp hàng hóa, dịch vụ mua vào theo phương thức thanh toán tiền hàng hóa, dịch vụ bằng cổ phiếu, trái phiếu mà phương thức thanh toán này được quy định cụ thể trong hợp đồng thì phải có hợp đồng mua bán dưới hình thức văn bản được lập trước đó."},{"k":"p","t":"đ) Trường hợp sau khi thực hiện các hình thức thanh toán nêu tại điểm a, b, c và d khoản này mà phần giá trị còn lại được thanh toán bằng tiền có giá trị từ 05 triệu đồng trở lên thì chỉ được khấu trừ thuế đối với trường hợp có chứng từ thanh toán không dùng tiền mặt."},{"k":"p","t":"e) Trường hợp hàng hóa, dịch vụ mua vào được thanh toán không dùng tiền mặt vào tài khoản của bên thứ ba mở tại Kho bạc Nhà nước để thực hiện cưỡng chế bằng biện pháp thu tiền, tài sản do tổ chức, cá nhân khác đang nắm giữ (theo Quyết định của cơ quan nhà nước có thẩm quyền) thì được khấu trừ thuế giá trị gia tăng đầu vào xác định tương ứng với số tiền chuyển vào tài khoản của bên thứ ba mở tại Kho bạc Nhà nước."},{"k":"p","t":"g) Đối với hàng hóa, dịch vụ mua trả chậm, trả góp có giá trị hàng hóa, dịch vụ mua từ 05 triệu đồng trở lên, cơ sở kinh doanh căn cứ vào hợp đồng mua hàng hóa, dịch vụ bằng văn bản, hóa đơn giá trị gia tăng và chứng từ thanh toán không dùng tiền mặt của hàng hóa, dịch vụ mua trả chậm, trả góp để khấu trừ thuế giá trị gia tăng đầu vào. Trường hợp chưa có chứng từ thanh toán không dùng tiền mặt do chưa đến thời điểm thanh toán theo hợp đồng, phụ lục hợp đồng thì cơ sở kinh doanh vẫn được khấu trừ thuế giá trị gia tăng đầu vào. Trường hợp đến thời điểm thanh toán theo hợp đồng, phụ lục hợp đồng, cơ sở kinh doanh không có chứng từ thanh toán không dùng tiền mặt thì cơ sở kinh doanh phải kê khai, điều chỉnh giảm số thuế giá trị gia tăng đầu vào được khấu trừ đối với phần giá trị hàng hóa, dịch vụ không có chứng từ thanh toán không dùng tiền mặt vào kỳ tính thuế phát sinh nghĩa vụ thanh toán theo hợp đồng, phụ lục hợp đồng."},{"k":"p","t":"h) Trường hợp giá trị hàng hóa, dịch vụ nhập khẩu từng lần có giá trị dưới 05 triệu đồng, hàng hóa, dịch vụ mua vào từng lần theo hóa đơn dưới 05 triệu đồng theo giá đã có thuế giá trị gia tăng và trường hợp cơ sở kinh doanh nhập khẩu hàng hóa là quà biếu, quà tặng, hàng mẫu không phải trả tiền của tổ chức, cá nhân ở nước ngoài thì không cần chứng từ thanh toán không dùng tiền mặt đối với hàng hóa, dịch vụ mua vào."},{"k":"p","t":"i) Trường hợp hàng hóa, dịch vụ mua vào phục vụ cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng được ủy quyền cho cá nhân là người lao động của cơ sở kinh doanh thanh toán không dùng tiền mặt theo quy chế tài chính hoặc quy chế nội bộ của cơ sở kinh doanh, sau đó cơ sở kinh doanh thanh toán lại cho người lao động bằng hình thức thanh toán không dùng tiền mặt thì được khấu trừ thuế giá trị gia tăng đầu vào."},{"k":"p","t":"3. Trường hợp mua hàng hóa, dịch vụ của một người nộp thuế có giá trị dưới 05 triệu đồng nhưng mua nhiều lần trong cùng một ngày có tổng giá trị từ 05 triệu đồng trở lên thì chỉ được khấu trừ thuế đối với trường hợp có chứng từ thanh toán không dùng tiền mặt."}]},{"id":"nd181_27","no":27,"code":"Điều 27","title":"Điều 27. Điều kiện khấu trừ thuế giá trị gia tăng đầu vào đối với hàng hóa, dịch vụ xuất khẩu","shortTitle":"Điều kiện khấu trừ thuế giá trị gia tăng đầu vào đối với hàng hóa, dịch vụ xuất khẩu","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Đối với hàng hóa, dịch vụ xuất khẩu, ngoài các điều kiện quy định tại Điều 25, Điều 26 Nghị định này còn phải có: hợp đồng ký kết với bên nước ngoài về việc bán, gia công hàng hóa, cung cấp dịch vụ; hóa đơn bán hàng hóa, cung cấp dịch vụ; chứng từ thanh toán không dùng tiền mặt; tờ khai hải quan đối với hàng hóa xuất khẩu (trừ trường hợp không cần phải có tờ khai hải quan theo quy định của pháp luật về hải quan); phiếu đóng gói, vận đơn, chứng từ bảo hiểm hàng hóa (nếu có). Trong đó:"},{"k":"p","t":"1. Đối với hợp đồng bán hàng hóa, gia công hàng hóa, cung cấp dịch vụ cho bên nước ngoài (bên nhập khẩu): trường hợp ủy thác xuất khẩu là hợp đồng ủy thác xuất khẩu và biên bản thanh lý hợp đồng ủy thác xuất khẩu (trường hợp đã kết thúc hợp đồng) hoặc biên bản đối chiếu công nợ định kỳ giữa bên ủy thác xuất khẩu và bên nhận ủy thác xuất khẩu có ghi rõ: số lượng, chủng loại sản phẩm, giá trị hàng ủy thác đã xuất khẩu; số, ngày hợp đồng xuất khẩu của bên nhận ủy thác xuất khẩu ký với bên nước ngoài; số, ngày, số tiền ghi trên chứng từ thanh toán không dùng tiền mặt với bên nước ngoài của bên nhận ủy thác xuất khẩu; số, ngày, số tiền ghi trên chứng từ thanh toán của bên nhận ủy thác xuất khẩu thanh toán cho bên ủy thác xuất khẩu; số, ngày tờ khai hải quan hàng hóa xuất khẩu của bên nhận ủy thác xuất khẩu."},{"k":"p","t":"2. Đối với tờ khai hải quan hàng hóa xuất khẩu: tờ khai đã hoàn thành thủ tục hải quan theo quy định của pháp luật về hải quan."},{"k":"p","t":"3. Đối với chứng từ thanh toán không dùng tiền mặt: chứng từ chuyển tiền từ tài khoản của bên nhập khẩu (hoặc ngân hàng phục vụ bên nhập khẩu) sang tài khoản mang tên cơ sở kinh doanh (bên xuất khẩu) mở tại ngân hàng theo các hình thức thanh toán phù hợp với thỏa thuận trong hợp đồng và quy định của ngân hàng. Chứng từ thanh toán tiền là giấy báo có của ngân hàng bên xuất khẩu về số tiền đã nhận được từ tài khoản của ngân hàng bên nhập khẩu. Trường hợp thanh toán trả chậm, phải có thỏa thuận ghi trong hợp đồng, phụ lục hợp đồng xuất khẩu, đến thời hạn thanh toán bên xuất khẩu phải có chứng từ thanh toán không dùng tiền mặt. Trường hợp ủy thác xuất khẩu thì phải có chứng từ thanh toán không dùng tiền mặt của bên nước ngoài cho bên nhận ủy thác và bên nhận ủy thác phải có chứng từ thanh toán không dùng tiền mặt đối với hàng xuất khẩu cho bên ủy thác. Trường hợp bên nước ngoài thanh toán trực tiếp cho bên ủy thác xuất khẩu thì bên ủy thác phải có chứng từ thanh toán không dùng tiền mặt và việc thanh toán này phải được quy định trong hợp đồng. Trường hợp bên xuất khẩu bán các khoản phải thu của bên nhập khẩu cho bên thứ ba (bên mua các khoản phải thu) ở nước ngoài thì phải có chứng từ thanh toán không dùng tiền mặt từ bên thứ ba (bên mua các khoản phải thu), việc thanh toán này phải được quy định trong hợp đồng xuất khẩu và hợp đồng mua bán các khoản phải thu với bên thứ ba ở nước ngoài; bên xuất khẩu phải có văn bản cam kết, giải trình về lý do số tiền thanh toán khác số tiền phải thanh toán theo hợp đồng xuất khẩu phù hợp với hợp đồng mua bán các khoản phải thu. Trừ một số trường hợp không phải đáp ứng điều kiện chứng từ thanh toán không dùng tiền mặt như sau:"},{"k":"p","t":"a) Trường hợp hàng hóa, dịch vụ xuất khẩu được thanh toán cấn trừ vào khoản tiền vay nợ nước ngoài, cơ sở kinh doanh phải có đủ điều kiện, thủ tục, hồ sơ như sau: hợp đồng vay nợ (đối với những khoản vay tài chính có thời hạn dưới 01 năm); hoặc giấy xác nhận đăng ký khoản vay của Ngân hàng Nhà nước Việt Nam (đối với những khoản vay trên 01 năm); chứng từ thanh toán không dùng tiền mặt chuyển tiền của bên nước ngoài vào Việt Nam. Phương thức thanh toán hàng hóa, dịch vụ xuất khẩu cấn trừ vào khoản nợ vay nước ngoài phải được quy định trong hợp đồng xuất khẩu; bản xác nhận của bên nước ngoài về cấn trừ khoản nợ vay; trường hợp sau khi cấn trừ giá trị hàng hóa, dịch vụ xuất khẩu vào khoản nợ vay của nước ngoài có chênh lệch, thì số tiền chênh lệch phải có chứng từ thanh toán không dùng tiền mặt."},{"k":"p","t":"b) Trường hợp cơ sở kinh doanh xuất khẩu sử dụng tiền thanh toán hàng hóa, dịch vụ xuất khẩu để góp vốn với bên nhập khẩu ở nước ngoài, cơ sở kinh doanh phải có đủ điều kiện, thủ tục, hồ sơ như sau: hợp đồng góp vốn; việc sử dụng tiền thanh toán hàng hóa, dịch vụ xuất khẩu để góp vốn vào bên nhập khẩu ở nước ngoài phải được quy định trong hợp đồng xuất khẩu; trường hợp số tiền góp vốn nhỏ hơn doanh thu hàng hóa xuất khẩu thì số tiền chênh lệch phải có chứng từ thanh toán không dùng tiền mặt."},{"k":"p","t":"c) Trường hợp bên nước ngoài ủy quyền cho bên thứ ba là tổ chức, cá nhân ở nước ngoài thực hiện thanh toán thì việc thanh toán theo ủy quyền phải được quy định trong hợp đồng xuất khẩu (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có))."},{"k":"p","t":"d) Trường hợp bên nước ngoài yêu cầu bên thứ ba là tổ chức ở Việt Nam thanh toán bù trừ công nợ với bên nước ngoài bằng thực hiện thanh toán không dùng tiền mặt số tiền bên nước ngoài phải thanh toán cho cơ sở kinh doanh xuất khẩu và việc yêu cầu thanh toán bù trừ công nợ nêu trên có quy định trong hợp đồng xuất khẩu (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có)) và có chứng từ thanh toán là giấy báo có của ngân hàng bên xuất khẩu về số tiền đã nhận được từ tài khoản của bên thứ ba, đồng thời bên xuất khẩu phải có bản đối chiếu công nợ có xác nhận của bên nước ngoài và bên thứ ba."},{"k":"p","t":"đ) Trường hợp bên nước ngoài (bên nhập khẩu) ủy quyền cho bên thứ ba là tổ chức, cá nhân ở nước ngoài thực hiện thanh toán; bên thứ ba yêu cầu tổ chức ở Việt Nam (bên thứ tư) thanh toán bù trừ công nợ với bên thứ ba bằng việc thực hiện thanh toán không dùng tiền mặt số tiền bên nhập khẩu phải thanh toán cho bên xuất khẩu thì bên xuất khẩu phải có đủ các điều kiện, hồ sơ như sau: hợp đồng xuất khẩu (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có)) quy định việc ủy quyền thanh toán, bù trừ công nợ giữa các bên; chứng từ thanh toán là giấy báo có của ngân hàng về số tiền bên xuất khẩu nhận được từ tài khoản của bên thứ tư; bản đối chiếu công nợ có xác nhận của các bên liên quan (giữa bên xuất khẩu với bên nhập khẩu, giữa bên thứ ba ở nước ngoài với bên thứ tư là tổ chức ở Việt Nam)."},{"k":"p","t":"e) Trường hợp bên nước ngoài ủy quyền cho Văn phòng đại diện tại Việt Nam thực hiện thanh toán vào tài khoản của bên xuất khẩu và việc ủy quyền thanh toán nêu trên có quy định trong hợp đồng xuất khẩu (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có))."},{"k":"p","t":"g) Trường hợp bên nước ngoài (trừ trường hợp bên nước ngoài là cá nhân) thực hiện thanh toán từ tài khoản tiền gửi vãng lai của bên nước ngoài mở tại các tổ chức tín dụng tại Việt Nam thì việc thanh toán này phải được quy định trong hợp đồng xuất khẩu (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có)). Chứng từ thanh toán là giấy báo có của ngân hàng bên xuất khẩu về số tiền đã nhận được từ tài khoản vãng lai của bên nước ngoài đã ký hợp đồng."},{"k":"p","t":"h) Trường hợp bên nước ngoài là doanh nghiệp tư nhân thực hiện thanh toán thông qua tài khoản vãng lai của chủ doanh nghiệp tư nhân mở tại tổ chức tín dụng ở Việt Nam và được quy định trong hợp đồng xuất khẩu (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có)) thì được xác định là thanh toán không dùng tiền mặt. Trường hợp người mua bên nước ngoài là doanh nghiệp tư nhân nhập cảnh qua các cửa khẩu quốc tế của Việt Nam bằng hộ chiếu mang theo ngoại tệ tiền mặt, đồng Việt Nam tiền mặt để nộp vào tài khoản vãng lai của chủ doanh nghiệp tư nhân mở tại tổ chức tín dụng ở Việt Nam phải khai báo hải quan cửa khẩu khi xuất cảnh, nhập cảnh theo hướng dẫn của Ngân hàng Nhà nước Việt Nam."},{"k":"p","t":"i) Trường hợp bên nước ngoài thực hiện thanh toán không dùng tiền mặt nhưng số tiền thanh toán trên chứng từ thanh toán không dùng tiền mặt không phù hợp với số tiền phải thanh toán như đã thỏa thuận trong hợp đồng hoặc phụ lục hợp đồng thì: nếu số tiền thanh toán trên chứng từ thanh toán không dùng tiền mặt có trị giá nhỏ hơn số tiền phải thanh toán như đã thỏa thuận trong hợp đồng hoặc phụ lục hợp đồng thì cơ sở kinh doanh phải giải trình rõ lý do như: phí chuyển tiền của ngân hàng, điều chỉnh giảm giá do hàng kém chất lượng hoặc thiếu hụt (đối với trường hợp này phải có văn bản thỏa thuận giảm giá giữa bên nhập khẩu và bên xuất khẩu); nếu số tiền thanh toán trên chứng từ thanh toán không dùng tiền mặt có trị giá lớn hơn số tiền phải thanh toán như đã thỏa thuận trong hợp đồng hoặc phụ lục hợp đồng thì cơ sở kinh doanh phải giải trình rõ lý do như: thanh toán một lần cho nhiều hợp đồng, ứng trước tiền hàng; cơ sở kinh doanh phải cam kết chịu trách nhiệm trước pháp luật về các lý do giải trình với cơ quan thuế và các văn bản điều chỉnh (nếu có)."},{"k":"p","t":"k) Trường hợp bên nước ngoài thanh toán không dùng tiền mặt nhưng chứng từ thanh toán không dùng tiền mặt không đúng tên ngân hàng phải thanh toán đã thỏa thuận trong hợp đồng, nếu nội dung chứng từ thể hiện rõ tên người thanh toán, tên người thụ hưởng, số hợp đồng xuất khẩu, giá trị thanh toán phù hợp với hợp đồng xuất khẩu đã được ký kết thì được chấp nhận là chứng từ thanh toán hợp lệ."},{"k":"p","t":"l) Trường hợp cơ sở kinh doanh xuất khẩu hàng hóa, dịch vụ cho bên nước ngoài (bên thứ hai), đồng thời nhập khẩu hàng hóa, dịch vụ với bên nước ngoài khác hoặc mua hàng với tổ chức, cá nhân ở Việt Nam (bên thứ ba); nếu cơ sở kinh doanh có thỏa thuận với bên thứ hai và bên thứ ba về việc bên thứ hai thực hiện thanh toán không dùng tiền mặt cho bên thứ ba số tiền mà cơ sở kinh doanh còn phải thanh toán cho bên thứ ba thì việc bù trừ thanh toán giữa các bên phải được quy định trong hợp đồng xuất khẩu, hợp đồng nhập khẩu hoặc hợp đồng mua hàng (phụ lục hợp đồng hoặc văn bản điều chỉnh hợp đồng (nếu có)) và cơ sở kinh doanh phải có bản đối chiếu công nợ có xác nhận của các bên liên quan (giữa cơ sở kinh doanh với bên thứ hai, giữa cơ sở kinh doanh với bên thứ ba)."},{"k":"p","t":"m) Trường hợp hàng hóa xuất khẩu ra nước ngoài nhưng vì lý do khách quan bên nước ngoài từ chối không nhận hàng và cơ sở kinh doanh tìm được khách hàng mới cùng quốc gia với khách hàng ký kết hợp đồng mua bán ban đầu để bán lô hàng trên thì chứng từ khấu trừ gồm toàn bộ hồ sơ xuất khẩu liên quan đến hợp đồng xuất khẩu ký kết với khách hàng ban đầu (hợp đồng, tờ khai hải quan đối với hàng hóa xuất khẩu, hóa đơn), công văn giải trình của cơ sở kinh doanh lý do có sự sai khác tên khách hàng mua (trong đó cơ sở kinh doanh cam kết tự chịu trách nhiệm về tính chính xác của thông tin, đảm bảo không có gian lận), toàn bộ hồ sơ xuất khẩu liên quan đến hợp đồng xuất khẩu ký kết với khách hàng mới (hợp đồng, hóa đơn bán hàng, chứng từ thanh toán không dùng tiền mặt theo quy định và các chứng từ khác (nếu có))."},{"k":"p","t":"n) Trường hợp xuất khẩu lao động mà cơ sở kinh doanh xuất khẩu lao động thu tiền trực tiếp của người lao động thì phải có chứng từ thu tiền của người lao động."},{"k":"p","t":"o) Trường hợp xuất khẩu hàng hóa, dịch vụ để trả nợ nước ngoài cho Chính phủ thì phải có xác nhận của ngân hàng về lô hàng xuất khẩu đã được bên nước ngoài chấp nhận trừ nợ hoặc xác nhận bộ chứng từ đã được gửi cho bên nước ngoài để trừ nợ; chứng từ thanh toán thực hiện theo hướng dẫn của Bộ Tài chính."},{"k":"p","t":"p) Trường hợp hàng hóa, dịch vụ xuất khẩu thanh toán bằng hàng là trường hợp xuất khẩu hàng hóa (kể cả gia công hàng hóa xuất khẩu), dịch vụ cho bên nước ngoài nhưng việc thanh toán giữa cơ sở kinh doanh xuất khẩu và bên nước ngoài bằng hình thức bù trừ giữa giá trị hàng hóa, dịch vụ xuất khẩu, tiền công gia công hàng hóa xuất khẩu với giá trị hàng hóa, dịch vụ mua của bên nước ngoài. Hàng hóa, dịch vụ xuất khẩu thanh toán bằng hàng thì: phương thức thanh toán đối với hàng xuất khẩu bằng hàng phải được quy định trong hợp đồng xuất khẩu; hợp đồng mua hàng hóa, dịch vụ của bên nước ngoài; có tờ khai hải quan về hàng hóa nhập khẩu thanh toán bù trừ với hàng hóa, dịch vụ xuất khẩu; có văn bản xác nhận với bên nước ngoài về việc số tiền thanh toán bù trừ giữa hàng hóa, dịch vụ xuất khẩu với hàng hóa nhập khẩu, dịch vụ mua của bên nước ngoài; trường hợp sau khi thanh toán bù trừ giữa giá trị hàng hóa, dịch vụ xuất khẩu và giá trị hàng hóa, dịch vụ nhập khẩu có chênh lệch, số tiền chênh lệch phải có chứng từ thanh toán không dùng tiền mặt."},{"k":"p","t":"q) Trường hợp xuất khẩu hàng hóa sang các nước có chung biên giới theo quy định của pháp luật về việc quản lý hoạt động thương mại biên giới với các nước có chung biên giới thực hiện theo hướng dẫn của Bộ Tài chính và Ngân hàng Nhà nước Việt Nam."},{"k":"p","t":"r) Trường hợp bên nước ngoài mất khả năng thanh toán, cơ sở kinh doanh xuất khẩu hàng hóa phải có văn bản giải trình rõ lý do và được sử dụng một trong số các giấy tờ sau để thay thế cho chứng từ thanh toán không dùng tiền mặt: tờ khai hải quan hàng hóa nhập khẩu từ Việt Nam đã đăng ký với cơ quan hải quan tại nước nhập khẩu hàng hóa (01 bản sao); hoặc đơn khởi kiện đến tòa án hoặc cơ quan có thẩm quyền tại nước nơi cư trú kèm giấy thông báo hoặc kèm giấy tờ có tính chất xác nhận của cơ quan này về việc thụ lý đơn khởi kiện (01 bản sao); hoặc phán quyết thắng kiện của tòa án nước ngoài cho cơ sở kinh doanh (01 bản sao); hoặc giấy tờ của tổ chức có thẩm quyền nước ngoài xác nhận (hoặc thông báo) bên nước ngoài phá sản hoặc mất khả năng thanh toán (01 bản sao)."},{"k":"p","t":"s) Trường hợp hàng hóa xuất khẩu không đảm bảo chất lượng phải tiêu hủy, cơ sở kinh doanh xuất khẩu hàng hóa phải có văn bản giải trình rõ lý do và được sử dụng biên bản tiêu hủy (hoặc giấy tờ xác nhận việc tiêu hủy) hàng hóa ở nước ngoài của cơ quan thực hiện tiêu hủy (01 bản sao), kèm chứng từ thanh toán không dùng tiền mặt đối với chi phí tiêu hủy thuộc trách nhiệm chi trả của cơ sở kinh doanh xuất khẩu hàng hóa hoặc kèm giấy tờ chứng minh chi phí tiêu hủy thuộc trách nhiệm của bên nhập khẩu hoặc bên thứ ba (01 bản sao) để thay thế cho chứng từ thanh toán không dùng tiền mặt. Trường hợp bên nhập khẩu hàng hóa phải đứng ra làm thủ tục tiêu hủy tại nước ngoài thì biên bản tiêu hủy (hoặc giấy tờ xác nhận việc tiêu hủy) ghi tên bên nhập khẩu hàng hóa."},{"k":"p","t":"t) Trường hợp hàng hóa xuất khẩu bị tổn thất, cơ sở kinh doanh xuất khẩu hàng hóa phải có văn bản giải trình rõ lý do và được sử dụng một trong số các giấy tờ sau để thay thế cho chứng từ thanh toán không dùng tiền mặt: giấy xác nhận việc tổn thất ngoài biên giới Việt Nam của cơ quan có thẩm quyền liên quan (01 bản sao); hoặc biên bản xác định tổn thất hàng hóa trong quá trình vận chuyển ngoài biên giới Việt Nam nêu rõ nguyên nhân tổn thất (01 bản sao). Nếu cơ sở kinh doanh xuất khẩu hàng hóa đã nhận được tiền bồi thường hàng hóa xuất khẩu bị tổn thất ngoài biên giới Việt Nam thì phải gửi kèm chứng từ thanh toán không dùng tiền mặt về số tiền nhận được (01 bản sao)."},{"k":"p","t":"u) Bản sao các loại giấy tờ quy định tại khoản này phải có xác nhận sao y bản chính của cơ sở kinh doanh xuất khẩu hàng hóa. Trường hợp ngôn ngữ sử dụng trong các chứng từ, giấy tờ xác nhận của bên thứ ba thay thế cho chứng từ thanh toán không dùng tiền mặt không phải là tiếng Anh hoặc không có tiếng Anh thì phải có 01 bản dịch công chứng gửi kèm. Trường hợp các bên liên quan phát hành, sử dụng và lưu trữ chứng từ dưới dạng điện tử thì phải có bản in bằng giấy. Cơ sở kinh doanh xuất khẩu hàng hóa tự chịu hoàn toàn trách nhiệm về tính chính xác của các loại giấy tờ thay thế cho chứng từ thanh toán không dùng tiền mặt cho các trường hợp quy định tại khoản này."},{"k":"p","t":"4. Đối với hóa đơn bán hàng hóa, cung cấp dịch vụ: hóa đơn thương mại hoặc hóa đơn giá trị gia tăng theo quy định của pháp luật về hóa đơn, chứng từ."}]},{"id":"nd181_28","no":28,"code":"Điều 28","title":"Điều 28. Điều kiện khấu trừ thuế giá trị gia tăng đầu vào đối với một số trường hợp hàng hóa, dịch vụ đặc thù","shortTitle":"Điều kiện khấu trừ thuế giá trị gia tăng đầu vào đối với một số trường hợp hàng hóa, dịch vụ đặc thù","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Điều kiện khấu trừ thuế giá trị gia tăng đầu vào đối với trường hợp xuất khẩu hàng hóa qua sàn thương mại điện tử ở nước ngoài và một số trường hợp đặc thù khác ngoài các điều kiện khấu trừ thuế giá trị gia tăng đầu vào quy định tại Điều 25, Điều 26 Nghị định này, cơ sở xuất khẩu hàng hóa phải có tài liệu chứng minh việc đã xuất bán hàng hóa ở ngoài Việt Nam. Trong đó:"},{"k":"p","t":"1. Đối với trường hợp xuất khẩu hàng hóa qua sàn thương mại điện tử ở nước ngoài: cơ sở kinh doanh xuất khẩu hàng hóa phải có tài liệu chứng minh việc đã xuất bán hàng hóa ở ngoài Việt Nam như: hợp đồng ký với nhà quản lý sàn giao dịch thương mại điện tử để bán hàng hóa trên sàn thương mại điện tử ở nước ngoài (việc giao dịch bán hàng giữa cơ sở kinh doanh và người mua ở nước ngoài phải đáp ứng đầy đủ các quy định về giao kết hợp đồng sử dụng chức năng đặt hàng trực tuyến trên sàn thương mại điện tử ở nước ngoài theo quy định của pháp luật thương mại, pháp luật thương mại điện tử và pháp luật về giao dịch điện tử); hóa đơn bán hàng hóa; chứng từ thanh toán không dùng tiền mặt (trường hợp cơ sở kinh doanh xuất khẩu hàng hóa ủy quyền cho tổ chức trung gian là các nhà quản lý sàn giao dịch thương mại điện tử thu hộ tiền từ người mua ở nước ngoài thì việc thanh toán ủy quyền phải được quy định trong hợp đồng với nhà quản lý sàn giao dịch thương mại điện tử); tờ khai đã hoàn thành thủ tục hải quan theo quy định của pháp luật về hải quan khi gửi hàng ra nước ngoài; tài liệu chứng minh giao hàng cho người mua ở nước ngoài; phiếu đóng gói, vận đơn, chứng từ bảo hiểm hàng hóa (nếu có)."},{"k":"p","t":"2. Đối với trường hợp xuất khẩu hàng hóa đã gửi tại kho ngoại quan ở nước ngoài: cơ sở kinh doanh xuất khẩu hàng hóa phải có tài liệu chứng minh việc đã xuất bán hàng hóa ở ngoài Việt Nam như: hợp đồng xuất khẩu hàng hóa; hợp đồng ủy thác xuất khẩu; hóa đơn bán hàng hóa; chứng từ thanh toán không dùng tiền mặt; tờ khai đã hoàn thành thủ tục hải quan theo quy định của pháp luật về hải quan khi gửi hàng ra nước ngoài; tài liệu chứng minh giao hàng cho người nhập khẩu ở nước ngoài (tờ khai đã hoàn thành thủ tục hải quan khi xuất hàng để giao cho người mua của quốc gia gửi hàng hoặc tài liệu chứng minh hàng hóa đã bán tại kho ngoại quan); phiếu đóng gói, vận đơn, chứng từ bảo hiểm hàng hóa (nếu có)."},{"k":"p","t":"3. Đối với trường hợp xuất khẩu hàng hóa tại hội chợ, triển lãm ở nước ngoài: cơ sở kinh doanh xuất khẩu hàng hóa phải có tài liệu chứng minh việc đã xuất bán hàng hóa ở ngoài Việt Nam như: chứng từ thanh toán không dùng tiền mặt, nếu thu và chuyển về nước bằng tiền mặt ngoại tệ tại nước tổ chức hội chợ, triển lãm thương mại, cơ sở kinh doanh phải có chứng từ kê khai với cơ quan hải quan về tiền ngoại tệ thu được do bán hàng hóa chuyển về nước và chứng từ nộp tiền vào ngân hàng tại Việt Nam."},{"k":"p","t":"4. Đối với hàng hóa đã bán tại khu vực cách ly cho cá nhân (người nước ngoài hoặc người Việt Nam) đã làm thủ tục xuất cảnh; hàng hóa đã bán tại cửa hàng miễn thuế: cơ sở kinh doanh phải có tài liệu chứng minh việc hàng hóa đã bán tại khu vực cách ly, cửa hàng miễn thuế; cơ sở kinh doanh phải có Bảng kê hàng hóa đã bán cho khách xuất cảnh tại khu vực cách ly, cửa hàng miễn thuế theo mẫu tại Phụ lục III ban hành kèm theo Nghị định này."},{"k":"p","t":"5. Đối với sản phẩm nội dung thông tin số cung cấp cho bên nước ngoài: cơ sở kinh doanh cung cấp dịch vụ phải có hồ sơ, tài liệu chứng minh dịch vụ được tiêu dùng ở ngoài Việt Nam theo quy định tại điểm d khoản 3 Điều 17 Nghị định này và có chứng từ thanh toán không dùng tiền mặt."},{"k":"p","t":"6. Đối với hàng hóa gia công chuyển tiếp để xuất khẩu là hàng hóa gia công chuyển tiếp theo quy định của pháp luật thương mại và pháp luật về quản lý ngoại thương: hợp đồng gia công xuất khẩu và các phụ lục hợp đồng (nếu có) ký với nước ngoài, trong đó ghi rõ cơ sở nhận hàng tại Việt Nam; hóa đơn giá trị gia tăng ghi rõ giá gia công và số lượng hàng gia công trả nước ngoài (theo giá quy định trong hợp đồng ký với nước ngoài) và tên cơ sở nhận hàng theo chỉ định của bên nước ngoài; phiếu chuyển giao sản phẩm gia công chuyển tiếp (gọi tắt là Phiếu chuyển tiếp) có đủ xác nhận của bên giao, bên nhận sản phẩm gia công chuyển tiếp; hàng hóa gia công cho nước ngoài phải thanh toán không dùng tiền mặt theo quy định của pháp luật; tờ khai hải quan thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"7. Đối với hoạt động xây dựng, lắp đặt công trình ở nước ngoài hoặc ở trong khu phi thuế quan: có hợp đồng xây dựng, lắp đặt công trình ở nước ngoài hoặc ở trong khu phi thuế quan; có chứng từ thanh toán không dùng tiền mặt theo quy định của pháp luật."},{"k":"p","t":"8. Trường hợp hàng hóa, vật tư do cơ sở kinh doanh xuất khẩu để thực hiện công trình xây dựng ở nước ngoài, ngoài quy định tại khoản 7 Điều này, cơ sở kinh doanh phải đáp ứng các điều kiện sau: tờ khai hải quan; hàng hóa, vật tư xuất khẩu phải phù hợp với Danh mục hàng hóa xuất khẩu để thực hiện công trình xây dựng ở nước ngoài do Giám đốc doanh nghiệp Việt Nam thực hiện công trình xây dựng ở nước ngoài phê duyệt; hợp đồng ủy thác xuất khẩu (trường hợp ủy thác xuất khẩu)."},{"k":"p","t":"9. Trường hợp cơ sở kinh doanh có hàng hóa xuất khẩu đã có xác nhận của cơ quan hải quan nhưng không có đủ các thủ tục, hồ sơ khác về điều kiện khấu trừ thuế giá trị gia tăng đầu vào theo quy định đối với từng trường hợp cụ thể quy định tại Mục này thì không được khấu trừ thuế giá trị gia tăng đầu vào, không phải tính thuế giá trị gia tăng đầu ra. Riêng đối với trường hợp hàng hóa gia công chuyển tiếp, nếu không có đủ các thủ tục, hồ sơ về điều kiện khấu trừ thuế giá trị gia tăng đầu vào theo quy định thì phải tính và nộp thuế giá trị gia tăng như hàng hóa tiêu thụ nội địa. Đối với cơ sở kinh doanh có dịch vụ xuất khẩu nếu không đáp ứng điều kiện về thanh toán không dùng tiền mặt theo quy định thì không được khấu trừ thuế giá trị gia tăng đầu vào, không phải tính thuế giá trị gia tăng đầu ra."},{"k":"p","t":"HOÀN THUẾ GIÁ TRỊ GIA TĂNG"}]},{"id":"nd181_29","no":29,"code":"Điều 29","title":"Điều 29. Hoàn thuế đối với xuất khẩu","shortTitle":"Hoàn thuế đối với xuất khẩu","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Cơ sở kinh doanh trong tháng, quý có hàng hóa, dịch vụ xuất khẩu nếu có số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn thuế giá trị gia tăng theo tháng, quý, trừ trường hợp hàng hóa nhập khẩu sau đó xuất khẩu sang nước khác. Trong đó:"},{"k":"p","t":"a) Đối tượng được hoàn thuế trong một số trường hợp xuất khẩu được xác định như sau: đối với trường hợp ủy thác xuất khẩu là cơ sở kinh doanh có hàng hóa ủy thác xuất khẩu; đối với gia công chuyển tiếp là cơ sở kinh doanh ký hợp đồng gia công xuất khẩu với bên nước ngoài; đối với hàng hóa xuất khẩu để thực hiện công trình xây dựng ở nước ngoài là cơ sở kinh doanh có hàng hóa xuất khẩu thực hiện công trình xây dựng ở nước ngoài."},{"k":"p","t":"b) Hàng hóa nhập khẩu sau đó xuất khẩu sang nước khác là hàng hóa do cơ sở kinh doanh nhập khẩu từ nước ngoài vào Việt Nam sau đó trực tiếp xuất khẩu hoặc ủy thác xuất khẩu, không bao gồm hàng hóa là nguyên liệu nhập khẩu để sản xuất, gia công hàng xuất khẩu."},{"k":"p","t":"2. Cơ sở kinh doanh trong tháng, quý vừa có hàng hóa, dịch vụ xuất khẩu, vừa có hàng hóa, dịch vụ tiêu thụ nội địa thì cơ sở kinh doanh phải hạch toán riêng số thuế giá trị gia tăng đầu vào sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ xuất khẩu; trường hợp không hạch toán riêng được thì số thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ xuất khẩu được xác định theo tỷ lệ giữa doanh thu của hàng hóa, dịch vụ xuất khẩu trên tổng doanh thu hàng hóa, dịch vụ chịu thuế của kỳ hoàn thuế. Kỳ hoàn thuế được xác định từ kỳ tính thuế giá trị gia tăng có số thuế giá trị gia tăng đầu vào chưa khấu trừ hết liên tục chưa được hoàn thuế đến kỳ tính thuế có đề nghị hoàn thuế, số thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ xuất khẩu (bao gồm số thuế giá trị gia tăng đầu vào hạch toán riêng được và số thuế giá trị gia tăng đầu vào được xác định theo tỷ lệ nêu trên) nếu sau khi bù trừ với số thuế giá trị gia tăng phải nộp của hàng hóa, dịch vụ tiêu thụ nội địa còn lại từ 300 triệu đồng trở lên thì cơ sở kinh doanh được hoàn thuế cho hàng hóa, dịch vụ xuất khẩu. Số thuế giá trị gia tăng được hoàn của hàng hóa, dịch vụ xuất khẩu không vượt quá 10% doanh thu của hàng hóa, dịch vụ xuất khẩu của kỳ hoàn thuế. Số thuế giá trị gia tăng đầu vào đã được xác định cho hàng hóa, dịch vụ xuất khẩu nhưng chưa được hoàn do vượt quá 10% doanh thu của hàng hóa, dịch vụ xuất khẩu của kỳ hoàn thuế trước được khấu trừ vào kỳ tính thuế tiếp theo để xác định số thuế giá trị gia tăng được hoàn của hàng hóa, dịch vụ xuất khẩu kỳ hoàn thuế tiếp theo. Bộ Tài chính quy định cách xác định số thuế giá trị gia tăng được hoàn đối với hàng hóa, dịch vụ xuất khẩu."}]},{"id":"nd181_30","no":30,"code":"Điều 30","title":"Điều 30. Hoàn thuế đối với đầu tư","shortTitle":"Hoàn thuế đối với đầu tư","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Cơ sở kinh doanh đã đăng ký nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế có dự án đầu tư (dự án đầu tư mới, dự án đầu tư mở rộng) theo quy định của pháp luật về đầu tư (bao gồm cả dự án đầu tư được chia thành nhiều giai đoạn đầu tư hoặc nhiều hạng mục đầu tư, trừ trường hợp dự án đầu tư không hình thành tài sản cố định của doanh nghiệp) đang trong giai đoạn đầu tư hoặc dự án tìm kiếm thăm dò, phát triển mỏ dầu khí đang trong giai đoạn đầu tư có số thuế giá trị gia tăng đầu vào phát sinh trong giai đoạn đầu tư mà chưa được hoàn thuế thì cơ sở kinh doanh thực hiện bù trừ với số thuế giá trị gia tăng phải nộp của hoạt động sản xuất, kinh doanh đang thực hiện (nếu có). Sau khi bù trừ nếu số thuế giá trị gia tăng đầu vào của dự án đầu tư chưa được khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn thuế giá trị gia tăng. Trường hợp dự án đầu tư đã hoàn thành (bao gồm cả dự án đầu tư chia thành nhiều giai đoạn, hạng mục đầu tư có giai đoạn, hạng mục đầu tư đã hoàn thành) nhưng cơ sở kinh doanh chưa thực hiện hoàn thuế giá trị gia tăng phát sinh trong giai đoạn đầu tư (hạng mục đầu tư, giai đoạn đầu tư đã hoàn thành) thì cơ sở kinh doanh thực hiện nộp hồ sơ hoàn thuế giá trị gia tăng theo quy định trong thời hạn 01 năm kể từ ngày dự án đầu tư hoặc ngày giai đoạn đầu tư, hạng mục đầu tư hoàn thành. Ngày dự án đầu tư hoặc ngày giai đoạn, hạng mục đầu tư hoàn thành là ngày phát sinh doanh thu của dự án đầu tư hoặc ngày phát sinh doanh thu của giai đoạn, hạng mục đầu tư. Doanh thu quy định tại Điều này không bao gồm doanh thu phát sinh trong giai đoạn chạy thử, doanh thu hoạt động tài chính, thanh lý nguyên vật liệu của dự án đầu tư."},{"k":"p","t":"Trường hợp cơ sở kinh doanh là chủ dự án đầu tư thành lập tổ chức kinh tế mới hoặc giao cho Ban Quản lý dự án, chi nhánh trực tiếp thực hiện, quản lý dự án đầu tư thì tổ chức kinh tế mới thành lập, Ban Quản lý dự án, chi nhánh được khấu trừ và hoàn thuế giá trị gia tăng đối với dự án đầu tư. Tổ chức kinh tế mới thành lập, Ban Quản lý dự án, chi nhánh phải bù trừ số thuế giá trị gia tăng của hàng hóa, dịch vụ mua vào sử dụng cho dự án đầu tư với số thuế giá trị gia tăng phải nộp của hoạt động sản xuất, kinh doanh đang thực hiện của cơ sở kinh doanh, tổ chức kinh tế, chi nhánh cùng kỳ tính thuế (nếu có). Sau khi bù trừ nếu số thuế giá trị gia tăng đầu vào của dự án đầu tư chưa được khấu trừ hết từ 300 triệu đồng trở lên thì được hoàn thuế giá trị gia tăng theo quy định tại Điều này. Khi dự án đầu tư, giai đoạn đầu tư, hạng mục đầu tư đã hoàn thành, trường hợp tổ chức kinh tế mới thành lập, Ban Quản lý dự án, chi nhánh không tiếp tục quản lý, vận hành hoạt động sản xuất, kinh doanh mà do chủ dự án đầu tư trực tiếp quản lý, vận hành hoạt động sản xuất, kinh doanh hoặc giao cho cơ sở kinh doanh khác quản lý, vận hành hoạt động sản xuất, kinh doanh thì tổ chức kinh tế mới thành lập, Ban Quản lý dự án, chi nhánh phải bàn giao số thuế giá trị gia tăng chưa khấu trừ hết của dự án đầu tư để bàn giao cho chủ dự án đầu tư hoặc cơ sở kinh doanh được giao quản lý, vận hành hoạt động sản xuất, kinh doanh để tiếp tục kê khai, khấu trừ cho hoạt động sản xuất, kinh doanh vào kỳ tính thuế tiếp theo ngày dự án đầu tư hoặc ngày giai đoạn đầu tư, hạng mục đầu tư hoàn thành."},{"k":"p","t":"Trường hợp dự án đầu tư đang trong giai đoạn đầu tư chưa đi vào hoạt động sản xuất, kinh doanh nhưng phải chấm dứt hoạt động của dự án đầu tư, chưa phát sinh thuế giá trị gia tăng đầu ra của hoạt động sản xuất, kinh doanh chính theo dự án đầu tư thì cơ sở kinh doanh phải nộp lại số thuế giá trị gia tăng đã được hoàn của dự án đầu tư vào ngân sách nhà nước theo quy định của pháp luật về quản lý thuế; đối với số thuế giá trị gia tăng chưa được hoàn thì không được giải quyết hoàn thuế."},{"k":"p","t":"2. Đối với dự án đầu tư của cơ sở kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện thuộc các trường hợp sau thì cơ sở kinh doanh được hoàn thuế giá trị gia tăng đối với dự án đầu tư theo quy định tại khoản 1 Điều này:"},{"k":"p","t":"a) Dự án đầu tư trong giai đoạn đầu tư, theo quy định của pháp luật đầu tư, pháp luật chuyên ngành đã được cơ quan nhà nước có thẩm quyền cấp giấy kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện theo một trong các hình thức: giấy phép hoặc giấy chứng nhận hoặc văn bản xác nhận, chấp thuận."},{"k":"p","t":"b) Dự án đầu tư trong giai đoạn đầu tư, theo quy định của pháp luật đầu tư, pháp luật chuyên ngành chưa phải đề nghị cơ quan nhà nước có thẩm quyền cấp giấy kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện theo một trong các hình thức: giấy phép hoặc giấy chứng nhận hoặc văn bản xác nhận, chấp thuận."},{"k":"p","t":"c) Dự án đầu tư theo quy định của pháp luật đầu tư, pháp luật chuyên ngành không phải có giấy kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện theo một trong các hình thức: giấy phép hoặc giấy chứng nhận hoặc văn bản xác nhận, chấp thuận."},{"k":"p","t":"3. Cơ sở kinh doanh không được hoàn thuế giá trị gia tăng mà được kết chuyển số thuế chưa được khấu trừ của dự án đầu tư theo quy định của pháp luật về đầu tư sang kỳ tiếp theo đối với các trường hợp sau đây:"},{"k":"p","t":"a) Dự án đầu tư của cơ sở kinh doanh không góp đủ số vốn điều lệ như đã đăng ký tại thời điểm nộp hồ sơ hoàn thuế."},{"k":"p","t":"b) Dự án đầu tư của cơ sở kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện khi chưa đủ các điều kiện kinh doanh theo quy định của pháp luật về đầu tư trừ trường hợp quy định tại khoản 2 Điều này."},{"k":"p","t":"c) Dự án đầu tư của cơ sở kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện không bảo đảm duy trì đủ điều kiện kinh doanh trong quá trình hoạt động là dự án đầu tư của cơ sở kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện nhưng trong quá trình hoạt động cơ sở kinh doanh bị thu hồi một trong các giấy kinh doanh ngành, nghề đầu tư kinh doanh có điều kiện: giấy phép hoặc giấy chứng nhận hoặc văn bản xác nhận, chấp thuận; hoặc trong quá trình hoạt động cơ sở kinh doanh không đáp ứng được điều kiện để thực hiện đầu tư kinh doanh có điều kiện theo quy định của pháp luật về đầu tư thì thời điểm không hoàn thuế giá trị gia tăng được tính từ thời điểm cơ sở kinh doanh bị thu hồi một trong các loại giấy tờ nêu trên hoặc từ thời điểm cơ quan nhà nước có thẩm quyền kiểm tra, phát hiện cơ sở kinh doanh không đáp ứng được các điều kiện về đầu tư kinh doanh có điều kiện."},{"k":"p","t":"d) Dự án đầu tư khai thác tài nguyên, khoáng sản (không bao gồm dự án tìm kiếm thăm dò, phát triển mỏ dầu khí quy định tại khoản 1 Điều này) và dự án đầu tư sản xuất sản phẩm là tài nguyên, khoáng sản khai thác đã chế biến thành sản phẩm khác quy định tại khoản 14 Điều 4 của Nghị định này."}]},{"id":"nd181_31","no":31,"code":"Điều 31","title":"Điều 31. Hoàn thuế đối với hàng hóa, dịch vụ chịu thuế suất thuế giá trị gia tăng 5%","shortTitle":"Hoàn thuế đối với hàng hóa, dịch vụ chịu thuế suất thuế giá trị gia tăng 5%","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Cơ sở kinh doanh chỉ sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% nếu có số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết từ 300 triệu đồng trở lên sau 12 tháng liên tục hoặc 04 quý liên tục thì được hoàn thuế giá trị gia tăng. Trường hợp cơ sở kinh doanh sản xuất hàng hóa, cung cấp dịch vụ chịu nhiều mức thuế suất thuế giá trị gia tăng thì cơ sở kinh doanh phải hạch toán riêng số thuế giá trị gia tăng đầu vào sử dụng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5%, đối với số thuế giá trị gia tăng đầu vào sử dụng đồng thời cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% và sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ chịu nhiều mức thuế suất khác (bao gồm hàng hóa chịu thuế suất thuế giá trị gia tăng 5% khâu kinh doanh thương mại) nếu không hạch toán riêng được thì số thuế giá trị gia tăng đầu vào sử dụng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% được xác định theo tỷ lệ giữa doanh thu của hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% trên tổng doanh thu hàng hóa, dịch vụ chịu thuế của kỳ hoàn thuế. Kỳ hoàn thuế được xác định từ kỳ tính thuế giá trị gia tăng theo thuế suất thuế giá trị gia tăng 5% có số thuế giá trị gia tăng đầu vào chưa khấu trừ hết liên tục chưa được hoàn thuế đến kỳ tính thuế có đề nghị hoàn thuế, số thuế giá trị gia tăng đầu vào sử dụng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% (bao gồm số thuế giá trị gia tăng đầu vào hạch toán riêng được và số thuế giá trị gia tăng đầu vào được xác định theo tỷ lệ nêu trên) nếu sau khi bù trừ với số thuế giá trị gia tăng phải nộp của hàng hóa, dịch vụ chịu thuế (nếu có) còn lại từ 300 triệu đồng trở lên thì cơ sở kinh doanh được hoàn thuế giá trị gia tăng đầu vào sử dụng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5%. Bộ Tài chính quy định cách xác định số thuế giá trị gia tăng được hoàn đối với hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5%."}]},{"id":"nd181_32","no":32,"code":"Điều 32","title":"Điều 32. Hoàn thuế đối với cơ sở kinh doanh khi giải thể, phá sản","shortTitle":"Hoàn thuế đối với cơ sở kinh doanh khi giải thể, phá sản","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Cơ sở kinh doanh nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế được hoàn thuế giá trị gia tăng khi giải thể, phá sản có số thuế giá trị gia tăng nộp thừa hoặc số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết (trừ trường hợp cơ sở kinh doanh giải thể và chấm dứt hoạt động của dự án đầu tư quy định tại khoản 1 Điều 30 Nghị định này). Cơ sở kinh doanh phải thực hiện theo quy định của pháp luật về giải thể, phá sản và quản lý thuế. Trường hợp chi nhánh của doanh nghiệp nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế giải thể, tổ hợp tác nộp thuế theo phương pháp khấu trừ thuế chuyển đổi thành hợp tác xã, liên hiệp hợp tác xã thì doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được kế thừa số thuế giá trị gia tăng nộp thừa hoặc số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết của tổ hợp tác, chi nhánh để khấu trừ, hoàn thuế theo quy định."}]},{"id":"nd181_33","no":33,"code":"Điều 33","title":"Điều 33. Hoàn thuế đối với hàng hóa mua tại Việt Nam mang theo khi xuất cảnh","shortTitle":"Hoàn thuế đối với hàng hóa mua tại Việt Nam mang theo khi xuất cảnh","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Người nước ngoài, người Việt Nam định cư ở nước ngoài (trừ thành viên của Tổ bay theo quy định của pháp luật về hàng không, thành viên của Đoàn thủy thủ theo quy định của pháp luật về hàng hải) mang hộ chiếu hoặc giấy tờ có giá trị đi lại quốc tế được hoàn thuế đối với hàng hóa mua tại Việt Nam mang theo khi xuất cảnh. Hồ sơ, thủ tục, số thuế được hoàn, phương thức hoàn thuế đối với trường hợp quy định tại khoản này được quy định tại Phụ lục IV ban hành kèm theo Nghị định này."}]},{"id":"nd181_34","no":34,"code":"Điều 34","title":"Điều 34. Hoàn thuế đối với các chương trình, dự án sử dụng vốn hỗ trợ phát triển chính thức (ODA) không hoàn lại hoặc viện trợ không hoàn lại, viện trợ nhân đạo","shortTitle":"Hoàn thuế đối với các chương trình, dự án sử dụng vốn hỗ trợ phát triển chính thức (ODA) không hoàn lại hoặc viện trợ không hoàn lại, viện trợ nhân đạo","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Việc hoàn thuế giá trị gia tăng đối với các chương trình, dự án sử dụng vốn hỗ trợ phát triển chính thức (ODA) không hoàn lại hoặc viện trợ không hoàn lại, viện trợ nhân đạo được quy định như sau:"},{"k":"p","t":"1. Chủ chương trình, dự án hoặc nhà thầu chính (bao gồm cả Văn phòng điều hành của nhà thầu chính tại Việt Nam), tổ chức do phía nhà tài trợ nước ngoài chỉ định việc quản lý chương trình, dự án sử dụng vốn ODA (bao gồm cả Văn phòng đại diện của nhà tài trợ hoặc tổ chức quản lý, thực hiện chương trình, dự án do nhà tài trợ chỉ định) được hoàn số thuế giá trị gia tăng đã trả cho hàng hóa, dịch vụ mua tại Việt Nam để phục vụ cho chương trình, dự án."},{"k":"p","t":"2. Tổ chức ở Việt Nam sử dụng tiền viện trợ không hoàn lại, tiền viện trợ nhân đạo của tổ chức, cá nhân nước ngoài để mua hàng hóa, dịch vụ phục vụ cho chương trình, dự án viện trợ không hoàn lại, viện trợ nhân đạo tại Việt Nam thì được hoàn số thuế giá trị gia tăng đã trả cho hàng hóa, dịch vụ đó."}]},{"id":"nd181_35","no":35,"code":"Điều 35","title":"Điều 35. Hoàn thuế đối với hàng hóa, dịch vụ mua tại Việt Nam của đối tượng được hưởng quyền ưu đãi miễn trừ ngoại giao","shortTitle":"Hoàn thuế đối với hàng hóa, dịch vụ mua tại Việt Nam của đối tượng được hưởng quyền ưu đãi miễn trừ ngoại giao","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Đối tượng được hưởng quyền ưu đãi miễn trừ ngoại giao theo quy định của pháp luật về ngoại giao mua hàng hóa, dịch vụ tại Việt Nam để sử dụng được hoàn số thuế giá trị gia tăng đã trả ghi trên hóa đơn giá trị gia tăng hoặc trên chứng từ thanh toán ghi giá thanh toán đã có thuế giá trị gia tăng."}]},{"id":"nd181_36","no":36,"code":"Điều 36","title":"Điều 36. Hoàn thuế theo điều ước quốc tế","shortTitle":"Hoàn thuế theo điều ước quốc tế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Cơ sở kinh doanh có quyết định hoàn thuế giá trị gia tăng của cơ quan có thẩm quyền theo quy định của pháp luật và trường hợp hoàn thuế giá trị gia tăng theo điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."}]},{"id":"nd181_37","no":37,"code":"Điều 37","title":"Điều 37. Điều kiện hoàn thuế giá trị gia tăng","shortTitle":"Điều kiện hoàn thuế giá trị gia tăng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Cơ sở kinh doanh thuộc trường hợp hoàn thuế quy định tại Mục này phải đáp ứng điều kiện sau đây:"},{"k":"p","t":"1. Cơ sở kinh doanh thuộc trường hợp được hoàn thuế theo quy định tại các Điều 29, Điều 30, Điều 31, Điều 32 Nghị định này phải là cơ sở kinh doanh nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế, lập và lưu giữ sổ kế toán, chứng từ kế toán theo quy định của pháp luật về kế toán; có tài khoản tiền gửi tại ngân hàng theo mã số thuế của cơ sở kinh doanh."},{"k":"p","t":"2. Đáp ứng quy định về khấu trừ thuế giá trị gia tăng đầu vào theo quy định tại Mục 2 Chương III và không thuộc trường hợp quy định tại khoản 15 Điều 23 Nghị định này."},{"k":"p","t":"3. Người bán đã kê khai, nộp thuế giá trị gia tăng theo quy định đối với hóa đơn đã xuất cho cơ sở kinh doanh đề nghị hoàn thuế được xác định như sau:"},{"k":"p","t":"a) Tại thời điểm cơ sở kinh doanh nộp hồ sơ hoàn thuế, người bán đã nộp hồ sơ khai thuế giá trị gia tăng theo quy định và không còn nợ tiền thuế giá trị gia tăng của kỳ tính thuế tương ứng với kỳ tính thuế thuộc kỳ hoàn thuế của cơ sở kinh doanh đề nghị hoàn thuế."},{"k":"p","t":"b) Cơ quan quản lý thuế tại thời điểm cơ sở kinh doanh nộp hồ sơ hoàn thuế trên cơ sở kết quả xử lý của hệ thống công nghệ thông tin tự động để xác định người bán đã kê khai, nộp thuế giá trị gia tăng theo quy định."},{"k":"p","t":"c) Trường hợp xác định người bán chưa nộp đầy đủ hồ sơ khai thuế giá trị gia tăng của kỳ tính thuế tương ứng với kỳ tính thuế thuộc kỳ hoàn thuế của cơ sở kinh doanh (bao gồm cả trường hợp chưa đến thời hạn nộp hồ sơ khai thuế) hoặc còn nợ tiền thuế giá trị gia tăng của kỳ tính thuế tương ứng với kỳ tính thuế thuộc kỳ hoàn thuế thì cơ sở kinh doanh không được hoàn thuế đối với các hóa đơn tương ứng với kỳ tính thuế người bán chưa nộp đầy đủ hồ sơ khai thuế giá trị gia tăng hoặc còn nợ tiền thuế giá trị gia tăng."},{"k":"p","t":"4. Tại thời điểm cơ sở kinh doanh nộp hồ sơ hoàn thuế, cơ sở kinh doanh thuộc trường hợp hoàn thuế giá trị gia tăng, có số thuế giá trị gia tăng đầu vào đáp ứng đầy đủ điều kiện hoàn thuế theo quy định tại Mục này và tuân thủ các quy định về khai thuế theo quy định của pháp luật về quản lý thuế, lập hồ sơ hoàn thuế giá trị gia tăng đối với từng trường hợp hoàn thuế giá trị gia tăng và gửi đến cơ quan thuế có thẩm quyền tiếp nhận. Cơ quan thuế phân loại hồ sơ hoàn thuế giá trị gia tăng thuộc diện hoàn thuế trước hoặc kiểm tra trước hoàn thuế và giải quyết hồ sơ hoàn thuế giá trị gia tăng theo quy định của pháp luật về quản lý thuế."}]},{"id":"nd181_38","no":38,"code":"Điều 38","title":"Điều 38. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 01 tháng 7 năm 2025."},{"k":"p","t":"2. Nghị định này thay thế:"},{"k":"p","t":"a) Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều Luật Thuế giá trị gia tăng."},{"k":"p","t":"b) Nghị định số 49/2022/NĐ-CP ngày 29 tháng 7 năm 2022 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 209/2013/NĐ-CP ngày 18 tháng 12 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều Luật Thuế giá trị gia tăng đã được sửa đổi, bổ sung một số điều theo Nghị định số 12/2015/NĐ-CP, Nghị định số 100/2016/NĐ-CP và Nghị định số 146/2017/NĐ-CP."},{"k":"p","t":"c) Quy định việc xác định sản phẩm có tổng giá trị tài nguyên, khoáng sản cộng với chi phí năng lượng chiếm từ 51% giá thành sản phẩm trở lên tại điểm a khoản 1 Điều 11 và khoản 2 Điều 15 Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu (đã được sửa đổi, bổ sung tại Nghị định số 18/2021/NĐ-CP ngày 11 tháng 3 năm 2021 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 134/2016/NĐ-CP ngày 01 tháng 9 năm 2016 của Chính phủ quy định chi tiết một số điều và biện pháp thi hành Luật Thuế xuất khẩu, thuế nhập khẩu), điểm b khoản 2 Điều 4 và Mẫu số 14, Phụ lục II ban hành kèm theo Nghị định số 26/2023/NĐ-CP ngày 31 tháng 5 năm 2023 của Chính phủ về Biểu thuế xuất khẩu, Biểu thuế nhập khẩu ưu đãi, Danh mục hàng hóa và mức thuế tuyệt đối, thuế hỗn hợp và thuế nhập khẩu ngoài hạn ngạch thuế quan bằng quy định tại Phụ lục V ban hành kèm theo Nghị định này."},{"k":"p","t":"3. Bãi bỏ quy định tại:"},{"k":"p","t":"a) Điều 2 Nghị định số 91/2014/NĐ-CP ngày 01 tháng 10 năm 2014 của Chính phủ sửa đổi, bổ sung một số điều tại các Nghị định quy định về thuế."},{"k":"p","t":"b) Điều 3 Nghị định số 12/2015/NĐ-CP ngày 12 tháng 02 năm 2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật về thuế và sửa đổi, bổ sung một số điều của các Nghị định về thuế."},{"k":"p","t":"c) Điều 1 Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật sửa đổi, bổ sung một số điều của Luật Thuế giá trị gia tăng, Luật Thuế tiêu thụ đặc biệt và Luật Quản lý thuế."},{"k":"p","t":"d) Điều 1 Nghị định số 146/2017/NĐ-CP ngày 15 tháng 12 năm 2017 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 100/2016/NĐ-CP ngày 01 tháng 7 năm 2016 và Nghị định số 12/2015/NĐ-CP ngày 12 tháng 02 năm 2015 của Chính phủ."},{"k":"p","t":"4. Trường hợp các văn bản quy phạm pháp luật quy định viện dẫn tại Nghị định này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"nd181_39","no":39,"code":"Điều 39","title":"Điều 39. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với dự án đầu tư đã được đầu tư trước ngày 01 tháng 7 năm 2025 mà vẫn đang trong giai đoạn đầu tư kể từ ngày Nghị định này có hiệu lực thi hành thì được áp dụng quy định hoàn thuế đối với đầu tư tại Điều 30 Nghị định này."},{"k":"p","t":"2. Quy định về hoàn thuế giá trị gia tăng đối với hoạt động sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% quy định tại Điều 31 Nghị định này áp dụng đối với số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết sử dụng cho sản xuất hàng hóa, cung cấp dịch vụ chịu thuế suất thuế giá trị gia tăng 5% phát sinh kể từ ngày Nghị định này có hiệu lực thi hành."},{"k":"p","t":"3. Quy định tại khoản 3 Điều 37 Nghị định này áp dụng cho kỳ tính thuế từ tháng 7 năm 2025 hoặc quý 3 năm 2025."}]},{"id":"nd181_40","no":40,"code":"Điều 40","title":"Điều 40. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ Tài chính quy định chi tiết các điều, khoản được giao tại Nghị định và hướng dẫn thực hiện Nghị định này theo chức năng, nhiệm vụ đảm bảo yêu cầu quản lý."},{"k":"p","t":"2. Bộ Tài chính quy định cụ thể đối với hàng hóa, dịch vụ không thuộc phạm vi điều chỉnh của Nghị định này và Luật Thuế giá trị gia tăng."},{"k":"p","t":"3. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các cơ quan, tổ chức, cá nhân liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:\n- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n-Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện Kiểm sát nhân dân tối cao;\n- Kiểm toán Nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các đoàn thể;\n- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;\n- Lưu: VT, KTTH(2b)","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNGPHÓ THỦ TƯỚNGHồ Đức Phớc"]]},{"k":"p","t":"Phụ lục l"},{"k":"p","t":"TÀI NGUYÊN, KHOÁNG SẢN KHAI THÁC CHƯA CHẾ BIẾN THÀNH SẢN PHẨM KHÁC"},{"k":"p","t":"(K
