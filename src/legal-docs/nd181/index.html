n quan."}]},{"id":"nd181_3","no":3,"code":"Điều 3","title":"Điều 3. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Người nộp thuế thực hiện theo quy định tại Điều 4 Luật Thuế giá trị gia tăng. Một số trường hợp được quy định chi tiết như sau:"},{"k":"p","t":"1. Người nộp thuế quy định tại khoản 1 Điều 4 Luật Thuế giá trị gia tăng bao gồm:"},{"k":"p","t":"a) Các tổ chức được thành lập và đăng ký kinh doanh theo Luật Doanh nghiệp, Luật Hợp tác xã và pháp luật chuyên ngành khác."},{"k":"p","t":"b) Các tổ chức kinh tế của tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức xã hội, tổ chức xã hội - nghề nghiệp, đơn vị vũ trang nhân dân, tổ chức sự nghiệp và các tổ chức khác."},{"k":"p","t":"c) Các doanh nghiệp có vốn đầu tư nước ngoài và bên nước ngoài tham gia hợp tác kinh doanh theo Luật Đầu tư; các tổ chức, cá nhân nước ngoài hoạt động kinh doanh ở Việt Nam nhưng không thành lập pháp nhân tại Việt Nam."},{"k":"p","t":"d) Doanh nghiệp chế xuất thực hiện các hoạt động kinh doanh khác theo quy định của pháp luật về quản lý khu công nghiệp và khu kinh tế."},{"k":"p","t":"đ) Hộ, cá nhân sản xuất, kinh doanh; nhóm người kinh doanh độc lập."},{"k":"p","t":"e) Tổ chức, cá nhân khác có hoạt động sản xuất, kinh doanh."},{"k":"p","t":"2. Người nộp thuế quy định tại khoản 4, khoản 5 Điều 4 Luật Thuế giá trị gia tăng gồm:"},{"k":"p","t":"a) Nhà cung cấp nước ngoài không có cơ sở thường trú tại Việt Nam có hoạt động kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số với tổ chức, cá nhân tại Việt Nam (sau đây gọi là nhà cung cấp nước ngoài); tổ chức là nhà quản lý nền tảng số nước ngoài thực hiện khấu trừ, nộp thay nghĩa vụ thuế phải nộp của nhà cung cấp nước ngoài; tổ chức kinh doanh tại Việt Nam áp dụng phương pháp tính thuế giá trị gia tăng là phương pháp khấu trừ thuế mua dịch vụ của nhà cung cấp nước ngoài không có cơ sở thường trú tại Việt Nam thông qua kênh thương mại điện tử hoặc các nền tảng số thực hiện khấu trừ, nộp thay nghĩa vụ thuế phải nộp của nhà cung cấp nước ngoài. Việc thực hiện khấu trừ, nộp thay nghĩa vụ thuế phải nộp của nhà cung cấp nước ngoài của người nộp thuế quy định tại điểm này thực hiện theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"b) Người nộp thuế quy định tại khoản 5 Điều 4 Luật Thuế giá trị gia tăng là tổ chức quản lý sàn giao dịch thương mại điện tử, tổ chức quản lý nền tảng số có chức năng thanh toán thực hiện theo quy định của Nghị định số 117/2025/NĐ-CP ngày 09 tháng 6 năm 2025 của Chính phủ quy định quản lý thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ, cá nhân."}]},{"id":"nd181_4","no":4,"code":"Điều 4","title":"Điều 4. Đối tượng không chịu thuế","shortTitle":"Đối tượng không chịu thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng không chịu thuế thực hiện theo quy định tại Điều 5 Luật Thuế giá trị gia tăng. Một số trường hợp được quy định chi tiết như sau:"},{"k":"p","t":"1. Sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường của tổ chức, cá nhân tự sản xuất, đánh bắt bán ra và ở khâu nhập khẩu. Trong đó, các sản phẩm chỉ qua sơ chế thông thường là các sản phẩm mới được làm sạch, phơi, sấy khô, bóc vỏ, xay xát, xay vỡ mảnh, nghiền vỡ mảnh, xay bỏ vỏ, xát bỏ vỏ, tách hạt, tách cọng, cắt, xay, đánh bóng hạt, hồ hạt, chia tách ra từng phần, bỏ xương, băm, lột da, nghiền, cán mỏng, ướp muối, đóng hộp kín khí, bảo quản lạnh (ướp lạnh, đông lạnh), bảo quản bằng khí sunfuro, bảo quản theo phương thức cho hóa chất để tránh thối rữa, ngâm trong dung dịch lưu huỳnh hoặc ngâm trong dung dịch bảo quản khác và các hình thức bảo quản thông thường khác."},{"k":"p","t":"Trường hợp không xác định được thì Bộ Nông nghiệp và Môi trường có trách nhiệm căn cứ vào quy trình sản xuất sản phẩm cây trồng, rừng trồng, chăn nuôi, thủy sản nuôi trồng, đánh bắt do người nộp thuế cung cấp để xác định là sản phẩm chưa chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường của tổ chức, cá nhân tự sản xuất, đánh bắt bán ra và ở khâu nhập khẩu theo quy định của pháp luật."},{"k":"p","t":"2. Nhà ở thuộc tài sản công do Nhà nước bán cho người đang thuê. Trong đó, nhà ở thuộc tài sản công theo quy định của pháp luật về nhà ở."},{"k":"p","t":"3. Chuyển quyền sử dụng đất theo quy định của pháp luật về đất đai."},{"k":"p","t":"4. Các dịch vụ tài chính, ngân hàng, kinh doanh chứng khoán, thương mại sau đây:"},{"k":"p","t":"a) Dịch vụ cấp tín dụng theo quy định của pháp luật về các tổ chức tín dụng và các khoản phí được nêu cụ thể tại Hợp đồng vay vốn của Chính phủ Việt Nam với Bên cho vay nước ngoài."},{"k":"p","t":"b) Dịch vụ cho vay của người nộp thuế không phải là tổ chức tín dụng."},{"k":"p","t":"c) Kinh doanh chứng khoán bao gồm môi giới chứng khoán, tự doanh chứng khoán, bảo lãnh phát hành chứng khoán, tư vấn đầu tư chứng khoán, quản lý quỹ đầu tư chứng khoán, quản lý danh mục đầu tư chứng khoán theo quy định của pháp luật về chứng khoán."},{"k":"p","t":"d) Chuyển nhượng vốn bao gồm chuyển nhượng một phần hoặc toàn bộ số vốn đã đầu tư vào tổ chức kinh tế khác (không phân biệt có thành lập hay không thành lập pháp nhân mới), chuyển nhượng chứng khoán, chuyển nhượng quyền góp vốn và các hình thức chuyển nhượng vốn khác theo quy định của pháp luật, kể cả trường hợp bán doanh nghiệp cho doanh nghiệp khác để sản xuất, kinh doanh và doanh nghiệp mua kế thừa toàn bộ quyền và nghĩa vụ của doanh nghiệp bán theo quy định của pháp luật. Chuyển nhượng vốn quy định tại điểm này không bao gồm chuyển nhượng dự án đầu tư, bán tài sản."},{"k":"p","t":"đ) Bán nợ bao gồm bán khoản phải trả và khoản phải thu, bán chứng chỉ tiền gửi giữa người nộp thuế không phải là tổ chức tín dụng."},{"k":"p","t":"e) Kinh doanh ngoại tệ."},{"k":"p","t":"g) Sản phẩm phái sinh theo quy định của pháp luật về các tổ chức tín dụng, pháp luật về chứng khoán và pháp luật về thương mại, bao gồm: hoán đổi lãi suất; hợp đồng kỳ hạn; hợp đồng tương lai; hợp đồng quyền chọn mua, chọn bán và sản phẩm phái sinh khác."},{"k":"p","t":"h) Bán tài sản bảo đảm của khoản nợ của tổ chức mà Nhà nước sở hữu 100% vốn điều lệ do Chính phủ thành lập có chức năng mua, bán nợ để xử lý nợ xấu của các tổ chức tín dụng Việt Nam."},{"k":"p","t":"Bộ Tài chính quy định chi tiết các dịch vụ kinh doanh chứng khoán và chuyển nhượng chứng khoán quy định tại điểm c và điểm d khoản này."},{"k":"p","t":"5. Dịch vụ tang lễ bao gồm dịch vụ cho thuê nhà tang lễ, xe ô tô phục vụ tang lễ, táng người chết dưới các hình thức, di chuyển mộ, chăm sóc mộ và phải do các cơ sở có chức năng kinh doanh dịch vụ tang lễ cung cấp."},{"k":"p","t":"6. Hoạt động duy tu, sửa chữa, xây dựng bằng nguồn vốn đóng góp của nhân dân, vốn viện trợ nhân đạo (chiếm từ 50% tổng số vốn sử dụng cho công trình trở lên; trường hợp nguồn vốn đóng góp của nhân dân, vốn viện trợ nhân đạo chiếm dưới 50% tổng số nguồn vốn sử dụng cho công trình thì toàn bộ giá trị công trình thuộc đối tượng chịu thuế giá trị gia tăng) đối với các di tích lịch sử - văn hóa, danh lam thắng cảnh, các công trình văn hóa, nghệ thuật, công trình phục vụ công cộng, cơ sở hạ tầng và nhà ở cho đối tượng chính sách xã hội. Trong đó:"},{"k":"p","t":"a) Nguồn vốn đóng góp của nhân dân bao gồm cả vốn đóng góp, tài trợ của tổ chức, cá nhân."},{"k":"p","t":"b) Di tích lịch sử - văn hóa, danh lam thắng cảnh quy định tại khoản này thực hiện theo quy định của pháp luật về di sản văn hóa."},{"k":"p","t":"c) Công trình phục vụ công cộng, cơ sở hạ tầng là công trình không phục vụ mục đích kinh doanh, không thu tiền. Công trình quy định tại điểm này được thực hiện theo quy định tại điểm 2 Mục I và Mục III Phụ lục I ban hành kèm theo Nghị định số 06/2021/NĐ-CP ngày 26 tháng 01 năm 2021 của Chính phủ quy định chi tiết về quản lý chất lượng, thi công xây dựng và bảo trì công trình xây dựng."},{"k":"p","t":"d) Đối tượng chính sách xã hội quy định tại khoản này bao gồm: người có công theo quy định của pháp luật về người có công; đối tượng bảo trợ xã hội hưởng trợ cấp từ ngân sách nhà nước; người thuộc hộ nghèo, cận nghèo và các trường hợp khác theo quy định của pháp luật."},{"k":"p","t":"7. Hoạt động dạy học, dạy nghề theo quy định của pháp luật về giáo dục, giáo dục nghề nghiệp. Trường hợp các cơ sở dạy học, dạy nghề có các khoản thu hộ, chi hộ thì thuộc đối tượng không chịu thuế giá trị gia tăng; hàng hóa, dịch vụ do các tổ chức, cá nhân cung cấp cho các cơ sở dạy học, dạy nghề phải chịu thuế giá trị gia tăng theo quy định."},{"k":"p","t":"8. Xuất bản, nhập khẩu, phát hành báo, tạp chí, bản tin, đặc san, sách chính trị, sách giáo khoa, giáo trình, sách văn bản pháp luật, sách khoa học - kỹ thuật, sách phục vụ thông tin đối ngoại, sách in bằng chữ dân tộc thiểu số và tranh, ảnh, áp phích tuyên truyền cổ động, kể cả dưới dạng băng hoặc đĩa ghi tiếng, ghi hình, dữ liệu điện tử; tiền, in tiền. Trong đó:"},{"k":"p","t":"a) Sách chính trị là sách tuyên truyền đường lối chính trị của Đảng và Nhà nước phục vụ nhiệm vụ chính trị theo chuyên đề, chủ đề, phục vụ các ngày kỷ niệm, ngày truyền thống của các tổ chức, các cấp, các ngành, địa phương; các loại sách thống kê, tuyên truyền phong trào người tốt việc tốt; sách in các bài phát biểu, nghiên cứu lý luận của lãnh đạo Đảng và Nhà nước."},{"k":"p","t":"b) Sách giáo khoa là sách dùng để giảng dạy và học tập trong tất cả các cấp từ mầm non đến trung học phổ thông (bao gồm cả sách tham khảo dùng cho giáo viên và học sinh phù hợp với nội dung chương trình giáo dục)."},{"k":"p","t":"c) Giáo trình là sách dùng để giảng dạy và học tập trong các trường đại học, cao đẳng, trung học chuyên nghiệp và dạy nghề."},{"k":"p","t":"d) Sách văn bản pháp luật là sách in các văn bản quy phạm pháp luật của Nhà nước."},{"k":"p","t":"đ) Sách khoa học - kỹ thuật là sách dùng để giới thiệu, hướng dẫn những kiến thức khoa học, kỹ thuật có quan hệ trực tiếp đến sản xuất và các ngành khoa học, kỹ thuật."},{"k":"p","t":"e) Sách in bằng chữ dân tộc thiểu số bao gồm cả sách in song ngữ chữ phổ thông và chữ dân tộc thiểu số."},{"k":"p","t":"g) Tranh, ảnh, áp phích tuyên truyền cổ động là tranh, ảnh, áp phích, các loại tờ rơi, tờ gấp phục vụ cho mục đích tuyên truyền, cổ động, khẩu hiệu, ảnh lãnh tụ, Đảng kỳ, Quốc kỳ, Đoàn kỳ, Đội kỳ."},{"k":"p","t":"h) Sách phục vụ thông tin đối ngoại, trong đó thông tin đối ngoại thực hiện theo Nghị định số 72/2015/NĐ-CP ngày 07 tháng 9 năm 2015 của Chính phủ về quản lý hoạt động thông tin đối ngoại."},{"k":"p","t":"9. Vận chuyển hành khách công cộng bằng xe buýt, tàu điện, phương tiện thủy nội địa thực hiện nội tỉnh, trong đô thị và các tuyến lân cận ngoại tỉnh có các điểm dừng đón, trả khách."},{"k":"p","t":"10. Máy móc, thiết bị, phụ tùng, vật tư thuộc loại trong nước chưa sản xuất được cần nhập khẩu để sử dụng trực tiếp cho hoạt động nghiên cứu khoa học, phát triển công nghệ; máy móc, thiết bị, phụ tùng thay thế, phương tiện vận tải chuyên dùng và vật tư thuộc loại trong nước chưa sản xuất được cần nhập khẩu để tiến hành hoạt động tìm kiếm thăm dò, phát triển mỏ dầu khí; máy bay, trực thăng, tàu lượn, giàn khoan, tàu thuyền thuộc loại trong nước chưa sản xuất được cần nhập khẩu để tạo tài sản cố định của doanh nghiệp hoặc thuê của nước ngoài để sử dụng cho sản xuất, kinh doanh, cho thuê. Trong đó:"},{"k":"p","t":"Danh mục máy móc, thiết bị, phụ tùng, vật tư thuộc loại trong nước đã sản xuất được để làm cơ sở phân biệt với loại trong nước chưa sản xuất được cần nhập khẩu sử dụng trực tiếp cho hoạt động nghiên cứu khoa học và phát triển công nghệ; Danh mục máy móc, thiết bị, phụ tùng thay thế, phương tiện vận tải chuyên dùng và vật tư thuộc loại trong nước đã sản xuất được làm cơ sở phân biệt với loại trong nước chưa sản xuất được cần nhập khẩu để tiến hành hoạt động tìm kiếm thăm dò, phát triển mỏ dầu khí; Danh mục máy bay, trực thăng, tàu lượn, giàn khoan, tàu thuyền thuộc loại trong nước đã sản xuất được làm cơ sở phân biệt với loại trong nước chưa sản xuất được cần nhập khẩu để tạo tài sản cố định của doanh nghiệp hoặc thuê của nước ngoài để sử dụng cho sản xuất, kinh doanh, cho thuê do Bộ Tài chính ban hành."},{"k":"p","t":"11. Hàng hóa nhập khẩu trong trường hợp viện trợ nhân đạo, viện trợ không hoàn lại. Hàng hóa, dịch vụ bán cho tổ chức, cá nhân nước ngoài, tổ chức quốc tế để viện trợ nhân đạo, viện trợ không hoàn lại cho Việt Nam. Trong đó:"},{"k":"p","t":"a) Hàng hóa nhập khẩu trong trường hợp viện trợ nhân đạo, viện trợ không hoàn lại là hàng hóa viện trợ theo quy định của pháp luật về tiếp nhận, quản lý và sử dụng viện trợ nhân đạo, viện trợ không hoàn lại."},{"k":"p","t":"b) Hàng hóa, dịch vụ mua trong nước để viện trợ nhân đạo, viện trợ không hoàn lại cho Việt Nam thì tổ chức, cá nhân nước ngoài, tổ chức quốc tế phải có văn bản gửi cho cơ sở bán hàng trong đó ghi rõ tên của tổ chức, cá nhân nước ngoài, tổ chức quốc tế mua hàng hóa, dịch vụ để viện trợ nhân đạo, viện trợ không hoàn lại cho Việt Nam, số lượng hoặc giá trị hàng hóa, dịch vụ mua và phải có xác nhận của các cơ quan, đơn vị có thẩm quyền nhận viện trợ nhân đạo, viện trợ không hoàn lại. Các cơ quan, đơn vị nhận viện trợ nhân đạo, viện trợ không hoàn lại có trách nhiệm xác nhận theo đề nghị của tổ chức, cá nhân nước ngoài, tổ chức quốc tế."},{"k":"p","t":"12. Hàng hóa chuyển khẩu, quá cảnh qua lãnh thổ Việt Nam; hàng tạm nhập khẩu, tái xuất khẩu; hàng tạm xuất khẩu, tái nhập khẩu; nguyên liệu nhập khẩu để sản xuất, gia công hàng hóa xuất khẩu theo hợp đồng sản xuất, gia công xuất khẩu ký kết với bên nước ngoài; hàng hóa, dịch vụ được mua bán giữa nước ngoài với các khu phi thuế quan và giữa các khu phi thuế quan với nhau. Hàng hóa nhập khẩu từ nước ngoài của công ty cho thuê tài chính được vận chuyển thẳng vào khu phi thuế quan để cho doanh nghiệp trong khu phi thuế quan thuê tài chính. Khu phi thuế quan thực hiện theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"13. Chuyển giao công nghệ theo quy định của Luật Chuyển giao công nghệ; chuyển nhượng quyền sở hữu trí tuệ theo quy định của Luật Sở hữu trí tuệ; sản phẩm phần mềm và dịch vụ phần mềm theo quy định của pháp luật về công nghệ thông tin, pháp luật về công nghiệp công nghệ số và pháp luật liên quan. Trường hợp chuyển giao công nghệ, chuyển nhượng quyền sở hữu trí tuệ có kèm theo chuyển giao máy móc, thiết bị thì cơ sở kinh doanh phải tách riêng giá trị công nghệ chuyển giao, giá trị quyền sở hữu trí tuệ chuyển nhượng để xác định đối tượng không chịu thuế giá trị gia tăng; trường hợp không tách riêng được thì toàn bộ giá trị hợp đồng thuộc đối tượng chịu thuế giá trị gia tăng."},{"k":"p","t":"14. Sản phẩm xuất khẩu là tài nguyên, khoáng sản khai thác chưa chế biến thành sản phẩm khác và sản phẩm xuất khẩu là tài nguyên, khoáng sản khai thác đã chế biến thành sản phẩm khác theo định hướng của nhà nước về không khuyến khích xuất khẩu, hạn chế xuất khẩu các tài nguyên, khoáng sản thô được quy định tại Danh mục (Phụ lục I, Phụ lục II) ban hành kèm theo Nghị định này."},{"k":"p","t":"Trong trường hợp cần thiết phải điều chỉnh sản phẩm xuất khẩu tại Danh mục (Phụ lục I, Phụ lục II) để phù hợp với bối cảnh kinh tế - xã hội trong từng thời kỳ, giao Bộ Tài chính phối hợp với các bộ liên quan báo cáo Chính phủ xem xét, quyết định."},{"k":"p","t":"Đối với sản phẩm xuất khẩu là tài nguyên, khoáng sản khai thác đã chế biến thành sản phẩm khác cần khuyến khích xuất khẩu, có giá trị gia tăng cao theo xác định và đề xuất của Bộ Công Thương thì Bộ Tài chính chủ trì phối hợp với các bộ liên quan báo cáo Chính phủ xem xét, quyết định."},{"k":"p","t":"15. Hàng hóa nhập khẩu trong trường hợp sau:"},{"k":"p","t":"a) Quà tặng cho cơ quan nhà nước, tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp, đơn vị vũ trang nhân dân trong định mức miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"b) Quà biếu, quà tặng trong định mức miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu của tổ chức, cá nhân nước ngoài cho cá nhân Việt Nam; đồ dùng của tổ chức, cá nhân nước ngoài theo tiêu chuẩn miễn trừ ngoại giao và tài sản di chuyển trong định mức miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"c) Hàng hóa trong tiêu chuẩn hành lý miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"d) Hàng hóa nhập khẩu ủng hộ, tài trợ cho phòng, chống, khắc phục hậu quả thảm họa, thiên tai, dịch bệnh, chiến tranh là hàng hóa ủng hộ, tài trợ được các bộ, cơ quan ngang bộ, Ủy ban nhân dân các tỉnh, thành phố, Ủy ban Mặt trận Tổ quốc Việt Nam các tỉnh, thành phố tiếp nhận. Các cơ quan, tổ chức tiếp nhận có trách nhiệm ban hành văn bản tiếp nhận theo đề nghị của tổ chức, cá nhân ủng hộ, tài trợ."},{"k":"p","t":"đ) Hàng hóa mua bán, trao đổi để phục vụ cho sản xuất, tiêu dùng của cư dân biên giới thuộc Danh mục hàng hóa mua bán, trao đổi của cư dân biên giới theo quy định của pháp luật và trong định mức miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."},{"k":"p","t":"e) Di vật, cổ vật, bảo vật quốc gia theo quy định của pháp luật về di sản văn hóa do cơ quan nhà nước có thẩm quyền nhập khẩu bao gồm cả trường hợp ủy quyền và ủy thác nhập khẩu."},{"k":"p","t":"16. Cơ sở kinh doanh hàng hóa, dịch vụ không chịu thuế giá trị gia tăng quy định tại Điều này không được khấu trừ, không được hoàn thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ không chịu thuế giá trị gia tăng, trừ trường hợp áp dụng mức thuế suất 0% quy định tại khoản 1 Điều 9 của Luật Thuế giá trị gia tăng."},{"k":"p","t":"GIÁ TÍNH THUẾ"}]},{"id":"nd181_5","no":5,"code":"Điều 5","title":"Điều 5. Giá tính thuế đối với hàng hóa, dịch vụ bán ra và hàng hóa nhập khẩu","shortTitle":"Giá tính thuế đối với hàng hóa, dịch vụ bán ra và hàng hóa nhập khẩu","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với hàng hóa, dịch vụ do cơ sở kinh doanh bán ra là giá bán chưa có thuế giá trị gia tăng; đối với hàng hóa, dịch vụ chịu thuế tiêu thụ đặc biệt là giá bán đã có thuế tiêu thụ đặc biệt nhưng chưa có thuế giá trị gia tăng; đối với hàng hóa chịu thuế bảo vệ môi trường là giá bán đã có thuế bảo vệ môi trường nhưng chưa có thuế giá trị gia tăng; đối với hàng hóa chịu thuế tiêu thụ đặc biệt và thuế bảo vệ môi trường là giá bán đã có thuế tiêu thụ đặc biệt và thuế bảo vệ môi trường nhưng chưa có thuế giá trị gia tăng."},{"k":"p","t":"2. Đối với hàng hóa nhập khẩu là trị giá tính thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu cộng với thuế nhập khẩu, cộng với các khoản thuế là thuế nhập khẩu bổ sung theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu và pháp luật về quản lý ngoại thương (nếu có), cộng với thuế tiêu thụ đặc biệt (nếu có) và cộng với thuế bảo vệ môi trường (nếu có)."},{"k":"p","t":"a) Trường hợp hàng hóa nhập khẩu được miễn thuế nhập khẩu thì giá tính thuế giá trị gia tăng là trị giá tính thuế nhập khẩu."},{"k":"p","t":"b) Trường hợp hàng hóa nhập khẩu được giảm thuế nhập khẩu thì giá tính thuế giá trị gia tăng là trị giá tính thuế nhập khẩu cộng (+) với thuế nhập khẩu xác định theo mức thuế phải nộp sau khi đã được giảm."},{"k":"p","t":"c) Trường hợp hàng hóa nhập khẩu thuộc đối tượng chịu thuế giá trị gia tăng và được miễn thuế nhập khẩu, sau đó thay đổi mục đích sử dụng dẫn đến phát sinh số thuế nhập khẩu phải nộp thì phải nộp thuế giá trị gia tăng bổ sung trên số tiền thuế nhập khẩu phải nộp."}]},{"id":"nd181_6","no":6,"code":"Điều 6","title":"Điều 6. Giá tính thuế đối với hàng hóa, dịch vụ dùng để trao đổi, tiêu dùng nội bộ, biếu, tặng, cho và hàng hóa, dịch vụ dùng để khuyến mại","shortTitle":"Giá tính thuế đối với hàng hóa, dịch vụ dùng để trao đổi, tiêu dùng nội bộ, biếu, tặng, cho và hàng hóa, dịch vụ dùng để khuyến mại","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với hàng hóa, dịch vụ dùng để trao đổi, tiêu dùng nội bộ, biếu, tặng, cho là giá tính thuế giá trị gia tăng của hàng hóa, dịch vụ cùng loại hoặc tương đương tại thời điểm phát sinh các hoạt động này. Trong đó, hàng hóa, dịch vụ tiêu dùng nội bộ là hàng hóa, dịch vụ do cơ sở kinh doanh xuất hoặc cung cấp sử dụng cho tiêu dùng, không bao gồm:"},{"k":"p","t":"a) Hàng hóa, dịch vụ sử dụng để tiếp tục quá trình sản xuất, kinh doanh của cơ sở kinh doanh như hàng hóa được xuất để chuyển kho nội bộ, xuất vật tư, bán thành phẩm, để tiếp tục quá trình sản xuất, kinh doanh trong một cơ sở kinh doanh."},{"k":"p","t":"b) Hàng hóa, dịch vụ do cơ sở kinh doanh xuất hoặc cung cấp sử dụng phục vụ hoạt động sản xuất, kinh doanh (bao gồm cả tài sản cố định do cơ sở kinh doanh tự xây dựng, tự sản xuất)."},{"k":"p","t":"c) Tài sản điều chuyển giữa các đơn vị thành viên hạch toán phụ thuộc trong cơ sở kinh doanh; tài sản điều chuyển khi chia, tách, hợp nhất, sáp nhập, chuyển đổi loại hình doanh nghiệp; tài sản cố định đang sử dụng, đã thực hiện trích khấu hao khi điều chuyển theo giá trị ghi trên sổ sách kế toán giữa cơ sở kinh doanh và các đơn vị thành viên do một cơ sở kinh doanh sở hữu 100% vốn hoặc giữa các đơn vị thành viên do một cơ sở kinh doanh sở hữu 100% vốn để phục vụ cho hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng; tài sản góp vốn vào doanh nghiệp. Cơ sở kinh doanh có tài sản điều chuyển phải có lệnh điều chuyển tài sản, kèm theo bộ hồ sơ nguồn gốc tài sản. Tài sản góp vốn vào doanh nghiệp phải có: biên bản góp vốn sản xuất kinh doanh, hợp đồng liên doanh, liên kết; biên bản định giá tài sản của Hội đồng giao nhận vốn góp của các bên góp vốn (hoặc văn bản định giá của tổ chức có chức năng định giá theo quy định của pháp luật), kèm theo bộ hồ sơ về nguồn gốc tài sản."},{"k":"p","t":"Cơ sở kinh doanh có hàng hóa, dịch vụ quy định tại điểm a, b, c khoản này thì không phải tính thuế giá trị gia tăng."},{"k":"p","t":"2. Đối với hàng hóa, dịch vụ dùng để khuyến mại theo quy định của pháp luật về thương mại, giá tính thuế được xác định bằng không (0), trừ trường hợp bán hàng, cung cấp dịch vụ với giá thấp hơn giá bán hàng, cung cấp dịch vụ trước đó, được áp dụng trong thời gian khuyến mại (khuyến mại bằng hình thức giảm giá) thì giá tính thuế là giá bán đã giảm áp dụng trong thời gian khuyến mại đã đăng ký hoặc thông báo theo quy định của pháp luật thương mại về hoạt động xúc tiến thương mại. Các hình thức khuyến mại của hàng hóa, dịch vụ khuyến mại có giá tính thuế bằng không (0) hoặc giá tính thuế của hàng hóa, dịch vụ bán ra không bao gồm giá trị của hàng hóa, dịch vụ dùng để khuyến mại, cụ thể như sau:"},{"k":"p","t":"a) Đưa hàng mẫu, cung cấp dịch vụ mẫu để khách hàng dùng thử không phải trả tiền thì hàng mẫu, dịch vụ mẫu có giá tính thuế bằng không (0)."},{"k":"p","t":"b) Tặng hàng hóa, cung cấp dịch vụ không thu tiền thì hàng hóa, dịch vụ tặng có giá tính thuế bằng không (0)."},{"k":"p","t":"c) Bán hàng hóa, cung cấp dịch vụ có kèm theo phiếu mua hàng hóa, phiếu sử dụng dịch vụ thì giá tính thuế của hàng hóa, dịch vụ không bao gồm giá trị phiếu mua hàng hóa, phiếu sử dụng dịch vụ."},{"k":"p","t":"d) Bán hàng hóa, cung cấp dịch vụ có kèm theo phiếu dự thi cho khách hàng để chọn người trao thưởng theo thể lệ và giải thưởng đã công bố (hoặc các hình thức tổ chức thi và trao thưởng khác tương đương) thì giá tính thuế của hàng hóa, dịch vụ không bao gồm giá trị của hàng hóa, dịch vụ trúng thưởng theo phiếu dự thi (nếu có)."},{"k":"p","t":"đ) Bán hàng hóa, cung cấp dịch vụ kèm theo việc tham dự các chương trình mang tính may rủi mà việc tham gia chương trình gắn liền với việc mua hàng hóa, dịch vụ và việc trúng thưởng dựa trên sự may mắn của người tham gia theo thể lệ và giải thưởng đã công bố thì giá tính thuế của hàng hóa, dịch vụ không bao gồm giá trị của hàng hóa, dịch vụ dùng để trao thưởng."},{"k":"p","t":"e) Tổ chức chương trình khách hàng thường xuyên, theo đó việc tặng thưởng cho khách hàng căn cứ trên số lượng hoặc trị giá mua hàng hóa, dịch vụ mà khách hàng thực hiện được thể hiện dưới hình thức thẻ khách hàng, phiếu ghi nhận sự mua hàng hóa, dịch vụ hoặc các hình thức khác thì giá tính thuế không bao gồm giá trị của thẻ khách hàng, phiếu ghi nhận sự mua hàng hóa, dịch vụ hoặc các hình thức khác."},{"k":"p","t":"Trường hợp bán hàng hóa, cung cấp dịch vụ quy định tại khoản này nhưng không thực hiện theo quy định về khuyến mại của pháp luật về thương mại thì giá tính thuế thực hiện như hàng hóa biếu, tặng, cho quy định tại khoản 1 Điều này."}]},{"id":"nd181_7","no":7,"code":"Điều 7","title":"Điều 7. Giá tính thuế đối với hoạt động cho thuê tài sản, gia công hàng hóa và hoạt động xây dựng, lắp đặt","shortTitle":"Giá tính thuế đối với hoạt động cho thuê tài sản, gia công hàng hóa và hoạt động xây dựng, lắp đặt","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với hoạt động cho thuê tài sản là số tiền cho thuê chưa có thuế giá trị gia tăng. Trong đó:"},{"k":"p","t":"a) Số tiền cho thuê tài sản là giá thuê được quy định trong hợp đồng cho thuê tài sản."},{"k":"p","t":"b) Trường hợp cho thuê theo hình thức trả tiền thuê từng kỳ hoặc trả trước tiền thuê cho thời hạn thuê thì giá tính thuế là số tiền cho thuê trả từng kỳ hoặc trả trước cho thời hạn thuê chưa có thuế giá trị gia tăng."},{"k":"p","t":"2. Đối với gia công hàng hóa là giá gia công chưa có thuế giá trị gia tăng. Giá gia công là giá gia công theo hợp đồng gia công chưa có thuế giá trị gia tăng, bao gồm cả tiền công, chi phí về nhiên liệu, vật liệu phụ và chi phí khác phục vụ cho việc gia công hàng hóa."},{"k":"p","t":"3. Đối với hoạt động xây dựng, lắp đặt là giá trị công trình, hạng mục công trình hay phần công việc thực hiện bàn giao bao gồm cả giá trị nguyên vật liệu, máy móc, thiết bị chưa có thuế giá trị gia tăng. Trường hợp xây dựng, lắp đặt không bao thầu nguyên vật liệu, máy móc, thiết bị thì giá tính thuế là giá trị xây dựng, lắp đặt không bao gồm giá trị nguyên vật liệu và máy móc, thiết bị."}]},{"id":"nd181_8","no":8,"code":"Điều 8","title":"Điều 8. Giá tính thuế đối với hoạt động kinh doanh bất động sản","shortTitle":"Giá tính thuế đối với hoạt động kinh doanh bất động sản","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Đối với hoạt động kinh doanh bất động sản là giá bán bất động sản chưa có thuế giá trị gia tăng, trừ tiền sử dụng đất hoặc tiền thuê đất nộp ngân sách nhà nước (giá đất được trừ). Giá đất được trừ để tính thuế giá trị gia tăng được xác định trong một số trường hợp như sau:"},{"k":"p","t":"1. Trường hợp được Nhà nước giao đất, cho thuê đất trả tiền một lần cho cả thời gian thuê (thông qua đấu giá hoặc không thông qua đấu giá), chuyển mục đích sử dụng đất, công nhận quyền sử dụng đất, điều chỉnh quyết định giao đất, điều chỉnh quyết định cho thuê đất, điều chỉnh quy hoạch chi tiết, gia hạn sử dụng đất, điều chỉnh thời hạn sử dụng đất, chuyển hình thức từ thuê đất trả tiền hàng năm sang thuê đất trả tiền một lần cho cả thời gian thuê thì giá đất được trừ để tính thuế giá trị gia tăng là tiền sử dụng đất, tiền thuê đất trả tiền một lần cho cả thời gian thuê được tính theo quy định tại Nghị định của Chính phủ về tiền sử dụng đất, tiền thuê đất (chưa trừ tiền bồi thường, hỗ trợ, giải phóng mặt bằng về đất mà người sử dụng đất đã ứng trước (nếu có))."},{"k":"p","t":"2. Trường hợp cơ sở kinh doanh nhận chuyển nhượng bất động sản là quyền sử dụng đất của các tổ chức, cá nhân thì giá đất được trừ để tính thuế giá trị gia tăng khi chuyển nhượng là tiền sử dụng đất, tiền thuê đất nộp ngân sách nhà nước của khu đất, thửa đất nhận chuyển nhượng, không bao gồm giá trị cơ sở hạ tầng. Cơ sở kinh doanh được khấu trừ thuế giá trị gia tăng đầu vào của cơ sở hạ tầng (nếu có)."},{"k":"p","t":"3. Trường hợp cơ sở kinh doanh nhận góp vốn bằng quyền sử dụng đất của tổ chức, cá nhân thì giá đất được trừ để tính thuế giá trị gia tăng là tiền sử dụng đất, tiền thuê đất nộp ngân sách nhà nước."},{"k":"p","t":"4. Trường hợp cơ sở kinh doanh thực hiện hợp đồng BT được thanh toán bằng quỹ đất thì giá đất được trừ để tính thuế giá trị gia tăng là giá trị quỹ đất được thanh toán theo quy định của pháp luật về đầu tư theo phương thức đối tác công tư."},{"k":"p","t":"5. Trường hợp cơ sở kinh doanh xây dựng, kinh doanh cơ sở hạ tầng, xây dựng nhà để bán, chuyển nhượng hoặc cho thuê, giá tính thuế giá trị gia tăng là số tiền thu được theo tiến độ thực hiện dự án hoặc tiến độ thu tiền ghi trong hợp đồng trừ (-) giá đất được trừ quy định ở các khoản 1, 2, 3, 4 Điều này tương ứng với tỷ lệ % số tiền thu được trên tổng giá trị hợp đồng."},{"k":"p","t":"6. Trường hợp cơ sở kinh doanh xây dựng nhà nhiều tầng nhiều hộ ở, nhà chung cư để bán thì giá đất được trừ tính cho 01 m 2 nhà để bán được xác định bằng giá đất được trừ theo quy định ở các khoản 1, 2, 3, 4 Điều này chia (:) số m 2 sàn xây dựng không bao gồm diện tích dùng chung như hành lang, cầu thang, tầng hầm, công trình xây dựng dưới mặt đất."},{"k":"p","t":"7. Trường hợp cơ sở kinh doanh nhận chuyển nhượng bất động sản, nhận góp vốn bằng quyền sử dụng đất của tổ chức, cá nhân quy định tại khoản 2, khoản 3 Điều này không xác định được tiền sử dụng đất hoặc tiền thuê đất nộp ngân sách nhà nước thì giá tính thuế giá trị gia tăng là giá chuyển nhượng chưa có thuế giá trị gia tăng."}]},{"id":"nd181_9","no":9,"code":"Điều 9","title":"Điều 9. Giá tính thuế đối với hoạt động đại lý, môi giới mua bán hàng hóa, dịch vụ hưởng hoa hồng và hàng hóa, dịch vụ được sử dụng hóa đơn thanh toán ghi giá thanh toán","shortTitle":"Giá tính thuế đối với hoạt động đại lý, môi giới mua bán hàng hóa, dịch vụ hưởng hoa hồng và hàng hóa, dịch vụ được sử dụng hóa đơn thanh toán ghi giá thanh toán","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với hoạt động đại lý, môi giới mua bán hàng hóa và dịch vụ hưởng hoa hồng là tiền hoa hồng thu được từ các hoạt động này chưa có thuế giá trị gia tăng, trừ trường hợp không phải tính thuế giá trị gia tăng gồm:"},{"k":"p","t":"a) Doanh thu hàng hóa, dịch vụ nhận bán đại lý và doanh thu hoa hồng được hưởng từ hoạt động đại lý bán đúng giá quy định của bên giao đại lý hưởng hoa hồng của dịch vụ: bưu chính, viễn thông, bán vé xổ số, vé máy bay, ô tô, tàu hỏa, tàu thủy; đại lý vận tải quốc tế; đại lý của các dịch vụ ngành hàng không, hàng hải mà được áp dụng thuế suất thuế giá trị gia tăng 0%; đại lý bán bảo hiểm."},{"k":"p","t":"b) Doanh thu hàng hóa, dịch vụ và doanh thu hoa hồng đại lý được hưởng từ hoạt động đại lý bán hàng hóa, dịch vụ thuộc diện không chịu thuế giá trị gia tăng."},{"k":"p","t":"2. Đối với hàng hóa, dịch vụ được sử dụng hóa đơn thanh toán ghi giá thanh toán là giá đã có thuế giá trị gia tăng thì giá tính thuế được xác định theo công thức sau:"},{"k":"tbl","rows":[["Giá chưa có thuế giá trị gia tăng","=","Giá thanh toán"],["","","1 + thuế suất của hàng hóa, dịch vụ (%)"]]}]},{"id":"nd181_10","no":10,"code":"Điều 10","title":"Điều 10. Giá tính thuế đối với dịch vụ kinh doanh casino, trò chơi điện tử có thưởng và dịch vụ kinh doanh đặt cược","shortTitle":"Giá tính thuế đối với dịch vụ kinh doanh casino, trò chơi điện tử có thưởng và dịch vụ kinh doanh đặt cược","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với dịch vụ kinh doanh ca-si-nô, trò chơi điện tử có thưởng là số tiền thu được từ hoạt động này trừ số tiền đã đổi trả cho khách không sử dụng hết và số tiền trả thưởng cho khách (nếu có), đã có thuế tiêu thụ đặc biệt, chưa có thuế giá trị gia tăng. Trong đó, số tiền thu được là số tiền thu từ đổi đồng tiền quy ước cho người chơi tại quầy, tại bàn chơi và số tiền thu tại máy trò chơi điện tử có thưởng."},{"k":"p","t":"2. Đối với dịch vụ kinh doanh đặt cược là số tiền thu được từ bán vé đặt cược trừ số tiền đã trả thưởng cho khách (nếu có), đã có thuế tiêu thụ đặc biệt, chưa có thuế giá trị gia tăng."}]},{"id":"nd181_11","no":11,"code":"Điều 11","title":"Điều 11. Giá tính thuế đối với một số hoạt động sản xuất, kinh doanh khác","shortTitle":"Giá tính thuế đối với một số hoạt động sản xuất, kinh doanh khác","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Đối với các hoạt động sản xuất, kinh doanh gồm: hoạt động sản xuất điện của Tập đoàn Điện lực Việt Nam; vận tải, bốc xếp; dịch vụ du lịch theo hình thức lữ hành; dịch vụ cầm đồ; sách chịu thuế giá trị gia tăng bán theo đúng giá phát hành (giá bìa); hoạt động in; dịch vụ đại lý giám định, đại lý xét bồi thường, đại lý đòi người thứ ba bồi hoàn, đại lý xử lý hàng bồi thường 100% hưởng tiền công hoặc tiền hoa hồng thì giá tính thuế là giá bán chưa có thuế giá trị gia tăng. Trong đó:"},{"k":"p","t":"1. Đối với hoạt động sản xuất điện của Tập đoàn Điện lực Việt Nam:"},{"k":"p","t":"a) Đối với điện của các công ty thủy điện hạch toán phụ thuộc Tập đoàn Điện lực Việt Nam, hạch toán phụ thuộc các Tổng công ty phát điện, giá tính thuế giá trị gia tăng để xác định số thuế giá trị gia tăng nộp tại địa phương nơi có nhà máy thủy điện được tính bằng 35% giá bán lẻ điện bình quân chưa bao gồm thuế giá trị gia tăng theo quy định của pháp luật điện lực và pháp luật giá."},{"k":"p","t":"b) Đối với điện của các công ty nhiệt điện hạch toán phụ thuộc Tập đoàn Điện lực Việt Nam, hạch toán phụ thuộc các Tổng công ty phát điện, giá tính thuế giá trị gia tăng để xác định số thuế giá trị gia tăng nộp tại địa phương nơi có nhà máy nhiệt điện là giá bán điện cho khách hàng ghi trên hóa đơn theo hợp đồng mua bán điện áp dụng cho từng nhà máy nhiệt điện. Trường hợp chưa có hợp đồng mua bán điện áp dụng cho từng nhà máy nhiệt điện thì giá tính thuế giá trị gia tăng được xác định là giá bán lẻ điện bình quân chưa bao gồm thuế giá trị gia tăng theo quy định của pháp luật điện lực và pháp luật giá."},{"k":"p","t":"c) Đối với điện của các công ty sản xuất điện (trừ thủy điện, nhiệt điện) hạch toán phụ thuộc Tập đoàn Điện lực Việt Nam, hạch toán phụ thuộc các Tổng công ty phát điện, giá tính thuế giá trị gia tăng để xác định số thuế giá trị gia tăng nộp tại địa phương nơi có nhà máy sản xuất điện là giá bán điện chưa có thuế giá trị gia tăng do cơ quan nhà nước có thẩm quyền quy định cho từng loại hình phát điện. Trường hợp chưa có giá bán điện do cơ quan nhà nước có thẩm quyền quy định cho từng loại hình phát điện nêu tại điểm này thì giá tính thuế giá trị gia tăng được xác định là giá bán lẻ điện bình quân chưa bao gồm thuế giá trị gia tăng theo quy định của pháp luật điện lực và pháp luật giá."},{"k":"p","t":"2. Đối với vận tải, bốc xếp là giá cước vận tải, bốc xếp chưa có thuế giá trị gia tăng, không phân biệt cơ sở trực tiếp vận tải, bốc xếp hay thuê lại."},{"k":"p","t":"3. Đối với dịch vụ du lịch theo hình thức lữ hành, hợp đồng ký với khách hàng theo giá trọn gói (ăn, ở, đi lại) thì giá trọn gói được xác định là giá đã có thuế giá trị gia tăng."},{"k":"p","t":"Giá tính thuế được xác định theo công thức sau:"},{"k":"tbl","rows":[["Giá tính thuế","=","Giá trọn gói"],["","","1 + thuế suất"]]},{"k":"p","t":"Trường hợp giá trọn gói bao gồm cả các khoản chi vé máy bay vận chuyển khách du lịch từ nước ngoài vào Việt Nam, từ Việt Nam đi nước ngoài, các chi phí ăn, nghỉ, thăm quan và một số khoản chi ở nước ngoài khác (nếu có chứng từ hợp pháp) thì các khoản thu của khách hàng để chi cho các khoản trên được tính giảm trừ trong giá (doanh thu) tính thuế giá trị gia tăng. Thuế giá trị gia tăng đầu vào phục vụ hoạt động du lịch trọn gói được khấu trừ toàn bộ theo quy định."},{"k":"p","t":"4. Đối với dịch vụ cầm đồ giá tính thuế giá trị gia tăng là số tiền phải thu từ dịch vụ này chưa có thuế giá trị gia tăng. Số tiền phải thu từ dịch vụ này bao gồm tiền lãi phải thu từ cho vay cầm đồ và khoản thu khác phát sinh từ việc bán hàng cầm đồ (nếu có). Trường hợp số tiền thu từ dịch vụ này đã bao gồm thuế giá trị gia tăng thì giá tính thuế được xác định theo công thức sau:"},{"k":"tbl","rows":[["Giá tính thuế","=","Số tiền phải thu"],["","","1 + thuế suất"]]},{"k":"p","t":"5. Đối với sách chịu thuế giá trị gia tăng bán theo đúng giá phát hành (giá bìa) theo quy định của Luật Xuất bản thì giá bán đó được xác định là giá đã có thuế giá trị gia tăng. Các trường hợp bán không theo giá bìa thì thuế giá trị gia tăng tính trên giá bán ra chưa có thuế giá trị gia tăng."},{"k":"p","t":"6. Đối với hoạt động in, giá tính thuế là tiền công in chưa có thuế giá trị gia tăng. Trường hợp cơ sở in thực hiện các hợp đồng in, giá thanh toán bao gồm cả tiền công in và tiền giấy in thì giá tính thuế bao gồm cả tiền công in và giấy in chưa có thuế giá trị gia tăng."},{"k":"p","t":"7. Đối với dịch vụ đại lý giám định, đại lý xét bồi thường, đại lý đòi người thứ ba bồi hoàn, đại lý xử lý hàng bồi thường 100% có hưởng tiền công hoặc tiền hoa hồng thì giá tính thuế giá trị gia tăng là tiền công hoặc tiền hoa hồng được hưởng chưa có thuế giá trị gia tăng."}]},{"id":"nd181_12","no":12,"code":"Điều 12","title":"Điều 12. Giá tính thuế đối với dịch vụ viễn thông quốc tế","shortTitle":"Giá tính thuế đối với dịch vụ viễn thông quốc tế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Đối với dịch vụ viễn thông quốc tế giá tính thuế giá trị gia tăng là giá cung cấp dịch vụ viễn thông quốc tế chưa có thuế giá trị gia tăng; trường hợp cơ sở kinh doanh có phát sinh dịch vụ kết nối với mạng viễn thông tại nước ngoài thì giá tính thuế giá trị gia tăng được trừ đi các khoản thu của khách hàng để trả khoản phí kết nối. Cơ sở kinh doanh phải tách riêng khoản phí kết nối với mạng viễn thông tại nước ngoài để xác định giá tính thuế giá trị gia tăng; trường hợp không tách riêng được thì giá tính thuế giá trị gia tăng là toàn bộ giá trị hợp đồng chưa có thuế giá trị gia tăng."}]},{"id":"nd181_13","no":13,"code":"Điều 13","title":"Điều 13. Giá tính thuế đối với dịch vụ do tổ chức nước ngoài, cá nhân ở nước ngoài cung cấp","shortTitle":"Giá tính thuế đối với dịch vụ do tổ chức nước ngoài, cá nhân ở nước ngoài cung cấp","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"Đối với dịch vụ do tổ chức nước ngoài không có cơ sở thường trú tại Việt Nam, cá nhân ở nước ngoài là đối tượng không cư trú tại Việt Nam (sau đây gọi chung là Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài) có doanh thu phát sinh tại Việt Nam chưa thực hiện đầy đủ chế độ kế toán, hóa đơn, chứng từ, không bao gồm các nhà cung cấp nước ngoài quy định tại khoản 4 Điều 4 của Luật Thuế giá trị gia tăng thì giá tính thuế giá trị gia tăng là toàn bộ doanh thu do cung cấp dịch vụ, dịch vụ gắn với hàng hóa thuộc đối tượng chịu thuế giá trị gia tăng mà Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài nhận được, chưa trừ các khoản thuế phải nộp, kể cả các khoản chi phí do Bên Việt Nam trả thay Nhà thầu nước ngoài, Nhà thầu phụ nước ngoài (nếu có). Bộ Tài chính quy định chi tiết Điều này."}]},{"id":"nd181_14","no":14,"code":"Điều 14","title":"Điều 14. Nguyên tắc xác định giá tính thuế giá trị gia tăng","shortTitle":"Nguyên tắc xác định giá tính thuế giá trị gia tăng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Giá tính thuế đối với các loại hàng hóa, dịch vụ quy định tại Mục này:"},{"k":"p","t":"a) Bao gồm cả khoản phụ thu và phí thu thêm ngoài giá hàng hóa, dịch vụ mà cơ sở kinh doanh được hưởng."},{"k":"p","t":"b) Không bao gồm các khoản thu không liên quan đến bán hàng hóa, cung cấp dịch vụ của cơ sở kinh doanh: các khoản thu về bồi thường bằng tiền (bao gồm cả tiền bồi thường về đất và tài sản trên đất khi bị thu hồi đất theo quyết định của cơ quan nhà nước có thẩm quyền), tiền thưởng, thu đòi người thứ ba của hoạt động bảo hiểm, các khoản thu hộ, các khoản thù lao từ cơ quan nhà nước do thực hiện hoạt động thu hộ, chi hộ các cơ quan nhà nước, các khoản thu tài chính."},{"k":"p","t":"2. Trường hợp cơ sở kinh doanh áp dụng hình thức chiết khấu thương mại dành cho khách hàng (nếu có) thì giá tính thuế giá trị gia tăng là giá bán đã chiết khấu thương mại dành cho khách hàng chưa có thuế giá trị gia tăng."},{"k":"p","t":"3. Trường hợp cơ sở kinh doanh đã tính thuế giá trị gia tăng nhưng giá tính thuế bị thay đổi theo kết luận của cơ quan nhà nước có thẩm quyền theo quy định của pháp luật có liên quan thì giá tính thuế được xác định theo kết luận của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"THỜI ĐIỂM XÁC ĐỊNH THUẾ GIÁ TRỊ GIA TĂNG"}]},{"id":"nd181_15","no":15,"code":"Điều 15","title":"Điều 15. Thời điểm xác định thuế giá trị gia tăng đối với hàng hóa xuất khẩu, hàng hóa nhập khẩu","shortTitle":"Thời điểm xác định thuế giá trị gia tăng đối với hàng hóa xuất khẩu, hàng hóa nhập khẩu","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối với hàng hóa xuất khẩu, thời điểm xác định thuế giá trị gia tăng do người bán tự xác định nhưng chậm nhất không quá ngày làm việc tiếp theo kể từ ngày hàng hóa được thông quan theo quy định của pháp luật về hải quan."},{"k":"p","t":"2. Đối với hàng hóa nhập khẩu, thời điểm xác định thuế giá trị gia tăng là thời điểm xác định thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu."}]},{"id":"nd181_16","no":16,"code":"Điều 16","title":"Điều 16. Thời điểm xác định thuế giá trị gia tăng đối với một số hàng hóa, dịch vụ khác","shortTitle":"Thời điểm xác định thuế giá trị gia tăng đối với một số hàng hóa, dịch vụ khác","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối với dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng):"},{"k":"p","t":"a) Đối với dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng) phải thực hiện đối soát dữ liệu kết nối giữa các cơ sở kinh doanh dịch vụ, thời điểm xác định thuế giá trị gia tăng là thời điểm hoàn thành việc đối soát dữ liệu về cước dịch vụ theo hợp đồng kinh tế giữa các cơ sở kinh doanh dịch vụ nhưng chậm nhất không quá 02 tháng kể từ tháng phát sinh cước dịch vụ kết nối."},{"k":"p","t":"b) Đối với dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng) được cung cấp theo kỳ nhất định, thời điểm xác định thuế giá trị gia tăng là thời điểm hoàn thành việc đối soát dữ liệu giữa các bên (trừ trường hợp nêu tại điểm a khoản này) nhưng chậm nhất không quá ngày 07 của tháng sau tháng phát sinh việc cung cấp dịch vụ hoặc không quá 07 ngày kể từ ngày kết thúc kỳ quy ước. Kỳ quy ước để làm căn cứ tính lượng dịch vụ cung cấp căn cứ thỏa thuận giữa đơn vị cung cấp dịch vụ với người mua."},{"k":"p","t":"c) Đối với dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng) được cung cấp thông qua bán thẻ trả trước, thu cước phí hòa mạng, thời điểm xác định thuế giá trị gia tăng là thời điểm bán thẻ trả trước, thu cước phí hòa mạng."},{"k":"p","t":"2. Đối với hoạt động bán điện:"},{"k":"p","t":"a) Đối với hoạt động bán điện của các công ty phát điện trên thị trường điện, thời điểm xác định thuế giá trị gia tăng được xác định căn cứ thời điểm về đối soát số liệu thanh toán giữa đơn vị vận hành hệ thống điện và thị trường điện, đơn vị phát điện và đơn vị mua điện theo quy định của Bộ Công Thương hoặc hợp đồng mua bán điện đã được Bộ Công Thương hướng dẫn, phê duyệt nhưng chậm nhất là ngày cuối cùng của thời hạn kê khai, nộp thuế đối với tháng phát sinh nghĩa vụ thuế theo quy định pháp luật về quản lý thuế. Riêng hoạt động bán điện của các công ty phát điện có cam kết bảo lãnh của Chính phủ về thời điểm thanh toán thì thời điểm xác định thuế giá trị gia tăng căn cứ theo bảo lãnh của Chính phủ, hướng dẫn và phê duyệt của Bộ Công Thương và các hợp đồng mua bán điện đã được ký kết giữa bên mua điện và bên bán điện."},{"k":"p","t":"b) Đối với hoạt động bán điện (trừ trường hợp nêu tại điểm a khoản này), thời điểm xác định thuế giá trị gia tăng là thời điểm hoàn thành việc đối soát dữ liệu giữa các bên nhưng chậm nhất không quá ngày 07 của tháng sau tháng phát sinh việc cung cấp điện hoặc không quá 07 ngày kể từ ngày kết thúc kỳ quy ước. Kỳ quy ước để làm căn cứ tính lượng điện cung cấp căn cứ thỏa thuận giữa đơn vị cung cấp điện với người mua."},{"k":"p","t":"3. Đối với hoạt động cung cấp nước sạch, thời điểm xác định thuế giá trị gia tăng là thời điểm hoàn thành việc đối soát dữ liệu giữa các bên nhưng chậm nhất không quá ngày 07 của tháng sau tháng phát sinh việc cung cấp nước hoặc không quá 07 ngày kể từ ngày kết thúc kỳ quy ước. Kỳ quy ước để làm căn cứ tính lượng nước cung cấp căn cứ thỏa thuận giữa đơn vị cung cấp nước với người mua."},{"k":"p","t":"4. Đối với hoạt động kinh doanh bảo hiểm, thời điểm xác định thuế giá trị gia tăng là thời điểm ghi nhận doanh thu bảo hiểm theo quy định của pháp luật về kinh doanh bảo hiểm."},{"k":"p","t":"5. Đối với hoạt động kinh doanh bất động sản, xây dựng cơ sở hạ tầng, xây dựng nhà để bán, chuyển nhượng hoặc cho thuê:"},{"k":"p","t":"a) Trường hợp đã chuyển giao quyền sở hữu, quyền sử dụng, thời điểm xác định thuế giá trị gia tăng là thời điểm chuyển giao quyền sở hữu hoặc quyền sử dụng hàng hóa cho người mua, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"b) Trường hợp chưa chuyển giao quyền sở hữu, quyền sử dụng mà có thực hiện thu tiền theo tiến độ thực hiện dự án hoặc tiến độ thu tiền ghi trong hợp đồng, thời điểm xác định thuế giá trị gia tăng là ngày thu tiền hoặc theo thỏa thuận thanh toán trong hợp đồng."},{"k":"p","t":"6. Đối với hoạt động xây dựng, lắp đặt bao gồm cả đóng tàu, thời điểm xác định thuế giá trị gia tăng là thời điểm nghiệm thu, bàn giao công trình, hạng mục công trình, khối lượng xây dựng, lắp đặt hoàn thành hay phần công việc thực hiện bàn giao, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"7. Đối với hoạt động dầu khí:"},{"k":"p","t":"a) Đối với hoạt động tìm kiếm, thăm dò, khai thác và chế biến dầu thô, thời điểm xác định thuế giá trị gia tăng của hoạt động bán dầu thô, condensate, các sản phẩm được chế biến từ dầu thô (bao gồm cả hoạt động bao tiêu sản phẩm theo cam kết của Chính phủ) là thời điểm bên mua và bên bán xác định được giá bán chính thức, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"b) Đối với hoạt động bán khí thiên nhiên, khí đồng hành, khí than được chuyển bằng đường ống dẫn khí đến người mua, thời điểm xác định thuế giá trị gia tăng là thời điểm bên mua, bên bán xác định khối lượng khí giao của tháng nhưng chậm nhất là ngày cuối cùng của thời hạn kê khai, nộp thuế đối với tháng phát sinh nghĩa vụ thuế theo quy định pháp luật về quản lý thuế."},{"k":"p","t":"THUẾ SUẤT"}]},{"id":"nd181_17","no":17,"code":"Điều 17","title":"Điều 17. Mức thuế suất 0%","shortTitle":"Mức thuế suất 0%","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Mức thuế suất 0% áp dụng đối với hàng hóa, dịch vụ quy định tại khoản 1 Điều 9 Luật Thuế giá trị gia tăng. Trong đó:"},{"k":"p","t":"1. Hàng hóa xuất khẩu bao gồm:"},{"k":"p","t":"a) Hàng hóa từ Việt Nam bán cho tổ chức, cá nhân ở nước ngoài và được tiêu dùng ở ngoài Việt Nam."},{"k":"p","t":"b) Hàng hóa từ nội địa Việt Nam bán cho tổ chức trong khu phi thuế quan và được tiêu dùng trong khu phi thuế quan phục vụ trực tiếp cho hoạt động sản xuất xuất khẩu."},{"k":"p","t":"c) Hàng hóa đã bán tại khu vực cách ly cho cá nhân (người nước ngoài hoặc người Việt Nam) đã làm thủ tục xuất cảnh; hàng hóa đã bán tại cửa hàng miễn thuế. Khu vực cách ly, cửa hàng miễn thuế xác định theo quy định tại Nghị định số 68/2016/NĐ-CP ngày 01 tháng 7 năm 2016 của Chính phủ quy định về điều kiện kinh doanh hàng miễn thuế, kho bãi, địa điểm làm thủ tục hải quan, tập kết, kiểm tra, giám sát hải quan (đã được sửa đổi, bổ sung bởi Nghị định số 67/2020/NĐ-CP ngày 15 tháng 6 năm 2020 của Chính phủ)."},{"k":"p","t":"2. Dịch vụ xuất khẩu bao gồm:"},{"k":"p","t":"a) Dịch vụ cung cấp trực tiếp cho tổ chức, cá nhân ở nước ngoài và được tiêu dùng ở ngoài Việt Nam. Trong đó, cá nhân ở nước ngoài đáp ứng điều kiện ở ngoài Việt Nam trong thời gian diễn ra việc cung cấp dịch vụ."},{"k":"p","t":"b) Dịch vụ cung cấp trực tiếp cho tổ chức ở trong khu phi thuế quan và được tiêu dùng trong khu phi thuế quan phục vụ trực tiếp cho hoạt động sản xuất xuất khẩu, bao gồm: dịch vụ cung cấp trực tiếp cho tổ chức ở trong khu phi thuế quan và được tiêu dùng trong khu phi thuế quan phục vụ trực tiếp cho hoạt động sản xuất xuất khẩu; dịch vụ vận chuyển, dịch vụ cung cấp cho doanh nghiệp chế xuất (dịch vụ nâng hạ container tại cảng, nhà máy, kho hàng; dịch vụ xếp dỡ, bốc xếp tại nhà máy, cảng, sân bay và các chi phí phát sinh có liên quan như: phí chứng từ, phí điện giao hàng, phí niêm chì, phí làm hàng, phí đóng gói). Tổ chức trong khu phi thuế quan là tổ chức có đăng ký kinh doanh."},{"k":"p","t":"3. Hàng hóa, dịch vụ xuất khẩu khác bao gồm: vận tải quốc tế; dịch vụ cho thuê phương tiện vận tải được sử dụng ngoài phạm vi lãnh thổ Việt Nam; dịch vụ của ngành hàng không, hàng hải cung cấp trực tiếp hoặc thông qua đại lý cho vận tải quốc tế; hoạt động xây dựng, lắp đặt công trình ở nước ngoài hoặc ở trong khu phi thuế quan; sản phẩm nội dung thông tin số cung cấp cho bên nước ngoài và có hồ sơ, tài liệu chứng minh tiêu dùng ở ngoài Việt Nam; phụ tùng, vật tư thay thế để sửa chữa, bảo dưỡng phương tiện, máy móc, thiết bị cho bên nước ngoài và tiêu dùng ở ngoài Việt Nam; hàng hóa gia công chuyển tiếp để xuất khẩu theo quy định của pháp luật; hàng hóa, dịch vụ thuộc đối tượng không chịu thuế giá trị gia tăng khi xuất khẩu, trừ các trường hợp không áp dụng mức thuế suất 0% quy định tại khoản 4 Điều này. Trong đó:"},{"k":"p","t":"a) Vận tải quốc tế bao gồm vận tải hành khách, hành lý, hàng hóa theo chặng quốc tế từ Việt Nam ra nước ngoài hoặc từ nước ngoài đến Việt Nam, hoặc cả điểm đi và đến ở nước ngoài, không phân biệt có phương tiện trực tiếp vận tải hay không có phương tiện. Trường hợp, hợp đồng vận tải quốc tế bao gồm cả chặng vận tải nội địa thì vận tải quốc tế bao gồm cả chặng nội địa."},{"k":"p","t":"b) Dịch vụ của ngành hàng không gồm: dịch vụ cung cấp suất ăn hàng không; dịch vụ cất hạ cánh tàu bay; dịch vụ sân đậu tàu bay; dịch vụ an ninh bảo vệ tàu bay; soi chiếu an ninh hành khách, hành lý và hàng hóa; dịch vụ băng chuyền hành lý tại nhà ga; dịch vụ phục vụ kỹ thuật thương mại mặt đất; dịch vụ bảo vệ tàu bay; dịch vụ kéo đẩy tàu bay; dịch vụ dẫn tàu bay; dịch vụ thuê cầu dẫn khách lên, xuống máy bay; dịch vụ điều hành bay đi, đến; dịch vụ vận chuyển tổ lái, tiếp viên và hành khách trong khu vực sân đậu tàu bay; chất xếp, kiểm đếm hàng hóa; dịch vụ phục vụ hành khách đi chuyến bay quốc tế từ cảng hàng không Việt Nam; dịch vụ sửa chữa tàu bay; dịch vụ tra nạp ngầm nhiên liệu cho các chuyến bay quốc tế. Dịch vụ của ngành hàng không áp dụng thuế suất 0% là những dịch vụ được thực hiện trong khu vực cảng hàng không quốc tế, sân bay, nhà ga hàng hóa hàng không quốc tế."},{"k":"p","t":"c) Dịch vụ của ngành hàng hải gồm: dịch vụ lai dắt tàu biển; hoa tiêu hàng hải; cứu hộ hàng hải; cầu cảng, bến phao; bốc xếp; buộc cởi dây; đóng mở nắp hầm hàng; vệ sinh hầm tàu; kiểm đếm, giao nhận; đăng kiểm; dịch vụ sửa chữa tàu biển. Dịch vụ của ngành hàng hải áp dụng thuế suất 0% là những dịch vụ được thực hiện tại khu vực cảng."},{"k":"p","t":"d) Sản phẩm nội dung thông tin số cung cấp cho bên nước ngoài là sản phẩm nội dung, thông tin bao gồm văn bản, dữ liệu, hình ảnh, âm thanh được thể hiện dưới dạng số, được lưu giữ, truyền đưa trên môi trường mạng xác định theo quy định của pháp luật về công nghệ thông tin. Cơ sở kinh doanh cung cấp sản phẩm nội dung thông tin số phải có hồ sơ, tài liệu chứng minh tiêu dùng ở ngoài Việt Nam, như: thông tin về tình trạng cư trú của bên nước ngoài (tổ chức, cá nhân) ở nước ngoài (thông tin địa chỉ thanh toán, địa chỉ giao hàng, địa chỉ trụ sở, địa chỉ nhà hoặc các thông tin tương tự mà tổ chức, cá nhân mua hàng khai báo với cơ sở kinh doanh cung cấp dịch vụ ở Việt Nam); thông tin về truy cập của tổ chức, cá nhân ở nước ngoài, như thông tin về mã vùng điện thoại quốc gia của thẻ SIM, địa chỉ IP, vị trí đường dây điện thoại cố định hoặc các thông tin tương tự của tổ chức, cá nhân mua hàng hóa, dịch vụ."},{"k":"p","t":"4. Các trường hợp không áp dụng thuế suất 0% quy định tại điểm b và d khoản 1 Điều 9 Luật Thuế giá trị gia tăng bao gồm:"},{"k":"p","t":"a) Chuyển giao công nghệ, chuyển nhượng quyền sở hữu trí tuệ ra nước ngoài."},{"k":"p","t":"b) Dịch vụ tái bảo hiểm ra nước ngoài."},{"k":"p","t":"c) Dịch vụ cấp tín dụng."},{"k":"p","t":"d) Chuyển nhượng vốn."},{"k":"p","t":"đ) Sản phẩm phái sinh."},{"k":"p","t":"e) Dịch vụ bưu chính, viễn thông."},{"k":"p","t":"g) Sản phẩm xuất khẩu quy định tại khoản 14 Điều 4 của Nghị định này."},{"k":"p","t":"h) Thuốc lá, rượu, bia nhập khẩu sau đó xuất khẩu."},{"k":"p","t":"i) Xăng, dầu mua tại nội địa bán cho cơ sở kinh doanh trong khu phi thuế quan; xe ô tô bán cho tổ chức, cá nhân trong khu phi thuế quan."},{"k":"p","t":"k) Các dịch vụ cung cấp tại Việt Nam cho tổ chức, cá nhân ở nước ngoài như sau: thi đấu thể thao, biểu diễn nghệ thuật, văn hóa, giải trí, hội nghị, khách sạn, đào tạo, quảng cáo, du lịch lữ hành; dịch vụ cung cấp gắn với việc bán, phân phối, tiêu thụ sản phẩm, hàng hóa tại Việt Nam; dịch vụ thanh toán không dùng tiền mặt."},{"k":"p","t":"l) Các dịch vụ do cơ sở kinh doanh cung cấp cho tổ chức, cá nhân ở trong khu phi thuế quan bao gồm: cho thuê nhà, hội trường, văn phòng, khách sạn, kho bãi; dịch vụ vận chuyển đưa đón người lao động; dịch vụ ăn uống (trừ dịch vụ cung cấp suất ăn công nghiệp, dịch vụ ăn uống trong khu phi thuế quan)."},{"k":"p","t":"5. Hàng hóa, dịch vụ bán, cung cấp cho tổ chức trong khu phi thuế quan và được tiêu dùng trong khu phi thuế quan phục vụ trực tiếp cho hoạt động sản xuất xuất khẩu quy định tại khoản 1, khoản 2 Điều này là hàng hóa, dịch vụ được tiêu dùng trong khu phi thuế quan phục vụ cho hoạt động sản xuất xuất khẩu của tổ chức trong khu phi thuế quan và không phục vụ cho hoạt động khác không phải hoạt động sản xuất xuất khẩu, trừ các hàng hóa, dịch vụ quy định tại khoản 4 Điều này."},{"k":"p","t":"6. Bộ Tài chính quy định chi tiết Điều này trong trường hợp cần thiết để thực hiện chức năng quản lý nhà nước."}]},{"id":"nd181_18","no":18,"code":"Điều 18","title":"Điều 18. Điều kiện áp dụng thuế suất 0%","shortTitle":"Điều kiện áp dụng thuế suất 0%","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Hàng hóa, dịch vụ xuất khẩu áp dụng thuế suất 0% quy định tại Điều 17 Nghị định này (trừ một số trường hợp đặc thù quy định tại Điều 27, Điều 28 Nghị định này) phải đáp ứng quy định sau:"},{"k":"p","t":"1. Đối với hàng hóa xuất khẩu, phải có:"},{"k":"p","t":"a) Hợp đồng bán, gia công hàng hóa xuất khẩu (đối với trường hợp bán, gia công); hợp đồng ủy thác xuất khẩu (đối với trường hợp ủy thác xuất khẩu)."},{"k":"p","t":"b) Chứng từ thanh toán không dùng tiền mặt đối với hàng hóa xuất khẩu."},{"k":"p","t":"c) Tờ khai hải quan theo quy định."},{"k":"p","t":"2. Đối với dịch vụ xuất khẩu, trừ quy định tại khoản 3, 4, 5 Điều này, phải có:"},{"k":"p","t":"a) Hợp đồng cung cấp dịch vụ với tổ chức, cá nhân ở nước ngoài hoặc ở trong khu phi thuế quan."},{"k":"p","t":"b) Chứng từ thanh toán không dùng tiền mặt đối với dịch vụ xuất khẩu."},{"k":"p","t":"3. Đối với vận tải quốc tế, phải có:"},{"k":"p","t":"a) Hợp đồng vận chuyển hành khách, hành lý, hàng hóa giữa người vận chuyển và người thuê vận chuyển theo chặng quốc tế từ Việt Nam ra nước ngoài hoặc từ nước ngoài đến Việt Nam hoặc cả điểm đi và điểm đến ở nước ngoài theo các hình thức phù hợp với quy định của pháp luật. Đối với vận chuyển hành khách, hợp đồng vận chuyển là vé. Cơ sở kinh doanh vận tải quốc tế thực hiện theo các quy định của pháp luật về vận tải."},{"k":"p","t":"b) Chứng từ thanh toán không dùng tiền mặt. Đối với trường hợp vận chuyển hành khách là cá nhân, có chứng từ thanh toán trực tiếp."},{"k":"p","t":"4. Đối với dịch vụ của ngành hàng không, phải có:"},{"k":"p","t":"a) Hợp đồng cung cấp dịch vụ với tổ chức ở nước ngoài, hãng hàng không nước ngoài hoặc yêu cầu cung cấp dịch vụ của tổ chức ở nước ngoài, hãng hàng không nước ngoài."},{"k":"p","t":"b) Chứng từ thanh toán không dùng tiền mặt. Trường hợp các dịch vụ cung cấp cho tổ chức nước ngoài, hãng hàng không nước ngoài phát sinh không thường xuyên, không theo lịch trình và không có hợp đồng, phải có chứng từ thanh toán trực tiếp của tổ chức nước ngoài, hãng hàng không nước ngoài."},{"k":"p","t":"Các quy định về hợp đồng và chứng từ thanh toán nêu tại khoản này không áp dụng đối với dịch vụ phục vụ hành khách đi chuyến bay quốc tế từ cảng hàng không Việt Nam (passenger service charges)."},{"k":"p","t":"Riêng đối với dịch vụ sửa chữa tàu bay cung cấp cho tổ chức, cá nhân nước ngoài, để được áp dụng thuế suất 0%, tàu bay đưa vào Việt Nam phải làm thủ tục tạm nhập khẩu, tái xuất khẩu theo quy định."},{"k":"p","t":"5. Đối với dịch vụ của ngành hàng hải, phải có:"},{"k":"p","t":"a) Hợp đồng cung cấp dịch vụ với tổ chức ở nước ngoài, người đại lý tàu biển hoặc yêu cầu cung cấp dịch vụ của tổ chức ở nước ngoài hoặc người đại lý tàu biển."},{"k":"p","t":"b) Chứng từ thanh toán không dùng tiền mặt của tổ chức ở nước ngoài hoặc có chứng từ thanh toán không dùng tiền mặt của người đại lý tàu biển cho cơ sở kinh doanh cung cấp dịch vụ."},{"k":"p","t":"Riêng đối với dịch vụ sửa chữa tàu biển cung cấp cho tổ chức, cá nhân nước ngoài, để được áp dụng thuế suất 0%, tàu biển đưa vào Việt Nam phải làm thủ tục tạm nhập khẩu, tái xuất khẩu theo quy định."}]},{"id":"nd181_19","no":19,"code":"Điều 19","title":"Điều 19. Mức thuế suất 5%","shortTitle":"Mức thuế suất 5%","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"Mức thuế suất 5% áp dụng đối với hàng hóa, dịch vụ quy định tại khoản 2 Điều 9 Luật Thuế giá trị gia tăng. Một số trường hợp được quy định chi tiết như sau:"},{"k":"p","t":"1. Phân bón, quặng để sản xuất phân bón, thuốc bảo vệ thực vật và chất kích thích tăng trưởng vật nuôi theo quy định của pháp luật, trong đó: quặng để sản xuất phân bón là các quặng làm nguyên liệu để sản xuất phân bón như quặng Apatít dùng để sản xuất các loại phân bón chứa lân, đất bùn làm phân vi sinh; thuốc bảo vệ thực vật thực hiện theo quy định của pháp luật về bảo vệ và kiểm dịch thực vật."},{"k":"p","t":"2. Dịch vụ đào đắp, nạo vét kênh, mương, ao hồ phục vụ sản xuất nông nghiệp; nuôi trồng, chăm sóc, phòng trừ sâu bệnh cho cây trồng; sơ chế, bảo quản sản phẩm nông nghiệp. Trong đó, sơ chế, bảo quản các sản phẩm nông nghiệp bao gồm các dịch vụ: làm sạch, phơi, sấy khô, bóc vỏ, xay xát, xay vỡ mảnh, nghiền vỡ mảnh, xay bỏ vỏ, xát bỏ vỏ, tách hạt, tách cọng, cắt, xay, đánh bóng hạt, hồ hạt, chia tách ra từng phần, bỏ xương, băm, lột da, nghiền, cán mỏng, ướp muối, đóng hộp kín khí, bảo quản lạnh (ướp lạnh, đông lạnh), bảo quản bằng khí sunfuro, bảo quản theo phương thức cho hóa chất để tránh thối rữa, ngâm trong dung dịch lưu huỳnh hoặc ngâm trong dung dịch bảo quản khác và các hình thức bảo quản thông thường khác."},{"k":"p","t":"3. Sản phẩm cây trồng, rừng trồng (trừ gỗ, măng), chăn nuôi, thủy sản nuôi trồng, đánh bắt chưa chế biến thành các sản phẩm khác hoặc chỉ qua sơ chế thông thường, trừ sản phẩm quy định tại khoản 1 Điều 4 của Nghị định này."},{"k":"p","t":"4. Mủ cao su dạng mủ cờ rếp, mủ tờ, mủ bún, mủ cốm; lưới, dây giềng và sợi để đan lưới đánh cá. Trong đó, lưới, dây giềng và sợi để đan lưới đánh cá bao gồm các loại lưới đánh cá, các loại sợi, dây giềng loại chuyên dùng để đan lưới đánh cá không phân biệt nguyên liệu sản xuất."},{"k":"p","t":"5. Sản phẩm bằng đay, cói, tre, nứa, lá, rơm, vỏ dừa, sọ dừa, bèo tây và các sản phẩm thủ công khác sản xuất bằng nguyên liệu tận dụng từ nông nghiệp; xơ bông đã qua chải thô, chải kỹ; giấy in báo. Trong đó, sản phẩm bằng đay, cói, tre, nứa, lá, rơm, vỏ dừa, sọ dừa, bèo tây và các sản phẩm thủ công khác sản xuất bằng nguyên liệu tận dụng từ nông nghiệp là các loại sản phẩm được sản xuất, chế biến từ nguyên liệu chính bằng đay, cói, tre, song, mây, trúc, chít, nứa, luồng, lá như: thảm đay, sợi đay, bao đay, thảm xơ dừa, chiếu sản xuất bằng đay, cói; chổi chít, dây thừng, dây buộc làm bằng tre nứa, xơ dừa; rèm, mành bằng tre, trúc, nứa, chổi tre, nón lá; đũa tre, đũa luồng."},{"k":"p","t":"6. Tàu khai thác thủy sản tại vùng biển; máy móc, thiết bị chuyên dùng phục vụ cho sản xuất nông nghiệp. Trong đó, máy móc, thiết bị chuyên dùng phục vụ cho sản xuất nông nghiệp bao gồm: máy cày; máy bừa; máy phay; máy rạch hàng; máy bạt gốc; thiết bị san phẳng đồng ruộng; máy gieo hạt; máy cấy; máy trồng mía; hệ thống máy sản xuất mạ thảm; máy xới, máy vun luống, máy vãi, rắc phân, bón phân; máy, bình phun thuốc bảo vệ thực vật; máy thu hoạch lúa, ngô, mía, cà phê, bông; máy thu hoạch củ, quả, rễ; máy đốn chè, máy hái chè; máy tuốt đập lúa; máy bóc bẹ tẽ hạt ngô; máy tẽ ngô; máy đập đậu tương; máy bóc vỏ lạc; xát vỏ cà phê; máy thiết bị sơ chế cà phê, thóc ướt; máy sấy nông sản (lúa, ngô, cà phê, tiêu, điều...), thủy sản; máy thu gom, bốc mía, lúa, rơm rạ trên đồng; máy ấp, nở trứng gia cầm; máy thu hoạch cỏ, máy đóng kiện rơm, cỏ; máy vắt sữa và các loại máy chuyên dùng khác."},{"k":"p","t":"Bộ Nông nghiệp và Môi trường chủ trì, phối hợp với Bộ Tài chính hướng dẫn các loại máy chuyên dùng khác phục vụ cho sản xuất nông nghiệp thuộc đối tượng áp dụng mức thuế suất 5% theo quy định tại khoản này."},{"k":"p","t":"7. Thiết bị y tế theo quy định của pháp luật về quản lý thiết bị y tế; thuốc phòng bệnh, chữa bệnh; dược chất, dược liệu là nguyên liệu sản xuất thuốc chữa bệnh, thuốc phòng bệnh. Trong đó:"},{"k":"p","t":"a)  Thiết bị y tế là thiết bị có Giấy phép nhập khẩu hoặc có Giấy chứng nhận đăng ký lưu hành hoặc Văn bản công bố tiêu chuẩn áp dụng của trang thiết bị y tế theo quy định của pháp luật về y tế hoặc theo Danh mục thiết bị y tế xuất khẩu, nhập khẩu đã được xác định mã số hàng hóa theo Danh mục hàng hóa xuất khẩu, nhập khẩu Việt Nam do Bộ trưởng Bộ Y tế ban hành theo quy định của pháp luật về quản lý thiết bị y tế."},{"k":"p","t":"b)  Thuốc phòng bệnh, chữa bệnh bao gồm thuốc thành phẩm, nguyên liệu làm thuốc, trừ thực phẩm chức năng; vắc-xin; sinh phẩm y tế, nước cất để pha chế thuốc tiêm, dịch truyền."},{"k":"p","t":"8.  Hoạt động nghệ thuật biểu diễn truyền thống, dân gian là các hoạt động nghệ thuật biểu diễn, nghệ thuật trình diễn dân gian theo quy định pháp luật về nghệ thuật biểu diễn và di sản văn hóa."},{"k":"p","t":"9.  Đồ chơi cho trẻ em; sách các loại, trừ sách quy định tại khoản 8 Điều 4 của Nghị định này."},{"k":"p","t":"PHƯƠNG PHÁP KHẤU TRỪ THUẾ"}]},{"id":"nd181_20","no":20,"code":"Điều 20","title":"Điều 20. Phương pháp khấu trừ thuế","shortTitle":"Phương pháp khấu trừ thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1.  Số thuế giá trị gia tăng phải nộp theo phương pháp khấu trừ thuế bằng số thuế giá trị gia tăng đầu ra trừ số thuế giá trị gia tăng đầu vào được khấu trừ."},{"k":"p","t":"2.  Số thuế giá trị gia tăng đầu ra bằng tổng số thuế giá trị gia tăng của hàng hóa, dịch vụ bán ra ghi trên hóa đơn giá trị gia tăng."},{"k":"p","t":"Thuế giá trị gia tăng của hàng hóa, dịch vụ bán ra ghi trên hóa đơn giá trị gia tăng bằng giá tính thuế của hàng hóa, dịch vụ chịu thuế bán ra nhân với thuế suất thuế giá trị gia tăng của hàng hóa, dịch vụ đó."},{"k":"p","t":"Trường hợp sử dụng hóa đơn ghi giá thanh toán là giá đã có thuế giá trị gia tăng thì thuế giá trị gia tăng đầu ra được xác định bằng giá thanh toán trừ giá tính thuế giá trị gia tăng xác định theo quy định tại khoản 2 Điều 9 Nghị định này."},{"k":"p","t":"3.  Số thuế giá trị gia tăng đầu vào được khấu trừ bằng tổng số thuế giá trị gia tăng ghi trên hóa đơn giá trị gia tăng mua hàng hóa, dịch vụ, chứng từ nộp thuế giá trị gia tăng của hàng hóa nhập khẩu hoặc chứng từ nộp thuế đối với trường hợp mua dịch vụ và đáp ứng điều kiện khấu trừ quy định tại Mục 1, Mục 2 Chương III Nghị định này. Trong đó, chứng từ nộp thuế đối với trường hợp mua dịch vụ thực hiện theo quy định tại điểm a khoản 2 Điều 3 của Nghị định này, khoản 3 Điều 4 Luật Thuế giá trị gia tăng."}]},{"id":"nd181_21","no":21,"code":"Điều 21","title":"Điều 21. Đối tượng áp dụng phương pháp khấu trừ thuế","shortTitle":"Đối tượng áp dụng phương pháp khấu trừ thuế","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"Phương pháp khấu trừ thuế áp dụng đối với cơ sở kinh doanh thực hiện đầy đủ chế độ kế toán, hóa đơn, chứng từ theo quy định của pháp luật về kế toán, hóa đơn, chứng từ bao gồm:"},{"k":"p","t":"1.  Cơ sở kinh doanh có doanh thu hằng năm từ bán hàng hóa, cung cấp dịch vụ từ 01 tỷ đồng trở lên, trừ hộ, cá nhân sản xuất, kinh doanh. Trong đó:"},{"k":"p","t":"a)  Doanh thu hằng năm do cơ sở kinh doanh tự xác định căn cứ vào tổng cộng chỉ tiêu “Tổng doanh thu của hàng hóa, dịch vụ bán ra chịu thuế giá trị gia tăng” trên Tờ khai thuế giá trị gia tăng tháng của kỳ tính thuế từ tháng 11 năm trước đến hết kỳ tính thuế tháng 10 năm hiện tại, trước năm xác định phương pháp tính thuế giá trị gia tăng hoặc trên Tờ khai thuế giá trị gia tăng quý của kỳ tính thuế từ quý 4 năm trước đến hết kỳ tính thuế quý 3 năm hiện tại, trước năm xác định phương pháp tính thuế giá trị gia tăng. Thời gian áp dụng ổn định phương pháp tính thuế là 02 năm liên tục."},{"k":"p","t":"b)  Trường hợp cơ sở kinh doanh mới thành lập trong năm và hoạt động sản xuất, kinh doanh trong năm không đủ 12 tháng thì xác định doanh thu ước tính của năm như sau: tổng cộng chỉ tiêu “Tổng doanh thu của hàng hóa, dịch vụ bán ra chịu thuế giá trị gia tăng” trên Tờ khai thuế giá trị gia tăng của kỳ tính thuế các tháng hoạt động sản xuất, kinh doanh chia (:) số tháng hoạt động sản xuất, kinh doanh và nhân với (x) 12 tháng. Trường hợp theo cách xác định như trên, doanh thu ước tính từ 01 tỷ đồng trở lên thì cơ sở kinh doanh áp dụng phương pháp khấu trừ thuế. Trường hợp doanh thu ước tính theo cách xác định trên chưa đến 01 tỷ đồng thì cơ sở kinh doanh áp dụng phương pháp tính trực tiếp theo doanh thu trong 02 năm, trừ trường hợp cơ sở kinh doanh đăng ký tự nguyện áp dụng phương pháp khấu trừ thuế."},{"k":"p","t":"c)  Trường hợp cơ sở kinh doanh tạm nghỉ sản xuất, kinh doanh trong cả năm thì xác định theo doanh thu của năm trước năm tạm nghỉ sản xuất, kinh doanh. Đối với cơ sở kinh doanh tạm nghỉ sản xuất, kinh doanh một thời gian trong năm hoặc năm trước thì xác định doanh thu theo số tháng, quý thực sản xuất, kinh doanh như trường hợp hoạt động sản xuất, kinh doanh không đủ 12 tháng nêu tại điểm b khoản này."},{"k":"p","t":"2.  Cơ sở kinh doanh tự nguyện áp dụng phương pháp khấu trừ thuế, trừ hộ, cá nhân sản xuất, kinh doanh. Trong đó:"},{"k":"p","t":"a)  Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đang hoạt động có doanh thu hằng năm từ bán hàng hóa, cung cấp dịch vụ chịu thuế giá trị gia tăng dưới 01 tỷ đồng đã thực hiện đầy đủ chế độ kế toán, sổ sách, hóa đơn, chứng từ theo quy định của pháp luật về kế toán, hóa đơn, chứng từ."},{"k":"p","t":"b)  Doanh nghiệp mới thành lập từ dự án đầu tư của cơ sở kinh doanh đang hoạt động nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế."},{"k":"p","t":"c)  Doanh nghiệp mới thành lập có thực hiện đầu tư theo dự án đầu tư được cấp có thẩm quyền phê duyệt thuộc trường hợp đăng ký tự nguyện áp dụng phương pháp khấu trừ thuế."},{"k":"p","t":"d)  Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã mới thành lập có dự án đầu tư không thuộc đối tượng được cấp có thẩm quyền phê duyệt theo quy định của pháp luật về đầu tư nhưng có phương án đầu tư được người có thẩm quyền của doanh nghiệp ra quyết định đầu tư phê duyệt thuộc đối tượng đăng ký áp dụng phương pháp khấu trừ thuế."},{"k":"p","t":"đ) Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã mới thành lập có thực hiện đầu tư, mua sắm, nhận góp vốn bằng tài sản cố định, máy móc, thiết bị, công cụ, dụng cụ hoặc có hợp đồng thuê địa điểm kinh doanh."},{"k":"p","t":"e)  Tổ chức nước ngoài có cơ sở thường trú tại Việt Nam, cá nhân ở nước ngoài là đối tượng cư trú tại Việt Nam có doanh thu phát sinh tại Việt Nam."},{"k":"p","t":"g) Tổ chức kinh tế khác hạch toán được thuế giá trị gia tăng đầu vào, đầu ra, không bao gồm doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã."},{"k":"p","t":"3.  Tổ chức, cá nhân nước ngoài cung cấp hàng hóa, dịch vụ để tiến hành hoạt động tìm kiếm thăm dò, phát triển mỏ dầu khí và khai thác dầu khí nộp thuế theo phương pháp khấu trừ thuế do bên Việt Nam kê khai, khấu trừ, nộp thay."},{"k":"p","t":"4.  Chi nhánh mới thành lập của doanh nghiệp đang nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế (bao gồm cả chi nhánh được thành lập từ dự án đầu tư của doanh nghiệp) thuộc trường hợp khai thuế giá trị gia tăng riêng theo quy định của pháp luật về quản lý thuế thì xác định phương pháp tính thuế của chi nhánh theo phương pháp tính thuế của doanh nghiệp đang hoạt động."},{"k":"p","t":"PHƯƠNG PHÁP TÍNH TRỰC TIẾP TRÊN GIÁ TRỊ GIA TĂNG ĐỐI VỚI HOẠT ĐỘNG MUA, BÁN, CHẾ TÁC VÀNG, BẠC, ĐÁ QUÝ"}]},{"id":"nd181_22","no":22,"code":"Điều 22","title":"Điều 22. Phương pháp tính trực tiếp trên giá trị gia tăng đối với hoạt động mua, bán, chế tác vàng, bạc, đá quý","shortTitle":"Phương pháp tính trực tiếp trên giá trị gia tăng đối với hoạt động mua, bán, chế tác vàng, bạc, đá quý","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1.  Số thuế giá trị gia tăng phải nộp theo phương pháp tính trực tiếp trên giá trị gia tăng bằng giá trị gia tăng nhân với thuế suất thuế giá trị gia tăng áp dụng đối với hoạt động mua, bán, chế tác vàng, bạc, đá quý."},{"k":"p","t":"2.  Giá trị gia tăng của hoạt động mua, bán, chế tác vàng, bạc, đá quý được xác định bằng giá thanh toán của vàng, bạc, đá quý bán ra trừ giá thanh toán của vàng, bạc, đá quý mua vào tương ứng. Trong đó:"},{"k":"p","t":"a)  Giá thanh toán của vàng, bạc, đá quý bán ra là giá thực tế bán ghi trên hóa đơn bán vàng, bạc, đá quý, bao gồm cả tiền công chế tác (nếu có), thuế giá trị gia tăng và các khoản phụ thu, phí thu thêm mà bên bán được hưởng."},{"k":"p","t":"b)  Giá thanh toán của vàng, bạc, đá quý mua vào được xác định bằng giá trị vàng, bạc, đá quý mua vào hoặc nhập khẩu, đã có thuế giá trị gia tăng dùng cho mua, bán, chế tác vàng, bạc, đá quý bán ra tương ứng."},{"k":"p","t":"3.  Trường hợp cơ sở kinh doanh có hoạt động mua, bán, chế tác vàng, bạc, đá quý thì cơ sở kinh doanh phải hạch toán riêng hoạt động này để nộp thuế theo phương pháp tính trực tiếp trên giá trị gia tăng."},{"k":"p","t":"4.  Trường hợp trong kỳ tính thuế phát sinh giá trị gia tăng âm (-) của vàng, bạc, đá quý thì được tính bù trừ vào giá trị gia tăng dương (+) của vàng, bạc, đá quý. Trường hợp không phát sinh giá trị gia tăng dương (+) hoặc giá trị gia tăng dương (+) không đủ bù trừ giá trị gia tăng âm (-) thì được kết chuyển để trừ vào giá trị gia tăng của kỳ sau trong năm. Kết thúc năm dương lịch, giá trị gia tăng âm (-) không được kết chuyển tiếp sang năm sau."},{"k":"p","t":"Chương IIIKHẤU TRỪ, HOÀN THUẾ"},{"k":"p","t":"NGUYÊN TẮC KHẤU TRỪ THUẾ GIÁ TRỊ GIA TĂNG ĐẦU VÀO"}]},{"id":"nd181_23","no":23,"code":"Điều 23","title":"Điều 23. Khấu trừ thuế giá trị gia tăng","shortTitle":"Khấu trừ thuế giá trị gia tăng","chuong":"Chương II — CĂN CỨ VÀ PHƯƠNG PHÁP TÍNH THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1.  Thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng được khấu trừ toàn bộ kể cả thuế giá trị gia tăng đầu vào không được bồi thường của hàng hóa, dịch vụ chịu thuế giá trị gia tăng bị tổn thất, hàng hóa bị hao hụt tự nhiên do tính chất lý hóa trong quá trình vận chuyển. Cơ sở kinh doanh phải có đầy đủ hồ sơ, tài liệu chứng minh các trường hợp tổn thất không được bồi thường để khấu trừ thuế. Trường hợp pháp luật có quy định về định mức hao hụt tự nhiên thì cơ sở kinh doanh được khấu trừ số thuế giá trị gia tăng đầu vào của số lượng hàng hóa thực tế hao hụt tự nhiên không vượt quá định mức hao hụt theo quy định, số thuế giá trị gia tăng đầu vào của số lượng hàng hóa vượt định mức hao hụt không được khấu trừ thuế."},{"k":"p","t":"2.  Thuế giá trị gia tăng đầu vào của hàng hóa (bao gồm cả tài sản cố định), dịch vụ sử dụng đồng thời cho sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế và không chịu thuế thì chỉ được khấu trừ số thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng. Cơ sở kinh doanh phải hạch toán riêng thuế giá trị gia tăng đầu vào được khấu trừ và không được khấu trừ; trường hợp không hạch toán riêng được thì số thuế giá trị gia tăng đầu vào được khấu trừ tính theo tỷ lệ % giữa doanh thu của hàng hóa, dịch vụ chịu thuế giá trị gia tăng so với tổng doanh thu hàng hóa, dịch vụ bán ra trong kỳ tính thuế. Trong đó:"},{"k":"p","t":"a)  Tổng doanh thu của hàng hóa, dịch vụ bán ra bao gồm doanh thu của hàng hóa, dịch vụ chịu thuế giá trị gia tăng; doanh thu của hàng hóa, dịch vụ không chịu thuế giá trị gia tăng; giá trị gia tăng của hoạt động mua, bán, chế tác vàng, bạc, đá quý (trừ trường hợp giá trị gia tăng âm (-)) và doanh thu của hàng hóa, dịch vụ quy định tại khoản 2 Điều 40 Nghị định này (nếu có). Riêng hoạt động kinh doanh ngoại tệ, mua bán chứng khoán thì doanh thu là chênh lệch giữa giá bán và giá mua (trừ trường hợp chênh lệch âm (-))."},{"k":"p","t":"b)  Đối với dự án đầu tư, vừa đầu tư vào sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng, vừa đầu tư vào sản xuất, kinh doanh hàng hóa, dịch vụ không chịu thuế giá trị gia tăng thì số thuế giá trị gia tăng đầu vào của tài sản cố định trong giai đoạn đầu tư xây dựng cơ bản được tạm khấu trừ theo tỷ lệ (%) giữa doanh thu của hàng hóa, dịch vụ chịu thuế giá trị gia tăng so với tổng doanh thu của hàng hóa, dịch vụ bán ra theo phương án sản xuất, kinh doanh của cơ sở kinh doanh, số thuế tạm khấu trừ được điều chỉnh theo tỷ lệ (%) giữa doanh thu của hàng hóa, dịch vụ chịu thuế giá trị gia tăng so với tổng doanh thu của hàng hóa, dịch vụ bán ra trong 03 năm kể từ năm đầu tiên có doanh thu. Trường hợp sau khi điều chỉnh số thuế giá trị gia tăng được khấu trừ dẫn đến giảm số thuế giá trị gia tăng đã được hoàn (nếu có) thì phải nộp lại số thuế giá trị gia tăng chênh lệch do điều chỉnh giảm vào ngân sách nhà nước theo quy định của pháp luật về quản lý thuế. Cơ sở kinh doanh không bị xử phạt vi phạm hành chính về thuế đối với số thuế giá trị gia tăng chênh lệch do điều chỉnh giảm."},{"k":"p","t":"3.  Thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ bán cho tổ chức, cá nhân sử dụng vốn viện trợ nhân đạo, viện trợ không hoàn lại được khấu trừ toàn bộ."},{"k":"p","t":"4.  Thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ sử dụng cho hoạt động tìm kiếm thăm dò, phát triển mỏ dầu khí được khấu trừ toàn bộ."},{"k":"p","t":"5.  Thuế giá trị gia tăng đầu vào phát sinh trong tháng, quý nào được kê khai, khấu trừ khi xác định số thuế phải nộp của tháng, quý đó, không phân biệt đã xuất dùng hay còn để trong kho. Số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết trong tháng, quý thì được khấu trừ vào tháng, quý tiếp theo."},{"k":"p","t":"6.  Trường hợp cơ sở kinh doanh phát hiện số thuế giá trị gia tăng đầu vào khi kê khai, khấu trừ bị sai, sót thì được khai thuế trước khi cơ quan thuế, cơ quan có thẩm quyền công bố quyết định kiểm tra thuế, thanh tra thuế như sau:"},{"k":"p","t":"a)  Người nộp thuế thực hiện khai bổ sung vào tháng, quý phát sinh số thuế giá trị gia tăng đầu vào bị sai, sót nếu việc khai thuế vào tháng, quý phát sinh số thuế giá trị gia tăng đầu vào bị sai, sót làm tăng số thuế phải nộp hoặc giảm số thuế được hoàn của tháng, quý đó; người nộp thuế phải nộp đủ số tiền thuế phải nộp tăng thêm hoặc bị thu hồi số tiền thuế đã được hoàn tương ứng và nộp tiền chậm nộp vào ngân sách nhà nước (nếu có)."},{"k":"p","t":"b)  Người nộp thuế thực hiện khai vào tháng, quý phát hiện sai, sót nếu việc khai thuế được thực hiện vào tháng, quý phát sinh thuế giá trị gia tăng đầu vào bị sai, sót làm giảm số tiền thuế phải nộp hoặc chỉ làm tăng hoặc giảm số thuế giá trị gia tăng còn được khấu trừ chuyển sang tháng, quý sau."},{"k":"p","t":"7.  Thuế giá trị gia tăng đầu vào của hàng hóa (kể cả hàng hóa mua ngoài hoặc hàng hóa do cơ sở kinh doanh tự sản xuất) mà cơ sở kinh doanh sử dụng để cho, biếu, tặng, khuyến mại, quảng cáo thì được khấu trừ."},{"k":"p","t":"8.  Số thuế giá trị gia tăng đã nộp theo Quyết định ấn định thuế của cơ quan hải quan được khấu trừ toàn bộ, trừ trường hợp cơ quan hải quan xử phạt về gian lận, trốn thuế."},{"k":"p","t":"9.  Cơ sở kinh doanh giao cho Ban Quản lý dự án, chi nhánh trực tiếp thực hiện, quản lý dự án đầu tư, kê khai thuế giá trị gia tăng đối với dự án đầu tư, cơ sở kinh doanh thực hiện chi hộ một số khoản chi phí để thực hiện dự án đầu tư thì Ban Quản lý dự án, chi nhánh được khấu trừ thuế giá trị gia tăng đầu vào theo hóa đơn giá trị gia tăng đứng tên cơ sở kinh doanh. Cơ sở kinh doanh không được khấu trừ thuế giá trị gia tăng đầu vào đối với hóa đơn giá trị gia tăng mà Ban Quản lý dự án, chi nhánh đã kê khai, khấu trừ."},{"k":"p","t":"10.  Cơ sở kinh doanh nộp thuế giá trị gia tăng theo phương pháp tính trực tiếp khi chuyển sang nộp thuế theo phương pháp khấu trừ thuế được khấu trừ thuế giá trị gia tăng của hàng hóa, dịch vụ mua vào phát sinh kể từ kỳ đầu tiên kê khai, nộp thuế theo phương pháp khấu trừ thuế."},{"k":"p","t":"11.  Cơ sở kinh doanh nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuế khi chuyển sang nộp thuế theo phương pháp tính trực tiếp được tính số thuế giá trị gia tăng của hàng hóa, dịch vụ mua vào phát sinh trong thời gian nộp thuế theo phương pháp khấu trừ thuế mà chưa khấu trừ hết tại kỳ tính thuế cuối cùng trước khi chuyển đổi phương pháp tính thuế vào chi phí để tính thuế thu nhập doanh nghiệp hoặc được tính vào nguyên giá của tài sản cố định theo quy định của pháp luật về thuế thu nhập doanh nghiệp, trừ số thuế giá trị gia tăng của hàng hóa, dịch vụ mua vào từng lần có giá trị từ 05 triệu đồng trở lên không có chứng từ thanh toán không dùng tiền mặt."},{"k":"p","t":"12.  Đối với hàng hóa, dịch vụ chuyển từ đối tượng không chịu thuế giá trị gia tăng sang đối tượng chịu thuế giá trị gia tăng theo quy định tại Luật Thuế giá trị gia tăng, cơ sở kinh doanh chỉ được kê khai, khấu trừ thuế giá trị gia tăng đầu vào của hàng hóa, dịch vụ sử dụng cho sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế giá trị gia tăng phát sinh từ ngày 01 tháng 7 năm 2025."},{"k":"p","t":"13.  Cơ sở kinh doanh không được khấu trừ đối với thuế giá trị gia tăng đầu vào của tài sản cố định, máy móc, thiết bị trong các trường hợp sau:"},{"k":"p","t":"a)  Tài sản cố định, máy móc, thiết bị chuyên dùng phục vụ sản xuất sản phẩm quốc phòng, an ninh."},{"k":"p","t":"b)  Tài sản cố định, máy móc, thiết bị của các tổ chức tín dụng, doanh nghiệp kinh doanh tái bảo hiểm, bảo hiểm nhân thọ, kinh doanh chứng khoán, cơ sở khám, chữa bệnh, cơ sở đào tạo."},{"k":"p","t":"c)  Máy bay, trực thăng, tàu lượn dân dụng, du thuyền không sử dụng cho mục đích kinh doanh vận chuyển hàng hóa, hành khách, kinh doanh du lịch, khách sạn."},{"k":"p","t":"Việc không được khấu trừ quy định tại khoản này bao gồm cả thuế giá trị gia tăng đầu vào của hoạt động đi thuê và các chi phí sửa chữa tài sản cố định, máy móc, thiết bị (nếu có)."},{"k":"p","t":"14.  Văn phòng Tổng công ty, tập đoàn không trực tiếp hoạt động kinh doanh và các đơn vị hành chính sự nghiệp trực thuộc như: bệnh viện, trạm xá, nhà nghỉ điều dưỡng, viện, trường đào tạo,... không phải là người nộp thuế giá trị gia tăng thì không được khấu trừ thuế giá tr
