<script id="LD" type="application/json">{"meta":{"title":"Nghị định 191/2013/NĐ-CP — Quy định chi tiết về tài chính công đoàn","shortCode":"NĐ 191/2013","subtitle":"Tài chính công đoàn (cũ)","slug":"nd191","effectiveDate":"21/11/2013","scope":"1. Nghị định này quy định chi tiết về tài chính công đoàn đối với nguồn thu kinh phí công đoàn và ngân sách nhà nước cấp hỗ trợ. 2. Đối với nguồn thu đoàn phí công đoàn do đoàn viên công đoàn đóng thực hiện theo quy định của Điều lệ Công đoàn Việt Nam. 3. Đối với nguồn thu khác từ hoạt động văn hóa, thể thao, hoạt động kinh tế của công đoàn; từ đề án, dự án do Nhà nước giao; từ viện trợ, tài trợ c","description":"Tài chính công đoàn (cũ)","related":[]},"outline":[{"id":"nd191_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương 1 — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này quy định chi tiết về tài chính công đoàn đối với nguồn thu kinh phí công đoàn và ngân sách nhà nước cấp hỗ trợ."},{"k":"p","t":"2. Đối với nguồn thu đoàn phí công đoàn do đoàn viên công đoàn đóng thực hiện theo quy định của Điều lệ Công đoàn Việt Nam."},{"k":"p","t":"3. Đối với nguồn thu khác từ hoạt động văn hóa, thể thao, hoạt động kinh tế của công đoàn; từ đề án, dự án do Nhà nước giao; từ viện trợ, tài trợ của tổ chức, cá nhân trong nước và nước ngoài thực hiện theo quy định của pháp luật liên quan đến quản lý và sử dụng đối với từng khoản thu."}]},{"id":"nd191_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương 1 — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan, tổ chức, doanh nghiệp quy định tại Điều 4 Nghị định này."},{"k":"p","t":"2. Cơ quan, tổ chức, các cấp công đoàn, cá nhân có liên quan đến quản lý và sử dụng tài chính công đoàn theo quy định của Luật công đoàn."}]},{"id":"nd191_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc quản lý và sử dụng tài chính công đoàn","shortTitle":"Nguyên tắc quản lý và sử dụng tài chính công đoàn","chuong":"Chương 1 — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Công đoàn thực hiện quản lý, sử dụng tài chính công đoàn theo quy định của pháp luật và quy định của Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"2. Việc quản lý và sử dụng tài chính công đoàn phải bảo đảm nguyên tắc tập trung, dân chủ, công khai, minh bạch, có phân công, phân cấp quản lý, gắn quyền hạn và trách nhiệm của công đoàn các cấp."},{"k":"p","t":"3. Tổ chức công đoàn các cấp thực hiện công tác kế toán, thống kê, báo cáo, quyết toán tài chính công đoàn theo quy định của pháp luật về kế toán, thống kê."},{"k":"p","t":"4. Tổ chức công đoàn được giao quản lý, sử dụng tài chính công đoàn được mở tài khoản tại Kho bạc Nhà nước để phản ánh các khoản ngân sách nhà nước cấp hỗ trợ; được mở tài khoản tiền gửi tại ngân hàng để phản ánh các khoản thu, chi kinh phí công đoàn theo quy định của Luật công đoàn."},{"k":"p","t":"5. Kết thúc năm ngân sách, nguồn thu kinh phí công đoàn chưa sử dụng hết, được chuyển sang năm sau để tiếp tục sử dụng theo quy định; đối với nguồn ngân sách nhà nước cấp hỗ trợ, thực hiện theo quy định của Luật ngân sách nhà nước và các văn bản hướng dẫn Luật về khóa sổ ngân sách cuối năm."}]},{"id":"nd191_4","no":4,"code":"Điều 4","title":"Điều 4. Đối tượng đóng kinh phí công đoàn","shortTitle":"Đối tượng đóng kinh phí công đoàn","chuong":"Chương 2 — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"Đối tượng đóng kinh phí công đoàn theo quy định tại Khoản 2 Điều 26 Luật công đoàn là cơ quan, tổ chức, doanh nghiệp mà không phân biệt cơ quan, tổ chức, doanh nghiệp đó đã có hay chưa có tổ chức công đoàn cơ sở, bao gồm:"},{"k":"p","t":"1. Cơ quan nhà nước (kể cả Ủy ban nhân dân xã, phường, thị trấn), đơn vị thuộc lực lượng vũ trang nhân dân."},{"k":"p","t":"2. Tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp."},{"k":"p","t":"3. Đơn vị sự nghiệp công lập và ngoài công lập."},{"k":"p","t":"4. Doanh nghiệp thuộc các thành phần kinh tế thành lập, hoạt động theo Luật doanh nghiệp, Luật đầu tư."},{"k":"p","t":"5. Hợp tác xã, liên hiệp hợp tác xã thành lập, hoạt động theo Luật hợp tác xã."},{"k":"p","t":"6. Cơ quan, tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam có liên quan đến tổ chức và hoạt động công đoàn, văn phòng điều hành của phía nước ngoài trong hợp đồng hợp tác kinh doanh tại Việt Nam có sử dụng lao động là người Việt Nam."},{"k":"p","t":"7. Tổ chức khác có sử dụng lao động theo quy định của pháp luật về lao động."}]},{"id":"nd191_5","no":5,"code":"Điều 5","title":"Điều 5. Mức đóng và căn cứ đóng kinh phí công đoàn","shortTitle":"Mức đóng và căn cứ đóng kinh phí công đoàn","chuong":"Chương 2 — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"Mức đóng bằng 2% quỹ tiền lương làm căn cứ đóng bảo hiểm xã hội cho người lao động. Quỹ tiền lương này là tổng mức tiền lương của những người lao động thuộc đối tượng phải đóng bảo hiểm xã hội theo quy định của pháp luật về bảo hiểm xã hội."},{"k":"p","t":"Riêng đối với đơn vị thuộc lực lượng vũ trang quy định tại Khoản 1 Điều 4 Nghị định này, quỹ tiền lương là tổng mức tiền lương của những cán bộ, công nhân viên chức quốc phòng, lao động làm việc hưởng lương trong các nhà máy, doanh nghiệp, đơn vị cơ sở trong Quân đội nhân dân; cán bộ, công nhân, viên chức, lao động làm việc hưởng lương trong các doanh nghiệp, cơ quan, đơn vị khoa học-kỹ thuật, sự nghiệp và phục vụ trong Công an nhân dân."}]},{"id":"nd191_6","no":6,"code":"Điều 6","title":"Điều 6. Phương thức đóng kinh phí công đoàn","shortTitle":"Phương thức đóng kinh phí công đoàn","chuong":"Chương 2 — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan, đơn vị được ngân sách nhà nước bảo đảm toàn bộ hoặc một phần kinh phí hoạt động thường xuyên đóng kinh phí công đoàn mỗi tháng một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động."},{"k":"p","t":"Kho bạc Nhà nước nơi cơ quan, đơn vị mở tài khoản giao dịch căn cứ giấy rút kinh phí công đoàn, thực hiện việc kiểm soát chi và chuyển tiền vào tài khoản tiền gửi của tổ chức công đoàn tại ngân hàng."},{"k":"p","t":"2. Tổ chức, doanh nghiệp đóng kinh phí công đoàn mỗi tháng một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động."},{"k":"p","t":"3. Tổ chức, doanh nghiệp nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả tiền lương theo chu kỳ sản xuất, kinh doanh đóng kinh phí công đoàn theo tháng hoặc quý một lần cùng với thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động trên cơ sở đăng ký với tổ chức công đoàn."}]},{"id":"nd191_7","no":7,"code":"Điều 7","title":"Điều 7. Nguồn đóng kinh phí công đoàn","shortTitle":"Nguồn đóng kinh phí công đoàn","chuong":"Chương 2 — QUY ĐỊNH VỀ KINH PHÍ CÔNG ĐOÀN","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với cơ quan, đơn vị được ngân sách nhà nước bảo đảm toàn bộ kinh phí hoạt động thường xuyên, ngân sách nhà nước bảo đảm toàn bộ nguồn đóng kinh phí công đoàn và được bố trí trong dự toán chi thường xuyên hàng năm của cơ quan, đơn vị theo quy định của pháp luật về phân cấp quản lý ngân sách nhà nước."},{"k":"p","t":"2. Đối với cơ quan, đơn vị được ngân sách nhà nước bảo đảm một phần kinh phí hoạt động thường xuyên, ngân sách nhà nước bảo đảm nguồn đóng kinh phí công đoàn tính theo quỹ tiền lương làm căn cứ đóng bảo hiểm xã hội cho số biên chế hưởng lương từ ngân sách nhà nước và được bố trí trong dự toán chi thường xuyên hàng năm của cơ quan, đơn vị theo quy định của pháp luật về phân cấp quản lý ngân sách nhà nước. Phần kinh phí công đoàn phải đóng còn lại, đơn vị tự bảo đảm theo quy định tại Khoản 3 và 4 Điều này."},{"k":"p","t":"3. Đối với doanh nghiệp và đơn vị có hoạt động sản xuất kinh doanh, dịch vụ, khoản đóng kinh phí công đoàn được hạch toán vào chi phí sản xuất, kinh doanh, dịch vụ trong kỳ."},{"k":"p","t":"4. Đối với cơ quan, tổ chức, đơn vị còn lại, khoản đóng kinh phí công đoàn được sử dụng từ nguồn kinh phí hoạt động của cơ quan, tổ chức, đơn vị theo quy định của pháp luật."}]},{"id":"nd191_8","no":8,"code":"Điều 8","title":"Điều 8. Các nội dung được ngân sách trung ương hỗ trợ","shortTitle":"Các nội dung được ngân sách trung ương hỗ trợ","chuong":"Chương 3 — QUY ĐỊNH VỀ NGÂN SÁCH NHÀ NƯỚC CẤP HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí đóng niên liễm cho các tổ chức quốc tế."},{"k":"p","t":"2. Trường hợp dự toán nguồn thu tài chính công đoàn không đảm bảo dự toán chi hoạt động thường xuyên hợp lý của hệ thống tổ chức công đoàn và hoạt động thực hiện quyền, trách nhiệm của công đoàn: Vào thời điểm lập dự toán ngân sách nhà nước hàng năm theo quy định của Luật ngân sách nhà nước, Tổng Liên đoàn Lao động Việt Nam xây dựng dự toán thu đối với các nguồn quy định tại các Khoản 1, 2 và 4 Điều 26 Luật công đoàn và dự toán chi thực hiện các nhiệm vụ quy định tại Khoản 2 Điều 27 Luật công đoàn theo chế độ, tiêu chuẩn, định mức chi tiêu chung của Nhà nước quy định đối với cơ quan hành chính sự nghiệp, gửi Bộ Tài chính thẩm định phần chênh lệch thiếu, tổng hợp và trình Chính phủ để trình Quốc hội quyết định hỗ trợ."},{"k":"p","t":"3. Kinh phí hoạt động thường xuyên của các đơn vị sự nghiệp công lập trực thuộc Tổng Liên đoàn Lao động Việt Nam theo quy định của pháp luật về quyền tự chủ, tự chịu trách nhiệm về thực hiện nhiệm vụ, tổ chức bộ máy, biên chế và tài chính đối với đơn vị sự nghiệp công lập."},{"k":"p","t":"4. Kinh phí thực hiện các nhiệm vụ khoa học và công nghệ do Tổng Liên đoàn Lao động Việt Nam trực tiếp thực hiện."},{"k":"p","t":"5. Kinh phí đào tạo bồi dưỡng cán bộ, công chức, viên chức đối với các cơ quan, đơn vị trực thuộc Tổng Liên đoàn Lao động Việt Nam, công đoàn ngành trung ương và công đoàn tổng công ty trực thuộc Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"6. Kinh phí thực hiện các chương trình mục tiêu quốc gia (nếu có)."},{"k":"p","t":"7. Kinh phí thực hiện các nhiệm vụ do cơ quan nhà nước có thẩm quyền đặt hàng với Tổng Liên đoàn Lao động Việt Nam."},{"k":"p","t":"8. Kinh phí thực hiện nhiệm vụ đột xuất được cấp có thẩm quyền giao."},{"k":"p","t":"9. Kinh phí đối ứng thực hiện các dự án có nguồn vốn nước ngoài do Tổng Liên đoàn Lao động Việt Nam thực hiện, được cấp có thẩm quyền phê duyệt."},{"k":"p","t":"10. Chi đầu tư phát triển của Tổng Liên đoàn Lao động Việt Nam theo dự án được cấp có thẩm quyền phê duyệt."}]},{"id":"nd191_9","no":9,"code":"Điều 9","title":"Điều 9. Các nội dung được ngân sách địa phương hỗ trợ","shortTitle":"Các nội dung được ngân sách địa phương hỗ trợ","chuong":"Chương 3 — QUY ĐỊNH VỀ NGÂN SÁCH NHÀ NƯỚC CẤP HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí hoạt động thường xuyên của các đơn vị sự nghiệp công lập trực thuộc Liên đoàn Lao động địa phương theo quy định của pháp luật về quyền tự chủ, tự chịu trách nhiệm về thực hiện nhiệm vụ, tổ chức bộ máy, biên chế và tài chính đối với đơn vị sự nghiệp công lập."},{"k":"p","t":"2. Kinh phí thực hiện các nhiệm vụ khoa học và công nghệ do Liên đoàn Lao động địa phương trực tiếp thực hiện (nếu có)."},{"k":"p","t":"3. Kinh phí đào tạo bồi dưỡng cán bộ, công chức, viên chức đối với Liên đoàn Lao động địa phương và công đoàn cấp trên cơ sở."},{"k":"p","t":"4. Kinh phí thực hiện các chương trình mục tiêu quốc gia do cơ quan nhà nước có thẩm quyền giao (nếu có)."},{"k":"p","t":"5. Kinh phí thực hiện các nhiệm vụ do cơ quan nhà nước có thẩm quyền đặt hàng với Liên đoàn Lao động địa phương."},{"k":"p","t":"6. Kinh phí thực hiện nhiệm vụ đột xuất được cấp có thẩm quyền giao."},{"k":"p","t":"7. Chi đầu tư phát triển của Liên đoàn Lao động địa phương theo dự án được cấp có thẩm quyền phê duyệt."}]},{"id":"nd191_10","no":10,"code":"Điều 10","title":"Điều 10. Quản lý, sử dụng kinh phí ngân sách nhà nước hỗ trợ","shortTitle":"Quản lý, sử dụng kinh phí ngân sách nhà nước hỗ trợ","chuong":"Chương 3 — QUY ĐỊNH VỀ NGÂN SÁCH NHÀ NƯỚC CẤP HỖ TRỢ","muc":"","level":1,"content":[{"k":"p","t":"1. Kinh phí thuộc ngân sách cấp nào hỗ trợ thì phân bổ cho cơ quan, đơn vị thuộc công đoàn cấp đó thực hiện; không sử dụng ngân sách trung ương để hỗ trợ cho cơ quan, đơn vị thuộc công đoàn cấp dưới, trừ trường hợp quy định tại Khoản 2 Điều 8 Nghị định này."},{"k":"p","t":"2. Cơ quan, đơn vị được ngân sách nhà nước hỗ trợ phải thực hiện sử dụng kinh phí theo đúng chế độ, tiêu chuẩn, định mức do cơ quan nhà nước có thẩm quyền quy định; bảo đảm đúng mục đích, tiết kiệm, có hiệu quả và có đủ hồ sơ, chứng từ thanh toán; chịu sự kiểm tra, kiểm soát của cơ quan tài chính, Kho bạc Nhà nước trong quá trình thực hiện dự toán ngân sách được giao."},{"k":"p","t":"3. Việc lập dự toán, chấp hành, kế toán và quyết toán kinh phí ngân sách nhà nước hỗ trợ thực hiện theo quy định của pháp luật về ngân sách nhà nước và kế toán, thống kê."}]},{"id":"nd191_11","no":11,"code":"Điều 11","title":"Điều 11. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương 4 — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành từ ngày 10 tháng 01 năm 2014. Riêng quy định về mức đóng phí công đoàn tại Điều 5 Nghị định này được thực hiện từ ngày Luật công đoàn có hiệu lực thi hành."},{"k":"p","t":"2. Bãi bỏ các văn bản sau đây:"},{"k":"p","t":"a) Quyết định số 133/2008/QĐ-TTg ngày 01 tháng 10 năm 2008 của Thủ tướng Chính phủ về việc trích nộp kinh phí công đoàn đối với các doanh nghiệp có vốn đầu tư nước ngoài và văn phòng điều hành của phía nước ngoài trong hợp đồng hợp tác kinh doanh;"},{"k":"p","t":"b) Thông tư liên tịch số 119/2004/TTLT/BTC-TLĐLĐVN ngày 08 tháng 12 năm 2004 của Bộ Tài chính và Tổng Liên đoàn Lao động Việt Nam hướng dẫn trích nộp kinh phí công đoàn; Thông tư số 17/2009/TT-BTC ngày 22 tháng 01 năm 2009 của Bộ Tài chính hướng dẫn việc trích nộp và sử dụng kinh phí công đoàn đối với doanh nghiệp có vốn đầu tư nước ngoài và văn phòng điều hành của phía nước ngoài trong hợp đồng hợp tác kinh doanh."}]},{"id":"nd191_12","no":12,"code":"Điều 12","title":"Điều 12. Trách nhiệm tổ chức thực hiện","shortTitle":"Trách nhiệm tổ chức thực hiện","chuong":"Chương 4 — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan, tổ chức, doanh nghiệp có trách nhiệm:"},{"k":"p","t":"a) Đóng kinh phí công đoàn đầy đủ, đúng thời hạn cho tổ chức công đoàn theo đúng quy định tại Nghị định này và quy định của Tổng Liên đoàn Lao động Việt Nam về phân cấp thu, phân phối nguồn thu kinh phí công đoàn;"},{"k":"p","t":"b) Cung cấp đầy đủ, chính xác thông tin, tài liệu có liên quan đến trách nhiệm đóng kinh phí công đoàn khi có yêu cầu của tổ chức công đoàn, cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Tổng Liên đoàn Lao động Việt Nam có trách nhiệm:"},{"k":"p","t":"a) Xây dựng và ban hành tiêu chuẩn, định mức, chế độ chi tiêu tài chính công đoàn trên cơ sở vận dụng định mức, chế độ do Nhà nước quy định để bảo đảm đáp ứng yêu cầu quản lý trong hệ thống tổ chức công đoàn; quy định phân cấp thu, phân phối nguồn thu và quản lý nguồn thu (đoàn phí, kinh phí công đoàn, các nguồn thu khác theo quy định) để thực hiện trong hệ thống tổ chức công đoàn;"},{"k":"p","t":"b) Xây dựng và ban hành định mức phân bổ dự toán chi hoạt động thường xuyên đối với các đơn vị trực thuộc và tổ chức công đoàn các cấp trên cơ sở vận dụng định mức phân bổ dự toán chi quản lý hành chính cho các Bộ, cơ quan ngang Bộ, cơ quan thuộc Chính phủ, các cơ quan khác ở Trung ương theo quy định của Thủ tướng Chính phủ để bảo đảm công khai, minh bạch trong phân bổ dự toán, quản lý và sử dụng tài chính công đoàn;"},{"k":"p","t":"c) Chỉ đạo tổ chức công đoàn các cấp quản lý, sử dụng kinh phí công đoàn theo đúng quy định; chủ trì, phối hợp với cơ quan tài chính, thuế, thanh tra lao động cùng cấp kiểm tra, thanh tra việc thực hiện đóng kinh phí công đoàn của các cơ quan, tổ chức, doanh nghiệp; kiến nghị các cơ quan chức năng xử lý vi phạm pháp luật về đóng kinh phí công đoàn."},{"k":"p","t":"3. Bộ Tài chính có trách nhiệm bố trí ngân sách trung ương hỗ trợ tài chính công đoàn theo quy định tại Điều 8 Nghị định này."},{"k":"p","t":"4. Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc Trung ương có trách nhiệm bố trí ngân sách, địa phương hỗ trợ tài chính công đoàn theo quy định tại Điều 9 Nghị định này theo quy định của pháp luật về phân cấp quản lý ngân sách nhà nước."}]},{"id":"nd191_13","no":13,"code":"Điều 13","title":"Điều 13. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương 4 — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Các Bộ trưởng, Thủ trưởng cơ quan ngang Bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương chịu trách nhiệm thi hành Nghị định này./."},{"k":"p","t":"Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Các Bộ, cơ quan ngang Bộ, cơ quan thuộc CP;- HĐND, UBND các tỉnh, TP trực thuộc TW;- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Chủ tịch nước;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Quốc hội;- Tòa án nhân dân tối cao;- Viện kiểm sát nhân dân tối cao;- Ủy ban Giám sát tài chính Quốc gia;- Kiểm toán Nhà nước;- Ngân hàng Chính sách xã hội;- Ngân hàng Phát triển Việt Nam;- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;- Tổng Liên đoàn Lao động Việt Nam;- Cơ quan Trung ương của các đoàn thể;- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;- Lưu: VT, KTTH (3b)."},{"k":"p","t":"TM. CHÍNH PHỦTHỦ TƯỚNGNguyễn Tấn Dũng"}]}],"refs":{},"details":{},"summaries":{"nd191_1":{"tldr":"Nghị định quy định chi tiết về tài chính công đoàn đối với nguồn thu kinh phí công đoàn và ngân sách nhà nước cấp hỗ trợ.","points":["Quy định chi tiết về tài chính công đoàn đối với nguồn thu kinh phí công đoàn và ngân sách nhà nước cấp hỗ trợ.","Nguồn thu đoàn phí công đoàn do đoàn viên đóng thực hiện theo Điều lệ Công đoàn Việt Nam.","Nguồn thu khác (văn hóa, thể thao, kinh tế; đề án, dự án Nhà nước giao; viện trợ, tài trợ trong và ngoài nước) thực hiện theo pháp luật liên quan đến từng khoản thu."]},"nd191_3":{"tldr":"Việc quản lý, sử dụng tài chính công đoàn phải theo pháp luật và quy định của Tổng Liên đoàn Lao động Việt Nam, bảo đảm tập trung, dân chủ, công khai, minh bạch.","points":["Công đoàn quản lý, sử dụng tài chính công đoàn theo pháp luật và quy định của Tổng Liên đoàn Lao động Việt Nam.","Bảo đảm nguyên tắc tập trung, dân chủ, công khai, minh bạch, có phân công, phân cấp quản lý, gắn quyền hạn và trách nhiệm của công đoàn các cấp.","Thực hiện kế toán, thống kê, báo cáo, quyết toán theo pháp luật về kế toán, thống kê.","Được mở tài khoản tại Kho bạc Nhà nước phản ánh khoản ngân sách nhà nước cấp hỗ trợ; mở tài khoản tiền gửi tại ngân hàng phản ánh thu, chi kinh phí công đoàn.","Kết thúc năm ngân sách, kinh phí công đoàn chưa dùng hết được chuyển sang năm sau; nguồn ngân sách nhà nước cấp hỗ trợ thực hiện theo Luật ngân sách nhà nước và văn bản hướng dẫn về khóa sổ ngân sách cuối năm."]},"nd191_4":{"tldr":"Đối tượng đóng kinh phí công đoàn theo Khoản 2 Điều 26 Luật công đoàn là cơ quan, tổ chức, doanh nghiệp, không phân biệt đã có hay chưa có công đoàn cơ sở.","points":["Cơ quan nhà nước (kể cả Ủy ban nhân dân xã, phường, thị trấn), đơn vị thuộc lực lượng vũ trang nhân dân.","Tổ chức chính trị, chính trị - xã hội, chính trị xã hội - nghề nghiệp, tổ chức xã hội, xã hội - nghề nghiệp.","Đơn vị sự nghiệp công lập và ngoài công lập.","Doanh nghiệp thuộc các thành phần kinh tế theo Luật doanh nghiệp, Luật đầu tư; hợp tác xã, liên hiệp hợp tác xã theo Luật hợp tác xã.","Cơ quan, tổ chức nước ngoài, tổ chức quốc tế hoạt động trên lãnh thổ Việt Nam có liên quan đến công đoàn; văn phòng điều hành của phía nước ngoài trong hợp đồng hợp tác kinh doanh tại Việt Nam có sử dụng lao động là người Việt Nam.","Tổ chức khác có sử dụng lao động theo pháp luật về lao động."]},"nd191_5":{"tldr":"Mức đóng kinh phí công đoàn bằng 2% quỹ tiền lương làm căn cứ đóng bảo hiểm xã hội cho người lao động.","points":["Mức đóng bằng 2% quỹ tiền lương làm căn cứ đóng bảo hiểm xã hội cho người lao động.","Quỹ tiền lương là tổng mức tiền lương của những người lao động thuộc đối tượng phải đóng bảo hiểm xã hội theo pháp luật về bảo hiểm xã hội.","Đối với đơn vị thuộc lực lượng vũ trang (Khoản 1 Điều 4), quỹ tiền lương là tổng tiền lương của cán bộ, công nhân viên chức quốc phòng, lao động hưởng lương trong nhà máy, doanh nghiệp, đơn vị cơ sở trong Quân đội nhân dân và những người hưởng lương trong các doanh nghiệp, cơ quan, đơn vị khoa học-kỹ thuật, sự nghiệp và phục vụ trong Công an nhân dân."]},"nd191_6":{"tldr":"Kinh phí công đoàn được đóng mỗi tháng một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động.","points":["Cơ quan, đơn vị được ngân sách nhà nước bảo đảm toàn bộ hoặc một phần kinh phí hoạt động thường xuyên đóng mỗi tháng một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc; Kho bạc Nhà nước kiểm soát chi và chuyển tiền vào tài khoản tiền gửi của tổ chức công đoàn tại ngân hàng.","Tổ chức, doanh nghiệp đóng mỗi tháng một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc cho người lao động.","Tổ chức, doanh nghiệp nông nghiệp, lâm nghiệp, ngư nghiệp, diêm nghiệp trả lương theo chu kỳ sản xuất, kinh doanh đóng theo tháng hoặc quý một lần cùng thời điểm đóng bảo hiểm xã hội bắt buộc, trên cơ sở đăng ký với tổ chức công đoàn."]},"nd191_7":{"tldr":"Nguồn đóng kinh phí công đoàn được xác định theo từng loại cơ quan, đơn vị, doanh nghiệp.","points":["Cơ quan, đơn vị được ngân sách nhà nước bảo đảm toàn bộ kinh phí hoạt động thường xuyên: ngân sách nhà nước bảo đảm toàn bộ nguồn đóng, bố trí trong dự toán chi thường xuyên hàng năm.","Cơ quan, đơn vị được ngân sách bảo đảm một phần: ngân sách nhà nước bảo đảm nguồn đóng tính theo quỹ tiền lương đóng bảo hiểm xã hội cho số biên chế hưởng lương từ ngân sách; phần còn lại đơn vị tự bảo đảm theo Khoản 3 và 4 Điều này.","Doanh nghiệp và đơn vị có hoạt động sản xuất kinh doanh, dịch vụ: khoản đóng được hạch toán vào chi phí sản xuất, kinh doanh, dịch vụ trong kỳ.","Cơ quan, tổ chức, đơn vị còn lại: khoản đóng được sử dụng từ nguồn kinh phí hoạt động của cơ quan, tổ chức, đơn vị theo pháp luật."]},"nd191_8":{"tldr":"Quy định các nội dung được ngân sách trung ương hỗ trợ cho tài chính công đoàn.","points":["Kinh phí đóng niên liễm cho các tổ chức quốc tế.","Trường hợp dự toán nguồn thu không đảm bảo dự toán chi hoạt động thường xuyên hợp lý: Tổng Liên đoàn Lao động Việt Nam xây dựng dự toán thu (Khoản 1, 2, 4 Điều 26 Luật công đoàn) và dự toán chi (Khoản 2 Điều 27), gửi Bộ Tài chính thẩm định phần chênh lệch thiếu, trình Chính phủ để trình Quốc hội quyết định hỗ trợ.","Kinh phí hoạt động thường xuyên của đơn vị sự nghiệp công lập trực thuộc Tổng Liên đoàn; kinh phí khoa học và công nghệ do Tổng Liên đoàn trực tiếp thực hiện.","Kinh phí đào tạo bồi dưỡng cán bộ, công chức, viên chức; kinh phí chương trình mục tiêu quốc gia (nếu có); kinh phí nhiệm vụ do cơ quan nhà nước có thẩm quyền đặt hàng.","Kinh phí nhiệm vụ đột xuất được cấp có thẩm quyền giao; kinh phí đối ứng dự án có nguồn vốn nước ngoài do Tổng Liên đoàn thực hiện.","Chi đầu tư phát triển của Tổng Liên đoàn Lao động Việt Nam theo dự án được cấp có thẩm quyền phê duyệt."]},"nd191_9":{"tldr":"Quy định các nội dung được ngân sách địa phương hỗ trợ cho tài chính công đoàn.","points":["Kinh phí hoạt động thường xuyên của đơn vị sự nghiệp công lập trực thuộc Liên đoàn Lao động địa phương.","Kinh phí khoa học và công nghệ do Liên đoàn Lao động địa phương trực tiếp thực hiện (nếu có).","Kinh phí đào tạo bồi dưỡng cán bộ, công chức, viên chức đối với Liên đoàn Lao động địa phương và công đoàn cấp trên cơ sở.","Kinh phí chương trình mục tiêu quốc gia do cơ quan nhà nước có thẩm quyền giao (nếu có); kinh phí nhiệm vụ do cơ quan nhà nước có thẩm quyền đặt hàng.","Kinh phí nhiệm vụ đột xuất được cấp có thẩm quyền giao.","Chi đầu tư phát triển của Liên đoàn Lao động địa phương theo dự án được cấp có thẩm quyền phê duyệt."]},"nd191_10":{"tldr":"Kinh phí thuộc ngân sách cấp nào hỗ trợ thì phân bổ cho cơ quan, đơn vị thuộc công đoàn cấp đó, sử dụng đúng chế độ, định mức.","points":["Kinh phí thuộc ngân sách cấp nào hỗ trợ thì phân bổ cho cơ quan, đơn vị thuộc công đoàn cấp đó; không dùng ngân sách trung ương hỗ trợ cho công đoàn cấp dưới, trừ trường hợp Khoản 2 Điều 8.","Cơ quan, đơn vị được hỗ trợ phải sử dụng đúng chế độ, tiêu chuẩn, định mức; đúng mục đích, tiết kiệm, hiệu quả, đủ hồ sơ, chứng từ; chịu kiểm tra, kiểm soát của cơ quan tài chính, Kho bạc Nhà nước.","Lập dự toán, chấp hành, kế toán và quyết toán kinh phí thực hiện theo pháp luật về ngân sách nhà nước và kế toán, thống kê."]},"nd191_11":{"tldr":"Nghị định có hiệu lực thi hành từ ngày 10 tháng 01 năm 2014; riêng mức đóng tại Điều 5 thực hiện từ ngày Luật công đoàn có hiệu lực.","points":["Nghị định có hiệu lực thi hành từ ngày 10 tháng 01 năm 2014.","Quy định về mức đóng phí công đoàn tại Điều 5 thực hiện từ ngày Luật công đoàn có hiệu lực thi hành.","Bãi bỏ Quyết định số 133/2008/QĐ-TTg ngày 01 tháng 10 năm 2008 của Thủ tướng Chính phủ.","Bãi bỏ Thông tư liên tịch số 119/2004/TTLT/BTC-TLĐLĐVN ngày 08 tháng 12 năm 2004 và Thông tư số 17/2009/TT-BTC ngày 22 tháng 01 năm 2009 của Bộ Tài chính."]},"nd191_12":{"tldr":"Quy định trách nhiệm tổ chức thực hiện của cơ quan, tổ chức, doanh nghiệp, Tổng Liên đoàn Lao động Việt Nam, Bộ Tài chính và Chủ tịch Ủy ban nhân dân cấp tỉnh.","points":["Cơ quan, tổ chức, doanh nghiệp: đóng kinh phí công đoàn đầy đủ, đúng thời hạn; cung cấp đầy đủ, chính xác thông tin, tài liệu khi có yêu cầu của tổ chức công đoàn, cơ quan nhà nước có thẩm quyền.","Tổng Liên đoàn Lao động Việt Nam: xây dựng, ban hành tiêu chuẩn, định mức, chế độ chi tiêu tài chính công đoàn; quy định phân cấp thu, phân phối và quản lý nguồn thu.","Tổng Liên đoàn: ban hành định mức phân bổ dự toán chi hoạt động thường xuyên; chỉ đạo công đoàn các cấp quản lý, sử dụng kinh phí; chủ trì, phối hợp kiểm tra, thanh tra việc đóng kinh phí và kiến nghị xử lý vi phạm.","Bộ Tài chính bố trí ngân sách trung ương hỗ trợ tài chính công đoàn theo Điều 8.","Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc Trung ương bố trí ngân sách địa phương hỗ trợ tài chính công đoàn theo Điều 9."]},"nd191_13":{"tldr":"Các Bộ trưởng, Thủ trưởng cơ quan ngang Bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương chịu trách nhiệm thi hành Nghị định.","points":[]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
