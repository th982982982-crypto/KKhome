uong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân nộp hồ sơ đề nghị cấp, sửa đổi, bổ sung, gia hạn Giấy phép tiến hành công việc bức xạ, Giấy đăng ký hoạt động dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử; phê duyệt kế hoạch ứng phó sự cố bức xạ, hạt nhân; phê duyệt báo cáo phân tích an toàn trong xây dựng cơ sở bức xạ hoặc thẩm định báo cáo đánh giá an toàn trong thăm dò, khai thác, chế biến, đóng cửa mỏ khoáng sản có tính phóng xạ phải nộp phí theo quy định tại Thông tư này."},{"k":"p","t":"2. Tổ chức, cá nhân nộp hồ sơ đề nghị cấp Chứng chỉ nhân viên bức xạ, Chứng chỉ hành nghề dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử phải nộp lệ phí theo quy định tại Thông tư này."}]},{"id":"tt74_3","no":3,"code":"Điều 3","title":"Điều 3. Tổ chức thu phí, lệ phí","shortTitle":"Tổ chức thu phí, lệ phí","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan có thẩm quyền thẩm định hồ sơ cấp, sửa đổi, bổ sung, gia hạn Giấy phép tiến hành công việc bức xạ, Giấy đăng ký hoạt động dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử; phê duyệt kế hoạch ứng phó sự cố bức xạ, hạt nhân; phê duyệt báo cáo phân tích an toàn trong xây dựng cơ sở bức xạ hoặc thẩm định báo cáo đánh giá an toàn trong thăm dò, khai thác, chế biến, đóng cửa mỏ khoáng sản có tính phóng xạ là tổ chức thu phí theo quy định tại Thông tư này."},{"k":"p","t":"2. Cơ quan có thẩm quyền cấp Chứng chỉ nhân viên bức xạ, Chứng chỉ hành nghề dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử là tổ chức thu lệ phí theo quy định tại Thông tư này."}]},{"id":"tt74_4","no":4,"code":"Điều 4","title":"Điều 4. Mức thu phí, lệ phí","shortTitle":"Mức thu phí, lệ phí","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Mức thu phí, lệ phí trong lĩnh vực năng lượng nguyên tử thực hiện theo quy định tại Biểu mức thu phí, lệ phí trong lĩnh vực năng lượng nguyên tử ban hành kèm theo Thông tư này."}]},{"id":"tt74_5","no":5,"code":"Điều 5","title":"Điều 5. Khai, thu, nộp phí, lệ phí và quyết toán phí","shortTitle":"Khai, thu, nộp phí, lệ phí và quyết toán phí","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp phí, lệ phí thực hiện nộp số tiền phí, lệ phí vào ngân sách nhà nước theo quy định tại khoản 1 Điều 3 Nghị định số 362/2025/NĐ-CP của Chính phủ quy định chi tiết một số điều và biện pháp để tổ chức, hướng dẫn thi hành Luật Phí và lệ phí."},{"k":"p","t":"2. Tổ chức thu phí, lệ phí nộp 100% số tiền phí, lệ phí thu được vào ngân sách nhà nước theo chương, tiểu mục của Mục lục ngân sách nhà nước hiện hành, bao gồm tiền lãi phát sinh (nếu có) trên số dư tài khoản liên quan trong quá trình thu phí, lệ phí. Nguồn chi phí trang trải cho hoạt động cung cấp dịch vụ, thu phí, lệ phí được ngân sách nhà nước bố trí trong dự toán của tổ chức thu phí, lệ phí theo chế độ, định mức chi ngân sách nhà nước theo quy định của pháp luật. Tổ chức thu phí, lệ phí khai, thu, nộp phí, lệ phí theo quy định tại khoản 3 Điều 3 Nghị định số 362/2025/NĐ-CP."},{"k":"p","t":"Hằng năm, tổ chức thu phí thực hiện quyết toán số tiền phí thu được theo quy định tại khoản 3 Điều 3 Nghị định số 362/2025/NĐ-CP."}]},{"id":"tt74_6","no":6,"code":"Điều 6","title":"Điều 6. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực thi hành từ ngày 10 tháng 8 năm 2026."},{"k":"p","t":"2. Các Thông tư sau hết hiệu lực kể từ ngày Thông tư này có hiệu lực thi hành:"},{"k":"p","t":"a) Thông tư số 287/2016/TT-BTC ngày 15 tháng 11 năm 2016 của Bộ trưởng Bộ Tài chính quy định mức thu, chế độ thu, nộp, quản lý và sử dụng phí, lệ phí trong lĩnh vực năng lượng nguyên tử;"},{"k":"p","t":"b) Thông tư số 116/2021/TT-BTC ngày 22 tháng 12 năm 2021 của Bộ trưởng Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 287/2016/TT-BTC ngày 15 tháng 11 năm 2016 của Bộ trưởng Bộ Tài chính quy định mức thu, chế độ thu, nộp, quản lý và sử dụng phí, lệ phí trong lĩnh vực năng lượng nguyên tử."},{"k":"p","t":"3. Trường hợp tổ chức, cá nhân nộp hồ sơ đề nghị cấp, sửa đổi, bổ sung, gia hạn Giấy phép tiến hành công việc bức xạ, Giấy đăng ký hoạt động dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử; phê duyệt kế hoạch ứng phó sự cố bức xạ, hạt nhân; phê duyệt báo cáo phân tích an toàn trong xây dựng cơ sở bức xạ hoặc thẩm định báo cáo đánh giá an toàn trong thăm dò, khai thác, chế biến, đóng cửa mỏ khoáng sản có tính phóng xạ; cấp Chứng chỉ hành nghề dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử, Chứng chỉ nhân viên bức xạ trước ngày Thông tư này có hiệu lực thi hành thì áp dụng mức thu phí, lệ phí trong lĩnh vực năng lượng nguyên tử quy định tại Thông tư số 287/2016/TT-BTC, được sửa đổi, bổ sung bởi Thông tư số 116/2021/TT-BTC."},{"k":"p","t":"4. Các nội dung khác liên quan đến việc khai, thu, nộp, công khai chế độ thu phí, lệ phí không quy định tại Thông tư này được thực hiện theo quy định tại các văn bản: Luật Phí và lệ phí số 97/2015/QH13; Luật Quản lý thuế số 108/2025/QH15 và các văn bản quy phạm pháp luật quy định chi tiết, biện pháp để tổ chức, hướng dẫn thi hành; Nghị định số 362/2025/NĐ-CP; Nghị định số 347/2025/NĐ-CP của Chính phủ quy định về thủ tục hành chính thuộc lĩnh vực Kho bạc Nhà nước."},{"k":"p","t":"5. Trường hợp các văn bản viện dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản sửa đổi, bổ sung hoặc thay thế đó."},{"k":"p","t":"6. Trong quá trình thực hiện, trường hợp có vướng mắc đề nghị các tổ chức, cá nhân phản ánh kịp thời về Bộ Tài chính để nghiên cứu, hướng dẫn bổ sung./."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Văn phòng Trung ương Đảng và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Quốc hội;- Hội đồng Dân tộc;- Ủy ban Kinh tế và Tài chính;- Văn phòng Chủ tịch nước;- Viện Kiểm sát nhân dân tối cao;- Toà án nhân dân tối cao;- Kiểm toán nhà nước;- Cơ quan Trung ương của các đoàn thể;- Các bộ, cơ quan ngang bộ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Thuế, Sở Tài chính các tỉnh, thành phố trực thuộc trung ương;- Kho bạc Nhà nước các khu vực;- Cục Kiểm tra văn bản và Tổ chức thi hành pháp luật, Bộ Tư pháp;- Công báo;- Cổng Thông tin điện tử Chính phủ;- Cổng Thông tin điện tử Bộ Tài chính;- Cơ sở dữ liệu quốc gia về pháp luật;- Các đơn vị thuộc Bộ Tài chính,- Lưu: VT, CST. (160 b).","KT. BỘ TRƯỞNGTHỨ TRƯỞNGCao Anh Tuấn"]]},{"k":"p","t":"BIỂU MỨC THU PHÍ, LỆ PHÍ TRONG LĨNH VỰC NĂNG LƯỢNG NGUYÊN TỬ"},{"k":"p","t":"(kèm theo Thông tư số 74/2026/TT-BTC ngày 25 tháng 6 năm 2026 của Bộ trưởng Bộ Tài chính)"},{"k":"p","t":"A. DANH MỤC PHÍ"},{"k":"p","t":"I. PHÍ THẨM ĐỊNH AN TOÀN PHÓNG XẠ, BỨC XẠ, AN NINH HẠT NHÂN"},{"k":"tbl","rows":[["Số TT","Nội dung công việc thu phí","Đơn vị tính","Mức thu (đồng)"],["1","Phí thẩm định cấp giấy phép vận hành, sử dụng thiết bị chiếu xạ"],["1.1","Thẩm định cấp giấy phép vận hành thiết bị chiếu xạ khử trùng, đột biến và xử lý vật liệu"],["1.1.1","Máy gia tốc","01 máy","40.000.000"],["1.1.2","Thiết bị chiếu xạ sử dụng nguồn phóng xạ","01 thiết bị","45.000.000"],["1.2","Thẩm định cấp giấy phép vận hành thiết bị xạ trị"],["1.2.1","Thiết bị xạ trị nông","01 thiết bị","4.000.000"],["1.2.2","Thiết bị xạ trị áp sát","01 thiết bị","13.000.000"],["1.2.3","Thiết bị xạ trị từ xa sử dụng nguồn phóng xạ","01 thiết bị","16.000.000"],["1.2.4","Máy gia tốc (bao gồm ca máy gia tốc có tích hợp thiết bị phát tia X kèm theo, trừ máy gia tốc xạ trị hạt nặng tại số TT 1.2.5 mục này)","01 máy","20.000.000"],["1.2.5","Máy gia tốc xạ trị hạt nặng","01 máy","40.000.000"],["1.3","Thẩm định cấp giấy phép vận hành máy gia tốc sử dụng trong sản xuất chất phóng xạ và máy gia tốc sử dụng với mục đích khác","01 máy","20.000.000"],["1.4","Thẩm định cấp giấy phép vận hành thiết bị chiếu xạ gamma tự che chắn (bao gồm thiết bị chiếu xạ máu, các thiết bị khác)","01 thiết bị","13.000.000"],["1.5","Thẩm định cấp giấy phép vận hành thiết bị tạo trường gamma (gamma field)","01 thiết bị","52.000.000"],["1.6","Thẩm định cấp giấy phép sử dụng thiế c độ nguy hiểm dưới trung bình","01 nguồn","3.000.000"],["3","Phí thẩm định cấp giấy phép xử lý, lưu giữ chất thải phóng xạ, nguồn phóng xạ đã qua sử dụng"],["3.1","Thẩm định cấp giấy phép cơ sở xử lý, lưu giữ, chôn cất chất thải phóng xạ, nguồn phóng xạ đã qua sử dụng và nhiên liệu hạt nhân đã qua sử dụng"],["3.1.1","Xử lý, lưu giữ, chôn cất chất thải phóng xạ, nguồn phóng xạ đã qua sử dụng và nhiên liệu hạt nhân đã qua sử dụng cấp quốc gia","01 cơ sở","80.000.000"],["3.1.2","Xử lý, lưu giữ, chôn cất tập trung chất thải phóng xạ cấp tỉnh","01 cơ sở","80.000.000"],["3.1.3","Xử lý, lưu giữ, chôn cất chất thải phóng xạ, nguồn phóng xạ đã qua sử dụng","01 cơ sở","60.000.000"],["3.2","Thẩm định cấp giấy phép xử lý, lưu giữ nguồn phóng xạ đã qua sử dụng"],["3.2.1","Nguồn phóng xạ đã qua sử dụng có mức độ nguy hiểm trên trung bình hoặc với số lượng lớn hơn hoặc bằng 10 nguồn","01 nguồn hoặc 01 địa điểm","20.000.000"],["3.2.2","Nguồn phóng xạ đã qua sử dụng có mức độ nguy hiểm trung bình với số lượng nhỏ hơn 10 nguồn","01 nguồn","2.000.000"],["3.2.3","Nguồn phóng xạ đã qua sử dụng có mức độ nguy hiểm dưới trung bình với số lượng nhỏ hơn 10 nguồn","01 nguồn","1.000.000"],["4","Phí thẩm định cấp giấy phép xây dựng cơ sở bức xạ (thẩm định phê duyệt Báo cáo phân tích an toàn trong xây dựng cơ sở bức xạ)"],["4.1","Thẩm định phê duyệt Báo cáo phân tích an toàn trong xây dựng cơ sở sản xuất, chế biến chất phóng xạ, cơ sở vận hành máy gia tốc, cơ sở vận hành thiết bị chiếu xạ sử dụng nguồn phóng xạ","01 cơ sở (01 báo cáo)","25.000.000"],["4.2","Thẩm định phê duyệt Báo cáo phân tích an toàn trong xây dựng cơ sở xử lý, lưu giữ, chôn cất chất thải phóng xạ, nguồn phóng xạ đã qua sử dụng và nhiên liệu hạt nhân đã qua sử dụng","01 cơ sở (01 báo cáo)","25.000.000"],["4.3","Thẩm định phê duyệt Báo cáo phân tích an toàn trong xây dựng địa điểm lưu giữ, xử lý, chôn cất chất thải phóng xạ, nguồn phóng xạ đã qua sử dụng và nhiên liệu hạt nhân đã qua sử dụng cấp quốc gia, cấp tỉnh","01 cơ sở .5","Thẩm định cấp giấy phép nhập khẩu, xuất khẩu vật liệu hạt nhân","01 lô vật liệu","15.000.000"],["6.6","Thẩm định cấp giấy phép nhập khẩu, xuất khẩu thiết bị hạt nhân","01 thiết bị","15.000.000"],["6.7","Thẩm định cấp giấy phép nhập khẩu, xuất khẩu nhiên liệu hạt nhân đã qua sử dụng","01 lô vật liệu","15.000.000"],["7","Phí thẩm định cấp giấy phép đóng gói, vận chuyển vật liệu phóng xạ, vật liệu hạt nhân, vật liệu hạt nhân nguồn, chất thải phóng xạ"],["7.1","Thẩm định cấp giấy phép đóng gói, vận chuyển chất phóng xạ"],["7.1.1","Nguồn phóng xạ có mức độ nguy hiểm trên trung bình","01 kiện hàng","7.000.000"],["7.1.2","Nguồn phóng xạ có mức độ nguy hiểm trung bình","01 kiện hàng","2.000.000"],["7.1.3","Nguồn phóng xạ có mức độ nguy hiểm dưới trung bình","01 kiện hàng","1.000.000"],["7.2","Thẩm định cấp giấy phép đóng gói, vận chuyển chất thải phóng xạ","01 chuyến hàng","4.000.000"],["7.3","Thẩm định cấp giấy phép đóng gói, vận chuyển vật liệu hạt nhân nguồn","01 chuyến hàng","4.000.000"],["7.4","Thẩm định cấp giấy phép đóng gói, vận chuyển vật liệu hạt nhân","01 chuyến hàng","7.000.000"],["7.5","Thẩm định cấp giấy phép đóng gói, vận chuyển nhiên liệu hạt nhân đã qua sử dụng","01 chuyến hàng","7.000.000"],["8","Phí thẩm định cấp giấy phép vận chuyển vật liệu chất phóng xạ quá cảnh lãnh thổ Việt Nam"],["8.1","Thẩm định cấp giấy phép vận chuyển nguồn phóng xạ quá cảnh lãnh thổ Việt Nam","01 chuyến hàng","25.000.000"],["8.2","Thẩm định cấp giấy phép vận chuyển chất thải phóng xạ, vật liệu hạt nhân, vật liệu hạt nhân nguồn quá cảnh lãnh thổ Việt Nam","01 chuyến hàng","65.000.000"],["9","Phí thẩm định cấp giấy phép thăm dò, khai thác, chế biến quặng phóng xạ (thẩm định báo cáo đánh giá an toàn trong thăm dò, khai thác, chế biến, đóng cửa mỏ khoáng sản có tính phóng xạ)","01 cơ sở","60.000.000"]]},{"k":"p","t":"Ghi chú:"},{"k":"p","t":"1. Trường hợp cấp mới Giấy phép tiến hành công việc bức xạ theo quy định của pháp luật về năng lượng nguyên tử, áp dụng mức thu phí quy định tại mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"2. Trường hợp gia hạn Giấy phép tiến hành công việc bức xạ theo quy định của pháp luật về năng lượng nguyên tử, áp dụng mức thu phí bằng 75% mức thu phí quy định tại mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"3. Trường hợp sửa đổi để hợp nhất các Giấy phép tiến hành công việc bức xạ do cùng một cơ quan có thẩm quyền cấp, cùng loại hình tiến hành công việc bức xạ (cùng thủ tục hành chính), áp dụng mức thu phí bằng 30% mức thu phí quy định tại mục I phần A Biểu mức thu phí, lệ phí này. Các trường hợp sửa đổi giấy phép khác thì không thu phí thẩm định."},{"k":"p","t":"4. Trường hợp bổ sung Giấy phép tiến hành công việc bức xạ do cùng một cơ quan có thẩm quyền cấp, cùng loại hình tiến hành công việc bức xạ (cùng thủ tục hành chính), áp dụng mức thu phí đối với các nguồn bức xạ bổ sung bằng 75% mức thu phí quy định tại mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"5. Phân nhóm đối với nguồn phóng xạ"},{"k":"p","t":"a) Nguồn phóng xạ có mức độ nguy hiểm trên trung bình bao gồm: nguồn thuộc nhóm 1 và nhóm 2 theo phân loại nguồn phóng xạ được quy định tại Quy chuẩn quốc gia QCVN 6:2010/BKHCN ban hành kèm theo Thông tư số 24/2010/TT-BKHCN ngày 29 tháng 12 năm 2010 của Bộ trưởng Bộ Khoa học và Công nghệ ban hành và thực hiện “Quy chuẩn kỹ thuật quốc gia về An toàn bức xạ - Phân nhóm và phân loại nguồn phóng xạ” (QCVN 6:2010/BKHCN)."},{"k":"p","t":"b) Nguồn phóng xạ có mức độ nguy hiểm trung bình bao gồm: nguồn thuộc nhóm 3 theo phân loại nguồn phóng xạ được quy định tại Quy chuẩn quốc gia QCVN 6:2010/BKHCN."},{"k":"p","t":"c) Nguồn phóng xạ có mức độ nguy hiểm dưới trung bình bao gồm: nguồn thuộc nhóm 4 và nhóm 5 theo phân loại nguồn phóng xạ được quy định tại Quy chuẩn quốc gia QCVN 6:2010/BKHCN."},{"k":"p","t":"6. Trường hợp tổ chức, cá nhân đề nghị cấp giấy phép tiến hành một công việc có nhiều nguồn bức xạ (máy, thiết bị hoặc nguồn) thì mức thu phí được tính như sau:"},{"k":"p","t":"a) Đối với Giấy phép tiến hành công việc bức xạ có từ 02 đến 03 nguồn bức xạ, áp dụng mức thu bằng 95% mức thu quy định tại mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"b) Đối với Giấy phép tiến hành công việc bức xạ có từ 04 đến 05 nguồn bức xạ, áp dụng mức thu bằng 90% mức thu quy định tại mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"c) Đối với Giấy phép tiến hành công việc bức xạ có từ 06 nguồn bức xạ, áp dụng mức thu bằng 85% mức thu quy định tại mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"d) Trường hợp sử dụng và vận chuyển nguồn phóng xạ di động, áp dụng mức thu phí quy định tại số TT 2.4 và số TT 7.1 mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"7. Trường hợp thẩm định cấp giấy phép đóng gói, vận chuyển nguồn phóng xạ hở dùng trong y học hạt nhân từ 100 kiện hàng cùng loại trở lên thì tổng mức thu phí áp dụng theo mức quy định tại số TT 7.1 mục I phần A Biểu mức thu phí, lệ phí này nhưng không vượt quá mức thu đối với 100 kiện hàng."},{"k":"p","t":"8. Trường hợp vận hành máy gia tốc để sản xuất chất phóng xạ, áp dụng mức thu phí quy định tại Số TT 1.3 mục I phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"II. PHÍ THẨM ĐỊNH ĐIỀU KIỆN CẤP GIẤY PHÉP ĐĂNG KÝ DỊCH VỤ HỖ TRỢ ỨNG DỤNG NĂNG LƯỢNG NGUYÊN TỬ"},{"k":"tbl","rows":[["Số TT","Nội dung công việc thu phí","Đơn vị tính","Mức thu (đồng)"],["1","Thẩm định điều kiện cấp giấy đăng ký dịch vụ đào tạo (đào tạo an toàn bức xạ; đào tạo chuyên môn nghiệp vụ đối với nhân viên bức xạ)","01 dịch vụ","10.000.000"],["2","Thẩm định điều kiện cấp giấy đăng ký dịch vụ kiểm định thiết bị bức xạ","01 dịch vụ","10.000.000"],["3","Thẩm định điều kiện cấp giấy đăng ký dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử khác","01 dịch vụ","7.000.000"]]},{"k":"p","t":"Ghi chú:"},{"k":"p","t":"1. Trường hợp cấp mới Giấy đăng ký hoạt động dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử theo quy định của pháp luật về năng lượng nguyên tử, áp dụng mức thu phí quy định tại mục II phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"2. Trường hợp gia hạn Giấy đăng ký hoạt động dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử theo quy định của pháp luật về năng lượng nguyên tử, áp dụng mức thu phí bằng 75% mức thu phí quy định tại mục II phần A Biểu mức thu phí, lệ phí này."},{"k":"p","t":"3. Trường hợp sửa đổi, bổ sung Giấy đăng ký hoạt động dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử theo quy định của pháp luật về năng lượng nguyên tử thì không thu phí thẩm định."},{"k":"p","t":"III. PHÍ THẨM ĐỊNH KẾ HOẠCH ỨNG PHÓ SỰ CỐ BỨC XẠ, HẠT NHÂN"},{"k":"tbl","rows":[["Số TT","Nội dung công việc thu phí","Đơn vị tính","Mức thu (đồng)"],["1","Thẩm định kế hoạch ứng phó sự cố bức xạ, sự cố hạt nhân cấp tỉnh","01 bản kế hoạch","15.000.000"],["2","Thẩm định để phê duyệt kế hoạch ứng phó sự cố cấp cơ sở"],["2.1","Thẩm định để phê duyệt đối với Kế hoạch ứng phó sự cố cấp cơ sở thuộc nhóm chuẩn bị ứng phó sự cố I, II và III và cơ sở tiến hành công việc bức xạ sử dụng nguồn phóng xạ trong chụp ảnh phóng xạ công nghiệp","01 bản kế hoạch","5.000.000"],["2.2","Thẩm định để phê duyệt đối với Kế hoạch ứng phó sự cố cấp cơ sở thuộc nhóm chuẩn bị ứng phó sự cố IV - cơ sở tiến hành công việc bức xạ sử dụng nguồn phóng xạ, cơ sở lắp đặt nguồn phóng xạ thuộc nhóm 2 (trừ nguồn phóng xạ trong chụp ảnh phóng xạ công nghiệp) theo quy định tại QCVN 6:2010/BKHCN, thiết bị phát tia X trong chụp ảnh phóng xạ công nghiệp và các máy gia tốc","01 bản kế hoạch","2.000.000"]]},{"k":"p","t":"B. DANH MỤC LỆ PHÍ"},{"k":"tbl","rows":[["Số TT","Nội dung công việc thu lệ phí","Đơn vị tính","Mức thu (đồng)"],["1","Cấp chứng chỉ nhân viên bức xạ","01 chứng chỉ","200.000"],["2","Cấp chứng chỉ hành nghề dịch vụ hỗ trợ ứng dụng năng lượng nguyên tử","01 chứng chỉ","200.000"]]}]}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
