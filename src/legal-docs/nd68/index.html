ực hiện nghĩa vụ thuế của hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"nd68_3","no":3,"code":"Điều 3","title":"Điều 3. Thuế giá trị gia tăng","shortTitle":"Thuế giá trị gia tăng","chuong":"Chương II — CHÍNH SÁCH THUẾ ĐỐI VỚI HỘ KINH DOANH, CÁ NHÂN KINH DOANH","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh có hoạt động sản xuất, kinh doanh có mức doanh thu năm từ 500 triệu đồng trở xuống thuộc đối tượng không chịu thuế giá trị gia tăng."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh có hoạt động sản xuất, kinh doanh có mức doanh thu năm trên 500 triệu đồng thuộc đối tượng chịu thuế giá trị gia tăng và áp dụng phương pháp tính trực tiếp theo doanh thu bằng tỷ lệ % nhân (x) doanh thu. Tỷ lệ % và doanh thu tính thuế thực hiện theo quy định của Luật Thuế giá trị gia tăng số 48/2024/QH15 và các văn bản hướng dẫn thi hành."}]},{"id":"nd68_4","no":4,"code":"Điều 4","title":"Điều 4. Thuế thu nhập cá nhân","shortTitle":"Thuế thu nhập cá nhân","chuong":"Chương II — CHÍNH SÁCH THUẾ ĐỐI VỚI HỘ KINH DOANH, CÁ NHÂN KINH DOANH","muc":"","level":1,"content":[{"k":"p","t":"1. Cá nhân cư trú có hoạt động sản xuất, kinh doanh, bao gồm cả cá nhân đăng ký thành lập hộ kinh doanh hoặc người được các thành viên hộ gia đình ủy quyền làm người đại diện hộ kinh doanh (sau đây gọi là cá nhân kinh doanh) có mức doanh thu năm từ 500 triệu đồng trở xuống không phải nộp thuế thu nhập cá nhân."},{"k":"p","t":"2. Cá nhân kinh doanh có doanh thu năm trên mức doanh thu quy định tại khoản 1 Điều này thực hiện nộp thuế theo quy định tại Điều 7 Luật Thuế thu nhập cá nhân số 109/2025/QH15."},{"k":"p","t":"3. Đối với cá nhân kinh doanh nộp thuế thu nhập cá nhân theo quy định tại khoản 3 Điều 7 Luật Thuế thu nhập cá nhân số 109/2025/QH15, trường hợp cá nhân có nhiều ngành, nghề kinh doanh áp dụng các mức thuế suất thuế thu nhập cá nhân khác nhau hoặc có nhiều địa điểm kinh doanh thì cá nhân được áp dụng mức trừ 500 triệu đồng trước khi tính thuế thu nhập cá nhân đối với một hoặc một số ngành, nghề kinh doanh hoặc địa điểm kinh doanh do cá nhân lựa chọn theo phương án có lợi nhất, nhưng tổng mức trừ không vượt quá 500 triệu đồng trong một năm đối với doanh thu của toàn bộ hoạt động kinh doanh quy định tại khoản này."},{"k":"p","t":"Trường hợp doanh thu từ ngành, nghề kinh doanh hoặc địa điểm kinh doanh được lựa chọn chưa trừ đủ 500 triệu đồng, cá nhân được trừ tiếp mức chưa trừ hết vào doanh thu của một hoặc một số ngành, nghề kinh doanh hoặc địa điểm kinh doanh khác cho đến khi tổng mức trừ đủ 500 triệu đồng."},{"k":"p","t":"4. Đối với cá nhân cho thuê bất động sản nộp thuế thu nhập cá nhân theo quy định tại khoản 4 Điều 7 Luật Thuế thu nhập cá nhân số 109/2025/QH15:"},{"k":"p","t":"a) Trường hợp cá nhân có nhiều bất động sản cho thuê ở các địa điểm khác nhau, cá nhân được trừ 500 triệu đồng trước khi tính thuế thu nhập cá nhân đối với một hoặc một số hợp đồng cho thuê bất động sản do cá nhân lựa chọn nhưng tổng mức được trừ không quá 500 triệu đồng một năm đối với tất cả hợp đồng cho thuê bất động sản. Trường hợp hợp đồng cho thuê bất động sản được lựa chọn chưa trừ đủ 500 triệu đồng, cá nhân được tiếp tục lựa chọn các hợp đồng cho thuê bất động sản khác để được trừ tiếp cho đến khi trừ đủ 500 triệu đồng;"},{"k":"p","t":"b) Trường hợp cá nhân có nhiều bất động sản cho thuê ở các địa điểm khác nhau và có quy định bên đi thuê khai thay, nộp thay thuế, khi lựa chọn hợp đồng cho thuê bất động sản để áp dụng mức được trừ khi tính thuế thu nhập cá nhân, cá nhân cho thuê bất động sản và bên đi thuê phải quy định rõ trong hợp đồng cho thuê bất động sản nội dung khai thay, nộp thay thuế và số tiền được trừ khi tính thuế thu nhập cá nhân. Trường hợp hợp đồng cho thuê bất động sản có quy định khai thay, nộp thay thuế nhưng chưa trừ đủ 500 triệu đồng thì cá nhân được tiếp tục lựa chọn các hợp đồng cho thuê bất động sản khác để tiếp tục được trừ cho đến khi trừ đủ 500 triệu đồng."},{"k":"p","t":"5. Phương pháp tính thuế"},{"k":"p","t":"a) Phương pháp tính thuế thu nhập cá nhân theo thuế suất nhân (x) doanh thu tính thuế áp dụng đối với cá nhân kinh doanh có doanh thu năm trên 500 triệu đồng đến 03 tỷ đồng. Thuế suất thuế thu nhập cá nhân áp dụng theo quy định tại khoản 3 Điều 7 Luật Thuế thu nhập cá nhân số 109/2025/QH15;"},{"k":"p","t":"b) Phương pháp tính thuế thu nhập cá nhân theo thu nhập tính thuế nhân (x) thuế suất áp dụng đối với cá nhân kinh doanh có doanh thu năm trên 03 tỷ đồng và trường hợp cá nhân kinh doanh có doanh thu năm trên 500 triệu đồng đến 03 tỷ đồng lựa chọn phương pháp này. Thu nhập tính thuế được xác định bằng doanh thu của hàng hóa, dịch vụ bán ra trừ (-) chi phí liên quan đến hoạt động sản xuất, kinh doanh trong kỳ tính thuế. Thuế suất thuế thu nhập cá nhân áp dụng theo quy định tại khoản 2 Điều 7 Luật Thuế thu nhập cá nhân số 109/2025/QH15;"},{"k":"p","t":"c) Doanh thu, chi phí xác định theo quy định tại Điều 5, Điều 6 Nghị định này;"},{"k":"p","t":"d) Trường hợp hộ kinh doanh, cá nhân kinh doanh có doanh thu trên 03 tỷ đồng hoặc có doanh thu năm trên 500 triệu đồng đến 03 tỷ đồng đang áp dụng phương pháp tính thuế thu nhập cá nhân theo thu nhập tính thuế nhân (x) thuế suất thì thực hiện ổn định phương pháp tính thuế trong 02 năm liên tục kể từ năm đầu tiên áp dụng. Trường hợp hộ kinh doanh, cá nhân kinh doanh có doanh thu năm trên 500 triệu đồng đến 03 tỷ đồng đang áp dụng phương pháp tính thuế thu nhập cá nhân theo thuế suất nhân (x) doanh thu tính thuế, nếu hết năm xác định doanh thu thực tế năm trên 03 tỷ đồng thì từ năm tiếp theo phải chuyển sang áp dụng phương pháp tính thuế thu nhập cá nhân theo thu nhập tính thuế nhân (x) thuế suất."}]},{"id":"nd68_5","no":5,"code":"Điều 5","title":"Điều 5. Doanh thu để xác định thuế thu nhập cá nhân","shortTitle":"Doanh thu để xác định thuế thu nhập cá nhân","chuong":"Chương II — CHÍNH SÁCH THUẾ ĐỐI VỚI HỘ KINH DOANH, CÁ NHÂN KINH DOANH","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh thu là toàn bộ tiền bán hàng, tiền gia công, tiền cung ứng dịch vụ kể cả trợ giá, phụ thu, phụ trội mà hộ kinh doanh, cá nhân kinh doanh được hưởng, không phân biệt đã thu được tiền hay chưa thu được tiền; bao gồm cả các khoản thưởng được nhận, khoản được nhận từ hỗ trợ đạt doanh số, khuyến mại, chiết khấu thanh toán, khoản hỗ trợ được nhận bằng tiền hoặc không bằng tiền, các khoản bồi thường vi phạm hợp đồng, bồi thường khác liên quan đến hoạt động kinh doanh, doanh thu khác mà cá nhân kinh doanh được nhận không phân biệt đã thu được tiền hay chưa thu được tiền, không bao gồm chiết khấu thương mại, giảm giá hàng bán và giá trị hàng bán bị trả lại."},{"k":"p","t":"2. Doanh thu đối với một số trường hợp được quy định cụ thể như sau:"},{"k":"p","t":"a) Đối với hoạt động gia công hàng hóa là tiền thu về hoạt động gia công bao gồm cả tiền công, chi phí về nhiên liệu, động lực, vật liệu phụ và chi phí khác phục vụ cho việc gia công hàng hóa;"},{"k":"p","t":"b) Trường hợp bán hàng hóa, cung cấp dịch vụ theo phương thức trả góp, trả chậm là tiền bán hàng hóa, dịch vụ trả tiền một lần, không bao gồm tiền lãi trả góp, tiền lãi trả chậm;"},{"k":"p","t":"c) Trường hợp giao hàng hóa cho các đại lý là tổng số tiền bán hàng hóa;"},{"k":"p","t":"d) Trường hợp nhận làm đại lý bán hàng đúng giá quy định của bên giao đại lý là tiền hoa hồng được hưởng theo hợp đồng đại lý;"},{"k":"p","t":"đ) Đối với hoạt động cho thuê tài sản là số tiền bên thuê trả từng kỳ theo hợp đồng thuê. Trường hợp bên thuê trả tiền trước cho nhiều năm thì doanh thu để tính thu nhập chịu thuế được phân bổ cho số năm trả tiền trước hoặc được xác định theo doanh thu trả tiền một lần;"},{"k":"p","t":"e) Đối với hoạt động kinh doanh dịch vụ khác mà khách hàng trả tiền trước cho nhiều năm thì doanh thu để tính thu nhập chịu thuế được phân bổ cho số năm trả tiền trước hoặc xác định theo doanh thu trả tiền một lần;"},{"k":"p","t":"g) Đối với hoạt động vận tải là toàn bộ doanh thu vận chuyển hành khách, hàng hóa, hành lý phát sinh trong kỳ tính thuế;"},{"k":"p","t":"h) Đối với hoạt động xây dựng, lắp đặt là giá trị công trình, giá trị hạng mục công trình hoặc giá trị khối lượng công trình xây dựng, lắp đặt nghiệm thu, bao gồm cả giá trị nguyên vật liệu, máy móc, thiết bị; trường hợp xây dựng, lắp đặt không bao thầu nguyên vật liệu, máy móc, thiết bị là số tiền từ hoạt động xây dựng, lắp đặt không bao gồm giá trị nguyên vật liệu, máy móc, thiết bị."},{"k":"p","t":"3. Thời điểm xác định doanh thu"},{"k":"p","t":"a) Đối với hoạt động bán hàng hóa là thời điểm chuyển giao quyền sở hữu, quyền sử dụng hàng hóa cho người mua;"},{"k":"p","t":"b) Đối với hoạt động cung ứng dịch vụ là thời điểm hoàn thành việc cung ứng dịch vụ hoặc hoàn thành từng phần việc cung ứng dịch vụ cho người mua, trừ các hoạt động cung ứng dịch vụ nêu tại khoản 2 Điều này."}]},{"id":"nd68_6","no":6,"code":"Điều 6","title":"Điều 6. Các khoản chi được trừ và không được trừ khi xác định thuế thu nhập cá nhân","shortTitle":"Các khoản chi được trừ và không được trừ khi xác định thuế thu nhập cá nhân","chuong":"Chương II — CHÍNH SÁCH THUẾ ĐỐI VỚI HỘ KINH DOANH, CÁ NHÂN KINH DOANH","muc":"","level":1,"content":[{"k":"p","t":"1. Các khoản chi được trừ là các khoản chi phí thực tế phát sinh liên quan đến hoạt động sản xuất, kinh doanh, có đủ hóa đơn, chứng từ theo quy định của pháp luật về hóa đơn, chứng từ, pháp luật về kế toán và chứng từ thanh toán không dùng tiền mặt đối với các khoản thanh toán từng lần có giá trị từ 05 triệu đồng trở lên theo pháp luật về thuế giá trị gia tăng, cụ thể như sau:"},{"k":"p","t":"a) Chi phí nguyên liệu, vật liệu, nhiên liệu, năng lượng, hàng hóa sử dụng vào sản xuất, kinh doanh;"},{"k":"p","t":"b) Chi phí tiền lương, tiền công, tiền thưởng, các khoản phụ cấp, bảo hiểm bắt buộc và các khoản chi trả cho người lao động có đóng bảo hiểm bắt buộc theo quy định; chi phí tiền lương, tiền công, các khoản phụ cấp và các khoản chi trả cho người lao động dưới 01 tháng;"},{"k":"p","t":"c) Chi phí khấu hao tài sản cố định phục vụ cho hoạt động sản xuất, kinh doanh. Mức trích khấu hao tài sản cố định được tính vào chi phí hợp lý theo quy định về chế độ quản lý, sử dụng và trích khấu hao tài sản cố định áp dụng đối với doanh nghiệp. Trường hợp tài sản cố định đã khấu hao hết giá trị nhưng vẫn tiếp tục được sử dụng cho sản xuất, kinh doanh thì không được trích khấu hao;"},{"k":"p","t":"d) Chi phí dịch vụ mua ngoài như điện, nước, điện thoại, internet, vận chuyển, thuê tài sản, sửa chữa, bảo dưỡng có hóa đơn, chứng từ theo quy định của pháp luật;"},{"k":"p","t":"đ) Chi phí trả lãi tiền vay vốn sản xuất, kinh doanh của tổ chức tín dụng theo lãi suất thực tế. Chi phí trả lãi tiền vay vốn sản xuất, kinh doanh của đối tượng không phải là tổ chức tín dụng không vượt quá mức quy định tại Bộ luật Dân sự;"},{"k":"p","t":"e) Các khoản chi khác phục vụ trực tiếp hoạt động sản xuất, kinh doanh."},{"k":"p","t":"2. Các khoản chi không được trừ khi xác định thu nhập tính thuế:"},{"k":"p","t":"a) Khoản chi không liên quan đến hoạt động sản xuất, kinh doanh;"},{"k":"p","t":"b) Các khoản chi không có đủ hóa đơn, chứng từ theo quy định của pháp luật;"},{"k":"p","t":"c) Khoản tiền lương, tiền công và các khoản chi có tính chất tiền lương của cá nhân kinh doanh, nhóm cá nhân kinh doanh, các thành viên trong hộ kinh doanh trừ các khoản đóng góp bảo hiểm bắt buộc; khoản tiền lương, tiền công và các khoản chi có tính chất tiền lương đã tính vào chi phí nhưng thực tế không chi trả hoặc không có chứng từ thanh toán;"},{"k":"p","t":"d) Phần chi khấu hao tài sản cố định vượt mức quy định hoặc khấu hao đối với tài sản cố định không sử dụng cho hoạt động sản xuất, kinh doanh;"},{"k":"p","t":"đ) Các khoản chi phạt vi phạm hành chính, phạt vi phạm hợp đồng, tiền bồi thường do lỗi của cá nhân kinh doanh;"},{"k":"p","t":"e) Đất ở và công trình phục vụ sinh hoạt trên đất, xe ô tô và các tài sản đăng ký sở hữu hoặc đăng ký sử dụng mang tên cá nhân, trừ xe ô tô và các tài sản đăng ký sở hữu hoặc đăng ký sử dụng với mục đích kinh doanh vận tải, du lịch;"},{"k":"p","t":"g) Các khoản chi phí phục vụ nhu cầu cá nhân, gia đình. Cá nhân kinh doanh có trách nhiệm theo dõi riêng chi phí phục vụ hoạt động kinh doanh và chi phí phục vụ nhu cầu cá nhân, gia đình."}]},{"id":"nd68_7","no":7,"code":"Điều 7","title":"Điều 7. Các khoản thuế khác","shortTitle":"Các khoản thuế khác","chuong":"Chương II — CHÍNH SÁCH THUẾ ĐỐI VỚI HỘ KINH DOANH, CÁ NHÂN KINH DOANH","muc":"","level":1,"content":[{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng chịu thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường theo quy định của pháp luật thuế thì việc xác định nghĩa vụ thuế được thực hiện theo quy định của pháp luật về từng loại thuế tương ứng."}]},{"id":"nd68_8","no":8,"code":"Điều 8","title":"Điều 8. Nguyên tắc khai thuế, tính thuế và sử dụng hóa đơn","shortTitle":"Nguyên tắc khai thuế, tính thuế và sử dụng hóa đơn","chuong":"Chương III — KHAI THUẾ, TÍNH THUẾ, NỘP THUẾ, KHẤU TRỪ THUẾ, SỬ DỤNG HÓA ĐƠN ĐIỆN TỬ, XỬ LÝ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA","muc":"","level":1,"content":[{"k":"p","t":"1. Khai thuế, tính thuế giá trị gia tăng, thuế thu nhập cá nhân"},{"k":"p","t":"a) Trường hợp hộ kinh doanh, cá nhân kinh doanh tự xác định có mức doanh thu năm từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ từ 500 triệu đồng trở xuống thì hộ kinh doanh, cá nhân kinh doanh thông báo doanh thu thực tế phát sinh trong năm với cơ quan thuế chậm nhất là ngày 31 tháng 01 của năm dương lịch tiếp theo."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh phát sinh doanh thu thực tế trên 500 triệu đồng trong năm thì thực hiện khai thuế, nộp thuế kể từ quý phát sinh doanh thu trên 500 triệu đồng. Số thuế giá trị gia tăng, thuế thu nhập cá nhân phải nộp xác định theo quy định tại Điều 3, Điều 4 Nghị định này;"},{"k":"p","t":"b) Trường hợp hộ kinh doanh, cá nhân kinh doanh tự xác định có mức doanh thu năm từ hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ trên 500 triệu đồng bao gồm cả doanh thu đã được tổ chức, cá nhân khấu trừ, khai thay, nộp thay thì tính thuế giá trị gia tăng, thuế thu nhập cá nhân theo quy định tại Điều 3, Điều 4 Nghị định này. Việc kê khai, nộp thuế thực hiện theo quy định tại Điều 10 Nghị định này."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử có mã của cơ quan thuế, hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế, Hệ thống thông tin quản lý thuế tự động tạo lập tờ khai thuế để hỗ trợ hộ kinh doanh, cá nhân kinh doanh trong việc khai thuế, tính thuế giá trị gia tăng, thuế thu nhập cá nhân trên cơ sở dữ liệu hóa đơn điện tử, cơ sở dữ liệu quản lý thuế và các nguồn cơ sở dữ liệu khác mà cơ quan thuế có được từ cơ quan nhà nước khác, tổ chức, cá nhân cung cấp. Việc hỗ trợ của cơ quan thuế không thay thế trách nhiệm khai thuế và xác định số thuế phải nộp của hộ kinh doanh, cá nhân kinh doanh. Hộ kinh doanh, cá nhân kinh doanh chịu trách nhiệm trước pháp luật về tính trung thực, chính xác của hồ sơ khai thuế."},{"k":"p","t":"2. Khai thuế, tính thuế đối với các loại thuế khác"},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh tự xác định số thuế phải nộp theo quy định của pháp luật về thuế và thực hiện khai thuế, nộp thuế cùng với kỳ khai thuế giá trị gia tăng hoặc cùng thời hạn thông báo doanh thu thực tế phát sinh."},{"k":"p","t":"3. Thời hạn nộp hồ sơ khai thuế, nộp thuế"},{"k":"p","t":"a) Trường hợp khai thuế theo quý thì thời hạn nộp hồ sơ khai thuế chậm nhất là ngày cuối cùng của tháng đầu tiên của quý tiếp theo;"},{"k":"p","t":"b) Trường hợp khai thuế theo tháng thì thời hạn nộp hồ sơ khai thuế chậm nhất là ngày thứ 20 của tháng tiếp theo tháng phát sinh nghĩa vụ thuế trừ trường hợp khai thuế theo quy định tại khoản 1 Điều 18 Nghị định này;"},{"k":"p","t":"c) Trường hợp khai quyết toán thuế thu nhập cá nhân theo năm thì thời hạn nộp hồ sơ khai thuế chậm nhất là ngày 31 tháng 3 của năm dương lịch tiếp theo;"},{"k":"p","t":"d) Trường hợp cá nhân trực tiếp khai thuế đối với hoạt động cho thuê bất động sản thì cá nhân được lựa chọn khai thuế hai lần trong năm tính thuế hoặc khai thuế một lần theo năm tính thuế. Trường hợp khai thuế hai lần trong năm tính thuế, thời hạn nộp hồ sơ khai thuế lần thứ nhất chậm nhất là ngày 31 tháng 7 của năm tính thuế và lần thứ hai chậm nhất là ngày 31 tháng 01 của năm dương lịch tiếp theo năm tính thuế. Trường hợp khai thuế một lần theo năm tính thuế, thời hạn nộp hồ sơ khai thuế chậm nhất là ngày 31 tháng 01 của năm dương lịch tiếp theo năm tính thuế;"},{"k":"p","t":"đ) Trường hợp tổ chức thuê bất động sản của cá nhân mà trong hợp đồng thuê bất động sản có thỏa thuận bên đi thuê là người khai thuế thay, nộp thuế thay thì tổ chức thực hiện khai thuế thay, nộp thuế thay cho cá nhân. Thời hạn nộp hồ sơ khai thuế xác định theo kỳ thanh toán tiền thuê bất động sản."},{"k":"p","t":"Trường hợp cá nhân cho cá nhân thuê bất động sản thì cá nhân cho thuê bất động sản phải trực tiếp khai thuế;"},{"k":"p","t":"e) Thời hạn nộp thuế chậm nhất là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế. Trường hợp khai bổ sung hồ sơ khai thuế, thời hạn nộp thuế là thời hạn nộp hồ sơ khai thuế của kỳ tính thuế có sai, sót."},{"k":"p","t":"4. Địa điểm khai thuế, nộp thuế"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh nộp hồ sơ khai thuế bằng phương thức điện tử."},{"k":"p","t":"Trường hợp người nộp thuế thuộc đối tượng có hoàn cảnh đặc biệt, bao gồm người cao tuổi, người khuyết tật, người thuộc diện bảo trợ xã hội, người cư trú tại địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn hoặc thuộc trường hợp bất khả kháng khác, không thể thực hiện giao dịch điện tử thì nộp hồ sơ trực tiếp hoặc gửi hồ sơ qua dịch vụ bưu chính đến Trung tâm Phục vụ hành chính công cấp xã;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh bao gồm cả kinh doanh thương mại điện tử có nhiều địa điểm kinh doanh (cửa hàng) hoạt động trên cùng địa bàn một tỉnh, thành phố hoặc khác tỉnh, thành phố, thực hiện khai thuế tổng hợp chung cho các địa điểm kinh doanh trên 01 hồ sơ khai thuế để nộp cho cơ quan thuế quản lý trực tiếp trụ sở của hộ kinh doanh, cá nhân kinh doanh được xác định là địa điểm ghi trên giấy chứng nhận đăng ký kinh doanh đối với hộ kinh doanh hoặc trên tờ khai đăng ký thuế đối với cá nhân kinh doanh. Hộ kinh doanh, cá nhân kinh doanh thực hiện nộp thuế cho từng địa điểm kinh doanh."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế thu nhập cá nhân theo phương pháp thuế suất nhân (x) doanh thu tính thuế thì hộ kinh doanh, cá nhân kinh doanh kê khai doanh thu và số thuế giá trị gia tăng, thuế thu nhập cá nhân phải nộp theo từng địa điểm kinh doanh."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh nộp thuế thu nhập cá nhân theo phương pháp thu nhập tính thuế nhân (x) thuế suất thì hộ kinh doanh, cá nhân kinh doanh kê khai doanh thu từng địa điểm kinh doanh và thực hiện nộp thuế giá trị gia tăng theo từng địa điểm kinh doanh, nộp thuế thu nhập cá nhân tại trụ sở chính;"},{"k":"p","t":"c) Đối với hộ kinh doanh, cá nhân kinh doanh chỉ có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số và không có địa điểm kinh doanh thì thực hiện kê khai, nộp thuế tại cơ quan thuế quản lý địa bàn nơi hộ kinh doanh, cá nhân kinh doanh cư trú: nơi ở hiện tại; nơi tạm trú hoặc nơi thường trú;"},{"k":"p","t":"d) Cá nhân có hoạt động cho thuê bất động sản thực hiện khai thuế giá trị gia tăng, thuế thu nhập cá nhân và gửi hồ sơ khai thuế cho cơ quan thuế nơi có bất động sản cho thuê."},{"k":"p","t":"Cá nhân có nhiều bất động sản cho thuê trên cùng địa bàn một tỉnh, thành phố hoặc khác tỉnh, thành phố, thực hiện khai thuế tổng hợp chung cho các bất động sản trên 01 hồ sơ khai thuế và lựa chọn 01 cơ quan thuế nơi có bất động sản cho thuê để nộp hồ sơ khai thuế trừ trường hợp tổ chức đi thuê khai thuế thay, nộp thuế thay. Cá nhân thực hiện kê khai doanh thu, thuế giá trị gia tăng, thuế thu nhập cá nhân phải nộp và nộp thuế theo từng địa điểm nơi có bất động sản cho thuê;"},{"k":"p","t":"đ) Thông báo địa điểm kinh doanh"},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh có địa điểm kinh doanh ngoài trụ sở chính thì thực hiện thông báo địa điểm kinh doanh với cơ quan thuế quản lý trực tiếp trụ sở của hộ kinh doanh, cá nhân kinh doanh trong thời hạn 10 ngày làm việc kể từ ngày địa điểm kinh doanh đi vào hoạt động theo mẫu do Bộ trưởng Bộ Tài chính quy định."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh thay đổi thông tin, tạm ngừng, chấm dứt hoạt động đối với địa điểm kinh doanh thì thực hiện thông báo đến cơ quan thuế quản lý trực tiếp trụ sở của hộ kinh doanh, cá nhân kinh doanh trong thời hạn 10 ngày làm việc kể từ ngày thay đổi thông tin, tạm ngừng, chấm dứt hoạt động theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"5. Sử dụng hóa đơn điện tử"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh có doanh thu tính thuế giá trị gia tăng hằng năm từ 01 tỷ đồng trở lên thì phải áp dụng hóa đơn điện tử có mã của cơ quan thuế, hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế theo quy định tại khoản 8 Điều 1 Nghị định số 70/2025/NĐ-CP ngày 20 tháng 3 năm 2025 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 123/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định về hóa đơn, chứng từ."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có nhiều địa điểm kinh doanh thì sử dụng mã số thuế của hộ kinh doanh, cá nhân kinh doanh cho tất cả các cửa hàng và phải ghi rõ địa chỉ của từng địa điểm kinh doanh trên hóa đơn;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh có doanh thu tính thuế giá trị gia tăng năm trên 500 triệu đồng và dưới 01 tỷ đồng không bắt buộc sử dụng hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế. Trường hợp đáp ứng điều kiện và có nhu cầu sử dụng hóa đơn điện tử thì đăng ký sử dụng hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế. Trường hợp hộ kinh doanh, cá nhân kinh doanh không đăng ký sử dụng hóa đơn điện tử, có nhu cầu sử dụng hóa đơn điện tử thì thực hiện khai và nộp thuế trước khi được cơ quan thuế cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh giao dịch bán hàng hóa, cung cấp dịch vụ;"},{"k":"p","t":"c) Hộ kinh doanh, cá nhân kinh doanh mới ra kinh doanh tại Điều 9 Nghị định này hoặc hộ kinh doanh, cá nhân kinh doanh có doanh thu tính thuế giá trị gia tăng năm trước chưa đến 01 tỷ đồng nhưng trong năm tính thuế có doanh thu tính thuế giá trị gia tăng từ 01 tỷ đồng trở lên thì phải áp dụng hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế. Hộ kinh doanh, cá nhân kinh doanh đăng ký sử dụng hóa đơn điện tử trong thời gian 30 ngày kể từ ngày cuối cùng của kỳ tính thuế có doanh thu tính thuế giá trị gia tăng lũy kế từ 01 tỷ đồng trở lên."},{"k":"p","t":"6. Tạm ngừng, chấm dứt hoạt động kinh doanh"},{"k":"p","t":"a) Hộ kinh doanh thuộc đối tượng phải đăng ký kinh doanh theo quy định của pháp luật về đăng ký doanh nghiệp thì thực hiện thủ tục tạm ngừng hoạt động kinh doanh theo quy định tại Nghị định số 168/2025/NĐ-CP ngày 30 tháng 6 năm 2025 của Chính phủ về đăng ký doanh nghiệp;"},{"k":"p","t":"b) Trường hợp không phải đăng ký kinh doanh theo quy định của pháp luật về đăng ký doanh nghiệp nhưng đã đăng ký thuế với cơ quan thuế thì người nộp thuế gửi thông báo đến cơ quan quản lý thuế quản lý trực tiếp để cập nhật tình trạng “tạm ngừng kinh doanh” theo quy định của Bộ Tài chính;"},{"k":"p","t":"c) Trong thời gian tạm ngừng hoạt động, hộ kinh doanh, cá nhân kinh doanh không phải nộp hồ sơ khai thuế, trừ trường hợp tạm ngừng không trọn tháng nếu khai thuế theo tháng hoặc tạm ngừng không trọn quý nếu khai thuế theo quý;"},{"k":"p","t":"d) Trường hợp hộ kinh doanh, cá nhân kinh doanh chấm dứt hoạt động kinh doanh trong năm thì hộ kinh doanh, cá nhân kinh doanh thông báo doanh thu thực tế lũy kế từ đầu năm đến thời điểm chấm dứt hoạt động cùng hồ sơ chấm dứt hoạt động."},{"k":"p","t":"7. Tổ chức thuê bất động sản của cá nhân mà trong hợp đồng thuê bất động sản có thỏa thuận bên đi thuê là người khai thuế thay, nộp thuế thay; tổ chức hợp tác kinh doanh với hộ kinh doanh, cá nhân kinh doanh, tổ chức ký hợp đồng với hộ kinh doanh, cá nhân kinh doanh làm đại lý bán đúng giá đối với xổ số, bảo hiểm, bán hàng đa cấp có trách nhiệm khai thuế thay, nộp thuế thay cho cá nhân khi chi trả thu nhập cho cá nhân. Hồ sơ khai thuế thay, nộp thuế thay thực hiện theo quy định của Bộ trưởng Bộ Tài chính."}]},{"id":"nd68_9","no":9,"code":"Điều 9","title":"Điều 9. Khai thuế, nộp thuế giá trị gia tăng, thuế thu nhập cá nhân đối với hộ kinh doanh, cá nhân kinh doanh mới ra kinh doanh","shortTitle":"Khai thuế, nộp thuế giá trị gia tăng, thuế thu nhập cá nhân đối với hộ kinh doanh, cá nhân kinh doanh mới ra kinh doanh","chuong":"Chương III — KHAI THUẾ, TÍNH THUẾ, NỘP THUẾ, KHẤU TRỪ THUẾ, SỬ DỤNG HÓA ĐƠN ĐIỆN TỬ, XỬ LÝ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh bắt đầu hoạt động sản xuất, kinh doanh trong 06 tháng đầu năm nếu có doanh thu thực tế từ 500 triệu đồng trở xuống thì thực hiện thông báo doanh thu thực tế phát sinh kể từ khi bắt đầu hoạt động sản xuất, kinh doanh đến hết ngày 30 tháng 6 với cơ quan thuế quản lý trực tiếp chậm nhất là ngày 31 tháng 7 và thông báo doanh thu thực tế phát sinh trong 06 tháng cuối năm chậm nhất là ngày 31 tháng 01 của năm dương lịch tiếp theo."},{"k":"p","t":"Trường hợp hộ kinh doanh, cá nhân kinh doanh bắt đầu hoạt động sản xuất, kinh doanh trong 06 tháng cuối năm nếu có doanh thu thực tế từ 500 triệu đồng trở xuống thì thực hiện thông báo doanh thu thực tế phát sinh chậm nhất là ngày 31 tháng 01 của năm dương lịch tiếp theo."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh mới bắt đầu hoạt động sản xuất, kinh doanh, khi có doanh thu lũy kế trên 500 triệu đồng thì thực hiện khai thuế theo quý theo quy định tại Điều 10 Nghị định này kể từ quý phát sinh doanh thu trên 500 triệu đồng."},{"k":"p","t":"3. Từ năm tiếp theo, hộ kinh doanh, cá nhân kinh doanh nếu có doanh thu thực tế phát sinh từ 500 triệu đồng trở xuống thực hiện thông báo doanh thu theo quy định tại Điều 8 Nghị định này; trường hợp có doanh thu thực tế phát sinh trên 500 triệu đồng thì thực hiện khai thuế theo quy định tại Điều 10 Nghị định này."}]},{"id":"nd68_10","no":10,"code":"Điều 10","title":"Điều 10. Khai thuế, nộp thuế giá trị gia tăng, thuế thu nhập cá nhân đối với hộ kinh doanh, cá nhân kinh doanh có doanh thu năm trên 500 triệu đồng","shortTitle":"Khai thuế, nộp thuế giá trị gia tăng, thuế thu nhập cá nhân đối với hộ kinh doanh, cá nhân kinh doanh có doanh thu năm trên 500 triệu đồng","chuong":"Chương III — KHAI THUẾ, TÍNH THUẾ, NỘP THUẾ, KHẤU TRỪ THUẾ, SỬ DỤNG HÓA ĐƠN ĐIỆN TỬ, XỬ LÝ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA","muc":"","level":1,"content":[{"k":"p","t":"1. Khai thuế, nộp thuế giá trị gia tăng"},{"k":"p","t":"a) Trường hợp có doanh thu năm từ 50 tỷ đồng trở xuống thực hiện khai thuế, nộp thuế giá trị gia tăng theo quý;"},{"k":"p","t":"b) Trường hợp có doanh thu năm trên 50 tỷ đồng thực hiện khai thuế, nộp thuế giá trị gia tăng theo tháng."},{"k":"p","t":"2. Khai thuế, nộp thuế thu nhập cá nhân"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh lựa chọn nộp thuế thu nhập cá nhân theo phương pháp thuế suất nhân (x) doanh thu tính thuế thực hiện khai, nộp thuế thu nhập cá nhân theo quý cùng thời hạn khai, nộp thuế giá trị gia tăng;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng nộp thuế thu nhập cá nhân theo phương pháp thu nhập tính thuế nhân (x) thuế suất thực hiện khai tạm nộp thuế thu nhập cá nhân theo tháng, quý trên cùng hồ sơ khai thuế giá trị gia tăng. Số thuế thu nhập cá nhân tạm nộp bằng thuế suất nhân (x) doanh thu tính thuế của tháng, quý và khai quyết toán thuế thu nhập cá nhân theo năm. Trường hợp số thuế thu nhập cá nhân đã tạm nộp ít hơn số thuế đã khai tạm nộp, số thuế tạm nộp ít hơn số thuế phải nộp khi quyết toán thì hộ kinh doanh, cá nhân kinh doanh thực hiện nộp bổ sung và không phải tính tiền chậm nộp. Trường hợp số thuế thu nhập cá nhân tạm nộp nhiều hơn số thuế phải nộp khi quyết toán thì thực hiện thủ tục xử lý tiền thuế nộp thừa theo quy định tại Điều 12 Nghị định này."}]},{"id":"nd68_11","no":11,"code":"Điều 11","title":"Điều 11. Khai thuế, khấu trừ thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ kinh doanh, cá nhân kinh doanh","shortTitle":"Khai thuế, khấu trừ thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ kinh doanh, cá nhân kinh doanh","chuong":"Chương III — KHAI THUẾ, TÍNH THUẾ, NỘP THUẾ, KHẤU TRỪ THUẾ, SỬ DỤNG HÓA ĐƠN ĐIỆN TỬ, XỬ LÝ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA","muc":"","level":1,"content":[{"k":"p","t":"1. Chủ quản nền tảng thương mại điện tử, nền tảng số khác trong nước hoặc nước ngoài có chức năng đặt hàng trực tuyến và chức năng thanh toán có trách nhiệm thực hiện khấu trừ, khai thay và nộp thay số thuế đã khấu trừ đối với mỗi giao dịch cung cấp hàng hóa, dịch vụ của hộ kinh doanh, cá nhân kinh doanh theo quy định tại Nghị định số 117/2025/NĐ-CP ngày 09 tháng 6 năm 2025 của Chính phủ quy định quản lý thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ, cá nhân."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác không có chức năng đặt hàng trực tuyến và chức năng thanh toán có trách nhiệm tự kê khai, nộp thuế theo quy định tại Điều 8, Điều 9, Điều 10 Nghị định này."},{"k":"p","t":"3. Trường hợp hộ kinh doanh, cá nhân kinh doanh chỉ có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số hoặc vừa có hoạt động kinh doanh tại địa điểm kinh doanh cố định vừa có kinh doanh trên nền tảng thương mại điện tử, nền tảng số nếu có doanh thu năm tổng hợp trên 03 tỷ đồng hoặc có doanh thu năm trên 500 triệu đồng và lựa chọn khai thuế thu nhập cá nhân theo phương pháp thu nhập tính thuế nhân (x) thuế suất thì hộ kinh doanh, cá nhân kinh doanh thực hiện tổng hợp doanh thu để khai quyết toán thuế thu nhập cá nhân theo năm. Số thuế thu nhập cá nhân đã được chủ quản nền tảng thương mại điện tử, nền tảng số khấu trừ, nộp thay được trừ khi xác định số thuế thu nhập cá nhân phải nộp."},{"k":"p","t":"4. Cá nhân không cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác không có chức năng đặt hàng trực tuyến và chức năng thanh toán có trách nhiệm tự kê khai, nộp thuế theo quy định tại Nghị định số 117/2025/NĐ-CP ngày 09 tháng 6 năm 2025 của Chính phủ quy định quản lý thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ, cá nhân và không phải thông báo doanh thu thực tế phát sinh trong năm với cơ quan thuế, không phải thực hiện quyết toán thuế thu nhập cá nhân theo quy định tại Điều 8, Điều 10 Nghị định này."},{"k":"p","t":"5. Hồ sơ khai thuế đối với hộ kinh doanh, cá nhân kinh doanh tại khoản 2, khoản 3 Điều này thực hiện theo quy định của Bộ trưởng Bộ Tài chính."}]},{"id":"nd68_12","no":12,"code":"Điều 12","title":"Điều 12. Xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa","shortTitle":"Xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa","chuong":"Chương III — KHAI THUẾ, TÍNH THUẾ, NỘP THUẾ, KHẤU TRỪ THUẾ, SỬ DỤNG HÓA ĐƠN ĐIỆN TỬ, XỬ LÝ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT NỘP THỪA","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp hộ kinh doanh, cá nhân kinh doanh đã được tổ chức quy định tại khoản 1 Điều 11 Nghị định này hoặc tổ chức, cá nhân khác thực hiện khấu trừ và nộp thuế thay số thuế giá trị gia tăng và thuế thu nhập cá nhân đối với các giao dịch phát sinh trong năm nhưng có doanh thu thực tế phát sinh của năm từ 500 triệu đồng trở xuống thì thực hiện thủ tục bù trừ, hoàn trả, hoàn trả kiêm bù trừ thu ngân sách theo quy định của pháp luật quản lý thuế đối với số thuế nộp thừa."},{"k":"p","t":"2. Trường hợp hộ kinh doanh, cá nhân kinh doanh đã nộp thuế giá trị gia tăng, thuế thu nhập cá nhân đối với hoạt động kinh doanh nhưng có doanh thu thực tế phát sinh của năm từ 500 triệu đồng trở xuống thì thực hiện xử lý bù trừ, hoàn trả, hoàn trả kiêm bù trừ thu ngân sách theo quy định của pháp luật quản lý thuế đối với số thuế nộp thừa."},{"k":"p","t":"3. Trường hợp hộ kinh doanh, cá nhân kinh doanh có số tiền thuế, tiền chậm nộp, tiền phạt đã nộp hoặc được các tổ chức, cá nhân đã khấu trừ, nộp thay lớn hơn số tiền thuế, tiền chậm nộp, tiền phạt phải nộp thì thực hiện xử lý bù trừ, hoàn trả, hoàn trả kiêm bù trừ thu ngân sách theo quy định của pháp luật quản lý thuế đối với số thuế nộp thừa."},{"k":"p","t":"4. Hồ sơ đề nghị xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa, thẩm quyền, trách nhiệm tiếp nhận, giải quyết trình tự, thủ tục thực hiện theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"5. Nơi nộp hồ sơ hoàn thuế là cơ quan thuế nơi nộp hồ sơ khai thuế. Trường hợp hộ kinh doanh, cá nhân kinh doanh chỉ có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số đã được chủ quản nền tảng thương mại điện tử, nền tảng số thực hiện khấu trừ, nộp thuế thay hoặc chỉ có hoạt động kinh doanh khác đã được tổ chức khác khấu trừ, khai thay, nộp thuế thay thì cơ quan tiếp nhận và giải quyết hồ sơ hoàn thuế là cơ quan thuế quản lý nơi chủ hộ kinh doanh, cá nhân kinh doanh cư trú."}]},{"id":"nd68_13","no":13,"code":"Điều 13","title":"Điều 13. Quyền và trách nhiệm của hộ kinh doanh, cá nhân kinh doanh","shortTitle":"Quyền và trách nhiệm của hộ kinh doanh, cá nhân kinh doanh","chuong":"Chương IV — TRÁCH NHIỆM VÀ TỔ CHỨC THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh có quyền yêu cầu cơ quan thuế hướng dẫn, giải đáp thắc mắc, hỗ trợ về khai thuế, tính thuế và nộp thuế."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh có các quyền của người nộp thuế theo quy định pháp luật về quản lý thuế."},{"k":"p","t":"3. Hộ kinh doanh, cá nhân kinh doanh tự kê khai đầy đủ, chính xác doanh thu phát sinh từ hoạt động sản xuất, kinh doanh để xác định số thuế phải nộp theo quy định của pháp luật thuế và tự chịu trách nhiệm trước pháp luật về nội dung đã kê khai."},{"k":"p","t":"4. Hộ kinh doanh, cá nhân kinh doanh thực hiện thông báo cho cơ quan thuế theo phương thức điện tử tất cả các số tài khoản mở tại tổ chức cung ứng dịch vụ thanh toán, số hiệu ví điện tử mở tại tổ chức cung ứng dịch vụ trung gian thanh toán liên quan đến sản xuất, kinh doanh."},{"k":"p","t":"5. Hộ kinh doanh, cá nhân kinh doanh có trách nhiệm sử dụng sổ kế toán theo quy định của pháp luật kế toán và hướng dẫn của Bộ trưởng Bộ Tài chính; sử dụng hóa đơn theo quy định."},{"k":"p","t":"6. Hộ kinh doanh, cá nhân kinh doanh có trách nhiệm cung cấp sổ kế toán, hóa đơn, phần mềm quản lý bán hàng, tài liệu liên quan theo yêu cầu của cơ quan thuế khi kiểm tra thuế."},{"k":"p","t":"7. Hộ kinh doanh, cá nhân kinh doanh cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử có trách nhiệm kê khai và nộp thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường, thuế tài nguyên, phí bảo vệ môi trường và các khoản thu khác phải nộp ngân sách nhà nước do cơ quan thuế quản lý thu theo quy định của pháp luật về thuế, pháp luật về quản lý thuế và pháp luật khác có liên quan."},{"k":"p","t":"8. Hộ kinh doanh, cá nhân kinh doanh có hoạt động kinh doanh trên nền tảng thương mại điện tử có trách nhiệm cung cấp đầy đủ, chính xác cho chủ quản nền tảng thương mại điện tử thông tin mã số thuế hoặc số định danh cá nhân đối với công dân Việt Nam; số hộ chiếu hoặc thông tin định danh do cơ quan có thẩm quyền nước ngoài cấp đối với công dân nước ngoài và thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế phải nộp, các thông tin bắt buộc đối với người bán theo quy định của pháp luật về thương mại điện tử."}]},{"id":"nd68_14","no":14,"code":"Điều 14","title":"Điều 14. Trách nhiệm của tổ chức, cá nhân khai thay, nộp thay, khấu trừ thuế","shortTitle":"Trách nhiệm của tổ chức, cá nhân khai thay, nộp thay, khấu trừ thuế","chuong":"Chương IV — TRÁCH NHIỆM VÀ TỔ CHỨC THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Kê khai đầy đủ, chính xác, đúng thời hạn doanh thu và số thuế phải nộp; nộp thuế vào ngân sách nhà nước theo quy định."},{"k":"p","t":"2. Chịu trách nhiệm trước pháp luật về hành vi chậm kê khai, chậm nộp, kê khai sai, khấu trừ hoặc nộp thuế không đúng quy định theo quy định của Luật Quản lý thuế."},{"k":"p","t":"3. Trường hợp tổ chức, cá nhân khai thuế thay, nộp thuế thay cho cá nhân không thực hiện hoặc thực hiện không đúng quy định của pháp luật thuế và pháp luật khác có liên quan thì bị xử lý theo quy định của Luật Quản lý thuế."}]},{"id":"nd68_15","no":15,"code":"Điều 15","title":"Điều 15. Trách nhiệm của Ủy ban nhân dân các cấp","shortTitle":"Trách nhiệm của Ủy ban nhân dân các cấp","chuong":"Chương IV — TRÁCH NHIỆM VÀ TỔ CHỨC THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của Ủy ban nhân dân cấp tỉnh"},{"k":"p","t":"a) Chỉ đạo các sở, ban, ngành và Ủy ban nhân dân cấp xã thực hiện đầy đủ các quy định của pháp luật về đăng ký kinh doanh, quản lý hộ kinh doanh, cá nhân kinh doanh và cung cấp thông tin cho cơ quan thuế theo quy định;"},{"k":"p","t":"b) Chỉ đạo Sở Tài chính, các cơ quan cấp phép chuyên ngành và các đơn vị liên quan thiết lập, cập nhật và chia sẻ cơ sở dữ liệu hộ kinh doanh, cá nhân kinh doanh với cơ quan thuế; bảo đảm kết nối đồng bộ, chính xác giữa dữ liệu đăng ký kinh doanh và cơ sở dữ liệu thuế;"},{"k":"p","t":"c) Chỉ đạo cơ quan quản lý thị trường, công an, tài chính, thông tin và truyền thông, nội vụ và các cơ quan chuyên môn trực thuộc phối hợp với cơ quan thuế trong kiểm tra, giám sát hoạt động kinh doanh; phòng, chống thất thu thuế; xử lý các hành vi vi phạm pháp luật về thuế và hoạt động kinh doanh;"},{"k":"p","t":"d) Bảo đảm nguồn lực, cơ sở hạ tầng kỹ thuật để triển khai hóa đơn điện tử, chứng từ điện tử đối với hộ kinh doanh, cá nhân kinh doanh trên địa bàn; chỉ đạo cơ quan chuyên môn hỗ trợ, hướng dẫn người nộp thuế sử dụng hóa đơn điện tử;"},{"k":"p","t":"đ) Đôn đốc Ủy ban nhân dân cấp xã thực hiện rà soát, nắm chắc tình hình hoạt động của hộ kinh doanh, cá nhân kinh doanh trên địa bàn; bảo đảm việc cung cấp thông tin đầy đủ, kịp thời, đúng thực tế cho cơ quan thuế."},{"k":"p","t":"2. Trách nhiệm của Ủy ban nhân dân cấp xã"},{"k":"p","t":"a) Phối hợp với cơ quan thuế để rà soát, thu thập và cập nhật danh sách hộ kinh doanh, cá nhân kinh doanh đang hoạt động trên địa bàn; phát hiện và thông báo kịp thời cho cơ quan thuế các trường hợp: bắt đầu kinh doanh, tạm ngừng, chấm dứt hoạt động, thay đổi ngành nghề, địa điểm kinh doanh trên địa bàn, kinh doanh không đăng ký, kinh doanh trái phép, ngoài địa điểm được cấp phép;"},{"k":"p","t":"b) Phối hợp với cơ quan thuế trong việc tổ chức tuyên truyền, phổ biến chính sách pháp luật về thuế đến người dân, hộ kinh doanh và cá nhân kinh doanh. Hỗ trợ công tác tuyên truyền lưu động, niêm yết thông tin, hướng dẫn người nộp thuế thực hiện kê khai, nộp thuế đúng quy định. Phản ánh các khó khăn, vướng mắc của người dân liên quan đến chính sách thuế đến cơ quan thuế để cùng phối hợp giải quyết;"},{"k":"p","t":"c) Chỉ đạo các cơ quan chuyên môn, cơ quan có liên quan trên địa bàn phối hợp và hỗ trợ cơ quan thuế theo thẩm quyền trong việc phát hiện, xác minh và xử lý các hành vi vi phạm pháp luật thuế của hộ kinh doanh, cá nhân kinh doanh khi có yêu cầu của cơ quan thuế; bao gồm việc xác minh thông tin người nộp thuế, địa chỉ kinh doanh, quy mô hoạt động kinh doanh, số lượng hộ kinh doanh, cá nhân kinh doanh, doanh thu, phối hợp lập biên bản vi phạm và cung cấp hồ sơ, tài liệu liên quan trên địa bàn theo quy định của pháp luật quản lý thuế và pháp luật có liên quan;"},{"k":"p","t":"d) Phối hợp với cơ quan thuế, quản lý thị trường, công an và các cơ quan liên quan trong việc kiểm tra, phát hiện, ngăn chặn và xử lý hành vi không đăng ký kinh doanh, kinh doanh không khai thuế, trốn thuế;"},{"k":"p","t":"đ) Kiểm tra, giám sát và xử lý đối với các hộ kinh doanh, cá nhân kinh doanh hoạt động kinh doanh tại các địa điểm kinh doanh trái phép, hoạt động tại địa điểm kinh doanh không đủ điều kiện theo quy định của pháp luật;"},{"k":"p","t":"e) Định kỳ báo cáo Ủy ban nhân dân cấp tỉnh thông qua đầu mối do tỉnh quy định về tình hình hộ kinh doanh, cá nhân kinh doanh trên địa bàn; đề xuất biện pháp tăng cường quản lý, xử lý vướng mắc phát sinh;"},{"k":"p","t":"g) Thực hiện các nhiệm vụ khác theo chỉ đạo của Ủy ban nhân dân cấp tỉnh và theo quy định của pháp luật để hỗ trợ công tác quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh."}]},{"id":"nd68_16","no":16,"code":"Điều 16","title":"Điều 16. Trách nhiệm của cơ quan thuế trong quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh","shortTitle":"Trách nhiệm của cơ quan thuế trong quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh","chuong":"Chương IV — TRÁCH NHIỆM VÀ TỔ CHỨC THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế có trách nhiệm hỗ trợ và tạo điều kiện thuận lợi cho hộ kinh doanh, cá nhân kinh doanh"},{"k":"p","t":"a) Cung cấp đầy đủ, kịp thời thông tin, hướng dẫn chính sách thuế, thủ tục đăng ký, kê khai, nộp thuế bằng các hình thức phù hợp;"},{"k":"p","t":"b) Hướng dẫn sử dụng các ứng dụng, nền tảng kê khai, nộp thuế điện tử;"},{"k":"p","t":"c) Thiết lập các kênh hỗ trợ người nộp thuế như đường dây nóng, bộ phận tư vấn trực tiếp, phản hồi trực tuyến;"},{"k":"p","t":"d) Công khai quy trình, thời hạn giải quyết hồ sơ, biểu mẫu, tỷ lệ tính thuế, thuế suất, mức phạt (nếu có) để người nộp thuế dễ theo dõi và thực hiện;"},{"k":"p","t":"đ) Kịp thời tiếp nhận và xử lý các ý kiến, phản ánh, vướng mắc từ hộ kinh doanh, cá nhân kinh doanh theo đúng thời hạn quy định;"},{"k":"p","t":"e) Trường hợp kiểm tra, làm việc trực tiếp, cơ quan thuế phải thông báo trước, tránh gây ảnh hưởng đến hoạt động bình thường của hộ kinh doanh, cá nhân kinh doanh."},{"k":"p","t":"2. Cơ quan thuế có trách nhiệm thực hiện quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh theo nguyên tắc minh bạch thông tin, thuận tiện, không làm phát sinh thêm thủ tục, giấy tờ ngoài quy định của pháp luật."},{"k":"p","t":"3. Cơ quan thuế có trách nhiệm kiểm tra, giám sát việc thực hiện nhiệm vụ hỗ trợ người nộp thuế trong nội bộ ngành; kịp thời chấn chỉnh, xử lý trường hợp cán bộ gây phiền hà, sách nhiễu hoặc thực hiện không đúng quy định, không được yêu cầu hộ kinh doanh, cá nhân kinh doanh cung cấp lại thông tin, hồ sơ đã có trong hệ thống hoặc đã được cơ quan khác xác nhận."}]},{"id":"nd68_17","no":17,"code":"Điều 17","title":"Điều 17. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương IV — TRÁCH NHIỆM VÀ TỔ CHỨC THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Bộ trưởng, Thủ trưởng cơ quan ngang bộ căn cứ chức năng, nhiệm vụ được giao có trách nhiệm triển khai thực hiện Nghị định này."},{"k":"p","t":"2. Bộ Công Thương có trách nhiệm triển khai các giải pháp để quản lý toàn bộ hoạt động kinh doanh thương mại điện tử và phối hợp với Bộ Tài chính triển khai các giải pháp hỗ trợ chủ quản nền tảng thương mại điện tử, nền tảng số khác thuộc đối tượng khấu trừ, khai thay, nộp thuế thay thực hiện theo quy định tại Nghị định này."},{"k":"p","t":"3. Bộ Tài chính có trách nhiệm hướng dẫn, tổ chức triển khai các giải pháp hỗ trợ chủ quản nền tảng thương mại điện tử, nền tảng số khác thuộc đối tượng khấu trừ, khai thay, nộp thuế thay theo quy định tại Nghị định này."},{"k":"p","t":"4. Cơ quan thuế thực hiện rà soát cơ sở dữ liệu của hộ kinh doanh, cá nhân kinh doanh của năm 2025 để hướng dẫn:"},{"k":"p","t":"a) Hộ kinh doanh, cá nhân kinh doanh đã thực hiện nộp thuế theo phương pháp khoán hoặc phương pháp kê khai trong năm 2025 có mức doanh thu trên 500 triệu đồng thực hiện kê khai, nộp thuế của năm 2026 theo quy định tại Điều 10 Nghị định này;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh đã nộp thuế theo phương pháp khoán hoặc phương pháp kê khai trong năm 2025, có doanh thu từ 500 triệu đồng trở xuống thực hiện thông báo doanh thu của năm 2026 theo quy định tại điểm a khoản 1 Điều 8 Nghị định này."},{"k":"p","t":"5. Đối với hộ kinh doanh, cá nhân kinh doanh nộp thuế theo phương pháp khoán từ năm 2025 trở về trước và đã được xác định mức thuế khoán (bao gồm cả trường hợp hộ kinh doanh, cá nhân kinh doanh có thay đổi về quy mô sản xuất kinh doanh dẫn đến doanh thu khoán thuế thay đổi từ 50% trở lên) theo quy định của Luật Quản lý thuế số 38/2019/QH14 và các văn bản hướng dẫn thi hành, khi chuyển sang thực hiện kê khai thuế kể từ ngày 01 tháng 01 năm 2026, cơ quan thuế không sử dụng doanh thu khai thuế năm 2026 để xác định lại nghĩa vụ thuế các năm trước, không xử phạt vi phạm hành chính đối với các nghĩa vụ thuế đã thực hiện theo phương pháp khoán, trừ trường hợp cơ quan thuế, cơ quan nhà nước có thẩm quyền phát hiện hộ kinh doanh, cá nhân kinh doanh có hành vi che giấu doanh thu dẫn đến thiếu số thuế phải nộp."}]},{"id":"nd68_18","no":18,"code":"Điều 18","title":"Điều 18. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp khai thuế theo tháng thì hồ sơ khai thuế tháng 1, tháng 2, tháng 3 năm 2026 gửi cho cơ quan thuế quản lý trực tiếp chậm nhất là ngày 20 tháng 4 năm 2026; các quy định về khai bổ sung hồ sơ khai thuế, gia hạn nộp hồ sơ khai thuế, gia hạn nộp thuế, trường hợp tổ chức, cá nhân khai thuế thay, nộp thuế thay cho cá nhân và các nội dung quản lý thuế khác tiếp tục thực hiện theo quy định tại Luật Quản lý thuế số 38/2019/QH14, Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế và các văn bản hướng dẫn thực hiện cho đến khi có văn bản thay thế."},{"k":"p","t":"2. Tờ khai khấu trừ thuế đối với hộ, cá nhân có hoạt động kinh doanh trên nền tảng thương mại điện tử, Bảng kê chi tiết số thuế đã khấu trừ của hộ, cá nhân có hoạt động kinh doanh trên nền tảng thương mại điện tử, Bảng kê chi tiết số tiền nộp thuế của chủ quản nền tảng thương mại điện tử, chứng từ khấu trừ thuế đối với hộ, cá nhân có hoạt động kinh doanh trên nền tảng thương mại điện tử tiếp tục thực hiện theo quy định tại Nghị định số 117/2025/NĐ-CP ngày 09 tháng 6 năm 2025 của Chính phủ quy định quản lý thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ, cá nhân."},{"k":"p","t":"3. Đối với các hợp đồng cho thuê bất động sản phát sinh trước thời điểm ngày 01 tháng 01 năm 2026 và thời hạn còn lại của hợp đồng trên 06 tháng nếu đã nộp thuế giá trị gia tăng, thu nhập cá nhân thì được điều chỉnh mức doanh thu không chịu thuế giá trị gia tăng theo quy định tại khoản 1 Điều 3, mức doanh thu không phải nộp thuế thu nhập cá nhân quy định tại khoản 1 Điều 4 Nghị định này, trường hợp mức doanh thu còn lại trên 500 triệu đồng thì thực hiện nộp thuế theo quy định tại Nghị định này và được xử lý tiền thuế đã nộp theo quy định tại Điều 12 Nghị định này (nếu có)."},{"k":"p","t":"4. Đối với hộ kinh doanh, cá nhân kinh doanh trong năm 2025 nộp thuế theo phương pháp khoán hoặc phương pháp kê khai, có mức doanh thu từ 03 tỷ đồng trở lên hoặc từ năm 2026 lựa chọn nộp thuế thu nhập cá nhân theo phương pháp thu nhập tính thuế nhân (x) thuế suất thì hộ kinh doanh, cá nhân kinh doanh thực hiện xác định, ghi nhận giá trị hàng tồn kho, máy móc, thiết bị đang phục vụ hoạt động sản xuất, kinh doanh tại thời điểm ngày 31 tháng 12 năm 2025 để làm căn cứ xác định chi phí được trừ khi tính thuế thu nhập cá nhân cho kỳ tính thuế năm 2026. Hộ kinh doanh, cá nhân kinh doanh lập Bảng kê hàng tồn kho, máy móc, thiết bị theo mẫu do Bộ trưởng Bộ Tài chính quy định, lưu giữ tại hộ kinh doanh, cá nhân kinh doanh và gửi 01 bản cho cơ quan thuế quản lý trực tiếp bằng phương thức điện tử cùng hồ sơ khai thuế quý I năm 2026 đối với trường hợp khai thuế theo quý hoặc chậm nhất là ngày 20 tháng 4 năm 2026 đối với trường hợp khai thuế theo tháng. Cơ quan thuế tiếp nhận thông tin để phục vụ công tác quản lý thuế. Việc tiếp nhận bảng kê của cơ quan thuế không có giá trị pháp lý trong việc xác nhận hoặc hợp thức hóa nguồn gốc, xuất xứ hàng hóa. Hộ kinh doanh, cá nhân kinh doanh chịu trách nhiệm trước pháp luật về tính trung thực, chính xác và đầy đủ của thông tin tại Bảng kê, trường hợp phát hiện vi phạm pháp luật thì xử lý theo quy định của pháp luật có liên quan."}]},{"id":"nd68_19","no":19,"code":"Điều 19","title":"Điều 19. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương V — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Nghị định này có hiệu lực thi hành kể từ ngày ký ban hành."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;- Thủ tướng, các Phó Thủ tướng Chính phủ;- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;- Văn phòng Trung ương và các Ban của Đảng;- Văn phòng Tổng Bí thư;- Văn phòng Chủ tịch nước;- Hội đồng Dân tộc và các Ủy ban của Quốc hội;- Văn phòng Quốc hội;- Tòa án nhân dân tối cao;- Viện kiểm sát nhân dân tối cao;- Kiểm toán nhà nước;- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;- Cơ quan trung ương của các tổ chức chính trị - xã hội;- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;- Lưu: VT, KTTH (2b)","TM. CHÍNH PHỦKT. THỦ TƯỚNGPHÓ THỦ TƯỚNGHồ Đức Phớc"]]}]}],"refs":{"nd68_1":[{"kind":"related","targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108/2025 (căn cứ)"},{"kind":"guidance","targetSlug":"tt18","targetAnchor":"tt18_1","label":"TT 18/2026 — Hồ sơ, thủ tục"},{"kind":"related","targetSlug":"tt152","targetAnchor":"tt152_1","label":"TT 152 — Kế toán hộ kinh doanh"}]},"details":{"nd68_1":[{"match":"Nghị định này quy định về chính sách thuế: thuế giá trị gia tăng, thuế thu nhập cá nhân","title":"NĐ 68 Điều 1 — Phạm vi (chính sách & quản lý thuế hộ KD)","summary":"NĐ 68 quy định chính sách thuế GTGT, TNCN và quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh. Hồ sơ thủ tục hướng dẫn tại TT 18.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108/2025"},{"targetSlug":"tt18","targetAnchor":"tt18_1","label":"TT 18/2026 — Hồ sơ, thủ tục"}]}],"nd68_2":[{"match":"Người nộp thuế là hộ kinh doanh, cá nhân kinh doanh","title":"NĐ 68 Điều 2 — Đối tượng (hộ, cá nhân kinh doanh)","summary":"Đối tượng áp dụng là hộ kinh doanh, cá nhân kinh doanh. Chế độ kế toán của nhóm này theo TT 152; khi thành lập DN siêu nhỏ chuyển sang TT 58.","links":[{"targetSlug":"tt152","targetAnchor":"tt152_1","label":"TT 152 — Kế toán hộ kinh doanh"},{"targetSlug":"luat-109","targetAnchor":"luat-109_7","label":"Luật 109 — TNCN từ kinh doanh"}]}],"nd68_3":[{"match":"Hộ kinh doanh, cá nhân kinh doanh có hoạt động sản xuất, kinh doanh có mức doanh thu năm từ 500","title":"NĐ 68 Điều 3 — Thuế GTGT của hộ kinh doanh","summary":"Hộ/cá nhân kinh doanh có doanh thu năm từ ngưỡng quy định nộp thuế GTGT theo tỷ lệ % trên doanh thu. Liên hệ ngưỡng doanh thu chịu thuế GTGT của Luật 48.","links":[{"targetSlug":"luat-48","targetAnchor":"luat-48_4","label":"Luật 48 Điều 4 — Người nộp thuế GTGT"},{"targetSlug":"tt152","targetAnchor":"tt152_6","label":"TT 152 — Hộ KD nộp thuế theo % doanh thu"}]}]},"summaries":{"nd68_1":{"tldr":"Nghị định quy định chính sách thuế GTGT, thuế TNCN và các loại thuế khác; khai, tính, nộp, quyết toán thuế, xử lý tiền thuế/tiền chậm nộp/tiền phạt nộp thừa đối với hộ kinh doanh, cá nhân kinh doanh; trách nhiệm khấu trừ, khai thay, nộp thay và sử dụng hóa đơn điện tử.","points":["Quy định trách nhiệm, cách thức chủ quản nền tảng thương mại điện tử, nền tảng số khác khấu trừ, kê khai thay, nộp thay số thuế đã khấu trừ của hộ kinh doanh, cá nhân kinh doanh.","Quy định trách nhiệm khai thay, nộp thuế thay của tổ chức khi hợp tác kinh doanh với hộ/cá nhân kinh doanh, hoặc ký hợp đồng làm đại lý bán đúng giá đối với xổ số, bảo hiểm, bán hàng đa cấp.","Bao gồm việc sử dụng hóa đơn điện tử và trách nhiệm của tổ chức, cá nhân có liên quan."]},"nd68_3":{"tldr":"Hộ kinh doanh, cá nhân kinh doanh có doanh thu năm từ 500 triệu đồng trở xuống thuộc đối tượng không chịu thuế GTGT; trên 500 triệu đồng thì chịu thuế GTGT theo phương pháp tính trực tiếp trên doanh thu.","points":["Doanh thu năm từ 500 triệu đồng trở xuống: không chịu thuế GTGT.","Doanh thu năm trên 500 triệu đồng: chịu thuế GTGT, áp dụng phương pháp tính trực tiếp theo doanh thu bằng tỷ lệ % nhân (x) doanh thu.","Tỷ lệ % và doanh thu tính thuế thực hiện theo Luật Thuế GTGT số 48/2024/QH15 và các văn bản hướng dẫn thi hành."]},"nd68_4":{"tldr":"Cá nhân cư trú kinh doanh có doanh thu năm từ 500 triệu đồng trở xuống không phải nộp thuế TNCN; trên mức này nộp thuế theo Điều 7 Luật Thuế TNCN số 109/2025/QH15. Quy định mức trừ 500 triệu đồng/năm và hai phương pháp tính thuế theo ngưỡng doanh thu.","points":["Doanh thu năm từ 500 triệu đồng trở xuống: không phải nộp thuế TNCN; trên mức đó nộp theo Điều 7 Luật Thuế TNCN số 109/2025/QH15.","Cá nhân nhiều ngành nghề mức thuế suất khác nhau hoặc nhiều địa điểm: được trừ 500 triệu đồng theo phương án có lợi nhất, tổng mức trừ không vượt quá 500 triệu đồng/năm cho toàn bộ hoạt động; nếu chưa trừ đủ thì trừ tiếp sang ngành nghề/địa điểm khác cho đến đủ 500 triệu đồng.","Cá nhân cho thuê nhiều bất động sản: được trừ 500 triệu đồng cho hợp đồng tự chọn, tổng không quá 500 triệu đồng/năm cho tất cả hợp đồng; nếu chưa đủ thì chọn tiếp hợp đồng khác đến khi đủ.","Trường hợp bên đi thuê khai thay, nộp thay: phải quy định rõ trong hợp đồng nội dung khai thay, nộp thay và số tiền được trừ khi tính thuế.","Phương pháp thuế suất nhân (x) doanh thu tính thuế áp dụng cho doanh thu năm trên 500 triệu đến 03 tỷ đồng (thuế suất theo khoản 3 Điều 7 Luật 109/2025/QH15); phương pháp thu nhập tính thuế nhân (x) thuế suất áp dụng cho doanh thu trên 03 tỷ đồng và trường hợp trên 500 triệu đến 03 tỷ đồng lựa chọn (thuế suất theo khoản 2 Điều 7).","Trường hợp áp dụng phương pháp thu nhập tính thuế nhân (x) thuế suất phải ổn định trong 02 năm liên tục kể từ năm đầu áp dụng; nếu doanh thu thực tế năm trên 03 tỷ đồng thì từ năm tiếp theo phải chuyển sang phương pháp này."]},"nd68_5":{"tldr":"Quy định doanh thu để xác định thuế TNCN là toàn bộ tiền bán hàng, gia công, cung ứng dịch vụ kể cả trợ giá, phụ thu, phụ trội, không phân biệt đã thu hay chưa thu tiền; kèm cách xác định doanh thu cho một số trường hợp đặc thù và thời điểm xác định doanh thu.","points":["Doanh thu bao gồm cả thưởng, hỗ trợ đạt doanh số, khuyến mại, chiết khấu thanh toán, hỗ trợ bằng tiền hoặc không bằng tiền, bồi thường vi phạm hợp đồng; không bao gồm chiết khấu thương mại, giảm giá hàng bán và giá trị hàng bán bị trả lại.","Gia công: tiền thu về hoạt động gia công gồm cả tiền công, chi phí nhiên liệu, động lực, vật liệu phụ và chi phí khác; bán trả góp/trả chậm: tiền bán trả một lần, không gồm tiền lãi trả góp/trả chậm.","Giao hàng cho đại lý: tổng số tiền bán hàng; nhận làm đại lý bán đúng giá: tiền hoa hồng theo hợp đồng đại lý.","Cho thuê tài sản và dịch vụ khác trả tiền trước nhiều năm: doanh thu phân bổ cho số năm trả tiền trước hoặc xác định theo doanh thu trả tiền một lần.","Vận tải: toàn bộ doanh thu vận chuyển hành khách, hàng hóa, hành lý phát sinh trong kỳ; xây dựng, lắp đặt: giá trị nghiệm thu (có/không bao thầu nguyên vật liệu, máy móc, thiết bị tương ứng).","Thời điểm xác định doanh thu: bán hàng hóa là khi chuyển giao quyền sở hữu/sử dụng cho người mua; cung ứng dịch vụ là khi hoàn thành (hoặc hoàn thành từng phần) việc cung ứng, trừ các trường hợp tại khoản 2."]},"nd68_6":{"tldr":"Quy định các khoản chi được trừ (chi phí thực tế phát sinh, có đủ hóa đơn, chứng từ, có chứng từ thanh toán không dùng tiền mặt đối với khoản từng lần từ 05 triệu đồng trở lên) và các khoản chi không được trừ khi xác định thuế TNCN.","points":["Khoản thanh toán từng lần có giá trị từ 05 triệu đồng trở lên phải có chứng từ thanh toán không dùng tiền mặt theo pháp luật thuế GTGT.","Được trừ: chi phí nguyên/vật liệu, nhiên liệu, năng lượng, hàng hóa; tiền lương, tiền công, thưởng, phụ cấp, bảo hiểm bắt buộc và chi trả cho người lao động (kể cả lao động dưới 01 tháng); khấu hao TSCĐ phục vụ kinh doanh; dịch vụ mua ngoài có hóa đơn; lãi vay; chi khác phục vụ trực tiếp kinh doanh.","Chi phí lãi vay của tổ chức tín dụng theo lãi suất thực tế; lãi vay của đối tượng không phải tổ chức tín dụng không vượt quá mức quy định tại Bộ luật Dân sự.","TSCĐ đã khấu hao hết giá trị nhưng vẫn sử dụng cho kinh doanh thì không được trích khấu hao.","Không được trừ: chi không liên quan kinh doanh; chi không đủ hóa đơn, chứng từ; tiền lương/tiền công của cá nhân kinh doanh, nhóm cá nhân, thành viên hộ kinh doanh (trừ đóng bảo hiểm bắt buộc); khấu hao vượt mức hoặc TSCĐ không dùng cho kinh doanh; chi phạt vi phạm hành chính, vi phạm hợp đồng, bồi thường do lỗi của cá nhân.","Không được trừ đất ở và công trình sinh hoạt trên đất, ô tô và tài sản đăng ký mang tên cá nhân, trừ ô tô/tài sản đăng ký với mục đích kinh doanh vận tải, du lịch; chi phục vụ nhu cầu cá nhân, gia đình phải theo dõi riêng."]},"nd68_7":{"tldr":"Trường hợp hộ kinh doanh, cá nhân kinh doanh có hàng hóa, dịch vụ thuộc đối tượng chịu thuế tiêu thụ đặc biệt, thuế tài nguyên, thuế bảo vệ môi trường thì xác định nghĩa vụ thuế theo pháp luật về từng loại thuế tương ứng.","points":[]},"nd68_8":{"tldr":"Quy định nguyên tắc khai, tính thuế GTGT, thuế TNCN và các loại thuế khác; thời hạn, địa điểm khai và nộp thuế; sử dụng hóa đơn điện tử theo ngưỡng doanh thu; tạm ngừng/chấm dứt hoạt động và khai thay, nộp thay.","points":["Doanh thu năm từ 500 triệu đồng trở xuống: thông báo doanh thu thực tế chậm nhất ngày 31/01 năm dương lịch tiếp theo; nếu phát sinh trên 500 triệu đồng trong năm thì khai, nộp thuế kể từ quý phát sinh doanh thu trên 500 triệu đồng.","Thời hạn nộp hồ sơ khai thuế: khai quý chậm nhất ngày cuối cùng tháng đầu quý tiếp theo; khai tháng chậm nhất ngày 20 tháng tiếp theo; quyết toán TNCN năm chậm nhất ngày 31/3 năm sau; cho thuê bất động sản có thể khai 2 lần (hạn 31/7 và 31/01 năm sau) hoặc 1 lần/năm (hạn 31/01 năm sau).","Thời hạn nộp thuế chậm nhất là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế; khai bổ sung thì theo hạn nộp hồ sơ của kỳ có sai sót.","Nộp hồ sơ khai thuế bằng phương thức điện tử; đối tượng hoàn cảnh đặc biệt (người cao tuổi, khuyết tật, bảo trợ xã hội, vùng đặc biệt khó khăn, bất khả kháng) được nộp trực tiếp hoặc qua bưu chính đến Trung tâm Phục vụ hành chính công cấp xã.","Thông báo địa điểm kinh doanh ngoài trụ sở chính, hoặc thay đổi/tạm ngừng/chấm dứt địa điểm: trong thời hạn 10 ngày làm việc kể từ ngày phát sinh.","Hóa đơn điện tử: doanh thu tính thuế GTGT năm từ 01 tỷ đồng trở lên bắt buộc dùng hóa đơn điện tử có mã của cơ quan thuế hoặc khởi tạo từ máy tính tiền kết nối dữ liệu; trường hợp năm trước dưới 01 tỷ nhưng trong năm đạt lũy kế từ 01 tỷ đồng trở lên phải đăng ký trong 30 ngày kể từ ngày cuối kỳ tính thuế đạt ngưỡng."]},"nd68_9":{"tldr":"Quy định khai, nộp thuế GTGT, TNCN đối với hộ kinh doanh, cá nhân kinh doanh mới ra kinh doanh theo thời điểm bắt đầu hoạt động và theo mốc doanh thu lũy kế 500 triệu đồng.","points":["Bắt đầu kinh doanh trong 06 tháng đầu năm, doanh thu từ 500 triệu đồng trở xuống: thông báo doanh thu từ khi bắt đầu đến hết ngày 30/6 chậm nhất ngày 31/7, và thông báo doanh thu 06 tháng cuối năm chậm nhất ngày 31/01 năm sau.","Bắt đầu kinh doanh trong 06 tháng cuối năm, doanh thu từ 500 triệu đồng trở xuống: thông báo doanh thu thực tế chậm nhất ngày 31/01 năm dương lịch tiếp theo.","Khi doanh thu lũy kế trên 500 triệu đồng: khai thuế theo quý theo Điều 10 kể từ quý phát sinh doanh thu trên 500 triệu đồng.","Từ năm tiếp theo: doanh thu từ 500 triệu đồng trở xuống thông báo theo Điều 8; trên 500 triệu đồng khai thuế theo Điều 10."]},"nd68_10":{"tldr":"Quy định khai, nộp thuế GTGT và TNCN đối với hộ kinh doanh, cá nhân kinh doanh có doanh thu năm trên 500 triệu đồng, theo kỳ tháng/quý tùy mức doanh thu và theo phương pháp tính thuế TNCN.","points":["Thuế GTGT: doanh thu năm từ 50 tỷ đồng trở xuống khai, nộp theo quý; trên 50 tỷ đồng khai, nộp theo tháng.","Phương pháp thuế suất nhân (x) doanh thu tính thuế: khai, nộp thuế TNCN theo quý cùng thời hạn khai, nộp thuế GTGT.","Phương pháp thu nhập tính thuế nhân (x) thuế suất: khai tạm nộp theo tháng, quý trên cùng hồ sơ khai thuế GTGT (số tạm nộp = thuế suất x doanh thu tính thuế của kỳ) và khai quyết toán theo năm.","Khi quyết toán nếu nộp thiếu thì nộp bổ sung và không phải tính tiền chậm nộp; nếu nộp thừa thì xử lý tiền thuế nộp thừa theo Điều 12."]},"nd68_11":{"tldr":"Quy định khai thuế, khấu trừ thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ kinh doanh, cá nhân kinh doanh, phân biệt theo việc nền tảng có hay không có chức năng đặt hàng trực tuyến và thanh toán.","points":["Chủ quản nền tảng (trong nước hoặc nước ngoài) có chức năng đặt hàng trực tuyến và thanh toán: khấu trừ, khai thay, nộp thay số thuế đã khấu trừ cho mỗi giao dịch theo Nghị định số 117/2025/NĐ-CP ngày 09/6/2025.","Hộ, cá nhân cư trú kinh doanh trên nền tảng không có chức năng đặt hàng trực tuyến và thanh toán: tự kê khai, nộp thuế theo Điều 8, Điều 9, Điều 10.","Hộ, cá nhân chỉ kinh doanh trên nền tảng hoặc vừa kinh doanh tại địa điểm cố định vừa trên nền tảng, nếu doanh thu năm tổng hợp trên 03 tỷ đồng hoặc trên 500 triệu đồng và chọn phương pháp thu nhập tính thuế nhân (x) thuế suất: tổng hợp doanh thu quyết toán TNCN theo năm, số thuế đã được nền tảng khấu trừ/nộp thay được trừ khi xác định số thuế phải nộp.","Cá nhân không cư trú kinh doanh trên nền tảng không có chức năng đặt hàng trực tuyến và thanh toán: tự kê khai, nộp thuế theo Nghị định số 117/2025/NĐ-CP, không phải thông báo doanh thu và không phải quyết toán TNCN theo Điều 8, Điều 10."]},"nd68_12":{"tldr":"Quy định xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa của hộ kinh doanh, cá nhân kinh doanh thông qua bù trừ, hoàn trả, hoàn trả kiêm bù trừ thu ngân sách và nơi nộp hồ sơ hoàn thuế.","points":["Trường hợp đã bị khấu trừ/nộp thuế thay hoặc đã nộp thuế GTGT, TNCN nhưng doanh thu thực tế năm từ 500 triệu đồng trở xuống: xử lý bù trừ, hoàn trả, hoàn trả kiêm bù trừ đối với số thuế nộp thừa.","Trường hợp số tiền thuế, tiền chậm nộp, tiền phạt đã nộp hoặc được khấu trừ/nộp thay lớn hơn số phải nộp: xử lý bù trừ, hoàn trả, hoàn trả kiêm bù trừ đối với số nộp thừa.","Hồ sơ, thẩm quyền, trình tự, thủ tục theo quy định của Bộ trưởng Bộ Tài chính.","Nơi nộp hồ sơ hoàn thuế là cơ quan thuế nơi nộp hồ sơ khai thuế; trường hợp chỉ kinh doanh trên nền tảng đã được nền tảng khấu trừ/nộp thay hoặc chỉ có hoạt động đã được tổ chức khác khấu trừ, khai thay, nộp thay thì cơ quan giải quyết là cơ quan thuế quản lý nơi chủ hộ/cá nhân kinh doanh cư trú."]},"nd68_13":{"tldr":"Quy định quyền và trách nhiệm của hộ kinh doanh, cá nhân kinh doanh: được hỗ trợ, hướng dẫn, tự kê khai chính xác và chịu trách nhiệm; thông báo tài khoản, dùng sổ kế toán, hóa đơn và cung cấp tài liệu khi kiểm tra.","points":["Có quyền yêu cầu cơ quan thuế hướng dẫn, giải đáp, hỗ trợ về khai, tính, nộp thuế và các quyền của người nộp thuế theo pháp luật quản lý thuế.","Tự kê khai đầy đủ, chính xác doanh thu để xác định số thuế phải nộp và tự chịu trách nhiệm trước pháp luật về nội dung kê khai.","Thông báo cho cơ quan thuế bằng phương thức điện tử tất cả số tài khoản tại tổ chức cung ứng dịch vụ thanh toán và số hiệu ví điện tử liên quan đến kinh doanh.","Sử dụng sổ kế toán, hóa đơn theo quy định; cung cấp sổ kế toán, hóa đơn, phần mềm quản lý bán hàng, tài liệu liên quan khi cơ quan thuế kiểm tra.","Hộ, cá nhân cư trú kinh doanh trên nền tảng thương mại điện tử kê khai, nộp thuế tiêu thụ đặc biệt, bảo vệ môi trường, tài nguyên, phí bảo vệ môi trường và các khoản thu khác theo quy định.","Cung cấp đầy đủ, chính xác cho chủ quản nền tảng mã số thuế/số định danh (công dân Việt Nam) hoặc số hộ chiếu/thông tin định danh nước ngoài và thông tin, tài liệu xác định nghĩa vụ thuế."]},"nd68_14":{"tldr":"Quy định trách nhiệm của tổ chức, cá nhân khai thay, nộp thay, khấu trừ thuế: kê khai đầy đủ, chính xác, đúng hạn, nộp thuế và chịu trách nhiệm trước pháp luật.","points":["Kê khai đầy đủ, chính xác, đúng thời hạn doanh thu và số thuế phải nộp; nộp thuế vào ngân sách nhà nước theo quy định.","Chịu trách nhiệm trước pháp luật về hành vi chậm kê khai, chậm nộp, kê khai sai, khấu trừ hoặc nộp thuế không đúng theo Luật Quản lý thuế.","Trường hợp khai thay, nộp thay không thực hiện hoặc thực hiện không đúng quy định thì bị xử lý theo Luật Quản lý thuế."]},"nd68_15":{"tldr":"Quy định trách nhiệm của Ủy ban nhân dân cấp tỉnh và cấp xã trong quản lý hộ kinh doanh, cá nhân kinh doanh: chỉ đạo, chia sẻ dữ liệu, phối hợp kiểm tra, chống thất thu thuế, hỗ trợ triển khai hóa đơn điện tử và tuyên truyền.","points":["UBND cấp tỉnh: chỉ đạo các sở, ngành, UBND cấp xã thực hiện quy định về đăng ký kinh doanh, quản lý hộ/cá nhân kinh doanh và cung cấp thông tin cho cơ quan thuế.","UBND cấp tỉnh: chỉ đạo thiết lập, cập nhật, chia sẻ cơ sở dữ liệu hộ/cá nhân kinh doanh, bảo đảm kết nối đồng bộ giữa dữ liệu đăng ký kinh doanh và dữ liệu thuế; bảo đảm nguồn lực, hạ tầng triển khai hóa đơn điện tử, chứng từ điện tử.","UBND cấp tỉnh: chỉ đạo quản lý thị trường, công an, tài chính, thông tin và truyền thông, nội vụ phối hợp kiểm tra, giám sát, phòng chống thất thu thuế, xử lý vi phạm.","UBND cấp xã: phối hợp rà soát, thu thập, cập nhật danh sách hộ/cá nhân kinh doanh; phát hiện, thông báo kịp thời các trường hợp bắt đầu, tạm ngừng, chấm dứt, thay đổi ngành nghề/địa điểm, kinh doanh không đăng ký, trái phép.","UBND cấp xã: phối hợp tuyên truyền, phổ biến chính sách thuế; phối hợp xác minh, lập biên bản vi phạm, cung cấp hồ sơ; kiểm tra, ngăn chặn hành vi không đăng ký kinh doanh, không khai thuế, trốn thuế.","UBND cấp xã: định kỳ báo cáo UBND cấp tỉnh về tình hình hộ/cá nhân kinh doanh và đề xuất biện pháp tăng cường quản lý."]},"nd68_16":{"tldr":"Quy định trách nhiệm của cơ quan thuế trong quản lý thuế đối với hộ kinh doanh, cá nhân kinh doanh: hỗ trợ, tạo thuận lợi, minh bạch, không làm phát sinh thủ tục ngoài quy định và kiểm tra nội bộ chống phiền hà, sách nhiễu.","points":["Cung cấp đầy đủ, kịp thời thông tin, hướng dẫn chính sách thuế, thủ tục đăng ký, kê khai, nộp thuế; hướng dẫn sử dụng ứng dụng, nền tảng kê khai, nộp thuế điện tử.","Thiết lập kênh hỗ trợ (đường dây nóng, tư vấn trực tiếp, phản hồi trực tuyến); công khai quy trình, thời hạn giải quyết, biểu mẫu, tỷ lệ tính thuế, thuế suất, mức phạt.","Kịp thời tiếp nhận, xử lý phản ánh, vướng mắc đúng thời hạn; khi kiểm tra trực tiếp phải thông báo trước, tránh ảnh hưởng hoạt động bình thường.","Quản lý thuế theo nguyên tắc minh bạch, thuận tiện, không làm phát sinh thêm thủ tục, giấy tờ ngoài quy định.","Kiểm tra, giám sát nội bộ; chấn chỉnh, xử lý cán bộ gây phiền hà, sách nhiễu; không được yêu cầu cung cấp lại thông tin, hồ sơ đã có trong hệ thống hoặc đã được cơ quan khác xác nhận."]},"nd68_17":{"tldr":"Quy định trách nhiệm thi hành Nghị định, phân công nhiệm vụ các bộ và xử lý chuyển đổi cho hộ kinh doanh, cá nhân kinh doanh nộp thuế khoán hoặc kê khai trong năm 2025 khi chuyển sang kê khai từ 01/01/2026.","points":["Bộ trưởng, Thủ trưởng cơ quan ngang bộ triển khai theo chức năng, nhiệm vụ; Bộ Công Thương quản lý hoạt động thương mại điện tử và phối hợp Bộ Tài chính hỗ trợ chủ quản nền tảng; Bộ Tài chính hướng dẫn, tổ chức triển khai các giải pháp hỗ trợ.","Cơ quan thuế rà soát dữ liệu năm 2025: hộ/cá nhân đã nộp thuế khoán hoặc kê khai có doanh thu trên 500 triệu đồng thì kê khai, nộp thuế năm 2026 theo Điều 10; doanh thu từ 500 triệu đồng trở xuống thì thông báo doanh thu năm 2026 theo điểm a khoản 1 Điều 8.","Hộ/cá nhân nộp thuế khoán từ năm 2025 trở về trước đã được xác định mức thuế khoán, khi chuyển sang kê khai từ 01/01/2026: cơ quan thuế không dùng doanh thu khai thuế 2026 để xác định lại nghĩa vụ thuế các năm trước, không xử phạt vi phạm hành chính đối với nghĩa vụ đã thực hiện theo khoán, trừ trường hợp phát hiện hành vi che giấu doanh thu dẫn đến thiếu số thuế phải nộp."]},"nd68_18":{"tldr":"Quy định điều khoản chuyển tiếp về thời hạn nộp hồ sơ khai thuế đầu năm 2026, tiếp tục áp dụng một số quy định cũ, xử lý hợp đồng cho thuê bất động sản trước 01/01/2026 và ghi nhận hàng tồn kho, máy móc, thiết bị tại 31/12/2025.","points":["Khai thuế theo tháng: hồ sơ khai thuế tháng 1, 2, 3 năm 2026 gửi cơ quan thuế chậm nhất ngày 20/4/2026; các nội dung khai bổ sung, gia hạn, khai thay, nộp thay tiếp tục thực hiện theo Luật Quản lý thuế số 38/2019/QH14, Nghị định số 126/2020/NĐ-CP và văn bản hướng dẫn cho đến khi có văn bản thay thế.","Tờ khai khấu trừ thuế, các bảng kê và chứng từ khấu trừ thuế đối với hộ, cá nhân kinh doanh trên nền tảng thương mại điện tử tiếp tục thực hiện theo Nghị định số 117/2025/NĐ-CP ngày 09/6/2025.","Hợp đồng cho thuê bất động sản phát sinh trước 01/01/2026, thời hạn còn lại trên 06 tháng đã nộp thuế GTGT, TNCN: được điều chỉnh mức doanh thu không chịu thuế GTGT (khoản 1 Điều 3) và không phải nộp TNCN (khoản 1 Điều 4); nếu doanh thu còn lại trên 500 triệu đồng thì nộp thuế theo Nghị định và xử lý tiền thuế đã nộp theo Điều 12.","Hộ/cá nhân năm 2025 nộp thuế khoán hoặc kê khai có doanh thu từ 03 tỷ đồng trở lên, hoặc từ 2026 chọn phương pháp thu nhập tính thuế nhân (x) thuế suất: xác định, ghi nhận giá trị hàng tồn kho, máy móc, thiết bị tại ngày 31/12/2025 làm căn cứ chi phí được trừ cho kỳ tính thuế năm 2026.","Lập Bảng kê hàng tồn kho, máy móc, thiết bị theo mẫu của Bộ Tài chính, lưu giữ tại cơ sở và gửi 01 bản cho cơ quan thuế bằng phương thức điện tử cùng hồ sơ khai thuế quý I/2026 (khai quý) hoặc chậm nhất ngày 20/4/2026 (khai tháng); việc tiếp nhận bảng kê không có giá trị pháp lý xác nhận nguồn gốc, xuất xứ hàng hóa."]},"nd68_19":{"tldr":"Nghị định này có hiệu lực thi hành kể từ ngày ký ban hành.","points":[]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
</body></html>
