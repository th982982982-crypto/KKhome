<script id="LD" type="application/json">{"meta":{"title":"Luật 03/2022/QH15 — Luật sửa đổi, bổ sung một số điều của Luật Đầu tư công, Luật Đầu tư theo phương thức đối tác công tư, Luật Đầu tư, Luật Nhà ở, Luật Đấu thầu, Luật Điện lực, Luật Doanh nghiệp, Luật Thuế tiêu thụ đặc biệt và Luật Thi hành án dân sự","shortCode":"Luật 03/2022","subtitle":"Sửa đổi 9 luật (gồm Luật Thuế TTĐB)","slug":"luat03","effectiveDate":"01/03/2022","scope":"","description":"Sửa đổi 9 luật (gồm Luật Thuế TTĐB)","related":[]},"outline":[{"id":"luat03_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điều của Luật Đầu tư công","shortTitle":"Sửa đổi, bổ sung một số điều của Luật Đầu tư công","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung một số điểm, khoản của Điều 17 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung điểm b và điểm c khoản 4 như sau:"},{"k":"p","t":"“b) Chương trình, dự án đầu tư nhóm A sử dụng vốn vay ODA và vốn vay ưu đãi của các nhà tài trợ nước ngoài, trừ chương trình mục tiêu quốc gia, chương trình đầu tư công quy định tại khoản 1 và khoản 2 Điều này;"},{"k":"p","t":"c) Chương trình, dự án đầu tư sử dụng vốn ODA viện trợ không hoàn lại trong các trường hợp sau: chương trình, dự án nhóm A; chương trình, dự án kèm theo khung chính sách; chương trình, dự án trong lĩnh vực quốc phòng, an ninh, tôn giáo; chương trình tiếp cận theo ngành; mua sắm các loại hàng hóa thuộc diện phải được Thủ tướng Chính phủ cho phép; sự tham gia của Việt Nam vào các chương trình, dự án khu vực;”;"},{"k":"p","t":"b) Bãi bỏ điểm d khoản 4;"},{"k":"p","t":"c) Bổ sung khoản 5a vào sau khoản 5 như sau:"},{"k":"p","t":"“5a. Người đứng đầu Bộ, cơ quan trung ương quyết định chủ trương đầu tư dự án đầu tư nhóm B, nhóm C sử dụng vốn ODA và vốn vay ưu đãi của các nhà tài trợ nước ngoài, quyết định phê duyệt dự án hỗ trợ kỹ thuật sử dụng vốn ODA, vốn vay ưu đãi của các nhà tài trợ nước ngoài để chuẩn bị dự án đầu tư do cơ quan, tổ chức mình quản lý, trừ dự án quy định tại khoản 4 Điều này."},{"k":"p","t":"Hội đồng nhân dân cấp tỉnh quyết định chủ trương đầu tư dự án đầu tư nhóm B, nhóm C sử dụng vốn ODA và vốn vay ưu đãi của các nhà tài trợ nước ngoài, quyết định phê duyệt dự án hỗ trợ kỹ thuật sử dụng vốn ODA, vốn vay ưu đãi của các nhà tài trợ nước ngoài để chuẩn bị dự án đầu tư do địa phương quản lý, trừ dự án quy định tại khoản 4 Điều này."},{"k":"p","t":"Chính phủ quy định trình tự, thủ tục quyết định chủ trương đầu tư dự án đầu tư, quyết định phê duyệt dự án hỗ trợ kỹ thuật quy định tại khoản này.”."},{"k":"p","t":"2. Sửa đổi, bổ sung khoản 8 Điều 25 như sau:"},{"k":"p","t":"“8. Đối với chương trình, dự án khác thuộc thẩm quyền quyết định chủ trương đầu tư của Thủ tướng Chính phủ quy định tại điểm b và điểm c khoản 4 Điều 17 của Luật này, trình tự, thủ tục quyết định chủ trương đầu tư được quy định như sau:"},{"k":"p","t":"a) Cơ quan chủ quản gửi Bộ Kế hoạch và Đầu tư báo cáo đề xuất chủ trương đầu tư;"},{"k":"p","t":"b) Bộ Kế hoạch và Đầu tư chủ trì thẩm định báo cáo đề xuất chủ trương đầu tư, nguồn vốn và khả năng cân đối vốn trình Thủ tướng Chính phủ;"},{"k":"p","t":"c) Thủ tướng Chính phủ xem xét, quyết định chủ trương đầu tư.”."},{"k":"p","t":"3. Sửa đổi, bổ sung khoản 4 Điều 82 như sau:"},{"k":"p","t":"“4. Quyết định chủ trương đầu tư dự án theo quy định tại khoản 5 và khoản 5a Điều 17 của Luật này, quyết định đầu tư dự án theo quy định tại khoản 2 Điều 35 của Luật này.”."},{"k":"p","t":"4. Sửa đổi, bổ sung khoản 1 Điều 83 như sau:"},{"k":"p","t":"“1. Quyết định chủ trương đầu tư chương trình, dự án theo quy định tại các khoản 5a, 6 và 7 Điều 17 của Luật này.”."}]},{"id":"luat03_2","no":2,"code":"Điều 2","title":"Điều 2. Sửa đổi, bổ sung điểm b khoản 2 Điều 12 của Luật Đầu tư theo phương thức đối tác công tư","shortTitle":"Sửa đổi, bổ sung điểm b khoản 2 Điều 12 của Luật Đầu tư theo phương thức đối tác công tư","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Sửa đổi, bổ sung điểm b khoản 2 Điều 12 như sau:"},{"k":"p","t":"“b) Dự án có tổng mức đầu tư tương đương dự án nhóm A theo quy định của pháp luật về đầu tư công sử dụng một hoặc một số nguồn vốn sau: vốn ngân sách trung ương do Bộ, cơ quan trung ương quản lý; vốn vay ODA; vốn vay ưu đãi của nhà tài trợ nước ngoài;”."}]},{"id":"luat03_3","no":3,"code":"Điều 3","title":"Điều 3. Sửa đổi, bổ sung một số điều của Luật Đầu tư","shortTitle":"Sửa đổi, bổ sung một số điều của Luật Đầu tư","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung điểm g và bổ sung điểm g1 vào sau điểm g khoản 1 Điều 31 như sau:"},{"k":"p","t":"“g) Dự án đầu tư xây dựng nhà ở (để bán, cho thuê, cho thuê mua), khu đô thị có quy mô sử dụng đất từ 300 ha trở lên hoặc quy mô dân số từ 50.000 người trở lên;"},{"k":"p","t":"g1) Dự án đầu tư phù hợp với quy định của pháp luật về di sản văn hóa không phân biệt quy mô diện tích đất, dân số thuộc phạm vi khu vực bảo vệ I của di tích được cấp có thẩm quyền công nhận là di tích quốc gia, di tích quốc gia đặc biệt; thuộc phạm vi khu vực bảo vệ II của di tích được cấp có thẩm quyền công nhận là di tích quốc gia đặc biệt thuộc Danh mục di sản thế giới;”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm b và bổ sung điểm b1 vào sau điểm b khoản 1 Điều 32 như sau:"},{"k":"p","t":"“b) Dự án đầu tư xây dựng nhà ở (để bán, cho thuê, cho thuê mua), khu đô thị có quy mô sử dụng đất dưới 300 ha và quy mô dân số dưới 50.000 người;"},{"k":"p","t":"b1) Dự án đầu tư phù hợp với quy định của pháp luật về di sản văn hóa không phân biệt quy mô diện tích đất, dân số thuộc phạm vi khu vực bảo vệ II của di tích được cấp có thẩm quyền công nhận là di tích quốc gia, di tích quốc gia đặc biệt, trừ di tích quốc gia đặc biệt thuộc Danh mục di sản thế giới; dự án đầu tư không phân biệt quy mô diện tích đất, dân số thuộc khu vực hạn chế phát triển hoặc nội đô lịch sử (được xác định trong đồ án quy hoạch đô thị) của đô thị loại đặc biệt;”."},{"k":"p","t":"3. Bổ sung điểm g vào sau điểm e khoản 3 Điều 33 như sau:"},{"k":"p","t":"“g) Đánh giá về sự phù hợp của dự án đầu tư với yêu cầu bảo vệ, phát huy giá trị của di sản văn hóa và các điều kiện theo quy định của pháp luật về di sản văn hóa.”."},{"k":"p","t":"4. Bãi bỏ điểm c khoản 1 Điều 75."},{"k":"p","t":"5. Bổ sung ngành, nghề số thứ tự 132a vào sau số thứ tự 132 của Phụ lục IV về Danh mục ngành, nghề đầu tư kinh doanh có điều kiện như sau:"},{"k":"tbl","rows":[["STT","NGÀNH, NGHỀ"],["132a","Kinh doanh sản phẩm, dịch vụ an ninh mạng (không bao gồm kinh doanh sản phẩm, dịch vụ an toàn thông tin mạng và kinh doanh sản phẩm, dịch vụ mật mã dân sự)"]]}]},{"id":"luat03_4","no":4,"code":"Điều 4","title":"Điều 4. Sửa đổi, bổ sung khoản 1 Điều 23 của Luật Nhà ở","shortTitle":"Sửa đổi, bổ sung khoản 1 Điều 23 của Luật Nhà ở","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Sửa đổi, bổ sung khoản 1 Điều 23 như sau:"},{"k":"p","t":"“1. Có quyền sử dụng đất hợp pháp thuộc một trong các trường hợp quy định tại điểm a, điểm b khoản này mà việc sử dụng đất để thực hiện dự án đầu tư xây dựng nhà ở thương mại phù hợp với quy hoạch, kế hoạch sử dụng đất đã được cơ quan nhà nước có thẩm quyền phê duyệt theo quy định của pháp luật về đất đai, trừ trường hợp thuộc diện Nhà nước thu hồi đất vì mục đích quốc phòng, an ninh, thu hồi đất để phát triển kinh tế - xã hội vì lợi ích quốc gia, công cộng và các trường hợp thu hồi khác theo quy định của pháp luật:"},{"k":"p","t":"a) Có quyền sử dụng đất ở;"},{"k":"p","t":"b) Có quyền sử dụng đất ở và đất khác không phải là đất ở đáp ứng điều kiện cho phép chuyển mục đích sử dụng đất để thực hiện dự án đầu tư."},{"k":"p","t":"Sau khi đã được cơ quan có thẩm quyền chấp thuận chủ trương đầu tư đồng thời chấp thuận nhà đầu tư theo quy định của pháp luật về đầu tư, nhà đầu tư có trách nhiệm thực hiện việc chuyển mục đích sử dụng đất đối với dự án có yêu cầu chuyển mục đích sử dụng đất và thực hiện các nghĩa vụ tài chính có liên quan theo quy định của pháp luật về đất đai.”."}]},{"id":"luat03_5","no":5,"code":"Điều 5","title":"Điều 5. Sửa đổi, bổ sung một số điều của Luật Đấu thầu","shortTitle":"Sửa đổi, bổ sung một số điều của Luật Đấu thầu","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bổ sung Điều 33a vào sau Điều 33 như sau:"},{"k":"p","t":"“Điều 33a. Các hoạt động thực hiện trước đối với dự án sử dụng vốn hỗ trợ phát triển chính thức, vốn vay ưu đãi"},{"k":"p","t":"1. Việc lập, trình duyệt, thẩm định, phê duyệt kế hoạch lựa chọn nhà thầu, hồ sơ mời thầu, hồ sơ yêu cầu, xác định danh sách ngắn đối với các hoạt động mua sắm của dự án sử dụng vốn hỗ trợ phát triển chính thức, vốn vay ưu đãi được thực hiện trước khi ký kết điều ước quốc tế, thỏa thuận quốc tế về vốn hỗ trợ phát triển chính thức, vốn vay ưu đãi."},{"k":"p","t":"2. Chính phủ quy định chi tiết Điều này.”."},{"k":"p","t":"2. Sửa đổi, bổ sung điểm c khoản 1 Điều 34 như sau:"},{"k":"p","t":"“c) Điều ước quốc tế, thỏa thuận quốc tế đối với các dự án sử dụng vốn hỗ trợ phát triển chính thức, vốn vay ưu đãi, trừ trường hợp quy định tại Điều 33a của Luật này;”."}]},{"id":"luat03_6","no":6,"code":"Điều 6","title":"Điều 6. Sửa đổi, bổ sung một số điều của Luật Điện lực","shortTitle":"Sửa đổi, bổ sung một số điều của Luật Điện lực","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung khoản 2 và bổ sung khoản 2a vào sau khoản 2 Điều 4 như sau:"},{"k":"p","t":"“2. Xây dựng và phát triển thị trường điện lực theo nguyên tắc công khai, bình đẳng, cạnh tranh lành mạnh, có sự điều tiết của Nhà nước để nâng cao hiệu quả trong hoạt động điện lực; bảo đảm quyền và lợi ích hợp pháp của các đơn vị điện lực và khách hàng sử dụng điện; thu hút mọi thành phần kinh tế tham gia hoạt động đầu tư xây dựng lưới điện truyền tải trên cơ sở bảo đảm quốc phòng, an ninh và theo quy hoạch phát triển điện lực, hoạt động phát điện, phân phối điện, bán buôn điện, bán lẻ điện và tư vấn chuyên ngành điện lực."},{"k":"p","t":"Các thành phần kinh tế ngoài nhà nước được vận hành lưới điện truyền tải do mình đầu tư xây dựng."},{"k":"p","t":"2a. Nhà nước độc quyền trong các hoạt động sau đây:"},{"k":"p","t":"a) Điều độ hệ thống điện quốc gia;"},{"k":"p","t":"b) Xây dựng và vận hành các nhà máy điện lớn, có ý nghĩa đặc biệt quan trọng về kinh tế - xã hội, quốc phòng, an ninh;"},{"k":"p","t":"c) Vận hành lưới điện truyền tải, trừ lưới điện truyền tải do các thành phần kinh tế ngoài nhà nước đầu tư xây dựng.”."},{"k":"p","t":"2. Bổ sung một số điểm vào khoản 1 và khoản 2 Điều 40 như sau:"},{"k":"p","t":"a) Bổ sung điểm d1 vào sau điểm d khoản 1 như sau:"},{"k":"p","t":"“d1) Đấu nối vào lưới điện truyền tải do các thành phần kinh tế đầu tư xây dựng khi đáp ứng các điều kiện và tiêu chuẩn kỹ thuật;”;"},{"k":"p","t":"b) Bổ sung điểm h1 vào sau điểm h khoản 2 như sau:"},{"k":"p","t":"“h1) Bảo đảm quyền đấu nối của các tổ chức, cá nhân hoạt động điện lực vào lưới điện truyền tải do mình đầu tư xây dựng; trường hợp từ chối đấu nối thì thực hiện theo quy định của Bộ trưởng Bộ Công Thương;”."}]},{"id":"luat03_7","no":7,"code":"Điều 7","title":"Điều 7. Sửa đổi, bổ sung một số điều của Luật Doanh nghiệp","shortTitle":"Sửa đổi, bổ sung một số điều của Luật Doanh nghiệp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung tên điều và đoạn mở đầu khoản 1 Điều 49 như sau:"},{"k":"p","t":"“Điều 49. Quyền của thành viên công ty"},{"k":"p","t":"1. Thành viên công ty có các quyền sau đây:”."},{"k":"p","t":"2. Sửa đổi, bổ sung tên Điều 50 như sau:"},{"k":"p","t":"“Điều 50. Nghĩa vụ của thành viên công ty”."},{"k":"p","t":"3. Sửa đổi, bổ sung một số điểm, khoản của Điều 60 như sau:"},{"k":"p","t":"a) Sửa đổi, bổ sung điểm e khoản 2 như sau:"},{"k":"p","t":"“e) Họ, tên và nội dung ý kiến của người dự họp không đồng ý thông qua biên bản họp (nếu có);”;"},{"k":"p","t":"b) Sửa đổi, bổ sung khoản 3 như sau:"},{"k":"p","t":"“3. Trường hợp chủ tọa, người ghi biên bản từ chối ký biên bản họp thì biên bản này có hiệu lực nếu được tất cả thành viên khác của Hội đồng thành viên tham dự và đồng ý thông qua biên bản họp ký và có đầy đủ nội dung theo quy định tại các điểm a, b, c, d, đ và e khoản 2 Điều này. Biên bản họp ghi rõ việc chủ tọa, người ghi biên bản từ chối ký biên bản họp. Người ký biên bản họp chịu trách nhiệm liên đới về tính chính xác và trung thực của nội dung biên bản họp Hội đồng thành viên. Chủ tọa, người ghi biên bản chịu trách nhiệm cá nhân về thiệt hại xảy ra đối với doanh nghiệp do từ chối ký biên bản họp theo quy định của Luật này, Điều lệ công ty và pháp luật có liên quan.”."},{"k":"p","t":"4. Sửa đổi, bổ sung điểm d khoản 1 Điều 109 như sau:"},{"k":"p","t":"“d) Báo cáo và tóm tắt báo cáo tài chính giữa năm, bao gồm cả báo cáo tài chính của công ty mẹ và báo cáo tài chính hợp nhất (nếu có); việc công bố phải thực hiện trước ngày 31 tháng 7 hằng năm;”."},{"k":"p","t":"5. Sửa đổi, bổ sung khoản 1 và khoản 2 Điều 148 như sau:"},{"k":"p","t":"“1. Nghị quyết về nội dung sau đây được thông qua nếu được số cổ đông đại diện từ 65% tổng số phiếu biểu quyết trở lên của tất cả cổ đông tham dự và biểu quyết tại cuộc họp tán thành, trừ trường hợp quy định tại các khoản 3, 4 và 6 Điều này; tỷ lệ cụ thể do Điều lệ công ty quy định:"},{"k":"p","t":"a) Loại cổ phần và tổng số cổ phần của từng loại;"},{"k":"p","t":"b) Thay đổi ngành, nghề và lĩnh vực kinh doanh;"},{"k":"p","t":"c) Thay đổi cơ cấu tổ chức quản lý công ty;"},{"k":"p","t":"d) Dự án đầu tư hoặc bán tài sản có giá trị từ 35% tổng giá trị tài sản trở lên được ghi trong báo cáo tài chính gần nhất của công ty, trừ trường hợp Điều lệ công ty quy định tỷ lệ hoặc giá trị khác;"},{"k":"p","t":"đ) Tổ chức lại, giải thể công ty;"},{"k":"p","t":"e) Vấn đề khác do Điều lệ công ty quy định."},{"k":"p","t":"2. Các nghị quyết được thông qua khi được số cổ đông sở hữu trên 50% tổng số phiếu biểu quyết của tất cả cổ đông tham dự và biểu quyết tại cuộc họp tán thành, trừ trường hợp quy định tại các khoản 1, 3, 4 và 6 Điều này; tỷ lệ cụ thể do Điều lệ công ty quy định.”."},{"k":"p","t":"6. Sửa đổi, bổ sung khoản 2 Điều 158 như sau:"},{"k":"p","t":"“2. Trường hợp chủ tọa, người ghi biên bản từ chối ký biên bản họp nhưng nếu được tất cả thành viên khác của Hội đồng quản trị tham dự và đồng ý thông qua biên bản họp ký và có đầy đủ nội dung theo quy định tại các điểm a, b, c, d, đ, e, g và h khoản 1 Điều này thì biên bản này có hiệu lực. Biên bản họp ghi rõ việc chủ tọa, người ghi biên bản từ chối ký biên bản họp. Người ký biên bản họp chịu trách nhiệm liên đới về tính chính xác và trung thực của nội dung biên bản họp Hội đồng quản trị. Chủ tọa, người ghi biên bản chịu trách nhiệm cá nhân về thiệt hại xảy ra đối với doanh nghiệp do từ chối ký biên bản họp theo quy định của Luật này, Điều lệ công ty và pháp luật có liên quan.”."},{"k":"p","t":"7. Sửa đổi, bổ sung khoản 5 Điều 217 như sau:"},{"k":"p","t":"“5. Căn cứ vào quy định của Luật này, Chính phủ quy định chi tiết việc tổ chức quản lý và hoạt động của doanh nghiệp trực tiếp phục vụ quốc phòng, an ninh hoặc kết hợp kinh tế với quốc phòng, an ninh là doanh nghiệp nhà nước và công ty trách nhiệm hữu hạn do doanh nghiệp nhà nước quy định tại khoản 2 Điều 88 của Luật này nắm giữ 100% vốn điều lệ.”."}]},{"id":"luat03_8","no":8,"code":"Điều 8","title":"Điều 8. Sửa đổi, bổ sung điểm g khoản 4 mục I của Biểu thuế tiêu thụ đặc biệt tại Điều 7 của Luật Thuế tiêu thụ đặc biệt","shortTitle":"Sửa đổi, bổ sung điểm g khoản 4 mục I của Biểu thuế tiêu thụ đặc biệt tại Điều 7 của Luật Thuế tiêu thụ đặc biệt","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Sửa đổi, bổ sung điểm g khoản 4 mục I của Biểu thuế tiêu thụ đặc biệt tại Điều 7 như sau:"},{"k":"tbl","rows":[["STT","Hàng hóa, dịch vụ","Thuế suất\n(%)"],["","g) Xe ô tô chạy điện",""],["","(1) Xe ô tô điện chạy bằng pin",""],["","- Loại chở người từ 9 chỗ trở xuống",""],["","+ Từ ngày 01 tháng 3 năm 2022 đến hết ngày 28 tháng 02 năm 2027","3"],["","+ Từ ngày 01 tháng 3 năm 2027","11"],["","- Loại chở người từ 10 đến dưới 16 chỗ",""],["","+ Từ ngày 01 tháng 3 năm 2022 đến hết ngày 28 tháng 02 năm 2027","2"],["","+ Từ ngày 01 tháng 3 năm 2027","7"],["","- Loại chở người từ 16 đến dưới 24 chỗ",""],["","+ Từ ngày 01 tháng 3 năm 2022 đến hết ngày 28 tháng 02 năm 2027","1"],["","+ Từ ngày 01 tháng 3 năm 2027","4"],["","- Loại thiết kế vừa chở người, vừa chở hàng",""],["","+ Từ ngày 01 tháng 3 năm 2022 đến hết ngày 28 tháng 02 năm 2027","2"],["","+ Từ ngày 01 tháng 3 năm 2027","7"],["","(2) Xe ô tô chạy điện khác",""],["","- Loại chở người từ 9 chỗ trở xuống","15"],["","- Loại chở người từ 10 đến dưới 16 chỗ","10"],["","- Loại chở người từ 16 đến dưới 24 chỗ","5"],["","- Loại thiết kế vừa chở người, vừa chở hàng","10"]]}]},{"id":"luat03_9","no":9,"code":"Điều 9","title":"Điều 9. Sửa đổi, bổ sung một số điều của Luật Thi hành án dân sự","shortTitle":"Sửa đổi, bổ sung một số điều của Luật Thi hành án dân sự","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Sửa đổi, bổ sung Điều 55 như sau:"},{"k":"p","t":"“Điều 55. Ủy thác thi hành án và ủy thác xử lý tài sản"},{"k":"p","t":"1. Cơ quan thi hành án dân sự phải ủy thác thi hành án trong các trường hợp sau đây:"},{"k":"p","t":"a) Ủy thác thi hành án cho cơ quan thi hành án dân sự nơi người phải thi hành án có tài sản, làm việc, cư trú hoặc có trụ sở sau khi đã xử lý xong tài sản tạm giữ, thu giữ, tài sản kê biên trên địa bàn có liên quan đến khoản ủy thác, trừ trường hợp quy định tại điểm b khoản này."},{"k":"p","t":"Trường hợp thi hành nghĩa vụ về tài sản thì ủy thác cho cơ quan thi hành án dân sự nơi người phải thi hành án có tài sản; trường hợp không xác định được nơi có tài sản thì ủy thác cho cơ quan thi hành án dân sự nơi người phải thi hành án làm việc, cư trú hoặc có trụ sở."},{"k":"p","t":"Trường hợp thi hành nghĩa vụ liên đới mà người phải thi hành án có tài sản, làm việc, cư trú hoặc có trụ sở ở các địa phương khác nhau thì ủy thác toàn bộ nghĩa vụ thi hành án cho cơ quan thi hành án dân sự thuộc một trong các địa phương nơi người phải thi hành án có điều kiện thi hành án;"},{"k":"p","t":"b) Ủy thác thi hành án đối với khoản phải thi hành án cụ thể có tài sản bảo đảm theo bản án, quyết định cho cơ quan thi hành án dân sự nơi có tài sản."},{"k":"p","t":"2. Cơ quan thi hành án dân sự xử lý tài sản trên địa bàn, đồng thời có thể ủy thác xử lý tài sản cho cơ quan thi hành án dân sự nơi có tài sản được bản án, quyết định tuyên kê biên, phong tỏa hoặc xử lý tài sản để bảo đảm thi hành án mà tài sản ở nhiều địa phương khác nhau.”."},{"k":"p","t":"2. Sửa đổi, bổ sung Điều 56 như sau:"},{"k":"p","t":"“Điều 56. Thẩm quyền ủy thác thi hành án, ủy thác xử lý tài sản"},{"k":"p","t":"1. Cơ quan thi hành án dân sự cấp tỉnh ủy thác thi hành án, ủy thác xử lý tài sản như sau:"},{"k":"p","t":"a) Ủy thác cho cơ quan thi hành án dân sự cấp tỉnh ở địa phương khác đối với các bản án, quyết định về nhận người lao động trở lại làm việc hoặc bồi thường thiệt hại mà người phải thi hành án là cơ quan nhà nước cấp tỉnh trở lên; bản án, quyết định có yếu tố nước ngoài hoặc liên quan đến quyền sở hữu trí tuệ; quyết định của Trọng tài thương mại; quyết định xử lý vụ việc cạnh tranh của Chủ tịch Ủy ban Cạnh tranh Quốc gia, Hội đồng xử lý vụ việc hạn chế cạnh tranh, quyết định giải quyết khiếu nại quyết định xử lý vụ việc cạnh tranh của Chủ tịch Ủy ban Cạnh tranh Quốc gia, Hội đồng giải quyết khiếu nại quyết định xử lý vụ việc cạnh tranh;"},{"k":"p","t":"b) Ủy thác cho cơ quan thi hành án cấp quân khu đối với vụ việc mà đương sự hoặc tài sản có liên quan đến quân đội trên địa bàn;"},{"k":"p","t":"c) Ủy thác cho cơ quan thi hành án dân sự cấp huyện đối với vụ việc khác, trừ trường hợp quy định tại điểm a và điểm b khoản này."},{"k":"p","t":"2. Cơ quan thi hành án dân sự cấp huyện ủy thác thi hành án, ủy thác xử lý tài sản đối với vụ việc thuộc thẩm quyền thi hành án của mình cho cơ quan thi hành án dân sự cấp tỉnh ở địa phương khác, cơ quan thi hành án cấp quân khu, cơ quan thi hành án dân sự cấp huyện khác."},{"k":"p","t":"3. Cơ quan thi hành án cấp quân khu ủy thác thi hành án, ủy thác xử lý tài sản đối với vụ việc thuộc thẩm quyền thi hành án của mình cho cơ quan thi hành án cấp quân khu khác, cơ quan thi hành án dân sự cấp tỉnh hoặc cơ quan thi hành án dân sự cấp huyện.”."},{"k":"p","t":"3. Sửa đổi, bổ sung Điều 57 như sau:"},{"k":"p","t":"“Điều 57. Thủ tục ủy thác thi hành án và ủy thác xử lý tài sản"},{"k":"p","t":"1. Thủ tục ủy thác thi hành án được quy định như sau:"},{"k":"p","t":"a) Trong thời hạn 05 ngày làm việc, kể từ ngày xác định có căn cứ ủy thác, Thủ trưởng cơ quan thi hành án dân sự ra quyết định ủy thác. Trường hợp thi hành quyết định áp dụng biện pháp khẩn cấp tạm thời thì ra quyết định ủy thác trong thời hạn 24 giờ, kể từ khi có căn cứ ủy thác. Trường hợp đã ra quyết định thi hành án nhưng xét thấy cần ủy thác thì phải ra quyết định thu hồi một phần hoặc toàn bộ quyết định thi hành án."},{"k":"p","t":"Hồ sơ ủy thác thi hành án bao gồm quyết định ủy thác thi hành án; bản án, quyết định hoặc bản sao bản án, quyết định trong trường hợp ủy thác cho nhiều nơi, ủy thác theo quy định tại điểm b khoản 1 Điều 55 của Luật này; bản sao biên bản kê biên, tạm giữ tài sản và các tài liệu khác có liên quan, nếu có;"},{"k":"p","t":"b) Trong thời hạn 05 ngày làm việc, kể từ ngày nhận được quyết định ủy thác, Thủ trưởng cơ quan thi hành án dân sự nhận ủy thác ra quyết định thi hành án và thông báo bằng văn bản cho cơ quan thi hành án dân sự đã ủy thác. Trường hợp thi hành quyết định áp dụng biện pháp khẩn cấp tạm thời thì phải ra ngay quyết định thi hành án."},{"k":"p","t":"2. Thủ tục ủy thác xử lý tài sản được quy định như sau:"},{"k":"p","t":"a) Thủ trưởng cơ quan thi hành án dân sự ra quyết định ủy thác xử lý tài sản."},{"k":"p","t":"Hồ sơ ủy thác xử lý tài sản bao gồm quyết định ủy thác xử lý tài sản; bản sao bản án, quyết định; quyết định thi hành án và các tài liệu khác có liên quan, nếu có;"},{"k":"p","t":"b) Trong thời hạn 05 ngày làm việc, kể từ ngày nhận được quyết định ủy thác xử lý tài sản, Thủ trưởng cơ quan thi hành án dân sự nhận ủy thác ra quyết định xử lý tài sản ủy thác, phân công Chấp hành viên tổ chức thi hành và thông báo bằng văn bản cho cơ quan thi hành án dân sự đã ủy thác."},{"k":"p","t":"Chấp hành viên căn cứ quyết định thi hành án, kết quả tổ chức thi hành án của cơ quan thi hành án dân sự đã ủy thác và quyết định xử lý tài sản ủy thác để tiếp tục thực hiện trình tự, thủ tục xử lý tài sản theo quy định của Luật này;"},{"k":"p","t":"c) Trong thời hạn 05 ngày làm việc, kể từ ngày giao tài sản cho người mua được tài sản bán đấu giá hoặc người nhận tài sản để trừ vào số tiền được thi hành án, cơ quan thi hành án dân sự nhận ủy thác xử lý tài sản chuyển số tiền thu được cho cơ quan thi hành án dân sự đã ủy thác để thanh toán theo quy định tại Điều 47 của Luật này, sau khi trừ chi phí thi hành án, đồng thời, thông báo ngay bằng văn bản cho cơ quan thi hành án dân sự đã ủy thác;"},{"k":"p","t":"d) Cơ quan thi hành án dân sự đã ủy thác xử lý tài sản chịu trách nhiệm toàn bộ về quá trình tổ chức thi hành vụ việc, trừ việc xử lý tài sản của cơ quan thi hành án dân sự nhận ủy thác."},{"k":"p","t":"Trường hợp xác định kết quả thẩm định giá, bán đấu giá tài sản đủ để thanh toán nghĩa vụ của người phải thi hành án và các chi phí liên quan hoặc có quyết định hoãn, tạm đình chỉ thi hành án thì thông báo ngay bằng văn bản cho cơ quan thi hành án dân sự nhận ủy thác để tạm dừng việc xử lý các tài sản còn lại. Việc tiếp tục xử lý tài sản ủy thác được thực hiện theo thông báo của cơ quan thi hành án dân sự đã ủy thác."},{"k":"p","t":"Trường hợp đã thu đủ số tiền thi hành án và các chi phí liên quan hoặc có quyết định đình chỉ thi hành án thì thông báo ngay bằng văn bản cho cơ quan thi hành án dân sự nhận ủy thác để chấm dứt việc xử lý các tài sản còn lại, giải tỏa kê biên tài sản theo quy định của Luật này. Cơ quan thi hành án dân sự đã ủy thác phải thanh toán các chi phí thi hành án phát sinh trước thời điểm chấm dứt việc xử lý tài sản cho cơ quan thi hành án dân sự nhận ủy thác theo quy định tại khoản 1 và khoản 2 Điều 73 của Luật này;"},{"k":"p","t":"đ) Cơ quan thi hành án dân sự nhận ủy thác xử lý tài sản chịu trách nhiệm thực hiện các quy định liên quan đến việc xử lý tài sản ủy thác; thông báo ngay bằng văn bản kết quả thẩm định giá, thời điểm bán đấu giá, kết quả xử lý tài sản cho cơ quan thi hành án dân sự đã ủy thác; tạm dừng hoặc chấm dứt xử lý tài sản theo yêu cầu của cơ quan thi hành án dân sự đã ủy thác."},{"k":"p","t":"3. Cơ quan thi hành án dân sự nhận ủy thác không được từ chối thực hiện quyết định ủy thác thi hành án, ủy thác xử lý tài sản, trừ trường hợp quyết định ủy thác có sự nhầm lẫn, sai sót về nội dung hoặc thẩm quyền của cơ quan thi hành án dân sự nhận ủy thác.”."}]},{"id":"luat03_10","no":10,"code":"Điều 10","title":"Điều 10. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"Luật này có hiệu lực thi hành từ ngày 01 tháng 3 năm 2022."}]},{"id":"luat03_11","no":11,"code":"Điều 11","title":"Điều 11. Quy định chuyển tiếp","shortTitle":"Quy định chuyển tiếp","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với dự án đầu tư công nhóm B, nhóm C sử dụng vốn ODA và vốn vay ưu đãi của các nhà tài trợ nước ngoài đã được Thủ tướng Chính phủ quyết định chủ trương đầu tư trước ngày Luật này có hiệu lực thi hành và trường hợp quy định tại khoản 2 Điều này, cơ quan, người có thẩm quyền quyết định chủ trương đầu tư quy định tại Điều 1 của Luật này có thẩm quyền điều chỉnh chủ trương đầu tư."},{"k":"p","t":"2. Đối với dự án đầu tư công nhóm B, nhóm C sử dụng vốn ODA và vốn vay ưu đãi của các nhà tài trợ nước ngoài đã hoàn thành thủ tục lập, thẩm định và có văn bản thẩm định làm cơ sở cho việc quyết định chủ trương đầu tư hoặc điều chỉnh chủ trương đầu tư theo quy định tại Điều 25 và Điều 34 của Luật Đầu tư công số 39/2019/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 64/2020/QH14 và Luật số 72/2020/QH14 trước ngày Luật này có hiệu lực thi hành thì tiếp tục thực hiện thủ tục trình Thủ tướng Chính phủ xem xét, quyết định theo quy định của Luật Đầu tư công số 39/2019/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 64/2020/QH14 và Luật số 72/2020/QH14."},{"k":"p","t":"3. Kể từ ngày Luật này có hiệu lực thi hành, hồ sơ hợp lệ đề nghị chấp thuận, điều chỉnh chủ trương đầu tư dự án đầu tư xây dựng nhà ở (để bán, cho thuê, cho thuê mua), khu đô thị thuộc thẩm quyền chấp thuận chủ trương đầu tư của Thủ tướng Chính phủ theo quy định tại Điều 31 của Luật Đầu tư số 61/2020/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 72/2020/QH14 nay thuộc thẩm quyền chấp thuận chủ trương đầu tư của Ủy ban nhân dân cấp tỉnh theo quy định tại Điều 3 của Luật này đã tiếp nhận và quá thời hạn giải quyết nhưng chưa trả kết quả theo quy định của Luật Đầu tư số 61/2020/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 72/2020/QH14 thì tiếp tục thực hiện theo quy định của Luật Đầu tư số 61/2020/QH14 đã được sửa đổi, bổ sung một số điều theo Luật số 72/2020/QH14."},{"k":"p","t":"4. Đối với hồ sơ hợp lệ đề nghị chấp thuận chủ trương đầu tư đồng thời chấp thuận nhà đầu tư, điều chỉnh chủ trương đầu tư dự án đầu tư xây dựng nhà ở thương mại trong trường hợp nhà đầu tư có quyền sử dụng đất ở hoặc đất ở và đất khác đã được cơ quan nhà nước có thẩm quyền tiếp nhận, trước ngày Luật này có hiệu lực thi hành mà chưa giải quyết xong thì tiếp tục được giải quyết theo quy định tại Điều 4 của Luật này và pháp luật có liên quan."},{"k":"p","t":"5. Kể từ ngày Luật này có hiệu lực thi hành, các việc thi hành án dân sự chưa được thi hành hoặc chưa thi hành xong thì áp dụng quy định của Luật này; quyết định, hành vi của cơ quan thi hành án dân sự, Chấp hành viên đã được thực hiện theo quy định của Luật Thi hành án dân sự số 26/2008/QH12 đã được sửa đổi, bổ sung một số điều theo Luật số 64/2014/QH13, Luật số 23/2018/QH14 và Luật số 67/2020/QH14 có giá trị và tiếp tục được thực hiện."},{"k":"p","t":"________________"},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XV, kỳ họp bất thường lần thứ nhất thông qua ngày 11 tháng 01 năm 2022."},{"k":"p","t":"CHỦ TỊCH QUỐC HỘIĐã ký: Vương Đình Huệ"}]}],"refs":{},"details":{},"summaries":{}}</script>

    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}

function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
