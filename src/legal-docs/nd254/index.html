g thời có trách nhiệm sử dụng hóa đơn đúng mục đích.","points":["Người mua có quyền yêu cầu lập, giao hóa đơn hợp pháp (trừ trường hợp không phải sử dụng hóa đơn), cung cấp thông tin để người bán lập hóa đơn, tra cứu và nhận file gốc hóa đơn điện tử.","Hóa đơn được dùng làm căn cứ xác nhận giao dịch mua bán, chứng minh quyền sử dụng/sở hữu, nhận bồi thường thiệt hại, đăng ký quyền sở hữu, kê khai thuế, thanh toán vốn ngân sách nhà nước.","Người mua có trách nhiệm sử dụng hóa đơn đúng mục đích và cung cấp thông tin trên hóa đơn cho cơ quan có thẩm quyền khi được yêu cầu."]},"nd254_19":{"tldr":"Tổ chức được ủy nhiệm lập hóa đơn điện tử có trách nhiệm lập hóa đơn đúng phạm vi ủy nhiệm, đúng bản chất giao dịch, gửi hóa đơn đến cơ quan thuế, lưu trữ, bảo mật dữ liệu; chủ quản nền tảng thương mại điện tử phải cung cấp thông tin giao dịch để người bán lập hóa đơn.","points":["Tổ chức được ủy nhiệm phải lập hóa đơn trong phạm vi được ủy nhiệm, phản ánh đúng bản chất nghiệp vụ, thể hiện đầy đủ thông tin bên ủy quyền là người bán và đáp ứng quy định về định dạng, chữ ký số, thời điểm lập hóa đơn.","Có trách nhiệm gửi hóa đơn đến cơ quan thuế, lưu trữ hóa đơn, bảo đảm an toàn bảo mật dữ liệu, không dùng dữ liệu hóa đơn ngoài phạm vi ủy nhiệm và phối hợp điều chỉnh, thay thế, hủy hóa đơn khi có sai sót.","Chủ quản nền tảng thương mại điện tử, nền tảng số có trách nhiệm cung cấp thông tin người mua, giao dịch, thời điểm giao hàng để người bán lập hóa đơn điện tử."]},"nd254_20":{"tldr":"Quy định nghĩa vụ, trách nhiệm của hai nhóm tổ chức cung cấp dịch vụ hóa đơn điện tử: tổ chức cung cấp giải pháp lập hóa đơn và tổ chức truyền, lưu trữ dữ liệu hóa đơn với cơ quan thuế.","points":["Tổ chức cung cấp giải pháp lập hóa đơn điện tử phải cung cấp giải pháp lập, truyền, lưu trữ, xử lý dữ liệu hóa đơn, chứng từ điện tử; truyền nhận đúng hạn, toàn vẹn dữ liệu và lưu trữ kết quả truyền nhận.","Tổ chức truyền, lưu trữ dữ liệu với cơ quan thuế phải cung cấp dịch vụ truyền, lưu trữ dữ liệu với Cục Thuế, thực hiện cấp mã khi được ủy quyền và cung cấp dịch vụ miễn phí cho đối tượng được ủy thác.","Cả hai nhóm đều phải công khai phương thức hoạt động, chất lượng dịch vụ, bảo mật thông tin hóa đơn, chứng từ điện tử và thông báo trước ít nhất 30 ngày khi có kế hoạch ngừng hoặc tạm ngừng cung cấp dịch vụ."]},"nd254_21":{"tldr":"Quy định trách nhiệm của Cục Thuế và cơ quan thuế quản lý trực tiếp trong xây dựng cơ sở dữ liệu, quản lý đăng ký, kiểm tra sử dụng hóa đơn điện tử, chứng từ điện tử và phối hợp tuyên truyền cho người tiêu dùng.","points":["Cục Thuế xây dựng cơ sở dữ liệu hóa đơn, chứng từ điện tử phục vụ quản lý thuế, quản lý nhà nước và nhu cầu xác minh, đối chiếu hóa đơn; thông báo các loại hóa đơn, chứng từ đã phát hành, báo mất, không còn giá trị sử dụng.","Cơ quan thuế quản lý trực tiếp quản lý đăng ký sử dụng, kiểm tra việc đăng ký, sử dụng, bảo quản lưu trữ hóa đơn, chứng từ điện tử trên địa bàn; cấp hóa đơn điện tử từng lần phát sinh theo khoản 2 Điều 6.","Cơ quan thuế, cơ quan quản lý nhà nước liên quan và người bán có trách nhiệm tuyên truyền, hướng dẫn, tạo điều kiện để người tiêu dùng thực hiện quyền và trách nhiệm về hóa đơn."]},"nd254_22":{"tldr":"Chứng từ trong lĩnh vực quản lý thuế, phí, lệ phí gồm hai loại chính: chứng từ khấu trừ thuế thu nhập cá nhân và biên lai thu thuế, phí, lệ phí.","points":["Gồm chứng từ khấu trừ thuế thu nhập cá nhân và biên lai thu thuế, phí, lệ phí.","Nếu quá trình quản lý thuế, phí, lệ phí phát sinh yêu cầu các loại chứng từ khác, Bộ trưởng Bộ Tài chính có trách nhiệm quy định và hướng dẫn thực hiện."]},"nd254_23":{"tldr":"Quy định nội dung bắt buộc phải thể hiện trên chứng từ khấu trừ thuế thu nhập cá nhân và trên biên lai thu thuế, phí, lệ phí, cùng nguyên tắc trình bày về ngôn ngữ, chữ số, đồng tiền.","points":["Chứng từ khấu trừ thuế TNCN phải có tên/ký hiệu/số chứng từ, thông tin tổ chức chi trả, thông tin cá nhân nhận thu nhập, khoản thu nhập và số thuế đã khấu trừ, ngày lập, họ tên và chữ ký (chữ ký số nếu là chứng từ điện tử) của người trả thu nhập.","Biên lai phải có tên, ký hiệu mẫu, số biên lai (số Ả-rập tối đa 8 chữ số; với biên lai điện tử, số biên lai bắt đầu từ số 1 vào ngày 01/01 hoặc ngày bắt đầu sử dụng và kết thúc ngày 31/12 hàng năm), tên/mã số thuế tổ chức thu, tên khoản thu và số tiền, ngày lập, chữ ký số của tổ chức thu.","Biên lai thể hiện bằng tiếng Việt (tiếng nước ngoài kèm trong ngoặc đơn hoặc dưới dòng, cỡ chữ nhỏ hơn), chữ số Ả-rập, đồng tiền là đồng Việt Nam; riêng khoản phí, lệ phí quy định thu bằng ngoại tệ thì được thu ngoại tệ hoặc quy đổi theo tỷ giá tại Nghị định số 362/2025/NĐ-CP.","Tổ chức thu được tạo thêm thông tin, lo-go, hình ảnh trên biên lai nhưng không được che khuất, làm mờ nội dung bắt buộc và cỡ chữ không được lớn hơn cỡ chữ của nội dung bắt buộc."]},"nd254_24":{"tldr":"Quy định thời điểm phải lập chứng từ, biên lai khi khấu trừ thuế thu nhập cá nhân hoặc thu thuế, phí, lệ phí, cùng các trường hợp ngoại lệ không phải lập chứng từ khấu trừ thuế TNCN.","points":["Tại thời điểm khấu trừ thuế TNCN hoặc thu thuế, phí, lệ phí, tổ chức phải lập chứng từ, biên lai giao cho người nộp, trừ các trường hợp tại khoản 2, 3, 4 Điều này.","Cá nhân ủy quyền quyết toán thuế thì tổ chức khấu trừ không phải lập chứng từ khấu trừ thuế TNCN.","Cá nhân không ký hợp đồng lao động hoặc ký hợp đồng dưới 3 tháng: lập chứng từ mỗi lần khấu trừ hoặc gộp một chứng từ cho nhiều lần trong năm khi cá nhân yêu cầu; cá nhân ký hợp đồng từ 3 tháng trở lên chỉ lập một chứng từ khấu trừ trong năm tính thuế.","Thu nhập từ chuyển nhượng chứng khoán, đầu tư vốn, tài sản mã hóa, vàng miếng, bản quyền, nhượng quyền thương mại, trúng thưởng, thừa kế, quà tặng đã được khấu trừ, nộp thuế TNCN tại nguồn thì không phải lập chứng từ khấu trừ thuế.","Thời điểm ký số trên chứng từ là thời điểm sử dụng chữ ký số để ký trên chứng từ điện tử, hiển thị theo định dạng ngày, tháng, năm dương lịch."]},"nd254_25":{"tldr":"Tổ chức thu thuế, phí, lệ phí được ủy nhiệm cho bên thứ ba lập biên lai bằng văn bản, kèm quy định về thông báo cơ quan thuế, niêm yết thông tin, trách nhiệm mỗi bên và xử lý khi chấm dứt ủy nhiệm.","points":["Việc ủy nhiệm phải lập thành văn bản và phải thông báo cho cơ quan thuế quản lý trực tiếp cả bên ủy nhiệm và bên nhận ủy nhiệm chậm nhất 3 ngày trước khi bên nhận ủy nhiệm lập biên lai.","Văn bản ủy nhiệm phải ghi đầy đủ thông tin về biên lai ủy nhiệm (hình thức, loại, ký hiệu, số lượng), mục đích, thời hạn và phương thức ủy nhiệm.","Hai bên phải niêm yết đầy đủ thông tin về biên lai ủy nhiệm tại nơi tổ chức thu; biên lai ủy nhiệm phải thể hiện tên bên ủy nhiệm (không bắt buộc chữ ký số) và tên, địa chỉ bên nhận ủy nhiệm.","Nếu có nhiều đơn vị trực thuộc hoặc cơ sở nhận ủy nhiệm, phải có phương án phân chia số biên lai và sử dụng theo thứ tự từ số nhỏ đến số lớn trong phạm vi được phân chia.","Bên nhận ủy nhiệm chuyển dữ liệu biên lai điện tử đến cơ quan thuế; khi chấm dứt ủy nhiệm trước hạn, hai bên phải xác định bằng văn bản và thông báo cơ quan thuế, niêm yết tại nơi thu."]},"nd254_26":{"tldr":"Chứng từ điện tử được lập trực tiếp trên Hệ thống thông tin quản lý thuế, qua tổ chức cung cấp dịch vụ hoặc phần mềm riêng, và chỉ có giá trị pháp lý khi lập đúng nội dung theo quy định tại Điều 23.","points":["Chứng từ điện tử được lập trên Hệ thống thông tin quản lý thuế, qua tổ chức cung cấp dịch vụ, hoặc trên phần mềm chứng từ điện tử của đơn vị.","Chứng từ lập đúng quy định tại Điều 23 mới là chứng từ hợp pháp để thanh toán, hạch toán, quyết toán tài chính; lập sai quy định thì không có giá trị thanh toán, hạch toán, quyết toán.","Việc lập chứng từ điện tử phải phản ánh đầy đủ, trung thực giao dịch phát sinh và tuân thủ pháp luật về giao dịch điện tử, kế toán và thuế, phí, lệ phí."]},"nd254_27":{"tldr":"Các tổ chức liên quan phải kết nối, truyền và tiếp nhận dữ liệu chứng từ điện tử với cơ quan thuế, bảo đảm an toàn và toàn vẹn dữ liệu; khi có sự cố kỹ thuật phải thông báo và truyền dữ liệu trong thời hạn quy định sau khi khắc phục.","points":["Tổ chức thu thuế/phí/lệ phí, tổ chức khấu trừ thuế, tổ chức nhận ủy nhiệm lập biên lai và tổ chức cung cấp dịch vụ chứng từ điện tử phải kết nối, truyền, tiếp nhận dữ liệu qua hệ thống thông tin quản lý thuế hoặc hệ thống trung gian.","Việc truyền, nhận dữ liệu phải bảo đảm an toàn thông tin, bảo mật dữ liệu; tính toàn vẹn, đầy đủ, chính xác; và khả năng truy xuất, đối chiếu khi cơ quan quản lý thuế yêu cầu.","Khi hệ thống gặp sự cố kỹ thuật không thể truyền dữ liệu đúng thời hạn, phải thông báo kịp thời cho cơ quan quản lý thuế và truyền dữ liệu trong vòng 3 ngày làm việc sau khi sự cố được khắc phục."]},"nd254_28":{"tldr":"Quy định các đối tượng được sử dụng miễn phí dịch vụ về chứng từ điện tử qua Hệ thống thông tin quản lý thuế hoặc tổ chức được Cục Thuế ủy thác, với kinh phí do ngân sách nhà nước bảo đảm.","points":["Đối tượng miễn phí gồm hộ kinh doanh/cá nhân kinh doanh dùng dưới 10 lao động và không thuộc diện dùng hóa đơn điện tử (hoặc thuộc diện được miễn phí dịch vụ hóa đơn điện tử theo Điều 11), và tổ chức/cá nhân trả thu nhập không thuộc đối tượng áp dụng hóa đơn điện tử (hoặc được miễn phí dịch vụ hóa đơn điện tử theo Điều 11).","Các đối tượng trên được sử dụng chứng từ khấu trừ thuế TNCN điện tử miễn phí dịch vụ thông qua Hệ thống thông tin quản lý thuế hoặc tổ chức cung cấp dịch vụ được Cục Thuế ủy thác.","Được đăng ký, thay đổi thông tin đăng ký sử dụng chứng từ điện tử qua Hệ thống thông tin quản lý thuế theo hướng dẫn của Bộ trưởng Bộ Tài chính.","Nhà nước bảo đảm kinh phí từ ngân sách để cơ quan thuế cung cấp miễn phí dịch vụ này; nếu dùng dịch vụ của tổ chức ngoài Hệ thống thông tin quản lý thuế thì chi phí do các bên tự thỏa thuận."]},"nd254_29":{"tldr":"Quy định trách nhiệm của tổ chức, cá nhân khấu trừ thuế TNCN, tổ chức thu thuế/phí/lệ phí và tổ chức nhận ủy nhiệm lập biên lai trong việc quản lý tài khoản, tạo lập, gửi và chuyển dữ liệu chứng từ điện tử, lưu trữ và chấp hành kiểm tra.","points":["Quản lý tên và mật khẩu tài khoản do cơ quan thuế cấp; tạo lập chứng từ khấu trừ thuế TNCN, biên lai điện tử gửi người nộp và chịu trách nhiệm trước pháp luật về tính hợp pháp, chính xác của chứng từ đã lập.","Chứng từ khấu trừ thuế TNCN điện tử phải gửi cho người bị khấu trừ và đồng thời gửi cho cơ quan thuế ngay trong ngày lập chứng từ, qua tổ chức cung cấp dịch vụ hóa đơn điện tử hoặc Hệ thống thông tin quản lý thuế tùy theo đối tượng.","Biên lai điện tử sau khi lập được gửi cho người nộp và gửi cơ quan thuế theo bảng tổng hợp dữ liệu trong ngày lập biên lai (trừ phí hải quan; lệ phí hàng hóa, hành lý, phương tiện vận tải quá cảnh).","Có trách nhiệm lưu trữ, bảo đảm tính toàn vẹn của chứng từ điện tử, bảo đảm an toàn, an ninh hệ thống dữ liệu điện tử và chấp hành sự kiểm tra, đối chiếu của cơ quan quản lý thuế và cơ quan có thẩm quyền."]},"nd254_30":{"tldr":"Cục Hải quan và Chi cục Hải quan khu vực có trách nhiệm xây dựng cơ sở dữ liệu, thông báo và quản lý, kiểm tra hoạt động tạo, phát hành, sử dụng, hủy chứng từ điện tử trên địa bàn.","points":["Cục Hải quan xây dựng cơ sở dữ liệu về chứng từ điện tử phục vụ quản lý thuế và quản lý nhà nước; thông báo các loại chứng từ đã phát hành, được báo mất, không còn giá trị sử dụng.","Chi cục Hải quan khu vực quản lý hoạt động tạo, phát hành chứng từ của tổ chức đã đăng ký trên địa bàn; kiểm tra hoạt động tạo, phát hành, sử dụng chứng từ và theo dõi, kiểm tra hoạt động hủy chứng từ."]},"nd254_31":{"tldr":"Hệ thống thông tin và cơ sở dữ liệu về hóa đơn, chứng từ phải được xây dựng, quản lý thống nhất, chính xác, an toàn, kịp thời, và kết nối chia sẻ trên môi trường điện tử phục vụ quản lý thuế và quản lý nhà nước.","points":["Hệ thống thông tin phải được xây dựng, quản lý thống nhất từ trung ương đến địa phương và tuân thủ các tiêu chuẩn, quy chuẩn kỹ thuật về công nghệ thông tin.","Cơ sở dữ liệu phải bảo đảm phục vụ kịp thời công tác quản lý thuế và quản lý khác của nhà nước, đáp ứng phát triển kinh tế - xã hội, bảo đảm an toàn, bảo mật và an ninh quốc gia.","Thông tin, dữ liệu phải được thu thập, cập nhật, duy trì bảo đảm chính xác, trung thực, khách quan; việc khai thác, sử dụng phải đúng mục đích và đúng quy định pháp luật.","Cơ sở dữ liệu về hóa đơn, chứng từ được xây dựng, kết nối và chia sẻ trên môi trường điện tử với hệ thống thông tin, cơ sở dữ liệu của các bộ, ngành, địa phương có liên quan."]},"nd254_32":{"tldr":"Quy định các thành phần hạ tầng kỹ thuật công nghệ thông tin và hệ thống phần mềm phục vụ quản lý, vận hành, khai thác hệ thống thông tin hóa đơn điện tử, chứng từ điện tử.","points":["Hạ tầng kỹ thuật CNTT gồm thiết bị tính toán (máy chủ, máy trạm), hệ thống đường truyền, thiết bị kết nối mạng, thiết bị (hoặc phần mềm) an ninh an toàn mạng, cơ sở dữ liệu, thiết bị lưu trữ, thiết bị ngoại vi/phụ trợ và mạng nội bộ.","Hệ thống phần mềm quản lý, vận hành, khai thác gồm hệ điều hành, hệ quản trị cơ sở dữ liệu và phần mềm ứng dụng."]},"nd254_33":{"tldr":"Quy định việc xây dựng cơ sở dữ liệu hóa đơn, chứng từ, nguồn thu thập thông tin, nội dung xử lý dữ liệu trước khi tích hợp vào cơ sở dữ liệu quốc gia, và trách nhiệm quản lý hệ thống thông tin của Cục Thuế.","points":["Cơ sở dữ liệu hóa đơn, chứng từ do cơ quan thuế quản lý được Cục Thuế, Kho bạc Nhà nước phối hợp xây dựng, gồm đăng ký sử dụng thông tin, thông báo hủy hóa đơn/chứng từ, thông tin hóa đơn/chứng từ gửi cơ quan thuế và thông tin khai thuế liên quan.","Thông tin được thu thập, cập nhật dựa trên dữ liệu người bán/người sử dụng có trách nhiệm gửi cơ quan thuế, thông tin từ các cơ quan khác gửi đến liên quan đến hóa đơn/chứng từ điện tử, và thông tin thu được từ công tác quản lý thuế.","Cục Thuế xử lý thông tin trước khi tích hợp vào cơ sở dữ liệu quốc gia, gồm kiểm tra việc tuân thủ quy trình thu thập, kiểm tra cơ sở pháp lý và mức độ tin cậy, tổng hợp phân loại dữ liệu; cơ quan quản lý cơ sở dữ liệu chuyên ngành chịu trách nhiệm về tính chính xác của dữ liệu cập nhật từ ngành mình.","Cục Thuế quản lý hệ thống thông tin hóa đơn, chứng từ, gồm xây dựng vận hành hệ thống, tích hợp dữ liệu từ các bộ ngành liên quan, hướng dẫn kiểm tra giám sát cơ quan thuế địa phương, phân quyền truy cập và quản lý kết nối, chia sẻ dữ liệu."]},"nd254_34":{"tldr":"Việc tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử phải phục vụ thủ tục thuế, thanh toán qua ngân hàng và các thủ tục hành chính khác, bảo đảm đầy đủ, chính xác, đúng mục đích và đúng pháp luật.","points":["Áp dụng để thực hiện các thủ tục về thuế, thủ tục thanh toán qua ngân hàng, các thủ tục hành chính khác, và để chứng minh tính hợp pháp của hàng hóa lưu thông trên thị trường.","Việc tra cứu, cung cấp thông tin phải bảo đảm đầy đủ, chính xác, kịp thời và đúng đối tượng.","Việc sử dụng thông tin được cung cấp phải đúng mục đích, phục vụ hoạt động nghiệp vụ theo chức năng, nhiệm vụ của bên sử dụng, đồng thời tuân thủ pháp luật về bảo vệ bí mật nhà nước."]},"nd254_35":{"tldr":"Khi kiểm tra hàng hóa lưu thông trên thị trường, cơ quan có thẩm quyền tra cứu hóa đơn điện tử trực tiếp trên Hệ thống thông tin quản lý thuế thay vì yêu cầu hóa đơn giấy; có biện pháp dự phòng khi gặp sự cố bất khả kháng.","points":["Cơ quan nhà nước, người có thẩm quyền truy cập Hệ thống thông tin quản lý thuế để tra cứu thông tin hóa đơn điện tử, không yêu cầu cung cấp hóa đơn giấy.","Trường hợp bất khả kháng do sự cố, thiên tai gây ảnh hưởng việc truy cập Internet dẫn đến không tra cứu được dữ liệu hóa đơn, cơ quan nhà nước, người có thẩm quyền thực hiện biện pháp phù hợp khác để tra cứu."]},"nd254_36":{"tldr":"Quy định cơ quan có trách nhiệm cung cấp thông tin hóa đơn điện tử theo cấp quản lý và liệt kê các nhóm đối tượng được sử dụng thông tin hóa đơn điện tử.","points":["Cục Thuế cung cấp thông tin hóa đơn điện tử cho cơ quan, tổ chức quản lý nhà nước cấp Trung ương; Thuế tỉnh, thành phố, thuế cơ sở cung cấp cho cơ quan, tổ chức quản lý đồng cấp.","Bên sử dụng thông tin gồm: người bán/mua hàng hóa dịch vụ và bên nhận ủy nhiệm lập hóa đơn; cơ quan quản lý nhà nước; tổ chức tín dụng; tổ chức cung cấp dịch vụ hóa đơn điện tử; tổ chức sử dụng thông tin chứng từ khấu trừ thuế TNCN; cơ quan quản lý thuế nước ngoài theo điều ước quốc tế; và tổ chức được ủy quyền của người bán hàng hóa, dịch vụ."]},"nd254_37":{"tldr":"Quy định cách các nhóm bên sử dụng thông tin khai thác hóa đơn điện tử từ Hệ thống thông tin quản lý thuế, gồm khai thác trực tiếp hoặc theo văn bản thỏa thuận/dịch vụ truy vấn, cùng giới hạn số tài khoản được cấp.","points":["Người bán, người mua hàng hóa dịch vụ và bên nhận ủy nhiệm lập hóa đơn khai thác trực tiếp thông tin hóa đơn điện tử từ Hệ thống thông tin quản lý thuế.","Cơ quan quản lý nhà nước, tổ chức tín dụng, tổ chức cung cấp dịch vụ hóa đơn điện tử, tổ chức được ủy quyền tra cứu, sử dụng thông tin theo phạm vi, thời gian quy định tại văn bản thỏa thuận giữa hai bên hoặc theo hình thức dịch vụ truy vấn trực tiếp, và phải phân công đầu mối đăng ký, thông báo bằng văn bản cho Cục Thuế.","Cục Thuế, Thuế tỉnh, thành phố cấp tối đa 02 tài khoản khai thác sử dụng thông tin hóa đơn điện tử cho người sử dụng của mỗi cơ quan, tổ chức quản lý đồng cấp.","Bộ trưởng Bộ Tài chính hướng dẫn việc cung cấp, tra cứu thông tin; đăng ký mới, bổ sung thông tin đăng ký, thu hồi tài khoản truy cập; và chấm dứt sử dụng các hình thức cung cấp, sử dụng thông tin hóa đơn điện tử."]},"nd254_38":{"tldr":"Cơ quan thuế có trách nhiệm xây dựng, vận hành Hệ thống thông tin quản lý thuế thuận tiện, ổn định, an toàn; quản lý đăng ký sử dụng thông tin và thông báo khi tạm ngừng cung cấp dịch vụ.","points":["Bảo đảm truy cập thuận tiện, công cụ tìm kiếm dễ sử dụng và cho kết quả đúng nội dung; khuôn dạng thông tin, dữ liệu theo tiêu chuẩn, quy chuẩn kỹ thuật để dễ tải xuống, hiển thị nhanh, in ấn; hệ thống hoạt động liên tục, ổn định, an toàn thông tin; chủ trì hướng dẫn, hỗ trợ vận hành.","Quản lý việc đăng ký sử dụng thông tin hóa đơn điện tử, chứng từ điện tử của bên sử dụng thông tin.","Khi tạm ngừng cung cấp thông tin hóa đơn điện tử, chứng từ điện tử, Cục Thuế thông báo trên Trang thông tin điện tử của Cục Thuế về hóa đơn điện tử, nêu rõ khoảng thời gian dự kiến phục hồi."]},"nd254_39":{"tldr":"Bên sử dụng thông tin hóa đơn điện tử phải sử dụng đúng mục đích, không cung cấp cho bên thứ ba khi chưa được đồng ý, đồng thời trang bị phương tiện kỹ thuật, đăng ký cấp quyền và bảo mật tài khoản truy cập.","points":["Sử dụng thông tin đúng mục đích, phục vụ hoạt động nghiệp vụ theo chức năng, nhiệm vụ, đúng pháp luật về bảo vệ bí mật nhà nước; không cung cấp thông tin thu thập từ cơ quan thuế cho bên thứ ba khi chưa được cơ quan thuế cung cấp thông tin đồng ý.","Trang bị đầy đủ phương tiện, trang thiết bị kỹ thuật để tra cứu, kết nối, sử dụng thông tin; thực hiện đăng ký để được cấp quyền truy cập, khai thác, sử dụng; quản lý, bảo mật thông tin tài khoản truy cập Hệ thống thông tin quản lý thuế."]},"nd254_40":{"tldr":"Quy định trách nhiệm của các tổ chức kinh tế thuộc một số lĩnh vực đặc thù, tổ chức tín dụng, tổ chức sản xuất/nhập khẩu sản phẩm dán tem chịu thuế tiêu thụ đặc biệt và các cơ quan liên quan trong việc kết nối, chia sẻ dữ liệu hóa đơn điện tử với cơ quan thuế.","points":["Tổ chức kinh tế trong các lĩnh vực điện lực, xăng dầu, bưu chính viễn thông, vận tải hàng không/đường bộ/đường sắt/đường biển/đường thủy, nước sạch, tài chính ngân hàng, bảo hiểm, y tế, thương mại điện tử, siêu thị, thương mại phải cung cấp dữ liệu hóa đơn điện tử theo định dạng chuẩn dữ liệu.","Tổ chức tín dụng, tổ chức cung ứng dịch vụ thanh toán cung cấp dữ liệu điện tử về giao dịch thanh toán qua tài khoản khi có yêu cầu bằng văn bản của cơ quan thuế.","Tổ chức, cá nhân sản xuất, nhập khẩu sản phẩm chịu thuế tiêu thụ đặc biệt thuộc đối tượng dán tem phải quét mã QR trước khi tiêu thụ trong nước hoặc khi nhập khẩu để kết nối thông tin về in và sử dụng tem với cơ quan thuế; đối tượng sử dụng tem chi trả chi phí in và sử dụng tem theo quy định của Bộ trưởng Bộ Tài chính.","Cơ quan quản lý thị trường, Cục Quản lý đất đai, Cục Địa chất và Khoáng sản Việt Nam, cơ quan công an, giao thông, y tế và cơ quan liên quan khác kết nối chia sẻ thông tin, dữ liệu cần thiết trong lĩnh vực quản lý với Cục Thuế để xây dựng cơ sở dữ liệu hóa đơn điện tử."]},"nd254_41":{"tldr":"Quy định điều kiện, nội dung, hình thức tố giác và nguyên tắc, mức chi khen thưởng cho người tiêu dùng tố giác hành vi người bán không lập và giao hóa đơn điện tử.","points":["Được xem xét khen thưởng khi cung cấp thông tin trung thực, chính xác, kịp thời, có căn cứ xác định vi phạm; nội dung đủ cơ sở để cơ quan thuế kiểm tra, xác minh; và trên cơ sở đó cơ quan thuế đã ban hành quyết định xử phạt vi phạm hành chính về thuế, hóa đơn.","Thông tin tố giác gồm thông tin về người bán (tên, địa chỉ hoặc mã số thuế), thông tin về giao dịch/hành vi không lập và giao hóa đơn hoặc tài liệu chứng cứ liên quan, và thông tin liên hệ của người tố giác (tên, số điện thoại, số định danh cá nhân).","Có thể tố giác qua hệ thống hóa đơn điện tử hoặc Hệ thống thông tin quản lý thuế (như eTax Mobile), Cổng dịch vụ công quốc gia, thư điện tử/hệ thống tiếp nhận thông tin điện tử của cơ quan thuế, hoặc gửi trực tiếp/bằng văn bản tại trụ sở cơ quan thuế.","Mỗi vụ việc chỉ được xem xét khen thưởng một lần; nếu nhiều người cùng cung cấp thông tin về một hành vi vi phạm thì ưu tiên người cung cấp đầu tiên hoặc người có thông tin đầy đủ, giá trị nhất theo xác nhận của cơ quan thuế.","Mức chi khen thưởng không quá 10% số tiền xử phạt vi phạm hành chính, tối đa 10.000.000 đồng/vụ việc; Bộ trưởng Bộ Tài chính quy định mức, hình thức, trình tự, thủ tục khen thưởng, quản lý, sử dụng kinh phí."]},"nd254_42":{"tldr":"Kinh phí thực hiện việc tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử của các cơ quan quản lý nhà nước được cấp từ ngân sách nhà nước theo dự toán hàng năm được phê duyệt.","points":["Kinh phí được cấp từ ngân sách nhà nước trên cơ sở dự toán kinh phí hàng năm được phê duyệt cho các cơ quan, đơn vị theo quy định của pháp luật."]},"nd254_43":{"tldr":"Nghị định có hiệu lực thi hành từ ngày 01/7/2026, đồng thời bãi bỏ hiệu lực của Nghị định 123/2020/NĐ-CP, Điều 1 Nghị định 41/2022/NĐ-CP và Nghị định 70/2025/NĐ-CP.","points":["Nghị định có hiệu lực thi hành từ ngày 01 tháng 7 năm 2026.","Kể từ ngày có hiệu lực, hết hiệu lực thi hành: Nghị định số 123/2020/NĐ-CP quy định về hóa đơn, chứng từ; Điều 1 Nghị định số 41/2022/NĐ-CP sửa đổi, bổ sung Nghị định 123/2020/NĐ-CP; và Nghị định số 70/2025/NĐ-CP sửa đổi, bổ sung Nghị định 123/2020/NĐ-CP."]},"nd254_44":{"tldr":"Quy định lộ trình chuyển tiếp đối với hóa đơn bán hàng dự trữ quốc gia, biên lai giấy tự in/đặt in và hóa đơn đặt in của cơ quan thuế đang sử dụng khi Nghị định có hiệu lực.","points":["Hóa đơn bán hàng dự trữ quốc gia bằng giấy tiếp tục theo quy định pháp luật về bán hàng dự trữ quốc gia; khi Bộ Tài chính thông báo chuyển đổi sang hóa đơn điện tử thì hóa đơn giấy chưa dùng hết phải tiêu hủy theo trình tự, thủ tục do Bộ trưởng Bộ Tài chính quy định.","Biên lai giấy tự in, đặt in theo Nghị định số 123/2020/NĐ-CP chưa sử dụng hết được tiếp tục sử dụng đến hết ngày 31 tháng 12 năm 2026; từ ngày 01 tháng 01 năm 2027, toàn bộ biên lai giấy chưa sử dụng phải tiêu hủy và tổ chức phải chuyển đổi sang biên lai điện tử theo định dạng chuẩn dữ liệu.","Kể từ ngày Nghị định có hiệu lực, hóa đơn đặt in của cơ quan thuế hết giá trị sử dụng; các bên đang sử dụng hóa đơn đặt in chưa hết phải tiêu hủy theo trình tự, thủ tục do Bộ trưởng Bộ Tài chính quy định."]},"nd254_45":{"tldr":"Điều 45 quy định trách nhiệm triển khai thi hành Nghị định của các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Bộ Tài chính và Ủy ban nhân dân cấp tỉnh; kèm theo Phụ lục quy định chi tiết nội dung bắt buộc thể hiện trên hóa đơn.","points":["Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ có trách nhiệm triển khai thực hiện Nghị định theo chức năng, nhiệm vụ được giao.","Bộ Tài chính có trách nhiệm hướng dẫn, tổ chức triển khai giải pháp hóa đơn điện tử.","Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương chỉ đạo các cơ quan, đơn vị trên địa bàn phối hợp triển khai thực hiện Nghị định.","Phụ lục kèm theo quy định chi tiết nội dung bắt buộc của hóa đơn, gồm tên/ký hiệu/số hóa đơn, thông tin người bán và người mua, thông tin hàng hóa dịch vụ và tiền thuế giá trị gia tăng, chữ ký và thời điểm ký số, chữ viết/chữ số/đồng tiền thể hiện, cùng các trường hợp hóa đơn điện tử không nhất thiết có đầy đủ nội dung."]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}
function buildForms(){
  var el=document.getElementById('s-forms');
  if(!D.forms||!D.forms.length){el.innerHTML='<div class="hint">Không có biểu mẫu.</div>';return;}
  var h='<div class="db">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>',pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns">'+e(f.pl)+'</div>';pl=f.pl;}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>'+
       '<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a>'+
       '<a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>'+
       (f.note?'<span class="form-note">'+e(f.note)+'</span>':'')+'</div>';
  });
  el.innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span> ...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải. File có thể chưa được upload lên hệ thống.');}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},700);}
});
/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
