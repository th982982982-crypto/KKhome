<script id="LD" type="application/json">{"meta":{"title":"Nghị định 254/2026/NĐ-CP — Quy định chi tiết thi hành Luật Quản lý thuế về hóa đơn điện tử, chứng từ điện tử","shortCode":"NĐ 254/2026","subtitle":"Hóa đơn điện tử, chứng từ điện tử (thay NĐ 123, NĐ 70)","slug":"nd254","effectiveDate":"01/07/2026","scope":"1. Quy định chi tiết khoản 6 Điều 26, khoản 4 Điều 27 Luật Quản lý thuế số 108/2025/QH15 bao gồm: a) Loại hóa đơn điện tử; đối tượng sử dụng; nội dung, thời điểm lập hóa đơn điện tử; trường hợp không phải sử dụng hóa đơn điện tử; trường hợp sử dụng hóa đơn điện tử được miễn phí dịch vụ; nhiệm vụ, quyền hạn, trách nhiệm của tổ chức, cá nhân trong việc quản lý, sử dụng hóa đơn điện tử; b) Loại chứng","description":"Hóa đơn điện tử, chứng từ điện tử (thay NĐ 123, NĐ 70)","related":[]},"outline":[{"id":"nd254_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Quy định chi tiết khoản 6 Điều 26, khoản 4 Điều 27 Luật Quản lý thuế số 108/2025/QH15 bao gồm:"},{"k":"p","t":"a) Loại hóa đơn điện tử; đối tượng sử dụng; nội dung, thời điểm lập hóa đơn điện tử; trường hợp không phải sử dụng hóa đơn điện tử; trường hợp sử dụng hóa đơn điện tử được miễn phí dịch vụ; nhiệm vụ, quyền hạn, trách nhiệm của tổ chức, cá nhân trong việc quản lý, sử dụng hóa đơn điện tử;"},{"k":"p","t":"b) Loại chứng từ điện tử; nội dung, thời điểm lập chứng từ điện tử; phương thức lập chứng từ điện tử, văn bản hành chính thuế điện tử; kết nối, truyền dữ liệu chứng từ điện tử; trường hợp sử dụng được miễn phí dịch vụ; nhiệm vụ, quyền hạn, trách nhiệm của tổ chức, cá nhân trong việc quản lý, sử dụng chứng từ điện tử."},{"k":"p","t":"2. Quy định các nội dung khác theo chức năng, nhiệm vụ đảm bảo yêu cầu quản lý theo quy định tại khoản 5 Điều 52 Luật Quản lý thuế số 108/2025/QH15 bao gồm:"},{"k":"p","t":"a) Nguyên tắc lập, quản lý, sử dụng hóa đơn điện tử, chứng từ điện tử; bảo quản, lưu trữ hóa đơn, chứng từ và chuyển đổi hóa đơn điện tử, chứng từ điện tử;"},{"k":"p","t":"b) Lập hóa đơn điện tử có mã của cơ quan thuế; lập hóa đơn điện tử không có mã của cơ quan thuế; xử lý sự cố; ủy nhiệm lập biên lai;"},{"k":"p","t":"c) Xây dựng thông tin hóa đơn điện tử, chứng từ điện tử gồm: nguyên tắc chung; xây dựng hạ tầng kỹ thuật công nghệ thông tin; hệ thống phần mềm phục vụ quản lý, vận hành, khai thác hệ thống thông tin hóa đơn điện tử, chứng từ điện tử; xây dựng, thu thập, xử lý và quản lý hệ thống thông tin về hóa đơn điện tử, chứng từ điện tử;"},{"k":"p","t":"d) Tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử gồm: nguyên tắc tra cứu, cung cấp, sử dụng thông tin hóa đơn điện tử; tra cứu thông tin hóa đơn điện tử phục vụ kiểm tra hàng hóa lưu thông trên thị trường; đối tượng cung cấp thông tin, sử dụng thông tin hóa đơn điện tử; hình thức khai thác, sử dụng thông tin hóa đơn điện tử trên Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"đ) Trách nhiệm của cơ quan thuế; trách nhiệm của bên sử dụng thông tin; trách nhiệm chia sẻ, kết nối thông tin, dữ liệu hóa đơn điện tử; khen thưởng người tiêu dùng tố giác người bán không lập và giao hóa đơn điện tử và kinh phí thực hiện."}]},{"id":"nd254_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ (sau đây gọi là người bán) bao gồm:"},{"k":"p","t":"a) Doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã được thành lập và hoạt động theo pháp luật Việt Nam; chi nhánh, văn phòng đại diện của doanh nghiệp nước ngoài hoạt động tại Việt Nam (sau đây gọi là tổ chức kinh tế);"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh, tổ hợp tác;"},{"k":"p","t":"c) Đơn vị sự nghiệp công lập có bán hàng hóa, cung cấp dịch vụ;"},{"k":"p","t":"d) Tổ chức không phải là doanh nghiệp nhưng có hoạt động kinh doanh;"},{"k":"p","t":"đ) Tổ chức nước ngoài (bao gồm cả chủ quản nền tảng thương mại điện tử, nền tảng số ở nước ngoài) có hoạt động kinh doanh trên nền tảng thương mại điện tử và các dịch vụ khác có phát sinh doanh thu tính thuế tại Việt Nam (sau đây gọi là nhà cung cấp nước ngoài) đăng ký tự nguyện sử dụng hóa đơn điện tử theo quy định tại Nghị định này."},{"k":"p","t":"2. Tổ chức, cá nhân mua hàng hóa, dịch vụ."},{"k":"p","t":"3. Tổ chức thu thuế, phí và lệ phí."},{"k":"p","t":"4. Người nộp thuế, phí và lệ phí."},{"k":"p","t":"5. Tổ chức, cá nhân có trách nhiệm khấu trừ thuế theo quy định của pháp luật thuế; tổ chức, cá nhân khai thay, nộp thuế thay theo quy định của pháp luật về thuế và pháp luật về quản lý thuế."},{"k":"p","t":"6. Tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử."},{"k":"p","t":"7. Cơ quan quản lý thuế."},{"k":"p","t":"8. Các tổ chức, cá nhân có liên quan đến việc quản lý, sử dụng hóa đơn và chứng từ."}]},{"id":"nd254_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Trong Nghị định này, các từ ngữ dưới đây được hiểu như sau:"},{"k":"p","t":"1. Hóa đơn điện tử có mã của cơ quan thuế là hóa đơn điện tử được cơ quan thuế cấp mã trước khi người bán gửi cho người mua."},{"k":"p","t":"Mã của cơ quan thuế trên hóa đơn điện tử bao gồm số giao dịch là một dãy số duy nhất do hệ thống của cơ quan thuế tạo ra và một chuỗi ký tự được cơ quan thuế mã hóa dựa trên thông tin của người bán lập trên hóa đơn điện tử."},{"k":"p","t":"2. Hóa đơn điện tử không có mã của cơ quan thuế là hóa đơn điện tử do tổ chức bán hàng hóa, cung cấp dịch vụ gửi cho người mua không có mã của cơ quan thuế."},{"k":"p","t":"3. Hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu điện tử với cơ quan thuế (sau đây gọi là hóa đơn điện tử từ máy tính tiền) là hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử không có mã của cơ quan thuế hoặc dữ liệu điện tử để người mua có thể truy xuất, kê khai thông tin hóa đơn điện tử khởi tạo từ máy tính tiền do tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ lập từ hệ thống tính tiền, dữ liệu được chuyển đến cơ quan thuế theo định dạng chuẩn dữ liệu."},{"k":"p","t":"4. Máy tính tiền là hệ thống tính tiền bao gồm một thiết bị điện tử đồng bộ hoặc một hệ thống gồm nhiều thiết bị điện tử được kết hợp với nhau bằng giải pháp công nghệ thông tin có chức năng chung như: tính tiền, lưu trữ các giao dịch bán hàng, số liệu bán hàng."},{"k":"p","t":"5. Hóa đơn, chứng từ hợp pháp là hóa đơn, chứng từ đảm bảo đúng về hình thức và nội dung theo quy định tại Nghị định này."},{"k":"p","t":"6. Hóa đơn, chứng từ giả là hóa đơn, chứng từ được in hoặc khởi tạo theo mẫu hóa đơn, chứng từ đã được thông báo phát hành của tổ chức, cá nhân khác hoặc in, khởi tạo trùng số của cùng một ký hiệu mẫu số hóa đơn, ký hiệu hóa đơn, chứng từ hoặc làm giả hóa đơn điện tử, chứng từ điện tử."},{"k":"p","t":"7. Sử dụng hóa đơn, chứng từ không hợp pháp là việc sử dụng hóa đơn, chứng từ giả; sử dụng hóa đơn, chứng từ chưa có giá trị sử dụng, hết giá trị sử dụng; sử dụng hóa đơn bị ngừng sử dụng trong thời gian bị cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn, trừ trường hợp được phép sử dụng theo thông báo của cơ quan thuế; sử dụng hóa đơn điện tử không đăng ký sử dụng với cơ quan thuế; sử dụng hóa đơn điện tử chưa có mã của cơ quan thuế đối với trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế; sử dụng hóa đơn mua hàng hóa, dịch vụ có ngày lập trên hóa đơn từ ngày cơ quan thuế xác định bên bán không hoạt động tại địa chỉ kinh doanh đã đăng ký với cơ quan nhà nước có thẩm quyền; sử dụng hóa đơn, chứng từ mua hàng hóa, dịch vụ có ngày lập trên hóa đơn, chứng từ trước ngày xác định bên lập hóa đơn, chứng từ không hoạt động tại địa chỉ kinh doanh đã đăng ký với cơ quan nhà nước có thẩm quyền hoặc chưa có thông báo của cơ quan thuế về việc bên lập hóa đơn, chứng từ không hoạt động tại địa chỉ kinh doanh đã đăng ký với cơ quan có thẩm quyền nhưng cơ quan thuế hoặc cơ quan công an hoặc các cơ quan chức năng khác đã có kết luận đó là hóa đơn, chứng từ không hợp pháp."},{"k":"p","t":"Sử dụng không hợp pháp hóa đơn, chứng từ là việc sử dụng hóa đơn, chứng từ tẩy xóa, sửa chữa không đúng quy định; sử dụng hóa đơn, chứng từ khống (hóa đơn, chứng từ đã ghi các chỉ tiêu, nội dung nghiệp vụ kinh tế nhưng việc mua bán hàng hóa, dịch vụ không có thật một phần hoặc toàn bộ); sử dụng hóa đơn phản ánh không đúng giá trị thực tế phát sinh hoặc lập hóa đơn khống, lập hóa đơn giả; sử dụng hóa đơn có sự chênh lệch về giá trị hàng hóa, dịch vụ hoặc sai lệch các tiêu thức bắt buộc giữa các liên của hóa đơn (đối với hóa đơn giấy đã phát hành, sử dụng trong giai đoạn trước khi chuyển sang hóa đơn điện tử); sử dụng hóa đơn để quay vòng khi vận chuyển hàng hóa trong khâu lưu thông hoặc dùng hóa đơn của hàng hóa, dịch vụ này để chứng minh cho hàng hóa, dịch vụ khác; sử dụng hóa đơn, chứng từ của tổ chức, cá nhân khác (trừ hóa đơn của cơ quan thuế và trường hợp được ủy nhiệm lập hóa đơn) để hợp thức hóa hàng hóa, dịch vụ mua vào hoặc hàng hóa, dịch vụ bán ra; sử dụng hóa đơn, chứng từ mà cơ quan thuế hoặc cơ quan công an hoặc các cơ quan chức năng khác đã kết luận là sử dụng không hợp pháp hóa đơn, chứng từ."},{"k":"p","t":"8. Tiêu hủy hóa đơn, chứng từ"},{"k":"p","t":"a) Tiêu hủy hóa đơn điện tử, chứng từ điện tử là biện pháp làm cho hóa đơn điện tử, chứng từ điện tử không còn tồn tại trên hệ thống thông tin, không thể truy cập và tham chiếu đến thông tin chứa trong hóa đơn điện tử, chứng từ điện tử;"},{"k":"p","t":"b) Tiêu hủy hóa đơn do cơ quan thuế đặt in, tiêu hủy chứng từ đặt in, tự in là việc sử dụng biện pháp đốt cháy, cắt, xé nhỏ hoặc hình thức tiêu hủy khác, đảm bảo hóa đơn, chứng từ đã tiêu hủy sẽ không thể sử dụng lại các thông tin, số liệu trên đó."},{"k":"p","t":"Hóa đơn, chứng từ được phép tiêu hủy là hóa đơn, chứng từ đã hết thời hạn lưu trữ theo quy định tại Điều 5 Nghị định này."},{"k":"p","t":"9. Tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử là tổ chức cung cấp giải pháp lập, truyền, lưu trữ, hóa đơn điện tử, chứng từ điện tử. Tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử bao gồm: Tổ chức cung cấp giải pháp lập hóa đơn điện tử, chứng từ điện tử cho người bán và người mua; tổ chức truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế."},{"k":"p","t":"10. Cơ sở dữ liệu hóa đơn điện tử, chứng từ điện tử là tập hợp các dữ liệu thông tin về hóa đơn, chứng từ điện tử của các tổ chức, tổ chức kinh tế, cá nhân khi bán hàng hóa, cung cấp dịch vụ và thông tin về chứng từ điện tử của các tổ chức, tổ chức kinh tế, cá nhân sử dụng."},{"k":"p","t":"11. Các từ ngữ được quy định tại Nghị định này có nghĩa như quy định tại Luật Quản lý thuế."}]},{"id":"nd254_4","no":4,"code":"Điều 4","title":"Điều 4. Nguyên tắc lập, quản lý, sử dụng hóa đơn, chứng từ điện tử","shortTitle":"Nguyên tắc lập, quản lý, sử dụng hóa đơn, chứng từ điện tử","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Khi bán hàng hóa, cung cấp dịch vụ, người bán phải lập hóa đơn điện tử để giao cho người mua (bao gồm cả các trường hợp hàng hóa, dịch vụ dùng để khuyến mại, quảng cáo, hàng mẫu; hàng hóa, dịch vụ dùng để cho, biếu, tặng, trao đổi, trả thay lương cho người lao động và tiêu dùng nội bộ; xuất hàng hóa dưới các hình thức cho vay, cho mượn) và các trường hợp lập hóa đơn theo quy định của Bộ trưởng Bộ Tài chính, trừ các trường hợp không phải sử dụng hóa đơn điện tử theo quy định tại Điều 7 Nghị định này."},{"k":"p","t":"Hóa đơn điện tử phải theo định dạng chuẩn dữ liệu và phải ghi đầy đủ nội dung theo quy định của pháp luật về thuế, pháp luật về kế toán và quy định tại Điều 10 Nghị định này, bảo đảm phản ánh đầy đủ, trung thực nội dung nghiệp vụ kinh tế phát sinh. Người bán chịu trách nhiệm trước pháp luật về tính chính xác của hóa đơn đã lập."},{"k":"p","t":"2. Khi khấu trừ thuế thu nhập cá nhân, khi thu thuế, phí, lệ phí, tổ chức, cá nhân khấu trừ thuế, tổ chức thu thuế, phí, lệ phí phải lập chứng từ khấu trừ thuế điện tử, biên lai thu thuế, phí, lệ phí điện tử giao cho người có thu nhập bị khấu trừ thuế, người nộp thuế, nộp phí, lệ phí và phải ghi đầy đủ các nội dung theo quy định tại Điều 23 Nghị định này và theo định dạng chuẩn dữ liệu."},{"k":"p","t":"3. Trước khi sử dụng hóa đơn điện tử, chứng từ điện tử, tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh, tổ chức, cá nhân khấu trừ thuế thu nhập cá nhân, tổ chức thu thuế, phí, lệ phí phải thực hiện đăng ký sử dụng hóa đơn điện tử, chứng từ điện tử theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"Việc đăng ký, quản lý, sử dụng hóa đơn điện tử, chứng từ điện tử phải tuân thủ các quy định của pháp luật về giao dịch điện tử, kế toán, thuế, quản lý thuế, phí và lệ phí và quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"4. Dữ liệu hóa đơn, chứng từ điện tử khi bán hàng hóa, cung cấp dịch vụ, dữ liệu chứng từ khi thực hiện các giao dịch nộp thuế, khấu trừ thuế và nộp các khoản thuế, phí, lệ phí là cơ sở dữ liệu để phục vụ công tác quản lý thuế và cung cấp thông tin hóa đơn điện tử, chứng từ điện tử cho các tổ chức, cá nhân có liên quan."},{"k":"p","t":"5. Người bán hàng hóa, cung cấp dịch vụ được ủy nhiệm cho bên thứ ba lập hóa đơn điện tử cho hoạt động bán hàng hóa, cung cấp dịch vụ. Bộ trưởng Bộ Tài chính hướng dẫn cụ thể nội dung này."},{"k":"p","t":"6. Tổ chức thu phí, lệ phí được ủy nhiệm cho bên thứ ba lập biên lai thu phí, lệ phí. Biên lai được ủy nhiệm cho bên thứ ba vẫn ghi tên của tổ chức thu phí, lệ phí là bên ủy nhiệm. Việc ủy nhiệm phải được xác định bằng văn bản giữa bên ủy nhiệm và bên nhận ủy nhiệm thể hiện đầy đủ các thông tin về biên lai ủy nhiệm (mục đích ủy nhiệm; thời hạn ủy nhiệm; phương thức thanh toán biên lai ủy nhiệm) và phải thông báo cho cơ quan thuế khi thông báo phát hành biên lai."},{"k":"p","t":"7. Trường hợp tổ chức thu thuế, phí, lệ phí và người cung cấp dịch vụ cùng thực hiện thu thuế, phí, lệ phí và tiền bán hàng hóa, cung cấp dịch vụ của một khách hàng thì được tích hợp biên lai thu thuế, phí, lệ phí và hóa đơn trên cùng một định dạng điện tử để giao cho người mua. Hóa đơn điện tử tích hợp phải đảm bảo có đủ nội dung của hóa đơn điện tử, biên lai điện tử và theo đúng định dạng chuẩn dữ liệu. Người bán hàng hóa, cung cấp dịch vụ và tổ chức thu thuế, phí, lệ phí có trách nhiệm thỏa thuận về đơn vị chịu trách nhiệm lập hóa đơn điện tử tích hợp cho khách hàng và phải thông báo đến cơ quan thuế quản lý trực tiếp theo mẫu do Bộ trưởng Bộ Tài chính quy định. Việc kê khai doanh thu của người bán hàng hóa, cung cấp dịch vụ và việc kê khai thuế, phí, lệ phí thực hiện theo quy định của pháp luật quản lý thuế."}]},{"id":"nd254_5","no":5,"code":"Điều 5","title":"Điều 5. Bảo quản, lưu trữ hóa đơn, chứng từ và chuyển đổi hóa đơn điện tử, chứng từ điện tử","shortTitle":"Bảo quản, lưu trữ hóa đơn, chứng từ và chuyển đổi hóa đơn điện tử, chứng từ điện tử","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hóa đơn, chứng từ được bảo quản, lưu trữ đảm bảo:"},{"k":"p","t":"a) Tính an toàn, bảo mật, toàn vẹn, đầy đủ, không bị thay đổi, sai lệch trong suốt thời gian lưu trữ;"},{"k":"p","t":"b) Lưu trữ đúng và đủ thời hạn theo quy định của pháp luật kế toán."},{"k":"p","t":"2. Hóa đơn điện tử, chứng từ điện tử được bảo quản, lưu trữ dưới dạng thông điệp dữ liệu. Cơ quan, tổ chức, cá nhân được quyền lựa chọn và áp dụng hình thức bảo quản, lưu trữ hóa đơn điện tử, chứng từ điện tử phù hợp với đặc thù hoạt động, khả năng ứng dụng công nghệ và đáp ứng đủ các yêu cầu theo quy định tại Điều 13 Luật Giao dịch điện tử. Hóa đơn điện tử, chứng từ điện tử phải sẵn sàng in được ra giấy hoặc tra cứu được khi có yêu cầu."},{"k":"p","t":"3. Hóa đơn do cơ quan thuế đặt in, chứng từ đặt in, tự in phải bảo quản, lưu trữ đúng với yêu cầu sau:"},{"k":"p","t":"a) Hóa đơn, chứng từ chưa lập được lưu trữ, bảo quản trong kho theo chế độ lưu trữ bảo quản chứng từ có giá;"},{"k":"p","t":"b) Hóa đơn, chứng từ đã lập trong các đơn vị kế toán được lưu trữ theo quy định lưu trữ, bảo quản chứng từ kế toán;"},{"k":"p","t":"c) Hóa đơn, chứng từ đã lập trong các tổ chức, hộ, cá nhân không phải là đơn vị kế toán được lưu trữ và bảo quản như tài sản riêng của tổ chức, hộ, cá nhân đó."},{"k":"p","t":"4. Chuyển đổi hóa đơn điện tử, chứng từ điện tử thành hóa đơn, chứng từ giấy"},{"k":"p","t":"a) Việc chuyển đổi hóa đơn điện tử, chứng từ điện tử thành hóa đơn, chứng từ giấy phải bảo đảm sự khớp đúng giữa nội dung của hóa đơn điện tử, chứng từ điện tử và hóa đơn, chứng từ giấy sau khi chuyển đổi, đáp ứng yêu cầu tại khoản 2 Điều 12 Luật Giao dịch điện tử;"},{"k":"p","t":"b) Hóa đơn điện tử, chứng từ điện tử hợp pháp được chuyển đổi thành hóa đơn, chứng từ giấy trong các trường hợp sau:"},{"k":"p","t":"b.1) Theo yêu cầu của cơ quan kiểm toán, thanh tra, kiểm tra, điều tra và theo quy định của pháp luật về thanh tra, kiểm tra và điều tra;"},{"k":"p","t":"b.2) Theo nghiệp vụ kinh tế, tài chính phát sinh để phục vụ việc ghi sổ, theo dõi theo quy định của pháp luật về kế toán. Hóa đơn chuyển đổi trong trường hợp này không có hiệu lực để giao dịch, thanh toán, trừ trường hợp hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối chuyển dữ liệu với cơ quan thuế theo quy định tại Nghị định này."}]},{"id":"nd254_6","no":6,"code":"Điều 6","title":"Điều 6. Đối tượng sử dụng hóa đơn điện tử","shortTitle":"Đối tượng sử dụng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng sử dụng hóa đơn điện tử gồm:"},{"k":"p","t":"a) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh và các trường hợp rủi ro cao về thuế theo quy định của Bộ trưởng Bộ Tài chính sử dụng hóa đơn điện tử có mã của cơ quan thuế khi bán hàng hóa, cung cấp dịch vụ, trừ trường hợp quy định tại điểm b, điểm c khoản này;"},{"k":"p","t":"b) Doanh nghiệp kinh doanh ở lĩnh vực điện lực, xăng dầu, bưu chính, viễn thông, nước sạch, tài chính ngân hàng, chứng khoán, tài sản mã hóa, dịch vụ hỗ trợ giao dịch trên sàn giao dịch các-bon, bảo hiểm, y tế, kinh doanh thương mại điện tử, kinh doanh siêu thị, thương mại, vận tải hàng không, đường bộ, đường sắt, đường biển, đường thủy và tổ chức kinh tế đã hoặc sẽ thực hiện giao dịch với cơ quan thuế bằng phương tiện điện tử, xây dựng hạ tầng công nghệ thông tin, có hệ thống phần mềm kế toán, phần mềm lập hóa đơn điện tử đáp ứng lập, tra cứu hóa đơn điện tử, lưu trữ dữ liệu hóa đơn điện tử theo quy định, bảo đảm việc truyền dữ liệu hóa đơn điện tử đến người mua và đến cơ quan thuế thì được sử dụng hóa đơn điện tử không có mã của cơ quan thuế khi bán hàng hóa, cung cấp dịch vụ trừ trường hợp rủi ro cao về thuế theo quy định của Bộ trưởng Bộ Tài chính và trường hợp đăng ký sử dụng hóa đơn điện tử có mã của cơ quan thuế;"},{"k":"p","t":"c) Tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh có hoạt động bán hàng hóa, cung cấp dịch vụ, trong đó có bán hàng hóa, cung cấp dịch vụ trực tiếp đến người tiêu dùng (trung tâm thương mại; siêu thị; bán lẻ (trừ ô tô, mô tô, xe máy và xe có động cơ khác); ăn uống; nhà hàng; khách sạn; dịch vụ vận tải hành khách, dịch vụ hỗ trợ trực tiếp cho vận tải đường bộ, dịch vụ nghệ thuật, vui chơi, giải trí, hoạt động chiếu phim, dịch vụ phục vụ cá nhân khác theo quy định về Hệ thống ngành kinh tế Việt Nam) sử dụng hóa đơn điện tử từ máy tính tiền."},{"k":"p","t":"Trường hợp tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh có hoạt động bán hàng hóa, cung cấp dịch vụ trực tiếp đến người tiêu dùng đã đăng ký sử dụng hóa đơn điện tử theo quy định tại điểm a, điểm b khoản này thì không bắt buộc đăng ký sử dụng hóa đơn điện tử từ máy tính tiền;"},{"k":"p","t":"d) Hộ kinh doanh, cá nhân kinh doanh có doanh thu năm trên 01 tỷ đồng hoặc hộ kinh doanh, cá nhân kinh doanh bán tài sản phải đăng ký quyền sở hữu, quyền sử dụng thì phải áp dụng hóa đơn điện tử có mã của cơ quan thuế, hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế."},{"k":"p","t":"Hộ kinh doanh, cá nhân kinh doanh không thuộc trường hợp sử dụng hóa đơn điện tử mà có nhu cầu sử dụng hóa đơn điện tử thì đăng ký sử dụng hóa đơn điện tử có mã của cơ quan thuế hoặc hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế."},{"k":"p","t":"2. Đối tượng cơ quan thuế cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh"},{"k":"p","t":"a) Cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh là hóa đơn bán hàng trong các trường hợp:"},{"k":"p","t":"a.1) Tổ chức không kinh doanh nhưng có phát sinh giao dịch bán hàng hóa, cung cấp dịch vụ thuộc đối tượng chịu thuế theo quy định của pháp luật thuế giá trị gia tăng, thuế thu nhập doanh nghiệp và các loại thuế khác (nếu có);"},{"k":"p","t":"a.2) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thuộc diện nộp thuế giá trị gia tăng theo phương pháp trực tiếp thuộc các trường hợp sau:"},{"k":"p","t":"a.2.1) Ngừng hoạt động kinh doanh nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế có phát sinh thanh lý tài sản, hàng hóa cần có hóa đơn để giao cho người mua;"},{"k":"p","t":"a.2.2) Tạm ngừng hoạt động kinh doanh nhưng cần có hóa đơn giao cho khách hàng để thực hiện các hợp đồng đã ký trước ngày cơ quan thuế thông báo tạm ngừng kinh doanh;"},{"k":"p","t":"a.2.3) Bị cơ quan thuế cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn;"},{"k":"p","t":"a.2.4) Doanh nghiệp đang làm thủ tục phá sản nhưng vẫn có hoạt động kinh doanh dưới sự giám sát của Tòa án;"},{"k":"p","t":"a. 2.5) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh trong thời gian giải trình hoặc bổ sung tài liệu theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"b) Cấp hóa đơn điện tử có mã của cơ quan thuế theo từng lần phát sinh là hóa đơn giá trị gia tăng trong các trường hợp:"},{"k":"p","t":"b.1) Tổ chức kinh tế, tổ chức khác thuộc diện nộp thuế giá trị gia tăng theo phương pháp khấu trừ thuộc các trường hợp sau:"},{"k":"p","t":"b.1.1) Ngừng hoạt động kinh doanh nhưng chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế có phát sinh thanh lý tài sản, hàng hóa cần có hóa đơn để giao cho người mua;"},{"k":"p","t":"b.1.2) Tạm ngừng hoạt động kinh doanh cần có hóa đơn giao cho khách hàng để thực hiện các hợp đồng đã ký trước ngày cơ quan nhà nước có thẩm quyền thông báo tạm ngừng kinh doanh;"},{"k":"p","t":"b.1.3) Bị cơ quan thuế cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn;"},{"k":"p","t":"b.1.4) Doanh nghiệp đang làm thủ tục phá sản nhưng vẫn có hoạt động kinh doanh dưới sự giám sát của Tòa án;"},{"k":"p","t":"b.1.5) Tổ chức kinh tế, tổ chức khác trong thời gian giải trình hoặc bổ sung tài liệu theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"b.2) Tổ chức, cơ quan nhà nước không thuộc đối tượng nộp thuế giá trị gia tăng theo phương pháp khấu trừ có bán đấu giá tài sản (trừ trường hợp bán tài sản công nêu tại khoản 4 Điều 8 Nghị định này), trường hợp giá trúng đấu giá là giá bán đã có thuế giá trị gia tăng được công bố rõ trong hồ sơ bán đấu giá do cơ quan có thẩm quyền phê duyệt thì được cấp hóa đơn giá trị gia tăng để giao cho người mua;"},{"k":"p","t":"c) Cấp hóa đơn bán tài sản công có mã của cơ quan thuế theo từng lần phát sinh trong trường hợp cơ quan được giao nhiệm vụ tổ chức xử lý tài sản công là người nộp thuế giá trị gia tăng bị cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn;"},{"k":"p","t":"d) Trình tự, thủ tục cấp hóa đơn điện tử theo từng lần phát sinh tại khoản này theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"3. Quy định về áp dụng hóa đơn điện tử, đối với một số trường hợp cụ thể theo yêu cầu quản lý như sau:"},{"k":"p","t":"a) Trường hợp nhận nhập khẩu hàng hóa ủy thác, nếu cơ sở kinh doanh nhận nhập khẩu ủy thác đã nộp thuế giá trị gia tăng ở khâu nhập khẩu thì sử dụng hóa đơn điện tử khi trả hàng cho cơ sở kinh doanh ủy thác nhập khẩu. Nếu chưa nộp thuế giá trị gia tăng ở khâu nhập khẩu, khi xuất trả hàng nhập khẩu ủy thác, cơ sở nhận ủy thác lập phiếu xuất kho kiêm vận chuyển nội bộ theo quy định làm chứng từ lưu thông hàng hóa trên thị trường."},{"k":"p","t":"b) Trường hợp ủy thác xuất khẩu hàng hóa:"},{"k":"p","t":"b.1) Khi xuất hàng giao cho cơ sở nhận ủy thác, cơ sở có hàng hóa ủy thác xuất khẩu sử dụng phiếu xuất kho kiêm vận chuyển nội bộ;"},{"k":"p","t":"b.2) Cơ sở nhận ủy thác xuất khẩu làm thủ tục xuất khẩu theo quy định của pháp luật hải quan. Khi hàng hóa đã thực xuất khẩu có xác nhận của cơ quan hải quan, căn cứ vào các chứng từ đối chiếu, xác nhận về số lượng, giá trị hàng hóa thực tế xuất khẩu của cơ sở nhận ủy thác xuất khẩu, cơ sở có hàng hóa ủy thác xuất khẩu lập hóa đơn giá trị gia tăng điện tử hoặc hóa đơn bán hàng điện tử cho cơ sở nhận ủy thác xuất khẩu. Cơ sở nhận ủy thác xuất khẩu lập hóa đơn giá trị gia tăng điện tử hoặc hóa đơn bán hàng điện tử để thu phí ủy thác của cơ sở có hàng hóa ủy thác."},{"k":"p","t":"c) Cơ sở kinh doanh có hàng hóa, dịch vụ xuất khẩu (kể cả cơ sở gia công hàng hóa xuất khẩu) khi xuất khẩu hàng hóa, dịch vụ sử dụng hóa đơn điện tử: hóa đơn thương mại điện tử hoặc hóa đơn giá trị gia tăng điện tử hoặc hóa đơn bán hàng điện tử. Thời điểm lập hóa đơn thực hiện theo quy định tại khoản 1 Điều 9 Nghị định này."},{"k":"p","t":"Khi xuất hàng hóa để vận chuyển đến cửa khẩu hay đến nơi làm thủ tục xuất khẩu, cơ sở sử dụng phiếu xuất kho kiêm vận chuyển nội bộ hoặc hóa đơn thương mại điện tử hoặc hóa đơn điện tử theo quy định làm chứng từ lưu thông hàng hóa trên thị trường."},{"k":"p","t":"d) Tổ chức kinh doanh kê khai, nộp thuế giá trị gia tăng theo phương pháp khấu trừ xuất điều chuyển hàng hóa cho các cơ sở hạch toán phụ thuộc như các chi nhánh, cửa hàng ở khác địa phương khác (tỉnh, thành phố trực thuộc trung ương) để bán hoặc xuất điều chuyển giữa các chi nhánh, đơn vị phụ thuộc với nhau; xuất hàng hóa cho cơ sở nhận làm đại lý bán đúng giá, hưởng hoa hồng, căn cứ vào phương thức tổ chức kinh doanh và hạch toán kế toán, cơ sở có thể lựa chọn một trong hai cách sử dụng hóa đơn, chứng từ như sau:"},{"k":"p","t":"d.1) Sử dụng hóa đơn giá trị gia tăng điện tử để làm căn cứ thanh toán và kê khai nộp thuế giá trị gia tăng ở từng đơn vị và từng khâu độc lập với nhau;"},{"k":"p","t":"d.2) Sử dụng phiếu xuất kho kiêm vận chuyển nội bộ; sử dụng phiếu xuất kho hàng gửi bán đại lý theo quy định đối với hàng hóa xuất cho cơ sở làm đại lý."},{"k":"p","t":"Cơ sở hạch toán phụ thuộc, chi nhánh, cửa hàng, cơ sở nhận làm đại lý bán hàng khi bán hàng phải lập hóa đơn theo quy định giao cho người mua, đồng thời lập bảng kê hàng hóa bán ra gửi về cơ sở có hàng hóa điều chuyển hoặc cơ sở có hàng hóa gửi bán (gọi chung là cơ sở giao hàng) để cơ sở giao hàng lập hóa đơn giá trị gia tăng cho hàng hóa thực tế tiêu thụ giao cho cơ sở hạch toán phụ thuộc, chi nhánh, cửa hàng, cơ sở nhận làm đại lý bán hàng."},{"k":"p","t":"Trường hợp cơ sở có số lượng và doanh số hàng hóa bán ra lớn, bảng kê có thể lập cho 05 ngày hay 10 ngày một lần. Trường hợp hàng hóa bán ra có thuế suất thuế giá trị gia tăng khác nhau phải lập bảng kê riêng cho hàng hóa bán ra theo từng nhóm thuế suất."},{"k":"p","t":"Cơ sở hạch toán phụ thuộc, chi nhánh, cửa hàng, cơ sở nhận làm đại lý bán hàng thực hiện kê khai nộp thuế giá trị gia tăng đối với số hàng xuất bán cho người mua và được kê khai, khấu trừ thuế giá trị gia tăng đầu vào theo hóa đơn giá trị gia tăng của cơ sở giao hàng xuất cho."},{"k":"p","t":"đ) Tổ chức, cá nhân xuất hàng hóa bán lưu động sử dụng phiếu xuất kho kiêm vận chuyển nội bộ theo quy định, khi bán hàng lập hóa đơn điện tử theo quy định."},{"k":"p","t":"e) Trường hợp tài sản điều chuyển giữa các đơn vị hạch toán độc lập hoặc giữa các đơn vị thành viên có tư cách pháp nhân đầy đủ trong cùng một tổ chức thì tổ chức có tài sản điều chuyển phải lập hóa đơn điện tử như bán hàng hóa."},{"k":"p","t":"g) Tổ chức cho thuê tài chính cho thuê tài sản thuộc đối tượng chịu thuế giá trị gia tăng phải lập hóa đơn theo quy định"},{"k":"p","t":"g.1) Tổ chức cho thuê tài chính cho thuê tài sản thuộc đối tượng chịu thuế giá trị gia tăng phải có hóa đơn giá trị gia tăng mua vào (đối với tài sản mua trong nước) hoặc chứng từ nộp thuế giá trị gia tăng ở khâu nhập khẩu (đối với tài sản nhập khẩu); khi lập hóa đơn, tổng số tiền thuế giá trị gia tăng trên hóa đơn giá trị gia tăng đầu ra phải khớp với số tiền thuế giá trị gia tăng trên hóa đơn giá trị gia tăng đầu vào của tài sản cho thuê tài chính (hoặc chứng từ nộp thuế giá trị gia tăng khâu nhập khẩu), thuế suất thể hiện ký hiệu “CTTC”. Các trường hợp tài sản mua để cho thuê thuộc đối tượng không chịu thuế giá trị gia tăng hoặc không có hóa đơn giá trị gia tăng hoặc không có chứng từ nộp thuế giá trị gia tăng ở khâu nhập khẩu thì khi lập hóa đơn không được thể hiện thuế giá trị gia tăng trên hóa đơn;"},{"k":"p","t":"g.2) Việc lập hóa đơn đối với hoạt động cho thuê tài chính như sau:"},{"k":"p","t":"Trường hợp tổ chức cho thuê tài chính chuyển giao một lần toàn bộ số thuế giá trị gia tăng trên hóa đơn tài sản mua cho thuê tài chính cho bên đi thuê tài chính thì trên hóa đơn giá trị gia tăng thu tiền lần đầu của dịch vụ cho thuê tài chính, tổ chức cho thuê tài chính thể hiện rõ: thanh toán dịch vụ cho thuê tài chính và thuế giá trị gia tăng đầu vào của tài sản cho thuê tài chính hoặc thanh toán thuế giá trị gia tăng đầu vào của tài sản cho thuê tài chính, tiền hàng thể hiện giá trị dịch vụ cho thuê tài chính (không bao gồm thuế giá trị gia tăng của tài sản), thuế suất thể hiện ký hiệu “CTTC”, tiền thuế giá trị gia tăng thể hiện bằng tiền thuế giá trị gia tăng đầu vào của tài sản cho thuê tài chính."},{"k":"p","t":"g.3) Xử lý lập hóa đơn khi hợp đồng cho thuê tài chính chấm dứt trước thời hạn:"},{"k":"p","t":"Thu hồi tài sản cho thuê tài chính: Trường hợp tổ chức cho thuê tài chính và bên đi thuê lựa chọn khấu trừ toàn bộ số thuế giá trị gia tăng của tài sản cho thuê, bên đi thuê điều chỉnh thuế giá trị gia tăng đã khấu trừ tính trên giá trị còn lại chưa có thuế giá trị gia tăng xác định theo biên bản thu hồi tài sản để chuyển giao cho tổ chức cho thuê tài chính. Trên hóa đơn giá trị gia tăng thể hiện rõ: số tiền thuế giá trị gia tăng xuất trả của tài sản thu hồi; thuế suất thể hiện ký hiệu “CTTC”; số thuế giá trị gia tăng tính trên giá trị còn lại chưa có thuế giá trị gia tăng xác định theo biên bản thu hồi tài sản."},{"k":"p","t":"Bán tài sản thu hồi: Tổ chức cho thuê tài chính khi bán tài sản thu hồi phải lập hóa đơn giá trị gia tăng theo quy định giao cho khách hàng."},{"k":"p","t":"h) Việc lập hóa đơn đối với các bên tham gia hợp đồng hợp tác kinh doanh"},{"k":"p","t":"h.1) Trường hợp các bên tham gia hợp đồng hợp tác kinh doanh phân chia doanh thu và có thỏa thuận cử một bên làm đại diện có trách nhiệm lập hóa đơn cho khách hàng thì các bên còn lại trong hợp đồng hợp tác kinh doanh lập hóa đơn cho bên đại diện phần doanh thu được chia cho từng bên theo hợp đồng;"},{"k":"p","t":"h.2) Trường hợp các bên tham gia hợp đồng hợp tác kinh doanh theo phân chia chi phí và có thỏa thuận cử một bên làm đại diện có trách nhiệm nhận hóa đơn của người bán thì bên đại diện nhận hóa đơn lập hóa đơn để phân chia phần chi phí cho các bên còn lại theo hợp đồng."}]},{"id":"nd254_7","no":7,"code":"Điều 7","title":"Điều 7. Trường hợp không phải sử dụng hóa đơn điện tử","shortTitle":"Trường hợp không phải sử dụng hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Hộ kinh doanh, cá nhân kinh doanh bán hàng hóa, dịch vụ thuộc trường hợp lập bảng kê thu mua hàng hóa, dịch vụ theo quy định pháp luật về thuế thu nhập doanh nghiệp trừ trường hợp đăng ký sử dụng hóa đơn điện tử."},{"k":"p","t":"2. Hộ kinh doanh, cá nhân kinh doanh có thu nhập từ hoạt động cho thuê bất động sản; thu nhập từ hoạt động cung cấp sản phẩm và dịch vụ nội dung thông tin số về giải trí, trò chơi điện tử, phim số, ảnh số, nhạc số, quảng cáo số cho tổ chức, cá nhân ở nước ngoài."},{"k":"p","t":"3. Hộ kinh doanh, cá nhân kinh doanh làm đại lý xổ số, đại lý bảo hiểm, đại lý bán hàng đa cấp mà doanh nghiệp xổ số, bảo hiểm, bán hàng đa cấp đã khấu trừ thuế theo quy định pháp luật quản lý thuế."},{"k":"p","t":"4. Các khoản phí và các khoản thu khác phát sinh từ hoạt động tái bảo hiểm (bao gồm nhượng tái bảo hiểm, các khoản thu hoa hồng nhượng tái bảo hiểm và các khoản thu khác về nhượng tái bảo hiểm), nhận tiền gửi, hoạt động tài chính (phát hành chứng chỉ tiền gửi, phát hành chứng khoán sơ cấp, phát hành giấy tờ có giá), bán nợ, giao dịch ngoại tệ và sản phẩm phái sinh."},{"k":"p","t":"Đối với giao dịch bán ngoại tệ, căn cứ hệ thống quản lý dữ liệu của đơn vị, cuối tháng đơn vị thực hiện lập bảng tổng hợp chi tiết giao dịch phát sinh trong tháng, chịu trách nhiệm về tính chính xác nội dung thông tin từng giao dịch và cung cấp bảng tổng hợp chi tiết giao dịch bán ngoại tệ khi cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền yêu cầu."},{"k":"p","t":"5. Góp vốn bằng tài sản của tổ chức, cá nhân kinh doanh vào tổ chức kinh tế."},{"k":"p","t":"6. Tài sản điều chuyển từ công ty mẹ đến các đơn vị thành viên hạch toán phụ thuộc và ngược lại, giữa các đơn vị thành viên hạch toán phụ thuộc trong cơ sở kinh doanh; tài sản điều chuyển khi chia, tách, hợp nhất, sáp nhập, chuyển đổi loại hình doanh nghiệp."},{"k":"p","t":"7. Máy móc, thiết bị cho mượn là tài sản cố định và công cụ, dụng cụ phục vụ gia công hàng hóa của bên cho mượn, không thu tiền, không chuyển quyền sở hữu."},{"k":"p","t":"8. Các trường hợp theo quy định tại điểm a, điểm b khoản 1 Điều 6, điểm b khoản 1 Điều 14 Nghị định số 181/2025/NĐ-CP của Chính phủ quy định chi tiết thi hành một số điều của Luật Thuế giá trị gia tăng, bao gồm:"},{"k":"p","t":"a) Hàng hóa, dịch vụ sử dụng để tiếp tục quá trình sản xuất, kinh doanh của cơ sở kinh doanh như hàng hóa được xuất để chuyển kho nội bộ, xuất vật tư, bán thành phẩm để tiếp tục quá trình sản xuất, kinh doanh trong một cơ sở kinh doanh;"},{"k":"p","t":"b) Hàng hóa, dịch vụ do cơ sở kinh doanh xuất hoặc cung cấp để sử dụng phục vụ hoạt động sản xuất, kinh doanh (bao gồm cả tài sản cố định do cơ sở kinh doanh tự xây dựng, tự sản xuất);"},{"k":"p","t":"c) Các khoản thu không liên quan đến bán hàng hóa, cung cấp dịch vụ của cơ sở kinh doanh: các khoản thu về bồi thường bằng tiền (bao gồm cả tiền bồi thường về đất và tài sản trên đất khi bị thu hồi đất theo quyết định của cơ quan nhà nước có thẩm quyền), tiền thưởng, thu đòi người thứ ba của hoạt động bảo hiểm, các khoản thu hộ, các khoản thù lao từ cơ quan nhà nước do thực hiện hoạt động thu hộ, chi hộ các cơ quan nhà nước, các khoản thu tài chính."}]},{"id":"nd254_8","no":8,"code":"Điều 8","title":"Điều 8. Loại hóa đơn","shortTitle":"Loại hóa đơn","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"Hóa đơn quy định tại Nghị định này gồm các loại sau:"},{"k":"p","t":"1. Hóa đơn giá trị gia tăng là hóa đơn dành cho các tổ chức kinh tế khai thuế giá trị gia tăng theo phương pháp khấu trừ sử dụng cho các hoạt động:"},{"k":"p","t":"a) Bán hàng hóa, cung cấp dịch vụ trong nội địa;"},{"k":"p","t":"b) Hoạt động vận tải quốc tế;"},{"k":"p","t":"c) Xuất vào khu phi thuế quan và các trường hợp được coi như xuất khẩu;"},{"k":"p","t":"d) Xuất khẩu hàng hóa, cung cấp dịch vụ ra nước ngoài;"},{"k":"p","t":"đ) Hoạt động kinh doanh thương mại điện tử, kinh doanh dựa trên nền tảng số và các dịch vụ khác của nhà cung cấp ở nước ngoài không có cơ sở thường trú tại Việt Nam."},{"k":"p","t":"2. Hóa đơn bán hàng là hóa đơn dành cho các tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh như sau:"},{"k":"p","t":"a) Tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh khai, tính thuế giá trị gia tăng theo phương pháp trực tiếp sử dụng cho các hoạt động:"},{"k":"p","t":"a.1) Bán hàng hóa, cung cấp dịch vụ trong nội địa;"},{"k":"p","t":"a.2) Hoạt động vận tải quốc tế;"},{"k":"p","t":"a.3) Xuất vào khu phi thuế quan và các trường hợp được coi như xuất khẩu;"},{"k":"p","t":"а.4) Xuất khẩu hàng hóa, cung cấp dịch vụ ra nước ngoài."},{"k":"p","t":"b) Tổ chức kinh tế, cá nhân trong khu phi thuế quan khi bán hàng hóa, cung cấp dịch vụ vào nội địa và khi bán hàng hóa, cung cấp dịch vụ giữa các tổ chức kinh tế, cá nhân trong khu phi thuế quan với nhau, xuất khẩu hàng hóa, cung cấp dịch vụ ra nước ngoài, trên hóa đơn ghi rõ “Dành cho tổ chức, cá nhân trong khu phi thuế quan”."},{"k":"p","t":"Doanh nghiệp chế xuất có hoạt động kinh doanh khác (ngoài hoạt động chế xuất theo quy định pháp luật về khu công nghiệp, khu chế xuất) khai thuế giá trị gia tăng theo phương pháp trực tiếp thì sử dụng hóa đơn theo điểm a khoản này. Doanh nghiệp chế xuất khai thuế giá trị gia tăng theo phương pháp khấu trừ thì sử dụng hóa đơn theo quy định tại khoản 1 Điều này."},{"k":"p","t":"3. Hóa đơn thương mại điện tử là hóa đơn áp dụng đối với các tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh (người xuất khẩu) có hoạt động xuất khẩu hàng hóa, cung cấp dịch vụ ra nước ngoài mà người xuất khẩu đáp ứng điều kiện chuyển dữ liệu hóa đơn thương mại bằng phương thức điện tử đến cơ quan thuế. Hóa đơn thương mại điện tử đáp ứng quy định về nội dung theo quy định tại Điều 10 Nghị định này và theo định dạng chuẩn dữ liệu."},{"k":"p","t":"Trường hợp người xuất khẩu không đáp ứng điều kiện chuyển dữ liệu hóa đơn thương mại bằng phương thức điện tử đến cơ quan thuế thì lựa chọn lập hóa đơn giá trị gia tăng điện tử hoặc hóa đơn bán hàng điện tử."},{"k":"p","t":"4. Hóa đơn điện tử bán tài sản công được sử dụng khi bán, chuyển nhượng các tài sản công thực hiện theo quy định của pháp luật về quản lý, sử dụng tài sản công."},{"k":"p","t":"5. Hóa đơn điện tử bán hàng dự trữ quốc gia được sử dụng khi các cơ quan, đơn vị thuộc hệ thống cơ quan dự trữ nhà nước bán hàng dự trữ quốc gia theo quy định của pháp luật."},{"k":"p","t":"6. Các loại hóa đơn khác, gồm:"},{"k":"p","t":"a) Tem, vé, thẻ theo định dạng chuẩn dữ liệu và nội dung theo quy định tại Nghị định này;"},{"k":"p","t":"b) Phiếu thu tiền cước vận chuyển hàng không; chứng từ thu cước phí vận tải quốc tế; chứng từ thu phí dịch vụ ngân hàng trừ trường hợp quy định tại điểm a khoản này có hình thức và nội dung được lập theo thông lệ quốc tế và các quy định của pháp luật có liên quan."},{"k":"p","t":"7. Các chứng từ được đăng ký, sử dụng và quản lý như hóa đơn gồm phiếu xuất kho kiêm vận chuyển nội bộ, phiếu xuất kho hàng gửi bán đại lý."},{"k":"p","t":"8. Bộ Tài chính hướng dẫn mẫu hiển thị các loại hóa đơn để các đối tượng nêu tại Điều 2 Nghị định này tham khảo trong quá trình thực hiện."},{"k":"p","t":"9. Hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế đảm bảo nguyên tắc sau:"},{"k":"p","t":"a) Nhận biết được hóa đơn in từ máy tính tiền kết nối dữ liệu điện tử với cơ quan thuế;"},{"k":"p","t":"b) Không bắt buộc có chữ ký số;"},{"k":"p","t":"c) Khoản chi mua hàng hóa, dịch vụ sử dụng hóa đơn (tra thông tin từ Hệ thống thông tin quản lý thuế) được khởi tạo từ máy tính tiền được xác định là khoản chi có đủ hóa đơn, chứng từ hợp pháp khi xác định nghĩa vụ thuế."}]},{"id":"nd254_9","no":9,"code":"Điều 9","title":"Điều 9. Thời điểm lập hóa đơn","shortTitle":"Thời điểm lập hóa đơn","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời điểm lập hóa đơn đối với bán hàng hóa (bao gồm cả bán, chuyển nhượng tài sản công và bán hàng dự trữ quốc gia) là thời điểm chuyển giao quyền sở hữu hoặc quyền sử dụng hàng hóa cho người mua, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"Đối với xuất khẩu hàng hóa (bao gồm cả gia công xuất khẩu), thời điểm lập hóa đơn thương mại điện tử, hóa đơn giá trị gia tăng điện tử hoặc hóa đơn bán hàng điện tử do người bán tự xác định nhưng chậm nhất không quá ngày làm việc tiếp theo kể từ ngày hàng hóa được thông quan theo quy định pháp luật về hải quan."},{"k":"p","t":"2. Thời điểm lập hóa đơn đối với cung cấp dịch vụ là thời điểm hoàn thành việc cung cấp dịch vụ (bao gồm cả cung cấp dịch vụ cho tổ chức, cá nhân nước ngoài) không phân biệt đã thu được tiền hay chưa thu được tiền. Trường hợp người cung cấp dịch vụ có thu tiền trước hoặc trong khi cung cấp dịch vụ thì thời điểm lập hóa đơn là thời điểm thu tiền (không bao gồm trường hợp thu tiền đặt cọc theo quy định Bộ luật Dân sự để đảm bảo thực hiện hợp đồng cung cấp dịch vụ)."},{"k":"p","t":"3. Trường hợp giao hàng nhiều lần hoặc bàn giao từng hạng mục, công đoạn dịch vụ thì mỗi lần giao hàng hoặc bàn giao đều phải lập hóa đơn cho khối lượng, giá trị hàng hóa, dịch vụ được giao tương ứng."},{"k":"p","t":"4. Thời điểm lập hóa đơn đối với một số trường hợp cụ thể như sau:"},{"k":"p","t":"a) Đối với các trường hợp bán hàng hóa, cung cấp dịch vụ với số lượng lớn, phát sinh thường xuyên, cần có thời gian đối soát số liệu giữa doanh nghiệp bán hàng hóa, cung cấp dịch vụ và khách hàng, đối tác gồm: trường hợp cung cấp dịch vụ hỗ trợ trực tiếp cho vận tải hàng không, cung ứng nhiên liệu hàng không cho các hãng hàng không, hoạt động cung cấp điện (trừ đối tượng quy định tại điểm g khoản này), cung cấp dịch vụ hỗ trợ vận tải đường sắt, nước, dịch vụ truyền hình, dịch vụ quảng cáo truyền hình, dịch vụ thương mại điện tử, dịch vụ bưu chính và chuyển phát (bao gồm cả dịch vụ đại lý, dịch vụ thu hộ, chi hộ), dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng), dịch vụ logistic, dịch vụ hoa tiêu hàng hải, dịch vụ quảng cáo trên các trang báo điện tử, dịch vụ công nghệ số, nền tảng số, dịch vụ công nghệ thông tin (bao gồm dịch vụ trung gian thanh toán sử dụng trên nền tảng viễn thông, công nghệ thông tin, trừ trường hợp quy định tại điểm b khoản này) được bán theo kỳ nhất định, dịch vụ ngân hàng (trừ hoạt động cho vay), chuyển tiền quốc tế, dịch vụ chứng khoán, dịch vụ tài sản mã hóa, dịch vụ hỗ trợ giao dịch trên sàn giao dịch các-bon, xổ số điện toán, thu phí sử dụng đường bộ giữa nhà đầu tư và nhà cung cấp dịch vụ thu phí, dịch vụ bảo hiểm; dịch vụ bảo vệ, dịch vụ cung cấp suất ăn công nghiệp, dịch vụ của sở giao dịch hàng hóa, dịch vụ thông tin tín dụng, dịch vụ kinh doanh vận tải hành khách (bằng xe taxi, xe hợp đồng, xe mô tô hai bánh sử dụng phần mềm hỗ trợ kết nối vận tải theo pháp luật về đường bộ) cung cấp dịch vụ cho khách hàng là các doanh nghiệp, tổ chức và các trường hợp khác theo hướng dẫn của Bộ trưởng Bộ Tài chính, thời điểm lập hóa đơn là thời điểm hoàn thành việc đối soát dữ liệu giữa các bên nhưng chậm nhất không quá ngày 07 của tháng sau tháng phát sinh việc cung cấp dịch vụ hoặc không quá 07 ngày kể từ ngày kết thúc kỳ quy ước. Kỳ quy ước để làm căn cứ tính lượng hàng hóa, dịch vụ cung cấp căn cứ thỏa thuận giữa đơn vị bán hàng hóa, cung cấp dịch vụ với người mua;"},{"k":"p","t":"b) Đối với dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng), dịch vụ công nghệ thông tin (bao gồm dịch vụ trung gian thanh toán sử dụng trên nền tảng viễn thông, công nghệ thông tin), sản phẩm, dịch vụ về dữ liệu phải thực hiện đối soát dữ liệu kết nối giữa các cơ sở kinh doanh dịch vụ, thời điểm lập hóa đơn là thời điểm hoàn thành việc đối soát dữ liệu về cước dịch vụ theo hợp đồng kinh tế giữa các cơ sở kinh doanh dịch vụ nhưng chậm nhất không quá 02 tháng kể từ tháng phát sinh cước dịch vụ."},{"k":"p","t":"Trường hợp cung cấp dịch vụ viễn thông (bao gồm cả dịch vụ viễn thông giá trị gia tăng) thông qua bán thẻ trả trước, thu cước phí hòa mạng khi khách hàng đăng ký sử dụng dịch vụ mà khách hàng không yêu cầu xuất hóa đơn giá trị gia tăng hoặc không cung cấp tên, địa chỉ, mã số thuế thì cuối mỗi ngày hoặc định kỳ trong tháng, cơ sở kinh doanh dịch vụ lập chung một hóa đơn giá trị gia tăng ghi nhận tổng giá trị thẻ trả trước hoặc cước phí hòa mạng đã bán mà người mua không lấy hóa đơn hoặc không cung cấp tên, địa chỉ, mã số thuế."},{"k":"p","t":"c) Đối với hoạt động xây dựng, lắp đặt, thời điểm lập hóa đơn là thời điểm nghiệm thu, bàn giao công trình, hạng mục công trình, khối lượng xây dựng, lắp đặt hoàn thành, không phân biệt đã thu được tiền hay chưa thu được tiền;"},{"k":"p","t":"d) Đối với tổ chức kinh doanh bất động sản, xây dựng cơ sở hạ tầng, xây dựng nhà để bán, chuyển nhượng:"},{"k":"p","t":"d.1) Trường hợp chưa chuyển giao quyền sở hữu, quyền sử dụng có thực hiện thu tiền theo tiến độ thực hiện dự án hoặc tiến độ thu tiền ghi trong hợp đồng thì thời điểm lập hóa đơn là ngày thu tiền hoặc theo thỏa thuận thanh toán trong hợp đồng;"},{"k":"p","t":"d.2) Trường hợp đã chuyển giao quyền sở hữu, quyền sử dụng, thời điểm lập hóa đơn thực hiện theo quy định tại khoản 1 Điều này."},{"k":"p","t":"đ) Đối với các trường hợp tổ chức kinh doanh mua dịch vụ vận tải hàng không xuất qua website và hệ thống thương mại điện tử được lập theo thông lệ quốc tế, thời điểm lập hóa đơn chậm nhất không quá 05 ngày kế tiếp kể từ ngày chứng từ dịch vụ vận tải hàng không xuất ra trên hệ thống website và hệ thống thương mại điện tử;"},{"k":"p","t":"e) Đối với hoạt động tìm kiếm thăm dò, khai thác và chế biến dầu thô, thời điểm lập hóa đơn bán dầu thô, condensate, các sản phẩm được chế biến từ dầu thô (bao gồm cả hoạt động bao tiêu sản phẩm theo cam kết của Chính phủ) là thời điểm bên mua và bên bán xác định được giá bán chính thức, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"Đối với hoạt động bán khí thiên nhiên, khí đồng hành, khí than được chuyển bằng đường ống dẫn khí đến người mua, thời điểm lập hóa đơn là thời điểm bên mua, bên bán xác định khối lượng khí giao của tháng nhưng chậm nhất là ngày cuối cùng của thời hạn kê khai, nộp thuế đối với tháng phát sinh nghĩa vụ thuế theo quy định pháp luật về thuế."},{"k":"p","t":"Trường hợp thỏa thuận bảo lãnh và cam kết của Chính phủ có quy định khác về thời điểm lập hóa đơn thì thực hiện theo quy định tại thỏa thuận bảo lãnh và cam kết của Chính phủ."},{"k":"p","t":"g) Đối với hoạt động bán điện của các công ty phát điện trên thị trường điện thì thời điểm lập hóa đơn điện tử được xác định căn cứ thời điểm về đối soát số liệu thanh toán giữa đơn vị vận hành hệ thống điện và thị trường điện, đơn vị phát điện và đơn vị mua điện theo quy định của Bộ Công Thương hoặc hợp đồng mua bán điện đã được Bộ Công Thương hướng dẫn, phê duyệt nhưng chậm nhất là ngày cuối cùng của thời hạn kê khai, nộp thuế đối với tháng phát sinh nghĩa vụ thuế theo quy định pháp luật về thuế. Riêng hoạt động bán điện của các công ty phát điện có cam kết bảo lãnh của Chính phủ về thời điểm thanh toán thì thời điểm lập hóa đơn điện tử căn cứ theo bảo lãnh của Chính phủ, hướng dẫn và phê duyệt của Bộ Công Thương và các hợp đồng mua bán điện đã được ký kết giữa bên mua điện và bên bán điện;"},{"k":"p","t":"h) Đối với trường hợp bán xăng, dầu tại các cửa hàng bán lẻ cho khách hàng, thời điểm lập hóa đơn là thời điểm kết thúc việc bán xăng, dầu theo từng lần bán;"},{"k":"p","t":"i) Đối với trường hợp cung cấp dịch vụ vận tải hàng không (bao gồm cả trường hợp đại lý bán đúng giá hưởng hoa hồng của hãng hàng không), dịch vụ bảo hiểm qua đại lý, thời điểm lập hóa đơn là thời điểm hoàn thành việc đối soát dữ liệu giữa các bên nhưng chậm nhất không quá ngày 10 của tháng sau tháng phát sinh;"},{"k":"p","t":"k) Đối với hoạt động cho vay của tổ chức tín dụng, thời điểm lập hóa đơn được xác định theo kỳ hạn thu lãi tại thỏa thuận cho vay giữa tổ chức tín dụng và khách hàng đi vay, trừ trường hợp đến kỳ hạn thu lãi không thu được thì thời điểm lập hóa đơn là thời điểm thu được tiền lãi vay của khách hàng. Trường hợp trả lãi trước hạn theo thỏa thuận cho vay, thời điểm lập hóa đơn là thời điểm thu lãi trước hạn;"},{"k":"p","t":"l) Đối với kinh doanh vận tải hành khách bằng xe taxi có sử dụng phần mềm tính tiền theo quy định của pháp luật: tại thời điểm kết thúc chuyến đi, doanh nghiệp, hợp tác xã kinh doanh vận tải hành khách bằng xe taxi có sử dụng phần mềm tính tiền thực hiện lập hóa đơn điện tử cho khách hàng đồng thời chuyển dữ liệu hóa đơn đến cơ quan thuế theo quy định;"},{"k":"p","t":"m) Đối với cơ sở khám bệnh, chữa bệnh có sử dụng phần mềm quản lý khám bệnh, chữa bệnh và quản lý viện phí, từng giao dịch khám bệnh, chữa bệnh và thực hiện các dịch vụ chụp, chiếu, xét nghiệm có in phiếu thu tiền (thu viện phí hoặc tiền khám, chụp, chiếu, xét nghiệm) và có lưu trên hệ thống công nghệ thông tin, nếu khách hàng (người đến khám, chữa bệnh) không có nhu cầu lấy hóa đơn thì cuối ngày cơ sở khám bệnh, chữa bệnh căn cứ thông tin khám, chữa bệnh và thông tin từ phiếu thu tiền để tổng hợp lập hóa đơn điện tử cho các dịch vụ y tế thực hiện trong ngày, trường hợp khách hàng yêu cầu lập hóa đơn điện tử thì cơ sở khám bệnh, chữa bệnh lập hóa đơn điện tử giao cho khách hàng."},{"k":"p","t":"Cơ sở khám bệnh, chữa bệnh lập hóa đơn cho cơ quan bảo hiểm xã hội tại thời điểm được cơ quan bảo hiểm xã hội thanh, quyết toán chi phí khám bệnh, chữa bệnh cho người có thẻ bảo hiểm y tế;"},{"k":"p","t":"n) Đối với hoạt động thu phí dịch vụ sử dụng đường bộ theo hình thức điện tử không dừng, ngày lập hóa đơn điện tử là ngày xe lưu thông qua trạm thu phí. Trường hợp khách hàng sử dụng dịch vụ thu phí đường bộ theo hình thức điện tử không dừng có một hoặc nhiều phương tiện cùng sử dụng dịch vụ nhiều lần trong tháng, đơn vị cung cấp dịch vụ có thể lập hóa đơn điện tử theo định kỳ, ngày lập hóa đơn điện tử chậm nhất là ngày cuối cùng của tháng phát sinh dịch vụ thu phí. Nội dung hóa đơn liệt kê chi tiết từng lượt xe lưu thông qua các trạm thu phí (bao gồm: thời gian xe qua trạm, giá phí sử dụng đường bộ của từng lượt xe);"},{"k":"p","t":"o) Đối với hoạt động kinh doanh bảo hiểm, thời điểm lập hóa đơn là thời điểm ghi nhận doanh thu bảo hiểm theo quy định của pháp luật về kinh doanh bảo hiểm (trừ trường hợp quy định của điểm a, điểm i khoản này)."},{"k":"p","t":"Đối với hợp đồng đồng bảo hiểm: khi thu phí bảo hiểm, từng doanh nghiệp đồng bảo hiểm lập hóa đơn cho khách hàng theo phí bảo hiểm nhận được. Trường hợp ủy quyền cho một doanh nghiệp thu hộ phí bảo hiểm thì doanh nghiệp thu hộ thực hiện lập hóa đơn cho khách hàng trên toàn bộ giá trị hợp đồng và doanh nghiệp nhờ thu hộ lập hóa đơn cho doanh nghiệp thu hộ đối với phí bảo hiểm được hưởng theo thỏa thuận của các bên. Khi mua hàng hóa, dịch vụ để bồi thường hoặc thanh toán các khoản chi khác liên quan đến hợp đồng đồng bảo hiểm, trường hợp một doanh nghiệp bảo hiểm được ủy quyền chi hộ thì doanh nghiệp chi hộ thực hiện lập hóa đơn khi thu đòi các doanh nghiệp bảo hiểm nhờ chi hộ;"},{"k":"p","t":"p) Đối với hoạt động kinh doanh vé xổ số truyền thống, xổ số biết kết quả ngay (vé xổ số) theo hình thức bán vé số in sẵn đủ mệnh giá cho khách hàng thì sau khi thu hồi vé xổ số không tiêu thụ hết và chậm nhất là trước khi mở thưởng của kỳ tiếp theo, doanh nghiệp kinh doanh xổ số lập 01 hóa đơn giá trị gia tăng điện tử có mã của cơ quan thuế cho từng đại lý là tổ chức, cá nhân cho vé xổ số được bán trong kỳ gửi cơ quan thuế cấp mã cho hóa đơn;"},{"k":"p","t":"q) Đối với hoạt động kinh doanh casino và trò chơi điện tử có thưởng, thời điểm lập hóa đơn điện tử chậm nhất là 01 ngày kể từ thời điểm kết thúc ngày xác định doanh thu, đồng thời doanh nghiệp kinh doanh casino và trò chơi điện tử có thưởng chuyển dữ liệu ghi nhận số tiền thu được (do đổi đồng tiền quy ước cho người chơi tại quầy, tại bàn chơi và số tiền thu tại máy trò chơi điện tử có thưởng) trừ đi số tiền đối trả cho người chơi (do người chơi trúng thưởng hoặc người chơi không sử dụng hết) theo mẫu do Bộ trưởng Bộ Tài chính quy định đến cơ quan thuế cùng thời điểm chuyển dữ liệu hóa đơn điện tử. Ngày xác định doanh thu là khoảng thời gian từ 06:00:00 sáng đến 05:59:59 ngày hôm sau. Trường hợp pháp luật chuyên ngành có quy định khác thì thực hiện theo pháp luật chuyên ngành;"},{"k":"p","t":"r) Đối với doanh nghiệp cung cấp các dịch vụ cho cá nhân là người tiêu dùng: dịch vụ ngân hàng; dịch vụ trung gian thanh toán; dịch vụ thông tin tín dụng; kinh doanh chứng khoán; giao dịch tài sản mã hóa; dịch vụ hỗ trợ giao dịch trên sàn giao dịch các-bon; kinh doanh bảo hiểm; dịch vụ chuyển tiền qua ví điện tử; dịch vụ ngừng, cấp điện trở lại; dịch vụ thương mại điện tử; dịch vụ bưu chính, vận chuyển trực tiếp phục vụ hoạt động thương mại điện tử; dịch vụ vận tải hành khách công cộng bằng tàu điện, xe buýt; kinh doanh vận tải hành khách bằng xe taxi, xe hợp đồng, xe mô tô hai bánh; dịch vụ trông giữ xe; hoạt động chiếu phim và các dịch vụ khác, đáp ứng điều kiện có hệ thống phần mềm quản lý chi tiết từng giao dịch, có dữ liệu thu tiền được lưu trữ trên hệ thống theo từng giao dịch thì cơ sở dữ liệu thông tin chi tiết giao dịch phát sinh của doanh nghiệp được chuyển đến cơ quan thuế theo quy định tại điểm a.2 khoản 3 Điều 16 Nghị định này. Người bán chịu trách nhiệm về tính chính xác của thông tin giao dịch, lưu trữ đầy đủ dữ liệu chi tiết của từng giao dịch, bảo đảm khả năng truy xuất, đối chiếu và cung cấp dữ liệu, chứng từ liên quan theo yêu cầu của cơ quan thuế hoặc cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"5. Trường hợp người bán không có phần mềm lập hóa đơn tự động có phát sinh giao dịch bán hàng hóa, cung cấp dịch vụ trong giờ làm việc ban đêm theo quy định của Bộ luật Lao động, thời điểm lập hóa đơn chậm nhất là ngày làm việc tiếp theo."}]},{"id":"nd254_10","no":10,"code":"Điều 10","title":"Điều 10. Nội dung của hóa đơn","shortTitle":"Nội dung của hóa đơn","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Hóa đơn phải có các nội dung sau:"},{"k":"p","t":"a) Tên hóa đơn, ký hiệu hóa đơn, ký hiệu mẫu số hóa đơn;"},{"k":"p","t":"b) Số hóa đơn;"},{"k":"p","t":"c) Tên, địa chỉ, mã số thuế của người bán;"},{"k":"p","t":"d) Tên, địa chỉ, mã số thuế hoặc mã số đơn vị có quan hệ với ngân sách hoặc số định danh cá nhân của người mua;"},{"k":"p","t":"đ) Tên, đơn vị tính, số lượng, đơn giá hàng hóa, dịch vụ; thành tiền chưa có thuế giá trị gia tăng, thuế suất thuế giá trị gia tăng, tổng số tiền thuế giá trị gia tăng theo từng loại thuế suất, tổng cộng tiền thuế giá trị gia tăng, tổng tiền thanh toán đã có thuế giá trị gia tăng;"},{"k":"p","t":"e) Chữ ký của người bán, chữ ký của người mua: Trên hóa đơn điện tử không nhất thiết phải có chữ ký số của người mua (trừ trường hợp người mua, người bán có thỏa thuận);"},{"k":"p","t":"g) Thời điểm lập hóa đơn thực hiện theo hướng dẫn tại Điều 9 Nghị định này và được hiển thị theo định dạng ngày, tháng, năm của năm dương lịch;"},{"k":"p","t":"h) Thời điểm ký số trên hóa đơn điện tử;"},{"k":"p","t":"i) Mã của cơ quan thuế đối với hóa đơn điện tử có mã của cơ quan thuế;"},{"k":"p","t":"k) Phí, lệ phí thuộc ngân sách nhà nước, chiết khấu thương mại, khuyến mại (nếu có) và các nội dung khác liên quan (nếu có)."},{"k":"p","t":"2. Chữ viết, chữ số và đồng tiền thể hiện trên hóa đơn."},{"k":"p","t":"3. Quy định chi tiết nội dung của hóa đơn tại khoản 1 và khoản 2 Điều này và một số trường hợp hóa đơn điện tử không nhất thiết có đầy đủ các nội dung được quy định tại Phụ lục kèm theo Nghị định này."},{"k":"p","t":"4. Hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế có các nội dung sau đây:"},{"k":"p","t":"a) Tên, địa chỉ, mã số thuế người bán;"},{"k":"p","t":"b) Tên, địa chỉ, mã số thuế/số định danh cá nhân/số điện thoại của người mua theo quy định (nếu người mua yêu cầu);"},{"k":"p","t":"c) Tên hàng hóa, dịch vụ, đơn giá, số lượng, giá thanh toán. Trường hợp tổ chức kinh tế nộp thuế theo phương pháp khấu trừ phải ghi rõ nội dung giá bán chưa thuế giá trị gia tăng, thuế suất thuế giá trị gia tăng, tiền thuế giá trị gia tăng, tổng tiền thanh toán có thuế giá trị gia tăng;"},{"k":"p","t":"d) Thời điểm lập hóa đơn;"},{"k":"p","t":"đ) Mã của cơ quan thuế đối với hóa đơn điện tử có mã của cơ quan thuế hoặc dữ liệu điện tử để người mua có thể truy xuất, kê khai thông tin hóa đơn điện tử từ máy tính tiền."},{"k":"p","t":"Người bán gửi hóa đơn điện tử cho người mua bằng hình thức điện tử (tin nhắn, thư điện tử và các hình thức khác) hoặc cung cấp đường dẫn hoặc mã QR để người mua tra cứu, tải hóa đơn điện tử."},{"k":"p","t":"5. Nội dung khác trên hóa đơn"},{"k":"p","t":"Đối với hóa đơn bán hàng của hộ kinh doanh, cá nhân kinh doanh, khuyến khích người bán thể hiện thông tin nhóm ngành nghề tương ứng với hàng hóa, dịch vụ trên dữ liệu hóa đơn điện tử theo định dạng XML gửi cơ quan thuế. Trường hợp hàng hóa, dịch vụ thuộc đối tượng không chịu thuế thì thể hiện tương ứng trên hóa đơn. Thông tin nhóm ngành nghề (nếu có) được hiển thị trên bản thể hiện hóa đơn điện tử."},{"k":"p","t":"Ngoài các nội dung hướng dẫn từ khoản 1 đến khoản 3 Điều này, tổ chức kinh tế, tổ chức, hộ kinh doanh, cá nhân kinh doanh có thể tạo thêm thông tin về biểu trưng hay lo-go để thể hiện nhãn hiệu, thương hiệu hay hình ảnh đại diện của người bán. Tùy theo đặc điểm, tính chất giao dịch và yêu cầu quản lý, trên hóa đơn có thể thể hiện thông tin về hợp đồng mua bán, lệnh vận chuyển, mã khách hàng và các thông tin khác."},{"k":"p","t":"6. Nội dung hóa đơn bán tài sản công thực hiện theo Mẫu số 07/TSC-HĐ ban hành kèm theo Nghị định số 186/2025/NĐ-CP của Chính phủ quy định chi tiết một số điều của Luật Quản lý, sử dụng tài sản công."},{"k":"p","t":"7. Hóa đơn giá trị gia tăng kiêm tờ khai hoàn thuế đảm bảo nội dung quy định tại Điều này và theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"8. Bộ trưởng Bộ Tài chính quy định nội dung của hóa đơn điện tử đối với một số trường hợp khác theo yêu cầu quản lý."}]},{"id":"nd254_11","no":11,"code":"Điều 11","title":"Điều 11. Trường hợp sử dụng hóa đơn điện tử được miễn phí dịch vụ","shortTitle":"Trường hợp sử dụng hóa đơn điện tử được miễn phí dịch vụ","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp nhỏ và vừa, hợp tác xã, liên hiệp hợp tác xã, hộ kinh doanh, cá nhân kinh doanh tại địa bàn có điều kiện kinh tế - xã hội khó khăn, địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn thuộc trường hợp sử dụng hóa đơn điện tử được miễn phí dịch vụ trong thời gian 12 tháng kể từ khi sử dụng hóa đơn điện tử. Địa bàn có điều kiện kinh tế - xã hội khó khăn, địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn thực hiện theo Danh mục địa bàn ưu đãi đầu tư theo quy định pháp luật về đầu tư."},{"k":"p","t":"Cục Thuế thực hiện hoặc ủy thác cho tổ chức cung cấp dịch vụ về hóa đơn điện tử thực hiện cung cấp hóa đơn điện tử được miễn phí dịch vụ cho đối tượng nêu trên."},{"k":"p","t":"2. Cơ quan thuế hoặc cơ quan được giao nhiệm vụ tổ chức, xử lý tài sản công theo quy định pháp luật về quản lý, sử dụng tài sản công lập hóa đơn điện tử thông qua Hệ thống thông tin quản lý thuế hoặc tổ chức cung cấp dịch vụ hóa đơn điện tử được Cục Thuế ủy thác cung cấp dịch vụ hóa đơn điện tử miễn phí dịch vụ."},{"k":"p","t":"3. Các tổ chức kinh tế, hộ kinh doanh, cá nhân kinh doanh không thuộc trường hợp quy định tại khoản 1 Điều này khi sử dụng hóa đơn điện tử thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử thực hiện trả tiền dịch vụ theo hợp đồng ký giữa các bên."},{"k":"p","t":"4. Doanh nghiệp nhỏ và vừa, hợp tác xã, liên hiệp hợp tác xã, hộ kinh doanh, cá nhân kinh doanh quy định tại khoản 1 Điều này được đăng ký, thay đổi thông tin đăng ký sử dụng hóa đơn điện tử qua Hệ thống thông tin quản lý thuế theo quy định của Bộ trưởng Bộ Tài chính."}]},{"id":"nd254_12","no":12,"code":"Điều 12","title":"Điều 12. Lập hóa đơn điện tử có mã của cơ quan thuế","shortTitle":"Lập hóa đơn điện tử có mã của cơ quan thuế","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Lập hóa đơn điện tử có mã của cơ quan thuế"},{"k":"p","t":"a) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh thuộc đối tượng quy định tại Điều 6 Nghị định này truy cập Hệ thống thông tin quản lý thuế để thực hiện: lập hóa đơn bán hàng hóa, cung cấp dịch vụ; ký số trên các hóa đơn đã lập và gửi hóa đơn để cơ quan thuế cấp mã;"},{"k":"p","t":"b) Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh sử dụng hóa đơn điện tử có mã của cơ quan thuế thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử thì truy cập vào trang thông tin điện tử của tổ chức cung cấp dịch vụ hóa đơn điện tử hoặc sử dụng phần mềm hóa đơn điện tử của đơn vị để thực hiện lập hóa đơn bán hàng hóa, cung cấp dịch vụ; ký số trên các hóa đơn đã lập và gửi hóa đơn qua tổ chức cung cấp dịch vụ hóa đơn điện tử để cơ quan thuế cấp mã."},{"k":"p","t":"2. Cấp mã hóa đơn"},{"k":"p","t":"a) Hóa đơn được cơ quan thuế cấp mã phải đảm bảo:"},{"k":"p","t":"a.1) Đầy đủ nội dung về hóa đơn điện tử theo quy định tại Điều 10 Nghị định này;"},{"k":"p","t":"a.2) Đúng định dạng về hóa đơn điện tử theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"a.3) Đúng thông tin đăng ký theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"a.4) Không thuộc trường hợp ngừng sử dụng hóa đơn điện tử có mã của cơ quan thuế theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"b) Hệ thống cấp mã hóa đơn của Cục Thuế tự động thực hiện cấp mã hóa đơn và gửi trả kết quả cấp mã hóa đơn cho người gửi."},{"k":"p","t":"3. Tổ chức kinh tế, tổ chức khác, hộ kinh doanh, cá nhân kinh doanh bán hàng hóa, cung cấp dịch vụ có trách nhiệm gửi hóa đơn điện tử đã được cấp mã của cơ quan thuế cho người mua. Phương thức gửi và nhận hóa đơn được thực hiện theo thỏa thuận giữa người bán và người mua, đảm bảo phù hợp với quy định của pháp luật về giao dịch điện tử."}]},{"id":"nd254_13","no":13,"code":"Điều 13","title":"Điều 13. Lập hóa đơn điện tử không có mã của cơ quan thuế","shortTitle":"Lập hóa đơn điện tử không có mã của cơ quan thuế","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"Doanh nghiệp sử dụng phần mềm để lập hóa đơn điện tử khi bán hàng hóa, cung cấp dịch vụ, ký số trên hóa đơn điện tử và gửi cho người mua bằng phương thức điện tử theo thỏa thuận giữa người bán và người mua, đảm bảo phù hợp với quy định của pháp luật về giao dịch điện tử."}]},{"id":"nd254_14","no":14,"code":"Điều 14","title":"Điều 14. Xử lý sự cố","shortTitle":"Xử lý sự cố","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Trường hợp người bán hàng hóa, cung cấp dịch vụ sử dụng hóa đơn điện tử có mã của cơ quan thuế nhưng gặp sự cố dẫn đến không sử dụng được hóa đơn điện tử có mã của cơ quan thuế thì liên hệ với cơ quan thuế hoặc tổ chức cung cấp dịch vụ để hỗ trợ xử lý sự cố. Trong thời gian xử lý sự cố, người bán hàng hóa, cung cấp dịch vụ có yêu cầu sử dụng hóa đơn điện tử có mã của cơ quan thuế thì đến cơ quan thuế để sử dụng hóa đơn điện tử có mã của cơ quan thuế."},{"k":"p","t":"2. Trường hợp sự cố từ hệ thống cấp mã của cơ quan thuế"},{"k":"p","t":"Trường hợp hệ thống cấp mã hóa đơn điện tử của cơ quan thuế gặp sự cố kỹ thuật dẫn đến gián đoạn việc cấp mã, Cục Thuế có trách nhiệm: kích hoạt hệ thống dự phòng để bảo đảm hoạt động cấp mã; thông báo công khai trên Trang thông tin điện tử của Cục Thuế về phạm vi ảnh hưởng, thời điểm bắt đầu và dự kiến thời gian khắc phục; trường hợp cần thiết, ủy quyền cho tổ chức cung cấp dịch vụ hóa đơn điện tử đủ điều kiện thực hiện cấp mã theo quy định."},{"k":"p","t":"3. Trường hợp do lỗi hệ thống hạ tầng kỹ thuật của tổ chức cung cấp dịch vụ hóa đơn điện tử thì tổ chức cung cấp dịch vụ hóa đơn điện tử có trách nhiệm thông báo cho người bán được biết, phối hợp với Cục Thuế để được hỗ trợ kịp thời. Tổ chức cung cấp dịch vụ hóa đơn điện tử phải khắc phục nhanh nhất sự cố, có biện pháp hỗ trợ người bán lập hóa đơn điện tử để gửi cơ quan thuế cấp mã trong thời gian ngắn nhất."},{"k":"p","t":"4. Trường hợp Hệ thống thông tin quản lý thuế gặp lỗi kỹ thuật chưa tiếp nhận được dữ liệu hóa đơn điện tử không có mã, Cục Thuế có trách nhiệm thông báo trên Trang thông tin điện tử của Cục Thuế. Trong thời gian này tổ chức kinh tế, tổ chức khác, tổ chức cung cấp dịch vụ hóa đơn điện tử tạm thời chưa chuyển dữ liệu hóa đơn không có mã đến cơ quan thuế."},{"k":"p","t":"Trong vòng 02 ngày làm việc kể từ ngày Cục Thuế có thông báo Hệ thống thông tin quản lý thuế hoạt động trở lại bình thường, tổ chức kinh tế, tổ chức khác, tổ chức cung cấp dịch vụ hóa đơn điện tử chuyển dữ liệu hóa đơn đến cơ quan thuế."},{"k":"p","t":"5. Trong trường hợp bất khả kháng theo quy định tại khoản 21 Điều 4 Luật Quản lý thuế số 108/2025/QH15 gồm chiến tranh, bạo loạn, đình công phải ngừng, nghỉ sản xuất, kinh doanh hoặc rủi ro không thuộc nguyên nhân, trách nhiệm chủ quan của người bán mà người bán hoặc cơ quan thuế không thể thực hiện việc lập, cấp mã hoặc truyền dữ liệu hóa đơn điện tử đúng thời hạn:"},{"k":"p","t":"a) Trong vòng 03 ngày làm việc kể từ ngày sự cố được khắc phục, người bán được thực hiện việc lập và gửi hóa đơn điện tử tới cơ quan thuế;"},{"k":"p","t":"b) Người bán có trách nhiệm ghi chép sổ sách kế toán về giao dịch mua bán, lưu giữ tài liệu chứng minh trường hợp bất khả kháng theo quy định."},{"k":"p","t":"6. Việc lập, gửi hóa đơn, chuyển dữ liệu hóa đơn quá thời hạn do các nguyên nhân trên được xác định là trường hợp bất khả kháng theo quy định pháp luật về quản lý thuế."}]},{"id":"nd254_15","no":15,"code":"Điều 15","title":"Điều 15. Trách nhiệm của người bán hàng hóa, cung cấp dịch vụ sử dụng hóa đơn điện tử có mã của cơ quan thuế","shortTitle":"Trách nhiệm của người bán hàng hóa, cung cấp dịch vụ sử dụng hóa đơn điện tử có mã của cơ quan thuế","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Quản lý tên và mật khẩu của các tài khoản đã được cơ quan thuế cấp."},{"k":"p","t":"2. Tạo lập hóa đơn điện tử để gửi đến cơ quan thuế cấp mã và chịu trách nhiệm trước pháp luật về tính hợp pháp, chính xác của hóa đơn điện tử."},{"k":"p","t":"3. Gửi hóa đơn điện tử có mã của cơ quan thuế đến người mua ngay sau khi nhận được hóa đơn điện tử có mã của cơ quan thuế; cuối ngày gửi dữ liệu hóa đơn điện tử khởi tạo từ máy tính tiền đến cơ quan thuế, trừ trường hợp cung cấp dịch vụ theo quy định tại điểm r khoản 4 Điều 9 Nghị định này thì phương thức và thời điểm chuyển dữ liệu điện tử thực hiện theo quy định tại điểm a.2 khoản 3 Điều 16 Nghị định này."}]},{"id":"nd254_16","no":16,"code":"Điều 16","title":"Điều 16. Trách nhiệm của người bán hàng hóa, cung cấp dịch vụ sử dụng hóa đơn điện tử không có mã của cơ quan thuế","shortTitle":"Trách nhiệm của người bán hàng hóa, cung cấp dịch vụ sử dụng hóa đơn điện tử không có mã của cơ quan thuế","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Quản lý tên và mật khẩu của các tài khoản đã được cơ quan thuế cấp."},{"k":"p","t":"2. Tạo lập hóa đơn điện tử để gửi đến người mua, cơ quan thuế, tổ chức cung cấp dịch vụ hóa đơn điện tử và chịu trách nhiệm trước pháp luật về tính hợp pháp, chính xác của hóa đơn điện tử đã lập."},{"k":"p","t":"3. Chuyển dữ liệu điện tử đã lập đến cơ quan thuế qua Hệ thống thông tin quản lý thuế (chuyển trực tiếp hoặc gửi qua tổ chức cung cấp dịch vụ hóa đơn điện tử)"},{"k":"p","t":"a) Phương thức và thời điểm chuyển dữ liệu điện tử"},{"k":"p","t":"a.1) Phương thức chuyển dữ liệu hóa đơn điện tử theo Bảng tổng hợp dữ liệu hóa đơn điện tử theo quy định của Bộ trưởng Bộ Tài chính đối với các trường hợp sau:"},{"k":"p","t":"a.1.1) Cung cấp dịch vụ thuộc lĩnh vực: bưu chính, viễn thông, bảo hiểm, tài chính ngân hàng, vận tải hàng không, chứng khoán, tài sản mã hóa, giao dịch trên sàn giao dịch các-bon;"},{"k":"p","t":"a.1.2) Bán hàng hóa là điện, nước nếu có thông tin về mã khách hàng hoặc mã số thuế của khách hàng;"},{"k":"p","t":"a.1.3) Bán hàng hóa, cung cấp dịch vụ của tổ chức nước ngoài có hoạt động kinh doanh, cung cấp dịch vụ thông qua nền tảng thương mại điện tử, nền tảng số khác tại Việt Nam."},{"k":"p","t":"a.2) Phương thức chuyển cơ sở dữ liệu thông tin chi tiết giao dịch phát sinh theo Bảng thông tin chi tiết giao dịch theo quy định của Bộ trưởng Bộ Tài chính áp dụng đối với dịch vụ quy định tại điểm r khoản 4 Điều 9 Nghị định này."},{"k":"p","t":"Người bán lập Bảng tổng hợp dữ liệu hóa đơn điện tử bán hàng hóa, cung cấp dịch vụ, Bảng thông tin chi tiết giao dịch phát sinh trong tháng hoặc quý (tính từ ngày đầu của tháng hoặc quý đến ngày cuối cùng của tháng hoặc quý) theo mẫu do Bộ trưởng Bộ Tài chính quy định để gửi cơ quan thuế chậm nhất là thời hạn gửi Tờ khai thuế giá trị gia tăng theo quy định pháp luật về quản lý thuế."},{"k":"p","t":"Trường hợp phát sinh số lượng hóa đơn lớn thì Bảng tổng hợp dữ liệu hóa đơn điện tử, Bảng thông tin chi tiết giao dịch tách theo định dạng chuẩn dữ liệu của cơ quan thuế nhằm đảm bảo yêu cầu gửi, nhận dữ liệu trên đường truyền;"},{"k":"p","t":"a.3) Phương thức chuyển đầy đủ nội dung hóa đơn áp dụng đối với trường hợp bán hàng hóa, cung cấp dịch vụ không thuộc quy định tại điểm a. 1 khoản này."},{"k":"p","t":"Người bán sau khi lập đầy đủ các nội dung trên hóa đơn theo quy định gửi hóa đơn cho người mua và đồng thời gửi hóa đơn cho cơ quan thuế chậm nhất là ngày làm việc tiếp theo kể từ thời điểm lập hóa đơn."},{"k":"p","t":"b) Tổ chức kinh tế thực hiện chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế theo định dạng chuẩn dữ liệu bằng hình thức gửi trực tiếp (đối với trường hợp đáp ứng yêu cầu về chuẩn kết nối dữ liệu) hoặc gửi thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử."},{"k":"p","t":"b.1) Hình thức gửi trực tiếp"},{"k":"p","t":"Trường hợp người bán là tổ chức kinh tế đáp ứng tiêu chí dưới đây thì người bán thực hiện chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế bằng hình thức gửi trực tiếp:"},{"k":"p","t":"b.1.1) Tổ chức kinh tế sử dụng hóa đơn bình quân từ 1.000.000 hóa đơn một tháng trở lên (tính theo số lượng hóa đơn bình quân năm trước liền kề), có hệ thống công nghệ thông tin đáp ứng yêu cầu về định dạng chuẩn dữ liệu, có nhu cầu chuyển dữ liệu hóa đơn điện tử theo hình thức gửi trực tiếp đến cơ quan thuế gửi văn bản kèm theo tài liệu đáp ứng điều kiện kỹ thuật đến Cục Thuế;"},{"k":"p","t":"b.1.2) Tổ chức kinh tế có tổ chức mô hình công ty mẹ - con, có xây dựng hệ thống quản lý dữ liệu hóa đơn tập trung tại công ty mẹ và có nhu cầu công ty mẹ chuyển toàn bộ dữ liệu hóa đơn điện tử bao gồm cả dữ liệu của các công ty con đến cơ quan thuế qua Hệ thống thông tin quản lý thuế thì gửi kèm theo danh sách công ty con đến Cục Thuế để thực hiện kết nối kỹ thuật;"},{"k":"p","t":"b.2) Hình thức gửi thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử"},{"k":"p","t":"Các tổ chức kinh tế không thuộc trường hợp nêu tại điểm b. 1 khoản này thực hiện ký hợp đồng với tổ chức cung cấp dịch vụ hóa đơn điện tử để tổ chức cung cấp dịch vụ hóa đơn điện tử làm dịch vụ chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế."},{"k":"p","t":"4. Lưu trữ và bảo đảm tính toàn vẹn của toàn bộ hóa đơn điện tử; thực hiện các quy định pháp luật về bảo đảm an toàn, an ninh hệ thống dữ liệu điện tử."},{"k":"p","t":"5. Chấp hành sự thanh tra, kiểm tra, đối chiếu của cơ quan thuế và các cơ quan có thẩm quyền theo quy định của pháp luật."},{"k":"p","t":"6. Cơ sở kinh doanh bán hàng hóa hoàn thuế giá trị gia tăng lập hóa đơn kiêm tờ khai hoàn thuế giá trị gia tăng theo định dạng chuẩn dữ liệu do Bộ trưởng Bộ Tài chính quy định và gửi đến Hệ thống thông tin quản lý thuế theo quy định."}]},{"id":"nd254_17","no":17,"code":"Điều 17","title":"Điều 17. Quyền và nghĩa vụ của tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ","shortTitle":"Quyền và nghĩa vụ của tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ có quyền:"},{"k":"p","t":"a) Sử dụng hóa đơn điện tử theo quy định tại Điều 6 Nghị định này;"},{"k":"p","t":"b) Sử dụng hóa đơn hợp pháp để phục vụ cho các hoạt động kinh doanh;"},{"k":"p","t":"c) Yêu cầu chủ quản nền tảng thương mại điện tử, nền tảng số cung cấp thông tin người mua, thông tin liên quan đến giao dịch, thời điểm giao hàng và xác nhận trạng thái hoàn tất đơn hàng trên hệ thống để người bán lập hóa đơn điện tử theo quy định đối với trường hợp bán hàng hóa, cung cấp dịch vụ qua nền tảng thương mại điện tử, nền tảng số;"},{"k":"p","t":"d) Khiếu kiện các tổ chức, cá nhân có hành vi xâm phạm các quyền tạo, phát hành và sử dụng hóa đơn hợp pháp."},{"k":"p","t":"2. Tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ có nghĩa vụ:"},{"k":"p","t":"a) Lập và giao hóa đơn khi bán hàng hóa, cung cấp dịch vụ cho khách hàng;"},{"k":"p","t":"b) Quản lý các hoạt động tạo hóa đơn theo quy định tại Nghị định này;"},{"k":"p","t":"c) Đăng ký sử dụng hóa đơn điện tử theo quy định của Bộ trưởng Bộ Tài chính và chuyển dữ liệu hóa đơn điện tử đến cơ quan thuế trong trường hợp sử dụng hóa đơn điện tử không có mã của cơ quan thuế hoặc hóa đơn điện tử khởi tạo từ máy tính tiền theo quy định;"},{"k":"p","t":"d) Công khai cách thức tra cứu, nhận file gốc hóa đơn điện tử của người bán tới người mua hàng hóa, dịch vụ."}]},{"id":"nd254_18","no":18,"code":"Điều 18","title":"Điều 18. Quyền và trách nhiệm của người mua hàng hóa, dịch vụ","shortTitle":"Quyền và trách nhiệm của người mua hàng hóa, dịch vụ","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Người mua hàng hóa, dịch vụ có quyền:"},{"k":"p","t":"a) Yêu cầu người bán lập và giao hóa đơn hợp pháp khi mua hàng hóa, dịch vụ (trừ trường hợp không phải sử dụng hóa đơn điện tử);"},{"k":"p","t":"b) Cung cấp chính xác thông tin cần thiết để người bán lập hóa đơn;"},{"k":"p","t":"c) Tra cứu, nhận file gốc hóa đơn điện tử của người bán;"},{"k":"p","t":"d) Sử dụng hóa đơn hợp pháp do người bán cung cấp để:"},{"k":"p","t":"d.1) Xác nhận giao dịch mua bán hàng hóa, cung ứng dịch vụ;"},{"k":"p","t":"d.2) Làm căn cứ chứng minh quyền sử dụng, quyền sở hữu hàng hóa, dịch vụ hoặc để nhận bồi thường thiệt hại theo quy định của pháp luật;"},{"k":"p","t":"d.3) Đăng ký quyền sử dụng, quyền sở hữu và để kê khai các loại thuế, thanh toán vốn ngân sách nhà nước theo các quy định của pháp luật;"},{"k":"p","t":"d.4) Tham gia các chương trình khuyến khích sử dụng hóa đơn do người bán là tổ chức kinh tế, cơ quan thuế tổ chức."},{"k":"p","t":"2. Hóa đơn do người mua yêu cầu và nhận từ người bán là cơ sở để xác định nghĩa vụ thuế của người bán đối với ngân sách nhà nước góp phần nâng cao tính minh bạch của nền kinh tế và hiệu quả quản lý thuế."},{"k":"p","t":"3. Người mua hàng hóa, dịch vụ có trách nhiệm:"},{"k":"p","t":"a) Sử dụng hóa đơn đúng mục đích;"},{"k":"p","t":"b) Cung cấp thông tin trên hóa đơn cho các cơ quan có thẩm quyền khi được yêu cầu."}]},{"id":"nd254_19","no":19,"code":"Điều 19","title":"Điều 19. Trách nhiệm của tổ chức được ủy nhiệm lập hóa đơn điện tử","shortTitle":"Trách nhiệm của tổ chức được ủy nhiệm lập hóa đơn điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Tổ chức, cá nhân được ủy nhiệm lập hóa đơn điện tử có trách nhiệm:"},{"k":"p","t":"a) Lập hóa đơn điện tử trong phạm vi được ủy nhiệm và bảo đảm phản ánh đúng bản chất nghiệp vụ kinh tế phát sinh giữa bên ủy quyền và người mua; hóa đơn điện tử do tổ chức được ủy nhiệm lập phải thể hiện đầy đủ thông tin của bên ủy quyền là người bán; hóa đơn điện tử phải đảm bảo các quy định của pháp luật về hóa đơn điện tử, bao gồm định dạng dữ liệu, chữ ký số, thời điểm lập hóa đơn và các nội dung trên hóa đơn;"},{"k":"p","t":"b) Gửi hóa đơn điện tử đến cơ quan thuế theo quy định;"},{"k":"p","t":"c) Lưu trữ, bảo quản hóa đơn điện tử quy định của pháp luật;"},{"k":"p","t":"d) Bảo đảm an toàn, bảo mật dữ liệu hóa đơn và thông tin của bên ủy quyền, người mua;"},{"k":"p","t":"đ) Không được sử dụng dữ liệu hóa đơn vào mục đích khác ngoài phạm vi ủy nhiệm, trừ trường hợp pháp luật có quy định khác;"},{"k":"p","t":"e) Phối hợp với bên ủy quyền trong việc điều chỉnh, thay thế, hủy hóa đơn khi phát hiện sai sót;"},{"k":"p","t":"g) Cung cấp đầy đủ, kịp thời thông tin, dữ liệu liên quan đến hóa đơn theo yêu cầu của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"2. Chủ quản nền tảng thương mại điện tử, nền tảng số có trách nhiệm cung cấp thông tin người mua, thông tin liên quan đến giao dịch, thời điểm giao hàng và xác nhận trạng thái hoàn tất đơn hàng trên hệ thống để người bán lập hóa đơn điện tử theo quy định đối với trường hợp bán hàng hóa, cung cấp dịch vụ qua nền tảng thương mại điện tử, nền tảng số."}]},{"id":"nd254_20","no":20,"code":"Điều 20","title":"Điều 20. Nghĩa vụ và trách nhiệm của tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử","shortTitle":"Nghĩa vụ và trách nhiệm của tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content":[{"k":"p","t":"1. Nghĩa vụ và trách nhiệm của tổ chức cung cấp giải pháp lập hóa đơn điện tử, chứng từ điện tử:"},{"k":"p","t":"a) Nghĩa vụ:"},{"k":"p","t":"a.1) Cung cấp giải pháp trong việc lập, truyền, lưu trữ, xử lý dữ liệu hóa đơn điện tử, hóa đơn điện tử có mã của cơ quan thuế khởi tạo từ máy tính tiền, chứng từ điện tử; truyền dữ liệu hóa đơn điện tử, chứng từ điện tử đến cơ quan thuế. Trường hợp tổ chức cung cấp dịch vụ hóa đơn điện tử, chứng từ điện tử chưa phải là tổ chức truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế thì thực hiện truyền dữ liệu hóa đơn điện tử, chứng từ điện tử đến cơ quan thuế thông qua việc sử dụng dịch vụ của tổ chức truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế;"},{"k":"p","t":"a. 2) Thực hiện truyền, nhận đúng hạn, toàn vẹn hóa đơn điện tử, chứng từ điện tử và lưu trữ kết quả truyền nhận giữa các bên tham gia giao dịch;"},{"k":"p","t":"b) Trách nhiệm:"},{"k":"p","t":"b.1) Công khai thông báo phương thức hoạt động, chất lượng dịch vụ trên Trang thông tin điện tử giới thiệu dịch vụ của tổ chức;"},{"k":"p","t":"b.2) Bảo mật thông tin hóa đơn điện tử, chứng từ điện tử;"},{"k":"p","t":"b.3) Thông báo cho người mua dịch vụ kế hoạch ngừng hoặc tạm ngừng cung cấp dịch vụ và biện pháp xử lý ít nhất trước 30 ngày để bảo đảm quyền lợi của người sử dụng dịch vụ;"},{"k":"p","t":"b.4) Thực hiện trách nhiệm khác theo thỏa thuận với người sử dụng dịch vụ."},{"k":"p","t":"2. Nghĩa vụ và trách nhiệm của tổ chức truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế:"},{"k":"p","t":"a) Nghĩa vụ:"},{"k":"p","t":"a.1) Cung cấp dịch vụ truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với Cục Thuế sau khi nhận được từ người sử dụng dịch vụ (bao gồm cả tổ chức cung cấp giải pháp lập hóa đơn điện tử, chứng từ điện tử chưa thực hiện kết nối với Cục Thuế);"},{"k":"p","t":"a.2) Thực hiện cấp mã của cơ quan thuế trong trường hợp cơ quan thuế thông báo ủy quyền; thực hiện cung cấp hóa đơn điện tử có mã của cơ quan thuế, chứng từ điện tử cho các đối tượng được miễn phí dịch vụ do cơ quan thuế ủy thác;"},{"k":"p","t":"b) Trách nhiệm:"},{"k":"p","t":"b.1) Thiết lập kênh kết nối chuyển dữ liệu đến Cục Thuế đảm bảo liên tục, an ninh, an toàn;"},{"k":"p","t":"b.2) Công khai, thông báo phương thức hoạt động, chất lượng dịch vụ trên Trang thông tin điện tử giới thiệu dịch vụ của tổ chức;"},{"k":"p","t":"b.3) Bảo mật thông tin hóa đơn điện tử, chứng từ điện tử;"},{"k":"p","t":"b.4) Thông báo kịp thời cho Cục Thuế về các vấn đề ảnh hưởng đến việc cung cấp dịch vụ truyền, lưu trữ dữ liệu hóa đơn điện tử, chứng từ điện tử với cơ quan thuế; phối hợp với Cục Thuế xử lý vướng mắc phát sinh trong quá trình thực hiện;"},{"k":"p","t":"b.5) Thông báo cho Cục Thuế và người sử dụng dịch vụ kế hoạch ngừng hoặc tạm ngừng cung cấp dịch vụ và biện pháp xử lý ít nhất trước 30 ngày để phối hợp thực hiện và đảm bảo quyền lợi của người sử dụng dịch vụ;"},{"k":"p","t":"b.6) Thực hiện trách nhiệm khác theo thỏa thuận với Cục Thuế và người sử dụng dịch vụ."}]},{"id":"nd254_21","no":21,"code":"Điều 21","title":"Điều 21. Trách nhiệm của cơ quan thuế trong quản lý hóa đơn, chứng từ","shortTitle":"Trách nhiệm của cơ quan thuế trong quản lý hóa đơn, chứng từ","chuong":"Chương II — QUY ĐỊNH ĐỐI VỚI HÓA ĐƠN ĐIỆN TỬ","muc":"","level":1,"content
