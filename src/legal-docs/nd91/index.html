<script id="LD" type="application/json">{"meta":{"title":"Nghị định 91/2022/NĐ-CP — Sửa đổi, bổ sung một số điều của NĐ 126/2020/NĐ-CP quy định chi tiết một số điều của Luật Quản lý thuế","shortCode":"NĐ 91/2022","subtitle":"Sửa đổi, bổ sung NĐ 126/2020 (quản lý thuế)","slug":"nd91","effectiveDate":"30/10/2022","scope":"","description":"Sửa đổi, bổ sung NĐ 126/2020 (quản lý thuế)","related":[]},"outline":[{"id":"nd91_1","no":1,"code":"Điều 1","title":"Điều 1. Sửa đổi, bổ sung một số điều của Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế","shortTitle":"Sửa đổi, bổ sung một số điều của Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Bổ sung Điều 6a như sau:"},{"k":"p","t":"“Điều 6a. Kết thúc thời hạn"},{"k":"p","t":"Thời hạn nộp hồ sơ khai thuế, thời hạn nộp thuế, thời hạn cơ quan quản lý thuế giải quyết hồ sơ, thời hạn hiệu lực của quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế được thực hiện theo quy định tại Luật Quản lý thuế và Nghị định này. Trường hợp ngày cuối cùng của thời hạn nộp hồ sơ khai thuế, thời hạn nộp thuế, thời hạn cơ quan quản lý thuế giải quyết hồ sơ, thời hạn hiệu lực của quyết định cưỡng chế trùng với ngày nghỉ theo quy định thì ngày cuối cùng của thời hạn được tính là ngày làm việc liền kề sau ngày nghỉ đó.”"},{"k":"p","t":"2. Bổ sung điểm e khoản 3 Điều 7 như sau:"},{"k":"p","t":"“e) Người khai thuế thu nhập cá nhân là tổ chức, cá nhân trả thu nhập thuộc trường hợp khai thuế thu nhập cá nhân theo tháng, quý mà trong tháng, quý đó không phát sinh việc khấu trừ thuế thu nhập cá nhân của đối tượng nhận thu nhập.”"},{"k":"p","t":"3. Điểm b khoản 6 Điều 8 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“b) Thuế thu nhập doanh nghiệp (trừ thuế thu nhập doanh nghiệp từ chuyển nhượng vốn của nhà thầu nước ngoài; thuế thu nhập doanh nghiệp kê khai theo phương pháp tỷ lệ trên doanh thu theo từng lần phát sinh hoặc theo tháng theo quy định tại điểm đ khoản 4 Điều này). Người nộp thuế phải tự xác định số thuế thu nhập doanh nghiệp tạm nộp quý (bao gồm cả tạm phân bổ số thuế thu nhập doanh nghiệp cho địa bàn cấp tỉnh nơi có đơn vị phụ thuộc, địa điểm kinh doanh, nơi có bất động sản chuyển nhượng khác với nơi người nộp thuế đóng trụ sở chính) và được trừ số thuế đã tạm nộp với số phải nộp theo quyết toán thuế năm."},{"k":"p","t":"Người nộp thuế thuộc diện lập báo cáo tài chính quý theo quy định của pháp luật về kế toán căn cứ vào báo cáo tài chính quý và các quy định của pháp luật về thuế để xác định số thuế thu nhập doanh nghiệp tạm nộp quý."},{"k":"p","t":"Người nộp thuế không thuộc diện lập báo cáo tài chính quý theo quy định của pháp luật về kế toán căn cứ vào kết quả sản xuất, kinh doanh quý và các quy định của pháp luật về thuế để xác định số thuế thu nhập doanh nghiệp tạm nộp quý."},{"k":"p","t":"Tổng số thuế thu nhập doanh nghiệp đã tạm nộp của 04 quý không được thấp hơn 80% số thuế thu nhập doanh nghiệp phải nộp theo quyết toán năm. Trường hợp người nộp thuế nộp thiếu so với số thuế phải tạm nộp 04 quý thì phải nộp tiền chậm nộp tính trên số thuế nộp thiếu kể từ ngày tiếp sau ngày cuối cùng của thời hạn tạm nộp thuế thu nhập doanh nghiệp quý 04 đến ngày liền kề trước ngày nộp số thuế còn thiếu vào ngân sách nhà nước."},{"k":"p","t":"Người nộp thuế có thực hiện dự án đầu tư cơ sở hạ tầng, nhà để chuyển nhượng hoặc cho thuê mua, có thu tiền ứng trước của khách hàng theo tiến độ phù hợp với quy định của pháp luật thì thực hiện tạm nộp thuế thu nhập doanh nghiệp theo quý theo tỷ lệ 1% trên số tiền thu được. Trường hợp chưa bàn giao cơ sở hạ tầng, nhà và chưa tính vào doanh thu tính thuế thu nhập doanh nghiệp trong năm thì người nộp thuế không tổng hợp vào hồ sơ khai quyết toán thuế thu nhập doanh nghiệp năm mà tổng hợp vào hồ sơ khai quyết toán thuế thu nhập doanh nghiệp khi bàn giao bất động sản đối với từng phần hoặc toàn bộ dự án”."},{"k":"p","t":"4. Điểm c khoản 6 Điều 8 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“c) Lợi nhuận sau thuế còn lại sau khi trích lập các quỹ của doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ. Cụ thể như sau:"},{"k":"p","t":"Người nộp thuế phải tự xác định số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ tạm nộp quý chậm nhất vào ngày 30 của quý tiếp theo quý phát sinh nghĩa vụ nộp và được trừ số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ đã tạm nộp với số phải nộp theo quyết toán năm."},{"k":"p","t":"Tổng số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ đã tạm nộp của 04 quý không được thấp hơn 80% số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ theo quyết toán năm. Trường hợp người nộp thuế nộp thiếu so với số phải tạm nộp 04 quý thì phải nộp tiền chậm nộp tính trên số tiền nộp thiếu kể từ ngày tiếp sau ngày cuối cùng của thời hạn tạm nộp lợi nhuận sau thuế còn lại sau khi trích lập các quỹ quý 04 đến ngày liền kề trước ngày nộp số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ còn thiếu vào ngân sách nhà nước."},{"k":"p","t":"Đối với số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ phải nộp tăng thêm khi thực hiện khai bổ sung do điều chỉnh kết quả xếp loại doanh nghiệp theo công bố của chủ sở hữu từ thời điểm ngày tiếp sau ngày cuối cùng của hạn nộp lợi nhuận sau thuế còn lại theo quyết toán năm đến thời hạn công bố kết quả xếp loại doanh nghiệp của chủ sở hữu theo quy định của cơ quan có thẩm quyền thì doanh nghiệp không phải nộp tiền chậm nộp."},{"k":"p","t":"Người đại diện phần vốn của doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ có vốn góp tại công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên có trách nhiệm biểu quyết chi trả cổ tức, lợi nhuận khi có đủ các điều kiện theo quy định của Luật Doanh nghiệp đồng thời đề nghị, đôn đốc công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên nộp phần cổ tức, lợi nhuận được chia cho phần vốn góp của doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ.”"},{"k":"p","t":"5. Điểm g khoản 6 Điều 8 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“g) Thuế thu nhập doanh nghiệp của hãng vận tải nước ngoài tạm nộp quý và khai quyết toán năm. Tổng số thuế thu nhập doanh nghiệp đã tạm nộp của 04 quý không được thấp hơn 80% số thuế thu nhập doanh nghiệp phải nộp theo quyết toán năm. Trường hợp người nộp thuế nộp thiếu so với số thuế phải tạm nộp 04 quý thì phải nộp tiền chậm nộp tính trên số thuế nộp thiếu kể từ ngày tiếp sau ngày cuối cùng của thời hạn tạm nộp thuế thu nhập doanh nghiệp quý 04 đến ngày liền kề trước ngày nộp số thuế còn thiếu vào ngân sách nhà nước.”"},{"k":"p","t":"6. Điểm b khoản 4 Điều 11 được sửa đổi, bổ sung như sau:"},{"k":"p","t":"“b) Đối với than khai thác và tiêu thụ nội địa:"},{"k":"p","t":"Doanh nghiệp có hoạt động khai thác và tiêu thụ than nội địa thông qua hình thức quản lý và giao cho các công ty con hoặc đơn vị phụ thuộc khai thác, chế biến và tiêu thụ thì đơn vị thực hiện nhiệm vụ tiêu thụ than thực hiện khai thuế cho toàn bộ số thuế bảo vệ môi trường phát sinh đối với than khai thác thuộc diện chịu thuế và nộp hồ sơ khai thuế đến cơ quan thuế quản lý trực tiếp kèm theo Bảng xác định số thuế phải nộp cho từng địa phương nơi có công ty khai thác than đóng trụ sở theo quy định của Bộ trưởng Bộ Tài chính.”"},{"k":"p","t":"7. Bổ sung khoản 8 Điều 27 như sau:"},{"k":"p","t":"“8. Tổ chức được thành lập và hoạt động theo pháp luật Việt Nam là chủ sở hữu sàn thương mại điện tử có trách nhiệm cung cấp đầy đủ, chính xác và đúng hạn theo quy định cho cơ quan thuế thông tin của thương nhân, tổ chức, cá nhân có tiến hành một phần hoặc toàn bộ quy trình mua bán hàng hóa, dịch vụ trên sàn giao dịch thương mại điện tử bao gồm: tên người bán hàng, mã số thuế hoặc số định danh cá nhân hoặc chứng minh nhân dân hoặc căn cước công dân hoặc hộ chiếu, địa chỉ, số điện thoại liên lạc; doanh thu bán hàng thông qua chức năng đặt hàng trực tuyến của sàn. Việc cung cấp thông tin được thực hiện định kỳ hằng quý chậm nhất vào ngày cuối cùng của tháng đầu quý sau, bằng phương thức điện tử, qua Cổng thông tin điện tử của Tổng cục Thuế theo định dạng dữ liệu do Tổng cục Thuế công bố.”"},{"k":"p","t":"8. Bổ sung khoản 4 Điều 43 như sau:"},{"k":"p","t":"“4. Quy định tại điểm d.1 khoản 5 Điều 7 Nghị định số 126/2020/NĐ-CP được thực hiện kể từ ngày 01 tháng 01 năm 2023. Trường hợp cá nhân nhận cổ tức bằng chứng khoán, cá nhân là cổ đông hiện hữu nhận thưởng bằng chứng khoán được ghi nhận vào tài khoản chứng khoán của nhà đầu tư từ ngày 31 tháng 12 năm 2022 trở về trước và chưa được các công ty chứng khoán, ngân hàng thương mại nơi cá nhân mở tài khoản lưu ký, công ty quản lý quỹ nơi cá nhân ủy thác danh mục đầu tư, tổ chức phát hành chứng khoán khai thuế thay, nộp thuế thay thì cá nhân thực hiện khai, nộp thuế thu nhập cá nhân theo quy định của pháp luật thuế Thu nhập cá nhân và không bị xử phạt vi phạm hành chính về chậm nộp hồ sơ khai thuế, không bị tính tiền chậm nộp (nếu có) theo quy định tại khoản 11 Điều 16 Luật Quản lý thuế từ ngày 05 tháng 12 năm 2020 đến hết ngày 31 tháng 12 năm 2022.”"},{"k":"p","t":"9. Ban hành kèm theo Nghị định này Thông báo về việc ngừng sử dụng hóa đơn theo Mẫu số 04-1/CC thay thế Mẫu số 04-1/CC tại Phụ lục III ban hành kèm theo Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế."}]},{"id":"nd91_2","no":2,"code":"Điều 2","title":"Điều 2. Tổ chức thực hiện và hiệu lực thi hành","shortTitle":"Tổ chức thực hiện và hiệu lực thi hành","chuong":"","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành kể từ ngày ký ban hành. Quy định tại khoản 3, 4, 5 Điều 1 Nghị định này được áp dụng từ kỳ tính thuế năm 2021 như sau:"},{"k":"p","t":"a) Tính đến ngày Nghị định này có hiệu lực thi hành người nộp thuế có số thuế tạm nộp 03 quý đầu kỳ tính thuế năm 2021 không thấp hơn 75% số phải nộp theo quyết toán năm, thì không áp dụng quy định tỷ lệ tạm nộp 04 quý tại khoản 3, 4, 5 Điều 1 Nghị định này."},{"k":"p","t":"b) Tính đến ngày Nghị định này có hiệu lực thi hành, người nộp thuế có số thuế tạm nộp 03 quý đầu kỳ tính thuế năm 2021 thấp hơn 75% số phải nộp theo quyết toán năm, thì được áp dụng tỷ lệ tạm nộp 04 quý quy định tại khoản 3, 4, 5 Điều 1 Nghị định này nếu không tăng thêm số tiền chậm nộp."},{"k":"p","t":"Trường hợp cơ quan có thẩm quyền thực hiện thanh tra, kiểm tra đã tính tiền chậm nộp theo quy định tại điểm b, điểm c, điểm g khoản 6 Điều 8 Nghị định số 126/2020/NĐ-CP và khi áp dụng quy định tỷ lệ tạm nộp 04 quý tại khoản 3, 4, 5 Điều 1 Nghị định này được giảm số tiền chậm nộp thì người nộp thuế có văn bản đề nghị điều chỉnh giảm tiền chậm nộp theo Mẫu số 01/GTCN tại Phụ lục ban hành kèm theo Nghị định này gửi cơ quan thuế nơi phát sinh tiền chậm nộp (là cơ quan thuế quản lý trực tiếp hoặc cơ quan thuế có hoạt động được hưởng ưu đãi thuế thu nhập doanh nghiệp). Sau khi điều chỉnh giảm mà có số tiền chậm nộp nộp thừa thì thực hiện theo quy định tại Điều 60 và Chương VIII Luật Quản lý thuế số 38/2019/QH14 và các văn bản hướng dẫn thi hành."},{"k":"p","t":"2. Bộ Tài chính chịu trách nhiệm chỉ đạo, tổ chức triển khai Nghị định này."},{"k":"p","t":"3. Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Thủ trưởng cơ quan thuộc Chính phủ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các doanh nghiệp, tổ chức, hộ kinh doanh, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"p","t":"Nơi nhận:"},{"k":"p","t":"- Ban Bí thư Trung ương Đảng;"},{"k":"p","t":"- Thủ tướng, các Phó Thủ tướng Chính phủ;"},{"k":"p","t":"- Các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ;"},{"k":"p","t":"- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;"},{"k":"p","t":"- Văn phòng Trung ương và các Ban của Đảng;"},{"k":"p","t":"- Văn phòng Tổng Bí thư;"},{"k":"p","t":"- Văn phòng Chủ tịch nước;"},{"k":"p","t":"- Hội đồng Dân tộc và các Ủy ban của Quốc hội;"},{"k":"p","t":"- Văn phòng Quốc hội;"},{"k":"p","t":"- Tòa án nhân dân tối cao;"},{"k":"p","t":"- Viện kiểm sát nhân dân tối cao;"},{"k":"p","t":"- Kiểm toán nhà nước;"},{"k":"p","t":"- Ủy ban Giám sát tài chính Quốc gia;"},{"k":"p","t":"- Ngân hàng Chính sách xã hội;"},{"k":"p","t":"- Ngân hàng Phát triển Việt Nam;"},{"k":"p","t":"- Ủy ban trung ương Mặt trận Tổ quốc Việt Nam;"},{"k":"p","t":"- Cơ quan trung ương của các đoàn thể;"},{"k":"p","t":"- VPCP: BTCN, các PCN, Trợ lý TTg, TGĐ Cổng TTĐT, các Vụ, Cục, đơn vị trực thuộc, Công báo;"},{"k":"p","t":"- Lưu: VT, KTTH (2b)."},{"k":"p","t":"KT. THỦ TƯỚNG"},{"k":"p","t":"PHÓ THỦ TƯỚNG"},{"k":"p","t":"Lê Minh Khái"},{"k":"p","t":"Phụ lục"},{"k":"p","t":"(Kèm theo Nghị định số 91/2022/NĐ-CP ngày 30 tháng 10 năm 2022 của Chính phủ)"},{"k":"p","t":"_______________"},{"k":"p","t":"Mẫu số 04-1/CCThông báo về việc ngừng sử dụng hóa đơn"},{"k":"p","t":"Mẫu số 01/GTCNVề việc đề nghị giảm tiền chậm nộp"},{"k":"p","t":"Mẫu số 04-1/CC"},{"k":"p","t":"TÊN CƠ QUAN CẤP TRÊN"},{"k":"p","t":"TÊN CƠ QUAN BAN HÀNH VĂN BẢN"},{"k":"p","t":"___________"},{"k":"p","t":"Số:                 /TB-..."},{"k":"p","t":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"},{"k":"p","t":"Độc lập - Tự do - Hạnh phúc"},{"k":"p","t":"________________________"},{"k":"p","t":"....., ngày .... tháng .... năm ....."},{"k":"p","t":"THÔNG BÁO"},{"k":"p","t":"Về việc ngừng sử dụng hóa đơn"},{"k":"p","t":"______________"},{"k":"p","t":"Căn cứ Luật Quản lý thuế số 38/2019/QH14 ngày 13 tháng 6 năm 2019;"},{"k":"p","t":"Căn cứ Điều 34 Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế;"},{"k":"p","t":"Căn cứ Điều 1 Nghị định số ....../2022/NĐ-CP ngày ... tháng 10 năm 2022 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế;"},{"k":"p","t":"Căn cứ Quyết định số ..../QĐ-CT/CCT ngày .... của Cục Thuế/Chi cục Thuế...... về việc cưỡng chế thi hành quyết định hành chính về quản lý thuế bằng biện pháp ngừng sử dụng hóa đơn;"},{"k":"p","t":"...(Tên cơ quan ban hành quyết định cưỡng chế)... thông báo ngừng sử dụng hóa đơn đối với ....(Tên người nộp thuế)..."},{"k":"p","t":"Mã số thuế:"},{"k":"p","t":"Địa chỉ trụ sở kinh doanh:"},{"k":"p","t":"Lý do thông báo ngừng sử dụng hóa đơn: ..."},{"k":"p","t":"Căn cứ dữ liệu theo dõi tại cơ quan thuế hoặc dữ liệu của cơ quan có thẩm quyền khác (nếu có), số hóa đơn tồn đến ngày ban hành quyết định cưỡng chế gồm:"},{"k":"p","t":"STTLoại hóa đơnKý hiệu mẫuKý hiệu Hóa đơnTừ sốĐến sốGhi chúNgười nộp thuế sử dụng hóa đơn kể từ ngày quyết định cưỡng chế có hiệu lực thi hành (ngày ... tháng.... năm....) thì được coi là sử dụng hóa đơn không hợp pháp (trừ trường hợp người nộp thuế sử dụng hóa đơn theo từng lần phát sinh)."},{"k":"p","t":"Nơi nhận:"},{"k":"p","t":"- ... (Tên người nộp thuế)... (để thực hiện);"},{"k":"p","t":"- Cơ quan hải quan (nếu có);"},{"k":"p","t":"- Phòng/Đội .... (để thực hiện);"},{"k":"p","t":"- Trang thông tin điện tử Tổng cục Thuế;"},{"k":"p","t":"- Trang thông tin điện tử Cục Thuế;"},{"k":"p","t":"- ......;"},{"k":"p","t":"- Lưu: VT,...THỦ TRƯỞNG CƠ QUAN BAN HÀNH VĂN BẢN"},{"k":"p","t":"(Ký, đóng dấu và ghi rõ họ tên)"},{"k":"p","t":"Ghi chú: Trường hợp không có dữ liệu về hóa đơn thì tại thông báo ngừng sử dụng hóa đơn chỉ cần ghi các nội dung: Căn cứ ra thông báo; tên cơ quan ban hành quyết định cưỡng chế; tên, địa chỉ, mã số thuế của người nộp thuế bị cưỡng chế; lý do ngừng sử dụng hóa đơn."},{"k":"p","t":"Mẫu số 01/GTCN"},{"k":"p","t":"TÊN NGƯỜI NỘP THUẾ"},{"k":"p","t":"___________"},{"k":"p","t":"Số: ..............."},{"k":"p","t":"V/v: Đề nghị giảm tiền chậm nộp"},{"k":"p","t":"CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"},{"k":"p","t":"Độc lập - Tự do - Hạnh phúc"},{"k":"p","t":"________________________"},{"k":"p","t":"....., ngày .... tháng .... năm ....."},{"k":"p","t":"Kính gửi: ....(Tên cơ quan thuế có thẩm quyền)..."},{"k":"p","t":"Tên người nộp thuế:"},{"k":"p","t":"Mã số thuế:"},{"k":"p","t":"Ngày ..., ...<tên người nộp thuế>... đã được ....<tên cơ quan có thẩm quyền> tính tiền chậm nộp của kỳ tính thuế năm 2021 theo quy định tại Nghị định số 126/2020/NĐ-CP với số tiền là ... đồng. Đề nghị ....<tên cơ quan thuế> .... giảm tiền chậm nộp với số tiền là ... đồng do được tính lại tiền chậm nộp theo quy định tại điểm b khoản 1 Điều 2 Nghị định số ....../2022/NĐ-CP ngày........ của Chính phủ."},{"k":"p","t":"Tài liệu gửi kèm: (ghi rõ tên tài liệu, bản chính hay bản sao)"},{"k":"p","t":"(1)"},{"k":"p","t":"(2)"},{"k":"p","t":"... (Tên người nộp thuế)... chịu trách nhiệm trước pháp luật về các thông tin nêu trên."},{"k":"p","t":"Nơi nhận:"},{"k":"p","t":"- Như trên;"},{"k":"p","t":"- ......;"},{"k":"p","t":"- Lưu: VT,...NGƯỜI NỘP THUẾ hoặc ĐẠI DIỆN HỢP PHÁP CỦA NGƯỜI NỘP THUẾ"},{"k":"p","t":"(Chữ ký, ghi rõ họ tên; chức vụ và đóng dấu (nếu có)/Ký điện tử)"}]}],"refs":{},"details":{},"summaries":{}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
<!--CD-MODAL-START--><div class="cd-backdrop" id="cdBackdrop" onclick="if(event.target===this)closeDetail()"><div class="cd-card" role="dialog" aria-modal="true"><button class="cd-close" onclick="closeDetail()" aria-label="Đóng">×</button><div class="cd-title" id="cdTitle"></div><div class="cd-summary" id="cdSummary"></div><div class="cd-links" id="cdLinks"></div></div></div><!--CD-MODAL-END-->
