ương, tiền công trên hồ sơ quyết toán thuế từ 50.000 đồng trở xuống;"},{"k":"p","t":"b) Miễn thuế đối với hộ kinh doanh, cá nhân kinh doanh có số tiền thuế phải nộp trên hồ sơ khai thuế, hồ sơ quyết toán thuế từ 50.000 đồng trở xuống, trừ quy định tại điểm a khoản này;"},{"k":"p","t":"c) Miễn thuế sử dụng đất phi nông nghiệp đối với hộ gia đình, cá nhân thuộc đối tượng nộp thuế sử dụng đất phi nông nghiệp có số tiền thuế phải nộp hằng năm từ 50.000 đồng trở xuống."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính hướng dẫn điểm a, c và d khoản 1 Điều này."}]},{"id":"nd252_33","no":33,"code":"Điều 33","title":"Điều 33. Thời hạn tiếp nhận, giải quyết hồ sơ miễn thuế, giảm thuế, không chịu thuế, không thu thuế","shortTitle":"Thời hạn tiếp nhận, giải quyết hồ sơ miễn thuế, giảm thuế, không chịu thuế, không thu thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế tiếp nhận hồ sơ miễn thuế, giảm thuế và trả thông báo tiếp nhận hoặc không tiếp nhận hồ sơ miễn thuế, giảm thuế cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày nhận được hồ sơ của người nộp thuế. Trường hợp hồ sơ miễn thuế, giảm thuế đồng thời là hồ sơ khai thuế thì thông báo tiếp nhận hồ sơ khai thuế là thông báo tiếp nhận hồ sơ miễn thuế, giảm thuế."},{"k":"p","t":"2. Thời hạn giải quyết hồ sơ miễn thuế, giảm thuế thuộc thẩm quyền của cơ quan thuế thực hiện:"},{"k":"p","t":"a) Trường hợp cơ quan thuế xác định số tiền, thu nhập được miễn thuế, giảm thuế thì trong thời hạn 30 ngày làm việc kể từ ngày cơ quan thuế có thông báo tiếp nhận hồ sơ, cơ quan thuế có quyết định, thông báo miễn thuế, giảm thuế hoặc thông báo lý do không được miễn thuế, giảm thuế. Thời hạn giải quyết hồ sơ miễn thuế, giảm thuế không bao gồm thời gian người nộp thuế được giải trình, bổ sung thông tin tài liệu theo thông báo của cơ quan thuế khi giải quyết hồ sơ. Trường hợp pháp luật thuế, phí, lệ phí và pháp luật khác có quy định người nộp thuế được tự xác định miễn thuế, giảm thuế, cơ quan thuế không ban hành quyết định, thông báo miễn thuế, giảm thuế hoặc thông báo lý do không được miễn thuế, giảm thuế;"},{"k":"p","t":"b) Trường hợp hồ sơ miễn thuế, giảm thuế của người nộp thuế có rủi ro cao thuộc trường hợp quy định tại điểm a khoản 3 Điều 22 Luật Quản lý thuế thì trong thời hạn 10 ngày làm việc kể từ ngày cơ quan thuế ban hành kết luận hoặc quyết định xử lý vi phạm khi kiểm tra tại trụ sở người nộp thuế, cơ quan thuế có quyết định, thông báo miễn thuế, giảm thuế hoặc thông báo lý do không được miễn thuế, giảm thuế;"},{"k":"p","t":"c) Trường hợp hồ sơ miễn thuế, giảm thuế được tiếp nhận theo cơ chế một cửa liên thông thì trong thời hạn 07 ngày làm việc kể từ ngày nhận được hồ sơ hợp pháp, đầy đủ, đúng mẫu quy định, cơ quan thuế thông báo số tiền được miễn thuế, giảm thuế hoặc lý do không được miễn thuế, giảm thuế trên thông báo nộp thuế gửi cơ quan tiếp nhận hồ sơ theo cơ chế một cửa liên thông."},{"k":"p","t":"3. Thời hạn tiếp nhận, giải quyết hồ sơ miễn thuế, giảm thuế, không thu thuế, không chịu thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc thẩm quyền của cơ quan hải quan thực hiện:"},{"k":"p","t":"a) Thời hạn tiếp nhận, giải quyết hồ sơ miễn thuế, giảm thuế đối với hàng hóa xuất khẩu, nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu và pháp luật về hải quan;"},{"k":"p","t":"b) Thời hạn tiếp nhận, giải quyết hồ sơ không thu thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"c) Thời hạn tiếp nhận, giải quyết hồ sơ không chịu thuế, đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của pháp luật về hải quan, pháp luật về thuế xuất khẩu, thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường, thuế giá trị gia tăng."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính hướng dẫn Điều này."},{"k":"p","t":"KHOANH TIỀN THUẾ NỢ, XÓA TIỀN THUẾ NỢ"}]},{"id":"nd252_34","no":34,"code":"Điều 34","title":"Điều 34. Khoanh tiền thuế nợ","shortTitle":"Khoanh tiền thuế nợ","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Các trường hợp khoanh tiền thuế nợ thực hiện theo quy định tại khoản 1 Điều 20 Luật Quản lý thuế. Cơ quan quản lý thuế không thực hiện khoanh tiền thuế nợ theo quy định tại điểm b, d và đ khoản 1 Điều 20 Luật Quản lý thuế đối với chi nhánh, văn phòng đại diện, địa điểm kinh doanh mà doanh nghiệp, tổ chức đang hoạt động."},{"k":"p","t":"2. Việc khoanh tiền thuế nợ quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế thực hiện như sau:"},{"k":"p","t":"a) Người nộp thuế được khoanh tiền thuế nợ theo quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế khi đáp ứng tiêu chí sau:"},{"k":"p","t":"a.1) Đối với người nộp thuế bị hạn chế quyền khai thác, sử dụng về đất đai: có văn bản của cơ quan quản lý nhà nước có thẩm quyền thể hiện các nội dung về diện tích đất và giá đất có vướng mắc; tổng diện tích đất trên quyết định, hợp đồng giao đất, cho thuê đất; lý do bị hạn chế và thời điểm bắt đầu bị hạn chế để cơ quan thuế có căn cứ xác định số tiền thuế nợ được khoanh;"},{"k":"p","t":"a.2) Đối với người nộp thuế bị hạn chế quyền khai thác khoáng sản: có văn bản của cơ quan quản lý nhà nước có thẩm quyền thể hiện số tiền cấp quyền khai thác khoáng sản, số tiền cấp quyền khai thác tài nguyên nước, số tiền sử dụng khu vực biển bị hạn chế trên thực tế quyền khai thác, sử dụng khoáng sản được cấp, được giao; lý do bị hạn chế và thời điểm bắt đầu bị hạn chế của khu vực bị hạn chế quyền khai thác, sử dụng để cơ quan thuế có căn cứ xác định số tiền thuế nợ được khoanh;"},{"k":"p","t":"b) Cơ quan quản lý nhà nước có thẩm quyền quy định tại điểm a.1 và điểm a.2 khoản này bao gồm: Bộ Nông nghiệp và Môi trường hoặc cơ quan chuyên môn thuộc Bộ Nông nghiệp và Môi trường thực hiện nhiệm vụ cấp quyền khai thác khoáng sản; Ủy ban nhân dân các cấp hoặc cơ quan chuyên môn thuộc Ủy ban nhân dân cấp tỉnh thực hiện nhiệm vụ cấp quyền khai thác, sử dụng đất đai, khoáng sản. Cơ quan quản lý nhà nước có thẩm quyền này có trách nhiệm:"},{"k":"p","t":"b.1) Có văn bản về việc người nộp thuế bị hạn chế quyền khai thác, sử dụng về đất đai, khoáng sản theo đề nghị của người nộp thuế. Nội dung trên văn bản phải thể hiện rõ nội dung quy định tại điểm a.1 và điểm a.2 khoản này; văn bản này được gửi đến người nộp thuế, đồng thời gửi cơ quan thuế quản lý khoản thu ngay khi ban hành để thực hiện thủ tục khoanh tiền thuế nợ cho người nộp thuế;"},{"k":"p","t":"b.2) Thông báo bằng văn bản cho cơ quan thuế quản lý khoản thu trong thời hạn 05 ngày làm việc kể từ ngày người nộp thuế được tiếp tục khai thác khoáng sản hoặc sử dụng đất đai để cơ quan thuế chấm dứt việc khoanh tiền thuế nợ;"},{"k":"p","t":"c) Trách nhiệm của cơ quan thuế:"},{"k":"p","t":"c.1) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được văn bản của cơ quan quản lý nhà nước có thẩm quyền, nếu văn bản chưa đầy đủ nội dung theo quy định tại điểm a.1 và điểm a.2 khoản này thì cơ quan thuế có văn bản đề nghị cơ quan quản lý nhà nước có thẩm quyền bổ sung thông tin theo thời hạn ghi tại văn bản đề nghị."},{"k":"p","t":"Trường hợp văn bản đã đầy đủ nội dung theo quy định, trong thời hạn 07 ngày làm việc kể từ ngày tiếp nhận văn bản, cơ quan thuế ban hành thông báo không đủ điều kiện khoanh tiền thuế nợ đối với trường hợp không thuộc đối tượng được khoanh tiền thuế nợ hoặc quyết định khoanh tiền thuế nợ đối với trường hợp thuộc đối tượng được khoanh tiền thuế nợ và gửi cho người nộp thuế;"},{"k":"p","t":"c.2) Cơ quan thuế có trách nhiệm gửi quyết định khoanh tiền thuế nợ, quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ đối với trường hợp quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế cho cơ quan nhà nước có thẩm quyền cấp quyền khai thác, sử dụng đất đai, khoáng sản trong thời hạn 05 ngày làm việc kể từ ngày ban hành quyết định để phối hợp theo dõi."},{"k":"p","t":"3. Thời gian khoanh tiền thuế nợ:"},{"k":"p","t":"a) Thời gian khoanh tiền thuế nợ đối với trường hợp quy định tại điểm a, b, d và đ khoản 1 Điều 20 Luật Quản lý thuế được tính từ ngày cơ quan quản lý thuế ban hành quyết định khoanh tiền thuế nợ đến ngày cơ quan quản lý thuế ban hành quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ;"},{"k":"p","t":"b) Thời gian khoanh tiền thuế nợ đối với trường hợp quy định tại điểm c khoản 1 Điều 20 Luật Quản lý thuế được tính từ ngày Tòa án có thẩm quyền thông báo thụ lý đơn yêu cầu áp dụng thủ tục phục hồi, thụ lý đơn yêu cầu áp dụng thủ tục phá sản đến ngày cơ quan quản lý thuế ban hành quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ;"},{"k":"p","t":"c) Thời gian khoanh tiền thuế nợ đối với trường hợp quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế được tính từ ngày người nộp thuế bị hạn chế quyền khai thác, sử dụng đất đai, khoáng sản do nguyên nhân từ các cơ quan nhà nước có thẩm quyền ghi trên quyết định hoặc văn bản xác nhận của cơ quan nhà nước có thẩm quyền đến khi người nộp thuế được tiếp tục khai thác khoáng sản, sử dụng đất đai theo văn bản thông báo của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"4. Số tiền thuế nợ được khoanh:"},{"k":"p","t":"a) Số tiền thuế nợ được khoanh đối với trường hợp quy định tại điểm a, b, c, d và đ khoản 1 Điều 20 Luật Quản lý thuế là tổng số tiền thuế nợ của người nộp thuế tại thời điểm bắt đầu khoanh nợ theo quy định tại khoản 3 Điều này;"},{"k":"p","t":"b) Số tiền thuế nợ được khoanh đối với trường hợp quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế là số tiền thuế nợ phát sinh từ việc bị hạn chế quyền khai thác, sử dụng đất đai, khoáng sản bao gồm: tiền cấp quyền khai thác khoáng sản, tiền sử dụng đất, tiền thuê đất, tiền sử dụng khu vực biển, tiền cấp quyền khai thác tài nguyên nước, tiền thuế sử dụng đất phi nông nghiệp, tiền chậm nộp tương ứng;"},{"k":"p","t":"c) Sau khi ban hành quyết định khoanh tiền thuế nợ, trường hợp số tiền thuế nợ của người nộp thuế thay đổi thì thủ trưởng cơ quan quản lý thuế ban hành quyết định điều chỉnh quyết định khoanh tiền thuế nợ."},{"k":"p","t":"5. Thủ trưởng cơ quan quản lý thuế quyết định việc khoanh tiền thuế nợ, chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ đối với các khoản tiền thuế nợ được giao quản lý. Trong thời gian khoanh tiền thuế nợ, cơ quan quản lý thuế tiếp tục theo dõi các khoản tiền thuế nợ được khoanh và phối hợp với các cơ quan có liên quan để thu hồi tiền thuế nợ khi người nộp thuế có khả năng nộp thuế hoặc thực hiện xóa tiền thuế nợ theo quy định tại Điều 21 Luật Quản lý thuế."},{"k":"p","t":"6. Trường hợp chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ bao gồm:"},{"k":"p","t":"a) Người nộp thuế đã được khoanh tiền thuế nợ theo quy định tại điểm b, c, d và đ khoản 1 Điều 20 Luật Quản lý thuế nhưng người nộp thuế tiếp tục hoạt động sản xuất, kinh doanh;"},{"k":"p","t":"b) Người nộp thuế là cá nhân kinh doanh, hộ kinh doanh, doanh nghiệp tư nhân, công ty trách nhiệm hữu hạn một thành viên đã được khoanh tiền thuế nợ theo quy định tại điểm b, c, d và đ khoản 1 Điều 20 Luật Quản lý thuế nhưng cơ quan quản lý thuế phát hiện cá nhân, chủ hộ kinh doanh, chủ doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên, người đại diện theo pháp luật thành lập cơ sở sản xuất, kinh doanh hoặc doanh nghiệp khác;"},{"k":"p","t":"c) Người nộp thuế đã được khoanh tiền thuế nợ theo quy định tại điểm a khoản 1 Điều 20 Luật Quản lý thuế nhưng Tòa án hủy quyết định trước đó tuyên bố một người là đã chết, mất tích hoặc mất năng lực hành vi dân sự;"},{"k":"p","t":"d) Người nộp thuế đã được khoanh tiền thuế nợ theo quy định tại khoản 1 Điều 20 Luật Quản lý thuế nhưng số tiền thuế đã được cơ quan quản lý thuế ban hành quyết định khoanh tiền thuế nợ đủ điều kiện để được xóa tiền thuế nợ theo quy định tại Điều 21 Luật Quản lý thuế;"},{"k":"p","t":"đ) Người nộp thuế đã được khoanh tiền thuế nợ theo quy định tại điểm c khoản 1 Điều 20 Luật Quản lý thuế nhưng Tòa án quyết định không mở thủ tục phá sản hoặc đình chỉ thủ tục phá sản; Tòa án công nhận phương án phục hồi hoạt động kinh doanh hoặc đình chỉ thủ tục phục hồi hoạt động kinh doanh theo quy định tại điểm a, b, c và d khoản 1 Điều 37 Luật Phục hồi, phá sản số 142/2025/QH15;"},{"k":"p","t":"e) Người nộp thuế đã được khoanh tiền thuế nợ theo quy định tại khoản 1 Điều 20 Luật Quản lý thuế nhưng người nộp thuế đã hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"g) Người nộp thuế đã được khoanh tiền thuế nợ theo quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế nhưng cơ quan quản lý nhà nước có thẩm quyền có văn bản thông báo về việc người nộp thuế được tiếp tục khai thác khoáng sản hoặc sử dụng đất đai."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính hướng dẫn trình tự, thủ tục chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ, quyết định điều chỉnh quyết định khoanh tiền thuế nợ."}]},{"id":"nd252_35","no":35,"code":"Điều 35","title":"Điều 35. Xóa tiền thuế nợ","shortTitle":"Xóa tiền thuế nợ","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 5","level":1,"content":[{"k":"p","t":"1. Các trường hợp được xóa tiền thuế nợ thực hiện theo quy định tại khoản 1 Điều 21 Luật Quản lý thuế."},{"k":"p","t":"2. Đối với trường hợp người nộp thuế bị ảnh hưởng bởi thiên tai, thảm họa, dịch bệnh có phạm vi rộng quy định tại điểm d khoản 1 Điều 21 Luật Quản lý thuế, việc xóa tiền thuế nợ được thực hiện khi đáp ứng các điều kiện sau đây:"},{"k":"p","t":"a) Người nộp thuế bị thiệt hại trực tiếp do thiên tai, thảm họa, dịch bệnh có phạm vi rộng đã được cơ quan nhà nước có thẩm quyền công bố hoặc xác nhận;"},{"k":"p","t":"b) Khoản tiền thuế nợ đề nghị xóa nợ phát sinh trước thời điểm hoặc trong thời gian xảy ra thiên tai, thảm họa, dịch bệnh có phạm vi rộng và đến thời điểm đề nghị xóa nợ người nộp thuế không còn khả năng nộp ngân sách nhà nước;"},{"k":"p","t":"c) Người nộp thuế đã được cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền áp dụng các biện pháp gia hạn nộp thuế, miễn tiền chậm nộp nhưng không có khả năng phục hồi sản xuất, kinh doanh;"},{"k":"p","t":"d) Có hồ sơ đề nghị xóa tiền thuế nợ và tài liệu xác nhận giá trị thiệt hại do Bộ trưởng Bộ Tài chính quy định khi xảy ra thiên tai, thảm họa, dịch bệnh có phạm vi rộng;"},{"k":"p","t":"đ) Số tiền thuế nợ được xóa nợ không vượt quá giá trị thiệt hại do bị ảnh hưởng trực tiếp bởi thiên tai, thảm họa, dịch bệnh có phạm vi rộng."},{"k":"p","t":"3. Điều kiện xóa tiền thuế nợ đối với các trường hợp quy định tại điểm a, b và c khoản 1 Điều 21 Luật Quản lý thuế:"},{"k":"p","t":"a) Việc xóa tiền thuế nợ đối với các trường hợp quy định tại khoản 1 Điều 21 Luật Quản lý thuế phải đáp ứng thủ tục, hồ sơ xóa tiền thuế nợ do Bộ trưởng Bộ Tài chính hướng dẫn;"},{"k":"p","t":"b) Riêng đối với việc xóa các khoản nợ tiền cấp quyền khai thác khoáng sản, tiền sử dụng đất, tiền thuê đất, tiền sử dụng khu vực biển, tiền cấp quyền khai thác tài nguyên nước, tiền thuế sử dụng đất phi nông nghiệp, tiền chậm nộp phát sinh thì phải đáp ứng điều kiện quy định tại điểm a khoản này và chỉ được xóa nợ khi người nộp thuế đã có quyết định thu hồi đất, quyền khai thác khoáng sản của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"4. Thẩm quyền xóa tiền thuế nợ:"},{"k":"p","t":"a) Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định xóa các khoản nợ phát sinh trên địa bàn, bao gồm: tiền cấp quyền khai thác khoáng sản, tiền sử dụng đất, tiền thuê đất, tiền sử dụng khu vực biển, tiền cấp quyền khai thác tài nguyên nước, tiền thuế sử dụng đất phi nông nghiệp và tiền chậm nộp phát sinh từ khoản nợ tiền cấp quyền khai thác khoáng sản, tiền sử dụng đất, tiền thuê đất, tiền sử dụng khu vực biển, tiền cấp quyền khai thác tài nguyên nước, tiền thuế sử dụng đất phi nông nghiệp đối với các trường hợp quy định tại khoản 1 Điều 21 Luật Quản lý thuế;"},{"k":"p","t":"b) Trưởng thuế tỉnh, thành phố, Chi cục trưởng Chi cục thuế Doanh nghiệp lớn, Chi cục trưởng Chi cục thuế Thương mại điện tử và Chi cục trưởng Chi cục Hải quan khu vực, Chi cục trưởng Chi cục Điều tra chống buôn lậu, Chi cục trưởng Chi cục kiểm tra sau thông quan quyết định xóa nợ đối với người nộp thuế có tiền thuế nợ trên địa bàn, phạm vi quản lý hoặc khoản nợ phát sinh tại cơ quan quản lý thuế (không bao gồm các khoản tiền thuế nợ thuộc thẩm quyền của Chủ tịch Ủy ban nhân dân cấp tỉnh quy định tại điểm a khoản này) dưới 5.000.000.000 đồng;"},{"k":"p","t":"c) Cục trưởng Cục Thuế, Cục trưởng Cục Hải quan quyết định xóa nợ đối với người nộp thuế có tiền thuế nợ (không bao gồm các khoản tiền thuế nợ thuộc thẩm quyền của Chủ tịch Ủy ban nhân dân cấp tỉnh quy định tại điểm a khoản này) từ 5.000.000.000 đồng đến dưới 10.000.000.000 đồng;"},{"k":"p","t":"d) Bộ trưởng Bộ Tài chính quyết định xóa nợ đối với người nộp thuế có tiền thuế nợ (không bao gồm các khoản tiền thuế nợ thuộc thẩm quyền của Chủ tịch Ủy ban nhân dân cấp tỉnh quy định tại điểm a khoản này) từ 10.000.000.000 đồng trở lên;"},{"k":"p","t":"đ) Người có thẩm quyền quyết định xóa tiền thuế nợ quy định tại khoản này có thẩm quyền quyết định phục hồi tiền thuế nợ đã được xóa."},{"k":"p","t":"5. Thời hạn giải quyết hồ sơ xóa tiền thuế nợ:"},{"k":"p","t":"a) Cơ quan, người có thẩm quyền đã nhận hồ sơ xóa tiền thuế nợ, hồ sơ phục hồi tiền thuế nợ đã được xóa phải thông báo cho cơ quan đã gửi hồ sơ để hoàn chỉnh khi hồ sơ chưa đầy đủ trong thời hạn 10 ngày làm việc kể từ ngày tiếp nhận hồ sơ;"},{"k":"p","t":"b) Người có thẩm quyền phải ra quyết định xóa tiền thuế nợ, quyết định phục hồi tiền thuế nợ đã được xóa hoặc thông báo không thuộc diện được xóa tiền thuế nợ, phục hồi tiền thuế nợ đã được xóa cho cơ quan đã gửi hồ sơ trong thời hạn 30 ngày kể từ ngày nhận đủ hồ sơ."},{"k":"p","t":"6. Cơ quan đăng ký kinh doanh có trách nhiệm phối hợp với cơ quan quản lý thuế khi giải quyết hồ sơ đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký liên hiệp hợp tác xã, đăng ký tổ hợp tác, đăng ký hộ kinh doanh, không cấp giấy chứng nhận đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký tổ hợp tác, đăng ký hộ kinh doanh cho cá nhân, cá nhân kinh doanh, chủ hộ gia đình, chủ hộ kinh doanh, chủ doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên là cá nhân đã được xóa tiền thuế nợ theo quy định tại điểm c khoản 1 Điều 21 Luật Quản lý thuế khi chưa hoàn trả vào ngân sách nhà nước số tiền thuế nợ đã được xóa."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính hướng dẫn trình tự, thủ tục, hồ sơ phục hồi tiền thuế nợ đã được xóa đối với trường hợp quy định tại khoản 3 Điều 17, khoản 2 Điều 21 Luật Quản lý thuế."},{"k":"p","t":"ẤN ĐỊNH THUẾ"}]},{"id":"nd252_36","no":36,"code":"Điều 36","title":"Điều 36. Căn cứ ấn định, phương pháp ấn định thuế của cơ quan thuế","shortTitle":"Căn cứ ấn định, phương pháp ấn định thuế của cơ quan thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Căn cứ ấn định thuế:"},{"k":"p","t":"a) Cơ sở dữ liệu của cơ quan quản lý thuế và cơ sở dữ liệu thương mại;"},{"k":"p","t":"b) Thông tin, dữ liệu được các cơ quan có thẩm quyền cung cấp cho cơ quan thuế; thông tin, dữ liệu do các cơ quan có thẩm quyền công bố công khai hoặc các nguồn chính thức khác;"},{"k":"p","t":"c) So sánh doanh thu, tỷ suất lợi nhuận, số tiền thuế phải nộp bình quân tối thiểu của 03 cơ sở kinh doanh cùng mặt hàng, ngành, nghề, quy mô tại địa phương; trường hợp tại địa phương của cơ sở kinh doanh không có thông tin hoặc có nhưng không đủ thông tin về mặt hàng, ngành, nghề, quy mô của cơ sở kinh doanh thì so sánh với địa phương khác;"},{"k":"p","t":"d) Giá do Ủy ban nhân dân, Hội đồng nhân dân cấp tỉnh, thành phố ban hành tại thời điểm xác định giá tính thuế đối với trường hợp chuyển nhượng, thừa kế, cho tặng bất động sản;"},{"k":"p","t":"đ) Tài liệu và kết quả kiểm tra của cơ quan quản lý thuế; tài liệu, kết quả kiểm tra, thanh tra thuế có liên quan do cơ quan nhà nước có thẩm quyền gửi cho cơ quan thuế;"},{"k":"p","t":"e) Tỷ lệ thu thuế trên doanh thu đối với từng lĩnh vực, ngành, nghề theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Phương pháp ấn định thuế:"},{"k":"p","t":"a) Ấn định từng yếu tố liên quan đến việc xác định số thuế phải nộp."},{"k":"p","t":"Các trường hợp ấn định theo yếu tố:"},{"k":"p","t":"a.1) Qua kiểm tra hồ sơ khai thuế, cơ quan thuế có căn cứ cho rằng người nộp thuế khai chưa đầy đủ hoặc chưa chính xác các yếu tố làm cơ sở xác định số tiền thuế phải nộp, đã yêu cầu người nộp thuế khai bổ sung nhưng người nộp thuế không khai bổ sung hoặc khai bổ sung không chính xác, không trung thực theo yêu cầu của cơ quan thuế;"},{"k":"p","t":"a.2) Qua kiểm tra sổ kế toán, hóa đơn, chứng từ liên quan đến việc xác định số tiền thuế phải nộp của người nộp thuế hoặc qua kiểm tra, đối chiếu, xác minh, sổ kế toán, hóa đơn, chứng từ của tổ chức, hộ kinh doanh, cá nhân có liên quan, cơ quan thuế có cơ sở chứng minh người nộp thuế hạch toán không chính xác, không trung thực các yếu tố liên quan đến việc xác định số tiền thuế phải nộp;"},{"k":"p","t":"a.3) Người nộp thuế hạch toán giá bán hàng hóa, dịch vụ không đúng với giá thực tế thanh toán làm giảm doanh thu tính thuế hoặc hạch toán giá mua hàng hóa, nguyên vật liệu phục vụ cho sản xuất, kinh doanh không theo giá thực tế thanh toán làm tăng chi phí, tăng thuế giá trị gia tăng được khấu trừ, giảm nghĩa vụ thuế phải nộp;"},{"k":"p","t":"a.4) Người nộp thuế nộp hồ sơ khai thuế nhưng không xác định được các yếu tố làm cơ sở xác định căn cứ tính thuế hoặc có xác định được các yếu tố làm cơ sở xác định căn cứ tính thuế nhưng không tự tính được số tiền thuế phải nộp;"},{"k":"p","t":"a.5) Người nộp thuế sử dụng chứng từ, tài liệu không phản ánh đúng bản chất giao dịch hoặc giá trị giao dịch thực tế để làm giảm nghĩa vụ thuế; thực hiện các giao dịch không đúng với bản chất kinh tế nhằm mục đích giảm nghĩa vụ thuế;"},{"k":"p","t":"a.6) Người nộp thuế không tuân thủ quy định về nghĩa vụ kê khai, xác định giá giao dịch liên kết hoặc không cung cấp thông tin, dữ liệu kê khai xác định giá giao dịch liên kết theo quy định về quản lý thuế đối với các giao dịch liên kết của những doanh nghiệp có quan hệ liên kết."},{"k":"p","t":"Trên cơ sở căn cứ ấn định thuế theo quy định tại khoản 1 Điều này, cơ quan thuế ấn định từng yếu tố để xác định số thuế phải nộp theo quy định của pháp luật thuế."},{"k":"p","t":"b) Ấn định số tiền thuế phải nộp theo tỷ lệ trên doanh thu hoặc thuế suất nhân giá trị gia tăng."},{"k":"p","t":"Người nộp thuế nộp thuế giá trị gia tăng theo phương pháp tính trực tiếp, nộp thuế thu nhập cá nhân theo thuế suất nhân doanh thu tính thuế, nộp thuế thu nhập doanh nghiệp theo tỷ lệ % trên doanh thu bị ấn định số tiền thuế phải nộp theo tỷ lệ trên doanh thu hoặc thuế suất nhân giá trị gia tăng khi thuộc một trong các trường hợp quy định tại điểm a, b, c, d, đ, e, g và h khoản 2 Điều 24 Luật Quản lý thuế."},{"k":"p","t":"Trên cơ sở doanh thu đã ấn định, cơ quan thuế xác định số thuế phải nộp theo quy định của pháp luật thuế."}]},{"id":"nd252_37","no":37,"code":"Điều 37","title":"Điều 37. Thẩm quyền, thủ tục ấn định thuế của cơ quan thuế","shortTitle":"Thẩm quyền, thủ tục ấn định thuế của cơ quan thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Thẩm quyền ấn định thuế:"},{"k":"p","t":"Thủ trưởng cơ quan thuế quy định tại điểm a khoản 2 Điều 2 Nghị định này."},{"k":"p","t":"2. Thủ tục ấn định thuế:"},{"k":"p","t":"a) Khi thực hiện thủ tục ấn định thuế, cơ quan thuế thông báo bằng văn bản cho người nộp thuế về lý do ấn định thuế, căn cứ ấn định thuế, số tiền thuế ấn định, thời hạn nộp tiền thuế ấn định và ban hành quyết định ấn định thuế;"},{"k":"p","t":"b) Cơ quan thuế ban hành quyết định ấn định thuế theo mẫu do Bộ trưởng Bộ Tài chính hướng dẫn, đồng thời gửi cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ khi ký quyết định ấn định thuế. Quyết định ấn định thuế phải nêu rõ lý do ấn định thuế, căn cứ ấn định thuế, số tiền thuế ấn định, thời hạn nộp tiền thuế."},{"k":"p","t":"Trường hợp người nộp thuế thuộc diện nộp thuế theo thông báo của cơ quan thuế thì cơ quan thuế không phải ban hành quyết định ấn định thuế theo quy định tại khoản này;"},{"k":"p","t":"c) Trường hợp cơ quan thuế thực hiện ấn định thuế qua kiểm tra thuế thì lý do ấn định thuế, căn cứ ấn định thuế, phương pháp ấn định thuế, số tiền thuế ấn định, thời hạn nộp tiền thuế phải được ghi trong biên bản kiểm tra thuế, quyết định xử lý về thuế của cơ quan thuế;"},{"k":"p","t":"d) Trường hợp người nộp thuế bị ấn định thuế theo quy định thì cơ quan quản lý thuế xử phạt vi phạm hành chính và tính tiền chậm nộp tiền thuế theo quy định của pháp luật."}]},{"id":"nd252_38","no":38,"code":"Điều 38","title":"Điều 38. Trách nhiệm của người nộp thuế, cơ quan quản lý thuế trong việc ấn định thuế","shortTitle":"Trách nhiệm của người nộp thuế, cơ quan quản lý thuế trong việc ấn định thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của người nộp thuế:"},{"k":"p","t":"Người nộp thuế phải nộp số tiền thuế bị ấn định theo quyết định xử lý về thuế của cơ quan quản lý thuế; trường hợp không đồng ý với số tiền thuế do cơ quan quản lý thuế ấn định thì người nộp thuế vẫn phải nộp số tiền thuế đó, đồng thời có quyền đề nghị cơ quan quản lý thuế giải thích hoặc khiếu nại, khởi kiện về việc ấn định thuế. Người nộp thuế có trách nhiệm cung cấp các hồ sơ, tài liệu để chứng minh cho việc khiếu nại, khởi kiện."},{"k":"p","t":"2. Trách nhiệm của cơ quan quản lý thuế:"},{"k":"p","t":"a) Cơ quan thuế thông báo bằng văn bản cho người nộp thuế về việc ấn định thuế và ban hành quyết định ấn định thuế;"},{"k":"p","t":"b) Trường hợp cơ quan quản lý thuế thực hiện ấn định thuế qua kiểm tra thuế thì cơ quan quản lý thuế lập biên bản kiểm tra thuế và quyết định xử lý về thuế;"},{"k":"p","t":"c) Trường hợp số tiền thuế ấn định của cơ quan quản lý thuế lớn hơn số tiền thuế phải nộp theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thì cơ quan quản lý thuế phải hoàn trả số tiền thuế nộp thừa;"},{"k":"p","t":"d) Trường hợp số tiền thuế ấn định của cơ quan quản lý thuế nhỏ hơn số tiền thuế phải nộp theo quyết định giải quyết khiếu nại của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thì người nộp thuế có trách nhiệm nộp bổ sung. Cơ quan quản lý thuế chịu trách nhiệm về việc ấn định thuế."}]},{"id":"nd252_39","no":39,"code":"Điều 39","title":"Điều 39. Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 6","level":1,"content":[{"k":"p","t":"1. Các trường hợp ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định tại khoản 1 Điều 25 Luật Quản lý thuế và khoản 2 Điều này."},{"k":"p","t":"2. Các trường hợp ấn định thuế khác đối với hàng hóa xuất khẩu, nhập khẩu gồm:"},{"k":"p","t":"a) Người nộp thuế kê khai sai đối tượng miễn thuế, giảm thuế, không thu thuế, không chịu thuế; quá thời hạn quy định người nộp thuế không báo cáo hoặc báo cáo số liệu không chính xác với cơ quan hải quan; quá thời hạn quy định người nộp thuế không khai bổ sung hoặc khai bổ sung không đúng, không nộp bổ sung hồ sơ khai thuế theo yêu cầu của cơ quan hải quan hoặc đã nộp bổ sung hồ sơ khai thuế nhưng không có tài liệu hoặc hồ sơ để chứng minh các nội dung đã giải trình để cơ quan hải quan có cơ sở xem xét hoặc không đầy đủ, không chính xác các căn cứ tính thuế để xác định nghĩa vụ thuế theo quy định của pháp luật;"},{"k":"p","t":"b) Người nộp thuế không chấp hành quyết định kiểm tra thuế, kiểm tra sau thông quan của cơ quan hải quan;"},{"k":"p","t":"c) Hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế nhưng người khai thuế tự ý thay đổi mục đích sử dụng hoặc chuyển tiêu thụ nội địa mà không kê khai, nộp thuế trên tờ khai hải quan mới theo quy định của pháp luật hoặc cơ quan hải quan, cơ quan nhà nước có thẩm quyền xác định không đủ điều kiện được miễn thuế, không chịu thuế; hàng hóa là nguyên liệu, vật tư, linh kiện nhập khẩu hết thời hạn được miễn thuế 05 năm theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu nhưng người khai thuế không kê khai nộp thuế; hàng hóa xuất khẩu, nhập khẩu tại chỗ không đúng quy định của pháp luật về thuế, pháp luật về hải quan, pháp luật về thương mại:"},{"k":"p","t":"c.1) Trường hợp nguyên liệu, vật tư nhập khẩu để gia công, sản xuất xuất khẩu chênh lệch âm (ít hơn) hoặc dương (nhiều hơn) so với số liệu đã báo cáo cơ quan hải quan, cơ quan hải quan thực hiện kiểm tra đã xác định được nguyên nhân dẫn đến chênh lệch âm hoặc dương thì căn cứ hành vi vi phạm để xử lý và thực hiện ấn định thuế đối với toàn bộ phần chênh lệch bao gồm cả phần chênh lệch âm và phần chênh lệch dương;"},{"k":"p","t":"c.2) Trường hợp nguyên liệu, vật tư nhập khẩu chênh lệch âm hoặc dương so với số liệu đã báo cáo cơ quan hải quan, doanh nghiệp đã giải trình và cơ quan hải quan đã thực hiện kiểm tra nhưng không xác định được nguyên nhân dẫn đến chênh lệch, không xác định được hành vi vi phạm thì cơ quan hải quan chỉ thực hiện ấn định thuế đối với số lượng nguyên liệu, vật tư chênh lệch âm. Đối với số lượng nguyên liệu, vật tư chênh lệch dương, người nộp thuế không thuộc trường hợp nêu tại điểm c.1 khoản này nhưng số nguyên liệu, vật tư này vẫn được doanh nghiệp sử dụng đúng mục đích gia công, sản xuất xuất khẩu thì cơ quan hải quan không thực hiện ấn định thuế. Doanh nghiệp phải theo dõi quản lý đối với nguyên liệu, vật tư nhập khẩu để gia công, sản xuất xuất khẩu như đối với nguyên liệu, vật tư nhập khẩu lần đầu cho đến khi xuất khẩu hết sản phẩm;"},{"k":"p","t":"c.3) Trường hợp hàng hóa nhập khẩu để gia công của doanh nghiệp trong nước có số lượng nguyên liệu, vật tư chênh lệch dương tại thời điểm đã hết thời hạn thực hiện hợp đồng gia công, bên nhận gia công đã quyết toán hợp đồng gia công với bên đặt gia công thì doanh nghiệp phải tái xuất hoặc kê khai, nộp thuế đối với phần nguyên liệu, vật tư chênh lệch dương, trừ trường hợp doanh nghiệp chuyển nguyên liệu, vật tư chênh lệch dương để thực hiện hợp đồng gia công khác. Trường hợp doanh nghiệp không kê khai, nộp thuế đối với phần nguyên liệu, vật tư chênh lệch dương thì cơ quan hải quan thực hiện ấn định thuế;"},{"k":"p","t":"d) Hàng hóa nhập khẩu chưa hoàn thành thủ tục hải quan bị kê biên để bán đấu giá theo quyết định của cơ quan có thẩm quyền hoặc bản án, quyết định của Tòa án thuộc đối tượng phải nộp thuế, cơ quan hải quan ấn định thuế để xác định số tiền thuế phải nộp và thông báo cho cơ quan, tổ chức thu tiền bán đấu giá để nộp thuế, trừ hàng hóa nhập khẩu bị tịch thu để bán đấu giá thuộc sở hữu toàn dân;"},{"k":"p","t":"đ) Hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế, người khai thuế cầm cố, thế chấp để làm tài sản bảo đảm các khoản vay, trường hợp tổ chức tín dụng phải xử lý tài sản cầm cố, thế chấp theo quy định của pháp luật để thu hồi nợ nhưng người khai thuế chưa kê khai tờ khai hải quan mới, chưa nộp đủ thuế theo quy định của pháp luật về hải quan;"},{"k":"p","t":"e) Hàng hóa xuất khẩu, nhập khẩu trong các trường hợp khác do cơ quan hải quan hoặc cơ quan thanh tra, kiểm toán thực hiện kiểm tra, thanh tra, kiểm toán tại trụ sở người khai thuế, tại cơ quan hải quan phát hiện người khai thuế không kê khai hoặc kê khai, tính thuế hoặc xác định số tiền thuế được miễn, giảm, hoàn, không thu thuế hoặc xác định không thuộc đối tượng chịu thuế không đúng quy định của pháp luật."},{"k":"p","t":"3. Cơ quan hải quan thực hiện ấn định dựa trên các căn cứ quy định tại khoản 2 Điều 25 Luật Quản lý thuế. Việc ấn định được thực hiện trong quá trình làm thủ tục hải quan, sau khi hàng hóa đã được thông quan hoặc giải phóng hàng."},{"k":"p","t":"4. Phương pháp ấn định: cơ quan hải quan xác định các yếu tố của căn cứ tính thuế, phương pháp tính thuế nhằm xác định số tiền thuế mà người nộp thuế phải nộp."},{"k":"p","t":"5. Thẩm quyền quyết định ấn định thuế, sửa đổi, bổ sung quyết định ấn định thuế, hủy quyết định ấn định thuế: thủ trưởng cơ quan hải quan quy định tại điểm b khoản 2 Điều 2 Nghị định này."},{"k":"p","t":"6. Trách nhiệm của người nộp thuế:"},{"k":"p","t":"a) Người nộp thuế, người được người nộp thuế ủy quyền, người bảo lãnh, người nộp thay thuế cho người nộp thuế có trách nhiệm nộp đủ số tiền thuế ấn định, tiền phạt, tiền chậm nộp theo quyết định ấn định của cơ quan hải quan:"},{"k":"p","t":"a.1) Trường hợp hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế, người khai thuế cầm cố, thế chấp để làm tài sản bảo đảm các khoản vay, người khai thuế chưa kê khai tờ khai hải quan mới, nộp đủ thuế theo quy định của pháp luật về hải quan nhưng tổ chức tín dụng phải xử lý tài sản cầm cố, thế chấp theo quy định của pháp luật để thu hồi nợ theo quy định tại điểm đ khoản 2 Điều này thì tổ chức tín dụng có trách nhiệm nộp thay thuế cho người khai thuế;"},{"k":"p","t":"a.2) Trường hợp hàng hóa nhập khẩu chưa hoàn thành thủ tục hải quan bị cơ quan hải quan kê biên, bán đấu giá để cưỡng chế thi hành quyết định hành chính về quản lý thuế trong lĩnh vực hải quan, hàng hóa thuộc đối tượng miễn thuế, không chịu thuế bị kê biên, bán đấu giá theo quyết định của cơ quan có thẩm quyền, bản án, quyết định của Tòa án thuộc đối tượng phải nộp thuế thì cơ quan, tổ chức thu tiền bán đấu giá có nghĩa vụ trích nộp tiền thu được từ tiền bán đấu giá để nộp tiền thuế đối với hàng hóa bị kê biên, bán đấu giá cho cơ quan hải quan;"},{"k":"p","t":"b) Người nộp thuế, người được người nộp thuế ủy quyền, người bảo lãnh, người nộp thay thuế cho người nộp thuế không đồng ý với quyết định ấn định thuế của cơ quan hải quan vẫn phải nộp đủ số tiền thuế ấn định, tiền chậm nộp, tiền phạt theo quy định tại điểm o khoản 2 Điều 37 Luật Quản lý thuế, trừ trường hợp cơ quan có thẩm quyền quyết định tạm đình chỉ thực hiện quyết định ấn định thuế."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính hướng dẫn trình tự ấn định thuế quy định tại Điều này."},{"k":"p","t":"KHAI, NỘP THUẾ, KHOẢN THU KHÁC CỦA TỔ CHỨC NƯỚC NGOÀI, CÁ NHÂN KHÔNG CƯ TRÚ CÓ HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ VÀ DỊCH VỤ KHÁC"}]},{"id":"nd252_40","no":40,"code":"Điều 40","title":"Điều 40. Trực tiếp khai, tính, nộp thuế, tiền chậm nộp, tiền phạt của tổ chức nước ngoài có phát sinh doanh thu tại Việt Nam thông qua hoạt động kinh doanh trên nền tảng thương mại điện tử","shortTitle":"Trực tiếp khai, tính, nộp thuế, tiền chậm nộp, tiền phạt của tổ chức nước ngoài có phát sinh doanh thu tại Việt Nam thông qua hoạt động kinh doanh trên nền tảng thương mại điện tử","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đăng ký giao dịch thuế điện tử và đăng ký thuế:"},{"k":"p","t":"a) Tổ chức nước ngoài (bao gồm cả chủ quản nền tảng thương mại điện tử, nền tảng số ở nước ngoài) có hoạt động kinh doanh trên nền tảng thương mại điện tử và các dịch vụ khác có phát sinh doanh thu tính thuế tại Việt Nam (sau đây gọi là nhà cung cấp nước ngoài) thực hiện đăng ký giao dịch thuế điện tử cùng với đăng ký thuế lần đầu và được cơ quan thuế cấp mã số thuế thông qua Hệ thống thông tin quản lý thuế."},{"k":"p","t":"Trường hợp nghĩa vụ thuế của toàn bộ doanh thu phát sinh tại Việt Nam của nhà cung cấp nước ngoài đã được tổ chức kinh doanh tại Việt Nam áp dụng phương pháp tính thuế giá trị gia tăng là phương pháp khấu trừ thuế hoặc chủ quản nền tảng thương mại điện tử thực hiện khấu trừ và nộp thay số thuế phải nộp theo quy định tại Điều 43 Nghị định này thì không phải thực hiện thủ tục đăng ký thuế quy định tại điểm này;"},{"k":"p","t":"b) Trường hợp có thay đổi thông tin đăng ký thuế, nhà cung cấp nước ngoài thực hiện việc thay đổi thông tin theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"c) Thời hạn đăng ký thuế thực hiện theo quy định tại khoản 3 Điều 6 Nghị định này;"},{"k":"p","t":"d) Điều kiện giao dịch thuế điện tử, trình tự, thủ tục, hồ sơ đăng ký giao dịch thuế điện tử, đăng ký thuế thực hiện theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"đ) Khi thực hiện đăng ký thuế lần đầu, nhà cung cấp nước ngoài có trách nhiệm khai báo đầy đủ thông tin về tài khoản nhận thanh toán có liên quan đến các giao dịch phát sinh doanh thu tại Việt Nam, bao gồm:"},{"k":"p","t":"đ.1) Tài khoản ngân hàng, tài khoản thanh toán, ví điện tử hoặc các hình thức nhận thanh toán khác mà nhà cung cấp nước ngoài sử dụng để nhận tiền thanh toán từ tổ chức, cá nhân tại Việt Nam hoặc từ chủ quản nền tảng thương mại điện tử liên quan đến giao dịch phát sinh doanh thu tại Việt Nam;"},{"k":"p","t":"đ.2) Thông tin khai báo bao gồm: tên tổ chức tín dụng hoặc tổ chức cung ứng dịch vụ thanh toán; quốc gia nơi mở tài khoản; số tài khoản hoặc mã định danh tài khoản; tên chủ tài khoản; loại tiền tệ của tài khoản."},{"k":"p","t":"2. Khai thuế, tính thuế, nộp thuế:"},{"k":"p","t":"a) Khai thuế, nộp thuế:"},{"k":"p","t":"a.1) Đối với nhà cung cấp nước ngoài kinh doanh thường xuyên: thực hiện khai thuế, nộp thuế theo tháng;"},{"k":"p","t":"a.2) Đối với nhà cung cấp nước ngoài kinh doanh không thường xuyên: thực hiện khai thuế, nộp thuế theo từng lần phát sinh đối với doanh thu phát sinh tại Việt Nam;"},{"k":"p","t":"b) Nhà cung cấp nước ngoài thực hiện tính thuế giá trị gia tăng, thuế thu nhập doanh nghiệp theo quy định của pháp luật thuế giá trị gia tăng, thuế thu nhập doanh nghiệp;"},{"k":"p","t":"c) Nguyên tắc xác định doanh thu phát sinh tại Việt Nam để kê khai thuế, tính thuế như sau:"},{"k":"p","t":"c.1) Các loại thông tin được sử dụng để xác định giao dịch của tổ chức, cá nhân mua hàng hóa, dịch vụ phát sinh tại Việt Nam gồm: thông tin liên quan đến việc thanh toán của tổ chức, cá nhân tại Việt Nam, thông tin tài khoản ngân hàng hoặc các thông tin tương tự mà tổ chức, cá nhân mua hàng sử dụng để thanh toán với nhà cung cấp nước ngoài; thông tin về tình trạng cư trú của tổ chức, cá nhân tại Việt Nam (thông tin địa chỉ thanh toán, địa chỉ giao hàng, địa chỉ nhà hoặc các thông tin tương tự mà tổ chức, cá nhân mua hàng khai báo với nhà cung cấp nước ngoài); thông tin về truy cập của tổ chức, cá nhân tại Việt Nam (thông tin về mã vùng điện thoại quốc gia của thẻ SIM, địa chỉ IP, vị trí đường dây điện thoại cố định hoặc các thông tin tương tự của tổ chức, cá nhân mua hàng);"},{"k":"p","t":"c.2) Khi xác định một giao dịch phát sinh tại Việt Nam để kê khai thuế, tính thuế, nhà cung cấp nước ngoài thực hiện sử dụng 02 thông tin không mâu thuẫn nhau bao gồm một thông tin liên quan đến việc thanh toán của tổ chức, cá nhân tại Việt Nam và một thông tin về tình trạng cư trú hoặc thông tin về truy cập của tổ chức, cá nhân tại Việt Nam nêu trên. Trong trường hợp thông tin liên quan đến việc thanh toán của tổ chức, cá nhân không thu thập được hoặc mâu thuẫn với thông tin còn lại, nhà cung cấp nước ngoài được phép sử dụng 02 thông tin không mâu thuẫn nhau bao gồm một thông tin về tình trạng cư trú và một thông tin về truy cập của tổ chức, cá nhân tại Việt Nam;"},{"k":"p","t":"d) Thủ tục, hồ sơ khai thuế, nộp thuế, xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa (không bao gồm hoàn thuế): nhà cung cấp nước ngoài thực hiện khai thuế trực tiếp tại Hệ thống thông tin quản lý thuế, sử dụng mã xác thực giao dịch điện tử do cơ quan thuế quản lý cấp và gửi hồ sơ khai thuế điện tử, hồ sơ khai bổ sung, hồ sơ đề nghị xử lý tiền thuế nộp thừa cho cơ quan thuế quản lý trực tiếp theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"đ) Thời hạn nộp hồ sơ khai thuế thực hiện theo quy định tại Điều 10 Nghị định này;"},{"k":"p","t":"e) Thời hạn nộp thuế thực hiện theo quy định tại điểm a khoản 1 Điều 14 Luật Quản lý thuế."},{"k":"p","t":"3. Trách nhiệm của nhà cung cấp nước ngoài:"},{"k":"p","t":"a) Phải lưu trữ các thông tin quy định tại khoản 2 Điều này được sử dụng để xác định giao dịch của tổ chức, cá nhân mua hàng phát sinh tại Việt Nam phục vụ công tác kiểm tra của cơ quan thuế;"},{"k":"p","t":"b) Rà soát, xác nhận tính chính xác, đầy đủ của thông tin tài khoản nhận thanh toán đã khai báo khi có thay đổi. Việc xác nhận thông tin rà soát được thực hiện thông qua Hệ thống thông tin quản lý thuế cùng thời điểm với kỳ khai thuế tháng 12. Trường hợp không có thay đổi, nhà cung cấp nước ngoài không phải xác nhận thông tin."},{"k":"p","t":"4. Trường hợp nhà cung cấp nước ngoài thuộc nước hoặc vùng lãnh thổ đã ký kết Hiệp định tránh đánh thuế hai lần với Việt Nam thì thực hiện thủ tục miễn thuế, giảm thuế theo quy định tại điểm d khoản 1 Điều 32 Nghị định này."},{"k":"p","t":"5. Nhà cung cấp nước ngoài chấm dứt hoạt động kinh doanh tại Việt Nam phải thông báo cho cơ quan thuế về việc chấm dứt hoạt động và nộp đủ tiền thuế, tiền chậm nộp, tiền phạt vi phạm hành chính về quản lý thuế (nếu có) cho cơ quan thuế Việt Nam; nhà cung cấp nước ngoài tự kê khai, tự nộp, tự chịu trách nhiệm trong việc hoàn thành nghĩa vụ nộp thuế tại Việt Nam."}]},{"id":"nd252_41","no":41,"code":"Điều 41","title":"Điều 41. Ủy quyền thực hiện đăng ký thuế, khai thuế, nộp thuế tại Việt Nam của nhà cung cấp nước ngoài","shortTitle":"Ủy quyền thực hiện đăng ký thuế, khai thuế, nộp thuế tại Việt Nam của nhà cung cấp nước ngoài","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Trường hợp nhà cung cấp nước ngoài thực hiện ủy quyền cho tổ chức hoạt động theo pháp luật Việt Nam, đại lý thuế (sau đây gọi là bên được ủy quyền) thì bên được ủy quyền có trách nhiệm thực hiện các thủ tục về thuế theo hợp đồng đã ký với nhà cung cấp nước ngoài như trường hợp quy định tại Điều 40 Nghị định này. Trình tự thủ tục kê khai thuế, nộp thuế thực hiện theo hướng dẫn của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"2. Trường hợp nhà cung cấp nước ngoài đã trực tiếp đăng ký thuế, kê khai thuế, nộp thuế tại Việt Nam mà chuyển sang ủy quyền cho tổ chức, đại lý thuế kê khai thuế, nộp thay thuế thì thực hiện thông báo cho cơ quan thuế theo hướng dẫn của Bộ trưởng Bộ Tài chính."}]},{"id":"nd252_42","no":42,"code":"Điều 42","title":"Điều 42. Trực tiếp khai thuế, tính thuế, nộp thuế của cá nhân không cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử không có chức năng đặt hàng trực tuyến và chức năng thanh toán","shortTitle":"Trực tiếp khai thuế, tính thuế, nộp thuế của cá nhân không cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử không có chức năng đặt hàng trực tuyến và chức năng thanh toán","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đăng ký giao dịch thuế điện tử và đăng ký thuế:"},{"k":"p","t":"a) Cá nhân không cư trú sử dụng địa chỉ thư điện tử chính thức giao dịch với cơ quan thuế để thực hiện đăng ký giao dịch thuế điện tử cùng với đăng ký thuế lần đầu thông qua hồ sơ khai thuế và được cơ quan thuế thông báo mã số thuế thông qua Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"b) Trường hợp có thay đổi thông tin đăng ký thuế, cá nhân không cư trú thực hiện việc thay đổi thông tin thông qua hồ sơ khai thuế; cơ quan thuế quản lý trực tiếp người nộp thuế có trách nhiệm cập nhật các thông tin thay đổi vào Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"c) Thời hạn đăng ký thuế thực hiện theo quy định khoản 3 Điều 6 Nghị định này."},{"k":"p","t":"2. Khai thuế, tính thuế, nộp thuế:"},{"k":"p","t":"a) Cá nhân không cư trú thực hiện khai thuế theo từng lần phát sinh, trừ trường hợp quy định tại điểm c khoản 3 Điều 43 Nghị định này;"},{"k":"p","t":"b) Cá nhân không cư trú tính thuế theo quy định của pháp luật thuế;"},{"k":"p","t":"c) Cá nhân không cư trú nộp thuế bằng phương thức điện tử qua Hệ thống thông tin quản lý thuế."},{"k":"p","t":"3. Hồ sơ khai thuế thực hiện theo hướng dẫn của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"PHẠM VI TRÁCH NHIỆM, CÁCH THỨC KHẤU TRỪ, KHAI THAY VÀ NỘP THAY SỐ THUẾ ĐÃ KHẤU TRỪ CỦA CHỦ QUẢN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ CÓ CHỨC NĂNG ĐẶT HÀNG TRỰC TUYẾN VÀ CHỨC NĂNG THANH TOÁN, TỔ CHỨC KINH DOANH TẠI VIỆT NAM CÓ HOẠT ĐỘNG KINH TẾ SỐ KHÁC; QUYỀN VÀ TRÁCH NHIỆM CỦA HỘ, CÁ NHÂN CÓ HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ"}]},{"id":"nd252_43","no":43,"code":"Điều 43","title":"Điều 43. Khấu trừ, nộp thay số thuế đã khấu trừ đối với hoạt động kinh doanh trên nền tảng thương mại điện tử","shortTitle":"Khấu trừ, nộp thay số thuế đã khấu trừ đối với hoạt động kinh doanh trên nền tảng thương mại điện tử","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Chủ quản nền tảng thương mại điện tử có chức năng đặt hàng trực tuyến và chức năng thanh toán (trong nước và ngoài nước), bao gồm chủ sở hữu trực tiếp quản lý nền tảng hoặc tổ chức, cá nhân được ủy quyền quản lý nền tảng hoặc tổ chức tại Việt Nam có hoạt động kinh tế số khác thay mặt chủ quản nền tảng thương mại điện tử ở nước ngoài thực hiện chi trả thu nhập cho hộ kinh doanh, cá nhân kinh doanh từ sản phẩm, dịch vụ nội dung thông tin số theo quy định pháp luật về công nghệ thông tin có trách nhiệm thực hiện khấu trừ, khai thay và nộp thay số thuế đã khấu trừ đối với hoạt động kinh doanh trên nền tảng thương mại điện tử của hộ kinh doanh, cá nhân kinh doanh như sau:"},{"k":"p","t":"a) Khấu trừ, nộp thay số thuế giá trị gia tăng phải nộp theo quy định của pháp luật thuế giá trị gia tăng đối với mỗi giao dịch cung cấp hàng hóa, dịch vụ phát sinh doanh thu ở trong nước của hộ kinh doanh, cá nhân có hoạt động kinh doanh trên nền tảng thương mại điện tử;"},{"k":"p","t":"b) Khấu trừ, nộp thay số thuế thu nhập cá nhân:"},{"k":"p","t":"b.1) Khấu trừ, nộp thay số thuế thu nhập cá nhân phải nộp theo quy định của pháp luật thuế thu nhập cá nhân đối với mỗi giao dịch cung cấp hàng hóa, dịch vụ phát sinh doanh thu trong và ngoài nước của cá nhân cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử;"},{"k":"p","t":"b.2) Khấu trừ, nộp thay số thuế thu nhập cá nhân phải nộp theo quy định của pháp luật thuế thu nhập cá nhân đối với mỗi giao dịch cung cấp hàng hóa, dịch vụ phát sinh doanh thu trong nước của cá nhân không cư trú có hoạt động kinh doanh trên nền tảng thương mại điện tử."},{"k":"p","t":"2. Chủ quản nền tảng thương mại điện tử có chức năng đặt hàng trực tuyến và chức năng thanh toán (trong nước và ngoài nước) thực hiện khấu trừ, nộp thay số thuế giá trị gia tăng và thuế thu nhập doanh nghiệp phải nộp theo quy định của pháp luật thuế giá trị gia tăng, pháp luật thuế thu nhập doanh nghiệp đối với từng giao dịch cung cấp hàng hóa, dịch vụ phát sinh doanh thu tại Việt Nam của nhà cung cấp nước ngoài có hoạt động kinh doanh trên nền tảng thương mại điện tử."},{"k":"p","t":"Nhà cung cấp nước ngoài đã được chủ quản nền tảng thương mại điện tử khấu trừ, khai và nộp thay số thuế đã khấu trừ thì không phải khai, nộp thuế giá trị gia tăng, thuế thu nhập doanh nghiệp đối với các hoạt động kinh doanh trên nền tảng thương mại điện tử đã được chủ quản nền tảng thương mại điện tử khấu trừ, nộp thay thuế."},{"k":"p","t":"3. Tổ chức kinh doanh tại Việt Nam áp dụng phương pháp khấu trừ thuế giá trị gia tăng khi mua hàng hóa, dịch vụ của nhà cung cấp nước ngoài, cá nhân không cư trú trên nền tảng thương mại điện tử có trách nhiệm:"},{"k":"p","t":"a) Khấu trừ, nộp thay số thuế giá trị gia tăng phải nộp của nhà cung cấp nước ngoài, cá nhân không cư trú đối với việc cung cấp dịch vụ theo quy định của pháp luật thuế giá trị gia tăng;"},{"k":"p","t":"b) Khấu trừ, nộp thay số thuế thu nhập doanh nghiệp phải nộp của nhà cung cấp nước ngoài theo quy định tại Điều 44 Nghị định này;"},{"k":"p","t":"c) Khấu trừ, nộp thay số thuế thu nhập cá nhân phải nộp của cá nhân không cư trú theo quy định tại Điều 44 Nghị định này."},{"k":"p","t":"4. Trường hợp tổ chức kinh doanh tại Việt Nam đã thực hiện khấu trừ, nộp thay theo quy định tại khoản 3 Điều này đối với giao dịch phát sinh trên nền tảng thương mại điện tử có chức năng thanh toán và chức năng đặt hàng trực tuyến thì thông báo bằng phương thức điện tử cho chủ quản nền tảng thương mại điện tử để không thực hiện khấu trừ thuế đối với cùng giao dịch đó."},{"k":"p","t":"Thông báo phải có thông tin xác định giao dịch đã được khấu trừ, nộp thay, gồm: mã số thuế của tổ chức đã khấu trừ, mã giao dịch hoặc mã đơn hàng, giá trị giao dịch, số thuế đã khấu trừ, nộp thay và thông tin của tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ. Tổ chức kinh doanh tại Việt Nam và chủ quản nền tảng thương mại điện tử có trách nhiệm lưu giữ thông tin, chứng từ liên quan và cung cấp cho cơ quan quản lý thuế khi có yêu cầu."}]},{"id":"nd252_44","no":44,"code":"Điều 44","title":"Điều 44. Thời điểm khấu trừ và căn cứ xác định số thuế phải khấu trừ","shortTitle":"Thời điểm khấu trừ và căn cứ xác định số thuế phải khấu trừ","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thời điểm thực hiện khấu trừ:"},{"k":"p","t":"a) Đối với tổ chức kinh doanh tại Việt Nam quy định tại khoản 3 Điều 43 Nghị định này là thời điểm thanh toán cho nhà cung cấp nước ngoài, cá nhân không cư trú;"},{"k":"p","t":"b) Đối với chủ quản nền tảng thương mại điện tử là thời điểm xác nhận giao dịch thành công và chấp nhận thanh toán theo quy định của nền tảng."},{"k":"p","t":"2. Xác định số thuế phải khấu trừ:"},{"k":"p","t":"a) Số thuế giá trị gia tăng, thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân phải khấu trừ được xác định theo tỷ lệ phần trăm (%) thuế suất trên doanh thu phát sinh tại Việt Nam. Trong đó:"},{"k":"p","t":"a.1) Tỷ lệ % thuế suất thực hiện theo quy định của pháp luật thuế giá trị gia tăng, thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân đối với mỗi giao dịch bán hàng hóa, cung cấp dịch vụ;"},{"k":"p","t":"a.2) Doanh thu phát sinh tại Việt Nam là số tiền bán hàng hóa, cung cấp dịch vụ mà tổ chức nước ngoài, hộ kinh doanh, cá nhân kinh doanh được hưởng do tổ chức kinh doanh tại Việt Nam chi trả hoặc chủ quản nền tảng thu hộ;"},{"k":"p","t":"b) Trường hợp tổ chức kinh doanh tại Việt Nam, chủ quản nền tảng thương mại điện tử thuộc đối tượng khấu trừ, nộp thay số thuế đã khấu trừ không xác định được giao dịch phát sinh doanh thu từ nền tảng thương mại điện tử là hàng hóa hay dịch vụ hoặc loại dịch vụ trên cơ sở dữ liệu và thông tin sẵn có thì việc xác định số thuế phải khấu trừ thực hiện theo mức tỷ lệ % thuế suất cao nhất theo quy định tại pháp luật thuế giá trị gia tăng, thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân."}]},{"id":"nd252_45","no":45,"code":"Điều 45","title":"Điều 45. Đăng ký thuế, cách thức kê khai và nộp thay số thuế đã khấu trừ","shortTitle":"Đăng ký thuế, cách thức kê khai và nộp thay số thuế đã khấu trừ","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đăng ký giao dịch thuế điện tử và đăng ký thuế:"},{"k":"p","t":"a) Chủ quản nền tảng thương mại điện tử ở trong nước, tổ chức tại Việt Nam có hoạt động kinh tế số khác thực hiện đăng ký thuế và được cấp mã số thuế riêng cho việc khai và nộp thay số thuế đã khấu trừ theo hướng dẫn của Bộ trưởng Bộ Tài chính và được sử dụng tài khoản giao dịch thuế điện tử đã được cấp để thực hiện giao dịch thuế điện tử;"},{"k":"p","t":"b) Chủ quản nền tảng thương mại điện tử ở nước ngoài sử dụng mã số thuế đã được cấp và tài khoản giao dịch thuế điện tử theo quy định tại khoản 1 Điều 40 Nghị định này để khai và nộp số thuế đã khấu trừ."},{"k":"p","t":"2. Chủ quản nền tảng thương mại điện tử thực hiện khai số thuế đã khấu trừ theo tháng."},{"k":"p","t":"Đối với giao dịch bị hủy hoặc trả lại hàng thì chủ quản nền tảng thương mại điện tử thực hiện bù trừ số thuế đã khấu trừ, nộp thay của giao dịch bị hủy hoặc trả lại hàng với số thuế phải khấu trừ, nộp thay của các giao dịch bán hàng hóa, cung cấp dịch vụ."},{"k":"p","t":"Số thuế nộp thay của chủ quản nền tảng thương mại điện tử được xác định bằng tổng số thuế của các giao dịch bán hàng hóa, cung cấp dịch vụ sau khi bù trừ với tổng số thuế các giao dịch bị hủy hoặc trả lại hàng của tổ chức nước ngoài, hộ kinh doanh, cá nhân kinh doanh (nếu có)."},{"k":"p","t":"3. Tổ chức kinh doanh tại Việt Nam thực hiện khai số thuế đã khấu trừ theo từng lần phát sinh. Trường hợp phát sinh nhiều lần trong tháng thì được khai theo tháng."},{"k":"p","t":"4. Thời hạn nộp hồ sơ khai và nộp số thuế đã khấu trừ thực hiện theo quy định tại Điều 10 Nghị định này."},{"k":"p","t":"5. Hồ sơ kê khai số thuế đã khấu trừ, cơ quan thuế tiếp nhận, xử lý hồ sơ khai thuế thực hiện theo hướng dẫn của Bộ trưởng Bộ Tài chính."}]},{"id":"nd252_46","no":46,"code":"Điều 46","title":"Điều 46. Trách nhiệm của chủ quản nền tảng thương mại điện tử thuộc đối tượng khấu trừ, nộp thay thuế, nhà cung cấp nước ngoài; quyền và trách nhiệm của hộ kinh doanh, cá nhân kinh doanh có hoạt động kinh doanh trên nền tảng thương mại điện tử","shortTitle":"Trách nhiệm của chủ quản nền tảng thương mại điện tử thuộc đối tượng khấu trừ, nộp thay thuế, nhà cung cấp nước ngoài; quyền và trách nhiệm của hộ kinh doanh, cá nhân kinh doanh có hoạt động kinh doanh trên nền tảng thương mại điện tử","chuong":"Chương III — KHAI VÀ NỘP THUẾ, KHOẢN THU KHÁC ĐỐI VỚI HOẠT ĐỘNG KINH DOANH TRÊN NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ, NỀN TẢNG SỐ KHÁC (SAU ĐÂY GỌI LÀ NỀN TẢNG THƯƠNG MẠI ĐIỆN TỬ)","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trách nhiệm của chủ quản nền tảng thương mại điện tử thuộc đối tượng khấu trừ, nộp thay số thuế đã khấu trừ:"},{"k":"p","t":"a) Thực hiện quản lý tên và mật khẩu của các tài khoản đã được cơ quan thuế cấp; lưu giữ dữ liệu giao dịch kinh doanh, thông tin và tài liệu liên quan đến việc xác định số thuế phải nộp, số thuế đã khấu trừ của nhà cung cấp nước ngoài, hộ kinh doanh, cá nhân kinh doanh theo quy định pháp luật về quản lý thuế;"},{"k":"p","t":"b) Thực hiện khấu trừ thuế, kê khai số thuế đã khấu trừ, nộp thay số thuế đã khấu trừ chính xác, đầy đủ theo thông tin cung cấp của nhà cung cấp nước ngoài, hộ kinh doanh, cá nhân kinh doanh và theo quy định tại Nghị định này; chịu trách nhiệm trước pháp luật về tính chính xác, trung thực, đầy đủ của hồ sơ thuế;"},{"k":"p","t":"c) Cung cấp thông tin khác về hoạt động kinh doanh trên nền tảng thương mại điện tử theo yêu cầu của cơ quan quản lý thuế theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"d) Thực hiện trả đầy đủ, kịp thời số tiền thuế đã khấu trừ, nộp thay của nhà cung cấp nước ngoài, hộ kinh doanh, cá nhân kinh doanh đối với các giao dịch bị hủy hoặc trả lại hàng;"},{"k":"p","t":"đ) Thực hiện trách nhiệm theo quy định tại Điều 14 Nghị định số 68/2026/NĐ-CP của Chính phủ."},{"k":"p","t":"2. Nhà cung cấp nước ngoài có hoạt động kinh doanh trên nền tảng thương mại điện tử với tổ chức, cá nhân tại Việt Nam, có doanh thu từ Việt Nam chưa được tổ chức kinh doanh tại Việt Nam, chủ quản nền tảng thương mại điện tử khấu trừ, kê khai, nộp thay có trách nhiệm trực tiếp đăng ký, khai thuế, nộp thuế thông qua Hệ thống thông tin quản lý thuế; cung cấp chính xác, đầy đủ, kịp thời thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế phải nộp cho chủ quản nền tảng thương mại điện tử thuộc đối tượng khấu trừ, nộp thay thuế và chịu trách nhiệm thực hiện nghĩa vụ thuế theo quy định của Nghị định này."},{"k":"p","t":"3. Quyền và trách nhiệm của hộ kinh doanh, cá nhân kinh doanh có hoạt động kinh doanh trên nền tảng thương mại điện tử thực hiện theo quy định tại Điều 13 Nghị định số 68/2026/NĐ-CP của Chính phủ."}]},{"id":"nd252_47","no":47,"code":"Điều 47","title":"Điều 47. Hợp tác và hỗ trợ hành chính về thuế với cơ quan thuế nước ngoài, tổ chức quốc tế","shortTitle":"Hợp tác và hỗ trợ hành chính về thuế với cơ quan thuế nước ngoài, tổ chức quốc tế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"Hợp tác và hỗ trợ hành chính thuế khác với cơ quan thuế nước ngoài, tổ chức quốc tế quy định tại điểm e khoản 2 Điều 30 Luật Quản lý thuế gồm:"},{"k":"p","t":"1. Hỗ trợ thu thuế:"},{"k":"p","t":"a) Đề nghị cơ quan quản lý thuế nước ngoài và các cơ quan có thẩm quyền thực hiện hỗ trợ thu thuế tại nước ngoài đối với các khoản nợ thuế tại Việt Nam mà người nộp thuế có nghĩa vụ phải nộp khi người nộp thuế không còn ở Việt Nam;"},{"k":"p","t":"b) Thực hiện hỗ trợ thu thuế theo đề nghị của cơ quan quản lý thuế nước ngoài đối với các khoản nợ thuế phải nộp tại nước ngoài của người nộp thuế tại Việt Nam bằng biện pháp đôn đốc thu nợ thuế theo quy định của pháp luật về quản lý thuế và phù hợp với thực tiễn quản lý thuế của Việt Nam;"},{"k":"p","t":"c) Bộ trưởng Bộ Tài chính hướng dẫn nguyên tắc thực hiện hỗ trợ thu thuế quy định tại khoản này."},{"k":"p","t":"2. Kiểm tra thuế đồng thời theo Hiệp định đa phương về hỗ trợ hành chính thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên gồm các nội dung sau:"},{"k":"p","t":"a) Đề nghị cơ quan quản lý thuế nước ngoài phối hợp thực hiện kiểm tra thuế tại nước ngoài vào cùng thời điểm đối với các vấn đề thuế của một hoặc nhiều người nộp thuế có lợi ích chung hoặc có liên quan;"},{"k":"p","t":"b) Xem xét thực hiện kiểm tra thuế đồng thời tại Việt Nam theo đề nghị của cơ quan quản lý thuế nước ngoài đối với các vấn đề thuế của một hoặc nhiều người nộp thuế tại Việt Nam có lợi ích chung hoặc có liên quan;"},{"k":"p","t":"c) Cơ quan thuế Việt Nam tham vấn với cơ quan quản lý thuế nước ngoài để xác định các trường hợp và quy trình thực hiện kiểm tra thuế đồng thời phù hợp với quy định pháp luật của mỗi nước."}]},{"id":"nd252_48","no":48,"code":"Điều 48","title":"Điều 48. Điều kiện, phạm vi, hình thức áp dụng và thu hồi chế độ ưu tiên đối với người nộp thuế","shortTitle":"Điều kiện, phạm vi, hình thức áp dụng và thu hồi chế độ ưu tiên đối với người nộp thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các hình thức ưu tiên đối với người nộp thuế:"},{"k":"p","t":"a) Ưu tiên áp dụng quy trình tự động trong thực hiện thủ tục hành chính thuế, bao gồm:"},{"k":"p","t":"a.1) Giảm các bước trung gian trong quy trình xử lý, phê duyệt nội bộ;"},{"k":"p","t":"a.2) Được tự động điền trước thông tin trong hồ sơ khai thuế khi dữ liệu đã có trong cơ sở dữ liệu quản lý thuế, dữ liệu đã được kết nối, chia sẻ;"},{"k":"p","t":"a.3) Các thủ tục hành chính thuế được áp dụng cơ chế chấp thuận tự động trừ trường hợp hệ thống phát hiện rủi ro trong thời hạn xử lý theo quy định;"},{"k":"p","t":"b) Ưu tiên về thời gian giải quyết hồ sơ:"},{"k":"p","t":"b.1) Rút ngắn thời hạn giải quyết hồ sơ hoàn thuế, miễn thuế, giảm thuế và các thủ tục hành chính thuế khác;"},{"k":"p","t":"b.2) Áp dụng hoàn thuế trước kiểm tra sau trên cơ sở quản lý rủi ro;"},{"k":"p","t":"b.3) Thực hiện hoàn thuế, miễn thuế, giảm thuế tự động đối với các trường hợp đáp ứng điều kiện và có dữ liệu điện tử đúng, đủ;"},{"k":"p","t":"c) Ưu tiên về phương thức kiểm tra, giám sát, bao gồm:"},{"k":"p","t":"c.1) Được kiểm tra, giám sát từ xa trên cơ sở dữ liệu điện tử của người nộp thuế;"},{"k":"p","t":"c.2) Không đưa vào kế hoạch kiểm tra tại trụ sở người nộp thuế trừ trường hợp cơ quan thuế có thông tin thu thập được về người nộp thuế có dấu hiệu rủi ro cao;"},{"k":"p","t":"d) Ưu tiên về dịch vụ hỗ trợ người nộp thuế:"},{"k":"p","t":"d.1) Được hỗ trợ trực tuyến và trao đổi thông tin trực tiếp với cơ quan thuế;"},{"k":"p","t":"d.2) Được cảnh báo rủi ro và hỗ trợ tuân thủ;"},{"k":"p","t":"đ) Được ưu tiên khi xem xét xếp hạng tuân thủ giữa cơ quan quản lý thuế và các cơ quan, tổ chức liên quan;"},{"k":"p","t":"e) Ưu tiên đối với người nộp thuế có giao dịch liên kết:"},{"k":"p","t":"e.1) Được thực hiện trao đổi thông tin trước, trong và sau khi kê khai nghĩa vụ thuế đối với giao dịch liên kết với cơ quan thuế;"},{"k":"p","t":"e.2) Được ưu tiên về thủ tục xử lý hồ sơ áp dụng thỏa thuận xác định giá tính thuế (APA), thủ tục thỏa thuận song phương (MAP) và hồ sơ trao đổi thông tin;"},{"k":"p","t":"e.3) Được cảnh báo rủi ro và hỗ trợ tuân thủ đối với các giao dịch liên kết;"},{"k":"p","t":"g) Được ưu tiên áp dụng các chương trình hỗ trợ nâng cao tuân thủ tự nguyện của cơ quan thuế và các chế độ ưu tiên theo quy định tại Điều này."},{"k":"p","t":"2. Phạm vi áp dụng chế độ ưu tiên:"},{"k":"p","t":"a) Người nộp thuế được áp dụng chế độ ưu tiên khi thực hiện các thủ tục về miễn thuế, giảm thuế, hoàn thuế, gia hạn thời hạn khai thuế, gia hạn nộp thuế, xác nhận tình trạng nợ thuế, xác nhận nghĩa vụ thuế và các thủ tục hành chính thuế khác theo quy trình tự động, rút gọn theo quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Cơ quan thuế thực hiện chế độ ưu tiên trong công tác quản lý thuế, như sau:"},{"k":"p","t":"b.1) Hệ thống tự động điền tờ khai thuế trên cơ sở dữ liệu hóa đơn điện tử và dữ liệu kê khai của người nộp thuế;"},{"k":"p","t":"b.2) Ưu tiên xử lý trước và rút ngắn thời gian so với các hồ sơ thông thường trong cùng loại thủ tục, trừ trường hợp kết quả đánh giá rủi ro của cơ quan thuế xác định người nộp thuế có dấu hiệu rủi ro cao;"},{"k":"p","t":"b.3) Ưu tiên triển khai hoàn thuế tự động, hoàn thuế trước kiểm tra sau, miễn thuế, giảm thuế khi thuộc đối tượng được miễn, giảm thuế theo quy định của pháp luật về thuế theo quy định tại khoản 3 Điều 18 và khoản 4 Điều 19 Luật Quản lý thuế;"},{"k":"p","t":"b.4) Thực hiện kiểm tra, giám sát từ xa trên cơ sở dữ liệu điện tử do người nộp thuế cung cấp hoặc kết nối với Hệ thống thông tin quản lý thuế. Không thực hiện kiểm tra tại trụ sở người nộp thuế đang áp dụng chế độ ưu tiên, trừ các trường hợp người nộp thuế có dấu hiệu vi phạm pháp luật về thuế;"},{"k":"p","t":"b.5) Giảm thiểu yêu cầu cung cấp các thông tin đã có trong hệ thống của Cơ quan nhà nước;"},{"k":"p","t":"b.6) Ưu tiên tiếp cận thông tin, dữ liệu có liên quan đến kết quả hoạt động sản xuất, kinh doanh của người nộp thuế và các kết quả cảnh báo, quản lý rủi ro, quản lý tuân thủ từ cơ sở dữ liệu của ngành thuế;"},{"k":"p","t":"b.7) Ưu tiên sử dụng dịch vụ quản trị rủi ro về thuế theo các Chương trình tuân thủ tự nguyện để người nộp thuế chủ động kê khai, cập nhật thông tin, dữ liệu liên quan đến xác định nghĩa vụ thuế;"},{"k":"p","t":"b.8) Ưu tiên biểu dương, khen thưởng theo quy định của pháp luật;"},{"k":"p","t":"b.9) Ưu tiên cung cấp ngay dịch vụ hỗ trợ, tư vấn các chính sách thuế, các vấn đề trong thực hiện thủ tục hành chính thuế;"},{"k":"p","t":"b.10) Ưu tiên ký kết thỏa thuận trước về phương pháp xác định giá tính thuế với cơ quan thuế."},{"k":"p","t":"c) Đối với người nộp thuế có giao dịch liên kết:"},{"k":"p","t":"c.1) Thực hiện kết nối, chia sẻ dữ liệu điện tử về giao dịch liên kết, báo cáo tài chính hợp nhất và báo cáo lợi nhuận liên quốc gia (nếu có) với cơ quan thuế theo quy định;"},{"k":"p","t":"c.2) Không thực hiện kiểm tra tại trụ sở người nộp thuế trừ trường hợp người nộp thuế có dấu hiệu rủi ro trên cơ sở dữ liệu của cơ quan thuế."},{"k":"p","t":"3. Điều kiện áp dụng chế độ ưu tiên:"},{"k":"p","t":"a) Người nộp thuế có kết quả xếp hạng tuân thủ tốt và xếp hạng rủi ro thấp trên cơ sở dữ liệu của cơ quan thuế trong thời hạn tối thiểu 02 năm liên tục liền kề trước năm đề nghị áp dụng chế độ ưu tiên;"},{"k":"p","t":"b) Thực hiện kết nối, chia sẻ dữ liệu điện tử đầy đủ, kịp thời, chính xác với hệ thống thông tin quản lý thuế theo chuẩn kỹ thuật và chuẩn dữ liệu của Bộ Tài chính, bảo đảm khả năng đối chiếu, kiểm tra và phân tích rủi ro theo thời gian thực hoặc định kỳ. Bộ trưởng Bộ Tài chính hướng dẫn về thủ tục kết nối, chia sẻ thông tin và việc từ chối hoặc tạm dừng kết nối, chia sẻ thông tin giữa cơ quan thuế và người nộp thuế;"},{"k":"p","t":"c) Thực hiện đầy đủ việc lập, lưu trữ và truyền dữ liệu điện tử về sổ kế toán; hóa đơn điện tử; chứng từ kế toán; dữ liệu giao dịch liên quan đến nghĩa vụ thuế;"},{"k":"p","t":"d) Có hệ thống kiểm soát nội bộ và cơ chế quản trị rủi ro thuế nhằm bảo đảm việc tuân thủ pháp luật thuế;"},{"k":"p","t":"đ) Thực hiện ghi sổ kế toán, lập và trình bày Báo cáo tài chính theo chuẩn mực kế toán và chế độ kế toán Việt Nam;"},{"k":"p","t":"e) Đối với người nộp thuế có giao dịch liên kết, ngoài các điều kiện quy định tại điểm a, b, c, d và đ khoản 3 Điều này, phải đáp ứng:"},{"k":"p","t":"e.1) Thực hiện đầy đủ nghĩa vụ lập, lưu trữ và cung cấp hồ sơ xác định giá giao dịch liên kết theo quy định của pháp luật về thuế;"},{"k":"p","t":"e.2) Có cơ chế kiểm soát nội bộ và quản trị rủi ro đối với giao dịch liên kết;"},{"k":"p","t":"e.3) Thực hiện minh bạch thông tin và hợp tác với cơ quan thuế trong quá trình trao đổi, cung cấp dữ liệu."},{"k":"p","t":"4. Cơ quan thuế thực hiện áp dụng chế độ ưu tiên như sau:"},{"k":"p","t":"a) Việc công nhận, gia hạn, tạm dừng, thu hồi và cấp lại chế độ ưu tiên được thực hiện tự động trên hệ thống công nghệ thông tin của ngành thuế;"},{"k":"p","t":"b) Thủ trưởng cơ quan thuế quyết định công nhận, gia hạn, tạm dừng, thu hồi và cấp lại chế độ ưu tiên đối với người nộp thuế đáp ứng điều kiện theo quy định tại khoản 3 Điều này trên cơ sở kết quả đánh giá mức độ tuân thủ và phân loại rủi ro được thực hiện tự động trên hệ thống công nghệ thông tin quản lý thuế theo hướng dẫn của Bộ Tài chính và thông qua Hệ thống thông tin quản lý thuế gửi quyết định đến tài khoản giao dịch thuế điện tử của người nộp thuế."},{"k":"p","t":"c) Cơ quan thuế quản lý trực tiếp người nộp thuế có trách nhiệm rà soát, xác nhận việc đáp ứng các điều kiện áp dụng chế độ ưu tiên, tổ chức thực hiện, theo dõi mức độ tuân thủ của người nộp thuế và thực hiện hỗ trợ, giám sát việc duy trì các điều kiện áp dụng chế độ ưu tiên theo quy định;"},{"k":"p","t":"d) Thiết lập, vận hành hệ thống kết nối, chia sẻ dữ liệu điện tử giữa cơ quan thuế và người nộp thuế ưu tiên nhằm phục vụ công tác quản lý tuân thủ, đánh giá rủi ro và cảnh báo sớm theo thời gian gần thực."},{"k":"p","t":"5. Cơ quan thuế thực hiện tạm dừng, thu hồi, cấp lại chế độ ưu tiên như sau:"},{"k":"p","t":"a) Trường hợp kết quả đánh giá trong hệ thống thông tin quản lý thuế hoặc thông tin do cơ quan thuế thu thập được cho thấy người nộp thuế có dấu hiệu vi phạm pháp luật về thuế hoặc không còn đáp ứng các điều kiện quy định tại khoản 3 Điều này, Thủ trưởng cơ quan thuế thông báo tạm dừng áp dụng chế độ ưu tiên để thực hiện việc rà soát, xác minh;"},{"k":"p","t":"b) Trường hợp kết quả rà soát, xác minh xác định người nộp thuế không đáp ứng các điều kiện áp dụng chế độ ưu tiên hoặc có hành vi vi phạm pháp luật về thuế thì Thủ trưởng cơ quan thuế quyết định thu hồi việc áp dụng chế độ ưu tiên;"},{"k":"p","t":"c) Người nộp thuế đã bị thu hồi chế độ ưu tiên được xem xét cấp lại khi đáp ứng đầy đủ các điều kiện quy định tại khoản 3 Điều này trên cơ sở kết quả đánh giá mức độ tuân thủ và phân loại rủi ro trong hệ thống thông tin quản lý thuế;"},{"k":"p","t":"d) Cơ quan thuế thực hiện đánh giá áp dụng chế độ ưu tiên tự động định kỳ hàng năm."},{"k":"p","t":"6. Doanh nghiệp ưu tiên trong lĩnh vực hải quan:"},{"k":"p","t":"a) Chế độ ưu tiên đối với doanh nghiệp:"},{"k":"p","t":"a.1) Được hoàn thuế trước, kiểm tra sau;"},{"k":"p","t":"a.2) Được thực hiện nộp thuế cho tờ khai hải quan đã thông quan hoặc giải phóng hàng hóa trong tháng chậm nhất vào ngày thứ mười của tháng kế tiếp theo quy định tại khoản 2 Điều 9 Luật Thuế xuất khẩu, thuế nhập khẩu;"},{"k":"p","t":"a.3) Chế độ ưu tiên khác theo quy định của pháp luật về hải quan, pháp luật về thuế và pháp luật khác có liên quan;"},{"k":"p","t":"b) Thỏa thuận công nhận lẫn nhau về doanh nghiệp ưu tiên:"},{"k":"p","t":"b.1) Bộ trưởng Bộ Tài chính ký thỏa thuận công nhận lẫn nhau về doanh nghiệp ưu tiên trong lĩnh vực hải quan theo quy định của pháp luật về ký kết và thực hiện thỏa thuận quốc tế;"},{"k":"p","t":"b.2) Doanh nghiệp ưu tiên của nước có ký thỏa thuận công nhận lẫn nhau về doanh nghiệp ưu tiên với Việt Nam được áp dụng các biện pháp ưu tiên về thủ tục hải quan, thủ tục thuế theo thỏa thuận đã ký. Danh sách các doanh nghiệp ưu tiên của nước đối tác được hưởng chế độ ưu tiên được quy định cụ thể tại thỏa thuận."}]},{"id":"nd252_49","no":49,"code":"Điều 49","title":"Điều 49. Nguyên tắc và nội dung ứng dụng công nghệ, dữ liệu và chuyển đổi số trong quản lý thuế","shortTitle":"Nguyên tắc và nội dung ứng dụng công nghệ, dữ liệu và chuyển đổi số trong quản lý thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc ứng dụng công nghệ, dữ liệu và chuyển đổi số:"},{"k":"p","t":"a) Ứng dụng công nghệ số hiện đại, tự động hóa quy trình nghiệp vụ; kết nối, chia sẻ dữ liệu số với các cơ quan tổ chức có liên quan để xây dựng hệ thống cơ sở dữ liệu lớn trong công tác quản lý thuế; áp dụng tiêu chuẩn bảo đảm an ninh mạng, bảo vệ dữ liệu và quyền riêng tư theo quy định của pháp luật trên môi trường số;"},{"k":"p","t":"b) Việc chuyển đổi số trong quản lý thuế thực hiện theo nguyên tắc lấy người sử dụng làm trung tâm, nâng cao chất lượng phục vụ; bảo đảm minh bạch và trách nhiệm giải trình đối với quyết định được hỗ trợ bởi công nghệ số nhằm nâng cao niềm tin của người sử dụng."},{"k":"p","t":"2. Nội dung ứng dụng công nghệ, dữ liệu và chuyển đổi số:"},{"k":"p","t":"a) Cơ quan quản lý thuế khai thác, sử dụng dữ liệu trên Hệ thống thông tin quản lý thuế để quản lý đối tượng chịu thuế, căn cứ tính thuế, nghĩa vụ thuế của người nộp thuế, phân tích, đánh giá rủi ro trong quản lý thuế, phát hiện và xử lý các vướng mắc, hành vi vi phạm pháp luật thuế; hợp tác quốc tế về trao đổi thông tin, hỗ trợ thu thuế và quản lý thuế dựa trên quản lý rủi ro;"},{"k":"p","t":"b) Cơ quan quản lý thuế tổ chức thực hiện chuyển đổi số toàn diện trong xử lý nghiệp vụ, tự động hóa quy trình quản lý, cho phép thực hiện tự động việc xác định nghĩa vụ thuế và ban hành quyết định hành chính thuế trên cơ sở dữ liệu và quản lý rủi ro; số hóa, chuẩn hóa, quản trị dữ liệu thuế;"},{"k":"p","t":"c) Cơ quan quản lý thuế khuyến khích tổ chức, cá nhân tham gia phát triển giải pháp công nghệ phục vụ quản lý thuế hiện đại, cung cấp các dịch vụ phục vụ giao dịch điện tử trong lĩnh vực thuế."}]},{"id":"nd252_50","no":50,"code":"Điều 50","title":"Điều 50. Giao dịch điện tử trong quản lý thuế","shortTitle":"Giao dịch điện tử trong quản lý thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Giao dịch điện tử giữa người nộp thuế và cơ quan quản lý thuế bao gồm: việc giao dịch trong thực hiện thủ tục hành chính; gửi văn bản, thông báo, quyết định hành chính thuế của cơ quan quản lý thuế; cung cấp dịch vụ hỗ trợ người nộp thuế được thực hiện bằng phương thức điện tử."},{"k":"p","t":"Người nộp thuế thuộc đối tượng có hoàn cảnh đặc biệt gồm người cao tuổi, người khuyết tật, người thuộc diện bảo trợ xã hội, người cư trú tại địa bàn có điều kiện kinh tế - xã hội đặc biệt khó khăn không thể thực hiện giao dịch điện tử hoặc thuộc trường hợp khác không thể thực hiện giao dịch điện tử theo quy định của pháp luật thì thực hiện theo quy định của pháp luật về thực hiện thủ tục hành chính theo cơ chế một cửa, một cửa liên thông tại bộ phận một cửa và Cổng Dịch vụ công Quốc gia."},{"k":"p","t":"2. Người nộp thuế đã thực hiện giao dịch điện tử trong quản lý thuế thì không phải thực hiện bằng phương thức giao dịch khác."},{"k":"p","t":"3. Cơ quan quản lý thuế khi tiếp nhận, trả kết quả giải quyết thủ tục hành chính thuế cho người nộp thuế bằng phương thức điện tử, phải xác nhận việc hoàn thành giao dịch điện tử của người nộp thuế bằng phương thức điện tử, bảo đảm quyền của người nộp thuế quy định tại điểm đ khoản 1 Điều 38 của Luật Quản lý thuế."},{"k":"p","t":"4. Người nộp thuế phải thực hiện yêu cầu của cơ quan quản lý thuế nêu tại văn bản, thông báo, quyết định hành chính thuế điện tử như đối với văn bản, thông báo, quyết định hành chính thuế bằng giấy của cơ quan quản lý thuế."},{"k":"p","t":"5. Hồ sơ thuế điện tử, chứng từ điện tử sử dụng trong giao dịch điện tử có giá trị pháp lý như hồ sơ thuế, chứng từ bằng giấy khi bảo đảm tính toàn vẹn của thông điệp dữ liệu, có thể truy cập và sử dụng được dưới dạng hoàn chỉnh theo quy định của pháp luật về giao dịch điện tử. Trường hợp pháp luật yêu cầu có chữ ký thì hồ sơ thuế, chứng từ điện tử phải có chữ ký điện tử, chữ ký số hợp pháp."},{"k":"p","t":"6. Người nộp thuế sử dụng danh tính điện tử theo quy định của pháp luật về định danh và xác thực điện tử để thực hiện giao dịch điện tử trong quản lý thuế."},{"k":"p","t":"7. Người nộp thuế thực hiện giao dịch điện tử với cơ quan quản lý thuế thông qua Cổng Dịch vụ công Quốc gia, Hệ thống thông tin quản lý thuế Hệ thống thông tin của tổ chức cung cấp dịch vụ T-VAN đã kết nối với Hệ thống thông tin quản lý thuế, dịch vụ thanh toán điện tử của các cơ quan nhà nước, tổ chức cung ứng dịch vụ thanh toán hoặc tổ chức cung ứng dịch vụ trung gian thanh toán hoặc tổ chức dịch vụ khác có kết nối trực tiếp hoặc gián tiếp với Hệ thống thông tin quản lý thuế. Nội dung giao dịch điện tử bao gồm việc lập, gửi hồ sơ thuế điện tử, chứng từ nộp ngân sách nhà nước điện tử và tiếp nhận hồ sơ, chứng từ, văn bản, thông báo, quyết định hành chính thuế, kết quả giải quyết thủ tục hành chính thuế và các dịch vụ hỗ trợ người nộp thuế."},{"k":"p","t":"8. Cơ quan quản lý nhà nước có thẩm quyền, tổ chức cung cấp dịch vụ T-VAN, tổ chức khác có liên quan thực hiện giao dịch điện tử với cơ quan thuế trong việc tiếp nhận, cung cấp, trao đổi thông tin và giải quyết thủ tục hành chính cho người nộp thuế."},{"k":"p","t":"9. Tổ chức cung cấp dịch vụ T-VAN phải đáp ứng đầy đủ các yêu cầu về năng lực, hạ tầng kỹ thuật và giải pháp công nghệ theo hướng dẫn của Bộ trưởng Bộ Tài chính để bảo đảm hệ thống thông tin được xây dựng, vận hành, duy trì hoạt động ổn định, liên tục, an toàn, bảo mật."},{"k":"p","t":"10. Bộ trưởng Bộ Tài chính hướng dẫn Điều này."}]},{"id":"nd252_51","no":51,"code":"Điều 51","title":"Điều 51. Cơ sở dữ liệu trong Hệ thống thông tin quản lý thuế","shortTitle":"Cơ sở dữ liệu trong Hệ thống thông tin quản lý thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ sở dữ liệu trong Hệ thống thông tin quản lý thuế (gọi tắt là cơ sở dữ liệu quản lý thuế) gồm thông tin người nộp thuế do người nộp thuế kê khai, cung cấp; thông tin nghiệp vụ của cơ quan quản lý thuế; thông tin do cơ quan quản lý thuế thu thập trong quá trình quản lý thuế; thông tin người nộp thuế do cơ quan nhà nước, cơ quan thuế nước ngoài cung cấp; thông tin, dữ liệu do cơ sở dữ liệu quốc gia, cơ sở dữ liệu chuyên ngành, cơ sở dữ liệu thương mại, cơ sở dữ liệu khác của các cơ quan, tổ chức quản lý, kết nối, chia sẻ cho Hệ thống thông tin quản lý thuế; thông tin do cơ quan quản lý thuế thu thập thông qua hợp tác quốc tế về thuế và thông tin dữ liệu từ các nguồn khác có liên quan đến người nộp thuế."},{"k":"p","t":"2. Việc quản lý, sao lưu và bảo vệ cơ sở dữ liệu quản lý thuế được thực hiện như sau:"},{"k":"p","t":"a) Cơ sở dữ liệu quản lý thuế phải được sao lưu thường xuyên, lưu trữ an toàn tại cơ quan quản lý thuế và hệ thống lưu trữ dự phòng. Việc sao lưu phải bảo đảm an toàn, bảo mật dữ liệu, được kiểm tra định kỳ và phục hồi thử nghiệm để sẵn sàng sử dụng khi xảy ra sự cố;"},{"k":"p","t":"b) Cơ sở dữ liệu quản lý thuế được phục hồi trong trường hợp dữ liệu bị phá hủy, bị tấn công mạng, bị truy cập trái phép hoặc gặp sự cố nghiêm trọng khác. Trường hợp thiết bị lưu trữ dữ liệu quản lý thuế bị lỗi, hư hỏng phải giao cho tổ chức, cá nhân bảo hành, sửa chữa thì phải có cán bộ chuyên môn của cơ quan quản lý thuế giám sát, phải được sự đồng ý của Thủ trưởng cơ quan quản lý thuế; khi thay thế thiết bị lưu trữ, thiết bị cũ phải được giữ lại để quản lý theo quy định."},{"k":"p","t":"3. Các bộ, cơ quan ngang bộ, chính quyền địa phương và các đơn vị có liên quan có trách nhiệm xây dựng, triển khai hệ thống công nghệ thông tin đáp ứng yêu cầu kết nối, trao đổi thông tin qua nền tảng tích hợp, chia sẻ dữ liệu quốc gia theo quy định tại Nghị định số 278/2025/NĐ-CP của Chính phủ, tiêu chuẩn kỹ thuật của Bộ Tài chính và bảo đảm hiệu quả, an ninh, an toàn thông tin."}]},{"id":"nd252_52","no":52,"code":"Điều 52","title":"Điều 52. Hệ thống thông tin quản lý thuế","shortTitle":"Hệ thống thông tin quản lý thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hệ thống thông tin quản lý thuế là hệ thống theo quy định tại khoản 2 Điều 3 Nghị định này, được tổ chức thành các phân hệ theo chức năng nghiệp vụ và đáp ứng các tiêu chí sau:"},{"k":"p","t":"a) Bảo đảm hoạt động ổn định, liên tục, an toàn;"},{"k":"p","t":"b) Có khả năng mở rộng, nâng cấp, đáp ứng yêu cầu quản lý thuế và sự phát triển của công nghệ;"},{"k":"p","t":"c) Có khả năng kết nối, liên thông, chia sẻ dữ liệu với các hệ thống thông tin, cơ sở dữ liệu của tổ chức, bộ, ngành, địa phương và các hệ thống thông tin khác theo quy định của pháp luật;"},{"k":"p","t":"d) Tuân thủ khung kiến trúc số của Bộ Tài chính, tiêu chuẩn, quy chuẩn kỹ thuật, chuẩn dữ liệu do cơ quan nhà nước có thẩm quyền ban hành."},{"k":"p","t":"2. Việc xây dựng, quản lý Hệ thống thông tin quản lý thuế bao gồm các nội dung chủ yếu sau:"},{"k":"p","t":"a) Xây dựng chiến lược, kiến trúc tổng thể, tiêu chuẩn kỹ thuật và định hướng phát triển Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"b) Tổ chức khảo sát, thiết kế, xây dựng, phát triển và nâng cấp Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"c) Xây dựng, quản lý kiến trúc dữ liệu; tổ chức thu thập, tích hợp, chuẩn hóa và quản lý dữ liệu phục vụ quản lý thuế;"},{"k":"p","t":"d) Quản lý hạ tầng số, nền tảng số, dịch vụ công nghệ số và các nguồn lực phục vụ hoạt động của Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"đ) Ban hành quy trình, tiêu chuẩn, tổ chức nguồn lực phục vụ quản lý, khai thác và phát triển hệ thống;"},{"k":"p","t":"e) Các nội dung quản lý khác theo quy định của pháp luật."},{"k":"p","t":"3. Việc vận hành Hệ thống thông tin quản lý thuế bao gồm các nội dung chủ yếu sau:"},{"k":"p","t":"a) Tổ chức vận hành, giám sát hoạt động của hệ thống thông tin, trung tâm dữ liệu và các nền tảng kỹ thuật phục vụ quản lý thuế;"},{"k":"p","t":"b) Lưu trữ, sao lưu, dự phòng, đồng bộ và phục hồi dữ liệu quản lý thuế;"},{"k":"p","t":"c) Bảo trì, hiệu chỉnh, nâng cấp hệ thống thông tin quản lý thuế;"},{"k":"p","t":"d) Bảo đảm an ninh mạng, an toàn thông tin và bảo vệ dữ liệu theo quy định của pháp luật;"},{"k":"p","t":"đ) Khai thác, sử dụng dữ liệu và hệ thống phục vụ hoạt động quản lý thuế;"},{"k":"p","t":"e) Các nội dung vận hành khác theo quy định của pháp luật."},{"k":"p","t":"4. Cơ quan quản lý thuế có trách nhiệm tổ chức vận hành Hệ thống thông tin quản lý thuế trong việc tạo lập, ban hành văn bản, thông báo, quyết định hành chính thuế theo quy định của pháp luật; thiết lập, kiểm soát dữ liệu đầu vào, quy trình nghiệp vụ và tiêu chí xử lý; bảo đảm tính chính xác của thông tin và kết quả xử lý do hệ thống tạo lập; ghi nhận, lưu trữ lịch sử xử lý; giám sát và kiểm soát rủi ro trong quá trình vận hành hệ thống."},{"k":"p","t":"5. Nguyên tắc xử lý hồ sơ thuế trên cơ sở dữ liệu và xác định trách nhiệm trong Hệ thống thông tin quản lý thuế:"},{"
