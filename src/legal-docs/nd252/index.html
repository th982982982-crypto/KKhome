i quan áp dụng các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế theo quy định."},{"k":"p","t":"3. Không áp dụng biện pháp dừng làm thủ tục hải quan đối với các trường hợp sau đây:"},{"k":"p","t":"a) Hàng hóa xuất khẩu thuộc đối tượng miễn thuế, đối tượng không chịu thuế hoặc có mức thuế suất thuế xuất khẩu 0%;"},{"k":"p","t":"b) Hàng hóa xuất khẩu, nhập khẩu phục vụ trực tiếp an ninh, quốc phòng, phòng, chống thiên tai, dịch bệnh, cứu trợ khẩn cấp, hàng viện trợ nhân đạo, viện trợ không hoàn lại."},{"k":"p","t":"4. Quyết định cưỡng chế được gửi đến người nộp thuế bị cưỡng chế và thông báo trên Trang thông tin điện tử hải quan chậm nhất là 05 ngày làm việc trước ngày áp dụng biện pháp dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"5. Trên cơ sở dữ liệu quản lý thuế, trường hợp cơ quan thuế hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước đề nghị cơ quan hải quan ban hành quyết định cưỡng chế bằng biện pháp dừng làm thủ tục hải quan đối với người nộp thuế có hoạt động xuất khẩu, nhập khẩu hàng hóa trong thời gian 12 tháng gần nhất tính đến thời điểm đề nghị thì thực hiện như sau:"},{"k":"p","t":"a) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được đề nghị cưỡng chế của cơ quan thuế hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước, cơ quan hải quan thực hiện cưỡng chế theo quy định và thông báo cho cơ quan thuế hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước biết, phối hợp."},{"k":"p","t":"Trường hợp cơ quan hải quan không thực hiện được biện pháp cưỡng chế dừng làm thủ tục hải quan theo đề nghị của cơ quan thuế hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước thì thông báo cho cơ quan thuế hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước biết và nêu rõ lý do;"},{"k":"p","t":"b) Khi người nộp thuế thuộc trường hợp chấm dứt hiệu lực của quyết định cưỡng chế theo quy định tại khoản 2 Điều 49 Luật Quản lý thuế, cơ quan thuế hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước phải có thông báo cho cơ quan hải quan để chấm dứt việc thực hiện biện pháp cưỡng chế này."}]},{"id":"nd252_69","no":69,"code":"Điều 69","title":"Điều 69. Cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn","shortTitle":"Cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn được áp dụng đối với người nộp thuế thuộc một trong các trường hợp dưới đây:"},{"k":"p","t":"a) Cơ quan quản lý thuế không đủ điều kiện để thực hiện cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản hoặc có căn cứ xác định việc cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản không có khả năng thu hồi tiền thuế nợ;"},{"k":"p","t":"b) Cơ quan quản lý thuế đang thực hiện cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản nhưng quá 30 ngày kể từ ngày ban hành quyết định cưỡng chế, cơ quan quản lý thuế không thu được hoặc không thu đủ tiền thuế nợ;"},{"k":"p","t":"c) Người nộp thuế thuộc trường hợp quy định tại khoản 3 Điều 48 Luật Quản lý thuế;"},{"k":"p","t":"d) Người nộp thuế thuộc trường hợp quy định tại khoản 5 Điều 48 Luật Quản lý thuế;"},{"k":"p","t":"đ) Cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước đề nghị cơ quan thuế thực hiện cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn đối với người nộp thuế."},{"k":"p","t":"2. Hóa đơn bị ngừng sử dụng bao gồm các loại hóa đơn: hóa đơn điện tử có mã của cơ quan thuế; hóa đơn điện tử không có mã của cơ quan thuế; hóa đơn điện tử khởi tạo từ máy tính tiền có kết nối dữ liệu với cơ quan thuế theo quy định của pháp luật."},{"k":"p","t":"3. Quyết định cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn được ban hành đối với các trường hợp quy định tại khoản 1 Điều này và được đồng bộ sang hệ thống hóa đơn điện tử ngay khi ban hành."},{"k":"p","t":"Trong thời gian áp dụng biện pháp cưỡng chế, cơ quan thuế:"},{"k":"p","t":"a) Không tiếp nhận hồ sơ đăng ký, thay đổi thông tin sử dụng hóa đơn điện tử;"},{"k":"p","t":"b) Không cấp mã đối với hóa đơn điện tử có mã của cơ quan thuế;"},{"k":"p","t":"c) Thực hiện thông báo hóa đơn không hợp pháp đối với hóa đơn điện tử không có mã của cơ quan thuế và hóa đơn điện tử khởi tạo từ máy tính tiền theo quy định của pháp luật về hóa đơn;"},{"k":"p","t":"d) Không cấp hóa đơn cho người nộp thuế đang bị cưỡng chế, trừ trường hợp quy định tại khoản 4 Điều này."},{"k":"p","t":"4. Trường hợp đang áp dụng biện pháp cưỡng chế ngừng sử dụng hóa đơn mà người nộp thuế có văn bản đề nghị sử dụng hóa đơn theo pháp luật về hóa đơn thì cơ quan thuế tiếp tục cho người nộp thuế sử dụng hóa đơn theo từng lần phát sinh với điều kiện người nộp thuế phải nộp ngay số tiền thuế nợ đang bị áp dụng biện pháp cưỡng chế ít nhất là 18% tổng giá trị thanh toán trên hóa đơn vào ngân sách nhà nước trước khi được cơ quan thuế cấp hóa đơn theo từng lần phát sinh. Trường hợp người nộp thuế được cơ quan thuế chấp thuận sử dụng hóa đơn trong thời gian bị cưỡng chế ngừng sử dụng hóa đơn thì cơ quan thuế tạm dừng thực hiện cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản đối với người nộp thuế:"},{"k":"p","t":"a) Người nộp thuế đăng ký với cơ quan thuế một tài khoản của người nộp thuế mở tại tổ chức tín dụng, chi nhánh ngân hàng nước ngoài để tạm dừng cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản;"},{"k":"p","t":"b) Thời gian tạm dừng cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản là 10 ngày làm việc kể từ ngày được chấp thuận sử dụng hóa đơn đối với số tiền được tạm dừng cưỡng chế quy định tại điểm c khoản này;"},{"k":"p","t":"c) Số tiền được tạm dừng cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản là tổng giá trị thanh toán trên hóa đơn được sử dụng."},{"k":"p","t":"Người nộp thuế thực hiện thủ tục đề nghị sử dụng hóa đơn theo từng lần phát sinh theo quy định của pháp luật về hóa đơn."},{"k":"p","t":"5. Trường hợp cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước đề nghị cơ quan thuế quản lý trực tiếp người nộp thuế ban hành quyết định cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn đối với người nộp thuế đã hoặc đang áp dụng biện pháp cưỡng chế trích tiền từ tài khoản, phong tỏa tài khoản hoặc biện pháp cưỡng chế dừng làm thủ tục hải quan thì thực hiện như sau:"},{"k":"p","t":"a) Trong thời hạn 03 ngày làm việc kể từ ngày nhận được đề nghị cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn của cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước, cơ quan thuế thực hiện cưỡng chế theo đúng trình tự, thủ tục và gửi thông báo cho cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước biết, phối hợp."},{"k":"p","t":"Trường hợp cơ quan thuế không thực hiện được ngay biện pháp cưỡng chế ngừng sử dụng hóa đơn theo đề nghị của cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước do chưa đủ căn cứ hoặc điều kiện thực hiện thì thông báo cho cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước biết và nêu rõ lý do;"},{"k":"p","t":"b) Khi người nộp thuế thuộc trường hợp chấm dứt hiệu lực của quyết định cưỡng chế theo quy định tại khoản 2 Điều 49 Luật Quản lý thuế, cơ quan hải quan hoặc cơ quan nhà nước, tổ chức được giao quản lý thu đối với khoản thu khác thuộc ngân sách nhà nước phải có thông báo cho cơ quan thuế để chấm dứt việc thực hiện biện pháp cưỡng chế này."},{"k":"p","t":"6. Trường hợp người nộp thuế bị cưỡng chế là chi nhánh, văn phòng đại diện, địa điểm kinh doanh, cơ quan thuế quản lý trực tiếp chi nhánh, văn phòng đại diện, địa điểm kinh doanh không có đủ điều kiện để thực hiện cưỡng chế hoặc không thực hiện được quyết định cưỡng chế thì cơ quan thuế quản lý chi nhánh, văn phòng đại diện, địa điểm kinh doanh chuyển toàn bộ hồ sơ đến cơ quan thuế quản lý trụ sở chính để ban hành quyết định cưỡng chế bằng biện pháp ngừng sử dụng hóa đơn đối với người nộp thuế tại trụ sở chính."}]},{"id":"nd252_70","no":70,"code":"Điều 70","title":"Điều 70. Cưỡng chế bằng biện pháp thu tiền, tài sản khác của người nộp thuế bị cưỡng chế do cơ quan, tổ chức, cá nhân khác đang nắm giữ","shortTitle":"Cưỡng chế bằng biện pháp thu tiền, tài sản khác của người nộp thuế bị cưỡng chế do cơ quan, tổ chức, cá nhân khác đang nắm giữ","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp cưỡng chế thu tiền, tài sản khác của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế do cơ quan, tổ chức, cá nhân khác đang nắm giữ (sau đây gọi là thu từ bên thứ ba) được áp dụng khi cơ quan quản lý thuế có đầy đủ căn cứ hợp pháp để xác định bên thứ ba đang có khoản nợ hoặc đang nắm giữ tiền, tài sản của người nộp thuế bị cưỡng chế, bao gồm:"},{"k":"p","t":"a) Tổ chức, cá nhân đang có khoản nợ đến hạn phải trả cho người nộp thuế bị cưỡng chế;"},{"k":"p","t":"b) Tổ chức, cá nhân, tổ chức tín dụng, chi nhánh ngân hàng nước ngoài được người nộp thuế bị cưỡng chế ủy quyền nắm giữ tiền, tài sản, hàng hóa, giấy tờ, chứng chỉ có giá. Số tiền, tài sản, hàng hóa, giấy tờ, chứng chỉ có giá mà bên thứ ba đang nắm giữ là thuộc sở hữu của người nộp thuế bị cưỡng chế."},{"k":"p","t":"2. Xác minh thông tin bên thứ ba đang nắm giữ tiền, tài sản khác của người nộp thuế bị cưỡng chế:"},{"k":"p","t":"a) Cơ quan quản lý thuế có văn bản yêu cầu bên thứ ba đang nắm giữ tiền, tài sản của người nộp thuế bị cưỡng chế cung cấp thông tin về tiền, tài sản đang nắm giữ hoặc công nợ phải trả đối với người nộp thuế bị cưỡng chế;"},{"k":"p","t":"b) Trường hợp bên thứ ba đang nắm giữ tiền, tài sản của người nộp thuế bị cưỡng chế không cung cấp được thông tin theo yêu cầu thì phải có văn bản giải trình gửi cơ quan quản lý thuế trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"3. Quyết định cưỡng chế bằng biện pháp thu tiền, tài sản của người nộp thuế bị cưỡng chế do tổ chức, cá nhân khác đang nắm giữ được gửi cho những tổ chức, cá nhân sau: người nộp thuế bị cưỡng chế, bên thứ ba đang nắm giữ tiền, tài sản của người nộp thuế bị cưỡng chế, cơ quan quản lý thuế quản lý bên thứ ba."},{"k":"p","t":"4. Nguyên tắc thực hiện:"},{"k":"p","t":"a) Trường hợp bên thứ ba có khoản nợ đến hạn phải trả cho người nộp thuế bị cưỡng chế hoặc nắm giữ tiền của người nộp thuế bị cưỡng chế thì:"},{"k":"p","t":"a.1) Thủ trưởng cơ quan quản lý thuế ban hành quyết định cưỡng chế bằng biện pháp thu tiền của người nộp thuế bị cưỡng chế do tổ chức, cá nhân khác đang nắm giữ;"},{"k":"p","t":"a.2) Bên thứ ba đang nắm giữ tiền của người nộp thuế bị cưỡng chế thì phải thực hiện nộp thay số tiền thuế nợ cho người nộp thuế bị cưỡng chế trong thời hạn 15 ngày kể từ ngày nhận được quyết định cưỡng chế của cơ quan quản lý thuế;"},{"k":"p","t":"a.3) Bên thứ ba có khoản nợ phải trả người nộp thuế bị cưỡng chế thì thực hiện nộp thay cho người nộp thuế bị cưỡng chế ngay trong ngày khoản nợ đến hạn thanh toán;"},{"k":"p","t":"a.4) Số tiền bên thứ ba nộp vào ngân sách nhà nước thay cho người nộp thuế bị cưỡng chế được xác định là số tiền đã thanh toán cho người nộp thuế bị cưỡng chế;"},{"k":"p","t":"b) Trường hợp bên thứ ba nắm giữ tài sản của người nộp thuế bị cưỡng chế (trừ các trường hợp quy định tại điểm a khoản này) thì áp dụng theo quy định về cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên quy định tại Điều 71 Nghị định này;"},{"k":"p","t":"c) Trường hợp tiền, tài sản khác của người nộp thuế bị cưỡng chế do bên thứ ba đang nắm giữ là đối tượng của các giao dịch bảo đảm hoặc thuộc trường hợp giải quyết phá sản thì việc thu tiền, tài sản khác từ bên thứ ba được thực hiện theo thứ tự ưu tiên và quy định của pháp luật có liên quan."},{"k":"p","t":"5. Trách nhiệm của bên thứ ba đang có khoản nợ, đang nắm giữ tiền, tài sản khác của người nộp thuế bị cưỡng chế:"},{"k":"p","t":"a) Cung cấp cho cơ quan quản lý thuế thông tin về khoản nợ hoặc khoản tiền, tài sản khác đang nắm giữ của người nộp thuế thuộc diện cưỡng chế, trong đó nêu rõ số tiền, thời hạn thanh toán nợ, loại tài sản, số lượng tài sản, tình trạng tài sản;"},{"k":"p","t":"b) Khi nhận được văn bản yêu cầu xác minh thông tin của cơ quan quản lý thuế thì bên thứ ba không được chuyển trả tiền (bao gồm cả khoản nợ phải thanh toán cho người nộp thuế), tài sản khác cho người nộp thuế bị cưỡng chế kể từ thời điểm nhận được văn bản yêu cầu của cơ quan quản lý thuế cho đến khi thực hiện nộp tiền vào ngân sách nhà nước hoặc chuyển giao tài sản theo đề nghị của cơ quan quản lý thuế;"},{"k":"p","t":"c) Trường hợp bên thứ ba không thực hiện quyết định cưỡng chế để nộp thay cho người nộp thuế hoặc không chuyển giao tài sản thì xử lý theo quy định tại khoản 4 Điều 46 Luật Quản lý thuế."},{"k":"p","t":"6. Trách nhiệm của cơ quan quản lý thuế đang quản lý bên thứ ba có trụ sở khác địa bàn của người nộp thuế bị cưỡng chế:"},{"k":"p","t":"a) Đối với trường hợp nơi cư trú hoặc trụ sở kinh doanh của người nộp thuế bị cưỡng chế và nơi cư trú hoặc trụ sở kinh doanh của bên thứ ba cùng trên địa bàn cấp tỉnh nhưng khác địa bàn cấp xã thì Thuế tỉnh, thành phố, Chi cục Hải quan có trách nhiệm chỉ đạo, hướng dẫn cơ quan quản lý thuế cấp dưới phối hợp thực hiện cưỡng chế nợ thuế;"},{"k":"p","t":"b) Đối với trường hợp nơi cư trú hoặc trụ sở kinh doanh của người nộp thuế bị cưỡng chế và nơi cư trú hoặc trụ sở kinh doanh của bên thứ ba khác địa bàn cấp tỉnh thì cơ quan quản lý thuế của người nộp thuế bị cưỡng chế ban hành quyết định cưỡng chế đồng thời gửi cơ quan quản lý thuế quản lý bên thứ ba để phối hợp thực hiện."}]},{"id":"nd252_71","no":71,"code":"Điều 71","title":"Điều 71. Cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên","shortTitle":"Cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp cưỡng chế kê biên tài sản, bán đấu giá tài sản kê biên đối với người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế được áp dụng khi cơ quan quản lý thuế có đầy đủ căn cứ và thông tin hợp pháp về tài sản thuộc sở hữu của người nộp thuế bị cưỡng chế."},{"k":"p","t":"2. Không áp dụng kê biên tài sản trong trường hợp người nộp thuế là cá nhân đang trong thời gian chữa bệnh tại các cơ sở khám chữa bệnh được thành lập theo quy định của pháp luật."},{"k":"p","t":"3. Những tài sản không được kê biên được thực hiện theo quy định tại Điều 21 Nghị định số 296/2025/NĐ-CP của Chính phủ."},{"k":"p","t":"Riêng đối với cơ quan nhà nước, tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức xã hội - nghề nghiệp (gọi chung là cơ quan, tổ chức) hoạt động bằng nguồn vốn do ngân sách nhà nước cấp thì không kê biên các tài sản được mua sắm từ nguồn ngân sách nhà nước mà yêu cầu cơ quan, tổ chức đó có văn bản đề nghị cơ quan có thẩm quyền hỗ trợ tài chính để thực hiện quyết định cưỡng chế. Trường hợp cơ quan, tổ chức có nguồn thu từ các hoạt động hợp pháp khác thì kê biên các tài sản được đầu tư, mua sắm từ nguồn thu đó để thực hiện quyết định cưỡng chế, trừ các tài sản sau đây:"},{"k":"p","t":"a) Thuốc chữa bệnh, phương tiện, dụng cụ, tài sản thuộc cơ sở y tế, khám chữa bệnh, trừ trường hợp đây là các tài sản để kinh doanh; lương thực, thực phẩm, dụng cụ, tài sản phục vụ việc ăn giữa ca cho cán bộ, công chức;"},{"k":"p","t":"b) Nhà trẻ, trường học, các thiết bị, phương tiện, đồ dùng thuộc các cơ sở này nếu đây không phải là tài sản để kinh doanh của cơ quan, tổ chức;"},{"k":"p","t":"c) Trang thiết bị, phương tiện, công cụ bảo đảm an toàn lao động, phòng chống cháy nổ, phòng chống ô nhiễm môi trường;"},{"k":"p","t":"d) Trụ sở làm việc;"},{"k":"p","t":"đ) Cơ sở hạ tầng phục vụ lợi ích công cộng, an ninh, quốc phòng."},{"k":"p","t":"4. Xác minh thông tin về tài sản của người nộp thuế bị cưỡng chế:"},{"k":"p","t":"a) Cơ quan quản lý thuế có quyền gửi văn bản cho người nộp thuế bị cưỡng chế, cơ quan đăng ký quyền sở hữu tài sản, cơ quan đăng ký giao dịch bảo đảm và các tổ chức, cá nhân liên quan để xác minh về tài sản của người nộp thuế bị cưỡng chế;"},{"k":"p","t":"b) Cơ quan quản lý thuế có quyền xác minh về tài sản của người nộp thuế bị cưỡng chế tại địa bàn nơi người nộp thuế bị cưỡng chế đóng trụ sở kinh doanh hoặc cư trú, cơ quan đăng ký quyền sở hữu tài sản, cơ quan đăng ký giao dịch bảo đảm và các tổ chức, cá nhân liên quan;"},{"k":"p","t":"c) Thông tin xác minh bao gồm: các tài sản đã xác minh, giá trị tài sản đã xác minh được phản ánh trên sổ sách kế toán của người nộp thuế bị cưỡng chế, kết quả sản xuất kinh doanh (đối với cơ sở sản xuất kinh doanh, dịch vụ) hoặc điều kiện kinh tế (đối với cá nhân không kinh doanh). Đối với tài sản thuộc diện phải đăng ký, chuyển quyền sở hữu tài sản cần căn cứ vào hợp đồng mua bán, chuyển đổi, chuyển nhượng hoặc tặng cho, giấy chứng nhận về quyền sở hữu tài sản thì việc xác minh thông qua chủ sở hữu, chính quyền địa phương, cơ quan chức năng hoặc xác nhận của người làm chứng như người bán, chính quyền địa phương, cơ quan chức năng về việc mua bán hoặc các tài liệu, chứng cứ hợp pháp theo quy định của pháp luật;"},{"k":"p","t":"d) Sau khi tổng hợp kết quả xác minh, cơ quan quản lý thuế phải lập biên bản với người nộp thuế bị cưỡng chế để xác định số lượng, nội dung tài sản thuộc diện kê biên, đồng thời yêu cầu người nộp thuế cung cấp hồ sơ, tài liệu chứng minh quyền sở hữu tài sản;"},{"k":"p","t":"đ) Trường hợp cơ quan quản lý thuế gửi văn bản xác minh về tài sản của người nộp thuế bị cưỡng chế cho các tổ chức, cá nhân có liên quan mà các tổ chức, cá nhân này không cung cấp hoặc cung cấp không đầy đủ các thông tin về tài sản thì cơ quan quản lý thuế thực hiện cưỡng chế bằng các biện pháp khác theo quy định tại Điều 49 Luật Quản lý thuế."},{"k":"p","t":"5. Phối hợp với Ủy ban nhân dân nơi người nộp thuế bị cưỡng chế có tài sản thuộc diện kê biên:"},{"k":"p","t":"a) Trong thời hạn 05 ngày làm việc kể từ ngày lập biên bản xác minh tài sản với người nộp thuế, cơ quan quản lý thuế nơi người nộp thuế phát sinh nợ thuế gửi văn bản đến Ủy ban nhân dân cấp xã nơi người nộp thuế bị cưỡng chế có các tài sản thuộc diện kê biên (bao gồm cả các tài sản ở các địa phương khác nhau) đề nghị thực hiện cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên;"},{"k":"p","t":"b) Trường hợp tài sản bị cưỡng chế nằm trên địa bàn nhiều xã, phường trong cùng tỉnh thì cơ quan quản lý thuế nơi người nộp thuế phát sinh nợ thuế gửi văn bản đến Ủy ban nhân dân cấp tỉnh đề nghị thực hiện cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên;"},{"k":"p","t":"c) Cơ quan quản lý thuế có trách nhiệm thông báo cho Ủy ban nhân dân cấp xã hoặc cấp tỉnh không thực hiện bán đấu giá tài sản kê biên khi người nộp thuế thuộc trường hợp chấm dứt hiệu lực quyết định cưỡng chế theo quy định tại khoản 2 Điều 49 Luật Quản lý thuế để Ủy ban nhân dân cấp xã hoặc cấp tỉnh ban hành quyết định chấm dứt hiệu lực của quyết định cưỡng chế."},{"k":"p","t":"6. Quyết định cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên do Chủ tịch Ủy ban nhân dân cấp tỉnh, cấp xã ban hành được gửi cho người nộp thuế bị cưỡng chế. Đối với các tài sản kê biên thuộc diện đăng ký quyền sở hữu thì quyết định cưỡng chế bằng biện pháp kê biên tài sản được gửi cho người nộp thuế và các cơ quan sau đây:"},{"k":"p","t":"a) Văn phòng đăng ký quyền sử dụng đất, cơ quan có thẩm quyền về đăng ký tài sản gắn liền với đất trong trường hợp kê biên quyền sử dụng đất, tài sản gắn liền với đất;"},{"k":"p","t":"b) Cơ quan đăng ký phương tiện giao thông trong trường hợp tài sản kê biên là phương tiện giao thông;"},{"k":"p","t":"c) Các cơ quan có thẩm quyền đăng ký quyền sở hữu, sử dụng khác theo quy định của pháp luật."},{"k":"p","t":"7. Xử lý số tiền thu được do bán đấu giá tài sản kê biên:"},{"k":"p","t":"a) Người nộp thuế bị cưỡng chế phải chịu mọi chi phí cho các hoạt động cưỡng chế thuế và có trách nhiệm nộp toàn bộ chi phí cưỡng chế cho tổ chức thực hiện cưỡng chế;"},{"k":"p","t":"b) Cơ quan thi hành biện pháp cưỡng chế kê biên, bán đấu giá tài sản thực hiện:"},{"k":"p","t":"b.1) Thanh toán chi phí cưỡng chế;"},{"k":"p","t":"b.2) Nộp tiền thuế nợ theo quyết định cưỡng chế."},{"k":"p","t":"Trường hợp hàng hóa nhập khẩu chưa hoàn thành thủ tục hải quan bị cơ quan hải quan kê biên bán đấu giá, cơ quan hải quan trích nộp tiền bán đấu giá để nộp tiền thuế tương ứng với số tiền thuế phải nộp của hàng hóa bị kê biên bán đấu giá trước khi nộp tiền thuế nợ theo quyết định kê biên trừ trường hợp hàng hóa thuộc sở hữu Nhà nước;"},{"k":"p","t":"b.3) Trả lại cho người nộp thuế bị cưỡng chế sau khi thanh toán đầy đủ chi phí cưỡng chế và nộp đủ tiền thuế nợ vào ngân sách nhà nước."},{"k":"p","t":"8. Chi phí cưỡng chế thi hành quyết định hành chính về quản lý thuế thực hiện theo quy định tại Điều 48 đến Điều 53 Nghị định số 296/2025/NĐ-CP của Chính phủ."},{"k":"p","t":"9. Người ban hành quyết định cưỡng chế được sử dụng kinh phí từ ngân sách nhà nước để thực hiện các biện pháp cưỡng chế. Cá nhân, tổ chức bị cưỡng chế có trách nhiệm hoàn trả chi phí cưỡng chế cho cơ quan nhà nước có thẩm quyền. Trường hợp cá nhân, tổ chức không tự nguyện hoàn trả chi phí cưỡng chế thì người có thẩm quyền ban hành quyết định cưỡng chế được áp dụng các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế quy định tại khoản 1 Điều 49 Luật Quản lý thuế."},{"k":"p","t":"10. Việc tổ chức thi hành cưỡng chế bằng biện pháp kê biên tài sản thực hiện theo quy định từ Điều 24 đến Điều 35 của Nghị định số 296/2025/NĐ-CP của Chính phủ."}]},{"id":"nd252_72","no":72,"code":"Điều 72","title":"Điều 72. Cưỡng chế bằng biện pháp nộp đơn yêu cầu áp dụng thủ tục phá sản","shortTitle":"Cưỡng chế bằng biện pháp nộp đơn yêu cầu áp dụng thủ tục phá sản","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế nộp đơn yêu cầu áp dụng thủ tục phá sản quy định tại điểm g khoản 1 Điều 49 Luật Quản lý thuế đối với doanh nghiệp, hợp tác xã thuộc một trong các điều kiện sau:"},{"k":"p","t":"a) Doanh nghiệp, hợp tác xã không hoạt động tại địa chỉ đã đăng ký quá 03 năm kể từ ngày cơ quan thuế ban hành thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký và người nộp thuế không nộp hồ sơ đề nghị khôi phục mã số thuế hoặc chấm dứt hiệu lực mã số thuế; cơ quan quản lý thuế đã thực hiện một trong các biện pháp cưỡng chế quy định tại Điều 66, 68, 69, 70 và 71 Nghị định này nhưng không thu hồi được tiền thuế nợ;"},{"k":"p","t":"b) Doanh nghiệp, hợp tác xã thuộc trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, cơ quan quản lý thuế đã áp dụng các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế theo quy định trong thời gian từ 03 năm trở lên nhưng không thu được tiền thuế nợ."},{"k":"p","t":"2. Cơ quan quản lý thuế thực hiện trình tự, thủ tục nộp đơn yêu cầu áp dụng thủ tục phá sản theo quy định của Luật Phục hồi, phá sản số 142/2025/QH15."},{"k":"p","t":"3. Trường hợp Tòa án có thông báo trả lại đơn yêu cầu hoặc có quyết định không mở thủ tục phá sản theo đề nghị của cơ quan quản lý thuế thì cơ quan quản lý thuế áp dụng biện pháp cưỡng chế thi hành quyết định hành chính theo quy định tại Điều 73 Nghị định này."}]},{"id":"nd252_73","no":73,"code":"Điều 73","title":"Điều 73. Cưỡng chế bằng biện pháp thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc yêu cầu chấm dứt xác nhận thông báo, đăng ký hoạt động thương mại điện tử","shortTitle":"Cưỡng chế bằng biện pháp thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc yêu cầu chấm dứt xác nhận thông báo, đăng ký hoạt động thương mại điện tử","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp cưỡng chế thu hồi giấy chứng nhận đăng ký kinh doanh, giấy chứng nhận đăng ký doanh nghiệp, giấy chứng nhận đăng ký hợp tác xã, giấy chứng nhận đăng ký tổ hợp tác, giấy chứng nhận đăng ký hộ kinh doanh, giấy phép thành lập và hoạt động, giấy phép hành nghề, giấy chứng nhận đăng ký hoạt động chi nhánh, văn phòng đại diện, giấy chứng nhận đăng ký địa điểm kinh doanh, đăng ký hoặc yêu cầu chấm dứt xác nhận thông báo, đăng ký hoạt động thương mại điện tử áp dụng đối với người nộp thuế thuộc các trường hợp sau:"},{"k":"p","t":"a) Người nộp thuế (trừ trường hợp quy định tại điểm b khoản 1 Điều 72 Nghị định này) thuộc trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, cơ quan quản lý thuế đã áp dụng các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế theo quy định trong thời gian từ 03 năm trở lên nhưng không thu hồi được tiền thuế nợ;"},{"k":"p","t":"b) Người nộp thuế là tổ chức nước ngoài, cá nhân nước ngoài có đăng ký hoạt động kinh doanh trên nền tảng thương mại điện tử tại Việt Nam thuộc trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"c) Người nộp thuế thuộc trường hợp quy định tại khoản 3 Điều 72 Nghị định này."},{"k":"p","t":"2. Cơ quan quản lý thuế xác minh thông tin của người nộp thuế bị áp dụng biện pháp cưỡng chế qua các dữ liệu quản lý về người nộp thuế tại cơ quan quản lý thuế hoặc tại cơ quan nhà nước có thẩm quyền ban hành các loại giấy tờ nêu trên của người nộp thuế để làm căn cứ ban hành văn bản đề nghị thu hồi."},{"k":"p","t":"3. Văn bản đề nghị thu hồi:"},{"k":"p","t":"a) Văn bản đề nghị thu hồi giấy chứng nhận đăng ký kinh doanh phải có một số nội dung chủ yếu sau: cơ quan nhà nước có thẩm quyền nhận văn bản; thông tin của người nộp thuế bị cưỡng chế, gồm: tên, mã số thuế, địa chỉ đăng ký kinh doanh; loại giấy tờ đề nghị thu hồi; các thông tin liên quan đến loại giấy tờ đề nghị thu hồi (số, ngày tháng năm ban hành); lý do thu hồi; thời gian đề nghị cơ quan ban hành thực hiện thu hồi giấy chứng nhận đăng ký kinh doanh;"},{"k":"p","t":"b) Văn bản đề nghị thu hồi phải được gửi đến người nộp thuế bị cưỡng chế và cơ quan quản lý nhà nước có thẩm quyền để thu hồi giấy chứng nhận đăng ký kinh doanh- trong vòng 03 ngày làm việc kể từ ngày hoàn tất xác minh thông tin người nộp thuế thuộc diện bị áp dụng biện pháp cưỡng chế theo quy định tại khoản 2 Điều này."},{"k":"p","t":"4. Trách nhiệm của cơ quan đăng ký kinh doanh có thẩm quyền:"},{"k":"p","t":"a) Sau khi nhận được văn bản đề nghị thu hồi của cơ quan quản lý thuế, cơ quan quản lý nhà nước có thẩm quyền cấp giấy chứng nhận đăng ký kinh doanh thực hiện thu hồi giấy chứng nhận đăng ký kinh doanh theo trình tự, thủ tục và trong thời hạn theo quy định của pháp luật có liên quan hoặc thông báo cho cơ quan quản lý thuế về lý do không thu hồi;"},{"k":"p","t":"b) Sau khi nhận được thông báo về việc không thu hồi giấy chứng nhận đăng ký kinh doanh nêu trên của cơ quan nhà nước có thẩm quyền, cơ quan quản lý thuế tiếp tục thực hiện theo dõi khoản nợ này và áp dụng các biện pháp cưỡng chế khác để đảm bảo thu được tiền thuế nợ vào ngân sách nhà nước."},{"k":"p","t":"5. Khi người nộp thuế thuộc trường hợp chấm dứt cưỡng chế quy định tại khoản 2 Điều 49 Luật Quản lý thuế và người nộp thuế bị cưỡng chế có văn bản đề nghị khôi phục tình trạng pháp lý thì cơ quan quản lý thuế lập văn bản đề nghị khôi phục tình trạng pháp lý của: doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, hộ kinh doanh, chi nhánh, văn phòng đại diện, địa điểm kinh doanh gửi cơ quan nhà nước có thẩm quyền để khôi phục tình trạng pháp lý:"},{"k":"p","t":"a) Văn bản đề nghị khôi phục tình trạng pháp lý phải có một số nội dung chủ yếu sau: tên cơ quan quản lý thuế đề nghị, cơ quan nhà nước có thẩm quyền nhận văn bản; thông tin của người nộp thuế bị cưỡng chế, gồm: tên, mã số thuế, địa chỉ đăng ký kinh doanh; lý do khôi phục tình trạng pháp lý;"},{"k":"p","t":"b) Văn bản đề nghị khôi phục tình trạng pháp lý gửi đến cơ quan quản lý nhà nước có thẩm quyền chậm nhất 03 ngày làm việc kể từ ngày cơ quan quản lý thuế nhận được văn bản đề nghị khôi phục tình trạng pháp lý."}]},{"id":"nd252_74","no":74,"code":"Điều 74","title":"Điều 74. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nghị định này có hiệu lực thi hành kể từ ngày 01 tháng 7 năm 2026."},{"k":"p","t":"2. Quy định về phân bổ thuế giá trị gia tăng phải nộp tại điểm a.2, a.3, a.4, a.5 và a.6 (trừ trường hợp phân bổ số thuế giá trị gia tăng đầu vào) khoản 2 Điều 15 Nghị định này thực hiện đến hết ngày 31 tháng 12 năm 2026."},{"k":"p","t":"3. Nghị định này thay thế:"},{"k":"p","t":"a) Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế;"},{"k":"p","t":"b) Nghị định số 91/2022/NĐ-CP ngày 30 tháng 10 năm 2022 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ quy định chi tiết một số điều của Luật Quản lý thuế;"},{"k":"p","t":"c) Nghị định số 49/2025/NĐ-CP ngày 28 tháng 02 năm 2025 của Chính phủ quy định về ngưỡng áp dụng tạm hoãn xuất cảnh;"},{"k":"p","t":"d) Nghị định số 117/2025/NĐ-CP ngày 09 tháng 6 năm 2025 của Chính phủ quy định quản lý thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số của hộ, cá nhân;"},{"k":"p","t":"đ) Nghị định số 373/2025/NĐ-CP ngày 31 tháng 12 năm 2025 của Chính phủ sửa đổi, bổ sung một số điều của Nghị định số 126/2020/NĐ-CP ngày 19 tháng 10 năm 2020 quy định chi tiết một số điều của Luật Quản lý thuế."},{"k":"p","t":"4. Nghị định số 125/2020/NĐ-CP ngày 19 tháng 10 năm 2020 của Chính phủ (được sửa đổi, bổ sung bởi Nghị định số 102/2021/NĐ-CP ngày 16 tháng 11 năm 2021 và Nghị định số 310/2025/NĐ-CP ngày 02 tháng 12 năm 2025) tiếp tục có hiệu lực thi hành kể từ ngày 01 tháng 7 năm 2026 cho đến khi có văn bản thay thế."},{"k":"p","t":"5. Trường hợp các văn bản quy phạm pháp luật quy định được viện dẫn tại Nghị định này được sửa đổi, bổ sung hoặc thay thế thì thực hiện theo văn bản được sửa đổi, bổ sung hoặc thay thế đó."}]},{"id":"nd252_75","no":75,"code":"Điều 75","title":"Điều 75. Điều khoản chuyển tiếp","shortTitle":"Điều khoản chuyển tiếp","chuong":"Chương VII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Đối với các trường hợp đã được xóa tiền thuế nợ theo quyết định của Chủ tịch Ủy ban nhân dân cấp tỉnh trước ngày Nghị định này có hiệu lực thi hành nhưng người nộp thuế phải hoàn trả tiền thuế nợ đã được xóa theo quy định tại khoản 2 Điều 21 Luật Quản lý thuế và hướng dẫn của Bộ trưởng Bộ Tài chính thì Trưởng Thuế tỉnh, thành phố, Chi cục trưởng Chi cục thuế Doanh nghiệp lớn, Chi cục trưởng Chi cục thuế Thương mại điện tử và Chi cục trưởng Chi cục Hải quan khu vực, Chi cục trưởng Chi cục Điều tra chống buôn lậu, Chi cục trưởng Chi cục kiểm tra sau thông quan có thẩm quyền ban hành quyết định phục hồi số tiền thuế nợ đã được xóa đối với người nộp thuế thuộc phạm vi quản lý."}]},{"id":"nd252_76","no":76,"code":"Điều 76","title":"Điều 76. Trách nhiệm thi hành","shortTitle":"Trách nhiệm thi hành","chuong":"Chương VII — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"Các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Chủ tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc trung ương và các tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Nghị định này."},{"k":"tbl","rows":[["Nơi nhận:- Ban Bí thư Trung ương Đảng;\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Các bộ, cơ quan ngang bộ;\n- HĐND, UBND các tỉnh, thành phố trực thuộc trung ương;\n- Văn phòng Trung ương và các Ban của Đảng;\n- Văn phòng Tổng Bí thư;\n- Văn phòng Chủ tịch nước;\n- Hội đồng Dân tộc và các Ủy ban của Quốc hội;\n- Văn phòng Quốc hội;\n- Tòa án nhân dân tối cao;\n- Viện kiểm sát nhân dân tối cao;\n- Kiểm toán nhà nước;\n- Ủy ban Trung ương Mặt trận Tổ quốc Việt Nam;\n- Cơ quan trung ương của các tổ chức chính trị - xã hội;\n- VPCP: BTCN, các PCN, Trợ lý TTg, các Vụ, Cục, Công báo;\n- Lưu: VT, KTTH (2b)","TM. CHÍNH PHỦ\nKT. THỦ TƯỚNG\nPHÓ THỦ TƯỚNG\nNguyễn Văn Thắng"]]}]}],"refs":{"nd252_1":[{"kind":"related","targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật 108/2025 — Luật Quản lý thuế (căn cứ)"},{"kind":"related","targetSlug":"nd254","targetAnchor":"nd254_1","label":"NĐ 254/2026 — Hướng dẫn hóa đơn điện tử (song song, cùng hướng dẫn Luật QLT)"}]},"details":{},"summaries":{"nd252_1":{"tldr":"Nghị định quy định chi tiết thi hành nhiều điều, khoản của Luật Quản lý thuế (đăng ký thuế, khai thuế, thời hạn nộp thuế, hoàn thuế, miễn/giảm/khoanh/xóa nợ, ấn định thuế, cưỡng chế...) và các biện pháp thi hành khác chưa được luật giao chi tiết.","points":["Nhóm 1: hướng dẫn chi tiết các điều/khoản cụ thể của Luật Quản lý thuế — người nộp thuế, cơ quan quản lý thuế, công khai thông tin, thời hạn nộp thuế/gia hạn, hoàn thành nghĩa vụ thuế, hoàn thuế, miễn/giảm thuế, khoanh nợ, ấn định thuế, cưỡng chế thi hành quyết định hành chính về thuế...","Nhóm 2: hướng dẫn các nội dung được luật giao nhưng chưa gắn với điều khoản cụ thể — thời hạn đăng ký thuế, các trường hợp không phải nộp hồ sơ khai thuế, tỷ giá khai thuế, phân bổ nghĩa vụ thuế, chế độ ưu tiên người nộp thuế tuân thủ tốt...","Nhóm 3: quy định biện pháp thi hành — công khai thông tin người nộp thuế, quản lý thuế thương mại điện tử/nền tảng số, chuyển đổi số, Hệ thống thông tin quản lý thuế, phục hồi nợ đã xóa, nộp đơn yêu cầu phá sản doanh nghiệp nợ thuế."]},"nd252_2":{"tldr":"Xác định đối tượng áp dụng của Nghị định: người nộp thuế (bao gồm bên khấu trừ/khai nộp thay), cơ quan quản lý thuế (thuế và hải quan), công chức quản lý thuế và các cơ quan, tổ chức, cá nhân liên quan.","points":["Người nộp thuế gồm cả các tổ chức thực hiện khấu trừ, khai/nộp thay: nhà quản lý nền tảng số nước ngoài (thay nhà cung cấp nước ngoài không thường trú), nhà quản lý sàn TMĐT/nền tảng số có chức năng thanh toán (thay hộ/cá nhân kinh doanh trên sàn), chủ quản nền tảng đặt hàng trực tuyến kiêm thanh toán, tổ chức/cá nhân chi trả thu nhập khấu trừ thuế TNCN.","Cơ quan thuế gồm Cục Thuế, Chi cục Thuế doanh nghiệp lớn, Chi cục Thuế thương mại điện tử, Thuế tỉnh/thành phố, Thuế cơ sở; cơ quan hải quan gồm Cục Hải quan, Chi cục Kiểm tra sau thông quan, Chi cục Điều tra chống buôn lậu, Chi cục Hải quan khu vực, Hải quan cửa khẩu."]},"nd252_3":{"tldr":"Giải thích các thuật ngữ dùng trong Nghị định: nguyên nhân bất khả kháng khác, Hệ thống thông tin quản lý thuế, giao dịch điện tử, tổ chức cung cấp dịch vụ T-VAN, nền tảng thương mại điện tử/nền tảng số có chức năng đặt hàng và/hoặc thanh toán, ngày hết hạn thủ tục thuế.","points":["Bất khả kháng khác: chiến tranh, bạo loạn, đình công phải ngừng/nghỉ sản xuất kinh doanh hoặc rủi ro không do lỗi chủ quan của người nộp thuế.","Nền tảng có chức năng đặt hàng trực tuyến: cho phép người mua chọn hàng và xác lập giao dịch qua môi trường điện tử của nền tảng.","Nền tảng có chức năng thanh toán: trực tiếp/gián tiếp tham gia quá trình thanh toán và có khả năng kiểm soát, đối soát hoặc xác nhận giao dịch thanh toán — xác định theo vai trò thực tế, không phụ thuộc hình thức kỹ thuật; nền tảng chỉ đăng tin/quảng cáo/kết nối mà không tham gia thanh toán thì không thuộc diện này.","Ngày hết thời hạn nộp hồ sơ/nộp thuế/giải quyết hồ sơ trùng ngày nghỉ thì được tính sang ngày làm việc liền kề sau đó."]},"nd252_4":{"tldr":"Quy định các trường hợp, nội dung, hình thức, thẩm quyền và nguyên tắc công khai thông tin người nộp thuế vi phạm hoặc không hoạt động tại địa chỉ đăng ký.","points":["Công khai khi: trốn thuế/chây ỳ nợ thuế; quá 90 ngày quá hạn nộp mà không tự nguyện chấp hành; vi phạm ảnh hưởng quyền lợi bên khác; không hợp tác với cơ quan thuế (từ chối cung cấp thông tin, không giải trình rủi ro hóa đơn, chống đối công chức thuế...); không hoạt động tại địa chỉ đăng ký/tạm ngừng kinh doanh.","Nội dung công khai tối thiểu: mã số thuế, tên, địa chỉ, lý do; riêng trường hợp không hoạt động tại địa chỉ đăng ký được công khai thêm họ tên và 4 số cuối giấy tờ tùy thân của người đại diện/chủ sở hữu (che các ký tự còn lại).","Hình thức bắt buộc: đăng trên trang TTĐT của cơ quan thuế (kèm tự động cảnh báo người mua nếu là vi phạm về hóa đơn); có thể bổ sung công khai trên truyền thông, niêm yết trụ sở, họp báo...","Thủ trưởng cơ quan thuế quản lý trực tiếp chịu trách nhiệm về tính chính xác thông tin công khai, phải đính chính nếu sai; thông tin tự động chấm dứt/cập nhật khi người nộp thuế đã hoàn thành nghĩa vụ."]},"nd252_5":{"tldr":"Ngân sách nhà nước ưu tiên bố trí kinh phí hằng năm cho cơ quan quản lý thuế để xây dựng/vận hành hệ thống CNTT, chuyển đổi số, hóa đơn điện tử, cơ sở vật chất và các nhiệm vụ chuyên môn đặc thù.","points":["Phạm vi chi: hệ thống CNTT và an toàn thông tin phục vụ quản lý thuế/hóa đơn điện tử; chuyển đổi số dựa trên dữ liệu lớn; mua sắm tài sản, thiết bị; đầu tư, sửa chữa trụ sở; các nhiệm vụ nghiệp vụ đặc thù (ủy nhiệm thu, quản lý rủi ro, tuyên truyền, khuyến khích lấy hóa đơn, bồi thường thiệt hại, hợp tác quốc tế...).","Cơ quan quản lý thuế ưu tiên bố trí kinh phí trong dự toán được giao, xây dựng quy chế chi tiêu nội bộ phù hợp chế độ tài chính hiện hành."]},"nd252_6":{"tldr":"Quy định thời hạn đăng ký thuế lần đầu, thay đổi thông tin, tạm ngừng kinh doanh và chấm dứt hiệu lực mã số thuế, áp dụng riêng cho từng phương thức đăng ký (một cửa liên thông hay trực tiếp với cơ quan thuế).","points":["Đăng ký theo cơ chế một cửa liên thông (qua đăng ký doanh nghiệp/hộ kinh doanh...): thời hạn đăng ký thuế trùng thời hạn đăng ký kinh doanh, không phải làm thủ tục riêng với cơ quan thuế.","Đăng ký trực tiếp với cơ quan thuế: 10 ngày làm việc kể từ ngày được cấp phép/bắt đầu kinh doanh/ký hợp đồng nhận thầu, hợp đồng dầu khí/phát sinh nghĩa vụ thuế TNCN (riêng đăng ký cho người phụ thuộc: chậm nhất 31/12 năm tính thuế).","Thay đổi thông tin: 10 ngày làm việc kể từ khi phát sinh thay đổi (riêng thay đổi thông tin nhân thân cá nhân qua CSDL quốc gia về dân cư: 20-30 ngày, và không phải làm thủ tục riêng nếu hệ thống đã tự động đồng bộ).","Tạm ngừng kinh doanh: thông báo cơ quan thuế chậm nhất 1 ngày làm việc trước khi tạm ngừng (hoặc do cơ quan có thẩm quyền chuyển thông tin trong 3 ngày), tối đa 12 tháng/lần thông báo.","Chấm dứt hiệu lực mã số thuế: nộp hồ sơ trong 10 ngày làm việc kể từ ngày có văn bản/quyết định chấm dứt hoạt động hoặc kết thúc hợp đồng."]},"nd252_7":{"tldr":"Quy định trách nhiệm cụ thể của người nộp thuế, cơ quan thuế, cơ quan đăng ký kinh doanh, cơ quan quản lý CSDL quốc gia về dân cư và cơ quan cấp phép trong công tác đăng ký thuế, bảo đảm dữ liệu chính xác và kết nối liên thông.","points":["Người nộp thuế: cung cấp thông tin đầy đủ, chính xác, kịp thời; khi chuyển địa chỉ trụ sở khác tỉnh phải hoàn tất nghĩa vụ với cơ quan thuế nơi đi trước khi chuyển, được bù trừ/chuyển số thuế GTGT chưa khấu trừ hết; trong thời gian tạm ngừng kinh doanh không phải nộp hồ sơ khai thuế (trừ khai không trọn kỳ) và không được dùng hóa đơn; khi chấm dứt mã số thuế phải hoàn thành nghĩa vụ thuế của cả các đơn vị phụ thuộc trước.","Cơ quan thuế: thông báo chấp nhận/từ chối hồ sơ đăng ký trong 2-3 ngày làm việc; thu thập, phân tích thông tin người đại diện/chủ doanh nghiệp để phân loại rủi ro quản lý thuế.","Cơ quan đăng ký kinh doanh, cơ quan quản lý CSDL dân cư, cơ quan cấp giấy phép: có trách nhiệm chia sẻ dữ liệu đăng ký/định danh/giấy phép qua phương thức điện tử cho cơ quan thuế trong thời hạn quy định (thường 10 ngày làm việc) để phục vụ cấp mã số thuế và quản lý rủi ro."]},"nd252_8":{"tldr":"Quy định nguyên tắc sử dụng mã số thuế: người nộp thuế phải ghi mã số thuế trên mọi giao dịch, hồ sơ liên quan đến nghĩa vụ thuế; mã số thuế bị chấm dứt hiệu lực thì không được dùng cho đến khi khôi phục.","points":["Phải ghi mã số thuế khi lập hóa đơn/chứng từ, mở tài khoản ngân hàng, khai/nộp/miễn/giảm/hoàn thuế, đăng ký tờ khai hải quan — kể cả khi kinh doanh nhiều địa bàn.","Phải cung cấp mã số thuế cho bên khấu trừ/khai nộp thay và các cơ quan liên quan.","Cơ quan thuế, Kho bạc, tổ chức tín dụng, tổ chức thanh toán, tổ chức được ủy nhiệm thu đều phải dùng mã số thuế trong chứng từ thu ngân sách.","Người nộp thuế bị thông báo không hoạt động tại địa chỉ đăng ký chỉ được dùng mã số thuế cho các giao dịch phục vụ chấm dứt hoặc khôi phục mã số thuế."]},"nd252_9":{"tldr":"Xác định các loại kỳ tính thuế (theo lần phát sinh, tháng, quý, năm, quyết toán) và cách xác định từng loại, kể cả trường hợp đặc biệt về thuế TNCN của cá nhân không cư trú đủ 183 ngày trong năm dương lịch.","points":["Kỳ theo lần phát sinh: ngày phát sinh nghĩa vụ thuế; kỳ tháng/quý/năm: theo năm dương lịch hoặc năm tài chính.","Kỳ quyết toán: theo kỳ kế toán năm, riêng thuế TNCN luôn theo năm dương lịch.","Cá nhân có mặt tại Việt Nam dưới 183 ngày trong năm dương lịch nhưng đủ 183 ngày trong 12 tháng liên tục kể từ ngày đầu tiên có mặt: kỳ quyết toán năm đầu tiên là 12 tháng liên tục đó."]},"nd252_10":{"tldr":"Quy định thời hạn nộp hồ sơ khai thuế cho từng loại kỳ tính thuế và một số trường hợp đặc thù (dầu khí, bất động sản, hộ kinh doanh, xuất nhập khẩu).","points":["Khai theo lần phát sinh: chậm nhất ngày thứ 10 sau ngày phát sinh nghĩa vụ. Khai tháng: ngày 20 tháng sau. Khai quý: ngày cuối tháng đầu quý sau. Khai năm: ngày cuối tháng đầu năm dương lịch/tài chính sau.","Khai quyết toán: chậm nhất ngày cuối tháng thứ 3 sau khi kết thúc kỳ quyết toán (45 ngày nếu chấm dứt hoạt động/giải thể/phá sản/chia tách/sáp nhập/cổ phần hóa); riêng quyết toán TNCN của cá nhân trực tiếp quyết toán: chậm nhất ngày cuối tháng thứ 4 sau năm dương lịch (hoặc trước khi xuất cảnh, không quá 45 ngày sau khi hết hợp đồng lao động đối với người nước ngoài).","Dầu thô: chậm nhất 35 ngày kể từ ngày xuất bán; khí thiên nhiên: ngày 20 tháng sau tháng phát sinh.","Thuế TNCN từ chuyển nhượng/thừa kế/quà tặng bất động sản: theo hạn đăng ký biến động đất đai (BĐS đã có sổ) hoặc 10 ngày kể từ ngày hợp đồng/giấy tờ có hiệu lực (BĐS hình thành trong tương lai).","Hộ kinh doanh, cá nhân kinh doanh và hàng hóa xuất nhập khẩu: theo nghị định chuyên ngành riêng (NĐ 68/2026 và pháp luật hải quan)."]},"nd252_11":{"tldr":"Liệt kê 13 nhóm trường hợp người nộp thuế không phải nộp hồ sơ khai thuế, khoản thu khác — chủ yếu khi thu nhập/hoạt động thuộc diện miễn thuế, không chịu thuế, hoặc cơ quan thuế đã có đủ dữ liệu để tự tính thuế.","points":["Chỉ có hoạt động không chịu thuế (trừ hộ/cá nhân kinh doanh doanh thu thấp theo NĐ 141/2026); thu nhập được miễn thuế TNCN theo luật (trừ một số khoản miễn đặc thù vẫn phải khai); doanh nghiệp chế xuất chỉ có hoạt động chế xuất (miễn khai GTGT).","Đang tạm ngừng kinh doanh; đã nộp hồ sơ chấm dứt mã số thuế (trừ quyết toán đến thời điểm chấm dứt); tháng/quý không phát sinh khấu trừ thuế TNCN hoặc không phát sinh trả lương (miễn quyết toán tương ứng).","Bên Việt Nam nộp thay thuế nhà thầu nước ngoài mà tháng đó không phát sinh khấu trừ; các trường hợp hoàn thuế GTGT đặc biệt (dự án ODA không hoàn lại, viện trợ nhân đạo, ưu đãi ngoại giao) không phải nộp hồ sơ khai GTGT.","Trường hợp cơ quan thuế đã có đủ dữ liệu kết nối từ CSDL quốc gia/hồ sơ xác định nghĩa vụ tài chính để tự tính thuế thì người nộp thuế không phải nộp hồ sơ khai (trừ khi đề nghị miễn, giảm); các khoản phí/lệ phí/thuế tài nguyên được miễn theo diện không phải thông báo cũng không phải khai."]},"nd252_12":{"tldr":"Quy định các trường hợp và thủ tục khai bổ sung hồ sơ khai thuế, khoản thu khác, bao gồm giới hạn khai bổ sung khi đang bị điều tra, khi đã có kết luận thanh tra/kiểm tra, và thời hiệu 5 năm.","points":["Không được khai bổ sung hồ sơ thuộc phạm vi, thời kỳ đang bị cơ quan điều tra yêu cầu (văn bản đề nghị phải nêu rõ NNT, mã số thuế, sắc thuế, kỳ tính thuế, thời gian áp dụng); hết thời gian áp dụng hoặc có thông báo kết thúc thì được khai bổ sung trở lại.","Điều chỉnh hồ sơ khai thuế sau thanh tra/kiểm tra: phải nộp hồ sơ giải trình nêu rõ nội dung, lý do, số thuế điều chỉnh; cơ quan thuế rà soát trong phạm vi đã thanh tra và ra thông báo chấp nhận/không chấp nhận — không làm thay đổi hiệu lực kết luận đã ban hành.","Trường hợp có kết luận của cơ quan điều tra/tòa án/kiểm toán/thanh tra về hóa đơn không hợp pháp: người mua liên quan phải khai bổ sung điều chỉnh nghĩa vụ thuế kể cả kỳ đã thanh tra, và bị xử lý như trường hợp bị phát hiện qua thanh tra, kiểm tra.","Khai bổ sung làm tăng thuế phải nộp/giảm số được miễn, giảm, hoàn: phải nộp đủ số tăng thêm cộng tiền chậm nộp; làm giảm số phải nộp: được điều chỉnh giảm tiền chậm nộp, xử lý số nộp thừa.","Sai sót phát hiện quá 5 năm kể từ hạn nộp hồ sơ: không được khai bổ sung nhưng được nộp hồ sơ giải trình để cơ quan thuế xem xét, xử lý vi phạm hành chính nếu có."]},"nd252_13":{"tldr":"Quy định riêng về khai thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí (kể cả Liên doanh Việt-Nga Vietsovpetro), phân theo từng loại thuế/khoản thu và kỳ khai tương ứng.","points":["Khai theo tháng: thuế tài nguyên, TNDN, thuế đặc biệt và tiền lãi khí nước chủ nhà của Vietsovpetro (khai thác/xuất bán khí thiên nhiên).","Khai theo quý: phụ thu khi giá dầu thô tăng (trừ phần của Vietsovpetro).","Khai theo từng lần phát sinh: TNDN từ chuyển nhượng quyền lợi tham gia hợp đồng dầu khí; các khoản thu hoa hồng dầu khí, tiền đọc tài liệu, đền bù cam kết tối thiểu; khoản phụ thu/TNDN/tiền lãi dầu khí từ kết dư dầu để lại của Vietsovpetro (chậm nhất 10 ngày sau quyết định của Hội đồng Liên doanh, không quá 31/12); thuế xuất khẩu dầu khí (được tạm nộp theo giá chưa chính thức, điều chỉnh sau).","Khai theo từng lần xuất bán dầu thô: thuế tài nguyên, TNDN, thuế đặc biệt, phụ thu, tiền lãi dầu của Vietsovpetro.","Khai quyết toán năm/chấm dứt hợp đồng: tổng hợp thuế tài nguyên, TNDN, tiền lãi dầu khí, phụ thu, thuế đặc biệt liên quan."]},"nd252_14":{"tldr":"Quy định đồng tiền dùng để khai và nộp thuế (mặc định Đồng Việt Nam, có ngoại lệ cho dầu khí, nhà cung cấp nước ngoài, phí/lệ phí ngoại giao) và cách xác định tỷ giá quy đổi tương ứng cho từng trường hợp.","points":["Ngoại lệ dùng ngoại tệ: khai TNDN bổ sung theo thuế tối thiểu toàn cầu (NĐ 236/2025); hoạt động dầu khí (USD nếu nhận thanh toán bằng USD, VND nếu nhận bằng VND; riêng khai quyết toán luôn bằng USD); nhà cung cấp nước ngoài kinh doanh TMĐT; cơ quan đại diện Việt Nam ở nước ngoài thu phí/lệ phí bằng ngoại tệ.","Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam được nộp thuế dầu khí bằng VND theo tỷ giá mua bán chuyển khoản trung bình ngân hàng thương mại tại ngày nộp hồ sơ khai thuế.","Tỷ giá cho thuế TNDN bổ sung tối thiểu toàn cầu: theo NĐ 236/2025, hoặc tỷ giá tính chéo Ngân hàng Nhà nước công bố gần nhất; khai bổ sung/theo kết luận thanh tra dùng lại tỷ giá của hồ sơ khai lần đầu.","Hàng hóa xuất nhập khẩu: theo pháp luật hải quan; phí, lệ phí: theo pháp luật phí, lệ phí."]},"nd252_15":{"tldr":"Quy định các trường hợp người nộp thuế có hoạt động kinh doanh liên tỉnh (đơn vị phụ thuộc, địa điểm kinh doanh khác tỉnh) phải phân bổ nghĩa vụ thuế, khoản thu khác cho từng địa phương thụ hưởng ngân sách.","points":["Phải phân bổ thuế GTGT: xổ số điện toán; xây dựng (công trình từ 1 tỷ đồng bao gồm VAT, trừ một số loại hình); chuyển nhượng bất động sản; đơn vị phụ thuộc là cơ sở sản xuất/điện mặt trời mái nhà (trừ doanh nghiệp siêu nhỏ); thủy điện liên tỉnh; viễn thông cước trả sau.","Phải phân bổ thuế TNDN: xổ số điện toán, chuyển nhượng bất động sản, cơ sở sản xuất liên tỉnh (trừ ưu đãi thuế/doanh nghiệp siêu nhỏ), thủy điện liên tỉnh.","Phải phân bổ thuế TTĐB (xổ số điện toán), thuế TNCN (khấu trừ lương nhân viên làm việc liên tỉnh; trúng thưởng xổ số qua điện thoại/internet), thuế tài nguyên (thủy điện liên tỉnh), thuế bảo vệ môi trường (xăng dầu, than nội địa) và lợi nhuận sau thuế còn lại của xổ số điện toán.","Bộ trưởng Bộ Tài chính hướng dẫn phương pháp phân bổ, khai, nộp cụ thể cho từng trường hợp."]},"nd252_16":{"tldr":"Liệt kê các loại thuế/khoản thu mà cơ quan thuế tự tính và ra thông báo nộp tiền dựa trên hồ sơ khai của người nộp thuế (chủ yếu thuế TNCN từ thừa kế/quà tặng/chuyển nhượng BĐS, lệ phí trước bạ, thuế đất) cùng trình tự, thời hạn xử lý.","points":["Áp dụng cho: TNCN từ thừa kế/quà tặng là chứng khoán/phần vốn góp/tài sản đăng ký quyền sở hữu; TNCN từ chuyển nhượng/thừa kế/quà tặng BĐS (nhà ở hình thành tương lai, BĐS ủy quyền, BĐS ở nước ngoài); lệ phí trước bạ (trừ nhà đất); thuế sử dụng đất phi nông nghiệp/nông nghiệp của hộ gia đình, cá nhân; tiền thuê đất khi chưa có quyết định/hợp đồng thuê.","Thời hạn ra thông báo: thường 3-5 ngày làm việc kể từ khi nhận đủ hồ sơ hợp lệ (riêng nghĩa vụ hằng năm: chậm nhất 30/4); nếu hồ sơ thiếu, cơ quan thuế có thể yêu cầu giải trình, xác minh với cơ quan nhà nước liên quan (thêm tối đa vài ngày làm việc) hoặc ấn định thuế.","Với các khoản không phải nộp hồ sơ khai (do đã kết nối dữ liệu quốc gia), cơ quan thuế tự tính và ra thông báo chậm nhất ngày làm việc tiếp theo khi hệ thống ghi nhận đủ thông tin."]},"nd252_17":{"tldr":"Quy định các khoản thuế, khoản thu khác mà cơ quan thuế tính và thông báo dựa trên hồ sơ xác định nghĩa vụ tài chính về đất đai do cơ quan nhà nước có thẩm quyền (chủ yếu ngành đất đai) chuyển đến, cùng thời hạn xử lý.","points":["Áp dụng cho: TNCN từ chuyển nhượng/thừa kế/quà tặng BĐS đã có sổ; thuế sử dụng đất phi nông nghiệp/nông nghiệp nộp theo cơ chế một cửa liên thông; lệ phí trước bạ nhà đất; tiền sử dụng đất, tiền thuê đất và khoản nộp bổ sung; khoản tương đương tiền chậm nộp tiền sử dụng đất/thuê đất; các khoản thu khác về đất đai.","Cơ quan tiếp nhận hồ sơ đất đai chuyển phiếu thông tin (kèm đối tượng miễn/giảm nếu có) cho cơ quan thuế; thời hạn ra thông báo dao động 3-7 ngày làm việc tùy loại (7 ngày cho tiền sử dụng đất của Việt kiều, 3 ngày cho TNCN/lệ phí trước bạ/thuế đất); riêng tiền thuê đất trả hằng năm: thông báo chậm nhất 30/4 hằng năm.","Người nộp thuế không phải nộp hồ sơ khai thuế trong các trường hợp này — văn bản/phiếu chuyển thông tin của cơ quan có thẩm quyền là căn cứ duy nhất để cơ quan thuế tính và thông báo."]},"nd252_18":{"tldr":"Quy định các khoản thu (tiền cấp quyền khai thác khoáng sản/tài nguyên nước, tiền sử dụng khu vực biển...) mà cơ quan thuế chỉ ra thông báo nộp tiền dựa trên văn bản xác định của cơ quan nhà nước có thẩm quyền, không qua hồ sơ khai thuế.","points":["Thời hạn ra thông báo: chậm nhất 10 ngày làm việc kể từ khi nhận được quyết định/thông báo/văn bản hợp lệ của cơ quan có thẩm quyền.","Đối với các khoản thu nộp theo hình thức hằng năm (tiền cấp quyền khai thác khoáng sản/tài nguyên nước, tiền sử dụng khu vực biển), cơ quan thuế ra thông báo của các năm tiếp theo chậm nhất ngày 30/4 hằng năm."]},"nd252_19":{"tldr":"Quy định các trường hợp cơ quan hải quan tự xác định số thuế, khoản thu khác phải nộp đối với hàng hóa xuất nhập khẩu và thông báo cho người nộp thuế (chủ yếu khi doanh nghiệp đã ngừng hoạt động, hàng bị tịch thu/đấu giá/cầm cố).","points":["Áp dụng khi: người nộp thuế chấm dứt hoạt động/giải thể/phá sản mà chưa hoàn thành nghĩa vụ thuế; hàng xuất nhập khẩu bị tịch thu cần xác định thuế làm căn cứ xử lý; hàng nhập khẩu chưa nộp thuế bị cưỡng chế kê biên bán đấu giá; hàng thuộc diện miễn thuế bị cầm cố/thế chấp mà tổ chức tín dụng phải xử lý tài sản để thu hồi nợ.","Cũng áp dụng cho phí hải quan, lệ phí hàng hóa/hành lý/phương tiện quá cảnh, và tính tiền phạt vi phạm hành chính theo số thuế khai thiếu/trốn.","Cơ quan hải quan căn cứ pháp luật thuế, dữ liệu quản lý thuế và chứng từ liên quan để xác định số thuế phải nộp."]},"nd252_20":{"tldr":"Phân định trách nhiệm của người nộp thuế, cơ quan quản lý thuế và cơ quan nhà nước có thẩm quyền khi việc tính thuế/thông báo nộp thuế do cơ quan quản lý thuế thực hiện (theo Điều 16-18), bao gồm cơ chế bổ sung thông tin khi hồ sơ chưa đủ.","points":["Người nộp thuế: khai chính xác, trung thực, đầy đủ và chịu trách nhiệm về thông tin đã khai; giải trình, bổ sung theo yêu cầu cơ quan thuế đúng hạn.","Cơ quan quản lý thuế: kiểm tra thông tin hồ sơ khai/hồ sơ nghĩa vụ tài chính rồi tính và thông báo thuế; nếu thông tin từ cơ quan nhà nước khác chưa đủ hoặc không đúng thực tế, phải thông báo yêu cầu bổ sung trong 5 ngày làm việc (cơ quan kia phản hồi trong 5 ngày làm việc); công chức quản lý thuế chỉ chịu trách nhiệm trong phạm vi hồ sơ, dữ liệu có tại thời điểm tính thuế.","Cơ quan nhà nước có thẩm quyền: chịu trách nhiệm về tính đầy đủ, chính xác của hồ sơ xác định nghĩa vụ tài chính; chuyển thông tin kịp thời, bổ sung/điều chỉnh khi được yêu cầu (trong 5 ngày làm việc); phối hợp xây dựng hệ thống truyền nhận thông tin tự động."]},"nd252_21":{"tldr":"Quy định thời hạn nộp các khoản thuế, khoản thu khác về đất đai và tài nguyên khi cơ quan thuế tính thuế và ra thông báo (thuế sử dụng đất, tiền thuê đất, tiền sử dụng đất, tiền cấp quyền khai thác tài nguyên nước, lệ phí trước bạ, TNCN từ BĐS...).","points":["Thuế sử dụng đất phi nông nghiệp/nông nghiệp: nộp lần đầu trong 30 ngày kể từ thông báo; từ năm thứ 2 nộp 1 lần (hạn 31/10 hoặc 31/5 tùy loại) hoặc 2 lần/năm (50% mỗi kỳ, hạn 31/5 và 31/10); địa phương có mùa vụ được lùi hạn tối đa 60 ngày.","Tiền thuê đất, tiền sử dụng đất và khoản nộp bổ sung: nộp theo 2 đợt 50%/50% (30 ngày và 90 ngày kể từ thông báo) hoặc theo thời hạn ghi trên quyết định trúng đấu giá; từ năm thứ 2 với thuê đất hằng năm được chọn nộp 1 hoặc 2 lần/năm.","Tiền cấp quyền khai thác tài nguyên nước: nộp 1 lần chậm nhất 90 ngày kể từ thông báo (nếu nộp cho cả thời gian được phê duyệt), hoặc nộp hằng năm (1 hoặc 2 lần/năm, tương tự thuế đất); tiền cấp quyền khai thác khoáng sản/tiền sử dụng khu vực biển theo pháp luật chuyên ngành.","Lệ phí trước bạ: 30 ngày kể từ thông báo; TNCN từ chuyển nhượng/thừa kế/quà tặng BĐS: 30 ngày kể từ thông báo.","Thông báo điều chỉnh, bổ sung do sai lệch dữ liệu làm tăng thuế: nộp chênh lệch trong 30 ngày kể từ thông báo điều chỉnh; nếu làm giảm số phải nộp thì áp dụng lại thời hạn của thông báo lần đầu."]},"nd252_22":{"tldr":"Liệt kê các trường hợp phải khấu trừ và khai/nộp thay thuế, hoặc chỉ khai thay/nộp thay thuế, cho bên thứ ba — bao gồm tổ chức bán đấu giá tài sản bảo đảm, bên nhận bảo đảm, bên thuê/mua bất động sản, tổ chức tín dụng, cơ quan thi hành án.","points":["Khấu trừ + khai + nộp thay: theo quy định pháp luật thuế nói chung; tổ chức khấu trừ với hoạt động kinh doanh trên nền tảng TMĐT (theo Điều 43); tổ chức bán đấu giá tài sản bảo đảm nếu trực tiếp/được ủy quyền thu tiền bán — phải khấu trừ, nộp thay thuế GTGT/TNDN/TNCN theo phương pháp tính thuế của bên bán tài sản bảo đảm.","Khai thay + nộp thay: tổ chức hợp tác kinh doanh với cá nhân (khai toàn bộ doanh thu GTGT, khai thay TNCN cho cá nhân hợp tác); bên nhận bảo đảm hoặc người mua tài sản bảo đảm khi xử lý nợ; tổ chức mua bán nợ 100% vốn nhà nước xử lý tài sản thế chấp; tổ chức thuê BĐS của cá nhân theo thỏa thuận hợp đồng; bên mua BĐS nộp thay bên bán theo thỏa thuận hợp đồng chuyển nhượng.","Các trường hợp khác: tổ chức tín dụng nộp thay thuế nhập khẩu khi xử lý tài sản thế chấp là hàng nhập khẩu miễn thuế; cơ quan thi hành án khi bán tài sản bảo đảm thi hành án; tổ chức/cá nhân đã khấu trừ TNCN kinh doanh phải khai/nộp thay cả thuế GTGT cho hoa hồng môi giới, đại lý bảo hiểm, xổ số, bán hàng đa cấp và thu nhập của cá nhân không cư trú."]},"nd252_23":{"tldr":"Khi ngành, nghề kinh doanh gặp khó khăn đặc biệt cần kéo dài thời hạn nộp hồ sơ khai thuế, Bộ Tài chính chủ trì phối hợp các bộ, ngành trình Chính phủ quy định đối tượng, loại thuế và trình tự, thủ tục gia hạn cụ thể.","points":[]},"nd252_24":{"tldr":"Quy định việc tạm nộp thuế TNDN và lợi nhuận sau thuế còn lại theo quý: doanh nghiệp tự xác định số tạm nộp nhưng tổng 4 quý không được thấp hơn 80% số quyết toán năm, nếu nộp thiếu sẽ bị tính tiền chậm nộp.","points":["Áp dụng cho thuế TNDN và lợi nhuận sau thuế còn lại nộp ngân sách theo pháp luật về quản lý vốn nhà nước tại doanh nghiệp.","Hạn tạm nộp quý: chậm nhất ngày cuối tháng đầu quý tiếp theo.","Tổng 4 quý tạm nộp phải đạt tối thiểu 80% số phải nộp theo quyết toán năm tự kê khai; nộp thiếu thì bị tính tiền chậm nộp trên phần thiếu kể từ ngày liền sau hạn tạm nộp quý 4; nếu thanh tra/kiểm tra sau quyết toán phát hiện tăng thêm thì tính chậm nộp theo Điều 26."]},"nd252_25":{"tldr":"Quy định thời hạn nộp thuế/tiền chậm nộp/tiền phạt nói chung, và thời gian được gia hạn trong các trường hợp đặc biệt (bất khả kháng: 2 năm; di dời cơ sở theo yêu cầu nhà nước: 1 năm) cùng cơ chế gia hạn diện rộng theo ngành nghề khi Chính phủ quy định.","points":["Thời hạn nộp thuế nói chung theo khoản 1 Điều 14 Luật Quản lý thuế; phí/lệ phí không do cơ quan thuế thu trực tiếp theo pháp luật phí, lệ phí riêng.","Tổ chức được ủy nhiệm thu hoặc cơ quan hải quan thu tiền mặt phải nộp vào ngân sách chậm nhất 1 ngày làm việc kể từ ngày thu.","Gia hạn do bất khả kháng gây thiệt hại vật chất: 2 năm kể từ ngày xảy ra sự kiện; do phải di dời cơ sở sản xuất theo yêu cầu cơ quan có thẩm quyền: 1 năm kể từ ngày phải ngừng hoạt động.","Trường hợp ngành, nghề gặp khó khăn đặc biệt diện rộng: Bộ Tài chính trình Chính phủ quy định riêng, không làm thay đổi dự toán thu ngân sách đã được Quốc hội quyết định."]},"nd252_26":{"tldr":"Quy định cách tính thời gian chịu tiền chậm nộp và các trường hợp không tính hoặc chưa tính tiền chậm nộp — bao gồm nợ do chưa được ngân sách thanh toán, đang khoanh nợ, hàng hóa xuất nhập khẩu chưa xác định được giá/trị giá chính thức, và bù trừ nộp thừa.","points":["Thời gian tính chậm nộp: liên tục từ ngày sau hạn nộp/gia hạn/ấn định đến ngày liền trước ngày nộp tiền vào ngân sách; với hoàn thuế sai: từ ngày được chi trả/miễn giảm đến ngày liền trước ngày nộp lại tiền thu hồi.","Không tính chậm nộp: nhà thầu cung ứng hàng hóa/dịch vụ bằng vốn ngân sách nhưng chưa được thanh toán (giới hạn theo số ngân sách còn nợ, trừ TNCN và thuế khấu trừ nộp thay nhà thầu nước ngoài); đang trong thời gian khoanh nợ; các trường hợp hàng xuất nhập khẩu chờ kết quả phân tích/phân loại/giám định, chưa có giá chính thức, chưa xác định khoản điều chỉnh cộng vào trị giá hải quan, hoặc thuế chống bán phá giá/trợ cấp áp dụng hồi tố 90 ngày; bù trừ nộp thừa với nợ (không tính chậm nộp phần bù trừ).","Thanh tra/kiểm tra sau quyết toán phát hiện tăng số phải nộp: tính chậm nộp từ ngày sau hạn nộp hồ sơ quyết toán đến ngày nộp tiền, sau khi bù trừ với số nộp thừa.","Khai bổ sung làm giảm số phải nộp, hoặc cơ quan có thẩm quyền xác định giảm nghĩa vụ: được điều chỉnh giảm tương ứng số tiền chậm nộp đã tính."]},"nd252_27":{"tldr":"Hướng dẫn chi tiết việc hoàn thành nghĩa vụ nộp thuế khi doanh nghiệp chuyển đổi loại hình, khi người nộp thuế là cá nhân chết/mất tích/mất năng lực hành vi dân sự, và điều kiện để nhà đầu tư nước ngoài được chuyển lợi nhuận ra nước ngoài.","points":["Doanh nghiệp chuyển đổi loại hình chưa hoàn thành nghĩa vụ thuế: doanh nghiệp sau chuyển đổi kế thừa quyền lợi (số thuế phải nộp, số được khấu trừ, số nộp thừa) và tiếp tục nghĩa vụ kể từ ngày được cấp giấy chứng nhận đăng ký doanh nghiệp mới.","Cá nhân chết/mất tích/mất năng lực hành vi dân sự: cơ quan thuế xác định nghĩa vụ còn lại và trách nhiệm của người thừa kế/người quản lý di sản, tài sản; nếu tòa án sau đó hủy quyết định tuyên bố chết/mất năng lực thì phục hồi lại số thuế nợ đã xóa và người nộp thuế phải hoàn thành nghĩa vụ.","Nhà đầu tư nước ngoài chuyển lợi nhuận ra nước ngoài: chỉ được chuyển hằng năm/khi kết thúc đầu tư sau khi doanh nghiệp đã hoàn thành nghĩa vụ tài chính, nộp báo cáo tài chính kiểm toán và quyết toán TNDN, không còn nợ thuế; không được chuyển lợi nhuận của năm mà báo cáo tài chính còn lỗ lũy kế sau khi đã chuyển lỗ."]},"nd252_28":{"tldr":"Quy định các ngưỡng nợ thuế và trình tự áp dụng biện pháp tạm hoãn xuất cảnh đối với cá nhân kinh doanh, người đại diện pháp luật doanh nghiệp nợ thuế, người không hoạt động tại địa chỉ đăng ký, người nước ngoài và người Việt Nam định cư ở nước ngoài còn nợ thuế.","points":["Áp dụng khi: cá nhân/chủ hộ kinh doanh bị cưỡng chế, nợ từ 50 triệu đồng quá hạn từ 120 ngày; chủ sở hữu hưởng lợi/người đại diện pháp luật của doanh nghiệp, HTX bị cưỡng chế, nợ từ 500 triệu đồng quá hạn từ 120 ngày; bị thông báo không hoạt động tại địa chỉ đăng ký quá 120 ngày mà không khôi phục/chấm dứt mã số thuế; người nước ngoài hoặc người Việt Nam định cư nước ngoài còn nợ thuế quá hạn.","Trình tự: cơ quan thuế gửi thông báo trước 30 ngày qua tài khoản giao dịch thuế điện tử và công khai trên website; nếu vẫn chưa hoàn thành nghĩa vụ đến hạn thì gửi thông báo áp dụng tạm hoãn xuất cảnh đến hệ thống xuất nhập cảnh (xử lý ngay trong ngày).","Hủy bỏ tạm hoãn: ngay sau khi nợ giảm xuống dưới ngưỡng (50 triệu/500 triệu) hoặc được xóa nợ, hoặc đã khôi phục/chấm dứt mã số thuế; người nộp thuế có thể gửi chứng từ nộp tiền qua hệ thống điện tử để cơ quan thuế cập nhật và hủy bỏ ngay.","Việc truyền nhận thông báo giữa cơ quan thuế và cơ quan xuất nhập cảnh thực hiện theo thời gian thực qua hệ thống điện tử, hoặc qua đường bưu chính nếu chưa đủ điều kiện kết nối điện tử."]},"nd252_29":{"tldr":"Phân loại các trường hợp hoàn thuế theo pháp luật thuế chuyên ngành, các trường hợp hoàn trả tiền nộp thừa (quyết toán ủy quyền, hiệp định thuế, doanh nghiệp giải thể/phá sản, cá nhân tự quyết toán, hộ kinh doanh...) và trường hợp không hoàn thuế do số tiền nộp thừa quá nhỏ.","points":["Hoàn thuế theo pháp luật thuế chuyên ngành áp dụng bình thường; riêng xăng dầu bán cho phương tiện vận tải quốc tế thuộc diện hoàn thuế bảo vệ môi trường thì làm theo thủ tục hoàn trả nộp thừa.","Hoàn trả tiền nộp thừa gồm: TNCN từ lương/tiền công theo ủy quyền quyết toán; theo Hiệp định tránh đánh thuế hai lần/điều ước quốc tế khác; doanh nghiệp giải thể, phá sản; cá nhân trực tiếp quyết toán TNCN; hộ kinh doanh, cá nhân kinh doanh theo NĐ 68/2026 (sửa đổi bởi NĐ 141/2026); các khoản nộp thừa khác theo Luật Quản lý thuế.","Không hoàn thuế khi số nộp thừa từ 50.000 đồng trở xuống (cả cá nhân quyết toán lương và hộ/cá nhân kinh doanh) — bù trừ vào kỳ tính thuế tiếp theo thay vì hoàn trả.","Bộ trưởng Bộ Tài chính hướng dẫn riêng cơ chế hoàn thuế GTGT cho người nước ngoài mang hàng khi xuất cảnh (tiêu chuẩn doanh nghiệp bán hàng, đại lý hoàn thuế, cảng hàng không/cảng biển áp dụng, hệ thống quản lý hoàn thuế)."]},"nd252_30":{"tldr":"Liệt kê các trường hợp hồ sơ hoàn thuế phải kiểm tra trước khi hoàn (rủi ro cao, hoàn lần đầu, từng bị xử lý trốn thuế/buôn lậu, doanh nghiệp giải thể phá sản...) áp dụng riêng cho cơ quan thuế và cơ quan hải quan; các hồ sơ còn lại được hoàn thuế trước.","points":["Cơ quan thuế kiểm tra trước hoàn thuế khi: hoàn lần đầu theo từng dự án/trường hợp; trong 2 năm kể từ khi bị xử lý trốn thuế (trừ khi lần đầu sau đó không phát hiện sai phạm thì các lần tiếp theo được miễn kiểm tra trước, trừ khi lại phát hiện sai phạm); hồ sơ/một phần số tiền có rủi ro cao; doanh nghiệp giải thể, phá sản (trừ khi đã kiểm tra quyết toán rồi).","Cơ quan hải quan kiểm tra trước hoàn thuế khi: hoàn lần đầu; trong 2 năm kể từ khi bị xử lý trốn thuế/buôn lậu; giải thể, phá sản, chấm dứt hoạt động; rủi ro thuế cao; không thanh toán qua ngân hàng; vi phạm hải quan bị xử lý quá 2 lần trong 12 tháng vượt thẩm quyền Đội trưởng Hải quan; đang bị cưỡng chế; hàng chịu thuế tiêu thụ đặc biệt; hàng tái xuất/tái nhập không cùng cửa khẩu.","Các hồ sơ không thuộc diện kiểm tra trước theo hai nhóm trên được hoàn thuế trước cho người nộp thuế."]},"nd252_31":{"tldr":"Quy định thời hạn cơ quan quản lý thuế tiếp nhận, thông báo và giải quyết hồ sơ hoàn thuế: 3 ngày làm việc để thông báo tiếp nhận/không tiếp nhận, và chậm nhất 6 ngày làm việc để ra quyết định đối với hồ sơ thuộc diện hoàn thuế trước.","points":["Thông báo tiếp nhận/không tiếp nhận hồ sơ hoàn thuế: chậm nhất 3 ngày làm việc kể từ ngày nhận hồ sơ; nếu hồ sơ hoàn thuế đồng thời là hồ sơ khai thuế thì thông báo tiếp nhận khai thuế cũng là thông báo tiếp nhận hoàn thuế.","Hồ sơ thuộc diện hoàn thuế trước: chậm nhất 6 ngày làm việc kể từ ngày có thông báo tiếp nhận, cơ quan thuế phải ra quyết định hoàn thuế, hoặc thông báo số tiền không được hoàn/chuyển khấu trừ, hoặc chuyển hồ sơ sang diện kiểm tra trước hoàn thuế, hoặc thông báo hồ sơ chưa đủ điều kiện — thời hạn này không tính thời gian người nộp thuế giải trình, bổ sung theo yêu cầu."]},"nd252_32":{"tldr":"Liệt kê các nhóm trường hợp miễn thuế, giảm thuế, không thu thuế, không chịu thuế theo thẩm quyền (thuế nội địa, xuất nhập khẩu, Nghị quyết Quốc hội/Quyết định Thủ tướng, Hiệp định tránh đánh thuế 2 lần) và quy định ngưỡng miễn thuế 50.000 đồng cho một số trường hợp cụ thể.","points":["Nhóm miễn/giảm/không thu/không chịu thuế: theo thẩm quyền cơ quan thuế (pháp luật thuế, phí, lệ phí); theo thẩm quyền cơ quan hải quan với hàng xuất nhập khẩu; theo Nghị quyết Quốc hội/Quyết định Thủ tướng; theo Hiệp định tránh đánh thuế hai lần và điều ước quốc tế khác.","Miễn thuế khi số tiền phải nộp từ 50.000 đồng trở xuống: TNCN quyết toán từ lương/tiền công; hộ kinh doanh, cá nhân kinh doanh trên hồ sơ khai/quyết toán thuế; thuế sử dụng đất phi nông nghiệp phải nộp hằng năm của hộ gia đình, cá nhân."]},"nd252_33":{"tldr":"Quy định thời hạn tiếp nhận (3 ngày làm việc) và giải quyết hồ sơ miễn thuế, giảm thuế, không thu thuế, không chịu thuế, phân biệt theo thẩm quyền cơ quan thuế (thường 30 ngày, rủi ro cao 10 ngày, một cửa liên thông 7 ngày) và cơ quan hải quan.","points":["Tiếp nhận hồ sơ: 3 ngày làm việc kể từ ngày nhận; nếu hồ sơ miễn/giảm thuế đồng thời là hồ sơ khai thuế thì thông báo tiếp nhận khai thuế cũng là thông báo tiếp nhận miễn/giảm thuế.","Giải quyết thuộc thẩm quyền cơ quan thuế: 30 ngày làm việc để ra quyết định/thông báo (trường hợp thông thường); 10 ngày làm việc kể từ kết luận kiểm tra nếu hồ sơ rủi ro cao; 7 ngày làm việc nếu tiếp nhận theo cơ chế một cửa liên thông.","Giải quyết thuộc thẩm quyền cơ quan hải quan: theo pháp luật thuế xuất nhập khẩu và hải quan chuyên ngành tương ứng cho từng loại miễn/giảm/không thu/không chịu thuế."]},"nd252_34":{"tldr":"Hướng dẫn chi tiết việc khoanh tiền thuế nợ: các trường hợp áp dụng, thủ tục xác nhận khi bị hạn chế quyền khai thác đất đai/khoáng sản, cách tính thời gian và số tiền được khoanh, và các trường hợp chấm dứt hiệu lực quyết định khoanh nợ.","points":["Áp dụng theo khoản 1 Điều 20 Luật Quản lý thuế; không khoanh nợ cho chi nhánh/văn phòng đại diện/địa điểm kinh doanh của doanh nghiệp còn đang hoạt động (với các trường hợp b, d, đ).","Trường hợp bị hạn chế quyền khai thác đất đai/khoáng sản (điểm e): cần văn bản xác nhận của cơ quan nhà nước có thẩm quyền (Bộ Nông nghiệp và Môi trường, UBND các cấp) nêu rõ diện tích/giá trị bị hạn chế, lý do và thời điểm; cơ quan thuế xử lý trong 3-7 ngày làm việc kể từ khi nhận văn bản.","Thời gian khoanh nợ tính theo từng loại căn cứ (từ ngày ra quyết định khoanh đến ngày chấm dứt; hoặc từ ngày Tòa án thụ lý phá sản/phục hồi; hoặc từ ngày bị hạn chế quyền đến khi được khôi phục).","Số tiền được khoanh: là tổng nợ tại thời điểm bắt đầu khoanh (nhóm a-đ) hoặc riêng các khoản phát sinh từ việc bị hạn chế quyền đất đai/khoáng sản (nhóm e).","Chấm dứt hiệu lực khoanh nợ khi: người nộp thuế tiếp tục hoạt động kinh doanh; phát hiện lập cơ sở/doanh nghiệp mới; Tòa án hủy quyết định tuyên bố chết/mất tích; đủ điều kiện xóa nợ; Tòa án không mở/đình chỉ phá sản; đã hoàn thành nghĩa vụ; hoặc được khôi phục quyền khai thác."]},"nd252_35":{"tldr":"Hướng dẫn xóa tiền thuế nợ: điều kiện riêng khi bị thiên tai/dịch bệnh diện rộng, thẩm quyền xóa nợ theo mức tiền (Chủ tịch UBND tỉnh, Trưởng thuế/Cục trưởng, Bộ trưởng Bộ Tài chính) và thời hạn giải quyết hồ sơ.","points":["Xóa nợ do thiên tai/thảm họa/dịch bệnh diện rộng cần đủ 5 điều kiện: có xác nhận thiệt hại của cơ quan có thẩm quyền; nợ phát sinh trước/trong thời gian xảy ra sự kiện và không còn khả năng nộp; đã áp dụng gia hạn/miễn chậm nộp nhưng không phục hồi được; có đủ hồ sơ, tài liệu xác nhận giá trị thiệt hại; số xóa không vượt giá trị thiệt hại trực tiếp.","Riêng các khoản nợ tiền cấp quyền khai thác khoáng sản/tiền sử dụng đất/thuê đất/tài nguyên nước/thuế đất phi nông nghiệp chỉ được xóa khi đã có quyết định thu hồi đất/quyền khai thác của cơ quan có thẩm quyền.","Thẩm quyền xóa nợ phân theo mức tiền: Chủ tịch UBND tỉnh (các khoản đất đai/tài nguyên trên địa bàn); Trưởng thuế tỉnh/Chi cục trưởng các Chi cục chuyên biệt (dưới 5 tỷ đồng); Cục trưởng Cục Thuế/Cục Hải quan (5-10 tỷ đồng); Bộ trưởng Bộ Tài chính (từ 10 tỷ đồng trở lên); người có thẩm quyền xóa nợ cũng có thẩm quyền phục hồi nợ đã xóa.","Thời hạn: 10 ngày làm việc để yêu cầu bổ sung hồ sơ chưa đầy đủ; 30 ngày kể từ khi nhận đủ hồ sơ để ra quyết định xóa nợ/phục hồi nợ hoặc thông báo không thuộc diện được xóa.","Cơ quan đăng ký kinh doanh phối hợp không cấp giấy chứng nhận đăng ký mới cho cá nhân đã được xóa nợ (trường hợp phá sản/giải thể) nếu chưa hoàn trả lại ngân sách số đã được xóa."]},"nd252_36":{"tldr":"Quy định các căn cứ để cơ quan thuế ấn định thuế (dữ liệu quản lý thuế, dữ liệu thương mại, so sánh với cơ sở kinh doanh cùng ngành, giá đất địa phương...) và hai phương pháp ấn định: ấn định từng yếu tố cấu thành số thuế, hoặc ấn định theo tỷ lệ trên doanh thu/thuế suất GTGT.","points":["Căn cứ ấn định: cơ sở dữ liệu quản lý thuế/thương mại; thông tin từ cơ quan có thẩm quyền hoặc công bố công khai; so sánh doanh thu/tỷ suất lợi nhuận/thuế bình quân của 3 cơ sở cùng ngành, quy mô, địa phương (hoặc địa phương khác nếu thiếu dữ liệu); giá đất do UBND/HĐND tỉnh ban hành (chuyển nhượng, thừa kế, cho tặng BĐS); kết quả kiểm tra, thanh tra; tỷ lệ thu thuế trên doanh thu theo ngành nghề.","Ấn định từng yếu tố: áp dụng khi NNT khai thiếu/sai không bổ sung theo yêu cầu, hạch toán sai sổ sách/hóa đơn, hạch toán giá mua/bán không đúng thực tế, không xác định được căn cứ tính thuế, dùng chứng từ không phản ánh đúng bản chất giao dịch, hoặc vi phạm nghĩa vụ kê khai giá giao dịch liên kết.","Ấn định theo tỷ lệ trên doanh thu/thuế suất GTGT: áp dụng cho NNT nộp GTGT theo phương pháp trực tiếp, TNCN theo thuế suất nhân doanh thu, TNDN theo tỷ lệ % doanh thu, khi thuộc các trường hợp tại khoản 2 Điều 24 Luật Quản lý thuế."]},"nd252_37":{"tldr":"Quy định thẩm quyền ấn định thuế của cơ quan thuế (Thủ trưởng cơ quan thuế) và thủ tục: thông báo bằng văn bản, ban hành quyết định ấn định thuế nêu rõ lý do/căn cứ/số tiền/thời hạn nộp, kèm xử phạt vi phạm và tính tiền chậm nộp.","points":["Thủ trưởng cơ quan thuế có thẩm quyền ấn định thuế; quyết định ấn định phải nêu rõ lý do, căn cứ, phương pháp, số tiền và thời hạn nộp, gửi cho NNT trong 3 ngày làm việc kể từ khi ký; không cần ban hành quyết định riêng nếu NNT thuộc diện nộp theo thông báo của cơ quan thuế.","Nếu ấn định qua kiểm tra thuế, các nội dung trên được ghi trong biên bản kiểm tra và quyết định xử lý về thuế; NNT bị ấn định còn bị xử phạt vi phạm hành chính và tính tiền chậm nộp theo quy định."]},"nd252_38":{"tldr":"Quy định trách nhiệm của người nộp thuế (vẫn phải nộp đủ số ấn định dù không đồng ý, được khiếu nại/khởi kiện) và của cơ quan thuế (thông báo, lập biên bản, hoàn trả nếu ấn định cao hơn phán quyết cuối cùng, hoặc yêu cầu nộp bổ sung nếu thấp hơn).","points":["Người nộp thuế phải nộp đủ số thuế ấn định kể cả khi không đồng ý, đồng thời có quyền yêu cầu giải thích, khiếu nại, khởi kiện và có trách nhiệm cung cấp hồ sơ chứng minh.","Cơ quan thuế: thông báo bằng văn bản, ban hành quyết định (hoặc biên bản kiểm tra/quyết định xử lý nếu qua kiểm tra); nếu số ấn định lớn hơn số theo quyết định giải quyết khiếu nại/bản án thì phải hoàn trả phần nộp thừa; nếu nhỏ hơn thì NNT phải nộp bổ sung, và cơ quan thuế chịu trách nhiệm về việc ấn định."]},"nd252_39":{"tldr":"Quy định chi tiết các trường hợp ấn định thuế riêng cho hàng hóa xuất nhập khẩu (kê khai sai đối tượng miễn/giảm thuế, chênh lệch nguyên liệu gia công, hàng bị kê biên bán đấu giá, tài sản cầm cố...), thẩm quyền của cơ quan hải quan và trách nhiệm nộp thuế của các bên liên quan.","points":["Áp dụng khi: kê khai sai đối tượng miễn/giảm/không thu/không chịu thuế; không báo cáo hoặc báo cáo sai, không giải trình theo yêu cầu hải quan; không chấp hành kiểm tra thuế/kiểm tra sau thông quan.","Trường hợp thay đổi mục đích sử dụng hàng miễn thuế không khai báo, hết thời hạn miễn 5 năm không kê khai, hoặc chênh lệch nguyên liệu gia công/sản xuất xuất khẩu (âm và dương) so với báo cáo — có quy tắc riêng cho từng tình huống xác định được/không xác định được nguyên nhân.","Hàng nhập khẩu chưa hoàn thành thủ tục hải quan bị kê biên bán đấu giá, hoặc hàng miễn/không chịu thuế bị cầm cố/thế chấp mà tổ chức tín dụng phải xử lý để thu hồi nợ — cơ quan hải quan ấn định thuế và thông báo cho bên thu tiền bán đấu giá/tổ chức tín dụng nộp thay.","Thẩm quyền ấn định, sửa đổi, hủy quyết định thuộc thủ trưởng cơ quan hải quan; người nộp thuế/người bảo lãnh/người nộp thay vẫn phải nộp đủ số ấn định dù không đồng ý, trừ khi có quyết định tạm đình chỉ của cơ quan có thẩm quyền."]},"nd252_40":{"tldr":"Hướng dẫn nhà cung cấp nước ngoài có doanh thu TMĐT tại Việt Nam tự đăng ký thuế, khai thuế (theo tháng hoặc từng lần phát sinh), xác định doanh thu phát sinh tại Việt Nam bằng bộ 2 tiêu chí thông tin không mâu thuẫn, và trách nhiệm lưu trữ dữ liệu.","points":["Đăng ký giao dịch thuế điện tử cùng đăng ký thuế lần đầu qua Hệ thống thông tin quản lý thuế; miễn đăng ký nếu toàn bộ doanh thu đã được tổ chức trong nước khấu trừ nộp GTGT hoặc chủ nền tảng đã khấu trừ nộp thay theo Điều 43; phải khai báo đầy đủ tài khoản nhận thanh toán liên quan tới giao dịch tại Việt Nam.","Khai/nộp thuế: theo tháng nếu kinh doanh thường xuyên, theo từng lần phát sinh nếu không thường xuyên; tự tính thuế GTGT, TNDN theo pháp luật thuế tương ứng.","Xác định doanh thu phát sinh tại Việt Nam: dùng 2 loại thông tin không mâu thuẫn — một về thanh toán và một về tình trạng cư trú/truy cập (mã vùng SIM, IP, địa chỉ) của người mua tại Việt Nam.","Trách nhiệm: lưu trữ thông tin xác định giao dịch phục vụ kiểm tra; rà soát, xác nhận lại thông tin tài khoản thanh toán vào kỳ khai thuế tháng 12 hằng năm nếu có thay đổi; nếu có Hiệp định tránh đánh thuế 2 lần thì áp dụng miễn/giảm theo Điều 32; khi chấm dứt kinh doanh phải thông báo và nộp đủ nghĩa vụ còn lại."]},"nd252_41":{"tldr":"Cho phép nhà cung cấp nước ngoài ủy quyền cho tổ chức Việt Nam hoặc đại lý thuế thực hiện đăng ký, khai, nộp thuế thay, và yêu cầu thông báo cho cơ quan thuế khi chuyển từ tự thực hiện sang ủy quyền.","points":["Bên được ủy quyền thực hiện các thủ tục thuế theo hợp đồng đã ký, như trường hợp tự thực hiện tại Điều 40.","Nếu đã trực tiếp đăng ký/khai/nộp thuế mà chuyển sang ủy quyền, phải thông báo cho cơ quan thuế theo hướng dẫn của Bộ Tài chính."]},"nd252_42":{"tldr":"Hướng dẫn cá nhân không cư trú kinh doanh trên nền tảng TMĐT không có chức năng đặt hàng/thanh toán trực tuyến tự đăng ký thuế (qua hồ sơ khai thuế) và khai/nộp thuế theo từng lần phát sinh bằng phương thức điện tử.","points":["Đăng ký giao dịch thuế điện tử và đăng ký thuế lần đầu thông qua hồ sơ khai thuế, dùng email chính thức giao dịch với cơ quan thuế; thay đổi thông tin cũng qua hồ sơ khai thuế, cơ quan thuế cập nhật vào hệ thống.","Khai theo từng lần phát sinh (trừ trường hợp đặc thù tại điểm c khoản 3 Điều 43); tự tính thuế theo pháp luật thuế; nộp thuế bằng phương thức điện tử qua Hệ thống thông tin quản lý thuế."]},"nd252_43":{"tldr":"Quy định trách nhiệm khấu trừ, khai thay, nộp thay thuế của chủ quản nền tảng TMĐT có chức năng đặt hàng và thanh toán, và của tổ chức kinh doanh tại Việt Nam khi mua hàng hóa/dịch vụ từ nhà cung cấp nước ngoài, cá nhân không cư trú, hộ/cá nhân kinh doanh trên nền tảng.","points":["Chủ nền tảng (trong/ngoài nước) khấu trừ, nộp thay GTGT và TNCN cho hộ/cá nhân kinh doanh trên nền tảng của mình (theo từng giao dịch phát sinh doanh thu trong/ngoài nước tùy cá nhân cư trú hay không).","Chủ nền tảng cũng khấu trừ, nộp thay GTGT và TNDN cho nhà cung cấp nước ngoài có doanh thu tại Việt Nam qua nền tảng; nhà cung cấp đã được khấu trừ nộp thay thì không phải tự khai nộp phần đó nữa.","Tổ chức kinh doanh tại Việt Nam áp dụng phương pháp khấu trừ GTGT khi mua hàng/dịch vụ của nhà cung cấp nước ngoài/cá nhân không cư trú qua nền tảng có trách nhiệm khấu trừ, nộp thay GTGT, TNDN, TNCN tương ứng (theo Điều 44).","Nếu tổ chức kinh doanh tại Việt Nam đã khấu trừ nộp thay cho một giao dịch, phải thông báo điện tử cho chủ nền tảng để tránh khấu trừ trùng, kèm đầy đủ thông tin giao dịch; hai bên có trách nhiệm lưu giữ chứng từ để cung cấp khi cơ quan thuế yêu cầu."]},"nd252_44":{"tldr":"Xác định thời điểm khấu trừ thuế (khi thanh toán hoặc khi xác nhận giao dịch thành công) và cách tính số thuế phải khấu trừ theo tỷ lệ % thuế suất trên doanh thu phát sinh tại Việt Nam, kể cả khi không xác định được loại hàng hóa/dịch vụ.","points":["Thời điểm khấu trừ: với tổ chức kinh doanh Việt Nam là lúc thanh toán cho bên nước ngoài/cá nhân không cư trú; với chủ nền tảng là lúc xác nhận giao dịch thành công và chấp nhận thanh toán.","Số thuế khấu trừ = tỷ lệ % thuế suất (theo pháp luật GTGT/TNDN/TNCN cho từng loại giao dịch) nhân doanh thu phát sinh tại Việt Nam (số tiền bán hàng/dịch vụ được chi trả hoặc thu hộ).","Nếu không xác định được giao dịch là hàng hóa hay dịch vụ/loại dịch vụ nào, áp dụng mức tỷ lệ % thuế suất cao nhất theo quy định."]},"nd252_45":{"tldr":"Hướng dẫn đăng ký mã số thuế riêng và cách khai, nộp thay số thuế đã khấu trừ của chủ nền tảng TMĐT/tổ chức kinh tế số và tổ chức kinh doanh tại Việt Nam, gồm cơ chế bù trừ khi giao dịch bị hủy hoặc trả hàng.","points":["Chủ nền tảng trong nước đăng ký mã số thuế riêng cho việc khai/nộp thay; chủ nền tảng nước ngoài dùng mã số thuế và tài khoản đã cấp theo Điều 40.","Chủ nền tảng khai số thuế đã khấu trừ theo tháng, được bù trừ số thuế của giao dịch bị hủy/trả hàng với số phải khấu trừ của các giao dịch khác trong kỳ; tổ chức kinh doanh tại Việt Nam khai theo từng lần phát sinh (hoặc theo tháng nếu phát sinh nhiều lần).","Thời hạn nộp hồ sơ khai và nộp thuế đã khấu trừ áp dụng theo Điều 10 Nghị định này."]},"nd252_46":{"tldr":"Quy định trách nhiệm của chủ nền tảng thuộc diện khấu trừ nộp thay (bảo mật tài khoản, lưu trữ dữ liệu, khai nộp chính xác, hoàn trả khi hủy/trả hàng), của nhà cung cấp nước ngoài chưa được khấu trừ, và quyền/trách nhiệm của hộ, cá nhân kinh doanh trên nền tảng.","points":["Chủ nền tảng: quản lý tài khoản được cấp; lưu giữ dữ liệu giao dịch, thông tin xác định nghĩa vụ thuế; khấu trừ, kê khai, nộp thay chính xác đầy đủ và chịu trách nhiệm pháp lý; cung cấp thông tin theo yêu cầu cơ quan thuế; hoàn trả đầy đủ, kịp thời tiền thuế đã khấu trừ khi giao dịch bị hủy/trả hàng; thực hiện thêm trách nhiệm theo Điều 14 Nghị định 68/2026/NĐ-CP.","Nhà cung cấp nước ngoài chưa được khấu trừ, kê khai, nộp thay: phải tự đăng ký, khai, nộp thuế qua Hệ thống thông tin quản lý thuế và cung cấp đầy đủ, kịp thời thông tin cho chủ nền tảng thuộc diện khấu trừ.","Quyền và trách nhiệm của hộ
