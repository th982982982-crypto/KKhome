k":"p","t":"a) Việc tiếp nhận, xử lý hồ sơ thuế, ban hành thông báo, quyết định hành chính thuế trên Hệ thống thông tin quản lý thuế được thực hiện trên cơ sở dữ liệu, thông tin hợp pháp đã được kiểm soát theo quy định tại thời điểm giải quyết;"},{"k":"p","t":"b) Hệ thống thông tin quản lý thuế phải bảo đảm ghi nhận, lưu trữ đầy đủ quá trình xử lý, cho phép truy vết, đối chiếu và cung cấp thông tin phục vụ kiểm tra, thanh tra và giải trình theo quy định của pháp luật;"},{"k":"p","t":"c) Cơ quan, tổ chức, cá nhân cung cấp thông tin, dữ liệu có trách nhiệm về tính đầy đủ, chính xác của thông tin, dữ liệu do mình cung cấp; cơ quan quản lý thuế chịu trách nhiệm tổ chức kiểm soát, khai thác và sử dụng dữ liệu theo quy định. Công chức quản lý thuế khi thực hiện xử lý hồ sơ thuế, ban hành thông báo, quyết định hành chính thuế trên cơ sở dữ liệu, thông tin đã được kiểm soát theo quy định và theo đúng trình tự, thủ tục, thẩm quyền thì được xác định trách nhiệm về việc thực hiện nhiệm vụ được giao theo quy định của pháp luật về quản lý thuế và pháp luật có liên quan; không phải chịu trách nhiệm đối với nội dung của thông tin, dữ liệu do cơ quan, tổ chức, cá nhân khác cung cấp đã được sử dụng làm căn cứ xử lý theo quy định."},{"k":"p","t":"6. Bộ Tài chính xây dựng, quản lý, vận hành Hệ thống thông tin quản lý thuế theo quy định tại Nghị định này. Cơ quan quản lý thuế các cấp, cơ quan, tổ chức, cá nhân có liên quan có trách nhiệm phối hợp, cung cấp thông tin, dữ liệu và bảo đảm điều kiện để Hệ thống thông tin quản lý thuế hoạt động hiệu quả."}]},{"id":"nd252_53","no":53,"code":"Điều 53","title":"Điều 53. Yêu cầu của thu thập, cập nhật thông tin vào Hệ thống thông tin quản lý thuế","shortTitle":"Yêu cầu của thu thập, cập nhật thông tin vào Hệ thống thông tin quản lý thuế","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các thông tin, dữ liệu được thu thập, cập nhật vào cơ sở dữ liệu trong Hệ thống thông tin quản lý thuế phải được làm sạch dữ liệu; có nguồn xác thực hợp pháp, phản ánh đúng hiện trạng về pháp lý; đầy đủ các trường thông tin, được cập nhật thường xuyên theo quy định."},{"k":"p","t":"2. Trường hợp thông tin được thu thập từ nhiều nguồn khác nhau mà không thống nhất về nội dung thông tin thì khi thu thập thông tin, cơ quan, tổ chức cung cấp thông tin có trách nhiệm phối hợp với cơ quan quản lý thuế để kiểm tra, xác minh tính pháp lý của các thông tin đó và chịu trách nhiệm về nội dung thông tin."},{"k":"p","t":"3. Các thông tin đã được thu thập, cập nhật vào cơ sở dữ liệu trong Hệ thống thông tin quản lý thuế phải được lưu trữ đầy đủ, các lần cập nhật, thay đổi, điều chỉnh thông tin thể hiện được nội dung, tổ chức hoặc cá nhân thực hiện. Mọi bản ghi dữ liệu được lưu vết truy cập, chỉnh sửa, cập nhật, đảm bảo khả năng truy xuất lịch sử thay đổi và biến động dữ liệu."}]},{"id":"nd252_54","no":54,"code":"Điều 54","title":"Điều 54. Bảo đảm an toàn thông tin và quản lý rủi ro công nghệ","shortTitle":"Bảo đảm an toàn thông tin và quản lý rủi ro công nghệ","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các bộ, cơ quan ngang bộ, Ủy ban nhân dân các cấp và các cơ quan có liên quan có trách nhiệm thực hiện quản lý rủi ro công nghệ thông tin theo nguyên tắc chủ động, toàn diện và thường xuyên; đảm bảo nhận diện, đánh giá, kiểm soát và xử lý kịp thời các rủi ro phát sinh trong quá trình xây dựng, vận hành và sử dụng hệ thống công nghệ thông tin."},{"k":"p","t":"2. Cơ quan quản lý thuế có trách nhiệm:"},{"k":"p","t":"a) Thiết lập cơ chế quản lý rủi ro công nghệ đối với Hệ thống thông tin quản lý thuế, bao gồm quy trình nhận diện, phân tích, đánh giá, giám sát và xử lý rủi ro;"},{"k":"p","t":"b) Ban hành và thực hiện định kỳ kế hoạch phòng ngừa, giảm thiểu rủi ro công nghệ, đảm bảo tính liên tục và an toàn của hệ thống;"},{"k":"p","t":"c) Thực hiện kiểm tra, đánh giá bảo mật và an toàn hệ thống tối thiểu một lần/năm hoặc khi có thay đổi lớn về hạ tầng kỹ thuật;"},{"k":"p","t":"d) Lập phương án dự phòng, khắc phục sự cố và diễn tập định kỳ;"},{"k":"p","t":"đ) Lưu trữ hồ sơ quản lý rủi ro công nghệ để phục vụ kiểm tra, giám sát."},{"k":"p","t":"3. Các bộ, cơ quan ngang bộ, Ủy ban nhân dân các cấp có trách nhiệm cung cấp thông tin, dữ liệu, hỗ trợ kỹ thuật phục vụ công tác quản lý rủi ro công nghệ, xử lý sự cố kỹ thuật và tham gia xây dựng, hoàn thiện cơ chế phối hợp, phương án ứng phó sự cố liên ngành theo yêu cầu."},{"k":"p","t":"4. Khi Hệ thống thông tin quản lý thuế phát sinh sự cố kỹ thuật dẫn đến người nộp thuế không thể thực hiện nghĩa vụ thuế đúng thời hạn thì thực hiện theo quy định tại khoản 3 Điều 36 Luật Quản lý thuế:"},{"k":"p","t":"a) Cơ quan quản lý thuế có trách nhiệm xác nhận sự cố và thông báo công khai trên Hệ thống thông tin quản lý thuế, trang thông tin điện tử hoặc bằng văn bản ngay khi Hệ thống gặp sự cố, xác định rõ thời điểm xảy ra sự cố và thời điểm hệ thống tiếp tục hoạt động;"},{"k":"p","t":"b) Người nộp thuế được lựa chọn nộp hồ sơ, thực hiện nghĩa vụ bằng phương thức điện tử sau khi hệ thống được khôi phục hoặc nộp bằng hình thức trực tiếp, qua bưu chính."},{"k":"p","t":"5. Trường hợp hệ thống thông tin của các cơ quan nhà nước có thẩm quyền, các ngân hàng, tổ chức cung ứng dịch vụ trung gian thanh toán phát sinh sự cố kỹ thuật thì đơn vị chủ quản hệ thống có trách nhiệm thông báo công khai trên hệ thống thông tin của đơn vị về thời điểm sự cố của hệ thống, thời điểm hệ thống tiếp tục hoạt động; đồng thời gửi thông báo đến cơ quan quản lý thuế ngay trong ngày làm việc để phối hợp, hỗ trợ kịp thời."},{"k":"p","t":"6. Trường hợp Hệ thống thông tin quản lý thuế tự động ban hành thông báo, quyết định hoặc kết quả xử lý thuế không đúng quy định của pháp luật do lỗi kỹ thuật, lỗi dữ liệu hoặc lỗi hệ thống, thì cơ quan quản lý thuế có trách nhiệm thu hồi, hủy bỏ hoặc điều chỉnh và khắc phục hậu quả phát sinh. Người nộp thuế, tổ chức, cá nhân có liên quan có trách nhiệm hoàn trả, điều chỉnh hoặc phối hợp khắc phục các sai sót theo quyết định của cơ quan quản lý thuế."},{"k":"p","t":"Trường hợp người nộp thuế lợi dụng sự cố để trục lợi thì phải bồi thường và chịu trách nhiệm theo quy định của pháp luật."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính hướng dẫn khoản 4, 5 và 6 Điều này."}]},{"id":"nd252_55","no":55,"code":"Điều 55","title":"Điều 55. Nguyên tắc kết nối, chia sẻ thông tin, dữ liệu","shortTitle":"Nguyên tắc kết nối, chia sẻ thông tin, dữ liệu","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Việc kết nối, chia sẻ dữ liệu thông tin, dữ liệu với Hệ thống thông tin quản lý thuế phải bảo đảm được thực hiện kịp thời, đầy đủ, đúng mục đích quản lý thuế, đúng phạm vi và thẩm quyền."},{"k":"p","t":"2. Việc cung cấp, chia sẻ, kết nối dữ liệu với cơ quan quản lý thuế nhằm phục vụ việc: xác định người nộp thuế; xác định nghĩa vụ thuế của người nộp thuế; quản lý tuân thủ, quản lý rủi ro thuế; phòng, chống thất thu thuế; thực hiện các biện pháp quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"3. Việc cung cấp, chia sẻ, kết nối dữ liệu phải bảo đảm: phù hợp với chức năng, nhiệm vụ của cơ quan quản lý thuế; tuân thủ quy định của Luật Quản lý thuế, Luật Dữ liệu, pháp luật về bảo vệ dữ liệu cá nhân, an toàn thông tin, an ninh mạng và pháp luật có liên quan; bảo đảm nguyên tắc chia sẻ một lần, sử dụng nhiều lần, ưu tiên khai thác dữ liệu từ các cơ sở dữ liệu quốc gia và cơ sở dữ liệu chuyên ngành; bảo đảm tính đầy đủ, kịp thời, chính xác, có khả năng đối soát và truy vết dữ liệu."},{"k":"p","t":"4. Bảo đảm bảo mật, an ninh, an toàn thông tin, bảo vệ dữ liệu cá nhân khi kết nối, chia sẻ thông tin với Hệ thống thông tin quản lý thuế. Tất cả hoạt động kết nối, chia sẻ dữ liệu đều phải thực hiện thông qua nền tảng tích hợp, chia sẻ dữ liệu số ngành tài chính và nền tảng tích hợp, chia sẻ dữ liệu quốc gia."},{"k":"p","t":"5. Việc kết nối, chia sẻ dữ liệu phải tuân thủ đầy đủ Khung kiến trúc số của Bộ Tài chính và đáp ứng tiêu chuẩn kỹ thuật công nghệ thông tin trong kết nối, chia sẻ với Hệ thống thông tin quản lý thuế theo quyết định của Bộ trưởng Bộ Tài chính; bảo đảm an toàn thông tin tối thiểu cấp độ 3 theo quy định của pháp luật về bảo đảm an toàn hệ thống thông tin theo cấp độ khi kết nối chính thức."},{"k":"p","t":"6. Bộ Tài chính từ chối hoặc tạm ngừng kết nối, chia sẻ thông tin trong các trường hợp sau:"},{"k":"p","t":"a) Hệ thống thông tin của cơ quan, tổ chức đề nghị kết nối không bảo đảm tiêu chuẩn kỹ thuật quy định tại khoản 5 Điều này;"},{"k":"p","t":"b) Cơ quan, tổ chức được kết nối có hoạt động truy cập trái phép, làm thay đổi, xóa, hủy, phát tán thông tin trong Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"c) Cơ quan, tổ chức được kết nối vi phạm quy định về bảo mật thông tin, bảo vệ dữ liệu cá nhân hoặc nội dung đã thống nhất với Bộ Tài chính quy định tại khoản 3 Điều này;"},{"k":"p","t":"d) Cơ quan, tổ chức được kết nối có hoạt động truy cập dẫn đến quá tải, ảnh hưởng đến hoạt động của Hệ thống thông tin quản lý thuế."},{"k":"p","t":"7. Bộ trưởng Bộ Tài chính hướng dẫn về thủ tục kết nối, chia sẻ thông tin, từ chối hoặc tạm ngừng kết nối, chia sẻ thông tin giữa cơ quan quản lý thuế với các cơ quan nhà nước, tổ chức cung cấp dịch vụ T-VAN, tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức khác và thủ tục cung cấp các thông tin không thuộc phạm vi cung cấp thông tin quy định tại Điều 58, 60 và 61 Nghị định này."}]},{"id":"nd252_56","no":56,"code":"Điều 56","title":"Điều 56. Hình thức kết nối, chia sẻ, thời hạn cung cấp thông tin, dữ liệu","shortTitle":"Hình thức kết nối, chia sẻ, thời hạn cung cấp thông tin, dữ liệu","chuong":"Chương IV — HỢP TÁC QUỐC TẾ VỀ THUẾ; CHẾ ĐỘ ƯU TIÊN CHO NGƯỜI NỘP THUẾ; ỨNG DỤNG CÔNG NGHỆ, DỮ LIỆU VÀ CHUYỂN ĐỔI SỐ TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Hình thức kết nối, chia sẻ thông tin, dữ liệu với Hệ thống thông tin quản lý thuế thông qua mạng viễn thông, mạng Internet, mạng máy tính, hệ thống thông tin theo quy định pháp luật về quản lý, kết nối và chia sẻ dữ liệu số của cơ quan nhà nước. Phương thức kết nối, chia sẻ dữ liệu bắt buộc gồm:"},{"k":"p","t":"a) Hệ thống thông tin của cơ quan sử dụng, khai thác dữ liệu kết nối với hệ thống thông tin của cơ quan chia sẻ dữ liệu để truy vấn dữ liệu thông qua nền tảng chia sẻ, điều phối dữ liệu, nền tảng chia sẻ, điều phối dữ liệu thực hiện xác thực và phân quyền trao đổi dữ liệu giữa hai bên;"},{"k":"p","t":"b) Hệ thống thông tin của cơ quan chia sẻ dữ liệu đồng bộ một phần hoặc toàn bộ dữ liệu của mình sang hệ thống thông tin của cơ quan sử dụng, khai thác dữ liệu thông qua nền tảng chia sẻ, điều phối dữ liệu;"},{"k":"p","t":"c) Hệ thống thông tin của cơ quan chia sẻ dữ liệu đồng bộ dữ liệu lên cơ sở dữ liệu tổng hợp quốc gia thông qua nền tảng chia sẻ, điều phối dữ liệu để thực hiện điều phối cho cơ quan sử dụng, khai thác dữ liệu;"},{"k":"p","t":"d) Chia sẻ dữ liệu được đóng gói và lưu giữ trên các phương tiện lưu trữ thông tin."},{"k":"p","t":"2. Thời hạn cung cấp thông tin, dữ liệu được thực hiện định kỳ, theo thỏa thuận hợp tác kết nối, chia sẻ thông tin hoặc theo yêu cầu của cơ quan quản lý thuế."}]},{"id":"nd252_57","no":57,"code":"Điều 57","title":"Điều 57. Nhiệm vụ của cơ quan quản lý thuế, công chức quản lý thuế","shortTitle":"Nhiệm vụ của cơ quan quản lý thuế, công chức quản lý thuế","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nhiệm vụ của cơ quan quản lý thuế trong quản lý thuế:"},{"k":"p","t":"Cơ quan quản lý thuế thực hiện nhiệm vụ quy định tại Luật Quản lý thuế và quy định tại Nghị định này. Cơ quan thuế quản lý trực tiếp, cơ quan thuế quản lý khoản thu và cơ quan thuế quản lý địa bàn nhận phân bổ thuế thực hiện nhiệm vụ theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"2. Nhiệm vụ của công chức quản lý thuế trong quản lý thuế:"},{"k":"p","t":"a) Công chức quản lý thuế thực hiện nhiệm vụ quy định tại điểm n khoản 1 Điều 38 Luật Quản lý thuế và quy định tại Nghị định này;"},{"k":"p","t":"b) Bộ trưởng Bộ Tài chính hướng dẫn việc thực hiện hạch toán kế toán tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt và các khoản thu khác thuộc ngân sách nhà nước do cơ quan quản lý thuế phải thu, đã thu, miễn, giảm, xóa nợ, hoàn trả quy định tại điểm k khoản 1 Điều 38 Luật Quản lý thuế;"},{"k":"p","t":"c) Hướng dẫn, giải thích chính sách thuế đúng quy định, thống nhất, không đặt ra thủ tục, điều kiện, nghĩa vụ ngoài quy định của pháp luật;"},{"k":"p","t":"d) Quản lý, sử dụng và bảo mật thông tin người nộp thuế; chỉ được cung cấp thông tin trong phạm vi, đối tượng và mục đích theo quy định của pháp luật;"},{"k":"p","t":"đ) Tuân thủ quy tắc đạo đức công vụ, không được lợi dụng chức vụ, quyền hạn để gây phiền hà, sách nhiễu, trục lợi; không được can thiệp trái pháp luật vào việc xác định nghĩa vụ thuế của người nộp thuế."}]},{"id":"nd252_58","no":58,"code":"Điều 58","title":"Điều 58. Nhiệm vụ, trách nhiệm và quyền hạn của các cơ quan nhà nước, các cơ quan kiểm tra, giám sát, Mặt trận Tổ quốc Việt Nam, các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong quản lý thuế","shortTitle":"Nhiệm vụ, trách nhiệm và quyền hạn của các cơ quan nhà nước, các cơ quan kiểm tra, giám sát, Mặt trận Tổ quốc Việt Nam, các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong quản lý thuế","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các cơ quan nhà nước, các cơ quan kiểm tra, giám sát, Mặt trận Tổ quốc Việt Nam, các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong quản lý thuế thực hiện các nhiệm vụ và quyền hạn theo quy định tại Điều 39 Luật Quản lý thuế và quy định tại Nghị định này."},{"k":"p","t":"2. Trách nhiệm của Bộ Tài chính"},{"k":"p","t":"a) Hướng dẫn thực hiện, xử lý hồ sơ áp dụng các Hiệp định tránh đánh thuế hai lần, điều ước quốc tế về thuế khác, thủ tục thỏa thuận song phương, áp dụng cơ chế thỏa thuận trước về phương pháp xác định giá tính thuế trong quản lý thuế đối với doanh nghiệp có giao dịch liên kết;"},{"k":"p","t":"b) Ban hành các mẫu văn bản thông báo phục vụ công tác quản lý thuế và thực hiện thủ tục hành chính thuế theo quy định tại Nghị định này;"},{"k":"p","t":"3. Trách nhiệm của các bộ, cơ quan ngang bộ, cơ quan nhà nước khác trong quản lý thuế:"},{"k":"p","t":"a) Phối hợp với Bộ Tài chính trong việc triển khai chính sách thuế, quản lý thuế theo quy định tại điểm a khoản 3 Điều 39 Luật Quản lý thuế;"},{"k":"p","t":"b) Đối với các điều ước quốc tế (không phải là Hiệp định tránh đánh thuế hai lần) có quy định về miễn thuế, giảm thuế: cơ quan đề xuất ký kết, gia nhập hoặc chủ trì thực hiện điều ước quốc tế có trách nhiệm xác nhận hiệu lực của điều ước quốc tế trên văn bản đề nghị miễn thuế, giảm thuế, hoàn thuế của người nộp thuế theo mẫu do Bộ trưởng Bộ Tài chính hướng dẫn trước khi người nộp thuế nộp hồ sơ cho cơ quan thuế, trừ trường hợp điều ước quốc tế đã được công bố trên cơ sở dữ liệu quốc gia về điều ước quốc tế;"},{"k":"p","t":"c) Rà soát, sửa đổi, bổ sung văn bản quy phạm pháp luật thuộc lĩnh vực quản lý để đảm bảo việc trao đổi thông tin với cơ quan thuế nước ngoài tuân theo các điều ước quốc tế, thỏa thuận quốc tế về thuế và phù hợp với tiêu chuẩn của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin cho mục đích thuế;"},{"k":"p","t":"d) Cung cấp, chia sẻ thông tin, dữ liệu thuộc phạm vi quản lý theo các nội dung, phạm vi thông tin:"},{"k":"p","t":"d.1) Bộ Xây dựng: thông tin về quản lý, sử dụng và sở hữu nhà ở của tổ chức, hộ gia đình, hộ kinh doanh, cá nhân, cá nhân kinh doanh; thông tin về giấy phép hoạt động vận tải hàng hóa, hành khách; thông tin đăng ký sở hữu, quyền sử dụng tài sản là phương tiện vận tải; các thông tin khác theo quy định của pháp luật có liên quan;"},{"k":"p","t":"d.2) Bộ Nông nghiệp và Môi trường: thông tin về sử dụng đất; thông tin về các khoản thu liên quan đến đất đai, tài sản gắn liền với đất; thông tin về giấy phép khai thác tài nguyên; thông tin về sản lượng khai thác theo từng giấy phép trong năm; các thông tin khác theo quy định của pháp luật có liên quan;"},{"k":"p","t":"d.3) Bộ Công an: thông tin liên quan đến đấu tranh phòng, chống tội phạm về thuế; thông tin định danh, thông tin cư trú, thông tin xuất cảnh, nhập cảnh và thông tin đăng ký, quản lý phương tiện giao thông của tổ chức, cá nhân; các thông tin khác theo quy định của pháp luật có liên quan;"},{"k":"p","t":"d.4) Bộ Công Thương: thông tin về hoạt động thương mại điện tử; thông tin đăng ký, cấp phép hoạt động thương mại điện tử, nhượng quyền thương mại; thông tin quản lý thị trường về phòng, chống và xử lý các hành vi buôn lậu, gian lận thương mại, hàng giả, hàng cấm, hàng hóa không rõ nguồn gốc xuất xứ; thông tin vi phạm pháp luật về chất lượng, đo lường, giá, an toàn thực phẩm, bảo vệ quyền lợi người tiêu dùng, sở hữu trí tuệ trong hoạt động thương mại và các thông tin khác theo quy định của pháp luật có liên quan;"},{"k":"p","t":"d.5) Ngân hàng Nhà nước Việt Nam: cung cấp, chia sẻ thông tin về việc cấp, sửa đổi, bổ sung, thu hồi giấy phép; thông tin về việc thành lập, mua, bán, chia, tách, hợp nhất, sáp nhập, giải thể, thay đổi, bổ sung thông tin của các ngân hàng, tổ chức tín dụng, tổ chức cung ứng dịch vụ trung gian thanh toán; chỉ đạo, hướng dẫn ngân hàng thương mại, tổ chức tín dụng, tổ chức cung ứng dịch vụ trung gian thanh toán được cấp phép thực hiện cung cấp, kết nối, chia sẻ thông tin với cơ quan quản lý thuế liên quan đến giao dịch qua ngân hàng của tổ chức, cá nhân theo quy định của pháp luật và theo nội dung, phương thức, chuẩn dữ liệu, tần suất, thời hạn do cơ quan quản lý thuế hướng dẫn; phối hợp với cơ quan quản lý thuế trong việc thực hiện các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế; phối hợp với Bộ Tài chính và các bộ, ngành có liên quan trong việc thiết lập cơ chế quản lý, giám sát các giao dịch thanh toán xuyên biên giới trong thương mại điện tử, kinh doanh trên nền tảng số và các dịch vụ khác với tổ chức, cá nhân tại Việt Nam; cung cấp đầy đủ kịp thời thông tin theo yêu cầu của cơ quan thuế để thực hiện điều ước quốc tế về thuế mà Việt Nam là thành viên hoặc thỏa thuận quốc tế về thuế mà Việt Nam đã ký kết; việc cung cấp, kết nối, chia sẻ, khai thác và sử dụng thông tin được thực hiện bằng phương thức điện tử, không yêu cầu cung cấp trùng lặp đối với thông tin đã được kết nối, chia sẻ đầy đủ, chính xác, kịp thời từ cơ sở dữ liệu của cơ quan nhà nước có thẩm quyền và phải tuân thủ quy định của pháp luật về bảo vệ dữ liệu cá nhân và pháp luật có liên quan; cung cấp các thông tin khác theo quy định của pháp luật có liên quan;"},{"k":"p","t":"d.6) Bộ Nội vụ: cung cấp thông tin về người lao động nước ngoài làm việc tại Việt Nam, bao gồm: họ và tên; quốc tịch; số hộ chiếu hoặc số định danh theo quy định của pháp luật; tên tổ chức sử dụng lao động; số giấy phép lao động, thời hạn của giấy phép lao động và các thông tin khác theo quy định của pháp luật để phục vụ quản lý thuế;"},{"k":"p","t":"d.7) Bộ Y tế và cơ quan quản lý nhà nước về kinh doanh cơ sở kinh doanh dược, cơ sở khám bệnh, chữa bệnh: thông tin giấy phép hoạt động kinh doanh cơ sở kinh doanh dược, cơ sở khám bệnh, chữa bệnh và cung cấp thông tin khác theo quy định của pháp luật có liên quan;"},{"k":"p","t":"d.8) Bộ Khoa học và Công nghệ: thông tin về quyền sở hữu trí tuệ, chuyển giao công nghệ tại Việt Nam và nước ngoài; thông tin về cấp giấy phép hoạt động cung cấp, sử dụng dịch vụ Internet, thông tin trên mạng, trò chơi điện tử trên mạng; thông tin liên quan đến hoạt động quảng cáo trên mạng, mua bán sản phẩm, dịch vụ công nghệ thông tin trên môi trường mạng, kinh doanh trên nền tảng số và các dịch vụ khác trên mạng; các thông tin khác theo quy định của pháp luật có liên quan. Việc cung cấp thông tin được thực hiện thông qua kết nối, chia sẻ dữ liệu điện tử với cơ quan thuế, bao gồm kết nối trực tuyến với Hệ thống thông tin quản lý thuế hoặc thông qua Cổng thông tin một cửa quốc gia, bảo đảm trao đổi dữ liệu định kỳ hằng ngày;"},{"k":"p","t":"d.9) Bộ Tư pháp: thực hiện chia sẻ thông tin về các hợp đồng chuyển nhượng đã được công chứng và các thông tin liên quan (nếu có);"},{"k":"p","t":"d.10) Cơ quan thanh tra: thông tin liên quan đến gửi biên bản hoặc kết luận thanh tra việc chấp hành pháp luật thuế của người nộp thuế trong trường hợp trực tiếp thanh tra người nộp thuế theo quy định của pháp luật về thanh tra và pháp luật về quản lý thuế;"},{"k":"p","t":"d.11) Cơ quan kiểm toán: thông tin, dữ liệu liên quan đến việc thực hiện nghĩa vụ thuế của người nộp thuế theo quy định của pháp luật về kiểm toán và pháp luật về quản lý thuế;"},{"k":"p","t":"d.12) Cơ quan tòa án, cơ quan trọng tài: thông tin về bản án, quyết định của tòa án, trọng tài về việc chấm dứt hoạt động của dự án đầu tư, phá sản đối với doanh nghiệp và hợp tác xã và cung cấp thông tin khác theo quy định pháp luật có liên quan;"},{"k":"p","t":"d.13) Cơ quan quản lý nhà nước có khoản nộp ngân sách nhà nước từ bán tài sản trên đất, chuyển nhượng quyền sử dụng đất và từ việc quản lý, sử dụng, khai thác tài sản công vào mục đích kinh doanh, cho thuê, liên doanh, liên kết sau khi thực hiện nghĩa vụ thuế, phí, lệ phí theo quy định của Luật Quản lý tài sản công có trách nhiệm cung cấp thông tin liên quan đến khoản nộp ngân sách nhà nước;"},{"k":"p","t":"d.14) Cơ quan khác của nhà nước có liên quan đến người nộp thuế: thông tin của người nộp thuế theo yêu cầu của cơ quan quản lý thuế và pháp luật có liên quan;"},{"k":"p","t":"d.15) Các bộ, cơ quan ngang bộ khác trong phạm vi chức năng, nhiệm vụ, quyền hạn được giao, có trách nhiệm cung cấp thông tin, chia sẻ, kết nối dữ liệu phục vụ quản lý thuế theo yêu cầu của cơ quan quản lý thuế và quy định của pháp luật có liên quan."},{"k":"p","t":"4. Hình thức và tần suất cung cấp, chia sẻ dữ liệu:"},{"k":"p","t":"a) Kết nối, chia sẻ dữ liệu tự động giữa các hệ thống thông tin;"},{"k":"p","t":"b) Trao đổi dữ liệu điện tử định kỳ hoặc theo thời gian thực thông qua nền tảng tích hợp, chia sẻ dữ liệu của Chính phủ, Cổng dữ liệu quốc gia, Cổng Dịch vụ công Quốc gia, Cổng thông tin một cửa quốc gia, Hệ thống trao đổi thông tin giữa cơ quan quản lý thuế và cơ quan bên ngoài. Tần suất, phương thức, chuẩn dữ liệu trao đổi với cơ quan thuế được thực hiện theo quy định của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"c) Trường hợp chưa thực hiện được kết nối, chia sẻ dữ liệu điện tử thì việc cung cấp thông tin thực hiện theo văn bản yêu cầu của cơ quan quản lý thuế. Thời hạn cung cấp chậm nhất 10 ngày làm việc, kể từ ngày nhận được văn bản yêu cầu cung cấp thông tin của cơ quan quản lý thuế;"},{"k":"p","t":"5. Trách nhiệm, quyền hạn của cơ quan nhà nước, các cơ quan kiểm tra, giám sát, các bên liên quan trong việc chia sẻ, kết nối, bảo đảm an toàn và sử dụng dữ liệu thông tin phục vụ quản lý thuế:"},{"k":"p","t":"a) Trách nhiệm, quyền hạn của cơ quan nhà nước, các cơ quan kiểm tra, giám sát, các bên liên quan trong việc chia sẻ, kết nối thông tin phục vụ quản lý thuế:"},{"k":"p","t":"a.1) Quyền và trách nhiệm của cơ quan quản lý thuế:"},{"k":"p","t":"Cơ quan quản lý thuế được quyền yêu cầu, tiếp cận, thu thập, khai thác và sử dụng các dữ liệu quốc gia và dữ liệu chuyên ngành do các bộ, cơ quan ngang bộ quản lý để thực hiện chức năng quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"Cơ quan quản lý thuế có trách nhiệm cung cấp thông tin người nộp thuế phục vụ công tác quản lý thuế theo quy định của pháp luật về quản lý thuế hoặc khi có văn bản yêu cầu của cơ quan nhà nước có thẩm quyền theo quy định của luật."},{"k":"p","t":"Cơ quan quản lý thuế có trách nhiệm cung cấp, chia sẻ, kết nối dữ liệu bằng phương thức điện tử với các bộ, cơ quan ngang bộ quản lý theo nguyên tắc chia sẻ tự động, trừ trường hợp pháp luật có quy định hạn chế hoặc cấm cung cấp dữ liệu;"},{"k":"p","t":"a.2) Quyền và trách nhiệm của cơ quan nhà nước, các cơ quan kiểm tra, giám sát, các bên liên quan: thực hiện các quyền hạn được quy định tại Điều 39 Luật Quản lý thuế; cung cấp đầy đủ, chính xác, kịp thời thông tin liên quan đến người nộp thuế theo yêu cầu của cơ quan quản lý thuế;"},{"k":"p","t":"b) Trách nhiệm và bảo đảm an toàn dữ liệu:"},{"k":"p","t":"b.1) Cơ quan cung cấp dữ liệu chịu trách nhiệm về tính chính xác, đầy đủ, kịp thời của dữ liệu cung cấp;"},{"k":"p","t":"b.2) Cơ quan quản lý thuế có trách nhiệm sử dụng dữ liệu đúng mục đích quản lý thuế; bảo đảm an toàn, bảo mật dữ liệu theo quy định của pháp luật;"},{"k":"p","t":"b.3) Việc khai thác, sử dụng dữ liệu được giám sát, ghi nhận và kiểm tra theo quy định."}]},{"id":"nd252_59","no":59,"code":"Điều 59","title":"Điều 59. Nhiệm vụ, quyền hạn của cơ quan nhà nước có thẩm quyền trong kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí, lệ phí","shortTitle":"Nhiệm vụ, quyền hạn của cơ quan nhà nước có thẩm quyền trong kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí, lệ phí","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Xây dựng kế hoạch kiểm tra, giám sát:"},{"k":"p","t":"a) Đơn vị thuộc bộ, cơ quan ngang bộ, cơ quan chuyên môn thuộc Ủy ban nhân dân các cấp có chức năng kiểm tra, giám sát xây dựng kế hoạch kiểm tra, giám sát hằng năm (tổng thể hoặc chuyên đề) trình cấp có thẩm quyền quy định tại điểm a khoản 2 Điều này ban hành để tổ chức thực hiện;"},{"k":"p","t":"b) Việc xây dựng kế hoạch kiểm tra, giám sát căn cứ vào yêu cầu quản lý nhà nước, kết quả theo dõi việc thực hiện pháp luật về thuế, phí và lệ phí, phản ánh, kiến nghị của tổ chức, cá nhân và các thông tin có liên quan;"},{"k":"p","t":"c) Kế hoạch kiểm tra, giám sát hằng năm không được trùng lặp với kế hoạch thanh tra, kiểm tra của cơ quan thanh tra, kiểm tra khác. Trường hợp trong cùng một năm, cùng nội dung và cùng đối tượng đã được đưa vào kế hoạch kiểm tra, giám sát hoặc đã được cơ quan có thẩm quyền thực hiện kiểm tra, giám sát thì cơ quan khác không kiểm tra, giám sát trùng lặp; trường hợp cần thiết vì yêu cầu quản lý nhà nước thì các cơ quan có liên quan phối hợp, lồng ghép nội dung và tổ chức thực hiện trong cùng một đoàn kiểm tra, giám sát."},{"k":"p","t":"2. Thẩm quyền kiểm tra, giám sát:"},{"k":"p","t":"a) Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Chủ tịch Ủy ban nhân dân các cấp của cơ quan nhà nước có chức năng kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí và lệ phí trong phạm vi quản lý nhà nước của mình;"},{"k":"p","t":"b) Người đứng đầu đơn vị thuộc bộ, cơ quan ngang bộ, cơ quan chuyên môn thuộc Ủy ban nhân dân các cấp của đơn vị, cơ quan có chức năng kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí và lệ phí đối với cơ quan, tổ chức thuộc phạm vi được phân cấp hoặc ủy quyền."},{"k":"p","t":"3. Trách nhiệm của cơ quan, tổ chức, cá nhân có liên quan:"},{"k":"p","t":"a) Cơ quan có thẩm quyền kiểm tra, giám sát thực hiện việc kiểm tra, giám sát theo đúng chức năng, nhiệm vụ, quyền hạn và quy định của pháp luật;"},{"k":"p","t":"b) Cơ quan, tổ chức, cá nhân có liên quan có trách nhiệm phối hợp, cung cấp thông tin, tài liệu và thực hiện các yêu cầu, quyết định xử lý của cơ quan, đoàn kiểm tra, giám sát theo quy định của pháp luật."},{"k":"p","t":"4. Kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí và lệ phí đối với cơ quan quản lý thuế:"},{"k":"p","t":"a) Trình tự, thủ tục kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí và lệ phí đối với cơ quan quản lý thuế được thực hiện theo Chương III Nghị định số 217/2025/NĐ-CP của Chính phủ (trừ điểm b, c, d khoản 3 Điều 15);"},{"k":"p","t":"b) Nội dung kiểm tra, giám sát bao gồm việc thực hiện nhiệm vụ, quyền hạn của cơ quan quản lý thuế trong việc tổ chức triển khai, tuyên truyền, phổ biến, hướng dẫn và hỗ trợ thực hiện pháp luật về thuế, phí và lệ phí;"},{"k":"p","t":"c) Trường hợp qua kiểm tra, giám sát phát hiện hạn chế, bất cập trong việc thực hiện pháp luật về thuế, phí và lệ phí thì người có thẩm quyền kiểm tra, giám sát quyết định hoặc kiến nghị cơ quan có thẩm quyền thực hiện các biện pháp xử lý sau đây:"},{"k":"p","t":"c.1) Yêu cầu đối tượng kiểm tra, giám sát chấn chỉnh, khắc phục tồn tại, hạn chế;"},{"k":"p","t":"c.2) Kiến nghị cơ quan có thẩm quyền nghiên cứu, hoàn thiện pháp luật về thuế, phí và lệ phí;"},{"k":"p","t":"d) Trường hợp phát hiện dấu hiệu vi phạm pháp luật vượt thẩm quyền thì chuyển hồ sơ, thông tin cho cơ quan có thẩm quyền xem xét, xử lý theo quy định của pháp luật;"},{"k":"p","t":"đ) Người đứng đầu cơ quan tiến hành kiểm tra, giám sát có trách nhiệm theo dõi, đôn đốc việc thực hiện kiến nghị, yêu cầu sau kiểm tra, giám sát và tổng hợp, báo cáo cấp có thẩm quyền về kết quả thực hiện."},{"k":"p","t":"5. Kiểm tra, giám sát việc thực hiện pháp luật về phí và lệ phí đối với tổ chức thu phí, lệ phí:"},{"k":"p","t":"a) Trình tự, thủ tục kiểm tra, giám sát việc thực hiện pháp luật về phí và lệ phí đối với tổ chức thu phí, lệ phí được thực hiện theo Nghị định số 217/2025/NĐ-CP năm 2025 của Chính phủ;"},{"k":"p","t":"b) Nội dung kiểm tra, giám sát bao gồm:"},{"k":"p","t":"b.1) Việc triển khai, tuyên truyền, phổ biến, hướng dẫn và hỗ trợ thực hiện pháp luật về phí và lệ phí;"},{"k":"p","t":"b.2) Việc tiếp nhận, tổng hợp và xử lý vướng mắc, kiến nghị trong quá trình thực hiện pháp luật về phí và lệ phí;"},{"k":"p","t":"b.3) Việc tổ chức thực hiện các quy định của pháp luật về tổ chức thu, mức thu, miễn, giảm, nộp, quản lý, sử dụng, công khai phí, lệ phí và lập chứng từ thu;"},{"k":"p","t":"b.4) Việc chấp hành các quy định của pháp luật, bao gồm cả việc tự đặt ra và thu các khoản phí, lệ phí trái quy định pháp luật (nếu có);"},{"k":"p","t":"c) Việc xử lý vi phạm thực hiện theo quy định của pháp luật về hoạt động kiểm tra chuyên ngành. Trường hợp qua kiểm tra, giám sát phát hiện hạn chế, bất cập trong việc thực hiện pháp luật về phí, lệ phí thì người có thẩm quyền kiểm tra, giám sát kiến nghị cơ quan có thẩm quyền nghiên cứu, hoàn thiện pháp luật về phí, lệ phí."},{"k":"p","t":"6. Quy trình kiểm tra, giám sát:"},{"k":"p","t":"Bộ trưởng Bộ Tài chính hướng dẫn quy trình kiểm tra, giám sát việc thực hiện pháp luật về thuế, phí và lệ phí theo quy định tại Điều này."}]},{"id":"nd252_60","no":60,"code":"Điều 60","title":"Điều 60. Nhiệm vụ, quyền hạn và trách nhiệm của tổ chức, cá nhân cung cấp thông tin về chi trả thu nhập và số tiền thuế, khoản thu khác đã kê khai thay, nộp thay thuế cho cơ quan quản lý thuế","shortTitle":"Nhiệm vụ, quyền hạn và trách nhiệm của tổ chức, cá nhân cung cấp thông tin về chi trả thu nhập và số tiền thuế, khoản thu khác đã kê khai thay, nộp thay thuế cho cơ quan quản lý thuế","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan, tổ chức, cá nhân chi trả thu nhập có trách nhiệm cung cấp đầy đủ, đúng thời hạn thông tin về chi trả thu nhập và số tiền thuế khấu trừ của người nộp thuế, số tiền thuế, khoản thu khác đã kê khai thay, nộp thuế, khoản thu khác thay khi có yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"2. Tổ chức, cá nhân khấu trừ, khai thuế thay, nộp thay thuế cung cấp thông tin chi tiết số tiền thuế, khoản thu khác đã khấu trừ, nộp thay thuế theo mẫu do Bộ trưởng Bộ Tài chính quy định kèm theo chứng từ nộp thuế cho cơ quan quản lý thuế. Thời hạn cung cấp thông tin cùng với thời hạn nộp thuế theo quy định của pháp luật về quản lý thuế."},{"k":"p","t":"3. Tổ chức kinh doanh dịch vụ làm thủ tục về thuế, dịch vụ kế toán; tổ chức nhận ủy thác xuất khẩu, nhập khẩu; người được ủy quyền, bảo lãnh và nộp thay thuế cho người nộp thuế; công ty kiểm toán độc lập có trách nhiệm cung cấp thông tin liên quan đến thỏa thuận với người nộp thuế và tài liệu làm căn cứ xác định nghĩa vụ thuế theo quy định của pháp luật quản lý thuế và pháp luật có liên quan khi có yêu cầu bằng văn bản của cơ quan quản lý thuế."},{"k":"p","t":"4. Các tổ chức, cá nhân là đối tác kinh doanh hoặc khách hàng của người nộp thuế có trách nhiệm cung cấp thông tin liên quan đến người nộp thuế theo quy định của pháp luật quản lý thuế và pháp luật có liên quan khi có yêu cầu bằng văn bản của cơ quan quản lý thuế."},{"k":"p","t":"5. Các cơ quan, tổ chức, cá nhân khác có trách nhiệm cung cấp thông tin theo quy định tại Luật Quản lý thuế và pháp luật có liên quan."},{"k":"p","t":"6. Tổ chức cung cấp dịch vụ thanh toán quốc tế có trách nhiệm cung cấp đầy đủ, kịp thời cho cơ quan quản lý thuế khi có yêu cầu về các thông tin giao dịch thanh toán của người nộp thuế."},{"k":"p","t":"7. Chủ quản nền tảng thương mại điện tử, tổ chức cung cấp dịch vụ tài sản số, tổ chức cung cấp dịch vụ logistic, tổ chức thẻ quốc tế, tổ chức nước ngoài cung cấp dịch vụ thanh toán, dịch vụ trung gian thanh toán, dịch vụ xử lý giao dịch điện tử, tổ chức cung cấp dịch vụ viễn thông cho các tổ chức, cá nhân tại Việt Nam có trách nhiệm cung cấp thông tin đầy đủ, chính xác và đúng hạn cho cơ quan quản lý thuế phục vụ công tác quản lý thuế theo quy định của pháp luật về quản lý thuế. Việc cung cấp thông tin theo yêu cầu bằng văn bản của cơ quan quản lý thuế. Thông tin cung cấp gồm:"},{"k":"p","t":"a) Thông tin dùng để định danh, xác định người nộp thuế gồm: mã số thuế, số định danh cá nhân, số hộ chiếu, số điện thoại của chủ gian hàng, người bán;"},{"k":"p","t":"b) Thông tin dùng để xác định doanh thu, thu nhập gồm: doanh thu bán hàng, thu nhập chi trả, tài khoản thanh toán (tài khoản ngân hàng, tài khoản ví điện tử, tài khoản tiền di động), thông tin giao dịch thanh toán qua tài khoản, số lượt bán, số lượt giao hàng, các loại phí thu từ người bán (phí sàn, phí vận chuyển, phí COD);"},{"k":"p","t":"c) Thông tin khác liên quan đến hàng hóa, dịch vụ trên nền tảng thương mại điện tử thuộc phạm vi quản lý theo yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"Đối với chủ quản nền tảng thương mại điện tử đã thực hiện khấu trừ, khai thay và nộp thay số thuế đã khấu trừ của hộ kinh doanh, cá nhân kinh doanh (cư trú và không cư trú), nhà cung cấp nước ngoài theo quy định thì không phải thực hiện cung cấp thông tin của hộ kinh doanh, cá nhân kinh doanh, nhà cung cấp nước ngoài theo quy định tại khoản này."},{"k":"p","t":"8. Đối với thông tin cung cấp theo yêu cầu bằng văn bản của cơ quan quản lý thuế, tổ chức, cá nhân có trách nhiệm cung cấp thông tin cho cơ quan quản lý thuế chậm nhất trong thời hạn 10 ngày làm việc, kể từ ngày nhận được văn bản yêu cầu cung cấp thông tin của cơ quan quản lý thuế."},{"k":"p","t":"9. Các tổ chức, cá nhân phải chịu trách nhiệm về việc không cung cấp thông tin, cung cấp thông tin không đúng thời hạn, không đầy đủ khi có yêu cầu của cơ quan quản lý thuế làm ảnh hưởng đến việc xác định nghĩa vụ thuế hoặc thời gian giải quyết hoàn thuế, miễn, giảm thuế của người nộp thuế; bồi thường thiệt hại cho người nộp thuế theo quy định của pháp luật về trách nhiệm bồi thường của Nhà nước trong trường hợp gây thiệt hại trái pháp luật."}]},{"id":"nd252_61","no":61,"code":"Điều 61","title":"Điều 61. Nhiệm vụ, quyền hạn của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức cung ứng dịch vụ thanh toán trực tuyến (nếu có), tổ chức thẻ quốc tế","shortTitle":"Nhiệm vụ, quyền hạn của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức cung ứng dịch vụ thanh toán trực tuyến (nếu có), tổ chức thẻ quốc tế","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nhiệm vụ, quyền hạn trong việc thực hiện thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a) Đối với tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác trong việc thực hiện thu tiền thuế, các khoản thu khác, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a.1) Thực hiện các quy định về thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo quy định tại Luật Quản lý thuế và pháp luật khác có liên quan;"},{"k":"p","t":"a.2) Lập hoặc hướng dẫn người nộp thuế lập chứng từ nộp tiền vào ngân sách nhà nước, phù hợp với yêu cầu của người nộp thuế, trong đó xác định rõ thông tin về người nộp thuế, ngày nộp thuế, thông tin dữ liệu khoản thuế, số tiền nộp ngân sách nhà nước theo quy định;"},{"k":"p","t":"a.3) Thực hiện chuyển đầy đủ số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đã thu của người nộp thuế vào tài khoản của Kho bạc Nhà nước mở tại ngân hàng thương mại, Ngân hàng Nhà nước Việt Nam theo quy định ngay trong ngày giao dịch. Trường hợp không thể hoàn tất thủ tục ngay trong ngày giao dịch thì phải hoàn tất trước 10 giờ của ngày giao dịch tiếp theo."},{"k":"p","t":"Đối với số tiền thuế, khoản thu khác thuộc ngân sách nhà nước, tiền chậm nộp, tiền phạt mà chậm chuyển hoặc chuyển không đầy đủ hoặc không được hạch toán kịp thời vào tài khoản thanh toán của Kho bạc Nhà nước do lỗi của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác hoặc do lỗi chủ quan của ngân hàng thương mại nơi Kho bạc Nhà nước mở tài khoản, các tổ chức này có trách nhiệm xác định và thanh toán tiền lãi do chậm chuyển, chuyển không đầy đủ, chậm hạch toán theo số ngày, số tiền chậm chuyển, chuyển không đầy đủ, chậm hạch toán vào ngân sách nhà nước."},{"k":"p","t":"Việc xác định tiền lãi, thời hạn thanh toán, tài khoản thanh toán và xử lý đối với khoản thu không được hạch toán kịp thời vào tài khoản thanh toán của Kho bạc Nhà nước thực hiện theo quy định của Bộ Tài chính về quản lý, sử dụng tài khoản thanh toán của Kho bạc Nhà nước mở tại Ngân hàng Nhà nước Việt Nam và ngân hàng thương mại."},{"k":"p","t":"Bộ trưởng Bộ Tài chính hướng dẫn đối với trường hợp có sai, sót cần điều chỉnh và tra soát giữa các bên trong quá trình truyền nhận thông tin thu nộp ngân sách nhà nước;"},{"k":"p","t":"a.4) Đối với số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt mà chậm nộp hoặc nộp không đầy đủ vào ngân sách nhà nước do lỗi của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác thì tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác phải chịu trách nhiệm thanh toán tiền chậm nộp theo quy định Luật Quản lý thuế;"},{"k":"p","t":"a.5) Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác thực hiện thông báo, tra soát đến các đơn vị liên quan để xử lý đối với các trường hợp sai sót theo quy định và không được hoàn trả số tiền thuế đã nộp cho người nộp thuế nếu đã truyền thông tin cho Kho bạc Nhà nước. Riêng ngân hàng thương mại nơi Kho bạc Nhà nước mở tài khoản thực hiện đối chiếu với Kho bạc Nhà nước về chứng từ nộp tiền vào ngân sách;"},{"k":"p","t":"b) Đối với tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác có kết nối trực tiếp với Hệ thống thông tin quản lý thuế ngoài các nhiệm vụ quy định tại điểm a khoản này còn thực hiện các nhiệm vụ, quyền hạn sau:"},{"k":"p","t":"b.1) Hướng dẫn người nộp thuế kê khai các thông tin nộp thuế trên chứng từ nộp ngân sách nhà nước. Truyền đầy đủ thông tin trên chứng từ nộp ngân sách nhà nước đã cấp cho người nộp thuế, cho cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"b.2) Truy vấn thông tin theo mã định danh khoản phải nộp tại Hệ thống thông tin quản lý thuế để ghi trên chứng từ nộp tiền vào ngân sách nhà nước. Không được hủy lệnh chuyển tiền và không được hoàn trả số tiền thuế đã nộp cho người nộp thuế khi thông tin nộp thuế đã được chuyển đến Hệ thống thông tin quản lý thuế và cơ quan quản lý thuế đã thực hiện xử lý bù trừ, thanh toán nợ thuế cho người nộp thuế theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"b.3) Xây dựng hệ thống công nghệ thông tin đáp ứng tiêu chuẩn kỹ thuật theo quyết định của Bộ trưởng Bộ Tài chính. Bảo mật và chỉ sử dụng thông tin thu nộp ngân sách nhà nước của người nộp thuế, người khai hải quan do cơ quan quản lý thuế cung cấp để thực hiện thu ngân sách nhà nước."},{"k":"p","t":"2. Trách nhiệm của tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức dịch vụ khác khi tham gia phối hợp thu thuế, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a) Phối hợp với cơ quan quản lý thuế, Kho bạc Nhà nước trong việc thực hiện nộp thuế điện tử, hoàn thuế điện tử cho người nộp thuế; xử lý, đối soát dữ liệu về nộp thuế điện tử, hoàn thuế điện tử;"},{"k":"p","t":"b) Truyền thông tin chứng từ nộp thuế điện tử cho cơ quan quản lý thuế theo thời gian thực, đầy đủ, chính xác đúng quy định của pháp luật. Ngân hàng thương mại nơi Kho bạc Nhà nước mở tài khoản khi nhận được tiền và thông tin theo chứng từ nộp thuế từ tổ chức phối hợp thu, tổ chức chưa phối hợp thu phải thực hiện hạch toán và chuyển vào tài khoản thu của Kho bạc Nhà nước; đồng thời truyền dữ liệu thông tin thu đến Hệ thống thông tin quản lý thuế của cơ quan thuế theo thời gian thực, đầy đủ, chính xác đúng quy định của pháp luật;"},{"k":"p","t":"c) Hỗ trợ người nộp thuế trong quá trình thực hiện nộp thuế điện tử;"},{"k":"p","t":"d) Bảo mật thông tin của người nộp thuế, người khai hải quan theo quy định của pháp luật."},{"k":"p","t":"3. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức cung ứng dịch vụ thanh toán trực tuyến (nếu có), tổ chức thẻ quốc tế có trách nhiệm cung cấp các thông tin về tài khoản thanh toán của người nộp thuế mở tại ngân hàng cho cơ quan quản lý thuế và phối hợp với cơ quan quản lý thuế khi phát hiện các trường hợp có giao dịch bất thường cần kiểm tra tình trạng tuân thủ thuế."},{"k":"p","t":"4. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài có trách nhiệm tiếp nhận các quyết định cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của người nộp thuế bị cưỡng chế bằng phương thức điện tử; trích tiền để nộp thuế từ tài khoản của người nộp thuế, phong tỏa tài khoản của người nộp thuế bị cưỡng chế theo quy định tại Điều 66 Nghị định này."},{"k":"p","t":"5. Trường hợp người nộp thuế có bảo lãnh về tiền thuế, khoản thu khác tiền chậm nộp, tiền phạt theo quy định của Luật Quản lý thuế nhưng người nộp thuế không nộp đúng thời hạn thì tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, bên bảo lãnh phải chịu trách nhiệm nộp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt thay cho người nộp thuế trong phạm vi bảo lãnh. Trường hợp quá 90 ngày kể từ ngày hết thời hạn nộp tiền thuế nợ theo văn bản chấp thuận của cơ quan quản lý thuế mà người nộp thuế chưa nộp đủ vào ngân sách nhà nước thì tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, bên bảo lãnh bị cưỡng chế đối với số tiền trong phạm vi bảo lãnh theo quy định của Luật Quản lý thuế."},{"k":"p","t":"6. Tổ chức tín dụng có trách nhiệm cung cấp thông tin về hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế được cầm cố, thế chấp phải xử lý để thu hồi nợ nhưng người khai thuế chưa kê khai tờ khai hải quan mới, chưa nộp đủ thuế theo quy định của pháp luật theo yêu cầu của cơ quan hải quan để làm cơ sở cho cơ quan hải quan thực hiện ấn định thuế số tiền thuế phải nộp. Tổ chức tín dụng có trách nhiệm nộp thay thuế cho người nộp thuế."},{"k":"p","t":"7. Nội dung, hình thức, phương thức, thời hạn trong việc cung cấp thông tin cho cơ quan quản lý thuế của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán:"},{"k":"p","t":"a) Nội dung cung cấp thông tin:"},{"k":"p","t":"a.1) Thông tin theo quy định tại điểm b khoản 2 Điều 40 Luật Quản lý thuế gồm: tên chủ tài khoản, số hiệu tài khoản theo mã số thuế đã được cơ quan quản lý thuế cấp, nơi mở tài khoản, cụ thể đến chi nhánh mở tài khoản (nếu có), ngày mở tài khoản, ngày đóng tài khoản;"},{"k":"p","t":"a.2) Thông tin, dữ liệu liên quan đến giao dịch của người nộp thuế gồm số lượng, giá trị giao dịch, nội dung giao dịch, thông tin bên chuyển và bên nhận của giao dịch, thông tin về giao dịch trong và giao dịch xuyên biên giới của người nộp thuế; số dư tài khoản, số dư cuối kỳ, thu nhập phát sinh từ tài khoản và các thông tin khác theo quy định của Luật Quản lý thuế và phù hợp với pháp luật về các tổ chức tín dụng, pháp luật về bảo vệ dữ liệu cá nhân và pháp luật có liên quan phục vụ trực tiếp công tác quản lý thuế;"},{"k":"p","t":"a.3) Thông tin, dữ liệu về chủ sở hữu hưởng lợi, người được ủy quyền, đồng chủ tài khoản, người thụ hưởng và các bên liên quan;"},{"k":"p","t":"a.4) Thông tin về các giao dịch bất thường, đáng ngờ theo quy định của pháp luật về phòng chống rửa tiền;"},{"k":"p","t":"a.5) Thông tin theo tiêu chuẩn báo cáo thông tin tài khoản tài chính của đối tượng không cư trú thuế tại Việt Nam và các báo cáo khác phù hợp với tiêu chuẩn của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin cho mục đích thuế theo quy định tại Điều 63 Nghị định này."},{"k":"p","t":"b) Hình thức, phương thức và thời hạn cung cấp dữ liệu:"},{"k":"p","t":"b.1) Hình thức kết nối, chia sẻ thông tin, dữ liệu với Hệ thống thông tin quản lý thuế thực hiện theo quy định tại Điều 56 Nghị định này;"},{"k":"p","t":"b.2) Thời hạn cung cấp: Việc cung cấp thông tin quy định tại điểm a khoản này thực hiện theo quy định tại Điều 56 Nghị định này."},{"k":"p","t":"Riêng việc cung cấp thông tin về tài khoản quy định tại điểm a.1 khoản này được thực hiện định kỳ hàng tháng chậm nhất vào ngày 10 của tháng kế tiếp;"},{"k":"p","t":"b.3) Phương thức cung cấp: bằng hình thức điện tử;"},{"k":"p","t":"c) Trách nhiệm bảo mật và sử dụng thông tin, dữ liệu: tổ chức cung cấp thông tin, dữ liệu không phải chịu trách nhiệm về việc sử dụng thông tin, dữ liệu sau khi đã cung cấp đúng quy định của pháp luật. Việc khai thác, sử dụng thông tin, dữ liệu phải được ghi nhận, giám sát và kiểm tra theo quy định."}]},{"id":"nd252_62","no":62,"code":"Điều 62","title":"Điều 62. Nhiệm vụ, quyền hạn, nội dung, hình thức, phương thức và thời hạn cung cấp thông tin trong việc chia sẻ, kết nối thông tin, dữ liệu của cơ quan thông tin, báo chí","shortTitle":"Nhiệm vụ, quyền hạn, nội dung, hình thức, phương thức và thời hạn cung cấp thông tin trong việc chia sẻ, kết nối thông tin, dữ liệu của cơ quan thông tin, báo chí","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Nhiệm vụ, quyền hạn, nội dung, thời hạn cung cấp thông tin:"},{"k":"p","t":"a) Cơ quan thông tin, báo chí có trách nhiệm cung cấp cho cơ quan quản lý thuế các thông tin sau đây khi có yêu cầu từ cơ quan quản lý thuế: thông tin về hoạt động sản xuất, kinh doanh, quảng cáo, khuyến mại, giá bán, thị trường của tổ chức, cá nhân có liên quan đến nghĩa vụ thuế; thông tin về dấu hiệu vi phạm pháp luật thuế được phản ánh trên phương tiện thông tin đại chúng; thông tin về các rủi ro trong quản lý thuế được phát hiện từ hoạt động thông tin, báo chí và phản ánh của dư luận xã hội;"},{"k":"p","t":"b) Thời hạn cung cấp thông tin không quá 05 ngày làm việc kể từ ngày nhận được yêu cầu. Trường hợp nội dung phức tạp, thời hạn cung cấp thông tin không quá 10 ngày làm việc kể từ ngày nhận được yêu cầu và phải thông báo bằng văn bản nêu rõ lý do. Đối với thông tin về dấu hiệu vi phạm pháp luật thuế thì phải cung cấp ngay trong ngày hoặc chậm nhất là ngày làm việc tiếp theo ngày phát hiện."},{"k":"p","t":"2. Hình thức, phương thức cung cấp thông tin thực hiện theo quy định tại khoản 7 Điều 61 Nghị định này."}]},{"id":"nd252_63","no":63,"code":"Điều 63","title":"Điều 63. Cung cấp, thu thập, xác minh thông tin theo điều ước quốc tế, thỏa thuận quốc tế về thuế và tiêu chuẩn của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin cho mục đích thuế","shortTitle":"Cung cấp, thu thập, xác minh thông tin theo điều ước quốc tế, thỏa thuận quốc tế về thuế và tiêu chuẩn của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin cho mục đích thuế","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế, người nộp thuế và các cơ quan, tổ chức, cá nhân có liên quan thực hiện thu thập, xác minh, sử dụng, trao đổi thông tin phải tuân thủ theo quy định của pháp luật Việt Nam, điều ước quốc tế về thuế mà Việt Nam là thành viên hoặc thỏa thuận quốc tế về thuế mà Việt Nam đã ký kết và tiêu chuẩn của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin cho mục đích thuế (sau đây gọi tắt là Diễn đàn toàn cầu)."},{"k":"p","t":"2. Nội dung trao đổi thông tin cho mục đích thuế:"},{"k":"p","t":"a) Trao đổi thông tin theo yêu cầu của cơ quan thuế nước ngoài đối với thông tin, dữ liệu về chủ sở hữu pháp lý, chủ sở hữu hưởng lợi, thông tin ngân hàng, thông tin kế toán và các thông tin khác của người nộp thuế, cơ quan, tổ chức, cá nhân có liên quan phục vụ mục đích thuế;"},{"k":"p","t":"b) Trao đổi thông tin tự động đối với báo cáo lợi nhuận liên quốc gia, tiêu chuẩn báo cáo thông tin tài khoản tài chính của đối tượng không cư trú thuế tại Việt Nam, báo cáo tài sản mã hóa và các báo cáo khác theo điều ước quốc tế về thuế mà Việt Nam là thành viên hoặc thỏa thuận quốc tế về thuế mà Việt Nam đã ký kết;"},{"k":"p","t":"c) Trao đổi thông tin tự nguyện đối với các thông tin phục vụ mục đích thuế theo quy định tại điều ước quốc tế về thuế mà Việt Nam là thành viên hoặc thỏa thuận quốc tế về thuế mà Việt Nam đã ký kết."},{"k":"p","t":"3. Người nộp thuế, cơ quan, tổ chức, cá nhân có liên quan phải cung cấp cho cơ quan thuế thông tin theo quy định tại khoản 2 Điều này và phải bảo đảm các yêu cầu sau:"},{"k":"p","t":"a) Thông tin cung cấp phải chính xác, đầy đủ, kịp thời và có thể trao đổi cho mục đích thuế theo quy định của pháp luật Việt Nam, điều ước quốc tế về thuế mà Việt Nam là thành viên hoặc thỏa thuận quốc tế về thuế mà Việt Nam đã ký kết;"},{"k":"p","t":"b) Không được từ chối cung cấp thông tin theo yêu cầu hợp pháp của cơ quan thuế với lý do:"},{"k":"p","t":"b.1) Thông tin thuộc phạm vi bí mật ngân hàng hoặc nghĩa vụ bảo mật khác, trừ trường hợp có quy định khác tại điều ước quốc tế mà Việt Nam là thành viên;"},{"k":"p","t":"b.2) Thông tin đang do ngân hàng, tổ chức tài chính, tổ chức trung gian hoặc bên thứ ba nắm giữ."},{"k":"p","t":"4. Nghĩa vụ cung cấp thông tin về chủ sở hữu pháp lý, chủ sở hữu hưởng lợi của doanh nghiệp nước ngoài:"},{"k":"p","t":"a) Chi nhánh và văn phòng đại diện của công ty nước ngoài hoạt động tại Việt Nam có nghĩa vụ kê khai, cập nhật cho cơ quan thuế thông tin về chủ sở hữu pháp lý và chủ sở hữu hưởng lợi của công ty mẹ ở nước ngoài mà mình trực thuộc hoặc đại diện khi đăng ký thuế lần đầu và khi thay đổi thông tin đăng ký thuế theo quy định của pháp luật về đăng ký thuế."},{"k":"p","t":"Chủ sở hữu pháp lý quy định tại điểm này là tổ chức, cá nhân đứng tên sở hữu phần vốn, cổ phần hoặc quyền sở hữu tương đương đối với công ty theo pháp luật của nước nơi công ty được thành lập hoặc đăng ký thành lập."},{"k":"p","t":"Chủ sở hữu hưởng lợi được xác định theo quy định tại Luật Phòng, chống rửa tiền, Luật Doanh nghiệp và các văn bản hướng dẫn thi hành;"},{"k":"p","t":"b) Chi nhánh, văn phòng đại diện có trách nhiệm lưu giữ hồ sơ, tài liệu liên quan đến thông tin quy định tại điểm a khoản này trong thời gian hoạt động, bảo đảm cung cấp kịp thời theo yêu cầu của cơ quan thuế; thời hạn lưu trữ tối thiểu là 05 năm kể từ khi kết thúc năm dương lịch hoặc kỳ báo cáo có liên quan;"},{"k":"p","t":"c) Khi chi nhánh, văn phòng đại diện chấm dứt hoạt động tại Việt Nam, cơ quan thuế có trách nhiệm lưu trữ thông tin do chi nhánh, văn phòng đại diện cung cấp theo quy định tại khoản này trong thời hạn tối thiểu 05 năm kể từ năm dương lịch chấm dứt hoạt động."},{"k":"p","t":"5. Người đại diện theo pháp luật của người nộp thuế có trách nhiệm tự thực hiện hoặc thuê tổ chức, cơ quan lưu trữ để bảo quản, lưu trữ tài liệu kế toán tại Việt Nam sau khi tạm ngừng kinh doanh, giải thể, phá sản đồng thời phải thông báo bằng văn bản về nơi lưu trữ tài liệu kế toán cho cơ quan thuế để đảm bảo nghĩa vụ cung cấp đầy đủ hồ sơ, thông tin theo yêu cầu của cơ quan thuế và cơ quan nhà nước có thẩm quyền khác khi có nghi ngờ hoặc phát hiện thấy có các dấu hiệu bất thường trong hồ sơ thuế hoặc phát sinh tranh chấp khác (nếu có)."},{"k":"p","t":"6. Người nộp thuế, cơ quan, tổ chức, cá nhân khác có liên quan có nghĩa vụ thu thập, lưu trữ và cung cấp thông tin quy định tại khoản 2 Điều này khi có yêu cầu của cơ quan thuế để phục vụ mục đích trao đổi thông tin."},{"k":"p","t":"7. Việc xác minh thông tin của người nộp thuế thực hiện như sau:"},{"k":"p","t":"a) Cơ quan thuế thực hiện thu thập, đối chiếu tính đầy đủ, chính xác và nhất quán của thông tin do người nộp thuế cung cấp với thông tin, dữ liệu từ cơ sở dữ liệu của cơ quan nhà nước và các thông tin thu thập được từ cơ quan, tổ chức, cá nhân có liên quan hoặc các nguồn thông tin hợp pháp khác;"},{"k":"p","t":"b) Trường hợp cần thiết, cơ quan thuế thực hiện xác minh thông tin tại trụ sở người nộp thuế nhằm thu thập thông tin, tài liệu phục vụ công tác trao đổi thông tin;"},{"k":"p","t":"c) Người nộp thuế có trách nhiệm cung cấp đầy đủ, kịp thời thông tin, tài liệu; giải trình và phối hợp với cơ quan thuế trong quá trình xác minh theo quy định tại khoản này; không được từ chối cung cấp thông tin, tài liệu theo yêu cầu hợp pháp của cơ quan thuế nhằm phục vụ trao đổi thông tin cho mục đích thuế với cơ quan thuế nước ngoài;"},{"k":"p","t":"d) Việc thu thập, xác minh thông tin phải bảo đảm phục vụ trao đổi thông tin vì mục đích thuế, thực hiện đúng thẩm quyền, tuân thủ quy định của pháp luật."},{"k":"p","t":"8. Cơ quan thuế thực hiện các biện pháp nghiệp vụ trong công tác thu thập xác minh thông tin như sau:"},{"k":"p","t":"a) Ban hành văn bản đề nghị cơ quan, tổ chức, cá nhân có liên quan cung cấp thông tin theo điều ước quốc tế về thuế mà Việt Nam là thành viên hoặc thỏa thuận quốc tế về thuế mà Việt Nam đã ký kết;"},{"k":"p","t":"b) Trường hợp cơ quan, tổ chức, cá nhân không thực hiện cung cấp thông tin hoặc cung cấp thông tin không đầy đủ, không đảm bảo tính chính xác, cơ quan thuế thực hiện các biện pháp thu thập, xác minh thông tin, bao gồm biện pháp đôn đốc, cảnh báo và ban hành quyết định thu thập, xác minh thông tin;"},{"k":"p","t":"c) Trường hợp đã áp dụng các biện pháp quy định tại điểm b khoản này mà vẫn không thu thập được đầy đủ, chính xác thông tin, tùy theo tính chất, mức độ vi phạm, cơ quan, tổ chức, cá nhân có liên quan bị xử phạt vi phạm hành chính về quản lý thuế theo quy định;"},{"k":"p","t":"d) Trường hợp tổ chức, cá nhân không cung cấp thông tin trong thời hạn ghi trong quyết định xử phạt vi phạm hành chính về quản lý thuế thì cơ quan thuế áp dụng các biện pháp cưỡng chế theo quy định của pháp luật để bảo đảm thực hiện nghĩa vụ cung cấp thông tin."},{"k":"p","t":"9. Bảo mật và sử dụng thông tin trao đổi cho mục đích thuế:"},{"k":"p","t":"a) Thông tin, thư từ và các tài liệu trao đổi giữa cơ quan quản lý thuế Việt Nam với nhà chức trách có thẩm quyền của quốc gia, vùng lãnh thổ khác theo điều ước quốc tế về thuế phải được quản lý, lưu giữ và bảo mật theo quy định của pháp luật và điều ước quốc tế về thuế mà Việt Nam là thành viên. Các thông tin này chỉ được thu thập, xử lý và sử dụng cho mục đích quản lý thuế theo quy định; chỉ được cung cấp cho cơ quan thẩm quyền, tổ chức, cá nhân có liên quan đến việc thực hiện nhiệm vụ quản lý thuế;"},{"k":"p","t":"b) Việc sử dụng hoặc cung cấp thông tin quy định tại điểm a khoản này cho mục đích khác chỉ được thực hiện khi được điều ước quốc tế về thuế có liên quan cho phép và đáp ứng đầy đủ các điều kiện theo điều ước đó;"},{"k":"p","t":"c) Cơ quan thuế, cơ quan nhà nước có trách nhiệm ban hành và tổ chức thực hiện quy trình bảo đảm bảo mật thông tin trao đổi phù hợp với tiêu chuẩn của Diễn đàn toàn cầu;"},{"k":"p","t":"d) Khi thu thập thông tin theo yêu cầu của nhà chức trách có thẩm quyền của quốc gia, vùng lãnh thổ khác theo điều ước quốc tế về thuế mà Việt Nam là thành viên, cơ quan thuế thực hiện như sau:"},{"k":"p","t":"d.1) Người nộp thuế, cơ quan, tổ chức, cá nhân có quyền yêu cầu cơ quan thuế cung cấp thông tin và giải thích về đề nghị cung cấp thông tin, bảo đảm phù hợp với nội dung yêu cầu và phục vụ việc thực hiện nghĩa vụ theo quy định của pháp luật. Nội dung cung cấp, giải thích không bao gồm thông tin về nguồn, sự tồn tại của yêu cầu trao đổi thông tin hoặc thư đề nghị cung cấp thông tin thuộc phạm vi bảo mật trong trao đổi thông tin với nhà chức trách có thẩm quyền nước ngoài. Cơ quan thuế có trách nhiệm bảo đảm việc cung cấp thông tin tuân thủ quy định về bảo mật theo pháp luật trong nước và điều ước quốc tế có liên quan;"},{"k":"p","t":"d.2) Việc thu thập, xác minh thông tin phải bảo đảm không làm ảnh hưởng đến mục đích xử lý yêu cầu của nhà chức trách có thẩm quyền nước ngoài theo điều ước quốc tế về thuế;"},{"k":"p","t":"đ) Trường hợp làm lộ, lọt, mất, sử dụng trái phép thông tin trao đổi thì cá nhân, tổ chức có liên quan bị xử lý kỷ luật, xử phạt vi phạm hành chính hoặc truy cứu trách nhiệm theo quy định của pháp luật. Cơ quan thuế có trách nhiệm áp dụng các biện pháp cần thiết để thực thi các chế tài và biện pháp xử lý phù hợp trong trường hợp vi phạm nghĩa vụ bảo mật hoặc sử dụng trái phép thông tin bảo mật của người nộp thuế."},{"k":"p","t":"10. Cơ quan thuế ưu tiên bảo đảm đầy đủ nguồn lực để triển khai trao đổi thông tin theo điều ước quốc tế, thỏa thuận quốc tế về thuế và tiêu chuẩn của Diễn đàn toàn cầu."}]},{"id":"nd252_64","no":64,"code":"Điều 64","title":"Điều 64. Tiêu chuẩn kinh doanh dịch vụ làm thủ tục về thuế","shortTitle":"Tiêu chuẩn kinh doanh dịch vụ làm thủ tục về thuế","chuong":"Chương V — QUYỀN, NGHĨA VỤ, NHIỆM VỤ, QUYỀN HẠN CỦA CÁC BÊN LIÊN QUAN TRONG QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Tiêu chuẩn kinh doanh dịch vụ làm thủ tục về thuế đối với tổ chức, cá nhân cung cấp dịch vụ:"},{"k":"p","t":"a) Đối với đại lý thuế:"},{"k":"p","t":"a.1) Là doanh nghiệp được thành lập và hoạt động theo quy định của pháp luật;"},{"k":"p","t":"a.2) Có ít nhất 02 người đáp ứng tiêu chuẩn quy định tại khoản 2 Điều này làm việc toàn thời gian tại doanh nghiệp;"},{"k":"p","t":"b) Đối với hộ kinh doanh, cá nhân đáp ứng tiêu chuẩn quy định tại khoản 2 Điều này và thực hiện hoạt động theo quy định của pháp luật có liên quan."},{"k":"p","t":"2. Tiêu chuẩn đối với người tham gia hoạt động kinh doanh dịch vụ làm thủ tục về thuế:"},{"k":"p","t":"Người trực tiếp thực hiện dịch vụ làm thủ tục về thuế là người Việt Nam hoặc người nước ngoài được phép cư trú tại Việt Nam từ 12 tháng trở lên, có đầy đủ năng lực hành vi dân sự và đáp ứng các tiêu chuẩn sau:"},{"k":"p","t":"a) Tiêu chuẩn chuyên môn:"},{"k":"p","t":"a.1) Có chứng chỉ nghiệp vụ chuyên môn về thuế theo quy định của pháp luật;"},{"k":"p","t":"a.2) Thực hiện cập nhật kiến thức chuyên môn, nghiệp vụ theo quy định;"},{"k":"p","t":"b) Tiêu chuẩn đạo đức nghề nghiệp:"},{"k":"p","t":"b.1) Không được thông đồng với công chức thuế, người nộp thuế để thực hiện hành vi vi phạm pháp luật về thuế; trường hợp có hành vi giúp người nộp thuế thực hiện hành vi trốn thuế, khai thiếu thuế hoặc vi phạm thủ tục về thuế thì phải chịu trách nhiệm theo quy định của pháp luật và bồi thường thiệt hại cho người nộp thuế theo hợp đồng đã ký kết (nếu có);"},{"k":"p","t":"b.2) Giữ bí mật thông tin cho người nộp thuế sử dụng dịch vụ của đại lý thuế, hộ kinh doanh, cá nhân kinh doanh dịch vụ làm thủ tục về thuế theo quy định của pháp luật."},{"k":"p","t":"Tổ chức, cá nhân đáp ứng đầy đủ các tiêu chuẩn trên, được cung cấp dịch vụ làm thủ tục về thuế và không phải đăng ký với cơ quan thuế."}]},{"id":"nd252_65","no":65,"code":"Điều 65","title":"Điều 65. Cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Các trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế thực hiện theo quy định tại khoản 1,2, 3, 4 và 5 Điều 48 Luật Quản lý thuế."},{"k":"p","t":"Cơ quan quản lý thuế xác định hành vi phát tán tài sản của người nộp thuế quy định tại khoản 3 Điều 48 Luật Quản lý thuế căn cứ vào thông tin chuyển nhượng, cho, bán tài sản, rút tiền, chuyển tiền, tẩu tán số dư tài khoản một cách bất thường không liên quan đến các giao dịch thông thường trong sản xuất kinh doanh trước khi cơ quan quản lý thuế ban hành quyết định cưỡng chế."},{"k":"p","t":"2. Các trường hợp chưa thực hiện biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế:"},{"k":"p","t":"a) Khoản nợ của người nộp thuế được cơ quan quản lý thuế không tính tiền chậm nộp theo quy định tại Điều 26 Nghị định này;"},{"k":"p","t":"b) Khoản nợ của người nộp thuế được nộp dần tiền thuế nợ theo quy định tại khoản 6 Điều 48 Luật Quản lý thuế. Bộ trưởng Bộ Tài chính quy định số lần nộp dần và hồ sơ, thủ tục về nộp dần tiền thuế nợ."},{"k":"p","t":"3. Thủ trưởng cơ quan quản lý thuế căn cứ tình hình thực tế, nguyên tắc quản lý rủi ro dựa trên mức độ rủi ro, quản lý tuân thủ theo mức độ tuân thủ để quyết định trường hợp thực hiện cưỡng chế thi hành quyết định hành chính về quản lý thuế theo quy định tại Điều 48 Luật Quản lý thuế và không hoặc chưa áp dụng biện pháp cưỡng chế trong các trường hợp sau đây:"},{"k":"p","t":"a) Đối với khoản tiền thuế nợ đang được khoanh tiền thuế nợ theo quy định:"},{"k":"p","t":"a.1) Trường hợp thuộc quy định tại điểm a, b, d và đ khoản 1 Điều 20 Luật Quản lý thuế, cơ quan quản lý thuế chưa thực hiện biện pháp cưỡng chế trong thời gian khoanh tiền thuế nợ, trừ trường hợp cơ quan quản lý thuế đã ban hành quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế. Cơ quan quản lý thuế phát hiện người nộp thuế có tài sản, dòng tiền để thực hiện nghĩa vụ nộp thuế thì thực hiện cưỡng chế theo quy định;"},{"k":"p","t":"a.2) Trường hợp thuộc quy định tại điểm c và điểm e khoản 1 Điều 20 Luật Quản lý thuế thì không áp dụng biện pháp cưỡng chế trong thời gian khoanh tiền thuế nợ. Trường hợp quyết định cưỡng chế đã được ban hành thì cơ quan quản lý thuế ban hành quyết định chấm dứt hiệu lực của quyết định cưỡng chế;"},{"k":"p","t":"b) Chưa áp dụng biện pháp cưỡng chế đối với người nộp thuế (trừ trường hợp người nộp thuế không hoạt động tại địa chỉ đã đăng ký) khi tổng số tiền thuế nợ thuộc trường hợp bị cưỡng chế không vượt quá các mức sau:"},{"k":"p","t":"b.1) Đối với tổ chức: 3.000.000 đồng;"},{"k":"p","t":"b.2) Đối với hộ gia đình, hộ kinh doanh, cá nhân, cá nhân kinh doanh: 1.000.000 đồng;"},{"k":"p","t":"c) Không áp dụng biện pháp cưỡng chế đối với khoản tiền thuế nợ thuộc trường hợp quy định tại khoản 7 và khoản 8 Điều 48 Luật Quản lý thuế."},{"k":"p","t":"4. Quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế, quyết định chấm dứt cưỡng chế thi hành quyết định hành chính về quản lý thuế:"},{"k":"p","t":"a) Quyết định hành chính về quản lý thuế bao gồm: quyết định xử phạt vi phạm hành chính về quản lý thuế; các thông báo ấn định thuế, quyết định ấn định thuế; thông báo tiền thuế nợ; quyết định thu hồi hoàn; quyết định gia hạn; quyết định nộp dần; quyết định chấm dứt hiệu lực của quyết định khoanh tiền thuế nợ; quyết định áp dụng biện pháp khắc phục hậu quả theo quy định của pháp luật về xử lý vi phạm hành chính về quản lý thuế; quyết định về bồi thường thiệt hại; quyết định hành chính về quản lý thuế khác theo quy định của pháp luật;"},{"k":"p","t":"b) Quyết định cưỡng chế, quyết định chấm dứt cưỡng chế được gửi cho người nộp thuế bị cưỡng chế và các tổ chức, cá nhân có liên quan bằng phương thức điện tử và đăng tải thông tin trên trang thông tin điện tử ngành thuế, hải quan ngay trong ngày ban hành quyết định. Trường hợp chưa đủ điều kiện thực hiện giao dịch điện tử trong lĩnh vực quản lý thuế thì các quyết định, cưỡng chế được gửi đến người nộp thuế bị cưỡng chế và các tổ chức, cá nhân có liên quan bằng thư bảo đảm qua đường bưu chính hoặc gửi trực tiếp;"},{"k":"p","t":"c) Quyết định cưỡng chế có hiệu lực thi hành từ ngày ký, trừ quyết định cưỡng chế bằng biện pháp dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu theo quy định tại Điều 68 Nghị định này;"},{"k":"p","t":"d) Quyết định cưỡng chế chấm dứt hiệu lực kể từ khi:"},{"k":"p","t":"d.1) Người nộp thuế thuộc trường hợp chấm dứt hiệu lực của quyết định cưỡng chế theo quy định tại khoản 2 Điều 49 Luật Quản lý thuế;"},{"k":"p","t":"d.2) Bên thứ ba đã nộp đủ số tiền trên quyết định cưỡng chế đối với trường hợp cưỡng chế bằng biện pháp thu tiền, tài sản của người nộp thuế bị cưỡng chế do tổ chức, cá nhân khác đang nắm giữ;"},{"k":"p","t":"d.3) Tài sản kê biên đã được bán đấu giá và đã xử lý số tiền thu được do bán đấu giá tài sản kê biên đối với trường hợp cưỡng chế bằng biện pháp kê biên tài sản, bán đấu giá tài sản kê biên."},{"k":"p","t":"5. Các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế:"},{"k":"p","t":"a) Các biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế thực hiện theo quy định tại khoản 1 Điều 49 Luật Quản lý thuế; cơ quan quản lý thuế thực hiện đồng thời một hoặc nhiều biện pháp cưỡng chế khi người nộp thuế chưa nộp đầy đủ tiền thuế nợ vào ngân sách nhà nước;"},{"k":"p","t":"b) Trường hợp có căn cứ xác định người nộp thuế có tiền thuế nợ không hoạt động tại địa chỉ đã đăng ký hoặc có hành vi phát tán tài sản thì người có thẩm quyền quyết định cưỡng chế lựa chọn áp dụng biện pháp cưỡng chế phù hợp để bảo đảm thu kịp thời, đầy đủ tiền thuế nợ vào ngân sách nhà nước."},{"k":"p","t":"6. Thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế:"},{"k":"p","t":"a) Người có thẩm quyền và phạm vi thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế thực hiện theo quy định tại khoản 1 và khoản 2 Điều 50 Luật Quản lý thuế;"},{"k":"p","t":"b) Người có thẩm quyền cưỡng chế quy định tại điểm a khoản này được giao quyền cho cấp phó theo quy định của pháp luật về xử lý vi phạm hành chính."},{"k":"p","t":"7. Đối với khoản thu khác thuộc ngân sách nhà nước do cơ quan nhà nước, tổ chức được Nhà nước giao quản lý thu theo quy định của pháp luật chuyên ngành, cơ quan được giao quản lý thu có trách nhiệm xác định số tiền còn nợ, tiền chậm nộp, ban hành thông báo đôn đốc nộp và lập hồ sơ kiến nghị cơ quan nhà nước có thẩm quyền thực hiện các biện pháp cưỡng chế theo quy định tại khoản 7 Điều 39 Luật Quản lý thuế. Cơ quan nhà nước có thẩm quyền có trách nhiệm xem xét, áp dụng các biện pháp cưỡng chế thuộc thẩm quyền theo quy định của pháp luật về quản lý thuế; trường hợp không áp dụng thì phải trả lời bằng văn bản và nêu rõ lý do."}]},{"id":"nd252_66","no":66,"code":"Điều 66","title":"Điều 66. Cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","shortTitle":"Cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp trích tiền từ tài khoản, phong tỏa tài khoản áp dụng đối với người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế có mở tài khoản tại tổ chức tín dụng, chi nhánh ngân hàng nước ngoài. Người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế bao gồm:"},{"k":"p","t":"a) Người nộp thuế thuộc các trường hợp quy định tại các khoản 1, 2, 3 và 4 Điều 48 Luật Quản lý thuế;"},{"k":"p","t":"b) Tổ chức bảo lãnh nộp tiền thuế cho người nộp thuế: quá thời hạn quy định 90 ngày, kể từ ngày hết hạn nộp tiền thuế nợ theo văn bản chấp thuận của cơ quan quản lý thuế về việc nộp dần tiền thuế nợ theo quy định tại khoản 6 Điều 48 Luật Quản lý thuế mà người nộp thuế chưa nộp đủ vào ngân sách nhà nước thì bên bảo lãnh bị cưỡng chế theo quy định của Luật Quản lý thuế."},{"k":"p","t":"2. Các loại tài khoản không thực hiện cưỡng chế quy định tại Điều này bao gồm: tài khoản nhận nguồn vốn ODA và vay ưu đãi tại tổ chức tín dụng, chi nhánh ngân hàng nước ngoài; tài khoản nhận kinh phí bảo trì nhà chung cư theo quy định của pháp luật về nhà ở; tài khoản là tài sản bảo đảm nợ xấu của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài theo quy định của Luật Các tổ chức tín dụng; tài khoản quỹ bình ổn giá xăng dầu theo quy định của pháp luật về kinh doanh xăng dầu."},{"k":"p","t":"3. Căn cứ ban hành quyết định cưỡng chế là một trong các thông tin sau đây:"},{"k":"p","t":"a) Thông tin về tài khoản của người nộp thuế tại cơ sở dữ liệu quản lý thuế hoặc thông tin về tài khoản do tổ chức, cá nhân có liên quan cung cấp cho cơ quan quản lý thuế;"},{"k":"p","t":"b) Thông tin về tài khoản của người nộp thuế bị cưỡng chế do tổ chức tín dụng, chi nhánh ngân hàng nước ngoài cung cấp theo yêu cầu của cơ quan quản lý thuế trong trường hợp cơ sở dữ liệu tại cơ quan quản lý thuế không đầy đủ."},{"k":"p","t":"Cơ quan quản lý thuế có trách nhiệm bảo mật những thông tin về tài khoản của người nộp thuế bị cưỡng chế."},{"k":"p","t":"4. Quyết định cưỡng chế trích tiền từ tài khoản, phong tỏa tài khoản:"},{"k":"p","t":"a) Quyết định cưỡng chế được ban hành tại các thời điểm sau:"},{"k":"p","t":"a.1) Sau ngày thứ 90 kể từ ngày hết thời hạn nộp thuế;"},{"k":"p","t":"a.2) Sau ngày hết thời hạn gia hạn nộp thuế;"},{"k":"p","t":"a.3) Sau ngày người nộp thuế không chấp hành quyết định xử phạt vi phạm hành chính về quản lý thuế theo thời hạn ghi trên quyết định xử phạt (trừ trường hợp được hoãn hoặc tạm đình chỉ thi hành quyết định xử phạt);"},{"k":"p","t":"a.4) Khi phát hiện người nộp thuế có hành vi phát tán tài sản hoặc không hoạt động tại địa chỉ đã đăng ký;"},{"k":"p","t":"b) Quyết định cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản được gửi cho người nộp thuế bị cưỡng chế, tổ chức tín dụng, chi nhánh ngân hàng nước ngoài nơi người nộp thuế bị cưỡng chế mở tài khoản và các tổ chức, cá nhân có liên quan ngay trong ngày ban hành quyết định cưỡng chế;"},{"k":"p","t":"c) Cơ quan quản lý thuế thực hiện rà soát và cập nhật cơ sở dữ liệu quản lý thuế. Trường hợp phát hiện người nộp thuế phát sinh tài khoản mới thì cơ quan quản lý thuế ban hành quyết định cưỡng chế bổ sung đối với các tài khoản mới phát sinh (nếu có)."},{"k":"p","t":"5. Trách nhiệm của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài nơi tổ chức, cá nhân bị cưỡng chế mở tài khoản:"},{"k":"p","t":"a) Thực hiện phong tỏa tài khoản của người nộp thuế bị cưỡng chế bằng với số tiền ghi trong quyết định cưỡng chế ngay khi nhận được quyết định cưỡng chế từ cơ quan quản lý thuế; phối hợp thông báo bằng phương thức điện tử đến cơ quan quản lý thuế về số dư tài khoản sau khi phong tỏa để cơ quan quản lý thuế ban hành lệnh thu ngân sách nhà nước, làm cơ sở để tổ chức tín dụng, chi nhánh ngân hàng nước ngoài trích tiền từ tài khoản của người nộp thuế."},{"k":"p","t":"b) Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài có trách nhiệm trích chuyển số tiền của người nộp thuế bị cưỡng chế vào tài khoản thu ngân sách nhà nước mở tại Kho bạc Nhà nước ngay trong ngày hoặc chậm nhất là ngày làm việc tiếp theo ngày nhận được lệnh thu ngân sách nhà nước."},{"k":"p","t":"Trường hợp số dư trong tài khoản ít hơn số tiền mà người nộp thuế bị cưỡng chế phải nộp thì sau khi trừ đi số dư tối thiểu để duy trì tài khoản, tổ chức tín dụng, chi nhánh ngân hàng nước ngoài phải trích chuyển số tiền còn lại vào tài khoản thu ngân sách nhà nước."},{"k":"p","t":"Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài tiếp tục theo dõi tài khoản của người nộp thuế sau khi phong tỏa tài khoản, trường hợp tài khoản của người nộp thuế phát sinh số dư mới thì tổ chức tín dụng, chi nhánh ngân hàng nước ngoài thực hiện trích chuyển để nộp vào tài khoản thu ngân sách nhà nước cho đến khi thu đủ số tiền thuế nợ trên quyết định cưỡng chế. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài khi thực hiện trích tiền theo quyết định cưỡng chế thì phải thông báo cho cơ quan ban hành quyết định cưỡng chế bằng phương thức điện tử."},{"k":"p","t":"Cơ quan ban hành quyết định cưỡng chế có trách nhiệm thông báo bằng phương thức điện tử cho các tổ chức tín dụng, chi nhánh ngân hàng nước ngoài về tình hình chấp hành nộp số tiền trên quyết định cưỡng chế, làm cơ sở tiếp tục trích chuyển hoặc dừng việc trích chuyển số tiền theo quyết định cưỡng chế vào ngân sách nhà nước;"},{"k":"p","t":"c) Trường hợp cơ quan quản lý thuế ban hành văn bản gửi tổ chức tín dụng, chi nhánh ngân hàng nước ngoài yêu cầu cung cấp thông tin về số hiệu tài khoản, số dư tại thời điểm cung cấp và các thông tin liên quan khác của người nộp thuế thì tổ chức tín dụng, chi nhánh ngân hàng nước ngoài có trách nhiệm cung cấp trong thời hạn 03 ngày làm việc kể từ ngày nhận được văn bản yêu cầu cung cấp thông tin;"},{"k":"p","t":"d) Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài có trách nhiệm tạm dừng trích tiền từ tài khoản, phong tỏa tài khoản của người nộp thuế bị cưỡng chế khi nhận được văn bản của cơ quan quản lý thuế đối với trường hợp quy định tại khoản 4 Điều 69 Nghị định này."},{"k":"p","t":"6. Thủ tục thu tiền bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản:"},{"k":"p","t":"Việc trích tiền từ tài khoản, phong tỏa tài khoản của người nộp thuế bị cưỡng chế thi hành quyết định hành chính về quản lý thuế được thực hiện trên cơ sở các chứng từ thu theo quy định. Chứng từ thu sử dụng để trích chuyển tiền từ tài khoản được gửi cho các bên liên quan."}]},{"id":"nd252_67","no":67,"code":"Điều 67","title":"Điều 67. Cưỡng chế bằng biện pháp khấu trừ một phần tiền lương hoặc thu nhập","shortTitle":"Cưỡng chế bằng biện pháp khấu trừ một phần tiền lương hoặc thu nhập","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp khấu trừ một phần tiền lương hoặc thu nhập được áp dụng đối với người nộp thuế là cá nhân khi đáp ứng đủ các điều kiện sau:"},{"k":"p","t":"a) Quá 30 ngày kể từ ngày ban hành quyết định cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản mà cơ quan quản lý thuế không thu được hoặc không thu đủ tiền thuế nợ hoặc không đủ thông tin, điều kiện để thực hiện cưỡng chế bằng biện pháp trích tiền từ tài khoản, phong tỏa tài khoản;"},{"k":"p","t":"b) Cá nhân bị cưỡng chế thi hành quyết định hành chính về quản lý thuế đang được hưởng tiền lương hoặc thu nhập tại một cơ quan, tổ chức theo biên chế hoặc hợp đồng lao động có thời hạn từ 03 tháng trở lên."},{"k":"p","t":"2. Xác minh thông tin về tiền lương và thu nhập:"},{"k":"p","t":"a) Cơ quan quản lý thuế tổ chức xác minh thông tin về các khoản tiền lương hoặc thu nhập của cá nhân bị cưỡng chế và cơ quan, tổ chức quản lý tiền lương hoặc thu nhập của người nộp thuế bị cưỡng chế theo cơ sở dữ liệu của cơ quan quản lý thuế, dữ liệu do cơ quan bảo hiểm cung cấp. Trường hợp cơ sở dữ liệu tại cơ quan quản lý thuế không đầy đủ thì người có thẩm quyền ban hành quyết định cưỡng chế gửi văn bản yêu cầu cá nhân bị cưỡng chế và cơ quan, tổ chức quản lý tiền lương hoặc thu nhập của cá nhân bị cưỡng chế cung cấp đầy đủ các thông tin về các khoản tiền lương hoặc thu nhập của cá nhân bị cưỡng chế;"},{"k":"p","t":"b) Cá nhân bị cưỡng chế, cơ quan, tổ chức quản lý tiền lương hoặc thu nhập và các cơ quan, tổ chức liên quan phải cung cấp các thông tin về tiền lương và thu nhập của cá nhân bị cưỡng chế cho cơ quan quản lý thuế trong thời hạn 03 ngày làm việc, kể từ ngày nhận được yêu cầu và chịu trách nhiệm trước pháp luật về các thông tin đã cung cấp;"},{"k":"p","t":"c) Trường hợp sau 03 ngày làm việc, cá nhân bị cưỡng chế, cơ quan, tổ chức quản lý tiền lương hoặc thu nhập và các cơ quan, tổ chức liên quan không cung cấp hoặc cung cấp thông tin không đầy đủ về tiền lương và thu nhập của cá nhân bị cưỡng chế thì cơ quan quản lý thuế căn cứ vào tình hình thực tế để áp dụng biện pháp cưỡng chế phù hợp theo quy định."},{"k":"p","t":"3. Quyết định cưỡng chế khấu trừ một phần tiền lương hoặc thu nhập:"},{"k":"p","t":"a) Quyết định cưỡng chế được ban hành khi đủ điều kiện theo quy định tại khoản 1 Điều này;"},{"k":"p","t":"b) Quyết định cưỡng chế được gửi cho cá nhân bị cưỡng chế, cơ quan, tổ chức quản lý tiền lương hoặc thu nhập của cá nhân bị cưỡng chế, các cơ quan, tổ chức có liên quan ngay trong ngày ban hành quyết định cưỡng chế."},{"k":"p","t":"4. Tỷ lệ khấu trừ:"},{"k":"p","t":"a) Chỉ khấu trừ một phần tiền lương hoặc một phần thu nhập tương ứng với số tiền đã ghi trong quyết định cưỡng chế;"},{"k":"p","t":"b) Tỷ lệ khấu trừ tiền lương hoặc thu nhập đối với cá nhân không thấp hơn 10% và không quá 30% tổng số tiền lương hằng tháng; đối với những khoản thu nhập khác thì tỷ lệ khấu trừ căn cứ vào thu nhập thực tế, nhưng không quá 50% tổng số thu nhập."},{"k":"p","t":"5. Trách nhiệm của cơ quan, tổ chức, người sử dụng lao động đang quản lý tiền lương hoặc thu nhập của cá nhân bị cưỡng chế:"},{"k":"p","t":"a) Khấu trừ một phần tiền lương hoặc thu nhập của người nộp thuế bị cưỡng chế và chuyển số tiền đã khấu trừ vào ngân sách nhà nước tại Kho bạc Nhà nước theo nội dung ghi trong quyết định cưỡng chế kể từ kỳ trả tiền lương hoặc thu nhập gần nhất cho đến khi khấu trừ đủ số tiền thuế nợ theo quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế, đồng thời thông báo cho người ra quyết định cưỡng chế và người nộp thuế bị cưỡng chế biết;"},{"k":"p","t":"b) Trường hợp chưa khấu trừ đủ số tiền thuế nợ theo quyết định cưỡng chế mà hợp đồng lao động của người nộp thuế bị cưỡng chế chấm dứt thì cơ quan, tổ chức sử dụng lao động phải thông báo cho người ra quyết định cưỡng chế biết trong thời hạn 05 ngày làm việc kể từ ngày chấm dứt hợp đồng lao động;"},{"k":"p","t":"c) Cơ quan, tổ chức sử dụng lao động đang quản lý tiền lương hoặc thu nhập của người nộp thuế bị cưỡng chế cố tình không thực hiện quyết định cưỡng chế thì bị xử phạt vi phạm hành chính về quản lý thuế theo quy định."}]},{"id":"nd252_68","no":68,"code":"Điều 68","title":"Điều 68. Cưỡng chế bằng biện pháp dùng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu","shortTitle":"Cưỡng chế bằng biện pháp dùng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu","chuong":"Chương VI — CƯỠNG CHẾ THI HÀNH QUYẾT ĐỊNH HÀNH CHÍNH VỀ QUẢN LÝ THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Biện pháp cưỡng chế dừng làm thủ tục hải quan được áp dụng đối với người nộp thuế có tiền thuế nợ, cơ quan quản lý thuế đã áp dụng biện pháp cưỡng chế quy định tại Điều 66 hoặc Điều 67 Nghị định này mà không thu được hoặc không thu đủ tiền thuế nợ thì cơ quan hải quan áp dụng biện pháp cưỡng chế dừng làm thủ tục hải quan đối với hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"2. Trường hợp cơ quan hải quan thực hiện ấn định thuế sau thông quan đối với hàng hóa xuất khẩu, nhập khẩu, nếu quá 90 ngày kể từ ngày hết thời hạn chấp hành quyết định ấn định thuế mà người nộp thuế hoặc người bảo lãnh không tự nguyện chấp hành quyết định ấn định thuế thì cơ quan hả
