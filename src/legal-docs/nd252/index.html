, cá nhân kinh doanh trên nền tảng thực hiện theo Điều 13 Nghị định 68/2026/NĐ-CP."]},"nd252_47":{"tldr":"Quy định các nội dung hợp tác, hỗ trợ hành chính thuế với cơ quan thuế nước ngoài và tổ chức quốc tế: hỗ trợ thu hồi nợ thuế xuyên biên giới và phối hợp kiểm tra thuế đồng thời theo hiệp định đa phương.","points":["Hỗ trợ thu thuế hai chiều: Việt Nam đề nghị nước ngoài hỗ trợ thu nợ thuế của NNT đã rời khỏi Việt Nam; Việt Nam hỗ trợ thu hộ theo đề nghị của nước ngoài bằng biện pháp đôn đốc phù hợp thực tiễn quản lý thuế trong nước.","Kiểm tra thuế đồng thời theo Hiệp định đa phương: Việt Nam có thể đề nghị hoặc chấp thuận đề nghị phối hợp kiểm tra cùng thời điểm với các vấn đề thuế liên quan đến nhiều NNT có lợi ích chung."]},"nd252_48":{"tldr":"Quy định chi tiết chế độ ưu tiên cho người nộp thuế tuân thủ tốt, rủi ro thấp: các hình thức ưu tiên (thủ tục tự động, rút ngắn thời gian, giảm kiểm tra, hỗ trợ, ưu tiên giao dịch liên kết), điều kiện áp dụng, thẩm quyền công nhận/thu hồi, và chế độ doanh nghiệp ưu tiên hải quan (AEO).","points":["Các hình thức ưu tiên: tự động hóa thủ tục (điền trước hồ sơ, chấp thuận tự động); rút ngắn thời gian giải quyết hồ sơ (hoàn thuế trước kiểm tra sau, hoàn/miễn/giảm tự động); giảm kiểm tra tại trụ sở, giám sát từ xa; hỗ trợ trực tuyến, cảnh báo rủi ro; ưu tiên xếp hạng tuân thủ; và ưu tiên riêng cho giao dịch liên kết (APA, MAP, trao đổi thông tin).","Điều kiện áp dụng: xếp hạng tuân thủ tốt, rủi ro thấp tối thiểu 2 năm liên tục; kết nối chia sẻ dữ liệu điện tử đầy đủ, đúng chuẩn; lưu trữ, truyền dữ liệu sổ kế toán/hóa đơn điện tử; có hệ thống kiểm soát nội bộ, quản trị rủi ro thuế; lập báo cáo tài chính theo chuẩn mực Việt Nam; NNT có giao dịch liên kết còn phải đáp ứng thêm điều kiện về hồ sơ xác định giá và minh bạch thông tin.","Thẩm quyền: việc công nhận/gia hạn/tạm dừng/thu hồi/cấp lại được tự động hóa trên hệ thống công nghệ thông tin ngành thuế, do Thủ trưởng cơ quan thuế quyết định dựa trên kết quả đánh giá tuân thủ/rủi ro; đánh giá lại định kỳ hằng năm; tạm dừng/thu hồi khi có dấu hiệu vi phạm hoặc không còn đáp ứng điều kiện.","Doanh nghiệp ưu tiên hải quan (AEO): được hoàn thuế trước kiểm tra sau, nộp thuế gộp theo tháng (chậm nhất ngày 10 tháng sau) và các ưu tiên khác theo pháp luật hải quan; Bộ trưởng Bộ Tài chính có thể ký thỏa thuận công nhận lẫn nhau về AEO với nước ngoài."]},"nd252_49":{"tldr":"Đặt nguyên tắc chung cho việc ứng dụng công nghệ, dữ liệu và chuyển đổi số trong quản lý thuế: hiện đại hóa, tự động hóa, lấy người dùng làm trung tâm, minh bạch và bảo mật dữ liệu.","points":["Nguyên tắc: ứng dụng công nghệ số hiện đại, tự động hóa nghiệp vụ, xây dựng cơ sở dữ liệu lớn kết nối với các cơ quan liên quan, bảo đảm an ninh mạng và quyền riêng tư; chuyển đổi số lấy người dùng làm trung tâm, minh bạch và có trách nhiệm giải trình.","Nội dung: khai thác dữ liệu để quản lý đối tượng chịu thuế, đánh giá rủi ro, hợp tác quốc tế; chuyển đổi số toàn diện cho phép tự động xác định nghĩa vụ thuế và ban hành quyết định hành chính dựa trên dữ liệu; khuyến khích tổ chức, cá nhân tham gia phát triển giải pháp công nghệ phục vụ quản lý thuế."]},"nd252_50":{"tldr":"Quy định các nguyên tắc giao dịch điện tử giữa người nộp thuế và cơ quan thuế: giá trị pháp lý ngang hồ sơ giấy, kênh giao dịch được công nhận, và ngoại lệ cho người có hoàn cảnh đặc biệt được dùng cơ chế một cửa truyền thống.","points":["Người có hoàn cảnh đặc biệt (cao tuổi, khuyết tật, bảo trợ xã hội, vùng khó khăn...) không bắt buộc giao dịch điện tử, được dùng cơ chế một cửa/một cửa liên thông và Cổng Dịch vụ công Quốc gia.","Hồ sơ, chứng từ điện tử có giá trị pháp lý như bản giấy nếu bảo đảm tính toàn vẹn, truy cập được và có chữ ký điện tử/chữ ký số hợp pháp khi pháp luật yêu cầu ký; người nộp thuế dùng danh tính điện tử để giao dịch.","Giao dịch thực hiện qua Cổng Dịch vụ công Quốc gia, Hệ thống thông tin quản lý thuế, hệ thống T-VAN hoặc các tổ chức trung gian thanh toán kết nối với hệ thống thuế; tổ chức T-VAN phải đáp ứng yêu cầu về năng lực, hạ tầng kỹ thuật theo hướng dẫn Bộ Tài chính."]},"nd252_51":{"tldr":"Xác định phạm vi cơ sở dữ liệu quản lý thuế (dữ liệu do NNT kê khai, dữ liệu nghiệp vụ, dữ liệu từ cơ quan nhà nước/nước ngoài/thương mại) và yêu cầu sao lưu, bảo vệ, phục hồi dữ liệu an toàn.","points":["Cơ sở dữ liệu gồm nhiều nguồn: NNT kê khai, nghiệp vụ nội bộ cơ quan thuế, cơ quan nhà nước/nước ngoài cung cấp, cơ sở dữ liệu quốc gia/chuyên ngành/thương mại kết nối, và hợp tác quốc tế về thuế.","Phải sao lưu thường xuyên, lưu trữ an toàn tại cơ quan thuế và hệ thống dự phòng, kiểm tra định kỳ khả năng phục hồi; khi thiết bị lưu trữ hỏng cần sửa chữa phải có giám sát chuyên môn và giữ lại thiết bị cũ để quản lý.","Các bộ, ngành, địa phương có trách nhiệm xây dựng hệ thống công nghệ thông tin đáp ứng kết nối, chia sẻ dữ liệu quốc gia theo Nghị định 278/2025/NĐ-CP và tiêu chuẩn kỹ thuật của Bộ Tài chính."]},"nd252_52":{"tldr":"Quy định các tiêu chí, nội dung xây dựng, vận hành Hệ thống thông tin quản lý thuế và nguyên tắc xác định trách nhiệm khi hệ thống xử lý hồ sơ tự động (công chức không chịu trách nhiệm về dữ liệu do bên khác cung cấp nếu đã tuân thủ đúng quy trình).","points":["Hệ thống phải ổn định, an toàn, có khả năng mở rộng và kết nối liên thông, tuân thủ khung kiến trúc số và chuẩn kỹ thuật của Bộ Tài chính.","Nội dung xây dựng: chiến lược, kiến trúc tổng thể, thiết kế/phát triển/nâng cấp, quản lý dữ liệu, hạ tầng số; nội dung vận hành: giám sát, sao lưu/phục hồi, bảo trì, an ninh mạng, khai thác dữ liệu.","Nguyên tắc trách nhiệm: xử lý hồ sơ dựa trên dữ liệu đã kiểm soát tại thời điểm giải quyết, mọi thao tác được lưu vết để truy xuất; cơ quan/tổ chức cung cấp dữ liệu chịu trách nhiệm về tính chính xác của dữ liệu mình cung cấp, công chức thuế thực hiện đúng thẩm quyền, trình tự thì không chịu trách nhiệm về nội dung dữ liệu do bên khác cung cấp."]},"nd252_53":{"tldr":"Quy định yêu cầu về chất lượng dữ liệu khi thu thập, cập nhật vào Hệ thống thông tin quản lý thuế: phải làm sạch, có nguồn xác thực hợp pháp, đầy đủ và được lưu vết lịch sử thay đổi.","points":["Dữ liệu phải được làm sạch, có nguồn hợp pháp phản ánh đúng hiện trạng pháp lý, đầy đủ trường thông tin và cập nhật thường xuyên.","Nếu thông tin từ nhiều nguồn không thống nhất, cơ quan/tổ chức cung cấp phải phối hợp với cơ quan thuế kiểm tra, xác minh và chịu trách nhiệm về nội dung.","Mọi lần cập nhật, thay đổi phải được lưu trữ đầy đủ, ghi nhận người/tổ chức thực hiện và lưu vết truy cập để bảo đảm truy xuất lịch sử."]},"nd252_54":{"tldr":"Quy định trách nhiệm quản lý rủi ro công nghệ của cơ quan thuế và các cơ quan liên quan, cùng cách xử lý khi Hệ thống thông tin quản lý thuế gặp sự cố kỹ thuật ảnh hưởng đến việc thực hiện nghĩa vụ thuế đúng hạn của người nộp thuế.","points":["Cơ quan thuế phải thiết lập cơ chế quản lý rủi ro công nghệ (nhận diện, đánh giá, xử lý), kiểm tra an toàn hệ thống tối thiểu 1 lần/năm, có phương án dự phòng và diễn tập định kỳ.","Khi hệ thống thuế gặp sự cố khiến NNT không nộp hồ sơ đúng hạn: cơ quan thuế phải xác nhận và thông báo công khai thời điểm sự cố/khôi phục; NNT được chọn nộp điện tử sau khi hệ thống phục hồi hoặc nộp trực tiếp/qua bưu chính.","Hệ thống của ngân hàng, cơ quan nhà nước khác gặp sự cố cũng phải thông báo công khai và báo ngay cho cơ quan thuế trong ngày để phối hợp; nếu hệ thống tự động ban hành quyết định sai do lỗi kỹ thuật, cơ quan thuế phải thu hồi/điều chỉnh, NNT lợi dụng sự cố để trục lợi phải bồi thường."]},"nd252_55":{"tldr":"Đặt nguyên tắc kết nối, chia sẻ dữ liệu giữa Hệ thống thông tin quản lý thuế với các cơ quan, tổ chức khác: đúng mục đích, đúng thẩm quyền, bảo mật, và các trường hợp Bộ Tài chính được từ chối hoặc tạm ngừng kết nối.","points":["Kết nối phải kịp thời, đầy đủ, đúng mục đích quản lý thuế (xác định NNT, nghĩa vụ thuế, quản lý rủi ro, chống thất thu), tuân thủ Luật Quản lý thuế, Luật Dữ liệu và pháp luật bảo vệ dữ liệu cá nhân; nguyên tắc chia sẻ một lần dùng nhiều lần, ưu tiên khai thác dữ liệu quốc gia/chuyên ngành sẵn có.","Phải qua nền tảng tích hợp chia sẻ dữ liệu ngành tài chính/quốc gia, đáp ứng tiêu chuẩn kỹ thuật và an toàn thông tin tối thiểu cấp độ 3.","Bộ Tài chính từ chối/tạm ngừng kết nối khi: hệ thống đối tác không đạt chuẩn kỹ thuật; có truy cập trái phép hoặc làm thay đổi/xóa/phát tán dữ liệu; vi phạm bảo mật/bảo vệ dữ liệu cá nhân; hoặc gây quá tải hệ thống thuế."]},"nd252_56":{"tldr":"Quy định các hình thức kỹ thuật kết nối, chia sẻ dữ liệu (kết nối trực tiếp, đồng bộ dữ liệu, qua cơ sở dữ liệu tổng hợp quốc gia, hoặc đóng gói lưu trữ) và thời hạn cung cấp thông tin theo định kỳ hoặc thỏa thuận.","points":["4 phương thức kết nối: truy vấn qua nền tảng chia sẻ điều phối dữ liệu; đồng bộ dữ liệu trực tiếp sang hệ thống bên sử dụng; đồng bộ lên cơ sở dữ liệu tổng hợp quốc gia để điều phối; hoặc chia sẻ dữ liệu đóng gói trên phương tiện lưu trữ.","Thời hạn cung cấp thông tin thực hiện định kỳ theo thỏa thuận hợp tác kết nối hoặc theo yêu cầu của cơ quan thuế."]},"nd252_57":{"tldr":"Xác định nhiệm vụ chung của cơ quan quản lý thuế và công chức quản lý thuế: thực hiện đúng thẩm quyền theo Luật Quản lý thuế, hạch toán kế toán các khoản thu, hướng dẫn chính sách thống nhất và tuân thủ đạo đức công vụ.","points":["Cơ quan quản lý thuế thực hiện nhiệm vụ theo Luật Quản lý thuế và Nghị định này; cơ quan quản lý khoản thu/địa bàn nhận phân bổ thực hiện theo hướng dẫn riêng của Bộ Tài chính.","Công chức quản lý thuế: thực hiện hạch toán kế toán tiền thuế/khoản thu/tiền phạt; hướng dẫn chính sách thuế đúng, thống nhất, không đặt thêm thủ tục ngoài quy định; bảo mật thông tin NNT; tuân thủ đạo đức công vụ, không gây phiền hà, sách nhiễu hay can thiệp trái pháp luật vào nghĩa vụ thuế."]},"nd252_58":{"tldr":"Quy định trách nhiệm cung cấp, chia sẻ thông tin phục vụ quản lý thuế của Bộ Tài chính và các bộ, ngành khác (Xây dựng, Nông nghiệp-Môi trường, Công an, Công Thương, Ngân hàng Nhà nước, Nội vụ, Y tế, Khoa học Công nghệ, Tư pháp, thanh tra, kiểm toán, tòa án...), cùng hình thức và tần suất chia sẻ dữ liệu.","points":["Bộ Tài chính hướng dẫn áp dụng Hiệp định tránh đánh thuế hai lần, thỏa thuận song phương, APA và ban hành mẫu văn bản thủ tục hành chính thuế.","Mỗi bộ/ngành cung cấp dữ liệu thuộc phạm vi quản lý của mình cho cơ quan thuế: ví dụ Bộ Công an cung cấp dữ liệu định danh/cư trú/xuất nhập cảnh; Ngân hàng Nhà nước cung cấp thông tin cấp phép tổ chức tín dụng và phối hợp giám sát giao dịch xuyên biên giới; Bộ Công Thương cung cấp dữ liệu TMĐT và chống buôn lậu; tòa án cung cấp bản án phá sản/chấm dứt dự án đầu tư.","Hình thức chia sẻ ưu tiên kết nối tự động, trao đổi định kỳ/thời gian thực qua nền tảng tích hợp quốc gia; nếu chưa kết nối điện tử thì cung cấp bằng văn bản trong 10 ngày làm việc kể từ khi nhận yêu cầu.","Cơ quan thuế có quyền yêu cầu, khai thác dữ liệu quốc gia/chuyên ngành để quản lý thuế và có trách nhiệm chia sẻ ngược lại theo nguyên tắc tự động, trừ trường hợp pháp luật hạn chế; cơ quan cung cấp dữ liệu chịu trách nhiệm về tính chính xác của dữ liệu mình cung cấp."]},"nd252_59":{"tldr":"Quy định thẩm quyền, trình tự xây dựng kế hoạch và nội dung kiểm tra, giám sát việc thực hiện pháp luật thuế, phí, lệ phí của các cơ quan nhà nước (tránh chồng chéo với thanh tra), áp dụng riêng cho cơ quan quản lý thuế và tổ chức thu phí, lệ phí.","points":["Kế hoạch kiểm tra, giám sát hằng năm do đơn vị có chức năng xây dựng, trình cấp có thẩm quyền (Bộ trưởng, Chủ tịch UBND các cấp) ban hành; không được trùng lặp với kế hoạch thanh tra/kiểm tra khác cùng nội dung, cùng đối tượng trong năm — nếu cần thiết thì phối hợp lồng ghép vào cùng một đoàn.","Với cơ quan quản lý thuế: áp dụng trình tự theo Nghị định 217/2025/NĐ-CP, nội dung xoay quanh việc tổ chức triển khai, tuyên truyền, hướng dẫn pháp luật thuế; phát hiện bất cập thì yêu cầu chấn chỉnh hoặc kiến nghị hoàn thiện pháp luật, chuyển hồ sơ nếu có dấu hiệu vi phạm vượt thẩm quyền.","Với tổ chức thu phí, lệ phí: kiểm tra việc tổ chức thu, mức thu, miễn giảm, quản lý sử dụng và công khai phí/lệ phí, kể cả việc tự đặt thêm khoản thu trái quy định; xử lý theo pháp luật kiểm tra chuyên ngành."]},"nd252_60":{"tldr":"Quy định trách nhiệm cung cấp thông tin cho cơ quan thuế của các tổ chức, cá nhân liên quan đến chi trả thu nhập, khấu trừ/nộp thay thuế, đối tác kinh doanh, dịch vụ thanh toán quốc tế và đặc biệt là chủ nền tảng TMĐT/logistic/viễn thông (thông tin định danh người bán, doanh thu, tài khoản thanh toán).","points":["Tổ chức/cá nhân chi trả thu nhập, khấu trừ/khai/nộp thay thuế phải cung cấp thông tin chi tiết kèm chứng từ nộp thuế đúng thời hạn nộp thuế; đại lý thuế, dịch vụ kế toán, ủy thác XNK, kiểm toán độc lập cung cấp thông tin hợp đồng/thỏa thuận khi có yêu cầu văn bản.","Chủ nền tảng TMĐT, dịch vụ tài sản số, logistics, thẻ quốc tế, thanh toán trung gian, viễn thông phải cung cấp: thông tin định danh người bán (MST, số định danh, hộ chiếu, SĐT); thông tin doanh thu/tài khoản thanh toán/phí sàn; và thông tin hàng hóa dịch vụ khác — trừ khi chủ nền tảng đã tự khấu trừ nộp thay theo quy định thì không phải cung cấp lại thông tin của người bán đó.","Thời hạn cung cấp theo yêu cầu văn bản: chậm nhất 10 ngày làm việc; tổ chức/cá nhân không cung cấp, cung cấp sai/chậm/thiếu gây ảnh hưởng đến việc xác định nghĩa vụ thuế hoặc hoàn/miễn/giảm thuế của NNT phải chịu trách nhiệm và bồi thường thiệt hại nếu có."]},"nd252_61":{"tldr":"Quy định trách nhiệm của tổ chức tín dụng, ngân hàng, trung gian thanh toán trong việc thu, chuyển tiền thuế vào ngân sách đúng hạn (chịu lãi nếu chậm chuyển do lỗi của mình), cung cấp thông tin tài khoản NNT, thực hiện cưỡng chế trích tiền/phong tỏa tài khoản, và trách nhiệm của bên bảo lãnh thuế.","points":["Phải lập/hướng dẫn NNT lập chứng từ nộp ngân sách chính xác và chuyển đủ tiền vào tài khoản Kho bạc trong ngày giao dịch (chậm nhất trước 10h ngày kế tiếp); nếu chậm/thiếu/không hạch toán kịp do lỗi của tổ chức thì phải trả lãi tương ứng và chịu tính tiền chậm nộp.","Tổ chức có kết nối trực tiếp với Hệ thống thông tin quản lý thuế còn phải truyền đầy đủ thông tin chứng từ nộp ngân sách theo thời gian thực, không được hủy lệnh chuyển tiền/hoàn trả tiền đã nộp sau khi hệ thống thuế đã xử lý bù trừ.","Phải cung cấp thông tin tài khoản thanh toán của NNT (chủ tài khoản, số hiệu, nơi mở, ngày mở/đóng, giao dịch, số dư...) theo yêu cầu; thông tin tài khoản định kỳ hàng tháng chậm nhất ngày 10 tháng sau; phối hợp phát hiện giao dịch bất thường.","Tiếp nhận và thực hiện quyết định cưỡng chế trích tiền/phong tỏa tài khoản NNT bị cưỡng chế; nếu NNT được bảo lãnh nộp thuế mà không nộp đúng hạn thì bên bảo lãnh/tổ chức tín dụng phải nộp thay trong phạm vi bảo lãnh, quá 90 ngày thì bị cưỡng chế."]},"nd252_62":{"tldr":"Quy định trách nhiệm của cơ quan thông tin, báo chí cung cấp cho cơ quan thuế thông tin về hoạt động kinh doanh, dấu hiệu vi phạm pháp luật thuế phản ánh trên truyền thông, với thời hạn cung cấp 5-10 ngày làm việc (hoặc ngay trong ngày với dấu hiệu vi phạm).","points":["Cung cấp thông tin về sản xuất kinh doanh, quảng cáo, giá bán, thị trường liên quan nghĩa vụ thuế; dấu hiệu vi phạm pháp luật thuế; rủi ro quản lý thuế phát hiện qua báo chí/dư luận.","Thời hạn: 5 ngày làm việc thông thường, 10 ngày nếu phức tạp (phải nêu rõ lý do); riêng dấu hiệu vi phạm phải cung cấp ngay trong ngày hoặc chậm nhất ngày làm việc tiếp theo."]},"nd252_63":{"tldr":"Quy định việc trao đổi, xác minh thông tin thuế theo điều ước/thỏa thuận quốc tế và tiêu chuẩn Diễn đàn toàn cầu về minh bạch thuế: nghĩa vụ khai báo chủ sở hữu hưởng lợi của doanh nghiệp nước ngoài, không được viện bí mật ngân hàng để từ chối cung cấp, và cơ chế bảo mật thông tin trao đổi.","points":["3 hình thức trao đổi: theo yêu cầu (chủ sở hữu pháp lý/hưởng lợi, thông tin ngân hàng, kế toán...); tự động (báo cáo lợi nhuận liên quốc gia, tài khoản tài chính không cư trú, tài sản mã hóa); và tự nguyện theo điều ước/thỏa thuận quốc tế.","Không được từ chối cung cấp thông tin hợp pháp với lý do bí mật ngân hàng hoặc do bên thứ ba nắm giữ, trừ khi điều ước quốc tế có quy định khác.","Chi nhánh, văn phòng đại diện công ty nước ngoài tại Việt Nam phải kê khai, cập nhật thông tin chủ sở hữu pháp lý/hưởng lợi của công ty mẹ khi đăng ký thuế lần đầu và khi thay đổi; lưu trữ hồ sơ tối thiểu 5 năm kể cả sau khi chấm dứt hoạt động.","Cơ quan thuế xác minh thông tin bằng đối chiếu dữ liệu hoặc xác minh tại trụ sở NNT; nếu không thu thập được đầy đủ, áp dụng biện pháp đôn đốc, cảnh báo, xử phạt vi phạm hành chính, rồi cưỡng chế nếu vẫn không cung cấp.","Thông tin trao đổi quốc tế phải được bảo mật nghiêm ngặt, chỉ dùng cho mục đích quản lý thuế; làm lộ/lọt/sử dụng trái phép bị xử lý kỷ luật, xử phạt hành chính hoặc truy cứu trách nhiệm hình sự."]},"nd252_64":{"tldr":"Quy định tiêu chuẩn kinh doanh dịch vụ làm thủ tục về thuế (đại lý thuế là doanh nghiệp có tối thiểu 2 người đủ chuẩn; hộ/cá nhân cũng có thể cung cấp dịch vụ nếu đạt chuẩn) và tiêu chuẩn chuyên môn, đạo đức của người trực tiếp hành nghề.","points":["Đại lý thuế phải là doanh nghiệp hợp pháp có ít nhất 2 người đạt chuẩn làm việc toàn thời gian; hộ kinh doanh/cá nhân đạt chuẩn cũng được cung cấp dịch vụ mà không cần đăng ký với cơ quan thuế.","Người hành nghề phải là người Việt Nam hoặc người nước ngoài cư trú ≥12 tháng, có đủ năng lực hành vi dân sự, có chứng chỉ nghiệp vụ thuế và cập nhật kiến thức thường xuyên; không được thông đồng với công chức thuế/NNT vi phạm pháp luật (nếu vi phạm phải bồi thường theo hợp đồng) và phải giữ bí mật thông tin khách hàng."]},"nd252_65":{"tldr":"Quy định các trường hợp bị cưỡng chế và các trường hợp chưa/không bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, thẩm quyền ban hành quyết định cưỡng chế và trách nhiệm của cơ quan quản lý khoản thu khác thuộc ngân sách.","points":["Áp dụng cưỡng chế khi NNT có tiền thuế nợ quá 90 ngày, quá thời hạn gia hạn, chây ỳ, không chấp hành, hoặc có dấu hiệu phát tán tài sản/bỏ trốn.","Chưa/không cưỡng chế với: NNT được gia hạn/nộp dần theo cam kết đúng hạn; nợ thuế dưới ngưỡng tối thiểu 3 triệu đồng (tổ chức) hoặc 1 triệu đồng (cá nhân, hộ) quá 90 ngày; hoặc các trường hợp bất khả kháng.","Thẩm quyền quyết định cưỡng chế thực hiện theo khoản 1, 2 Điều 50 Luật Quản lý thuế, được giao quyền cho cấp phó theo pháp luật xử lý vi phạm hành chính.","Với khoản thu khác thuộc ngân sách do cơ quan/tổ chức khác quản lý thu, cơ quan đó xác định số nợ, đôn đốc và kiến nghị cơ quan có thẩm quyền cưỡng chế; cơ quan có thẩm quyền phải trả lời bằng văn bản nếu không áp dụng."]},"nd252_66":{"tldr":"Quy định biện pháp cưỡng chế trích tiền từ tài khoản, phong tỏa tài khoản của NNT bị cưỡng chế tại tổ chức tín dụng: căn cứ ban hành, thời điểm ra quyết định, các loại tài khoản được loại trừ, và trách nhiệm của tổ chức tín dụng trong việc phong tỏa/trích chuyển tiền.","points":["Áp dụng với NNT thuộc các trường hợp bị cưỡng chế theo Điều 48 Luật Quản lý thuế và tổ chức bảo lãnh quá 90 ngày chưa nộp thay; loại trừ các tài khoản ODA, bảo trì chung cư, tài sản bảo đảm nợ xấu, quỹ bình ổn giá xăng dầu.","Quyết định cưỡng chế ban hành sau 90 ngày quá hạn nộp thuế/hết hạn gia hạn/không chấp hành xử phạt, hoặc khi phát hiện NNT tẩu tán tài sản; gửi ngay trong ngày cho NNT và tổ chức tín dụng liên quan.","Tổ chức tín dụng phải phong tỏa ngay số tiền theo quyết định, trích chuyển vào ngân sách trong ngày hoặc ngày làm việc kế tiếp, tiếp tục theo dõi và trích số dư phát sinh mới cho đến khi thu đủ; phải cung cấp thông tin tài khoản trong 3 ngày làm việc khi có yêu cầu."]},"nd252_67":{"tldr":"Quy định biện pháp cưỡng chế khấu trừ một phần tiền lương/thu nhập áp dụng cho cá nhân, kèm điều kiện áp dụng, quy trình xác minh thu nhập, và tỷ lệ khấu trừ tối đa.","points":["Áp dụng khi quá 30 ngày kể từ quyết định cưỡng chế tài khoản mà không thu đủ/không đủ thông tin, và cá nhân đang có lương/thu nhập ổn định từ hợp đồng lao động ≥3 tháng hoặc biên chế.","Cơ quan thuế xác minh thu nhập qua dữ liệu sẵn có hoặc yêu cầu cá nhân/đơn vị quản lý cung cấp trong 3 ngày làm việc.","Tỷ lệ khấu trừ lương: 10-30% tổng lương hằng tháng; thu nhập khác: tối đa 50%; đơn vị sử dụng lao động phải khấu trừ và nộp thay, báo cáo khi chấm dứt hợp đồng, và bị xử phạt nếu cố tình không thực hiện."]},"nd252_68":{"tldr":"Quy định biện pháp cưỡng chế dừng làm thủ tục hải quan đối với hàng hóa xuất nhập khẩu của NNT nợ thuế, các trường hợp loại trừ (hàng miễn thuế, an ninh quốc phòng, viện trợ nhân đạo), và cơ chế phối hợp khi cơ quan khác đề nghị hải quan cưỡng chế.","points":["Áp dụng khi đã cưỡng chế tài khoản/lương không đủ, hoặc khi ấn định thuế sau thông quan quá 90 ngày không tự nguyện chấp hành.","Không áp dụng với hàng xuất khẩu miễn thuế/0%, hàng phục vụ an ninh quốc phòng, phòng chống thiên tai dịch bệnh, viện trợ nhân đạo.","Quyết định gửi cho NNT và thông báo công khai trên Cổng thông tin hải quan chậm nhất 5 ngày làm việc trước khi áp dụng; cơ quan thuế/cơ quan quản lý khoản thu khác có thể đề nghị hải quan cưỡng chế trong 12 tháng gần nhất, hải quan phản hồi trong 3 ngày làm việc."]},"nd252_69":{"tldr":"Quy định biện pháp cưỡng chế ngừng sử dụng hóa đơn, cơ chế cho phép sử dụng hóa đơn theo từng lần phát sinh nếu nộp trước tối thiểu 18% giá trị hóa đơn, và tạm dừng cưỡng chế tài khoản tương ứng.","points":["Áp dụng khi không đủ điều kiện cưỡng chế tài khoản, cưỡng chế tài khoản không hiệu quả sau 30 ngày, hoặc theo các trường hợp tại khoản 3, 5 Điều 48 Luật Quản lý thuế; áp dụng cho mọi loại hóa đơn điện tử.","Trong thời gian cưỡng chế: không tiếp nhận đăng ký hóa đơn mới, không cấp mã, không cấp hóa đơn cho NNT.","NNT có thể xin dùng hóa đơn theo từng lần phát sinh nếu nộp trước ≥18% giá trị hóa đơn; nếu đăng ký một tài khoản ngân hàng, được tạm dừng cưỡng chế trích tiền/phong tỏa tài khoản 10 ngày làm việc tương ứng giá trị hóa đơn đó."]},"nd252_70":{"tldr":"Quy định biện pháp cưỡng chế thu tiền/tài sản của NNT do bên thứ ba (có khoản nợ hoặc đang giữ hộ) nắm giữ: xác minh thông tin, quy trình nộp thay, và trách nhiệm bên thứ ba khi không hợp tác.","points":["Áp dụng khi có căn cứ xác định bên thứ ba đang nợ hoặc đang giữ tiền/tài sản của NNT bị cưỡng chế (kể cả ủy quyền giữ hộ).","Bên thứ ba phải nộp thay trong 15 ngày (nếu đang giữ tiền) hoặc ngay khi khoản nợ đến hạn (nếu đang nợ); không được chuyển trả tiền/tài sản cho NNT kể từ khi nhận yêu cầu xác minh cho đến khi hoàn tất nộp/giao tài sản.","Nếu bên thứ ba đang giữ tài sản (không phải tiền) thì áp dụng biện pháp kê biên, bán đấu giá theo Điều 71; không hợp tác thì xử lý theo khoản 4 Điều 46 Luật Quản lý thuế."]},"nd252_71":{"tldr":"Quy định biện pháp cưỡng chế kê biên tài sản, bán đấu giá tài sản kê biên: đối tượng loại trừ, quy trình xác minh và phối hợp với UBND, thẩm quyền ra quyết định, và cách xử lý tiền thu được từ bán đấu giá.","points":["Không kê biên tài sản của người đang chữa bệnh, hoặc các tài sản thiết yếu không được kê biên theo NĐ 296/2025 (thuốc, trường học, thiết bị an toàn lao động, trụ sở, hạ tầng công cộng...).","Cơ quan thuế xác minh tài sản qua văn bản gửi NNT, cơ quan đăng ký sở hữu/giao dịch bảo đảm; lập biên bản xác định tài sản kê biên rồi phối hợp UBND cấp xã/tỉnh (tùy phạm vi địa bàn) ra quyết định kê biên, bán đấu giá.","Tiền thu được ưu tiên: thanh toán chi phí cưỡng chế → nộp tiền thuế nợ → hoàn trả phần còn lại cho NNT; NNT chịu mọi chi phí cưỡng chế theo NĐ 296/2025."]},"nd252_72":{"tldr":"Quy định điều kiện, trình tự cơ quan thuế nộp đơn yêu cầu áp dụng thủ tục phá sản đối với doanh nghiệp/hợp tác xã nợ thuế dai dẳng không thu hồi được bằng các biện pháp cưỡng chế khác.","points":["Áp dụng khi DN/HTX không hoạt động tại địa chỉ đăng ký quá 3 năm và đã áp dụng các biện pháp cưỡng chế (Điều 66, 68, 69, 70, 71) không thu được nợ; hoặc đã cưỡng chế liên tục từ 3 năm trở lên vẫn không thu được.","Thực hiện theo trình tự Luật Phục hồi, phá sản 142/2025/QH15; nếu Tòa án trả lại đơn hoặc không mở thủ tục phá sản thì chuyển sang cưỡng chế theo Điều 73."]},"nd252_73":{"tldr":"Quy định biện pháp cưỡng chế thu hồi các loại giấy chứng nhận đăng ký kinh doanh/hoạt động (kể cả đăng ký hoạt động TMĐT của tổ chức, cá nhân nước ngoài), và thủ tục khôi phục tình trạng pháp lý sau khi chấm dứt cưỡng chế.","points":["Áp dụng với NNT đã bị cưỡng chế liên tục ≥3 năm không thu được nợ, hoặc tổ chức/cá nhân nước ngoài kinh doanh TMĐT tại Việt Nam bị cưỡng chế, hoặc trường hợp tại khoản 3 Điều 72.","Cơ quan thuế xác minh thông tin rồi gửi văn bản đề nghị thu hồi (nêu rõ lý do, thời hạn) đến NNT và cơ quan có thẩm quyền cấp giấy trong 3 ngày làm việc kể từ khi xác minh xong; cơ quan có thẩm quyền thu hồi theo pháp luật liên quan hoặc trả lời lý do không thu hồi.","Khi NNT được chấm dứt cưỡng chế và có văn bản đề nghị, cơ quan thuế lập văn bản đề nghị khôi phục tình trạng pháp lý gửi cơ quan có thẩm quyền trong 3 ngày làm việc."]},"nd252_74":{"tldr":"Quy định hiệu lực thi hành của Nghị định (từ 01/07/2026), thời hạn áp dụng riêng cho một số quy định phân bổ thuế GTGT (đến hết 31/12/2026), và liệt kê các văn bản bị thay thế/tiếp tục hiệu lực.","points":["Nghị định có hiệu lực từ 01/07/2026; riêng một số quy định phân bổ thuế GTGT tại điểm a.2-a.6 khoản 2 Điều 15 áp dụng đến hết 31/12/2026.","Thay thế NĐ 126/2020/NĐ-CP, NĐ 91/2022/NĐ-CP (sửa NĐ 126), NĐ 49/2025/NĐ-CP (ngưỡng tạm hoãn xuất cảnh), và NĐ 117/2025/NĐ-CP (quản lý thuế TMĐT hộ/cá nhân), NĐ 373/2025/NĐ-CP (sửa NĐ 126).","NĐ 125/2020/NĐ-CP (xử phạt vi phạm hành chính về thuế, hóa đơn, đã sửa đổi bởi NĐ 102/2021 và NĐ 310/2025) tiếp tục hiệu lực từ 01/07/2026 cho đến khi có văn bản thay thế."]},"nd252_75":{"tldr":"Quy định điều khoản chuyển tiếp: thẩm quyền ban hành quyết định phục hồi số tiền thuế nợ đã được xóa (theo quyết định của Chủ tịch UBND tỉnh trước ngày Nghị định có hiệu lực) khi NNT phải hoàn trả theo khoản 2 Điều 21 Luật Quản lý thuế.","points":["Thẩm quyền ra quyết định phục hồi nợ đã xóa thuộc về Trưởng Thuế tỉnh/thành phố, Chi cục trưởng Chi cục thuế Doanh nghiệp lớn, Chi cục thuế Thương mại điện tử, Chi cục Hải quan khu vực, Chi cục Điều tra chống buôn lậu và Chi cục kiểm tra sau thông quan, theo phạm vi quản lý tương ứng."]},"nd252_76":{"tldr":"Quy định trách nhiệm thi hành Nghị định thuộc về các Bộ trưởng, Thủ trưởng cơ quan ngang bộ, Chủ tịch UBND cấp tỉnh và các tổ chức, cá nhân có liên quan.","points":[]}}}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPara(t){
  var x=e(t).replace(/\n/g,'<br>');
  // đậm tiền tố "1." / "a)" / "Điều N."
  x=x.replace(/^(\d+\.|[a-zđ]\)|Điều\s+\d+\.)/,'<strong>$1</strong>');
  return x;
}
function renderContent(content,q){
  var h='';
  (content||[]).forEach(function(b){
    if(b.k==='tbl'){
      h+='<table class="ct">';
      (b.rows||[]).forEach(function(r,ri){
        h+='<tr>';
        r.forEach(function(c){var tag=ri===0?'th':'td';h+='<'+tag+'>'+e(c).replace(/\n/g,'<br>')+'</'+tag+'>';});
        h+='</tr>';
      });
      h+='</table>';
    } else {
      h+='<p>'+fmtPara(b.t||'')+'</p>';
    }
  });
  return h;
}
function buildSb(filter){
  filter=(filter||'').toLowerCase().trim();
  var sb=document.getElementById('sb'),h='',lastC='',lastM='';
  (D.outline||[]).forEach(function(a){
    if(filter){
      var hay=((a.title||'')+' '+(a.content||[]).map(function(b){return b.t||''}).join(' ')).toLowerCase();
      if(hay.indexOf(filter)<0)return;
    }
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="ns">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="nm">'+e(lastM)+'</div>';}
    h+='<div class="ni'+(a.id===cur?' on':'')+'" data-id="'+a.id+'" onclick="show(\''+a.id+'\')"><span class="dot"></span><span>'+e(a.code)+(a.shortTitle?'. '+e(a.shortTitle):'')+'</span></div>';
  });
  sb.innerHTML=h||'<div class="hint" style="padding:14px">Không có kết quả.</div>';
}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
/*CD-JS-START*/
function __cdData(){return (typeof window!=='undefined'&&window.__CDD__)?window.__CDD__:((typeof D!=='undefined'&&D.details)||{});}
function applyDetails(id,html){var arr=__cdData()[id];if(!arr||!arr.length)return html;for(var ix=0;ix<arr.length;ix++){var e=arr[ix];if(!e||!e.match)continue;var i=html.indexOf(e.match);if(i<0)continue;var pre='<span class="clause-hl" onclick="openDetail(\''+id+'\','+ix+');return false">';html=html.slice(0,i)+pre+html.slice(i,i+e.match.length)+'<span class="cd-ico">ⓘ</span></span>'+html.slice(i+e.match.length);}return html;}
function openDetail(id,ix){var en=(__cdData()[id]||[])[ix];if(!en)return;document.getElementById('cdTitle').textContent=en.title||'';document.getElementById('cdSummary').innerHTML=en.summary||'';var lh='';(en.links||[]).forEach(function(r){if(r.targetSlug){lh+='<a class="cd-link" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{lh+='<div class="cd-link note">'+e(r.label)+'</div>'}});document.getElementById('cdLinks').innerHTML=lh;document.getElementById('cdBackdrop').classList.add('show');}
function closeDetail(){var b=document.getElementById('cdBackdrop');if(b)b.classList.remove('show');}
if(typeof document!=='undefined')document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeDetail();});
/*CD-JS-END*/
function show(id){
  var a=null,o=D.outline||[];
  for(var i=0;i<o.length;i++){if(o[i].id===id){a=o[i];break;}}
  if(!a)return;
  cur=id;
  tab('main',document.getElementById('tab-main'));
  buildSb(document.getElementById('q').value);
  var bc=[a.chuong,a.muc,a.code].filter(Boolean).map(e).join(' › ');
  var h='<div class="bc">'+bc+'</div><div class="at">'+e(a.title)+'</div>';
  h+='<div class="ac">'+applyDetails(id,autolink(renderContent(a.content,'')))+'</div>';
  h+=renderRefs(id);
  document.getElementById('av').className='';
  document.getElementById('av').innerHTML=h;
  var n=document.querySelector('.ni[data-id="'+id+'"]');if(n)n.scrollIntoView({block:'nearest'});
  if(history.replaceState)history.replaceState(null,'','#'+id);
}
function search(v){buildSb(v);}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='home')buildHome();if(t==='summary')buildSummary();
  if(t==='forms'&&typeof buildForms==='function')buildForms();
}
function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
