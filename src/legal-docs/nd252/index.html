nh doanh, đơn vị phụ thuộc, địa điểm kinh doanh tại đơn vị hành chính cấp tỉnh khác nơi đóng trụ sở chính thì thực hiện kê khai như sau:"},{"k":"p","t":"a) Người nộp thuế thuộc trường hợp phải phân bổ thuế, khoản thu khác phải nộp quy định tại khoản 2 Điều này thì thực hiện khai thuế, khoản thu khác tập trung tại cơ quan thuế quản lý trực tiếp người nộp thuế hoặc khai thuế, khoản thu khác của hoạt động kinh doanh, đơn vị phụ thuộc, địa điểm kinh doanh tại cơ quan thuế quản lý khoản thu nơi phát sinh hoạt động kinh doanh theo hướng dẫn của Bộ trưởng Bộ Tài chính, đồng thời tính và phân bổ nghĩa vụ thuế, khoản thu khác phải nộp cho từng địa phương nơi được hưởng nguồn thu ngân sách nhà nước, trừ trường hợp quy định tại điểm b khoản này;"},{"k":"p","t":"b) Người nộp thuế thuộc trường hợp khai riêng thuế, khoản thu khác của hoạt động kinh doanh, đơn vị phụ thuộc, địa điểm kinh doanh thì thực hiện khai riêng tại cơ quan thuế quản lý khoản thu nơi phát sinh hoạt động kinh doanh theo hướng dẫn của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"2. Các trường hợp phải phân bổ thuế, khoản thu khác phải nộp:"},{"k":"p","t":"a) Người nộp thuế thực hiện phân bổ thuế giá trị gia tăng phải nộp trong các trường hợp sau:"},{"k":"p","t":"a.1) Hoạt động kinh doanh xổ số điện toán;"},{"k":"p","t":"a.2) Hoạt động xây dựng theo quy định của pháp luật về hệ thống ngành kinh tế quốc dân hoặc quy định của pháp luật về xây dựng, có giá trị công trình xây dựng theo hợp đồng bao gồm cả thuế giá trị gia tăng từ 01 tỷ đồng trở lên (trừ hoạt động xây dựng trong khu phi thuế quan, tư vấn, khảo sát, thiết kế, kế toán, bảo hiểm);"},{"k":"p","t":"a.3) Hoạt động chuyển nhượng bất động sản, trừ hoạt động chuyển nhượng bất động sản của dự án đầu tư cơ sở hạ tầng, nhà để chuyển nhượng (bao gồm cả trường hợp có thu tiền ứng trước của khách hàng theo tiến độ);"},{"k":"p","t":"a.4) Đơn vị phụ thuộc, địa điểm kinh doanh là cơ sở sản xuất (bao gồm cả cơ sở gia công, lắp ráp) và cơ sở sản xuất điện mặt trời mái nhà, trừ trường hợp phân bổ của người nộp thuế là doanh nghiệp siêu nhỏ theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa;"},{"k":"p","t":"a.5) Nhà máy thủy điện nằm trên nhiều địa bàn cấp tỉnh;"},{"k":"p","t":"a.6) Hoạt động kinh doanh dịch vụ viễn thông cước trả sau; trường hợp cơ sở kinh doanh kinh doanh dịch vụ viễn thông mua hàng hóa, dịch vụ để đầu tư tập trung cho toàn hệ thống hạ tầng viễn thông thì được lựa chọn phân bổ số thuế giá trị gia tăng đầu vào cho các chi nhánh theo quy định của Bộ trưởng Bộ Tài chính."},{"k":"p","t":"b) Người nộp thuế thực hiện phân bổ thuế thu nhập doanh nghiệp phải nộp trong các trường hợp sau:"},{"k":"p","t":"b.1) Hoạt động kinh doanh xổ số điện toán;"},{"k":"p","t":"b.2) Hoạt động chuyển nhượng bất động sản, trừ trường hợp khai thuế riêng tại nơi có bất động sản theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"b.3) Đơn vị phụ thuộc, địa điểm kinh doanh là cơ sở sản xuất (bao gồm cả cơ sở gia công, lắp ráp và cơ sở sản xuất điện mặt trời mái nhà), trừ đơn vị phụ thuộc, địa điểm kinh doanh có thu nhập được hưởng ưu đãi thuế thu nhập doanh nghiệp và đơn vị phụ thuộc, địa điểm kinh doanh của người nộp thuế là doanh nghiệp siêu nhỏ theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa;"},{"k":"p","t":"b.4) Nhà máy thủy điện nằm trên nhiều địa bàn cấp tỉnh."},{"k":"p","t":"c) Người nộp thuế thực hiện phân bổ thuế tiêu thụ đặc biệt phải nộp đối với hoạt động kinh doanh xổ số điện toán;"},{"k":"p","t":"d) Người nộp thuế thực hiện phân bổ thuế thu nhập cá nhân phải nộp trong các trường hợp sau:"},{"k":"p","t":"d.1) Khấu trừ thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công của tổ chức, cá nhân trả cho người lao động làm việc tại đơn vị phụ thuộc, địa điểm kinh doanh tại địa bàn cấp tỉnh khác nơi tổ chức, cá nhân đóng trụ sở; trừ trường hợp tổ chức, cá nhân trả thu nhập thực hiện khai thuế với cơ quan thuế quản lý trực tiếp đơn vị phụ thuộc, địa điểm kinh doanh theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"d.2) Khấu trừ thuế thu nhập cá nhân đối với thu nhập từ trúng thưởng của cá nhân trúng thưởng xổ số điện toán đối với phương thức phân phối vé xổ số thông qua điện thoại, internet, thiết bị đầu cuối."},{"k":"p","t":"đ) Người nộp thuế thực hiện phân bổ thuế tài nguyên phải nộp đối với hoạt động sản xuất thủy điện có hồ thủy điện nằm trên nhiều địa bàn cấp tỉnh;"},{"k":"p","t":"e) Người nộp thuế thực hiện phân bổ thuế bảo vệ môi trường phải nộp trong các trường hợp sau:"},{"k":"p","t":"e.1) Xăng dầu: đơn vị phụ thuộc của thương nhân đầu mối kinh doanh, thương nhân sản xuất xăng dầu hoặc đơn vị phụ thuộc của công ty con theo quy định tại Luật Doanh nghiệp của thương nhân đầu mối kinh doanh, thương nhân sản xuất xăng dầu, trừ trường hợp đơn vị phụ thuộc của thương nhân đầu mối kinh doanh, thương nhân sản xuất xăng dầu hoặc đơn vị phụ thuộc của công ty con của thương nhân đầu mối kinh doanh, thương nhân sản xuất xăng dầu thực hiện khai thuế, tính thuế với cơ quan thuế quản lý trực tiếp hoặc cơ quan thuế quản lý khoản thu theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"e.2) Than khai thác và tiêu thụ nội địa: công ty con hoặc đơn vị phụ thuộc của doanh nghiệp có hoạt động khai thác và tiêu thụ than nội địa được giao khai thác, chế biến và tiêu thụ than;"},{"k":"p","t":"g) Người nộp thuế thực hiện phân bổ lợi nhuận sau thuế còn lại sau khi trích lập các quỹ đối với hoạt động kinh doanh xổ số điện toán."},{"k":"p","t":"3. Bộ trưởng Bộ Tài chính hướng dẫn phương pháp phân bổ, khai thuế, nộp thuế đối với các trường hợp phân bổ thuế, khoản thu khác quy định tại Điều này."}]},{"id":"nd252_16","no":16,"code":"Điều 16","title":"Điều 16. Các trường hợp cơ quan thuế tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác theo hồ sơ khai thuế, khoản thu khác của người nộp thuế","shortTitle":"Các trường hợp cơ quan thuế tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác theo hồ sơ khai thuế, khoản thu khác của người nộp thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Cơ quan thuế tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác theo hồ sơ khai thuế, khoản thu khác của người nộp thuế trong các trường hợp sau:"},{"k":"p","t":"a) Thuế thu nhập cá nhân từ nhận thừa kế, quà tặng, trừ trường hợp nhận thừa kế, quà tặng là bất động sản tại điểm b khoản này, gồm:"},{"k":"p","t":"a.1) Thuế thu nhập cá nhân từ nhận thừa kế, quà tặng là chứng khoán, phần vốn góp;"},{"k":"p","t":"a.2) Thuế thu nhập cá nhân từ nhận thừa kế, quà tặng là tài sản phải đăng ký quyền sở hữu, quyền sử dụng."},{"k":"p","t":"b) Thuế thu nhập cá nhân từ chuyển nhượng bất động sản hoặc nhận thừa kế, quà tặng là bất động sản trong các trường hợp sau:"},{"k":"p","t":"b.1) Bất động sản là nhà ở, nhà ở thương mại, công trình xây dựng hình thành trong tương lai; công trình xây dựng, nhà ở đã được chủ đầu tư dự án bàn giao đưa vào sử dụng nhưng chưa cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất theo quy định của pháp luật về nhà ở;"},{"k":"p","t":"b.2) Bất động sản được cá nhân ủy quyền mà người nhận ủy quyền có đầy đủ nội dung như quyền sở hữu đối với bất động sản theo quy định của pháp luật thuế thu nhập cá nhân;"},{"k":"p","t":"b.3) Bất động sản tại nước ngoài."},{"k":"p","t":"c) Lệ phí trước bạ (trừ lệ phí trước bạ đối với nhà, đất);"},{"k":"p","t":"d) Thuế sử dụng đất phi nông nghiệp đối với hộ gia đình, cá nhân (trừ trường hợp khai tổng hợp, người nộp thuế phải tự xác định số thuế phải nộp tăng thêm do khai tổng hợp);"},{"k":"p","t":"đ) Thuế sử dụng đất nông nghiệp đối với hộ gia đình, cá nhân;"},{"k":"p","t":"e) Tiền thuê đất áp dụng đối với trường hợp chưa có quyết định cho thuê, hợp đồng cho thuê đất (bao gồm cả trường hợp thuê đất đã hết thời hạn sử dụng đất nhưng chưa được gia hạn thời gian sử dụng đất)."},{"k":"p","t":"2. Trình tự, thủ tục tiếp nhận và xử lý hồ sơ đối với trường hợp cơ quan thuế tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác kể từ ngày nhận được hồ sơ khai thuế, khoản thu khác hợp pháp, đầy đủ, đúng mẫu quy định của người nộp thuế đối với các trường hợp cụ thể như sau:"},{"k":"p","t":"a) Cơ quan tiếp nhận hồ sơ:"},{"k":"p","t":"a.1) Đối với trường hợp quy định tại điểm a.1 khoản 1 Điều này là cơ quan thuế quản lý doanh nghiệp phát hành chứng khoán, doanh nghiệp có phần vốn góp. Trường hợp người nộp thuế đồng thời nhận thừa kế, quà tặng của nhiều loại chứng khoán, phần vốn góp thì cơ quan tiếp nhận hồ sơ là cơ quan thuế nơi người nộp thuế cư trú;"},{"k":"p","t":"a.2) Đối với trường hợp quy định tại điểm a.2 và điểm c khoản 1 Điều này là cơ quan thuế nơi đăng ký quyền sở hữu, quyền sử dụng hoặc địa điểm do Ủy ban nhân dân cấp tỉnh quyết định;"},{"k":"p","t":"a.3) Đối với trường hợp quy định tại điểm b.1, b.2 và điểm e khoản 1 Điều này là cơ quan thuế nơi có đất;"},{"k":"p","t":"a.4) Đối với trường hợp quy định tại điểm b.3 khoản 1 Điều này là cơ quan thuế nơi người nộp thuế cư trú;"},{"k":"p","t":"a.5) Đối với trường hợp quy định tại điểm d khoản 1 Điều này là cơ quan thuế nơi có đất thuộc đối tượng chịu thuế. Hộ gia đình, cá nhân nộp hồ sơ khai thuế tổng hợp tại cơ quan thuế theo hướng dẫn của Bộ trưởng Bộ Tài chính;"},{"k":"p","t":"a.6) Đối với trường hợp quy định tại điểm đ khoản 1 Điều này là Ủy ban nhân dân cấp xã nơi có đất thuộc đối tượng chịu thuế."},{"k":"p","t":"b) Thời hạn cơ quan thuế ban hành thông báo nộp thuế, khoản thu khác:"},{"k":"p","t":"b.1) Chậm nhất là 05 ngày làm việc kể từ ngày cơ quan thuế tiếp nhận hồ sơ khai thuế của người nộp thuế hoặc ngày cơ quan thuế tiếp nhận hồ sơ theo cơ chế một cửa liên thông chuyển đến trừ trường hợp theo quy định tại điểm b.2 và điểm c khoản này. Đối với nghĩa vụ thuế sử dụng đất phi nông nghiệp mà có phát sinh thay đổi người nộp thuế nhưng người nộp thuế trước đó đã hoàn thành nghĩa vụ nộp thuế thì cơ quan thuế không ban hành thông báo nộp thuế đối với nghĩa vụ thuế đã hoàn thành;"},{"k":"p","t":"b.2) Chậm nhất là 03 ngày làm việc kể từ ngày cơ quan thuế tiếp nhận hồ sơ khai thuế của người nộp thuế đối với các trường hợp quy định tại điểm b khoản 1 Điều này;"},{"k":"p","t":"b.3) Chậm nhất vào ngày 30 tháng 4 đối với nghĩa vụ thuế hằng năm (trừ trường hợp khai tổng hợp đối với thuế sử dụng đất phi nông nghiệp của hộ gia đình, cá nhân);"},{"k":"p","t":"b.4) Trường hợp địa phương có mùa vụ thu hoạch sản phẩm nông nghiệp không trùng với thời hạn nộp thuế sử dụng đất nông nghiệp phải nộp theo quy định thì cơ quan thuế được phép lùi thời hạn ban hành thông báo nộp thuế nhưng không quá 60 ngày so với thời hạn quy định;"},{"k":"p","t":"b.5) Chậm nhất là ngày làm việc tiếp theo đối với các trường hợp quy định tại điểm c khoản 1 Điều này. Trường hợp chưa có giá tính lệ phí trước bạ thì thời hạn chậm nhất là 05 ngày làm việc kể từ ngày cơ quan thuế tiếp nhận hồ sơ khai thuế của người nộp thuế."},{"k":"p","t":"c) Trường hợp hồ sơ khai thuế không đầy đủ, không đúng mẫu quy định, cơ quan thuế thông báo cho người nộp thuế về việc không tiếp nhận hồ sơ khai thuế hoặc đề nghị giải trình, bổ sung thông tin tài liệu theo mẫu hướng dẫn của Bộ trưởng Bộ Tài chính hoặc ấn định thuế theo quy định của pháp luật hoặc có văn bản theo mẫu hướng dẫn của Bộ trưởng Bộ Tài chính gửi cơ quan nhà nước có thẩm quyền chậm nhất là 03 ngày làm việc kể từ ngày nhận hồ sơ khai thuế của người nộp thuế để xác minh thông tin làm căn cứ tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác cho người nộp thuế chậm nhất là 05 ngày làm việc kể từ ngày nhận được văn bản cung cấp thông tin do cơ quan nhà nước có thẩm quyền chuyển đến;"},{"k":"p","t":"d) Đối với các trường hợp không phải nộp hồ sơ khai thuế quy định tại khoản 10 Điều 11 Nghị định này, cơ quan thuế tính thuế, khoản thu khác phải nộp trên cơ sở dữ liệu đã được kết nối, chia sẻ, cập nhật từ cơ sở dữ liệu quốc gia, cơ sở dữ liệu của cơ quan nhà nước có thẩm quyền và Hệ thống thông tin quản lý thuế; ban hành thông báo nộp thuế, khoản thu khác chậm nhất là ngày làm việc tiếp theo kể từ ngày Hệ thống thông tin quản lý thuế ghi nhận đủ thông tin cần thiết để xác định nghĩa vụ thuế, khoản thu khác của người nộp thuế."},{"k":"p","t":"Trường hợp thông tin trên hệ thống chưa đầy đủ, chưa thống nhất hoặc cần xác minh để làm căn cứ tính thuế, khoản thu khác thì cơ quan thuế đề nghị người nộp thuế cung cấp, bổ sung thông tin theo mẫu hướng dẫn của Bộ trưởng Bộ Tài chính hoặc có văn bản gửi cơ quan nhà nước có thẩm quyền để xác minh thông tin. Cơ quan thuế ban hành thông báo nộp thuế, khoản thu khác cho người nộp thuế chậm nhất là 05 ngày làm việc kể từ ngày nhận được đầy đủ thông tin làm căn cứ tính thuế, khoản thu khác."}]},{"id":"nd252_17","no":17,"code":"Điều 17","title":"Điều 17. Các trường hợp cơ quan thuế tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác theo hồ sơ xác định nghĩa vụ tài chính do cơ quan quản lý nhà nước có thẩm quyền chuyển đến","shortTitle":"Các trường hợp cơ quan thuế tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác theo hồ sơ xác định nghĩa vụ tài chính do cơ quan quản lý nhà nước có thẩm quyền chuyển đến","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trường hợp cơ quan thuế tính thuế, khoản thu khác và thông báo số tiền thuế, khoản thu khác phải nộp theo hồ sơ xác định nghĩa vụ tài chính do cơ quan quản lý nhà nước có thẩm quyền chuyển đến, bao gồm:"},{"k":"p","t":"a) Thuế thu nhập cá nhân từ chuyển nhượng bất động sản, từ nhận thừa kế, quà tặng là bất động sản (bao gồm cả bất động sản đã hoàn thành thủ tục cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất nhưng cá nhân phát sinh việc thay đổi thông tin liên quan đến nghĩa vụ thuế phải nộp), trừ trường hợp quy định tại điểm b khoản 1 Điều 16 Nghị định này;"},{"k":"p","t":"b) Thuế sử dụng đất phi nông nghiệp, thuế sử dụng đất nông nghiệp của hộ gia đình, cá nhân trong trường hợp nộp hồ sơ theo cơ chế một cửa liên thông;"},{"k":"p","t":"c) Lệ phí trước bạ nhà, đất;"},{"k":"p","t":"d) Tiền sử dụng đất;"},{"k":"p","t":"đ) Tiền thuê đất;"},{"k":"p","t":"e) Số tiền người nộp thuế phải nộp bổ sung đối với thời gian chưa tính tiền thuê đất, tiền sử dụng đất (sau đây gọi là khoản tiền người nộp thuế phải nộp bổ sung);"},{"k":"p","t":"g) Khoản tiền tương đương tiền chậm nộp tiền sử dụng đất, tiền thuê đất theo quy định của pháp luật về tiền sử dụng đất, tiền thuê đất;"},{"k":"p","t":"h) Các khoản thu khác thuộc ngân sách nhà nước theo quy định của pháp luật."},{"k":"p","t":"2. Trình tự, thủ tục tiếp nhận và xử lý hồ sơ đối với trường hợp cơ quan thuế ban hành thông báo nộp thuế, khoản thu khác và gửi thông báo nộp thuế, khoản thu khác cho người nộp thuế kể từ ngày nhận được phiếu chuyển thông tin để xác định nghĩa vụ tài chính về đất đai và văn bản hợp pháp, đầy đủ của cơ quan nhà nước có thẩm quyền, cụ thể như sau:"},{"k":"p","t":"a) Cơ quan tiếp nhận và xử lý hồ sơ: cơ quan tiếp nhận hồ sơ là cơ quan được giao nhiệm vụ tiếp nhận hồ sơ theo quy định của pháp luật về đất đai. Cơ quan tiếp nhận chuyển hồ sơ cho cơ quan chuyên môn lập phiếu chuyển thông tin để chuyển cho cơ quan thuế nơi có đất cùng các giấy tờ chứng minh thuộc đối tượng miễn, giảm (nếu có). Trường hợp miễn, giảm tiền sử dụng đất, tiền thuê đất thì cơ quan chuyên môn lập phiếu chuyển thông tin xác định đối tượng, diện tích miễn tiền thuê đất một số năm, giảm tiền sử dụng đất, tiền thuê đất, thời gian miễn một số năm, thời gian giảm, mức giảm tiền sử dụng đất, tiền thuê đất và ghi trên phiếu chuyển thông tin, không chuyển giấy tờ chứng minh đối tượng miễn, giảm cho cơ quan thuế nơi có đất;"},{"k":"p","t":"b) Thời hạn cơ quan thuế ban hành thông báo nộp thuế, khoản thu khác kể từ ngày nhận được phiếu chuyển thông tin để xác định nghĩa vụ tài chính về đất đai:"},{"k":"p","t":"Chậm nhất là 07 ngày làm việc đối với tiền sử dụng đất và khoản phải nộp bổ sung của tổ chức, cá nhân là người gốc Việt Nam định cư ở nước ngoài; 05 ngày làm việc đối với tiền sử dụng đất và khoản phải nộp bổ sung của hộ gia đình, cá nhân (trừ cá nhân là người gốc Việt Nam định cư ở nước ngoài); 05 ngày làm việc đối với tiền thuê đất và khoản phải nộp bổ sung; 03 ngày làm việc đối với thuế thu nhập cá nhân từ chuyển nhượng bất động sản, từ nhận thừa kế, quà tặng là bất động sản, lệ phí trước bạ nhà, đất, thuế sử dụng đất phi nông nghiệp, thuế sử dụng đất nông nghiệp."},{"k":"p","t":"Chậm nhất là 07 ngày làm việc kể từ ngày nhận được văn bản xác định các khoản mà người nộp thuế được trừ vào tiền thuê đất, tiền sử dụng đất phải nộp của cơ quan nhà nước có thẩm quyền. Cơ quan nhà nước có thẩm quyền phải xác định các khoản mà người nộp thuế được trừ vào tiền thuê đất, tiền sử dụng đất phải nộp gửi cơ quan thuế chậm nhất là 05 ngày làm việc kể từ ngày nhận được hồ sơ do Văn phòng đăng ký đất đai hoặc cơ quan có chức năng quản lý đất đai hoặc bộ phận một cửa liên thông chuyển đến."},{"k":"p","t":"Chậm nhất là ngày 30 tháng 4 hằng năm, cơ quan thuế ban hành thông báo nộp tiền thuê đất gửi cho người nộp thuế trong trường hợp thuê đất trả tiền hằng năm."},{"k":"p","t":"3. Trong các văn bản đề nghị của người nộp thuế, phiếu chuyển thông tin theo quy trình luân chuyển hồ sơ xác định nghĩa vụ tài chính về đất đai do Ủy ban nhân dân cấp tỉnh quy định phải có đủ thông tin làm cơ sở để cơ quan thuế tính và thông báo số tiền thuế, khoản thu khác phải nộp quy định tại khoản 1 Điều này, người nộp thuế không phải nộp hồ sơ khai thuế."}]},{"id":"nd252_18","no":18,"code":"Điều 18","title":"Điều 18. Các trường hợp cơ quan thuế thông báo khoản thu khác phải nộp theo văn bản xác định khoản thu khác của cơ quan quản lý nhà nước có thẩm quyền chuyển đến","shortTitle":"Các trường hợp cơ quan thuế thông báo khoản thu khác phải nộp theo văn bản xác định khoản thu khác của cơ quan quản lý nhà nước có thẩm quyền chuyển đến","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Trường hợp cơ quan thuế thông báo khoản thu khác phải nộp theo văn bản của cơ quan quản lý nhà nước có thẩm quyền chuyển đến, bao gồm:"},{"k":"p","t":"a) Tiền cấp quyền khai thác khoáng sản;"},{"k":"p","t":"b) Tiền cấp quyền khai thác tài nguyên nước;"},{"k":"p","t":"c) Tiền sử dụng khu vực biển;"},{"k":"p","t":"d) Các khoản thu khác thuộc ngân sách nhà nước theo quy định của pháp luật."},{"k":"p","t":"2. Trình tự, thủ tục, thời hạn cơ quan thuế ban hành thông báo khoản thu khác phải nộp và gửi thông báo khoản thu khác phải nộp cho người nộp thuế kể từ ngày nhận được quyết định, thông báo, văn bản của cơ quan nhà nước có thẩm quyền, cụ thể như sau:"},{"k":"p","t":"a) Chậm nhất là 10 ngày làm việc kể từ ngày nhận được quyết định, thông báo hoặc văn bản hợp pháp, đầy đủ của cơ quan nhà nước có thẩm quyền chuyển đến;"},{"k":"p","t":"b) Chậm nhất là ngày 30 tháng 4 hằng năm, cơ quan thuế ban hành thông báo nộp tiền của các năm tiếp theo đối với trường hợp nộp tiền cấp quyền khai thác khoáng sản, tiền cấp quyền khai thác tài nguyên nước, tiền sử dụng khu vực biển theo hình thức trả tiền hằng năm."}]},{"id":"nd252_19","no":19,"code":"Điều 19","title":"Điều 19. Các trường hợp cơ quan hải quan tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác","shortTitle":"Các trường hợp cơ quan hải quan tính thuế, khoản thu khác và thông báo nộp thuế, khoản thu khác","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Các trường hợp cơ quan hải quan xác định số tiền thuế, khoản thu khác phải nộp và thông báo cho người nộp thuế, bao gồm:"},{"k":"p","t":"a) Người nộp thuế chấm dứt hoạt động, không hoạt động tại địa chỉ đăng ký kinh doanh, giải thể, phá sản mà chưa hoàn thành nghĩa vụ thuế thì cơ quan hải quan tính thuế, thông báo thuế để xác định số tiền thuế phải nộp đối với tổ chức, cá nhân có nghĩa vụ liên quan theo quy định của pháp luật;"},{"k":"p","t":"b) Cơ quan nhà nước có thẩm quyền đề nghị cơ quan hải quan xác định số tiền thuế hàng hóa xuất khẩu, nhập khẩu bị tịch thu để làm căn cứ xử lý theo quy định pháp luật;"},{"k":"p","t":"c) Hàng hóa nhập khẩu chưa nộp các loại thuế ở khâu nhập khẩu, bị cơ quan có thẩm quyền cưỡng chế kê biên bán đấu giá, trường hợp hàng hóa phải nộp các loại thuế ở khâu nhập khẩu, cơ quan hải quan tính thuế, thông báo thuế cho cơ quan thu tiền bán đấu giá để nộp tiền thuế;"},{"k":"p","t":"d) Hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế, người khai thuế cầm cố, thế chấp để làm tài sản bảo đảm các khoản vay, trường hợp tổ chức tín dụng phải xử lý tài sản cầm cố, thế chấp theo quy định của pháp luật để thu hồi nợ nhưng người khai thuế chưa kê khai tờ khai hải quan mới, chưa nộp đủ thuế theo quy định của pháp luật về hải quan, cơ quan hải quan xác định số tiền thuế phải nộp đối với hàng hóa và thông báo cho tổ chức tín dụng để thực hiện nghĩa vụ theo quy định của pháp luật;"},{"k":"p","t":"đ) Phí hải quan; lệ phí hàng hóa, hành lý, phương tiện vận tải quá cảnh;"},{"k":"p","t":"e) Người nộp thuế có hành vi vi phạm hành chính về quản lý thuế, số tiền xử phạt tính theo số tiền thuế khai thiếu, số tiền thuế trốn."},{"k":"p","t":"2. Các trường hợp quy định tại điểm a, b, c, d và điểm đ khoản 1 Điều này, cơ quan hải quan căn cứ quy định của pháp luật thuế, dữ liệu quản lý thuế, các chứng từ tài liệu có liên quan để xác định số tiền thuế phải nộp đối với hàng hóa xuất khẩu, nhập khẩu."}]},{"id":"nd252_20","no":20,"code":"Điều 20","title":"Điều 20. Trách nhiệm của người nộp thuế, cơ quan quản lý thuế, cơ quan có thẩm quyền trong trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo nộp thuế, khoản thu khác","shortTitle":"Trách nhiệm của người nộp thuế, cơ quan quản lý thuế, cơ quan có thẩm quyền trong trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo nộp thuế, khoản thu khác","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có trách nhiệm khai chính xác, trung thực, đầy đủ các nội dung trong hồ sơ khai thuế hoặc hồ sơ xác định nghĩa vụ tài chính và nộp hồ sơ cho cơ quan quản lý thuế hoặc cơ quan quản lý nhà nước có thẩm quyền theo quy định của pháp luật và chịu trách nhiệm về các thông tin trên hồ sơ đã kê khai; giải trình, bổ sung thông tin tài liệu đầy đủ, đúng thời hạn theo yêu cầu của cơ quan quản lý thuế."},{"k":"p","t":"2. Cơ quan quản lý thuế:"},{"k":"p","t":"a) Trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo số tiền thuế, khoản thu khác phải nộp theo hồ sơ khai thuế, khoản thu khác của người nộp thuế, cơ quan quản lý thuế có trách nhiệm kiểm tra thông tin người nộp thuế kê khai trên hồ sơ khai thuế và thực hiện tính thuế, thông báo thuế cho người nộp thuế;"},{"k":"p","t":"b) Trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác và thông báo số tiền thuế, khoản thu khác phải nộp theo hồ sơ xác định nghĩa vụ tài chính do cơ quan quản lý nhà nước có thẩm quyền chuyển đến, cơ quan quản lý thuế có trách nhiệm căn cứ thông tin trên hồ sơ xác định nghĩa vụ tài chính và thực hiện tính thuế, khoản thu khác, thông báo thuế, khoản thu khác cho người nộp thuế."},{"k":"p","t":"Trường hợp thông tin của các cơ quan nhà nước có thẩm quyền chuyển đến chưa đủ thành phần, chưa đủ thông tin hoặc cơ quan quản lý thuế phát hiện thông tin không đúng với thực tế thì trong thời hạn 05 ngày làm việc kể từ ngày nhận được hồ sơ, cơ quan quản lý thuế có trách nhiệm thông báo bằng văn bản cho cơ quan đã gửi hồ sơ để bổ sung, điều chỉnh thông tin. Trường hợp nhận được văn bản đề nghị bổ sung thông tin của cơ quan quản lý thuế, cơ quan nhà nước có thẩm quyền cung cấp hồ sơ, thông tin theo đề nghị của cơ quan quản lý thuế trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản. Sau khi nhận đủ hồ sơ, thông tin thì cơ quan quản lý thuế thực hiện tính và ban hành thông báo nộp tiền theo thời hạn quy định tại các Điều tương ứng của Nghị định này;"},{"k":"p","t":"c) Đối với trường hợp cơ quan thuế thông báo số tiền thuế, khoản thu khác phải nộp theo văn bản tính thuế, khoản thu khác của cơ quan quản lý nhà nước có thẩm quyền chuyển đến theo quy định tại Điều 18 Nghị định này: trường hợp thông tin của các cơ quan nhà nước có thẩm quyền chuyển đến chưa đủ căn cứ để ban hành thông báo nộp thuế, trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản, cơ quan thuế có trách nhiệm thông báo bằng văn bản cho cơ quan đã gửi hồ sơ để bổ sung, điều chỉnh thông tin. Trường hợp nhận được văn bản đề nghị bổ sung thông tin của cơ quan thuế, cơ quan nhà nước có thẩm quyền cung cấp hồ sơ, thông tin theo đề nghị của cơ quan thuế trong thời hạn 05 ngày làm việc kể từ ngày nhận được văn bản. Sau khi nhận đủ hồ sơ, thông tin thì cơ quan quản lý thuế thực hiện ban hành thông báo nộp tiền theo thời hạn quy định tại khoản 2 Điều 18 Nghị định này;"},{"k":"p","t":"d) Trường hợp cơ quan quản lý thuế nhận được văn bản của cơ quan, người có thẩm quyền về việc điều chỉnh, bổ sung, thay thế, thu hồi hồ sơ xác định nghĩa vụ tài chính, căn cứ thông tin do cơ quan quản lý nhà nước có thẩm quyền chuyển đến, cơ quan quản lý thuế thực hiện điều chỉnh, bổ sung hoặc thu hồi thông báo nộp thuế, khoản thu khác;"},{"k":"p","t":"đ) Công chức quản lý thuế chỉ chịu trách nhiệm về kết quả tính thuế, khoản thu khác, thông báo thuế, khoản thu khác trong phạm vi hồ sơ, tài liệu, thông tin của người nộp thuế cung cấp, thông tin của cơ quan nhà nước có thẩm quyền cung cấp và trong phạm vi cơ sở dữ liệu cơ quan quản lý thuế khai thác được tại thời điểm tính thuế, khoản thu khác."},{"k":"p","t":"3. Đối với cơ quan nhà nước có thẩm quyền:"},{"k":"p","t":"a) Chịu trách nhiệm về tính đầy đủ, chính xác của thông tin trên hồ sơ xác định nghĩa vụ tài chính hoặc văn bản xác định nghĩa vụ phải nộp;"},{"k":"p","t":"b) Tiếp nhận hồ sơ, thông tin khai thuế của người nộp thuế và chuyển đầy đủ, kịp thời thông tin xác định nghĩa vụ tài chính hoặc văn bản xác định nghĩa vụ phải nộp cho cơ quan quản lý thuế;"},{"k":"p","t":"c) Điều chỉnh, bổ sung, cung cấp thông tin theo đề nghị của cơ quan quản lý thuế chậm nhất là 05 ngày làm việc kể từ ngày nhận được văn bản của cơ quan quản lý thuế;"},{"k":"p","t":"d) Gửi kịp thời các văn bản điều chỉnh, bổ sung thông tin để xác định số thuế phải nộp cho cơ quan quản lý thuế để điều chỉnh nghĩa vụ thuế và điều chỉnh, bổ sung thông báo nộp thuế đã ban hành trước đó;"},{"k":"p","t":"đ) Phối hợp với cơ quan quản lý thuế và xây dựng hệ thống thông tin để truyền nhận thông tin tự động bằng phương thức điện tử."}]},{"id":"nd252_21","no":21,"code":"Điều 21","title":"Điều 21. Thời hạn nộp thuế, khoản thu khác đối với trường hợp cơ quan thuế tính thuế, khoản thu khác, thông báo nộp thuế, khoản thu khác","shortTitle":"Thời hạn nộp thuế, khoản thu khác đối với trường hợp cơ quan thuế tính thuế, khoản thu khác, thông báo nộp thuế, khoản thu khác","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Thuế sử dụng đất phi nông nghiệp:"},{"k":"p","t":"a) Thời hạn nộp thuế lần đầu: chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp thuế sử dụng đất phi nông nghiệp của cơ quan thuế. Từ năm thứ hai trở đi, người nộp thuế nộp tiền thuế sử dụng đất phi nông nghiệp một lần trong năm chậm nhất là ngày 31 tháng 10;"},{"k":"p","t":"b) Thời hạn nộp tiền thuế chênh lệch theo xác định của người nộp thuế tại Tờ khai tổng hợp chậm nhất là ngày 31 tháng 3 năm dương lịch tiếp theo năm tính thuế;"},{"k":"p","t":"c) Thời hạn nộp thuế đối với hồ sơ khai điều chỉnh chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp thuế sử dụng đất phi nông nghiệp."},{"k":"p","t":"2. Thuế sử dụng đất nông nghiệp:"},{"k":"p","t":"a) Thời hạn nộp thuế lần đầu: chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp thuế sử dụng đất nông nghiệp của cơ quan thuế;"},{"k":"p","t":"b) Từ năm thứ hai trở đi, người nộp thuế được chọn nộp tiền thuế sử dụng đất nông nghiệp một lần hoặc hai lần trong năm. Trường hợp người nộp thuế chọn nộp thuế một lần trong năm thì thời hạn nộp thuế chậm nhất là ngày 31 tháng 5."},{"k":"p","t":"Trường hợp người nộp thuế chọn nộp thuế hai lần trong năm thì thời hạn nộp thuế cho từng kỳ như sau: kỳ thứ nhất nộp 50% chậm nhất là ngày 31 tháng 5; kỳ thứ hai nộp đủ phần còn lại chậm nhất là ngày 31 tháng 10;"},{"k":"p","t":"c) Thời hạn nộp thuế đối với hồ sơ khai điều chỉnh chậm nhất là 30 ngày, kể từ ngày ban hành thông báo nộp thuế sử dụng đất nông nghiệp;"},{"k":"p","t":"d) Trường hợp địa phương có mùa vụ thu hoạch sản phẩm nông nghiệp không trùng với thời hạn nộp thuế quy định tại khoản này thì cơ quan thuế được phép lùi thời hạn nộp thuế không quá 60 ngày so với thời hạn quy định tại khoản này."},{"k":"p","t":"3. Tiền thuê đất và khoản tiền người nộp thuế phải nộp bổ sung:"},{"k":"p","t":"a) Đối với trường hợp nộp tiền thuê đất hằng năm:"},{"k":"p","t":"a.1) Thời hạn nộp tiền thuê đất lần đầu: chậm nhất là 30 ngày, kể từ ngày ban hành thông báo nộp tiền thuê đất của cơ quan thuế;"},{"k":"p","t":"Đối với trường hợp thuê đất mới mà thời điểm xác định nghĩa vụ tài chính về tiền thuê đất phải nộp của năm đầu tiên sau ngày 31 tháng 10 thì cơ quan thuế ra thông báo nộp tiền thuê đất cho thời gian còn lại của năm;"},{"k":"p","t":"a.2) Từ năm thứ hai trở đi, người nộp thuế được chọn nộp tiền một lần hoặc hai lần trong năm. Trường hợp người nộp thuế chọn nộp tiền một lần trong năm thì thời hạn nộp thuế chậm nhất là ngày 31 tháng 5. Trường hợp người nộp thuế chọn hình thức nộp tiền hai lần trong năm thì thời hạn nộp thuế cho từng kỳ như sau: kỳ thứ nhất nộp 50% chậm nhất là ngày 31 tháng 5; kỳ thứ hai nộp đủ phần còn lại theo thông báo chậm nhất là ngày 31 tháng 10;"},{"k":"p","t":"a.3) Trường hợp người nộp thuế sử dụng đất vào mục đích phải thuê đất theo quy định của pháp luật nhưng chưa có quyết định, hợp đồng thuê đất mà chậm nộp hồ sơ khai tiền thuê đất thì cơ quan thuế ban hành thông báo nộp tiền thuê đất hằng năm của khoảng thời gian đã sử dụng đất và tiền chậm nộp tiền thuê đất tương ứng. Thời hạn nộp tiền thuê đất làm căn cứ tính tiền chậm nộp được xác định như sau: năm đầu tiên là 30 ngày kể từ ngày bắt đầu sử dụng đất; từ năm thứ hai trở đi thực hiện theo thời hạn quy định tại điểm a.2 khoản này;"},{"k":"p","t":"a.4) Thời hạn nộp tiền thuê đất đối với thông báo nộp thuế điều chỉnh, bổ sung:"},{"k":"p","t":"Trường hợp thông báo nộp thuế điều chỉnh, bổ sung theo hồ sơ khai điều chỉnh của người nộp thuế thì thời hạn nộp tiền thuê đất theo thời hạn nộp của thông báo lần đầu."},{"k":"p","t":"Trường hợp thông báo nộp thuế điều chỉnh, bổ sung theo văn bản của cơ quan nhà nước có thẩm quyền thì thời hạn nộp tiền thuê đất chênh lệch tăng chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp thuế điều chỉnh, bổ sung;"},{"k":"p","t":"a.5) Thời hạn nộp tiền thuê đất đối với trường hợp cơ quan thuế thông báo nộp tiền theo văn bản của cơ quan nhà nước có thẩm quyền cho phép gia hạn sử dụng đất trong trường hợp chậm đưa đất vào sử dụng hoặc chậm tiến độ sử dụng đất so với tiến độ ghi trong dự án đầu tư, các trường hợp khác điều chỉnh các yếu tố liên quan đến việc xác định lại số tiền thuê đất phải nộp và xác định khoản tiền người nộp thuế phải nộp bổ sung đối với thời gian chưa tính tiền thuê đất như sau:"},{"k":"p","t":"Chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp tiền, người nộp thuế phải nộp 50% tổng số tiền phải nộp theo thông báo;"},{"k":"p","t":"Chậm nhất là 90 ngày kể từ ngày ban hành thông báo nộp tiền, người nộp thuế phải nộp 50% tổng số tiền phải nộp còn lại theo thông báo;"},{"k":"p","t":"b) Đối với trường hợp nộp tiền thuê đất một lần cho cả thời gian thuê:"},{"k":"p","t":"b.1) Thời hạn nộp tiền thuê đất lần đầu, thời hạn nộp khoản tiền người nộp thuế phải nộp bổ sung đối với thời gian chưa tính tiền thuê đất:"},{"k":"p","t":"Chậm nhất là 30 ngày, kể từ ngày ban hành thông báo nộp tiền, người nộp thuế phải nộp 50% tổng số tiền phải nộp theo thông báo;"},{"k":"p","t":"Chậm nhất là 90 ngày, kể từ ngày ban hành thông báo nộp tiền, người nộp thuế phải nộp 50% tổng số tiền phải nộp còn lại theo thông báo;"},{"k":"p","t":"b.2) Thời hạn nộp tiền thuê đất chênh lệch tăng đối với hồ sơ khai điều chỉnh chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp thuế điều chỉnh, bổ sung;"},{"k":"p","t":"c) Trường hợp cho thuê đất thông qua đấu giá quyền sử dụng đất, thời hạn nộp tiền là thời hạn trên quyết định phê duyệt kết quả trúng đấu giá của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"4. Tiền sử dụng đất và khoản tiền người nộp thuế phải nộp bổ sung:"},{"k":"p","t":"a) Chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp tiền, người nộp thuế phải nộp 50% tổng số tiền phải nộp theo thông báo;"},{"k":"p","t":"b) Chậm nhất là 90 ngày kể từ ngày ban hành thông báo nộp tiền, người nộp thuế phải nộp 50% tổng số tiền phải nộp còn lại theo thông báo;"},{"k":"p","t":"c) Chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp tiền sử dụng đất, người nộp thuế phải nộp 100% tổng số tiền phải nộp theo thông báo trong trường hợp xác định lại số tiền sử dụng đất phải nộp quá thời hạn 05 năm kể từ ngày có quyết định giao đất tái định cư mà hộ gia đình, cá nhân chưa nộp đủ số tiền sử dụng đất còn nợ;"},{"k":"p","t":"d) Chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp tiền sử dụng đất điều chỉnh, bổ sung, người nộp thuế phải nộp 100% số tiền phải nộp chênh lệch tăng theo thông báo điều chỉnh, bổ sung;"},{"k":"p","t":"đ) Trường hợp giao đất thông qua đấu giá quyền sử dụng đất, thời hạn nộp tiền là thời hạn trên quyết định phê duyệt kết quả trúng đấu giá của cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"5. Tiền cấp quyền khai thác tài nguyên nước:"},{"k":"p","t":"a) Thời hạn nộp tiền cấp quyền khai thác tài nguyên nước đối với trường hợp nộp một lần cho cả thời gian được phê duyệt, nộp lần đầu (đối với trường hợp nộp hằng năm), nộp điều chỉnh (áp dụng đối với số tiền phải nộp tăng thêm, riêng số tiền vẫn phải nộp theo thông báo nộp tiền đã ban hành trước đây thì tiếp tục thực hiện theo thông báo đã ban hành), nộp truy thu theo văn bản của cơ quan nhà nước có thẩm quyền: chậm nhất là 90 ngày kể từ ngày ban hành thông báo của cơ quan thuế;"},{"k":"p","t":"b) Từ năm thứ hai trở đi đối với trường hợp người nộp thuế nộp hằng năm:"},{"k":"p","t":"b.1) Trường hợp người nộp thuế nộp tiền cấp quyền khai thác tài nguyên nước một lần trong năm thì thời hạn nộp tiền chậm nhất là ngày 31 tháng 5;"},{"k":"p","t":"b.2) Trường hợp người nộp thuế nộp tiền cấp quyền khai thác tài nguyên nước hai lần trong năm thì thời hạn nộp tiền cho từng kỳ như sau: kỳ thứ nhất nộp 50% chậm nhất là ngày 31 tháng 5; kỳ thứ hai nộp đủ phần còn lại chậm nhất là ngày 31 tháng 10."},{"k":"p","t":"6. Tiền cấp quyền khai thác khoáng sản, tiền sử dụng khu vực biên thực hiện theo quy định của pháp luật chuyên ngành."},{"k":"p","t":"7. Lệ phí trước bạ: thời hạn nộp lệ phí trước bạ chậm nhất là 30 ngày kể từ ngày ban hành thông báo, trừ trường hợp người nộp thuế được ghi nợ lệ phí trước bạ."},{"k":"p","t":"8. Thuế thu nhập cá nhân từ chuyển nhượng bất động sản, thuế thu nhập cá nhân từ nhận thừa kế, quà tặng: thời hạn nộp thuế chậm nhất là 30 ngày kể từ ngày ban hành thông báo."},{"k":"p","t":"9. Trường hợp cơ quan thuế ban hành thông báo nộp thuế, khoản thu khác điều chỉnh, bổ sung do cơ sở dữ liệu bị sai lệch thì thời hạn nộp tiền thuế chênh lệch tăng chậm nhất là 30 ngày kể từ ngày ban hành thông báo nộp thuế, khoản thu khác điều chỉnh, bổ sung."},{"k":"p","t":"10. Trường hợp cơ quan thuế ban hành thông báo nộp thuế, khoản thu khác điều chỉnh, bổ sung làm giảm số tiền thuế phải nộp thì thời hạn nộp thực hiện theo thời hạn ghi trên thông báo nộp thuế, khoản thu khác lần đầu."}]},{"id":"nd252_22","no":22,"code":"Điều 22","title":"Điều 22. Các trường hợp khấu trừ, khai thuế thay, nộp thay thuế","shortTitle":"Các trường hợp khấu trừ, khai thuế thay, nộp thay thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Các trường hợp khấu trừ, khai và nộp thay số thuế đã khấu trừ:"},{"k":"p","t":"a) Tổ chức, cá nhân thực hiện khấu trừ, khai và nộp thay số thuế đã khấu trừ của người nộp thuế theo quy định của pháp luật thuế;"},{"k":"p","t":"b) Tổ chức khấu trừ, khai và nộp thay số thuế đã khấu trừ đối với hoạt động kinh doanh trên nền tảng thương mại điện tử theo quy định tại Điều 43 Nghị định này;"},{"k":"p","t":"c) Tổ chức bán đấu giá thực hiện việc bán tài sản bảo đảm để xử lý nghĩa vụ của người nộp thuế, nếu trực tiếp thu, quản lý hoặc được ủy quyền thu tiền bán tài sản bảo đảm từ người mua tài sản, thì có trách nhiệm khấu trừ, nộp thay nghĩa vụ thuế, khoản thu khác từ số tiền bán tài sản bảo đảm thu được cho tổ chức, cá nhân có tài sản quy định tại điểm l khoản 3 Điều 40 Luật Quản lý thuế. Bên bán tài sản bảo đảm khi bán tài sản bảo đảm lập hóa đơn theo loại hóa đơn mà đơn vị đang áp dụng và khai thuế riêng đối với hoạt động bán tài sản bảo đảm. Số thuế giá trị gia tăng phải khấu trừ, nộp thay được xác định theo phương pháp tính thuế mà bên bán tài sản bảo đảm đang áp dụng. Trường hợp bên bán tài sản bảo đảm đề nghị cấp hóa đơn điện tử từng lần phát sinh theo quy định của pháp luật về hóa đơn điện tử thì thực hiện khai thuế giá trị gia tăng theo phương pháp tính thuế phù hợp với loại hóa đơn điện tử đề nghị cấp. Số thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân phải khấu trừ, nộp thay được xác định theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Các trường hợp khai thuế thay, nộp thay thuế:"},{"k":"p","t":"a) Tổ chức, cá nhân thực hiện khai thuế thay, nộp thay thuế cho người nộp thuế theo quy định của pháp luật thuế;"},{"k":"p","t":"b) Tổ chức hợp tác kinh doanh với cá nhân thì tổ chức có trách nhiệm khai thuế giá trị gia tăng đối với toàn bộ doanh thu của hoạt động hợp tác kinh doanh mà không phân biệt hình thức phân chia kết quả hợp tác kinh doanh; khai thuế thay, nộp thay thuế thu nhập cá nhân cho cá nhân hợp tác kinh doanh theo quy định của pháp luật thuế thu nhập cá nhân. Trường hợp tổ chức hợp tác kinh doanh với cá nhân là hộ kinh doanh, cá nhân kinh doanh mà cá nhân có ngành nghề đang hoạt động cùng với ngành nghề hợp tác kinh doanh với tổ chức thì tổ chức và cá nhân tự thực hiện khai thuế tương ứng với kết quả thực tế hợp tác kinh doanh theo quy định;"},{"k":"p","t":"c) Bên nhận bảo đảm (không bao gồm Ngân hàng Nhà nước) bán tài sản bảo đảm để xử lý nợ hoặc người mua tài sản bảo đảm theo thỏa thuận theo pháp luật về dân sự có trách nhiệm khai thuế thay, nộp thay thuế theo quy định tại điểm g khoản 2 Điều 40 Luật Quản lý thuế như sau:"},{"k":"p","t":"c.1) Bên nhận bảo đảm phải khai thuế riêng đối với hoạt động bán tài sản bảo đảm. Bên nhận bảo đảm khi bán tài sản bảo đảm được lập hóa đơn theo loại hóa đơn mà đơn vị đang áp dụng, số thuế giá trị gia tăng phải khấu trừ, nộp thay được xác định theo phương pháp tính thuế mà bên bán tài sản bảo đảm đang áp dụng, số thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân phải khấu trừ, nộp thay được xác định theo quy định của pháp luật về thuế;"},{"k":"p","t":"c.2) Người mua tài sản bảo đảm có trách nhiệm khai thuế thay, nộp thay thuế cho cá nhân không kinh doanh;"},{"k":"p","t":"d) Bên nhận bảo đảm là tổ chức mà Nhà nước sở hữu 100% vốn điều lệ do Chính phủ thành lập có chức năng mua, bán, xử lý nợ được phép chuyển nhượng, cho thuê bất động sản, tài sản khác đã được thế chấp theo quy định của pháp luật để thu hồi nợ có thỏa thuận dân sự về việc bên nhận bảo đảm khai thuế thay, nộp thay thuế cho tổ chức, cá nhân có tài sản bảo đảm thì bên nhận bảo đảm có trách nhiệm khai thuế thay, nộp thay thuế cho tổ chức, cá nhân có tài sản và thực hiện khai thuế, lập hóa đơn xác định số thuế phải khấu trừ, nộp thay theo quy định tại điểm c.1 khoản này;"},{"k":"p","t":"đ) Tổ chức thuê bất động sản của cá nhân mà trong hợp đồng cho thuê quy định tổ chức là người nộp thay thuế cho cá nhân thì tổ chức có trách nhiệm khai thuế thay và nộp thay thuế cho cá nhân;"},{"k":"p","t":"e) Trường hợp chuyển nhượng bất động sản mà trong hợp đồng có thỏa thuận bên mua là người nộp thay thuế cho bên bán (trừ trường hợp được miễn thuế, không phải nộp thuế hoặc tạm thời chưa phải nộp thuế) hoặc bên thứ ba có liên quan được phép bán tài sản của cá nhân theo quy định của pháp luật thì bên mua, bên thứ ba theo thỏa thuận có trách nhiệm khai thuế thay, nộp thay thuế cho cá nhân theo quy định;"},{"k":"p","t":"g) Các trường hợp phải hoàn thành nghĩa vụ thuế theo quy định tại Điều 27 Nghị định này;"},{"k":"p","t":"h) Tổ chức tín dụng nộp thuế, tiền chậm nộp thay cho người nộp thuế trong các trường hợp hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế, người nộp thuế thế chấp để làm tài sản bảo đảm các khoản vay nhưng chưa kê khai, nộp thuế cho cơ quan hải quan, tổ chức tín dụng phải xử lý tài sản thế chấp để thu hồi nợ;"},{"k":"p","t":"i) Tổ chức bán đấu giá nếu trực tiếp thu, quản lý hoặc được ủy quyền thu tiền bán tài sản bảo đảm từ người mua tài sản thì có trách nhiệm kê khai, nộp thay liên quan đến tài sản bảo đảm là hàng hóa nhập khẩu thuộc đối tượng miễn thuế, không chịu thuế quy định tại điểm l khoản 3 Điều 40 Luật Quản lý thuế;"},{"k":"p","t":"k) Cơ quan thi hành án bán tài sản bảo đảm thi hành án theo quy định của pháp luật về thi hành án dân sự có trách nhiệm khai thuế thay, nộp thay thuế cho tổ chức, cá nhân có tài sản. Số thuế giá trị gia tăng phải khấu trừ, nộp thay được xác định theo phương pháp tính thuế phù hợp với loại hóa đơn điện tử từng lần phát sinh đề nghị cấp theo quy định của pháp luật về hóa đơn điện tử. Số thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân phải khấu trừ, nộp thay được xác định theo quy định của pháp luật về thuế;"},{"k":"p","t":"l) Tổ chức, cá nhân có trách nhiệm khấu trừ, khai thay, nộp thay thuế thu nhập cá nhân đối với thu nhập từ kinh doanh theo quy định của pháp luật về thuế thu nhập cá nhân thì tổ chức, cá nhân có trách nhiệm khai thay, nộp thay thuế giá trị gia tăng cho cá nhân đối với các khoản thu nhập từ hoạt động môi giới, đại lý bảo hiểm, xổ số, bán hàng đa cấp của cá nhân và thu nhập từ kinh doanh của cá nhân không cư trú."}]},{"id":"nd252_23","no":23,"code":"Điều 23","title":"Điều 23. Gia hạn nộp hồ sơ khai thuế, khoản thu khác trong trường hợp đặc biệt","shortTitle":"Gia hạn nộp hồ sơ khai thuế, khoản thu khác trong trường hợp đặc biệt","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Khi đối tượng, ngành, nghề kinh doanh gặp khó khăn đặc biệt phải kéo dài thời hạn nộp hồ sơ khai thuế, khoản thu khác theo quy định tại điểm b khoản 4 Điều 12 Luật Quản lý thuế, Bộ Tài chính chủ trì, phối hợp với các bộ, ngành liên quan trình Chính phủ quy định đối tượng, loại thuế và các khoản thu khác thuộc ngân sách nhà nước, thời gian, trình tự, thủ tục gia hạn nộp hồ sơ khai thuế, khoản thu khác."},{"k":"p","t":"TẠM NỘP THUẾ, KHOẢN THU KHÁC THEO QUÝ; THỜI HẠN NỘP THUẾ, KHOẢN THU KHÁC, THỜI GIAN GIA HẠN NỘP THUẾ, KHOẢN THU KHÁC; XỬ LÝ CHẬM NỘP TIỀN THUẾ, KHOẢN THU KHÁC; HOÀN THÀNH NGHĨA VỤ NỘP THUẾ"}]},{"id":"nd252_24","no":24,"code":"Điều 24","title":"Điều 24. Tạm nộp thuế, khoản thu khác theo quý","shortTitle":"Tạm nộp thuế, khoản thu khác theo quý","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thực hiện tạm nộp theo quý đối với khoản thuế, khoản thu khác sau:"},{"k":"p","t":"a) Thuế thu nhập doanh nghiệp;"},{"k":"p","t":"b) Lợi nhuận sau thuế còn lại nộp vào ngân sách nhà nước theo quy định của pháp luật về quản lý và đầu tư vốn nhà nước tại doanh nghiệp."},{"k":"p","t":"2. Thời hạn tạm nộp quý chậm nhất là ngày cuối cùng của tháng đầu của quý tiếp theo quý phát sinh nghĩa vụ thuế, khoản thu khác."},{"k":"p","t":"3. Nghĩa vụ tạm nộp thuế, khoản thu khác:"},{"k":"p","t":"a) Người nộp thuế phải tự xác định số thuế, khoản thu khác tạm nộp hằng quý nhưng tổng số thuế, khoản thu khác đã tạm nộp của 04 quý không được thấp hơn 80% số thuế, khoản thu khác phải nộp theo quyết toán năm của người nộp thuế tự kê khai;"},{"k":"p","t":"b) Trường hợp người nộp thuế nộp thiếu so với số thuế, khoản thu khác phải tạm nộp 04 quý theo quy định tại điểm a khoản này thì phải nộp tiền chậm nộp tính trên số thuế, khoản thu khác nộp thiếu kể từ ngày tiếp theo liền kề của ngày cuối cùng của thời hạn tạm nộp quý 04 đến ngày liền kề trước của ngày số tiền còn thiếu được nộp vào ngân sách nhà nước, bao gồm trường hợp người nộp thuế kê khai bổ sung;"},{"k":"p","t":"c) Trường hợp cơ quan có thẩm quyền thanh tra, kiểm tra sau khi doanh nghiệp đã khai quyết toán thuế, khoản thu khác nếu phát hiện tăng số tiền phải nộp so với số thuế, khoản thu khác doanh nghiệp đã kê khai quyết toán thì việc tính tiền chậm nộp thực hiện theo quy định tại khoản 2 Điều 26 Nghị định này."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính hướng dẫn về tạm nộp thuế, khoản thu khác theo quý quy định tại Điều này."}]},{"id":"nd252_25","no":25,"code":"Điều 25","title":"Điều 25. Thời hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt, thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt và gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trong trường hợp đặc biệt","shortTitle":"Thời hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt, thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt và gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trong trường hợp đặc biệt","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thời hạn nộp thuế:"},{"k":"p","t":"a) Đối với các khoản thuế, khoản thu khác, tiền chậm nộp, tiền phạt thực hiện theo quy định tại khoản 1 Điều 14 Luật Quản lý thuế;"},{"k":"p","t":"b) Đối với các khoản phí, lệ phí không do cơ quan quản lý thuế trực tiếp thu, thời hạn nộp phí, lệ phí của người nộp phí, lệ phí thực hiện theo quy định tại pháp luật phí, lệ phí."},{"k":"p","t":"2. Thời hạn nộp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đối với trường hợp người nộp thuế nộp tiền trực tiếp tại tổ chức được cơ quan quản lý thuế ủy nhiệm thu: chậm nhất 01 ngày làm việc kể từ ngày thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt của người nộp thuế, tổ chức ủy nhiệm thu nộp tiền đã thu của người nộp thuế vào tài khoản thu ngân sách nhà nước theo quy định."},{"k":"p","t":"3. Thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt:"},{"k":"p","t":"a) Đối với trường hợp bị thiệt hại vật chất, gây ảnh hưởng trực tiếp đến sản xuất, kinh doanh do gặp trường hợp bất khả kháng quy định tại điểm a khoản 7 Điều 14 Luật Quản lý thuế, thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là 02 năm kể từ ngày xảy ra sự kiện bất khả kháng;"},{"k":"p","t":"b) Đối với trường hợp phải ngừng hoạt động do di dời cơ sở sản xuất, kinh doanh theo yêu cầu của cơ quan có thẩm quyền làm ảnh hưởng đến kết quả sản xuất, kinh doanh quy định tại điểm b khoản 7 Điều 14 Luật Quản lý thuế, thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt là 01 năm kể từ ngày người nộp thuế phải ngừng hoạt động do di dời cơ sở sản xuất, kinh doanh theo yêu cầu của cơ quan có thẩm quyền."},{"k":"p","t":"4. Gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trong trường hợp đặc biệt:"},{"k":"p","t":"Trong từng thời kỳ nhất định, khi đối tượng, ngành, nghề kinh doanh gặp khó khăn đặc biệt thì Bộ Tài chính chủ trì, phối hợp với các bộ, ngành liên quan trình Chính phủ quy định đối tượng, loại thuế và các khoản thu khác thuộc ngân sách nhà nước, thời gian, trình tự thủ tục, thẩm quyền, hồ sơ gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt. Việc gia hạn nộp thuế, khoản thu khác không dẫn đến điều chỉnh dự toán thu ngân sách nhà nước đã được Quốc hội quyết định."},{"k":"p","t":"5. Trong trường hợp cơ quan hải quan thu trực tiếp bằng tiền mặt thì chậm nhất 01 ngày làm việc kể từ ngày thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt của người nộp thuế, cơ quan hải quan nộp tiền vào tài khoản thu ngân sách nhà nước theo quy định của Bộ trưởng Bộ Tài chính."}]},{"id":"nd252_26","no":26,"code":"Điều 26","title":"Điều 26. Thời gian tính tiền chậm nộp, các trường hợp không tính tiền chậm nộp, chưa tính tiền chậm nộp và điều chỉnh tiền chậm nộp","shortTitle":"Thời gian tính tiền chậm nộp, các trường hợp không tính tiền chậm nộp, chưa tính tiền chậm nộp và điều chỉnh tiền chậm nộp","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Thời gian tính tiền chậm nộp:"},{"k":"p","t":"a) Thời gian tính tiền chậm nộp được tính liên tục kể từ ngày tiếp theo liền kề của ngày cuối cùng của thời hạn nộp thuế, khoản thu khác hoặc của thời hạn gia hạn nộp thuế, khoản thu khác hoặc thời hạn ghi trong thông báo, quyết định ấn định thuế, quyết định xử lý của cơ quan quản lý thuế, quyết định hoặc văn bản của cơ quan nhà nước có thẩm quyền đến ngày liền kề trước ngày số tiền nợ thuế, nợ khoản thu khác, tiền thuế tăng thêm, khoản thu khác tăng thêm, tiền thuế ấn định, khoản thu khác ấn định, tiền thuế chậm chuyển, khoản thu khác chậm chuyển được nộp vào ngân sách nhà nước;"},{"k":"p","t":"b) Thời gian tính tiền chậm nộp được tính liên tục kể từ ngày được Kho bạc Nhà nước chi trả tiền hoàn thuế hoặc ngày Kho bạc Nhà nước hạch toán bù trừ tiền hoàn thuế với khoản thu ngân sách nhà nước theo quyết định về việc thu hồi hoàn thuế của cơ quan quản lý thuế hoặc kể từ ngày có quyết định miễn thuế, giảm thuế hoặc thông báo được miễn thuế, giảm thuế đến ngày liền kề trước ngày tiền thu hồi hoàn thuế, tiền thu hồi miễn thuế, giảm thuế được nộp vào ngân sách nhà nước."},{"k":"p","t":"2. Trường hợp cơ quan có thẩm quyền thanh tra, kiểm tra sau khi người nộp thuế đã khai quyết toán thuế, khoản thu khác nếu phát hiện tăng số tiền thuế, khoản thu khác phải nộp so với số tiền thuế, khoản thu khác người nộp thuế đã kê khai quyết toán thì người nộp thuế bị tính tiền chậm nộp đối với số tiền thuế, khoản thu khác phải nộp tăng thêm sau khi bù trừ với số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa theo quy định tại khoản 2 Điều 15 Luật Quản lý thuế."},{"k":"p","t":"Thời gian tính tiền chậm nộp đối với số tiền thuế, khoản thu khác còn phải nộp được xác định liên tục kể từ ngày tiếp theo ngày cuối cùng của thời hạn nộp hồ sơ quyết toán thuế, khoản thu khác đến hết ngày liền kề trước ngày người nộp thuế nộp tiền vào ngân sách nhà nước. Khoản tiền thuế, khoản thu khác còn phải nộp thực hiện theo quy định tại điểm g khoản 3 Điều này."},{"k":"p","t":"3. Các trường hợp không tính tiền chậm nộp:"},{"k":"p","t":"a) Người nộp thuế cung ứng hàng hóa, dịch vụ được thanh toán bằng nguồn vốn ngân sách nhà nước, bao gồm cả nhà thầu phụ được quy định trong hợp đồng ký với chủ đầu tư và được chủ đầu tư trực tiếp thanh toán nhưng chưa được thanh toán:"},{"k":"p","t":"a.1) Số tiền thuế nợ không tính chậm nộp quy định tại khoản này là tổng số tiền thuế (không bao gồm thuế thu nhập cá nhân; thuế giá trị gia tăng, thuế thu nhập doanh nghiệp mà người nộp thuế có trách nhiệm khấu trừ, nộp thay nhà thầu nước ngoài), khoản thu khác, tiền chậm nộp (không bao gồm tiền chậm nộp phát sinh từ thuế thu nhập cá nhân; thuế giá trị gia tăng, thuế thu nhập doanh nghiệp mà người nộp thuế có trách nhiệm khấu trừ, nộp thay nhà thầu nước ngoài) do cơ quan quản lý thuế quản lý thu mà người nộp thuế còn nợ ngân sách nhà nước, nhưng không vượt quá số tiền ngân sách nhà nước chưa thanh toán;"},{"k":"p","t":"a.2) Thời gian không tính tiền chậm nộp được tính từ ngày đơn vị sử dụng ngân sách nhà nước phải thanh toán cho người nộp thuế nhưng chưa thanh toán đến ngày đơn vị sử dụng ngân sách nhà nước thanh toán cho người nộp thuế;"},{"k":"p","t":"b) Người nộp thuế được khoanh nợ theo quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế và trong thời gian khoanh nợ quy định tại Điều 34 Nghị định này;"},{"k":"p","t":"c) Trường hợp quy định tại điểm o khoản 1 Điều 37 Luật Quản lý thuế;"},{"k":"p","t":"d) Các trường hợp không tính tiền chậm nộp theo quy định của pháp luật;"},{"k":"p","t":"đ) Các trường hợp phục hồi tiền thuế nợ đã được xóa theo quy định của Bộ trưởng Bộ Tài chính: cơ quan quản lý thuế không tính tiền chậm nộp từ ngày ban hành quyết định xóa tiền thuế nợ đến ngày ban hành quyết định phục hồi tiền thuế nợ đã được xóa;"},{"k":"p","t":"e) Đối với hàng hóa xuất khẩu, nhập khẩu:"},{"k":"p","t":"e.1) Hàng hóa xuất khẩu, nhập khẩu phải thực hiện việc phân tích, phân loại hoặc giám định theo quy định của pháp luật về hải quan nhằm xác định chính xác số tiền thuế phải nộp thì không tính tiền chậm nộp đối với số tiền thuế tăng thêm trong thời gian chờ cơ quan hải quan yêu cầu bổ sung theo kết quả phân tích, phân loại hoặc giám định;"},{"k":"p","t":"e.2) Hàng hóa chưa có giá chính thức tại thời điểm đăng ký tờ khai hải quan theo quy định của pháp luật về trị giá hải quan thì không tính tiền chậm nộp đối với số tiền thuế tăng thêm trong thời gian chưa có giá chính thức;"},{"k":"p","t":"e.3) Hàng hóa có các khoản điều chỉnh cộng vào trị giá hải quan chưa xác định được tại thời điểm đăng ký tờ khai hải quan thì không tính tiền chậm nộp đối với số tiền thuế tăng thêm trong thời gian chưa xác định được các khoản điều chỉnh cộng vào trị giá hải quan;"},{"k":"p","t":"e.4) Trường hợp hàng hóa nhập khẩu bị áp dụng thuế chống bán phá giá, thuế chống trợ cấp có hiệu lực trở về trước 90 ngày theo quy định của pháp luật về quản lý ngoại thương: cơ quan hải quan không tính tiền chậm nộp trong thời hạn 90 ngày trở về trước;"},{"k":"p","t":"e.5) Hàng hóa xuất khẩu, hàng hóa nhập khẩu thuộc các trường hợp quy định tại điểm a, b, c, d và đ khoản này;"},{"k":"p","t":"g) Trường hợp người nộp thuế bù trừ tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa với số tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt còn nợ thì không tính tiền chậm nộp tương ứng với khoản tiền bù trừ trong khoảng thời gian từ ngày phát sinh khoản nộp thừa đến ngày cơ quan thuế thực hiện bù trừ."},{"k":"p","t":"4. Chưa tính tiền chậm nộp trong thời gian khoanh nợ đối với các trường hợp được khoanh nợ theo quy định tại điểm a, b, c, d và đ khoản 1 Điều 20 Luật Quản lý thuế."},{"k":"p","t":"5. Người nộp thuế khai bổ sung hồ sơ khai thuế làm giảm số tiền thuế, khoản thu khác phải nộp hoặc cơ quan quản lý thuế, cơ quan nhà nước, người có thẩm quyền xác định giảm nghĩa vụ nộp ngân sách nhà nước của người nộp thuế thì người nộp thuế được điều chỉnh số tiền chậm nộp đã tính tương ứng với số tiền thuế, khoản thu khác chênh lệch giảm."}]},{"id":"nd252_27","no":27,"code":"Điều 27","title":"Điều 27. Hoàn thành nghĩa vụ nộp thuế","shortTitle":"Hoàn thành nghĩa vụ nộp thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Việc hoàn thành nghĩa vụ nộp thuế thực hiện theo quy định tại Điều 17 Luật Quản lý thuế và quy định tại Điều này."},{"k":"p","t":"2. Đối với trường hợp quy định tại điểm c khoản 2 Điều 17 Luật Quản lý thuế, doanh nghiệp được chuyển đổi loại hình doanh nghiệp chưa hoàn thành nghĩa vụ nộp thuế thì doanh nghiệp sau chuyển đổi có trách nhiệm kế thừa quyền lợi (bao gồm kế thừa số thuế phải nộp hoặc số thuế giá trị gia tăng được khấu trừ, số thuế nộp thừa) và hoàn thành nghĩa vụ nộp thuế từ doanh nghiệp được chuyển đổi kể từ ngày được cấp Giấy chứng nhận đăng ký doanh nghiệp."},{"k":"p","t":"3. Đối với trường hợp quy định tại khoản 3 Điều 17 Luật Quản lý thuế:"},{"k":"p","t":"a) Khi cơ quan quản lý thuế nhận được thông tin về người nộp thuế là cá nhân đã chết, bị Tòa án tuyên bố là đã chết, mất tích hoặc mất năng lực hành vi dân sự và thông tin về người thừa kế hoặc người được giao quản lý di sản hoặc người quản lý tài sản, cơ quan quản lý thuế có trách nhiệm xác định nghĩa vụ thuế chưa hoàn thành của cá nhân đã chết, mất tích, mất năng lực hành vi dân sự và xác định trách nhiệm thực hiện nghĩa vụ thuế của người thừa kế hoặc người được giao quản lý di sản hoặc người quản lý tài sản theo quy định của pháp luật;"},{"k":"p","t":"b) Trường hợp người nộp thuế là cá nhân bị Tòa án tuyên bố là đã chết hoặc mất năng lực hành vi dân sự đã được xóa nợ theo quy định tại điểm a khoản 1 Điều 21 Luật Quản lý thuế, sau đó Tòa án ra quyết định hủy bỏ quyết định tuyên bố một người là đã chết hoặc mất năng lực hành vi dân sự thì cơ quan quản lý thuế thực hiện thủ tục phục hồi lại số tiền thuế nợ đã xóa theo quy định của Bộ trưởng Bộ Tài chính. Người nộp thuế có trách nhiệm hoàn thành nghĩa vụ nộp thuế theo quy định."},{"k":"p","t":"4. Cơ quan quản lý thuế có trách nhiệm thông báo nghĩa vụ thuế chưa hoàn thành và thực hiện các biện pháp đôn đốc, cưỡng chế đối với người nộp thuế và tổ chức, cá nhân có trách nhiệm kế thừa nghĩa vụ thuế chưa hoàn thành của người nộp thuế theo quy định tại Điều 17 Luật Quản lý thuế."},{"k":"p","t":"5. Trường hợp pháp luật có liên quan quy định việc tổ chức, cá nhân kế thừa quyền và nghĩa vụ của tổ chức, cá nhân khác ngoài các trường hợp quy định tại Điều 17 Luật Quản lý thuế thì việc hoàn thành nghĩa vụ thuế của tổ chức, cá nhân được kế thừa thực hiện tương tự như quy định tại khoản 2 và khoản 4 Điều này."},{"k":"p","t":"6. Nhà đầu tư nước ngoài được chuyển lợi nhuận được chia hoặc thu được từ các hoạt động đầu tư trực tiếp tại Việt Nam ra nước ngoài như sau:"},{"k":"p","t":"a) Nhà đầu tư nước ngoài được chuyển hằng năm số lợi nhuận được chia hoặc thu được từ các hoạt động đầu tư trực tiếp tại Việt Nam ra nước ngoài khi kết thúc năm tài chính, sau khi doanh nghiệp mà nhà đầu tư nước ngoài tham gia đầu tư đã hoàn thành nghĩa vụ tài chính đối với Nhà nước Việt Nam theo quy định của pháp luật, đã nộp báo cáo tài chính đã được kiểm toán và tờ khai quyết toán thuế thu nhập doanh nghiệp năm tài chính cho cơ quan quản lý thuế trực tiếp, đã nộp đủ tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt vi phạm hành chính đến hạn theo quy định của pháp luật, tại thời điểm chuyển lợi nhuận ra nước ngoài doanh nghiệp phải không còn tiền thuế nợ;"},{"k":"p","t":"b) Khi kết thúc hoạt động đầu tư trực tiếp tại Việt Nam: sau khi doanh nghiệp mà nhà đầu tư nước ngoài tham gia đầu tư đã hoàn thành nghĩa vụ tài chính đối với Nhà nước Việt Nam theo quy định của pháp luật, đã nộp báo cáo tài chính đã được kiểm toán và tờ khai quyết toán thuế thu nhập doanh nghiệp cho cơ quan quản lý thuế trực tiếp đồng thời thực hiện đầy đủ nghĩa vụ theo quy định của Luật Quản lý thuế, bao gồm các nghĩa vụ nộp thuế chưa đến hạn theo quy định của pháp luật;"},{"k":"p","t":"c) Nhà đầu tư nước ngoài không được chuyển ra nước ngoài số lợi nhuận được chia hoặc thu được từ hoạt động đầu tư trực tiếp tại Việt Nam của năm phát sinh lợi nhuận trong trường hợp trên báo cáo tài chính của doanh nghiệp mà nhà đầu tư nước ngoài đầu tư của năm phát sinh lợi nhuận vẫn còn số lỗ lũy kế sau khi đã chuyển lỗ theo quy định của pháp luật về thuế thu nhập doanh nghiệp."}]},{"id":"nd252_28","no":28,"code":"Điều 28","title":"Điều 28. Hoàn thành nghĩa vụ nộp thuế trong trường hợp xuất cảnh","shortTitle":"Hoàn thành nghĩa vụ nộp thuế trong trường hợp xuất cảnh","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 3","level":1,"content":[{"k":"p","t":"1. Các trường hợp tạm hoãn xuất cảnh bao gồm:"},{"k":"p","t":"a) Cá nhân kinh doanh, chủ hộ kinh doanh thuộc trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, có số tiền thuế nợ từ 50 triệu đồng trở lên và số tiền thuế nợ này đã quá thời hạn nộp theo quy định từ 120 ngày trở lên;"},{"k":"p","t":"b) Cá nhân là chủ sở hữu hưởng lợi của doanh nghiệp theo quy định của Luật Doanh nghiệp, cá nhân là người đại diện theo pháp luật của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã mà doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã đó thuộc trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế, có số tiền thuế nợ từ 500 triệu đồng trở lên và số tiền thuế nợ này đã quá thời hạn nộp theo quy định từ 120 ngày trở lên;"},{"k":"p","t":"c) Cá nhân kinh doanh, chủ hộ kinh doanh, cá nhân là chủ sở hữu hưởng lợi của doanh nghiệp theo quy định của Luật Doanh nghiệp, cá nhân là người đại diện theo pháp luật của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã thuộc trường hợp cơ quan quản lý thuế đủ căn cứ để xác định và đã ban hành thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký theo quy định, sau 120 ngày kể từ ngày cơ quan thuế ban hành thông báo mà không thực hiện thủ tục khôi phục mã số thuế hoặc chấm dứt hiệu lực mã số thuế theo quy định;"},{"k":"p","t":"d) Cá nhân là người nước ngoài có số tiền thuế nợ quá thời hạn nộp theo quy định mà chưa hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"đ) Cá nhân là người Việt Nam xuất cảnh để định cư ở nước ngoài, cá nhân là người Việt Nam định cư ở nước ngoài trước khi xuất cảnh từ Việt Nam có số tiền thuế nợ quá thời hạn nộp theo quy định mà chưa hoàn thành nghĩa vụ nộp thuế."},{"k":"p","t":"2. Thẩm quyền thông báo tạm hoãn xuất cảnh, gia hạn tạm hoãn xuất cảnh, hủy bỏ tạm hoãn xuất cảnh:"},{"k":"p","t":"a) Cơ quan quản lý thuế quản lý trực tiếp người nộp thuế có thẩm quyền thông báo tạm hoãn xuất cảnh;"},{"k":"p","t":"b) Cơ quan quản lý thuế đã thông báo tạm hoãn xuất cảnh có thẩm quyền thông báo gia hạn tạm hoãn xuất cảnh, thông báo hủy bỏ tạm hoãn xuất cảnh. Trường hợp người nộp thuế thay đổi cơ quan quản lý thuế thì cơ quan quản lý mới có thẩm quyền thông báo gia hạn tạm hoãn xuất cảnh, thông báo hủy bỏ tạm hoãn xuất cảnh đối với người nộp thuế."},{"k":"p","t":"3. Trình tự thực hiện tạm hoãn xuất cảnh:"},{"k":"p","t":"a) Đối với cơ quan quản lý thuế:"},{"k":"p","t":"a.1) Người nộp thuế thuộc trường hợp quy định tại điểm a, b, c khoản 1 Điều này: trước thời điểm thông báo tạm hoãn xuất cảnh 30 ngày, cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế gửi đến tài khoản giao dịch thuế điện tử của người nộp thuế thông báo về việc sẽ áp dụng biện pháp tạm hoãn xuất cảnh, đồng thời công khai thông báo này trên trang thông tin điện tử của cơ quan quản lý thuế."},{"k":"p","t":"Đến thời hạn ghi trên thông báo sẽ áp dụng biện pháp tạm hoãn xuất cảnh mà người nộp thuế chưa hoàn thành nghĩa vụ nộp thuế theo ngưỡng quy định tại điểm a, b, c khoản 1 Điều này thì cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế gửi thông báo về việc áp dụng biện pháp tạm hoãn xuất cảnh đến Hệ thống của cơ quan quản lý xuất nhập cảnh, đến tài khoản giao dịch thuế điện tử của người nộp thuế và của người bị tạm hoãn xuất cảnh, đồng thời công khai thông báo này trên trang thông tin điện tử của cơ quan quản lý thuế;"},{"k":"p","t":"a.2) Người nộp thuế thuộc trường hợp quy định tại điểm d khoản 1 Điều này: cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế gửi thông báo về việc áp dụng biện pháp tạm hoãn xuất cảnh đến Hệ thống của cơ quan quản lý xuất nhập cảnh và đến tài khoản giao dịch thuế điện tử của người bị tạm hoãn xuất cảnh, đồng thời công khai thông báo này trên trang thông tin điện tử của cơ quan quản lý thuế;"},{"k":"p","t":"a.3) Người nộp thuế thuộc trường hợp quy định tại điểm đ khoản 1 Điều này: khi có căn cứ xác định cá nhân là người Việt Nam xuất cảnh để định cư ở nước ngoài, cá nhân là người Việt Nam định cư ở nước ngoài còn tiền thuế nợ, cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế gửi thông báo về việc áp dụng biện pháp tạm hoãn xuất cảnh đến Hệ thống của cơ quan quản lý xuất nhập cảnh và đến tài khoản giao dịch thuế điện tử của người bị tạm hoãn xuất cảnh, đồng thời công khai thông báo này trên trang thông tin điện tử của cơ quan quản lý thuế."},{"k":"p","t":"b) Đối với cơ quan quản lý xuất nhập cảnh: ngay trong ngày nhận được thông báo tạm hoãn xuất cảnh từ hệ thống của cơ quan quản lý thuế, cơ quan quản lý xuất nhập cảnh có trách nhiệm thực hiện việc tạm hoãn xuất cảnh theo quy định."},{"k":"p","t":"4. Trình tự gia hạn tạm hoãn xuất cảnh đối với người nước ngoài"},{"k":"p","t":"Chậm nhất 30 ngày trước ngày hết thời hạn tạm hoãn xuất cảnh đối với người nước ngoài theo quy định của pháp luật xuất cảnh, nhập cảnh của người nước ngoài tại Việt Nam mà người nộp thuế chưa hoàn thành nghĩa vụ nộp thuế theo quy định tại điểm a.1 và điểm a.3 khoản 5 Điều này, cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế gửi thông báo gia hạn tạm hoãn xuất cảnh đến hệ thống của cơ quan quản lý xuất nhập cảnh và đến tài khoản giao dịch thuế điện tử của người bị tạm hoãn xuất cảnh, đồng thời công khai trên trang thông tin điện tử của cơ quan quản lý thuế."},{"k":"p","t":"5. Trình tự hủy bỏ tạm hoãn xuất cảnh:"},{"k":"p","t":"a) Đối với cơ quan quản lý thuế:"},{"k":"p","t":"a.1) Đối với người nộp thuế thuộc trường hợp quy định tại điểm a và điểm b khoản 1 Điều này, cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế ban hành thông báo hủy bỏ tạm hoãn xuất cảnh ngay sau khi xác định người nộp thuế đã thực hiện nghĩa vụ nộp thuế mà số tiền thuế nợ còn phải nộp dưới ngưỡng 50 triệu đồng đối với cá nhân kinh doanh, hộ kinh doanh hoặc 500 triệu đồng đối với doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã hoặc được xóa tiền thuế nợ theo quy định;"},{"k":"p","t":"a.2) Đối với người nộp thuế thuộc trường hợp quy định tại điểm c khoản 1 Điều này, cơ quan quản lý thuế ban hành thông báo hủy bỏ tạm hoãn xuất cảnh khi người nộp thuế có hồ sơ đề nghị khôi phục mã số thuế, thực hiện nghĩa vụ nộp hồ sơ khai thuế và nộp tiền thuế nợ mà số tiền thuế nợ còn phải nộp dưới ngưỡng 50 triệu đồng đối với cá nhân kinh doanh, hộ kinh doanh hoặc 500 triệu đồng đối với doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã hoặc người nộp thuế được chấm dứt hiệu lực mã số thuế theo quy định;"},{"k":"p","t":"a.3) Đối với người nộp thuế thuộc trường hợp quy định tại điểm d và điểm đ khoản 1 Điều này, cơ quan quản lý thuế thông qua Hệ thống thông tin quản lý thuế ban hành thông báo hủy bỏ tạm hoãn xuất cảnh ngay sau khi xác định người nộp thuế đã hoàn thành nghĩa vụ nộp thuế hoặc được xóa tiền thuế nợ theo quy định;"},{"k":"p","t":"b) Trường hợp người nộp thuế đã thực hiện nghĩa vụ nộp thuế theo quy định tại điểm a nêu trên nhưng thông tin chưa được cập nhật trên Hệ thống thông tin quản lý thuế, người nộp thuế gửi thông tin phản hồi về việc đã nộp thuế kèm theo bản chụp chứng từ nộp tiền vào ngân sách nhà nước đến cơ quan quản lý thuế theo phương thức điện tử qua Hệ thống thông tin quản lý thuế. Cơ quan quản lý thuế cập nhật thông tin và ban hành thông báo hủy bỏ tạm hoãn xuất cảnh trên hệ thống ngay sau khi nhận được thông tin phản hồi của người nộp thuế;"},{"k":"p","t":"c) Đối với cơ quan quản lý xuất nhập cảnh: cơ quan quản lý xuất nhập cảnh thực hiện hủy bỏ tạm hoãn xuất cảnh ngay sau khi nhận được thông báo từ hệ thống của cơ quan quản lý thuế."},{"k":"p","t":"6. Phương thức kết nối, truyền nhận thông tin, dữ liệu giữa cơ quan quản lý thuế, cơ quan quản lý xuất nhập cảnh và người nộp thuế:"},{"k":"p","t":"a) Thông báo về việc tạm hoãn xuất cảnh, gia hạn tạm hoãn xuất cảnh, hủy bỏ tạm hoãn xuất cảnh được gửi đến cơ quan quản lý xuất nhập cảnh bằng việc truyền nhận dữ liệu theo thời gian thực giữa Hệ thống thông tin quản lý thuế của cơ quan quản lý thuế và Hệ thống của cơ quan quản lý xuất nhập cảnh;"},{"k":"p","t":"b) Trường hợp chưa đủ điều kiện để truyền nhận dữ liệu theo quy định tại Điều này thì thông báo về việc tạm hoãn xuất cảnh, gia hạn tạm hoãn xuất cảnh, hủy bỏ tạm hoãn xuất cảnh được gửi qua đường bưu chính giữa cơ quan quản lý thuế, người nộp thuế và cơ quan quản lý xuất nhập cảnh."},{"k":"p","t":"HOÀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT; MIỄN THUẾ; GIẢM THUẾ, KHOẢN THU KHÁC; KHÔNG CHỊU THUẾ"}]},{"id":"nd252_29","no":29,"code":"Điều 29","title":"Điều 29. Các trường hợp hoàn thuế, không hoàn thuế","shortTitle":"Các trường hợp hoàn thuế, không hoàn thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Các trường hợp hoàn thuế quy định tại điểm a khoản 1 Điều 18 Luật Quản lý thuế thực hiện theo quy định của pháp luật về thuế. Riêng đối với xăng, dầu bán cho phương tiện vận tải của hãng nước ngoài trên tuyến đường qua cảng Việt Nam hoặc phương tiện vận tải của Việt Nam trên tuyến đường vận tải quốc tế thuộc đối tượng hoàn thuế theo quy định của pháp luật thuế bảo vệ môi trường thì thực hiện thủ tục hoàn thuế theo quy định về hoàn trả tiền nộp thừa."},{"k":"p","t":"2. Các trường hợp hoàn trả tiền nộp thừa quy định tại điểm b khoản 1 Điều 18 Luật Quản lý thuế:"},{"k":"p","t":"a) Hoàn trả tiền thuế thu nhập cá nhân đối với tổ chức, cá nhân trả thu nhập từ tiền lương, tiền công thực hiện quyết toán cho các cá nhân có ủy quyền;"},{"k":"p","t":"b) Hoàn trả tiền thuế đối với tổ chức, cá nhân theo Hiệp định tránh đánh thuế hai lần và hoàn trả tiền thuế, khoản thu khác theo Điều ước quốc tế khác;"},{"k":"p","t":"c) Hoàn trả tiền thuế đối với doanh nghiệp, tổ chức khi giải thể, phá sản;"},{"k":"p","t":"d) Hoàn trả tiền thuế thu nhập cá nhân đối với cá nhân có thu nhập từ tiền lương, tiền công trực tiếp quyết toán thuế với cơ quan thuế;"},{"k":"p","t":"đ) Hoàn trả số tiền thuế nộp thừa cho hộ kinh doanh, cá nhân kinh doanh theo quy định tại khoản 1, 2 và 3 Điều 12 Nghị định số 68/2026/NĐ-CP của Chính phủ (được sửa đổi, bổ sung bởi Nghị định số 141/2026/NĐ-CP);"},{"k":"p","t":"e) Hoàn trả tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp thừa quy định tại khoản 1 Điều 15 Luật Quản lý thuế không thuộc quy định tại điểm a, b, c, d và đ khoản này."},{"k":"p","t":"3. Trường hợp hoàn trả cho cá nhân theo quy định tại điểm c khoản 1 Điều 18 Luật Quản lý thuế."},{"k":"p","t":"4. Các trường hợp không hoàn thuế:"},{"k":"p","t":"a) Cá nhân có số tiền thuế nộp thừa hằng năm sau quyết toán thuế thu nhập cá nhân từ tiền lương, tiền công trên hồ sơ khai quyết toán thuế từ 50.000 đồng trở xuống thì thực hiện bù trừ số thuế nộp thừa với số thuế phải nộp của kỳ tính thuế tiếp theo;"},{"k":"p","t":"b) Hộ kinh doanh, cá nhân kinh doanh có số tiền thuế nộp thừa của cả năm trên hồ sơ khai thuế, hồ sơ quyết toán thuế từ 50.000 đồng trở xuống thì thực hiện bù trừ số thuế nộp thừa với số thuế phải nộp của kỳ tính thuế tiếp theo."},{"k":"p","t":"5. Bộ trưởng Bộ Tài chính hướng dẫn Điều này và về tiêu chuẩn, hồ sơ, thủ tục lựa chọn, điều chỉnh, chấm dứt doanh nghiệp bán hàng hoàn thuế giá trị gia tăng đối với hàng hóa của người nước ngoài, người Việt Nam định cư ở nước ngoài (sau đây gọi tắt là người nước ngoài) mang theo khi xuất cảnh; tiêu chuẩn, thủ tục lựa chọn, chấm dứt đối với đại lý hoàn thuế giá trị gia tăng cho người nước ngoài; lựa chọn, tạm dừng, chấm dứt áp dụng hoàn thuế giá trị gia tăng cho người nước ngoài đối với cảng hàng không quốc tế, cảng biển quốc tế; quy định việc truy cập, trao đổi và kết nối thông tin của Hệ thống quản lý hoàn thuế giá trị gia tăng cho người nước ngoài; địa điểm kiểm tra hàng hóa, kiểm tra hóa đơn kiêm tờ khai hoàn thuế, địa điểm trả tiền hoàn thuế giá trị gia tăng cho người nước ngoài; quy định trách nhiệm, quyền hạn của các cơ quan, tổ chức, cá nhân liên quan trong việc thực hiện hoàn thuế giá trị gia tăng cho người nước ngoài."}]},{"id":"nd252_30","no":30,"code":"Điều 30","title":"Điều 30. Các trường hợp hoàn thuế trước hoặc kiểm tra trước hoàn thuế","shortTitle":"Các trường hợp hoàn thuế trước hoặc kiểm tra trước hoàn thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Các trường hợp kiểm tra trước hoàn thuế thuộc thẩm quyền của cơ quan thuế thực hiện gồm:"},{"k":"p","t":"a) Hoàn thuế lần đầu đối với hồ sơ hoàn thuế theo quy định của pháp luật về thuế theo từng dự án đầu tư, từng trường hợp hoàn thuế. Trường hợp người nộp thuế có hồ sơ hoàn thuế theo từng dự án đầu tư, từng trường hợp hoàn thuế gửi cơ quan thuế lần đầu nhưng không thuộc trường hợp được hoàn thuế theo quy định thì lần đề nghị hoàn thuế kế tiếp vẫn xác định là hoàn thuế lần đầu;"},{"k":"p","t":"b) Hồ sơ của người nộp thuế đề nghị hoàn thuế trong thời hạn 02 năm kể từ thời điểm bị xử lý về hành vi trốn thuế."},{"k":"p","t":"Trường hợp người nộp thuế có nhiều lần đề nghị hoàn thuế trong thời hạn 02 năm, nếu trong lần đề nghị hoàn thuế đầu tiên tính từ sau thời điểm bị xử lý về hành vi trốn thuế, cơ quan thuế kiểm tra hồ sơ hoàn thuế của người nộp thuế không có hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được hoàn quy định tại khoản 2 Điều 45 Luật Quản lý thuế hoặc hành vi trốn thuế quy định tại khoản 4 Điều 45 Luật Quản lý thuế thì những lần đề nghị hoàn thuế tiếp theo, hồ sơ hoàn thuế của người nộp thuế không thuộc diện kiểm tra trước hoàn thuế. Trường hợp phát hiện những lần đề nghị hoàn thuế tiếp theo, người nộp thuế có hành vi khai sai đối với hồ sơ hoàn thuế, hành vi trốn thuế quy định tại Điều 45 Luật Quản lý thuế thì hồ sơ đề nghị hoàn thuế vẫn thuộc diện kiểm tra trước hoàn thuế trong thời hạn 02 năm kể từ thời điểm bị xử lý về hành vi trốn thuế;"},{"k":"p","t":"c) Hồ sơ hoàn thuế hoặc một phần số tiền đề nghị hoàn thuế trong hồ sơ hoàn thuế được xác định có rủi ro cao trong quản lý thuế;"},{"k":"p","t":"d) Hồ sơ hoàn thuế đối với doanh nghiệp, tổ chức khi giải thể, phá sản. Trường hợp đã kiểm tra quyết toán, cơ quan thuế không phân loại hồ sơ hoàn thuế và giải quyết hoàn thuế trên cơ sở kết quả kiểm tra."},{"k":"p","t":"2. Các trường hợp kiểm tra trước hoàn thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc thẩm quyền của cơ quan hải quan thực hiện:"},{"k":"p","t":"a) Hồ sơ hoàn thuế của người nộp thuế đề nghị hoàn thuế lần đầu của từng trường hợp hoàn thuế theo quy định của pháp luật về thuế. Trường hợp người nộp thuế có hồ sơ hoàn thuế gửi cơ quan hải quan lần đầu nhưng không thuộc diện được hoàn thuế theo quy định thì lần đề nghị hoàn thuế kế tiếp vẫn xác định là đề nghị hoàn thuế lần đầu;"},{"k":"p","t":"b) Hồ sơ hoàn thuế của người nộp thuế trong thời hạn 02 năm kể từ thời điểm bị xử lý về hành vi trốn thuế hoặc hành vi buôn lậu, vận chuyển trái phép hàng hóa qua biên giới tính đến ngày nộp hồ sơ hoàn thuế;"},{"k":"p","t":"c) Hồ sơ hoàn thuế của tổ chức giải thể, phá sản, chấm dứt hoạt động, bán, giao và chuyển giao doanh nghiệp nhà nước;"},{"k":"p","t":"d) Hồ sơ hoàn thuế thuộc loại rủi ro về thuế cao theo phân loại quản lý rủi ro trong quản lý thuế;"},{"k":"p","t":"đ) Hồ sơ hoàn thuế đối với hàng hóa xuất khẩu, nhập khẩu không thực hiện thanh toán qua ngân hàng thương mại, tổ chức tín dụng khác theo quy định của pháp luật;"},{"k":"p","t":"e) Hồ sơ hoàn thuế của người nộp thuế trong thời hạn 12 tháng tính đến ngày nộp hồ sơ đề nghị hoàn thuế được cơ quan hải quan xác định có hành vi vi phạm về hải quan đã bị xử lý quá 02 lần (bao gồm cả hành vi khai sai dẫn đến thiếu số tiền thuế phải nộp hoặc tăng số tiền thuế được miễn, giảm, hoàn, không thu) với mức phạt tiền vượt thẩm quyền của Đội trưởng Hải quan theo quy định của pháp luật về xử lý vi phạm hành chính;"},{"k":"p","t":"g) Hồ sơ hoàn thuế của người nộp thuế đang bị cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"h) Hàng hóa thuộc đối tượng chịu thuế tiêu thụ đặc biệt;"},{"k":"p","t":"i) Hàng hóa nhập khẩu nhưng phải tái xuất trả lại nước ngoài (hoặc tái xuất sang nước thứ ba hoặc tái xuất vào khu phi thuế quan) không cùng một cửa khẩu; hàng hóa xuất khẩu nhưng phải tái nhập khẩu trở lại Việt Nam không cùng một cửa khẩu."},{"k":"p","t":"Quy định tại khoản này không áp dụng đối với trường hợp xử lý tiền thuế, tiền chậm nộp, tiền phạt nộp thừa của hàng hóa xuất khẩu, nhập khẩu."},{"k":"p","t":"3. Các trường hợp hoàn thuế trước cho người nộp thuế là hồ sơ hoàn thuế không thuộc trường hợp kiểm tra trước hoàn thuế theo quy định tại khoản 1 và khoản 2 Điều này."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính hướng dẫn Điều này."}]},{"id":"nd252_31","no":31,"code":"Điều 31","title":"Điều 31. Thời hạn tiếp nhận, giải quyết và phản hồi thông tin hồ sơ hoàn thuế của cơ quan quản lý thuế","shortTitle":"Thời hạn tiếp nhận, giải quyết và phản hồi thông tin hồ sơ hoàn thuế của cơ quan quản lý thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Thời hạn tiếp nhận, phản hồi thông tin hồ sơ hoàn thuế:"},{"k":"p","t":"a) Cơ quan quản lý thuế có thông báo tiếp nhận hoặc không tiếp nhận hồ sơ hoàn thuế cho người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày nhận được hồ sơ của người nộp thuế;"},{"k":"p","t":"b) Trường hợp hồ sơ hoàn thuế đồng thời là hồ sơ khai thuế thì thông báo tiếp nhận hồ sơ khai thuế là thông báo tiếp nhận hồ sơ hoàn thuế."},{"k":"p","t":"2. Thời hạn giải quyết hồ sơ hoàn thuế của cơ quan thuế:"},{"k":"p","t":"a) Đối với trường hợp thuộc diện hoàn thuế trước: chậm nhất là 06 ngày làm việc kể từ ngày cơ quan thuế có thông báo tiếp nhận hồ sơ hoàn thuế, cơ quan thuế có quyết định hoàn thuế, thông báo số tiền đề nghị hoàn nhưng không được hoàn thuế (số tiền đề nghị hoàn nhưng không được hoàn, số tiền đề nghị hoàn nhưng không được hoàn và chuyển khấu trừ, số tiền đề nghị hoàn nhưng không được hoàn, không được khấu trừ), thông báo chuyển hồ sơ, số tiền đề nghị hoàn của người nộp thuế sang diện kiểm tra trước hoàn thuế theo quy định, thông báo hồ sơ, số tiền đề nghị hoàn chưa đủ điều kiện được hoàn thuế. Thời hạn giải quyết hồ sơ hoàn thuế không bao gồm thời gian người nộp thuế thực hiện giải trình, bổ sung thông tin tài liệu theo yêu cầu của cơ quan thuế;"},{"k":"p","t":"b) Đối với trường hợp thuộc diện kiểm tra trước hoàn thuế: chậm nhất là 10 ngày làm việc kể từ ngày cơ quan thuế ban hành kết luận hoặc quyết định xử lý vi phạm sau khi kiểm tra tại trụ sở người nộp thuế, cơ quan thuế có quyết định hoàn thuế, thông báo số tiền đề nghị hoàn nhưng không hoàn thuế (số tiền đề nghị hoàn nhưng không được hoàn, số tiền đề nghị hoàn nhưng không được hoàn và chuyển khấu trừ, số tiền đề nghị hoàn nhưng không được hoàn, không được khấu trừ), thông báo hồ sơ, số tiền đề nghị hoàn chưa đủ điều kiện được hoàn thuế. Thời hạn giải quyết hồ sơ hoàn thuế không bao gồm thời gian người nộp thuế thực hiện giải trình, bổ sung thông tin tài liệu theo yêu cầu của cơ quan thuế."},{"k":"p","t":"3. Thời hạn giải quyết hồ sơ hoàn thuế của cơ quan hải quan:"},{"k":"p","t":"a) Đối với trường hợp thuộc diện hoàn thuế trước: chậm nhất là 06 ngày làm việc kể từ ngày có thông báo tiếp nhận hồ sơ hoàn thuế, cơ quan hải quan có quyết định hoàn thuế hoặc thông báo hồ sơ đề nghị hoàn thuế chưa đủ điều kiện hoàn thuế. Thời hạn giải quyết hồ sơ hoàn thuế không bao gồm thời gian người nộp thuế giải trình, bổ sung thông tin tài liệu theo yêu cầu của cơ quan hải quan;"},{"k":"p","t":"b) Đối với trường hợp thuộc diện kiểm tra trước hoàn thuế: chậm nhất là 10 ngày làm việc kể từ ngày cơ quan hải quan ban hành kết luận kiểm tra tại trụ sở người nộp thuế, cơ quan hải quan có quyết định hoàn thuế hoặc thông báo hồ sơ đề nghị hoàn thuế chưa đủ điều kiện hoàn thuế."},{"k":"p","t":"4. Bộ trưởng Bộ Tài chính hướng dẫn Điều này."}]},{"id":"nd252_32","no":32,"code":"Điều 32","title":"Điều 32. Các trường hợp miễn thuế, giảm thuế, không thu thuế, không chịu thuế","shortTitle":"Các trường hợp miễn thuế, giảm thuế, không thu thuế, không chịu thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 4","level":1,"content":[{"k":"p","t":"1. Các trường hợp miễn thuế, giảm thuế, không thu thuế (không phải nộp thuế), không chịu thuế quy định tại điểm a khoản 1 Điều 19 Luật Quản lý thuế gồm:"},{"k":"p","t":"a) Các trường hợp miễn thuế, giảm thuế thuộc thẩm quyền của cơ quan thuế thực hiện theo quy định của pháp luật về thuế, pháp luật phí, lệ phí và pháp luật khác có liên quan;"},{"k":"p","t":"b) Các trường hợp miễn thuế, giảm thuế, không thu thuế, không chịu thuế đối với hàng hóa xuất khẩu, hàng hóa nhập khẩu thuộc thẩm quyền của cơ quan hải quan thực hiện theo quy định của pháp luật về thuế;"},{"k":"p","t":"c) Các trường hợp miễn thuế, giảm thuế theo quy định tại các Nghị quyết của Quốc hội, Quyết định của Thủ tướng Chính phủ;"},{"k":"p","t":"d) Miễn thuế, giảm thuế theo quy định của Hiệp định tránh đánh thuế hai lần và Điều ước quốc tế khác."},{"k":"p","t":"2. Các trường hợp miễn thuế theo quy định tại điểm b khoản 1 Điều 19 Luật Quản lý thuế gồm:"},{"k":"p","t":"a) Miễn thuế thu nhập cá nhân đối với cá nhân có số tiền thuế phát sinh phải nộp hằng năm sau quyết toán thuế thu nhập cá nhân từ tiền l
