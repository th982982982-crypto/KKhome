tác để nâng cao hiệu quả quản lý thuế;"},{"k":"p","t":"d) Khoản 5 Điều 11 về sử dụng mã số thuế;"},{"k":"p","t":"đ) Khoản 1 Điều 12 về nội dung: trường hợp việc tính thuế, khoản thu khác, thông báo thuế, khoản thu khác do cơ quan quản lý thuế thực hiện; khoản 2 Điều 12 về tổ chức nước ngoài, cá nhân nước ngoài có hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số khác và các dịch vụ khác thì trực tiếp hoặc ủy quyền thực hiện việc khai, nộp thuế, khoản thu khác tại Việt Nam; khoản 3 Điều 12 về khấu trừ, khai thay, nộp thay; điểm b khoản 4 Điều 12 về trường hợp phải kéo dài thời gian gia hạn nộp hồ sơ khai thuế, khoản thu khác; khoản 5 Điều 12 về các trường hợp người nộp thuế phát hiện hồ sơ khai thuế, khoản thu khác đã nộp cho cơ quan thuế có sai, sót được khai bổ sung hồ sơ khai thuế, khoản thu khác trong thời hạn 05 năm kể từ ngày hết thời hạn nộp hồ sơ khai thuế, khoản thu khác của kỳ tính thuế có sai, sót; khoản 6 Điều 12 về khai thuế, khai bổ sung, thời hạn nộp hồ sơ khai thuế, cơ quan hải quan tiếp nhận hồ sơ khai thuế, tỷ giá tính thuế đối với hàng hóa xuất khẩu, hàng hóa nhập khẩu thực hiện theo quy định của pháp luật về hải quan; khoản 7 Điều 12 về các trường hợp được khai, tính thuế bằng ngoại tệ;"},{"k":"p","t":"e) Khoản 1 Điều 14 về thời hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt; điểm c khoản 7 Điều 14 về gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt trong trường hợp đặc biệt;"},{"k":"p","t":"g) Điều 17 về hoàn thành nghĩa vụ nộp thuế;"},{"k":"p","t":"h) Khoản 1 Điều 18 về các trường hợp hoàn thuế, khoản thu khác, tiền chậm nộp, tiền phạt;"},{"k":"p","t":"i) Khoản 1 Điều 19 về các trường hợp miễn thuế, khoản thu khác; giảm thuế, khoản thu khác; không thu thuế; không chịu thuế;"},{"k":"p","t":"k) Điều 20 về khoanh tiền thuế nợ;"},{"k":"p","t":"l) Điểm d khoản 1 Điều 21 về các trường hợp bị ảnh hưởng do thiên tai, thảm họa, dịch bệnh có phạm vi rộng đã được xem xét miễn tiền chậm nộp theo quy định tại khoản 5 Điều 16 của Luật này và đã được gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt theo quy định tại điểm a khoản 7 Điều 14 của Luật này nhưng vẫn không có khả năng phục hồi sản xuất, kinh doanh và không có khả năng nộp tiền thuế nợ;"},{"k":"p","t":"m) Khoản 1 Điều 25 về các trường hợp ấn định thuế; khoản 2 Điều 25 về căn cứ ấn định thuế của cơ quan hải quan đối với hàng hóa xuất khẩu, nhập khẩu;"},{"k":"p","t":"n) Điểm e khoản 2 Điều 30 về hợp tác và hỗ trợ hành chính khác về thuế với cơ quan thuế nước ngoài, tổ chức quốc tế phù hợp với quy định của pháp luật Việt Nam và các điều ước quốc tế, thỏa thuận quốc tế về thuế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết; điểm g khoản 2 Điều 30 về triển khai thực hiện các nghĩa vụ thành viên khác mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên hoặc là bên ký kết; điểm h khoản 2 Điều 30 về tổ chức thu thập, xác minh thông tin từ cơ quan, tổ chức và người nộp thuế theo tiêu chuẩn trao đổi thông tin của Diễn đàn toàn cầu về minh bạch và trao đổi thông tin phục vụ mục đích thuế;"},{"k":"p","t":"o) Khoản 4 Điều 32 về giao dịch giữa người nộp thuế và cơ quan quản lý thuế được thực hiện bằng phương thức điện tử thông qua Hệ thống thông tin quản lý thuế;"},{"k":"p","t":"p) Điều 36 về bảo đảm an toàn thông tin và quản lý rủi ro công nghệ thông tin;"},{"k":"p","t":"q) Khoản 1 Điều 38 về nhiệm vụ của cơ quan quản lý thuế, công chức quản lý thuế;"},{"k":"p","t":"r) Điều 39 về nhiệm vụ, trách nhiệm và quyền hạn của các cơ quan nhà nước, các cơ quan kiểm tra, giám sát, Mặt trận Tổ quốc Việt Nam, các tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp trong quản lý thuế;"},{"k":"p","t":"s) Điều 48 về trường hợp bị cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"t) Điều 49 về biện pháp cưỡng chế thi hành quyết định hành chính về quản lý thuế;"},{"k":"p","t":"u) Điều 50 về thẩm quyền quyết định cưỡng chế thi hành quyết định hành chính về quản lý thuế."},{"k":"p","t":"2. Quy định chi tiết một số nội dung được giao tại Luật Quản lý thuế gồm:"},{"k":"p","t":"a) Khoản 21 Điều 4 về nội dung các trường hợp bất khả kháng khác;"},{"k":"p","t":"b) Khoản 4 Điều 10 về các nội dung sau: thời hạn đăng ký thuế; trách nhiệm của người nộp thuế, cơ quan quản lý thuế, cơ quan nhà nước, tổ chức, cá nhân có liên quan đến đăng ký thuế;"},{"k":"p","t":"c) Khoản 8 Điều 12 về các nội dung sau: các trường hợp không phải nộp hồ sơ khai thuế, khoản thu khác; kỳ tính thuế; thời hạn nộp hồ sơ khai thuế, khoản thu khác, trừ trường hợp quy định tại khoản 9 Điều 12 Luật Quản lý thuế; việc khai thuế, khoản thu khác, tính thuế, khoản thu khác, nộp thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí; tỷ giá khai thuế, khoản thu khác quy đổi; việc kê khai, xác định giá tính thuế đối với giao dịch liên kết, báo cáo lợi nhuận liên quốc gia; phân bổ nghĩa vụ thuế, khoản thu khác phải nộp; trình tự, thủ tục tiếp nhận và xử lý hồ sơ đối với trường hợp cơ quan quản lý thuế tính thuế, khoản thu khác, thông báo thuế, khoản thu khác;"},{"k":"p","t":"d) Khoản 8 Điều 14 về các nội dung sau: thời hạn cơ quan, tổ chức thu tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt nộp tiền vào ngân sách nhà nước; thời gian gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt; hồ sơ, thủ tục gia hạn nộp thuế, khoản thu khác, tiền chậm nộp, tiền phạt đối với trường hợp quy định tại điểm c khoản 7 Điều 14 Luật Quản lý thuế;"},{"k":"p","t":"đ) Điểm b khoản 2 Điều 16 về nội dung: thời gian tính tiền chậm nộp; khoản 6 Điều 16 về các nội dung sau: điều chỉnh mức tính tiền chậm nộp quy định tại điểm a khoản 2 Điều 16 Luật Quản lý thuế phù hợp với tình hình kinh tế - xã hội trong từng thời kỳ, thời gian tính tiền chậm nộp, các trường hợp không tính tiền chậm nộp, chưa tính tiền chậm nộp và điều chỉnh tiền chậm nộp;"},{"k":"p","t":"e) Khoản 6 Điều 18 về các nội dung sau: trường hợp không hoàn thuế; trường hợp hoàn thuế trước cho người nộp thuế; trường hợp kiểm tra trước hoàn thuế; thời hạn tiếp nhận, giải quyết và phản hồi thông tin hồ sơ hoàn thuế của cơ quan quản lý thuế;"},{"k":"p","t":"g) Khoản 5 Điều 19 về các nội dung sau: thời hạn tiếp nhận, giải quyết hồ sơ miễn thuế, giảm thuế, không thu thuế, không chịu thuế;"},{"k":"p","t":"h) Khoản 5 Điều 20 về các nội dung sau: thời gian, số tiền thuế nợ được khoanh; các trường hợp chấm dứt hiệu lực của quyết định khoanh nợ; trách nhiệm của cơ quan nhà nước, cách thức, tiêu chí xác định trường hợp quy định tại điểm e khoản 1 Điều 20 Luật Quản lý thuế;"},{"k":"p","t":"i) Khoản 4 Điều 21 về các nội dung sau: điều kiện xóa tiền thuế nợ; thẩm quyền xóa tiền thuế nợ; thời hạn giải quyết hồ sơ xóa tiền thuế nợ; trách nhiệm phối hợp của các tổ chức, cá nhân trong việc thu hồi tiền thuế nợ đã được xóa;"},{"k":"p","t":"k) Khoản 3 Điều 24 về các nội dung sau: căn cứ ấn định thuế; phương pháp ấn định thuế; thẩm quyền, thủ tục ấn định thuế; trách nhiệm của người nộp thuế, người khai thuế, cơ quan thuế trong việc ấn định thuế;"},{"k":"p","t":"l) Khoản 3 Điều 25 về các nội dung sau: phương pháp ấn định thuế; thẩm quyền, thủ tục ấn định thuế; trách nhiệm của người nộp thuế, người khai thuế, cơ quan hải quan trong việc ấn định thuế;"},{"k":"p","t":"m) Điểm c khoản 1 Điều 34 về các nội dung sau: áp dụng chế độ ưu tiên đối với người nộp thuế tuân thủ tốt pháp luật về thuế, sẵn sàng kết nối, chia sẻ dữ liệu điện tử với cơ quan quản lý thuế, bao gồm dữ liệu về sổ kế toán, hóa đơn, chứng từ và các tài liệu liên quan đến nghĩa vụ thuế thông qua Hệ thống thông tin quản lý thuế; điều kiện, phạm vi và hình thức áp dụng chế độ ưu tiên đối với người nộp thuế tuân thủ pháp luật;"},{"k":"p","t":"n) Khoản 15 Điều 39 về các nội dung sau: nội dung, hình thức, phạm vi, thời hạn cung cấp thông tin, trách nhiệm, quyền hạn của các bên liên quan trong việc chia sẻ, kết nối thông tin phục vụ quản lý thuế;"},{"k":"p","t":"o) Điểm h khoản 3 Điều 40 về nội dung: tổ chức, cá nhân chi trả thu nhập cung cấp thông tin về chi trả thu nhập và số tiền thuế khấu trừ của người nộp thuế, số tiền thuế, khoản thu khác đã kê khai thay, nộp thay cho cơ quan quản lý thuế; khoản 8 Điều 40 về các nội dung sau: nhiệm vụ, quyền hạn của cơ quan thông tin, báo chí và tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán, tổ chức cung ứng dịch vụ thanh toán trực tuyến (nếu có) và nội dung, hình thức, phương thức và thời hạn cung cấp thông tin trong việc chia sẻ, kết nối thông tin phục vụ quản lý thuế quy định tại Điều 40 Luật Quản lý thuế; tiêu chuẩn kinh doanh dịch vụ làm thủ tục về thuế;"},{"k":"p","t":"p) Khoản 5 Điều 49 về trình tự thực hiện các biện pháp cưỡng chế."},{"k":"p","t":"3. Quy định biện pháp thi hành một số Điều của Luật Quản lý thuế gồm:"},{"k":"p","t":"a) Nội dung, hình thức, thẩm quyền, chấm dứt, cập nhật việc công khai thông tin người nộp thuế của cơ quan quản lý thuế;"},{"k":"p","t":"b) Quản lý thuế đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số: phạm vi trách nhiệm, cách thức khấu trừ, khai thay và nộp thay số thuế đã khấu trừ của chủ quản nền tảng thương mại điện tử có chức năng đặt hàng trực tuyến và chức năng thanh toán, của tổ chức kinh doanh tại Việt Nam có hoạt động kinh tế số khác; quyền và trách nhiệm của hộ, cá nhân kinh doanh trên nền tảng thương mại điện tử;"},{"k":"p","t":"c) Nguyên tắc và nội dung ứng dụng công nghệ, dữ liệu và chuyển đổi số trong quản lý thuế;"},{"k":"p","t":"d) Hệ thống thông tin quản lý thuế gồm: cơ sở dữ liệu trong Hệ thống thông tin quản lý thuế, Hệ thống thông tin quản lý thuế, yêu cầu của thu thập, cập nhật thông tin vào Hệ thống thông tin quản lý thuế, nguyên tắc kết nối, chia sẻ thông tin, dữ liệu, hình thức kết nối, chia sẻ, thời hạn cung cấp thông tin, dữ liệu;"},{"k":"p","t":"đ) Nội dung, hình thức kết nối, chia sẻ dữ liệu điện tử, cung cấp thông tin của người nộp thuế với cơ quan quản lý thuế; việc vận hành hạ tầng kỹ thuật để thực hiện giao dịch điện tử, kết nối thông tin nghĩa vụ thuế của cơ quan quản lý thuế;"},{"k":"p","t":"e) Thẩm quyền phục hồi số tiền thuế nợ đã được xóa;"},{"k":"p","t":"g) Việc nộp đơn yêu cầu áp dụng thủ tục phá sản của cơ quan quản lý thuế đối với doanh nghiệp, hợp tác xã."}]},{"id":"nd252_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế bao gồm:"},{"k":"p","t":"a) Người nộp thuế thực hiện theo quy định tại khoản 1 Điều 2 Luật Quản lý thuế;"},{"k":"p","t":"b) Tổ chức, cá nhân thực hiện khấu trừ, khai và nộp thay số thuế đã khấu trừ quy định tại điểm đ khoản 1 Điều 2 Luật Quản lý thuế gồm:"},{"k":"p","t":"b.1) Tổ chức là nhà quản lý nền tảng số nước ngoài thực hiện khấu trừ, nộp thay nghĩa vụ thuế phải nộp của nhà cung cấp nước ngoài, tổ chức kinh doanh tại Việt Nam áp dụng phương pháp tính thuế giá trị gia tăng là phương pháp khấu trừ thuế mua dịch vụ của nhà cung cấp nước ngoài không có cơ sở thường trú tại Việt Nam thông qua kênh thương mại điện tử hoặc các nền tảng số thực hiện khấu trừ, nộp thay nghĩa vụ thuế phải nộp của nhà cung cấp nước ngoài quy định tại khoản 4 Điều 4 Luật Thuế giá trị gia tăng;"},{"k":"p","t":"b.2) Tổ chức là nhà quản lý sàn giao dịch thương mại điện tử, nhà quản lý nền tảng số có chức năng thanh toán thực hiện khấu trừ, nộp thay thuế, kê khai số thuế đã khấu trừ cho hộ kinh doanh, cá nhân kinh doanh trên sàn thương mại điện tử, nền tảng số quy định tại khoản 5 Điều 4 Luật Thuế giá trị gia tăng;"},{"k":"p","t":"b.3) Chủ quản nền tảng thương mại điện tử, nền tảng số khác (trong nước hoặc nước ngoài) có chức năng đặt hàng trực tuyến và chức năng thanh toán có trách nhiệm khấu trừ, khai và nộp thay số thuế đã khấu trừ của hộ kinh doanh, cá nhân kinh doanh quy định tại điểm a khoản 4 Điều 13 Luật Quản lý thuế;"},{"k":"p","t":"b.4) Tổ chức, cá nhân thực hiện khấu trừ, khai và nộp thay số thuế thu nhập cá nhân đã khấu trừ theo quy định của pháp luật về thuế thu nhập cá nhân;"},{"k":"p","t":"b.5) Tổ chức, cá nhân khác với tổ chức, cá nhân quy định tại điểm b.1, b.2, b.3, b.4 khoản này thực hiện khấu trừ, khai thuế thay, nộp thay số thuế đã khấu trừ cho người nộp thuế theo quy định của pháp luật."},{"k":"p","t":"2. Cơ quan quản lý thuế bao gồm:"},{"k":"p","t":"a) Cơ quan Thuế bao gồm Cục Thuế, Chi cục Thuế doanh nghiệp lớn, Chi cục Thuế thương mại điện tử, Thuế tỉnh, thành phố và Thuế cơ sở;"},{"k":"p","t":"b) Cơ quan Hải quan bao gồm Cục Hải quan, Chi cục Kiểm tra sau thông quan, Chi cục Điều tra chống buôn lậu và cơ quan hải quan khác thuộc Cục Hải quan được giao chức năng quản lý thuế; Chi cục Hải quan khu vực và cơ quan hải quan thuộc Chi cục Hải quan khu vực; Hải quan cửa khẩu, ngoài cửa khẩu."},{"k":"p","t":"3. Công chức quản lý thuế quy định tại khoản 3 Điều 2 Luật Quản lý thuế."},{"k":"p","t":"4. Cơ quan nhà nước, tổ chức, cá nhân khác có liên quan quy định tại khoản 4 Điều 2 Luật Quản lý thuế."}]},{"id":"nd252_3","no":3,"code":"Điều 3","title":"Điều 3. Giải thích từ ngữ","shortTitle":"Giải thích từ ngữ","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế bị thiệt hại về vật chất do nguyên nhân bất khả kháng khác quy định tại khoản 21 Điều 4 Luật Quản lý thuế gồm: chiến tranh, bạo loạn, đình công phải ngừng, nghỉ sản xuất, kinh doanh hoặc rủi ro không thuộc nguyên nhân, trách nhiệm chủ quan của người nộp thuế."},{"k":"p","t":"2. Hệ thống thông tin quản lý thuế được thực hiện theo quy định tại khoản 5 Điều 4 Luật Quản lý thuế; hệ thống này được sử dụng để tiếp nhận, xử lý, trao đổi thông tin, dữ liệu trong quản lý thuế, bao gồm việc thực hiện thủ tục hành chính thuế bằng phương thức điện tử."},{"k":"p","t":"3. Giao dịch điện tử trong quản lý thuế là việc thực hiện các thủ tục hành chính thuế, cung cấp các dịch vụ hỗ trợ và trao đổi thông tin, dữ liệu bằng phương thức điện tử theo quy định của pháp luật về quản lý thuế và pháp luật về giao dịch điện tử."},{"k":"p","t":"4. Tổ chức cung cấp dịch vụ giá trị gia tăng về giao dịch điện tử trong quản lý thuế (sau đây gọi là tổ chức cung cấp dịch vụ T-VAN) là người trung gian theo quy định của pháp luật giao dịch điện tử và đáp ứng yêu cầu về năng lực, kỹ thuật để kết nối với Hệ thống thông tin quản lý thuế để cung cấp dịch vụ đại diện (một phần hoặc toàn bộ) cho người nộp thuế thực hiện việc gửi, nhận, lưu trữ, phục hồi chứng từ điện tử; hỗ trợ khởi tạo, xử lý chứng từ điện tử; xác nhận việc thực hiện giao dịch điện tử giữa người nộp thuế với cơ quan thuế."},{"k":"p","t":"5. Nền tảng thương mại điện tử, nền tảng số có chức năng đặt hàng trực tuyến và chức năng thanh toán là nền tảng số đồng thời đáp ứng các tiêu chí sau:"},{"k":"p","t":"a) Cho phép người mua lựa chọn hàng hóa, dịch vụ và xác lập giao dịch mua bán với người bán thông qua môi trường điện tử do nền tảng cung cấp;"},{"k":"p","t":"b) Trực tiếp hoặc gián tiếp tham gia vào quá trình thanh toán giữa người mua và người bán và có khả năng kiểm soát, đối soát hoặc xác nhận giao dịch thanh toán, bao gồm: thực hiện việc thu tiền từ người mua và chuyển cho người bán; phối hợp với tổ chức, cá nhân khác để thực hiện việc thu, chuyển tiền thanh toán và có khả năng kiểm soát, đối soát hoặc xác nhận giao dịch thanh toán; tổ chức cơ chế thanh toán mà việc hoàn tất giao dịch mua bán gắn với việc xác nhận thanh toán trên nền tảng;"},{"k":"p","t":"c) Việc xác định nền tảng có chức năng thanh toán được căn cứ vào vai trò thực tế của nền tảng trong việc tổ chức, kiểm soát hoặc tham gia vào quá trình thanh toán, không phụ thuộc vào hình thức kỹ thuật hoặc phương thức thanh toán cụ thể."},{"k":"p","t":"Trường hợp nền tảng chỉ cung cấp dịch vụ đăng tải thông tin, quảng cáo, kết nối giao dịch mà không tham gia vào quá trình thanh toán thì không thuộc phạm vi quy định tại khoản này."},{"k":"p","t":"6. Nền tảng thương mại điện tử, nền tảng số có chức năng thanh toán là nền tảng đáp ứng tiêu chí quy định tại điểm b và điểm c khoản 5 Điều này."},{"k":"p","t":"7. Ngày hết thời hạn nộp hồ sơ khai thuế, thời hạn nộp thuế, thời hạn cơ quan quản lý thuế giải quyết hồ sơ thuế là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế, thời hạn nộp thuế, thời hạn cơ quan quản lý thuế giải quyết hồ sơ thuế theo quy định của pháp luật quản lý thuế. Trường hợp ngày cuối cùng của thời hạn nộp hồ sơ khai thuế, thời hạn nộp thuế, thời hạn cơ quan quản lý thuế giải quyết hồ sơ thuế trùng với ngày nghỉ theo quy định thì ngày cuối cùng của thời hạn được tính là ngày làm việc liền kề sau ngày nghỉ đó."}]},{"id":"nd252_4","no":4,"code":"Điều 4","title":"Điều 4. Công khai thông tin người nộp thuế","shortTitle":"Công khai thông tin người nộp thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Cơ quan quản lý thuế công khai thông tin về người nộp thuế thuộc các trường hợp:"},{"k":"p","t":"a) Người nộp thuế thực hiện các hành vi quy định tại khoản 3 Điều 7 Luật Quản lý thuế cụ thể như sau:"},{"k":"p","t":"a.1) Người nộp thuế thực hiện các hành vi trốn thuế, khoản thu khác, chây ỳ không nộp tiền thuế, khoản thu khác, tiền chậm nộp, tiền phạt đúng thời hạn;"},{"k":"p","t":"a.2) Quá 90 ngày kể từ ngày hết thời hạn nộp thuế và các khoản thu khác, tiền chậm nộp, tiền phạt hoặc hết thời hạn chấp hành các quyết định hành chính về quản lý thuế mà người nộp thuế hoặc người bảo lãnh không tự nguyện chấp hành;"},{"k":"p","t":"a.3) Người nộp thuế thực hiện các hành vi vi phạm pháp luật về thuế làm ảnh hưởng đến quyền lợi và nghĩa vụ thuế của tổ chức, cá nhân khác;"},{"k":"p","t":"a.4) Người nộp thuế không thực hiện các yêu cầu của cơ quan quản lý thuế theo quy định của pháp luật: từ chối không cung cấp thông tin tài liệu cho cơ quan quản lý thuế; không chấp hành quyết định kiểm tra và các yêu cầu khác của cơ quan quản lý thuế theo quy định của pháp luật; không thực hiện yêu cầu giải trình của cơ quan thuế về rủi ro hóa đơn theo cảnh báo từ hệ thống ứng dụng hóa đơn điện tử của cơ quan thuế; chống, ngăn cản công chức thuế, công chức hải quan thi hành công vụ; cá nhân, tổ chức không chấp hành các quyết định hành chính về quản lý thuế mà có hành vi phát tán tài sản;"},{"k":"p","t":"b) Người nộp thuế không hoạt động tại địa chỉ đã đăng ký; người nộp thuế ngừng hoạt động, chưa hoàn thành thủ tục chấm dứt hiệu lực mã số thuế; người nộp thuế tạm ngừng kinh doanh;"},{"k":"p","t":"c) Các thông tin khác được công khai theo quy định của pháp luật."},{"k":"p","t":"2. Nội dung và hình thức công khai:"},{"k":"p","t":"a) Nội dung thông tin công khai: mã số thuế, tên người nộp thuế, địa chỉ, lý do công khai. Tùy theo từng trường hợp cụ thể cơ quan quản lý thuế có thể công khai chi tiết thêm một số thông tin có liên quan trực tiếp đến nghĩa vụ thuế hoặc trực tiếp đến người nộp thuế để phục vụ công tác quản lý thuế theo quy định của pháp luật."},{"k":"p","t":"Trường hợp người nộp thuế không hoạt động tại địa chỉ đã đăng ký, căn cứ dữ liệu quản lý thuế và thông tin do cơ quan nhà nước có thẩm quyền cung cấp, cơ quan quản lý thuế được công khai thông tin về chủ doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên, thành viên hợp danh, người đại diện theo pháp luật của doanh nghiệp, cá nhân kinh doanh, chủ hộ kinh doanh bao gồm: họ và tên và 04 ký tự cuối của số định danh cá nhân (số căn cước công dân hoặc số hộ chiếu) và che, mã hóa các ký tự còn lại;"},{"k":"p","t":"b) Hình thức công khai thông tin:"},{"k":"p","t":"b.1) Hình thức bắt buộc: đăng tải trên trang thông tin điện tử của cơ quan quản lý thuế các cấp. Đối với trường hợp công khai thông tin của người nộp thuế không thực hiện yêu cầu giải trình của cơ quan thuế về rủi ro hóa đơn theo cảnh báo từ hệ thống ứng dụng hóa đơn điện tử của cơ quan thuế quy định tại điểm a.4 khoản 1 Điều này, Hệ thống thông tin quản lý thuế tự động gửi thông tin cảnh báo đến người mua;"},{"k":"p","t":"b.2) Hình thức lựa chọn bổ sung: căn cứ vào điều kiện thực tế, thủ trưởng cơ quan quản lý thuế quản lý trực tiếp người nộp thuế hoặc cơ quan quản lý thuế nơi quản lý khoản thu ngân sách nhà nước quyết định áp dụng bổ sung một hoặc một số hình thức sau: công khai trên phương tiện thông tin đại chúng; niêm yết tại trụ sở cơ quan quản lý thuế; thông qua việc tiếp công dân, họp báo, thông cáo báo chí, hoạt động của người phát ngôn của cơ quan quản lý thuế các cấp theo quy định của pháp luật; các hình thức công khai khác theo các quy định có liên quan."},{"k":"p","t":"3. Thẩm quyền công khai thông tin:"},{"k":"p","t":"a) Thủ trưởng cơ quan quản lý thuế quản lý trực tiếp người nộp thuế hoặc cơ quan quản lý thuế nơi quản lý khoản thu ngân sách nhà nước căn cứ tình hình thực tế và công tác quản lý thuế trên địa bàn, để quyết định việc lựa chọn các trường hợp công khai thông tin người nộp thuế có vi phạm theo quy định tại khoản 1 Điều này và hình thức công khai thông tin lựa chọn bổ sung quy định tại điểm b.2 khoản 2 Điều này;"},{"k":"p","t":"b) Trước khi công khai thông tin người nộp thuế, cơ quan quản lý thuế phải thực hiện rà soát, đối chiếu để đảm bảo tính chính xác thông tin công khai. Thủ trưởng cơ quan quản lý thuế chịu trách nhiệm tính chính xác của thông tin công khai. Trường hợp thông tin công khai không chính xác, Thủ trưởng cơ quan quản lý thuế thực hiện đính chính thông tin và phải công khai nội dung đã đính chính theo hình thức công khai quy định tại điểm b khoản 2 Điều này;"},{"k":"p","t":"c) Trường hợp công khai thông tin quy định tại điểm a.2 khoản 1 Điều này, Hệ thống thông tin quản lý thuế tự động công khai thông tin trên trang thông tin điện tử của cơ quan quản lý thuế các cấp theo định kỳ hàng tháng."},{"k":"p","t":"4. Chấm dứt, cập nhật công khai thông tin:"},{"k":"p","t":"a) Khi người nộp thuế đã hoàn thành các nghĩa vụ thuế, Hệ thống thông tin quản lý thuế tự động cập nhật trạng thái người nộp thuế hoàn thành nghĩa vụ;"},{"k":"p","t":"b) Đối với trường hợp công khai thông tin quy định tại điểm a.2 khoản 1 Điều này, tại thời điểm công khai thông tin kỳ mới, các thông tin đã công khai trước đó đồng thời chấm dứt hiển thị. Trường hợp người nộp thuế đã hoàn thành nghĩa vụ thuế trước khi thông tin được chấm dứt công khai, trên cơ sở cập nhật của Hệ thống thông tin quản lý thuế, trang thông tin điện tử của cơ quan quản lý thuế các cấp tự động hiển thị bổ sung thông tin về việc người nộp thuế đã hoàn thành nghĩa vụ thuế."},{"k":"p","t":"5. Nguyên tắc công khai thông tin người nộp thuế:"},{"k":"p","t":"a) Việc công khai thông tin người nộp thuế phải đúng thẩm quyền, đúng trường hợp, đúng mục đích quản lý thuế và bảo đảm không xâm phạm quyền, lợi ích hợp pháp của người nộp thuế, tổ chức, cá nhân có liên quan;"},{"k":"p","t":"b) Chỉ công khai thông tin khi có căn cứ pháp lý rõ ràng, dữ liệu đã được rà soát, đối chiếu, xác minh theo quy định của pháp luật;"},{"k":"p","t":"c) Nội dung thông tin công khai phải bảo đảm mức tối thiểu cần thiết để phục vụ quản lý thuế; việc xử lý, hiển thị, che, ẩn thông tin định danh cá nhân, thông tin cá nhân và thông tin khác có liên quan phải tuân thủ pháp luật về bảo vệ dữ liệu cá nhân và an toàn thông tin mạng;"},{"k":"p","t":"d) Việc công khai thông tin phải bảo đảm khả năng đính chính, cập nhật, chấm dứt công khai kịp thời khi căn cứ công khai không còn hoặc thông tin công khai không chính xác."}]},{"id":"nd252_5","no":5,"code":"Điều 5","title":"Điều 5. Nguồn lực tài chính cho hoạt động của cơ quan quản lý thuế","shortTitle":"Nguồn lực tài chính cho hoạt động của cơ quan quản lý thuế","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Ngân sách nhà nước hằng năm bảo đảm ưu tiên bố trí kinh phí cho cơ quan quản lý thuế để xây dựng và vận hành hệ thống công nghệ thông tin, chuyển đổi số trong quản lý thuế, hóa đơn điện tử, cơ sở vật chất, trang thiết bị và các nhiệm vụ chuyên môn phục vụ công tác để nâng cao hiệu quả quản lý thuế theo quy định của pháp luật về quản lý tài chính ngân sách, đầu tư công, tài sản công, trong đó có các nội dung sau:"},{"k":"p","t":"a) Xây dựng mới, nâng cấp, mở rộng, duy trì và vận hành: hệ thống công nghệ thông tin, hạ tầng kỹ thuật, an toàn thông tin và nền tảng số phục vụ công tác quản lý thuế, hóa đơn điện tử;"},{"k":"p","t":"b) Chuyển đổi số, tự động hóa công tác quản lý thuế dựa trên ứng dụng khoa học, công nghệ và dữ liệu lớn; bảo đảm an toàn dữ liệu, kết nối liên thông, chia sẻ dữ liệu với hệ thống của các cơ quan nhà nước có liên quan;"},{"k":"p","t":"c) Mua sắm tài sản, máy móc, thiết bị phục vụ công tác các chức danh, phục vụ dùng chung và chuyên dùng theo quy định; nâng cấp, sửa chữa, bảo trì tài sản, máy móc, thiết bị hiện có;"},{"k":"p","t":"d) Đầu tư xây dựng mới trụ sở làm việc, vật kiến trúc theo quy định; nâng cấp, sửa chữa, bảo trì trụ sở làm việc, vật kiến trúc hiện có;"},{"k":"p","t":"đ) Các nhiệm vụ nghiệp vụ chuyên môn đặc thù phục vụ công tác của cơ quan quản lý thuế gồm:"},{"k":"p","t":"đ.1) Các nhiệm vụ nghiệp vụ gắn với chức năng quản lý nhà nước: ủy nhiệm thu thuế; mua, quản lý, phát hành vật tư, ấn chỉ; công tác quản lý rủi ro, tuân thủ; bảo đảm hoạt động của các tài sản chuyên dùng; duy trì hoạt động của trung tâm dữ liệu, cổng thông tin thương mại quốc gia; tuyên truyền toàn ngành (tuyên truyền hỗ trợ người nộp thuế, doanh nghiệp thực hiện quy định của pháp luật về quản lý thuế); khuyến khích người mua lấy hóa đơn; khen thưởng người tiêu dùng tố giác người bán không lập và giao hóa đơn điện tử; chỉnh lý tài liệu giấy và số hóa tài liệu lưu trữ; phối hợp với các cơ quan, tổ chức để thực hiện nhiệm vụ quản lý thuế;"},{"k":"p","t":"đ.2) Các nhiệm vụ bảo đảm điều kiện lao động: chi làm thêm giờ, không nghỉ phép năm của công chức, người lao động làm việc tại trung tâm dữ liệu;"},{"k":"p","t":"đ.3) Các nhiệm vụ thực hiện nghĩa vụ pháp lý, hợp tác quốc tế bắt buộc: bồi thường thiệt hại cho tổ chức, cá nhân và thuê luật sư bảo vệ quyền lợi của Nhà nước, của cơ quan quản lý thuế trước tòa án; hợp tác quốc tế về thuế, quản lý thuế quốc tế;"},{"k":"p","t":"đ.4) Các nghiệp vụ chuyên môn khác phát sinh trong thực hiện nhiệm vụ quản lý thuế."},{"k":"p","t":"2. Cơ quan quản lý thuế trong phạm vi dự toán ngân sách nhà nước được giao và theo quy định của pháp luật về quản lý tài chính ngân sách, đầu tư công, tài sản công có trách nhiệm ưu tiên bố trí, sử dụng kinh phí để thực hiện các nhiệm vụ quy định tại khoản 1 Điều này."},{"k":"p","t":"Việc xây dựng, ban hành và thực hiện quy chế chi tiêu nội bộ của cơ quan quản lý thuế bảo đảm phù hợp với chế độ tài chính hiện hành, nguồn tài chính được sử dụng và hoạt động của đơn vị, trong đó:"},{"k":"p","t":"a) Đối với những nội dung chi đã có chế độ, tiêu chuẩn, định mức: thực hiện theo quy định của cơ quan nhà nước có thẩm quyền;"},{"k":"p","t":"b) Đối với những nội dung chi chưa được quy định mức chi: căn cứ tình hình thực tế, cơ quan quản lý thuế quyết định mức chi cho phù hợp và bảo đảm trong dự toán chi thường xuyên ngân sách nhà nước giao theo định mức phân bổ dự toán chi quản lý hành chính."},{"k":"p","t":"THỜI HẠN ĐĂNG KÝ THUẾ; SỬ DỤNG, CHẤM DỨT MÃ SỐ THUẾ; TRÁCH NHIỆM LIÊN QUAN ĐẾN ĐĂNG KÝ THUẾ"}]},{"id":"nd252_6","no":6,"code":"Điều 6","title":"Điều 6. Thời hạn đăng ký thuế","shortTitle":"Thời hạn đăng ký thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Việc đăng ký thuế được thực hiện bằng phương thức điện tử hoặc tự động thông qua Hệ thống thông tin quản lý thuế. Trường hợp thông tin đăng ký thuế được cơ quan thuế tiếp nhận từ cơ quan đăng ký kinh doanh hoặc cơ quan nhà nước có thẩm quyền thông qua kết nối, chia sẻ dữ liệu theo cơ chế một cửa liên thông thì người nộp thuế không phải thực hiện thủ tục đăng ký thuế trực tiếp với cơ quan thuế."},{"k":"p","t":"2. Người nộp thuế thuộc đối tượng đăng ký thuế theo cơ chế một cửa liên thông quy định tại khoản 2 Điều 10 Luật Quản lý thuế thì thời hạn đăng ký thuế là thời hạn đăng ký doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, hộ kinh doanh, đăng ký đơn vị phụ thuộc, địa điểm kinh doanh của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã theo quy định của pháp luật. Trường hợp giải thể hoặc chấm dứt hoạt động, người nộp thuế thực hiện đăng ký giải thể hoặc chấm dứt hoạt động tại cơ quan đăng ký kinh doanh sau khi hoàn thành nghĩa vụ nộp thuế theo quy định của pháp luật."},{"k":"p","t":"3. Người nộp thuế thuộc đối tượng đăng ký thuế trực tiếp với cơ quan thuế quy định tại khoản 3 Điều 10 Luật Quản lý thuế thì thời hạn đăng ký thuế như sau:"},{"k":"p","t":"a) Thời hạn đăng ký thuế lần đầu là 10 ngày làm việc kể từ ngày sau đây:"},{"k":"p","t":"a.1) Ngày được cấp giấy phép thành lập và hoạt động hoặc ngày được cấp quyết định thành lập hoặc giấy tờ tương đương khác do cơ quan có thẩm quyền cấp đối với tổ chức thuộc diện đăng ký hoạt động, kinh doanh hoặc là ngày khai trương hoạt động chi nhánh, văn phòng giao dịch của tổ chức tín dụng;"},{"k":"p","t":"a.2) Ngày bắt đầu hoạt động kinh doanh đối với tổ chức, cá nhân kinh doanh không thuộc diện đăng ký kinh doanh;"},{"k":"p","t":"a.3) Ngày ký hợp đồng nhận thầu đối với nhà thầu, nhà thầu phụ nước ngoài kê khai nộp thuế trực tiếp với cơ quan thuế; ngày ký hợp đồng, hiệp định dầu khí;"},{"k":"p","t":"a.4) Ngày phát sinh nghĩa vụ thuế thu nhập cá nhân đối với cá nhân trực tiếp đăng ký thuế với cơ quan thuế."},{"k":"p","t":"Trường hợp cá nhân trực tiếp đăng ký thuế lần đầu cho người phụ thuộc thì thời hạn đăng ký thuế chậm nhất là ngày 31 tháng 12 của năm tính thuế;"},{"k":"p","t":"a.5) Ngày phát sinh nghĩa vụ với ngân sách nhà nước đối với tổ chức, cá nhân không thuộc các trường hợp quy định tại các điểm a.1, a.2, a.3 và a.4 khoản này và chưa có mã số thuế;"},{"k":"p","t":"b) Tổ chức, cá nhân không thuộc các trường hợp quy định tại điểm a khoản này nhưng thuộc đối tượng được hoàn thuế theo quy định của pháp luật và chưa có mã số thuế thì phải thực hiện đăng ký thuế trước khi thực hiện thủ tục hoàn thuế;"},{"k":"p","t":"c) Tổ chức, cá nhân thực hiện đăng ký thuế để cấp mã số thuế nộp thay quy định tại khoản 4 Điều 11 Luật Quản lý thuế thì thời hạn đăng ký thuế như sau:"},{"k":"p","t":"c.1) Chậm nhất là 10 ngày làm việc kể từ ngày ký hợp đồng, văn bản hợp tác kinh doanh;"},{"k":"p","t":"c.2) Chậm nhất là 10 ngày làm việc kể từ ngày thanh toán hoặc chi trả thu nhập lần đầu cho tổ chức, cá nhân trong trường hợp không ký hợp đồng;"},{"k":"p","t":"c.3) Cùng với thời hạn nộp hồ sơ khai thuế của kỳ tính thuế đầu tiên nếu không thuộc trường hợp tại điểm c.1 và điểm c.2 khoản này;"},{"k":"p","t":"d) Trường hợp người nộp thuế thực hiện đăng ký thuế lần đầu qua hồ sơ khai thuế có tích hợp thông tin đăng ký thuế thì thời hạn đăng ký thuế cùng với thời hạn nộp hồ sơ khai thuế của kỳ tính thuế đầu tiên;"},{"k":"p","t":"đ) Tổ chức, cá nhân chi trả thu nhập có trách nhiệm đăng ký thuế lần đầu thay cho cá nhân có thu nhập chậm nhất là ngày cuối cùng của thời hạn nộp hồ sơ khai thuế thu nhập cá nhân của kỳ đầu tiên phát sinh việc chi trả thu nhập cho cá nhân trong trường hợp cá nhân chưa đăng ký thuế; đăng ký thuế lần đầu thay cho người phụ thuộc của cá nhân chậm nhất là ngày 31 tháng 12 của năm tính thuế;"},{"k":"p","t":"e) Thời hạn thay đổi thông tin đăng ký thuế:"},{"k":"p","t":"e.1) Người nộp thuế đăng ký thuế trực tiếp với cơ quan thuế khi có thay đổi thông tin đăng ký thuế thì phải thông báo cho cơ quan thuế quản lý trực tiếp trong thời hạn 10 ngày làm việc kể từ ngày phát sinh thông tin thay đổi;"},{"k":"p","t":"e.2) Người nộp thuế là cá nhân khi thay đổi thông tin về họ và tên, số định danh cá nhân, ngày tháng năm sinh (đối với người Việt Nam), hộ chiếu (đối với người nước ngoài) thì thời hạn thay đổi thông tin đăng ký thuế là 20 ngày làm việc (riêng các xã miền núi vùng cao, biên giới, hải đảo là 30 ngày) kể từ ngày thay đổi trong Cơ sở dữ liệu quốc gia về dân cư, ngày ghi trên hộ chiếu."},{"k":"p","t":"Trường hợp cá nhân có ủy quyền cho tổ chức, cá nhân chi trả thu nhập thực hiện đăng ký thay đổi thông tin đăng ký thuế cho cá nhân và người phụ thuộc thì phải thông báo cho tổ chức, cá nhân chi trả thu nhập chậm nhất là 10 ngày làm việc kể từ ngày phát sinh thông tin thay đổi; tổ chức, cá nhân chi trả thu nhập có trách nhiệm thông báo cho cơ quan quản lý thuế chậm nhất là 10 ngày làm việc kể từ ngày nhận được ủy quyền của cá nhân;"},{"k":"p","t":"e.3) Người nộp thuế thuộc trường hợp quy định tại điểm e.2 khoản này không phải thực hiện thủ tục thay đổi thông tin với cơ quan thuế trong trường hợp cơ sở dữ liệu quốc gia về dân cư đã kết nối, chia sẻ dữ liệu với cơ sở dữ liệu của cơ quan thuế và tự động đồng bộ khi thông tin của cá nhân có thay đổi. Hệ thống thông tin quản lý thuế thực hiện gửi thông báo tự động cho người nộp thuế biết về thông tin thay đổi đã được cập nhật;"},{"k":"p","t":"g) Thời hạn thông báo tạm ngừng hoạt động, kinh doanh:"},{"k":"p","t":"g.1) Đối với người nộp thuế được cơ quan nhà nước có thẩm quyền chấp thuận, thông báo hoặc yêu cầu tạm ngừng hoạt động, kinh doanh thì cơ quan nhà nước có thẩm quyền gửi văn bản cho cơ quan thuế quản lý trực tiếp người nộp thuế trong thời hạn 03 ngày làm việc kể từ ngày ban hành văn bản. Thời gian tạm ngừng hoạt động, kinh doanh là thời gian được ghi trên văn bản do cơ quan nhà nước có thẩm quyền cấp;"},{"k":"p","t":"g.2) Đối với người nộp thuế không thuộc trường hợp quy định tại điểm g.1 khoản này thì người nộp thuế thực hiện thông báo tạm ngừng hoạt động, kinh doanh đến cơ quan thuế quản lý trực tiếp chậm nhất là 01 ngày làm việc trước khi tạm ngừng hoạt động, kinh doanh. Cơ quan thuế có thông báo xác nhận gửi người nộp thuế về thời gian người nộp thuế đăng ký tạm ngừng hoạt động, kinh doanh chậm nhất trong thời hạn 02 ngày làm việc kể từ ngày nhận được thông báo của người nộp thuế. Người nộp thuế được tạm ngừng hoạt động, kinh doanh không quá 12 tháng đối với 01 lần thông báo;"},{"k":"p","t":"g.3) Người nộp thuế tiếp tục hoạt động, kinh doanh trở lại đúng thời hạn đã đăng ký thì không phải thông báo với cơ quan nơi đã đăng ký tạm ngừng hoạt động, kinh doanh theo quy định;"},{"k":"p","t":"g.4) Trường hợp người nộp thuế hoạt động, kinh doanh trở lại trước thời hạn thì thực hiện như sau:"},{"k":"p","t":"Người nộp thuế thuộc trường hợp quy định tại điểm g.1 khoản này thực hiện thông báo với cơ quan nơi đã đăng ký tạm ngừng hoạt động, kinh doanh và phải thực hiện đầy đủ các quy định về thuế, nộp hồ sơ khai thuế theo quy định."},{"k":"p","t":"Người nộp thuế thuộc trường hợp quy định tại điểm g.2 khoản này thực hiện thông báo đến cơ quan thuế quản lý trực tiếp chậm nhất là 01 ngày làm việc trước khi tiếp tục hoạt động, kinh doanh trở lại trước thời hạn;"},{"k":"p","t":"h) Thời hạn nộp hồ sơ chấm dứt hiệu lực mã số thuế:"},{"k":"p","t":"Người nộp thuế nộp hồ sơ chấm dứt hiệu lực mã số thuế đến cơ quan thuế quản lý trực tiếp trong thời hạn 10 ngày làm việc kể từ ngày có văn bản chấm dứt hoạt động hoặc chấm dứt hoạt động kinh doanh hoặc ngày kết thúc hợp đồng."}]},{"id":"nd252_7","no":7,"code":"Điều 7","title":"Điều 7. Trách nhiệm của người nộp thuế, cơ quan quản lý thuế, cơ quan nhà nước, tổ chức, cá nhân có liên quan đến đăng ký thuế","shortTitle":"Trách nhiệm của người nộp thuế, cơ quan quản lý thuế, cơ quan nhà nước, tổ chức, cá nhân có liên quan đến đăng ký thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Đối với người nộp thuế:"},{"k":"p","t":"Người nộp thuế có trách nhiệm thực hiện đầy đủ các quy định về đăng ký thuế, thay đổi thông tin đăng ký thuế, tạm ngừng hoạt động, kinh doanh, chấm dứt hiệu lực mã số thuế tại Điều 6 Nghị định này và các quy định sau:"},{"k":"p","t":"a) Người nộp thuế phải cung cấp đầy đủ, chính xác, kịp thời thông tin đăng ký thuế của người nộp thuế, đơn vị phụ thuộc, địa điểm kinh doanh khi đăng ký lần đầu và khi có thay đổi; chịu trách nhiệm về tính chính xác của thông tin do mình cung cấp; thực hiện đăng ký thuế đối với đơn vị phụ thuộc theo yêu cầu của cơ quan thuế khi đơn vị phụ thuộc không thực hiện đầy đủ nghĩa vụ đăng ký thuế."},{"k":"p","t":"Người đại diện theo pháp luật, chủ doanh nghiệp thuộc diện có rủi ro về thuế theo tiêu chí phân tích rủi ro của cơ quan thuế có trách nhiệm giải trình, cung cấp thông tin, tài liệu theo yêu cầu của cơ quan thuế, chấp hành các biện pháp quản lý thuế theo thông báo của cơ quan thuế."},{"k":"p","t":"Trường hợp thông tin do cơ quan đăng ký kinh doanh hoặc cơ quan nhà nước có thẩm quyền chuyển sang cơ quan thuế theo cơ chế liên thông chưa đầy đủ theo quy định tại điểm này, người nộp thuế có trách nhiệm bổ sung thông tin đăng ký thuế theo thông báo của cơ quan thuế. Thông tin đăng ký thuế được cơ quan thuế quản lý tập trung, sử dụng thống nhất trong các thủ tục về thuế theo quy định của pháp luật về quản lý thuế;"},{"k":"p","t":"b) Đối với người nộp thuế thay đổi địa chỉ trụ sở sang địa bàn cấp tỉnh khác dẫn đến thay đổi cơ quan thuế quản lý trực tiếp, sau khi hoàn thành thủ tục thay đổi địa chỉ trụ sở, người nộp thuế có trách nhiệm tiếp tục thực hiện các thủ tục về thuế và nghĩa vụ chưa hoàn thành với cơ quan thuế nơi đi như sau:"},{"k":"p","t":"b.1) Nộp đầy đủ hồ sơ khai thuế đã đến hạn nộp tính đến thời điểm thay đổi địa chỉ trụ sở theo quy định;"},{"k":"p","t":"b.2) Nộp đầy đủ số tiền thuế và các khoản thu khác, tiền chậm nộp, tiền phạt theo quy định;"},{"k":"p","t":"b.3) Được đề nghị bù trừ nghĩa vụ thuế, hoàn trả số tiền thuế, các khoản thu khác nộp thừa, trừ trường hợp quy định tại điểm b.4 khoản này;"},{"k":"p","t":"b.4) Được chuyển số thuế giá trị gia tăng đầu vào chưa được khấu trừ hết để bù trừ với số thuế giá trị gia tăng phát sinh sau khi thay đổi cơ quan thuế quản lý. Đối với số thuế thu nhập cá nhân, thuế thu nhập doanh nghiệp và lợi nhuận sau thuế còn lại sau khi trích lập các quỹ đã tạm nộp nhưng chưa đến thời hạn nộp hồ sơ khai quyết toán thuế, người nộp thuế được bù trừ với số thuế phải nộp theo hồ sơ quyết toán thuế tại cơ quan thuế nơi chuyển đến theo quy định của pháp luật;"},{"k":"p","t":"c) Trong thời gian tạm ngừng hoạt động, kinh doanh, người nộp thuế có trách nhiệm:"},{"k":"p","t":"c.1) Người nộp thuế không phải nộp hồ sơ khai thuế, trừ trường hợp người nộp thuế tạm ngừng hoạt động, kinh doanh không trọn tháng, quý, năm dương lịch hoặc năm tài chính thì vẫn phải nộp hồ sơ khai thuế tháng, quý, hồ sơ quyết toán năm;"},{"k":"p","t":"c.2) Người nộp thuế không được sử dụng hóa đơn. Trường hợp người nộp thuế được cơ quan thuế chấp thuận sử dụng hóa đơn theo quy định của pháp luật về hóa đơn thì phải nộp hồ sơ khai thuế theo quy định;"},{"k":"p","t":"c.3) Người nộp thuế phải chấp hành các quyết định, thông báo của cơ quan quản lý thuế về đôn đốc thu nợ, cưỡng chế thi hành quyết định hành chính về quản lý thuế, tạm hoãn xuất cảnh, kiểm tra việc chấp hành pháp luật thuế và xử lý hành vi vi phạm hành chính về quản lý thuế theo quy định của Luật Quản lý thuế;"},{"k":"p","t":"c.4) Trạng thái tạm ngừng hoạt động, kinh doanh của người nộp thuế được cập nhật trên Hệ thống thông tin quản lý thuế và có giá trị sử dụng thống nhất trong việc thực hiện các thủ tục về thuế theo quy định của pháp luật;"},{"k":"p","t":"d) Người nộp thuế khi chấm dứt hiệu lực mã số thuế có trách nhiệm:"},{"k":"p","t":"d.1) Hoàn thành nghĩa vụ nộp hồ sơ khai thuế, nộp thuế và xử lý số tiền thuế nộp thừa, số thuế giá trị gia tăng chưa được khấu trừ (nếu có) theo quy định với cơ quan quản lý thuế, bao gồm cả các nghĩa vụ thuế của đơn vị phụ thuộc, địa điểm kinh doanh, nghĩa vụ thuế theo mã số thuế nộp thay (nếu có);"},{"k":"p","t":"d.2) Trường hợp người nộp thuế là đơn vị chủ quản có các đơn vị phụ thuộc thì toàn bộ các đơn vị phụ thuộc phải hoàn thành thủ tục chấm dứt hiệu lực mã số thuế trước khi chấm dứt hiệu lực mã số thuế của đơn vị chủ quản;"},{"k":"p","t":"đ) Người nộp thuế có hồ sơ đề nghị khôi phục mã số thuế có trách nhiệm nộp đầy đủ hồ sơ khai thuế còn thiếu, hoàn thành nộp đầy đủ số tiền thuế và các khoản thu khác với cơ quan thuế trước khi khôi phục mã số thuế, trừ trường hợp được cơ quan có thẩm quyền khôi phục tình trạng pháp lý hoặc cơ quan nhà nước có thẩm quyền chấp nhận nộp dần tiền thuế nợ theo quy định tại khoản 6 Điều 48 Luật Quản lý thuế;"},{"k":"p","t":"e) Người nộp thuế bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký có trách nhiệm:"},{"k":"p","t":"e.1) Người nộp thuế phải chịu trách nhiệm về các nghĩa vụ thuế trong thời gian bị cơ quan thuế thông báo người nộp thuế không hoạt động tại địa chỉ đã đăng ký bao gồm cả địa chỉ đăng ký của đơn vị phụ thuộc, địa điểm kinh doanh, chấp hành các thông báo, quyết định của cơ quan quản lý thuế và cơ quan nhà nước có thẩm quyền theo quy định của pháp luật;"},{"k":"p","t":"e.2) Người nộp thuế không được thực hiện thủ tục tạm ngừng hoạt động, kinh doanh khi cơ quan thuế đã có thông báo về việc người nộp thuế không hoạt động tại địa chỉ đã đăng ký và chỉ được thực hiện thủ tục tạm ngừng hoạt động, kinh doanh sau khi hoàn thành thủ tục khôi phục mã số thuế;"},{"k":"p","t":"g) Người nộp thuế không phải khai lại thông tin đã có trong hệ thống cơ sở dữ liệu quốc gia, cơ sở dữ liệu của các bộ, ngành đã có kết nối chia sẻ thông tin với Hệ thống thông tin quản lý thuế trừ trường hợp có thay đổi nội dung hoặc theo yêu cầu của cơ quan quản lý thuế để phục vụ kiểm tra thuế;"},{"k":"p","t":"h) Cá nhân là chủ sở hữu doanh nghiệp tư nhân, chủ sở hữu công ty trách nhiệm hữu hạn một thành viên, thành viên hợp danh, chủ hộ kinh doanh, người đại diện theo pháp luật của doanh nghiệp có trách nhiệm hoàn thành nghĩa vụ nộp thuế và các nghĩa vụ có liên quan đến hồ sơ thuế theo quy định của pháp luật đối với doanh nghiệp, hộ kinh doanh bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký hoặc bị cơ quan có thẩm quyền thu hồi giấy chứng nhận đăng ký kinh doanh theo quy định tại Điều 73 Nghị định này trước khi thực hiện thủ tục đăng ký thuế đối với doanh nghiệp, hộ kinh doanh mới do cá nhân là người đại diện theo pháp luật hoặc người quản lý."},{"k":"p","t":"2. Đối với cơ quan thuế:"},{"k":"p","t":"a) Trường hợp hồ sơ đăng ký thuế đầy đủ, cơ quan thuế thông báo về việc chấp nhận hồ sơ và thời hạn giải quyết hồ sơ đăng ký thuế chậm nhất là 03 ngày làm việc kể từ ngày nhận đủ hồ sơ;"},{"k":"p","t":"b) Trường hợp hồ sơ không đầy đủ, cơ quan thuế thông báo cho người nộp thuế chậm nhất là 02 ngày làm việc kể từ ngày tiếp nhận hồ sơ;"},{"k":"p","t":"c) Trường hợp cơ quan thuế tiếp nhận thông tin đăng ký thuế của người nộp thuế theo quy định tại khoản 3, 4 và 5 Điều này, cơ quan thuế cung cấp thông tin về kết quả tiếp nhận, xử lý và cập nhật thông tin đăng ký thuế của người nộp thuế theo quy định, bảo đảm người nộp thuế có thể theo dõi trên phương thức điện tử;"},{"k":"p","t":"d) Cơ quan thuế thực hiện thu thập, phân tích, đánh giá thông tin về người đại diện theo pháp luật, chủ doanh nghiệp, tổ chức, cá nhân có liên quan của người nộp thuế để phân loại mức độ rủi ro trong quản lý thuế (bao gồm việc xác định các cá nhân có liên quan đến doanh nghiệp không hoạt động tại địa chỉ đã đăng ký, có hành vi vi phạm về thuế, hóa đơn hoặc thuộc diện rủi ro cao); áp dụng biện pháp quản lý phù hợp theo quy định của pháp luật."},{"k":"p","t":"3. Đối với cơ quan đăng ký kinh doanh theo cơ chế một cửa liên thông:"},{"k":"p","t":"Trường hợp thực hiện đăng ký thuế theo cơ chế một cửa liên thông, cơ quan tiếp nhận hồ sơ đăng ký doanh nghiệp, đăng ký hợp tác xã, đăng ký liên hiệp hợp tác xã, đăng ký tổ hợp tác, đăng ký hộ kinh doanh, đăng ký đơn vị phụ thuộc, địa điểm kinh doanh của doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã có trách nhiệm truyền, chia sẻ hoặc đồng bộ dữ liệu đăng ký kinh doanh, đăng ký thuế sang cơ quan thuế thông qua phương thức điện tử giữa Hệ thống thông tin quốc gia về đăng ký doanh nghiệp và Hệ thống thông tin quản lý thuế để cơ quan thuế thực hiện xử lý và trả kết quả cho người nộp thuế theo quy định của Luật Quản lý thuế và pháp luật có liên quan."},{"k":"p","t":"Dữ liệu chia sẻ hoặc đồng bộ là các thông tin về đăng ký doanh nghiệp, hợp tác xã, liên hiệp hợp tác xã, tổ hợp tác, hộ kinh doanh có liên quan để phục vụ công tác quản lý rủi ro trong quản lý thuế."},{"k":"p","t":"4. Đối với cơ quan quản lý cơ sở dữ liệu quốc gia về dân cư:"},{"k":"p","t":"a) Cơ quan quản lý cơ sở dữ liệu quốc gia về dân cư có trách nhiệm cung cấp, chia sẻ thông tin định danh cá nhân cho cơ quan thuế để cấp mã số thuế cho người nộp thuế theo số định danh cá nhân;"},{"k":"p","t":"b) Thông tin được cung cấp, chia sẻ bao gồm: số định danh cá nhân, họ và tên, ngày tháng năm sinh, giới tính, quốc tịch, nơi cư trú, tình trạng pháp lý của cá nhân (đang sống, chết, mất tích) và các thông tin khác theo quy định của pháp luật;"},{"k":"p","t":"c) Việc cung cấp, chia sẻ thông tin được thực hiện trong các trường hợp: khi xác lập số định danh cá nhân; khi có thay đổi đối với thông tin đã cung cấp; khi hủy, xác lập lại số định danh cá nhân."},{"k":"p","t":"5. Đối với các cơ quan cấp giấy phép thành lập, hoạt động cho tổ chức:"},{"k":"p","t":"a) Cơ quan nhà nước có thẩm quyền cấp giấy phép thành lập và hoạt động hoặc quyết định thành lập hoặc giấy tờ tương đương khác cho các tổ chức thuộc diện đăng ký kinh doanh (trừ cơ quan đăng ký kinh doanh theo cơ chế một cửa liên thông) có trách nhiệm cung cấp, chia sẻ thông tin cho cơ quan thuế phục vụ công tác quản lý thuế;"},{"k":"p","t":"b) Thông tin được cung cấp, chia sẻ bao gồm: số giấy phép thành lập và hoạt động hoặc quyết định thành lập hoặc giấy chứng nhận đăng ký đầu tư hoặc giấy tờ tương đương khác cấp cho tổ chức; ngày cấp; cơ quan cấp; tên tổ chức; địa chỉ trụ sở; người đại diện pháp luật của tổ chức (số định danh cá nhân hoặc số giấy tờ của người đại diện, ngày tháng năm sinh, giới tính, quốc tịch), tình trạng pháp lý của tổ chức và các thông tin khác có trên giấy phép, giấy chứng nhận theo quy định của pháp luật;"},{"k":"p","t":"c) Các trường hợp cung cấp, chia sẻ thông tin gồm: khi cấp giấy phép, giấy chứng nhận; khi thay đổi giấy phép, giấy chứng nhận; khi tổ chức tạm ngừng hoặc chấm dứt hoạt động, kinh doanh hoặc bị thu hồi giấy phép, giấy chứng nhận;"},{"k":"p","t":"d) Thời hạn cung cấp thông tin chậm nhất 10 ngày làm việc kể từ ngày cấp giấy phép, giấy chứng nhận; ngày thay đổi giấy phép, giấy chứng nhận; ngày tổ chức tạm ngừng hoặc chấm dứt hoạt động, kinh doanh hoặc bị thu hồi giấy phép, giấy chứng nhận;"},{"k":"p","t":"đ) Việc cung cấp, chia sẻ thông tin được thực hiện kịp thời thông qua phương thức điện tử, đảm bảo kết nối, chia sẻ và đồng bộ dữ liệu giữa các cơ quan theo quy định của pháp luật, theo hình thức văn bản giấy trong thời gian chưa thực hiện bằng phương thức điện tử."},{"k":"p","t":"Việc thu thập, chia sẻ, khai thác và sử dụng thông tin quy định tại Điều này được thực hiện theo quy định của pháp luật về quản lý thuế và pháp luật có liên quan, bảo đảm an toàn, bảo mật thông tin theo quy định."}]},{"id":"nd252_8","no":8,"code":"Điều 8","title":"Điều 8. Sử dụng mã số thuế","shortTitle":"Sử dụng mã số thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 1","level":1,"content":[{"k":"p","t":"1. Người nộp thuế phải ghi mã số thuế được cấp vào hóa đơn, chứng từ, tài liệu khi thực hiện các giao dịch kinh doanh, tài chính có liên quan trực tiếp đến nghĩa vụ thuế; mở tài khoản tiền gửi tại các tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán; khai thuế, nộp thuế, miễn thuế, giảm thuế, hoàn thuế, không thu thuế, đăng ký tờ khai hải quan và thực hiện các giao dịch về thuế khác đối với tất cả các nghĩa vụ phải nộp ngân sách nhà nước, kể cả trường hợp người nộp thuế hoạt động sản xuất, kinh doanh tại nhiều địa bàn khác nhau."},{"k":"p","t":"2. Người nộp thuế phải cung cấp đầy đủ, chính xác mã số thuế cho tổ chức, cá nhân thực hiện khấu trừ, nộp thay thuế hoặc khai thay, nộp thay thuế; cung cấp cho cơ quan, tổ chức, cá nhân có liên quan phục vụ quản lý thuế theo quy định của pháp luật; ghi mã số thuế trên hồ sơ khi thực hiện thủ tục hành chính theo cơ chế một cửa liên thông với cơ quan quản lý thuế, cơ quan, tổ chức liên quan."},{"k":"p","t":"3. Cơ quan quản lý thuế, Kho bạc Nhà nước, tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán phối hợp thu ngân sách nhà nước, tổ chức được cơ quan quản lý thuế ủy nhiệm thu thuế sử dụng mã số thuế của người nộp thuế trong các chứng từ giao dịch có liên quan đến nghĩa vụ thuế theo quy định và thu thuế, các khoản thu khác, tiền chậm nộp và tiền phạt vào ngân sách nhà nước."},{"k":"p","t":"4. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, tổ chức cung ứng dịch vụ thanh toán, tổ chức cung ứng dịch vụ trung gian thanh toán phải ghi mã số thuế trong hồ sơ mở tài khoản và các chứng từ giao dịch qua tài khoản của người nộp thuế."},{"k":"p","t":"5. Mã số thuế không được sử dụng trong các giao dịch quy định tại khoản 1 Điều này sau khi đã bị cơ quan thuế chấm dứt hiệu lực và chỉ được tiếp tục sử dụng sau khi được khôi phục. Đối với người nộp thuế bị cơ quan thuế thông báo không hoạt động tại địa chỉ đã đăng ký chỉ được sử dụng mã số thuế để thực hiện các giao dịch phục vụ thực hiện chấm dứt hoặc khôi phục mã số thuế theo quy định."},{"k":"p","t":"KHAI THUẾ; THỜI HẠN NỘP HỒ SƠ KHAI THUẾ;KỲ TÍNH THUẾ; THÔNG BÁO THUẾ, KHẤU TRỪ THUẾ, KHAI THAY, NỘP THAY THUẾ"}]},{"id":"nd252_9","no":9,"code":"Điều 9","title":"Điều 9. Kỳ tính thuế","shortTitle":"Kỳ tính thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Kỳ tính thuế bao gồm kỳ theo từng lần phát sinh, tháng, quý, năm hoặc kỳ quyết toán thuế theo quy định tại khoản 8 Điều 4 Luật Quản lý thuế."},{"k":"p","t":"2. Xác định kỳ tính thuế:"},{"k":"p","t":"a) Kỳ tính thuế theo từng lần phát sinh được xác định là ngày người nộp thuế phát sinh nghĩa vụ thuế;"},{"k":"p","t":"b) Kỳ tính thuế tháng được xác định từ ngày đầu tháng đến ngày cuối tháng của năm dương lịch;"},{"k":"p","t":"c) Kỳ tính thuế quý được xác định từ ngày đầu quý đến ngày cuối quý của năm dương lịch hoặc năm tài chính;"},{"k":"p","t":"d) Kỳ tính thuế năm được xác định theo năm dương lịch hoặc năm tài chính;"},{"k":"p","t":"đ) Kỳ quyết toán thuế được xác định như sau:"},{"k":"p","t":"đ.1) Kỳ quyết toán thuế được xác định theo kỳ kế toán năm theo quy định của pháp luật về kế toán, trừ trường hợp quy định tại điểm đ.2 khoản này;"},{"k":"p","t":"đ.2) Kỳ quyết toán thuế đối với thuế thu nhập cá nhân được xác định theo năm dương lịch."},{"k":"p","t":"Trường hợp trong một năm dương lịch, cá nhân có mặt tại Việt Nam dưới 183 ngày nhưng tổng số ngày có mặt tại Việt Nam trong 12 tháng liên tục kể từ ngày đầu tiên có mặt tại Việt Nam từ 183 ngày trở lên thì kỳ quyết toán thuế thu nhập cá nhân của năm đầu tiên được xác định là 12 tháng liên tục kể từ ngày đầu tiên có mặt tại Việt Nam."}]},{"id":"nd252_10","no":10,"code":"Điều 10","title":"Điều 10. Thời hạn nộp hồ sơ khai thuế","shortTitle":"Thời hạn nộp hồ sơ khai thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đối với loại thuế khai theo từng lần phát sinh, thời hạn nộp hồ sơ khai thuế chậm nhất là ngày thứ 10 kể từ ngày tiếp theo ngày phát sinh nghĩa vụ thuế, trừ trường hợp phải khai và nộp thuế trước khi được cơ quan thuế cấp hóa đơn điện tử có mã cho từng lần phát sinh theo quy định tại điểm b khoản 3 Điều 26 Luật Quản lý thuế."},{"k":"p","t":"2. Đối với loại thuế khai theo tháng, thời hạn nộp hồ sơ khai thuế chậm nhất là ngày thứ 20 của tháng tiếp theo tháng phát sinh nghĩa vụ thuế."},{"k":"p","t":"3. Đối với loại thuế khai theo quý, thời hạn nộp hồ sơ khai thuế chậm nhất là ngày cuối cùng của tháng đầu của quý tiếp theo quý phát sinh nghĩa vụ thuế."},{"k":"p","t":"4. Đối với loại thuế khai theo năm, thời hạn nộp hồ sơ khai thuế chậm nhất là ngày cuối cùng của tháng đầu tiên của năm dương lịch tiếp theo hoặc của năm tài chính tiếp theo."},{"k":"p","t":"5. Đối với loại thuế khai quyết toán thuế, thời hạn nộp hồ sơ khai thuế thực hiện như sau:"},{"k":"p","t":"a) Chậm nhất là ngày cuối cùng của tháng thứ 03 kể từ ngày kết thúc kỳ quyết toán thuế;"},{"k":"p","t":"b) Chậm nhất là ngày thứ 45 kể từ ngày người nộp thuế có quyết định về việc chấm dứt hoạt động, giải thể, phá sản, chấm dứt hợp đồng, cổ phần hóa doanh nghiệp nhà nước, chia, tách, sáp nhập, hợp nhất;"},{"k":"p","t":"c) Chậm nhất là ngày cuối cùng của tháng thứ 04 kể từ ngày kết thúc năm dương lịch đối với hồ sơ quyết toán thuế thu nhập cá nhân của cá nhân có thu nhập từ tiền lương, tiền công trực tiếp quyết toán thuế."},{"k":"p","t":"Trường hợp trong 01 năm dương lịch, cá nhân có mặt tại Việt Nam dưới 183 ngày nhưng tính trong 12 tháng liên tục kể từ ngày đầu tiên có mặt tại Việt Nam từ 183 ngày trở lên thì thời hạn nộp hồ sơ quyết toán thuế thu nhập cá nhân của năm đầu tiên chậm nhất là ngày cuối cùng của tháng thứ 04 kể từ ngày cuối cùng của tháng tính đủ 12 tháng liên tục;"},{"k":"p","t":"d) Trước khi xuất cảnh đối với cá nhân cư trú là người nước ngoài kết thúc hợp đồng lao động tại Việt Nam nhưng không quá 45 ngày kể từ ngày kết thúc hợp đồng lao động."},{"k":"p","t":"6. Đối với hoạt động khai thác, xuất bán dầu thô (bao gồm dầu thô xuất bán trong nước và dầu thô xuất khẩu), thời hạn nộp hồ sơ khai thuế, khoản thu khác theo từng lần xuất bán chậm nhất là 35 ngày kể từ ngày xuất bán. Ngày xuất bán là ngày hoàn thành việc xuất dầu thô tại điểm giao nhận."},{"k":"p","t":"Đối với hoạt động xuất bán khí thiên nhiên, thời hạn nộp hồ sơ khai thuế, khoản thu khác chậm nhất là ngày thứ 20 của tháng tiếp theo tháng phát sinh nghĩa vụ thuế, khoản thu khác. Tháng phát sinh nghĩa vụ thuế là tháng của thời điểm xác định thuế theo quy định của pháp luật về thuế; tháng phát sinh nghĩa vụ khoản thu khác là tháng bán khí."},{"k":"p","t":"7. Thời hạn nộp báo cáo lợi nhuận liên quốc gia thực hiện theo quy định tại Nghị định quy định về quản lý thuế đối với các giao dịch liên kết của những doanh nghiệp có quan hệ liên kết."},{"k":"p","t":"8. Thời hạn nộp hồ sơ khai thuế thu nhập cá nhân từ hoạt động chuyển nhượng, nhận thừa kế, quà tặng là bất động sản thực hiện như sau:"},{"k":"p","t":"a) Trường hợp chuyển nhượng, nhận thừa kế, quà tặng là bất động sản đã được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất (bao gồm cả trường hợp hợp đồng chuyển nhượng có thỏa thuận bên mua là người nộp thay thuế cho bên bán, trường hợp bên thứ ba có liên quan được phép bán tài sản của cá nhân theo quy định của pháp luật, trường hợp ủy quyền mà người nhận ủy quyền có đầy đủ nội dung như quyền sở hữu đối với bất động sản theo quy định của pháp luật về dân sự) thì thời hạn nộp hồ sơ khai thuế chậm nhất là ngày cuối cùng của thời hạn phải đăng ký biến động tại cơ quan có thẩm quyền theo quy định của pháp luật về đất đai;"},{"k":"p","t":"b) Trường hợp chuyển nhượng, nhận thừa kế, quà tặng là nhà hình thành trong tương lai, quyền sử dụng đất gắn với công trình xây dựng tương lai (bao gồm cả trường hợp hợp đồng chuyển nhượng có thỏa thuận bên mua là người nộp thay thuế cho bên bán, trường hợp bên thứ ba có liên quan được phép bán tài sản của cá nhân theo quy định của pháp luật, trường hợp ủy quyền mà người nhận ủy quyền có đầy đủ nội dung như quyền sở hữu đối với bất động sản theo quy định của pháp luật về dân sự) thì thời hạn nộp hồ sơ khai thuế chậm nhất là ngày thứ 10 kể từ ngày tiếp theo ngày hợp đồng chuyển nhượng hoặc giấy tờ pháp lý chứng minh quyền được nhận thừa kế, quà tặng có hiệu lực theo quy định của pháp luật. Trường hợp cá nhân góp vốn bằng bất động sản thì thời hạn nộp hồ sơ khai thuế chậm nhất là ngày thứ 10 kể từ ngày tiếp theo ngày chuyển nhượng vốn, rút vốn, giải thể doanh nghiệp."},{"k":"p","t":"9. Thời hạn nộp hồ sơ khai thuế đối với hộ kinh doanh, cá nhân kinh doanh thực hiện theo quy định tại Nghị định số 68/2026/NĐ-CP của Chính phủ."},{"k":"p","t":"10. Thời hạn nộp hồ sơ khai thuế đối với hàng hóa xuất khẩu, nhập khẩu thực hiện theo quy định của pháp luật về hải quan."}]},{"id":"nd252_11","no":11,"code":"Điều 11","title":"Điều 11. Các trường hợp không phải nộp hồ sơ khai thuế, khoản thu khác","shortTitle":"Các trường hợp không phải nộp hồ sơ khai thuế, khoản thu khác","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Người nộp thuế không phải nộp hồ sơ khai thuế, khoản thu khác đối với từng loại thuế, khoản thu khác trong các trường hợp sau đây:"},{"k":"p","t":"1. Người nộp thuế chỉ có hoạt động, kinh doanh thuộc đối tượng không chịu thuế theo quy định của pháp luật về thuế, trừ trường hợp hộ kinh doanh, cá nhân kinh doanh hàng hóa, dịch vụ có mức doanh thu hằng năm thuộc đối tượng không chịu thuế giá trị gia tăng và thuộc đối tượng không phải nộp thuế thu nhập cá nhân thực hiện theo quy định tại Nghị định số 141/2026/NĐ-CP của Chính phủ."},{"k":"p","t":"2. Tổ chức, cá nhân trả thu nhập, cá nhân trực tiếp khai thuế với cơ quan thuế không phải nộp hồ sơ khai thuế thu nhập cá nhân đối với thu nhập được miễn thuế quy định tại Điều 4 và Điều 5 Luật Thuế thu nhập cá nhân, trừ các trường hợp được miễn thuế quy định tại các khoản 1, 2, 17 Điều 4, thu nhập của chuyên gia từ dự án khởi nghiệp sáng tạo quy định tại khoản 19 Điều 4 và các khoản 2, 3, 4 Điều 5 Luật Thuế thu nhập cá nhân."},{"k":"p","t":"3. Doanh nghiệp chế xuất chỉ có hoạt động chế xuất thì không phải nộp hồ sơ khai thuế giá trị gia tăng."},{"k":"p","t":"4. Người nộp thuế trong thời gian tạm ngừng hoạt động, kinh doanh theo quy định tại điểm c.1 khoản 1 Điều 7 Nghị định này."},{"k":"p","t":"5. Người nộp thuế đã nộp hồ sơ chấm dứt hiệu lực mã số thuế, trừ hồ sơ quyết toán thuế đến thời điểm chấm dứt hiệu lực mã số thuế và hồ sơ khai thuế đối với nghĩa vụ thuế phát sinh sau thời điểm nộp hồ sơ chấm dứt hiệu lực mã số thuế."},{"k":"p","t":"6. Người khai thuế thu nhập cá nhân là tổ chức, cá nhân trả thu nhập thuộc trường hợp khai thuế thu nhập cá nhân theo tháng, quý mà trong tháng, quý đó không phát sinh việc khấu trừ thuế thu nhập cá nhân của đối tượng nhận thu nhập."},{"k":"p","t":"Trường hợp tháng, quý cuối cùng trong năm hoặc tháng, quý phát sinh việc chia, tách, hợp nhất, sáp nhập, giải thể, phá sản, chấm dứt hoạt động không phát sinh việc khấu trừ thuế và thuộc trường hợp không phải quyết toán thuế thu nhập cá nhân theo hướng dẫn của Bộ trưởng Bộ Tài chính thì tổ chức, cá nhân trả thu nhập vẫn phải nộp hồ sơ khai thuế thu nhập cá nhân của tháng, quý cuối cùng trong năm hoặc tháng, quý phát sinh việc chia, tách, hợp nhất, sáp nhập, giải thể, phá sản, chấm dứt hoạt động."},{"k":"p","t":"7. Trường hợp tổ chức, cá nhân không phát sinh trả thu nhập từ tiền lương, tiền công thì không phải nộp hồ sơ khai quyết toán thuế thu nhập cá nhân đối với thu nhập từ tiền lương, tiền công."},{"k":"p","t":"8. Tổ chức, cá nhân là bên Việt Nam khấu trừ, nộp thay thuế giá trị gia tăng, thuế thu nhập doanh nghiệp của nhà thầu nước ngoài theo quy định của pháp luật thuế và thực hiện khai thuế theo tháng mà trong tháng đó không phát sinh việc khấu trừ thuế."},{"k":"p","t":"9. Người nộp thuế thuộc diện được hoàn thuế theo quy định của pháp luật về thuế giá trị gia tăng không phải nộp hồ sơ khai thuế giá trị gia tăng trong các trường hợp sau:"},{"k":"p","t":"a) Chủ chương trình, dự án hoặc nhà thầu chính (bao gồm cả văn phòng điều hành của nhà thầu chính tại Việt Nam), tổ chức do phía nhà tài trợ nước ngoài chỉ định việc quản lý chương trình, dự án sử dụng vốn Hỗ trợ Phát triển Chính thức (ODA) không hoàn lại (bao gồm cả văn phòng điều hành của nhà tài trợ hoặc tổ chức quản lý, thực hiện chương trình, dự án do nhà tài trợ chỉ định);"},{"k":"p","t":"b) Tổ chức ở Việt Nam sử dụng tiền viện trợ không hoàn lại, tiền viện trợ nhân đạo của tổ chức, cá nhân nước ngoài để mua hàng hóa, dịch vụ phục vụ cho chương trình, dự án viện trợ không hoàn lại, viện trợ nhân đạo tại Việt Nam;"},{"k":"p","t":"c) Tổ chức, cá nhân được hưởng quyền ưu đãi miễn trừ ngoại giao theo quy định của pháp luật về ngoại giao mua hàng hóa, dịch vụ tại Việt Nam."},{"k":"p","t":"10. Trường hợp việc tính thuế, khoản thu khác, thông báo thuế, khoản thu khác do cơ quan thuế thực hiện mà cơ quan thuế đã kết nối, chia sẻ, sử dụng được thông tin có trong cơ sở dữ liệu quốc gia, cơ sở dữ liệu của cơ quan nhà nước có thẩm quyền, Hệ thống thông tin quản lý thuế hoặc hồ sơ xác định nghĩa vụ tài chính, phiếu chuyển thông tin do cơ quan có thẩm quyền chuyển đến và các thông tin, dữ liệu này bảo đảm đủ căn cứ để tính thuế, khoản thu khác theo quy định thì người nộp thuế không phải nộp hồ sơ khai thuế, khoản thu khác, trừ trường hợp người nộp thuế có đề nghị miễn, giảm trên hồ sơ khai thuế, khoản thu khác."},{"k":"p","t":"Cơ quan thuế công bố công khai trên Hệ thống thông tin quản lý thuế các loại hồ sơ khai thuế, khoản thu khác đủ điều kiện thực hiện theo quy định tại khoản này."},{"k":"p","t":"11. Bên Việt Nam phát sinh việc trả thu nhập cho tổ chức, cá nhân nước ngoài từ đầu tư trái phiếu quốc tế của Chính phủ Việt Nam, từ các khoản cho vay đối với Nhà nước, Chính phủ Việt Nam thuộc trường hợp không chịu thuế giá trị gia tăng và miễn thuế thu nhập doanh nghiệp theo quy định của pháp luật thuế thì không phải nộp hồ sơ khai thuế."},{"k":"p","t":"12. Tổ chức thu phí, lệ phí không phải khai phí, lệ phí theo quy định của pháp luật phí, lệ phí thì không phải nộp hồ sơ khai phí, lệ phí."},{"k":"p","t":"13. Tổ chức, cá nhân được miễn thuế tài nguyên không thuộc trường hợp cơ quan thuế thông báo, quyết định miễn, giảm thuế theo hướng dẫn của Bộ trưởng Bộ Tài chính thì không phải nộp hồ sơ khai thuế tài nguyên."}]},{"id":"nd252_12","no":12,"code":"Điều 12","title":"Điều 12. Khai bổ sung hồ sơ khai thuế, khoản thu khác","shortTitle":"Khai bổ sung hồ sơ khai thuế, khoản thu khác","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế thực hiện khai bổ sung hồ sơ khai thuế, khoản thu khác theo quy định tại khoản 5 Điều 12 Luật Quản lý thuế và quy định tại Điều này. Việc khai bổ sung hồ sơ khai thuế bảo đảm xác định đầy đủ, chính xác nghĩa vụ thuế nhưng không làm thay đổi hiệu lực của các kết luận, quyết định xử lý qua thanh tra, kiểm tra của cơ quan thuế, cơ quan có thẩm quyền."},{"k":"p","t":"2. Đối với trường hợp khai bổ sung quy định tại điểm c khoản 5 Điều 12 Luật Quản lý thuế:"},{"k":"p","t":"a) Người nộp thuế không được khai bổ sung hồ sơ khai thuế, khoản thu khác đối với hồ sơ thuộc phạm vi, thời kỳ điều tra theo văn bản đề nghị của cơ quan điều tra gửi cơ quan thuế. Thời gian áp dụng không được khai bổ sung hồ sơ khai thuế được xác định tại văn bản đề nghị của cơ quan điều tra. Trường hợp văn bản đề nghị không xác định rõ thời gian áp dụng thì việc không được khai bổ sung chấm dứt khi cơ quan điều tra có văn bản thông báo kết thúc yêu cầu không được khai bổ sung đối với người nộp thuế;"},{"k":"p","t":"b) Cơ quan điều tra gửi văn bản đề nghị cho cơ quan thuế theo quy định tại khoản 3 Điều này, trong đó nêu rõ: tên người nộp thuế, mã số thuế, loại thuế, kỳ tính thuế thuộc phạm vi, thời kỳ điều tra và thời gian áp dụng việc không được khai bổ sung."},{"k":"p","t":"3. Cơ quan điều tra được yêu cầu người nộp thuế không khai bổ sung hồ sơ khai thuế, khoản thu khác khi người nộp thuế bị điều tra trong vụ việc, vụ án do có dấu hiệu vi phạm pháp luật liên quan đến việc xác định nghĩa vụ thuế hoặc do đã có quyết định khởi tố vụ án hình sự."},{"k":"p","t":"4. Đối với trường hợp điều chỉnh hồ sơ khai thuế quy định tại điểm d khoản 5 Điều 12 Luật Quản lý thuế:"},{"k":"p","t":"a) Người nộp thuế bổ sung hồ sơ giải trình với cơ quan thuế thì hồ sơ giải trình phải nêu rõ: nội dung điều chỉnh hồ sơ khai thuế, lý do điều chỉnh, thời kỳ điều chỉnh, số thuế điều chỉnh so với số thuế đã được xác định qua thanh tra, kiểm tra và tài liệu, chứng cứ làm cơ sở điều chỉnh;"},{"k":"p","t":"b) Cơ quan thuế thực hiện rà soát hồ sơ giải trình của người nộp thuế trong phạm vi nội dung, thời kỳ đã được thanh tra, kiểm tra và có văn bản thông báo chấp nhận hoặc không chấp nhận việc điều chỉnh hồ sơ khai thuế;"},{"k":"p","t":"c) Việc xem xét, chấp nhận điều chỉnh hồ sơ khai thuế quy định tại khoản này chỉ áp dụng đối với các nội dung chưa được xử lý tại kết luận, quyết định xử lý của cơ quan có thẩm quyền. Việc điều chỉnh hồ sơ khai thuế theo quy định tại khoản này không làm thay đổi hiệu lực của kết luận, quyết định xử lý qua thanh tra, kiểm tra đã ban hành. Người nộp thuế bị xử lý theo quy định như đối với trường hợp cơ quan thuế, cơ quan có thẩm quyền thanh tra, kiểm tra phát hiện."},{"k":"p","t":"5. Đối với trường hợp khai bổ sung quy định tại điểm đ khoản 5 Điều 12 Luật Quản lý thuế:"},{"k":"p","t":"a) Trường hợp cơ quan thuế, cơ quan nhà nước có thẩm quyền có văn bản kết luận, quyết định liên quan đến nội dung xác định nghĩa vụ thuế của người nộp thuế nhưng không thuộc trường hợp thực hiện theo văn bản kết luận, quyết định xử lý sau thanh tra, kiểm tra của cơ quan thuế, cơ quan nhà nước có thẩm quyền và không thuộc trường hợp quy định tại điểm b khoản này thì người nộp thuế khai bổ sung để điều chỉnh nghĩa vụ thuế trong trường hợp việc khai bổ sung làm tăng số thuế phải nộp, giảm số thuế được khấu trừ, miễn, giảm, hoàn, giảm lỗ và người nộp thuế bị xử lý theo quy định như đối với trường hợp cơ quan thuế, cơ quan có thẩm quyền thanh tra, kiểm tra phát hiện."},{"k":"p","t":"Quy định tại điểm này được áp dụng đối với khoản thu khác thuộc ngân sách nhà nước do cơ quan thuế quản lý thu theo quy định của pháp luật;"},{"k":"p","t":"b) Trường hợp cơ quan điều tra, Tòa án, Kiểm toán nhà nước, cơ quan thanh tra và cơ quan thuế có kết luận, bản án, quyết định kết luận người bán có hành vi vi phạm về sử dụng hóa đơn không hợp pháp hoặc sử dụng không hợp pháp hóa đơn mà người mua hàng hóa, dịch vụ sử dụng hóa đơn của người bán thuộc phạm vi kết luận thì người mua phải khai bổ sung để điều chỉnh nghĩa vụ thuế kể cả trường hợp kỳ tính thuế đã được thanh tra, kiểm tra và người mua bị xử lý theo quy định của pháp luật quản lý thuế như đối với trường hợp cơ quan thuế, cơ quan có thẩm quyền thanh tra, kiểm tra phát hiện."},{"k":"p","t":"6. Người nộp thuế khai bổ sung cho từng hồ sơ khai thuế, khoản thu khác có sai, sót thuộc các trường hợp quy định tại khoản 1, 2, 3, 4 và 5 Điều này như sau:"},{"k":"p","t":"a) Người nộp thuế thuộc trường hợp quy định tại điểm a, b, c khoản 5 Điều 12 Luật Quản lý thuế thực hiện khai bổ sung cho kỳ phát sinh sai, sót. Trường hợp việc khai bổ sung làm tăng số thuế, khoản thu khác phải nộp hoặc giảm số thuế, khoản thu khác đã được miễn, giảm, hoàn thì người nộp thuế phải nộp đủ số tiền phải nộp tăng thêm hoặc số tiền đã được miễn, giảm, hoàn và tiền chậm nộp vào ngân sách nhà nước (nếu có); trường hợp việc khai bổ sung làm giảm số thuế, khoản thu khác phải nộp thì người nộp thuế được điều chỉnh giảm tiền chậm nộp và xử lý số tiền thuế, khoản thu khác nộp thừa (nếu có) theo quy định. Trường hợp việc khai bổ sung làm tăng, giảm số thuế giá trị gia tăng được khấu trừ chuyển kỳ sau thì người nộp thuế khai số thuế chênh lệch tăng, giảm vào kỳ phát hiện sai, sót. Người nộp thuế chỉ được khai bổ sung tăng số thuế giá trị gia tăng đề nghị hoàn khi chưa nộp hồ sơ đề nghị hoàn thuế."},{"k":"p","t":"Riêng trường hợp người nộp thuế phát hiện số thuế giá trị gia tăng đầu vào khi kê khai, khấu trừ bị sai, sót thì thực hiện kê khai theo quy định của pháp luật thuế giá trị gia tăng;"},{"k":"p","t":"b) Người nộp thuế thuộc trường hợp quy định tại điểm d và điểm đ khoản 5 Điều 12 Luật Quản lý thuế thực hiện theo quy định tại điểm a khoản này và bị xử phạt vi phạm hành chính về thuế."},{"k":"p","t":"7. Trường hợp thực hiện theo văn bản kết luận, quyết định xử lý sau thanh tra, kiểm tra của cơ quan thuế, cơ quan nhà nước có thẩm quyền, thông báo không hoàn thuế của cơ quan thuế dẫn đến tăng hoặc giảm số thuế giá trị gia tăng được khấu trừ chuyển kỳ sau thì người nộp thuế không thực hiện khai bổ sung mà thực hiện kê khai vào kỳ tính thuế nhận được kết luận, quyết định, thông báo của cơ quan thuế, cơ quan nhà nước có thẩm quyền."},{"k":"p","t":"8. Đối với trường hợp hồ sơ khai thuế theo quy định tại điểm a và điểm b khoản 5 Điều 12 Luật Quản lý thuế, người nộp thuế phát hiện hồ sơ khai thuế, khoản thu khác đã nộp có sai, sót làm tăng số thuế, khoản thu khác phải nộp hoặc giảm số thuế, khoản thu khác đã được miễn, giảm, hoàn hoặc giảm số thuế giá trị gia tăng được khấu trừ chuyển kỳ sau nhưng hồ sơ khai thuế, khoản thu khác đã quá thời hạn 05 năm kể từ ngày hết thời hạn nộp hồ sơ khai thuế, khoản thu khác thì người nộp thuế không được khai bổ sung hồ sơ khai thuế, khoản thu khác nhưng được bổ sung hồ sơ giải trình với cơ quan thuế. Cơ quan thuế có trách nhiệm rà soát hồ sơ giải trình của người nộp thuế và ban hành thông báo chấp nhận hồ sơ giải trình, quyết định xử lý vi phạm hành chính về quản lý thuế theo quy định (nếu có) hoặc thông báo không chấp nhận hồ sơ giải trình của người nộp thuế."},{"k":"p","t":"9. Đối với hàng hóa xuất khẩu, nhập khẩu, việc khai bổ sung hồ sơ khai thuế thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"10. Bộ trưởng Bộ Tài chính hướng dẫn chi tiết trình tự, thủ tục, hồ sơ khai bổ sung hồ sơ khai thuế, khoản thu khác; cách thức kê khai bổ sung hồ sơ khai thuế, khoản thu khác đối với trường hợp quy định tại điểm a khoản 6 Điều này; hồ sơ giải trình và trình tự, thủ tục tiếp nhận, xử lý hồ sơ giải trình theo quy định tại các khoản 4 và khoản 8 Điều này."}]},{"id":"nd252_13","no":13,"code":"Điều 13","title":"Điều 13. Khai thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí","shortTitle":"Khai thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"Việc khai thuế, khoản thu khác đối với hoạt động dầu khí (bao gồm thuế đặc biệt theo Hiệp định giữa Chính phủ nước Cộng hòa xã hội chủ nghĩa Việt Nam và Chính phủ Liên bang Nga) được thực hiện theo từng loại hoạt động và từng loại khoản thu tương ứng với khai theo tháng, khai theo quý, khai theo từng lần phát sinh nghĩa vụ thuế và khai quyết toán thuế theo quy định tại Điều này."},{"k":"p","t":"1. Khai theo tháng đối với hoạt động khai thác, xuất bán khí thiên nhiên: thuế tài nguyên, thuế thu nhập doanh nghiệp, thuế đặc biệt của Liên doanh Việt - Nga “Vietsovpetro” tại Lô 09.1 theo Hiệp định giữa Chính phủ nước Cộng hòa xã hội chủ nghĩa Việt Nam và Chính phủ Liên bang Nga ký ngày 27 tháng 12 năm 2010 về việc tiếp tục hợp tác trong lĩnh vực thăm dò địa chất và khai thác dầu khí tại thềm lục địa Cộng hòa xã hội chủ nghĩa Việt Nam trong khuôn khổ Liên doanh Việt - Nga “Vietsovpetro” (sau đây gọi là Liên doanh Vietsovpetro tại Lô 09.1) và các Nghị định thư sửa đổi, bổ sung; tiền lãi khí nước chủ nhà được chia."},{"k":"p","t":"2. Khai theo quý: khoản phụ thu khi giá dầu thô biến động tăng trừ khoản phụ thu áp dụng cho Liên doanh Vietsovpetro tại Lô 09.1 quy định tại điểm c khoản 3 và khoản 5 Điều này."},{"k":"p","t":"3. Khai theo từng lần phát sinh:"},{"k":"p","t":"a) Thuế thu nhập doanh nghiệp đối với thu nhập từ chuyển nhượng quyền lợi tham gia hợp đồng dầu khí:"},{"k":"p","t":"Bên chuyển nhượng quyền lợi tham gia hợp đồng dầu khí có trách nhiệm kê khai, nộp thuế đối với thu nhập từ chuyển nhượng. Trường hợp việc chuyển nhượng làm thay đổi chủ sở hữu của nhà thầu đang nắm giữ quyền lợi tham gia trong hợp đồng dầu khí tại Việt Nam, nhà thầu đứng tên trong hợp đồng có trách nhiệm: thông báo với cơ quan thuế khi phát sinh hoạt động chuyển nhượng và kê khai, nộp thay thuế cho bên chuyển nhượng đối với phần thu nhập liên quan đến hợp đồng dầu khí tại Việt Nam theo quy định;"},{"k":"p","t":"b) Các khoản thu phát sinh từ hoạt động dầu khí: tiền hoa hồng dầu, khí; tiền thu từ việc đọc và sử dụng tài liệu dầu, khí; tiền đền bù do không thực hiện đầy đủ cam kết tối thiểu của nhà thầu; phí nghiên cứu của nước chủ nhà; các khoản thu khác theo thỏa thuận bằng văn bản ký kết nhân danh Nhà nước hoặc Chính phủ Việt Nam với bên ký kết nước ngoài;"},{"k":"p","t":"c) Khoản phụ thu, thuế thu nhập doanh nghiệp và tiền lãi dầu khí (phần chia cho nước chủ nhà sau khi nộp thuế thu nhập doanh nghiệp và phụ thu) từ tiền kết dư của phần dầu khí để lại của Liên doanh Vietsovpetro tại Lô 09.1: việc khai, nộp thực hiện chậm nhất là ngày thứ 10 kể từ ngày Hội đồng Liên doanh quyết định số tiền kết dư của phần dầu khí để lại theo nghị quyết từng kỳ họp, nhưng không chậm hơn ngày 31 tháng 12 hằng năm, theo quy định tại Hiệp định và các Nghị định thư sửa đổi, bổ sung;"},{"k":"p","t":"d) Thuế xuất khẩu đối với dầu khí; trường hợp tại thời điểm đăng ký tờ khai hải quan chưa có giá chính thức, người nộp thuế được tạm nộp thuế trước khi thông quan hoặc giải phóng hàng. Khi có giá chính thức, người nộp thuế thực hiện kê khai điều chỉnh số thuế chênh lệch (nếu có) theo quy định."},{"k":"p","t":"4. Khai theo từng lần xuất bán đối với hoạt động khai thác, xuất bán dầu thô, bao gồm: thuế tài nguyên; thuế thu nhập doanh nghiệp; thuế đặc biệt và khoản phụ thu khi giá dầu thô biến động tăng của Liên doanh Vietsovpetro tại Lô 09.1; tiền lãi dầu nước chủ nhà được chia."},{"k":"p","t":"5. Khai quyết toán năm và khai quyết toán chấm dứt hợp đồng dầu khí: thuế tài nguyên, thuế thu nhập doanh nghiệp, tiền lãi dầu khí nước chủ nhà được chia đối với hoạt động khai thác, xuất bán dầu thô và khí thiên nhiên; khoản phụ thu khi giá dầu thô biến động tăng; thuế đặc biệt đối với hoạt động khai thác, xuất bán khí thiên nhiên của Liên doanh Vietsovpetro tại Lô 09.1; khoản phụ thu, thuế thu nhập doanh nghiệp và tiền lãi dầu khí (phần chia cho nước chủ nhà sau khi nộp thuế thu nhập doanh nghiệp và phụ thu) từ tiền kết dư của phần dầu để lại của hoạt động dầu khí của Liên doanh Vietsovpetro tại Lô 09.1."}]},{"id":"nd252_14","no":14,"code":"Điều 14","title":"Điều 14. Đồng tiền khai thuế, khoản thu khác, nộp thuế, khoản thu khác; tỷ giá khai thuế, khoản thu khác quy đổi; tỷ giá tính thuế","shortTitle":"Đồng tiền khai thuế, khoản thu khác, nộp thuế, khoản thu khác; tỷ giá khai thuế, khoản thu khác quy đổi; tỷ giá tính thuế","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Đồng tiền khai thuế, khoản thu khác là Đồng Việt Nam, trừ các trường hợp sau:"},{"k":"p","t":"a) Người nộp thuế thuộc trường hợp khai thuế thu nhập doanh nghiệp bổ sung bằng ngoại tệ theo quy định tại Nghị định số 236/2025/NĐ-CP của Chính phủ;"},{"k":"p","t":"b) Người nộp thuế khai thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí:"},{"k":"p","t":"b.1) Đối với khai thuế, khoản thu khác theo tháng, quý, từng lần phát sinh và từng lần xuất bán (bao gồm dầu thô xuất bán trong nước và dầu thô xuất khẩu):"},{"k":"p","t":"b.1.1) Trường hợp người nộp thuế nhận được tiền thanh toán là đồng Đô la Mỹ thì đồng tiền khai thuế, khoản thu khác là đồng Đô la Mỹ."},{"k":"p","t":"Trường hợp người nộp thuế nhận được tiền thanh toán là Đồng Việt Nam thì đồng tiền khai thuế, khoản thu khác là Đồng Việt Nam;"},{"k":"p","t":"b.1.2) Trường hợp Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam được nộp thuế và các khoản thu khác bằng Đồng Việt Nam theo quy định của Chính phủ thì đồng tiền khai thuế khoản thu khác là Đồng Việt Nam và tỷ giá quy đổi từ ngoại tệ thực hiện theo quy định tại điểm b.2 khoản 3 Điều này;"},{"k":"p","t":"b.1.3) Đối với khoản phụ thu, thuế thu nhập doanh nghiệp và tiền lãi dầu khí (phần chia cho nước chủ nhà sau khi đã nộp thuế thu nhập doanh nghiệp và phụ thu) từ tiền kết dư của phần dầu khí để lại của hoạt động dầu khí của Liên doanh Vietsovpetro tại Lô 09.1, đồng tiền khai thuế, khoản thu khác là đồng Đô la Mỹ."},{"k":"p","t":"b.2) Đối với khai quyết toán: đồng tiền khai quyết toán thuế, khoản thu khác là đồng Đô la Mỹ. Trường hợp người nộp thuế nhận được tiền thanh toán bằng Đồng Việt Nam và đã khai, nộp thuế, khoản thu khác bằng Đồng Việt Nam thì tại thời điểm khai thuế, khoản thu khác tương ứng, người nộp thuế thực hiện quy đổi sang đồng Đô la Mỹ theo tỷ giá quy định tại điểm b.1 khoản 3 Điều này để tổng hợp vào hồ sơ khai quyết toán thuế, khoản thu khác."},{"k":"p","t":"c) Nhà cung cấp nước ngoài thực hiện khai thuế bằng loại ngoại tệ tự do chuyển đổi đối với hoạt động kinh doanh trên nền tảng thương mại điện tử, nền tảng số và các dịch vụ khác;"},{"k":"p","t":"d) Cơ quan đại diện nước Cộng hòa xã hội chủ nghĩa Việt Nam ở nước ngoài và cơ quan, tổ chức tại Việt Nam được phép thu phí, lệ phí bằng ngoại tệ thực hiện khai phí, lệ phí và các khoản thu khác bằng loại ngoại tệ tự do chuyển đổi được quy định tại văn bản quy định về mức thu phí, lệ phí và các khoản thu khác."},{"k":"p","t":"2. Đồng tiền nộp thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí thực hiện như sau:"},{"k":"p","t":"a) Đối với khai thuế, khoản thu khác theo tháng, quý, từng lần phát sinh và từng lần xuất bán: đồng tiền nộp thuế, khoản thu khác là đồng tiền khai thuế, khoản thu khác quy định tại điểm b.1 khoản 1 Điều này;"},{"k":"p","t":"b) Đối với khai quyết toán thuế, khoản thu khác: đồng tiền nộp thuế là đồng tiền khai quyết toán quy định tại điểm b.2 khoản 1 Điều này."},{"k":"p","t":"3. Tỷ giá khai thuế quy đổi:"},{"k":"p","t":"a) Đối với thuế thu nhập doanh nghiệp bổ sung theo quy định chống xói mòn cơ sở thuế toàn cầu:"},{"k":"p","t":"a.1) Trường hợp người nộp thuế kê khai Tờ khai thông tin theo quy định về thuế tối thiểu toàn cầu bằng đồng ngoại tệ và lựa chọn kê khai Tờ khai thuế thu nhập doanh nghiệp bổ sung, nộp thuế thu nhập doanh nghiệp bổ sung bằng Đồng Việt Nam thì tỷ giá quy đổi xác định theo quy định tại Nghị định số 236/2025/NĐ-CP của Chính phủ. Trường hợp không có tỷ giá theo quy định tại Nghị định số 236/2025/NĐ-CP thì tỷ giá quy đổi được xác định theo tỷ giá tính chéo do Ngân hàng Nhà nước Việt Nam công bố tại ngày gần nhất trước ngày khai thuế;"},{"k":"p","t":"a.2) Đối với trường hợp người nộp thuế khai bổ sung hồ sơ khai thuế theo quy định của pháp luật quản lý thuế thì áp dụng tỷ giá tại hồ sơ khai thuế lần đầu đã được cơ quan thuế chấp nhận;"},{"k":"p","t":"a.3) Trường hợp thực hiện theo văn bản kết luận, quyết định xử lý sau thanh tra, kiểm tra của cơ quan thuế, cơ quan nhà nước có thẩm quyền thì áp dụng tỷ giá tại hồ sơ khai thuế lần đầu đã được cơ quan thuế chấp nhận hoặc áp dụng tỷ giá tại ngày cuối cùng của thời hạn nộp hồ sơ khai thuế đối với trường hợp người nộp thuế chưa nộp hồ sơ khai thuế."},{"k":"p","t":"b) Đối với hoạt động dầu khí và bán dầu khí:"},{"k":"p","t":"b.1) Tỷ giá quy đổi để khai thuế, khoản thu khác đối với hoạt động dầu khí và bán dầu khí quy định tại điểm b.1.1 khoản 1 Điều này là tỷ giá thực tế thanh toán của giao dịch bán dầu khí;"},{"k":"p","t":"b.2) Trường hợp Tập đoàn Công nghiệp - Năng lượng Quốc gia Việt Nam được nộp thuế và các khoản thu khác bằng Đồng Việt Nam theo quy định của Chính phủ thì tỷ giá khai thuế quy đổi từ đồng ngoại tệ thực tế nhận được trong thanh toán sang Đồng Việt Nam là tỷ giá mua bán chuyển khoản trung bình của ngân hàng thương mại nơi người nộp thuế thường xuyên có giao dịch tại ngày nộp hồ sơ khai thuế. Trường hợp người nộp thuế khai bổ sung hồ sơ khai thuế theo quy định của pháp luật quản lý thuế thì áp dụng tỷ giá tại hồ sơ khai thuế lần đầu đã được cơ quan thuế chấp nhận;"},{"k":"p","t":"b.3) Đối với hoạt động xuất bán dầu trong nước, tỷ giá tính thuế giá trị gia tăng là tỷ giá bán chuyển khoản của ngân hàng thương mại nơi người nộp thuế nhận thanh toán theo hợp đồng tại thời điểm lập hóa đơn theo quy định của pháp luật về hóa đơn."},{"k":"p","t":"4. Đối với hàng hóa xuất khẩu, nhập khẩu, tỷ giá tính thuế thực hiện theo quy định của pháp luật về hải quan."},{"k":"p","t":"5. Đối với phí, lệ phí, tỷ giá tính phí, lệ phí thực hiện theo quy định của pháp luật về phí, lệ phí."}]},{"id":"nd252_15","no":15,"code":"Điều 15","title":"Điều 15. Phân bổ nghĩa vụ thuế, khoản thu khác phải nộp","shortTitle":"Phân bổ nghĩa vụ thuế, khoản thu khác phải nộp","chuong":"Chương II — CÁC CHỨC NĂNG QUẢN LÝ THUẾ","muc":"Mục 2","level":1,"content":[{"k":"p","t":"1. Người nộp thuế có hoạt động ki
