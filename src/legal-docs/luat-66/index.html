<script id="LD" type="application/json">{"meta":{"title":"Luật 66/2025/QH15 — Luật Thuế Tiêu thụ đặc biệt","shortCode":"Luật 66/2025","subtitle":"Thuế Tiêu thụ đặc biệt (TTĐB)","slug":"luat-66","effectiveDate":"01/01/2026","scope":"Luật này quy định về đối tượng chịu thuế, đối tượng không chịu thuế, người nộp thuế, căn cứ tính thuế, hoàn thuế, khấu trừ thuế và giảm thuế tiêu thụ đặc biệt.","description":"Thuế Tiêu thụ đặc biệt (TTĐB)","related":[]},"outline":[{"id":"luat-66_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Luật này quy định về đối tượng chịu thuế, đối tượng không chịu thuế, người nộp thuế, căn cứ tính thuế, hoàn thuế, khấu trừ thuế và giảm thuế tiêu thụ đặc biệt."}]},{"id":"luat-66_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng chịu thuế","shortTitle":"Đối tượng chịu thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa bao gồm:"},{"k":"p","t":"a) Thuốc lá theo quy định của Luật Phòng, chống tác hại của thuốc lá;"},{"k":"p","t":"b) Rượu theo quy định của Luật Phòng, chống tác hại của rượu, bia;"},{"k":"p","t":"c) Bia theo quy định của Luật Phòng, chống tác hại của rượu, bia;"},{"k":"p","t":"d) Xe có gắn động cơ dưới 24 chỗ, bao gồm: xe ô tô chở người; xe chở người bốn bánh có gắn động cơ; xe ô tô pick-up chở người; xe ô tô pick-up chở hàng cabin kép; xe ô tô tải VAN có từ hai hàng ghế trở lên, có thiết kế vách ngăn cố định giữa khoang chở người và khoang chở hàng;"},{"k":"p","t":"đ) Xe mô tô hai bánh, xe mô tô ba bánh có dung tích xi lanh trên 125 cm 3 ;"},{"k":"p","t":"e) Máy bay, trực thăng, tàu lượn và du thuyền;"},{"k":"p","t":"g) Xăng các loại;"},{"k":"p","t":"h) Điều hoà nhiệt độ công suất trên 24.000 BTU đến 90.000 BTU trừ loại theo thiết kế của nhà sản xuất chỉ để lắp trên phương tiện vận tải bao gồm ô tô, toa xe lửa, máy bay, trực thăng, tàu, thuyền. Trường hợp tổ chức, cá nhân sản xuất bán hoặc tổ chức, cá nhân nhập khẩu nhập tách riêng từng bộ phận là cục nóng hoặc cục lạnh thì hàng hóa bán ra hoặc nhập khẩu (cục nóng, cục lạnh) vẫn thuộc đối tượng chịu thuế tiêu thụ đặc biệt như đối với sản phẩm hoàn chỉnh (máy điều hoà nhiệt độ hoàn chỉnh);"},{"k":"p","t":"i) Bài lá;"},{"k":"p","t":"k) Vàng mã, hàng mã, không bao gồm hàng mã là đồ chơi trẻ em và đồ dùng dạy học;"},{"k":"p","t":"l) Nước giải khát theo Tiêu chuẩn quốc gia (TCVN) có hàm lượng đường trên 5g/100mL"},{"k":"p","t":"Hàng hóa quy định tại khoản này là sản phẩm hoàn chỉnh, không bao gồm linh kiện để lắp ráp các hàng hóa này."},{"k":"p","t":"2. Dịch vụ bao gồm:"},{"k":"p","t":"a) Kinh doanh vũ trường;"},{"k":"p","t":"b) Kinh doanh mát-xa (massage), ka-ra-ô-kê (karaoke);"},{"k":"p","t":"c) Kinh doanh ca-si-nô (casino); trò chơi điện tử có thưởng bao gồm trò chơi bằng máy giắc-pót (jackpot), máy sờ-lot (slot) và các loại máy tương tự;"},{"k":"p","t":"d) Kinh doanh đặt cược bao gồm đặt cược thể thao, giải trí và các hình thức đặt cược khác theo quy định của pháp luật;"},{"k":"p","t":"đ) Kinh doanh gôn (golf);"},{"k":"p","t":"e) Kinh doanh xổ số."},{"k":"p","t":"3. Trường hợp cần thiết phải sửa đổi, bổ sung đối tượng chịu thuế để phù hợp với bối cảnh kinh tế - xã hội trong từng thời kỳ, Chính phủ trình Ủy ban Thường vụ Quốc hội xem xét, quyết định và báo cáo Quốc hội tại kỳ họp gần nhất."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-66_3","no":3,"code":"Điều 3","title":"Điều 3. Đối tượng không chịu thuế","shortTitle":"Đối tượng không chịu thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Hàng hóa quy định tại khoản 1 Điều 2 của Luật này không thuộc đối tượng chịu thuế tiêu thụ đặc biệt trong các trường hợp sau đây:"},{"k":"p","t":"a) Hàng hóa do tổ chức, cá nhân sản xuất, gia công, thuê gia công trực tiếp xuất khẩu ra nước ngoài hoặc bán, ủy thác cho tổ chức, cá nhân kinh doanh khác để xuất khẩu ra nước ngoài;"},{"k":"p","t":"b) Hàng hóa nhập khẩu bao gồm:"},{"k":"p","t":"b1) Hàng viện trợ nhân đạo, viện trợ không hoàn lại bao gồm cả hàng hóa nhập khẩu bằng nguồn vốn viện trợ không hoàn lại được cơ quan có thẩm quyền phê duyệt, hàng trợ giúp nhân đạo, hàng cứu trợ khẩn cấp nhằm khắc phục hậu quả chiến tranh, thiên tai, dịch bệnh; quà tặng của tổ chức, cá nhân ở nước ngoài cho cơ quan nhà nước, tổ chức chính trị, tổ chức chính trị - xã hội, tổ chức chính trị xã hội - nghề nghiệp, tổ chức xã hội, tổ chức xã hội - nghề nghiệp, đơn vị vũ trang nhân dân, đơn vị sự nghiệp trong định mức được miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu; quà biếu, quà tặng cho cá nhân tại Việt Nam trong định mức được miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu;"},{"k":"p","t":"b2) Hàng hóa quá cảnh theo quy định của pháp luật về thương mại, quản lý ngoại thương; hàng hóa chuyển khẩu, trung chuyển; hàng hóa từ nước ngoài nhập khẩu vào kho ngoại quan sau đó xuất khẩu sang nước khác theo quy định của pháp luật về hải quan;"},{"k":"p","t":"b3) Hàng tạm nhập khẩu, tái xuất khẩu và tạm xuất khẩu, tái nhập khẩu không phải nộp thuế nhập khẩu, thuế xuất khẩu trong thời hạn theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu. Trường hợp quá thời hạn tái xuất khẩu, tái nhập khẩu hoặc bán ra hoặc thay đổi mục đích sử dụng trong thời hạn tạm nhập khẩu, tạm xuất khẩu thì tổ chức, cá nhân kinh doanh phải nộp thuế tiêu thụ đặc biệt;"},{"k":"p","t":"b4) Đồ dùng của tổ chức, cá nhân nước ngoài theo tiêu chuẩn miễn trừ ngoại giao; hàng hóa trong tiêu chuẩn hành lý miễn thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu; hàng nhập khẩu để bán tại cửa hàng miễn thuế theo quy định của pháp luật;"},{"k":"p","t":"b5) Hàng hóa xuất khẩu ra nước ngoài đã nộp thuế tiêu thụ đặc biệt bị phía nước ngoài trả lại khi nhập khẩu;"},{"k":"p","t":"c) Máy bay, trực thăng, tàu lượn, du thuyền sử dụng cho mục đích kinh doanh vận chuyển hàng hóa, hành khách, khách du lịch và máy bay, trực thăng, tàu lượn sử dụng cho mục đích an ninh, quốc phòng, cứu thương, cứu hộ, cứu nạn, chữa cháy, huấn luyện đào tạo phi công, quay phim, chụp ảnh, đo đạc bản đồ, sản xuất nông nghiệp;"},{"k":"p","t":"d) Xe ô tô cứu thương; xe ô tô chở phạm nhân; xe ô tô tang lễ; xe ô tô thiết kế vừa có chỗ ngồi, vừa có chỗ đứng chở được từ 24 người trở lên; xe ô tô chở người, xe chở người bốn bánh có gắn động cơ không đăng ký lưu hành và chỉ chạy trong phạm vi khu vui chơi, giải trí, thể thao, di tích lịch sử, bệnh viện, trường học và xe ô tô chuyên dùng khác theo quy định của Chính phủ."},{"k":"p","t":"2. Trường hợp cần thiết phải sửa đổi, bổ sung đối tượng không chịu thuế để phù hợp với bối cảnh kinh tế - xã hội trong từng thời kỳ, Chính phủ trình Ủy ban Thường vụ Quốc hội xem xét, quyết định và báo cáo Quốc hội tại kỳ họp gần nhất."},{"k":"p","t":"3. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-66_4","no":4,"code":"Điều 4","title":"Điều 4. Người nộp thuế","shortTitle":"Người nộp thuế","chuong":"Chương I — NHỮNG QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế tiêu thụ đặc biệt là tổ chức, cá nhân sản xuất, gia công, nhập khẩu hàng hóa và kinh doanh dịch vụ thuộc đối tượng chịu thuế tiêu thụ đặc biệt."},{"k":"p","t":"2. Trường hợp tổ chức, cá nhân có hoạt động kinh doanh xuất khẩu mua hàng hóa thuộc đối tượng chịu thuế tiêu thụ đặc biệt của tổ chức, cá nhân sản xuất để xuất khẩu ra nước ngoài nhưng không xuất khẩu ra nước ngoài mà tiêu thụ trong nước thì tổ chức, cá nhân có hoạt động kinh doanh xuất khẩu là người nộp thuế tiêu thụ đặc biệt."}]},{"id":"luat-66_5","no":5,"code":"Điều 5","title":"Điều 5. Căn cứ và phương pháp tính thuế","shortTitle":"Căn cứ và phương pháp tính thuế","chuong":"Chương II — CĂN CỨ TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Căn cứ tính thuế:"},{"k":"p","t":"a) Căn cứ tính thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế theo tỷ lệ phần trăm là giá tính thuế của hàng hóa, dịch vụ chịu thuế và thuế suất;"},{"k":"p","t":"b) Căn cứ tính thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế tuyệt đối là lượng hàng hóa chịu thuế và mức thuế tuyệt đối."},{"k":"p","t":"2. Phương pháp tính thuế:"},{"k":"tbl","rows":[["Thuế tiêu thụ đặc biệtphải nộp","=","Thuế tiêu thụ đặc biệtáp dụng phương pháptính thuế theo tỷ lệphần trăm","+","Thuế tiêu thụ đặc biệtáp dụng phương pháptính thuế tuyệt đối(nếu có)"]]},{"k":"p","t":"Trong đó:"},{"k":"tbl","rows":[["Thuế tiêu thụ đặc biệtáp dụng phương pháptính thuế theo tỷ lệphần trăm","=","Giá tính thuế củahàng hóa, dịch vụchịu thuế","x","Thuế suất"]]},{"k":"tbl","rows":[["Thuế tiêu thụ đặc biệt áp dụng phương pháp tính thuế tuyệt đối","=","Lượng hàng hóachịu thuế","x","Mức thuế tuyệt đối"]]}]},{"id":"luat-66_6","no":6,"code":"Điều 6","title":"Điều 6. Giá tính thuế","shortTitle":"Giá tính thuế","chuong":"Chương II — CĂN CỨ TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Giá tính thuế tiêu thụ đặc biệt đối với hàng hóa, dịch vụ là giá bán ra, giá cung ứng dịch vụ chưa có thuế tiêu thụ đặc biệt, chưa có thuế bảo vệ môi trường và chưa có thuế giá trị gia tăng được quy định như sau:"},{"k":"p","t":"a) Đối với hàng hóa sản xuất trong nước, hàng hóa nhập khẩu là giá do tổ chức, cá nhân sản xuất, tổ chức, cá nhân nhập khẩu bán ra."},{"k":"p","t":"Trường hợp hàng hóa chịu thuế tiêu thụ đặc biệt được bán cho doanh nghiệp kinh doanh thương mại là doanh nghiệp có quan hệ công ty mẹ, công ty con hoặc các công ty con trong cùng công ty mẹ với doanh nghiệp sản xuất, doanh nghiệp nhập khẩu hoặc doanh nghiệp kinh doanh thương mại là doanh nghiệp có quan hệ liên kết thì giá tính thuế tiêu thụ đặc biệt không được thấp hơn tỷ lệ phần trăm (%) so với giá bình quân của các doanh nghiệp kinh doanh thương mại mua trực tiếp của doanh nghiệp sản xuất, doanh nghiệp nhập khẩu bán ra theo quy định của Chính phủ;"},{"k":"p","t":"b) Đối với hàng hóa nhập khẩu tại khâu nhập khẩu là trị giá tính thuế nhập khẩu theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu, cộng với thuế nhập khẩu, cộng với các khoản thuế là thuế nhập khẩu bổ sung theo quy định của pháp luật về thuế xuất khẩu, thuế nhập khẩu (nếu có). Trường hợp hàng hóa nhập khẩu được miễn, giảm thuế nhập khẩu, thuế nhập khẩu bổ sung thì giá tính thuế tiêu thụ đặc biệt không bao gồm số thuế nhập khẩu, thuế nhập khẩu bổ sung được miễn, giảm;"},{"k":"p","t":"c) Đối với hàng hóa gia công là giá tính thuế của hàng hóa bán ra của tổ chức, cá nhân giao gia công hoặc giá bán của sản phẩm cùng loại hoặc tương đương tại cùng thời điểm bán hàng;"},{"k":"p","t":"d) Đối với hàng hóa sản xuất dưới hình thức hợp tác kinh doanh giữa tổ chức, cá nhân sản xuất và tổ chức, cá nhân sử dụng hoặc sở hữu thương hiệu (nhãn hiệu) hàng hóa, công nghệ sản xuất thì giá tính thuế tiêu thụ đặc biệt là giá bán ra của tổ chức, cá nhân sử dụng hoặc sở hữu thương hiệu hàng hóa, công nghệ sản xuất. Trường hợp tổ chức, cá nhân sản xuất theo giấy phép nhượng quyền và chuyển giao hàng hóa cho chi nhánh hoặc đại diện của công ty nước ngoài tại Việt Nam để tiêu thụ sản phẩm thì giá tính thuế tiêu thụ đặc biệt là giá bán ra của chi nhánh, đại diện công ty nước ngoài tại Việt Nam;"},{"k":"p","t":"đ) Đối với hàng hóa bán theo phương thức trả góp, trả chậm là giá bán theo phương thức bán trả tiền một lần của hàng hóa đó không bao gồm khoản lãi trả góp, lãi trả chậm."},{"k":"p","t":"Đối với hàng hóa thuộc đối tượng chịu thuế tiêu thụ đặc biệt được bán kèm theo dịch vụ cho thuê một phần hoặc bộ phận của hàng hóa đó thì giá tính thuế tiêu thụ đặc biệt là giá tính thuế của hàng hóa cùng loại hoặc tương đương được bán tại thời điểm phát sinh;"},{"k":"p","t":"e) Đối với kinh doanh gôn là giá bán thẻ hội viên, giá bán vé chơi gôn bao gồm cả tiền phí chơi gôn, tiền bán vé tập gôn, tiền bảo dưỡng sân cỏ, hoạt động cho thuê xe (buggy), thuê người giúp việc trong khi chơi gôn (caddy), tiền ký quỹ (nếu có) và các khoản thu khác liên quan đến chơi gôn do người chơi gôn, hội viên trả cho tổ chức, cá nhân kinh doanh gôn;"},{"k":"p","t":"g) Đối với kinh doanh ca-si-nô, trò chơi điện tử có thưởng, kinh doanh đặt cược là doanh thu từ hoạt động này trừ số tiền đã trả thưởng cho khách và số tiền đổi trả cho khách không sử dụng hết (nếu có);"},{"k":"p","t":"h) Đối với kinh doanh vũ trường, mát-xa, ka-ra-ô-kê là doanh thu của các hoạt động kinh doanh trong vũ trường, kinh doanh mát-xa, ka-ra-ô-kê bao gồm cả doanh thu của dịch vụ ăn uống và các dịch vụ khác đi kèm;"},{"k":"p","t":"i) Đối với kinh doanh xổ số, giá tính thuế tiêu thụ đặc biệt là doanh thu bán vé các loại hình xổ số được phép kinh doanh theo quy định của pháp luật."},{"k":"p","t":"2. Đối với hàng hóa, dịch vụ dùng để trao đổi hoặc tiêu dùng nội bộ, biếu, tặng cho, khuyến mại là giá tính thuế tiêu thụ đặc biệt của hàng hóa, dịch vụ cùng loại hoặc tương đương tại thời điểm phát sinh các hoạt động này."},{"k":"p","t":"3. Giá tính thuế tiêu thụ đặc biệt đối với hàng hóa, dịch vụ quy định tại Điều này bao gồm cả khoản thu thêm, được thu (nếu có) mà tổ chức, cá nhân kinh doanh được hưởng."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-66_7","no":7,"code":"Điều 7","title":"Điều 7. Thời điểm xác định thuế tiêu thụ đặc biệt","shortTitle":"Thời điểm xác định thuế tiêu thụ đặc biệt","chuong":"Chương II — CĂN CỨ TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thời điểm xác định thuế tiêu thụ đặc biệt đối với hàng hóa là thời điểm chuyển giao quyền sở hữu hoặc quyền sử dụng hàng hóa cho người mua, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"2. Thời điểm xác định thuế tiêu thụ đặc biệt đối với dịch vụ là thời điểm hoàn thành việc cung ứng dịch vụ hoặc thời điểm lập hóa đơn cung ứng dịch vụ, không phân biệt đã thu được tiền hay chưa thu được tiền."},{"k":"p","t":"3. Thời điểm xác định thuế tiêu thụ đặc biệt đối với hàng hóa nhập khẩu là thời điểm đăng ký tờ khai hải quan."}]},{"id":"luat-66_8","no":8,"code":"Điều 8","title":"Điều 8. Thuế suất và mức thuế tuyệt đối","shortTitle":"Thuế suất và mức thuế tuyệt đối","chuong":"Chương II — CĂN CỨ TÍNH THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Thuế suất và mức thuế tuyệt đối thuế tiêu thụ đặc biệt đối với hàng hóa, dịch vụ được quy định tại Biểu thuế tiêu thụ đặc biệt sau đây:"},{"k":"p","t":"BIỂU THUẾ TIÊU THỤ ĐẶC BIỆT"},{"k":"tbl","rows":[["STT","Hàng hóa, dịch vụ","Thuế suất và mức thuế tuyệt đối"],["","","Thuế suất (%)","Mức thuế tuyệt đối"],["I","Hàng hóa","",""],["1","Thuốc lá","",""],["","a) Thuốc lá điếu","75","- Từ 01/01/2027: 2.000 đồng/bao\n- Từ 01/01/2028: 4.000 đồng/bao\n- Từ 01/01/2029: 6.000 đồng/bao\n- Từ 01/01/2030: 8.000 đồng/bao\n- Từ 01/01/2031: 10.000 đồng/bao"],["","b) Xì gà","75","- Từ 01/01/2027: 20.000 đồng/điếu\n- Từ 01/01/2028: 40.000 đồng/điếu\n- Từ 01/01/2029: 60.000 đồng/điếu\n- Từ 01/01/2030: 80.000 đồng/điếu\n- Từ 01/01/2031: 100.000 đồng/điếu"],["","c) Thuốc lá sợi, thuốc lào hoặc các dạng khác","75","- Từ 01/01/2027: 20.000 đồng/100g hoặc 100ml\n- Từ 01/01/2028: 40.000 đồng/100g hoặc 100ml\n- Từ 01/01/2029: 60.000 đồng/100g hoặc 100ml\n- Từ 01/01/2030: 80.000 đồng/100g hoặc 100ml\n- Từ 01/01/2031: 100.000 đồng/100g hoặc 100ml"],["2","Rượu","",""],["","a) Rượu từ 20 độ trở lên","- Từ 01/01/2026: 65\n- Từ 01/01/2027: 70\n- Từ 01/01/2028: 75\n- Từ 01/01/2029: 80\n- Từ 01/01/2030: 85\n- Từ 01/01/2031: 90",""],["","b) Rượu dưới 20 độ","- Từ 01/01/2026: 35\n- Từ 01/01/2027: 40\n- Từ 01/01/2028: 45\n- Từ 01/01/2029: 50\n- Từ 01/01/2030: 55\n- Từ 01/01/2031: 60",""],["3","Bia","- Từ 01/01/2026: 65\n- Từ 01/01/2027: 70\n- Từ 01/01/2028: 75\n- Từ 01/01/2029: 80\n- Từ 01/01/2030: 85\n- Từ 01/01/2031: 90",""],["4","Xe có gắn động cơ dưới 24 chỗ","",""],["","a) Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 9 chỗ trở xuống, xe ô tô pick-up chở người, trừ loại quy định tại các mục 4đ, 4e và 4g của Biểu thuế quy định tại khoản này","",""],["","- Loại có dung tích xi lanh từ 1.500 cm3 trở xuống","35",""],["","- Loại có dung tích xi lanh trên 1.500 cm3 đến 2.000 cm3","40",""],["","- Loại có dung tích xi lanh trên 2.000 cm3 đến 2.500 cm3","50",""],["","- Loại có dung tích xi lanh trên 2.500 cm3 đến 3.000 cm3","60",""],["","- Loại có dung tích xi lanh trên 3.000 cm3 đến 4.000 cm3","90",""],["","- Loại có dung tích xi lanh trên 4.000 cm3 đến 5.000 cm3","110",""],["","- Loại có dung tích xi lanh trên 5.000 cm3 đến 6.000 cm3","130",""],["","- Loại có dung tích xi lanh trên 6.000 cm3","150",""],["","b) Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 10 đến dưới 16 chỗ, trừ loại quy định tại các mục 4đ, 4e và 4g của Biểu thuế quy định tại khoản này","15",""],["","c) Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 16 đến dưới 24 chỗ, trừ loại quy định tại các mục 4đ, 4e và 4g của Biểu thuế quy định tại khoản này","10",""],["","d) Xe ô tô pick-up chở hàng cabin kép, xe ô tô tải VAN có từ hai hàng ghế trở lên, có thiết kế vách ngăn cố định giữa khoang chở người và khoang chở hàng, trừ loại quy định tại các mục 4đ, 4e và 4g của Biểu thuế quy định tại khoản này","",""],["","- Loại có dung tích xi lanh từ\n2.500 cm3 trở xuống","- Từ 01/01/2026: 15\n- Từ 01/01/2027: 18\n- Từ 01/01/2028: 21\n- Từ 01/01/2029: 24",""],["","- Loại có dung tích xi lanh trên\n2.500 cm3 đến 3.000 cm3","- Từ 01/01/2026: 20\n- Từ 01/01/2027: 23\n- Từ 01/01/2028: 26\n- Từ 01/01/2029: 29",""],["","- Loại có dung tích xi lanh trên\n3.000 cm3","- Từ 01/01/2026: 25\n- Từ 01/01/2027: 28\n- Từ 01/01/2028: 31\n- Từ 01/01/2029: 34",""],["","đ) Xe ô tô chạy bằng xăng kết hợp năng lượng điện theo quy định của Chính phủ, xe ô tô chạy bằng xăng kết hợp năng lượng sinh học, trong đó tỷ trọng xăng sử dụng không quá 70% số năng lượng sử dụng do Chính phủ quy định; xe ô tô chạy bằng khí thiên nhiên","Bằng 70% mức thuế suất áp dụng cho xe cùng loại quy định tại các mục 4a, 4b, 4c và 4d của Biểu thuế quy định tại khoản này.",""],["","e) Xe ô tô chạy bằng năng lượng sinh học","Bằng 50% mức thuế suất áp dụng cho xe cùng loại quy định tại các mục 4a, 4b, 4c và 4d của Biểu thuế quy định tại khoản này.",""],["","g) Xe có gắn động cơ dưới 24 chỗ chạy điện","",""],["","* Xe có gắn động cơ dưới 24 chỗ chạy bằng pin","",""],["","- Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 9 chỗ trở xuống, xe ô tô pick-up chở người","- Từ 01/01/2026: 3\n- Từ 01/3/2027: 11",""],["","- Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 10 đến dưới 16 chỗ","- Từ 01/01/2026: 2\n- Từ 01/3/2027: 7",""],["","- Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 16 đến dưới 24 chỗ","- Từ 01/01/2026: 1\n- Từ 01/3/2027: 4",""],["","- Xe ô tô pick-up chở hàng cabin kép, xe ô tô tải VAN có từ hai hàng ghế trở lên, có thiết kế vách ngăn cố định giữa khoang chở người và khoang chở hàng","- Từ 01/01/2026: 2\n- Từ 01/3/2027: 7",""],["","* Xe có động cơ dưới 24 chỗ chạy điện khác:","",""],["","- Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 9 chỗ trở xuống, xe ô tô pick-up chở người","15",""],["","- Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 10 đến dưới 16 chỗ","10",""],["","- Xe ô tô chở người và xe chở người bốn bánh có gắn động cơ từ 16 đến dưới 24 chỗ","5",""],["","- Xe ô tô pick-up chở hàng cabin kép, xe ô tô tải VAN có từ hai hàng ghế trở lên, có thiết kế vách ngăn cố định giữa khoang chở người và khoang chở hàng","10",""],["","h) Xe ô tô nhà ở lưu động không phân biệt dung tích xi lanh","75",""],["5","Xe mô tô hai bánh, xe mô tô ba bánh có dung tích xi lanh trên 125 cm3","20",""],["6","Máy bay, trực thăng, tàu lượn","30",""],["7","Du thuyền","30",""],["8","Xăng các loại","",""],["","a) Xăng","10",""],["","b) Xăng E5","8",""],["","c) Xăng E10","7",""],["9","Điều hòa nhiệt độ công suất trên 24.000 BTU đến 90.000 BTU","10",""],["10","Bài lá","40",""],["11","Vàng mã, hàng mã","70",""],["12","Nước giải khát theo Tiêu chuẩn quốc gia (TCVN) có hàm lượng đường trên 5g/100ml","- Từ 01/01/2027: 8\n- Từ 01/01/2028: 10",""],["II","Dịch vụ","",""],["1","Kinh doanh vũ trường","40",""],["2","Kinh doanh mát-xa, ka-ra-ô-kê","30",""],["3","Kinh doanh ca-si-nô, trò chơi điện tử có thưởng","35",""],["4","Kinh doanh đặt cược","30",""],["5","Kinh doanh gôn","20",""],["6","Kinh doanh xổ số","15",""]]},{"k":"p","t":"2. Mức thuế tuyệt đối đối với thuốc lá điếu tại điểm a mục 1 phần I của Biểu thuế này áp dụng với bao thuốc lá có 20 điếu. Chính phủ hướng dẫn quy đổi mức thuế tuyệt đối áp dụng đối với bao thuốc lá khác 20 điếu."},{"k":"p","t":"Mức thuế tuyệt đối đối với xì gà tại điểm b mục 1 phần I của Biểu thuế này áp dụng với xì gà có trọng lượng 20g/điếu. Chính phủ hướng dẫn quy đổi mức thuế tuyệt đối áp dụng đối với xì gà có trọng lượng khác 20g/điếu."}]},{"id":"luat-66_9","no":9,"code":"Điều 9","title":"Điều 9. Hoàn thuế, khấu trừ thuế","shortTitle":"Hoàn thuế, khấu trừ thuế","chuong":"Chương III — HOÀN THUẾ, KHẤU TRỪ THUẾ, GIẢM THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế tiêu thụ đặc biệt được hoàn thuế đã nộp trong các trường hợp sau đây:"},{"k":"p","t":"a) Hàng hóa là nguyên liệu nhập khẩu để sản xuất, gia công hàng xuất khẩu ra nước ngoài."},{"k":"p","t":"Việc hoàn thuế tiêu thụ đặc biệt theo quy định tại điểm này chỉ thực hiện đối với số lượng hàng hóa thực tế xuất khẩu ra nước ngoài;"},{"k":"p","t":"b) Quyết toán thuế khi giải thể, phá sản có số thuế tiêu thụ đặc biệt chưa được khấu trừ hết."},{"k":"p","t":"Trường hợp tổ hợp tác chuyển đổi thành hợp tác xã thì hợp tác xã được kế thừa số thuế tiêu thụ đặc biệt nộp thừa hoặc chưa được khấu trừ hết của tổ hợp tác để khấu trừ, hoàn thuế theo quy định;"},{"k":"p","t":"c) Hoàn thuế tiêu thụ đặc biệt theo điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên."},{"k":"p","t":"2. Người nộp thuế sản xuất hàng hóa thuộc đối tượng chịu thuế tiêu thụ đặc biệt bằng nguyên liệu đã nộp thuế tiêu thụ đặc biệt, nếu có chứng từ hợp pháp, thì được khấu trừ số thuế đã nộp đối với nguyên liệu khi xác định số thuế tiêu thụ đặc biệt phải nộp ở khâu sản xuất."},{"k":"p","t":"Đối với người nộp thuế được phép sản xuất, pha chế xăng sinh học, số thuế tiêu thụ đặc biệt chưa được khấu trừ hết của xăng khoáng nguyên liệu dùng để sản xuất, pha chế xăng sinh học (bao gồm cả số thuế chưa được khấu trừ hết của kỳ khai thuế trước đó liền kề) được bù trừ với số thuế tiêu thụ đặc biệt phải nộp của hàng hóa, dịch vụ khác phát sinh trong kỳ. Trường hợp sau khi bù trừ, còn số thuế tiêu thụ đặc biệt chưa được khấu trừ hết của xăng khoáng nguyên liệu dùng để sản xuất, pha chế xăng sinh học thì được khấu trừ vào kỳ tiếp theo hoặc được hoàn trả."},{"k":"p","t":"Nguồn hoàn trả thuế tiêu thụ đặc biệt được lấy từ số thu về thuế tiêu thụ đặc biệt của ngân sách trung ương."},{"k":"p","t":"3. Người nộp thuế nhập khẩu hàng hóa chịu thuế tiêu thụ đặc biệt được khấu trừ số thuế tiêu thụ đặc biệt đã nộp ở khâu nhập khẩu khi xác định số thuế tiêu thụ đặc biệt phải nộp ở khâu bán ra."},{"k":"p","t":"4. Chính phủ quy định chi tiết Điều này."}]},{"id":"luat-66_10","no":10,"code":"Điều 10","title":"Điều 10. Giảm thuế","shortTitle":"Giảm thuế","chuong":"Chương III — HOÀN THUẾ, KHẤU TRỪ THUẾ, GIẢM THUẾ","muc":"","level":1,"content":[{"k":"p","t":"1. Người nộp thuế sản xuất hàng hóa thuộc đối tượng chịu thuế tiêu thụ đặc biệt gặp khó khăn do thiên tai, tai nạn bất ngờ được giảm thuế."},{"k":"p","t":"2. Mức giảm thuế được xác định trên cơ sở tổn thất thực tế do thiên tai, tai nạn bất ngờ gây ra nhưng không quá 30% số thuế phải nộp của năm xảy ra thiệt hại và không vượt quá giá trị tài sản bị thiệt hại sau khi được bồi thường (nếu có)."},{"k":"p","t":"3. Thủ tục, hồ sơ giảm thuế được thực hiện theo quy định của pháp luật về quản lý thuế."}]},{"id":"luat-66_11","no":11,"code":"Điều 11","title":"Điều 11. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương IV — ĐIỀU KHOẢN THI HÀNH","muc":"","level":1,"content":[{"k":"p","t":"1. Luật này có hiệu lực thi hành từ ngày 01 tháng 01 năm 2026."},{"k":"p","t":"2. Luật Thuế tiêu thụ đặc biệt số 27/2008/QH12 đã được sửa đổi, bổ sung một số điều theo Luật số 70/2014/QH13, Luật số 71/2014/QH13, Luật số 106/2016/QH13 và Luật số 03/2022/QH15 hết hiệu lực kể từ ngày Luật này có hiệu lực thi hành."},{"k":"p","t":"_________________________________________________________________________________"},{"k":"p","t":"Luật này được Quốc hội nước Cộng hòa xã hội chủ nghĩa Việt Nam khóa XV, kỳ họp thứ 9 thông qua ngày 14 tháng 6 năm 2025."},{"k":"tbl","rows":[["","CHỦ TỊCH QUỐC HỘI\nTrần Thanh Mẫn"]]}]}],"refs":{"luat-66_1":[{"kind":"guidance","targetSlug":"nd360","targetAnchor":"nd360_1","label":"NĐ 360/2025 — Hướng dẫn chi tiết Luật TTĐB"},{"kind":"guidance","targetSlug":"tt158","targetAnchor":"tt158_1","label":"TT 158/2025 — Hồ sơ, thủ tục"},{"kind":"related","targetSlug":"luat-48","targetAnchor":"luat-48_7","label":"Luật 48 Điều 7 — Giá tính thuế GTGT gồm TTĐB"}]},"details":{"luat-66_2":[{"match":"Hàng hóa bao gồm","title":"Điều 2 — Đối tượng chịu thuế TTĐB","summary":"Hàng hóa chịu TTĐB: thuốc lá, rượu, bia, ô tô dưới 24 chỗ, xe máy phân khối lớn, tàu bay, du thuyền, xăng, điều hòa, bài lá, vàng mã... và dịch vụ: vũ trường, mát-xa, karaoke, casino, đặt cược, golf, xổ số. Chi tiết tại NĐ 360 Điều 3.","links":[{"targetSlug":"nd360","targetAnchor":"nd360_3","label":"NĐ 360 Điều 3 — Đối tượng chịu thuế (chi tiết)"},{"targetSlug":"luat-66","targetAnchor":"luat-66_3","label":"Luật 66 Điều 3 — Đối tượng không chịu thuế"}]}],"luat-66_3":[{"match":"Hàng hóa quy định tại khoản 1","title":"Điều 3 — Đối tượng không chịu thuế TTĐB","summary":"Một số hàng hóa không chịu TTĐB: hàng xuất khẩu, hàng tạm nhập tái xuất, hàng viện trợ nhân đạo, hàng quá cảnh... Hồ sơ xác định chi tiết tại TT 158 Điều 3.","links":[{"targetSlug":"nd360","targetAnchor":"nd360_4","label":"NĐ 360 Điều 4 — Đối tượng không chịu thuế"},{"targetSlug":"tt158","targetAnchor":"tt158_3","label":"TT 158 Điều 3 — Hồ sơ xác định đối tượng không chịu thuế"}]}],"luat-66_4":[{"match":"Người nộp thuế tiêu thụ đặc biệt là tổ chức, cá nhân sản xuất, gia công, nhập khẩu","title":"Điều 4 — Người nộp thuế TTĐB","summary":"Người nộp thuế TTĐB là tổ chức, cá nhân sản xuất, gia công, nhập khẩu hàng hóa và kinh doanh dịch vụ chịu thuế TTĐB. Việc kê khai, nộp thuế theo Luật Quản lý thuế.","links":[{"targetSlug":"luat-108","targetAnchor":"luat-108_1","label":"Luật QLT 108 — Quản lý kê khai, nộp thuế TTĐB"}]}],"luat-66_6":[{"match":"Giá tính thuế tiêu thụ đặc biệt đối với hàng hóa, dịch vụ là giá bán ra, giá cung ứng","title":"Điều 6 — Giá tính thuế TTĐB","summary":"Giá tính thuế TTĐB là giá bán ra/giá cung ứng dịch vụ chưa có thuế TTĐB, chưa có thuế GTGT và chưa có thuế BVMT. <strong>Liên hệ GTGT:</strong> giá tính thuế GTGT của hàng chịu TTĐB đã bao gồm cả thuế TTĐB (Luật 48 Điều 7).","links":[{"targetSlug":"nd360","targetAnchor":"nd360_5","label":"NĐ 360 Điều 5 — Giá tính thuế (chi tiết)"},{"targetSlug":"luat-48","targetAnchor":"luat-48_7","label":"Luật 48 Điều 7 — Giá tính thuế GTGT (gồm TTĐB)"}]}],"luat-66_8":[{"match":"Thuế suất và mức thuế tuyệt đối thuế tiêu thụ đặc biệt đối với hàng hóa, dịch vụ","title":"Điều 8 — Thuế suất & mức thuế tuyệt đối (Biểu thuế TTĐB)","summary":"Biểu thuế TTĐB quy định thuế suất % cho từng nhóm hàng hóa, dịch vụ; riêng thuốc lá áp dụng kết hợp thuế suất % và mức thuế tuyệt đối. Cách xác định và quy đổi chi tiết tại NĐ 360 Điều 6, 7.","links":[{"targetSlug":"nd360","targetAnchor":"nd360_6","label":"NĐ 360 Điều 6 — Xe ô tô xăng kết hợp điện"},{"targetSlug":"nd360","targetAnchor":"nd360_7","label":"NĐ 360 Điều 7 — Quy đổi mức thuế tuyệt đối thuốc lá"}]}],"luat-66_9":[{"match":"Người nộp thuế tiêu thụ đặc biệt được hoàn thuế đã nộp trong các trường hợp sau đây","title":"Điều 9 — Hoàn thuế, khấu trừ thuế TTĐB","summary":"Các trường hợp hoàn/khấu trừ TTĐB (hàng tạm nhập tái xuất, nguyên liệu đã nộp TTĐB dùng sản xuất hàng chịu TTĐB...). Hồ sơ hoàn thuế xăng sinh học chi tiết tại TT 158 Điều 4.","links":[{"targetSlug":"nd360","targetAnchor":"nd360_8","label":"NĐ 360 Điều 8 — Hoàn thuế, khấu trừ thuế"},{"targetSlug":"tt158","targetAnchor":"tt158_4","label":"TT 158 Điều 4 — Hoàn thuế xăng sinh học"}]}]},"summaries":{}}</script>

function buildHome(){
  var m=D.meta||{},o=D.outline||[];
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<h1 class="ht">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p style="color:#475569">'+e(m.scope)+'</p>';
  h+='<div class="hgrid">';
  h+='<div class="sc"><b>'+o.length+'</b><span>Điều</span></div>';
  h+='<div class="sc"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>';
  if(m.effectiveDate)h+='<div class="sc"><b style="font-size:15px">'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>';
  h+='</div>';
  if(m.description)h+='<div class="db">'+e(m.description)+'</div>';
  if(m.related&&m.related.length){h+='<div style="margin-top:10px">';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'});h+='</div>';}
  document.getElementById('s-home').innerHTML=h;
}

/*SUM-JS-START*/
function srcLen(a){var n=0;(a.content||[]).forEach(function(b){if(b.k==='p')n+=(b.t||'').length;else if(b.k==='tbl')(b.rows||[]).forEach(function(r){n+=r.join(' ').length})});return n;}
function summaryHtml(a,s){
  if(s&&(s.tldr||(s.points&&s.points.length))){
    var h='';
    if(s.tldr)h+='<p class="sum-tldr">'+e(s.tldr)+'</p>';
    if(s.points&&s.points.length){h+='<ul class="sum-pts">';s.points.forEach(function(p){h+='<li>'+e(p)+'</li>'});h+='</ul>';}
    return h;
  }
  // Chưa có tóm tắt: Điều ngắn (<250 ký tự) → trích nguyên văn; Điều dài → chờ tóm tắt
  var L=srcLen(a);
  if(L>0&&L<250)return '<div class="sum-verbatim"><span class="sum-vlabel">Điều ngắn — trích nguyên văn</span>'+renderContent(a.content||[],'')+'</div>';
  return '<p class="sum-empty">— Chưa có tóm tắt —</p>';
}
function buildSummary(){
  var m=D.meta||{},o=D.outline||[],sm=D.summaries||{};
  var chs={};o.forEach(function(a){if(a.chuong)chs[a.chuong]=1});
  var h='<div class="sum-wrap"><h1 class="sum-h1">'+e(m.title||'')+'</h1>';
  if(m.scope)h+='<p class="sum-scope">'+e(m.scope)+'</p>';
  h+='<div class="sum-grid"><div class="sum-stat"><b>'+o.length+'</b><span>Điều</span></div><div class="sum-stat"><b>'+Object.keys(chs).length+'</b><span>Chương</span></div>'+(m.effectiveDate?'<div class="sum-stat"><b>'+e(m.effectiveDate)+'</b><span>Hiệu lực</span></div>':'')+'</div>';
  if(m.related&&m.related.length){h+='<div class="sum-rel">';m.related.forEach(function(r){h+='<span class="sum-tag">'+e(r)+'</span>'});h+='</div>';}
  var lastC='',lastM='';
  o.forEach(function(a){
    if((a.chuong||'')!==lastC){lastC=a.chuong||'';lastM='';if(lastC)h+='<div class="sum-ch">'+e(lastC)+'</div>';}
    if((a.muc||'')!==lastM){lastM=a.muc||'';if(lastM)h+='<div class="sum-mu">'+e(lastM)+'</div>';}
    h+='<div class="sum-art" id="sum-'+a.id+'"><div class="sum-head"><span class="sum-code">'+e(a.code)+'</span>'+(a.shortTitle?'<span class="sum-title">'+e(a.shortTitle)+'</span>':'')+'<a class="sum-go" onclick="goOriginal(\''+a.id+'\');return false">Xem nguyên bản →</a></div>'+summaryHtml(a,sm[a.id])+'</div>';
  });
  h+='</div>';
  document.getElementById('s-summary').innerHTML=h;
}
function goOriginal(id){show(id);}
/*SUM-JS-END*/
function initHash(){
  var id=(location.hash||'').replace('#','');
  var ok=(D.outline||[]).some(function(a){return a.id===id});
  buildSb('');buildSummary();
  if(ok)show(id);else if(!D.summaries||!Object.keys(D.summaries).length){if((D.outline||[]).length)show(D.outline[0].id);}
}
initHash();
</script>
