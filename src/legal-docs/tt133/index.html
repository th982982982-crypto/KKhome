i sản trên Báo cáo tài chính của mình."},{"k":"p","t":"b) Mỗi bên tham gia liên doanh được nhận sản phẩm hoặc doanh thu từ việc sử dụng và khai thác tài sản đồng kiểm soát và chịu một phần chi phí phát sinh theo thỏa thuận trong hợp đồng."},{"k":"p","t":"c) Các bên tham gia liên doanh phải mở sổ kế toán chi tiết trên cùng hệ thống sổ kế toán của mình để ghi chép và phản ánh trong Báo cáo tài chính của mình những nội dung sau đây:"},{"k":"p","t":"- Phần vốn góp vào tài sản đồng kiểm soát, được phân loại theo tính chất của tài sản;"},{"k":"p","t":"- Các khoản nợ phải trả phát sinh riêng của mỗi bên tham gia góp vốn liên doanh;"},{"k":"p","t":"- Phần nợ phải trả phát sinh chung phải gánh chịu cùng với các bên tham gia góp vốn liên doanh khác từ hoạt động của liên doanh;"},{"k":"p","t":"- Các khoản thu nhập từ việc bán hoặc sử dụng phần sản phẩm được chia từ liên doanh cùng với phần chi phí phát sinh được phân chia từ hoạt động của liên doanh;"},{"k":"p","t":"- Các khoản chi phí phát sinh liên quan đến việc góp vốn liên doanh."},{"k":"p","t":"Đối với TSCĐ, BĐSĐT khi mang đi góp vốn vào BCC và không chuyển quyền sở hữu từ bên góp vốn thành sở hữu chung của các bên thì bên nhận tài sản theo dõi như tài sản nhận giữ hộ, không hạch toán tăng tài sản và vốn góp của chủ sở hữu; Bên góp tài sản không ghi giảm tài sản trên sổ kế toán mà chỉ theo dõi chi tiết địa điểm, vị trí, nơi đặt tài sản."},{"k":"p","t":"Đối với TSCĐ, BĐSĐT mang đi góp vốn có sự chuyển quyền sở hữu từ bên góp vốn thành quyền sở hữu chung, trong quá trình đang xây dựng tài sản đồng kiểm soát, bên mang tài sản đi góp phải ghi giảm tài sản trên sổ kế toán và ghi nhận giá trị tài sản vào chi phí xây dựng cơ bản dở dang. Sau khi tài sản đồng kiểm soát hoàn thành, bàn giao, đưa vào sử dụng, căn cứ vào giá trị tài sản được chia, các bên ghi nhận tăng tài sản của mình phù hợp với mục đích sử dụng."},{"k":"p","t":"1.5. Đối với BCC dưới hình thức hoạt động kinh doanh đồng kiểm soát"},{"k":"p","t":"a) Hợp đồng hợp tác kinh doanh dưới hình thức hoạt động kinh doanh đồng kiểm soát là hoạt động liên doanh không thành lập một cơ sở kinh doanh mới. Các bên liên doanh có nghĩa vụ và được hưởng quyền lợi theo thỏa thuận trong hợp đồng. Hoạt động của hợp đồng liên doanh được các bên góp vốn thực hiện cùng với các hoạt động kinh doanh thông thường khác của từng bên."},{"k":"p","t":"b) Hợp đồng hợp tác kinh doanh quy định các khoản chi phí phát sinh riêng cho hoạt động kinh doanh đồng kiểm soát do mỗi bên liên doanh bỏ ra thì bên đó phải gánh chịu. Đối với các khoản chi phí chung (nếu có) thì căn cứ vào các thỏa thuận trong hợp đồng để phân chia cho các bên góp vốn."},{"k":"p","t":"c) Các bên tham gia liên doanh phải mở sổ kế toán để ghi chép và phản ánh trong Báo cáo tài chính của mình các nội dung sau đây:"},{"k":"p","t":"- Tài sản góp vốn liên doanh và chịu sự kiểm soát của bên góp vốn liên doanh;"},{"k":"p","t":"- Các khoản nợ phải trả phải gánh chịu;"},{"k":"p","t":"- Doanh thu được chia từ việc bán hàng hoặc cung cấp dịch vụ của liên doanh;"},{"k":"p","t":"- Chi phí phải gánh chịu."},{"k":"p","t":"d) Khi bên liên doanh có phát sinh chi phí chung phải mở sổ kế toán để ghi chép, tập hợp toàn bộ các chi phí chung đó. Định kỳ căn cứ vào các thỏa thuận trong hợp đồng liên doanh về việc phân bổ các chi phí chung, kế toán lập Bảng phân bổ chi phí chung, được các bên liên doanh xác nhận, giao cho mỗi bên giữ một bản (bản chính). Bảng phân bổ chi phí chung kèm theo các chứng từ gốc hợp pháp là căn cứ để mỗi bên liên doanh kế toán chi phí chung được phân bổ từ hợp đồng."},{"k":"p","t":"đ) Trường hợp hợp đồng liên doanh quy định chia sản phẩm, định kỳ theo thỏa thuận trong hợp đồng liên doanh, các bên liên doanh phải lập Bảng phân chia sản phẩm cho các bên góp vốn và được các bên xác nhận số lượng, quy cách sản phẩm được chia từ hợp đồng, giao cho mỗi bên giữ một bản (bản chính). Mỗi khi thực giao sản phẩm, các bên liên doanh phải lập Phiếu giao nhận sản phẩm (hoặc phiếu xuất kho). Phiếu giao nhận sản phẩm là căn cứ để các bên liên doanh ghi sổ kế toán, theo dõi và là căn cứ thanh lý hợp đồng."},{"k":"p","t":"e) Trường hợp BCC phát sinh các chi phí, doanh thu chung mà các bên tham gia hợp đồng phải gánh chịu hoặc được hưởng thì các bên tham gia liên doanh phải thực hiện các quy định về kế toán như đối với trường hợp hoạt động kinh doanh đồng kiểm soát."},{"k":"p","t":"1.6. Trường hợp BCC chia lợi nhuận sau thuế"},{"k":"p","t":"a) BCC chia lợi nhuận sau thuế thường là BCC dưới hình thức hoạt động đồng kiểm soát hoặc do một bên kiểm soát. Trường hợp BCC chia lợi nhuận sau thuế, các bên phải cử ra một bên để kế toán toàn bộ các giao dịch của BCC, ghi nhận doanh thu, chi phí, theo dõi riêng kết quả kinh doanh của BCC và quyết toán thuế. Khi quyết định ký kết BCC theo hình thức này, các bên phải cân nhắc về rủi ro có thể phải gánh chịu do:"},{"k":"p","t":"- Một số khoản chi phí không được tính đầy đủ là chi phí tính thuế do không có sự chuyển giao tài sản giữa các bên, ví dụ:"},{"k":"p","t":"+ Chi phí khấu hao của một số TSCĐ sẽ không được cơ quan thuế chấp nhận do bên tham gia BCC không làm thủ tục chuyển quyền sở hữu cho bên thực hiện kế toán và quyết toán thuế cho BCC;"},{"k":"p","t":"+ Một số khoản chi phí của các bên tham gia không được cơ quan thuế chấp nhận do hóa đơn đầu vào không mang tên bên kế toán và quyết toán thuế của BCC;"},{"k":"p","t":"+ Một số chi phí phát sinh tại bên tham gia BCC không thể chuyển cho bên kế toán và quyết toán thuế do các rào cản của pháp luật, ví dụ bên tham gia BCC có hóa đơn nộp tiền sử dụng đất nhưng pháp luật không cho phép bên phát sinh chi phí tiền sử dụng đất cho bên kế toán và quyết toán thuế thuê lại đất nên chi phí thuê đất không được tính vào chi phí của BCC."},{"k":"p","t":"- Rủi ro về chính sách:"},{"k":"p","t":"+ Bên kế toán và quyết toán thuế cho BCC có thể phát sinh lỗ lũy kế, tuy nhiên riêng kết quả của hoạt động BCC thì có lãi. Trường hợp này thay vì được bù trừ số lãi từ BCC với số lỗ các hoạt động khác, doanh nghiệp vẫn phải nộp thuế TNDN đối với BCC; Nếu BCC lỗ nhưng các hoạt động khác có lãi, doanh nghiệp có thể không được bù trừ phần lỗ tương ứng với phần được chia trong BCC;"},{"k":"p","t":"+ Đối với các bên khác nếu đưa TSCĐ vào dùng cho hoạt động của BCC thì có thể sẽ không được tính chi phí khấu hao là chi phí được trừ tại doanh nghiệp do không sử dụng cho hoạt động sản xuất, kinh doanh tại doanh nghiệp (không phù hợp với doanh thu của các hoạt động khác)."},{"k":"p","t":"b) Trường hợp BCC quy định chia lợi nhuận sau thuế, bên thực hiện kế toán và quyết toán thuế phải căn cứ vào bản chất của hợp đồng để kế toán một cách phù hợp theo nguyên tắc:"},{"k":"p","t":"- Trường hợp BCC quy định các bên khác tham gia BCC được hưởng một khoản lợi nhuận cố định mà không phụ thuộc vào kết quả kinh doanh của hợp đồng thì mặc dù hình thức pháp lý của hợp đồng là BCC nhưng bản chất của hợp đồng là thuê tài sản. Trong trường hợp này, bên kế toán và quyết toán thuế thực chất là bên có quyền điều hành và chi phối hoạt động của BCC, phải áp dụng phương pháp kế toán thuê tài sản cho hợp đồng, ghi nhận khoản phải trả cho các bên khác là chi phí để xác định kết quả kinh doanh trong kỳ, cụ thể:"},{"k":"p","t":"+ Ghi nhận toàn bộ doanh thu, chi phí và lợi nhuận sau thuế của BCC trên Báo cáo kết quả hoạt động kinh doanh của mình;"},{"k":"p","t":"+ Ghi nhận toàn bộ Lợi nhuận sau thuế của BCC vào chỉ tiêu “Lợi nhuận sau thuế chưa phân phối” của Báo cáo tình hình tài chính."},{"k":"p","t":"+ Các bên khác ghi nhận doanh thu cho thuê tài sản đối với khoản được chia từ BCC."},{"k":"p","t":"- Trường hợp BCC quy định các bên khác trong BCC chỉ được phân chia lợi nhuận nếu kết quả hoạt động của BCC có lãi, đồng thời phải gánh chịu lỗ, thì mặc dù hình thức pháp lý của BCC là chia lợi nhuận sau thuế nhưng bản chất của BCC là chia doanh thu, chi phí, các bên thường phải có quyền, điều kiện, khả năng để đồng kiểm soát hoạt động cũng như dòng tiền của BCC. Bên kế toán và quyết toán thuế phải áp dụng phương pháp kế toán BCC chia doanh thu để ghi nhận doanh thu, chi phí và kết quả kinh doanh trong kỳ, đồng thời cung cấp bằng chứng về việc quyết toán thuế cho các bên khác, cụ thể:"},{"k":"p","t":"+ Ghi nhận trên Báo cáo kết quả kinh doanh phần doanh thu, chi phí và lợi nhuận tương ứng với phần được chia theo thỏa thuận của BCC; Bên quyết toán thuế cung cấp bản sao các hồ sơ, tài liệu về việc đã thực hiện nghĩa vụ với NSNN của BCC cho các bên trong BCC để phục vụ việc quyết toán thuế của các bên khác trong BCC;"},{"k":"p","t":"+ Lợi nhuận sau thuế chưa phân phối của Báo cáo tình hình tài chính chỉ bao gồm phần lợi nhuận sau thuế tương ứng của từng bên được hưởng."},{"k":"p","t":"+ Các bên khác được ghi nhận trên Báo cáo kết quả hoạt động kinh doanh phần doanh thu, chi phí tương ứng với phần mình được chia từ BCC, báo cáo cơ quan thuế về việc khoản doanh thu, chi phí này đã được thực hiện nghĩa vụ thuế làm căn cứ điều chỉnh số thuế TNDN phải nộp."},{"k":"p","t":"1.7. Khoản chênh lệch giữa giá trị vốn đã góp và giá trị hợp lý của tài sản nhận về được phản ánh vào thu nhập khác hoặc chi phí khác."}]},{"id":"tt133_36","no":36,"code":"Điều 36","title":"Điều 36. Tài khoản 229 - Dự phòng tổn thất tài sản","shortTitle":"Tài khoản 229 - Dự phòng tổn thất tài sản","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm các khoản dự phòng tổn thất tài sản, gồm:"},{"k":"p","t":"a) Dự phòng giảm giá chứng khoán kinh doanh: Là dự phòng phần giá trị bị tổn thất có thể xảy ra do giảm giá các loại chứng khoán doanh nghiệp đang nắm giữ vì mục đích kinh doanh."},{"k":"p","t":"b) Dự phòng tổn thất đầu tư vào đơn vị khác: Là khoản dự phòng tổn thất do doanh nghiệp nhận vốn góp đầu tư bị lỗ dẫn đến nhà đầu tư có khả năng mất vốn hoặc khoản dự phòng do suy giảm giá trị các khoản đầu tư."},{"k":"p","t":"- Đối với khoản đầu tư vào công ty liên doanh, liên kết, nhà đầu tư chỉ trích lập dự phòng khi công ty liên doanh, liên kết bị lỗ dẫn đến nhà đầu tư có khả năng mất vốn theo quy định hiện hành."},{"k":"p","t":"- Đối với khoản đầu tư mà nhà đầu tư nắm giữ lâu dài (không phân loại là chứng khoán kinh doanh) và nhà đầu tư không nắm quyền kiểm soát, không có ảnh hưởng đáng kể đối với bên được đầu tư, việc lập dự phòng được thực hiện như sau:"},{"k":"p","t":"+ Đối với khoản đầu tư vào cổ phiếu niêm yết hoặc giá trị hợp lý khoản đầu tư được xác định tin cậy, việc lập dự phòng dựa trên giá trị thị trường của cổ phiếu (tương tự như dự phòng giảm giá chứng khoán kinh doanh);"},{"k":"p","t":"+ Đối với khoản đầu tư không xác định được giá trị hợp lý tại thời điểm báo cáo, việc lập dự phòng được thực hiện căn cứ vào khoản lỗ của bên được đầu tư (dự phòng tổn thất đầu tư vào đơn vị khác)."},{"k":"p","t":"c) Dự phòng phải thu khó đòi: Là khoản dự phòng phần giá trị các khoản nợ phải thu và các khoản có tính chất tương tự các khoản phải thu mà khó có khả năng thu hồi."},{"k":"p","t":"d) Dự phòng giảm giá hàng tồn kho: Là khoản dự phòng giảm giá hàng tồn kho khi có sự suy giảm của giá trị thuần có thể thực hiện được so với giá gốc của hàng tồn kho."},{"k":"p","t":"1.2. Nguyên tắc kế toán dự phòng giảm giá chứng khoán kinh doanh"},{"k":"p","t":"a) Doanh nghiệp được trích lập dự phòng đối với phần giá trị bị tổn thất có thể xảy ra khi có bằng chứng chắc chắn cho thấy giá trị thị trường của các loại chứng khoán doanh nghiệp đang nắm giữ vì mục đích kinh doanh bị giảm so với giá trị ghi sổ."},{"k":"p","t":"b) Điều kiện, căn cứ và mức trích lập hoặc hoàn nhập dự phòng thực hiện theo các quy định của pháp luật."},{"k":"p","t":"c) Việc trích lập hoặc hoàn nhập khoản dự phòng giảm giá chứng khoán kinh doanh được thực hiện ở thời điểm lập Báo cáo tài chính:"},{"k":"p","t":"- Nếu số dự phòng phải lập năm nay cao hơn số dư dự phòng đang ghi trên sổ kế toán thì doanh nghiệp trích lập bổ sung số chênh lệch đó và ghi nhận vào chi phí tài chính trong kỳ."},{"k":"p","t":"- Nếu số dự phòng phải lập năm nay thấp hơn số dư dự phòng đã lập năm trước chưa sử dụng hết thì doanh nghiệp hoàn nhập số chênh lệch đó và ghi giảm chi phí tài chính."},{"k":"p","t":"1.3. Nguyên tắc kế toán dự phòng tổn thất đầu tư vào đơn vị khác"},{"k":"p","t":"a) Đối với đơn vị được đầu tư là công ty mẹ, căn cứ để nhà đầu tư trích lập dự phòng tổn thất đầu tư vào đơn vị khác là BCTC hợp nhất của công ty mẹ đó. Đối với các đơn vị được đầu tư là doanh nghiệp độc lập không có công ty con, căn cứ để nhà đầu tư trích lập dự phòng tổn thất đầu tư vào đơn vị khác là Báo cáo tài chính của bên được đầu tư đó."},{"k":"p","t":"b) Việc trích lập và hoàn nhập khoản dự phòng tổn thất đầu tư vào đơn vị khác được thực hiện ở thời điểm lập Báo cáo tài chính cho từng khoản đầu tư theo nguyên tắc:"},{"k":"p","t":"- Nếu số dự phòng phải lập năm nay cao hơn số dư dự phòng đang ghi trên sổ kế toán thì doanh nghiệp trích lập bổ sung số chênh lệch đó và ghi nhận vào chi phí tài chính trong kỳ."},{"k":"p","t":"- Nếu số dự phòng phải lập năm nay thấp hơn số dư dự phòng đã lập năm trước chưa sử dụng hết thì doanh nghiệp hoàn nhập số chênh lệch đó và ghi giảm chi phí tài chính."},{"k":"p","t":"c) Giá trị tổn thất các khoản đầu tư vào đơn vị khác sau khi bù trừ với số dự phòng đã trích lập được phản ánh vào chi phí tài chính trong kỳ báo cáo."},{"k":"p","t":"1.4. Nguyên tắc kế toán dự phòng nợ phải thu khó đòi:"},{"k":"p","t":"a) Khi lập Báo cáo tài chính, doanh nghiệp xác định các khoản nợ phải thu khó đòi và các khoản khác có bản chất tương tự các khoản phải thu mà có khả năng không đòi được để trích lập hoặc hoàn nhập khoản dự phòng phải thu khó đòi."},{"k":"p","t":"b) Doanh nghiệp trích lập dự phòng phải thu khó đòi khi:"},{"k":"p","t":"- Nợ phải thu quá hạn thanh toán ghi trong hợp đồng kinh tế, các khế ước vay nợ, bản cam kết hợp đồng hoặc cam kết nợ, doanh nghiệp đã đòi nhiều lần nhưng vẫn chưa thu được, kể cả trường hợp không có biên bản đối chiếu công nợ hoặc đối tượng nợ không ký xác nhận công nợ hoặc bỏ trốn, mất tích. Việc xác định thời gian quá hạn của khoản nợ phải thu được xác định là khó đòi phải trích lập dự phòng được căn cứ vào thời gian trả nợ gốc theo hợp đồng mua, bán ban đầu, không tính đến việc gia hạn nợ giữa các bên."},{"k":"p","t":"- Nợ phải thu chưa đến thời hạn thanh toán nhưng đối tượng nợ đã lâm vào tình trạng phá sản hoặc đang làm thủ tục giải thể, mất tích, bỏ trốn."},{"k":"p","t":"c) Điều kiện, căn cứ trích lập dự phòng nợ phải thu khó đòi: Thực hiện theo quy định của pháp luật hiện hành."},{"k":"p","t":"d) Việc trích lập hoặc hoàn nhập khoản dự phòng phải thu khó đòi được thực hiện ở thời điểm lập Báo cáo tài chính."},{"k":"p","t":"- Trường hợp khoản dự phòng phải thu khó đòi phải lập ở cuối kỳ kế toán này lớn hơn số dư khoản dự phòng phải thu khó đòi đang ghi trên sổ kế toán thì số chênh lệch lớn hơn được ghi tăng dự phòng và ghi tăng chi phí quản lý doanh nghiệp."},{"k":"p","t":"- Trường hợp khoản dự phòng phải thu khó đòi phải lập ở cuối kỳ kế toán này nhỏ hơn số dư khoản dự phòng phải thu khó đòi đang ghi trên sổ kế toán thì số chênh lệch nhỏ hơn được hoàn nhập ghi giảm dự phòng và ghi giảm chi phí quản lý doanh nghiệp."},{"k":"p","t":"e) Đối với những khoản phải thu khó đòi kéo dài trong nhiều năm, doanh nghiệp đã cố gắng dùng mọi biện pháp để thu nợ nhưng vẫn không thu được nợ và xác định đối tượng nợ thực sự không có khả năng thanh toán thì doanh nghiệp xóa những khoản nợ phải thu khó đòi trên sổ kế toán. Việc xóa các khoản nợ phải thu khó đòi phải thực hiện theo quy định của pháp luật và điều lệ doanh nghiệp. Số nợ này được theo dõi trong hệ thống quản trị của doanh nghiệp và trình bày trong thuyết minh Báo cáo tài chính. Nếu sau khi đã xóa nợ, doanh nghiệp lại đòi được nợ đã xử lý thì số nợ thu được sẽ hạch toán vào tài khoản 711 \"Thu nhập khác\"."},{"k":"p","t":"g) Đối với khoản tổn thất về nợ phải thu nếu đã được trích lập dự phòng nợ phải thu khó đòi thì doanh nghiệp sử dụng số dự phòng nợ phải thu khó đòi đã trích lập để bù đắp, trường hợp số dự phòng đã trích lập không đủ bù đắp tổn thất thì số tổn thất còn lại được tính vào chi phí quản lý doanh nghiệp."},{"k":"p","t":"1.5. Nguyên tắc kế toán dự phòng giảm giá hàng tồn kho"},{"k":"p","t":"a) Doanh nghiệp phải trích lập dự phòng giảm giá hàng tồn kho khi có những bằng chứng tin cậy về sự suy giảm của giá trị thuần có thể thực hiện được so với giá gốc của hàng tồn kho. Dự phòng là khoản dự tính trước để đưa vào chi phí sản xuất, kinh doanh phần giá trị bị giảm xuống thấp hơn giá trị đã ghi sổ kế toán của hàng tồn kho và nhằm bù đắp các khoản thiệt hại thực tế xảy ra do vật tư, sản phẩm, hàng hóa tồn kho bị giảm giá."},{"k":"p","t":"b) Dự phòng giảm giá hàng tồn kho được lập vào thời điểm lập Báo cáo tài chính. Việc lập dự phòng giảm giá hàng tồn kho phải được thực hiện theo quy định hiện hành."},{"k":"p","t":"c) Việc lập dự phòng giảm giá hàng tồn kho phải tính theo từng loại vật tư, hàng hóa, sản phẩm tồn kho. Đối với dịch vụ cung cấp dở dang, việc lập dự phòng giảm giá hàng tồn kho phải được tính theo từng loại dịch vụ có mức giá riêng biệt."},{"k":"p","t":"d) Giá trị thuần có thể thực hiện được của hàng tồn kho là giá bán ước tính của hàng tồn kho trong kỳ sản xuất, kinh doanh bình thường trừ (-) chi phí ước tính để hoàn thành sản phẩm và chi phí ước tính cần thiết cho việc bán chúng."},{"k":"p","t":"đ) Khi lập Báo cáo tài chính, căn cứ vào số lượng, giá gốc, giá trị thuần có thể thực hiện được của từng loại vật tư, hàng hóa, từng loại dịch vụ cung cấp dở dang, xác định khoản dự phòng giảm giá hàng tồn kho phải lập:"},{"k":"p","t":"- Trường hợp khoản dự phòng giảm giá hàng tồn kho phải lập ở cuối kỳ kế toán này lớn hơn khoản dự phòng giảm giá hàng tồn kho đang ghi trên sổ kế toán thì số chênh lệch lớn hơn được ghi tăng dự phòng và ghi tăng giá vốn hàng bán."},{"k":"p","t":"- Trường hợp khoản dự phòng giảm giá hàng tồn kho phải lập ở cuối kỳ kế toán này nhỏ hơn khoản dự phòng giảm giá hàng tồn kho đang ghi trên sổ kế toán thì số chênh lệch nhỏ hơn được hoàn nhập ghi giảm dự phòng và ghi giảm giá vốn hàng bán."},{"k":"p","t":"e) Đối với khoản tổn thất hàng tồn kho nếu đã được trích lập dự phòng giảm giá hàng tồn kho thì doanh nghiệp sử dụng số dự phòng giảm giá hàng tồn kho đã trích lập để bù đắp, trường hợp số dự phòng đã trích lập không đủ bù đắp tổn thất thì số tổn thất còn lại được tính vào giá vốn hàng bán."},{"k":"p","t":"g) Doanh nghiệp không trích lập dự phòng giảm giá hàng tồn kho đối với nguyên vật liệu, công cụ dụng cụ dùng cho đầu tư xây dựng cơ bản, dùng cho sản xuất sản phẩm nếu sản phẩm do chúng góp phần cấu tạo nên sẽ được bán với giá bằng hoặc cao hơn giá thành sản xuất của sản phẩm."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 229 - Dự phòng tổn thất tài sản"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Hoàn nhập chênh lệch giữa số dự phòng tổn thất tài sản phải lập kỳ này nhỏ hơn số dự phòng đã trích lập kỳ trước chưa sử dụng hết;"},{"k":"p","t":"- Bù đắp phần giá trị tổn thất của tài sản từ số dự phòng đã trích lập."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"Trích lập các khoản dự phòng tổn thất tài sản tại thời điểm lập Báo cáo tài chính."},{"k":"p","t":"Số dư bên Có: Số dự phòng tổn thất tài sản hiện có cuối kỳ."},{"k":"p","t":"Tài khoản 229 - Dự phòng tổn thất tài sản có 4 tài khoản cấp 2"},{"k":"p","t":"Tài khoản 2291 - Dự phòng giảm giá chứng khoán kinh doanh: Tài khoản này phản ánh tình hình trích lập hoặc hoàn nhập khoản dự phòng giảm giá chứng khoán kinh doanh."},{"k":"p","t":"Tài khoản 2292 - Dự phòng tổn thất đầu tư vào đơn vị khác: Tài khoản này phản ánh tình hình trích lập hoặc hoàn nhập khoản dự phòng do doanh nghiệp nhận vốn góp đầu tư bị lỗ dẫn đến nhà đầu tư có khả năng mất vốn hoặc khoản dự phòng do suy giảm giá trị các khoản đầu tư."},{"k":"p","t":"Tài khoản 2293 - Dự phòng phải thu khó đòi: Tài khoản này phản ánh tình hình trích lập hoặc hoàn nhập khoản dự phòng các khoản phải thu và các khoản có bản chất tương tự các khoản phải thu mà có khả năng không thu hồi được."},{"k":"p","t":"Tài khoản 2294 - Dự phòng giảm giá hàng tồn kho: Tài khoản này phản ánh tình hình trích lập hoặc hoàn nhập dự phòng giảm giá hàng tồn kho."}]},{"id":"tt133_37","no":37,"code":"Điều 37","title":"Điều 37. Tài khoản 241 - Xây dựng cơ bản dở dang","shortTitle":"Tài khoản 241 - Xây dựng cơ bản dở dang","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này phản ánh chi phí thực hiện các dự án đầu tư XDCB (bao gồm chi phí mua sắm mới TSCĐ, xây dựng mới hoặc sửa chữa, cải tạo, mở rộng hay trang bị lại kỹ thuật công trình) và tình hình quyết toán dự án đầu tư XDCB ở các doanh nghiệp có tiến hành công tác mua sắm TSCĐ, đầu tư XDCB, sửa chữa lớn TSCĐ."},{"k":"p","t":"Công tác đầu tư XDCB và sửa chữa lớn TSCĐ của doanh nghiệp có thể được thực hiện theo phương thức giao thầu hoặc tự làm. Ở các doanh nghiệp tiến hành đầu tư XDCB theo phương thức tự làm thì tài khoản này phản ánh cả chi phí phát sinh trong quá trình xây lắp, sửa chữa."},{"k":"p","t":"b) Chi phí thực hiện các dự án đầu tư XDCB là toàn bộ chi phí cần thiết để xây dựng mới hoặc sửa chữa, cải tạo, mở rộng hay trang bị lại kỹ thuật công trình được xác định theo quy định hiện hành, đồng thời phải phù hợp những yếu tố khách quan của thị trường trong từng thời kỳ và được thực hiện theo quy chế về quản lý đầu tư XDCB. Chi phí đầu tư XDCB, bao gồm:"},{"k":"p","t":"- Chi phí xây dựng;"},{"k":"p","t":"- Chi phí thiết bị;"},{"k":"p","t":"- Chi phí bồi thường, hỗ trợ và tái định cư;"},{"k":"p","t":"- Chi phí quản lý dự án;"},{"k":"p","t":"- Chi phí tư vấn đầu tư xây dựng;"},{"k":"p","t":"- Chi phí khác."},{"k":"p","t":"Tài khoản 241 được mở chi tiết theo từng công trình, hạng mục công trình và ở mỗi hạng mục công trình phải được hạch toán chi tiết từng nội dung chi phí đầu tư XDCB và được theo dõi lũy kế kể từ khi khởi công đến khi công trình, hạng mục công trình hoàn thành bàn giao đưa vào sử dụng."},{"k":"p","t":"c) Khi đầu tư XDCB các chi phí xây lắp, chi phí thiết bị thường tính trực tiếp cho từng công trình; Các chi phí quản lý dự án và chi phí khác thường được chi chung. Chủ đầu tư phải tiến hành tính toán, phân bổ chi phí quản lý dự án và chi phí khác cho từng công trình theo nguyên tắc:"},{"k":"p","t":"- Nếu xác định được riêng các chi phí quản lý dự án và chi phí khác liên quan trực tiếp đến từng công trình thì tính trực tiếp cho công trình đó;"},{"k":"p","t":"- Các chi phí quản lý dự án và chi phí chung có liên quan đến nhiều công trình mà không tính trực tiếp được cho từng công trình thì đơn vị được quyền phân bổ theo những tiêu thức phù hợp nhất với từng công trình."},{"k":"p","t":"d) Chi phí sửa chữa, bảo dưỡng, duy trì cho TSCĐ hoạt động bình thường được hạch toán trực tiếp vào chi phí sản xuất, kinh doanh trong kỳ. Đối với các TSCĐ theo yêu cầu kỹ thuật phải sửa chữa, bảo trì, duy tu định kỳ mà không làm tăng giá trị tài sản, doanh nghiệp được trích lập dự phòng phải trả và tính trước vào chi phí sản xuất, kinh doanh để có nguồn trang trải hoặc được phân bổ dần theo quy định khi việc sửa chữa, bảo trì phát sinh."},{"k":"p","t":"đ) Chủ đầu tư xây dựng bất động sản sử dụng tài khoản này để tập hợp chi phí xây dựng TSCĐ hoặc bất động sản đầu tư. Trường hợp bất động sản xây dựng sử dụng cho nhiều mục đích (làm văn phòng, cho thuê hoặc để bán, ví dụ như tòa nhà chung cư hỗn hợp) thì kế toán vẫn tập hợp chi phí phát sinh liên quan trực tiếp tới việc đầu tư xây dựng trên TK 241. Khi công trình, dự án hoàn thành bàn giao đưa vào sử dụng, kế toán căn cứ cách thức sử dụng tài sản trong thực tế để kết chuyển chi phí đầu tư xây dựng phù hợp với bản chất của từng loại tài sản."},{"k":"p","t":"e) Đối với hoạt động XDCB dở dang mà phải thanh toán cho nhà thầu bằng ngoại tệ: Chi phí XDCB dở dang được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm công trình XDCB hoàn thành, nghiệm thu đưa vào sử dụng. Trường hợp doanh nghiệp ứng trước cho nhà thầu bằng ngoại tệ thì chi phí XDCB dở dang tương ứng với số tiền ứng trước được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm ứng trước, chi phí XDCB dở dang tương ứng với số tiền còn lại được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm công trình XDCB hoàn thành, nghiệm thu đưa vào sử dụng."},{"k":"p","t":"g) Chênh lệch tỷ giá hối đoái phát sinh từ quá trình đầu tư xây dựng cơ bản trong giai đoạn trước hoạt động hoặc khi doanh nghiệp đã đi vào hoạt động (kể cả việc đầu tư mới hoặc đầu tư mở rộng) đều được tính ngay vào doanh thu hoạt động tài chính (nếu lãi) hoặc chi phí tài chính (nếu lỗ) tại thời điểm phát sinh."},{"k":"p","t":"h) Trường hợp dự án đầu tư bị hủy bỏ, doanh nghiệp phải tiến hành thanh lý và thu hồi các chi phí đã phát sinh của dự án. Phần chênh lệch giữa chi phí đầu tư thực tế phát sinh và số thu từ việc thanh lý được ghi nhận vào chi phí khác hoặc xác định trách nhiệm bồi thường của tổ chức, cá nhân để thu hồi."},{"k":"p","t":"i) Các chi phí khác phát sinh như chi phí lãi vay được vốn hóa, chi phí đấu thầu (sau khi bù trừ với số tiền thu từ việc bán hồ sơ thầu), chi phí tháo dỡ hoàn trả mặt bằng (sau khi bù trừ với số phế liệu có thể thu hồi) được hạch toán vào chi phí xây dựng cơ bản dở dang."},{"k":"p","t":"k) Trường hợp hoạt động sản xuất thử không tạo ra sản phẩm thì toàn bộ chi phí chạy thử được hạch toán vào chi phí xây dựng cơ bản dở dang; Trường hợp hoạt động sản xuất thử tạo ra sản phẩm sản xuất thử thì toàn bộ chi phí chạy thử có tải để sản xuất ra sản phẩm sản xuất thử được tập hợp trên TK 154 - Chi phí sản xuất, kinh doanh dở dang, phần chênh lệch giữa chi phí sản xuất thử với số thu từ việc bán sản phẩm sản xuất thử được hạch toán vào chi phí xây dựng cơ bản dở dang."},{"k":"p","t":"Tài khoản 241 - Xây dựng cơ bản dở dang, có 3 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 2411 - Mua sắm TSCĐ: Phản ánh chi phí mua sắm TSCĐ và tình hình quyết toán chi phí mua sắm TSCĐ trong trường hợp phải qua lắp đặt, chạy thử trước khi đưa vào sử dụng (kể cả mua TSCĐ mới hoặc đã qua sử dụng). Nếu mua sắm TSCĐ về phải đầu tư, trang bị thêm mới sử dụng được thì mọi chi phí mua sắm, lắp đặt và trang bị thêm cũng được phản ánh vào tài khoản này."},{"k":"p","t":"- Tài khoản 2412 - Xây dựng cơ bản: Phản ánh chi phí đầu tư XDCB và tình hình quyết toán vốn đầu tư XDCB. Tài khoản này được mở chi tiết cho từng công trình, hạng mục công trình (theo từng đối tượng tài sản hình thành qua đầu tư) và ở mỗi đối tượng tài sản phải theo dõi chi tiết từng nội dung chi phí đầu tư XDCB."},{"k":"p","t":"- Tài khoản 2413 - Sửa chữa lớn TSCĐ: Phản ánh chi phí sửa chữa lớn TSCĐ và tình hình quyết toán chi phí sửa chữa lớn TSCĐ. Trường hợp sửa chữa thường xuyên TSCĐ thì không hạch toán vào tài khoản này mà tính thẳng vào chi phí sản xuất, kinh doanh trong kỳ."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 241 - Xây dựng cơ bản dở dang"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Chi phí đầu tư XDCB, mua sắm, sửa chữa lớn TSCĐ phát sinh (TSCĐ hữu hình và TSCĐ vô hình);"},{"k":"p","t":"- Chi phí mua sắm bất động sản đầu tư (trường hợp cần có giai đoạn đầu tư xây dựng);"},{"k":"p","t":"- Chi phí đầu tư XDCB bất động sản đầu tư;"},{"k":"p","t":"- Chi phí cải tạo, nâng cấp, sửa chữa lớn TSCĐ, BĐSĐT."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Giá trị TSCĐ hình thành qua đầu tư XDCB, mua sắm đã hoàn thành đưa vào sử dụng;"},{"k":"p","t":"- Giá trị bất động sản đầu tư hình thành qua đầu tư XDCB đã hoàn thành;"},{"k":"p","t":"- Giá trị công trình bị loại bỏ và các khoản chi phí duyệt bỏ khác kết chuyển khi quyết toán được duyệt;"},{"k":"p","t":"- Kết chuyển chi phí cải tạo, nâng cấp, sửa chữa lớn TSCĐ, BĐSĐT phát sinh sau ghi nhận ban đầu vào các tài khoản có liên quan khi quyết toán được duyệt."},{"k":"p","t":"Số dư Nợ:"},{"k":"p","t":"- Chi phí dự án đầu tư xây dựng và sửa chữa lớn TSCĐ, BĐSĐT dở dang;"},{"k":"p","t":"- Giá trị công trình xây dựng và sửa chữa lớn TSCĐ, BĐSĐTT đã hoàn thành nhưng chưa bàn giao đưa vào sử dụng hoặc quyết toán chưa được duyệt;"},{"k":"p","t":"- Giá trị bất động sản đầu tư đang đầu tư xây dựng dở dang."}]},{"id":"tt133_38","no":38,"code":"Điều 38","title":"Điều 38. Tài khoản 242 - Chi phí trả trước","shortTitle":"Tài khoản 242 - Chi phí trả trước","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các chi phí thực tế đã phát sinh nhưng có liên quan đến kết quả hoạt động SXKD của nhiều kỳ kế toán và việc kết chuyển các khoản chi phí này vào chi phí SXKD của các kỳ kế toán sau."},{"k":"p","t":"b) Các nội dung được phản ánh là chi phí trả trước, gồm:"},{"k":"p","t":"- Chi phí trả trước về thuê cơ sở hạ tầng, thuê hoạt động TSCĐ (quyền sử dụng đất, nhà xưởng, kho bãi, văn phòng làm việc, cửa hàng và TSCĐ khác) phục vụ cho sản xuất, kinh doanh nhiều kỳ kế toán."},{"k":"p","t":"- Chi phí thành lập doanh nghiệp, chi phí đào tạo, quảng cáo phát sinh trong giai đoạn trước hoạt động có giá trị lớn được phân bổ theo quy định của pháp luật hiện hành;"},{"k":"p","t":"- Chi phí mua bảo hiểm (bảo hiểm cháy, nổ, bảo hiểm trách nhiệm dân sự chủ phương tiện vận tải, bảo hiểm thân xe, bảo hiểm tài sản,...) và các loại lệ phí mà doanh nghiệp mua và trả một lần cho nhiều kỳ kế toán;"},{"k":"p","t":"- Công cụ, dụng cụ, bao bì luân chuyển, đồ dùng cho thuê liên quan đến hoạt động kinh doanh trong nhiều kỳ kế toán;"},{"k":"p","t":"- Lãi tiền vay trả trước cho nhiều kỳ kế toán;"},{"k":"p","t":"- Chi phí sửa chữa TSCĐ phát sinh một lần có giá trị lớn doanh nghiệp không thực hiện trích trước chi phí sửa chữa lớn TSCĐ phân bổ theo quy định của pháp luật hiện hành;"},{"k":"p","t":"- Chi phí nghiên cứu và chi phí cho giai đoạn triển khai không đủ tiêu chuẩn ghi nhận là TSCĐ vô hình nếu được phân bổ dần theo quy định của pháp luật hiện hành;"},{"k":"p","t":"- Các khoản chi phí trả trước khác phục vụ cho hoạt động kinh doanh của nhiều kỳ kế toán."},{"k":"p","t":"c) Việc tính và phân bổ chi phí trả trước vào chi phí SXKD từng kỳ kế toán phải căn cứ vào tính chất, mức độ từng loại chi phí để lựa chọn phương pháp và tiêu thức hợp lý."},{"k":"p","t":"d) Kế toán phải theo dõi chi tiết từng khoản chi phí trả trước theo từng kỳ hạn trả trước đã phát sinh, đã phân bổ vào các đối tượng chịu chi phí của từng kỳ kế toán và số còn lại chưa phân bổ vào chi phí."},{"k":"p","t":"đ) Đối với các khoản chi phí trả trước bằng ngoại tệ, trường hợp tại thời điểm lập báo cáo có bằng chứng chắc chắn về việc người bán không thể cung cấp hàng hóa, dịch vụ và doanh nghiệp sẽ chắc chắn nhận lại các khoản trả trước bằng ngoại tệ thì được coi là các khoản mục tiền tệ có gốc ngoại tệ và phải đánh giá lại theo tỷ giá chuyển khoản trung bình của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch tại thời điểm báo cáo."},{"k":"p","t":"Việc xác định tỷ giá chuyển khoản trung bình và xử lý chênh lệch tỷ giá do đánh giá lại chi phí trả trước là khoản mục tiền tệ có gốc ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 242 - Chi phí trả trước"},{"k":"p","t":"Bên Nợ: Các khoản chi phí trả trước phát sinh trong kỳ."},{"k":"p","t":"Bên Có: Các khoản chi phí trả trước đã tính vào chi phí SXKD trong kỳ."},{"k":"p","t":"Số dư bên Nợ: Các khoản chi phí trả trước chưa tính vào chi phí sản xuất, kinh doanh trong kỳ."}]},{"id":"tt133_39","no":39,"code":"Điều 39","title":"Điều 39. Nguyên tắc kế toán nợ phải trả","shortTitle":"Nguyên tắc kế toán nợ phải trả","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các khoản nợ phải trả được theo dõi chi tiết theo kỳ hạn phải trả, đối tượng phải trả, loại nguyên tệ phải trả và các yếu tố khác theo nhu cầu quản lý của doanh nghiệp."},{"k":"p","t":"2. Việc phân loại các khoản phải trả là phải trả người bán, phải trả nội bộ, phải trả khác được thực hiện theo nguyên tắc:"},{"k":"p","t":"a) Phải trả người bán gồm các khoản phải trả mang tính chất thương mại phát sinh từ giao dịch mua hàng hóa, dịch vụ, tài sản. Khoản phải trả này gồm cả các khoản phải trả khi nhập khẩu thông qua người nhận ủy thác (trong giao dịch nhập khẩu ủy thác);"},{"k":"p","t":"b) Phải trả nội bộ gồm các khoản phải trả giữa đơn vị cấp trên và đơn vị cấp dưới trực thuộc hạch toán phụ thuộc;"},{"k":"p","t":"c) Phải trả khác gồm các khoản phải trả không có tính thương mại, không liên quan đến giao dịch mua, bán, cung cấp hàng hóa dịch vụ:"},{"k":"p","t":"- Các khoản phải trả liên quan đến chi phí tài chính, như: khoản phải trả về lãi vay, cổ tức và lợi nhuận phải trả, chi phí hoạt động đầu tư tài chính phải trả;"},{"k":"p","t":"- Các khoản phải trả do bên thứ ba chi hộ; Các khoản tiền bên nhận ủy thác nhận của các bên liên quan để thanh toán theo chỉ định trong giao dịch ủy thác xuất nhập khẩu;"},{"k":"p","t":"- Các khoản phải trả không mang tính thương mại như phải trả do mượn tài sản phi tiền tệ, phải trả về tiền phạt, bồi thường, tài sản thừa chờ xử lý, phải trả về các khoản BHXH, BHYT, BHTN, BHTNLĐ, KPCĐ…"},{"k":"p","t":"3. Khi lập Báo cáo tài chính, kế toán căn cứ kỳ hạn còn lại của các khoản phải trả để phân loại là dài hạn hoặc ngắn hạn."},{"k":"p","t":"4. Đối với các khoản phải trả bằng ngoại tệ, doanh nghiệp phải theo dõi chi tiết các khoản nợ phải trả theo từng loại nguyên tệ, từng đối tượng thanh toán và thực hiện theo nguyên tắc:"},{"k":"p","t":"- Khi phát sinh các khoản nợ phải trả (bên Có các Tài khoản phải trả), kế toán phải quy đổi ra đồng tiền ghi sổ kế toán theo tỷ giá giao dịch thực tế tại thời điểm phát sinh."},{"k":"p","t":"Riêng trường hợp ứng trước tiền cho người bán bằng ngoại tệ thì khi ghi nhận giá trị tài sản mua về hoặc chi phí phát sinh, bên Có Tài khoản 331 tương ứng với số tiền ứng trước được ghi nhận theo tỷ giá ghi sổ thực tế đích danh tại thời điểm ứng trước."},{"k":"p","t":"- Khi thanh toán nợ phải trả (bên Nợ các Tài khoản phải trả), doanh nghiệp được lựa chọn tỷ giá ghi sổ bình quân gia quyền cho từng đối tượng phải trả hoặc tỷ giá giao dịch thực tế tại thời điểm trả nợ."},{"k":"p","t":"Riêng trường hợp ứng trước tiền cho người bán thì bên Nợ Tài khoản 331 áp dụng tỷ giá giao dịch thực tế tại thời điểm ứng trước."},{"k":"p","t":"- Trường hợp doanh nghiệp sử dụng tỷ giá giao dịch thực tế để hạch toán bên Nợ các tài khoản phải trả, khoản chênh lệch tỷ giá hối đoái phát sinh trong kỳ được ghi nhận ngay tại thời điểm phát sinh giao dịch hoặc ghi nhận định kỳ tùy theo đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của doanh nghiệp."},{"k":"p","t":"- Tại thời điểm lập Báo cáo tài chính, doanh nghiệp phải đánh giá lại các khoản phải trả là khoản mục tiền tệ có gốc ngoại tệ theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch."},{"k":"p","t":"Việc xác định tỷ giá chuyển khoản trung bình và xử lý chênh lệch tỷ giá do đánh giá lại khoản nợ phải trả là khoản mục tiền tệ có gốc ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."}]},{"id":"tt133_40","no":40,"code":"Điều 40","title":"Điều 40. Tài khoản 331 - Phải trả người bán","shortTitle":"Tài khoản 331 - Phải trả người bán","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thanh toán về các khoản nợ phải trả của doanh nghiệp cho người bán vật tư, hàng hóa, người cung cấp dịch vụ, người bán TSCĐ, BĐSĐT, các khoản đầu tư tài chính theo hợp đồng kinh tế đã ký kết. Tài khoản này cũng được dùng để phản ánh tình hình thanh toán về các khoản nợ phải trả cho người nhận thầu xây lắp chính, phụ. Không phản ánh vào tài khoản này các nghiệp vụ mua trả tiền ngay."},{"k":"p","t":"b) Nợ phải trả cho người bán, người cung cấp, người nhận thầu xây lắp cần được hạch toán chi tiết cho từng đối tượng phải trả. Trong chi tiết từng đối tượng phải trả, tài khoản này phản ánh cả số tiền đã ứng trước cho người bán, người cung cấp, người nhận thầu xây lắp nhưng chưa nhận được sản phẩm, hàng hóa, dịch vụ, khối lượng xây lắp hoàn thành bàn giao."},{"k":"p","t":"c) Bên giao nhập khẩu ủy thác ghi nhận trên tài khoản này số tiền phải trả người bán về hàng nhập khẩu thông qua bên nhận nhập khẩu ủy thác như khoản phải trả người bán thông thường."},{"k":"p","t":"d) Những vật tư, hàng hóa, dịch vụ đã nhận, nhập kho nhưng đến cuối kỳ vẫn chưa có hóa đơn thì sử dụng giá tạm tính để ghi sổ và phải điều chỉnh về giá thực tế khi nhận được hóa đơn hoặc thông báo giá chính thức của người bán."},{"k":"p","t":"đ) Khi hạch toán chi tiết các khoản này, kế toán phải hạch toán rõ ràng, rành mạch các khoản chiết khấu thanh toán, chiết khấu thương mại, giảm giá hàng bán của người bán, người cung cấp nếu chưa được phản ánh trong hóa đơn mua hàng."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 331 - Phải trả cho người bán"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số tiền đã trả cho người bán vật tư, hàng hóa, người cung cấp dịch vụ, người nhận thầu xây lắp;"},{"k":"p","t":"- Số tiền ứng trước cho người bán, người cung cấp, người nhận thầu xây lắp nhưng chưa nhận được vật tư, hàng hóa, dịch vụ, khối lượng sản phẩm xây lắp hoàn thành bàn giao;"},{"k":"p","t":"- Số tiền người bán chấp thuận giảm giá hàng hóa hoặc dịch vụ đã giao theo hợp đồng;"},{"k":"p","t":"- Chiết khấu thanh toán và chiết khấu thương mại được người bán chấp thuận cho doanh nghiệp giảm trừ vào khoản nợ phải trả cho người bán;"},{"k":"p","t":"- Giá trị vật tư, hàng hóa thiếu hụt, kém phẩm chất khi kiểm nhận và trả lại người bán;"},{"k":"p","t":"- Điều chỉnh số chênh lệch giữa giá tạm tính lớn hơn giá thực tế của số vật tư, hàng hóa, dịch vụ đã nhận, khi có hóa đơn hoặc thông báo giá chính thức;"},{"k":"p","t":"- Đánh giá lại các khoản phải trả cho người bán là khoản mục tiền tệ có gốc ngoại tệ (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số tiền phải trả cho người bán vật tư, hàng hóa, người cung cấp dịch vụ và người nhận thầu xây lắp;"},{"k":"p","t":"- Điều chỉnh số chênh lệch giữa giá tạm tính nhỏ hơn giá thực tế của số vật tư, hàng hóa, dịch vụ đã nhận, khi có hóa đơn hoặc thông báo giá chính thức;"},{"k":"p","t":"- Đánh giá lại các khoản phải trả cho người bán là khoản mục tiền tệ có gốc ngoại tệ (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Có: Số tiền còn phải trả cho người bán hàng, người cung cấp dịch vụ, người nhận thầu xây lắp."},{"k":"p","t":"Tài khoản này có thể có số dư bên Nợ: Số dư bên Nợ (nếu có) phản ánh số tiền đã ứng trước cho người bán hoặc số tiền đã trả nhiều hơn số phải trả cho người bán theo chi tiết của từng đối tượng cụ thể. Khi lập Báo cáo tình hình tài chính, phải lấy số dư chi tiết của từng đối tượng phản ánh ở tài khoản này để ghi 2 chỉ tiêu bên “Tài sản” và bên “Nguồn vốn”."}]},{"id":"tt133_41","no":41,"code":"Điều 41","title":"Điều 41. Tài khoản 333 - Thuế và các khoản phải nộp nhà nước","shortTitle":"Tài khoản 333 - Thuế và các khoản phải nộp nhà nước","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh quan hệ giữa doanh nghiệp với Nhà nước về các khoản thuế, phí, lệ phí và các khoản khác phải nộp, đã nộp, còn phải nộp vào Ngân sách Nhà nước trong kỳ kế toán năm."},{"k":"p","t":"1.2. Doanh nghiệp chủ động tính, xác định và kê khai số thuế, phí, lệ phí và các khoản phải nộp cho Nhà nước theo luật định; Kịp thời phản ánh vào sổ kế toán số thuế phải nộp, đã nộp, được khấu trừ, được hoàn..."},{"k":"p","t":"1.3. Các khoản thuế gián thu như thuế GTGT (kể cả theo phương pháp khấu trừ hay phương pháp trực tiếp), thuế tiêu thụ đặc biệt, thuế xuất khẩu, thuế bảo vệ môi trường và các loại thuế gián thu khác về bản chất là khoản thu hộ bên thứ ba. Vì vậy các khoản thuế gián thu được loại trừ ra khỏi số liệu về doanh thu gộp trên Báo cáo tài chính hoặc các báo cáo khác."},{"k":"p","t":"Doanh nghiệp có thể lựa chọn việc ghi nhận doanh thu và số thuế gián thu phải nộp trên sổ kế toán bằng một trong 2 phương pháp:"},{"k":"p","t":"- Tách và ghi nhận riêng số thuế gián thu phải nộp (kể cả thuế GTGT phải nộp theo phương pháp trực tiếp) ngay tại thời điểm ghi nhận doanh thu. Theo phương pháp này doanh thu ghi trên sổ kế toán không bao gồm số thuế gián thu phải nộp, phù hợp với số liệu về doanh thu gộp trên Báo cáo tài chính và phản ánh đúng bản chất giao dịch;"},{"k":"p","t":"- Ghi nhận số thuế gián thu phải nộp bằng cách ghi giảm số doanh thu đã ghi chép trên sổ kế toán. Theo phương pháp này, định kỳ mới ghi giảm doanh thu đối với số thuế gián thu phải nộp, số liệu về doanh thu trên sổ kế toán có sự khác biệt so với doanh thu gộp trên Báo cáo tài chính."},{"k":"p","t":"Trong mọi trường hợp, chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ” và chỉ tiêu “Các khoản giảm trừ doanh thu” của báo cáo kết quả hoạt động kinh doanh đều không bao gồm các khoản thuế gián thu phải nộp."},{"k":"p","t":"1.4. Các doanh nghiệp nhập khẩu hoặc mua nội địa hàng hóa, TSCĐ thuộc diện chịu thuế NK, TTĐB, BVMT được ghi nhận số thuế phải nộp vào giá gốc hàng mua. Trường hợp doanh nghiệp nhập khẩu hàng hộ nhưng không có quyền sở hữu hàng hóa, ví dụ giao dịch tạm nhập - tái xuất hộ bên thứ ba thì số thuế NK, TTĐB, BVMT phải nộp không được ghi nhận vào giá trị hàng hóa mà được ghi nhận là khoản phải thu khác."},{"k":"p","t":"Số thuế tài nguyên phải nộp NSNN được hạch toán vào chi phí sản xuất kinh doanh của doanh nghiệp. Tiền thuê đất, thuế nhà đất phải nộp được tính vào chi phí quản lý doanh nghiệp."},{"k":"p","t":"Thuế GTGT, TTĐB, BVMT của sản phẩm, hàng hóa, dịch vụ tiêu dùng nội bộ, cho, biếu, tặng, khuyến mại, quảng cáo không thu tiền được hạch toán vào chi phí bán hàng hoặc chi phí quản lý doanh nghiệp tùy theo từng trường hợp cụ thể."},{"k":"p","t":"1.5. Đối với các khoản thuế được hoàn, được giảm, kế toán phải phân biệt rõ số thuế được hoàn, được giảm là số thuế đã nộp ở khâu mua hay phải nộp ở khâu bán và thực hiện theo nguyên tắc:"},{"k":"p","t":"- Thuế NK, TTĐB, BVMT đã nộp khi nhập khẩu hàng hóa, dịch vụ, nếu được hoàn ghi giảm giá vốn hàng bán (nếu xuất hàng để bán) hoặc giảm giá trị hàng tồn kho (nếu xuất trả lại do vay, mượn…);"},{"k":"p","t":"- Thuế NK, TTĐB, BVMT đã nộp khi nhập khẩu TSCĐ, nếu được hoàn ghi giảm chi phí khác (nếu bán TSCĐ) hoặc giảm nguyên giá TSCĐ (nếu xuất trả lại);"},{"k":"p","t":"- Thuế NK, TTĐB, BVMT đã nộp khi nhập khẩu hàng hóa, TSCĐ nhưng đơn vị không có quyền sở hữu, khi được hoàn ghi giảm khoản phải thu khác."},{"k":"p","t":"- Thuế XK, TTĐB, BVMT phải nộp khi bán hàng hóa, cung cấp dịch vụ nhưng sau đó được hoàn, được giảm thì kế toán ghi nhận vào thu nhập khác."},{"k":"p","t":"- Thuế GTGT đầu vào được hoàn ghi giảm số thuế GTGT được khấu trừ. Số thuế GTGT phải nộp được giảm ghi nhận vào thu nhập khác."},{"k":"p","t":"1.6. Nghĩa vụ đối với NSNN trong giao dịch ủy thác xuất - nhập khẩu:"},{"k":"p","t":"- Trong giao dịch ủy thác xuất nhập khẩu (hoặc các giao dịch tương tự), nghĩa vụ đối với NSNN được xác định là của bên giao ủy thác;"},{"k":"p","t":"- Bên nhận ủy thác được xác định là bên cung cấp dịch vụ cho bên giao ủy thác trong việc chuẩn bị hồ sơ, kê khai, thanh quyết toán với NSNN (người nộp thuế hộ cho bên giao ủy thác)."},{"k":"p","t":"- TK 333 chỉ sử dụng tại bên giao ủy thác, không sử dụng tại bên nhận ủy thác. Bên nhận ủy thác với vai trò trung gian chỉ phản ánh số thuế phải nộp vào NSNN là khoản chi hộ, trả hộ trên TK 3388 và phản ánh quyền được nhận lại số tiền đã chi hộ, trả hộ cho bên giao ủy thác trên TK 138. Căn cứ để phản ánh tình hình thực hiện nghĩa vụ với NSNN của bên giao ủy thác như sau:"},{"k":"p","t":"+ Khi nhận được thông báo về số thuế phải nộp, bên nhận ủy thác bàn giao lại cho bên giao ủy thác toàn bộ hồ sơ, tài liệu, thông báo của cơ quan có thẩm quyền về số thuế phải nộp làm căn cứ ghi nhận số thuế phải nộp trên TK 333."},{"k":"p","t":"+ Căn cứ chứng từ nộp tiền vào NSNN của bên nhận ủy thác, bên giao ủy thác phản ánh giảm số phải nộp NSNN."},{"k":"p","t":"1.7. Kế toán phải mở sổ chi tiết theo dõi từng khoản thuế, phí, lệ phí và các khoản phải nộp, đã nộp và còn phải nộp."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 333 - Thuế và các khoản phải nộp nhà nước"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số thuế GTGT đã được khấu trừ trong kỳ;"},{"k":"p","t":"- Số thuế, phí, lệ phí và các khoản khác đã nộp vào Ngân sách Nhà nước;"},{"k":"p","t":"- Số thuế được giảm trừ vào số thuế phải nộp;"},{"k":"p","t":"- Số thuế GTGT của hàng bán bị trả lại, bị giảm giá."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số thuế GTGT đầu ra và số thuế GTGT hàng nhập khẩu phải nộp;"},{"k":"p","t":"- Số thuế, phí, lệ phí và các khoản khác phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"Số dư bên Có:"},{"k":"p","t":"Số thuế, phí, lệ phí và các khoản khác còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"TK 333 có thể có số dư bên Nợ: Số dư bên Nợ (nếu có) của TK 333 phản ánh số thuế và các khoản đã nộp lớn hơn số thuế và các khoản phải nộp cho Nhà nước, hoặc có thể phản ánh số thuế đã nộp được xét miễn, giảm hoặc cho thoái thu nhưng chưa thực hiện việc thoái thu."},{"k":"p","t":"Tài khoản 333 - Thuế và các khoản phải nộp Nhà nước, có 9 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 3331 - Thuế giá trị gia tăng phải nộp: Phản ánh số thuế GTGT đầu ra, số thuế GTGT của hàng nhập khẩu phải nộp, số thuế GTGT đã được khấu trừ, số thuế GTGT đã nộp và còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"Tài khoản 3331 có 2 tài khoản cấp 3:"},{"k":"p","t":"+ Tài khoản 33311 - Thuế giá trị gia tăng đầu ra: Dùng để phản ánh số thuế GTGT đầu ra, số thuế GTGT đầu vào đã khấu trừ, số thuế GTGT của hàng bán bị trả lại, bị giảm giá, số thuế GTGT phải nộp, đã nộp, còn phải nộp của sản phẩm, hàng hóa, dịch vụ tiêu thụ trong kỳ."},{"k":"p","t":"+ Tài khoản 33312 - Thuế GTGT hàng nhập khẩu: Dùng để phản ánh số thuế GTGT của hàng nhập khẩu phải nộp, đã nộp, còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"- Tài khoản 3332 - Thuế tiêu thụ đặc biệt: Phản ánh số thuế tiêu thụ đặc biệt phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước"},{"k":"p","t":"- Tài khoản 3333 - Thuế xuất, nhập khẩu: Phản ánh số thuế xuất khẩu, thuế nhập khẩu phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"- Tài khoản 3334 - Thuế thu nhập doanh nghiệp: Phản ánh số thuế thu nhập doanh nghiệp phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"- Tài khoản 3335 - Thuế thu nhập cá nhân: Phản ánh số thuế thu nhập cá nhân phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"- Tài khoản 3336 - Thuế tài nguyên: Phản ánh số thuế tài nguyên phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"- Tài khoản 3337 - Thuế nhà đất, tiền thuê đất: Phản ánh số thuế nhà đất, tiền thuê đất phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước."},{"k":"p","t":"- Tài khoản 3338 - Thuế bảo vệ môi trường và các loại thuế khác: Phản ánh số phải nộp, đã nộp và còn phải nộp vào Ngân sách Nhà nước về thuế bảo vệ môi trường và các loại thuế khác, như: Thuế môn bài, thuế nhà thầu nước ngoài..."},{"k":"p","t":"TK 3338 có 2 tài khoản cấp 3:"},{"k":"p","t":"+ TK 33381: Thuế bảo vệ môi trường: Phản ánh số thuế bảo vệ môi trường phải nộp, đã nộp và còn phải nộp vào NSNN;"},{"k":"p","t":"+ TK 33382: Các loại thuế khác: Phản ánh số phải nộp, đã nộp, còn phải nộp các loại thuế khác. Doanh nghiệp được chủ động mở các TK cấp 4 chi tiết cho từng loại thuế phù hợp với yêu cầu quản lý."},{"k":"p","t":"- Tài khoản 3339 - Phí, lệ phí và các khoản phải nộp khác: Phản ánh số phải nộp, đã nộp và còn phải nộp về các khoản phí, lệ phí, các khoản phải nộp khác cho Nhà nước ngoài các khoản đã phản ánh vào các tài khoản từ 3331 đến 3338. Tài khoản này còn phản ánh các khoản Nhà nước trợ cấp cho doanh nghiệp (nếu có) như các khoản trợ cấp, trợ giá."}]},{"id":"tt133_42","no":42,"code":"Điều 42","title":"Điều 42. Tài khoản 334 - Phải trả người lao động","shortTitle":"Tài khoản 334 - Phải trả người lao động","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"Tài khoản này dùng để phản ánh các khoản phải trả và tình hình thanh toán các khoản phải trả cho người lao động của doanh nghiệp về tiền lương, tiền công, tiền thưởng, bảo hiểm xã hội và các khoản phải trả khác thuộc về thu nhập của người lao động."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 334 - Phải trả người lao động"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản tiền lương, tiền công, tiền thưởng có tính chất lương, bảo hiểm xã hội và các khoản khác đã trả, đã chi, đã ứng trước cho người lao động;"},{"k":"p","t":"- Các khoản khấu trừ vào tiền lương, tiền công của người lao động."},{"k":"p","t":"Bên Có: Các khoản tiền lương, tiền công, tiền thưởng có tính chất lương, bảo hiểm xã hội và các khoản khác phải trả, phải chi cho người lao động;"},{"k":"p","t":"Số dư bên Có: Các khoản tiền lương, tiền công, tiền thưởng có tính chất lương và các khoản khác còn phải trả cho người lao động."},{"k":"p","t":"Tài khoản 334 có thể có số dư bên Nợ. Số dư bên Nợ tài khoản 334 (nếu có) phản ánh số tiền đã trả lớn hơn số phải trả về tiền lương, tiền công, tiền thưởng và các khoản khác cho người lao động."}]},{"id":"tt133_43","no":43,"code":"Điều 43","title":"Điều 43. Tài khoản 335 - Chi phí phải trả","shortTitle":"Tài khoản 335 - Chi phí phải trả","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản phải trả cho hàng hóa, dịch vụ đã nhận được từ người bán trong kỳ báo cáo nhưng thực tế chưa chi trả do chưa có hóa đơn hoặc chưa đủ hồ sơ, tài liệu kế toán, được ghi nhận vào chi phí sản xuất, kinh doanh của kỳ báo cáo."},{"k":"p","t":"Tài khoản này còn phản ánh cả các khoản phải trả cho người lao động trong kỳ như phải trả về tiền lương nghỉ phép và các khoản chi phí sản xuất, kinh doanh của kỳ báo cáo phải trích trước, như:"},{"k":"p","t":"- Chi phí trong thời gian doanh nghiệp ngừng sản xuất theo mùa, vụ mà doanh nghiệp có thể xây dựng được kế hoạch ngừng sản xuất. Kế toán tiến hành tính trước và hạch toán vào chi phí sản xuất, kinh doanh trong kỳ những chi phí sẽ phải chi trong thời gian ngừng sản xuất, kinh doanh."},{"k":"p","t":"- Trích trước chi phí lãi tiền vay phải trả trong trường hợp vay trả lãi sau."},{"k":"p","t":"b) Kế toán phải phân biệt các khoản chi phí phải trả (hay còn được gọi là chi phí trích trước hoặc chi phí dồn tích) với các khoản dự phòng phải trả được phản ánh trên tài khoản 352 để ghi nhận và trình bày Báo cáo tài chính phù hợp với bản chất của từng khoản mục, cụ thể:"},{"k":"p","t":"- Các khoản dự phòng phải trả là nghĩa vụ nợ hiện tại nhưng thường chưa xác định được thời gian thanh toán cụ thể; Các khoản chi phí phải trả là nghĩa vụ nợ hiện tại chắc chắn về thời gian phải thanh toán;"},{"k":"p","t":"- Các khoản dự phòng phải trả thường được ước tính và có thể chưa xác định được chắc chắn số sẽ phải trả (ví dụ khoản chi phí dự phòng bảo hành sản phẩm, hàng hóa, công trình xây dựng); Các khoản chi phí phải trả xác định được chắc chắn số sẽ phải trả;"},{"k":"p","t":"- Trên Báo cáo tài chính, các khoản dự phòng phải trả được trình bày tách biệt với các khoản phải trả thương mại và phải trả khác trong khi chi phí phải trả là một phần của các khoản phải trả thương mại hoặc phải trả khác."},{"k":"p","t":"- Việc hạch toán các khoản chi phí phải trả vào chi phí sản xuất, kinh doanh trong kỳ phải thực hiện theo nguyên tắc phù hợp giữa doanh thu và chi phí phát sinh trong kỳ. Các khoản phải trả chưa phát sinh do chưa nhận hàng hóa, dịch vụ nhưng được tính trước vào chi phí sản xuất, kinh doanh kỳ này để đảm bảo khi phát sinh thực tế không gây đột biến cho chi phí sản xuất, kinh doanh được phản ánh là dự phòng phải trả."},{"k":"p","t":"c) Các khoản trích trước không được phản ánh vào tài khoản 335 mà được phản ánh là dự phòng phải trả, như:"},{"k":"p","t":"- Chi phí sửa chữa lớn của những TSCĐ đặc thù do việc sửa chữa lớn có tính chu kỳ, doanh nghiệp được phép trích trước chi phí sửa chữa cho năm báo cáo hoặc một số năm tiếp theo;"},{"k":"p","t":"- Dự phòng bảo hành sản phẩm, hàng hóa, công trình xây dựng;"},{"k":"p","t":"- Các khoản dự phòng phải trả khác (quy định trong TK 352)."},{"k":"p","t":"d) Về nguyên tắc, các khoản chi phí phải trả phải được quyết toán với số chi phí thực tế phát sinh. Số chênh lệch giữa số trích trước và chi phí thực tế phải được hoàn nhập."},{"k":"p","t":"đ) Việc vốn hóa lãi vay trong một số trường hợp cụ thể như sau:"},{"k":"p","t":"- Đối với khoản vay riêng phục vụ việc xây dựng TSCĐ, BĐSĐT, lãi vay được vốn hóa kể cả khi thời gian xây dựng dưới 12 tháng;"},{"k":"p","t":"- Nhà thầu không vốn hóa lãi vay khi đi vay để phục vụ việc thi công, xây dựng công trình, tài sản cho khách hàng, kể cả trường hợp đối với khoản vay riêng, ví dụ: Nhà thầu xây lắp vay tiền để thi công xây dựng công trình cho khách hàng, công ty đóng tàu theo hợp đồng cho chủ tàu..."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 335 - Chi phí phải trả"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản chi trả thực tế phát sinh đã được tính vào chi phí phải trả;"},{"k":"p","t":"- Số chênh lệch về chi phí phải trả lớn hơn số chi phí thực tế được ghi giảm chi phí."},{"k":"p","t":"Bên Có: Chi phí phải trả dự tính trước và ghi nhận vào chi phí sản xuất, kinh doanh."},{"k":"p","t":"Số dư bên Có: Chi phí phải trả đã tính vào chi phí sản xuất, kinh doanh nhưng thực tế chưa phát sinh."}]},{"id":"tt133_44","no":44,"code":"Điều 44","title":"Điều 44. Tài khoản 336 - Phải trả nội bộ","shortTitle":"Tài khoản 336 - Phải trả nội bộ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thanh toán các khoản phải trả giữa doanh nghiệp (đơn vị cấp trên) với các đơn vị trực thuộc hạch toán phụ thuộc có tổ chức công tác kế toán (đơn vị cấp dưới); Giữa các đơn vị hạch toán phụ thuộc của cùng một doanh nghiệp với nhau."},{"k":"p","t":"Trong doanh nghiệp, việc phân loại các đơn vị cấp dưới trực thuộc cho mục đích kế toán được căn cứ vào bản chất của đơn vị (hạch toán độc lập hay hạch toán phụ thuộc, có tư cách pháp nhân hay không, có người đại diện trước pháp luật hay không) mà không phụ thuộc vào tên gọi của đơn vị đó (chi nhánh, xí nghiệp, tổ, đội...)."},{"k":"p","t":"b) Các khoản phải trả nội bộ phản ánh trên tài khoản 336 \"Phải trả nội bộ\" bao gồm khoản phải trả về vốn kinh doanh và các khoản đơn vị hạch toán phụ thuộc phải nộp doanh nghiệp, phải trả đơn vị hạch toán phụ thuộc khác; Các khoản doanh nghiệp phải cấp cho đơn vị hạch toán phụ thuộc. Các khoản phải trả, phải nộp có thể là quan hệ nhận tài sản, vốn, thanh toán vãng lai, chi hộ trả hộ, ...;"},{"k":"p","t":"c) Tùy theo việc phân cấp quản lý và đặc điểm hoạt động, doanh nghiệp quyết định đơn vị hạch toán phụ thuộc ghi nhận khoản vốn kinh doanh được doanh nghiệp cấp vào TK 3361 - Phải trả nội bộ về vốn kinh doanh hoặc TK 411 - Vốn đầu tư của chủ sở hữu."},{"k":"p","t":"d) Tài khoản 336 \"Phải trả nội bộ\" được hạch toán chi tiết cho từng đơn vị nội bộ có quan hệ thanh toán, trong đó được theo dõi theo từng khoản phải nộp, phải trả."},{"k":"p","t":"đ) Cuối kỳ, kế toán tiến hành kiểm tra, đối chiếu tài khoản 136, tài khoản 336 giữa các đơn vị nội bộ theo từng nội dung thanh toán để lập biên bản thanh toán bù trừ với từng đơn vị làm căn cứ hạch toán bù trừ trên 2 tài khoản này. Khi đối chiếu, nếu có chênh lệch, phải tìm nguyên nhân và điều chỉnh kịp thời."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 336 - Phải trả nội bộ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số tiền đã trả cho đơn vị hạch toán phụ thuộc;"},{"k":"p","t":"- Số tiền đơn vị hạch toán phụ thuộc đã nộp doanh nghiệp;"},{"k":"p","t":"- Số tiền đã trả các khoản mà các đơn vị nội bộ chi hộ, hoặc thu hộ đơn vị nội bộ;"},{"k":"p","t":"- Bù trừ các khoản phải thu với các khoản phải trả của cùng một đơn vị có quan hệ thanh toán."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số vốn kinh doanh của đơn vị hạch toán phụ thuộc được doanh nghiệp cấp;"},{"k":"p","t":"- Số tiền đơn vị hạch toán phụ thuộc phải nộp doanh nghiệp;"},{"k":"p","t":"- Số tiền phải trả cho đơn vị hạch toán phụ thuộc;"},{"k":"p","t":"- Số tiền phải trả cho các đơn vị khác trong nội bộ về các khoản đã được đơn vị khác chi hộ và các khoản thu hộ đơn vị khác."},{"k":"p","t":"Số dư bên Có: Số tiền còn phải trả, phải nộp cho doanh nghiệp và các đơn vị trong nội bộ doanh nghiệp."},{"k":"p","t":"Tài khoản 336 - Phải trả nội bộ, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 3361 - Phải trả nội bộ về vốn kinh doanh: Tài khoản này chỉ mở ở đơn vị cấp dưới hạch toán phụ thuộc để phản ánh số vốn kinh doanh được đơn vị cấp trên giao."},{"k":"p","t":"- Tài khoản 3368 - Phải trả nội bộ khác: Phản ánh tất cả các khoản phải trả khác giữa các đơn vị nội bộ trong cùng một doanh nghiệp."}]},{"id":"tt133_45","no":45,"code":"Điều 45","title":"Điều 45. Tài khoản 338 - Phải trả, phải nộp khác","shortTitle":"Tài khoản 338 - Phải trả, phải nộp khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thanh toán về các khoản phải trả, phải nộp ngoài nội dung đã phản ánh ở các tài khoản khác thuộc nhóm TK 33 (từ TK 331 đến TK 336). Tài khoản này cũng được dùng để hạch toán doanh thu nhận trước về các dịch vụ đã cung cấp cho khách hàng."},{"k":"p","t":"b) Nội dung và phạm vi phản ánh của tài khoản này gồm các nghiệp vụ chủ yếu sau:"},{"k":"p","t":"- Giá trị tài sản thừa chưa xác định rõ nguyên nhân, còn chờ quyết định xử lý của cấp có thẩm quyền; Giá trị tài sản thừa phải trả cho cá nhân, tập thể (trong và ngoài đơn vị) theo quyết định của cấp có thẩm quyền ghi trong biên bản xử lý, nếu đã xác định được nguyên nhân;"},{"k":"p","t":"- Số tiền trích và thanh toán bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động và kinh phí công đoàn;"},{"k":"p","t":"- Các khoản khấu trừ vào tiền lương của công nhân viên theo quyết định của tòa án;"},{"k":"p","t":"- Các khoản lợi nhuận, cổ tức phải trả cho các chủ sở hữu;"},{"k":"p","t":"- Vật tư, hàng hóa vay, mượn, các khoản nhận vốn góp hợp đồng hợp tác kinh doanh (BCC) không hình thành pháp nhân mới;"},{"k":"p","t":"- Các khoản thu hộ bên thứ ba phải trả lại, các khoản tiền bên nhận ủy thác nhận từ bên giao ủy thác để nộp các loại thuế xuất, nhập khẩu, thuế GTGT hàng nhập khẩu và để thanh toán hộ cho bên giao ủy thác;"},{"k":"p","t":"- Số tiền thu trước của khách hàng trong nhiều kỳ kế toán về cho thuê tài sản, cơ sở hạ tầng, khoản lãi nhận trước khi cho vay vốn hoặc mua các công cụ nợ (gọi là doanh thu nhận trước); Các khoản doanh thu, thu nhập chưa thực hiện."},{"k":"p","t":"- Khoản chênh lệch giữa giá bán trả chậm, trả góp theo cam kết với giá bán trả ngay."},{"k":"p","t":"- Các khoản nhận cầm cố, ký cược, ký quỹ của tổ chức, cá nhân khác."},{"k":"p","t":"- Các khoản phải trả, phải nộp khác như phải trả để mua bảo hiểm hưu trí tự nguyện, bảo hiểm nhân thọ và các khoản hỗ trợ khác (ngoài lương) cho người lao động..."},{"k":"p","t":"c) Kế toán nhận ký quỹ, ký cược phải theo dõi chi tiết từng khoản tiền nhận ký quỹ, ký cược của từng khách hàng theo kỳ hạn và theo từng loại nguyên tệ (nếu có). Các khoản nhận ký cược, ký quỹ phải trả có kỳ hạn còn lại không quá 12 tháng được trình bày là nợ ngắn hạn, các khoản có kỳ hạn trên 12 tháng được trình bày là nợ dài hạn."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 338 - Phải trả, phải nộp khác"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Kết chuyển giá trị tài sản thừa vào các tài khoản liên quan theo quyết định ghi trong biên bản xử lý;"},{"k":"p","t":"- Kinh phí công đoàn chi tại đơn vị;"},{"k":"p","t":"- Số BHXH, BHYT, BHTN, BHTNLĐ, KPCĐ đã nộp cho cơ quan quản lý quỹ bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp và kinh phí công đoàn;"},{"k":"p","t":"- Doanh thu chưa thực hiện tính cho từng kỳ kế toán; trả lại tiền nhận trước cho khách hàng khi không tiếp tục thực hiện việc cho thuê tài sản;"},{"k":"p","t":"- Số phân bổ khoản chênh lệch giữa giá bán trả chậm, trả góp theo cam kết với giá bán trả tiền ngay (lãi trả chậm) vào doanh thu hoạt động tài chính;"},{"k":"p","t":"- Hoàn trả tiền nhận ký cược, ký quỹ;"},{"k":"p","t":"- Các khoản đã trả và đã nộp khác;"},{"k":"p","t":"- Đánh giá lại các khoản phải trả, phải nộp khác là khoản mục tiền tệ có gốc ngoại tệ (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Giá trị tài sản thừa chờ xử lý (chưa xác định rõ nguyên nhân); Giá trị tài sản thừa phải trả cho cá nhân, tập thể (trong và ngoài đơn vị) theo quyết định ghi trong biên bản xử lý do xác định ngay được nguyên nhân;"},{"k":"p","t":"- Trích BHXH, BHYT, BHTN, BHTNLĐ, KPCĐ vào chi phí sản xuất, kinh doanh hoặc khấu trừ vào lương của công nhân viên;"},{"k":"p","t":"- Các khoản thanh toán với công nhân viên về tiền nhà, điện, nước ở tập thể;"},{"k":"p","t":"- Số BHXH đã chi trả công nhân viên khi được cơ quan BHXH thanh toán;"},{"k":"p","t":"- Doanh thu chưa thực hiện phát sinh trong kỳ;"},{"k":"p","t":"- Số chênh lệch giữa giá bán trả chậm, trả góp theo cam kết với giá bán trả ngay;"},{"k":"p","t":"- Vật tư, hàng hóa vay, mượn, các khoản nhận vốn góp hợp đồng hợp tác kinh doanh (BCC) không thành lập pháp nhân;"},{"k":"p","t":"- Các khoản thu hộ đơn vị khác phải trả lại;"},{"k":"p","t":"- Số tiền nhận cầm cố, ký cược, ký quỹ phát sinh trong kỳ;"},{"k":"p","t":"- Các khoản phải trả khác;"},{"k":"p","t":"- Đánh giá lại các khoản phải trả, phải nộp khác là khoản mục tiền tệ có gốc ngoại tệ (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Có:"},{"k":"p","t":"- BHXH, BHYT, BHTN, BHTNLĐ, KPCĐ đã trích chưa nộp cho cơ quan quản lý hoặc kinh phí công đoàn được để lại cho đơn vị chưa chi hết;"},{"k":"p","t":"- Giá trị tài sản phát hiện thừa còn chờ giải quyết;"},{"k":"p","t":"- Doanh thu chưa thực hiện ở thời điểm cuối kỳ kế toán;"},{"k":"p","t":"- Các khoản còn phải trả, còn phải nộp khác;"},{"k":"p","t":"- Số tiền nhận ký cược, ký quỹ chưa trả."},{"k":"p","t":"Tài khoản này có thể có số dư bên Nợ: Số dư bên Nợ phản ánh số đã trả, đã nộp nhiều hơn số phải trả, phải nộp hoặc số bảo hiểm xã hội đã chi trả công nhân viên chưa được thanh toán và kinh phí công đoàn vượt chi chưa được cấp bù."},{"k":"p","t":"Tài khoản 338 - Phải trả, phải nộp khác, có 8 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 3381 - Tài sản thừa chờ giải quyết: Phản ánh giá trị tài sản thừa chưa xác định rõ nguyên nhân, còn chờ quyết định xử lý của cấp có thẩm quyền. Trường hợp giá trị tài sản thừa đã xác định được nguyên nhân và có biên bản xử lý thì được ghi ngay vào các tài khoản liên quan, không hạch toán qua tài khoản 338 (3381)."},{"k":"p","t":"- Tài khoản 3382 - Kinh phí công đoàn: Phản ánh tình hình trích và thanh toán kinh phí công đoàn ở đơn vị."},{"k":"p","t":"- Tài khoản 3383 - Bảo hiểm xã hội: Phản ánh tình hình trích và thanh toán bảo hiểm xã hội ở đơn vị."},{"k":"p","t":"- Tài khoản 3384 - Bảo hiểm y tế: Phản ánh tình hình trích và thanh toán bảo hiểm y tế ở đơn vị."},{"k":"p","t":"- Tài khoản 3385 - Bảo hiểm thất nghiệp: Phản ánh tình hình trích và thanh toán bảo hiểm thất nghiệp ở đơn vị."},{"k":"p","t":"- Tài khoản 3386 - Nhận ký quỹ, ký cược: Phản ánh số tiền nhận ký quỹ, ký cược của các đơn vị, cá nhân bên ngoài doanh nghiệp."},{"k":"p","t":"- Tài khoản 3387 - Doanh thu chưa thực hiện: Phản ánh số hiện có và tình hình tăng, giảm doanh thu chưa thực hiện của doanh nghiệp trong kỳ kế toán. Doanh thu chưa thực hiện gồm doanh thu nhận trước như: Số tiền của khách hàng đã trả trước cho một hoặc nhiều kỳ kế toán về cho thuê tài sản; Khoản lãi nhận trước khi cho vay vốn; các khoản doanh thu chưa thực hiện khác như: Khoản chênh lệch giữa giá bán hàng trả chậm, trả góp theo cam kết với giá bán trả tiền ngay, khoản doanh thu tương ứng với giá trị hàng hóa, dịch vụ. Không hạch toán vào tài khoản này các khoản:"},{"k":"p","t":"+ Tiền nhận trước của người mua mà doanh nghiệp chưa cung cấp sản phẩm, hàng hóa, dịch vụ;"},{"k":"p","t":"+ Doanh thu chưa thu được tiền của hoạt động cho thuê tài sản, cung cấp dịch vụ nhiều kỳ (doanh thu nhận trước chỉ được ghi nhận khi đã thực thu được tiền, không được ghi doanh thu chưa thực hiện đối ứng với TK 131 - Phải thu của khách hàng)."},{"k":"p","t":"- Tài khoản 3388 - Phải trả, phải nộp khác: Phản ánh các khoản phải trả khác của đơn vị ngoài nội dung các khoản phải trả đã phản ánh trên các tài khoản khác từ TK 3381 đến TK 3387."}]},{"id":"tt133_46","no":46,"code":"Điều 46","title":"Điều 46. Tài khoản 341 - Vay và nợ thuê tài chính","shortTitle":"Tài khoản 341 - Vay và nợ thuê tài chính","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản tiền vay (bao gồm cả vay dưới hình thức phát hành trái phiếu), nợ thuê tài chính và tình hình thanh toán các khoản tiền vay, nợ thuê tài chính của doanh nghiệp."},{"k":"p","t":"b) Doanh nghiệp phải theo dõi chi tiết kỳ hạn phải trả của các khoản vay, nợ thuê tài chính. Các khoản có thời gian trả nợ hơn 12 tháng kể từ thời điểm lập Báo cáo tài chính, kế toán trình bày là vay và nợ thuê tài chính dài hạn. Các khoản đến hạn trả trong vòng 12 tháng tiếp theo kể từ thời điểm lập Báo cáo tài chính, kế toán trình bày là vay và nợ thuê tài chính ngắn hạn để có kế hoạch chi trả."},{"k":"p","t":"c) Khi doanh nghiệp đi vay dưới hình thức phát hành trái phiếu, có thể xảy ra 3 trường hợp:"},{"k":"p","t":"- Phát hành trái phiếu ngang giá (giá phát hành bằng mệnh giá): Là phát hành trái phiếu với giá đúng bằng mệnh giá của trái phiếu."},{"k":"p","t":"- Phát hành trái phiếu có chiết khấu (giá phát hành nhỏ hơn mệnh giá): Là phát hành trái phiếu với giá nhỏ hơn mệnh giá của trái phiếu. Phần chênh lệch giữa giá phát hành trái phiếu nhỏ hơn mệnh giá của trái phiếu gọi là chiết khấu trái phiếu. Trường hợp này thường xảy ra khi lãi suất thị trường lớn hơn lãi suất danh nghĩa của trái phiếu phát hành."},{"k":"p","t":"- Phát hành trái phiếu có phụ trội (giá phát hành lớn hơn mệnh giá): Là phát hành trái phiếu với giá lớn hơn mệnh giá của trái phiếu. Phần chênh lệch giữa giá phát hành trái phiếu lớn hơn mệnh giá của trái phiếu gọi là phụ trội trái phiếu... Trường hợp này thường xảy ra khi lãi suất thị trường nhỏ hơn lãi suất danh nghĩa (lãi ghi trên trái phiếu) của trái phiếu phát hành."},{"k":"p","t":"Khi hạch toán trái phiếu phát hành, doanh nghiệp phải ghi nhận khoản chiết khấu hoặc phụ trội trái phiếu tại thời điểm phát hành và theo dõi chi tiết thời hạn phát hành trái phiếu, các nội dung có liên quan đến trái phiếu phát hành:"},{"k":"p","t":"+ Mệnh giá trái phiếu;"},{"k":"p","t":"+ Chiết khấu trái phiếu;"},{"k":"p","t":"+ Phụ trội trái phiếu."},{"k":"p","t":"- Doanh nghiệp phải theo dõi chiết khấu và phụ trội cho từng loại trái phiếu phát hành và tình hình phân bổ từng khoản chiết khấu, phụ trội khi xác định chi phí đi vay tính vào chi phí tài chính hoặc vốn hóa theo từng kỳ, cụ thể:"},{"k":"p","t":"+ Chiết khấu trái phiếu được phân bổ dần để tính vào chi phí đi vay từng kỳ trong suốt thời hạn của trái phiếu;"},{"k":"p","t":"+ Phụ trội trái phiếu được phân bổ dần để giảm trừ chi phí đi vay từng kỳ trong suốt thời hạn của trái phiếu;"},{"k":"p","t":"+ Trường hợp chi phí lãi vay của trái phiếu đủ điều kiện vốn hóa, các khoản lãi tiền vay và khoản phân bổ chiết khấu hoặc phụ trội được vốn hóa trong từng kỳ không được vượt quá số lãi vay thực tế phát sinh và số phân bổ chiết khấu hoặc phụ trội trong kỳ đó;"},{"k":"p","t":"+ Khoản chiết khấu hoặc phụ trội được phân bổ trong suốt kỳ hạn của trái phiếu theo phương pháp đường thẳng."},{"k":"p","t":"- Trường hợp trả lãi khi đáo hạn trái phiếu thì định kỳ doanh nghiệp phải tính lãi trái phiếu phải trả từng kỳ để ghi nhận vào chi phí tài chính hoặc vốn hóa vào giá trị của tài sản dở dang."},{"k":"p","t":"- Khi lập báo cáo tài chính, trên Báo cáo tình hình tài chính trong phần nợ phải trả thì khoản trái phiếu phát hành được phản ánh trên cơ sở thuần (xác định bằng trị giá trái phiếu theo mệnh giá trừ (-) chiết khấu trái phiếu cộng (+) phụ trội trái phiếu)."},{"k":"p","t":"d) Các chi phí đi vay liên quan trực tiếp đến khoản vay (ngoài lãi vay phải trả), như chi phí thẩm định, kiểm toán, lập hồ sơ vay vốn, chi phí phát hành trái phiếu... được hạch toán vào chi phí tài chính. Trường hợp các chi phí này phát sinh từ khoản vay riêng cho mục đích đầu tư, xây dựng hoặc sản xuất tài sản dở dang thì được vốn hóa."},{"k":"p","t":"đ) Đối với khoản nợ thuê tài chính, tổng số nợ thuê phản ánh vào bên Có của Tài khoản 341 là tổng số tiền phải trả được tính bằng giá trị hiện tại của khoản thanh toán tiền thuê tối thiểu hoặc giá trị hợp lý của tài sản thuê."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 341 - Vay và nợ thuê tài chính"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số tiền đã trả nợ gốc của các khoản vay, nợ thuê tài chính;"},{"k":"p","t":"- Số tiền gốc vay, nợ được giảm do được bên cho vay, chủ nợ chấp thuận;"},{"k":"p","t":"- Số phân bổ phụ trội trái phiếu phát hành;"},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái do đánh giá lại số dư vay, nợ thuê tài chính là khoản mục tiền tệ có gốc ngoại tệ cuối kỳ (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số tiền vay, nợ thuê tài chính phát sinh trong kỳ;"},{"k":"p","t":"- Số phân bổ chiết khấu trái phiếu phát hành;"},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái do đánh giá lại số dư vay, nợ thuê tài chính là khoản mục tiền tệ có gốc ngoại tệ cuối kỳ (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Có: Số dư vay, nợ thuê tài chính chưa đến hạn trả."},{"k":"p","t":"Tài khoản 341 - Vay và nợ thuê tài chính có 2 tài khoản cấp 2:"},{"k":"p","t":"Tài khoản 3411 - Các khoản đi vay: Tài khoản này phản ánh giá trị các khoản tiền đi vay, tình hình thanh toán các khoản tiền vay (kể cả đi vay dưới hình thức phát hành trái phiếu) của doanh nghiệp và tình hình phân bổ chiết khấu, phụ trội trái phiếu."},{"k":"p","t":"Tài khoản 3412 - Nợ thuê tài chính: Tài khoản này phản ánh giá trị khoản nợ thuê tài chính và tình hình thanh toán nợ thuê tài chính của doanh nghiệp."}]},{"id":"tt133_47","no":47,"code":"Điều 47","title":"Điều 47. Tài khoản 352 - Dự phòng phải trả","shortTitle":"Tài khoản 352 - Dự phòng phải trả","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản dự phòng phải trả hiện có, tình hình trích lập và sử dụng dự phòng phải trả của doanh nghiệp."},{"k":"p","t":"b) Dự phòng phải trả chỉ được ghi nhận khi thỏa mãn các điều kiện sau:"},{"k":"p","t":"- Doanh nghiệp có nghĩa vụ nợ hiện tại (nghĩa vụ pháp lý hoặc nghĩa vụ liên đới) do kết quả từ một sự kiện đã xảy ra;"},{"k":"p","t":"- Sự giảm sút về những lợi ích kinh tế có thể xảy ra dẫn đến việc yêu cầu phải thanh toán nghĩa vụ nợ;"},{"k":"p","t":"- Đưa ra được một ước tính đáng tin cậy về giá trị của nghĩa vụ nợ đó."},{"k":"p","t":"c) Giá trị được ghi nhận của một khoản dự phòng phải trả là giá trị được ước tính hợp lý nhất về khoản tiền sẽ phải chi để thanh toán nghĩa vụ nợ hiện tại tại ngày kết thúc kỳ kế toán."},{"k":"p","t":"d) Khoản dự phòng phải trả được lập tại thời điểm lập Báo cáo tài chính. Trường hợp số dự phòng phải trả cần lập ở kỳ kế toán này lớn hơn số dự phòng phải trả đã lập ở kỳ kế toán trước chưa sử dụng hết thì số chênh lệch được ghi nhận vào chi phí sản xuất, kinh doanh của kỳ kế toán đó. Trường hợp số dự phòng phải trả lập ở kỳ kế toán này nhỏ hơn số dự phòng phải trả đã lập ở kỳ kế toán trước chưa sử dụng hết thì số chênh lệch phải được hoàn nhập."},{"k":"p","t":"Đối với dự phòng phải trả về bảo hành công trình xây lắp thì dự phòng được lập cho từng công trình xây lắp và được lập vào cuối kỳ kế toán."},{"k":"p","t":"đ) Chỉ những khoản chi phí liên quan đến khoản dự phòng phải trả đã lập ban đầu mới được bù đắp bằng khoản dự phòng phải trả đó."},{"k":"p","t":"e) Không được ghi nhận khoản dự phòng cho các khoản lỗ hoạt động trong tương lai, trừ khi chúng liên quan đến một hợp đồng có rủi ro lớn và thỏa mãn điều kiện ghi nhận khoản dự phòng. Nếu doanh nghiệp có hợp đồng có rủi ro lớn, thì nghĩa vụ nợ hiện tại theo hợp đồng phải được ghi nhận và đánh giá như một khoản dự phòng và khoản dự phòng được lập riêng biệt cho từng hợp đồng có rủi ro lớn."},{"k":"p","t":"g) Các khoản dự phòng phải trả thường bao gồm:"},{"k":"p","t":"- Dự phòng phải trả bảo hành sản phẩm, hàng hóa;"},{"k":"p","t":"- Dự phòng bảo hành công trình xây dựng;"},{"k":"p","t":"- Dự phòng phải trả khác, bao gồm cả khoản dự phòng trợ cấp thôi việc theo quy định của pháp luật, khoản dự phòng cho việc sửa chữa, bảo dưỡng TSCĐ định kỳ (theo yêu cầu kỹ thuật), khoản dự phòng phải trả đối với hợp đồng có rủi ro lớn mà trong đó những chi phí bắt buộc phải trả cho các nghĩa vụ liên quan đến hợp đồng vượt quá những lợi ích kinh tế dự tính thu được từ hợp đồng đó;"},{"k":"p","t":"h) Khoản dự phòng phải trả về bảo hành sản phẩm, hàng hóa được ghi nhận vào chi phí bán hàng, khoản dự phòng phải trả về chi phí bảo hành công trình xây lắp được ghi nhận vào chi phí sản xuất kinh doanh dở dang, khoản dự phòng phải trả khác được ghi nhận vào chi phí liên quan tùy theo nội dung chi phí."},{"k":"p","t":"i) Số dự phòng phải trả về bảo hành công trình xây lắp đã lập lớn hơn chi phí thực tế phát sinh thì số chênh lệch được hoàn nhập ghi vào TK 711 “Thu nhập khác”. Số hoàn nhập dự phòng phải trả về bảo hành sản phẩm, hàng hóa được ghi giảm chi phí bán hàng. Số hoàn nhập dự phòng phải trả khác được ghi giảm chi phí liên quan tùy theo nội dung chi phí."},{"k":"p","t":"k) Khi doanh nghiệp nhận được khoản bồi hoàn của một bên thứ 3 để thanh toán một phần hay toàn bộ chi phí cho khoản dự phòng thì khoản được bồi hoàn từ bên thứ 3 ghi nhận vào thu nhập khác."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 352 - Dự phòng phải trả"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Ghi giảm dự phòng phải trả khi phát sinh khoản chi phí liên quan đến khoản dự phòng đã được lập ban đầu;"},{"k":"p","t":"- Ghi giảm (hoàn nhập) dự phòng phải trả khi doanh nghiệp chắc chắn không còn phải chịu sự giảm sút về kinh tế do không phải chi trả cho nghĩa vụ nợ;"},{"k":"p","t":"- Ghi giảm dự phòng phải trả về số chênh lệch giữa số dự phòng phải trả phải lập năm nay nhỏ hơn số dự phòng phải trả đã lập năm trước chưa sử dụng hết."},{"k":"p","t":"Bên Có: Phản ánh số dự phòng phải trả trích lập tính vào chi phí."},{"k":"p","t":"Số dư bên Có: Phản ánh số dự phòng phải trả hiện có cuối kỳ."},{"k":"p","t":"Tài khoản 352 có 3 tài khoản cấp 2"},{"k":"p","t":"- Tài khoản 3521 - Dự phòng bảo hành sản phẩm, hàng hóa: Tài khoản này dùng để phản ánh số dự phòng bảo hành sản phẩm, hàng hóa cho số lượng sản phẩm, hàng hóa đã xác định là tiêu thụ trong kỳ;"},{"k":"p","t":"- Tài khoản 3522 - Dự phòng bảo hành công trình xây dựng: Tài khoản này dùng để phản ánh số dự phòng bảo hành công trình xây dựng đối với các công trình, hạng mục công trình hoàn thành, bàn giao trong kỳ;"},{"k":"p","t":"- Tài khoản 3524 - Dự phòng phải trả khác: Tài khoản này phản ánh các khoản dự phòng phải trả khác theo quy định của pháp luật ngoài các khoản dự phòng đã được phản ánh nêu trên, như: dự phòng trợ cấp thôi việc theo quy định của Luật lao động, chi phí sửa chữa, bảo dưỡng, TSCĐ định kỳ..."}]},{"id":"tt133_48","no":48,"code":"Điều 48","title":"Điều 48. Tài khoản 353 - Quỹ khen thưởng, phúc lợi","shortTitle":"Tài khoản 353 - Quỹ khen thưởng, phúc lợi","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có, tình hình tăng, giảm quỹ khen thưởng, quỹ phúc lợi và quỹ thưởng ban quản lý điều hành công ty của doanh nghiệp. Quỹ khen thưởng, quỹ phúc lợi được trích từ lợi nhuận sau thuế TNDN của doanh nghiệp để dùng cho công tác khen thưởng, khuyến khích lợi ích vật chất, phục vụ nhu cầu phúc lợi công cộng, cải thiện và nâng cao đời sống vật chất, tinh thần của người lao động."},{"k":"p","t":"b) Việc trích lập và sử dụng quỹ khen thưởng, quỹ phúc lợi và quỹ thưởng ban quản lý điều hành công ty phải theo chính sách tài chính hiện hành hoặc theo quyết định của chủ sở hữu."},{"k":"p","t":"c) Quỹ khen thưởng, quỹ phúc lợi, quỹ thưởng ban quản lý điều hành công ty phải được hạch toán chi tiết theo từng loại quỹ."},{"k":"p","t":"d) Đối với TSCĐ đầu tư, mua sắm bằng quỹ phúc lợi khi hoàn thành dùng vào sản xuất, kinh doanh, kế toán ghi tăng TSCĐ đồng thời ghi tăng Vốn đầu tư của chủ sở hữu và giảm quỹ phúc lợi."},{"k":"p","t":"đ) Đối với TSCĐ đầu tư, mua sắm bằng quỹ phúc lợi khi hoàn thành dùng cho nhu cầu văn hóa, phúc lợi của doanh nghiệp, kế toán ghi tăng TSCĐ và đồng thời kết chuyển từ Quỹ phúc lợi (TK 3532) sang Quỹ phúc lợi đã hình thành TSCĐ (TK 3533). Những TSCĐ này hàng tháng không trích khấu hao TSCĐ vào chi phí mà cuối niên độ kế toán tính hao mòn TSCĐ một lần/một năm để ghi giảm Quỹ phúc lợi đã hình thành TSCĐ."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 353 - Quỹ khen thưởng, phúc lợi"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản chi tiêu quỹ khen thưởng, quỹ phúc lợi, quỹ thưởng ban quản lý điều hành công ty;"},{"k":"p","t":"- Giảm quỹ phúc lợi đã hình thành TSCĐ khi tính hao mòn TSCĐ hoặc do nhượng bán, thanh lý, phát hiện thiếu khi kiểm kê TSCĐ;"},{"k":"p","t":"- Đầu tư, mua sắm TSCĐ bằng quỹ phúc lợi khi hoàn thành phục vụ nhu cầu văn hóa, phúc lợi;"},{"k":"p","t":"- Cấp quỹ khen thưởng, phúc lợi cho cấp dưới."},{"k":"p","t":"Bên Có"},{"k":"p","t":"- Trích lập quỹ khen thưởng, quỹ phúc lợi, quỹ thưởng ban quản lý điều hành công ty từ lợi nhuận sau thuế TNDN;"},{"k":"p","t":"- Quỹ khen thưởng, phúc lợi được cấp trên cấp;"},{"k":"p","t":"- Quỹ phúc lợi đã hình thành TSCĐ tăng do đầu tư, mua sắm TSCĐ bằng quỹ phúc lợi hoàn thành đưa vào sử dụng cho sản xuất, kinh doanh hoặc hoạt động văn hóa, phúc lợi."},{"k":"p","t":"Số dư bên Có: Số quỹ khen thưởng, quỹ phúc lợi hiện còn của doanh nghiệp."},{"k":"p","t":"Tài khoản 353 - Quỹ khen thưởng, phúc lợi, có 4 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 3531 - Quỹ khen thưởng: Phản ánh số hiện có, tình hình trích lập và chi tiêu quỹ khen thưởng của doanh nghiệp."},{"k":"p","t":"- Tài khoản 3532 - Quỹ phúc lợi: Phản ánh số hiện có, tình hình trích lập và chi tiêu quỹ phúc lợi của doanh nghiệp."},{"k":"p","t":"- Tài khoản 3533 - Quỹ phúc lợi đã hình thành TSCĐ: Phản ánh số hiện có, tình hình tăng, giảm quỹ phúc lợi đã hình thành TSCĐ của doanh nghiệp."},{"k":"p","t":"- Tài khoản 3534 - Quỹ thưởng ban quản lý điều hành công ty: Phản ánh số hiện có, tình hình trích lập và chi tiêu Quỹ thưởng ban quản lý điều hành công ty."}]},{"id":"tt133_49","no":49,"code":"Điều 49","title":"Điều 49. Tài khoản 356 - Quỹ phát triển khoa học và công nghệ","shortTitle":"Tài khoản 356 - Quỹ phát triển khoa học và công nghệ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có, tình hình tăng giảm Quỹ phát triển khoa học và công nghệ (PTKH&CN) của doanh nghiệp. Quỹ PTKH&CN của doanh nghiệp chỉ được sử dụng cho đầu tư khoa học, công nghệ tại Việt Nam."},{"k":"p","t":"b) Quỹ PTKH&CN được hạch toán vào chi phí quản lý doanh nghiệp để xác định kết quả kinh doanh trong kỳ. Việc trích lập và sử dụng Quỹ PTKH&CN của doanh nghiệp phải tuân thủ theo các quy định của pháp luật."},{"k":"p","t":"c) Trường hợp doanh nghiệp sử dụng Quỹ P
