anh nghiệp sang TK 911 - Xác định kết quả kinh doanh."}]},{"id":"tt133_65","no":65,"code":"Điều 65","title":"Điều 65. Tài khoản 711 - Thu nhập khác","shortTitle":"Tài khoản 711 - Thu nhập khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản thu nhập khác ngoài hoạt động sản xuất, kinh doanh thông thường của doanh nghiệp, gồm:"},{"k":"p","t":"- Thu nhập từ nhượng bán, thanh lý TSCĐ;"},{"k":"p","t":"- Chênh lệch giữa giá trị hợp lý tài sản được chia từ BCC cao hơn chi phí đầu tư xây dựng tài sản đồng kiểm soát;"},{"k":"p","t":"- Chênh lệch lãi do đánh giá lại vật tư, hàng hóa, tài sản cố định đưa đi góp vốn liên doanh, đầu tư vào công ty liên kết và đầu tư khác;"},{"k":"p","t":"- Các khoản thuế phải nộp khi bán hàng hóa, cung cấp dịch vụ nhưng sau đó được giảm, được hoàn (thuế xuất khẩu được hoàn, thuế GTGT, TTĐB, BVMT phải nộp nhưng sau đó được giảm);"},{"k":"p","t":"- Thu tiền phạt do khách hàng vi phạm hợp đồng;"},{"k":"p","t":"- Thu tiền bồi thường của bên thứ ba để bù đắp cho tài sản bị tổn thất (ví dụ thu tiền bảo hiểm được bồi thường, tiền đền bù di dời cơ sở kinh doanh và các khoản có tính chất tương tự);"},{"k":"p","t":"- Thu các khoản nợ khó đòi đã xử lý xóa sổ;"},{"k":"p","t":"- Thu các khoản nợ phải trả không xác định được chủ;"},{"k":"p","t":"- Các khoản tiền thưởng của khách hàng liên quan đến tiêu thụ hàng hóa, sản phẩm, dịch vụ không tính trong doanh thu (nếu có);"},{"k":"p","t":"- Thu nhập quà biếu, quà tặng bằng tiền, hiện vật của các tổ chức, cá nhân tặng cho doanh nghiệp;"},{"k":"p","t":"- Giá trị số hàng khuyến mại không phải trả lại nhà sản xuất;"},{"k":"p","t":"- Các khoản thu nhập khác ngoài các khoản nêu trên."},{"k":"p","t":"b) Khi có khả năng chắc chắn thu được các khoản tiền phạt vi phạm hợp đồng, kế toán phải xét bản chất của khoản tiền phạt để kế toán phù hợp với từng trường hợp cụ thể theo nguyên tắc:"},{"k":"p","t":"- Đối với bên bán: Tất cả các khoản tiền phạt vi phạm hợp đồng thu được từ bên mua nằm ngoài giá trị hợp đồng được ghi nhận là thu nhập khác."},{"k":"p","t":"- Đối với bên mua:"},{"k":"p","t":"+ Các khoản tiền phạt về bản chất là khoản giảm giá hàng mua, làm giảm khoản thanh toán cho người bán được hạch toán giảm giá trị tài sản hoặc khoản thanh toán (không hạch toán vào thu nhập khác) trừ khi tài sản có liên quan đã được thanh lý, nhượng bán."},{"k":"p","t":"Ví dụ khi nhà thầu thi công chậm tiến độ, chủ đầu tư được phạt nhà thầu theo đó được quyền thu hồi lại một phần số tiền đã thanh toán cho nhà thầu thì số tiền thu hồi lại được ghi giảm giá trị tài sản xây dựng. Tuy nhiên nếu khoản tiền phạt thu được sau khi tài sản đã được thanh lý, nhượng bán thì khoản tiền phạt được ghi vào thu nhập khác."},{"k":"p","t":"+ Các khoản tiền phạt khác được ghi nhận là thu nhập khác trong kỳ phát sinh, ví dụ: Người mua được quyền từ chối nhận hàng và được phạt người bán nếu giao hàng không đúng thời hạn quy định trong hợp đồng thì khoản tiền phạt phải thu được ghi nhận là thu nhập khác khi chắc chắn thu được. Trường hợp người mua vẫn nhận hàng và số tiền phạt được giảm trừ vào số tiền phải thanh toán thì giá trị hàng mua được ghi nhận theo số thực phải thanh toán, kế toán không ghi nhận khoản tiền phạt vào thu nhập khác."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 711 - Thu nhập khác"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số thuế GTGT phải nộp (nếu có) đối với các khoản thu nhập khác ở doanh nghiệp nộp thuế GTGT theo phương pháp trực tiếp."},{"k":"p","t":"- Cuối kỳ kế toán, kết chuyển các khoản thu nhập khác phát sinh trong kỳ sang tài khoản 911 “Xác định kết quả kinh doanh”."},{"k":"p","t":"Bên Có: Các khoản thu nhập khác phát sinh trong kỳ."},{"k":"p","t":"Tài khoản 711 - Thu nhập khác không có số dư cuối kỳ."}]},{"id":"tt133_66","no":66,"code":"Điều 66","title":"Điều 66. Tài khoản 811 - Chi phí khác","shortTitle":"Tài khoản 811 - Chi phí khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này phản ánh những khoản chi phí phát sinh do các sự kiện hay các nghiệp vụ riêng biệt với hoạt động thông thường của doanh nghiệp. Chi phí khác của doanh nghiệp có thể gồm:"},{"k":"p","t":"- Chi phí thanh lý, nhượng bán TSCĐ (gồm cả chi phí đấu thầu hoạt động thanh lý). Số tiền thu từ bán hồ sơ thầu hoạt động thanh lý, nhượng bán TSCĐ được ghi giảm chi phí thanh lý, nhượng bán TSCĐ;"},{"k":"p","t":"- Chênh lệch giữa giá trị hợp lý tài sản được chia từ BCC nhỏ hơn chi phí đầu tư xây dựng tài sản đồng kiểm soát;"},{"k":"p","t":"- Giá trị còn lại của TSCĐ bị phá dỡ;"},{"k":"p","t":"- Giá trị còn lại của TSCĐ thanh lý, nhượng bán TSCĐ (nếu có);"},{"k":"p","t":"- Chênh lệch lỗ do đánh giá lại vật tư, hàng hóa, TSCĐ đưa đi góp vốn vào công ty liên doanh, liên kết và đầu tư khác;"},{"k":"p","t":"- Tiền phạt phải trả do vi phạm hợp đồng kinh tế, phạt vi phạm hành chính;"},{"k":"p","t":"- Các khoản chi phí khác."},{"k":"p","t":"b) Các khoản chi phí không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 811 - Chi phí khác"},{"k":"p","t":"Bên Nợ: Các khoản chi phí khác phát sinh."},{"k":"p","t":"Bên Có: Cuối kỳ, kết chuyển toàn bộ các khoản chi phí khác phát sinh trong kỳ vào tài khoản 911 “Xác định kết quả kinh doanh”."},{"k":"p","t":"Tài khoản 811 không có số dư cuối kỳ."}]},{"id":"tt133_67","no":67,"code":"Điều 67","title":"Điều 67. Tài khoản 821 - Chi phí thuế thu nhập doanh nghiệp","shortTitle":"Tài khoản 821 - Chi phí thuế thu nhập doanh nghiệp","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Nguyên tắc kế toán chi phí thuế thu nhập doanh nghiệp"},{"k":"p","t":"- Tài khoản này dùng để phản ánh chi phí thuế thu nhập doanh nghiệp của doanh nghiệp phát sinh trong năm làm căn cứ xác định kết quả hoạt động kinh doanh sau thuế của doanh nghiệp trong năm tài chính hiện hành."},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp được ghi nhận vào tài khoản này là số thuế thu nhập doanh nghiệp phải nộp tính trên thu nhập chịu thuế trong năm và thuế suất thuế thu nhập doanh nghiệp hiện hành."},{"k":"p","t":"- Hàng quý, kế toán căn cứ vào chứng từ nộp thuế thu nhập doanh nghiệp để ghi nhận số thuế thu nhập doanh nghiệp tạm phải nộp vào chi phí thuế thu nhập doanh nghiệp. Cuối năm tài chính, căn cứ vào tờ khai quyết toán thuế, nếu số thuế thu nhập doanh nghiệp tạm phải nộp trong năm nhỏ hơn số phải nộp cho năm đó, kế toán ghi nhận số thuế thu nhập doanh nghiệp phải nộp thêm vào chi phí thuế thu nhập doanh nghiệp. Trường hợp số thuế thu nhập doanh nghiệp tạm phải nộp trong năm lớn hơn số phải nộp của năm đó, kế toán phải ghi giảm chi phí thuế thu nhập doanh nghiệp là số chênh lệch giữa số thuế thu nhập doanh nghiệp tạm phải nộp trong năm lớn hơn số phải nộp."},{"k":"p","t":"- Trường hợp phát hiện sai sót không trọng yếu liên quan đến khoản thuế thu nhập doanh nghiệp phải nộp của các năm trước, doanh nghiệp được hạch toán tăng (hoặc giảm) số thuế thu nhập doanh nghiệp phải nộp của các năm trước vào chi phí thuế thu nhập doanh nghiệp của năm phát hiện sai sót."},{"k":"p","t":"- Đối với các sai sót trọng yếu, kế toán điều chỉnh hồi tố."},{"k":"p","t":"- Khi lập Báo cáo tài chính, kế toán phải kết chuyển chi phí thuế thu nhập doanh nghiệp phát sinh vào tài khoản 911 - “Xác định kết quả kinh doanh” để xác định lợi nhuận sau thuế trong kỳ kế toán."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 821 - Chi phí thuế thu nhập doanh nghiệp"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp phát sinh trong năm;"},{"k":"p","t":"- Thuế thu nhập doanh nghiệp của các năm trước phải nộp bổ sung do phát hiện sai sót không trọng yếu của các năm trước được ghi tăng chi phí thuế thu nhập doanh nghiệp của năm hiện tại."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số thuế thu nhập doanh nghiệp thực tế phải nộp trong năm nhỏ hơn số thuế thu nhập doanh nghiệp tạm phải nộp được giảm trừ vào chi phí thuế thu nhập doanh nghiệp đã ghi nhận trong năm;"},{"k":"p","t":"- Số thuế thu nhập doanh nghiệp phải nộp được ghi giảm do phát hiện sai sót không trọng yếu của các năm trước được ghi giảm chi phí thuế thu nhập doanh nghiệp trong năm hiện tại;"},{"k":"p","t":"- Kết chuyển số chênh lệch giữa chi phí thuế thu nhập doanh nghiệp phát sinh trong năm lớn hơn khoản được ghi giảm chi phí thuế thu nhập doanh nghiệp trong năm vào tài khoản 911 - “Xác định kết quả kinh doanh”."},{"k":"p","t":"Tài khoản 821 - “Chi phí thuế thu nhập doanh nghiệp” không có số dư cuối kỳ."}]},{"id":"tt133_68","no":68,"code":"Điều 68","title":"Điều 68. Tài khoản 911 - Xác định kết quả kinh doanh","shortTitle":"Tài khoản 911 - Xác định kết quả kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để xác định và phản ánh kết quả hoạt động kinh doanh và các hoạt động khác của doanh nghiệp trong một kỳ kế toán. Kết quả hoạt động kinh doanh của doanh nghiệp bao gồm: Kết quả hoạt động sản xuất, kinh doanh, kết quả hoạt động tài chính và kết quả hoạt động khác."},{"k":"p","t":"- Kết quả hoạt động sản xuất, kinh doanh là số chênh lệch giữa doanh thu thuần và trị giá vốn hàng bán (gồm cả sản phẩm, hàng hóa, bất động sản đầu tư và dịch vụ, giá thành sản xuất của sản phẩm xây lắp, chi phí liên quan đến hoạt động kinh doanh bất động sản đầu tư, như: chi phí khấu hao, chi phí sửa chữa, nâng cấp, chi phí cho thuê hoạt động, chi phí thanh lý, nhượng bán bất động sản đầu tư), chi phí bán hàng và chi phí quản lý doanh nghiệp."},{"k":"p","t":"- Kết quả hoạt động tài chính là số chênh lệch giữa thu nhập của hoạt động tài chính và chi phí hoạt động tài chính."},{"k":"p","t":"- Kết quả hoạt động khác là số chênh lệch giữa các khoản thu nhập khác và các khoản chi phí khác và chi phí thuế thu nhập doanh nghiệp."},{"k":"p","t":"b) Tài khoản này phải phản ánh đầy đủ, chính xác kết quả hoạt động kinh doanh của kỳ kế toán. Kết quả hoạt động kinh doanh phải được hạch toán chi tiết theo từng loại hoạt động (hoạt động sản xuất, chế biến, hoạt động kinh doanh thương mại, dịch vụ, hoạt động tài chính...). Trong từng loại hoạt động kinh doanh có thể cần hạch toán chi tiết cho từng loại sản phẩm, từng ngành hàng, từng loại dịch vụ."},{"k":"p","t":"c) Các khoản doanh thu và thu nhập được kết chuyển vào tài khoản này là số doanh thu thuần và thu nhập thuần."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 911 - Xác định kết quả kinh doanh"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá vốn của sản phẩm, hàng hóa, bất động sản đầu tư và dịch vụ đã bán;"},{"k":"p","t":"- Chi phí hoạt động tài chính, chi phí thuế thu nhập doanh nghiệp và chi phí khác;"},{"k":"p","t":"- Chi phí bán hàng và chi phí quản lý doanh nghiệp;"},{"k":"p","t":"- Kết chuyển lãi."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Doanh thu thuần về số sản phẩm, hàng hóa, bất động sản đầu tư và dịch vụ đã bán trong kỳ;"},{"k":"p","t":"- Doanh thu hoạt động tài chính, các khoản thu nhập khác và khoản kết chuyển giảm chi phí thuế thu nhập doanh nghiệp;"},{"k":"p","t":"- Kết chuyển lỗ."},{"k":"p","t":"Tài khoản 911 không có số dư cuối kỳ."}]},{"id":"tt133_69","no":69,"code":"Điều 69","title":"Điều 69. Mục đích của báo cáo tài chính","shortTitle":"Mục đích của báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Báo cáo tài chính dùng để cung cấp thông tin về tình hình tài chính, tình hình kinh doanh và các luồng tiền của một doanh nghiệp, đáp ứng yêu cầu quản lý của chủ doanh nghiệp, cơ quan Nhà nước và nhu cầu hữu ích của những người sử dụng trong việc đưa ra các quyết định kinh tế. Báo cáo tài chính phải cung cấp những thông tin của một doanh nghiệp về:"},{"k":"p","t":"a) Tài sản;"},{"k":"p","t":"b) Nợ phải trả;"},{"k":"p","t":"c) Vốn chủ sở hữu;"},{"k":"p","t":"d) Doanh thu, thu nhập khác, chi phí sản xuất kinh doanh và chi phí khác;"},{"k":"p","t":"đ) Lãi, lỗ và phân chia kết quả kinh doanh."},{"k":"p","t":"2. Ngoài các thông tin này, doanh nghiệp còn phải cung cấp các thông tin khác trong “Bản thuyết minh Báo cáo tài chính” nhằm giải trình thêm về các chỉ tiêu đã phản ánh trên các Báo cáo tài chính và các chính sách kế toán đã áp dụng để ghi nhận các nghiệp vụ kinh tế phát sinh, lập và trình bày Báo cáo tài chính."}]},{"id":"tt133_70","no":70,"code":"Điều 70","title":"Điều 70. Đối tượng áp dụng, trách nhiệm lập và chữ ký trên báo cáo tài chính","shortTitle":"Đối tượng áp dụng, trách nhiệm lập và chữ ký trên báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng lập Báo cáo tài chính năm:"},{"k":"p","t":"Hệ thống Báo cáo tài chính năm ban hành theo Thông tư này được áp dụng cho tất cả các loại hình doanh nghiệp có quy mô nhỏ và vừa thuộc mọi lĩnh vực, 123 mọi thành phần kinh tế trong cả nước."},{"k":"p","t":"2. Việc ký Báo cáo tài chính phải thực hiện theo quy định của Luật Kế toán. Trường hợp doanh nghiệp không tự lập Báo cáo tài chính mà thuê đơn vị kinh doanh dịch vụ kế toán lập Báo cáo tài chính, người hành nghề thuộc các đơn vị kinh doanh dịch vụ kế toán phải ký và ghi rõ số giấy chứng nhận đăng ký hành nghề dịch vụ kế toán, tên đơn vị kinh doanh dịch vụ kế toán trên báo cáo tài chính của đơn vị."}]},{"id":"tt133_71","no":71,"code":"Điều 71","title":"Điều 71. Hệ thống báo cáo tài chính","shortTitle":"Hệ thống báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Hệ thống báo cáo tài chính năm áp dụng cho các doanh nghiệp nhỏ và vừa đáp ứng giả định hoạt động liên tục bao gồm:"},{"k":"p","t":"a) Báo cáo bắt buộc:"},{"k":"p","t":"- Báo cáo tình hình tài chính"},{"k":"p","t":"Mẫu số B01a - DNN"},{"k":"p","t":"- Báo cáo kết quả hoạt động kinh doanh"},{"k":"p","t":"Mẫu số B02 - DNN"},{"k":"p","t":"- Bản thuyết minh Báo cáo tài chính"},{"k":"p","t":"Mẫu số B09 - DNN"},{"k":"p","t":"Tùy theo đặc điểm hoạt động và yêu cầu quản lý, doanh nghiệp có thể lựa chọn lập Báo cáo tình hình tài chính theo Mẫu số B01b - DNN thay cho Mẫu số B01a - DNN."},{"k":"p","t":"Báo cáo tài chính gửi cho cơ quan thuế phải lập và gửi thêm Bảng cân đối tài khoản (Mẫu số F01 - DNN)."},{"k":"p","t":"b) Báo cáo không bắt buộc mà khuyến khích lập:"},{"k":"p","t":"- Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"Mẫu số B03 - DNN"},{"k":"p","t":"2. Hệ thống báo cáo tài chính năm áp dụng cho các doanh nghiệp nhỏ và vừa không đáp ứng giả định hoạt động liên tục bao gồm:"},{"k":"p","t":"a) Báo cáo bắt buộc:"},{"k":"p","t":"- Báo cáo tình hình tài chính"},{"k":"p","t":"Mẫu số B01 - DNNKLT"},{"k":"p","t":"- Báo cáo kết quả hoạt động kinh doanh"},{"k":"p","t":"Mẫu số B02 - DNN"},{"k":"p","t":"- Bản thuyết minh Báo cáo tài chính"},{"k":"p","t":"Mẫu số B09 - DNNKLT"},{"k":"p","t":"b) Báo cáo không bắt buộc mà khuyến khích lập:"},{"k":"p","t":"- Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"Mẫu số B03 - DNN"},{"k":"p","t":"3. Hệ thống báo cáo tài chính năm bắt buộc áp dụng cho các doanh nghiệp siêu nhỏ bao gồm:"},{"k":"p","t":"- Báo cáo tình hình tài chính"},{"k":"p","t":"Mẫu số B01 - DNSN"},{"k":"p","t":"- Báo cáo kết quả hoạt động kinh doanh"},{"k":"p","t":"Mẫu số B02 - DNSN"},{"k":"p","t":"- Bản thuyết minh Báo cáo tài chính"},{"k":"p","t":"Mẫu số B09 - DNSN"},{"k":"p","t":"Khi lập báo cáo tài chính, các doanh nghiệp phải tuân thủ biểu mẫu báo cáo tài chính theo quy định. Trong quá trình áp dụng, nếu thấy cần thiết, các doanh nghiệp có thể sửa đổi, bổ sung báo cáo tài chính cho phù hợp với từng lĩnh vực hoạt động và yêu cầu quản lý của doanh nghiệp nhưng phải được Bộ Tài chính chấp thuận bằng văn bản trước khi thực hiện."},{"k":"p","t":"Ngoài ra, doanh nghiệp có thể lập thêm các báo cáo khác để phục vụ yêu cầu quản lý, chỉ đạo, điều hành hoạt động sản xuất, kinh doanh của đơn vị."},{"k":"p","t":"4. Nội dung, phương pháp lập và trình bày các chỉ tiêu trong từng báo cáo được áp dụng thống nhất cho các doanh nghiệp nhỏ và vừa."}]},{"id":"tt133_72","no":72,"code":"Điều 72","title":"Điều 72. Yêu cầu đối với thông tin trình bày trong Báo cáo tài chính","shortTitle":"Yêu cầu đối với thông tin trình bày trong Báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tin trình bày trên báo cáo tài chính phải đầy đủ, khách quan, không có sai sót để phản ánh trung thực, hợp lý tình hình tài chính, tình hình và kết quả kinh doanh của doanh nghiệp."},{"k":"p","t":"- Thông tin được coi là đầy đủ khi bao gồm tất cả các thông tin cần thiết để giúp người sử dụng báo cáo tài chính hiểu được bản chất, hình thức và rủi ro của các giao dịch và sự kiện. Đối với một số khoản mục, việc trình bày đầy đủ còn phải mô tả thêm các thông tin về chất lượng, các yếu tố và tình huống có thể ảnh hưởng tới chất lượng và bản chất của khoản mục."},{"k":"p","t":"- Trình bày khách quan là không thiên vị khi lựa chọn hoặc mô tả các thông tin tài chính. Trình bày khách quan phải đảm bảo tính trung lập, không chú trọng, nhấn mạnh hoặc giảm nhẹ cũng như có các thao tác khác làm thay đổi mức độ ảnh hưởng của thông tin tài chính là có lợi hoặc không có lợi cho người sử dụng Báo cáo tài chính."},{"k":"p","t":"- Không sai sót có nghĩa là không có sự bỏ sót trong việc mô tả hiện tượng và không có sai sót trong quá trình cung cấp các thông tin báo cáo được lựa chọn và áp dụng. Không sai sót không có nghĩa là hoàn toàn chính xác trong tất cả các khía cạnh, ví dụ, việc ước tính các loại giá cả và giá trị không quan sát được khó xác định là chính xác hay không chính xác. Việc trình bày một ước tính được coi là trung thực nếu giá trị ước tính được mô tả rõ ràng, bản chất và các hạn chế của quá trình ước tính được giải thích và không có sai sót trong việc lựa chọn số liệu phù hợp trong quá trình ước tính."},{"k":"p","t":"2. Thông tin tài chính phải thích hợp để giúp người sử dụng Báo cáo tài chính dự đoán, phân tích và đưa ra các quyết định kinh tế."},{"k":"p","t":"3. Thông tin tài chính phải được trình bày đầy đủ trên mọi khía cạnh trọng yếu. Thông tin được coi là trọng yếu trong trường hợp nếu thiếu thông tin hoặc thông tin thiếu chính xác có thể làm ảnh hưởng tới quyết định của người sử dụng thông tin tài chính của đơn vị báo cáo. Tính trọng yếu dựa vào bản chất và độ lớn, hoặc cả hai, của các khoản mục có liên quan được trình bày trên báo cáo tài chính của một đơn vị cụ thể."},{"k":"p","t":"4. Thông tin tài chính phải đảm bảo có thể kiểm chứng, kịp thời và dễ hiểu."},{"k":"p","t":"5. Thông tin tài chính phải được trình bày nhất quán và có thể so sánh giữa các kỳ kế toán; So sánh được giữa các doanh nghiệp nhỏ và vừa với nhau."},{"k":"p","t":"6. Các chỉ tiêu không có số liệu được miễn trình bày trên Báo cáo tài chính. Doanh nghiệp được chủ động đánh lại số thứ tự của các chỉ tiêu theo nguyên tắc liên tục trong mỗi phần."}]},{"id":"tt133_73","no":73,"code":"Điều 73","title":"Điều 73. Nguyên tắc lập và trình bày Báo cáo tài chính của doanh nghiệp đáp ứng giả định hoạt động liên tục","shortTitle":"Nguyên tắc lập và trình bày Báo cáo tài chính của doanh nghiệp đáp ứng giả định hoạt động liên tục","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Báo cáo tài chính phải phản ánh đúng bản chất kinh tế của các giao dịch và sự kiện hơn là hình thức pháp lý của các giao dịch và sự kiện đó (tôn trọng bản chất hơn hình thức)."},{"k":"p","t":"2. Tài sản không được ghi nhận cao hơn giá trị có thể thu hồi; Nợ phải trả không được ghi nhận thấp hơn nghĩa vụ phải thanh toán."},{"k":"p","t":"3. Phân loại tài sản và nợ phải trả: Tài sản và nợ phải trả trên Báo cáo tình hình tài chính được trình bày theo tính thanh khoản giảm dần hoặc trình bày thành ngắn hạn và dài hạn. Riêng Báo cáo tình hình tài chính của doanh nghiệp siêu nhỏ được trình bày theo tính thanh khoản giảm dần."},{"k":"p","t":"4. Trường hợp Báo cáo tình hình tài chính trình bày thành ngắn hạn và dài hạn:"},{"k":"p","t":"Trên Báo cáo tình hình tài chính, các khoản mục Tài sản và Nợ phải trả phải được trình bày riêng biệt thành ngắn hạn và dài hạn, tùy theo thời hạn của chu kỳ kinh doanh thông thường của doanh nghiệp, cụ thể như sau:"},{"k":"p","t":"a) Đối với doanh nghiệp có chu kỳ kinh doanh thông thường trong vòng 12 tháng, thì Tài sản và Nợ phải trả được phân thành ngắn hạn và dài hạn theo nguyên tắc sau:"},{"k":"p","t":"- Tài sản và Nợ phải trả được thu hồi hay thanh toán trong vòng không quá 12 tháng tới kể từ thời điểm báo cáo được xếp vào loại ngắn hạn;"},{"k":"p","t":"- Tài sản và Nợ phải trả được thu hồi hay thanh toán từ 12 tháng trở lên kể từ thời điểm báo cáo được xếp vào loại dài hạn."},{"k":"p","t":"b) Đối với doanh nghiệp có chu kỳ kinh doanh thông thường dài hơn 12 tháng thì Tài sản và Nợ phải trả được phân thành ngắn hạn và dài hạn theo điều kiện sau:"},{"k":"p","t":"- Tài sản và Nợ phải trả được thu hồi hay thanh toán trong vòng một chu kỳ kinh doanh bình thường được xếp vào loại ngắn hạn;"},{"k":"p","t":"- Tài sản và Nợ phải trả được thu hồi hay thanh toán trong thời gian dài hơn một chu kỳ kinh doanh thông thường được xếp vào loại dài hạn."},{"k":"p","t":"Trường hợp này, doanh nghiệp phải thuyết minh rõ đặc điểm xác định chu kỳ kinh doanh thông thường, thời gian bình quân của chu kỳ kinh doanh thông thường, các bằng chứng về chu kỳ sản xuất, kinh doanh của doanh nghiệp cũng như của ngành, lĩnh vực mà doanh nghiệp hoạt động."},{"k":"p","t":"c) Đối với các doanh nghiệp do tính chất hoạt động không thể dựa vào chu kỳ kinh doanh để phân biệt giữa ngắn hạn và dài hạn, thì các Tài sản và Nợ phải trả được trình bày như điểm a mục này."},{"k":"p","t":"5. Tài sản và nợ phải trả phải được trình bày riêng biệt. Chỉ thực hiện bù trừ khi tài sản và nợ phải trả liên quan đến cùng một đối tượng, phát sinh từ các giao dịch và sự kiện cùng loại."},{"k":"p","t":"6. Các khoản mục doanh thu, thu nhập, chi phí phải được trình bày theo nguyên tắc phù hợp và đảm bảo nguyên tắc thận trọng. Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ phản ánh các khoản mục doanh thu, thu nhập, chi phí và luồng tiền của kỳ báo cáo. Các khoản doanh thu, thu nhập, chi phí của các kỳ trước có sai sót làm ảnh hưởng trọng yếu đến kết quả kinh doanh và lưu chuyển tiền phải được điều chỉnh hồi tố bằng cách báo cáo lại trên cột thông tin so sánh, không điều chỉnh vào kỳ báo cáo. Riêng doanh nghiệp siêu nhỏ được điều chỉnh sai sót của các kỳ trước vào kỳ phát hiện sai sót."}]},{"id":"tt133_74","no":74,"code":"Điều 74","title":"Điều 74. Nguyên tắc lập và trình bày báo cáo tài chính của doanh nghiệp không đáp ứng giả định hoạt động liên tục","shortTitle":"Nguyên tắc lập và trình bày báo cáo tài chính của doanh nghiệp không đáp ứng giả định hoạt động liên tục","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Khi lập và trình bày Báo cáo tài chính, doanh nghiệp phải xem xét giả định về sự hoạt động liên tục. Doanh nghiệp bị coi là không hoạt động liên tục nếu hết thời hạn hoạt động mà không có hồ sơ xin gia hạn hoạt động, bị giải thể, phá sản, chấm dứt hoạt động (phải có văn bản cụ thể gửi cơ quan có thẩm quyền) trong vòng không quá 12 tháng kể từ thời điểm lập Báo cáo tài chính. Đối với doanh nghiệp có chu kỳ sản xuất, kinh doanh thông thường hơn 12 tháng thì không quá một chu kỳ sản xuất kinh doanh thông thường."},{"k":"p","t":"2. Trong một số trường hợp sau doanh nghiệp vẫn được coi là hoạt động liên tục:"},{"k":"p","t":"- Việc thay đổi hình thức sở hữu doanh nghiệp, thay đổi loại hình doanh nghiệp, ví dụ chuyển một công ty TNHH thành công ty cổ phần hoặc ngược lại;"},{"k":"p","t":"- Việc chuyển một đơn vị có tư cách pháp nhân hạch toán độc lập thành một đơn vị không có tư cách pháp nhân hạch toán phụ thuộc hoặc ngược lại (ví dụ chuyển một công ty con thành một chi nhánh hoặc ngược lại) vẫn được coi là hoạt động liên tục."},{"k":"p","t":"3. Khi không đáp ứng giả định hoạt động liên tục, doanh nghiệp vẫn phải trình bày đủ các Báo cáo tài chính và ghi rõ là:"},{"k":"p","t":"- Báo cáo tình hình tài chính áp dụng cho doanh nghiệp không đáp ứng giả định hoạt động liên tục và được trình bày theo Mẫu B01 - DNNKLT;"},{"k":"p","t":"- Báo cáo kết quả hoạt động kinh doanh, Báo cáo lưu chuyển tiền tệ được trình bày theo mẫu B02 - DNN và B03 - DNN đáp ứng giả định hoạt động liên tục;"},{"k":"p","t":"- Thuyết minh Báo cáo tài chính áp dụng cho doanh nghiệp không đáp ứng giả định hoạt động liên tục và được trình bày theo Mẫu B09 - DNNKLT."},{"k":"p","t":"4. Trường hợp giả định về sự hoạt động liên tục không còn phù hợp tại thời điểm báo cáo, doanh nghiệp không phải phân loại tài sản và nợ phải trả thành ngắn hạn và dài hạn mà trình bày theo tính thanh khoản giảm dần."},{"k":"p","t":"5. Trường hợp giả định về sự hoạt động liên tục không còn phù hợp tại thời điểm báo cáo, doanh nghiệp phải đánh giá lại toàn bộ tài sản và nợ phải trả trừ trường hợp có một bên thứ ba kế thừa quyền đối với tài sản hoặc nghĩa vụ đối với nợ phải trả theo giá trị sổ sách. Doanh nghiệp phải ghi nhận vào sổ kế toán theo giá đánh giá lại trước khi lập Báo cáo tình hình tài chính."},{"k":"p","t":"5.1. Doanh nghiệp không phải đánh giá lại tài sản, nợ phải trả nếu bên thứ ba kế thừa quyền đối với tài sản hoặc nghĩa vụ đối với nợ phải trả trong một số trường hợp cụ thể như sau:"},{"k":"p","t":"a) Trường hợp một đơn vị sáp nhập vào đơn vị khác, nếu đơn vị nhận sáp nhập cam kết kế thừa mọi quyền và nghĩa vụ của đơn vị bị sáp nhập theo giá trị sổ sách;"},{"k":"p","t":"b) Trường hợp một đơn vị chia thành các đơn vị khác, nếu đơn vị sau khi chia cam kết kế thừa mọi quyền và nghĩa vụ của đơn vị bị chia theo giá trị sổ sách;"},{"k":"p","t":"c) Từng khoản mục tài sản cụ thể được một bên khác cam kết, bảo lãnh thu hồi cho đơn vị bị giải thể theo giá trị sổ sách và việc thu hồi diễn ra trước thời điểm đơn vị chính thức ngừng hoạt động;"},{"k":"p","t":"d) Từng khoản mục nợ phải trả cụ thể được một bên thứ ba cam kết, bảo lãnh thanh toán cho đơn vị bị giải thể và đơn vị bị giải thể chỉ có nghĩa vụ thanh toán lại cho bên thứ ba đó theo giá trị sổ sách;"},{"k":"p","t":"5.2. Việc đánh giá lại được thực hiện đối với từng loại tài sản và nợ phải trả theo nguyên tắc:"},{"k":"p","t":"(a) Đối với tài sản:"},{"k":"p","t":"- Hàng tồn kho được đánh giá theo giá thấp hơn giữa giá gốc và giá trị thuần có thể thực hiện được tại thời điểm báo cáo;"},{"k":"p","t":"- TSCĐ hữu hình, TSCĐ vô hình, bất động sản đầu tư được đánh giá theo giá thấp hơn giữa giá trị còn lại và giá trị có thể thu hồi tại thời điểm báo cáo (là giá thanh lý trừ các chi phí thanh lý ước tính). Đối với TSCĐ thuê tài chính nếu có điều khoản bắt buộc phải mua lại thì đánh giá lại tương tự như TSCĐ của doanh nghiệp, nếu được trả lại cho bên cho thuê thì đánh giá lại theo số nợ thuê tài chính còn phải trả cho bên cho thuê;"},{"k":"p","t":"- Chi phí xây dựng cơ bản dở dang được đánh giá theo giá thấp hơn giữa giá trị ghi sổ và giá trị có thể thu hồi tại thời điểm báo cáo (là giá thanh lý trừ chi phí thanh lý ước tính);"},{"k":"p","t":"- Chứng khoán kinh doanh được đánh giá theo giá trị hợp lý. Giá trị hợp lý của chứng khoán niêm yết hoặc chứng khoán trên sàn UPCOM được xác định là giá đóng cửa của phiên giao dịch tại ngày báo cáo (hoặc phiên trước liền kề nếu thị trường không giao dịch vào ngày báo cáo);"},{"k":"p","t":"- Các khoản đầu tư, góp vốn vào đơn vị khác được ghi nhận theo giá thấp hơn giữa giá trị ghi sổ và giá trị có thể thu hồi tại thời điểm báo cáo (giá có thể bán trừ chi phí bán ước tính);"},{"k":"p","t":"- Các khoản đầu tư nắm giữ đến ngày đáo hạn, các khoản phải thu được đánh giá theo số thực tế có thể thu hồi."},{"k":"p","t":"b) Đối với nợ phải trả: Trường hợp có sự thỏa thuận giữa các bên bằng văn bản về số phải trả thì đánh giá lại theo số thỏa thuận. Trường hợp không có thỏa thuận cụ thể thực hiện như sau:"},{"k":"p","t":"- Nợ phải trả bằng tiền được đánh giá lại theo giá cao hơn giữa giá trị ghi sổ khoản nợ phải trả và giá trị khoản nợ trả trước thời hạn theo quy định của hợp đồng;"},{"k":"p","t":"- Nợ phải trả bằng tài sản tài chính được đánh giá lại theo giá cao hơn giữa giá trị ghi sổ của khoản nợ phải trả và giá trị hợp lý của tài sản tài chính đó tại thời điểm báo cáo;"},{"k":"p","t":"- Nợ phải trả bằng hàng tồn kho được đánh giá lại theo giá cao hơn giữa giá trị ghi sổ khoản nợ phải trả và giá mua (cộng các chi phí liên quan trực tiếp) hoặc giá thành sản xuất hàng tồn kho tại thời điểm báo cáo;"},{"k":"p","t":"- Nợ phải trả bằng TSCĐ được đánh giá lại theo giá cao hơn giữa giá trị ghi sổ nợ phải trả và giá mua (cộng các chi phí liên quan trực tiếp) hoặc giá trị còn lại của TSCĐ tại thời điểm báo cáo."},{"k":"p","t":"c) Các khoản mục tiền tệ có gốc ngoại tệ được đánh giá lại theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch tại thời điểm báo cáo như doanh nghiệp đáp ứng giả định hoạt động liên tục."},{"k":"p","t":"6. Phương pháp kế toán một số khoản mục tài sản khi doanh nghiệp không đáp ứng giả định hoạt động liên tục:"},{"k":"p","t":"a) Việc trích lập dự phòng hoặc đánh giá tổn thất tài sản được ghi giảm trực tiếp vào giá trị ghi sổ của tài sản, không thực hiện trích lập dự phòng trên TK 229 - “Dự phòng tổn thất tài sản”;"},{"k":"p","t":"b) Việc tính khấu hao hoặc ghi nhận tổn thất của TSCĐ, Bất động sản đầu tư được ghi giảm trực tiếp vào giá trị ghi sổ của tài sản, không sử dụng TK 214 để phản ánh hao mòn lũy kế."},{"k":"p","t":"7. Khi giả định hoạt động liên tục không còn phù hợp, doanh nghiệp phải xử lý một số vấn đề tài chính sau:"},{"k":"p","t":"- Thực hiện trích trước vào chi phí để xác định kết quả kinh doanh đối với các khoản lỗ dự kiến phát sinh trong tương lai nếu khả năng phát sinh khoản lỗ là tương đối chắc chắn và giá trị khoản lỗ được ước tính một cách đáng tin cậy; Ghi nhận nghĩa vụ hiện tại đối với các khoản phải trả kể cả trong trường hợp chưa có đầy đủ hồ sơ tài liệu (như biên bản nghiệm thu khối lượng của nhà thầu..) nhưng chắc chắn phải thanh toán;"},{"k":"p","t":"- Đối với khoản chênh lệch tỷ giá hối đoái đang phản ánh lũy kế trên Báo cáo tình hình tài chính (như chênh lệch tỷ giá phát sinh từ việc chuyển đổi báo cáo tài chính sang Đồng Việt Nam), doanh nghiệp kết chuyển toàn bộ vào doanh thu hoạt động tài chính (nếu lãi) hoặc chi phí tài chính (nếu lỗ);"},{"k":"p","t":"- Các khoản chi phí trả trước chưa phân bổ hết như lợi thế thương mại phát sinh từ hợp nhất kinh doanh không dẫn đến quan hệ công ty mẹ - công ty con, công cụ dụng cụ xuất dùng, chi phí thành lập doanh nghiệp, chi phí trong giai đoạn triển khai… được ghi giảm toàn bộ để tính vào chi phí trong kỳ. Riêng chi phí trả trước liên quan đến việc thuê tài sản, trả trước lãi vay được tính toán và phân bổ để phù hợp với thời gian trả trước thực tế còn lại cho đến khi chính thức dừng hoạt động;"},{"k":"p","t":"- Các khoản chênh lệch lãi, lỗ khi đánh giá lại tài sản và nợ phải trả sau khi bù trừ với số dự phòng đã trích lập (nếu có) được ghi nhận vào doanh thu hoạt động tài chính, thu nhập khác hoặc chi phí tài chính, chi phí khác tùy từng khoản mục cụ thể tương tự như việc ghi nhận của doanh nghiệp đáp ứng giả định hoạt động liên tục."},{"k":"p","t":"8. Trường hợp giả định về sự hoạt động liên tục không còn phù hợp tại thời điểm báo cáo, doanh nghiệp phải thuyết minh chi tiết về khả năng tạo tiền và thanh toán nợ phải trả, vốn chủ sở hữu cho các cổ đông và giải thích lý do về sự không so sánh được giữa thông tin của kỳ báo cáo và thông tin kỳ so sánh, cụ thể:"},{"k":"p","t":"- Số tiền có khả năng thu hồi từ việc thanh lý, nhượng bán tài sản, thu hồi nợ phải thu;"},{"k":"p","t":"- Khả năng thanh toán nợ phải trả theo thứ tự ưu tiên, như khả năng trả nợ ngân sách Nhà nước, trả nợ người lao động, trả nợ vay, nợ nhà cung cấp;"},{"k":"p","t":"- Khả năng thanh toán cho chủ sở hữu, đối với công ty cổ phần cần công bố rõ khả năng mỗi cổ phiếu sẽ nhận được bao nhiêu tiền;"},{"k":"p","t":"- Thời gian tiến hành thanh toán các khoản nợ phải trả và vốn chủ sở hữu."},{"k":"p","t":"- Lý do không so sánh được thông tin kỳ báo cáo và kỳ so sánh: Do kỳ trước doanh nghiệp trình bày Báo cáo tài chính dựa trên nguyên tắc doanh nghiệp đáp ứng giả định hoạt động liên tục. Do doanh nghiệp chuẩn bị giải thể, phá sản, chấm dứt hoạt động theo quyết định của cơ quan có thẩm quyền (ghi rõ tên cơ quan, số quyết định) hoặc do Ban giám đốc có dự định theo văn bản (số, ngày, tháng, năm) nên Báo cáo tài chính trong kỳ báo cáo được trình bày theo nguyên tắc kế toán khác (không đáp ứng giả định hoạt động liên tục)."}]},{"id":"tt133_75","no":75,"code":"Điều 75","title":"Điều 75. Nguyên tắc lập và trình bày báo cáo tài chính khi thay đổi kỳ kế toán","shortTitle":"Nguyên tắc lập và trình bày báo cáo tài chính khi thay đổi kỳ kế toán","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"Khi thay đổi kỳ kế toán, ví dụ đổi kỳ kế toán từ năm dương lịch sang kỳ kế toán khác năm dương lịch, doanh nghiệp phải tiến hành khóa sổ kế toán, lập Báo cáo tài chính theo nguyên tắc sau:"},{"k":"p","t":"1. Việc thay đổi kỳ kế toán phải tuân thủ theo quy định của Luật Kế toán. Khi thay đổi kỳ kế toán năm, kế toán phải lập riêng Báo cáo tài chính cho giai đoạn giữa 2 kỳ kế toán của năm tài chính cũ và năm tài chính mới."},{"k":"p","t":"Ví dụ: Doanh nghiệp có kỳ kế toán năm 2014 theo năm dương lịch. Năm 2015, doanh nghiệp chuyển sang áp dụng kỳ kế toán năm bắt đầu từ 1/4 năm trước đến 31/3 năm sau thì doanh nghiệp phải lập báo cáo tài chính cho giai đoạn từ 1/1/2015 đến 31/3/2015."},{"k":"p","t":"2. Đối với Báo cáo tình hình tài chính: Toàn bộ số dư tài sản, nợ phải trả và vốn chủ sở hữu của kỳ kế toán trước khi chuyển đổi được ghi nhận là số dư đầu kỳ của kỳ kế toán mới và được trình bày trong cột “Số đầu năm”."},{"k":"p","t":"3. Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Số liệu kể từ thời điểm thay đổi kỳ kế toán đến cuối kỳ báo cáo đầu tiên được trình bày trong cột “Kỳ này”, cột “kỳ trước” trình bày số liệu của 12 tháng trước tương đương với kỳ kế toán năm hiện tại."},{"k":"p","t":"Ví dụ: Tiếp theo ví dụ trên, khi trình bày cột “Kỳ trước” trong báo cáo kết quả hoạt động kinh doanh bắt đầu từ ngày 1/4/2015 và kết thúc ngày 31/3/2016, doanh nghiệp phải trình bày số liệu của giai đoạn từ 1/4/2014 đến 31/3/2015."}]},{"id":"tt133_76","no":76,"code":"Điều 76","title":"Điều 76. Nguyên tắc lập và trình bày Báo cáo tài chính khi chuyển đổi loại hình hoặc hình thức sở hữu doanh nghiệp","shortTitle":"Nguyên tắc lập và trình bày Báo cáo tài chính khi chuyển đổi loại hình hoặc hình thức sở hữu doanh nghiệp","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"Khi chuyển đổi hình thức sở hữu, chuyển đổi loại hình doanh nghiệp phải tiến hành khóa sổ kế toán, lập Báo cáo tài chính theo quy định của pháp luật. Trong kỳ kế toán đầu tiên sau khi chuyển đổi, doanh nghiệp phải ghi sổ kế toán và trình bày báo cáo tài chính theo nguyên tắc sau:"},{"k":"p","t":"1. Đối với sổ kế toán phản ánh tài sản, nợ phải trả và vốn chủ sở hữu: Toàn bộ số dư tài sản, nợ phải trả và vốn chủ sở hữu trên sổ kế toán của doanh nghiệp cũ được ghi nhận là số dư đầu kỳ trên sổ kế toán của doanh nghiệp mới."},{"k":"p","t":"2. Đối với Báo cáo tình hình tài chính: Toàn bộ số dư tài sản, nợ phải trả và vốn chủ sở hữu kế thừa của doanh nghiệp cũ trước khi chuyển đổi được ghi nhận là số dư đầu kỳ của doanh nghiệp mới và được trình bày trong cột “Số đầu năm”."},{"k":"p","t":"3. Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Số liệu kể từ thời điểm chuyển đổi đến cuối kỳ báo cáo đầu tiên được trình bày trong cột “Kỳ này”, cột “Kỳ trước” trình bày số liệu cột “Kỳ này” của Báo cáo kỳ trước liền kề. Doanh nghiệp phải trình bày trên thuyết minh báo cáo tài chính về lý do dẫn đến số liệu ở cột “kỳ trước” không có khả năng so sánh được với số liệu ở cột “kỳ này” (nếu có)."}]},{"id":"tt133_77","no":77,"code":"Điều 77","title":"Điều 77. Nguyên tắc lập và trình bày Báo cáo tài chính khi chia, tách, hợp nhất, sáp nhập doanh nghiệp","shortTitle":"Nguyên tắc lập và trình bày Báo cáo tài chính khi chia, tách, hợp nhất, sáp nhập doanh nghiệp","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đơn vị kế toán bị chia, bị tách, hợp nhất thành đơn vị kế toán mới phải thực hiện các công việc kế toán theo quy định của Luật kế toán. Đơn vị kế toán mới thực hiện công việc kế toán cho kỳ kế toán đầu tiên theo nguyên tắc sau:"},{"k":"p","t":"- Đối với sổ kế toán phản ánh tài sản, nợ phải trả và vốn chủ sở hữu: Toàn bộ tài sản, nợ phải trả và vốn chủ sở hữu của đơn vị kế toán bị chia, bị tách, hợp nhất chuyển sang được ghi nhận là số phát sinh của đơn vị kế toán mới."},{"k":"p","t":"- Đối với Báo cáo tình hình tài chính: Cột “Số đầu năm” của đơn vị kế toán mới không có số liệu và phải trình bày rõ vấn đề này trong thuyết minh báo cáo tài chính."},{"k":"p","t":"- Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Chỉ trình bày số liệu kể từ thời điểm bị chia, bị tách, hợp nhất đến cuối kỳ báo cáo vào cột “Kỳ này”. Cột “Kỳ trước” không có số liệu và phải trình bày rõ vấn đề này trong thuyết minh báo cáo tài chính."},{"k":"p","t":"2. Khi sáp nhập đơn vị kế toán thì đơn vị kế toán nhận sáp nhập phải thực hiện các công việc kế toán theo quy định của Luật kế toán. Đơn vị kế toán nhận sáp nhập thực hiện công việc kế toán theo nguyên tắc:"},{"k":"p","t":"- Đối với sổ kế toán phản ánh tài sản, nợ phải trả và vốn chủ sở hữu: Toàn bộ tài sản, nợ phải trả và vốn chủ sở hữu trên sổ kế toán của đơn vị kế toán bị sáp nhập được ghi nhận là số phát sinh trong kỳ của đơn vị nhận sáp nhập. Số dư đầu kỳ của đơn vị kế toán nhận sáp nhập vẫn giữ nguyên."},{"k":"p","t":"- Đối với Báo cáo tình hình tài chính: Toàn bộ tài sản, nợ phải trả và vốn chủ sở hữu của đơn vị kế toán bị sáp nhập chuyển sang được tổng hợp và trình bày trong cột “Số cuối năm” của đơn vị kế toán nhận sáp nhập. Cột “Số đầu năm” của đơn vị kế toán nhận sáp nhập vẫn giữ nguyên."},{"k":"p","t":"- Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Toàn bộ số liệu trên báo cáo kết quả hoạt động kinh doanh và báo cáo lưu chuyển tiền tệ của đơn vị bị sáp nhập được tổng hợp trong cột “Kỳ này” của đơn vị nhận sáp nhập và phải thuyết minh trong Bản thuyết minh báo cáo tài chính."}]},{"id":"tt133_78","no":78,"code":"Điều 78","title":"Điều 78. Đồng tiền sử dụng để lập báo cáo tài chính khi công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam","shortTitle":"Đồng tiền sử dụng để lập báo cáo tài chính khi công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Báo cáo tài chính được sử dụng để công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam phải được trình bày bằng Đồng Việt Nam. Trường hợp doanh nghiệp lập Báo cáo tài chính bằng đồng ngoại tệ thì phải chuyển đổi Báo cáo tài chính ra Đồng Việt Nam và khi công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam thì báo cáo tài chính bằng Đồng Việt Nam phải được đính kèm báo cáo tài chính bằng đồng ngoại tệ. Báo cáo tài chính dùng để xác định nghĩa vụ thuế của doanh nghiệp được thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Phương pháp chuyển đổi Báo cáo tài chính lập bằng ngoại tệ sang Đồng Việt Nam để công bố thông tin ra công chúng và nộp các cơ quan quản lý Nhà nước:"},{"k":"p","t":"a) Khi chuyển đổi Báo cáo tài chính được lập bằng đồng ngoại tệ ra Đồng Việt Nam, kế toán phải quy đổi các chỉ tiêu của Báo cáo tài chính theo nguyên tắc sau:"},{"k":"p","t":"- Tài sản và nợ phải trả được quy đổi ra Đồng Việt Nam theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch;"},{"k":"p","t":"- Vốn chủ sở hữu (vốn góp của chủ sở hữu, thặng dư vốn cổ phần, vốn khác) được quy đổi ra Đồng Việt Nam theo tỷ giá giao dịch thực tế tại ngày góp vốn;"},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối, các quỹ trích từ lợi nhuận sau thuế chưa phân phối được quy đổi ra Đồng Việt Nam bằng cách tính toán theo các khoản mục của Báo cáo kết quả hoạt động kinh doanh;"},{"k":"p","t":"- Lợi nhuận, cổ tức đã trả được quy đổi ra Đồng Việt Nam theo tỷ giá giao dịch thực tế tại ngày phải trả lợi nhuận, cổ tức;"},{"k":"p","t":"- Các khoản mục thuộc Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ được quy đổi ra Đồng Việt Nam theo tỷ giá giao dịch thực tế tại thời điểm phát sinh giao dịch hoặc tỷ giá chuyển khoản trung bình năm (trường hợp nếu tỷ giá trung bình xấp xỉ với tỷ giá giao dịch thực tế)."},{"k":"p","t":"b) Phương pháp kế toán chênh lệch tỷ giá do chuyển đổi Báo cáo tài chính sang Đồng Việt Nam."},{"k":"p","t":"Chênh lệch tỷ giá phát sinh khi chuyển đổi Báo cáo tài chính sang Đồng Việt Nam được ghi nhận trên chỉ tiêu “Chênh lệch tỷ giá hối đoái” - Thuộc phần vốn chủ sở hữu của Báo cáo tình hình tài chính."}]},{"id":"tt133_79","no":79,"code":"Điều 79","title":"Điều 79. Nguyên tắc lập Báo cáo tài chính khi thay đổi đơn vị tiền tệ trong kế toán","shortTitle":"Nguyên tắc lập Báo cáo tài chính khi thay đổi đơn vị tiền tệ trong kế toán","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Khi thay đổi đơn vị tiền tệ kế toán, tại kỳ đầu tiên kể từ khi thay đổi, kế toán thực hiện chuyển đổi số dư sổ kế toán sang đơn vị tiền tệ kế toán mới theo tỷ giá chuyển khoản trung bình của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch tại thời điểm thay đổi đơn vị tiền tệ kế toán."},{"k":"p","t":"2. Khi trình bày thông tin so sánh (cột kỳ trước) trên báo cáo kết quả hoạt động kinh doanh và báo cáo lưu chuyển tiền tệ của kỳ có sự thay đổi đơn vị tiền tệ trong kế toán, đơn vị áp dụng tỷ giá chuyển khoản trung bình kỳ trước liền kề với kỳ thay đổi."},{"k":"p","t":"3. Khi thay đổi đơn vị tiền tệ kế toán, doanh nghiệp phải trình bày rõ trên Bản thuyết minh báo cáo tài chính lý do thay đổi đơn vị tiền tệ kế toán và những ảnh hưởng (nếu có) đối với báo cáo tài chính do việc thay đổi đơn vị tiền tệ kế toán."}]},{"id":"tt133_80","no":80,"code":"Điều 80","title":"Điều 80. Trách nhiệm, thời hạn lập và gửi báo cáo tài chính","shortTitle":"Trách nhiệm, thời hạn lập và gửi báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm, thời hạn lập và gửi báo cáo tài chính:"},{"k":"p","t":"a) Tất cả các doanh nghiệp nhỏ và vừa phải lập và gửi báo cáo tài chính năm chậm nhất là 90 ngày kể từ ngày kết thúc năm tài chính cho các cơ quan có liên quan theo quy định."},{"k":"p","t":"b) Ngoài việc lập báo cáo tài chính năm, các doanh nghiệp có thể lập báo cáo tài chính hàng tháng, quý để phục vụ yêu cầu quản lý và điều hành hoạt động sản xuất, kinh doanh của doanh nghiệp."},{"k":"p","t":"2. Nơi nhận báo cáo tài chính năm được quy định như sau:"},{"k":"p","t":"Các doanh nghiệp nộp báo cáo tài chính năm cho cơ quan thuế, cơ quan đăng ký kinh doanh và cơ quan Thống kê."},{"k":"p","t":"Các doanh nghiệp (kể cả các doanh nghiệp trong nước và doanh nghiệp có vốn đầu tư nước ngoài) có trụ sở nằm trong khu chế xuất, khu công nghiệp, khu công nghệ cao thì ngoài việc nộp Báo cáo tài chính năm cho các cơ quan theo quy định (Cơ quan thuế, cơ quan đăng ký kinh doanh, cơ quan thống kê) còn phải nộp Báo cáo tài chính năm cho Ban quản lý khu chế xuất, khu công nghiệp, khu công nghệ cao nếu được yêu cầu."},{"k":"p","t":"MỤC 2. NỘI DUNG VÀ PHƯƠNG PHÁP LẬP BÁO CÁO TÀI CHÍNH CỦA DOANH NGHIỆP NHỎ VÀ VỪA"}]},{"id":"tt133_81","no":81,"code":"Điều 81","title":"Điều 81. Hướng dẫn lập và trình bày Báo cáo tài chính","shortTitle":"Hướng dẫn lập và trình bày Báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Những thông tin chung về doanh nghiệp"},{"k":"p","t":"Trong Báo cáo tài chính năm, doanh nghiệp phải trình bày các thông tin chung sau:"},{"k":"p","t":"- Tên và địa chỉ của doanh nghiệp;"},{"k":"p","t":"- Ngày kết thúc kỳ kế toán;"},{"k":"p","t":"- Ngày lập báo cáo tài chính;"},{"k":"p","t":"- Đơn vị tiền tệ dùng để ghi sổ kế toán;"},{"k":"p","t":"- Đơn vị tiền tệ dùng để lập và trình bày báo cáo tài chính."},{"k":"p","t":"2. Lập và trình bày Báo cáo tình hình tài chính"},{"k":"p","t":"2.1. Cơ sở lập Báo cáo tình hình tài chính"},{"k":"p","t":"- Căn cứ vào sổ kế toán tổng hợp;"},{"k":"p","t":"- Căn cứ vào sổ, thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết;"},{"k":"p","t":"- Căn cứ vào Báo cáo tình hình tài chính năm trước (để trình bày cột đầu năm)."},{"k":"p","t":"2.2. Nội dung và phương pháp lập các chỉ tiêu trong Báo cáo tình hình tài chính của doanh nghiệp"},{"k":"p","t":"2.2.1. Đối với doanh nghiệp đáp ứng giả định hoạt động liên tục (xem mẫu B01a - DNN)"},{"k":"p","t":"a) Tài sản"},{"k":"p","t":"- Tiền và các khoản tương đương tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ tiền mặt tại quỹ, tiền gửi ngân hàng không kỳ hạn và các khoản tương đương tiền hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 111, 112, số dư Nợ chi tiết của TK 1281 (chi tiết các khoản tiền gửi có kỳ hạn gốc không quá 3 tháng) và TK 1288 (chi tiết các khoản đủ tiêu chuẩn phân loại là tương đương tiền)."},{"k":"p","t":"Ngoài ra, trong quá trình lập báo cáo, nếu nhận thấy các khoản mục được phản ánh ở các tài khoản khác thỏa mãn định nghĩa tương tương tiền thì kế toán được phép trình bày trong chỉ tiêu này. Các khoản tương đương tiền có thể bao gồm: Kỳ phiếu ngân hàng, tín phiếu kho bạc,…"},{"k":"p","t":"Các khoản trước đây được phân loại là tương đương tiền nhưng quá hạn chưa thu hồi được phải chuyển sang trình bày tại các chỉ tiêu khác, phù hợp với nội dung của từng khoản mục."},{"k":"p","t":"Khi phân tích các chỉ tiêu tài chính, ngoài các khoản tương đương tiền trình bày trong chỉ tiêu này, kế toán có thể coi tương đương tiền bao gồm cả các khoản có thời hạn thu hồi còn lại dưới 3 tháng kể từ ngày báo cáo (nhưng có kỳ hạn gốc trên 3 tháng) có khả năng chuyển đổi dễ dàng thành một lượng tiền xác định và không có rủi ro trong việc chuyển đổi thành tiền."},{"k":"p","t":"- Đầu tư tài chính (Mã số 120)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị của các khoản đầu tư tài chính (sau khi đã trừ đi dự phòng tổn thất đầu tư tài chính) của doanh nghiệp tại thời điểm báo cáo, bao gồm: Chứng khoán kinh doanh, các khoản đầu tư nắm giữ đến ngày đáo hạn và các khoản đầu tư góp vốn vào đơn vị khác."},{"k":"p","t":"Các khoản đầu tư tài chính được phản ánh trong chỉ tiêu này không bao gồm các khoản đầu tư đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110) và các khoản phải thu về cho vay đã được trình bày trong chỉ tiêu “Phải thu khác” (Mã số 134)."},{"k":"p","t":"Mã số 120 = Mã số 121 + Mã số 122 + Mã số 123 + Mã số 124."},{"k":"p","t":"+ Chứng khoán kinh doanh (Mã số 121)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản chứng khoán và các công cụ tài chính khác nắm giữ vì mục đích kinh doanh tại thời điểm báo cáo (nắm giữ với mục đích chờ tăng giá để bán ra kiếm lời). Chỉ tiêu này có thể bao gồm cả các công cụ tài chính không được chứng khoán hóa, ví dụ như thương phiếu, hợp đồng kỳ hạn, hợp đồng hoán đổi… nắm giữ vì mục đích kinh doanh."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 121."},{"k":"p","t":"+ Đầu tư nắm giữ đến ngày đáo hạn (Mã số 122)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản đầu tư nắm giữ đến ngày đáo hạn tại thời điểm báo cáo, như tiền gửi có kỳ hạn, trái phiếu, thương phiếu và các loại chứng khoán nợ khác. Chỉ tiêu này không bao gồm các khoản đầu tư nắm giữ đến ngày đáo hạn đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110), và các khoản phải thu về cho vay đã được trình bày trong chỉ tiêu “Phải thu khác” (Mã số 134)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của các TK 1281, 1288."},{"k":"p","t":"+ Đầu tư góp vốn vào đơn vị khác (Mã số 123)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản đầu tư vào công ty liên doanh, liên kết và các khoản đầu tư khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 228."},{"k":"p","t":"+ Dự phòng tổn thất đầu tư tài chính (Mã số 124)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng giảm giá chứng khoán kinh doanh và dự phòng tổn thất đầu tư vào đơn vị khác tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của các TK 2291, 2292 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Các khoản phải thu (Mã số 130)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu tại thời điểm báo cáo, như: Phải thu của khách hàng, trả trước cho người bán, vốn kinh doanh ở đơn vị trực thuộc, phải thu khác, tài sản thiếu chờ xử lý sau khi đã trừ đi dự phòng phải thu khó đòi."},{"k":"p","t":"Mã số 130 = Mã số 131 + Mã số 132 + Mã số 133 + Mã số 134 + Mã số 135 + Mã số 136."},{"k":"p","t":"+ Phải thu của khách hàng (Mã số 131)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải thu của khách hàng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 131 mở theo từng khách hàng."},{"k":"p","t":"+ Trả trước cho người bán (Mã số 132)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền đã trả trước cho người bán để mua tài sản, dịch vụ nhưng chưa nhận được tài sản, dịch vụ tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 331 mở theo từng người bán."},{"k":"p","t":"+ Vốn kinh doanh ở đơn vị trực thuộc (Mã số 133)"},{"k":"p","t":"Chỉ tiêu này chỉ ghi trên Báo cáo tình hình tài chính của đơn vị cấp trên phản ánh số vốn kinh doanh đã giao cho các đơn vị hạch toán phụ thuộc. Khi lập Báo cáo tình hình tài chính tổng hợp của toàn doanh nghiệp, chỉ tiêu này được bù trừ với chỉ tiêu “Phải trả nội bộ về vốn kinh doanh” (Mã số 317) hoặc chỉ tiêu \"Vốn góp của chủ sở hữu\" (Mã số 411) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc, chi tiết phần vốn nhận của đơn vị cấp trên."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ của TK 1361."},{"k":"p","t":"+ Phải thu khác (Mã số 134)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải thu khác tại thời điểm báo cáo, như: Phải thu nội bộ khác ngoài phải thu về vốn kinh doanh; phải thu về cho vay, phải thu về các khoản đã chi hộ; phải thu về tiền lãi, cổ tức được chia, các khoản tạm ứng; các khoản cầm cố, ký cược, ký quỹ, cho mượn tạm thời,… mà doanh nghiệp được quyền thu hồi."},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp với đơn vị cấp dưới hạch toán phụ thuộc, khoản phải thu nội bộ khác trong chỉ tiêu này được bù trừ với khoản phải trả nội bộ khác trong chỉ tiêu “Phải trả khác” (Mã số 315) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của các TK 1288 (phải thu về cho vay), 1368, 1386, 1388, 334, 338, 141."},{"k":"p","t":"+ Tài sản thiếu chờ xử lý (Mã số 135)"},{"k":"p","t":"Chỉ tiêu này phản ánh các tài sản thiếu hụt, mất mát chưa rõ nguyên nhân đang chờ xử lý tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ TK 1381."},{"k":"p","t":"+ Dự phòng phải thu khó đòi (Mã số 136)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản phải thu khó đòi tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2293 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Hàng tồn kho (Mã số 140)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị hiện có các loại hàng tồn kho dự trữ cho quá trình sản xuất, kinh doanh của doanh nghiệp (sau khi trừ đi dự phòng giảm giá hàng tồn kho) tại thời điểm báo cáo."},{"k":"p","t":"Mã số 140 = Mã số 141 + Mã số 142."},{"k":"p","t":"+ Hàng tồn kho (Mã số 141)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị của hàng tồn kho thuộc quyền sở hữu của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 151, 152, 153, 154, 155, 156, 157."},{"k":"p","t":"+ Dự phòng giảm giá hàng tồn kho (Mã số 142)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng giảm giá của các loại hàng tồn kho tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2294 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tài sản cố định (Mã số 150)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại của các loại tài sản cố định tại thời điểm báo cáo."},{"k":"p","t":"Mã số 150 = Mã số 151 + Mã số 152."},{"k":"p","t":"+ Nguyên giá (Mã số 151)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ nguyên giá các loại tài sản cố định tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 211."},{"k":"p","t":"+ Giá trị hao mòn lũy kế (Mã số 152)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị đã hao mòn của các loại tài sản cố định lũy kế tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của các TK 2141, 2142, 2143 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Bất động sản đầu tư (Mã số 160)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại của các loại bất động sản đầu tư tại thời điểm báo cáo."},{"k":"p","t":"Mã số 160 = Mã số 161 + Mã số 162."},{"k":"p","t":"+ Nguyên giá (Mã số 161)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ nguyên giá của các loại bất động sản đầu tư tại thời điểm báo cáo sau khi đã trừ số tổn thất do suy giảm giá trị của bất động sản đầu tư nắm giữ chờ tăng giá."},{"k":"p","t":"Số liệu để phản ánh vào chỉ tiêu này là số dư Nợ của TK 217."},{"k":"p","t":"+ Giá trị hao mòn lũy kế (Mã số 162)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị hao mòn lũy kế của bất động sản đầu tư dùng để cho thuê tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2147 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Xây dựng cơ bản dở dang (Mã số 170)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ trị giá tài sản cố định đang mua sắm, chi phí đầu tư xây dựng cơ bản, chi phí sửa chữa lớn tài sản cố định dở dang hoặc đã hoàn thành chưa bàn giao hoặc chưa đưa vào sử dụng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 241."},{"k":"p","t":"- Tài sản khác (Mã số 180)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các tài sản khác tại thời điểm báo cáo, như: Thuế GTGT còn được khấu trừ và tài sản khác tại thời điểm báo cáo."},{"k":"p","t":"Mã số 180 = Mã số 181 + Mã số 182."},{"k":"p","t":"+ Thuế giá trị gia tăng được khấu trừ (Mã số 181)"},{"k":"p","t":"Chỉ tiêu này phản ánh số thuế GTGT còn được khấu trừ và số thuế GTGT còn được hoàn lại tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu “Thuế giá trị gia tăng được khấu trừ” căn cứ vào số dư Nợ của TK 133."},{"k":"p","t":"+ Tài sản khác (Mã số 182)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị các tài sản khác tại thời điểm báo cáo, như: Chi phí trả trước, thuế và các khoản khác nộp thừa cho Nhà nước."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ chi tiết các TK 242, 333."},{"k":"p","t":"- Tổng cộng tài sản (Mã số 200)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng trị giá tài sản hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 200 = Mã số 110 + Mã số 120 + Mã số 130 + Mã số 140 + Mã số 150 + Mã số 160 + Mã số 170 + Mã số 180."},{"k":"p","t":"b) Nợ phải trả (Mã số 300)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ số nợ phải trả tại thời điểm báo cáo."},{"k":"p","t":"Mã số 300 = Mã số 311 + Mã số 312 + Mã số 313 + Mã số 314 + Mã số 315 + Mã số 316 + Mã số 317 + Mã số 318 + Mã số 319 + Mã số 320"},{"k":"p","t":"+ Phải trả người bán (Mã số 311)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải trả cho người bán tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 331 mở cho từng người bán."},{"k":"p","t":"+ Người mua trả tiền trước (Mã số 312)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền người mua ứng trước để mua sản phẩm, hàng hóa, dịch vụ, tài sản cố định, bất động sản đầu tư và doanh nghiệp có nghĩa vụ cung cấp tại thời điểm báo cáo (không bao gồm các khoản doanh thu nhận trước)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 131 mở cho từng khách hàng."},{"k":"p","t":"+ Thuế và các khoản phải nộp Nhà nước (Mã số 313)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản doanh nghiệp còn phải nộp cho Nhà nước tại thời điểm báo cáo, bao gồm cả các khoản thuế, phí, lệ phí và các khoản phải nộp khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 333."},{"k":"p","t":"+ Phải trả người lao động (Mã số 314)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản doanh nghiệp còn phải trả cho người lao động tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 334."},{"k":"p","t":"+ Phải trả khác (Mã số 315)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải trả khác tại thời điểm báo cáo, như: Chi phí phải trả, phải trả nội bộ khác ngoài khoản phải trả về vốn kinh doanh, giá trị tài sản phát hiện thừa chưa rõ nguyên nhân, các khoản phải nộp cho cơ quan BHXH, KPCĐ, các khoản nhận ký cược, ký quỹ, doanh thu chưa thực hiện…"},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp với đơn vị cấp dưới hạch toán phụ thuộc, khoản phải trả nội bộ khác trong chỉ tiêu này được bù trừ với khoản phải thu nội bộ khác trong chỉ tiêu “Phải thu khác” (Mã số 134) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của các TK 335, 3368, 338, 1388."},{"k":"p","t":"+ Vay và nợ thuê tài chính (Mã số 316)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị các khoản doanh nghiệp đi vay, còn nợ các ngân hàng, tổ chức, công ty tài chính và các đối tượng khác kể cả khoản vay dưới hình thức phát hành trái phiếu, cổ phiếu ưu đãi được phân loại là nợ phải trả tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 341, 4111 (cổ phiếu ưu đãi được phân loại là nợ phải trả)."},{"k":"p","t":"+ Phải trả nội bộ về vốn kinh doanh (Mã số 317)"},{"k":"p","t":"Tùy thuộc vào đặc điểm hoạt động và mô hình quản lý của từng đơn vị, doanh nghiệp thực hiện phân cấp và quy định cho đơn vị hạch toán phụ thuộc ghi nhận khoản vốn do doanh nghiệp cấp vào chỉ tiêu này hoặc chỉ tiêu “Vốn góp của chủ sở hữu” (Mã số 411)."},{"k":"p","t":"Chỉ tiêu này chỉ trình bày trên Báo cáo tình hình tài chính đơn vị cấp dưới không có tư cách pháp nhân hạch toán phụ thuộc, phản ánh các khoản đơn vị cấp dưới phải trả cho đơn vị cấp trên về vốn kinh doanh."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 3361. Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp toàn doanh nghiệp, chỉ tiêu này được bù trừ với chỉ tiêu “Vốn kinh doanh ở đơn vị trực thuộc” (Mã số 133) trên Báo cáo tình hình tài chính của đơn vị cấp trên."},{"k":"p","t":"+ Dự phòng phải trả (Mã số 318)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản dự kiến phải trả tại thời điểm báo cáo, như dự phòng bảo hành sản phẩm, hàng hóa, công trình xây dựng, các khoản chi phí trích trước để sửa chữa TSCĐ định kỳ, chi phí hoàn nguyên môi trường trích trước… Các khoản dự phòng phải trả thường được ước tính, chưa chắc chắn về thời gian phải trả, giá trị phải trả và doanh nghiệp chưa nhận được hàng hóa, dịch vụ từ nhà cung cấp."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có của TK 352."},{"k":"p","t":"+ Quỹ khen thưởng, phúc lợi (Mã số 319)"},{"k":"p","t":"Chỉ tiêu này phản ánh Quỹ khen thưởng, Quỹ phúc lợi, Quỹ thưởng ban quản lý điều hành chưa sử dụng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 353."},{"k":"p","t":"+ Quỹ phát triển khoa học và công nghệ (Mã số 320)"},{"k":"p","t":"Chỉ tiêu này phản ánh số Quỹ phát triển khoa học và công nghệ chưa sử dụng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 356."},{"k":"p","t":"c) Vốn chủ sở hữu (Mã số 400)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh các khoản vốn kinh doanh thuộc sở hữu của cổ đông, thành viên góp vốn, như: Vốn góp của chủ sở hữu, thặng dư vốn cổ phần, vốn khác của chủ chủ sở hữu, lợi nhuận sau thuế chưa phân phối, cổ phiếu quỹ, chênh lệch tỷ giá hối đoái."},{"k":"p","t":"Mã số 400 = Mã số 411 + Mã số 412 + Mã số 413 + Mã số 414 + Mã số 415 + Mã số 416 + Mã số 417"},{"k":"p","t":"- Vốn góp của chủ sở hữu (Mã số 411)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số vốn đã thực góp của các chủ sở hữu vào doanh nghiệp (đối với công ty cổ phần phản ánh vốn góp của các cổ đông theo mệnh giá cổ phiếu) tại thời điểm báo cáo."},{"k":"p","t":"Tại đơn vị hạch toán phụ thuộc, chỉ tiêu này có thể phản ánh số vốn được cấp nếu doanh nghiệp quy định đơn vị hạch toán phụ thuộc ghi nhận vốn kinh doanh được cấp vào TK 411."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 4111."},{"k":"p","t":"- Thặng dư vốn cổ phần (Mã số 412)"},{"k":"p","t":"Chỉ tiêu này phản ánh thặng dư vốn cổ phần ở thời điểm báo cáo của công ty cổ phần."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 4112. Nếu TK 4112 có số dư Nợ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Vốn khác của chủ sở hữu (Mã số 413)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản vốn khác của chủ sở hữu tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có TK 4118."},{"k":"p","t":"- Cổ phiếu quỹ (Mã số 414)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị cổ phiếu quỹ hiện có ở thời điểm báo cáo của công ty cổ phần."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 419 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái (Mã số 415)"},{"k":"p","t":"Trường hợp đơn vị sử dụng đồng tiền khác Đồng Việt Nam làm đơn vị tiền tệ trong kế toán, chỉ tiêu này phản ánh khoản chênh lệch tỷ giá hối đoái do chuyển đổi Báo cáo tài chính sang Đồng Việt Nam."},{"k":"p","t":"- Các quỹ thuộc vốn chủ sở hữu (Mã số 416)"},{"k":"p","t":"Chỉ tiêu này phản ánh các quỹ thuộc vốn chủ sở hữu chưa sử dụng tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này là số dư Có TK 418."},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối (Mã số 417)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi (hoặc lỗ) sau thuế chưa phân phối tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 421. Trường hợp TK 421 có số dư Nợ thì số liệu chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tổng cộng nguồn vốn (Mã số 500)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng số các nguồn vốn hình thành tài sản của doanh nghiệp tại thời điểm báo cáo. Mã số 500 = Mã số 300 + Mã số 400."},{"k":"p","t":"Chỉ tiêu “Tổng cộng Tài sản Mã số 200”"},{"k":"p","t":"="},{"k":"p","t":"Chỉ tiêu “Tổng cộng Nguồn vốn Mã số 500”"},{"k":"p","t":"2.2.2. Đối với doanh nghiệp đáp ứng giả định hoạt động liên tục (Xem mẫu B01b - DNN)"},{"k":"p","t":"a) Tài sản ngắn hạn (Mã số 100)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị tiền và các khoản tương đương tiền, các khoản đầu tư tài chính ngắn hạn, các khoản phải thu ngắn hạn, hàng tồn kho và tài sản ngắn hạn khác có thể bán hay sử dụng trong vòng không quá 12 tháng hoặc một chu kỳ kinh doanh thông thường của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 100 = Mã số 110 + Mã số 120 + Mã số 130 + Mã số 140 + Mã số 150."},{"k":"p","t":"- Tiền và các khoản tương đương tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ tiền mặt tại quỹ, tiền gửi ngân hàng không kỳ hạn và các khoản tương đương tiền hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 111, 112, số dư Nợ chi tiết của TK 1281 (chi tiết các khoản tiền gửi có kỳ hạn gốc không quá 3 tháng) và TK 1288 (chi tiết các khoản đủ tiêu chuẩn phân loại là tương đương tiền)."},{"k":"p","t":"Ngoài ra, trong quá trình lập báo cáo, nếu nhận thấy các khoản mục được phản ánh ở các tài khoản khác thỏa mãn định nghĩa tương tương tiền thì kế toán được phép trình bày trong chỉ tiêu này. Các khoản tương đương tiền có thể bao gồm: Kỳ phiếu ngân hàng, tín phiếu kho bạc, …"},{"k":"p","t":"Các khoản trước đây được phân loại là tương đương tiền nhưng quá hạn chưa thu hồi được phải chuyển sang trình bày tại các chỉ tiêu khác, phù hợp với nội dung của từng khoản mục."},{"k":"p","t":"Khi phân tích các chỉ tiêu tài chính, ngoài các khoản tương đương tiền trình bày trong chỉ tiêu này, kế toán có thể coi tương đương tiền bao gồm cả các khoản có thời hạn thu hồi còn lại dưới 3 tháng kể từ ngày báo cáo (nhưng có kỳ hạn gốc trên 3 tháng) có khả năng chuyển đổi dễ dàng thành một lượng tiền xác định và không có rủi ro trong việc chuyển đổi thành tiền."},{"k":"p","t":"- Đầu tư tài chính ngắn hạn (Mã số 120)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị của các khoản đầu tư tài chính ngắn hạn (sau khi đã trừ đi dự phòng giảm giá chứng khoán kinh doanh), bao gồm: Chứng khoán kinh doanh, các khoản đầu tư nắm giữ đến ngày đáo hạn có kỳ hạn còn lại không quá 12 tháng kể từ thời điểm báo cáo."},{"k":"p","t":"Các khoản đầu tư tài chính ngắn hạn được phản ánh trong chỉ tiêu này không bao gồm các khoản đầu tư ngắn hạn đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110), các khoản phải thu về cho vay được trình bày trong chỉ tiêu “Phải thu ngắn hạn khác” (Mã số 133)."},{"k":"p","t":"Mã số 120 = Mã số 121 + Mã số 122 + Mã số 123."},{"k":"p","t":"+ Chứng khoán kinh doanh (Mã số 121)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản chứng khoán và các công cụ tài chính khác nắm giữ vì mục đích kinh doanh tại thời điểm báo cáo (nắm giữ với mục đích chờ tăng giá để bán ra kiếm lời). Chỉ tiêu này có thể bao gồm cả các công cụ tài chính không được chứng khoán hóa, ví dụ như thương phiếu, hợp đồng kỳ hạn, hợp đồng hoán đổi… nắm giữ vì mục đích kinh doanh."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 121."},{"k":"p","t":"+ Dự phòng giảm giá chứng khoán kinh doanh (Mã số 122)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng giảm giá của các khoản chứng khoán kinh doanh tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2291 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"+ Đầu tư nắm giữ đến ngày đáo hạn ngắn hạn (Mã số 123)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản đầu tư nắm giữ đến ngày đáo hạn có kỳ hạn còn lại không quá 12 tháng hoặc trong một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, như tiền gửi có kỳ hạn, trái phiếu, thương phiếu và các loại chứng khoán nợ khác. Chỉ tiêu này không bao gồm các khoản đầu tư nắm giữ đến ngày đáo hạn đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110), các khoản phải thu về cho vay được trình bày trong chỉ tiêu “Phải thu ngắn hạn khác” (Mã số 133)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của TK 1281, 1288."},{"k":"p","t":"- Các khoản phải thu ngắn hạn (Mã số 130)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu ngắn hạn có kỳ hạn thu hồi còn lại không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo, như: Phải thu ngắn hạn của khách hàng, trả trước cho người bán ngắn hạn, phải thu ngắn hạn khác, tài sản thiếu chờ xử lý (sau khi đã trừ đi dự phòng phải thu ngắn hạn khó đòi)."},{"k":"p","t":"Mã số 130 = Mã số 131 + Mã số 132 + Mã số 133 + Mã số 134 + Mã số 135"},{"k":"p","t":"+ Phải thu ngắn hạn của khách hàng (Mã số 131)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải thu của khách hàng có kỳ hạn thu hồi còn lại không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 131 mở theo từng khách hàng."},{"k":"p","t":"+ Trả trước cho người bán ngắn hạn (Mã số 132)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền đã trả trước cho người bán để mua tài sản, dịch vụ và doanh nghiệp sẽ nhận được tài sản, dịch vụ trong thời hạn không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 331 mở theo từng người bán."},{"k":"p","t":"+ Phải thu ngắn hạn khác (Mã số 133)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải thu khác có kỳ hạn thu hồi còn lại không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo, như: Phải thu về cho vay ngắn hạn; phải thu nội bộ ngắn hạn khác ngoài khoản phải thu về vốn kinh doanh ở đơn vị trực thuộc đã được phản ánh ở chỉ tiêu “Vốn kinh doanh ở đơn vị trực thuộc” (Mã số 213); các khoản đã chi hộ; phải thu về tiền lãi, cổ tức được chia; các khoản tạm ứng; các khoản cầm cố, ký cược, ký quỹ, cho mượn tạm thời,… mà doanh nghiệp được quyền thu hồi."},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp với đơn vị cấp dưới hạch toán phụ thuộc, khoản phải thu nội bộ ngắn hạn khác trong chỉ tiêu này được bù trừ với khoản phải trả nội bộ ngắn hạn khác trong chỉ tiêu “Phải trả ngắn hạn khác” (Mã số 415) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của các TK 1288 (chi tiết cho vay), 1368, 1386, 1388, 334, 338, 141."},{"k":"p","t":"+ Tài sản thiếu chờ xử lý (Mã số 134)"},{"k":"p","t":"Chỉ tiêu này phản ánh các tài sản thiếu hụt, mất mát chưa rõ nguyên nhân đang chờ xử lý tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này là số dư Nợ TK 1381."},{"k":"p","t":"+ Dự phòng phải thu ngắn hạn khó đòi (Mã số 135)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản phải thu ngắn hạn khó đòi tại thời điểm báo cáo. Số liệu để ghi vào chỉ tiêu này là số dư Có chi tiết của TK 2293, chi tiết dự phòng cho các khoản phải thu ngắn hạn khó đòi và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Hàng tồn kho (Mã số 140)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị hiện có các loại hàng tồn kho dự trữ cho quá trình sản xuất, kinh doanh của doanh nghiệp (sau khi trừ đi dự phòng giảm giá hàng tồn kho) đến thời điểm báo cáo."},{"k":"p","t":"Mã số 140 = Mã số 141 + Mã số 142."},{"k":"p","t":"+ Hàng tồn kho (Mã số 141)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị của hàng tồn kho thuộc quyền sở hữu của doanh nghiệp được luân chuyển trong vòng thời hạn không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 151, 152, 153, 154, 155, 156, 157."},{"k":"p","t":"+ Dự phòng giảm giá hàng tồn kho (Mã số 142)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng giảm giá của các loại hàng tồn kho tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2294 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tài sản ngắn hạn khác (Mã số 150)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các tài sản ngắn hạn khác có thời hạn thu hồi hoặc sử dụng không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo, như thuế GTGT còn được khấu trừ và tài sản ngắn hạn khác."},{"k":"p","t":"Mã số 150 = Mã số 151 + Mã số 152."},{"k":"p","t":"+ Thuế giá trị gia tăng được khấu trừ (Mã số 151)"},{"k":"p","t":"Chỉ tiêu này phản ánh số thuế GTGT còn được khấu trừ và số thuế GTGT còn được hoàn lại đến cuối năm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ của TK 133."},{"k":"p","t":"+ Tài sản ngắn hạn khác (Mã số 152)"},{"k":"p","t":"Chỉ tiêu này phản ánh tài sản ngắn hạn khác có thời hạn thu hồi hoặc sử dụng không quá 12 tháng tại thời điểm báo cáo, gồm chi phí trả trước ngắn hạn, thuế và các khoản khác phải thu Nhà nước."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư Nợ chi tiết của các TK 242, 333"},{"k":"p","t":"b) Tài sản dài hạn (Mã số 200)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh trị giá các loại tài sản không được phản ánh trong chỉ tiêu tài sản ngắn hạn. Tài sản dài hạn là các tài sản có thời hạn thu hồi hoặc sử dụng trên 12 tháng tại thời điểm báo cáo, như: Các khoản phải thu dài hạn, tài sản cố định, bất động sản đầu tư, xây dựng cơ bản dở dang, đầu tư tài chính dài hạn và tài sản dài hạn khác."},{"k":"p","t":"Mã số 200 = Mã số 210 + Mã số 220 + Mã số 230 + Mã số 240 + Mã số 250 + Mã số 260."},{"k":"p","t":"- Các khoản phải thu dài hạn (Mã số 210)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu có kỳ hạn thu hồi trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, như: Phải thu dài hạn của khách hàng, trả trước cho người bán dài hạn, vốn kinh doanh ở đơn vị trực thuộc, phải thu dài hạn khác (sau khi trừ đi dự phòng phải thu dài hạn khó đòi)."},{"k":"p","t":"Mã số 210 = Mã số 211 + Mã số 212 + Mã số 213 + Mã số 214 + Mã số 215."},{"k":"p","t":"+ Phải thu dài hạn của khách hàng (Mã số 211)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải thu của khách hàng có kỳ hạn thu hồi trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 131 mở theo từng khách hàng."},{"k":"p","t":"+ Trả trước cho người bán dài hạn (Mã số 212)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền đã trả trước cho người bán để mua tài sản, dịch vụ và doanh nghiệp sẽ nhận được tài sản, dịch vụ trong thời hạn trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 331 mở theo từng người bán."},{"k":"p","t":"+ Vốn kinh doanh ở đơn vị trực thuộc (Mã số 213)"},{"k":"p","t":"Chỉ tiêu này chỉ ghi trên Báo cáo tình hình tài chính của đơn vị cấp trên phản ánh số vốn kinh doanh đã giao cho các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Khi lập Báo cáo tình hình tài chính tổng hợp của toàn doanh nghiệp, chỉ tiêu này được bù trừ với chỉ tiêu “Phải trả nội bộ về vốn kinh doanh” (Mã số 423) hoặc chỉ tiêu \"Vốn góp của chủ sở hữu\" (Mã số 511) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc, chi tiết phần vốn nhận của đơn vị cấp trên."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ của TK 1361."},{"k":"p","t":"+ Phải thu dài hạn khác (Mã số 214)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải thu khác có kỳ hạn thu hồi còn lại trên 12 tháng hoặc hơn một chu kỳ kinh doanh thông thường tại thời điểm báo cáo, như: Phải thu dài hạn về cho vay, phải thu nội bộ dài hạn khác ngoài khoản phải thu nội bộ về vốn kinh doanh đã được phản ánh ở chỉ tiêu “Vốn kinh doanh ở đơn vị trực thuộc” (Mã số 213), phải thu về các khoản đã chi hộ; các khoản tạm ứng, cầm cố, ký cược, ký quỹ, cho mượn…mà doanh nghiệp được quyền thu hồi."},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp với đơn vị cấp dưới hạch toán phụ thuộc, khoản phải thu nội bộ dài hạn trong chỉ tiêu này được bù trừ với khoản phải trả nội bộ dài hạn được trình bày trong chỉ tiêu “Phải trả dài hạn khác” (Mã số 424) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ chi tiết của các TK 1288 (chi tiết cho vay), 1368, 1386, 1388, 334, 338, 141."},{"k":"p","t":"+ Dự phòng phải thu dài hạn khó đòi (Mã số 215)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản phải thu dài hạn khó đòi tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có chi tiết của TK 2293, chi tiết dự phòng cho các khoản phải thu dài hạn khó đòi và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tài sản cố định (Mã số 220)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại (Nguyên giá trừ giá trị hao mòn lũy kế) của các loại tài sản cố định tại thời điểm báo cáo."},{"k":"p","t":"Mã số 220 = Mã số 221 + Mã số 222."},{"k":"p","t":"+ Nguyên giá (Mã số 221)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ nguyên giá các loại tài sản cố định tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 211."},{"k":"p","t":"+ Giá trị hao mòn lũy kế (Mã số 222)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị đã hao mòn của các loại tài sản cố định lũy kế tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của các TK 2141, 2142, 2143 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Bất động sản đầu tư (Mã số 230)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại của các loại bất động sản đầu tư tại thời điểm báo cáo."},{"k":"p","t":"Mã số 230 = Mã số 231 + Mã số 232."},{"k":"p","t":"+ Nguyên giá (Mã số 231)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ nguyên giá của các loại bất động sản đầu tư tại thời điểm báo cáo sau khi đã trừ số tổn thất do suy giảm giá trị của bất động sản đầu tư nắm giữ chờ tăng giá."},{"k":"p","t":"Số liệu để phản ánh vào chỉ tiêu này là số dư Nợ của TK 217."},{"k":"p","t":"+ Giá trị hao mòn lũy kế (Mã số 232)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị hao mòn lũy kế của bất động sản đầu tư dùng để cho thuê tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2147 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Xây dựng cơ bản dở dang (Mã số 240)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ trị giá tài sản cố định đang mua sắm, chi phí đầu tư xây dựng cơ bản, chi phí sửa chữa lớn tài sản cố định dở dang hoặc đã hoàn thành chưa bàn giao hoặc chưa đưa vào sử dụng."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 241."},{"k":"p","t":"- Đầu tư tài chính dài hạn (Mã số 250)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các khoản đầu tư tài chính dài hạn (sau khi trừ đi khoản dự phòng tổn thất đầu tư vào đơn vị khác) tại thời điểm báo cáo, như: Đầu tư góp vốn vào đơn vị khác, đầu tư nắm giữ đến ngày đáo hạn dài hạn có kỳ hạn còn lại trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Mã số 250 = Mã số 251 + Mã số 252 + Mã số 253."},{"k":"p","t":"+ Đầu tư góp vốn vào đơn vị khác (Mã số 251)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản đầu tư vào công ty liên doanh, liên kết và các khoản đầu tư khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của TK 228."},{"k":"p","t":"+ Dự phòng tổn thất đầu tư vào đơn vị khác (Mã số 252)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng tổn thất đầu tư vào đơn vị khác do đơn vị được đầu tư bị lỗ và nhà đầu tư có khả năng mất vốn tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2292 và
