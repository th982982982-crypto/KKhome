g số chênh lệch tỷ giá hối đoái do đánh giá lại số dư cuối kỳ của tiền và các khoản tương đương tiền bằng ngoại tệ (Mã số 110 của Báo cáo tình hình tài chính) tại thời điểm cuối kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112, 128 và các tài khoản liên quan (chi tiết các khoản thỏa mãn định nghĩa là tương đương tiền), sau khi đối chiếu với sổ kế toán chi tiết TK 413 trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số dương nếu có lãi tỷ giá và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…) nếu phát sinh lỗ tỷ giá."},{"k":"p","t":"- Tiền và tương đương tiền cuối kỳ (Mã số 70)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào số liệu chỉ tiêu “Tiền và tương đương tiền” cuối kỳ báo cáo (Mã số 110, cột “Số cuối năm” trên Báo cáo tình hình tài chính)."},{"k":"p","t":"Chỉ tiêu này bằng số “Tổng cộng” của các chỉ tiêu Mã số 50, 60 và 61 và bằng chỉ tiêu Mã số 110 cột “Số cuối năm” trên Báo cáo tình hình tài chính kỳ đó."},{"k":"p","t":"Mã số 70 = Mã số 50 + Mã số 60 + Mã số 61."},{"k":"p","t":"2.5. Phương pháp lập và trình bày Thuyết minh BCTC (Xem Mẫu số B09 - DNN)"},{"k":"p","t":"2.5.1. Mục đích của Bản thuyết minh Báo cáo tài chính"},{"k":"p","t":"a) Bản thuyết minh Báo cáo tài chính là một bộ phận hợp thành không thể tách rời của Báo cáo tài chính doanh nghiệp dùng để mô tả mang tính tường thuật hoặc phân tích chi tiết các thông tin số liệu đã được trình bày trong Báo cáo tình hình tài chính, Báo cáo kết quả hoạt động kinh doanh, Báo cáo lưu chuyển tiền tệ cũng như các thông tin cần thiết khác."},{"k":"p","t":"b) Bản thuyết minh Báo cáo tài chính cũng có thể trình bày những thông tin khác nếu doanh nghiệp xét thấy cần thiết cho việc trình bày trung thực, hợp lý Báo cáo tài chính."},{"k":"p","t":"2.5.2. Nguyên tắc lập và trình bày Bản thuyết minh Báo cáo tài chính"},{"k":"p","t":"a) Khi lập Báo cáo tài chính, doanh nghiệp phải lập Bản thuyết minh Báo cáo tài chính theo hướng dẫn tại Thông tư này."},{"k":"p","t":"b) Bản thuyết minh Báo cáo tài chính của doanh nghiệp phải trình bày những nội dung dưới đây:"},{"k":"p","t":"- Các thông tin về cơ sở lập và trình bày Báo cáo tài chính và các chính sách kế toán cụ thể được chọn và áp dụng đối với các giao dịch và các sự kiện quan trọng;"},{"k":"p","t":"- Cung cấp thông tin bổ sung chưa được trình bày trong các Báo cáo tài chính khác, nhưng lại cần thiết cho việc trình bày trung thực và hợp lý tình hình tài chính, kết quả kinh doanh của doanh nghiệp."},{"k":"p","t":"c) Bản thuyết minh Báo cáo tài chính phải được trình bày một cách có hệ thống. Doanh nghiệp được chủ động sắp xếp số thứ tự trong thuyết minh Báo cáo tài chính theo cách thức phù hợp nhất với đặc thù của mình theo nguyên tắc mỗi khoản mục trong Báo cáo tình hình tài chính, Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ cần được đánh dấu dẫn tới các thông tin liên quan trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"2.5.3. Cơ sở lập Bản thuyết minh Báo cáo tài chính"},{"k":"p","t":"- Căn cứ vào Báo cáo tình hình tài chính, Báo cáo kết quả hoạt động kinh doanh, Báo cáo lưu chuyển tiền tệ kỳ báo cáo;"},{"k":"p","t":"- Căn cứ vào sổ kế toán tổng hợp; Sổ, thẻ kế toán chi tiết hoặc bảng tổng hợp chi tiết có liên quan;"},{"k":"p","t":"- Căn cứ vào Bản thuyết minh Báo cáo tài chính kỳ trước;"},{"k":"p","t":"- Căn cứ vào tình hình thực tế của doanh nghiệp và các tài liệu liên quan."},{"k":"p","t":"2.5.4. Nội dung và phương pháp lập các chỉ tiêu"},{"k":"p","t":"2.5.4.1. Đặc điểm hoạt động của doanh nghiệp"},{"k":"p","t":"Trong phần này doanh nghiệp cần nêu rõ:"},{"k":"p","t":"a) Hình thức sở hữu vốn: Công ty cổ phần, công ty trách nhiệm hữu hạn, công ty hợp danh hay doanh nghiệp tư nhân."},{"k":"p","t":"b) Lĩnh vực kinh doanh: Nêu rõ là sản xuất công nghiệp, kinh doanh thương mại, dịch vụ, xây lắp hoặc tổng hợp nhiều lĩnh vực kinh doanh."},{"k":"p","t":"c) Ngành nghề kinh doanh: Nêu rõ hoạt động kinh doanh chính và đặc điểm sản phẩm sản xuất hoặc dịch vụ cung cấp của doanh nghiệp."},{"k":"p","t":"d) Chu kỳ sản xuất, kinh doanh thông thường: Trường hợp chu kỳ kéo dài hơn 12 tháng thì thuyết minh thêm chu kỳ sản xuất kinh doanh bình quân của ngành, lĩnh vực."},{"k":"p","t":"đ) Đặc điểm hoạt động của doanh nghiệp trong năm tài chính có ảnh hưởng đến Báo cáo tài chính: Nêu rõ những sự kiện về môi trường pháp lý, diễn biến thị trường, đặc điểm hoạt động kinh doanh, quản lý, tài chính, các sự kiện sáp nhập, chia, tách, thay đổi quy mô... có ảnh hưởng đến Báo cáo tài chính của doanh nghiệp."},{"k":"p","t":"2.5.4.2. Kỳ kế toán, đơn vị tiền tệ sử dụng trong kế toán"},{"k":"p","t":"a) Kỳ kế toán năm ghi rõ kỳ kế toán năm theo năm dương lịch bắt đầu từ ngày 01/01/... đến 31/12/... Nếu doanh nghiệp có năm tài chính khác với năm dương lịch thì ghi rõ ngày bắt đầu và ngày kết thúc kỳ kế toán năm."},{"k":"p","t":"b) Đơn vị tiền tệ sử dụng trong kế toán: ghi rõ là Đồng Việt Nam hoặc một đơn vị tiền tệ kế toán được lựa chọn theo quy định của Luật Kế toán."},{"k":"p","t":"2.5.4.3. Chuẩn mực kế toán và Chế độ kế toán áp dụng"},{"k":"p","t":"Tuyên bố về việc tuân thủ Chuẩn mực kế toán và Chế độ kế toán: Nêu rõ Báo cáo tài chính có được lập và trình bày phù hợp và có tuân thủ Chuẩn mực kế toán và Chế độ kế toán doanh nghiệp nhỏ và vừa hay không?"},{"k":"p","t":"2.5.4.4. Các chính sách kế toán áp dụng"},{"k":"p","t":"(1) Tỷ giá hối đoái áp dụng trong kế toán:"},{"k":"p","t":"- Ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch"},{"k":"p","t":"- Cách xác định tỷ giá giao dịch thực tế áp dụng đối với các giao dịch phát sinh trong kỳ và tỷ giá áp dụng khi đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ cuối kỳ."},{"k":"p","t":"(2) Nguyên tắc chuyển đổi báo cáo tài chính được lập bằng ngoại tệ sang Đồng Việt Nam."},{"k":"p","t":"(3) Nguyên tắc ghi nhận các khoản tiền và các khoản tương đương tiền: Nêu rõ các khoản tương đương tiền được xác định trên cơ sở nào."},{"k":"p","t":"(4) Nguyên tắc kế toán các khoản đầu tư tài chính"},{"k":"p","t":"a) Đối với chứng khoán kinh doanh:"},{"k":"p","t":"- Thời điểm ghi nhận (đối với chứng khoán niêm yết thuyết minh rõ là T+0 hay thời điểm khác)"},{"k":"p","t":"- Giá trị ghi sổ được xác định là giá trị hợp lý hoặc giá gốc;"},{"k":"p","t":"- Căn cứ trích lập dự phòng giảm giá chứng khoán kinh doanh."},{"k":"p","t":"b) Đối với các khoản cho vay:"},{"k":"p","t":"- Có đánh giá lại các khoản cho vay thỏa mãn định nghĩa các khoản mục tiền tệ có gốc ngoại tệ không?"},{"k":"p","t":"- Căn cứ lập dự phòng phải thu khó đòi đối với các khoản cho vay."},{"k":"p","t":"c) Đối với các khoản đầu tư vào công ty liên doanh, liên kết (dựa vào tỷ lệ biểu quyết hoặc thỏa thuận khác):"},{"k":"p","t":"- Đối với các công ty liên doanh, liên kết được mua trong kỳ, thời điểm ghi nhận ban đầu là thời điểm nào?"},{"k":"p","t":"- Nguyên tắc xác định công ty liên doanh, liên kết (dựa theo tỷ lệ quyền biểu quyết, tỷ lệ vốn góp hay tỷ lệ lợi ích);"},{"k":"p","t":"- Căn cứ lập dự phòng tổn thất đầu tư vào công ty liên doanh, liên kết; căn cứ để xác định tổn thất;"},{"k":"p","t":"d) Đối với các khoản đầu tư vào công cụ vốn của đơn vị khác:"},{"k":"p","t":"- Giá trị ghi sổ của khoản đầu tư vào đơn vị khác được xác định theo giá gốc hay phương pháp khác?"},{"k":"p","t":"- Căn cứ lập dự phòng tổn thất đầu tư vào đơn vị khác; Báo cáo tài chính để xác định tổn thất."},{"k":"p","t":"đ) Các phương pháp kế toán đối với các giao dịch khác liên quan đến đầu tư tài chính:"},{"k":"p","t":"- Giao dịch hoán đổi cổ phiếu;"},{"k":"p","t":"- Giao dịch đầu tư dưới hình thức góp vốn;"},{"k":"p","t":"- Giao dịch dưới hình thức mua lại phần vốn góp;"},{"k":"p","t":"- Phương pháp kế toán đối với khoản cổ tức được chia bằng cổ phiếu;"},{"k":"p","t":"(4) Nguyên tắc kế toán nợ phải thu"},{"k":"p","t":"- Tiêu chí phân loại các khoản nợ phải thu (phải thu khách hàng, phải thu nội bộ, phải thu khác)?"},{"k":"p","t":"- Có được theo dõi chi tiết theo kỳ hạn gốc, kỳ hạn còn lại tại thời điểm báo cáo, theo nguyên tệ và theo từng đối tượng không?"},{"k":"p","t":"- Có đánh giá lại các khoản nợ phải thu thỏa mãn định nghĩa của các khoản mục tiền tệ có gốc ngoại tệ không?"},{"k":"p","t":"- Phương pháp lập dự phòng phải thu khó đòi."},{"k":"p","t":"(5) Nguyên tắc ghi nhận hàng tồn kho"},{"k":"p","t":"- Nguyên tắc ghi nhận hàng tồn kho: Nêu rõ hàng tồn kho được ghi nhận theo giá gốc hoặc theo giá trị thuần có thể thực hiện được."},{"k":"p","t":"- Phương pháp tính giá trị hàng tồn kho: Nêu rõ áp dụng phương pháp nào (Bình quân gia quyền; nhập trước, xuất trước; giá thực tế đích danh hay phương pháp giá bán lẻ)."},{"k":"p","t":"- Phương pháp hạch toán hàng tồn kho: Nêu rõ áp dụng phương pháp kê khai thường xuyên hay phương pháp kiểm kê định kỳ."},{"k":"p","t":"- Phương pháp lập dự phòng giảm giá hàng tồn kho (Nêu rõ doanh nghiệp lập dự phòng giảm giá hàng tồn kho trên cơ sở chênh lệch lớn hơn của giá gốc và giá trị thuần có thể thực hiện được của hàng tồn kho. Phương pháp lập dự phòng giảm giá hàng tồn kho là lập theo số chênh lệch giữa số dự phòng phải lập năm nay với số dự phòng đã lập năm trước chưa sử dụng hết dẫn đến năm nay phải lập thêm hay hoàn nhập)."},{"k":"p","t":"(6) Nguyên tắc kế toán và khấu hao TSCĐ, TSCĐ thuê tài chính, Bất động sản đầu tư"},{"k":"p","t":"a) Nguyên tắc kế toán TSCĐ hữu hình, TSCĐ vô hình:"},{"k":"p","t":"- Nguyên tắc kế toán các khoản chi phí phát sinh sau ghi nhận ban đầu (chi phí nâng cấp, cải tạo, duy tu, sửa chữa) được ghi nhận vào nguyên giá hay chi phí sản xuất, kinh doanh;"},{"k":"p","t":"- Nêu rõ các phương pháp khấu hao TSCĐ;"},{"k":"p","t":"- Các quy định khác về quản lý, sử dụng, khấu hao TSCĐ có được tuân thủ không?"},{"k":"p","t":"b) Nguyên tắc kế toán TSCĐ thuê tài chính:"},{"k":"p","t":"- Nêu rõ nguyên giá được xác định như thế nào;"},{"k":"p","t":"- Nêu rõ các phương pháp khấu hao TSCĐ thuê tài chính."},{"k":"p","t":"c) Nguyên tắc kế toán Bất động sản đầu tư."},{"k":"p","t":"- Nguyên giá BĐSĐT được ghi nhận theo phương pháp nào?"},{"k":"p","t":"- Nêu rõ các phương pháp khấu hao BĐSĐT."},{"k":"p","t":"(7) Nguyên tắc kế toán nợ phải trả"},{"k":"p","t":"- Phân loại nợ phải trả như thế nào?"},{"k":"p","t":"- Có theo dõi nợ phải trả theo từng đối tượng, kỳ hạn gốc, kỳ hạn còn lại tại thời điểm báo cáo, theo nguyên tệ không?"},{"k":"p","t":"- Có đánh giá lại các khoản nợ phải trả thỏa mãn định nghĩa các khoản mục tiền tệ có gốc ngoại tệ không?"},{"k":"p","t":"- Có lập dự phòng nợ phải trả không?"},{"k":"p","t":"(8) Nguyên tắc ghi nhận và vốn hóa các khoản chi phí đi vay:"},{"k":"p","t":"- Nguyên tắc ghi nhận chi phí đi vay: Nêu rõ chi phí đi vay được ghi nhận vào chi phí tài chính trong kỳ khi phát sinh hay được vốn hóa."},{"k":"p","t":"- Tỷ lệ vốn hóa được sử dụng để xác định chi phí đi vay được vốn hóa trong kỳ: Nêu rõ tỷ lệ vốn hóa này là bao nhiêu?"},{"k":"p","t":"(9) Nguyên tắc ghi nhận vốn chủ sở hữu:"},{"k":"p","t":"- Vốn góp của chủ sở hữu có được ghi nhận theo số vốn thực góp không; Thặng dư vốn cổ phần được ghi nhận như thế nào?"},{"k":"p","t":"- Lợi nhuận chưa phân phối được xác định như thế nào?"},{"k":"p","t":"(10) Nguyên tắc và phương pháp ghi nhận doanh thu, thu nhập khác:"},{"k":"p","t":"- Doanh thu bán hàng và cung cấp dịch vụ: Có tuân thủ đầy đủ các điều kiện ghi nhận doanh thu hay không?"},{"k":"p","t":"- Doanh thu hợp đồng xây dựng"},{"k":"p","t":"- Các nguyên tắc ghi nhận doanh thu hoạt động tài chính."},{"k":"p","t":"- Các nguyên tắc ghi nhận thu nhập khác."},{"k":"p","t":"(11) Nguyên tắc kế toán chi phí:"},{"k":"p","t":"- Giá vốn hàng bán (có đảm bảo nguyên tắc phù hợp với doanh thu không; Có đảm bảo nguyên tắc thận trọng, ghi nhận ngay các chi phí vượt trên mức bình thường của hàng tồn kho không; Các khoản ghi giảm giá vốn hàng bán là gì...)"},{"k":"p","t":"- Chi phí tài chính: Có ghi nhận đầy đủ chi phí lãi vay (kể cả số trích trước) của kỳ báo cáo không?"},{"k":"p","t":"- Chi phí quản lý kinh doanh: Có ghi nhận đầy đủ chi phí bán hàng và chi phí quản lý doanh nghiệp phát sinh trong kỳ không; Các khoản điều chỉnh giảm chi phí bán hàng và chi phí quản lý doanh nghiệp là gì...."},{"k":"p","t":"2.5.5. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được trình bày trong Báo cáo tình hình tài chính để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung các khoản mục tài sản, nợ phải trả và vốn chủ sở hữu."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính” là đơn vị tính được sử dụng trong Báo cáo tình hình tài chính. Số liệu ghi vào cột “Số đầu năm” được lấy từ cột “Số cuối năm” trong Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Số cuối năm” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo tình hình tài chính năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Trường hợp doanh nghiệp có áp dụng hồi tố do thay đổi chính sách kế toán hoặc điều chỉnh hồi tố sai sót trọng yếu của các năm trước thì phải điều chỉnh số liệu so sánh (số liệu ở cột “Số đầu năm”) để đảm bảo nguyên tắc có thể so sánh được và phải giải trình rõ điều này trong thuyết minh báo cáo tài chính. Trường hợp vì lý do nào đó dẫn đến số liệu ở cột “Số đầu năm” không có khả năng so sánh được với số liệu ở cột “Số cuối năm” thì điều này phải được nêu rõ trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"- Đối với các khoản mục yêu cầu thuyết minh theo giá trị hợp lý, trường hợp không xác định được giá trị hợp lý thì phải ghi rõ lý do."},{"k":"p","t":"2.5.6. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được thể hiện trong Báo cáo kết quả hoạt động kinh doanh để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung của các khoản mục doanh thu, chi phí."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh” là đơn vị tính được sử dụng trong Báo cáo kết quả hoạt động kinh doanh. Số liệu ghi vào cột “Năm trước” được lấy từ Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Năm nay” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo kết quả hoạt động kinh doanh năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Doanh nghiệp được chủ động đánh số thứ tự của thông tin chi tiết được trình bày trong phần này theo nguyên tắc phù hợp với số dẫn từ Báo cáo kết quả hoạt động kinh doanh và đảm bảo dễ đối chiếu và có thể so sánh giữa các kỳ."},{"k":"p","t":"- Trường hợp vì lý do nào đó dẫn đến số liệu ở cột “Năm nay” không có khả năng so sánh được với số liệu ở cột “Năm trước” thì điều này phải được nêu rõ trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"2.5.7. Thông tin bổ sung cho Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích các số liệu đã được thể hiện trong Báo cáo lưu chuyển tiền tệ để giúp người sử dụng hiểu rõ hơn về các yếu tố ảnh hưởng đến lưu chuyển tiền trong kỳ của doanh nghiệp."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo lưu chuyển tiền tệ” là đơn vị tính được sử dụng trong Báo cáo lưu chuyển tiền tệ. Số liệu ghi vào cột “Năm trước” được lấy từ Bản thuyết minh Báo cáo tài chính năm trước; Số liệu ghi vào cột “Năm nay” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo lưu chuyển tiền tệ năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"2.5.8. Những thông tin khác"},{"k":"p","t":"Trong phần này, doanh nghiệp phải trình bày những thông tin quan trọng khác (nếu có) ngoài những thông tin đã trình bày trên nhằm cung cấp thêm thông tin khác nếu xét thấy cần thiết giúp cho người sử dụng hiểu Báo cáo tài chính của doanh nghiệp đã được trình bày trung thực, hợp lý."},{"k":"p","t":"MỤC 3. NỘI DUNG VÀ PHƯƠNG PHÁP LẬP BÁO CÁO TÀI CHÍNH CỦA DOANH NGHIỆP SIÊU NHỎ"},{"k":"p","t":"Các doanh nghiệp siêu nhỏ căn cứ vào biểu mẫu báo cáo tài chính năm quy định tại Phụ lục 2 ban hành kèm theo Thông tư này và các nguyên tắc chung để thực hiện việc lập và trình bày báo cáo tài chính tại đơn vị."}]},{"id":"tt133_82","no":82,"code":"Điều 82","title":"Điều 82. Nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ","shortTitle":"Nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung và phương pháp lập các chỉ tiêu của Báo cáo tình hình tài chính (Mẫu số B01 - DNSN)"},{"k":"p","t":"1.1. Tài sản"},{"k":"p","t":"- Tiền và các khoản tương đương tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ tiền mặt tại quỹ, tiền gửi ngân hàng không kỳ hạn và các khoản tương đương tiền hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 111, 112, số dư Nợ chi tiết của TK 1281 (chi tiết các khoản tiền gửi có kỳ hạn gốc không quá 3 tháng) và TK 1288 (chi tiết các khoản đủ tiêu chuẩn phân loại là tương đương tiền)."},{"k":"p","t":"Các khoản tương đương tiền có thể bao gồm: Kỳ phiếu ngân hàng, tín phiếu kho bạc, tiền gửi ngân hàng có kỳ hạn gốc không quá 3 tháng…"},{"k":"p","t":"Các khoản trước đây được phân loại là tương đương tiền nhưng quá hạn chưa thu hồi được phải chuyển sang trình bày tại các chỉ tiêu khác, phù hợp với nội dung của từng khoản mục."},{"k":"p","t":"- Các khoản đầu tư (Mã số 120)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị của các khoản đầu tư tài chính (sau khi đã trừ đi các khoản dự phòng cho các khoản đầu tư tài chính), bao gồm: Chứng khoán kinh doanh, các khoản đầu tư nắm giữ đến ngày đáo hạn và các khoản đầu tư góp vốn vào đơn vị khác."},{"k":"p","t":"Các khoản đầu tư tài chính được phản ánh trong chỉ tiêu này không bao gồm các khoản đầu tư đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110) và các khoản phải thu về cho vay đã được trình bày trong chỉ tiêu “Các khoản phải thu” (Mã số 130)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 121, 228 và TK 128 (sau khi đã trừ đi các khoản đầu tư tài chính đã được phân loại là tương đương tiền và các khoản phải thu về cho vay) trừ đi số dư Có các TK 2291, 2292."},{"k":"p","t":"- Các khoản phải thu (Mã số 130)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu tại thời điểm báo cáo (sau khi trừ đi dự phòng phải thu khó đòi), như: Phải thu của khách hàng, trả trước cho người bán, phải thu nội bộ, phải thu về cho vay, phải thu khác, tài sản thiếu chờ xử lý, tạm ứng, ký cược, ký quỹ, ..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết theo từng đối tượng công nợ của các TK 131, 136, 138, 141, 334, 338, 1288 (chi tiết cho vay), 331 (chi tiết trả trước cho người bán) sau khi trừ đi số dư Có TK 2293."},{"k":"p","t":"- Hàng tồn kho (Mã số 140)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị hiện có các loại hàng tồn kho dự trữ cho quá trình sản xuất, kinh doanh của doanh nghiệp (sau khi trừ đi dự phòng giảm giá hàng tồn kho) tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 151, 152, 153, 154, 155, 156, 157 sau khi trừ đi số dư Có của TK 2294."},{"k":"p","t":"- Giá trị còn lại của TSCĐ và BĐSĐT (Mã số 150)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại (nguyên giá trừ giá trị hao mòn lũy kế) của các loại tài sản cố định và BĐSĐT tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 211, 217 sau khi đã trừ đi giá trị hao mòn lũy kế của các loại TSCĐ và BĐSĐT (số dư Có TK 214)."},{"k":"p","t":"- Tài sản khác (Mã số 160)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các tài sản khác ngoài các tài sản đã được phản ánh tại các Mã số 110, 120, 130, 140, 150 nêu trên như thuế GTGT được khấu trừ, chi phí trả trước, thuế và các khoản phải thu của Nhà nước, chi phí xây dựng cơ bản dở dang, ..."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này là số dư Nợ các TK 133, 241, 242, 333, ..."},{"k":"p","t":"- Tổng cộng tài sản (Mã số 200)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng trị giá tài sản hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 200 = Mã số 110 + Mã số 120 + Mã số 130 + Mã số 140 + Mã số 150 + Mã số 160."},{"k":"p","t":"1.2. Nợ phải trả (Mã số 300)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ số nợ phải trả tại thời điểm báo cáo."},{"k":"p","t":"Mã số 300 = Mã số 310 + Mã số 320 + Mã số 330 + Mã số 340 + Mã số 350 + Mã số 360"},{"k":"p","t":"- Phải trả người bán (Mã số 310)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải trả cho người bán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 331."},{"k":"p","t":"- Người mua trả tiền trước (Mã số 320)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền người mua ứng trước để mua sản phẩm, hàng hóa, dịch vụ, tài sản cố định, bất động sản đầu tư và doanh nghiệp có nghĩa vụ cung cấp tại thời điểm báo cáo (không bao gồm các khoản doanh thu nhận trước). Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 131 mở chi tiết cho từng khách hàng."},{"k":"p","t":"- Thuế và các khoản phải nộp Nhà nước (Mã số 330)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản doanh nghiệp còn phải nộp Nhà nước tại thời điểm báo cáo, bao gồm cả các khoản thuế, phí, lệ phí và các khoản phải nộp khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 333."},{"k":"p","t":"- Phải trả người lao động (Mã số 340)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản doanh nghiệp còn phải trả cho người lao động tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 334."},{"k":"p","t":"- Phải trả nợ vay (Mã số 350)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị các khoản doanh nghiệp đi vay, nợ thuê tài chính còn nợ các ngân hàng, tổ chức, công ty tài chính và các đối tượng khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 341."},{"k":"p","t":"- Phải trả khác (Mã số 360)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản phải trả khác ngoài các khoản nợ phải trả đã được phản ánh tại các Mã số 310, 320, 330, 340, 350 nêu trên như: Chi phí phải trả, phải trả nội bộ, nhận cầm cố, thế chấp, ký quỹ, ký cược, dự phòng phải trả, doanh thu chưa thực hiện, tài sản thừa chờ giải quyết, quỹ khen thưởng phúc lợi, quỹ phát triển khoa học công nghệ, phải trả, phải nộp khác, ..."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này là số dư Có các TK 1388, 335, 336, 338, 352, 353, 356."},{"k":"p","t":"1.3. Vốn chủ sở hữu (Mã số 400)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh các khoản vốn kinh doanh thuộc sở hữu của cổ đông, thành viên góp vốn, như: Vốn đầu tư của chủ sở hữu, các quỹ thuộc vốn chủ sở hữu và lợi nhuận sau thuế chưa phân phối, chênh lệch tỷ giá hối đoái, lợi nhuận sau thuế chưa phân phối…"},{"k":"p","t":"Mã số 400 = Mã số 410 + Mã số 420 + Mã số 430"},{"k":"p","t":"- Vốn đầu tư của chủ sở hữu (Mã số 410)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số vốn đã thực góp của các chủ sở hữu và thặng dư vốn cổ phần, vốn khác (nếu có) của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 411."},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối (Mã số 420)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi (hoặc lỗ) sau thuế chưa phân phối tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 421. Trường hợp TK 421 có số dư Nợ thì số liệu chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Các khoản mục khác thuộc vốn chủ sở hữu (Mã số 430)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản mục khác thuộc vốn chủ sở hữu ngoài các khoản đã được phản ánh tại các Mã số 410, 420 nêu trên. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này là số dư Có TK 418 sau khi trừ đi số dư Nợ TK 419."},{"k":"p","t":"- Tổng cộng nguồn vốn (Mã số 500)"},{"k":"p","t":"Phản ánh tổng số các nguồn vốn hình thành tài sản của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 500 = Mã số 300 + Mã số 400."},{"k":"p","t":"Chỉ tiêu “Tổng cộng Tài sản Mã số 200”"},{"k":"p","t":"="},{"k":"p","t":"Chỉ tiêu “Tổng cộng Nguồn vốn Mã số 500”"},{"k":"p","t":"2. Nội dung và phương pháp lập các chỉ tiêu của Báo cáo kết quả hoạt động kinh doanh (Mẫu số B02 - DNSN)"},{"k":"p","t":"- Doanh thu thuần về bán hàng và cung cấp dịch vụ (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng doanh thu bán hàng và cung cấp dịch vụ sau khi đã trừ đi các khoản giảm trừ doanh thu trong kỳ báo cáo. Chỉ tiêu này không bao gồm các loại thuế gián thu phát sinh khi bán hàng và cung cấp dịch vụ."},{"k":"p","t":"Số liệu của chỉ tiêu này được căn cứ vào số phát sinh bên Nợ TK 511 đối ứng với bên Có TK 911."},{"k":"p","t":"- Giá vốn hàng bán (Mã số 02)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá vốn của hàng hóa, BĐSĐT, giá vốn của thành phẩm đã bán, khối lượng dịch vụ đã cung cấp, các chi phí được tính vào giá vốn sau khi trừ đi các khoản ghi giảm giá vốn hàng bán trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là lũy kế số phát sinh bên Có của TK 632 đối ứng bên Nợ của TK 911."},{"k":"p","t":"- Chi phí quản lý kinh doanh (Mã số 03)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng chi phí quản lý kinh doanh phát sinh trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số phát sinh bên Có của TK 642, đối ứng với bên Nợ của TK 911."},{"k":"p","t":"- Lãi/lỗ hoạt động tài chính và hoạt động khác (Mã số 04)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi hoặc lỗ phát sinh từ hoạt động tài chính và hoạt động khác trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số chênh lệch giữa tổng số phát sinh bên Có TK 515, 711 (sau khi trừ các khoản điều chỉnh giảm doanh thu hoạt động tài chính, thu nhập khác) với tổng số phát sinh bên Nợ TK 635, 811 (sau khi trừ các khoản điều chỉnh giảm chi phí tài chính, chi phí khác)."},{"k":"p","t":"Trường hợp lỗ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Lợi nhuận kế toán trước thuế (Mã số 05)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng lợi nhuận kế toán trước thuế thực hiện trong kỳ báo cáo của doanh nghiệp trước khi trừ đi chi phí thuế TNDN."},{"k":"p","t":"Trường hợp lỗ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 05 = Mã số 01 - Mã số 02 - Mã số 03 + Mã số 04."},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp (Mã số 06)"},{"k":"p","t":"Chỉ tiêu này phản ánh chi phí thuế thu nhập doanh nghiệp phát sinh trong kỳ báo cáo. Số liệu để ghi vào chỉ tiêu này được căn cứ vào tổng số phát sinh bên Có TK 821 đối ứng với bên Nợ TK 911 hoặc căn cứ vào số phát sinh bên Nợ TK 821 đối ứng với bên Có TK 911 trong kỳ báo cáo."},{"k":"p","t":"- Lợi nhuận sau thuế thu nhập doanh nghiệp (Mã số 07)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số lợi nhuận thuần (hoặc lỗ) sau thuế TNDN từ các hoạt động của doanh nghiệp (sau khi trừ chi phí thuế thu nhập doanh nghiệp) phát sinh trong năm báo cáo."},{"k":"p","t":"Trường hợp lỗ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 07 = Mã số 05 - Mã số 06."},{"k":"p","t":"3. Nội dung và phương pháp lập các chỉ tiêu của Bản thuyết minh báo cáo tài chính (Mẫu số B09 - DNSN)"},{"k":"p","t":"3.1. Đặc điểm hoạt động của doanh nghiệp"},{"k":"p","t":"Trong phần này doanh nghiệp cần nêu rõ:"},{"k":"p","t":"a) Hình thức sở hữu vốn: Công ty cổ phần, công ty trách nhiệm hữu hạn, công ty hợp danh hay doanh nghiệp tư nhân."},{"k":"p","t":"b) Lĩnh vực kinh doanh: Nêu rõ là sản xuất công nghiệp, kinh doanh thương mại, dịch vụ, xây lắp hoặc tổng hợp nhiều lĩnh vực kinh doanh."},{"k":"p","t":"c) Ngành nghề kinh doanh: Nêu rõ hoạt động kinh doanh chính và đặc điểm sản phẩm sản xuất hoặc dịch vụ cung cấp của doanh nghiệp."},{"k":"p","t":"3.2. Kỳ kế toán, đơn vị tiền tệ sử dụng trong kế toán"},{"k":"p","t":"a) Kỳ kế toán năm ghi rõ kỳ kế toán năm theo năm dương lịch bắt đầu từ ngày 01/01/... đến 31/12/... Nếu doanh nghiệp có năm tài chính khác với năm dương lịch thì ghi rõ ngày bắt đầu và ngày kết thúc kỳ kế toán năm."},{"k":"p","t":"b) Đơn vị tiền tệ sử dụng trong kế toán: Ghi rõ là Đồng Việt Nam."},{"k":"p","t":"3.3. Chuẩn mực kế toán và Chế độ kế toán áp dụng"},{"k":"p","t":"Tuyên bố về việc tuân thủ Chuẩn mực kế toán và Chế độ kế toán: Nêu rõ Báo cáo tài chính có được lập và trình bày phù hợp và có tuân thủ Chuẩn mực kế toán và Chế độ kế toán doanh nghiệp Việt Nam hay không?"},{"k":"p","t":"3.4. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được trình bày trong Báo cáo tình hình tài chính để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung các khoản mục tài sản, nợ phải trả và vốn chủ sở hữu."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính” là đơn vị tính được sử dụng trong Báo cáo tình hình tài chính. Số liệu ghi vào cột “Đầu năm” được lấy từ cột “Cuối năm” trong Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Cuối năm” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo tình hình tài chính năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Doanh nghiệp được chủ động đánh số thứ tự của thông tin chi tiết được trình bày trong phần này theo nguyên tắc phù hợp với số dẫn từ Báo cáo tình hình tài chính và đảm bảo dễ đối chiếu và có thể so sánh giữa các kỳ."},{"k":"p","t":"3.5. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được thể hiện trong Báo cáo kết quả hoạt động kinh doanh để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung của các khoản mục doanh thu, chi phí."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh” là đơn vị tính được sử dụng trong Báo cáo kết quả hoạt động kinh doanh. Số liệu ghi vào cột “Năm trước” được lấy từ Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Năm nay” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo kết quả hoạt động kinh doanh năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Doanh nghiệp được chủ động đánh số thứ tự của thông tin chi tiết được trình bày trong phần này theo nguyên tắc phù hợp với số dẫn từ Báo cáo kết quả hoạt động kinh doanh và đảm bảo dễ đối chiếu và có thể so sánh giữa các kỳ."},{"k":"p","t":"- Trường hợp vì lý do nào đó dẫn đến số liệu ở cột “Năm trước” không có khả năng so sánh được với số liệu ở cột “Năm sau” thì điều này phải được nêu rõ trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"3.6. Những thông tin khác mà doanh nghiệp cần thuyết minh"},{"k":"p","t":"Trong phần này, doanh nghiệp phải trình bày những thông tin quan trọng khác (nếu có) ngoài những thông tin đã trình bày trên nhằm cung cấp thêm thông tin khác nếu xét thấy cần thiết giúp cho người sử dụng hiểu Báo cáo tài chính của doanh nghiệp đã được trình bày trung thực, hợp lý."},{"k":"p","t":"MỤC 4. NỘI DUNG VÀ PHƯƠNG PHÁP LẬP BẢNG CÂN ĐỐI TÀI KHOẢN"}]},{"id":"tt133_83","no":83,"code":"Điều 83","title":"Điều 83. Nội dung và phương pháp lập Bảng cân đối tài khoản (Mẫu số F01 - DNN)","shortTitle":"Nội dung và phương pháp lập Bảng cân đối tài khoản (Mẫu số F01 - DNN)","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Mục đích: Phản ánh tổng quát tình hình tăng giảm và hiện có về tài sản và nguồn vốn của đơn vị trong kỳ báo cáo và từ đầu năm đến cuối kỳ báo cáo. Số liệu trên Bảng cân đối tài khoản là căn cứ để kiểm tra việc ghi chép trên sổ kế toán tổng hợp, đồng thời đối chiếu và kiểm soát số liệu ghi trên Báo cáo tài chính"},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ:"},{"k":"p","t":"Bảng cân đối tài khoản được lập dựa trên Sổ Cái và Bảng cân đối tài khoản kỳ trước."},{"k":"p","t":"Trước khi lập Bảng cân đối tài khoản phải hoàn thành việc ghi sổ kế toán chi tiết và sổ kế toán tổng hợp; kiểm tra, đối chiếu số liệu giữa các sổ có liên quan."},{"k":"p","t":"Số liệu ghi vào Bảng cân đối tài khoản chia làm 2 loại:"},{"k":"p","t":"- Loại số liệu phản ánh số dư các tài khoản tại thời điểm đầu kỳ (Cột 1,2- Số dư đầu năm), tại thời điểm cuối kỳ (cột 5, 6 Số dư cuối năm), trong đó các tài khoản có số dư Nợ được phản ánh vào cột “Nợ”, các tài khoản có số dư Có được phản ánh vào cột “Có”."},{"k":"p","t":"- Loại số liệu phản ánh số phát sinh của các tài khoản từ đầu kỳ đến ngày cuối kỳ báo cáo (cột 3, 4 Số phát sinh trong tháng) trong đó tổng số phát sinh “Nợ” của các tài khoản được phản ánh vào cột “Nợ”, tổng số phát sinh “Có” được phản ánh vào cột “Có”của từng tài khoản."},{"k":"p","t":"- Cột A, B: Số hiệu tài khoản, tên tài khoản của tất cả các Tài khoản cấp 1 mà đơn vị đang sử dụng và một số Tài khoản cấp 2 cần phân tích."},{"k":"p","t":"- Cột 1, 2- Số dư đầu năm: Phản ánh số dư ngày đầu tháng của tháng đầu năm (Số dư đầu năm báo cáo). Số liệu để ghi vào các cột này được căn cứ vào dòng Số dư đầu tháng của tháng đầu năm trên Sổ Cái hoặc căn cứ vào phần “Số dư cuối năm” của Bảng cân đối tài khoản năm trước."},{"k":"p","t":"- Cột 3, 4: Phản ánh tổng số phát sinh Nợ và tổng số phát sinh Có của các tài khoản trong năm báo cáo. Số liệu ghi vào phần này được căn cứ vào dòng “Cộng phát sinh lũy kế từ đầu năm” của từng tài khoản tương ứng trên Sổ Cái."},{"k":"p","t":"- Cột 5, 6 “Số dư cuối năm”: Phản ánh số dư ngày cuối cùng của năm báo cáo. Số liệu để ghi vào phần này được căn cứ vào số dư cuối tháng của tháng cuối năm báo cáo trên Sổ Cái hoặc được tính căn cứ vào các cột số dư đầu năm (cột 1, 2), số phát sinh trong năm (cột 3, 4) trên Bảng cân đối tài khoản năm này. Số liệu ở cột 5, 6 được dùng để lập Bảng cân đối tài khoản năm sau."},{"k":"p","t":"Sau khi ghi đủ các số liệu có liên quan đến các tài khoản, phải thực hiện tổng cộng Bảng cân đối tài khoản. Số liệu trong Bảng cân đối tài khoản phải đảm bảo tính cân đối bắt buộc sau đây:"},{"k":"p","t":"Tổng số dư Nợ (cột 1), Tổng số dư Có (cột 2), Tổng số phát sinh Nợ (cột 3), Tổng số phát sinh Có (cột 4), Tổng số dư Nợ (cột 5), Tổng số dư Có (cột 6)."}]},{"id":"tt133_84","no":84,"code":"Điều 84","title":"Điều 84. Quy định chung về chứng từ kế toán và hệ thống biểu mẫu chứng từ kế toán","shortTitle":"Quy định chung về chứng từ kế toán và hệ thống biểu mẫu chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán áp dụng cho các doanh nghiệp phải thực hiện theo đúng quy định của Luật Kế toán, Nghị định quy định chi tiết một số điều của Luật Kế toán và các văn bản sửa đổi, bổ sung."},{"k":"p","t":"2. Các loại chứng từ kế toán tại danh mục và biểu mẫu chứng từ kế toán đều thuộc loại hướng dẫn. Doanh nghiệp được chủ động xây dựng, thiết kế biểu mẫu chứng từ kế toán phù hợp với đặc điểm hoạt động và yêu cầu quản lý của mình nhưng phải đáp ứng được các yêu cầu của Luật kế toán và đảm bảo nguyên tắc rõ ràng, minh bạch, kịp thời, dễ kiểm tra, kiểm soát và đối chiếu."},{"k":"p","t":"3. Trường hợp không tự xây dựng và thiết kế biểu mẫu chứng từ cho riêng mình, doanh nghiệp có thể áp dụng hệ thống biểu mẫu chứng từ kế toán theo hướng dẫn tại Phụ lục 3 ban hành kèm theo Thông tư này để ghi chép chứng từ kế toán phù hợp với đặc điểm hoạt động sản xuất, kinh doanh và yêu cầu quản lý của doanh nghiệp."},{"k":"p","t":"4. Các doanh nghiệp có các nghiệp vụ kinh tế, tài chính đặc thù thuộc đối tượng điều chỉnh của các văn bản pháp luật khác thì áp dụng theo quy định về chứng từ tại các văn bản đó."}]},{"id":"tt133_85","no":85,"code":"Điều 85","title":"Điều 85. Lập và ký chứng từ kế toán","shortTitle":"Lập và ký chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các nghiệp vụ kinh tế, tài chính phát sinh liên quan đến hoạt động của doanh nghiệp phải lập chứng từ kế toán. Chứng từ kế toán chỉ được lập một lần cho mỗi nghiệp vụ kinh tế, tài chính."},{"k":"p","t":"2. Chứng từ kế toán phải được lập rõ ràng, đầy đủ, kịp thời, chính xác theo nội dung quy định trên mẫu. Trong trường hợp chứng từ kế toán chưa có mẫu thì đơn vị kế toán được tự thiết kế mẫu chứng từ kế toán nhưng phải bảo đảm đầy đủ các nội dung quy định của Luật Kế toán."},{"k":"p","t":"3. Nội dung nghiệp vụ kinh tế, tài chính trên chứng từ kế toán không được viết tắt, không được tẩy xóa, sửa chữa; khi viết phải dùng bút mực, số và chữ viết phải liên tục, không ngắt quãng, chỗ trống phải gạch chéo. Chứng từ bị tẩy xóa, sửa chữa không có giá trị thanh toán và ghi sổ kế toán. Khi viết sai chứng từ kế toán thì phải hủy bỏ bằng cách gạch chéo vào chứng từ viết sai."},{"k":"p","t":"4. Chứng từ kế toán phải được lập đủ số liên quy định. Trường hợp phải lập nhiều liên chứng từ kế toán cho một nghiệp vụ kinh tế, tài chính thì nội dung các liên phải giống nhau."},{"k":"p","t":"5. Chứng từ kế toán phải có đủ chữ ký theo chức danh quy định trên chứng từ. Chữ ký trên chứng từ kế toán phải được ký bằng loại mực không phai. Không được ký chứng từ kế toán bằng mực màu đỏ hoặc đóng dấu chữ ký khắc sẵn. Chữ ký trên chứng từ kế toán của một người phải thống nhất. Người lập, người duyệt và những người khác ký tên trên chứng từ kế toán phải chịu trách nhiệm về nội dung của chứng từ kế toán."},{"k":"p","t":"6. Các doanh nghiệp chưa có chức danh kế toán trưởng thì phải cử người phụ trách kế toán để giao dịch với khách hàng, ngân hàng... Chữ ký kế toán trưởng được thay bằng chữ ký của người phụ trách kế toán của đơn vị đó. Người phụ trách kế toán phải thực hiện đúng trách nhiệm và quyền quy định cho kế toán trưởng."},{"k":"p","t":"7. Chữ ký trên chứng từ kế toán phải do người có thẩm quyền hoặc người được ủy quyền ký. Nghiêm cấm người có thẩm quyền hoặc được ủy quyền ký chứng từ thực hiện việc ký chứng từ kế toán khi chưa ghi hoặc chưa ghi đủ nội dung chứng từ theo trách nhiệm của người ký."},{"k":"p","t":"8. Việc phân cấp ký trên chứng từ kế toán do Tổng Giám đốc (Giám đốc), người đại diện theo pháp luật của doanh nghiệp quy định phù hợp với luật pháp, yêu cầu quản lý, đảm bảo kiểm soát chặt chẽ, an toàn tài sản."},{"k":"p","t":"9. Chứng từ kế toán chi tiền phải do người có thẩm quyền duyệt chi và kế toán trưởng hoặc người được ủy quyền ký trước khi thực hiện. Chữ ký trên chứng từ kế toán dùng để chi tiền phải ký theo từng liên."},{"k":"p","t":"10. Kế toán trưởng (hoặc người được ủy quyền) không được ký “thừa ủy quyền” của người đứng đầu doanh nghiệp. Người được ủy quyền không được ủy quyền lại cho người khác."},{"k":"p","t":"11. Chứng từ điện tử phải có chữ ký điện tử. Chữ ký trên chứng từ điện tử có giá trị như chữ ký trên chứng từ bằng giấy."}]},{"id":"tt133_86","no":86,"code":"Điều 86","title":"Điều 86. Trình tự luân chuyển và kiểm tra chứng từ kế toán","shortTitle":"Trình tự luân chuyển và kiểm tra chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Tất cả các chứng từ kế toán do doanh nghiệp lập hoặc từ bên ngoài chuyển đến đều phải tập trung tại bộ phận kế toán doanh nghiệp. Bộ phận kế toán kiểm tra những chứng từ kế toán đó và chỉ sau khi kiểm tra và xác minh tính pháp lý của chứng từ thì mới dùng những chứng từ đó để ghi sổ kế toán."},{"k":"p","t":"2. Trình tự luân chuyển chứng từ kế toán bao gồm các bước sau:"},{"k":"p","t":"- Lập, tiếp nhận, xử lý chứng từ kế toán;"},{"k":"p","t":"- Kế toán viên, kế toán trưởng kiểm tra và ký chứng từ kế toán hoặc trình người ký duyệt theo thẩm quyền;"},{"k":"p","t":"- Phân loại, sắp xếp chứng từ kế toán, định khoản và ghi sổ kế toán;"},{"k":"p","t":"- Lưu trữ, bảo quản chứng từ kế toán."},{"k":"p","t":"3. Trình tự kiểm tra chứng từ kế toán."},{"k":"p","t":"- Kiểm tra tính rõ ràng, trung thực, đầy đủ của các chỉ tiêu, các yếu tố ghi chép trên chứng từ kế toán;"},{"k":"p","t":"- Kiểm tra tính hợp pháp của nghiệp vụ kinh tế, tài chính phát sinh đã ghi trên chứng từ kế toán, đối chiếu chứng từ kế toán với các tài liệu khác có liên quan;"},{"k":"p","t":"- Kiểm tra tính chính xác của số liệu, thông tin trên chứng từ kế toán."},{"k":"p","t":"4. Khi kiểm tra chứng từ kế toán nếu phát hiện hành vi vi phạm chính sách, chế độ, các quy định về quản lý kinh tế, tài chính của Nhà nước, phải từ chối thực hiện (Không xuất quỹ, thanh toán, xuất kho,…) đồng thời báo ngay cho người quản lý điều hành doanh nghiệp biết để xử lý kịp thời theo pháp luật hiện hành. Đối với những chứng từ kế toán lập không đúng thủ tục, nội dung và chữ số không rõ ràng thì người chịu trách nhiệm kiểm tra hoặc ghi sổ phải trả lại, yêu cầu làm thêm thủ tục và điều chỉnh sau đó mới làm căn cứ ghi sổ."}]},{"id":"tt133_87","no":87,"code":"Điều 87","title":"Điều 87. Dịch chứng từ kế toán ra tiếng Việt, sử dụng, quản lý, in và phát hành biểu mẫu chứng từ kế toán","shortTitle":"Dịch chứng từ kế toán ra tiếng Việt, sử dụng, quản lý, in và phát hành biểu mẫu chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"Các chứng từ kế toán ghi bằng tiếng nước ngoài, khi sử dụng để ghi sổ kế toán và lập báo cáo tài chính ở Việt Nam phải được dịch các nội dung chủ yếu quy định tại Luật Kế toán ra tiếng Việt."},{"k":"p","t":"Đơn vị kế toán phải chịu trách nhiệm về tính chính xác và đầy đủ của nội dung được dịch ra tiếng nước ngoài sang tiếng Việt. Bản chứng từ dịch ra tiếng việt phải đính kèm với bản chính bằng tiếng nước ngoài."},{"k":"p","t":"Các tài liệu kèm theo chứng từ kế toán bằng tiếng nước ngoài như các loại hợp đồng, hồ sơ kèm theo chứng từ thanh toán, hồ sơ dự án đầu tư, báo cáo quyết toán và các tài liệu liên quan khác không phải dịch ra tiếng Việt trừ khi có yêu cầu của cơ quan Nhà nước có thẩm quyền."},{"k":"p","t":"Các doanh nghiệp có thể mua sẵn hoặc tự thiết kế mẫu, tự in, nhưng phải đảm bảo các nội dung chủ yếu của chứng từ quy định tại Luật Kế toán."},{"k":"p","t":"Chứng từ phải được bảo quản cẩn thận, không được để hư hỏng, mục nát. Séc và giấy tờ có giá phải được quản lý như tiền. Các doanh nghiệp có sử dụng chứng từ điện tử cho hoạt động kinh tế, tài chính và ghi sổ kế toán thì phải tuân thủ theo quy định của các văn bản pháp luật về chứng từ điện tử."}]},{"id":"tt133_88","no":88,"code":"Điều 88","title":"Điều 88. Sổ kế toán","shortTitle":"Sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Sổ kế toán dùng để ghi chép, hệ thống và lưu giữ toàn bộ các nghiệp vụ kinh tế, tài chính đã phát sinh theo nội dung kinh tế và theo trình tự thời gian có liên quan đến doanh nghiệp. Mỗi doanh nghiệp nhỏ và vừa chỉ có một hệ thống sổ kế toán cho một kỳ kế toán. Doanh nghiệp nhỏ và vừa phải thực hiện các quy định về sổ kế toán trong Luật Kế toán, các văn bản hướng dẫn thi hành Luật Kế toán và các văn bản hướng dẫn, sửa đổi, bổ sung hoặc thay thế."},{"k":"p","t":"2. Doanh nghiệp được tự xây dựng biểu mẫu sổ kế toán cho riêng mình nhưng phải đảm bảo cung cấp thông tin về giao dịch kinh tế một cách minh bạch, đầy đủ, dễ kiểm tra, dễ kiểm soát và dễ đối chiếu. Trường hợp không tự xây dựng biểu mẫu sổ kế toán, doanh nghiệp có thể áp dụng biểu mẫu sổ kế toán theo hướng dẫn tại Phụ lục 4 ban hành kèm theo Thông tư này nếu phù hợp với đặc điểm quản lý và hoạt động kinh doanh của mình."},{"k":"p","t":"3. Tùy theo đặc điểm hoạt động và yêu cầu quản lý, doanh nghiệp được tự xây dựng hình thức ghi sổ kế toán cho riêng mình trên cơ sở đảm bảo thông tin về các giao dịch phải được phản ánh đầy đủ, kịp thời, dễ kiểm tra, kiểm soát và đối chiếu."}]},{"id":"tt133_89","no":89,"code":"Điều 89","title":"Điều 89. Trách nhiệm của người giữ và ghi sổ kế toán","shortTitle":"Trách nhiệm của người giữ và ghi sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"Sổ kế toán phải được quản lý chặt chẽ, phân công rõ ràng trách nhiệm cá nhân giữ và ghi sổ. Sổ kế toán giao cho nhân viên nào thì nhân viên đó phải chịu trách nhiệm về những điều ghi trong sổ và việc giữ sổ trong suốt thời gian dùng sổ. Khi có sự thay đổi nhân viên giữ và ghi sổ, kế toán trưởng phải tổ chức việc bàn giao trách nhiệm quản lý và ghi sổ kế toán giữa nhân viên cũ và nhân viên mới. Biên bản bàn giao phải được kế toán trưởng ký xác nhận."}]},{"id":"tt133_90","no":90,"code":"Điều 90","title":"Điều 90. Mở, ghi sổ kế toán, chữ ký và sửa chữa sổ kế toán","shortTitle":"Mở, ghi sổ kế toán, chữ ký và sửa chữa sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Mở sổ"},{"k":"p","t":"Sổ kế toán phải mở vào đầu kỳ kế toán năm. Đối với doanh nghiệp mới thành lập, sổ kế toán phải mở từ ngày thành lập. Người đại diện theo pháp luật và kế toán trưởng của doanh nghiệp có trách nhiệm ký duyệt các sổ kế toán. Sổ kế toán có thể đóng thành quyển hoặc để tờ rời. Các tờ sổ khi dùng xong phải đóng thành quyển để lưu trữ. Trước khi dùng sổ kế toán phải hoàn thiện các thủ tục sau:"},{"k":"p","t":"- Đối với sổ kế toán dạng quyển: Trang đầu sổ phải ghi rõ tên doanh nghiệp, tên sổ, ngày mở sổ, niên độ kế toán và kỳ ghi sổ, họ tên, chữ ký của người giữ và ghi sổ, của kế toán trưởng và người đại diện theo pháp luật, ngày kết thúc ghi sổ hoặc ngày chuyển giao cho người khác. Sổ kế toán phải đánh số trang từ trang đầu đến trang cuối, giữa hai trang sổ phải đóng dấu giáp lai của đơn vị kế toán."},{"k":"p","t":"- Đối với sổ tờ rời: Đầu mỗi sổ tờ rời phải ghi rõ tên doanh nghiệp, số thứ tự của từng tờ sổ, tên sổ, tháng sử dụng, họ tên người giữ và ghi sổ. Các tờ rời trước khi dùng phải được giám đốc doanh nghiệp hoặc người được ủy quyền ký xác nhận, đóng dấu và ghi vào sổ đăng ký sử dụng sổ tờ rời. Các sổ tờ rời phải được sắp xếp theo thứ tự các tài khoản kế toán và phải đảm bảo sự an toàn, dễ tìm."},{"k":"p","t":"2. Ghi sổ: Việc ghi sổ kế toán phải căn cứ vào chứng từ kế toán đã được kiểm tra bảo đảm các quy định về chứng từ kế toán. Mọi số liệu ghi trên sổ kế toán bắt buộc phải có chứng từ kế toán hợp pháp, hợp lý chứng minh."},{"k":"p","t":"3. Khóa sổ: Cuối kỳ kế toán phải khóa sổ kế toán trước khi lập Báo cáo tài chính. Ngoài ra phải khóa sổ kế toán trong các trường hợp kiểm kê hoặc các trường hợp khác theo quy định của pháp luật."},{"k":"p","t":"4. Đối với người ghi sổ thuộc các đơn vị dịch vụ kế toán phải ký và ghi rõ Số chứng chỉ hành nghề, tên và địa chỉ đơn vị cung cấp dịch vụ kế toán. Người ghi sổ kế toán là cá nhân hành nghề ghi rõ số chứng chỉ hành nghề."},{"k":"p","t":"5. Khi phát hiện sổ kế toán của kỳ báo cáo có sai sót thì phải sửa chữa bằng phương pháp phù hợp với quy định của Luật Kế toán."},{"k":"p","t":"6. Trường hợp phát hiện sai sót trong các kỳ trước, doanh nghiệp phải điều chỉnh hồi tố."}]},{"id":"tt133_91","no":91,"code":"Điều 91","title":"Điều 91. Chuyển đổi số dư trên sổ kế toán","shortTitle":"Chuyển đổi số dư trên sổ kế toán","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp thực hiện chuyển đổi số dư các tài khoản sau:"},{"k":"p","t":"- Số dư chi tiết về vàng, bạc, kim khí quý, đá quý đang phản ánh trên TK 1113 và 1123 được chuyển sang theo dõi trên các TK 152 - Hàng tồn kho, TK 155 - Thành phẩm, TK 156 - Hàng hóa (đối với vàng bạc, kim khí quý, đá quý được phân loại là hàng tồn kho) và TK 2288 - Đầu tư khác (đối với vàng bạc, kim khí quý, đá quý không được phân loại là hàng tồn kho)."},{"k":"p","t":"- Số dư các khoản trái phiếu, tín phiếu, kỳ phiếu nắm giữ đến ngày đáo hạn, không nắm giữ vì mục đích kinh doanh (mua vào để bán ra với mục đích kiếm lời qua chênh lệch giá mua, bán) đang phản ánh trên TK 121 - Đầu tư tài chính ngắn hạn được chuyển sang TK 128 - Đầu tư nắm giữ đến ngày đáo hạn (1288);"},{"k":"p","t":"- Số dư TK 142 - Chi phí trả trước ngắn hạn được chuyển sang TK 242 - Chi phí trả trước;"},{"k":"p","t":"- Số dư chi tiết TK 1388 về ký quỹ, ký cược ngắn hạn và TK 244 - Ký quỹ, ký cược dài hạn được chuyển sang TK 1386 - Cầm cố, thế chấp, ký quỹ, ký cược;"},{"k":"p","t":"- Số dư các khoản dự phòng đang phản ánh trên TK 159, 229 được chuyển sang TK 229 - Dự phòng tổn thất tài sản (chi tiết cho từng TK cấp 2 phù hợp với nội dung dự phòng);"},{"k":"p","t":"- Số dư TK 311 - Vay ngắn hạn, TK 315 - Nợ dài hạn đến hạn trả, TK 3411- Vay dài hạn và TK 3412 - Nợ dài hạn chuyển sang TK 341 - Vay và nợ thuê tài chính;"},{"k":"p","t":"- Số dư TK 3414 - Nhận ký quỹ, ký cược dài hạn chuyển sang TK 3386 - Nhận ký quỹ, ký cược."},{"k":"p","t":"- Khoản trích trước chi phí sửa chữa, duy trì cho TSCĐ hoạt động bình thường (đối với những TSCĐ theo yêu cầu kỹ thuật phải sửa chữa định kỳ), chi phí hoàn nguyên môi trường, hoàn trả mặt bằng và các khoản có tính chất tương tự đang phản ánh trên TK 335 - Chi phí phải trả được chuyển sang TK 352 - Dự phòng phải trả (chi tiết TK 3524)."},{"k":"p","t":"2. Các nội dung khác đang phản ánh chi tiết trên các tài khoản có liên quan nếu trái so với Thông tư này thì phải điều chỉnh lại theo quy định của Thông tư này."}]},{"id":"tt133_92","no":92,"code":"Điều 92","title":"Điều 92. Điều khoản hồi tố","shortTitle":"Điều khoản hồi tố","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp không tiếp tục trích khấu hao đối với bất động sản đầu tư nắm giữ chờ tăng giá và không phải hồi tố toàn bộ chi phí khấu hao lũy kế đã trích từ các kỳ trước."},{"k":"p","t":"2. Doanh nghiệp báo cáo lại thông tin so sánh trên Báo cáo tài chính đối với các chỉ tiêu có sự thay đổi giữa Thông tư này và Chế độ kế toán doanh nghiệp ban hành theo Quyết định số 48/2006/QĐ-BTC ngày 14/9/2006 của Bộ trưởng Bộ Tài chính và thuyết minh lí do là có sự thay đổi trong Chế độ kế toán doanh nghiệp."}]},{"id":"tt133_93","no":93,"code":"Điều 93","title":"Điều 93. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực áp dụng cho năm tài chính bắt đầu hoặc sau ngày 1/1/2017. Những quy định trái với Thông tư này đều bãi bỏ. Thông tư này thay thế các nội dung áp dụng đối với doanh nghiệp nhỏ và vừa tại Quyết định số 48/2006/QĐ-BTC ngày 14/9/2006 của Bộ trưởng Bộ Tài chính và Thông tư số 138/2011/TT-BTC ngày 4/10/2011 của Bộ Tài chính."},{"k":"p","t":"2. Các Bộ, ngành, Ủy ban nhân dân, Sở Tài chính, Cục Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các doanh nghiệp thực hiện Thông tư này. Trong quá trình thực hiện nếu có vướng mắc đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết./."},{"k":"p","t":"Nơi nhận:\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Văn phòng TW Đảng;\n- Văn phòng Quốc hội;\n- Văn phòng Chủ tịch nước;\n- Văn phòng Chính phủ;\n- Văn phòng Tổng Bí thư;\n- Các Bộ, cơ quan ngang Bộ;\n- Tòa án NDTC;\n- Viện Kiểm sát NDTC;\n- Kiểm toán Nhà nước;\n- UBND tỉnh, thành phố trực thuộc TW;\n- Cơ quan TW của các đoàn thể;\n- Cục Kiểm tra văn bản -  Bộ Tư pháp;\n- Sở Tài chính, Cục Thuế các <script>
var D=JSON.parse(document.getElementById('LD').textContent);var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tkbold(h){return h.replace(/(TK\s*\d[\d\.]*)/g,'<span class="tk">$1</span>').replace(/(Tài khoản\s+\d[\d\.]*)/g,'<span class="tk">$1</span>')}
var isNo=function(t){return /^Nợ\s+(các\s+)?TK\b|^Nợ\s+TK/.test(t)};
var isCo=function(t){return /^Có\s+(các\s+)?TK\b|^Có\s+TK/.test(t)};
function jline(t){var h=tkbold(e(t)).replace(/^(Nợ|Có)\s+/,'');return '<div class="line '+(isNo(t)?'no':'co')+'">'+h+'</div>'}
function rtable(rows){var h='<table class="ct">';rows.forEach(function(r,ri){h+='<tr>';r.forEach(function(c){var tg=ri===0?'th':'td';h+='<'+tg+'>'+e(c)+'</'+tg+'>'});h+='</tr>'});return h+'</table>'}
function hl(s,q){if(!q)return s;var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');return s.replace(rx,function(m){return'<mark>'+m+'</mark>'})}
/*XREF-JS-START*/
var IDBYNUM={};(D.outline||[]).forEach(function(a){var m=(a.code||"").match(/^Điều\s+(\d+)/);if(m)IDBYNUM[m[1]]=a.id});
function autolink(html){return String(html).replace(/Điều\s+(\d+)/g,function(m,n){return IDBYNUM[n]?'<a class="xref-in" onclick="show(\''+IDBYNUM[n]+'\');return false">'+m+'</a>':m})}
function renderRefs(id){var rs=(D.refs||{})[id];if(!rs||!rs.length)return "";var h='<div class="refbox"><div class="refhead">🔗 Hướng dẫn / Liên kết liên quan</div>';rs.forEach(function(r){if(r.targetSlug){h+='<a class="refrow '+(r.kind||"")+'" target="_top" href="/legal/'+r.targetSlug+(r.targetAnchor?'?anchor='+r.targetAnchor:'')+'">'+e(r.label)+' →</a>'}else{h+='<div class="refrow note">'+e(r.label)+(r.note?" "+e(r.note):"")+'</div>'}});return h+"</div>"}
/*XREF-JS-END*/
function renderContent(content,q){
  var h='',i=0,n=content.length;
  while(i<n){
    var c=content[i];
    if(c.k==='tbl'){h+=rtable(c.rows);i++;continue}
    var t=(c.t||'').trim();
    if(!t){i++;continue}
    if(isNo(t)||isCo(t)){
      var blk='<div class="je">';
      while(i<n&&content[i].k==='p'&&(isNo((content[i].t||'').trim())||isCo((content[i].t||'').trim()))){blk+=jline((content[i].t||'').trim());i++}
      h+=blk+'</div>';continue;
    }
    if(/^Bên Nợ\s*:?$/.test(t)){h+='<div class="lbl lbl-no">'+e(t.replace(/:$/,''))+'</div>';i++;continue}
    if(/^Bên Có\s*:?$/.test(t)){h+='<div class="lbl lbl-co">'+e(t.replace(/:$/,''))+'</div>';i++;continue}
    if(/^Số dư bên (Nợ|Có)/.test(t)){h+='<div class="lbl lbl-du">'+tkbold(e(t))+'</div>';i++;continue}
    if(/^\d+\.\s/.test(t)&&t.length<140){h+='<p class="p-num">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^\d+\.\d+\.?\s/.test(t)){h+='<p class="p-sub">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^[a-zđ]\)\s/.test(t)){h+='<p class="p-sub">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    if(/^[-+•]\s/.test(t)){h+='<p class="p-dash">'+hl(tkbold(e(t)),q)+'</p>';i++;continue}
    h+='<p>'+hl(tkbold(e(t)),q)+'</p>';i++;
  }
  return autolink(h||'<p style="color:var(--mut)">(Mục này không có nội dung văn bản.)</p>');
}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:3px 14px;font-size:11px;font-style:italic;color:var(--mut)">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px;font-size:12px;color:var(--mut)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span>›</span>'+e(a.muc):'')+'<span>›</span><b>'+e(a.code)+'</b></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">'+renderContent(a.content||[],q)+'</div>'+renderRefs(id);
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  if(!document.getElementById('s-main').classList.contains('on'))tab('main',document.querySelector('.tab'));
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildForms(){
  var h='';if(!D.forms||!D.forms.length){document.getElementById('s-forms').innerHTML='<div class="no-tk"><p>Không có biểu mẫu.</p></div>';return}
  h+='<div class="fnote">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx).</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a><a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');if(!btn||btn.classList.contains('loading'))return;ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type'),orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span>...';
  try{
    var res=await fetch('/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type,{credentials:'include'});
    if(!res.ok)throw 0;var blob=await res.blob();var u=URL.createObjectURL(blob);var a=document.createElement('a');
    a.href=u;a.download=file+(type==='excel'?'.xlsx':'.docx');document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(_){alert('Chưa có file biểu mẫu này hoặc lỗi tải.')}
  finally{setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},800)}
});
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Không áp dụng hệ thống tài khoản.')+'</p></div>';return}
  var h='<h2 style="font-size:17px;font-weight:800;color:#fff;margin-bottom:6px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mut);margin-bottom:14px">'+D.accounts.length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td>'+e(a.name)+'</td><td>';
    if(a.dieu)h+='<span class="tk-link" onclick="show(\''+a.dieu+'\')">Xem Điều</span>';
    h+='</td></tr>';
  });
  el.innerHTML=h+'</tbody></table>';
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:21px;font-weight:800;color:#fff;margin-bottom:5px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12.5px;color:var(--mut);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="scard"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="scard"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="scard"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="scard"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="scard"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#9fc0ff">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12.5px;color:#bcd0ff;margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 14px;color:var(--mut);cursor:pointer;border-left:2px solid var(--line)" onclick="show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:18px 0 9px;color:#9fc0ff">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
function initHash(){var hh=window.location.hash.slice(1);if(hh&&D.outline.find(function(a){return a.id===hh}))show(hh);else if(D.outline.length)show(D.outline[0].id)}
buildSb();buildForms();buildTK();buildHome();initHash();
</script></body></html>
