"đ) Đối với các công cụ, dụng cụ có giá trị nhỏ khi xuất dùng cho sản xuất, kinh doanh phải ghi nhận toàn bộ một lần vào chi phí sản xuất, kinh doanh."},{"k":"p","t":"e) Trường hợp công cụ, dụng cụ, bao bì luân chuyển, đồ dùng cho thuê xuất dùng hoặc cho thuê liên quan đến hoạt động sản xuất, kinh doanh trong nhiều kỳ kế toán thì được ghi nhận vào Tài khoản 242 “Chi phí trả trước” và phân bổ dần vào giá vốn hàng bán hoặc chi phí sản xuất kinh doanh theo từng bộ phận sử dụng."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 153 - Công cụ, dụng cụ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá thực tế của công cụ, dụng cụ nhập kho do mua ngoài, tự chế, thuê ngoài gia công chế biến, nhận góp vốn;"},{"k":"p","t":"- Trị giá công cụ, dụng cụ cho thuê nhập lại kho;"},{"k":"p","t":"- Trị giá thực tế của công cụ, dụng cụ thừa phát hiện khi kiểm kê;"},{"k":"p","t":"- Kết chuyển trị giá thực tế của công cụ, dụng cụ tồn kho cuối kỳ (trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Trị giá thực tế của công cụ, dụng cụ xuất kho sử dụng cho sản xuất, kinh doanh, cho thuê hoặc góp vốn;"},{"k":"p","t":"- Chiết khấu thương mại được hưởng khi mua công cụ, dụng cụ;"},{"k":"p","t":"- Trị giá công cụ, dụng cụ trả lại cho người bán hoặc được người bán giảm giá;"},{"k":"p","t":"- Trị giá công cụ, dụng cụ thiếu phát hiện khi kiểm kê;"},{"k":"p","t":"- Kết chuyển trị giá thực tế của công cụ, dụng cụ tồn kho đầu kỳ (trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Số dư bên Nợ: Trị giá thực tế của công cụ, dụng cụ tồn kho cuối kỳ."}]},{"id":"tt133_26","no":26,"code":"Điều 26","title":"Điều 26. Tài khoản 154 - Chi phí sản xuất, kinh doanh dở dang","shortTitle":"Tài khoản 154 - Chi phí sản xuất, kinh doanh dở dang","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tổng hợp chi phí sản xuất, kinh doanh phục vụ cho việc tính giá thành sản phẩm, dịch vụ ở doanh nghiệp hạch toán hàng tồn kho theo phương pháp kê khai thường xuyên. Ở những doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ, Tài khoản 154 chỉ phản ánh giá trị thực tế của sản phẩm, dịch vụ dở dang đầu kỳ và cuối kỳ."},{"k":"p","t":"b) Tài khoản 154 \"Chi phí sản xuất, kinh doanh dở dang\" phản ánh chi phí sản xuất, kinh doanh phát sinh trong kỳ; chi phí sản xuất, kinh doanh của khối lượng sản phẩm, dịch vụ hoàn thành trong kỳ; chi phí sản xuất, kinh doanh dở dang đầu kỳ, cuối kỳ của các hoạt động sản xuất, kinh doanh chính, phụ và thuê ngoài gia công chế biến ở các doanh nghiệp sản xuất hoặc ở các doanh nghiệp kinh doanh dịch vụ. Tài khoản 154 cũng phản ánh chi phí sản xuất, kinh doanh của các hoạt động sản xuất, gia công chế biến, hoặc cung cấp dịch vụ của các doanh nghiệp thương mại, nếu có tổ chức các loại hình hoạt động này."},{"k":"p","t":"c) Chi phí sản xuất, kinh doanh hạch toán trên Tài khoản 154 phải được chi tiết theo địa điểm phát sinh chi phí (phân xưởng, bộ phận sản xuất, đội sản xuất, công trường,...); theo loại, nhóm sản phẩm, hoặc chi tiết, bộ phận sản phẩm; theo từng loại dịch vụ hoặc theo từng công đoạn dịch vụ."},{"k":"p","t":"d) Chi phí sản xuất, kinh doanh phản ánh trên Tài khoản 154 gồm những chi phí sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu trực tiếp;"},{"k":"p","t":"- Chi phí nhân công trực tiếp;"},{"k":"p","t":"- Chi phí sử dụng máy thi công (đối với hoạt động xây lắp);"},{"k":"p","t":"- Chi phí sản xuất chung."},{"k":"p","t":"đ) Chi phí nguyên liệu, vật liệu, chi phí nhân công vượt trên mức bình thường và chi phí sản xuất chung cố định không phân bổ thì không được tính vào giá trị hàng tồn kho mà phải tính vào giá vốn hàng bán của kỳ kế toán."},{"k":"p","t":"e) Cuối kỳ, phân bổ chi phí sản xuất chung cố định và chi phí sản xuất chung biến đổi vào chi phí chế biến cho mỗi đơn vị sản phẩm theo chi phí thực tế phát sinh."},{"k":"p","t":"g) Không hạch toán vào Tài khoản 154 những chi phí sau:"},{"k":"p","t":"- Chi phí bán hàng;"},{"k":"p","t":"- Chi phí quản lý doanh nghiệp;"},{"k":"p","t":"- Chi phí tài chính;"},{"k":"p","t":"- Chi phí khác;"},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp;"},{"k":"p","t":"- Chi đầu tư xây dựng cơ bản;"},{"k":"p","t":"- Các khoản chi được trang trải bằng nguồn khác."},{"k":"p","t":"2. Phương pháp vận dụng Tài khoản 154 trong ngành công nghiệp"},{"k":"p","t":"a) Tài khoản 154 “Chi phí sản xuất, kinh doanh dở dang\" áp dụng trong ngành công nghiệp dùng để tập hợp, tổng hợp chi phí sản xuất và tính giá thành sản phẩm của các phân xưởng, hoặc bộ phận sản xuất, chế tạo sản phẩm. Đối với các doanh nghiệp sản xuất có thuê ngoài gia công, chế biến, cung cấp lao vụ, dịch vụ cho bên ngoài hoặc phục vụ cho việc sản xuất sản phẩm thì chi phí của những hoạt động này cũng được tập hợp vào Tài khoản 154."},{"k":"p","t":"b) Chỉ được phản ánh vào Tài khoản 154 những nội dung chi phí sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu trực tiếp cho việc sản xuất, chế tạo sản phẩm;"},{"k":"p","t":"- Chi phí nhân công trực tiếp cho việc sản xuất, chế tạo sản phẩm;"},{"k":"p","t":"- Chi phí sản xuất chung phục vụ trực tiếp cho việc sản xuất, chế tạo sản phẩm."},{"k":"p","t":"c) Tài khoản 154 ở các doanh nghiệp sản xuất công nghiệp được hạch toán chi tiết theo địa điểm phát sinh chi phí (phân xưởng, bộ phận sản xuất), theo loại, nhóm sản phẩm, sản phẩm, hoặc chi tiết bộ phận sản phẩm."},{"k":"p","t":"d) Phần chênh lệch giữa chi phí sản xuất thử và số thu hồi từ việc thanh lý, nhượng bán sản phẩm sản xuất thử được hạch toán tăng hoặc giảm giá trị xây dựng cơ bản."},{"k":"p","t":"3. Phương pháp vận dụng Tài khoản 154 trong ngành nông nghiệp"},{"k":"p","t":"a) Tài khoản 154 \"Chi phí sản xuất, kinh doanh dở dang\" áp dụng trong ngành nông nghiệp dùng để tập hợp tổng chi phí sản xuất và tính giá thành sản phẩm của các hoạt động nuôi trồng, chế biến sản phẩm hoặc dịch vụ nông nghiệp. Tài khoản này phải được hạch toán chi tiết theo ngành kinh doanh nông nghiệp (trồng trọt, chăn nuôi, chế biến,...), theo địa điểm phát sinh chi phí (phân xưởng, đội sản xuất,...), chi tiết theo từng loại cây con và từng loại sản phẩm, từng sản phẩm hoặc dịch vụ."},{"k":"p","t":"b) Giá thành sản xuất thực tế của sản phẩm nông nghiệp được xác định vào cuối vụ thu hoạch hoặc cuối năm. Sản phẩm thu hoạch năm nào thì tính giá thành trong năm đó nghĩa là chi phí chi ra trong năm nay nhưng năm sau mới thu hoạch sản phẩm thì năm sau mới tính giá thành."},{"k":"p","t":"c) Đối với ngành trồng trọt, chi phí phải được hạch toán chi tiết theo 3 loại cây:"},{"k":"p","t":"- Cây ngắn ngày (lúa, khoai, sắn,...);"},{"k":"p","t":"- Cây trồng một lần thu hoạch nhiều lần (dứa, chuối,...);"},{"k":"p","t":"- Cây lâu năm (chè, cà phê, cao su, hồ tiêu, cây ăn quả,...)."},{"k":"p","t":"Đối với các loại cây trồng 2, 3 vụ trong một năm, hoặc trồng năm nay, năm sau mới thu hoạch, hoặc loại cây vừa có diện tích trồng mới, vừa có diện tích chăm sóc thu hoạch trong cùng một năm,... thì phải căn cứ vào tình hình thực tế để ghi chép, phản ánh rõ ràng chi phí của vụ này với vụ khác, của diện tích này với diện tích khác, của năm trước với năm nay và năm sau,..."},{"k":"p","t":"d) Không phản ánh vào tài khoản này chi phí khai hoang, trồng mới và chăm sóc cây lâu năm đang trong thời kỳ XDCB, chi phí bán hàng, chi phí quản lý doanh nghiệp, chi phí hoạt động tài chính và chi phí khác."},{"k":"p","t":"đ) Về nguyên tắc, chi phí sản xuất ngành trồng trọt được hạch toán chi tiết vào bên Nợ Tài khoản 154 \"Chi phí sản xuất, kinh doanh dở dang\" theo từng đối tượng tập hợp chi phí. Đối với một số loại chi phí có liên quan đến nhiều đối tượng hạch toán, hoặc liên quan đến nhiều vụ, nhiều thời kỳ thì phải phản ánh trên các tài khoản riêng, sau đó phân bổ vào giá thành của các loại sản phẩm liên quan như: Chi phí tưới tiêu nước, chi phí chuẩn bị đất và trồng mới năm đầu của những cây trồng một lần, thu hoạch nhiều lần (chi phí này không thuộc vốn đầu tư XDCB),..."},{"k":"p","t":"e) Trên cùng một diện tích canh tác, nếu trồng xen từ hai loại cây nông nghiệp ngắn ngày trở lên thì những chi phí phát sinh có liên quan trực tiếp đến loại cây nào thì tập hợp riêng cho loại cây đó (như: Hạt giống, chi phí gieo trồng, thu hoạch,...), chi phí phát sinh chung cho nhiều loại cây (chi phí cày bừa, tưới tiêu nước,...) thì được tập hợp riêng và phân bổ cho từng loại cây theo diện tích gieo trồng, hoặc theo một tiêu thức phù hợp."},{"k":"p","t":"g) Đối với cây lâu năm, quá trình từ khi làm đất, gieo trồng, chăm sóc đến khi bắt đầu có sản phẩm (thu, bói) thì được hạch toán như quá trình đầu tư XDCB để hình thành nên TSCĐ được tập hợp chi phí ở TK 241 “XDCB dở dang\". Chi phí cho vườn cây lâu năm trong quá trình sản xuất, kinh doanh bao gồm các chi phí cho khâu chăm sóc, khâu thu hoạch."},{"k":"p","t":"h) Khi hạch toán chi phí ngành chăn nuôi trên Tài khoản 154 cần chú ý một số điểm sau:"},{"k":"p","t":"- Hạch toán chi phí chăn nuôi phải chi tiết cho từng loại hoạt động chăn nuôi (như chăn nuôi trâu bò, chăn nuôi lợn,...), theo từng nhóm hoặc từng loại gia súc, gia cầm;"},{"k":"p","t":"- Súc vật con của đàn súc vật cơ bản hay nuôi béo đẻ ra sau khi tách mẹ được mở sổ chi tiết theo dõi riêng theo giá thành thực tế;"},{"k":"p","t":"- Đối với súc vật cơ bản khi đào thải chuyển thành súc vật nuôi lớn, nuôi béo được hạch toán vào Tài khoản 154 theo giá trị còn lại của súc vật cơ bản;"},{"k":"p","t":"- Đối tượng tính giá thành trong ngành chăn nuôi là: 1 kg sữa tươi, 1 con bò con tiêu chuẩn, giá thành 1 kg thịt tăng, giá thành 1 kg thịt hơi, giá thành 1 ngày/con chăn nuôi,..."},{"k":"p","t":"i) Phần chi phí nguyên vật liệu, chi phí nhân công trực tiếp vượt trên mức bình thường, chi phí sản xuất chung cố định không phân bổ thì không được tính vào giá thành sản phẩm mà được hạch toán vào giá vốn hàng bán của kỳ kế toán."},{"k":"p","t":"4. Phương pháp vận dụng Tài khoản 154 trong ngành dịch vụ"},{"k":"p","t":"a) Tài khoản 154 “Chi phí sản xuất, kinh doanh dở dang\" áp dụng trong các doanh nghiệp kinh doanh dịch vụ như: Giao thông vận tải, bưu điện, du lịch, dịch vụ,... Tài khoản này dùng để tập hợp chi phí (nguyên liệu, vật liệu trực tiếp, nhân công trực tiếp, chi phí sản xuất chung) và tính giá thành của khối lượng dịch vụ đã thực hiện."},{"k":"p","t":"b) Đối với ngành giao thông vận tải, tài khoản này dùng để tập hợp chi phí và tính giá thành về vận tải đường bộ (ô tô, tàu điện, vận tải bằng phương tiện thô sơ khác...) vận tải đường sắt, đường thủy, đường hàng không, vận tải đường ống,... Tài khoản 154 áp dụng cho ngành giao thông vận tải phải được mở chi tiết cho từng loại hoạt động (vận tải hành khách, vận tải hàng hóa,...) theo từng doanh nghiệp hoặc bộ phận kinh doanh dịch vụ."},{"k":"p","t":"c) Trong quá trình vận tải, săm lốp bị hao mòn với mức độ nhanh hơn mức khấu hao đầu xe nên thường phải thay thế nhiều lần nhưng giá trị săm lốp thay thế không tính vào giá thành vận tải ngay một lúc khi xuất dùng thay thế mà phải phân bổ dần theo từng kỳ. Vì vậy, hàng kỳ các doanh nghiệp vận tải ôtô được trích trước chi phí săm lốp vào giá thành vận tải (chi phí phải trả) theo quy định của chế độ tài chính hiện hành."},{"k":"p","t":"d) Phần chi phí nguyên liệu, vật liệu, chi phí nhân công trực tiếp vượt trên mức bình thường và phần chi phí sản xuất chung cố định không phân bổ thì không được tính vào giá thành sản phẩm mà được hạch toán vào giá vốn hàng bán của kỳ kế toán."},{"k":"p","t":"đ) Đối với hoạt động kinh doanh du lịch, tài khoản này được mở chi tiết theo từng loại hoạt động như: Hướng dẫn du lịch, kinh doanh khách sạn, kinh doanh vận tải du lịch,..."},{"k":"p","t":"e) Trong hoạt động kinh doanh khách sạn, Tài khoản 154 phải mở chi tiết theo từng loại dịch vụ như: dịch vụ ăn uống, dịch vụ buồng nghỉ, dịch vụ vui chơi giải trí, phục vụ khác (giặt, là, cắt tóc, điện tín, thể thao,...)."},{"k":"p","t":"5. Phương pháp vận dụng Tài khoản 154 trong ngành xây dựng"},{"k":"p","t":"a) Đối với hoạt động kinh doanh xây lắp quy định chỉ áp dụng phương pháp hạch toán hàng tồn kho theo phương pháp kê khai thường xuyên, không áp dụng phương pháp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ nên Tài khoản 154 dùng để tập hợp chi phí sản xuất, kinh doanh, phục vụ cho việc tính giá thành sản xuất sản phẩm xây lắp công nghiệp, dịch vụ của doanh nghiệp xây lắp."},{"k":"p","t":"b) Phần chi phí nguyên liệu, vật liệu trực tiếp, chi phí nhân công trực tiếp vượt trên mức bình thường không được tính vào giá thành công trình xây lắp mà được hạch toán vào giá vốn hàng bán của kỳ kế toán."},{"k":"p","t":"c) Tài khoản này trong ngành Xây lắp có thể theo dõi chi tiết theo các hoạt động sau:"},{"k":"p","t":"- Xây lắp: Dùng để tập hợp chi phí, tính giá thành sản xuất sản phẩm xây lắp và phản ánh giá trị sản phẩm xây lắp dở dang cuối kỳ;"},{"k":"p","t":"- Sản phẩm khác: Dùng để tập hợp chi phí, tính giá thành sản xuất sản phẩm khác và phản ánh giá trị sản phẩm khác dở dang cuối kỳ (thành phẩm, cấu kiện xây lắp,...);"},{"k":"p","t":"- Dịch vụ: Dùng để tập hợp chi phí, tính giá thành dịch vụ và phản ánh chi phí dịch vụ dở dang cuối kỳ;"},{"k":"p","t":"- Chi phí bảo hành xây lắp: Dùng để tập hợp chi phí bảo hành công trình xây dựng, lắp đặt thực tế phát sinh trong kỳ và giá trị công trình bảo hành xây lắp còn dở dang cuối kỳ."},{"k":"p","t":"d) Việc tập hợp chi phí sản xuất, tính giá thành sản phẩm xây lắp phải theo từng công trình, hạng mục công trình và theo khoản mục giá thành quy định trong giá trị dự toán xây lắp, gồm:"},{"k":"p","t":"- Chi phí vật liệu;"},{"k":"p","t":"- Chi phí nhân công;"},{"k":"p","t":"- Chi phí sử dụng máy thi công;"},{"k":"p","t":"- Chi phí chung."},{"k":"p","t":"Riêng chi phí chung được tập hợp chi phí \"Xây lắp\": Chỉ bao gồm chi phí chung phát sinh ở đội nhận thầu hoặc công trường xây lắp. Còn chi phí quản lý doanh nghiệp xây lắp (là một bộ phận của chi phí chung) được tập hợp bên Nợ Tài khoản 642 \"Chi phí quản lý kinh doanh\". Chi phí này sẽ được kết chuyển vào bên Nợ Tài khoản 911 \"Xác định kết quả kinh doanh\" tham gia vào giá thành toàn bộ sản phẩm xây lắp hoàn thành và bán ra trong kỳ."},{"k":"p","t":"đ) Chủ đầu tư xây dựng bất động sản sử dụng tài khoản này để tập hợp chi phí xây dựng thành phẩm bất động sản. Trường hợp bất động sản xây dựng sử dụng cho nhiều mục đích (làm văn phòng, cho thuê hoặc để bán, ví dụ như tòa nhà chung cư hỗn hợp) thì thực hiện theo nguyên tắc:"},{"k":"p","t":"- Nếu đủ căn cứ để hạch toán riêng hoặc xác định được tỷ trọng của phần chi phí xây dựng bất động sản để bán (thành phẩm bất động sản) và phần chi phí xây dựng bất động sản để cho thuê hoặc làm văn phòng (TSCĐ hoặc bất động sản đầu tư) thì phải hạch toán riêng trên TK 154 phần chi phí xây dựng thành phẩm bất động sản. Phần chi phí xây dựng TSCĐ hoặc bất động sản đầu tư được phản ánh riêng trên TK 241 - Xây dựng cơ bản dở dang."},{"k":"p","t":"- Trường hợp không hạch toán riêng hoặc xác định được tỷ trọng chi phí xây dựng cho các cấu phần thành phẩm bất động sản, TSCĐ hoặc bất động sản đầu tư thì kế toán tập hợp chi phí phát sinh liên quan trực tiếp tới việc đầu tư xây dựng trên TK 241. Khi công trình, dự án hoàn thành bàn giao đưa vào sử dụng, kế toán căn cứ cách thức sử dụng tài sản trong thực tế để kết chuyển chi phí đầu tư xây dựng phù hợp với bản chất của từng loại tài sản."},{"k":"p","t":"e) Khoản dự phòng chi phí bảo hành công trình xây lắp được hạch toán vào chi phí sản xuất kinh doanh từng kỳ, hết thời hạn bảo hành nếu số bảo hành đã trích lập lớn hơn chi phí thực tế đã phát sinh thì ghi tăng thu nhập khác trong kỳ. Trường hợp ngược lại thì hạch toán vào giá vốn hàng bán trong kỳ."},{"k":"p","t":"g) Các khoản chi phí của hợp đồng xây lắp không thể thu hồi (ví dụ: Không đủ tính thực thi về mặt pháp lý như có sự nghi ngờ về hiệu lực của nó, hoặc hợp đồng mà khách hàng không thể thực thi nghĩa vụ của mình...) phải được ghi nhận ngay là giá vốn hàng bán trong kỳ."},{"k":"p","t":"h) Các khoản thu từ việc bán nguyên liệu, vật liệu thừa và thanh lý máy móc, thiết bị thi công khi kết thúc hợp đồng xây dựng được ghi giảm chi phí sản xuất kinh doanh."},{"k":"p","t":"i) Hạch toán khoản mục nguyên liệu, vật liệu trực tiếp:"},{"k":"p","t":"- Khoản mục chi phí nguyên liệu, vật liệu trực tiếp bao gồm: Giá trị thực tế của vật liệu chính, vật liệu phụ, các cấu kiện hoặc các bộ phận rời, vật liệu luân chuyển tham gia cấu thành thực thể sản phẩm xây, lắp hoặc giúp cho việc thực hiện và hoàn thành khối lượng xây, lắp (không kể vật liệu phụ cho máy móc, phương tiện thi công và những vật liệu tính trong chi phí chung)."},{"k":"p","t":"- Nguyên tắc hạch toán khoản mục nguyên liệu, vật liệu trực tiếp: Nguyên liệu, vật liệu sử dụng cho xây dựng hạng mục công trình nào phải tính trực tiếp cho sản phẩm hạng mục công trình đó trên cơ sở chứng từ gốc theo số lượng thực tế đã sử dụng và theo giá thực tế xuất kho (giá bình quân gia quyền; Giá nhập trước, xuất trước, thực tế đích danh)."},{"k":"p","t":"- Cuối kỳ hạch toán hoặc khi công trình hoàn thành, tiến hành kiểm kê số vật liệu còn lại tại nơi sản xuất (nếu có) để ghi giảm trừ chi phí nguyên liệu, vật liệu trực tiếp xuất sử dụng cho công trình."},{"k":"p","t":"- Trong điều kiện thực tế sản xuất xây lắp không cho phép tính chi phí nguyên liệu, vật liệu trực tiếp cho từng công trình, hạng mục công trình thì doanh nghiệp có thể áp dụng phương pháp phân bổ vật liệu cho đối tượng sử dụng theo tiêu thức hợp lý (tỷ lệ với định mức tiêu hao nguyên liệu, vật liệu,...)."},{"k":"p","t":"k) Hạch toán khoản mục chi phí sử dụng máy thi công:"},{"k":"p","t":"- Khoản mục chi phí sử dụng máy thi công bao gồm: Chi phí cho các máy thi công nhằm thực hiện khối lượng công tác xây lắp bằng máy. Máy móc thi công là loại máy trực tiếp phục vụ xây lắp công trình. Đó là những máy móc chuyển động bằng động cơ hơi nước, diezen, xăng, điện,... (kể cả loại máy phục vụ xây, lắp)."},{"k":"p","t":"- Chi phí sử dụng máy thi công bao gồm: Chi phí thường xuyên và chi phí tạm thời. Chi phí thường xuyên cho hoạt động của máy thi công, gồm: Chi phí nhân công điều khiển máy, phục vụ máy,...; Chi phí vật liệu; Chi phí công cụ, dụng cụ; Chi phí khấu hao TSCĐ; Chi phí dịch vụ mua ngoài (chi phí sửa chữa nhỏ, điện, nước, bảo hiểm xe, máy,...); Chi phí khác bằng tiền."},{"k":"p","t":"- Chi phí tạm thời cho hoạt động của máy thi công, gồm: Chi phí sửa chữa lớn máy thi công (đại tu, trung tu,...) không đủ điều kiện ghi tăng nguyên giá máy thi công; Chi phí công trình tạm thời cho máy thi công (lều, lán, bệ, đường ray chạy máy,...). Chi phí tạm thời của máy có thể phát sinh trước (được hạch toán vào bên Nợ Tài khoản 242) sau đó sẽ phân bổ dần vào Nợ Tài khoản 154 \"Chi phí sản xuất kinh doanh dở dang\"; Hoặc phát sinh sau, nhưng phải tính trước vào chi phí sản xuất xây lắp trong kỳ (do liên quan tới việc sử dụng thực tế máy móc thi công trong kỳ). Trường hợp này phải tiến hành trích trước chi phí, ghi Có Tài khoản 352 \"Dự phòng phải trả\", Nợ Tài khoản 154 chi tiết chi phí sử dụng máy thi công."},{"k":"p","t":"l) Hạch toán khoản mục chi phí sản xuất chung:"},{"k":"p","t":"Chi phí sản xuất chung phản ánh chi phí sản xuất của đội, công trường xây dựng gồm: Lương nhân viên quản lý phân xưởng, tổ, đội xây dựng; Khoản trích bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, kinh phí công đoàn được tính theo tỉ lệ quy định trên tiền lương phải trả của nhân viên sử dụng máy thi công và nhân viên quản lý phân xưởng, tổ, đội; Khấu hao tài sản cố định dùng chung cho hoạt động của đội và những chi phí khác liên quan đến hoạt động của đội,..."},{"k":"p","t":"6. Kết cấu và nội dung phản ánh của Tài khoản 154 - Chi phí sản xuất, kinh doanh dở dang"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các chi phí nguyên liệu, vật liệu trực tiếp, chi phí nhân công trực tiếp, chi phí sử dụng máy thi công, chi phí sản xuất chung phát sinh trong kỳ liên quan đến sản xuất sản phẩm và chi phí thực hiện dịch vụ;"},{"k":"p","t":"- Các chi phí nguyên liệu, vật liệu trực tiếp, chi phí nhân công trực tiếp, chi phí sử dụng máy thi công, chi phí sản xuất chung phát sinh trong kỳ liên quan đến giá thành sản phẩm xây lắp công trình hoặc giá thành xây lắp theo giá khoán nội bộ;"},{"k":"p","t":"- Kết chuyển chi phí sản xuất, kinh doanh dở dang cuối kỳ (trường hợp doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Giá thành sản xuất thực tế của sản phẩm đã chế tạo xong nhập kho, chuyển đi bán, tiêu dùng nội bộ ngay hoặc sử dụng ngay vào hoạt động XDCB;"},{"k":"p","t":"- Giá thành sản xuất sản phẩm xây lắp hoàn thành bàn giao từng phần, hoặc toàn bộ tiêu thụ trong kỳ; hoặc bàn giao cho doanh nghiệp nhận thầu chính xây lắp (cấp trên hoặc nội bộ); hoặc giá thành sản phẩm xây lắp hoàn thành chờ tiêu thụ;"},{"k":"p","t":"- Chi phí thực tế của khối lượng dịch vụ đã hoàn thành cung cấp cho khách hàng;"},{"k":"p","t":"- Trị giá phế liệu thu hồi, giá trị sản phẩm hỏng không sửa chữa được;"},{"k":"p","t":"- Trị giá nguyên liệu, vật liệu, hàng hóa gia công xong nhập lại kho;"},{"k":"p","t":"- Phản ánh chi phí nguyên vật liệu, chi phí nhân công vượt trên mức bình thường không được tính vào trị giá hàng tồn kho mà phải tính vào giá vốn hàng bán của kỳ kế toán. Đối với doanh nghiệp sản xuất theo đơn đặt hàng, hoặc doanh nghiệp có chu kỳ sản xuất sản phẩm dài mà hàng kỳ kế toán đã phản ánh chi phí sản xuất chung cố định vào TK 154 đến khi sản phẩm hoàn thành mới xác định được chi phí sản xuất chung cố định không được tính vào trị giá hàng tồn kho thì phải hạch toán vào giá vốn hàng bán (Có TK 154, Nợ TK 632);"},{"k":"p","t":"- Kết chuyển chi phí sản xuất, kinh doanh dở dang đầu kỳ (trường hợp doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Số dư bên Nợ: Chi phí sản xuất, kinh doanh còn dở dang cuối kỳ."}]},{"id":"tt133_27","no":27,"code":"Điều 27","title":"Điều 27. Tài khoản 155 - Thành phẩm","shortTitle":"Tài khoản 155 - Thành phẩm","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh giá trị hiện có và tình hình biến động của các loại thành phẩm của doanh nghiệp. Thành phẩm là những sản phẩm đã kết thúc quá trình chế biến do các bộ phận sản xuất của doanh nghiệp sản xuất hoặc thuê ngoài gia công xong đã được kiểm nghiệm phù hợp với tiêu chuẩn kỹ thuật và nhập kho."},{"k":"p","t":"Trong giao dịch xuất khẩu ủy thác, tài khoản này chỉ sử dụng tại bên giao ủy thác, không sử dụng tại bên nhận ủy thác (bên nhận giữ hộ)."},{"k":"p","t":"b) Thành phẩm do các bộ phận sản xuất chính và sản xuất phụ của doanh nghiệp sản xuất ra phải được đánh giá theo giá thành sản xuất (giá gốc), bao gồm: Chi phí nguyên liệu, vật liệu trực tiếp, chi phí nhân công trực tiếp, chi phí sản xuất chung và những chi phí khác có liên quan trực tiếp đến việc sản xuất sản phẩm."},{"k":"p","t":"c) Không được tính vào giá gốc thành phẩm các chi phí sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu, chi phí nhân công và các chi phí sản xuất, kinh doanh khác phát sinh trên mức bình thường;"},{"k":"p","t":"- Chi phí vận chuyển, bảo quản hàng tồn kho trừ các khoản chi phí vận chuyển, bảo quản hàng tồn kho cần thiết cho quá trình sản xuất tiếp theo và chi phí bảo quản trong quá trình mua hàng;"},{"k":"p","t":"- Chi phí bán hàng;"},{"k":"p","t":"- Chi phí quản lý doanh nghiệp."},{"k":"p","t":"d) Thành phẩm thuê ngoài gia công chế biến được đánh giá theo giá thành thực tế gia công chế biến bao gồm: Chi phí nguyên liệu, vật liệu trực tiếp, chi phí thuê gia công và các chi phí khác có liên quan trực tiếp đến quá trình gia công."},{"k":"p","t":"đ) Việc tính giá trị thành phẩm xuất kho được thực hiện theo một trong ba phương pháp: Phương pháp giá thực tế đích danh; Phương pháp bình quân gia quyền sau mỗi lần nhập hoặc cuối kỳ; Phương pháp Nhập trước - Xuất trước."},{"k":"p","t":"e) Trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kê khai thường xuyên, nếu kế toán chi tiết nhập, xuất kho thành phẩm hàng ngày được ghi sổ theo giá hạch toán (có thể là giá thành kế hoạch hoặc giá nhập kho được quy định thống nhất). Cuối kỳ, kế toán phải tính giá thành thực tế của thành phẩm nhập kho và xác định hệ số chênh lệch giữa giá thành thực tế và giá hạch toán của thành phẩm (tính cả số chênh lệch của thành phẩm đầu kỳ) làm cơ sở xác định giá thành thực tế của thành phẩm nhập, xuất kho trong kỳ (sử dụng công thức tính đã nêu ở phần giải thích Tài khoản 152 “Nguyên liệu, vật liệu”)."},{"k":"p","t":"g) Kế toán chi tiết thành phẩm phải thực hiện theo từng kho, từng loại, nhóm, thứ thành phẩm."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 155 - Thành phẩm"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá của thành phẩm nhập kho;"},{"k":"p","t":"- Trị giá của thành phẩm thừa khi kiểm kê;"},{"k":"p","t":"- Kết chuyển trị giá thực tế của thành phẩm tồn kho cuối kỳ (trường hợp doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Trị giá thực tế của thành phẩm xuất kho;"},{"k":"p","t":"- Trị giá của thành phẩm thiếu hụt khi kiểm kê;"},{"k":"p","t":"- Kết chuyển trị giá thực tế của thành phẩm tồn kho đầu kỳ (trường hợp doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Số dư bên Nợ: Trị giá thực tế của thành phẩm tồn kho cuối kỳ."}]},{"id":"tt133_28","no":28,"code":"Điều 28","title":"Điều 28. Tài khoản 156 - Hàng hóa","shortTitle":"Tài khoản 156 - Hàng hóa","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá hiện có và tình hình biến động tăng, giảm các loại hàng hóa của doanh nghiệp bao gồm hàng hóa tại các kho hàng, quầy hàng, hàng hóa bất động sản. Hàng hóa là các loại vật tư, sản phẩm do doanh nghiệp mua về với mục đích để bán (bán buôn và bán lẻ). Trường hợp hàng hóa mua về vừa dùng để bán, vừa dùng để sản xuất, kinh doanh không phân biệt rõ ràng giữa hai mục đích bán lại hay để sử dụng thì vẫn phản ánh vào Tài khoản 156 “Hàng hóa”."},{"k":"p","t":"Trong giao dịch xuất nhập khẩu ủy thác, tài khoản này chỉ sử dụng tại bên giao ủy thác, không sử dụng tại bên nhận ủy thác (bên nhận giữ hộ)."},{"k":"p","t":"b) Những trường hợp sau đây không phản ánh vào Tài khoản 156 “Hàng hóa”:"},{"k":"p","t":"- Hàng hóa nhận bán hộ, nhận giữ hộ cho các doanh nghiệp khác;"},{"k":"p","t":"- Nguyên vật liệu, công cụ dụng cụ mua về dùng cho hoạt động sản xuất, kinh doanh (ghi vào các Tài khoản 152 “Nguyên liệu, vật liệu”, hoặc Tài khoản 153 “Công cụ, dụng cụ”);"},{"k":"p","t":"- Thành phẩm do doanh nghiệp sản xuất ra (ghi vào Tài khoản 155 “Thành phẩm”)."},{"k":"p","t":"c) Kế toán nhập, xuất, tồn kho hàng hóa trên Tài khoản 156 được phản ánh theo nguyên tắc giá gốc. Giá gốc hàng hóa mua vào, bao gồm: Giá mua, chi phí thu mua (vận chuyển, bốc xếp, bảo quản hàng từ nơi mua về kho doanh nghiệp, chi phí bảo hiểm,...), thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường (nếu có), thuế GTGT hàng nhập khẩu (nếu không được khấu trừ). Trường hợp doanh nghiệp mua hàng hóa về để bán lại nhưng vì lý do nào đó cần phải gia công, sơ chế, tân trang, phân loại chọn lọc để làm tăng thêm giá trị hoặc khả năng bán của hàng hóa thì trị giá hàng mua gồm cả chi phí gia công, sơ chế."},{"k":"p","t":"- Giá gốc của hàng hóa mua vào được tính theo từng nguồn nhập."},{"k":"p","t":"- Để tính giá trị hàng hóa xuất kho, kế toán có thể áp dụng một trong các phương pháp sau:"},{"k":"p","t":"+ Phương pháp nhập trước - xuất trước;"},{"k":"p","t":"+ Phương pháp giá thực tế đích danh;"},{"k":"p","t":"+ Phương pháp bình quân gia quyền sau mỗi lần nhập hoặc cuối kỳ."},{"k":"p","t":"- Một số đơn vị có đặc thù (ví dụ như các đơn vị kinh doanh siêu thị hoặc tương tự) có thể áp dụng kỹ thuật xác định giá trị hàng tồn kho cuối kỳ theo phương pháp giá bán lẻ. Theo phương pháp này, giá trị xuất kho của hàng hóa được xác định căn cứ vào giá bán của hàng tồn kho trừ đi lợi nhuận biên (do doanh nghiệp tự xác định) theo tỷ lệ phần trăm hợp lý. Tỷ lệ phần trăm này có tính việc các mặt hàng có thể bị hạ giá xuống thấp hơn giá bán ban đầu. Thông thường mỗi bộ phận bán lẻ sẽ sử dụng một tỷ lệ phần trăm bình quân riêng."},{"k":"p","t":"- Chi phí thu mua hàng hóa trong kỳ có thể được hạch toán trực tiếp vào giá gốc hàng tồn kho hoặc được phân bổ cho hàng hóa tiêu thụ trong kỳ và hàng hóa tồn kho cuối kỳ. Việc lựa chọn tiêu thức phân bổ chi phí thu mua hàng hóa tùy thuộc tình hình cụ thể của từng doanh nghiệp nhưng phải thực hiện theo nguyên tắc nhất quán."},{"k":"p","t":"d) Trường hợp mua hàng hóa được nhận kèm theo sản phẩm, hàng hóa, phụ tùng thay thế (đề phòng hỏng hóc), kế toán phải xác định và ghi nhận riêng sản phẩm, hàng hóa, phụ tùng thay thế theo giá trị hợp lý. Giá trị hàng hóa nhập kho là giá đã trừ giá trị sản phẩm, hàng hóa, thiết bị, phụ tùng thay thế."},{"k":"p","t":"đ) Kế toán chi tiết hàng hóa phải thực hiện theo từng kho, từng loại, từng nhóm hàng hóa."},{"k":"p","t":"e) Trường hợp doanh nghiệp là nhà phân phối hoạt động thương mại được nhận hàng hóa (không phải trả tiền) từ nhà sản xuất để quảng cáo, khuyến mại cho khách hàng mua hàng của nhà sản xuất, nhà phân phối"},{"k":"p","t":"- Khi nhận hàng của nhà sản xuất (không phải trả tiền) dùng để khuyến mại, quảng cáo cho khách hàng, doanh nghiệp phải theo dõi chi tiết số lượng hàng trong hệ thống quản trị nội bộ của mình và thuyết minh trên Bản thuyết minh Báo cáo tài chính đối với hàng nhận được và số hàng đã dùng để khuyến mại cho người mua."},{"k":"p","t":"- Khi hết chương trình khuyến mại, nếu không phải trả lại nhà sản xuất số hàng khuyến mại chưa sử dụng hết, kế toán ghi nhận giá trị số hàng khuyến mại không phải trả lại là thu nhập khác."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 156 - Hàng hóa"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá mua vào của hàng hóa theo hóa đơn mua hàng (bao gồm các loại thuế không được hoàn lại);"},{"k":"p","t":"- Chi phí thu mua hàng hóa;"},{"k":"p","t":"- Trị giá của hàng hóa thuê ngoài gia công (gồm giá mua vào và chi phí gia công);"},{"k":"p","t":"- Trị giá hàng hóa đã bán bị người mua trả lại;"},{"k":"p","t":"- Trị giá hàng hóa phát hiện thừa khi kiểm kê;"},{"k":"p","t":"- Trị giá hàng hóa bất động sản mua vào hoặc chuyển từ bất động sản đầu tư sang;"},{"k":"p","t":"- Kết chuyển giá trị hàng hóa tồn kho cuối kỳ (trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Trị giá của hàng hóa xuất kho để bán, giao đại lý, giao cho đơn vị hạch toán phụ thuộc; thuê ngoài gia công hoặc sử dụng cho sản xuất, kinh doanh;"},{"k":"p","t":"- Chi phí thu mua phân bổ cho hàng hóa đã bán trong kỳ;"},{"k":"p","t":"- Chiết khấu thương mại hàng mua được hưởng;"},{"k":"p","t":"- Các khoản giảm giá hàng mua được hưởng;"},{"k":"p","t":"- Trị giá hàng hóa trả lại cho người bán;"},{"k":"p","t":"- Trị giá hàng hóa phát hiện thiếu khi kiểm kê;"},{"k":"p","t":"- Trị giá hàng hóa bất động sản đã bán hoặc chuyển thành bất động sản đầu tư, bất động sản chủ sở hữu sử dụng hoặc tài sản cố định;"},{"k":"p","t":"- Kết chuyển giá trị hàng hóa tồn kho đầu kỳ (trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Số dư bên Nợ: Giá gốc của hàng hóa tồn kho."}]},{"id":"tt133_29","no":29,"code":"Điều 29","title":"Điều 29. Tài khoản 157 - Hàng gửi đi bán","shortTitle":"Tài khoản 157 - Hàng gửi đi bán","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Hàng gửi đi bán phản ánh trên Tài khoản 157 được thực hiện theo nguyên tắc giá gốc. Chỉ phản ánh vào Tài khoản 157 “Hàng gửi đi bán” trị giá của hàng hóa, thành phẩm đã gửi đi cho khách hàng, gửi bán đại lý, ký gửi, dịch vụ đã hoàn thành bàn giao cho khách hàng theo hợp đồng kinh tế hoặc đơn đặt hàng, nhưng chưa được xác định là đã bán (chưa được tính là doanh thu bán hàng trong kỳ đối với số hàng hóa, thành phẩm đã gửi đi, dịch vụ đã cung cấp cho khách hàng)."},{"k":"p","t":"b) Hàng hóa, thành phẩm phản ánh trên tài khoản này vẫn thuộc quyền sở hữu của doanh nghiệp, kế toán phải mở sổ chi tiết theo dõi từng loại hàng hóa, thành phẩm, từng lần gửi hàng từ khi gửi đi cho đến khi được xác định là đã bán."},{"k":"p","t":"c) Không phản ánh vào tài khoản này chi phí vận chuyển, bốc xếp,... chi hộ khách hàng. Tài khoản 157 có thể mở chi tiết để theo dõi từng loại hàng hóa, thành phẩm gửi đi bán, dịch vụ đã cung cấp cho từng khách hàng, cho từng cơ sở nhận đại lý."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 157 - Hàng gửi đi bán"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá hàng hóa, thành phẩm đã gửi cho khách hàng, gửi bán đại lý, ký gửi;"},{"k":"p","t":"- Trị giá dịch vụ đã cung cấp cho khách hàng nhưng chưa được xác định là đã bán;"},{"k":"p","t":"- Cuối kỳ kết chuyển trị giá hàng hóa, thành phẩm đã gửi đi bán chưa được xác định là đã bán cuối kỳ (trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Trị giá hàng hóa, thành phẩm gửi đi bán, dịch vụ đã cung cấp được xác định là đã bán;"},{"k":"p","t":"- Trị giá hàng hóa, thành phẩm, dịch vụ đã gửi đi bị khách hàng trả lại;"},{"k":"p","t":"- Đầu kỳ kết chuyển trị giá hàng hóa, thành phẩm đã gửi đi bán, dịch vụ đã cung cấp chưa được xác định là đã bán đầu kỳ (trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Trị giá hàng hóa, thành phẩm đã gửi đi, dịch vụ đã cung cấp chưa được xác định là đã bán trong kỳ."}]},{"id":"tt133_30","no":30,"code":"Điều 30","title":"Điều 30. Nguyên tắc kế toán tài sản cố định, bất động sản đầu tư và chi phí đầu tư xây dựng cơ bản dở dang","shortTitle":"Nguyên tắc kế toán tài sản cố định, bất động sản đầu tư và chi phí đầu tư xây dựng cơ bản dở dang","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Tài sản cố định, bất động sản đầu tư và chi phí đầu tư xây dựng cơ bản dở dang phải được theo dõi, quyết toán, quản lý và sử dụng theo đúng quy định của pháp luật hiện hành."},{"k":"p","t":"2. Kế toán phải theo dõi chi tiết nguồn hình thành TSCĐ để phân bổ hao mòn một cách phù hợp theo nguyên tắc:"},{"k":"p","t":"- Đối với TSCĐ hình thành từ nguồn vốn vay hoặc vốn chủ sở hữu phục vụ cho sản xuất, kinh doanh thì hao mòn được tính vào chi phí sản xuất, kinh doanh;"},{"k":"p","t":"- Đối với TSCĐ hình thành từ các Quỹ phúc lợi, Quỹ phát triển khoa học và công nghệ thì hao mòn được ghi giảm các quỹ đó."},{"k":"p","t":"3. Kế toán phân loại TSCĐ và BĐSĐT theo mục đích sử dụng. Trường hợp một tài sản được sử dụng cho nhiều mục đích, ví dụ một tòa nhà hỗn hợp vừa dùng để làm văn phòng làm việc vừa để cho thuê và một phần để bán thì kế toán phải thực hiện ước tính giá trị hợp lý của từng bộ phận để ghi nhận một cách phù hợp với mục đích sử dụng."},{"k":"p","t":"- Trường hợp một bộ phận trọng yếu của tài sản được sử dụng cho một mục đích cụ thể nào đó khác với mục đích sử dụng của các bộ phận còn lại thì kế toán căn cứ vào mức độ trọng yếu có thể phân loại toàn bộ tài sản theo bộ phận trọng yếu đó;"},{"k":"p","t":"- Trường hợp có sự thay đổi về chức năng sử dụng của các bộ phận của tài sản thì kế toán được tái phân loại tài sản theo mục đích sử dụng theo quy định về từng tài sản có liên quan."},{"k":"p","t":"4. Kế toán TSCĐ, BĐSĐT và chi phí đầu tư XDCB liên quan đến ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."}]},{"id":"tt133_31","no":31,"code":"Điều 31","title":"Điều 31. Tài khoản 211 - Tài sản cố định","shortTitle":"Tài khoản 211 - Tài sản cố định","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán:"},{"k":"p","t":"Tài khoản này dùng để phản ánh giá trị hiện có và tình hình biến động tăng, giảm nguyên giá của toàn bộ tài sản cố định hữu hình, tài sản cố định vô hình thuộc quyền sở hữu của doanh nghiệp và TSCĐ thuê tài chính."},{"k":"p","t":"1.1. Tài sản cố định là những tư liệu lao động được biểu hiện dưới hình thái vật chất hoặc phi vật chất, có đủ tiêu chuẩn TSCĐ theo qui định (Trừ trường hợp có qui định riêng đối với 1 số tài sản đặc thù)."},{"k":"p","t":"a) Tài sản cố định hữu hình là những tài sản có hình thái vật chất do doanh nghiệp nắm giữ để sử dụng cho hoạt động sản xuất, kinh doanh hoặc hoạt động khác phù hợp với tiêu chuẩn ghi nhận TSCĐ hữu hình."},{"k":"p","t":"Những tài sản hữu hình có kết cấu độc lập hoặc nhiều bộ phận tài sản riêng lẻ liên kết với nhau thành một hệ thống để cùng thực hiện một hay một số chức năng nhất định, nếu thiếu bất kỳ một bộ phận nào trong đó thì cả hệ thống không thể hoạt động được, nếu thỏa mãn đồng thời cả bốn tiêu chuẩn dưới đây thì được coi là tài sản cố định:"},{"k":"p","t":"- Chắc chắn thu được lợi ích kinh tế trong tương lai từ việc sử dụng tài sản đó;"},{"k":"p","t":"- Nguyên giá tài sản phải được xác định một cách tin cậy;"},{"k":"p","t":"- Có thời gian sử dụng từ 1 năm trở lên;"},{"k":"p","t":"- Có giá trị theo quy định hiện hành."},{"k":"p","t":"Trường hợp một hệ thống gồm nhiều bộ phận tài sản riêng lẻ liên kết với nhau, trong đó mỗi bộ phận cấu thành có thời gian sử dụng khác nhau và nếu thiếu một bộ phận nào đó mà cả hệ thống vẫn thực hiện được chức năng hoạt động chính của nó nhưng do yêu cầu quản lý, sử dụng tài sản cố định đòi hỏi phải quản lý riêng từng bộ phận tài sản và mỗi bộ phận tài sản đó nếu cùng thỏa mãn đồng thời bốn tiêu chuẩn của tài sản cố định thì được coi là một tài sản cố định hữu hình độc lập."},{"k":"p","t":"Đối với súc vật làm việc hoặc cho sản phẩm, nếu từng con súc vật thỏa mãn đồng thời bốn tiêu chuẩn của tài sản cố định đều được coi là một tài sản cố định hữu hình."},{"k":"p","t":"Đối với vườn cây lâu năm, nếu từng mảnh vườn cây, hoặc cây thỏa mãn đồng thời bốn tiêu chuẩn của tài sản cố định thì cũng được coi là một tài sản cố định hữu hình."},{"k":"p","t":"b) TSCĐ vô hình là những tài sản không có hình thái vật chất nhưng xác định được giá trị, do doanh nghiệp nắm giữ sử dụng trong sản xuất, kinh doanh, cung cấp dịch vụ hoặc cho các đối tượng khác thuê và phù hợp với tiêu chuẩn ghi nhận TSCĐ vô hình."},{"k":"p","t":"Khi một tài sản vô hình được thỏa mãn đồng thời 4 tiêu chuẩn quy định tại điểm a nêu trên thì được coi là TSCĐVH."},{"k":"p","t":"c) TSCĐ thuê tài chính"},{"k":"p","t":"- Thuê tài chính: Là hình thức thuê tài sản mà bên cho thuê có sự chuyển giao phần lớn rủi ro và lợi ích gắn liền với quyền sở hữu tài sản cho bên thuê. Quyền sở hữu tài sản có thể chuyển giao vào cuối thời hạn thuê."},{"k":"p","t":"- Các trường hợp thường dẫn đến hợp đồng thuê tài chính là:"},{"k":"p","t":"+ Bên cho thuê chuyển giao quyền sở hữu tài sản cho bên thuê khi hết thời hạn thuê;"},{"k":"p","t":"+ Tại thời điểm khởi đầu thuê tài sản, bên thuê có quyền lựa chọn mua lại tài sản thuê với mức giá ước tính thấp hơn giá trị hợp lý vào cuối thời hạn thuê;"},{"k":"p","t":"+ Thời hạn thuê tài sản tối thiểu phải chiếm phần lớn thời gian sử dụng kinh tế của tài sản cho dù không có sự chuyển giao quyền sở hữu;"},{"k":"p","t":"+ Tại thời điểm khởi đầu thuê tài sản, giá trị hiện tại của khoản thanh toán tiền thuê tối thiểu chiếm phần lớn (tương đương) giá trị hợp lý của tài sản thuê;"},{"k":"p","t":"+ Tài sản thuê thuộc loại chuyên dùng mà chỉ có bên thuê có khả năng sử dụng không cần có sự thay đổi, sửa chữa lớn nào."},{"k":"p","t":"- Hợp đồng thuê tài sản được coi là hợp đồng thuê tài chính nếu thỏa mãn ít nhất một trong ba (3) điều kiện sau:"},{"k":"p","t":"+ Nếu bên thuê hủy hợp đồng và đền bù tổn thất phát sinh liên quan đến việc hủy hợp đồng cho bên cho thuê;"},{"k":"p","t":"+ Thu nhập hoặc tổn thất do sự thay đổi giá trị hợp lý của giá trị còn lại của tài sản thuê gắn với bên thuê;"},{"k":"p","t":"+ Bên thuê có khả năng tiếp tục thuê lại tài sản sau khi hết hạn hợp đồng thuê với tiền thuê thấp hơn giá thuê thị trường. Riêng trường hợp thuê tài sản là quyền sử dụng đất thì thường được phân loại là thuê hoạt động."},{"k":"p","t":"- TSCĐ thuê tài chính là những TSCĐ chưa thuộc quyền sở hữu của doanh nghiệp nhưng doanh nghiệp có nghĩa vụ và trách nhiệm quản lý và sử dụng như tài sản của doanh nghiệp."},{"k":"p","t":"1.2. Giá trị TSCĐ phản ánh trên TK 211 theo nguyên giá. Kế toán phải theo dõi chi tiết nguyên giá của từng loại và từng TSCĐ. Tùy thuộc vào nguồn hình thành, nguyên giá TSCĐ được xác định như sau:"},{"k":"p","t":"1.2.1. TSCĐ hữu hình"},{"k":"p","t":"a) Nguyên giá TSCĐ hữu hình do mua sắm bao gồm: Giá mua (trừ các khoản được chiết khấu thương mại, giảm giá), các khoản thuế (không bao gồm các khoản thuế được hoàn lại) và các chi phí liên quan trực tiếp đến việc đưa tài sản vào trạng thái sẵn sàng sử dụng như chi phí chuẩn bị mặt bằng, chi phí vận chuyển và bốc xếp ban đầu, chi phí lắp đặt, chạy thử (trừ (-) các khoản thu hồi về sản phẩm, phế liệu do chạy thử), chi phí chuyên gia và các chi phí liên quan trực tiếp khác. Chi phí lãi vay phát sinh khi mua sắm TSCĐ đã hoàn thiện (TSCĐ sử dụng được ngay mà không cần qua quá trình lắp đặt, chạy thử đầu tư xây dựng) không được vốn hóa vào nguyên giá TSCĐ."},{"k":"p","t":"- Nguyên giá TSCĐ hữu hình mua sắm được thanh toán theo phương thức trả chậm: Là giá mua trả tiền ngay tại thời điểm mua cộng các chi phí liên quan trực tiếp tính đến thời điểm đưa tài sản vào trạng thái sẵn sàng sử dụng (không bao gồm các khoản thuế được hoàn lại). Khoản chênh lệch giữa giá mua trả chậm và giá mua trả tiền ngay được phân bổ dần vào chi phí sản xuất, kinh doanh theo kỳ hạn thanh toán."},{"k":"p","t":"- Nguyên giá TSCĐ là bất động sản: Khi mua sắm bất động sản, đơn vị phải tách riêng giá trị quyền sử dụng đất và tài sản trên đất theo quy định của pháp luật. Phần giá trị tài sản trên đất được ghi nhận là TSCĐ hữu hình; Giá trị quyền sử dụng đất được hạch toán là TSCĐ vô hình hoặc chi phí trả trước tùy từng trường hợp theo quy định của pháp luật."},{"k":"p","t":"b) Nguyên giá TSCĐ hữu hình hình thành do đầu tư xây dựng cơ bản hoàn thành"},{"k":"p","t":"- Nguyên giá TSCĐ theo phương thức giao thầu: Là giá quyết toán công trình xây dựng theo quy định, các chi phí khác có liên quan trực tiếp và lệ phí trước bạ (nếu có). Đối với tài sản cố định là con súc vật làm việc hoặc cho sản phẩm, vườn cây lâu năm thì nguyên giá là toàn bộ các chi phí thực tế đã chi ra cho con súc vật, vườn cây đó từ lúc hình thành cho tới khi đưa vào khai thác, sử dụng và các chi phí khác trực tiếp có liên quan."},{"k":"p","t":"- TSCĐ hữu hình tự xây dựng hoặc tự sản xuất:"},{"k":"p","t":"Nguyên giá TSCĐ hữu hình tự xây dựng là giá trị quyết toán công trình khi đưa vào sử dụng. Trường hợp TSCĐ đã đưa vào sử dụng nhưng chưa thực hiện quyết toán thì doanh nghiệp căn cứ vào chi phí đầu tư xây dựng thực tế để hạch toán tăng nguyên giá TSCĐ theo giá tạm tính. Sau khi quyết toán vốn đầu tư xây dựng cơ bản được duyệt, nếu có chênh lệch so với giá trị TSCĐ đã tạm tính thì kế toán điều chỉnh tăng, giảm vào nguyên giá TSCĐ."},{"k":"p","t":"Nguyên giá TSCĐ hữu hình tự sản xuất là giá thành thực tế của TSCĐ hữu hình cộng (+) các chi phí trực tiếp liên quan đến việc đưa TSCĐ vào trạng thái sẵn sàng sử dụng."},{"k":"p","t":"- Trong cả hai trường hợp trên, nguyên giá TSCĐ bao gồm cả chi phí lắp đặt, chạy thử trừ giá trị sản phẩm thu hồi trong quá trình chạy thử, sản xuất thử. Doanh nghiệp không được tính vào nguyên giá TSCĐ hữu hình các khoản lãi nội bộ và các khoản chi phí không hợp lý như nguyên liệu, vật liệu lãng phí, lao động hoặc các khoản chi phí khác sử dụng vượt quá mức bình thường trong quá trình tự xây dựng hoặc tự sản xuất."},{"k":"p","t":"c) Nguyên giá TSCĐ hữu hình mua dưới hình thức trao đổi với một TSCĐ hữu hình không tương tự hoặc tài sản khác, được xác định theo giá trị hợp lý của TSCĐ hữu hình nhận về hoặc giá trị hợp lý của tài sản đem trao đổi, sau khi điều chỉnh các khoản tiền hoặc tương đương tiền trả thêm hoặc thu về cộng các chi phí liên quan trực tiếp đến việc đưa tài sản vào trạng thái sẵn sàng sử dụng (không bao gồm các khoản thuế được hoàn lại)."},{"k":"p","t":"Nguyên giá TSCĐ hữu hình mua dưới hình thức trao đổi với một TSCĐ hữu hình tương tự, hoặc có thể hình thành do được bán để đổi lấy quyền sở hữu một tài sản tương tự (tài sản tương tự là tài sản có công dụng tương tự, trong cùng lĩnh vực kinh doanh và có giá trị tương đương). Trong trường hợp này không có bất kỳ khoản lãi hay lỗ nào được ghi nhận trong quá trình trao đổi. Nguyên giá TSCĐ nhận về được tính bằng giá trị còn lại của TSCĐ đem trao đổi."},{"k":"p","t":"d) Nguyên giá TSCĐ hữu hình được cấp, được điều chuyển đến bao gồm: Giá trị còn lại trên sổ kế toán tài sản cố định ở doanh nghiệp cấp, doanh nghiệp điều chuyển hoặc giá trị theo đánh giá thực tế của Hội đồng giao nhận hoặc tổ chức định giá chuyên nghiệp theo quy định của pháp luật và các chi phí liên quan trực tiếp như vận chuyển, bốc dỡ, chi phí nâng cấp, lắp đặt, chạy thử, lệ phí trước bạ (nếu có)... mà bên nhận tài sản phải chi ra tính đến thời điểm đưa TSCĐ vào trạng thái sẵn sàng sử dụng."},{"k":"p","t":"đ) Nguyên giá tài sản cố định hữu hình nhận góp vốn, nhận lại vốn góp là giá trị do các thành viên, cổ đông sáng lập định giá nhất trí hoặc doanh nghiệp và người góp vốn thỏa thuận hoặc do tổ chức chuyên nghiệp định giá theo quy định của pháp luật và được các thành viên, cổ đông sáng lập chấp thuận."},{"k":"p","t":"e) Nguyên giá tài sản cố định do phát hiện thừa, được tài trợ, biếu, tặng: Là giá trị theo đánh giá thực tế của Hội đồng giao nhận hoặc tổ chức định giá chuyên nghiệp; Các chi phí mà bên nhận phải chi ra tính đến thời điểm đưa TSCĐ vào trạng thái sẵn sàng sử dụng như: Chi phí vận chuyển, bốc dỡ, lắp đặt, chạy thử, lệ phí trước bạ (nếu có)."},{"k":"p","t":"1.2.2. Tài sản cố định thuê tài chính"},{"k":"p","t":"a) Nguyên giá của TSCĐ thuê tài chính được ghi nhận bằng giá trị hợp lý của tài sản thuê hoặc là giá trị hiện tại của khoản thanh toán tiền thuê tối thiểu (trường hợp giá trị hợp lý cao hơn giá trị hiện tại của khoản thanh toán tiền thuê tối thiểu) cộng với các chi phí trực tiếp phát sinh ban đầu liên quan đến hoạt động thuê tài chính. Nếu thuế GTGT đầu vào được khấu trừ thì giá trị hiện tại của khoản thanh toán tiền thuê tối thiểu không bao gồm số thuế GTGT phải trả cho bên cho thuê."},{"k":"p","t":"Khi tính giá trị hiện tại của khoản thanh toán tiền thuê tối thiểu cho việc thuê tài sản, doanh nghiệp có thể sử dụng tỷ lệ lãi suất ngầm định, tỷ lệ lãi suất được ghi trong hợp đồng thuê hoặc tỷ lệ lãi suất biên đi vay của bên thuê."},{"k":"p","t":"b) Số thuế GTGT đầu vào của tài sản thuê tài chính không được khấu trừ được hạch toán như sau:"},{"k":"p","t":"- Nếu thuế GTGT đầu vào được thanh toán một lần ngay tại thời điểm ghi nhận tài sản thuê thì nguyên giá tài sản thuê bao gồm cả thuế GTGT;"},{"k":"p","t":"- Nếu thuế GTGT đầu vào được thanh toán từng kỳ thì được ghi vào chi phí SXKD trong kỳ phù hợp với khoản mục chi phí khấu hao của tài sản thuê tài chính."},{"k":"p","t":"c) Khoản nợ thuê tài chính phản ánh trên TK 3412 không bao gồm thuế GTGT đầu vào."},{"k":"p","t":"d) Không phản ánh vào tài khoản này giá trị của TSCĐ thuê hoạt động."},{"k":"p","t":"1.2.3. TSCĐ vô hình"},{"k":"p","t":"Nguyên giá của TSCĐ vô hình là toàn bộ các chi phí mà doanh nghiệp phải bỏ ra để có được TSCĐ vô hình tính đến thời điểm đưa tài sản đó vào sử dụng theo dự kiến."},{"k":"p","t":"a) Nguyên giá của TSCĐ vô hình do mua sắm trả tiền ngay, mua dưới hình thức thanh toán trả chậm, trả góp, mua dưới hình thức trao đổi, TSCĐ vô hình được cho, được biếu, tặng, nhận vốn góp liên doanh, nhận lại vốn góp, do phát hiện thừa.... được xác định như quy định tại điểm 1.2.1 TSCĐ hữu hình."},{"k":"p","t":"b) TSCĐ vô hình hình thành từ việc trao đổi, thanh toán bằng chứng từ liên quan đến quyền sở hữu vốn của đơn vị, thì nguyên giá TSCĐ của nó là giá trị hợp lý của các công cụ được phát hành liên quan đến quyền sở hữu vốn của đơn vị."},{"k":"p","t":"c) Nguyên giá TSCĐ vô hình là quyền sử dụng đất là số tiền đã trả để có được quyền sử dụng đất hợp pháp (gồm chi phí đã trả cho tổ chức, cá nhân chuyển nhượng hoặc chi phí đền bù, giải phóng mặt bằng, san lấp mặt bằng, lệ phí trước bạ...) hoặc theo thỏa thuận của các bên khi góp vốn. Việc xác định TSCĐ vô hình là quyền sử dụng đất phải tuân thủ các quy định của pháp luật có liên quan."},{"k":"p","t":"d) Đối với chi phí thực tế phát sinh liên quan đến giai đoạn triển khai TSCĐ vô hình: Trường hợp xét thấy kết quả triển khai thỏa mãn được định nghĩa và tiêu chuẩn ghi nhận TSCĐ vô hình thì các chi phí giai đoạn triển khai được tập hợp vào TK 241 \"Xây dựng cơ bản dở dang\" (2412). Khi kết thúc giai đoạn triển khai các chi phí hình thành nguyên giá TSCĐ vô hình trong giai đoạn triển khai phải được kết chuyển vào bên Nợ tài khoản 2113 “TSCĐ vô hình\", nếu không đủ điều kiện ghi nhận là TSCĐ vô hình thì toàn bộ chi phí thực tế phát sinh được kết chuyển vào chi phí sản xuất kinh doanh trong kỳ hoặc được phân bổ theo quy định của pháp luật."},{"k":"p","t":"đ) Chi phí phát sinh đem lại lợi ích kinh tế trong tương lai cho doanh nghiệp gồm: chi phí thành lập doanh nghiệp, chi phí đào tạo nhân viên, chi phí quảng cáo phát sinh trong giai đoạn trước hoạt động của doanh nghiệp mới thành lập, chi phí chuyển dịch địa điểm được ghi nhận là chi phí SXKD trong kỳ theo quy định hiện hành."},{"k":"p","t":"e) Chi phí liên quan đến tài sản vô hình đã được doanh nghiệp ghi nhận là chi phí để xác định kết quả hoạt động kinh doanh trong kỳ trước đó thì không được tái ghi nhận vào nguyên giá TSCĐ vô hình."},{"k":"p","t":"g) Các nhãn hiệu, tên thương mại, quyền phát hành, danh sách khách hàng và các khoản mục tương tự được hình thành trong nội bộ doanh nghiệp không được ghi nhận là TSCĐ vô hình."},{"k":"p","t":"1.3. Việc tính và trích khấu hao tài sản cố định được thực hiện theo quy định của pháp luật hiện hành."},{"k":"p","t":"Đối với TSCĐ thuê tài chính, định kỳ, bên thuê có trách nhiệm tính, trích khấu hao tài sản cố định vào chi phí sản xuất, kinh doanh tùy theo bộ phận sử dụng tài sản cố định trên cơ sở áp dụng chính sách khấu hao nhất quán với chính sách khấu hao của tài sản cùng loại thuộc sở hữu của mình. Nếu không chắc chắn là bên thuê sẽ có quyền sở hữu tài sản thuê khi hết hạn hợp đồng thuê thì tài sản thuê sẽ được khấu hao theo thời hạn thuê nếu thời hạn thuê ngắn hơn thời gian sử dụng hữu ích của tài sản thuê."},{"k":"p","t":"1.4. Chi phí liên quan đến TSCĐ vô hình phát sinh sau khi ghi nhận ban đầu phải được ghi nhận là chi phí sản xuất, kinh doanh trong kỳ, trừ khi thỏa mãn đồng thời 2 điều kiện sau thì được ghi tăng nguyên giá TSCĐ vô hình:"},{"k":"p","t":"- Chi phí phát sinh có khả năng làm cho TSCĐ tạo ra lợi ích kinh tế trong tương lai nhiều hơn mức hoạt động được đánh giá ban đầu;"},{"k":"p","t":"- Chi phí được xác định một cách chắc chắn và gắn liền với TSCĐ vô hình cụ thể."},{"k":"p","t":"Riêng đối với chi phí phát sinh sau ghi nhận ban đầu liên quan đến các tài sản mua ngoài là nhãn hiệu hàng hóa, quyền phát hành, danh sách khách hàng và các khoản mục tương tự về bản chất luôn được ghi nhận là chi phí sản xuất, kinh doanh trong kỳ."},{"k":"p","t":"1.5. Trường hợp mua TSCĐ gồm có nhà cửa, vật kiến trúc gắn liền với quyền sử dụng đất thì phải xác định tách biệt giá trị nhà cửa, vật kiến trúc để ghi nhận vào nguyên giá TSCĐ hữu hình (TK 2111) và giá trị quyền sử dụng đất để ghi nhận vào nguyên giá TSCĐ vô hình (TK 2113)"},{"k":"p","t":"1.6. Doanh nghiệp chỉ thay đổi nguyên giá TSCĐ theo quy định của cơ chế tài chính hiện hành."},{"k":"p","t":"1.7. Mọi trường hợp tăng, giảm TSCĐ đều phải lập biên bản giao nhận, biên bản thanh lý TSCĐ và phải thực hiện các thủ tục quy định."},{"k":"p","t":"1.8. TSCĐ phải được theo dõi chi tiết cho từng đối tượng ghi TSCĐ, theo từng loại TSCĐ và địa điểm bảo quản, sử dụng, quản lý TSCĐ trên “Sổ Tài sản cố định”, cụ thể:"},{"k":"p","t":"- TSCĐ hữu hình, gồm: Nhà cửa, vật kiến trúc, máy móc, thiết bị, phương tiện truyền tải, truyền dẫn, thiết bị dụng cụ quản lý, cây lâu năm, súc vật làm việc và cho sản phẩm, các TSCĐ hữu hình khác."},{"k":"p","t":"- TSCĐ vô hình, gồm: Quyền phát hành; Bản quyền, bằng sáng chế; Nhãn hiệu hàng hóa; Phần mềm máy tính; Giấy phép và giấy phép nhượng quyền; TSCĐ vô hình khác."},{"k":"p","t":"1.9. Tài sản cố định của doanh nghiệp giảm, do nhượng bán, thanh lý, mất mát, phát hiện thiếu khi kiểm kê, điều chuyển cho doanh nghiệp khác, tháo dỡ một hoặc một số bộ phận... Trong mọi trường hợp giảm TSCĐ, kế toán phải làm đầy đủ thủ tục, xác định đúng những khoản thiệt hại và thu nhập (nếu có). Căn cứ các chứng từ liên quan, kế toán ghi sổ theo từng trường hợp cụ thể như sau:"},{"k":"p","t":"- Trường hợp nhượng bán TSCĐ dùng vào sản xuất, kinh doanh: TSCĐ nhượng bán thường là những TSCĐ không cần dùng hoặc xét thấy sử dụng không có hiệu quả. Khi nhượng bán TSCĐ phải làm đầy đủ các thủ tục cần thiết theo quy định của pháp luật."},{"k":"p","t":"- TSCĐ thanh lý là những TSCĐ hư hỏng không thể tiếp tục sử dụng được, những TSCĐ lạc hậu về kỹ thuật hoặc không phù hợp với yêu cầu sản xuất, kinh doanh. Khi có TSCĐ thanh lý, doanh nghiệp phải ra quyết định thanh lý, thành lập Hội đồng thanh lý TSCĐ. Hội đồng thanh lý TSCĐ có nhiệm vụ tổ chức thực hiện việc thanh lý TSCĐ theo đúng trình tự, thủ tục quy định và lập “Biên bản thanh lý TSCĐ\"."},{"k":"p","t":"Căn cứ vào Biên bản thanh lý và các chứng từ có liên quan đến các khoản thu, chi thanh lý TSCĐ,... kế toán ghi sổ như trường hợp nhượng bán TSCĐ."},{"k":"p","t":"1.10. Mọi trường hợp phát hiện thừa hoặc thiếu TSCĐ đều phải truy tìm nguyên nhân. Căn cứ vào \"Biên bản kiểm kê TSCĐ\" và kết luận của Hội đồng kiểm kê để hạch toán chính xác, kịp thời, theo từng nguyên nhân cụ thể:"},{"k":"p","t":"a) TSCĐ phát hiện thừa:"},{"k":"p","t":"- Nếu TSCĐ phát hiện thừa do để ngoài sổ sách (chưa ghi sổ), kế toán phải căn cứ vào hồ sơ TSCĐ để ghi tăng TSCĐ theo từng trường hợp cụ thể."},{"k":"p","t":"- Nếu TSCĐ phát hiện thừa được xác định là TSCĐ của doanh nghiệp khác thì phải báo ngay cho doanh nghiệp chủ tài sản đó biết. Trong thời gian chờ xử lý, kế toán phải căn cứ vào tài liệu kiểm kê, tạm thời theo dõi và giữ hộ."},{"k":"p","t":"- Nếu TSCĐ thừa không xác định được chủ sở hữu thì ghi tăng thu nhập khác theo giá trị hợp lý của tài sản."},{"k":"p","t":"b) TSCĐ phát hiện thiếu phải được truy cứu nguyên nhân, xác định người chịu trách nhiệm và xử lý theo quy định."},{"k":"p","t":"Căn cứ \"Biên bản xử lý TSCĐ thiếu\" đã được duyệt và hồ sơ TSCĐ, kế toán phải xác định nguyên giá, giá trị hao mòn của TSCĐ đó làm căn cứ ghi giảm TSCĐ và xử lý vật chất phần giá trị còn lại của TSCĐ. Tùy thuộc vào quyết định xử lý để hạch toán vào các tài khoản có liên quan."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 211 - Tài sản cố định"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Nguyên giá của TSCĐ tăng do mua sắm, do trao đổi TSCĐ, do XDCB hoàn thành bàn giao đưa vào sử dụng, do các đơn vị tham gia liên doanh góp vốn, do được tặng biếu, viện trợ..."},{"k":"p","t":"- Điều chỉnh tăng nguyên giá của TSCĐ do xây lắp, trang bị thêm hoặc do cải tạo nâng cấp, do đánh giá lại."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Nguyên giá của TSCĐ giảm do điều chuyển cho đơn vị khác, do đem đi trao đổi để lấy TSCĐ, do nhượng bán, thanh lý hoặc đem đi góp vốn vào đơn vị khác ..."},{"k":"p","t":"- Nguyên giá của TSCĐ giảm do tháo bớt một hoặc một số bộ phận do đánh giá lại giảm nguyên giá."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Nguyên giá TSCĐ hiện có cuối kỳ ở doanh nghiệp."},{"k":"p","t":"Tài khoản 211 - Tài sản cố định có 3 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 2111 - TSCĐ hữu hình: Dùng để phản ánh giá trị hiện có và tình hình biến động của toàn bộ TSCĐ hữu hình thuộc quyền sở hữu của doanh nghiệp theo nguyên giá."},{"k":"p","t":"- Tài khoản 2112 - TSCĐ thuê tài chính: Dùng để phản ánh nguyên giá TSCĐ doanh nghiệp đi thuê dài hạn theo phương thức thuê tài chính."},{"k":"p","t":"- Tài khoản 2113 - TSCĐ vô hình: Dùng để phản ánh giá trị hiện có và tình hình biến động của toàn bộ TSCĐ vô hình thuộc quyền sở hữu của doanh nghiệp theo nguyên giá."}]},{"id":"tt133_32","no":32,"code":"Điều 32","title":"Điều 32. Tài khoản 214 - Hao mòn tài sản cố định","shortTitle":"Tài khoản 214 - Hao mòn tài sản cố định","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình tăng, giảm giá trị hao mòn và giá trị hao mòn lũy kế của các loại TSCĐ và bất động sản đầu tư (BĐSĐT) trong quá trình sử dụng do trích khấu hao TSCĐ, BĐSĐT và những khoản tăng, giảm hao mòn khác của TSCĐ, BĐSĐT."},{"k":"p","t":"b) Về nguyên tắc, mọi TSCĐ, BĐSĐT dùng để cho thuê của doanh nghiệp có liên quan đến sản xuất, kinh doanh (gồm cả tài sản chưa dùng, không cần dùng, chờ thanh lý) đều phải trích khấu hao theo quy định hiện hành. Khấu hao TSCĐ dùng trong sản xuất, kinh doanh và khấu hao BĐSĐT được hạch toán vào chi phí sản xuất, kinh doanh trong kỳ; khấu hao TSCĐ, BĐSĐT chưa dùng, không cần dùng, chờ thanh lý thực hiện theo quy định của pháp luật hiện hành. Đối với TSCĐ dùng cho mục đích phúc lợi thì không phải trích khấu hao tính vào chi phí sản xuất, kinh doanh mà chỉ tính hao mòn TSCĐ và hạch toán giảm nguồn hình thành TSCĐ đó."},{"k":"p","t":"c) Căn cứ vào quy định của pháp luật và yêu cầu quản lý của doanh nghiệp để lựa chọn 1 trong các phương pháp tính, trích khấu hao theo quy định của pháp luật phù hợp cho từng TSCĐ, BĐSĐT nhằm kích thích sự phát triển sản xuất, kinh doanh, đảm bảo việc thu hồi vốn nhanh, đầy đủ và phù hợp với khả năng trang trải chi phí của doanh nghiệp."},{"k":"p","t":"Phương pháp khấu hao được áp dụng cho từng TSCĐ, BĐSĐT phải được thực hiện nhất quán và có thể được thay đổi khi có sự thay đổi đáng kể cách thức thu hồi lợi ích kinh tế của TSCĐ và BĐSĐT."},{"k":"p","t":"d) Thời gian khấu hao và phương pháp khấu hao TSCĐ phải được xem xét lại ít nhất là vào cuối mỗi năm tài chính. Nếu thời gian sử dụng hữu ích ước tính của tài sản khác biệt lớn so với các ước tính trước đó thì thời gian khấu hao phải được thay đổi tương ứng. Phương pháp khấu hao TSCĐ được thay đổi khi có sự thay đổi đáng kể cách thức ước tính thu hồi lợi ích kinh tế của TSCĐ. Trường hợp này, phải điều chỉnh chi phí khấu hao cho năm hiện hành, các năm tiếp theo và phải thuyết minh trong Báo cáo tài chính."},{"k":"p","t":"đ) Đối với các TSCĐ đã khấu hao hết (đã thu hồi đủ vốn) nhưng vẫn còn sử dụng vào hoạt động sản xuất, kinh doanh thì không được tiếp tục trích khấu hao. Các TSCĐ chưa tính đủ khấu hao (chưa thu hồi đủ vốn) mà đã hư hỏng, cần thanh lý thì phải xác định nguyên nhân, trách nhiệm của tập thể, cá nhân để xử lý bồi thường và phần giá trị còn lại của TSCĐ chưa thu hồi, không được bồi thường phải được bù đắp bằng số thu do thanh lý của chính TSCĐ đó, số tiền bồi thường do lãnh đạo doanh nghiệp quyết định. Nếu số thu thanh lý và số thu bồi thường không đủ bù đắp phần giá trị còn lại của TSCĐ chưa thu hồi, hoặc giá trị TSCĐ bị mất thì chênh lệch còn lại được coi là lỗ về thanh lý TSCĐ và kế toán vào chi phí khác."},{"k":"p","t":"e) Đối với TSCĐ vô hình, phải tùy thời gian phát huy hiệu quả để trích khấu hao tính từ khi TSCĐ được đưa vào sử dụng (theo hợp đồng, cam kết hoặc theo quyết định của cấp có thẩm quyền)."},{"k":"p","t":"g) Đối với TSCĐ thuê tài chính, trong quá trình sử dụng bên đi thuê phải trích khấu hao trong thời gian thuê theo hợp đồng tính vào chi phí sản xuất, kinh doanh, đảm bảo thu hồi đủ vốn."},{"k":"p","t":"h) Đối với BĐSĐT cho thuê hoạt động phải trích khấu hao và ghi nhận vào giá vốn hàng bán trong kỳ. Doanh nghiệp có thể dựa vào các BĐS chủ sở hữu sử dụng (TSCĐ) cùng loại để ước tính thời gian trích khấu hao và xác định phương pháp khấu hao BĐSĐT. Trường hợp BĐSĐT nắm giữ chờ tăng giá, doanh nghiệp không trích khấu hao mà xác định tổn thất do giảm giá trị. Khi có bằng chứng chắc chắn cho thấy BĐSĐT tăng giá trở lại thì doanh nghiệp được điều chỉnh tăng nguyên giá BĐSĐT nhưng tối đa không vượt quá nguyên giá ban đầu của BĐSĐT."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của tài khoản 214 - Hao mòn TSCĐ"},{"k":"p","t":"Bên Nợ: Giá trị hao mòn TSCĐ, BĐSĐT giảm do TSCĐ, BĐSĐT thanh lý, nhượng bán, điều động cho đơn vị hạch toán phụ thuộc, góp vốn đầu tư vào đơn vị khác,..."},{"k":"p","t":"Bên Có: Giá trị hao mòn TSCĐ, BĐSĐT tăng do trích khấu hao TSCĐ, BĐSĐT,..."},{"k":"p","t":"Số dư bên Có: Giá trị hao mòn lũy kế của TSCĐ, BĐSĐT hiện có cuối kỳ ở doanh nghiệp."},{"k":"p","t":"Tài khoản 214 - Hao mòn TSCĐ, có 4 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 2141 - Hao mòn TSCĐ hữu hình: Phản ánh giá trị hao mòn của TSCĐ hữu hình trong quá trình sử dụng do trích khấu hao TSCĐ và những khoản tăng, giảm hao mòn khác của TSCĐ hữu hình."},{"k":"p","t":"- Tài khoản 2142 - Hao mòn TSCĐ thuê tài chính: Phản ánh giá trị hao mòn của TSCĐ thuê tài chính trong quá trình sử dụng do trích khấu hao TSCĐ thuê tài chính và những khoản tăng, giảm hao mòn khác của TSCĐ thuê tài chính."},{"k":"p","t":"- Tài khoản 2143 - Hao mòn TSCĐ vô hình: Phản ánh giá trị hao mòn của TSCĐ vô hình trong quá trình sử dụng do trích khấu hao TSCĐ vô hình và những khoản làm tăng, giảm hao mòn khác của TSCĐ vô hình."},{"k":"p","t":"- Tài khoản 2147 - Hao mòn BĐSĐT: Tài khoản này phản ánh giá trị hao mòn BĐSĐT trong quá trình cho thuê hoạt động và những khoản làm tăng, giảm hao mòn khác của BĐSĐT."}]},{"id":"tt133_33","no":33,"code":"Điều 33","title":"Điều 33. Tài khoản 217 - Bất động sản đầu tư","shortTitle":"Tài khoản 217 - Bất động sản đầu tư","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm bất động sản đầu tư (BĐSĐT) của doanh nghiệp theo nguyên giá, được theo dõi chi tiết theo từng đối tượng tương tự như TSCĐ. BĐSĐT gồm: Quyền sử dụng đất, nhà hoặc một phần của nhà hoặc cả nhà và đất, cơ sở hạ tầng do người chủ sở hữu hoặc người đi thuê tài sản theo hợp đồng thuê tài chính nắm giữ nhằm mục đích thu lợi từ việc cho thuê hoặc chờ tăng giá mà không phải để:"},{"k":"p","t":"- Sử dụng trong sản xuất, cung cấp hàng hóa, dịch vụ hoặc sử dụng cho các mục đích quản lý; hoặc"},{"k":"p","t":"- Bán trong kỳ sản xuất, kinh doanh thông thường."},{"k":"p","t":"1.2. Tài khoản này dùng để phản ánh giá trị BĐS đủ tiêu chuẩn ghi nhận là BĐSĐT. Không phản ánh vào tài khoản này giá trị bất động sản mua về để bán trong kỳ hoạt động kinh doanh bình thường hoặc xây dựng để bán trong tương lai gần, bất động sản chủ sở hữu sử dụng, bất động sản trong quá trình xây dựng chưa hoàn thành với mục đích để sử dụng trong tương lai dưới dạng BĐSĐT."},{"k":"p","t":"Bất động sản đầu tư được ghi nhận là tài sản phải thỏa mãn đồng thời hai điều kiện sau:"},{"k":"p","t":"- Chắc chắn thu được lợi ích kinh tế trong tương lai;"},{"k":"p","t":"- Nguyên giá phải được xác định một cách đáng tin cậy."},{"k":"p","t":"1.3. Bất động sản đầu tư được ghi nhận trên tài khoản này theo nguyên giá. Nguyên giá của BĐSĐT là toàn bộ các chi phí (tiền hoặc tương đương tiền) mà doanh nghiệp bỏ ra hoặc giá trị hợp lý của các khoản khác đưa đi trao đổi để có được BĐSĐT tính đến thời điểm mua hoặc xây dựng hoàn thành BĐSĐT đó."},{"k":"p","t":"- Tùy thuộc vào từng trường hợp, nguyên giá của BĐSĐT được xác định như sau:"},{"k":"p","t":"+ Nguyên giá của BĐSĐT được mua bao gồm giá mua và các chi phí liên quan trực tiếp đến việc mua, như: Phí dịch vụ tư vấn, lệ phí trước bạ và chi phí giao dịch liên quan khác,..."},{"k":"p","t":"+ Trường hợp mua BĐSĐT thanh toán theo phương thức trả chậm, nguyên giá của BĐSĐT được phản ánh theo giá mua trả tiền ngay tại thời điểm mua. Khoản chênh lệch giữa giá mua trả chậm và giá mua trả tiền ngay được hạch toán vào chi phí tài chính theo kỳ hạn thanh toán, trừ khi số chênh lệch đó được tính vào nguyên giá BĐSĐT;"},{"k":"p","t":"+ Nguyên giá của BĐSĐT tự xây dựng là giá thành thực tế và các chi phí liên quan trực tiếp của BĐSĐT tính đến ngày hoàn thành công việc xây dựng;"},{"k":"p","t":"- Các chi phí sau không được tính vào nguyên giá của BĐSĐT:"},{"k":"p","t":"+ Chi phí phát sinh ban đầu (trừ trường hợp các chi phí này là cần thiết để đưa BĐSĐT vào trạng thái sẵn sàng sử dụng);"},{"k":"p","t":"+ Các chi phí khi mới đưa BĐSĐT vào hoạt động lần đầu trước khi BĐSĐT đạt tới trạng thái hoạt động bình thường theo dự kiến."},{"k":"p","t":"1.4. Các chi phí liên quan đến BĐSĐT phát sinh sau ghi nhận ban đầu phải được ghi nhận là chi phí sản xuất, kinh doanh trong kỳ, trừ khi chi phí này có khả năng chắc chắn làm cho BĐSĐT tạo ra lợi ích kinh tế trong tương lai nhiều hơn mức hoạt động được đánh giá ban đầu thì được ghi tăng nguyên giá BĐSĐT."},{"k":"p","t":"1.5. Trong quá trình cho thuê hoạt động phải tiến hành trích khấu hao BĐSĐT và ghi nhận vào giá vốn hàng bán trong kỳ (kể cả trong thời gian ngừng cho thuê). Doanh nghiệp có thể dựa vào các bất động sản chủ sở hữu sử dụng cùng loại để ước tính thời gian trích khấu hao và xác định phương pháp khấu hao của BĐSĐT."},{"k":"p","t":"- Trường hợp doanh nghiệp ghi nhận doanh thu đối với toàn bộ số tiền nhận trước từ việc cho thuê BĐSĐT, kế toán phải ước tính đầy đủ giá vốn tương ứng với doanh thu được ghi nhận (bao gồm cả số khấu hao được tính trước)."},{"k":"p","t":"- Giá vốn của BĐSĐT cho thuê bao gồm: Chi phí khấu hao BĐSĐT và các chi phí liên quan trực tiếp khác tới việc cho thuê, như: Chi phí dịch vụ mua ngoài, chi phí tiền lương nhân viên trực tiếp quản lý bất động sản cho thuê, chi phí khấu hao các công trình phụ trợ phục vụ việc cho thuê BĐSĐT."},{"k":"p","t":"1.6. Doanh nghiệp không trích khấu hao đối với BĐSĐT nắm giữ chờ tăng giá. Trường hợp có bằng chứng chắc chắn cho thấy BĐSĐT bị giảm giá so với giá thị trường và khoản giảm giá được xác định một cách đáng tin cậy thì doanh nghiệp được đánh giá giảm nguyên giá BĐSĐT và ghi nhận khoản tổn thất vào giá vốn hàng bán (tương tự như việc lập dự phòng đối với hàng hóa bất động sản)."},{"k":"p","t":"1.7. Đối với những BĐSĐT được mua vào nhưng phải tiến hành xây dựng, cải tạo, nâng cấp trước khi sử dụng cho mục đích đầu tư thì giá trị bất động sản, chi phí mua sắm và chi phí cho quá trình xây dựng, cải tạo, nâng cấp BĐSĐT được phản ánh trên TK 241 “Xây dựng cơ bản dở dang”. Khi quá trình xây dựng, cải tạo, nâng cấp hoàn thành phải xác định nguyên giá BĐSĐT hoàn thành để kết chuyển vào TK 217 “Bất động sản đầu tư”."},{"k":"p","t":"1.8. Việc chuyển từ bất động sản chủ sở hữu sử dụng thành BĐSĐT hoặc từ BĐSĐT sang bất động sản chủ sở hữu sử dụng hay hàng tồn kho chỉ khi có sự thay đổi về mục đích sử dụng như các trường hợp sau:"},{"k":"p","t":"- BĐSĐT chuyển thành bất động sản chủ sở hữu sử dụng khi chủ sở hữu bắt đầu sử dụng tài sản này;"},{"k":"p","t":"- BĐSĐT chuyển thành hàng tồn kho khi chủ sở hữu bắt đầu triển khai cho mục đích bán;"},{"k":"p","t":"- Bất động sản chủ sở hữu sử dụng chuyển thành BĐSĐT khi chủ sở hữu kết thúc sử dụng tài sản đó và khi bên khác thuê hoạt động;"},{"k":"p","t":"- Hàng tồn kho chuyển thành BĐSĐT khi chủ sở hữu bắt đầu cho bên khác thuê hoạt động;"},{"k":"p","t":"- Bất động sản xây dựng chuyển thành BĐSĐT khi kết thúc giai đoạn xây dựng, bàn giao đưa vào đầu tư."},{"k":"p","t":"Việc chuyển đổi mục đích sử dụng giữa BĐSĐT với bất động sản chủ sở hữu sử dụng hoặc hàng tồn kho không làm thay đổi giá trị ghi sổ của tài sản được chuyển đổi và không làm thay đổi nguyên giá của bất động sản trong việc xác định giá trị hay để lập Báo cáo tài chính."},{"k":"p","t":"1.9. Khi doanh nghiệp quyết định bán một BĐSĐT mà không có giai đoạn sửa chữa, cải tạo nâng cấp thì doanh nghiệp vẫn tiếp tục ghi nhận là BĐSĐT trên TK 217 \"Bất động sản đầu tư\" cho đến khi BĐSĐT đó được bán mà không chuyển thành hàng tồn kho."},{"k":"p","t":"1.10. Doanh thu từ việc bán BĐSĐT được ghi nhận là giá bán chưa có thuế GTGT (đối với trường hợp doanh nghiệp nộp thuế GTGT tính theo phương pháp khấu trừ) hoặc tổng giá thanh toán (đối với trường hợp doanh nghiệp nộp thuế GTGT theo phương pháp trực tiếp). Trường hợp bán theo phương thức trả chậm thì doanh thu được xác định ban đầu theo giá bán trả tiền ngay. Khoản chênh lệch giữa tổng số tiền phải thanh toán và giá bán trả tiền ngay được ghi nhận là doanh thu tiền lãi chưa thực hiện."},{"k":"p","t":"1.11. Ghi giảm BĐSĐT trong các trường hợp:"},{"k":"p","t":"- Chuyển đổi mục đích sử dụng từ BĐSĐT sang hàng tồn kho hoặc bất động sản chủ sở hữu sử dụng;"},{"k":"p","t":"- Bán, thanh lý BĐSĐT;"},{"k":"p","t":"- Hết thời hạn thuê tài chính trả lại BĐSĐT cho bên cho thuê."},{"k":"p","t":"1.12. Doanh nghiệp xây dựng danh mục BĐSĐT nắm giữ cho thuê hoặc chờ tăng giá và thực hiện chính sách khấu hao hoặc xác định tổn thất một cách nhất quán trong năm tài chính."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 217 - Bất động sản đầu tư"},{"k":"p","t":"Bên Nợ: Nguyên giá BĐSĐT tăng trong kỳ."},{"k":"p","t":"Bên Có: Nguyên giá BĐSĐT giảm trong kỳ."},{"k":"p","t":"Số dư bên Nợ: Nguyên giá BĐSĐT hiện có cuối kỳ."}]},{"id":"tt133_34","no":34,"code":"Điều 34","title":"Điều 34. Tài khoản 228 - Đầu tư góp vốn vào đơn vị khác","shortTitle":"Tài khoản 228 - Đầu tư góp vốn vào đơn vị khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh các khoản đầu tư góp vốn vào đơn vị khác và tình hình thu hồi các khoản đầu tư góp vốn vào đơn vị khác của doanh nghiệp."},{"k":"p","t":"Các khoản đầu tư góp vốn vào đơn vị khác của doanh nghiệp gồm:"},{"k":"p","t":"a) Các khoản vốn góp liên doanh, liên kết:"},{"k":"p","t":"- Tài khoản này dùng để phản ánh toàn bộ vốn góp vào công ty liên doanh và công ty liên kết; tình hình thu hồi vốn đầu tư liên doanh, liên kết. Tài khoản này không phản ánh các giao dịch dưới hình thức hợp đồng hợp tác kinh doanh không thành lập pháp nhân."},{"k":"p","t":"- Công ty liên doanh được thành lập bởi các bên góp vốn liên doanh có quyền đồng kiểm soát các chính sách tài chính và hoạt động, là đơn vị có tư cách pháp nhân hạch toán độc lập. Công ty liên doanh phải tổ chức thực hiện công tác kế toán riêng theo quy định của pháp luật hiện hành về kế toán, chịu trách nhiệm kiểm soát tài sản, các khoản nợ phải trả, doanh thu, thu nhập khác và chi phí phát sinh tại đơn vị mình. Mỗi bên góp vốn liên doanh được hưởng một phần kết quả hoạt động của công ty liên doanh theo thỏa thuận của hợp đồng liên doanh."},{"k":"p","t":"- Khoản đầu tư được phân loại là đầu tư vào công ty liên kết khi nhà đầu tư nắm giữ trực tiếp hoặc gián tiếp từ 20% đến dưới 50% quyền biểu quyết của bên nhận đầu tư mà không có thỏa thuận khác hoặc nhà đầu tư có ảnh hưởng đáng kể với bên được đầu tư."},{"k":"p","t":"- Khi nhà đầu tư không còn quyền đồng kiểm soát thì phải ghi giảm khoản đầu tư vào công ty liên doanh; Khi không còn ảnh hưởng đáng kể hoặc tỷ lệ nắm giữ quyền biểu quyết đối với bên nhận đầu tư không đảm bảo theo tỷ lệ quy định nêu trên thì phải ghi giảm khoản đầu tư vào công ty liên kết."},{"k":"p","t":"- Các khoản chi phí liên quan trực tiếp tới hoạt động bán hoặc thanh lý khoản đầu tư vào công ty liên doanh, liên kết được ghi nhận là chi phí tài chính trong kỳ phát sinh."},{"k":"p","t":"- Khi thanh lý, nhượng bán, thu hồi vốn góp liên doanh, liên kết, căn cứ vào giá trị tài sản thu hồi được kế toán ghi giảm số vốn đã góp. Phần chênh lệch giữa giá trị hợp lý của khoản thu hồi được so với giá trị ghi sổ của khoản đầu tư được ghi nhận là doanh thu hoạt động tài chính (nếu lãi) hoặc chi phí tài chính (nếu lỗ)."},{"k":"p","t":"b) Đầu tư khác: Bao gồm các khoản đầu tư vào công cụ vốn của đơn vị khác nhưng không có quyền đồng kiểm soát, không có ảnh hưởng đáng kể đối với bên được đầu tư và các khoản đầu tư khác như vàng, bạc, kim khí quý, đá quý không được phân loại là hàng tồn kho."},{"k":"p","t":"1.2. Giá phí các khoản đầu tư được phản ánh theo giá gốc, bao gồm giá mua cộng (+) các chi phí liên quan trực tiếp đến việc đầu tư (nếu có), như: Chi phí giao dịch, môi giới, tư vấn, kiểm toán, lệ phí, thuế và phí ngân hàng... Trường hợp đầu tư bằng tài sản phi tiền tệ, giá phí khoản đầu tư được ghi nhận theo giá trị hợp lý của tài sản phi tiền tệ tại thời điểm phát sinh."},{"k":"p","t":"1.3. Trường hợp nhà đầu tư mua lại phần vốn góp tại công ty liên doanh, liên kết: Tại ngày mua, nhà đầu tư xác định và phản ánh giá phí khoản đầu tư vào công ty liên doanh, liên kết bao gồm: Giá trị hợp lý tại ngày diễn ra trao đổi của các tài sản đem trao đổi, các khoản nợ phải trả đã phát sinh hoặc đã thừa nhận và các công cụ vốn do bên mua phát hành để đổi lấy quyền đồng kiểm soát tại công ty liên doanh và ảnh hưởng đáng kể tại công ty liên kết cộng (+) các chi phí liên quan trực tiếp đến việc mua lại phần vốn góp tại công ty liên doanh, liên kết."},{"k":"p","t":"1.4. Việc đầu tư có thể thực hiện dưới các hình thức:"},{"k":"p","t":"a) Đầu tư dưới hình thức góp vốn vào đơn vị khác (do bên được đầu tư huy động vốn): Theo hình thức này, tài sản của bên góp vốn được ghi nhận vào Báo cáo tình hình tài chính của bên nhận vốn góp."},{"k":"p","t":"b) Đầu tư dưới hình thức mua lại phần vốn góp tại đơn vị khác (mua lại phần vốn của chủ sở hữu): Theo hình thức này, tài sản của bên mua (bên đầu tư, nhận chuyển nhượng vốn góp) được chuyển cho bên bán (bên chuyển nhượng vốn góp) mà không được ghi nhận vào Báo cáo tình hình tài chính của đơn vị phát hành công cụ vốn (bên được đầu tư)."},{"k":"p","t":"1.5. Khi thực hiện đầu tư bằng tài sản phi tiền tệ, nhà đầu tư phải căn cứ vào hình thức đầu tư để áp dụng phương pháp kế toán một cách phù hợp, cụ thể:"},{"k":"p","t":"a) Nếu đầu tư dưới hình thức góp vốn bằng tài sản phi tiền tệ, nhà đầu tư phải đánh giá lại tài sản mang đi góp vốn trên cơ sở thỏa thuận. Phần chênh lệch giữa giá trị ghi sổ hoặc giá trị còn lại và giá trị đánh giá lại của tài sản mang đi góp vốn được kế toán là thu nhập khác hoặc chi phí khác."},{"k":"p","t":"b) Nếu đầu tư dưới hình thức mua lại phần vốn góp của đơn vị khác và thanh toán cho bên chuyển nhượng vốn bằng tài sản phi tiền tệ:"},{"k":"p","t":"- Nếu tài sản phi tiền tệ dùng để thanh toán là hàng tồn kho, nhà đầu tư phải kế toán như giao dịch bán hàng tồn kho dưới hình thức hàng đổi hàng (ghi nhận doanh thu, giá vốn của hàng tồn kho mang đi trao đổi lấy phần vốn được mua);"},{"k":"p","t":"- Nếu tài sản phi tiền tệ dùng để thanh toán là TSCĐ, BĐSĐT, nhà đầu tư phải kế toán như giao dịch nhượng bán TSCĐ, BĐSĐT (ghi nhận doanh thu, thu nhập khác, giá vốn, chi phí khác....);"},{"k":"p","t":"- Nếu tài sản phi tiền tệ dùng để thanh toán là các khoản đầu tư vào công cụ vốn (cổ phiếu) hoặc công cụ nợ (trái phiếu, các khoản phải thu...) của đơn vị khác, nhà đầu tư phải kế toán như giao dịch thanh lý, nhượng bán các khoản đầu tư (ghi nhận lãi, lỗ vào doanh thu hoạt động tài chính hoặc chi phí tài chính)."},{"k":"p","t":"1.6. Kế toán phải mở sổ chi tiết theo dõi từng khoản đầu tư vào đơn vị khác theo từng đối tượng. Thời điểm ghi nhận các khoản đầu tư góp vốn vào đơn vị khác là thời điểm nhà đầu tư chính thức có quyền sở hữu, cụ thể như sau:"},{"k":"p","t":"- Chứng khoán niêm yết được ghi nhận tại thời điểm khớp lệnh (T+0);"},{"k":"p","t":"- Chứng khoán chưa niêm yết, các khoản đầu tư dưới hình thức khác được ghi nhận tại thời điểm chính thức có quyền sở hữu theo quy định của pháp luật."},{"k":"p","t":"1.7. Nhà đầu tư phải hạch toán đầy đủ, kịp thời các khoản cổ tức, lợi nhuận được chia vào Báo cáo tài chính riêng tại thời điểm được quyền nhận. Cổ tức, lợi nhuận được chia trong một số trường hợp được hạch toán như sau:"},{"k":"p","t":"a) Cổ tức, lợi nhuận được chia bằng tiền hoặc tài sản phi tiền tệ cho giai đoạn sau ngày đầu tư được hạch toán vào doanh thu hoạt động tài chính theo giá trị hợp lý tại ngày được quyền nhận;"},{"k":"p","t":"b) Cổ tức, lợi nhuận được chia bằng tiền hoặc tài sản phi tiền tệ cho giai đoạn trước ngày đầu tư không hạch toán vào doanh thu hoạt động tài chính mà hạch toán giảm giá trị khoản đầu tư."},{"k":"p","t":"c) Trường hợp nhận cổ tức bằng cổ phiếu thì thực hiện theo nguyên tắc: chỉ theo dõi số lượng cổ phiếu được nhận trên thuyết minh Báo cáo tài chính, không ghi nhận tăng giá trị khoản đầu tư và doanh thu hoạt động tài chính."},{"k":"p","t":"1.8. Giá vốn các khoản đầu tư tài chính khi thanh lý, nhượng bán được xác định theo phương pháp bình quân gia quyền tính cho các khoản đầu tư tại từng đối tượng."},{"k":"p","t":"1.9. Khi lập Báo cáo tài chính, doanh nghiệp phải xác định giá trị khoản đầu tư bị tổn thất để trích lập dự phòng tổn thất đầu tư vào đơn vị khác."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 228 - Đầu tư góp vốn vào đơn vị khác:"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số vốn góp liên doanh đã góp vào cơ sở kinh doanh đồng kiểm soát tăng;"},{"k":"p","t":"- Giá gốc khoản đầu tư vào công ty liên kết tăng;"},{"k":"p","t":"- Giá trị các khoản đầu tư khác tăng."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số vốn góp liên doanh vào cơ sở kinh doanh đồng kiểm soát giảm do đã thu hồi, chuyển nhượng dẫn đến không còn quyền đồng kiểm soát đối với bên được đầu tư;"},{"k":"p","t":"- Giá gốc khoản đầu tư vào công ty liên kết giảm do nhận lại vốn đầu tư hoặc thu được các khoản lợi ích ngoài lợi nhuận được chia;"},{"k":"p","t":"- Giá gốc khoản đầu tư vào công ty liên kết giảm do bán, thanh lý toàn bộ hoặc một phần khoản đầu tư và không còn ảnh hưởng đáng kể đối với bên được đầu tư;"},{"k":"p","t":"- Giá trị các khoản đầu tư khác giảm."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"- Số vốn góp liên doanh vào cơ sở kinh doanh đồng kiểm soát hiện còn cuối kỳ;"},{"k":"p","t":"- Giá gốc khoản đầu tư vào công ty liên kết hiện đang nắm giữ cuối kỳ;"},{"k":"p","t":"- Giá trị khoản đầu tư khác hiện có cuối kỳ."},{"k":"p","t":"Tài khoản 228 - Đầu tư góp vốn vào đơn vị khác, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 2281 - Đầu tư vào công ty liên doanh, liên kết: Phản ánh toàn bộ vốn góp vào công ty liên doanh, liên kết; tình hình thu hồi vốn đầu tư vào công ty liên doanh, liên kết."},{"k":"p","t":"- Tài khoản 2288 - Đầu tư khác: Phản ánh giá trị hiện có và tình hình biến động tăng, giảm các loại đầu tư vào công cụ vốn của đơn vị khác nhưng không có quyền kiểm soát hoặc đồng kiểm soát, không có ảnh hưởng đáng kể đối với bên được đầu tư và các khoản đầu tư khác như vàng, bạc, kim khí quý… không được phân loại là hàng tồn kho."}]},{"id":"tt133_35","no":35,"code":"Điều 35","title":"Điều 35. Kế toán giao dịch hợp đồng hợp tác kinh doanh","shortTitle":"Kế toán giao dịch hợp đồng hợp tác kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Hợp đồng hợp tác kinh doanh (BCC) là thỏa thuận bằng hợp đồng của hai hoặc nhiều bên để cùng thực hiện hoạt động kinh tế nhưng không hình thành pháp nhân độc lập. Hoạt động này có thể được đồng kiểm soát bởi các bên góp vốn theo thỏa thuận liên doanh hoặc kiểm soát bởi một trong số các bên tham gia."},{"k":"p","t":"1.2. BCC có thể được thực hiện dưới hình thức cùng nhau xây dựng tài sản hoặc hợp tác trong một số hoạt động kinh doanh. Các bên tham gia trong BCC có thể thỏa thuận chia doanh thu, chia sản phẩm hoặc chia lợi nhuận sau thuế."},{"k":"p","t":"1.3. Trong mọi trường hợp, khi nhận tiền, tài sản của các bên khác đóng góp cho hoạt động BCC, bên nhận phải kế toán là nợ phải trả, không được ghi nhận vào vốn chủ sở hữu."},{"k":"p","t":"1.4. Đối với BCC theo hình thức tài sản đồng kiểm soát"},{"k":"p","t":"a) Tài sản đồng kiểm soát bởi các bên tham gia liên doanh là tài sản được các bên tham gia liên doanh mua, xây dựng, được sử dụng cho mục đích của liên doanh và mang lại lợi ích cho các bên tham gia liên doanh theo quy định của Hợp đồng liên doanh. Các bên tham gia liên doanh được ghi nhận phần giá trị tài sản đồng kiểm soát mà mình được hưởng là tà
