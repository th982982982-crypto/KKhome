<title>Thông tư 133/2016/TT-BTC — Kế toán DN Nhỏ và Vừa</title>
<style>
:root{--bg:#0e1220;--pan:#141a30;--pan2:#1a2138;--pri:#5b8cff;--mut:#8a93b2;--tx:#e6ebf7;--line:#2a3354;--sw:300px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.tb{background:linear-gradient(135deg,#141a30,#1a2138);color:#fff;padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:1px solid var(--line)}
.tb-logo{font-size:16px;font-weight:700;line-height:1.2;white-space:nowrap;flex-shrink:0}
.tb-logo small{font-size:9px;font-weight:400;opacity:.6;display:block}
.tb-search{flex:1;max-width:340px;position:relative}
.tb-search input{width:100%;padding:7px 12px 7px 32px;border-radius:18px;border:1px solid var(--line);background:#0b0f1c;color:#fff;font-size:12.5px;outline:none}
.tb-search input::placeholder{color:var(--mut)}
.tb-search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.6;font-size:13px}
.tabs{display:flex;gap:2px;background:rgba(0,0,0,.3);border-radius:8px;padding:2px;flex-shrink:0;margin-left:auto}
.tab{padding:5px 11px;border-radius:6px;border:none;cursor:pointer;font-size:11.5px;font-weight:600;background:transparent;color:var(--mut);transition:.15s;white-space:nowrap}
.tab.on{background:var(--pri);color:#fff}
.wrap{display:flex;padding-top:54px;min-height:100vh}
.sb{width:var(--sw);background:var(--pan);border-right:1px solid var(--line);position:fixed;top:54px;bottom:0;left:0;overflow-y:auto;z-index:90;padding:8px 0}
.sb::-webkit-scrollbar{width:5px}.sb::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.ns{padding:6px 14px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--pri)}
.ni{display:flex;align-items:flex-start;gap:7px;padding:6px 14px;cursor:pointer;font-size:12.5px;color:var(--mut);border-left:3px solid transparent;transition:.12s;line-height:1.4}
.ni:hover{background:var(--pan2);color:var(--tx)}
.ni.on{background:rgba(91,140,255,.12);color:#9fc0ff;border-left-color:var(--pri);font-weight:600}
.ni .dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:6px}
.main{margin-left:var(--sw);flex:1;padding:24px 32px 70px;max-width:1000px}
.sec{display:none}.sec.on{display:block}
.bc{font-size:11.5px;color:var(--mut);margin-bottom:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.bc b{color:#bcd0ff;font-weight:600}
.at{font-size:21px;font-weight:800;color:#fff;margin-bottom:18px;line-height:1.3;padding-bottom:12px;border-bottom:1px solid var(--line)}
.ac p{margin-bottom:9px;line-height:1.75;font-size:14px;color:#cfd6f5}
/* content rendering — giống TT99 */
.p-num{font-weight:800;color:#fff;margin-top:22px;font-size:16px}
.p-sub{font-weight:700;color:#bcd0ff;margin-top:14px;font-size:14px}
.p-dash{margin-left:16px;color:#cfd6f5;font-size:13.5px;margin-bottom:6px;line-height:1.7}
.tk{font-weight:700;color:#9fc0ff}
.lbl{display:inline-block;font-weight:800;font-size:12.5px;padding:4px 14px;border-radius:8px;margin:16px 0 6px}
.lbl-no{background:rgba(91,140,255,.16);color:#9fc0ff;border:1px solid rgba(91,140,255,.4)}
.lbl-co{background:rgba(255,184,77,.14);color:#ffce8a;border:1px solid rgba(255,184,77,.4)}
.lbl-du{background:rgba(39,200,155,.14);color:#7df0cf;border:1px solid rgba(39,200,155,.4)}
.je{border:1px solid var(--line);border-left:3px solid var(--pri);border-radius:10px;background:linear-gradient(180deg,rgba(91,140,255,.05),rgba(20,26,48,.4));padding:10px 14px;margin:10px 0}
.je .line{font-size:13.5px;padding:5px 0 5px 60px;position:relative}
.je .line.no{color:#9fc0ff}
.je .line.co{color:#ffce8a;padding-left:96px}
.je .line.no::before{content:"Nợ";position:absolute;left:0;font-size:10px;font-weight:800;color:#5b8cff;background:rgba(91,140,255,.18);border:1px solid rgba(91,140,255,.4);border-radius:5px;padding:2px 0;top:4px;width:34px;text-align:center}
.je .line.co::before{content:"Có";position:absolute;left:42px;font-size:10px;font-weight:800;color:#ffb84d;background:rgba(255,184,77,.18);border:1px solid rgba(255,184,77,.4);border-radius:5px;padding:2px 0;top:4px;width:34px;text-align:center}
.ct{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
.ct td,.ct th{border:1px solid var(--line);padding:6px 9px;vertical-align:top;text-align:left;color:#cfd6f5}
.ct th{background:var(--pan2);font-weight:700;color:#fff}
mark{background:#ffe08a;color:#1a2138;border-radius:2px;padding:0 2px}
/* forms */
.fnote{background:rgba(91,140,255,.1);border:1px solid rgba(91,140,255,.3);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#9fc0ff}
.form-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--pan);border-radius:8px;border:1px solid var(--line);margin-bottom:6px;flex-wrap:wrap}
.form-code{font-size:11px;font-weight:700;color:#9fc0ff;background:rgba(91,140,255,.14);padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.form-title{flex:1;font-size:13px;color:var(--tx);min-width:0}
.form-note{font-size:11px;color:var(--mut);flex-basis:100%}
.dl-grp{display:inline-flex;gap:6px;flex-shrink:0}
.dl-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:6px;font-size:11.5px;font-weight:600;border:none;cursor:pointer;background:rgba(91,140,255,.18);color:#9fc0ff;text-decoration:none}
.dl-btn:hover{background:rgba(91,140,255,.3)}

.dl-x{background:rgba(39,200,155,.16);color:#7df0cf}.dl-x:hover{background:rgba(39,200,155,.3)}
.dl-btn .sp{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:3px}
@keyframes sp{to{transform:rotate(360deg)}}
/* TK */
.tk-table{width:100%;border-collapse:collapse;font-size:13px}
.tk-table th{background:var(--pan2);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;border-bottom:2px solid var(--line)}
.tk-table td{padding:7px 12px;border-bottom:1px solid var(--line);color:#cfd6f5}
.tk-table tr:hover td{background:var(--pan2)}
.tk-num{font-family:monospace;font-weight:700;color:#9fc0ff;font-size:14px}
.tk-link{color:#9fc0ff;text-decoration:none;font-size:11px;background:rgba(91,140,255,.14);padding:2px 8px;border-radius:10px;white-space:nowrap;cursor:pointer}
.tk-link:hover{background:rgba(91,140,255,.28)}
.no-tk{background:var(--pan);border-radius:10px;padding:24px;text-align:center;border:1px solid var(--line)}
.no-tk p{font-size:14px;color:var(--mut);line-height:1.6}
/* home */
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin:16px 0}
.scard{background:var(--pan);border-radius:12px;padding:16px;border:1px solid var(--line)}
.scard .n{font-size:23px;font-weight:800;color:#9fc0ff}.scard .l{font-size:11.5px;color:var(--mut);margin-top:2px}
.db{background:rgba(91,140,255,.08);border-radius:12px;padding:18px;margin:14px 0;border:1px solid var(--line)}
.db p{font-size:13.5px;line-height:1.7;color:#cfd6f5}
.tag{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;margin:2px;background:rgba(91,140,255,.12);color:#9fc0ff;border:1px solid rgba(91,140,255,.3)}
@media(max-width:768px){.sb{display:none}.main{margin-left:0;padding:14px}}
/*XREF-CSS-START*/
.xref-in{color:#9fc0ff;cursor:pointer;border-bottom:1px dashed #9fc0ff;text-decoration:none}
.xref-in:hover{color:#cfe0ff}
.refbox{margin-top:18px;border:1px solid rgba(91,140,255,.4);border-radius:10px;padding:12px 14px;background:rgba(91,140,255,.08)}
.refhead{font-size:12px;font-weight:800;color:#9fc0ff;margin-bottom:6px}
.refrow{display:block;padding:7px 0;font-size:13px;color:#9fc0ff;text-decoration:none;border-top:1px solid rgba(120,140,180,.25)}
.refrow:first-of-type{border-top:none}
.refrow:hover{color:#cfe0ff;padding-left:4px;transition:.12s}
.refrow.note,.refrow.replaces,.refrow.amendment{color:#ffce8a;font-style:italic;cursor:default}
/*XREF-CSS-END*/

<script id="LD" type="application/json">{"meta":{"title":"Thông tư 133/2016/TT-BTC — Kế toán DN Nhỏ và Vừa","shortCode":"TT 133/2016","subtitle":"Chế độ kế toán DN nhỏ và vừa (SME)","slug":"tt133","number":"133/2016/TT-BTC","effectiveDate":"01/01/2017","scope":"Hướng dẫn chế độ kế toán cho DN nhỏ và vừa (SME). Hiệu lực 01/01/2017, thay thế QĐ 48/2006/QĐ-BTC.","description":"TT 133/2016 là chế độ kế toán toàn diện cho SME với 93 điều: hệ thống TK loại 1-9 (đơn giản hóa so với DN lớn), 4 báo cáo tài chính, chứng từ và sổ kế toán phù hợp quy mô SME. DN SME doanh thu 3-50 tỷ áp thuế TNDN 17% (Luật 67, Điều 10).","tkNote":"","related":["TT 99/2025 — Kế toán DN thông thường","TT 58/2026 — Kế toán DN siêu nhỏ","Luật 67/2025/QH15 — Thuế suất 17% cho SME","Chuẩn mực kế toán VAS"]},"outline":[{"id":"tt133_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này hướng dẫn nguyên tắc ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp nhỏ và vừa, không áp dụng cho việc xác định nghĩa vụ thuế của doanh nghiệp đối với ngân sách Nhà nước."}]},{"id":"tt133_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này áp dụng đối với các doanh nghiệp nhỏ và vừa (bao gồm cả doanh nghiệp siêu nhỏ) thuộc mọi lĩnh vực, mọi thành phần kinh tế theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa trừ doanh nghiệp Nhà nước, doanh nghiệp do Nhà nước sở hữu trên 50% vốn điều lệ, công ty đại chúng theo quy định của pháp luật về chứng khoán, các hợp tác xã, liên hiệp hợp tác xã theo quy định tại Luật Hợp tác xã."},{"k":"p","t":"2. Doanh nghiệp có quy mô nhỏ và vừa thuộc lĩnh vực đặc thù như điện lực, dầu khí, bảo hiểm, chứng khoán ... đã được Bộ Tài chính ban hành hoặc chấp thuận áp dụng chế độ kế toán đặc thù."}]},{"id":"tt133_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc chung","shortTitle":"Nguyên tắc chung","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp nhỏ và vừa có thể lựa chọn áp dụng Chế độ kế toán doanh nghiệp ban hành theo Thông tư số 200/2014/TT-BTC ngày 22/12/2015 của Bộ Tài chính và các văn bản sửa đổi, bổ sung hoặc thay thế nhưng phải thông báo cho cơ quan thuế quản lý doanh nghiệp và phải thực hiện nhất quán trong năm tài chính. Trường hợp chuyển đổi trở lại áp dụng chế độ kế toán doanh nghiệp nhỏ và vừa theo Thông tư này thì phải thực hiện từ đầu năm tài chính và phải thông báo lại cho cơ quan Thuế."},{"k":"p","t":"2. Doanh nghiệp vừa và nhỏ căn cứ vào nguyên tắc kế toán, nội dung và kết cấu của các tài khoản kế toán quy định tại Thông tư này để phản ánh và hạch toán các giao dịch kinh tế phát sinh phù hợp với đặc điểm hoạt động và yêu cầu quản lý của đơn vị."},{"k":"p","t":"3. Trường hợp trong năm tài chính doanh nghiệp có những thay đổi dẫn đến không còn thuộc đối tượng áp dụng theo quy định tại Điều 2 Thông tư này thì được áp dụng Thông tư này cho đến hết năm tài chính hiện tại và phải áp dụng Chế độ kế toán phù hợp với quy định của pháp luật kể từ năm tài chính kế tiếp."}]},{"id":"tt133_4","no":4,"code":"Điều 4","title":"Điều 4. Áp dụng chuẩn mực kế toán","shortTitle":"Áp dụng chuẩn mực kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Doanh nghiệp nhỏ và vừa thực hiện Chế độ kế toán ban hành theo Thông tư này và các Chuẩn mực kế toán Việt Nam có liên quan, ngoại trừ các Chuẩn mực kế toán Việt Nam sau:"},{"k":"p","t":"STT"},{"k":"p","t":"Số hiệu và tên chuẩn mực"},{"k":"p","t":"1"},{"k":"p","t":"CM số 11 - Hợp nhất kinh doanh"},{"k":"p","t":"2"},{"k":"p","t":"CM số 19 - Hợp đồng bảo hiểm"},{"k":"p","t":"3"},{"k":"p","t":"CM số 22 - Trình bày bổ sung báo cáo tài chính của các ngân hàng và tổ chức tài chính tương tự"},{"k":"p","t":"4"},{"k":"p","t":"CM số 25 - Báo cáo tài chính hợp nhất và kế toán khoản đầu tư vào công ty con"},{"k":"p","t":"5"},{"k":"p","t":"CM số 27 - Báo cáo tài chính giữa niên độ"},{"k":"p","t":"6"},{"k":"p","t":"CM số 28 - Báo cáo bộ phận"},{"k":"p","t":"7"},{"k":"p","t":"CM số 30 - Lãi trên cổ phiếu"}]},{"id":"tt133_5","no":5,"code":"Điều 5","title":"Điều 5. Đơn vị tiền tệ trong kế toán","shortTitle":"Đơn vị tiền tệ trong kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"“Đơn vị tiền tệ trong kế toán” là Đồng Việt Nam (ký hiệu quốc gia là “đ”; ký hiệu quốc tế là “VND”) được dùng để ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp. Trường hợp đơn vị kế toán chủ yếu thu, chi bằng ngoại tệ, đáp ứng được các tiêu chuẩn quy định tại Điều 6 Thông tư này thì được chọn một loại ngoại tệ làm đơn vị tiền tệ để ghi sổ kế toán."}]},{"id":"tt133_6","no":6,"code":"Điều 6","title":"Điều 6. Lựa chọn đơn vị tiền tệ trong kế toán","shortTitle":"Lựa chọn đơn vị tiền tệ trong kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có nghiệp vụ thu, chi chủ yếu bằng ngoại tệ căn cứ vào quy định của Luật Kế toán, để xem xét, quyết định lựa chọn đơn vị tiền tệ trong kế toán và chịu trách nhiệm về quyết định đó trước pháp luật. Khi lựa chọn đơn vị tiền tệ trong kế toán, doanh nghiệp phải thông báo cho cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"2. Đơn vị tiền tệ trong kế toán là đơn vị tiền tệ:"},{"k":"p","t":"a) Được sử dụng chủ yếu trong các giao dịch bán hàng, cung cấp dịch vụ của đơn vị, có ảnh hưởng lớn đến giá bán hàng hóa và cung cấp dịch vụ, thông thường chính là đơn vị tiền tệ dùng để niêm yết giá bán và được thanh toán; và"},{"k":"p","t":"b) Được sử dụng chủ yếu trong việc mua hàng hóa, dịch vụ, có ảnh hưởng lớn đến chi phí nhân công, nguyên vật liệu và các chi phí sản xuất, kinh doanh khác, thông thường chính là đơn vị tiền tệ dùng để thanh toán cho các chi phí đó."},{"k":"p","t":"3. Các yếu tố sau đây cũng được xem xét và cung cấp bằng chứng về đơn vị tiền tệ trong kế toán của đơn vị:"},{"k":"p","t":"a) Đơn vị tiền tệ sử dụng để huy động các nguồn lực tài chính (như phát hành cổ phiếu, trái phiếu);"},{"k":"p","t":"b) Đơn vị tiền tệ thường xuyên thu được từ các hoạt động kinh doanh và được tích trữ lại."},{"k":"p","t":"4. Đơn vị tiền tệ trong kế toán phản ánh các giao dịch, sự kiện, điều kiện liên quan đến hoạt động của đơn vị. Sau khi xác định được đơn vị tiền tệ trong kế toán thì đơn vị không được thay đổi trừ khi có sự thay đổi trọng yếu trong các giao dịch, sự kiện và điều kiện đó."}]},{"id":"tt133_7","no":7,"code":"Điều 7","title":"Điều 7. Chuyển đổi Báo cáo tài chính sang Đồng Việt Nam","shortTitle":"Chuyển đổi Báo cáo tài chính sang Đồng Việt Nam","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp sử dụng đồng tiền khác với Đồng Việt Nam làm đơn vị tiền tệ trong kế toán thì Báo cáo tài chính mang tính pháp lý để công bố ra công chúng và nộp cho các cơ quan có thẩm quyền tại Việt Nam là Báo cáo tài chính được trình bày bằng Đồng Việt Nam. Trường hợp doanh nghiệp thuộc đối tượng bắt buộc phải kiểm toán báo cáo tài chính thì Báo cáo tài chính nộp cho cơ quan quản lý Nhà nước và công bố ra công chúng phải được kiểm toán."},{"k":"p","t":"2. Việc chuyển đổi Báo cáo tài chính sang Đồng Việt Nam được thực hiện theo quy định tại Điều 78 Thông tư này."},{"k":"p","t":"3. Khi chuyển đổi Báo cáo tài chính sang Đồng Việt Nam, doanh nghiệp phải trình bày rõ trên Bản thuyết minh Báo cáo tài chính những ảnh hưởng (nếu có) đối với Báo cáo tài chính do việc chuyển đổi Báo cáo tài chính sang Đồng Việt Nam."}]},{"id":"tt133_8","no":8,"code":"Điều 8","title":"Điều 8. Thay đổi đơn vị tiền tệ trong kế toán","shortTitle":"Thay đổi đơn vị tiền tệ trong kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Khi có sự thay đổi lớn về hoạt động quản lý và kinh doanh dẫn đến đơn vị tiền tệ kế toán được sử dụng trong các giao dịch kinh tế không còn thỏa mãn các tiêu chuẩn tại khoản 2, 3 Điều 6 Thông tư này thì doanh nghiệp được thay đổi đơn vị tiền tệ trong kế toán. Việc thay đổi từ một đơn vị tiền tệ ghi sổ kế toán này sang một đơn vị tiền tệ ghi sổ kế toán khác chỉ được thực hiện tại thời điểm bắt đầu niên độ kế toán mới."},{"k":"p","t":"Doanh nghiệp phải thông báo cho cơ quan thuế quản lý trực tiếp về việc thay đổi đơn vị tiền tệ trong kế toán chậm nhất là sau 10 ngày làm việc kể từ ngày thay đổi đơn vị tiền tệ."}]},{"id":"tt133_9","no":9,"code":"Điều 9","title":"Điều 9. Quyền và trách nhiệm của doanh nghiệp đối với việc tổ chức kế toán tại các đơn vị trực thuộc không có tư cách pháp nhân hạch toán phụ thuộc (gọi tắt là đơn vị hạch toán phụ thuộc)","shortTitle":"Quyền và trách nhiệm của doanh nghiệp đối với việc tổ chức kế toán tại các đơn vị trực thuộc không có tư cách pháp nhân hạch toán phụ thuộc (gọi tắt là đơn vị hạch toán phụ thuộc)","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có trách nhiệm tổ chức bộ máy kế toán và phân cấp hạch toán ở các đơn vị hạch toán phụ thuộc phù hợp với đặc điểm hoạt động, yêu cầu quản lý của mình và không trái với quy định của pháp luật."},{"k":"p","t":"2. Doanh nghiệp quyết định việc kế toán tại đơn vị hạch toán phụ thuộc có tổ chức bộ máy kế toán riêng đối với:"},{"k":"p","t":"a) Việc ghi nhận khoản vốn kinh doanh được doanh nghiệp cấp: Doanh nghiệp quyết định đơn vị hạch toán phụ thuộc ghi nhận là nợ phải trả hoặc vốn chủ sở hữu;"},{"k":"p","t":"b) Đối với các giao dịch mua, bán, điều chuyển sản phẩm, hàng hóa, dịch vụ nội bộ, việc ghi nhận doanh thu, giá vốn tại từng đơn vị hạch toán phụ thuộc do doanh nghiệp quyết định, không phụ thuộc vào hình thức của chứng từ kế toán (hóa đơn hay chứng từ luân chuyển nội bộ)."},{"k":"p","t":"Trường hợp sự luân chuyển sản phẩm, hàng hóa, dịch vụ giữa các khâu trong nội bộ về bản chất tạo ra giá trị gia tăng trong sản phẩm, hàng hóa, dịch vụ thì doanh nghiệp nên ghi nhận doanh thu, giá vốn tại các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"c) Việc phân cấp kế toán tại đơn vị hạch toán phụ thuộc: Tùy thuộc mô hình tổ chức kế toán tập trung hay phân tán, doanh nghiệp có thể giao đơn vị hạch toán phụ thuộc phản ánh đến lợi nhuận sau thuế chưa phân phối hoặc chỉ phản ánh đến doanh thu, chi phí."}]},{"id":"tt133_10","no":10,"code":"Điều 10","title":"Điều 10. Đăng ký sửa đổi Chế độ kế toán","shortTitle":"Đăng ký sửa đổi Chế độ kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với hệ thống tài khoản kế toán"},{"k":"p","t":"a) Trường hợp doanh nghiệp cần bổ sung tài khoản cấp 1, cấp 2 hoặc sửa đổi tài khoản cấp 1, cấp 2 về tên, ký hiệu, nội dung và phương pháp hạch toán các nghiệp vụ kinh tế phát sinh đặc thù phải được sự chấp thuận bằng văn bản của Bộ Tài chính trước khi thực hiện."},{"k":"p","t":"b) Doanh nghiệp có thể mở thêm các tài khoản cấp 2 và các tài khoản cấp 3 đối với những tài khoản không có qui định tài khoản cấp 2, tài khoản cấp 3 tại danh mục Hệ thống tài khoản kế toán doanh nghiệp quy định tại Phụ lục 1 ban hành kèm theo Thông tư này nhằm phục vụ yêu cầu quản lý của doanh nghiệp mà không phải đề nghị Bộ Tài chính chấp thuận."},{"k":"p","t":"2. Đối với Báo cáo tài chính"},{"k":"p","t":"a) Doanh nghiệp nhỏ và vừa căn cứ biểu mẫu và nội dung của các chỉ tiêu của Báo cáo tài chính tại Phụ lục 2 ban hành kèm theo Thông tư này để chi tiết các chỉ tiêu (có sẵn) của hệ thống Báo cáo tài chính phù hợp với đặc điểm sản xuất, kinh doanh, yêu cầu quản lý của từng đơn vị."},{"k":"p","t":"b) Trường hợp doanh nghiệp cần bổ sung mới hoặc sửa đổi biểu mẫu, tên và nội dung các chỉ tiêu của Báo cáo tài chính phải được sự chấp thuận bằng văn bản của Bộ Tài chính trước khi thực hiện."},{"k":"p","t":"3. Đối với chứng từ và sổ kế toán"},{"k":"p","t":"a) Các chứng từ kế toán đều thuộc loại hướng dẫn (không bắt buộc), doanh nghiệp được tự thiết kế mẫu chứng từ kế toán phù hợp với đặc điểm hoạt động và yêu cầu quản lý của đơn vị nhưng phải đảm bảo các nội dung chủ yếu và phải đảm bảo cung cấp những thông tin theo quy định của Luật Kế toán và các văn bản hướng dẫn Luật Kế toán."},{"k":"p","t":"b) Tất cả các biểu mẫu sổ kế toán (kể cả các loại Sổ Cái, sổ Nhật ký) đều thuộc loại hướng dẫn (không bắt buộc). Doanh nghiệp phải tuân thủ quy định của Luật Kế toán và các văn bản hướng dẫn Luật Kế toán. Doanh nghiệp được tự thiết kế biểu mẫu sổ, thẻ kế toán phù hợp với đặc điểm hoạt động và yêu cầu quản lý nhưng phải đảm bảo trình bày thông tin đầy đủ, rõ ràng, dễ kiểm tra, kiểm soát."}]},{"id":"tt133_11","no":11,"code":"Điều 11","title":"Điều 11. Nguyên tắc kế toán tiền","shortTitle":"Nguyên tắc kế toán tiền","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Kế toán phải mở sổ kế toán ghi chép hàng ngày liên tục theo trình tự phát sinh các khoản thu, chi, nhập, xuất các loại tiền và tính ra số tồn tại quỹ và từng tài khoản ở Ngân hàng tại mọi thời điểm để tiện cho việc kiểm tra, đối chiếu."},{"k":"p","t":"2. Các khoản tiền do tổ chức và cá nhân ký cược, ký quỹ tại doanh nghiệp được quản lý và hạch toán như tiền của doanh nghiệp."},{"k":"p","t":"3. Khi thu, chi tiền mặt phải có phiếu thu, phiếu chi và có đủ chữ ký theo quy định về chứng từ kế toán. Khi hạch toán tiền gửi ngân hàng phải có giấy báo Nợ, giấy báo Có hoặc bảng sao kê của ngân hàng."},{"k":"p","t":"4. Kế toán phải theo dõi chi tiết tiền theo nguyên tệ. Khi phát sinh các giao dịch bằng ngoại tệ, kế toán phải quy đổi ngoại tệ ra đồng tiền ghi sổ kế toán (đơn vị tiền tệ kế toán) theo nguyên tắc:"},{"k":"p","t":"- Bên Nợ các tài khoản tiền áp dụng tỷ giá giao dịch thực tế;"},{"k":"p","t":"- Bên Có các tài khoản tiền được lựa chọn áp dụng tỷ giá ghi sổ bình quân gia quyền hoặc tỷ giá giao dịch thực tế."},{"k":"p","t":"Việc xác định tỷ giá ghi sổ bình quân gia quyền, tỷ giá giao dịch thực tế thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"5. Trường hợp doanh nghiệp sử dụng tỷ giá giao dịch thực tế để hạch toán bên Có các tài khoản tiền, khoản chênh lệch tỷ giá hối đoái phát sinh trong kỳ được ghi nhận đồng thời tại thời điểm chi tiền hoặc ghi nhận định kỳ tùy theo đặc điểm hoạt động kinh doanh và yêu cầu quản lý của doanh nghiệp. Đồng thời, nếu tại thời điểm cuối kỳ kế toán:"},{"k":"p","t":"- Các TK tiền không còn số dư nguyên tệ thì doanh nghiệp phải kết chuyển toàn bộ chênh lệch tỷ giá hối đoái phát sinh trong kỳ vào doanh thu hoạt động tài chính hoặc chi phí tài chính của kỳ báo cáo."},{"k":"p","t":"- Các TK tiền còn số dư nguyên tệ thì doanh nghiệp phải đánh giá lại theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"6. Tại thời điểm lập Báo cáo tài chính theo quy định của pháp luật doanh nghiệp phải đánh giá lại số dư ngoại tệ theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch."},{"k":"p","t":"Việc xác định tỷ giá chuyển khoản trung bình và xử lý chênh lệch tỷ giá do đánh giá lại các TK tiền bằng ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."}]},{"id":"tt133_12","no":12,"code":"Điều 12","title":"Điều 12. Tài khoản 111 - Tiền mặt","shortTitle":"Tài khoản 111 - Tiền mặt","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thu, chi, tồn tiền mặt tại quỹ của doanh nghiệp bao gồm: Tiền Việt Nam, ngoại tệ. Chỉ phản ánh vào TK 111 “Tiền mặt” số tiền Việt Nam, ngoại tệ thực tế nhập, xuất, tồn quỹ."},{"k":"p","t":"b) Khi tiến hành nhập, xuất quỹ tiền mặt phải có phiếu thu, phiếu chi và có đủ chữ ký của người nhận, người giao, người có thẩm quyền cho phép nhập, xuất quỹ,... theo quy định về chứng từ kế toán. Một số trường hợp đặc biệt phải có lệnh nhập quỹ, xuất quỹ đính kèm."},{"k":"p","t":"c) Kế toán quỹ tiền mặt phải có trách nhiệm mở sổ kế toán quỹ tiền mặt, ghi chép hàng ngày liên tục theo trình tự phát sinh các khoản thu, chi, nhập, xuất quỹ tiền mặt và tính ra số tồn quỹ tại mọi thời điểm."},{"k":"p","t":"d) Thủ quỹ chịu trách nhiệm quản lý và nhập, xuất quỹ tiền mặt. Hàng ngày thủ quỹ phải kiểm kê số tồn quỹ tiền mặt thực tế, đối chiếu số liệu sổ quỹ tiền mặt và sổ kế toán tiền mặt. Nếu có chênh lệch, kế toán và thủ quỹ phải kiểm tra lại để xác định nguyên nhân và kiến nghị biện pháp xử lý chênh lệch."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 111 - Tiền mặt"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản tiền Việt Nam, ngoại tệ nhập quỹ;"},{"k":"p","t":"- Số tiền Việt Nam, ngoại tệ thừa ở quỹ phát hiện khi kiểm kê;"},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái do đánh giá lại số dư tiền mặt là ngoại tệ tại thời điểm báo cáo (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Các khoản tiền Việt Nam, ngoại tệ xuất quỹ;"},{"k":"p","t":"- Số tiền Việt Nam, ngoại tệ thiếu hụt quỹ phát hiện khi kiểm kê;"},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái do đánh giá lại số dư tiền mặt là ngoại tệ tại thời điểm báo cáo (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Các khoản tiền Việt Nam, ngoại tệ còn tồn quỹ tiền mặt tại thời điểm báo cáo."},{"k":"p","t":"Tài khoản 111 - Tiền mặt, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 1111 - Tiền Việt Nam: Phản ánh tình hình thu, chi, tồn quỹ tiền Việt Nam tại quỹ tiền mặt."},{"k":"p","t":"- Tài khoản 1112 - Ngoại tệ: Phản ánh tình hình thu, chi, chênh lệch tỷ giá và số dư ngoại tệ tại quỹ tiền mặt theo giá trị quy đổi ra đồng tiền ghi sổ kế toán."}]},{"id":"tt133_13","no":13,"code":"Điều 13","title":"Điều 13. Tài khoản 112 - Tiền gửi ngân hàng","shortTitle":"Tài khoản 112 - Tiền gửi ngân hàng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm các khoản tiền gửi không kỳ hạn tại ngân hàng của doanh nghiệp. Căn cứ để hạch toán trên Tài khoản 112 - Tiền gửi ngân hàng là các giấy báo Có, báo Nợ hoặc bản sao kê của ngân hàng kèm theo các chứng từ gốc (ủy nhiệm chi, ủy nhiệm thu, séc chuyển khoản, séc bảo chi,…)."},{"k":"p","t":"b) Khi nhận được chứng từ của ngân hàng gửi đến, kế toán phải kiểm tra, đối chiếu với chứng từ gốc kèm theo. Nếu có sự chênh lệch giữa số liệu trên sổ kế toán của doanh nghiệp, số liệu ở chứng từ gốc với số liệu trên chứng từ của ngân hàng thì doanh nghiệp phải thông báo cho ngân hàng để cùng đối chiếu, xác minh và xử lý kịp thời. Cuối tháng, chưa xác định được nguyên nhân chênh lệch thì kế toán ghi sổ theo số liệu của ngân hàng trên giấy báo Nợ, báo Có hoặc bản sao kê. Số chênh lệch (nếu có) ghi vào bên Nợ TK 138 “Phải thu khác” (1381) (nếu số liệu của kế toán lớn hơn số liệu của ngân hàng) hoặc ghi vào bên Có TK 338 “Phải trả, phải nộp khác” (3381) (nếu số liệu của kế toán nhỏ hơn số liệu của ngân hàng). Sang tháng sau, tiếp tục kiểm tra, đối chiếu, xác định nguyên nhân để điều chỉnh số liệu ghi sổ."},{"k":"p","t":"c) Phải tổ chức hạch toán chi tiết số tiền gửi theo từng tài khoản ở từng ngân hàng để tiện cho việc kiểm tra, đối chiếu."},{"k":"p","t":"d) Khoản thấu chi ngân hàng không được ghi âm trên tài khoản tiền gửi ngân hàng mà được phản ánh tương tự như khoản vay ngân hàng."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 112 - Tiền gửi ngân hàng"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản tiền Việt Nam, ngoại tệ gửi vào ngân hàng;"},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái do đánh giá lại số dư tiền gửi ngân hàng là ngoại tệ tại thời điểm báo cáo (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Các khoản tiền Việt Nam, ngoại tệ rút ra từ ngân hàng;"},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái do đánh giá lại số dư tiền gửi ngân hàng là ngoại tệ tại thời điểm báo cáo (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Số tiền Việt Nam, ngoại tệ hiện còn gửi tại ngân hàng tại thời điểm báo cáo."},{"k":"p","t":"Tài khoản 112 - Tiền gửi Ngân hàng, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 1121 - Tiền Việt Nam: Phản ánh số tiền gửi vào, rút ra và hiện đang gửi tại ngân hàng bằng Đồng Việt Nam."},{"k":"p","t":"- Tài khoản 1122 - Ngoại tệ: Phản ánh số tiền gửi vào, rút ra và hiện đang gửi tại ngân hàng bằng ngoại tệ các loại đã quy đổi ra đồng tiền ghi sổ kế toán."}]},{"id":"tt133_14","no":14,"code":"Điều 14","title":"Điều 14. Tài khoản 121 - Chứng khoán kinh doanh","shortTitle":"Tài khoản 121 - Chứng khoán kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình mua, bán và thanh toán các loại chứng khoán theo quy định của pháp luật nắm giữ vì mục đích kinh doanh (kể cả chứng khoán có thời gian đáo hạn trên 12 tháng mua vào, bán ra để kiếm lời). Chứng khoán kinh doanh bao gồm:"},{"k":"p","t":"- Cổ phiếu, trái phiếu niêm yết trên thị trường chứng khoán;"},{"k":"p","t":"- Các loại chứng khoán và công cụ tài chính khác."},{"k":"p","t":"Tài khoản này không phản ánh các khoản đầu tư nắm giữ đến ngày đáo hạn, như: Các khoản cho vay theo khế ước giữa 2 bên, tiền gửi ngân hàng, trái phiếu, thương phiếu, tín phiếu, kỳ phiếu,... nắm giữ đến ngày đáo hạn."},{"k":"p","t":"b) Chứng khoán kinh doanh phải được ghi sổ kế toán theo giá gốc, bao gồm: Giá mua cộng (+) các chi phí mua (nếu có) như chi phí môi giới, giao dịch, cung cấp thông tin, thuế, lệ phí và phí ngân hàng. Giá gốc của chứng khoán kinh doanh được xác định theo giá trị hợp lý của các khoản thanh toán tại thời điểm giao dịch phát sinh. Thời điểm ghi nhận các khoản chứng khoán kinh doanh là thời điểm nhà đầu tư có quyền sở hữu, cụ thể như sau:"},{"k":"p","t":"- Chứng khoán niêm yết được ghi nhận tại thời điểm khớp lệnh (T+0);"},{"k":"p","t":"- Chứng khoán chưa niêm yết được ghi nhận tại thời điểm chính thức có quyền sở hữu theo quy định của pháp luật."},{"k":"p","t":"c) Cuối niên độ kế toán, nếu giá trị thị trường của chứng khoán kinh doanh bị giảm xuống thấp hơn giá gốc, kế toán được lập dự phòng giảm giá chứng khoán kinh doanh."},{"k":"p","t":"d) Doanh nghiệp phải hạch toán đầy đủ, kịp thời các khoản thu nhập từ hoạt động đầu tư chứng khoán kinh doanh. Trường hợp nhận lãi đầu tư bao gồm cả khoản lãi đầu tư dồn tích trước khi mua lại khoản đầu tư đó thì phải phân bổ số tiền lãi này. Chỉ ghi nhận là doanh thu hoạt động tài chính phần tiền lãi của các kỳ sau khi doanh nghiệp mua khoản đầu tư này. Khoản tiền lãi dồn tích trước khi doanh nghiệp mua lại khoản đầu tư được ghi giảm giá trị của chính khoản đầu tư đó."},{"k":"p","t":"Khi nhà đầu tư nhận được thêm cổ phiếu mà không phải trả tiền do công ty cổ phần sử dụng thặng dư vốn cổ phần, các quỹ thuộc vốn chủ sở hữu và lợi nhuận sau thuế chưa phân phối (chia cổ tức bằng cổ phiếu) để phát hành thêm cổ phiếu, nhà đầu tư chỉ theo dõi số lượng cổ phiếu tăng thêm trên thuyết minh Báo cáo tài chính, không ghi nhận giá trị cổ phiếu được nhận, không ghi nhận doanh thu hoạt động tài chính và không ghi nhận tăng giá trị khoản đầu tư vào công ty cổ phần."},{"k":"p","t":"đ) Mọi trường hợp hoán đổi cổ phiếu đều phải xác định giá trị cổ phiếu theo giá trị hợp lý tại ngày trao đổi. Phần chênh lệch (nếu có) giữa giá trị hợp lý của cổ phiếu nhận về và giá trị ghi sổ của cổ phiếu mang đi trao đổi được kế toán là doanh thu hoạt động tài chính (nếu lãi) hoặc chi phí tài chính (nếu lỗ). Việc xác định giá trị hợp lý của cổ phiếu được thực hiện như sau:"},{"k":"p","t":"- Đối với cổ phiếu của công ty niêm yết, giá trị hợp lý của cổ phiếu là giá đóng cửa niêm yết trên thị trường chứng khoán tại ngày trao đổi. Trường hợp tại ngày trao đổi thị trường chứng khoán không giao dịch thì giá trị hợp lý của cổ phiếu là giá đóng cửa phiên giao dịch trước liền kề với ngày trao đổi."},{"k":"p","t":"- Đối với cổ phiếu chưa niêm yết được giao dịch trên sàn UPCOM, giá trị hợp lý của cổ phiếu là giá giao dịch đóng cửa trên sàn UPCOM tại ngày trao đổi. Trường hợp tại ngày trao đổi sàn UPCOM không giao dịch thì giá trị hợp lý của cổ phiếu là giá đóng cửa phiên giao dịch trước liền kề với ngày trao đổi."},{"k":"p","t":"- Đối với cổ phiếu chưa niêm yết khác, giá trị hợp lý của cổ phiếu là giá do các bên thỏa thuận theo hợp đồng hoặc giá trị sổ sách tại thời điểm trao đổi."},{"k":"p","t":"e) Kế toán phải mở sổ chi tiết để theo dõi chi tiết từng mã, từng loại chứng khoán kinh doanh mà doanh nghiệp đang nắm giữ (theo từng loại chứng khoán; theo từng đối tượng, mệnh giá, giá mua thực tế, từng loại nguyên tệ sử dụng để đầu tư…)."},{"k":"p","t":"g) Khi thanh lý, nhượng bán chứng khoán kinh doanh (tính theo từng loại chứng khoán) giá vốn chứng khoán kinh doanh được xác định theo phương pháp bình quân gia quyền hoặc nhập trước xuất trước. Chi phí bán chứng khoán được phản ánh vào chi phí tài chính trong kỳ. Khoản lãi hoặc lỗ khi thanh lý, nhượng bán chứng khoán kinh doanh được phản ánh vào doanh thu hoạt động tài chính hoặc chi phí tài chính trong kỳ báo cáo."},{"k":"p","t":"h) Cuối niên độ kế toán doanh nghiệp phải đánh giá lại tất cả các loại chứng khoán kinh doanh là khoản mục tiền tệ có gốc ngoại tệ theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch. Việc xác định tỷ giá chuyển khoản trung bình và xử lý chênh lệch tỷ giá do đánh giá lại chứng khoán kinh doanh là khoản mục tiền tệ có gốc ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 121 - Chứng khoán kinh doanh"},{"k":"p","t":"Bên Nợ: Giá trị chứng khoán kinh doanh mua vào."},{"k":"p","t":"Bên Có: Giá trị ghi sổ chứng khoán kinh doanh khi bán."},{"k":"p","t":"Số dư bên Nợ: Giá trị chứng khoán kinh doanh tại thời điểm báo cáo."}]},{"id":"tt133_15","no":15,"code":"Điều 15","title":"Điều 15. Tài khoản 128 - Đầu tư nắm giữ đến ngày đáo hạn","shortTitle":"Tài khoản 128 - Đầu tư nắm giữ đến ngày đáo hạn","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm của các khoản đầu tư nắm giữ đến ngày đáo hạn (ngoài các khoản chứng khoán kinh doanh) như: Các khoản tiền gửi ngân hàng có kỳ hạn (bao gồm cả các loại trái phiếu, tín phiếu, kỳ phiếu), các khoản cho vay nắm giữ đến ngày đáo hạn với mục đích thu lãi hàng kỳ và các khoản đầu tư nắm giữ đến ngày đáo hạn khác."},{"k":"p","t":"Tài khoản này không phản ánh các công cụ nợ nắm giữ vì mục đích mua bán để kiếm lời (phản ánh trong Tài khoản 121 - Chứng khoán kinh doanh)."},{"k":"p","t":"b) Khoản đầu tư nắm giữ đến ngày đáo hạn phải được ghi sổ kế toán theo giá gốc, bao gồm: Giá mua cộng (+) các chi phí mua (nếu có) như chi phí môi giới, giao dịch, cung cấp thông tin, thuế, lệ phí và phí ngân hàng."},{"k":"p","t":"c) Kế toán phải mở sổ chi tiết theo dõi từng khoản đầu tư nắm giữ đến ngày đáo hạn theo từng kỳ hạn, từng đối tượng, từng loại nguyên tệ, từng số lượng... Khi lập Báo cáo tài chính, kế toán căn cứ vào kỳ hạn còn lại (dưới 12 tháng hay từ 12 tháng trở lên kể từ thời điểm lập báo cáo) để trình bày là tài sản ngắn hạn hoặc dài hạn."},{"k":"p","t":"d) Doanh nghiệp phải hạch toán đầy đủ, kịp thời doanh thu hoạt động tài chính phát sinh từ các khoản đầu tư như lãi tiền gửi, lãi cho vay, lãi, lỗ khi thanh lý, nhượng bán các khoản đầu tư nắm giữ đến ngày đáo hạn…"},{"k":"p","t":"đ) Doanh nghiệp phải hạch toán đầy đủ, kịp thời các khoản thu nhập từ hoạt động đầu tư nắm giữ đến ngày đáo hạn. Trường hợp nhận lãi đầu tư bao gồm cả khoản lãi đầu tư dồn tích trước khi mua lại khoản đầu tư đó thì phải phân bổ số tiền lãi này. Chỉ ghi nhận là doanh thu hoạt động tài chính phần tiền lãi của các kỳ sau khi doanh nghiệp mua khoản đầu tư này. Khoản tiền lãi dồn tích trước khi doanh nghiệp mua lại khoản đầu tư được ghi giảm giá trị của chính khoản đầu tư đó."},{"k":"p","t":"e) Đối với các khoản đầu tư nắm giữ đến ngày đáo hạn khác ngoài khoản cho vay, kế toán phải đánh giá khả năng thu hồi. Trường hợp có bằng chứng chắc chắn cho thấy một phần hoặc toàn bộ khoản đầu tư có thể không thu hồi được, kế toán phải ghi nhận số tổn thất vào chi phí tài chính trong kỳ. Trường hợp số tổn thất không thể xác định được một cách đáng tin cậy, kế toán có thể không ghi giảm khoản đầu tư nhưng phải thuyết minh trên Báo cáo tài chính về khả năng thu hồi của khoản đầu tư."},{"k":"p","t":"g) Tại thời điểm lập Báo cáo tài chính, kế toán phải đánh giá lại tất cả các khoản đầu tư nắm giữ đến ngày đáo hạn được phân loại là các khoản mục tiền tệ có gốc ngoại tệ theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng nơi doanh nghiệp thường xuyên có giao dịch."},{"k":"p","t":"Việc xác định tỷ giá chuyển khoản trung bình và xử lý chênh lệch tỷ giá do đánh giá lại khoản mục tiền tệ có gốc ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 128 - Đầu tư nắm giữ đến ngày đáo hạn"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"Giá trị các khoản đầu tư nắm giữ đến ngày đáo hạn tăng."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"Giá trị các khoản đầu tư nắm giữ đến ngày đáo hạn giảm."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Giá trị các khoản đầu tư nắm giữ đến ngày đáo hạn hiện có tại thời điểm báo cáo."},{"k":"p","t":"Tài khoản 128 - Đầu tư nắm giữ đến ngày đáo hạn có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 1281 - Tiền gửi có kỳ hạn: Phản ánh tình hình tăng, giảm và số hiện có của tiền gửi có kỳ hạn."},{"k":"p","t":"- Tài khoản 1288 - Các khoản đầu tư khác nắm giữ đến ngày đáo hạn: Phản ánh tình hình tăng, giảm và số hiện có của các khoản đầu tư khác nắm giữ đến ngày đáo hạn như cổ phiếu ưu đãi bắt buộc bên bán phải mua lại tại một thời điểm nhất định trong tương lai, thương phiếu, trái phiếu và các khoản cho vay nắm giữ đến ngày đáo hạn."}]},{"id":"tt133_16","no":16,"code":"Điều 16","title":"Điều 16. Nguyên tắc kế toán nợ phải thu","shortTitle":"Nguyên tắc kế toán nợ phải thu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các khoản phải thu được theo dõi chi tiết theo kỳ hạn phải thu, đối tượng phải thu, loại nguyên tệ phải thu và các yếu tố khác theo nhu cầu quản lý của doanh nghiệp."},{"k":"p","t":"2. Việc phân loại các khoản phải thu là phải thu của khách hàng, phải thu nội bộ, phải thu khác được thực hiện theo nguyên tắc:"},{"k":"p","t":"a) Phải thu của khách hàng gồm các khoản phải thu mang tính chất thương mại phát sinh từ giao dịch có tính chất mua - bán, như: Phải thu về bán hàng, cung cấp dịch vụ, thanh lý, nhượng bán tài sản (TSCĐ, BĐSĐT, các khoản đầu tư tài chính) giữa doanh nghiệp và người mua (là đơn vị độc lập với người bán, gồm cả các đơn vị mà doanh nghiệp đầu tư góp vốn vào). Khoản phải thu này gồm cả các khoản phải thu về tiền bán hàng xuất khẩu của bên giao ủy thác với khách hàng thông qua bên nhận ủy thác;"},{"k":"p","t":"b) Phải thu nội bộ gồm các khoản phải thu giữa đơn vị cấp trên với đơn vị cấp dưới trực thuộc không có tư cách pháp nhân hạch toán phụ thuộc (sau đây gọi là đơn vị hạch toán phụ thuộc)."},{"k":"p","t":"c) Phải thu khác gồm các khoản phải thu không có tính chất thương mại, không liên quan đến giao dịch mua - bán, như:"},{"k":"p","t":"- Các khoản phải thu tạo ra doanh thu hoạt động tài chính, như: khoản phải thu về lãi cho vay, tiền gửi, cổ tức và lợi nhuận được chia;"},{"k":"p","t":"- Các khoản chi hộ bên thứ ba được quyền nhận lại; Các khoản bên nhận ủy thác xuất khẩu phải thu hộ cho bên giao ủy thác;"},{"k":"p","t":"- Các khoản phải thu không mang tính thương mại như cho mượn tài sản phi tiền tệ, phải thu về tiền phạt, bồi thường, tài sản thiếu chờ xử lý…"},{"k":"p","t":"3. Khi lập Báo cáo tài chính, kế toán căn cứ kỳ hạn còn lại của các khoản phải thu để phân loại là dài hạn hoặc ngắn hạn. Các chỉ tiêu phải thu của Báo cáo tình hình tài chính còn bao gồm cả các khoản được phản ánh ở các tài khoản khác ngoài các tài khoản phải thu, như: Khoản cho vay được phản ánh ở TK 1288; Khoản ký quỹ, ký cược phản ánh ở TK 1386, khoản tạm ứng được phản ánh ở TK 141… Việc xác định các khoản cần lập dự phòng phải thu khó đòi được căn cứ vào các khoản mục được phân loại là phải thu ngắn hạn, dài hạn của Báo cáo tình hình tài chính."},{"k":"p","t":"4. Đối với các khoản phải thu bằng ngoại tệ, doanh nghiệp phải theo dõi chi tiết các khoản nợ phải thu theo từng loại nguyên tệ, từng đối tượng công nợ và thực hiện theo nguyên tắc:"},{"k":"p","t":"- Khi phát sinh các khoản nợ phải thu (bên Nợ các TK phải thu), kế toán phải quy đổi ra đồng tiền ghi sổ kế toán theo tỷ giá giao dịch thực tế tại thời điểm phát sinh."},{"k":"p","t":"Riêng trường hợp nhận trước tiền của người mua bằng ngoại tệ thì khi đủ điều kiện ghi nhận doanh thu, thu nhập, bên Nợ Tài khoản 131 tương ứng với số tiền nhận trước được ghi nhận theo tỷ giá ghi sổ thực tế đích danh tại thời điểm nhận ứng trước."},{"k":"p","t":"- Khi thu hồi nợ phải thu (bên Có Tài khoản phải thu), doanh nghiệp được lựa chọn tỷ giá ghi sổ bình quân gia quyền của các khoản nợ phải thu đối với từng đối tượng công nợ hoặc tỷ giá giao dịch thực tế tại thời điểm thu hồi nợ."},{"k":"p","t":"Riêng trường hợp nhận trước của người mua thì bên Có Tài khoản 131 áp dụng tỷ giá giao dịch thực tế tại thời điểm nhận ứng trước."},{"k":"p","t":"5. Trường hợp doanh nghiệp sử dụng tỷ giá giao dịch thực tế để hạch toán bên Có các tài khoản phải thu, khoản chênh lệch tỷ giá hối đoái phát sinh trong kỳ được ghi nhận ngay tại thời điểm phát sinh giao dịch hoặc ghi nhận định kỳ tùy theo đặc điểm hoạt động sản xuất kinh doanh và yêu cầu quản lý của doanh nghiệp. Đồng thời, nếu tại thời điểm cuối kỳ kế toán:"},{"k":"p","t":"- Các tài khoản phải thu không còn số dư nguyên tệ thì doanh nghiệp phải kết chuyển toàn bộ chênh lệch tỷ giá hối đoái phát sinh trong kỳ vào doanh thu hoạt động tài chính hoặc chi phí tài chính của kỳ báo cáo."},{"k":"p","t":"- Các tài khoản phải thu còn số dư nguyên tệ thì doanh nghiệp phải đánh giá lại theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"6. Tại thời điểm lập Báo cáo tài chính, doanh nghiệp phải đánh giá lại các khoản phải thu là khoản mục tiền tệ có gốc ngoại tệ theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch."},{"k":"p","t":"Việc xác định tỷ giá chuyển khoản trung bình và xử lý chênh lệch tỷ giá do đánh giá lại khoản nợ phải thu là khoản mục tiền tệ có gốc ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"7. Các khoản nợ phải thu là khoản mục tiền tệ có gốc ngoại tệ nếu khó có khả năng thu hồi tại thời điểm cuối kỳ thì vẫn phải lập dự phòng phải thu khó đòi theo quy định."}]},{"id":"tt133_17","no":17,"code":"Điều 17","title":"Điều 17. Tài khoản 131 - Phải thu của khách hàng","shortTitle":"Tài khoản 131 - Phải thu của khách hàng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản nợ phải thu và tình hình thanh toán các khoản nợ phải thu của doanh nghiệp với khách hàng về tiền bán sản phẩm, hàng hóa, BĐSĐT, TSCĐ, các khoản đầu tư tài chính, cung cấp dịch vụ. Tài khoản này còn dùng để phản ánh các khoản phải thu của người nhận thầu XDCB với người giao thầu về khối lượng công tác XDCB đã hoàn thành. Không phản ánh vào tài khoản này các nghiệp vụ thu tiền ngay."},{"k":"p","t":"b) Khoản phải thu của khách hàng cần được hạch toán chi tiết cho từng đối tượng, từng nội dung phải thu, theo dõi chi tiết kỳ hạn thu hồi (trên 12 tháng hay không quá 12 tháng kể từ thời điểm lập báo cáo) và ghi chép theo từng lần thanh toán. Đối tượng phải thu là các khách hàng có quan hệ kinh tế với doanh nghiệp về mua sản phẩm, hàng hóa, nhận cung cấp dịch vụ, kể cả TSCĐ, bất động sản đầu tư, các khoản đầu tư tài chính."},{"k":"p","t":"c) Bên giao ủy thác xuất khẩu ghi nhận trong tài khoản này đối với các khoản phải thu từ bên nhận ủy thác xuất khẩu về tiền bán hàng xuất khẩu như các giao dịch bán hàng, cung cấp dịch vụ thông thường."},{"k":"p","t":"d) Trong hạch toán chi tiết tài khoản này, kế toán phải tiến hành phân loại các khoản nợ, loại nợ có thể trả đúng hạn, khoản nợ khó đòi hoặc có khả năng không thu hồi được, để có căn cứ xác định số trích lập dự phòng phải thu khó đòi hoặc có biện pháp xử lý đối với khoản nợ phải thu không đòi được. Khoản thiệt hại về nợ phải thu khó đòi sau khi trừ dự phòng đã trích lập được ghi nhận vào chi phí quản lý doanh nghiệp trong kỳ báo cáo. Khoản nợ khó đòi đã xử lý khi đòi được, hạch toán vào thu nhập khác."},{"k":"p","t":"đ) Trong quan hệ bán sản phẩm, hàng hóa, cung cấp dịch vụ theo thỏa thuận giữa doanh nghiệp với khách hàng, nếu sản phẩm, hàng hóa, TSCĐ, BĐSĐT đã giao, dịch vụ đã cung cấp không đúng theo thỏa thuận trong hợp đồng kinh tế thì người mua có thể yêu cầu doanh nghiệp giảm giá hàng bán hoặc trả lại số hàng đã giao."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 131 - Phải thu của khách hàng"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số tiền phải thu của khách hàng phát sinh trong kỳ khi bán sản phẩm, hàng hóa, BĐSĐT, TSCĐ, dịch vụ, các khoản đầu tư tài chính;"},{"k":"p","t":"- Số tiền thừa trả lại cho khách hàng;"},{"k":"p","t":"- Đánh giá lại các khoản phải thu của khách hàng là khoản mục tiền tệ có gốc ngoại tệ tại thời điểm lập BCTC (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số tiền khách hàng đã trả nợ;"},{"k":"p","t":"- Số tiền đã nhận ứng trước, trả trước của khách hàng;"},{"k":"p","t":"- Khoản giảm giá hàng bán trừ vào nợ phải thu của khách hàng;"},{"k":"p","t":"- Doanh thu của số hàng đã bán bị người mua trả lại (có thuế GTGT hoặc không có thuế GTGT);"},{"k":"p","t":"- Số tiền chiết khấu thanh toán và chiết khấu thương mại cho người mua;"},{"k":"p","t":"- Đánh giá lại các khoản phải thu của khách hàng là khoản mục tiền tệ có gốc ngoại tệ tại thời điểm lập BCTC (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Số tiền còn phải thu của khách hàng."},{"k":"p","t":"Tài khoản này có thể có số dư bên Có: Số dư bên Có phản ánh số tiền nhận trước hoặc số đã thu nhiều hơn số phải thu của khách hàng chi tiết theo từng đối tượng cụ thể. Khi lập Báo cáo tình hình tài chính, phải lấy số dư chi tiết theo từng đối tượng phải thu của tài khoản này để ghi cả hai chỉ tiêu bên \"Tài sản\" và bên \"Nguồn vốn\"."}]},{"id":"tt133_18","no":18,"code":"Điều 18","title":"Điều 18. Tài khoản 133 - Thuế GTGT được khấu trừ","shortTitle":"Tài khoản 133 - Thuế GTGT được khấu trừ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số thuế GTGT đầu vào được khấu trừ, đã khấu trừ và còn được khấu trừ của doanh nghiệp."},{"k":"p","t":"b) Kế toán phải hạch toán riêng thuế GTGT đầu vào được khấu trừ và thuế GTGT đầu vào không được khấu trừ. Trường hợp không thể hạch toán riêng được 15 thì số thuế GTGT đầu vào được hạch toán vào Tài khoản 133. Cuối kỳ, kế toán phải xác định số thuế GTGT được khấu trừ và không được khấu trừ theo quy định của pháp luật về thuế GTGT."},{"k":"p","t":"c) Số thuế GTGT đầu vào không được khấu trừ được tính vào giá trị tài sản được mua, giá vốn của hàng bán hoặc chi phí sản xuất, kinh doanh tùy theo từng trường hợp cụ thể."},{"k":"p","t":"d) Việc xác định số thuế GTGT đầu vào được khấu trừ, kê khai, quyết toán, nộp thuế phải tuân thủ theo đúng quy định của pháp luật về thuế GTGT."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 133 - Thuế GTGT được khấu trừ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"Số thuế GTGT đầu vào được khấu trừ."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số thuế GTGT đầu vào đã khấu trừ;"},{"k":"p","t":"- Kết chuyển số thuế GTGT đầu vào không được khấu trừ;"},{"k":"p","t":"- Thuế GTGT đầu vào của vật tư, hàng hóa mua vào nhưng đã trả lại, được chiết khấu, giảm giá;"},{"k":"p","t":"- Số thuế GTGT đầu vào đã được hoàn lại."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Số thuế GTGT đầu vào còn được khấu trừ, số thuế GTGT đầu vào được hoàn lại nhưng NSNN chưa hoàn trả."},{"k":"p","t":"Tài khoản 133 - Thuế GTGT được khấu trừ, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 1331 - Thuế GTGT được khấu trừ của hàng hóa, dịch vụ: Phản ánh thuế GTGT đầu vào được khấu trừ của vật tư, hàng hóa, dịch vụ mua ngoài dùng vào sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng chịu thuế GTGT tính theo phương pháp khấu trừ thuế."},{"k":"p","t":"- Tài khoản 1332 - Thuế GTGT được khấu trừ của tài sản cố định: Phản ánh thuế GTGT đầu vào của quá trình đầu tư, mua sắm tài sản cố định, bất động sản đầu tư dùng vào hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng chịu thuế GTGT tính theo phương pháp khấu trừ thuế."}]},{"id":"tt133_19","no":19,"code":"Điều 19","title":"Điều 19. Tài khoản 136 - Phải thu nội bộ","shortTitle":"Tài khoản 136 - Phải thu nội bộ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán:"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản nợ phải thu và tình hình thanh toán các khoản nợ phải thu của doanh nghiệp (đơn vị cấp trên) với đơn vị hạch toán phụ thuộc (đơn vị cấp dưới) hoặc giữa các đơn vị hạch toán phụ thuộc với nhau. Các đơn vị cấp dưới là đơn vị hạch toán phụ thuộc nhưng có tổ chức công tác kế toán như chi nhánh, xí nghiệp, nhà máy..."},{"k":"p","t":"b) Nội dung các khoản phải thu nội bộ phản ánh vào tài khoản 136 bao gồm:"},{"k":"p","t":"- Ở đơn vị cấp trên:"},{"k":"p","t":"+ Vốn, quỹ hoặc kinh phí đã giao, đã cấp cho cấp dưới;"},{"k":"p","t":"+ Các khoản cấp dưới phải nộp lên cấp trên theo quy định;"},{"k":"p","t":"+ Các khoản nhờ cấp dưới thu hộ;"},{"k":"p","t":"+ Các khoản đã chi, đã trả hộ cấp dưới;"},{"k":"p","t":"+ Các khoản đã giao cho đơn vị cấp dưới để thực hiện khối lượng giao khoán nội bộ và nhận lại giá trị giao khoán nội bộ;"},{"k":"p","t":"+ Các khoản phải thu vãng lai khác."},{"k":"p","t":"- Ở đơn vị cấp dưới hạch toán phụ thuộc:"},{"k":"p","t":"+ Các khoản được đơn vị cấp trên cấp nhưng chưa nhận được;"},{"k":"p","t":"+ Giá trị sản phẩm, hàng hóa dịch vụ chuyển cho đơn vị cấp trên hoặc các đơn vị nội bộ khác để bán;"},{"k":"p","t":"+ Doanh thu bán hàng hóa, cung cấp dịch vụ cho các đơn vị nội bộ;"},{"k":"p","t":"+ Các khoản nhờ đơn vị cấp trên hoặc đơn vị nội bộ khác thu hộ;"},{"k":"p","t":"+ Các khoản đã chi, đã trả hộ đơn vị cấp trên và đơn vị nội bộ khác;"},{"k":"p","t":"+ Các khoản phải thu nội bộ vãng lai khác."},{"k":"p","t":"c) Tài khoản 136 phải hạch toán chi tiết theo từng đơn vị cấp dưới có quan hệ thanh toán và theo dõi riêng từng khoản phải thu nội bộ. Doanh nghiệp cần có biện pháp đôn đốc giải quyết dứt điểm các khoản nợ phải thu nội bộ trong kỳ kế toán."},{"k":"p","t":"d) Cuối kỳ kế toán, phải kiểm tra, đối chiếu và xác nhận số phát sinh, số dư Tài khoản 136 \"Phải thu nội bộ\", Tài khoản 336 \"Phải trả nội bộ\" với từng đơn vị cấp dưới có quan hệ theo từng nội dung thanh toán. Tiến hành thanh toán bù trừ theo từng khoản của từng đơn vị cấp dưới hạch toán phụ thuộc hoặc đơn vị nội bộ khác, đồng thời hạch toán bù trừ trên 2 Tài khoản 136 “Phải thu nội bộ\" và Tài khoản 336 \"Phải trả nội bộ\" (theo chi tiết từng đối tượng). Khi đối chiếu, nếu có chênh lệch, phải tìm nguyên nhân và điều chỉnh kịp thời."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 136 - Phải thu nội bộ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số vốn kinh doanh đã giao cho đơn vị cấp dưới;"},{"k":"p","t":"- Các khoản đã chi hộ, trả hộ đơn vị cấp trên hoặc các đơn vị nội bộ khác;"},{"k":"p","t":"- Số tiền đơn vị cấp trên phải thu về, các khoản đơn vị cấp dưới phải nộp lên;"},{"k":"p","t":"- Số tiền đơn vị cấp dưới phải thu về các khoản cấp trên phải giao xuống;"},{"k":"p","t":"- Số tiền phải thu về bán sản phẩm, hàng hóa, dịch vụ giữa các đơn vị nội bộ với nhau;"},{"k":"p","t":"- Các khoản phải thu nội bộ khác."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Thu hồi vốn, quỹ ở đơn vị cấp dưới;"},{"k":"p","t":"- Số tiền đã thu về các khoản phải thu trong nội bộ;"},{"k":"p","t":"- Bù trừ phải thu với phải trả trong nội bộ với cùng một đối tượng."},{"k":"p","t":"Số dư bên Nợ: Số nợ còn phải thu ở các đơn vị nội bộ."},{"k":"p","t":"Tài khoản 136 - Phải thu nội bộ, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 1361 - Vốn kinh doanh ở đơn vị trực thuộc: Tài khoản này chỉ mở ở đơn vị cấp trên để phản ánh số vốn kinh doanh hiện có ở các đơn vị cấp dưới hạch toán phụ thuộc do đơn vị cấp trên giao."},{"k":"p","t":"- Tài khoản 1368 - Phải thu nội bộ khác: Phản ánh tất cả các khoản phải thu khác giữa các đơn vị nội bộ ngoài vốn kinh doanh ở đơn vị trực thuộc."}]},{"id":"tt133_20","no":20,"code":"Điều 20","title":"Điều 20. Tài khoản 138 - Phải thu khác","shortTitle":"Tài khoản 138 - Phải thu khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh các khoản nợ phải thu ngoài phạm vi đã phản ánh ở Tài khoản 131 - Phải thu của khách hàng, Tài khoản 136 - Phải thu nội bộ và tình hình thanh toán các khoản nợ phải thu này, gồm những nội dung chủ yếu sau:"},{"k":"p","t":"- Giá trị tài sản thiếu đã được phát hiện nhưng chưa xác định được nguyên nhân, phải chờ xử lý;"},{"k":"p","t":"- Các khoản phải thu về bồi thường vật chất do cá nhân, tập thể (trong và ngoài doanh nghiệp) gây ra như mất mát, hư hỏng vật tư, hàng hóa, tiền vốn,... đã được xử lý bắt bồi thường;"},{"k":"p","t":"- Các khoản cho bên khác mượn bằng tài sản phi tiền tệ (nếu cho mượn bằng tiền thì phải kế toán là cho vay trên TK 1288);"},{"k":"p","t":"- Các khoản chi đầu tư XDCB, chi phí sản xuất, kinh doanh nhưng không được cấp có thẩm quyền phê duyệt phải thu hồi;"},{"k":"p","t":"- Các khoản chi hộ phải thu hồi, như các khoản bên nhận ủy thác xuất, nhập khẩu chi hộ cho bên giao ủy thác xuất, nhập khẩu về phí ngân hàng, phí giám định hải quan, phí vận chuyển, bốc vác, các khoản thuế, ..."},{"k":"p","t":"- Tiền lãi cho vay, cổ tức, lợi nhuận phải thu từ các hoạt động đầu tư tài chính;"},{"k":"p","t":"- Số tiền hoặc giá trị tài sản mà doanh nghiệp đem đi cầm cố, thế chấp, ký quỹ, ký cược tại các doanh nghiệp, tổ chức khác trong các quan hệ kinh tế theo quy định của pháp luật;"},{"k":"p","t":"- Các khoản phải thu khác ngoài các khoản trên."},{"k":"p","t":"1.2. Nguyên tắc kế toán đối với các khoản cầm cố, thế chấp, ký quỹ, ký cược:"},{"k":"p","t":"a) Các khoản tiền, tài sản đem cầm cố, thế chấp ký quỹ, ký cược phải được theo dõi chặt chẽ và kịp thời thu hồi khi hết thời hạn cầm cố, thế chấp, ký quỹ, ký cược. Trường hợp các khoản ký quỹ, ký cược doanh nghiệp được quyền nhận lại nhưng quá hạn thu hồi thì doanh nghiệp được trích lập dự phòng như đối với các khoản nợ phải thu khó đòi."},{"k":"p","t":"b) Doanh nghiệp phải theo dõi chi tiết các khoản cầm cố, thế chấp ký cược, ký quỹ theo từng loại, từng đối tượng, kỳ hạn, nguyên tệ. Khi lập Báo cáo tài chính, những khoản có kỳ hạn còn lại dưới 12 tháng được phân loại là tài sản ngắn hạn; Những khoản có kỳ hạn còn lại từ 12 tháng trở lên được phân loại là tài sản dài hạn."},{"k":"p","t":"c) Đối với tài sản đưa đi cầm cố, thế chấp, ký quỹ, ký cược được phản ánh theo giá đã ghi sổ kế toán của doanh nghiệp. Khi xuất tài sản phi tiền tệ mang đi cầm cố ghi theo giá nào thì khi thu về ghi theo giá đó. Các tài sản thế chấp bằng giấy chứng nhận quyền sở hữu (như bất động sản) thì không ghi giảm tài sản mà theo dõi chi tiết trên sổ kế toán (chi tiết tài sản đang thế chấp) và thuyết minh trên Báo cáo tài chính."},{"k":"p","t":"d) Trường hợp có các khoản ký cược, ký quỹ bằng tiền hoặc tương đương tiền được quyền nhận lại bằng ngoại tệ thì phải đánh giá lại theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch."},{"k":"p","t":"1.3. Về nguyên tắc trong mọi trường hợp phát hiện thiếu tài sản, phải truy tìm nguyên nhân và người phạm lỗi để có biện pháp xử lý cụ thể. Chỉ hạch toán vào Tài khoản 1381 trường hợp chưa xác định được nguyên nhân về thiếu, mất mát, hư hỏng tài sản của doanh nghiệp phải chờ xử lý. Trường hợp tài sản thiếu đã xác định được nguyên nhân và đã có biên bản xử lý ngay trong kỳ thì ghi vào các tài khoản liên quan, không hạch toán qua Tài khoản 1381."},{"k":"p","t":"Giá trị hàng tồn kho bị hao hụt, mất mát (trừ hao hụt trong định mức trong quá trình thu mua được hạch toán vào giá trị hàng tồn kho) sau khi trừ số thu bồi thường được hạch toán vào giá vốn hàng bán."},{"k":"p","t":"Giá trị tài sản thiếu chờ xử lý đối với phần giá trị còn lại của TSCĐ thiếu qua kiểm kê sau khi trừ đi phần bồi thường của các tổ chức, cá nhân có liên quan được hạch toán vào chi phí khác của doanh nghiệp."},{"k":"p","t":"1.4. Khoản tổn thất về nợ phải thu khác khó đòi sau khi trừ số dự phòng đã trích lập được hạch toán vào chi phí quản lý doanh nghiệp."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 138 - Phải thu khác"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Giá trị tài sản thiếu chờ giải quyết;"},{"k":"p","t":"- Phải thu của cá nhân, tập thể (trong và ngoài doanh nghiệp) đối với tài sản thiếu đã xác định rõ nguyên nhân và có biên bản xử lý ngay;"},{"k":"p","t":"- Phải thu về tiền lãi cho vay, lãi tiền gửi, cổ tức, lợi nhuận được chia từ các hoạt động đầu tư tài chính;"},{"k":"p","t":"- Các khoản chi hộ bên thứ ba phải thu hồi, các khoản nợ phải thu khác;"},{"k":"p","t":"- Giá trị tài sản mang đi cầm cố hoặc số tiền đã ký quỹ, ký cược;"},{"k":"p","t":"- Đánh giá lại các khoản phải thu khác là khoản mục tiền tệ có gốc ngoại tệ (trường hợp tỷ giá ngoại tệ tăng so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Kết chuyển giá trị tài sản thiếu vào các tài khoản liên quan theo quyết định ghi trong biên bản xử lý;"},{"k":"p","t":"- Số tiền đã thu được về các khoản nợ phải thu khác;"},{"k":"p","t":"- Giá trị tài sản cầm cố hoặc số tiền ký quỹ, ký cược đã nhận lại hoặc đã thanh toán;"},{"k":"p","t":"- Khoản khấu trừ (phạt) vào tiền ký quỹ, ký cược tính vào chi phí khác;"},{"k":"p","t":"- Đánh giá lại các khoản phải thu khác là khoản mục tiền tệ có gốc ngoại tệ (trường hợp tỷ giá ngoại tệ giảm so với tỷ giá ghi sổ kế toán)."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Các khoản nợ phải thu khác chưa thu được."},{"k":"p","t":"Tài khoản này có thể có số dư bên Có: Số dư bên Có phản ánh số đã thu nhiều hơn số phải thu (trường hợp cá biệt và trong chi tiết của từng đối tượng cụ thể)."},{"k":"p","t":"Tài khoản 138 - Phải thu khác, có 3 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 1381 - Tài sản thiếu chờ xử lý: Phản ánh giá trị tài sản thiếu chưa xác định rõ nguyên nhân, còn chờ quyết định xử lý."},{"k":"p","t":"- Tài khoản 1386 - Cầm cố, thế chấp, ký quỹ, ký cược: Phản ánh số tiền hoặc giá trị tài sản mà doanh nghiệp đem đi cầm cố, ký quỹ, ký cược tại các doanh nghiệp, tổ chức khác trong các quan hệ kinh tế theo quy định của pháp luật."},{"k":"p","t":"- Tài khoản 1388 - Phải thu khác: Phản ánh các khoản phải thu của doanh nghiệp ngoài phạm vi các khoản phải thu phản ánh ở các TK 131, 133, 136, 1381, 1386 như: Phải thu các khoản cổ tức, lợi nhuận, tiền lãi; Phải thu các khoản phải bồi thường do làm mất tiền, tài sản;..."}]},{"id":"tt133_21","no":21,"code":"Điều 21","title":"Điều 21. Tài khoản 141 - Tạm ứng","shortTitle":"Tài khoản 141 - Tạm ứng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản tạm ứng của doanh nghiệp cho người lao động trong doanh nghiệp và tình hình thanh toán các khoản tạm ứng đó."},{"k":"p","t":"b) Khoản tạm ứng là một khoản tiền hoặc vật tư do doanh nghiệp giao cho người nhận tạm ứng để thực hiện nhiệm vụ sản xuất, kinh doanh hoặc giải quyết một công việc nào đó được phê duyệt. Người nhận tạm ứng phải là người lao động làm việc tại doanh nghiệp. Đối với người nhận tạm ứng thường xuyên (thuộc các bộ phận cung ứng vật tư, quản trị, hành chính) phải được Giám đốc (Tổng giám đốc) chỉ định bằng văn bản."},{"k":"p","t":"c) Người nhận tạm ứng (có tư cách cá nhân hay tập thể) phải chịu trách nhiệm với doanh nghiệp về số đã nhận tạm ứng và chỉ được sử dụng tạm ứng theo đúng mục đích và nội dung công việc đã được phê duyệt. Nếu số tiền nhận tạm ứng không sử dụng hoặc không sử dụng hết phải nộp lại quỹ. Người nhận tạm ứng không được chuyển số tiền tạm ứng cho người khác sử dụng."},{"k":"p","t":"Khi hoàn thành, kết thúc công việc được giao, người nhận tạm ứng phải lập bảng thanh toán tạm ứng (kèm theo chứng từ gốc) để thanh toán toàn bộ, dứt điểm (theo từng lần, từng khoản) số tạm ứng đã nhận, số tạm ứng đã sử dụng và khoản chênh lệch giữa số đã nhận tạm ứng với số đã sử dụng (nếu có). Khoản tạm ứng sử dụng không hết nếu không nộp lại quỹ thì phải tính trừ vào lương của người nhận tạm ứng. Trường hợp chi quá số nhận tạm ứng thì doanh nghiệp sẽ chi bổ sung số còn thiếu."},{"k":"p","t":"d) Phải thanh toán dứt điểm khoản tạm ứng kỳ trước mới được nhận tạm ứng kỳ sau. Kế toán phải mở sổ kế toán chi tiết theo dõi cho từng người nhận tạm ứng và ghi chép đầy đủ tình hình nhận, thanh toán tạm ứng theo từng lần tạm ứng."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 141 - Tạm ứng"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"Các khoản tiền, vật tư đã tạm ứng cho người lao động của doanh nghiệp."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Các khoản tạm ứng đã được thanh toán;"},{"k":"p","t":"- Số tiền tạm ứng dùng không hết nhập lại quỹ hoặc tính trừ vào lương;"},{"k":"p","t":"- Các khoản vật tư đã tạm ứng sử dụng không hết nhập lại kho."},{"k":"p","t":"Số dư bên Nợ:"},{"k":"p","t":"Số tạm ứng chưa thanh toán."}]},{"id":"tt133_22","no":22,"code":"Điều 22","title":"Điều 22. Nguyên tắc kế toán hàng tồn kho","shortTitle":"Nguyên tắc kế toán hàng tồn kho","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nhóm tài khoản hàng tồn kho được dùng để phản ánh trị giá hiện có và tình hình biến động hàng tồn kho của doanh nghiệp (nếu doanh nghiệp thực hiện kế toán hàng tồn kho theo phương pháp kê khai thường xuyên) hoặc được dùng để phản ánh giá trị hàng tồn kho đầu kỳ và cuối kỳ kế toán của doanh nghiệp (nếu doanh nghiệp thực hiện kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"2. Hàng tồn kho của doanh nghiệp là những tài sản được mua vào để sản xuất hoặc để bán trong kỳ sản xuất, kinh doanh bình thường, gồm:"},{"k":"p","t":"- Hàng mua đang đi trên đường;"},{"k":"p","t":"- Nguyên liệu, vật liệu;"},{"k":"p","t":"- Công cụ, dụng cụ;"},{"k":"p","t":"- Sản phẩm dở dang;"},{"k":"p","t":"- Thành phẩm;"},{"k":"p","t":"- Hàng hóa;"},{"k":"p","t":"- Hàng gửi bán."},{"k":"p","t":"3. Các loại sản phẩm, hàng hóa, vật tư, tài sản nhận giữ hộ, nhận ký gửi, nhận ủy thác xuất nhập khẩu, nhận gia công... không thuộc quyền sở hữu và kiểm soát của doanh nghiệp thì không được phản ánh là hàng tồn kho."},{"k":"p","t":"4. Kế toán hàng tồn kho phải được thực hiện theo quy định của Chuẩn mực kế toán “Hàng tồn kho” khi xác định giá gốc hàng tồn kho, phương pháp tính giá trị hàng tồn kho, xác định giá trị thuần có thể thực hiện được, lập dự phòng giảm giá hàng tồn kho và ghi nhận chi phí."},{"k":"p","t":"5. Nguyên tắc xác định giá gốc hàng tồn kho được quy định cụ thể cho từng loại vật tư, hàng hóa, theo nguồn hình thành và thời điểm tính giá."},{"k":"p","t":"6. Các khoản thuế không được hoàn lại được tính vào giá trị hàng tồn kho như: Thuế GTGT đầu vào của hàng tồn kho không được khấu trừ, thuế tiêu thụ đặc biệt, thuế nhập khẩu, thuế bảo vệ môi trường phải nộp khi mua hàng tồn kho."},{"k":"p","t":"- Các khoản chiết khấu thương mại, giảm giá nhận được sau khi mua hàng tồn kho (kể cả khoản vi phạm hợp đồng kinh tế) phải được phân bổ cho số hàng tồn kho trong kho, hàng đã bán, đã sử dụng cho sản xuất kinh doanh, xây dựng cơ bản để hạch toán cho phù hợp:"},{"k":"p","t":"+ Nếu hàng tồn kho còn tồn trong kho ghi giảm giá trị hàng tồn kho;"},{"k":"p","t":"+ Nếu hàng tồn kho đã bán thì ghi giảm giá vốn hàng bán;"},{"k":"p","t":"+ Nếu hàng tồn kho đã sử dụng cho hoạt động xây dựng cơ bản thì ghi giảm chi phí xây dựng cơ bản."},{"k":"p","t":"- Khoản chiết khấu thanh toán khi mua hàng tồn kho được hạch toán vào doanh thu hoạt động tài chính."},{"k":"p","t":"7. Khi bán hàng tồn kho, giá gốc của hàng tồn kho đã bán được ghi nhận là chi phí sản xuất, kinh doanh trong kỳ phù hợp với doanh thu liên quan đến chúng được ghi nhận và phù hợp với bản chất giao dịch. Trường hợp xuất hàng tồn kho để khuyến mại, quảng cáo thì thực hiện theo nguyên tắc:"},{"k":"p","t":"a) Trường hợp xuất hàng tồn kho để khuyến mại, quảng cáo không thu tiền, không kèm theo các điều kiện khác như phải mua sản phẩm, hàng hóa...., kế toán ghi nhận giá trị hàng tồn kho vào chi phí bán hàng (chi tiết hàng khuyến mại, quảng cáo);"},{"k":"p","t":"b) Trường hợp xuất hàng tồn kho để khuyến mại, quảng cáo nhưng khách hàng chỉ được nhận hàng khuyến mại, quảng cáo kèm theo các điều kiện khác như phải mua sản phẩm, hàng hóa (ví dụ như mua 2 sản phẩm được tặng 1 sản phẩm....) thì kế toán phải phân bổ số tiền thu được để tính doanh thu cho cả hàng khuyến mại, giá trị hàng khuyến mại được tính vào giá vốn (trường hợp này bản chất giao dịch là giảm giá hàng bán)."},{"k":"p","t":"c) Trường hợp dùng hàng tồn kho biếu tặng cho người lao động được trang trải bằng quỹ khen thưởng, phúc lợi hoặc trả lương cho người lao động thì kế toán ghi nhận doanh thu, giá vốn như giao dịch bán hàng thông thường. Giá trị hàng tồn kho biếu tặng được ghi giảm quỹ khen thưởng, phúc lợi."},{"k":"p","t":"d) Khoản chiết khấu thanh toán cho khách hàng khi bán hàng tồn kho hạch toán vào chi phí tài chính."},{"k":"p","t":"8. Khi xác định giá trị hàng tồn kho xuất trong kỳ, doanh nghiệp áp dụng theo một trong các phương pháp sau:"},{"k":"p","t":"a) Phương pháp tính theo giá đích danh: Phương pháp tính theo giá đích danh được áp dụng dựa trên giá trị thực tế của từng lần nhập hàng hóa mua vào, từng thứ sản phẩm sản xuất ra nên chỉ áp dụng cho các doanh nghiệp có ít mặt hàng hoặc mặt hàng ổn định và nhận diện được chi tiết về giá nhập của từng lô hàng tồn kho."},{"k":"p","t":"b) Phương pháp bình quân gia quyền: Theo phương pháp bình quân gia quyền, giá trị của từng loại hàng tồn kho được tính theo giá trị trung bình của từng loại hàng tồn kho đầu kỳ và giá trị từng loại hàng tồn kho được mua hoặc sản xuất trong kỳ. Giá trị trung bình có thể được tính theo từng kỳ hoặc sau từng lô hàng nhập về, phụ thuộc vào điều kiện cụ thể của mỗi doanh nghiệp."},{"k":"p","t":"c) Phương pháp nhập trước, xuất trước (FIFO): Phương pháp nhập trước, xuất trước áp dụng dựa trên giả định là giá trị hàng tồn kho được mua hoặc được sản xuất trước thì được xuất trước và giá trị hàng tồn kho còn lại cuối kỳ là giá trị hàng tồn kho được mua hoặc sản xuất gần thời điểm cuối kỳ. Theo phương pháp này thì giá trị hàng xuất kho được tính theo giá của lô hàng nhập kho ở thời điểm đầu kỳ hoặc gần đầu kỳ, giá trị của hàng tồn kho cuối kỳ được tính theo giá của hàng nhập kho ở thời điểm cuối kỳ hoặc gần cuối kỳ còn tồn kho."},{"k":"p","t":"Mỗi phương pháp tính giá trị hàng tồn kho đều có những ưu, nhược điểm nhất định. Mức độ chính xác và độ tin cậy của mỗi phương pháp tùy thuộc vào yêu cầu quản lý, trình độ, năng lực nghiệp vụ và trình độ trang bị công cụ tính toán, phương tiện xử lý thông tin của doanh nghiệp. Đồng thời cũng tùy thuộc vào yêu cầu bảo quản, tính phức tạp về chủng loại, quy cách và sự biến động của vật tư, hàng hóa ở doanh nghiệp."},{"k":"p","t":"9. Đối với hàng tồn kho mua vào bằng ngoại tệ, giá mua hàng tồn kho phải căn cứ vào tỷ giá giao dịch thực tế phát sinh để ghi nhận. Trường hợp doanh nghiệp ứng trước tiền cho người bán thì phần giá trị hàng tồn kho tương ứng với số tiền ứng trước được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm ứng trước, phần giá trị hàng tồn kho tương ứng với số tiền còn lại được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm ghi nhận hàng tồn kho."},{"k":"p","t":"Kế toán hàng tồn kho liên quan đến các giao dịch bằng ngoại tệ và xử lý chênh lệch tỷ giá được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"10. Đến cuối niên độ kế toán, nếu xét thấy giá trị hàng tồn kho không thu hồi đủ do bị hư hỏng, lỗi thời, giá bán bị giảm hoặc chi phí hoàn thiện, chi phí bán hàng tăng lên thì phải ghi giảm giá gốc hàng tồn kho cho bằng giá trị thuần có thể thực hiện được của hàng tồn kho. Giá trị thuần có thể thực hiện được là giá bán ước tính của hàng tồn kho trong kỳ sản xuất, kinh doanh bình thường trừ (-) chi phí ước tính để hoàn thiện sản phẩm và chi phí ước tính cần thiết cho việc tiêu thụ chúng."},{"k":"p","t":"Việc ghi giảm giá gốc hàng tồn kho cho bằng giá trị thuần có thể thực hiện được được thực hiện bằng cách lập dự phòng giảm giá hàng tồn kho. Số dự phòng giảm giá hàng tồn kho được lập là số chênh lệch giữa giá gốc của hàng tồn kho lớn hơn giá trị thuần có thể thực hiện được của chúng."},{"k":"p","t":"Khoản tổn thất hoặc thiệt hại về hàng tồn kho do hư hỏng, lỗi thời không có khả năng thu hồi được sau khi trừ số dự phòng giảm giá hàng tồn kho đã trích lập (nếu có) được ghi vào giá vốn hàng bán trong kỳ."},{"k":"p","t":"Tất cả các khoản chênh lệch giữa khoản dự phòng giảm giá hàng tồn kho phải lập ở cuối kỳ kế toán này lớn hơn khoản dự phòng giảm giá hàng tồn kho đã lập ở cuối kỳ kế toán trước, các khoản hao hụt, mất mát của hàng tồn kho, sau khi đã trừ (-) phần bồi thường do trách nhiệm cá nhân gây ra và chi phí sản xuất chung không phân bổ được ghi nhận vào giá vốn hàng bán trong kỳ. Trường hợp khoản dự phòng giảm giá hàng tồn kho được lập ở cuối kỳ kế toán này nhỏ hơn khoản dự phòng giảm giá hàng tồn kho đã lập ở cuối kỳ kế toán trước thì số chênh lệch nhỏ hơn phải được hoàn nhập ghi giảm giá vốn hàng bán trong kỳ."},{"k":"p","t":"11. Kế toán hàng tồn kho phải đồng thời kế toán chi tiết cả về giá trị và hiện vật theo từng thứ, từng loại, quy cách vật tư, hàng hóa theo từng địa điểm quản lý và sử dụng, luôn phải đảm bảo sự khớp, đúng cả về giá trị và hiện vật giữa thực tế về vật tư, hàng hóa với sổ kế toán tổng hợp và sổ kế toán chi tiết."},{"k":"p","t":"Trường hợp hàng tồn kho thừa phát hiện khi kiểm kê nếu xác định được là của doanh nghiệp khác thì không ghi tăng hàng tồn kho tương ứng với khoản phải trả khác."},{"k":"p","t":"12. Trong một doanh nghiệp chỉ được áp dụng một trong hai phương pháp kế toán hàng tồn kho: Phương pháp kê khai thường xuyên hoặc phương pháp kiểm kê định kỳ. Việc lựa chọn phương pháp kế toán hàng tồn kho áp dụng tại doanh nghiệp phải căn cứ vào đặc điểm, tính chất, số lượng, chủng loại vật tư, hàng hóa và yêu cầu quản lý để có sự vận dụng thích hợp và phải được thực hiện nhất quán trong niên độ kế toán."},{"k":"p","t":"Các phương pháp kế toán hàng tồn kho."},{"k":"p","t":"a) Phương pháp kê khai thường xuyên: Phương pháp kê khai thường xuyên là phương pháp theo dõi và phản ánh thường xuyên, liên tục, có hệ thống tình hình nhập, xuất, tồn vật tư, hàng hóa trên sổ kế toán. Trong trường hợp áp dụng phương pháp kê khai thường xuyên, các tài khoản kế toán hàng tồn kho được dùng để phản ánh số hiện có, tình hình biến động tăng, giảm của vật tư, hàng hóa. Vì vậy, giá trị hàng tồn kho trên sổ kế toán có thể được xác định ở bất kỳ thời điểm nào trong kỳ kế toán."},{"k":"p","t":"Cuối kỳ kế toán, căn cứ vào số liệu kiểm kê thực tế hàng tồn kho, so sánh, đối chiếu với số liệu hàng tồn kho trên sổ kế toán. Về nguyên tắc số tồn kho thực tế phải luôn phù hợp với số tồn kho trên sổ kế toán. Nếu có chênh lệch phải truy tìm nguyên nhân và có giải pháp xử lý kịp thời. Phương pháp kê khai thường xuyên thường áp dụng cho các doanh nghiệp sản xuất (công nghiệp, xây lắp...) và các doanh nghiệp thương mại kinh doanh các mặt hàng có giá trị lớn như máy móc, thiết bị, hàng có kỹ thuật, chất lượng cao..."},{"k":"p","t":"b) Phương pháp kiểm kê định kỳ:"},{"k":"p","t":"- Phương pháp kiểm kê định kỳ là phương pháp hạch toán căn cứ vào kết quả kiểm kê thực tế để phản ánh giá trị tồn kho cuối kỳ vật tư, hàng hóa trên sổ kế toán tổng hợp và từ đó tính giá trị của hàng hóa, vật tư đã xuất trong kỳ theo công thức:"},{"k":"p","t":"Trị giá hàng xuất kho trong kỳ"},{"k":"p","t":"="},{"k":"p","t":"Trị giá hàng tồn kho đầu kỳ"},{"k":"p","t":"+"},{"k":"p","t":"Tổng trị giá hàng nhập kho trong kỳ"},{"k":"p","t":"-"},{"k":"p","t":"Trị giá hàng tồn kho cuối kỳ"},{"k":"p","t":"- Theo phương pháp kiểm kê định kỳ, mọi biến động của vật tư, hàng hóa (nhập kho, xuất kho) không theo dõi, phản ánh trên các tài khoản kế toán hàng tồn kho. Giá trị của vật tư, hàng hóa mua và nhập kho trong kỳ được theo dõi, phản ánh trên Tài khoản 611 “Mua hàng”."},{"k":"p","t":"- Công tác kiểm kê vật tư, hàng hóa được tiến hành cuối mỗi kỳ kế toán để xác định trị giá vật tư, hàng hóa tồn kho thực tế, trị giá vật tư, hàng hóa xuất kho trong kỳ (tiêu dùng cho sản xuất hoặc xuất bán) làm căn cứ ghi sổ kế toán của Tài khoản 611 “Mua hàng”. Như vậy, khi áp dụng phương pháp kiểm kê định kỳ, các tài khoản kế toán hàng tồn kho chỉ sử dụng ở đầu kỳ kế toán (để kết chuyển số dư đầu kỳ) và cuối kỳ kế toán (để phản ánh giá trị thực tế hàng tồn kho cuối kỳ)."},{"k":"p","t":"- Phương pháp kiểm kê định kỳ thường áp dụng ở các doanh nghiệp có nhiều chủng loại hàng hóa, vật tư với quy cách, mẫu mã rất khác nhau, giá trị thấp, hàng hóa, vật tư xuất dùng hoặc xuất bán thường xuyên (cửa hàng bán lẻ...). Phương pháp kiểm kê định kỳ hàng tồn kho có ưu điểm là đơn giản, giảm nhẹ khối lượng công việc hạch toán. Nhưng độ chính xác về giá trị vật tư, hàng hóa xuất dùng, xuất bán bị ảnh hưởng của chất lượng công tác quản lý tại kho, quầy, bến bãi."},{"k":"p","t":"13. Việc phân loại hàng tồn kho là vật tư hay thiết bị, phụ tùng thay thế tùy thuộc vào đặc điểm kinh doanh của doanh nghiệp."},{"k":"p","t":"14. Chi phí vận chuyển, bảo quản hàng tồn kho phát sinh trong quá trình mua hàng hoặc tiếp tục quá trình sản xuất, chế biến thì được ghi nhận vào giá gốc hàng tồn kho. Chi phí vận chuyển, bảo quản hàng tồn kho liên quan đến việc tiêu thụ hàng tồn kho thì được tính vào chi phí bán hàng."}]},{"id":"tt133_23","no":23,"code":"Điều 23","title":"Điều 23. Tài khoản 151 - Hàng mua đang đi đường","shortTitle":"Tài khoản 151 - Hàng mua đang đi đường","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá của các loại hàng hóa, vật tư (nguyên liệu, vật liệu; công cụ, dụng cụ; hàng hóa) mua ngoài đã thuộc quyền sở hữu của doanh nghiệp nhưng đến cuối kỳ vẫn còn đang trên đường vận chuyển, ở bến cảng, bến bãi hoặc đã về đến doanh nghiệp nhưng đang chờ kiểm nhận nhập kho."},{"k":"p","t":"b) Hàng hóa, vật tư được coi là thuộc quyền sở hữu của doanh nghiệp nhưng chưa nhập kho, bao gồm:"},{"k":"p","t":"- Hàng hóa, vật tư mua ngoài đã thanh toán tiền hoặc đã chấp nhận thanh toán nhưng còn để ở kho người bán, ở bến cảng, bến bãi hoặc đang trên đường vận chuyển;"},{"k":"p","t":"- Hàng hóa, vật tư mua ngoài đã về đến doanh nghiệp nhưng đang chờ kiểm nghiệm, kiểm nhận nhập kho."},{"k":"p","t":"c) Kế toán hàng mua đang đi đường được ghi nhận trên Tài khoản 151 theo nguyên tắc giá gốc."},{"k":"p","t":"d) Hàng ngày, khi nhận được hóa đơn mua hàng nhưng hàng chưa về nhập kho, kế toán chưa ghi sổ mà tiến hành đối chiếu với hợp đồng kinh tế và lưu hóa đơn vào tập hồ sơ riêng: “Hàng mua đang đi đường”."},{"k":"p","t":"Trong kỳ, nếu hàng về nhập kho, kế toán căn cứ vào phiếu nhập kho và hóa đơn mua hàng ghi sổ trực tiếp vào các Tài khoản 152 “Nguyên liệu, vật liệu”, Tài khoản 153 “Công cụ, dụng cụ”, Tài khoản 156 “Hàng hóa”."},{"k":"p","t":"đ) Nếu cuối kỳ hàng vẫn chưa về thì căn cứ hóa đơn mua hàng ghi vào Tài khoản 151 “Hàng mua đang đi đường”. Kế toán phải mở chi tiết để theo dõi hàng mua đang đi đường theo từng chủng loại hàng hóa, vật tư, từng lô hàng, từng hợp đồng kinh tế."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 151 - Hàng mua đang đi đường"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá hàng hóa, vật tư đã mua đang đi đường;"},{"k":"p","t":"- Kết chuyển trị giá thực tế của hàng hóa, vật tư mua đang đi đường cuối kỳ (trường hợp doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định 26 kỳ)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Trị giá hàng hóa, vật tư đã mua đang đi đường đã về nhập kho hoặc đã chuyển giao thẳng cho khách hàng;"},{"k":"p","t":"- Kết chuyển trị giá thực tế của hàng hóa, vật tư đã mua đang đi đường đầu kỳ (trường hợp doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"Số dư bên Nợ: Trị giá hàng hóa, vật tư đã mua nhưng còn đang đi đường (chưa về nhập kho doanh nghiệp)."}]},{"id":"tt133_24","no":24,"code":"Điều 24","title":"Điều 24. Tài khoản 152 - Nguyên liệu, vật liệu","shortTitle":"Tài khoản 152 - Nguyên liệu, vật liệu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá hiện có và tình hình biến động tăng, giảm của các loại nguyên liệu, vật liệu trong kho của doanh nghiệp. Nguyên liệu, vật liệu của doanh nghiệp là những đối tượng lao động mua ngoài hoặc tự chế biến dùng cho mục đích sản xuất, kinh doanh của doanh nghiệp. Nguyên liệu, vật liệu phản ánh vào tài khoản này được phân loại như sau:"},{"k":"p","t":"- Nguyên liệu, vật liệu chính: Là những loại nguyên liệu và vật liệu khi tham gia vào quá trình sản xuất thì cấu thành thực thể vật chất, thực thể chính của sản phẩm. Vì vậy khái niệm nguyên liệu, vật liệu chính gắn liền với từng doanh nghiệp sản xuất cụ thể. Trong các doanh nghiệp kinh doanh thương mại, dịc
