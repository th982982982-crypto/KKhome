nh thu do nó tạo ra phải được ghi nhận đồng thời theo nguyên tắc phù hợp. Tuy nhiên trong một số trường hợp, nguyên tắc phù hợp có thể xung đột với nguyên tắc thận trọng trong kế toán, thì kế toán phải căn cứ vào bản chất của giao dịch để phản ánh một cách trung thực, hợp lý."},{"k":"p","t":"3. Kế toán phải theo dõi chi tiết các khoản chi phí phát sinh theo yếu tố, tiền lương, nguyên vật liệu, chi phí mua ngoài, khấu hao TSCĐ..."},{"k":"p","t":"4. Các khoản chi phí không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."},{"k":"p","t":"5. Các tài khoản phản ánh chi phí không có số dư, cuối kỳ kế toán phải kết chuyển tất cả các khoản chi phí phát sinh trong kỳ để xác định kết quả kinh doanh."}]},{"id":"tt133_60","no":60,"code":"Điều 60","title":"Điều 60. Tài khoản 611 - Mua hàng","shortTitle":"Tài khoản 611 - Mua hàng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa mua vào, nhập kho hoặc đưa vào sử dụng trong kỳ. Tài khoản 611 \"Mua hàng\" chỉ áp dụng đối với doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ."},{"k":"p","t":"b) Giá trị nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa mua vào phản ánh trên tài khoản 611 \"Mua hàng\" phải thực hiện theo nguyên tắc giá gốc."},{"k":"p","t":"c) Trường hợp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ, doanh nghiệp phải tổ chức kiểm kê hàng tồn kho để xác định số lượng và giá trị của từng nguyên liệu, vật liệu, hàng hóa, sản phẩm, công cụ, dụng cụ tồn kho tại thời điểm cuối kỳ kế toán để xác định giá trị hàng tồn kho xuất vào sử dụng và xuất bán trong kỳ."},{"k":"p","t":"d) Phương pháp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ: Khi mua nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa, căn cứ vào hóa đơn mua hàng, Hóa đơn vận chuyển, phiếu nhập kho, thông báo thuế nhập khẩu phải nộp (hoặc biên lai thu thuế nhập khẩu,...) để ghi nhận giá gốc hàng mua vào tài khoản 611 \"Mua hàng\". Khi xuất sử dụng, hoặc xuất bán chỉ ghi một lần vào cuối kỳ kế toán căn cứ vào kết quả kiểm kê."},{"k":"p","t":"đ) Kế toán phải mở sổ chi tiết để hạch toán giá gốc hàng tồn kho mua vào theo từng thứ nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa."}]},{"id":"tt133_61","no":61,"code":"Điều 61","title":"Điều 61. Tài khoản 631 - Giá thành sản xuất","shortTitle":"Tài khoản 631 - Giá thành sản xuất","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tổng hợp chi phí sản xuất và tính giá thành sản phẩm, dịch vụ ở các đơn vị sản xuất công nghiệp, nông nghiệp, lâm nghiệp và các đơn vị kinh doanh dịch vụ vận tải, bưu điện, du lịch, khách sạn,... trong trường hợp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ."},{"k":"p","t":"b) Đối với doanh nghiệp hạch toán hàng tồn kho theo phương pháp kê khai thường xuyên không sử dụng tài khoản này."},{"k":"p","t":"c) Chỉ hạch toán vào tài khoản 631 các loại chi phí sản xuất, kinh doanh sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu trực tiếp;"},{"k":"p","t":"- Chi phí nhân công trực tiếp;"}]},{"id":"tt133_62","no":62,"code":"Điều 62","title":"Điều 62. Tài khoản 632 - Giá vốn hàng bán","shortTitle":"Tài khoản 632 - Giá vốn hàng bán","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá vốn của sản phẩm, hàng hóa, dịch vụ, bất động sản đầu tư; giá thành sản xuất của sản phẩm xây lắp (đối với doanh nghiệp xây lắp) bán trong kỳ. Ngoài ra, tài khoản này còn dùng để phản ánh các chi phí liên quan đến hoạt động kinh doanh bất động sản đầu tư như: Chi phí khấu hao; chi phí sửa chữa; chi phí cho thuê BĐSĐT theo phương thức cho thuê hoạt động; chi phí nhượng bán, thanh lý BĐSĐT…"},{"k":"p","t":"b) Khoản dự phòng giảm giá hàng tồn kho được tính vào giá vốn hàng bán trên cơ sở số lượng hàng tồn kho và phần chênh lệch giữa giá trị thuần có thể thực hiện được nhỏ hơn giá gốc hàng tồn kho. Khi xác định khối lượng hàng tồn kho bị giảm giá cần phải trích lập dự phòng, kế toán phải loại trừ khối lượng hàng tồn kho đã ký được hợp đồng tiêu thụ (có giá trị thuần có thể thực hiện được không thấp hơn giá trị ghi sổ) nhưng chưa chuyển giao cho khách hàng nếu có bằng chứng chắc chắn về việc khách hàng sẽ không từ bỏ thực hiện hợp đồng và loại trừ hàng tồn kho dùng cho hoạt động xây dựng cơ bản, giá trị hàng tồn kho dùng cho sản xuất sản phẩm mà sản phẩm được tạo ra từ những hàng tồn kho này có giá bán bằng hoặc cao hơn giá thành sản xuất của sản phẩm."},{"k":"p","t":"c) Đối với phần giá trị hàng tồn kho hao hụt, mất mát, kế toán phải tính ngay vào giá vốn hàng bán (sau khi trừ đi các khoản bồi thường, nếu có)."},{"k":"p","t":"d) Các khoản thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường đã tính vào giá trị hàng mua, nếu khi xuất bán hàng hóa mà các khoản thuế đó được hoàn lại thì được ghi giảm giá vốn hàng bán."},{"k":"p","t":"e) Các khoản chi phí không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."}]},{"id":"tt133_63","no":63,"code":"Điều 63","title":"Điều 63. Tài khoản 635 - Chi phí tài chính","shortTitle":"Tài khoản 635 - Chi phí tài chính","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này phản ánh những khoản chi phí hoạt động tài chính bao gồm:"},{"k":"p","t":"- Chi phí lãi tiền vay, lãi mua hàng trả chậm, lãi thuê tài sản thuê tài chính;"},{"k":"p","t":"- Chiết khấu thanh toán cho người mua;"},{"k":"p","t":"- Các khoản lỗ do thanh lý, nhượng bán các khoản đầu tư; chi phí giao dịch bán chứng khoán;"},{"k":"p","t":"- Lỗ tỷ giá hối đoái phát sinh trong kỳ; Lỗ tỷ giá hối đoái do đánh giá lại cuối kỳ các khoản mục tiền tệ có gốc ngoại tệ; Lỗ bán ngoại tệ;"}]},{"id":"tt133_64","no":64,"code":"Điều 64","title":"Điều 64. Tài khoản 642 - Chi phí quản lý kinh doanh","shortTitle":"Tài khoản 642 - Chi phí quản lý kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh các khoản chi phí quản lý kinh doanh bao gồm chi phí bán hàng và chi phí quản lý doanh nghiệp:"},{"k":"p","t":"Chi phí bán hàng bao gồm các chi phí thực tế phát sinh trong quá trình bán sản phẩm, hàng hóa, cung cấp dịch vụ, bao gồm các chi phí chào hàng, giới thiệu sản phẩm, quảng cáo sản phẩm, hoa hồng bán hàng, chi phí bảo hành sản phẩm, hàng hóa (trừ hoạt động xây lắp), chi phí bảo quản, đóng gói, vận chuyển, lương nhân viên bộ phận bán hàng (tiền lương, tiền công, các khoản phụ cấp,...), bảo hiểm xã hội, bảo hiểm y tế, kinh phí công đoàn, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động của nhân viên bán hàng; chi phí vật liệu, công cụ lao động, khấu hao TSCĐ dùng cho bộ phận bán hàng; dịch vụ mua ngoài (điện, nước, điện thoại, fax,...); chi phí bằng tiền khác."},{"k":"p","t":"Chi phí quản lý doanh nghiệp bao gồm các chi phí quản lý chung của doanh nghiệp bao gồm các chi phí về lương nhân viên bộ phận quản lý doanh nghiệp (tiền lương, tiền công, các khoản phụ cấp,...); bảo hiểm xã hội, bảo hiểm y tế, kinh phí công đoàn, bảo hiểm thất nghiệp của nhân viên quản lý doanh nghiệp; chi phí vật liệu văn phòng, công cụ lao động, khấu hao TSCĐ dùng cho quản lý doanh nghiệp; tiền thuê đất, thuế môn bài; khoản lập dự phòng phải thu khó đòi; dịch vụ mua ngoài (điện, nước, điện thoại, fax, bảo hiểm tài sản, cháy nổ...); chi phí bằng tiền khác (tiếp khách, hội nghị khách hàng...)."},{"k":"p","t":"1.2. Các khoản chi phí bán hàng, chi phí quản lý doanh nghiệp không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."},{"k":"p","t":"1.3. Tài khoản 642 được mở chi tiết theo từng nội dung chi phí theo quy định. Tùy theo yêu cầu quản lý của từng ngành, từng doanh nghiệp, tài khoản 642 có thể được mở chi tiết theo từng loại chi phí như: chi phí bán hàng, chi phí quản lý doanh nghiệp. Trong từng loại chi phí được theo dõi chi tiết theo từng nội dung chi phí như:"}]},{"id":"tt133_65","no":65,"code":"Điều 65","title":"Điều 65. Tài khoản 711 - Thu nhập khác","shortTitle":"Tài khoản 711 - Thu nhập khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản thu nhập khác ngoài hoạt động sản xuất, kinh doanh thông thường của doanh nghiệp, gồm:"},{"k":"p","t":"- Thu nhập từ nhượng bán, thanh lý TSCĐ;"},{"k":"p","t":"- Chênh lệch giữa giá trị hợp lý tài sản được chia từ BCC cao hơn chi phí đầu tư xây dựng tài sản đồng kiểm soát;"},{"k":"p","t":"- Chênh lệch lãi do đánh giá lại vật tư, hàng hóa, tài sản cố định đưa đi góp vốn liên doanh, đầu tư vào công ty liên kết và đầu tư khác;"},{"k":"p","t":"- Các khoản thuế phải nộp khi bán hàng hóa, cung cấp dịch vụ nhưng sau đó được giảm, được hoàn (thuế xuất khẩu được hoàn, thuế GTGT, TTĐB, BVMT phải nộp nhưng sau đó được giảm);"}]},{"id":"tt133_66","no":66,"code":"Điều 66","title":"Điều 66. Tài khoản 811 - Chi phí khác","shortTitle":"Tài khoản 811 - Chi phí khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này phản ánh những khoản chi phí phát sinh do các sự kiện hay các nghiệp vụ riêng biệt với hoạt động thông thường của doanh nghiệp. Chi phí khác của doanh nghiệp có thể gồm:"},{"k":"p","t":"- Chi phí thanh lý, nhượng bán TSCĐ (gồm cả chi phí đấu thầu hoạt động thanh lý). Số tiền thu từ bán hồ sơ thầu hoạt động thanh lý, nhượng bán TSCĐ được ghi giảm chi phí thanh lý, nhượng bán TSCĐ;"},{"k":"p","t":"- Chênh lệch giữa giá trị hợp lý tài sản được chia từ BCC nhỏ hơn chi phí đầu tư xây dựng tài sản đồng kiểm soát;"},{"k":"p","t":"- Giá trị còn lại của TSCĐ bị phá dỡ;"},{"k":"p","t":"- Giá trị còn lại của TSCĐ thanh lý, nhượng bán TSCĐ (nếu có);"}]},{"id":"tt133_67","no":67,"code":"Điều 67","title":"Điều 67. Tài khoản 821 - Chi phí thuế thu nhập doanh nghiệp","shortTitle":"Tài khoản 821 - Chi phí thuế thu nhập doanh nghiệp","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Nguyên tắc kế toán chi phí thuế thu nhập doanh nghiệp"},{"k":"p","t":"- Tài khoản này dùng để phản ánh chi phí thuế thu nhập doanh nghiệp của doanh nghiệp phát sinh trong năm làm căn cứ xác định kết quả hoạt động kinh doanh sau thuế của doanh nghiệp trong năm tài chính hiện hành."},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp được ghi nhận vào tài khoản này là số thuế thu nhập doanh nghiệp phải nộp tính trên thu nhập chịu thuế trong năm và thuế suất thuế thu nhập doanh nghiệp hiện hành."},{"k":"p","t":"- Hàng quý, kế toán căn cứ vào chứng từ nộp thuế thu nhập doanh nghiệp để ghi nhận số thuế thu nhập doanh nghiệp tạm phải nộp vào chi phí thuế thu nhập doanh nghiệp. Cuối năm tài chính, căn cứ vào tờ khai quyết toán thuế, nếu số thuế thu nhập doanh nghiệp tạm phải nộp trong năm nhỏ hơn số phải nộp cho năm đó, kế toán ghi nhận số thuế thu nhập doanh nghiệp phải nộp thêm vào chi phí thuế thu nhập doanh nghiệp. Trường hợp số thuế thu nhập doanh nghiệp tạm phải nộp trong năm lớn hơn số phải nộp của năm đó, kế toán phải ghi giảm chi phí thuế thu nhập doanh nghiệp là số chênh lệch giữa số thuế thu nhập doanh nghiệp tạm phải nộp trong năm lớn hơn số phải nộp."},{"k":"p","t":"- Trường hợp phát hiện sai sót không trọng yếu liên quan đến khoản thuế thu nhập doanh nghiệp phải nộp của các năm trước, doanh nghiệp được hạch toán tăng (hoặc giảm) số thuế thu nhập doanh nghiệp phải nộp của các năm trước vào chi phí thuế thu nhập doanh nghiệp của năm phát hiện sai sót."}]},{"id":"tt133_68","no":68,"code":"Điều 68","title":"Điều 68. Tài khoản 911 - Xác định kết quả kinh doanh","shortTitle":"Tài khoản 911 - Xác định kết quả kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để xác định và phản ánh kết quả hoạt động kinh doanh và các hoạt động khác của doanh nghiệp trong một kỳ kế toán. Kết quả hoạt động kinh doanh của doanh nghiệp bao gồm: Kết quả hoạt động sản xuất, kinh doanh, kết quả hoạt động tài chính và kết quả hoạt động khác."},{"k":"p","t":"- Kết quả hoạt động sản xuất, kinh doanh là số chênh lệch giữa doanh thu thuần và trị giá vốn hàng bán (gồm cả sản phẩm, hàng hóa, bất động sản đầu tư và dịch vụ, giá thành sản xuất của sản phẩm xây lắp, chi phí liên quan đến hoạt động kinh doanh bất động sản đầu tư, như: chi phí khấu hao, chi phí sửa chữa, nâng cấp, chi phí cho thuê hoạt động, chi phí thanh lý, nhượng bán bất động sản đầu tư), chi phí bán hàng và chi phí quản lý doanh nghiệp."},{"k":"p","t":"- Kết quả hoạt động tài chính là số chênh lệch giữa thu nhập của hoạt động tài chính và chi phí hoạt động tài chính."},{"k":"p","t":"- Kết quả hoạt động khác là số chênh lệch giữa các khoản thu nhập khác và các khoản chi phí khác và chi phí thuế thu nhập doanh nghiệp."},{"k":"p","t":"b) Tài khoản này phải phản ánh đầy đủ, chính xác kết quả hoạt động kinh doanh của kỳ kế toán. Kết quả hoạt động kinh doanh phải được hạch toán chi tiết theo từng loại hoạt động (hoạt động sản xuất, chế biến, hoạt động kinh doanh thương mại, dịch vụ, hoạt động tài chính...). Trong từng loại hoạt động kinh doanh có thể cần hạch toán chi tiết cho từng loại sản phẩm, từng ngành hàng, từng loại dịch vụ."}]},{"id":"tt133_69","no":69,"code":"Điều 69","title":"Điều 69. Mục đích của báo cáo tài chính","shortTitle":"Mục đích của báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Báo cáo tài chính dùng để cung cấp thông tin về tình hình tài chính, tình hình kinh doanh và các luồng tiền của một doanh nghiệp, đáp ứng yêu cầu quản lý của chủ doanh nghiệp, cơ quan Nhà nước và nhu cầu hữu ích của những người sử dụng trong việc đưa ra các quyết định kinh tế. Báo cáo tài chính phải cung cấp những thông tin của một doanh nghiệp về:"},{"k":"p","t":"a) Tài sản;"},{"k":"p","t":"b) Nợ phải trả;"},{"k":"p","t":"c) Vốn chủ sở hữu;"},{"k":"p","t":"d) Doanh thu, thu nhập khác, chi phí sản xuất kinh doanh và chi phí khác;"},{"k":"p","t":"đ) Lãi, lỗ và phân chia kết quả kinh doanh."}]},{"id":"tt133_70","no":70,"code":"Điều 70","title":"Điều 70. Đối tượng áp dụng, trách nhiệm lập và chữ ký trên báo cáo tài chính","shortTitle":"Đối tượng áp dụng, trách nhiệm lập và chữ ký trên báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đối tượng lập Báo cáo tài chính năm:"},{"k":"p","t":"Hệ thống Báo cáo tài chính năm ban hành theo Thông tư này được áp dụng cho tất cả các loại hình doanh nghiệp có quy mô nhỏ và vừa thuộc mọi lĩnh vực, 123 mọi thành phần kinh tế trong cả nước."},{"k":"p","t":"2. Việc ký Báo cáo tài chính phải thực hiện theo quy định của Luật Kế toán. Trường hợp doanh nghiệp không tự lập Báo cáo tài chính mà thuê đơn vị kinh doanh dịch vụ kế toán lập Báo cáo tài chính, người hành nghề thuộc các đơn vị kinh doanh dịch vụ kế toán phải ký và ghi rõ số giấy chứng nhận đăng ký hành nghề dịch vụ kế toán, tên đơn vị kinh doanh dịch vụ kế toán trên báo cáo tài chính của đơn vị."}]},{"id":"tt133_71","no":71,"code":"Điều 71","title":"Điều 71. Hệ thống báo cáo tài chính","shortTitle":"Hệ thống báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Hệ thống báo cáo tài chính năm áp dụng cho các doanh nghiệp nhỏ và vừa đáp ứng giả định hoạt động liên tục bao gồm:"},{"k":"p","t":"a) Báo cáo bắt buộc:"},{"k":"p","t":"- Báo cáo tình hình tài chính"},{"k":"p","t":"Mẫu số B01a - DNN"},{"k":"p","t":"- Báo cáo kết quả hoạt động kinh doanh"},{"k":"p","t":"Mẫu số B02 - DNN"}]},{"id":"tt133_72","no":72,"code":"Điều 72","title":"Điều 72. Yêu cầu đối với thông tin trình bày trong Báo cáo tài chính","shortTitle":"Yêu cầu đối với thông tin trình bày trong Báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tin trình bày trên báo cáo tài chính phải đầy đủ, khách quan, không có sai sót để phản ánh trung thực, hợp lý tình hình tài chính, tình hình và kết quả kinh doanh của doanh nghiệp."},{"k":"p","t":"- Thông tin được coi là đầy đủ khi bao gồm tất cả các thông tin cần thiết để giúp người sử dụng báo cáo tài chính hiểu được bản chất, hình thức và rủi ro của các giao dịch và sự kiện. Đối với một số khoản mục, việc trình bày đầy đủ còn phải mô tả thêm các thông tin về chất lượng, các yếu tố và tình huống có thể ảnh hưởng tới chất lượng và bản chất của khoản mục."},{"k":"p","t":"- Trình bày khách quan là không thiên vị khi lựa chọn hoặc mô tả các thông tin tài chính. Trình bày khách quan phải đảm bảo tính trung lập, không chú trọng, nhấn mạnh hoặc giảm nhẹ cũng như có các thao tác khác làm thay đổi mức độ ảnh hưởng của thông tin tài chính là có lợi hoặc không có lợi cho người sử dụng Báo cáo tài chính."},{"k":"p","t":"- Không sai sót có nghĩa là không có sự bỏ sót trong việc mô tả hiện tượng và không có sai sót trong quá trình cung cấp các thông tin báo cáo được lựa chọn và áp dụng. Không sai sót không có nghĩa là hoàn toàn chính xác trong tất cả các khía cạnh, ví dụ, việc ước tính các loại giá cả và giá trị không quan sát được khó xác định là chính xác hay không chính xác. Việc trình bày một ước tính được coi là trung thực nếu giá trị ước tính được mô tả rõ ràng, bản chất và các hạn chế của quá trình ước tính được giải thích và không có sai sót trong việc lựa chọn số liệu phù hợp trong quá trình ước tính."},{"k":"p","t":"2. Thông tin tài chính phải thích hợp để giúp người sử dụng Báo cáo tài chính dự đoán, phân tích và đưa ra các quyết định kinh tế."},{"k":"p","t":"3. Thông tin tài chính phải được trình bày đầy đủ trên mọi khía cạnh trọng yếu. Thông tin được coi là trọng yếu trong trường hợp nếu thiếu thông tin hoặc thông tin thiếu chính xác có thể làm ảnh hưởng tới quyết định của người sử dụng thông tin tài chính của đơn vị báo cáo. Tính trọng yếu dựa vào bản chất và độ lớn, hoặc cả hai, của các khoản mục có liên quan được trình bày trên báo cáo tài chính của một đơn vị cụ thể."}]},{"id":"tt133_73","no":73,"code":"Điều 73","title":"Điều 73. Nguyên tắc lập và trình bày Báo cáo tài chính của doanh nghiệp đáp ứng giả định hoạt động liên tục","shortTitle":"Nguyên tắc lập và trình bày Báo cáo tài chính của doanh nghiệp đáp ứng giả định hoạt động liên tục","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Báo cáo tài chính phải phản ánh đúng bản chất kinh tế của các giao dịch và sự kiện hơn là hình thức pháp lý của các giao dịch và sự kiện đó (tôn trọng bản chất hơn hình thức)."},{"k":"p","t":"2. Tài sản không được ghi nhận cao hơn giá trị có thể thu hồi; Nợ phải trả không được ghi nhận thấp hơn nghĩa vụ phải thanh toán."},{"k":"p","t":"3. Phân loại tài sản và nợ phải trả: Tài sản và nợ phải trả trên Báo cáo tình hình tài chính được trình bày theo tính thanh khoản giảm dần hoặc trình bày thành ngắn hạn và dài hạn. Riêng Báo cáo tình hình tài chính của doanh nghiệp siêu nhỏ được trình bày theo tính thanh khoản giảm dần."},{"k":"p","t":"4. Trường hợp Báo cáo tình hình tài chính trình bày thành ngắn hạn và dài hạn:"},{"k":"p","t":"Trên Báo cáo tình hình tài chính, các khoản mục Tài sản và Nợ phải trả phải được trình bày riêng biệt thành ngắn hạn và dài hạn, tùy theo thời hạn của chu kỳ kinh doanh thông thường của doanh nghiệp, cụ thể như sau:"},{"k":"p","t":"a) Đối với doanh nghiệp có chu kỳ kinh doanh thông thường trong vòng 12 tháng, thì Tài sản và Nợ phải trả được phân thành ngắn hạn và dài hạn theo nguyên tắc sau:"}]},{"id":"tt133_74","no":74,"code":"Điều 74","title":"Điều 74. Nguyên tắc lập và trình bày báo cáo tài chính của doanh nghiệp không đáp ứng giả định hoạt động liên tục","shortTitle":"Nguyên tắc lập và trình bày báo cáo tài chính của doanh nghiệp không đáp ứng giả định hoạt động liên tục","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Khi lập và trình bày Báo cáo tài chính, doanh nghiệp phải xem xét giả định về sự hoạt động liên tục. Doanh nghiệp bị coi là không hoạt động liên tục nếu hết thời hạn hoạt động mà không có hồ sơ xin gia hạn hoạt động, bị giải thể, phá sản, chấm dứt hoạt động (phải có văn bản cụ thể gửi cơ quan có thẩm quyền) trong vòng không quá 12 tháng kể từ thời điểm lập Báo cáo tài chính. Đối với doanh nghiệp có chu kỳ sản xuất, kinh doanh thông thường hơn 12 tháng thì không quá một chu kỳ sản xuất kinh doanh thông thường."},{"k":"p","t":"2. Trong một số trường hợp sau doanh nghiệp vẫn được coi là hoạt động liên tục:"},{"k":"p","t":"- Việc thay đổi hình thức sở hữu doanh nghiệp, thay đổi loại hình doanh nghiệp, ví dụ chuyển một công ty TNHH thành công ty cổ phần hoặc ngược lại;"},{"k":"p","t":"- Việc chuyển một đơn vị có tư cách pháp nhân hạch toán độc lập thành một đơn vị không có tư cách pháp nhân hạch toán phụ thuộc hoặc ngược lại (ví dụ chuyển một công ty con thành một chi nhánh hoặc ngược lại) vẫn được coi là hoạt động liên tục."},{"k":"p","t":"3. Khi không đáp ứng giả định hoạt động liên tục, doanh nghiệp vẫn phải trình bày đủ các Báo cáo tài chính và ghi rõ là:"},{"k":"p","t":"- Báo cáo tình hình tài chính áp dụng cho doanh nghiệp không đáp ứng giả định hoạt động liên tục và được trình bày theo Mẫu B01 - DNNKLT;"}]},{"id":"tt133_75","no":75,"code":"Điều 75","title":"Điều 75. Nguyên tắc lập và trình bày báo cáo tài chính khi thay đổi kỳ kế toán","shortTitle":"Nguyên tắc lập và trình bày báo cáo tài chính khi thay đổi kỳ kế toán","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"Khi thay đổi kỳ kế toán, ví dụ đổi kỳ kế toán từ năm dương lịch sang kỳ kế toán khác năm dương lịch, doanh nghiệp phải tiến hành khóa sổ kế toán, lập Báo cáo tài chính theo nguyên tắc sau:"},{"k":"p","t":"1. Việc thay đổi kỳ kế toán phải tuân thủ theo quy định của Luật Kế toán. Khi thay đổi kỳ kế toán năm, kế toán phải lập riêng Báo cáo tài chính cho giai đoạn giữa 2 kỳ kế toán của năm tài chính cũ và năm tài chính mới."},{"k":"p","t":"Ví dụ: Doanh nghiệp có kỳ kế toán năm 2014 theo năm dương lịch. Năm 2015, doanh nghiệp chuyển sang áp dụng kỳ kế toán năm bắt đầu từ 1/4 năm trước đến 31/3 năm sau thì doanh nghiệp phải lập báo cáo tài chính cho giai đoạn từ 1/1/2015 đến 31/3/2015."},{"k":"p","t":"2. Đối với Báo cáo tình hình tài chính: Toàn bộ số dư tài sản, nợ phải trả và vốn chủ sở hữu của kỳ kế toán trước khi chuyển đổi được ghi nhận là số dư đầu kỳ của kỳ kế toán mới và được trình bày trong cột “Số đầu năm”."},{"k":"p","t":"3. Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Số liệu kể từ thời điểm thay đổi kỳ kế toán đến cuối kỳ báo cáo đầu tiên được trình bày trong cột “Kỳ này”, cột “kỳ trước” trình bày số liệu của 12 tháng trước tương đương với kỳ kế toán năm hiện tại."},{"k":"p","t":"Ví dụ: Tiếp theo ví dụ trên, khi trình bày cột “Kỳ trước” trong báo cáo kết quả hoạt động kinh doanh bắt đầu từ ngày 1/4/2015 và kết thúc ngày 31/3/2016, doanh nghiệp phải trình bày số liệu của giai đoạn từ 1/4/2014 đến 31/3/2015."}]},{"id":"tt133_76","no":76,"code":"Điều 76","title":"Điều 76. Nguyên tắc lập và trình bày Báo cáo tài chính khi chuyển đổi loại hình hoặc hình thức sở hữu doanh nghiệp","shortTitle":"Nguyên tắc lập và trình bày Báo cáo tài chính khi chuyển đổi loại hình hoặc hình thức sở hữu doanh nghiệp","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"Khi chuyển đổi hình thức sở hữu, chuyển đổi loại hình doanh nghiệp phải tiến hành khóa sổ kế toán, lập Báo cáo tài chính theo quy định của pháp luật. Trong kỳ kế toán đầu tiên sau khi chuyển đổi, doanh nghiệp phải ghi sổ kế toán và trình bày báo cáo tài chính theo nguyên tắc sau:"},{"k":"p","t":"1. Đối với sổ kế toán phản ánh tài sản, nợ phải trả và vốn chủ sở hữu: Toàn bộ số dư tài sản, nợ phải trả và vốn chủ sở hữu trên sổ kế toán của doanh nghiệp cũ được ghi nhận là số dư đầu kỳ trên sổ kế toán của doanh nghiệp mới."},{"k":"p","t":"2. Đối với Báo cáo tình hình tài chính: Toàn bộ số dư tài sản, nợ phải trả và vốn chủ sở hữu kế thừa của doanh nghiệp cũ trước khi chuyển đổi được ghi nhận là số dư đầu kỳ của doanh nghiệp mới và được trình bày trong cột “Số đầu năm”."},{"k":"p","t":"3. Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Số liệu kể từ thời điểm chuyển đổi đến cuối kỳ báo cáo đầu tiên được trình bày trong cột “Kỳ này”, cột “Kỳ trước” trình bày số liệu cột “Kỳ này” của Báo cáo kỳ trước liền kề. Doanh nghiệp phải trình bày trên thuyết minh báo cáo tài chính về lý do dẫn đến số liệu ở cột “kỳ trước” không có khả năng so sánh được với số liệu ở cột “kỳ này” (nếu có)."}]},{"id":"tt133_77","no":77,"code":"Điều 77","title":"Điều 77. Nguyên tắc lập và trình bày Báo cáo tài chính khi chia, tách, hợp nhất, sáp nhập doanh nghiệp","shortTitle":"Nguyên tắc lập và trình bày Báo cáo tài chính khi chia, tách, hợp nhất, sáp nhập doanh nghiệp","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Đơn vị kế toán bị chia, bị tách, hợp nhất thành đơn vị kế toán mới phải thực hiện các công việc kế toán theo quy định của Luật kế toán. Đơn vị kế toán mới thực hiện công việc kế toán cho kỳ kế toán đầu tiên theo nguyên tắc sau:"},{"k":"p","t":"- Đối với sổ kế toán phản ánh tài sản, nợ phải trả và vốn chủ sở hữu: Toàn bộ tài sản, nợ phải trả và vốn chủ sở hữu của đơn vị kế toán bị chia, bị tách, hợp nhất chuyển sang được ghi nhận là số phát sinh của đơn vị kế toán mới."},{"k":"p","t":"- Đối với Báo cáo tình hình tài chính: Cột “Số đầu năm” của đơn vị kế toán mới không có số liệu và phải trình bày rõ vấn đề này trong thuyết minh báo cáo tài chính."},{"k":"p","t":"- Đối với Báo cáo kết quả hoạt động kinh doanh và Báo cáo lưu chuyển tiền tệ: Chỉ trình bày số liệu kể từ thời điểm bị chia, bị tách, hợp nhất đến cuối kỳ báo cáo vào cột “Kỳ này”. Cột “Kỳ trước” không có số liệu và phải trình bày rõ vấn đề này trong thuyết minh báo cáo tài chính."},{"k":"p","t":"2. Khi sáp nhập đơn vị kế toán thì đơn vị kế toán nhận sáp nhập phải thực hiện các công việc kế toán theo quy định của Luật kế toán. Đơn vị kế toán nhận sáp nhập thực hiện công việc kế toán theo nguyên tắc:"},{"k":"p","t":"- Đối với sổ kế toán phản ánh tài sản, nợ phải trả và vốn chủ sở hữu: Toàn bộ tài sản, nợ phải trả và vốn chủ sở hữu trên sổ kế toán của đơn vị kế toán bị sáp nhập được ghi nhận là số phát sinh trong kỳ của đơn vị nhận sáp nhập. Số dư đầu kỳ của đơn vị kế toán nhận sáp nhập vẫn giữ nguyên."}]},{"id":"tt133_78","no":78,"code":"Điều 78","title":"Điều 78. Đồng tiền sử dụng để lập báo cáo tài chính khi công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam","shortTitle":"Đồng tiền sử dụng để lập báo cáo tài chính khi công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Báo cáo tài chính được sử dụng để công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam phải được trình bày bằng Đồng Việt Nam. Trường hợp doanh nghiệp lập Báo cáo tài chính bằng đồng ngoại tệ thì phải chuyển đổi Báo cáo tài chính ra Đồng Việt Nam và khi công bố ra công chúng và nộp các cơ quan chức năng quản lý Nhà nước tại Việt Nam thì báo cáo tài chính bằng Đồng Việt Nam phải được đính kèm báo cáo tài chính bằng đồng ngoại tệ. Báo cáo tài chính dùng để xác định nghĩa vụ thuế của doanh nghiệp được thực hiện theo quy định của pháp luật về thuế."},{"k":"p","t":"2. Phương pháp chuyển đổi Báo cáo tài chính lập bằng ngoại tệ sang Đồng Việt Nam để công bố thông tin ra công chúng và nộp các cơ quan quản lý Nhà nước:"},{"k":"p","t":"a) Khi chuyển đổi Báo cáo tài chính được lập bằng đồng ngoại tệ ra Đồng Việt Nam, kế toán phải quy đổi các chỉ tiêu của Báo cáo tài chính theo nguyên tắc sau:"},{"k":"p","t":"- Tài sản và nợ phải trả được quy đổi ra Đồng Việt Nam theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch;"},{"k":"p","t":"- Vốn chủ sở hữu (vốn góp của chủ sở hữu, thặng dư vốn cổ phần, vốn khác) được quy đổi ra Đồng Việt Nam theo tỷ giá giao dịch thực tế tại ngày góp vốn;"},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối, các quỹ trích từ lợi nhuận sau thuế chưa phân phối được quy đổi ra Đồng Việt Nam bằng cách tính toán theo các khoản mục của Báo cáo kết quả hoạt động kinh doanh;"}]},{"id":"tt133_79","no":79,"code":"Điều 79","title":"Điều 79. Nguyên tắc lập Báo cáo tài chính khi thay đổi đơn vị tiền tệ trong kế toán","shortTitle":"Nguyên tắc lập Báo cáo tài chính khi thay đổi đơn vị tiền tệ trong kế toán","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Khi thay đổi đơn vị tiền tệ kế toán, tại kỳ đầu tiên kể từ khi thay đổi, kế toán thực hiện chuyển đổi số dư sổ kế toán sang đơn vị tiền tệ kế toán mới theo tỷ giá chuyển khoản trung bình của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch tại thời điểm thay đổi đơn vị tiền tệ kế toán."},{"k":"p","t":"2. Khi trình bày thông tin so sánh (cột kỳ trước) trên báo cáo kết quả hoạt động kinh doanh và báo cáo lưu chuyển tiền tệ của kỳ có sự thay đổi đơn vị tiền tệ trong kế toán, đơn vị áp dụng tỷ giá chuyển khoản trung bình kỳ trước liền kề với kỳ thay đổi."},{"k":"p","t":"3. Khi thay đổi đơn vị tiền tệ kế toán, doanh nghiệp phải trình bày rõ trên Bản thuyết minh báo cáo tài chính lý do thay đổi đơn vị tiền tệ kế toán và những ảnh hưởng (nếu có) đối với báo cáo tài chính do việc thay đổi đơn vị tiền tệ kế toán."}]},{"id":"tt133_80","no":80,"code":"Điều 80","title":"Điều 80. Trách nhiệm, thời hạn lập và gửi báo cáo tài chính","shortTitle":"Trách nhiệm, thời hạn lập và gửi báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Trách nhiệm, thời hạn lập và gửi báo cáo tài chính:"},{"k":"p","t":"a) Tất cả các doanh nghiệp nhỏ và vừa phải lập và gửi báo cáo tài chính năm chậm nhất là 90 ngày kể từ ngày kết thúc năm tài chính cho các cơ quan có liên quan theo quy định."},{"k":"p","t":"b) Ngoài việc lập báo cáo tài chính năm, các doanh nghiệp có thể lập báo cáo tài chính hàng tháng, quý để phục vụ yêu cầu quản lý và điều hành hoạt động sản xuất, kinh doanh của doanh nghiệp."},{"k":"p","t":"2. Nơi nhận báo cáo tài chính năm được quy định như sau:"},{"k":"p","t":"Các doanh nghiệp nộp báo cáo tài chính năm cho cơ quan thuế, cơ quan đăng ký kinh doanh và cơ quan Thống kê."},{"k":"p","t":"Các doanh nghiệp (kể cả các doanh nghiệp trong nước và doanh nghiệp có vốn đầu tư nước ngoài) có trụ sở nằm trong khu chế xuất, khu công nghiệp, khu công nghệ cao thì ngoài việc nộp Báo cáo tài chính năm cho các cơ quan theo quy định (Cơ quan thuế, cơ quan đăng ký kinh doanh, cơ quan thống kê) còn phải nộp Báo cáo tài chính năm cho Ban quản lý khu chế xuất, khu công nghiệp, khu công nghệ cao nếu được yêu cầu."}]},{"id":"tt133_81","no":81,"code":"Điều 81","title":"Điều 81. Hướng dẫn lập và trình bày Báo cáo tài chính","shortTitle":"Hướng dẫn lập và trình bày Báo cáo tài chính","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Những thông tin chung về doanh nghiệp"},{"k":"p","t":"Trong Báo cáo tài chính năm, doanh nghiệp phải trình bày các thông tin chung sau:"},{"k":"p","t":"- Tên và địa chỉ của doanh nghiệp;"},{"k":"p","t":"- Ngày kết thúc kỳ kế toán;"},{"k":"p","t":"- Ngày lập báo cáo tài chính;"},{"k":"p","t":"- Đơn vị tiền tệ dùng để ghi sổ kế toán;"}]},{"id":"tt133_82","no":82,"code":"Điều 82","title":"Điều 82. Nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ","shortTitle":"Nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung và phương pháp lập các chỉ tiêu của Báo cáo tình hình tài chính (Mẫu số B01 - DNSN)"},{"k":"p","t":"1.1. Tài sản"},{"k":"p","t":"- Tiền và các khoản tương đương tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ tiền mặt tại quỹ, tiền gửi ngân hàng không kỳ hạn và các khoản tương đương tiền hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 111, 112, số dư Nợ chi tiết của TK 1281 (chi tiết các khoản tiền gửi có kỳ hạn gốc không quá 3 tháng) và TK 1288 (chi tiết các khoản đủ tiêu chuẩn phân loại là tương đương tiền)."},{"k":"p","t":"Các khoản tương đương tiền có thể bao gồm: Kỳ phiếu ngân hàng, tín phiếu kho bạc, tiền gửi ngân hàng có kỳ hạn gốc không quá 3 tháng…"}]},{"id":"tt133_83","no":83,"code":"Điều 83","title":"Điều 83. Nội dung và phương pháp lập Bảng cân đối tài khoản (Mẫu số F01 - DNN)","shortTitle":"Nội dung và phương pháp lập Bảng cân đối tài khoản (Mẫu số F01 - DNN)","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Mục đích: Phản ánh tổng quát tình hình tăng giảm và hiện có về tài sản và nguồn vốn của đơn vị trong kỳ báo cáo và từ đầu năm đến cuối kỳ báo cáo. Số liệu trên Bảng cân đối tài khoản là căn cứ để kiểm tra việc ghi chép trên sổ kế toán tổng hợp, đồng thời đối chiếu và kiểm soát số liệu ghi trên Báo cáo tài chính"},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ:"},{"k":"p","t":"Bảng cân đối tài khoản được lập dựa trên Sổ Cái và Bảng cân đối tài khoản kỳ trước."},{"k":"p","t":"Trước khi lập Bảng cân đối tài khoản phải hoàn thành việc ghi sổ kế toán chi tiết và sổ kế toán tổng hợp; kiểm tra, đối chiếu số liệu giữa các sổ có liên quan."},{"k":"p","t":"Số liệu ghi vào Bảng cân đối tài khoản chia làm 2 loại:"},{"k":"p","t":"- Loại số liệu phản ánh số dư các tài khoản tại thời điểm đầu kỳ (Cột 1,2- Số dư đầu năm), tại thời điểm cuối kỳ (cột 5, 6 Số dư cuối năm), trong đó các tài khoản có số dư Nợ được phản ánh vào cột “Nợ”, các tài khoản có số dư Có được phản ánh vào cột “Có”."}]},{"id":"tt133_84","no":84,"code":"Điều 84","title":"Điều 84. Quy định chung về chứng từ kế toán và hệ thống biểu mẫu chứng từ kế toán","shortTitle":"Quy định chung về chứng từ kế toán và hệ thống biểu mẫu chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán áp dụng cho các doanh nghiệp phải thực hiện theo đúng quy định của Luật Kế toán, Nghị định quy định chi tiết một số điều của Luật Kế toán và các văn bản sửa đổi, bổ sung."},{"k":"p","t":"2. Các loại chứng từ kế toán tại danh mục và biểu mẫu chứng từ kế toán đều thuộc loại hướng dẫn. Doanh nghiệp được chủ động xây dựng, thiết kế biểu mẫu chứng từ kế toán phù hợp với đặc điểm hoạt động và yêu cầu quản lý của mình nhưng phải đáp ứng được các yêu cầu của Luật kế toán và đảm bảo nguyên tắc rõ ràng, minh bạch, kịp thời, dễ kiểm tra, kiểm soát và đối chiếu."},{"k":"p","t":"3. Trường hợp không tự xây dựng và thiết kế biểu mẫu chứng từ cho riêng mình, doanh nghiệp có thể áp dụng hệ thống biểu mẫu chứng từ kế toán theo hướng dẫn tại Phụ lục 3 ban hành kèm theo Thông tư này để ghi chép chứng từ kế toán phù hợp với đặc điểm hoạt động sản xuất, kinh doanh và yêu cầu quản lý của doanh nghiệp."},{"k":"p","t":"4. Các doanh nghiệp có các nghiệp vụ kinh tế, tài chính đặc thù thuộc đối tượng điều chỉnh của các văn bản pháp luật khác thì áp dụng theo quy định về chứng từ tại các văn bản đó."}]},{"id":"tt133_85","no":85,"code":"Điều 85","title":"Điều 85. Lập và ký chứng từ kế toán","shortTitle":"Lập và ký chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các nghiệp vụ kinh tế, tài chính phát sinh liên quan đến hoạt động của doanh nghiệp phải lập chứng từ kế toán. Chứng từ kế toán chỉ được lập một lần cho mỗi nghiệp vụ kinh tế, tài chính."},{"k":"p","t":"2. Chứng từ kế toán phải được lập rõ ràng, đầy đủ, kịp thời, chính xác theo nội dung quy định trên mẫu. Trong trường hợp chứng từ kế toán chưa có mẫu thì đơn vị kế toán được tự thiết kế mẫu chứng từ kế toán nhưng phải bảo đảm đầy đủ các nội dung quy định của Luật Kế toán."},{"k":"p","t":"3. Nội dung nghiệp vụ kinh tế, tài chính trên chứng từ kế toán không được viết tắt, không được tẩy xóa, sửa chữa; khi viết phải dùng bút mực, số và chữ viết phải liên tục, không ngắt quãng, chỗ trống phải gạch chéo. Chứng từ bị tẩy xóa, sửa chữa không có giá trị thanh toán và ghi sổ kế toán. Khi viết sai chứng từ kế toán thì phải hủy bỏ bằng cách gạch chéo vào chứng từ viết sai."},{"k":"p","t":"4. Chứng từ kế toán phải được lập đủ số liên quy định. Trường hợp phải lập nhiều liên chứng từ kế toán cho một nghiệp vụ kinh tế, tài chính thì nội dung các liên phải giống nhau."},{"k":"p","t":"5. Chứng từ kế toán phải có đủ chữ ký theo chức danh quy định trên chứng từ. Chữ ký trên chứng từ kế toán phải được ký bằng loại mực không phai. Không được ký chứng từ kế toán bằng mực màu đỏ hoặc đóng dấu chữ ký khắc sẵn. Chữ ký trên chứng từ kế toán của một người phải thống nhất. Người lập, người duyệt và những người khác ký tên trên chứng từ kế toán phải chịu trách nhiệm về nội dung của chứng từ kế toán."},{"k":"p","t":"6. Các doanh nghiệp chưa có chức danh kế toán trưởng thì phải cử người phụ trách kế toán để giao dịch với khách hàng, ngân hàng... Chữ ký kế toán trưởng được thay bằng chữ ký của người phụ trách kế toán của đơn vị đó. Người phụ trách kế toán phải thực hiện đúng trách nhiệm và quyền quy định cho kế toán trưởng."}]},{"id":"tt133_86","no":86,"code":"Điều 86","title":"Điều 86. Trình tự luân chuyển và kiểm tra chứng từ kế toán","shortTitle":"Trình tự luân chuyển và kiểm tra chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Tất cả các chứng từ kế toán do doanh nghiệp lập hoặc từ bên ngoài chuyển đến đều phải tập trung tại bộ phận kế toán doanh nghiệp. Bộ phận kế toán kiểm tra những chứng từ kế toán đó và chỉ sau khi kiểm tra và xác minh tính pháp lý của chứng từ thì mới dùng những chứng từ đó để ghi sổ kế toán."},{"k":"p","t":"2. Trình tự luân chuyển chứng từ kế toán bao gồm các bước sau:"},{"k":"p","t":"- Lập, tiếp nhận, xử lý chứng từ kế toán;"},{"k":"p","t":"- Kế toán viên, kế toán trưởng kiểm tra và ký chứng từ kế toán hoặc trình người ký duyệt theo thẩm quyền;"},{"k":"p","t":"- Phân loại, sắp xếp chứng từ kế toán, định khoản và ghi sổ kế toán;"},{"k":"p","t":"- Lưu trữ, bảo quản chứng từ kế toán."}]},{"id":"tt133_87","no":87,"code":"Điều 87","title":"Điều 87. Dịch chứng từ kế toán ra tiếng Việt, sử dụng, quản lý, in và phát hành biểu mẫu chứng từ kế toán","shortTitle":"Dịch chứng từ kế toán ra tiếng Việt, sử dụng, quản lý, in và phát hành biểu mẫu chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"Các chứng từ kế toán ghi bằng tiếng nước ngoài, khi sử dụng để ghi sổ kế toán và lập báo cáo tài chính ở Việt Nam phải được dịch các nội dung chủ yếu quy định tại Luật Kế toán ra tiếng Việt."},{"k":"p","t":"Đơn vị kế toán phải chịu trách nhiệm về tính chính xác và đầy đủ của nội dung được dịch ra tiếng nước ngoài sang tiếng Việt. Bản chứng từ dịch ra tiếng việt phải đính kèm với bản chính bằng tiếng nước ngoài."},{"k":"p","t":"Các tài liệu kèm theo chứng từ kế toán bằng tiếng nước ngoài như các loại hợp đồng, hồ sơ kèm theo chứng từ thanh toán, hồ sơ dự án đầu tư, báo cáo quyết toán và các tài liệu liên quan khác không phải dịch ra tiếng Việt trừ khi có yêu cầu của cơ quan Nhà nước có thẩm quyền."},{"k":"p","t":"Các doanh nghiệp có thể mua sẵn hoặc tự thiết kế mẫu, tự in, nhưng phải đảm bảo các nội dung chủ yếu của chứng từ quy định tại Luật Kế toán."},{"k":"p","t":"Chứng từ phải được bảo quản cẩn thận, không được để hư hỏng, mục nát. Séc và giấy tờ có giá phải được quản lý như tiền. Các doanh nghiệp có sử dụng chứng từ điện tử cho hoạt động kinh tế, tài chính và ghi sổ kế toán thì phải tuân thủ theo quy định của các văn bản pháp luật về chứng từ điện tử."}]},{"id":"tt133_88","no":88,"code":"Điều 88","title":"Điều 88. Sổ kế toán","shortTitle":"Sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Sổ kế toán dùng để ghi chép, hệ thống và lưu giữ toàn bộ các nghiệp vụ kinh tế, tài chính đã phát sinh theo nội dung kinh tế và theo trình tự thời gian có liên quan đến doanh nghiệp. Mỗi doanh nghiệp nhỏ và vừa chỉ có một hệ thống sổ kế toán cho một kỳ kế toán. Doanh nghiệp nhỏ và vừa phải thực hiện các quy định về sổ kế toán trong Luật Kế toán, các văn bản hướng dẫn thi hành Luật Kế toán và các văn bản hướng dẫn, sửa đổi, bổ sung hoặc thay thế."},{"k":"p","t":"2. Doanh nghiệp được tự xây dựng biểu mẫu sổ kế toán cho riêng mình nhưng phải đảm bảo cung cấp thông tin về giao dịch kinh tế một cách minh bạch, đầy đủ, dễ kiểm tra, dễ kiểm soát và dễ đối chiếu. Trường hợp không tự xây dựng biểu mẫu sổ kế toán, doanh nghiệp có thể áp dụng biểu mẫu sổ kế toán theo hướng dẫn tại Phụ lục 4 ban hành kèm theo Thông tư này nếu phù hợp với đặc điểm quản lý và hoạt động kinh doanh của mình."},{"k":"p","t":"3. Tùy theo đặc điểm hoạt động và yêu cầu quản lý, doanh nghiệp được tự xây dựng hình thức ghi sổ kế toán cho riêng mình trên cơ sở đảm bảo thông tin về các giao dịch phải được phản ánh đầy đủ, kịp thời, dễ kiểm tra, kiểm soát và đối chiếu."}]},{"id":"tt133_89","no":89,"code":"Điều 89","title":"Điều 89. Trách nhiệm của người giữ và ghi sổ kế toán","shortTitle":"Trách nhiệm của người giữ và ghi sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"Sổ kế toán phải được quản lý chặt chẽ, phân công rõ ràng trách nhiệm cá nhân giữ và ghi sổ. Sổ kế toán giao cho nhân viên nào thì nhân viên đó phải chịu trách nhiệm về những điều ghi trong sổ và việc giữ sổ trong suốt thời gian dùng sổ. Khi có sự thay đổi nhân viên giữ và ghi sổ, kế toán trưởng phải tổ chức việc bàn giao trách nhiệm quản lý và ghi sổ kế toán giữa nhân viên cũ và nhân viên mới. Biên bản bàn giao phải được kế toán trưởng ký xác nhận."}]},{"id":"tt133_90","no":90,"code":"Điều 90","title":"Điều 90. Mở, ghi sổ kế toán, chữ ký và sửa chữa sổ kế toán","shortTitle":"Mở, ghi sổ kế toán, chữ ký và sửa chữa sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Mở sổ"},{"k":"p","t":"Sổ kế toán phải mở vào đầu kỳ kế toán năm. Đối với doanh nghiệp mới thành lập, sổ kế toán phải mở từ ngày thành lập. Người đại diện theo pháp luật và kế toán trưởng của doanh nghiệp có trách nhiệm ký duyệt các sổ kế toán. Sổ kế toán có thể đóng thành quyển hoặc để tờ rời. Các tờ sổ khi dùng xong phải đóng thành quyển để lưu trữ. Trước khi dùng sổ kế toán phải hoàn thiện các thủ tục sau:"},{"k":"p","t":"- Đối với sổ kế toán dạng quyển: Trang đầu sổ phải ghi rõ tên doanh nghiệp, tên sổ, ngày mở sổ, niên độ kế toán và kỳ ghi sổ, họ tên, chữ ký của người giữ và ghi sổ, của kế toán trưởng và người đại diện theo pháp luật, ngày kết thúc ghi sổ hoặc ngày chuyển giao cho người khác. Sổ kế toán phải đánh số trang từ trang đầu đến trang cuối, giữa hai trang sổ phải đóng dấu giáp lai của đơn vị kế toán."},{"k":"p","t":"- Đối với sổ tờ rời: Đầu mỗi sổ tờ rời phải ghi rõ tên doanh nghiệp, số thứ tự của từng tờ sổ, tên sổ, tháng sử dụng, họ tên người giữ và ghi sổ. Các tờ rời trước khi dùng phải được giám đốc doanh nghiệp hoặc người được ủy quyền ký xác nhận, đóng dấu và ghi vào sổ đăng ký sử dụng sổ tờ rời. Các sổ tờ rời phải được sắp xếp theo thứ tự các tài khoản kế toán và phải đảm bảo sự an toàn, dễ tìm."},{"k":"p","t":"2. Ghi sổ: Việc ghi sổ kế toán phải căn cứ vào chứng từ kế toán đã được kiểm tra bảo đảm các quy định về chứng từ kế toán. Mọi số liệu ghi trên sổ kế toán bắt buộc phải có chứng từ kế toán hợp pháp, hợp lý chứng minh."},{"k":"p","t":"3. Khóa sổ: Cuối kỳ kế toán phải khóa sổ kế toán trước khi lập Báo cáo tài chính. Ngoài ra phải khóa sổ kế toán trong các trường hợp kiểm kê hoặc các trường hợp khác theo quy định của pháp luật."}]},{"id":"tt133_91","no":91,"code":"Điều 91","title":"Điều 91. Chuyển đổi số dư trên sổ kế toán","shortTitle":"Chuyển đổi số dư trên sổ kế toán","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp thực hiện chuyển đổi số dư các tài khoản sau:"},{"k":"p","t":"- Số dư chi tiết về vàng, bạc, kim khí quý, đá quý đang phản ánh trên TK 1113 và 1123 được chuyển sang theo dõi trên các TK 152 - Hàng tồn kho, TK 155 - Thành phẩm, TK 156 - Hàng hóa (đối với vàng bạc, kim khí quý, đá quý được phân loại là hàng tồn kho) và TK 2288 - Đầu tư khác (đối với vàng bạc, kim khí quý, đá quý không được phân loại là hàng tồn kho)."},{"k":"p","t":"- Số dư các khoản trái phiếu, tín phiếu, kỳ phiếu nắm giữ đến ngày đáo hạn, không nắm giữ vì mục đích kinh doanh (mua vào để bán ra với mục đích kiếm lời qua chênh lệch giá mua, bán) đang phản ánh trên TK 121 - Đầu tư tài chính ngắn hạn được chuyển sang TK 128 - Đầu tư nắm giữ đến ngày đáo hạn (1288);"},{"k":"p","t":"- Số dư TK 142 - Chi phí trả trước ngắn hạn được chuyển sang TK 242 - Chi phí trả trước;"},{"k":"p","t":"- Số dư chi tiết TK 1388 về ký quỹ, ký cược ngắn hạn và TK 244 - Ký quỹ, ký cược dài hạn được chuyển sang TK 1386 - Cầm cố, thế chấp, ký quỹ, ký cược;"},{"k":"p","t":"- Số dư các khoản dự phòng đang phản ánh trên TK 159, 229 được chuyển sang TK 229 - Dự phòng tổn thất tài sản (chi tiết cho từng TK cấp 2 phù hợp với nội dung dự phòng);"}]},{"id":"tt133_92","no":92,"code":"Điều 92","title":"Điều 92. Điều khoản hồi tố","shortTitle":"Điều khoản hồi tố","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp không tiếp tục trích khấu hao đối với bất động sản đầu tư nắm giữ chờ tăng giá và không phải hồi tố toàn bộ chi phí khấu hao lũy kế đã trích từ các kỳ trước."},{"k":"p","t":"2. Doanh nghiệp báo cáo lại thông tin so sánh trên Báo cáo tài chính đối với các chỉ tiêu có sự thay đổi giữa Thông tư này và Chế độ kế toán doanh nghiệp ban hành theo Quyết định số 48/2006/QĐ-BTC ngày 14/9/2006 của Bộ trưởng Bộ Tài chính và thuyết minh lí do là có sự thay đổi trong Chế độ kế toán doanh nghiệp."}]},{"id":"tt133_93","no":93,"code":"Điều 93","title":"Điều 93. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực áp dụng cho năm tài chính bắt đầu hoặc sau ngày 1/1/2017. Những quy định trái với Thông tư này đều bãi bỏ. Thông tư này thay thế các nội dung áp dụng đối với doanh nghiệp nhỏ và vừa tại Quyết định số 48/2006/QĐ-BTC ngày 14/9/2006 của Bộ trưởng Bộ Tài chính và Thông tư số 138/2011/TT-BTC ngày 4/10/2011 của Bộ Tài chính."},{"k":"p","t":"2. Các Bộ, ngành, Ủy ban nhân dân, Sở Tài chính, Cục Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các doanh nghiệp thực hiện Thông tư này. Trong quá trình thực hiện nếu có vướng mắc đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết./."},{"k":"p","t":"Nơi nhận: - Thủ tướng, các Phó Thủ tướng Chính phủ; - Văn phòng TW Đảng; - Văn phòng Quốc hội; - Văn phòng Chủ tịch nước; - Văn phòng Chính phủ; - Văn phòng Tổng Bí thư; - Các Bộ, cơ quan ngang Bộ; - Tòa án NDTC; - Viện Kiểm sát NDTC; - Kiểm toán Nhà nước; - UBND tỉnh, thành phố trực thuộc TW; - Cơ quan TW của các đoàn thể; - Cục Kiểm tra văn bản -  Bộ Tư pháp; - Sở Tài chính, Cục Thuế các tỉnh, TP trực thuộc TW; - Các TCT, tập đoàn kinh tế; - Công báo; - Vụ Pháp chế - Bộ Tài chính; - Các đơn vị thuộc Bộ Tài chính; - Văn phòng Ban chỉ đạo TW về phòng, chống tham nhũng; - Website Chính phủ; Website Bộ Tài chính; - Lưu: VT, Vụ CĐKT."},{"k":"p","t":"KT. BỘ TRƯỞNG THỨ TRƯỞNG     Trần Văn Hiếu"},{"k":"p","t":"PHỤ LỤC 1"},{"k":"p","t":"DANH MỤC HỆ THỐNG TÀI KHOẢN KẾ TOÁN ÁP DỤNG CHO DOANH NGHIỆP NHỎ VÀ VỪA (Ban hành kèm theo Thông tư số 133/2016/TT-BTC ngày 26/8/2016 của Bộ Tài chính)"}]}],"forms":[{"code":"B01a-DNN","title":"Báo cáo tình hình tài chính","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81 — DN đáp ứng giả định hoạt động liên tục"},{"code":"B01b-DNN","title":"Báo cáo tình hình tài chính (dạng khác)","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81"},{"code":"B01-DNNKLT","title":"Báo cáo tình hình tài chính (không liên tục)","pl":"Phụ lục 2 — Báo cáo tài chính","note":"DN không đáp ứng giả định hoạt động liên tục"},{"code":"B02-DNN","title":"Báo cáo kết quả hoạt động kinh doanh","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81"},{"code":"B03-DNN","title":"Báo cáo lưu chuyển tiền tệ","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81 — phương pháp trực tiếp/gián tiếp"},{"code":"B09-DNN","title":"Bản thuyết minh Báo cáo tài chính","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81"},{"code":"B09-DNNKLT","title":"Thuyết minh BCTC (không liên tục)","pl":"Phụ lục 2 — Báo cáo tài chính","note":"DN không hoạt động liên tục"},{"code":"F01-DNN","title":"Bảng cân đối tài khoản","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 83 — gửi cơ quan thuế"},{"code":"B01-DNSN","title":"Báo cáo tình hình tài chính (DN siêu nhỏ)","pl":"Phụ lục 2 — BCTC DN siêu nhỏ","note":"DNSN áp dụng TT133"},{"code":"B02-DNSN","title":"Báo cáo KQHĐKD (DN siêu nhỏ)","pl":"Phụ lục 2 — BCTC DN siêu nhỏ","note":"DNSN áp dụng TT133"},{"code":"B09-DNSN","title":"Thuyết minh BCTC (DN siêu nhỏ)","pl":"Phụ lục 2 <script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:2px 12px;font-size:10.5px;font-style:italic;color:#94a3b8">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px 12px;font-size:12px;color:var(--mu)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span> › </span>'+e(a.muc):'')+'<span> › </span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  var cnt=a.content||[];
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+t+'</p>';}})}
  else{h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>'}
  h+='</div>';
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  // Switch to main tab if not already there
  if(!document.getElementById('s-main').classList.contains('on')){
    tab('main',document.querySelector('.tab'));
  }
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildForms(){
  var h='';
  if(!D.forms||!D.forms.length){
    h='<div class="no-tk"><p>Không có biểu mẫu riêng.</p></div>';
    document.getElementById('s-forms').innerHTML=h;return;
  }
  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#1e40af">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx) để sử dụng.</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a><a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');
  if(!btn||btn.classList.contains('loading'))return;
  ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type');
  var orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span>...';
  try{
    var url='/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type;
    var res=await fetch(url,{credentials:'include'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var blob=await res.blob();
    var ext=type==='excel'?'.xlsx':'.docx';
    var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+ext;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(err){
    alert('Chưa có file biểu mẫu này hoặc lỗi tải. Vui lòng thử lại sau.');
  }finally{
    setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},800);
  }
});
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){
    el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Văn bản này không áp dụng hệ thống tài khoản kế toán.')+'</p></div>';
    return;
  }
  var h='<h2 style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:14px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:14px">'+D.outline.filter(function(a){return a.chuong&&a.chuong.indexOf('TÀI KHOẢN')>=0}).length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều khoản</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td style="font-size:13px">'+e(a.name)+'</td><td>';
    if(a.dieu){h+='<a class="tk-link" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.dieu+'\');return false" href="#">Xem Điều</a>'}
    h+='</td></tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:20px;font-weight:800;color:#1e3a8a;margin-bottom:4px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12px;color:var(--mu);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="sc"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="sc"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 12px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
// Hash navigation — jump to specific article when loaded with #articleId
function initHash(){
  var h=window.location.hash.slice(1);
  if(h&&D.outline.find(function(a){return a.id===h})){show(h)}
  else if(D.outline.length){show(D.outline[0].id)}
}
buildSb();buildForms();buildTK();buildHome();
initHash();
</script>
</body>
</html>
