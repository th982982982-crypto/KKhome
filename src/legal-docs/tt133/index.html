ố âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tài sản ngắn hạn khác (Mã số 150)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các tài sản ngắn hạn khác có thời hạn thu hồi hoặc sử dụng không quá 12 tháng hoặc trong một chu kỳ kinh doanh thông thường tại thời điểm báo cáo, như thuế GTGT còn được khấu trừ và tài sản ngắn hạn khác."},{"k":"p","t":"Mã số 150 = Mã số 151 + Mã số 152."},{"k":"p","t":"+ Thuế giá trị gia tăng được khấu trừ (Mã số 151)"},{"k":"p","t":"Chỉ tiêu này phản ánh số thuế GTGT còn được khấu trừ và số thuế GTGT còn được hoàn lại đến cuối năm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ của TK 133."},{"k":"p","t":"+ Tài sản ngắn hạn khác (Mã số 152)"},{"k":"p","t":"Chỉ tiêu này phản ánh tài sản ngắn hạn khác có thời hạn thu hồi hoặc sử dụng không quá 12 tháng tại thời điểm báo cáo, gồm chi phí trả trước ngắn hạn, thuế và các khoản khác phải thu Nhà nước."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này căn cứ vào số dư Nợ chi tiết của các TK 242, 333"},{"k":"p","t":"b) Tài sản dài hạn (Mã số 200)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh trị giá các loại tài sản không được phản ánh trong chỉ tiêu tài sản ngắn hạn. Tài sản dài hạn là các tài sản có thời hạn thu hồi hoặc sử dụng trên 12 tháng tại thời điểm báo cáo, như: Các khoản phải thu dài hạn, tài sản cố định, bất động sản đầu tư, xây dựng cơ bản dở dang, đầu tư tài chính dài hạn và tài sản dài hạn khác."},{"k":"p","t":"Mã số 200 = Mã số 210 + Mã số 220 + Mã số 230 + Mã số 240 + Mã số 250 + Mã số 260."},{"k":"p","t":"- Các khoản phải thu dài hạn (Mã số 210)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu có kỳ hạn thu hồi trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, như: Phải thu dài hạn của khách hàng, trả trước cho người bán dài hạn, vốn kinh doanh ở đơn vị trực thuộc, phải thu dài hạn khác (sau khi trừ đi dự phòng phải thu dài hạn khó đòi)."},{"k":"p","t":"Mã số 210 = Mã số 211 + Mã số 212 + Mã số 213 + Mã số 214 + Mã số 215."},{"k":"p","t":"+ Phải thu dài hạn của khách hàng (Mã số 211)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải thu của khách hàng có kỳ hạn thu hồi trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 131 mở theo từng khách hàng."},{"k":"p","t":"+ Trả trước cho người bán dài hạn (Mã số 212)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền đã trả trước cho người bán để mua tài sản, dịch vụ và doanh nghiệp sẽ nhận được tài sản, dịch vụ trong thời hạn trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết của TK 331 mở theo từng người bán."},{"k":"p","t":"+ Vốn kinh doanh ở đơn vị trực thuộc (Mã số 213)"},{"k":"p","t":"Chỉ tiêu này chỉ ghi trên Báo cáo tình hình tài chính của đơn vị cấp trên phản ánh số vốn kinh doanh đã giao cho các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Khi lập Báo cáo tình hình tài chính tổng hợp của toàn doanh nghiệp, chỉ tiêu này được bù trừ với chỉ tiêu “Phải trả nội bộ về vốn kinh doanh” (Mã số 423) hoặc chỉ tiêu \"Vốn góp của chủ sở hữu\" (Mã số 511) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc, chi tiết phần vốn nhận của đơn vị cấp trên."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ của TK 1361."},{"k":"p","t":"+ Phải thu dài hạn khác (Mã số 214)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải thu khác có kỳ hạn thu hồi còn lại trên 12 tháng hoặc hơn một chu kỳ kinh doanh thông thường tại thời điểm báo cáo, như: Phải thu dài hạn về cho vay, phải thu nội bộ dài hạn khác ngoài khoản phải thu nội bộ về vốn kinh doanh đã được phản ánh ở chỉ tiêu “Vốn kinh doanh ở đơn vị trực thuộc” (Mã số 213), phải thu về các khoản đã chi hộ; các khoản tạm ứng, cầm cố, ký cược, ký quỹ, cho mượn…mà doanh nghiệp được quyền thu hồi."},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp với đơn vị cấp dưới hạch toán phụ thuộc, khoản phải thu nội bộ dài hạn trong chỉ tiêu này được bù trừ với khoản phải trả nội bộ dài hạn được trình bày trong chỉ tiêu “Phải trả dài hạn khác” (Mã số 424) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ chi tiết của các TK 1288 (chi tiết cho vay), 1368, 1386, 1388, 334, 338, 141."},{"k":"p","t":"+ Dự phòng phải thu dài hạn khó đòi (Mã số 215)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản phải thu dài hạn khó đòi tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có chi tiết của TK 2293, chi tiết dự phòng cho các khoản phải thu dài hạn khó đòi và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tài sản cố định (Mã số 220)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại (Nguyên giá trừ giá trị hao mòn lũy kế) của các loại tài sản cố định tại thời điểm báo cáo."},{"k":"p","t":"Mã số 220 = Mã số 221 + Mã số 222."},{"k":"p","t":"+ Nguyên giá (Mã số 221)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ nguyên giá các loại tài sản cố định tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 211."},{"k":"p","t":"+ Giá trị hao mòn lũy kế (Mã số 222)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị đã hao mòn của các loại tài sản cố định lũy kế tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của các TK 2141, 2142, 2143 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Bất động sản đầu tư (Mã số 230)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại của các loại bất động sản đầu tư tại thời điểm báo cáo."},{"k":"p","t":"Mã số 230 = Mã số 231 + Mã số 232."},{"k":"p","t":"+ Nguyên giá (Mã số 231)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ nguyên giá của các loại bất động sản đầu tư tại thời điểm báo cáo sau khi đã trừ số tổn thất do suy giảm giá trị của bất động sản đầu tư nắm giữ chờ tăng giá."},{"k":"p","t":"Số liệu để phản ánh vào chỉ tiêu này là số dư Nợ của TK 217."},{"k":"p","t":"+ Giá trị hao mòn lũy kế (Mã số 232)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ giá trị hao mòn lũy kế của bất động sản đầu tư dùng để cho thuê tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2147 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Xây dựng cơ bản dở dang (Mã số 240)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ trị giá tài sản cố định đang mua sắm, chi phí đầu tư xây dựng cơ bản, chi phí sửa chữa lớn tài sản cố định dở dang hoặc đã hoàn thành chưa bàn giao hoặc chưa đưa vào sử dụng."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 241."},{"k":"p","t":"- Đầu tư tài chính dài hạn (Mã số 250)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các khoản đầu tư tài chính dài hạn (sau khi trừ đi khoản dự phòng tổn thất đầu tư vào đơn vị khác) tại thời điểm báo cáo, như: Đầu tư góp vốn vào đơn vị khác, đầu tư nắm giữ đến ngày đáo hạn dài hạn có kỳ hạn còn lại trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Mã số 250 = Mã số 251 + Mã số 252 + Mã số 253."},{"k":"p","t":"+ Đầu tư góp vốn vào đơn vị khác (Mã số 251)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản đầu tư vào công ty liên doanh, liên kết và các khoản đầu tư khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của TK 228."},{"k":"p","t":"+ Dự phòng tổn thất đầu tư vào đơn vị khác (Mã số 252)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng tổn thất đầu tư vào đơn vị khác do đơn vị được đầu tư bị lỗ và nhà đầu tư có khả năng mất vốn tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 2292 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"+ Đầu tư nắm giữ đến ngày đáo hạn dài hạn (Mã số 253)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản đầu tư nắm giữ đến ngày đáo hạn có kỳ hạn còn lại trên 12 tháng hoặc hơn một chu kỳ sản xuất kinh doanh thông thường kể từ thời điểm báo cáo, như tiền gửi có kỳ hạn, trái phiếu, thương phiếu và các loại chứng khoán nợ khác. Chỉ tiêu này không bao gồm các khoản phải thu về cho vay được trình bày trong chỉ tiêu “Phải thu dài hạn khác” (Mã số 214)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ chi tiết của các TK 1281, 1288."},{"k":"p","t":"- Tài sản dài hạn khác (Mã số 260)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các tài sản dài hạn khác có thời hạn thu hồi trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo như chi phí trả trước dài hạn, các khoản phải thu của Nhà nước dài hạn (nếu có) chưa được trình bày ở các chỉ tiêu trên."},{"k":"p","t":"Doanh nghiệp không phải tái phân loại chi phí trả trước dài hạn thành chi phí trả trước ngắn hạn."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Nợ chi tiết của TK 242, 333."},{"k":"p","t":"- Tổng cộng tài sản (Mã số 300)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng trị giá tài sản hiện có của doanh nghiệp tại thời điểm báo cáo, bao gồm tài sản ngắn hạn và tài sản dài hạn."},{"k":"p","t":"Mã số 300 = Mã số 100 + Mã số 200."},{"k":"p","t":"c) Nợ phải trả (Mã số 400)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ số nợ phải trả tại thời điểm báo cáo, gồm: Nợ ngắn hạn và nợ dài hạn."},{"k":"p","t":"Mã số 400 = Mã số 410 + Mã số 420."},{"k":"p","t":"- Nợ ngắn hạn (Mã số 410)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các khoản nợ còn phải trả có thời hạn thanh toán không quá 12 tháng hoặc dưới một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, như: Các khoản vay và nợ thuê tài chính ngắn hạn, phải trả cho người bán ngắn hạn, người mua trả tiền trước ngắn hạn, thuế và các khoản phải nộp Nhà nước, phải trả người lao động, phải trả ngắn hạn khác, dự phòng phải trả ngắn hạn … tại thời điểm báo cáo."},{"k":"p","t":"Mã số 410 = Mã số 411 + Mã số 412 + Mã số 413 + Mã số 414 + Mã số 415 + Mã số 416 + Mã số 417 + Mã số 418."},{"k":"p","t":"+ Phải trả người bán ngắn hạn (Mã số 411)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải trả cho người bán có thời hạn thanh toán còn lại không quá 12 tháng hoặc trong một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 331 mở cho từng người bán."},{"k":"p","t":"+ Người mua trả tiền trước ngắn hạn (Mã số 412)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền người mua ứng trước để mua sản phẩm, hàng hóa, dịch vụ, tài sản cố định, bất động sản đầu tư và doanh nghiệp có nghĩa vụ cung cấp trong thời hạn không quá 12 tháng hoặc trong một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo (không bao gồm các khoản doanh thu nhận trước)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 131 mở cho từng khách hàng."},{"k":"p","t":"+ Thuế và các khoản phải nộp Nhà nước (Mã số 413)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản doanh nghiệp còn phải nộp cho Nhà nước tại thời điểm báo cáo, bao gồm cả các khoản thuế, phí, lệ phí và các khoản phải nộp khác. Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 333."},{"k":"p","t":"+ Phải trả người lao động (Mã số 414)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản doanh nghiệp còn phải trả cho người lao động tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 334."},{"k":"p","t":"+ Phải trả ngắn hạn khác (Mã số 415)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải trả khác có kỳ hạn thanh toán còn lại không quá 12 tháng hoặc trong một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, ngoài các khoản nợ phải trả đã được phản ánh trong các chỉ tiêu khác, như: Chi phí phải trả ngắn hạn, phải trả nội bộ ngắn hạn khác ngoài khoản phải trả nội bộ về vốn kinh doanh đã được phản ánh ở chỉ tiêu “Phải trả nội bộ về vốn kinh doanh” (Mã số 423), doanh thu chưa thực hiện ngắn hạn, giá trị tài sản phát hiện thừa chưa rõ nguyên nhân, các khoản phải nộp cho cơ quan BHXH, KPCĐ, các khoản nhận ký cược, ký quỹ ngắn hạn…"},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tài chính tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, khoản phải trả nội bộ ngắn hạn trong chỉ tiêu này được bù trừ với khoản phải thu nội bộ ngắn hạn được trình bày trong chỉ tiêu “Phải thu ngắn hạn khác” (Mã số 133) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của các TK 335, 3368, 338, 1388."},{"k":"p","t":"+ Vay và nợ thuê tài chính ngắn hạn (Mã số 416)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị các khoản doanh nghiệp đi vay kể cả vay dưới hình thức phát hành trái phiếu, còn nợ các ngân hàng, tổ chức, công ty tài chính và các đối tượng khác có kỳ hạn thanh toán còn lại không quá 12 tháng hoặc trong một chu kỳ sản xuất kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 341."},{"k":"p","t":"+ Dự phòng phải trả ngắn hạn (Mã số 417)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản dự kiến phải trả không quá 12 tháng hoặc trong chu kỳ sản xuất, kinh doanh thông thường tiếp theo tại thời điểm báo cáo, như dự phòng bảo hành sản phẩm, hàng hóa, công trình xây dựng, các khoản chi phí trích trước để sửa chữa TSCĐ định kỳ, chi phí hoàn nguyên môi trường trích trước… Các khoản dự phòng phải trả thường được ước tính, chưa chắc chắn về thời gian phải trả, giá trị phải trả và doanh nghiệp chưa nhận được hàng hóa, dịch vụ từ nhà cung cấp."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 352."},{"k":"p","t":"+ Quỹ khen thưởng, phúc lợi (Mã số 418)"},{"k":"p","t":"Chỉ tiêu này phản ánh Quỹ khen thưởng, Quỹ phúc lợi, Quỹ thưởng ban quản lý điều hành chưa sử dụng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 353."},{"k":"p","t":"- Nợ dài hạn (Mã số 420)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị các khoản nợ dài hạn của doanh nghiệp bao gồm những khoản nợ có thời hạn thanh toán còn lại từ 12 tháng trở lên hoặc trên một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, như: Khoản phải trả người bán dài hạn, người mua trả tiền trước dài hạn, phải trả nội bộ về vốn kinh doanh, các khoản phải trả dài hạn khác, vay và nợ thuê tài chính dài hạn, dự phòng phải trả dài hạn và quỹ phát triển khoa học và công nghệ tại thời điểm báo cáo."},{"k":"p","t":"Mã số 420 = Mã số 421 + Mã số 422 + Mã số 423 + Mã số 424 + Mã số 425 + Mã số 426 + Mã số 427."},{"k":"p","t":"+ Phải trả người bán dài hạn (Mã số 421)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải trả cho người bán có thời hạn thanh toán còn lại trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 331 mở cho từng người bán."},{"k":"p","t":"+ Người mua trả tiền trước dài hạn (Mã số 422)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền người mua ứng trước để mua sản phẩm, hàng hóa, dịch vụ, tài sản cố định, bất động sản đầu tư và thời hạn doanh nghiệp có nghĩa vụ cung cấp là trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo (không bao gồm các khoản doanh thu nhận trước)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 131 mở chi tiết cho từng khách hàng."},{"k":"p","t":"+ Phải trả nội bộ về vốn kinh doanh (Mã số 423)"},{"k":"p","t":"Tùy thuộc vào đặc điểm hoạt động và mô hình quản lý của từng đơn vị, doanh nghiệp thực hiện phân cấp và quy định cho đơn vị hạch toán phụ thuộc ghi nhận khoản vốn do doanh nghiệp cấp vào chỉ tiêu này hoặc chỉ tiêu “Vốn góp của chủ sở hữu” (Mã số 511)."},{"k":"p","t":"Chỉ tiêu này chỉ trình bày trên Báo cáo tình hình tài chính đơn vị cấp dưới không có tư cách pháp nhân hạch toán phụ thuộc, phản ánh các khoản đơn vị cấp dưới phải trả cho đơn vị cấp trên về vốn kinh doanh."},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tình hình tài chính tổng hợp toàn doanh nghiệp, chỉ tiêu này được bù trừ với chỉ tiêu “Vốn kinh doanh ở đơn vị trực thuộc” (Mã số 213) trên Báo cáo tình hình tài chính của đơn vị cấp trên."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào chi tiết số dư Có TK 3361."},{"k":"p","t":"+ Phải trả dài hạn khác (Mã số 424)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản phải trả khác có kỳ hạn thanh toán còn lại trên 12 tháng hoặc hơn một chu kỳ sản xuất, kinh doanh thông thường tại thời điểm báo cáo, ngoài các khoản nợ phải trả đã được phản ánh trong các chỉ tiêu khác, như: Chi phí phải trả, phải trả nội bộ khác ngoài khoản phải trả nội bộ về vốn kinh doanh, doanh thu chưa thực hiện dài hạn, các khoản nhận ký cược, ký quỹ dài hạn…"},{"k":"p","t":"Khi đơn vị cấp trên lập Báo cáo tài chính tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, khoản phải trả nội bộ dài hạn trong chỉ tiêu này được bù trừ với khoản phải thu nội bộ dài hạn khác được trình bày trong chỉ tiêu “Phải thu dài hạn khác” (Mã số 214) trên Báo cáo tình hình tài chính của các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của các TK 335, 3368, 338, 1388."},{"k":"p","t":"+ Vay và nợ thuê tài chính dài hạn (Mã số 425)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản doanh nghiệp vay, nợ của các ngân hàng, tổ chức, công ty tài chính và các đối tượng khác, giá trị cổ phiếu ưu đãi theo mệnh giá mà bắt buộc người phát hành phải mua lại tại một thời điểm đã được xác định trong tương lai có kỳ hạn thanh toán còn lại trên 12 hoặc hơn một chu kỳ sản xuất kinh doanh thông thường tại thời điểm báo cáo, như: Tiền vay ngân hàng, tổ chức tài chính, khoản phải trả về tài sản cố định thuê tài chính..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có chi tiết các TK 341, 4111 (chi tiết loại cổ phiếu ưu đãi được phân loại là nợ phải trả)."},{"k":"p","t":"+ Dự phòng phải trả dài hạn (Mã số 426)"},{"k":"p","t":"Chỉ tiêu này phản ánh khoản dự phòng cho các khoản dự kiến phải trả sau 12 tháng hoặc sau một chu kỳ sản xuất, kinh doanh thông thường tiếp theo tại thời điểm báo cáo, như dự phòng bảo hành sản phẩm, hàng hóa, công trình xây dựng, dự phòng tái cơ cấu, các khoản chi phí trích trước để sửa chữa TSCĐ định kỳ, chi phí hoàn nguyên môi trường trích trước… Các khoản dự phòng phải trả thường được ước tính, chưa chắc chắn về thời gian phải trả, giá trị phải trả và doanh nghiệp chưa nhận được hàng hóa, dịch vụ từ nhà cung cấp."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 352."},{"k":"p","t":"+ Quỹ phát triển khoa học và công nghệ (Mã số 427)"},{"k":"p","t":"Chỉ tiêu này phản ánh số Quỹ phát triển khoa học và công nghệ chưa sử dụng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 356."},{"k":"p","t":"d) Vốn chủ sở hữu (Mã số 500)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh các khoản vốn kinh doanh thuộc sở hữu của cổ đông, thành viên góp vốn, như: Vốn góp của chủ sở hữu, thặng dư vốn cổ phần, vốn khác của chủ sở hữu, cổ phiếu quỹ, các quỹ thuộc vốn chủ sở hữu, lợi nhuận sau thuế chưa phân phối, chênh lệch tỷ giá hối đoái."},{"k":"p","t":"Mã số 500 = Mã số 511 + Mã số 512 + Mã số 513 + Mã số 514 + Mã số 515 + Mã số 516 + Mã số 517"},{"k":"p","t":"- Vốn góp của chủ sở hữu (Mã số 511)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số vốn đã thực góp của các chủ sở hữu vào doanh nghiệp (đối với công ty cổ phần phản ánh vốn góp của các cổ đông theo mệnh giá cổ phiếu) tại thời điểm báo cáo."},{"k":"p","t":"Tại đơn vị hạch toán phụ thuộc, chỉ tiêu này có thể phản ánh số vốn được cấp nếu doanh nghiệp quy định đơn vị hạch toán phụ thuộc ghi nhận vào TK 411."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 4111."},{"k":"p","t":"- Thặng dư vốn cổ phần (Mã số 512)"},{"k":"p","t":"Chỉ tiêu này phản ánh thặng dư vốn cổ phần tại thời điểm báo cáo của công ty cổ phần."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 4112. Nếu TK 4112 có số dư Nợ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Vốn khác của chủ sở hữu (Mã số 513)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản vốn khác của chủ sở hữu tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có TK 4118."},{"k":"p","t":"- Cổ phiếu quỹ (Mã số 514)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị cổ phiếu quỹ hiện có ở thời điểm báo cáo của công ty cổ phần."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của TK 419 và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Chênh lệch tỷ giá hối đoái (Mã số 515)"},{"k":"p","t":"Trường hợp đơn vị sử dụng đồng tiền khác Đồng Việt Nam làm đơn vị tiền tệ trong kế toán, chỉ tiêu này phản ánh khoản chênh lệch tỷ giá hối đoái do chuyển đổi Báo cáo tài chính sang Đồng Việt Nam."},{"k":"p","t":"- Các quỹ thuộc vốn chủ sở hữu (Mã số 516)"},{"k":"p","t":"Chỉ tiêu này phản ánh các quỹ thuộc vốn chủ sở hữu chưa sử dụng tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có TK 418."},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối (Mã số 517)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi (hoặc lỗ) sau thuế chưa phân phối tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 421. Trường hợp TK 421 có số dư Nợ thì số liệu chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tổng cộng nguồn vốn (Mã số 600)"},{"k":"p","t":"Phản ánh tổng số các nguồn vốn hình thành tài sản của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 600 = Mã số 400 + Mã số 500."},{"k":"p","t":"Chỉ tiêu “Tổng cộng Tài sản Mã số 300”"},{"k":"p","t":"="},{"k":"p","t":"Chỉ tiêu “Tổng cộng Nguồn vốn Mã số 600”"},{"k":"p","t":"2.2.3. Đối với doanh nghiệp không đáp ứng giả định hoạt động liên tục (xem Mẫu số B01 - DNNKLT)"},{"k":"p","t":"Việc trình bày các chỉ tiêu của Báo cáo tình hình tài chính khi doanh nghiệp không đáp ứng giả định hoạt động liên tục được thực hiện tương tự như Báo cáo tình hình tài chính của doanh nghiệp đáp ứng giả định hoạt động liên tục theo mẫu số B01a-DNN ngoại trừ một số chỉ tiêu sau:"},{"k":"p","t":"- Đầu tư tài chính (Mã số 120)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị của các khoản đầu tư tài chính, bao gồm: Chứng khoán kinh doanh, các khoản đầu tư nắm giữ đến ngày đáo hạn và các khoản đầu tư góp vốn vào đơn vị khác tại thời điểm báo cáo."},{"k":"p","t":"Các khoản đầu tư tài chính được phản ánh trong chỉ tiêu này không bao gồm các khoản đầu tư đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110) và các khoản phải thu về cho vay đã được trình bày trong chỉ tiêu “Phải thu khác” (Mã số 134)."},{"k":"p","t":"Mã số 120 = Mã số 121 + Mã số 122 + Mã số 123."},{"k":"p","t":"- Các khoản phải thu (Mã số 130)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu tại thời điểm báo cáo, như: Phải thu của khách hàng, trả trước cho người bán, vốn kinh doanh ở đơn vị trực thuộc, phải thu khác, tài sản thiếu chờ xử lý."},{"k":"p","t":"Mã số 130 = Mã số 131 + Mã số 132 + Mã số 133 + Mã số 134 + Mã số 135."},{"k":"p","t":"- Hàng tồn kho (Mã số 140)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị của hàng tồn kho thuộc quyền sở hữu của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 151, 152, 153, 154, 155, 156, 157."},{"k":"p","t":"- Tài sản cố định và bất động sản đầu tư (Mã số 150)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại (Nguyên giá trừ giá trị hao mòn lũy kế) của các loại tài sản cố định và bất động sản đầu tư tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 211, 217 trừ đi số dư Có TK 214."},{"k":"p","t":"2.3. Hướng dẫn lập và trình bày Báo cáo kết quả hoạt động kinh doanh (Mẫu số B02 - DNN)"},{"k":"p","t":"2.3.1. Nội dung và kết cấu báo cáo:"},{"k":"p","t":"a) Báo cáo kết quả hoạt động kinh doanh phản ánh tình hình và kết quả hoạt động kinh doanh của doanh nghiệp, bao gồm kết quả từ hoạt động kinh doanh chính và kết quả từ các hoạt động tài chính và hoạt động khác của doanh nghiệp."},{"k":"p","t":"b) Báo cáo kết quả hoạt động kinh doanh gồm có 5 cột:"},{"k":"p","t":"- Cột số 1: Các chỉ tiêu báo cáo;"},{"k":"p","t":"- Cột số 2: Mã số của các chỉ tiêu tương ứng;"},{"k":"p","t":"- Cột số 3: Số hiệu tương ứng với các chỉ tiêu của báo cáo này được thể hiện chỉ tiêu trên Bản thuyết minh Báo cáo tài chính;"},{"k":"p","t":"- Cột số 4: Tổng số phát sinh trong kỳ báo cáo năm;"},{"k":"p","t":"- Cột số 5: Số liệu của năm trước (để so sánh)."},{"k":"p","t":"2.3.2. Cơ sở lập báo cáo"},{"k":"p","t":"- Căn cứ Báo cáo kết quả hoạt động kinh doanh của năm trước."},{"k":"p","t":"- Căn cứ vào sổ kế toán tổng hợp và sổ kế toán chi tiết trong kỳ dùng cho các tài khoản từ loại 5 đến loại 9."},{"k":"p","t":"2.3.3. Nội dung và phương pháp lập các chỉ tiêu trong Báo cáo kết quả hoạt động kinh doanh"},{"k":"p","t":"- Doanh thu bán hàng và cung cấp dịch vụ (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng doanh thu bán hàng hóa, thành phẩm, bất động sản đầu tư, doanh thu cung cấp dịch vụ và doanh thu khác trong năm báo cáo của doanh nghiệp. Số liệu để ghi vào chỉ tiêu này là lũy kế số phát sinh bên Có của TK 511 trong kỳ báo cáo."},{"k":"p","t":"Khi đơn vị cấp trên lập báo cáo tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, các khoản doanh thu bán hàng và cung cấp dịch vụ phát sinh từ các giao dịch nội bộ đều phải loại trừ."},{"k":"p","t":"Chỉ tiêu này không bao gồm các loại thuế gián thu, như thuế GTGT (kể cả thuế GTGT nộp theo phương pháp trực tiếp), thuế tiêu thụ đặc biệt, thuế xuất khẩu, thuế bảo vệ môi trường và các loại thuế gián thu khác."},{"k":"p","t":"- Các khoản giảm trừ doanh thu (Mã số 02)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng hợp các khoản được ghi giảm trừ vào tổng doanh thu bán hàng và cung cấp dịch vụ trong năm, bao gồm: Các khoản chiết khấu thương mại, giảm giá hàng bán, hàng bán bị trả lại trong kỳ báo cáo. Số liệu để ghi vào chỉ tiêu này là tổng số phát sinh bên Nợ TK 511 đối ứng với bên Có các TK 111, 112, 131, trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản thuế gián thu, phí mà doanh nghiệp không được hưởng phải nộp NSNN (được kế toán ghi giảm doanh thu trên sổ kế toán TK 511) do các khoản này về bản chất là các khoản thu hộ Nhà nước, không thuộc doanh thu nên không được coi là khoản giảm trừ doanh thu."},{"k":"p","t":"- Doanh thu thuần về bán hàng và cung cấp dịch vụ (Mã số 10)"},{"k":"p","t":"Chỉ tiêu này phản ánh số doanh thu bán hàng hóa, thành phẩm, BĐSĐT, doanh thu cung cấp dịch vụ và doanh thu khác đã trừ các khoản giảm trừ (chiết khấu thương mại, giảm giá hàng bán, hàng bán bị trả lại) trong kỳ báo cáo, làm căn cứ tính kết quả hoạt động kinh doanh của doanh nghiệp."},{"k":"p","t":"Mã số 10 = Mã số 01 - Mã số 02."},{"k":"p","t":"- Giá vốn hàng bán (Mã số 11)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá vốn của hàng hóa, BĐSĐT, giá vốn của thành phẩm đã bán, khối lượng dịch vụ đã cung cấp, chi phí khác được tính vào giá vốn hoặc ghi giảm giá vốn hàng bán trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là lũy kế số phát sinh bên Có của TK 632 trong kỳ báo cáo đối ứng bên Nợ của TK 911."},{"k":"p","t":"Khi đơn vị cấp trên lập báo cáo tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, các khoản giá vốn hàng bán phát sinh từ các giao dịch nội bộ đều phải loại trừ."},{"k":"p","t":"- Lợi nhuận gộp về bán hàng và cung cấp dịch vụ (Mã số 20)"},{"k":"p","t":"Chỉ tiêu này phản ánh số chênh lệch giữa doanh thu thuần về bán hàng hóa, thành phẩm, BĐSĐT và cung cấp dịch vụ với giá vốn hàng bán phát sinh trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 20 = Mã số 10 - Mã số 11."},{"k":"p","t":"- Doanh thu hoạt động tài chính (Mã số 21)"},{"k":"p","t":"Chỉ tiêu này phản ánh doanh thu hoạt động tài chính thuần phát sinh trong kỳ báo cáo của doanh nghiệp."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là lũy kế số phát sinh bên Nợ của TK 515 đối ứng với bên Có TK 911 trong kỳ báo cáo."},{"k":"p","t":"Khi đơn vị cấp trên lập báo cáo tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, các khoản doanh thu hoạt động tài chính phát sinh từ các giao dịch nội bộ đều phải loại trừ."},{"k":"p","t":"- Chi phí tài chính (Mã số 22)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng chi phí tài chính, gồm tiền lãi vay phải trả, chi phí liên quan đến việc cho thuê bản quyền, chi phí hoạt động liên doanh,... phát sinh trong kỳ báo cáo của doanh nghiệp."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là lũy kế số phát sinh bên Có TK 635 đối ứng với bên Nợ TK 911 trong kỳ báo cáo."},{"k":"p","t":"Khi đơn vị cấp trên lập báo cáo tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, các khoản chi phí tài chính phát sinh từ các giao dịch nội bộ đều phải loại trừ."},{"k":"p","t":"- Chi phí lãi vay (Mã số 23)"},{"k":"p","t":"Chỉ tiêu này phản ánh chi phí lãi vay phải trả được tính vào chi phí tài chính trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được căn cứ vào số liệu chi tiết về chi phí lãi vay trên TK 635 trong kỳ báo cáo."},{"k":"p","t":"- Chi phí quản lý kinh doanh (Mã số 24)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng chi phí quản lý kinh doanh phát sinh trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số phát sinh bên Có của TK 642, đối ứng với bên Nợ của TK 911 trong kỳ báo cáo."},{"k":"p","t":"- Lợi nhuận thuần từ hoạt động kinh doanh (Mã số 30)"},{"k":"p","t":"Chỉ tiêu này phản ánh kết quả hoạt động kinh doanh của doanh nghiệp trong kỳ báo cáo. Chỉ tiêu này được tính toán trên cơ sở lợi nhuận gộp về bán hàng và cung cấp dịch vụ cộng (+) Doanh thu hoạt động tài chính trừ (-) Chi phí tài chính, chi phí quản lý kinh doanh phát sinh trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 30 = Mã số 20 + Mã số 21 - Mã số 22 - Mã số 24."},{"k":"p","t":"- Thu nhập khác (Mã số 31)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản thu nhập khác, phát sinh trong kỳ báo cáo. Số liệu để ghi vào chỉ tiêu này được căn cứ vào tổng số phát sinh bên Nợ của TK 711 (sau khi trừ phần thu nhập khác từ thanh lý, nhượng bán TSCĐ) đối ứng với bên Có của TK 911 trong kỳ báo cáo."},{"k":"p","t":"Riêng đối với giao dịch thanh lý, nhượng bán TSCĐ thì số liệu để ghi vào chỉ tiêu này là phần chênh lệch giữa khoản thu từ việc thanh lý, nhượng bán TSCĐ cao hơn giá trị còn lại của TSCĐ và chi phí thanh lý."},{"k":"p","t":"Khi đơn vị cấp trên lập báo cáo tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, các khoản thu nhập khác phát sinh từ các giao dịch nội bộ đều phải loại trừ."},{"k":"p","t":"- Chi phí khác (Mã số 32)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản chi phí khác phát sinh trong kỳ báo cáo. Số liệu để ghi vào chỉ tiêu này được căn cứ vào tổng số phát sinh bên Có của Tài khoản 811 “Chi phí khác” (sau khi trừ phần chi phí khác từ thanh lý, nhượng bán TSCĐ) đối ứng với bên Nợ của TK 911 trong kỳ báo cáo."},{"k":"p","t":"Riêng đối với giao dịch thanh lý, nhượng bán TSCĐ thì số liệu để ghi vào chỉ tiêu này là phần chênh lệch giữa khoản thu từ việc thanh lý, nhượng bán TSCĐ nhỏ hơn giá trị còn lại của TSCĐ và chi phí thanh lý."},{"k":"p","t":"Khi đơn vị cấp trên lập báo cáo tổng hợp với các đơn vị cấp dưới hạch toán phụ thuộc, các khoản chi phí khác phát sinh từ các giao dịch nội bộ đều phải loại trừ."},{"k":"p","t":"- Lợi nhuận khác (Mã số 40)"},{"k":"p","t":"Chỉ tiêu này phản ánh số chênh lệch giữa thu nhập khác (sau khi đã trừ thuế GTGT phải nộp tính theo phương pháp trực tiếp) với chi phí khác phát sinh trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 40 = Mã số 31 - Mã số 32."},{"k":"p","t":"- Tổng lợi nhuận kế toán trước thuế (Mã số 50)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số lợi nhuận kế toán thực hiện trong năm báo cáo của doanh nghiệp trước khi trừ chi phí thuế thu nhập doanh nghiệp từ hoạt động kinh doanh, hoạt động khác phát sinh trong kỳ báo cáo. Trường hợp doanh thu thuần nhỏ hơn giá vốn hàng bán thì được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...). Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 50 = Mã số 30 + Mã số 40."},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp (Mã số 51)"},{"k":"p","t":"Chỉ tiêu này phản ánh chi phí thuế thu nhập doanh nghiệp phát sinh trong năm báo cáo. Số liệu để ghi vào chỉ tiêu này được căn cứ vào tổng số phát sinh bên Có TK 821 đối ứng với bên Nợ TK 911 hoặc căn cứ vào số phát sinh bên Nợ TK 821 đối ứng với bên Có TK 911 trong kỳ báo cáo (trường hợp này số liệu được ghi vào chỉ tiêu này bằng số âm dưới hình thức ghi trong ngoặc đơn (...))."},{"k":"p","t":"- Lợi nhuận sau thuế thu nhập doanh nghiệp (Mã số 60)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số lợi nhuận thuần (hoặc lỗ) sau thuế TNDN từ các hoạt động của doanh nghiệp (sau khi trừ chi phí thuế thu nhập doanh nghiệp) phát sinh trong năm báo cáo. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 60 = Mã số 50 - Mã số 51."},{"k":"p","t":"2.4. Hướng dẫn lập và trình bày Báo cáo lưu chuyển tiền tệ (Mẫu số B03 - DNN)"},{"k":"p","t":"2.4.1. Nguyên tắc lập và trình bày Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"2.4.1.1. Doanh nghiệp không bắt buộc mà khuyến khích lập báo cáo lưu chuyển tiền tệ. Phương pháp lập Báo cáo lưu chuyển tiền tệ được hướng dẫn cho các giao dịch phổ biến nhất, doanh nghiệp căn cứ vào bản chất từng giao dịch để trình bày các luồng tiền một cách phù hợp nếu chưa có hướng dẫn cụ thể trong Thông tư này."},{"k":"p","t":"2.4.1.2. Các khoản đầu tư ngắn hạn được coi là tương đương tiền trình bày trên báo cáo lưu chuyển tiền tệ chỉ bao gồm các khoản đầu tư ngắn hạn có thời hạn thu hồi hoặc đáo hạn không quá 3 tháng có khả năng chuyển đổi dễ dàng thành một lượng tiền xác định và không có rủi ro trong chuyển đổi thành tiền kể từ ngày mua khoản đầu tư đó tại thời điểm báo cáo. Ví dụ kỳ phiếu ngân hàng, tín phiếu kho bạc, chứng chỉ tiền gửi… có thời hạn thu hồi hoặc đáo hạn không quá 3 tháng kể từ ngày mua."},{"k":"p","t":"2.4.1.3. Doanh nghiệp phải trình bày các luồng tiền trên Báo cáo lưu chuyển tiền tệ theo ba loại hoạt động: Hoạt động kinh doanh, hoạt động đầu tư và hoạt động tài chính:"},{"k":"p","t":"- Luồng tiền từ hoạt động kinh doanh là luồng tiền phát sinh từ các hoạt động tạo ra doanh thu chủ yếu của doanh nghiệp và các hoạt động khác không phải là các hoạt động đầu tư hay hoạt động tài chính;"},{"k":"p","t":"- Luồng tiền từ hoạt động đầu tư là luồng tiền phát sinh từ các hoạt động mua sắm, xây dựng, thanh lý, nhượng bán các TSCĐ, BĐSĐT, các tài sản dài hạn khác, cho vay, đầu tư góp vốn vào đơn vị khác và các khoản đầu tư khác không được phân loại là các khoản tương đương tiền;"},{"k":"p","t":"- Luồng tiền từ hoạt động tài chính là luồng tiền phát sinh từ các hoạt động tạo ra các thay đổi về quy mô và kết cấu của vốn chủ sở hữu và vốn vay của doanh nghiệp."},{"k":"p","t":"2.4.1.4. Doanh nghiệp được trình bày luồng tiền từ các hoạt động kinh doanh, hoạt động đầu tư và hoạt động tài chính theo cách thức phù hợp nhất với đặc điểm kinh doanh của doanh nghiệp."},{"k":"p","t":"2.4.1.5. Các luồng tiền phát sinh từ các hoạt động kinh doanh, hoạt động đầu tư và hoạt động tài chính sau đây được báo cáo trên cơ sở thuần:"},{"k":"p","t":"- Thu tiền và chi trả tiền hộ khách hàng như tiền thuê thu hộ, chi hộ và trả lại cho chủ sở hữu tài sản;"},{"k":"p","t":"- Thu tiền và chi tiền đối với các khoản có vòng quay nhanh, thời gian đáo hạn ngắn như: Mua, bán ngoại tệ; Mua, bán các khoản đầu tư; Các khoản đi vay và cho vay ngắn hạn khác có thời hạn thanh toán không quá 3 tháng."},{"k":"p","t":"2.4.1.6. Các luồng tiền phát sinh từ các giao dịch bằng ngoại tệ phải được quy đổi ra đồng tiền ghi sổ kế toán và lập Báo cáo tài chính theo tỷ giá giao dịch thực tế tại thời điểm phát sinh giao dịch."},{"k":"p","t":"2.4.1.7. Các giao dịch về đầu tư và tài chính không trực tiếp sử dụng tiền hay các khoản tương đương tiền không được trình bày trong Báo cáo lưu chuyển tiền tệ, ví dụ:"},{"k":"p","t":"- Việc mua tài sản bằng cách nhận các khoản nợ liên quan trực tiếp hoặc thông qua nghiệp vụ thuê tài chính;"},{"k":"p","t":"- Việc chuyển khoản nợ thành vốn góp của chủ sở hữu."},{"k":"p","t":"2.4.1.8. Các khoản mục tiền và tương đương tiền đầu kỳ và cuối kỳ, ảnh hưởng của thay đổi tỷ giá hối đoái quy đổi tiền và các khoản tương đương tiền bằng ngoại tệ hiện có cuối kỳ phải được trình bày thành các chỉ tiêu riêng biệt trên Báo cáo lưu chuyển tiền tệ để đối chiếu số liệu với các khoản mục tương ứng trên Báo cáo tình hình tài chính."},{"k":"p","t":"2.4.1.9. Doanh nghiệp phải trình bày giá trị và lý do của các khoản tiền và tương đương tiền có số dư cuối kỳ lớn do doanh nghiệp nắm giữ nhưng không được sử dụng do có sự hạn chế của pháp luật hoặc các ràng buộc khác mà doanh nghiệp phải thực hiện."},{"k":"p","t":"2.4.1.10. Trường hợp doanh nghiệp đi vay để thanh toán thẳng cho nhà thầu, người cung cấp hàng hóa, dịch vụ (tiền vay được chuyển thẳng từ bên cho vay sang nhà thầu, người cung cấp mà không chuyển qua tài khoản của doanh nghiệp) thì doanh nghiệp vẫn phải trình bày trên báo cáo lưu chuyển tiền tệ, cụ thể:"},{"k":"p","t":"- Số tiền đi vay được trình bày là luồng tiền vào của hoạt động tài chính;"},{"k":"p","t":"- Số tiền trả cho người cung cấp hàng hóa, dịch vụ hoặc trả cho nhà thầu được trình bày là luồng tiền ra từ hoạt động kinh doanh hoặc hoạt động đầu tư tùy thuộc vào từng giao dịch."},{"k":"p","t":"2.4.1.11. Trường hợp doanh nghiệp phát sinh khoản thanh toán bù trừ với cùng một đối tượng, việc trình bày báo cáo lưu chuyển tiền tệ được thực hiện theo nguyên tắc:"},{"k":"p","t":"- Nếu việc thanh toán bù trừ liên quan đến các giao dịch được phân loại trong cùng một luồng tiền thì được trình bày trên cơ sở thuần (ví dụ trong giao dịch hàng đổi hàng không tương tự…);"},{"k":"p","t":"- Nếu việc thanh toán bù trừ liên quan đến các giao dịch được phân loại trong các luồng tiền khác nhau thì doanh nghiệp không được trình bày trên cơ sở thuần mà phải trình bày riêng rẽ giá trị của từng giao dịch (Ví dụ bù trừ tiền bán hàng phải thu với khoản đi vay…)."},{"k":"p","t":"2.4.2. Cơ sở lập Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"Việc lập Báo cáo lưu chuyển tiền tệ được căn cứ vào:"},{"k":"p","t":"- Báo cáo tình hình tài chính;"},{"k":"p","t":"- Báo cáo kết quả hoạt động kinh doanh;"},{"k":"p","t":"- Bản thuyết minh Báo cáo tài chính;"},{"k":"p","t":"- Báo cáo lưu chuyển tiền tệ kỳ trước;"},{"k":"p","t":"- Các tài liệu kế toán khác, như: Sổ kế toán tổng hợp, sổ kế toán chi tiết các Tài khoản “Tiền mặt”, “Tiền gửi Ngân hàng”, Sổ kế toán tổng hợp và sổ kế toán chi tiết của các tài khoản liên quan khác, bảng tính và phân bổ khấu hao TSCĐ và các tài liệu kế toán chi tiết khác..."},{"k":"p","t":"2.4.3. Yêu cầu về mở và ghi sổ kế toán phục vụ lập Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"- Sổ kế toán chi tiết các tài khoản phải thu, phải trả, hàng tồn kho phải được theo dõi chi tiết cho từng giao dịch để có thể trình bày luồng tiền thu hồi hoặc thanh toán theo 3 loại hoạt động: Hoạt động kinh doanh, hoạt động đầu tư và hoạt động tài chính. Ví dụ: Khoản tiền trả nợ cho nhà thầu liên quan đến hoạt động XDCB được phân loại là luồng tiền từ hoạt động đầu tư, khoản trả tiền nợ người bán cung cấp hàng hóa dịch vụ cho sản xuất, kinh doanh được phân loại là luồng tiền từ hoạt động kinh doanh."},{"k":"p","t":"- Đối với sổ kế toán chi tiết các tài khoản phản ánh tiền phải được chi tiết để theo dõi các luồng tiền thu và chi liên quan đến 3 loại hoạt động: Hoạt động kinh doanh, hoạt động đầu tư và hoạt động tài chính làm căn cứ tổng hợp khi lập Báo cáo lưu chuyển tiền tệ. Ví dụ, đối với khoản tiền trả ngân hàng về gốc và lãi vay, kế toán phải phản ánh riêng số tiền trả lãi vay là luồng tiền từ hoạt động kinh doanh và số tiền trả gốc vay là luồng tiền từ hoạt động tài chính."},{"k":"p","t":"- Tại thời điểm cuối niên độ kế toán, khi lập Báo cáo lưu chuyển tiền tệ, doanh nghiệp phải xác định các khoản đầu tư ngắn hạn có thời hạn thu hồi hoặc đáo hạn không quá 3 tháng kể từ ngày mua thỏa mãn định nghĩa được coi là tương đương tiền để loại trừ ra khỏi luồng tiền từ hoạt động đầu tư. Giá trị của các khoản tương đương tiền nằm trong chỉ tiêu “Tiền và các khoản tương đương tiền cuối kỳ” trên Báo cáo lưu chuyển tiền tệ."},{"k":"p","t":"2.4.4. Phương pháp lập Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"2.4.4.1. Lập báo cáo các chỉ tiêu luồng tiền từ hoạt động kinh doanh"},{"k":"p","t":"Luồng tiền từ hoạt động kinh doanh phản ánh các luồng tiền vào và luồng tiền ra liên quan đến hoạt động sản xuất, kinh doanh trong kỳ, bao gồm cả luồng tiền liên quan đến chứng khoán nắm giữ vì mục đích kinh doanh."},{"k":"p","t":"Luồng tiền từ hoạt động kinh doanh được lập theo một trong hai phương pháp: Phương pháp trực tiếp hoặc phương pháp gián tiếp."},{"k":"p","t":"2.4.4.1.1. Lập báo cáo các chỉ tiêu luồng tiền từ hoạt động kinh doanh theo phương pháp trực tiếp (Mẫu số B03 - DNN)"},{"k":"p","t":"a) Nguyên tắc lập:"},{"k":"p","t":"Theo phương pháp trực tiếp, các luồng tiền vào và luồng tiền ra từ hoạt động kinh doanh được xác định và trình bày trong Báo cáo lưu chuyển tiền tệ bằng cách phân tích và tổng hợp trực tiếp các khoản tiền thu vào và chi ra theo từng nội dung thu, chi từ các sổ kế toán tổng hợp và chi tiết của doanh nghiệp."},{"k":"p","t":"b) Phương pháp lập các chỉ tiêu cụ thể"},{"k":"p","t":"- Tiền thu từ bán hàng, cung cấp dịch vụ và doanh thu khác (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã thu (tổng giá thanh toán) trong kỳ do bán hàng hóa, thành phẩm, cung cấp dịch vụ, tiền bản quyền, hoa hồng và các khoản doanh thu khác (như bán chứng khoán kinh doanh), kể cả các khoản tiền đã thu từ các khoản nợ phải thu liên quan đến các giao dịch bán hàng hóa, cung cấp dịch vụ và doanh thu khác phát sinh từ các kỳ trước nhưng kỳ này mới thu được tiền và số tiền ứng trước của người mua hàng hóa, dịch vụ."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản tiền thu từ thanh lý, nhượng bán TSCĐ, BĐSĐT và các tài sản dài hạn khác, tiền thu hồi các khoản cho vay, đầu tư góp vốn vào đơn vị khác, tiền thu lãi cho vay, cổ tức và lợi nhuận được chia và các khoản tiền thu khác được phân loại là luồng tiền từ hoạt động đầu tư; Các khoản tiền thu được do đi vay, phát hành cổ phiếu, nhận vốn góp của chủ sở hữu được phân loại là luồng tiền từ hoạt động tài chính."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (phần thu tiền), sổ kế toán các tài khoản phải thu (chi tiết tiền thu từ bán hàng, cung cấp dịch vụ chuyển trả ngay các khoản nợ phải trả), sau khi đối chiếu với sổ kế toán các TK 511, 131 (chi tiết các khoản doanh thu bán hàng, cung cấp dịch vụ thu tiền ngay, số tiền thu hồi các khoản phải thu hoặc thu tiền ứng trước trong kỳ) hoặc các TK 515, 121 (chi tiết số tiền thu từ bán chứng khoán kinh doanh)."},{"k":"p","t":"- Tiền chi trả cho người cung cấp hàng hóa, dịch vụ (Mã số 02)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền (tổng giá thanh toán) đã trả trong kỳ do mua hàng hóa, dịch vụ, thanh toán các khoản chi phí phục vụ cho sản xuất, kinh doanh, kể cả số tiền chi mua chứng khoán kinh doanh và số tiền đã thanh toán các khoản nợ phải trả hoặc ứng trước cho người bán hàng hóa, cung cấp dịch vụ liên quan đến hoạt động sản xuất, kinh doanh."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản tiền chi để mua sắm, chi phí đầu tư xây dựng TSCĐ, BĐSĐT (kể cả chi mua NVL để sử dụng cho XDCB), tiền chi cho vay, đầu tư góp vốn vào đơn vị khác và các khoản tiền chi khác được phân loại là luồng tiền từ hoạt động đầu tư; Các khoản tiền chi trả nợ gốc vay và nợ thuê tài chính, trả lại vốn góp cho chủ sở hữu, cổ tức và lợi nhuận đã trả cho chủ sở hữu và các khoản tiền chi khác được phân loại là luồng tiền từ hoạt động tài chính."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (phần chi tiền), sổ kế toán các tài khoản phải thu và đi vay (chi tiết tiền đi vay nhận được hoặc thu nợ phải thu chuyển trả ngay các khoản nợ phải trả), sau khi đối chiếu với sổ kế toán các TK 331, các TK phản ánh hàng tồn kho. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Tiền chi trả cho người lao động (Mã số 03)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã trả cho người lao động trong kỳ báo cáo về tiền lương, tiền công, phụ cấp, tiền thưởng... mà doanh nghiệp đã thanh toán hoặc tạm ứng."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (chi tiết tiền trả cho người lao động), sau khi đối chiếu với sổ kế toán TK 334 (chi tiết số đã trả bằng tiền) trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Tiền lãi vay đã trả (Mã số 04)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền lãi vay đã trả trong kỳ báo cáo, bao gồm tiền lãi vay phát sinh trong kỳ và trả ngay kỳ này, tiền lãi vay phải trả của các kỳ trước đã trả trong kỳ này, lãi tiền vay trả trước trong kỳ này."},{"k":"p","t":"Chỉ tiêu này không bao gồm số tiền lãi vay đã trả trong kỳ được vốn hóa vào giá trị các tài sản dở dang được phân loại là luồng tiền từ hoạt động đầu tư. Trường hợp số lãi vay đã trả trong kỳ vừa được vốn hóa, vừa được tính vào chi phí tài chính thì kế toán căn cứ tỷ lệ vốn hóa lãi vay áp dụng cho kỳ báo cáo để xác định số lãi vay đã trả của luồng tiền từ hoạt động kinh doanh và luồng tiền hoạt động đầu tư."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (chi tiết tiền chi trả lãi tiền vay); sổ kế toán các tài khoản phải thu (chi tiết tiền trả lãi vay từ tiền thu các khoản phải thu) trong kỳ báo cáo, sau khi đối chiếu với sổ kế toán TK 335, 635, 242 và các Tài khoản liên quan khác. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Thuế TNDN đã nộp (Mã số 05)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền thuế TNDN đã nộp cho Nhà nước trong kỳ báo cáo, bao gồm số tiền thuế TNDN đã nộp của kỳ này, số thuế TNDN còn nợ từ các kỳ trước đã nộp trong kỳ này và số thuế TNDN nộp trước (nếu có)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (chi tiết tiền nộp thuế TNDN), sau khi đối chiếu với sổ kế toán TK 3334. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Tiền thu khác từ hoạt động kinh doanh (Mã số 06)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã thu từ các khoản khác của hoạt động kinh doanh, ngoài khoản tiền thu được phản ánh ở Mã số 01, như: Tiền thu từ khoản thu nhập khác (tiền thu về được bồi thường, được phạt, tiền thưởng và các khoản tiền thu khác...); Tiền đã thu do được hoàn thuế; Tiền thu được do nhận ký quỹ, ký cược; Tiền thu hồi các khoản đưa đi ký cược, ký quỹ; Tiền được các tổ chức, cá nhân bên ngoài thưởng, hỗ trợ..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán các TK 711, 133, 141, 138 và sổ kế toán các tài khoản khác có liên quan trong kỳ báo cáo."},{"k":"p","t":"- Tiền chi khác cho hoạt động kinh doanh (Mã số 07)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã chi cho các khoản khác, ngoài các khoản tiền chi liên quan đến hoạt động sản xuất, kinh doanh trong kỳ báo cáo đã được phản ánh ở Mã số 02, 03, 04, 05, như: Tiền chi bồi thường, bị phạt và các khoản chi phí khác; Tiền nộp các loại thuế (không bao gồm thuế TNDN); Tiền nộp các loại phí, lệ phí, tiền thuê đất; Tiền nộp các khoản BHXH, BHYT, BHTN, KPCĐ; Tiền chi đưa đi ký cược, ký quỹ; Tiền trả lại các khoản nhận ký cược, ký quỹ, tiền chi trực tiếp bằng nguồn dự phòng phải trả; Tiền chi trực tiếp từ quỹ khen thưởng, phúc lợi; Quỹ phát triển khoa học và công nghệ; Tiền chi trực tiếp từ các quỹ khác thuộc vốn chủ sở hữu; ..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 trong kỳ báo cáo, sau khi đối chiếu với sổ kế toán các TK 811, 138, 333, 338, 352, 353, 356 và các Tài khoản liên quan khác. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Lưu chuyển tiền thuần từ hoạt động kinh doanh (Mã số 20)"},{"k":"p","t":"Chỉ tiêu “Lưu chuyển tiền thuần từ hoạt động kinh doanh” phản ánh chênh lệch giữa tổng số tiền thu vào với tổng số tiền chi ra từ hoạt động kinh doanh trong kỳ báo cáo. Số liệu để ghi vào chỉ tiêu này được tính bằng tổng cộng số liệu các chỉ tiêu từ Mã số 01 đến Mã số 07. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 20 = Mã số 01 + Mã số 02 + Mã số 03 + Mã số 04 + Mã số 05 + Mã số 06 + Mã số 07."},{"k":"p","t":"2.4.4.1.2. Lập báo cáo các chỉ tiêu luồng tiền từ hoạt động kinh doanh theo phương pháp gián tiếp (Mẫu số B03 - DNN)"},{"k":"p","t":"a. Nguyên tắc lập:"},{"k":"p","t":"Theo phương pháp gián tiếp, các luồng tiền vào và các luồng tiền ra từ hoạt động kinh doanh được tính và xác định trước hết bằng cách điều chỉnh lợi nhuận trước thuế TNDN của hoạt động kinh doanh khỏi ảnh hưởng của các khoản mục không phải bằng tiền, các thay đổi trong kỳ của hàng tồn kho, các khoản phải thu, phải trả từ hoạt động kinh doanh và các khoản mà ảnh hưởng về tiền của chúng là luồng tiền từ hoạt động đầu tư, gồm:"},{"k":"p","t":"- Các khoản chi phí không bằng tiền, như: Khấu hao TSCĐ, BĐSĐT, dự phòng..."},{"k":"p","t":"- Các khoản lãi, lỗ không bằng tiền, như lãi, lỗ chênh lệch tỷ giá hối đoái, góp vốn bằng tài sản phi tiền tệ;"},{"k":"p","t":"- Các khoản lãi, lỗ được phân loại là luồng tiền từ hoạt động đầu tư, như: Lãi, lỗ về thanh lý, nhượng bán TSCĐ và bất động sản đầu tư, tiền lãi cho vay, lãi tiền gửi, cổ tức và lợi nhuận được chia...;"},{"k":"p","t":"- Chi phí lãi vay đã ghi nhận vào Báo cáo kết quả hoạt động kinh doanh trong kỳ."},{"k":"p","t":"- Luồng tiền từ hoạt động kinh doanh được điều chỉnh tiếp tục với sự thay đổi vốn lưu động, chi phí trả trước và các khoản thu, chi khác từ hoạt động kinh doanh, như:"},{"k":"p","t":"+ Các thay đổi trong kỳ báo cáo của khoản mục hàng tồn kho, các khoản phải thu, các khoản phải trả từ hoạt động kinh doanh (trừ lãi vay phải trả, thuế TNDN phải nộp);"},{"k":"p","t":"+ Các thay đổi của chi phí trả trước;"},{"k":"p","t":"+ Các thay đổi của chứng khoán kinh doanh;"},{"k":"p","t":"+ Lãi tiền vay đã trả;"},{"k":"p","t":"+ Thuế TNDN đã nộp;"},{"k":"p","t":"+ Tiền thu khác từ hoạt động kinh doanh;"},{"k":"p","t":"+ Tiền chi khác từ hoạt động kinh doanh."},{"k":"p","t":"b. Phương pháp lập các chỉ tiêu cụ thể"},{"k":"p","t":"- Lợi nhuận trước thuế (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này được lấy từ chỉ tiêu Tổng lợi nhuận kế toán trước thuế (Mã số 50) trên Báo cáo kết quả hoạt động kinh doanh trong kỳ báo cáo. Nếu số liệu này là số âm (trường hợp lỗ) thì ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Điều chỉnh cho các khoản (Mã số 02)"},{"k":"p","t":"Mã số 02 = Mã số 03 + Mã số 04 + Mã số 05 + Mã số 06 + Mã số 07 + Mã số 08."},{"k":"p","t":"+ Khấu hao TSCĐ và BĐSĐT (Mã số 03)"},{"k":"p","t":"(+) Trường hợp doanh nghiệp bóc tách riêng được số khấu hao còn nằm trong hàng tồn kho và số khấu hao đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ: Chỉ tiêu “Khấu hao TSCĐ và BĐSĐT” chỉ bao gồm số khấu hao đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ; Chỉ tiêu “Tăng, giảm hàng tồn kho” không bao gồm số khấu hao nằm trong giá trị hàng tồn kho cuối kỳ (chưa được xác định là tiêu thụ trong kỳ);"},{"k":"p","t":"(+) Trường hợp doanh nghiệp không thể bóc tách riêng được số khấu hao còn nằm trong hàng tồn kho và số khấu hao đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ thì thực hiện theo nguyên tắc: Chỉ tiêu “Khấu hao TSCĐ và BĐSĐT” bao gồm số khấu hao đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ cộng với số khấu hao liên quan đến hàng tồn kho chưa tiêu thụ; Chỉ tiêu “Tăng, giảm hàng tồn kho” bao gồm cả số khấu hao TSCĐ nằm trong giá trị hàng tồn kho cuối kỳ (chưa được xác định là tiêu thụ trong kỳ)."},{"k":"p","t":"Trong mọi trường hợp, doanh nghiệp đều phải loại trừ khỏi Báo cáo lưu chuyển tiền tệ số khấu hao nằm trong giá trị xây dựng cơ bản dở dang, số hao mòn đã ghi giảm quỹ khen thưởng phúc lợi đã hình thành TSCĐ, giảm Quỹ phát triển KH&CN đã hình thành TSCĐ phát sinh trong kỳ. Số liệu chỉ tiêu này được cộng (+) vào số liệu chỉ tiêu \"Lợi nhuận trước thuế\"."},{"k":"p","t":"+ Các khoản dự phòng (Mã số 04)"},{"k":"p","t":"Chỉ tiêu này phản ánh ảnh hưởng của việc trích lập, hoàn nhập và sử dụng các khoản dự phòng đến các luồng tiền trong kỳ báo cáo. Chỉ tiêu này được lập căn cứ vào số chênh lệch giữa số dư đầu kỳ và số dư cuối kỳ của các khoản dự phòng tổn thất tài sản (dự phòng giảm giá chứng khoán kinh doanh, dự phòng tổn thất đầu tư vào đơn vị khác, dự phòng giảm giá hàng tồn kho, dự phòng phải thu khó đòi) và dự phòng phải trả trên Báo cáo tình hình tài chính."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng (+) vào số liệu chỉ tiêu “Lợi nhuận trước thuế” nếu tổng số dư cuối kỳ của các khoản dự phòng lớn hơn tổng số dư đầu kỳ hoặc được trừ vào số liệu chỉ tiêu “Lợi nhuận trước thuế” nếu tổng số dư cuối kỳ của các khoản dự phòng nhỏ hơn tổng số dư đầu kỳ và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Lãi/lỗ chênh lệch tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ (Mã số 05)"},{"k":"p","t":"Chỉ tiêu này phản ánh lãi (hoặc lỗ) chênh lệch tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ đã được phản ánh vào lợi nhuận trước thuế trong kỳ báo cáo. Chỉ tiêu này được lập căn cứ vào chênh lệch số phát sinh Có và phát sinh Nợ TK 413 sau khi đối chiếu sổ kế toán TK 515 (chi tiết lãi do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ) hoặc TK 635 (chi tiết lỗ do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ)."},{"k":"p","t":"Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận trước thuế”, nếu có lãi chênh lệch tỷ giá hối đoái, hoặc được cộng (+) vào chỉ tiêu “Lợi nhuận trước thuế”, nếu có lỗ chênh lệch tỷ giá hối đoái."},{"k":"p","t":"+ Lãi/lỗ từ hoạt động đầu tư (Mã số 06)"},{"k":"p","t":"Chỉ tiêu này căn cứ vào tổng số lãi, lỗ phát sinh trong kỳ đã được phản ánh vào lợi nhuận trước thuế nhưng được phân loại là luồng tiền từ hoạt động đầu tư, gồm:"},{"k":"p","t":"(+) Lãi, lỗ từ việc thanh lý, nhượng bán TSCĐ, BĐSĐT, khoản tổn thất BĐSĐT nắm giữ chờ tăng giá;"},{"k":"p","t":"(+) Lãi, lỗ từ việc đánh giá lại tài sản phi tiền tệ mang đi góp vốn, đầu tư vào đơn vị khác;"},{"k":"p","t":"(+) Lãi, lỗ từ việc bán, thu hồi các khoản đầu tư tài chính (không bao gồm lãi, lỗ mua bán chứng khoán kinh doanh), như: Đầu tư vào công ty liên doanh, liên kết; Các khoản đầu tư nắm giữ đến ngày đáo hạn;"},{"k":"p","t":"(+) Khoản tổn thất hoặc hoàn nhập tổn thất của các khoản đầu tư nắm giữ đến ngày đáo hạn;"},{"k":"p","t":"(+) Lãi cho vay, lãi tiền gửi, cổ tức và lợi nhuận được chia."},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào sổ kế toán các TK 515, 711, 632, 635, 811 và các tài khoản khác có liên quan (chi tiết phần lãi, lỗ được xác định là luồng tiền từ hoạt động đầu tư) trong kỳ báo cáo."},{"k":"p","t":"Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận trước thuế” nếu hoạt động đầu tư có lãi thuần và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…); hoặc được cộng (+) vào chỉ tiêu “Lợi nhuận trước thuế”, nếu hoạt động đầu tư có lỗ thuần."},{"k":"p","t":"+ Chi phí lãi vay (Mã số 07)"},{"k":"p","t":"Chỉ tiêu này phản ánh chi phí lãi vay đã ghi nhận vào Báo cáo kết quả hoạt động kinh doanh trong kỳ báo cáo. Chỉ tiêu này được lập căn cứ vào sổ kế toán TK 635 (chi tiết chi phí lãi vay kỳ báo cáo) sau khi đối chiếu với chỉ tiêu “Chi phí lãi vay” trong Báo cáo kết quả hoạt động kinh doanh."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng vào số liệu chỉ tiêu “Lợi nhuận trước thuế”."},{"k":"p","t":"+ Các khoản điều chỉnh khác (Mã số 08)"},{"k":"p","t":"Chỉ tiêu này phản ánh số trích lập hoặc hoàn nhập Quỹ phát triển khoa học và công nghệ trong kỳ. Chỉ tiêu này được lập căn cứ vào sổ kế toán TK 356."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng vào số liệu chỉ tiêu “Lợi nhuận trước thuế” nếu trong kỳ trích lập thêm các Quỹ hoặc được trừ khỏi chỉ tiêu “Lợi nhuận trước thuế” nếu trong kỳ hoàn nhập các quỹ."},{"k":"p","t":"- Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động (Mã số 09)"},{"k":"p","t":"Mã số 09 = Mã số 10 + Mã số 11 + Mã số 12 + Mã số 13 + Mã số 14 + Mã số 15 + Mã số 16 + Mã số 17 + Mã số 18"},{"k":"p","t":"+ Tăng, giảm các khoản phải thu (Mã số 10)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng các chênh lệch giữa số dư cuối kỳ và số dư đầu kỳ của các tài khoản phải thu (chi tiết phần liên quan đến hoạt động sản xuất, kinh doanh), như: TK 131, 136, 138, 133, 141, 331 (chi tiết số trả trước cho người bán) trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản phải thu liên quan đến hoạt động đầu tư, như: Số tiền ứng trước cho nhà thầu XDCB; Phải thu về cho vay (cả gốc và lãi); Phải thu về lãi tiền gửi, cổ tức và lợi nhuận được chia; Phải thu về thanh lý, nhượng bán TSCĐ, BĐSĐT các khoản đầu tư tài chính; Giá trị TSCĐ mang đi cầm cố, thế chấp…"},{"k":"p","t":"Số liệu chỉ tiêu này được cộng (+) vào chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu tổng các số dư cuối kỳ nhỏ hơn tổng các số dư đầu kỳ. Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu tổng các số dư cuối kỳ lớn hơn tổng các số dư đầu kỳ và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Tăng, giảm hàng tồn kho (Mã số 11)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng các chênh lệch giữa số dư cuối kỳ và số dư đầu kỳ của các tài khoản hàng tồn kho (không bao gồm số dư của tài khoản “Dự phòng giảm giá hàng tồn kho” trên cơ sở đã loại trừ: Giá trị hàng tồn kho dùng cho hoạt động đầu tư XDCB hoặc hàng tồn kho dùng để trao đổi lấy TSCĐ, BĐSĐT; Chi phí sản xuất thử được tính vào nguyên giá TSCĐ hình thành từ XDCB. Trường hợp trong kỳ mua hàng tồn kho nhưng chưa xác định được mục đích sử dụng (cho hoạt động kinh doanh hay đầu tư XDCB) thì giá trị hàng tồn kho được tính trong chỉ tiêu này."},{"k":"p","t":"Trường hợp doanh nghiệp bóc tách riêng được số khấu hao TSCĐ còn nằm trong hàng tồn kho và số khấu hao đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ (chỉ tiêu “Khấu hao TSCĐ và BĐSĐT” - Mã số 03 chỉ bao gồm số khấu hao TSCĐ đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ) thì chỉ tiêu này không bao gồm số khấu hao TSCĐ nằm trong giá trị hàng tồn kho cuối kỳ (chưa được xác định là tiêu thụ trong kỳ)."},{"k":"p","t":"Trường hợp doanh nghiệp không thể bóc tách riêng được số khấu hao TSCĐ còn nằm trong hàng tồn kho và số khấu hao đã được tính vào báo cáo kết quả hoạt động kinh doanh trong kỳ (chỉ tiêu “Khấu hao TSCĐ và BĐSĐT” - Mã số 03 bao gồm cả số khấu hao TSCĐ liên quan đến hàng tồn kho chưa tiêu thụ) thì chỉ tiêu này bao gồm cả số khấu hao TSCĐ nằm trong giá trị hàng tồn kho cuối kỳ (chưa được xác định là tiêu thụ trong kỳ)."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng (+) vào chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu tổng các số dư cuối kỳ nhỏ hơn tổng các số dư đầu kỳ. Số liệu chỉ tiêu này được trừ (-) vào chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu tổng các số dư cuối kỳ lớn hơn tổng các số dư đầu kỳ và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Tăng, giảm các khoản phải trả (Không kể lãi vay phải trả, thuế TNDN phải nộp) (Mã số 12)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng các chênh lệch giữa số dư cuối kỳ với số dư đầu kỳ của các tài khoản nợ phải trả (chi tiết phần liên quan đến hoạt động sản xuất, kinh doanh), như: TK 331, 333, 334, 335, 336, 338, 131 (chi tiết người mua trả tiền trước)."},{"k":"p","t":"Chỉ tiêu này không bao gồm số thuế TNDN phải nộp (phát sinh Có TK 3334), lãi tiền vay phải trả (phát sinh Có TK 335, chi tiết lãi vay phải trả)."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản phải trả liên quan đến hoạt động đầu tư, như: Số tiền người mua trả trước liên quan đến việc thanh lý, nhượng bán TSCĐ, BĐSĐT; Các khoản phải trả liên quan đến hoạt động mua sắm, xây dựng TSCĐ, BĐSĐT; Các khoản phải trả mua các công cụ vốn, công cụ nợ và các khoản phải trả liên quan đến hoạt động tài chính, như: Phải trả gốc vay, nợ thuê tài chính; Cổ tức, lợi nhuận phải trả."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng (+) vào chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu tổng các số dư cuối kỳ lớn hơn tổng số dư đầu kỳ. Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu tổng các số dư cuối kỳ nhỏ hơn tổng các số dư đầu kỳ và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Tăng, giảm chi phí trả trước (Mã số 13)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng chênh lệch giữa số dư cuối kỳ và số dư đầu kỳ của TK 242 “Chi phí trả trước” trong kỳ báo cáo trên cơ sở đã loại trừ khoản chi phí trả trước liên quan đến luồng tiền từ hoạt động đầu tư, như: Tiền thuê đất không đủ tiêu chuẩn ghi nhận là TSCĐ vô hình và khoản trả trước lãi vay được vốn hóa."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng (+) vào chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu số dư cuối kỳ nhỏ hơn số dư đầu kỳ. Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu số dư cuối kỳ lớn hơn số dư đầu kỳ và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Tăng, giảm chứng khoán kinh doanh (Mã số 14)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng chênh lệch giữa số dư cuối kỳ và số dư đầu kỳ của TK 121 “Chứng khoán kinh doanh” trong kỳ báo cáo."},{"k":"p","t":"Số liệu chỉ tiêu này được cộng (+) vào chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu số dư cuối kỳ nhỏ hơn số dư đầu kỳ. Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động” nếu số dư cuối kỳ lớn hơn số dư đầu kỳ và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Tiền lãi vay đã trả (Mã số 15)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền lãi vay đã trả trong kỳ báo cáo, bao gồm tiền lãi vay phát sinh trong kỳ và trả ngay kỳ này, tiền lãi vay phải trả của các kỳ trước đã trả trong kỳ này, lãi tiền vay trả trước trong kỳ này."},{"k":"p","t":"Chỉ tiêu này không bao gồm số tiền lãi vay đã trả trong kỳ được vốn hóa vào giá trị các tài sản dở dang được phân loại là luồng tiền từ hoạt động đầu tư. Trường hợp số lãi vay đã trả trong kỳ vừa được vốn hóa, vừa được tính vào chi phí tài chính thì kế toán căn cứ tỷ lệ vốn hóa lãi vay áp dụng cho kỳ báo cáo để xác định số lãi vay đã trả của luồng tiền từ hoạt động kinh doanh và luồng tiền hoạt động đầu tư."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (chi tiết tiền chi trả lãi tiền vay); sổ kế toán các tài khoản phải thu (chi tiết tiền trả lãi vay từ tiền thu các khoản phải thu) trong kỳ báo cáo, sau khi đối chiếu với sổ kế toán TK 335, 635, 242 và các Tài khoản liên quan khác."},{"k":"p","t":"Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận kinh doanh trước những thay đổi vốn lưu động” và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Thuế TNDN đã nộp (Mã số 16)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền thuế TNDN đã nộp cho Nhà nước trong kỳ báo cáo, bao gồm số tiền thuế TNDN đã nộp của kỳ này, số thuế TNDN còn nợ từ các kỳ trước đã nộp trong kỳ này và số thuế TNDN nộp trước (nếu có)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này được lấy từ sổ kế toán các TK 111, 112 (chi tiết tiền nộp thuế TNDN), sau khi đối chiếu với sổ kế toán TK 3334. Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận kinh doanh trước những thay đổi vốn lưu động” và được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"+ Tiền thu khác từ hoạt động kinh doanh (Mã số 17)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản tiền thu khác phát sinh từ hoạt động kinh doanh ngoài các khoản đã nêu ở các Mã số từ 01 đến 15, như: Tiền được các tổ chức, cá nhân bên ngoài thưởng, hỗ trợ ghi tăng các quỹ của doanh nghiệp; ... trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán các tài khoản có liên quan trong kỳ báo cáo. Số liệu chỉ tiêu này được cộng (+) vào số liệu chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động”."},{"k":"p","t":"+ Tiền chi khác cho hoạt động kinh doanh (Mã số 18)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản tiền chi khác phát sinh từ hoạt động kinh doanh ngoài các khoản đã nêu ở các Mã số từ 01 đến 15, như: Tiền chi từ Quỹ khen thưởng, phúc lợi, Quỹ phát triển khoa học và công nghệ; tiền hỗ trợ người lao động theo chính sách..."},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán các tài khoản có liên quan trong kỳ báo cáo. Số liệu chỉ tiêu này được trừ (-) vào số liệu chỉ tiêu “Lợi nhuận từ hoạt động kinh doanh trước thay đổi vốn lưu động”."},{"k":"p","t":"- Lưu chuyển tiền thuần từ hoạt động kinh doanh (Mã số 20)"},{"k":"p","t":"Chỉ tiêu “Lưu chuyển tiền thuần từ hoạt động kinh doanh” phản ánh chênh lệch giữa tổng số tiền thu vào với tổng số tiền chi ra từ hoạt động kinh doanh trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì sẽ được ghi dưới hình thức trong ngoặc đơn (…)."},{"k":"p","t":"Mã số 20 = Mã số 01 + Mã số 02 + Mã số 09"},{"k":"p","t":"2.4.4.2. Lập báo cáo các chỉ tiêu luồng tiền từ hoạt động đầu tư"},{"k":"p","t":"a) Nguyên tắc lập:"},{"k":"p","t":"- Luồng tiền từ hoạt động đầu tư được lập và trình bày trên Báo cáo lưu chuyển tiền tệ một cách riêng biệt các luồng tiền vào và các luồng tiền ra."},{"k":"p","t":"- Luồng tiền từ hoạt động đầu tư được lập theo phương pháp trực tiếp hoặc trực tiếp có điều chỉnh."},{"k":"p","t":"b) Phương pháp lập các chỉ tiêu cụ thể theo phương pháp trực tiếp (Xem Mẫu số B03 - DNN)"},{"k":"p","t":"- Tiền chi để mua sắm, xây dựng TSCĐ, BĐSĐT và các tài sản dài hạn khác (Mã số 21)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã thực chi để mua sắm, xây dựng TSCĐ hữu hình, BĐSĐT, TSCĐ vô hình, tiền chi cho giai đoạn triển khai đã được vốn hóa thành TSCĐ vô hình, tiền chi cho hoạt động đầu tư xây dựng dở dang, đầu tư bất động sản trong kỳ báo cáo. Chi phí sản xuất thử sau khi bù trừ với số tiền thu từ bán sản phẩm sản xuất thử của TSCĐ hình thành từ hoạt động XDCB được cộng vào chỉ tiêu này (nếu chi lớn hơn thu) hoặc trừ vào chỉ tiêu này (nếu thu lớn hơn chi)."},{"k":"p","t":"Chỉ tiêu này phản ánh cả số tiền đã thực trả để mua nguyên vật liệu, tài sản, sử dụng cho XDCB nhưng đến cuối kỳ chưa xuất dùng cho hoạt động đầu tư XDCB; Số tiền đã ứng trước cho nhà thầu XDCB nhưng chưa nghiệm thu khối lượng; Số tiền đã trả để trả nợ người bán trong kỳ liên quan trực tiếp tới việc mua sắm, đầu tư XDCB."},{"k":"p","t":"Trường hợp mua nguyên vật liệu, tài sản sử dụng chung cho cả mục đích sản xuất, kinh doanh và đầu tư XDCB nhưng cuối kỳ chưa xác định được giá trị nguyên vật liệu, tài sản sẽ sử dụng cho hoạt động đầu tư XDCB hay hoạt động sản xuất, kinh doanh thì số tiền đã trả không phản ánh vào chỉ tiêu này mà phản ánh ở luồng tiền từ hoạt động kinh doanh."},{"k":"p","t":"Chỉ tiêu này không bao gồm số nhận nợ thuê tài chính, giá trị tài sản phi tiền tệ khác dùng để thanh toán khi mua sắm TSCĐ, BĐSĐT, XDCB hoặc giá trị TSCĐ, BĐSĐT, XDCB tăng trong kỳ nhưng chưa được trả bằng tiền."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 (chi tiết số tiền chi mua sắm, xây dựng TSCĐ, BĐSĐT và các tài sản dài hạn khác, kể cả số tiền lãi vay đã trả được vốn hóa), sổ kế toán các tài khoản phải thu (chi tiết tiền thu nợ chuyển trả ngay cho hoạt động mua sắm, XDCB), sổ kế toán TK 3411 (chi tiết số tiền vay nhận được chuyển trả ngay cho người bán), sổ kế toán TK 331 (chi tiết khoản ứng trước hoặc trả nợ cho nhà thầu XDCB, trả nợ cho người bán TSCĐ, BĐSĐT), sau khi đối chiếu với sổ kế toán các TK 211, 217, 241 trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Tiền thu từ thanh lý, nhượng bán TSCĐ, BĐSĐT và các tài sản dài hạn khác (Mã số 22)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào số tiền thuần đã thu từ việc thanh lý, nhượng bán TSCĐ hữu hình, TSCĐ vô hình và BĐSĐT trong kỳ báo cáo, kể cả số tiền thu hồi các khoản nợ phải thu liên quan trực tiếp tới việc thanh lý, nhượng bán TSCĐ, BĐSĐT và tài sản dài hạn khác."},{"k":"p","t":"Chỉ tiêu này không bao gồm số thu bằng tài sản phi tiền tệ hoặc số tiền phải thu nhưng chưa thu được trong kỳ báo cáo từ việc thanh lý nhượng bán TSCĐ, BĐSĐT và tài sản dài hạn khác; Không bao gồm các khoản chi phí phi tiền tệ liên quan đến hoạt động thanh lý nhượng bán TSCĐ, BĐSĐT và giá trị còn lại của TSCĐ, BĐSĐT do đem đi góp vốn liên doanh, liên kết hoặc các khoản tổn thất."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là chênh lệch giữa số tiền thu và số tiền chi cho việc thanh lý, nhượng bán TSCĐ, BĐSĐT và các tài sản dài hạn khác. Số tiền thu được lấy từ sổ kế toán các TK 111, 112, sau khi đối chiếu với sổ kế toán các TK 711, 5118, 131 (chi tiết tiền thu thanh lý, nhượng bán TSCĐ, BĐSĐT và các tài sản dài hạn khác) trong kỳ báo cáo. Số tiền chi được lấy từ sổ kế toán các TK 111, 112, sau khi đối chiếu với sổ kế toán các TK 632, 811 (Chi tiết chi về thanh lý, nhượng bán TSCĐ, BĐSĐT) trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…) nếu số tiền thực thu nhỏ hơn số tiền thực chi."},{"k":"p","t":"- Tiền chi cho vay, đầu tư góp vốn vào đơn vị khác (Mã số 23)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã gửi vào ngân hàng có kỳ hạn trên 3 tháng, tiền đã chi cho bên khác vay, chi mua các công cụ nợ của đơn vị khác (trái phiếu, thương phiếu, cổ phiếu ưu đãi phân loại là nợ phải trả…), chi đầu tư góp vốn vào đơn vị khác (bao gồm tiền chi đầu tư vốn dưới hình thức mua cổ phiếu phổ thông có quyền biểu quyết, mua cổ phiếu ưu đãi được phân loại là vốn chủ sở hữu, góp vốn vào công ty liên doanh, liên kết,…) vì mục đích đầu tư nắm giữ đến ngày đáo hạn trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm tiền chi mua các công cụ nợ được coi là các khoản tương đương tiền và mua các công cụ nợ nắm giữ vì mục đích kinh doanh (kiếm lời từ chênh lệch giá mua, bán); Các khoản cho vay, mua các công cụ nợ đã trả bằng tài sản phi tiền tệ hoặc đảo nợ, tiền chi mua cổ phiếu nắm giữ vì mục đích kinh doanh; Chi mua cổ phiếu ưu đãi được phân loại là nợ phải trả, đầu tư vào đơn vị khác bằng tài sản phi tiền tệ; đầu tư dưới hình thức phát hành cổ phiếu hoặc trái phiếu; Chuyển công cụ nợ thành vốn góp hoặc còn nợ chưa thanh toán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112, sau khi đối chiếu với sổ kế toán TK 128, 228, 331 trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"- Tiền thu hồi cho vay, đầu tư góp vốn vào đơn vị khác (Mã số 24)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã thu từ việc rút tiền gửi ngân hàng có kỳ hạn gốc trên 3 tháng; Tiền thu hồi lại gốc đã cho vay, gốc trái phiếu, cổ phiếu ưu đãi được phân loại là nợ phải trả và các công cụ nợ của đơn vị khác, tổng số tiền đã thu hồi do bán lại hoặc thanh lý các khoản vốn đã đầu tư vào đơn vị khác (kể cả tiền thu nợ phải thu bán công cụ vốn từ kỳ trước) trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm tiền thu từ bán các công cụ nợ được coi là các khoản tương đương tiền và bán các công cụ nợ được phân loại là chứng khoán kinh doanh; Không bao gồm các khoản thu hồi bằng tài sản phi tiền tệ hoặc chuyển công cụ nợ thành công cụ vốn của đơn vị khác, tiền thu do bán chứng khoán kinh doanh; Giá trị khoản đầu tư được thu hồi bằng tài sản phi tiền tệ, bằng công cụ nợ hoặc công cụ vốn của đơn vị khác hoặc chưa được thanh toán bằng tiền."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán TK 128, 228, 131 trong kỳ báo cáo."},{"k":"p","t":"- Tiền thu lãi cho vay, cổ tức và lợi nhuận được chia (Mã số 25)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào số tiền thu về các khoản tiền lãi cho vay, lãi tiền gửi, lãi trái phiếu, cổ tức và lợi nhuận nhận được từ đầu tư vốn vào các đơn vị khác trong kỳ báo cáo. Chỉ tiêu này không bao gồm các khoản lãi, cổ tức nhận được bằng cổ phiếu hoặc bằng tài sản phi tiền tệ."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán TK 515."},{"k":"p","t":"- Lưu chuyển tiền thuần từ hoạt động đầu tư (Mã số 30)"},{"k":"p","t":"Chỉ tiêu “Lưu chuyển tiền thuần từ hoạt động đầu tư” phản ánh chênh lệch giữa tổng số tiền thu vào với tổng số tiền chi ra từ hoạt động đầu tư trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì được ghi dưới hình thức ghi trong ngoặc đơn (…)."},{"k":"p","t":"Mã số 30 = Mã số 21 + Mã số 22 + Mã số 23 + Mã số 24 + Mã số 25."},{"k":"p","t":"2.4.4.3. Lập báo cáo các chỉ tiêu luồng tiền từ hoạt động tài chính"},{"k":"p","t":"a. Nguyên tắc lập:"},{"k":"p","t":"Luồng tiền từ hoạt động tài chính được lập và trình bày trên Báo cáo lưu chuyển tiền tệ một cách riêng biệt các luồng tiền vào và các luồng tiền ra, trừ trường hợp các luồng tiền được báo cáo trên cơ sở thuần."},{"k":"p","t":"b. Phương pháp lập các chỉ tiêu cụ thể theo phương pháp trực tiếp (Xem Mẫu số B03-DNN)"},{"k":"p","t":"- Tiền thu từ phát hành cổ phiếu, nhận vốn góp của chủ sở hữu (Mã số 31)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã thu do các chủ sở hữu của doanh nghiệp góp vốn trong kỳ báo cáo. Chỉ tiêu này không bao gồm các khoản vay và nợ được chuyển thành vốn, khoản lợi nhuận sau thuế chưa phân phối chuyển thành vốn góp (kể cả trả cổ tức bằng cổ phiếu) hoặc nhận vốn góp của chủ sở hữu bằng tài sản phi tiền tệ."},{"k":"p","t":"Đối với công ty cổ phần, chỉ tiêu này phản ánh số tiền đã thu do phát hành cổ phiếu phổ thông theo giá thực tế phát hành, kể cả tiền thu từ phát hành cổ phiếu ưu đãi được phân loại là vốn chủ sở hữu nhưng không bao gồm số tiền đã thu do phát hành cổ phiếu ưu đãi được phân loại là nợ phải trả."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán chi tiết TK 411 trong kỳ báo cáo."},{"k":"p","t":"- Tiền trả lại vốn góp cho các chủ sở hữu, mua lại cổ phiếu của doanh nghiệp đã phát hành (Mã số 32)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã trả do hoàn lại vốn góp cho các chủ sở hữu của doanh nghiệp dưới các hình thức hoàn trả bằng tiền hoặc mua lại cổ phiếu của doanh nghiệp đã phát hành bằng tiền để hủy bỏ hoặc sử dụng làm cổ phiếu quỹ trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản trả lại cổ phiếu ưu đãi được phân loại là nợ phải trả, vốn góp của chủ sở hữu bằng tài sản phi tiền tệ hoặc sử dụng vốn góp để bù lỗ kinh doanh."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán chi tiết các TK 411, 419 trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Tiền thu từ đi vay (Mã số 33)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã nhận được trong kỳ do doanh nghiệp đi vay kể cả phát hành trái phiếu các tổ chức tài chính, tín dụng và các đối tượng khác trong kỳ báo cáo. Chỉ tiêu này không bao gồm các khoản đi vay bằng tài sản phi tiền tệ hoặc nợ thuê tài chính."},{"k":"p","t":"Trường hợp vay dưới hình thức phát hành cổ phiếu ưu đãi, chỉ tiêu này phản ánh tổng số tiền đã nhận được trong kỳ do doanh nghiệp phát hành cổ phiếu ưu đãi được phân loại là nợ phải trả."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112, các tài khoản phải trả (chi tiết tiền vay nhận được chuyển trả ngay các khoản nợ phải trả) sau khi đối chiếu với sổ kế toán chi tiết các TK 3411, 4111 và các tài khoản khác có liên quan trong kỳ báo cáo."},{"k":"p","t":"- Tiền trả nợ gốc vay và nợ gốc thuê tài chính (Mã số 34)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền đã trả về khoản nợ gốc vay, cổ phiếu ưu đãi được phân loại là nợ phải trả và tổng số tiền đã trả về nợ gốc thuê tài chính trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm các khoản trả gốc vay, nợ gốc thuê tài chính bằng tài sản phi tiền tệ hoặc chuyển nợ vay, nợ gốc thuê tài chính thành vốn góp."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sổ kế toán các tài khoản phải thu (phần tiền trả nợ vay từ tiền thu các khoản phải thu), sau khi đối chiếu với sổ kế toán chi tiết TK 341, 4111 trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Cổ tức, lợi nhuận đã trả cho chủ sở hữu (Mã số 35)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổng số tiền cổ tức và lợi nhuận đã trả cho các chủ sở hữu của doanh nghiệp (kể cả số thuế thu nhập cá nhân đã nộp thay cho chủ sở hữu) trong kỳ báo cáo."},{"k":"p","t":"Chỉ tiêu này không bao gồm khoản lợi nhuận được chuyển thành vốn góp của chủ sở hữu, trả cổ tức bằng cổ phiếu hoặc trả bằng tài sản phi tiền tệ và các khoản lợi nhuận đã dùng để trích lập các quỹ."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này lấy từ sổ kế toán các TK 111, 112 sau khi đối chiếu với sổ kế toán các TK 421, 338 (chi tiết số tiền đã trả về cổ tức và lợi nhuận) trong kỳ báo cáo. Chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Lưu chuyển tiền thuần từ hoạt động tài chính (Mã số 40)"},{"k":"p","t":"Chỉ tiêu lưu chuyển tiền thuần từ hoạt động tài chính phản ánh chênh lệch giữa tổng số tiền thu vào với tổng số tiền chi ra từ hoạt động tài chính trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 40 = Mã số 31 + Mã số 32 + Mã số 33 + Mã số 34 + Mã số 35."},{"k":"p","t":"2.4.4.4. Tổng hợp các luồng tiền trong kỳ (Xem Mẫu số B03 - DNN)"},{"k":"p","t":"- Lưu chuyển tiền thuần trong kỳ (Mã số 50)"},{"k":"p","t":"Chỉ tiêu “Lưu chuyển tiền thuần trong kỳ” phản ánh chênh lệch giữa tổng số tiền thu vào với tổng số tiền chi ra từ ba loại hoạt động: Hoạt động kinh doanh, hoạt động đầu tư và hoạt động tài chính của doanh nghiệp trong kỳ báo cáo. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 50 = Mã số 20 + Mã số 30 + Mã số 40."},{"k":"p","t":"- Tiền và tương đương tiền đầu kỳ (Mã số 60)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào số liệu chỉ tiêu “Tiền và tương đương tiền” đầu kỳ báo cáo (Mã số 110, cột “Số đầu năm” trên Báo cáo tình hình tài chính)."},{"k":"p","t":"- Ảnh hưởng của thay đổi tỷ giá hối đoái quy đổi ngoại tệ (Mã số 61)"},{"k":"p","t":"Chỉ tiêu này được lập căn cứ vào tổn
