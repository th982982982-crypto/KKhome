TKH&CN để tài trợ cho việc nghiên cứu, sản xuất thử nghiệm, số tiền thu được khi bán sản phẩm sản xuất thử được bù trừ với chi phí sản xuất thử theo nguyên tắc:"},{"k":"p","t":"- Phần chênh lệch giữa số tiền thu từ bán sản phẩm sản xuất thử cao hơn chi phí sản xuất thử được ghi tăng Quỹ PTKH&CN;"},{"k":"p","t":"- Phần chênh lệch giữa số tiền thu từ bán sản phẩm sản xuất thử thấp hơn chi phí sản xuất thử được ghi giảm Quỹ PTKH&CN."},{"k":"p","t":"d) Định kỳ, doanh nghiệp lập Báo cáo về mức trích, sử dụng, quyết toán Quỹ PTKH&CN và nộp cơ quan có thẩm quyền theo quy định của pháp luật."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 356 - Quỹ phát triển khoa học và công nghệ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản chi tiêu từ Quỹ phát triển khoa học và công nghệ;"},{"k":"p","t":"- Giảm Quỹ phát triển khoa học và công nghệ đã hình thành tài sản cố định (TSCĐ) khi tính hao mòn TSCĐ; giá trị còn lại của TSCĐ khi nhượng bán, thanh lý; chi phí thanh lý, nhượng bán TSCĐ hình thành từ Quỹ phát triển khoa học và công nghệ;"},{"k":"p","t":"- Giảm Quỹ phát triển khoa học và công nghệ đã hình thành TSCĐ khi TSCĐ hình thành từ Quỹ phát triển khoa học và công nghệ chuyển sang phục vụ mục đích sản xuất, kinh doanh."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Trích lập Quỹ phát triển khoa học và công nghệ vào chi phí quản lý doanh nghiệp;"},{"k":"p","t":"- Số thu từ việc thanh lý, nhượng bán TSCĐ hình thành từ Quỹ phát triển khoa học và công nghệ đã hình thành TSCĐ."},{"k":"p","t":"Số dư bên Có: Số quỹ phát triển khoa học và công nghệ hiện còn của doanh nghiệp."},{"k":"p","t":"Tài khoản 356 - Quỹ phát triển khoa học và công nghệ có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 3561 - Quỹ phát triển khoa học và công nghệ: Phản ánh số hiện có và tình hình trích lập, chi tiêu quỹ phát triển khoa học và công nghệ;"},{"k":"p","t":"- Tài khoản 3562 - Quỹ phát triển khoa học và công nghệ đã hình thành TSCĐ: Phản ánh số hiện có, tình hình tăng, giảm quỹ phát triển khoa học và công nghệ đã hình thành TSCĐ (Quỹ phát triển khoa học và công nghệ đã hình thành TSCĐ)."}]},{"id":"tt133_50","no":50,"code":"Điều 50","title":"Điều 50. Nguyên tắc kế toán vốn chủ sở hữu","shortTitle":"Nguyên tắc kế toán vốn chủ sở hữu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Vốn chủ sở hữu là phần tài sản thuần của doanh nghiệp còn lại thuộc sở hữu của các cổ đông, thành viên góp vốn (chủ sở hữu). Vốn chủ sở hữu được phản ánh theo từng nguồn hình thành như:"},{"k":"p","t":"- Vốn góp của chủ sở hữu;"},{"k":"p","t":"- Lợi nhuận từ hoạt động kinh doanh;"},{"k":"p","t":"- Các khoản khác được phép ghi tăng vốn chủ sở hữu."},{"k":"p","t":"2. Kế toán không ghi nhận vốn góp theo vốn điều lệ trên giấy phép đăng ký kinh doanh. Khoản vốn góp huy động, nhận từ các chủ sở hữu luôn được ghi nhận theo số thực góp, tuyệt đối không ghi nhận theo số cam kết sẽ góp của các chủ sở hữu. Trường hợp nhận vốn góp bằng tài sản phi tiền tệ thì kế toán phải ghi nhận theo giá trị hợp lý của tài sản phi tiền tệ tại ngày góp vốn."},{"k":"p","t":"3. Việc nhận vốn góp bằng các loại tài sản vô hình như bản quyền, quyền khai thác, sử dụng tài sản, thương hiệu, nhãn hiệu… chỉ được thực hiện khi có quy định cụ thể của pháp luật hoặc cơ quan có thẩm quyền cho phép. Khi pháp luật chưa có quy định cụ thể về vấn đề này, các giao dịch góp vốn bằng nhãn hiệu, thương hiệu được kế toán như việc đi thuê tài sản hoặc nhượng quyền thương mại, theo đó:"},{"k":"p","t":"- Đối với bên góp vốn bằng thương hiệu, nhãn hiệu, tên thương mại: Ghi nhận số tiền thu được từ việc cho bên kia sử dụng nhãn hiệu, tên thương mại là doanh thu cho thuê tài sản vô hình, nhượng quyền thương mại, không ghi nhận tăng giá trị khoản đầu tư vào đơn vị khác và thu nhập hoặc vốn chủ sở hữu tương ứng với giá trị khoản đầu tư;"},{"k":"p","t":"- Đối với bên nhận vốn góp bằng thương hiệu, nhãn hiệu, tên thương mại: Không ghi nhận giá trị thương hiệu, nhãn hiệu, tên thương mại và ghi tăng vốn chủ sở hữu tương ứng với giá trị thương hiệu, nhãn hiệu, tên thương mại nhận vốn góp. Khoản tiền trả cho việc sử dụng nhãn hiệu, thương hiệu, tên thương mại được ghi nhận là chi phí thuê tài sản, chi phí nhượng quyền thương mại."},{"k":"p","t":"4. Việc phân phối lợi nhuận chỉ thực hiện khi doanh nghiệp có lợi nhuận sau thuế chưa phân phối. Mọi trường hợp trả cổ tức, lợi nhuận cho chủ sở hữu vượt quá số lợi nhuận sau thuế chưa phân phối về bản chất đều là giảm vốn góp, doanh nghiệp phải thực hiện đầy đủ các thủ tục theo quy định của pháp luật và điều chỉnh giấy đăng ký kinh doanh."}]},{"id":"tt133_51","no":51,"code":"Điều 51","title":"Điều 51. Tài khoản 411 - Vốn đầu tư của chủ sở hữu","shortTitle":"Tài khoản 411 - Vốn đầu tư của chủ sở hữu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh vốn do chủ sở hữu đầu tư hiện có và tình hình tăng, giảm vốn đầu tư của chủ sở hữu."},{"k":"p","t":"b) Vốn đầu tư của chủ sở hữu bao gồm:"},{"k":"p","t":"- Vốn góp ban đầu, góp bổ sung của các chủ sở hữu;"},{"k":"p","t":"- Thặng dư vốn cổ phần;"},{"k":"p","t":"- Vốn khác."},{"k":"p","t":"c) Các doanh nghiệp chỉ hạch toán vào TK 4111 - “Vốn góp của chủ sở hữu” theo số vốn thực tế chủ sở hữu đã góp, không được ghi nhận theo số cam kết, số phải thu của các chủ sở hữu."},{"k":"p","t":"d) Doanh nghiệp phải tổ chức hạch toán chi tiết vốn đầu tư của chủ sở hữu theo từng nguồn hình thành vốn (như vốn góp của chủ sở hữu, thặng dư vốn cổ phần, vốn khác) và theo dõi chi tiết cho từng tổ chức, từng cá nhân tham gia góp vốn."},{"k":"p","t":"đ) Doanh nghiệp ghi giảm vốn đầu tư của chủ sở hữu khi:"},{"k":"p","t":"- Trả lại vốn cho các chủ sở hữu, hủy bỏ cổ phiếu quỹ theo quy định của pháp luật;"},{"k":"p","t":"- Giải thể, chấm dứt hoạt động theo quy định của pháp luật;"},{"k":"p","t":"- Các trường hợp khác theo quy định của pháp luật."},{"k":"p","t":"e) Xác định phần vốn góp của nhà đầu tư bằng ngoại tệ"},{"k":"p","t":"- Khi giấy phép đầu tư quy định vốn điều lệ của doanh nghiệp được xác định bằng ngoại tệ tương đương với một số lượng tiền Việt Nam đồng, việc xác định phần vốn góp của nhà đầu tư bằng ngoại tệ (thừa, thiếu, đủ so với vốn điều lệ) được căn cứ vào số lượng ngoại tệ đã thực góp, không xem xét đến việc quy đổi ngoại tệ ra Việt Nam đồng theo giấy phép đầu tư."},{"k":"p","t":"- Trường hợp doanh nghiệp ghi sổ kế toán, lập và trình bày báo cáo tài chính bằng đơn vị tiền tệ kế toán, khi nhà đầu tư góp vốn bằng ngoại tệ theo tiến độ, kế toán phải áp dụng tỷ giá giao dịch thực tế tại từng thời điểm thực góp để quy đổi ra đơn vị tiền tệ kế toán và ghi nhận vào vốn đầu tư của chủ sở hữu, thặng dư vốn cổ phần (nếu có)."},{"k":"p","t":"- Trong quá trình hoạt động, không được đánh giá lại số dư có Tài khoản 411 - Vốn đầu tư của chủ sở hữu có gốc ngoại tệ."},{"k":"p","t":"g) Trường hợp nhận vốn góp bằng tài sản phải phản ánh tăng vốn đầu tư của chủ sở hữu theo giá đánh giá lại của tài sản được các bên góp vốn chấp nhận."},{"k":"p","t":"h) Đối với công ty cổ phần, vốn góp cổ phần của các cổ đông được ghi theo giá thực tế phát hành cổ phiếu, nhưng được phản ánh chi tiết theo hai chỉ tiêu riêng: Vốn góp của chủ sở hữu và thặng dư vốn cổ phần:"},{"k":"p","t":"- Vốn góp của chủ sở hữu được phản ánh theo mệnh giá của cổ phiếu;"},{"k":"p","t":"- Thặng dư vốn cổ phần phản ánh khoản chênh lệch giữa mệnh giá và giá phát hành cổ phiếu (kể cả các trường hợp tái phát hành cổ phiếu quỹ) và có thể là thặng dư dương (nếu giá phát hành cao hơn mệnh giá) hoặc thặng dư âm (nếu giá phát hành thấp hơn mệnh giá)."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 411 - Vốn đầu tư của chủ sở hữu"},{"k":"p","t":"Bên Nợ: Vốn đầu tư của chủ sở hữu giảm do:"},{"k":"p","t":"- Hoàn trả vốn góp cho các chủ sở hữu vốn;"},{"k":"p","t":"- Phát hành cổ phiếu thấp hơn mệnh giá;"},{"k":"p","t":"- Giải thể, chấm dứt hoạt động doanh nghiệp;"},{"k":"p","t":"- Bù lỗ kinh doanh theo quyết định của cấp có thẩm quyền;"},{"k":"p","t":"- Hủy bỏ cổ phiếu quỹ (đối với công ty cổ phần)."},{"k":"p","t":"Bên Có: Vốn đầu tư của chủ sở hữu tăng do:"},{"k":"p","t":"- Các chủ sở hữu góp vốn;"},{"k":"p","t":"- Bổ sung vốn từ lợi nhuận kinh doanh, từ các quỹ thuộc vốn chủ sở hữu;"},{"k":"p","t":"- Phát hành cổ phiếu cao hơn mệnh giá;"},{"k":"p","t":"- Giá trị quà tặng, biếu, tài trợ (sau khi trừ các khoản thuế phải nộp) được phép ghi tăng Vốn đầu tư của chủ sở hữu theo quyết định của cấp có thẩm quyền."},{"k":"p","t":"Số dư bên Có: Vốn đầu tư của chủ sở hữu hiện có của doanh nghiệp."},{"k":"p","t":"Tài khoản 411 - Vốn đầu tư của chủ sở hữu, có 3 tài khoản cấp 2:"},{"k":"p","t":"- TK 4111 - Vốn góp của chủ sở hữu: Tài khoản này phản ánh khoản vốn thực đã đầu tư của chủ sở hữu theo Điều lệ công ty của các chủ sở hữu vốn. Đối với các công ty cổ phần thì vốn góp từ phát hành cổ phiếu được ghi vào tài khoản này theo mệnh giá. Tài khoản 4111 - Vốn góp của chủ sở hữu tại công ty cổ phần có thể theo dõi chi tiết thành cổ phiếu phổ thông có quyền biểu quyết và cổ phiếu ưu đãi."},{"k":"p","t":"- TK 4112 - Thặng dư vốn cổ phần: Tài khoản này phản ánh phần chênh lệch giữa giá phát hành và mệnh giá cổ phiếu; Chênh lệch giữa giá mua lại cổ phiếu quỹ và giá tái phát hành cổ phiếu quỹ (đối với các công ty cổ phần). Tài khoản này có thể có số dư Có hoặc số dư Nợ."},{"k":"p","t":"- TK 4118 - Vốn khác: Tài khoản này phản ánh số vốn kinh doanh được hình thành do bổ sung từ kết quả hoạt động kinh doanh hoặc do được tặng, biếu, tài trợ, đánh giá lại tài sản (nếu các khoản này được phép ghi tăng, giảm vốn đầu tư của chủ sở hữu)."}]},{"id":"tt133_52","no":52,"code":"Điều 52","title":"Điều 52. Tài khoản 413 - Chênh lệch tỷ giá hối đoái","shortTitle":"Tài khoản 413 - Chênh lệch tỷ giá hối đoái","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Quy định chung về tỷ giá hối đoái và chênh lệch tỷ giá hối đoái"},{"k":"p","t":"1.1. Chênh lệch tỷ giá hối đoái là chênh lệch phát sinh từ việc trao đổi thực tế hoặc quy đổi cùng một số lượng ngoại tệ sang đơn vị tiền tệ kế toán theo tỷ giá hối đoái khác nhau. Chênh lệch tỷ giá hối đoái chủ yếu phát sinh trong các trường hợp:"},{"k":"p","t":"- Thực tế mua bán, trao đổi, thanh toán các nghiệp vụ kinh tế phát sinh bằng ngoại tệ trong kỳ;"},{"k":"p","t":"- Đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ tại thời điểm lập Báo cáo tài chính;"},{"k":"p","t":"- Chuyển đổi Báo cáo tài chính được lập bằng ngoại tệ sang Đồng Việt Nam."},{"k":"p","t":"1.2. Các loại tỷ giá hối đoái (sau đây gọi tắt là tỷ giá) sử dụng trong kế toán"},{"k":"p","t":"Các doanh nghiệp có nghiệp vụ kinh tế phát sinh bằng ngoại tệ phải thực hiện ghi sổ kế toán và lập Báo cáo tài chính theo một đơn vị tiền tệ thống nhất là Đồng Việt Nam hoặc đơn vị tiền tệ kế toán. Việc quy đổi đồng ngoại tệ ra đơn vị tiền tệ kế toán phải căn cứ vào:"},{"k":"p","t":"- Tỷ giá giao dịch thực tế;"},{"k":"p","t":"- Tỷ giá ghi sổ kế toán."},{"k":"p","t":"Khi xác định nghĩa vụ thuế (kê khai, quyết toán và nộp thuế), doanh nghiệp thực hiện theo các quy định của pháp luật về thuế."},{"k":"p","t":"1.3. Nguyên tắc xác định tỷ giá ghi sổ:"},{"k":"p","t":"Tỷ giá ghi sổ gồm tỷ giá ghi sổ thực tế đích danh hoặc tỷ giá ghi sổ bình quân gia quyền (tỷ giá bình quân gia quyền sau mỗi lần nhập hoặc cuối kỳ)."},{"k":"p","t":"- Tỷ giá ghi sổ thực tế đích danh là tỷ giá được xác định liên quan đến giao dịch đã phát sinh tại một thời điểm cụ thể. Tỷ giá ghi sổ thực tế đích danh được áp dụng để ghi sổ kế toán cho bên Nợ các tài khoản phải thu đối với khoản tiền bằng ngoại tệ đã nhận ứng trước của khách hàng hoặc cho bên Có các tài khoản phải trả đối với khoản tiền bằng ngoại tệ đã ứng trước cho người bán."},{"k":"p","t":"- Tỷ giá ghi sổ bình quân gia quyền là tỷ giá được xác định trên cơ sở lấy tổng giá trị (theo đồng tiền ghi sổ kế toán) của từng khoản mục tiền tệ có gốc ngoại tệ chia cho số lượng nguyên tệ thực có tại từng thời điểm."},{"k":"p","t":"1.4. Nguyên tắc xác định tỷ giá hối đoái và xử lý chênh lệch tỷ giá hối đoái:"},{"k":"p","t":"1.4.1. Đối với các giao dịch bằng ngoại tệ phát sinh trong kỳ:"},{"k":"p","t":"a) Doanh nghiệp áp dụng tỷ giá giao dịch thực tế để quy đổi ra đồng tiền ghi sổ kế toán theo nguyên tắc:"},{"k":"p","t":"- Tỷ giá giao dịch thực tế khi mua, bán ngoại tệ (hợp đồng mua bán ngoại tệ giao ngay, hợp đồng kỳ hạn, hợp đồng tương lai, hợp đồng quyền chọn, hợp đồng hoán đổi): Là tỷ giá ký kết trong hợp đồng mua, bán ngoại tệ giữa doanh nghiệp và ngân hàng thương mại;"},{"k":"p","t":"- Trường hợp hợp đồng không quy định cụ thể tỷ giá thanh toán thì doanh nghiệp sử dụng tỷ giá giao dịch thực tế là tỷ giá xấp xỉ với tỷ giá chuyển khoản trung bình của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch để ghi sổ kế toán."},{"k":"p","t":"Tỷ giá xấp xỉ này phải đảm bảo chênh lệch không vượt quá +/-1% so với tỷ giá chuyển khoản trung bình của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch (ngân hàng này do doanh nghiệp tự lựa chọn). Tỷ giá chuyển khoản trung bình có thể được xác định hàng ngày, hàng tuần hoặc hàng tháng trên cơ sở trung bình cộng giữa tỷ giá mua và tỷ giá bán chuyển khoản hàng ngày của ngân hàng thương mại."},{"k":"p","t":"Doanh nghiệp được áp dụng tỷ giá giao dịch thực tế là tỷ giá xấp xỉ để ghi sổ kế toán đối với:"},{"k":"p","t":"+ Bên Nợ các TK tiền; Bên Nợ các TK phải thu (trừ trường hợp nhận ứng trước của khách hàng bằng ngoại tệ thì bên Nợ tài khoản 131 áp dụng tỷ giá ghi sổ thực tế đích danh đối với số tiền nhận ứng trước), Bên Nợ các TK phải trả khi ứng trước tiền cho người bán."},{"k":"p","t":"+ Bên Có các TK phải trả (trừ trường hợp ứng trước cho người bán bằng ngoại tệ thì bên Có tài khoản 331 áp dụng tỷ giá ghi sổ thực tế đích danh đối với số tiền đã ứng trước); Bên Có các TK phải thu khi nhận trước tiền của khách hàng."},{"k":"p","t":"+ Tài khoản loại vốn chủ sở hữu;"},{"k":"p","t":"+ Các tài khoản phản ánh doanh thu, thu nhập khác."},{"k":"p","t":"Riêng trường hợp bán sản phẩm, hàng hóa, cung cấp dịch vụ hoặc thu nhập phát sinh có nhận trước tiền của người mua thì doanh thu, thu nhập tương ứng với số tiền nhận trước được áp dụng tỷ giá giao dịch thực tế tại thời điểm nhận trước. Phần doanh thu, thu nhập tương ứng với số tiền còn lại được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm ghi nhận doanh thu, thu nhập."},{"k":"p","t":"+ Các tài khoản phản ánh chi phí sản xuất, kinh doanh, chi phí khác."},{"k":"p","t":"Riêng trường hợp phân bổ khoản chi phí trả trước vào chi phí sản xuất, kinh doanh trong kỳ thì chi phí được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm trả trước (không áp dụng theo tỷ giá giao dịch thực tế tại thời điểm phân bổ vào chi phí)."},{"k":"p","t":"+ Các tài khoản phản ánh tài sản."},{"k":"p","t":"Riêng trường hợp mua tài sản có ứng trước tiền cho người bán thì giá trị tài sản tương ứng với số tiền ứng trước được áp dụng tỷ giá giao dịch thực tế tại thời điểm ứng trước, giá trị tài sản tương ứng với số tiền còn lại được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm ghi nhận tài sản."},{"k":"p","t":"Việc sử dụng tỷ giá giao dịch thực tế là tỷ giá xấp xỉ nêu trên của doanh nghiệp phải đảm bảo không làm ảnh hưởng trọng yếu đến tình hình tài chính và kết quả hoạt động sản xuất kinh doanh của kỳ kế toán."},{"k":"p","t":"b) Doanh nghiệp được lựa chọn áp dụng tỷ giá ghi sổ để quy đổi ra đồng tiền ghi sổ kế toán theo các trường hợp sau:"},{"k":"p","t":"- Áp dụng tỷ giá ghi sổ bình quân gia quyền để hạch toán bên Có các tài khoản tiền, bên Có các tài khoản phải thu (ngoại trừ giao dịch nhận trước tiền của người mua), bên Nợ các tài khoản phải trả (ngoại trừ giao dịch trả trước tiền cho người bán)."},{"k":"p","t":"+ Ngoài việc áp dụng tỷ giá ghi sổ bình quân gia quyền, các doanh nghiệp có thể lựa chọn áp dụng tỷ giá giao dịch thực tế để ghi sổ kế toán đối với bên Có các TK tiền, bên Có các TK phải thu, bên Nợ các TK phải trả."},{"k":"p","t":"Khoản chênh lệch tỷ giá hối đoái phát sinh trong kỳ được ghi nhận đồng thời tại thời điểm phát sinh hoặc định kỳ vào doanh thu hoạt động tài chính hoặc chi phí tài chính tùy theo đặc điểm hoạt động kinh doanh và yêu cầu quản lý của doanh nghiệp."},{"k":"p","t":"+ Trường hợp doanh nghiệp sử dụng tỷ giá giao dịch thực tế để hạch toán bên Có các tài khoản tiền, bên Có các tài khoản nợ phải thu, bên Nợ các tài khoản phải trả bằng ngoại tệ, nếu tại thời điểm cuối kỳ kế toán:"},{"k":"p","t":"(+) Các khoản mục tiền tệ có gốc ngoại tệ không còn số dư nguyên tệ thì doanh nghiệp phải kết chuyển toàn bộ chênh lệch tỷ giá hối đoái phát sinh trong kỳ vào doanh thu hoạt động tài chính hoặc chi phí tài chính của kỳ báo cáo."},{"k":"p","t":"(+) Các khoản mục tiền tệ có gốc ngoại tệ còn số dư nguyên tệ thì doanh nghiệp phải đánh giá lại cuối kỳ theo tỷ giá ghi sổ bình quân gia quyền và toàn bộ chênh lệch tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ được xử lý theo quy định tại khoản 1.4.2 Điều này."},{"k":"p","t":"- Áp dụng tỷ giá ghi sổ thực tế đích danh để hạch toán đối với:"},{"k":"p","t":"+ Bên Nợ TK phải thu khi tất toán khoản tiền nhận trước của người mua khi chuyển giao sản phẩm, hàng hóa, TSCĐ, cung cấp dịch vụ cho khách hàng;"},{"k":"p","t":"+ Bên Có TK phải trả khi tất toán khoản tiền ứng trước cho người bán khi nhận được sản phẩm, hàng hóa, dịch vụ, TSCĐ của người bán."},{"k":"p","t":"1.4.2. Tỷ giá để đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ là tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch (do doanh nghiệp tự lựa chọn) tại thời điểm lập Báo cáo tài chính."},{"k":"p","t":"Toàn bộ khoản chênh lệch tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ (theo số thuần sau khi bù trừ số phát sinh bên Nợ và bên Có TK 413) được kết chuyển vào chi phí tài chính (nếu lỗ) hoặc doanh thu hoạt động tài chính (nếu lãi) để xác định kết quả hoạt động kinh doanh."},{"k":"p","t":"1.4.3. Xử lý chênh lệch tỷ giá hối đoái giai đoạn trước hoạt động:"},{"k":"p","t":"- Các doanh nghiệp chưa phân bổ hết khoản lỗ chênh lệch tỷ giá của giai đoạn trước hoạt động (đang phản ánh trên tài khoản 242 trước thời điểm Thông tư này có hiệu lực) phải kết chuyển toàn bộ số lỗ chênh lệch tỷ giá vào chi phí tài chính để xác định kết quả kinh doanh trong kỳ."},{"k":"p","t":"- Các doanh nghiệp chưa phân bổ hết khoản lãi chênh lệch tỷ giá của giai đoạn trước hoạt động (đang phản ánh trên tài khoản 3387 trước thời điểm Thông tư này có hiệu lực) phải kết chuyển toàn bộ số lãi chênh lệch tỷ giá vào doanh thu hoạt động tài chính để xác định kết quả kinh doanh trong kỳ."},{"k":"p","t":"1.5. Nguyên tắc xác định các khoản mục tiền tệ có gốc ngoại tệ: Là các tài sản được thu hồi bằng ngoại tệ hoặc các khoản nợ phải trả bằng ngoại tệ. Các khoản mục tiền tệ có gốc ngoại tệ có thể bao gồm:"},{"k":"p","t":"a) Tiền mặt, các khoản tương đương tiền, tiền gửi có kỳ hạn bằng ngoại tệ;"},{"k":"p","t":"b) Các khoản nợ phải thu, nợ phải trả có gốc ngoại tệ, ngoại trừ:"},{"k":"p","t":"- Các khoản trả trước cho người bán và các khoản chi phí trả trước bằng ngoại tệ. Trường hợp tại thời điểm lập báo cáo tài chính có bằng chứng chắc chắn về việc người bán không thể cung cấp hàng hóa, dịch vụ và doanh nghiệp sẽ phải nhận lại các khoản trả trước bằng ngoại tệ thì các khoản này được coi là các khoản mục tiền tệ có gốc ngoại tệ."},{"k":"p","t":"- Các khoản người mua trả tiền trước và các khoản doanh thu nhận trước bằng ngoại tệ. Trường hợp tại thời điểm lập báo cáo tài chính có bằng chứng chắc chắn về việc doanh nghiệp không thể cung cấp hàng hóa, dịch vụ và sẽ phải trả lại các khoản nhận trước bằng ngoại tệ cho người mua thì các khoản này được coi là các khoản mục tiền tệ có gốc ngoại tệ."},{"k":"p","t":"c) Các khoản đi vay, cho vay dưới mọi hình thức được quyền thu hồi hoặc có nghĩa vụ hoàn trả bằng ngoại tệ."},{"k":"p","t":"d) Các khoản đặt cọc, ký cược, ký quỹ được quyền nhận lại bằng ngoại tệ;"},{"k":"p","t":"đ) Các khoản nhận ký cược, ký quỹ phải hoàn trả bằng ngoại tệ."},{"k":"p","t":"2. Nguyên tắc kế toán chênh lệch tỷ giá"},{"k":"p","t":"a) Doanh nghiệp đồng thời phải theo dõi nguyên tệ trên sổ kế toán chi tiết các tài khoản: Tiền mặt, tiền gửi Ngân hàng, các khoản phải thu, các khoản phải trả, vốn góp của chủ sở hữu."},{"k":"p","t":"b) Tất cả các khoản chênh lệch tỷ giá phát sinh trong kỳ đều được phản ánh ngay vào doanh thu hoạt động tài chính (nếu lãi) hoặc chi phí tài chính (nếu lỗ) của kỳ báo cáo."},{"k":"p","t":"c) Doanh nghiệp phải đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ theo tỷ giá chuyển khoản trung bình cuối kỳ của ngân hàng thương mại nơi doanh nghiệp thường xuyên có giao dịch tại tất cả các thời điểm lập Báo cáo tài chính theo quy định của pháp luật."},{"k":"p","t":"d) Doanh nghiệp không được vốn hóa các khoản chênh lệch tỷ giá vào giá trị tài sản dở dang."},{"k":"p","t":"3. Kết cấu và nội dung phản ánh của Tài khoản 413 - Chênh lệch tỷ giá hối đoái"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Lỗ tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ;"},{"k":"p","t":"- Kết chuyển lãi tỷ giá hối đoái vào doanh thu hoạt động tài chính."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Lãi tỷ giá hối đoái do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ;"},{"k":"p","t":"- Kết chuyển lỗ tỷ giá hối đoái vào chi phí tài chính."},{"k":"p","t":"Tài khoản 413 không có số dư."}]},{"id":"tt133_53","no":53,"code":"Điều 53","title":"Điều 53. Tài khoản 418 - Các quỹ thuộc vốn chủ sở hữu","shortTitle":"Tài khoản 418 - Các quỹ thuộc vốn chủ sở hữu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"Tài khoản này dùng để phản ánh số hiện có và tình hình tăng, giảm các quỹ thuộc nguồn vốn chủ sở hữu. Các quỹ này được hình thành từ lợi nhuận sau thuế TNDN. Việc trích và sử dụng quỹ thuộc nguồn vốn chủ sở hữu phải theo chính sách tài chính hiện hành đối với từng loại doanh nghiệp hoặc theo quyết định của chủ sở hữu."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 418 - Các quỹ thuộc vốn chủ sở hữu"},{"k":"p","t":"Bên Nợ: Tình hình chi tiêu, sử dụng các quỹ thuộc vốn chủ sở hữu của doanh nghiệp."},{"k":"p","t":"Bên Có: Các quỹ thuộc vốn chủ sở hữu tăng do được trích lập từ lợi nhuận sau thuế."},{"k":"p","t":"Số dư bên Có: Số quỹ thuộc vốn chủ sở hữu hiện có."}]},{"id":"tt133_54","no":54,"code":"Điều 54","title":"Điều 54. Tài khoản 419 - Cổ phiếu quỹ","shortTitle":"Tài khoản 419 - Cổ phiếu quỹ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh giá trị hiện có và tình hình biến động tăng giảm của số cổ phiếu do các công ty cổ phần mua lại trong số cổ phiếu do công ty đó đã phát hành ra công chúng (gọi là cổ phiếu quỹ)."},{"k":"p","t":"Các cổ phiếu quỹ do công ty nắm giữ không được nhận cổ tức, không có quyền bầu cử hay tham gia chia phần tài sản khi công ty giải thể. Khi chia cổ tức cho các cổ phần, các cổ phiếu quỹ đang do công ty nắm giữ được coi là cổ phiếu chưa bán."},{"k":"p","t":"b) Giá trị cổ phiếu quỹ được phản ánh trên tài khoản này theo giá thực tế mua lại bao gồm giá mua lại và các chi phí liên quan trực tiếp đến việc mua lại cổ phiếu, như chi phí giao dịch, thông tin…"},{"k":"p","t":"c) Cuối kỳ kế toán, khi lập Báo cáo tài chính, giá trị thực tế của cổ phiếu quỹ được ghi giảm Vốn đầu tư của chủ sở hữu trên Báo cáo tình hình tài chính bằng cách ghi số âm (...)."},{"k":"p","t":"d) Tài khoản này không phản ánh trị giá cổ phiếu mà công ty mua của các công ty cổ phần khác vì mục đích nắm giữ đầu tư."},{"k":"p","t":"đ) Trị giá vốn của cổ phiếu quỹ khi tái phát hành, hoặc khi sử dụng để trả cổ tức, thưởng... được tính theo phương pháp bình quân gia quyền."},{"k":"p","t":"e) Trường hợp công ty mua lại cổ phiếu do chính công ty phát hành nhằm mục đích thu hồi cổ phiếu để hủy bỏ vĩnh viễn ngay khi mua vào thì giá trị cổ phiếu mua vào không được phản ánh vào tài khoản này mà ghi giảm trực tiếp vào vốn góp của chủ sở hữu và thặng dư vốn cổ phần (xem hướng dẫn ở tài khoản 411 - Vốn đầu tư của chủ sở hữu)."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 419 - Cổ phiếu quỹ"},{"k":"p","t":"Bên nợ: Trị giá thực tế cổ phiếu quỹ khi mua vào."},{"k":"p","t":"Bên Có: Trị giá thực tế cổ phiếu quỹ được tái phát hành, chia cổ tức hoặc hủy bỏ."},{"k":"p","t":"Số dư bên Nợ: Trị giá thực tế cổ phiếu quỹ hiện đang do công ty nắm giữ."}]},{"id":"tt133_55","no":55,"code":"Điều 55","title":"Điều 55. Tài khoản 421 - Lợi nhuận sau thuế chưa phân phối","shortTitle":"Tài khoản 421 - Lợi nhuận sau thuế chưa phân phối","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh kết quả kinh doanh (lãi, lỗ) sau thuế thu nhập doanh nghiệp và tình hình phân chia lợi nhuận hoặc xử lý lỗ của doanh nghiệp."},{"k":"p","t":"b) Việc phân chia lợi nhuận hoạt động kinh doanh của doanh nghiệp phải đảm bảo rõ ràng, rành mạch và theo đúng chính sách tài chính hiện hành."},{"k":"p","t":"c) Phải hạch toán chi tiết kết quả hoạt động kinh doanh của từng năm tài chính (năm trước, năm nay), đồng thời theo dõi chi tiết theo từng nội dung phân chia lợi nhuận của doanh nghiệp (trích lập các quỹ, bổ sung Vốn đầu tư của chủ sở hữu, chia cổ tức, lợi nhuận cho các cổ đông, cho các nhà đầu tư)."},{"k":"p","t":"d) Khi áp dụng hồi tố do thay đổi chính sách kế toán và điều chỉnh hồi tố các sai sót trọng yếu của các năm trước nhưng năm nay mới phát hiện dẫn đến phải điều chỉnh số dư đầu năm phần lợi nhuận chưa phân phối thì kế toán phải điều chỉnh tăng hoặc giảm số dư đầu năm của TK 4211 “Lợi nhuận sau thuế chưa phân phối năm trước” trên sổ kế toán và điều chỉnh tăng hoặc giảm chỉ tiêu “Lợi nhuận sau thuế chưa phân phối” trên Báo cáo tình hình tài chính."},{"k":"p","t":"Đối với tất cả các doanh nghiệp, khi phân phối lợi nhuận cần cân nhắc đến các khoản mục phi tiền tệ nằm trong lợi nhuận sau thuế chưa phân phối có thể ảnh hưởng đến luồng tiền và khả năng chi trả cổ tức, lợi nhuận của doanh nghiệp, như:"},{"k":"p","t":"- Khoản lãi do đánh giá lại tài sản mang đi góp vốn; do đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ; do đánh giá lại các công cụ tài chính;"},{"k":"p","t":"- Các khoản mục phi tiền tệ khác…"},{"k":"p","t":"e) Trong hoạt động hợp đồng hợp tác kinh doanh (BCC) chia lợi nhuận sau thuế, doanh nghiệp phải theo dõi riêng kết quả của BCC làm căn cứ để phân phối lợi nhuận hoặc chia lỗ cho các bên. Doanh nghiệp là bên nộp và quyết toán thuế TNDN thay các bên trong BCC chỉ phản ánh phần lợi nhuận tương ứng với phần của mình được hưởng, không được phản ánh toàn bộ kết quả của BCC trên tài khoản này trừ khi có quyền kiểm soát đối với BCC."},{"k":"p","t":"g) Đối với cổ tức ưu đãi phải trả: Doanh nghiệp phải căn cứ vào bản chất của cổ phiếu ưu đãi để hạch toán theo nguyên tắc:"},{"k":"p","t":"- Nếu cổ phiếu ưu đãi được phân loại là nợ phải trả, kế toán không ghi nhận cổ tức phải trả từ lợi nhuận sau thuế chưa phân phối;"},{"k":"p","t":"- Nếu cổ phiếu ưu đãi được phân loại là vốn chủ sở hữu, khoản cổ tức ưu đãi phải trả được kế toán tương tự như việc trả cổ tức của cổ phiếu phổ thông."},{"k":"p","t":"h) Doanh nghiệp phải theo dõi trong hệ thống quản trị nội bộ số lỗ tính thuế và số lỗ không tính thuế, trong đó:"},{"k":"p","t":"- Khoản lỗ tính thuế là khoản lỗ tạo ra bởi các khoản chi phí được trừ khi xác định thu nhập chịu thuế;"},{"k":"p","t":"- Khoản lỗ không tính thuế là khoản lỗ tạo ra bởi các khoản chi phí không được trừ khi xác định thu nhập chịu thuế."},{"k":"p","t":"Khi chuyển lỗ theo quy định của pháp luật, doanh nghiệp chỉ được chuyển phần lỗ tính thuế làm căn cứ giảm trừ số thuế phải nộp trong tương lai."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 421 - Lợi nhuận sau thuế chưa phân phối"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số lỗ về hoạt động kinh doanh của doanh nghiệp;"},{"k":"p","t":"- Trích lập các quỹ của doanh nghiệp;"},{"k":"p","t":"- Chia cổ tức, lợi nhuận cho các chủ sở hữu;"},{"k":"p","t":"- Bổ sung vốn đầu tư của chủ sở hữu."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Số lợi nhuận thực tế hoạt động kinh doanh của doanh nghiệp trong kỳ;"},{"k":"p","t":"- Số lỗ của cấp dưới được cấp trên cấp bù;"},{"k":"p","t":"- Xử lý các khoản lỗ về hoạt động kinh doanh."},{"k":"p","t":"Tài khoản 421 có thể có số dư Nợ hoặc số dư Có."},{"k":"p","t":"Số dư bên Nợ: Số lỗ hoạt động kinh doanh chưa xử lý."},{"k":"p","t":"Số dư bên Có: Số lợi nhuận sau thuế chưa phân phối hoặc chưa sử dụng."},{"k":"p","t":"Tài khoản 421 - Lợi nhuận sau thuế chưa phân phối, có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 4211 - Lợi nhuận sau thuế chưa phân phối năm trước: Phản ánh kết quả hoạt động kinh doanh, tình hình phân chia lợi nhuận hoặc xử lý lỗ thuộc các năm trước. Tài khoản 4211 còn dùng để phản ánh số điều chỉnh tăng hoặc giảm số dư đầu năm của TK 4211 khi áp dụng hồi tố do thay đổi chính sách kế toán và điều chỉnh hồi tố các sai sót trọng yếu của năm trước, năm nay mới phát hiện."},{"k":"p","t":"Đầu năm sau, kế toán kết chuyển số dư đầu năm từ TK 4212 “Lợi nhuận sau thuế chưa phân phối năm nay” sang TK 4211 “Lợi nhuận sau thuế chưa phân phối năm trước”."},{"k":"p","t":"- Tài khoản 4212 - Lợi nhuận sau thuế chưa phân phối năm nay: Phản ánh kết quả kinh doanh, tình hình phân chia lợi nhuận và xử lý lỗ của năm nay."}]},{"id":"tt133_56","no":56,"code":"Điều 56","title":"Điều 56. Nguyên tắc kế toán doanh thu","shortTitle":"Nguyên tắc kế toán doanh thu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh thu là lợi ích kinh tế thu được làm tăng vốn chủ sở hữu của doanh nghiệp trừ phần vốn góp thêm của các cổ đông. Doanh thu được ghi nhận tại thời điểm giao dịch phát sinh, khi chắc chắn thu được lợi ích kinh tế, được xác định theo giá trị hợp lý của các khoản được quyền nhận, không phân biệt đã thu tiền hay sẽ thu được tiền."},{"k":"p","t":"2. Doanh thu và chi phí tạo ra khoản doanh thu đó phải được ghi nhận đồng thời theo nguyên tắc phù hợp. Tuy nhiên trong một số trường hợp, nguyên tắc phù hợp có thể xung đột với nguyên tắc thận trọng trong kế toán, thì kế toán phải căn cứ vào bản chất giao dịch để phản ánh một cách trung thực, hợp lý."},{"k":"p","t":"- Một hợp đồng kinh tế có thể bao gồm nhiều giao dịch. Kế toán phải nhận biết các giao dịch để áp dụng các điều kiện ghi nhận doanh thu phù hợp."},{"k":"p","t":"- Doanh thu phải được ghi nhận phù hợp với bản chất hơn là hình thức hoặc tên gọi của giao dịch và phải được phân bổ theo nghĩa vụ cung ứng hàng hóa, dịch vụ."},{"k":"p","t":"+ Ví dụ: Khách hàng chỉ được nhận hàng khuyến mại khi mua sản phẩm hàng hóa của đơn vị (như mua 2 sản phẩm được tặng thêm một sản phẩm) thì bản chất giao dịch là giảm giá hàng bán, sản phẩm tặng miễn phí cho khách hàng về hình thức được gọi là khuyến mại nhưng về bản chất là bán vì khách hàng sẽ không được hưởng nếu không mua sản phẩm. Trường hợp này giá trị sản phẩm tặng cho khách hàng được phản ánh vào giá vốn và doanh thu tương ứng với giá trị hợp lý của sản phẩm đó phải được ghi nhận."},{"k":"p","t":"- Đối với các giao dịch làm phát sinh nghĩa vụ của người bán ở thời điểm hiện tại và trong tương lai, doanh thu phải được phân bổ theo giá trị hợp lý của từng nghĩa vụ và được ghi nhận khi nghĩa vụ đã được thực hiện."},{"k":"p","t":"3. Doanh thu, lãi hoặc lỗ chỉ được coi là chưa thực hiện nếu doanh nghiệp còn có trách nhiệm thực hiện các nghĩa vụ trong tương lai (trừ nghĩa vụ bảo hành thông thường) và chưa chắc chắn thu được lợi ích kinh tế; Việc phân loại các khoản lãi, lỗ là thực hiện hoặc chưa thực hiện không phụ thuộc vào việc đã phát sinh dòng tiền hay chưa."},{"k":"p","t":"Các khoản lãi, lỗ phát sinh do đánh giá lại tài sản, nợ phải trả không được coi là chưa thực hiện do tại thời điểm đánh giá lại, đơn vị đã có quyền đối với tài sản và đã có nghĩa vụ nợ hiện tại đối với các khoản nợ phải trả, ví dụ: Các khoản lãi, lỗ phát sinh do đánh giá lại tài sản mang đi góp vốn đầu tư vào đơn vị khác, đánh giá lại các tài sản tài chính theo giá trị hợp lý đều được coi là đã thực hiện."},{"k":"p","t":"4. Doanh thu không bao gồm các khoản thu hộ bên thứ ba, ví dụ;"},{"k":"p","t":"- Các loại thuế gián thu (thuế GTGT, thuế xuất khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường) phải nộp;"},{"k":"p","t":"- Số tiền người bán hàng đại lý thu hộ bên chủ hàng do bán hàng đại lý;"},{"k":"p","t":"- Các khoản phụ thu và phí thu thêm ngoài giá bán đơn vị không được hưởng;"},{"k":"p","t":"- Các trường hợp khác."},{"k":"p","t":"Trường hợp các khoản thuế gián thu phải nộp mà không tách riêng ngay được tại thời điểm phát sinh giao dịch thì để thuận lợi cho công tác kế toán, có thể ghi nhận doanh thu trên sổ kế toán bao gồm cả số thuế gián thu nhưng định kỳ kế toán phải ghi giảm doanh thu đối với số thuế gián thu phải nộp. Tuy nhiên, khi lập Báo cáo tài chính, kế toán bắt buộc phải xác định và loại trừ toàn bộ số thuế gián thu phải nộp ra khỏi các chỉ tiêu phản ánh doanh thu gộp."},{"k":"p","t":"5. Thời điểm, căn cứ để ghi nhận doanh thu kế toán và doanh thu tính thuế có thể khác nhau tùy vào từng tình huống cụ thể. Doanh thu tính thuế chỉ được sử dụng để xác định số thuế phải nộp theo quy định của pháp luật; Doanh thu ghi nhận trên sổ kế toán để lập Báo cáo tài chính phải tuân thủ các nguyên tắc kế toán và tùy theo từng trường hợp không nhất thiết phải bằng số đã ghi trên hóa đơn bán hàng."},{"k":"p","t":"6. Doanh thu được ghi nhận chỉ bao gồm doanh thu của kỳ báo cáo. Các tài khoản phản ánh doanh thu không có số dư, cuối kỳ kế toán phải kết chuyển doanh thu để xác định kết quả kinh doanh."}]},{"id":"tt133_57","no":57,"code":"Điều 57","title":"Điều 57. Tài khoản 511 - Doanh thu bán hàng và cung cấp dịch vụ","shortTitle":"Tài khoản 511 - Doanh thu bán hàng và cung cấp dịch vụ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh doanh thu bán hàng và cung cấp dịch vụ của doanh nghiệp trong một kỳ kế toán của hoạt động sản xuất, kinh doanh từ các giao dịch và các nghiệp vụ sau:"},{"k":"p","t":"a) Bán hàng hóa: Bán sản phẩm do doanh nghiệp sản xuất ra, bán hàng hóa mua vào và bán bất động sản đầu tư;"},{"k":"p","t":"b) Cung cấp dịch vụ: Thực hiện công việc đã thỏa thuận theo hợp đồng trong một kỳ, hoặc nhiều kỳ kế toán, như cung cấp dịch vụ vận tải, du lịch, cho thuê TSCĐ theo phương thức cho thuê hoạt động, doanh thu hợp đồng xây dựng...."},{"k":"p","t":"c) Doanh thu khác."},{"k":"p","t":"1.2. Điều kiện ghi nhận doanh thu"},{"k":"p","t":"a) Doanh nghiệp chỉ ghi nhận doanh thu bán hàng khi đồng thời thỏa mãn các điều kiện sau:"},{"k":"p","t":"- Doanh nghiệp đã chuyển giao phần lớn rủi ro và lợi ích gắn liền với quyền sở hữu sản phẩm, hàng hóa cho người mua;"},{"k":"p","t":"- Doanh nghiệp không còn nắm giữ quyền quản lý hàng hóa như người sở hữu hoặc quyền kiểm soát hàng hóa;"},{"k":"p","t":"- Doanh thu được xác định tương đối chắc chắn. Khi hợp đồng quy định người mua được quyền trả lại sản phẩm, hàng hóa, đã mua theo những điều kiện cụ thể, doanh nghiệp chỉ được ghi nhận doanh thu khi những điều kiện cụ thể đó không còn tồn tại và người mua không được quyền trả lại sản phẩm, hàng hóa (trừ trường hợp khách hàng có quyền trả lại hàng hóa dưới hình thức đổi lại để lấy hàng hóa, dịch vụ khác);"},{"k":"p","t":"- Doanh nghiệp đã hoặc sẽ thu được lợi ích kinh tế từ giao dịch bán hàng;"},{"k":"p","t":"- Xác định được các chi phí liên quan đến giao dịch bán hàng."},{"k":"p","t":"b) Doanh nghiệp chỉ ghi nhận doanh thu cung cấp dịch vụ khi đồng thời thỏa mãn các điều kiện sau:"},{"k":"p","t":"- Doanh thu được xác định tương đối chắc chắn. Khi hợp đồng quy định người mua được quyền trả lại dịch vụ đã mua theo những điều kiện cụ thể, doanh nghiệp chỉ được ghi nhận doanh thu khi những điều kiện cụ thể đó không còn tồn tại và người mua không được quyền trả lại dịch vụ đã cung cấp;"},{"k":"p","t":"- Doanh nghiệp đã hoặc sẽ thu được lợi ích kinh tế từ giao dịch cung cấp dịch vụ đó;"},{"k":"p","t":"- Xác định được phần công việc đã hoàn thành vào thời điểm báo cáo;"},{"k":"p","t":"- Xác định được chi phí phát sinh cho giao dịch và chi phí để hoàn thành giao dịch cung cấp dịch vụ đó."},{"k":"p","t":"1.3. Trường hợp hợp đồng kinh tế bao gồm nhiều giao dịch, doanh nghiệp phải nhận biết các giao dịch để ghi nhận doanh thu, ví dụ:"},{"k":"p","t":"- Trường hợp hợp đồng kinh tế quy định việc bán hàng và cung cấp dịch vụ sau bán hàng (ngoài điều khoản bảo hành thông thường), doanh nghiệp phải ghi nhận riêng doanh thu bán hàng và doanh thu cung cấp dịch vụ;"},{"k":"p","t":"- Trường hợp hợp đồng quy định bên bán hàng chịu trách nhiệm lắp đặt sản phẩm, hàng hóa cho người mua thì doanh thu chỉ được ghi nhận sau khi việc lắp đặt được thực hiện xong;"},{"k":"p","t":"- Trường hợp doanh nghiệp có nghĩa vụ phải cung cấp cho người mua hàng hóa, dịch vụ miễn phí hoặc chiết khấu, giảm giá, kế toán chỉ ghi nhận doanh thu đối với hàng hóa, dịch vụ phải cung cấp miễn phí đó cho đến khi đã thực hiện nghĩa vụ với người mua."},{"k":"p","t":"1.4. Doanh thu bán hàng và cung cấp dịch vụ thuần mà doanh nghiệp thực hiện được trong kỳ kế toán có thể thấp hơn doanh thu bán hàng và cung cấp dịch vụ ghi nhận ban đầu do các nguyên nhân: Doanh nghiệp chiết khấu thương mại, giảm giá hàng đã bán cho khách hàng hoặc hàng đã bán bị trả lại (do không đảm bảo điều kiện về quy cách, phẩm chất ghi trong hợp đồng kinh tế);"},{"k":"p","t":"Trường hợp sản phẩm, hàng hóa, dịch vụ đã tiêu thụ từ các kỳ trước, đến kỳ sau phải chiết khấu thương mại, giảm giá hàng bán, hoặc hàng bán bị trả lại được ghi giảm doanh thu theo nguyên tắc:"},{"k":"p","t":"- Nếu sản phẩm, hàng hóa, dịch vụ đã tiêu thụ từ các kỳ trước, đến kỳ sau phải giảm giá, phải chiết khấu thương mại, bị trả lại nhưng phát sinh trước thời điểm phát hành báo cáo tài chính, kế toán phải coi đây là một sự kiện phát sinh sau ngày lập BCTC và ghi giảm doanh thu trên BCTC của kỳ lập báo cáo."},{"k":"p","t":"- Trường hợp sản phẩm, hàng hóa, dịch vụ phải giảm giá, phải chiết khấu thương mại, bị trả lại sau thời điểm phát hành Báo cáo tài chính thì doanh nghiệp ghi giảm doanh thu của kỳ phát sinh."},{"k":"p","t":"1.5. Doanh thu trong một số trường hợp được xác định như sau:"},{"k":"p","t":"1.5.1. Doanh thu bán hàng, cung cấp dịch vụ không bao gồm các khoản thuế gián thu phải nộp, như thuế GTGT (kể cả trường hợp nộp thuế GTGT theo phương pháp trực tiếp), thuế TTĐB, thuế xuất khẩu, thuế bảo vệ môi trường."},{"k":"p","t":"Trường hợp không tách ngay được số thuế gián thu phải nộp tại thời điểm ghi nhận doanh thu, kế toán được ghi nhận doanh thu bao gồm cả số thuế phải nộp và định kỳ phải ghi giảm doanh thu đối với số thuế gián thu phải nộp. Khi lập báo cáo kết quả kinh doanh, chỉ tiêu “Doanh thu bán hàng và cung cấp dịch vụ” và chỉ tiêu “Các khoản giảm trừ doanh thu” đều không bao gồm số thuế gián thu phải nộp trong kỳ do về bản chất các khoản thuế gián thu không được coi là một bộ phận của doanh thu."},{"k":"p","t":"1.5.2. Trường hợp trong kỳ doanh nghiệp đã viết hóa đơn bán hàng và đã thu tiền bán hàng nhưng đến cuối kỳ vẫn chưa giao hàng cho người mua hàng, thì trị giá số hàng này không được coi là đã bán trong kỳ và không được ghi vào tài khoản 511 “Doanh thu bán hàng và cung cấp dịch vụ” mà chỉ hạch toán vào bên Có tài khoản 131 “Phải thu của khách hàng” về khoản tiền đã thu của khách hàng. Khi thực giao hàng cho người mua sẽ hạch toán vào tài khoản 511 “Doanh thu bán hàng và cung cấp dịch vụ” về trị giá hàng đã giao, đã thu trước tiền bán hàng, phù hợp với các điều kiện ghi nhận doanh thu."},{"k":"p","t":"1.5.3. Trường hợp xuất hàng hóa để khuyến mại, quảng cáo nhưng khách hàng chỉ được nhận hàng khuyến mại, quảng cáo kèm theo các điều kiện khác như phải mua sản phẩm, hàng hóa (ví dụ như mua 2 sản phẩm được tặng 1 sản phẩm....) thì kế toán phải phân bổ số tiền thu được để tính doanh thu cho cả hàng khuyến mại, giá trị hàng khuyến mại được tính vào giá vốn hàng bán (trường hợp này bản chất giao dịch là giảm giá hàng bán)."},{"k":"p","t":"1.5.4. Trường hợp doanh nghiệp có doanh thu bán hàng và cung cấp dịch vụ bằng ngoại tệ mà phát sinh giao dịch nhận tiền ứng trước của khách hàng thì doanh thu tương ứng với số tiền nhận ứng trước được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm nhận ứng trước, phần doanh thu tương ứng với số tiền còn lại được ghi nhận theo tỷ giá giao dịch thực tế tại thời điểm ghi nhận doanh thu."},{"k":"p","t":"1.5.5. Doanh thu bán bất động sản của doanh nghiệp là chủ đầu tư phải thực hiện theo nguyên tắc:"},{"k":"p","t":"Đối với các công trình, hạng mục công trình mà doanh nghiệp là chủ đầu tư (kể cả các công trình, hạng mục công trình doanh nghiệp vừa là chủ đầu tư, vừa tự thi công), doanh nghiệp không được ghi nhận doanh thu bán bất động sản và không được ghi nhận doanh thu đối với số tiền thu trước của khách hàng theo tiến độ. Việc ghi nhận doanh thu bán bất động sản phải đảm bảo thỏa mãn đồng thời 5 điều kiện sau:"},{"k":"p","t":"- Bất động sản đã hoàn thành toàn bộ và bàn giao cho người mua, doanh nghiệp đã chuyển giao rủi ro và lợi ích gắn liền với quyền sở hữu bất động sản cho người mua;"},{"k":"p","t":"- Doanh nghiệp không còn nắm giữ quyền quản lý bất động sản như người sở hữu bất động sản hoặc quyền kiểm soát bất động sản;"},{"k":"p","t":"- Doanh thu được xác định tương đối chắc chắn;"},{"k":"p","t":"- Doanh nghiệp đã thu được hoặc sẽ thu được lợi ích kinh tế từ giao dịch bán bất động sản;"},{"k":"p","t":"- Xác định được chi phí liên quan đến giao dịch bán bất động sản."},{"k":"p","t":"1.5.6. Đối với hàng hóa nhận bán đại lý, ký gửi theo phương thức bán đúng giá hưởng hoa hồng, doanh thu là phần hoa hồng bán hàng mà doanh nghiệp được hưởng."},{"k":"p","t":"1.5.7. Đối với hoạt động dịch vụ ủy thác xuất nhập khẩu, doanh thu là phí ủy thác đơn vị được hưởng."},{"k":"p","t":"1.5.8. Đối với đơn vị nhận gia công vật tư, hàng hóa, doanh thu là số tiền gia công thực tế được hưởng, không bao gồm giá trị vật tư, hàng hóa nhận gia công."},{"k":"p","t":"1.5.9. Trường hợp bán hàng theo phương thức trả chậm, trả góp, doanh thu được xác định theo giá bán trả tiền ngay;"},{"k":"p","t":"1.5.10. Nguyên tắc ghi nhận và xác định doanh thu của hợp đồng xây dựng:"},{"k":"p","t":"a) Doanh thu của hợp đồng xây dựng bao gồm:"},{"k":"p","t":"- Doanh thu ban đầu được ghi trong hợp đồng;"},{"k":"p","t":"- Các khoản tăng, giảm khi thực hiện hợp đồng, các khoản tiền thưởng và các khoản thanh toán khác nếu các khoản này có khả năng làm thay đổi doanh thu, và có thể xác định được một cách đáng tin cậy:"},{"k":"p","t":"+ Doanh thu của hợp đồng có thể tăng hay giảm ở từng thời kỳ, ví dụ: Nhà thầu và khách hàng có thể đồng ý với nhau về các thay đổi và các yêu cầu làm tăng hoặc giảm doanh thu của hợp đồng trong kỳ tiếp theo so với hợp đồng được chấp thuận lần đầu tiên; Doanh thu đã được thỏa thuận trong hợp đồng với giá cố định có thể tăng vì lý do giá cả tăng lên; Doanh thu theo hợp đồng có thể bị giảm do nhà thầu không thực hiện đúng tiến độ hoặc không đảm bảo chất lượng xây dựng theo thỏa thuận trong hợp đồng; Khi hợp đồng với giá cố định quy định mức giá cố định cho một đơn vị sản phẩm hoàn thành thì doanh thu theo hợp đồng sẽ tăng hoặc giảm khi khối lượng sản phẩm tăng hoặc giảm."},{"k":"p","t":"+ Khoản tiền thưởng là các khoản phụ thêm trả cho nhà thầu nếu nhà thầu thực hiện hợp đồng đạt hay vượt mức yêu cầu. Khoản tiền thưởng được tính vào doanh thu của hợp đồng xây dựng khi có đủ 2 điều kiện: (i) Chắc chắn đạt hoặc vượt mức một số tiêu chuẩn cụ thể đã được ghi trong hợp đồng; (ii) Khoản tiền thưởng được xác định một cách đáng tin cậy."},{"k":"p","t":"- Khoản thanh toán khác mà nhà thầu thu được từ khách hàng hay một bên khác để bù đắp cho các chi phí không bao gồm trong giá hợp đồng. Ví dụ: Sự chậm trễ do khách hàng gây nên; Sai sót trong các chỉ tiêu kỹ thuật hoặc thiết kế và các tranh chấp về các thay đổi trong việc thực hiện hợp đồng. Việc xác định doanh thu tăng thêm từ các khoản thanh toán trên còn tùy thuộc vào rất nhiều yếu tố không chắc chắn và thường phụ thuộc vào kết quả của nhiều cuộc đàm phán. Do đó, các khoản thanh toán khác chỉ được tính vào doanh thu của hợp đồng xây dựng khi:"},{"k":"p","t":"+ Các cuộc thỏa thuận đã đạt được kết quả là khách hàng sẽ chấp thuận bồi thường;"},{"k":"p","t":"+ Khoản thanh toán khác được khách hàng chấp thuận và có thể xác định được một cách đáng tin cậy."},{"k":"p","t":"b) Ghi nhận doanh thu của hợp đồng xây dựng như sau:"},{"k":"p","t":"Khi kết quả thực hiện hợp đồng xây dựng được xác định một cách đáng tin cậy và được khách hàng xác nhận, thì doanh thu và chi phí liên quan đến hợp đồng được ghi nhận tương ứng với phần công việc đã hoàn thành được khách hàng xác nhận trong kỳ phản ánh trên hóa đơn đã lập."},{"k":"p","t":"c) Khi kết quả thực hiện hợp đồng xây dựng không thể ước tính được một cách đáng tin cậy, thì:"},{"k":"p","t":"- Doanh thu chỉ được ghi nhận tương đương với chi phí của hợp đồng đã phát sinh mà việc được hoàn trả là tương đối chắc chắn;"},{"k":"p","t":"- Chi phí của hợp đồng chỉ được ghi nhận là chi phí trong kỳ khi các chi phí này đã phát sinh."},{"k":"p","t":"1.5.11. Không ghi nhận doanh thu bán hàng, cung cấp dịch vụ đối với:"},{"k":"p","t":"- Trị giá hàng hóa, vật tư, bán thành phẩm xuất giao cho bên ngoài gia công chế biến; Trị giá hàng gửi bán theo phương thức gửi bán đại lý, ký gửi (chưa được xác định là đã bán);"},{"k":"p","t":"- Số tiền thu được từ việc bán sản phẩm sản xuất thử;"},{"k":"p","t":"- Các khoản doanh thu hoạt động tài chính;"},{"k":"p","t":"- Các khoản thu nhập khác."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 511 - Doanh thu bán hàng và cung cấp dịch vụ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản thuế gián thu phải nộp (GTGT, TTĐB, XK, BVMT);"},{"k":"p","t":"- Các khoản giảm trừ doanh thu;"},{"k":"p","t":"- Kết chuyển doanh thu thuần vào tài khoản 911 \"Xác định kết quả kinh doanh\"."},{"k":"p","t":"Bên Có: Doanh thu bán sản phẩm, hàng hóa, bất động sản đầu tư và cung cấp dịch vụ của doanh nghiệp thực hiện trong kỳ kế toán."},{"k":"p","t":"Tài khoản 511 không có số dư cuối kỳ."},{"k":"p","t":"Tài khoản 511 - Doanh thu bán hàng và cung cấp dịch vụ, có 4 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 5111 - Doanh thu bán hàng hóa: Tài khoản này dùng để phản ánh doanh thu và doanh thu thuần của khối lượng hàng hóa được xác định là đã bán trong một kỳ kế toán của doanh nghiệp. Tài khoản này chủ yếu dùng cho các ngành kinh doanh hàng hóa, vật tư, lương thực,..."},{"k":"p","t":"- Tài khoản 5112 - Doanh thu bán thành phẩm: Tài khoản này dùng để phản ánh doanh thu và doanh thu thuần của khối lượng sản phẩm (thành phẩm, bán thành phẩm) được xác định là đã bán trong một kỳ kế toán của doanh nghiệp. Tài khoản này chủ yếu dùng cho các ngành sản xuất vật chất như: Công nghiệp, nông nghiệp, xây lắp, ngư nghiệp, lâm nghiệp,..."},{"k":"p","t":"- Tài khoản 5113 - Doanh thu cung cấp dịch vụ: Tài khoản này dùng để phản ánh doanh thu và doanh thu thuần của khối lượng dịch vụ đã hoàn thành, đã cung cấp cho khách hàng và được xác định là đã bán trong một kỳ kế toán. Tài khoản này chủ yếu dùng cho các ngành kinh doanh dịch vụ như: Giao thông vận tải, bưu điện, du lịch, dịch vụ công cộng, dịch vụ khoa học, kỹ thuật, dịch vụ kế toán, kiểm toán,..."},{"k":"p","t":"- Tài khoản 5118 - Doanh thu khác: Tài khoản này dùng để phản ánh về doanh thu nhượng bán, thanh lý bất động sản đầu tư, các khoản trợ cấp, trợ giá của Nhà nước…"}]},{"id":"tt133_58","no":58,"code":"Điều 58","title":"Điều 58. Tài khoản 515 - Doanh thu hoạt động tài chính","shortTitle":"Tài khoản 515 - Doanh thu hoạt động tài chính","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh doanh thu tiền lãi, tiền bản quyền, cổ tức, lợi nhuận được chia và doanh thu hoạt động tài chính khác của doanh nghiệp, gồm:"},{"k":"p","t":"- Tiền lãi: Lãi cho vay, lãi tiền gửi Ngân hàng, lãi bán hàng trả chậm, trả góp, lãi đầu tư trái phiếu, tín phiếu, chiết khấu thanh toán được hưởng do mua hàng hóa, dịch vụ;..."},{"k":"p","t":"- Cổ tức, lợi nhuận được chia cho giai đoạn sau ngày đầu tư;"},{"k":"p","t":"- Thu nhập về hoạt động đầu tư mua, bán chứng khoán ngắn hạn, dài hạn; Lãi chuyển nhượng vốn khi thanh lý các khoản đầu tư góp vốn vào đơn vị khác;"},{"k":"p","t":"- Thu nhập về các hoạt động đầu tư khác;"},{"k":"p","t":"- Lãi tỷ giá hối đoái phát sinh trong kỳ và đánh giá lại khoản mục tiền tệ có gốc ngoại tệ cuối kỳ; lãi do bán ngoại tệ;"},{"k":"p","t":"- Các khoản doanh thu hoạt động tài chính khác."},{"k":"p","t":"b) Đối với hoạt động mua, bán chứng khoán kinh doanh, doanh thu được ghi nhận là số chênh lệch giữa giá bán lớn hơn giá vốn, trong đó giá vốn là giá trị ghi sổ được xác định theo phương pháp bình quân gia quyền hoặc nhập trước xuất trước, giá bán được tính theo giá trị hợp lý của khoản nhận được. Trường hợp mua, bán chứng khoán dưới hình thức hoán đổi cổ phiếu (nhà đầu tư hoán đổi cổ phiếu A để lấy cổ phiếu B), kế toán xác định giá trị cổ phiếu nhận về theo giá trị hợp lý tại ngày trao đổi như sau:"},{"k":"p","t":"- Đối với cổ phiếu nhận về là cổ phiếu niêm yết, giá trị hợp lý của cổ phiếu là giá đóng cửa niêm yết trên thị trường chứng khoán tại ngày trao đổi. Trường hợp tại ngày trao đổi thị trường chứng khoán không giao dịch thì giá trị hợp lý của cổ phiếu là giá đóng cửa phiên giao dịch trước liền kề với ngày trao đổi."},{"k":"p","t":"- Đối với cổ phiếu nhận về là cổ phiếu chưa niêm yết được giao dịch trên sàn UPCOM, giá trị hợp lý của cổ phiếu là giá đóng cửa công bố trên sàn UPCOM tại ngày trao đổi. Trường hợp ngày trao đổi sàn UPCOM không giao dịch thì giá trị hợp lý của cổ phiếu là giá đóng cửa phiên giao dịch trước liền kề với ngày trao đổi."},{"k":"p","t":"- Đối với cổ phiếu nhận về là cổ phiếu chưa niêm yết khác, giá trị hợp lý của cổ phiếu là giá thỏa thuận giữa các bên hoặc giá trị sổ sách tại thời điểm trao đổi hoặc giá trị sổ sách tại thời điểm cuối quý trước liền kề với ngày trao đổi. Việc xác định giá trị sổ sách của cổ phiếu được thực hiện theo công thức:"},{"k":"p","t":"Giá trị sổ sách của cổ phiếu"},{"k":"p","t":"="},{"k":"p","t":"Tổng vốn chủ sở hữu"},{"k":"p","t":"Số lượng cổ phiếu hiện có tại thời điểm trao đổi"},{"k":"p","t":"c) Đối với khoản doanh thu từ hoạt động mua, bán ngoại tệ, doanh thu được ghi nhận là số chênh lệch lãi giữa giá ngoại tệ bán ra và giá ngoại tệ mua vào."},{"k":"p","t":"d) Đối với lãi tiền gửi: Doanh thu không bao gồm khoản lãi tiền gửi phát sinh do hoạt động đầu tư tạm thời của khoản vay sử dụng cho mục đích xây dựng tài sản dở dang."},{"k":"p","t":"đ) Đối với tiền lãi phải thu từ các khoản cho vay, bán hàng trả chậm, trả góp: Doanh thu chỉ được ghi nhận khi chắc chắn thu được và khoản gốc cho vay, nợ gốc phải thu không bị phân loại là quá hạn cần phải lập dự phòng."},{"k":"p","t":"e) Đối với khoản tiền lãi đầu tư nhận được từ khoản đầu tư cổ phiếu, trái phiếu thì chỉ có phần tiền lãi của các kỳ sau khi doanh nghiệp mua lại khoản đầu tư này mới được ghi nhận là doanh thu phát sinh trong kỳ, còn khoản lãi đầu tư nhận được từ các khoản lãi đầu tư dồn tích trước khi doanh nghiệp mua lại khoản đầu tư đó thì ghi giảm giá gốc khoản đầu tư trái phiếu, cổ phiếu đó."},{"k":"p","t":"g) Khi nhà đầu tư nhận cổ tức bằng cổ phiếu, nhà đầu tư chỉ theo dõi số lượng cổ phiếu tăng thêm trên thuyết minh BCTC, không ghi nhận giá trị cổ phiếu được nhận, không ghi nhận doanh thu hoạt động tài chính, không ghi nhận tăng giá trị khoản đầu tư vào công ty."},{"k":"p","t":"h) Việc hạch toán khoản doanh thu hoạt động tài chính phát sinh liên quan đến ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 515 - Doanh thu hoạt động tài chính"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Số thuế GTGT phải nộp tính theo phương pháp trực tiếp (nếu có);"},{"k":"p","t":"- Kết chuyển doanh thu hoạt động tài chính thuần sang tài khoản 911 - “Xác định kết quả kinh doanh”."},{"k":"p","t":"Bên Có: Các khoản doanh thu hoạt động tài chính phát sinh trong kỳ."},{"k":"p","t":"Tài khoản 515 không có số dư cuối kỳ."}]},{"id":"tt133_59","no":59,"code":"Điều 59","title":"Điều 59. Nguyên tắc kế toán chi phí","shortTitle":"Nguyên tắc kế toán chi phí","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Chi phí là những khoản làm giảm lợi ích kinh tế, được ghi nhận tại thời điểm giao dịch phát sinh hoặc khi có khả năng tương đối chắc chắn sẽ phát sinh trong tương lai không phân biệt đã chi tiền hay chưa."},{"k":"p","t":"2. Việc ghi nhận chi phí ngay cả khi chưa đến kỳ hạn thanh toán nhưng có khả năng chắc chắn sẽ phát sinh nhằm đảm bảo nguyên tắc thận trọng và bảo toàn vốn. Chi phí và khoản doanh thu do nó tạo ra phải được ghi nhận đồng thời theo nguyên tắc phù hợp. Tuy nhiên trong một số trường hợp, nguyên tắc phù hợp có thể xung đột với nguyên tắc thận trọng trong kế toán, thì kế toán phải căn cứ vào bản chất của giao dịch để phản ánh một cách trung thực, hợp lý."},{"k":"p","t":"3. Kế toán phải theo dõi chi tiết các khoản chi phí phát sinh theo yếu tố, tiền lương, nguyên vật liệu, chi phí mua ngoài, khấu hao TSCĐ..."},{"k":"p","t":"4. Các khoản chi phí không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."},{"k":"p","t":"5. Các tài khoản phản ánh chi phí không có số dư, cuối kỳ kế toán phải kết chuyển tất cả các khoản chi phí phát sinh trong kỳ để xác định kết quả kinh doanh."}]},{"id":"tt133_60","no":60,"code":"Điều 60","title":"Điều 60. Tài khoản 611 - Mua hàng","shortTitle":"Tài khoản 611 - Mua hàng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa mua vào, nhập kho hoặc đưa vào sử dụng trong kỳ. Tài khoản 611 \"Mua hàng\" chỉ áp dụng đối với doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ."},{"k":"p","t":"b) Giá trị nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa mua vào phản ánh trên tài khoản 611 \"Mua hàng\" phải thực hiện theo nguyên tắc giá gốc."},{"k":"p","t":"c) Trường hợp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ, doanh nghiệp phải tổ chức kiểm kê hàng tồn kho để xác định số lượng và giá trị của từng nguyên liệu, vật liệu, hàng hóa, sản phẩm, công cụ, dụng cụ tồn kho tại thời điểm cuối kỳ kế toán để xác định giá trị hàng tồn kho xuất vào sử dụng và xuất bán trong kỳ."},{"k":"p","t":"d) Phương pháp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ: Khi mua nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa, căn cứ vào hóa đơn mua hàng, Hóa đơn vận chuyển, phiếu nhập kho, thông báo thuế nhập khẩu phải nộp (hoặc biên lai thu thuế nhập khẩu,...) để ghi nhận giá gốc hàng mua vào tài khoản 611 \"Mua hàng\". Khi xuất sử dụng, hoặc xuất bán chỉ ghi một lần vào cuối kỳ kế toán căn cứ vào kết quả kiểm kê."},{"k":"p","t":"đ) Kế toán phải mở sổ chi tiết để hạch toán giá gốc hàng tồn kho mua vào theo từng thứ nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 611 - Mua hàng"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Kết chuyển giá gốc hàng hóa, nguyên liệu, vật liệu, công cụ, dụng cụ tồn kho đầu kỳ (theo kết quả kiểm kê);"},{"k":"p","t":"- Giá gốc hàng hóa, nguyên liệu, vật liệu, công cụ, dụng cụ, mua vào trong kỳ."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Kết chuyển giá gốc hàng hóa, nguyên liệu, vật liệu, công cụ, dụng cụ tồn kho cuối kỳ (theo kết quả kiểm kê);"},{"k":"p","t":"- Giá gốc hàng hóa, nguyên liệu, vật liệu, công cụ, dụng cụ xuất sử dụng trong kỳ hoặc giá gốc hàng hóa xuất bán và hàng hóa gửi đi bán (chưa được xác định là đã bán trong kỳ);"},{"k":"p","t":"- Giá gốc nguyên liệu, vật liệu, công cụ, dụng cụ, hàng hóa mua vào trả lại cho người bán hoặc được giảm giá."},{"k":"p","t":"Tài khoản 611 không có số dư cuối kỳ."}]},{"id":"tt133_61","no":61,"code":"Điều 61","title":"Điều 61. Tài khoản 631 - Giá thành sản xuất","shortTitle":"Tài khoản 631 - Giá thành sản xuất","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tổng hợp chi phí sản xuất và tính giá thành sản phẩm, dịch vụ ở các đơn vị sản xuất công nghiệp, nông nghiệp, lâm nghiệp và các đơn vị kinh doanh dịch vụ vận tải, bưu điện, du lịch, khách sạn,... trong trường hợp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ."},{"k":"p","t":"b) Đối với doanh nghiệp hạch toán hàng tồn kho theo phương pháp kê khai thường xuyên không sử dụng tài khoản này."},{"k":"p","t":"c) Chỉ hạch toán vào tài khoản 631 các loại chi phí sản xuất, kinh doanh sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu trực tiếp;"},{"k":"p","t":"- Chi phí nhân công trực tiếp;"},{"k":"p","t":"- Chi phí sử dụng máy thi công (đối với các doanh nghiệp xây lắp);"},{"k":"p","t":"- Chi phí sản xuất chung."},{"k":"p","t":"d) Không hạch toán vào tài khoản 631 các loại chi phí sau:"},{"k":"p","t":"- Chi phí bán hàng;"},{"k":"p","t":"- Chi phí quản lý doanh nghiệp;"},{"k":"p","t":"- Chi phí tài chính;"},{"k":"p","t":"- Chi phí khác;"},{"k":"p","t":"đ) Chi phí của bộ phận sản xuất, kinh doanh phục vụ cho sản xuất, kinh doanh, trị giá vốn hàng hóa, nguyên liệu, vật liệu và chi phí thuê ngoài gia công chế biến (thuê ngoài, hay tự gia công, chế biến) cũng được phản ánh trên tài khoản 631."},{"k":"p","t":"e) Tài khoản 631 “Giá thành sản xuất” phải được hạch toán chi tiết theo nơi phát sinh chi phí (phân xưởng, tổ, đội sản xuất,...) theo loại, nhóm sản phẩm, dịch vụ…"},{"k":"p","t":"g) Đối với ngành nông nghiệp, giá thành thực tế của sản phẩm được xác định vào cuối vụ hoặc cuối năm. Sản phẩm thu hoạch năm nào thì tính giá thành trong năm đó, nghĩa là chi phí chi ra trong năm nay nhưng năm sau mới thu hoạch sản phẩm thì năm sau mới tính giá thành."},{"k":"p","t":"- Đối với ngành trồng trọt, chi phí phải được hạch toán chi tiết theo 3 loại cây:"},{"k":"p","t":"+ Cây ngắn ngày;"},{"k":"p","t":"+ Cây trồng một lần thu hoạch nhiều lần;"},{"k":"p","t":"+ Cây lâu năm."},{"k":"p","t":"Đối với các loại cây trồng 2, 3 vụ trong một năm, hoặc trồng năm nay, năm sau mới thu hoạch, hoặc loại cây vừa có diện tích trồng mới, vừa có diện tích chăm sóc thu hoạch trong cùng một năm,... thì phải căn cứ vào tình hình thực tế để ghi chép, phản ánh rõ ràng chi phí của vụ này với vụ khác, của diện tích này với diện tích khác, của năm trước với năm nay và năm sau,...Không phản ánh vào tài khoản 631 “Giá thành sản xuất” chi phí trồng mới và chăm sóc cây lâu năm đang trong thời kỳ XDCB."},{"k":"p","t":"Đối với một số loại chi phí có liên quan đến nhiều đối tượng hạch toán hoặc liên quan đến nhiều vụ, nhiều thời kỳ thì phải được theo dõi chi tiết riêng, sau đó phân bổ vào giá thành từng loại sản phẩm có liên quan như: Chi phí tưới tiêu nước, chi phí chuẩn bị đất và trồng mới năm đầu của những cây trồng một lần, thu hoạch nhiều lần (chi phí này không thuộc vốn đầu tư XDCB)."},{"k":"p","t":"Trên cùng một diện tích canh tác, nếu trồng xen kẽ từ hai loại cây công nghiệp ngắn ngày trở lên thì những chi phí phát sinh có liên quan trực tiếp đến cây nào sẽ tập hợp riêng cho cây đó (như hạt giống, chi phí gieo trồng, thu hoạch) chi phí phát sinh chung cho các loại cây (như chi phí cày, bừa, tưới tiêu nước…) được tập hợp riêng và phân bổ cho từng loại cây theo diện tích gieo trồng."},{"k":"p","t":"Đối với cây lâu năm, các công việc từ khi làm đất, gieo trồng, chăm sóc đến khi bắt đầu có sản phẩm được xem như quá trình đầu tư XDCB để hình thành nên TSCĐ được tập hợp chi phí vào TK 241 “XDCB dở dang”."},{"k":"p","t":"- Hạch toán chi phí chăn nuôi phải theo dõi chi tiết cho từng ngành chăn nuôi (ngành chăn nuôi trâu bò, ngành chăn nuôi lợn…), theo từng nhóm hoặc theo từng loại gia súc, gia cầm. Đối với súc vật sinh sản khi đào thải chuyển thành súc vật nuôi lớn, nuôi béo được hạch toán vào TK 631 “Giá thành sản xuất” theo giá trị còn lại."},{"k":"p","t":"h) Tài khoản 631 “Giá thành sản xuất” áp dụng đối với ngành giao thông vận tải phải được hạch toán chi tiết theo từng loại hoạt động (vận tải hành khách, vận tải hàng hóa…). Trong quá trình vận tải, săm lốp bị hao mòn với mức độ nhanh hơn mức khấu hao đầu xe nên thường phải thay thế nhiều lần nhưng giá trị săm lốp thay thế không tính vào giá thành vận tải ngay một lúc khi xuất dùng thay thế, mà phải trích trước hoặc phân bổ dần vào chi phí sản xuất, kinh doanh hàng kỳ."},{"k":"p","t":"i) Trong hoạt động kinh doanh khách sạn, hạch toán tài khoản 631 phải được theo dõi chi tiết theo từng loại hoạt động như: Hoạt động ăn uống, dịch vụ buồng nghỉ, phục vụ vui chơi giải trí, phục vụ khác (giặt, là, cắt tóc, điện tín, massage…)."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 631 - Giá thành sản xuất"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Chi phí sản xuất, kinh doanh sản phẩm, dịch vụ dở dang đầu kỳ;"},{"k":"p","t":"- Chi phí sản xuất, kinh doanh sản phẩm, dịch vụ thực tế phát sinh trong kỳ."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Giá thành sản phẩm nhập kho, dịch vụ hoàn thành kết chuyển vào tài khoản 632 “Giá vốn hàng bán”."},{"k":"p","t":"- Chi phí sản xuất, kinh doanh sản phẩm, dịch vụ dở dang cuối kỳ kết chuyển vào tài khoản 154 “Chi phí sản xuất, kinh doanh dở dang”."},{"k":"p","t":"Tài khoản 631 không có số dư cuối kỳ."}]},{"id":"tt133_62","no":62,"code":"Điều 62","title":"Điều 62. Tài khoản 632 - Giá vốn hàng bán","shortTitle":"Tài khoản 632 - Giá vốn hàng bán","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá vốn của sản phẩm, hàng hóa, dịch vụ, bất động sản đầu tư; giá thành sản xuất của sản phẩm xây lắp (đối với doanh nghiệp xây lắp) bán trong kỳ. Ngoài ra, tài khoản này còn dùng để phản ánh các chi phí liên quan đến hoạt động kinh doanh bất động sản đầu tư như: Chi phí khấu hao; chi phí sửa chữa; chi phí cho thuê BĐSĐT theo phương thức cho thuê hoạt động; chi phí nhượng bán, thanh lý BĐSĐT…"},{"k":"p","t":"b) Khoản dự phòng giảm giá hàng tồn kho được tính vào giá vốn hàng bán trên cơ sở số lượng hàng tồn kho và phần chênh lệch giữa giá trị thuần có thể thực hiện được nhỏ hơn giá gốc hàng tồn kho. Khi xác định khối lượng hàng tồn kho bị giảm giá cần phải trích lập dự phòng, kế toán phải loại trừ khối lượng hàng tồn kho đã ký được hợp đồng tiêu thụ (có giá trị thuần có thể thực hiện được không thấp hơn giá trị ghi sổ) nhưng chưa chuyển giao cho khách hàng nếu có bằng chứng chắc chắn về việc khách hàng sẽ không từ bỏ thực hiện hợp đồng và loại trừ hàng tồn kho dùng cho hoạt động xây dựng cơ bản, giá trị hàng tồn kho dùng cho sản xuất sản phẩm mà sản phẩm được tạo ra từ những hàng tồn kho này có giá bán bằng hoặc cao hơn giá thành sản xuất của sản phẩm."},{"k":"p","t":"c) Đối với phần giá trị hàng tồn kho hao hụt, mất mát, kế toán phải tính ngay vào giá vốn hàng bán (sau khi trừ đi các khoản bồi thường, nếu có)."},{"k":"p","t":"d) Các khoản thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường đã tính vào giá trị hàng mua, nếu khi xuất bán hàng hóa mà các khoản thuế đó được hoàn lại thì được ghi giảm giá vốn hàng bán."},{"k":"p","t":"e) Các khoản chi phí không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 632 - Giá vốn hàng bán"},{"k":"p","t":"2.1. Trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kê khai thường xuyên."},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Đối với hoạt động sản xuất, kinh doanh, phản ánh:"},{"k":"p","t":"+ Trị giá vốn của sản phẩm, hàng hóa, dịch vụ đã bán trong kỳ."},{"k":"p","t":"+ Chi phí nguyên liệu, vật liệu, chi phí nhân công vượt trên mức bình thường và chi phí sản xuất chung cố định không phân bổ được tính vào giá vốn hàng bán trong kỳ;"},{"k":"p","t":"+ Các khoản hao hụt, mất mát của hàng tồn kho sau khi trừ phần bồi thường do trách nhiệm cá nhân gây ra;"},{"k":"p","t":"+ Số trích lập dự phòng giảm giá hàng tồn kho (chênh lệch giữa số dự phòng giảm giá hàng tồn kho phải lập năm nay lớn hơn số dự phòng đã lập năm trước chưa sử dụng hết)."},{"k":"p","t":"- Đối với hoạt động kinh doanh BĐSĐT, phản ánh:"},{"k":"p","t":"+ Số khấu hao BĐSĐT dùng để cho thuê hoạt động trích trong kỳ;"},{"k":"p","t":"+ Chi phí sửa chữa, nâng cấp, cải tạo BĐSĐT không đủ điều kiện tính vào nguyên giá BĐSĐT;"},{"k":"p","t":"+ Chi phí phát sinh từ nghiệp vụ cho thuê hoạt động BĐSĐT trong kỳ;"},{"k":"p","t":"+ Giá trị còn lại của BĐSĐT bán, thanh lý trong kỳ;"},{"k":"p","t":"+ Chi phí của nghiệp vụ bán, thanh lý BĐSĐT phát sinh trong kỳ;"},{"k":"p","t":"+ Số tổn thất do giảm giá trị BĐSĐT nắm giữ chờ tăng giá;"},{"k":"p","t":"+ Chi phí trích trước đối với hàng hóa bất động sản được xác định là đã bán."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Kết chuyển giá vốn của sản phẩm, hàng hóa, dịch vụ đã bán trong kỳ sang tài khoản 911 “Xác định kết quả kinh doanh”;"},{"k":"p","t":"- Kết chuyển toàn bộ chi phí kinh doanh BĐSĐT phát sinh trong kỳ để xác định kết quả hoạt động kinh doanh;"},{"k":"p","t":"- Khoản hoàn nhập dự phòng giảm giá hàng tồn kho cuối năm tài chính (chênh lệch giữa số dự phòng phải lập năm nay nhỏ hơn số đã lập năm trước);"},{"k":"p","t":"- Trị giá hàng bán bị trả lại;"},{"k":"p","t":"- Khoản hoàn nhập chi phí trích trước đối với hàng hóa bất động sản được xác định là đã bán (chênh lệch giữa số chi phí trích trước còn lại cao hơn chi phí thực tế phát sinh);"},{"k":"p","t":"- Khoản chiết khấu thương mại, giảm giá hàng bán nhận được sau khi hàng mua đã tiêu thụ;"},{"k":"p","t":"- Số điều chỉnh tăng nguyên giá BĐSĐT nắm giữ chờ tăng giá khi có bằng chứng chắc chắn cho thấy BĐSĐT có dấu hiệu tăng giá trở lại;"},{"k":"p","t":"- Các khoản thuế nhập khẩu, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường đã tính vào giá trị hàng mua, nếu khi xuất bán hàng hóa mà các khoản thuế đó được hoàn lại."},{"k":"p","t":"Tài khoản 632 không có số dư cuối kỳ."},{"k":"p","t":"2.2. Trường hợp doanh nghiệp kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ."},{"k":"p","t":"2.2.1. Đối với doanh nghiệp kinh doanh thương mại"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá vốn của hàng hóa đã xuất bán trong kỳ."},{"k":"p","t":"- Số trích lập dự phòng giảm giá hàng tồn kho (chênh lệch giữa số dự phòng phải lập năm nay lớn hơn số đã lập năm trước chưa sử dụng hết)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Kết chuyển giá vốn của hàng hóa đã gửi bán nhưng chưa được xác định là tiêu thụ;"},{"k":"p","t":"- Hoàn nhập dự phòng giảm giá hàng tồn kho cuối năm tài chính (chênh lệch giữa số dự phòng phải lập năm nay nhỏ hơn số đã lập năm trước);"},{"k":"p","t":"- Kết chuyển giá vốn của hàng hóa đã xuất bán vào bên Nợ tài khoản 911 “Xác định kết quả kinh doanh”."},{"k":"p","t":"2.2.2. Đối với doanh nghiệp sản xuất và kinh doanh dịch vụ"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Trị giá vốn của thành phẩm, dịch vụ tồn kho đầu kỳ;"},{"k":"p","t":"- Số trích lập dự phòng giảm giá hàng tồn kho (chênh lệch giữa số dự phòng phải lập năm nay lớn hơn số dự phòng đã lập năm trước chưa sử dụng hết);"},{"k":"p","t":"- Trị giá vốn của thành phẩm sản xuất xong nhập kho và dịch vụ đã hoàn thành."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Kết chuyển giá vốn của thành phẩm, dịch vụ tồn kho cuối kỳ vào bên Nợ TK 155 “Thành phẩm”; TK 154 “Chi phí sản xuất kinh doanh, dở dang”;"},{"k":"p","t":"- Hoàn nhập dự phòng giảm giá hàng tồn kho cuối năm tài chính (chênh lệch giữa số dự phòng phải lập năm nay nhỏ hơn số đã lập năm trước chưa sử dụng hết);"},{"k":"p","t":"- Kết chuyển giá vốn của thành phẩm đã xuất bán, dịch vụ hoàn thành được xác định là đã bán trong kỳ vào bên Nợ TK 911 “Xác định kết quả kinh doanh”."},{"k":"p","t":"Tài khoản 632 không có số dư cuối kỳ."}]},{"id":"tt133_63","no":63,"code":"Điều 63","title":"Điều 63. Tài khoản 635 - Chi phí tài chính","shortTitle":"Tài khoản 635 - Chi phí tài chính","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này phản ánh những khoản chi phí hoạt động tài chính bao gồm:"},{"k":"p","t":"- Chi phí lãi tiền vay, lãi mua hàng trả chậm, lãi thuê tài sản thuê tài chính;"},{"k":"p","t":"- Chiết khấu thanh toán cho người mua;"},{"k":"p","t":"- Các khoản lỗ do thanh lý, nhượng bán các khoản đầu tư; chi phí giao dịch bán chứng khoán;"},{"k":"p","t":"- Lỗ tỷ giá hối đoái phát sinh trong kỳ; Lỗ tỷ giá hối đoái do đánh giá lại cuối kỳ các khoản mục tiền tệ có gốc ngoại tệ; Lỗ bán ngoại tệ;"},{"k":"p","t":"- Số trích lập dự phòng giảm giá chứng khoán kinh doanh, dự phòng tổn thất đầu tư vào đơn vị khác;"},{"k":"p","t":"- Các khoản chi phí của hoạt động đầu tư tài chính khác;"},{"k":"p","t":"- Các khoản chi phí tài chính khác."},{"k":"p","t":"b) Tài khoản 635 phải được hạch toán chi tiết cho từng nội dung chi phí. Không hạch toán vào tài khoản 635 những nội dung chi phí sau đây:"},{"k":"p","t":"- Chi phí phục vụ cho việc sản xuất sản phẩm, cung cấp dịch vụ;"},{"k":"p","t":"- Chi phí bán hàng;"},{"k":"p","t":"- Chi phí quản lý doanh nghiệp;"},{"k":"p","t":"- Chi phí kinh doanh bất động sản;"},{"k":"p","t":"- Chi phí đầu tư xây dựng cơ bản;"},{"k":"p","t":"- Các khoản chi phí được trang trải bằng nguồn kinh phí khác;"},{"k":"p","t":"- Chi phí khác."},{"k":"p","t":"c) Việc hạch toán khoản chi phí tài chính phát sinh liên quan đến ngoại tệ được thực hiện theo quy định tại Điều 52 Thông tư này."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 635 - Chi phí tài chính"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản chi phí tài chính phát sinh trong kỳ;"},{"k":"p","t":"- Trích lập bổ sung dự phòng giảm giá chứng khoán kinh doanh, dự phòng tổn thất đầu tư vào đơn vị khác (chênh lệch giữa số dự phòng phải lập kỳ này lớn hơn số dự phòng đã lập kỳ trước)."},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Hoàn nhập dự phòng giảm giá chứng khoán kinh doanh, dự phòng tổn thất đầu tư vào đơn vị khác (chênh lệch giữa số dự phòng phải lập kỳ này nhỏ hơn số dự phòng đã trích lập kỳ trước chưa sử dụng hết);"},{"k":"p","t":"- Các khoản được ghi giảm chi phí tài chính;"},{"k":"p","t":"- Cuối kỳ kế toán, kết chuyển toàn bộ chi phí tài chính phát sinh trong kỳ để xác định kết quả hoạt động kinh doanh."},{"k":"p","t":"Tài khoản 635 không có số dư cuối kỳ."}]},{"id":"tt133_64","no":64,"code":"Điều 64","title":"Điều 64. Tài khoản 642 - Chi phí quản lý kinh doanh","shortTitle":"Tài khoản 642 - Chi phí quản lý kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh các khoản chi phí quản lý kinh doanh bao gồm chi phí bán hàng và chi phí quản lý doanh nghiệp:"},{"k":"p","t":"Chi phí bán hàng bao gồm các chi phí thực tế phát sinh trong quá trình bán sản phẩm, hàng hóa, cung cấp dịch vụ, bao gồm các chi phí chào hàng, giới thiệu sản phẩm, quảng cáo sản phẩm, hoa hồng bán hàng, chi phí bảo hành sản phẩm, hàng hóa (trừ hoạt động xây lắp), chi phí bảo quản, đóng gói, vận chuyển, lương nhân viên bộ phận bán hàng (tiền lương, tiền công, các khoản phụ cấp,...), bảo hiểm xã hội, bảo hiểm y tế, kinh phí công đoàn, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động của nhân viên bán hàng; chi phí vật liệu, công cụ lao động, khấu hao TSCĐ dùng cho bộ phận bán hàng; dịch vụ mua ngoài (điện, nước, điện thoại, fax,...); chi phí bằng tiền khác."},{"k":"p","t":"Chi phí quản lý doanh nghiệp bao gồm các chi phí quản lý chung của doanh nghiệp bao gồm các chi phí về lương nhân viên bộ phận quản lý doanh nghiệp (tiền lương, tiền công, các khoản phụ cấp,...); bảo hiểm xã hội, bảo hiểm y tế, kinh phí công đoàn, bảo hiểm thất nghiệp của nhân viên quản lý doanh nghiệp; chi phí vật liệu văn phòng, công cụ lao động, khấu hao TSCĐ dùng cho quản lý doanh nghiệp; tiền thuê đất, thuế môn bài; khoản lập dự phòng phải thu khó đòi; dịch vụ mua ngoài (điện, nước, điện thoại, fax, bảo hiểm tài sản, cháy nổ...); chi phí bằng tiền khác (tiếp khách, hội nghị khách hàng...)."},{"k":"p","t":"1.2. Các khoản chi phí bán hàng, chi phí quản lý doanh nghiệp không được coi là chi phí được trừ theo quy định của Luật thuế TNDN nhưng có đầy đủ hóa đơn chứng từ và đã hạch toán đúng theo Chế độ kế toán thì không được ghi giảm chi phí kế toán mà chỉ điều chỉnh trong quyết toán thuế TNDN để làm tăng số thuế TNDN phải nộp."},{"k":"p","t":"1.3. Tài khoản 642 được mở chi tiết theo từng nội dung chi phí theo quy định. Tùy theo yêu cầu quản lý của từng ngành, từng doanh nghiệp, tài khoản 642 có thể được mở chi tiết theo từng loại chi phí như: chi phí bán hàng, chi phí quản lý doanh nghiệp. Trong từng loại chi phí được theo dõi chi tiết theo từng nội dung chi phí như:"},{"k":"p","t":"a) Đối với chi phí bán hàng:"},{"k":"p","t":"- Chi phí nhân viên: Phản ánh các khoản phải trả cho nhân viên bán hàng, nhân viên đóng gói, vận chuyển, bảo quản sản phẩm, hàng hóa,... bao gồm tiền lương, tiền ăn giữa ca, tiền công và các khoản trích bảo hiểm xã hội, bảo hiểm y tế, kinh phí công đoàn, bảo hiểm thất nghiệp,..."},{"k":"p","t":"- Chi phí vật liệu, bao bì: Phản ánh các chi phí vật liệu, bao bì xuất dùng cho việc bảo quản, tiêu thụ sản phẩm, hàng hóa, dịch vụ, như chi phí vật liệu đóng gói sản phẩm, hàng hóa, chi phí vật liệu, nhiên liệu dùng cho bảo quản, bốc vác, vận chuyển sản phẩm, hàng hóa trong quá trình tiêu thụ, vật liệu dùng cho sửa chữa, bảo quản TSCĐ,... dùng cho bộ phận bán hàng."},{"k":"p","t":"- Chi phí dụng cụ, đồ dùng: Phản ánh chi phí về công cụ, dụng cụ phục vụ cho quá trình tiêu thụ sản phẩm, hàng hóa như dụng cụ đo lường, phương tiện tính toán, phương tiện làm việc,..."},{"k":"p","t":"- Chi phí khấu hao TSCĐ: Phản ánh chi phí khấu hao TSCĐ ở bộ phận bảo quản, bán hàng, như nhà kho, cửa hàng, bến bãi, phương tiện bốc dỡ, vận chuyển, phương tiện tính toán, đo lường, kiểm nghiệm chất lượng,..."},{"k":"p","t":"- Chi phí bảo hành: Dùng để phản ánh khoản chi phí bảo hành sản phẩm, hàng hóa. Riêng chi phí sửa chữa và bảo hành công trình xây lắp phản ánh ở TK 154 “Chi phí sản xuất kinh doanh dở dang” mà không phản ánh ở TK này."},{"k":"p","t":"- Chi phí dịch vụ mua ngoài: Phản ánh các chi phí dịch vụ mua ngoài phục vụ cho bán hàng như chi phí thuê ngoài sửa chữa TSCĐ phục vụ trực tiếp cho khâu bán hàng, tiền thuê kho, thuê bãi, tiền thuê bốc vác, vận chuyển sản phẩm, hàng hóa đi bán, tiền trả hoa hồng cho đại lý bán hàng, cho đơn vị nhận ủy thác xuất khẩu,..."},{"k":"p","t":"- Chi phí bằng tiền khác: Phản ánh các chi phí bằng tiền khác phát sinh trong khâu bán hàng ngoài các chi phí nêu trên như chi phí tiếp khách ở bộ phận bán hàng, chi phí giới thiệu sản phẩm, hàng hóa, khuyến mại, quảng cáo, chào hàng, chi phí hội nghị khách hàng.."},{"k":"p","t":"b) Đối với chi phí quản lý doanh nghiệp:"},{"k":"p","t":"- Chi phí nhân viên quản lý: Phản ánh các khoản phải trả cho cán bộ nhân viên quản lý doanh nghiệp, như tiền lương, các khoản phụ cấp, bảo hiểm xã hội, bảo hiểm y tế, kinh phí công đoàn, bảo hiểm thất nghiệp của Ban Giám đốc, nhân viên quản lý ở các phòng, ban của doanh nghiệp."},{"k":"p","t":"- Chi phí vật liệu quản lý: Phản ánh chi phí vật liệu xuất dùng cho công tác quản lý doanh nghiệp như văn phòng phẩm... vật liệu sử dụng cho việc sửa chữa TSCĐ, công cụ, dụng cụ,... (giá có thuế hoặc chưa có thuế GTGT)."},{"k":"p","t":"- Chi phí đồ dùng văn phòng: Phản ánh chi phí dụng cụ, đồ dùng văn phòng dùng cho công tác quản lý (giá có thuế hoặc chưa có thuế GTGT)."},{"k":"p","t":"- Chi phí khấu hao TSCĐ: Phản ánh chi phí khấu hao TSCĐ dùng chung cho doanh nghiệp như: Nhà cửa làm việc của các phòng ban, kho tàng, vật kiến trúc, phương tiện vận tải truyền dẫn, máy móc thiết bị quản lý dùng trên văn phòng,..."},{"k":"p","t":"- Thuế, phí và lệ phí: Phản ánh chi phí về thuế, phí và lệ phí như: thuế môn bài, tiền thuê đất,... và các khoản phí, lệ phí khác."},{"k":"p","t":"- Chi phí dự phòng: Phản ánh các khoản dự phòng phải thu khó đòi, dự phòng phải trả tính vào chi phí sản xuất, kinh doanh của doanh nghiệp."},{"k":"p","t":"- Chi phí dịch vụ mua ngoài: Phản ánh các chi phí dịch vụ mua ngoài phục vụ cho công tác quản lý doanh nghiệp; các khoản chi mua và sử dụng các tài liệu kỹ thuật, bằng sáng chế,... (không đủ tiêu chuẩn ghi nhận TSCĐ) được tính theo phương pháp phân bổ dần vào chi phí quản lý doanh nghiệp; tiền thuê TSCĐ, chi phí trả cho nhà thầu phụ."},{"k":"p","t":"- Chi phí bằng tiền khác: Phản ánh các chi phí khác thuộc quản lý chung của doanh nghiệp, ngoài các chi phí nêu trên, như: Chi phí hội nghị, tiếp khách, công tác phí, tàu xe, khoản chi cho lao động nữ,..."},{"k":"p","t":"1.4. Đối với sản phẩm, hàng hóa dùng để khuyến mại, quảng cáo:"},{"k":"p","t":"- Trường hợp xuất sản phẩm, hàng hóa để khuyến mại, quảng cáo không thu tiền, không kèm theo các điều kiện khác như phải mua sản phẩm, hàng hóa thì ghi nhận giá trị hàng khuyến mại, quảng cáo vào chi phí bán hàng."},{"k":"p","t":"- Trường hợp xuất sản phẩm, hàng hóa để khuyến mại, quảng cáo nhưng khách hàng chỉ được nhận hàng khuyến mại, quảng cáo kèm theo các điều kiện khác như phải mua sản phẩm, hàng hóa (ví dụ như mua 2 sản phẩm được tặng 1 sản phẩm....) thì kế toán phản ánh giá trị hàng khuyến mại, quảng cáo vào giá vốn hàng bán (trường hợp này bản chất giao dịch là giảm giá hàng bán)."},{"k":"p","t":"- Trường hợp doanh nghiệp có hoạt động thương mại được nhận hàng hóa (không phải trả tiền) từ nhà sản xuất, nhà phân phối để quảng cáo, khuyến mại cho khách hàng mua hàng của nhà sản xuất, nhà phân phối:"},{"k":"p","t":"+ Khi nhận hàng của nhà sản xuất (không phải trả tiền) dùng để khuyến mại, quảng cáo cho khách hàng, nhà phân phối phải theo dõi chi tiết số lượng hàng trong hệ thống quản trị nội bộ của mình và thuyết minh trên Bản thuyết minh Báo cáo tài chính đối với hàng nhận được và số hàng đã dùng để khuyến mại cho người mua (như hàng hóa nhận giữ hộ)."},{"k":"p","t":"+ Khi hết chương trình khuyến mại, nếu không phải trả lại nhà sản xuất số hàng khuyến mại chưa sử dụng hết, kế toán ghi nhận thu nhập khác là giá trị số hàng khuyến mại không phải trả lại."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 642 - Chi phí quản lý kinh doanh"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các chi phí quản lý kinh doanh phát sinh trong kỳ;"},{"k":"p","t":"- Số dự phòng phải thu khó đòi, dự phòng phải trả (Chênh lệch giữa số dự phòng phải lập kỳ này lớn hơn số dự phòng đã lập kỳ trước chưa sử dụng hết);"},{"k":"p","t":"Bên Có:"},{"k":"p","t":"- Các khoản được ghi giảm chi phí quản lý kinh doanh;"},{"k":"p","t":"- Hoàn nhập dự phòng phải thu khó đòi, dự phòng phải trả (chênh lệch giữa số dự phòng phải lập kỳ này nhỏ hơn số dự phòng đã lập kỳ trước chưa sử dụng hết);"},{"k":"p","t":"- Kết chuyển chi phí quản lý kinh doanh vào tài khoản 911 \"Xác định kết quả kinh doanh\"."},{"k":"p","t":"Tài khoản 642 không có số dư cuối kỳ."},{"k":"p","t":"Tài khoản 642 - Chi phí quản lý kinh doanh có 2 tài khoản cấp 2:"},{"k":"p","t":"- Tài khoản 6421 - Chi phí bán hàng: Phản ánh chi phí bán hàng thực tế phát sinh trong quá trình bán sản phẩm, hàng hóa và cung cấp dịch vụ trong kỳ của doanh nghiệp và tình hình kết chuyển chi phí bán hàng sang TK 911- Xác định kết quả kinh doanh."},{"k":"p","t":"- Tài khoản 6422 - Chi phí quản lý doanh nghiệp: Phản ánh chi phí quản lý chung của doanh nghiệp phát sinh trong kỳ và tình hình kết chuyển chi phí quản lý do
