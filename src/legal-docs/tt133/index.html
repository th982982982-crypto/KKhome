 vị cung cấp dịch vụ kế toán."},{"k":"p","t":"Đơn vị: ………………………….."},{"k":"p","t":"Địa chỉ: …………………………..."},{"k":"p","t":"Mẫu số S27-DNN\n(Ban hành theo Thông tư số 133/2016/TT-BTC ngày 26/8/2016 của Bộ Tài chính)"},{"k":"p","t":"SỔ CHI TIẾT THUẾ GIÁ TRỊ GIA TĂNG ĐƯỢC MIỄN GIẢM"},{"k":"p","t":"Năm:………"},{"k":"p","t":"Chứng từ"},{"k":"p","t":"Diễn giải"},{"k":"p","t":"Số thuế GTGT được miễn giảm"},{"k":"p","t":"Số thuế GTGT đã miễn giảm"},{"k":"p","t":"Số hiệu"},{"k":"p","t":"Ngày, tháng"},{"k":"p","t":"A"},{"k":"p","t":"B"},{"k":"p","t":"C"},{"k":"p","t":"1"},{"k":"p","t":"2"},{"k":"p","t":"- Số dư đầu kỳ"},{"k":"p","t":"- Điều chỉnh số dư đầu kỳ"},{"k":"p","t":"- Số phát sinh trong kỳ"},{"k":"p","t":"- Cộng số phát sinh"},{"k":"p","t":"- Số dư cuối kỳ"},{"k":"p","t":"- Sổ này có ... trang, đánh số từ trang 01 đến trang ..."},{"k":"p","t":"- Ngày mở sổ: ..."},{"k":"p","t":"Người lập biểu\n(Ký, họ tên)"},{"k":"p","t":"Kế toán trưởng\n(Ký, họ tên)"},{"k":"p","t":"Ngày ... tháng ... năm ...\nNgười đại diện theo pháp luật\n(Ký, họ tên, đóng dấu)"},{"k":"p","t":"Ghi chú: Đối với trường hợp thuê dịch vụ làm kế toán, làm kế toán trưởng thì phải ghi rõ số Giấy chứng nhận đăng ký hành nghề dịch vụ kế toán, tên đơn vị cung cấp dịch vụ kế toán."},{"k":"p","t":"C - NỘI DUNG VÀ PHƯƠNG PHÁP GHI CHÉP SỔ KẾ TOÁN"},{"k":"p","t":"I. Giải thích nội dung và phương pháp ghi sổ tổng hợp"},{"k":"p","t":"1. Nội dung, kết cấu và phương pháp ghi sổ theo hình thức Nhật ký - Sổ Cái:"},{"k":"p","t":"Sổ kế toán tổng hợp của hình thức kế toán Nhật ký - Sổ Cái chỉ có một quyển sổ duy nhất là sổ Nhật ký - Sổ Cái (Mẫu số S01-DNN)"},{"k":"p","t":"a) Nội dung:"},{"k":"p","t":"- Nhật ký - Sổ Cái là sổ kế toán tổng hợp duy nhất dùng để phản ánh tất cả các nghiệp vụ kinh tế phát sinh theo trình tự thời gian và hệ thống hóa theo nội dung kinh tế (Theo tài khoản kế toán)."},{"k":"p","t":"- Số liệu ghi trên Nhật ký - Sổ Cái dùng để lập Báo cáo tài chính."},{"k":"p","t":"b) Kết cấu và phương pháp ghi sổ:"},{"k":"p","t":"+ Kết cấu:"},{"k":"p","t":"Nhật ký - Sổ Cái là sổ kế toán tổng hợp gồm 2 phần: Phần Nhật ký và phần Sổ Cái."},{"k":"p","t":"Phần Nhật ký: gồm các cột: Cột “Ngày, tháng ghi sổ”, cột “Số hiệu”, cột “Ngày, tháng” của chứng từ, cột “Diễn giải” nội dung nghiệp vụ và cột “Số tiền phát sinh”. Phần Nhật ký dùng để phản ánh các nghiệp vụ kinh tế phát sinh theo trình tự thời gian."},{"k":"p","t":"Phần Sổ Cái: Có nhiều cột, mỗi tài khoản ghi 2 cột: cột Nợ, cột Có. Số lượng cột nhiều hay ít phụ thuộc vào số lượng các tài khoản sử dụng ở đơn vị kế toán. Phần Sổ Cái dùng để phản ánh các nghiệp vụ kinh tế phát sinh theo nội dung kinh tế (Theo tài khoản kế toán)."},{"k":"p","t":"+ Phương pháp ghi sổ:"},{"k":"p","t":"- Ghi chép hàng ngày:"},{"k":"p","t":"Hàng ngày, mỗi khi nhận được chứng từ kế toán, người giữ Nhật ký - Sổ Cái phải kiểm tra tính chất pháp lý của chứng từ. Căn cứ vào nội dung nghiệp vụ ghi trên chứng từ để xác định tài khoản ghi Nợ, tài khoản ghi Có. Đối với các chứng từ kế toán cùng loại, kế toán lập “Bảng tổng hợp chứng từ kế toán cùng loại”. Sau đó ghi các nội dung cần thiết của chứng từ kế toán hoặc “Bảng tổng hợp chứng từ kế toán cùng loại” vào Nhật ký - Sổ Cái."},{"k":"p","t":"Mỗi chứng từ kế toán hoặc “Bảng tổng hợp chứng từ kế toán cùng loại” được ghi vào Nhật ký - Sổ Cái trên một dòng, đồng thời cả ở 2 phần: Phần Nhật ký và phần Sổ Cái. Trước hết ghi vào phần Nhật ký ở các cột: Cột “Ngày, tháng ghi sổ”, cột “Số hiệu” và cột “Ngày, tháng” của chứng từ, cột “Diễn giải” nội dung nghiệp vụ kinh tế phát sinh và căn cứ vào số tiền ghi trên chứng từ để ghi vào cột “số tiền phát sinh”. Sau đó ghi số tiền của nghiệp vụ kinh tế phát sinh vào cột ghi Nợ, cột ghi Có của các tài khoản liên quan trong phần Sổ Cái, cụ thể:"},{"k":"p","t":"- Cột F, G: Ghi số hiệu tài khoản đối ứng của nghiệp vụ kinh tế;"},{"k":"p","t":"- Cột H: Ghi số thứ tự dòng của nghiệp vụ trong Nhật ký - Sổ Cái;"},{"k":"p","t":"- Từ cột 2 trở đi: Ghi số tiền phát sinh của mỗi tài khoản theo quan hệ đối ứng đã được định khoản ở các cột F, G."},{"k":"p","t":"Cuối tháng phải cộng số tiền phát sinh ở phần nhật ký và số phát sinh nợ, số phát sinh có, tính ra số dư và cộng lũy kế số phát sinh từ đầu quý của từng tài khoản để làm căn cứ lập Báo cáo tài chính."},{"k":"p","t":"2. Nội dung, kết cấu và phương pháp ghi sổ theo hình thức Chứng từ ghi sổ"},{"k":"p","t":"(1) Sổ Đăng ký chứng từ ghi sổ (Mẫu số S02b-DNN)"},{"k":"p","t":"a) Nội dung:"},{"k":"p","t":"Sổ Đăng ký chứng từ ghi sổ là sổ kế toán tổng hợp dùng để ghi chép các nghiệp vụ kinh tế phát sinh theo trình tự thời gian (Nhật ký). Sổ này vừa dùng để đăng ký các nghiệp vụ kinh tế phát sinh, quản lý chứng từ ghi sổ, vừa để kiểm tra, đối chiếu số liệu với Bảng cân đối tài khoản."},{"k":"p","t":"b) Kết cấu và phương pháp ghi chép:"},{"k":"p","t":"Cột A: Ghi số hiệu của Chứng từ ghi sổ."},{"k":"p","t":"Cột B: Ghi ngày, tháng lập Chứng từ ghi sổ."},{"k":"p","t":"Cột 1: Ghi số tiền của Chứng từ ghi sổ."},{"k":"p","t":"Cuối trang sổ phải cộng số lũy kế để chuyển sang trang sau."},{"k":"p","t":"Đầu trang sổ phải ghi số cộng trang trước chuyển sang."},{"k":"p","t":"Cuối tháng, cuối năm, kế toán cộng tổng số tiền phát sinh trên Sổ Đăng ký chứng từ ghi sổ, lấy số liệu đối chiếu với Bảng cân đối tài khoản."},{"k":"p","t":"(2) Sổ Cái (Mẫu số S02c1-DNN và S02c2-DNN)"},{"k":"p","t":"a) Nội dung:"},{"k":"p","t":"Sổ Cái là sổ kế toán tổng hợp dùng để ghi các nghiệp vụ kinh tế phát sinh theo tài khoản kế toán được quy định trong chế độ tài khoản kế toán áp dụng cho doanh nghiệp."},{"k":"p","t":"Số liệu ghi trên Sổ Cái dùng để kiểm tra, đối chiếu với số liệu ghi trên Bảng tổng hợp chi tiết hoặc các Sổ (thẻ) kế toán chi tiết và dùng để lập Bảng cân đối tài khoản và Báo cáo Tài chính."},{"k":"p","t":"b) Kết cấu và phương pháp ghi Sổ Cái:"},{"k":"p","t":"Sổ Cái của hình thức kế toán Chứng từ ghi sổ được mở riêng cho từng tài khoản. Mỗi tài khoản được mở một trang hoặc một số trang tùy theo số lượng ghi chép các nghiệp vụ kinh tế phát sinh nhiều hay ít của từng tài khoản."},{"k":"p","t":"Sổ Cái có 2 loại: Sổ Cái ít cột và Sổ Cái nhiều cột."},{"k":"p","t":"+ Sổ Cái ít cột: thường được áp dụng cho những tài khoản có ít nghiệp vụ kinh tế phát sinh, hoặc nghiệp vụ kinh tế phát sinh đơn giản."},{"k":"p","t":"Kết cấu của Sổ Cái loại ít cột (Mẫu số S02c1-DNN)"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của Chứng từ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1, 2: Ghi số tiền ghi Nợ, ghi Có của tài khoản này."},{"k":"p","t":"+ Sổ Cái nhiều cột: thường được áp dụng cho những tài khoản có nhiều nghiệp vụ kinh tế phát sinh, hoặc nghiệp vụ kinh tế phát sinh phức tạp cần phải theo dõi chi tiết có thể kết hợp mở riêng cho một trang sổ trên Sổ Cái và được phân tích chi tiết theo tài khoản đối ứng."},{"k":"p","t":"Kết cấu của Sổ Cái loại nhiều cột (Mẫu số S02c2-DNN)"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của Chứng từ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1, 2: Ghi tổng số tiền phát sinh Nợ, phát sinh Có của tài khoản này."},{"k":"p","t":"- Cột 3 đến cột 10: Ghi số tiền phát sinh bên Nợ, bên Có của các tài khoản cấp 2."},{"k":"p","t":"* Phương pháp ghi Sổ Cái:"},{"k":"p","t":"- Căn cứ vào Chứng từ ghi sổ để ghi vào Sổ Đăng ký chứng từ ghi sổ, sau đó Chứng từ ghi sổ được sử dụng để ghi vào Sổ Cái và các sổ, thẻ kế toán chi tiết liên quan."},{"k":"p","t":"- Hàng ngày, căn cứ vào Chứng từ ghi sổ để ghi vào Sổ Cái ở các cột phù hợp."},{"k":"p","t":"- Cuối mỗi trang phải cộng tổng số tiền theo từng cột và chuyển sang đầu trang sau."},{"k":"p","t":"- Cuối tháng, (quý, năm) kế toán phải khóa sổ, cộng số phát sinh Nợ, số phát sinh Có, tính ra số dư và cộng lũy kế số phát sinh từ đầu quý, đầu năm của từng tài khoản để làm căn cứ lập Bảng cân đối tài khoản và Báo cáo tài chính."},{"k":"p","t":"3. Nội dung, kết cấu và phương pháp ghi sổ theo hình thức nhật ký chung:"},{"k":"p","t":"(1) Nhật ký chung (Mẫu số 03a-DNN)"},{"k":"p","t":"a) Nội dung:"},{"k":"p","t":"Sổ Nhật ký chung là sổ kế toán tổng hợp dùng để ghi chép các nghiệp vụ kinh tế, tài chính phát sinh theo trình tự thời gian đồng thời phản ánh theo quan hệ đối ứng tài khoản (Định khoản kế toán) để phục vụ việc ghi Sổ Cái. Số liệu ghi trên sổ Nhật ký chung được dùng làm căn cứ để ghi vào Sổ Cái."},{"k":"p","t":"b) Kết cấu và phương pháp ghi sổ:"},{"k":"p","t":"Kết cấu sổ Nhật ký chung được quy định thống nhất theo mẫu ban hành trong chế độ này:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng lập của chứng từ kế toán dùng làm căn cứ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ kinh tế, tài chính phát sinh của chứng từ kế toán."},{"k":"p","t":"- Cột E: Đánh dấu các nghiệp vụ ghi sổ Nhật ký chung đã được ghi vào Sổ Cái."},{"k":"p","t":"- Cột G: Ghi số thứ tự dòng của Nhật ký chung"},{"k":"p","t":"- Cột H: Ghi số hiệu các tài khoản ghi Nợ, ghi Có theo định khoản kế toán các nghiệp vụ phát sinh. Tài khoản ghi Nợ được ghi trước, Tài khoản ghi Có được ghi sau, mỗi tài khoản được ghi một dòng riêng."},{"k":"p","t":"- Cột 1: Ghi số tiền phát sinh các Tài khoản ghi Nợ."},{"k":"p","t":"- Cột 2: Ghi số tiền phát sinh các Tài khoản ghi Có."},{"k":"p","t":"Cuối trang sổ, cộng số phát sinh lũy kế để chuyển sang trang sau. Đầu trang sổ, ghi số cộng trang trước chuyển sang."},{"k":"p","t":"Về nguyên tắc tất cả các nghiệp vụ kinh tế, tài chính phát sinh đều phải ghi vào sổ Nhật ký chung. Tuy nhiên, trong trường hợp một hoặc một số đối tượng kế toán có số lượng phát sinh lớn, để đơn giản và giảm bớt khối lượng ghi Sổ Cái, doanh nghiệp có thể mở các sổ Nhật ký đặc biệt để ghi riêng các nghiệp vụ phát sinh liên quan đến các đối tượng kế toán đó."},{"k":"p","t":"Các sổ Nhật ký đặc biệt là một phần của sổ Nhật ký chung nên phương pháp ghi chép tương tự như sổ Nhật ký chung. Song để tránh sự trùng lặp các nghiệp vụ đã ghi vào sổ Nhật ký đặc biệt thì không ghi vào sổ Nhật ký chung. Trường hợp này, căn cứ để ghi Sổ Cái là Sổ Nhật ký chung và các sổ Nhật ký đặc biệt."},{"k":"p","t":"Dưới đây là hướng dẫn nội dung, kết cấu và cách ghi sổ của một số Nhật ký đặc biệt thông dụng."},{"k":"p","t":"(1.1) Sổ Nhật ký thu tiền (Mẫu số 03a1-DNN)"},{"k":"p","t":"a) Nội dung: Là sổ Nhật ký đặc biệt dùng để ghi chép các nghiệp vụ thu tiền của doanh nghiệp. Mẫu sổ này được mở riêng cho thu tiền mặt, thu qua ngân hàng, cho từng loại tiền (đồng Việt Nam, ngoại tệ) hoặc cho từng nơi thu tiền (Ngân hàng A, Ngân hàng B...)."},{"k":"p","t":"b) Kết cấu và phương pháp ghi sổ:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng lập của chứng từ kế toán dùng làm căn cứ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ kinh tế phát sinh của chứng từ kế toán."},{"k":"p","t":"- Cột 1: Ghi số tiền thu được vào bên Nợ của tài khoản tiền được theo dõi trên sổ này như: Tiền mặt, tiền gửi ngân hàng..."},{"k":"p","t":"- Cột 2, 3, 4, 5, 6: Ghi số tiền phát sinh bên Có của các tài khoản đối ứng."},{"k":"p","t":"Cuối trang sổ, cộng số phát sinh lũy kế để chuyển sang trang sau."},{"k":"p","t":"Đầu trang sổ, ghi số cộng trang trước chuyển sang."},{"k":"p","t":"(1.2) Nhật ký chi tiền (Mẫu số S03a2-DNN)"},{"k":"p","t":"a) Nội dung: Là sổ Nhật ký đặc biệt dùng để ghi chép các nghiệp vụ chi tiền của doanh nghiệp. Mẫu sổ này được mở riêng cho chi tiền mặt, chi tiền qua ngân hàng, cho từng loại tiền (đồng Việt Nam, ngoại tệ) hoặc cho từng nơi chi tiền (Ngân hàng A, Ngân hàng B...)."},{"k":"p","t":"b) Kết cấu và phương pháp ghi sổ:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng lập của chứng từ dùng làm căn cứ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ phát sinh của chứng từ kế toán."},{"k":"p","t":"- Cột 1: Ghi số tiền chi ra vào bên Có của tài khoản tiền được theo dõi trên sổ này, như: Tiền mặt, tiền gửi Ngân hàng..."},{"k":"p","t":"- Cột 2, 3, 4, 5, 6: Ghi số tiền phát sinh bên Nợ của các tài khoản đối ứng."},{"k":"p","t":"Cuối trang sổ, cộng số phát sinh lũy kế để chuyển sang trang sau. Đầu trang sổ, ghi số cộng trang trước chuyển sang."},{"k":"p","t":"(1.3) Nhật ký mua hàng (Mẫu số S03a3-DNN)"},{"k":"p","t":"a) Nội dung: Là Sổ Nhật ký đặc biệt dùng để ghi chép các nghiệp vụ mua hàng theo từng loại hàng tồn kho của đơn vị, như: Nguyên liệu, vật liệu; công cụ, dụng cụ; hàng hóa;..."},{"k":"p","t":"Sổ Nhật ký mua hàng dùng để ghi chép các nghiệp vụ mua hàng theo hình thức trả tiền sau (mua chịu). Trường hợp trả tiền trước cho người bán thì khi phát sinh nghiệp vụ mua hàng cũng ghi vào sổ này."},{"k":"p","t":"b) Kết cấu và phương pháp ghi sổ."},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng lập của chứng từ kế toán dùng làm căn cứ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ phát sinh của chứng từ kế toán."},{"k":"p","t":"- Cột 1, 2, 3: Ghi Nợ các tài khoản hàng tồn kho như: Hàng hóa, nguyên liệu vật liệu, công cụ, dụng cụ... Trường hợp đơn vị mở sổ này cho từng loại hàng tồn kho thì các cột này có thể dùng để ghi chi tiết cho loại hàng tồn kho đó như: Hàng hóa A, hàng hóa B..."},{"k":"p","t":"- Cột 4: Ghi số tiền phải trả người bán tương ứng với số hàng đã mua."},{"k":"p","t":"Cuối trang sổ, cộng số lũy kế để chuyển sang trang sau. Đầu trang sổ, ghi số cộng trang trước chuyển sang."},{"k":"p","t":"(1.4) Nhật ký bán hàng (Mẫu số S03a4-DNN)"},{"k":"p","t":"a) Nội dung: Là Sổ Nhật ký đặc biệt dùng để ghi chép các nghiệp vụ bán hàng của doanh nghiệp như: Bán hàng hóa, bán thành phẩm, bán dịch vụ."},{"k":"p","t":"Sổ Nhật ký bán hàng dùng để ghi chép các nghiệp vụ bán hàng theo hình thức thu tiền sau (bán chịu). Trường hợp người mua trả tiền trước thì khi phát sinh nghiệp vụ bán hàng cũng ghi vào sổ này."},{"k":"p","t":"b) Kết cấu và cách ghi sổ:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng lập của chứng từ dùng làm căn cứ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ phát sinh của chứng từ kế toán."},{"k":"p","t":"- Cột 1: Ghi số tiền phải thu từ người mua theo doanh thu bán hàng."},{"k":"p","t":"- Cột 2, 3, 4: Mở theo yêu cầu của doanh nghiệp để ghi doanh thu theo từng loại nghiệp vụ: Bán hàng hóa, bán thành phẩm, bán bất động sản đầu tư, cung cấp dịch vụ... Trường hợp doanh nghiệp mở sổ này cho từng loại doanh thu: Bán hàng hóa, bán thành phẩm, bán bất động sản đầu tư, cung cấp dịch vụ... thì các cột này có thể dùng để ghi chi tiết cho từng loại hàng hóa, thành phẩm, bất động sản đầu tư, dịch vụ. Trường hợp không cần thiết, doanh nghiệp có thể gộp 3 cột này thành 1 cột để ghi doanh thu bán hàng chung."},{"k":"p","t":"Cuối trang sổ, cộng số lũy kế để chuyển sang trang sau. Đầu trang sổ, ghi số cộng trang trước chuyển sang."},{"k":"p","t":"Doanh nghiệp có thể mở một hoặc một số sổ Nhật ký đặc biệt như đã nêu trên để ghi chép. Trường hợp cần mở thêm các sổ Nhật ký đặc biệt khác phải tuân theo các nguyên tắc mở sổ và ghi sổ đã quy định."},{"k":"p","t":"(2) Sổ Cái (Mẫu số S03b-DNN)"},{"k":"p","t":"a) Nội dung: Sổ Cái là sổ kế toán tổng hợp dùng để ghi chép các nghiệp vụ kinh tế, tài chính phát sinh trong niên độ kế toán theo tài khoản kế toán được quy định trong hệ thống tài khoản kế toán áp dụng cho doanh nghiệp. Mỗi tài khoản được mở một hoặc một số trang liên tiếp trên Sổ Cái đủ để ghi chép trong một niên độ kế toán."},{"k":"p","t":"b) Kết cấu và phương pháp ghi sổ:"},{"k":"p","t":"Sổ Cái được quy định thống nhất theo mẫu ban hành trong chế độ này."},{"k":"p","t":"Cách ghi Sổ Cái được quy định như sau:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng lập của chứng từ kế toán được dùng làm căn cứ ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt nội dung nghiệp vụ phát sinh."},{"k":"p","t":"- Cột E: Ghi số trang của sổ Nhật ký chung đã ghi nghiệp vụ này."},{"k":"p","t":"- Cột G: Ghi số dòng của sổ Nhật ký chung đã ghi nghiệp vụ này."},{"k":"p","t":"- Cột H: Ghi số hiệu của các tài khoản đối ứng liên quan đến nghiệp vụ phát sinh với tài khoản trang Sổ Cái này (Tài khoản ghi Nợ trước, tài khoản ghi Có sau)."},{"k":"p","t":"- Cột 1, 2: Ghi số tiền phát sinh bên Nợ hoặc bên Có của Tài khoản theo từng nghiệp vụ kinh tế."},{"k":"p","t":"Đầu tháng, ghi số dư đầu kỳ của tài khoản vào dòng đầu tiên, cột số dư (Nợ hoặc Có). Cuối tháng, cộng số phát sinh Nợ, số phát sinh Có, tính ra số dư và cộng lũy kế số phát sinh từ đầu quý của từng tài khoản để làm căn cứ lập Bảng cân đối tài khoản và báo cáo tài chính."},{"k":"p","t":"II. Giải thích nội dung và phương pháp ghi sổ chi tiết"},{"k":"p","t":"Sổ chi tiết dùng chung cho các hình thức kế toán nên hướng dẫn chung như sau:"},{"k":"p","t":"SỔ QUỸ TIỀN MẶT"},{"k":"p","t":"(Mẫu số S04a-DNN)"},{"k":"p","t":"{Sổ chi tiết quỹ tiền mặt (mẫu số S04a-DNN)}"},{"k":"p","t":"1. Mục đích: Sổ này dùng cho thủ quỹ (hoặc dùng cho kế toán tiền mặt) để phản ánh tình hình thu, chi tồn quỹ tiền mặt bằng tiền Việt Nam của đơn vị."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ này mở cho thủ quỹ: Mỗi quỹ dùng một sổ hay một số trang sổ. Sổ này cũng dùng cho kế toán chi tiết quỹ tiền mặt và tên sổ sửa lại là “Sổ kế toán chi tiết quỹ tiền mặt”. Tương ứng với 1 sổ của thủ quỹ thì có 1 sổ của kế toán cùng ghi song song."},{"k":"p","t":"- Căn cứ để ghi sổ quỹ tiền mặt là các Phiếu thu, Phiếu chi đã được thực hiện nhập, xuất quỹ."},{"k":"p","t":"- Cột A: Ghi ngày tháng ghi sổ."},{"k":"p","t":"- Cột B: Ghi ngày tháng của Phiếu thu, Phiếu chi."},{"k":"p","t":"- Cột C, D: Ghi số hiệu của Phiếu thu, số hiệu Phiếu chi liên tục từ nhỏ đến lớn."},{"k":"p","t":"- Cột E: Ghi nội dung nghiệp vụ kinh tế của Phiếu thu, Phiếu chi."},{"k":"p","t":"- Cột 1: Số tiền nhập quỹ."},{"k":"p","t":"- Cột 2: Số tiền xuất quỹ."},{"k":"p","t":"- Cột 3: Số dư tồn quỹ cuối ngày. Số tồn quỹ cuối ngày phải khớp đúng với số tiền mặt trong két."},{"k":"p","t":"Định kỳ kế toán kiểm tra, đối chiếu giữa “Sổ kế toán chi tiết quỹ tiền mặt” với “Sổ quỹ tiền mặt”, ký xác nhận vào cột G."},{"k":"p","t":"* Chú ý: Để theo dõi quỹ tiền mặt, kế toán quỹ tiền mặt phải mở “Sổ kế toán chi tiết quỹ tiền mặt” (Mẫu số S04b-DNN). Sổ này có thêm cột F “Tài khoản đối ứng” để phản ánh số hiệu Tài khoản đối ứng với từng nghiệp vụ ghi Nợ, từng nghiệp vụ ghi Có của Tài khoản 111 “Tiền mặt”."},{"k":"p","t":"SỔ TIỀN GỬI NGÂN HÀNG"},{"k":"p","t":"(Mẫu số S05-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng cho kế toán theo dõi chi tiết tiền Việt Nam của doanh nghiệp gửi tại Ngân hàng. Mỗi ngân hàng có mở tài khoản tiền gửi thì được theo dõi riêng trên một quyển sổ, phải ghi rõ nơi mở tài khoản và số hiệu tài khoản giao dịch."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Căn cứ để ghi vào sổ là giấy báo Nợ, báo Có hoặc sổ phụ của ngân hàng."},{"k":"p","t":"Đầu kỳ: Ghi số dư tiền gửi kỳ trước vào cột 8."},{"k":"p","t":"Hàng ngày:"},{"k":"p","t":"Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ (giấy báo Nợ, báo Có) dùng để ghi sổ."},{"k":"p","t":"Cột D: Ghi tóm tắt nội dung của chứng từ."},{"k":"p","t":"Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"Cột 1, 2: Ghi số tiền gửi vào hoặc rút ra khỏi tài khoản tiền gửi."},{"k":"p","t":"Cột 3: Ghi số tiền hiện còn gửi tại Ngân hàng."},{"k":"p","t":"Cuối tháng:"},{"k":"p","t":"Cộng số tiền đã gửi vào, hoặc đã rút ra trên cơ sở đó tính số tiền còn gửi tại Ngân hàng chuyển sang tháng sau. Số dư trên sổ tiền gửi được đối chiếu với số dư tại Ngân hàng nơi mở tài khoản."},{"k":"p","t":"SỔ CHI TIẾT VẬT LIỆU, DỤNG CỤ, SẢN PHẨM, HÀNG HÓA"},{"k":"p","t":"(Mẫu số S06-DNN)"},{"k":"p","t":"1. Mục đích: Dùng để theo dõi chi tiết tình hình nhập, xuất và tồn kho cả về số lượng và giá trị của từng thứ nguyên liệu, vật liệu, dụng cụ, sản phẩm hàng hóa ở từng kho làm căn cứ đối chiếu với việc ghi chép của thủ kho."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ này được mở theo từng tài khoản (Nguyên liệu, vật liệu; Công cụ, dụng cụ; Thành phẩm; Hàng hóa: 152, 153, 155, 156) theo từng kho và theo từng thứ vật liệu, dụng cụ, thành phẩm, hàng hóa."},{"k":"p","t":"Cột A, B: Ghi số hiệu, ngày, tháng của chứng từ nhập, xuất kho vật liệu, dụng cụ, thành phẩm, hàng hóa."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1: Ghi đơn giá (giá vốn) của 1 đơn vị vật liệu, dụng cụ, sản phẩm, hàng hóa nhập, xuất kho."},{"k":"p","t":"- Cột 2: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho."},{"k":"p","t":"- Cột 3: Căn cứ vào hóa đơn, phiếu nhập kho ghi giá trị (số tiền) vật liệu, dụng cụ, sản phẩm, hàng hóa nhập kho (Cột 3 = cột 1 x cột 2)."},{"k":"p","t":"- Cột 4: Ghi số lượng sản phẩm, dụng cụ, vật liệu, hàng hóa xuất kho."},{"k":"p","t":"- Cột 5: Ghi giá trị vật liệu, dụng cụ, sản phẩm, hàng hóa xuất kho (Cột 5 = cột 1 x Cột 4)."},{"k":"p","t":"- Cột 6: Ghi số lượng vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho."},{"k":"p","t":"- Cột 7: Ghi giá trị vật liệu, dụng cụ, sản phẩm, hàng hóa tồn kho (Cột 7 = cột 1 x cột 6)."},{"k":"p","t":"BẢNG TỔNG HỢP CHI TIẾT VẬT LIỆU, DỤNG CỤ, SẢN PHẨM, HÀNG HÓA"},{"k":"p","t":"(Mẫu số S07-DNN)"},{"k":"p","t":"1. Mục đích: Dùng để tổng hợp phần giá trị từ các trang sổ, thẻ chi tiết nguyên liệu, vật liệu, công cụ, dụng cụ, sản phẩm, hàng hóa, nhằm đối chiếu với số liệu Tài khoản 152, 153, 155, 156 trên Sổ Cái hoặc Nhật ký - Sổ Cái."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Mỗi tài khoản vật liệu, dụng cụ, sản phẩm, hàng hóa được lập một bảng riêng. Bảng này được lập vào cuối tháng, căn cứ vào số liệu dòng cộng trên sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa để lập."},{"k":"p","t":"- Cột A: Ghi số thứ tự vật liệu, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột B: Ghi tên, qui cách vật liệu, dụng cụ, sản phẩm, hàng hóa theo Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa (Mỗi thứ ghi 1 dòng)."},{"k":"p","t":"- Cột 1: Ghi giá trị tồn đầu kỳ (Số liệu dòng tồn đầu kỳ ở cột 7 trên Sổ vật liệu, dụng cụ, sản phẩm, hàng hóa)."},{"k":"p","t":"- Cột 2: Ghi giá trị nhập trong kỳ (Số liệu dòng cộng cột 3 trên Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa)."},{"k":"p","t":"- Cột 3: Giá trị xuất trong kỳ (Lấy số liệu dòng cộng cột 5 trên Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa)."},{"k":"p","t":"- Cột 4: Giá trị tồn cuối kỳ (Lấy số liệu tồn cuối kỳ ở cột 7 trên Sổ chi tiết vật liệu, dụng cụ, sản phẩm, hàng hóa)."},{"k":"p","t":"Sau khi ghi xong tiến hành cộng Bảng tổng hợp. Số liệu trên dòng tổng cộng được đối chiếu với số liệu trên Nhật ký - Sổ Cái hoặc trên Sổ Cái của các Tài khoản 152, 153, 155 và 156."},{"k":"p","t":"+ Số liệu cột 1: Được đối chiếu số dư đầu kỳ."},{"k":"p","t":"+ Số liệu cột 2: Được đối chiếu với số phát sinh Nợ."},{"k":"p","t":"+ Số liệu cột 3: Đối chiếu với số phát sinh Có."},{"k":"p","t":"+ Số liệu cột 4: Đối chiếu với số dư cuối kỳ."},{"k":"p","t":"THẺ KHO (SỔ KHO)"},{"k":"p","t":"(Mẫu số S08-DNN)"},{"k":"p","t":"1. Mục đích: Theo dõi số lượng nhập, xuất, tồn, kho từng thứ nguyên liệu, vật liệu, công cụ, dụng cụ, sản phẩm, hàng hóa ở từng kho. Làm căn cứ xác định số lượng tồn kho dự trữ vật liệu, dụng cụ, sản phẩm, hàng hóa và xác định trách nhiệm vật chất của thủ kho."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Thẻ kho là sổ tờ rời. Nếu đóng thành quyển thì gọi là “Sổ kho”. Thẻ tờ rời sau khi dùng xong phải đóng thành quyển. “Sổ kho” hoặc “thẻ kho” sau khi đóng thành quyển phải có chữ ký của giám đốc."},{"k":"p","t":"Mỗi thẻ kho dùng cho một thứ vật liệu, dụng cụ, sản phẩm, hàng hóa cùng nhãn hiệu, quy cách ở cùng một kho. Phòng kế toán lập thẻ và ghi các chỉ tiêu: tên, nhãn hiệu, quy cách, đơn vị tính, mã số vật liệu, dụng cụ, sản phẩm, hàng hóa sau đó giao cho thủ kho để ghi chép hàng ngày. Hàng ngày thủ kho căn cứ vào Phiếu nhập kho, Phiếu xuất kho ghi vào các cột tương ứng trong thẻ kho. Mỗi chứng từ ghi 1 dòng, cuối ngày tính số tồn kho."},{"k":"p","t":"- Cột A: Ghi số thứ tự;"},{"k":"p","t":"- Cột B: Ghi ngày tháng của Phiếu nhập kho, Phiếu xuất kho;"},{"k":"p","t":"- Cột C, D: Ghi số hiệu của Phiếu nhập kho hoặc Phiếu xuất kho;"},{"k":"p","t":"- Cột E: Ghi nội dung của nghiệp vụ kinh tế phát sinh;"},{"k":"p","t":"- Cột F: Ghi ngày nhập, xuất kho;"},{"k":"p","t":"- Cột 1: Ghi số lượng nhập kho;"},{"k":"p","t":"- Cột 2: Ghi số lượng xuất kho;"},{"k":"p","t":"- Cột 3: Ghi số lượng tồn kho sau mỗi lần nhập, xuất hoặc cuối mỗi ngày."},{"k":"p","t":"Theo định kỳ, nhân viên kế toán vật tư xuống kho nhận chứng từ và kiểm tra việc ghi chép Thẻ kho của Thủ kho, sau đó ký xác nhận vào Thẻ kho (Cột G)."},{"k":"p","t":"Sau mỗi lần kiểm kê phải tiến hành điều chỉnh số liệu trên Thẻ kho cho phù hợp với số liệu thực tế kiểm kê theo chế độ quy định."},{"k":"p","t":"SỐ TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"(Mẫu số S09-DNN)"},{"k":"p","t":"1. Mục đích: Sổ tài sản cố định dùng để đăng ký, theo dõi và quản lý chặt chẽ tài sản trong đơn vị từ khi mua sắm, đưa vào sử dụng đến khi ghi giảm tài sản cố định."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Mỗi một sổ hoặc một số trang sổ được mở theo dõi cho một loại TSCĐ (nhà cửa, máy móc thiết bị...). Căn cứ vào chứng từ tăng, giảm TSCĐ để ghi vào sổ TSCĐ:"},{"k":"p","t":"- Cột A: Ghi số thứ tự"},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ dùng để ghi sổ"},{"k":"p","t":"- Cột D: Ghi tên, đặc điểm, ký hiệu của TSCĐ"},{"k":"p","t":"- Cột E: Ghi tên nước sản xuất TSCĐ"},{"k":"p","t":"- Cột G: Ghi tháng, năm đưa TSCĐ vào sử dụng"},{"k":"p","t":"- Cột H: Ghi số hiệu TSCĐ"},{"k":"p","t":"- Cột 1: Ghi nguyên giá TSCĐ"},{"k":"p","t":"- Cột 2: Ghi tỷ lệ khấu hao một năm"},{"k":"p","t":"- Cột 3: Ghi số tiền khấu hao một năm"},{"k":"p","t":"- Cột 4: Ghi số khấu hao TSCĐ tính đến thời điểm ghi giảm TSCĐ"},{"k":"p","t":"- Cột I, K: Ghi số hiệu, ngày, tháng, năm của chứng từ ghi giảm TSCĐ"},{"k":"p","t":"- Cột L: Ghi lý do giảm TSCĐ (nhượng bán, thanh lý...)."},{"k":"p","t":"SỔ THEO DÕI TÀI SẢN CỐ ĐỊNH VÀ CÔNG CỤ, DỤNG CỤ TẠI NƠI SỬ DỤNG"},{"k":"p","t":"(Mẫu số S10-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng để ghi chép tình hình tăng, giảm tài sản cố định và công cụ, dụng cụ tại từng nơi sử dụng nhằm quản lý tài sản và dụng cụ đã được cấp cho các phòng, ban làm căn cứ để đối chiếu khi tiến hành kiểm kê định kỳ."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Mỗi đơn vị hoặc bộ phận (phân xưởng, phòng ban...) thuộc doanh nghiệp phải mở một sổ để theo dõi tài sản. Căn cứ vào chứng từ gốc về tăng, giảm tài sản để ghi vào sổ tài sản theo đơn vị sử dụng như sau:"},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày tháng của chứng từ tăng tài sản cố định và công cụ, dụng cụ."},{"k":"p","t":"- Cột C: Ghi tên nhãn hiệu TSCĐ và công cụ, dụng cụ"},{"k":"p","t":"- Cột D: Ghi đơn vị tính (cái, chiếc...)"},{"k":"p","t":"- Cột 1: Ghi số lượng"},{"k":"p","t":"- Cột 2: Ghi nguyên giá TSCĐ hoặc đơn giá công cụ, dụng cụ"},{"k":"p","t":"- Cột 3: Ghi số tiền (Cột 3 = Cột 1 x Cột 2)"},{"k":"p","t":"- Cột E, G: Ghi số hiệu, ngày tháng của chứng từ ghi giảm tài sản cố định và công cụ, dụng cụ."},{"k":"p","t":"- Cột H: Ghi lý do giảm tài sản cố định và công cụ, dụng cụ."},{"k":"p","t":"- Cột 4: Ghi số lượng tài sản cố định và công cụ, dụng cụ giảm."},{"k":"p","t":"- Cột 5: Ghi nguyên giá tài sản cố định và giá trị công cụ, dụng cụ giảm."},{"k":"p","t":"THẺ TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"(Mẫu số S11-DNN)"},{"k":"p","t":"1. Mục đích: Theo dõi chi tiết từng TSCĐ của doanh nghiệp, tình hình thay đổi nguyên giá và giá trị hao mòn đã trích hàng năm của từng TSCĐ."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Căn cứ để lập thẻ TSCĐ:"},{"k":"p","t":"- Biên bản giao nhận TSCĐ;"},{"k":"p","t":"- Biên bản đánh giá lại TSCĐ;"},{"k":"p","t":"- Bảng phân bổ khấu hao TSCĐ;"},{"k":"p","t":"- Biên bản thanh lý TSCĐ;"},{"k":"p","t":"- Các tài liệu kỹ thuật có liên quan."},{"k":"p","t":"Thẻ được lập cho từng đối tượng ghi tài sản cố định. Thẻ TSCĐ dùng chung cho mọi TSCĐ là nhà cửa, vật kiến trúc, máy móc thiết bị, cây, con, gia súc... Thẻ tài sản cố định bao gồm 4 phần chính:"},{"k":"p","t":"1. Ghi các chỉ tiêu chung về TSCĐ như: tên, ký mã hiệu, quy cách (cấp hạng); số hiệu, nước sản xuất (xây dựng); năm sản xuất, bộ phận quản lý, sử dụng; năm bắt đầu đưa vào sử dụng, công suất (diện tích) thiết kế; ngày, tháng, năm và lý do đình chỉ sử dụng TSCĐ."},{"k":"p","t":"2. Ghi các chỉ tiêu nguyên giá TSCĐ ngay khi bắt đầu hình thành TSCĐ và qua từng thời kỳ do đánh giá lại, xây dựng, trang bị thêm hoặc tháo bớt các bộ phận... và giá trị hao mòn đã trích qua các năm."},{"k":"p","t":"Cột A, B, C, 1: Ghi số hiệu, ngày, tháng, năm của chứng từ, lý do hình thành nên nguyên giá và nguyên giá của TSCĐ tại thời điểm đó."},{"k":"p","t":"Cột 2: Ghi năm tính giá trị hao mòn TSCĐ."},{"k":"p","t":"Cột 3: Ghi giá trị hao mòn TSCĐ của từng năm."},{"k":"p","t":"Cột 4: Ghi tổng số giá trị hao mòn đã trích cộng dồn đến thời điểm vào thẻ. Đối với những TSCĐ không phải trích khấu hao nhưng phải tính hao mòn (như TSCĐ dùng cho sự nghiệp, phúc lợi, ...) thì cũng tính và ghi giá trị hao mòn vào thẻ."},{"k":"p","t":"3. Ghi số phụ tùng, dụng cụ kèm theo TSCĐ."},{"k":"p","t":"Cột A, B, C: Ghi số thứ tự, tên quy cách và đơn vị tính của dụng cụ, phụ tùng."},{"k":"p","t":"Cột 1, 2: Ghi số lượng và giá trị của từng loại dụng cụ, phụ tùng kèm theo TSCĐ."},{"k":"p","t":"Cuối tờ thẻ, ghi giảm TSCĐ: Ghi số ngày, tháng, năm của chứng từ ghi giảm TSCĐ và lý do giảm."},{"k":"p","t":"Thẻ TSCĐ do kế toán TSCĐ lập, kế toán trưởng ký soát xét và giám đốc ký. Thẻ được lưu ở phòng, ban kế toán suốt quá trình sử dụng tài sản."},{"k":"p","t":"SỔ CHI TIẾT THANH TOÁN VỚI NGƯỜI MUA (NGƯỜI BÁN)"},{"k":"p","t":"(Mẫu số S12-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng để theo dõi việc thanh toán với người mua (người bán) theo từng đối tượng, từng thời hạn thanh toán."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ chi tiết thanh toán với người mua (người bán) được mở theo từng tài khoản, theo từng đối tượng thanh toán."},{"k":"p","t":"- Cột A: Ghi ngày, tháng năm kế toán ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi nội dung của nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1: Ghi thời hạn được hưởng chiết khấu thanh toán trên hóa đơn mua (bán) hàng hoặc các chứng từ liên quan đến việc mua (bán) hàng."},{"k":"p","t":"- Cột 2, 3: Ghi số phát sinh bên Nợ (hoặc bên Có) của tài khoản."},{"k":"p","t":"- Cột 4, 5: Ghi số dư bên Nợ (hoặc bên Có) của tài khoản sau từng nghiệp vụ thanh toán."},{"k":"p","t":"SỔ CHI TIẾT THANH TOÁN VỚI NGƯỜI MUA (NGƯỜI BÁN) BẰNG NGOẠI TỆ"},{"k":"p","t":"(Mẫu số S13-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng để theo dõi việc thanh toán với người mua (người bán) theo từng đối tượng, từng thời hạn thanh toán và theo từng loại ngoại tệ."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ chi tiết theo dõi thanh toán bằng ngoại tệ được mở theo từng tài khoản, đối tượng thanh toán và theo từng loại ngoại tệ."},{"k":"p","t":"- Cột A: Ghi ngày, tháng kế toán ghi sổ"},{"k":"p","t":"- Cột B, C: Ghi số hiệu và ngày, tháng của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng với tài khoản thanh toán ghi trong sổ này."},{"k":"p","t":"- Cột 1: Ghi tỷ giá ngoại tệ quy đổi ra đồng Việt Nam."},{"k":"p","t":"- Cột 2: Ghi thời hạn được chiết khấu thanh toán trên hóa đơn mua (bán) hàng hoặc các chứng từ liên quan đến việc mua (bán) hàng."},{"k":"p","t":"- Cột 3: Ghi số tiền ngoại tệ (nguyên tệ) phát sinh bên Nợ."},{"k":"p","t":"- Cột 4: Ghi số tiền phát sinh bên Nợ được quy đổi ra đồng Việt Nam (Cột 4 = Cột 1 x Cột 3)."},{"k":"p","t":"- Cột 5: Ghi số tiền ngoại tệ phát sinh bên Có của tài khoản."},{"k":"p","t":"- Cột 6: Ghi số tiền phát sinh bên Có của tài khoản được quy đổi ra đồng Việt Nam (Cột 6 = Cột 1 x Cột 5)."},{"k":"p","t":"- Cột 7, 9: Ghi số dư Nợ (hoặc dư Có) bằng ngoại tệ sau từng nghiệp vụ thanh toán."},{"k":"p","t":"- Cột 8, 10: Ghi số dư Nợ (hoặc dư Có) đã được quy đổi ra đồng Việt Nam sau từng nghiệp vụ thanh toán."},{"k":"p","t":"SỔ THEO DÕI THANH TOÁN BẰNG NGOẠI TỆ"},{"k":"p","t":"(Mẫu số S14-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng cho một số tài khoản thuộc loại thanh toán (ngoài TK 131, 331) theo từng đối tượng, từng thời hạn thanh toán và theo từng loại ngoại tệ."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ chi tiết theo dõi thanh toán bằng ngoại tệ được mở theo từng tài khoản, theo từng đối tượng thanh toán và theo từng loại ngoại tệ."},{"k":"p","t":"- Cột A: Ghi ngày, tháng kế toán ghi sổ;"},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ dùng để ghi sổ;"},{"k":"p","t":"- Cột D: Ghi diễn giải nội dung nghiệp vụ kinh tế phát sinh;"},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng;"},{"k":"p","t":"- Cột 1: Ghi tỷ giá ngoại tệ quy đổi ra đồng Việt Nam;"},{"k":"p","t":"- Cột 2: Ghi số tiền ngoại tệ (Nguyên tệ) phát sinh bên Nợ;"},{"k":"p","t":"- Cột 3: Ghi số tiền ngoại tệ quy đổi ra đồng Việt Nam;"},{"k":"p","t":"- Cột 4: Ghi số tiền phát sinh bên Có: Số tiền bằng ngoại tệ;"},{"k":"p","t":"- Cột 5: Ghi số phát sinh bên Có: Số tiền bằng ngoại tệ đã quy đổi ra đồng Việt Nam;"},{"k":"p","t":"- Cột 6, 8: Ghi số dư Nợ (hoặc dư Có) bằng ngoại tệ sau mỗi nghiệp vụ thanh toán;"},{"k":"p","t":"- Cột 7, 9: Ghi số dư Nợ (hoặc dư Có) bằng ngoại tệ đã được quy đổi ra đồng Việt Nam sau mỗi nghiệp vụ thanh toán."},{"k":"p","t":"SỔ CHI TIẾT TIỀN VAY"},{"k":"p","t":"(Mã số S15-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này được dùng để theo dõi theo từng tài khoản, theo từng đối tượng vay (Ngân hàng, người cho vay...) và theo từng khế ước vay."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu ngày, tháng của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột G: Ghi ngày, tháng, năm đến hạn thanh toán."},{"k":"p","t":"- Cột 1: Ghi số tiền trả nợ vay vào bên Nợ."},{"k":"p","t":"- Cột 2: Ghi số tiền vay vào bên Có."},{"k":"p","t":"SỔ CHI TIẾT BÁN HÀNG"},{"k":"p","t":"(Mã số S16-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này mở theo từng sản phẩm, hàng hóa, bất động sản đầu tư, dịch vụ đã bán hoặc đã cung cấp được khách hàng thanh toán tiền ngay hay chấp nhận thanh toán."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"- Cột A: Ghi ngày tháng kế toán ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày tháng của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1, 2, 3: Ghi số lượng, đơn giá và số tiền của khối lượng hàng hóa (sản phẩm, bất động sản đầu tư, dịch vụ) đã bán hoặc đã cung cấp."},{"k":"p","t":"- Cột 4: Ghi số thuế giá trị gia tăng (Thuế tiêu thụ đặc biệt, thuế xuất khẩu) phải nộp tính trên doanh số bán của số hàng hóa (sản phẩm, dịch vụ, BĐS đầu tư) đã bán hoặc đã cung cấp."},{"k":"p","t":"- Cột 5: Ghi số phải giảm trừ vào doanh thu (nếu có) như: Chiết khấu thương mại, hàng bán bị trả lại, giảm giá hàng bán,..."},{"k":"p","t":"Sau khi cộng “Số phát sinh”, tính Chỉ tiêu “Doanh thu thuần” ghi vào cột 3. Cột 3 = Cột 3 trừ (-) Cột 4 và Cột 5. Chỉ tiêu “Giá vốn hàng bán”: Ghi số giá vốn của hàng hóa (sản phẩm, bất động sản đầu tư, dịch vụ) đã bán."},{"k":"p","t":"Chỉ tiêu “Lãi gộp” bằng (=) chỉ tiêu “Doanh thu thuần” trừ (-) chỉ tiêu “Giá vốn hàng bán”."},{"k":"p","t":"SỔ CHI PHÍ SẢN XUẤT, KINH DOANH"},{"k":"p","t":"(Mã số S17-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này mở theo từng đối tượng tập hợp chi phí (Theo phân xưởng, bộ phận sản xuất, theo sản phẩm, nhóm sản phẩm,... dịch vụ hoặc theo từng nội dung chi phí)."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Căn cứ vào sổ chi tiết chi phí SXKD kỳ trước - phần “Số dư cuối kỳ”, để ghi vào dòng “Số dư đầu kỳ” ở các cột phù hợp (Cột 1 đến Cột 8)."},{"k":"p","t":"- Phần “Số phát sinh trong kỳ”: Căn cứ vào chứng từ kế toán (chứng từ gốc, bảng phân bố) để ghi vào sổ chi tiết chi phí SXKD như sau:"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ;"},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ dùng để ghi sổ;"},{"k":"p","t":"- Cột D: Ghi diễn giải nội dung nghiệp vụ kinh tế phát sinh;"},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng;"},{"k":"p","t":"- Cột 1: Ghi tổng số tiền của nghiệp vụ kinh tế phát sinh;"},{"k":"p","t":"- Từ Cột 2 đến Cột 8: Căn cứ vào nội dung nghiệp vụ kinh tế phát sinh để ghi vào các cột phù hợp tương ứng với nội dung chi phí đáp ứng yêu cầu quản lý của từng tài khoản của doanh nghiệp."},{"k":"p","t":"- Phần (dòng) “Số dư cuối kỳ” được xác định như sau:"},{"k":"p","t":"Số dư cuối kỳ"},{"k":"p","t":"="},{"k":"p","t":"Số dư đầu kỳ"},{"k":"p","t":"+"},{"k":"p","t":"Phát sinh Nợ"},{"k":"p","t":"-"},{"k":"p","t":"Phát sinh có"},{"k":"p","t":"THẺ TÍNH GIÁ THÀNH SẢN PHẨM, DỊCH VỤ"},{"k":"p","t":"(Mẫu số S18-DNN)"},{"k":"p","t":"1. Mục đích: Dùng để theo dõi và tính giá thành sản xuất từng loại sản phẩm, dịch vụ trong từng kỳ hạch toán."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Căn cứ vào Thẻ tính giá thành kỳ trước và sổ chi tiết chi phí SXKD kỳ này để ghi số liệu vào Thẻ tính giá thành, như sau:"},{"k":"p","t":"- Cột A: Ghi tên các chỉ tiêu."},{"k":"p","t":"- Cột 1: Ghi tổng số tiền của từng chỉ tiêu."},{"k":"p","t":"- Từ Cột 2 đến Cột 9: Ghi số tiền theo từng khoản mục giá thành. Số liệu ghi ở cột 1 phải bằng tổng số liệu ghi từ cột 2 đến cột 9."},{"k":"p","t":"- Chỉ tiêu (dòng) “Chi phí SXKD dở dang đầu kỳ”: Căn cứ vào thẻ tính giá thành kỳ trước (dòng “chi phí SXKD dở dang cuối kỳ”) để ghi vào chỉ tiêu “Chi phí SXKD dở dang đầu kỳ” ở các cột phù hợp."},{"k":"p","t":"- Chỉ tiêu (dòng) “Chi phí SXKD phát sinh trong kỳ”: Căn cứ vào số liệu phản ánh trên sổ kế toán chi tiết chi phí SXKD để ghi vào chỉ tiêu “Chi phí SXKD phát sinh trong kỳ” ở các cột phù hợp."},{"k":"p","t":"- Chỉ tiêu (dòng) “Giá thành sản phẩm, dịch vụ trong kỳ” được xác định như sau:"},{"k":"p","t":"Giá thành sản phẩm"},{"k":"p","t":"="},{"k":"p","t":"Chi phí SXKD dở dang đầu kỳ"},{"k":"p","t":"+"},{"k":"p","t":"Chi phí SXKD phát sinh"},{"k":"p","t":"-"},{"k":"p","t":"Chi phí SXKD dở dang cuối kỳ"},{"k":"p","t":"- Chỉ tiêu (dòng) “Chi phí SXKD dở dang cuối kỳ”: Căn cứ vào biên bản kiểm kê và đánh giá sản phẩm dở dang để ghi vào chỉ tiêu “Chi phí SXKD dở dang cuối kỳ”."},{"k":"p","t":"SỔ CHI TIẾT CÁC TÀI KHOẢN"},{"k":"p","t":"(Mã số S19-DNN)"},{"k":"p","t":"(Dùng cho các TK: 136, 138, 141, 157, 242, 333, 334, \n335, 336, 338, 352, 353, 356, 411, 421,...)"},{"k":"p","t":"1. Mục đích: Sổ này dùng cho một số tài khoản thuộc loại thanh toán nguồn vốn mà chưa có mẫu sổ riêng."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ chi tiết các tài khoản được mở theo từng tài khoản, theo từng đối tượng thanh toán (theo từng nội dung chi phí, nguồn vốn...)."},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi diễn giải tóm tắt nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1, 2: Ghi số tiền phát sinh bên Nợ hoặc bên Có."},{"k":"p","t":"- Cột 3, 4: Ghi số dư bên Nợ hoặc bên Có sau mỗi nghiệp vụ phát sinh."},{"k":"p","t":"- Dòng Số dư đầu kỳ: Được lấy số liệu từ sổ chi tiết theo dõi thanh toán của kỳ trước (dòng “Số dư cuối kỳ”) để ghi vào Cột 3 hoặc Cột 4 phù hợp."},{"k":"p","t":"SỔ CHI TIẾT PHÁT HÀNH CỔ PHIẾU"},{"k":"p","t":"(Mẫu số S20-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng để theo dõi chi tiết số cổ phiếu do doanh nghiệp phát hành ra công chúng."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Mỗi loại cổ phiếu phát hành được theo dõi riêng một quyển sổ hoặc một số trang sổ."},{"k":"p","t":"Cột A, B: Ghi số và ngày tháng của giấy phép phát hành, hoặc quyết định của HĐQT."},{"k":"p","t":"Cột C: Ghi loại cổ phiếu đăng ký phát hành."},{"k":"p","t":"Cột 1: Ghi số lượng cổ phiếu đăng ký phát hành."},{"k":"p","t":"Cột 2: Ghi giá trị theo mệnh giá của số cổ phiếu đăng ký phát hành."},{"k":"p","t":"Cột D, E: Ghi số hiệu, ngày, tháng của chứng từ thực tế phát hành cổ phiếu."},{"k":"p","t":"Cột G: Ghi loại cổ phiếu phát hành."},{"k":"p","t":"Cột 3: Ghi số lượng cổ phiếu thực tế phát hành."},{"k":"p","t":"Cột 4: Ghi giá trị theo mệnh giá của số lượng cổ phiếu thực tế phát hành."},{"k":"p","t":"Cột 5: Ghi giá bán cổ phiếu (Giá thực tế phát hành)."},{"k":"p","t":"Cột 6: Ghi tổng số tiền bán cổ phiếu."},{"k":"p","t":"Cột 7: Ghi số lượng cổ phiếu đã đăng ký phát hành nhưng chưa bán."},{"k":"p","t":"Cột 8: Ghi mệnh giá của cổ phiếu đăng ký phát hành nhưng chưa bán."},{"k":"p","t":"Cuối tháng, cuối kỳ cộng sổ để tính ra số cổ phiếu hiện đang phát hành cuối kỳ."},{"k":"p","t":"SỔ CHI TIẾT CỔ PHIẾU QUỸ"},{"k":"p","t":"(Mẫu số S21-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng để theo dõi chi tiết số cổ phiếu doanh nghiệp mua lại của chính doanh nghiệp đã phát hành ra công chúng theo từng loại cổ phiếu."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Căn cứ ghi sổ là các chứng từ về thanh toán mua, bán cổ phiếu. Mỗi loại cổ phiếu mua lại (Cổ phiếu quỹ) được theo dõi riêng một quyển sổ hoặc một số trang sổ."},{"k":"p","t":"Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ mua, bán hoặc sử dụng cổ phiếu mua lại."},{"k":"p","t":"Cột D: Ghi tóm tắt nội dung nghiệp vụ kinh tế phát sinh phù hợp với chứng từ dùng để ghi sổ."},{"k":"p","t":"Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"Cột 1: Ghi giá thực tế mua, giá thực tế tái phát hành."},{"k":"p","t":"Cột 2: Ghi số lượng cổ phiếu mua lại."},{"k":"p","t":"Cột 3: Ghi giá trị của cổ phiếu mua lại theo mệnh giá."},{"k":"p","t":"Cột 4: Ghi giá trị cổ phiếu mua lại theo giá mua thực tế trên thị trường."},{"k":"p","t":"Cột 5: Ghi số lượng cổ phiếu bán lại ra công chúng, hoặc sử dụng, hủy bỏ theo quyết định của Hội đồng quản trị."},{"k":"p","t":"Cột 6: Ghi giá trị của cổ phiếu mua lại được tái phát hành hoặc sử dụng, hủy bỏ theo mệnh giá."},{"k":"p","t":"Cột 7: Ghi giá trị của cổ phiếu mua lại được tái phát hành hoặc sử dụng hủy bỏ theo giá thực tế trên thị trường."},{"k":"p","t":"Cột 8: Ghi số lượng cổ phiếu mua lại doanh nghiệp đang nắm giữ cuối kỳ."},{"k":"p","t":"Cột 9: Ghi giá trị cổ phiếu mua lại doanh nghiệp đang nắm giữ cuối kỳ theo mệnh giá."},{"k":"p","t":"Cột 10: Ghi giá trị của cổ phiếu mua lại doanh nghiệp đang nắm giữ cuối kỳ theo giá mua thực tế."},{"k":"p","t":"Cuối tháng, cuối kỳ cộng sổ để tính ra số cổ phiếu hiện đang mua lại cuối kỳ."},{"k":"p","t":"SỔ CHI TIẾT ĐẦU TƯ CHỨNG KHOÁN"},{"k":"p","t":"(Mẫu số S22-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này được mở theo từng tài khoản (TK 121; TK 228) và theo từng loại chứng khoán có cùng mệnh giá, tỷ lệ lãi suất được hưởng và phương thức thanh toán lãi suất."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi diễn giải nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1: Ghi số lượng chứng khoán mua vào."},{"k":"p","t":"- Cột 2: Ghi số tiền mua chứng khoán trong kỳ."},{"k":"p","t":"- Cột 3: Ghi số lượng chứng khoán xuất bán hoặc thanh toán trong kỳ."},{"k":"p","t":"- Cột 4: Ghi giá vốn của chứng khoán xuất bán hoặc thanh toán."},{"k":"p","t":"- Cột 5: Ghi số lượng chứng khoán còn lại cuối kỳ."},{"k":"p","t":"- Cột 6: Ghi giá trị chứng khoán còn lại cuối kỳ."},{"k":"p","t":"SỔ THEO DÕI CHI TIẾT VỐN GÓP CỦA CHỦ SỞ HỮU"},{"k":"p","t":"(Mẫu số S23-DNN)"},{"k":"p","t":"1. Mục đích: Sổ theo dõi chi tiết vốn góp của chủ sở hữu dùng để ghi chép số hiện có và tình hình tăng, giảm vốn góp của chủ sở hữu của doanh nghiệp theo từng nội dung: Vốn góp ban đầu, thặng dư vốn trong quá trình hoạt động và vốn được bổ sung từ nguồn khác (Tài trợ, viện trợ (nếu có)…)."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ này theo dõi toàn bộ vốn góp của chủ sở hữu của doanh nghiệp từ khi bắt đầu thành lập cho đến khi giải thể, phá sản. Căn cứ ghi sổ là các chứng từ liên quan đến nghiệp vụ góp vốn, mua bán cổ phiếu và tăng, giảm vốn góp của chủ sở hữu khác."},{"k":"p","t":"Cột A: Ghi ngày tháng ghi sổ."},{"k":"p","t":"Cột B, C: Ghi ngày, tháng và số hiệu của chứng từ dùng để ghi sổ."},{"k":"p","t":"Cột D: Ghi tóm tắt nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"Cột E: Ghi số hiệu tài khoản đối ứng."},{"k":"p","t":"- Cột 1: Ghi số vốn góp ban đầu bị giảm do thu hồi cổ phiếu hủy bỏ, các thành viên rút vốn và các nguyên nhân khác."},{"k":"p","t":"- Cột 2: Ghi số thặng dư vốn giảm do bán cổ phiếu mua lại thấp hơn giá mua lại."},{"k":"p","t":"- Cột 3: Ghi số vốn khác giảm."},{"k":"p","t":"- Cột 4: Ghi số vốn góp của chủ sở hữu tăng do các thành viên góp vốn, cổ đông mua cổ phiếu (Ghi theo mệnh giá) hoặc chủ doanh nghiệp tư nhân bỏ vốn vào kinh doanh."},{"k":"p","t":"- Cột 5: Ghi số chênh lệch giữa giá bán thực tế cổ phiếu lớn hơn mệnh giá cổ phiếu."},{"k":"p","t":"- Cột 6: Ghi số vốn kinh doanh tăng do được tài trợ, viện trợ không hoàn lại và các khoản tăng vốn khác."},{"k":"p","t":"Cuối tháng cộng sổ tính ra tổng số phát sinh tăng, phát sinh giảm và số dư cuối tháng để ghi vào cột phù hợp với từng loại nguồn vốn."},{"k":"p","t":"SỔ CHI PHÍ ĐẦU TƯ XÂY DỰNG"},{"k":"p","t":"(Mẫu số S24-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này dùng để theo dõi chi phí đầu tư xây dựng tập hợp cho từng dự án, công trình, hạng mục công trình kể từ khi khởi công cho đến khi kết thúc xây dựng đưa dự án vào khai thác, sử dụng."},{"k":"p","t":"Chi phí đầu tư xây dựng cho dự án, công trình, hạng mục công trình được tập hợp trên sổ theo các nội dung chi phí: Chi phí xây lắp, chi phí thiết bị và chi phí khác."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Căn cứ vào chứng từ kế toán (Chứng từ gốc, chứng từ ghi sổ có liên quan như phiếu giá, các phiếu xuất thiết bị, dụng cụ, chứng từ phân bổ chi phí Ban quản lý dự án, phân bổ chi phí khác) để ghi vào sổ chi phí đầu tư xây dựng."},{"k":"p","t":"Kế toán căn cứ vào nội dung chi phí đầu tư xây dựng phát sinh trên các chứng từ kế toán có liên quan để ghi vào các cột cho phù hợp."},{"k":"p","t":"- Cột A: Ghi ngày, tháng ghi sổ."},{"k":"p","t":"- Cột B, C: Ghi số hiệu, ngày, tháng của chứng từ phát sinh dùng để ghi sổ."},{"k":"p","t":"- Cột D: Ghi tóm tắt diễn giải nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột E: Ghi số hiệu tài khoản đối ứng với TK 241."},{"k":"p","t":"- Cột 1: Ghi tổng số chi phí đầu tư xây dựng phát sinh."},{"k":"p","t":"- Cột 2: Ghi số chi phí phát sinh cho xây lắp."},{"k":"p","t":"- Cột 3: Ghi tổng số chi phí phát sinh cho thiết bị."},{"k":"p","t":"Trong đó:"},{"k":"p","t":"Cột 4: Ghi số chi phí phát sinh cho thiết bị cần lắp."},{"k":"p","t":"Cột 5: Ghi số chi phí phát sinh cho thiết bị không cần lắp."},{"k":"p","t":"Cột 6: Ghi số chi phí phát sinh cho công cụ, dụng cụ."},{"k":"p","t":"- Cột 7: Ghi số chi phí phát sinh cho các khoản chi phí khác."},{"k":"p","t":"Số liệu ghi vào cột 1 phải bằng tổng số liệu ghi vào cột 2+cột 3+cột 7"},{"k":"p","t":"- Cột G: Ghi những chú thích cần thiết khác."},{"k":"p","t":"Những trường hợp ghi giảm chi phí đầu tư xây dựng, kế toán ghi số âm để tính tổng số phát sinh giảm trong kỳ. Cuối tháng cộng số phát sinh tăng, giảm thực tế trong tháng, trong quý, cộng lũy kế từ đầu năm đến cuối quý báo cáo, cộng lũy kế từ khi khởi công đến cuối quý báo cáo."},{"k":"p","t":"SỔ THEO DÕI THUẾ GTGT"},{"k":"p","t":"(Mẫu số S25-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này chỉ áp dụng cho các cơ sở sản xuất, kinh doanh thuộc đối tượng tính thuế GTGT phải nộp theo phương pháp trực tiếp. Sổ này dùng để phản ánh số thuế GTGT phải nộp, đã nộp và còn phải nộp."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ này được mở hàng tháng, được ghi chép theo từng Hóa đơn GTGT (Mỗi hóa đơn ghi 01 dòng). Riêng thuế GTGT phải nộp có thể không ghi theo từng Hóa đơn, 1 tháng có thể ghi 1 lần vào thời điểm cuối tháng."},{"k":"p","t":"- Cột A, B: Ghi số hiệu, ngày tháng của chứng từ (Hóa đơn GTGT, chứng từ nộp thuế GTGT)."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ kinh tế phát sinh."},{"k":"p","t":"- Cột 1: Ghi số tiền thuế GTGT đã nộp trong kỳ theo từng chứng từ."},{"k":"p","t":"- Cột 2: Ghi số tiền thuế GTGT còn phải nộp đầu kỳ, số tiền thuế GTGT phải nộp phát sinh trong kỳ theo từng chứng từ, số tiền thuế GTGT còn phải nộp cuối kỳ."},{"k":"p","t":"- Cuối kỳ, kế toán tiến hành khóa sổ, cộng số phát sinh thuế GTGT phải nộp, đã nộp trong kỳ và tính ra số thuế GTGT còn phải nộp cuối kỳ. Sau khi khóa sổ kế toán, người ghi sổ và kế toán trưởng phải ký và ghi họ tên."},{"k":"p","t":"SỔ CHI TIẾT THUẾ GTGT ĐƯỢC HOÀN LẠI"},{"k":"p","t":"(Mẫu số S26-DNN)"},{"k":"p","t":"1. Mục đích: Sổ này áp dụng cho các cơ sở sản xuất, kinh doanh thuộc đối tượng tính thuế theo phương pháp khấu trừ thuế. Sổ này dùng để ghi chép phản ánh số thuế GTGT được hoàn lại, đã hoàn lại và còn được hoàn lại cuối kỳ báo cáo."},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ"},{"k":"p","t":"Sổ này được mở hàng tháng, được ghi chép theo từng chứng từ về thuế GTGT được hoàn lại, đã hoàn lại trong kỳ báo cáo."},{"k":"p","t":"- Cột A, B: Ghi số hiệu ngày, tháng của chứng từ."},{"k":"p","t":"- Cột C: Ghi diễn giải nội dung nghiệp vụ kinh tế phát sinh theo từng chứng từ."},{"k":"p","t":"- Cột 1: Ghi số tiền thuế GTGT còn được hoàn lại đầu kỳ, số thuế GTGT được hoàn lại trong kỳ và số thuế GTGT còn được hoàn lại cuối kỳ báo cáo."},{"k":"p","t":"- Cột 2: Ghi số tiền thuế GTGT đã hoàn lại trong kỳ báo cáo."},{"k":"p","t":"Cuối kỳ, kế toán tiến hành khóa sổ, cộng số phát sinh thuế GTGT được hoàn lại, đã hoàn lại và tính ra số thuế GTGT còn được hoàn lại cuối kỳ báo cáo. Sau khi khóa sổ kế toán, người ghi sổ và kế toán trưởng phải ký và ghi rõ họ tên."}]}],"forms":[{"code":"B01a-DNN","title":"Báo cáo tình hình tài chính","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81 — DN đáp ứng giả định hoạt động liên tục"},{"code":"B01b-DNN","title":"Báo cáo tình hình tài chính (dạng khác)","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81"},{"code":"B01-DNNKLT","title":"Báo cáo tình hình tài chính (không liên tục)","pl":"Phụ lục 2 — Báo cáo tài chính","note":"DN không đáp ứng giả định hoạt động liên tục"},{"code":"B02-DNN","title":"Báo cáo kết quả hoạt động kinh doanh","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81"},{"code":"B03-DNN","title":"Báo cáo lưu chuyển tiền tệ","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81 — phương pháp trực tiếp/gián tiếp"},{"code":"B09-DNN","title":"Bản thuyết minh Báo cáo tài chính","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 81"},{"code":"B09-DNNKLT","title":"Thuyết minh BCTC (không liên tục)","pl":"Phụ lục 2 — Báo cáo tài chính","note":"DN không hoạt động liên tục"},{"code":"F01-DNN","title":"Bảng cân đối tài khoản","pl":"Phụ lục 2 — Báo cáo tài chính","note":"Điều 83 — gửi cơ quan thuế"},{"code":"B01-DNSN","title":"Báo cáo tình hình tài chính (DN siêu nhỏ)","pl":"Phụ lục 2 — BCTC DN siêu nhỏ","note":"DNSN áp dụng TT133"},{"code":"B02-DNSN","title":"Báo {"num":"411","name":"Vốn đầu tư của chủ sở hữu","level":1,"dieu":"tt133_51"},{"num":"413","name":"Chênh lệch tỷ giá hối đoái","level":1,"dieu":"tt133_52"},{"num":"418","name":"Các quỹ thuộc vốn chủ sở hữu","level":1,"dieu":"tt133_53"},{"num":"419","name":"Cổ phiếu quỹ","level":1,"dieu":"tt133_54"},{"num":"421","name":"Lợi nhuận sau thuế chưa phân phối","level":1,"dieu":"tt133_55"},{"num":"511","name":"Doanh thu bán hàng và cung cấp dịch vụ","level":1,"dieu":"tt133_57"},{"num":"515","name":"Doanh thu hoạt động tài chính","level":1,"dieu":"tt133_58"},{"num":"611","name":"Mua hàng","level":1,"dieu":"tt133_60"},{"num":"631","name":"Giá thành sản xuất","level":1,"dieu":"tt133_61"},{"num":"632","name":"Giá vốn hàng bán","level":1,"dieu":"tt133_62"},{"num":"635","name":"Chi phí tài chính","level":1,"dieu":"tt133_63"},{"num":"642","name":"Chi phí quản lý kinh doanh","level":1,"dieu":"tt133_64"},{"num":"711","name":"Thu nhập khác","level":1,"dieu":"tt133_65"},{"num":"811","name":"Chi phí khác","level":1,"dieu":"tt133_66"},{"num":"821","name":"Chi phí thuế thu nhập doanh nghiệp","level":1,"dieu":"tt133_67"},{"num":"911","name":"Xác định kết quả kinh doanh","level":1,"dieu":"tt133_68"}]}</script>
<script>
var D=JSON.parse(document.getElementById('LD').textContent);
var cur=null;
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildSb(f){
  var el=document.getElementById('sb'),h='',ch='',mu='';
  var items=f?D.outline.filter(function(a){return a.title.toLowerCase().indexOf(f.toLowerCase())>=0||(a.content||[]).some(function(c){return c.t&&c.t.toLowerCase().indexOf(f.toLowerCase())>=0})}):D.outline;
  items.forEach(function(a){
    if(a.chuong!==ch){h+='<div class="ns">'+e(a.chuong)+'</div>';ch=a.chuong;mu=''}
    if(a.muc&&a.muc!==mu){h+='<div style="padding:2px 12px;font-size:10.5px;font-style:italic;color:#94a3b8">'+e(a.muc)+'</div>';mu=a.muc}
    h+='<div class="ni'+(cur===a.id?' on':'')+'" onclick="show(\''+a.id+'\')" data-id="'+a.id+'"><span class="dot"></span><span>'+e(a.title)+'</span></div>';
  });
  if(!items.length)h='<div style="padding:14px 12px;font-size:12px;color:var(--mu)">Không tìm thấy</div>';
  el.innerHTML=h;
}
function show(id){
  var a=D.outline.find(function(x){return x.id===id});if(!a)return;
  cur=id;buildSb(document.getElementById('q').value);
  var q=document.getElementById('q').value.toLowerCase();
  var h='<div class="bc">'+e(a.chuong)+(a.muc?'<span> › </span>'+e(a.muc):'')+'<span> › </span><strong>'+e(a.code)+'</strong></div>';
  h+='<div class="at">'+e(a.title)+'</div><div class="ac">';
  var cnt=a.content||[];
  if(cnt.length){cnt.forEach(function(c){if(c.k==='p'&&c.t){var t=e(c.t);if(q){var rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');t=t.replace(rx,function(m){return'<mark>'+m+'</mark>'})}h+='<p>'+t+'</p>';}else if(c.k==='tbl'&&c.rows){h+='<table class="ct">';c.rows.forEach(function(row,ri){h+='<tr>';row.forEach(function(cell){var tg=ri===0?'th':'td';h+='<'+tg+'>'+e(cell)+'</'+tg+'>'});h+='</tr>'});h+='</table>';}})}
  else{h+='<p style="color:var(--mu)">Xem tài liệu gốc để biết chi tiết điều khoản này.</p>'}
  h+='</div>';
  document.getElementById('av').innerHTML=h;
  var el=document.querySelector('[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});
  // Switch to main tab if not already there
  if(!document.getElementById('s-main').classList.contains('on')){
    tab('main',document.querySelector('.tab'));
  }
}
function search(v){buildSb(v)}
function tab(t,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('s-'+t).classList.add('on');btn.classList.add('on');
  if(t==='main')buildSb(document.getElementById('q').value);
}
function buildForms(){
  var h='';
  if(!D.forms||!D.forms.length){
    h='<div class="no-tk"><p>Không có biểu mẫu riêng.</p></div>';
    document.getElementById('s-forms').innerHTML=h;return;
  }
  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#1e40af">📥 '+D.forms.length+' biểu mẫu — tải bản Word (.docx) hoặc Excel (.xlsx) để sử dụng.</div>';
  var pl='';
  D.forms.forEach(function(f){
    if(f.pl&&f.pl!==pl){h+='<div class="ns" style="margin:10px 0 6px">'+e(f.pl)+'</div>';pl=f.pl}
    h+='<div class="form-row"><span class="form-code">'+e(f.code)+'</span><span class="form-title">'+e(f.title)+'</span>';
    h+='<span class="dl-grp"><a class="dl-btn" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="word">⬇ Word</a><a class="dl-btn dl-x" data-doc="'+D.meta.slug+'" data-file="'+e(f.code)+'" data-type="excel">⬇ Excel</a></span>';
    if(f.note){h+='<span class="form-note">'+e(f.note)+'</span>'}
    h+='</div>';
  });
  document.getElementById('s-forms').innerHTML=h;
}
document.addEventListener('click',async function(ev){
  var btn=ev.target.closest('a.dl-btn');
  if(!btn||btn.classList.contains('loading'))return;
  ev.preventDefault();
  var doc=btn.getAttribute('data-doc'),file=btn.getAttribute('data-file'),type=btn.getAttribute('data-type');
  var orig=btn.innerHTML;
  btn.classList.add('loading');btn.innerHTML='<span class="sp"></span>...';
  try{
    var url='/api/legal/forms?doc='+encodeURIComponent(doc)+'&file='+encodeURIComponent(file)+'&type='+type;
    var res=await fetch(url,{credentials:'include'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var blob=await res.blob();
    var ext=type==='excel'?'.xlsx':'.docx';
    var a=document.createElement('a');var u=URL.createObjectURL(blob);
    a.href=u;a.download=file+ext;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u)},2000);
  }catch(err){
    alert('Chưa có file biểu mẫu này hoặc lỗi tải. Vui lòng thử lại sau.');
  }finally{
    setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('loading')},800);
  }
});
function buildTK(){
  var el=document.getElementById('s-tk');
  if(!D.accounts||!D.accounts.length){
    el.innerHTML='<div class="no-tk"><p>'+e(D.meta.tkNote||'Văn bản này không áp dụng hệ thống tài khoản kế toán.')+'</p></div>';
    return;
  }
  var h='<h2 style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:14px">Hệ thống Tài khoản Kế toán</h2>';
  h+='<p style="font-size:12.5px;color:var(--mu);margin-bottom:14px">'+D.outline.filter(function(a){return a.chuong&&a.chuong.indexOf('TÀI KHOẢN')>=0}).length+' tài khoản — click để xem điều khoản chi tiết</p>';
  h+='<table class="tk-table"><thead><tr><th>Mã TK</th><th>Tên tài khoản</th><th>Điều khoản</th></tr></thead><tbody>';
  D.accounts.forEach(function(a){
    h+='<tr><td><span class="tk-num">'+e(a.num)+'</span></td><td style="font-size:13px">'+e(a.name)+'</td><td>';
    if(a.dieu){h+='<a class="tk-link" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.dieu+'\');return false" href="#">Xem Điều</a>'}
    h+='</td></tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}
function buildHome(){
  var m=D.meta,chs=[...new Set(D.outline.map(function(a){return a.chuong}))];
  var h='<h1 style="font-size:20px;font-weight:800;color:#1e3a8a;margin-bottom:4px">'+e(m.title)+'</h1>';
  h+='<p style="font-size:12px;color:var(--mu);margin-bottom:16px">'+e(m.scope)+'</p>';
  h+='<div class="hgrid"><div class="sc"><div class="n">'+D.outline.length+'</div><div class="l">Điều khoản</div></div><div class="sc"><div class="n">'+chs.length+'</div><div class="l">Chương</div></div>';
  if(D.forms&&D.forms.length)h+='<div class="sc"><div class="n">'+D.forms.length+'</div><div class="l">Biểu mẫu</div></div>';
  if(D.accounts&&D.accounts.length)h+='<div class="sc"><div class="n">'+D.accounts.length+'</div><div class="l">Tài khoản</div></div>';
  h+='<div class="sc"><div class="n">'+e(m.effectiveDate)+'</div><div class="l">Hiệu lực</div></div></div>';
  h+='<div class="db"><p>'+e(m.description)+'</p></div>';
  h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Cấu trúc văn bản</h3>';
  chs.forEach(function(c){
    var arts=D.outline.filter(function(a){return a.chuong===c});
    h+='<div style="margin-bottom:9px"><div style="font-weight:700;font-size:12px;color:var(--pr);margin-bottom:4px">'+e(c)+'</div>';
    arts.forEach(function(a){h+='<div style="font-size:12px;padding:2px 0 2px 12px;color:#475569;cursor:pointer;border-left:2px solid #bfdbfe" onclick="tab(\'main\',document.querySelector(\'.tab\'));show(\''+a.id+'\')">'+e(a.title)+'</div>'});
    h+='</div>';
  });
  if(m.related&&m.related.length){h+='<h3 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#1e3a8a">Văn bản liên quan</h3>';m.related.forEach(function(r){h+='<span class="tag">'+e(r)+'</span>'})}
  document.getElementById('s-home').innerHTML=h;
}
// Hash navigation — jump to specific article when loaded with #articleId
function initHash(){
  var h=window.location.hash.slice(1);
  if(h&&D.outline.find(function(a){return a.id===h})){show(h)}
  else if(D.outline.length){show(D.outline[0].id)}
}
buildSb();buildForms();buildTK();buildHome();
initHash();
</script>
