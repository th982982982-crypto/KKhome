iểm nghiệm: ghi rõ ý kiến về số lượng, chất lượng, nguyên nhân đối với vật tư, công cụ, sản phẩm, hàng hóa không đúng số lượng, quy cách, phẩm chất và cách xử lý."},{"k":"p","t":"Biên bản kiểm nghiệm lập 2 bản:"},{"k":"p","t":"- 1 bản giao cho phòng, ban cung tiêu/hoặc người giao hàng."},{"k":"p","t":"- 1 bản giao cho phòng, ban kế toán."},{"k":"p","t":"Trường hợp vật tư, công cụ, sản phẩm, hàng hóa không đúng số lượng, quy cách, phẩm chất so với chứng từ hóa đơn, thì lập thêm một liên, kèm theo chứng từ liên quan gửi cho đơn vị bán vật tư, dụng cụ, công cụ, sản phẩm, hàng hóa để giải quyết."},{"k":"p","t":"PHIẾU BÁO VẬT TƯ CÒN LẠI CUỐI KỲ"},{"k":"p","t":"(Mẫu số 04 - VT)"},{"k":"p","t":"1. Mục đích: Theo dõi số lượng vật tư còn lại cuối kỳ hạch toán ở đơn vị sử dụng, làm căn cứ tính giá thành sản phẩm và kiểm tra tình hình thực hiện định mức sử dụng vật tư."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc bên trái của Phiếu báo vật tư còn lại cuối kỳ ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng."},{"k":"p","t":"Số lượng vật tư còn lại cuối kỳ ở đơn vị sử dụng được phân thành hai loại:"},{"k":"p","t":"- Nếu vật tư không cần sử dụng nữa thì lập Phiếu nhập kho (Mẫu số 02 - VT) và nộp lại kho."},{"k":"p","t":"- Nếu vật tư còn sử dụng tiếp thì bộ phận sử dụng lập Phiếu báo vật tư còn lại cuối kỳ thành 2 bản."},{"k":"p","t":"Phụ trách bộ phận sử dụng ký tên:"},{"k":"p","t":"- 1 bản giao cho phòng vật tư (nếu có);"},{"k":"p","t":"- 1 bản giao cho phòng kế toán."},{"k":"p","t":"BIÊN BẢN KIỂM KÊ VẬT TƯ, CÔNG CỤ, SẢN PHẨM, HÀNG HÓA"},{"k":"p","t":"(Mẫu số 05- VT)"},{"k":"p","t":"1. Mục đích: Biên bản kiểm kê vật tư, công cụ, sản phẩm, hàng hóa nhằm xác định số lượng, chất lượng và giá trị vật tư, công cụ, sản phẩm, hàng hóa có ở kho tại thời điểm kiểm kê làm căn cứ xác định trách nhiệm trong việc bảo quản, xử lý vật tư, công cụ, sản phẩm, hàng hóa thừa, thiếu và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản kiểm kê vật tư, công cụ, sản phẩm, hàng hóa ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng. Biên bản kiểm kê vật tư, công cụ, sản phẩm, hàng hóa phải ghi rõ giờ, ngày, tháng, năm thực hiện kiểm kê. Ban kiểm kê gồm Trưởng ban và các ủy viên."},{"k":"p","t":"Mỗi kho được kiểm kê lập 1 biên bản riêng."},{"k":"p","t":"Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, quy cách, đơn vị tính của từng loại vật tư, công cụ, sản phẩm, hàng hóa được kiểm kê tại kho."},{"k":"p","t":"Cột 1: Ghi đơn giá của từng thứ vật tư, công cụ, sản phẩm, hàng hóa (tùy theo quy định của đơn vị để ghi đơn giá cho phù hợp)."},{"k":"p","t":"Cột 2, 3: Ghi số lượng, số tiền của từng thứ vật tư, công cụ, sản phẩm, hàng hóa theo sổ kế toán."},{"k":"p","t":"Cột 4, 5: Ghi số lượng, số tiền của từng thứ vật tư, công cụ, sản phẩm, hàng hóa theo kết quả kiểm kê."},{"k":"p","t":"Nếu thừa so với sổ kế toán (cột 2, 3) ghi vào cột 6, 7, nếu thiếu ghi vào cột 8, 9."},{"k":"p","t":"Số lượng vật tư, công cụ, sản phẩm, hàng hóa thực tế kiểm kê sẽ được phân loại theo phẩm chất:"},{"k":"p","t":"- Tốt 100% ghi vào cột 10."},{"k":"p","t":"- Kém phẩm chất ghi vào cột 11."},{"k":"p","t":"- Mất phẩm chất ghi vào cột 12."},{"k":"p","t":"Nếu có chênh lệch phải trình giám đốc doanh nghiệp ghi rõ ý kiến giải quyết số chênh lệch này."},{"k":"p","t":"Biên bản được lập thành 2 bản:"},{"k":"p","t":"- 1 bản phòng kế toán lưu."},{"k":"p","t":"- 1 bản thủ kho lưu."},{"k":"p","t":"Sau khi lập xong biên bản, trưởng ban kiểm kê và thủ kho, kế toán trưởng cùng ký vào biên bản (ghi rõ họ tên)."},{"k":"p","t":"BẢNG KÊ MUA HÀNG"},{"k":"p","t":"(Mẫu số 06-VT)"},{"k":"p","t":"1. Mục đích: Là chứng từ kê khai mua vật tư, công cụ, dụng cụ, hàng hóa, dịch vụ lặt vặt trên thị trường tự do trong trường hợp người bán thuộc diện không phải lập hóa đơn khi bán hàng hóa, cung cấp dịch vụ theo quy định làm căn cứ lập phiếu nhập kho, thanh toán và hạch toán chi phí vật tư, hàng hóa,... lập trong Bảng kê khai này không được khấu trừ thuế GTGT. (Trường hợp mua vật tư, hàng hóa,... của người bán không có hóa đơn với khối lượng lớn để được tính vào chi phí hợp lý, hợp lệ thì phải lập “Bảng kê mua hàng hóa mua vào không có hóa đơn” (Mẫu số 04/GTGT) theo quy định của Luật thuế)"},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc bên trái của Bảng kê mua hàng ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng Bảng kê mua hàng. Bảng kê mua hàng phải đóng thành quyển và ghi số từng quyển dùng trong 1 năm. Mỗi quyển “Bảng kê mua hàng” phải được ghi số liên tục từ đầu quyển đến cuối quyển."},{"k":"p","t":"Ghi rõ họ tên, địa chỉ hoặc nơi làm việc của người trực tiếp mua hàng."},{"k":"p","t":"Cột A, B, C, D: Ghi số thứ tự, tên, quy cách, phẩm chất, địa chỉ mua hàng và đơn vị tính của từng thứ vật tư, công cụ, dụng cụ, hàng hóa."},{"k":"p","t":"Cột 1: Ghi số lượng của mỗi loại vật tư, công cụ, dụng cụ, hàng hóa đã mua."},{"k":"p","t":"Cột 2: Ghi đơn giá mua của từng thứ vật tư, công cụ, dụng cụ, hàng hóa đã mua."},{"k":"p","t":"Cột 3: Ghi số tiền của từng thứ vật tư, công cụ, dụng cụ, hàng hóa đã mua (Cột 3 = Cột 1 x Cột 2)."},{"k":"p","t":"Dòng cộng ghi tổng số tiền đã mua các loại vật tư, công cụ, hàng hóa ghi trong Bảng."},{"k":"p","t":"Các cột B, C, 1, 2, 3 nếu còn thừa thì được gạch 1 đường chéo từ trên xuống."},{"k":"p","t":"Bảng kê mua hàng do người mua lập 2 liên (đặt giấy than viết 1 lần)."},{"k":"p","t":"Sau khi lập xong, người mua ký và chuyển cho kế toán trưởng soát xét, ký vào Bảng kê mua hàng. Người đi mua phải chuyển “Bảng kê mua hàng” cho giám đốc hoặc người được ủy quyền duyệt và làm thủ tục nhập kho (nếu có) hoặc giao hàng cho người quản lý sử dụng."},{"k":"p","t":"Liên 1 lưu, liên 2 chuyển cho kế toán làm thủ tục thanh toán và ghi sổ."},{"k":"p","t":"BẢNG PHÂN BỔ NGUYÊN LIỆU, VẬT LIỆU, CÔNG CỤ, DỤNG CỤ"},{"k":"p","t":"(Mẫu số 07 - VT)"},{"k":"p","t":"1. Mục đích: Dùng để phản ánh tổng giá trị nguyên liệu, vật liệu, công cụ, dụng cụ xuất kho trong tháng theo giá thực tế và giá hạch toán và phân bổ giá trị nguyên liệu, vật liệu, công cụ, dụng cụ xuất dùng cho các đối tượng sử dụng hàng tháng (Ghi Có TK 152, TK 153, Nợ các tài khoản liên quan), Bảng này còn dùng để phân bổ giá trị công cụ, dụng cụ xuất dùng một lần có giá trị lớn, thời gian sử dụng dưới một năm hoặc trên một năm đang được phản ánh trên TK 242."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"- Bảng gồm các cột dọc phản ánh các loại nguyên liệu, vật liệu và công cụ, dụng cụ xuất dùng trong tháng tính theo giá hạch toán và giá thực tế, các dòng ngang phản ánh các đối tượng sử dụng nguyên liệu, vật liệu, công cụ, dụng cụ."},{"k":"p","t":"- Căn cứ vào các chứng từ xuất kho vật liệu và hệ số chênh lệch giữa giá hạch toán và giá thực tế của từng loại vật liệu để tính giá thực tế nguyên liệu, vật liệu, công cụ xuất kho."},{"k":"p","t":"Giá trị nguyên liệu, vật liệu, công cụ, dụng cụ xuất kho trong tháng theo giá thực tế phản ánh trong Bảng phân bổ nguyên liệu, vật liệu, công cụ, dụng cụ theo từng đối tượng sử dụng được dùng làm căn cứ để ghi vào bên Có các Tài khoản 152, 153, 242 của các Bảng kê và sổ kế toán liên quan tùy theo hình thức kế toán đơn vị áp dụng (Sổ Cái hoặc Nhật ký - Sổ Cái TK 152, 153,...). Số liệu của Bảng phân bổ này đồng thời được sử dụng để tập hợp chi phí tính giá thành sản phẩm, dịch vụ."},{"k":"p","t":"III. CHỈ TIÊU BÁN HÀNG \nBẢNG THANH TOÁN HÀNG ĐẠI LÝ, KÝ GỬI"},{"k":"p","t":"(Mẫu số 01 - BH)"},{"k":"p","t":"1. Mục đích: Phản ánh tình hình thanh toán hàng đại lý, ký gửi giữa đơn vị có hàng và đơn vị nhận bán hàng, là chứng từ để đơn vị có hàng và đơn vị nhận bán hàng đại lý, ký gửi thanh toán tiền và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"- Ghi rõ tên, địa chỉ hoặc đóng dấu đơn vị nhận bán hàng đại lý, ký gửi ở góc trên bên trái."},{"k":"p","t":"- Ghi rõ số, ngày, tháng, năm lập bảng thanh toán hàng đại lý, ký gửi."},{"k":"p","t":"- Ghi rõ số hiệu, ngày, tháng, năm của hợp đồng bán hàng đại lý, ký gửi."},{"k":"p","t":"Mục I Thanh toán số hàng đại lý, ký gửi:"},{"k":"p","t":"+ Cột A, B, C: Ghi số thứ tự và tên, quy cách, phẩm chất, đơn vị tính của sản phẩm, hàng hóa nhận đại lý, ký gửi."},{"k":"p","t":"+ Cột 1: Ghi số lượng hàng còn tồn cuối kỳ trước."},{"k":"p","t":"+ Cột 2: Ghi số lượng hàng nhận đại lý, ký gửi kỳ này."},{"k":"p","t":"+ Cột 3: Ghi tổng số lượng hàng nhận đại lý, ký gửi tính đến cuối kỳ này gồm số lượng hàng tồn kỳ trước chưa bán và số lượng hàng nhận kỳ này (Cột 3 = cột 1+cột 2)."},{"k":"p","t":"+ Cột 4, 5, 6: Ghi số lượng, đơn giá và số tiền của hàng hóa đã bán phải thanh toán của kỳ này. Đơn giá thanh toán là đơn giá ghi trong hợp đồng bán hàng đại lý, ký gửi giữa bên có hàng và bên nhận hàng."},{"k":"p","t":"+ Cột 7: Ghi số hàng hóa nhận đại lý, ký gửi còn tồn (tại quầy, tại kho) chưa bán được đến ngày lập bảng thanh toán."},{"k":"p","t":"Dòng cộng: Ghi tổng số tiền phải thanh toán phát sinh kỳ này."},{"k":"p","t":"Mục II: Ghi số tiền bên bán hàng đại lý, ký gửi còn nợ chưa thanh toán với bên có hàng đến thời điểm thanh toán kỳ này."},{"k":"p","t":"Mục III: Ghi số tiền bên bán hàng đại lý phải thanh toán với bên có hàng đại lý mới phát sinh đến kỳ này (Mục III = Mục II + cột 6 của Mục I)."},{"k":"p","t":"Mục IV: Ghi số tiền bên có hàng đại lý phải thanh toán với bên bán hàng đại lý về số thuế nộp hộ, tiền hoa hồng, chi phí khác, ...(nếu có)."},{"k":"p","t":"Mục V: Ghi số tiền bên bán hàng đại lý thanh toán cho bên có hàng đại lý kỳ này (ghi rõ số tiền mặt và tiền séc)."},{"k":"p","t":"Mục VI: Ghi số tiền bên bán hàng đại lý còn nợ bên có hàng đại lý đến thời điểm thanh toán (Mục VI = Mục III - Mục IV - Mục V)."},{"k":"p","t":"Bảng thanh toán hàng đại lý, ký gửi do bên nhận bán hàng đại lý, ký gửi lập thành 3 bản. Sau khi lập xong, người lập ký, chuyển cho kế toán trưởng hai bên soát xét và trình giám đốc hai bên ký duyệt đóng dấu, một bản lưu ở nơi lập (phòng kế hoạch hoặc phòng cung tiêu), 1 bản lưu ở phòng kế toán để làm chứng từ thanh toán và ghi sổ kế toán, 1 bản gửi cho bên có hàng đại lý, ký gửi."},{"k":"p","t":"THẺ QUẦY HÀNG"},{"k":"p","t":"(Mẫu số 02 - BH)"},{"k":"p","t":"1. Mục đích: Theo dõi số lượng và giá trị hàng hóa trong quá trình nhận và bán tại quầy hàng, giúp cho người bán hàng thường xuyên nắm được tình hình nhập, xuất, tồn tại quầy, làm căn cứ để kiểm tra, quản lý hàng hóa và lập bảng kê bán hàng từng ngày (kỳ)."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"- Ghi rõ họ tên, địa chỉ hoặc đóng dấu cơ quan vào góc trên bên trái."},{"k":"p","t":"- Ghi số thẻ."},{"k":"p","t":"- Ghi rõ tên hàng, quy cách, đơn vị tính và đơn giá của hàng hóa."},{"k":"p","t":"Mỗi thẻ quầy hàng theo dõi một mặt hàng, không ghi những mặt hàng khác nhau về quy cách, phẩm chất vào cùng một thẻ."},{"k":"p","t":"- Cột A, B: Ghi ngày, tháng và tên người bán hàng trong ngày (ca)."},{"k":"p","t":"- Cột 1: Ghi số lượng hàng hóa tồn đầu ngày (ca)."},{"k":"p","t":"- Cột 2: Ghi số lượng hàng hóa từ kho nhập vào quầy trong ngày (ca)."},{"k":"p","t":"- Cột 3: Ghi số lượng hàng hóa nhập trong ngày (ca) từ những nguồn khác không qua kho của đơn vị."},{"k":"p","t":"- Cột 4: Ghi tổng số lượng hàng hóa có trong ngày (ca)."},{"k":"p","t":"- Cột 5: Ghi số lượng hàng hóa xuất bán trong ngày (ca)."},{"k":"p","t":"- Cột 6: Ghi số tiền thu được của số hàng hóa bán trong ngày (ca)."},{"k":"p","t":"- Cột 7, 8: Ghi số lượng và giá trị hàng hóa xuất ra vì các mục đích khác không phải bán trong ngày (ca)."},{"k":"p","t":"- Cột 9: Ghi số lượng hàng tồn lại quầy hàng vào cuối ngày (ca)."},{"k":"p","t":"Cuối tháng cộng thẻ quầy hàng để lập báo cáo bán hàng."},{"k":"p","t":"Thẻ này do người bán hàng giữ và ghi hàng ngày (ca), trước khi sử dụng phải đăng ký với kế toán."},{"k":"p","t":"IV- CHỈ TIÊU TIỀN TỆ"},{"k":"p","t":"1. Mục đích: Theo dõi tình hình thu, chi, tồn quỹ các loại tiền mặt, ngoại tệ, và các khoản tạm ứng, thanh toán tạm ứng của đơn vị, nhằm cung cấp những thông tin cần thiết cho kế toán và người quản lý của đơn vị trong lĩnh vực tiền tệ."},{"k":"p","t":"2. Nội dung: Thuộc chỉ tiêu tiền tệ gồm các biểu mẫu sau:"},{"k":"p","t":"- Phiếu thu"},{"k":"p","t":"Mẫu số 01-TT"},{"k":"p","t":"- Phiếu chi"},{"k":"p","t":"Mẫu số 02-TT"},{"k":"p","t":"- Giấy đề nghị tạm ứng"},{"k":"p","t":"Mẫu số 03-TT"},{"k":"p","t":"- Giấy thanh toán tiền tạm ứng"},{"k":"p","t":"Mẫu số 04-TT"},{"k":"p","t":"- Giấy đề nghị thanh toán"},{"k":"p","t":"Mẫu số 05-TT"},{"k":"p","t":"- Biên lai thu tiền"},{"k":"p","t":"Mẫu số 06-TT"},{"k":"p","t":"- Bảng kê vàng bạc, kim khí quý, đá quý"},{"k":"p","t":"Mẫu số 07-TT"},{"k":"p","t":"- Bảng kiểm kê quỹ (Dùng cho VNĐ)"},{"k":"p","t":"Mẫu số 08a-TT"},{"k":"p","t":"- Bảng kiểm kê quỹ (Dùng cho ngoại tệ)"},{"k":"p","t":"Mẫu số 08b-TT"},{"k":"p","t":"- Bảng kê chi tiền"},{"k":"p","t":"Mẫu số 09-TT"},{"k":"p","t":"PHIẾU THU"},{"k":"p","t":"(Mẫu số 01- TT)"},{"k":"p","t":"1. Mục đích: Nhằm xác định số tiền mặt, ngoại tệ,... thực tế nhập quỹ và làm căn cứ để thủ quỹ thu tiền, ghi sổ quỹ, kế toán ghi sổ các khoản thu có liên quan. Mọi khoản tiền Việt Nam, ngoại tệ nhập quỹ đều phải có Phiếu thu."},{"k":"p","t":"Đối với ngoại tệ trước khi nhập quỹ phải được kiểm tra và lập “Bảng kê ngoại tệ” đính kèm với Phiếu thu."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"- Góc trên bên trái của Phiếu thu phải ghi rõ tên đơn vị và địa chỉ đơn vị."},{"k":"p","t":"- Phiếu thu phải đóng thành quyển và ghi số từng quyển dùng trong 1 năm. Trong mỗi Phiếu thu phải ghi số quyển và số của từng Phiếu thu. Số phiếu thu phải đánh liên tục trong 1 kỳ kế toán. Từng Phiếu thu phải ghi rõ ngày, tháng, năm lập phiếu, ngày, tháng, năm thu tiền."},{"k":"p","t":"- Ghi rõ họ, tên, địa chỉ người nộp tiền."},{"k":"p","t":"- Dòng “Lý do nộp” ghi rõ nội dung nộp tiền như: Thu tiền bán hàng hóa, sản phẩm, thu tiền tạm ứng còn thừa,..."},{"k":"p","t":"- Dòng “Số tiền”: Ghi bằng số và bằng chữ số tiền nộp quỹ, ghi rõ đơn vị tính là đồng VN, hay USD…"},{"k":"p","t":"- Dòng tiếp theo ghi số lượng chứng từ gốc kèm theo Phiếu thu."},{"k":"p","t":"Phiếu thu do kế toán lập thành 3 liên, ghi đầy đủ các nội dung trên phiếu và ký vào Phiếu thu, sau đó chuyển cho kế toán trưởng soát xét và giám đốc ký duyệt, chuyển cho thủ quỹ làm thủ tục nhập quỹ. Sau khi đã nhận đủ số tiền, thủ quỹ ghi số tiền thực tế nhập quỹ (bằng chữ) vào Phiếu thu trước khi ký và ghi rõ họ tên."},{"k":"p","t":"Thủ quỹ giữ lại 1 liên để ghi sổ quỹ, 1 liên giao cho người nộp tiền, 1 liên lưu nơi lập phiếu. Cuối ngày toàn bộ Phiếu thu kèm theo chứng từ gốc chuyển cho kế toán để ghi sổ kế toán."},{"k":"p","t":"Chú ý:"},{"k":"p","t":"+ Nếu là thu ngoại tệ phải ghi rõ tỷ giá tại thời điểm nhập quỹ để tính ra tổng số tiền theo đơn vị đồng để ghi sổ."},{"k":"p","t":"+ Liên phiếu thu gửi ra ngoài doanh nghiệp phải đóng dấu."},{"k":"p","t":"PHIẾU CHI"},{"k":"p","t":"(Mẫu số 02 - TT)"},{"k":"p","t":"1. Mục đích: Nhằm xác định các khoản tiền mặt, ngoại tệ thực tế xuất quỹ và làm căn cứ để thủ quỹ xuất quỹ, ghi sổ quỹ và kế toán ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của chứng từ ghi rõ tên đơn vị và địa chỉ đơn vị."},{"k":"p","t":"- Phiếu chi phải đóng thành quyển, trong mỗi Phiếu chi phải ghi số quyển và số của từng Phiếu chi. Số phiếu chi phải đánh liên tục trong 1 kỳ kế toán. Từng Phiếu chi phải ghi rõ ngày, tháng, năm lập phiếu, ngày, tháng, năm chi tiền."},{"k":"p","t":"- Ghi rõ họ, tên, địa chỉ người nhận tiền."},{"k":"p","t":"- Dòng “Lý do chi” ghi rõ nội dung chi tiền."},{"k":"p","t":"- Dòng “Số tiền”: Ghi bằng số hoặc bằng chữ số tiền xuất quỹ, ghi rõ đơn vị tính là đồng VN, hay USD ..."},{"k":"p","t":"- Dòng tiếp theo ghi số lượng chứng từ gốc kèm theo Phiếu chi."},{"k":"p","t":"Phiếu chi được lập thành 3 liên và chỉ sau khi có đủ chữ ký (Ký theo từng liên) của người lập phiếu, kế toán trưởng, giám đốc, thủ quỹ mới được xuất quỹ. Sau khi nhận đủ số tiền người nhận tiền phải ghi số tiền đã nhận bằng chữ, ký tên và ghi rõ họ, tên vào Phiếu chi."},{"k":"p","t":"Liên 1 lưu ở nơi lập phiếu."},{"k":"p","t":"Liên 2 thủ quỹ dùng để ghi sổ quỹ và chuyển cho kế toán cùng với chứng từ gốc để vào sổ kế toán."},{"k":"p","t":"Liên 3 giao cho người nhận tiền."},{"k":"p","t":"Chú ý:"},{"k":"p","t":"+ Nếu là chi ngoại tệ phải ghi rõ tỷ giá, đơn giá tại thời điểm xuất quỹ để tính ra tổng số tiền theo đơn vị đồng tiền ghi sổ."},{"k":"p","t":"+ Liên phiếu chi gửi ra ngoài doanh nghiệp phải đóng dấu."},{"k":"p","t":"GIẤY ĐỀ NGHỊ TẠM ỨNG"},{"k":"p","t":"(Mẫu số 03 - TT)"},{"k":"p","t":"1. Mục đích: Giấy đề nghị tạm ứng là căn cứ để xét duyệt tạm ứng, làm thủ tục lập phiếu chi và xuất quỹ cho tạm ứng."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Giấy đề nghị tạm ứng ghi rõ tên đơn vị, tên bộ phận. Giấy đề nghị tạm ứng do người xin tạm ứng viết 1 liên và ghi rõ gửi giám đốc doanh nghiệp (Người xét duyệt tạm ứng)."},{"k":"p","t":"- Người xin tạm ứng phải ghi rõ họ tên, đơn vị, bộ phận và số tiền xin tạm ứng (Viết bằng số và bằng chữ)."},{"k":"p","t":"- Lý do tạm ứng ghi rõ mục đích sử dụng tiền tạm ứng như: Tiền công tác phí, mua văn phòng phẩm, tiếp khách ..."},{"k":"p","t":"- Thời hạn thanh toán: Ghi rõ ngày, tháng hoàn lại số tiền đã tạm ứng."},{"k":"p","t":"Giấy đề nghị tạm ứng được chuyển cho kế toán trưởng xem xét và ghi ý kiến đề nghị giám đốc duyệt chi. Căn cứ quyết định của giám đốc, kế toán lập phiếu chi kèm theo giấy đề nghị tạm ứng và chuyển cho thủ quỹ làm thủ tục xuất quỹ."},{"k":"p","t":"GIẤY THANH TOÁN TIỀN TẠM ỨNG"},{"k":"p","t":"(Mẫu số 04 - TT)"},{"k":"p","t":"1. Mục đích: Giấy thanh toán tiền tạm ứng là bảng liệt kê các khoản tiền đã nhận tạm ứng và các khoản đã chi của người nhận tạm ứng, làm căn cứ thanh toán số tiền tạm ứng và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Giấy đề nghị tạm ứng ghi rõ tên đơn vị, tên bộ phận. Phần đầu ghi rõ ngày, tháng, năm, số hiệu của giấy thanh toán tiền tạm ứng; Họ tên, đơn vị người thanh toán."},{"k":"p","t":"Căn cứ vào chỉ tiêu của cột A, kế toán ghi vào cột 1 như sau:"},{"k":"p","t":"Mục I- Số tiền tạm ứng: Gồm số tiền tạm ứng các kỳ trước chưa chi hết và số tạm ứng kỳ này, gồm:"},{"k":"p","t":"Mục 1: Số tạm ứng các kỳ trước chưa chi hết: Căn cứ vào dòng số dư tạm ứng tính đến ngày lập phiếu thanh toán trên sổ kế toán đế ghi."},{"k":"p","t":"Mục 2: Số tạm ứng kỳ này: Căn cứ vào các phiếu chi tạm ứng để ghi, mỗi phiếu chi ghi 1 dòng."},{"k":"p","t":"Mục II- Số tiền đã chi: Căn cứ vào các chứng từ chi tiêu của người nhận tạm ứng để ghi vào mục này. Mỗi chứng từ chi tiêu ghi 1 dòng."},{"k":"p","t":"Mục III- Chênh lệch: Là số chênh lệch giữa Mục I và Mục II."},{"k":"p","t":"- Nếu số tạm ứng chi không hết ghi vào dòng 1 của Mục III."},{"k":"p","t":"- Nếu chi quá số tạm ứng ghi vào dòng 2 của Mục III."},{"k":"p","t":"Sau khi lập xong giấy thanh toán tiền tạm ứng, kế toán thanh toán chuyển cho kế toán trưởng soát xét và giám đốc doanh nghiệp duyệt. Giấy thanh toán tiền tạm ứng kèm theo chứng từ gốc được dùng làm căn cứ ghi sổ kế toán."},{"k":"p","t":"Phần chênh lệch tiền tạm ứng chi không hết phải làm thủ tục thu hồi nộp quỹ hoặc trừ vào lương. Phần chi quá số tạm ứng phải làm thủ tục xuất quỹ trả lại cho người tạm ứng. Chứng từ gốc, giấy thanh toán tạm ứng phải đính kèm phiếu thu hoặc phiếu chi có liên quan."},{"k":"p","t":"GIẤY ĐỀ NGHỊ THANH TOÁN"},{"k":"p","t":"(Mẫu số 05 - TT)"},{"k":"p","t":"1. Mục đích: Giấy đề nghị thanh toán dùng trong trường hợp đã chi nhưng chưa được thanh toán hoặc chưa nhận tạm ứng để tổng hợp các khoản đã chi kèm theo chứng từ (nếu có) để làm thủ tục thanh toán, làm căn cứ thanh toán và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Giấy đề nghị thanh toán ghi rõ tên đơn vị, bộ phận. Giấy đề nghị thanh toán do người đề nghị thanh toán viết 1 liên và ghi rõ gửi giám đốc doanh nghiệp (Hoặc người xét duyệt chi)."},{"k":"p","t":"- Người đề nghị thanh toán phải ghi rõ họ tên, địa chỉ (đơn vị, bộ phận) và số tiền đề nghị thanh toán (Viết bằng số và bằng chữ)."},{"k":"p","t":"- Nội dung thanh toán: Ghi rõ nội dung đề nghị thanh toán."},{"k":"p","t":"- Giấy đề nghị thanh toán phải ghi rõ số lượng chứng từ gốc đính kèm."},{"k":"p","t":"Sau khi mua hàng hoặc sau khi chi tiêu cho những nhiệm vụ được giao, người mua hàng hoặc chi tiêu lập giấy đề nghị thanh toán. Giấy đề nghị thanh toán được chuyển cho kế toán trưởng soát xét và ghi ý kiến đề nghị giám đốc doanh nghiệp (Hoặc người được ủy quyền) duyệt chi. Căn cứ quyết định của giám đốc, kế toán lập phiếu chi kèm theo giấy đề nghị thanh toán và chuyển cho thủ quỹ làm thủ tục xuất quỹ."},{"k":"p","t":"BIÊN LAI THU TIỀN"},{"k":"p","t":"(Mẫu số 06- TT)"},{"k":"p","t":"1. Mục đích: Biên lai thu tiền là giấy biên nhận của doanh nghiệp hoặc cá nhân đã thu tiền hoặc thu séc của người nộp làm căn cứ để lập phiếu thu, nộp tiền vào quỹ, đồng thời để người nộp thanh toán với cơ quan hoặc lưu quỹ."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Biên lai thu tiền phải đóng thành quyển, phải ghi rõ tên đơn vị, địa chỉ của đơn vị thu tiền và đóng dấu đơn vị, phải đánh số từng quyển. Trong mỗi quyển phải ghi rõ số hiệu của từng tờ biên lai thu tiền liên tục trong 1 quyển."},{"k":"p","t":"Ghi rõ họ tên, địa chỉ của người nộp tiền."},{"k":"p","t":"- Dòng “Nội dung thu” ghi rõ nội dung thu tiền."},{"k":"p","t":"- Dòng “Số tiền thu” ghi bằng số và bằng chữ số tiền nộp, ghi rõ đơn vị tính là “đồng” hoặc USD..."},{"k":"p","t":"Nếu thu bằng séc phải ghi rõ số, ngày, tháng, năm của tờ séc bắt đầu lưu hành và họ tên người sử dụng séc."},{"k":"p","t":"Biên lai thu tiền được lập thành hai liên (Đặt giấy than viết một lần)."},{"k":"p","t":"Sau khi thu tiền, người thu tiền và người nộp tiền cùng ký và ghi rõ họ tên để xác nhận số tiền đã thu, đã nộp. Ký xong người thu tiền lưu 1 liên, còn liên 2 giao cho người nộp tiền giữ."},{"k":"p","t":"Cuối ngày, người được đơn vị giao nhiệm vụ thu tiền phải căn cứ vào bản biên lai lưu để lập Bảng kê biên lai thu tiền trong ngày (Nếu thu séc phải lập Bảng kê thu séc riêng) và nộp cho kế toán để kế toán lập phiếu thu làm thủ tục nhập quỹ hoặc làm thủ tục nộp ngân hàng. Tiền mặt thu được ngày nào, người thu tiền phải nộp quỹ ngày đó."},{"k":"p","t":"Biên lai thu tiền áp dụng trong các trường hợp thu tiền phạt, lệ phí, ngoài pháp luật phí, lệ phí... và các trường hợp khách hàng nộp séc thanh toán với các khoản nợ."},{"k":"p","t":"BẢNG KÊ VÀNG BẠC, KIM KHÍ QUÝ, ĐÁ QUÝ"},{"k":"p","t":"(Mẫu số 07- TT)"},{"k":"p","t":"1. Mục đích: Bảng kê vàng bạc, kim khí quý, đá quý dùng để liệt kê số vàng bạc, kim khí quý, đá quý của đơn vị, nhằm quản lý chặt chẽ, chính xác các loại vàng bạc, kim khí quý, đá quý có tại đơn vị và làm căn cứ cùng với chứng từ gốc để lập chứng từ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Cột A, B: Ghi số thứ tự và tên, loại, qui cách, phẩm chất của vàng bạc, kim khí quý, đá quý..."},{"k":"p","t":"Cột C: Ghi đơn vị tính: gam, chỉ, Kg."},{"k":"p","t":"Cột 1: Ghi số lượng của từng loại."},{"k":"p","t":"Cột 2: Ghi đơn giá của từng loại."},{"k":"p","t":"Cột 3: Bằng cột 1 nhân ( x ) cột 2."},{"k":"p","t":"Ghi chú: Khi cần thiết, tại cột B có thể ghi rõ ký hiệu của loại vàng bạc, kim khí quý, đá quý."},{"k":"p","t":"Bảng kê phải có đầy đủ chữ ký và ghi rõ họ tên như quy định."},{"k":"p","t":"BẢNG KIỂM KÊ QUỸ"},{"k":"p","t":"(Dùng cho VNĐ)"},{"k":"p","t":"(Mẫu số 08a-TT)"},{"k":"p","t":"1. Mục đích: Bảng kiểm kê quỹ nhằm xác nhận tiền bằng VNĐ tồn quỹ thực tế và số thừa, thiếu so với sổ quỹ trên cơ sở đó tăng cường quản lý quỹ và làm cơ sở qui trách nhiệm vật chất, ghi sổ kế toán số chênh lệch."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản kiểm kê quỹ tiền mặt phải ghi rõ tên đơn vị (hoặc đóng dấu), bộ phận."},{"k":"p","t":"Việc kiểm kê quỹ được tiến hành định kỳ vào cuối tháng, cuối quí, cuối năm hoặc khi cần thiết có thể kiểm kê đột xuất hoặc khi bàn giao quỹ. Khi tiến hành kiểm kê phải lập Ban kiểm kê, trong đó, thủ quỹ và kế toán tiền mặt hoặc kế toán thanh toán là các thành viên. Biên bản kiểm kê quỹ phải ghi rõ số hiệu chứng từ và thời điểm kiểm kê (....giờ ....ngày ....tháng ....năm ....). Trước khi kiểm kê quỹ, thủ quỹ phải ghi sổ quỹ tất cả các phiếu thu, phiếu chi và tính số dư tồn quỹ đến thời điểm kiểm kê."},{"k":"p","t":"- Khi tiến hành kiểm kê phải tiến hành kiểm kê riêng từng loại tiền có trong quỹ."},{"k":"p","t":"- Dòng “Số dư theo sổ quỹ”: Căn cứ vào số tồn quỹ trên sổ quỹ tại ngày, giờ cộng sổ kiểm kê quỹ để ghi vào cột 2."},{"k":"p","t":"- Dòng “Số kiểm kê thực tế”: Căn cứ vào số kiểm kê thực tế để ghi theo từng loại tiền vào cột 1 và tính ra tổng số tiền để ghi vào cột 2."},{"k":"p","t":"- Dòng chênh lệch: Ghi số chênh lệch thừa hoặc thiếu giữa số dư theo sổ quỹ với số kiểm kê thực tế."},{"k":"p","t":"Trên Bảng kiểm kê quỹ cần phải xác định và ghi rõ nguyên nhân gây ra thừa hoặc thiếu quỹ, có ý kiến nhận xét và kiến nghị của Ban kiểm kê. Bảng kiểm kê quỹ phải có chữ ký của thủ quỹ, Trưởng ban kiểm kê và kế toán trưởng. Mọi khoản chênh lệch quỹ đều phải báo cáo giám đốc doanh nghiệp xem xét giải quyết."},{"k":"p","t":"Bảng kiểm kê quỹ do ban kiểm kê quỹ lập thành 2 bản:"},{"k":"p","t":"- 1 bản lưu ở thủ quỹ."},{"k":"p","t":"- 1 bản lưu ở kế toán quỹ tiền mặt hoặc kế toán thanh toán."},{"k":"p","t":"BẢNG KIỂM KÊ NGOẠI TỆ, VÀNG BẠC, KIM KHÍ QUÝ, ĐÁ QUÝ"},{"k":"p","t":"(Mẫu số 08 b-TT)"},{"k":"p","t":"1. Mục đích: Biên bản nhằm xác nhận tiền ngoại tệ, vàng bạc, kim khí quý, đá quý, ... tồn thực tế và số thừa, thiếu so với sổ kế toán trên cơ sở đó tăng cường quản lý ngoại tệ, vàng bạc, kim khí quý, đá quý và làm cơ sở qui trách nhiệm vật chất, ghi sổ kế toán số chênh lệch."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái ghi tên đơn vị, bộ phận. Việc kiểm kê ngoại tệ, vàng bạc, kim khí quý, đá quý được tiến hành định kỳ vào cuối tháng, cuối quí, cuối năm hoặc khi cần thiết có thể kiểm kê đột xuất hoặc khi bàn giao ngoại tệ, vàng bạc, kim khí quý, đá quý. Khi tiến hành kiểm kê phải lập ban kiểm kê, trong đó, thủ quỹ hoặc người quản lý ngoại tệ, vàng bạc, kim khí quý, đá quý và kế toán hàng tồn kho (vàng bạc, kim khí quý, đá quý là hàng tồn kho) hoặc kế toán đầu tư khác (vàng bạc, kim khí quý, đá quý không phải là hàng tồn kho) là các thành viên."},{"k":"p","t":"Biên bản kiểm kê quỹ phải ghi rõ số hiệu chứng từ và thời điểm kiểm kê (...giờ ....ngày ....tháng ....năm ....). Trước khi kiểm kê ngoại tệ, vàng bạc, kim khí quý, đá quý, thủ quỹ hoặc người có trách nhiệm quản lý vàng bạc, kim khí quý, đá quý phải ghi sổ tất cả các chứng từ kế toán và tính số dư tồn ngoại tệ, vàng bạc, kim khí quý, đá quý đến thời điểm kiểm kê."},{"k":"p","t":"- Khi tiến hành kiểm kê phải tiến hành kiểm kê riêng từng loại ngoại tệ, vàng bạc, kim khí quý, đá quý hiện có như: ngoại tệ, vàng bạc, kim khí quý, đá quý."},{"k":"p","t":"- Dòng “Số dư theo sổ kế toán”: Căn cứ vào sổ quỹ của thủ quỹ hoặc sổ theo dõi chi tiết hàng tồn kho, đầu tư khác tại ngày, giờ kiểm kê quỹ để ghi vào cột 2, 4."},{"k":"p","t":"- Dòng “Kiểm kê thực tế”: Căn cứ vào số kiểm kê thực tế để ghi theo từng loại ngoại tệ, vàng bạc, kim khí quý, đá quý."},{"k":"p","t":"- Dòng chênh lệch: Ghi số chênh lệch thừa hoặc thiếu giữa số dư theo sổ kế toán với số kiểm kê thực tế."},{"k":"p","t":"Trên Bảng kiểm kê ngoại tệ, vàng bạc, kim khí quý, đá quý cần phải xác định và ghi rõ nguyên nhân gây ra thừa hoặc thiếu, có ý kiến nhận xét và kiến nghị của Ban kiểm kê. Bảng kiểm kê ngoại tệ, vàng bạc, kim khí quý, đá quý phải có chữ ký (ghi rõ họ tên) của thủ quỹ hoặc người có trách nhiệm quản lý vàng bạc, kim khí quý, đá quý, trưởng ban kiểm kê và kế toán trưởng. Mọi khoản chênh lệch quỹ đều phải báo cáo giám đốc doanh nghiệp xem xét giải quyết."},{"k":"p","t":"Bảng kiểm kê ngoại tệ, vàng bạc, kim khí quý, đá quý do ban kiểm kê lập thành 2 bản:"},{"k":"p","t":"- 1 bản lưu ở thủ quỹ hoặc người có trách nhiệm quản lý vàng bạc, kim khí quý, đá quý"},{"k":"p","t":"- 1 bản lưu ở kế toán quỹ hoặc kế toán hàng tồn kho, các khoản đầu tư khác của doanh nghiệp."},{"k":"p","t":"BẢNG KÊ CHI TIỀN"},{"k":"p","t":"(Mẫu số 09-TT)"},{"k":"p","t":"1. Mục đích: Bảng kê chi tiền là bảng liệt kê các khoản tiền đã chi, làm căn cứ quyết toán các khoản tiền đã chi và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái ghi rõ tên đơn vị. Phần đầu ghi rõ họ tên, bộ phận, địa chỉ của người chi tiền và ghi rõ nội dung chi cho công việc gì."},{"k":"p","t":"- Cột A, B, C, D ghi rõ số thứ tự, số hiệu, ngày, tháng chứng từ và diễn giải nội dung chi của từng chứng từ."},{"k":"p","t":"- Cột 1: Ghi số tiền."},{"k":"p","t":"Bảng kê chi tiền phải ghi rõ tổng số tiền bằng chữ và số chứng từ gốc đính kèm."},{"k":"p","t":"Bảng kê chi tiền được lập thành 2 bản:"},{"k":"p","t":"- 1 bản lưu ở thủ quỹ."},{"k":"p","t":"- 1 bản lưu ở kế toán quỹ."},{"k":"p","t":"V. CHỈ TIÊU TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"1. Mục đích: Theo dõi tình hình biến động về số lượng, chất lượng và giá trị của TSCĐ. Giám đốc chặt chẽ tình hình sử dụng, thanh lý và sửa chữa lớn tài sản cố định."},{"k":"p","t":"2. Nội dung: Thuộc chỉ tiêu vật tư gồm các biểu mẫu sau:"},{"k":"tbl","rows":[["- Biên bản giao nhận TSCĐ","Mẫu số 01 - TSCĐ"],["- Biên bản thanh lý TSCĐ","Mẫu số 02 - TSCĐ"],["- Biên bản bàn giao TSCĐ sửa chữa lớn hoàn thành","Mẫu số 03 - TSCĐ"],["- Biên bản đánh giá lại TSCĐ","Mẫu số 04 - TSCĐ"],["- Biên bản kiểm kê TSCĐ","Mẫu số 05 - TSCĐ"],["- Bảng tính và phân bổ khấu hao TSCĐ","Mẫu số 06 - TSCĐ"]]},{"k":"p","t":"BIÊN BẢN GIAO NHẬN TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"(Mẫu số 01 -TSCĐ)"},{"k":"p","t":"1. Mục đích: Nhằm xác nhận việc giao nhận TSCĐ sau khi hoàn thành xây dựng, mua sắm, được cấp trên cấp, được tặng, biếu, viện trợ, nhận góp vốn, TSCĐ thuê ngoài...đưa vào sử dụng tại đơn vị hoặc tài sản của đơn vị bàn giao cho đơn vị khác theo lệnh của cấp trên, theo hợp đồng góp vốn,...(không sử dụng biên bản giao nhận TSCĐ trong trường hợp nhượng bán, thanh lý hoặc tài sản cố định phát hiện thừa, thiếu khi kiểm kê). Biên bản giao nhận TSCĐ là căn cứ để giao nhận TSCĐ và kế toán ghi sổ (thẻ) TSCĐ, sổ kế toán có liên quan."},{"k":"p","t":"2 . Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản giao nhận TSCĐ ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng. Khi có tài sản mới đưa vào sử dụng hoặc điều tài sản cho đơn vị khác, đơn vị phải lập hội đồng bàn giao gồm: Đại diện bên giao, đại diện bên nhận và 1 số ủy viên."},{"k":"p","t":"Biên bản giao nhận TSCĐ lập cho từng TSCĐ. Đối với trường hợp giao nhận cùng một lúc nhiều tài sản cùng loại, cùng giá trị và do cùng 1 đơn vị giao có thể lập chung 1 biên bản giao nhận TSCĐ."},{"k":"p","t":"Cột A, B: Ghi số thứ tự, tên, ký mã hiệu, qui cách (cấp hạng) của TSCĐ."},{"k":"p","t":"Cột C: Ghi số hiệu TSCĐ."},{"k":"p","t":"Cột D: Ghi nước sản xuất (xây dựng)."},{"k":"p","t":"Cột 1: Ghi năm sản xuất."},{"k":"p","t":"Cột 2: Ghi năm bắt đầu đưa vào sử dụng."},{"k":"p","t":"Cột 3: Ghi công suất (diện tích, thiết kế) như xe FORD 16 chỗ ngồi, hoặc máy phát điện 75 KVA, ..."},{"k":"p","t":"Cột 4, 5, 6, 7: Ghi các yếu tố cấu thành nên nguyên giá TSCĐ gồm: Giá mua (hoặc giá thành sản xuất) (cột 4); chi phí vận chuyển, lắp đặt (cột 5); chi phí chạy thử (cột 6)."},{"k":"p","t":"Cột 8: Ghi nguyên giá TSCĐ (cột 7 = cột 4 + cột 5 + cột 6 +...)."},{"k":"p","t":"Cột E: Ghi những tài liệu kỹ thuật kèm theo TSCĐ khi bàn giao."},{"k":"p","t":"Bảng kê phụ tùng kèm theo: Liệt kê số phụ tùng, dụng cụ đồ nghề kèm theo TSCĐ khi bàn giao."},{"k":"p","t":"Sau khi bàn giao xong các thành viên ban giao, nhận TSCĐ cùng ký vào biên bản."},{"k":"p","t":"Biên bản giao nhận TSCĐ được lập thành 2 bản, mỗi bên (giao, nhận) giữ 1 bản chuyển cho phòng kế toán để ghi sổ kế toán và lưu."},{"k":"p","t":"BIÊN BẢN THANH LÝ TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"(Mẫu số 02 -TSCĐ)"},{"k":"p","t":"1. Mục đích: Xác nhận việc thanh lý TSCĐ và làm căn cứ để ghi giảm TSCĐ trên sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản thanh lý TSCĐ ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng. Khi có quyết định về việc thanh lý TSCĐ doanh nghiệp phải thành lập Ban thanh lý TSCĐ. Thành viên Ban thanh lý TSCĐ được ghi chép ở Mục I."},{"k":"p","t":"Ở Mục II ghi các chỉ tiêu chung về TSCĐ có quyết định thanh lý như:"},{"k":"p","t":"- Tên, ký hiệu TSCĐ, số hiệu, số thẻ TSCĐ, nước sản xuất, năm đưa vào sử dụng."},{"k":"p","t":"- Nguyên giá TSCĐ, giá trị hao mòn đã trích cộng dồn đến thời điểm thanh lý, giá trị còn lại của TSCĐ đó."},{"k":"p","t":"Mục III ghi kết luận của Ban thanh lý, ghi ý kiến nhận xét của Ban về việc thanh lý TSCĐ."},{"k":"p","t":"Mục IV, kết quả thanh lý: Sau khi thanh lý xong căn cứ vào chứng từ tính toán tổng số chi phí thanh lý thực tế và giá trị thu hồi ghi vào dòng chi phí thanh lý và giá trị thu hồi (giá trị phụ tùng, phế liệu thu hồi tính theo giá thực tế đã bán hoặc giá bán ước tính)."},{"k":"p","t":"Biên bản thanh lý phải do Ban thanh lý TSCĐ lập và có đầy đủ chữ ký, ghi rõ họ tên của trưởng Ban thanh lý, kế toán trưởng và giám đốc doanh nghiệp."},{"k":"p","t":"BIÊN BẢN BÀN GIAO TSCĐ SỬA CHỮA LỚN HOÀN THÀNH"},{"k":"p","t":"(Mẫu số 03 -TSCĐ)"},{"k":"p","t":"1. Mục đích: Xác nhận việc bàn giao TSCĐ sau khi hoàn thành việc sửa chữa lớn giữa bên có TSCĐ sửa chữa và bên thực hiện việc sửa chữa. Là căn cứ ghi sổ kế toán và thanh toán chi phí sửa chữa TSCĐ."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản bàn giao TSCĐ sửa chữa lớn hoàn thành ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng. Khi có TSCĐ sửa chữa lớn hoàn thành phải tiến hành lập Ban giao nhận gồm đại diện bên thực hiện việc sửa chữa và đại diện bên có TSCĐ sửa chữa."},{"k":"p","t":"Biên bản bàn giao TSCĐ sửa chữa lớn hoàn thành gồm 2 phần chính:"},{"k":"p","t":"1 - Ghi tên, ký hiệu, số hiệu TSCĐ sửa chữa."},{"k":"p","t":"Nơi quản lý sử dụng TSCĐ và ghi rõ thời gian bắt đầu sửa chữa và hoàn thành việc sửa chữa TSCĐ."},{"k":"p","t":"2 - Các bộ phận sửa chữa."},{"k":"p","t":"Cột A: Ghi rõ tên của bộ phận cần phải sửa chữa của TSCĐ."},{"k":"p","t":"Cột B: Ghi nội dung (Mức độ) của công việc sửa chữa như: Thay thế mới hoặc sửa chữa, tân trang lại v.v..."},{"k":"p","t":"Cột 1: Ghi giá dự toán (Giá kế hoạch) (Đối với trường hợp đơn vị tự làm) hoặc giá hợp đồng hai bên đã thỏa thuận (Đối với trường hợp thuê ngoài) của từng bộ phận cần sửa chữa."},{"k":"p","t":"Cột 2: Ghi số chi phí thực tế đã chi cho từng bộ phận sửa chữa (Đối với trường hợp đơn vị tự sửa chữa)."},{"k":"p","t":"Đối với trường hợp thuê ngoài sửa chữa thì chỉ ghi vào cột này khi có sự thay đổi về giá cả (So với giá ghi theo hợp đồng) phát sinh trong quá trình sửa chữa được bên có TSCĐ sửa chữa chấp nhận thanh toán."},{"k":"p","t":"Cột 3: Ghi rõ kết quả kiểm tra của từng bộ phận sau khi đã sửa chữa xong."},{"k":"p","t":"- Kết luận: Ghi ý kiến nhận xét tổng thể về việc sửa chữa lớn TSCĐ của Hội đồng giao nhận."},{"k":"p","t":"Biên bản giao nhận TSCĐ sửa chữa lớn hoàn thành lập thành 2 bản, đại diện đơn vị hai bên giao, nhận cùng ký và mỗi bên giữ một bản, sau đó chuyển cho kế toán trưởng của đơn vị có TSCĐ sửa chữa, soát xét xong lưu tại phòng kế toán."},{"k":"p","t":"BIÊN BẢN ĐÁNH GIÁ LẠI TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"(Mẫu số 04 -TSCĐ)"},{"k":"p","t":"1. Mục đích: Xác nhận việc đánh giá lại TSCĐ và làm căn cứ để ghi sổ kế toán và các tài liệu liên quan đến số chênh lệch (tăng, giảm) do đánh giá lại TSCĐ."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản đánh giá lại TSCĐ ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng. Khi có quyết định đánh giá lại TSCĐ, đơn vị phải thành lập Hội đồng đánh giá TSCĐ."},{"k":"p","t":"Cột A, B, C, D: Ghi số thứ tự, tên, ký mã hiệu, qui cách (cấp hạng) số hiệu và số thẻ của TSCĐ."},{"k":"p","t":"Cột 1, 2, 3: Ghi nguyên giá, giá trị hao mòn và giá trị còn lại của TSCĐ trên sổ kế toán tại thời điểm đánh giá."},{"k":"p","t":"Cột 4: Ghi giá trị còn lại của TSCĐ sau khi đánh giá lại. Trường hợp đánh giá lại cả giá trị hao mòn thì cột này được chia thành 3 cột tương ứng cột 1, 2, 3 để ghi."},{"k":"p","t":"Cột 5, 6: Ghi số chênh lệch giữa giá đánh giá so với giá trị đang ghi trên sổ kế toán trong trường hợp kiểm kê đánh giá lại cả nguyên giá, giá trị hao mòn và giá trị còn lại thì các cột này được chia ra 3 cột tương ứng để lấy số liệu ghi sổ kế toán."},{"k":"p","t":"Sau khi đánh giá xong, Hội đồng có trách nhiệm lập biên bản ghi đầy đủ các nội dung và các thành viên trong Hội đồng ký, ghi rõ họ tên vào Biên bản đánh giá lại TSCĐ."},{"k":"p","t":"Biên bản đánh giá lại TSCĐ được lập thành 2 bản, 1 bản lưu tại phòng kế toán để ghi sổ kế toán và 1 bản lưu cùng với hồ sơ kỹ thuật của TSCĐ."},{"k":"p","t":"BIÊN BẢN KIỂM KÊ TÀI SẢN CỐ ĐỊNH"},{"k":"p","t":"(Mẫu số 05- TSCĐ)"},{"k":"p","t":"1. Mục đích: Biên bản kiểm kê tài sản cố định nhằm xác nhận số lượng, giá trị tài sản cố định hiện có, thừa thiếu so với số kế toán trên cơ sở đó tăng cường quản lý tài sản cố định và làm cơ sở quy trách nhiệm vật chất, ghi sổ kế toán số chênh lệch."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Biên bản Kiểm kê TSCĐ ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng. Việc kiểm kê tài sản cố định được thực hiện theo quy định của pháp luật và theo yêu cầu của đơn vị. Khi tiến hành kiểm kê phải lập Ban kiểm kê, trong đó kế toán theo dõi tài sản cố định là thành viên."},{"k":"p","t":"Biên bản kiểm kê TSCĐ phải ghi rõ thời điểm kiểm kê: (... giờ ... ngày ... tháng ... năm ...)."},{"k":"p","t":"Khi tiến hành kiểm kê phải tiến hành kiểm kê theo từng đối tượng ghi tài sản cố định."},{"k":"p","t":"Dòng “Theo sổ kế toán” căn cứ vào sổ kế toán TSCĐ phải ghi cả 3 chỉ tiêu: Số lượng, nguyên giá, giá trị còn lại vào cột 1, 2, 3."},{"k":"p","t":"Dòng “Theo kiểm kê” căn cứ vào kết quả kiểm kê thực tế để ghi theo từng đối tượng TSCĐ, phải ghi cả 3 chỉ tiêu: số lượng, nguyên giá, giá trị còn lại vào cột 4, 5, 6."},{"k":"p","t":"Dòng “Chênh lệch” ghi số chênh lệch thừa hoặc thiếu theo 3 chỉ tiêu: Số lượng, nguyên giá, giá trị còn lại vào cột 7, 8, 9."},{"k":"p","t":"Trên Biên bản kiểm kê TSCĐ cần phải xác định và ghi rõ nguyên nhân gây ra thừa hoặc thiếu TSCĐ, có ý kiến nhận xét và kiến nghị của Ban kiểm kê. Biên bản kiểm kê TSCĐ phải có chữ ký (ghi rõ họ tên) của Trưởng ban kiểm kê, chữ ký soát xét của kế toán trưởng và giám đốc doanh nghiệp duyệt. Mọi khoản chênh lệch về TSCĐ của đơn vị đều phải báo cáo giám đốc doanh nghiệp xem xét."},{"k":"p","t":"BẢNG TÍNH VÀ PHÂN BỔ KHẤU HAO TSCĐ"},{"k":"p","t":"(Mẫu số 06 - TSCĐ)"},{"k":"p","t":"1. Mục đích: Dùng để phản ánh số khấu hao TSCĐ phải trích và phân bổ số khấu hao đó cho các đối tượng sử dụng TSCĐ hàng tháng."},{"k":"p","t":"2. Kết cấu và nội dung chủ yếu"},{"k":"p","t":"Bảng tính và phân bổ khấu hao TSCĐ có các cột dọc phản ánh số khấu hao phải tính cho từng đối tượng sử dụng TSCĐ và các hàng ngang phản ánh số khấu hao tính trong tháng trước, số khấu hao tăng, giảm và số khấu hao phải tính trong tháng này."},{"k":"p","t":"Cơ sở lập:"},{"k":"p","t":"+ Dòng khấu hao đã tính tháng trước lấy từ bảng tính và phân bổ khấu hao TSCĐ tháng trước."},{"k":"p","t":"+ Các dòng sổ khấu hao TSCĐ tăng, giảm tháng này được phản ánh chi tiết cho từng TSCĐ có liên quan đến số tăng, giảm khấu hao TSCĐ theo chế độ quy định hiện hành về khấu hao TSCĐ."},{"k":"p","t":"Dòng số khấu hao phải tính tháng này được tính bằng (=) Số khấu hao tính tháng trước cộng (+) Với số khấu hao tăng, trừ (-) Số khấu hao giảm trong tháng."},{"k":"p","t":"Số khấu hao phải trích tháng này trên Bảng phân bổ khấu hao TSCĐ được sử dụng để ghi vào các Bảng kê và sổ kế toán có liên quan (cột ghi Có TK 214), đồng thời được sử dụng để tính giá thành thực tế sản phẩm, dịch vụ hoàn thành."},{"k":"p","t":"PHỤ LỤC 4"},{"k":"p","t":"DANH MỤC BIỂU MẪU, NỘI DUNG, PHƯƠNG PHÁP GHI CHÉP SỔ KẾ TOÁN VÀ HÌNH THỨC SỔ KẾ TOÁN\n(Ban hành kèm theo Thông tư số 133/2016/TT-BTC ngày 26/8/2016 của Bộ Tài chính)"},{"k":"p","t":"1. Các loại sổ kế toán và hình thức sổ kế toán"},{"k":"p","t":"Sổ kế toán gồm sổ kế toán tổng hợp và sổ kế toán chi tiết. Sổ kế toán tổng hợp, gồm: Sổ Nhật ký, Sổ Cái. Sổ kế toán chi tiết, gồm: Sổ, thẻ kế toán chi tiết."},{"k":"p","t":"a) Sổ kế toán tổng hợp"},{"k":"p","t":"- Sổ Nhật ký dùng để ghi chép các nghiệp vụ kinh tế, tài chính phát sinh trong từng kỳ kế toán và trong một niên độ kế toán theo trình tự thời gian và quan hệ đối ứng các tài khoản của các nghiệp vụ đó. Số liệu kế toán trên sổ Nhật ký phản ánh tổng số phát sinh bên Nợ và bên Có của tất cả các tài khoản kế toán sử dụng ở doanh nghiệp. Sổ Nhật ký phải phản ánh đầy đủ các nội dung sau:"},{"k":"p","t":"+ Ngày, tháng ghi sổ;"},{"k":"p","t":"+ Số hiệu và ngày, tháng của chứng từ kế toán dùng làm căn cứ ghi sổ;"},{"k":"p","t":"+ Tóm tắt nội dung của nghiệp vụ kinh tế, tài chính phát sinh;"},{"k":"p","t":"+ Số tiền của nghiệp vụ kinh tế, tài chính phát sinh."},{"k":"p","t":"- Sổ Cái dùng để ghi chép các nghiệp vụ kinh tế, tài chính phát sinh trong từng kỳ và trong một niên độ kế toán theo các tài khoản kế toán được quy định trong chế độ tài khoản kế toán áp dụng cho doanh nghiệp. Số liệu kế toán trên Sổ Cái phản ánh tổng hợp tình hình tài sản, nguồn vốn, tình hình và kết quả hoạt động sản xuất, kinh doanh của doanh nghiệp. Sổ Cái phải phản ánh đầy đủ các nội dung sau:"},{"k":"p","t":"+ Ngày, tháng ghi sổ;"},{"k":"p","t":"+ Số hiệu và ngày, tháng của chứng từ kế toán dùng làm căn cứ ghi sổ;"},{"k":"p","t":"+ Tóm tắt nội dung của nghiệp vụ kinh tế, tài chính phát sinh;"},{"k":"p","t":"+ Số tiền của nghiệp vụ kinh tế, tài chính phát sinh ghi vào bên Nợ hoặc bên Có của từng tài khoản."},{"k":"p","t":"b) Sổ, thẻ kế toán chi tiết"},{"k":"p","t":"Sổ, thẻ kế toán chi tiết dùng để ghi chép các nghiệp vụ kinh tế, tài chính phát sinh liên quan đến các đối tượng kế toán cần thiết phải theo dõi chi tiết theo yêu cầu quản lý. Số liệu trên sổ, thẻ kế toán chi tiết cung cấp các thông tin phục vụ cho việc quản lý từng loại tài sản, nguồn vốn, doanh thu, chi phí chưa được chi tiết trên sổ Nhật ký và Sổ Cái. Số lượng, kết cấu các sổ, thẻ kế toán chi tiết không quy định bắt buộc. Các doanh nghiệp căn cứ vào quy định mang tính hướng dẫn tại Chế độ kế toán về sổ, thẻ kế toán chi tiết và yêu cầu quản lý của doanh nghiệp để mở các sổ, thẻ kế toán chi tiết cần thiết, phù hợp."},{"k":"p","t":"c) Các hình thức sổ kế toán"},{"k":"p","t":"- Hình thức kế toán Nhật ký chung;"},{"k":"p","t":"- Hình thức kế toán Nhật ký - Sổ Cái;"},{"k":"p","t":"- Hình thức kế toán Chứng từ ghi sổ."},{"k":"p","t":"Trong mỗi hình thức sổ kế toán có những quy định cụ thể về số lượng, kết cấu, mẫu sổ, trình tự, phương pháp ghi chép và mối quan hệ giữa các sổ kế toán."},{"k":"p","t":"2. Hình thức kế toán Nhật ký chung"},{"k":"p","t":"a) Nguyên tắc, đặc trưng cơ bản của hình thức kế toán Nhật ký chung: Tất cả các nghiệp vụ kinh tế, tài chính phát sinh đều phải được ghi vào sổ Nhật ký, mà trọng tâm là sổ Nhật ký chung, theo trình tự thời gian phát sinh và theo nội dung kinh tế (định khoản kế toán) của nghiệp vụ đó. Sau đó lấy số liệu trên các sổ Nhật ký để ghi Sổ Cái theo từng nghiệp vụ phát sinh. Hình thức kế toán Nhật ký chung gồm các loại sổ chủ yếu sau:"},{"k":"p","t":"- Sổ Nhật ký chung, Sổ Nhật ký đặc biệt;"},{"k":"p","t":"- Sổ Cái;"},{"k":"p","t":"- Các sổ, thẻ kế toán chi tiết."},{"k":"p","t":"b) Trình tự ghi sổ kế toán theo hình thức kế toán Nhật ký chung (Sơ đồ 01 dưới đây)"},{"k":"p","t":"- Hàng ngày, căn cứ vào các chứng từ đã kiểm tra được dùng làm căn cứ ghi sổ, trước nết ghi nghiệp vụ phát sinh vào sổ Nhật ký chung, sau đó căn cứ số liệu đã ghi trên sổ Nhật ký chung để ghi vào Sổ Cái theo các tài khoản kế toán phù hợp. Nếu đơn vị có mở sổ, thẻ kế toán chi tiết thì đồng thời với việc ghi sổ Nhật ký chung, các nghiệp vụ phát sinh được ghi vào các sổ, thẻ kế toán chi tiết liên quan."},{"k":"p","t":"Trường hợp đơn vị mở các sổ Nhật ký đặc biệt thì hàng ngày hoặc định kỳ, căn cứ vào các chứng từ được dùng làm căn cứ ghi sổ, ghi nghiệp vụ phát sinh vào sổ Nhật ký đặc biệt liên quan. Định kỳ (3, 5, 10... ngày) hoặc cuối tháng, tùy khối lượng nghiệp vụ phát sinh, tổng hợp từng sổ Nhật ký đặc biệt, lấy số liệu để ghi vào các tài khoản phù hợp trên Sổ Cái, sau khi đã loại trừ số trùng lặp do một nghiệp vụ được ghi đồng thời vào nhiều sổ Nhật ký đặc biệt (nếu có)."},{"k":"p","t":"Cuối tháng, cuối quý, cuối năm, cộng số liệu trên Sổ Cái, lập Bảng cân đối tài khoản. Sau khi đã kiểm tra đối chiếu khớp đúng, số liệu ghi trên Sổ Cái và bảng tổng hợp chi tiết (được lập từ các Sổ, thẻ kế toán chi tiết) được dùng để lập các Báo cáo tài chính. Về nguyên tắc, Tổng số phát sinh Nợ và Tổng số phát sinh Có trên Bảng cân đối tài khoản phải bằng Tổng số phát sinh Nợ và Tổng số phát sinh Có trên sổ Nhật ký chung (hoặc sổ Nhật ký chung và các sổ Nhật ký đặc biệt sau khi đã loại trừ số trùng lặp trên các sổ Nhật ký đặc biệt) cùng kỳ."},{"k":"p","t":"Biểu số 01"},{"k":"p","t":"TRÌNH TỰ GHI SỔ KẾ TOÁN THEO HÌNH THỨC KẾ TOÁN NHẬT KÝ CHUNG"},{"k":"p","t":"Ghi chú:"},{"k":"tbl","rows":[["Ghi hàng ngày",""],["Ghi cuối tháng, hoặc định kỳ",""],["Quan hệ đối chiếu, kiểm tra",""]]},{"k":"p","t":"3. Hình thức kế toán Nhật ký - Sổ Cái"},{"k":"p","t":"a) Đặc trưng cơ bản của hình thức kế toán Nhật ký - Sổ Cái: Các nghiệp vụ kinh tế, tài chính phát sinh được kết hợp ghi chép theo trình tự thời gian và theo nội dung kinh tế (theo tài khoản kế toán) trên cùng một quyển sổ kế toán tổng hợp duy nhất là sổ Nhật ký - Sổ Cái. Căn cứ để ghi vào sổ Nhật ký - Sổ Cái là các chứng từ kế toán hoặc Bảng tổng hợp chứng từ kế toán cùng loại. Hình thức kế toán Nhật ký - Sổ Cái gồm có các loại sổ kế toán sau:"},{"k":"p","t":"- Nhật ký - Sổ Cái;"},{"k":"p","t":"- Các Sổ, Thẻ kế toán chi tiết."},{"k":"p","t":"b) Trình tự ghi sổ kế toán theo hình thức kế toán Nhật ký - Sổ Cái (Sơ đồ số 02)"},{"k":"p","t":"- Hàng ngày, căn cứ vào các chứng từ kế toán hoặc Bảng tổng hợp chứng từ kế toán cùng loại đã được kiểm tra và được dùng làm căn cứ ghi sổ, trước hết xác định tài khoản ghi Nợ, tài khoản ghi Có để ghi vào Sổ Nhật ký - Sổ Cái. Số liệu của mỗi chứng từ (hoặc Bảng tổng hợp chứng từ kế toán cùng loại) được ghi trên một dòng ở cả 2 phần Nhật ký và phần Sổ Cái. Bảng tổng hợp chứng từ kế toán được lập cho những chứng từ cùng loại (Phiếu thu, phiếu chi, phiếu xuất, phiếu nhập,...) phát sinh nhiều lần trong một ngày hoặc định kỳ 1 đến 3 ngày. Chứng từ kế toán và Bảng tổng hợp chứng từ kế toán cùng loại sau khi đã ghi Sổ Nhật ký - Sổ Cái, được dùng để ghi vào Sổ, Thẻ kế toán chi tiết có liên quan."},{"k":"p","t":"- Cuối tháng, sau khi đã phản ánh toàn bộ chứng từ kế toán phát sinh trong tháng vào Sổ Nhật ký - Sổ Cái và các sổ, thẻ kế toán chi tiết, kế toán tiến hành cộng số liệu của cột số phát sinh ở phần Nhật ký và các cột Nợ, cột Có của từng tài khoản ở phần Sổ Cái để ghi vào dòng cộng phát sinh cuối tháng. Căn cứ vào số phát sinh các tháng trước và số phát sinh tháng này tính ra số phát sinh lũy kế từ đầu quý đến cuối tháng này. Căn cứ vào số dư đầu tháng (đầu quý) và số phát sinh trong tháng kế toán tính ra số dư cuối tháng (cuối quý) của từng tài khoản trên Nhật ký - Sổ Cái."},{"k":"p","t":"- Khi kiểm tra, đối chiếu số cộng cuối tháng (cuối quý) trong Sổ Nhật ký - Sổ Cái phải đảm bảo các yêu cầu sau:"},{"k":"p","t":"Tổng số tiền của cột “Phát sinh” ở phần Nhật ký"},{"k":"p","t":"="},{"k":"p","t":"Tổng số phát sinh Nợ của tất cả các TK"},{"k":"p","t":"="},{"k":"p","t":"Tổng số phát sinh Có của tất cả các TK"},{"k":"p","t":"Tổng số dư Nợ các Tài khoản = Tổng số dư Có các tài khoản"},{"k":"p","t":"- Các sổ, thẻ kế toán chi tiết cũng phải được khóa sổ để cộng số phát sinh Nợ, số phát sinh Có và tính ra số dư cuối tháng của từng đối tượng. Căn cứ vào số liệu khóa sổ của các đối tượng lập “Bảng tổng hợp chi tiết” cho từng tài khoản. Số liệu trên “Bảng tổng hợp chi tiết” được đối chiếu với số phát sinh Nợ, số phát sinh Có và Số dư cuối tháng của từng tài khoản trên Sổ Nhật ký - Sổ Cái. Số liệu trên Nhật ký - Sổ Cái và trên “Bảng tổng hợp chi tiết” sau khi khóa sổ được kiểm tra, đối chiếu nếu khớp, đúng sẽ được sử dụng để lập báo cáo tài chính."},{"k":"p","t":"Biểu số 02"},{"k":"p","t":"TRÌNH TỰ GHI SỔ KẾ TOÁN THEO HÌNH THỨC KẾ TOÁN \nNHẬT KÝ - SỔ CÁI"},{"k":"p","t":"Ghi chú:"},{"k":"tbl","rows":[["Ghi hàng ngày",""],["Ghi cuối tháng",""],["Đối chiếu, kiểm tra",""]]},{"k":"p","t":"4. Hình thức kế toán Chứng từ ghi sổ"},{"k":"p","t":"a) Đặc trưng cơ bản của hình thức kế toán Chứng từ ghi sổ: Căn cứ trực tiếp để ghi sổ kế toán tổng hợp là “Chứng từ ghi sổ”. Việc ghi sổ kế toán tổng hợp bao gồm:"},{"k":"p","t":"- Ghi theo trình tự thời gian trên Sổ Đăng ký Chứng từ ghi sổ."},{"k":"p","t":"- Ghi theo nội dung kinh tế trên Sổ Cái."},{"k":"p","t":"Chứng từ ghi sổ do kế toán lập trên cơ sở từng chứng từ kế toán hoặc Bảng Tổng hợp chứng từ kế toán cùng loại, có cùng nội dung kinh tế. Chứng từ ghi sổ được đánh số hiệu liên tục trong từng tháng hoặc cả năm (theo số thứ tự trong Sổ Đăng ký Chứng từ ghi sổ) và có chứng từ kế toán đính kèm, phải được kế toán trưởng duyệt trước khi ghi sổ kế toán. Hình thức kế toán Chứng từ ghi sổ gồm có các loại sổ kế toán sau:"},{"k":"p","t":"+ Chứng từ ghi sổ;"},{"k":"p","t":"+ Sổ Đăng ký Chứng từ ghi sổ;"},{"k":"p","t":"+ Sổ Cái;"},{"k":"p","t":"+ Các Sổ, Thẻ kế toán chi tiết."},{"k":"p","t":"b) Trình tự ghi sổ kế toán theo hình thức kế toán Chứng từ ghi sổ (Sơ đồ số 03)"},{"k":"p","t":"- Hàng ngày hoặc định kỳ, căn cứ vào các chứng từ kế toán hoặc Bảng Tổng hợp chứng từ kế toán cùng loại đã được kiểm tra, được dùng làm căn cứ ghi sổ, kế toán lập Chứng từ ghi sổ. Căn cứ vào Chứng từ ghi sổ để ghi vào sổ Đăng ký Chứng từ ghi sổ, sau đó được dùng để ghi vào Sổ Cái. Các chứng từ kế toán sau khi làm căn cứ lập Chứng từ ghi sổ được dùng để ghi vào Sổ, Thẻ kế toán chi tiết có liên quan."},{"k":"p","t":"- Cuối tháng, phải khóa sổ tính ra tổng số tiền của các nghiệp vụ kinh tế, tài chính phát sinh trong tháng trên sổ Đăng ký Chứng từ ghi sổ, tính ra Tổng số phát sinh Nợ, Tổng số phát sinh Có và số dư của từng tài khoản trên Sổ Cái. Căn cứ vào Sổ Cái lập Bảng cân đối tài khoản."},{"k":"p","t":"- Sau khi đối chiếu khớp đúng, số liệu ghi trên Sổ Cái và Bảng tổng hợp chi tiết (được lập từ các sổ, thẻ kế toán chi tiết) được dùng để lập Báo cáo tài chính. Quan hệ đối chiếu, kiểm tra phải đảm bảo Tổng số phát sinh Nợ và Tổng số phát sinh Có của tất cả các tài khoản trên Bảng cân đối tài khoản phải bằng nhau và bằng Tổng số tiền phát sinh trên sổ Đăng ký Chứng từ ghi sổ. Tổng số dư Nợ và Tổng số dư Có của các tài khoản trên Bảng cân đối tài khoản phải bằng nhau, và số dư của từng tài khoản trên Bảng cân đối tài khoản phải bằng số dư của từng tài khoản tương ứng trên Bảng tổng hợp chi tiết."},{"k":"p","t":"Biểu số 03"},{"k":"p","t":"TRÌNH TỰ GHI SỔ KẾ TOÁN THEO HÌNH THỨC \nKẾ TOÁN CHỨNG TỪ GHI SỔ"},{"k":"p","t":"Ghi chú:"},{"k":"tbl","rows":[["Ghi hàng ngày",""],["Ghi cuối tháng",""],["Đối chiếu, kiểm tra",""]]},{"k":"p","t":"5. Hình thức kế toán trên máy vi tính"},{"k":"p","t":"a) Đặc trưng cơ bản của hình thức kế toán trên máy vi tính: Công việc kế toán được thực hiện theo một chương trình phần mềm kế toán trên máy vi tính. Phần mềm kế toán được thiết kế theo nguyên tắc của một trong ba hình thức kế toán hoặc kết hợp các hình thức kế toán quy định trên đây. Phần mềm kế toán không hiển thị đầy đủ quy trình ghi sổ kế toán, nhưng phải in được đầy đủ sổ kế toán và báo cáo tài chính theo quy định. Phần mềm kế toán được thiết kế theo Hình thức kế toán nào sẽ có các loại sổ của hình thức kế toán đó nhưng không hoàn toàn giống mẫu sổ kế toán ghi bằng tay."},{"k":"p","t":"b) Trình tự ghi sổ kế toán theo Hình thức kế toán trên máy vi tính (Biểu số 04)"},{"k":"p","t":"- Hàng ngày, kế toán căn cứ vào chứng từ kế toán hoặc Bảng tổng hợp chứng từ kế toán cùng loại đã được kiểm tra, được dùng làm căn cứ ghi sổ, xác định tài khoản ghi Nợ, tài khoản ghi Có để nhập dữ liệu vào máy vi tính theo các bảng, biểu được thiết kế sẵn trên phần mềm kế toán. Theo quy trình của phần mềm kế toán, các thông tin được tự động nhập vào sổ kế toán tổng hợp (Sổ Cái hoặc Nhật ký- Sổ Cái...) và các sổ, thẻ kế toán chi tiết liên quan."},{"k":"p","t":"- Cuối tháng (hoặc bất kỳ vào thời điểm cần thiết nào), kế toán thực hiện các thao tác khóa sổ (cộng sổ) và lập báo cáo tài chính. Việc đối chiếu giữa số liệu tổng hợp với số liệu chi tiết được thực hiện tự động và luôn đảm bảo chính xác, trung thực theo thông tin đã được nhập trong kỳ. Người làm kế toán có thể kiểm tra, đối chiếu số liệu giữa sổ kế toán với báo cáo tài chính sau khi đã in ra giấy. Cuối tháng, cuối năm sổ kế toán tổng hợp và sổ kế toán chi tiết được in ra giấy, đóng thành quyển và thực hiện các thủ tục pháp lý theo quy định."},{"k":"p","t":"Biểu số 04"},{"k":"p","t":"TRÌNH TỰ GHI SỔ KẾ TOÁN \nTHEO HÌNH THỨC KẾ TOÁN TRÊN MÁY VI TÍNH"},{"k":"p","t":"Ghi chú:"},{"k":"tbl","rows":[["","Nhập số liệu hàng ngày"],["","In sổ, báo cáo cuối tháng, cuối năm"],["","Đối chiếu, kiểm tra"]]},{"k":"p","t":"DANH MỤC BIỂU MẪU SỔ KẾ TOÁN"},{"k":"p","t":"Số TT"},{"k":"p","t":"Tên sổ"},{"k":"p","t":"Ký hiệu"},{"k":"p","t":"Hình thức kế toán"},{"k":"p","t":"Nhật ký chung"},{"k":"p","t":"Nhật ký - Sổ Cái"},{"k":"p","t":"Chứng từ ghi sổ"},{"k":"p","t":"1"},{"k":"p","t":"2"},{"k":"p","t":"3"},{"k":"p","t":"4"},{"k":"p","t":"5"},{"k":"p","t":"6"},{"k":"p","t":"01"},{"k":"p","t":"Nhật ký - Sổ Cái"},{"k":"p","t":"S01-DNN"},{"k":"p","t":"-"},{"k":"p","t":"x"},{"k":"p","t":"-"},{"k":"p","t":"02"},{"k":"p","t":"Chứng từ ghi sổ"},{"k":"p","t":"S02a-DNN"},{"k":"p","t":"-"},{"k":"p","t":"-"},{"k":"p","t":"x"},{"k":"p","t":"03"},{"k":"p","t":"Sổ Đăng ký Chứng từ ghi sổ"},{"k":"p","t":"S02b-DNN"},{"k":"p
