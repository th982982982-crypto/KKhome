n tệ và theo từng đối tượng không?"},{"k":"p","t":"- Có đánh giá lại các khoản nợ phải thu thỏa mãn định nghĩa của các khoản mục tiền tệ có gốc ngoại tệ không?"},{"k":"p","t":"- Phương pháp lập dự phòng phải thu khó đòi."},{"k":"p","t":"(5) Nguyên tắc ghi nhận hàng tồn kho"},{"k":"p","t":"- Nguyên tắc ghi nhận hàng tồn kho: Nêu rõ hàng tồn kho được ghi nhận theo giá gốc hoặc theo giá trị thuần có thể thực hiện được."},{"k":"p","t":"- Phương pháp tính giá trị hàng tồn kho: Nêu rõ áp dụng phương pháp nào (Bình quân gia quyền; nhập trước, xuất trước; giá thực tế đích danh hay phương pháp giá bán lẻ)."},{"k":"p","t":"- Phương pháp hạch toán hàng tồn kho: Nêu rõ áp dụng phương pháp kê khai thường xuyên hay phương pháp kiểm kê định kỳ."},{"k":"p","t":"- Phương pháp lập dự phòng giảm giá hàng tồn kho (Nêu rõ doanh nghiệp lập dự phòng giảm giá hàng tồn kho trên cơ sở chênh lệch lớn hơn của giá gốc và giá trị thuần có thể thực hiện được của hàng tồn kho. Phương pháp lập dự phòng giảm giá hàng tồn kho là lập theo số chênh lệch giữa số dự phòng phải lập năm nay với số dự phòng đã lập năm trước chưa sử dụng hết dẫn đến năm nay phải lập thêm hay hoàn nhập)."},{"k":"p","t":"(6) Nguyên tắc kế toán và khấu hao TSCĐ, TSCĐ thuê tài chính, Bất động sản đầu tư"},{"k":"p","t":"a) Nguyên tắc kế toán TSCĐ hữu hình, TSCĐ vô hình:"},{"k":"p","t":"- Nguyên tắc kế toán các khoản chi phí phát sinh sau ghi nhận ban đầu (chi phí nâng cấp, cải tạo, duy tu, sửa chữa) được ghi nhận vào nguyên giá hay chi phí sản xuất, kinh doanh;"},{"k":"p","t":"- Nêu rõ các phương pháp khấu hao TSCĐ;"},{"k":"p","t":"- Các quy định khác về quản lý, sử dụng, khấu hao TSCĐ có được tuân thủ không?"},{"k":"p","t":"b) Nguyên tắc kế toán TSCĐ thuê tài chính:"},{"k":"p","t":"- Nêu rõ nguyên giá được xác định như thế nào;"},{"k":"p","t":"- Nêu rõ các phương pháp khấu hao TSCĐ thuê tài chính."},{"k":"p","t":"c) Nguyên tắc kế toán Bất động sản đầu tư."},{"k":"p","t":"- Nguyên giá BĐSĐT được ghi nhận theo phương pháp nào?"},{"k":"p","t":"- Nêu rõ các phương pháp khấu hao BĐSĐT."},{"k":"p","t":"(7) Nguyên tắc kế toán nợ phải trả"},{"k":"p","t":"- Phân loại nợ phải trả như thế nào?"},{"k":"p","t":"- Có theo dõi nợ phải trả theo từng đối tượng, kỳ hạn gốc, kỳ hạn còn lại tại thời điểm báo cáo, theo nguyên tệ không?"},{"k":"p","t":"- Có đánh giá lại các khoản nợ phải trả thỏa mãn định nghĩa các khoản mục tiền tệ có gốc ngoại tệ không?"},{"k":"p","t":"- Có lập dự phòng nợ phải trả không?"},{"k":"p","t":"(8) Nguyên tắc ghi nhận và vốn hóa các khoản chi phí đi vay:"},{"k":"p","t":"- Nguyên tắc ghi nhận chi phí đi vay: Nêu rõ chi phí đi vay được ghi nhận vào chi phí tài chính trong kỳ khi phát sinh hay được vốn hóa."},{"k":"p","t":"- Tỷ lệ vốn hóa được sử dụng để xác định chi phí đi vay được vốn hóa trong kỳ: Nêu rõ tỷ lệ vốn hóa này là bao nhiêu?"},{"k":"p","t":"(9) Nguyên tắc ghi nhận vốn chủ sở hữu:"},{"k":"p","t":"- Vốn góp của chủ sở hữu có được ghi nhận theo số vốn thực góp không; Thặng dư vốn cổ phần được ghi nhận như thế nào?"},{"k":"p","t":"- Lợi nhuận chưa phân phối được xác định như thế nào?"},{"k":"p","t":"(10) Nguyên tắc và phương pháp ghi nhận doanh thu, thu nhập khác:"},{"k":"p","t":"- Doanh thu bán hàng và cung cấp dịch vụ: Có tuân thủ đầy đủ các điều kiện ghi nhận doanh thu hay không?"},{"k":"p","t":"- Doanh thu hợp đồng xây dựng"},{"k":"p","t":"- Các nguyên tắc ghi nhận doanh thu hoạt động tài chính."},{"k":"p","t":"- Các nguyên tắc ghi nhận thu nhập khác."},{"k":"p","t":"(11) Nguyên tắc kế toán chi phí:"},{"k":"p","t":"- Giá vốn hàng bán (có đảm bảo nguyên tắc phù hợp với doanh thu không; Có đảm bảo nguyên tắc thận trọng, ghi nhận ngay các chi phí vượt trên mức bình thường của hàng tồn kho không; Các khoản ghi giảm giá vốn hàng bán là gì...)"},{"k":"p","t":"- Chi phí tài chính: Có ghi nhận đầy đủ chi phí lãi vay (kể cả số trích trước) của kỳ báo cáo không?"},{"k":"p","t":"- Chi phí quản lý kinh doanh: Có ghi nhận đầy đủ chi phí bán hàng và chi phí quản lý doanh nghiệp phát sinh trong kỳ không; Các khoản điều chỉnh giảm chi phí bán hàng và chi phí quản lý doanh nghiệp là gì...."},{"k":"p","t":"2.5.5. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được trình bày trong Báo cáo tình hình tài chính để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung các khoản mục tài sản, nợ phải trả và vốn chủ sở hữu."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính” là đơn vị tính được sử dụng trong Báo cáo tình hình tài chính. Số liệu ghi vào cột “Số đầu năm” được lấy từ cột “Số cuối năm” trong Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Số cuối năm” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo tình hình tài chính năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Trường hợp doanh nghiệp có áp dụng hồi tố do thay đổi chính sách kế toán hoặc điều chỉnh hồi tố sai sót trọng yếu của các năm trước thì phải điều chỉnh số liệu so sánh (số liệu ở cột “Số đầu năm”) để đảm bảo nguyên tắc có thể so sánh được và phải giải trình rõ điều này trong thuyết minh báo cáo tài chính. Trường hợp vì lý do nào đó dẫn đến số liệu ở cột “Số đầu năm” không có khả năng so sánh được với số liệu ở cột “Số cuối năm” thì điều này phải được nêu rõ trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"- Đối với các khoản mục yêu cầu thuyết minh theo giá trị hợp lý, trường hợp không xác định được giá trị hợp lý thì phải ghi rõ lý do."},{"k":"p","t":"2.5.6. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được thể hiện trong Báo cáo kết quả hoạt động kinh doanh để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung của các khoản mục doanh thu, chi phí."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh” là đơn vị tính được sử dụng trong Báo cáo kết quả hoạt động kinh doanh. Số liệu ghi vào cột “Năm trước” được lấy từ Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Năm nay” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo kết quả hoạt động kinh doanh năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Doanh nghiệp được chủ động đánh số thứ tự của thông tin chi tiết được trình bày trong phần này theo nguyên tắc phù hợp với số dẫn từ Báo cáo kết quả hoạt động kinh doanh và đảm bảo dễ đối chiếu và có thể so sánh giữa các kỳ."},{"k":"p","t":"- Trường hợp vì lý do nào đó dẫn đến số liệu ở cột “Năm nay” không có khả năng so sánh được với số liệu ở cột “Năm trước” thì điều này phải được nêu rõ trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"2.5.7. Thông tin bổ sung cho Báo cáo lưu chuyển tiền tệ"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích các số liệu đã được thể hiện trong Báo cáo lưu chuyển tiền tệ để giúp người sử dụng hiểu rõ hơn về các yếu tố ảnh hưởng đến lưu chuyển tiền trong kỳ của doanh nghiệp."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo lưu chuyển tiền tệ” là đơn vị tính được sử dụng trong Báo cáo lưu chuyển tiền tệ. Số liệu ghi vào cột “Năm trước” được lấy từ Bản thuyết minh Báo cáo tài chính năm trước; Số liệu ghi vào cột “Năm nay” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo lưu chuyển tiền tệ năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"2.5.8. Những thông tin khác"},{"k":"p","t":"Trong phần này, doanh nghiệp phải trình bày những thông tin quan trọng khác (nếu có) ngoài những thông tin đã trình bày trên nhằm cung cấp thêm thông tin khác nếu xét thấy cần thiết giúp cho người sử dụng hiểu Báo cáo tài chính của doanh nghiệp đã được trình bày trung thực, hợp lý."},{"k":"p","t":"MỤC 3. NỘI DUNG VÀ PHƯƠNG PHÁP LẬP BÁO CÁO TÀI CHÍNH CỦA DOANH NGHIỆP SIÊU NHỎ"},{"k":"p","t":"Các doanh nghiệp siêu nhỏ căn cứ vào biểu mẫu báo cáo tài chính năm quy định tại Phụ lục 2 ban hành kèm theo Thông tư này và các nguyên tắc chung để thực hiện việc lập và trình bày báo cáo tài chính tại đơn vị."}]},{"id":"tt133_82","no":82,"code":"Điều 82","title":"Điều 82. Nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ","shortTitle":"Nội dung và phương pháp lập báo cáo tài chính của doanh nghiệp siêu nhỏ","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Nội dung và phương pháp lập các chỉ tiêu của Báo cáo tình hình tài chính (Mẫu số B01 - DNSN)"},{"k":"p","t":"1.1. Tài sản"},{"k":"p","t":"- Tiền và các khoản tương đương tiền (Mã số 110)"},{"k":"p","t":"Chỉ tiêu này phản ánh toàn bộ tiền mặt tại quỹ, tiền gửi ngân hàng không kỳ hạn và các khoản tương đương tiền hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 111, 112, số dư Nợ chi tiết của TK 1281 (chi tiết các khoản tiền gửi có kỳ hạn gốc không quá 3 tháng) và TK 1288 (chi tiết các khoản đủ tiêu chuẩn phân loại là tương đương tiền)."},{"k":"p","t":"Các khoản tương đương tiền có thể bao gồm: Kỳ phiếu ngân hàng, tín phiếu kho bạc, tiền gửi ngân hàng có kỳ hạn gốc không quá 3 tháng…"},{"k":"p","t":"Các khoản trước đây được phân loại là tương đương tiền nhưng quá hạn chưa thu hồi được phải chuyển sang trình bày tại các chỉ tiêu khác, phù hợp với nội dung của từng khoản mục."},{"k":"p","t":"- Các khoản đầu tư (Mã số 120)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng giá trị của các khoản đầu tư tài chính (sau khi đã trừ đi các khoản dự phòng cho các khoản đầu tư tài chính), bao gồm: Chứng khoán kinh doanh, các khoản đầu tư nắm giữ đến ngày đáo hạn và các khoản đầu tư góp vốn vào đơn vị khác."},{"k":"p","t":"Các khoản đầu tư tài chính được phản ánh trong chỉ tiêu này không bao gồm các khoản đầu tư đã được trình bày trong chỉ tiêu “Tiền và các khoản tương đương tiền” (Mã số 110) và các khoản phải thu về cho vay đã được trình bày trong chỉ tiêu “Các khoản phải thu” (Mã số 130)."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 121, 228 và TK 128 (sau khi đã trừ đi các khoản đầu tư tài chính đã được phân loại là tương đương tiền và các khoản phải thu về cho vay) trừ đi số dư Có các TK 2291, 2292."},{"k":"p","t":"- Các khoản phải thu (Mã số 130)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị của các khoản phải thu tại thời điểm báo cáo (sau khi trừ đi dự phòng phải thu khó đòi), như: Phải thu của khách hàng, trả trước cho người bán, phải thu nội bộ, phải thu về cho vay, phải thu khác, tài sản thiếu chờ xử lý, tạm ứng, ký cược, ký quỹ, ..."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Nợ chi tiết theo từng đối tượng công nợ của các TK 131, 136, 138, 141, 334, 338, 1288 (chi tiết cho vay), 331 (chi tiết trả trước cho người bán) sau khi trừ đi số dư Có TK 2293."},{"k":"p","t":"- Hàng tồn kho (Mã số 140)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị hiện có các loại hàng tồn kho dự trữ cho quá trình sản xuất, kinh doanh của doanh nghiệp (sau khi trừ đi dự phòng giảm giá hàng tồn kho) tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Nợ của các TK 151, 152, 153, 154, 155, 156, 157 sau khi trừ đi số dư Có của TK 2294."},{"k":"p","t":"- Giá trị còn lại của TSCĐ và BĐSĐT (Mã số 150)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ giá trị còn lại (nguyên giá trừ giá trị hao mòn lũy kế) của các loại tài sản cố định và BĐSĐT tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số dư Nợ của các TK 211, 217 sau khi đã trừ đi giá trị hao mòn lũy kế của các loại TSCĐ và BĐSĐT (số dư Có TK 214)."},{"k":"p","t":"- Tài sản khác (Mã số 160)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các tài sản khác ngoài các tài sản đã được phản ánh tại các Mã số 110, 120, 130, 140, 150 nêu trên như thuế GTGT được khấu trừ, chi phí trả trước, thuế và các khoản phải thu của Nhà nước, chi phí xây dựng cơ bản dở dang, ..."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này là số dư Nợ các TK 133, 241, 242, 333, ..."},{"k":"p","t":"- Tổng cộng tài sản (Mã số 200)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh tổng trị giá tài sản hiện có của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 200 = Mã số 110 + Mã số 120 + Mã số 130 + Mã số 140 + Mã số 150 + Mã số 160."},{"k":"p","t":"1.2. Nợ phải trả (Mã số 300)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh toàn bộ số nợ phải trả tại thời điểm báo cáo."},{"k":"p","t":"Mã số 300 = Mã số 310 + Mã số 320 + Mã số 330 + Mã số 340 + Mã số 350 + Mã số 360"},{"k":"p","t":"- Phải trả người bán (Mã số 310)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền còn phải trả cho người bán."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 331."},{"k":"p","t":"- Người mua trả tiền trước (Mã số 320)"},{"k":"p","t":"Chỉ tiêu này phản ánh số tiền người mua ứng trước để mua sản phẩm, hàng hóa, dịch vụ, tài sản cố định, bất động sản đầu tư và doanh nghiệp có nghĩa vụ cung cấp tại thời điểm báo cáo (không bao gồm các khoản doanh thu nhận trước). Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 131 mở chi tiết cho từng khách hàng."},{"k":"p","t":"- Thuế và các khoản phải nộp Nhà nước (Mã số 330)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng các khoản doanh nghiệp còn phải nộp Nhà nước tại thời điểm báo cáo, bao gồm cả các khoản thuế, phí, lệ phí và các khoản phải nộp khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào tổng số dư Có chi tiết của TK 333."},{"k":"p","t":"- Phải trả người lao động (Mã số 340)"},{"k":"p","t":"Chỉ tiêu này phản ánh các khoản doanh nghiệp còn phải trả cho người lao động tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 334."},{"k":"p","t":"- Phải trả nợ vay (Mã số 350)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá trị các khoản doanh nghiệp đi vay, nợ thuê tài chính còn nợ các ngân hàng, tổ chức, công ty tài chính và các đối tượng khác."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này căn cứ vào số dư Có chi tiết của TK 341."},{"k":"p","t":"- Phải trả khác (Mã số 360)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản phải trả khác ngoài các khoản nợ phải trả đã được phản ánh tại các Mã số 310, 320, 330, 340, 350 nêu trên như: Chi phí phải trả, phải trả nội bộ, nhận cầm cố, thế chấp, ký quỹ, ký cược, dự phòng phải trả, doanh thu chưa thực hiện, tài sản thừa chờ giải quyết, quỹ khen thưởng phúc lợi, quỹ phát triển khoa học công nghệ, phải trả, phải nộp khác, ..."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này là số dư Có các TK 1388, 335, 336, 338, 352, 353, 356."},{"k":"p","t":"1.3. Vốn chủ sở hữu (Mã số 400)"},{"k":"p","t":"Là chỉ tiêu tổng hợp phản ánh các khoản vốn kinh doanh thuộc sở hữu của cổ đông, thành viên góp vốn, như: Vốn đầu tư của chủ sở hữu, các quỹ thuộc vốn chủ sở hữu và lợi nhuận sau thuế chưa phân phối, chênh lệch tỷ giá hối đoái, lợi nhuận sau thuế chưa phân phối…"},{"k":"p","t":"Mã số 400 = Mã số 410 + Mã số 420 + Mã số 430"},{"k":"p","t":"- Vốn đầu tư của chủ sở hữu (Mã số 410)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số vốn đã thực góp của các chủ sở hữu và thặng dư vốn cổ phần, vốn khác (nếu có) của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 411."},{"k":"p","t":"- Lợi nhuận sau thuế chưa phân phối (Mã số 420)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi (hoặc lỗ) sau thuế chưa phân phối tại thời điểm báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số dư Có của TK 421. Trường hợp TK 421 có số dư Nợ thì số liệu chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Các khoản mục khác thuộc vốn chủ sở hữu (Mã số 430)"},{"k":"p","t":"Chỉ tiêu này phản ánh giá trị các khoản mục khác thuộc vốn chủ sở hữu ngoài các khoản đã được phản ánh tại các Mã số 410, 420 nêu trên. Nếu số liệu chỉ tiêu này là số âm thì ghi trong ngoặc đơn (...)."},{"k":"p","t":"Số liệu ghi vào chỉ tiêu này là số dư Có TK 418 sau khi trừ đi số dư Nợ TK 419."},{"k":"p","t":"- Tổng cộng nguồn vốn (Mã số 500)"},{"k":"p","t":"Phản ánh tổng số các nguồn vốn hình thành tài sản của doanh nghiệp tại thời điểm báo cáo."},{"k":"p","t":"Mã số 500 = Mã số 300 + Mã số 400."},{"k":"p","t":"Chỉ tiêu “Tổng cộng Tài sản Mã số 200”"},{"k":"p","t":"="},{"k":"p","t":"Chỉ tiêu “Tổng cộng Nguồn vốn Mã số 500”"},{"k":"p","t":"2. Nội dung và phương pháp lập các chỉ tiêu của Báo cáo kết quả hoạt động kinh doanh (Mẫu số B02 - DNSN)"},{"k":"p","t":"- Doanh thu thuần về bán hàng và cung cấp dịch vụ (Mã số 01)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng doanh thu bán hàng và cung cấp dịch vụ sau khi đã trừ đi các khoản giảm trừ doanh thu trong kỳ báo cáo. Chỉ tiêu này không bao gồm các loại thuế gián thu phát sinh khi bán hàng và cung cấp dịch vụ."},{"k":"p","t":"Số liệu của chỉ tiêu này được căn cứ vào số phát sinh bên Nợ TK 511 đối ứng với bên Có TK 911."},{"k":"p","t":"- Giá vốn hàng bán (Mã số 02)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng giá vốn của hàng hóa, BĐSĐT, giá vốn của thành phẩm đã bán, khối lượng dịch vụ đã cung cấp, các chi phí được tính vào giá vốn sau khi trừ đi các khoản ghi giảm giá vốn hàng bán trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là lũy kế số phát sinh bên Có của TK 632 đối ứng bên Nợ của TK 911."},{"k":"p","t":"- Chi phí quản lý kinh doanh (Mã số 03)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng chi phí quản lý kinh doanh phát sinh trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là tổng số phát sinh bên Có của TK 642, đối ứng với bên Nợ của TK 911."},{"k":"p","t":"- Lãi/lỗ hoạt động tài chính và hoạt động khác (Mã số 04)"},{"k":"p","t":"Chỉ tiêu này phản ánh số lãi hoặc lỗ phát sinh từ hoạt động tài chính và hoạt động khác trong kỳ báo cáo."},{"k":"p","t":"Số liệu để ghi vào chỉ tiêu này là số chênh lệch giữa tổng số phát sinh bên Có TK 515, 711 (sau khi trừ các khoản điều chỉnh giảm doanh thu hoạt động tài chính, thu nhập khác) với tổng số phát sinh bên Nợ TK 635, 811 (sau khi trừ các khoản điều chỉnh giảm chi phí tài chính, chi phí khác)."},{"k":"p","t":"Trường hợp lỗ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"- Lợi nhuận kế toán trước thuế (Mã số 05)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng lợi nhuận kế toán trước thuế thực hiện trong kỳ báo cáo của doanh nghiệp trước khi trừ đi chi phí thuế TNDN."},{"k":"p","t":"Trường hợp lỗ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 05 = Mã số 01 - Mã số 02 - Mã số 03 + Mã số 04."},{"k":"p","t":"- Chi phí thuế thu nhập doanh nghiệp (Mã số 06)"},{"k":"p","t":"Chỉ tiêu này phản ánh chi phí thuế thu nhập doanh nghiệp phát sinh trong kỳ báo cáo. Số liệu để ghi vào chỉ tiêu này được căn cứ vào tổng số phát sinh bên Có TK 821 đối ứng với bên Nợ TK 911 hoặc căn cứ vào số phát sinh bên Nợ TK 821 đối ứng với bên Có TK 911 trong kỳ báo cáo."},{"k":"p","t":"- Lợi nhuận sau thuế thu nhập doanh nghiệp (Mã số 07)"},{"k":"p","t":"Chỉ tiêu này phản ánh tổng số lợi nhuận thuần (hoặc lỗ) sau thuế TNDN từ các hoạt động của doanh nghiệp (sau khi trừ chi phí thuế thu nhập doanh nghiệp) phát sinh trong năm báo cáo."},{"k":"p","t":"Trường hợp lỗ thì chỉ tiêu này được ghi bằng số âm dưới hình thức ghi trong ngoặc đơn (...)."},{"k":"p","t":"Mã số 07 = Mã số 05 - Mã số 06."},{"k":"p","t":"3. Nội dung và phương pháp lập các chỉ tiêu của Bản thuyết minh báo cáo tài chính (Mẫu số B09 - DNSN)"},{"k":"p","t":"3.1. Đặc điểm hoạt động của doanh nghiệp"},{"k":"p","t":"Trong phần này doanh nghiệp cần nêu rõ:"},{"k":"p","t":"a) Hình thức sở hữu vốn: Công ty cổ phần, công ty trách nhiệm hữu hạn, công ty hợp danh hay doanh nghiệp tư nhân."},{"k":"p","t":"b) Lĩnh vực kinh doanh: Nêu rõ là sản xuất công nghiệp, kinh doanh thương mại, dịch vụ, xây lắp hoặc tổng hợp nhiều lĩnh vực kinh doanh."},{"k":"p","t":"c) Ngành nghề kinh doanh: Nêu rõ hoạt động kinh doanh chính và đặc điểm sản phẩm sản xuất hoặc dịch vụ cung cấp của doanh nghiệp."},{"k":"p","t":"3.2. Kỳ kế toán, đơn vị tiền tệ sử dụng trong kế toán"},{"k":"p","t":"a) Kỳ kế toán năm ghi rõ kỳ kế toán năm theo năm dương lịch bắt đầu từ ngày 01/01/... đến 31/12/... Nếu doanh nghiệp có năm tài chính khác với năm dương lịch thì ghi rõ ngày bắt đầu và ngày kết thúc kỳ kế toán năm."},{"k":"p","t":"b) Đơn vị tiền tệ sử dụng trong kế toán: Ghi rõ là Đồng Việt Nam."},{"k":"p","t":"3.3. Chuẩn mực kế toán và Chế độ kế toán áp dụng"},{"k":"p","t":"Tuyên bố về việc tuân thủ Chuẩn mực kế toán và Chế độ kế toán: Nêu rõ Báo cáo tài chính có được lập và trình bày phù hợp và có tuân thủ Chuẩn mực kế toán và Chế độ kế toán doanh nghiệp Việt Nam hay không?"},{"k":"p","t":"3.4. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được trình bày trong Báo cáo tình hình tài chính để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung các khoản mục tài sản, nợ phải trả và vốn chủ sở hữu."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình tài chính” là đơn vị tính được sử dụng trong Báo cáo tình hình tài chính. Số liệu ghi vào cột “Đầu năm” được lấy từ cột “Cuối năm” trong Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Cuối năm” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo tình hình tài chính năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Doanh nghiệp được chủ động đánh số thứ tự của thông tin chi tiết được trình bày trong phần này theo nguyên tắc phù hợp với số dẫn từ Báo cáo tình hình tài chính và đảm bảo dễ đối chiếu và có thể so sánh giữa các kỳ."},{"k":"p","t":"3.5. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh:"},{"k":"p","t":"- Trong phần này, doanh nghiệp phải trình bày và phân tích chi tiết các số liệu đã được thể hiện trong Báo cáo kết quả hoạt động kinh doanh để giúp người sử dụng Báo cáo tài chính hiểu rõ hơn nội dung của các khoản mục doanh thu, chi phí."},{"k":"p","t":"- Đơn vị tính giá trị trình bày trong phần “Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo kết quả hoạt động kinh doanh” là đơn vị tính được sử dụng trong Báo cáo kết quả hoạt động kinh doanh. Số liệu ghi vào cột “Năm trước” được lấy từ Bản thuyết minh Báo cáo tài chính năm trước. Số liệu ghi vào cột “Năm nay” được lập trên cơ sở số liệu lấy từ:"},{"k":"p","t":"+ Báo cáo kết quả hoạt động kinh doanh năm nay;"},{"k":"p","t":"+ Sổ kế toán tổng hợp;"},{"k":"p","t":"+ Sổ và thẻ kế toán chi tiết hoặc Bảng tổng hợp chi tiết có liên quan."},{"k":"p","t":"- Doanh nghiệp được chủ động đánh số thứ tự của thông tin chi tiết được trình bày trong phần này theo nguyên tắc phù hợp với số dẫn từ Báo cáo kết quả hoạt động kinh doanh và đảm bảo dễ đối chiếu và có thể so sánh giữa các kỳ."},{"k":"p","t":"- Trường hợp vì lý do nào đó dẫn đến số liệu ở cột “Năm trước” không có khả năng so sánh được với số liệu ở cột “Năm sau” thì điều này phải được nêu rõ trong Bản thuyết minh Báo cáo tài chính."},{"k":"p","t":"3.6. Những thông tin khác mà doanh nghiệp cần thuyết minh"},{"k":"p","t":"Trong phần này, doanh nghiệp phải trình bày những thông tin quan trọng khác (nếu có) ngoài những thông tin đã trình bày trên nhằm cung cấp thêm thông tin khác nếu xét thấy cần thiết giúp cho người sử dụng hiểu Báo cáo tài chính của doanh nghiệp đã được trình bày trung thực, hợp lý."},{"k":"p","t":"MỤC 4. NỘI DUNG VÀ PHƯƠNG PHÁP LẬP BẢNG CÂN ĐỐI TÀI KHOẢN"}]},{"id":"tt133_83","no":83,"code":"Điều 83","title":"Điều 83. Nội dung và phương pháp lập Bảng cân đối tài khoản (Mẫu số F01 - DNN)","shortTitle":"Nội dung và phương pháp lập Bảng cân đối tài khoản (Mẫu số F01 - DNN)","chuong":"Chương III — BÁO CÁO TÀI CHÍNH","muc":"","level":1,"content":[{"k":"p","t":"1. Mục đích: Phản ánh tổng quát tình hình tăng giảm và hiện có về tài sản và nguồn vốn của đơn vị trong kỳ báo cáo và từ đầu năm đến cuối kỳ báo cáo. Số liệu trên Bảng cân đối tài khoản là căn cứ để kiểm tra việc ghi chép trên sổ kế toán tổng hợp, đồng thời đối chiếu và kiểm soát số liệu ghi trên Báo cáo tài chính"},{"k":"p","t":"2. Căn cứ và phương pháp ghi sổ:"},{"k":"p","t":"Bảng cân đối tài khoản được lập dựa trên Sổ Cái và Bảng cân đối tài khoản kỳ trước."},{"k":"p","t":"Trước khi lập Bảng cân đối tài khoản phải hoàn thành việc ghi sổ kế toán chi tiết và sổ kế toán tổng hợp; kiểm tra, đối chiếu số liệu giữa các sổ có liên quan."},{"k":"p","t":"Số liệu ghi vào Bảng cân đối tài khoản chia làm 2 loại:"},{"k":"p","t":"- Loại số liệu phản ánh số dư các tài khoản tại thời điểm đầu kỳ (Cột 1,2- Số dư đầu năm), tại thời điểm cuối kỳ (cột 5, 6 Số dư cuối năm), trong đó các tài khoản có số dư Nợ được phản ánh vào cột “Nợ”, các tài khoản có số dư Có được phản ánh vào cột “Có”."},{"k":"p","t":"- Loại số liệu phản ánh số phát sinh của các tài khoản từ đầu kỳ đến ngày cuối kỳ báo cáo (cột 3, 4 Số phát sinh trong tháng) trong đó tổng số phát sinh “Nợ” của các tài khoản được phản ánh vào cột “Nợ”, tổng số phát sinh “Có” được phản ánh vào cột “Có”của từng tài khoản."},{"k":"p","t":"- Cột A, B: Số hiệu tài khoản, tên tài khoản của tất cả các Tài khoản cấp 1 mà đơn vị đang sử dụng và một số Tài khoản cấp 2 cần phân tích."},{"k":"p","t":"- Cột 1, 2- Số dư đầu năm: Phản ánh số dư ngày đầu tháng của tháng đầu năm (Số dư đầu năm báo cáo). Số liệu để ghi vào các cột này được căn cứ vào dòng Số dư đầu tháng của tháng đầu năm trên Sổ Cái hoặc căn cứ vào phần “Số dư cuối năm” của Bảng cân đối tài khoản năm trước."},{"k":"p","t":"- Cột 3, 4: Phản ánh tổng số phát sinh Nợ và tổng số phát sinh Có của các tài khoản trong năm báo cáo. Số liệu ghi vào phần này được căn cứ vào dòng “Cộng phát sinh lũy kế từ đầu năm” của từng tài khoản tương ứng trên Sổ Cái."},{"k":"p","t":"- Cột 5, 6 “Số dư cuối năm”: Phản ánh số dư ngày cuối cùng của năm báo cáo. Số liệu để ghi vào phần này được căn cứ vào số dư cuối tháng của tháng cuối năm báo cáo trên Sổ Cái hoặc được tính căn cứ vào các cột số dư đầu năm (cột 1, 2), số phát sinh trong năm (cột 3, 4) trên Bảng cân đối tài khoản năm này. Số liệu ở cột 5, 6 được dùng để lập Bảng cân đối tài khoản năm sau."},{"k":"p","t":"Sau khi ghi đủ các số liệu có liên quan đến các tài khoản, phải thực hiện tổng cộng Bảng cân đối tài khoản. Số liệu trong Bảng cân đối tài khoản phải đảm bảo tính cân đối bắt buộc sau đây:"},{"k":"p","t":"Tổng số dư Nợ (cột 1), Tổng số dư Có (cột 2), Tổng số phát sinh Nợ (cột 3), Tổng số phát sinh Có (cột 4), Tổng số dư Nợ (cột 5), Tổng số dư Có (cột 6)."}]},{"id":"tt133_84","no":84,"code":"Điều 84","title":"Điều 84. Quy định chung về chứng từ kế toán và hệ thống biểu mẫu chứng từ kế toán","shortTitle":"Quy định chung về chứng từ kế toán và hệ thống biểu mẫu chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Chứng từ kế toán áp dụng cho các doanh nghiệp phải thực hiện theo đúng quy định của Luật Kế toán, Nghị định quy định chi tiết một số điều của Luật Kế toán và các văn bản sửa đổi, bổ sung."},{"k":"p","t":"2. Các loại chứng từ kế toán tại danh mục và biểu mẫu chứng từ kế toán đều thuộc loại hướng dẫn. Doanh nghiệp được chủ động xây dựng, thiết kế biểu mẫu chứng từ kế toán phù hợp với đặc điểm hoạt động và yêu cầu quản lý của mình nhưng phải đáp ứng được các yêu cầu của Luật kế toán và đảm bảo nguyên tắc rõ ràng, minh bạch, kịp thời, dễ kiểm tra, kiểm soát và đối chiếu."},{"k":"p","t":"3. Trường hợp không tự xây dựng và thiết kế biểu mẫu chứng từ cho riêng mình, doanh nghiệp có thể áp dụng hệ thống biểu mẫu chứng từ kế toán theo hướng dẫn tại Phụ lục 3 ban hành kèm theo Thông tư này để ghi chép chứng từ kế toán phù hợp với đặc điểm hoạt động sản xuất, kinh doanh và yêu cầu quản lý của doanh nghiệp."},{"k":"p","t":"4. Các doanh nghiệp có các nghiệp vụ kinh tế, tài chính đặc thù thuộc đối tượng điều chỉnh của các văn bản pháp luật khác thì áp dụng theo quy định về chứng từ tại các văn bản đó."}]},{"id":"tt133_85","no":85,"code":"Điều 85","title":"Điều 85. Lập và ký chứng từ kế toán","shortTitle":"Lập và ký chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các nghiệp vụ kinh tế, tài chính phát sinh liên quan đến hoạt động của doanh nghiệp phải lập chứng từ kế toán. Chứng từ kế toán chỉ được lập một lần cho mỗi nghiệp vụ kinh tế, tài chính."},{"k":"p","t":"2. Chứng từ kế toán phải được lập rõ ràng, đầy đủ, kịp thời, chính xác theo nội dung quy định trên mẫu. Trong trường hợp chứng từ kế toán chưa có mẫu thì đơn vị kế toán được tự thiết kế mẫu chứng từ kế toán nhưng phải bảo đảm đầy đủ các nội dung quy định của Luật Kế toán."},{"k":"p","t":"3. Nội dung nghiệp vụ kinh tế, tài chính trên chứng từ kế toán không được viết tắt, không được tẩy xóa, sửa chữa; khi viết phải dùng bút mực, số và chữ viết phải liên tục, không ngắt quãng, chỗ trống phải gạch chéo. Chứng từ bị tẩy xóa, sửa chữa không có giá trị thanh toán và ghi sổ kế toán. Khi viết sai chứng từ kế toán thì phải hủy bỏ bằng cách gạch chéo vào chứng từ viết sai."},{"k":"p","t":"4. Chứng từ kế toán phải được lập đủ số liên quy định. Trường hợp phải lập nhiều liên chứng từ kế toán cho một nghiệp vụ kinh tế, tài chính thì nội dung các liên phải giống nhau."},{"k":"p","t":"5. Chứng từ kế toán phải có đủ chữ ký theo chức danh quy định trên chứng từ. Chữ ký trên chứng từ kế toán phải được ký bằng loại mực không phai. Không được ký chứng từ kế toán bằng mực màu đỏ hoặc đóng dấu chữ ký khắc sẵn. Chữ ký trên chứng từ kế toán của một người phải thống nhất. Người lập, người duyệt và những người khác ký tên trên chứng từ kế toán phải chịu trách nhiệm về nội dung của chứng từ kế toán."},{"k":"p","t":"6. Các doanh nghiệp chưa có chức danh kế toán trưởng thì phải cử người phụ trách kế toán để giao dịch với khách hàng, ngân hàng... Chữ ký kế toán trưởng được thay bằng chữ ký của người phụ trách kế toán của đơn vị đó. Người phụ trách kế toán phải thực hiện đúng trách nhiệm và quyền quy định cho kế toán trưởng."},{"k":"p","t":"7. Chữ ký trên chứng từ kế toán phải do người có thẩm quyền hoặc người được ủy quyền ký. Nghiêm cấm người có thẩm quyền hoặc được ủy quyền ký chứng từ thực hiện việc ký chứng từ kế toán khi chưa ghi hoặc chưa ghi đủ nội dung chứng từ theo trách nhiệm của người ký."},{"k":"p","t":"8. Việc phân cấp ký trên chứng từ kế toán do Tổng Giám đốc (Giám đốc), người đại diện theo pháp luật của doanh nghiệp quy định phù hợp với luật pháp, yêu cầu quản lý, đảm bảo kiểm soát chặt chẽ, an toàn tài sản."},{"k":"p","t":"9. Chứng từ kế toán chi tiền phải do người có thẩm quyền duyệt chi và kế toán trưởng hoặc người được ủy quyền ký trước khi thực hiện. Chữ ký trên chứng từ kế toán dùng để chi tiền phải ký theo từng liên."},{"k":"p","t":"10. Kế toán trưởng (hoặc người được ủy quyền) không được ký “thừa ủy quyền” của người đứng đầu doanh nghiệp. Người được ủy quyền không được ủy quyền lại cho người khác."},{"k":"p","t":"11. Chứng từ điện tử phải có chữ ký điện tử. Chữ ký trên chứng từ điện tử có giá trị như chữ ký trên chứng từ bằng giấy."}]},{"id":"tt133_86","no":86,"code":"Điều 86","title":"Điều 86. Trình tự luân chuyển và kiểm tra chứng từ kế toán","shortTitle":"Trình tự luân chuyển và kiểm tra chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Tất cả các chứng từ kế toán do doanh nghiệp lập hoặc từ bên ngoài chuyển đến đều phải tập trung tại bộ phận kế toán doanh nghiệp. Bộ phận kế toán kiểm tra những chứng từ kế toán đó và chỉ sau khi kiểm tra và xác minh tính pháp lý của chứng từ thì mới dùng những chứng từ đó để ghi sổ kế toán."},{"k":"p","t":"2. Trình tự luân chuyển chứng từ kế toán bao gồm các bước sau:"},{"k":"p","t":"- Lập, tiếp nhận, xử lý chứng từ kế toán;"},{"k":"p","t":"- Kế toán viên, kế toán trưởng kiểm tra và ký chứng từ kế toán hoặc trình người ký duyệt theo thẩm quyền;"},{"k":"p","t":"- Phân loại, sắp xếp chứng từ kế toán, định khoản và ghi sổ kế toán;"},{"k":"p","t":"- Lưu trữ, bảo quản chứng từ kế toán."},{"k":"p","t":"3. Trình tự kiểm tra chứng từ kế toán."},{"k":"p","t":"- Kiểm tra tính rõ ràng, trung thực, đầy đủ của các chỉ tiêu, các yếu tố ghi chép trên chứng từ kế toán;"},{"k":"p","t":"- Kiểm tra tính hợp pháp của nghiệp vụ kinh tế, tài chính phát sinh đã ghi trên chứng từ kế toán, đối chiếu chứng từ kế toán với các tài liệu khác có liên quan;"},{"k":"p","t":"- Kiểm tra tính chính xác của số liệu, thông tin trên chứng từ kế toán."},{"k":"p","t":"4. Khi kiểm tra chứng từ kế toán nếu phát hiện hành vi vi phạm chính sách, chế độ, các quy định về quản lý kinh tế, tài chính của Nhà nước, phải từ chối thực hiện (Không xuất quỹ, thanh toán, xuất kho,…) đồng thời báo ngay cho người quản lý điều hành doanh nghiệp biết để xử lý kịp thời theo pháp luật hiện hành. Đối với những chứng từ kế toán lập không đúng thủ tục, nội dung và chữ số không rõ ràng thì người chịu trách nhiệm kiểm tra hoặc ghi sổ phải trả lại, yêu cầu làm thêm thủ tục và điều chỉnh sau đó mới làm căn cứ ghi sổ."}]},{"id":"tt133_87","no":87,"code":"Điều 87","title":"Điều 87. Dịch chứng từ kế toán ra tiếng Việt, sử dụng, quản lý, in và phát hành biểu mẫu chứng từ kế toán","shortTitle":"Dịch chứng từ kế toán ra tiếng Việt, sử dụng, quản lý, in và phát hành biểu mẫu chứng từ kế toán","chuong":"Chương IV — CHỨNG TỪ KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"Các chứng từ kế toán ghi bằng tiếng nước ngoài, khi sử dụng để ghi sổ kế toán và lập báo cáo tài chính ở Việt Nam phải được dịch các nội dung chủ yếu quy định tại Luật Kế toán ra tiếng Việt."},{"k":"p","t":"Đơn vị kế toán phải chịu trách nhiệm về tính chính xác và đầy đủ của nội dung được dịch ra tiếng nước ngoài sang tiếng Việt. Bản chứng từ dịch ra tiếng việt phải đính kèm với bản chính bằng tiếng nước ngoài."},{"k":"p","t":"Các tài liệu kèm theo chứng từ kế toán bằng tiếng nước ngoài như các loại hợp đồng, hồ sơ kèm theo chứng từ thanh toán, hồ sơ dự án đầu tư, báo cáo quyết toán và các tài liệu liên quan khác không phải dịch ra tiếng Việt trừ khi có yêu cầu của cơ quan Nhà nước có thẩm quyền."},{"k":"p","t":"Các doanh nghiệp có thể mua sẵn hoặc tự thiết kế mẫu, tự in, nhưng phải đảm bảo các nội dung chủ yếu của chứng từ quy định tại Luật Kế toán."},{"k":"p","t":"Chứng từ phải được bảo quản cẩn thận, không được để hư hỏng, mục nát. Séc và giấy tờ có giá phải được quản lý như tiền. Các doanh nghiệp có sử dụng chứng từ điện tử cho hoạt động kinh tế, tài chính và ghi sổ kế toán thì phải tuân thủ theo quy định của các văn bản pháp luật về chứng từ điện tử."}]},{"id":"tt133_88","no":88,"code":"Điều 88","title":"Điều 88. Sổ kế toán","shortTitle":"Sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Sổ kế toán dùng để ghi chép, hệ thống và lưu giữ toàn bộ các nghiệp vụ kinh tế, tài chính đã phát sinh theo nội dung kinh tế và theo trình tự thời gian có liên quan đến doanh nghiệp. Mỗi doanh nghiệp nhỏ và vừa chỉ có một hệ thống sổ kế toán cho một kỳ kế toán. Doanh nghiệp nhỏ và vừa phải thực hiện các quy định về sổ kế toán trong Luật Kế toán, các văn bản hướng dẫn thi hành Luật Kế toán và các văn bản hướng dẫn, sửa đổi, bổ sung hoặc thay thế."},{"k":"p","t":"2. Doanh nghiệp được tự xây dựng biểu mẫu sổ kế toán cho riêng mình nhưng phải đảm bảo cung cấp thông tin về giao dịch kinh tế một cách minh bạch, đầy đủ, dễ kiểm tra, dễ kiểm soát và dễ đối chiếu. Trường hợp không tự xây dựng biểu mẫu sổ kế toán, doanh nghiệp có thể áp dụng biểu mẫu sổ kế toán theo hướng dẫn tại Phụ lục 4 ban hành kèm theo Thông tư này nếu phù hợp với đặc điểm quản lý và hoạt động kinh doanh của mình."},{"k":"p","t":"3. Tùy theo đặc điểm hoạt động và yêu cầu quản lý, doanh nghiệp được tự xây dựng hình thức ghi sổ kế toán cho riêng mình trên cơ sở đảm bảo thông tin về các giao dịch phải được phản ánh đầy đủ, kịp thời, dễ kiểm tra, kiểm soát và đối chiếu."}]},{"id":"tt133_89","no":89,"code":"Điều 89","title":"Điều 89. Trách nhiệm của người giữ và ghi sổ kế toán","shortTitle":"Trách nhiệm của người giữ và ghi sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"Sổ kế toán phải được quản lý chặt chẽ, phân công rõ ràng trách nhiệm cá nhân giữ và ghi sổ. Sổ kế toán giao cho nhân viên nào thì nhân viên đó phải chịu trách nhiệm về những điều ghi trong sổ và việc giữ sổ trong suốt thời gian dùng sổ. Khi có sự thay đổi nhân viên giữ và ghi sổ, kế toán trưởng phải tổ chức việc bàn giao trách nhiệm quản lý và ghi sổ kế toán giữa nhân viên cũ và nhân viên mới. Biên bản bàn giao phải được kế toán trưởng ký xác nhận."}]},{"id":"tt133_90","no":90,"code":"Điều 90","title":"Điều 90. Mở, ghi sổ kế toán, chữ ký và sửa chữa sổ kế toán","shortTitle":"Mở, ghi sổ kế toán, chữ ký và sửa chữa sổ kế toán","chuong":"Chương IV — SỔ KẾ TOÁN VÀ HÌNH THỨC KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Mở sổ"},{"k":"p","t":"Sổ kế toán phải mở vào đầu kỳ kế toán năm. Đối với doanh nghiệp mới thành lập, sổ kế toán phải mở từ ngày thành lập. Người đại diện theo pháp luật và kế toán trưởng của doanh nghiệp có trách nhiệm ký duyệt các sổ kế toán. Sổ kế toán có thể đóng thành quyển hoặc để tờ rời. Các tờ sổ khi dùng xong phải đóng thành quyển để lưu trữ. Trước khi dùng sổ kế toán phải hoàn thiện các thủ tục sau:"},{"k":"p","t":"- Đối với sổ kế toán dạng quyển: Trang đầu sổ phải ghi rõ tên doanh nghiệp, tên sổ, ngày mở sổ, niên độ kế toán và kỳ ghi sổ, họ tên, chữ ký của người giữ và ghi sổ, của kế toán trưởng và người đại diện theo pháp luật, ngày kết thúc ghi sổ hoặc ngày chuyển giao cho người khác. Sổ kế toán phải đánh số trang từ trang đầu đến trang cuối, giữa hai trang sổ phải đóng dấu giáp lai của đơn vị kế toán."},{"k":"p","t":"- Đối với sổ tờ rời: Đầu mỗi sổ tờ rời phải ghi rõ tên doanh nghiệp, số thứ tự của từng tờ sổ, tên sổ, tháng sử dụng, họ tên người giữ và ghi sổ. Các tờ rời trước khi dùng phải được giám đốc doanh nghiệp hoặc người được ủy quyền ký xác nhận, đóng dấu và ghi vào sổ đăng ký sử dụng sổ tờ rời. Các sổ tờ rời phải được sắp xếp theo thứ tự các tài khoản kế toán và phải đảm bảo sự an toàn, dễ tìm."},{"k":"p","t":"2. Ghi sổ: Việc ghi sổ kế toán phải căn cứ vào chứng từ kế toán đã được kiểm tra bảo đảm các quy định về chứng từ kế toán. Mọi số liệu ghi trên sổ kế toán bắt buộc phải có chứng từ kế toán hợp pháp, hợp lý chứng minh."},{"k":"p","t":"3. Khóa sổ: Cuối kỳ kế toán phải khóa sổ kế toán trước khi lập Báo cáo tài chính. Ngoài ra phải khóa sổ kế toán trong các trường hợp kiểm kê hoặc các trường hợp khác theo quy định của pháp luật."},{"k":"p","t":"4. Đối với người ghi sổ thuộc các đơn vị dịch vụ kế toán phải ký và ghi rõ Số chứng chỉ hành nghề, tên và địa chỉ đơn vị cung cấp dịch vụ kế toán. Người ghi sổ kế toán là cá nhân hành nghề ghi rõ số chứng chỉ hành nghề."},{"k":"p","t":"5. Khi phát hiện sổ kế toán của kỳ báo cáo có sai sót thì phải sửa chữa bằng phương pháp phù hợp với quy định của Luật Kế toán."},{"k":"p","t":"6. Trường hợp phát hiện sai sót trong các kỳ trước, doanh nghiệp phải điều chỉnh hồi tố."}]},{"id":"tt133_91","no":91,"code":"Điều 91","title":"Điều 91. Chuyển đổi số dư trên sổ kế toán","shortTitle":"Chuyển đổi số dư trên sổ kế toán","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp thực hiện chuyển đổi số dư các tài khoản sau:"},{"k":"p","t":"- Số dư chi tiết về vàng, bạc, kim khí quý, đá quý đang phản ánh trên TK 1113 và 1123 được chuyển sang theo dõi trên các TK 152 - Hàng tồn kho, TK 155 - Thành phẩm, TK 156 - Hàng hóa (đối với vàng bạc, kim khí quý, đá quý được phân loại là hàng tồn kho) và TK 2288 - Đầu tư khác (đối với vàng bạc, kim khí quý, đá quý không được phân loại là hàng tồn kho)."},{"k":"p","t":"- Số dư các khoản trái phiếu, tín phiếu, kỳ phiếu nắm giữ đến ngày đáo hạn, không nắm giữ vì mục đích kinh doanh (mua vào để bán ra với mục đích kiếm lời qua chênh lệch giá mua, bán) đang phản ánh trên TK 121 - Đầu tư tài chính ngắn hạn được chuyển sang TK 128 - Đầu tư nắm giữ đến ngày đáo hạn (1288);"},{"k":"p","t":"- Số dư TK 142 - Chi phí trả trước ngắn hạn được chuyển sang TK 242 - Chi phí trả trước;"},{"k":"p","t":"- Số dư chi tiết TK 1388 về ký quỹ, ký cược ngắn hạn và TK 244 - Ký quỹ, ký cược dài hạn được chuyển sang TK 1386 - Cầm cố, thế chấp, ký quỹ, ký cược;"},{"k":"p","t":"- Số dư các khoản dự phòng đang phản ánh trên TK 159, 229 được chuyển sang TK 229 - Dự phòng tổn thất tài sản (chi tiết cho từng TK cấp 2 phù hợp với nội dung dự phòng);"},{"k":"p","t":"- Số dư TK 311 - Vay ngắn hạn, TK 315 - Nợ dài hạn đến hạn trả, TK 3411- Vay dài hạn và TK 3412 - Nợ dài hạn chuyển sang TK 341 - Vay và nợ thuê tài chính;"},{"k":"p","t":"- Số dư TK 3414 - Nhận ký quỹ, ký cược dài hạn chuyển sang TK 3386 - Nhận ký quỹ, ký cược."},{"k":"p","t":"- Khoản trích trước chi phí sửa chữa, duy trì cho TSCĐ hoạt động bình thường (đối với những TSCĐ theo yêu cầu kỹ thuật phải sửa chữa định kỳ), chi phí hoàn nguyên môi trường, hoàn trả mặt bằng và các khoản có tính chất tương tự đang phản ánh trên TK 335 - Chi phí phải trả được chuyển sang TK 352 - Dự phòng phải trả (chi tiết TK 3524)."},{"k":"p","t":"2. Các nội dung khác đang phản ánh chi tiết trên các tài khoản có liên quan nếu trái so với Thông tư này thì phải điều chỉnh lại theo quy định của Thông tư này."}]},{"id":"tt133_92","no":92,"code":"Điều 92","title":"Điều 92. Điều khoản hồi tố","shortTitle":"Điều khoản hồi tố","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp không tiếp tục trích khấu hao đối với bất động sản đầu tư nắm giữ chờ tăng giá và không phải hồi tố toàn bộ chi phí khấu hao lũy kế đã trích từ các kỳ trước."},{"k":"p","t":"2. Doanh nghiệp báo cáo lại thông tin so sánh trên Báo cáo tài chính đối với các chỉ tiêu có sự thay đổi giữa Thông tư này và Chế độ kế toán doanh nghiệp ban hành theo Quyết định số 48/2006/QĐ-BTC ngày 14/9/2006 của Bộ trưởng Bộ Tài chính và thuyết minh lí do là có sự thay đổi trong Chế độ kế toán doanh nghiệp."}]},{"id":"tt133_93","no":93,"code":"Điều 93","title":"Điều 93. Hiệu lực thi hành","shortTitle":"Hiệu lực thi hành","chuong":"Chương VI — TỔ CHỨC THỰC HIỆN","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này có hiệu lực áp dụng cho năm tài chính bắt đầu hoặc sau ngày 1/1/2017. Những quy định trái với Thông tư này đều bãi bỏ. Thông tư này thay thế các nội dung áp dụng đối với doanh nghiệp nhỏ và vừa tại Quyết định số 48/2006/QĐ-BTC ngày 14/9/2006 của Bộ trưởng Bộ Tài chính và Thông tư số 138/2011/TT-BTC ngày 4/10/2011 của Bộ Tài chính."},{"k":"p","t":"2. Các Bộ, ngành, Ủy ban nhân dân, Sở Tài chính, Cục Thuế các Tỉnh, Thành phố trực thuộc Trung ương có trách nhiệm triển khai hướng dẫn các doanh nghiệp thực hiện Thông tư này. Trong quá trình thực hiện nếu có vướng mắc đề nghị phản ánh về Bộ Tài chính để nghiên cứu giải quyết./."},{"k":"p","t":"Nơi nhận:\n- Thủ tướng, các Phó Thủ tướng Chính phủ;\n- Văn phòng TW Đảng;\n- Văn phòng Quốc hội;\n- Văn phòng Chủ tịch nước;\n- Văn phòng Chính phủ;\n- Văn phòng Tổng Bí thư;\n- Các Bộ, cơ quan ngang Bộ;\n- Tòa án NDTC;\n- Viện Kiểm sát NDTC;\n- Kiểm toán Nhà nước;\n- UBND tỉnh, thành phố trực thuộc TW;\n- Cơ quan TW của các đoàn thể;\n- Cục Kiểm tra văn bản -  Bộ Tư pháp;\n- Sở Tài chính, Cục Thuế các t Nam."},{"k":"p","t":"- Nguyên tắc ghi nhận các khoản tiền và các khoản tương đương tiền."},{"k":"p","t":"- Nguyên tắc kế toán các khoản đầu tư tài chính."},{"k":"p","t":"- Nguyên tắc kế toán nợ phải thu."},{"k":"p","t":"- Nguyên tắc ghi nhận hàng tồn kho."},{"k":"p","t":"- Nguyên tắc ghi nhận và phương pháp khấu hao TSCĐ, TSCĐ thuê tài chính, bất động sản đầu tư:"},{"k":"p","t":"- Nguyên tắc kế toán nợ phải trả."},{"k":"p","t":"- Nguyên tắc ghi nhận và vốn hóa các khoản chi phí đi vay."},{"k":"p","t":"- Nguyên tắc ghi nhận vốn chủ sở hữu."},{"k":"p","t":"- Nguyên tắc và phương pháp ghi nhận doanh thu."},{"k":"p","t":"- Nguyên tắc kế toán chi phí."},{"k":"p","t":"V. Thông tin bổ sung cho các khoản mục trình bày trong Báo cáo tình hình chính"},{"k":"p","t":"Đơn vị tính:…."},{"k":"p","t":"1. Tiền và tương đương tiền"},{"k":"p","t":"- Tiền mặt"},{"k":"p","t":"- Tiền gửi ngân hàng không kỳ hạn"},{"k":"p","t":"- Tương đương tiền"},{"k":"p","t":"Cộng"},{"k":"p","t":"Cuối năm"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"Đầu năm"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"2. Các khoản đầu tư tài chính"},{"k":"p","t":"a) Chứng khoán kinh doanh"},{"k":"p","t":"- Tổng giá trị cổ phiếu;"},{"k":"p","t":"- Tổng giá trị trái phiếu;"},{"k":"p","t":"- Các loại chứng khoán khác;"},{"k":"p","t":"b) Đầu tư nắm giữ đến ngày đáo hạn"},{"k":"p","t":"- Tiền gửi có kỳ hạn"},{"k":"p","t":"- Các khoản đầu tư khác nắm giữ đến ngày đáo hạn"},{"k":"p","t":"c) Đầu tư góp vốn vào đơn vị khác"},{"k":"p","t":"Cuối năm"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"Đầu năm"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"3. Các khoản phải thu"},{"k":"p","t":"Cuối năm"},{"k":"p","t":"Đầu năm"},{"k":"p","t":"a) Phải thu của khách h ":"p","t":"- Nguyên nhân và hướng xử lý đối với hàng tồn kho ứ đọng, kém, mất phẩm chất."},{"k":"p","t":"- Lý do dẫn đến việc trích lập thêm hoặc hoàn nhập dự phòng giảm giá hàng tồn kho."},{"k":"p","t":"5. Tăng, giảm tài sản cố định và bất động sản đầu tư (Chi tiết từng loại tài sản theo yêu cầu quản lý của doanh nghiệp):"},{"k":"p","t":"Khoản mục"},{"k":"p","t":"Số dư đầu năm"},{"k":"p","t":"Tăng trong năm"},{"k":"p","t":"Giảm trong năm"},{"k":"p","t":"Số dư cuối năm"},{"k":"p","t":"- Giá trị còn lại TSCĐ hữu hình"},{"k":"p","t":"- Giá trị còn lại TSCĐ vô hình"},{"k":"p","t":"- Giá trị còn lại TSCĐ thuê tài chính"},{"k":"p","t":"- Giá trị còn lại BĐSĐT"},{"k":"p","t":"- Giá trị còn lại cuối kỳ của TSCĐ, BĐSĐT dùng để thế chấp, cầm cố đảm bảo khoản vay;"},{"k":"p","t":"- Giá trị còn lại cuối kỳ của TSCĐ cuối kỳ chờ thanh lý;"},{"k":"p","t":"- Thuyết minh số liệu và giải trình khác."},{"k":"p","t":"6. Vay và nợ thuê tài chính"},{"k":"p","t":"Cuối năm"},{"k":"p","t":"Trong năm"},{"k":"p","t":"Đầu năm"},{"k":"p","t":"Tăng"},{"k":"p","t":"Giảm"},{"k":"p","t":"a) Vay ngắn hạn"},{"k":"p","t":"Trong đó: Vay từ các bên liên quan"},{"k":"p","t":"b) Các khoản nợ gốc thuê tài chính"},{"k":"p","t":"Trong đó: Nợ thuê tài chính từ các bên liên quan"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"Cộng"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"7. Các khoản phải trả"},{"k":"p","t":"Cuối năm"},{"k":"p","t":"Đầu năm"},{"k":"p","t":"a) Phải trả người bán"},{"k":"p","t":"Trong đó: Phải trả các bên liên quan"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p","t":"b) Người mua trả tiền trước"},{"k":"p","t":"Trong đó: Nhận trước của các bên liên quan"},{"k":"p","t":"…"},{"k":"p","t":"…"},{"k":"p" 35 Chi phí phải trả…Hoạt động ……Hoạt động ……Hoạt động ……Hoạt động ……Nguyên giá TSCĐSố khấu haoAB1234567891011…1I. Số khấu hao trích tháng trước 2II. Số KH TSCĐ tăng trong tháng"},{"k":"p","t":"-3III. Số KH TSCĐ giảm trong tháng"},{"k":"p","t":"-4IV. Số KH trích tháng này (I + II - III)Cộngx"},{"k":"p","t":"Người lập bảng\n(Ký, họ tên)"},{"k":"p","t":"Ngày…. tháng .... năm….\nKế toán trưởng\n(Ký, họ tên)"},{"k":"p","t":"I. CHỈ TIÊU LAO ĐỘNG TIỀN LƯƠNG"},{"k":"p","t":"1. Mục đích: Các chứng từ thuộc chỉ tiêu lao động tiền lương được lập nhằm mục đích theo dõi tình hình sử dụng thời gian lao động; theo dõi các khoản phải thanh toán cho người lao động trong đơn vị như: tiền lương, tiền công các khoản phụ cấp, tiền thưởng, tiền công tác phí, tiền làm thêm ngoài giờ; theo dõi các khoản thanh toán cho bên ngoài, cho các tổ chức khác như: thanh toán tiền thuê ngoài, thanh toán các khoản phải trích nộp theo lương,... và một số nội dung khác có liên quan đến lao động, tiền lương."},{"k":"p","t":"2. Nội dung: Thuộc chỉ tiêu lao động tiền lương gồm có các biểu mẫu sau:"},{"k":"p","t":"- Bảng chấm công"},{"k":"p","t":"Mẫu số 01a- LĐTL"},{"k":"p","t":"- Bảng chấm công làm thêm giờ"},{"k":"p","t":"Mẫu số 01b- LĐTL"},{"k":"p","t":"- Bảng thanh toán tiền lương"},{"k":"p","t":"Mẫu số 02- LĐTL"},{"k":"p","t":"- Bảng thanh toán tiền thưởng"},{"k":"p","t":"Mẫu số 03- LĐTL"},{"k":"p","t":"- Giấy đi đường"},{"k":"p","t":"Mẫu số 04- LĐTL"},{"k":"p","t":"- Phiếu xác nhận sản phẩm hoặc công việc hoàn thành"},{"k":"p","t":"Mẫu số 05- LĐTL"},{"k":"p","t":"- Bảng thanh toán tiền làm thêm giờ"},{"k":"p","t":"Mẫu số 06- LĐTL"},{"k":"p","t":"- Bản thanh toán tiền thuê ngoài"},{"k":"p","t":"Mẫu số 07- LDTL"},{"k":"p","t":"- Hợp đồng giao khoán"},{"k":"p","t":"Mẫu số 08- LĐTL"},{"k":"p","t":"- Biên bản thanh lý (nghiệm thu) hợp đồng giao khoán"},{"k":"p","t":"Mẫu số 09- LĐTL"},{"k":"p","t":"- Bảng kê trích nộp các khoản theo lương"},{"k":"p","t":"Mẫu số 10- LĐTL"},{"k":"p","t":"- Bảng phân bổ tiền lương và bảo hiểm xã hội"},{"k":"p","t":"Mẫu số 11 - LĐTL"},{"k":"p","t":"BẢNG CHẤM CÔNG"},{"k":"p","t":"(Mẫu số 01a- LĐTL)"},{"k":"p","t":"1. Mục đích: Bảng chấm công dùng để theo dõi ngày công thực tế làm việc, nghỉ việc, nghỉ hưởng BHXH, ... để có căn cứ tính trả lương, bảo hiểm xã hội trả thay lương cho từng người và quản lý lao động trong đơn vị."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Mỗi bộ phận (phòng, ban, tổ, nhóm...) phải lập bảng chấm công hàng tháng."},{"k":"p","t":"Cột A, B: Ghi số thứ tự, họ và tên từng người trong bộ phận công tác."},{"k":"p","t":"Cột C: Ghi ngạch bậc lương hoặc cấp bậc chức vụ của từng người."},{"k":"p","t":"Cột 1-31: Ghi các ngày trong tháng (Từ ngày 01 đến ngày cuối cùng của tháng)."},{"k":"p","t":"Cột 32: Ghi tổng số công hưởng lương sản phẩm của từng người trong tháng."},{"k":"p","t":"Cột 33: Ghi tổng số công hưởng lương thời gian của từng người trong tháng."},{"k":"p","t":"Cột 34: Ghi tổng số công nghỉ việc và ngừng việc hưởng 100% lương của từng người trong tháng."},{"k":"p","t":"Cột 35: Ghi tổng số công nghỉ việc và ngừng việc hưởng các loại % lương của từng người trong tháng."},{"k":"p","t":"Cột 36: Ghi tổng số công nghỉ hưởng bảo hiểm xã hội của từng người trong tháng."},{"k":"p","t":"Hàng ngày tổ trưởng (Trưởng ban, phòng, nhóm,...) hoặc người được ủy quyền căn cứ vào tình hình thực tế của bộ phận mình để chấm công cho từng người trong ngày, ghi vào ngày tương ứng trong các cột từ cột 1 đến cột 31 theo các ký hiệu quy định trong chứng từ."},{"k":"p","t":"Cuối tháng, người chấm công và người phụ trách bộ phận ký vào Bảng chấm công và chuyển Bảng chấm công cùng các chứng từ liên quan như Giấy chứng nhận nghỉ việc hưởng BHXH, giấy xin nghỉ việc không hưởng lương,... về bộ phận kế toán kiểm tra, đối chiếu qui ra công để tính lương và bảo hiểm xã hội. Kế toán tiền lương căn cứ vào các ký hiệu chấm công của từng người tính ra số ngày công theo từng loại tương ứng để ghi vào các cột 32, 33, 34, 35."},{"k":"p","t":"Ngày công được quy định là 8 giờ. Khi tổng hợp quy thành ngày công nếu còn giờ lẻ thì ghi số giờ lẻ bên cạnh số công và đánh dấu phẩy ở giữa."},{"k":"p","t":"Ví dụ: 22 công 4 giờ ghi 22,4"},{"k":"p","t":"Bảng chấm công được lưu tại phòng (ban, tổ,...) kế toán cùng các chứng từ có liên quan."},{"k":"p","t":"Phương pháp chấm công: Tùy thuộc vào điều kiện công tác và trình độ kế toán tại đơn vị để sử dụng 1 trong các phương pháp chấm công sau:"},{"k":"p","t":"- Chấm công ngày: Mỗi khi người lao động làm việc tại đơn vị hoặc làm việc khác như hội nghị, họp,... thì mỗi ngày dùng một ký hiệu để chấm công cho ngày đó."},{"k":"p","t":"Cần chú ý 2 trường hợp:"},{"k":"p","t":"+ Nếu trong ngày, người lao động làm 2 việc có thời gian khác nhau thì chấm công theo ký hiệu của công việc chiếm nhiều thời gian nhất. Ví dụ người lao động A trong ngày họp 5 giờ làm lương thời gian 3 giờ thì cả ngày hôm đó chấm “H” Hội họp."},{"k":"p","t":"+ Nếu trong ngày, người lao động làm 2 việc có thời gian bằng nhau thì chấm công theo ký hiệu của công việc diễn ra trước."},{"k":"p","t":"- Chấm công theo giờ:"},{"k":"p","t":"Trong ngày người lao động làm bao nhiêu công việc thì chấm công theo các ký hiệu đã quy định và ghi số giờ công thực hiện công việc đó bên cạnh ký hiệu tương ứng."},{"k":"p","t":"- Chấm công nghỉ bù: Nghỉ bù chỉ áp dụng trong trường hợp làm thêm giờ hưởng lương thời gian nhưng không thanh toán lương làm thêm, do đó khi người lao động nghỉ bù thì chấm “NB” và vẫn tính trả lương thời gian."},{"k":"p","t":"BẢNG CHẤM CÔNG LÀM THÊM GIỜ"},{"k":"p","t":"(Mẫu số 01b- LĐTL)"},{"k":"p","t":"1. Mục đích: Theo dõi ngày công thực tế làm thêm ngoài giờ để có căn cứ tính thời gian nghỉ bù hoặc thanh toán cho người lao động trong đơn vị."},{"k":"p","t":"2. Phương pháp lập và trách nhiệm ghi"},{"k":"p","t":"Mỗi bộ phận (phòng, ban, tổ, nhóm...) có phát sinh làm thêm ngoài giờ làm việc theo quy định thì phải lập bảng chấm công làm thêm giờ."},{"k":"p","t":"Cột A, B: Ghi số thứ tự, họ và tên từng người làm việc thêm giờ trong bộ phận công tác."},{"k":"p","t":"Cột 1 đến cột 31: Ghi số giờ làm thêm của các ngày (Từ giờ...đến giờ...) từ ngày 01 đến ngày cuối cùng của tháng."},{"k":"p","t":"Cột 32: Ghi tổng số giờ làm thêm vào các ngày thường trong tháng."},{"k":"p","t":"Cột 33: Ghi tổng số giờ làm thêm vào các ngày nghỉ thứ bảy, chủ nhật."},{"k":"p","t":"Cột 34: Ghi tổng số giờ làm thêm vào các ngày lễ, tết."},{"k":"p","t":"Cột 35: Ghi tổng số giờ làm thêm vào buổi tối (tính theo quy định của pháp luật) không thuộc ca làm việc của người lao động."},{"k":"p","t":"Hàng ngày tổ trưởng (phòng ban, tổ nhóm...) hoặc người được ủy quyền căn cứ vào số giờ làm thêm thực tế theo yêu cầu công việc của bộ phận mình để chấm giờ làm thêm cho từng người trong ngày, ghi vào ngày tương ứng trong các cột từ 1 đến 31 theo các ký hiệu quy định trong chứng từ."},{"k":"p","t":"Cuối tháng, người chấm công, phụ trách bộ phận có người làm thêm ký và giám đốc hoặc người được ủy quyền duyệt vào bảng chấm công làm thêm giờ và chuyển bảng chấm công làm thêm giờ cùng các chứng từ liên quan về bộ phận kế toán kiểm tra, đối chiếu, quy ra công để thanh toán (trường hợp thanh toán tiền). Kế toán căn cứ vào các ký hiệu chấm công của từng người tính ra số công theo từng loại tương ứng để ghi vào các cột 32, 33, 34, 35."},{"k":"p","t":"BẢNG THANH TOÁN TIỀN LƯƠNG"},{"k":"p","t":"(Mẫu số 02 - LĐTL)"},{"k":"p","t":"1. Mục đích: Bảng thanh toán tiền lương là chứng từ làm căn cứ để thanh toán tiền lương, phụ cấp, các khoản thu nhập tăng thêm ngoài tiền lương cho người lao động, kiểm tra việc thanh toán tiền lương cho người lao động làm việc trong doanh nghiệp đồng thời là căn cứ để thống kê về lao động tiền lương."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Bảng thanh toán tiền lương được lập hàng tháng. Cơ sở để lập Bảng thanh toán tiền lương là các chứng từ liên quan như: Bảng chấm công, phiếu xác nhận sản phẩm hoặc công việc hoàn thành..."},{"k":"p","t":"Cột A, B: Ghi số thứ tự, họ tên của người lao động được hưởng lương."},{"k":"p","t":"Cột 1, 2: Ghi bậc lương, hệ số lương của người lao động."},{"k":"p","t":"Cột 3, 4: Ghi số sản phẩm và số tiền tính theo lương sản phẩm."},{"k":"p","t":"Cột 5, 6: Ghi số công và số tiền tính theo lương thời gian."},{"k":"p","t":"Cột 7, 8: Ghi số công và số tiền tính theo lương thời gian hoặc ngừng, nghỉ việc hưởng các loại % lương."},{"k":"p","t":"Cột 9: Ghi các khoản phụ cấp thuộc quỹ lương."},{"k":"p","t":"Cột 10: Ghi số phụ cấp khác được tính vào thu nhập của người lao động nhưng không nằm trong quỹ lương, quỹ thưởng."},{"k":"p","t":"Cột 11: Ghi tổng số tiền lương và các khoản phụ cấp mà người lao động được hưởng."},{"k":"p","t":"Cột 12: Ghi số tiền tạm ứng kỳ I của mỗi người."},{"k":"p","t":"Cột 13, 14, 15, 16: Ghi các khoản phải khấu trừ khỏi lương của người lao động và tính ra tổng số tiền phải khấu trừ trong tháng."},{"k":"p","t":"Cột 17: Ghi số tiền còn được nhận kỳ II."},{"k":"p","t":"Cột C: Người lao động ký nhận khi nhận lương kỳ II."},{"k":"p","t":"Cuối mỗi tháng căn cứ vào chứng từ liên quan, kế toán tiền lương lập Bảng thanh toán tiền lương chuyển cho kế toán trưởng soát xét xong trình cho giám đốc hoặc người được ủy quyền ký duyệt, chuyển cho kế toán lập phiếu chi và phát lương. Bảng thanh toán tiền lương được lưu tại phòng (ban) kế toán của đơn vị."},{"k":"p","t":"Mỗi lần lĩnh lương, người lao động phải trực tiếp ký vào cột “Ký nhận” hoặc người nhận hộ phải ký thay."},{"k":"p","t":"BẢNG THANH TOÁN TIỀN THƯỞNG"},{"k":"p","t":"(Mẫu số 03- LĐTL)"},{"k":"p","t":"1. Mục đích: Là chứng từ xác nhận số tiền thưởng cho từng người lao động, làm cơ sở để tính thu nhập của mỗi người lao động và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Bảng thanh toán tiền thưởng phải ghi rõ tên đơn vị, bộ phận được thưởng."},{"k":"p","t":"Cột A, B, C: Ghi số thứ tự, họ tên, chức vụ, của người được thưởng."},{"k":"p","t":"Cột 1: Ghi bậc lương hiện đang được hưởng để tính ra lương hàng tháng."},{"k":"p","t":"Cột 2, 3: Ghi rõ loại thưởng được bình xét, số tiền được thưởng theo mỗi loại."},{"k":"p","t":"Cột D: Người được thưởng ký nhận tiền thưởng."},{"k":"p","t":"Bảng thanh toán tiền thưởng do phòng kế toán lập theo từng bộ phận và phải có chữ ký (họ tên) của người lập, kế toán trưởng và giám đốc."},{"k":"p","t":"GIẤY ĐI ĐƯỜNG"},{"k":"p","t":"(Mẫu số 04- LĐTL)"},{"k":"p","t":"1. Mục đích: Giấy đi đường là căn cứ để cán bộ và người lao động làm thủ tục cần thiết khi đến nơi công tác và thanh toán công tác phí, tàu xe sau khi về doanh nghiệp."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Sau khi có lệnh cử cán bộ, người lao động đi công tác, bộ phận hành chính làm thủ tục cấp giấy đi đường. Người đi công tác có nhu cầu ứng tiền tàu xe, công tác phí... mang giấy đi đường đến phòng kế toán làm thủ tục ứng tiền."},{"k":"p","t":"Cột 1: Ghi nơi đi, nơi đến công tác."},{"k":"p","t":"Cột 2: Ghi ngày đi và ngày đến."},{"k":"p","t":"Khi đến nơi công tác, cơ quan đến công tác phải xác nhận ngày, giờ đến và đi (đóng dấu và chữ ký xác nhận của người có trách nhiệm ở cơ quan đến công tác)."},{"k":"p","t":"Cột 3: Phương tiện sử dụng: Cần ghi rõ đi ô tô cơ quan, ô tô khách, tàu hỏa, máy bay ..."},{"k":"p","t":"Cột 4: Độ dài chặng đường từ nơi đi đến nơi đến."},{"k":"p","t":"Cột 5: Ghi thời gian công tác."},{"k":"p","t":"Cột 6: Ghi lý do lưu trú."},{"k":"p","t":"Cột 7: Lấy chữ ký của người có thẩm quyền và đóng dấu của nơi cán bộ, người lao động đến công tác."},{"k":"p","t":"Khi đi công tác về người đi công tác xuất trình giấy đi đường để phụ trách bộ phận xác nhận ngày về và thời gian được hưởng lưu trú. Sau đó đính kèm các chứng từ trong đợt công tác (như vé tàu xe, vé phà, hóa đơn thanh toán tiền phòng nghỉ...) vào giấy đi đường và nộp cho phòng kế toán để làm thủ tục thanh toán công tác phí, thanh toán tạm ứng. Sau đó chuyển cho kế toán trưởng duyệt chi thanh toán."},{"k":"p","t":"Giấy đi đường và các chứng từ liên quan được lưu ở phòng kế toán."},{"k":"p","t":"PHIẾU XÁC NHẬN SẢN PHẨM HOẶC CÔNG VIỆC HOÀN THÀNH"},{"k":"p","t":"(Mẫu số 05- LĐTL)"},{"k":"p","t":"1. Mục đích: Là chứng từ xác nhận số sản phẩm hoặc công việc hoàn thành của đơn vị hoặc cá nhân người lao động, làm cơ sở để lập bảng thanh toán tiền lương hoặc tiền công cho người lao động."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"- Phía trên góc trái ghi rõ tên đơn vị, bộ phận quản lý công việc phải thanh toán cho người lao động."},{"k":"p","t":"- Ghi rõ số, ngày, tháng, năm lập phiếu."},{"k":"p","t":"- Ghi rõ tên đơn vị (hoặc cá nhân) thực hiện số sản phẩm (hoặc công việc) hoàn thành."},{"k":"p","t":"- Ghi rõ số hợp đồng và ngày, tháng, năm ký hợp đồng (nếu có)."},{"k":"p","t":"- Cột A, B, C: Ghi số thứ tự, tên, đơn vị tính của sản phẩm (hoặc công việc) hoàn thành."},{"k":"p","t":"- Cột 1, 2, 3: Ghi số lượng, đơn giá, thành tiền của mỗi loại sản phẩm (hoặc công việc) hoàn thành."},{"k":"p","t":"Phiếu này do người giao việc lập thành 2 liên: liên 1 lưu và liên 2 chuyển đến kế toán tiền lương để làm thủ tục thanh toán cho người lao động. Trước khi chuyển đến kế toán phải có đầy đủ chữ ký của người giao việc, người nhận việc, người kiểm tra chất lượng và người duyệt."},{"k":"p","t":"BẢNG THANH TOÁN TIỀN LÀM THÊM GIỜ"},{"k":"p","t":"(Mẫu số 06- LĐTL)"},{"k":"p","t":"1. Mục đích: Bảng thanh toán tiền làm thêm giờ nhằm xác định khoản tiền lương, tiền công làm thêm giờ mà người lao động được hưởng sau khi làm việc ngoài giờ theo yêu cầu công việc."},{"k":"p","t":"2. Phương pháp lập và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Bảng thanh toán tiền làm thêm giờ phải ghi rõ tên đơn vị, bộ phận làm việc."},{"k":"p","t":"Dòng tháng năm: Ghi rõ tháng và năm mà người lao động tiến hành làm thêm giờ."},{"k":"p","t":"Cột A, B: Ghi số thứ tự, họ và tên của người làm việc thêm giờ."},{"k":"p","t":"Cột 1: Ghi hệ số lương người lao động đang hưởng."},{"k":"p","t":"Cột 2: Ghi hệ số phụ cấp chức vụ người lao động đang hưởng."},{"k":"p","t":"Cột 3: Ghi tổng số hệ số người làm thêm được hưởng (Cột 3 = cột 1 + cột 2)."},{"k":"p","t":"Cột 4: Ghi tiền lương tháng được hưởng tính bằng: Lương tối thiểu (Theo quy định của nhà nước) nhân với (x) Hệ số lương cộng với (+) Phụ cấp chức vụ."},{"k":"p","t":"Cột 5: Ghi mức lương ngày được tính bằng Lương tối thiểu (theo quy định của Nhà nước) x (hệ số lương + hệ số phụ cấp chức vụ)/ 22 ngày."},{"k":"p","t":"Cột 6: Ghi mức lương giờ được tính bằng Cột 5 chia cho 8 giờ."},{"k":"p","t":"Cột số giờ làm thêm ngày thường, số giờ làm thêm ngày thứ 7, chủ nhật, số giờ làm thêm ngày lễ (Cột 7, 9, 11, 13) căn cứ vào bảng chấm công làm thêm giờ thực tế của tháng đó để ghi."},{"k":"p","t":"Cột thành tiền của làm thêm ngày thường (cột 8) = số giờ (cột 7) x mức lương giờ (cột 6) x Hệ số làm thêm theo quy định hiện hành."},{"k":"p","t":"Cột thành tiền của làm thêm ngày thứ 7, CN (cột 10) = số giờ (cột 9) x mức lương giờ (cột 6) x Hệ số làm thêm theo quy định hiện hành."},{"k":"p","t":"Cột thành tiền của làm thêm ngày lễ, tết (cột 12) = số giờ (cột 11) x mức lương giờ (cột 6) x Hệ số làm thêm theo quy định hiện hành."},{"k":"p","t":"Cột thành tiền làm thêm buổi đêm (cột 14) = số giờ (cột 13) nhân (x) mức lương giờ (cột 6) x Hệ số làm thêm theo quy định hiện hành."},{"k":"p","t":"Cột 15: Ghi tổng cộng số tiền Cột 15 = cột 8 + cột 10 + cột 12 + cột 14."},{"k":"p","t":"Cột 16, 17: Ghi số giờ công nghỉ bù của những ngày làm thêm và số tiền tương ứng của những ngày nghỉ bù phải trừ không được thanh toán tiền."},{"k":"p","t":"Cột 17 = cột 16 x cột 6 x Hệ số làm thêm theo quy định hiện hành."},{"k":"p","t":"Cột 18: Ghi số tiền làm thêm thực thanh toán cho người làm thêm."},{"k":"p","t":"Cột 18 = cột 15 - cột 17."},{"k":"p","t":"Cột C - Ký nhận: Người làm thêm sau khi nhận tiền phải ký vào cột này."},{"k":"p","t":"Bảng thanh toán tiền làm thêm giờ phải kèm theo bảng chấm công làm thêm giờ của tháng đó, có đầy đủ chữ ký của người lập biểu, kế toán trưởng, giám đốc hoặc người được ủy quyền duyệt. Bảng thanh toán tiền làm thêm giờ được lập thành 1 bản để làm căn cứ thanh toán."},{"k":"p","t":"BẢN THANH TOÁN TIỀN THUÊ NGOÀI"},{"k":"p","t":"(Mẫu số 07- LĐTL)"},{"k":"p","t":"1. Mục đích: Bản thanh toán tiền thuê ngoài là chứng từ kế toán nhằm xác nhận số tiền đã thanh toán cho người được thuê để thực hiện những công việc không lập được hợp đồng, như: Thuê lao động bốc vác, thuê vận chuyển thiết bị, thuê làm khoán 1 công việc nào đó.... Chứng từ được dùng để thanh toán cho người lao động thuê ngoài."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Chứng từ này do người thuê lao động lập."},{"k":"p","t":"Ghi họ và tên người thuê thuộc bộ phận (Phòng, ban,...)."},{"k":"p","t":"Ghi rõ nội dung, địa điểm và thời gian thuê."},{"k":"p","t":"Cột A, B, C: Ghi số thứ tự, họ tên, địa chỉ hoặc số chứng minh thư, hoặc thẻ căn cước của người được thuê."},{"k":"p","t":"Cột D: Ghi rõ nội dung hoặc tên công việc thuê."},{"k":"p","t":"Cột 1: Ghi số công lao động hoặc khối lượng công việc đã làm."},{"k":"p","t":"Cột 2: Ghi đơn giá phải thanh toán cho 1 công lao động hoặc 1 đơn vị khối lượng công việc. Trường hợp thuê khoán gọn công việc thì cột này để trống."},{"k":"p","t":"Cột 3: Ghi số tiền phải thanh toán."},{"k":"p","t":"Cột 4: Tiền thuế khấu trừ phải nộp nếu người được thuê có mức thu nhập ở diện phải nộp thuế thu nhập cá nhân theo quy định của Luật thuế (nếu có)."},{"k":"p","t":"Cột 5: Số tiền còn lại được nhận của người được thuê sau khi đã khấu trừ thuế. (Cột 5 = cột 3 - cột 4)"},{"k":"p","t":"Cột E: Người được thuê ký nhận khi nhận tiền."},{"k":"p","t":"HỢP ĐỒNG GIAO KHOÁN"},{"k":"p","t":"(Mẫu số 08- LĐTL)"},{"k":"p","t":"1. Mục đích: Hợp đồng giao khoán là bản ký kết giữa người giao khoán và người nhận khoán nhằm xác nhận về khối lượng công việc khoán hoặc nội dung công việc khoán, thời gian làm việc, trách nhiệm, quyền lợi của mỗi bên khi thực hiện công việc đó. Đồng thời là cơ sở thanh toán chi phí cho người nhận khoán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái ghi rõ tên đơn vị, địa chỉ và số của hợp đồng giao khoán (nếu có). Ghi rõ họ tên, chức vụ đại diện cho phòng, ban, bộ phận của bên giao khoán và bên nhận khoán."},{"k":"p","t":"Phần I. Điều khoản chung:"},{"k":"p","t":"- Phương thức giao khoán: Ghi rõ phương thức giao khoán cho người nhận khoán."},{"k":"p","t":"- Điều kiện thực hiện hợp đồng: Ghi rõ các điều kiện cam kết của 2 bên khi ký hợp đồng giao khoán."},{"k":"p","t":"- Thời gian thực hiện hợp đồng: Ghi rõ thời gian thực hiện công việc nhận khoán từ ngày bắt đầu đến ngày kết thúc hợp đồng."},{"k":"p","t":"- Các điều kiện khác: Ghi rõ các điều kiện khác khi ký kết hợp đồng."},{"k":"p","t":"Phần II. Điều khoản cụ thể:"},{"k":"p","t":"Ghi rõ nội dung các công việc khoán, trách nhiệm, quyền lợi và nghĩa vụ của người nhận khoán và người giao khoán (như điều kiện làm việc, yêu cầu sản phẩm (công việc) khoán, thời gian hoàn thành và số tiền phải thanh toán) đối với bên nhận khoán."},{"k":"p","t":"Hợp đồng giao khoán do bên giao khoán lập thành 3 bản:"},{"k":"p","t":"- 1 bản giao cho người nhận khoán;"},{"k":"p","t":"- 1 bản lưu ở bộ phận lập hợp đồng;"},{"k":"p","t":"- 1 bản chuyển về phòng kế toán cho người có trách nhiệm theo dõi quá trình thực hiện hợp đồng giao khoán và làm căn cứ để thanh toán hợp đồng."},{"k":"p","t":"Hợp đồng giao khoán phải có đầy đủ chữ ký, họ tên của đại diện bên giao khoán và đại diện bên nhận khoán, người lập và kế toán trưởng bên giao khoán."},{"k":"p","t":"BIÊN BẢN THANH LÝ (NGHIỆM THU) HỢP ĐỒNG GIAO KHOÁN"},{"k":"p","t":"(Mẫu số 09- LĐTL)"},{"k":"p","t":"1. Mục đích: Biên bản thanh lý hợp đồng giao khoán là chứng từ nhằm xác nhận số lượng, chất lượng công việc và giá trị của hợp đồng đã thực hiện, làm căn cứ để hai bên thanh toán và chấm dứt hợp đồng."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái ghi rõ tên đơn vị, bộ phận có bản thanh lý hợp đồng giao khoán."},{"k":"p","t":"Ghi rõ ngày, tháng, năm thanh lý hợp đồng, số hiệu bản thanh lý."},{"k":"p","t":"Ghi rõ họ tên, chức vụ của những người được đại diện cho bên giao khoán và bên nhận khoán."},{"k":"p","t":"Ghi rõ số, ngày tháng của hợp đồng được thanh lý."},{"k":"p","t":"Ghi rõ nội dung công việc đã thực hiện và giá trị của hợp đồng đã thực hiện đến thời điểm thanh lý hợp đồng."},{"k":"p","t":"Ghi rõ số tiền bằng số và bằng chữ mà bên giao khoán đã thanh toán cho bên nhận khoán từ khi ký hợp đồng đến ngày thanh lý hợp đồng."},{"k":"p","t":"Ghi rõ nội dung của từng bên vi phạm hợp đồng (nếu có) và số tiền bị phạt do vi phạm hợp đồng."},{"k":"p","t":"Ghi rõ số tiền bằng số và bằng chữ bên giao khoán còn phải thanh toán cho bên nhận khoán (Theo tính toán trong hợp đồng, nghiệm thu công việc và số tiền đã thanh toán trước cho nhau) đến khi thanh lý hợp đồng hoặc ngược lại bên giao khoán đã thanh toán quá cho bên nhận khoán."},{"k":"p","t":"Sau khi kiểm tra thực tế việc thực hiện hợp đồng, kết quả thực hiện hợp đồng hai bên nhất trí đưa ra kết luận về từng nội dung cụ thể về khối lượng thực hiện, đánh giá chất lượng và kiến nghị, các việc cần làm (nếu có)."},{"k":"p","t":"Biên bản thanh lý hợp đồng giao khoán được lập thành 4 bản, mỗi bên giữ 2 bản. Biên bản thanh lý hợp đồng giao khoán phải có đầy đủ chữ ký của đại diện bên giao khoán và đại diện bên nhận khoán thực hiện hợp đồng."},{"k":"p","t":"BẢNG KÊ TRÍCH NỘP CÁC KHOẢN THEO LƯƠNG"},{"k":"p","t":"(Mẫu số 10-LĐTL)"},{"k":"p","t":"1. Mục đích: Bảng kê trích nộp các khoản theo lương dùng để xác định số tiền bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, KPCĐ mà đơn vị và người lao động phải nộp trong tháng (hoặc quý) cho cơ quan bảo hiểm xã hội và công đoàn. Chứng từ này là cơ sở để ghi sổ kế toán về các khoản trích nộp theo lương."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái ghi rõ tên đơn vị, bộ phận trích nộp các khoản theo lương."},{"k":"p","t":"- Cột A: Ghi số thứ tự."},{"k":"p","t":"- Cột B: Ghi số tháng trích nộp BHXH, BHYT, BHTN, BHTNLĐ, KPCĐ áp dụng trong trường hợp kê khai theo quý."},{"k":"p","t":"- Cột 1: Ghi tổng quỹ lương dùng làm cơ sở để trích lập BHXH, BHYT, BHTN, BHTNLĐ, KPCĐ."},{"k":"p","t":"- Cột 2, 3, 4: Ghi tổng số tiền BHXH, BHYT, BHTN, BHTNLĐ phải nộp và trong đó chia theo nguồn trích tính vào chi phí và tính trừ vào lương của người lao động."},{"k":"p","t":"- Cột 5, 6, 7: Ghi tổng số tiền kinh phí công đoàn phải nộp và chia theo nguồn trích tính vào chi phí và tính trừ vào lương của người lao động."},{"k":"p","t":"- Cột 8: Ghi số kinh phí công đoàn đơn vị phải nộp cấp trên."},{"k":"p","t":"- Cột 9. Ghi số kinh phí công đoàn đơn vị được để lại chi tại đơn vị."},{"k":"p","t":"Bảng kê được lập thành 2 bản. Bảng kê trích nộp theo lương sau khi lập xong phải có đầy đủ chữ ký và ghi rõ họ tên của người lập, kế toán trưởng, giám đốc."},{"k":"p","t":"BẢNG PHÂN BỔ TIỀN LƯƠNG VÀ BẢO HIỂM XÃ HỘI"},{"k":"p","t":"(Mẫu số 11- LĐTL)"},{"k":"p","t":"1. Mục đích: Dùng để tập hợp và phân bổ tiền lương tiền công thực tế phải trả (gồm tiền lương, tiền công và các khoản phụ cấp), bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động và kinh phí công đoàn phải trích nộp trong tháng cho các đối tượng sử dụng lao động (ghi Có TK 334, TK 335, TK 338 (3382, 3383, 3384, 3385, 3388)."},{"k":"p","t":"2. Phương pháp lập và trách nhiệm ghi"},{"k":"p","t":"- Kết cấu và nội dung chủ yếu của bảng phân bố này gồm có các cột dọc ghi Có TK 334, TK 335, TK 338 (3382, 3383, 3384, 3385, 3888), các dòng ngang phản ánh tiền lương, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm tai nạn lao động, kinh phí công đoàn tính cho các đối tượng sử dụng lao động."},{"k":"p","t":"- Cơ sở lập:"},{"k":"p","t":"+ Căn cứ vào các bảng thanh toán lương, thanh toán làm đêm, làm thêm giờ... kế toán tập hợp, phân loại chứng từ theo từng đối tượng sử dụng tính toán số tiền để ghi vào bảng phân bổ này theo các dòng phù hợp cột ghi Có TK 334 hoặc có TK 335."},{"k":"p","t":"+ Căn cứ vào tỷ lệ trích bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, kinh phí công đoàn và tổng số tiền lương phải trả (theo quy định hiện hành) theo từng đối tượng sử dụng tính ra số tiền phải trích bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, kinh phí công đoàn để ghi vào các dòng phù hợp cột ghi Có TK 338 (3382, 3383, 3384, 3385, 3388)."},{"k":"p","t":"Số liệu của bảng phân bổ này được sử dụng để ghi vào các bảng kê và các sổ kế toán có liên quan tùy theo hình thức kế toán áp dụng ở đơn vị (như Sổ Cái hoặc Nhật ký - Sổ cái TK 334, 338...), đồng thời được sử dụng để tính giá thành thực tế sản phẩm, dịch vụ hoàn thành."},{"k":"p","t":"II. CHỈ TIÊU HÀNG TỒN KHO"},{"k":"p","t":"1. Mục đích: Theo dõi tình hình nhập, xuất, tồn kho vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa, làm căn cứ kiểm tra tình hình sử dụng, dự trữ vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa và cung cấp thông tin cần thiết cho việc quản lý hàng tồn kho."},{"k":"p","t":"2. Nội dung: Thuộc chỉ tiêu hàng tồn kho gồm các biểu mẫu sau:"},{"k":"p","t":"- Phiếu nhập kho"},{"k":"p","t":"Mẫu số 01-VT"},{"k":"p","t":"- Phiếu xuất kho"},{"k":"p","t":"Mẫu số 02-VT"},{"k":"p","t":"- Biên bản kiểm nghiệm vật tư, công cụ, sản phẩm, hàng hóa"},{"k":"p","t":"Mẫu số 03-VT"},{"k":"p","t":"- Phiếu báo vật tư còn lại cuối kỳ"},{"k":"p","t":"Mẫu số 04-VT"},{"k":"p","t":"- Biên bản kiểm kê vật tư, công cụ, sản phẩm, hàng hóa"},{"k":"p","t":"Mẫu số 05-VT"},{"k":"p","t":"- Bảng kê mua hàng"},{"k":"p","t":"Mẫu số 06-VT"},{"k":"p","t":"- Bảng phân bổ nguyên liệu, vật liệu, công cụ, dụng cụ"},{"k":"p","t":"Mẫu số 07-VT"},{"k":"p","t":"PHIẾU NHẬP KHO"},{"k":"p","t":"(Mẫu số 01- VT)"},{"k":"p","t":"1. Mục đích: Nhằm xác nhận số lượng vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa nhập kho làm căn cứ ghi Thẻ kho, thanh toán tiền hàng, xác định trách nhiệm với người có liên quan và ghi sổ kế toán."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc trên bên trái của Phiếu nhập kho phải ghi rõ tên của đơn vị (hoặc đóng dấu đơn vị), bộ phận nhập kho. Phiếu nhập kho áp dụng trong các trường hợp nhập kho vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa mua ngoài, tự sản xuất, thuê ngoài gia công chế biến, nhận góp vốn, hoặc thừa phát hiện trong kiểm kê."},{"k":"p","t":"Khi lập phiếu nhập kho phải ghi rõ số phiếu nhập và ngày, tháng, năm lập phiếu, họ tên người giao vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa, số hóa đơn hoặc lệnh nhập kho, tên kho, địa điểm kho nhập."},{"k":"p","t":"Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, qui cách, phẩm chất, mã số và đơn vị tính của vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"Cột 1: Ghi số lượng theo chứng từ (hóa đơn hoặc lệnh nhập)."},{"k":"p","t":"Cột 2: Thủ kho ghi số lượng thực nhập vào kho."},{"k":"p","t":"Cột 3, 4: Do kế toán ghi đơn giá (giá hạch toán hoặc giá hóa đơn,... tùy theo quy định của từng đơn vị) và tính ra số tiền của từng thứ vật tư, dụng cụ, sản phẩm, hàng hóa thực nhập."},{"k":"p","t":"Dòng cộng: Ghi tổng số tiền của các loại vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa nhập cùng một phiếu nhập kho."},{"k":"p","t":"Dòng số tiền viết bằng chữ: Ghi tổng số tiền trên Phiếu nhập kho bằng chữ."},{"k":"p","t":"Phiếu nhập kho do bộ phận mua hàng hoặc bộ phận sản xuất lập thành 2 liên (đối với vật tư, hàng hóa mua ngoài) hoặc 3 liên (đối với vật tư tự sản xuất) (đặt giấy than viết 1 lần), và người lập phiếu ký (ghi rõ họ tên), người giao hàng mang phiếu đến kho để nhập vật tư, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"Nhập kho xong thủ kho ghi ngày, tháng, năm nhập kho và cùng người giao hàng ký vào phiếu, thủ kho giữ liên 2 để ghi vào thẻ kho và sau đó chuyển cho phòng kế toán để ghi sổ kế toán và liên 1 lưu ở nơi lập phiếu, liên 3 (nếu có) người giao hàng giữ."},{"k":"p","t":"PHIẾU XUẤT KHO"},{"k":"p","t":"(Mẫu số 02 - VT)"},{"k":"p","t":"1. Mục đích: Theo dõi chặt chẽ số lượng vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa xuất kho cho các bộ phận sử dụng trong doanh nghiệp, làm căn cứ để hạch toán chi phí sản xuất, tính giá thành sản phẩm, dịch vụ và kiểm tra việc sử dụng, thực hiện định mức tiêu hao vật tư."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc bên trái của Phiếu xuất kho phải ghi rõ tên của đơn vị (hoặc đóng dấu đơn vị), bộ phận xuất kho. Phiếu xuất kho lập cho một hoặc nhiều thứ vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa cùng một kho dùng cho một đối tượng hạch toán chi phí hoặc cùng một mục đích sử dụng."},{"k":"p","t":"Khi lập phiếu xuất kho phải ghi rõ: Họ tên người nhận hàng, tên, đơn vị (bộ phận): số và ngày, tháng, năm lập phiếu; lý do xuất kho và kho xuất vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột A, B, C, D: Ghi số thứ tự, tên, nhãn hiệu, qui cách, phẩm chất, mã số và đơn vị tính của vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa."},{"k":"p","t":"- Cột 1: Ghi số lượng vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa theo yêu cầu xuất kho của người (bộ phận) sử dụng."},{"k":"p","t":"- Cột 2: Thủ kho ghi số lượng thực tế xuất kho (số lượng thực tế xuất kho chỉ có thể bằng hoặc ít hơn số lượng yêu cầu)."},{"k":"p","t":"- Cột 3, 4: Kế toán ghi đơn giá (tùy theo quy định hạch toán của doanh nghiệp) và tính thành tiền của từng loại vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa xuất kho (cột 4 = cột 2 x cột 3)."},{"k":"p","t":"Dòng Cộng: Ghi tổng số tiền của số vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa thực tế đã xuất kho."},{"k":"p","t":"Dòng “Tổng số tiền viết bằng chữ”: Ghi tổng số tiền viết bằng chữ trên Phiếu xuất kho."},{"k":"p","t":"Phiếu xuất kho do các bộ phận xin lĩnh hoặc do bộ phận quản lý, bộ phận kho lập (tùy theo tổ chức quản lý và quy định của từng doanh nghiệp) thành 3 liên (đặt giấy than viết 1 lần). Sau khi lập phiếu xong, người lập phiếu và kế toán trưởng ký xong chuyển cho giám đốc hoặc người được ủy quyền duyệt (ghi rõ họ tên) giao cho người nhận cầm phiếu xuống kho để nhận hàng. Sau khi xuất kho, thủ kho ghi vào cột 2 số lượng thực xuất của từng thứ, ghi ngày, tháng, năm xuất kho và cùng người nhận hàng ký tên vào phiếu xuất (ghi rõ họ tên)."},{"k":"p","t":"Liên 1: Lưu ở bộ phận lập phiếu."},{"k":"p","t":"Liên 2: Thủ kho giữ để ghi vào thẻ kho và sau đó chuyển cho kế toán để kế toán ghi vào cột 3, 4 và ghi vào sổ kế toán."},{"k":"p","t":"Liên 3: Người nhận vật tư, công cụ, dụng cụ, sản phẩm, hàng hóa giữ để theo dõi ở bộ phận sử dụng."},{"k":"p","t":"BIÊN BẢN KIỂM NGHIỆM"},{"k":"p","t":"(Vật tư, công cụ, sản phẩm, hàng hóa)"},{"k":"p","t":"(Mẫu số 03 - VT)"},{"k":"p","t":"1. Mục đích: Xác định số lượng, qui cách, chất lượng vật tư, công cụ, sản phẩm, hàng hóa trước khi nhập kho, làm căn cứ để qui trách nhiệm trong thanh toán và bảo quản."},{"k":"p","t":"2. Phương pháp và trách nhiệm ghi"},{"k":"p","t":"Góc bên trái của Biên bản kiểm nghiệm ghi rõ tên đơn vị (hoặc đóng dấu đơn vị), bộ phận sử dụng."},{"k":"p","t":"Biên bản này áp dụng cho các loại vật tư, dụng cụ, sản phẩm, hàng hóa cần phải kiểm nghiệm trước khi nhập kho trong các trường hợp:"},{"k":"p","t":"- Nhập kho với số lượng lớn;"},{"k":"p","t":"- Các loại vật tư, công cụ, sản phẩm, hàng hóa có tính chất lý, hóa phức tạp;"},{"k":"p","t":"- Các loại vật tư, công cụ, sản phẩm, hàng hóa quý hiếm;"},{"k":"p","t":"Những vật tư, công cụ, sản phẩm, hàng hóa không cần kiểm nghiệm trước khi nhập kho, nhưng trong quá trình nhập kho nếu phát hiện có sự khác biệt lớn về số lượng và chất lượng giữa hóa đơn và thực nhập thì vẫn phải lập biên bản kiểm nghiệm."},{"k":"p","t":"- Cột A, B, C: Ghi số thứ tự, tên nhãn hiệu, quy cách và mã số của vật tư, công cụ, dụng cụ, sản phẩm hàng hóa kiểm nghiệm."},{"k":"p","t":"- Cột D: “Phương thức kiểm nghiệm” ghi phương pháp kiểm nghiệm toàn diện hay xác suất."},{"k":"p","t":"- Cột E: Ghi rõ đơn vị tính của từng loại"},{"k":"p","t":"- Cột 1: Ghi số lượng theo hóa đơn hoặc phiếu giao hàng."},{"k":"p","t":"- Cột 2 và 3: Ghi kết quả thực tế kiểm nghiệm."},{"k":"p","t":"Ý kiến của Ban k
