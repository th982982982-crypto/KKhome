<style>

.no-tk{background:#f8fafc;border-radius:10px;padding:24px;text-align:center;border:1px solid var(--bd)}
.no-tk p{font-size:14px;color:var(--mu);line-height:1.6}
@media(max-width:768px){.sb{display:none}.main{margin-left:0;padding:14px}}

<script id="LD" type="application/json">{"meta":{"title":"Thông tư 133/2016/TT-BTC — Kế toán DN Nhỏ và Vừa","shortCode":"TT 133/2016","subtitle":"Chế độ kế toán DN nhỏ và vừa (SME)","slug":"tt133","number":"133/2016/TT-BTC","effectiveDate":"01/01/2017","scope":"Hướng dẫn chế độ kế toán cho DN nhỏ và vừa (SME). Hiệu lực 01/01/2017, thay thế QĐ 48/2006/QĐ-BTC.","description":"TT 133/2016 là chế độ kế toán toàn diện cho SME với 93 điều: hệ thống TK loại 1-9 (đơn giản hóa so với DN lớn), 4 báo cáo tài chính, chứng từ và sổ kế toán phù hợp quy mô SME. DN SME doanh thu 3-50 tỷ áp thuế TNDN 17% (Luật 67, Điều 10).","tkNote":"","related":["TT 99/2025 — Kế toán DN thông thường","TT 58/2026 — Kế toán DN siêu nhỏ","Luật 67/2025/QH15 — Thuế suất 17% cho SME","Chuẩn mực kế toán VAS"]},"outline":[{"id":"tt133_1","no":1,"code":"Điều 1","title":"Điều 1. Phạm vi điều chỉnh","shortTitle":"Phạm vi điều chỉnh","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Thông tư này hướng dẫn nguyên tắc ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp nhỏ và vừa, không áp dụng cho việc xác định nghĩa vụ thuế của doanh nghiệp đối với ngân sách Nhà nước."}]},{"id":"tt133_2","no":2,"code":"Điều 2","title":"Điều 2. Đối tượng áp dụng","shortTitle":"Đối tượng áp dụng","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Thông tư này áp dụng đối với các doanh nghiệp nhỏ và vừa (bao gồm cả doanh nghiệp siêu nhỏ) thuộc mọi lĩnh vực, mọi thành phần kinh tế theo quy định của pháp luật về hỗ trợ doanh nghiệp nhỏ và vừa trừ doanh nghiệp Nhà nước, doanh nghiệp do Nhà nước sở hữu trên 50% vốn điều lệ, công ty đại chúng theo quy định của pháp luật về chứng khoán, các hợp tác xã, liên hiệp hợp tác xã theo quy định tại Luật Hợp tác xã."},{"k":"p","t":"2. Doanh nghiệp có quy mô nhỏ và vừa thuộc lĩnh vực đặc thù như điện lực, dầu khí, bảo hiểm, chứng khoán ... đã được Bộ Tài chính ban hành hoặc chấp thuận áp dụng chế độ kế toán đặc thù."}]},{"id":"tt133_3","no":3,"code":"Điều 3","title":"Điều 3. Nguyên tắc chung","shortTitle":"Nguyên tắc chung","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp nhỏ và vừa có thể lựa chọn áp dụng Chế độ kế toán doanh nghiệp ban hành theo Thông tư số 200/2014/TT-BTC ngày 22/12/2015 của Bộ Tài chính và các văn bản sửa đổi, bổ sung hoặc thay thế nhưng phải thông báo cho cơ quan thuế quản lý doanh nghiệp và phải thực hiện nhất quán trong năm tài chính. Trường hợp chuyển đổi trở lại áp dụng chế độ kế toán doanh nghiệp nhỏ và vừa theo Thông tư này thì phải thực hiện từ đầu năm tài chính và phải thông báo lại cho cơ quan Thuế."},{"k":"p","t":"2. Doanh nghiệp vừa và nhỏ căn cứ vào nguyên tắc kế toán, nội dung và kết cấu của các tài khoản kế toán quy định tại Thông tư này để phản ánh và hạch toán các giao dịch kinh tế phát sinh phù hợp với đặc điểm hoạt động và yêu cầu quản lý của đơn vị."},{"k":"p","t":"3. Trường hợp trong năm tài chính doanh nghiệp có những thay đổi dẫn đến không còn thuộc đối tượng áp dụng theo quy định tại Điều 2 Thông tư này thì được áp dụng Thông tư này cho đến hết năm tài chính hiện tại và phải áp dụng Chế độ kế toán phù hợp với quy định của pháp luật kể từ năm tài chính kế tiếp."}]},{"id":"tt133_4","no":4,"code":"Điều 4","title":"Điều 4. Áp dụng chuẩn mực kế toán","shortTitle":"Áp dụng chuẩn mực kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Doanh nghiệp nhỏ và vừa thực hiện Chế độ kế toán ban hành theo Thông tư này và các Chuẩn mực kế toán Việt Nam có liên quan, ngoại trừ các Chuẩn mực kế toán Việt Nam sau:"},{"k":"p","t":"STT"},{"k":"p","t":"Số hiệu và tên chuẩn mực"},{"k":"p","t":"1"},{"k":"p","t":"CM số 11 - Hợp nhất kinh doanh"},{"k":"p","t":"2"}]},{"id":"tt133_5","no":5,"code":"Điều 5","title":"Điều 5. Đơn vị tiền tệ trong kế toán","shortTitle":"Đơn vị tiền tệ trong kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"“Đơn vị tiền tệ trong kế toán” là Đồng Việt Nam (ký hiệu quốc gia là “đ”; ký hiệu quốc tế là “VND”) được dùng để ghi sổ kế toán, lập và trình bày Báo cáo tài chính của doanh nghiệp. Trường hợp đơn vị kế toán chủ yếu thu, chi bằng ngoại tệ, đáp ứng được các tiêu chuẩn quy định tại Điều 6 Thông tư này thì được chọn một loại ngoại tệ làm đơn vị tiền tệ để ghi sổ kế toán."}]},{"id":"tt133_6","no":6,"code":"Điều 6","title":"Điều 6. Lựa chọn đơn vị tiền tệ trong kế toán","shortTitle":"Lựa chọn đơn vị tiền tệ trong kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có nghiệp vụ thu, chi chủ yếu bằng ngoại tệ căn cứ vào quy định của Luật Kế toán, để xem xét, quyết định lựa chọn đơn vị tiền tệ trong kế toán và chịu trách nhiệm về quyết định đó trước pháp luật. Khi lựa chọn đơn vị tiền tệ trong kế toán, doanh nghiệp phải thông báo cho cơ quan thuế quản lý trực tiếp."},{"k":"p","t":"2. Đơn vị tiền tệ trong kế toán là đơn vị tiền tệ:"},{"k":"p","t":"a) Được sử dụng chủ yếu trong các giao dịch bán hàng, cung cấp dịch vụ của đơn vị, có ảnh hưởng lớn đến giá bán hàng hóa và cung cấp dịch vụ, thông thường chính là đơn vị tiền tệ dùng để niêm yết giá bán và được thanh toán; và"},{"k":"p","t":"b) Được sử dụng chủ yếu trong việc mua hàng hóa, dịch vụ, có ảnh hưởng lớn đến chi phí nhân công, nguyên vật liệu và các chi phí sản xuất, kinh doanh khác, thông thường chính là đơn vị tiền tệ dùng để thanh toán cho các chi phí đó."},{"k":"p","t":"3. Các yếu tố sau đây cũng được xem xét và cung cấp bằng chứng về đơn vị tiền tệ trong kế toán của đơn vị:"},{"k":"p","t":"a) Đơn vị tiền tệ sử dụng để huy động các nguồn lực tài chính (như phát hành cổ phiếu, trái phiếu);"}]},{"id":"tt133_7","no":7,"code":"Điều 7","title":"Điều 7. Chuyển đổi Báo cáo tài chính sang Đồng Việt Nam","shortTitle":"Chuyển đổi Báo cáo tài chính sang Đồng Việt Nam","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp sử dụng đồng tiền khác với Đồng Việt Nam làm đơn vị tiền tệ trong kế toán thì Báo cáo tài chính mang tính pháp lý để công bố ra công chúng và nộp cho các cơ quan có thẩm quyền tại Việt Nam là Báo cáo tài chính được trình bày bằng Đồng Việt Nam. Trường hợp doanh nghiệp thuộc đối tượng bắt buộc phải kiểm toán báo cáo tài chính thì Báo cáo tài chính nộp cho cơ quan quản lý Nhà nước và công bố ra công chúng phải được kiểm toán."},{"k":"p","t":"2. Việc chuyển đổi Báo cáo tài chính sang Đồng Việt Nam được thực hiện theo quy định tại Điều 78 Thông tư này."},{"k":"p","t":"3. Khi chuyển đổi Báo cáo tài chính sang Đồng Việt Nam, doanh nghiệp phải trình bày rõ trên Bản thuyết minh Báo cáo tài chính những ảnh hưởng (nếu có) đối với Báo cáo tài chính do việc chuyển đổi Báo cáo tài chính sang Đồng Việt Nam."}]},{"id":"tt133_8","no":8,"code":"Điều 8","title":"Điều 8. Thay đổi đơn vị tiền tệ trong kế toán","shortTitle":"Thay đổi đơn vị tiền tệ trong kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"Khi có sự thay đổi lớn về hoạt động quản lý và kinh doanh dẫn đến đơn vị tiền tệ kế toán được sử dụng trong các giao dịch kinh tế không còn thỏa mãn các tiêu chuẩn tại khoản 2, 3 Điều 6 Thông tư này thì doanh nghiệp được thay đổi đơn vị tiền tệ trong kế toán. Việc thay đổi từ một đơn vị tiền tệ ghi sổ kế toán này sang một đơn vị tiền tệ ghi sổ kế toán khác chỉ được thực hiện tại thời điểm bắt đầu niên độ kế toán mới."},{"k":"p","t":"Doanh nghiệp phải thông báo cho cơ quan thuế quản lý trực tiếp về việc thay đổi đơn vị tiền tệ trong kế toán chậm nhất là sau 10 ngày làm việc kể từ ngày thay đổi đơn vị tiền tệ."}]},{"id":"tt133_9","no":9,"code":"Điều 9","title":"Điều 9. Quyền và trách nhiệm của doanh nghiệp đối với việc tổ chức kế toán tại các đơn vị trực thuộc không có tư cách pháp nhân hạch toán phụ thuộc (gọi tắt là đơn vị hạch toán phụ thuộc)","shortTitle":"Quyền và trách nhiệm của doanh nghiệp đối với việc tổ chức kế toán tại các đơn vị trực thuộc không có tư cách pháp nhân hạch toán phụ thuộc (gọi tắt là đơn vị hạch toán phụ thuộc)","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh nghiệp có trách nhiệm tổ chức bộ máy kế toán và phân cấp hạch toán ở các đơn vị hạch toán phụ thuộc phù hợp với đặc điểm hoạt động, yêu cầu quản lý của mình và không trái với quy định của pháp luật."},{"k":"p","t":"2. Doanh nghiệp quyết định việc kế toán tại đơn vị hạch toán phụ thuộc có tổ chức bộ máy kế toán riêng đối với:"},{"k":"p","t":"a) Việc ghi nhận khoản vốn kinh doanh được doanh nghiệp cấp: Doanh nghiệp quyết định đơn vị hạch toán phụ thuộc ghi nhận là nợ phải trả hoặc vốn chủ sở hữu;"},{"k":"p","t":"b) Đối với các giao dịch mua, bán, điều chuyển sản phẩm, hàng hóa, dịch vụ nội bộ, việc ghi nhận doanh thu, giá vốn tại từng đơn vị hạch toán phụ thuộc do doanh nghiệp quyết định, không phụ thuộc vào hình thức của chứng từ kế toán (hóa đơn hay chứng từ luân chuyển nội bộ)."},{"k":"p","t":"Trường hợp sự luân chuyển sản phẩm, hàng hóa, dịch vụ giữa các khâu trong nội bộ về bản chất tạo ra giá trị gia tăng trong sản phẩm, hàng hóa, dịch vụ thì doanh nghiệp nên ghi nhận doanh thu, giá vốn tại các đơn vị hạch toán phụ thuộc."},{"k":"p","t":"c) Việc phân cấp kế toán tại đơn vị hạch toán phụ thuộc: Tùy thuộc mô hình tổ chức kế toán tập trung hay phân tán, doanh nghiệp có thể giao đơn vị hạch toán phụ thuộc phản ánh đến lợi nhuận sau thuế chưa phân phối hoặc chỉ phản ánh đến doanh thu, chi phí."}]},{"id":"tt133_10","no":10,"code":"Điều 10","title":"Điều 10. Đăng ký sửa đổi Chế độ kế toán","shortTitle":"Đăng ký sửa đổi Chế độ kế toán","chuong":"Chương I — QUY ĐỊNH CHUNG","muc":"","level":1,"content":[{"k":"p","t":"1. Đối với hệ thống tài khoản kế toán"},{"k":"p","t":"a) Trường hợp doanh nghiệp cần bổ sung tài khoản cấp 1, cấp 2 hoặc sửa đổi tài khoản cấp 1, cấp 2 về tên, ký hiệu, nội dung và phương pháp hạch toán các nghiệp vụ kinh tế phát sinh đặc thù phải được sự chấp thuận bằng văn bản của Bộ Tài chính trước khi thực hiện."},{"k":"p","t":"b) Doanh nghiệp có thể mở thêm các tài khoản cấp 2 và các tài khoản cấp 3 đối với những tài khoản không có qui định tài khoản cấp 2, tài khoản cấp 3 tại danh mục Hệ thống tài khoản kế toán doanh nghiệp quy định tại Phụ lục 1 ban hành kèm theo Thông tư này nhằm phục vụ yêu cầu quản lý của doanh nghiệp mà không phải đề nghị Bộ Tài chính chấp thuận."},{"k":"p","t":"2. Đối với Báo cáo tài chính"},{"k":"p","t":"a) Doanh nghiệp nhỏ và vừa căn cứ biểu mẫu và nội dung của các chỉ tiêu của Báo cáo tài chính tại Phụ lục 2 ban hành kèm theo Thông tư này để chi tiết các chỉ tiêu (có sẵn) của hệ thống Báo cáo tài chính phù hợp với đặc điểm sản xuất, kinh doanh, yêu cầu quản lý của từng đơn vị."},{"k":"p","t":"b) Trường hợp doanh nghiệp cần bổ sung mới hoặc sửa đổi biểu mẫu, tên và nội dung các chỉ tiêu của Báo cáo tài chính phải được sự chấp thuận bằng văn bản của Bộ Tài chính trước khi thực hiện."}]},{"id":"tt133_11","no":11,"code":"Điều 11","title":"Điều 11. Nguyên tắc kế toán tiền","shortTitle":"Nguyên tắc kế toán tiền","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Kế toán phải mở sổ kế toán ghi chép hàng ngày liên tục theo trình tự phát sinh các khoản thu, chi, nhập, xuất các loại tiền và tính ra số tồn tại quỹ và từng tài khoản ở Ngân hàng tại mọi thời điểm để tiện cho việc kiểm tra, đối chiếu."},{"k":"p","t":"2. Các khoản tiền do tổ chức và cá nhân ký cược, ký quỹ tại doanh nghiệp được quản lý và hạch toán như tiền của doanh nghiệp."},{"k":"p","t":"3. Khi thu, chi tiền mặt phải có phiếu thu, phiếu chi và có đủ chữ ký theo quy định về chứng từ kế toán. Khi hạch toán tiền gửi ngân hàng phải có giấy báo Nợ, giấy báo Có hoặc bảng sao kê của ngân hàng."},{"k":"p","t":"4. Kế toán phải theo dõi chi tiết tiền theo nguyên tệ. Khi phát sinh các giao dịch bằng ngoại tệ, kế toán phải quy đổi ngoại tệ ra đồng tiền ghi sổ kế toán (đơn vị tiền tệ kế toán) theo nguyên tắc:"},{"k":"p","t":"- Bên Nợ các tài khoản tiền áp dụng tỷ giá giao dịch thực tế;"},{"k":"p","t":"- Bên Có các tài khoản tiền được lựa chọn áp dụng tỷ giá ghi sổ bình quân gia quyền hoặc tỷ giá giao dịch thực tế."}]},{"id":"tt133_12","no":12,"code":"Điều 12","title":"Điều 12. Tài khoản 111 - Tiền mặt","shortTitle":"Tài khoản 111 - Tiền mặt","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thu, chi, tồn tiền mặt tại quỹ của doanh nghiệp bao gồm: Tiền Việt Nam, ngoại tệ. Chỉ phản ánh vào TK 111 “Tiền mặt” số tiền Việt Nam, ngoại tệ thực tế nhập, xuất, tồn quỹ."},{"k":"p","t":"b) Khi tiến hành nhập, xuất quỹ tiền mặt phải có phiếu thu, phiếu chi và có đủ chữ ký của người nhận, người giao, người có thẩm quyền cho phép nhập, xuất quỹ,... theo quy định về chứng từ kế toán. Một số trường hợp đặc biệt phải có lệnh nhập quỹ, xuất quỹ đính kèm."},{"k":"p","t":"c) Kế toán quỹ tiền mặt phải có trách nhiệm mở sổ kế toán quỹ tiền mặt, ghi chép hàng ngày liên tục theo trình tự phát sinh các khoản thu, chi, nhập, xuất quỹ tiền mặt và tính ra số tồn quỹ tại mọi thời điểm."},{"k":"p","t":"d) Thủ quỹ chịu trách nhiệm quản lý và nhập, xuất quỹ tiền mặt. Hàng ngày thủ quỹ phải kiểm kê số tồn quỹ tiền mặt thực tế, đối chiếu số liệu sổ quỹ tiền mặt và sổ kế toán tiền mặt. Nếu có chênh lệch, kế toán và thủ quỹ phải kiểm tra lại để xác định nguyên nhân và kiến nghị biện pháp xử lý chênh lệch."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 111 - Tiền mặt"}]},{"id":"tt133_13","no":13,"code":"Điều 13","title":"Điều 13. Tài khoản 112 - Tiền gửi ngân hàng","shortTitle":"Tài khoản 112 - Tiền gửi ngân hàng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm các khoản tiền gửi không kỳ hạn tại ngân hàng của doanh nghiệp. Căn cứ để hạch toán trên Tài khoản 112 - Tiền gửi ngân hàng là các giấy báo Có, báo Nợ hoặc bản sao kê của ngân hàng kèm theo các chứng từ gốc (ủy nhiệm chi, ủy nhiệm thu, séc chuyển khoản, séc bảo chi,…)."},{"k":"p","t":"b) Khi nhận được chứng từ của ngân hàng gửi đến, kế toán phải kiểm tra, đối chiếu với chứng từ gốc kèm theo. Nếu có sự chênh lệch giữa số liệu trên sổ kế toán của doanh nghiệp, số liệu ở chứng từ gốc với số liệu trên chứng từ của ngân hàng thì doanh nghiệp phải thông báo cho ngân hàng để cùng đối chiếu, xác minh và xử lý kịp thời. Cuối tháng, chưa xác định được nguyên nhân chênh lệch thì kế toán ghi sổ theo số liệu của ngân hàng trên giấy báo Nợ, báo Có hoặc bản sao kê. Số chênh lệch (nếu có) ghi vào bên Nợ TK 138 “Phải thu khác” (1381) (nếu số liệu của kế toán lớn hơn số liệu của ngân hàng) hoặc ghi vào bên Có TK 338 “Phải trả, phải nộp khác” (3381) (nếu số liệu của kế toán nhỏ hơn số liệu của ngân hàng). Sang tháng sau, tiếp tục kiểm tra, đối chiếu, xác định nguyên nhân để điều chỉnh số liệu ghi sổ."},{"k":"p","t":"c) Phải tổ chức hạch toán chi tiết số tiền gửi theo từng tài khoản ở từng ngân hàng để tiện cho việc kiểm tra, đối chiếu."},{"k":"p","t":"d) Khoản thấu chi ngân hàng không được ghi âm trên tài khoản tiền gửi ngân hàng mà được phản ánh tương tự như khoản vay ngân hàng."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 112 - Tiền gửi ngân hàng"}]},{"id":"tt133_14","no":14,"code":"Điều 14","title":"Điều 14. Tài khoản 121 - Chứng khoán kinh doanh","shortTitle":"Tài khoản 121 - Chứng khoán kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình mua, bán và thanh toán các loại chứng khoán theo quy định của pháp luật nắm giữ vì mục đích kinh doanh (kể cả chứng khoán có thời gian đáo hạn trên 12 tháng mua vào, bán ra để kiếm lời). Chứng khoán kinh doanh bao gồm:"},{"k":"p","t":"- Cổ phiếu, trái phiếu niêm yết trên thị trường chứng khoán;"},{"k":"p","t":"- Các loại chứng khoán và công cụ tài chính khác."},{"k":"p","t":"Tài khoản này không phản ánh các khoản đầu tư nắm giữ đến ngày đáo hạn, như: Các khoản cho vay theo khế ước giữa 2 bên, tiền gửi ngân hàng, trái phiếu, thương phiếu, tín phiếu, kỳ phiếu,... nắm giữ đến ngày đáo hạn."},{"k":"p","t":"b) Chứng khoán kinh doanh phải được ghi sổ kế toán theo giá gốc, bao gồm: Giá mua cộng (+) các chi phí mua (nếu có) như chi phí môi giới, giao dịch, cung cấp thông tin, thuế, lệ phí và phí ngân hàng. Giá gốc của chứng khoán kinh doanh được xác định theo giá trị hợp lý của các khoản thanh toán tại thời điểm giao dịch phát sinh. Thời điểm ghi nhận các khoản chứng khoán kinh doanh là thời điểm nhà đầu tư có quyền sở hữu, cụ thể như sau:"}]},{"id":"tt133_15","no":15,"code":"Điều 15","title":"Điều 15. Tài khoản 128 - Đầu tư nắm giữ đến ngày đáo hạn","shortTitle":"Tài khoản 128 - Đầu tư nắm giữ đến ngày đáo hạn","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm của các khoản đầu tư nắm giữ đến ngày đáo hạn (ngoài các khoản chứng khoán kinh doanh) như: Các khoản tiền gửi ngân hàng có kỳ hạn (bao gồm cả các loại trái phiếu, tín phiếu, kỳ phiếu), các khoản cho vay nắm giữ đến ngày đáo hạn với mục đích thu lãi hàng kỳ và các khoản đầu tư nắm giữ đến ngày đáo hạn khác."},{"k":"p","t":"Tài khoản này không phản ánh các công cụ nợ nắm giữ vì mục đích mua bán để kiếm lời (phản ánh trong Tài khoản 121 - Chứng khoán kinh doanh)."},{"k":"p","t":"b) Khoản đầu tư nắm giữ đến ngày đáo hạn phải được ghi sổ kế toán theo giá gốc, bao gồm: Giá mua cộng (+) các chi phí mua (nếu có) như chi phí môi giới, giao dịch, cung cấp thông tin, thuế, lệ phí và phí ngân hàng."},{"k":"p","t":"c) Kế toán phải mở sổ chi tiết theo dõi từng khoản đầu tư nắm giữ đến ngày đáo hạn theo từng kỳ hạn, từng đối tượng, từng loại nguyên tệ, từng số lượng... Khi lập Báo cáo tài chính, kế toán căn cứ vào kỳ hạn còn lại (dưới 12 tháng hay từ 12 tháng trở lên kể từ thời điểm lập báo cáo) để trình bày là tài sản ngắn hạn hoặc dài hạn."},{"k":"p","t":"d) Doanh nghiệp phải hạch toán đầy đủ, kịp thời doanh thu hoạt động tài chính phát sinh từ các khoản đầu tư như lãi tiền gửi, lãi cho vay, lãi, lỗ khi thanh lý, nhượng bán các khoản đầu tư nắm giữ đến ngày đáo hạn…"}]},{"id":"tt133_16","no":16,"code":"Điều 16","title":"Điều 16. Nguyên tắc kế toán nợ phải thu","shortTitle":"Nguyên tắc kế toán nợ phải thu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các khoản phải thu được theo dõi chi tiết theo kỳ hạn phải thu, đối tượng phải thu, loại nguyên tệ phải thu và các yếu tố khác theo nhu cầu quản lý của doanh nghiệp."},{"k":"p","t":"2. Việc phân loại các khoản phải thu là phải thu của khách hàng, phải thu nội bộ, phải thu khác được thực hiện theo nguyên tắc:"},{"k":"p","t":"a) Phải thu của khách hàng gồm các khoản phải thu mang tính chất thương mại phát sinh từ giao dịch có tính chất mua - bán, như: Phải thu về bán hàng, cung cấp dịch vụ, thanh lý, nhượng bán tài sản (TSCĐ, BĐSĐT, các khoản đầu tư tài chính) giữa doanh nghiệp và người mua (là đơn vị độc lập với người bán, gồm cả các đơn vị mà doanh nghiệp đầu tư góp vốn vào). Khoản phải thu này gồm cả các khoản phải thu về tiền bán hàng xuất khẩu của bên giao ủy thác với khách hàng thông qua bên nhận ủy thác;"},{"k":"p","t":"b) Phải thu nội bộ gồm các khoản phải thu giữa đơn vị cấp trên với đơn vị cấp dưới trực thuộc không có tư cách pháp nhân hạch toán phụ thuộc (sau đây gọi là đơn vị hạch toán phụ thuộc)."},{"k":"p","t":"c) Phải thu khác gồm các khoản phải thu không có tính chất thương mại, không liên quan đến giao dịch mua - bán, như:"},{"k":"p","t":"- Các khoản phải thu tạo ra doanh thu hoạt động tài chính, như: khoản phải thu về lãi cho vay, tiền gửi, cổ tức và lợi nhuận được chia;"}]},{"id":"tt133_17","no":17,"code":"Điều 17","title":"Điều 17. Tài khoản 131 - Phải thu của khách hàng","shortTitle":"Tài khoản 131 - Phải thu của khách hàng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản nợ phải thu và tình hình thanh toán các khoản nợ phải thu của doanh nghiệp với khách hàng về tiền bán sản phẩm, hàng hóa, BĐSĐT, TSCĐ, các khoản đầu tư tài chính, cung cấp dịch vụ. Tài khoản này còn dùng để phản ánh các khoản phải thu của người nhận thầu XDCB với người giao thầu về khối lượng công tác XDCB đã hoàn thành. Không phản ánh vào tài khoản này các nghiệp vụ thu tiền ngay."},{"k":"p","t":"b) Khoản phải thu của khách hàng cần được hạch toán chi tiết cho từng đối tượng, từng nội dung phải thu, theo dõi chi tiết kỳ hạn thu hồi (trên 12 tháng hay không quá 12 tháng kể từ thời điểm lập báo cáo) và ghi chép theo từng lần thanh toán. Đối tượng phải thu là các khách hàng có quan hệ kinh tế với doanh nghiệp về mua sản phẩm, hàng hóa, nhận cung cấp dịch vụ, kể cả TSCĐ, bất động sản đầu tư, các khoản đầu tư tài chính."},{"k":"p","t":"c) Bên giao ủy thác xuất khẩu ghi nhận trong tài khoản này đối với các khoản phải thu từ bên nhận ủy thác xuất khẩu về tiền bán hàng xuất khẩu như các giao dịch bán hàng, cung cấp dịch vụ thông thường."},{"k":"p","t":"d) Trong hạch toán chi tiết tài khoản này, kế toán phải tiến hành phân loại các khoản nợ, loại nợ có thể trả đúng hạn, khoản nợ khó đòi hoặc có khả năng không thu hồi được, để có căn cứ xác định số trích lập dự phòng phải thu khó đòi hoặc có biện pháp xử lý đối với khoản nợ phải thu không đòi được. Khoản thiệt hại về nợ phải thu khó đòi sau khi trừ dự phòng đã trích lập được ghi nhận vào chi phí quản lý doanh nghiệp trong kỳ báo cáo. Khoản nợ khó đòi đã xử lý khi đòi được, hạch toán vào thu nhập khác."},{"k":"p","t":"đ) Trong quan hệ bán sản phẩm, hàng hóa, cung cấp dịch vụ theo thỏa thuận giữa doanh nghiệp với khách hàng, nếu sản phẩm, hàng hóa, TSCĐ, BĐSĐT đã giao, dịch vụ đã cung cấp không đúng theo thỏa thuận trong hợp đồng kinh tế thì người mua có thể yêu cầu doanh nghiệp giảm giá hàng bán hoặc trả lại số hàng đã giao."}]},{"id":"tt133_18","no":18,"code":"Điều 18","title":"Điều 18. Tài khoản 133 - Thuế GTGT được khấu trừ","shortTitle":"Tài khoản 133 - Thuế GTGT được khấu trừ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số thuế GTGT đầu vào được khấu trừ, đã khấu trừ và còn được khấu trừ của doanh nghiệp."},{"k":"p","t":"b) Kế toán phải hạch toán riêng thuế GTGT đầu vào được khấu trừ và thuế GTGT đầu vào không được khấu trừ. Trường hợp không thể hạch toán riêng được 15 thì số thuế GTGT đầu vào được hạch toán vào Tài khoản 133. Cuối kỳ, kế toán phải xác định số thuế GTGT được khấu trừ và không được khấu trừ theo quy định của pháp luật về thuế GTGT."},{"k":"p","t":"c) Số thuế GTGT đầu vào không được khấu trừ được tính vào giá trị tài sản được mua, giá vốn của hàng bán hoặc chi phí sản xuất, kinh doanh tùy theo từng trường hợp cụ thể."},{"k":"p","t":"d) Việc xác định số thuế GTGT đầu vào được khấu trừ, kê khai, quyết toán, nộp thuế phải tuân thủ theo đúng quy định của pháp luật về thuế GTGT."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 133 - Thuế GTGT được khấu trừ"}]},{"id":"tt133_19","no":19,"code":"Điều 19","title":"Điều 19. Tài khoản 136 - Phải thu nội bộ","shortTitle":"Tài khoản 136 - Phải thu nội bộ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán:"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản nợ phải thu và tình hình thanh toán các khoản nợ phải thu của doanh nghiệp (đơn vị cấp trên) với đơn vị hạch toán phụ thuộc (đơn vị cấp dưới) hoặc giữa các đơn vị hạch toán phụ thuộc với nhau. Các đơn vị cấp dưới là đơn vị hạch toán phụ thuộc nhưng có tổ chức công tác kế toán như chi nhánh, xí nghiệp, nhà máy..."},{"k":"p","t":"b) Nội dung các khoản phải thu nội bộ phản ánh vào tài khoản 136 bao gồm:"},{"k":"p","t":"- Ở đơn vị cấp trên:"},{"k":"p","t":"+ Vốn, quỹ hoặc kinh phí đã giao, đã cấp cho cấp dưới;"},{"k":"p","t":"+ Các khoản cấp dưới phải nộp lên cấp trên theo quy định;"}]},{"id":"tt133_20","no":20,"code":"Điều 20","title":"Điều 20. Tài khoản 138 - Phải thu khác","shortTitle":"Tài khoản 138 - Phải thu khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh các khoản nợ phải thu ngoài phạm vi đã phản ánh ở Tài khoản 131 - Phải thu của khách hàng, Tài khoản 136 - Phải thu nội bộ và tình hình thanh toán các khoản nợ phải thu này, gồm những nội dung chủ yếu sau:"},{"k":"p","t":"- Giá trị tài sản thiếu đã được phát hiện nhưng chưa xác định được nguyên nhân, phải chờ xử lý;"},{"k":"p","t":"- Các khoản phải thu về bồi thường vật chất do cá nhân, tập thể (trong và ngoài doanh nghiệp) gây ra như mất mát, hư hỏng vật tư, hàng hóa, tiền vốn,... đã được xử lý bắt bồi thường;"},{"k":"p","t":"- Các khoản cho bên khác mượn bằng tài sản phi tiền tệ (nếu cho mượn bằng tiền thì phải kế toán là cho vay trên TK 1288);"},{"k":"p","t":"- Các khoản chi đầu tư XDCB, chi phí sản xuất, kinh doanh nhưng không được cấp có thẩm quyền phê duyệt phải thu hồi;"}]},{"id":"tt133_21","no":21,"code":"Điều 21","title":"Điều 21. Tài khoản 141 - Tạm ứng","shortTitle":"Tài khoản 141 - Tạm ứng","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản tạm ứng của doanh nghiệp cho người lao động trong doanh nghiệp và tình hình thanh toán các khoản tạm ứng đó."},{"k":"p","t":"b) Khoản tạm ứng là một khoản tiền hoặc vật tư do doanh nghiệp giao cho người nhận tạm ứng để thực hiện nhiệm vụ sản xuất, kinh doanh hoặc giải quyết một công việc nào đó được phê duyệt. Người nhận tạm ứng phải là người lao động làm việc tại doanh nghiệp. Đối với người nhận tạm ứng thường xuyên (thuộc các bộ phận cung ứng vật tư, quản trị, hành chính) phải được Giám đốc (Tổng giám đốc) chỉ định bằng văn bản."},{"k":"p","t":"c) Người nhận tạm ứng (có tư cách cá nhân hay tập thể) phải chịu trách nhiệm với doanh nghiệp về số đã nhận tạm ứng và chỉ được sử dụng tạm ứng theo đúng mục đích và nội dung công việc đã được phê duyệt. Nếu số tiền nhận tạm ứng không sử dụng hoặc không sử dụng hết phải nộp lại quỹ. Người nhận tạm ứng không được chuyển số tiền tạm ứng cho người khác sử dụng."},{"k":"p","t":"Khi hoàn thành, kết thúc công việc được giao, người nhận tạm ứng phải lập bảng thanh toán tạm ứng (kèm theo chứng từ gốc) để thanh toán toàn bộ, dứt điểm (theo từng lần, từng khoản) số tạm ứng đã nhận, số tạm ứng đã sử dụng và khoản chênh lệch giữa số đã nhận tạm ứng với số đã sử dụng (nếu có). Khoản tạm ứng sử dụng không hết nếu không nộp lại quỹ thì phải tính trừ vào lương của người nhận tạm ứng. Trường hợp chi quá số nhận tạm ứng thì doanh nghiệp sẽ chi bổ sung số còn thiếu."},{"k":"p","t":"d) Phải thanh toán dứt điểm khoản tạm ứng kỳ trước mới được nhận tạm ứng kỳ sau. Kế toán phải mở sổ kế toán chi tiết theo dõi cho từng người nhận tạm ứng và ghi chép đầy đủ tình hình nhận, thanh toán tạm ứng theo từng lần tạm ứng."}]},{"id":"tt133_22","no":22,"code":"Điều 22","title":"Điều 22. Nguyên tắc kế toán hàng tồn kho","shortTitle":"Nguyên tắc kế toán hàng tồn kho","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nhóm tài khoản hàng tồn kho được dùng để phản ánh trị giá hiện có và tình hình biến động hàng tồn kho của doanh nghiệp (nếu doanh nghiệp thực hiện kế toán hàng tồn kho theo phương pháp kê khai thường xuyên) hoặc được dùng để phản ánh giá trị hàng tồn kho đầu kỳ và cuối kỳ kế toán của doanh nghiệp (nếu doanh nghiệp thực hiện kế toán hàng tồn kho theo phương pháp kiểm kê định kỳ)."},{"k":"p","t":"2. Hàng tồn kho của doanh nghiệp là những tài sản được mua vào để sản xuất hoặc để bán trong kỳ sản xuất, kinh doanh bình thường, gồm:"},{"k":"p","t":"- Hàng mua đang đi trên đường;"},{"k":"p","t":"- Nguyên liệu, vật liệu;"},{"k":"p","t":"- Công cụ, dụng cụ;"},{"k":"p","t":"- Sản phẩm dở dang;"}]},{"id":"tt133_23","no":23,"code":"Điều 23","title":"Điều 23. Tài khoản 151 - Hàng mua đang đi đường","shortTitle":"Tài khoản 151 - Hàng mua đang đi đường","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá của các loại hàng hóa, vật tư (nguyên liệu, vật liệu; công cụ, dụng cụ; hàng hóa) mua ngoài đã thuộc quyền sở hữu của doanh nghiệp nhưng đến cuối kỳ vẫn còn đang trên đường vận chuyển, ở bến cảng, bến bãi hoặc đã về đến doanh nghiệp nhưng đang chờ kiểm nhận nhập kho."},{"k":"p","t":"b) Hàng hóa, vật tư được coi là thuộc quyền sở hữu của doanh nghiệp nhưng chưa nhập kho, bao gồm:"},{"k":"p","t":"- Hàng hóa, vật tư mua ngoài đã thanh toán tiền hoặc đã chấp nhận thanh toán nhưng còn để ở kho người bán, ở bến cảng, bến bãi hoặc đang trên đường vận chuyển;"},{"k":"p","t":"- Hàng hóa, vật tư mua ngoài đã về đến doanh nghiệp nhưng đang chờ kiểm nghiệm, kiểm nhận nhập kho."},{"k":"p","t":"c) Kế toán hàng mua đang đi đường được ghi nhận trên Tài khoản 151 theo nguyên tắc giá gốc."}]},{"id":"tt133_24","no":24,"code":"Điều 24","title":"Điều 24. Tài khoản 152 - Nguyên liệu, vật liệu","shortTitle":"Tài khoản 152 - Nguyên liệu, vật liệu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá hiện có và tình hình biến động tăng, giảm của các loại nguyên liệu, vật liệu trong kho của doanh nghiệp. Nguyên liệu, vật liệu của doanh nghiệp là những đối tượng lao động mua ngoài hoặc tự chế biến dùng cho mục đích sản xuất, kinh doanh của doanh nghiệp. Nguyên liệu, vật liệu phản ánh vào tài khoản này được phân loại như sau:"},{"k":"p","t":"- Nguyên liệu, vật liệu chính: Là những loại nguyên liệu và vật liệu khi tham gia vào quá trình sản xuất thì cấu thành thực thể vật chất, thực thể chính của sản phẩm. Vì vậy khái niệm nguyên liệu, vật liệu chính gắn liền với từng doanh nghiệp sản xuất cụ thể. Trong các doanh nghiệp kinh doanh thương mại, dịch vụ... không đặt ra khái niệm vật liệu chính, vật liệu phụ. Nguyên liệu, vật liệu chính cũng bao gồm cả nửa thành phẩm mua ngoài với mục đích tiếp tục quá trình sản xuất, chế tạo ra thành phẩm."},{"k":"p","t":"- Vật liệu phụ: Là những loại vật liệu khi tham gia vào quá trình sản xuất, không cấu thành thực thể chính của sản phẩm nhưng có thể kết hợp với vật liệu chính làm thay đổi màu sắc, mùi vị, hình dáng bề ngoài, tăng thêm chất lượng của sản phẩm hoặc tạo điều kiện cho quá trình chế tạo sản phẩm được thực hiện bình thường, hoặc phục vụ cho nhu cầu công nghệ, kỹ thuật, bảo quản đóng gói; phục vụ cho quá trình lao động."},{"k":"p","t":"- Nhiên liệu: Là những thứ có tác dụng cung cấp nhiệt lượng trong quá trình sản xuất, kinh doanh tạo điều kiện cho quá trình chế tạo sản phẩm diễn ra bình thường. Nhiên liệu có thể tồn tại ở thể lỏng, thể rắn và thể khí."},{"k":"p","t":"- Vật tư thay thế: Là những vật tư dùng để thay thế, sửa chữa máy móc thiết bị, phương tiện vận tải, công cụ, dụng cụ sản xuất..."}]},{"id":"tt133_25","no":25,"code":"Điều 25","title":"Điều 25. Tài khoản 153 - Công cụ, dụng cụ","shortTitle":"Tài khoản 153 - Công cụ, dụng cụ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá hiện có và tình hình biến động tăng, giảm các loại công cụ, dụng cụ của doanh nghiệp. Công cụ, dụng cụ là những tư liệu lao động không có đủ các tiêu chuẩn về giá trị và thời gian sử dụng quy định đối với TSCĐ. Vì vậy công cụ, dụng cụ được quản lý và hạch toán như nguyên liệu, vật liệu. Theo quy định hiện hành, những tư liệu lao động sau đây nếu không đủ tiêu chuẩn ghi nhận TSCĐ thì được ghi nhận là công cụ, dụng cụ:"},{"k":"p","t":"- Các đà giáo, ván khuôn, công cụ, dụng cụ gá lắp chuyên dùng cho sản xuất xây lắp;"},{"k":"p","t":"- Các loại bao bì bán kèm theo hàng hóa có tính tiền riêng, nhưng trong quá trình bảo quản hàng hóa vận chuyển trên đường và dự trữ trong kho có tính giá trị hao mòn để trừ dần giá trị của bao bì;"},{"k":"p","t":"- Những dụng cụ, đồ nghề bằng thủy tinh, sành, sứ;"},{"k":"p","t":"- Phương tiện quản lý, đồ dùng văn phòng;"}]},{"id":"tt133_26","no":26,"code":"Điều 26","title":"Điều 26. Tài khoản 154 - Chi phí sản xuất, kinh doanh dở dang","shortTitle":"Tài khoản 154 - Chi phí sản xuất, kinh doanh dở dang","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tổng hợp chi phí sản xuất, kinh doanh phục vụ cho việc tính giá thành sản phẩm, dịch vụ ở doanh nghiệp hạch toán hàng tồn kho theo phương pháp kê khai thường xuyên. Ở những doanh nghiệp hạch toán hàng tồn kho theo phương pháp kiểm kê định kỳ, Tài khoản 154 chỉ phản ánh giá trị thực tế của sản phẩm, dịch vụ dở dang đầu kỳ và cuối kỳ."},{"k":"p","t":"b) Tài khoản 154 \"Chi phí sản xuất, kinh doanh dở dang\" phản ánh chi phí sản xuất, kinh doanh phát sinh trong kỳ; chi phí sản xuất, kinh doanh của khối lượng sản phẩm, dịch vụ hoàn thành trong kỳ; chi phí sản xuất, kinh doanh dở dang đầu kỳ, cuối kỳ của các hoạt động sản xuất, kinh doanh chính, phụ và thuê ngoài gia công chế biến ở các doanh nghiệp sản xuất hoặc ở các doanh nghiệp kinh doanh dịch vụ. Tài khoản 154 cũng phản ánh chi phí sản xuất, kinh doanh của các hoạt động sản xuất, gia công chế biến, hoặc cung cấp dịch vụ của các doanh nghiệp thương mại, nếu có tổ chức các loại hình hoạt động này."},{"k":"p","t":"c) Chi phí sản xuất, kinh doanh hạch toán trên Tài khoản 154 phải được chi tiết theo địa điểm phát sinh chi phí (phân xưởng, bộ phận sản xuất, đội sản xuất, công trường,...); theo loại, nhóm sản phẩm, hoặc chi tiết, bộ phận sản phẩm; theo từng loại dịch vụ hoặc theo từng công đoạn dịch vụ."},{"k":"p","t":"d) Chi phí sản xuất, kinh doanh phản ánh trên Tài khoản 154 gồm những chi phí sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu trực tiếp;"}]},{"id":"tt133_27","no":27,"code":"Điều 27","title":"Điều 27. Tài khoản 155 - Thành phẩm","shortTitle":"Tài khoản 155 - Thành phẩm","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh giá trị hiện có và tình hình biến động của các loại thành phẩm của doanh nghiệp. Thành phẩm là những sản phẩm đã kết thúc quá trình chế biến do các bộ phận sản xuất của doanh nghiệp sản xuất hoặc thuê ngoài gia công xong đã được kiểm nghiệm phù hợp với tiêu chuẩn kỹ thuật và nhập kho."},{"k":"p","t":"Trong giao dịch xuất khẩu ủy thác, tài khoản này chỉ sử dụng tại bên giao ủy thác, không sử dụng tại bên nhận ủy thác (bên nhận giữ hộ)."},{"k":"p","t":"b) Thành phẩm do các bộ phận sản xuất chính và sản xuất phụ của doanh nghiệp sản xuất ra phải được đánh giá theo giá thành sản xuất (giá gốc), bao gồm: Chi phí nguyên liệu, vật liệu trực tiếp, chi phí nhân công trực tiếp, chi phí sản xuất chung và những chi phí khác có liên quan trực tiếp đến việc sản xuất sản phẩm."},{"k":"p","t":"c) Không được tính vào giá gốc thành phẩm các chi phí sau:"},{"k":"p","t":"- Chi phí nguyên liệu, vật liệu, chi phí nhân công và các chi phí sản xuất, kinh doanh khác phát sinh trên mức bình thường;"}]},{"id":"tt133_28","no":28,"code":"Điều 28","title":"Điều 28. Tài khoản 156 - Hàng hóa","shortTitle":"Tài khoản 156 - Hàng hóa","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh trị giá hiện có và tình hình biến động tăng, giảm các loại hàng hóa của doanh nghiệp bao gồm hàng hóa tại các kho hàng, quầy hàng, hàng hóa bất động sản. Hàng hóa là các loại vật tư, sản phẩm do doanh nghiệp mua về với mục đích để bán (bán buôn và bán lẻ). Trường hợp hàng hóa mua về vừa dùng để bán, vừa dùng để sản xuất, kinh doanh không phân biệt rõ ràng giữa hai mục đích bán lại hay để sử dụng thì vẫn phản ánh vào Tài khoản 156 “Hàng hóa”."},{"k":"p","t":"Trong giao dịch xuất nhập khẩu ủy thác, tài khoản này chỉ sử dụng tại bên giao ủy thác, không sử dụng tại bên nhận ủy thác (bên nhận giữ hộ)."},{"k":"p","t":"b) Những trường hợp sau đây không phản ánh vào Tài khoản 156 “Hàng hóa”:"},{"k":"p","t":"- Hàng hóa nhận bán hộ, nhận giữ hộ cho các doanh nghiệp khác;"},{"k":"p","t":"- Nguyên vật liệu, công cụ dụng cụ mua về dùng cho hoạt động sản xuất, kinh doanh (ghi vào các Tài khoản 152 “Nguyên liệu, vật liệu”, hoặc Tài khoản 153 “Công cụ, dụng cụ”);"}]},{"id":"tt133_29","no":29,"code":"Điều 29","title":"Điều 29. Tài khoản 157 - Hàng gửi đi bán","shortTitle":"Tài khoản 157 - Hàng gửi đi bán","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Hàng gửi đi bán phản ánh trên Tài khoản 157 được thực hiện theo nguyên tắc giá gốc. Chỉ phản ánh vào Tài khoản 157 “Hàng gửi đi bán” trị giá của hàng hóa, thành phẩm đã gửi đi cho khách hàng, gửi bán đại lý, ký gửi, dịch vụ đã hoàn thành bàn giao cho khách hàng theo hợp đồng kinh tế hoặc đơn đặt hàng, nhưng chưa được xác định là đã bán (chưa được tính là doanh thu bán hàng trong kỳ đối với số hàng hóa, thành phẩm đã gửi đi, dịch vụ đã cung cấp cho khách hàng)."},{"k":"p","t":"b) Hàng hóa, thành phẩm phản ánh trên tài khoản này vẫn thuộc quyền sở hữu của doanh nghiệp, kế toán phải mở sổ chi tiết theo dõi từng loại hàng hóa, thành phẩm, từng lần gửi hàng từ khi gửi đi cho đến khi được xác định là đã bán."},{"k":"p","t":"c) Không phản ánh vào tài khoản này chi phí vận chuyển, bốc xếp,... chi hộ khách hàng. Tài khoản 157 có thể mở chi tiết để theo dõi từng loại hàng hóa, thành phẩm gửi đi bán, dịch vụ đã cung cấp cho từng khách hàng, cho từng cơ sở nhận đại lý."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 157 - Hàng gửi đi bán"},{"k":"p","t":"Bên Nợ:"}]},{"id":"tt133_30","no":30,"code":"Điều 30","title":"Điều 30. Nguyên tắc kế toán tài sản cố định, bất động sản đầu tư và chi phí đầu tư xây dựng cơ bản dở dang","shortTitle":"Nguyên tắc kế toán tài sản cố định, bất động sản đầu tư và chi phí đầu tư xây dựng cơ bản dở dang","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Tài sản cố định, bất động sản đầu tư và chi phí đầu tư xây dựng cơ bản dở dang phải được theo dõi, quyết toán, quản lý và sử dụng theo đúng quy định của pháp luật hiện hành."},{"k":"p","t":"2. Kế toán phải theo dõi chi tiết nguồn hình thành TSCĐ để phân bổ hao mòn một cách phù hợp theo nguyên tắc:"},{"k":"p","t":"- Đối với TSCĐ hình thành từ nguồn vốn vay hoặc vốn chủ sở hữu phục vụ cho sản xuất, kinh doanh thì hao mòn được tính vào chi phí sản xuất, kinh doanh;"},{"k":"p","t":"- Đối với TSCĐ hình thành từ các Quỹ phúc lợi, Quỹ phát triển khoa học và công nghệ thì hao mòn được ghi giảm các quỹ đó."},{"k":"p","t":"3. Kế toán phân loại TSCĐ và BĐSĐT theo mục đích sử dụng. Trường hợp một tài sản được sử dụng cho nhiều mục đích, ví dụ một tòa nhà hỗn hợp vừa dùng để làm văn phòng làm việc vừa để cho thuê và một phần để bán thì kế toán phải thực hiện ước tính giá trị hợp lý của từng bộ phận để ghi nhận một cách phù hợp với mục đích sử dụng."},{"k":"p","t":"- Trường hợp một bộ phận trọng yếu của tài sản được sử dụng cho một mục đích cụ thể nào đó khác với mục đích sử dụng của các bộ phận còn lại thì kế toán căn cứ vào mức độ trọng yếu có thể phân loại toàn bộ tài sản theo bộ phận trọng yếu đó;"}]},{"id":"tt133_31","no":31,"code":"Điều 31","title":"Điều 31. Tài khoản 211 - Tài sản cố định","shortTitle":"Tài khoản 211 - Tài sản cố định","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán:"},{"k":"p","t":"Tài khoản này dùng để phản ánh giá trị hiện có và tình hình biến động tăng, giảm nguyên giá của toàn bộ tài sản cố định hữu hình, tài sản cố định vô hình thuộc quyền sở hữu của doanh nghiệp và TSCĐ thuê tài chính."},{"k":"p","t":"1.1. Tài sản cố định là những tư liệu lao động được biểu hiện dưới hình thái vật chất hoặc phi vật chất, có đủ tiêu chuẩn TSCĐ theo qui định (Trừ trường hợp có qui định riêng đối với 1 số tài sản đặc thù)."},{"k":"p","t":"a) Tài sản cố định hữu hình là những tài sản có hình thái vật chất do doanh nghiệp nắm giữ để sử dụng cho hoạt động sản xuất, kinh doanh hoặc hoạt động khác phù hợp với tiêu chuẩn ghi nhận TSCĐ hữu hình."},{"k":"p","t":"Những tài sản hữu hình có kết cấu độc lập hoặc nhiều bộ phận tài sản riêng lẻ liên kết với nhau thành một hệ thống để cùng thực hiện một hay một số chức năng nhất định, nếu thiếu bất kỳ một bộ phận nào trong đó thì cả hệ thống không thể hoạt động được, nếu thỏa mãn đồng thời cả bốn tiêu chuẩn dưới đây thì được coi là tài sản cố định:"},{"k":"p","t":"- Chắc chắn thu được lợi ích kinh tế trong tương lai từ việc sử dụng tài sản đó;"}]},{"id":"tt133_32","no":32,"code":"Điều 32","title":"Điều 32. Tài khoản 214 - Hao mòn tài sản cố định","shortTitle":"Tài khoản 214 - Hao mòn tài sản cố định","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình tăng, giảm giá trị hao mòn và giá trị hao mòn lũy kế của các loại TSCĐ và bất động sản đầu tư (BĐSĐT) trong quá trình sử dụng do trích khấu hao TSCĐ, BĐSĐT và những khoản tăng, giảm hao mòn khác của TSCĐ, BĐSĐT."},{"k":"p","t":"b) Về nguyên tắc, mọi TSCĐ, BĐSĐT dùng để cho thuê của doanh nghiệp có liên quan đến sản xuất, kinh doanh (gồm cả tài sản chưa dùng, không cần dùng, chờ thanh lý) đều phải trích khấu hao theo quy định hiện hành. Khấu hao TSCĐ dùng trong sản xuất, kinh doanh và khấu hao BĐSĐT được hạch toán vào chi phí sản xuất, kinh doanh trong kỳ; khấu hao TSCĐ, BĐSĐT chưa dùng, không cần dùng, chờ thanh lý thực hiện theo quy định của pháp luật hiện hành. Đối với TSCĐ dùng cho mục đích phúc lợi thì không phải trích khấu hao tính vào chi phí sản xuất, kinh doanh mà chỉ tính hao mòn TSCĐ và hạch toán giảm nguồn hình thành TSCĐ đó."},{"k":"p","t":"c) Căn cứ vào quy định của pháp luật và yêu cầu quản lý của doanh nghiệp để lựa chọn 1 trong các phương pháp tính, trích khấu hao theo quy định của pháp luật phù hợp cho từng TSCĐ, BĐSĐT nhằm kích thích sự phát triển sản xuất, kinh doanh, đảm bảo việc thu hồi vốn nhanh, đầy đủ và phù hợp với khả năng trang trải chi phí của doanh nghiệp."},{"k":"p","t":"Phương pháp khấu hao được áp dụng cho từng TSCĐ, BĐSĐT phải được thực hiện nhất quán và có thể được thay đổi khi có sự thay đổi đáng kể cách thức thu hồi lợi ích kinh tế của TSCĐ và BĐSĐT."},{"k":"p","t":"d) Thời gian khấu hao và phương pháp khấu hao TSCĐ phải được xem xét lại ít nhất là vào cuối mỗi năm tài chính. Nếu thời gian sử dụng hữu ích ước tính của tài sản khác biệt lớn so với các ước tính trước đó thì thời gian khấu hao phải được thay đổi tương ứng. Phương pháp khấu hao TSCĐ được thay đổi khi có sự thay đổi đáng kể cách thức ước tính thu hồi lợi ích kinh tế của TSCĐ. Trường hợp này, phải điều chỉnh chi phí khấu hao cho năm hiện hành, các năm tiếp theo và phải thuyết minh trong Báo cáo tài chính."}]},{"id":"tt133_33","no":33,"code":"Điều 33","title":"Điều 33. Tài khoản 217 - Bất động sản đầu tư","shortTitle":"Tài khoản 217 - Bất động sản đầu tư","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm bất động sản đầu tư (BĐSĐT) của doanh nghiệp theo nguyên giá, được theo dõi chi tiết theo từng đối tượng tương tự như TSCĐ. BĐSĐT gồm: Quyền sử dụng đất, nhà hoặc một phần của nhà hoặc cả nhà và đất, cơ sở hạ tầng do người chủ sở hữu hoặc người đi thuê tài sản theo hợp đồng thuê tài chính nắm giữ nhằm mục đích thu lợi từ việc cho thuê hoặc chờ tăng giá mà không phải để:"},{"k":"p","t":"- Sử dụng trong sản xuất, cung cấp hàng hóa, dịch vụ hoặc sử dụng cho các mục đích quản lý; hoặc"},{"k":"p","t":"- Bán trong kỳ sản xuất, kinh doanh thông thường."},{"k":"p","t":"1.2. Tài khoản này dùng để phản ánh giá trị BĐS đủ tiêu chuẩn ghi nhận là BĐSĐT. Không phản ánh vào tài khoản này giá trị bất động sản mua về để bán trong kỳ hoạt động kinh doanh bình thường hoặc xây dựng để bán trong tương lai gần, bất động sản chủ sở hữu sử dụng, bất động sản trong quá trình xây dựng chưa hoàn thành với mục đích để sử dụng trong tương lai dưới dạng BĐSĐT."},{"k":"p","t":"Bất động sản đầu tư được ghi nhận là tài sản phải thỏa mãn đồng thời hai điều kiện sau:"}]},{"id":"tt133_34","no":34,"code":"Điều 34","title":"Điều 34. Tài khoản 228 - Đầu tư góp vốn vào đơn vị khác","shortTitle":"Tài khoản 228 - Đầu tư góp vốn vào đơn vị khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh các khoản đầu tư góp vốn vào đơn vị khác và tình hình thu hồi các khoản đầu tư góp vốn vào đơn vị khác của doanh nghiệp."},{"k":"p","t":"Các khoản đầu tư góp vốn vào đơn vị khác của doanh nghiệp gồm:"},{"k":"p","t":"a) Các khoản vốn góp liên doanh, liên kết:"},{"k":"p","t":"- Tài khoản này dùng để phản ánh toàn bộ vốn góp vào công ty liên doanh và công ty liên kết; tình hình thu hồi vốn đầu tư liên doanh, liên kết. Tài khoản này không phản ánh các giao dịch dưới hình thức hợp đồng hợp tác kinh doanh không thành lập pháp nhân."},{"k":"p","t":"- Công ty liên doanh được thành lập bởi các bên góp vốn liên doanh có quyền đồng kiểm soát các chính sách tài chính và hoạt động, là đơn vị có tư cách pháp nhân hạch toán độc lập. Công ty liên doanh phải tổ chức thực hiện công tác kế toán riêng theo quy định của pháp luật hiện hành về kế toán, chịu trách nhiệm kiểm soát tài sản, các khoản nợ phải trả, doanh thu, thu nhập khác và chi phí phát sinh tại đơn vị mình. Mỗi bên góp vốn liên doanh được hưởng một phần kết quả hoạt động của công ty liên doanh theo thỏa thuận của hợp đồng liên doanh."}]},{"id":"tt133_35","no":35,"code":"Điều 35","title":"Điều 35. Kế toán giao dịch hợp đồng hợp tác kinh doanh","shortTitle":"Kế toán giao dịch hợp đồng hợp tác kinh doanh","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Hợp đồng hợp tác kinh doanh (BCC) là thỏa thuận bằng hợp đồng của hai hoặc nhiều bên để cùng thực hiện hoạt động kinh tế nhưng không hình thành pháp nhân độc lập. Hoạt động này có thể được đồng kiểm soát bởi các bên góp vốn theo thỏa thuận liên doanh hoặc kiểm soát bởi một trong số các bên tham gia."},{"k":"p","t":"1.2. BCC có thể được thực hiện dưới hình thức cùng nhau xây dựng tài sản hoặc hợp tác trong một số hoạt động kinh doanh. Các bên tham gia trong BCC có thể thỏa thuận chia doanh thu, chia sản phẩm hoặc chia lợi nhuận sau thuế."},{"k":"p","t":"1.3. Trong mọi trường hợp, khi nhận tiền, tài sản của các bên khác đóng góp cho hoạt động BCC, bên nhận phải kế toán là nợ phải trả, không được ghi nhận vào vốn chủ sở hữu."},{"k":"p","t":"1.4. Đối với BCC theo hình thức tài sản đồng kiểm soát"},{"k":"p","t":"a) Tài sản đồng kiểm soát bởi các bên tham gia liên doanh là tài sản được các bên tham gia liên doanh mua, xây dựng, được sử dụng cho mục đích của liên doanh và mang lại lợi ích cho các bên tham gia liên doanh theo quy định của Hợp đồng liên doanh. Các bên tham gia liên doanh được ghi nhận phần giá trị tài sản đồng kiểm soát mà mình được hưởng là tài sản trên Báo cáo tài chính của mình."}]},{"id":"tt133_36","no":36,"code":"Điều 36","title":"Điều 36. Tài khoản 229 - Dự phòng tổn thất tài sản","shortTitle":"Tài khoản 229 - Dự phòng tổn thất tài sản","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh số hiện có và tình hình biến động tăng, giảm các khoản dự phòng tổn thất tài sản, gồm:"},{"k":"p","t":"a) Dự phòng giảm giá chứng khoán kinh doanh: Là dự phòng phần giá trị bị tổn thất có thể xảy ra do giảm giá các loại chứng khoán doanh nghiệp đang nắm giữ vì mục đích kinh doanh."},{"k":"p","t":"b) Dự phòng tổn thất đầu tư vào đơn vị khác: Là khoản dự phòng tổn thất do doanh nghiệp nhận vốn góp đầu tư bị lỗ dẫn đến nhà đầu tư có khả năng mất vốn hoặc khoản dự phòng do suy giảm giá trị các khoản đầu tư."},{"k":"p","t":"- Đối với khoản đầu tư vào công ty liên doanh, liên kết, nhà đầu tư chỉ trích lập dự phòng khi công ty liên doanh, liên kết bị lỗ dẫn đến nhà đầu tư có khả năng mất vốn theo quy định hiện hành."},{"k":"p","t":"- Đối với khoản đầu tư mà nhà đầu tư nắm giữ lâu dài (không phân loại là chứng khoán kinh doanh) và nhà đầu tư không nắm quyền kiểm soát, không có ảnh hưởng đáng kể đối với bên được đầu tư, việc lập dự phòng được thực hiện như sau:"}]},{"id":"tt133_37","no":37,"code":"Điều 37","title":"Điều 37. Tài khoản 241 - Xây dựng cơ bản dở dang","shortTitle":"Tài khoản 241 - Xây dựng cơ bản dở dang","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này phản ánh chi phí thực hiện các dự án đầu tư XDCB (bao gồm chi phí mua sắm mới TSCĐ, xây dựng mới hoặc sửa chữa, cải tạo, mở rộng hay trang bị lại kỹ thuật công trình) và tình hình quyết toán dự án đầu tư XDCB ở các doanh nghiệp có tiến hành công tác mua sắm TSCĐ, đầu tư XDCB, sửa chữa lớn TSCĐ."},{"k":"p","t":"Công tác đầu tư XDCB và sửa chữa lớn TSCĐ của doanh nghiệp có thể được thực hiện theo phương thức giao thầu hoặc tự làm. Ở các doanh nghiệp tiến hành đầu tư XDCB theo phương thức tự làm thì tài khoản này phản ánh cả chi phí phát sinh trong quá trình xây lắp, sửa chữa."},{"k":"p","t":"b) Chi phí thực hiện các dự án đầu tư XDCB là toàn bộ chi phí cần thiết để xây dựng mới hoặc sửa chữa, cải tạo, mở rộng hay trang bị lại kỹ thuật công trình được xác định theo quy định hiện hành, đồng thời phải phù hợp những yếu tố khách quan của thị trường trong từng thời kỳ và được thực hiện theo quy chế về quản lý đầu tư XDCB. Chi phí đầu tư XDCB, bao gồm:"},{"k":"p","t":"- Chi phí xây dựng;"},{"k":"p","t":"- Chi phí thiết bị;"}]},{"id":"tt133_38","no":38,"code":"Điều 38","title":"Điều 38. Tài khoản 242 - Chi phí trả trước","shortTitle":"Tài khoản 242 - Chi phí trả trước","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các chi phí thực tế đã phát sinh nhưng có liên quan đến kết quả hoạt động SXKD của nhiều kỳ kế toán và việc kết chuyển các khoản chi phí này vào chi phí SXKD của các kỳ kế toán sau."},{"k":"p","t":"b) Các nội dung được phản ánh là chi phí trả trước, gồm:"},{"k":"p","t":"- Chi phí trả trước về thuê cơ sở hạ tầng, thuê hoạt động TSCĐ (quyền sử dụng đất, nhà xưởng, kho bãi, văn phòng làm việc, cửa hàng và TSCĐ khác) phục vụ cho sản xuất, kinh doanh nhiều kỳ kế toán."},{"k":"p","t":"- Chi phí thành lập doanh nghiệp, chi phí đào tạo, quảng cáo phát sinh trong giai đoạn trước hoạt động có giá trị lớn được phân bổ theo quy định của pháp luật hiện hành;"},{"k":"p","t":"- Chi phí mua bảo hiểm (bảo hiểm cháy, nổ, bảo hiểm trách nhiệm dân sự chủ phương tiện vận tải, bảo hiểm thân xe, bảo hiểm tài sản,...) và các loại lệ phí mà doanh nghiệp mua và trả một lần cho nhiều kỳ kế toán;"}]},{"id":"tt133_39","no":39,"code":"Điều 39","title":"Điều 39. Nguyên tắc kế toán nợ phải trả","shortTitle":"Nguyên tắc kế toán nợ phải trả","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Các khoản nợ phải trả được theo dõi chi tiết theo kỳ hạn phải trả, đối tượng phải trả, loại nguyên tệ phải trả và các yếu tố khác theo nhu cầu quản lý của doanh nghiệp."},{"k":"p","t":"2. Việc phân loại các khoản phải trả là phải trả người bán, phải trả nội bộ, phải trả khác được thực hiện theo nguyên tắc:"},{"k":"p","t":"a) Phải trả người bán gồm các khoản phải trả mang tính chất thương mại phát sinh từ giao dịch mua hàng hóa, dịch vụ, tài sản. Khoản phải trả này gồm cả các khoản phải trả khi nhập khẩu thông qua người nhận ủy thác (trong giao dịch nhập khẩu ủy thác);"},{"k":"p","t":"b) Phải trả nội bộ gồm các khoản phải trả giữa đơn vị cấp trên và đơn vị cấp dưới trực thuộc hạch toán phụ thuộc;"},{"k":"p","t":"c) Phải trả khác gồm các khoản phải trả không có tính thương mại, không liên quan đến giao dịch mua, bán, cung cấp hàng hóa dịch vụ:"},{"k":"p","t":"- Các khoản phải trả liên quan đến chi phí tài chính, như: khoản phải trả về lãi vay, cổ tức và lợi nhuận phải trả, chi phí hoạt động đầu tư tài chính phải trả;"}]},{"id":"tt133_40","no":40,"code":"Điều 40","title":"Điều 40. Tài khoản 331 - Phải trả người bán","shortTitle":"Tài khoản 331 - Phải trả người bán","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thanh toán về các khoản nợ phải trả của doanh nghiệp cho người bán vật tư, hàng hóa, người cung cấp dịch vụ, người bán TSCĐ, BĐSĐT, các khoản đầu tư tài chính theo hợp đồng kinh tế đã ký kết. Tài khoản này cũng được dùng để phản ánh tình hình thanh toán về các khoản nợ phải trả cho người nhận thầu xây lắp chính, phụ. Không phản ánh vào tài khoản này các nghiệp vụ mua trả tiền ngay."},{"k":"p","t":"b) Nợ phải trả cho người bán, người cung cấp, người nhận thầu xây lắp cần được hạch toán chi tiết cho từng đối tượng phải trả. Trong chi tiết từng đối tượng phải trả, tài khoản này phản ánh cả số tiền đã ứng trước cho người bán, người cung cấp, người nhận thầu xây lắp nhưng chưa nhận được sản phẩm, hàng hóa, dịch vụ, khối lượng xây lắp hoàn thành bàn giao."},{"k":"p","t":"c) Bên giao nhập khẩu ủy thác ghi nhận trên tài khoản này số tiền phải trả người bán về hàng nhập khẩu thông qua bên nhận nhập khẩu ủy thác như khoản phải trả người bán thông thường."},{"k":"p","t":"d) Những vật tư, hàng hóa, dịch vụ đã nhận, nhập kho nhưng đến cuối kỳ vẫn chưa có hóa đơn thì sử dụng giá tạm tính để ghi sổ và phải điều chỉnh về giá thực tế khi nhận được hóa đơn hoặc thông báo giá chính thức của người bán."},{"k":"p","t":"đ) Khi hạch toán chi tiết các khoản này, kế toán phải hạch toán rõ ràng, rành mạch các khoản chiết khấu thanh toán, chiết khấu thương mại, giảm giá hàng bán của người bán, người cung cấp nếu chưa được phản ánh trong hóa đơn mua hàng."}]},{"id":"tt133_41","no":41,"code":"Điều 41","title":"Điều 41. Tài khoản 333 - Thuế và các khoản phải nộp nhà nước","shortTitle":"Tài khoản 333 - Thuế và các khoản phải nộp nhà nước","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh quan hệ giữa doanh nghiệp với Nhà nước về các khoản thuế, phí, lệ phí và các khoản khác phải nộp, đã nộp, còn phải nộp vào Ngân sách Nhà nước trong kỳ kế toán năm."},{"k":"p","t":"1.2. Doanh nghiệp chủ động tính, xác định và kê khai số thuế, phí, lệ phí và các khoản phải nộp cho Nhà nước theo luật định; Kịp thời phản ánh vào sổ kế toán số thuế phải nộp, đã nộp, được khấu trừ, được hoàn..."},{"k":"p","t":"1.3. Các khoản thuế gián thu như thuế GTGT (kể cả theo phương pháp khấu trừ hay phương pháp trực tiếp), thuế tiêu thụ đặc biệt, thuế xuất khẩu, thuế bảo vệ môi trường và các loại thuế gián thu khác về bản chất là khoản thu hộ bên thứ ba. Vì vậy các khoản thuế gián thu được loại trừ ra khỏi số liệu về doanh thu gộp trên Báo cáo tài chính hoặc các báo cáo khác."},{"k":"p","t":"Doanh nghiệp có thể lựa chọn việc ghi nhận doanh thu và số thuế gián thu phải nộp trên sổ kế toán bằng một trong 2 phương pháp:"},{"k":"p","t":"- Tách và ghi nhận riêng số thuế gián thu phải nộp (kể cả thuế GTGT phải nộp theo phương pháp trực tiếp) ngay tại thời điểm ghi nhận doanh thu. Theo phương pháp này doanh thu ghi trên sổ kế toán không bao gồm số thuế gián thu phải nộp, phù hợp với số liệu về doanh thu gộp trên Báo cáo tài chính và phản ánh đúng bản chất giao dịch;"}]},{"id":"tt133_42","no":42,"code":"Điều 42","title":"Điều 42. Tài khoản 334 - Phải trả người lao động","shortTitle":"Tài khoản 334 - Phải trả người lao động","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"Tài khoản này dùng để phản ánh các khoản phải trả và tình hình thanh toán các khoản phải trả cho người lao động của doanh nghiệp về tiền lương, tiền công, tiền thưởng, bảo hiểm xã hội và các khoản phải trả khác thuộc về thu nhập của người lao động."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 334 - Phải trả người lao động"},{"k":"p","t":"Bên Nợ:"},{"k":"p","t":"- Các khoản tiền lương, tiền công, tiền thưởng có tính chất lương, bảo hiểm xã hội và các khoản khác đã trả, đã chi, đã ứng trước cho người lao động;"},{"k":"p","t":"- Các khoản khấu trừ vào tiền lương, tiền công của người lao động."}]},{"id":"tt133_43","no":43,"code":"Điều 43","title":"Điều 43. Tài khoản 335 - Chi phí phải trả","shortTitle":"Tài khoản 335 - Chi phí phải trả","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản phải trả cho hàng hóa, dịch vụ đã nhận được từ người bán trong kỳ báo cáo nhưng thực tế chưa chi trả do chưa có hóa đơn hoặc chưa đủ hồ sơ, tài liệu kế toán, được ghi nhận vào chi phí sản xuất, kinh doanh của kỳ báo cáo."},{"k":"p","t":"Tài khoản này còn phản ánh cả các khoản phải trả cho người lao động trong kỳ như phải trả về tiền lương nghỉ phép và các khoản chi phí sản xuất, kinh doanh của kỳ báo cáo phải trích trước, như:"},{"k":"p","t":"- Chi phí trong thời gian doanh nghiệp ngừng sản xuất theo mùa, vụ mà doanh nghiệp có thể xây dựng được kế hoạch ngừng sản xuất. Kế toán tiến hành tính trước và hạch toán vào chi phí sản xuất, kinh doanh trong kỳ những chi phí sẽ phải chi trong thời gian ngừng sản xuất, kinh doanh."},{"k":"p","t":"- Trích trước chi phí lãi tiền vay phải trả trong trường hợp vay trả lãi sau."},{"k":"p","t":"b) Kế toán phải phân biệt các khoản chi phí phải trả (hay còn được gọi là chi phí trích trước hoặc chi phí dồn tích) với các khoản dự phòng phải trả được phản ánh trên tài khoản 352 để ghi nhận và trình bày Báo cáo tài chính phù hợp với bản chất của từng khoản mục, cụ thể:"}]},{"id":"tt133_44","no":44,"code":"Điều 44","title":"Điều 44. Tài khoản 336 - Phải trả nội bộ","shortTitle":"Tài khoản 336 - Phải trả nội bộ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thanh toán các khoản phải trả giữa doanh nghiệp (đơn vị cấp trên) với các đơn vị trực thuộc hạch toán phụ thuộc có tổ chức công tác kế toán (đơn vị cấp dưới); Giữa các đơn vị hạch toán phụ thuộc của cùng một doanh nghiệp với nhau."},{"k":"p","t":"Trong doanh nghiệp, việc phân loại các đơn vị cấp dưới trực thuộc cho mục đích kế toán được căn cứ vào bản chất của đơn vị (hạch toán độc lập hay hạch toán phụ thuộc, có tư cách pháp nhân hay không, có người đại diện trước pháp luật hay không) mà không phụ thuộc vào tên gọi của đơn vị đó (chi nhánh, xí nghiệp, tổ, đội...)."},{"k":"p","t":"b) Các khoản phải trả nội bộ phản ánh trên tài khoản 336 \"Phải trả nội bộ\" bao gồm khoản phải trả về vốn kinh doanh và các khoản đơn vị hạch toán phụ thuộc phải nộp doanh nghiệp, phải trả đơn vị hạch toán phụ thuộc khác; Các khoản doanh nghiệp phải cấp cho đơn vị hạch toán phụ thuộc. Các khoản phải trả, phải nộp có thể là quan hệ nhận tài sản, vốn, thanh toán vãng lai, chi hộ trả hộ, ...;"},{"k":"p","t":"c) Tùy theo việc phân cấp quản lý và đặc điểm hoạt động, doanh nghiệp quyết định đơn vị hạch toán phụ thuộc ghi nhận khoản vốn kinh doanh được doanh nghiệp cấp vào TK 3361 - Phải trả nội bộ về vốn kinh doanh hoặc TK 411 - Vốn đầu tư của chủ sở hữu."},{"k":"p","t":"d) Tài khoản 336 \"Phải trả nội bộ\" được hạch toán chi tiết cho từng đơn vị nội bộ có quan hệ thanh toán, trong đó được theo dõi theo từng khoản phải nộp, phải trả."}]},{"id":"tt133_45","no":45,"code":"Điều 45","title":"Điều 45. Tài khoản 338 - Phải trả, phải nộp khác","shortTitle":"Tài khoản 338 - Phải trả, phải nộp khác","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh tình hình thanh toán về các khoản phải trả, phải nộp ngoài nội dung đã phản ánh ở các tài khoản khác thuộc nhóm TK 33 (từ TK 331 đến TK 336). Tài khoản này cũng được dùng để hạch toán doanh thu nhận trước về các dịch vụ đã cung cấp cho khách hàng."},{"k":"p","t":"b) Nội dung và phạm vi phản ánh của tài khoản này gồm các nghiệp vụ chủ yếu sau:"},{"k":"p","t":"- Giá trị tài sản thừa chưa xác định rõ nguyên nhân, còn chờ quyết định xử lý của cấp có thẩm quyền; Giá trị tài sản thừa phải trả cho cá nhân, tập thể (trong và ngoài đơn vị) theo quyết định của cấp có thẩm quyền ghi trong biên bản xử lý, nếu đã xác định được nguyên nhân;"},{"k":"p","t":"- Số tiền trích và thanh toán bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động và kinh phí công đoàn;"},{"k":"p","t":"- Các khoản khấu trừ vào tiền lương của công nhân viên theo quyết định của tòa án;"}]},{"id":"tt133_46","no":46,"code":"Điều 46","title":"Điều 46. Tài khoản 341 - Vay và nợ thuê tài chính","shortTitle":"Tài khoản 341 - Vay và nợ thuê tài chính","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản tiền vay (bao gồm cả vay dưới hình thức phát hành trái phiếu), nợ thuê tài chính và tình hình thanh toán các khoản tiền vay, nợ thuê tài chính của doanh nghiệp."},{"k":"p","t":"b) Doanh nghiệp phải theo dõi chi tiết kỳ hạn phải trả của các khoản vay, nợ thuê tài chính. Các khoản có thời gian trả nợ hơn 12 tháng kể từ thời điểm lập Báo cáo tài chính, kế toán trình bày là vay và nợ thuê tài chính dài hạn. Các khoản đến hạn trả trong vòng 12 tháng tiếp theo kể từ thời điểm lập Báo cáo tài chính, kế toán trình bày là vay và nợ thuê tài chính ngắn hạn để có kế hoạch chi trả."},{"k":"p","t":"c) Khi doanh nghiệp đi vay dưới hình thức phát hành trái phiếu, có thể xảy ra 3 trường hợp:"},{"k":"p","t":"- Phát hành trái phiếu ngang giá (giá phát hành bằng mệnh giá): Là phát hành trái phiếu với giá đúng bằng mệnh giá của trái phiếu."},{"k":"p","t":"- Phát hành trái phiếu có chiết khấu (giá phát hành nhỏ hơn mệnh giá): Là phát hành trái phiếu với giá nhỏ hơn mệnh giá của trái phiếu. Phần chênh lệch giữa giá phát hành trái phiếu nhỏ hơn mệnh giá của trái phiếu gọi là chiết khấu trái phiếu. Trường hợp này thường xảy ra khi lãi suất thị trường lớn hơn lãi suất danh nghĩa của trái phiếu phát hành."}]},{"id":"tt133_47","no":47,"code":"Điều 47","title":"Điều 47. Tài khoản 352 - Dự phòng phải trả","shortTitle":"Tài khoản 352 - Dự phòng phải trả","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh các khoản dự phòng phải trả hiện có, tình hình trích lập và sử dụng dự phòng phải trả của doanh nghiệp."},{"k":"p","t":"b) Dự phòng phải trả chỉ được ghi nhận khi thỏa mãn các điều kiện sau:"},{"k":"p","t":"- Doanh nghiệp có nghĩa vụ nợ hiện tại (nghĩa vụ pháp lý hoặc nghĩa vụ liên đới) do kết quả từ một sự kiện đã xảy ra;"},{"k":"p","t":"- Sự giảm sút về những lợi ích kinh tế có thể xảy ra dẫn đến việc yêu cầu phải thanh toán nghĩa vụ nợ;"},{"k":"p","t":"- Đưa ra được một ước tính đáng tin cậy về giá trị của nghĩa vụ nợ đó."}]},{"id":"tt133_48","no":48,"code":"Điều 48","title":"Điều 48. Tài khoản 353 - Quỹ khen thưởng, phúc lợi","shortTitle":"Tài khoản 353 - Quỹ khen thưởng, phúc lợi","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có, tình hình tăng, giảm quỹ khen thưởng, quỹ phúc lợi và quỹ thưởng ban quản lý điều hành công ty của doanh nghiệp. Quỹ khen thưởng, quỹ phúc lợi được trích từ lợi nhuận sau thuế TNDN của doanh nghiệp để dùng cho công tác khen thưởng, khuyến khích lợi ích vật chất, phục vụ nhu cầu phúc lợi công cộng, cải thiện và nâng cao đời sống vật chất, tinh thần của người lao động."},{"k":"p","t":"b) Việc trích lập và sử dụng quỹ khen thưởng, quỹ phúc lợi và quỹ thưởng ban quản lý điều hành công ty phải theo chính sách tài chính hiện hành hoặc theo quyết định của chủ sở hữu."},{"k":"p","t":"c) Quỹ khen thưởng, quỹ phúc lợi, quỹ thưởng ban quản lý điều hành công ty phải được hạch toán chi tiết theo từng loại quỹ."},{"k":"p","t":"d) Đối với TSCĐ đầu tư, mua sắm bằng quỹ phúc lợi khi hoàn thành dùng vào sản xuất, kinh doanh, kế toán ghi tăng TSCĐ đồng thời ghi tăng Vốn đầu tư của chủ sở hữu và giảm quỹ phúc lợi."},{"k":"p","t":"đ) Đối với TSCĐ đầu tư, mua sắm bằng quỹ phúc lợi khi hoàn thành dùng cho nhu cầu văn hóa, phúc lợi của doanh nghiệp, kế toán ghi tăng TSCĐ và đồng thời kết chuyển từ Quỹ phúc lợi (TK 3532) sang Quỹ phúc lợi đã hình thành TSCĐ (TK 3533). Những TSCĐ này hàng tháng không trích khấu hao TSCĐ vào chi phí mà cuối niên độ kế toán tính hao mòn TSCĐ một lần/một năm để ghi giảm Quỹ phúc lợi đã hình thành TSCĐ."}]},{"id":"tt133_49","no":49,"code":"Điều 49","title":"Điều 49. Tài khoản 356 - Quỹ phát triển khoa học và công nghệ","shortTitle":"Tài khoản 356 - Quỹ phát triển khoa học và công nghệ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh số hiện có, tình hình tăng giảm Quỹ phát triển khoa học và công nghệ (PTKH&CN) của doanh nghiệp. Quỹ PTKH&CN của doanh nghiệp chỉ được sử dụng cho đầu tư khoa học, công nghệ tại Việt Nam."},{"k":"p","t":"b) Quỹ PTKH&CN được hạch toán vào chi phí quản lý doanh nghiệp để xác định kết quả kinh doanh trong kỳ. Việc trích lập và sử dụng Quỹ PTKH&CN của doanh nghiệp phải tuân thủ theo các quy định của pháp luật."},{"k":"p","t":"c) Trường hợp doanh nghiệp sử dụng Quỹ PTKH&CN để tài trợ cho việc nghiên cứu, sản xuất thử nghiệm, số tiền thu được khi bán sản phẩm sản xuất thử được bù trừ với chi phí sản xuất thử theo nguyên tắc:"},{"k":"p","t":"- Phần chênh lệch giữa số tiền thu từ bán sản phẩm sản xuất thử cao hơn chi phí sản xuất thử được ghi tăng Quỹ PTKH&CN;"},{"k":"p","t":"- Phần chênh lệch giữa số tiền thu từ bán sản phẩm sản xuất thử thấp hơn chi phí sản xuất thử được ghi giảm Quỹ PTKH&CN."}]},{"id":"tt133_50","no":50,"code":"Điều 50","title":"Điều 50. Nguyên tắc kế toán vốn chủ sở hữu","shortTitle":"Nguyên tắc kế toán vốn chủ sở hữu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Vốn chủ sở hữu là phần tài sản thuần của doanh nghiệp còn lại thuộc sở hữu của các cổ đông, thành viên góp vốn (chủ sở hữu). Vốn chủ sở hữu được phản ánh theo từng nguồn hình thành như:"},{"k":"p","t":"- Vốn góp của chủ sở hữu;"},{"k":"p","t":"- Lợi nhuận từ hoạt động kinh doanh;"},{"k":"p","t":"- Các khoản khác được phép ghi tăng vốn chủ sở hữu."},{"k":"p","t":"2. Kế toán không ghi nhận vốn góp theo vốn điều lệ trên giấy phép đăng ký kinh doanh. Khoản vốn góp huy động, nhận từ các chủ sở hữu luôn được ghi nhận theo số thực góp, tuyệt đối không ghi nhận theo số cam kết sẽ góp của các chủ sở hữu. Trường hợp nhận vốn góp bằng tài sản phi tiền tệ thì kế toán phải ghi nhận theo giá trị hợp lý của tài sản phi tiền tệ tại ngày góp vốn."},{"k":"p","t":"3. Việc nhận vốn góp bằng các loại tài sản vô hình như bản quyền, quyền khai thác, sử dụng tài sản, thương hiệu, nhãn hiệu… chỉ được thực hiện khi có quy định cụ thể của pháp luật hoặc cơ quan có thẩm quyền cho phép. Khi pháp luật chưa có quy định cụ thể về vấn đề này, các giao dịch góp vốn bằng nhãn hiệu, thương hiệu được kế toán như việc đi thuê tài sản hoặc nhượng quyền thương mại, theo đó:"}]},{"id":"tt133_51","no":51,"code":"Điều 51","title":"Điều 51. Tài khoản 411 - Vốn đầu tư của chủ sở hữu","shortTitle":"Tài khoản 411 - Vốn đầu tư của chủ sở hữu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh vốn do chủ sở hữu đầu tư hiện có và tình hình tăng, giảm vốn đầu tư của chủ sở hữu."},{"k":"p","t":"b) Vốn đầu tư của chủ sở hữu bao gồm:"},{"k":"p","t":"- Vốn góp ban đầu, góp bổ sung của các chủ sở hữu;"},{"k":"p","t":"- Thặng dư vốn cổ phần;"},{"k":"p","t":"- Vốn khác."}]},{"id":"tt133_52","no":52,"code":"Điều 52","title":"Điều 52. Tài khoản 413 - Chênh lệch tỷ giá hối đoái","shortTitle":"Tài khoản 413 - Chênh lệch tỷ giá hối đoái","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Quy định chung về tỷ giá hối đoái và chênh lệch tỷ giá hối đoái"},{"k":"p","t":"1.1. Chênh lệch tỷ giá hối đoái là chênh lệch phát sinh từ việc trao đổi thực tế hoặc quy đổi cùng một số lượng ngoại tệ sang đơn vị tiền tệ kế toán theo tỷ giá hối đoái khác nhau. Chênh lệch tỷ giá hối đoái chủ yếu phát sinh trong các trường hợp:"},{"k":"p","t":"- Thực tế mua bán, trao đổi, thanh toán các nghiệp vụ kinh tế phát sinh bằng ngoại tệ trong kỳ;"},{"k":"p","t":"- Đánh giá lại các khoản mục tiền tệ có gốc ngoại tệ tại thời điểm lập Báo cáo tài chính;"},{"k":"p","t":"- Chuyển đổi Báo cáo tài chính được lập bằng ngoại tệ sang Đồng Việt Nam."},{"k":"p","t":"1.2. Các loại tỷ giá hối đoái (sau đây gọi tắt là tỷ giá) sử dụng trong kế toán"}]},{"id":"tt133_53","no":53,"code":"Điều 53","title":"Điều 53. Tài khoản 418 - Các quỹ thuộc vốn chủ sở hữu","shortTitle":"Tài khoản 418 - Các quỹ thuộc vốn chủ sở hữu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"Tài khoản này dùng để phản ánh số hiện có và tình hình tăng, giảm các quỹ thuộc nguồn vốn chủ sở hữu. Các quỹ này được hình thành từ lợi nhuận sau thuế TNDN. Việc trích và sử dụng quỹ thuộc nguồn vốn chủ sở hữu phải theo chính sách tài chính hiện hành đối với từng loại doanh nghiệp hoặc theo quyết định của chủ sở hữu."},{"k":"p","t":"2. Kết cấu và nội dung phản ánh của Tài khoản 418 - Các quỹ thuộc vốn chủ sở hữu"},{"k":"p","t":"Bên Nợ: Tình hình chi tiêu, sử dụng các quỹ thuộc vốn chủ sở hữu của doanh nghiệp."},{"k":"p","t":"Bên Có: Các quỹ thuộc vốn chủ sở hữu tăng do được trích lập từ lợi nhuận sau thuế."},{"k":"p","t":"Số dư bên Có: Số quỹ thuộc vốn chủ sở hữu hiện có."}]},{"id":"tt133_54","no":54,"code":"Điều 54","title":"Điều 54. Tài khoản 419 - Cổ phiếu quỹ","shortTitle":"Tài khoản 419 - Cổ phiếu quỹ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh giá trị hiện có và tình hình biến động tăng giảm của số cổ phiếu do các công ty cổ phần mua lại trong số cổ phiếu do công ty đó đã phát hành ra công chúng (gọi là cổ phiếu quỹ)."},{"k":"p","t":"Các cổ phiếu quỹ do công ty nắm giữ không được nhận cổ tức, không có quyền bầu cử hay tham gia chia phần tài sản khi công ty giải thể. Khi chia cổ tức cho các cổ phần, các cổ phiếu quỹ đang do công ty nắm giữ được coi là cổ phiếu chưa bán."},{"k":"p","t":"b) Giá trị cổ phiếu quỹ được phản ánh trên tài khoản này theo giá thực tế mua lại bao gồm giá mua lại và các chi phí liên quan trực tiếp đến việc mua lại cổ phiếu, như chi phí giao dịch, thông tin…"},{"k":"p","t":"c) Cuối kỳ kế toán, khi lập Báo cáo tài chính, giá trị thực tế của cổ phiếu quỹ được ghi giảm Vốn đầu tư của chủ sở hữu trên Báo cáo tình hình tài chính bằng cách ghi số âm (...)."},{"k":"p","t":"d) Tài khoản này không phản ánh trị giá cổ phiếu mà công ty mua của các công ty cổ phần khác vì mục đích nắm giữ đầu tư."}]},{"id":"tt133_55","no":55,"code":"Điều 55","title":"Điều 55. Tài khoản 421 - Lợi nhuận sau thuế chưa phân phối","shortTitle":"Tài khoản 421 - Lợi nhuận sau thuế chưa phân phối","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh kết quả kinh doanh (lãi, lỗ) sau thuế thu nhập doanh nghiệp và tình hình phân chia lợi nhuận hoặc xử lý lỗ của doanh nghiệp."},{"k":"p","t":"b) Việc phân chia lợi nhuận hoạt động kinh doanh của doanh nghiệp phải đảm bảo rõ ràng, rành mạch và theo đúng chính sách tài chính hiện hành."},{"k":"p","t":"c) Phải hạch toán chi tiết kết quả hoạt động kinh doanh của từng năm tài chính (năm trước, năm nay), đồng thời theo dõi chi tiết theo từng nội dung phân chia lợi nhuận của doanh nghiệp (trích lập các quỹ, bổ sung Vốn đầu tư của chủ sở hữu, chia cổ tức, lợi nhuận cho các cổ đông, cho các nhà đầu tư)."},{"k":"p","t":"d) Khi áp dụng hồi tố do thay đổi chính sách kế toán và điều chỉnh hồi tố các sai sót trọng yếu của các năm trước nhưng năm nay mới phát hiện dẫn đến phải điều chỉnh số dư đầu năm phần lợi nhuận chưa phân phối thì kế toán phải điều chỉnh tăng hoặc giảm số dư đầu năm của TK 4211 “Lợi nhuận sau thuế chưa phân phối năm trước” trên sổ kế toán và điều chỉnh tăng hoặc giảm chỉ tiêu “Lợi nhuận sau thuế chưa phân phối” trên Báo cáo tình hình tài chính."},{"k":"p","t":"Đối với tất cả các doanh nghiệp, khi phân phối lợi nhuận cần cân nhắc đến các khoản mục phi tiền tệ nằm trong lợi nhuận sau thuế chưa phân phối có thể ảnh hưởng đến luồng tiền và khả năng chi trả cổ tức, lợi nhuận của doanh nghiệp, như:"}]},{"id":"tt133_56","no":56,"code":"Điều 56","title":"Điều 56. Nguyên tắc kế toán doanh thu","shortTitle":"Nguyên tắc kế toán doanh thu","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Doanh thu là lợi ích kinh tế thu được làm tăng vốn chủ sở hữu của doanh nghiệp trừ phần vốn góp thêm của các cổ đông. Doanh thu được ghi nhận tại thời điểm giao dịch phát sinh, khi chắc chắn thu được lợi ích kinh tế, được xác định theo giá trị hợp lý của các khoản được quyền nhận, không phân biệt đã thu tiền hay sẽ thu được tiền."},{"k":"p","t":"2. Doanh thu và chi phí tạo ra khoản doanh thu đó phải được ghi nhận đồng thời theo nguyên tắc phù hợp. Tuy nhiên trong một số trường hợp, nguyên tắc phù hợp có thể xung đột với nguyên tắc thận trọng trong kế toán, thì kế toán phải căn cứ vào bản chất giao dịch để phản ánh một cách trung thực, hợp lý."},{"k":"p","t":"- Một hợp đồng kinh tế có thể bao gồm nhiều giao dịch. Kế toán phải nhận biết các giao dịch để áp dụng các điều kiện ghi nhận doanh thu phù hợp."},{"k":"p","t":"- Doanh thu phải được ghi nhận phù hợp với bản chất hơn là hình thức hoặc tên gọi của giao dịch và phải được phân bổ theo nghĩa vụ cung ứng hàng hóa, dịch vụ."},{"k":"p","t":"+ Ví dụ: Khách hàng chỉ được nhận hàng khuyến mại khi mua sản phẩm hàng hóa của đơn vị (như mua 2 sản phẩm được tặng thêm một sản phẩm) thì bản chất giao dịch là giảm giá hàng bán, sản phẩm tặng miễn phí cho khách hàng về hình thức được gọi là khuyến mại nhưng về bản chất là bán vì khách hàng sẽ không được hưởng nếu không mua sản phẩm. Trường hợp này giá trị sản phẩm tặng cho khách hàng được phản ánh vào giá vốn và doanh thu tương ứng với giá trị hợp lý của sản phẩm đó phải được ghi nhận."},{"k":"p","t":"- Đối với các giao dịch làm phát sinh nghĩa vụ của người bán ở thời điểm hiện tại và trong tương lai, doanh thu phải được phân bổ theo giá trị hợp lý của từng nghĩa vụ và được ghi nhận khi nghĩa vụ đã được thực hiện."}]},{"id":"tt133_57","no":57,"code":"Điều 57","title":"Điều 57. Tài khoản 511 - Doanh thu bán hàng và cung cấp dịch vụ","shortTitle":"Tài khoản 511 - Doanh thu bán hàng và cung cấp dịch vụ","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"1.1. Tài khoản này dùng để phản ánh doanh thu bán hàng và cung cấp dịch vụ của doanh nghiệp trong một kỳ kế toán của hoạt động sản xuất, kinh doanh từ các giao dịch và các nghiệp vụ sau:"},{"k":"p","t":"a) Bán hàng hóa: Bán sản phẩm do doanh nghiệp sản xuất ra, bán hàng hóa mua vào và bán bất động sản đầu tư;"},{"k":"p","t":"b) Cung cấp dịch vụ: Thực hiện công việc đã thỏa thuận theo hợp đồng trong một kỳ, hoặc nhiều kỳ kế toán, như cung cấp dịch vụ vận tải, du lịch, cho thuê TSCĐ theo phương thức cho thuê hoạt động, doanh thu hợp đồng xây dựng...."},{"k":"p","t":"c) Doanh thu khác."},{"k":"p","t":"1.2. Điều kiện ghi nhận doanh thu"}]},{"id":"tt133_58","no":58,"code":"Điều 58","title":"Điều 58. Tài khoản 515 - Doanh thu hoạt động tài chính","shortTitle":"Tài khoản 515 - Doanh thu hoạt động tài chính","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Nguyên tắc kế toán"},{"k":"p","t":"a) Tài khoản này dùng để phản ánh doanh thu tiền lãi, tiền bản quyền, cổ tức, lợi nhuận được chia và doanh thu hoạt động tài chính khác của doanh nghiệp, gồm:"},{"k":"p","t":"- Tiền lãi: Lãi cho vay, lãi tiền gửi Ngân hàng, lãi bán hàng trả chậm, trả góp, lãi đầu tư trái phiếu, tín phiếu, chiết khấu thanh toán được hưởng do mua hàng hóa, dịch vụ;..."},{"k":"p","t":"- Cổ tức, lợi nhuận được chia cho giai đoạn sau ngày đầu tư;"},{"k":"p","t":"- Thu nhập về hoạt động đầu tư mua, bán chứng khoán ngắn hạn, dài hạn; Lãi chuyển nhượng vốn khi thanh lý các khoản đầu tư góp vốn vào đơn vị khác;"},{"k":"p","t":"- Thu nhập về các hoạt động đầu tư khác;"}]},{"id":"tt133_59","no":59,"code":"Điều 59","title":"Điều 59. Nguyên tắc kế toán chi phí","shortTitle":"Nguyên tắc kế toán chi phí","chuong":"Chương II — TÀI KHOẢN KẾ TOÁN","muc":"","level":1,"content":[{"k":"p","t":"1. Chi phí là những khoản làm giảm lợi ích kinh tế, được ghi nhận tại thời điểm giao dịch phát sinh hoặc khi có khả năng tương đối chắc chắn sẽ phát sinh trong tương lai không phân biệt đã chi tiền hay chưa."},{"k":"p","t":"2. Việc ghi nhận chi phí ngay cả khi chưa đến kỳ hạn thanh toán nhưng có khả năng chắc chắn sẽ phát sinh nhằm đảm bảo nguyên tắc thận trọng và bảo toàn vốn. Chi phí và khoản doa
